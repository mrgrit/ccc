version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ccc
      POSTGRES_PASSWORD: ccc
      POSTGRES_DB: ccc
    ports:
      - "5434:5432"
    volumes:
      - ccc-pgdata:/var/lib/postgresql/data

  ccc-api:
    build: ..
    command: >
      python -m uvicorn apps.ccc-api.src.main:app
      --host 0.0.0.0 --port 9100
    environment:
      DATABASE_URL: postgresql://ccc:ccc@postgres:5432/ccc
      CCC_API_KEY: ccc-api-key-2026
    ports:
      - "9100:9100"
    depends_on:
      - postgres

volumes:
  ccc-pgdata:
