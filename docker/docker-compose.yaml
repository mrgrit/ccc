services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ccc
      POSTGRES_PASSWORD: ccc
      POSTGRES_DB: ccc
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - ccc-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  ccc-api:
    build: ..
    ports:
      - "${CCC_PORT:-9100}:9100"
    environment:
      DATABASE_URL: postgresql://ccc:ccc@postgres:5432/ccc
      CCC_API_KEY: ${CCC_API_KEY:-ccc-api-key-2026}
      JWT_SECRET: ${JWT_SECRET:-ccc-jwt-secret-2026}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LLM_MANAGER_MODEL: ${LLM_MANAGER_MODEL:-gemma3:4b}
      LLM_SUBAGENT_MODEL: ${LLM_SUBAGENT_MODEL:-gemma3:4b}
      EDUCATION_DIR: /app/contents/education
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  ccc-pgdata:
