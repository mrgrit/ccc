distribution:
  JuiceShop: 5  # h001 h002 h003 h007 h015
  NeoBank: 3    # h005 h008 h016
  GovPortal: 2  # h013 h019
  AdminConsole: 5  # h004 h006 h010 h012 h020
  AICompanion: 5   # h009 h011 h014 h017 h018
  MediForum: 0  # P5 의 web-vuln 카테고리 와 직접 매핑 없음 (XSS h002 가 JuiceShop 으로)
  DVWA: 0       # legacy PHP 학습용, P5 modern stack 과 무관
  total: 20

# 학습 활용 시나리오
usage:
  description: |
    학생이 P5 task 를 lab 환경에서 실습할 때 vuln-site 가 실측 가능한 target.
    각 task 의 6 step 중 일부 (target_vm: web) 가 실 명령 실행이라 vuln-site 활용도 높음.

  example_flow:
    - student: "P5 web-vuln-h005 (race condition financial) 실습 시작"
    - lab: "NeoBank port 3001 시작"
    - bastion_prompt_step1: "/transfer endpoint 의 race condition 분석"
    - student_action: "Turbo Intruder 사용 동시 30 req"
    - verify: "잭팟 PoC 검증 (V08 race)"
    - score: "+30점"

# Phase 4 status (P13)
phase4_status: complete
