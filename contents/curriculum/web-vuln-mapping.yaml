course_id: web-vuln
notes: |
  web-vuln 과목 — lecture 는 점검 방법론 순서 (개론→환경→정찰→인증→입력검증→접근제어→암호화→에러→API→자동화→보고).
  lab 은 OWASP Top 10 카테고리 순서. 두 트랙이 어긋나서 lecture w05 SQLi 와 lab w05 파일업로드가 다름.
  cross-course 매핑으로 attack 의 정찰/인증/PrivEsc lab 도 활용.

mappings:
  - week: 1
    lecture: {course: course3-web-vuln, title: "웹취약점 점검 개론"}
    labs:
      - {course: web-vuln, week: 1, version: nonai, role: primary, note: "HTTP 기초 — 웹 통신 직접 관찰"}
      - {course: web-vuln, week: 1, version: ai, role: primary}

  - week: 2
    lecture: {course: course3-web-vuln, title: "점검 도구 환경 구축"}
    labs:
      - {course: web-vuln, week: 1, version: nonai, role: primary, note: "HTTP 기초 — 도구 사용 전 통신 이해"}
      - {course: attack, week: 3, version: nonai, role: bonus, note: "취약점 스캐닝 — 자동 도구 친숙화"}

  - week: 3
    lecture: {course: course3-web-vuln, title: "정보수집 점검"}
    labs:
      - {course: attack, week: 1, version: nonai, role: primary, note: "정보수집 기초 — 웹 점검 사전 단계"}
      - {course: attack, week: 3, version: nonai, role: primary, note: "취약점 스캐닝"}
      - {course: attack, week: 1, version: ai, role: primary}

  - week: 4
    lecture: {course: course3-web-vuln, title: "인증/세션 관리 점검"}
    labs:
      - {course: web-vuln, week: 6, version: nonai, role: primary, note: "인증/세션 취약점 — lecture 정확 매칭"}
      - {course: web-vuln, week: 13, version: nonai, role: primary, note: "인증/세션 관리 취약점 (심화)"}
      - {course: attack, week: 5, version: nonai, role: bonus, note: "Authentication Attacks — 공격 관점"}
      - {course: web-vuln, week: 6, version: ai, role: primary}

  - week: 5
    lecture: {course: course3-web-vuln, title: "입력값 검증 (1) SQL Injection"}
    labs:
      - {course: web-vuln, week: 2, version: nonai, role: primary, note: "SQL Injection 실습 — lecture 정확 매칭"}
      - {course: web-vuln, week: 2, version: ai, role: primary}
      - {course: attack, week: 4, version: nonai, role: bonus, note: "Web App Attacks — sqlmap 자동화"}

  - week: 6
    lecture: {course: course3-web-vuln, title: "입력값 검증 (2) XSS / CSRF"}
    labs:
      - {course: web-vuln, week: 3, version: nonai, role: primary, note: "XSS 실습"}
      - {course: web-vuln, week: 4, version: nonai, role: primary, note: "CSRF 실습"}
      - {course: web-vuln, week: 3, version: ai, role: primary}

  - week: 7
    lecture: {course: course3-web-vuln, title: "입력값 검증 (3) 파일 업로드 / 경로 순회 / 명령어 주입"}
    labs:
      - {course: web-vuln, week: 5, version: nonai, role: primary, note: "파일 업로드 취약점"}
      - {course: web-vuln, week: 10, version: nonai, role: primary, note: "Command Injection"}
      - {course: web-vuln, week: 8, version: nonai, role: bonus, note: "XXE — 경로 순회 응용"}
      - {course: web-vuln, week: 5, version: ai, role: primary}

  - week: 8
    lecture: {course: course3-web-vuln, title: "중간고사 — JuiceShop 점검 보고서"}
    labs:
      - {course: web-vuln, week: 15, version: nonai, role: primary, note: "종합 웹 해킹 — 중간고사 전 종합 점검 능력 검증"}
      - {course: web-vuln, week: 2, version: nonai, role: review, note: "SQLi 복습"}
      - {course: web-vuln, week: 3, version: nonai, role: review, note: "XSS 복습"}

  - week: 9
    lecture: {course: course3-web-vuln, title: "접근제어 점검"}
    labs:
      - {course: web-vuln, week: 6, version: nonai, role: primary, note: "인증/세션 — 접근제어 IDOR 포함"}
      - {course: web-vuln, week: 7, version: nonai, role: primary, note: "SSRF — 내부 자원 접근 우회"}
      - {course: web-vuln, week: 11, version: nonai, role: bonus, note: "SSRF 심화"}

  - week: 10
    lecture: {course: course3-web-vuln, title: "암호화 / 통신 보안 점검"}
    labs:
      - {course: web-vuln, week: 14, version: nonai, role: primary, note: "보안 설정 오류 — TLS/cookie/header 점검"}
      - {course: web-vuln, week: 9, version: nonai, role: bonus, note: "Insecure Deserialization (암호서명 우회)"}

  - week: 11
    lecture: {course: course3-web-vuln, title: "에러 처리 / 정보 노출 점검"}
    labs:
      - {course: web-vuln, week: 14, version: nonai, role: primary, note: "보안 설정 오류 — error/debug page 노출 점검"}
      - {course: web-vuln, week: 8, version: nonai, role: bonus, note: "XXE — 외부 entity 정보 노출"}

  - week: 12
    lecture: {course: course3-web-vuln, title: "API 보안 점검"}
    labs:
      - {course: web-vuln, week: 12, version: nonai, role: primary, note: "API 보안 취약점 — lecture 정확 매칭"}
      - {course: web-vuln, week: 9, version: nonai, role: bonus, note: "Insecure Deserialization (API JSON/XML)"}
      - {course: web-vuln, week: 12, version: ai, role: primary}

  - week: 13
    lecture: {course: course3-web-vuln, title: "자동화 점검 도구 활용"}
    labs:
      - {course: attack, week: 3, version: nonai, role: primary, note: "취약점 스캐닝 — Nikto/OpenVAS/sqlmap"}
      - {course: web-vuln, week: 2, version: ai, role: bonus, note: "AI 모드 — sqlmap 자동화"}
      - {course: web-vuln, week: 3, version: ai, role: bonus, note: "AI 모드 — XSS 자동 탐지"}

  - week: 14
    lecture: {course: course3-web-vuln, title: "취약점 점검 보고서 작성법"}
    labs:
      - {course: web-vuln, week: 15, version: nonai, role: primary, note: "종합 웹 해킹 — 보고서 작성 대상"}
      - {course: web-vuln, week: 14, version: nonai, role: bonus, note: "보안 설정 오류 — 보고서 흔한 항목"}

  - week: 15
    lecture: {course: course3-web-vuln, title: "기말 — 종합 웹취약점 점검 프로젝트"}
    labs:
      - {course: web-vuln, week: 15, version: nonai, role: primary, note: "종합 웹 해킹"}
      - {course: web-vuln, week: 15, version: ai, role: primary}
      - {course: attack, week: 15, version: nonai, role: bonus, note: "Full Pentest — 종합 모의해킹"}
