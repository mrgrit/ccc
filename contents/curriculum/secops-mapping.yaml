course_id: secops
notes: |
  secops 는 lecture 와 lab 이 거의 완전 정렬 (방화벽→IPS→WAF→SIEM→CTI→통합).
  매핑은 1:1 자동 join 과 사실상 동일하지만, soc/web-vuln cross-course 보강
  추가로 학생이 같은 주제를 다른 관점에서 학습 가능.

mappings:
  - week: 1
    lecture: {course: course2-security-ops, title: "보안 솔루션 개론 + 인프라"}
    labs:
      - {course: secops, week: 1, version: nonai, role: primary, note: "보안 솔루션 인프라 점검"}
      - {course: secops, week: 1, version: ai, role: primary}

  - week: 2
    lecture: {course: course2-security-ops, title: "nftables (1) — 기초"}
    labs:
      - {course: secops, week: 2, version: nonai, role: primary, note: "nftables 방화벽 기초"}
      - {course: secops, week: 2, version: ai, role: primary}

  - week: 3
    lecture: {course: course2-security-ops, title: "nftables (2) — 실전"}
    labs:
      - {course: secops, week: 3, version: nonai, role: primary, note: "nftables 실전 — NAT/whitelist/ratelimit"}
      - {course: secops, week: 3, version: ai, role: primary}

  - week: 4
    lecture: {course: course2-security-ops, title: "Suricata IPS (1) — 설치와 구성"}
    labs:
      - {course: secops, week: 4, version: nonai, role: primary, note: "Suricata 설치·구성"}
      - {course: secops, week: 4, version: ai, role: primary}

  - week: 5
    lecture: {course: course2-security-ops, title: "Suricata IPS (2) — 룰 작성"}
    labs:
      - {course: secops, week: 5, version: nonai, role: primary, note: "Suricata 룰 작성"}
      - {course: secops, week: 5, version: ai, role: primary}
      - {course: soc, week: 6, version: nonai, role: bonus, note: "SOC 측 위협 탐지 룰 (Wazuh+Suricata)"}
    case_study:
      title: "DNS 터널링 탐지 룰 — base32 subdomain 길이 임계"
      narrative: |
        2024-08-22 incident: 1,247건의 *비정상 길이* DNS 쿼리 (subdomain 40~60자
        base32 패턴). 정상 DNS subdomain 평균 길이 8~15자. Suricata 룰 작성 시
        `dsize > 50` + `content:|01 00 00 01|` (DNS query) + `pcre:"/[a-z2-7]{40,}/"`
        조합으로 탐지 가능. base32 alphabet 정규식이 핵심.
      mitre: ["T1071.004", "T1048.003"]
      anchor_id: anc-3564198ef1bc
      relevance: "Suricata 룰 작성 lab 의 *진짜 룰 작성 대상*. 학생이 직접 PCAP 의
                 정상/비정상 분포 보고 임계 결정하는 실습."
      source: "Precinct 6 incident-2024-08-003"

  - week: 6
    lecture: {course: course2-security-ops, title: "Suricata IPS (3) — 운영"}
    labs:
      - {course: secops, week: 6, version: nonai, role: primary, note: "Suricata 운영 — 튜닝/알람"}
      - {course: secops, week: 6, version: ai, role: primary}

  - week: 7
    lecture: {course: course2-security-ops, title: "Apache + ModSecurity WAF"}
    labs:
      - {course: secops, week: 7, version: nonai, role: primary, note: "Apache + ModSecurity WAF"}
      - {course: secops, week: 7, version: ai, role: primary}
      - {course: web-vuln, week: 2, version: nonai, role: bonus, note: "SQLi 실습 — WAF 가 막을 공격"}

  - week: 8
    lecture: {course: course2-security-ops, title: "중간고사 — 방화벽 + IPS"}
    labs:
      - {course: secops, week: 8, version: nonai, role: primary, note: "중간고사 — 방화벽+IPS 구성 실기"}
      - {course: secops, week: 3, version: nonai, role: review}
      - {course: secops, week: 6, version: nonai, role: review}

  - week: 9
    lecture: {course: course2-security-ops, title: "Wazuh SIEM (1) — 설치"}
    labs:
      - {course: secops, week: 9, version: nonai, role: primary, note: "Wazuh SIEM 설치·구성"}
      - {course: secops, week: 9, version: ai, role: primary}

  - week: 10
    lecture: {course: course2-security-ops, title: "Wazuh SIEM (2) — 탐지 룰"}
    labs:
      - {course: secops, week: 10, version: nonai, role: primary, note: "Wazuh 탐지 룰 작성"}
      - {course: secops, week: 10, version: ai, role: primary}
      - {course: soc, week: 7, version: nonai, role: bonus, note: "SOC 인시던트 분류 (탐지 룰 적용 결과)"}

  - week: 11
    lecture: {course: course2-security-ops, title: "Wazuh SIEM (3) — FIM/SCA/AR"}
    labs:
      - {course: secops, week: 11, version: nonai, role: primary, note: "Wazuh FIM/SCA/Active Response"}
      - {course: secops, week: 11, version: ai, role: primary}
      - {course: soc, week: 12, version: nonai, role: bonus, note: "자동화 대응 — Active Response 활용"}
    case_study:
      title: "cron persistence 자동 차단 — Wazuh AR 적용 사례"
      narrative: |
        2024-08-25 의 cron + curl downloader 패턴이 Wazuh syscheck (511, 554) 룰
        매칭 시 Active Response 자동 호출: (1) cron entry 삭제 (rm /etc/cron.d/X)
        (2) 호스트 격리 (firewall-drop) (3) Slack/이메일 알림. fileless 전체 5분
        주기 → AR 적용 시 *재진입 1 회로 차단*.
      mitre: ["T1053.003", "T1105"]
      anchor_id: anc-bf23b0106fe4
      relevance: "Wazuh Active Response 강의의 *진짜 fileless 차단 시나리오*."
      source: "Precinct 6 incident-2024-08-005"

  - week: 12
    lecture: {course: course2-security-ops, title: "OpenCTI (1) — 설치와 구성"}
    labs:
      - {course: secops, week: 12, version: nonai, role: primary, note: "OpenCTI 설치·구성"}
      - {course: secops, week: 12, version: ai, role: primary}

  - week: 13
    lecture: {course: course2-security-ops, title: "OpenCTI (2) — 위협 인텔"}
    labs:
      - {course: secops, week: 13, version: nonai, role: primary, note: "OpenCTI 위협 인텔리전스 활용"}
      - {course: secops, week: 13, version: ai, role: primary}
      - {course: soc, week: 11, version: nonai, role: bonus, note: "SOC IoC 매칭 (CTI 활용 사례)"}
    case_study:
      title: "Precinct 6 IoC 4,363건 — STIX 임포트 실측"
      narrative: |
        Bastion KG 에 Precinct 6 의 hot IoC 4,363건 + breach_record 10,657건
        anchor 로 적재됨. 이 anchor 들을 OpenCTI 형식으로 export 하면 STIX 2.1
        Indicator/Observed-Data 객체로 즉시 사용 가능. 학생은 이 IoC 풀을
        OpenCTI 에 import 후 자기 환경 로그와 매칭 (real CTI feed 실습).
      mitre: ["T1041", "T1071.004", "T1021.002", "T1558.004", "T1566.001"]
      anchor_id: anc-eca1db9a5a31
      relevance: "OpenCTI 가 가짜 데모 데이터 대신 *진짜 incident IoC* 를 다루는
                 실습. 4,363 IoC 의 평균 빈도 분석 → 우선순위 의사결정."
      source: "Precinct 6 — hot IoC top-1000 (2024 sanitized)"

  - week: 14
    lecture: {course: course2-security-ops, title: "통합 보안 아키텍처"}
    labs:
      - {course: secops, week: 14, version: nonai, role: primary, note: "통합 — 방화벽·IPS·SIEM·CTI 연계"}
      - {course: secops, week: 14, version: ai, role: primary}

  - week: 15
    lecture: {course: course2-security-ops, title: "기말 — 보안 인프라 구축"}
    labs:
      - {course: secops, week: 15, version: nonai, role: primary, note: "기말 — 보안 인프라 종합 실기"}
      - {course: secops, week: 15, version: ai, role: primary}
