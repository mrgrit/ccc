course_id: attack
notes: |
  attack 과목 — lecture 는 OWASP/이론 순서, lab 은 PTES 킬체인 순서.
  cross-course 매핑으로 web-vuln 의 구체적 취약점 lab 을 함께 노출.
  매핑은 *시범* — 사용자 검토 후 조정.

mappings:
  - week: 1
    lecture: {course: course1-attack, title: "보안 개론 + 실습 환경 구축"}
    labs:
      - {course: attack, week: 1, version: nonai, role: primary, note: "환경 구축 후 첫 정찰"}
      - {course: attack, week: 1, version: ai, role: primary}
      - {course: web-vuln, week: 1, version: nonai, role: bonus, note: "HTTP 기초 — 웹공격 진입 전 권장"}

  - week: 2
    lecture: {course: course1-attack, title: "정보수집과 정찰"}
    labs:
      - {course: attack, week: 1, version: nonai, role: primary, note: "정보수집 기초"}
      - {course: attack, week: 2, version: nonai, role: primary, note: "포트스캐닝"}
      - {course: attack, week: 1, version: ai, role: primary}
      - {course: attack, week: 2, version: ai, role: primary}

  - week: 3
    lecture: {course: course1-attack, title: "웹 애플리케이션 구조 이해"}
    labs:
      - {course: web-vuln, week: 1, version: nonai, role: primary, note: "HTTP 기초 실습 — 웹앱 구조 직접 관찰"}
      - {course: attack, week: 3, version: nonai, role: review, note: "취약점 스캐닝 (자동 도구 관점)"}
      - {course: web-vuln, week: 1, version: ai, role: primary}

  - week: 4
    lecture: {course: course1-attack, title: "OWASP Top 10 (1) — SQL Injection"}
    labs:
      - {course: web-vuln, week: 2, version: nonai, role: primary, note: "SQLi 실습 — lecture 와 정확 매칭"}
      - {course: attack, week: 4, version: nonai, role: bonus, note: "Web App Attacks — sqlmap 자동화"}
      - {course: web-vuln, week: 2, version: ai, role: primary}

  - week: 5
    lecture: {course: course1-attack, title: "OWASP Top 10 (2) — XSS"}
    labs:
      - {course: web-vuln, week: 3, version: nonai, role: primary, note: "XSS 실습 — lecture 정확 매칭"}
      - {course: web-vuln, week: 4, version: nonai, role: bonus, note: "CSRF 실습 — XSS 와 함께 학습"}
      - {course: web-vuln, week: 3, version: ai, role: primary}

  - week: 6
    lecture: {course: course1-attack, title: "OWASP A01 + A07 — 접근 제어·인증"}
    labs:
      - {course: attack, week: 5, version: nonai, role: primary, note: "Authentication Attacks — 무차별/세션"}
      - {course: web-vuln, week: 6, version: nonai, role: primary, note: "인증/세션 취약점 (web-vuln 관점)"}
      - {course: attack, week: 5, version: ai, role: primary}

  - week: 7
    lecture: {course: course1-attack, title: "OWASP A10 + A05 + A03 — SSRF·파일 업로드·경로"}
    labs:
      - {course: web-vuln, week: 7, version: nonai, role: primary, note: "SSRF 실습"}
      - {course: web-vuln, week: 5, version: nonai, role: primary, note: "파일 업로드 취약점"}
      - {course: web-vuln, week: 10, version: nonai, role: bonus, note: "Command Injection — A03 보강"}

  - week: 8
    lecture: {course: course1-attack, title: "중간고사 — CTF 형식"}
    labs:
      - {course: attack, week: 8, version: nonai, role: primary, note: "Privilege Escalation — 중간고사 전 PrivEsc 능력 점검"}
      - {course: attack, week: 7, version: nonai, role: review, note: "System Exploits 복습"}

  - week: 9
    lecture: {course: course1-attack, title: "네트워크 공격 기초 + 패킷 분석"}
    labs:
      - {course: attack, week: 6, version: nonai, role: primary, note: "Network Attacks — ARP/MITM/스니핑"}
      - {course: attack, week: 6, version: ai, role: primary}

  - week: 10
    lecture: {course: course1-attack, title: "IPS·방화벽 우회"}
    labs:
      - {course: attack, week: 12, version: nonai, role: primary, note: "은닉 기법 (Evasion) — IDS/IPS 회피"}
      - {course: attack, week: 12, version: ai, role: primary}

  - week: 11
    lecture: {course: course1-attack, title: "Linux 권한 상승"}
    labs:
      - {course: attack, week: 8, version: nonai, role: primary, note: "Privilege Escalation 정확 매칭"}
      - {course: attack, week: 7, version: nonai, role: review, note: "System Exploits — PrivEsc 전 단계"}
      - {course: attack, week: 8, version: ai, role: primary}

  - week: 12
    lecture: {course: course1-attack, title: "지속성 확보 + 안티포렌식"}
    labs:
      - {course: attack, week: 9, version: nonai, role: primary, note: "Persistence — cron/SSH key/service"}
      - {course: attack, week: 12, version: nonai, role: bonus, note: "Evasion — 안티포렌식 일부 다룸"}
      - {course: attack, week: 9, version: ai, role: primary}

  - week: 13
    lecture: {course: course1-attack, title: "MITRE ATT&CK 종합 매핑"}
    labs:
      - {course: attack, week: 10, version: nonai, role: primary, note: "Lateral Movement — TA0008 매핑"}
      - {course: attack, week: 11, version: nonai, role: primary, note: "Data Exfiltration — TA0010 매핑"}
      - {course: attack, week: 13, version: nonai, role: bonus, note: "Wireless — 보너스 도메인"}

  - week: 14
    lecture: {course: course1-attack, title: "Bastion 자연어 자동 침투 테스트"}
    labs:
      - {course: attack, week: 1, version: ai, role: primary, note: "AI 모드 정찰부터 시작"}
      - {course: attack, week: 4, version: ai, role: primary, note: "AI 모드 웹공격"}
      - {course: attack, week: 8, version: ai, role: primary, note: "AI 모드 PrivEsc"}
      - {course: attack, week: 14, version: nonai, role: bonus, note: "소셜 엔지니어링 (Bastion 활용 가능)"}

  - week: 15
    lecture: {course: course1-attack, title: "기말 — 종합 침투 테스트 + PTES 보고서"}
    labs:
      - {course: attack, week: 15, version: nonai, role: primary, note: "Full Pentest — 종합"}
      - {course: web-vuln, week: 15, version: nonai, role: primary, note: "종합 웹 해킹"}
      - {course: attack, week: 15, version: ai, role: primary}
