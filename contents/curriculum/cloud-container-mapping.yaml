    case_study:
      title: "K8s 의 Data Theft 패턴 (T1041) — 컨테이너 egress"
      narrative: |
        Precinct 6 의 Data Theft 패턴 99.99% 가 lifecycle=complete-mission.
        K8s 환경에서 동일 패턴은 *Pod → 외부 C2* egress 통제 부재 시 발생.
        Falco rule "Outbound Connection from Container" + NetworkPolicy
        default-deny + Cilium L7 visibility 조합으로 탐지·차단. 학생은
        자기 cluster 의 egress 정책 부재 → 데모 Pod 가 외부 도달 가능 여부 검증.
      mitre: ["T1041"]
      anchor_id: anc-a0364e702393
      relevance: "클라우드 모니터링 강의의 *진짜 모니터링 대상*. egress 가시성 부재 시
                 Data Theft 가 어떻게 통과하는지 실측."
      source: "Precinct 6 — Data Theft cluster"

