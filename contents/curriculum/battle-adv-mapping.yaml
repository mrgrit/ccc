course_id: battle-adv
notes: |
  battle-adv lecture (APT 킬체인) 와 lab (APT 킬체인) 일부 정렬, 일부 어긋남.
  Precinct 6 사례가 *바로 이 과목의 주제* — 5건 chain (피싱→PrivEsc→측면이동→
  지속성→DNS exfil) 그대로 매핑.

mappings:
  - week: 1
    lecture: {course: course12-battle-advanced, title: "APT 시뮬레이션 기초"}
    labs:
      - {course: battle-adv, week: 1, version: nonai, role: primary, note: "APT 킬체인 시뮬레이션"}
      - {course: battle-adv, week: 1, version: ai, role: primary}
    case_study:
      title: "5 incident 가 한 캠페인 — 2024-08 클러스터"
      narrative: |
        2024-08-15 ~ 2024-08-22 동일 인프라 (198.51.100.42 / ns.evil.example) 가
        등장하는 5 incident: HTA 피싱(15) → AS-REP roasting(15) → SMB 측면이동(12)
        → cron persistence(18) → DNS 터널링(22). Initial Access 부터 Exfiltration
        까지 *7일* 단일 캠페인.
      mitre: ["T1566.001", "T1558.004", "T1021.002", "T1053.003", "T1071.004"]
      anchor_id: anc-cbdabf2e6c87
      relevance: "APT 킬체인 강의의 *교과서 사례*. 본 과목 전체가 이 1개 캠페인의
                 단계별 분해 학습."
      source: "Precinct 6 incident-2024-08-001~005"
  - week: 2
    lecture: {course: course12-battle-advanced, title: "다단계 침투 — Initial/Exec/Persist"}
    labs:
      - {course: battle-adv, week: 2, version: nonai, role: primary, note: "다단계 침투"}
      - {course: agent-ir-adv, week: 7, version: nonai, role: bonus, note: "Multi-stage 피싱→웹셸→Pivot (cross)"}
  - week: 3
    lecture: {course: course12-battle-advanced, title: "C2 채널 — DNS Tunneling/HTTP/암호화"}
    labs:
      - {course: battle-adv, week: 3, version: nonai, role: primary, note: "C2 인프라"}
      - {course: battle-adv, week: 3, version: ai, role: primary}
    case_study:
      title: "DNS 터널링 base32 1,247건 — C2 채널 사례"
      narrative: |
        2024-08-22 22:47 내부 10.20.30.80 → ns.evil.example 으로 base32 인코딩
        subdomain 1,247 쿼리. 정상 DNS 트래픽 뒤 숨어 IDS·방화벽 통과.
      mitre: ["T1071.004", "T1048.003"]
      anchor_id: anc-3564198ef1bc
      relevance: "C2 채널 강의의 *DNS Tunneling 실측*. 학생이 동일 패턴 PCAP 생성·탐지 룰 작성."
      source: "Precinct 6 incident-2024-08-003"
  - week: 4
    lecture: {course: course12-battle-advanced, title: "측면이동 심화 — PtH/Kerberoasting/Token"}
    labs:
      - {course: battle-adv, week: 4, version: nonai, role: primary, note: "측면이동 — 자격증명 기반"}
      - {course: attack-adv, week: 9, version: nonai, role: bonus, note: "AD 공격 (cross)"}
    case_study:
      title: "AS-REP roasting + SMB 측면이동 — 동일 자격증명 5호스트"
      narrative: |
        2024-08-15 win-dc01 에서 AS-REP roast (3 계정), 외부 198.51.100.42 로 hash
        유출. 3일 전 (08-12) john.doe 자격으로 SMB 5호스트 접근 (T1078). 두 사건이
        동일 캠페인 — Kerberos 약점이 측면이동의 토대.
      mitre: ["T1558.004", "T1021.002", "T1078"]
      anchor_id: anc-7c9fb0248f47
      relevance: "측면이동 강의의 *2단계 chain* 사례. AS-REP 만으로는 대부분 SMB 공격
                 이미 진행된 후."
      source: "Precinct 6 incident-2024-08-001 + 002"
  - week: 5
    lecture: {course: course12-battle-advanced, title: "데이터 유출 — DNS exfil/HTTPS Tunnel/스테가노"}
    labs:
      - {course: battle-adv, week: 5, version: nonai, role: primary, note: "안티포렌식과 데이터 유출"}
    case_study:
      title: "DNS Exfiltration — base32 + 시간 분산"
      narrative: |
        2024-08-22 의 DNS 터널링이 *2시간 25분* 분산 송출. 평균 8.5건/분 (안정적
        인간 트래픽 위장). burst 없는 *조용한 누출* 패턴이 일반 anomaly 미감지.
      mitre: ["T1048.003", "T1071.004"]
      anchor_id: anc-3564198ef1bc
      relevance: "데이터 유출 강의의 *시간 분산* 기법 실측. 학생이 burst rate 없는 패턴 탐지 룰 설계."
      source: "Precinct 6 incident-2024-08-003"
  - week: 6
