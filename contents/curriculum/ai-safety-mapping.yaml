course_id: ai-safety
notes: |
  ai-safety lecture 와 lab 가 비슷한 주제 다른 순서. lecture 는 공격 분류 → 방어 →
  거버넌스, lab 은 공격 → 방어 → 평가 순서. 의미 매칭.

