  - week: 5
    lecture: {course: course4-compliance, title: "ISMS-P (1) — 한국 인증 제도"}
    labs:
      - {course: compliance, week: 3, version: nonai, role: primary, note: "ISMS-P 인증 기준 점검 — lecture 정확 매칭"}
