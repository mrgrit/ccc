  - week: 13
    lecture: {course: course4-compliance, title: "미국 표준 — SOC 2, HIPAA"}
    labs:
      - {course: compliance, week: 7, version: nonai, role: primary, note: "SOX IT 통제 — 미국 표준 영역"}
      - {course: compliance, week: 6, version: nonai, role: primary, note: "PCI-DSS — 미국발 결제 표준"}
      - {course: compliance, week: 8, version: nonai, role: bonus, note: "CSAP — 클라우드 인증 (한국판 SOC 2)"}
    case_study:
      title: "Data Theft 패턴의 compliance 해석 (T1041)"
      narrative: |
        Precinct 6 의 incident 10,442건 중 99.99% 가 Data Theft (T1041 — Exfiltration
        over C2 Channel) 패턴. lifecycle=complete-mission. 각 사건이 SOC 2 의
        Confidentiality 통제 / HIPAA Privacy Rule / PCI-DSS Req 3 (저장 보호) +
        Req 4 (전송 보호) 위반. 단일 사건 → 다중 표준 동시 위반 흐름이 표준.
      mitre: ["T1041"]
      anchor_id: anc-a0364e702393
      relevance: "동일 incident 가 여러 표준에서 어떻게 해석되는지 (control 매핑)
                 학습. SOC 2 / HIPAA / PCI 가 다 다루는 *exfiltration* 흐름 사례."
      source: "Precinct 6 — Data Theft incident 클러스터"

  - week: 14
    lecture: {course: course4-compliance, title: "인증 준비 실습 — SoA, 증적 수집, 심사 대응"}
    labs:
      - {course: compliance, week: 4, version: nonai, role: primary, note: "ISO 27001 통제 — SoA 작성 기반"}
      - {course: compliance, week: 3, version: nonai, role: primary, note: "ISMS-P 점검 — 증적 수집"}
      - {course: compliance, week: 14, version: nonai, role: bonus, note: "보안 교육 — 심사 대응 항목"}

  - week: 15
    lecture: {course: course4-compliance, title: "기말 — 모의 인증 심사"}
    labs:
      - {course: compliance, week: 15, version: nonai, role: primary, note: "컴플라이언스 종합평가 실습"}
      - {course: compliance, week: 15, version: ai, role: primary}
      - {course: compliance, week: 4, version: nonai, role: review, note: "ISO 27001 복습"}
      - {course: compliance, week: 3, version: nonai, role: review, note: "ISMS-P 복습"}
