course_id: compliance
notes: |
  compliance lecture 는 표준 학습 순서 (ISO→ISMS-P→NIST→GDPR→리스크→감사→SOC/HIPAA→인증).
  lab 은 점검 영역 순서 (개인정보→망법→ISMS-P→ISO→GDPR→PCI→SOX→CSAP→ISMS→감사→위험→BCP).
  대부분 같은 표준 다른 순서 — 의미 매칭 명확.

mappings:
  - week: 1
    lecture: {course: course4-compliance, title: "정보보안 표준 개론"}
    labs:
      - {course: compliance, week: 1, version: nonai, role: primary, note: "개인정보보호법 — 한국 기본법 도입"}
      - {course: compliance, week: 2, version: nonai, role: primary, note: "정보통신망법 — 한국 기본 표준"}
      - {course: compliance, week: 1, version: ai, role: primary}

  - week: 2
    lecture: {course: course4-compliance, title: "ISO 27001 (1) — 구조와 원칙"}
    labs:
      - {course: compliance, week: 4, version: nonai, role: primary, note: "ISO 27001 통제 항목 점검"}
      - {course: compliance, week: 4, version: ai, role: primary}

  - week: 3
    lecture: {course: course4-compliance, title: "ISO 27001 (2) — 통제 항목 (A.5~A.8)"}
    labs:
      - {course: compliance, week: 4, version: nonai, role: primary, note: "ISO 27001 통제 항목 — A.5~A.8 매칭"}
