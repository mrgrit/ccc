      - {course: compliance, week: 14, version: nonai, role: bonus, note: "보안 교육 — 정책 시행 수단"}

  - week: 12
    lecture: {course: course4-compliance, title: "보안 감사 실습"}
    labs:
      - {course: compliance, week: 10, version: nonai, role: primary, note: "보안감사 수행 — lecture 정확 매칭"}
