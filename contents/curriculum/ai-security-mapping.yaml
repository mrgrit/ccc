course_id: ai-security
notes: |
  lecture 는 "Bastion 활용·구축" 흐름 (개론→Ollama→프롬프트엔지→로그→탐지룰→
  Bastion→Playbook→자율→Daemon→분산→RL).
  lab 은 "LLM 보안 일반" (Ollama→프롬프트→인젝션→데이터중독→모델보안→API→
  프라이버시→가드레일→해석가능성→배포→모니터링→IR→거버넌스→공급망→종합).
  거의 다른 두 트랙. 의미 매칭 + ai-safety cross-course.

mappings:
  - week: 1
    lecture: {course: course7-ai-security, title: "AI/LLM 보안 활용 개론"}
    labs:
      - {course: ai-security, week: 1, version: nonai, role: primary, note: "Ollama 기초 + API 탐색"}
      - {course: ai-security, week: 1, version: ai, role: primary}

  - week: 2
    lecture: {course: course7-ai-security, title: "LLM 기초 + Ollama"}
    labs:
      - {course: ai-security, week: 1, version: nonai, role: primary, note: "Ollama API"}
      - {course: ai-security, week: 2, version: nonai, role: primary, note: "프롬프트 엔지니어링과 보안"}

  - week: 3
    lecture: {course: course7-ai-security, title: "프롬프트 엔지니어링 for 보안"}
    labs:
      - {course: ai-security, week: 2, version: nonai, role: primary, note: "프롬프트 엔지니어링과 보안"}
      - {course: ai-security, week: 3, version: nonai, role: bonus, note: "프롬프트 인젝션 — 안티 패턴 학습"}
      - {course: ai-safety, week: 2, version: nonai, role: bonus, note: "프롬프트 인젝션 방어 (cross)"}

  - week: 4
    lecture: {course: course7-ai-security, title: "LLM 기반 로그 분석"}
    labs:
      - {course: ai-security, week: 6, version: nonai, role: primary, note: "LLM API 보안 — 로그 분석 호출"}
      - {course: ai-security, week: 11, version: nonai, role: bonus, note: "LLM 모니터링·로깅"}

  - week: 5
    lecture: {course: course7-ai-security, title: "탐지 룰 자동 생성"}
    labs:
      - {course: ai-security, week: 6, version: nonai, role: primary, note: "LLM API 보안 — 룰 생성 워크로드"}
