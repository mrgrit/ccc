course_id: soc
notes: |
  soc lecture 는 SOC 분석가 학습 흐름 (개론→로그→Wazuh→경보→ATT&CK→SIGMA→IR→CTI→자동화).
  lab 은 운영 흐름 (구축→SIEM→로그수집→이벤트→상관분석→탐지룰→분류→대응→포렌식→악성코드→CTI→자동화→보고).
  순서 일부 다름. 매핑은 의미 매칭 + secops cross-course 보강.

mappings:
  - week: 1
    lecture: {course: course5-soc, title: "SOC 개론"}
    labs:
      - {course: soc, week: 1, version: nonai, role: primary, note: "SOC 구축 기초"}
      - {course: soc, week: 1, version: ai, role: primary}

  - week: 2
    lecture: {course: course5-soc, title: "로그 이해 (1) — 시스템 로그"}
    labs:
      - {course: soc, week: 3, version: nonai, role: primary, note: "로그 수집 — rsyslog/Wazuh 파이프라인"}
      - {course: soc, week: 2, version: nonai, role: bonus, note: "SIEM 기초"}

  - week: 3
    lecture: {course: course5-soc, title: "로그 이해 (2) — 네트워크/웹 로그"}
    labs:
      - {course: soc, week: 3, version: nonai, role: primary, note: "로그 수집 — 다양한 로그 소스"}
      - {course: soc, week: 4, version: nonai, role: primary, note: "이벤트 분석 — Wazuh 알림"}

  - week: 4
    lecture: {course: course5-soc, title: "Wazuh 관제 환경"}
    labs:
      - {course: soc, week: 2, version: nonai, role: primary, note: "SIEM 기초 — Wazuh 매니저 운용"}
      - {course: soc, week: 4, version: nonai, role: primary, note: "이벤트 분석"}
      - {course: secops, week: 9, version: nonai, role: bonus, note: "Wazuh 설치·구성 (운영 측 깊이)"}

  - week: 5
    lecture: {course: course5-soc, title: "경보 분석 (1) — 기초"}
    labs:
      - {course: soc, week: 4, version: nonai, role: primary, note: "이벤트 분석 — 경보 해석"}
      - {course: soc, week: 7, version: nonai, role: primary, note: "인시던트 분류"}

  - week: 6
    lecture: {course: course5-soc, title: "경보 분석 (2) — ATT&CK 매핑"}
    labs:
      - {course: soc, week: 5, version: nonai, role: primary, note: "상관분석 — 다중 소스 ATT&CK 매핑"}
      - {course: soc, week: 6, version: nonai, role: primary, note: "위협 탐지 룰 — ATT&CK 시그니처"}
    case_study:
      title: "5 incident 의 ATT&CK 매핑 실측 (Initial Access → Exfiltration)"
      narrative: |
        Precinct 6 의 2024-08 cluster 5건이 단일 캠페인의 다른 단계:
        (1) HTA 피싱 T1566.001 (2) AS-REP roasting T1558.004
        (3) SMB 측면이동 T1021.002 (4) cron persistence T1053.003
        (5) DNS 터널링 T1071.004. ATT&CK 매트릭스 위 *시점·tactic 별*
        분포로 시각화 가능. Initial Access → Persistence → Lateral →
        Credential Access → Exfiltration 순서.
      mitre: ["T1566.001", "T1558.004", "T1021.002", "T1053.003", "T1071.004"]
      anchor_id: anc-cbdabf2e6c87
      relevance: "ATT&CK 매핑 강의의 *실측 데이터*. 학생이 5건을 받아서
                 직접 매트릭스에 배치하는 실습. KG 의 anchor 5개 직접 조회."
      source: "Precinct 6 incident-2024-08-001~005"

  - week: 7
    lecture: {course: course5-soc, title: "SIGMA 룰 작성"}
    labs:
      - {course: soc, week: 6, version: nonai, role: primary, note: "Wazuh 커스텀 룰 + Suricata 시그니처"}
      - {course: secops, week: 10, version: nonai, role: bonus, note: "Wazuh 탐지 룰 (운영 관점)"}
      - {course: soc, week: 6, version: ai, role: primary}

  - week: 8
    lecture: {course: course5-soc, title: "중간고사 — 로그 + ATT&CK"}
    labs:
      - {course: soc, week: 5, version: nonai, role: primary, note: "상관분석 — 중간고사 직전 종합 점검"}
      - {course: soc, week: 6, version: nonai, role: review}
      - {course: soc, week: 4, version: nonai, role: review}

  - week: 9
    lecture: {course: course5-soc, title: "인시던트 대응 절차"}
    labs:
      - {course: soc, week: 8, version: nonai, role: primary, note: "대응 절차 — 인시던트 억제·차단"}
      - {course: soc, week: 7, version: nonai, role: primary, note: "인시던트 분류 — 우선순위·체계"}
    case_study:
      title: "AS-REP roasting 1차 IR — krbtgt 노출 후 6단계"
      narrative: |
        2024-08-15 11:02 win-dc01 에서 PreAuthFlag=False 계정 3건의 AS-REP 응답이
        외부 IP 198.51.100.42 로 유출. 1차 IR: (1) 해당 계정 즉시 비밀번호
        강제 변경 (2) krbtgt 2회 회전 (TGT 무효) (3) DC log 의 4768 event 분석
        (4) 외부 IP 차단 (5) 자격 사용 흔적 hunting (6) Wazuh 룰 추가.
        SLA: 1시간 내 (1)~(2), 4시간 내 (3)~(5), 24h 내 (6).
      mitre: ["T1558.004"]
      anchor_id: anc-7c9fb0248f47
      relevance: "IR 절차 강의의 *진짜 IR* 사례. 6단계 NIST IR 가 실제로 어떻게
                 적용되는지 시간 SLA 와 함께 학습."
      source: "Precinct 6 incident-2024-08-002"

  - week: 10
    lecture: {course: course5-soc, title: "IR 실습 (1) — 웹 공격"}
    labs:
      - {course: soc, week: 8, version: nonai, role: primary, note: "대응 절차 — 웹 공격 차단"}
      - {course: soc, week: 9, version: nonai, role: bonus, note: "포렌식 기초 — 웹 공격 흔적"}
      - {course: web-vuln, week: 2, version: nonai, role: bonus, note: "SQLi 실습 — 공격 측 이해"}

  - week: 11
    lecture: {course: course5-soc, title: "IR 실습 (2) — 악성코드"}
    labs:
      - {course: soc, week: 10, version: nonai, role: primary, note: "악성코드 분석 — 정적 + 행위"}
      - {course: soc, week: 9, version: nonai, role: primary, note: "포렌식 — 악성코드 아티팩트"}
    case_study:
      title: "fileless cron downloader — 악성코드 행위 분석"
      narrative: |
        디스크 페이로드 부재 → 정적 분석 어려움. *행위* 분석에 의존:
        (1) cron entry 의 URL pattern (203.0.113.42 외부 IP)
        (2) curl ... | bash 패턴 (LOLBin)
        (3) 5분 주기 (반복적 outbound)
        (4) 메모리 페이로드 strings — Volatility3 + yara_scan.
        학생이 strings|grep 로 페이로드 indicator 추출 + Yara 룰 작성.
      mitre: ["T1053.003", "T1105"]
      anchor_id: anc-bf23b0106fe4
      relevance: "악성코드 분석 강의의 *fileless 사례*. 정적 vs 행위 분석 구분 학습."
      source: "Precinct 6 incident-2024-08-005"

  - week: 12
    lecture: {course: course5-soc, title: "IR 실습 (3) — 내부 위협"}
    labs:
      - {course: soc, week: 9, version: nonai, role: primary, note: "포렌식 — 내부자 행위 추적"}
      - {course: soc, week: 8, version: nonai, role: primary, note: "대응 절차 — 내부 차단"}

  - week: 13
    lecture: {course: course5-soc, title: "CTI 활용"}
    labs:
      - {course: soc, week: 11, version: nonai, role: primary, note: "위협 인텔리전스 — IoC 매칭"}
      - {course: secops, week: 13, version: nonai, role: bonus, note: "OpenCTI 위협 인텔 활용 (운영)"}
      - {course: soc, week: 11, version: ai, role: primary}
    case_study:
      title: "Precinct 6 hot IoC top-N 와 자기 환경 매칭"
      narrative: |
        Bastion KG 의 Precinct 6 hot IoC 4,363건 (sanitized IP-6CRED-* 형식 280k회
        빈도 1위 외) 을 자기 환경의 access.log / syslog / netflow 와 매칭.
        IoC 가 단 1건이라도 매칭되면 *유사 캠페인 가능성* alert. 학생은 자기
        실습 인프라에서 매칭 결과 0/N 확인 + 매칭 시 후속 조치 (격리 + 1차 IR).
      mitre: ["T1041", "T1071.004", "T1078"]
      anchor_id: anc-a0364e702393
      relevance: "CTI 강의의 *실측 데이터셋*. 가짜 IoC list 대신 진짜 incident 의
                 sanitized IoC 활용. Bastion CLI 로 KG 직접 조회 실습."
      source: "Precinct 6 — hot IoC anchor 4,363건"

  - week: 14
    lecture: {course: course5-soc, title: "자동화 관제 — Bastion Agent Daemon"}
    labs:
      - {course: soc, week: 12, version: nonai, role: primary, note: "자동화 대응 — Active Response/스크립트"}
      - {course: soc, week: 14, version: nonai, role: bonus, note: "레드팀 연동 — 자동화 검증"}
      - {course: soc, week: 12, version: ai, role: primary, note: "AI 모드 자동화 관제"}
    case_study:
      title: "5 anchor chain — Bastion 자동화 시 cycle 단축"
      narrative: |
        2024-08 5건 incident 가 사람만 대응 시 평균 4시간/건 = 20시간 총.
        Bastion daemon (P14 lab session 흐름 + Wazuh AR + SOAR 플레이북) 적용 시:
        (1) syscheck → 5분 자동 alert (2) 자동 격리 → 1분 (3) IR 보고서 자동 생성 → 10분.
        총 1시간 미만/건. *5x 속도* 달성. 사람 개입 = 격리 승인 + 종합 검토만.
      mitre: ["T1566.001", "T1558.004", "T1021.002", "T1053.003", "T1071.004"]
      anchor_id: anc-eca1db9a5a31
      relevance: "Bastion daemon 강의의 *Human vs Agent 속도* 측정 데이터."
      source: "Precinct 6 5 incident + 가정 SLA"

  - week: 15
    lecture: {course: course5-soc, title: "기말 — 종합 IR 훈련"}
    labs:
      - {course: soc, week: 15, version: nonai, role: primary, note: "종합 관제 — 실시간 모니터링"}
      - {course: soc, week: 13, version: nonai, role: primary, note: "보고서 작성 — IR 결과"}
      - {course: soc, week: 15, version: ai, role: primary}
