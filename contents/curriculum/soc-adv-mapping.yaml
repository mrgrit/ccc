    labs:
      - {course: soc-adv, week: 5, version: nonai, role: primary, note: "CTI 수집·활용"}
      - {course: secops, week: 13, version: nonai, role: bonus, note: "OpenCTI 운영 (cross)"}
  - week: 6
    lecture: {course: course14-soc-advanced, title: "위협 헌팅 심화"}
    labs:
      - {course: soc-adv, week: 6, version: nonai, role: primary, note: "위협 헌팅 능동 탐지"}
    case_study:
      title: "5건 chain 헌팅 — 시간 분리된 동일 캠페인 발견"
      narrative: |
        Precinct 6 의 2024-08 5 incident 가 *시간상 분리* 되어 보임 (12일/15일/18일/22일/25일).
        각각 단독 alert 시 sub-critical 이지만, 위협 헌팅으로 ns.evil.example /
        198.51.100.42 / john.doe 공통 IoC 묶으면 단일 캠페인 식별. SIGMA correlation
        룰로 30일 윈도우 헌팅 가능.
      mitre: ["T1566.001", "T1558.004", "T1021.002", "T1053.003", "T1071.004"]
      anchor_id: anc-eca1db9a5a31
      relevance: "위협 헌팅 강의의 *진짜 캠페인 분해* 사례. 학생이 5 anchor 받아 직접 시간선·공통 IoC 매핑."
      source: "Precinct 6 incident-2024-08-001~005"
  - week: 7
    lecture: {course: course14-soc-advanced, title: "네트워크 포렌식"}
    labs:
      - {course: soc-adv, week: 7, version: nonai, role: primary, note: "네트워크 포렌식 — PCAP 분석"}
    case_study:
      title: "DNS 터널링 PCAP 분석 — 1,247 base32 쿼리"
      narrative: |
        sanitized PCAP: 10.20.30.80 → ns.evil.example UDP/53. Wireshark
        통계 → DNS Query Length 분포가 정상 (8~15자) 대비 비정상 (40~60자)
        피크. tshark `dns.qry.name` 추출 후 base32 디코드 시 평문 회수 가능
        (sanitized).
      mitre: ["T1071.004"]
      anchor_id: anc-3564198ef1bc
      relevance: "네트워크 포렌식의 *실측 PCAP 케이스*. dns/length 통계 활용 학습."
      source: "Precinct 6 incident-2024-08-003"
  - week: 8
    lecture: {course: course14-soc-advanced, title: "메모리 포렌식"}
    labs:
      - {course: soc-adv, week: 8, version: nonai, role: primary, note: "메모리 포렌식 — 휘발성"}
    case_study:
      title: "fileless cron downloader — 메모리 forensic 만 유효"
      narrative: |
        2024-08-25 침해 호스트의 cron 5분 주기로 페이로드 다운로드+실행. 디스크
        파일 X. Volatility3 `linux.pslist` + `linux.proc.maps` 로 의심 프로세스의
        메모리 영역 dump → strings + yara 로 페이로드 식별. /etc/cron.d/ 의 entry
        는 단서지만 *실제 페이로드*는 메모리에만.
      mitre: ["T1053.003", "T1105"]
      anchor_id: anc-bf23b0106fe4
      relevance: "메모리 포렌식 강의의 *fileless 실측*. 디스크에 없는 페이로드 복원 기법."
      source: "Precinct 6 incident-2024-08-005"
