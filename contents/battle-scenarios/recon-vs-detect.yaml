id: "recon-vs-detect"
title: "정찰 vs 탐지"
description: "공격자는 대상 네트워크를 스캔하고, 방어자는 스캔을 탐지하고 차단한다."
difficulty: "easy"
time_limit: 1800
battle_type: "1v1"

red_missions:
  - order: 1
    instruction: "대상 네트워크(10.20.30.0/24)에서 활성 호스트를 스캔하라"
    hint: "nmap -sn 옵션 활용"
    points: 10
    verify:
      type: "output_contains"
      expect: "Host is up"
  - order: 2
    instruction: "발견된 호스트의 열린 포트를 확인하라"
    hint: "nmap -sS 또는 -sV 옵션"
    points: 15
    verify:
      type: "output_contains"
      expect: "open"
  - order: 3
    instruction: "서비스 버전을 열거하라"
    hint: "nmap -sV"
    points: 15
    verify:
      type: "output_contains"
      expect: "VERSION"
  - order: 4
    instruction: "OS 핑거프린팅을 수행하라"
    hint: "nmap -O"
    points: 20
    verify:
      type: "output_contains"
      expect: "OS"
  - order: 5
    instruction: "취약점 스크립트 스캔을 실행하라"
    hint: "nmap --script vuln"
    points: 20
    verify:
      type: "output_contains"
      expect: "VULNERABLE"

blue_missions:
  - order: 1
    instruction: "Suricata 로그에서 스캔 시도를 탐지하라"
    hint: "cat /var/log/suricata/fast.log | grep SCAN"
    points: 15
    verify:
      type: "output_contains"
      expect: "SCAN"
  - order: 2
    instruction: "공격자의 IP 주소를 식별하라"
    hint: "Suricata 또는 auth.log에서 출발지 IP 확인"
    points: 15
    verify:
      type: "output_contains"
      expect: "10.20.30"
  - order: 3
    instruction: "nftables에서 공격자 IP를 차단하라"
    hint: "nft add rule inet filter input ip saddr <IP> drop"
    points: 25
    verify:
      type: "output_contains"
      expect: "drop"
  - order: 4
    instruction: "차단 후 추가 스캔 시도가 없는지 확인하라"
    hint: "tail -f /var/log/suricata/fast.log"
    points: 15
    verify:
      type: "output_contains"
      expect: "blocked"
  - order: 5
    instruction: "탐지 보고서를 작성하라 (타임라인 포함)"
    hint: "탐지 시간, 공격 유형, 대응 조치를 정리"
    points: 10
    verify:
      type: "output_contains"
      expect: "report"
