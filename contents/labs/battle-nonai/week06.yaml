lab_id: "battle-nonai-week06"
title: "방화벽 구축 — nftables 방어"
version: "non-ai"
course: "battle-nonai"
week: 6
description: "nftables를 이용하여 방화벽 규칙을 구성하고, 포트 차단, 로깅 설정, 규칙 검증까지 방어 인프라 구축의 전 과정을 학습한다."
difficulty: "medium"
duration_minutes: 90
objectives:
  - "nftables 테이블과 체인 구조를 이해하고 생성할 수 있다"
  - "특정 포트와 IP를 차단하는 규칙을 작성할 수 있다"
  - "방화벽 로깅을 설정하고 차단 이벤트를 확인할 수 있다"
prerequisites:
  - "TCP/IP 네트워크 기초"
  - "리눅스 시스템 관리 기본"
infra_requirements:
  - "attacker VM (스캐닝 도구)"
  - "defender VM (nftables 설치)"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "nftables에서 filter 테이블과 input/output/forward 체인을 생성하라. 기본 정책은 drop으로 설정하라."
    hint: "nft add table inet filter, nft add chain inet filter input '{ type filter hook input priority 0; policy drop; }' 형태로 생성한다."
    category: "defense"
    points: 15
    verify:
      type: "output_contains"
      expect: "table inet filter"
      field: "stdout"

  - order: 2
    instruction: "SSH(22), HTTP(80), HTTPS(443) 포트만 허용하고 나머지 인바운드 트래픽을 차단하는 규칙을 추가하라."
    hint: "nft add rule inet filter input tcp dport {22, 80, 443} accept 형태로 허용 규칙을 추가한다. established/related 상태도 허용해야 한다."
    category: "defense"
    points: 15
    verify:
      type: "output_contains"
      expect: "accept"
      field: "stdout"

  - order: 3
    instruction: "차단된 패킷을 로깅하는 규칙을 추가하라. 로그 prefix를 'NFT-DROP: '으로 설정하라."
    hint: "nft add rule inet filter input log prefix 'NFT-DROP: ' drop 형태로 로깅 후 드롭 규칙을 추가한다."
    category: "defense"
    points: 15
    verify:
      type: "output_contains"
      expect: "NFT-DROP"
      field: "stdout"

  - order: 4
    instruction: "attacker VM에서 차단된 포트로 접속을 시도하고, defender VM에서 로그를 확인하여 차단이 정상 동작하는지 검증하라."
    hint: "공격자: nmap -p 23,25,3306 대상IP, 방어자: dmesg | grep NFT-DROP 또는 journalctl -k | grep NFT-DROP"
    category: "defense"
    points: 15
    verify:
      type: "output_contains"
      expect: "NFT-DROP"
      field: "stdout"

  - order: 5
    instruction: "현재 적용된 nftables 규칙셋 전체를 nftables_rules.conf 파일로 백업하라."
    hint: "nft list ruleset > nftables_rules.conf 명령으로 전체 규칙을 저장한다."
    category: "defense"
    points: 10
    verify:
      type: "file_exists"
      expect: "nftables_rules.conf"
      field: "filesystem"
