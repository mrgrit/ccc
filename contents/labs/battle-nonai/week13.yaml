lab_id: "battle-nonai-week13"
title: "팀 공방전 — Red vs Blue"
version: "non-ai"
course: "battle-nonai"
week: 13
description: "팀 단위 공방전을 수행한다. Red Team은 협업하여 다각도 공격을 수행하고, Blue Team은 협업하여 방어 및 탐지를 수행한다. 팀 내 역할 분담과 실시간 커뮤니케이션이 핵심이다."
difficulty: "hard"
duration_minutes: 90
objectives:
  - "팀 단위 공격/방어 협업을 수행할 수 있다"
  - "역할 분담과 실시간 커뮤니케이션을 실천할 수 있다"
  - "다각도 공격과 체계적 방어를 경험할 수 있다"
prerequisites:
  - "Week 11-12 1v1 공방전 완료"
  - "팀 구성 완료 (Red 3-4명, Blue 3-4명)"
infra_requirements:
  - "Red Team VM 2-3대 (각 팀원용)"
  - "Blue Team 서버 1-2대 (방어 대상)"
  - "팀 커뮤니케이션 채널"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "[Red Team] 팀 내 역할을 분담하라 (정찰 담당, 익스플로잇 담당, 후속 침투 담당). 공격 계획서를 작성하고 팀원과 공유하라."
    hint: "역할 예시: 1명 정찰 + 취약점 분석, 1명 웹 공격, 1명 시스템 공격. 공격 순서와 타이밍을 사전 합의한다."
    category: "recon"
    points: 10
    verify:
      type: "output_contains"
      expect: "plan"
      field: "stdout"

  - order: 2
    instruction: "[Blue Team] 방어 역할을 분담하라 (모니터링 담당, 대응 담당, 기록 담당). 모니터링 대시보드를 구성하고 대응 절차를 확인하라."
    hint: "1명 Suricata/로그 모니터링, 1명 즉시 차단/대응, 1명 이벤트 기록 및 보고. tmux로 다중 모니터링 환경을 구성한다."
    category: "defense"
    points: 10
    verify:
      type: "output_contains"
      expect: "monitor"
      field: "stdout"

  - order: 3
    instruction: "[Red Team] 계획에 따라 동시다발적 공격을 개시하라. 정찰, 웹 공격, 시스템 공격을 병렬로 수행하라."
    hint: "각 팀원이 담당 영역에서 동시에 공격을 시작한다. 한 명이 주의를 끄는 동안 다른 경로로 침투를 시도한다."
    category: "exploit"
    points: 20
    verify:
      type: "output_contains"
      expect: "scan"
      field: "stdout"

  - order: 4
    instruction: "[Blue Team] Red Team의 공격을 탐지하고 체계적으로 대응하라. 탐지된 이벤트를 팀 내 공유하고, 우선순위에 따라 차단/격리하라."
    hint: "모니터링 담당이 이벤트를 알리면, 대응 담당이 차단하고, 기록 담당이 로그를 남긴다. 팀 채팅으로 실시간 소통한다."
    category: "response"
    points: 20
    verify:
      type: "output_contains"
      expect: "blocked"
      field: "stdout"

  - order: 5
    instruction: "공방전 종료 후 Red/Blue 양 팀이 합동 타임라인을 구성하라. 각 이벤트의 공격자 의도와 방어자 대응을 매칭하여 team_battle.txt에 기록하라."
    hint: "시간 | Red 행동 | Blue 탐지/대응 | 결과 형식으로 양측 이벤트를 매칭한다."
    category: "analysis"
    points: 15
    verify:
      type: "file_exists"
      expect: "team_battle.txt"
      field: "filesystem"
