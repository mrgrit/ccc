lab_id: battle-nonai-week01
title: 정찰(Reconnaissance) 기초 — 네트워크 및 호스트 정보 수집
version: non-ai
course: battle-nonai
week: 1
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 대상 네트워크와 호스트 정보를 체계적으로 수집하고,
  Blue Phase에서 정찰 행위를 탐지하고 분석한다.
difficulty: easy
duration_minutes: 120
objectives:
- Passive 및 Active 정찰 기법의 차이를 이해한다
- nmap을 활용한 네트워크/포트 스캐닝을 수행한다
- Blue 관점에서 정찰 행위를 탐지하고 로그를 분석한다
prerequisites:
- Linux 기본 명령어 사용
- TCP/IP 네트워크 기초
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 자신의 attacker VM에서 IP 주소와 네트워크 인터페이스 정보를 확인하라.'
  hint: ip 또는 ifconfig 명령어를 사용한다.
  category: recon
  points: 5
  answer: ip addr show
  answer_detail: ip addr show 명령은 모든 네트워크 인터페이스의 IP 주소, MAC 주소, 상태 정보를 출력한다. 10.20.30.201이
    할당되어 있는지 확인한다.
  verify:
    type: output_contains
    expect: 'inet '
    field: stdout
    semantic:
      intent: '[RED] IP 인터페이스 — ip addr show. 자기 IP(10.20.30.201) 확인. Red/Blue 시작점.
        ARP cache + 라우팅도 함께.'
      success_criteria:
      - ip addr show
      - inet 키워드
      - IP 주소 표시
      acceptable_methods:
      - ip addr
      - ifconfig
      - nmcli dev show
      negative_signs:
      - ip addr 없음
      - 인터페이스 미확인
      - 단순 hostname
  target_vm: attacker
- order: 2
  instruction: '[RED] 10.20.30.0/24 대역에서 살아있는 호스트를 Ping Sweep으로 탐색하라.'
  hint: nmap의 -sn 옵션을 사용한다.
  category: recon
  points: 10
  answer: nmap -sn -T4 --max-retries 1 --host-timeout 15s 10.20.30.0/24
  answer_detail: nmap -sn은 포트 스캔 없이 호스트 발견만 수행하는 Ping Sweep이다. 10.20.30.1(secu), 10.20.30.80(web),
    10.20.30.100(siem) 등이 발견되어야 한다.
  verify:
    type: output_contains
    expect: Host is up
    field: stdout
    semantic:
      intent: '[RED] Ping Sweep — nmap -sn -T4 10.20.30.0/24. 포트 스캔 없이 호스트 발견. 1(secu)/80(web)/100(siem)
        발견. MITRE T1018. PTES Intelligence Gathering.'
      success_criteria:
      - nmap -sn
      - Host is up 키워드
      - /24 대역 스캔
      acceptable_methods:
      - nmap -sn
      - fping -a -g
      - arp-scan -l
      negative_signs:
      - -sn 없음
      - 단일 IP
      - ping sweep 맥락 없음
  target_vm: attacker
- order: 3
  instruction: '[RED] web 서버({{WEB_IP}})에 대해 주요 포트 스캔을 수행하라.'
  hint: nmap --top-ports 옵션으로 주요 포트를 스캔한다.
  category: recon
  points: 10
  answer: nmap -sV -T4 --top-ports 100 --max-retries 1 --host-timeout 15s 10.20.30.80
  answer_detail: --top-ports 100은 가장 흔한 100개 포트를 스캔한다. 22(SSH), 80(Apache), 3000(JuiceShop),
    8080(DVWA) 등이 열려 있어야 한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: '[RED] Top 100 포트 스캔 — nmap -sV -T4 --top-ports 100 10.20.30.80. 가장
        흔한 100개 포트. 22/80/3000/8080 열림 확인. MITRE T1046.'
      success_criteria:
      - nmap --top-ports 100
      - open 키워드
      - web 서버 타겟
      acceptable_methods:
      - nmap --top-ports
      - nmap -p-
      - rustscan + nmap
      negative_signs:
      - 포트 지정 없음
      - 단순 ping
      - 서비스 탐지 누락
  target_vm: attacker
- order: 4
  instruction: '[RED] web 서버의 열린 포트에 대해 서비스 버전 탐지를 수행하라.'
  hint: nmap -sV 옵션을 사용한다.
  category: recon
  points: 10
  answer: nmap -sV -p 22,80,3000,8080 -T4 --max-retries 1 --host-timeout 15s 10.20.30.80
  answer_detail: -sV 옵션은 각 열린 포트에 프로브를 보내 서비스 이름과 버전을 식별한다. Apache, Node.js(JuiceShop)
    등이 식별되어야 한다.
  verify:
    type: output_contains
    expect: VERSION
    field: stdout
    semantic:
      intent: '[RED] 서비스 버전 — nmap -sV -p 22,80,3000,8080 -T4. -sV = 각 포트 프로브 → 서비스명/버전
        식별. Apache/Node.js 확인 → CVE 매칭. MITRE T1592.002.'
      success_criteria:
      - nmap -sV
      - VERSION 키워드
      - 지정 포트 명시
      acceptable_methods:
      - nmap -sV
      - amap -A
      - ncat 배너 그래빙
      negative_signs:
      - -sV 없음
      - 단순 포트 확인
      - 버전 미식별
  target_vm: attacker
- order: 5
  instruction: '[RED] nmap NSE 스크립트를 사용하여 web 서버의 HTTP 서비스 정보를 열거하라.'
  hint: http-enum, http-headers 스크립트를 사용한다.
  category: recon
  points: 10
  answer: nmap --script http-enum,http-headers -p 80,3000,8080 -T4 --max-retries 1
    --host-timeout 15s 10.20.30.80
  answer_detail: http-enum 스크립트는 웹 서버에서 알려진 경로(admin, backup 등)를 탐색한다. http-headers는
    응답 헤더를 수집하여 서버 정보를 식별한다.
  verify:
    type: output_contains
    expect: http
    field: stdout
    semantic:
      intent: '[RED] NSE 스크립트 — nmap --script http-enum,http-headers -p 80,3000,8080.
        http-enum 알려진 경로 탐색 + http-headers 응답 헤더 수집. 웹 심화 정찰. MITRE T1595.'
      success_criteria:
      - --script http-enum
      - http 키워드
      - 다중 포트 스크립트
      acceptable_methods:
      - nmap NSE http-*
      - nikto -h
      - dirb/dirsearch
      negative_signs:
      - NSE 스크립트 없음
      - 단순 nmap
      - http 열거 맥락 없음
  target_vm: attacker
- order: 6
  instruction: '[RED] curl로 web 서버의 각 서비스(80, 3000, 8080) 응답 헤더를 수집하라.'
  hint: curl -sI로 HTTP 헤더를 확인한다.
  category: recon
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo ''=== Port 80 ==='' && curl -sI http://10.20.30.80/ | head -5
    && echo ''=== Port 3000 (JuiceShop) ==='' && curl -sI http://10.20.30.80:3000/
    | head -5 && echo ''=== Port 8080 (DVWA) ==='' && curl -sI http://10.20.30.80:8080/
    | head -5'
  answer_detail: HTTP 응답 헤더의 Server, X-Powered-By 등에서 웹서버 종류, 프레임워크, 보안 설정을 파악할 수
    있다. 포트별로 다른 서비스가 동작하므로 각각 확인해야 한다.
  verify:
    type: output_contains
    expect: Server
    field: stdout
    semantic:
      intent: '[RED] curl 응답 헤더 — curl -sI × 포트 80/3000/8080. Server/X-Powered-By
        = 웹서버/프레임워크 식별. 포트별 다른 서비스. MITRE T1592.'
      success_criteria:
      - Server 키워드
      - 3 포트 curl -sI
      - 응답 헤더 분석
      acceptable_methods:
      - curl -sI × 3 포트
      - httpx 자동
      - wappalyzer CLI
      negative_signs:
      - 포트 1개
      - 헤더 미확인
      - 기술 스택 맥락 없음
  target_vm: attacker
- order: 7
  instruction: '[BLUE] Suricata에서 방금 발생한 정찰(스캔) 알림을 확인하라.'
  hint: fast.log 또는 eve.json에서 경보를 확인한다.
  category: defense
  points: 10
  answer: tail -30 /var/log/suricata/fast.log | head -20
  answer_detail: Suricata fast.log는 한 줄짜리 간단한 경보 형식이다. nmap 스캔이 탐지되면 SCAN 관련 시그니처가
    트리거된다. 소스 IP(10.20.30.201)를 확인한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] Suricata fast.log — tail -30 /var/log/suricata/fast.log. nmap
        스캔 트리거 SCAN 시그니처. 소스 IP 10.20.30.201 확인. NIDS 탐지.'
      success_criteria:
      - fast.log tail
      - 10.20.30 키워드 (IP 기반)
      - Suricata 알림
      acceptable_methods:
      - tail fast.log
      - Dashboard Suricata filter
      - evebox view
      negative_signs:
      - fast.log 미확인
      - IP 분석 없음
      - 단순 ls
  target_vm: secu
- order: 8
  instruction: '[BLUE] Suricata eve.json에서 경보를 분석하여 공격자 IP별 알림 건수를 집계하라.


    [FIXTURE] /home/ccc/cyber-range/fixtures/battle-nonai-week01/8/eve.json 사전 주입.
    `jq -c ''.alert'' /home/ccc/cyber-range/fixtures/battle-nonai-week01/8/eve.json`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: jq로 JSON을 파싱한다.
  category: defense
  points: 10
  answer: cat /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert") | .src_ip'
    2>/dev/null | sort | uniq -c | sort -rn | head -5
  answer_detail: eve.json은 JSON Lines 형식이다. event_type이 alert인 이벤트를 필터링하고, src_ip를
    추출하여 집계한다. 10.20.30.201에서 가장 많은 경보가 발생해야 한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] jq eve.json — jq -r ''select(.event_type=="alert") | .src_ip''
        | sort | uniq -c | sort -rn. alert 이벤트 + src_ip 추출 → IP별 집계. 10.20.30.201
        top talker. JSON 로그 분석.'
      success_criteria:
      - jq + select event_type alert
      - 10.20.30 출력
      - src_ip 집계
      acceptable_methods:
      - jq alert filter
      - Python json 분석
      - splunk/ELK 집계
      negative_signs:
      - jq 없음
      - 집계 없음
      - src_ip 미추출
  target_vm: secu
  fixtures:
  - generator: suricata_alert
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/battle-nonai-week01/8/eve.json
    params:
      seed: 42
      duration_days: 7
      alerts_per_day: 30
      c2_beacon_count: 12
      metadata_attempt_count: 4
    mode: overwrite
    cleanup: false
- order: 9
  instruction: '[BLUE] Wazuh에서 정찰 관련 이벤트를 확인하라.'
  hint: wazuh alerts 로그를 확인한다.
  category: defense
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): sudo cat /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -20
    | jq -r ''.rule.description'' 2>/dev/null | head -10 || echo ''Wazuh alerts check
    complete'''
  answer_detail: Wazuh는 호스트 기반 IDS로 파일 변경, 인증 실패, 정책 위반 등을 탐지한다. Suricata(네트워크)와 Wazuh(호스트)를
    병행하면 더 넓은 가시성을 확보한다.
  verify:
    type: output_contains
    expect:
    - complete
    - description
    field: stdout
    semantic:
      intent: '[BLUE] Wazuh 알림 — cat /var/ossec/logs/alerts/alerts.json | jq -r .rule.description.
        Wazuh HIDS (파일 변경/인증 실패/정책 위반). Suricata NIDS + Wazuh HIDS 병행 = 가시성 확장.'
      success_criteria:
      - complete 키워드 또는 Wazuh alert
      - alerts.json + jq
      - rule.description
      acceptable_methods:
      - jq rule.description
      - Dashboard Security Events
      - Wazuh API
      negative_signs:
      - Wazuh 미확인
      - HIDS 맥락 없음
      - 단순 cat
  target_vm: siem
- order: 10
  instruction: '[RED] 수집한 정찰 결과를 nmap XML 형식으로 저장하여 후속 분석에 활용할 수 있도록 하라.'
  hint: nmap -oX 옵션으로 XML 출력한다.
  category: recon
  points: 10
  answer: nmap -sV -T4 --max-retries 1 --host-timeout 15s -oX /tmp/recon_week01.xml
    10.20.30.80
  answer_detail: -oX 옵션은 결과를 XML 형식으로 저장한다. XML 출력은 다른 도구에서 import할 수 있으며, 자동화 파이프라인에서
    파싱하기 용이하다.
  verify:
    type: file_exists
    expect: /tmp/recon_week01.xml
    field: filesystem
    semantic:
      intent: '[RED] XML 저장 — nmap -sV -oX /tmp/recon_week01.xml 10.20.30.80. XML
        출력 = 다른 도구 import 가능 (Metasploit/DefectDojo). 자동화 파이프라인 파싱 용이. PTES 산출물.'
      success_criteria:
      - /tmp/recon_week01.xml 파일 생성
      - nmap -oX
      - file_exists 검증
      acceptable_methods:
      - nmap -oX
      - nmap -oA (all formats)
      - msf db_import
      negative_signs:
      - -oX 없음
      - 저장 실패
      - 자동화 맥락 없음
  target_vm: attacker
