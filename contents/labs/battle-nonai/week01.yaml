lab_id: "battle-nonai-week01"
title: "정찰 기초 — 네트워크 스캐닝"
version: "non-ai"
course: "battle-nonai"
week: 1
description: "네트워크 정찰의 기본 기법을 학습한다. Ping sweep로 활성 호스트를 발견하고, Nmap을 이용한 포트 스캔, 서비스 열거, OS 핑거프린팅까지 단계적으로 수행한다."
difficulty: "easy"
duration_minutes: 90
objectives:
  - "Ping sweep를 이용하여 대상 네트워크의 활성 호스트를 식별할 수 있다"
  - "Nmap 포트 스캔 옵션을 이해하고 적용할 수 있다"
  - "서비스 버전 및 OS 정보를 수집할 수 있다"
prerequisites:
  - "리눅스 CLI 기본 사용법"
  - "TCP/IP 네트워크 기초 이해"
infra_requirements:
  - "attacker VM (Kali Linux 또는 동등)"
  - "defender VM (대상 서버)"
  - "동일 네트워크 세그먼트"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "대상 네트워크(예: 10.20.30.0/24)에 대해 ping sweep를 수행하여 활성 호스트를 발견하라."
    hint: "nmap -sn 옵션을 사용하면 ping sweep를 수행할 수 있다. 또는 fping -a -g 명령도 활용 가능하다."
    category: "recon"
    points: 10
    verify:
      type: "output_contains"
      expect: "Host is up"
      field: "stdout"

  - order: 2
    instruction: "발견된 호스트 중 하나를 선택하여 TCP SYN 스캔으로 열린 포트를 확인하라."
    hint: "nmap -sS 옵션이 TCP SYN 스캔이다. 주요 포트(1-1024)를 먼저 스캔해보라."
    category: "recon"
    points: 15
    verify:
      type: "output_contains"
      expect: "open"
      field: "stdout"

  - order: 3
    instruction: "열린 포트에서 실행 중인 서비스의 버전 정보를 열거하라."
    hint: "nmap -sV 옵션을 사용하면 서비스 버전을 탐지할 수 있다."
    category: "recon"
    points: 15
    verify:
      type: "output_contains"
      expect: "VERSION"
      field: "stdout"

  - order: 4
    instruction: "대상 호스트의 운영체제를 핑거프린팅하라."
    hint: "nmap -O 옵션으로 OS 탐지를 수행한다. root 권한이 필요할 수 있다."
    category: "recon"
    points: 15
    verify:
      type: "output_contains"
      expect: "OS details"
      field: "stdout"

  - order: 5
    instruction: "스캔 결과 전체를 XML 파일로 저장하라."
    hint: "nmap -oX scan_result.xml 옵션으로 XML 형식 출력이 가능하다."
    category: "recon"
    points: 10
    verify:
      type: "file_exists"
      expect: "scan_result.xml"
      field: "filesystem"
