lab_id: battle-nonai-week09
title: 사고 대응(Incident Response) — 탐지부터 복구까지 + Red 지속성 확보
version: non-ai
course: battle-nonai
week: 9
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Blue Phase에서 NIST 사고 대응 프레임워크를 실습하고,
  Red Phase에서 탐지를 회피하며 지속성을 확보하는 기법을 시도한다.
difficulty: medium
duration_minutes: 120
objectives:
- NIST 사고 대응 6단계를 실제 시나리오에 적용한다
- 포렌식 증거를 올바르게 수집하고 보존한다
- Red 관점에서 지속성 확보와 탐지 회피를 시도한다
prerequisites:
- Week 6-8 방어 실습 완료
- Linux 시스템 관리
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] web 서버의 현재 상태를 초기 파악하라. 실행 중인 프로세스, 네트워크 연결, 로그인 사용자를 확인하라.'
  hint: ps, ss, who 명령을 사용한다.
  category: response
  points: 10
  answer: who && echo '---' && ps auxf --sort=-%cpu | head -20 && echo '---' && ss
    -tunapl | grep ESTAB
  answer_detail: 사고 대응의 첫 단계는 현재 상태 파악이다. who로 활성 세션, ps로 의심 프로세스, ss로 네트워크 연결을 확인한다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: '[BLUE] 초기 상태 파악 — who + ps auxf --sort=-%cpu + ss -tunapl | ESTAB.
        IR 첫 단계. 활성 세션 + 의심 프로세스 + 네트워크. NIST SP 800-61 Preparation.'
      source_criteria:
      - '--- 키워드 (구분자)'
      - who + ps + ss 3종
      - IR 초기 파악
      success_criteria:
      - '--- 키워드 (구분자)'
      - who + ps + ss 3종
      - IR 초기 파악
      acceptable_methods:
      - who + ps + ss
      - w + top + netstat
      - IR 플레이북
      negative_signs:
      - 단일 명령
      - 파악 맥락 없음
      - IR 단계 누락
  target_vm: web
- order: 2
  instruction: '[BLUE] 휘발성 증거를 수집하라. 프로세스 목록, 네트워크 상태, 라우팅 테이블을 저장하라.'
  hint: 각 명령의 출력을 /tmp/forensics/ 디렉토리에 저장한다.
  category: response
  points: 10
  answer: mkdir -p /tmp/forensics && date > /tmp/forensics/timestamp.txt && ps auxf
    ※ /tmp/forensics/processes.txt && ss -tunapl > /tmp/forensics/network.txt && ip
    route > /tmp/forensics/routes.txt && ls -la /tmp/forensics/
  answer_detail: 휘발성 증거는 시스템 재부팅 시 사라진다. RFC 3227의 증거 수집 순서를 따라 메모리, 네트워크, 프로세스, 디스크
    순으로 수집한다.
  verify:
    type: file_exists
    expect: /tmp/forensics/processes.txt
    field: filesystem
    semantic:
      intent: '[BLUE] 휘발성 증거 수집 — mkdir /tmp/forensics + ps auxf + ss -tunapl + ip
        route + date > timestamp. RFC 3227 증거 수집 순서 (메모리→네트워크→프로세스→디스크). 재부팅 시 손실.'
      success_criteria:
      - /tmp/forensics/processes.txt 파일
      - mkdir + ps/ss/ip route 저장
      - file_exists 검증
      acceptable_methods:
      - ps + ss + ip route 저장
      - LiME 메모리 덤프
      - winpmem (Win)
      negative_signs:
      - 저장 없음
      - 타임스탬프 누락
      - RFC 3227 맥락 없음
  target_vm: web
- order: 3
  instruction: '[RED] web 서버에 접근하여 은밀한 백도어(SSH 키)를 설치하라.'
  hint: authorized_keys에 공개키를 추가한다.
  category: exploit
  points: 10
  answer: ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '' -q 2>/dev/null && cat /tmp/backdoor_key.pub
    && echo '=== SSH key backdoor prepared ==='
  answer_detail: SSH 공개키를 authorized_keys에 추가하면 패스워드 없이 접근 가능한 백도어가 된다. ed25519는 현대적이고
    짧은 키로 탐지가 어렵다.
  verify:
    type: output_contains
    expect:
    - SSH key backdoor prepared
    - ed25519
    field: stdout
    semantic:
      intent: '[RED] SSH 백도어 준비 — ssh-keygen -t ed25519 -f /tmp/backdoor_key -N ''''
        + .pub 출력. authorized_keys 추가 후 패스워드 없는 접근. ed25519 = 현대적/짧은 키 → 탐지 어려움. MITRE
        T1098.004.'
      success_criteria:
      - SSH key backdoor prepared 키워드
      - ssh-keygen -t ed25519 -N ''
      - public key 출력
      acceptable_methods:
      - ssh-keygen ed25519
      - ssh-keygen -t rsa
      - ssh-copy-id
      negative_signs:
      - -t 없음
      - passphrase 있음
      - 백도어 맥락 없음
  target_vm: attacker
- order: 4
  instruction: '[BLUE] SSH 키 기반 백도어를 확인하라. authorized_keys 파일에 비인가 키가 있는지 검사한다.'
  hint: 모든 사용자의 .ssh/authorized_keys를 확인한다.
  category: response
  points: 10
  answer: find /home -name 'authorized_keys' -exec echo '=== {} ===' \; -exec cat
    {} \; 2>/dev/null && echo '=== /root ===' && cat /root/.ssh/authorized_keys 2>/dev/null
    && echo 'SSH key audit complete'
  answer_detail: authorized_keys에 공격자의 공개키가 추가되면 패스워드 없이 SSH 접근이 가능하다. 알 수 없는 키는 제거해야
    한다.
  verify:
    type: output_contains
    expect:
    - SSH key audit complete
    - authorized_keys
    field: stdout
    semantic:
      intent: '[BLUE] SSH 키 감사 — find /home -name authorized_keys + cat /root/.ssh/authorized_keys.
        비인가 키 확인. 모든 사용자 검사. 제거 필수. NIST IR Eradication.'
      success_criteria:
      - SSH key audit complete 또는 authorized_keys 키워드
      - find 다중 사용자
      - 모든 사용자 검사
      acceptable_methods:
      - find + cat
      - AIDE FIM 알림
      - osquery users.authorized_keys
      negative_signs:
      - 단일 사용자
      - 키 내용 미확인
      - 제거 맥락 없음
  target_vm: web
- order: 5
  instruction: '[BLUE] 악성 cron job과 백도어 사용자 계정을 검사하라.'
  hint: 모든 사용자의 crontab과 UID 0 계정을 확인한다.
  category: response
  points: 10
  answer: 'awk -F: ''$3 == 0 {print}'' /etc/passwd && echo ''--- crontab ---'' &&
    cat /etc/crontab && echo ''--- cron.d ---'' && ls -la /etc/cron.d/ 2>/dev/null'
  answer_detail: UID 0인 계정이 root 외에 있으면 백도어이다. crontab에 비정상적인 스크립트 실행이 있으면 지속성 기법이다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: '[BLUE] UID 0 계정 + cron — awk -F: ''$3==0'' /etc/passwd + cat /etc/crontab
        + ls /etc/cron.d/. root 외 UID 0 = 백도어 계정 / cron 비정상 = 지속성. MITRE T1136 + T1053.003.'
      success_criteria:
      - root 키워드
      - UID 0 필터 + cron 점검
      - 다중 확인
      acceptable_methods:
      - awk + cat
      - getent passwd + id
      - Wazuh rootcheck
      negative_signs:
      - UID 필터 없음
      - cron 누락
      - 백도어 맥락 없음
  target_vm: web
- order: 6
  instruction: '[BLUE] web 서버에서 웹셸을 검색하라. system(), exec() 등 위험 함수를 포함한 파일을 찾는다.'
  hint: grep으로 위험 함수를 재귀 검색한다.
  category: response
  points: 10
  answer: grep -rl 'system\|exec\|passthru\|shell_exec\|eval' /var/www/ 2>/dev/null
    | head -10 && echo 'Webshell scan complete'
  answer_detail: 웹셸은 system(), exec() 등의 함수를 포함한다. 발견 시 해시를 기록하고 격리한 후 제거한다.
  verify:
    type: output_contains
    expect: Webshell scan complete
    field: stdout
    semantic:
      intent: '[BLUE] 웹셸 검색 — grep -rl ''system|exec|passthru|shell_exec|eval'' /var/www/.
        위험 함수 포함 파일. 해시 기록 + 격리 + 제거. MITRE T1505.003 Web Shell.'
      success_criteria:
      - Webshell scan complete 키워드
      - grep 위험 함수 + /var/www
      - 재귀 검색
      acceptable_methods:
      - grep -rl
      - WebShellKiller
      - yara 룰 스캔
      negative_signs:
      - grep 없음
      - 단일 함수
      - 웹셸 맥락 없음
  target_vm: web
- order: 7
  instruction: '[BLUE] secu VM에서 공격자 IP({{ATTACKER_IP}})를 네트워크에서 격리하라.'
  hint: nftables로 공격자 IP의 모든 트래픽을 차단한다.
  category: response
  points: 10
  answer: sudo nft insert rule inet filter input ip saddr 10.20.30.201 drop && sudo
    nft insert rule inet filter forward ip saddr 10.20.30.201 drop && nft list ruleset
    | grep '10.20.30.201' && echo 'Attacker isolated'
  answer_detail: 네트워크 격리는 추가 피해 확산과 데이터 유출을 방지하는 핵심 조치이다. input과 forward 모두에서 차단해야
    완전한 격리가 된다.
  verify:
    type: output_contains
    expect:
    - Attacker isolated
    - nft
    field: stdout
    semantic:
      intent: '[BLUE] 네트워크 격리 — nft insert rule inet filter input ip saddr 10.20.30.201
        drop + forward drop. input + forward 둘 다. 추가 피해 확산 방지. NIST IR Containment.'
      success_criteria:
      - Attacker isolated 키워드
      - input + forward 양쪽
      - 10.20.30.201 drop
      acceptable_methods:
      - nft insert rule
      - iptables -I
      - ufw deny from
      negative_signs:
      - input만
      - insert 누락
      - 격리 맥락 없음
  target_vm: secu
  requires_approval: true
- order: 8
  instruction: '[BLUE] 방화벽을 강화하고, 모든 사용자 패스워드를 강제 변경하라.'
  hint: chage -d 0으로 다음 로그인 시 변경을 강제한다.
  category: response
  points: 10
  answer: 'echo ''Password reset required for all accounts'' && cat /etc/passwd |
    awk -F: ''$3 >= 1000 {print $1}'' | head -10 && echo ''Recovery actions documented'''
  answer_detail: 침해 사고 후 모든 계정의 패스워드를 변경하는 것은 필수이다. chage -d 0은 다음 로그인 시 변경을 강제한다.
  verify:
    type: output_contains
    expect: Recovery actions documented
    field: stdout
    semantic:
      intent: '[BLUE] 패스워드 강제 변경 — awk -F: ''$3>=1000 {print $1}'' /etc/passwd + chage
        -d 0. 일반 사용자(UID 1000+) 대상. 다음 로그인 시 강제 변경. NIST IR Recovery.'
      success_criteria:
      - Recovery actions documented 키워드
      - UID 1000+ 필터
      - 강제 변경 의도
      acceptable_methods:
      - awk + chage -d 0
      - passwd -e 사용자
      - LDAP 강제 리셋
      negative_signs:
      - UID 필터 없음
      - chage 누락
      - 강제 변경 맥락 없음
  target_vm: web
- order: 9
  instruction: '[BLUE] Wazuh SIEM에서 사고 관련 종합 이벤트를 수집하라.'
  hint: wazuh alerts에서 높은 심각도 이벤트를 추출한다.
  category: response
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): sudo cat /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -30
    | jq -r ''select(.rule.level >= 8) | "[\(.rule.level)] \(.rule.description) src:\(.data.srcip
    // "local")"'' 2>/dev/null | tail -10 || echo ''SIEM incident data collected'''
  answer_detail: Wazuh에서 높은 심각도(level 8+) 이벤트를 수집하면 사고의 핵심 이벤트를 빠르게 파악할 수 있다.
  verify:
    type: output_contains
    expect: collected
    field: stdout
    semantic:
      intent: '[BLUE] Wazuh 종합 이벤트 — jq ''select(.rule.level>=8)'' alerts.json + tail.
        level 8+ = 핵심 사고 이벤트. 공격 타임라인 구성. 사고 분석 기초. NIST IR Post-Incident.'
      success_criteria:
      - collected 키워드
      - rule.level 8+ 필터
      - SIEM 이벤트
      acceptable_methods:
      - jq level 필터
      - Dashboard Security Events
      - Wazuh API filter
      negative_signs:
      - level 필터 없음
      - 단순 cat
      - 종합 이벤트 맥락 없음
  target_vm: siem
- order: 10
  instruction: '[BLUE] 사고 대응 전체 과정을 종합하여 Incident Response 보고서를 작성하라.'
  hint: NIST 6단계에 맞춰 작성한다.
  category: analysis
  points: 15
  answer: 'cat > /tmp/incident_response_report.txt << ''EOF''

    === Incident Response Report ===

    Incident ID: IR-2026-001

    Severity: High


    1. PREPARATION

    - IDS deployed (Suricata on secu 10.20.30.1)

    - Firewall configured (nftables)

    - SIEM active (Wazuh on 10.20.30.100)


    2. DETECTION

    - Suricata: SYN scan + SQL Injection alerts

    - auth.log: SSH brute force from 10.20.30.201

    - Apache log: SQL/XSS payloads


    3. CONTAINMENT

    - Attacker IP 10.20.30.201 blocked at nftables

    - Compromised sessions terminated


    4. ERADICATION

    - Webshell scan: checked /var/www/

    - SSH keys audited

    - Cron jobs reviewed


    5. RECOVERY

    - Password reset forced

    - Firewall hardened

    - Services verified


    6. LESSONS LEARNED

    - Need: Faster detection response time

    - Need: Automated IP blocking

    - Need: Regular vulnerability patching

    EOF

    cat /tmp/incident_response_report.txt'
  answer_detail: 사고 대응 보고서는 NIST 6단계 프레임워크에 따라 작성한다. 기술적 상세, 타임라인, 대응 조치, 교훈을 포함한다.
  verify:
    type: output_contains
    expect:
    - Incident Response Report
    - 보고서
    field: stdout
    semantic:
      intent: '[BLUE] IR 보고서 — echo > /tmp/incident_response_report.txt: NIST 6단계
        (PREPARATION + DETECTION + CONTAINMENT + ERADICATION + RECOVERY + LESSONS).
        Incident ID + Severity. 사고 기록 표준. NIST SP 800-61.'
      success_criteria:
      - Incident Response Report 키워드
      - NIST 6단계
      - Incident ID + Severity
      acceptable_methods:
      - NIST SP 800-61 6단계
      - SANS 6 Steps
      - ISO 27035 IR
      negative_signs:
      - 단계 3개 이하
      - NIST 준수 없음
      - Incident ID 누락
  target_vm: secu
