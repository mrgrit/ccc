lab_id: "battle-nonai-week14"
title: "종합 공방전 — Full Scenario"
version: "non-ai"
course: "battle-nonai"
week: 14
description: "다단계 공격 시나리오(정찰 -> 침투 -> 권한 상승 -> 데이터 유출)에 대응하는 종합 공방전을 수행한다. 공격자는 전 과정을 실행하고, 방어자는 각 단계를 탐지하고 차단한다."
difficulty: "hard"
duration_minutes: 90
objectives:
  - "다단계 공격 시나리오를 전체적으로 수행할 수 있다"
  - "각 공격 단계를 탐지하고 적시에 대응할 수 있다"
  - "공격 킬체인(Kill Chain) 관점에서 공방을 분석할 수 있다"
prerequisites:
  - "Week 01-13 전체 과정 완료"
  - "공격 킬체인 개념 이해"
infra_requirements:
  - "attacker VM (전체 공격 도구)"
  - "defender VM (전체 방어 체계 구축)"
  - "플래그 파일 (/root/flag.txt) 배치"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "[공격자] Phase 1 - 정찰: 대상 네트워크를 스캐닝하여 공격 대상과 취약 서비스를 식별하라. [방어자] 정찰 활동을 탐지하라."
    hint: "공격자: 은밀한 스캔 기법 활용. 방어자: Suricata 알림과 네트워크 로그 모니터링."
    category: "recon"
    points: 15
    verify:
      type: "output_contains"
      expect: "open"
      field: "stdout"

  - order: 2
    instruction: "[공격자] Phase 2 - 초기 침투: 발견된 취약점을 이용하여 시스템에 접근하라. [방어자] 침투 시도를 탐지하고 차단하라."
    hint: "공격자: 웹 취약점, 약한 패스워드 등을 활용. 방어자: WAF 로그, auth.log 모니터링."
    category: "exploit"
    points: 20
    verify:
      type: "output_contains"
      expect: "access"
      field: "stdout"

  - order: 3
    instruction: "[공격자] Phase 3 - 권한 상승: 일반 사용자에서 root 권한을 획득하라. [방어자] 비정상 권한 변경을 탐지하라."
    hint: "공격자: SUID, sudo 오류, 커널 취약점 활용. 방어자: auditd 또는 /var/log/auth.log에서 su/sudo 이벤트 감시."
    category: "exploit"
    points: 20
    verify:
      type: "output_contains"
      expect: "root"
      field: "stdout"

  - order: 4
    instruction: "[공격자] Phase 4 - 데이터 유출: /root/flag.txt 파일의 내용을 외부로 추출하라. [방어자] 데이터 유출 시도를 탐지하고 차단하라."
    hint: "공격자: nc, curl, DNS 터널링 등. 방어자: outbound 트래픽 모니터링, 비정상 DNS 쿼리 감시."
    category: "exploit"
    points: 20
    verify:
      type: "output_contains"
      expect: "flag"
      field: "stdout"

  - order: 5
    instruction: "공방전 전체를 킬체인(Reconnaissance → Weaponization → Delivery → Exploitation → Installation → C2 → Actions) 프레임워크로 분석하여 full_battle.txt에 작성하라."
    hint: "각 킬체인 단계별로 공격 행위, 방어 탐지/대응, 성공/실패 여부를 매핑한다."
    category: "analysis"
    points: 15
    verify:
      type: "file_exists"
      expect: "full_battle.txt"
      field: "filesystem"
