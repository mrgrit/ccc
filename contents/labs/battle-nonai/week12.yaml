lab_id: "battle-nonai-week12"
title: "1v1 공방전 실전 (2) — 침투 vs 방어"
version: "non-ai"
course: "battle-nonai"
week: 12
description: "1대1 공방전의 두 번째 실전이다. 공격자는 취약점을 이용하여 침투를 시도하고, 방어자는 실시간으로 침입을 탐지하고 대응한다."
difficulty: "hard"
duration_minutes: 90
objectives:
  - "공격자로서 취약점을 이용한 침투를 수행할 수 있다"
  - "방어자로서 침투 시도를 실시간 탐지하고 대응할 수 있다"
  - "공격과 방어의 시간 경쟁을 체험할 수 있다"
prerequisites:
  - "Week 03-05 공격 기법"
  - "Week 09 인시던트 대응"
  - "Week 11 1v1 공방전 (1) 완료"
infra_requirements:
  - "attacker VM (Metasploit 또는 수동 익스플로잇 도구)"
  - "defender VM (의도적 취약 서비스 1-2개 + 모니터링)"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "[공격자] 방어자 시스템의 열린 서비스에서 취약점을 발견하고, 익스플로잇을 시도하라."
    hint: "Week 02에서 학습한 취약점 스캐닝으로 대상을 파악한 뒤, 해당 취약점에 맞는 공격을 수행한다. 수동으로 curl, netcat 등을 활용하라."
    category: "exploit"
    points: 20
    verify:
      type: "output_contains"
      expect: "connected"
      field: "stdout"

  - order: 2
    instruction: "[방어자] Suricata 알림, auth.log, 웹 서버 로그를 동시 모니터링하여 침투 시도를 실시간 탐지하라."
    hint: "tmux를 활용하여 여러 로그를 동시에 모니터링한다. tail -f /var/log/suricata/fast.log, tail -f /var/log/auth.log 등."
    category: "defense"
    points: 15
    verify:
      type: "output_contains"
      expect: "alert"
      field: "stdout"

  - order: 3
    instruction: "[방어자] 침투 시도가 탐지되면 즉시 대응하라: 공격 IP 차단, 취약 서비스 긴급 패치 또는 중단, 세션 강제 종료."
    hint: "nftables로 IP 차단, systemctl stop으로 취약 서비스 중단, pkill로 의심 세션 종료."
    category: "response"
    points: 20
    verify:
      type: "output_contains"
      expect: "drop"
      field: "stdout"

  - order: 4
    instruction: "[공격자] 방어 조치를 확인하고 공격 결과를 기록하라. 성공/실패 여부, 사용한 기법, 발견한 취약점을 정리하라."
    hint: "공격 시도별로 시간, 기법, 결과(성공/차단/실패)를 기록한다."
    category: "analysis"
    points: 10
    verify:
      type: "output_contains"
      expect: "attack"
      field: "stdout"

  - order: 5
    instruction: "공방전 결과를 양측 관점에서 battle_round2.txt에 작성하라. 침투 성공까지 소요 시간, 탐지까지 소요 시간(MTTD), 대응까지 소요 시간(MTTR)을 포함하라."
    hint: "MTTD(Mean Time to Detect), MTTR(Mean Time to Respond) 지표를 계산하여 포함한다."
    category: "analysis"
    points: 10
    verify:
      type: "file_exists"
      expect: "battle_round2.txt"
      field: "filesystem"
