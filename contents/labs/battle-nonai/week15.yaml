lab_id: "battle-nonai-week15"
title: "공방전 결과 분석 + 보고서"
version: "non-ai"
course: "battle-nonai"
week: 15
description: "전체 공방전 과정을 돌아보며 로그를 분석하고, 통계를 집계하고, 교훈을 정리한다. 최종 보고서를 작성하여 학기 전체 학습 성과를 종합한다."
difficulty: "medium"
duration_minutes: 90
objectives:
  - "공방전 로그를 체계적으로 분석할 수 있다"
  - "공격/방어 통계를 집계하고 시각화할 수 있다"
  - "교훈(Lessons Learned)을 도출할 수 있다"
  - "전문적인 보안 보고서를 작성할 수 있다"
prerequisites:
  - "Week 11-14 공방전 실전 완료"
  - "각 주차 결과 파일 보유"
infra_requirements:
  - "분석 VM (로그 파일, 이전 주차 결과 파일)"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "Week 11-14 공방전의 모든 Suricata 알림 로그를 수집하고, 공격 유형별 발생 빈도를 집계하라."
    hint: "eve.json 파일에서 alert 이벤트를 jq로 필터링하고 signature별 count를 집계한다. sort | uniq -c | sort -rn 패턴을 활용한다."
    category: "analysis"
    points: 15
    verify:
      type: "output_regex"
      expect: "\\d+\\s+.+"
      field: "stdout"

  - order: 2
    instruction: "공방전 전체 통계를 산출하라: 총 공격 시도 수, 탐지 성공률, 차단 성공률, 평균 MTTD, 평균 MTTR."
    hint: "이전 주차의 battle_round*.txt, team_battle.txt, full_battle.txt에서 데이터를 추출하여 계산한다."
    category: "analysis"
    points: 20
    verify:
      type: "output_contains"
      expect: "MTTD"
      field: "stdout"

  - order: 3
    instruction: "공격 기법별 성공/실패 비율을 분석하고, 가장 효과적이었던 공격 기법과 가장 취약했던 방어 영역을 식별하라."
    hint: "각 기법(스캐닝, SQLi, 브루트포스, 권한상승 등)별로 시도/성공/차단 횟수를 정리한다."
    category: "analysis"
    points: 15
    verify:
      type: "output_contains"
      expect: "success"
      field: "stdout"

  - order: 4
    instruction: "교훈(Lessons Learned)을 도출하라: 잘된 점, 개선 필요 점, 향후 적용할 방어 전략을 최소 5개 이상 기술하라."
    hint: "각 공방전 라운드에서 얻은 교훈을 카테고리(기술적, 절차적, 조직적)별로 정리한다."
    category: "analysis"
    points: 10
    verify:
      type: "output_contains"
      expect: "lesson"
      field: "stdout"

  - order: 5
    instruction: "최종 보고서를 final_report.md 파일로 작성하라. 다음 섹션을 포함하라: 1) 개요, 2) 인프라 구성, 3) 주차별 요약, 4) 통계 분석, 5) 교훈, 6) 개선 권고."
    hint: "Markdown 형식으로 전문적인 보고서를 작성한다. 표, 목록, 제목을 활용하여 가독성을 높인다."
    category: "analysis"
    points: 20
    verify:
      type: "file_exists"
      expect: "final_report.md"
      field: "filesystem"
