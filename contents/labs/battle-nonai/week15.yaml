lab_id: battle-nonai-week15
title: 공방전 분석 및 최종 보고서 작성
version: non-ai
course: battle-nonai
week: 15
description: 전체 15주 과정을 회고하고, 공방전 결과를 종합 분석하여 최종 보고서를 작성한다. 개인 성장, 팀 성과, 기술 역량, 그리고 향후 학습 로드맵을 포함하는 포트폴리오 문서를 완성한다.
difficulty: medium
duration_minutes: 120
objectives:
- 전체 공방전 결과를 정량적/정성적으로 분석한다
- 개인 및 팀의 보안 역량 성장을 평가한다
- 전문 수준의 최종 보고서를 작성한다
prerequisites:
- Week 1-14 전체 과정 이수
infra_requirements:
- 분석용 워크스테이션
- 전체 과정 로그/보고서 아카이브
pass_threshold: 0.6
steps:
- order: 1
  instruction: 전체 15주 과정에서 수집한 모든 보고서와 증거 파일을 정리하라.
  hint: /tmp/ 디렉토리의 모든 보고서를 한 곳에 모은다.
  category: analysis
  points: 10
  answer: mkdir -p /tmp/final_portfolio && cp /tmp/*report*.txt /tmp/*timeline*.txt /tmp/*matrix*.txt /tmp/*playbook*.txt /tmp/final_portfolio/ 2>/dev/null && ls -la /tmp/final_portfolio/
  answer_detail: 포트폴리오 구성을 위해 전체 과정의 산출물을 한 곳에 모은다. 각 주차의 보고서, 공격 증거, 방어 로그, 분석 결과를 체계적으로 분류한다.
  verify:
    type: output_contains
    expect: final_portfolio
    field: stdout
  target_vm: attacker
- order: 2
  instruction: 주차별 학습 내용과 핵심 성과를 요약하라.
  hint: 각 주차의 주제와 달성 사항을 한 줄로 정리한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/final_portfolio/weekly_summary.txt << ''EOF''

    === Weekly Summary ===

    Week 1: Reconnaissance - nmap, DNS, SNMP 정찰 기법 습득

    Week 2: Vulnerability Scanning - CVE 분석, 취약점 우선순위화

    Week 3: Web Attacks - SQLi, XSS, File Upload, CSRF 실습

    Week 4: Password Attacks - Hash cracking, Brute force, Spray

    Week 5: Privilege Escalation - SUID, sudo, kernel exploit

    Week 6: Firewall - nftables 구축, Rate Limiting, IP set

    Week 7: IDS/IPS - Suricata 룰 작성, 탐지 검증

    Week 8: Log Analysis - 위협 헌팅, 타임라인 재구성

    Week 9: Incident Response - NIST 6단계 실습

    Week 10: Battle Prep - 환경 구축, 전략 수립

    Week 11: Battle 1v1 R1 - 첫 실전 공방

    Week 12: Battle 1v1 R2 - 강화된 공방

    Week 13: Battle 3v3 - 팀 대항전

    Week 14: APT Simulation - 종합 시나리오

    Week 15: Analysis & Report - 최종 분석

    EOF

    cat /tmp/final_portfolio/weekly_summary.txt'
  answer_detail: 주차별 요약은 과정 전체의 흐름을 한눈에 파악하게 한다. 공격(1-5주), 방어(6-9주), 공방전(10-14주)의 3단계 커리큘럼 구조를 반영한다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/weekly_summary.txt
    field: filesystem
  target_vm: attacker
- order: 3
  instruction: 공방전(Week 11-14) 결과를 정량적으로 분석하라. 라운드별 점수 추이를 정리한다.
  hint: 각 라운드의 공격/방어 점수를 표로 정리한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/final_portfolio/battle_stats.txt << ''EOF''

    === Battle Statistics ===


    | Round | Red Score | Blue Score | Flags | Uptime | Detection |

    |-------|-----------|------------|-------|--------|-----------|

    | R1    | 85        | 78         | 2/3   | 95%    | 80%       |

    | R2    | 72        | 90         | 1/3   | 97%    | 87%       |

    | Team  | 125       | 135        | 3/4   | 96%    | 83%       |

    | APT   | 155       | 140        | 4/5   | 94%    | 78%       |


    Trends:

    - Blue Team detection rate improved 80% → 87% (R1→R2)

    - Red Team adapted to hardened defenses

    - Team collaboration improved with practice

    - APT scenario revealed gaps in lateral movement detection

    EOF

    cat /tmp/final_portfolio/battle_stats.txt'
  answer_detail: 정량적 분석은 객관적인 성과 평가의 기초이다. 점수 추이, 탐지율 변화, 서비스 가용성 등을 시계열로 분석하면 성장과 약점이 명확히 드러난다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/battle_stats.txt
    field: filesystem
  target_vm: attacker
- order: 4
  instruction: 공격 기술 역량을 자가 평가하라. 각 기술 영역별 숙련도를 점수화한다.
  hint: 1(초급)~5(고급)으로 자가 평가한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/final_portfolio/red_skill_assessment.txt << ''EOF''

    === Red Team Skill Assessment ===


    | Skill Area          | Before | After | Growth |

    |---------------------|--------|-------|--------|

    | Network Recon       | 2      | 4     | +2     |

    | Vulnerability Scan  | 1      | 4     | +3     |

    | Web Exploitation    | 1      | 4     | +3     |

    | Password Attacks    | 1      | 3     | +2     |

    | Privilege Escalation| 1      | 3     | +2     |

    | Post-Exploitation   | 0      | 3     | +3     |

    | Lateral Movement    | 0      | 2     | +2     |

    | C2 & Persistence    | 0      | 2     | +2     |

    | Report Writing      | 2      | 4     | +2     |


    Average Growth: +2.3 levels

    EOF

    cat /tmp/final_portfolio/red_skill_assessment.txt'
  answer_detail: 자가 평가는 개인 성장을 객관적으로 측정하고, 향후 학습 방향을 결정하는 데 활용된다. 수치화된 평가가 있어야 개선 목표를 설정할 수 있다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/red_skill_assessment.txt
    field: filesystem
  target_vm: attacker
- order: 5
  instruction: 방어 기술 역량을 자가 평가하라.
  hint: 동일한 1~5 척도를 사용한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/final_portfolio/blue_skill_assessment.txt << ''EOF''

    === Blue Team Skill Assessment ===


    | Skill Area          | Before | After | Growth |

    |---------------------|--------|-------|--------|

    | Firewall Config     | 1      | 4     | +3     |

    | IDS/IPS Management  | 0      | 3     | +3     |

    | Log Analysis        | 1      | 4     | +3     |

    | Incident Response   | 0      | 3     | +3     |

    | Threat Hunting      | 0      | 3     | +3     |

    | System Hardening    | 1      | 4     | +3     |

    | Forensics           | 0      | 2     | +2     |

    | WAF Deployment      | 0      | 3     | +3     |

    | Documentation       | 2      | 4     | +2     |


    Average Growth: +2.8 levels

    EOF

    cat /tmp/final_portfolio/blue_skill_assessment.txt'
  answer_detail: 방어 기술 평가는 공격 기술 평가와 함께 양 방향의 보안 역량을 종합적으로 보여준다. Purple Team 역량(공격+방어)이 현대 보안 전문가의 핵심 역량이다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/blue_skill_assessment.txt
    field: filesystem
  target_vm: attacker
- order: 6
  instruction: 과정에서 사용한 도구와 기술의 인벤토리를 작성하라.
  hint: 공격/방어 도구를 분류하여 정리한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/final_portfolio/tool_inventory.txt << ''EOF''

    === Tool & Technology Inventory ===


    [Reconnaissance]

    nmap, dig, whois, enum4linux, snmpwalk, whatweb


    [Vulnerability Scanning]

    nikto, searchsploit, nmap NSE scripts


    [Exploitation]

    sqlmap, Metasploit, Hydra, John the Ripper, Hashcat

    msfvenom, netcat, curl


    [Defense]

    nftables, Suricata IDS/IPS, ModSecurity WAF

    fail2ban, auditd, AIDE


    [Analysis]

    jq, awk, grep, tcpdump, Wireshark


    [Automation]

    bash scripting, tmux, cron


    [Frameworks]

    MITRE ATT&CK, OWASP Top 10, NIST IR, Cyber Kill Chain

    EOF

    cat /tmp/final_portfolio/tool_inventory.txt'
  answer_detail: 도구 인벤토리는 개인의 기술 스택을 증명하는 문서이다. 이력서와 면접에서 활용할 수 있으며, 각 도구의 숙련도를 함께 기재하면 더 효과적이다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/tool_inventory.txt
    field: filesystem
  target_vm: attacker
- order: 7
  instruction: 공방전에서 가장 효과적이었던 공격 기법 Top 5를 분석하라.
  hint: 성공률, 영향도, 은밀성을 기준으로 평가한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/final_portfolio/top5_attacks.txt << 'EOF'\n=== Top 5 Most Effective Attack Techniques ===\n\n1. SQL Injection (Week 3, 11, 14)\n   Success rate: 90% | Impact: Critical | Stealth: Low\n\
    \   Key: Most web apps still vulnerable to SQLi\n\n2. Default Credentials (Week 4, 11)\n   Success rate: 70% | Impact: High | Stealth: Low\n   Key: Quick win, often overlooked by defenders\n\n3. SUID\
    \ Privilege Escalation (Week 5, 11)\n   Success rate: 60% | Impact: Critical | Stealth: Medium\n   Key: Common misconfiguration in Linux systems\n\n4. Attack Chaining (Week 12, 14)\n   Success rate:\
    \ 50% | Impact: Critical | Stealth: High\n   Key: Combining low-risk vulns for critical impact\n\n5. SSH Key Persistence (Week 12, 14)\n   Success rate: 80% | Impact: High | Stealth: High\n   Key: Survives\
    \ password resets and service restarts\nEOF\ncat /tmp/final_portfolio/top5_attacks.txt"
  answer_detail: 공격 기법의 효과 분석은 방어 우선순위를 결정하는 데 핵심적이다. 성공률이 높고 영향도가 큰 기법에 대한 방어를 우선 강화해야 한다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/top5_attacks.txt
    field: filesystem
  target_vm: attacker
- order: 8
  instruction: 공방전에서 가장 효과적이었던 방어 기법 Top 5를 분석하라.
  hint: 차단율, 비용 대비 효과, 운영 부담을 기준으로 평가한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/final_portfolio/top5_defenses.txt << 'EOF'\n=== Top 5 Most Effective Defense Techniques ===\n\n1. Default Password Change (Week 10-14)\n   Block rate: 100% brute force | Effort: Low\n\
    \   Key: Eliminates most quick wins\n\n2. Firewall Whitelist (Week 6, 10-14)\n   Block rate: 85% scan traffic | Effort: Medium\n   Key: Reduces attack surface dramatically\n\n3. IDS Real-time Monitoring\
    \ (Week 7, 11-14)\n   Detection rate: 83% | Effort: Medium\n   Key: Early detection enables rapid response\n\n4. ModSecurity WAF (Week 12-14)\n   Block rate: 75% web attacks | Effort: Medium\n   Key:\
    \ Blocks SQLi/XSS without code changes\n\n5. Automated Response Script (Week 12-14)\n   Response time: <30 seconds | Effort: High\n   Key: Faster than human response\nEOF\ncat /tmp/final_portfolio/top5_defenses.txt"
  answer_detail: 방어 기법 분석은 보안 투자의 ROI를 보여준다. 패스워드 변경 같은 저비용 고효과 조치가 1위인 것은 기본 보안의 중요성을 증명한다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/top5_defenses.txt
    field: filesystem
  target_vm: attacker
- order: 9
  instruction: 팀 협업 경험에서 얻은 교훈을 분석하라.
  hint: 커뮤니케이션, 역할 분담, 의사결정 과정을 분석한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/final_portfolio/teamwork_lessons.txt << 'EOF'\n=== Teamwork & Collaboration Lessons ===\n\n1. Clear Role Assignment\n   - Defined roles reduced confusion by 80%\n   - Overlapping responsibilities\
    \ caused delays\n\n2. Real-time Communication\n   - IRC/chat was essential for coordination\n   - Verbal updates every 15min kept team aligned\n\n3. Information Sharing\n   - Shared workspace (/tmp/shared/)\
    \ improved efficiency\n   - Real-time flag/finding updates prevented duplicate work\n\n4. Escalation Procedures\n   - Pre-defined escalation cut response time by 50%\n   - Ad-hoc decisions were slower\
    \ and error-prone\n\n5. Time Management\n   - Phase-based planning (10/30/30/50min) was effective\n   - Spending too long on one vector was costly\n\n6. Adaptability\n   - Teams that adapted mid-game\
    \ performed better\n   - Rigid plans failed when defenses changed\nEOF\ncat /tmp/final_portfolio/teamwork_lessons.txt"
  answer_detail: 팀 협업 교훈은 기술 역량만큼 중요하다. 실제 보안 운영에서 SOC, IR팀, Red팀은 모두 팀 단위로 작업하며, 커뮤니케이션과 협업이 성과를 결정한다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/teamwork_lessons.txt
    field: filesystem
  target_vm: attacker
- order: 10
  instruction: 향후 학습 로드맵을 작성하라. 약점 보완과 심화 학습 계획을 포함한다.
  hint: 3개월, 6개월, 1년 단위 목표를 설정한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/final_portfolio/learning_roadmap.txt << ''EOF''

    === Personal Learning Roadmap ===


    [3 Months]

    - OSCP preparation (HackTheBox, TryHackMe practice)

    - Advanced web exploitation (Burp Suite Pro)

    - Cloud security fundamentals (AWS/Azure)


    [6 Months]

    - Take OSCP certification exam

    - Learn Active Directory attacks/defense

    - Study malware analysis basics (RE)

    - Deploy home lab SIEM (Wazuh/ELK)


    [12 Months]

    - CRTP/CRTO certification

    - Contribute to open-source security tools

    - CTF competition participation (team)

    - Begin purple team consulting practice


    [Weak Areas to Improve]

    - Lateral movement techniques

    - C2 framework mastery (Cobalt Strike, Sliver)

    - Cloud-native security

    - Forensics and memory analysis

    - Active Directory exploitation

    EOF

    cat /tmp/final_portfolio/learning_roadmap.txt'
  answer_detail: 학습 로드맵은 지속적인 성장을 위한 계획이다. 자가 평가에서 발견한 약점을 우선적으로 보완하고, 산업 수요(클라우드, AD)에 맞는 기술을 습득한다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/learning_roadmap.txt
    field: filesystem
  target_vm: attacker
- order: 11
  instruction: MITRE ATT&CK 매트릭스 기반으로 전체 과정에서 다룬 기법을 매핑하고, 전체 포트폴리오의 목차를 생성하라.
  hint: 각 주차의 기법을 ATT&CK ID로 매핑하고, 포트폴리오 파일 구조를 문서화한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/final_portfolio/attack_coverage.txt << ''EOF''

    === MITRE ATT&CK Coverage Map ===


    Reconnaissance: T1046, T1590, T1592 (Week 1-2)

    Initial Access: T1190, T1133, T1078 (Week 3-4)

    Execution: T1059.001, T1059.004 (Week 3, 5)

    Persistence: T1053, T1098, T1136 (Week 5, 12, 14)

    Privilege Escalation: T1548, T1068 (Week 5)

    Defense Evasion: T1070, T1036 (Week 12, 14)

    Credential Access: T1110, T1003 (Week 4)

    Discovery: T1082, T1083 (Week 1, 5)

    Lateral Movement: T1021 (Week 13-14)

    Collection: T1005 (Week 14)

    Exfiltration: T1041 (Week 14)


    Tactics Covered: 11/14 (79%)

    EOF

    cat /tmp/final_portfolio/attack_coverage.txt && echo ''---'' && ls -la /tmp/final_portfolio/'
  answer_detail: ATT&CK 커버리지 맵은 과정이 다룬 공격 기법의 범위를 보여준다. 포트폴리오 디렉토리 전체를 확인하여 산출물의 완성도를 검증한다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/attack_coverage.txt
    field: filesystem
  target_vm: attacker
- order: 12
  instruction: 최종 종합 보고서를 작성하라. 경영진 요약, 기술 성과, 핵심 발견사항, 권고사항을 포함한 전문 보고서 형식으로 작성한다.
  hint: 실무 보고서 형식(Executive Summary, Findings, Recommendations)을 사용한다.
  category: analysis
  points: 15
  answer: "cat > /tmp/final_portfolio/FINAL_REPORT.txt << 'EOF'\n================================================================\n          CYBER BATTLE COURSE - FINAL ASSESSMENT REPORT\n================================================================\n\
    \nPrepared by: [Student Name]\nDate: 2026-04-06\nCourse: Cyber Battle (Non-AI), 15 Weeks\n\n================================================================\nEXECUTIVE SUMMARY\n================================================================\n\
    \nCompleted 15-week intensive cybersecurity course covering\noffensive and defensive operations. Participated in 4 live\nbattle rounds with progressive difficulty.\n\nKey Metrics:\n- Attack techniques\
    \ mastered: 25+\n- Defense techniques mastered: 20+\n- Battle participation: 4 rounds (2x1v1, 1x3v3, 1xAPT)\n- Skill growth: Average +2.5 levels (1-5 scale)\n- MITRE ATT&CK coverage: 79% of tactics\n\
    \n================================================================\nTECHNICAL ACHIEVEMENTS\n================================================================\n\nOffensive: nmap, SQLi, XSS, password cracking,\
    \ privesc\nDefensive: nftables, Suricata IDS, log analysis, IR\nCollaborative: Red/Blue team, real-time comms\n\n================================================================\nRECOMMENDATIONS\n================================================================\n\
    \n1. Deploy SIEM for centralized monitoring\n2. Implement network segmentation\n3. Establish purple team program\n4. Pursue OSCP certification within 6 months\n================================================================\n\
    EOF\ncat /tmp/final_portfolio/FINAL_REPORT.txt"
  answer_detail: 최종 보고서는 전문 보고서 형식으로 작성한다. Executive Summary, 기술 성과, 권고사항의 구조를 따르며, 정량적 데이터와 정성적 분석을 모두 포함한다.
  verify:
    type: file_exists
    expect: /tmp/final_portfolio/FINAL_REPORT.txt
    field: filesystem
  target_vm: attacker
