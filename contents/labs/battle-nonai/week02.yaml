lab_id: "battle-nonai-week02"
title: "취약점 스캐닝 — 약점 발견"
version: "non-ai"
course: "battle-nonai"
week: 2
description: "Nmap NSE 스크립트, Nikto 웹 스캐너, 배너 그래빙 등을 활용하여 대상 시스템의 취약점을 체계적으로 발견하는 방법을 학습한다."
difficulty: "easy"
duration_minutes: 90
objectives:
  - "Nmap NSE 스크립트를 활용하여 취약점을 탐지할 수 있다"
  - "Nikto를 이용한 웹 서버 취약점 스캐닝을 수행할 수 있다"
  - "배너 그래빙으로 서비스 정보를 수집할 수 있다"
prerequisites:
  - "Week 01 정찰 기초 완료"
  - "Nmap 기본 사용법 이해"
infra_requirements:
  - "attacker VM (Kali Linux 또는 동등)"
  - "defender VM (취약한 웹 서버 구동)"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "대상 호스트에 대해 Nmap의 vuln 카테고리 NSE 스크립트를 실행하여 알려진 취약점을 탐색하라."
    hint: "nmap --script vuln 옵션을 사용한다. 특정 포트를 지정하면 스캔 시간을 줄일 수 있다."
    category: "recon"
    points: 15
    verify:
      type: "output_contains"
      expect: "VULNERABLE"
      field: "stdout"

  - order: 2
    instruction: "대상 웹 서버(포트 80 또는 443)에 대해 Nikto 스캔을 수행하라."
    hint: "nikto -h http://대상IP 명령으로 실행한다. -o 옵션으로 결과를 파일에 저장할 수 있다."
    category: "recon"
    points: 15
    verify:
      type: "output_contains"
      expect: "Server:"
      field: "stdout"

  - order: 3
    instruction: "netcat 또는 telnet을 이용하여 대상 호스트의 주요 서비스(SSH, HTTP, SMTP 등)에서 배너를 수집하라."
    hint: "nc -v 대상IP 포트 또는 telnet 대상IP 포트 명령을 사용한다. HTTP의 경우 HEAD / HTTP/1.0을 전송한다."
    category: "recon"
    points: 10
    verify:
      type: "output_contains"
      expect: "SSH"
      field: "stdout"

  - order: 4
    instruction: "Nmap의 http-enum 스크립트로 웹 서버의 디렉터리와 파일을 열거하라."
    hint: "nmap --script http-enum -p 80 대상IP 명령을 사용한다."
    category: "recon"
    points: 15
    verify:
      type: "output_contains"
      expect: "http-enum"
      field: "stdout"

  - order: 5
    instruction: "발견된 취약점 정보를 정리하여 vuln_report.txt 파일로 작성하라."
    hint: "스캔 결과에서 VULNERABLE, CVE 번호, 위험 서비스를 추출하여 텍스트 파일로 정리한다."
    category: "analysis"
    points: 10
    verify:
      type: "file_exists"
      expect: "vuln_report.txt"
      field: "filesystem"
