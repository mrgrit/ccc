lab_id: battle-nonai-week02
title: 취약점 스캐닝 및 분석 — CVE 기반 공격 벡터 식별
version: non-ai
course: battle-nonai
week: 2
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 자동화 취약점 스캐너와 수동 분석으로 공격
  벡터를 식별하고, Blue Phase에서 스캐닝 행위를 탐지하고 취약점을 사전 점검한다.
difficulty: easy
duration_minutes: 120
objectives:
- 자동화 취약점 스캐너를 활용한 취약점 탐지를 수행한다
- CVE 데이터베이스에서 취약점 정보를 검색하고 분석한다
- Blue 관점에서 스캐닝을 탐지하고 취약점 노출 현황을 파악한다
prerequisites:
- Week 1 정찰 실습 완료
- nmap 기본 사용법
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] nmap의 vuln 스크립트 카테고리를 사용하여 web 서버의 알려진 취약점을 스캔하라.'
  hint: --script vuln 옵션을 사용한다.
  category: recon
  points: 10
  answer: nmap --script vuln -p 80,3000,8080 -T4 --max-retries 1 --host-timeout 30s
    10.20.30.80
  answer_detail: --script vuln은 NSE의 vuln 카테고리 스크립트를 모두 실행한다. 각 스크립트는 특정 CVE를 검사하며,
    web 서버의 Apache, JuiceShop, DVWA 취약점을 탐지한다.
  verify:
    type: output_contains
    expect: http
    field: stdout
    semantic:
      intent: '[RED] NSE vuln — nmap --script vuln -p 80,3000,8080. CVE 기반 취약점 자동
        탐지. http-vuln-* 스크립트. MITRE T1595.002.'
      success_criteria:
      - --script vuln
      - http 키워드
      - 다중 포트
      acceptable_methods:
      - nmap --script vuln
      - nuclei -t cves
      - OpenVAS
      negative_signs:
      - vuln 스크립트 없음
      - 단순 스캔
      - CVE 매핑 맥락 없음
  target_vm: attacker
- order: 2
  instruction: '[RED] Nikto를 사용하여 web 서버(80번 포트)의 웹 취약점을 스캔하라.'
  hint: nikto -h 옵션으로 대상을 지정한다.
  category: recon
  points: 10
  answer: nikto -h http://10.20.30.80/ -maxtime 60s
  answer_detail: Nikto는 웹서버 전용 취약점 스캐너이다. 위험한 파일/CGI, 오래된 서버 소프트웨어, 잘못된 설정 등 6,700개
    이상의 항목을 검사한다.
  verify:
    type: output_contains
    expect: 'Server:'
    field: stdout
    semantic:
      intent: '[RED] Nikto — nikto -h http://10.20.30.80/ -maxtime 60s. 웹서버 전용 스캐너
        (6,700+ 항목). 위험 파일/CGI/설정 오류. OWASP A05.'
      success_criteria:
      - nikto -h
      - 'Server: 키워드'
      - -maxtime 제한
      acceptable_methods:
      - nikto
      - wapiti
      - OWASP ZAP
      negative_signs:
      - nikto 없음
      - -maxtime 없음
      - 웹 스캔 맥락 없음
  target_vm: attacker
- order: 3
  instruction: '[RED] searchsploit을 사용하여 Apache 관련 알려진 익스플로잇을 검색하라.'
  hint: searchsploit 명령에 서비스명과 버전을 입력한다.
  category: recon
  points: 10
  answer: searchsploit apache 2.4
  answer_detail: searchsploit은 ExploitDB의 오프라인 검색 도구이다. 서비스명+버전으로 검색하면 해당하는 PoC 코드와
    설명을 확인할 수 있다.
  verify:
    type: output_contains
    expect: Apache
    field: stdout
    semantic:
      intent: '[RED] searchsploit — searchsploit apache 2.4. ExploitDB 오프라인 검색. 서비스+버전
        → PoC 코드/설명. PTES Vulnerability Analysis. CVE 매칭.'
      success_criteria:
      - searchsploit + 서비스/버전
      - Apache 키워드
      - exploit 검색
      acceptable_methods:
      - searchsploit
      - CVE database 검색
      - Snyk DB
      negative_signs:
      - searchsploit 없음
      - 단일 검색
      - PoC 맥락 없음
  target_vm: attacker
- order: 4
  instruction: '[RED] web 서버의 SSH 서비스 보안 설정을 nmap 스크립트로 점검하라.'
  hint: ssh-auth-methods, ssh2-enum-algos 스크립트를 사용한다.
  category: recon
  points: 10
  answer: nmap --script ssh-auth-methods,ssh2-enum-algos -p 22 -T4 --max-retries 1
    --host-timeout 15s 10.20.30.80
  answer_detail: ssh-auth-methods는 허용된 인증 방식(password, publickey 등)을, ssh2-enum-algos는
    지원하는 암호화 알고리즘을 열거한다. 약한 알고리즘이나 password 인증 허용은 취약점이다.
  verify:
    type: output_contains
    expect: ssh
    field: stdout
    semantic:
      intent: '[RED] SSH 보안 점검 — nmap --script ssh-auth-methods,ssh2-enum-algos -p
        22. 인증 방식 + 암호화 알고리즘 열거. password 인증/약한 알고리즘 = 취약. NIST SP 800-153.'
      success_criteria:
      - ssh-auth-methods + ssh2-enum-algos 스크립트
      - ssh 키워드
      - 포트 22
      acceptable_methods:
      - nmap ssh 스크립트
      - ssh-audit 자동
      - medusa ssh
      negative_signs:
      - 스크립트 1개만
      - 단순 포트 확인
      - 알고리즘 맥락 없음
  target_vm: attacker
- order: 5
  instruction: '[RED] 웹 디렉토리 브루트포스를 수행하여 DVWA(:8080)의 숨겨진 경로를 탐색하라.'
  hint: dirb 또는 gobuster 도구를 사용한다.
  category: recon
  points: 10
  answer: dirb http://10.20.30.80:8080/ /usr/share/wordlists/dirb/common.txt -r
  answer_detail: dirb는 사전 파일의 경로를 하나씩 요청하여 존재하는 디렉토리/파일을 탐색한다. -r 옵션은 재귀를 비활성화하여 속도를
    높인다.
  verify:
    type: output_contains
    expect: FOUND
    field: stdout
    semantic:
      intent: '[RED] 디렉터리 브루트 — dirb http://10.20.30.80:8080/ /usr/share/wordlists/dirb/common.txt
        -r. 사전 기반 경로 탐색. -r 재귀 비활성 속도↑. DVWA 숨은 경로 발견. MITRE T1595.002.'
      success_criteria:
      - dirb 명령
      - FOUND 키워드
      - wordlist 경로
      acceptable_methods:
      - dirb
      - gobuster dir
      - ffuf -w
      negative_signs:
      - dirb 없음
      - 단순 curl
      - wordlist 미사용
  target_vm: attacker
- order: 6
  instruction: '[BLUE] Suricata에서 취약점 스캐닝 관련 알림을 확인하라.'
  hint: fast.log에서 vuln scan 관련 경보를 검색한다.
  category: defense
  points: 10
  answer: tail -50 /var/log/suricata/fast.log | grep -iE '(scan|vuln|nikto|sql)' |
    tail -10
  answer_detail: Nikto, nmap vuln 스캔은 특징적인 패턴을 남긴다. Suricata의 ET Open 룰셋은 주요 스캐너의
    User-Agent, 요청 패턴을 탐지한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] Suricata 스캔 경보 — tail -50 fast.log | grep -iE ''(scan|vuln|nikto|sql)''.
        Nikto UA 시그니처 + nmap vuln 패턴. ET Open 룰셋 탐지. 소스 IP 추적.'
      success_criteria:
      - grep scan/vuln/nikto/sql
      - 10.20.30 키워드
      - tail 최근 경보
      acceptable_methods:
      - grep + 다중 키워드
      - jq eve.json alert
      - evebox scanner filter
      negative_signs:
      - grep 없음
      - 단순 tail
      - 스캐너 탐지 맥락 없음
  target_vm: secu
- order: 7
  instruction: '[BLUE] web 서버의 Apache access.log에서 스캐닝 흔적을 분석하라.


    [FIXTURE] /home/ccc/cyber-range/fixtures/battle-nonai-week02/7/access.log 사전 주입.
    `grep -E ''sqli|xss|\.\./|admin'' /home/ccc/cyber-range/fixtures/battle-nonai-week02/7/access.log`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: HTTP 상태 코드별 요청 건수를 집계한다.
  category: defense
  points: 10
  answer: awk '{print $9}' /var/log/apache2/access.log 2>/dev/null | sort | uniq -c
    | sort -rn | head -10
  answer_detail: 404가 대량이면 디렉토리 브루트포스, 403이 많으면 접근 차단된 경로 탐색 시도이다. 정상 트래픽 대비 비정상적인
    상태 코드 비율을 확인한다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: '[BLUE] Apache access 분석 — awk ''$9'' access.log | sort | uniq -c. 404
        대량 = 디렉터리 브루트 / 403 = 차단 경로 탐색. 상태 코드 비율 분석. WAF/IDS 보완 신호.'
      success_criteria:
      - awk $9 상태 코드
      - 200 키워드 (정상)
      - uniq -c 집계
      acceptable_methods:
      - awk + 집계
      - GoAccess
      - ModSecurity audit log
      negative_signs:
      - 상태 코드 미추출
      - 집계 없음
      - 403/404 맥락 없음
  target_vm: web
  fixtures:
  - generator: web_access
    target_vm: web
    path: /home/ccc/cyber-range/fixtures/battle-nonai-week02/7/access.log
    params:
      seed: 42
      duration_days: 7
      scanner_bursts: 5
      sqli_attempts: 12
      xss_attempts: 8
    mode: overwrite
    cleanup: false
- order: 8
  instruction: '[BLUE] secu에서 공격자 IP({{ATTACKER_IP}})의 스캔 트래픽 빈도를 확인하고, 과도한 스캔 시 nftables로
    rate limiting을 적용하라.


    [FIXTURE] /home/ccc/cyber-range/fixtures/battle-nonai-week02/8/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/battle-nonai-week02/8/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft add rule로 rate limiting을 설정한다.
  category: defense
  points: 10
  answer: sudo nft add rule inet filter input ip saddr 10.20.30.201 tcp dport 80 ct
    state new limit rate over 30/minute drop && nft list ruleset | grep '10.20.30.201'
  answer_detail: rate limiting으로 분당 30회 이상의 새 연결을 차단하면 자동화 스캐너의 효율을 크게 떨어뜨린다. 정상 접근은
    허용하면서 스캐닝만 억제한다.
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
    semantic:
      intent: '[BLUE] nftables rate limit — nft add rule inet filter input ip saddr
        10.20.30.201 tcp dport 80 ct state new limit rate over 30/minute drop. 분당
        30회 초과 드랍. 자동화 스캐너 억제. 정상 접근 허용. MITRE D3FEND.'
      success_criteria:
      - nft add rule + rate
      - 10.20.30.201 키워드
      - limit rate + drop
      acceptable_methods:
      - nft rate limit
      - iptables --limit
      - fail2ban
      negative_signs:
      - rate limit 없음
      - ip saddr 누락
      - 새 연결 제한 맥락 없음
  target_vm: secu
  requires_approval: true
  fixtures:
  - generator: firewall_log
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/battle-nonai-week02/8/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 9
  instruction: '[RED] Nikto 스캔 결과를 파일로 저장하라.'
  hint: nikto -o 옵션으로 출력 파일을 지정한다.
  category: recon
  points: 10
  answer: nikto -h http://10.20.30.80:8080/ -o /tmp/nikto_report.txt -maxtime 60s
  answer_detail: -o 옵션은 스캔 결과를 파일로 저장한다. DVWA(:8080)를 대상으로 스캔하면 알려진 취약점과 설정 오류를 발견할
    수 있다.
  verify:
    type: file_exists
    expect: /tmp/nikto_report.txt
    field: filesystem
    semantic:
      intent: '[RED] Nikto 결과 저장 — nikto -h URL -o /tmp/nikto_report.txt. DVWA(:8080)
        대상. 알려진 취약점/설정 오류 문서화. PTES Reporting. -o 파일 출력.'
      success_criteria:
      - /tmp/nikto_report.txt 파일 생성
      - nikto -o
      - file_exists 검증
      acceptable_methods:
      - nikto -o
      - nikto -Format csv
      - DefectDojo import
      negative_signs:
      - 저장 없음
      - -o 누락
      - 파일 검증 실패
  target_vm: attacker
- order: 10
  instruction: '[RED] 발견된 취약점을 종합하여 공격 계획(Attack Plan)을 문서로 작성하라.'
  hint: 정찰 결과와 취약점 분석 결과를 결합하여 작성한다.
  category: analysis
  points: 15
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): cat > /tmp/attack_plan.txt << ''EOF''

    === Attack Plan ===

    Target: 10.20.30.80 (web)


    Primary Attack Path:

    1. DVWA(:8080) SQL Injection → DB access (확률: 90%)

    2. JuiceShop(:3000) Auth Bypass → 관리자 접근 (확률: 85%)


    Secondary Attack Paths:

    3. Apache(:80) 디렉토리 탐색 → 정보 수집

    4. SSH Brute Force → Shell Access (확률: 40%)


    Defense to Bypass:

    - secu(10.20.30.1): nftables, Suricata

    - ModSecurity on web server

    EOF'
  answer_detail: 공격 계획은 발견된 취약점을 우선순위화하고, 방어 장치를 고려한 우회 전략을 포함한다. secu VM의 Suricata/nftables를
    우회하는 것이 핵심 과제이다.
  verify:
    type: file_exists
    expect: /tmp/attack_plan.txt
    field: filesystem
    semantic:
      intent: '[RED] 공격 계획 — /tmp/attack_plan.txt: Target + Primary Path (DVWA SQLi
        90%/JuiceShop Auth 85%) + Secondary (Apache 정보/SSH Brute 40%) + Defense to
        Bypass (Suricata/ModSecurity). 우선순위 + 확률. PTES Threat Modeling.'
      success_criteria:
      - Attack Plan 키워드
      - Primary + Secondary 경로
      - 방어 우회 계획
      acceptable_methods:
      - echo > 계획 + 확률
      - MITRE ATT&CK Navigator
      - Threat Modeling (STRIDE)
      negative_signs:
      - 경로 1개
      - 확률 없음
      - 방어 분석 없음
  target_vm: attacker
