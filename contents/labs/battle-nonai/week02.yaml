lab_id: battle-nonai-week02
title: "취약점 스캐닝 및 분석 — CVE 기반 공격 벡터 식별"
version: non-ai
course: battle-nonai
week: 2
description: "1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 자동화 취약점 스캐너와 수동 분석으로 공격 벡터를 식별하고, Blue Phase에서 스캐닝 행위를 탐지하고 취약점을 사전 점검한다."
difficulty: easy
duration_minutes: 120
objectives:
  - 자동화 취약점 스캐너를 활용한 취약점 탐지를 수행한다
  - CVE 데이터베이스에서 취약점 정보를 검색하고 분석한다
  - Blue 관점에서 스캐닝을 탐지하고 취약점 노출 현황을 파악한다
prerequisites:
  - Week 1 정찰 실습 완료
  - nmap 기본 사용법
infra_requirements:
  - attacker VM (10.20.30.201)
  - secu VM (10.20.30.1) — nftables, suricata
  - web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
  - siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "[RED] nmap의 vuln 스크립트 카테고리를 사용하여 web 서버의 알려진 취약점을 스캔하라."
    hint: "--script vuln 옵션을 사용한다."
    category: recon
    points: 10
    answer: "nmap --script vuln -p 80,3000,8080 -T4 --max-retries 1 --host-timeout 30s 10.20.30.80"
    answer_detail: "--script vuln은 NSE의 vuln 카테고리 스크립트를 모두 실행한다. 각 스크립트는 특정 CVE를 검사하며, web 서버의 Apache, JuiceShop, DVWA 취약점을 탐지한다."
    verify:
      type: output_contains
      expect: "http"
      field: stdout
    target_vm: attacker

  - order: 2
    instruction: "[RED] Nikto를 사용하여 web 서버(80번 포트)의 웹 취약점을 스캔하라."
    hint: "nikto -h 옵션으로 대상을 지정한다."
    category: recon
    points: 10
    answer: "nikto -h http://10.20.30.80/ -maxtime 60s"
    answer_detail: "Nikto는 웹서버 전용 취약점 스캐너이다. 위험한 파일/CGI, 오래된 서버 소프트웨어, 잘못된 설정 등 6,700개 이상의 항목을 검사한다."
    verify:
      type: output_contains
      expect: "Server:"
      field: stdout
    target_vm: attacker

  - order: 3
    instruction: "[RED] searchsploit을 사용하여 Apache 관련 알려진 익스플로잇을 검색하라."
    hint: "searchsploit 명령에 서비스명과 버전을 입력한다."
    category: recon
    points: 10
    answer: "searchsploit apache 2.4"
    answer_detail: "searchsploit은 ExploitDB의 오프라인 검색 도구이다. 서비스명+버전으로 검색하면 해당하는 PoC 코드와 설명을 확인할 수 있다."
    verify:
      type: output_contains
      expect: "Apache"
      field: stdout
    target_vm: attacker

  - order: 4
    instruction: "[RED] web 서버의 SSH 서비스 보안 설정을 nmap 스크립트로 점검하라."
    hint: "ssh-auth-methods, ssh2-enum-algos 스크립트를 사용한다."
    category: recon
    points: 10
    answer: "nmap --script ssh-auth-methods,ssh2-enum-algos -p 22 -T4 --max-retries 1 --host-timeout 15s 10.20.30.80"
    answer_detail: "ssh-auth-methods는 허용된 인증 방식(password, publickey 등)을, ssh2-enum-algos는 지원하는 암호화 알고리즘을 열거한다. 약한 알고리즘이나 password 인증 허용은 취약점이다."
    verify:
      type: output_contains
      expect: "ssh"
      field: stdout
    target_vm: attacker

  - order: 5
    instruction: "[RED] 웹 디렉토리 브루트포스를 수행하여 DVWA(:8080)의 숨겨진 경로를 탐색하라."
    hint: "dirb 또는 gobuster 도구를 사용한다."
    category: recon
    points: 10
    answer: "dirb http://10.20.30.80:8080/ /usr/share/wordlists/dirb/common.txt -r"
    answer_detail: "dirb는 사전 파일의 경로를 하나씩 요청하여 존재하는 디렉토리/파일을 탐색한다. -r 옵션은 재귀를 비활성화하여 속도를 높인다."
    verify:
      type: output_contains
      expect: "FOUND"
      field: stdout
    target_vm: attacker

  - order: 6
    instruction: "[BLUE] Suricata에서 취약점 스캐닝 관련 알림을 확인하라."
    hint: "fast.log에서 vuln scan 관련 경보를 검색한다."
    category: defense
    points: 10
    answer: "tail -50 /var/log/suricata/fast.log | grep -iE '(scan|vuln|nikto|sql)' | tail -10"
    answer_detail: "Nikto, nmap vuln 스캔은 특징적인 패턴을 남긴다. Suricata의 ET Open 룰셋은 주요 스캐너의 User-Agent, 요청 패턴을 탐지한다."
    verify:
      type: output_contains
      expect: "10.20.30"
      field: stdout
    target_vm: secu

  - order: 7
    instruction: "[BLUE] web 서버의 Apache access.log에서 스캐닝 흔적을 분석하라."
    hint: "HTTP 상태 코드별 요청 건수를 집계한다."
    category: defense
    points: 10
    answer: "awk '{print $9}' /var/log/apache2/access.log 2>/dev/null | sort | uniq -c | sort -rn | head -10"
    answer_detail: "404가 대량이면 디렉토리 브루트포스, 403이 많으면 접근 차단된 경로 탐색 시도이다. 정상 트래픽 대비 비정상적인 상태 코드 비율을 확인한다."
    verify:
      type: output_contains
      expect: "200"
      field: stdout
    target_vm: web

  - order: 8
    instruction: "[BLUE] secu에서 공격자 IP(10.20.30.201)의 스캔 트래픽 빈도를 확인하고, 과도한 스캔 시 nftables로 rate limiting을 적용하라."
    hint: "nft add rule로 rate limiting을 설정한다."
    category: defense
    points: 10
    answer: "sudo nft add rule inet filter input ip saddr 10.20.30.201 tcp dport 80 ct state new limit rate over 30/minute drop && nft list ruleset | grep '10.20.30.201'"
    answer_detail: "rate limiting으로 분당 30회 이상의 새 연결을 차단하면 자동화 스캐너의 효율을 크게 떨어뜨린다. 정상 접근은 허용하면서 스캐닝만 억제한다."
    verify:
      type: output_contains
      expect: "10.20.30.201"
      field: stdout
    target_vm: secu
    requires_approval: true

  - order: 9
    instruction: "[RED] Nikto 스캔 결과를 파일로 저장하라."
    hint: "nikto -o 옵션으로 출력 파일을 지정한다."
    category: recon
    points: 10
    answer: "nikto -h http://10.20.30.80:8080/ -o /tmp/nikto_report.txt -maxtime 60s"
    answer_detail: "-o 옵션은 스캔 결과를 파일로 저장한다. DVWA(:8080)를 대상으로 스캔하면 알려진 취약점과 설정 오류를 발견할 수 있다."
    verify:
      type: file_exists
      expect: "/tmp/nikto_report.txt"
      field: filesystem
    target_vm: attacker

  - order: 10
    instruction: "[RED] 발견된 취약점을 종합하여 공격 계획(Attack Plan)을 문서로 작성하라."
    hint: "정찰 결과와 취약점 분석 결과를 결합하여 작성한다."
    category: analysis
    points: 15
    answer: "cat > /tmp/attack_plan.txt << 'EOF'\n=== Attack Plan ===\nTarget: 10.20.30.80 (web)\n\nPrimary Attack Path:\n1. DVWA(:8080) SQL Injection → DB access (확률: 90%)\n2. JuiceShop(:3000) Auth Bypass → 관리자 접근 (확률: 85%)\n\nSecondary Attack Paths:\n3. Apache(:80) 디렉토리 탐색 → 정보 수집\n4. SSH Brute Force → Shell Access (확률: 40%)\n\nDefense to Bypass:\n- secu(10.20.30.1): nftables, Suricata\n- ModSecurity on web server\nEOF"
    answer_detail: "공격 계획은 발견된 취약점을 우선순위화하고, 방어 장치를 고려한 우회 전략을 포함한다. secu VM의 Suricata/nftables를 우회하는 것이 핵심 과제이다."
    verify:
      type: file_exists
      expect: "/tmp/attack_plan.txt"
      field: filesystem
    target_vm: attacker
