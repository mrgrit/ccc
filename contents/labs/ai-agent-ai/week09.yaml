lab_id: ai-agent-ai-week09
title: '[Non-AI] 에이전트 테스트'
version: ai
course: ai-agent-ai
week: 9
description: 에이전트의 안전성과 정확성을 테스트합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 테스트 프레임워크를 설계한다
- 안전성 테스트를 자동화한다
- 결과를 분석한다
