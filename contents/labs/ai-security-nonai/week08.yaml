    \ = [r'rm\\s+-rf', r'nc\\s+-e', r'wget.*\\|.*sh']\n    for p in danger:\n        if re.search(p, text,\
    \ re.IGNORECASE): return False, 'dangerous_command'\n    return True, 'pass'\n\ndef safety_judge(text):\n\
    \    for word in ['hack','exploit','attack','malicious']:\n        if word in text.lower():\n    \
    \        return 'review', word\n    return 'safe', None\n\ndef pipeline(user_input):\n    report =\
    \ {'input': user_input[:40]}\n    ok, reason = input_filter(user_input)\n    report['input_filter']\
    \ = 'PASS' if ok else f'BLOCK({reason})'\n    if not ok: return None, report\n    data = json.dumps({'model':'gemma3:4b','prompt':user_input,'stream':False,'options':{'num_predict':60}}).encode()\n\
