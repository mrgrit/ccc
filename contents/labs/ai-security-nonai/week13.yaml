- order: 5
  instruction: AI 모델 카드(Model Card)를 자동 생성하시오. Ollama 모델의 정보를 수집하여 표준 형식의 모델 카드를 작성하라.
  hint: /api/show에서 모델 정보를 추출하고 표준 필드로 정리하세요.
  category: config
  points: 10
  answer: "python3 -c \"\nimport json, urllib.request\n# Get model info\ndata = json.dumps({'name':'gemma3:4b'}).encode()\n\
    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/show',data=data,headers={'Content-Type':'application/json'})\n\
    try:\n    model_info = json.loads(urllib.request.urlopen(req).read())\n    details = model_info.get('details',{})\n\
    except:\n    details = {'family':'gemma3','parameter_size':'4B','quantization_level':'Q4'}\n\nprint('='*50)\n\
    print('  MODEL CARD')\nprint('='*50)\nprint(f'Model Name:        gemma3:4b')\nprint(f'Family:    \
    \        {details.get(\\\"family\\\",\\\"gemma3\\\")}')\nprint(f'Parameters:        {details.get(\\\
    \"parameter_size\\\",\\\"4B\\\")}')\nprint(f'Quantization:      {details.get(\\\"quantization_level\\\
    \",\\\"Q4\\\")}')\nprint(f'Format:            GGUF')\nprint(f'License:           Gemma Terms of Use')\n\
    print(f'\\nIntended Use:')\nprint(f'  - Security log analysis')\nprint(f'  - Threat classification')\n\
    print(f'  - Security Q&A assistance')\nprint(f'\\nLimitations:')\nprint(f'  - May hallucinate CVE\
    \ details')\nprint(f'  - Not suitable for real-time threat detection')\nprint(f'  - Korean language\
    \ support limited')\nprint(f'  - Vulnerable to prompt injection')\nprint(f'\\nEthical Considerations:')\n\
    print(f'  - Must not be used for offensive operations')\nprint(f'  - Outputs require human verification')\n\
    print(f'  - PII filtering required for production use')\nprint(f'\\nSecurity Properties:')\nprint(f'\
    \  - No authentication on API')\nprint(f'  - No rate limiting')\nprint(f'  - Susceptible to known\
    \ injection patterns')\nprint('='*50)\n\""
  answer_detail: 모델 카드는 AI 모델의 의도된 용도, 한계, 윤리적 고려사항을 문서화합니다. EU AI Act 등 규제에서 요구하는 투명성 요건을 충족하는 핵심 문서입니다.
