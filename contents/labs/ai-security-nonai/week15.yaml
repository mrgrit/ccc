    field: stdout
    semantic:
      intent: 보안 스코어카드 — python3 + 5 domains (API/Prompt/Model/Governance/Monitoring) + 각 체크항목 점수 (0-10)
        + Grade (A/B/C/D/F) + Overall 종합. 정량적 보안 평가.
