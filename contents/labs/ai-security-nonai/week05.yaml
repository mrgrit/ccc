    \    ]\n    masked = text\n    findings = []\n    for pat, replacement in patterns:\n        matches\
    \ = re.findall(pat, masked, re.IGNORECASE)\n        if matches:\n            findings.extend(matches)\n\
    \            masked = re.sub(pat, replacement, masked, flags=re.IGNORECASE)\n    return masked, findings\n\
    \ndata = json.dumps({'model':'gemma3:4b','prompt':'Generate a sample server config with IP address\
