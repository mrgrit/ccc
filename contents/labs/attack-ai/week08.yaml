lab_id: attack-ai-week08
title: 권한 상승 (Privilege Escalation) (AI 지원)
version: ai
course: attack-ai
week: 8
description: Linux 시스템에서의 로컬 권한 상승 기법을 실습한다. SUID 악용, sudo 미스컨피규레이션, cron 조작, 커널 익스플로잇
  등 다양한 경로를 통해 root 권한을 획득한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Linux 권한 상승의 다양한 벡터를 이해한다
- LinPEAS 등 자동화 도구로 권한 상승 경로를 탐색할 수 있다
- SUID, sudo, cron 기반 권한 상승을 수행할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 서버({{WEB_IP}})에 SSH로 접속하여 현재 사용자의 권한과 그룹 정보를 확인하라.
  hint: |
    id, whoami, groups 명령을 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: id && whoami && groups
    2) 미설치: 기본 coreutils
    3) 실패/대안:
       - cat /proc/self/status (Uid/Gid/Groups)
       - python3 os.geteuid + getgroups
       - getent passwd $USER
       - LinPEAS user enum
       - linenum.sh
       - linux-smart-enumeration
       - sudo cat /etc/sudoers
    4) 검증: docker/lxd/disk 그룹 → 즉시 LPE.
  category: recon
  points: 5
  answer: '🤖 프롬프트: web 서버(10.20.30.80)에 SSH로 접속하여 현재 사용자의 권한과 그룹 정보를 확인해줘

    📎 참고 (CLI): id && whoami && groups'
  answer_detail: 현재 사용자의 UID, GID, 소속 그룹을 파악하는 것은 권한 상승의 첫 단계이다. docker, lxd, disk
    등의 그룹에 속하면 컨테이너 탈출이나 직접적인 권한 상승이 가능할 수 있다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
    semantic:
      intent: id/whoami/groups 로 현재 사용자 UID/GID/그룹 확인 — 권한 상승 경로 탐색의 첫 단계 (docker/lxd/disk
        그룹 확인)
      success_criteria:
      - id && whoami && groups 실행
      - 출력에 uid=<N>, gid=<N>, groups= 라인 포함
      - 특수 그룹(docker·lxd·disk·sudo) 소속 여부 해석
      acceptable_methods:
      - "id + whoami + groups (수기 baseline)."
      - "cat /proc/self/status."
      - "python3 os.geteuid + getgroups."
      - "getent passwd $USER."
      - "LinPEAS user enum."
      - "linenum.sh."
      - "linux-smart-enumeration."
      - "sudo cat /etc/sudoers."
      - "Bastion AI user audit."
      negative_signs:
      - id 출력 해석 없음
      - 특수 그룹 언급 없음
      - 단일 명령만 실행
  target_vm: web
  script: id && whoami && groups
  risk_level: low
  bastion_prompt: 'web 서버(10.20.30.80)에 SSH로 접속하여 현재 사용자의 권한과 그룹 정보를 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: web 서버에서 sudo -l 명령으로 현재 사용자가 sudo로 실행할 수 있는 명령을 확인하라.
  hint: |
    sudo -l은 현재 사용자의 sudo 권한을 표시한다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo 1 | sudo -S -l 2>/dev/null
    2) 미설치: sudo apt install -y sudo
    3) 실패/대안:
       - sudo -ll (long format)
       - sudo cat /etc/sudoers
       - LinPEAS sudo check
       - linenum.sh
       - SUDO_KILLER
       - GTFOBins 조회
       - polkit pkexec 검증
    4) 검증: NOPASSWD + 와일드카드 + 위험 바이너리. CWE-732.
  category: recon
  points: 10
  answer: '🤖 프롬프트: web 서버에서 sudo -l 명령으로 현재 사용자가 sudo로 실행할 수 있는 명령을 확인해줘

    📎 참고 (CLI): echo 1 | sudo -S -l 2>/dev/null'
  answer_detail: sudo -l 출력에서 NOPASSWD 항목이나 와일드카드(*) 사용, 위험한 바이너리(vim, python, bash
    등)가 허용되면 즉시 root 셸을 획득할 수 있다. GTFOBins에서 각 바이너리의 sudo 권한 상승 방법을 확인한다.
  verify:
    type: output_contains
    expect: sudo
    field: stdout
    semantic:
      intent: sudo -l 로 현재 사용자의 sudo 허용 명령 열거 — NOPASSWD·와일드카드·GTFOBins 악용 가능 바이너리
        탐색
      success_criteria:
      - sudo -l 실행 (비밀번호 필요 시 -S 로 stdin 제공)
      - 출력에 User <user> may run 또는 (root) NOPASSWD 라인
      - GTFOBins 에서 악용 가능한 바이너리(vim/find/python) 식별
      acceptable_methods:
      - "echo <pw> | sudo -S -l (수기 baseline)."
      - "sudo -ll (long format)."
      - "cat /etc/sudoers + /etc/sudoers.d/*."
      - "LinPEAS sudo check."
      - "linenum.sh."
      - "SUDO_KILLER."
      - "GTFOBins 조회."
      - "polkit pkexec 검증."
      - "Bastion AI sudo audit."
      negative_signs:
      - sudo 없이 로컬 명령만
      - 결과 해석 없이 raw 출력
      - GTFOBins 맥락 언급 없음
  target_vm: web
  script: echo 1 | sudo -S -l 2>/dev/null
  risk_level: low
  bastion_prompt: 'web 서버에서 sudo -l 명령으로 현재 사용자가 sudo로 실행할 수 있는 명령을 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: web 서버에서 SUID 비트가 설정된 모든 바이너리를 검색하고, 비정상적인 항목을 식별하라.
  hint: |
    find / -perm -4000 -type f로 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선: find / -perm -4000 -type f 2>/dev/null | sort
    2) 미설치: 기본 coreutils
    3) 실패/대안:
       - find / -perm -u=s -type f
       - find / -perm /4000
       - LinPEAS auto SUID
       - linux-smart-enumeration
       - linenum.sh
       - GTFOBins 매핑
       - linux-exploit-suggester
       - pwnkit-detector
    4) 검증: 비표준 SUID → 즉시 root.
  category: recon
  points: 10
  answer: '🤖 프롬프트: web 서버에서 SUID 비트가 설정된 모든 바이너리를 검색하고, 비정상적인 항목을 식별해줘

    📎 참고 (CLI): find / -perm -4000 -type f 2>/dev/null | sort'
  answer_detail: 표준 SUID 바이너리(passwd, ping, su 등) 외에 비정상적인 SUID 파일이 있으면 권한 상승에 악용할
    수 있다. /usr/bin/python3, /usr/bin/vim 등이 SUID이면 즉시 root 획득이 가능하다.
  verify:
    type: output_contains
    expect: /usr
    field: stdout
    semantic:
      intent: find / -perm -4000 -type f — SUID 바이너리 전수 조사, 표준(passwd/ping/su) 외 비정상
        SUID 식별
      success_criteria:
      - find / -perm -4000 -type f 2>/dev/null 실행
      - 출력에 /usr/bin 또는 /usr/sbin SUID 경로 최소 3개
      - GTFOBins 에서 악용 가능 바이너리 대응 매핑
      acceptable_methods:
      - "find / -perm -4000 -type f (수기 baseline)."
      - "find / -perm -u=s."
      - "find / -perm /4000."
      - "LinPEAS auto SUID."
      - "linux-smart-enumeration."
      - "linenum.sh."
      - "GTFOBins 매핑."
      - "pwnkit-detector / linux-exploit-suggester."
      - "Bastion AI SUID audit."
      negative_signs:
      - -perm 옵션 없이 모든 파일
      - 출력 해석 없이 raw
      - GTFOBins 언급 없음
  target_vm: web
  script: find / -perm -4000 -type f 2>/dev/null | sort
  risk_level: low
  bastion_prompt: 'web 서버에서 SUID 비트가 설정된 모든 바이너리를 검색하고, 비정상적인 항목을 식별해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: web 서버에서 world-writable 파일을 검색하라. 특히 root가 소유한 world-writable 파일에 주목하라.
  hint: |
    find / -writable -type f로 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선: find / -writable -type f -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null | head -20
    2) 미설치: 기본 coreutils
    3) 실패/대안:
       - find / -perm -o=w -type f
       - find / -perm /o+w
       - find / -uid 0 -perm -o+w (root + ww)
       - LinPEAS world-writable check
       - linenum.sh
       - linux-smart-enumeration
       - getfacl 점검
       - python os.access W_OK
    4) 검증: root 소유 + ww → 악성 코드 삽입 → root.
  category: recon
  points: 10
  answer: '🤖 프롬프트: web 서버에서 world-writable 파일을 검색해줘

    📎 참고 (CLI): find / -writable -type f -not -path "/proc/*" -not -path "/sys/*"
    2>/dev/null | head -20'
  answer_detail: world-writable 파일은 모든 사용자가 수정할 수 있다. root 소유의 스크립트나 설정 파일이 world-writable이면
    악성 코드를 삽입하여 root 권한으로 실행시킬 수 있다.
  verify:
    type: output_contains
    expect: /
    field: stdout
    semantic:
      intent: find / -writable — world-writable 파일 검색, root 소유 시 악성 코드 삽입 후 root 실행
        가능성
      success_criteria:
      - find / -writable -type f -not -path /proc -not -path /sys 2>/dev/null 실행
      - 출력에 쓰기 가능 파일 목록 (루트 디렉터리 경로)
      - root 소유 world-writable 의 위험성 언급
      acceptable_methods:
      - "find / -writable -not -path proc/sys (수기 baseline)."
      - "find / -perm -o=w."
      - "find / -uid 0 -perm -o+w."
      - "LinPEAS world-writable check."
      - "linenum.sh."
      - "linux-smart-enumeration."
      - "getfacl 점검."
      - "python os.access W_OK."
      - "Bastion AI ww audit."
      negative_signs:
      - 모든 파일 출력 (필터 없음)
      - root 소유 여부 확인 없음
      - 악용 시나리오 설명 없음
  target_vm: web
  script: find / -writable -type f -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null
    | head -20
  risk_level: low
  bastion_prompt: 'web 서버에서 world-writable 파일을 검색해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: web 서버의 /etc/passwd 파일에서 셸 접근이 가능한 사용자를 나열하라.
  hint: |
    /bin/bash 또는 /bin/sh가 설정된 사용자를 필터링한다.

    📎 도구 우선순위 (힌트):
    1) 우선: grep -E "/bin/(bash|sh|zsh)$" /etc/passwd
    2) 미설치: 기본 coreutils
    3) 실패/대안:
       - awk -F: '$7 ~ /bash|sh/' /etc/passwd
       - getent passwd | grep -E "/bin/(bash|sh)"
       - cut -d: -f1,7 /etc/passwd
       - lastlog (로그인 이력)
       - last -F (성공 로그인)
       - python3 pwd.getpwall()
       - login.defs 정책 점검
    4) 검증: nologin/false 미배정 user → 잠재 공격 대상.
  category: recon
  points: 10
  answer: '🤖 프롬프트: web 서버의 /etc/passwd 파일에서 셸 접근이 가능한 사용자를 나열해줘

    📎 참고 (CLI): grep -E "/bin/(bash|sh|zsh)$" /etc/passwd'
  answer_detail: 셸 접근이 가능한 사용자 계정은 잠재적 공격 대상이다. 불필요한 계정에 셸이 할당되어 있으면 해당 계정을 침해하여 시스템에
    접근할 수 있다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: /etc/passwd 에서 /bin/bash 또는 /bin/sh 쉘 할당된 사용자 필터 — 로그인 가능 계정 목록
      success_criteria:
      - grep -E /bin/(bash|sh|zsh)$ /etc/passwd 실행
      - 결과에 root 및 일반 사용자 계정 최소 2개
      - 불필요 계정 정리의 보안 원칙 언급
      acceptable_methods:
      - "grep -E /bin/(bash|sh|zsh) /etc/passwd (수기 baseline)."
      - "awk -F: '$7 ~ /bash/'."
      - "getent passwd + filter."
      - "cat /etc/shells 비교."
      - "cut -d: -f1,7."
      - "lastlog."
      - "last -F."
      - "python pwd.getpwall()."
      - "Bastion AI 사용자 audit."
      negative_signs:
      - /etc/passwd 전체 출력
      - 쉘 없는 계정까지 포함
      - 보안 원칙 언급 없음
  target_vm: web
  script: grep -E "/bin/(bash|sh|zsh)$" /etc/passwd
  risk_level: low
  bastion_prompt: 'web 서버의 /etc/passwd 파일에서 셸 접근이 가능한 사용자를 나열해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: web 서버의 crontab과 cron 디렉토리를 검사하여 root로 실행되는 예약 작업을 찾아라.
  hint: |
    /etc/crontab, /etc/cron.d/, /var/spool/cron/ 디렉토리를 확인한다.

    📎 도구 우선순위 (힌트):
    1) 우선: cat /etc/crontab 2>/dev/null; echo ---; ls -la /etc/cron.d/ 2>/dev/null; echo ---; ls -la /var/spool/cron/crontabs/ 2>/dev/null
    2) 미설치: 기본 cron
    3) 실패/대안:
       - systemctl list-timers --all
       - pspy 프로세스 모니터
       - LinPEAS cron enum
       - linenum.sh
       - linux-smart-enumeration
       - /etc/cron.{daily,hourly,weekly,monthly}
       - auditctl -w /var/spool/cron
       - crontab -l (현 사용자)
    4) 검증: root cron + writable script → LPE.
  category: recon
  points: 10
  answer: '🤖 프롬프트: web 서버의 crontab과 cron 디렉토리를 검사하여 root로 실행되는 예약 작업을 찾아라해줘

    📎 참고 (CLI): cat /etc/crontab 2>/dev/null; echo ---; ls -la /etc/cron.d/ 2>/dev/null;
    echo ---; ls -la /var/spool/cron/crontabs/ 2>/dev/null'
  answer_detail: root 권한으로 실행되는 cron 작업이 일반 사용자가 수정할 수 있는 스크립트를 참조하면, 해당 스크립트에 리버스
    셸을 삽입하여 root 권한을 획득할 수 있다.
  verify:
    type: output_contains
    expect: cron
    field: stdout
    semantic:
      intent: crontab + /etc/cron.d + /var/spool/cron/crontabs 조회 — root 권한 cronjob
        검색 후 world-writable 스크립트 의존 여부 평가
      success_criteria:
      - cat /etc/crontab 과 ls -la /etc/cron.d, /var/spool/cron/crontabs 실행
      - 출력에 cron 키워드와 스케줄 라인 최소 1개
      - world-writable + root 실행 조합의 위험성 언급
      acceptable_methods:
      - "cat /etc/crontab + ls /etc/cron.d + /var/spool/cron (수기 baseline)."
      - "systemctl list-timers."
      - "pspy 프로세스 모니터."
      - "LinPEAS cron enum."
      - "linenum.sh."
      - "linux-smart-enumeration."
      - "/etc/cron.{daily,hourly,weekly,monthly}."
      - "auditctl -w /var/spool/cron."
      - "Bastion AI cron audit."
      negative_signs:
      - crontab -l 만 (시스템 cron 누락)
      - 쓰기 권한 검사 없음
      - root 권한 영향 언급 없음
  target_vm: web
  script: cat /etc/crontab 2>/dev/null; echo ---; ls -la /etc/cron.d/ 2>/dev/null;
    echo ---; ls -la /var/spool/cron/crontabs/ 2>/dev/null
  risk_level: low
  bastion_prompt: 'web 서버의 crontab과 cron 디렉토리를 검사하여 root로 실행되는 예약 작업을 찾아라해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 7
  instruction: web 서버에서 capabilities가 설정된 바이너리를 검색하라. 특수 capability는 SUID와 유사한 권한
    상승에 사용될 수 있다.
