lab_id: attack-ai-week08
title: 권한 상승 (Privilege Escalation) - AI 지원
version: ai
course: attack-ai
week: 8
description: AI 에이전트를 활용하여 Linux 권한 상승 벡터를 자동 탐색한다. LinPEAS와 유사한 자동화 검사를 AI가 수행한다.
difficulty: hard
duration_minutes: 120
objectives:
- OpsClaw를 통해 권한 상승 작업을 자동화할 수 있다
- AI가 권한 상승 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 권한 상승의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpsClaw에 권한 상승 프로젝트를 생성하라.
  hint: OpsClaw API를 사용하여 권한 상승을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:8000/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"name":"권한_상승","request_text":"권한
    상승","master_mode":"external"}'''
  answer_detail: OpsClaw 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: opsclaw_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
  instruction: AI에게 사용자 권한 확인 작업을 수행하도록 요청하라.
  hint: OpsClaw API를 사용하여 권한 상승을 자동화한다
  category: exploit
  points: 10
  answer: 'curl -s -X POST http://localhost:8000/projects/{id}/dispatch -H ''Content-Type:
    application/json'' -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"command":"사용자
    권한 확인","subagent_url":"http://localhost:8002"}'''
  answer_detail: AI가 사용자 권한 확인 작업을 자동 수행하고 결과를 분석한다.
  script: ai_사용자_권한_확인.py
