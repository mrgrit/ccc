lab_id: attack-ai-week12
title: 은닉 기법 (Evasion) - AI 지원
version: ai
course: attack-ai
week: 12
description: AI 에이전트를 활용하여 보안 장비 우회 기법을 자동화한다. AI가 WAF 우회 페이로드를 생성하고, IDS 탐지를 회피하는
  전략을 수립한다.
difficulty: hard
duration_minutes: 120
objectives:
- OpsClaw를 통해 은닉 기법 작업을 자동화할 수 있다
- AI가 은닉 기법 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 은닉 기법의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpsClaw에 은닉 기법 프로젝트를 생성하라.
  hint: OpsClaw API를 사용하여 은닉 기법을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:8000/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"name":"은닉_기법","request_text":"은닉
    기법","master_mode":"external"}'''
  answer_detail: OpsClaw 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: opsclaw_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
