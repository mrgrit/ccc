lab_id: attack-ai-week06
title: 네트워크 공격 (Network Attacks) - AI 지원
version: ai
course: attack-ai
week: 6
description: AI 에이전트를 활용하여 네트워크 계층 공격을 자동화한다. tcpdump 캡처, 패킷 분석, 네트워크 매핑을 AI가 수행한다.
difficulty: medium
duration_minutes: 120
objectives:
- OpsClaw를 통해 네트워크 공격 작업을 자동화할 수 있다
- AI가 네트워크 공격 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 네트워크 공격의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpsClaw에 네트워크 공격 프로젝트를 생성하라.
  hint: OpsClaw API를 사용하여 네트워크 공격을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:8000/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"name":"네트워크_공격","request_text":"네트워크
    공격","master_mode":"external"}'''
  answer_detail: OpsClaw 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: opsclaw_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
