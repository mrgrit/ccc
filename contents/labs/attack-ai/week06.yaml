lab_id: attack-ai-week06
title: 네트워크 공격 (Network Attacks) (AI 지원)
version: ai
course: attack-ai
week: 6
description: ARP 스푸핑, DNS 스푸핑, MITM(중간자 공격), 패킷 스니핑 등 네트워크 계층의 공격 기법을 실습한다. tcpdump,
  arpspoof, ettercap 등의 도구를 활용한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- ARP/DNS 스푸핑의 원리를 이해하고 실습한다
- tcpdump를 사용하여 네트워크 트래픽을 캡처하고 분석한다
- MITM 공격의 위험성과 대응 방안(TLS, DNSSEC)을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: tcpdump를 사용하여 {{WEB_IP}}으로 향하는 HTTP 트래픽(포트 3000)을 캡처하라. 10개 패킷만 캡처하라.
  hint: |
    tcpdump -c 옵션으로 캡처 수를 제한하고 host와 port 필터를 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo tcpdump -c 10 -i any host 10.20.30.80 and port 3000 -nn
    2) 미설치: sudo apt install -y tcpdump
    3) 실패/대안:
       - tshark -f "host 10.20.30.80 and port 3000" -c 10
       - Wireshark GUI capture filter
       - tcpflow -i any host 10.20.30.80 port 3000
       - dumpcap -f BPF -c 10
       - ngrep -d any
       - scapy sniff(filter="host 10.20.30.80 and port 3000", count=10)
    4) 검증: BPF host+port. CWE-319.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: tcpdump를 사용하여 10.20.30.80으로 향하는 HTTP 트래픽(포트 3000)을 캡처하라. 10개 패킷만
    캡처해줘

    📎 참고 (CLI): sudo tcpdump -c 10 -i any host 10.20.30.80 and port 3000 -nn'
  answer_detail: tcpdump는 네트워크 패킷 캡처 도구이다. -c 10은 10개 패킷 후 종료, -nn은 DNS/포트 역방향 조회를
    생략한다. host와 port 필터로 특정 트래픽만 선별 캡처할 수 있다.
  verify:
    type: output_contains
    expect: tcpdump
    field: stdout
    semantic:
      intent: tcpdump 로 특정 호스트·포트 필터로 HTTP 트래픽 10개 패킷 캡처 — host <IP> and port 3000
      success_criteria:
      - sudo tcpdump -c 10 host <IP> and port 3000 실행
      - '출력에 tcpdump: listening 라인과 캡처된 패킷 라인'
      - -c 10 제한과 host/port 필터 사용 의미 설명
      acceptable_methods:
      - "sudo tcpdump -c 10 -i any host IP and port 3000 -nn (수기 baseline)."
      - "tshark -f BPF -c 10."
      - "Wireshark GUI capture filter."
      - "tcpflow -i any host IP port 3000."
      - "dumpcap -f BPF -c 10."
      - "ngrep -d any."
      - "scapy sniff(filter, count=10)."
      - "termshark TUI."
      - "Bastion AI 패킷 캡처 orchestrator."
      negative_signs:
      - -c 누락으로 무제한 캡처
      - 필터 없이 모든 트래픽 캡처
      - sudo 없어 권한 오류
  target_vm: attacker
  script: sudo tcpdump -c 10 -i any host 10.20.30.80 and port 3000 -nn
  risk_level: low
  bastion_prompt: tcpdump를 사용하여 10.20.30.80으로 향하는 HTTP 트래픽(포트 3000)을 캡처하라. 10개 패킷만
    캡처해줘
- order: 2
  instruction: tcpdump로 HTTP 요청/응답의 ASCII 내용을 캡처하라. {{WEB_IP}}:3000에 대한 트래픽을 5개 패킷만
    캡처하라.
  hint: |
    -A 옵션은 패킷 내용을 ASCII로 출력한다.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 5 -A -i any host 10.20.30.80 and port 3000 -nn 2>&1 | head -50
    2) 미설치: sudo apt install -y tcpdump curl
    3) 실패/대안:
       - tshark -V verbose
       - Wireshark Follow TCP Stream
       - tcpflow -c 콘솔 ASCII
       - ngrep -W byline -d any "GET|POST"
       - tcpdump -X HEX+ASCII
       - mitmproxy -m transparent
    4) 검증: GET/Host/User-Agent 평문. HTTPS 필요성. CWE-319.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: tcpdump로 HTTP 요청/응답의 ASCII 내용을 캡처하라. 10.20.30.80:3000에 대한 트래픽을
    5개 패킷만 캡처해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 5 -A
    -i any host 10.20.30.80 and port 3000 -nn 2>&1 | head -50'
  answer_detail: -A 옵션은 패킷 페이로드를 ASCII 텍스트로 출력한다. HTTP는 평문 프로토콜이므로 URL, 헤더, 쿠키, 폼
    데이터 등이 모두 노출된다. 이것이 HTTPS가 필수인 이유이다.
  verify:
    type: output_contains
    expect: tcpdump
    field: stdout
    semantic:
      intent: tcpdump -A ASCII 모드 로 HTTP 평문 payload 관찰 — URL·헤더·쿠키·폼 데이터가 노출되는 HTTPS
        필요성 실증
      success_criteria:
      - tcpdump -A -c 5 host <IP> and port 3000 실행
      - curl 로 동시에 요청 발생시켜 패킷 캡처
      - 응답에 GET / HTTP/1.1 또는 Host/User-Agent 헤더 평문 포함
      acceptable_methods:
      - "curl + sudo tcpdump -A -c 5 (수기 baseline)."
      - "tcpdump -A -i any port 3000."
      - "tshark -O http -c 5."
      - "scapy sniff + Raw 레이어."
      - "tcpflow -c 콘솔."
      - "ngrep -W byline."
      - "tcpdump -X HEX+ASCII."
      - "mitmproxy transparent."
      - "Bastion AI 평문 스니퍼 orchestrator."
      negative_signs:
      - -A 없이 16진수만 확인 (ASCII 미확인)
      - 트래픽 유발 없이 캡처 시도
      - 평문 노출의 HTTPS 필요성 언급 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 5 -A -i any
    host 10.20.30.80 and port 3000 -nn 2>&1 | head -50
  risk_level: low
  bastion_prompt: tcpdump로 HTTP 요청/응답의 ASCII 내용을 캡처하라. 10.20.30.80:3000에 대한 트래픽을 5개
    패킷만 캡처해줘
- order: 3
  instruction: ARP 테이블을 확인하여 실습 네트워크의 MAC 주소 매핑을 조사하라.
  hint: |
    arp -a 또는 ip neigh 명령으로 ARP 캐시를 확인한다.

    📎 도구 우선순위 (힌트):
    1) 우선: ip neigh show && echo '---' && arp -a
    2) 미설치: sudo apt install -y iproute2 net-tools
    3) 실패/대안:
       - arp-scan --localnet
       - netdiscover -r 10.20.30.0/24 -P
       - nmap -sn -PR 10.20.30.0/24 (ARP ping)
       - fping -a -g 10.20.30.0/24
       - python scapy ARPing
       - bettercap net.recon on
    4) 검증: 동일 MAC → 여러 IP = 스푸핑 징후. T1557.002.
  category: recon
  points: 10
  answer: '🤖 프롬프트: ARP 테이블을 확인하여 실습 네트워크의 MAC 주소 매핑을 조사해줘

    📎 참고 (CLI): ip neigh show && echo ''---'' && arp -a 2>/dev/null'
  answer_detail: ARP(Address Resolution Protocol) 테이블은 IP와 MAC 주소의 매핑을 저장한다. ARP 스푸핑은
    이 매핑을 조작하여 트래픽을 가로채는 기법이다. 정상 MAC 주소를 먼저 기록해두면 변조를 탐지할 수 있다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: ARP 테이블(ARP 캐시) 조회 — 실습 네트워크의 IP↔MAC 매핑 수집, 나중에 ARP 스푸핑 탐지 기준선
      success_criteria:
      - ip neigh show 또는 arp -a 실행
      - 출력에 10.20.30.x IP 와 MAC 주소 최소 1개 매핑
      - ARP 캐시가 ARP 스푸핑 탐지에 활용되는 원리 언급
      acceptable_methods:
      - "ip neigh show + arp -a (수기 baseline)."
      - "arp-scan --localnet."
      - "netdiscover -r."
      - "nmap -sn -PR (ARP ping)."
      - "fping -a -g."
      - "scapy ARPing()."
      - "bettercap net.recon."
      - "Wireshark ARP 디스플레이 필터."
      - "Bastion AI ARP 자산 audit."
      negative_signs:
      - ARP 테이블 비어있어도 트래픽 유발 없이 종료
      - MAC 주소 없이 IP 만 출력
      - ARP 스푸핑 탐지 맥락 없음
  target_vm: attacker
  script: ip neigh show && echo '---' && arp -a 2>/dev/null
  risk_level: low
  bastion_prompt: 'ARP 테이블을 확인하여 실습 네트워크의 MAC 주소 매핑을 조사해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: nmap을 사용하여 실습 네트워크(10.20.30.0/24)의 모든 호스트의 MAC 주소를 수집하라.
  hint: |
    nmap -sn 옵션은 호스트 발견 시 MAC 주소도 표시한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo nmap -sn 10.20.30.0/24
    2) 미설치: sudo apt install -y nmap
    3) 실패/대안:
       - arp-scan -l (자동 인터페이스)
       - netdiscover -r 10.20.30.0/24
       - fping -a -g 10.20.30.0/24
       - masscan --ping
       - rustscan -a /24 -- -sn
       - scapy ARPing("10.20.30.0/24")
    4) 검증: MAC + 벤더 OUI + IP 매핑.
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap을 사용하여 실습 네트워크(10.20.30.0/24)의 모든 호스트의 MAC 주소를 수집해줘

    📎 참고 (CLI): sudo nmap -sn 10.20.30.0/24'
  answer_detail: MAC 주소 수집은 네트워크 자산 목록 작성과 ARP 스푸핑 탐지의 기초이다. 같은 MAC 주소가 여러 IP에 매핑되면
    ARP 스푸핑이 진행 중일 수 있다.
  verify:
    type: output_contains
    expect: Nmap scan report
    field: stdout
    semantic:
      intent: nmap -sn /24 호스트 발견 — ARP 요청으로 MAC 주소 자동 수집 (같은 L2 세그먼트 필요)
      success_criteria:
      - sudo nmap -sn 10.20.30.0/24 실행
      - Nmap scan report 라인 최소 3개 + MAC Address 표시
      - 같은 세그먼트에서만 MAC 수집 가능함을 언급
      acceptable_methods:
      - "sudo nmap -sn /24 (수기 baseline)."
      - "arp-scan -l."
      - "netdiscover -r."
      - "fping -a -g."
      - "masscan --ping."
      - "rustscan -a /24 -- -sn."
      - "scapy ARPing()."
      - "ip -4 neigh + lladdr."
      - "Bastion AI 자산 발견 orchestrator."
      negative_signs:
      - 루트 권한 없이 -sn 실행해 MAC 수집 실패
      - 단일 IP 만 스캔
      - MAC 수집 결과 해석 없음
  target_vm: attacker
  script: sudo nmap -sn 10.20.30.0/24
  risk_level: low
  bastion_prompt: 'nmap을 사용하여 실습 네트워크(10.20.30.0/24)의 모든 호스트의 MAC 주소를 수집해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: tcpdump를 사용하여 ARP 패킷을 캡처하라. 네트워크에서 ARP 요청과 응답을 10개 관찰하라.
  hint: |
    tcpdump arp 필터를 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo tcpdump -c 10 -i any arp -nn
    2) 미설치: sudo apt install -y tcpdump
    3) 실패/대안:
       - tshark -Y arp -c 10
       - Wireshark display filter 'arp'
       - arpwatch 데몬
       - arping -c 5 + tcpdump
       - scapy sniff(filter='arp', count=10)
       - Suricata ARP 룰
    4) 검증: who-has / is-at + 비정상 gratuitous ARP. T1557.002.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: tcpdump를 사용하여 ARP 패킷을 캡처해줘

    📎 참고 (CLI): sudo tcpdump -c 10 -i any arp -nn'
  answer_detail: ARP 패킷 캡처는 네트워크 모니터링의 기본이다. 비정상적으로 많은 ARP 응답(gratuitous ARP)이 관찰되면
    ARP 스푸핑 공격이 진행 중일 수 있다.
  verify:
    type: output_contains
    expect: ARP
    field: stdout
    semantic:
      intent: tcpdump 로 ARP 패킷 필터링 캡처 — Request/Reply 관찰 후 비정상 gratuitous ARP 로 스푸핑
        탐지
      success_criteria:
      - sudo tcpdump -c 10 -i any arp -nn 실행
      - 출력에 ARP 라인(Request/Reply) 최소 1개
      - gratuitous ARP·과도한 ARP 응답이 스푸핑 징후임을 언급
      acceptable_methods:
      - "sudo tcpdump -i any arp -nn (수기 baseline)."
      - "tshark -Y arp."
      - "Wireshark 'arp' 필터."
      - "arpwatch 데몬."
      - "arping + tcpdump."
      - "scapy sniff(filter='arp')."
      - "Suricata ARP 룰."
      - "bettercap arp.recon."
      - "Bastion AI ARP 변화 탐지 orchestrator."
      negative_signs:
      - arp 필터 없이 모든 트래픽 캡처
      - Request 와 Reply 구분 없이 raw 출력만
      - 스푸핑 탐지 원리 언급 없음
  target_vm: attacker
  script: sudo tcpdump -c 10 -i any arp -nn
  risk_level: low
  bastion_prompt: tcpdump를 사용하여 ARP 패킷을 캡처해줘
- order: 6
  instruction: DNS 조회 패킷을 tcpdump로 캡처하라. dig 명령으로 DNS 쿼리를 발생시키면서 동시에 캡처하라.
  hint: |
    tcpdump port 53 필터를 사용하고, 별도 터미널에서 dig를 실행한다.

    📎 도구 우선순위 (힌트):
    1) 우선: dig google.com @8.8.8.8 > /dev/null 2>&1 & sudo tcpdump -c 4 -i any port 53 -nn 2>&1 | head -20
    2) 미설치: sudo apt install -y tcpdump dnsutils
    3) 실패/대안:
       - tshark -Y dns -f "port 53" -c 4
       - Wireshark dns.flags 필터
       - dnstop -l 5 eth0
       - scapy sniff(filter='udp port 53')
       - dnschef + 캡처
       - dnsrecon + tcpdump
    4) 검증: question/answer + UDP 평문. DNSSEC 필요성. T1557.002.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: DNS 조회 패킷을 tcpdump로 캡처하라. dig 명령으로 DNS 쿼리를 발생시키면서 동시에 캡처해줘

    📎 참고 (CLI): dig google.com @8.8.8.8 > /dev/null 2>&1 & sudo tcpdump -c 4 -i any
    port 53 -nn 2>&1 | head -20'
  answer_detail: DNS 쿼리는 기본적으로 UDP 53번 포트를 사용하며 평문으로 전송된다. DNS 스푸핑은 이 쿼리에 대해 위조된 응답을
    먼저 보내 피해자를 악성 사이트로 유도하는 공격이다.
  verify:
    type: output_contains
    expect: '53'
    field: stdout
    semantic:
      intent: DNS 쿼리 패킷 캡처 — tcpdump port 53 필터링 + dig 동시 실행해 UDP 53 평문 DNS 요청/응답
        관찰
      success_criteria:
      - sudo tcpdump -c 4 port 53 실행
      - dig 명령으로 DNS 쿼리 동시 유발
      - 캡처 출력에 53 포트 + A 레코드 또는 DNS 요청 라인
      acceptable_methods:
      - "dig + sudo tcpdump port 53 (수기 baseline)."
      - "tshark -Y dns -f 'port 53'."
      - "Wireshark dns.flags 필터."
      - "dnstop -l 5."
      - "scapy sniff(filter='udp port 53')."
      - "dnschef + 캡처."
      - "dnsrecon + tcpdump."
      - "host -v + 캡처."
      - "Bastion AI DNS 평문 분석 orchestrator."
      negative_signs:
      - dig 없이 DNS 트래픽 유발 안 됨
      - port 53 필터 누락으로 모든 트래픽 캡처
      - DNS 스푸핑 맥락 설명 없음
  target_vm: attacker
  script: dig google.com @8.8.8.8 > /dev/null 2>&1 & sudo tcpdump -c 4 -i any port
    53 -nn 2>&1 | head -20
  risk_level: low
  bastion_prompt: DNS 조회 패킷을 tcpdump로 캡처하라. dig 명령으로 DNS 쿼리를 발생시키면서 동시에 캡처해줘
- order: 7
  instruction: scapy(python3)를 사용하여 커스텀 ICMP 패킷을 생성하고 {{WEB_IP}}에 전송하라.
  hint: |
