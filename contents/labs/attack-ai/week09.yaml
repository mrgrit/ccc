lab_id: attack-ai-week09
title: 지속성 확보 (Persistence) - AI 지원
version: ai
course: attack-ai
week: 9
description: AI 에이전트를 활용하여 지속성 기법을 자동화한다. SSH 키 주입, cron 설정, systemd 서비스 등록을 AI가 수행하고
  탐지 방법을 분석한다.
difficulty: hard
duration_minutes: 120
objectives:
- CCC를 통해 지속성 확보 작업을 자동화할 수 있다
- AI가 지속성 확보 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 지속성 확보의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: CCC에 지속성 확보 프로젝트를 생성하라.
  hint: CCC API를 사용하여 지속성 확보을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:9100/api/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: ccc-api-key-2026'' -d ''{"name":"지속성_확보","request_text":"지속성
    확보","master_mode":"external"}'''
  answer_detail: CCC 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: ccc_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
