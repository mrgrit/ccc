  risk_level: low
  bastion_prompt: aircrack-ng 도구 스위트의 구성 요소와 각 도구의 역할을 정리해줘
- order: 4
  instruction: WPA2-PSK 4-Way Handshake의 원리를 설명하고, 각 단계에서 교환되는 메시지를 정리하라.
  hint: ANonce, SNonce, MIC, GTK 교환 과정을 설명한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: WPA2-PSK 4-Way Handshake의 원리를 설명하고, 각 단계에서 교환되는 메시지를 정리해줘

    📎 참고 (CLI): echo -e ''=== WPA2 4-Way Handshake ===\n\nPMK = PBKDF2(PSK, SSID,
    4096, 256)\n\n[Message 1] AP -> Client\n  - ANonce (AP random number)\n  - Client
    derives PTK from PMK + ANonce + SNonce + MACs\n\n[Message 2] Client -> AP\n  -
    SNonce (Client random number)\n  - MIC (Message Integrity Check)\n  - AP derives
    PTK and verifies MIC\n\n[Message 3] AP -> Client\n  - GTK (Group Temporal Key,
    encrypted)\n  - MIC\n\n[Message 4] Client -> AP\n  - ACK\n  - Encrypted communication
    begins\n\n[Attack Vector]\n- Capture handshake (Msg 1-2 sufficient)\n- Offline
    dictionary attack: try passwords to derive PMK\n- If PMK matches -> password found'''
  answer_detail: WPA2-PSK의 4-Way Handshake를 캡처하면 오프라인 사전 공격이 가능하다. PSK에서 PMK를 도출하고(PBKDF2),
    PTK를 계산하여 MIC를 검증한다. 캡처된 핸드셰이크의 MIC와 일치하는 PSK를 찾으면 비밀번호를 복원할 수 있다.
  verify:
    type: output_contains
    expect: 4-Way Handshake
    field: stdout
    semantic:
      intent: WPA2-PSK 4-Way Handshake 메시지 교환 과정 정리 — PMK=PBKDF2(PSK,SSID,4096,256)
        도출, Msg1 AP→Client ANonce, Msg2 Client→AP SNonce+MIC, Msg3 AP→Client GTK+MIC,
        Msg4 Client→AP ACK. 핸드셰이크 캡처 시 오프라인 사전 공격 가능 원리 (Msg1-2 만으로 PMK 검증 가능)
      success_criteria:
      - 4-Way Handshake 4개 메시지 모두 설명 (ANonce/SNonce/MIC/GTK)
      - PMK = PBKDF2(PSK, SSID, 4096, 256) 파생 공식 또는 동등한 설명
      - 핸드셰이크 캡처 → 오프라인 dict attack 연결 언급
      acceptable_methods:
      - echo -e 로 메시지 1~4 구조화
      - IEEE 802.11i-2004 표준 인용
      - Wireshark EAPOL 필터(eapol) 로 실제 핸드셰이크 분석
      - scapy 로 EAPOL 프레임 파싱
      negative_signs:
      - 메시지 3개 이하만 설명
      - PMK/PTK 파생 과정 생략
      - MIC 검증 또는 offline dict 원리 없음
  target_vm: attacker
  script: 'echo -e ''=== WPA2 4-Way Handshake ===\n\nPMK = PBKDF2(PSK, SSID, 4096,
