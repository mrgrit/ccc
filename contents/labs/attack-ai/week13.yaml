    | WPA3-SAE |\n|---------|----------|----------|\n| Offline attack | Possible |
    Impossible |\n| Forward secrecy | No | Yes |\n| PMF | Optional | Mandatory |\n|
    Dictionary attack | Offline | Online only |'''
  answer_detail: WPA3-SAE는 Dragonfly 핸드셰이크를 사용하여 비밀번호를 직접 전송하지 않고 Diffie-Hellman 교환에
    사용한다. 핸드셰이크를 캡처해도 오프라인 사전 공격이 불가능하며, 세션별 고유한 키를 생성하여 Forward Secrecy를 제공한다.
