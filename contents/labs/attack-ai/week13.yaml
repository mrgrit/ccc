lab_id: attack-ai-week13
title: 무선 네트워크 공격 (Wireless) - AI 지원
version: ai
course: attack-ai
week: 13
description: AI 에이전트를 활용하여 무선 보안 분석을 자동화한다. AI가 프로토콜 취약점을 분석하고, 공격 시나리오를 시뮬레이션한다.
difficulty: medium
duration_minutes: 120
objectives:
- OpsClaw를 통해 무선 공격 작업을 자동화할 수 있다
- AI가 무선 공격 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 무선 공격의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpsClaw에 무선 공격 프로젝트를 생성하라.
  hint: OpsClaw API를 사용하여 무선 공격을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:8000/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"name":"무선_공격","request_text":"무선
    공격","master_mode":"external"}'''
  answer_detail: OpsClaw 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: opsclaw_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
