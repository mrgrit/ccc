lab_id: attack-ai-week13
title: 무선 네트워크 공격 (Wireless) (AI 지원)
version: ai
course: attack-ai
week: 13
description: 무선 네트워크의 보안 취약점과 공격 기법을 학습한다. Wi-Fi 프로토콜 분석, WPA/WPA2 크래킹, Evil Twin,
  Deauthentication 공격의 원리를 이론과 시뮬레이션으로 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Wi-Fi 보안 프로토콜(WEP, WPA, WPA2, WPA3)의 차이를 이해한다
- 무선 공격 도구(aircrack-ng suite)의 사용법을 학습한다
- 무선 네트워크 보안 강화 방안을 설계할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 무선 네트워크 인터페이스를 확인하라. 시스템에서 사용 가능한 네트워크 인터페이스를 나열하고, 무선 인터페이스가 있는지 확인하라.
  hint: iwconfig 또는 ip link show 명령을 사용한다
  category: recon
  points: 5
  answer: '🤖 프롬프트: 무선 네트워크 인터페이스를 확인해줘

    📎 참고 (CLI): ip link show && echo ''---'' && iwconfig 2>/dev/null || echo ''No
    wireless interfaces (expected in lab VM)'''
  answer_detail: iwconfig는 무선 인터페이스 정보를 표시한다. 실습 VM에는 물리 무선 카드가 없지만, 실전에서는 wlan0 등의
    무선 인터페이스를 Monitor 모드로 전환하여 패킷 캡처에 사용한다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: 무선 네트워크 인터페이스 식별 — ip link show 로 링크 레이어 인터페이스 나열 + iwconfig 로 무선 인터페이스
        존재 여부 확인. 실습 VM 은 물리 무선 카드가 없어 No wireless interfaces 응답 예상, 실전에서는 wlan0 식별
        후 Monitor 모드 전환에 사용
      success_criteria:
      - ip link show 실행 + eth/lo 인터페이스 목록
      - '--- 구분자 + iwconfig 결과 (또는 No wireless interfaces)'
      - Monitor 모드 전환의 전제(무선 카드 존재)를 언급
      acceptable_methods:
      - ip link show + iwconfig
      - iw dev 로 무선 장치 나열
      - nmcli device + nmcli radio wifi
      - rfkill list 로 무선 차단 상태 확인
      negative_signs:
      - 무선 인터페이스 탐지 없이 이더넷만 나열
      - VM 환경의 무선 카드 부재 언급 없음
      - Monitor 모드 전환 목적 누락
  target_vm: attacker
  script: ip link show && echo '---' && iwconfig 2>/dev/null || echo 'No wireless
    interfaces (expected in lab VM)'
  risk_level: low
  bastion_prompt: '무선 네트워크 인터페이스를 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: Wi-Fi 보안 프로토콜의 발전 과정을 정리하라. WEP, WPA, WPA2, WPA3 각각의 암호화 방식과 취약점을 비교하라.
  hint: 각 프로토콜의 암호화 알고리즘과 주요 취약점을 나열한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Wi-Fi 보안 프로토콜의 발전 과정을 정리하라. WEP, WPA, WPA2, WPA3 각각의 암호화 방식과 취약점을
    비교해줘

    📎 참고 (CLI): echo -e ''=== Wi-Fi Security Protocols ===\n\n| Protocol | Year |
    Encryption | Key Mgmt | Known Vulnerabilities |\n|----------|------|-----------|----------|---------------------|\n|
    WEP | 1997 | RC4 (40/104-bit) | Static key | IV collision, FMS attack |\n| WPA
    | 2003 | TKIP (RC4) | PSK/EAP | TKIP weak, dictionary attack |\n| WPA2 | 2004
    | AES-CCMP | PSK/EAP | KRACK, dictionary on PSK |\n| WPA3 | 2018 | AES-GCMP |
    SAE(Dragonfly) | Dragonblood (patched) |\n\n[Summary]\n- WEP: BROKEN - never use\n-
    WPA: DEPRECATED - TKIP vulnerable\n- WPA2-PSK: Vulnerable to offline dictionary
    attack\n- WPA2-Enterprise: Strong (with proper RADIUS)\n- WPA3-SAE: Currently
    most secure'''
  answer_detail: Wi-Fi 보안은 WEP(완전히 깨진) -> WPA(개선, 여전히 취약) -> WPA2(현재 표준, PSK는 사전 공격
    가능) -> WPA3(SAE로 오프라인 사전 공격 방지)로 발전했다. WPA3-SAE의 Dragonfly 핸드셰이크는 오프라인 사전 공격을
    원천 차단한다.
  verify:
    type: output_contains
    expect: Wi-Fi Security Protocols
    field: stdout
    semantic:
      intent: Wi-Fi 보안 프로토콜 4세대 비교표 — WEP(1997 RC4 40/104bit, IV 충돌/FMS)·WPA(2003
        TKIP, dict)·WPA2(2004 AES-CCMP, KRACK·PSK dict)·WPA3(2018 AES-GCMP SAE Dragonfly,
        Dragonblood)의 암호화 방식·키 관리·알려진 취약점 정리
      success_criteria:
      - 4개 프로토콜(WEP/WPA/WPA2/WPA3) 모두 포함한 비교표 출력
      - 각 프로토콜별 암호화 알고리즘 (RC4/TKIP/AES-CCMP/AES-GCMP) 명시
      - 프로토콜별 대표 취약점(IV 충돌/TKIP·dict/KRACK/Dragonblood) 최소 1개씩 언급
      acceptable_methods:
      - echo -e 로 비교표 출력
      - markdown 표 형식으로 열 정렬
      - python tabulate 또는 rich.table 로 포맷팅
      - IEEE 802.11 표준 문서 인용
      negative_signs:
      - 3개 이하 프로토콜만 다룸
      - 암호화 알고리즘 누락 — 이름만 나열
      - WEP BROKEN / WPA3 가장 안전 같은 결론 없음
  target_vm: attacker
  script: 'echo -e ''=== Wi-Fi Security Protocols ===\n\n| Protocol | Year | Encryption
    | Key Mgmt | Known Vulnerabilities |\n|----------|------|-----------|----------|---------------------|\n|
    WEP | 1997 | RC4 (40/104-bit) | Static key | IV collision, FMS attack |\n| WPA
    | 2003 | TKIP (RC4) | PSK/EAP | TKIP weak, dictionary attack |\n| WPA2 | 2004
