lab_id: attack-ai-week10
title: 측면 이동 (Lateral Movement) - AI 지원
version: ai
course: attack-ai
week: 10
description: AI 에이전트를 활용하여 내부 네트워크 측면 이동을 자동화한다. SSH 터널링, 포트 포워딩을 AI가 관리하고 공격 경로를
  자동 매핑한다.
difficulty: hard
duration_minutes: 120
objectives:
- OpsClaw를 통해 측면 이동 작업을 자동화할 수 있다
- AI가 측면 이동 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 측면 이동의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpsClaw에 측면 이동 프로젝트를 생성하라.
  hint: OpsClaw API를 사용하여 측면 이동을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:8000/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"name":"측면_이동","request_text":"측면
    이동","master_mode":"external"}'''
  answer_detail: OpsClaw 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: opsclaw_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
