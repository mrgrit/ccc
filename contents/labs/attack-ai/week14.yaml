lab_id: attack-ai-week14
title: 소셜 엔지니어링 (Social Engineering) - AI 지원
version: ai
course: attack-ai
week: 14
description: AI 에이전트를 활용하여 소셜 엔지니어링 공격을 시뮬레이션한다. AI가 피싱 이메일을 분석하고, 공격 시나리오를 자동 생성한다.
difficulty: medium
duration_minutes: 120
objectives:
- CCC를 통해 소셜 엔지니어링 작업을 자동화할 수 있다
- AI가 소셜 엔지니어링 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 소셜 엔지니어링의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: CCC에 소셜 엔지니어링 프로젝트를 생성하라.
  hint: CCC API를 사용하여 소셜 엔지니어링을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:9100/api/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: ccc-api-key-2026'' -d ''{"name":"소셜_엔지니어링","request_text":"소셜
    엔지니어링","master_mode":"external"}'''
  answer_detail: CCC 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: ccc_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
