  hint: JWT 키 크래킹
  category: exploit
  points: 10
  answer: python3 -c "... try common JWT secrets ..."
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
