- order: 8
  instruction: AI에게 크리덴셜 스터핑을 자동화하도록 요청하라.
  hint: 크리덴셜 스터핑
  category: exploit
  points: 10
  answer: 'while IFS=: read email pw; do curl ... login ...; done < creds.txt'
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
