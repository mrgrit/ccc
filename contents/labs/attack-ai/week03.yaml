lab_id: attack-ai-week03
title: 취약점 스캐닝 (Vulnerability Scanning) - AI 지원
version: ai
course: attack-ai
week: 3
description: AI 에이전트를 활용하여 취약점 스캐닝을 자동화한다. Nikto, NSE 스크립트 결과를 AI가 분석하여 취약점을 분류하고
  위험도를 자동 평가한다.
difficulty: medium
duration_minutes: 120
objectives:
- AI 기반 자동 취약점 스캐닝 파이프라인을 구축한다
- AI가 스캐너 결과를 분석하여 오탐을 줄이는 방법을 학습한다
- CVE 자동 매칭과 위험도 평가를 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 프로젝트 생성 후 Nikto 웹 스캔을 AI 에이전트에 요청하라.
  hint: dispatch로 nikto를 실행한다
  category: recon
  points: 10
  answer: nikto -h http://10.20.30.80:3000
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: nikto.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
  instruction: AI에게 Apache(포트 80)도 별도로 Nikto 스캔하도록 요청하라.
  hint: Apache 서버도 스캔한다
  category: recon
  points: 10
  answer: nikto -h http://10.20.30.80:80
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: nikto_apache.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 3
  instruction: execute-plan으로 searchsploit 검색을 병렬 수행하라. nodejs, apache 2.4를 검색하라.
  hint: 병렬 searchsploit 검색
  category: analysis
  points: 10
  answer: searchsploit nodejs && searchsploit apache 2.4
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: searchsploit_parallel.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 4
  instruction: AI에게 nmap http-sql-injection 스크립트를 실행하도록 요청하라.
  hint: SQL Injection 자동 탐지
  category: analysis
  points: 10
  answer: nmap --script http-sql-injection -p 3000 10.20.30.80
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: nse_sqli.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 5
  instruction: AI에게 JuiceShop의 보안 질문 API를 자동 분석하도록 요청하라.
  hint: 보안 질문 노출 분석
  category: analysis
  points: 10
  answer: curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m json.tool
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: api_security_questions.py
  verify:
