lab_id: attack-ai-week03
title: 취약점 스캐닝 (Vulnerability Scanning) (AI 지원)
version: ai
course: attack-ai
week: 3
description: 자동화된 취약점 스캐너와 수동 취약점 분석 기법을 학습한다. Nikto, searchsploit을 활용하여 웹 애플리케이션과 서비스의 취약점을 탐지하고, CVE
  데이터베이스를 조회하여 익스플로잇 가능성을 평가한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- Nikto를 사용하여 웹 서버 취약점을 스캔할 수 있다
- searchsploit으로 알려진 취약점의 익스플로잇을 검색할 수 있다
- CVE/CVSS 정보를 해석하여 위험도를 평가할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Nikto를 사용하여 {{WEB_IP}}:3000(JuiceShop) 웹 서버의 취약점을 스캔하라.
  hint: nikto -h 옵션으로 대상 호스트를 지정한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Nikto를 사용하여 10.20.30.80:3000(JuiceShop) 웹 서버의 취약점을 스캔해줘

    📎 참고 (CLI): nikto -h http://10.20.30.80:3000'
  answer_detail: Nikto는 오픈소스 웹 서버 취약점 스캐너로, 위험한 파일, 오래된 서버 소프트웨어, 보안 설정 미흡 등을 자동으로 검사한다. 6700개 이상의 잠재적
    문제를 확인할 수 있다.
  verify:
    type: output_contains
    expect: 'Server:'
    field: stdout
    semantic:
      intent: 취약점 스캐닝 (Vulnerability Scanning) 주제의 실습 스텝 — 해당 기법의 공격 명령 실행 또는 원리 실증
      success_criteria:
      - instruction 의 핵심 공격 기법 실행 또는 PoC 구성
      - 대상 VM 에 대한 결과 확인 (출력·응답·로그)
      - 해당 기법의 MITRE ATT&CK 기법 또는 CVE·도구 최소 1개 언급
      acceptable_methods:
      - <SENSITIVE:623a50469317aead>
      - 수동 payload 구성 (curl·python·netcat)
      - Burp Repeater / ffuf / wfuzz 등 웹 퍼저
      - defensor 관점에서 탐지 지표 제시도 인정
      negative_signs:
      - 실행 없이 개념 설명만
      - 대상 VM·결과 누락
      - 해당 주제(취약점 스캐닝 (Vulnerability Scanning))와 무관한 기법
  target_vm: attacker
  script: nikto -h http://10.20.30.80:3000
  risk_level: low
  bastion_prompt: Nikto를 사용하여 10.20.30.80:3000(JuiceShop) 웹 서버의 취약점을 스캔해줘
- order: 2
  instruction: Nikto를 사용하여 {{WEB_IP}}:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에 저장하라.
  hint: -o 옵션으로 출력 파일을 지정한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Nikto를 사용하여 10.20.30.80:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에 저장해줘

    📎 참고 (CLI): nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt && cat /tmp/nikto_apache.txt'
  answer_detail: 같은 호스트의 다른 포트에서 실행 중인 웹 서버도 별도로 스캔해야 한다. Apache와 Node.js는 서로 다른 취약점 패턴을 가지므로 각각 독립적으로
