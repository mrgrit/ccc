lab_id: attack-ai-week03
title: 취약점 스캐닝 (Vulnerability Scanning) (AI 지원)
version: ai
course: attack-ai
week: 3
description: 자동화된 취약점 스캐너와 수동 취약점 분석 기법을 학습한다. Nikto, searchsploit을 활용하여 웹 애플리케이션과
  서비스의 취약점을 탐지하고, CVE 데이터베이스를 조회하여 익스플로잇 가능성을 평가한다. AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- Nikto를 사용하여 웹 서버 취약점을 스캔할 수 있다
- searchsploit으로 알려진 취약점의 익스플로잇을 검색할 수 있다
- CVE/CVSS 정보를 해석하여 위험도를 평가할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Nikto를 사용하여 {{WEB_IP}}:3000(JuiceShop) 웹 서버의 취약점을 스캔하라.
  hint: nikto -h 옵션으로 대상 호스트를 지정한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Nikto를 사용하여 10.20.30.80:3000(JuiceShop) 웹 서버의 취약점을 스캔해줘

    📎 참고 (CLI): nikto -h http://10.20.30.80:3000'
  answer_detail: Nikto는 오픈소스 웹 서버 취약점 스캐너로, 위험한 파일, 오래된 서버 소프트웨어, 보안 설정 미흡 등을 자동으로
    검사한다. 6700개 이상의 잠재적 문제를 확인할 수 있다.
  verify:
    type: output_contains
    expect:
    - 'Server:'
    - Start
    - Server
    field: stdout
    semantic:
      intent: Nikto 로 JuiceShop(포트 3000) 웹 서버 취약점 스캔 — 6700+ 알려진 문제 패턴 자동 점검
      success_criteria:
      - nikto -h http://<IP>:3000 실행
      - '응답에 Server: 헤더와 발견 사항 최소 1개 (/OSVDB-xxxxx/ 또는 Interesting 라인)'
      - Nikto 한계(서명 기반·인증 없는 페이지 위주) 언급
      acceptable_methods:
      - nikto -h http://10.20.30.80:3000
      - nikto -h <url> -Tuning 1,2,3 (선택 체크)
      - wapiti -u <url>
      - skipfish -o /tmp/skipfish <url>
      negative_signs:
      - 포트 3000 대신 80 스캔
      - Nikto 실행 없이 개념 설명
      - Server 헤더 없고 발견사항 0이어도 해석 없이 종료
  target_vm: attacker
  script: nikto -h http://10.20.30.80:3000
  risk_level: low
  bastion_prompt: Nikto를 사용하여 10.20.30.80:3000(JuiceShop) 웹 서버의 취약점을 스캔해줘
- order: 2
  instruction: Nikto를 사용하여 {{WEB_IP}}:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장하라.
  hint: -o 옵션으로 출력 파일을 지정한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Nikto를 사용하여 10.20.30.80:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장해줘

    📎 참고 (CLI): nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt && cat /tmp/nikto_apache.txt'
  answer_detail: 같은 호스트의 다른 포트에서 실행 중인 웹 서버도 별도로 스캔해야 한다. Apache와 Node.js는 서로 다른 취약점
    패턴을 가지므로 각각 독립적으로 분석한다.
  verify:
    type: output_contains
    expect: nikto
    field: stdout
    semantic:
      intent: Apache(포트 80) Nikto 스캔 + 결과 파일(-o) 저장 — 동일 호스트의 다른 웹 서버 독립 점검
      success_criteria:
      - nikto -h http://<IP>:80 -o /tmp/nikto_apache.txt 실행
      - cat 으로 결과 파일 내용 확인
      - Apache vs Node.js 취약점 패턴 차이 언급
      acceptable_methods:
      - nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt
      - nikto -h <url> -Format htm -o <file>
      - wapiti -u <url> -o /tmp/wapiti (HTML 보고서)
      - arachni_console --url <url>
      negative_signs:
      - -o 없이 stdout 만
      - 포트 80 대신 3000 스캔
      - 결과 파일 저장 후 검증 없음
  target_vm: attacker
  script: nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt && cat /tmp/nikto_apache.txt
  risk_level: low
  bastion_prompt: Nikto를 사용하여 10.20.30.80:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장해줘
- order: 3
  instruction: searchsploit을 사용하여 'juice shop' 관련 알려진 익스플로잇을 검색하라.
  hint: searchsploit 키워드 형태로 검색한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: searchsploit을 사용하여 ''juice shop'' 관련 알려진 익스플로잇을 검색해줘

    📎 참고 (CLI): searchsploit juice shop'
  answer_detail: searchsploit은 Exploit-DB의 오프라인 검색 도구이다. 대상 소프트웨어에 대한 공개된 익스플로잇 코드를
    빠르게 찾을 수 있다. 검색 결과에 PoC 코드 경로가 표시된다.
  verify:
    type: output_contains
    expect: Exploit
    field: stdout
    semantic:
      intent: searchsploit 으로 Exploit-DB 오프라인 검색 — juice shop 관련 공개 익스플로잇 PoC 찾기
      success_criteria:
      - searchsploit juice shop 실행
      - 결과 테이블에 Exploit Title 컬럼과 경로 최소 1개
      - PoC 경로가 /usr/share/exploitdb 하위임을 설명
      acceptable_methods:
      - searchsploit juice shop
      - searchsploit -t juice
      - searchsploit --cve <CVE-ID>
      - Exploit-DB 웹(exploit-db.com) 검색
      negative_signs:
      - 검색 키워드 부적절 (juice 대신 JuiceShop 하이픈 없이)
      - 결과 없어도 대체 키워드 시도 없음
      - Exploit 컬럼 대신 Title 만 출력
  target_vm: attacker
  script: searchsploit juice shop
  risk_level: low
  bastion_prompt: searchsploit을 사용하여 'juice shop' 관련 알려진 익스플로잇을 검색해줘
- order: 4
  instruction: searchsploit으로 'node.js' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라.
  hint: searchsploit node.js 또는 nodejs로 검색한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: searchsploit으로 ''node.js'' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라해줘

    📎 참고 (CLI): searchsploit nodejs'
  answer_detail: 서비스 버전 탐지 결과(Node.js)를 기반으로 관련 익스플로잇을 검색한다. 버전별로 적용 가능한 취약점이 다르므로
    정확한 버전 매칭이 중요하다.
  verify:
    type: output_contains
    expect:
    - Title
    - //kr.archive.ubuntu.com/ubuntu
    - jammy
    field: stdout
    semantic:
      intent: Node.js 관련 searchsploit 검색 — JuiceShop 백엔드 런타임에 적용 가능한 익스플로잇 선별
      success_criteria:
      - searchsploit nodejs 실행
      - Title 컬럼과 Path 컬럼이 있는 결과 표 출력
      - Node 버전 매칭의 중요성 언급 (버전별 CVE 다름)
      acceptable_methods:
      - searchsploit nodejs
      - searchsploit node.js
      - searchsploit npm
      - NVD CVE 검색 (nvd.nist.gov) 대체
      negative_signs:
      - 다른 런타임(PHP/Java) 검색
      - 결과에서 JuiceShop 과 관련 있을 법한 CVE 지목 없음
      - 버전 매칭 원칙 언급 없음
  target_vm: attacker
  script: searchsploit nodejs
  risk_level: low
  bastion_prompt: searchsploit으로 'node.js' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라해줘
- order: 5
  instruction: nmap의 http-sql-injection 스크립트를 사용하여 {{WEB_IP}}:3000에 SQL Injection
    취약점이 있는지 스캔하라.
  hint: --script http-sql-injection 옵션을 사용한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: nmap의 http-sql-injection 스크립트를 사용하여 10.20.30.80:3000에 SQL Injection
    취약점이 있는지 스캔해줘

    📎 참고 (CLI): nmap --script http-sql-injection -p 3000 10.20.30.80'
  answer_detail: nmap의 http-sql-injection 스크립트는 웹 폼과 URL 파라미터에 SQL Injection 페이로드를
    자동으로 테스트한다. 전문 도구(SQLMap)보다 간단하지만 빠른 초기 탐색에 유용하다.
  verify:
    type: output_contains
    expect:
    - '3000'
    - Starting
    - https
    field: stdout
    semantic:
      intent: nmap http-sql-injection NSE — 웹 폼·URL 파라미터에 SQLi 페이로드 자동 테스트 (빠른 초기
        탐색)
      success_criteria:
      - nmap --script http-sql-injection -p 3000 <IP> 실행
      - 스크립트 출력에 Possible sqli 라인 또는 no exploits found 명시
      - NSE 와 sqlmap 의 역할 차이 언급
      acceptable_methods:
      - nmap --script http-sql-injection -p 3000 10.20.30.80
      - sqlmap -u <url>?id=1 --batch (정밀 도구)
      - Burp Active Scan
      - wapiti --module sql
      negative_signs:
      - --script 없이 일반 스캔
      - port 미지정
      - 결과 해석 없음
  target_vm: attacker
  script: nmap --script http-sql-injection -p 3000 10.20.30.80
  risk_level: low
  bastion_prompt: nmap의 http-sql-injection 스크립트를 사용하여 10.20.30.80:3000에 SQL Injection
    취약점이 있는지 스캔해줘
- order: 6
  instruction: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문 목록을
    확인하라. 이는 인증 공격에 활용할 수 있는 정보이다.
  hint: REST API에 GET 요청을 보내라
  category: analysis
  points: 10
  answer: '🤖 프롬프트: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문
    목록을 확인해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m
    json.tool'
  answer_detail: 보안 질문은 비밀번호 재설정에 사용되므로, 질문 내용이 노출되면 소셜 엔지니어링이나 OSINT로 답변을 추측할 수 있다.
    이는 인증 우회 공격의 사전 정보가 된다.
  verify:
    type: output_contains
    expect: question
    field: stdout
    semantic:
      intent: JuiceShop /api/SecurityQuestions 인증 없는 접근 — 보안 질문 목록 노출은 PW 재설정 공격의
        사전 정보
      success_criteria:
      - curl 로 /api/SecurityQuestions GET
      - JSON 응답에 question 필드 포함된 배열 (최소 3건)
      - 보안 질문 노출이 소셜 엔지니어링·OSINT 답변 추측으로 이어지는 위험 언급
      acceptable_methods:
      - curl -s <url>/api/SecurityQuestions | python3 -m json.tool
      - curl + jq .data[].question
      - python requests.get
      - Burp Repeater
      negative_signs:
      - 다른 엔드포인트 조회
      - question 필드 해석 없이 raw JSON 만
      - PW 재설정 공격 맥락 언급 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m json.tool
  risk_level: low
  bastion_prompt: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문 목록을
    확인해줘
- order: 7
  instruction: curl로 JuiceShop의 /api/Users 엔드포인트에 접근하여 사용자 정보가 노출되는지 확인하라.
  hint: 인증 없이 사용자 API에 접근을 시도하라
  category: analysis
  points: 10
  answer: '🤖 프롬프트: curl로 JuiceShop의 /api/Users 엔드포인트에 접근하여 사용자 정보가 노출되는지 확인해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -m json.tool |
    head -30'
  answer_detail: 사용자 목록 API가 인증 없이 접근 가능하면 Broken Access Control(OWASP A01) 취약점이다.
    사용자 이메일, ID 등의 정보가 노출되어 후속 공격(브루트포스, 피싱)에 활용될 수 있다.
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: JuiceShop /api/Users 인증 없는 사용자 목록 노출 — Broken Access Control(OWASP A01)
        실증, 이메일·id 유출 확인
      success_criteria:
      - curl 로 /api/Users 요청
      - JSON 응답에 email 필드와 최소 1개 사용자 항목
      - Broken Access Control / OWASP A01 또는 후속 공격(브루트포스·피싱) 활용 언급
      acceptable_methods:
      - curl -s <url>/api/Users | python3 -m json.tool
      - curl + jq .data[].email
      - Burp Autorize 로 권한 우회 자동 테스트
      - python requests.get 반복
      negative_signs:
      - 인증 토큰 포함 요청 (인증 없는 노출 확인 의도 벗어남)
      - email 필드 없고 종료
      - OWASP A01 맥락 언급 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/api/Users | python3 -m json.tool | head
    -30
  risk_level: low
  bastion_prompt: curl로 JuiceShop의 /api/Users 엔드포인트에 접근하여 사용자 정보가 노출되는지 확인해줘
- order: 8
  instruction: nmap의 ssl-enum-ciphers 스크립트를 사용하여 SIEM 서버({{SECU_IP}}00:443)의 SSL/TLS
    설정을 분석하라.
  hint: --script ssl-enum-ciphers 옵션을 사용한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: nmap의 ssl-enum-ciphers 스크립트를 사용하여 SIEM 서버(10.20.30.100:443)의 SSL/TLS
    설정을 분석해줘

    📎 참고 (CLI): nmap --script ssl-enum-ciphers -p 443 10.20.30.100'
  answer_detail: SSL/TLS 설정 분석은 암호화 강도를 평가하는 중요한 보안 점검이다. 약한 암호 스위트(RC4, DES), 구버전
    프로토콜(SSLv3, TLS 1.0)이 사용되면 중간자 공격에 취약하다.
  verify:
    type: output_contains
    expect: TLS
    field: stdout
    semantic:
      intent: ssl-enum-ciphers NSE — Wazuh 443 의 SSL/TLS 프로토콜·cipher suite·grade 점검
        (SSLv3/RC4/DES 같은 약한 요소 식별)
      success_criteria:
      - nmap --script ssl-enum-ciphers -p 443 <SIEM_IP> 실행
      - 출력에 TLS 버전·cipher suites·least strength(grade) 표시
      - 약한 요소 1개 식별 또는 전부 강력함 판정
      acceptable_methods:
      - nmap --script ssl-enum-ciphers -p 443 10.20.30.100
      - sslscan <host>:443
      - testssl.sh <host>:443
      - openssl s_client -connect <host>:443 -cipher ...
      negative_signs:
      - --script 없이 단순 포트 스캔
      - TLS 프로토콜 결과 해석 없음
      - 약한 cipher 의 공격 시나리오(BEAST/POODLE/Sweet32) 언급 없음
  target_vm: attacker
  script: nmap --script ssl-enum-ciphers -p 443 10.20.30.100
  risk_level: low
  bastion_prompt: nmap의 ssl-enum-ciphers 스크립트를 사용하여 SIEM 서버(10.20.30.100:443)의 SSL/TLS
    설정을 분석해줘
- order: 9
  instruction: JuiceShop의 /rest/products/search?q= 엔드포인트에 특수문자(')를 포함한 검색어를 보내 에러
    메시지를 유발하라.
  hint: URL 인코딩된 작은따옴표(%27)를 사용하라
  category: analysis
  points: 10
  answer: '🤖 프롬프트: JuiceShop의 /rest/products/search?q= 엔드포인트에 특수문자('')를 포함한 검색어를 보내
    에러 메시지를 유발해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=%27'' | python3
    -m json.tool'
  answer_detail: 에러 메시지에 SQL 문법, 스택 트레이스, 데이터베이스 정보 등이 포함되면 SQL Injection 취약점의 강력한
    징후이다. 상세한 에러 메시지 노출은 Information Disclosure 취약점이기도 하다.
  verify:
    type: output_contains
    expect: error
    field: stdout
    semantic:
      intent: JuiceShop 검색 파라미터에 URL 인코딩된 apostrophe (%27) 주입 — SQL 에러 메시지 유발해 SQLi
        징후 확인
      success_criteria:
      - curl 로 /rest/products/search?q=%27 요청
