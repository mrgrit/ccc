lab_id: attack-ai-week03
title: 취약점 스캐닝 (Vulnerability Scanning) (AI 지원)
version: ai
course: attack-ai
week: 3
description: 자동화된 취약점 스캐너와 수동 취약점 분석 기법을 학습한다. Nikto, searchsploit을 활용하여 웹 애플리케이션과
  서비스의 취약점을 탐지하고, CVE 데이터베이스를 조회하여 익스플로잇 가능성을 평가한다. AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- Nikto를 사용하여 웹 서버 취약점을 스캔할 수 있다
- searchsploit으로 알려진 취약점의 익스플로잇을 검색할 수 있다
- CVE/CVSS 정보를 해석하여 위험도를 평가할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Nikto를 사용하여 {{WEB_IP}}:3000(JuiceShop) 웹 서버의 취약점을 스캔하라.
  hint: |
    nikto -h 옵션으로 대상 호스트를 지정한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: nikto -h http://10.20.30.80:3000
    2) 미설치 시: sudo apt install -y nikto
    3) 실패/대안:
       - nuclei -u http://10.20.30.80:3000 -severity critical,high (6000+ template)
       - sudo nmap --script=vuln,http-vuln-* -p 3000 10.20.30.80
       - wapiti -u http://10.20.30.80:3000 (Python OWASP)
       - skipfish -o /tmp/skipfish (Google)
       - w3af_console (200+ plugin)
       - OWASP ZAP baseline scan
       - arachni (Ruby)
    4) 검증: Server: 헤더 + + 발견 라인.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Nikto를 사용하여 10.20.30.80:3000(JuiceShop) 웹 서버의 취약점을 스캔해줘

    📎 참고 (CLI): nikto -h http://10.20.30.80:3000'
  answer_detail: Nikto는 오픈소스 웹 서버 취약점 스캐너로, 위험한 파일, 오래된 서버 소프트웨어, 보안 설정 미흡 등을 자동으로
    검사한다. 6700개 이상의 잠재적 문제를 확인할 수 있다.
  verify:
    type: output_contains
    expect:
    - 'Server:'
    - Start
    - Server
    field: stdout
    semantic:
      intent: Nikto 로 JuiceShop(포트 3000) 웹 서버 취약점 스캔 — 6700+ 알려진 문제 패턴 자동 점검
      success_criteria:
      - nikto -h http://<IP>:3000 실행
      - '응답에 Server: 헤더와 발견 사항 최소 1개 (/OSVDB-xxxxx/ 또는 Interesting 라인)'
      - Nikto 한계(서명 기반·인증 없는 페이지 위주) 언급
      acceptable_methods:
      - "nikto -h (수기 baseline): 6700+ 잠재 문제 자동."
      - "nuclei -severity: 6000+ template + CVE."
      - "nmap --script=vuln NSE: 표준."
      - "wapiti: Python OWASP."
      - "skipfish: Google 빠름."
      - "w3af_console: 200+ plugin."
      - "OWASP ZAP baseline: 무료."
      - "arachni: Ruby 종합."
      - "Burp Pro Active Scan: 상용."
      negative_signs:
      - nikto 미실행 또는 다른 IP/포트
      - 결과의 OSVDB ID/Interesting 라인 해석 없음
      - 단순 출력 후 의미 분석 누락
      negative_signs:
      - 포트 3000 대신 80 스캔
      - Nikto 실행 없이 개념 설명
      - Server 헤더 없고 발견사항 0이어도 해석 없이 종료
  target_vm: attacker
  script: nikto -h http://10.20.30.80:3000
  risk_level: low
  bastion_prompt: Nikto를 사용하여 10.20.30.80:3000(JuiceShop) 웹 서버의 취약점을 스캔해줘
- order: 2
  instruction: Nikto를 사용하여 {{WEB_IP}}:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장하라.
  hint: |
    -o 옵션으로 출력 파일을 지정한다.

    📎 도구 우선순위 (힌트):
    1) 우선: nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt
    2) 미설치: sudo apt install -y nikto
    3) 실패/대안:
       - nikto -Format html/xml/json/csv -o /tmp/nikto.<ext>
       - nikto -Tuning 9 (SSL/TLS 추가)
       - nuclei -o /tmp/nuclei.txt
       - nmap --script=vuln -oN /tmp/nmap_vuln.txt
    4) 검증: Apache 전용 finding (mod_status/ServerSignature).
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Nikto를 사용하여 10.20.30.80:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장해줘

    📎 참고 (CLI): nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt && cat /tmp/nikto_apache.txt'
  answer_detail: 같은 호스트의 다른 포트에서 실행 중인 웹 서버도 별도로 스캔해야 한다. Apache와 Node.js는 서로 다른 취약점
    패턴을 가지므로 각각 독립적으로 분석한다.
  verify:
    type: output_contains
    expect: nikto
    field: stdout
    semantic:
      intent: Apache(포트 80) Nikto 스캔 + 결과 파일(-o) 저장 — 동일 호스트의 다른 웹 서버 독립 점검
      success_criteria:
      - nikto -h http://<IP>:80 -o /tmp/nikto_apache.txt 실행
      - cat 으로 결과 파일 내용 확인
      - Apache vs Node.js 취약점 패턴 차이 언급
      acceptable_methods:
      - "nikto -h -o (수기 baseline): Apache 전용 finding."
      - "nikto -Format html/xml/json/csv: 다양한 포맷."
      - "nikto -Tuning 9: SSL/TLS."
      - "nuclei -o: 대안."
      - "nmap --script=vuln -oN: NSE."
      - "OWASP ZAP report: HTML/PDF."
      - "wapiti -f json -o: Python."
      - "Burp Pro report: 상용."
      - "DefectDojo Engagement: import."
      negative_signs:
      - -o 출력 옵션 누락
      - 80 포트 미지정 (3000으로 잘못)
      - 결과 분석 누락
      negative_signs:
      - -o 없이 stdout 만
      - 포트 80 대신 3000 스캔
      - 결과 파일 저장 후 검증 없음
  target_vm: attacker
  script: nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt && cat /tmp/nikto_apache.txt
  risk_level: low
  bastion_prompt: Nikto를 사용하여 10.20.30.80:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장해줘
- order: 3
  instruction: searchsploit을 사용하여 'juice shop' 관련 알려진 익스플로잇을 검색하라.
  hint: |
    searchsploit 키워드 형태로 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선: searchsploit juice shop
    2) 미설치: sudo apt install -y exploitdb
    3) 실패/대안:
       - searchsploit -t "juice shop" (정확)
       - NVD API: curl + jq
       - Vulners API
       - msfconsole search type:exploit
       - github CVE 검색
       - exploit-db.com 웹
    4) 후속: searchsploit -m <id> (PoC 다운). -p <id> (경로).
  category: analysis
  points: 10
  answer: '🤖 프롬프트: searchsploit을 사용하여 ''juice shop'' 관련 알려진 익스플로잇을 검색해줘

    📎 참고 (CLI): searchsploit juice shop'
  answer_detail: searchsploit은 Exploit-DB의 오프라인 검색 도구이다. 대상 소프트웨어에 대한 공개된 익스플로잇 코드를
    빠르게 찾을 수 있다. 검색 결과에 PoC 코드 경로가 표시된다.
  verify:
    type: output_contains
    expect: Exploit
    field: stdout
    semantic:
      intent: searchsploit 으로 Exploit-DB 오프라인 검색 — juice shop 관련 공개 익스플로잇 PoC 찾기
      success_criteria:
      - searchsploit juice shop 실행
      - 결과 테이블에 Exploit Title 컬럼과 경로 최소 1개
      - PoC 경로가 /usr/share/exploitdb 하위임을 설명
      acceptable_methods:
      - "searchsploit (수기 baseline): Title + Path."
      - "searchsploit -t: 정확 매칭."
      - "searchsploit --cve: CVE 번호."
      - "NVD API: jq."
      - "Vulners API: 1M+."
      - "Metasploit search: type:exploit."
      - "github 검색: PoC."
      - "cve-search-tool: 자체 DB."
      - "Exploit-DB 웹."
      negative_signs:
      - searchsploit 미실행 또는 다른 키워드
      - 결과의 PoC 경로/CVE ID 해석 없음
      - 단순 출력 후 활용 맥락 누락
      negative_signs:
      - 검색 키워드 부적절 (juice 대신 JuiceShop 하이픈 없이)
      - 결과 없어도 대체 키워드 시도 없음
      - Exploit 컬럼 대신 Title 만 출력
  target_vm: attacker
  script: searchsploit juice shop
  risk_level: low
  bastion_prompt: searchsploit을 사용하여 'juice shop' 관련 알려진 익스플로잇을 검색해줘
- order: 4
  instruction: searchsploit으로 'node.js' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라.
  hint: |
    searchsploit node.js 또는 nodejs로 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선: searchsploit nodejs
    2) 미설치: sudo apt install -y exploitdb
    3) 실패/대안:
       - searchsploit -t "node.js"
       - searchsploit express (프레임워크)
       - NVD API CPE: cpe:2.3:a:nodejs:node.js
       - npm audit (실 프로젝트)
       - Snyk: snyk test
       - Vulners search
    4) 검증: Title + Path. 버전 매칭 핵심.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: searchsploit으로 ''node.js'' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라해줘

    📎 참고 (CLI): searchsploit nodejs'
  answer_detail: 서비스 버전 탐지 결과(Node.js)를 기반으로 관련 익스플로잇을 검색한다. 버전별로 적용 가능한 취약점이 다르므로
    정확한 버전 매칭이 중요하다.
  verify:
    type: output_contains
    expect:
    - Title
    - //kr.archive.ubuntu.com/ubuntu
    - jammy
    field: stdout
    semantic:
      intent: Node.js 관련 searchsploit 검색 — JuiceShop 백엔드 런타임에 적용 가능한 익스플로잇 선별
      success_criteria:
      - searchsploit nodejs 실행
      - Title 컬럼과 Path 컬럼이 있는 결과 표 출력
      - Node 버전 매칭의 중요성 언급 (버전별 CVE 다름)
      acceptable_methods:
      - "searchsploit nodejs (수기 baseline): Title + Path."
      - "searchsploit -t: 정확."
      - "searchsploit express: 프레임워크."
      - "searchsploit npm."
      - "NVD CPE 검색."
      - "npm audit: package.json."
      - "Snyk: snyk test."
      - "Vulners API."
      - "Metasploit search."
      negative_signs:
      - searchsploit 미실행
      - Node.js 버전 매칭 누락
      - 검색 결과 활용 맥락 없음
      negative_signs:
      - 다른 런타임(PHP/Java) 검색
      - 결과에서 JuiceShop 과 관련 있을 법한 CVE 지목 없음
      - 버전 매칭 원칙 언급 없음
  target_vm: attacker
  script: searchsploit nodejs
  risk_level: low
  bastion_prompt: searchsploit으로 'node.js' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라해줘
- order: 5
  instruction: nmap의 http-sql-injection 스크립트를 사용하여 {{WEB_IP}}:3000에 SQL Injection
    취약점이 있는지 스캔하라.
  hint: |
    --script http-sql-injection 옵션을 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: nmap --script http-sql-injection -p 3000 10.20.30.80
    2) 미설치: sudo apt install -y nmap
    3) 실패/대안:
       - sqlmap -u "http://10.20.30.80:3000/rest/products/search?q=" --batch (가장 정밀)
       - sqlmap --crawl=2 --batch (자동 crawl)
       - nuclei -t vulnerabilities/sql/
       - Burp Pro Active Scan SQLi
       - OWASP ZAP Active Scan
       - wapiti -m sql
    4) 검증: VULNERABLE + payload + DB extract.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: nmap의 http-sql-injection 스크립트를 사용하여 10.20.30.80:3000에 SQL Injection
    취약점이 있는지 스캔해줘

    📎 참고 (CLI): nmap --script http-sql-injection -p 3000 10.20.30.80'
  answer_detail: nmap의 http-sql-injection 스크립트는 웹 폼과 URL 파라미터에 SQL Injection 페이로드를
    자동으로 테스트한다. 전문 도구(SQLMap)보다 간단하지만 빠른 초기 탐색에 유용하다.
  verify:
    type: output_contains
    expect:
    - '3000'
    - Starting
    - https
    field: stdout
    semantic:
      intent: nmap http-sql-injection NSE — 웹 폼·URL 파라미터에 SQLi 페이로드 자동 테스트 (빠른 초기
        탐색)
      success_criteria:
      - nmap --script http-sql-injection -p 3000 <IP> 실행
      - 스크립트 출력에 Possible sqli 라인 또는 no exploits found 명시
      - NSE 와 sqlmap 의 역할 차이 언급
      acceptable_methods:
      - "nmap --script http-sql-injection (수기 baseline): NSE 자동."
      - "sqlmap --batch: 가장 정밀."
      - "sqlmap --crawl=2: 자동 crawl."
      - "nuclei vulnerabilities/sql/: template."
      - "Burp Pro Active Scan: 상용."
      - "OWASP ZAP Active Scan: 무료."
      - "wapiti -m sql: Python."
      - "수동 curl: %27/UNION."
      - "Ghauri: GitHub modern."
      negative_signs:
      - http-sql-injection 누락
      - 결과의 SQLi 페이로드/취약점 해석 없음
      - 단순 출력 후 활용 누락
      negative_signs:
      - --script 없이 일반 스캔
      - port 미지정
      - 결과 해석 없음
  target_vm: attacker
  script: nmap --script http-sql-injection -p 3000 10.20.30.80
  risk_level: low
  bastion_prompt: nmap의 http-sql-injection 스크립트를 사용하여 10.20.30.80:3000에 SQL Injection
    취약점이 있는지 스캔해줘
- order: 6
  instruction: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문 목록을
    확인하라. 이는 인증 공격에 활용할 수 있는 정보이다.
  hint: |
    REST API에 GET 요청을 보내라.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m json.tool
    2) 미설치: sudo apt install -y curl python3
    3) 실패/대안:
       - curl + jq '.data[]'
       - http GET (httpie)
       - Python urllib + json
       - Burp Repeater
       - Postman
       - katana endpoint
    4) 후속: 질문 답변 → OSINT (직원 SNS) → 인증 우회.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문
    목록을 확인해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m
    json.tool'
  answer_detail: 보안 질문은 비밀번호 재설정에 사용되므로, 질문 내용이 노출되면 소셜 엔지니어링이나 OSINT로 답변을 추측할 수 있다.
    이는 인증 우회 공격의 사전 정보가 된다.
  verify:
    type: output_contains
    expect: question
    field: stdout
    semantic:
      intent: JuiceShop /api/SecurityQuestions 인증 없는 접근 — 보안 질문 목록 노출은 PW 재설정 공격의
        사전 정보
      success_criteria:
      - curl 로 /api/SecurityQuestions GET
      - JSON 응답에 question 필드 포함된 배열 (최소 3건)
      - 보안 질문 노출이 소셜 엔지니어링·OSINT 답변 추측으로 이어지는 위험 언급
      acceptable_methods:
      - "curl + json.tool (수기 baseline): question 필드."
      - "curl + jq: 더 간결."
      - "httpie GET: modern."
      - "Python urllib: 의존성 zero."
      - "Burp Repeater: manual."
      - "Postman: GUI."
      - "katana: endpoint discovery."
      - "OSINT 후속: theHarvester + SNS."
      - "Bastion AI: 질문 ↔ SNS 매칭 자동."
      negative_signs:
      - SecurityQuestions API 누락
      - JSON 파싱 없이 raw
      - OSINT 활용 맥락 없음
      negative_signs:
      - 다른 엔드포인트 조회
      - question 필드 해석 없이 raw JSON 만
      - PW 재설정 공격 맥락 언급 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m json.tool
  risk_level: low
  bastion_prompt: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문 목록을
    확인해줘
- order: 7
