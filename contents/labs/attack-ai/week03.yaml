    expect: result
    field: stdout
- order: 6
  instruction: AI에게 사용자 정보 API(/api/Users)의 접근 제어 취약점을 분석하도록 요청하라.
  hint: 사용자 API 노출 분석
  category: analysis
  points: 10
  answer: curl -s http://10.20.30.80:3000/api/Users | python3 -m json.tool | head
    -30
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: api_users_analysis.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 7
  instruction: AI에게 SSL/TLS 설정을 분석하도록 nmap ssl-enum-ciphers를 실행하라.
  hint: SSL/TLS 분석
  category: analysis
  points: 10
  answer: nmap --script ssl-enum-ciphers -p 443 10.20.30.100
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: ssl_analysis.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 8
  instruction: AI에게 에러 기반 SQLi 탐지를 수행하도록 요청하라. 특수문자를 포함한 검색어를 테스트하라.
  hint: 에러 기반 SQLi 탐지
  category: exploit
  points: 10
  answer: curl -s 'http://10.20.30.80:3000/rest/products/search?q=%27'
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
