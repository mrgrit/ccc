lab_id: attack-ai-week02
title: 포트스캐닝 기초 (Port Scanning) (AI 지원)
version: ai
course: attack-ai
week: 2
description: nmap의 다양한 스캔 기법(TCP Connect, SYN, UDP, 스텔스 스캔)을 학습하고, 서비스 버전 탐지 및 OS 핑거프린팅을 수행한다. 스캔 결과를
  분석하여 공격 표면을 도출한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- nmap의 주요 스캔 유형(TCP Connect, SYN, UDP)의 원리를 이해한다
- 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 수행할 수 있다
- 스캔 결과를 XML/JSON으로 저장하고 분석할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap을 사용하여 {{WEB_IP}}의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행하라.
  hint: nmap의 기본 스캔은 TCP Connect 스캔이다
  category: recon
  points: 5
  answer: '🤖 프롬프트: nmap을 사용하여 10.20.30.80의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행해줘

    📎 참고 (CLI): nmap -sT 10.20.30.80'
  answer_detail: TCP Connect 스캔(-sT)은 OS의 connect() 시스템 콜을 사용하여 완전한 TCP 3-way handshake를 수행한다. root 권한이
    필요 없지만, 연결 로그가 남아 탐지되기 쉽다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: nmap TCP Connect 스캔(-sT) — OS connect() 시스템 콜로 완전한 3-way handshake 수행, 기본 Top 1000 포트
      success_criteria:
      - nmap -sT <IP> 명령 실행
      - 결과에 PORT STATE SERVICE 테이블과 최소 1개 open 포트
      - 연결 로그가 남는 non-stealth 방식임을 인지
      acceptable_methods:
      - nmap -sT 10.20.30.80
      - nmap --top-ports 1000 -sT <IP>
      - python3 socket.connect_ex 반복 구현
      - unicornscan -m T -Ir 160 <IP>
      negative_signs:
      - -sS SYN 스캔으로 대체 수행 (의도 벗어남)
      - 특정 포트만 -p 로 지정해 Top 1000 스캔 안 함
      - 결과에 open 포트 없고 해석도 없음
  target_vm: attacker
  script: nmap -sT 10.20.30.80
  risk_level: low
  bastion_prompt: nmap을 사용하여 10.20.30.80의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행해줘
- order: 2
  instruction: sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 {{WEB_IP}}의 열린 포트를 확인하라.
  hint: SYN 스캔은 -sS 옵션이며 root 권한이 필요하다
  category: recon
  points: 10
  answer: '🤖 프롬프트: sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 10.20.30.80의 열린 포트를 확인해줘

    📎 참고 (CLI): sudo nmap -sS 10.20.30.80'
  answer_detail: SYN 스캔(-sS)은 TCP handshake를 완료하지 않고 SYN-ACK 응답만 확인하는 스텔스 스캔이다. 연결이 완성되지 않아 로그에 남지 않는
    경우가 많으며, 가장 널리 사용되는 스캔 기법이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: SYN Half-open 스캔(-sS) — root 권한으로 SYN-ACK 만 확인 후 RST 로 연결 중단, 로그 미기록의 스텔스 기법
      success_criteria:
      - sudo nmap -sS <IP> 실행
      - open 포트 목록 출력
      - SYN 과 Connect 스캔의 로그 차이 언급 (stealth 속성)
      acceptable_methods:
      - sudo nmap -sS 10.20.30.80
      - hping3 -S -p <port> <IP> 단일 포트 SYN
      - masscan --rate 1000 10.20.30.80
      - scapy 로 수동 SYN 패킷 생성
      negative_signs:
      - sudo 없이 실행해 TCP Connect 로 강등됨
      - open 결과 없이 종료
      - 스텔스 원리 언급 없음
  target_vm: attacker
  script: sudo nmap -sS 10.20.30.80
  risk_level: low
  bastion_prompt: sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 10.20.30.80의 열린 포트를 확인해줘
- order: 3
  instruction: '{{WEB_IP}}에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행하라. 속도를 위해 T4 타이밍을 사용하라.'
  hint: -p- 옵션은 전체 포트 범위를 의미한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 10.20.30.80에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행해줘

    📎 참고 (CLI): sudo nmap -sS -p- -T4 10.20.30.80'
  answer_detail: 전체 포트 스캔(-p-)은 기본 1000개 포트 외에 숨겨진 서비스를 발견할 수 있다. T4 타이밍은 공격적인 속도 설정으로, 실습 환경에서 스캔 시간을
    단축한다. 실전에서는 IDS/IPS 탐지를 피하기 위해 낮은 타이밍을 사용한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 전체 포트(1-65535) 범위 SYN 스캔 + T4 타이밍 — 숨겨진 비표준 포트 탐색
      success_criteria:
      - sudo nmap -sS -p- 또는 -p 1-65535 실행
      - T3 이상 타이밍 적용(-T4 권장)
      - 기본 Top 1000 에 없는 포트 최소 1개 발견 또는 전체 스캔 완료 확인
      acceptable_methods:
      - sudo nmap -sS -p- -T4 <IP>
      - masscan -p1-65535 --rate 10000 <IP>
      - rustscan -a <IP> -r 1-65535
      - unicornscan -mT -Ir 1000 -p 1-65535 <IP>
      negative_signs:
      - 기본 1000 포트만 스캔
      - 타이밍 T1/T2 로 너무 느림 (실습 시간 초과)
      - 완료 전 Ctrl+C 로 중단
  target_vm: attacker
  script: sudo nmap -sS -p- -T4 10.20.30.80
  risk_level: low
  bastion_prompt: 10.20.30.80에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행해줘
- order: 4
  instruction: 서비스 버전 탐지(-sV)를 수행하여 {{WEB_IP}}에서 실행 중인 서비스의 이름과 버전을 식별하라.
  hint: -sV 옵션은 서비스 프로브를 전송하여 버전 정보를 수집한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 서비스 버전 탐지(-sV)를 수행하여 10.20.30.80에서 실행 중인 서비스의 이름과 버전을 식별해줘

    📎 참고 (CLI): sudo nmap -sV 10.20.30.80'
  answer_detail: 서비스 버전 탐지(-sV)는 열린 포트에 다양한 프로브를 전송하여 실행 중인 서비스의 정확한 이름과 버전을 식별한다. 이 정보로 CVE 데이터베이스에서
    알려진 취약점을 검색할 수 있다.
  verify:
    type: output_contains
    expect: VERSION
    field: stdout
    semantic:
      intent: 서비스 버전 탐지(-sV) — 열린 포트에 프로브 전송해 서비스명·버전 식별 (CVE 매핑 용도)
      success_criteria:
      - sudo nmap -sV <IP> 실행
      - 결과 테이블에 VERSION 컬럼과 구체 버전(예 nginx 1.18.0) 최소 1개
      - 버전 기반 CVE 조회 가능성 또는 CPE 언급
      acceptable_methods:
      - sudo nmap -sV 10.20.30.80
      - nmap -sV --version-intensity 5 <IP>
      - amap -bqv <IP> <port>
      - whatweb <url> (웹 포트 한정)
      negative_signs:
      - -sV 없이 포트 상태만 확인
      - VERSION 컬럼 비어있어도 그냥 종료
      - CVE 활용 가능성 언급 없음
  target_vm: attacker
  script: sudo nmap -sV 10.20.30.80
  risk_level: low
  bastion_prompt: 서비스 버전 탐지(-sV)를 수행하여 10.20.30.80에서 실행 중인 서비스의 이름과 버전을 식별해줘
- order: 5
  instruction: OS 핑거프린팅(-O)을 수행하여 {{WEB_IP}}의 운영체제를 추정하라.
  hint: -O 옵션은 root 권한이 필요하다
  category: recon
  points: 10
  answer: '🤖 프롬프트: OS 핑거프린팅(-O)을 수행하여 10.20.30.80의 운영체제를 추정해줘

    📎 참고 (CLI): sudo nmap -O 10.20.30.80'
  answer_detail: OS 핑거프린팅(-O)은 TCP/IP 스택의 특성(TTL, 윈도우 크기, 옵션 순서 등)을 분석하여 운영체제를 추정한다. 정확한 OS 정보는 커널 익스플로잇
    선택에 핵심적이다.
  verify:
    type: output_contains
    expect: OS
    field: stdout
    semantic:
      intent: OS fingerprinting(-O) — TCP/IP 스택 특성으로 운영체제 추정
      success_criteria:
      - sudo nmap -O <IP> 실행
      - 결과에 OS details 또는 Running 섹션에 추정 OS 언급 (Linux/Windows/BSD 등)
      - CPE/Aggressive OS guesses 해석
      acceptable_methods:
      - sudo nmap -O 10.20.30.80
      - sudo nmap -A <IP> (-O + -sV + -sC + traceroute)
      - p0f 수동 피델리티 분석
      - xprobe2 <IP>
      negative_signs:
      - -O 없이 실행
      - OS details 비어있어도 해석 없이 종료
      - 열린 포트 없어 fingerprint 불가한데 대체 시도 없음
  target_vm: attacker
  script: sudo nmap -O 10.20.30.80
  risk_level: low
  bastion_prompt: OS 핑거프린팅(-O)을 수행하여 10.20.30.80의 운영체제를 추정해줘
- order: 6
  instruction: UDP 스캔을 수행하여 {{WEB_IP}}의 상위 20개 UDP 포트 상태를 확인하라.
  hint: -sU 옵션으로 UDP 스캔을 수행하고 --top-ports로 상위 포트를 지정한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: UDP 스캔을 수행하여 10.20.30.80의 상위 20개 UDP 포트 상태를 확인해줘

    📎 참고 (CLI): sudo nmap -sU --top-ports 20 10.20.30.80'
  answer_detail: UDP 스캔(-sU)은 TCP와 달리 handshake가 없어 응답이 느리고 결과가 불확실할 수 있다. DNS(53), SNMP(161), DHCP(67/68)
    등 중요한 서비스가 UDP를 사용하므로 반드시 확인해야 한다.
  verify:
    type: output_contains
    expect: PORT
    field: stdout
    semantic:
      intent: UDP 스캔(-sU) Top 20 — TCP 에 없는 DNS(53)·SNMP(161)·DHCP(67·68) 등 UDP 서비스 탐지
      success_criteria:
      - sudo nmap -sU --top-ports 20 <IP> 실행
      - 결과에 PORT STATE SERVICE 테이블 + UDP 컬럼
      - open|filtered 상태의 UDP 포트 최소 1개 해석 또는 모두 closed 시 그 의미 해석
      acceptable_methods:
      - sudo nmap -sU --top-ports 20 10.20.30.80
      - sudo nmap -sU -p 53,161,123,67,68 <IP>
      - unicornscan -mU -Ir 160 <IP>
      - amap -U <IP> <port>
      negative_signs:
      - -sT / -sS 수행 (TCP)
      - --top-ports 누락해 전 UDP 범위 시도 (느림)
      - open|filtered 의 의미 해석 없음
  target_vm: attacker
  script: sudo nmap -sU --top-ports 20 10.20.30.80
  risk_level: low
  bastion_prompt: UDP 스캔을 수행하여 10.20.30.80의 상위 20개 UDP 포트 상태를 확인해줘
- order: 7
  instruction: nmap 스크립트 엔진(NSE)의 기본 스크립트를 사용하여 {{WEB_IP}}을 스캔하라.
  hint: -sC 옵션은 기본 NSE 스크립트를 실행한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap 스크립트 엔진(NSE)의 기본 스크립트를 사용하여 10.20.30.80을 스캔해줘

    📎 참고 (CLI): sudo nmap -sC -sV 10.20.30.80'
  answer_detail: NSE(Nmap Scripting Engine)는 Lua 스크립트를 사용하여 취약점 탐지, 정보 수집, 브루트포스 등을 자동화한다. -sC는 default
    카테고리의 안전한 스크립트를 실행한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: NSE 기본 스크립트(-sC) 실행 — default 카테고리 Lua 스크립트로 정보 수집·취약점 지문 자동 수행
      success_criteria:
      - sudo nmap -sC -sV <IP> 실행
      - '응답에 | script-name: 형태의 NSE 결과 최소 1개'
      - -sV 결합으로 버전 탐지도 동시 수행
      acceptable_methods:
      - sudo nmap -sC -sV 10.20.30.80
      - sudo nmap --script default <IP>
      - 'sudo nmap -A <IP> (comprehensive: OS+version+scripts+traceroute)'
      - --script=banner,ssl-cert,http-title 등 개별 선택
      negative_signs:
      - -sC 없이 포트 상태만
      - default 외 다른 카테고리(vuln/exploit) 임의 적용
      - NSE 결과 해석 없이 raw 출력만
  target_vm: attacker
  script: sudo nmap -sC -sV 10.20.30.80
  risk_level: low
  bastion_prompt: nmap 스크립트 엔진(NSE)의 기본 스크립트를 사용하여 10.20.30.80을 스캔해줘
- order: 8
  instruction: nmap의 http-enum 스크립트를 사용하여 {{WEB_IP}}:3000의 웹 디렉토리를 열거하라.
  hint: --script http-enum 옵션을 사용하고 포트를 지정한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap의 http-enum 스크립트를 사용하여 10.20.30.80:3000의 웹 디렉토리를 열거해줘

    📎 참고 (CLI): nmap --script http-enum -p 3000 10.20.30.80'
  answer_detail: http-enum 스크립트는 알려진 웹 경로(관리자 페이지, 설정 파일, 백업 등)에 대한 요청을 보내 존재하는 디렉토리와 파일을 열거한다. 디렉토리 브루트포싱의
    빠른 대안이 된다.
  verify:
    type: output_contains
    expect: '3000'
    field: stdout
    semantic:
      intent: http-enum NSE — 알려진 웹 경로(관리자·백업·설정)에 HTTP 요청 보내 존재하는 디렉터리·파일 자동 열거
      success_criteria:
      - nmap --script http-enum -p 3000 <IP> 실행
      - 응답에 /admin, /api-docs 등 디렉터리 최소 1개 발견 또는 http-enum 스크립트 실행 완료
      - port 3000 (대상 웹 서비스) 지정
      acceptable_methods:
      - nmap --script http-enum -p 3000 10.20.30.80
      - nikto -h <url>:3000
      - dirsearch -u <url>:3000
      - gobuster dir -u <url>:3000 -w common.txt
      negative_signs:
      - 포트 지정 없이 기본 80 스캔
      - http-enum 이 아닌 일반 default 스크립트만
      - 경로 결과 해석 없음
  target_vm: attacker
  script: nmap --script http-enum -p 3000 10.20.30.80
  risk_level: low
  bastion_prompt: nmap의 http-enum 스크립트를 사용하여 10.20.30.80:3000의 웹 디렉토리를 열거해줘
- order: 9
  instruction: 방화벽 서버({{SECU_IP}})에 대해 ACK 스캔을 수행하여 방화벽 규칙(필터링 여부)을 파악하라.
  hint: -sA 옵션은 ACK 스캔으로 방화벽 규칙을 매핑한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 방화벽 서버(10.20.30.1)에 대해 ACK 스캔을 수행하여 방화벽 규칙(필터링 여부)을 파악해줘

    📎 참고 (CLI): sudo nmap -sA 10.20.30.1'
  answer_detail: ACK 스캔(-sA)은 포트의 열림/닫힘을 판별하는 것이 아니라, 방화벽의 필터링 규칙을 매핑하는 데 사용된다. 응답이 RST이면 unfiltered(방화벽
    미적용), 응답이 없으면 filtered(방화벽 차단)이다.
  verify:
    type: output_contains
    expect: PORT
    field: stdout
    semantic:
      intent: ACK 스캔(-sA) — 방화벽 필터링 규칙 매핑 (RST 응답=unfiltered, 무응답=filtered), 포트 개방 상태 판별 아님
      success_criteria:
      - sudo nmap -sA <IP> 실행
      - 결과 테이블에 unfiltered 또는 filtered 상태 구분
