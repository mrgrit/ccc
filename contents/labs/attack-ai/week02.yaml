    ※ Connect / SYN / FIN 스캔 별로 *탐지 가능성* 이 다르니 비교하고, ACK 스캔으로 방화벽 룰까지 추정해.
    ※ 마지막엔 ATT&CK Recon 매트릭스로 어떤 기법 썼는지 매핑해 줘. 그게 보고서의 차별점이야."

    학습 목표 (lecture #3 nmap 5종 + #6 디렉터리 + #7 ATT&CK Recon) + (lab #1·#2·#9 Connect/SYN/ACK) 통합.

    ■ 임무 (3 단계, 약 35분)

    ▶ Phase A — Connect vs SYN 스캔 비교 (lab #1·#2)
    1) Connect: `nmap -sT -p 22,80,443,3000,3306,8080 --max-rtt-timeout 1000 10.20.30.80 2>&1 | head -15`
    2) SYN: `sudo nmap -sS -p 22,80,443,3000,3306,8080 --max-rtt-timeout 1000 10.20.30.80 2>&1 | head -15`
    3) 비교: Connect 는 3-way handshake 완료 → 로그 남음. SYN 은 RST 로 끊어 *Half-open* → 로그 회피.

    ▶ Phase B — ACK 방화벽 탐지 + 서비스 버전 (lab #4·#9)
    1) `sudo nmap -sA -p 22,80,3000,3306 --max-rtt-timeout 1000 10.20.30.1 2>&1 | head -15`
       (방화벽 secu VM). ACK 결과: unfiltered → 통과 / filtered → stateful.
    2) 서비스 버전: `nmap -sV -p 22,80,3000,8080 --version-light 10.20.30.80 2>&1 | head -15`

    ▶ Phase C — ATT&CK Recon 매트릭스 (lecture #7)
    | ATT&CK 기법 | 사용 도구 | 결과 | 탐지 가능성 |
    | T1595.001 Active Scanning - Scanning IP | nmap -sS | open ports 식별 | 중 (SIEM 가능) |
    | T1595.002 Vulnerability Scanning | nmap --script=vuln | known CVE | 높음 |
    | T1592.002 Software | nmap -sV | Apache/Express 버전 | 낮음 |
    | T1590.005 IP Addresses | network sweep | 활성 host 5종 | 중 |
    | T1018 Remote System Discovery | nmap + ACK | 방화벽 룰 추정 | 낮음 |
    표 끝 "스텔스 권고: SYN 스캔 + 분산 스피드 (-T2) + decoy IP. ACK 로 방화벽 우회 경로 식별." 한 줄.

    종료: echo "=== Phase A Connect vs SYN ===" / "=== Phase B ACK+Version ===" / "=== Phase C ATT&CK ===" 묶음.
