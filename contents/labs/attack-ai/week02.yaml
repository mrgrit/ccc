lab_id: attack-ai-week02
title: 포트스캐닝 기초 (Port Scanning) (AI 지원)
version: ai
course: attack-ai
week: 2
description: nmap의 다양한 스캔 기법(TCP Connect, SYN, UDP, 스텔스 스캔)을 학습하고, 서비스 버전 탐지 및 OS
  핑거프린팅을 수행한다. 스캔 결과를 분석하여 공격 표면을 도출한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- nmap의 주요 스캔 유형(TCP Connect, SYN, UDP)의 원리를 이해한다
- 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 수행할 수 있다
- 스캔 결과를 XML/JSON으로 저장하고 분석할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap을 사용하여 {{WEB_IP}}의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행하라.
  hint: |
    nmap의 기본 스캔은 TCP Connect 스캔이다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: nmap -sT 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - nmap -sT --top-ports 100 10.20.30.80 (빠른 첫 정찰)
       - sudo masscan 10.20.30.80 -p1-1000 --rate=1000 (100배 빠름)
       - rustscan -a 10.20.30.80 --top -- -sV (Rust + nmap chain)
       - naabu -host 10.20.30.80 -top-ports 1000 (ProjectDiscovery)
       - python3 -c "import socket; [print(p, 'open' if not socket.socket().connect_ex(('10.20.30.80', p)) else 'closed') for p in [22,80,443,3000]]" (의존성 zero)
       - for p in 22 80 443 3000; do ncat -zv -w 1 10.20.30.80 $p; done
    4) 검증: PORT/STATE/SERVICE + open. -sT = 완전 3-way handshake → IDS 탐지.
  category: recon
  points: 5
  answer: '🤖 프롬프트: nmap을 사용하여 10.20.30.80의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행해줘

    📎 참고 (CLI): nmap -sT 10.20.30.80'
  answer_detail: TCP Connect 스캔(-sT)은 OS의 connect() 시스템 콜을 사용하여 완전한 TCP 3-way handshake를
    수행한다. root 권한이 필요 없지만, 연결 로그가 남아 탐지되기 쉽다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: nmap TCP Connect 스캔(-sT) — OS connect() 시스템 콜로 완전한 3-way handshake 수행,
        기본 Top 1000 포트
      success_criteria:
      - nmap -sT <IP> 명령 실행
      - 결과에 PORT STATE SERVICE 테이블과 최소 1개 open 포트
      - 연결 로그가 남는 non-stealth 방식임을 인지
      acceptable_methods:
      - "nmap -sT (수기 baseline): 명령 `nmap -sT 10.20.30.80`. 출력 `PORT STATE SERVICE\\n22/tcp open ssh\\n80/tcp open http\\n3000/tcp open ppp` → 완전 3-way handshake. root X. 로그 남음."
      - "nmap -sT --top-ports 1000: 기본 = top 1000."
      - "sudo masscan: 100배 빠름."
      - "rustscan: Rust binary."
      - "naabu: ProjectDiscovery."
      - "python3 socket.connect_ex: 의존성 zero."
      - "ncat -zv: nmap modern nc."
      - "unicornscan -m T -Ir 160: legacy."
      - "Burp Pro Discover ports: manual."
      negative_signs:
      - -sS SYN 스캔으로 대체 수행 (의도 벗어남)
      - 특정 포트만 -p 로 지정해 Top 1000 스캔 안 함
      - 결과에 open 포트 없고 해석도 없음
      negative_signs:
      - -sS SYN 스캔으로 대체 수행 (의도 벗어남)
      - 특정 포트만 -p 로 지정해 Top 1000 스캔 안 함
      - 결과에 open 포트 없고 해석도 없음
  target_vm: attacker
  script: nmap -sT 10.20.30.80
  risk_level: low
  bastion_prompt: 'nmap을 사용하여 10.20.30.80의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 {{WEB_IP}}의 열린 포트를 확인하라.
  hint: |
    SYN 스캔은 -sS 옵션이며 root 권한이 필요하다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -sS 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - sudo masscan 10.20.30.80 -p1-1000 --rate=1000 (자체 SYN, 100배 빠름)
       - sudo zmap -p 80 10.20.30.0/24 (인터넷 스케일)
       - sudo hping3 -S -p 22 -c 1 10.20.30.80 (single-shot SYN)
       - rustscan -a 10.20.30.80 --top (sudo 없으면 Connect fallback)
       - python scapy: from scapy.all import *; r=sr1(IP(dst='...')/TCP(dport=22, flags='S'))
    4) 검증: SYN-ACK → handshake X → 로그 회피.
  category: recon
  points: 10
  answer: '🤖 프롬프트: sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 10.20.30.80의 열린 포트를 확인해줘

    📎 참고 (CLI): sudo nmap -sS 10.20.30.80'
  answer_detail: SYN 스캔(-sS)은 TCP handshake를 완료하지 않고 SYN-ACK 응답만 확인하는 스텔스 스캔이다. 연결이
    완성되지 않아 로그에 남지 않는 경우가 많으며, 가장 널리 사용되는 스캔 기법이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: SYN Half-open 스캔(-sS) — root 권한으로 SYN-ACK 만 확인 후 RST 로 연결 중단, 로그 미기록의
        스텔스 기법
      success_criteria:
      - sudo nmap -sS <IP> 실행
      - open 포트 목록 출력
      - SYN 과 Connect 스캔의 로그 차이 언급 (stealth 속성)
      acceptable_methods:
      - "sudo nmap -sS (수기 baseline): 명령 `sudo nmap -sS 10.20.30.80`. SYN-ACK 만 확인. 로그 회피."
      - "sudo masscan: 자체 SYN. 100배 빠름."
      - "sudo zmap: 인터넷 스케일."
      - "sudo hping3 -S: single-shot."
      - "rustscan -- -sS: chain."
      - "naabu -scan-type s: ProjectDiscovery."
      - "scapy SYN: Python 자동화."
      - "Snort/Suricata 검출: 방어자 시각."
      - "FW 우회 변형: -T1 + -D RND:10 + -f."
      negative_signs:
      - sudo 없이 실행해 TCP Connect 로 강등됨
      - open 결과 없이 종료
      - 스텔스 원리 언급 없음
  target_vm: attacker
  script: sudo nmap -sS 10.20.30.80
  risk_level: low
  bastion_prompt: 'sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 10.20.30.80의 열린 포트를 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '{{WEB_IP}}에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행하라. 속도를 위해 T4 타이밍을 사용하라.'
  hint: |
    -p- 옵션은 전체 포트 범위를 의미한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -sS -p- -T4 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안 (속도 환경별):
       - sudo masscan 10.20.30.80 -p1-65535 --rate=10000 (10배 빠름, 1분 이내)
       - rustscan -a 10.20.30.80 -r 1-65535 -- -sS (가장 빠름)
       - sudo naabu -host 10.20.30.80 -p - (ProjectDiscovery)
       - sudo nmap -sS -p- --min-rate 10000 (rate 직접)
       - sudo nmap -sS -p- -T5 (insane, 패킷 손실 위험)
    4) 타이밍: -T0 paranoid → -T5 insane. 실전 IDS: -T2.
    5) 검증: 1-65535 → 숨겨진 service 발견 (8080/9090 등).
  category: recon
  points: 10
  answer: '🤖 프롬프트: 10.20.30.80에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행해줘

    📎 참고 (CLI): sudo nmap -sS -p- -T4 10.20.30.80'
  answer_detail: 전체 포트 스캔(-p-)은 기본 1000개 포트 외에 숨겨진 서비스를 발견할 수 있다. T4 타이밍은 공격적인 속도
    설정으로, 실습 환경에서 스캔 시간을 단축한다. 실전에서는 IDS/IPS 탐지를 피하기 위해 낮은 타이밍을 사용한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 전체 포트(1-65535) 범위 SYN 스캔 + T4 타이밍 — 숨겨진 비표준 포트 탐색
      success_criteria:
      - sudo nmap -sS -p- 또는 -p 1-65535 실행
      - T3 이상 타이밍 적용(-T4 권장)
      - 기본 Top 1000 에 없는 포트 최소 1개 발견 또는 전체 스캔 완료 확인
      acceptable_methods:
      - "sudo nmap -sS -p- -T4 (수기 baseline): 명령 `sudo nmap -sS -p- -T4 10.20.30.80`. 출력 65535 포트 + 숨겨진 service. T4 aggressive."
      - "sudo masscan -p1-65535: 자체 SYN. 1분 이내."
      - "rustscan -r: chain. 가장 빠름."
      - "naabu -p -: ProjectDiscovery."
      - "nmap --min-rate 10000: rate 직접."
      - "분할 전략: nmap + masscan 병렬."
      - "stealth 변형: -T0 + -f + decoy."
      - "scapy random subset: Python."
      - "unicornscan -mT -Ir 1000: legacy."
      negative_signs:
      - -p- 또는 1-65535 미사용
      - 스캔 시간 단축 옵션(-T4/--min-rate) 미고려
      - 결과 분석 없이 raw 출력만
      negative_signs:
      - 기본 1000 포트만 스캔
      - 타이밍 T1/T2 로 너무 느림 (실습 시간 초과)
      - 완료 전 Ctrl+C 로 중단
  target_vm: attacker
  script: sudo nmap -sS -p- -T4 10.20.30.80
  risk_level: low
  bastion_prompt: '10.20.30.80에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: 서비스 버전 탐지(-sV)를 수행하여 {{WEB_IP}}에서 실행 중인 서비스의 이름과 버전을 식별하라.
  hint: |
    -sV 옵션은 서비스 프로브를 전송하여 버전 정보를 수집한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -sV 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - sudo nmap -sV --version-intensity 9 (9단계, 가장 정밀)
       - sudo nmap -A (-sV + -O + -sC + traceroute)
       - whatweb -v http://10.20.30.80:3000 (web 만)
       - amap -B 10.20.30.80 22,80,3000 (banner only)
       - rustscan -- -sV (chain)
    4) 후속 CVE: searchsploit / NVD / vulners.
    5) 검증: VERSION 컬럼 + Apache/X.Y, OpenSSH/X.Y.
  category: recon
  points: 10
  answer: '🤖 프롬프트: 서비스 버전 탐지(-sV)를 수행하여 10.20.30.80에서 실행 중인 서비스의 이름과 버전을 식별해줘

    📎 참고 (CLI): sudo nmap -sV 10.20.30.80'
  answer_detail: 서비스 버전 탐지(-sV)는 열린 포트에 다양한 프로브를 전송하여 실행 중인 서비스의 정확한 이름과 버전을 식별한다.
    이 정보로 CVE 데이터베이스에서 알려진 취약점을 검색할 수 있다.
  verify:
    type: output_contains
    expect: VERSION
    field: stdout
    semantic:
      intent: 서비스 버전 탐지(-sV) — 열린 포트에 프로브 전송해 서비스명·버전 식별 (CVE 매핑 용도)
      success_criteria:
      - sudo nmap -sV <IP> 실행
      - 결과 테이블에 VERSION 컬럼과 구체 버전(예 nginx 1.18.0) 최소 1개
      - 버전 기반 CVE 조회 가능성 또는 CPE 언급
      acceptable_methods:
      - "sudo nmap -sV (수기 baseline): 명령 `sudo nmap -sV 10.20.30.80`. 출력 PORT + VERSION 컬럼. CVE 검색 base."
      - "nmap -sV --version-intensity 9: 9단계 probe."
      - "nmap -A: -sV + -O + -sC + traceroute."
      - "whatweb -v: 200+ plugin (web)."
      - "amap -B: banner only, 정밀."
      - "nmap --script=banner: NSE."
      - "rustscan -- -sV: chain."
      - "Wappalyzer CLI: 1500+ tech."
      - "후속 CVE: searchsploit/NVD/vulners."
      negative_signs:
      - -sV 누락 (버전 미수집)
      - 단일 포트만 -p 로 지정해 전체 미수집
      - VERSION 결과 없이 STATE 만 보고 종료
      negative_signs:
      - -sV 없이 포트 상태만 확인
      - VERSION 컬럼 비어있어도 그냥 종료
      - CVE 활용 가능성 언급 없음
  target_vm: attacker
  script: sudo nmap -sV 10.20.30.80
  risk_level: low
  bastion_prompt: '서비스 버전 탐지(-sV)를 수행하여 10.20.30.80에서 실행 중인 서비스의 이름과 버전을 식별해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: OS 핑거프린팅(-O)을 수행하여 {{WEB_IP}}의 운영체제를 추정하라.
  hint: |
    -O 옵션은 root 권한이 필요하다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -O 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - sudo nmap -O --osscan-guess 10.20.30.80 (불확실해도 추정)
       - sudo nmap -A 10.20.30.80 (OS + 버전 + 스크립트)
       - sudo p0f -i eth0 (passive OS fingerprinting)
       - sudo xprobe2 10.20.30.80 (legacy)
       - TTL 간이: ping → ttl=64 (Linux), ttl=128 (Windows), ttl=255 (Cisco)
    4) 검증: OS details + Aggressive guesses + 일치도 %.
  category: recon
  points: 10
  answer: '🤖 프롬프트: OS 핑거프린팅(-O)을 수행하여 10.20.30.80의 운영체제를 추정해줘

    📎 참고 (CLI): sudo nmap -O 10.20.30.80'
  answer_detail: OS 핑거프린팅(-O)은 TCP/IP 스택의 특성(TTL, 윈도우 크기, 옵션 순서 등)을 분석하여 운영체제를 추정한다.
    정확한 OS 정보는 커널 익스플로잇 선택에 핵심적이다.
  verify:
    type: output_contains
    expect: OS
    field: stdout
    semantic:
      intent: OS fingerprinting(-O) — TCP/IP 스택 특성으로 운영체제 추정
      success_criteria:
      - sudo nmap -O <IP> 실행
      - 결과에 OS details 또는 Running 섹션에 추정 OS 언급 (Linux/Windows/BSD 등)
      - CPE/Aggressive OS guesses 해석
      acceptable_methods:
      - "sudo nmap -O (수기 baseline): 명령 `sudo nmap -O 10.20.30.80`. 출력 OS details + CPE + 일치도."
      - "nmap -O --osscan-guess: 불확실해도 추정."
      - "sudo nmap -A: 종합."
      - "p0f passive: 트래픽 청취. stealth."
      - "xprobe2: ICMP 기반 active. legacy."
      - "TTL 간이: ping ttl=64 Linux/128 Windows/255 Cisco."
      - "scapy IP fingerprint: Python."
      - "ettercap fingerprint: GUI."
      - "Wireshark + ja3: TLS handshake 로 OS 추정."
      negative_signs:
      - sudo 없이 -O 로 권한 거부 후 종료
      - OS 추정 결과(Aggressive OS guesses) 누락
      - 결과 분석 없이 raw 출력
      negative_signs:
      - -O 없이 실행
      - OS details 비어있어도 해석 없이 종료
      - 열린 포트 없어 fingerprint 불가한데 대체 시도 없음
  target_vm: attacker
  script: sudo nmap -O 10.20.30.80
