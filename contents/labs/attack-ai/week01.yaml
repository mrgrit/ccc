lab_id: "attack-ai-week01"
title: "정보수집 기초 (Reconnaissance) - AI 지원"
version: "ai"
course: "attack-ai"
week: 1
description: "AI 에이전트를 활용하여 대상 네트워크와 호스트의 정보를 체계적으로 수집한다. CCC API를 통해 자동화된 정찰을 수행하고, AI가 수집 결과를 분석하여 공격 표면을 도출한다."
difficulty: "easy"
duration_minutes: 120
objectives:
  - "CCC API를 통해 AI 기반 자동 정찰을 수행할 수 있다"
  - "AI가 정찰 결과를 분석하여 공격 우선순위를 도출하는 과정을 이해한다"
  - "수동 정찰과 AI 정찰의 결과를 비교할 수 있다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "CCC API에 정찰 프로젝트를 생성하라. master_mode를 external로 설정하라."
    hint: "curl로 /projects 엔드포인트에 POST 요청을 보낸다"
    category: "recon"
    points: 5
    answer: "curl -s -X POST http://localhost:9100/api/projects -H 'Content-Type: application/json' -H 'X-API-Key: ccc-api-key-2026' -d '{\"name\":\"recon-week01\",\"request_text\":\"10.20.30.0/24 네트워크 정보수집\",\"master_mode\":\"external\"}' | python3 -m json.tool"
    answer_detail: "CCC 프로젝트를 생성하면 모든 작업의 증적(evidence)이 자동으로 기록된다. master_mode=external은 Claude Code가 직접 오케스트레이션함을 의미한다."
    script: "ccc_project_create.py"
    verify:
      type: "output_contains"
      expect: "project_id"
      field: "stdout"
  - order: 2
    instruction: "AI 에이전트를 통해 대상 호스트 10.20.30.80의 생존 여부를 확인하라. CCC dispatch API를 사용하라."
    hint: "dispatch API로 ping 명령을 전달한다"
    category: "recon"
    points: 10
    answer: "curl -s -X POST http://localhost:9100/api/projects/{id}/dispatch -H 'Content-Type: application/json' -H 'X-API-Key: ccc-api-key-2026' -d '{\"command\":\"ping -c 3 10.20.30.80\",\"subagent_url\":\"http://localhost:8002\"}' | python3 -m json.tool"
    answer_detail: "CCC dispatch API를 통해 SubAgent에 명령을 전달하면, 실행 결과와 함께 증적이 자동 기록된다. 모든 정찰 활동이 추적 가능하여 감사(audit)에 활용된다."
    script: "ccc_dispatch.py"
    verify:
      type: "output_contains"
      expect: "bytes from"
      field: "stdout"
  - order: 3
    instruction: "AI를 활용하여 웹서버(10.20.30.80:3000)의 HTTP 헤더를 분석하라. AI에게 보안 관점에서 헤더를 평가하도록 요청하라."
    hint: "dispatch로 curl -I를 실행한 후 AI 분석을 요청한다"
    category: "recon"
    points: 10
    answer: "curl -sI http://10.20.30.80:3000 > /tmp/headers.txt && cat /tmp/headers.txt && echo '--- AI Analysis Request ---' && curl -s -X POST http://localhost:9100/api/projects/{id}/dispatch -H 'Content-Type: application/json' -H 'X-API-Key: ccc-api-key-2026' -d '{\"command\":\"curl -I http://10.20.30.80:3000\",\"subagent_url\":\"http://localhost:8002\"}'"
    answer_detail: "AI는 HTTP 헤더에서 누락된 보안 헤더(CSP, X-Frame-Options, HSTS), 서버 정보 노출, 기술 스택 식별을 자동으로 수행한다. 수동 분석보다 빠르고 일관된 결과를 제공한다."
    script: "ai_analyze_headers.py"
    verify:
      type: "output_contains"
      expect: "HTTP/"
      field: "stdout"
  - order: 4
    instruction: "AI에게 robots.txt와 /ftp 디렉토리를 동시에 조사하도록 execute-plan을 사용하여 병렬 정찰을 수행하라."
    hint: "execute-plan API에 tasks 배열로 여러 명령을 전달한다"
    category: "recon"
    points: 10
    answer: "curl -s -X POST http://localhost:9100/api/projects/{id}/execute-plan -H 'Content-Type: application/json' -H 'X-API-Key: ccc-api-key-2026' -d '{\"tasks\":[{\"order\":1,\"instruction_prompt\":\"curl -s http://10.20.30.80:3000/robots.txt\",\"risk_level\":\"low\"},{\"order\":2,\"instruction_prompt\":\"curl -s http://10.20.30.80:3000/ftp\",\"risk_level\":\"low\"}],\"subagent_url\":\"http://localhost:8002\"}' | python3 -m json.tool"
    answer_detail: "execute-plan API는 여러 정찰 작업을 동시에 실행할 수 있다. AI 에이전트가 각 작업의 결과를 수집하고, PoW 블록으로 증적을 기록하며, 보상 시스템으로 효율을 추적한다."
    script: "ccc_parallel_recon.py"
    verify:
      type: "output_contains"
      expect: "task"
      field: "stdout"
  - order: 5
    instruction: "AI를 활용하여 JuiceShop의 REST API 엔드포인트를 자동 열거하라. /api/Products, /api/Users, /api/SecurityQuestions 등을 체계적으로 탐색하라."
    hint: "여러 API 엔드포인트에 대한 요청을 자동화한다"
    category: "recon"
    points: 10
    answer: "for ep in Products Users SecurityQuestions Feedbacks Challenges; do echo \"=== /api/$ep ===\"; curl -s http://10.20.30.80:3000/api/$ep | python3 -c \"import sys,json; d=json.load(sys.stdin); print(f'Items: {len(d.get(\\\"data\\\",d.get(\\\"status\\\",\\\"unknown\\\")))}')\" 2>/dev/null; done"
    answer_detail: "API 자동 열거는 AI가 각 엔드포인트의 응답 구조, 인증 요구사항, 데이터 노출 범위를 분석하여 취약점을 자동 식별하는 기반이 된다."
    script: "ai_enumerate_apis.py"
    verify:
      type: "output_contains"
      expect: "/api/"
      field: "stdout"
  - order: 6
    instruction: "CCC의 probe_linux_host 스킬을 사용하여 web 서버(10.20.30.80)의 시스템 정보를 자동 수집하라."
    hint: "dispatch API에서 스킬을 호출한다"
    category: "recon"
    points: 10
    answer: "curl -s -X POST http://localhost:9100/api/projects/{id}/dispatch -H 'Content-Type: application/json' -H 'X-API-Key: ccc-api-key-2026' -d '{\"command\":\"uname -a && cat /etc/os-release && ss -tlnp\",\"subagent_url\":\"http://10.20.30.80:8002\"}' | python3 -m json.tool"
    answer_detail: "probe_linux_host 스킬은 호스트의 OS, 커널, 서비스, 네트워크 구성을 자동 수집한다. AI가 수집된 정보를 분석하여 잠재적 취약점과 공격 벡터를 식별한다."
    script: "ccc_probe_host.py"
    verify:
      type: "output_contains"
      expect: "Linux"
      field: "stdout"
  - order: 7
    instruction: "AI에게 네트워크 전체(10.20.30.0/24)의 호스트 발견과 포트 스캔을 자동화하도록 요청하라."
    hint: "nmap 명령을 dispatch로 실행한다"
    category: "recon"
    points: 10
    answer: "curl -s -X POST http://localhost:9100/api/projects/{id}/dispatch -H 'Content-Type: application/json' -H 'X-API-Key: ccc-api-key-2026' -d '{\"command\":\"nmap -sn 10.20.30.0/24\",\"subagent_url\":\"http://localhost:8002\"}' | python3 -m json.tool"
    answer_detail: "AI 기반 네트워크 스캔은 결과를 자동으로 파싱하고, 각 호스트의 역할을 추정하며, 다음 정찰 단계를 자동으로 계획할 수 있다. 수동 스캔 대비 시간과 일관성에서 우위가 있다."
    script: "ai_network_scan.py"
    verify:
      type: "output_contains"
      expect: "Nmap"
      field: "stdout"
  - order: 8
    instruction: "AI를 사용하여 JuiceShop의 main.js 소스 코드에서 숨겨진 API 엔드포인트와 관리자 경로를 자동 추출하라."
    hint: "JavaScript 소스를 다운로드하고 패턴 분석을 수행한다"
    category: "recon"
    points: 10
    answer: "curl -s http://10.20.30.80:3000/main.js | grep -oP '\"/(api|rest|admin|ftp)[^\"]*\"' | sort -u | head -20"
    answer_detail: "AI는 JavaScript 번들에서 API 경로, 인증 토큰 패턴, 숨겨진 기능, 개발자 주석 등을 자동으로 추출하고 분류할 수 있다. 대규모 SPA 애플리케이션에서 특히 효과적이다."
    script: "ai_js_analysis.py"
    verify:
      type: "output_contains"
      expect: "api"
      field: "stdout"
  - order: 9
    instruction: "CCC의 evidence summary API를 사용하여 지금까지 수집된 모든 정찰 결과를 조회하라."
    hint: "/projects/{id}/evidence/summary 엔드포인트를 사용한다"
    category: "analysis"
    points: 10
    answer: "curl -s -H 'X-API-Key: ccc-api-key-2026' http://localhost:9100/api/projects/{id}/evidence/summary | python3 -m json.tool"
    answer_detail: "CCC의 evidence 시스템은 모든 정찰 활동의 결과를 자동 저장한다. summary API로 전체 결과를 조회하면 정찰 진행 상황과 수집된 정보를 한눈에 파악할 수 있다."
    script: "ccc_evidence_summary.py"
    verify:
      type: "output_contains"
      expect: "evidence"
      field: "stdout"
  - order: 10
    instruction: "AI에게 JuiceShop 버전 정보를 확인하고, 해당 버전의 알려진 취약점을 분석하도록 요청하라."
    hint: "/rest/admin/application-version에서 버전을 확인한다"
    category: "analysis"
    points: 10
    answer: "curl -s http://10.20.30.80:3000/rest/admin/application-version && echo '' && echo '--- AI Analysis: Known vulnerabilities for this version ---'"
    answer_detail: "AI는 버전 정보를 기반으로 CVE 데이터베이스를 자동 검색하고, 적용 가능한 익스플로잇을 분류하며, 위험도를 평가할 수 있다. 수동 searchsploit보다 포괄적인 분석이 가능하다."
    script: "ai_version_vuln_analysis.py"
    verify:
      type: "output_contains"
      expect: "version"
      field: "stdout"
  - order: 11
    instruction: "AI를 활용하여 수집된 정보를 MITRE ATT&CK 프레임워크에 매핑하라. 정찰 단계에서 사용한 기법의 ATT&CK ID를 식별하라."
    hint: "각 정찰 기법에 해당하는 T-ID를 매핑한다"
    category: "analysis"
    points: 10
    answer: "echo -e '=== MITRE ATT&CK Mapping (AI-assisted) ===\\nT1595.002 - Active Scanning: Vulnerability Scanning (nmap)\\nT1592.004 - Gather Victim Host Information: Client Configurations (HTTP headers)\\nT1590.002 - Gather Victim Network Information: DNS (dig)\\nT1593.002 - Search Open Technical Databases (API enumeration)\\nT1595.001 - Active Scanning: Scanning IP Blocks (ping sweep)\\nT1592.002 - Gather Victim Host Information: Software (whatweb)'"
    answer_detail: "AI는 수행된 정찰 활동을 자동으로 MITRE ATT&CK 기법에 매핑할 수 있다. 이를 통해 공격 커버리지를 시각화하고, 방어팀이 탐지 규칙을 설계하는 데 활용할 수 있다."
    script: "ai_attack_mapping.py"
    verify:
      type: "output_contains"
      expect: "ATT&CK"
      field: "stdout"
  - order: 12
    instruction: "AI에게 정찰 결과를 기반으로 공격 우선순위를 자동 결정하도록 요청하라."
    hint: "AI가 발견된 서비스와 취약점을 분석하여 공격 순서를 제안한다"
    category: "analysis"
    points: 10
    answer: "echo -e '=== AI Attack Priority Analysis ===\\n\\nBased on reconnaissance data:\\n\\n1. [HIGH PRIORITY] JuiceShop (10.20.30.80:3000)\\n   - Multiple API endpoints exposed without auth\\n   - Error messages suggest SQL backend\\n   - Recommendation: Test SQLi on login/search\\n\\n2. [MEDIUM PRIORITY] SSH (10.20.30.80:22)\\n   - Standard SSH service\\n   - Recommendation: Credential testing\\n\\n3. [MEDIUM PRIORITY] Apache (10.20.30.80:80)\\n   - Web server with potential misconfig\\n   - Recommendation: Directory enumeration\\n\\n4. [LOW PRIORITY] SIEM (10.20.30.100:443)\\n   - Administrative interface\\n   - Recommendation: After initial access obtained'"
    answer_detail: "AI는 수집된 정보의 패턴을 분석하여 가장 유망한 공격 벡터를 자동으로 식별하고 우선순위를 매긴다. 인증 없이 접근 가능한 API, 에러 메시지에서 추론한 백엔드 정보 등을 종합적으로 고려한다."
    script: "ai_priority_analysis.py"
    verify:
      type: "output_contains"
      expect: "Attack Priority"
      field: "stdout"
  - order: 13
    instruction: "AI가 생성한 정찰 결과와 수동 정찰 결과를 비교하여 차이점을 분석하라."
    hint: "AI의 자동 분석과 수동 분석의 커버리지를 비교한다"
    category: "analysis"
    points: 15
    answer: "echo -e '=== Manual vs AI Recon Comparison ===\\n\\n| Aspect | Manual | AI-assisted |\\n|--------|--------|-------------|\\n| Speed | 30-60 min | 5-10 min |\\n| Coverage | Depends on skill | Systematic, consistent |\\n| False positives | Lower | May be higher |\\n| Context understanding | Better | Improving |\\n| Documentation | Manual effort | Auto-generated |\\n| Reproducibility | Low | High |\\n\\n[AI Advantages]\\n- Parallel execution of multiple scans\\n- Automatic evidence logging via CCC\\n- Pattern recognition across large datasets\\n- Consistent methodology\\n\\n[Manual Advantages]\\n- Better contextual understanding\\n- Creative approach to hidden paths\\n- Lower false positive rate\\n- Intuition-based discovery'"
    answer_detail: "AI 정찰은 속도, 일관성, 자동 문서화에서 우위가 있지만, 컨텍스트 이해와 창의적 접근에서는 수동 정찰이 우수하다. 최적의 결과는 AI와 수동 분석을 병행할 때 달성된다."
    script: "ai_comparison_report.py"
    verify:
      type: "output_contains"
      expect: "Manual vs AI"
      field: "stdout"
  - order: 14
    instruction: "CCC의 PoW(Proof of Work) 시스템에서 이번 정찰 프로젝트의 작업 블록을 조회하라."
    hint: "/pow/blocks 엔드포인트를 사용한다"
    category: "analysis"
    points: 10
    answer: "curl -s -H 'X-API-Key: ccc-api-key-2026' 'http://localhost:9100/api/pow/blocks?agent_id=http://localhost:8002' | python3 -m json.tool | head -30"
    answer_detail: "PoW 시스템은 모든 AI 에이전트의 작업을 블록체인 형태로 기록한다. 각 블록에는 작업 내용, 결과, 타임스탬프가 포함되어 감사 추적과 무결성 검증에 활용된다."
    script: "ccc_pow_query.py"
    verify:
      type: "output_contains"
      expect: "block"
      field: "stdout"
  - order: 15
    instruction: "CCC의 completion-report API를 사용하여 정찰 프로젝트의 완료 보고서를 생성하라."
    hint: "/projects/{id}/completion-report 엔드포인트에 POST 요청을 보낸다"
    category: "analysis"
    points: 15
    answer: "curl -s -X POST http://localhost:9100/api/projects/{id}/completion-report -H 'Content-Type: application/json' -H 'X-API-Key: ccc-api-key-2026' -d '{\"summary\":\"10.20.30.0/24 네트워크 정찰 완료\",\"outcome\":\"success\",\"work_details\":[\"4개 호스트 발견\",\"웹 서비스 3개 식별\",\"API 엔드포인트 5개 열거\",\"공격 우선순위 도출\"]}' | python3 -m json.tool"
    answer_detail: "CCC 완료 보고서는 프로젝트의 결과를 구조화하여 기록한다. AI가 생성한 정찰 결과, PoW 증적, evidence 로그가 모두 연결되어 체계적인 모의해킹 문서가 완성된다."
    script: "ccc_completion_report.py"
    verify:
      type: "output_contains"
      expect: "summary"
      field: "stdout"
