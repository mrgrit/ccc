- order: 99
  instruction: |
    [복합 시나리오] "ABC 핀테크 외주 모의해킹 — 1차 정찰 + 윤리 동의서 + 공격 표면 매트릭스"

    ## 상황 (모의해킹 첫 주)

    당신은 ABC 핀테크의 외주 모의해킹 컨설턴트. 첫 정찰 단계 임무. 선임이 한 마디.

    > 선임: "신입은 nmap 한 줄 던져 끝내는데, 우리는 그렇게 못 해.
    > 점검 시작 전 *Rules of Engagement (RoE)* 확인하고, 정찰은 Passive(OSINT) 와 Active 두 단계로 나눠 진행.
    > 마지막에 발견 자산을 *공격 표면 매트릭스*로 정리해. 다음 주차의 침투 단계 입력이야."

    학습 목표 (lecture #1·#2 보안 원칙·CIA + #3 4대 VM + #6 윤리) + (lab #1~14 정찰) 통합.

    ## 임무 (3 단계, 약 35분)

    ### Phase A — Passive OSINT + 윤리 동의서 (lecture #6)
    1) 윤리 동의서 텍스트 출력:
       ```
       [Rules of Engagement]
       - 점검 대상: 10.20.30.0/24 (ABC 핀테크 외주)
       - 점검 기간: 14주 (한 학기)
       - 허용 행위: 정찰 / 침투 / PoC. DoS·랜섬웨어·실 데이터 유출 X
       - 보고 의무: Critical 발견 즉시 보고. 모든 활동 로그 보존.
       - 법적 근거: 정통망법 제48조 (위탁 점검). 무단 접근 시 형사 책임.
       서명: 컨설턴트 ____________ / 클라이언트 ____________ / 일자 2026-04-30
       ```
    2) 도메인·기술 스택 OSINT — `curl -s -I http://10.20.30.80:3000/ | grep -E "Server|X-Powered"` 등.

    ### Phase B — Active 정찰 (lab #7·#11·#1)
    1) 호스트 활성 확인: `ping -c 3 -W 1 10.20.30.80 2>&1 | tail -3`
    2) 네트워크 스윕: `for i in 1 80 100 112 201; do
         ping -c 1 -W 1 10.20.30.$i &>/dev/null && echo "10.20.30.$i: alive" || echo "10.20.30.$i: down"; done`
    3) 포트 정찰: `nmap -p 22,80,443,3000,3306,8080 -sV --open --max-rtt-timeout 1000 10.20.30.80 2>&1 | head -20`

    ### Phase C — 공격 표면 매트릭스 + 다음 주차 입력
    | 자산 | 포트 | 서비스 | 기술 스택 | 공격 우선순위 |
    | web (10.20.30.80) | 80 | HTTP+ModSec | Apache+CRS | 중 |
    | web (10.20.30.80) | 3000 | HTTP | JuiceShop / Express / Node.js | 높음 |
    | web (10.20.30.80) | 8080 | HTTP | DVWA / PHP / Apache | 높음 |
    | bastion (10.20.30.201) | 22 | SSH | OpenSSH | 낮음 |
    | siem (10.20.30.100) | 1514 | Wazuh agent | - | 회피 대상 |
    표 끝 "다음 주차 (w02) 침투 우선순위: JuiceShop:3000 → DVWA:8080. SIEM 회피 모드 필요." 한 줄.

    종료: echo "=== Phase A RoE+OSINT ===" / "=== Phase B Active ===" / "=== Phase C 공격 표면 ===" 묶음.
