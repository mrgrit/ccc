lab_id: attack-ai-week01
title: 정보수집 기초 (Reconnaissance) (AI 지원)
version: ai
course: attack-ai
week: 1
description: 'OSINT 및 능동적 정보수집 기법을 활용하여 대상 네트워크와 호스트의 정보를 체계적으로 수집한다. whois, DNS 조회,
  배너 그래빙, 웹 핑거프린팅 등 기본적인 정찰 기술을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다. [Model]
  공격·대전 과목은 Bastion manager LLM 을 gurubot/gpt-oss-derestricted:120b 로 자동 라우팅한다 (실제
  공격 페이로드 생성 필요). 상세: contents/labs/MODEL_ROUTING.md'
difficulty: easy
duration_minutes: 120
objectives:
- 수동 정보수집(OSINT)과 능동 정보수집의 차이를 이해한다
- DNS, whois, 배너 그래빙 등 기본 정찰 도구를 사용할 수 있다
- 수집된 정보를 체계적으로 정리하고 공격 표면을 식별한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: ping을 사용하여 대상 호스트 {{WEB_IP}}이 활성 상태인지 확인하라. ICMP 응답을 3회만 보내라.
  hint: ping -c 옵션으로 횟수를 제한할 수 있다
  category: recon
  points: 5
  answer: '🤖 프롬프트: ping을 사용하여 대상 호스트 10.20.30.80이 활성 상태인지 확인해줘

    📎 참고 (CLI): ping -c 3 10.20.30.80'
  answer_detail: ping -c 3은 ICMP Echo Request를 3회 전송하여 대상 호스트의 생존 여부를 확인한다. TTL 값과
    응답 시간으로 OS 유형을 추정할 수 있다.
  verify:
    type: output_contains
    expect: bytes from 10.20.30.80
    field: stdout
    semantic:
      intent: ICMP ping 으로 대상 호스트 생존 확인 — 회수 제한(-c 3) + TTL·응답시간 기록
      success_criteria:
      - ping -c 3 또는 동등 명령으로 ICMP Echo 3 회 전송
      - 응답에 bytes from <IP> 또는 time= 응답시간 포함
      - 활성 여부(최소 1 응답) 판정
      acceptable_methods:
      - ping -c 3 <IP>
      - hping3 -1 -c 3 <IP> (ICMP mode)
      - nmap -sn <IP>
      - fping <IP>
      negative_signs:
      - -c 없이 무제한 ping
      - 전혀 다른 IP 대상
      - 응답 없이 타임아웃만 받고 판정 생략
  target_vm: attacker
  script: ping -c 3 10.20.30.80
  risk_level: low
  bastion_prompt: 'ping을 사용하여 대상 호스트 10.20.30.80이 활성 상태인지 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: nslookup 또는 dig를 사용하여 실습 네트워크의 DNS 서버에 {{WEB_IP}}의 역방향 DNS 조회를 수행하라.
  hint: dig -x 옵션으로 역방향 조회가 가능하다
  category: recon
  points: 10
  answer: '🤖 프롬프트: nslookup 또는 dig를 사용하여 실습 네트워크의 DNS 서버에 10.20.30.80의 역방향 DNS 조회를
    수행해줘

    📎 참고 (CLI): dig -x 10.20.30.80'
  answer_detail: 역방향 DNS 조회(Reverse DNS Lookup)는 IP 주소로부터 호스트명을 알아내는 기법이다. PTR 레코드를
    조회하며, 대상 시스템의 명명 규칙이나 역할을 추정할 수 있다.
  verify:
    type: output_contains
    expect: IN
    field: stdout
    semantic:
      intent: 역방향 DNS(PTR) 조회 — IP 로부터 호스트명을 얻어 내부 명명 규칙·서버 역할 추정
      success_criteria:
      - dig -x <IP> 또는 nslookup <IP> 실행
      - 응답에 IN + PTR 레코드 또는 NXDOMAIN 해석 포함
      - 호스트명 획득 시 역할 추정 또는 명명 규칙 언급
      acceptable_methods:
      - dig -x 10.20.30.80
      - dig PTR 80.30.20.10.in-addr.arpa
      - nslookup 10.20.30.80
      - host 10.20.30.80
      negative_signs:
      - 정방향 DNS(A/AAAA) 조회만 수행
      - DNS 서버 지정 없이 localhost 조회해 실패
      - 결과 해석 없이 raw 출력만
  target_vm: attacker
  script: dig -x 10.20.30.80
  risk_level: low
  bastion_prompt: 'nslookup 또는 dig를 사용하여 실습 네트워크의 DNS 서버에 10.20.30.80의 역방향 DNS 조회를
    수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: curl을 사용하여 웹서버({{WEB_IP}}:3000)의 HTTP 헤더만 확인하라. 서버 소프트웨어 정보를 파악하라.
  hint: curl -I 옵션은 HEAD 요청을 보내 헤더만 가져온다
  category: recon
  points: 10
  answer: '🤖 프롬프트: curl을 사용하여 웹서버(10.20.30.80:3000)의 HTTP 헤더만 확인해줘

    📎 참고 (CLI): curl -I http://10.20.30.80:3000'
  answer_detail: HTTP 응답 헤더에는 Server, X-Powered-By 등 서버 기술 스택 정보가 포함될 수 있다. 이 정보로
    사용 중인 프레임워크와 버전을 식별하여 알려진 취약점을 검색할 수 있다.
  verify:
    type: output_contains
    expect: HTTP/
    field: stdout
    semantic:
      intent: HTTP HEAD 요청으로 응답 헤더만 수집해 Server/X-Powered-By 헤더에서 웹 서버 소프트웨어·버전 정보
        파악
      success_criteria:
      - curl -I 또는 HEAD 요청으로 응답 헤더 획득
      - 응답에 HTTP/1.x 또는 HTTP/2 상태 라인 포함
      - Server 또는 X-Powered-By 등 기술 스택 힌트 헤더 최소 1개 해석
      acceptable_methods:
      - curl -I http://10.20.30.80:3000
      - curl -sI <url>
      - wget --server-response --spider <url>
      - python3 requests.head(url).headers
      negative_signs:
      - GET 으로 본문까지 다운로드해 헤더만 확인하라는 의도 벗어남
      - 응답 헤더는 받았으나 서버 식별 시도 없음
      - 연결 실패만 받고 포트 확인 없이 종료
  target_vm: attacker
  script: curl -I http://10.20.30.80:3000
  risk_level: low
  bastion_prompt: 'curl을 사용하여 웹서버(10.20.30.80:3000)의 HTTP 헤더만 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: curl로 웹서버({{WEB_IP}}:3000)의 robots.txt 파일을 확인하여 숨겨진 경로를 찾아라.
  hint: robots.txt는 웹 루트에 위치한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: curl로 웹서버(10.20.30.80:3000)의 robots.txt 파일을 확인하여 숨겨진 경로를 찾아라해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/robots.txt'
  answer_detail: robots.txt는 검색엔진 크롤러에게 접근을 제한할 경로를 알려주는 파일이다. 공격자 관점에서는 관리자 페이지,
    백업 파일 등 민감한 경로가 노출될 수 있어 정찰에 유용하다.
  verify:
    type: output_contains
    expect: Disallow
    field: stdout
    semantic:
      intent: robots.txt 파일 확인 — Disallow 엔트리에서 크롤러 차단 경로를 찾아 관리자/백업 등 숨겨진 경로 힌트 획득
      success_criteria:
      - curl 또는 wget 으로 /robots.txt 다운로드
      - 응답에 Disallow 또는 Allow 지시문 포함
      - Disallow 경로 중 최소 1개를 실제 탐색 후보로 해석
      acceptable_methods:
      - curl -s http://<target>/robots.txt
      - wget -qO- http://<target>/robots.txt
      - python urllib.request.urlopen(<url>/robots.txt).read()
      - humans.txt · sitemap.xml 추가 확인
      negative_signs:
      - 404 응답만 받고 종료
      - 파일 내용 출력 후 해석 없이 단순 출력만
      - 루트 / 조회만 하고 /robots.txt 미시도
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/robots.txt
  risk_level: low
  bastion_prompt: 'curl로 웹서버(10.20.30.80:3000)의 robots.txt 파일을 확인하여 숨겨진 경로를 찾아라해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: curl을 사용하여 {{WEB_IP}}:3000 웹 애플리케이션의 기술 스택을 핑거프린팅하라.
  hint: curl -sI로 응답 헤더를 확인하고 Server 등의 정보를 추출한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: curl을 사용하여 10.20.30.80:3000 웹 애플리케이션의 기술 스택을 핑거프린팅해줘

    📎 참고 (CLI): curl -sI http://10.20.30.80:3000 | grep -iE "(Server|X-Powered-By|X-Frame|Content-Type|Set-Cookie)"'
  answer_detail: HTTP 응답 헤더에서 Server, X-Powered-By, Set-Cookie 등의 정보를 통해 웹 서버 종류,
    프레임워크, 세션 관리 방식을 파악할 수 있다. 패시브 핑거프린팅을 통해 공격 표면을 빠르게 파악할 수 있다.
  verify:
    type: output_contains
    expect: Server
    field: stdout
    semantic:
      intent: 웹 기술 스택 패시브 핑거프린팅 — HTTP 응답 헤더(Server·X-Powered-By·X-Frame·Content-Type·Set-Cookie)만으로
        서버·프레임워크·세션 방식 추정
      success_criteria:
      - curl -sI 로 헤더 수집 후 grep 등으로 주요 헤더 필터
      - Server 또는 X-Powered-By 값 해석(예 nginx/1.18, Express, PHP/7.4)
      - 쿠키명(PHPSESSID·JSESSIONID·connect.sid 등)으로 서버사이드 추정 또는 추가 CVE 조회 가능성 언급
      acceptable_methods:
      - curl -sI <url> | grep -iE pattern
      - whatweb <url>
      - wappalyzer 브라우저 확장 또는 CLI
      - httpx -title -tech-detect -status-code
      negative_signs:
      - 헤더 수집만 하고 필터/해석 없음
      - 패시브 아닌 포트 스캔·주입 수행
      - 단일 헤더만 보고 기술 스택 단정
  target_vm: attacker
  script: curl -sI http://10.20.30.80:3000 | grep -iE "(Server|X-Powered-By|X-Frame|Content-Type|Set-Cookie)"
  risk_level: low
  bastion_prompt: 'curl을 사용하여 10.20.30.80:3000 웹 애플리케이션의 기술 스택을 핑거프린팅해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: curl을 사용하여 JuiceShop의 /ftp 디렉토리에 접근하여 공개된 파일 목록을 확인하라.
  hint: /ftp 경로로 GET 요청을 보내라
  category: recon
  points: 10
  answer: '🤖 프롬프트: curl을 사용하여 JuiceShop의 /ftp 디렉토리에 접근하여 공개된 파일 목록을 확인해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/ftp'
  answer_detail: 웹 서버의 디렉토리 리스팅이 활성화되어 있으면 내부 파일 구조가 노출된다. /ftp 디렉토리에는 백업 파일, 설정 파일
    등 민감한 정보가 포함될 수 있다.
  verify:
    type: output_contains
    expect: .md
    field: stdout
    semantic:
      intent: JuiceShop /ftp 디렉터리 리스팅 노출 취약점 활용 — 공개된 파일 목록에서 .md·.txt 등 내부 파일 확인
      success_criteria:
      - curl 로 /ftp 경로 GET 요청
      - 응답에서 파일 이름 목록 (.md, .txt, .pdf 등 확장자 포함) 확인
      - 노출된 파일 중 민감 가능성 파일(backup/config/exfiltration) 지목
      acceptable_methods:
      - curl -s http://<host>:3000/ftp
      - curl -s http://<host>:3000/ftp | grep -oE href="[^"]+"
      - browser 직접 접속 후 목록 확인
      - wget -r -l1 --no-parent http://<host>:3000/ftp
      negative_signs:
      - /ftp 대신 루트만 조회
      - 파일명 추출 없이 raw HTML 만 출력
      - 디렉터리 리스팅 개념 언급 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/ftp
  risk_level: low
  bastion_prompt: 'curl을 사용하여 JuiceShop의 /ftp 디렉토리에 접근하여 공개된 파일 목록을 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 7
  instruction: ping과 ip route를 사용하여 attacker에서 web({{WEB_IP}})까지의 네트워크 경로와 연결 상태를
    확인하라.
  hint: ping -c 1으로 연결을 확인하고 ip route get으로 라우팅 경로를 파악한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: ping과 ip route를 사용하여 attacker에서 web(10.20.30.80)까지의 네트워크 경로와 연결
    상태를 확인해줘

    📎 참고 (CLI): ping -c 1 10.20.30.80 && echo "--- Routing ---" && ip route get 10.20.30.80'
  answer_detail: ping으로 대상 호스트의 생존 여부와 응답 시간을 확인하고, ip route get으로 해당 목적지까지의 라우팅 경로를
    파악한다. TTL 값과 라우팅 정보를 통해 네트워크 토폴로지, 방화벽 위치, 라우팅 구조를 추정할 수 있다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: 네트워크 경로 및 연결성 확인 — ping 으로 RTT 측정 + ip route get 으로 목적지까지의 라우팅 경로 파악
      success_criteria:
      - ping -c 1 또는 동등 명령으로 대상까지 ICMP 응답 수신
      - ip route get <IP> 또는 traceroute 로 다음 홉·소스 IP 확인
      - 라우팅 경로(via, dev) 또는 RTT 결과 해석
      acceptable_methods:
      - ping -c 1 <IP> 와 ip route get <IP> 조합
      - traceroute <IP> 또는 mtr -r -c 3 <IP>
      - tcptraceroute <IP>:<port>
      - ip -4 neigh (인접 호스트 ARP)
      negative_signs:
      - ping 없이 라우팅 조회만
      - 결과 해석 없이 raw 출력
      - 다른 네트워크 대상 조회
  target_vm: attacker
  script: ping -c 1 10.20.30.80 && echo "--- Routing ---" && ip route get 10.20.30.80
  risk_level: low
  bastion_prompt: 'ping과 ip route를 사용하여 attacker에서 web(10.20.30.80)까지의 네트워크 경로와 연결
    상태를 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 8
  instruction: netcat(nc)을 사용하여 {{WEB_IP}}의 포트 3000에 접속하여 배너를 그래빙하라.
  hint: nc로 접속 후 HTTP 요청을 수동으로 보내라
  category: recon
