lab_id: attack-ai-week07
title: 시스템 익스플로잇 (System Exploits) - AI 지원
version: ai
course: attack-ai
week: 7
description: AI 에이전트를 활용하여 시스템 취약점 공격을 자동화한다. Metasploit 연동, 페이로드 생성, 리버스 셸을 AI가 관리한다.
difficulty: medium
duration_minutes: 120
objectives:
- OpsClaw를 통해 시스템 익스플로잇 작업을 자동화할 수 있다
- AI가 시스템 익스플로잇 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 시스템 익스플로잇의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpsClaw에 시스템 익스플로잇 프로젝트를 생성하라.
  hint: OpsClaw API를 사용하여 시스템 익스플로잇을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:8000/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"name":"시스템_익스플로잇","request_text":"시스템
    익스플로잇","master_mode":"external"}'''
  answer_detail: OpsClaw 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: opsclaw_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
  instruction: AI에게 searchsploit 자동 검색 작업을 수행하도록 요청하라.
  hint: OpsClaw API를 사용하여 시스템 익스플로잇을 자동화한다
  category: exploit
  points: 10
  answer: 'curl -s -X POST http://localhost:8000/projects/{id}/dispatch -H ''Content-Type:
    application/json'' -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"command":"searchsploit
    자동 검색","subagent_url":"http://localhost:8002"}'''
  answer_detail: AI가 searchsploit 자동 검색 작업을 자동 수행하고 결과를 분석한다.
  script: ai_searchsploit_자동_검색.py
