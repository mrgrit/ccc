lab_id: attack-ai-week11
title: 데이터 유출 (Data Exfiltration) - AI 지원
version: ai
course: attack-ai
week: 11
description: AI 에이전트를 활용하여 데이터 유출 시뮬레이션을 수행한다. AI가 민감 데이터를 자동 식별하고, 다양한 유출 채널을 테스트한다.
difficulty: hard
duration_minutes: 120
objectives:
- CCC를 통해 데이터 유출 작업을 자동화할 수 있다
- AI가 데이터 유출 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 데이터 유출의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: CCC에 데이터 유출 프로젝트를 생성하라.
  hint: CCC API를 사용하여 데이터 유출을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:9100/api/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: ccc-api-key-2026'' -d ''{"name":"데이터_유출","request_text":"데이터
    유출","master_mode":"external"}'''
  answer_detail: CCC 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: ccc_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
- order: 2
