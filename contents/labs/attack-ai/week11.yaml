    application/json'' -H ''X-API-Key: ccc-api-key-2026'' -d ''{"command":"민감
    파일 자동 식별","subagent_url":"http://localhost:8002"}'''
  answer_detail: AI가 민감 파일 자동 식별 작업을 자동 수행하고 결과를 분석한다.
