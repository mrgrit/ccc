    학습 목표 (lecture w15 PTES + Bastion 자동) + (lab w15 종합 모의해킹 9 phase) 통합.

    ■ 산출물 — Workshop Short Paper 6 섹션

    ▶ Title
    `cat <<'EOF'
    LLM 기반 자율 모의해킹 에이전트 Bastion 의 수동 대비 정량 비교:
    14주 교육 환경 lab 결과 분석

    Authors: Hong Gildong, Kim Cheolsu, advised by Prof. Park (Univ. of Cyberspace, KISA)
    Workshop: CISC-W 2026 LLM-Sec Track (포스터/short paper)
    EOF`

    ▶ Abstract (~200자)
    `cat <<'EOF'
    [Abstract] LLM 기반 자율 에이전트의 모의해킹 활용은 빠르게 성장하고 있으나, 수동 점검 대비
    *정량적* 효율·완성도 비교 연구는 부족하다. 본 단신은 14주 교육 환경에서 OWASP JuiceShop 대상
    수동 점검 (학생 N=20) 과 Bastion 자동 점검 (gpt-oss:120B) 의 결과를 비교한다. 평균 *정찰
    소요시간* 은 자동이 38% 단축 (54→33분, p<0.05), *발견 취약점 수* 는 두 군 차이 없음 (μ=12.4
    vs 12.1, p=0.71), *재현성* (동일 입력 7회) 은 자동이 우위 (Cohen's κ=0.82 vs 0.43)였다.
    한계: 통제된 교육 환경, 외부 패치 변동 미반영. 향후 *프로덕션 SOC* 환경 6개월 trial 필요.
    EOF`

    ▶ Introduction
    `cat <<'EOF'
    [Introduction]
    1. 배경: 모의해킹 인력 공급 부족 (KISA 2025) + LLM 에이전트 등장으로 자동화 기대.
    2. 선행: PentestGPT (Deng et al., USENIX 2024), CYBER-ZERO (ICLR 2026), AgentSpec (ICSE 2026)
       — 모두 *벤치마크 성능* 측정. *교육 환경에서 학생 vs 자동* 직접 비교 부재.
    3. 본 단신 기여: 14주 교육에서 N=20 학생 + Bastion 자동, 동일 lab 셋 (15 주차 × 15 step)
       을 cross 측정하여 시간·완성도·재현성 3 축 정량 비교.
    EOF`

    ▶ Methodology
    `cat <<'EOF'
    [Methodology]
    - 환경: OWASP JuiceShop + DVWA + Suricata IDS + Wazuh SIEM (10.20.30.0/24).
    - 피험자: 학부 4학년 / 석사 1학년 N=20, 동일 14주 강의 수료.
    - 자동: Bastion (gpt-oss:120B + 33 skill catalog), 동일 lab 자연어 prompt 입력.
    - 측정: 시간 (초 단위), 발견 취약점 수 (CVSS≥4 카운트), 재현성 (Cohen's κ — 7회 반복 결과 일치도).
    - 통계: paired t-test (시간), Mann-Whitney U (취약점 수), κ 차이 검정.
    EOF`

    실 측정 명령 (sample 1 회):
    `t1=$(date +%s); nmap -sT -p 22,80,443,3000,8080 --max-rtt-timeout 1000 -T2 10.20.30.80 2>&1 | tail -10; t2=$(date +%s); echo "[Sample 정찰 시간: $((t2-t1))초]"`

    ▶ Results (Table 1 + 통계)
    `cat <<'EOF'
    [Results]

    Table 1. 수동(N=20) vs Bastion 자동 — 14주 lab 통합 (μ ± σ)
    | 측정 항목 | 수동 (μ ± σ) | 자동 (μ ± σ) | 검정 | p-value |
    | 정찰 소요시간 (분) | 54 ± 11 | 33 ± 7 | paired t | <0.05 |
    | 발견 취약점 수 | 12.4 ± 2.1 | 12.1 ± 1.8 | Mann-Whitney U | 0.71 |
    | 재현성 (Cohen's κ) | 0.43 | 0.82 | bootstrap CI | <0.01 |
    | 보고서 분량 (단어) | 1,820 ± 410 | 2,140 ± 230 | paired t | 0.03 |
    | Critical 누락률 | 8.5% | 4.2% | χ² | 0.04 |

    [핵심 관찰]
    - 시간: 자동 38% 단축 (54→33분), 통계적 유의 (p<0.05).
    - 발견 수: 차이 없음 (자동이 *동등* 수준).
    - 재현성: κ=0.43 → 0.82, 자동이 *2배 일관성*.
    - Critical 누락: 8.5% → 4.2%, 자동이 더 안전.
    EOF`

    ▶ Discussion
    `cat <<'EOF'
    [Discussion]
    - 강점: 자동의 일관성·시간·Critical 누락률이 모두 우위. 교육 환경에서 자동화는 *보완재* 가
      아닌 *경쟁 도구* 로 자리잡을 수 있음.
    - 한계 1: 통제된 교육 환경 — 실 운영 SOC 의 노이즈 (6개월 trial 필요).
    - 한계 2: gpt-oss:120B 패치 시 결과 변동 (재현성 측정에 모델 버전 고정 필요).
    - 한계 3: ICLR 2026 "Breaking Agent Backbones" 가 보인 task 별 비일관성 — 본 연구도
      Privesc/Persistence 카테고리에서 자동 정확도 변동 폭이 다른 영역보다 ±15% 큼.
    - 후속: AgentSpec (ICSE 2026) 의 runtime enforcement 결합 시 신뢰성 추가 검증.
    EOF`

    ▶ References (8 항목, IEEE 양식)
    `cat <<'EOF'
    [References]
    [1] G. Deng et al., "PentestGPT," USENIX Security 2024.
    [2] Anonymous, "CYBER-ZERO," ICLR 2026.
    [3] M. Andriushchenko et al., "AgentHarm," ICLR 2025.
    [4] M. Pan et al., "Why Do Multi-Agent LLM Systems Fail?," ICLR 2025.
    [5] Anonymous, "Breaking Agent Backbones," ICLR 2026.
    [6] H. Wang et al., "AgentSpec," ICSE 2026.
    [7] M. Shao et al., "NYU CTF Bench," NeurIPS 2024.
    [8] Y. Liu et al., "AI Agents Under Threat," ACM Computing Surveys vol.57 no.5, 2025.
    EOF`

    종료: echo "=== CISC-W 2026 LLM-Sec Short Paper ===" + 6 섹션 + Table 1 + 통계 + References.
