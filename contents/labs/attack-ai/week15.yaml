lab_id: attack-ai-week15
title: 종합 모의해킹 (Full Pentest) - AI 지원
version: ai
course: attack-ai
week: 15
description: AI 에이전트를 활용하여 전체 모의해킹 라이프사이클을 자동화한다. 정찰부터 보고서 작성까지 AI가 주도적으로 오케스트레이션한다.
difficulty: hard
duration_minutes: 120
objectives:
- OpsClaw를 통해 종합 모의해킹 작업을 자동화할 수 있다
- AI가 종합 모의해킹 결과를 분석하고 보고서를 생성하는 과정을 학습한다
- 수동 vs AI 기반 종합 모의해킹의 장단점을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpsClaw에 종합 모의해킹 프로젝트를 생성하라.
  hint: OpsClaw API를 사용하여 종합 모의해킹을 자동화한다
  category: recon
  points: 5
  answer: 'curl -s -X POST http://localhost:8000/projects -H ''Content-Type: application/json''
    -H ''X-API-Key: opsclaw-api-key-2026'' -d ''{"name":"종합_모의해킹","request_text":"종합
    모의해킹","master_mode":"external"}'''
  answer_detail: OpsClaw 프로젝트 생성으로 모든 작업의 증적이 자동 기록된다.
  script: opsclaw_project_create.py
  verify:
    type: output_contains
    expect: result
    field: stdout
