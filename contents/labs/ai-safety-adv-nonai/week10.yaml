    instruction: "환각 발생 원리에 대해 분석하고 결과를 정리하라. AI Safety 관점에서 출력 조작과 환각 공격의 맥락에서 상세히 설명하라."
    hint: "환각 발생 원리 관련 OWASP LLM Top 10, NIST AI RMF 등의 프레임워크를 참고하라"
    category: "analysis"
    points: 8
    answer: "환각 발생 원리 분석 완료: 핵심 개념, 공격/방어 기법, 실제 적용 방안을 포함한 상세 분석 결과"
    answer_detail: "환각 발생 원리은(는) AI Safety에서 중요한 영역이다. 공격자 관점과 방어자 관점을 모두 이해하고, 실제 환경에 적용 가능한 대책을 수립해야 한다."
