lab_id: "ai-safety-adv-nonai-week10"
title: "출력 조작과 환각 공격"
version: "non-ai"
course: "ai-safety-adv-nonai"
week: 10
description: "LLM 출력을 조작하여 잘못된 정보를 생성하게 하는 공격을 분석하는 실습"
difficulty: "hard"
duration_minutes: 120
objectives:
  - "LLM 환각(Hallucination)의 원리를 이해한다"
  - "출력 조작 공격 기법을 분석할 수 있다"
  - "출력 검증 메커니즘을 설계할 수 있다"
pass_threshold: 0.6
steps:
