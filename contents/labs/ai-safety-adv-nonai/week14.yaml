lab_id: "ai-safety-adv-nonai-week14"
title: "AI 보안 인시던트 대응"
version: "non-ai"
course: "ai-safety-adv-nonai"
week: 14
description: "AI 시스템의 보안 인시던트에 대응하는 절차를 수립하는 실습"
difficulty: "hard"
duration_minutes: 120
objectives:
  - "AI 보안 인시던트의 유형을 분류할 수 있다"
  - "AI 전용 인시던트 대응 절차를 수립할 수 있다"
  - "AI 인시던트 보고서를 작성할 수 있다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "AI 인시던트 분류에 대해 분석하고 결과를 정리하라. AI Safety 관점에서 AI 보안 인시던트 대응의 맥락에서 상세히 설명하라."
    hint: "AI 인시던트 분류 관련 OWASP LLM Top 10, NIST AI RMF 등의 프레임워크를 참고하라"
    category: "analysis"
    points: 8
    answer: "AI 인시던트 분류 분석 완료: 핵심 개념, 공격/방어 기법, 실제 적용 방안을 포함한 상세 분석 결과"
    answer_detail: "AI 인시던트 분류은(는) AI Safety에서 중요한 영역이다. 공격자 관점과 방어자 관점을 모두 이해하고, 실제 환경에 적용 가능한 대책을 수립해야 한다."
    verify:
      type: "output_contains"
