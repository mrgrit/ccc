lab_id: "ai-safety-adv-nonai-week09"
title: "AI 프라이버시 - 데이터 유출 방지"
version: "non-ai"
course: "ai-safety-adv-nonai"
week: 9
description: "LLM의 학습 데이터 유출 위협을 분석하고 프라이버시 보호 기법을 적용하는 실습"
difficulty: "hard"
duration_minutes: 120
objectives:
  - "학습 데이터 유출 공격 기법을 이해한다"
  - "개인정보 추출 공격을 분석할 수 있다"
  - "프라이버시 보호 메커니즘을 설계할 수 있다"
pass_threshold: 0.6
steps:
