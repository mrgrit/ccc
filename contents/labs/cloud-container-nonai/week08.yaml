lab_id: "cloud-container-nonai-week08"
title: "스토리지 보안 실습"
version: "non-ai"
course: "cloud-container-nonai"
week: 8
description: "Docker 환경에서 스토리지 보안을 점검합니다. 볼륨 암호화, 바인드 마운트 제한, 임시 파일시스템(tmpfs), 데이터 유출 방지를 실습합니다."
difficulty: "medium"
duration_minutes: 120
objectives:
  - "Docker 스토리지 드라이버의 보안 특성을 이해한다"
  - "볼륨과 바인드 마운트의 보안 위험을 평가한다"
  - "민감 데이터의 안전한 관리 방법을 습득한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "WEB 서버(10.20.30.80)에서 Docker 스토리지 드라이버와 루트 디렉터리를 확인하시오."
    hint: "docker info에서 Storage Driver와 Docker Root Dir를 확인하세요."
    category: "audit"
    points: 10
    answer: "ssh trainee@10.20.30.80 'docker info --format \"Storage: {{.Driver}}\nRoot: {{.DockerRootDir}}\" && echo \"--- 디스크 사용량 ---\" && sudo du -sh /var/lib/docker/ 2>/dev/null'"
    answer_detail: "Docker 스토리지 드라이버(overlay2)는 이미지 레이어를 관리합니다. Docker Root Dir(/var/lib/docker)에는 이미지, 컨테이너 데이터, 볼륨이 저장됩니다. 이 디렉터리의 권한(700)과 디스크 파티션을 별도 관리하여 디스크 소진 공격을 방지해야 합니다."
    verify:
      type: "output_contains"
      expect: "Storage"
      field: "stdout"
  - order: 2
    instruction: "Docker 볼륨 목록과 각 볼륨의 마운트 포인트를 확인하시오."
    hint: "docker volume ls와 docker volume inspect를 사용하세요."
    category: "audit"
    points: 10
    answer: "ssh trainee@10.20.30.80 'docker volume ls && echo \"--- 볼륨 상세 ---\" && docker volume ls -q | head -3 | xargs -I{} docker volume inspect --format \"Name: {{.Name}} Mount: {{.Mountpoint}} Driver: {{.Driver}}\" {} 2>/dev/null'"
    answer_detail: "Docker 볼륨은 /var/lib/docker/volumes/에 저장됩니다. 클라우드의 EBS(블록 스토리지)와 유사합니다. 볼륨 내용은 호스트 파일시스템에서 직접 접근 가능하므로, 호스트 보안이 볼륨 보안의 전제 조건입니다."
    verify:
      type: "output_contains"
      expect: "VOLUME"
      field: "stdout"
  - order: 3
    instruction: "컨테이너의 바인드 마운트를 점검하시오. 호스트의 민감 경로가 마운트되어 있는지 확인합니다."
    hint: "docker inspect에서 Mounts를 확인하고, 위험한 마운트 경로를 식별하세요."
    category: "audit"
    points: 12
    answer: "ssh trainee@10.20.30.80 'docker ps -q | xargs -I{} docker inspect --format=\"{{.Name}}:{{range .Mounts}}\n  Type={{.Type}} Src={{.Source}} RW={{.RW}}{{end}}\" {} 2>/dev/null | grep -E \"(docker.sock|/etc|/root|/var/run)\" && echo \"위험한 마운트 발견!\" || echo \"위험한 바인드 마운트 없음\"'"
    answer_detail: "위험한 바인드 마운트: /var/run/docker.sock(호스트 제어), /etc(시스템 설정 접근), /root(root 홈), /(루트 전체). RW=true(읽기/쓰기)이면 수정까지 가능합니다. 클라우드에서 EBS 볼륨 권한 관리와 동일한 원칙으로, 최소한의 경로만 읽기 전용으로 마운트해야 합니다."
    verify:
      type: "output_contains"
      expect: "마운트"
      field: "stdout"
  - order: 4
    instruction: "tmpfs를 사용하는 보안 컨테이너를 실행하시오. 민감 데이터는 디스크 대신 메모리에 저장합니다."
    hint: "--tmpfs 옵션으로 메모리 기반 파일시스템을 마운트하세요."
    category: "config"
    points: 10
    answer: "ssh trainee@10.20.30.80 'docker run --rm --tmpfs /secrets:rw,noexec,nosuid,size=10m alpine:latest sh -c \"echo 'sensitive-data' > /secrets/key.txt && mount | grep /secrets && cat /secrets/key.txt && echo --- && df -h /secrets\"'"
    answer_detail: "tmpfs는 메모리 기반 파일시스템으로, 컨테이너 종료 시 자동 삭제됩니다. 암호화 키, 토큰 등 임시 민감 데이터는 tmpfs에 저장하면 디스크에 흔적이 남지 않습니다. noexec(실행 금지), nosuid(SUID 무시), size(크기 제한) 옵션으로 보안을 강화합니다."
    verify:
      type: "output_contains"
      expect: "tmpfs"
      field: "stdout"
  - order: 5
    instruction: "Docker 이미지 레이어에 민감 정보가 포함되어 있는지 점검하시오."
    hint: "docker history --no-trunc로 빌드 명령을 확인하세요."
    category: "audit"
    points: 12
    answer: "ssh trainee@10.20.30.80 'for IMG in $(docker images -q | head -3); do echo \"=== Image: $IMG ===\"; docker history --no-trunc $IMG 2>/dev/null | grep -iE \"(password|secret|key|token|api_key)\" | head -3; done; echo \"--- 스캔 완료 ---\"'"
    answer_detail: "Dockerfile의 RUN, ENV, COPY 명령에 민감 정보가 포함되면 이미지 레이어에 영구 저장됩니다. docker history로 확인 가능하며, 이후 레이어에서 삭제해도 이전 레이어에 남아 있습니다. multi-stage build와 BuildKit --secret을 사용해야 합니다."
    verify:
      type: "output_contains"
      expect: "스캔 완료"
      field: "stdout"
  - order: 6
    instruction: "Docker Root Dir(/var/lib/docker)의 권한을 확인하시오."
    hint: "stat 명령으로 디렉터리 권한을 확인하세요."
    category: "audit"
    points: 10
    answer: "ssh trainee@10.20.30.80 'stat -c \"%a %U:%G %n\" /var/lib/docker && echo \"--- 하위 디렉터리 ---\" && sudo ls -la /var/lib/docker/ | head -10'"
    answer_detail: "Docker Root Dir은 모든 이미지, 컨테이너, 볼륨 데이터를 저장하므로 root만 접근할 수 있어야 합니다(700). 일반 사용자가 접근 가능하면 이미지 내용, 컨테이너 데이터, 볼륨의 민감 정보가 유출될 수 있습니다."
    verify:
      type: "output_contains"
      expect: "/var/lib/docker"
      field: "stdout"
  - order: 7
    instruction: "미사용(dangling) 볼륨과 이미지를 점검하고 디스크 사용량을 분석하시오."
    hint: "docker system df와 dangling 필터를 사용하세요."
    category: "audit"
    points: 10
    answer: "ssh trainee@10.20.30.80 'echo \"=== Docker 디스크 사용량 ===\"; docker system df; echo \"=== 미사용 볼륨 ===\"; docker volume ls -f dangling=true; echo \"=== 미사용 이미지 ===\"; docker images -f dangling=true --format \"{{.ID}}: {{.Size}}\"'"
    answer_detail: "미사용 리소스는 데이터 유출 위험과 디스크 비용을 증가시킵니다. 삭제된 컨테이너의 볼륨에 데이터베이스 파일이 남아 있을 수 있고, 오래된 이미지에 취약한 소프트웨어가 포함될 수 있습니다. 정기적인 docker system prune이 필요합니다."
    verify:
      type: "output_contains"
      expect: "Docker 디스크 사용량"
      field: "stdout"
  - order: 8
    instruction: "스토리지 보안 종합 점검 스크립트를 작성하고 실행하시오."
    hint: "스토리지 드라이버, 볼륨, 바인드 마운트, 이미지 레이어를 종합 점검하세요."
    category: "audit"
    points: 16
    answer: "cat << 'SCRIPT' > /tmp/storage_security.sh\n#!/bin/bash\nHOST='trainee@10.20.30.80'\necho '=== 스토리지 보안 종합 점검 ==='\necho '[드라이버]'\nssh $HOST 'docker info --format \"{{.Driver}}\"' 2>/dev/null\necho '[Docker Root 권한]'\nssh $HOST 'stat -c \"%a\" /var/lib/docker' 2>/dev/null\necho '[볼륨]'\nssh $HOST 'echo \"총: $(docker volume ls -q | wc -l)개, 미사용: $(docker volume ls -qf dangling=true | wc -l)개\"' 2>/dev/null\necho '[위험 마운트]'\nssh $HOST 'docker ps -q | xargs -I{} docker inspect --format=\"{{range .Mounts}}{{.Source}} {{end}}\" {} 2>/dev/null | tr \" \" \"\\n\" | grep -cE \"(docker.sock|/etc$|/root)\"' 2>/dev/null | xargs -I{} echo \"{}건\"\necho '[이미지 디스크]'\nssh $HOST 'docker system df --format \"Images: {{.Size}}\"' 2>/dev/null | head -1\necho '=== 스토리지 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/storage_security.sh && bash /tmp/storage_security.sh"
    answer_detail: "클라우드 스토리지 보안의 핵심은 암호화(저장 시/전송 시), 접근 제어(IAM 정책), 데이터 분류(민감도 등급), 수명 주기 관리(보관/삭제)입니다. Docker 환경에서는 볼륨 권한 관리, 바인드 마운트 제한, tmpfs 활용, 이미지 레이어 검사가 이에 해당합니다."
    verify:
      type: "output_contains"
      expect: "스토리지 점검 완료"
      field: "stdout"
