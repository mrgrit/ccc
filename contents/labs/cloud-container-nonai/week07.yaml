lab_id: cloud-container-nonai-week07
title: 컨테이너 네트워크 보안 실습
version: non-ai
course: cloud-container-nonai
week: 7
description: Docker 환경에서 네트워크 보안을 강화합니다. 네트워크 격리, DNS 보안, 트래픽 모니터링, iptables 규칙 분석을 수행합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Docker 네트워크 드라이버별 보안 특성을 이해한다
- 컨테이너 간 네트워크 격리를 구현하고 검증한다
- 호스트 방화벽과 Docker 네트워크의 상호작용을 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 Docker가 생성한 iptables 규칙을 분석하시오.
  hint: iptables -L -n으로 DOCKER 관련 체인을 확인하세요.
  category: audit
  points: 10
  answer: sudo iptables -L -n -v --line-numbers 2>/dev/null | head -30 && echo "=== DOCKER 체인 ===" &&
    sudo iptables -L DOCKER -n -v 2>/dev/null && echo "=== DOCKER-ISOLATION ===" && sudo iptables -L DOCKER-ISOLATION-STAGE-1
    -n 2>/dev/null
  answer_detail: Docker는 DOCKER, DOCKER-ISOLATION-STAGE-1/2, DOCKER-USER 체인을 자동 생성합니다. DOCKER-ISOLATION은
    네트워크 간 격리를 담당하고, DOCKER-USER는 사용자 정의 규칙을 위한 체인입니다. 호스트 방화벽 규칙은 DOCKER-USER에 추가해야 Docker와 충돌하지 않습니다.
  verify:
    type: output_contains
    expect: DOCKER
    field: stdout
    semantic:
      intent: 'Docker iptables 체인 분석 — sudo iptables -L -n -v + iptables -L DOCKER + DOCKER-ISOLATION-STAGE-1.
        Docker 자동 생성 체인 4종: DOCKER (포트 매핑) + DOCKER-ISOLATION-STAGE-1/2 (네트워크 격리) + DOCKER-USER (커스텀 룰).
        호스트 방화벽 충돌 주의.'
      success_criteria:
      - DOCKER 키워드
      - iptables -L + DOCKER 체인
      - ISOLATION 체인 분석
      acceptable_methods:
      - iptables -L + 체인별
      - nft list ruleset (nftables 전환 시)
      - iptables-save + analysis
      - Wireshark + conntrack
      negative_signs:
      - DOCKER-USER 체인 개념 없음
      - ISOLATION 구분 없음
      - 호스트 방화벽 충돌 맥락 없음
  target_vm: web
- order: 2
  instruction: 격리된 내부 네트워크(internal)를 생성하시오. 외부 통신이 불가능한 네트워크입니다.
  hint: docker network create --internal 옵션을 사용하세요.
  category: config
  points: 10
  answer: 'docker network create --internal --subnet 172.30.0.0/24 isolated-net 2>/dev/null || echo "이미
    존재"; docker network inspect isolated-net --format "Name: {{.Name}}

    Internal: {{.Internal}}

    Subnet: {{(index .IPAM.Config 0).Subnet}}"'''
  answer_detail: --internal 옵션은 네트워크의 외부 통신을 완전히 차단합니다. 데이터베이스, 캐시 등 외부 접근이 불필요한 서비스는 internal 네트워크에 배치합니다.
    클라우드의 프라이빗 서브넷(인터넷 게이트웨이 없음)과 동일한 개념입니다.
  verify:
    type: output_contains
    expect: Internal
    field: stdout
    semantic:
      intent: 내부 전용 네트워크 — docker network create --internal --subnet 172.30.0.0/24 isolated-net. --internal
        = 외부 통신 완전 차단. 데이터베이스/캐시 등 외부 접근 불필요 서비스용. AWS VPC private subnet (NAT Gateway 없음) 대응.
      success_criteria:
      - Internal 키워드
      - --internal 옵션
      - network inspect 검증
      acceptable_methods:
      - docker network create --internal
      - 'Kubernetes NetworkPolicy egress: []'
      - AWS private subnet + 인터넷 차단
      - Calico egress policy
      negative_signs:
      - --internal 개념 없음
      - 외부 차단 효과 이해 없음
      - inspect Internal 필드 확인 없음
  target_vm: web
- order: 3
  instruction: internal 네트워크에서 외부 통신이 실제로 차단되는지 확인하시오.
  hint: isolated-net에 컨테이너를 배치하고 외부 ping을 시도하세요.
  category: audit
  points: 10
  answer: 'docker run --rm --network isolated-net alpine:latest ping -c 2 -W 3 8.8.8.8 2>&1; echo "종료코드:
    $?"'''
  answer_detail: internal 네트워크의 컨테이너는 같은 네트워크 내의 다른 컨테이너와만 통신 가능하고, 외부(인터넷)로 나갈 수 없습니다. ping 실패(Network
    unreachable)가 확인되면 격리가 정상 동작하는 것입니다.
  verify:
    type: output_contains
    expect:
    - 종료코드
    - blocked
    field: stdout
    semantic:
      intent: internal 차단 검증 — docker run --network isolated-net alpine ping -c 2 -W 3 8.8.8.8 + 종료코드.
        외부 8.8.8.8 ping 실패 = 차단 작동. Network unreachable 에러 + 종료코드 1/2. Egress 격리 실증.
      success_criteria:
      - 종료코드 키워드 또는 blocked
      - 외부 ping 테스트
      - 차단 결과
      acceptable_methods:
      - ping 외부 + 종료코드
      - curl -m 3 + timeout
      - nc -zw 3 차단 확인
      - traceroute 외부 실패
      negative_signs:
      - 차단 실패 무시
      - 종료코드 해석 없음
      - 내부 ping 만
  target_vm: web
- order: 4
  instruction: Docker의 DNS 설정을 확인하시오. 사용자 정의 네트워크의 내장 DNS를 점검합니다.
  hint: 컨테이너 내부의 /etc/resolv.conf를 확인하세요.
  category: audit
  points: 10
  answer: echo "=== bridge 네트워크 DNS ==="; docker run --rm alpine:latest cat /etc/resolv.conf; echo "===
    사용자 정의 네트워크 DNS ==="; docker run --rm --network isolated-net alpine:latest cat /etc/resolv.conf 2>/dev/null
  answer_detail: 사용자 정의 네트워크에서는 Docker 내장 DNS(127.0.0.11)가 컨테이너 이름으로 서비스 디스커버리를 제공합니다. 기본 bridge에서는 --link를
    써야 하지만, 사용자 정의 네트워크에서는 자동입니다. DNS 스푸핑 방지를 위해 신뢰할 수 있는 DNS 서버를 사용해야 합니다.
  verify:
    type: output_contains
    expect: nameserver
    field: stdout
    semantic:
      intent: Docker DNS 설정 — docker run alpine cat /etc/resolv.conf. 기본 bridge = 호스트 DNS 사용 (/etc/resolv.conf
        복사) / 사용자 정의 네트워크 = 내장 DNS 127.0.0.11 (서비스 디스커버리). 컨테이너 이름 기반 DNS lookup 자동. DNS Spoofing 방어 필요.
      success_criteria:
      - nameserver 키워드
      - /etc/resolv.conf 조회
      - DNS 서버 IP 확인
      acceptable_methods:
      - docker run + cat /etc/resolv.conf
      - docker exec nslookup
      - docker run --dns 8.8.8.8
      - Kubernetes CoreDNS 설정
      negative_signs:
      - 기본 vs 사용자 정의 네트워크 DNS 차이 없음
      - 내장 DNS 127.0.0.11 언급 없음
      - 서비스 디스커버리 맥락 없음
  target_vm: web
- order: 5
  instruction: 컨테이너의 네트워크 인터페이스와 IP 정보를 상세히 확인하시오.
  hint: docker inspect에서 NetworkSettings를 확인하세요.
  category: audit
  points: 10
  answer: docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}:\n{{range \$net, \$cfg
    := .NetworkSettings.Networks}}  Network={{\$net}} IP={{\$cfg.IPAddress}} GW={{\$cfg.Gateway}}\n{{end}}"
    {} 2>/dev/null || echo "컨테이너 없음"
  answer_detail: 각 컨테이너는 연결된 네트워크마다 IP 주소를 받습니다. 하나의 컨테이너가 여러 네트워크에 연결되면 네트워크 간 브릿지 역할을 할 수 있어 격리가 무력화될
    수 있습니다. 이를 K8s에서는 NetworkPolicy로 제어합니다.
  verify:
    type: output_contains
    expect: Network
    field: stdout
    semantic:
      intent: 컨테이너 네트워크 인터페이스 — docker inspect --format '{{range $net, $cfg := .NetworkSettings.Networks}}
        Network={{$net}} IP={{$cfg.IPAddress}} GW={{$cfg.Gateway}}{{end}}'. 다중 네트워크 연결 시 각 네트워크별 IP. 1
        컨테이너 = 여러 네트워크 브릿지 역할 가능 (격리 약화 위험).
      success_criteria:
      - Network 키워드
      - NetworkSettings.Networks 조회
      - IP/Gateway 필드
      acceptable_methods:
      - docker inspect NetworkSettings
      - docker network inspect + 컨테이너 목록
      - docker exec ip addr
      - Kubernetes Pod multiNetwork (Multus)
      negative_signs:
      - 다중 네트워크 위험 없음
      - NetworkSettings 필드 없음
      - IP/Gateway 구분 없음
  target_vm: web
- order: 6
  instruction: 호스트에서 컨테이너 네트워크 트래픽을 모니터링하시오.
  hint: 호스트의 docker0 인터페이스에서 tcpdump를 실행하세요.
  category: audit
  points: 12
  answer: echo "=== Docker 네트워크 인터페이스 ==="; ip link show type bridge; echo "--- veth 인터페이스 ---"; ip link
    show type veth 2>/dev/null | head -10; echo "--- 트래픽 캡처 테스트 ---"; sudo timeout 3 tcpdump -i docker0
    -c 5 -n 2>/dev/null || echo "트래픽 없음 또는 docker0 없음"
  answer_detail: 호스트에서 docker0(기본 브릿지) 인터페이스의 트래픽을 모니터링하면 컨테이너 간 통신을 관찰할 수 있습니다. 이는 클라우드의 VPC Flow Logs와
    유사합니다. 암호화되지 않은 컨테이너 간 통신은 호스트에서 평문으로 캡처할 수 있어 민감 데이터 전송 시 TLS가 필요합니다.
  verify:
    type: output_contains
    expect: Docker 네트워크 인터페이스
    field: stdout
    semantic:
      intent: 호스트 트래픽 모니터링 — ip link show type bridge + ip link show type veth + sudo timeout 3 tcpdump
        -i docker0 -c 5 -n. docker0 = 기본 브릿지 인터페이스. veth = 컨테이너-호스트 가상 ethernet 쌍. AWS VPC Flow Logs 대응.
        평문 컨테이너 간 통신 호스트 캡처 가능.
      success_criteria:
      - Docker 네트워크 인터페이스 키워드
      - ip link + tcpdump 조합
      - docker0 또는 veth 확인
      acceptable_methods:
      - tcpdump -i docker0
      - Wireshark + docker0 필터
      - Cilium Hubble (서비스 메시 관측)
      - AWS VPC Flow Logs 유비
      negative_signs:
      - docker0 인터페이스 없음
      - veth 개념 없음
      - VPC Flow Logs 대응 맥락 없음
  target_vm: web
- order: 7
  instruction: 테스트 네트워크를 정리하시오.
  hint: docker network rm으로 생성한 네트워크를 삭제하세요.
  category: config
  points: 8
  answer: docker network rm isolated-net secure-net 2>/dev/null; echo "=== 네트워크 정리 후 ==="; docker network
    ls
  answer_detail: 미사용 네트워크는 보안 점검을 복잡하게 하고, 실수로 잘못된 네트워크에 컨테이너를 배치할 수 있습니다. 정기적으로 docker network prune으로
    미사용 네트워크를 정리해야 합니다.
  verify:
    type: output_contains
    expect:
    - 네트워크 정리 후
    - 네트워크
    field: stdout
    semantic:
      intent: 테스트 네트워크 정리 — docker network rm isolated-net secure-net + docker network ls. 실습 네트워크 삭제
        + 최종 목록 확인. docker network prune 대안. 미사용 네트워크 = 실수로 잘못 배치 위험.
      success_criteria:
      - 네트워크 정리 후 키워드 또는 네트워크
      - docker network rm + ls
      - 정리 완료 확인
      acceptable_methods:
      - docker network rm + ls
      - docker network prune -f
      - ansible docker_network 정리
      - docker system prune -a
      negative_signs:
      - rm 실행 없이 목록만
      - 이전 네트워크 잔존
      - 미사용 네트워크 위험 맥락 없음
  target_vm: web
- order: 8
  instruction: 네트워크 보안 종합 점검 스크립트를 작성하고 실행하시오.
  hint: Docker 네트워크, iptables, 포트 노출, DNS를 종합 점검하세요.
  category: audit
  points: 10
  answer: 'cat << ''SCRIPT'' > /tmp/network_security.sh

    #!/bin/bash

    echo ''=== 컨테이너 네트워크 보안 점검 ===''

    echo ''[네트워크 목록]''

    docker network ls --format "{{.Name}}: Driver={{.Driver}}" 2>/dev/null

    echo ''[포트 노출]''

    docker ps --format "{{.Names}}: {{.Ports}}" 2>/dev/null | head -5

    echo ''[host 네트워크 사용]''

    docker ps -q | xargs -I{} docker inspect --format="{{.HostConfig.NetworkMode}}" {} 2>/dev/null | grep
    -c host | xargs -I{} echo "{}건"

    echo ''[iptables DOCKER 규칙]''

    sudo iptables -L DOCKER -n 2>/dev/null | wc -l | xargs -I{} echo "{}줄"

    echo ''=== 네트워크 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/network_security.sh && bash /tmp/network_security.sh'
  answer_detail: 컨테이너 네트워크 보안의 핵심은 마이크로세그멘테이션(네트워크 격리), 최소 포트 노출, 내부 트래픽 암호화, DNS 보안입니다. 클라우드의 VPC, 서브넷,
    보안 그룹, NACL과 동일한 계층적 네트워크 보안을 Docker 환경에서도 구현해야 합니다.
  verify:
    type: output_contains
    expect: 네트워크 점검 완료
    field: stdout
    semantic:
      intent: '네트워크 보안 종합 점검 스크립트 — /tmp/network_security.sh: 네트워크 목록 + 포트 노출 + host 네트워크 사용 카운트 + iptables
        DOCKER 규칙 수. 마이크로세그멘테이션 + 최소 포트 + 내부 암호화 + DNS 보안 4 축. VPC+서브넷+SG+NACL 대응.'
      success_criteria:
      - 네트워크 점검 완료 키워드
      - /tmp/network_security.sh
      - 4 항목 점검
      acceptable_methods:
      - bash + docker + iptables
      - CIS Docker Benchmark 5.27
      - Terraform 네트워크 감사
      - Prowler network audit
      negative_signs:
      - 항목 2개 이하
      - VPC 대응 맥락 없음
      - 완료 마크 없음
  target_vm: web
