lab_id: cloud-container-nonai-week12
title: 컨테이너 모니터링 및 로깅 실습
version: non-ai
course: cloud-container-nonai
week: 12
description: Docker 환경의 모니터링과 로깅 체계를 구축하고 점검합니다. 컨테이너 로그 수집, 리소스 모니터링, 이벤트 추적, 이상 징후 탐지를 실습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Docker 로깅 드라이버와 로그 관리 방법을 이해한다
- 컨테이너 리소스 모니터링 체계를 구축한다
- Docker 이벤트를 활용한 보안 모니터링 방법을 습득한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 Docker의 로깅 드라이버 설정을 확인하시오.
  hint: docker info에서 Logging Driver를 확인하세요.
  category: audit
  points: 10
  answer: 'docker info --format "Logging: {{.LoggingDriver}}" && echo "--- daemon.json 로그 설정 ---" && cat
    /etc/docker/daemon.json 2>/dev/null | grep -A5 log || echo "daemon.json 로그 설정 없음 (기본값)"'''
  answer_detail: Docker 기본 로깅 드라이버는 json-file로, 컨테이너별 JSON 파일에 로그를 저장합니다. 로그 크기 제한(max-size)과 파일 수(max-file)를
    설정하지 않으면 디스크를 소진합니다. 중앙 로그 수집을 위해 syslog, fluentd, awslogs 드라이버를 사용할 수 있습니다.
  verify:
    type: output_contains
    expect: Logging
    field: stdout
    semantic:
      intent: 'Docker Logging Driver 설정 — docker info --format ''Logging: {{.LoggingDriver}}'' + daemon.json
        확인. 기본 json-file (무제한 크기) → max-size/max-file 설정 필수. syslog/fluentd/awslogs/splunk 대안.'
      success_criteria:
      - Logging 키워드
      - docker info + daemon.json
      - 드라이버 + 설정 확인
      acceptable_methods:
      - docker info + cat daemon.json
      - docker run --log-driver + --log-opt
      - fluentd forwarding + ELK
      - AWS awslogs driver
      negative_signs:
      - 기본 vs 커스텀 드라이버 구분 없음
      - 디스크 소진 위험 맥락 없음
      - 중앙 수집 언급 없음
  target_vm: web
- order: 2
  instruction: 실행 중인 컨테이너의 로그를 확인하시오. 보안 관련 이벤트를 식별합니다.
  hint: docker logs 명령으로 컨테이너 로그를 확인하세요.
  category: audit
  points: 10
  answer: CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== $(docker inspect --format="{{.Name}}"
    $CID) 로그 ===" && docker logs --tail 20 $CID 2>&1 || echo "실행 중인 컨테이너 없음"
  answer_detail: '컨테이너 로그에서 보안 이벤트를 식별해야 합니다: 인증 실패(401/403), 비정상 접근 패턴, 에러 급증, 알 수 없는 경로 접근. docker logs
    --since로 특정 시간 이후 로그를 필터링할 수 있습니다.'
  verify:
    type: output_contains
    expect: 로그
    field: stdout
    semantic:
      intent: 컨테이너 로그 확인 — CID=$(docker ps -q | head -1); docker logs --tail 20 $CID. 401/403 인증 실패 +
        비정상 접근 + 에러 급증 + 알 수 없는 경로 = 보안 이벤트. docker logs --since 시간 필터. SIEM 통합 권장.
      success_criteria:
      - 로그 키워드
      - docker logs --tail
      - 최근 로그 출력
      acceptable_methods:
      - docker logs --tail N
      - docker logs --since 1h
      - docker logs -f 실시간
      - Kubernetes kubectl logs
      negative_signs:
      - 범위 제한 없이 전체 덤프
      - 보안 이벤트 식별 맥락 없음
      - SIEM 통합 언급 없음
  target_vm: web
- order: 3
  instruction: 컨테이너별 로그 파일 크기를 확인하시오. 로그 크기 제한이 없으면 디스크 소진 위험이 있습니다.
  hint: /var/lib/docker/containers/ 하위의 로그 파일 크기를 확인하세요.
  category: audit
  points: 10
  answer: echo "=== 컨테이너 로그 크기 ==="; sudo find /var/lib/docker/containers/ -name "*-json.log" -exec ls
    -lh {} \; 2>/dev/null | awk "{print \$5, \$NF}" | head -10 || echo "로그 파일 없음"
  answer_detail: json-file 드라이버는 기본적으로 로그 크기에 제한이 없어 디스크를 가득 채울 수 있습니다. daemon.json에서 전역 설정하거나, 컨테이너별로
    --log-opt max-size=10m --log-opt max-file=3을 설정하여 로그 크기를 관리해야 합니다.
  verify:
    type: output_contains
    expect:
    - 컨테이너 로그 크기
    - 로그크기
    field: stdout
    semantic:
      intent: 컨테이너 로그 파일 크기 — sudo find /var/lib/docker/containers/ -name '*-json.log' -exec ls -lh {}
        \;. json-file 기본 무제한 = 디스크 소진 가능. --log-opt max-size=10m + max-file=3 필수. logrotate 대체.
      success_criteria:
      - 컨테이너 로그 크기 키워드 또는 로그크기
      - find json.log
      - 파일 크기 출력
      acceptable_methods:
      - find + ls -lh
      - du -sh /var/lib/docker/containers
      - docker inspect LogPath 확인
      - logrotate 설정
      negative_signs:
      - 경로 혼동
      - 크기 집계 없음
      - 무제한 위험 맥락 없음
  target_vm: web
- order: 4
  instruction: Docker 이벤트 스트림을 확인하시오. 컨테이너 생성/시작/중지 등의 이벤트를 모니터링합니다.
  hint: docker events --since 또는 docker system events를 사용하세요.
  category: audit
  points: 10
  answer: echo "=== Docker 이벤트 (최근 1시간) ==="; docker events --since 1h --until 0s --format "{{.Time}}
    {{.Action}} {{.Actor.Attributes.name}}" 2>/dev/null | head -15 || echo "최근 이벤트 없음"
  answer_detail: Docker 이벤트는 컨테이너 라이프사이클(create, start, stop, destroy), 이미지(pull, push), 네트워크(connect,
    disconnect) 등을 추적합니다. 보안 모니터링에서 비인가 컨테이너 생성, 이미지 pull, 네트워크 변경을 감지할 수 있습니다.
  verify:
    type: output_contains
    expect: Docker 이벤트
    field: stdout
    semantic:
      intent: Docker 이벤트 스트림 — docker events --since 1h --format '{{.Time}} {{.Action}} {{.Actor.Attributes.name}}'
        | head -15. 컨테이너 라이프사이클 (create/start/stop/destroy) + 이미지 (pull/push) + 네트워크 (connect/disconnect).
        비인가 컨테이너 생성 탐지.
      success_criteria:
      - Docker 이벤트 키워드
      - docker events --since
      - 이벤트 출력
      acceptable_methods:
      - docker events --since --until --format
      - docker events --filter 필터
      - Falco runtime security (eBPF)
      - Sysdig event monitoring
      negative_signs:
      - 이벤트 스트림 개념 없음
      - 시간 범위 없음
      - 보안 이벤트 맥락 없음
  target_vm: web
- order: 5
  instruction: 컨테이너 리소스 사용량 스냅샷을 수집하시오.
  hint: docker stats --no-stream으로 현재 상태를 캡처하세요.
  category: audit
  points: 10
  answer: echo "=== 리소스 사용량 스냅샷 ==="; docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.PIDs}}"
    2>/dev/null || echo "실행 중인 컨테이너 없음"
  answer_detail: 리소스 모니터링은 성능과 보안 모두에 중요합니다. 비정상적인 CPU/메모리 급증은 암호화폐 채굴(cryptojacking), 데이터 유출, DoS 공격의
    징후일 수 있습니다. Prometheus + cAdvisor로 시계열 데이터를 수집하고 Grafana로 대시보드를 구성합니다.
  verify:
    type: output_contains
    expect:
    - 리소스 사용량 스냅샷
    - snapshot
    field: stdout
    semantic:
      intent: 리소스 사용량 스냅샷 — docker stats --no-stream --format 'table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.PIDs}}'.
        CPU 급증 = 암호화폐 채굴 (cryptojacking) / Net I/O 급증 = 데이터 유출 징후. Prometheus + cAdvisor + Grafana 시계열.
      success_criteria:
      - 리소스 사용량 스냅샷 키워드 또는 snapshot
      - docker stats --no-stream
      - CPU/Memory/Net 지표
      acceptable_methods:
      - docker stats --no-stream --format
      - ctop (TUI)
      - Prometheus cadvisor + Grafana
      - Kubernetes metrics-server + HPA
      negative_signs:
      - --no-stream 없이 연속
      - cryptojacking 맥락 없음
      - 지표 2개 이하
  target_vm: web
- order: 6
  instruction: 호스트에서 컨테이너 관련 시스템 로그를 확인하시오.
  hint: journalctl로 docker 서비스 로그를 확인하세요.
  category: audit
  points: 10
  answer: echo "=== Docker 데몬 로그 ==="; sudo journalctl -u docker --no-pager -n 20 2>/dev/null | tail -15
  answer_detail: Docker 데몬 로그에는 컨테이너 시작/중지 실패, 이미지 pull 오류, 네트워크 문제, 보안 관련 경고가 기록됩니다. 데몬 크래시, OOM Kill,
    디스크 부족 등의 시스템 수준 이벤트도 확인할 수 있습니다.
  verify:
    type: output_contains
    expect:
    - Docker 데몬 로그
    - 로그
    field: stdout
    semantic:
      intent: Docker 데몬 시스템 로그 — sudo journalctl -u docker --no-pager -n 20 | tail -15. 데몬 크래시 + OOM Kill
        + 디스크 부족 + 이미지 pull 오류 + 보안 경고. systemd-journald + docker 서비스 연계. rsyslog 원격 전송 권장.
      success_criteria:
      - Docker 데몬 로그 키워드 또는 로그
      - journalctl -u docker
      - 데몬 이벤트
      acceptable_methods:
      - journalctl -u docker
      - journalctl --since 1h
      - /var/log/syslog grep docker
      - rsyslog 원격 + SIEM 통합
      negative_signs:
      - 컨테이너 로그와 혼동
      - 데몬 로그 중요성 없음
      - OOM/크래시 맥락 없음
  target_vm: web
- order: 7
  instruction: 컨테이너 모니터링 보안 점검 스크립트를 작성하고 실행하시오.
  hint: 로그 설정, 리소스, 이벤트를 종합 점검하세요.
  category: audit
  points: 10
  answer: 'cat << ''SCRIPT'' > /tmp/monitoring_check.sh

    #!/bin/bash

    echo ''=== 컨테이너 모니터링 점검 ===''

    echo ''[로깅 드라이버]''

    docker info --format "{{.LoggingDriver}}" 2>/dev/null

    echo ''[로그 크기 제한]''

    cat /etc/docker/daemon.json 2>/dev/null | grep max-size || echo "미설정 (무제한!)"

    echo ''[로그 파일 총 크기]''

    sudo du -sh /var/lib/docker/containers/ 2>/dev/null | cut -f1

    echo ''[실행 컨테이너]''

    docker ps --format "{{.Names}}: {{.Status}}" 2>/dev/null | head -5

    echo ''[리소스 상한]''

    docker ps -q | xargs -I{} docker inspect --format "{{.Name}}: Mem={{.HostConfig.Memory}}" {} 2>/dev/null
    | head -5

    echo ''=== 모니터링 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/monitoring_check.sh && bash /tmp/monitoring_check.sh'
  answer_detail: '컨테이너 모니터링의 3대 축: (1) 로그(Logs) - 애플리케이션/시스템 이벤트 추적, (2) 메트릭(Metrics) - CPU/메모리/네트워크 리소스
    측정, (3) 트레이스(Traces) - 요청 흐름 추적. 클라우드 네이티브 환경에서는 ELK/EFK(로그), Prometheus/Grafana(메트릭), Jaeger(트레이스)를
    사용합니다.'
  verify:
    type: output_contains
    expect: 모니터링 점검 완료
    field: stdout
    semantic:
      intent: '모니터링 종합 점검 — /tmp/monitoring_check.sh: 로깅 드라이버 + 로그 크기 제한 + 로그 파일 총 크기 + 실행 컨테이너 + 리소스
        상한. 3 모니터링 축: Logs + Metrics + Traces. ELK/EFK + Prometheus + Jaeger 통합 표준. ''모니터링 점검 완료'' 마크.'
      success_criteria:
      - 모니터링 점검 완료 키워드
      - /tmp/monitoring_check.sh
      - 5 항목 점검
      acceptable_methods:
      - bash + 다중 docker 명령
      - Prometheus + Grafana dashboard
      - ELK / OpenTelemetry
      - Datadog / New Relic
      negative_signs:
      - 항목 3개 이하
      - 3 모니터링 축 맥락 없음
      - 완료 마크 없음
  target_vm: web
