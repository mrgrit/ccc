lab_id: cloud-container-nonai-week04
title: Docker 보안 심화 점검
version: non-ai
course: cloud-container-nonai
week: 4
description: Docker 컨테이너의 심화 보안 설정을 점검합니다. 리눅스 Capabilities, Seccomp 프로파일, 읽기 전용 파일시스템, no-new-privileges
  등 런타임 보안 옵션을 확인합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Docker 컨테이너의 리눅스 Capabilities 설정을 이해한다
- Seccomp, AppArmor 프로파일 적용을 점검한다
- 런타임 보안 옵션(read-only, no-new-privileges)을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 실행 중인 컨테이너의 리눅스 Capabilities를 확인하시오.
  hint: docker inspect에서 CapAdd와 CapDrop을 확인하세요.
  category: audit
  points: 12
  answer: 'docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}: CapAdd={{.HostConfig.CapAdd}}
    CapDrop={{.HostConfig.CapDrop}}" {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: 리눅스 Capabilities는 root 권한을 세분화합니다. Docker는 기본적으로 14개 Capability를 부여하는데, NET_RAW(원시 소켓),
    SYS_CHROOT 등이 포함됩니다. --cap-drop ALL로 모든 Capability를 제거하고 필요한 것만 --cap-add로 추가하는 것이 최선의 관행입니다.
  verify:
    type: output_contains
    expect: Cap
    field: stdout
    semantic:
      intent: Linux Capabilities 확인 — docker inspect --format '{{.HostConfig.CapAdd}} {{.HostConfig.CapDrop}}'.
        Docker 기본 14개 Capability (NET_RAW/SYS_CHROOT 등). --cap-drop ALL + 최소 --cap-add = 최소 권한 원칙. MITRE
        D3FEND Process Hardening.
      success_criteria:
      - Cap 키워드
      - CapAdd + CapDrop 필드
      - Capabilities 세분화 이해
      acceptable_methods:
      - docker inspect CapAdd/CapDrop
      - getcap/setcap (호스트 명령)
      - --cap-drop ALL --cap-add NET_BIND_SERVICE
      - Kubernetes securityContext capabilities
      negative_signs:
      - Capabilities 개념 없음
      - 14개 기본 맥락 없음
      - 최소 권한 원칙 없음
  target_vm: web
- order: 2
  instruction: 컨테이너의 privileged 모드 사용 여부를 점검하시오. privileged 모드는 호스트의 모든 장치와 Capability에 접근합니다.
  hint: docker inspect에서 Privileged 항목을 확인하세요.
  category: audit
  points: 12
  answer: 'docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: Privileged={{.HostConfig.Privileged}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: privileged 모드(--privileged)는 컨테이너에 호스트의 모든 Capability, 장치, 커널 모듈 접근을 부여합니다. 이는 컨테이너 격리를
    완전히 무력화하므로 프로덕션에서 절대 사용하면 안 됩니다. 컨테이너 탈출 공격의 주요 벡터입니다.
  verify:
    type: output_contains
    expect: Privileged
    field: stdout
    semantic:
      intent: privileged 모드 점검 — docker inspect --format '{{.HostConfig.Privileged}}'. --privileged =
        모든 Capability + 장치 + 커널 모듈 접근 = 격리 무력화. 프로덕션 절대 금지. MITRE ATT&CK T1611 Escape to Host 주요 벡터.
      success_criteria:
      - Privileged 키워드
      - docker inspect Privileged 필드
      - 모드 확인
      acceptable_methods:
      - docker inspect HostConfig.Privileged
      - --privileged 금지 정책
      - rootless Docker 대체
      - Kubernetes PSP/PSA 제한
      negative_signs:
      - privileged 위험 맥락 없음
      - 필드 확인 없음
      - true/false 해석 없음
  target_vm: web
- order: 3
  instruction: 컨테이너의 사용자(실행 UID) 설정을 확인하시오. root로 실행되는 컨테이너를 식별합니다.
  hint: docker inspect에서 User 필드와 docker top으로 실행 UID를 확인하세요.
  category: audit
  points: 10
  answer: 'docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}: User={{.Config.User}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: 컨테이너 내부에서 root(UID 0)로 프로세스가 실행되면, 컨테이너 탈출 시 호스트에서도 root 권한을 얻게 됩니다. Dockerfile에서 USER
    지시어로 비root 사용자를 지정하거나, --user 플래그로 실행 UID를 변경해야 합니다.
  verify:
    type: output_contains
    expect: User
    field: stdout
    semantic:
      intent: 컨테이너 User 설정 — docker inspect --format '{{.Config.User}}'. root (UID 0) 실행 = 탈출 시 호스트 root.
        Dockerfile USER 지시어 또는 --user 1000:1000 비root. CIS Docker 4.1.
      success_criteria:
      - User 키워드
      - Config.User 필드
      - UID 확인
      acceptable_methods:
      - docker inspect Config.User
      - docker top 확인
      - Dockerfile USER 지시어
      - Kubernetes securityContext.runAsNonRoot
      negative_signs:
      - User 설정 확인 없음
      - root 위험 언급 없음
      - UID 이해 없음
  target_vm: web
- order: 4
  instruction: 컨테이너의 읽기 전용 파일시스템(ReadonlyRootfs) 설정을 점검하시오.
  hint: docker inspect에서 ReadonlyRootfs 항목을 확인하세요.
  category: audit
  points: 10
  answer: 'docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: ReadOnly={{.HostConfig.ReadonlyRootfs}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: 읽기 전용 파일시스템(--read-only)은 컨테이너 내부에서 파일 쓰기를 차단합니다. 공격자가 컨테이너에 침입해도 악성 코드를 저장하거나 설정을 변경할
    수 없습니다. /tmp 같은 쓰기 필요 경로만 tmpfs로 마운트합니다.
  verify:
    type: output_contains
    expect: ReadOnly
    field: stdout
    semantic:
      intent: 읽기 전용 루트 FS — docker inspect --format '{{.HostConfig.ReadonlyRootfs}}'. --read-only = 컨테이너
        내부 파일 쓰기 차단. 공격자 악성 코드 저장 불가. /tmp tmpfs 마운트로 쓰기 필요 경로 대체. CIS Docker 5.12.
      success_criteria:
      - ReadOnly 키워드
      - ReadonlyRootfs 필드
      - 설정 확인
      acceptable_methods:
      - docker inspect ReadonlyRootfs
      - --read-only + --tmpfs /tmp
      - Kubernetes securityContext.readOnlyRootFilesystem
      - GKE hardening 정책
      negative_signs:
      - ReadOnly 확인 없음
      - tmpfs 대체 맥락 없음
      - 쓰기 차단 보호 개념 없음
  target_vm: web
- order: 5
  instruction: 컨테이너의 no-new-privileges 설정을 확인하시오. SUID를 통한 권한 상승을 방지합니다.
  hint: docker inspect에서 SecurityOpt를 확인하세요.
  category: audit
  points: 10
  answer: 'docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: SecurityOpt={{.HostConfig.SecurityOpt}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: no-new-privileges(--security-opt=no-new-privileges)는 컨테이너 내부에서 SUID/SGID 바이너리를 통한 권한
    상승을 방지합니다. 프로세스가 exec 시 추가 권한을 획득할 수 없게 하여, setuid root 바이너리를 악용한 탈출을 차단합니다.
  verify:
    type: output_contains
    expect: SecurityOpt
    field: stdout
    semantic:
      intent: no-new-privileges 확인 — docker inspect --format '{{.HostConfig.SecurityOpt}}'. --security-opt
        no-new-privileges = SUID/SGID 통한 권한 상승 차단. exec 시 권한 획득 불가. CVE-2019-5736 (runc escape) 유사 방어.
        CIS Docker 5.25.
      success_criteria:
      - SecurityOpt 키워드
      - HostConfig.SecurityOpt
      - no-new-privileges 확인
      acceptable_methods:
      - docker inspect SecurityOpt
      - --security-opt no-new-privileges
      - 'Kubernetes allowPrivilegeEscalation: false'
      - systemd service NoNewPrivileges=yes
      negative_signs:
      - no-new-privileges 개념 없음
      - SUID 위험 맥락 없음
      - SecurityOpt 필드 없음
  target_vm: web
- order: 6
  instruction: 컨테이너의 자원 제한(CPU, 메모리) 설정을 점검하시오.
  hint: docker inspect에서 Memory, NanoCpus, PidsLimit을 확인하세요.
  category: audit
  points: 10
  answer: 'docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}: Memory={{.HostConfig.Memory}}
    CPU={{.HostConfig.NanoCpus}} PidsLimit={{.HostConfig.PidsLimit}}" {} 2>/dev/null || echo "실행 중인 컨테이너
    없음"'''
  answer_detail: 자원 제한이 없으면(Memory=0) 하나의 컨테이너가 호스트 전체 자원을 소모하여 다른 컨테이너와 호스트에 영향을 미칩니다(DoS). --memory,
    --cpus, --pids-limit으로 제한을 설정해야 합니다. PidsLimit은 Fork Bomb 공격을 방지합니다.
  verify:
    type: output_contains
    expect: Memory
    field: stdout
    semantic:
      intent: 자원 제한 점검 — docker inspect --format '{{.HostConfig.Memory}} {{.HostConfig.NanoCpus}} {{.HostConfig.PidsLimit}}'.
        Memory=0 무제한 위험. --memory --cpus --pids-limit 필수. Fork Bomb 방어 (pids-limit). DoS 공격 차단. CIS Docker
        5.11/5.28.
      success_criteria:
      - Memory 키워드
      - Memory/CPU/PidsLimit 필드
      - 제한 설정 확인
      acceptable_methods:
      - docker inspect Memory/NanoCpus/PidsLimit
      - --memory 128m --cpus 1.0 --pids-limit 50
      - Kubernetes resources.limits
      - cgroup v2 설정
      negative_signs:
      - Memory=0 위험 맥락 없음
      - PidsLimit 개념 없음
      - DoS 방어 언급 없음
  target_vm: web
- order: 7
  instruction: 보안 설정이 적용된 테스트 컨테이너를 실행하고 설정을 검증하시오.
  hint: 보안 옵션(read-only, cap-drop, no-new-privileges)을 적용하여 nginx를 실행하세요.
  category: config
  points: 14
  answer: docker run -d --name secure-test --read-only --tmpfs /tmp --tmpfs /var/cache/nginx --tmpfs /var/run
    --cap-drop ALL --cap-add NET_BIND_SERVICE --security-opt no-new-privileges --memory 128m --pids-limit
    50 --user 101:101 nginx:latest 2>/dev/null; docker inspect secure-test --format "ReadOnly={{.HostConfig.ReadonlyRootfs}}
    Privileged={{.HostConfig.Privileged}} CapDrop={{.HostConfig.CapDrop}} Memory={{.HostConfig.Memory}}
    NoNewPriv={{.HostConfig.SecurityOpt}}" 2>/dev/null && docker rm -f secure-test 2>/dev/null || echo
    '테스트 완료'
  answer_detail: '이 컨테이너에는 모든 주요 보안 옵션이 적용되어 있습니다: --read-only(파일시스템 보호), --cap-drop ALL(최소 권한), --security-opt
    no-new-privileges(권한 상승 방지), --memory(자원 제한), --pids-limit(Fork Bomb 방지), --user(비root 실행). 프로덕션 컨테이너는
    이러한 설정을 기본으로 적용해야 합니다.'
  verify:
    type: output_contains
    expect: ReadOnly
    field: stdout
    semantic:
      intent: 보안 강화 컨테이너 실행 — docker run -d --name secure-test --read-only --tmpfs /tmp --tmpfs /var/cache/nginx
        --tmpfs /var/run --cap-drop ALL --cap-add NET_BIND_SERVICE --security-opt no-new-privileges --memory
        128m --pids-limit 50 --user 101:101 nginx:latest. 모든 보안 옵션 종합 적용. 프로덕션 표준 템플릿.
      success_criteria:
      - ReadOnly 키워드
      - 6+ 보안 옵션 적용
      - 실제 docker run 실행
      acceptable_methods:
      - docker run + 모든 옵션
      - Dockerfile 에 ENTRYPOINT + docker-compose.yml
      - Kubernetes Pod securityContext
      - Helm values 보안 기본값
      negative_signs:
      - 옵션 3개 이하
      - 실행 없이 이론
      - 검증 단계 없음
  target_vm: web
- order: 8
  instruction: Docker 보안 심화 종합 점검 스크립트를 작성하고 실행하시오.
  hint: 모든 실행 중인 컨테이너의 보안 설정을 일괄 점검하세요.
  category: audit
  points: 12
  answer: "cat << 'SCRIPT' > /tmp/docker_security.sh\n#!/bin/bash\nHOST='ccc@10.20.30.80'\necho '=== Docker\
    \ 보안 심화 점검 ==='\nfor CID in $(docker ps -q); do\n  NAME=$(docker inspect --format=\"{{.Name}}\" $CID)\n\
    \  PRIV=$(docker inspect --format=\"{{.HostConfig.Privileged}}\" $CID)\n  RO=$(docker inspect --format=\"\
    {{.HostConfig.ReadonlyRootfs}}\" $CID)\n  USER=$(docker inspect --format=\"{{.Config.User}}\" $CID)\n\
    \  MEM=$(docker inspect --format=\"{{.HostConfig.Memory}}\" $CID)\n  CAP=$(docker inspect --format=\"\
    {{.HostConfig.CapDrop}}\" $CID)\n  echo \"$NAME:\"\n  echo \"  Privileged=$PRIV $([ \"$PRIV\" = \"\
    true\" ] && echo \"[위험]\" || echo \"[양호]\")\"  \n  echo \"  ReadOnly=$RO $([ \"$RO\" = \"true\" ]\
    \ && echo \"[양호]\" || echo \"[권고]\")\"  \n  echo \"  User=$USER $([ -z \"$USER\" ] && echo \"[권고:root]\"\
    \ || echo \"[양호]\")\"  \n  echo \"  Memory=$MEM $([ \"$MEM\" = \"0\" ] && echo \"[권고:무제한]\" || echo\
    \ \"[양호]\")\"  \ndone 2>/dev/null\necho '=== Docker 보안 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/docker_security.sh\
    \ && bash /tmp/docker_security.sh"
  answer_detail: Docker 보안의 핵심 원칙은 최소 권한, 격리 강화, 자원 제한입니다. CIS Docker Benchmark에서는 이러한 설정을 체계적으로 점검하는
    가이드를 제공합니다. 컨테이너 보안은 빌드 시(이미지), 배포 시(레지스트리), 런타임(실행 중) 전 단계에서 적용해야 합니다.
  verify:
    type: output_contains
    expect: Docker 보안 점검 완료
    field: stdout
    semantic:
      intent: 'Docker 보안 심화 점검 스크립트 — /tmp/docker_security.sh: 모든 컨테이너 Privileged + ReadOnly + User +
        Memory + CapDrop 일괄 점검 + [위험]/[양호]/[권고] 태그. CIS Docker Benchmark 기반 자동화. Docker 보안 점검 완료 마크.'
      success_criteria:
      - Docker 보안 점검 완료 키워드
      - /tmp/docker_security.sh
      - 5개 이상 항목 점검
      acceptable_methods:
      - bash for + docker inspect
      - docker-bench-security (공식)
      - Trivy config scan
      - CIS Docker Benchmark audit script
      negative_signs:
      - 항목 3개 이하
      - 태그 구분 없음
      - CIS 맥락 없음
  target_vm: web
