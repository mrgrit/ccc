lab_id: cloud-container-nonai-week03
title: 컨테이너 기초 보안 점검
version: non-ai
course: cloud-container-nonai
week: 3
description: 컨테이너 기술의 핵심 구성 요소(이미지, 레이어, 볼륨, 네트워크)를 이해하고, 각 요소의 보안 설정을 점검합니다.
difficulty: easy
duration_minutes: 120
objectives:
- 컨테이너 이미지 레이어 구조와 보안 영향을 이해한다
- 컨테이너 볼륨과 바인드 마운트의 보안 위험을 파악한다
- 컨테이너 라이프사이클별 보안 점검 방법을 습득한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 로컬에 저장된 Docker 이미지 목록을 확인하시오.
  hint: docker images 명령을 사용하세요.
  category: recon
  points: 8
  answer: docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}"
  answer_detail: Docker 이미지는 읽기 전용 레이어의 스택으로 구성됩니다. 각 Dockerfile 명령어(RUN, COPY, ADD)가 하나의 레이어를 생성합니다.
    이미지 크기가 클수록 공격 표면이 넓어지므로, 가능한 작은 베이스 이미지(alpine, distroless)를 사용해야 합니다.
  verify:
    type: output_contains
    expect: REPOSITORY
    field: stdout
    semantic:
      intent: 로컬 Docker 이미지 목록 — docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}'.
        REPOSITORY/TAG/SIZE/AGE 포맷. 이미지 크기 = 공격 표면. alpine/distroless = 최소화 권장.
      success_criteria:
      - REPOSITORY 키워드
      - docker images --format
      - 4개 이상 컬럼
      acceptable_methods:
      - docker images --format
      - docker image ls
      - crictl images
      - podman images
      negative_signs:
      - format 없이 기본 출력
      - SIZE 확인 없음
      - 공격 표면 맥락 없음
  target_vm: web
- order: 2
  instruction: Docker 이미지의 레이어 히스토리를 확인하시오. 빌드 과정에서 민감 정보가 포함되었는지 점검합니다.
  hint: docker history 명령으로 이미지 빌드 이력을 확인하세요.
  category: audit
  points: 10
  answer: IMG=$(docker images -q | head -1); [ -n "$IMG" ] && docker history $IMG --no-trunc 2>/dev/null
    | head -15 || echo "이미지 없음"
  answer_detail: docker history는 이미지의 각 레이어를 생성한 명령을 표시합니다. RUN 명령에 패스워드, API 키 등이 포함되면 이미지 레이어에 영구 저장됩니다.
    삭제해도 이전 레이어에 남아 있으므로, 빌드 시 multi-stage build를 사용하거나 BuildKit의 --secret을 활용해야 합니다.
  verify:
    type: output_contains
    expect: IMAGE
    field: stdout
    semantic:
      intent: 이미지 레이어 히스토리 — IMG=$(docker images -q | head -1); docker history $IMG --no-trunc | head
        -15. 각 Dockerfile 명령이 생성한 레이어 이력. RUN/COPY/ADD 단계 추적. 민감 정보 (패스워드/API key) 노출 탐지. multi-stage
        build + BuildKit --secret 권장. MITRE ATT&CK T1552.001 Credentials in Files.
      success_criteria:
      - IMAGE 키워드
      - docker history 명령
      - --no-trunc 옵션
      acceptable_methods:
      - docker history --no-trunc
      - dive (이미지 분석 도구)
      - Trivy image 스캔
      - syft SBOM 생성
      negative_signs:
      - history 생략
      - 민감 정보 노출 맥락 없음
      - multi-stage 권장 없음
  target_vm: web
- order: 3
  instruction: 컨테이너의 마운트 포인트(볼륨, 바인드 마운트)를 확인하시오. 호스트 파일시스템 노출 여부를 점검합니다.
  hint: docker inspect에서 Mounts 항목을 확인하세요.
  category: audit
  points: 12
  answer: docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}:\n{{range .Mounts}}  Type={{.Type}}
    Src={{.Source}} Dst={{.Destination}} RW={{.RW}}\n{{end}}" {} 2>/dev/null || echo "실행 중인 컨테이너 없음"
  answer_detail: 바인드 마운트(-v /host/path:/container/path)는 호스트 파일시스템을 직접 노출하므로 위험합니다. 특히 /etc, /var/run/docker.sock,
    / 같은 민감 경로를 마운트하면 컨테이너에서 호스트를 제어할 수 있습니다. 볼륨(docker volume)은 Docker가 관리하여 상대적으로 안전합니다.
  verify:
    type: output_contains
    expect: 컨테이너
    field: stdout
    semantic:
      intent: '컨테이너 마운트 포인트 — docker ps -q | head -3 | xargs docker inspect --format=''{{.Name}}: {{range
        .Mounts}} Type={{.Type}} Src={{.Source}} Dst={{.Destination}} RW={{.RW}} {{end}}''. Type=bind
        (호스트 직접 노출) vs volume (Docker 관리). /etc + /var/run/docker.sock + / 마운트 = 치명. MITRE ATT&CK T1611
        Escape to Host.'
      success_criteria:
      - 컨테이너 키워드
      - Mounts 필드 + Type/Source/Destination
      - RW 플래그
      acceptable_methods:
      - docker inspect --format Mounts
      - docker volume inspect
      - crictl inspect 대응
      - Kubernetes volumeMounts
      negative_signs:
      - bind vs volume 구분 없음
      - /var/run/docker.sock 위험 맥락 없음
      - 마운트 포인트 확인 없음
  target_vm: web
- order: 4
  instruction: Docker 볼륨 목록을 확인하고 미사용(dangling) 볼륨이 있는지 점검하시오.
  hint: docker volume ls와 dangling 필터를 사용하세요.
  category: audit
  points: 10
  answer: 'docker volume ls && echo "--- 미사용 볼륨 ---" && docker volume ls -f dangling=true --format "{{.Name}}:
    {{.Driver}}"'''
  answer_detail: 미사용(dangling) 볼륨은 삭제된 컨테이너가 남긴 것으로, 민감 데이터(DB, 로그, 설정)가 포함될 수 있습니다. 정기적으로 docker volume
    prune으로 정리해야 합니다. 클라우드의 EBS 스냅샷 관리와 유사한 개념입니다.
  verify:
    type: output_contains
    expect: VOLUME
    field: stdout
    semantic:
      intent: Docker 볼륨 목록 + dangling — docker volume ls + docker volume ls -f dangling=true. dangling
        = 어떤 컨테이너와도 연결되지 않은 고아 볼륨 = 민감 데이터 (DB/로그/설정) 잔존 가능. docker volume prune 정기 정리. EBS 스냅샷 관리 유사.
      success_criteria:
      - VOLUME 키워드
      - docker volume ls 명령
      - dangling 필터
      acceptable_methods:
      - docker volume ls + -f dangling=true
      - docker volume prune --dry-run
      - AWS EBS snapshot 관리 유비
      - volume driver 옵션
      negative_signs:
      - dangling 개념 없음
      - prune 언급 없음
      - 데이터 잔존 위험 맥락 없음
  target_vm: web
- order: 5
  instruction: 중지된 컨테이너와 미사용 이미지를 확인하시오. 디스크 낭비와 보안 위험을 파악합니다.
  hint: docker ps -a로 중지된 컨테이너, docker images -f dangling=true로 미사용 이미지를 확인하세요.
  category: audit
  points: 10
  answer: 'echo "=== 중지된 컨테이너 ==="; docker ps -a --filter status=exited --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
    2>/dev/null; echo "=== 미사용 이미지 ==="; docker images -f dangling=true --format "{{.ID}}: {{.Size}}"
    2>/dev/null'''
  answer_detail: 중지된 컨테이너에는 실행 중에 생성된 파일(로그, 임시 데이터, 인증 정보)이 남아 있습니다. 미사용 이미지는 취약한 버전의 소프트웨어를 포함할 수 있습니다.
    정기적으로 docker system prune으로 정리하되, 프로덕션에서는 신중하게 수행해야 합니다.
  verify:
    type: output_contains
    expect: 중지된 컨테이너
    field: stdout
    semantic:
      intent: 중지 컨테이너 + dangling 이미지 — docker ps -a --filter status=exited + docker images -f dangling=true.
        중지 컨테이너 = 실행 중 생성 파일 (로그/임시/인증) 잔존. dangling 이미지 = 태그 없는 고아 = 취약 버전 포함 가능. docker system prune
        정리.
      success_criteria:
      - 중지된 컨테이너 키워드
      - --filter status=exited
      - -f dangling=true
      acceptable_methods:
      - docker ps -a --filter
      - docker images --filter dangling
      - docker system prune -a
      - cron + 자동 정리
      negative_signs:
      - 필터 없이 전체
      - dangling 개념 없음
      - 정리 권장 없음
  target_vm: web
- order: 6
  instruction: Docker 디스크 사용량을 분석하시오.
  hint: docker system df 명령을 사용하세요.
  category: audit
  points: 10
  answer: docker system df && echo "--- 상세 ---" && docker system df -v 2>/dev/null | head -20
  answer_detail: docker system df는 이미지, 컨테이너, 볼륨, 빌드 캐시의 디스크 사용량을 표시합니다. RECLAIMABLE 컬럼은 정리 가능한 공간입니다.
    클라우드 환경에서 디스크 비용과 직결되므로 정기적인 모니터링과 정리가 필요합니다.
  verify:
    type: output_contains
    expect: RECLAIMABLE
    field: stdout
    semantic:
      intent: 디스크 사용량 — docker system df + docker system df -v. 이미지/컨테이너/볼륨/빌드 캐시 디스크 사용. RECLAIMABLE
        컬럼 = 정리 가능 공간. 클라우드 비용 직결 + 정기 모니터링 필수.
      success_criteria:
      - RECLAIMABLE 키워드
      - docker system df 명령
      - -v 상세
      acceptable_methods:
      - docker system df + -v
      - du -sh /var/lib/docker
      - Grafana + cadvisor
      - Prometheus docker_exporter
      negative_signs:
      - df 만 (system 아님)
      - RECLAIMABLE 해석 없음
      - 비용 연관 맥락 없음
  target_vm: web
- order: 7
  instruction: 컨테이너 내부에서 실행 중인 프로세스를 확인하시오.
  hint: docker top 명령으로 컨테이너 프로세스를 확인하세요.
  category: audit
  points: 10
  answer: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "컨테이너: $(docker inspect --format="{{.Name}}"
    $CID)" && docker top $CID 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: docker top은 컨테이너 내부 프로세스를 호스트 관점에서 보여줍니다. UID 컬럼에서 root(0)으로 실행되는 프로세스가 있으면 위험합니다. 컨테이너
    내부에서도 비root 사용자(USER 지시어)로 프로세스를 실행해야 합니다.
  verify:
    type: output_contains
    expect: PID
    field: stdout
    semantic:
      intent: 컨테이너 내부 프로세스 — CID=$(docker ps -q | head -1); docker top $CID. 호스트 관점 프로세스 뷰 + UID 컬럼 확인.
        root (0) 실행 = 위험. 비root USER 지시어 필수. MITRE ATT&CK T1611 Escape to Host.
      success_criteria:
      - PID 키워드
      - docker top 명령
      - 컨테이너 내 프로세스
      acceptable_methods:
      - docker top CID
      - docker exec CID ps aux
      - crictl ps (containerd)
      - Kubernetes kubectl exec + ps
      negative_signs:
      - UID 확인 없음
      - root 실행 위험 맥락 없음
      - 컨테이너 지정 없음
  target_vm: web
- order: 8
  instruction: 컨테이너 리소스 사용량을 실시간으로 확인하시오.
  hint: docker stats --no-stream으로 한 번만 스냅샷을 찍으세요.
  category: audit
  points: 10
  answer: docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}"
    2>/dev/null || echo "실행 중인 컨테이너 없음"
  answer_detail: docker stats는 CPU, 메모리, 네트워크, 디스크 I/O를 표시합니다. 자원 제한이 설정되지 않은 컨테이너는 호스트 자원을 독점할 수 있어 DoS
    공격에 취약합니다. 클라우드 환경에서 자원 모니터링은 비용 관리와 보안 모두에 중요합니다.
  verify:
    type: output_contains
    expect: MEM
    field: stdout
    semantic:
      intent: 컨테이너 리소스 사용 — docker stats --no-stream --format 'table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}'.
        CPU + Memory + NetIO + BlockIO 실시간 스냅샷. 자원 제한 (--cpus/-m) 없으면 DoS 취약. 클라우드 비용 + 보안 지표.
      success_criteria:
      - MEM 키워드 또는 Memory
      - docker stats --no-stream
      - CPU + Mem 출력
      acceptable_methods:
      - docker stats --no-stream
      - ctop (TUI)
      - Prometheus cadvisor
      - Kubernetes metrics-server
      negative_signs:
      - --no-stream 없이 (연속)
      - CPU 또는 Memory 누락
      - 리소스 제한 맥락 없음
  target_vm: web
- order: 9
  instruction: 컨테이너 기초 보안 종합 점검 스크립트를 작성하고 실행하시오.
  hint: 이미지, 볼륨, 네트워크, 디스크 사용량을 종합 점검하세요.
  category: audit
  points: 10
  answer: 'cat << ''SCRIPT'' > /tmp/container_basic.sh

    #!/bin/bash

    echo ''=== 컨테이너 기초 보안 점검 ===''

    echo "[이미지] $(docker images -q | wc -l 2>/dev/null)개"

    echo "[실행 컨테이너] $(docker ps -q | wc -l 2>/dev/null)개"

    echo "[중지 컨테이너] $(docker ps -aq --filter status=exited | wc -l 2>/dev/null)개"

    echo "[볼륨] $(docker volume ls -q | wc -l 2>/dev/null)개"

    echo "[미사용 볼륨] $(docker volume ls -qf dangling=true | wc -l 2>/dev/null)개"

    echo "[네트워크] $(docker network ls -q | wc -l 2>/dev/null)개"

    docker system df 2>/dev/null | head -5

    echo ''=== 기초 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/container_basic.sh && bash /tmp/container_basic.sh'
  answer_detail: 컨테이너 보안 점검은 빌드(이미지), 배포(레지스트리), 런타임(실행 중 컨테이너)의 세 단계로 나뉩니다. 이 실습은 런타임 단계에 초점을 맞추어 실행
    환경의 보안 상태를 파악합니다. 미사용 리소스 정리, 이미지 업데이트, 자원 제한이 기본적인 보안 조치입니다.
  verify:
    type: output_contains
    expect: 기초 점검 완료
    field: stdout
    semantic:
      intent: '컨테이너 기초 종합 점검 — /tmp/container_basic.sh: 이미지 수 + 실행/중지 컨테이너 + 볼륨/dangling + 네트워크 + system
        df. 6개 지표 집계. ''기초 점검 완료''. 빌드/배포/런타임 3단계 중 런타임 점검 초점.'
      success_criteria:
      - 기초 점검 완료 키워드
      - /tmp/container_basic.sh 생성
      - 6개 이상 지표
      acceptable_methods:
      - bash heredoc + chmod + 실행
      - docker-bench-security
      - CIS Docker Benchmark v1.6
      - Trivy config scan
      negative_signs:
      - 지표 3개 이하
      - 완료 마크 없음
      - 빌드/런타임 구분 없음
  target_vm: web
