lab_id: cloud-container-nonai-week13
title: 컨테이너 인시던트 대응 실습
version: non-ai
course: cloud-container-nonai
week: 13
description: Docker 컨테이너 환경에서 보안 인시던트를 탐지하고 대응합니다. 의심 컨테이너 격리, 포렌식 데이터 수집, 컨테이너 분석, 복구 절차를 실습합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 컨테이너 환경의 인시던트 대응 절차를 이해한다
- 의심 컨테이너에서 포렌식 데이터를 수집한다
- 컨테이너 격리와 복구 절차를 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 실행 중인 컨테이너의 이상 징후를 확인하시오. 인시던트 탐지 단계.
  hint: docker stats와 docker top으로 비정상 활동을 확인하세요.
  category: audit
  points: 10
  answer: 'echo "=== 인시던트 탐지: 리소스 이상 ==="; docker stats --no-stream --format "{{.Name}}\tCPU:{{.CPUPerc}}\tMem:{{.MemUsage}}\tPIDs:{{.PIDs}}"
    2>/dev/null; echo "=== 프로세스 확인 ==="; docker ps -q | head -3 | xargs -I{} sh -c "echo --- \$(docker
    inspect --format=\"{{.Name}}\" {}) ---; docker top {} 2>/dev/null | head -5" 2>/dev/null'''
  answer_detail: '컨테이너 인시던트 탐지의 징후: 비정상 CPU/메모리 사용(채굴), 예상치 못한 프로세스(리버스 셸), 네트워크 I/O 급증(데이터 유출), PID 수
    급증(Fork Bomb). docker top으로 컨테이너 내부 프로세스를 확인하여 의심 프로세스를 식별합니다.'
  verify:
    type: output_contains
    expect: 인시던트 탐지
    field: stdout
    semantic:
      intent: 인시던트 탐지 이상 징후 — docker stats + docker top. CPU/Memory 급증 = 채굴 / 예상외 프로세스 = 리버스 셸 / Net I/O
        = 유출 / PID 급증 = Fork Bomb. NIST SP 800-61 Detection & Analysis 단계.
      success_criteria:
      - 인시던트 탐지 키워드
      - docker stats + top 조합
      - 이상 징후 분석
      acceptable_methods:
      - docker stats + top
      - Falco runtime security
      - Sysdig Secure
      - Aqua / Prisma Cloud runtime
      negative_signs:
      - stats 또는 top 단일만
      - 이상 징후 분류 없음
      - NIST IR 맥락 없음
  target_vm: web
- order: 2
  instruction: 의심 컨테이너의 네트워크 연결 상태를 확인하시오. 외부 C2 서버 통신을 탐지합니다.
  hint: docker exec로 컨테이너 내부의 네트워크 연결을 확인하세요.
  category: audit
  points: 12
  answer: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== 네트워크 연결 분석: $(docker inspect --format="{{.Name}}"
    $CID) ==="; docker exec $CID sh -c "cat /proc/net/tcp 2>/dev/null | head -10; echo --- ; netstat -tlnp
    2>/dev/null || ss -tlnp 2>/dev/null" 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: 인시던트 대응에서 네트워크 분석은 C2(Command & Control) 통신을 식별하는 핵심입니다. /proc/net/tcp에서 외부 IP로의 ESTABLISHED
    연결, 알 수 없는 LISTEN 포트를 확인합니다. 컨테이너의 의도된 네트워크 연결과 비교하여 비정상 연결을 식별합니다.
  verify:
    type: output_contains
    expect: 네트워크 연결 분석
    field: stdout
    semantic:
      intent: 컨테이너 네트워크 분석 C2 탐지 — docker exec $CID sh -c 'cat /proc/net/tcp + netstat -tlnp'. ESTABLISHED
        외부 IP + 알 수 없는 LISTEN 포트 = C2 의심. 의도된 연결과 비교. MITRE ATT&CK T1071 Application Layer Protocol.
      success_criteria:
      - 네트워크 연결 분석 키워드
      - /proc/net/tcp 또는 netstat
      - C2 탐지 분석
      acceptable_methods:
      - docker exec + cat /proc/net/tcp
      - ss -tlnp 대체
      - tshark + 캡처
      - Falco network rules
      negative_signs:
      - 의도된 연결 비교 없음
      - C2 개념 없음
      - T1071 맥락 없음
  target_vm: web
- order: 3
  instruction: 의심 컨테이너를 네트워크에서 격리하시오. 인시던트 억제 단계.
  hint: docker network disconnect으로 네트워크를 분리하세요.
  category: config
  points: 12
  answer: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect --format="{{.Name}}"
    $CID | tr -d "/"); echo "=== 컨테이너 격리: $CNAME ==="; NETS=$(docker inspect --format="{{range \$k, \$v
    := .NetworkSettings.Networks}}{{\$k}} {{end}}" $CID); echo "연결된 네트워크: $NETS"; echo "(실제 격리는 docker
    network disconnect <net> <container>)"; echo "격리 절차 확인 완료" || echo "컨테이너 없음"'''
  answer_detail: 인시던트 억제(Containment)에서 컨테이너를 즉시 삭제하면 포렌식 증거가 사라집니다. 먼저 네트워크를 분리(docker network disconnect)하여
    추가 피해를 방지하고, 상태를 보존한 채 분석합니다. docker pause로 프로세스를 일시 정지할 수도 있습니다.
  verify:
    type: output_contains
    expect:
    - 격리 절차 확인 완료
    - 격리
    field: stdout
    semantic:
      intent: 컨테이너 격리 (Containment) — docker inspect NetworkSettings.Networks + docker network disconnect.
        삭제 아닌 네트워크 분리로 포렌식 증거 보존. docker pause 프로세스 일시 정지 대안. NIST SP 800-61 Containment.
      success_criteria:
      - 격리 절차 확인 완료 키워드 또는 격리
      - network disconnect 또는 pause
      - 증거 보존 개념
      acceptable_methods:
      - docker network disconnect
      - docker pause (프로세스 정지)
      - iptables DROP 규칙
      - Kubernetes NetworkPolicy deny-all
      negative_signs:
      - 즉시 삭제 (증거 손실)
      - 격리 방법 언급 없음
      - 포렌식 보존 맥락 없음
  target_vm: web
- order: 4
  instruction: 컨테이너의 파일시스템 변경사항을 확인하시오. 포렌식 분석 단계.
  hint: docker diff로 컨테이너 내부의 변경된 파일을 확인하세요.
  category: audit
  points: 12
  answer: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== 파일시스템 변경 분석: $(docker inspect --format="{{.Name}}"
    $CID) ==="; docker diff $CID 2>/dev/null | head -20 || echo "변경 없음"'''
  answer_detail: docker diff는 컨테이너 생성 후 변경된 파일을 표시합니다. A(추가), C(변경), D(삭제). 악성 코드가 추가되었거나(/tmp/backdoor),
    설정이 변경되었거나(/etc/passwd), 바이너리가 교체된 것을 식별할 수 있습니다. 이 정보는 IOC(Indicator of Compromise)로 활용됩니다.
  verify:
    type: output_contains
    expect: 파일시스템 변경 분석
    field: stdout
    semantic:
      intent: 파일시스템 변경 분석 — docker diff $CID. A (추가) / C (변경) / D (삭제). /tmp/backdoor 추가 + /etc/passwd
        변경 + 바이너리 교체 탐지. IOC (Indicator of Compromise). 포렌식 분석 기초.
      success_criteria:
      - 파일시스템 변경 분석 키워드
      - docker diff 명령
      - A/C/D 변경 유형
      acceptable_methods:
      - docker diff CID
      - docker cp + 외부 분석
      - Sysdig 파일 이벤트
      - auditd file watch
      negative_signs:
      - diff 없이 inspect 만
      - A/C/D 의미 없음
      - IOC 맥락 없음
  target_vm: web
- order: 5
  instruction: 컨테이너를 이미지로 커밋하여 포렌식 스냅샷을 보존하시오.
  hint: docker commit으로 현재 상태를 이미지로 저장하세요.
  category: config
  points: 10
  answer: CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect --format="{{.Name}}"
    $CID | tr -d "/"); echo "=== 포렌식 스냅샷 생성 ==="; docker commit $CID forensic-${CNAME}-$(date +%Y%m%d)
    2>/dev/null && docker images | grep forensic || echo "컨테이너 없음"
  answer_detail: docker commit은 컨테이너의 현재 상태를 새 이미지로 저장합니다. 이 포렌식 이미지는 나중에 분석할 수 있으며, 법적 증거로도 활용됩니다. 커밋
    후 원본 컨테이너를 삭제해도 포렌식 이미지에서 분석을 계속할 수 있습니다.
  verify:
    type: output_contains
    expect: 포렌식 스냅샷 생성
    field: stdout
    semantic:
      intent: 포렌식 스냅샷 commit — docker commit $CID forensic-${CNAME}-$(date +%Y%m%d). 현재 상태 새 이미지로 저장.
        나중 분석 + 법적 증거. 원본 삭제해도 분석 가능. Docker Hub push 주의 (민감 정보 포함).
      success_criteria:
      - 포렌식 스냅샷 생성 키워드
      - docker commit 명령
      - forensic- 이미지 생성
      acceptable_methods:
      - docker commit CID + 태그
      - docker export tar 파일
      - dd if=container-fs for disk image
      - Velociraptor 수집
      negative_signs:
      - 커밋 실행 없이 이론
      - Forensic 이미지명 없음
      - 증거 보존 맥락 없음
  target_vm: web
- order: 6
  instruction: 컨테이너의 로그를 포렌식 증거로 보존하시오.
  hint: docker logs의 출력을 파일로 저장하세요.
  category: config
  points: 10
  answer: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect --format="{{.Name}}"
    $CID | tr -d "/"); echo "=== 로그 보존 ==="; docker logs $CID 2>&1 | tail -50 > /tmp/forensic-${CNAME}-logs.txt
    2>/dev/null; echo "로그 저장: /tmp/forensic-${CNAME}-logs.txt"; wc -l /tmp/forensic-${CNAME}-logs.txt
    2>/dev/null || echo "컨테이너 없음"'''
  answer_detail: 인시던트 대응에서 로그 보존은 법적 요구사항이기도 합니다. 컨테이너 로그, Docker 이벤트, 호스트 시스템 로그를 모두 수집하여 타임스탬프순으로 정리합니다.
    증거 보전 체인(Chain of Custody)을 유지하기 위해 해시값도 기록합니다.
  verify:
    type: output_contains
    expect: 로그 보존
    field: stdout
    semantic:
      intent: 로그 포렌식 보존 — docker logs $CID 2>&1 | tail -50 > /tmp/forensic-${CNAME}-logs.txt + wc -l.
        컨테이너 로그 + Docker 이벤트 + 호스트 시스템 로그 수집. Chain of Custody + SHA-256 해시 기록. 법적 증거 요건.
      success_criteria:
      - 로그 보존 키워드
      - docker logs > 파일 저장
      - /tmp/forensic- 경로
      acceptable_methods:
      - docker logs > 파일 + wc -l
      - docker logs --until 특정 시간
      - journalctl + rsyslog 원격
      - TheHive + Cortex 증거 관리
      negative_signs:
      - 파일 저장 없이 stdout만
      - 해시 생성 누락
      - Chain of Custody 맥락 없음
  target_vm: web
- order: 7
  instruction: Docker 이벤트에서 인시던트 타임라인을 구성하시오.
  hint: docker events로 의심 시간대의 이벤트를 조회하세요.
  category: audit
  points: 10
  answer: echo "=== 인시던트 타임라인 ==="; docker events --since 2h --until 0s --format "{{.Time}} | {{.Action}}
    | {{.Actor.Attributes.name}} | {{.Type}}" 2>/dev/null | head -20 || echo "이벤트 없음"
  answer_detail: 인시던트 타임라인은 사건의 전체 흐름을 파악하는 핵심 도구입니다. Docker 이벤트에서 컨테이너 생성/시작/정지 시점, 이미지 pull 시점, 네트워크
    변경 시점을 추출하여 시간 순서대로 정리합니다.
  verify:
    type: output_contains
    expect: 인시던트 타임라인
    field: stdout
    semantic:
      intent: 인시던트 타임라인 — docker events --since 2h --format '{{.Time}} | {{.Action}} | {{.Actor.Attributes.name}}
        | {{.Type}}' | head -20. 컨테이너 생성/시작/정지 + 이미지 pull + 네트워크 변경 시점 추출. 시간 순서 Kill Chain 재구성.
      success_criteria:
      - 인시던트 타임라인 키워드
      - docker events --since + --format
      - 타임라인 정렬
      acceptable_methods:
      - docker events --since + --until
      - log2timeline plaso + mactime
      - Elastic Security Timeline
      - SIEM correlation search
      negative_signs:
      - 타임라인 정렬 없음
      - docker events 생략
      - 범위 (--since) 없음
  target_vm: web
- order: 8
  instruction: 인시던트 대응 종합 보고서 스크립트를 작성하고 실행하시오.
  hint: 탐지, 분석, 격리, 증거 보존 단계를 종합하세요.
  category: audit
  points: 14
  answer: 'cat << ''SCRIPT'' > /tmp/incident_response.sh

    #!/bin/bash

    echo ''=== 컨테이너 인시던트 대응 보고서 ===''

    echo "시각: $(date)"

    echo ''''

    echo ''[1. 탐지 - 실행 중 컨테이너]''

    docker ps --format "{{.Names}}: {{.Image}} ({{.Status}})" 2>/dev/null

    echo ''[2. 분석 - 리소스 현황]''

    docker stats --no-stream --format "{{.Name}}: CPU={{.CPUPerc}} Mem={{.MemPerc}}" 2>/dev/null | head
    -5

    echo ''[3. 증거 - 포렌식 이미지]''

    docker images --format "{{.Repository}}:{{.Tag}} {{.Size}}" | grep forensic 2>/dev/null || echo ''  포렌식
    이미지 없음''

    echo ''[4. 복구 - 권장 사항]''

    echo ''  - 침해 컨테이너 삭제 후 클린 이미지로 재배포''

    echo ''  - 이미지 취약점 스캔 후 패치된 버전 사용''

    echo ''  - 네트워크 격리 및 접근 제어 강화''

    echo ''''

    echo ''=== 인시던트 대응 보고 완료 ===''

    SCRIPT

    chmod +x /tmp/incident_response.sh && bash /tmp/incident_response.sh'
  answer_detail: '컨테이너 인시던트 대응은 NIST SP 800-61의 4단계(준비 -> 탐지/분석 -> 억제/제거/복구 -> 사후 활동)를 따릅니다. 컨테이너 환경의
    특수성: 불변 인프라에서는 패치 대신 새 이미지로 교체, 포렌식은 commit으로 보존, 복구는 오케스트레이터가 자동 수행.'
  verify:
    type: output_contains
    expect: 인시던트 대응 보고 완료
    field: stdout
    semantic:
      intent: '인시던트 대응 종합 보고서 — /tmp/incident_response.sh: (1) 탐지 실행 중 컨테이너 + (2) 분석 리소스 현황 + (3) 증거 포렌식
        이미지 + (4) 복구 권장 (침해 삭제 / 취약점 스캔 / 네트워크 격리 강화). NIST SP 800-61 4단계 준수. ''인시던트 대응 보고 완료''.'
      success_criteria:
      - 인시던트 대응 보고 완료 키워드
      - /tmp/incident_response.sh
      - 4 단계 (탐지/분석/증거/복구)
      acceptable_methods:
      - bash + 4 단계 구조
      - SANS DFIR IR report
      - NIST SP 800-61 template
      - IBM Resilient 플레이북
      negative_signs:
      - 단계 2개 이하
      - NIST IR 맥락 없음
      - 복구 권고 누락
  target_vm: web
