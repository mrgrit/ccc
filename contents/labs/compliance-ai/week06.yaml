lab_id: compliance-ai-week06
title: PCI-DSS 요구사항 점검 실습 (AI 지원)
version: ai
course: compliance-ai
week: 6
description: PCI-DSS(Payment Card Industry Data Security Standard) v4.0의 주요 요구사항을
  시스템에서 점검합니다. 방화벽, 패스워드 정책, 암호화, 취약점 관리, 접근 통제, 로그 모니터링 등을 확인합니다. AI SubAgent가 자동으로
  명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- PCI-DSS 12대 요구사항 중 기술적 항목을 이해한다
- 방화벽, 암호화, 접근 통제 설정의 PCI-DSS 준수 여부를 점검한다
- 결제 카드 데이터 환경(CDE) 보안 점검 방법을 습득한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'SECU 서버(10.20.30.1)에서 방화벽 규칙을 확인하시오. PCI-DSS Req.1: 네트워크 보안 통제를 설치하고
    유지관리.'
  hint: nft list ruleset으로 현재 방화벽 설정을 확인하세요.
  category: audit
  points: 10
  answer: sudo nft list ruleset | head -30
  answer_detail: PCI-DSS Requirement 1은 카드소유자 데이터 환경(CDE)과 다른 네트워크 사이에 방화벽을 설치하고 유지할
    것을 요구합니다. 인바운드/아웃바운드 트래픽 모두 명시적으로 허용된 것만 통과해야 하며, 기본 정책은 deny-all이어야 합니다.
  verify:
    type: output_contains
    expect: table
    field: stdout
  target_vm: secu
  script: sudo nft list ruleset | head -30
  risk_level: low
  bastion_prompt: 'SECU 서버(10.20.30.1)에서 방화벽 규칙을 확인하시오. PCI-DSS Req.1: 네트워크 보안 통제를
    설치하고 유지관리해줘'
- order: 2
  instruction: '시스템의 기본 계정(default account) 비밀번호가 변경되었는지 확인하시오. PCI-DSS Req.2: 벤더
    기본값을 사용하지 않을 것.'
  hint: 기본 계정 목록과 패스워드 변경 이력을 확인하세요.
  category: audit
  points: 10
  answer: sudo chage -l root | grep 'Last password change' && echo '---' && grep -E
    '^(admin|guest|test|user):' /etc/passwd 2>/dev/null || echo '기본 계정 없음'
  answer_detail: PCI-DSS Requirement 2는 시스템의 벤더 기본 비밀번호와 보안 파라미터를 변경할 것을 요구합니다. 기본
    계정(admin, guest, test 등)은 삭제하거나 비활성화하고, 기본 비밀번호는 반드시 변경해야 합니다.
  verify:
    type: output_contains
    expect: Last password change
    field: stdout
  target_vm: secu
  script: sudo chage -l root | grep 'Last password change' && echo '---' && grep -E
    '^(admin|guest|test|user):' /etc/passwd 2>/dev/null || echo '기본 계정 없음'
  risk_level: low
  bastion_prompt: '시스템의 기본 계정(default account) 비밀번호가 변경되었는지 확인하시오. PCI-DSS Req.2:
    벤더 기본값을 사용하지 않을 것해줘'
- order: 3
  instruction: '저장된 데이터의 보호 상태를 점검하시오. PCI-DSS Req.3: 저장된 계정 데이터 보호. 파일 시스템에서 카드 번호
    패턴을 검색합니다.'
  hint: grep으로 16자리 숫자 패턴(카드 번호 형식)을 검색하세요.
  category: audit
  points: 12
  answer: sudo grep -rn '[0-9]\{4\}[- ]\?[0-9]\{4\}[- ]\?[0-9]\{4\}[- ]\?[0-9]\{4\}'
    /var/log/ /tmp/ /var/www/ 2>/dev/null | head -10 || echo '카드번호 패턴 미발견'
  answer_detail: PCI-DSS Requirement 3은 저장된 카드소유자 데이터를 보호할 것을 요구합니다. PAN(Primary Account
    Number)은 평문으로 저장하면 안 되며, 저장 시 암호화하거나 토큰화해야 합니다. 로그, 임시 파일 등에 카드 번호가 평문으로 기록되는
    경우가 흔합니다.
  verify:
    type: output_contains
    expect: 카드번호
    field: stdout
  target_vm: secu
  script: sudo grep -rn '[0-9]\{4\}[- ]\?[0-9]\{4\}[- ]\?[0-9]\{4\}[- ]\?[0-9]\{4\}'
    /var/log/ /tmp/ /var/www/ 2>/dev/null | head -10 || echo '카드번호 패턴 미발견'
  risk_level: low
  bastion_prompt: 저장된 데이터의 보호 상태를 점검해줘
- order: 4
  instruction: '전송 구간 암호화 설정을 점검하시오. PCI-DSS Req.4: 개방형 공중 네트워크에서 카드소유자 데이터 전송 시 암호화.'
  hint: OpenSSL로 지원하는 TLS 버전과 암호 스위트를 확인하세요.
  category: audit
  points: 10
  answer: openssl ciphers -v 'HIGH:!aNULL:!MD5' | head -10 && echo '--- TLS 버전 ---'
    && openssl s_client -connect 10.20.30.80:443 -tls1_2 </dev/null 2>&1 | grep -E
    '(Protocol|Cipher|Verify)' | head -5
  answer_detail: PCI-DSS Requirement 4는 개방형 네트워크에서 카드 데이터 전송 시 강력한 암호화를 요구합니다. TLS
    1.2 이상만 허용하고, 취약한 암호 스위트(RC4, DES, MD5 등)를 비활성화해야 합니다.
  verify:
    type: output_contains
    expect: TLS
    field: stdout
  target_vm: secu
  script: openssl ciphers -v 'HIGH:!aNULL:!MD5' | head -10 && echo '--- TLS 버전 ---'
    && openssl s_client -connect 10.20.30.80:443 -tls1_2 </dev/null 2>&1 | grep -E
    '(Protocol|Cipher|Verify)' | head -5
  risk_level: low
  bastion_prompt: '전송 구간 암호화 설정을 점검하시오. PCI-DSS Req.4: 개방형 공중 네트워크에서 카드소유자 데이터 전송
    시 암호화해줘'
- order: 5
  instruction: '악성 소프트웨어 방지 설정을 확인하시오. PCI-DSS Req.5: 악성 소프트웨어로부터 시스템과 네트워크 보호.'
  hint: ClamAV 등 안티바이러스 도구의 설치 및 업데이트 상태를 확인하세요.
  category: audit
  points: 10
  answer: which clamscan 2>/dev/null && clamscan --version 2>/dev/null || echo 'ClamAV
    미설치' && dpkg -l | grep -i 'clamav\|antivirus' 2>/dev/null
  answer_detail: PCI-DSS Requirement 5는 모든 시스템에서 악성 소프트웨어를 탐지·방지할 것을 요구합니다. ClamAV는
    리눅스용 오픈소스 안티바이러스로, 정기 검사와 실시간 감시(clamd)를 제공합니다. 바이러스 정의 파일의 최신 상태 유지가 중요합니다.
  verify:
    type: output_contains
    expect: clam
    field: stdout
  target_vm: secu
  script: which clamscan 2>/dev/null && clamscan --version 2>/dev/null || echo 'ClamAV
    미설치' && dpkg -l | grep -i 'clamav\|antivirus' 2>/dev/null
  risk_level: low
  bastion_prompt: '악성 소프트웨어 방지 설정을 확인하시오. PCI-DSS Req.5: 악성 소프트웨어로부터 시스템과 네트워크 보호해줘'
- order: 6
  instruction: '시스템 계정의 접근 권한을 점검하시오. PCI-DSS Req.7: 비즈니스 필요성에 따른 접근 제한.'
  hint: 최소 권한 원칙에 따라 sudo 그룹 멤버를 확인하세요.
  category: audit
  points: 10
  answer: 'getent group sudo && echo ''--- 로그인 가능 계정 ---'' && awk -F: ''$7 !~ /nologin|false/
    {print $1, $7}'' /etc/passwd'
  answer_detail: PCI-DSS Requirement 7은 카드소유자 데이터에 대한 접근을 업무 필요성(need to know)에 따라
    제한할 것을 요구합니다. 모든 사용자에게 sudo 권한을 부여하면 이 원칙에 위반됩니다.
  verify:
    type: output_contains
    expect: sudo
    field: stdout
  target_vm: secu
  script: 'getent group sudo && echo ''--- 로그인 가능 계정 ---'' && awk -F: ''$7 !~ /nologin|false/
    {print $1, $7}'' /etc/passwd'
  risk_level: low
  bastion_prompt: '시스템 계정의 접근 권한을 점검하시오. PCI-DSS Req.7: 비즈니스 필요성에 따른 접근 제한해줘'
- order: 7
  instruction: '로그 및 모니터링 설정을 점검하시오. PCI-DSS Req.10: 시스템 구성 요소에 대한 모든 접근을 로깅하고 모니터링.'
  hint: auditd 규칙과 rsyslog 설정을 종합 확인하세요.
  category: audit
  points: 12
  answer: sudo auditctl -l | wc -l && echo '감사 규칙 수' && grep -r 'auth' /etc/rsyslog.d/
    2>/dev/null | grep -v '^#' && echo '--- 로그 파일 목록 ---' && ls -la /var/log/auth.log
    /var/log/syslog 2>/dev/null
  answer_detail: PCI-DSS Requirement 10은 모든 시스템 구성 요소에 대한 접근을 추적하고 모니터링할 수 있는 메커니즘을
    요구합니다. 로그에는 사용자 식별, 이벤트 유형, 일시, 성공/실패, 데이터 식별, 시스템 구성 요소가 포함되어야 합니다.
  verify:
    type: output_contains
    expect: 감사 규칙 수
    field: stdout
  target_vm: secu
  script: sudo auditctl -l | wc -l && echo '감사 규칙 수' && grep -r 'auth' /etc/rsyslog.d/
    2>/dev/null | grep -v '^#' && echo '--- 로그 파일 목록 ---' && ls -la /var/log/auth.log
    /var/log/syslog 2>/dev/null
  risk_level: low
  bastion_prompt: '로그 및 모니터링 설정을 점검하시오. PCI-DSS Req.10: 시스템 구성 요소에 대한 모든 접근을 로깅하고
    모니터링해줘'
- order: 8
  instruction: '시스템의 취약점 스캔 이력을 확인하시오. PCI-DSS Req.11: 보안 시스템 및 프로세스를 정기적으로 테스트.'
  hint: 최근 패키지 업데이트 이력과 보안 스캔 도구를 확인하세요.
  category: audit
  points: 10
  answer: ls -lt /var/log/apt/history.log 2>/dev/null && tail -30 /var/log/apt/history.log
    2>/dev/null | grep -A2 'Start-Date' | tail -9
  answer_detail: PCI-DSS Requirement 11은 분기별 내부 취약점 스캔, 연간 침투 테스트, 무선 AP 탐지 등을 요구합니다.
    apt 업데이트 이력으로 최근 패치 적용 현황을 파악할 수 있으며, 정기적인 취약점 스캔 프로세스가 수립되어 있어야 합니다.
  verify:
    type: output_contains
    expect: history
    field: stdout
  target_vm: secu
  script: ls -lt /var/log/apt/history.log 2>/dev/null && tail -30 /var/log/apt/history.log
    2>/dev/null | grep -A2 'Start-Date' | tail -9
  risk_level: low
  bastion_prompt: '시스템의 취약점 스캔 이력을 확인하시오. PCI-DSS Req.11: 보안 시스템 및 프로세스를 정기적으로 테스트해줘'
- order: 9
  instruction: PCI-DSS 종합 준수 점검 스크립트를 작성하고 실행하시오.
  hint: Req.1~11의 핵심 기술 항목을 종합 점검하세요.
  category: audit
  points: 16
  answer: 'cat << ''SCRIPT'' > /tmp/pcidss_audit.sh

    #!/bin/bash

    echo ''=== PCI-DSS v4.0 기술적 요구사항 점검 ===''

    echo ''''

    echo ''[Req.1 방화벽]''

    sudo nft list ruleset 2>/dev/null | grep -c ''rule'' || echo ''규칙 없음''

    echo ''[Req.2 기본값 변경]''

    grep -cE ''^(admin|guest|test):'' /etc/passwd && echo ''기본 계정 존재!'' || echo ''통과''

    echo ''[Req.5 악성코드 방지]''

    which clamscan >/dev/null 2>&1 && echo ''설치됨'' || echo ''미설치''

    echo ''[Req.7 접근 제한]''

    echo "sudo 그룹: $(getent group sudo | cut -d: -f4)"

    echo ''[Req.8 사용자 식별]''

    grep ''^PASS_MAX_DAYS'' /etc/login.defs

    echo ''[Req.10 로깅]''

    echo "audit 규칙: $(sudo auditctl -l 2>/dev/null | wc -l)"

    echo ''''

    echo ''=== PCI-DSS 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/pcidss_audit.sh && bash /tmp/pcidss_audit.sh'
  answer_detail: 'PCI-DSS v4.0은 12대 요구사항으로 구성됩니다: 네트워크 보안, 기본값 변경, 저장 데이터 보호, 전송 암호화,
    악성코드 방지, 보안 개발, 접근 제한, 사용자 식별, 물리적 보안, 로깅/모니터링, 보안 테스트, 정보보안 정책. 이 스크립트는 기술적으로
    검증 가능한 핵심 항목을 자동 점검합니다.'
  verify:
    type: output_contains
    expect: PCI-DSS 점검 완료
    field: stdout
  target_vm: secu
  script: 'cat << ''SCRIPT'' > /tmp/pcidss_audit.sh

    #!/bin/bash

    echo ''=== PCI-DSS v4.0 기술적 요구사항 점검 ===''

    echo ''''

    echo ''[Req.1 방화벽]''

    sudo nft list ruleset 2>/dev/null | grep -c ''rule'' || echo ''규칙 없음''

    echo ''[Req.2 기본값 변경]''

    grep -cE ''^(admin|guest|test):'' /etc/passwd && echo ''기본 계정 존재!'' || echo ''통과''

    echo ''[Req.5 악성코드 방지]''

    which clamscan >/dev/null 2>&1 && echo ''설치됨'' || echo ''미설치''

    echo ''[Req.7 접근 제한]''

    echo "sudo 그룹: $(getent group sudo | cut -d: -f4)"

    echo ''[Req.8 사용자 식별]''

    grep ''^PASS_MAX_DAYS'' /etc/login.defs

    echo ''[Req.10 로깅]''

    echo "audit 규칙: $(sudo auditctl -l 2>/dev/null | wc -l)"

    echo ''''

    echo ''=== PCI-DSS 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/pcidss_audit.sh && bash /tmp/pcidss_audit.sh'
  risk_level: low
  bastion_prompt: PCI-DSS 종합 준수 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  bastion_prompt: '다음 작업들을 순서대로 수행해줘:

    1) SECU 서버(10.20.30.1)에서 방화벽 규칙을 확인하시오. PCI-DSS Req.1: 네트워크 보안 통제를 설치하고 유지관리해줘

    2) 시스템의 기본 계정(default account) 비밀번호가 변경되었는지 확인하시오. PCI-DSS Req.2: 벤더 기본값을 사용하지
    않을 것해줘

    3) 저장된 데이터의 보호 상태를 점검해줘

    4) 전송 구간 암호화 설정을 점검하시오. PCI-DSS Req.4: 개방형 공중 네트워크에서 카드소유자 데이터 전송 시 암호화해줘

    5) 악성 소프트웨어 방지 설정을 확인하시오. PCI-DSS Req.5: 악성 소프트웨어로부터 시스템과 네트워크 보호해줘'
  hint: 복합 작업은 Bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  risk_level: low
  answer: ''
  answer_detail: Bastion이 5개 작업을 순차적으로 계획(planning)하고 실행(executing)한 뒤 종합 분석(validating)하는
    다단계 작업.
  script: ''
