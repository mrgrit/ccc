lab_id: "compliance-ai-week02"
title: "[AI] 정보통신망법"
version: "ai"
course: "compliance-ai"
week: 2
description: "정보통신망 이용촉진 및 정보보호에 관한 법률을 학습합니다"
difficulty: "easy"
duration_minutes: 120
objectives:
  - "정보통신망법의 핵심 개념을 이해한다"
  - "정보통신망법 관련 실무 기술을 습득한다"
  - "정보통신망법 보안 대책을 수립하고 적용한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "정보통신망법의 주요 보안 관련 조항을 조회하세요"
    hint: "법률 데이터베이스에서 핵심 조항을 확인하세요"
    category: "recon"
    points: 10
    answer: "제45조(정보보호조치), 제47조(정보보호관리체계인증), 제48조(침해행위금지)"
    answer_detail: "정보통신망법은 정보통신서비스 이용자의 개인정보 보호와 정보통신망의 안전성 확보를 위한 법률입니다. 정보보호조치, 인증, 침해사고 대응 등을 규정합니다."
    script: "ai_compliance_scan --target 10.20.30.0/24 --framework pipa --check articles"
    verify:
      type: "output_contains"
      expect: "제45조"
  - order: 2
    instruction: "정보보호조치 의무 대상을 확인하세요"
    hint: "매출액 및 이용자 수 기준을 확인하세요"
    category: "analysis"
    points: 10
    answer: "연 매출 100억 이상 또는 일평균 이용자 100만명 이상 정보통신서비스제공자"
    answer_detail: "법 제45조에 따라 정보통신서비스 제공자는 정보통신망의 안정성 및 정보의 신뢰성을 확보하기 위한 보호조치를 취해야 합니다."
    script: "ai_policy_analyzer --input consent_template.yaml --validate required-fields"
    verify:
      type: "output_contains"
      expect: "정보보호조치"
  - order: 3
    instruction: "네트워크 접근 통제 설정을 점검하세요"
    hint: "방화벽 규칙을 확인하세요"
    category: "config"
    points: 10
    answer: "nft list ruleset 명령으로 현재 방화벽 규칙 확인"
    answer_detail: "정보통신망법 시행령에 따라 접근 통제 시스템을 설치·운영해야 합니다. 외부 네트워크와의 불법적인 접근을 차단하는 방화벽 설정이 필수적입니다."
    script: "ai_pii_scanner --target /var/log --detect ssn,phone,email --report json"
    verify:
      type: "output_contains"
      expect: "nft"
  - order: 4
    instruction: "침입탐지시스템(IDS) 설정을 확인하세요"
    hint: "Suricata 규칙 설정을 점검하세요"
    category: "defense"
    points: 10
    answer: "suricata -T -c /etc/suricata/suricata.yaml 으로 설정 검증"
    answer_detail: "침입탐지시스템은 네트워크 트래픽을 모니터링하여 비정상적인 접근을 탐지합니다. 시그니처 기반과 행위 기반 탐지 규칙을 모두 활용해야 합니다."
    script: "ai_encryption_audit --target 10.20.30.0/24 --check aes256 --compliance pipa"
    verify:
      type: "output_contains"
      expect: "suricata"
  - order: 5
    instruction: "취약점 점검 스캔을 수행하세요"
    hint: "네트워크 취약점 스캐너를 실행하세요"
    category: "recon"
    points: 10
    answer: "nmap -sV --script vuln 10.20.30.0/24 로 취약점 스캔"
    answer_detail: "법 제45조의3에 따라 정기적인 취약점 점검이 필요합니다. 네트워크 스캔을 통해 열린 포트, 서비스 버전, 알려진 취약점을 식별해야 합니다."
    script: "ai_access_control_audit --target 10.20.30.0/24 --check permissions --least-privilege"
    verify:
      type: "output_contains"
      expect: "nmap"
  - order: 6
    instruction: "웹 애플리케이션 보안 점검을 수행하세요"
    hint: "OWASP Top 10 기준으로 점검하세요"
    category: "audit"
    points: 10
    answer: "SQL Injection, XSS, CSRF 등 주요 웹 취약점 점검"
    answer_detail: "정보통신망법상 정보보호조치에는 웹 애플리케이션 보안이 포함됩니다. OWASP Top 10을 기준으로 SQL Injection, XSS, CSRF 등 주요 취약점을 점검해야 합니다."
    script: "ai_web_crawler --url http://10.20.30.80 --check privacy-policy --validate completeness"
    verify:
      type: "output_contains"
      expect: "OWASP"
  - order: 7
    instruction: "접속기록 관리 시스템을 점검하세요"
    hint: "로그 저장 및 보존 설정을 확인하세요"
    category: "monitor"
    points: 10
    answer: "syslog 설정 확인 및 로그 보존 기간 검증 (최소 6개월)"
    answer_detail: "접속기록은 침해사고 발생 시 원인 분석과 증거 확보를 위해 필수적입니다. 최소 6개월 이상 보관하고 위변조 방지 대책을 수립해야 합니다."
    script: "ai_data_lifecycle --check retention-policy --auto-purge expired --verify destruction"
    verify:
      type: "output_contains"
      expect: "syslog"
  - order: 8
    instruction: "암호화 적용 현황을 점검하세요"
    hint: "SSL/TLS 인증서 설정을 확인하세요"
    category: "config"
    points: 10
    answer: "openssl s_client -connect 10.20.30.80:443 으로 TLS 설정 확인"
    answer_detail: "정보통신망법에 따라 이용자의 개인정보 및 인증정보 전송 시 암호화를 적용해야 합니다. TLS 1.2 이상 사용과 적절한 암호 스위트 설정이 필요합니다."
    script: "ai_incident_response --template breach-notification --timeline 72h --auto-notify"
    verify:
      type: "output_contains"
      expect: "TLS"
  - order: 9
    instruction: "침해사고 신고 절차를 수립하세요"
    hint: "KISA 신고 프로세스를 확인하세요"
    category: "response"
    points: 10
    answer: "침해사고 인지 후 24시간 이내 KISA(한국인터넷진흥원)에 신고"
    answer_detail: "법 제48조의3에 따라 침해사고가 발생한 경우 지체 없이 그 사실을 과학기술정보통신부장관 또는 KISA에 신고해야 합니다."
    script: "ai_impact_assessment --target systems --threshold 50000 --generate-report"
    verify:
      type: "output_contains"
      expect: "KISA"
  - order: 10
    instruction: "정보보호 최고책임자(CISO) 지정 요건을 확인하세요"
    hint: "CISO 자격 요건과 신고 의무를 확인하세요"
    category: "config"
    points: 10
    answer: "자산총액 5조원 이상, 정보통신서비스 매출 100억원 이상 기업은 CISO 지정 의무"
    answer_detail: "법 제45조의3에 따라 일정 규모 이상의 정보통신서비스 제공자는 CISO를 지정하고 과학기술정보통신부에 신고해야 합니다."
    script: "ai_role_analyzer --check cpo-designation --validate qualifications --report"
    verify:
      type: "output_contains"
      expect: "CISO"
  - order: 11
    instruction: "정보보호 사전점검 절차를 수립하세요"
    hint: "신규 서비스 출시 전 보안 점검 항목을 확인하세요"
    category: "analysis"
    points: 10
    answer: "서비스 기획단계부터 보안성 검토, 설계 보안, 구현 보안, 운영 보안 점검"
    answer_detail: "정보통신망법에 따라 정보통신서비스를 새로 도입할 때 사전에 보안 위험을 평가하고 보호조치를 적용해야 합니다."
    script: "ai_contract_analyzer --type outsourcing --check required-clauses --compliance pipa"
    verify:
      type: "output_contains"
      expect: "사전점검"
  - order: 12
    instruction: "이용자 본인확인 체계를 점검하세요"
    hint: "인증 시스템 설정을 확인하세요"
    category: "defense"
    points: 10
    answer: "다중인증(MFA) 적용 및 본인확인 수단의 안전성 확인"
    answer_detail: "법 제23조의3에 따라 본인확인기관은 안전한 본인확인 수단을 제공해야 합니다. 비밀번호 외 추가 인증 수단 적용이 권장됩니다."
    script: "ai_rights_processor --handle access-request --sla 10days --auto-respond"
    verify:
      type: "output_contains"
      expect: "MFA"
  - order: 13
    instruction: "스팸 및 악성 트래픽 차단 시스템을 점검하세요"
    hint: "메일 보안 게이트웨이 설정을 확인하세요"
    category: "defense"
    points: 10
    answer: "SPF, DKIM, DMARC 레코드 설정 확인"
    answer_detail: "법 제50조에 따라 영리목적의 광고성 정보 전송 시 수신자의 사전 동의가 필요합니다. 기술적으로 스팸 필터링 시스템을 운영해야 합니다."
    script: "ai_log_auditor --check access-logs --retention 1year --integrity verify"
    verify:
      type: "output_contains"
      expect: "SPF"
  - order: 14
    instruction: "정보통신망법 준수 체크리스트를 작성하세요"
    hint: "주요 의무사항을 종합 점검하세요"
    category: "audit"
    points: 10
    answer: "정보보호조치, ISMS인증, 침해사고대응, 개인정보보호, 접근통제 종합 체크"
    answer_detail: "정보통신망법의 주요 의무사항을 체계적으로 점검하기 위한 체크리스트를 작성합니다. 기술적·관리적 보호조치를 모두 포함해야 합니다."
    script: "ai_compliance_checker --framework pipa --full-audit --generate-checklist"
    verify:
      type: "output_contains"
      expect: "체크리스트"
  - order: 15
    instruction: "정보통신망법 위반 시 제재 사항을 분석하세요"
    hint: "과태료 및 벌칙 조항을 확인하세요"
    category: "analysis"
    points: 10
    answer: "위반 유형별 과태료: 3천만원~5억원, 벌칙: 5년 이하 징역"
    answer_detail: "정보통신망법 위반 시 과태료, 과징금, 형사처벌이 부과될 수 있습니다. 위반 유형과 심각성에 따라 제재 수준이 달라지므로 사전에 충분한 예방 조치가 필요합니다."
    script: "ai_violation_analyzer --database cases --extract patterns --recommend improvements"
    verify:
      type: "output_contains"
      expect: "과태료"
