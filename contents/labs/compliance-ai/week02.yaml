lab_id: compliance-ai-week02
title: 정보통신망법 기술적 보호조치 점검 (AI 지원)
version: ai
course: compliance-ai
week: 2
description: 정보통신망 이용촉진 및 정보보호 등에 관한 법률의 기술적 보호조치를 시스템에서 점검합니다. 방화벽 설정, 침입탐지, 접근 제어, 웹 보안 헤더 등을 확인합니다.
  AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- 정보통신망법의 기술적 보호조치 요구사항을 이해한다
- 방화벽, IDS 설정이 법적 요구사항을 충족하는지 점검한다
- 네트워크 보안 설정의 적정성을 평가한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})의 nftables 방화벽이 활성화되어 있는지 확인하고 현재 룰셋을 조회하시오.
  hint: sudo nft list ruleset 명령을 사용하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)의 nftables 방화벽이 활성화되어 있는지 확인하고 현재 룰셋을 조회해줘

    📎 참고 (CLI): sudo nft list ruleset'
  answer_detail: 정보통신망법 시행령 제15조에 따라 정보통신서비스 제공자는 침입 차단 시스템(방화벽)을 설치·운영해야 합니다. nftables는 리눅스의 차세대 방화벽
    프레임워크로, iptables를 대체합니다.
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: 'nftables 방화벽 룰셋 조회 — sudo nft list ruleset. 정보통신망법 시행령 제15조: 정보통신서비스 제공자는 침입차단시스템 설치·운영
        의무. nftables 는 iptables 후속 표준(Linux 4.x+). table/chain/rule 구조. 빈 출력이면 방화벽 미가동. Ubuntu 기본 nftables.service.
        ISMS-P 2.6.3 네트워크 접근 통제'
      success_criteria:
      - nft list ruleset 실행
      - table 키워드 포함
      - chain 또는 policy 정보 출력
      acceptable_methods:
      - sudo nft list ruleset
      - systemctl is-active nftables
      - iptables-nft -L(호환 명령)
      - ufw status(상위 wrapper)
      - firewalld --state(RHEL)
      negative_signs:
      - 빈 출력 정상 판정
      - iptables legacy 와 혼동
      - systemctl 미확인
  target_vm: secu
  script: sudo nft list ruleset
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)의 nftables 방화벽이 활성화되어 있는지 확인하고 현재 룰셋을 조회해줘
- order: 2
  instruction: 방화벽 기본 정책(policy)이 DROP(차단)으로 설정되어 있는지 확인하시오.
  hint: nft list ruleset 출력에서 policy 키워드를 검색하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 방화벽 기본 정책(policy)이 DROP(차단)으로 설정되어 있는지 확인해줘

    📎 참고 (CLI): sudo nft list ruleset | grep -i ''policy'''
  answer_detail: 방화벽의 기본 정책은 'deny all, permit by exception' 원칙에 따라 기본 차단(DROP)으로 설정하고, 업무에 필요한 포트만 명시적으로
    허용해야 합니다. 이는 정보통신망법의 접근 통제 요구사항의 핵심입니다.
  verify:
    type: output_contains
    expect: policy
    field: stdout
    semantic:
      intent: 방화벽 default-deny 정책 확인 — sudo nft list ruleset | grep -i policy. Zero Trust 원칙 deny all,
        permit by exception. nftables base chain 에 policy drop 명시 — type filter hook input priority 0;
        policy drop;. policy accept 시 위배. iptables INPUT DROP 동등. 정보통신망법 접근통제 핵심. ISMS-P 2.6.1
      success_criteria:
      - grep policy 실행
      - policy 키워드 출력
      - drop 또는 accept 확인
      acceptable_methods:
      - sudo nft list ruleset | grep policy
      - iptables -L INPUT | grep policy
      - sudo nft list chain inet filter input
      - systemctl status nftables | grep -i drop
      - ufw status verbose
      negative_signs:
      - policy accept 정상 판정
      - base chain 없이 ruleset 정상
      - default-deny 원칙 인식 없음
  target_vm: secu
  script: sudo nft list ruleset | grep -i 'policy'
  risk_level: low
  bastion_prompt: 방화벽 기본 정책(policy)이 DROP(차단)으로 설정되어 있는지 확인해줘
- order: 3
  instruction: Suricata IDS 서비스가 활성화되어 동작 중인지 확인하시오. 정보통신망법은 침입탐지시스템 운영을 요구합니다.
  hint: systemctl로 suricata 서비스 상태를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: Suricata IDS 서비스가 활성화되어 동작 중인지 확인해줘

    📎 참고 (CLI): sudo systemctl status suricata --no-pager | head -10'
  answer_detail: 정보통신망법 시행령 제15조에 따라 침입탐지시스템(IDS)을 설치·운영해야 합니다. Suricata는 오픈소스 IDS/IPS로, 네트워크 트래픽을 실시간
    분석하여 악성 활동을 탐지합니다.
  verify:
    type: output_contains
    expect: suricata
    field: stdout
    semantic:
      intent: 'Suricata IDS 서비스 상태 — sudo systemctl status suricata --no-pager | head -10. 정보통신망법 시행령
        제15조: 침입탐지시스템(IDS) 설치·운영 의무. Suricata 는 multi-threaded IDS/IPS, Emerging Threats open ruleset
        활용. active (running) 여부 + 마지막 시작 시각 확인. suricata -V 로 버전 확인 보완. afpacket 인터페이스 설정 필요'
      success_criteria:
      - systemctl status suricata 실행
      - suricata 키워드 포함
      - active/inactive 상태 출력
      acceptable_methods:
      - systemctl status suricata
      - systemctl is-active suricata
      - ps auxf | grep suricata
      - suricatasc -c uptime
      - journalctl -u suricata | tail
      negative_signs:
      - inactive 정상 판정
      - 프로세스 있어도 service dead 무시
      - IDS 역할 이해 없음
  target_vm: secu
  script: sudo systemctl status suricata --no-pager | head -10
  risk_level: low
  bastion_prompt: Suricata IDS 서비스가 활성화되어 동작 중인지 확인해줘
- order: 4
  instruction: Suricata의 규칙 파일 경로를 확인하고 현재 활성화된 규칙 파일 수를 파악하시오.
  hint: suricata.yaml에서 default-rule-path를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: Suricata의 규칙 파일 경로를 확인하고 현재 활성화된 규칙 파일 수를 파악해줘

    📎 참고 (CLI): sudo grep -E ''rule-files|default-rule-path'' /etc/suricata/suricata.yaml | head -5 &&
    ls /var/lib/suricata/rules/*.rules 2>/dev/null | wc -l'
  answer_detail: IDS 규칙은 정기적으로 업데이트해야 최신 위협을 탐지할 수 있습니다. Suricata는 ET Open, Suricata 자체 규칙 등 다양한 규칙셋을
    지원합니다. suricata-update 명령으로 규칙을 최신으로 유지해야 합니다.
  verify:
    type: output_contains
    expect: rule
    field: stdout
    semantic:
      intent: 'Suricata rule 파일 경로·수 조회 — sudo grep -E rule-files|default-rule-path /etc/suricata/suricata.yaml
        + ls /var/lib/suricata/rules/*.rules | wc -l. default-rule-path: /var/lib/suricata/rules, rule-files:
        suricata.rules emerging-*.rules. 최신성: suricata-update 주간 cron 권장. 파일 수 0 은 미설치 - et/open enable-source
        필요'
      success_criteria:
      - grep rule-files suricata.yaml 실행
      - rule 키워드 출력
      - rule 파일 수 확인
      acceptable_methods:
      - grep rule-files + ls *.rules | wc -l
      - suricata-update list-sources --enabled
      - suricata-update check-versions
      - apt list suricata-update
      - awk /rule-files:/,/^[^ ]/
      negative_signs:
      - rule 파일 0 정상 판정
      - suricata-update 언급 없음
      - Emerging Threats feed 개념 없음
  target_vm: secu
  script: sudo grep -E 'rule-files|default-rule-path' /etc/suricata/suricata.yaml | head -5 && ls /var/lib/suricata/rules/*.rules
    2>/dev/null | wc -l
  risk_level: low
  bastion_prompt: Suricata의 규칙 파일 경로를 확인하고 현재 활성화된 규칙 파일 수를 파악해줘
- order: 5
  instruction: Suricata 로그에서 최근 알림(alert)을 확인하시오. IDS 알림이 정상 기록되는지 점검합니다.
  hint: /var/log/suricata/ 디렉터리의 fast.log를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: Suricata 로그에서 최근 알림(alert)을 확인하시오. IDS 알림이 정상 기록되는지 점검해줘

    📎 참고 (CLI): sudo tail -20 /var/log/suricata/fast.log 2>/dev/null; sudo ls -la /var/log/suricata/'
  answer_detail: IDS 로그 모니터링은 정보통신망법의 침해사고 대응 의무와 직결됩니다. fast.log는 간결한 알림 형식이고, eve.json은 상세 이벤트를 JSON으로
    기록합니다. 알림이 전혀 없다면 규칙이 비활성이거나 탐지 대상 트래픽이 없는 것입니다.
  verify:
    type: output_contains
    expect: suricata
    field: stdout
    semantic:
      intent: Suricata alert log 점검 — sudo tail -20 /var/log/suricata/fast.log + ls -la /var/log/suricata/.
        fast.log 는 sid·classification·priority·src->dst 요약 포맷. eve.json 은 구조화 JSON(event_type alert·http·dns·flow).
        로그 없음 = (a) 규칙 미로드 (b) 트래픽 없음 (c) interface 설정 오류. suricatasc -c iface-stat 로 packet counter 검증
      success_criteria:
      - tail fast.log 또는 ls 실행
      - suricata 키워드 포함
      - 로그 디렉토리 정보
      acceptable_methods:
      - tail fast.log + ls -la /var/log/suricata/
      - jq select event_type==alert eve.json
      - grep signature /var/log/suricata/stats.log
      - suricatasc -c dump-counters
      - Kibana Suricata dashboard
      negative_signs:
      - fast.log 없음 정상 판정
      - eve.json 과 fast.log 차이 이해 없음
      - iface 문제 진단 없음
  target_vm: secu
  script: sudo tail -20 /var/log/suricata/fast.log 2>/dev/null; sudo ls -la /var/log/suricata/
  risk_level: low
  bastion_prompt: Suricata 로그에서 최근 알림(alert)을 확인하시오. IDS 알림이 정상 기록되는지 점검해줘
- order: 6
  instruction: 시스템에서 LISTEN 상태인 포트를 조회하여 불필요한 서비스가 동작하지 않는지 확인하시오.
  hint: ss -tlnp 명령으로 열린 포트와 프로세스를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템에서 LISTEN 상태인 포트를 조회하여 불필요한 서비스가 동작하지 않는지 확인해줘

    📎 참고 (CLI): sudo ss -tlnp'
  answer_detail: 정보통신망법에 따라 불필요한 서비스와 포트를 차단해야 합니다. ss 명령에서 -t는 TCP, -l은 LISTEN, -n은 숫자 표시, -p는 프로세스 정보입니다.
    업무에 필요 없는 포트가 열려 있다면 서비스를 중지하거나 방화벽에서 차단합니다.
  verify:
    type: output_contains
    expect: LISTEN
    field: stdout
    semantic:
      intent: 'LISTEN 포트 감사 — sudo ss -tlnp. 정보통신망법 최소 공격 표면 원칙. -t TCP, -l LISTEN, -n 숫자, -p PID/process.
        표준 필수: 22(ssh), 80/443(HTTP/HTTPS). 의심: 23 telnet, 21 ftp, 111 rpcbind, 2049 nfs, 6379 redis(외부
        바인딩 시). 0.0.0.0 vs 127.0.0.1 구분 중요. ISMS-P 2.6.4. nmap -sT <self-IP> 외부 관점 스캔 보완'
      success_criteria:
      - ss -tlnp 실행
      - LISTEN 키워드 포함
      - 포트·프로세스 정보
      acceptable_methods:
      - ss -tlnp
      - netstat -tlnp(legacy)
      - lsof -i -P -n | grep LISTEN
      - nmap -sT -p- <host>(외부)
      - systemctl list-units --state=listening
      negative_signs:
      - 0.0.0.0 vs 127.0.0.1 구분 없음
      - 프로세스 매핑 누락
      - 외부 관점 스캔 안 함
  target_vm: secu
  script: sudo ss -tlnp
  risk_level: low
  bastion_prompt: 시스템에서 LISTEN 상태인 포트를 조회하여 불필요한 서비스가 동작하지 않는지 확인해줘
- order: 7
  instruction: rsyslog 원격 로그 전송 설정을 확인하시오. 정보통신망법은 로그 위변조 방지를 위해 별도 서버 보관을 권고합니다.
  hint: /etc/rsyslog.conf와 /etc/rsyslog.d/ 에서 원격 전송(@@) 설정을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: rsyslog 원격 로그 전송 설정을 확인해줘

    📎 참고 (CLI): grep -rn ''@@\|@'' /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null | grep -v ''^#'''
  answer_detail: 로그를 원본 서버에만 보관하면 공격자가 침입 후 삭제·위변조할 수 있습니다. rsyslog에서 @는 UDP, @@는 TCP로 원격 서버에 로그를 전송합니다.
    SIEM(10.20.30.100)으로 전송하면 위변조 방지와 중앙 관리가 가능합니다.
  verify:
    type: output_contains
    expect: '@'
    field: stdout
    semantic:
      intent: rsyslog 원격 전송 감사 — grep -rn @@|@ /etc/rsyslog.conf /etc/rsyslog.d/. @ = UDP 514, @@ = TCP
        514(신뢰성 우선 권장). 정보통신망법 접속기록 위변조 방지 — 공격자 local log 삭제 시 원격 사본 보존. SIEM(Wazuh/siem VM 10.20.30.100)
        으로 전송. RELP(Reliable Event Logging Protocol) 로 TCP+re-delivery. TLS 추가 권장(rsyslog-gnutls)
      success_criteria:
      - grep @@|@ rsyslog 실행
      - '@ 문자 출력'
      - 원격 전송 설정 확인
      acceptable_methods:
      - grep -rn @@|@ /etc/rsyslog.conf /etc/rsyslog.d/
      - rsyslogd -N1 로 config 검증
      - ss -tn | grep :514(런타임 연결)
      - tcpdump -i any port 514 로 실제 전송
      - RELP + TLS 설정
      negative_signs:
      - 원격 전송 없음 정상 판정
      - TCP vs UDP 차이 무시
      - TLS 암호화 미고려
  target_vm: secu
  script: grep -rn '@@\|@' /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null | grep -v '^#'
  risk_level: low
  bastion_prompt: rsyslog 원격 로그 전송 설정을 확인해줘
- order: 8
  instruction: WEB 서버({{WEB_IP}})에서 HTTP 응답 보안 헤더를 점검하시오. X-Frame-Options, X-Content-Type-Options 등이 설정되어야
    합니다.
  hint: curl -I 명령으로 HTTP 응답 헤더를 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 HTTP 응답 보안 헤더를 점검하시오. X-Frame-Options, X-Content-Type-Options
    등이 설정되어야

    📎 참고 (CLI): curl -sI http://10.20.30.80/ | grep -iE ''(X-Frame|X-Content-Type|X-XSS|Strict-Transport|Server|Content-Security)'''
  answer_detail: 정보통신망법은 웹 서비스의 보안 취약점 방지를 요구합니다. X-Frame-Options은 클릭재킹 방지, X-Content-Type-Options은 MIME
    스니핑 방지, Strict-Transport-Security는 HTTPS 강제에 기여합니다. Server 헤더는 버전 정보 노출을 막기 위해 숨겨야 합니다.
  verify:
    type: output_contains
    expect: HTTP
    field: stdout
    semantic:
      intent: 'HTTP 보안 헤더 점검 — curl -sI http://10.20.30.80/ | grep -iE (X-Frame|X-Content-Type|X-XSS|Strict-Transport|Server|Content-Security).
        필수 헤더: X-Frame-Options DENY/SAMEORIGIN(clickjacking 방지), X-Content-Type-Options nosniff(MIME sniff
        방지), Strict-Transport-Security max-age=31536000(HTTPS 강제), Content-Security-Policy(XSS 완화). Server
        헤더는 최소화(Apache/2.4.x 버전 노출 금지). OWASP Secure Headers Project. ISMS-P 2.7.2'
