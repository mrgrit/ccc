lab_id: "compliance-ai-week04"
title: "[AI] ISO27001"
version: "ai"
course: "compliance-ai"
week: 4
description: "국제 정보보안 관리체계 표준 ISO 27001을 학습합니다"
difficulty: "easy"
duration_minutes: 120
objectives:
  - "ISO27001의 핵심 개념을 이해한다"
  - "ISO27001 관련 실무 기술을 습득한다"
  - "ISO27001 보안 대책을 수립하고 적용한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "ISO 27001 표준 구조를 분석하세요"
    hint: "Annex A 통제 항목을 확인하세요"
    category: "recon"
    points: 10
    answer: "ISO 27001:2022 — 4개 테마, 93개 통제항목 (Annex A)"
    answer_detail: "ISO 27001:2022는 조직적(37개), 인적(8개), 물리적(14개), 기술적(34개) 4개 테마로 93개 통제항목을 규정합니다."
    script: "ai_compliance_scan --target 10.20.30.0/24 --framework pipa --check articles"
    verify:
      type: "output_contains"
      expect: "93개"
  - order: 2
    instruction: "정보보안 관리체계(ISMS) 범위를 정의하세요"
    hint: "이해관계자 요구사항을 분석하세요"
    category: "analysis"
    points: 10
    answer: "ISMS 범위: 조직의 맥락, 이해관계자 기대, 내·외부 이슈 반영"
    answer_detail: "ISO 27001 조항 4에 따라 조직의 맥락을 이해하고, 이해관계자의 요구사항을 반영하여 ISMS 범위를 정의해야 합니다."
    script: "ai_policy_analyzer --input consent_template.yaml --validate required-fields"
    verify:
      type: "output_contains"
      expect: "ISMS 범위"
  - order: 3
    instruction: "리더십과 정보보안 정책을 수립하세요"
    hint: "최고경영진의 역할을 정의하세요"
    category: "config"
    points: 10
    answer: "리더십: 최고경영진 참여, 정보보안 정책 수립, 역할과 책임 할당"
    answer_detail: "ISO 27001 조항 5에 따라 최고경영진은 정보보안에 대한 리더십과 의지를 보여야 하며, 정보보안 정책을 수립하고 조직 내 역할과 책임을 할당해야 합니다."
    script: "ai_pii_scanner --target /var/log --detect ssn,phone,email --report json"
    verify:
      type: "output_contains"
      expect: "리더십"
  - order: 4
    instruction: "위험 평가 방법론을 설계하세요"
    hint: "위험 식별, 분석, 평가 절차를 수립하세요"
    category: "analysis"
    points: 10
    answer: "위험 평가: ISO 31000 기반, 정성적/정량적 방법, 위험수용기준 설정"
    answer_detail: "ISO 27001 조항 6.1.2에 따라 위험 평가 방법론을 수립해야 합니다. 위험 식별, 위험 분석, 위험 평가의 3단계를 체계적으로 수행합니다."
    script: "ai_encryption_audit --target 10.20.30.0/24 --check aes256 --compliance pipa"
    verify:
      type: "output_contains"
      expect: "위험 평가"
  - order: 5
    instruction: "위험 처리 계획을 수립하세요"
    hint: "통제항목 선택과 적용성 보고서를 작성하세요"
    category: "defense"
    points: 10
    answer: "위험 처리: 수용, 회피, 전가, 완화 중 선택, SoA(적용성 보고서) 작성"
    answer_detail: "위험 처리 계획은 식별된 위험에 대해 적절한 통제를 선택하고, 적용성 보고서(SoA)를 통해 선택/제외 사유를 문서화합니다."
    script: "ai_access_control_audit --target 10.20.30.0/24 --check permissions --least-privilege"
    verify:
      type: "output_contains"
      expect: "위험 처리"
  - order: 6
    instruction: "조직적 통제(Organizational Controls)를 구현하세요"
    hint: "정보보안 정책, 역할, 자산관리를 설정하세요"
    category: "config"
    points: 10
    answer: "조직적 통제: 정보보안 정책, 역할 분리, 위협 인텔리전스, 자산 관리"
    answer_detail: "Annex A의 조직적 통제는 정보보안 정책, 역할과 책임, 직무 분리, 위협 인텔리전스, 자산 관리 등 37개 항목을 포함합니다."
    script: "ai_web_crawler --url http://10.20.30.80 --check privacy-policy --validate completeness"
    verify:
      type: "output_contains"
      expect: "조직적 통제"
  - order: 7
    instruction: "기술적 통제(Technological Controls)를 구현하세요"
    hint: "접근 통제, 암호화, 보안 코딩을 설정하세요"
    category: "defense"
    points: 10
    answer: "기술적 통제: 접근제어, 인증, 암호화, 보안코딩, 취약점관리, 로깅"
    answer_detail: "기술적 통제는 접근 통제, 인증, 암호화, 보안 개발, 취약점 관리, 로깅과 모니터링 등 34개 기술 항목을 다룹니다."
    script: "ai_data_lifecycle --check retention-policy --auto-purge expired --verify destruction"
    verify:
      type: "output_contains"
      expect: "기술적 통제"
  - order: 8
    instruction: "물리적 통제(Physical Controls)를 점검하세요"
    hint: "물리적 보안 경계와 환경 위협을 확인하세요"
    category: "audit"
    points: 10
    answer: "물리적 통제: 보안 경계, 출입통제, 장비 보호, 케이블 보안 등 14개 항목"
    answer_detail: "물리적 통제는 보안 경계 설정, 물리적 출입 통제, 장비 보호, 유틸리티 보안 등을 포함하여 정보처리시설의 물리적 보안을 확보합니다."
    script: "ai_incident_response --template breach-notification --timeline 72h --auto-notify"
    verify:
      type: "output_contains"
      expect: "물리적 통제"
  - order: 9
    instruction: "인적 통제(People Controls)를 구현하세요"
    hint: "직원 심사, 보안 인식, 원격근무 보안을 설정하세요"
    category: "config"
    points: 10
    answer: "인적 통제: 심사, 교육훈련, 징계절차, 원격근무 보안, 보안 이벤트 보고 등 8개"
    answer_detail: "인적 통제는 채용 전 심사, 보안 인식 교육, 징계 절차, 비밀유지, 원격근무 보안 등 8개 항목으로 인력에 의한 위험을 관리합니다."
    script: "ai_impact_assessment --target systems --threshold 50000 --generate-report"
    verify:
      type: "output_contains"
      expect: "인적 통제"
  - order: 10
    instruction: "내부 감사 프로그램을 수립하세요"
    hint: "감사 계획과 감사 기준을 설정하세요"
    category: "audit"
    points: 10
    answer: "내부 감사: 계획된 주기, 감사원 적격성, 독립성, 부적합 보고"
    answer_detail: "ISO 27001 조항 9.2에 따라 조직은 ISMS가 요구사항에 적합한지 확인하기 위해 내부 감사를 계획된 주기로 수행해야 합니다."
    script: "ai_role_analyzer --check cpo-designation --validate qualifications --report"
    verify:
      type: "output_contains"
      expect: "내부 감사"
  - order: 11
    instruction: "경영 검토를 실시하세요"
    hint: "검토 입력과 출력 항목을 확인하세요"
    category: "analysis"
    points: 10
    answer: "경영 검토: 이전 조치 상태, 변경사항, 감사 결과, 개선기회 검토"
    answer_detail: "조항 9.3에 따라 최고경영진은 계획된 주기로 ISMS를 검토하여 적절성, 충분성, 효과성을 보장해야 합니다."
    script: "ai_contract_analyzer --type outsourcing --check required-clauses --compliance pipa"
    verify:
      type: "output_contains"
      expect: "경영 검토"
  - order: 12
    instruction: "지속적 개선 프로세스를 구현하세요"
    hint: "부적합 관리와 시정 조치를 설정하세요"
    category: "response"
    points: 10
    answer: "지속적 개선: 부적합 식별→원인 분석→시정조치→효과 검증 사이클"
    answer_detail: "ISO 27001 조항 10에 따라 부적합 발생 시 시정 조치를 취하고, 지속적으로 ISMS의 적절성과 효과성을 개선해야 합니다."
    script: "ai_rights_processor --handle access-request --sla 10days --auto-respond"
    verify:
      type: "output_contains"
      expect: "지속적 개선"
  - order: 13
    instruction: "인증 심사 준비 체크리스트를 작성하세요"
    hint: "1단계(문서 심사)와 2단계(현장 심사) 준비를 확인하세요"
    category: "audit"
    points: 10
    answer: "인증 심사: 1단계 문서심사, 2단계 현장심사, 주요/경미 부적합 관리"
    answer_detail: "ISO 27001 인증 심사는 1단계(문서 검토)와 2단계(현장 심사)로 진행됩니다. 모든 요구사항에 대한 증적을 준비해야 합니다."
    script: "ai_log_auditor --check access-logs --retention 1year --integrity verify"
    verify:
      type: "output_contains"
      expect: "인증 심사"
  - order: 14
    instruction: "ISO 27001과 ISMS-P 매핑을 수행하세요"
    hint: "두 인증 간 공통점과 차이점을 분석하세요"
    category: "analysis"
    points: 10
    answer: "ISO 27001 vs ISMS-P: 약 70% 통제항목 중복, 개인정보보호 영역 ISMS-P 고유"
    answer_detail: "ISO 27001과 ISMS-P는 상당 부분 중복되지만, ISMS-P는 한국 개인정보보호법에 특화된 요구사항이 추가로 있습니다. 통합 인증을 위한 매핑이 효율적입니다."
    script: "ai_compliance_checker --framework pipa --full-audit --generate-checklist"
    verify:
      type: "output_contains"
      expect: "매핑"
  - order: 15
    instruction: "ISO 27001 인증 유지와 갱신을 계획하세요"
    hint: "사후심사, 갱신심사 일정을 수립하세요"
    category: "config"
    points: 10
    answer: "인증 유지: 연 1회 사후심사(감시심사), 3년 갱신심사, PDCA 순환"
    answer_detail: "ISO 27001 인증은 3년간 유효하며, 매년 사후심사(감시심사)를 받아야 합니다. PDCA 사이클을 통한 지속적 개선이 인증 유지의 핵심입니다."
    script: "ai_violation_analyzer --database cases --extract patterns --recommend improvements"
    verify:
      type: "output_contains"
      expect: "인증 유지"
