lab_id: compliance-ai-week04
title: ISO 27001 통제 항목 점검 실습 (AI 지원)
version: ai
course: compliance-ai
week: 4
description: ISO 27001 Annex A 통제 항목 중 기술적 통제(A.8)를 중심으로 시스템 설정을 점검합니다. 접근 통제, 암호화,
  운영 보안, 통신 보안 관련 설정을 검증합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- ISO 27001 Annex A의 기술적 통제 항목을 이해한다
- 시스템 설정이 ISO 27001 통제 요구사항을 충족하는지 점검한다
- 통제 미흡 사항을 식별하고 개선한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})에서 사용자 인증 방식을 점검하시오. ISO 27001 A.8.5(보안 인증). PAM
    설정에서 인증 모듈 구성을 확인합니다.
  hint: /etc/pam.d/common-auth 파일을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)에서 사용자 인증 방식을 점검하시오. ISO 27001 A.8.5(보안 인증).
    PAM 설정에서 인증 모듈 구성을 확인해줘

    📎 참고 (CLI): cat /etc/pam.d/common-auth'
  answer_detail: ISO 27001 A.8.5는 안전한 인증 기술을 요구합니다. PAM(Pluggable Authentication Modules)은
    리눅스의 인증 프레임워크로, common-auth에서 인증 순서와 모듈을 정의합니다. pam_unix.so(로컬 인증), pam_faillock.so(잠금)
    등이 설정됩니다.
  verify:
    type: output_contains
    expect: pam_unix
    field: stdout
  target_vm: secu
  script: cat /etc/pam.d/common-auth
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)에서 사용자 인증 방식을 점검하시오. ISO 27001 A.8.5(보안 인증).
    PAM 설정에서 인증 모듈 구성을 확인해줘
- order: 2
  instruction: 시스템의 암호화 알고리즘 설정을 점검하시오. ISO 27001 A.8.24(암호 사용). SSH에서 사용 중인 암호 알고리즘을
    확인합니다.
  hint: sshd_config에서 Ciphers, MACs, KexAlgorithms를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템의 암호화 알고리즘 설정을 점검하시오. ISO 27001 A.8.24(암호 사용). SSH에서 사용 중인 암호
    알고리즘을 확인해줘

    📎 참고 (CLI): grep -E ''(Ciphers|MACs|KexAlgorithms)'' /etc/ssh/sshd_config | grep
    -v ''^#'''
  answer_detail: ISO 27001 A.8.24는 적절한 암호화 통제를 요구합니다. SSH에서 aes128-ctr, aes256-gcm
    등 강력한 암호 알고리즘만 허용하고, arcfour, blowfish 등 취약한 알고리즘은 비활성화해야 합니다.
  verify:
    type: output_contains
    expect: ssh
    field: stdout
  target_vm: secu
  script: grep -E '(Ciphers|MACs|KexAlgorithms)' /etc/ssh/sshd_config | grep -v '^#'
  risk_level: low
  bastion_prompt: 시스템의 암호화 알고리즘 설정을 점검하시오. ISO 27001 A.8.24(암호 사용). SSH에서 사용 중인 암호
    알고리즘을 확인해줘
- order: 3
  instruction: 시스템의 커널 보안 파라미터를 점검하시오. ISO 27001 A.8.9(구성 관리). IP 포워딩, ICMP 리다이렉트
    등 네트워크 보안 설정을 확인합니다.
  hint: sysctl로 net.ipv4 관련 설정을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 시스템의 커널 보안 파라미터를 점검하시오. ISO 27001 A.8.9(구성 관리). IP 포워딩, ICMP 리다이렉트
    등 네트워크 보안 설정을 확인해줘

    📎 참고 (CLI): sysctl net.ipv4.ip_forward net.ipv4.conf.all.accept_redirects net.ipv4.conf.all.send_redirects
    net.ipv4.conf.all.accept_source_route'
  answer_detail: ISO 27001 A.8.9 구성 관리는 시스템 보안 설정의 적절한 관리를 요구합니다. ip_forward=0(라우터
    기능 비활성), accept_redirects=0(ICMP 리다이렉트 무시), accept_source_route=0(소스 라우팅 차단)이
    보안 권장 설정입니다.
  verify:
    type: output_contains
    expect: net.ipv4
    field: stdout
  target_vm: secu
  script: sysctl net.ipv4.ip_forward net.ipv4.conf.all.accept_redirects net.ipv4.conf.all.send_redirects
    net.ipv4.conf.all.accept_source_route
  risk_level: low
  bastion_prompt: 시스템의 커널 보안 파라미터를 점검하시오. ISO 27001 A.8.9(구성 관리). IP 포워딩, ICMP 리다이렉트
    등 네트워크 보안 설정을 확인해줘
- order: 4
  instruction: 파일 시스템의 중요 디렉터리 권한을 점검하시오. ISO 27001 A.8.3(정보 접근 제한).
  hint: /etc, /var/log, /tmp 등 주요 디렉터리의 권한을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 파일 시스템의 중요 디렉터리 권한을 점검하시오. ISO 27001 A.8.3(정보 접근 제한)해줘

    📎 참고 (CLI): stat -c ''%a %U:%G %n'' /etc/shadow /etc/gshadow /etc/passwd /etc/ssh/sshd_config
    /var/log/auth.log 2>/dev/null'
  answer_detail: ISO 27001 A.8.3은 정보에 대한 접근을 최소 권한 원칙에 따라 제한할 것을 요구합니다. /etc/shadow는
    640 이하, sshd_config는 600 이하여야 합니다. 세계 쓰기 가능(world-writable) 권한은 특히 위험합니다.
  verify:
    type: output_contains
    expect: shadow
    field: stdout
  target_vm: secu
  script: stat -c '%a %U:%G %n' /etc/shadow /etc/gshadow /etc/passwd /etc/ssh/sshd_config
    /var/log/auth.log 2>/dev/null
  risk_level: low
  bastion_prompt: 파일 시스템의 중요 디렉터리 권한을 점검하시오. ISO 27001 A.8.3(정보 접근 제한)해줘
- order: 5
  instruction: 시스템에 설치된 패키지의 보안 업데이트 현황을 확인하시오. ISO 27001 A.8.8(기술적 취약성 관리).
  hint: apt 명령으로 보안 업데이트 목록을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템에 설치된 패키지의 보안 업데이트 현황을 확인하시오. ISO 27001 A.8.8(기술적 취약성 관리)해줘

    📎 참고 (CLI): apt list --upgradable 2>/dev/null | head -20'
  answer_detail: ISO 27001 A.8.8은 기술적 취약성을 적시에 식별하고 패치할 것을 요구합니다. 보안 업데이트가 지연되면 알려진
    취약점을 통한 공격에 노출됩니다. 특히 커널, OpenSSH, OpenSSL 등 핵심 패키지의 업데이트 상태를 우선 확인해야 합니다.
  verify:
    type: output_contains
    expect: Listing
    field: stdout
  target_vm: secu
  script: apt list --upgradable 2>/dev/null | head -20
  risk_level: low
  bastion_prompt: 시스템에 설치된 패키지의 보안 업데이트 현황을 확인하시오. ISO 27001 A.8.8(기술적 취약성 관리)해줘
- order: 6
  instruction: cron job 설정을 점검하시오. ISO 27001 A.8.9(구성 관리). 비인가 예약 작업이 없는지 확인합니다.
  hint: /var/spool/cron과 /etc/crontab, /etc/cron.d/를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: cron job 설정을 점검해줘

    📎 참고 (CLI): sudo cat /etc/crontab && echo ''--- cron.d ---'' && sudo ls -la /etc/cron.d/
    && echo ''--- user crons ---'' && sudo ls -la /var/spool/cron/crontabs/ 2>/dev/null'
  answer_detail: ISO 27001 A.8.9는 하드웨어, 소프트웨어, 서비스, 네트워크의 구성을 관리할 것을 요구합니다. 예약 작업(cron)은
    공격자가 지속성(persistence)을 확보하는 수단이 될 수 있으므로 정기적으로 검토해야 합니다.
  verify:
    type: output_contains
    expect: cron
    field: stdout
  target_vm: secu
  script: sudo cat /etc/crontab && echo '--- cron.d ---' && sudo ls -la /etc/cron.d/
    && echo '--- user crons ---' && sudo ls -la /var/spool/cron/crontabs/ 2>/dev/null
  risk_level: low
  bastion_prompt: cron job 설정을 점검해줘
- order: 7
  instruction: 시스템의 네트워크 설정 파일을 점검하시오. ISO 27001 A.8.20(네트워크 보안). DNS 설정과 호스트 파일을
    확인합니다.
  hint: /etc/resolv.conf와 /etc/hosts 파일을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템의 네트워크 설정 파일을 점검하시오. ISO 27001 A.8.20(네트워크 보안). DNS 설정과 호스트
    파일을 확인해줘

    📎 참고 (CLI): cat /etc/resolv.conf && echo ''--- hosts ---'' && cat /etc/hosts'
  answer_detail: ISO 27001 A.8.20은 네트워크와 네트워크 장치의 보안을 요구합니다. 비인가 DNS 서버 설정은 DNS 스푸핑
    공격에 취약하게 만들고, /etc/hosts 파일 변조는 트래픽을 악성 서버로 유도할 수 있습니다.
  verify:
    type: output_contains
    expect: nameserver
    field: stdout
  target_vm: secu
  script: cat /etc/resolv.conf && echo '--- hosts ---' && cat /etc/hosts
  risk_level: low
  bastion_prompt: 시스템의 네트워크 설정 파일을 점검하시오. ISO 27001 A.8.20(네트워크 보안). DNS 설정과 호스트 파일을
    확인해줘
- order: 8
  instruction: 시스템 부팅 시 자동 시작되는 서비스 목록을 확인하시오. ISO 27001 A.8.9(구성 관리). 불필요한 서비스는 비활성화해야
    합니다.
  hint: systemctl list-unit-files로 enabled 상태의 서비스를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템 부팅 시 자동 시작되는 서비스 목록을 확인하시오. ISO 27001 A.8.9(구성 관리). 불필요한 서비스는
    비활성화해야

    📎 참고 (CLI): systemctl list-unit-files --type=service --state=enabled --no-pager'
  answer_detail: ISO 27001에서는 불필요한 서비스를 최소화하여 공격 표면을 줄일 것을 요구합니다. 부팅 시 자동 시작되는 서비스
    중 업무와 관련 없는 것은 비활성화(systemctl disable)해야 합니다.
  verify:
    type: output_contains
    expect: enabled
    field: stdout
  target_vm: secu
  script: systemctl list-unit-files --type=service --state=enabled --no-pager
  risk_level: low
  bastion_prompt: 시스템 부팅 시 자동 시작되는 서비스 목록을 확인하시오. ISO 27001 A.8.9(구성 관리). 불필요한 서비스는
    비활성화해야
- order: 9
  instruction: ISO 27001 Annex A 기술적 통제 종합 점검 스크립트를 작성하고 실행하시오.
  hint: 인증, 암호화, 커널 보안, 파일 권한, 서비스 관리를 종합하세요.
  category: audit
  points: 18
  answer: '🤖 프롬프트: ISO 27001 Annex A 기술적 통제 종합 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/iso27001_audit.sh

    #!/bin/bash

    echo ''=== ISO 27001 Annex A 기술적 통제 점검 ===''

    echo ''''

    echo ''[A.8.3 정보 접근 제한]''

    stat -c ''%a %n'' /etc/shadow /etc/ssh/sshd_config 2>/dev/null

    echo ''[A.8.5 보안 인증]''

    grep ''minlen'' /etc/security/pwquality.conf 2>/dev/null | grep -v ''^#''

    echo ''[A.8.8 취약성 관리]''

    apt list --upgradable 2>/dev/null | wc -l

    echo ''[A.8.9 구성 관리]''

    sysctl -n net.ipv4.ip_forward

    echo ''[A.8.20 네트워크 보안]''

    sudo nft list ruleset 2>/dev/null | head -2

    echo ''[A.8.24 암호 사용]''

    grep ''Ciphers'' /etc/ssh/sshd_config 2>/dev/null | grep -v ''^#''

    echo ''''

    echo ''=== ISO 27001 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/iso27001_audit.sh && bash /tmp/iso27001_audit.sh'
  answer_detail: ISO 27001:2022의 Annex A는 4개 카테고리(조직, 인적, 물리적, 기술적)의 93개 통제를 정의합니다.
    기술적 통제(A.8)에는 접근 제한, 인증, 취약성 관리, 구성 관리, 네트워크 보안, 암호화 등이 포함되며, 이 스크립트는 핵심 항목을 자동으로
    점검합니다.
  verify:
    type: output_contains
    expect: ISO 27001 점검 완료
    field: stdout
  target_vm: secu
  script: 'cat << ''SCRIPT'' > /tmp/iso27001_audit.sh

    #!/bin/bash

    echo ''=== ISO 27001 Annex A 기술적 통제 점검 ===''

    echo ''''

    echo ''[A.8.3 정보 접근 제한]''

    stat -c ''%a %n'' /etc/shadow /etc/ssh/sshd_config 2>/dev/null

    echo ''[A.8.5 보안 인증]''

    grep ''minlen'' /etc/security/pwquality.conf 2>/dev/null | grep -v ''^#''

    echo ''[A.8.8 취약성 관리]''

    apt list --upgradable 2>/dev/null | wc -l

    echo ''[A.8.9 구성 관리]''

    sysctl -n net.ipv4.ip_forward

    echo ''[A.8.20 네트워크 보안]''

    sudo nft list ruleset 2>/dev/null | head -2

    echo ''[A.8.24 암호 사용]''

    grep ''Ciphers'' /etc/ssh/sshd_config 2>/dev/null | grep -v ''^#''

    echo ''''

    echo ''=== ISO 27001 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/iso27001_audit.sh && bash /tmp/iso27001_audit.sh'
  risk_level: low
  bastion_prompt: ISO 27001 Annex A 기술적 통제 종합 점검 스크립트를 작성하고 실행하시오.
