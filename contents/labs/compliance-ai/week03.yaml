lab_id: "compliance-ai-week03"
title: "[AI] ISMS-P"
version: "ai"
course: "compliance-ai"
week: 3
description: "정보보호 및 개인정보보호 관리체계 인증 기준을 학습합니다"
difficulty: "easy"
duration_minutes: 120
objectives:
  - "ISMS-P의 핵심 개념을 이해한다"
  - "ISMS-P 관련 실무 기술을 습득한다"
  - "ISMS-P 보안 대책을 수립하고 적용한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "ISMS-P 인증 기준 체계를 분석하세요"
    hint: "관리체계, 보호대책, 개인정보 3개 영역을 확인하세요"
    category: "recon"
    points: 10
    answer: "ISMS-P: 관리체계 수립(16개), 보호대책(64개), 개인정보(22개) = 102개 인증기준"
    answer_detail: "ISMS-P는 정보보호 관리체계(ISMS)와 개인정보보호 관리체계(PIMS)를 통합한 인증제도로, 총 102개의 인증기준을 가집니다."
    script: "ai_compliance_scan --target 10.20.30.0/24 --framework pipa --check articles"
    verify:
      type: "output_contains"
      expect: "102개"
  - order: 2
    instruction: "ISMS-P 인증 범위를 설정하세요"
    hint: "핵심 자산과 서비스를 식별하세요"
    category: "analysis"
    points: 10
    answer: "인증 범위: 정보서비스, 정보자산, 물리적 위치, 인력 포함"
    answer_detail: "인증 범위 설정은 ISMS-P 인증의 첫 단계로, 조직의 핵심 정보서비스와 이를 지원하는 자산, 인력, 물리적 위치를 명확히 정의해야 합니다."
    script: "ai_policy_analyzer --input consent_template.yaml --validate required-fields"
    verify:
      type: "output_contains"
      expect: "인증 범위"
  - order: 3
    instruction: "정보보호 정책을 수립하세요"
    hint: "경영진 승인과 정책 구성요소를 확인하세요"
    category: "config"
    points: 10
    answer: "정보보호 정책: 목적, 범위, 역할과 책임, 위반 시 조치 포함"
    answer_detail: "정보보호 정책은 조직의 정보보호에 대한 최상위 방향을 제시하는 문서로, 경영진의 의지와 승인이 반드시 포함되어야 합니다."
    script: "ai_pii_scanner --target /var/log --detect ssn,phone,email --report json"
    verify:
      type: "output_contains"
      expect: "정책"
  - order: 4
    instruction: "위험 평가를 수행하세요"
    hint: "자산 식별 → 위협 분석 → 취약점 분석 → 위험도 산정 순서를 따르세요"
    category: "analysis"
    points: 10
    answer: "위험도 = 자산가치 × 위협 × 취약점, 수용가능 위험 수준 설정"
    answer_detail: "위험 평가는 조직의 정보자산에 대한 위험을 체계적으로 식별하고 평가하는 과정입니다. 정량적 또는 정성적 방법을 사용할 수 있습니다."
    script: "ai_encryption_audit --target 10.20.30.0/24 --check aes256 --compliance pipa"
    verify:
      type: "output_contains"
      expect: "위험도"
  - order: 5
    instruction: "접근 통제 정책을 구현하세요"
    hint: "최소 권한 원칙을 적용하세요"
    category: "defense"
    points: 10
    answer: "접근 통제: 식별, 인증, 인가, 책임추적성 4단계 구현"
    answer_detail: "접근 통제는 ISMS-P 보호대책의 핵심 영역으로, 사용자 식별, 인증, 권한 부여, 활동 기록의 4단계를 체계적으로 구현해야 합니다."
    script: "ai_access_control_audit --target 10.20.30.0/24 --check permissions --least-privilege"
    verify:
      type: "output_contains"
      expect: "접근 통제"
  - order: 6
    instruction: "암호화 정책을 수립하고 적용하세요"
    hint: "전송 중 암호화와 저장 시 암호화를 구분하세요"
    category: "config"
    points: 10
    answer: "전송: TLS 1.2+, 저장: AES-256, 키관리: HSM 또는 KMS 사용"
    answer_detail: "암호화 정책은 데이터의 기밀성을 보장하기 위한 핵심 보호대책입니다. 전송 구간과 저장 구간을 구분하여 적절한 암호화를 적용해야 합니다."
    script: "ai_web_crawler --url http://10.20.30.80 --check privacy-policy --validate completeness"
    verify:
      type: "output_contains"
      expect: "AES-256"
  - order: 7
    instruction: "물리적 보안 대책을 점검하세요"
    hint: "출입 통제, CCTV, 환경 관리를 확인하세요"
    category: "audit"
    points: 10
    answer: "물리적 보안: 출입통제시스템, CCTV 감시, 항온항습, 화재감지 설치"
    answer_detail: "물리적 보안은 정보자산이 위치한 시설의 보안을 확보하는 것으로, 출입 통제, 영상 감시, 환경 관리(온도, 습도, 화재) 등을 포함합니다."
    script: "ai_data_lifecycle --check retention-policy --auto-purge expired --verify destruction"
    verify:
      type: "output_contains"
      expect: "물리적 보안"
  - order: 8
    instruction: "인적 보안 관리를 수행하세요"
    hint: "보안 서약서, 교육, 퇴직 시 절차를 확인하세요"
    category: "config"
    points: 10
    answer: "인적 보안: 채용 시 보안서약, 정기 교육, 퇴직 시 자산반납·권한회수"
    answer_detail: "인적 보안은 임직원, 외부 인력 등 사람에 의한 보안 위험을 관리하는 것입니다. 채용 전 검증, 재직 중 교육, 퇴직 시 절차를 수립해야 합니다."
    script: "ai_incident_response --template breach-notification --timeline 72h --auto-notify"
    verify:
      type: "output_contains"
      expect: "인적 보안"
  - order: 9
    instruction: "침해사고 대응 체계를 구축하세요"
    hint: "대응 조직, 절차, 연락체계를 수립하세요"
    category: "response"
    points: 10
    answer: "침해사고 대응: 탐지→분석→억제→제거→복구→교훈 6단계"
    answer_detail: "침해사고 대응 체계는 보안 사고 발생 시 신속하고 체계적으로 대응하기 위한 조직, 절차, 도구를 포함합니다."
    script: "ai_impact_assessment --target systems --threshold 50000 --generate-report"
    verify:
      type: "output_contains"
      expect: "침해사고"
  - order: 10
    instruction: "보안 모니터링 체계를 구성하세요"
    hint: "실시간 모니터링 도구와 절차를 설정하세요"
    category: "monitor"
    points: 10
    answer: "보안 모니터링: SIEM 연동, 실시간 알림, 24/7 관제 체계"
    answer_detail: "보안 모니터링은 정보자산의 보안 상태를 지속적으로 감시하는 것으로, SIEM, IDS/IPS, 방화벽 로그 등을 통합 모니터링해야 합니다."
    script: "ai_role_analyzer --check cpo-designation --validate qualifications --report"
    verify:
      type: "output_contains"
      expect: "모니터링"
  - order: 11
    instruction: "개인정보 생명주기 관리를 점검하세요"
    hint: "수집→이용→제공→파기 전 과정을 확인하세요"
    category: "audit"
    points: 10
    answer: "개인정보 생명주기: 수집 최소화, 목적 내 이용, 동의 기반 제공, 기한 후 파기"
    answer_detail: "ISMS-P의 개인정보 영역은 개인정보의 수집, 이용, 제공, 파기 전 과정에 걸쳐 22개의 인증기준을 요구합니다."
    script: "ai_contract_analyzer --type outsourcing --check required-clauses --compliance pipa"
    verify:
      type: "output_contains"
      expect: "생명주기"
  - order: 12
    instruction: "내부 감사를 수행하세요"
    hint: "감사 계획, 수행, 보고 절차를 따르세요"
    category: "audit"
    points: 10
    answer: "내부 감사: 연 1회 이상, 감사원 독립성 확보, 부적합 사항 시정조치"
    answer_detail: "내부 감사는 ISMS-P 관리체계의 적정성과 효과성을 평가하는 것으로, 최소 연 1회 이상 수행하고 발견된 부적합에 대해 시정조치를 해야 합니다."
    script: "ai_rights_processor --handle access-request --sla 10days --auto-respond"
    verify:
      type: "output_contains"
      expect: "내부 감사"
  - order: 13
    instruction: "경영진 검토를 준비하세요"
    hint: "검토 보고서 항목을 확인하세요"
    category: "analysis"
    points: 10
    answer: "경영진 검토: 위험평가 결과, 감사 결과, 개선과제, 자원 할당 검토"
    answer_detail: "경영진 검토는 정보보호 관리체계의 전략적 방향을 설정하고 필요한 자원을 확보하는 최종 의사결정 과정입니다."
    script: "ai_log_auditor --check access-logs --retention 1year --integrity verify"
    verify:
      type: "output_contains"
      expect: "경영진"
  - order: 14
    instruction: "인증 심사 대비 문서를 준비하세요"
    hint: "필수 문서 목록을 확인하세요"
    category: "config"
    points: 10
    answer: "필수 문서: 정보보호정책, 위험평가보고서, 적용성보고서(SoA), 내부감사보고서"
    answer_detail: "ISMS-P 인증 심사를 위해 관리체계 문서, 위험평가 결과, 적용성 보고서, 내부감사 결과 등 필수 문서를 체계적으로 준비해야 합니다."
    script: "ai_compliance_checker --framework pipa --full-audit --generate-checklist"
    verify:
      type: "output_contains"
      expect: "필수 문서"
  - order: 15
    instruction: "ISMS-P 인증 유지 관리 계획을 수립하세요"
    hint: "사후 심사 준비와 지속적 개선을 계획하세요"
    category: "analysis"
    points: 10
    answer: "인증 유지: 연 1회 사후심사, 3년 주기 갱신심사, 지속적 개선 활동"
    answer_detail: "ISMS-P 인증 취득 후 매년 사후심사를 받아야 하며, 3년마다 갱신심사를 통과해야 합니다. 지속적인 개선 활동이 필수적입니다."
    script: "ai_violation_analyzer --database cases --extract patterns --recommend improvements"
    verify:
      type: "output_contains"
      expect: "인증 유지"
