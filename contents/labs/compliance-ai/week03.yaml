lab_id: compliance-ai-week03
title: ISMS-P 인증 기준 점검 실습 (AI 지원)
version: ai
course: compliance-ai
week: 3
description: ISMS-P(정보보호 및 개인정보보호 관리체계) 인증 기준에 따라 시스템의 기술적 보호조치를 점검합니다. 관리체계 수립, 보호대책
  구현, 개인정보 처리 단계별 요구사항을 실제 설정과 대조합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- ISMS-P 인증 기준의 기술적 점검 항목을 이해한다
- 시스템 설정이 ISMS-P 요구사항을 충족하는지 검증한다
- 미흡 사항에 대한 개선 조치를 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})에서 시스템 계정 목록을 확인하고, 불필요한 계정이 없는지 점검하시오. ISMS-P
    2.5.1(사용자 계정 관리).
  hint: /etc/passwd에서 로그인 가능한 계정만 필터링하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)에서 시스템 계정 목록을 확인하고, 불필요한 계정이 없는지 점검하시오. ISMS-P
    2.5.1(사용자 계정 관리)해줘

    📎 참고 (CLI): grep -v ''nologin\|false'' /etc/passwd | grep -v ''^#'''
  answer_detail: ISMS-P 2.5.1 사용자 계정 관리 항목은 불필요한 계정을 식별하여 비활성화하고, 공용 계정 사용을 금지하며,
    퇴직/전보 시 즉시 계정을 처리할 것을 요구합니다. /bin/bash, /bin/sh 등 로그인 셸이 있는 계정만 실제 로그인 가능합니다.
  verify:
    type: output_contains
    expect: root
    field: stdout
  target_vm: secu
  script: grep -v 'nologin\|false' /etc/passwd | grep -v '^#'
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)에서 시스템 계정 목록을 확인하고, 불필요한 계정이 없는지 점검하시오. ISMS-P
    2.5.1(사용자 계정 관리)해줘
- order: 2
  instruction: 각 계정의 패스워드 만료 정보를 확인하시오. ISMS-P 2.5.2(사용자 식별 및 인증).
  hint: chage -l 명령으로 계정별 패스워드 정보를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 각 계정의 패스워드 만료 정보를 확인하시오. ISMS-P 2.5.2(사용자 식별 및 인증)해줘

    📎 참고 (CLI): sudo chage -l root && echo ''---'' && sudo chage -l trainee 2>/dev/null'
  answer_detail: ISMS-P 2.5.2는 사용자 식별 및 인증 관리를 요구합니다. chage -l은 계정의 패스워드 최종 변경일, 만료일,
    최소/최대 사용일을 표시합니다. 패스워드가 '만료 안 됨(never)'이면 정기 변경 정책이 적용되지 않은 것입니다.
  verify:
    type: output_contains
    expect: Password
    field: stdout
  target_vm: secu
  script: sudo chage -l root && echo '---' && sudo chage -l trainee 2>/dev/null
  risk_level: low
  bastion_prompt: 각 계정의 패스워드 만료 정보를 확인하시오. ISMS-P 2.5.2(사용자 식별 및 인증)해줘
- order: 3
  instruction: sudo 권한이 부여된 사용자 목록을 확인하시오. ISMS-P 2.5.4(접근 권한 관리).
  hint: /etc/sudoers 파일과 /etc/sudoers.d/ 디렉터리를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: sudo 권한이 부여된 사용자 목록을 확인하시오. ISMS-P 2.5.4(접근 권한 관리)해줘

    📎 참고 (CLI): sudo grep -v ''^#\|^$\|^Defaults'' /etc/sudoers && sudo ls -la /etc/sudoers.d/'
  answer_detail: ISMS-P 2.5.4는 업무에 필요한 최소한의 권한만 부여하고 정기적으로 검토할 것을 요구합니다. sudoers에서
    ALL=(ALL:ALL) ALL 같은 광범위한 권한이 일반 사용자에게 부여되어 있다면 위험합니다.
  verify:
    type: output_contains
    expect: root
    field: stdout
  target_vm: secu
  script: sudo grep -v '^#\|^$\|^Defaults' /etc/sudoers && sudo ls -la /etc/sudoers.d/
  risk_level: low
  bastion_prompt: sudo 권한이 부여된 사용자 목록을 확인하시오. ISMS-P 2.5.4(접근 권한 관리)해줘
- order: 4
  instruction: 시스템 시간 동기화(NTP) 설정을 확인하시오. ISMS-P 2.9.5(로그 및 접속기록 관리) 준수를 위해 정확한 시간이
    필수입니다.
  hint: timedatectl 또는 chrony/ntp 설정을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템 시간 동기화(NTP) 설정을 확인하시오. ISMS-P 2.9.5(로그 및 접속기록 관리) 준수를 위해 정확한
    시간이 필수해줘

    📎 참고 (CLI): timedatectl status && cat /etc/systemd/timesyncd.conf 2>/dev/null
    | grep -v ''^#\|^$'''
  answer_detail: ISMS-P 2.9.5 로그 및 접속기록 관리에서는 정확한 시간 기록을 요구합니다. 모든 서버의 시간이 동기화되지 않으면
    로그 상관 분석이 불가능하고, 사고 추적 시 타임라인 구성에 오류가 발생합니다.
  verify:
    type: output_contains
    expect: Time zone
    field: stdout
  target_vm: secu
  script: timedatectl status && cat /etc/systemd/timesyncd.conf 2>/dev/null | grep
    -v '^#\|^$'
  risk_level: low
  bastion_prompt: 시스템 시간 동기화(NTP) 설정을 확인하시오. ISMS-P 2.9.5(로그 및 접속기록 관리) 준수를 위해 정확한
    시간이 필수해줘
- order: 5
  instruction: 시스템의 자동 화면 잠금(유휴 세션 타임아웃) 설정을 확인하시오. ISMS-P 2.5.3(접근 권한 관리).
  hint: SSH 설정에서 ClientAliveInterval을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템의 자동 화면 잠금(유휴 세션 타임아웃) 설정을 확인하시오. ISMS-P 2.5.3(접근 권한 관리)해줘

    📎 참고 (CLI): grep -E ''(ClientAliveInterval|ClientAliveCountMax)'' /etc/ssh/sshd_config
    | grep -v ''^#'''
  answer_detail: 'ISMS-P 2.5.3은 일정 시간 미사용 시 자동 잠금을 요구합니다. SSH의 ClientAliveInterval은
    유휴 세션 확인 간격(초), ClientAliveCountMax는 무응답 허용 횟수입니다. 예: 300초 간격, 3회 = 15분 후 자동 종료.'
  verify:
    type: output_contains
    expect: ClientAlive
    field: stdout
  target_vm: secu
  script: grep -E '(ClientAliveInterval|ClientAliveCountMax)' /etc/ssh/sshd_config
    | grep -v '^#'
  risk_level: low
  bastion_prompt: 시스템의 자동 화면 잠금(유휴 세션 타임아웃) 설정을 확인하시오. ISMS-P 2.5.3(접근 권한 관리)해줘
- order: 6
  instruction: 파일 시스템에서 소유자가 없는(orphan) 파일을 검색하시오. ISMS-P 2.9.1(변경관리)의 관리 대상입니다.
  hint: find 명령으로 nouser 또는 nogroup 파일을 검색하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 파일 시스템에서 소유자가 없는(orphan) 파일을 검색하시오. ISMS-P 2.9.1(변경관리)의 관리 대상해줘

    📎 참고 (CLI): sudo find /etc /var -nouser -o -nogroup 2>/dev/null | head -20'
  answer_detail: 소유자가 없는 파일은 삭제된 계정이 남긴 것으로, 보안 위험이 될 수 있습니다. ISMS-P에서는 시스템 변경 시 관련
    파일과 권한을 함께 관리하도록 요구합니다. 이런 파일이 발견되면 적절한 소유자를 지정하거나 삭제해야 합니다.
  verify:
    type: output_contains
    expect: find
    field: stdout
  target_vm: secu
  script: sudo find /etc /var -nouser -o -nogroup 2>/dev/null | head -20
  risk_level: low
  bastion_prompt: 파일 시스템에서 소유자가 없는(orphan) 파일을 검색하시오. ISMS-P 2.9.1(변경관리)의 관리 대상해줘
- order: 7
  instruction: WEB 서버({{WEB_IP}})의 Apache 디렉터리 리스팅이 비활성화되어 있는지 확인하시오. ISMS-P 2.6.4(웹
    서비스 보안).
  hint: Apache 설정에서 Options -Indexes 또는 Indexes를 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)의 Apache 디렉터리 리스팅이 비활성화되어 있는지 확인하시오. ISMS-P
    2.6.4(웹 서비스 보안)해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''grep -rn "Indexes" /etc/apache2/apache2.conf
    /etc/apache2/sites-enabled/ 2>/dev/null'''
  answer_detail: ISMS-P 2.6.4는 웹 서비스 보안을 요구합니다. 디렉터리 리스팅이 활성화되면 웹 서버의 파일 목록이 외부에 노출되어
    민감한 파일이 유출될 수 있습니다. Options에 Indexes가 있으면 -Indexes로 변경해야 합니다.
  verify:
    type: output_contains
    expect: Indexes
    field: stdout
  target_vm: secu
  script: ssh ccc@10.20.30.80 'grep -rn "Indexes" /etc/apache2/apache2.conf /etc/apache2/sites-enabled/
    2>/dev/null'
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)의 Apache 디렉터리 리스팅이 비활성화되어 있는지 확인하시오. ISMS-P 2.6.4(웹
    서비스 보안)해줘
- order: 8
  instruction: auditd에서 사용자 로그인/로그아웃 이벤트를 추적하는 규칙이 있는지 확인하시오. ISMS-P 2.9.5(로그 및 접속기록
    관리).
  hint: auditctl -l로 현재 규칙을 확인하고, /var/log/wtmp 감시 여부를 점검하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: auditd에서 사용자 로그인/로그아웃 이벤트를 추적하는 규칙이 있는지 확인하시오. ISMS-P 2.9.5(로그
    및 접속기록 관리)해줘

    📎 참고 (CLI): sudo auditctl -l | grep -E ''(wtmp|btmp|lastlog|logins)'' && echo
    ''---'' && last -5'
  answer_detail: ISMS-P 2.9.5는 접속기록(로그인/로그아웃 시간, 접속 IP, 수행 업무)의 기록과 보관을 요구합니다. /var/log/wtmp은
    성공한 로그인, /var/log/btmp은 실패한 로그인, /var/log/lastlog은 마지막 로그인 기록입니다.
  verify:
    type: output_contains
    expect: pts
    field: stdout
  target_vm: secu
  script: sudo auditctl -l | grep -E '(wtmp|btmp|lastlog|logins)' && echo '---' &&
    last -5
  risk_level: low
  bastion_prompt: auditd에서 사용자 로그인/로그아웃 이벤트를 추적하는 규칙이 있는지 확인하시오. ISMS-P 2.9.5(로그 및
    접속기록 관리)해줘
- order: 9
  instruction: ISMS-P 기술적 보호조치 종합 점검 보고서를 생성하는 스크립트를 작성하고 실행하시오.
  hint: 계정 관리, 접근 통제, 로그 관리 항목을 종합하세요.
  category: audit
  points: 16
  answer: '🤖 프롬프트: ISMS-P 기술적 보호조치 종합 점검 보고서를 생성하는 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/ismsp_audit.sh

    #!/bin/bash

    echo ''=== ISMS-P 기술적 보호조치 점검 보고서 ===''

    echo ''''

    echo ''[2.5.1 사용자 계정 관리]''

    echo "로그인 가능 계정 수: $(grep -vc ''nologin\|false'' /etc/passwd)"

    echo ''[2.5.2 패스워드 정책]''

    grep ''^PASS_MAX_DAYS'' /etc/login.defs

    grep ''minlen'' /etc/security/pwquality.conf 2>/dev/null | grep -v ''^#''

    echo ''[2.5.4 접근 권한 관리]''

    echo "sudo 그룹 사용자: $(getent group sudo | cut -d: -f4)"

    echo ''[2.9.5 접속기록 관리]''

    sudo systemctl is-active auditd 2>/dev/null

    echo "감사 규칙 수: $(sudo auditctl -l 2>/dev/null | wc -l)"

    echo ''''

    echo ''=== ISMS-P 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/ismsp_audit.sh && bash /tmp/ismsp_audit.sh'
  answer_detail: ISMS-P는 관리체계 수립(1영역), 보호대책 요구사항(2영역), 개인정보 처리 단계별 요구사항(3영역)으로 구성됩니다.
    기술적 점검은 2영역의 핵심으로, 사용자 계정 관리(2.5.1), 식별 및 인증(2.5.2), 접근 권한(2.5.4), 로그 관리(2.9.5)
    등을 포함합니다.
  verify:
    type: output_contains
    expect: ISMS-P 점검 완료
    field: stdout
  target_vm: secu
  script: 'cat << ''SCRIPT'' > /tmp/ismsp_audit.sh

    #!/bin/bash

    echo ''=== ISMS-P 기술적 보호조치 점검 보고서 ===''

    echo ''''

    echo ''[2.5.1 사용자 계정 관리]''

    echo "로그인 가능 계정 수: $(grep -vc ''nologin\|false'' /etc/passwd)"

    echo ''[2.5.2 패스워드 정책]''

    grep ''^PASS_MAX_DAYS'' /etc/login.defs

    grep ''minlen'' /etc/security/pwquality.conf 2>/dev/null | grep -v ''^#''

    echo ''[2.5.4 접근 권한 관리]''

    echo "sudo 그룹 사용자: $(getent group sudo | cut -d: -f4)"

    echo ''[2.9.5 접속기록 관리]''

    sudo systemctl is-active auditd 2>/dev/null

    echo "감사 규칙 수: $(sudo auditctl -l 2>/dev/null | wc -l)"

    echo ''''

    echo ''=== ISMS-P 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/ismsp_audit.sh && bash /tmp/ismsp_audit.sh'
  risk_level: low
  bastion_prompt: ISMS-P 기술적 보호조치 종합 점검 보고서를 생성하는 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘
