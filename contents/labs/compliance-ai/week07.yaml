lab_id: compliance-ai-week07
title: SOX IT 통제 점검 실습 (AI 지원)
version: ai
course: compliance-ai
week: 7
description: SOX(Sarbanes-Oxley Act) Section 404의 IT 일반통제(ITGC) 요구사항을 시스템에서 점검합니다. 접근 통제, 변경 관리, 컴퓨터 운영,
  프로그램 개발 관련 설정을 검증합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- SOX ITGC의 네 가지 도메인(접근통제, 변경관리, 운영, 개발)을 이해한다
- 시스템의 접근 통제와 변경 관리 설정을 점검한다
- IT 통제 증적(evidence)을 수집하고 보관한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'SECU 서버({{SECU_IP}})에서 사용자 계정의 최종 로그인 이력을 확인하시오. SOX ITGC - 접근 통제: 비활성 계정 식별.'
  hint: lastlog 명령으로 각 계정의 마지막 로그인을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)에서 사용자 계정의 최종 로그인 이력을 확인하시오. SOX ITGC - 접근 통제: 비활성 계정 식별해줘

    📎 참고 (CLI): lastlog | grep -v ''Never logged in'' | head -20'
  answer_detail: SOX ITGC 접근 통제 도메인은 시스템 접근을 인가된 사용자로 제한할 것을 요구합니다. 장기간 미사용 계정은 비활성화해야 하며, lastlog로 각
    계정의 마지막 로그인 일시와 출발지 IP를 확인할 수 있습니다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: SOX Section 404 ITGC Access Control 도메인 — lastlog 명령으로 사용자 계정의 최종 로그인 일시와 출발지 IP 확인 후 Never
        logged in 필터링하여 상위 20건의 활성 계정 로그인 이력 추출. 장기간 미사용 계정(90일 이상)은 비활성화 대상으로 식별하여 내부 통제 증적 확보.
      success_criteria:
      - lastlog 명령 실행 및 grep -v Never logged in 파이프 적용
      - head -20 으로 활성 계정 로그인 출력
      - Username/Port/From/Latest 컬럼 확인하여 접근 통제 감사 증적 수집
      acceptable_methods:
      - lastlog | grep -v Never | head
      - last 명령으로 대체하여 로그인 이력 조회
      - faillog/aulastlog 등 동등 감사 도구 사용
      - 결과를 access_audit.log 로 리다이렉트 보관
      negative_signs:
      - lastlog 원리만 설명하고 실행하지 않음
      - Never logged in 필터 없이 전체 출력
      - SOX ITGC 접근 통제 맥락 누락
  target_vm: secu
  script: lastlog | grep -v 'Never logged in' | head -20
  risk_level: low
  bastion_prompt: 'SECU 서버(10.20.30.1)에서 사용자 계정의 최종 로그인 이력을 확인하시오. SOX ITGC - 접근 통제: 비활성 계정 식별해줘'
- order: 2
  instruction: '실패한 로그인 시도를 확인하시오. SOX ITGC - 접근 통제: 비인가 접근 시도 모니터링.'
  hint: /var/log/auth.log에서 Failed 키워드를 검색하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 실패한 로그인 시도를 확인하시오. SOX ITGC - 접근 통제: 비인가 접근 시도 모니터링해줘

    📎 참고 (CLI): sudo grep -c ''Failed'' /var/log/auth.log 2>/dev/null && echo ''건 실패'' && sudo grep ''Failed''
    /var/log/auth.log 2>/dev/null | tail -5'
  answer_detail: SOX는 재무 데이터에 대한 비인가 접근 시도를 모니터링할 것을 요구합니다. 로그인 실패가 특정 계정이나 IP에서 집중되면 무차별 대입 공격의 징후일 수
    있습니다. 이를 자동 차단하는 메커니즘(fail2ban 등)도 필요합니다.
  verify:
    type: output_contains
    expect: 실패
    field: stdout
    semantic:
      intent: SOX Section 404 ITGC Access Control 도메인 — /var/log/auth.log 에서 Failed 키워드 count 후 tail -5
        로 최근 실패 시도 5건 확인. 비인가 접근 시도(brute force) 모니터링 증적 수집. fail2ban 등 자동 차단 메커니즘 연동 필수.
      success_criteria:
      - sudo grep -c Failed /var/log/auth.log 으로 실패 횟수 카운트
      - grep Failed | tail -5 로 최근 실패 상세 추출
      - 실패 빈도 기반 무차별 대입 공격 징후 판단
      acceptable_methods:
      - sudo grep -c Failed /var/log/auth.log
      - journalctl _COMM=sshd | grep Failed 로 대체
      - lastb 명령으로 실패 로그인 조회
      - fail2ban-client status sshd 로 차단 현황 확인
      negative_signs:
      - grep 결과 count 없이 원문만 출력
      - tail 없이 전체 로그 덤프
      - SOX 접근 통제 모니터링 목적 누락
  target_vm: secu
  script: sudo grep -c 'Failed' /var/log/auth.log 2>/dev/null && echo '건 실패' && sudo grep 'Failed' /var/log/auth.log
    2>/dev/null | tail -5
  risk_level: low
  bastion_prompt: '실패한 로그인 시도를 확인하시오. SOX ITGC - 접근 통제: 비인가 접근 시도 모니터링해줘'
- order: 3
  instruction: '시스템 패키지 변경 이력을 확인하시오. SOX ITGC - 변경 관리: 모든 시스템 변경을 추적.'
  hint: apt 또는 dpkg 로그에서 설치/업데이트 이력을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템 패키지 변경 이력을 확인하시오. SOX ITGC - 변경 관리: 모든 시스템 변경을 추적해줘

    📎 참고 (CLI): tail -50 /var/log/dpkg.log 2>/dev/null | grep -E ''(install|upgrade|remove)'' | tail -15'
  answer_detail: SOX ITGC 변경 관리 도메인은 IT 시스템의 모든 변경을 문서화하고 승인 절차를 거칠 것을 요구합니다. dpkg.log는 패키지 설치, 업그레이드,
    삭제 이력을 기록하며, 이 로그가 SOX 감사의 변경 관리 증적이 됩니다.
  verify:
    type: output_contains
    expect: install
    field: stdout
    semantic:
      intent: SOX Section 404 ITGC Change Management 도메인 — /var/log/dpkg.log tail -50 후 install/upgrade/remove
        패턴 grep -E 로 패키지 변경 이력 15건 추출. 모든 시스템 변경이 CMDB 변경관리 티켓과 대조되어 승인된 변경인지 검증하는 증적.
      success_criteria:
      - tail -50 /var/log/dpkg.log 로 최근 패키지 로그 추출
      - grep -E (install|upgrade|remove) 로 변경 이벤트 필터
      - 변경 일시/패키지명 확인하여 change management 증적 확보
      acceptable_methods:
      - tail /var/log/dpkg.log | grep -E install|upgrade|remove
      - grep install /var/log/apt/history.log 로 대체
      - apt list --installed 스냅샷 비교
      - zcat /var/log/dpkg.log.*.gz 로 과거 이력 포함 조회
      negative_signs:
      - dpkg.log 읽지 않고 현재 패키지 목록만 출력
      - grep 필터 없이 원문 tail 만
      - 변경 관리 도메인 맥락 누락
  target_vm: secu
  script: tail -50 /var/log/dpkg.log 2>/dev/null | grep -E '(install|upgrade|remove)' | tail -15
  risk_level: low
  bastion_prompt: '시스템 패키지 변경 이력을 확인하시오. SOX ITGC - 변경 관리: 모든 시스템 변경을 추적해줘'
- order: 4
  instruction: '시스템 설정 파일의 최근 변경을 확인하시오. SOX ITGC - 변경 관리: 설정 변경 추적.'
  hint: find 명령으로 최근 7일 내 변경된 /etc 파일을 검색하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템 설정 파일의 최근 변경을 확인하시오. SOX ITGC - 변경 관리: 설정 변경 추적해줘

    📎 참고 (CLI): sudo find /etc -type f -mtime -7 -ls 2>/dev/null | sort -k11 | tail -15'
  answer_detail: SOX 변경 관리에서는 운영 환경의 설정 변경이 승인된 것인지 확인해야 합니다. /etc 디렉터리의 최근 변경 파일 목록은 비인가 변경을 탐지하는 증적이
    됩니다. 변경 관리 시스템(CMDB)과 대조하여 모든 변경이 승인된 것인지 확인해야 합니다.
  verify:
    type: output_contains
    expect: /etc
    field: stdout
    semantic:
      intent: SOX Section 404 ITGC Change Management 도메인 — sudo find /etc -type f -mtime -7 -ls 로 최근 7일간
        변경된 설정 파일 검색 후 sort -k11 | tail -15 로 최근 변경 15건 추출. 비인가 설정 변경 탐지 증적으로 CMDB 승인 티켓과 대조 필수.
      success_criteria:
      - find /etc -mtime -7 로 최근 7일 변경 파일 검색
      - sort -k11 로 timestamp 기준 정렬 후 tail -15
      - 파일 경로/권한/수정 시각 확인하여 config change 증적 확보
      acceptable_methods:
      - sudo find /etc -type f -mtime -7 -ls
      - stat 명령과 스크립트 조합으로 대체
      - auditd 로 /etc 모니터링 규칙 등록 확인
      - etckeeper 또는 git 기반 /etc 버전관리 도구 사용
      negative_signs:
      - find 없이 ls -la /etc 만 실행
      - mtime 조건 없이 전체 파일 나열
      - 변경 관리 감사 목적 누락
  target_vm: secu
  script: sudo find /etc -type f -mtime -7 -ls 2>/dev/null | sort -k11 | tail -15
  risk_level: low
  bastion_prompt: '시스템 설정 파일의 최근 변경을 확인하시오. SOX ITGC - 변경 관리: 설정 변경 추적해줘'
- order: 5
  instruction: '백업 작업의 실행 이력과 성공 여부를 확인하시오. SOX ITGC - 컴퓨터 운영: 데이터 백업 및 복원.'
  hint: 시스템 로그에서 백업 관련 작업을 검색하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 백업 작업의 실행 이력과 성공 여부를 확인하시오. SOX ITGC - 컴퓨터 운영: 데이터 백업 및 복원해줘

    📎 참고 (CLI): sudo grep -i ''backup\|rsync\|dump\|cron'' /var/log/syslog 2>/dev/null | tail -10; echo
    ''--- 예약 작업 ---'' && sudo crontab -l 2>/dev/null'
  answer_detail: SOX ITGC 컴퓨터 운영 도메인은 데이터의 정기적 백업과 복원 테스트를 요구합니다. 백업 작업이 예약(cron)되어 실행되고 있는지, 성공했는지, 복원
    테스트를 수행했는지 확인해야 합니다.
  verify:
    type: output_contains
    expect: cron
    field: stdout
    semantic:
      intent: SOX Section 404 ITGC Computer Operations 도메인 — /var/log/syslog 에서 backup/rsync/dump/cron
        키워드 grep -i 후 tail -10 추출. crontab -l 로 예약 작업 목록 확인. 데이터 백업/복원 실행 이력 증적 수집하여 BCP/DR 요구사항 충족 검증.
      success_criteria:
      - grep -i backup|rsync|dump|cron /var/log/syslog 로 백업 이벤트 추출
      - crontab -l 로 스케줄된 백업 잡 목록 확인
      - 백업 성공 여부와 주기성 증적 확보
      acceptable_methods:
      - grep -i backup /var/log/syslog; crontab -l
      - systemctl list-timers 로 systemd timer 조회
      - ls -la /etc/cron.d /etc/cron.daily 확인
      - 백업 도구(BorgBackup/Bacula/Restic) 로그 직접 조회
      negative_signs:
      - syslog 미조회하고 백업 개념만 설명
      - crontab 확인 누락
      - 컴퓨터 운영 도메인 맥락 누락
  target_vm: secu
  script: sudo grep -i 'backup\|rsync\|dump\|cron' /var/log/syslog 2>/dev/null | tail -10; echo '--- 예약
    작업 ---' && sudo crontab -l 2>/dev/null
  risk_level: low
  bastion_prompt: '백업 작업의 실행 이력과 성공 여부를 확인하시오. SOX ITGC - 컴퓨터 운영: 데이터 백업 및 복원해줘'
- order: 6
  instruction: '시스템 시간 동기화 상태를 확인하시오. SOX ITGC - 컴퓨터 운영: 정확한 시간 기록.'
  hint: timedatectl로 시간 동기화 상태를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템 시간 동기화 상태를 확인하시오. SOX ITGC - 컴퓨터 운영: 정확한 시간 기록해줘

    📎 참고 (CLI): timedatectl status'
  answer_detail: SOX 감사에서 로그의 시간 정확성은 매우 중요합니다. 모든 서버의 시간이 동기화되지 않으면 이벤트의 시간 순서를 정확히 파악할 수 없어 감사 증적의 신뢰성이
    떨어집니다. NTP로 모든 서버 시간을 동기화해야 합니다.
  verify:
    type: output_contains
    expect: Time zone
    field: stdout
    semantic:
      intent: SOX Section 404 ITGC Computer Operations 도메인 — timedatectl status 로 NTP 시간 동기화 상태/Time zone/System
        clock synchronized 확인. 모든 서버 시간이 NTP 로 동기화되어야 감사 로그의 시간순서 신뢰성 확보되므로 필수 ITGC 점검 항목.
      success_criteria:
      - timedatectl status 명령 실행
      - 'Time zone 및 System clock synchronized: yes 확인'
      - 'NTP service: active 상태 검증으로 로그 시간 정확성 증적'
      acceptable_methods:
      - timedatectl status
      - chronyc tracking 으로 chrony 동기화 상태 확인
      - ntpq -p 로 ntpd peer 상태 조회
      - date 명령과 여러 서버 시간 비교
      negative_signs:
      - timedatectl 실행 없이 date 만 출력
      - synchronized 상태 확인 누락
      - NTP 동기화가 SOX 감사 증적의 시간 정확성과 직결됨을 언급하지 않음
  target_vm: secu
  script: timedatectl status
  risk_level: low
  bastion_prompt: '시스템 시간 동기화 상태를 확인하시오. SOX ITGC - 컴퓨터 운영: 정확한 시간 기록해줘'
- order: 7
  instruction: 'sudo 명령 실행 로그를 확인하시오. SOX ITGC - 접근 통제: 권한 있는 계정의 활동 추적.'
  hint: /var/log/auth.log에서 sudo 사용 이력을 검색하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: sudo 명령 실행 로그를 확인하시오. SOX ITGC - 접근 통제: 권한 있는 계정의 활동 추적해줘

    📎 참고 (CLI): sudo grep ''sudo:'' /var/log/auth.log 2>/dev/null | tail -10'
  answer_detail: SOX는 특권 계정(sudo, root) 사용을 특히 엄격하게 모니터링할 것을 요구합니다. sudo 로그에는 실행 사용자, 실행 명령, 실행 시간이 기록됩니다.
    비인가된 관리 명령 실행은 즉시 조사해야 합니다.
  verify:
    type: output_contains
    expect: sudo
    field: stdout
    semantic:
      intent: 'SOX Section 404 ITGC Access Control 도메인 — sudo grep sudo: /var/log/auth.log | tail -10
        으로 특권 계정의 최근 sudo 실행 이력 10건 추출. 실행 사용자/실행 명령/실행 시간 기록 확인하여 privileged activity tracking 증적 수집.
        비인가 관리 명령은 즉시 조사 대상.'
      success_criteria:
      - 'grep sudo: /var/log/auth.log 으로 sudo 실행 이벤트 필터'
      - tail -10 으로 최근 10건 추출
