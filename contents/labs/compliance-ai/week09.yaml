lab_id: compliance-ai-week09
title: 정보보호관리체계(ISMS) 기술 점검 실습 (AI 지원)
version: ai
course: compliance-ai
week: 9
description: 정보보호관리체계(ISMS) 수립을 위한 기술적 현황 점검을 수행합니다. 자산 식별, 보안 설정 기준선(baseline) 수립,
  통제 구현 상태 확인을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- ISMS 수립을 위한 정보자산 식별 방법을 이해한다
- 보안 설정 기준선을 수립하고 현재 상태와 비교한다
- 통제 구현 상태를 자동으로 점검한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버(10.20.30.1)의 정보자산 현황을 조사하시오. 하드웨어/소프트웨어 자산 식별.
  hint: 시스템 하드웨어 정보와 설치된 주요 소프트웨어를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)의 정보자산 현황을 조사해줘

    📎 참고 (CLI): echo ''=== 하드웨어 ==='' && cat /proc/cpuinfo | grep ''model name'' |
    head -1 && free -h | head -2 && df -h / && echo ''=== 소프트웨어 ==='' && dpkg -l |
    grep -E ''(openssh|apache|mysql|nginx|suricata|auditd|nftables)'' | head -10'
  answer_detail: ISMS 수립의 첫 단계는 보호해야 할 정보자산을 식별하는 것입니다. 정보자산에는 하드웨어(서버, 네트워크 장비),
    소프트웨어(OS, 미들웨어, 애플리케이션), 데이터(DB, 파일), 서비스 등이 포함됩니다.
  verify:
    type: output_contains
    expect: 하드웨어
    field: stdout
  target_vm: secu
  script: echo '=== 하드웨어 ===' && cat /proc/cpuinfo | grep 'model name' | head -1 &&
    free -h | head -2 && df -h / && echo '=== 소프트웨어 ===' && dpkg -l | grep -E '(openssh|apache|mysql|nginx|suricata|auditd|nftables)'
    | head -10
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)의 정보자산 현황을 조사해줘
- order: 2
  instruction: 네트워크 자산을 식별하시오. 현재 서버가 통신하는 네트워크 대역과 활성 연결을 확인합니다.
  hint: ip addr과 ss 명령으로 네트워크 정보를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 네트워크 자산을 식별해줘

    📎 참고 (CLI): ip addr show | grep ''inet '' && echo ''--- 활성 연결 ---'' && ss -tn
    | grep ESTAB | head -10 && echo ''--- 라우팅 ---'' && ip route'
  answer_detail: 네트워크 자산 식별은 서버의 IP 주소, 서브넷, 게이트웨이, 통신 대상을 파악하는 것입니다. ISMS에서는 네트워크
    토폴로지를 문서화하고, 각 네트워크 세그먼트의 보안 등급을 정의해야 합니다.
  verify:
    type: output_contains
    expect: inet
    field: stdout
  target_vm: secu
  script: ip addr show | grep 'inet ' && echo '--- 활성 연결 ---' && ss -tn | grep ESTAB
    | head -10 && echo '--- 라우팅 ---' && ip route
  risk_level: low
  bastion_prompt: 네트워크 자산을 식별해줘
- order: 3
  instruction: 서비스 자산을 식별하시오. 현재 실행 중인 서비스 목록과 포트를 확인합니다.
  hint: systemctl과 ss로 활성 서비스와 열린 포트를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 서비스 자산을 식별해줘

    📎 참고 (CLI): systemctl list-units --type=service --state=running --no-pager | head
    -20 && echo ''--- 열린 포트 ---'' && sudo ss -tlnp | column -t'
  answer_detail: 서비스 자산 식별은 시스템에서 제공하는 모든 서비스를 파악하는 것입니다. 각 서비스의 용도, 관리자, 중요도를 문서화하고,
    불필요한 서비스는 비활성화합니다. 이는 공격 표면을 줄이는 기본 조치입니다.
  verify:
    type: output_contains
    expect: 열린 포트
    field: stdout
  target_vm: secu
  script: systemctl list-units --type=service --state=running --no-pager | head -20
    && echo '--- 열린 포트 ---' && sudo ss -tlnp | column -t
  risk_level: low
  bastion_prompt: 서비스 자산을 식별해줘
- order: 4
  instruction: 보안 설정 기준선(baseline)을 위한 현재 설정을 수집하시오. 패스워드 정책, SSH 설정, 방화벽 정책을 한 번에
    수집합니다.
  hint: 주요 보안 설정 파일의 내용을 수집하는 스크립트를 작성하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 보안 설정 기준선(baseline)을 위한 현재 설정을 수집해줘

    📎 참고 (CLI): echo ''=== 보안 기준선 수집 ==='' && echo ''[패스워드]'' && grep -E ''^(PASS_|minlen|credit)''
    /etc/login.defs /etc/security/pwquality.conf 2>/dev/null | grep -v ''^#'' && echo
    ''[SSH]'' && grep -E ''^(PermitRoot|MaxAuth|PasswordAuth|ClientAlive)'' /etc/ssh/sshd_config
    2>/dev/null && echo ''[방화벽]'' && sudo nft list ruleset 2>/dev/null | grep -c ''rule'''
  answer_detail: 보안 설정 기준선(baseline)은 조직이 정한 최소 보안 설정 기준입니다. 현재 시스템의 설정을 수집하여 기준선과
    비교하고, 미달 항목을 식별하여 조치합니다. CIS Benchmark가 대표적인 기준선 프레임워크입니다.
  verify:
    type: output_contains
    expect: 보안 기준선 수집
    field: stdout
  target_vm: secu
  script: echo '=== 보안 기준선 수집 ===' && echo '[패스워드]' && grep -E '^(PASS_|minlen|credit)'
    /etc/login.defs /etc/security/pwquality.conf 2>/dev/null | grep -v '^#' && echo
    '[SSH]' && grep -E '^(PermitRoot|MaxAuth|PasswordAuth|ClientAlive)' /etc/ssh/sshd_config
    2>/dev/null && echo '[방화벽]' && sudo nft list ruleset 2>/dev/null | grep -c 'rule'
  risk_level: low
  bastion_prompt: 보안 설정 기준선(baseline)을 위한 현재 설정을 수집해줘
- order: 5
  instruction: WEB 서버(10.20.30.80)의 자산과 보안 설정을 원격으로 수집하시오.
  hint: SSH로 WEB 서버에 접속하여 주요 정보를 수집하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)의 자산과 보안 설정을 원격으로 수집해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''echo "=== WEB 서버 자산 ==="; echo "[OS]"; cat /etc/os-release
    | head -3; echo "[서비스]"; systemctl is-active apache2 docker 2>/dev/null; echo
    "[포트]"; sudo ss -tlnp 2>/dev/null | head -10'''
  answer_detail: ISMS에서는 모든 정보자산에 대해 보안 현황을 파악해야 합니다. 원격 서버의 자산 정보를 SSH로 수집하면 중앙에서
    전체 시스템의 보안 현황을 관리할 수 있습니다.
  verify:
    type: output_contains
    expect: WEB 서버 자산
    field: stdout
  target_vm: secu
  script: ssh ccc@10.20.30.80 'echo "=== WEB 서버 자산 ==="; echo "[OS]"; cat /etc/os-release
    | head -3; echo "[서비스]"; systemctl is-active apache2 docker 2>/dev/null; echo
    "[포트]"; sudo ss -tlnp 2>/dev/null | head -10'
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)의 자산과 보안 설정을 원격으로 수집해줘
- order: 6
  instruction: SIEM 서버(10.20.30.100)의 Wazuh 연동 상태를 확인하시오. ISMS의 로그 중앙 관리 요구사항.
  hint: Wazuh 에이전트 상태를 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: SIEM 서버(10.20.30.100)의 Wazuh 연동 상태를 확인하시오. ISMS의 로그 중앙 관리 요구사항해줘

    📎 참고 (CLI): sudo systemctl status wazuh-agent --no-pager 2>/dev/null | head -5
    || echo ''wazuh-agent 미설치'' && sudo cat /var/ossec/etc/ossec.conf 2>/dev/null
    | grep -A3 ''<server>'' | head -5 || echo ''ossec.conf 없음'''
  answer_detail: ISMS는 보안 로그의 중앙 수집과 모니터링을 요구합니다. Wazuh는 오픈소스 SIEM/XDR로, 에이전트가 각 서버에서
    로그를 수집하여 매니저(10.20.30.100)로 전송합니다. 에이전트가 active 상태이고 매니저와 연결되어야 합니다.
  verify:
    type: output_contains
    expect: wazuh
    field: stdout
  target_vm: secu
  script: sudo systemctl status wazuh-agent --no-pager 2>/dev/null | head -5 || echo
    'wazuh-agent 미설치' && sudo cat /var/ossec/etc/ossec.conf 2>/dev/null | grep -A3
    '<server>' | head -5 || echo 'ossec.conf 없음'
  risk_level: low
  bastion_prompt: SIEM 서버(10.20.30.100)의 Wazuh 연동 상태를 확인하시오. ISMS의 로그 중앙 관리 요구사항해줘
- order: 7
  instruction: 정보자산 목록과 보안 등급을 정리하는 자산 관리 파일을 생성하시오.
  hint: CSV 형식으로 자산명, 유형, IP, 보안 등급, 관리자를 정리하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 정보자산 목록과 보안 등급을 정리하는 자산 관리 파일을 생성해줘

    📎 참고 (CLI): cat << ''EOF'' > /tmp/asset_inventory.csv

    자산명,유형,IP,보안등급,운영서비스,관리자

    SECU서버,서버,10.20.30.1,상,방화벽/IDS/감사,보안팀

    WEB서버,서버,10.20.30.80,상,웹서비스/Docker,개발팀

    SIEM서버,서버,10.20.30.100,최상,Wazuh-SIEM,보안팀

    EOF

    cat /tmp/asset_inventory.csv'
  answer_detail: ISMS에서 자산 목록은 관리체계의 기본 문서입니다. 각 자산의 보안 등급은 기밀성, 무결성, 가용성(CIA) 평가를
    통해 결정하며, 등급에 따라 적용할 보호조치 수준이 달라집니다.
  verify:
    type: output_contains
    expect: SECU서버
    field: stdout
  target_vm: secu
  script: 'cat << ''EOF'' > /tmp/asset_inventory.csv

    자산명,유형,IP,보안등급,운영서비스,관리자

    SECU서버,서버,10.20.30.1,상,방화벽/IDS/감사,보안팀

    WEB서버,서버,10.20.30.80,상,웹서비스/Docker,개발팀

    SIEM서버,서버,10.20.30.100,최상,Wazuh-SIEM,보안팀

    EOF

    cat /tmp/asset_inventory.csv'
  risk_level: low
  bastion_prompt: 정보자산 목록과 보안 등급을 정리하는 자산 관리 파일을 생성해줘
- order: 8
  instruction: 전체 인프라의 ISMS 기술적 현황 점검 스크립트를 작성하고 실행하시오.
  hint: 3대 서버의 핵심 보안 설정을 종합 수집하세요.
  category: audit
  points: 14
  answer: '🤖 프롬프트: 전체 인프라의 ISMS 기술적 현황 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/isms_baseline.sh

    #!/bin/bash

    echo ''=== ISMS 기술적 현황 종합 보고 ===''

    echo ''''

    echo ''[SECU 서버 - 10.20.30.1]''

    echo "방화벽: $(sudo nft list ruleset 2>/dev/null | grep -c ''rule'') 규칙"

    echo "IDS: $(sudo systemctl is-active suricata 2>/dev/null)"

    echo "감사: $(sudo auditctl -l 2>/dev/null | wc -l) 규칙"

    echo ''''

    echo ''[WEB 서버 - 10.20.30.80]''

    ssh ccc@10.20.30.80 ''echo "Apache: $(systemctl is-active apache2 2>/dev/null)";
    echo "Docker: $(systemctl is-active docker 2>/dev/null)"; echo "컨테이너: $(docker
    ps -q 2>/dev/null | wc -l)개"'' 2>/dev/null

    echo ''''

    echo ''[자산 요약]''

    echo "총 서버: 3대 (SECU, WEB, SIEM)"

    echo "총 서비스: 방화벽, IDS, 감사, 웹서버, 컨테이너, SIEM"

    echo ''''

    echo ''=== ISMS 현황 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/isms_baseline.sh && bash /tmp/isms_baseline.sh'
  answer_detail: ISMS 수립은 정보자산 식별 -> 위험 평가 -> 보호대책 선정 -> 구현 -> 모니터링의 PDCA(Plan-Do-Check-Act)
    사이클을 따릅니다. 기술적 현황 점검은 Check 단계에 해당하며, 정기적으로 수행하여 보호대책의 효과성을 평가합니다.
  verify:
    type: output_contains
    expect: ISMS 현황 점검 완료
    field: stdout
  target_vm: secu
  script: 'cat << ''SCRIPT'' > /tmp/isms_baseline.sh

    #!/bin/bash

    echo ''=== ISMS 기술적 현황 종합 보고 ===''

    echo ''''

    echo ''[SECU 서버 - 10.20.30.1]''

    echo "방화벽: $(sudo nft list ruleset 2>/dev/null | grep -c ''rule'') 규칙"

    echo "IDS: $(sudo systemctl is-active suricata 2>/dev/null)"

    echo "감사: $(sudo auditctl -l 2>/dev/null | wc -l) 규칙"

    echo ''''

    echo ''[WEB 서버 - 10.20.30.80]''

    ssh ccc@10.20.30.80 ''echo "Apache: $(systemctl is-active apache2 2>/dev/null)";
    echo "Docker: $(systemctl is-active docker 2>/dev/null)"; echo "컨테이너: $(docker
    ps -q 2>/dev/null | wc -l)개"'' 2>/dev/null

    echo ''''

    echo ''[자산 요약]''

    echo "총 서버: 3대 (SECU, WEB, SIEM)"

    echo "총 서비스: 방화벽, IDS, 감사, 웹서버, 컨테이너, SIEM"

    echo ''''

    echo ''=== ISMS 현황 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/isms_baseline.sh && bash /tmp/isms_baseline.sh'
  risk_level: low
  bastion_prompt: 전체 인프라의 ISMS 기술적 현황 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘
