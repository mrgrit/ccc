    \ cat << 'SCRIPT' > /tmp/compliance_final.sh\n#!/bin/bash\necho '===================================================='\n\
    echo '     컴플라이언스 종합평가 보고서'\necho '===================================================='\necho \"\
    평가일: $(date +%Y-%m-%d)\"\necho \"평가자: $(whoami)@$(hostname)\"\necho ''\nPASS=0; FAIL=0\ncheck() {\n\
    \  if [ \"$2\" = \"PASS\" ]; then\n    echo \"  [PASS] $1\"; PASS=$((PASS+1))\n  else\n    echo \"\
    \  [FAIL] $1\"; FAIL=$((FAIL+1))\n  fi\n}\necho '[개인정보보호법/GDPR - 데이터 보호]'\nMINLEN=$(grep 'minlen'\
    \ /etc/security/pwquality.conf 2>/dev/null | grep -v '^#' | awk -F= '{print $2}' | tr -d ' ')\ncheck\
    \ \"패스워드 최소길이 >= 8 (현재: ${MINLEN:-미설정})\" \"$([ \"${MINLEN:-0}\" -ge 8 ] && echo PASS || echo FAIL)\"\
    \nMAXDAYS=$(grep '^PASS_MAX_DAYS' /etc/login.defs | awk '{print $2}')\ncheck \"패스워드 갱신주기 <= 90일 (현재:\
    \ ${MAXDAYS}일)\" \"$([ \"$MAXDAYS\" -le 90 ] && echo PASS || echo FAIL)\"\necho '[정보통신망법 - 네트워크 보안]'\n\
    FW=$(sudo nft list ruleset 2>/dev/null | grep -c 'rule')\ncheck \"방화벽 규칙 존재 (${FW}개)\" \"$([ \"$FW\"\
    \ -gt 0 ] && echo PASS || echo FAIL)\"\nIDS=$(sudo systemctl is-active suricata 2>/dev/null)\ncheck\
    \ \"IDS 활성 ($IDS)\" \"$([ \"$IDS\" = 'active' ] && echo PASS || echo FAIL)\"\necho '[ISMS-P/ISO27001\
    \ - 감사]'\nAUDIT=$(sudo systemctl is-active auditd 2>/dev/null)\ncheck \"auditd 활성 ($AUDIT)\" \"$([\
    \ \"$AUDIT\" = 'active' ] && echo PASS || echo FAIL)\"\nRULES=$(sudo auditctl -l 2>/dev/null | wc\
    \ -l)\ncheck \"감사 규칙 존재 (${RULES}개)\" \"$([ \"$RULES\" -gt 0 ] && echo PASS || echo FAIL)\"\necho\
    \ '[PCI-DSS - 접근통제]'\nROOT=$(grep '^PermitRootLogin no' /etc/ssh/sshd_config 2>/dev/null | wc -l)\n\
