    SCORE=$((PASS*100/TOTAL))\necho '===================================================='\necho \"  결과:\
    \ ${PASS}/${TOTAL} 적합 (${SCORE}%)\" \necho '===================================================='\n\
    SCRIPT\nchmod +x /tmp/compliance_final.sh && bash /tmp/compliance_final.sh"
