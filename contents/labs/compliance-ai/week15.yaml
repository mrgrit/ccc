lab_id: compliance-ai-week15
title: 컴플라이언스 종합평가 실습 (AI 지원)
version: ai
course: compliance-ai
week: 15
description: 전체 컴플라이언스 프레임워크를 종합하여 시스템 보안 준수 상태를 평가합니다. 개인정보보호법, 정보통신망법, ISMS-P, ISO27001, PCI-DSS의 핵심
  요구사항을 한 번에 점검하는 종합 감사를 수행합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 다중 컴플라이언스 프레임워크의 요구사항을 통합 점검한다
- 전체 인프라(SECU, WEB, SIEM)의 보안 준수 상태를 평가한다
- 종합 컴플라이언스 보고서를 생성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})의 사용자 계정 및 인증 통제를 종합 점검하시오. (ISMS-P 2.5, ISO27001 A.8.5, PCI-DSS Req.8)
  hint: 계정, 패스워드 정책, SSH 인증을 한 번에 점검하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)의 사용자 계정 및 인증 통제를 종합 점검하시오. (ISMS-P 2.5, ISO27001 A.8.5, PCI-DSS
    Req.8)해줘

    📎 참고 (CLI): echo ''=== [1] 사용자 계정/인증 통제 ==='' && echo ''[계정 현황]'' && awk -F: ''$7 !~ /nologin|false/
    {print $1}'' /etc/passwd && echo ''[패스워드 정책]'' && grep -E ''(minlen|credit)'' /etc/security/pwquality.conf
    2>/dev/null | grep -v ''^#'' && grep ''^PASS_MAX_DAYS'' /etc/login.defs && echo ''[SSH 인증]'' && grep
    -E ''^(PermitRootLogin|MaxAuthTries|PasswordAuth)'' /etc/ssh/sshd_config 2>/dev/null'
  answer_detail: 사용자 계정 및 인증 통제는 모든 컴플라이언스 프레임워크의 공통 요구사항입니다. ISMS-P 2.5(인증 및 권한관리), ISO27001 A.8.5(보안
    인증), PCI-DSS Req.8(사용자 식별 및 인증)이 이 영역에 해당합니다.
  verify:
    type: output_contains
    expect: 사용자 계정/인증 통제
    field: stdout
    semantic:
      intent: 종합 점검 Domain 1 사용자 계정/인증 통제 (ISMS-P 2.5 + ISO 27001 A.8.5 + PCI-DSS Req.8 교차 매핑). awk /etc/passwd
        활성 계정 + pwquality.conf minlen/credit + login.defs PASS_MAX_DAYS + sshd_config PermitRootLogin/MaxAuthTries/PasswordAuth
        네 카테고리 통합 수집. UCF(Unified Compliance Framework) 접근.
      success_criteria:
      - awk 로 활성 계정 목록 추출
      - 패스워드 정책 minlen/credit/PASS_MAX_DAYS 3개 값 grep
      - SSH 인증 PermitRootLogin/MaxAuthTries/PasswordAuth 3개 값 grep
      acceptable_methods:
      - awk + grep -E 통합 수집
      - OpenSCAP + NIST 800-53 control families 로 매핑 자동화
      - Chef InSpec with CIS profile 공통 통제 평가
      - UCF(Unified Compliance Framework) 도구로 프레임워크 매핑
      negative_signs:
      - 계정/패스워드/SSH 3개 섹션 중 일부 누락
      - 프레임워크 매핑(ISMS/ISO/PCI) 언급 없음
      - 통합 점검 UCF 개념 맥락 누락
  target_vm: secu
  script: 'echo ''=== [1] 사용자 계정/인증 통제 ==='' && echo ''[계정 현황]'' && awk -F: ''$7 !~ /nologin|false/ {print
    $1}'' /etc/passwd && echo ''[패스워드 정책]'' && grep -E ''(minlen|credit)'' /etc/security/pwquality.conf
    2>/dev/null | grep -v ''^#'' && grep ''^PASS_MAX_DAYS'' /etc/login.defs && echo ''[SSH 인증]'' && grep
    -E ''^(PermitRootLogin|MaxAuthTries|PasswordAuth)'' /etc/ssh/sshd_config 2>/dev/null'
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)의 사용자 계정 및 인증 통제를 종합 점검하시오. (ISMS-P 2.5, ISO27001 A.8.5, PCI-DSS
    Req.8)해줘
- order: 2
  instruction: 접근 통제 및 방화벽 설정을 종합 점검하시오. (ISMS-P 2.6, ISO27001 A.8.20, PCI-DSS Req.1)
  hint: 방화벽 규칙, 열린 포트, 네트워크 설정을 한 번에 점검하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 접근 통제 및 방화벽 설정을 종합 점검하시오. (ISMS-P 2.6, ISO27001 A.8.20, PCI-DSS Req.1)해줘

    📎 참고 (CLI): echo ''=== [2] 접근 통제/방화벽 ==='' && echo ''[방화벽 규칙]'' && sudo nft list ruleset 2>/dev/null
    | grep -E ''(policy|accept|drop)'' | head -10 && echo ''[열린 포트]'' && sudo ss -tlnp | grep LISTEN |
    head -10 && echo ''[커널 보안]'' && sysctl net.ipv4.ip_forward net.ipv4.conf.all.accept_redirects 2>/dev/null'
  answer_detail: 네트워크 접근 통제는 방화벽 정책(기본 차단), 불필요한 서비스 비활성화, 커널 네트워크 보안 파라미터 설정으로 구현합니다. PCI-DSS Req.1은
    가장 구체적인 방화벽 요구사항을 정의합니다.
  verify:
    type: output_contains
    expect: 접근 통제/방화벽
    field: stdout
    semantic:
      intent: 종합 점검 Domain 2 접근 통제/방화벽 (ISMS-P 2.6 + ISO 27001 A.8.20 + PCI-DSS Req.1 교차 매핑). sudo nft
        list ruleset | grep -E (policy|accept|drop) | head -10 방화벽 + sudo ss -tlnp LISTEN | head -10 열린
        포트 + sysctl net.ipv4.ip_forward/accept_redirects 커널 보안 파라미터 통합 점검. PCI Req.1 NSC (Network Security
        Controls) 가장 구체적 요건.
      success_criteria:
      - nft list ruleset 에서 policy/accept/drop 규칙 10건 추출
      - ss -tlnp LISTEN 상위 10건 포트 바인딩 확인
      - sysctl net.ipv4.ip_forward 와 accept_redirects 커널 네트워크 보안 값 조회
      acceptable_methods:
      - nft + ss + sysctl 3종 조합 점검
      - iptables-save + netstat (레거시 대체)
      - nmap -sS localhost 외부 관점 검증
      - Firewalld/UFW runtime 정책 조회
      negative_signs:
      - 방화벽/포트/커널 3개 섹션 중 일부 누락
      - 정책(default drop) 확인 누락
      - PCI Req.1 NSC 맥락 없이 점검만
  target_vm: secu
  script: echo '=== [2] 접근 통제/방화벽 ===' && echo '[방화벽 규칙]' && sudo nft list ruleset 2>/dev/null | grep
    -E '(policy|accept|drop)' | head -10 && echo '[열린 포트]' && sudo ss -tlnp | grep LISTEN | head -10 &&
    echo '[커널 보안]' && sysctl net.ipv4.ip_forward net.ipv4.conf.all.accept_redirects 2>/dev/null
  risk_level: low
  bastion_prompt: 접근 통제 및 방화벽 설정을 종합 점검하시오. (ISMS-P 2.6, ISO27001 A.8.20, PCI-DSS Req.1)해줘
- order: 3
  instruction: 암호화 통제를 종합 점검하시오. (개인정보보호법 제29조, GDPR Art.32, ISO27001 A.8.24)
  hint: SSH 암호 알고리즘, TLS 설정을 점검하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 암호화 통제를 종합 점검하시오. (개인정보보호법 제29조, GDPR Art.32, ISO27001 A.8.24)해줘

    📎 참고 (CLI): echo ''=== [3] 암호화 통제 ==='' && echo ''[SSH 암호]'' && grep -E ''(Ciphers|MACs|KexAlgorithms)''
    /etc/ssh/sshd_config 2>/dev/null | grep -v ''^#'' || echo ''SSH: 기본 암호 스위트 사용'' && echo ''[WEB TLS]''
    && echo | openssl s_client -connect 10.20.30.80:443 2>/dev/null | grep -E ''(Protocol|Cipher)'' |
    head -3 || echo ''HTTPS 미설정'''
  answer_detail: 암호화 통제는 저장 데이터와 전송 데이터 모두에 적용되어야 합니다. 개인정보보호법은 개인정보의 암호화를, GDPR Art.32(1)(a)는 가명처리 및
    암호화를, ISO27001 A.8.24는 적절한 암호 사용 정책을 요구합니다.
  verify:
    type: output_contains
    expect: 암호화 통제
    field: stdout
    semantic:
      intent: 종합 점검 Domain 3 암호화 (개인정보보호법 제29조 + GDPR Art.32(1)(a) 가명/암호화 + ISO 27001 A.8.24 교차 매핑). sshd_config
        의 Ciphers/MACs/KexAlgorithms grep 으로 SSH 암호 스위트 + openssl s_client -connect 10.20.30.80:443 으로
        WEB TLS Protocol/Cipher 3줄 확인. 저장/전송 데이터 보호.
      success_criteria:
      - grep -E (Ciphers|MACs|KexAlgorithms) /etc/ssh/sshd_config 로 SSH 암호 설정
      - openssl s_client 로 HTTPS TLS handshake 정보 확보
      - Protocol/Cipher 필드 head -3 으로 TLS 버전과 사이퍼 확인
      acceptable_methods:
      - grep + openssl s_client 조합
      - nmap --script ssl-enum-ciphers 로 암호 스위트 열거
      - testssl.sh 자동화 도구로 TLS 평가
      - ssh-audit 으로 SSH 암호 평가 자동화
      negative_signs:
      - SSH 또는 TLS 한쪽만 점검
      - openssl 미실행으로 TLS 버전 확인 누락
      - 개인정보보호법/GDPR/ISO 매핑 맥락 없음
  target_vm: secu
  script: 'echo ''=== [3] 암호화 통제 ==='' && echo ''[SSH 암호]'' && grep -E ''(Ciphers|MACs|KexAlgorithms)''
    /etc/ssh/sshd_config 2>/dev/null | grep -v ''^#'' || echo ''SSH: 기본 암호 스위트 사용'' && echo ''[WEB TLS]''
    && echo | openssl s_client -connect 10.20.30.80:443 2>/dev/null | grep -E ''(Protocol|Cipher)'' |
    head -3 || echo ''HTTPS 미설정'''
  risk_level: low
  bastion_prompt: 암호화 통제를 종합 점검하시오. (개인정보보호법 제29조, GDPR Art.32, ISO27001 A.8.24)해줘
- order: 4
  instruction: 감사 및 로그 관리를 종합 점검하시오. (개인정보보호법 안전조치 제8조, ISMS-P 2.9.5, PCI-DSS Req.10)
  hint: auditd, rsyslog, 로그 보관 설정을 점검하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 감사 및 로그 관리를 종합 점검하시오. (개인정보보호법 안전조치 제8조, ISMS-P 2.9.5, PCI-DSS Req.10)해줘

    📎 참고 (CLI): echo ''=== [4] 감사/로그 관리 ==='' && echo ''[auditd]'' && sudo systemctl is-active auditd
    2>/dev/null && echo "규칙 수: $(sudo auditctl -l 2>/dev/null | wc -l)" && echo ''[로그 보관]'' && cat /etc/logrotate.conf
    2>/dev/null | grep ''rotate'' | head -3 && echo ''[원격 전송]'' && grep -r ''@@'' /etc/rsyslog.conf /etc/rsyslog.d/
    2>/dev/null | grep -v ''^#'' | head -3 && echo ''[로그 권한]'' && stat -c ''%a %n'' /var/log/auth.log
    /var/log/syslog 2>/dev/null'
  answer_detail: 로그 관리는 컴플라이언스의 핵심입니다. 개인정보보호법은 접속기록 1년(5만명 이상 2년) 보관, ISMS-P 2.9.5는 접속기록의 기록·보관·점검, PCI-DSS
    Req.10은 시스템 접근의 로깅·모니터링을 요구합니다.
  verify:
    type: output_contains
    expect: 감사/로그 관리
    field: stdout
    semantic:
      intent: 종합 점검 Domain 4 감사/로그 관리 (개인정보보호법 안전조치기준 제8조 + ISMS-P 2.9.5 + PCI-DSS Req.10 교차 매핑). auditd
        is-active + auditctl -l | wc -l 규칙 수 + logrotate.conf rotate + rsyslog @@ 원격 전송 + stat -c %a 로그
        파일 권한(640 이하) 4개 섹션 점검. 접속기록 1년(개인정보 5만명 이상 2년) 보관 법정 요구.
      success_criteria:
      - systemctl is-active auditd 로 감사 데몬 상태 + auditctl -l 규칙 수 확인
      - logrotate.conf 의 rotate 보관 세대 확인
      - rsyslog.conf @@ 로 원격 SIEM 전송 설정 확인 + 로그 파일 권한 stat
      acceptable_methods:
      - systemctl + auditctl + cat logrotate + grep rsyslog + stat 5종 조합
      - journalctl + FwdToSyslog 대체
      - Wazuh/Elastic 중앙 수집 정상 여부 확인
      - AWS CloudTrail/Azure Activity Log 매핑
      negative_signs:
      - auditd/logrotate/rsyslog/권한 4개 중 일부 누락
      - 원격 전송 설정 확인 누락
      - 법정 보관 기간(1년/2년) 맥락 없음
  target_vm: secu
  script: 'echo ''=== [4] 감사/로그 관리 ==='' && echo ''[auditd]'' && sudo systemctl is-active auditd 2>/dev/null
    && echo "규칙 수: $(sudo auditctl -l 2>/dev/null | wc -l)" && echo ''[로그 보관]'' && cat /etc/logrotate.conf
    2>/dev/null | grep ''rotate'' | head -3 && echo ''[원격 전송]'' && grep -r ''@@'' /etc/rsyslog.conf /etc/rsyslog.d/
    2>/dev/null | grep -v ''^#'' | head -3 && echo ''[로그 권한]'' && stat -c ''%a %n'' /var/log/auth.log
    /var/log/syslog 2>/dev/null'
  risk_level: low
  bastion_prompt: 감사 및 로그 관리를 종합 점검하시오. (개인정보보호법 안전조치 제8조, ISMS-P 2.9.5, PCI-DSS Req.10)해줘
- order: 5
  instruction: 침입탐지 및 악성코드 방지를 종합 점검하시오. (정보통신망법 시행령 제15조, PCI-DSS Req.5, Req.11)
  hint: Suricata IDS, 안티바이러스, 취약점 관리를 점검하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 침입탐지 및 악성코드 방지를 종합 점검하시오. (정보통신망법 시행령 제15조, PCI-DSS Req.5, Req.11)해줘

    📎 참고 (CLI): echo ''=== [5] 침입탐지/악성코드 방지 ==='' && echo ''[IDS]'' && sudo systemctl is-active suricata
    2>/dev/null && echo ''[안티바이러스]'' && which clamscan 2>/dev/null && echo ''설치됨'' || echo ''미설치'' &&
    echo ''[취약점 관리]'' && echo "미패치 패키지: $(apt list --upgradable 2>/dev/null | grep -c ''/'')건"'
  answer_detail: 침입탐지와 악성코드 방지는 정보통신망법(IDS/IPS 운영)과 PCI-DSS Req.5(악성코드 방지), Req.11(보안 테스트)의 요구사항입니다. 예방(방화벽),
    탐지(IDS), 대응(알림/차단)의 계층적 방어를 구축해야 합니다.
  verify:
    type: output_contains
    expect: 침입탐지/악성코드 방지
    field: stdout
    semantic:
      intent: 종합 점검 Domain 5 침입탐지/악성코드 (정보통신망법 시행령 제15조 + PCI-DSS Req.5 악성코드 방지 + Req.11 보안 테스트 교차 매핑).
        systemctl is-active suricata IDS + which clamscan AV + apt list --upgradable | grep -c / 미패치 패키지
        수. 예방(방화벽)-탐지(IDS)-대응(알림) 계층 방어.
      success_criteria:
      - systemctl is-active suricata 로 IDS 엔진 상태 확인
      - which clamscan 로 안티바이러스 설치 여부 판단
      - apt list --upgradable 로 미패치 패키지 수 산출하여 취약점 관리 지표
      acceptable_methods:
      - systemctl + which + apt list 3종 조합
      - Snort 또는 Zeek 으로 IDS 대체
      - chkrootkit/rkhunter 로 추가 악성코드 점검
      - OpenVAS/Nessus 로 취약점 스캔 대체
      negative_signs:
      - IDS/AV/취약점 3개 중 일부만 점검
      - suricata active 여부 미확인
      - 계층 방어(예방-탐지-대응) 맥락 없음
  target_vm: secu
  script: 'echo ''=== [5] 침입탐지/악성코드 방지 ==='' && echo ''[IDS]'' && sudo systemctl is-active suricata 2>/dev/null
    && echo ''[안티바이러스]'' && which clamscan 2>/dev/null && echo ''설치됨'' || echo ''미설치'' && echo ''[취약점
    관리]'' && echo "미패치 패키지: $(apt list --upgradable 2>/dev/null | grep -c ''/'')건"'
