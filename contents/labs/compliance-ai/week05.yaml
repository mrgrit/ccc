    #!/bin/bash

    echo ''=== GDPR Article 32 기술적 보호조치 점검 ===''

    echo ''''

    echo ''[Art.32(1)(a) 암호화]''

    grep ''Ciphers'' /etc/ssh/sshd_config 2>/dev/null | grep -v ''^#'' | head -1 || echo ''SSH 암호 설정 기본값
    사용''

    echo ''[Art.32(1)(b) 서비스 가용성]''

    sudo systemctl is-active fail2ban 2>/dev/null || echo ''fail2ban 비활성''

    sudo systemctl is-active auditd 2>/dev/null || echo ''auditd 비활성''

    echo ''[Art.32(1)(c) 복원 능력]''

    sudo crontab -l 2>/dev/null | grep -c ''backup'' || echo ''백업 cron 없음''

    echo ''[Art.32(1)(d) 테스트 및 평가]''

    echo "감사 규칙 수: $(sudo auditctl -l 2>/dev/null | wc -l)"

    echo ''''

    echo ''=== GDPR 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/gdpr_audit.sh && bash /tmp/gdpr_audit.sh'
