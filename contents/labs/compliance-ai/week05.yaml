lab_id: compliance-ai-week05
title: GDPR 기술적 보호조치 점검 실습 (AI 지원)
version: ai
course: compliance-ai
week: 5
description: EU 일반 데이터 보호 규정(GDPR) Article 32의 기술적·조직적 보호조치를 시스템에서 점검합니다. 데이터 암호화, 가명화, 접근 통제, 로그 관리 등을
  확인합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- GDPR Article 32의 기술적 보호조치 요구사항을 이해한다
- 데이터 암호화와 전송 보안 설정을 점검한다
- 데이터 접근 로그와 보관 설정의 적정성을 평가한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})에서 디스크 암호화 상태를 확인하시오. GDPR Art.32 '저장 데이터의 암호화'.
  hint: lsblk 명령으로 파티션 정보와 암호화 여부를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)에서 디스크 암호화 상태를 확인하시오. GDPR Art.32 ''저장 데이터의 암호화''해줘

    📎 참고 (CLI): lsblk -f && sudo dmsetup ls --target crypt 2>/dev/null; echo ''LUKS 확인:'' && sudo cryptsetup
    status $(lsblk -rno NAME | head -1) 2>/dev/null || echo ''디스크 암호화 미적용'''
  answer_detail: GDPR Article 32(1)(a)는 개인 데이터의 가명처리 및 암호화를 요구합니다. LUKS(Linux Unified Key Setup)는 리눅스
    디스크 암호화 표준으로, 물리적 도난이나 폐기 시 데이터 유출을 방지합니다.
  verify:
    type: output_contains
    expect: LUKS
    field: stdout
    semantic:
      intent: GDPR Art.32(1)(a) encryption at rest — lsblk -f + dmsetup ls --target crypt + cryptsetup
        status. LUKS(Linux Unified Key Setup) 는 dm-crypt 의 표준 헤더 포맷. fs 컬럼에 crypto_LUKS 확인. 미암호화 파티션에
        PII 저장 시 물리 도난/폐기 시 breach = GDPR 벌금 4%. AES-XTS-512 + argon2id KDF. LUKS2 권장. Recital 83, Art.83
        벌금
      success_criteria:
      - lsblk -f + cryptsetup 실행
      - LUKS 또는 crypt 키워드
      - 암호화 상태 출력
      acceptable_methods:
      - lsblk -f + cryptsetup status
      - blkid | grep LUKS
      - dmsetup ls --target crypt
      - fscrypt(파일 레벨)
      - eCryptfs 홈 디렉토리
      negative_signs:
      - 미암호화 정상 판정
      - 물리 도난 시나리오 미인지
      - GDPR 벌금 연결 없음
  target_vm: secu
  script: lsblk -f && sudo dmsetup ls --target crypt 2>/dev/null; echo 'LUKS 확인:' && sudo cryptsetup status
    $(lsblk -rno NAME | head -1) 2>/dev/null || echo '디스크 암호화 미적용'
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)에서 디스크 암호화 상태를 확인하시오. GDPR Art.32 '저장 데이터의 암호화'해줘
- order: 2
  instruction: WEB 서버({{WEB_IP}})의 SSL/TLS 인증서 정보와 만료일을 확인하시오. GDPR은 전송 중인 데이터의 암호화를 요구합니다.
  hint: openssl s_client로 서버에 접속하여 인증서를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)의 SSL/TLS 인증서 정보와 만료일을 확인하시오. GDPR은 전송 중인 데이터의 암호화를 요구해줘

    📎 참고 (CLI): echo | openssl s_client -connect 10.20.30.80:443 -servername 10.20.30.80 2>/dev/null |
    openssl x509 -noout -dates -subject 2>/dev/null || echo ''HTTPS 미설정 - TLS 인증서 없음'''
  answer_detail: GDPR Recital 83은 전송 중인 데이터의 암호화를 권고합니다. TLS 인증서의 만료일을 정기적으로 확인해야 하며, 만료된 인증서는 브라우저 경고를
    유발하고 MITM 공격에 취약해질 수 있습니다.
  verify:
    type: output_contains
    expect: TLS
    field: stdout
    semantic:
      intent: GDPR Art.32 encryption in transit — echo | openssl s_client -connect 10.20.30.80:443 -servername
        10.20.30.80 | openssl x509 -noout -dates -subject. notBefore/notAfter 만료일, Subject CN. 만료 30일
        전 갱신 필수(cron + certbot renew). Let Encrypt 무료 자동 갱신 권장. TLS 1.2+ + 강력 cipher. SSL Labs A+ 등급 목표.
        HSTS + OCSP Stapling 활성. Recital 83 + Art.25 data protection by design
      success_criteria:
      - openssl s_client 실행
      - TLS 키워드 포함
      - dates/subject 정보
      acceptable_methods:
      - openssl s_client + x509 -dates
      - curl -vI https://<host> 인증서 정보
      - certbot certificates
      - testssl.sh <host>
      - SSL Labs API https://api.ssllabs.com
      negative_signs:
      - 만료 임박 무시
      - HTTPS 미설정 정상 판정
      - 인증서 신뢰체인 검증 없음
  target_vm: secu
  script: echo | openssl s_client -connect 10.20.30.80:443 -servername 10.20.30.80 2>/dev/null | openssl
    x509 -noout -dates -subject 2>/dev/null || echo 'HTTPS 미설정 - TLS 인증서 없음'
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)의 SSL/TLS 인증서 정보와 만료일을 확인하시오. GDPR은 전송 중인 데이터의 암호화를 요구해줘
- order: 3
  instruction: 시스템에서 개인 데이터가 포함될 수 있는 파일을 검색하시오. 이메일 주소 패턴이 포함된 로그 파일을 찾습니다.
  hint: grep으로 이메일 패턴(@)을 로그 파일에서 검색하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템에서 개인 데이터가 포함될 수 있는 파일을 검색해줘

    📎 참고 (CLI): sudo grep -rl ''@.*\.'' /var/log/ 2>/dev/null | head -10 && echo ''---'' && sudo grep
    -c ''@'' /var/log/auth.log 2>/dev/null'
  answer_detail: GDPR Article 5(1)(c) 데이터 최소화 원칙에 따라 로그에 불필요한 개인 데이터(이메일, IP 등)가 기록되지 않아야 합니다. 로그에 개인
    데이터가 포함되면 해당 로그도 GDPR 보호 대상이 되어 보관 기간 제한과 접근 통제가 필요합니다.
  verify:
    type: output_contains
    expect: log
    field: stdout
    semantic:
      intent: GDPR Art.5(1)(c) data minimization - 로그 내 PII 스캔 — sudo grep -rl @.*\. /var/log/ + grep
        -c @ /var/log/auth.log. 이메일·IP·전화 패턴 로그 기록 시 해당 로그도 GDPR 보호 대상. 가명처리(pseudonymisation) 또는 tokenization
        필요. Data Protection by Design(Art.25). Elastic 이면 ingest pipeline ip_anonymization processor.
        Fluentd record_transformer 로 마스킹
      success_criteria:
      - grep @.*\. /var/log/ 실행
      - log 키워드 포함
      - 이메일 포함 파일 식별
      acceptable_methods:
      - grep -rl @ + grep -c @ /var/log
      - grep -rE \b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z]{2,}\b
      - trufflehog --rules PII /var/log
      - Elastic ingest processor anonymize
      - Microsoft Presidio data anonymizer
      negative_signs:
      - PII 존재 정상 판정
      - 가명처리 개념 없음
      - 마스킹 파이프라인 없음
  target_vm: secu
  script: sudo grep -rl '@.*\.' /var/log/ 2>/dev/null | head -10 && echo '---' && sudo grep -c '@' /var/log/auth.log
    2>/dev/null
  risk_level: low
  bastion_prompt: 시스템에서 개인 데이터가 포함될 수 있는 파일을 검색해줘
- order: 4
  instruction: Apache 웹 서버의 접근 로그 형식을 확인하시오. IP 주소의 가명화(anonymization) 설정 여부를 점검합니다.
  hint: ssh로 WEB 서버에 접속하여 Apache의 LogFormat 설정을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: Apache 웹 서버의 접근 로그 형식을 확인하시오. IP 주소의 가명화(anonymization) 설정 여부를 점검해줘

    📎 참고 (CLI): ssh ccc@10.20.30.80 ''grep -E "LogFormat|CustomLog" /etc/apache2/apache2.conf /etc/apache2/sites-enabled/*
    2>/dev/null'''
  answer_detail: 'GDPR은 가명처리(pseudonymisation)를 권장합니다. Apache 접근 로그에 전체 IP 주소가 기록되면 개인 데이터 처리에 해당합니다.
    IP의 마지막 옥텟을 0으로 대체(예: 192.168.1.0)하거나, 해시 처리하여 가명화할 수 있습니다.'
  verify:
    type: output_contains
    expect: LogFormat
    field: stdout
    semantic:
      intent: 'Apache LogFormat IP anonymization — grep -E LogFormat|CustomLog /etc/apache2/*.conf. 기본
        %h(clientIP) 는 전체 IP 기록 → GDPR PII. 가명화: mod_remoteip + RemoteIPInternalProxy + IP 마스킹 모듈(mod_maxminddb
        또는 커스텀 %{IPv4Anon}e). /24 마지막 옥텟 0 대체. AWS ALB: access_logs.s3.anonymize_ip. Cloudflare: Anonymize
        IPs. GDPR Recital 26 (anonymised data 는 GDPR 외)'
      success_criteria:
      - grep LogFormat apache 실행
      - LogFormat 키워드 포함
      - 접근 로그 포맷 출력
      acceptable_methods:
      - grep LogFormat|CustomLog /etc/apache2
      - apache2ctl -S 로 활성 vhost
      - mod_remoteip + mod_maxminddb
      - Nginx $remote_addr + $http_x_forwarded_for
      - log aggregation pipeline 에서 anonymize
      negative_signs:
      - '%h 전체 IP 기록 정상 판정'
      - 가명화 모듈 미언급
      - X-Forwarded-For 반영 안 함
  target_vm: secu
  script: ssh ccc@10.20.30.80 'grep -E "LogFormat|CustomLog" /etc/apache2/apache2.conf /etc/apache2/sites-enabled/*
    2>/dev/null'
  risk_level: low
  bastion_prompt: Apache 웹 서버의 접근 로그 형식을 확인하시오. IP 주소의 가명화(anonymization) 설정 여부를 점검해줘
- order: 5
  instruction: 시스템의 데이터 백업 설정을 확인하시오. GDPR Art.32(1)(c) '적시에 가용성 및 접근성을 복원하는 능력'.
  hint: crontab과 /etc/cron.d/에서 백업 관련 작업을 찾으세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템의 데이터 백업 설정을 확인하시오. GDPR Art.32(1)(c) ''적시에 가용성 및 접근성을 복원하는 능력''해줘

    📎 참고 (CLI): sudo crontab -l 2>/dev/null; echo ''--- cron.d ---'' && grep -rl ''backup\|dump\|rsync''
    /etc/cron.d/ /etc/cron.daily/ 2>/dev/null'
  answer_detail: GDPR Article 32(1)(c)는 사고 발생 시 개인 데이터의 가용성과 접근성을 적시에 복원할 수 있는 능력을 요구합니다. 정기 백업, 백업 암호화,
    복원 테스트 절차가 수립되어 있어야 합니다.
  verify:
    type: output_contains
    expect: cron
    field: stdout
    semantic:
      intent: 'GDPR Art.32(1)(c) backup availability — sudo crontab -l + grep -rl backup|dump|rsync /etc/cron.d/
        /etc/cron.daily/. 정기 백업(daily/weekly) + 암호화(GPG/LUKS) + offsite(S3 Glacier) + 복원 테스트(분기). 3-2-1
        rule: 3 copies, 2 media, 1 offsite. restic/borgbackup 증분+dedup. Immutable backup(ransomware 방어).
        Velero (K8s). Art.32(1)(c) 복원 능력 + Art.33 72h breach notification 대비'
      success_criteria:
      - crontab + grep backup 실행
      - cron 키워드 포함
      - 백업 작업 존재 여부
      acceptable_methods:
      - crontab -l + grep cron.* backup
      - systemctl list-timers --all backup
      - restic snapshots list
      - borgbackup info + check
      - aws s3 ls + lifecycle policy
      negative_signs:
      - 백업 없음 정상 판정
      - 3-2-1 rule 미언급
      - 복원 테스트 없음
  target_vm: secu
  script: sudo crontab -l 2>/dev/null; echo '--- cron.d ---' && grep -rl 'backup\|dump\|rsync' /etc/cron.d/
    /etc/cron.daily/ 2>/dev/null
  risk_level: low
  bastion_prompt: 시스템의 데이터 백업 설정을 확인하시오. GDPR Art.32(1)(c) '적시에 가용성 및 접근성을 복원하는 능력'해줘
- order: 6
  instruction: fail2ban 또는 유사한 자동 차단 메커니즘이 설정되어 있는지 확인하시오. GDPR Art.32(1)(b) '보안 서비스의 지속적 보장'.
  hint: fail2ban 서비스 상태와 설정을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: fail2ban 또는 유사한 자동 차단 메커니즘이 설정되어 있는지 확인하시오. GDPR Art.32(1)(b) ''보안 서비스의 지속적 보장''해줘

    📎 참고 (CLI): sudo systemctl status fail2ban --no-pager 2>/dev/null | head -5; echo ''---'' && sudo
    fail2ban-client status 2>/dev/null || echo ''fail2ban 미설치/미활성'''
  answer_detail: GDPR Article 32(1)(b)는 처리 시스템과 서비스의 지속적인 기밀성, 무결성, 가용성, 복원력을 요구합니다. fail2ban은 반복 로그인
    실패를 감지하여 자동으로 IP를 차단함으로써 무차별 대입 공격으로부터 시스템을 보호합니다.
  verify:
    type: output_contains
    expect: fail2ban
    field: stdout
    semantic:
      intent: 'GDPR Art.32(1)(b) ongoing security - fail2ban — sudo systemctl status fail2ban --no-pager
        | head -5 + sudo fail2ban-client status. brute-force 자동 차단으로 서비스 가용성 보장. 기본 jails: sshd, apache-auth,
        postfix. /etc/fail2ban/jail.local 로 커스터마이징: bantime 1h, findtime 10m, maxretry 5. iptables 연동으로
        즉시 IP block. SIEM(Wazuh) 연동 후 중앙 관리. CrowdSec 차세대 대안'
      success_criteria:
      - systemctl status + fail2ban-client 실행
      - fail2ban 키워드 포함
      - active/inactive 또는 jail 상태
      acceptable_methods:
      - systemctl status fail2ban + fail2ban-client status
      - fail2ban-client status sshd(특정 jail)
      - journalctl -u fail2ban | tail
      - CrowdSec bouncer 대체
      - Wazuh Active Response 연계
      negative_signs:
      - fail2ban 미활성 정상 판정
      - jail 설정 없이 default
      - WAF + rate limit 연계 없음
  target_vm: secu
  script: sudo systemctl status fail2ban --no-pager 2>/dev/null | head -5; echo '---' && sudo fail2ban-client
    status 2>/dev/null || echo 'fail2ban 미설치/미활성'
  risk_level: low
  bastion_prompt: fail2ban 또는 유사한 자동 차단 메커니즘이 설정되어 있는지 확인하시오. GDPR Art.32(1)(b) '보안 서비스의 지속적 보장'해줘
- order: 7
  instruction: 시스템의 /tmp 디렉터리에 민감 데이터가 남아 있지 않은지 확인하시오. GDPR의 데이터 최소화 원칙.
  hint: 최근 생성된 임시 파일을 검색하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 시스템의 /tmp 디렉터리에 민감 데이터가 남아 있지 않은지 확인하시오. GDPR의 데이터 최소화 원칙해줘

    📎 참고 (CLI): sudo find /tmp -type f -mtime -7 -ls 2>/dev/null | head -20 && echo ''--- /tmp 크기 ---''
    && du -sh /tmp 2>/dev/null'
  answer_detail: GDPR Article 5(1)(e) 저장 제한 원칙에 따라 개인 데이터는 필요 이상으로 보관하면 안 됩니다. /tmp에 처리 중간 결과로 개인 데이터가
    남아 있을 수 있으며, tmpfs 마운트나 정기적 정리 정책이 필요합니다.
  verify:
    type: output_contains
    expect: tmp
    field: stdout
    semantic:
      intent: 'GDPR Art.5(1)(e) storage limitation - /tmp 스캔 — sudo find /tmp -type f -mtime -7 -ls +
        du -sh /tmp. /tmp 에 장기 잔존 민감 파일은 data minimization 위반. systemd-tmpfiles-clean.service 로 자동 정리(기본
        10일). tmpfs 마운트(재부팅 시 소멸). /tmp 권한 1777 sticky bit. 권장 대안: tmpfs /tmp size=1G + /var/tmp age=30d.
        앱 레벨: os.unlink(tempfile.NamedTemporaryFile)'
      success_criteria:
      - find /tmp -mtime -7 실행
      - tmp 키워드 포함
      - 파일 목록·크기 출력
      acceptable_methods:
      - find /tmp -type f -mtime -7 -ls + du -sh
      - ls -laR /tmp 2>/dev/null | head
      - systemd-tmpfiles --cleanup
      - mount /tmp -o remount,size=1G,mode=1777
      - auditd watch /tmp 모니터링
      negative_signs:
      - /tmp PII 잔존 무시
      - systemd-tmpfiles 언급 없음
      - tmpfs 대안 없음
