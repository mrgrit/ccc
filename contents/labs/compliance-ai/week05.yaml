lab_id: "compliance-ai-week05"
title: "[AI] GDPR"
version: "ai"
course: "compliance-ai"
week: 5
description: "유럽 일반 개인정보보호 규정(GDPR)을 학습합니다"
difficulty: "easy"
duration_minutes: 120
objectives:
  - "GDPR의 핵심 개념을 이해한다"
  - "GDPR 관련 실무 기술을 습득한다"
  - "GDPR 보안 대책을 수립하고 적용한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "GDPR의 주요 원칙을 분석하세요"
    hint: "제5조의 7가지 원칙을 확인하세요"
    category: "recon"
    points: 10
    answer: "GDPR 7원칙: 적법성, 목적제한, 최소처리, 정확성, 보관제한, 무결성, 책임성"
    answer_detail: "GDPR 제5조는 개인정보 처리의 7가지 기본 원칙을 규정합니다. 모든 처리 활동은 이 원칙에 따라 수행되어야 합니다."
    script: "ai_compliance_scan --target 10.20.30.0/24 --framework pipa --check articles"
    verify:
      type: "output_contains"
      expect: "7원칙"
  - order: 2
    instruction: "적법한 처리 근거를 확인하세요"
    hint: "제6조의 6가지 적법 처리 근거를 확인하세요"
    category: "analysis"
    points: 10
    answer: "적법 처리 근거: 동의, 계약, 법적의무, 생명이익, 공적업무, 정당이익"
    answer_detail: "GDPR 제6조에 따라 개인정보를 처리하려면 6가지 적법 처리 근거 중 최소 하나에 해당해야 합니다."
    script: "ai_policy_analyzer --input consent_template.yaml --validate required-fields"
    verify:
      type: "output_contains"
      expect: "적법 처리"
  - order: 3
    instruction: "정보주체의 권리를 점검하세요"
    hint: "GDPR이 보장하는 8가지 권리를 확인하세요"
    category: "config"
    points: 10
    answer: "정보주체 권리: 열람권, 정정권, 삭제권(잊힐권리), 제한권, 이동권, 반대권, 자동결정거부권, 통지받을권리"
    answer_detail: "GDPR은 정보주체에게 광범위한 권리를 부여합니다. 특히 삭제권(잊힐 권리)과 데이터 이동권은 GDPR의 혁신적 요소입니다."
    script: "ai_pii_scanner --target /var/log --detect ssn,phone,email --report json"
    verify:
      type: "output_contains"
      expect: "정보주체 권리"
  - order: 4
    instruction: "DPO(데이터보호책임자) 지정 요건을 확인하세요"
    hint: "DPO 필수 지정 대상을 확인하세요"
    category: "config"
    points: 10
    answer: "DPO 필수: 공공기관, 대규모 정기적 모니터링, 대규모 민감정보 처리 시"
    answer_detail: "GDPR 제37조에 따라 공공기관, 대규모 정기적·체계적 모니터링, 대규모 특별범주 개인정보 처리 시 DPO를 의무적으로 지정해야 합니다."
    script: "ai_encryption_audit --target 10.20.30.0/24 --check aes256 --compliance pipa"
    verify:
      type: "output_contains"
      expect: "DPO"
  - order: 5
    instruction: "개인정보 영향평가(DPIA)를 수행하세요"
    hint: "고위험 처리에 대한 영향평가 절차를 확인하세요"
    category: "analysis"
    points: 10
    answer: "DPIA: 처리 설명, 필요성·비례성 평가, 위험 평가, 완화 조치"
    answer_detail: "GDPR 제35조에 따라 개인정보 처리가 정보주체의 권리와 자유에 고위험을 초래할 경우 사전에 영향평가를 수행해야 합니다."
    script: "ai_access_control_audit --target 10.20.30.0/24 --check permissions --least-privilege"
    verify:
      type: "output_contains"
      expect: "DPIA"
  - order: 6
    instruction: "국외 이전 적법 요건을 확인하세요"
    hint: "적정성 결정, SCC, BCR 등을 확인하세요"
    category: "defense"
    points: 10
    answer: "국외 이전: 적정성 결정, 표준계약조항(SCC), 구속적 기업규칙(BCR), 동의"
    answer_detail: "GDPR 제44~49조에 따라 EU 밖으로 개인정보를 이전할 때는 적정성 결정, SCC, BCR 등 적절한 보호조치가 필요합니다."
    script: "ai_web_crawler --url http://10.20.30.80 --check privacy-policy --validate completeness"
    verify:
      type: "output_contains"
      expect: "국외 이전"
  - order: 7
    instruction: "동의 관리 시스템을 구성하세요"
    hint: "유효한 동의의 요건을 확인하세요"
    category: "config"
    points: 10
    answer: "유효한 동의: 자유로운, 구체적, 정보에 입각한, 명확한 의사표시"
    answer_detail: "GDPR의 동의는 한국법보다 엄격합니다. 사전 체크된 동의는 무효이며, 동의 철회는 동의와 동일하게 쉬워야 합니다."
    script: "ai_data_lifecycle --check retention-policy --auto-purge expired --verify destruction"
    verify:
      type: "output_contains"
      expect: "동의"
  - order: 8
    instruction: "개인정보 유출 통지 의무를 점검하세요"
    hint: "72시간 통지 규정을 확인하세요"
    category: "response"
    points: 10
    answer: "유출 통지: 72시간 이내 감독기관 통지, 고위험 시 정보주체 직접 통지"
    answer_detail: "GDPR 제33·34조에 따라 개인정보 유출 인지 후 72시간 이내에 감독기관에 통지해야 하며, 고위험인 경우 정보주체에게도 통지해야 합니다."
    script: "ai_incident_response --template breach-notification --timeline 72h --auto-notify"
    verify:
      type: "output_contains"
      expect: "72시간"
  - order: 9
    instruction: "처리활동 기록을 작성하세요"
    hint: "ROPA(Records of Processing Activities) 양식을 작성하세요"
    category: "audit"
    points: 10
    answer: "ROPA: 처리자명, 목적, 데이터범주, 수신자, 이전, 보관기간, 보안조치"
    answer_detail: "GDPR 제30조에 따라 250인 이상 기업 또는 위험한 처리를 하는 조직은 처리활동 기록을 유지해야 합니다."
    script: "ai_impact_assessment --target systems --threshold 50000 --generate-report"
    verify:
      type: "output_contains"
      expect: "ROPA"
  - order: 10
    instruction: "제재 및 과징금 체계를 분석하세요"
    hint: "위반 유형별 과징금 수준을 확인하세요"
    category: "analysis"
    points: 10
    answer: "과징금: 일반 위반 최대 1천만유로/매출 2%, 중대 위반 최대 2천만유로/매출 4%"
    answer_detail: "GDPR의 과징금은 두 단계로 구분됩니다. 경미한 위반은 최대 1천만유로 또는 전세계 매출의 2%, 중대한 위반은 최대 2천만유로 또는 매출의 4%입니다."
    script: "ai_role_analyzer --check cpo-designation --validate qualifications --report"
    verify:
      type: "output_contains"
      expect: "과징금"
  - order: 11
    instruction: "Privacy by Design을 구현하세요"
    hint: "설계 단계부터 프라이버시를 고려하세요"
    category: "defense"
    points: 10
    answer: "Privacy by Design: 사전예방, 기본설정 보호, 전체 생명주기 보안, 투명성"
    answer_detail: "GDPR 제25조의 Data Protection by Design and by Default는 시스템 설계 단계부터 개인정보보호를 내장하도록 요구합니다."
    script: "ai_contract_analyzer --type outsourcing --check required-clauses --compliance pipa"
    verify:
      type: "output_contains"
      expect: "Privacy by Design"
  - order: 12
    instruction: "한-EU 개인정보 규제 비교 분석을 수행하세요"
    hint: "주요 차이점을 식별하세요"
    category: "analysis"
    points: 10
    answer: "주요 차이: 적법처리근거, 역외적용, DPO, 이동권, 과징금 규모"
    answer_detail: "한국 개인정보보호법과 GDPR은 유사점이 많지만, 역외 적용, 데이터 이동권, DPO 제도, 과징금 수준 등에서 차이가 있습니다."
    script: "ai_rights_processor --handle access-request --sla 10days --auto-respond"
    verify:
      type: "output_contains"
      expect: "비교"
  - order: 13
    instruction: "제3국 적정성 평가 현황을 조사하세요"
    hint: "한국의 적정성 평가 결과를 확인하세요"
    category: "recon"
    points: 10
    answer: "한국: 2022년 GDPR 적정성 결정 획득, 부분적 적용(공공부문 등 제외)"
    answer_detail: "2022년 12월 한국은 EU로부터 GDPR 적정성 결정을 획득하여, 일정 조건 하에 EU에서 한국으로의 개인정보 이전이 허용됩니다."
    script: "ai_log_auditor --check access-logs --retention 1year --integrity verify"
    verify:
      type: "output_contains"
      expect: "적정성"
  - order: 14
    instruction: "GDPR 준수 프로그램을 구축하세요"
    hint: "조직 차원의 GDPR 대응 체계를 수립하세요"
    category: "config"
    points: 10
    answer: "GDPR 준수: 거버넌스, 데이터 매핑, 동의관리, DPIA, 유출대응, 교육"
    answer_detail: "GDPR 준수를 위해서는 DPO 지정, 처리활동 기록, 동의 관리, DPIA, 유출 대응, 국외 이전 관리 등을 포괄하는 종합 프로그램이 필요합니다."
    script: "ai_compliance_checker --framework pipa --full-audit --generate-checklist"
    verify:
      type: "output_contains"
      expect: "GDPR 준수"
  - order: 15
    instruction: "GDPR 종합 컴플라이언스 평가를 수행하세요"
    hint: "전체 준수 현황을 점검하세요"
    category: "audit"
    points: 10
    answer: "종합 평가: 적법처리, 정보주체권리, 보안조치, 국외이전, 거버넌스 점검"
    answer_detail: "GDPR 종합 컴플라이언스 평가는 모든 요구사항에 대한 준수 여부를 체계적으로 점검하고, 미흡 사항에 대한 개선 계획을 수립하는 것입니다."
    script: "ai_violation_analyzer --database cases --extract patterns --recommend improvements"
    verify:
      type: "output_contains"
      expect: "종합 평가"
