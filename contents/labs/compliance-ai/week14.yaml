lab_id: compliance-ai-week14
title: 보안 교육/인식 프로그램 점검 실습 (AI 지원)
version: ai
course: compliance-ai
week: 14
description: 보안 교육 및 인식 프로그램의 기술적 지원 체계를 점검합니다. 사용자 보안 설정 확인, 보안 경고 메시지 구성, 교육 자료 배포 체계, 보안 인식 수준 측정을 수행합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 보안 교육/인식 프로그램의 기술적 구현 방법을 이해한다
- 시스템의 보안 경고 및 알림 체계를 설정한다
- 사용자 보안 행동을 모니터링하는 방법을 습득한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버(10.20.30.1)에 SSH 접속 시 보안 경고 배너를 설정하시오. 모든 사용자에게 보안 정책을 알리는 첫 번째 방법입니다.
  hint: /etc/issue.net에 경고 문구를 작성하고 sshd_config에서 Banner를 설정하세요.
  category: config
  points: 10
  answer: 'echo ''================================================================

    경고: 본 시스템은 인가된 사용자만 접근할 수 있습니다.

    모든 활동은 기록되며, 비인가 접근 시 법적 조치를 받을 수 있습니다.

    보안 정책을 준수하십시오.

    ================================================================'' | sudo tee /etc/issue.net && sudo sed -i ''s/^#\?Banner.*/Banner \/etc\/issue.net/'' /etc/ssh/sshd_config && grep ''^Banner'' /etc/ssh/sshd_config'
  answer_detail: 로그인 배너는 법적 고지(legal notice) 역할을 합니다. 비인가 접근 시도자에게 경고를 표시하면, 법적 분쟁 시 '접근이 허가되지 않았음을 인지했다'는 증거가 됩니다. 대부분의 컴플라이언스 프레임워크에서 배너 설정을 요구합니다.
  verify:
    type: output_contains
    expect: Banner /etc/issue.net
    field: stdout
  script: 'echo ''================================================================

    경고: 본 시스템은 인가된 사용자만 접근할 수 있습니다.

    모든 활동은 기록되며, 비인가 접근 시 법적 조치를 받을 수 있습니다.

    보안 정책을 준수하십시오.

    ================================================================'' | sudo tee /etc/issue.net && sudo sed -i ''s/^#\?Banner.*/Banner \/etc\/issue.net/'' /etc/ssh/sshd_config && grep ''^Banner'' /etc/ssh/sshd_config'
  risk_level: low
- order: 2
  instruction: 로그인 후 보안 알림 메시지(MOTD)를 설정하시오. 최신 보안 공지를 사용자에게 전달합니다.
  hint: /etc/motd 파일에 보안 공지 내용을 작성하세요.
  category: config
  points: 10
  answer: 'cat << ''EOF'' | sudo tee /etc/motd


    [보안 공지] 2024년 보안 교육 일정

    - 정기 보안 교육: 매 분기 첫째주

    - 피싱 대응 훈련: 매월 실시

    - 의심스러운 이메일은 보안팀(security@company.com)으로 신고

    - 패스워드는 90일마다 변경해주세요


    EOF

    cat /etc/motd'
  answer_detail: MOTD(Message of the Day)는 로그인 성공 후 표시되는 메시지입니다. 보안 교육 일정, 최신 위협 정보, 보안 팁 등을 전달하여 사용자의 보안 인식을 높입니다. 동적 MOTD는 /etc/update-motd.d/ 스크립트로 구현합니다.
  verify:
    type: output_contains
    expect: 보안 공지
    field: stdout
  script: 'cat << ''EOF'' | sudo tee /etc/motd


    [보안 공지] 2024년 보안 교육 일정

    - 정기 보안 교육: 매 분기 첫째주

    - 피싱 대응 훈련: 매월 실시

    - 의심스러운 이메일은 보안팀(security@company.com)으로 신고

    - 패스워드는 90일마다 변경해주세요


    EOF

    cat /etc/motd'
  risk_level: low
- order: 3
  instruction: 사용자의 패스워드 보안 수준을 점검하시오. 패스워드 변경 이력과 복잡도 설정을 확인합니다.
  hint: 각 사용자의 chage 정보를 확인하세요.
  category: audit
  points: 10
  answer: 'echo ''=== 사용자 패스워드 보안 수준 ==='' && for user in $(awk -F: ''$7 !~ /nologin|false/ {print $1}'' /etc/passwd); do echo "[$user]"; sudo chage -l $user 2>/dev/null | grep -E ''(Last password|Maximum|Password
    expires)''; echo ''''; done'
  answer_detail: 보안 교육의 효과는 사용자 행동으로 측정할 수 있습니다. 패스워드를 오랫동안 변경하지 않은 사용자, 간단한 패스워드를 사용하는 사용자를 식별하여 추가 교육 대상으로 선정합니다.
  verify:
    type: output_contains
    expect: 사용자 패스워드 보안 수준
    field: stdout
  script: 'echo ''=== 사용자 패스워드 보안 수준 ==='' && for user in $(awk -F: ''$7 !~ /nologin|false/ {print $1}'' /etc/passwd); do echo "[$user]"; sudo chage -l $user 2>/dev/null | grep -E ''(Last password|Maximum|Password
    expires)''; echo ''''; done'
  risk_level: low
- order: 4
  instruction: 비정상 시간대(22:00~06:00)의 로그인 시도를 분석하시오. 사용자 보안 행동 모니터링.
  hint: auth.log에서 시간대별 로그인을 분석하세요.
  category: audit
  points: 12
  answer: 'echo ''=== 비정상 시간 로그인 분석 ==='' && sudo grep ''session opened\|Accepted'' /var/log/auth.log 2>/dev/null | awk ''{print $1, $2, $3}'' | sort | tail -15 && echo ''--- 야간(22-06시) 접속 ---'' && sudo
    grep ''session opened\|Accepted'' /var/log/auth.log 2>/dev/null | awk -F: ''{if($1 ~ /[0-5]:/) print}'' | head -5 || echo ''야간 접속 없음'''
  answer_detail: 비정상 시간대의 접속은 계정 탈취나 비인가 접근의 징후일 수 있습니다. 보안 교육에서 '업무 시간 외 접속 시 보안팀에 사전 통보' 정책을 안내하고, 기술적으로 야간 접속을 모니터링하여 이상 징후를 탐지합니다.
  verify:
    type: output_contains
    expect: 비정상 시간 로그인 분석
    field: stdout
  script: 'echo ''=== 비정상 시간 로그인 분석 ==='' && sudo grep ''session opened\|Accepted'' /var/log/auth.log 2>/dev/null | awk ''{print $1, $2, $3}'' | sort | tail -15 && echo ''--- 야간(22-06시) 접속 ---'' && sudo
    grep ''session opened\|Accepted'' /var/log/auth.log 2>/dev/null | awk -F: ''{if($1 ~ /[0-5]:/) print}'' | head -5 || echo ''야간 접속 없음'''
  risk_level: low
- order: 5
  instruction: sudo 명령어 사용 패턴을 분석하시오. 특권 명령 사용의 적절성을 평가합니다.
  hint: /var/log/auth.log에서 sudo 사용 패턴을 추출하세요.
  category: audit
  points: 10
  answer: echo '=== sudo 사용 분석 ===' && sudo grep 'sudo:' /var/log/auth.log 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="COMMAND=") {for(j=i;j<=NF;j++) printf $j" "; print ""}}' | sort | uniq -c | sort
    -rn | head -10
  answer_detail: 특권 명령 사용 분석은 보안 교육의 효과를 측정하는 지표입니다. 불필요한 sudo 사용이 빈번하면 최소 권한 원칙 교육이 부족한 것이고, 위험한 명령(rm -rf, chmod 777 등) 사용이 발견되면 즉시 교육이 필요합니다.
  verify:
    type: output_contains
    expect: sudo 사용 분석
    field: stdout
  script: echo '=== sudo 사용 분석 ===' && sudo grep 'sudo:' /var/log/auth.log 2>/dev/null | awk '{for(i=1;i<=NF;i++) if($i=="COMMAND=") {for(j=i;j<=NF;j++) printf $j" "; print ""}}' | sort | uniq -c | sort
    -rn | head -10
  risk_level: low
- order: 6
  instruction: 보안 교육 자료 배포용 디렉터리를 구성하시오. 교육 자료를 시스템에서 접근 가능하게 합니다.
  hint: /opt/security-training/ 디렉터리에 교육 자료를 생성하세요.
  category: config
  points: 10
  answer: "sudo mkdir -p /opt/security-training && cat << 'EOF' | sudo tee /opt/security-training/security_awareness.txt\n=== 보안 인식 교육 자료 ===\n\n1. 피싱 이메일 식별법\n   - 발신자 주소 확인\n   - 의심스러운 링크 호버 확인\n   -\
    \ 긴급/위협성 문구 주의\n\n2. 안전한 패스워드 관리\n   - 12자 이상, 3종 이상 문자 조합\n   - 서비스별 다른 패스워드 사용\n   - 패스워드 관리자 활용\n\n3. 인시던트 신고\n   - 이상 징후 발견 시 보안팀 즉시 신고\n   - 신고 채널: 내선 1234, security@company.com\nEOF\nls -la /opt/security-training/"
  answer_detail: 보안 교육 자료는 접근하기 쉬운 위치에 항상 이용 가능해야 합니다. 파일 시스템, 인트라넷, 이메일 등 다양한 채널로 배포하며, 정기적으로 내용을 갱신합니다. NIST SP 800-50에 따르면 보안 인식 프로그램은 역할별로 차별화된 교육을 제공해야 합니다.
  verify:
    type: output_contains
    expect: security_awareness
    field: stdout
  script: "sudo mkdir -p /opt/security-training && cat << 'EOF' | sudo tee /opt/security-training/security_awareness.txt\n=== 보안 인식 교육 자료 ===\n\n1. 피싱 이메일 식별법\n   - 발신자 주소 확인\n   - 의심스러운 링크 호버 확인\n   -\
    \ 긴급/위협성 문구 주의\n\n2. 안전한 패스워드 관리\n   - 12자 이상, 3종 이상 문자 조합\n   - 서비스별 다른 패스워드 사용\n   - 패스워드 관리자 활용\n\n3. 인시던트 신고\n   - 이상 징후 발견 시 보안팀 즉시 신고\n   - 신고 채널: 내선 1234, security@company.com\nEOF\nls -la /opt/security-training/"
  risk_level: low
- order: 7
  instruction: 시스템에 보안 알림 스크립트를 설정하시오. 로그인 실패 5회 이상 시 관리자에게 알림을 보내는 모니터링을 구성합니다.
  hint: auth.log를 감시하여 실패 횟수를 카운트하는 스크립트를 작성하세요.
  category: config
  points: 12
  answer: "cat << 'SCRIPT' > /tmp/login_alert.sh\n#!/bin/bash\nTHRESHOLD=5\nFAILED=$(sudo grep -c 'Failed password' /var/log/auth.log 2>/dev/null || echo 0)\nif [ \"$FAILED\" -ge \"$THRESHOLD\" ]; then\n\
    \  echo \"[경고] 로그인 실패 ${FAILED}회 감지!\"\n  echo \"상위 실패 IP:\"\n  sudo grep 'Failed password' /var/log/auth.log 2>/dev/null | awk '{print $(NF-3)}' | sort | uniq -c | sort -rn | head -5\nelse\n  echo\
    \ \"[정상] 로그인 실패 ${FAILED}회 (임계값: ${THRESHOLD})\"\nfi\nSCRIPT\nchmod +x /tmp/login_alert.sh && bash /tmp/login_alert.sh"
  answer_detail: 보안 알림은 기술적 보안 인식의 핵심 도구입니다. 임계값 기반 알림은 실시간 위협 감지와 대응을 가능하게 합니다. 이 스크립트를 cron에 등록하면 주기적으로 로그인 실패를 감시하고, 이메일/Slack 등으로 알림을 보낼 수 있습니다.
  verify:
    type: output_contains
    expect: 로그인 실패
    field: stdout
  script: "cat << 'SCRIPT' > /tmp/login_alert.sh\n#!/bin/bash\nTHRESHOLD=5\nFAILED=$(sudo grep -c 'Failed password' /var/log/auth.log 2>/dev/null || echo 0)\nif [ \"$FAILED\" -ge \"$THRESHOLD\" ]; then\n\
    \  echo \"[경고] 로그인 실패 ${FAILED}회 감지!\"\n  echo \"상위 실패 IP:\"\n  sudo grep 'Failed password' /var/log/auth.log 2>/dev/null | awk '{print $(NF-3)}' | sort | uniq -c | sort -rn | head -5\nelse\n  echo\
    \ \"[정상] 로그인 실패 ${FAILED}회 (임계값: ${THRESHOLD})\"\nfi\nSCRIPT\nchmod +x /tmp/login_alert.sh && bash /tmp/login_alert.sh"
  risk_level: low
- order: 8
  instruction: 보안 교육/인식 프로그램 종합 점검 스크립트를 작성하고 실행하시오.
  hint: 배너, MOTD, 교육 자료, 알림 체계를 종합 점검하세요.
  category: audit
  points: 16
  answer: 'cat << ''SCRIPT'' > /tmp/awareness_check.sh

    #!/bin/bash

    echo ''=== 보안 교육/인식 프로그램 점검 ===''

    echo ''''

    echo ''[1. 경고 배너]''

    grep -q ''Banner'' /etc/ssh/sshd_config && echo ''  SSH 배너: 설정됨'' || echo ''  SSH 배너: 미설정''

    cat /etc/issue.net 2>/dev/null | head -2

    echo ''[2. MOTD]''

    [ -s /etc/motd ] && echo ''  MOTD: 설정됨'' || echo ''  MOTD: 미설정''

    echo ''[3. 교육 자료]''

    ls /opt/security-training/*.txt 2>/dev/null | wc -l | xargs -I{} echo ''  교육 자료: {}개''

    echo ''[4. 보안 정책]''

    ls /opt/security-policy/*.txt 2>/dev/null | wc -l | xargs -I{} echo ''  정책 문서: {}개''

    echo ''[5. 사용자 보안 현황]''

    echo "  활성 계정: $(grep -vc ''nologin\|false'' /etc/passwd)개"

    echo "  금일 로그인 실패: $(sudo grep -c ''Failed'' /var/log/auth.log 2>/dev/null || echo 0)건"

    echo ''''

    echo ''=== 교육/인식 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/awareness_check.sh && bash /tmp/awareness_check.sh'
  answer_detail: 보안 교육/인식 프로그램은 기술적 통제만으로 해결할 수 없는 인적 보안(human factor)을 다룹니다. 피싱, 소셜 엔지니어링, 내부자 위협 등은 사용자 교육 없이는 방어할 수 없습니다. 기술적 통제(배너, MOTD, 알림)와 관리적 통제(정기 교육, 모의 훈련)를 병행해야 합니다.
  verify:
    type: output_contains
    expect: 교육/인식 점검 완료
    field: stdout
  script: 'cat << ''SCRIPT'' > /tmp/awareness_check.sh

    #!/bin/bash

    echo ''=== 보안 교육/인식 프로그램 점검 ===''

    echo ''''

    echo ''[1. 경고 배너]''

    grep -q ''Banner'' /etc/ssh/sshd_config && echo ''  SSH 배너: 설정됨'' || echo ''  SSH 배너: 미설정''

    cat /etc/issue.net 2>/dev/null | head -2

    echo ''[2. MOTD]''

    [ -s /etc/motd ] && echo ''  MOTD: 설정됨'' || echo ''  MOTD: 미설정''

    echo ''[3. 교육 자료]''

    ls /opt/security-training/*.txt 2>/dev/null | wc -l | xargs -I{} echo ''  교육 자료: {}개''

    echo ''[4. 보안 정책]''

    ls /opt/security-policy/*.txt 2>/dev/null | wc -l | xargs -I{} echo ''  정책 문서: {}개''

    echo ''[5. 사용자 보안 현황]''

    echo "  활성 계정: $(grep -vc ''nologin\|false'' /etc/passwd)개"

    echo "  금일 로그인 실패: $(sudo grep -c ''Failed'' /var/log/auth.log 2>/dev/null || echo 0)건"

    echo ''''

    echo ''=== 교육/인식 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/awareness_check.sh && bash /tmp/awareness_check.sh'
