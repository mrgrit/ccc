  instruction: 감사 발견사항(Findings)과 개선권고를 문서화하시오.
  hint: 점검 결과를 발견사항 번호, 심각도, 설명, 권고로 정리하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 감사 발견사항(Findings)과 개선권고를 문서화해줘

    📎 참고 (CLI): cat << ''EOF'' > /tmp/audit_findings.txt

    === 보안감사 발견사항 보고서 ===

    감사일: $(date +%Y-%m-%d)

    감사대상: 10.20.30.1 (SECU 서버)


    [F-001] 심각도: 중

    항목: 패스워드 정책

    발견: PASS_MAX_DAYS 기본값 사용 (99999일)

    권고: 90일 이하로 설정 필요


    [F-002] 심각도: 하

    항목: SSH 배너

    발견: 접속 경고 배너 미설정

    권고: /etc/issue.net에 경고 문구 설정


    === 보고서 끝 ===

    EOF

    cat /tmp/audit_findings.txt'
  answer_detail: 감사 발견사항은 통제 번호, 심각도(상/중/하), 발견 내용, 영향, 개선권고를 포함해야 합니다. 심각도는 취약점의
    악용 가능성과 비즈니스 영향을 고려하여 판정하며, 경영진에게 위험 수준을 명확히 전달하는 것이 중요합니다.
  verify:
    type: output_contains
    expect: 보안감사 발견사항 보고서
    field: stdout
  target_vm: secu
  script: 'cat << ''EOF'' > /tmp/audit_findings.txt

    === 보안감사 발견사항 보고서 ===

    감사일: $(date +%Y-%m-%d)

    감사대상: 10.20.30.1 (SECU 서버)


    [F-001] 심각도: 중

    항목: 패스워드 정책

    발견: PASS_MAX_DAYS 기본값 사용 (99999일)

    권고: 90일 이하로 설정 필요


    [F-002] 심각도: 하

    항목: SSH 배너

    발견: 접속 경고 배너 미설정

    권고: /etc/issue.net에 경고 문구 설정


    === 보고서 끝 ===

    EOF

    cat /tmp/audit_findings.txt'
  risk_level: low
  bastion_prompt: 감사 발견사항(Findings)과 개선권고를 문서화해줘
- order: 9
  instruction: 보안감사 종합 자동화 스크립트를 작성하고 실행하시오. 전체 감사 항목을 한 번에 점검합니다.
  hint: 계정, 패스워드, SSH, 방화벽, 로그, 파일 권한을 종합하세요.
  category: audit
  points: 14
  answer: '🤖 프롬프트: 보안감사 종합 자동화 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/full_audit.sh

    #!/bin/bash

    echo ''=== 보안감사 자동화 보고서 ===''

    echo "감사일시: $(date)"

    echo "대상: $(hostname) ($(hostname -I | awk ''{print $1}''))"

    echo ''''

    FINDINGS=0

    echo ''[1] 계정 관리''

    ACTIVE=$(grep -vc ''nologin\|false'' /etc/passwd)

    echo "활성 계정: ${ACTIVE}개"

    [ "$ACTIVE" -gt 5 ] && echo "  -> 주의: 활성 계정 다수" && FINDINGS=$((FINDINGS+1))

    echo ''[2] 패스워드 정책''

    MAXDAYS=$(grep ''^PASS_MAX_DAYS'' /etc/login.defs | awk ''{print $2}'')

    echo "PASS_MAX_DAYS: $MAXDAYS"

    [ "$MAXDAYS" -gt 90 ] && echo "  -> 미흡: 90일 초과" && FINDINGS=$((FINDINGS+1))

    echo ''[3] 감사 시스템''

    AUDIT=$(sudo systemctl is-active auditd 2>/dev/null)

    echo "auditd: $AUDIT"

    [ "$AUDIT" != "active" ] && FINDINGS=$((FINDINGS+1))

    echo ''''

    echo "총 발견사항: ${FINDINGS}건"

    echo ''=== 감사 완료 ===''

    SCRIPT

    chmod +x /tmp/full_audit.sh && bash /tmp/full_audit.sh'
  answer_detail: 보안감사 자동화는 반복적인 점검 작업의 효율성과 일관성을 높입니다. 자동화 스크립트는 점검 항목별 기준값을 내장하고,
    현재 설정과 비교하여 자동으로 적합/미흡을 판정합니다. 이를 통해 감사 주기를 단축하고 인적 오류를 줄일 수 있습니다.
  verify:
    type: output_contains
    expect: 감사 완료
    field: stdout
  target_vm: secu
  script: 'cat << ''SCRIPT'' > /tmp/full_audit.sh

    #!/bin/bash

    echo ''=== 보안감사 자동화 보고서 ===''

    echo "감사일시: $(date)"

    echo "대상: $(hostname) ($(hostname -I | awk ''{print $1}''))"

    echo ''''

    FINDINGS=0

    echo ''[1] 계정 관리''

    ACTIVE=$(grep -vc ''nologin\|false'' /etc/passwd)

    echo "활성 계정: ${ACTIVE}개"

    [ "$ACTIVE" -gt 5 ] && echo "  -> 주의: 활성 계정 다수" && FINDINGS=$((FINDINGS+1))

    echo ''[2] 패스워드 정책''

    MAXDAYS=$(grep ''^PASS_MAX_DAYS'' /etc/login.defs | awk ''{print $2}'')

    echo "PASS_MAX_DAYS: $MAXDAYS"

    [ "$MAXDAYS" -gt 90 ] && echo "  -> 미흡: 90일 초과" && FINDINGS=$((FINDINGS+1))

    echo ''[3] 감사 시스템''

    AUDIT=$(sudo systemctl is-active auditd 2>/dev/null)

    echo "auditd: $AUDIT"

    [ "$AUDIT" != "active" ] && FINDINGS=$((FINDINGS+1))

    echo ''''

    echo "총 발견사항: ${FINDINGS}건"

    echo ''=== 감사 완료 ===''

    SCRIPT

    chmod +x /tmp/full_audit.sh && bash /tmp/full_audit.sh'
