lab_id: compliance-ai-week10
title: 보안감사 수행 실습 (AI 지원)
version: ai
course: compliance-ai
week: 10
description: 보안감사 절차에 따라 시스템의 보안 통제를 점검합니다. 감사 계획 수립, 증적 수집, 통제 테스트, 발견사항 문서화, 개선권고 프로세스를 실습합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 보안감사의 체계적 수행 절차를 이해한다
- 기술적 감사 증적을 수집하고 분석한다
- 감사 발견사항과 개선권고를 문서화한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})에서 감사 대상 시스템의 기본 정보를 수집하시오. 감사 범위 정의를 위한 사전 조사.
  hint: OS 버전, 호스트명, 가동 시간, 커널 버전을 확인하세요.
  category: audit
  points: 8
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)에서 감사 대상 시스템의 기본 정보를 수집해줘

    📎 참고 (CLI): echo ''=== 감사 대상 시스템 정보 ==='' && hostname && cat /etc/os-release | grep PRETTY && uname
    -r && uptime'
  answer_detail: 보안감사의 첫 단계는 감사 범위와 대상을 정의하는 것입니다. 시스템의 기본 정보(OS 버전, 커널, 가동 시간)를 수집하면 적용 가능한 보안 기준과 알려진
    취약점을 파악할 수 있습니다.
  verify:
    type: output_contains
    expect: 감사 대상 시스템 정보
    field: stdout
    semantic:
      intent: '보안감사 사전 조사 — 감사 범위 정의를 위한 시스템 기본 정보 수집: hostname + /etc/os-release PRETTY_NAME + uname
        -r + uptime. 감사 대상의 OS 버전과 커널로 적용 가능한 보안 기준(CIS/STIG)과 알려진 CVE 매핑 기초.'
      success_criteria:
      - hostname 으로 감사 대상 시스템 식별자 확인
      - os-release PRETTY 로 배포판과 버전 추출
      - uname -r 커널 버전 및 uptime 가동 시간 수집
      acceptable_methods:
      - hostname + os-release + uname -r + uptime 조합
      - hostnamectl 로 통합 정보 출력
      - lsb_release -a 로 배포판 정보 대체
      - Ansible setup 모듈의 ansible_facts 수집
      negative_signs:
      - hostname 또는 os-release 일부 누락
      - 감사 범위 정의 목적 없이 단순 조회
      - CVE 매핑/CIS 적용 기초 맥락 누락
  target_vm: secu
  script: echo '=== 감사 대상 시스템 정보 ===' && hostname && cat /etc/os-release | grep PRETTY && uname -r &&
    uptime
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)에서 감사 대상 시스템의 기본 정보를 수집해줘
- order: 2
  instruction: '계정 관리 감사: 비활성 계정(30일 이상 미로그인)을 식별하시오.'
  hint: lastlog 또는 /var/log/wtmp에서 로그인 이력을 분석하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 계정 관리 감사: 비활성 계정(30일 이상 미로그인)을 식별해줘

    📎 참고 (CLI): echo ''=== 계정 감사 ==='' && echo ''[로그인 가능 계정]'' && awk -F: ''$7 !~ /nologin|false/ {print
    $1}'' /etc/passwd && echo ''[최근 로그인]'' && lastlog | grep -v ''Never'' | head -10'
  answer_detail: 계정 관리 감사에서는 불필요한 계정 존재 여부, 공용 계정 사용 여부, 비활성 계정 잔존 여부를 점검합니다. 30일 이상 미사용 계정은 비활성화 대상이며,
    퇴직/전보 시 계정 처리 프로세스가 있는지도 확인합니다.
  verify:
    type: output_contains
    expect:
    - 계정 감사
    - 비활성계정
    field: stdout
    semantic:
      intent: '계정 관리 감사 — awk -F: $7 !~ /nologin|false/ {print $1} /etc/passwd 로 로그인 가능 계정 추출, lastlog
        | grep -v Never | head -10 으로 최근 로그인 이력 10건. 30일 이상 미사용/퇴직자 잔존 계정 식별하여 비활성화 대상 도출.'
      success_criteria:
      - awk 로 /etc/passwd 에서 shell 이 nologin/false 가 아닌 활성 계정 추출
      - lastlog | grep -v Never 로 실제 로그인 이력이 있는 계정만 추출
      - 최근 로그인 일시 기반 30일 기준 초과 계정 식별
      acceptable_methods:
      - awk /etc/passwd + lastlog 조합
      - last 명령으로 wtmp 기반 로그인 이력 조회
      - chage -l <user> 로 계정별 최종 로그인/만료 일시 확인
      - aureport --login 으로 audit 기반 로그인 조회
      negative_signs:
      - /etc/passwd 만 덤프하고 lastlog 누락
      - Never logged in 필터 없이 전체 출력
      - 30일 기준 비활성 계정 판정 맥락 누락
  target_vm: secu
  script: 'echo ''=== 계정 감사 ==='' && echo ''[로그인 가능 계정]'' && awk -F: ''$7 !~ /nologin|false/ {print $1}''
    /etc/passwd && echo ''[최근 로그인]'' && lastlog | grep -v ''Never'' | head -10'
  risk_level: low
  bastion_prompt: '계정 관리 감사: 비활성 계정(30일 이상 미로그인)을 식별해줘'
- order: 3
  instruction: '패스워드 정책 감사: 현재 패스워드 정책이 조직 기준을 충족하는지 테스트하시오.'
  hint: pwquality.conf와 login.defs 설정을 조직 기준(12자, 90일, 복잡도)과 비교하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 패스워드 정책 감사: 현재 패스워드 정책이 조직 기준을 충족하는지 테스트해줘

    📎 참고 (CLI): echo ''=== 패스워드 정책 감사 ==='' && echo ''[기준: minlen>=12]'' && grep ''minlen'' /etc/security/pwquality.conf
    2>/dev/null | grep -v ''^#'' && echo ''[기준: PASS_MAX_DAYS<=90]'' && grep ''^PASS_MAX_DAYS'' /etc/login.defs
    && echo ''[기준: 복잡도 설정]'' && grep -E ''(ucredit|lcredit|dcredit|ocredit)'' /etc/security/pwquality.conf
    2>/dev/null | grep -v ''^#'''
  answer_detail: 패스워드 정책 감사는 설정값과 조직 기준을 비교하는 것입니다. 예를 들어 조직 기준이 minlen=12인데 실제 설정이 8이면 '미흡(Finding)'입니다.
    감사 결과는 '적합/미흡/해당없음'으로 판정합니다.
  verify:
    type: output_contains
    expect: 패스워드 정책 감사
    field: stdout
    semantic:
      intent: 패스워드 정책 감사 — 조직 기준(minlen>=12, PASS_MAX_DAYS<=90, 복잡도 ucredit/lcredit/dcredit/ocredit) 대비
        현재 설정 비교. /etc/security/pwquality.conf + /etc/login.defs grep 으로 현재 값 추출하여 적합/미흡/해당없음 판정.
      success_criteria:
      - grep minlen /etc/security/pwquality.conf 으로 최소 길이 확인
      - grep PASS_MAX_DAYS /etc/login.defs 로 만료 주기 확인
      - grep -E (ucredit|lcredit|dcredit|ocredit) 로 대소문자/숫자/특수문자 4개 복잡도 요건 확인
      acceptable_methods:
      - pwquality.conf + login.defs grep 조합으로 3개 기준 점검
      - authselect/PAM pam_pwquality 모듈 설정 조회
      - OpenSCAP xccdf accounts_password_pam_* 규칙 자동 평가
      - chage -l <user> 로 계정별 실제 적용 정책 확인
      negative_signs:
      - 현재 값만 출력하고 기준 비교 누락
      - 12자/90일/복잡도 3개 중 일부 누락
      - 적합/미흡 판정 프로세스 없음
  target_vm: secu
  script: 'echo ''=== 패스워드 정책 감사 ==='' && echo ''[기준: minlen>=12]'' && grep ''minlen'' /etc/security/pwquality.conf
    2>/dev/null | grep -v ''^#'' && echo ''[기준: PASS_MAX_DAYS<=90]'' && grep ''^PASS_MAX_DAYS'' /etc/login.defs
    && echo ''[기준: 복잡도 설정]'' && grep -E ''(ucredit|lcredit|dcredit|ocredit)'' /etc/security/pwquality.conf
    2>/dev/null | grep -v ''^#'''
  risk_level: low
  bastion_prompt: '패스워드 정책 감사: 현재 패스워드 정책이 조직 기준을 충족하는지 테스트해줘'
- order: 4
  instruction: '접근 통제 감사: SSH 접근 제한 설정을 점검하시오.'
  hint: sshd_config에서 보안 관련 설정을 추출하여 기준과 비교하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 접근 통제 감사: SSH 접근 제한 설정을 점검해줘

    📎 참고 (CLI): echo ''=== SSH 접근 통제 감사 ==='' && echo ''[기준: root 직접 접속 차단]'' && grep ''^PermitRootLogin''
    /etc/ssh/sshd_config 2>/dev/null || echo ''PermitRootLogin 미설정(기본값 사용)'' && echo ''[기준: 빈 패스워드 차단]''
    && grep ''^PermitEmptyPasswords'' /etc/ssh/sshd_config 2>/dev/null || echo ''PermitEmptyPasswords
    미설정'' && echo ''[기준: 인증 시도 제한]'' && grep ''^MaxAuthTries'' /etc/ssh/sshd_config 2>/dev/null || echo
    ''MaxAuthTries 미설정'''
  answer_detail: SSH 접근 통제 감사에서는 PermitRootLogin(no 권장), PermitEmptyPasswords(no 필수), MaxAuthTries(5 이하
    권장), Protocol(2만 허용) 등을 점검합니다. 설정이 없는 항목은 기본값을 사용하므로, 기본값이 보안 기준에 맞는지도 확인해야 합니다.
  verify:
    type: output_contains
    expect:
    - SSH 접근 통제 감사
    - PermitRootLogin
    field: stdout
    semantic:
      intent: SSH 접근 통제 감사 — sshd_config 에서 PermitRootLogin(no 권장), PermitEmptyPasswords(no 필수), MaxAuthTries(5
        이하) 3개 보안 기준 grep. 설정 부재 시 기본값 사용 경고로 대체. Protocol 2 강제, MaxAuthTries 제한으로 brute force 차단 증적.
      success_criteria:
      - grep ^PermitRootLogin /etc/ssh/sshd_config 로 root 접속 제한 확인
      - grep ^PermitEmptyPasswords 로 빈 패스워드 차단 확인
      - grep ^MaxAuthTries 로 인증 시도 제한 확인 (부재 시 기본값 경고 출력)
      acceptable_methods:
      - sshd_config 에서 3개 키 개별 grep
      - sshd -T 로 현재 런타임 적용 값 전체 출력
      - ssh-audit 도구로 자동 하드닝 평가
      - Lynis audit ssh 또는 OpenSCAP ssh 프로파일
      negative_signs:
      - 3개 보안 기준 중 일부만 확인
      - 기본값 사용 시 fallback 처리 누락
      - sshd_config 내용 확인 없이 원리만 설명
  target_vm: secu
  script: 'echo ''=== SSH 접근 통제 감사 ==='' && echo ''[기준: root 직접 접속 차단]'' && grep ''^PermitRootLogin''
    /etc/ssh/sshd_config 2>/dev/null || echo ''PermitRootLogin 미설정(기본값 사용)'' && echo ''[기준: 빈 패스워드 차단]''
    && grep ''^PermitEmptyPasswords'' /etc/ssh/sshd_config 2>/dev/null || echo ''PermitEmptyPasswords
    미설정'' && echo ''[기준: 인증 시도 제한]'' && grep ''^MaxAuthTries'' /etc/ssh/sshd_config 2>/dev/null || echo
    ''MaxAuthTries 미설정'''
  risk_level: low
  bastion_prompt: '접근 통제 감사: SSH 접근 제한 설정을 점검해줘'
- order: 5
  instruction: '방화벽 감사: 불필요한 허용 규칙이 있는지 분석하시오.'
  hint: nft list ruleset에서 accept 규칙을 분석하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 방화벽 감사: 불필요한 허용 규칙이 있는지 분석해줘

    📎 참고 (CLI): echo ''=== 방화벽 규칙 감사 ==='' && sudo nft list ruleset 2>/dev/null | grep -i ''accept'' &&
    echo ''--- 전체 규칙 수 ---'' && sudo nft list ruleset 2>/dev/null | grep -c ''rule'''
  answer_detail: 방화벽 감사에서는 모든 허용(accept) 규칙의 타당성을 검증합니다. 'any to any' 같은 광범위한 허용 규칙, 더 이상 필요 없는 규칙, 중복
    규칙을 식별합니다. 각 규칙에 대해 '왜 필요한가'를 설명할 수 있어야 합니다.
  verify:
    type: output_contains
    expect: 방화벽 규칙 감사
    field: stdout
    semantic:
      intent: 방화벽 규칙 감사 — sudo nft list ruleset | grep -i accept 로 모든 허용 규칙 추출 + grep -c rule 로 전체 규칙
        수 산출. any to any 광범위 허용, 중복 규칙, deprecated 규칙 식별하여 각 accept 규칙의 비즈니스 근거 검토 요구.
      success_criteria:
      - nft list ruleset | grep accept 로 허용 규칙 전량 열거
      - grep -c rule 로 총 규칙 개수 카운트
      - any/0.0.0.0/0 광범위 허용 식별하여 불필요 규칙 도출
      acceptable_methods:
      - nft list ruleset | grep accept
      - iptables -L -n -v | grep ACCEPT 레거시 대체
      - ufw status verbose 로 UFW 기반 조회
      - firewalld firewall-cmd --list-all 로 대체 확인
      negative_signs:
      - nft list 없이 설명만
      - accept 필터 없이 전체 ruleset 덤프
      - 규칙 타당성 검증 프로세스 누락
  target_vm: secu
  script: echo '=== 방화벽 규칙 감사 ===' && sudo nft list ruleset 2>/dev/null | grep -i 'accept' && echo '---
    전체 규칙 수 ---' && sudo nft list ruleset 2>/dev/null | grep -c 'rule'
  risk_level: low
  bastion_prompt: '방화벽 감사: 불필요한 허용 규칙이 있는지 분석해줘'
- order: 6
  instruction: '로그 관리 감사: 핵심 로그 파일의 무결성과 보관 상태를 점검하시오.'
  hint: 주요 로그 파일의 크기, 권한, 최근 기록을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 로그 관리 감사: 핵심 로그 파일의 무결성과 보관 상태를 점검해줘

    📎 참고 (CLI): echo ''=== 로그 관리 감사 ==='' && ls -lh /var/log/auth.log /var/log/syslog /var/log/kern.log
    2>/dev/null && echo ''[로그 회전 설정]'' && cat /etc/logrotate.d/rsyslog 2>/dev/null | head -10 && echo
    ''[최근 auth 로그]'' && sudo tail -3 /var/log/auth.log'
  answer_detail: 로그 관리 감사에서는 로그의 존재 여부, 적절한 권한(640 이하), 보관 기간(logrotate), 원격 전송 여부, 위변조 방지 대책을 확인합니다.
    로그가 비어 있거나 최근 기록이 없으면 로깅이 중단된 것일 수 있습니다.
  verify:
    type: output_contains
    expect: 로그 관리 감사
    field: stdout
    semantic:
      intent: 로그 관리 감사 — ls -lh 로 /var/log/auth.log /var/log/syslog /var/log/kern.log 3개 핵심 로그의 크기/권한/mtime
        확인, cat /etc/logrotate.d/rsyslog 로 보관 주기 정책 확인, sudo tail -3 /var/log/auth.log 로 최근 기록 존재 검증.
        로그 중단/권한 초과/보관 미흡 탐지.
      success_criteria:
      - ls -lh 로 3개 로그 파일의 크기 및 권한(640 이하 권장) 확인
      - logrotate.d/rsyslog 로 회전/보관 정책(주기, 보관 세대) 검증
      - tail -3 /var/log/auth.log 로 최근 기록 유무 확인하여 로깅 중단 여부 판단
      acceptable_methods:
      - ls -lh + cat logrotate + tail 3단계 조합
      - stat 명령으로 권한/atime/mtime 상세 조회
      - journalctl --disk-usage 로 journald 기반 저장소 크기 확인
      - auditctl -s 로 auditd 상태와 로그 파일 정책 조회
      negative_signs:
      - 로그 파일 3개 중 일부 누락
      - logrotate 설정 확인 누락
