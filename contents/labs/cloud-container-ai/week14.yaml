lab_id: cloud-container-ai-week14
title: 컨테이너 컴플라이언스 점검 실습 (AI 지원)
version: ai
course: cloud-container-ai
week: 14
description: CIS Docker Benchmark를 기반으로 Docker 환경의 컴플라이언스를 점검합니다. 호스트 설정, 데몬 설정, 컨테이너
  런타임, 이미지, 네트워크 보안을 체계적으로 평가합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- CIS Docker Benchmark의 주요 점검 항목을 이해한다
- Docker 환경의 컴플라이언스 준수 여부를 자동 점검한다
- 점검 결과를 기반으로 개선 계획을 수립한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'WEB 서버({{WEB_IP}})에서 CIS 1.1: Docker 호스트의 OS를 점검하시오.'
  hint: OS 버전, 커널, Docker 버전을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 CIS 1.1: Docker 호스트의 OS를 점검해줘

    📎 참고 (CLI): echo "=== CIS 1.1 호스트 OS ==="; cat /etc/os-release | grep PRETTY;
    uname -r; docker version --format "Docker: {{.Server.Version}}"'''
  answer_detail: CIS Docker Benchmark 1.1은 Docker 전용 OS 또는 강화된 OS 사용을 권고합니다. Ubuntu,
    CentOS 등 범용 OS에서는 불필요한 서비스를 최소화해야 합니다. 커널 버전은 최신 보안 패치가 적용된 것이어야 합니다.
  verify:
    type: output_contains
    expect:
    - CIS 1.1
    - Ubuntu
    - Jammy
    field: stdout
    semantic:
      intent: 'CIS 1.1 Host Configuration — cat /etc/os-release | grep PRETTY + uname
        -r + docker version --format Docker: {{.Server.Version}}. CIS Docker Benchmark
        Section 1: Host Configuration. Docker-optimized OS 권장: Bottlerocket(AWS),
        Flatcar(Kinvolk), Talos Linux(K8s), CoreOS(deprecated). 범용 OS 시 강화 필요: 최신
        커널(security patches), 불필요 서비스 제거, auditd 활성. Docker 버전은 최신 안정(CVE fixed) -
        예: CVE-2024-21626 runc escape 는 v1.1.12+ 필요'
      success_criteria:
      - /etc/os-release + uname -r + docker version 출력
      - CIS 1.1 문자열 포함
      - 호스트 OS 정보
      acceptable_methods:
      - cat /etc/os-release + uname -r + docker version
      - hostnamectl 으로 통합 정보
      - lsb_release -a
      - dpkg -l | grep -i kernel / rpm -q kernel
      - docker-bench-security 자동 평가
      negative_signs:
      - OS 또는 커널 하나만 확인
      - CIS 버전 언급 없음
      - Bottlerocket/Flatcar 같은 컨테이너 OS 언급 없음
  target_vm: web
  script: 'echo "=== CIS 1.1 호스트 OS ==="; cat /etc/os-release | grep PRETTY; uname
    -r; docker version --format "Docker: {{.Server.Version}}"'''
  risk_level: low
  bastion_prompt: 'WEB 서버(10.20.30.80)에서 CIS 1.1: Docker 호스트의 OS를 점검해줘'
- order: 2
  instruction: 'CIS 2.x: Docker 데몬 설정을 점검하시오.'
  hint: daemon.json과 Docker 데몬 실행 옵션을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: CIS 2.x: Docker 데몬 설정을 점검해줘

    📎 참고 (CLI): echo "=== CIS 2.x Docker 데몬 ==="; echo "[2.1 네트워크 트래픽 제한]" && docker
    info --format "{{.LiveRestoreEnabled}}" 2>/dev/null | xargs -I{} echo "Live Restore:
    {}"; echo "[2.2 로깅 레벨]" && ps aux | grep dockerd | grep -oP "log-level=\S+" ||
    echo "기본 로그 레벨"; echo "[2.5 insecure-registries]" && cat /etc/docker/daemon.json
    2>/dev/null | grep insecure || echo "insecure-registries 없음"; echo "[2.8 사용자 namespace]"
    && docker info --format "{{.SecurityOptions}}" 2>/dev/null'''
  answer_detail: CIS Section 2는 Docker 데몬 설정을 다룹니다. 2.1 네트워크 트래픽 제한, 2.5 insecure-registries
    비사용, 2.8 사용자 namespace 활성화, 2.14 live-restore 활성화 등이 주요 항목입니다.
  verify:
    type: output_contains
    expect: CIS 2.x
    field: stdout
    semantic:
      intent: 'CIS Section 2 - Docker Daemon Configuration — 2.1 Live Restore, 2.2
        log-level, 2.5 insecure-registries, 2.8 user namespace remapping. Live Restore(live-restore:
        true): daemon 재시작 시에도 컨테이너 유지. log-level(info 이상 권장). insecure-registries
        는 HTTP 허용으로 MITM 취약(절대 지양). userns-remap: default 로 root UID remap. 각 설정은
        /etc/docker/daemon.json 또는 ExecStart flag. docker info --format 으로 현재 상태 조회'
      success_criteria:
      - CIS 2.x 문자열 포함
      - daemon 설정 항목 최소 2개 조회
      - Live Restore/insecure-registries/namespace
      acceptable_methods:
      - docker info --format + ps aux grep dockerd
      - cat /etc/docker/daemon.json | jq
      - systemctl show docker --property ExecStart
      - CIS docker-bench-security 2.x 평가
      - Trivy config 로 daemon.json 검증
      negative_signs:
      - 점검 항목 1개만
      - 기본값 정상 판정(취약 설정)
      - daemon.json 참조 없음
  target_vm: web
  script: 'echo "=== CIS 2.x Docker 데몬 ==="; echo "[2.1 네트워크 트래픽 제한]" && docker info
    --format "{{.LiveRestoreEnabled}}" 2>/dev/null | xargs -I{} echo "Live Restore:
    {}"; echo "[2.2 로깅 레벨]" && ps aux | grep dockerd | grep -oP "log-level=\S+" ||
    echo "기본 로그 레벨"; echo "[2.5 insecure-registries]" && cat /etc/docker/daemon.json
    2>/dev/null | grep insecure || echo "insecure-registries 없음"; echo "[2.8 사용자 namespace]"
    && docker info --format "{{.SecurityOptions}}" 2>/dev/null'''
  risk_level: low
  bastion_prompt: 'CIS 2.x: Docker 데몬 설정을 점검해줘'
- order: 3
  instruction: 'CIS 3.x: Docker 데몬 파일 권한을 점검하시오.'
  hint: docker.sock, daemon.json, 인증서 파일의 권한을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: CIS 3.x: Docker 데몬 파일 권한을 점검해줘

    📎 참고 (CLI): echo "=== CIS 3.x 파일 권한 ==="; echo "[3.1 docker.service]" && stat
    -c "%a %U:%G" /lib/systemd/system/docker.service 2>/dev/null; echo "[3.3 docker.sock]"
    && stat -c "%a %U:%G" /var/run/docker.sock 2>/dev/null; echo "[3.7 daemon.json]"
    && stat -c "%a %U:%G" /etc/docker/daemon.json 2>/dev/null || echo "daemon.json
    없음"; echo "[3.15 Docker Root]" && stat -c "%a %U:%G" /var/lib/docker 2>/dev/null'
  answer_detail: CIS Section 3은 Docker 관련 파일과 디렉터리의 권한을 점검합니다. docker.sock은 660, daemon.json은
    644, Docker Root는 710 이하여야 합니다. 과도한 권한은 비인가 사용자의 Docker 제어를 허용합니다.
  verify:
    type: output_contains
    expect: CIS 3.x
    field: stdout
    semantic:
      intent: 'CIS Section 3 - Docker Daemon Files 권한 — stat -c %a %U:%G 로 주요 파일:
        3.1 docker.service(644), 3.3 docker.sock(660 root:docker), 3.7 daemon.json(644),
        3.15 /var/lib/docker(700). 권한 과대 시 비인가 사용자의 Docker 제어 가능 → root 획득. auditd
        watch 추가 권장: -w /etc/docker/daemon.json -p wa. CIS docker-bench-security 자동
        점검. Linux DAC + SELinux/AppArmor MAC 병행'
      success_criteria:
      - stat 으로 4+ 파일 권한 조회
      - CIS 3.x 문자열 포함
      - 권한 + 소유자 출력
      acceptable_methods:
      - stat -c %a %U:%G 각 파일
      - find / -perm -o+w -path "*docker*"
      - auditctl -w <file> -p wa -k docker_changes
      - ls -laZ(SELinux context)
      - Ansible ansible.posix.synchronize 로 권한 일괄 수정
      negative_signs:
      - 일부 파일만 점검
      - 소유자 확인 누락
      - auditd watch 없음
  target_vm: web
  script: echo "=== CIS 3.x 파일 권한 ==="; echo "[3.1 docker.service]" && stat -c "%a
    %U:%G" /lib/systemd/system/docker.service 2>/dev/null; echo "[3.3 docker.sock]"
    && stat -c "%a %U:%G" /var/run/docker.sock 2>/dev/null; echo "[3.7 daemon.json]"
    && stat -c "%a %U:%G" /etc/docker/daemon.json 2>/dev/null || echo "daemon.json
    없음"; echo "[3.15 Docker Root]" && stat -c "%a %U:%G" /var/lib/docker 2>/dev/null
  risk_level: low
  bastion_prompt: 'CIS 3.x: Docker 데몬 파일 권한을 점검해줘'
- order: 4
  instruction: 'CIS 4.x: 컨테이너 이미지 보안을 점검하시오.'
  hint: 이미지의 USER 설정, 태그, HEALTHCHECK를 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: CIS 4.x: 컨테이너 이미지 보안을 점검해줘

    📎 참고 (CLI): echo "=== CIS 4.x 이미지 보안 ==="; for IMG in $(docker images --format
    "{{.Repository}}:{{.Tag}}" | head -5); do echo "--- $IMG ---"; echo "[4.1 USER
    설정]" && docker inspect $IMG --format "User: {{.Config.User}}" 2>/dev/null | grep
    -q "User: $" && echo "  미설정(root)" || docker inspect $IMG --format "User: {{.Config.User}}"
    2>/dev/null; echo "[4.6 HEALTHCHECK]" && docker inspect $IMG --format "{{.Config.Healthcheck}}"
    2>/dev/null | grep -q "<nil>" && echo "  미설정" || echo "  설정됨"; done'''
  answer_detail: CIS Section 4는 컨테이너 이미지와 Dockerfile 보안을 다룹니다. 4.1 USER 지시어로 비root
    지정, 4.3 불필요한 패키지 제거, 4.6 HEALTHCHECK 추가, 4.9 COPY 사용(ADD 대신), 4.10 secrets를 Dockerfile에
    포함하지 않을 것.
  verify:
    type: output_contains
    expect:
    - CIS 4.x
    - docker_manage
    - limit_test
    field: stdout
    semantic:
      intent: 'CIS Section 4 - Container Images — for IMG in 이미지들; do 4.1 USER (Config.User
        비어있으면 root), 4.6 HEALTHCHECK (Config.Healthcheck null 이면 미설정). CIS Section
        4 주요 항목: 4.1 USER non-root, 4.3 unnecessary packages 제거(alpine/distroless),
        4.6 HEALTHCHECK, 4.7 specific tag(latest 금지), 4.9 COPY(ADD 금지), 4.10 secrets
        미포함. Dockerfile 빌드 시점 요구사항. Hadolint + trivy image scan 자동 검증'
      success_criteria:
      - for IMG 반복 + USER + HEALTHCHECK 점검
      - CIS 4.x 문자열 포함
      - 미설정/설정됨 판정
      acceptable_methods:
      - for + docker inspect --format User/Healthcheck
      - hadolint Dockerfile
      - trivy image --severity HIGH
      - dockle <image>(CIS+best practice)
      - Chainguard Wolfi/distroless 활용
      negative_signs:
      - USER 또는 HEALTHCHECK 중 하나만
      - hadolint 언급 없음
      - latest 태그 경고 없음
  target_vm: web
  script: 'echo "=== CIS 4.x 이미지 보안 ==="; for IMG in $(docker images --format "{{.Repository}}:{{.Tag}}"
    | head -5); do echo "--- $IMG ---"; echo "[4.1 USER 설정]" && docker inspect $IMG
    --format "User: {{.Config.User}}" 2>/dev/null | grep -q "User: $" && echo "  미설정(root)"
    || docker inspect $IMG --format "User: {{.Config.User}}" 2>/dev/null; echo "[4.6
    HEALTHCHECK]" && docker inspect $IMG --format "{{.Config.Healthcheck}}" 2>/dev/null
    | grep -q "<nil>" && echo "  미설정" || echo "  설정됨"; done'''
  risk_level: low
  bastion_prompt: 'CIS 4.x: 컨테이너 이미지 보안을 점검해줘'
- order: 5
  instruction: 'CIS 5.x: 컨테이너 런타임 보안을 점검하시오.'
  hint: 실행 중인 컨테이너의 보안 옵션을 일괄 점검하세요.
  category: audit
  points: 14
  answer: '🤖 프롬프트: CIS 5.x: 컨테이너 런타임 보안을 점검해줘

    📎 참고 (CLI): echo "=== CIS 5.x 런타임 보안 ==="; for CID in $(docker ps -q); do NAME=$(docker
    inspect --format="{{.Name}}" $CID | tr -d "/"); echo "--- $NAME ---"; echo "[5.1]
    AppArmor: $(docker inspect --format="{{.AppArmorProfile}}" $CID 2>/dev/null)";
    echo "[5.4] Privileged: $(docker inspect --format="{{.HostConfig.Privileged}}"
    $CID)"; echo "[5.10] Memory: $(docker inspect --format="{{.HostConfig.Memory}}"
    $CID)"; echo "[5.12] ReadOnly: $(docker inspect --format="{{.HostConfig.ReadonlyRootfs}}"
    $CID)"; echo "[5.25] Restart: $(docker inspect --format="{{.HostConfig.RestartPolicy.Name}}"
    $CID)"; done || echo "실행 중인 컨테이너 없음"'''
  answer_detail: CIS Section 5는 컨테이너 런타임 보안을 다룹니다. 5.1 AppArmor 프로파일 적용, 5.4 privileged
    비사용, 5.10 메모리 제한, 5.12 읽기 전용 파일시스템, 5.25 restart 정책 설정 등 30개 이상의 점검 항목이 있습니다.
  verify:
    type: output_contains
    expect: CIS 5.x
    field: stdout
    semantic:
      intent: 'CIS Section 5 - Container Runtime — for CID 루프: 5.1 AppArmorProfile,
        5.4 Privileged, 5.10 Memory, 5.12 ReadonlyRootfs, 5.25 RestartPolicy. CIS
        Section 5 는 30+ 항목으로 가장 광범위. 5.1 AppArmor/SELinux, 5.4 no --privileged, 5.5
        sensitive host directory no bind, 5.7 no privileged ports(< 1024), 5.10 memory
        limit, 5.11 CPU limit, 5.12 read-only rootfs, 5.25 restart policy 5번 이하, 5.28
        PIDs cgroup limit. 종합 하드닝'
      success_criteria:
      - for CID 루프 5+ 항목 점검
      - CIS 5.x 문자열 포함
      - 각 컨테이너 보안 속성 출력
      acceptable_methods:
      - for + docker inspect --format 각 항목
      - docker-bench-security -c check_5 (Section 5만)
      - kube-bench master(K8s 대응)
      - Trivy config + OPA 통합
      - AdmissionController Policy
      negative_signs:
      - 항목 3개 이하
      - 컨테이너별 결과 비교 없음
      - docker-bench-security 미사용
  target_vm: web
  script: 'echo "=== CIS 5.x 런타임 보안 ==="; for CID in $(docker ps -q); do NAME=$(docker
    inspect --format="{{.Name}}" $CID | tr -d "/"); echo "--- $NAME ---"; echo "[5.1]
    AppArmor: $(docker inspect --format="{{.AppArmorProfile}}" $CID 2>/dev/null)";
    echo "[5.4] Privileged: $(docker inspect --format="{{.HostConfig.Privileged}}"
    $CID)"; echo "[5.10] Memory: $(docker inspect --format="{{.HostConfig.Memory}}"
    $CID)"; echo "[5.12] ReadOnly: $(docker inspect --format="{{.HostConfig.ReadonlyRootfs}}"
    $CID)"; echo "[5.25] Restart: $(docker inspect --format="{{.HostConfig.RestartPolicy.Name}}"
    $CID)"; done || echo "실행 중인 컨테이너 없음"'''
  risk_level: low
  bastion_prompt: 'CIS 5.x: 컨테이너 런타임 보안을 점검해줘'
- order: 6
  instruction: 'CIS 6.x: Docker 보안 운영을 점검하시오.'
  hint: 이미지 스캔, Content Trust, 시크릿 관리를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: CIS 6.x: Docker 보안 운영을 점검해줘

    📎 참고 (CLI): echo "=== CIS 6.x 보안 운영 ==="; echo "[6.1] 이미지 스캔" && which trivy 2>/dev/null
    && echo "trivy 설치됨" || echo "취약점 스캔 도구 미설치"; echo "[6.2] Content Trust" && echo
    "DOCKER_CONTENT_TRUST=${DOCKER_CONTENT_TRUST:-비활성}"; echo "[6.5] Docker Swarm"
    && docker info --format "Swarm: {{.Swarm.LocalNodeState}}" 2>/dev/null'''
  answer_detail: CIS Section 6는 Docker 보안 운영을 다룹니다. 6.1 이미지의 정기적 취약점 스캔, 6.2 Docker
    Content Trust 활성화, 6.5 불필요한 Swarm 비활성화. 보안 운영은 기술적 설정뿐 아니라 프로세스와 절차도 포함합니다.
  verify:
    type: output_contains
    expect:
    - CIS 6.x
    - Docker
    field: stdout
    semantic:
      intent: 'CIS Section 6 - Docker Security Operations — 6.1 이미지 vuln scan(trivy/grype/snyk),
        6.2 Content Trust, 6.5 Swarm LocalNodeState. Section 6 는 프로세스 + 운영 측면: 6.1
        image vulnerability scanning 정기 수행, 6.2 DOCKER_CONTENT_TRUST=1, 6.5 swarm
        cluster 불필요시 inactive. 실무 도구: Trivy(오픈소스·빠름), Grype(Syft + DB), Snyk(상용),
        Anchore, Aqua Trivy. CI/CD pipeline 통합 필수'
      success_criteria:
      - which trivy + DOCKER_CONTENT_TRUST + Swarm state
      - CIS 6.x 문자열 포함
      - 보안 운영 상태
      acceptable_methods:
      - which trivy + echo $DOCKER_CONTENT_TRUST + docker info Swarm
      - trivy image --severity HIGH,CRITICAL <image>
      - grype <image>(Anchore)
      - snyk container test <image>
      - Harbor 내장 스캐너 활용
      negative_signs:
      - vuln scan 도구 미확인
      - Content Trust 비활성 정상 판정
      - CI 통합 언급 없음
  target_vm: web
  script: 'echo "=== CIS 6.x 보안 운영 ==="; echo "[6.1] 이미지 스캔" && which trivy 2>/dev/null
    && echo "trivy 설치됨" || echo "취약점 스캔 도구 미설치"; echo "[6.2] Content Trust" && echo
    "DOCKER_CONTENT_TRUST=${DOCKER_CONTENT_TRUST:-비활성}"; echo "[6.5] Docker Swarm"
    && docker info --format "Swarm: {{.Swarm.LocalNodeState}}" 2>/dev/null'''
  risk_level: low
  bastion_prompt: 'CIS 6.x: Docker 보안 운영을 점검해줘'
- order: 7
  instruction: CIS Docker Benchmark 종합 점검 스크립트를 작성하고 실행하시오.
  hint: CIS 1~6 섹션의 핵심 항목을 자동 판정하세요.
  category: audit
  points: 12
  answer: "\U0001F916 프롬프트: CIS Docker Benchmark 종합 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를\
    \ 설명해줘\n\U0001F4CE 참고 (CLI): cat << 'SCRIPT' > /tmp/cis_benchmark.sh\n#!/bin/bash\n\
    HOST='ccc@10.20.30.80'\necho '=== CIS Docker Benchmark 종합 점검 ==='\nPASS=0; FAIL=0;\
    \ WARN=0\nresult() {\n  case $2 in\n    PASS) PASS=$((PASS+1)); echo \"  [PASS]\
    \ $1\" ;;\n    FAIL) FAIL=$((FAIL+1)); echo \"  [FAIL] $1\" ;;\n    *) WARN=$((WARN+1));\
    \ echo \"  [WARN] $1\" ;;\n  esac\n}\necho '[Section 2: 데몬 설정]'\nINSECURE=$(grep\
    \ -c insecure /etc/docker/daemon.json 2>/dev/null || echo 0 2>/dev/null)\nresult\
    \ '2.5 insecure-registries' \"$([ \"$INSECURE\" = '0' ] && echo PASS || echo FAIL)\"\
    \necho '[Section 3: 파일 권한]'\nSOCK=$(ssh $HOST 'stat -c %a /var/run/docker.sock'\
    \ 2>/dev/null)\nresult \"3.3 docker.sock ($SOCK)\" \"$([ \"$SOCK\" -le 660 ] &&\
    \ echo PASS || echo WARN)\"\necho '[Section 5: 런타임]'\nPRIV=$(docker ps -q | xargs\
    \ -I{} docker inspect --format=\"{{.HostConfig.Privileged}}\" {} 2>/dev/null |\
    \ grep -c true)\nresult \"5.4 Privileged ($PRIV건)\" \"$([ \"$PRIV\" = '0' ] &&\
    \ echo PASS || echo FAIL)\"\nROOT=$(ssh $HOST 'docker ps -q | xargs -I{} docker\
    \ inspect --format=\"{{.Config.User}}\" {} 2>/dev/null | grep -c \"^$\"')\nresult\
    \ \"5.x Non-root (root실행: $ROOT건)\" \"$([ \"$ROOT\" = '0' ] && echo PASS || echo\
    \ WARN)\"\necho ''\necho \"결과: PASS=$PASS FAIL=$FAIL WARN=$WARN\"\necho '=== CIS\
    \ Benchmark 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/cis_benchmark.sh && bash /tmp/cis_benchmark.sh"
