lab_id: cloud-container-ai-week10
title: CI/CD 파이프라인 보안 실습 (AI 지원)
version: ai
course: cloud-container-ai
week: 10
description: CI/CD 파이프라인에서 Docker 이미지 빌드와 배포의 보안을 점검합니다. Dockerfile 보안 분석, 이미지 서명, 레지스트리 보안, 빌드 아티팩트 검증을
  수행합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- CI/CD 파이프라인의 보안 위험 요소를 이해한다
- Dockerfile의 보안 모범 사례를 적용한다
- 이미지 빌드와 배포 단계의 보안 점검 방법을 습득한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 Dockerfile 보안 점검을 수행하시오. 보안 모범 사례 위반 항목을 식별합니다.
  hint: 테스트용 Dockerfile을 작성하고 보안 이슈를 분석하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 Dockerfile 보안 점검을 수행해줘

    📎 참고 (CLI): cat << "DFILE" > /tmp/test.Dockerfile

    FROM ubuntu:latest

    RUN apt-get update && apt-get install -y curl wget

    ENV DB_PASSWORD=mysecret123

    RUN echo "root:password" | chpasswd

    ADD https://example.com/app.tar.gz /app/

    EXPOSE 22 80 443 8080

    CMD ["bash"]

    DFILE

    echo "=== Dockerfile 보안 분석 ==="

    grep -n "latest" /tmp/test.Dockerfile && echo "  -> 위험: latest 태그 사용"

    grep -n "PASSWORD\|SECRET\|KEY" /tmp/test.Dockerfile && echo "  -> 위험: 민감정보 하드코딩"

    grep -n "ADD http" /tmp/test.Dockerfile && echo "  -> 위험: 원격 ADD 사용"

    grep -n "EXPOSE 22" /tmp/test.Dockerfile && echo "  -> 위험: SSH 포트 노출"

    grep -q "USER" /tmp/test.Dockerfile || echo "  -> 위험: USER 미지정 (root 실행)"

    grep -q "HEALTHCHECK" /tmp/test.Dockerfile || echo "  -> 권고: HEALTHCHECK 미설정"'''
  answer_detail: 'Dockerfile 보안 모범 사례: (1) 특정 태그 사용(latest 금지), (2) 민감 정보 하드코딩 금지, (3) ADD 대신 COPY 사용,
    (4) USER로 비root 지정, (5) 불필요한 포트 노출 금지, (6) HEALTHCHECK 설정, (7) multi-stage build로 빌드 도구 제거.'
  verify:
    type: output_contains
    expect: Dockerfile 보안 분석
    field: stdout
    semantic:
      intent: 'Dockerfile 보안 anti-pattern 스캔 — test.Dockerfile 작성 후 grep 기반 정적 분석: FROM latest, ENV PASSWORD,
        RUN chpasswd, ADD http, EXPOSE 22, USER 누락, HEALTHCHECK 누락. 7가지 common Dockerfile misconfiguration.
        CIS Docker Benchmark 4.x: base image specific tag, non-root USER, HEALTHCHECK 등. Hadolint 도구로
        자동 linting 권장(CI 에 통합). OWASP Docker Top 10'
      success_criteria:
      - test.Dockerfile heredoc 작성
      - grep 기반 정적 스캔
      - Dockerfile 보안 분석 문자열 출력
      acceptable_methods:
      - heredoc 작성 + grep 기반 anti-pattern 검출
      - hadolint /tmp/test.Dockerfile(전문 린터)
      - trivy config /path/Dockerfile
      - dockle <image>
      - Checkov + CI 통합
      negative_signs:
      - 일부 anti-pattern 만 점검(3개 이하)
      - hadolint 같은 전문 도구 언급 없음
      - CI 통합 고려 없음
  target_vm: web
  script: 'cat << "DFILE" > /tmp/test.Dockerfile

    FROM ubuntu:latest

    RUN apt-get update && apt-get install -y curl wget

    ENV DB_PASSWORD=mysecret123

    RUN echo "root:password" | chpasswd

    ADD https://example.com/app.tar.gz /app/

    EXPOSE 22 80 443 8080

    CMD ["bash"]

    DFILE

    echo "=== Dockerfile 보안 분석 ==="

    grep -n "latest" /tmp/test.Dockerfile && echo "  -> 위험: latest 태그 사용"

    grep -n "PASSWORD\|SECRET\|KEY" /tmp/test.Dockerfile && echo "  -> 위험: 민감정보 하드코딩"

    grep -n "ADD http" /tmp/test.Dockerfile && echo "  -> 위험: 원격 ADD 사용"

    grep -n "EXPOSE 22" /tmp/test.Dockerfile && echo "  -> 위험: SSH 포트 노출"

    grep -q "USER" /tmp/test.Dockerfile || echo "  -> 위험: USER 미지정 (root 실행)"

    grep -q "HEALTHCHECK" /tmp/test.Dockerfile || echo "  -> 권고: HEALTHCHECK 미설정"'''
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)에서 Dockerfile 보안 점검을 수행해줘
- order: 2
  instruction: 보안이 적용된 Dockerfile을 작성하시오.
  hint: 위에서 식별된 모든 보안 이슈를 해결하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 보안이 적용된 Dockerfile을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat << "DFILE" > /tmp/secure.Dockerfile

    FROM alpine:3.19

    RUN addgroup -S appgroup && adduser -S appuser -G appgroup

    COPY --chown=appuser:appgroup . /app/

    WORKDIR /app

    RUN apk add --no-cache tini

    EXPOSE 8080

    HEALTHCHECK --interval=30s --timeout=3s CMD wget -q --spider http://localhost:8080/ || exit 1

    USER appuser

    ENTRYPOINT ["tini", "--"]

    CMD ["./app"]

    DFILE

    echo "=== 보안 Dockerfile ==="

    cat /tmp/secure.Dockerfile'''
  answer_detail: '보안 Dockerfile의 핵심: alpine(최소 이미지), 특정 버전 태그(3.19), adduser(비root 사용자), COPY(ADD 대신),
    --no-cache(캐시 제거로 이미지 최소화), HEALTHCHECK(상태 확인), USER(비root 실행), tini(PID 1 init 프로세스로 좀비 프로세스 방지).'
  verify:
    type: output_contains
    expect: 보안 Dockerfile
    field: stdout
    semantic:
      intent: 보안 hardened Dockerfile 작성 — FROM alpine:3.19(특정 버전) + adduser -S(비루트 system user) + COPY
        --chown(권한 동시 설정) + apk --no-cache(layer 최적화) + HEALTHCHECK(readiness) + USER appuser + ENTRYPOINT
        [tini, --](PID 1 init, 좀비 프로세스 방지). Distroless 로 더 강화 가능. Multi-stage build 로 빌드 도구 분리(최종 이미지에
        gcc/make 불포함). SBOM 생성 포함 권장
      success_criteria:
      - secure.Dockerfile 작성
      - FROM alpine:<버전> + USER + HEALTHCHECK 포함
      - 보안 Dockerfile 문자열 출력
      acceptable_methods:
      - alpine:3.19 + addgroup/adduser + tini + USER
      - distroless 이미지(gcr.io/distroless/static-debian12)
      - scratch 베이스 + static binary
      - multi-stage build (FROM builder AS ... + FROM final)
      - Wolfi 이미지(Chainguard)
      negative_signs:
      - latest tag 사용
      - USER 지시어 누락
      - tini 또는 proper init 없음
  target_vm: web
  script: 'cat << "DFILE" > /tmp/secure.Dockerfile

    FROM alpine:3.19

    RUN addgroup -S appgroup && adduser -S appuser -G appgroup

    COPY --chown=appuser:appgroup . /app/

    WORKDIR /app

    RUN apk add --no-cache tini

    EXPOSE 8080

    HEALTHCHECK --interval=30s --timeout=3s CMD wget -q --spider http://localhost:8080/ || exit 1

    USER appuser

    ENTRYPOINT ["tini", "--"]

    CMD ["./app"]

    DFILE

    echo "=== 보안 Dockerfile ==="

    cat /tmp/secure.Dockerfile'''
  risk_level: low
  bastion_prompt: 보안이 적용된 Dockerfile을 작성하시오.
- order: 3
  instruction: Docker 이미지의 레이어 수와 크기를 분석하시오. 레이어 최적화는 보안과 성능에 모두 중요합니다.
  hint: docker history로 레이어를 분석하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 미지의 레이어 수와 크기를분석해줘

    📎 참고 (CLI): for IMG in $(docker images --format "{{.Repository}}:{{.Tag}}" | head -3); do echo "===
    $IMG ==="; docker history $IMG --format "{{.Size}}\t{{.CreatedBy}}" 2>/dev/null | head -5; echo "";
    done'
  answer_detail: 각 RUN 명령은 새 레이어를 생성합니다. RUN apt-get update && apt-get install && apt-get clean처럼 체이닝하면
    레이어 수를 줄이고 불필요한 파일(캐시, 임시 파일)이 레이어에 남지 않습니다. CI/CD에서 이미지 크기는 빌드/배포 속도와 보안에 직접 영향을 미칩니다.
  verify:
    type: output_contains
    expect: ===
    field: stdout
    semantic:
      intent: '이미지 레이어 수·크기 분석 — for IMG in $(docker images ...); do docker history $IMG --format {{.Size}}\t{{.CreatedBy}};
        done. 각 RUN/COPY/ADD = 1 layer. 레이어 최적화 패턴: RUN apt-get update && apt-get install -y <pkgs> &&
        apt-get clean && rm -rf /var/lib/apt/lists/*. 체이닝으로 중간 산출물이 layer 에 잔존 방지(캐시·임시 파일 제거). 크기 = 공격
        표면 + 빌드/배포 속도. dive 도구로 layer 별 효율성 점수 확인'
      success_criteria:
      - docker history 실행
      - === 구분자 출력
      - Size/CreatedBy 정보
      acceptable_methods:
      - for + docker history --format
      - dive <image> 로 상세 layer 분석
      - docker image inspect --format {{.RootFS.Layers}}
      - syft <image> 로 package list
      - docker buildx imagetools inspect
      negative_signs:
      - 레이어 수만 집계(크기 무시)
      - dive 같은 도구 언급 없음
      - RUN 체이닝 패턴 모름
  target_vm: web
  script: for IMG in $(docker images --format "{{.Repository}}:{{.Tag}}" | head -3); do echo "=== $IMG
    ==="; docker history $IMG --format "{{.Size}}\t{{.CreatedBy}}" 2>/dev/null | head -5; echo ""; done
  risk_level: low
  bastion_prompt: 미지의 레이어 수와 크기를분석해줘
- order: 4
  instruction: Docker Content Trust(이미지 서명) 설정을 확인하시오.
  hint: DOCKER_CONTENT_TRUST 환경 변수를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: Docker Content Trust(이미지 서명) 설정을 확인해줘

    📎 참고 (CLI): echo "DOCKER_CONTENT_TRUST=${DOCKER_CONTENT_TRUST:-미설정(비활성)}" && echo "--- Docker Notary
    상태 ---" && docker trust inspect --pretty alpine:latest 2>/dev/null || echo "Content Trust 서명 정보 없음"'
  answer_detail: Docker Content Trust(DCT)는 이미지 서명과 검증을 제공합니다. DOCKER_CONTENT_TRUST=1을 설정하면 서명되지 않은 이미지의
    pull/run이 차단됩니다. CI/CD에서 빌드한 이미지에 서명하고, 배포 시 서명을 검증하면 공급망(supply chain) 공격을 방지할 수 있습니다.
  verify:
    type: output_contains
    expect: DOCKER_CONTENT_TRUST
    field: stdout
    semantic:
      intent: 'Docker Content Trust(DCT) 확인 — echo DOCKER_CONTENT_TRUST=${DOCKER_CONTENT_TRUST:-미설정} +
        docker trust inspect --pretty alpine:latest. DCT 는 Notary v1 기반 image signing + verification.
        export DOCKER_CONTENT_TRUST=1 설정 시 unsigned image 의 pull/run/push 차단. CI/CD 파이프라인: docker trust
        sign <image>:<tag> 로 서명 후 push. 현대적 대안: Sigstore Cosign (keyless signing + Rekor transparency
        log), Notation(ORAS). Supply Chain 공격(solarwinds·codecov) 방어의 핵심'
      success_criteria:
      - DOCKER_CONTENT_TRUST 값 확인
      - docker trust inspect 시도
      - DOCKER_CONTENT_TRUST 키워드 출력
      acceptable_methods:
      - echo $DOCKER_CONTENT_TRUST + docker trust inspect
      - cosign sign / cosign verify <image>
      - notation sign / notation verify
      - ORAS + in-toto attestation
      - SLSA provenance generation
      negative_signs:
      - DCT 비활성 정상 판정
      - Cosign 대안 언급 없음
      - Supply Chain 공격 맥락 이해 없음
  target_vm: web
  script: echo "DOCKER_CONTENT_TRUST=${DOCKER_CONTENT_TRUST:-미설정(비활성)}" && echo "--- Docker Notary 상태
    ---" && docker trust inspect --pretty alpine:latest 2>/dev/null || echo "Content Trust 서명 정보 없음"
  risk_level: low
  bastion_prompt: Docker Content Trust(이미지 서명) 설정을 확인해줘
- order: 5
  instruction: 이미지 빌드 시 사용하는 Docker BuildKit의 보안 기능을 확인하시오.
  hint: DOCKER_BUILDKIT 환경 변수와 빌드 캐시를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 이미지 빌드 시 사용하는 Docker BuildKit의 보안 기능을 확인해줘

    📎 참고 (CLI): echo "DOCKER_BUILDKIT=${DOCKER_BUILDKIT:-미설정}" && echo "--- 빌드 캐시 ---" && docker builder
    prune --dry-run 2>/dev/null || echo "BuildKit 캐시 없음" && echo "--- 빌더 정보 ---" && docker buildx ls 2>/dev/null
    || echo "buildx 미설치"'
  answer_detail: BuildKit(DOCKER_BUILDKIT=1)은 Docker의 차세대 빌드 엔진으로, --secret(빌드 시 민감 정보 안전 전달), --ssh(SSH
    에이전트 포워딩), 병렬 빌드, 캐시 최적화를 제공합니다. CI/CD 파이프라인에서 빌드 속도와 보안을 동시에 향상시킵니다.
  verify:
    type: output_contains
    expect: DOCKER_BUILDKIT
    field: stdout
    semantic:
      intent: 'BuildKit 보안 기능 확인 — echo DOCKER_BUILDKIT=${DOCKER_BUILDKIT:-미설정} + docker builder prune
        --dry-run + docker buildx ls. BuildKit v2 기능: (1) --secret id=mysecret,src=file(빌드 시 secret 파일
        마운트, layer 저장 안 됨) (2) --ssh default(SSH agent 포워딩 - git clone 프라이빗) (3) 병렬 빌드 DAG (4) 캐시 마운트
        --mount=type=cache. DOCKER_BUILDKIT=1 또는 docker buildx. K8s: Kaniko(rootless)/BuildKit daemon
        사용. CI 에 BuildKit 표준'
      success_criteria:
      - DOCKER_BUILDKIT 확인
      - builder/buildx 상태 출력
      - DOCKER_BUILDKIT 키워드
      acceptable_methods:
      - echo DOCKER_BUILDKIT + docker buildx ls + builder prune
      - docker buildx create --use(builder instance)
      - Kaniko /kaniko/executor(K8s rootless build)
      - Buildah/Podman build(OCI 호환)
      - img(rootless)
      negative_signs:
      - BuildKit 비활성(legacy builder)
      - --secret 옵션 이해 없음
      - Kaniko 대안 언급 없음
  target_vm: web
  script: echo "DOCKER_BUILDKIT=${DOCKER_BUILDKIT:-미설정}" && echo "--- 빌드 캐시 ---" && docker builder prune
    --dry-run 2>/dev/null || echo "BuildKit 캐시 없음" && echo "--- 빌더 정보 ---" && docker buildx ls 2>/dev/null
    || echo "buildx 미설치"
  risk_level: low
  bastion_prompt: 이미지 빌드 시 사용하는 Docker BuildKit의 보안 기능을 확인해줘
- order: 6
  instruction: 레지스트리에서 이미지를 pull할 때의 보안 설정을 확인하시오.
  hint: daemon.json에서 insecure-registries를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 레지스트리에서 이미지를 pull할 때의 보안 설정을 확인해줘

    📎 참고 (CLI): echo "=== 레지스트리 보안 ==="; cat /etc/docker/daemon.json 2>/dev/null | grep -i "insecure\|registry"
    || echo "insecure-registries 미설정 (안전)"; echo "--- 인증 정보 ---"; ls -la ~/.docker/config.json 2>/dev/null
    || echo "Docker 로그인 정보 없음"'
  answer_detail: insecure-registries는 HTTPS 없이 레지스트리에 접근을 허용하여 MITM 공격에 취약합니다. CI/CD에서는 반드시 HTTPS 레지스트리를
    사용하고, ~/.docker/config.json의 인증 정보는 credential helper로 안전하게 관리해야 합니다.
  verify:
    type: output_contains
    expect: 레지스트리 보안
    field: stdout
    semantic:
      intent: Registry 보안 — cat /etc/docker/daemon.json | grep insecure + ls ~/.docker/config.json. insecure-registries
        는 HTTP (평문) 레지스트리 허용 → MITM 공격 취약 (이미지 교체, credential sniff). Production 에서는 HTTPS only (mTLS
        권장). ~/.docker/config.json 에 credential 저장 - credential helper(docker-credential-desktop/pass/secretservice)
        로 암호화 권장. Harbor/Artifactory/ECR private registry + Vulnerability scanning 통합
      success_criteria:
      - daemon.json 조회 + config.json 확인
      - 레지스트리 보안 문자열 출력
      - insecure 설정 확인
      acceptable_methods:
      - cat daemon.json | grep insecure + ls ~/.docker/config.json
      - docker-credential-pass / docker-credential-secretservice
      - ECR/Harbor/GCR + mTLS
      - OCI 1.0 client authentication(docker login)
      - Kubernetes imagePullSecrets
      negative_signs:
      - insecure-registries 허용 정상 판정
      - credential helper 개념 없음
      - Private registry scanning 언급 없음
  target_vm: web
  script: echo "=== 레지스트리 보안 ==="; cat /etc/docker/daemon.json 2>/dev/null | grep -i "insecure\|registry"
    || echo "insecure-registries 미설정 (안전)"; echo "--- 인증 정보 ---"; ls -la ~/.docker/config.json 2>/dev/null
    || echo "Docker 로그인 정보 없음"
  risk_level: low
  bastion_prompt: 레지스트리에서 이미지를 pull할 때의 보안 설정을 확인해줘
- order: 7
  instruction: CI/CD 보안 종합 점검 스크립트를 작성하고 실행하시오.
  hint: Dockerfile 분석, 이미지 서명, 레지스트리, 빌드 캐시를 종합 점검하세요.
  category: audit
  points: 18
  answer: '🤖 프롬프트: CI/CD 보안 종합 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/cicd_security.sh

    #!/bin/bash

    echo ''=== CI/CD 파이프라인 보안 점검 ===''

    echo ''[이미지 태그 점검]''

