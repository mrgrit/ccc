lab_id: cloud-container-ai-week11
title: IaC(Infrastructure as Code) 보안 실습 (AI 지원)
version: ai
course: cloud-container-ai
week: 11
description: docker-compose.yml 파일을 IaC의 관점에서 보안 점검합니다. 설정 파일의 보안 분석, 민감 정보 관리, 서비스
  정의의 보안 모범 사례를 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- IaC 보안의 핵심 원칙(코드 리뷰, 정적 분석, 비밀 관리)을 이해한다
- docker-compose.yml의 보안 설정을 분석한다
- IaC 파일의 보안 모범 사례를 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버(10.20.30.80)에 보안 취약점이 있는 docker-compose.yml을 작성하고 문제점을 분석하시오.
  hint: privileged, 환경변수 비밀번호, host 네트워크 등의 보안 이슈를 포함하세요.
  category: audit
  points: 10
  answer: "cat << \"YAML\" > /tmp/insecure-compose.yml\nversion: \"3\"\nservices:\n\
    \  web:\n    image: nginx:latest\n    privileged: true\n    network_mode: host\n\
    \    ports:\n      - \"80:80\"\n    environment:\n      - DB_PASSWORD=admin123\n\
    \    volumes:\n      - /:/hostroot\n  db:\n    image: mysql:latest\n    environment:\n\
    \      - MYSQL_ROOT_PASSWORD=root123\nYAML\necho \"=== 보안 분석 ===\"\ngrep -n \"\
    privileged: true\" /tmp/insecure-compose.yml && echo \"  [위험] privileged 모드\"\n\
    grep -n \"PASSWORD\" /tmp/insecure-compose.yml && echo \"  [위험] 평문 비밀번호\"\ngrep\
    \ -n \"network_mode: host\" /tmp/insecure-compose.yml && echo \"  [위험] host 네트워크\"\
    \ngrep -n \"/:/hostroot\" /tmp/insecure-compose.yml && echo \"  [위험] 루트 마운트\"\n\
    grep -n \"latest\" /tmp/insecure-compose.yml && echo \"  [위험] latest 태그\""
  answer_detail: 'IaC 파일의 정적 분석(Static Analysis)은 Terraform의 tfsec, Kubernetes의 kubesec,
    Docker의 hadolint와 같은 도구로 수행합니다. docker-compose.yml에서 흔한 보안 이슈: privileged 모드,
    평문 비밀번호, host 네트워크, 과도한 볼륨 마운트, latest 태그 사용.'
  verify:
    type: output_contains
    expect: 보안 분석
    field: stdout
  target_vm: web
  script: "cat << \"YAML\" > /tmp/insecure-compose.yml\nversion: \"3\"\nservices:\n\
    \  web:\n    image: nginx:latest\n    privileged: true\n    network_mode: host\n\
    \    ports:\n      - \"80:80\"\n    environment:\n      - DB_PASSWORD=admin123\n\
    \    volumes:\n      - /:/hostroot\n  db:\n    image: mysql:latest\n    environment:\n\
    \      - MYSQL_ROOT_PASSWORD=root123\nYAML\necho \"=== 보안 분석 ===\"\ngrep -n \"\
    privileged: true\" /tmp/insecure-compose.yml && echo \"  [위험] privileged 모드\"\n\
    grep -n \"PASSWORD\" /tmp/insecure-compose.yml && echo \"  [위험] 평문 비밀번호\"\ngrep\
    \ -n \"network_mode: host\" /tmp/insecure-compose.yml && echo \"  [위험] host 네트워크\"\
    \ngrep -n \"/:/hostroot\" /tmp/insecure-compose.yml && echo \"  [위험] 루트 마운트\"\n\
    grep -n \"latest\" /tmp/insecure-compose.yml && echo \"  [위험] latest 태그\""
  risk_level: low
  bastion_prompt: WEB 서버(10 구현 방법과 예시를 설명해줘
- order: 2
  instruction: 보안이 적용된 docker-compose.yml을 작성하시오.
  hint: 모든 보안 이슈를 해결한 설정 파일을 작성하세요.
  category: config
  points: 14
  answer: "cat << \"YAML\" > /tmp/secure-compose.yml\nversion: \"3.8\"\nservices:\n\
    \  web:\n    image: nginx:1.25-alpine\n    read_only: true\n    tmpfs:\n     \
    \ - /tmp\n      - /var/cache/nginx\n      - /var/run\n    cap_drop:\n      - ALL\n\
    \    cap_add:\n      - NET_BIND_SERVICE\n    security_opt:\n      - no-new-privileges:true\n\
    \    deploy:\n      resources:\n        limits:\n          memory: 128M\n    \
    \      cpus: \"0.5\"\n    ports:\n      - \"127.0.0.1:8080:80\"\n    networks:\n\
    \      - frontend\n    user: \"101:101\"\n  db:\n    image: mysql:8.0\n    read_only:\
    \ true\n    tmpfs:\n      - /tmp\n      - /var/run/mysqld\n    cap_drop:\n   \
    \   - ALL\n    cap_add:\n      - DAC_OVERRIDE\n      - SETGID\n      - SETUID\n\
    \    security_opt:\n      - no-new-privileges:true\n    volumes:\n      - db-data:/var/lib/mysql\n\
    \    networks:\n      - backend\n    env_file:\n      - .env.db\nvolumes:\n  db-data:\n\
    networks:\n  frontend:\n  backend:\n    internal: true\nYAML\necho \"=== 보안 Compose\
    \ ===\"\ncat /tmp/secure-compose.yml"
  answer_detail: '보안 docker-compose.yml의 핵심: 특정 이미지 태그, read_only 파일시스템, cap_drop
    ALL, no-new-privileges, 자원 제한, 로컬 바인드(127.0.0.1), 네트워크 분리(frontend/backend), DB는
    internal 네트워크, env_file로 비밀 분리, named volume으로 데이터 관리.'
  verify:
    type: output_contains
    expect: 보안 Compose
    field: stdout
  target_vm: web
  script: "cat << \"YAML\" > /tmp/secure-compose.yml\nversion: \"3.8\"\nservices:\n\
    \  web:\n    image: nginx:1.25-alpine\n    read_only: true\n    tmpfs:\n     \
    \ - /tmp\n      - /var/cache/nginx\n      - /var/run\n    cap_drop:\n      - ALL\n\
    \    cap_add:\n      - NET_BIND_SERVICE\n    security_opt:\n      - no-new-privileges:true\n\
    \    deploy:\n      resources:\n        limits:\n          memory: 128M\n    \
    \      cpus: \"0.5\"\n    ports:\n      - \"127.0.0.1:8080:80\"\n    networks:\n\
    \      - frontend\n    user: \"101:101\"\n  db:\n    image: mysql:8.0\n    read_only:\
    \ true\n    tmpfs:\n      - /tmp\n      - /var/run/mysqld\n    cap_drop:\n   \
    \   - ALL\n    cap_add:\n      - DAC_OVERRIDE\n      - SETGID\n      - SETUID\n\
    \    security_opt:\n      - no-new-privileges:true\n    volumes:\n      - db-data:/var/lib/mysql\n\
    \    networks:\n      - backend\n    env_file:\n      - .env.db\nvolumes:\n  db-data:\n\
    networks:\n  frontend:\n  backend:\n    internal: true\nYAML\necho \"=== 보안 Compose\
    \ ===\"\ncat /tmp/secure-compose.yml"
  risk_level: low
  bastion_prompt: 보안이 적용된 docker-compose 구현 방법과 예시를 설명해줘
- order: 3
  instruction: 두 파일의 보안 설정 차이를 분석하시오.
  hint: diff로 두 파일을 비교하세요.
  category: audit
  points: 10
  answer: 'echo "=== 보안 개선 항목 ==="; echo "[1] 이미지 태그: latest -> 특정 버전"; echo "[2]
    privileged: true -> cap_drop ALL"; echo "[3] network_mode: host -> 분리된 네트워크";
    echo "[4] 평문 비밀번호 -> env_file"; echo "[5] / 마운트 -> named volume"; echo "[6] 추가:
    read_only, no-new-privileges, 자원 제한"; echo "--- 파일 크기 비교 ---"; wc -l /tmp/insecure-compose.yml
    /tmp/secure-compose.yml'''
  answer_detail: 보안 설정은 파일 크기를 증가시키지만, 각 라인이 특정 위협을 방어합니다. IaC에서는 이런 보안 설정을 팀의 표준
    템플릿으로 관리하고, 코드 리뷰에서 보안 항목을 체크리스트로 점검합니다.
  verify:
    type: output_contains
    expect: 보안 개선 항목
    field: stdout
  target_vm: web
  script: 'echo "=== 보안 개선 항목 ==="; echo "[1] 이미지 태그: latest -> 특정 버전"; echo "[2]
    privileged: true -> cap_drop ALL"; echo "[3] network_mode: host -> 분리된 네트워크";
    echo "[4] 평문 비밀번호 -> env_file"; echo "[5] / 마운트 -> named volume"; echo "[6] 추가:
    read_only, no-new-privileges, 자원 제한"; echo "--- 파일 크기 비교 ---"; wc -l /tmp/insecure-compose.yml
    /tmp/secure-compose.yml'''
  risk_level: low
  bastion_prompt: 두 파일의 보안 설정 차이를 분석해줘
- order: 4
  instruction: Docker Secrets를 활용한 민감 정보 관리 방법을 확인하시오.
  hint: docker secret 명령을 사용하세요 (Swarm 모드 필요).
  category: audit
  points: 10
  answer: 'echo "=== Docker Secrets 대안 ==="; echo "[방법1] env_file: .env 파일 분리 (.gitignore
    추가 필수)"; echo -e "DB_PASSWORD=secure_pass_here\nAPI_KEY=key_here" > /tmp/.env.example;
    cat /tmp/.env.example; echo ""; echo "[방법2] Docker Swarm Secrets"; docker secret
    ls 2>/dev/null || echo "Swarm 미활성 - secret 사용 불가"; echo "[방법3] 볼륨 마운트 시크릿"; echo
    "  volumes: [./secrets/db_pass:/run/secrets/db_pass:ro]"'''
  answer_detail: '민감 정보 관리 방법: (1) env_file - 환경 변수 파일 분리, .gitignore에 추가하여 VCS에 커밋
    방지, (2) Docker Swarm Secrets - 암호화된 시크릿 관리, /run/secrets/에 마운트, (3) 외부 시크릿 매니저
    - HashiCorp Vault, AWS Secrets Manager 연동. 절대 docker-compose.yml에 평문 비밀번호를 넣지
    마세요.'
  verify:
    type: output_contains
    expect: Docker Secrets 대안
    field: stdout
  target_vm: web
  script: 'echo "=== Docker Secrets 대안 ==="; echo "[방법1] env_file: .env 파일 분리 (.gitignore
    추가 필수)"; echo -e "DB_PASSWORD=secure_pass_here\nAPI_KEY=key_here" > /tmp/.env.example;
    cat /tmp/.env.example; echo ""; echo "[방법2] Docker Swarm Secrets"; docker secret
    ls 2>/dev/null || echo "Swarm 미활성 - secret 사용 불가"; echo "[방법3] 볼륨 마운트 시크릿"; echo
    "  volumes: [./secrets/db_pass:/run/secrets/db_pass:ro]"'''
  risk_level: low
  bastion_prompt: Docker Secrets를 활용한 민감 정보 관리 방법을 확인해줘
- order: 5
  instruction: docker-compose.yml 파일의 버전 관리 보안을 점검하시오. Git에 민감 정보가 커밋되었는지 확인합니다.
  hint: .gitignore에 .env 파일이 포함되어 있는지 확인하세요.
  category: audit
  points: 10
  answer: echo "=== Git 보안 점검 시뮬레이션 ==="; echo "[.gitignore 권장 내용]"; echo -e ".env\n.env.*\n*.key\n*.pem\nsecrets/\n!.env.example"
    | tee /tmp/.gitignore.example; echo ""; echo "[민감 파일 검색]"; find /tmp -name ".env*"
    -o -name "*.key" -o -name "*secret*" 2>/dev/null | head -5
  answer_detail: IaC 보안에서 VCS(Git) 관리는 매우 중요합니다. .env 파일, 인증서, 키 파일이 실수로 커밋되면 Git
    이력에 영구 보존됩니다. git-secrets, truffleHog, gitleaks 같은 도구로 커밋 전 민감 정보를 스캔해야 합니다.
  verify:
    type: output_contains
    expect: .gitignore 권장 내용
    field: stdout
  target_vm: web
  script: echo "=== Git 보안 점검 시뮬레이션 ==="; echo "[.gitignore 권장 내용]"; echo -e ".env\n.env.*\n*.key\n*.pem\nsecrets/\n!.env.example"
    | tee /tmp/.gitignore.example; echo ""; echo "[민감 파일 검색]"; find /tmp -name ".env*"
    -o -name "*.key" -o -name "*secret*" 2>/dev/null | head -5
  risk_level: low
  bastion_prompt: docker-compose.yml 파일의 버전 관리 보안을 점검하시오. Git에 민감 정보가 커밋되었는지 확인해줘
- order: 6
  instruction: docker-compose.yml의 보안 자동 점검 스크립트를 작성하고 실행하시오.
  hint: compose 파일의 보안 위험 패턴을 grep으로 검사하세요.
  category: audit
  points: 16
  answer: "cat << 'SCRIPT' > /tmp/iac_security.sh\n#!/bin/bash\necho '=== IaC(docker-compose)\
    \ 보안 점검 ==='\nFILE=$1\n[ -z \"$FILE\" ] && FILE='/tmp/insecure-compose.yml'\n\
    echo \"대상: $FILE\"\nFINDINGS=0\ncheck() {\n  COUNT=$(grep -c \"$2\" $FILE 2>/dev/null)\n\
    \  if [ \"$COUNT\" -gt 0 ]; then\n    echo \"  [FAIL] $1 ($COUNT건)\"\n    FINDINGS=$((FINDINGS+COUNT))\n\
    \  else\n    echo \"  [PASS] $1\"\n  fi\n}\ncheck 'privileged 모드' 'privileged:\
    \ true'\ncheck '평문 비밀번호' 'PASSWORD='\ncheck 'host 네트워크' 'network_mode: host'\n\
    check 'latest 태그' ':latest'\ncheck '루트 볼륨 마운트' '- /:/'\ncheck 'docker.sock 마운트'\
    \ 'docker.sock'\necho \"\"\necho \"총 발견사항: ${FINDINGS}건\"\necho '=== IaC 보안 점검\
    \ 완료 ==='\nSCRIPT\nscp /tmp/iac_security.sh ccc@10.20.30.80:/tmp/ 2>/dev/null;\
    \ chmod +x /tmp/iac_security.sh && bash /tmp/iac_security.sh /tmp/insecure-compose.yml\
    \ && echo \"--- 보안 버전 ---\" && bash /tmp/iac_security.sh /tmp/secure-compose.yml"
  answer_detail: IaC 보안 점검 자동화는 DevSecOps의 핵심입니다. CI/CD 파이프라인에 이 스크립트를 통합하면 보안 이슈가
    있는 설정이 배포되는 것을 사전에 차단할 수 있습니다. 실무에서는 checkov, kics, trivy-config 같은 전문 도구를 사용합니다.
  verify:
    type: output_contains
    expect: IaC 보안 점검 완료
    field: stdout
  target_vm: web
  script: "cat << 'SCRIPT' > /tmp/iac_security.sh\n#!/bin/bash\necho '=== IaC(docker-compose)\
    \ 보안 점검 ==='\nFILE=$1\n[ -z \"$FILE\" ] && FILE='/tmp/insecure-compose.yml'\n\
    echo \"대상: $FILE\"\nFINDINGS=0\ncheck() {\n  COUNT=$(grep -c \"$2\" $FILE 2>/dev/null)\n\
    \  if [ \"$COUNT\" -gt 0 ]; then\n    echo \"  [FAIL] $1 ($COUNT건)\"\n    FINDINGS=$((FINDINGS+COUNT))\n\
    \  else\n    echo \"  [PASS] $1\"\n  fi\n}\ncheck 'privileged 모드' 'privileged:\
    \ true'\ncheck '평문 비밀번호' 'PASSWORD='\ncheck 'host 네트워크' 'network_mode: host'\n\
    check 'latest 태그' ':latest'\ncheck '루트 볼륨 마운트' '- /:/'\ncheck 'docker.sock 마운트'\
    \ 'docker.sock'\necho \"\"\necho \"총 발견사항: ${FINDINGS}건\"\necho '=== IaC 보안 점검\
    \ 완료 ==='\nSCRIPT\nscp /tmp/iac_security.sh ccc@10.20.30.80:/tmp/ 2>/dev/null;\
    \ chmod +x /tmp/iac_security.sh && bash /tmp/iac_security.sh /tmp/insecure-compose.yml\
    \ && echo \"--- 보안 버전 ---\" && bash /tmp/iac_security.sh /tmp/secure-compose.yml"
  risk_level: low
  bastion_prompt: docker-compose 구현 방법과 예시를 설명해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  bastion_prompt: "web VM에서 다음 작업들을 순서대로 수행해줘:\n1) WEB 서버(10 \n2) 보안이 적용된 docker-compose\
    \ \n3) 두 파일의 보안 설정 차이를 분석해줘\n4) Docker Secrets를 활용한 민감 정보 관리 방법을 확인해줘\n5) docker-compose.yml\
    \ 파일의 버전 관리 보안을 점검하시오. Git에 민감 정보가 커밋되었는지 확인 작업을 수행해줘"
  hint: 복합 작업은 Bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  risk_level: low
  answer: ''
  answer_detail: Bastion이 5개 작업을 순차적으로 계획(planning)하고 실행(executing)한 뒤 종합 분석(validating)하는
    다단계 작업.
  script: ''
