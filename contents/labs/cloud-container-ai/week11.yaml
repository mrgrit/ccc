  answer: "\U0001F916 프롬프트: docker-compose 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): cat\
    \ << 'SCRIPT' > /tmp/iac_security.sh\n#!/bin/bash\necho '=== IaC(docker-compose)\
    \ 보안 점검 ==='\nFILE=$1\n[ -z \"$FILE\" ] && FILE='/tmp/insecure-compose.yml'\n\
    echo \"대상: $FILE\"\nFINDINGS=0\ncheck() {\n  COUNT=$(grep -c \"$2\" $FILE 2>/dev/null)\n\
    \  if [ \"$COUNT\" -gt 0 ]; then\n    echo \"  [FAIL] $1 ($COUNT건)\"\n    FINDINGS=$((FINDINGS+COUNT))\n\
    \  else\n    echo \"  [PASS] $1\"\n  fi\n}\ncheck 'privileged 모드' 'privileged:\
    \ true'\ncheck '평문 비밀번호' 'PASSWORD='\ncheck 'host 네트워크' 'network_mode: host'\n\
    check 'latest 태그' ':latest'\ncheck '루트 볼륨 마운트' '- /:/'\ncheck 'docker.sock 마운트'\
    \ 'docker.sock'\necho \"\"\necho \"총 발견사항: ${FINDINGS}건\"\necho '=== IaC 보안 점검\
    \ 완료 ==='\nSCRIPT\nscp /tmp/iac_security.sh ccc@10.20.30.80:/tmp/ 2>/dev/null;\
    \ chmod +x /tmp/iac_security.sh && bash /tmp/iac_security.sh /tmp/insecure-compose.yml\
    \ && echo \"--- 보안 버전 ---\" && bash /tmp/iac_security.sh /tmp/secure-compose.yml"
  answer_detail: IaC 보안 점검 자동화는 DevSecOps의 핵심입니다. CI/CD 파이프라인에 이 스크립트를 통합하면 보안 이슈가
    있는 설정이 배포되는 것을 사전에 차단할 수 있습니다. 실무에서는 checkov, kics, trivy-config 같은 전문 도구를 사용합니다.
