lab_id: cloud-container-ai-week02
title: AWS 보안 모델 실습 (Docker 시뮬레이션) (AI 지원)
version: ai
course: cloud-container-ai
week: 2
description: AWS 클라우드 보안 모델의 핵심 개념을 Docker 환경에서 시뮬레이션합니다. 보안 그룹(방화벽), IAM(접근 제어),
  VPC(네트워크 격리)에 대응하는 Docker 설정을 점검합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- AWS 공유 책임 모델의 보안 영역을 이해한다
- 보안 그룹에 대응하는 Docker 네트워크 필터링을 점검한다
- VPC에 대응하는 Docker 네트워크 격리를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 Docker 네트워크 목록을 확인하시오. AWS VPC와 유사한 네트워크 격리 구조를
    파악합니다.
  hint: docker network ls로 생성된 네트워크를 확인하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 Docker 네트워크 목록을 확인하시오. AWS VPC와 유사한 네트워크
    격리 구조를 파악해줘

    📎 참고 (CLI): docker network ls --format "table {{.Name}}\t{{.Driver}}\t{{.Scope}}"'
  answer_detail: AWS VPC(Virtual Private Cloud)는 클라우드에서 네트워크를 격리합니다. Docker의 bridge
    네트워크는 VPC의 서브넷과 유사합니다. 기본 bridge는 모든 컨테이너가 통신 가능하여 AWS의 기본 보안 그룹과 유사한 상태입니다.
  verify:
    type: output_contains
    expect: bridge
    field: stdout
    semantic:
      intent: 'Docker 네트워크 = AWS VPC 유사 구조 확인 — docker network ls --format table {{.Name}}\t{{.Driver}}\t{{.Scope}}.
        Docker network driver: bridge(default, single-host) = AWS default VPC, overlay(multi-host
        swarm) = AWS Transit Gateway, host = bypass isolation, macvlan = AWS ENI,
        none = no network. Scope: local(Docker daemon) vs swarm(cluster). VPC 서브넷
        개념 매핑: subnet·gateway 설정'
      success_criteria:
      - docker network ls 실행
      - bridge/host/none 드라이버 출력
      - Scope 정보 포함
      acceptable_methods:
      - docker network ls --format table
      - docker network ls -q(ID 만)
      - kubectl get networkpolicies(K8s 대응)
      - AWS CLI aws ec2 describe-vpcs 비교
      - Cilium policy 조회
      negative_signs:
      - VPC 와 Docker network 매핑 이해 없음
      - bridge 이외 드라이버 차이 모름
      - format 없이 긴 출력
  target_vm: web
  script: docker network ls --format "table {{.Name}}\t{{.Driver}}\t{{.Scope}}"
  risk_level: low
  bastion_prompt: 'WEB 서버(10.20.30.80)에서 Docker 네트워크 목록을 확인하시오. AWS VPC와 유사한 네트워크
    격리 구조를 파악해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 사용자 정의 격리 네트워크를 생성하시오. AWS의 프라이빗 서브넷과 유사한 격리 네트워크를 만듭니다.
  hint: docker network create로 새 브리지 네트워크를 생성하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 사용자 정의 격리 네트워크를 생성하시오. AWS의 프라이빗 서브넷과 유사한 격리 네트워크를 만듭니다해줘

    📎 참고 (CLI): docker network create --driver bridge --subnet 172.20.0.0/24 --gateway
    172.20.0.1 secure-net 2>/dev/null || echo "네트워크 이미 존재" && docker network inspect
    secure-net --format "Name: {{.Name}}

    Subnet: {{(index .IPAM.Config 0).Subnet}}

    Gateway: {{(index .IPAM.Config 0).Gateway}}"'''
  answer_detail: AWS에서 퍼블릭/프라이빗 서브넷을 분리하듯, Docker에서도 사용자 정의 네트워크로 컨테이너를 격리합니다. 사용자
    정의 네트워크는 기본 bridge와 달리 DNS 기반 서비스 디스커버리를 제공하고, 네트워크 간 통신을 차단합니다.
  verify:
    type: output_contains
    expect:
    - secure-net
    - isolated
    field: stdout
    semantic:
      intent: '사용자 정의 격리 네트워크(= AWS private subnet) 생성 — docker network create --driver
        bridge --subnet 172.20.0.0/24 --gateway 172.20.0.1 secure-net. User-defined
        bridge 장점(default bridge 대비): (1) DNS-based service discovery (컨테이너 이름으로 접근)
        (2) 더 강한 격리(inter-network 차단) (3) runtime config 변경 가능. --internal 옵션 추가 시
        외부 통신 완전 차단(airgap 시나리오). AWS VPC private subnet + no NAT gateway 와 동일 효과'
      success_criteria:
      - docker network create 실행
      - --subnet 또는 --gateway CIDR 지정
      - secure-net 이름 확인
      acceptable_methods:
      - docker network create --driver bridge --subnet ...
      - docker network create --internal my-net(외부 격리)
      - docker network create --attachable(swarm 서비스)
      - Cilium cluster mesh 로 K8s 대체
      - AWS VPC aws ec2 create-vpc + create-subnet 비교
      negative_signs:
      - default bridge 만 사용(격리 효과 적음)
      - CIDR 충돌(172.17.0.0/16 기본과)
      - --internal 고려 없음
  target_vm: web
  script: 'docker network create --driver bridge --subnet 172.20.0.0/24 --gateway
    172.20.0.1 secure-net 2>/dev/null || echo "네트워크 이미 존재" && docker network inspect
    secure-net --format "Name: {{.Name}}

    Subnet: {{(index .IPAM.Config 0).Subnet}}

    Gateway: {{(index .IPAM.Config 0).Gateway}}"'''
  risk_level: low
  bastion_prompt: 사용자 정의 격리 네트워크를 생성하시오. AWS의 프라이빗 서브넷과 유사한 격리 네트워크를 만듭니다해줘
- order: 3
  instruction: 컨테이너의 포트 매핑(포트 포워딩)을 확인하시오. AWS 보안 그룹의 인바운드 규칙과 유사합니다.
  hint: docker ps의 PORTS 컬럼이나 docker port 명령을 사용하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 컨테이너의 포트 매핑(포트 포워딩)을 확인하시오. AWS 보안 그룹의 인바운드 규칙과 유사해줘

    📎 참고 (CLI): docker ps --format "{{.Names}}: {{.Ports}}" 2>/dev/null && echo "---
    iptables NAT 규칙 ---" && sudo iptables -t nat -L DOCKER -n 2>/dev/null | head -10'''
  answer_detail: Docker의 포트 매핑(-p 8080:80)은 AWS 보안 그룹의 인바운드 규칙과 유사합니다. 0.0.0.0:8080->80은
    모든 IP에서 접근 가능하며, 127.0.0.1:8080->80은 로컬만 허용합니다. 불필요한 포트 노출은 보안 그룹의 과도한 인바운드 허용과
    같은 위험입니다.
  verify:
    type: output_contains
    expect:
    - DOCKER
    - 포트매핑
    field: stdout
    semantic:
      intent: '컨테이너 포트 매핑(= AWS Security Group 인바운드) — docker ps --format {{.Names}}:
        {{.Ports}} + sudo iptables -t nat -L DOCKER -n. Docker -p 8080:80 = AWS SG
        allow inbound 8080. 형식: 0.0.0.0:8080->80/tcp(전체 허용), 127.0.0.1:8080->80/tcp(로컬만).
        iptables DOCKER chain 에 DNAT rule 자동 생성. 노출 포트 최소화 원칙 - 불필요한 공개는 SG 과다 허용과
        동일 위험. 127.0.0.1 바인딩으로 host-only 제한 가능'
      success_criteria:
      - docker ps --format Ports 실행
      - iptables nat DOCKER chain 조회
      - 포트 바인딩 정보
      acceptable_methods:
      - docker ps + docker port <container> + iptables -t nat -L DOCKER
      - ss -tlnp | grep docker-proxy
      - docker inspect --format {{.NetworkSettings.Ports}}
      - AWS CLI aws ec2 describe-security-groups --filters Name=group-id
      - Calico Policy 로 K8s ingress 제어
      negative_signs:
      - 0.0.0.0 바인딩 디폴트 무시
      - SG 인바운드 매핑 이해 없음
      - iptables DOCKER chain 조사 누락
  target_vm: web
  script: 'docker ps --format "{{.Names}}: {{.Ports}}" 2>/dev/null && echo "--- iptables
    NAT 규칙 ---" && sudo iptables -t nat -L DOCKER -n 2>/dev/null | head -10'''
  risk_level: low
  bastion_prompt: 컨테이너의 포트 매핑(포트 포워딩)을 확인하시오. AWS 보안 그룹의 인바운드 규칙과 유사해줘
- order: 4
  instruction: Docker의 호스트 네트워크 모드 사용 여부를 점검하시오. host 네트워크는 네트워크 격리를 완전히 무력화합니다.
  hint: docker inspect로 각 컨테이너의 NetworkMode를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: Docker의 호스트 네트워크 모드 사용 여부를 점검하시오. host 네트워크는 네트워크 격리를 완전히 무력화해줘

    📎 참고 (CLI): docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: NetworkMode={{.HostConfig.NetworkMode}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: Docker의 --network host 모드는 컨테이너가 호스트의 네트워크 스택을 그대로 사용하여 네트워크 격리가
    없습니다. AWS에서 보안 그룹 없이 인스턴스를 운영하는 것과 같습니다. 프로덕션에서는 bridge 또는 사용자 정의 네트워크를 사용해야 합니다.
  verify:
    type: output_contains
    expect: NetworkMode
    field: stdout
    semantic:
      intent: 'host network mode 사용 여부 감사 — docker ps -q | xargs -I{} docker inspect
        --format={{.Name}}: NetworkMode={{.HostConfig.NetworkMode}} {} 2>/dev/null.
        --network host 는 컨테이너가 호스트 네트워크 스택 공유(격리 없음) - 성능 이점이지만 보안 위험. 컨테이너 내 서비스가
        호스트 모든 포트 바인딩 가능. AWS Security Group 없이 EC2 운영과 유사. 프로덕션에서는 사용 최소화, 고성능 필요
        시 macvlan/ipvlan 대안'
      success_criteria:
      - docker inspect NetworkMode 실행
      - 각 컨테이너 network mode 확인
      - host 모드 사용 여부 판정
      acceptable_methods:
      - docker ps -q | xargs docker inspect --format NetworkMode
      - docker ps --format {{.Names}}\t{{.Network}}
      - docker inspect <name> | jq .HostConfig.NetworkMode
      - kubernetes hostNetwork:true 필드 스캔
      - CIS Benchmark 5.9 host network 검사
      negative_signs:
      - network mode bridge vs host 구분 없음
      - host mode 사용 위험 이해 없음
      - 모든 컨테이너 조사 누락
  target_vm: web
  script: 'docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: NetworkMode={{.HostConfig.NetworkMode}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  risk_level: low
  bastion_prompt: Docker의 호스트 네트워크 모드 사용 여부를 점검하시오. host 네트워크는 네트워크 격리를 완전히 무력화해줘
- order: 5
  instruction: inter-container communication(ICC) 설정을 확인하시오. 기본 bridge에서 컨테이너 간 통신
    허용 여부를 점검합니다.
  hint: docker network inspect bridge에서 Options를 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: inter-container communication(ICC) 설정을 확인해줘

    📎 참고 (CLI): docker network inspect bridge --format "ICC: {{index .Options "com.docker.network.bridge.enable_icc"}}"
    2>/dev/null; echo "--- bridge 전체 옵션 ---" && docker network inspect bridge --format
    "{{json .Options}}" 2>/dev/null'''
  answer_detail: ICC(Inter-Container Communication)는 같은 네트워크의 컨테이너 간 직접 통신을 허용하는 설정입니다.
    기본값은 true로, 모든 컨테이너가 서로 통신할 수 있습니다. AWS의 보안 그룹처럼 필요한 통신만 허용하려면 ICC를 비활성화하고 link를
    사용하거나, 별도 네트워크로 분리해야 합니다.
  verify:
    type: output_contains
    expect: bridge
    field: stdout
    semantic:
      intent: 'ICC(Inter-Container Communication) 설정 확인 — docker network inspect bridge
        --format ICC: {{index .Options "com.docker.network.bridge.enable_icc"}}. ICC
        enable_icc=true(기본) 시 같은 bridge 내 모든 컨테이너 자유 통신 - lateral movement 취약. 기본
        bridge vs user-defined bridge 차이: user-defined 는 DNS 제공 + 더 세밀한 격리. ICC 차단:
        /etc/docker/daemon.json 에 icc: false + containers 간 --link 명시 또는 별도 network
        분리. Zero Trust microsegmentation'
      success_criteria:
      - docker network inspect bridge 실행
      - ICC 옵션 값 출력
      - bridge 키워드 포함
      acceptable_methods:
      - docker network inspect bridge --format ICC 옵션
      - 'daemon.json 에 icc: false 로 기본 비활성'
      - user-defined network 로 분리
      - 'Docker Compose v3 networks: 섹션'
      - Kubernetes NetworkPolicy 로 pod-to-pod 차단
      negative_signs:
      - ICC 개념 이해 없음
      - 기본 bridge/user-defined 차이 모름
      - lateral movement 위협 미인지
  target_vm: web
  script: 'docker network inspect bridge --format "ICC: {{index .Options "com.docker.network.bridge.enable_icc"}}"
    2>/dev/null; echo "--- bridge 전체 옵션 ---" && docker network inspect bridge --format
    "{{json .Options}}" 2>/dev/null'''
  risk_level: low
  bastion_prompt: inter-container communication(ICC) 설정을 확인해줘
- order: 6
  instruction: 호스트의 방화벽(nftables/iptables)에서 Docker 관련 규칙을 확인하시오.
  hint: iptables -L로 DOCKER 체인을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 호스트의 방화벽(nftables/iptables)에서 Docker 관련 규칙을 확인해줘

    📎 참고 (CLI): sudo iptables -L -n --line-numbers 2>/dev/null | head -30 && echo
    "--- DOCKER 체인 ---" && sudo iptables -L DOCKER -n 2>/dev/null | head -10'
  answer_detail: Docker는 자동으로 iptables 규칙을 생성하여 포트 매핑과 네트워크 라우팅을 처리합니다. DOCKER 체인에
    컨테이너별 접근 규칙이 정의됩니다. Docker의 iptables 조작이 호스트 방화벽 규칙과 충돌할 수 있으므로 주의가 필요합니다.
  verify:
    type: output_contains
    expect: Chain
    field: stdout
    semantic:
      intent: 'Host iptables 의 Docker 관련 규칙 검사 — sudo iptables -L -n --line-numbers
        + sudo iptables -L DOCKER -n. Docker daemon 이 자동으로 iptables 관리: FORWARD chain
        에 DOCKER-USER, DOCKER, DOCKER-ISOLATION-STAGE-1/2 chains 생성. nat table POSTROUTING
        에 MASQUERADE, PREROUTING 에 DOCKER chain(DNAT). 관리자 수동 규칙은 DOCKER-USER chain
        에 추가해야 Docker restart 시 보존됨. DOCKER chain 직접 수정 금지'
      success_criteria:
      - iptables -L 또는 DOCKER chain 조회
      - Chain 키워드 출력
      - Docker 관련 규칙 확인
      acceptable_methods:
      - sudo iptables -L -n --line-numbers + iptables -L DOCKER
      - sudo nft list ruleset | grep -i docker
      - iptables-save | grep -E DOCKER|docker0
      - 'ufw + Docker 호환성: --iptables=false + 수동 관리'
      - docker run --iptables=false 로 자동 관리 비활성
      negative_signs:
      - DOCKER chain vs DOCKER-USER 차이 이해 없음
      - 수동 iptables 수정 방법 잘못
      - iptables 대신 nftables 무조건 사용
  target_vm: web
  script: sudo iptables -L -n --line-numbers 2>/dev/null | head -30 && echo "--- DOCKER
    체인 ---" && sudo iptables -L DOCKER -n 2>/dev/null | head -10
  risk_level: low
  bastion_prompt: 호스트의 방화벽(nftables/iptables)에서 Docker 관련 규칙을 확인해줘
- order: 7
  instruction: Docker 로그 드라이버를 확인하시오. AWS CloudWatch와 유사한 로그 수집 체계를 점검합니다.
  hint: docker info에서 Logging Driver를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: Docker 로그 드라이버를 확인하시오. AWS CloudWatch와 유사한 로그 수집 체계를 점검해줘

    📎 참고 (CLI): docker info --format "Logging Driver: {{.LoggingDriver}}" 2>/dev/null
    && echo "--- 로그 위치 ---" && sudo ls -lh /var/lib/docker/containers/ 2>/dev/null
    | head -5'''
  answer_detail: Docker 기본 로깅 드라이버는 json-file로, 컨테이너 로그를 JSON 파일로 저장합니다. AWS CloudWatch에
    해당하는 중앙 로그 수집을 위해 syslog, fluentd, awslogs 드라이버를 사용할 수 있습니다. 로그 크기 제한(--log-opt
