lab_id: cloud-container-ai-week02
title: AWS 보안 모델 실습 (Docker 시뮬레이션) (AI 지원)
version: ai
course: cloud-container-ai
week: 2
description: AWS 클라우드 보안 모델의 핵심 개념을 Docker 환경에서 시뮬레이션합니다. 보안 그룹(방화벽), IAM(접근 제어), VPC(네트워크 격리)에 대응하는 Docker 설정을 점검합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- AWS 공유 책임 모델의 보안 영역을 이해한다
- 보안 그룹에 대응하는 Docker 네트워크 필터링을 점검한다
- VPC에 대응하는 Docker 네트워크 격리를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버(10.20.30.80)에서 Docker 네트워크 목록을 확인하시오. AWS VPC와 유사한 네트워크 격리 구조를 파악합니다.
  hint: docker network ls로 생성된 네트워크를 확인하세요.
  category: recon
  points: 10
  answer: ssh trainee@10.20.30.80 'docker network ls --format "table {{.Name}}\t{{.Driver}}\t{{.Scope}}"'
  answer_detail: AWS VPC(Virtual Private Cloud)는 클라우드에서 네트워크를 격리합니다. Docker의 bridge 네트워크는 VPC의 서브넷과 유사합니다. 기본 bridge는 모든 컨테이너가 통신 가능하여 AWS의 기본 보안 그룹과 유사한 상태입니다.
  verify:
    type: output_contains
    expect: bridge
    field: stdout
  target_vm: web
  script: ssh trainee@10.20.30.80 'docker network ls --format "table {{.Name}}\t{{.Driver}}\t{{.Scope}}"'
  risk_level: low
- order: 2
  instruction: 사용자 정의 격리 네트워크를 생성하시오. AWS의 프라이빗 서브넷과 유사한 격리 네트워크를 만듭니다.
  hint: docker network create로 새 브리지 네트워크를 생성하세요.
  category: config
  points: 10
  answer: 'ssh trainee@10.20.30.80 ''docker network create --driver bridge --subnet 172.20.0.0/24 --gateway 172.20.0.1 secure-net 2>/dev/null || echo "네트워크 이미 존재" && docker network inspect secure-net --format
    "Name: {{.Name}}

    Subnet: {{(index .IPAM.Config 0).Subnet}}

    Gateway: {{(index .IPAM.Config 0).Gateway}}"'''
  answer_detail: AWS에서 퍼블릭/프라이빗 서브넷을 분리하듯, Docker에서도 사용자 정의 네트워크로 컨테이너를 격리합니다. 사용자 정의 네트워크는 기본 bridge와 달리 DNS 기반 서비스 디스커버리를 제공하고, 네트워크 간 통신을 차단합니다.
  verify:
    type: output_contains
    expect: secure-net
    field: stdout
  target_vm: web
  script: 'ssh trainee@10.20.30.80 ''docker network create --driver bridge --subnet 172.20.0.0/24 --gateway 172.20.0.1 secure-net 2>/dev/null || echo "네트워크 이미 존재" && docker network inspect secure-net --format
    "Name: {{.Name}}

    Subnet: {{(index .IPAM.Config 0).Subnet}}

    Gateway: {{(index .IPAM.Config 0).Gateway}}"'''
  risk_level: low
- order: 3
  instruction: 컨테이너의 포트 매핑(포트 포워딩)을 확인하시오. AWS 보안 그룹의 인바운드 규칙과 유사합니다.
  hint: docker ps의 PORTS 컬럼이나 docker port 명령을 사용하세요.
  category: audit
  points: 10
  answer: 'ssh trainee@10.20.30.80 ''docker ps --format "{{.Names}}: {{.Ports}}" 2>/dev/null && echo "--- iptables NAT 규칙 ---" && sudo iptables -t nat -L DOCKER -n 2>/dev/null | head -10'''
  answer_detail: Docker의 포트 매핑(-p 8080:80)은 AWS 보안 그룹의 인바운드 규칙과 유사합니다. 0.0.0.0:8080->80은 모든 IP에서 접근 가능하며, 127.0.0.1:8080->80은 로컬만 허용합니다. 불필요한 포트 노출은 보안 그룹의 과도한 인바운드 허용과 같은 위험입니다.
  verify:
    type: output_contains
    expect: DOCKER
    field: stdout
  target_vm: web
  script: 'ssh trainee@10.20.30.80 ''docker ps --format "{{.Names}}: {{.Ports}}" 2>/dev/null && echo "--- iptables NAT 규칙 ---" && sudo iptables -t nat -L DOCKER -n 2>/dev/null | head -10'''
  risk_level: low
- order: 4
  instruction: Docker의 호스트 네트워크 모드 사용 여부를 점검하시오. host 네트워크는 네트워크 격리를 완전히 무력화합니다.
  hint: docker inspect로 각 컨테이너의 NetworkMode를 확인하세요.
  category: audit
  points: 10
  answer: 'ssh trainee@10.20.30.80 ''docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: NetworkMode={{.HostConfig.NetworkMode}}" {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: Docker의 --network host 모드는 컨테이너가 호스트의 네트워크 스택을 그대로 사용하여 네트워크 격리가 없습니다. AWS에서 보안 그룹 없이 인스턴스를 운영하는 것과 같습니다. 프로덕션에서는 bridge 또는 사용자 정의 네트워크를 사용해야 합니다.
  verify:
    type: output_contains
    expect: NetworkMode
    field: stdout
  target_vm: web
  script: 'ssh trainee@10.20.30.80 ''docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: NetworkMode={{.HostConfig.NetworkMode}}" {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  risk_level: low
- order: 5
  instruction: inter-container communication(ICC) 설정을 확인하시오. 기본 bridge에서 컨테이너 간 통신 허용 여부를 점검합니다.
  hint: docker network inspect bridge에서 Options를 확인하세요.
  category: audit
  points: 12
  answer: 'ssh trainee@10.20.30.80 ''docker network inspect bridge --format "ICC: {{index .Options "com.docker.network.bridge.enable_icc"}}" 2>/dev/null; echo "--- bridge 전체 옵션 ---" && docker network inspect
    bridge --format "{{json .Options}}" 2>/dev/null'''
  answer_detail: ICC(Inter-Container Communication)는 같은 네트워크의 컨테이너 간 직접 통신을 허용하는 설정입니다. 기본값은 true로, 모든 컨테이너가 서로 통신할 수 있습니다. AWS의 보안 그룹처럼 필요한 통신만 허용하려면 ICC를 비활성화하고 link를 사용하거나, 별도 네트워크로 분리해야 합니다.
  verify:
    type: output_contains
    expect: bridge
    field: stdout
  target_vm: web
  script: 'ssh trainee@10.20.30.80 ''docker network inspect bridge --format "ICC: {{index .Options "com.docker.network.bridge.enable_icc"}}" 2>/dev/null; echo "--- bridge 전체 옵션 ---" && docker network inspect
    bridge --format "{{json .Options}}" 2>/dev/null'''
  risk_level: low
- order: 6
  instruction: 호스트의 방화벽(nftables/iptables)에서 Docker 관련 규칙을 확인하시오.
  hint: iptables -L로 DOCKER 체인을 확인하세요.
  category: audit
  points: 10
  answer: ssh trainee@10.20.30.80 'sudo iptables -L -n --line-numbers 2>/dev/null | head -30 && echo "--- DOCKER 체인 ---" && sudo iptables -L DOCKER -n 2>/dev/null | head -10'
  answer_detail: Docker는 자동으로 iptables 규칙을 생성하여 포트 매핑과 네트워크 라우팅을 처리합니다. DOCKER 체인에 컨테이너별 접근 규칙이 정의됩니다. Docker의 iptables 조작이 호스트 방화벽 규칙과 충돌할 수 있으므로 주의가 필요합니다.
  verify:
    type: output_contains
    expect: Chain
    field: stdout
  target_vm: web
  script: ssh trainee@10.20.30.80 'sudo iptables -L -n --line-numbers 2>/dev/null | head -30 && echo "--- DOCKER 체인 ---" && sudo iptables -L DOCKER -n 2>/dev/null | head -10'
  risk_level: low
- order: 7
  instruction: Docker 로그 드라이버를 확인하시오. AWS CloudWatch와 유사한 로그 수집 체계를 점검합니다.
  hint: docker info에서 Logging Driver를 확인하세요.
  category: audit
  points: 10
  answer: 'ssh trainee@10.20.30.80 ''docker info --format "Logging Driver: {{.LoggingDriver}}" 2>/dev/null && echo "--- 로그 위치 ---" && sudo ls -lh /var/lib/docker/containers/ 2>/dev/null | head -5'''
  answer_detail: Docker 기본 로깅 드라이버는 json-file로, 컨테이너 로그를 JSON 파일로 저장합니다. AWS CloudWatch에 해당하는 중앙 로그 수집을 위해 syslog, fluentd, awslogs 드라이버를 사용할 수 있습니다. 로그 크기 제한(--log-opt max-size)을 설정하지 않으면 디스크를 소진할 수 있습니다.
  verify:
    type: output_contains
    expect: Logging Driver
    field: stdout
  target_vm: web
  script: 'ssh trainee@10.20.30.80 ''docker info --format "Logging Driver: {{.LoggingDriver}}" 2>/dev/null && echo "--- 로그 위치 ---" && sudo ls -lh /var/lib/docker/containers/ 2>/dev/null | head -5'''
  risk_level: low
- order: 8
  instruction: AWS 보안 모델 시뮬레이션 종합 점검 스크립트를 작성하고 실행하시오.
  hint: 네트워크 격리, 포트 노출, ICC, 로깅을 종합 점검하세요.
  category: audit
  points: 18
  answer: 'cat << ''SCRIPT'' > /tmp/aws_sim_check.sh

    #!/bin/bash

    HOST=''trainee@10.20.30.80''

    echo ''=== AWS 보안 모델 시뮬레이션 점검 ===''

    echo ''[VPC/네트워크 격리]''

    ssh $HOST ''docker network ls --format "{{.Name}}: {{.Driver}}"'' 2>/dev/null

    echo ''[보안 그룹/포트 노출]''

    ssh $HOST ''docker ps --format "{{.Names}}: {{.Ports}}"'' 2>/dev/null | head -5

    echo ''[호스트 네트워크 사용]''

    ssh $HOST ''docker ps -q 2>/dev/null | xargs -I{} docker inspect --format="{{.HostConfig.NetworkMode}}" {} 2>/dev/null'' | sort | uniq -c

    echo ''[CloudWatch/로깅]''

    ssh $HOST ''docker info --format "{{.LoggingDriver}}"'' 2>/dev/null

    echo ''=== AWS 시뮬레이션 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/aws_sim_check.sh && bash /tmp/aws_sim_check.sh'
  answer_detail: AWS의 공유 책임 모델에서 IaaS(EC2)의 경우 OS 이상의 보안은 고객 책임입니다. Docker 환경에서는 네트워크 격리(VPC/서브넷 -> Docker Network), 접근 제어(보안 그룹 -> 포트 매핑/iptables), 로깅(CloudWatch -> 로그 드라이버), IAM(IAM Role -> Linux 사용자/그룹)의
    매핑을 이해하는 것이 중요합니다.
  verify:
    type: output_contains
    expect: AWS 시뮬레이션 점검 완료
    field: stdout
  target_vm: web
  script: 'cat << ''SCRIPT'' > /tmp/aws_sim_check.sh

    #!/bin/bash

    HOST=''trainee@10.20.30.80''

    echo ''=== AWS 보안 모델 시뮬레이션 점검 ===''

    echo ''[VPC/네트워크 격리]''

    ssh $HOST ''docker network ls --format "{{.Name}}: {{.Driver}}"'' 2>/dev/null

    echo ''[보안 그룹/포트 노출]''

    ssh $HOST ''docker ps --format "{{.Names}}: {{.Ports}}"'' 2>/dev/null | head -5

    echo ''[호스트 네트워크 사용]''

    ssh $HOST ''docker ps -q 2>/dev/null | xargs -I{} docker inspect --format="{{.HostConfig.NetworkMode}}" {} 2>/dev/null'' | sort | uniq -c

    echo ''[CloudWatch/로깅]''

    ssh $HOST ''docker info --format "{{.LoggingDriver}}"'' 2>/dev/null

    echo ''=== AWS 시뮬레이션 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/aws_sim_check.sh && bash /tmp/aws_sim_check.sh'
  risk_level: low
