lab_id: cloud-container-ai-week04
title: Docker 보안 심화 점검 (AI 지원)
version: ai
course: cloud-container-ai
week: 4
description: Docker 컨테이너의 심화 보안 설정을 점검합니다. 리눅스 Capabilities, Seccomp 프로파일, 읽기 전용 파일시스템, no-new-privileges 등 런타임 보안 옵션을 확인합니다.
  AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Docker 컨테이너의 리눅스 Capabilities 설정을 이해한다
- Seccomp, AppArmor 프로파일 적용을 점검한다
- 런타임 보안 옵션(read-only, no-new-privileges)을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 실행 중인 컨테이너의 리눅스 Capabilities를 확인하시오.
  hint: docker inspect에서 CapAdd와 CapDrop을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 실행 중인 컨테이너의 리눅스 Capabilities를 확인해줘

    📎 참고 (CLI): docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}: CapAdd={{.HostConfig.CapAdd}} CapDrop={{.HostConfig.CapDrop}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: 리눅스 Capabilities는 root 권한을 세분화합니다. Docker는 기본적으로 14개 Capability를 부여하는데, NET_RAW(원시 소켓), SYS_CHROOT 등이 포함됩니다.
    --cap-drop ALL로 모든 Capability를 제거하고 필요한 것만 --cap-add로 추가하는 것이 최선의 관행입니다.
  verify:
    type: output_contains
    expect: Cap
    field: stdout
    semantic:
      intent: '클라우드·컨테이너 w4 s1 — WEB 서버({{WEB_IP}})에서 실행 중인 컨테이너의 리눅스 Capabilities를 확인하시오. (cmd: docker ps -q | head -3 |
        xargs -I{} docker inspect --format="{{.Name}}: CapAdd={)'
      success_criteria:
      - '명령 실행: docker ps -q | head -3 | xargs -I{} docker inspect --format='
      - 결과 출력 또는 로그 확인
      - 클라우드·컨테이너 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - 클라우드·컨테이너 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - 클라우드·컨테이너와 무관한 기법
  target_vm: web
  script: 'docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}: CapAdd={{.HostConfig.CapAdd}} CapDrop={{.HostConfig.CapDrop}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)에서 실행 중인 컨테이너의 리눅스 Capabilities를 확인해줘
- order: 2
  instruction: 컨테이너의 privileged 모드 사용 여부를 점검하시오. privileged 모드는 호스트의 모든 장치와 Capability에 접근합니다.
  hint: docker inspect에서 Privileged 항목을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 컨테이너의 privileged 모드 사용 여부를 점검하시오. privileged 모드는 호스트의 모든 장치와 Capability에 접근해줘

    📎 참고 (CLI): docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: Privileged={{.HostConfig.Privileged}}" {} 2>/dev/null
    || echo "실행 중인 컨테이너 없음"'''
