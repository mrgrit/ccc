    semantic:
      intent: '클라우드·컨테이너 w4 s2 — 컨테이너의 privileged 모드 사용 여부를 점검하시오. privileged 모드는 호스트의 모든 장치와 Capability에 접근합니다. (cmd: docker
        ps -q | xargs -I{} docker inspect --format="{{.Name}}: Privileged={{.Host)'
      success_criteria:
