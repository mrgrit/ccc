  hint: 보안 옵션(read-only, cap-drop, no-new-privileges)을 적용하여 nginx를 실행하세요.
  category: config
  points: 14
  answer: '🤖 프롬프트: 보안 설정이 적용된 테스트 컨테이너를 실행하고 설정을 검증해줘

    📎 참고 (CLI): docker run -d --name secure-test --read-only --tmpfs /tmp --tmpfs /var/cache/nginx --tmpfs /var/run --cap-drop
    ALL --cap-add NET_BIND_SERVICE --security-opt no-new-privileges --memory 128m --pids-limit 50 --user 101:101 nginx:latest
