  instruction: 컨테이너의 no-new-privileges 설정을 확인하시오. SUID를 통한 권한 상승을 방지합니다.
  hint: docker inspect에서 SecurityOpt를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 컨테이너의 no-new-privileges 설정을 확인하시오. SUID를 통한 권한 상승을 방지해줘

    📎 참고 (CLI): docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: SecurityOpt={{.HostConfig.SecurityOpt}}" {}
    2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: no-new-privileges(--security-opt=no-new-privileges)는 컨테이너 내부에서 SUID/SGID 바이너리를 통한 권한 상승을 방지합니다. 프로세스가 exec
    시 추가 권한을 획득할 수 없게 하여, setuid root 바이너리를 악용한 탈출을 차단합니다.
