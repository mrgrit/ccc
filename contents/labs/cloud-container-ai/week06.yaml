    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/iam_check.sh

    #!/bin/bash

    echo ''=== IAM/접근 제어 종합 점검 ===''

    echo ''[Docker 그룹 멤버]''

    getent group docker | cut -d: -f4 2>/dev/null

    echo ''[컨테이너 실행 사용자]''

    docker ps -q | xargs -I{} docker inspect --format="{{.Name}}: User={{if .Config.User}}{{.Config.User}}{{else}}root(기본){{end}}"
    {} 2>/dev/null | head -5

    echo ''[민감 환경변수]''

    docker ps -q | xargs -I{} docker inspect --format="{{range .Config.Env}}{{.}}\n{{end}}"
    {} 2>/dev/null | grep -icE "(PASS|SECRET|KEY|TOKEN)" 2>/dev/null | xargs -I{}
    echo "{}건 발견"

    echo ''[Privileged 컨테이너]''

    docker ps -q | xargs -I{} docker inspect --format="{{.Name}}:{{.HostConfig.Privileged}}"
    {} 2>/dev/null | grep true || echo ''없음''

    echo ''=== IAM 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/iam_check.sh && bash /tmp/iam_check.sh'
