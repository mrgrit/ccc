  hint: 현재 실행 중인 모든 컨테이너의 K8s 보안 기준 준수 여부를 점검하세요.
  category: audit
  points: 10
  answer: "\U0001F916 프롬프트: K8s 보안 시뮬레이션 종합 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ cat << 'SCRIPT' > /tmp/k8s_sim_check.sh\n#!/bin/bash\nHOST='ccc@10.20.30.80'\necho '=== K8s Pod\
    \ Security Standards 시뮬레이션 점검 ==='\n\nfor CID in $(docker ps -q); do\n  NAME=$(docker inspect --format=\"\
    {{.Name}}\" $CID)\n  PRIV=$(docker inspect --format=\"{{.HostConfig.Privileged}}\" $CID)\n  USER=$(docker\
    \ inspect --format=\"{{.Config.User}}\" $CID)\n  RO=$(docker inspect --format=\"{{.HostConfig.ReadonlyRootfs}}\"\
    \ $CID)\n  MEM=$(docker inspect --format=\"{{.HostConfig.Memory}}\" $CID)\n  echo \"$NAME:\"\n  [\
    \ \"$PRIV\" = \"true\" ] && echo \"  Privileged: FAIL\" || echo \"  Privileged: PASS\"\n  [ -z \"\
    $USER\" ] && echo \"  Non-root: WARN (root)\" || echo \"  Non-root: PASS ($USER)\"\n  [ \"$RO\" =\
    \ \"true\" ] && echo \"  ReadOnly: PASS\" || echo \"  ReadOnly: WARN\"\n  [ \"$MEM\" = \"0\" ] &&\
    \ echo \"  MemLimit: WARN (unlimited)\" || echo \"  MemLimit: PASS\"\ndone 2>/dev/null\necho '===\
    \ K8s 시뮬레이션 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/k8s_sim_check.sh && bash /tmp/k8s_sim_check.sh"
  answer_detail: Kubernetes 보안은 클러스터(RBAC, NetworkPolicy, PodSecurityStandards), 노드(OS 보안, kubelet), 컨테이너(이미지,
    런타임), 코드(취약점, 설정) 4개 계층으로 구성됩니다. Docker 환경에서 Pod Security Standards를 시뮬레이션하면 K8s 도입 전에 컨테이너 보안 기초를
    다질 수 있습니다.
