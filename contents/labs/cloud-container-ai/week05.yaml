lab_id: cloud-container-ai-week05
title: Kubernetes 보안 기초 (Docker 시뮬레이션) (AI 지원)
version: ai
course: cloud-container-ai
week: 5
description: Kubernetes의 핵심 보안 개념을 Docker 환경에서 시뮬레이션합니다. Pod 보안 컨텍스트, 서비스 계정, 네트워크 정책에 대응하는 Docker 보안
  설정을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Kubernetes Pod Security Standards의 핵심 개념을 이해한다
- 컨테이너 보안 컨텍스트에 대응하는 Docker 옵션을 적용한다
- 멀티 컨테이너 환경의 네트워크 격리를 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 K8s의 restricted Pod Security Standard에 해당하는 보안 설정으로 컨테이너를 실행하시오.
  hint: non-root, read-only, cap-drop ALL, no-new-privileges를 모두 적용하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 K8s의 restricted Pod Security Standard에 해당하는 보안 설정으로 컨테이너를 실행해줘

    📎 참고 (CLI): docker run -d --name k8s-restricted --read-only --tmpfs /tmp --cap-drop ALL --security-opt
    no-new-privileges --user 1000:1000 --memory 128m alpine:latest sleep 3600 2>/dev/null && docker inspect
    k8s-restricted --format "Privileged={{.HostConfig.Privileged}} ReadOnly={{.HostConfig.ReadonlyRootfs}}
    User={{.Config.User}} CapDrop={{.HostConfig.CapDrop}}" 2>/dev/null'
  answer_detail: 'K8s Pod Security Standards에는 3개 수준이 있습니다: Privileged(무제한), Baseline(위험 설정 차단), Restricted(최소
    권한). Restricted 수준에서는 non-root 실행, Capability 제거, 읽기 전용 루트 파일시스템, no-new-privileges가 필수입니다.'
  verify:
    type: output_contains
    expect:
    - ReadOnly
    - Privileged
    - CapDrop
    - User
    - k8s-restricted
    field: stdout
    semantic:
      intent: 'K8s Restricted Pod Security Standard 시뮬레이션 — docker run -d --name k8s-restricted --read-only
        --tmpfs /tmp --cap-drop ALL --security-opt no-new-privileges --user 1000:1000 --memory 128m alpine:latest
        sleep 3600. K8s PSS(Pod Security Standards) 3 levels: privileged(unrestricted), baseline(minimal),
        restricted(hardened). Restricted 요구 사항: runAsNonRoot, allowPrivilegeEscalation=false, capabilities.drop:
        [ALL], readOnlyRootFilesystem=true, seccompProfile=RuntimeDefault. K8s admission controller 로
        enforce'
      success_criteria:
      - docker run + PSS restricted 옵션 6개 이상
      - inspect 검증
      - ReadOnly=true 출력
      acceptable_methods:
      - docker run 완전 hardened + inspect
      - kubectl apply + PodSecurity admission restricted label
      - OPA/Gatekeeper / Kyverno policy 로 enforce
      - kube-score / kubesec 로 manifest 평가
      - Pod Security Policy (deprecated K8s 1.25)
      negative_signs:
      - 일부 PSS 요구사항 누락
      - baseline 과 restricted 구분 없음
      - K8s admission 연계 이해 없음
  target_vm: web
  script: docker run -d --name k8s-restricted --read-only --tmpfs /tmp --cap-drop ALL --security-opt no-new-privileges
    --user 1000:1000 --memory 128m alpine:latest sleep 3600 2>/dev/null && docker inspect k8s-restricted
    --format "Privileged={{.HostConfig.Privileged}} ReadOnly={{.HostConfig.ReadonlyRootfs}} User={{.Config.User}}
    CapDrop={{.HostConfig.CapDrop}}" 2>/dev/null
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)에서 K8s의 restricted Pod Security Standard에 해당하는 보안 설정으로 컨테이너를 실행해줘
- order: 2
  instruction: K8s의 Namespace별 격리를 Docker 네트워크로 시뮬레이션하시오. frontend와 backend 네트워크를 분리합니다.
  hint: 두 개의 사용자 정의 네트워크를 생성하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: K8s의 Namespace별 격리를 Docker 네트워크로 시뮬레이션하시오. frontend와 backend 네트워크를 분리해줘

    📎 참고 (CLI): docker network create frontend-net 2>/dev/null; docker network create backend-net 2>/dev/null;
    echo "=== 네트워크 격리 ==="; docker network ls --format "{{.Name}}: {{.Driver}}" | grep -E "(frontend|backend|bridge)"'''
  answer_detail: K8s의 Namespace는 리소스를 논리적으로 분리합니다. NetworkPolicy로 Namespace 간 통신을 제어하듯, Docker에서는 별도 네트워크를
    생성하여 컨테이너 그룹을 격리합니다. 서로 다른 Docker 네트워크에 연결된 컨테이너는 기본적으로 통신할 수 없습니다.
  verify:
    type: output_contains
    expect:
    - frontend-net
    - bridge
    - network
    - Namespace
    field: stdout
    semantic:
      intent: K8s Namespace 격리 시뮬레이션 — docker network create frontend-net && docker network create backend-net.
        Docker network 분리 = K8s Namespace + NetworkPolicy 유사 효과. 각 network 는 독립 L2 segment, 기본적으로 network
        간 통신 차단. K8s 에서는 NetworkPolicy 로 inter-namespace 통신 allow list. CNI plugin(Calico, Cilium, Weave)
        필요. Zero Trust microsegmentation 기본 패턴
      success_criteria:
      - docker network create 실행
      - frontend-net 이름 포함
      - 2 network 생성 확인
      acceptable_methods:
      - docker network create <name>
      - kubectl create namespace + NetworkPolicy
      - Calico policy 적용
      - docker network create --internal(외부 격리)
      - 'Docker Compose networks: 섹션'
      negative_signs:
      - 단일 network 만 생성
      - 격리 개념 이해 없음
      - 기본 bridge 와 혼동
  target_vm: web
  script: 'docker network create frontend-net 2>/dev/null; docker network create backend-net 2>/dev/null;
    echo "=== 네트워크 격리 ==="; docker network ls --format "{{.Name}}: {{.Driver}}" | grep -E "(frontend|backend|bridge)"'''
  risk_level: low
  bastion_prompt: K8s의 Namespace별 격리를 Docker 네트워크로 시뮬레이션하시오. frontend와 backend 네트워크를 분리해줘
- order: 3
  instruction: 격리된 네트워크에 컨테이너를 배치하고 네트워크 간 통신이 차단되는지 확인하시오.
  hint: frontend와 backend 네트워크에 각각 컨테이너를 배치하고 ping 테스트를 수행하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 격리된 네트워크에 컨테이너를 배치하고 네트워크 간 통신이 차단되는지 확인해줘

    📎 참고 (CLI): docker run -d --name frontend --network frontend-net alpine:latest sleep 3600 2>/dev/null;
    docker run -d --name backend --network backend-net alpine:latest sleep 3600 2>/dev/null; echo "===
    네트워크 격리 테스트 ==="; BACKEND_IP=$(docker inspect backend --format "{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}"
    2>/dev/null); echo "Backend IP: $BACKEND_IP"; docker exec frontend ping -c 2 -W 2 $BACKEND_IP 2>&1
    | tail -3 || echo "통신 차단 확인 (정상)"'''
  answer_detail: K8s NetworkPolicy는 Pod 간 트래픽을 레이블 기반으로 제어합니다. Docker에서 서로 다른 네트워크의 컨테이너는 기본적으로 격리됩니다.
    이 격리를 확인하는 것은 마이크로세그멘테이션의 기본입니다.
  verify:
    type: output_contains
    expect:
    - 네트워크 격리 테스트
    - frontend
    - backend
    - ping
    field: stdout
    semantic:
      intent: network 격리 실증 (ping 차단) — docker run frontend + backend 각각 network 에 배치 → docker exec frontend
        ping backend. 서로 다른 network 에 연결된 컨테이너는 L3 격리(IP reachability 없음) → ping timeout 예상. 이는 K8s default-deny
        NetworkPolicy 와 동일 효과. 통신 필요 시 docker network connect <n> <c> 로 명시적 연결. 테스트로 microsegmentation
        검증
      success_criteria:
      - frontend/backend 컨테이너 생성 + ping 테스트
      - 네트워크 격리 테스트 문자열 포함
      - ping 실패 또는 timeout 확인
      acceptable_methods:
      - docker exec frontend ping -c 2 -W 2 <backend-ip>
      - docker network connect backend-net frontend(통신 열기 예시)
      - Kubernetes kubectl exec + NetworkPolicy 검증
      - traceroute 로 hop 확인
      - Falco rule 로 unauthorized connection 탐지
      negative_signs:
      - 같은 network 에 배치(격리 효과 없음)
      - IP 대신 hostname(DNS 못 찾음)
      - timeout 무시
  target_vm: web
  script: 'docker run -d --name frontend --network frontend-net alpine:latest sleep 3600 2>/dev/null;
    docker run -d --name backend --network backend-net alpine:latest sleep 3600 2>/dev/null; echo "===
    네트워크 격리 테스트 ==="; BACKEND_IP=$(docker inspect backend --format "{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}"
    2>/dev/null); echo "Backend IP: $BACKEND_IP"; docker exec frontend ping -c 2 -W 2 $BACKEND_IP 2>&1
    | tail -3 || echo "통신 차단 확인 (정상)"'''
  risk_level: low
  bastion_prompt: 격리된 네트워크에 컨테이너를 배치하고 네트워크 간 통신이 차단되는지 확인해줘
- order: 4
  instruction: K8s의 Resource Limits에 대응하는 Docker 자원 제한을 적용하고 검증하시오.
  hint: --memory, --cpus, --pids-limit을 설정한 컨테이너를 실행하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: K8s의 Resource Limits에 대응하는 Docker 자원 제한을 적용하고 검증해줘

    📎 참고 (CLI): docker run -d --name resource-limited --memory 64m --memory-swap 64m --cpus 0.5 --pids-limit
    30 alpine:latest sleep 3600 2>/dev/null; echo "=== 자원 제한 확인 ==="; docker inspect resource-limited
    --format "Memory={{.HostConfig.Memory}} MemSwap={{.HostConfig.MemorySwap}} CPU={{.HostConfig.NanoCpus}}
    Pids={{.HostConfig.PidsLimit}}" 2>/dev/null'
  answer_detail: K8s에서는 Pod spec의 resources.limits로 자원을 제한합니다. Memory Limit 초과 시 OOMKilled, CPU Limit은
    throttling 됩니다. Docker에서도 동일하게 --memory(OOM), --cpus(throttle), --pids-limit(fork bomb 방지)을 설정합니다.
  verify:
    type: output_contains
    expect:
    - 자원 제한 확인
    - Memory
    - CPU
    - PidsLimit
    field: stdout
    semantic:
      intent: 'K8s Resource Limits 대응 Docker — docker run --memory 64m --memory-swap 64m --cpus 0.5 --pids-limit
        30. K8s resources.limits: memory(OOMKilled on exceed), cpu(throttling), ephemeral-storage(eviction).
        Docker --memory-swap 는 RAM+swap 총합 제한 - 동일 설정 시 swap 없음(메모리만). K8s requests vs limits: requests
        는 scheduling 최소 보장, limits 는 상한. QoS classes: Guaranteed/Burstable/BestEffort 에 영향'
      success_criteria:
      - docker run --memory + --cpus + --pids-limit
      - inspect 로 설정 검증
      - 자원 제한 확인 메시지
      acceptable_methods:
      - docker run --memory --cpus --pids-limit
      - Kubernetes resources.limits YAML
      - systemd cgroup 직접 설정
      - k8s ResourceQuota + LimitRange
      - stress-ng 로 제한 테스트
      negative_signs:
      - memory-swap 미고려(기본 2x)
      - limits 없이 requests 만
      - cgroup v1/v2 차이 모름
  target_vm: web
  script: docker run -d --name resource-limited --memory 64m --memory-swap 64m --cpus 0.5 --pids-limit
    30 alpine:latest sleep 3600 2>/dev/null; echo "=== 자원 제한 확인 ==="; docker inspect resource-limited
    --format "Memory={{.HostConfig.Memory}} MemSwap={{.HostConfig.MemorySwap}} CPU={{.HostConfig.NanoCpus}}
    Pids={{.HostConfig.PidsLimit}}" 2>/dev/null
  risk_level: low
  bastion_prompt: K8s의 Resource Limits에 대응하는 Docker 자원 제한을 적용하고 검증해줘
- order: 5
  instruction: K8s의 readinessProbe에 대응하는 Docker 헬스체크를 확인하시오.
  hint: docker inspect에서 Healthcheck 설정을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: K8s의 readinessProbe에 대응하는 Docker 헬스체크를 확인해줘

    📎 참고 (CLI): docker ps -q | head -5 | xargs -I{} docker inspect --format="{{.Name}}: Health={{if .State.Health}}{{.State.Health.Status}}{{else}}미설정{{end}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: K8s의 livenessProbe/readinessProbe는 Pod의 정상 동작을 확인합니다. Docker의 HEALTHCHECK는 컨테이너 내부에서
    주기적으로 명령을 실행하여 상태를 확인합니다. 헬스체크 실패 시 자동 재시작(restart policy)과 연계하면 가용성을 높일 수 있습니다.
  verify:
    type: output_contains
    expect: Health
    field: stdout
    semantic:
      intent: 'Docker Healthcheck = K8s readinessProbe 대응 — docker inspect --format={{.Name}}: Health={{if
        .State.Health}}{{.State.Health.Status}}{{else}}미설정{{end}}. HEALTHCHECK Dockerfile 지시어 또는 --health-cmd
        runtime 옵션. Status: starting(초기), healthy, unhealthy. K8s probes 3 types: livenessProbe(재시작 트리거),
        readinessProbe(트래픽 라우팅 결정), startupProbe(slow starter). HEALTHCHECK exit code: 0=healthy, 1=unhealthy,
        2=reserved'
      success_criteria:
      - docker inspect Health 조회
      - Health 또는 미설정 출력
      - 컨테이너 건강 상태
      acceptable_methods:
      - docker inspect --format Health={{.State.Health.Status}}
      - Dockerfile HEALTHCHECK CMD curl -f http://localhost/
      - K8s livenessProbe + readinessProbe 설정
      - docker run --health-cmd + --health-interval
      - Prometheus blackbox exporter
      negative_signs:
      - K8s probe 3 types 구분 없음
      - healthy 외 state 무시
      - HEALTHCHECK Dockerfile 없는 경우 처리 없음
  target_vm: web
  script: 'docker ps -q | head -5 | xargs -I{} docker inspect --format="{{.Name}}: Health={{if .State.Health}}{{.State.Health.Status}}{{else}}미설정{{end}}"
    {} 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  risk_level: low
  bastion_prompt: K8s의 readinessProbe에 대응하는 Docker 헬스체크를 확인해줘
- order: 6
  instruction: 컨테이너의 restart policy를 확인하시오. K8s의 restartPolicy에 대응합니다.
  hint: docker inspect에서 RestartPolicy를 확인하세요.
  category: audit
  points: 8
  answer: '🤖 프롬프트: 컨테이너의 restart policy를 확인하시오. K8s의 restartPolicy에 대응해줘

    📎 참고 (CLI): docker ps -aq | head -5 | xargs -I{} docker inspect --format="{{.Name}}: RestartPolicy={{.HostConfig.RestartPolicy.Name}}
    MaxRetry={{.HostConfig.RestartPolicy.MaximumRetryCount}}" {} 2>/dev/null'''
  answer_detail: K8s의 restartPolicy(Always/OnFailure/Never)와 유사하게 Docker도 --restart 옵션으로 컨테이너 재시작 정책을
    설정합니다. on-failure는 비정상 종료 시에만, always는 항상, unless-stopped는 수동 중지 전까지 재시작합니다.
  verify:
    type: output_contains
    expect: RestartPolicy
    field: stdout
    semantic:
      intent: 'Restart Policy = K8s restartPolicy — docker inspect --format={{.Name}}: RestartPolicy={{.HostConfig.RestartPolicy.Name}}
        MaxRetry={{.HostConfig.RestartPolicy.MaximumRetryCount}}. Docker policies: no(default), on-failure[:N](비정상
        종료), always, unless-stopped(수동 중지 전까지). K8s equivalent: Always(default Deployment), OnFailure(Job),
        Never. Pod 의 restartPolicy: Pod 전체에 적용, K8s Deployment/ReplicaSet 은 별도 replica 복구 로직'
      success_criteria:
      - docker inspect RestartPolicy 조회
      - RestartPolicy 필드 출력
      - Policy 이름 확인
      acceptable_methods:
      - docker inspect --format RestartPolicy={{...}}
      - K8s spec.restartPolicy 필드 확인
      - systemctl edit docker.service Restart= (systemd 유사)
      - docker run --restart=on-failure:5
      - Kubernetes Job backoffLimit 필드
      negative_signs:
      - K8s restartPolicy 와 Docker 차이 이해 없음
      - Deployment replica 와 Pod restart 혼동
      - MaxRetry 무시
  target_vm: web
  script: 'docker ps -aq | head -5 | xargs -I{} docker inspect --format="{{.Name}}: RestartPolicy={{.HostConfig.RestartPolicy.Name}}
    MaxRetry={{.HostConfig.RestartPolicy.MaximumRetryCount}}" {} 2>/dev/null'''
  risk_level: low
  bastion_prompt: 컨테이너의 restart policy를 확인하시오. K8s의 restartPolicy에 대응해줘
- order: 7
  instruction: 테스트에 사용한 컨테이너와 네트워크를 정리하시오.
  hint: docker rm -f와 docker network rm으로 정리하세요.
  category: config
  points: 8
  answer: '🤖 프롬프트: 테스트에 사용한 컨테이너와 네트워크를 정리해줘

    📎 참고 (CLI): docker rm -f k8s-restricted frontend backend resource-limited 2>/dev/null; docker network
    rm frontend-net backend-net 2>/dev/null; echo "=== 정리 완료 ==="; docker ps -a --format "{{.Names}}"
    | head -5'
  answer_detail: 테스트 후 리소스를 정리하는 것은 좋은 습관입니다. K8s에서는 kubectl delete로, Docker에서는 docker rm/network rm으로
    정리합니다. 프로덕션에서는 자동 정리 정책(TTL, garbage collection)을 설정합니다.
  verify:
    type: output_contains
    expect:
    - 정리 완료
    - 정리
    field: stdout
    semantic:
      intent: '테스트 리소스 cleanup — docker rm -f k8s-restricted frontend backend resource-limited && docker
        network rm frontend-net backend-net. rm -f 로 running 컨테이너도 강제 제거. 대응 network 도 명시 삭제(in-use 시
        실패 - 먼저 컨테이너 제거 순서 중요). K8s: kubectl delete pod/network policy/namespace 대응. 실무 자동 정리: TTL(Time
        To Live) annotation + GC controller. 주의: 실수로 production 리소스 삭제 금지'
      success_criteria:
      - docker rm + network rm 실행
      - 정리 완료 문자열 출력
      - 테스트 리소스 정리
      acceptable_methods:
      - docker rm -f <c1> <c2> + docker network rm <n1>
      - docker compose down(v2 종합 정리)
      - kubectl delete pod/networkpolicy
      - cron 기반 TTL 자동 GC
      - terraform destroy(IaC)
      negative_signs:
      - 강제(rm -f) 없이 running 컨테이너
      - network in-use 무시
      - 정리 순서 오류(network 먼저)
  target_vm: web
  script: docker rm -f k8s-restricted frontend backend resource-limited 2>/dev/null; docker network rm
