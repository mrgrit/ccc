    📎 참고 (CLI): docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}"
    2>/dev/null || echo "실행 중인 컨테이너 없음"'
  answer_detail: docker stats는 CPU, 메모리, 네트워크, 디스크 I/O를 표시합니다. 자원 제한이 설정되지 않은 컨테이너는
    호스트 자원을 독점할 수 있어 DoS 공격에 취약합니다. 클라우드 환경에서 자원 모니터링은 비용 관리와 보안 모두에 중요합니다.
