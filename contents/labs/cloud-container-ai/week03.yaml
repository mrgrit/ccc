    field: stdout
    semantic:
      intent: '컨테이너 실시간 리소스 점검 — docker stats --no-stream --format table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}\t{{.BlockIO}}.
        --no-stream 로 1회 스냅샷(연속 업데이트 회피). Resource 제한 없는 컨테이너는 호스트 자원 독점 가능 - DoS
        취약. 제한 설정: docker run --memory=512m --cpus=0.5 --pids-limit=100. Kubernetes
