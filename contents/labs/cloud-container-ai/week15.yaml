lab_id: cloud-container-ai-week15
title: 클라우드/컨테이너 보안 종합 평가 (AI 지원)
version: ai
course: cloud-container-ai
week: 15
description: 전체 클라우드/컨테이너 보안 과정을 종합하여 Docker 환경의 보안을 전면 점검합니다. 호스트 보안, 데몬 설정, 이미지
  보안, 런타임 보안, 네트워크, 스토리지, 모니터링을 통합 평가합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 클라우드/컨테이너 보안의 전 영역을 통합 점검한다
- 보안 점수를 산출하고 개선 우선순위를 결정한다
- 종합 보안 보고서를 생성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})의 호스트 보안을 점검하시오. Docker 호스트의 OS, 커널, 서비스 상태를 확인합니다.
  hint: OS 정보, 열린 포트, 서비스를 종합 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)의 호스트 보안을 점검하시오. Docker 호스트의 OS, 커널, 서비스 상태를
    확인해줘

    📎 참고 (CLI): echo "=== [1] 호스트 보안 ==="; echo "OS: $(cat /etc/os-release | grep
    PRETTY | cut -d= -f2)"; echo "커널: $(uname -r)"; echo "Docker: $(docker version
    --format ''{{.Server.Version}}'' 2>/dev/null)"; echo "열린 포트: $(sudo ss -tlnp |
    grep -c LISTEN)"; echo "가동시간: $(uptime -p)"'
  answer_detail: 호스트 보안은 컨테이너 보안의 기초입니다. 호스트가 침해되면 모든 컨테이너가 위험합니다. OS 패치 상태, 불필요한
    서비스 비활성화, 커널 보안 파라미터, Docker 버전의 최신 상태를 확인합니다.
  verify:
    type: output_contains
    expect:
    - 호스트 보안
    - OS
    field: stdout
    semantic:
      intent: '종합 평가 [1] 호스트 보안 — cat /etc/os-release PRETTY + uname -r + docker version
        + ss -tlnp LISTEN 수 + uptime. 호스트가 침해되면 모든 컨테이너 노출 = 기초 토대. 점검: (1) OS 패치
        상태 (apt list --upgradable) (2) 불필요 서비스 비활성 (systemctl list-unit-files --state=enabled)
        (3) 커널 보안 파라미터 (sysctl net.ipv4.conf.all.rp_filter 등) (4) Docker 최신 버전(CVE).
        Lynis 자동 hardening 감사'
      success_criteria:
      - OS/커널/Docker 버전 + 포트 + uptime
      - 호스트 보안 또는 OS 문자열
      - 여러 지표 출력
      acceptable_methods:
      - cat /etc/os-release + uname + docker version + ss + uptime
      - lynis audit system
      - OpenSCAP + CIS-CAT
      - apt list --upgradable / yum check-update
      - Wazuh SCA 모듈
      negative_signs:
      - OS 하나만 확인
      - Docker 버전 CVE 고려 없음
      - Lynis/OpenSCAP 언급 없음
  target_vm: web
  script: 'echo "=== [1] 호스트 보안 ==="; echo "OS: $(cat /etc/os-release | grep PRETTY
    | cut -d= -f2)"; echo "커널: $(uname -r)"; echo "Docker: $(docker version --format
    ''{{.Server.Version}}'' 2>/dev/null)"; echo "열린 포트: $(sudo ss -tlnp | grep -c
    LISTEN)"; echo "가동시간: $(uptime -p)"'
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)의 호스트 보안을 점검하시오. Docker 호스트의 OS, 커널, 서비스 상태를
    확인해줘
- order: 2
  instruction: Docker 데몬의 보안 설정을 종합 점검하시오.
  hint: daemon.json, 보안 옵션, 로깅을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: Docker 데몬의 보안 설정을 종합 점검해줘

    📎 참고 (CLI): echo "=== [2] 데몬 보안 ==="; echo "보안 옵션: $(docker info --format ''{{.SecurityOptions}}''
    2>/dev/null)"; echo "로깅: $(docker info --format ''{{.LoggingDriver}}'' 2>/dev/null)";
    echo "소켓 권한: $(stat -c ''%a'' /var/run/docker.sock)"; echo "daemon.json:"; cat
    /etc/docker/daemon.json 2>/dev/null || echo "  미설정"'
  answer_detail: Docker 데몬 설정은 모든 컨테이너에 영향을 미치는 전역 설정입니다. 보안 옵션(apparmor, seccomp),
    로깅 드라이버, TLS 인증, insecure-registries, live-restore 등을 확인합니다.
  verify:
    type: output_contains
    expect:
    - 데몬 보안
    - '## 스킬: shell (실패)'
    - Docker
    field: stdout
    semantic:
      intent: '종합 평가 [2] Docker 데몬 보안 — docker info --format SecurityOptions/LoggingDriver
        + stat docker.sock + cat daemon.json. 전역 설정으로 모든 컨테이너 영향. 핵심: (1) SecurityOptions
        에 apparmor·seccomp·userns (2) LoggingDriver: json-file/fluentd (3) 소켓 권한 660
        root:docker (4) daemon.json 에 live-restore, log-opts(max-size), tls 설정, userns-remap.
        audit 대안: docker-bench-security section 2'
      success_criteria:
      - docker info 보안옵션 + 로깅 + 소켓 권한 + daemon.json
      - 데몬 보안 문자열
      - 여러 설정 출력
      acceptable_methods:
      - docker info --format + stat + cat daemon.json 조합
      - docker-bench-security Section 2
      - systemctl show docker | grep Exec
      - Trivy config daemon.json
      - dockerd --help | grep security
      negative_signs:
      - 항목 1-2개만
      - daemon.json 미조회
      - audit framework 미언급
  target_vm: web
  script: 'echo "=== [2] 데몬 보안 ==="; echo "보안 옵션: $(docker info --format ''{{.SecurityOptions}}''
    2>/dev/null)"; echo "로깅: $(docker info --format ''{{.LoggingDriver}}'' 2>/dev/null)";
    echo "소켓 권한: $(stat -c ''%a'' /var/run/docker.sock)"; echo "daemon.json:"; cat
    /etc/docker/daemon.json 2>/dev/null || echo "  미설정"'
  risk_level: low
  bastion_prompt: Docker 데몬의 보안 설정을 종합 점검해줘
- order: 3
  instruction: 이미지 보안을 종합 점검하시오. 태그, 크기, USER 설정을 분석합니다.
  hint: 모든 이미지의 태그와 보안 설정을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 이미지 보안을 종합 점검해줘

    📎 참고 (CLI): echo "=== [3] 이미지 보안 ==="; echo "이미지 수: $(docker images -q | wc -l)";
    echo "latest 태그: $(docker images --format ''{{.Tag}}'' | grep -c latest)개"; echo
    "미사용: $(docker images -f dangling=true -q | wc -l)개"; echo "--- 이미지 목록 ---"; docker
    images --format ''{{.Repository}}:{{.Tag}} ({{.Size}})'' | head -5'
  answer_detail: '이미지 보안 점검: latest 태그 비사용(버전 고정), 최소 이미지(alpine, distroless), 정기
    취약점 스캔, 미사용 이미지 정리, multi-stage build, 민감 정보 미포함. 이미지는 소프트웨어 공급망의 핵심이므로 출처와 무결성을
    보장해야 합니다.'
  verify:
    type: output_contains
    expect: 이미지 보안
    field: stdout
    semantic:
      intent: '종합 평가 [3] 이미지 보안 — docker images -q | wc -l + grep -c latest + dangling
        -q | wc -l + 이미지 목록. 주요 지표: 총 이미지 수, latest tag 사용 수(재현성 저하 + supply chain
        위험), dangling 이미지 수(정리 대상). Supply chain security: Cosign signing, SBOM(CycloneDX/SPDX),
        vulnerability scanning(Trivy, Grype, Snyk), provenance(SLSA). Harbor/ECR 같은
        private registry 에 sign+scan 통합'
      success_criteria:
      - 이미지 수/latest/dangling 집계
      - 이미지 보안 문자열
      - 이미지 목록 출력
      acceptable_methods:
      - docker images -q | wc -l + format 필터
      - trivy image scan 통합
      - Harbor + image signing policy
      - Cosign + SBOM + SLSA
      - Chainguard Wolfi 이미지 채택
      negative_signs:
      - latest tag 위험 미인지
      - SBOM/Cosign 언급 없음
      - dangling 정리 계획 없음
  target_vm: web
  script: 'echo "=== [3] 이미지 보안 ==="; echo "이미지 수: $(docker images -q | wc -l)"; echo
    "latest 태그: $(docker images --format ''{{.Tag}}'' | grep -c latest)개"; echo "미사용:
    $(docker images -f dangling=true -q | wc -l)개"; echo "--- 이미지 목록 ---"; docker
    images --format ''{{.Repository}}:{{.Tag}} ({{.Size}})'' | head -5'
  risk_level: low
  bastion_prompt: 이미지 보안을 종합 점검해줘
- order: 4
  instruction: 컨테이너 런타임 보안을 종합 점검하시오. 모든 실행 중 컨테이너의 보안 옵션을 분석합니다.
  hint: privileged, capabilities, read-only, user, 자원 제한을 확인하세요.
  category: audit
  points: 14
  answer: '🤖 프롬프트: 컨테이너 런타임 보안을 종합 점검해줘

    📎 참고 (CLI): echo "=== [4] 런타임 보안 ==="; for CID in $(docker ps -q); do NAME=$(docker
    inspect --format=''{{.Name}}'' $CID | tr -d ''/''); PRIV=$(docker inspect --format=''{{.HostConfig.Privileged}}''
    $CID); RO=$(docker inspect --format=''{{.HostConfig.ReadonlyRootfs}}'' $CID);
    USER=$(docker inspect --format=''{{.Config.User}}'' $CID); MEM=$(docker inspect
    --format=''{{.HostConfig.Memory}}'' $CID); NETMODE=$(docker inspect --format=''{{.HostConfig.NetworkMode}}''
    $CID); echo "$NAME: Priv=$PRIV RO=$RO User=${USER:-root} Mem=$MEM Net=$NETMODE";
    done || echo "실행 중인 컨테이너 없음"'
  answer_detail: '런타임 보안은 실행 중인 컨테이너의 보안 상태를 평가합니다. 핵심 체크리스트: Privileged=false, ReadOnly=true,
    User!=root(또는 비어 있지 않음), Memory>0(자원 제한), NetworkMode!=host, CapDrop=[ALL], SecurityOpt에
    no-new-privileges 포함.'
  verify:
    type: output_contains
    expect: 런타임 보안
    field: stdout
    semantic:
      intent: '종합 평가 [4] 런타임 보안 — for CID in docker ps -q; do Priv + RO + User + Mem
        + NetMode 수집. 체크리스트: Privileged=false, ReadOnly=true, User!=root, Memory>0,
        NetworkMode!=host, CapDrop=[ALL] + 필요만 CapAdd, SecurityOpt 에 no-new-privileges.
        하나라도 위반 시 FAIL. Kubernetes Pod Security Standards restricted 수준 대응. Admission
        Controllers 로 배포 시점 enforce'
      success_criteria:
      - for CID 루프 5+ 항목
      - 런타임 보안 문자열
      - 각 컨테이너 속성 출력
      acceptable_methods:
      - for + docker inspect --format 여러 필드
      - docker-bench-security Section 5 자동화
      - K8s PSS admission + Kyverno/OPA
      - Falco runtime monitoring
      - Aqua Trivy + admission controller
      negative_signs:
      - 필수 5 항목 중 3개 이하
      - PSS restricted 언급 없음
      - admission control 고려 없음
  target_vm: web
  script: 'echo "=== [4] 런타임 보안 ==="; for CID in $(docker ps -q); do NAME=$(docker
    inspect --format=''{{.Name}}'' $CID | tr -d ''/''); PRIV=$(docker inspect --format=''{{.HostConfig.Privileged}}''
    $CID); RO=$(docker inspect --format=''{{.HostConfig.ReadonlyRootfs}}'' $CID);
    USER=$(docker inspect --format=''{{.Config.User}}'' $CID); MEM=$(docker inspect
    --format=''{{.HostConfig.Memory}}'' $CID); NETMODE=$(docker inspect --format=''{{.HostConfig.NetworkMode}}''
    $CID); echo "$NAME: Priv=$PRIV RO=$RO User=${USER:-root} Mem=$MEM Net=$NETMODE";
    done || echo "실행 중인 컨테이너 없음"'
  risk_level: low
  bastion_prompt: 컨테이너 런타임 보안을 종합 점검해줘
- order: 5
  instruction: 네트워크 보안을 종합 점검하시오. Docker 네트워크 격리와 포트 노출을 분석합니다.
  hint: 네트워크 목록, 포트 매핑, ICC를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 네트워크 보안을 종합 점검하시오. Docker 네트워크 격리와 포트 노출을 분석해줘

    📎 참고 (CLI): echo "=== [5] 네트워크 보안 ==="; echo "네트워크: $(docker network ls -q | wc
    -l)개"; echo "포트 매핑:"; docker ps --format ''  {{.Names}}: {{.Ports}}'' 2>/dev/null
    | head -5; echo "host 네트워크 사용: $(docker ps -q 2>/dev/null | xargs -I{} docker
    inspect --format=''{{.HostConfig.NetworkMode}}'' {} | grep -c host)건"'
  answer_detail: '네트워크 보안 점검: 사용자 정의 네트워크로 격리, host 네트워크 미사용, 포트 매핑 최소화(127.0.0.1
    바인드 권장), internal 네트워크로 외부 차단, ICC 비활성화(필요시), 네트워크 간 분리.'
  verify:
    type: output_contains
    expect: 네트워크 보안
    field: stdout
    semantic:
      intent: '종합 평가 [5] 네트워크 보안 — docker network ls | wc -l + docker ps Ports + NetworkMode
        host 수. 점검: (1) user-defined network 사용(microsegmentation) (2) host network
        미사용 (3) 포트 매핑 최소(127.0.0.1 localhost bind) (4) --internal 로 외부 차단 (5) ICC
        비활성(enable_icc: false). 클라우드 대응: VPC + subnet + SG + NACL 계층. K8s: NetworkPolicy
        + Cilium/Calico CNI egress 제어. Zero Trust microsegmentation'
      success_criteria:
      - network 수 + 포트 매핑 + host mode 수
      - 네트워크 보안 문자열
      - 보안 지표 집계
      acceptable_methods:
      - docker network ls + ps + inspect 조합
      - Cilium Hubble flow observability
      - NetworkPolicy + Calico Felix
      - AWS VPC Flow Logs 분석
      - Zero Trust Network Access(Tailscale/Teleport)
      negative_signs:
      - host network 사용 정상 판정
      - microsegmentation 개념 없음
      - 0.0.0.0 바인드 무시
  target_vm: web
  script: 'echo "=== [5] 네트워크 보안 ==="; echo "네트워크: $(docker network ls -q | wc -l)개";
    echo "포트 매핑:"; docker ps --format ''  {{.Names}}: {{.Ports}}'' 2>/dev/null | head
    -5; echo "host 네트워크 사용: $(docker ps -q 2>/dev/null | xargs -I{} docker inspect
    --format=''{{.HostConfig.NetworkMode}}'' {} | grep -c host)건"'
  risk_level: low
  bastion_prompt: 네트워크 보안을 종합 점검하시오. Docker 네트워크 격리와 포트 노출을 분석해줘
- order: 6
  instruction: 스토리지 보안을 종합 점검하시오. 볼륨, 바인드 마운트, Docker Root Dir를 분석합니다.
  hint: 볼륨 목록, 위험 마운트, 디스크 사용량을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 스토리지 보안을 종합 점검해줘

    📎 참고 (CLI): echo "=== [6] 스토리지 보안 ==="; echo "볼륨: $(docker volume ls -q | wc -l)개";
    echo "미사용 볼륨: $(docker volume ls -qf dangling=true | wc -l)개"; echo "Docker Root
    권한: $(stat -c ''%a'' /var/lib/docker)"; echo "위험 마운트:"; docker ps -q 2>/dev/null
    | xargs -I{} docker inspect --format=''{{range .Mounts}}{{.Source}} {{end}}''
    {} 2>/dev/null | tr '' '' ''\n'' | sort -u | grep -E ''(docker.sock|/etc$|/root|^/$)''
    | head -5 || echo "  없음"'
  answer_detail: '스토리지 보안 점검: Docker Root Dir 권한(700), 미사용 볼륨 정리, 위험 바인드 마운트(docker.sock,
    /etc, /) 식별, 볼륨 데이터 암호화, tmpfs를 활용한 민감 데이터 관리.'
  verify:
    type: output_contains
    expect: 스토리지 보안
    field: stdout
    semantic:
      intent: '종합 평가 [6] 스토리지 보안 — docker volume ls -q | wc -l + dangling + stat /var/lib/docker
        + 위험 마운트 스캔(docker.sock/etc/root/^/$). 4가지 점검: (1) Docker Root Dir 권한 (700·root:root)
        (2) 미사용 볼륨 정리(잔존 민감 데이터) (3) 위험 바인드 마운트 식별(T1611 Container Escape) (4) 민감
        데이터 저장 볼륨 암호화(LUKS, at-rest encryption). tmpfs 를 임시 secret 으로 활용. 클라우드 EBS/EFS
        encryption default'
      success_criteria:
      - 볼륨/dangling/Docker Root 권한/위험 마운트 4 지표
      - 스토리지 보안 문자열
      - 집계 출력
      acceptable_methods:
      - docker volume ls + stat + inspect Mounts
      - LUKS full-disk encryption
      - AWS EBS default encryption + KMS
      - K8s PersistentVolume + Velero 백업
      - data classification 기반 tier 관리
      negative_signs:
      - Docker Root 권한 조회 없음
      - 암호화 대안 없음
      - tmpfs secret 관리 미언급
  target_vm: web
  script: 'echo "=== [6] 스토리지 보안 ==="; echo "볼륨: $(docker volume ls -q | wc -l)개";
