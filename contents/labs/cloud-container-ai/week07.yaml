lab_id: cloud-container-ai-week07
title: 컨테이너 네트워크 보안 실습 (AI 지원)
version: ai
course: cloud-container-ai
week: 7
description: Docker 환경에서 네트워크 보안을 강화합니다. 네트워크 격리, DNS 보안, 트래픽 모니터링, iptables 규칙 분석을 수행합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Docker 네트워크 드라이버별 보안 특성을 이해한다
- 컨테이너 간 네트워크 격리를 구현하고 검증한다
- 호스트 방화벽과 Docker 네트워크의 상호작용을 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버(10.20.30.80)에서 Docker가 생성한 iptables 규칙을 분석하시오.
  hint: iptables -L -n으로 DOCKER 관련 체인을 확인하세요.
  category: audit
  points: 10
  answer: sudo iptables -L -n -v --line-numbers 2>/dev/null | head -30 && echo "=== DOCKER 체인 ===" && sudo iptables -L DOCKER -n -v 2>/dev/null && echo "=== DOCKER-ISOLATION ===" && sudo iptables -L DOCKER-ISOLATION-STAGE-1
    -n 2>/dev/null
  answer_detail: Docker는 DOCKER, DOCKER-ISOLATION-STAGE-1/2, DOCKER-USER 체인을 자동 생성합니다. DOCKER-ISOLATION은 네트워크 간 격리를 담당하고, DOCKER-USER는 사용자 정의 규칙을 위한 체인입니다. 호스트 방화벽 규칙은 DOCKER-USER에 추가해야 Docker와 충돌하지 않습니다.
  verify:
    type: output_contains
    expect: DOCKER
    field: stdout
  target_vm: web
  script: sudo iptables -L -n -v --line-numbers 2>/dev/null | head -30 && echo "=== DOCKER 체인 ===" && sudo iptables -L DOCKER -n -v 2>/dev/null && echo "=== DOCKER-ISOLATION ===" && sudo iptables -L DOCKER-ISOLATION-STAGE-1
    -n 2>/dev/null
  risk_level: low
- order: 2
  instruction: 격리된 내부 네트워크(internal)를 생성하시오. 외부 통신이 불가능한 네트워크입니다.
  hint: docker network create --internal 옵션을 사용하세요.
  category: config
  points: 10
  answer: 'docker network create --internal --subnet 172.30.0.0/24 isolated-net 2>/dev/null || echo "이미 존재"; docker network inspect isolated-net --format "Name: {{.Name}}

    Internal: {{.Internal}}

    Subnet: {{(index .IPAM.Config 0).Subnet}}"'''
  answer_detail: --internal 옵션은 네트워크의 외부 통신을 완전히 차단합니다. 데이터베이스, 캐시 등 외부 접근이 불필요한 서비스는 internal 네트워크에 배치합니다. 클라우드의 프라이빗 서브넷(인터넷 게이트웨이 없음)과 동일한 개념입니다.
  verify:
    type: output_contains
    expect: Internal
    field: stdout
  target_vm: web
  script: 'docker network create --internal --subnet 172.30.0.0/24 isolated-net 2>/dev/null || echo "이미 존재"; docker network inspect isolated-net --format "Name: {{.Name}}

    Internal: {{.Internal}}

    Subnet: {{(index .IPAM.Config 0).Subnet}}"'''
  risk_level: low
- order: 3
  instruction: internal 네트워크에서 외부 통신이 실제로 차단되는지 확인하시오.
  hint: isolated-net에 컨테이너를 배치하고 외부 ping을 시도하세요.
  category: audit
  points: 10
  answer: 'docker run --rm --network isolated-net alpine:latest ping -c 2 -W 3 8.8.8.8 2>&1; echo "종료코드: $?"'''
  answer_detail: internal 네트워크의 컨테이너는 같은 네트워크 내의 다른 컨테이너와만 통신 가능하고, 외부(인터넷)로 나갈 수 없습니다. ping 실패(Network unreachable)가 확인되면 격리가 정상 동작하는 것입니다.
  verify:
    type: output_contains
    expect: 종료코드
    field: stdout
  target_vm: web
  script: 'docker run --rm --network isolated-net alpine:latest ping -c 2 -W 3 8.8.8.8 2>&1; echo "종료코드: $?"'''
  risk_level: low
- order: 4
  instruction: Docker의 DNS 설정을 확인하시오. 사용자 정의 네트워크의 내장 DNS를 점검합니다.
  hint: 컨테이너 내부의 /etc/resolv.conf를 확인하세요.
  category: audit
  points: 10
  answer: echo "=== bridge 네트워크 DNS ==="; docker run --rm alpine:latest cat /etc/resolv.conf; echo "=== 사용자 정의 네트워크 DNS ==="; docker run --rm --network isolated-net alpine:latest cat /etc/resolv.conf 2>/dev/null
  answer_detail: 사용자 정의 네트워크에서는 Docker 내장 DNS(127.0.0.11)가 컨테이너 이름으로 서비스 디스커버리를 제공합니다. 기본 bridge에서는 --link를 써야 하지만, 사용자 정의 네트워크에서는 자동입니다. DNS 스푸핑 방지를 위해 신뢰할 수 있는 DNS 서버를 사용해야 합니다.
  verify:
    type: output_contains
    expect: nameserver
    field: stdout
  target_vm: web
  script: echo "=== bridge 네트워크 DNS ==="; docker run --rm alpine:latest cat /etc/resolv.conf; echo "=== 사용자 정의 네트워크 DNS ==="; docker run --rm --network isolated-net alpine:latest cat /etc/resolv.conf 2>/dev/null
  risk_level: low
- order: 5
  instruction: 컨테이너의 네트워크 인터페이스와 IP 정보를 상세히 확인하시오.
  hint: docker inspect에서 NetworkSettings를 확인하세요.
  category: audit
  points: 10
  answer: docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}:\n{{range \$net, \$cfg := .NetworkSettings.Networks}}  Network={{\$net}} IP={{\$cfg.IPAddress}} GW={{\$cfg.Gateway}}\n{{end}}"
    {} 2>/dev/null || echo "컨테이너 없음"
  answer_detail: 각 컨테이너는 연결된 네트워크마다 IP 주소를 받습니다. 하나의 컨테이너가 여러 네트워크에 연결되면 네트워크 간 브릿지 역할을 할 수 있어 격리가 무력화될 수 있습니다. 이를 K8s에서는 NetworkPolicy로 제어합니다.
  verify:
    type: output_contains
    expect: Network
    field: stdout
  target_vm: web
  script: docker ps -q | head -3 | xargs -I{} docker inspect --format="{{.Name}}:\n{{range \$net, \$cfg := .NetworkSettings.Networks}}  Network={{\$net}} IP={{\$cfg.IPAddress}} GW={{\$cfg.Gateway}}\n{{end}}"
    {} 2>/dev/null || echo "컨테이너 없음"
  risk_level: low
- order: 6
  instruction: 호스트에서 컨테이너 네트워크 트래픽을 모니터링하시오.
  hint: 호스트의 docker0 인터페이스에서 tcpdump를 실행하세요.
  category: audit
  points: 12
  answer: echo "=== Docker 네트워크 인터페이스 ==="; ip link show type bridge; echo "--- veth 인터페이스 ---"; ip link show type veth 2>/dev/null | head -10; echo "--- 트래픽 캡처 테스트 ---"; sudo timeout 3 tcpdump -i docker0
    -c 5 -n 2>/dev/null || echo "트래픽 없음 또는 docker0 없음"
  answer_detail: 호스트에서 docker0(기본 브릿지) 인터페이스의 트래픽을 모니터링하면 컨테이너 간 통신을 관찰할 수 있습니다. 이는 클라우드의 VPC Flow Logs와 유사합니다. 암호화되지 않은 컨테이너 간 통신은 호스트에서 평문으로 캡처할 수 있어 민감 데이터 전송 시 TLS가 필요합니다.
  verify:
    type: output_contains
    expect: Docker 네트워크 인터페이스
    field: stdout
  target_vm: web
  script: echo "=== Docker 네트워크 인터페이스 ==="; ip link show type bridge; echo "--- veth 인터페이스 ---"; ip link show type veth 2>/dev/null | head -10; echo "--- 트래픽 캡처 테스트 ---"; sudo timeout 3 tcpdump -i docker0
    -c 5 -n 2>/dev/null || echo "트래픽 없음 또는 docker0 없음"
  risk_level: low
- order: 7
  instruction: 테스트 네트워크를 정리하시오.
  hint: docker network rm으로 생성한 네트워크를 삭제하세요.
  category: config
  points: 8
  answer: docker network rm isolated-net secure-net 2>/dev/null; echo "=== 네트워크 정리 후 ==="; docker network ls
  answer_detail: 미사용 네트워크는 보안 점검을 복잡하게 하고, 실수로 잘못된 네트워크에 컨테이너를 배치할 수 있습니다. 정기적으로 docker network prune으로 미사용 네트워크를 정리해야 합니다.
  verify:
    type: output_contains
    expect: 네트워크 정리 후
    field: stdout
  target_vm: web
  script: docker network rm isolated-net secure-net 2>/dev/null; echo "=== 네트워크 정리 후 ==="; docker network ls
  risk_level: low
- order: 8
  instruction: 네트워크 보안 종합 점검 스크립트를 작성하고 실행하시오.
  hint: Docker 네트워크, iptables, 포트 노출, DNS를 종합 점검하세요.
  category: audit
  points: 10
  answer: 'cat << ''SCRIPT'' > /tmp/network_security.sh

    #!/bin/bash

    echo ''=== 컨테이너 네트워크 보안 점검 ===''

    echo ''[네트워크 목록]''

    docker network ls --format "{{.Name}}: Driver={{.Driver}}" 2>/dev/null

    echo ''[포트 노출]''

    docker ps --format "{{.Names}}: {{.Ports}}" 2>/dev/null | head -5

    echo ''[host 네트워크 사용]''

    docker ps -q | xargs -I{} docker inspect --format="{{.HostConfig.NetworkMode}}" {} 2>/dev/null | grep -c host | xargs -I{} echo "{}건"

    echo ''[iptables DOCKER 규칙]''

    sudo iptables -L DOCKER -n 2>/dev/null | wc -l | xargs -I{} echo "{}줄"

    echo ''=== 네트워크 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/network_security.sh && bash /tmp/network_security.sh'
  answer_detail: 컨테이너 네트워크 보안의 핵심은 마이크로세그멘테이션(네트워크 격리), 최소 포트 노출, 내부 트래픽 암호화, DNS 보안입니다. 클라우드의 VPC, 서브넷, 보안 그룹, NACL과 동일한 계층적 네트워크 보안을 Docker 환경에서도 구현해야 합니다.
  verify:
    type: output_contains
    expect: 네트워크 점검 완료
    field: stdout
  target_vm: web
  script: 'cat << ''SCRIPT'' > /tmp/network_security.sh

    #!/bin/bash

    echo ''=== 컨테이너 네트워크 보안 점검 ===''

    echo ''[네트워크 목록]''

    docker network ls --format "{{.Name}}: Driver={{.Driver}}" 2>/dev/null

    echo ''[포트 노출]''

    docker ps --format "{{.Names}}: {{.Ports}}" 2>/dev/null | head -5

    echo ''[host 네트워크 사용]''

    docker ps -q | xargs -I{} docker inspect --format="{{.HostConfig.NetworkMode}}" {} 2>/dev/null | grep -c host | xargs -I{} echo "{}건"

    echo ''[iptables DOCKER 규칙]''

    sudo iptables -L DOCKER -n 2>/dev/null | wc -l | xargs -I{} echo "{}줄"

    echo ''=== 네트워크 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/network_security.sh && bash /tmp/network_security.sh'
  risk_level: low
