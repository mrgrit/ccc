lab_id: cloud-container-ai-week09
title: 서버리스 보안 개념 실습 (컨테이너 기반) (AI 지원)
version: ai
course: cloud-container-ai
week: 9
description: 서버리스 아키텍처의 보안 개념을 Docker 컨테이너로 시뮬레이션합니다. 단기 실행 컨테이너, 최소 이미지, 함수 격리, 입력 검증을 실습합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 서버리스 보안의 핵심 원칙(최소 권한, 격리, 단기 실행)을 이해한다
- 경량 컨테이너를 활용한 함수 실행 패턴을 구현한다
- 서버리스 환경의 공격 표면을 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 서버리스 함수처럼 단기 실행되는 컨테이너를 생성하시오. --rm 옵션으로 실행 후 자동 삭제합니다.
  hint: docker run --rm으로 일회성 컨테이너를 실행하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 서버리스 함수처럼 단기 실행되는 컨테이너를 생성하시오. --rm 옵션으로 실행 후 자동 삭제해줘

    📎 참고 (CLI): echo "=== 서버리스 시뮬레이션: 단기 실행 ==="; time docker run --rm --read-only --cap-drop ALL --memory
    64m --user 1000 alpine:latest sh -c "echo Hello from serverless function && date && id" 2>&1'''
  answer_detail: 서버리스 함수(AWS Lambda 등)는 요청 시 실행되고, 완료 후 자동 종료됩니다. Docker의 --rm은 컨테이너 종료 후 자동 삭제하여 동일한
    패턴을 구현합니다. 서버리스의 보안 장점은 짧은 수명(persistence 어려움), 불변 인프라, 자동 스케일링입니다.
  verify:
    type: output_contains
    expect:
    - serverless function
    - 성공
    field: stdout
    semantic:
      intent: '서버리스 단기 실행 컨테이너 시뮬레이션 — docker run --rm --read-only --cap-drop ALL --memory 64m --user
        1000 alpine sh -c "echo Hello from serverless function && date && id". --rm 로 실행 후 자동 삭제(ephemeral,
        persistence 차단). AWS Lambda/GCP Functions/Azure Functions 등 FaaS 와 동일 패턴. 보안 이점: (1) 짧은 수명 = attacker
        persistence 어려움 (2) immutable infrastructure (3) horizontal auto-scaling (4) 최소 attack surface.
        time 명령으로 실행 시간 측정'
      success_criteria:
      - docker run --rm 실행
      - serverless function 출력 확인
      - 단기 실행 종료
      acceptable_methods:
      - docker run --rm --read-only --cap-drop ALL + baseline
      - OpenFaaS / Knative / Fission 로 실제 FaaS 구현
      - AWS Lambda container image runtime
      - Kubernetes Jobs + TTL for short-lived
      - podman run --rm(rootless)
      negative_signs:
      - --rm 없이 수동 삭제 필요
      - 하드닝 옵션 누락
      - date/id 출력 생략
  target_vm: web
  script: 'echo "=== 서버리스 시뮬레이션: 단기 실행 ==="; time docker run --rm --read-only --cap-drop ALL --memory
    64m --user 1000 alpine:latest sh -c "echo Hello from serverless function && date && id" 2>&1'''
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)에서 서버리스 함수처럼 단기 실행되는 컨테이너를 생성하시오. --rm 옵션으로 실행 후 자동 삭제해줘
- order: 2
  instruction: 최소 이미지(Alpine vs Ubuntu)의 크기와 포함된 패키지 수를 비교하시오. 공격 표면 최소화.
  hint: docker images로 크기를 비교하고, 이미지 내 바이너리 수를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 최소 이미지(Alpine vs Ubuntu)의 크기와 포함된 패키지 수를 비교해줘

    📎 참고 (CLI): echo "=== 이미지 크기 비교 ==="; docker images alpine --format "Alpine: {{.Size}}" 2>/dev/null;
    docker images ubuntu --format "Ubuntu: {{.Size}}" 2>/dev/null; echo "=== 바이너리 수 비교 ==="; echo -n "Alpine
    /usr/bin: "; docker run --rm alpine:latest ls /usr/bin 2>/dev/null | wc -l; echo -n "Alpine /usr/sbin:
    "; docker run --rm alpine:latest ls /usr/sbin 2>/dev/null | wc -l'''
  answer_detail: 서버리스/컨테이너 보안에서 이미지 크기 최소화는 공격 표면 축소의 핵심입니다. Alpine(~5MB)은 Ubuntu(~77MB)보다 훨씬 작고, 포함된
    바이너리도 적어 악용 가능한 도구가 적습니다. Google의 distroless 이미지는 셸조차 없어 더 안전합니다.
  verify:
    type: output_contains
    expect:
    - 이미지 크기 비교
    - Alpine
    field: stdout
    semantic:
      intent: 'Alpine vs Ubuntu 크기·바이너리 비교 — docker images alpine --format Alpine: {{.Size}} + docker
        images ubuntu + docker run alpine ls /usr/bin | wc -l. 공격 표면 minimize: Alpine ~5MB·수십 바이너리 vs
        Ubuntu ~77MB·수백 바이너리. distroless(gcr.io/distroless/static) ~2MB·shell 없음(exec 공격 차단). scratch(empty)
        베이스 + static binary 가 최소. alpine 은 musl libc(glibc 아님) - 일부 호환성 이슈. 서버리스 cold start 시간에도 영향'
      success_criteria:
      - docker images 로 크기 비교
      - Alpine 키워드 포함
      - 바이너리 수 집계
      acceptable_methods:
      - docker images alpine/ubuntu --format Size + ls /usr/bin | wc -l
      - dive <image> 로 layer 분석
      - docker history 로 layer 수
      - grype/trivy 로 package 수 + vuln
      - syft 로 SBOM 생성 + 비교
      negative_signs:
      - 크기만 비교(바이너리 수 무시)
      - distroless/scratch 대안 언급 없음
      - 공격 표면 개념 이해 없음
  target_vm: web
  script: 'echo "=== 이미지 크기 비교 ==="; docker images alpine --format "Alpine: {{.Size}}" 2>/dev/null; docker
    images ubuntu --format "Ubuntu: {{.Size}}" 2>/dev/null; echo "=== 바이너리 수 비교 ==="; echo -n "Alpine
    /usr/bin: "; docker run --rm alpine:latest ls /usr/bin 2>/dev/null | wc -l; echo -n "Alpine /usr/sbin:
    "; docker run --rm alpine:latest ls /usr/sbin 2>/dev/null | wc -l'''
  risk_level: low
  bastion_prompt: 최소 이미지(Alpine vs Ubuntu)의 크기와 포함된 패키지 수를 비교해줘
- order: 3
  instruction: 서버리스 함수의 타임아웃을 시뮬레이션하시오. 무한 실행을 방지하는 보안 설정입니다.
  hint: docker run --stop-timeout 또는 timeout 명령을 사용하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 서버리스 함수의 타임아웃을 시뮬레이션해줘

    📎 참고 (CLI): echo "=== 타임아웃 시뮬레이션 ==="; timeout 5 docker run --rm alpine:latest sh -c "echo Start &&
    sleep 10 && echo End" 2>&1; echo "종료코드: $? (124=타임아웃)"'''
  answer_detail: AWS Lambda는 기본 3초, 최대 15분의 타임아웃이 있습니다. 컨테이너에서도 실행 시간을 제한해야 리소스 독점(DoS)이나 무한 루프를 방지합니다.
    timeout 명령이나 Docker의 --stop-timeout, 오케스트레이터의 activeDeadlineSeconds로 구현합니다.
  verify:
    type: output_contains
    expect: 종료코드
    field: stdout
    semantic:
      intent: '타임아웃 시뮬레이션 — timeout 5 docker run --rm alpine sh -c echo Start && sleep 10 && echo End
        + exit code 124. Lambda 기본 3초, 최대 15분. 무한 실행 방지로 (1) DoS 차단 (2) 리소스 비용 제한 (3) runaway process
        탐지. exit code 124 = timeout 명령에 의한 강제 종료. Docker 자체는 --stop-timeout(SIGTERM→SIGKILL 간격) 만 제공,
        총 실행 시간 제한은 외부(timeout, orchestrator). K8s: activeDeadlineSeconds'
      success_criteria:
      - timeout 5 docker run 실행
      - 종료코드 문자열 출력
      - 124 exit code 감지
      acceptable_methods:
      - timeout N docker run + echo $?
      - docker run --stop-timeout=N
      - K8s Job activeDeadlineSeconds
      - AWS Lambda timeout 설정
      - systemd RuntimeMaxSec=
      negative_signs:
      - timeout 없이 무한 실행 허용
      - exit code 124 해석 없음
      - --stop-timeout 과 실행시간 제한 혼동
  target_vm: web
  script: 'echo "=== 타임아웃 시뮬레이션 ==="; timeout 5 docker run --rm alpine:latest sh -c "echo Start && sleep
    10 && echo End" 2>&1; echo "종료코드: $? (124=타임아웃)"'''
  risk_level: low
  bastion_prompt: 서버리스 함수의 타임아웃을 시뮬레이션해줘
- order: 4
  instruction: 읽기 전용 컨테이너에서 파일 쓰기가 차단되는지 확인하시오. 서버리스의 불변(immutable) 실행 환경.
  hint: --read-only로 실행하고 파일 쓰기를 시도하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 읽기 전용 컨테이너에서 파일 쓰기가 차단되는지 확인해줘

    📎 참고 (CLI): echo "=== 불변 환경 테스트 ==="; docker run --rm --read-only alpine:latest sh -c "touch /test.txt
    2>&1 || echo 파일쓰기차단확인" && echo "=== tmpfs만 쓰기 가능 ==="; docker run --rm --read-only --tmpfs /tmp alpine:latest
    sh -c "echo ok > /tmp/test.txt && cat /tmp/test.txt && echo tmpfs쓰기성공"'
  answer_detail: 서버리스 함수는 /tmp을 제외하고 파일시스템이 읽기 전용입니다. 이는 악성 코드 저장, 설정 변조를 방지합니다. Docker의 --read-only와
    --tmpfs /tmp 조합이 동일한 효과를 제공합니다. 불변 인프라(Immutable Infrastructure)는 보안의 핵심 원칙입니다.
  verify:
    type: output_contains
    expect:
    - 파일쓰기차단확인
    - blocked
    field: stdout
    semantic:
      intent: immutable 실행 환경 실증 — docker run --rm --read-only alpine sh -c touch /test.txt || echo 파일쓰기차단확인
        + tmpfs /tmp 예외 쓰기 가능. --read-only 로 rootfs 쓰기 차단 → touch 실패. 쓰기 필요 디렉토리만 --tmpfs 로 예외. Lambda
        의 /tmp 은 512MB ephemeral storage 유사 모델. 공격자가 webshell·crypto miner·persistence binary 저장 불가 →
        침해 피해 최소화. Immutable Infrastructure 원칙
      success_criteria:
      - --read-only + touch 시도
      - 파일쓰기차단확인 또는 blocked 메시지
      - tmpfs /tmp 쓰기 성공 대조
      acceptable_methods:
      - docker run --rm --read-only + touch 시도
      - --read-only + --tmpfs /tmp 조합
      - 'K8s readOnlyRootFilesystem: true + volumes emptyDir'
      - Falco rule 로 runtime write 감지
      - Auditd watch rootfs write
      negative_signs:
      - --read-only 없이 일반 run
      - tmpfs 대안 없이 차단만
      - write 성공인데 차단 판정
  target_vm: web
  script: echo "=== 불변 환경 테스트 ==="; docker run --rm --read-only alpine:latest sh -c "touch /test.txt 2>&1
    || echo 파일쓰기차단확인" && echo "=== tmpfs만 쓰기 가능 ==="; docker run --rm --read-only --tmpfs /tmp alpine:latest
    sh -c "echo ok > /tmp/test.txt && cat /tmp/test.txt && echo tmpfs쓰기성공"
  risk_level: low
  bastion_prompt: 읽기 전용 컨테이너에서 파일 쓰기가 차단되는지 확인해줘
- order: 5
  instruction: 컨테이너의 네트워크 접근을 제한하시오. 서버리스 함수는 VPC 내부만 접근 가능하도록 제한할 수 있습니다.
  hint: --network none으로 네트워크 없는 컨테이너를 실행하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 컨테이너의 네트워크 접근을 제한해줘

    📎 참고 (CLI): echo "=== 네트워크 없는 컨테이너 ==="; docker run --rm --network none alpine:latest sh -c "ip addr
    2>/dev/null; ping -c 1 8.8.8.8 2>&1 | head -3; echo 네트워크격리확인"'
  answer_detail: 서버리스 함수에서 불필요한 네트워크 접근을 차단하면 데이터 유출(exfiltration)을 방지합니다. Docker의 --network none은 lo(루프백)
    인터페이스만 제공하여 외부 통신이 불가능합니다. 데이터 처리만 하고 네트워크가 불필요한 함수에 적합합니다.
  verify:
    type: output_contains
    expect:
    - 네트워크격리확인
    - Network
    field: stdout
    semantic:
      intent: '--network none 으로 네트워크 완전 차단 — docker run --rm --network none alpine sh -c ip addr; ping
        -c 1 8.8.8.8. --network none 은 lo(loopback)만 제공 - eth0 없음, outbound 불가. 데이터 처리만 하고 외부 통신 불필요한
        함수에 적합(data transformation, image processing). Exfiltration 방지. K8s 대응: NetworkPolicy egress:
        [] 또는 runtime class. Air-gap 시나리오 시뮬레이션'
      success_criteria:
      - --network none 실행
      - ping 실패 또는 Network 관련 출력
      - 네트워크격리확인 메시지
      acceptable_methods:
      - docker run --network none + ping 실패
      - docker network create --internal(외부만 차단, 내부 허용)
      - K8s NetworkPolicy default-deny egress
      - firejail --net=none (process 격리)
      - unshare --net bash
      negative_signs:
      - default bridge 사용(네트워크 있음)
      - ping 성공 정상 판정
      - internal vs none 혼동
  target_vm: web
  script: echo "=== 네트워크 없는 컨테이너 ==="; docker run --rm --network none alpine:latest sh -c "ip addr 2>/dev/null;
    ping -c 1 8.8.8.8 2>&1 | head -3; echo 네트워크격리확인"
  risk_level: low
  bastion_prompt: 컨테이너의 네트워크 접근을 제한해줘
- order: 6
  instruction: 컨테이너에서 환경 변수를 통한 설정 주입의 보안 위험을 확인하시오.
  hint: 환경 변수가 /proc에서 노출되는지 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 컨테이너에서 환경 변수를 통한 설정 주입의 보안 위험을 확인해줘

    📎 참고 (CLI): echo "=== 환경변수 노출 테스트 ==="; docker run --rm -e SECRET_KEY=my-secret-value alpine:latest
    sh -c "echo [env] && env | grep SECRET && echo [/proc/self/environ] && cat /proc/self/environ | tr
    \"\\0\" \"\\n\" | grep SECRET"'
  answer_detail: 서버리스 함수와 컨테이너 모두 환경 변수로 설정을 주입합니다. 하지만 환경 변수는 /proc/self/environ, docker inspect, 로그
    등에서 노출될 수 있습니다. 민감 정보는 AWS Secrets Manager, Docker Secrets, 마운트된 파일을 사용해야 합니다.
  verify:
    type: output_contains
    expect: SECRET
    field: stdout
    semantic:
      intent: '환경변수 노출 경로 — docker run -e SECRET_KEY=my-secret alpine sh -c env | grep SECRET + cat /proc/self/environ
        | tr \0 \n | grep SECRET. ENV 주입은 (1) env 명령 (2) /proc/<pid>/environ (3) docker inspect Env (4)
        cat /proc/self/environ 5가지 경로로 누출. 공격자가 container 접근 시 즉시 secret 획득. 대안: (1) Docker Secrets (tmpfs
        mount /run/secrets) (2) HashiCorp Vault with sidecar/agent (3) AWS Secrets Manager with SDK (4)
        K8s Secrets + encryption at rest. MITRE T1552.001·T1552.007'
      success_criteria:
      - docker run -e 환경변수 주입
      - SECRET 문자열 출력 (노출 시연)
      - /proc/self/environ 읽기
      acceptable_methods:
      - docker run -e + env + cat /proc/self/environ
      - docker inspect | jq .Config.Env
      - cat /proc/<pid>/environ (외부에서 조회)
      - HashiCorp Vault Agent injector
      - AWS IAM Role + Secrets Manager API
      negative_signs:
      - 환경변수 노출 경로 1개만 시연
      - Secret Manager 대안 없음
      - 위협 모델 없이 실행만
  target_vm: web
  script: echo "=== 환경변수 노출 테스트 ==="; docker run --rm -e SECRET_KEY=my-secret-value alpine:latest sh -c
    "echo [env] && env | grep SECRET && echo [/proc/self/environ] && cat /proc/self/environ | tr \"\\0\"
    \"\\n\" | grep SECRET"
  risk_level: low
  bastion_prompt: 컨테이너에서 환경 변수를 통한 설정 주입의 보안 위험을 확인해줘
- order: 7
  instruction: 서버리스 보안 종합 점검 스크립트를 작성하고 실행하시오.
  hint: 단기 실행, 최소 이미지, 불변 환경, 자원 제한을 종합 점검하세요.
  category: audit
  points: 18
  answer: "\U0001F916 프롬프트: 서버리스 보안 종합 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): cat <<\
    \ 'SCRIPT' > /tmp/serverless_check.sh\n#!/bin/bash\nHOST='ccc@10.20.30.80'\necho '=== 서버리스 보안 원칙 점검\
    \ ==='\necho '[최소 이미지]'\ndocker images --format \"{{.Repository}}:{{.Tag}} {{.Size}}\" | head -5 2>/dev/null\n\
    echo '[실행 중 컨테이너 보안]'\nfor CID in $(docker ps -q); do\n  NAME=$(docker inspect --format=\"{{.Name}}\"\
    \ $CID)\n  RO=$(docker inspect --format=\"{{.HostConfig.ReadonlyRootfs}}\" $CID)\n  MEM=$(docker inspect\
    \ --format=\"{{.HostConfig.Memory}}\" $CID)\n  echo \"$NAME: ReadOnly=$RO Memory=$MEM\"\ndone 2>/dev/null\n\
    echo '[자동 삭제 설정]'\ndocker ps -a --filter status=exited --format \"{{.Names}}\" | wc -l 2>/dev/null\
    \ | xargs -I{} echo \"중지된 컨테이너: {}개 (정리 필요)\"\necho '=== 서버리스 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/serverless_check.sh\
    \ && bash /tmp/serverless_check.sh"
  answer_detail: '서버리스 보안의 핵심 원칙: (1) 최소 권한 - 함수에 필요한 최소한의 IAM 권한만 부여, (2) 단기 실행 - 공격자의 persistence를 어렵게
    함, (3) 불변 환경 - 코드/바이너리 변조 방지, (4) 입력 검증 - 이벤트 소스의 데이터 검증, (5) 비밀 관리 - 환경 변수 대신 시크릿 매니저 사용.'
