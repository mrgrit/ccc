  target_vm: web
  script: 'cat << ''SCRIPT'' > /tmp/monitoring_check.sh

    #!/bin/bash

    echo ''=== 컨테이너 모니터링 점검 ===''

    echo ''[로깅 드라이버]''

    docker info --format "{{.LoggingDriver}}" 2>/dev/null

    echo ''[로그 크기 제한]''

    cat /etc/docker/daemon.json 2>/dev/null | grep max-size || echo "미설정 (무제한!)"

    echo ''[로그 파일 총 크기]''

    sudo du -sh /var/lib/docker/containers/ 2>/dev/null | cut -f1

    echo ''[실행 컨테이너]''

    docker ps --format "{{.Names}}: {{.Status}}" 2>/dev/null | head -5

    echo ''[리소스 상한]''

    docker ps -q | xargs -I{} docker inspect --format "{{.Name}}: Mem={{.HostConfig.Memory}}" {} 2>/dev/null
    | head -5

    echo ''=== 모니터링 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/monitoring_check.sh && bash /tmp/monitoring_check.sh'
