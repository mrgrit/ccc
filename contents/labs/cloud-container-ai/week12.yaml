lab_id: cloud-container-ai-week12
title: 컨테이너 모니터링 및 로깅 실습 (AI 지원)
version: ai
course: cloud-container-ai
week: 12
description: Docker 환경의 모니터링과 로깅 체계를 구축하고 점검합니다. 컨테이너 로그 수집, 리소스 모니터링, 이벤트 추적, 이상 징후 탐지를 실습합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Docker 로깅 드라이버와 로그 관리 방법을 이해한다
- 컨테이너 리소스 모니터링 체계를 구축한다
- Docker 이벤트를 활용한 보안 모니터링 방법을 습득한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 Docker의 로깅 드라이버 설정을 확인하시오.
  hint: docker info에서 Logging Driver를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 Docker의 로깅 드라이버 설정을 확인해줘

    📎 참고 (CLI): docker info --format "Logging: {{.LoggingDriver}}" && echo "--- daemon.json 로그 설정 ---"
    && cat /etc/docker/daemon.json 2>/dev/null | grep -A5 log || echo "daemon.json 로그 설정 없음 (기본값)"'''
  answer_detail: Docker 기본 로깅 드라이버는 json-file로, 컨테이너별 JSON 파일에 로그를 저장합니다. 로그 크기 제한(max-size)과 파일 수(max-file)를
    설정하지 않으면 디스크를 소진합니다. 중앙 로그 수집을 위해 syslog, fluentd, awslogs 드라이버를 사용할 수 있습니다.
  verify:
    type: output_contains
    expect: Logging
    field: stdout
    semantic:
      intent: 'Docker Logging Driver 설정 확인 — docker info --format Logging: {{.LoggingDriver}} + cat /etc/docker/daemon.json
        | grep log. Drivers: json-file(기본, local), local(binary, 효율), syslog(rsyslog), journald(systemd),
        fluentd(aggregator), awslogs(CloudWatch), gelf(Graylog), splunk, etwlogs(Windows). 기본 json-file
        은 크기 제한 없음 → max-size/max-file 설정 필수. Central log aggregation: Fluent Bit sidecar, Vector, Loki'
      success_criteria:
      - docker info LoggingDriver 실행
      - daemon.json log 설정 조회
      - Logging 키워드 출력
      acceptable_methods:
      - docker info --format Logging + grep daemon.json
      - docker inspect <c> | jq .HostConfig.LogConfig
      - cat /etc/docker/daemon.json | jq .log-driver
      - Fluent Bit + Elasticsearch
      - Loki + Promtail(경량)
      negative_signs:
      - json-file 기본값 정상 판정
      - 크기 제한 설정 없음
      - central aggregation 대안 없음
  target_vm: web
  script: 'docker info --format "Logging: {{.LoggingDriver}}" && echo "--- daemon.json 로그 설정 ---" && cat
    /etc/docker/daemon.json 2>/dev/null | grep -A5 log || echo "daemon.json 로그 설정 없음 (기본값)"'''
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)에서 Docker의 로깅 드라이버 설정을 확인해줘
- order: 2
  instruction: 실행 중인 컨테이너의 로그를 확인하시오. 보안 관련 이벤트를 식별합니다.
  hint: docker logs 명령으로 컨테이너 로그를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 실행 중인 컨테이너의 로그를 확인해줘

    📎 참고 (CLI): CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== $(docker inspect --format="{{.Name}}"
    $CID) 로그 ===" && docker logs --tail 20 $CID 2>&1 || echo "실행 중인 컨테이너 없음"'
  answer_detail: '컨테이너 로그에서 보안 이벤트를 식별해야 합니다: 인증 실패(401/403), 비정상 접근 패턴, 에러 급증, 알 수 없는 경로 접근. docker logs
    --since로 특정 시간 이후 로그를 필터링할 수 있습니다.'
  verify:
    type: output_contains
    expect: 로그
    field: stdout
    semantic:
      intent: '컨테이너 런타임 로그 조회 + 보안 이벤트 식별 — CID=$(docker ps -q | head -1); docker logs --tail 20 $CID
        2>&1. 보안 이벤트 패턴: HTTP 401/403 다발(auth fail), 5xx 급증(app 오류/공격), 비정상 path(/.env·/admin·/config),
        SQLi payload, SSRF 시도. --since 1h 로 시간 필터 + grep 로 keyword 검색. 로그 파싱 + alert: Fluent Bit 설정 또는
        SIEM(Wazuh) 통합'
      success_criteria:
      - docker logs --tail 20 실행
      - 컨테이너 이름 + 로그 내용
      - 로그 키워드 포함
      acceptable_methods:
      - docker logs --tail 20 <c>
      - docker logs -f --since 1h <c>(실시간)
      - docker logs <c> 2>&1 | grep -iE (error|failed|denied)
      - journalctl CONTAINER_NAME=<c>(journald driver)
      - kubectl logs -f pod/<pod> --since=1h
      negative_signs:
      - 로그 내용 없이 실행만
      - 보안 이벤트 패턴 언급 없음
      - tail 대신 전체 출력
  target_vm: web
  script: CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== $(docker inspect --format="{{.Name}}"
    $CID) 로그 ===" && docker logs --tail 20 $CID 2>&1 || echo "실행 중인 컨테이너 없음"
  risk_level: low
  bastion_prompt: 실행 중인 컨테이너의 로그를 확인해줘
- order: 3
  instruction: 컨테이너별 로그 파일 크기를 확인하시오. 로그 크기 제한이 없으면 디스크 소진 위험이 있습니다.
  hint: /var/lib/docker/containers/ 하위의 로그 파일 크기를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 컨테이너별 로그 파일 크기를 확인해줘

    📎 참고 (CLI): echo "=== 컨테이너 로그 크기 ==="; sudo find /var/lib/docker/containers/ -name "*-json.log" -exec
    ls -lh {} \; 2>/dev/null | awk "{print \$5, \$NF}" | head -10 || echo "로그 파일 없음"'
  answer_detail: json-file 드라이버는 기본적으로 로그 크기에 제한이 없어 디스크를 가득 채울 수 있습니다. daemon.json에서 전역 설정하거나, 컨테이너별로
    --log-opt max-size=10m --log-opt max-file=3을 설정하여 로그 크기를 관리해야 합니다.
  verify:
    type: output_contains
    expect:
    - 컨테이너 로그 크기
    - 로그크기
    field: stdout
    semantic:
      intent: '컨테이너 log 파일 크기 조사 — sudo find /var/lib/docker/containers/ -name *-json.log -exec ls -lh
        (관례 semicolon 종료) + awk size/name 추출. json-file driver 는 /var/lib/docker/containers/<id>/<id>-json.log
        에 저장. 크기 제한 없으면 GB 단위로 증가 → 디스크 소진 DoS. 대응: daemon.json 전역 log-opts max-size=10m max-file=3 또는
        컨테이너별 --log-opt. logrotate 보완. 클라우드 log cost 관리'
      success_criteria:
      - find 로 log 파일 크기 조사
      - 컨테이너 로그 크기 또는 로그크기 문자열
      - 파일 크기 출력
      acceptable_methods:
      - find + ls -lh 크기 조사
      - du -ah /var/lib/docker/containers/ | sort -hr | head
      - docker logs --tail 10 <c> | wc -c (논리 크기)
      - logrotate 설정 확인
      - Prometheus docker_log_bytes metric
      negative_signs:
      - log 파일 경로 오타
      - 크기 제한 없이 무제한 정상 판정
      - logrotate 대안 언급 없음
  target_vm: web
  script: echo "=== 컨테이너 로그 크기 ==="; sudo find /var/lib/docker/containers/ -name "*-json.log" -exec ls
    -lh {} \; 2>/dev/null | awk "{print \$5, \$NF}" | head -10 || echo "로그 파일 없음"
  risk_level: low
  bastion_prompt: 컨테이너별 로그 파일 크기를 확인해줘
- order: 4
  instruction: Docker 이벤트 스트림을 확인하시오. 컨테이너 생성/시작/중지 등의 이벤트를 모니터링합니다.
  hint: docker events --since 또는 docker system events를 사용하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 벤트 스트림을확인해줘

    📎 참고 (CLI): echo "=== Docker 이벤트 (최근 1시간) ==="; docker events --since 1h --until 0s --format "{{.Time}}
    {{.Action}} {{.Actor.Attributes.name}}" 2>/dev/null | head -15 || echo "최근 이벤트 없음"'
  answer_detail: Docker 이벤트는 컨테이너 라이프사이클(create, start, stop, destroy), 이미지(pull, push), 네트워크(connect,
    disconnect) 등을 추적합니다. 보안 모니터링에서 비인가 컨테이너 생성, 이미지 pull, 네트워크 변경을 감지할 수 있습니다.
  verify:
    type: output_contains
    expect: Docker 이벤트
    field: stdout
    semantic:
      intent: 'Docker event stream 추적 — docker events --since 1h --until 0s --format {{.Time}} {{.Action}}
        {{.Actor.Attributes.name}}. event 유형: container(create/start/kill/die/destroy/oom), image(pull/push/delete),
        network(create/connect/disconnect), volume(create/mount/destroy). 보안 이벤트: 비인가 container create,
        unauthorized image pull, network 재설정, oom kill(DoS 징후). 실시간: docker events --filter event=start
        | tee -a /var/log/docker-events.log + SIEM 전송'
      success_criteria:
      - docker events --since 실행
      - Docker 이벤트 문자열 출력
      - event 목록 또는 none
      acceptable_methods:
      - docker events --since 1h --until 0s --format
      - docker events --filter event=create,destroy(특정)
      - 실시간 fluentd + docker events input
      - Falco event engine(더 강력)
      - Wazuh docker listener integration
      negative_signs:
      - --since 없이 실시간만 (즉시 종료 안 됨)
      - format 없이 긴 출력
      - event 유형 구분 없음
  target_vm: web
  script: echo "=== Docker 이벤트 (최근 1시간) ==="; docker events --since 1h --until 0s --format "{{.Time}}
    {{.Action}} {{.Actor.Attributes.name}}" 2>/dev/null | head -15 || echo "최근 이벤트 없음"
  risk_level: low
  bastion_prompt: 벤트 스트림을확인해줘
- order: 5
  instruction: 컨테이너 리소스 사용량 스냅샷을 수집하시오.
  hint: docker stats --no-stream으로 현재 상태를 캡처하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 컨테이너 리소스 사용량 스냅샷을 수집해줘

    📎 참고 (CLI): echo "=== 리소스 사용량 스냅샷 ==="; docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.PIDs}}"
    2>/dev/null || echo "실행 중인 컨테이너 없음"'
  answer_detail: 리소스 모니터링은 성능과 보안 모두에 중요합니다. 비정상적인 CPU/메모리 급증은 암호화폐 채굴(cryptojacking), 데이터 유출, DoS 공격의
    징후일 수 있습니다. Prometheus + cAdvisor로 시계열 데이터를 수집하고 Grafana로 대시보드를 구성합니다.
  verify:
    type: output_contains
    expect:
    - 리소스 사용량 스냅샷
    - snapshot
    field: stdout
    semantic:
      intent: '컨테이너 resource 스냅샷 수집 — docker stats --no-stream --format table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.PIDs}}.
        비정상 패턴: CPU 100% 지속(cryptojacking·infinite loop), MemPerc 급증(memory leak), NetIO 큰 outbound(data
        exfiltration), PIDs 급증(fork bomb). 실시간 시계열: Prometheus cAdvisor + Grafana + alert rule(CPU>80%
        5min = trigger). cryptojacking 탐지: Falco rule sensor'
      success_criteria:
      - docker stats --no-stream 실행
      - 리소스 사용량 스냅샷 또는 snapshot 문자열
      - 컨테이너별 CPU/Mem/Net 정보
      acceptable_methods:
      - docker stats --no-stream --format table
      - cat /sys/fs/cgroup/<c>/memory.current
      - cadvisor + Prometheus 시계열
      - kubectl top pods(K8s)
      - Falco cryptomining rule
      negative_signs:
      - --no-stream 없이 인터랙티브
      - anomaly 기준 없음
      - cryptojacking 위협 미인지
  target_vm: web
  script: echo "=== 리소스 사용량 스냅샷 ==="; docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}\t{{.NetIO}}\t{{.PIDs}}"
    2>/dev/null || echo "실행 중인 컨테이너 없음"
  risk_level: low
  bastion_prompt: 컨테이너 리소스 사용량 스냅샷을 수집해줘
- order: 6
  instruction: 호스트에서 컨테이너 관련 시스템 로그를 확인하시오.
  hint: journalctl로 docker 서비스 로그를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 호스트에서 컨테이너 관련 시스템 로그를 확인해줘

    📎 참고 (CLI): echo "=== Docker 데몬 로그 ==="; sudo journalctl -u docker --no-pager -n 20 2>/dev/null |
    tail -15'
  answer_detail: Docker 데몬 로그에는 컨테이너 시작/중지 실패, 이미지 pull 오류, 네트워크 문제, 보안 관련 경고가 기록됩니다. 데몬 크래시, OOM Kill,
    디스크 부족 등의 시스템 수준 이벤트도 확인할 수 있습니다.
  verify:
    type: output_contains
    expect:
    - Docker 데몬 로그
    - 로그
    field: stdout
    semantic:
      intent: 'Docker daemon systemd 로그 — sudo journalctl -u docker --no-pager -n 20 | tail -15. dockerd
        daemon 수준 이벤트: 시작/중지, 컨테이너 오류(OOM Kill, cannot find image), 이미지 pull 실패, 네트워크 문제(bridge 생성 실패),
        storage driver 오류. 주요 patterns: failed to start container, OOM killer, no space left on device,
        runtime/runc error. --since 1h 또는 -p err 로 에러만. Datadog/Splunk Agent 로 수집'
      success_criteria:
      - journalctl -u docker 실행
      - Docker 데몬 로그 또는 로그 문자열
      - 20 라인 출력
      acceptable_methods:
      - sudo journalctl -u docker --no-pager -n 20
      - sudo journalctl -u docker --since 1h -p err
      - sudo tail -f /var/log/docker.log(syslog driver)
      - Datadog/Splunk agent 수집
      - rsyslog forward to central
      negative_signs:
      - container 로그와 데몬 로그 혼동
      - --no-pager 없어 ssh 환경 hang
      - 에러 필터 없이 전체
  target_vm: web
  script: echo "=== Docker 데몬 로그 ==="; sudo journalctl -u docker --no-pager -n 20 2>/dev/null | tail -15
  risk_level: low
  bastion_prompt: 호스트에서 컨테이너 관련 시스템 로그를 확인해줘
- order: 7
  instruction: 컨테이너 모니터링 보안 점검 스크립트를 작성하고 실행하시오.
  hint: 로그 설정, 리소스, 이벤트를 종합 점검하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 컨테이너 모니터링 보안 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/monitoring_check.sh

    #!/bin/bash

    echo ''=== 컨테이너 모니터링 점검 ===''

    echo ''[로깅 드라이버]''

    docker info --format "{{.LoggingDriver}}" 2>/dev/null

    echo ''[로그 크기 제한]''

    cat /etc/docker/daemon.json 2>/dev/null | grep max-size || echo "미설정 (무제한!)"

    echo ''[로그 파일 총 크기]''

    sudo du -sh /var/lib/docker/containers/ 2>/dev/null | cut -f1

    echo ''[실행 컨테이너]''

    docker ps --format "{{.Names}}: {{.Status}}" 2>/dev/null | head -5

    echo ''[리소스 상한]''

    docker ps -q | xargs -I{} docker inspect --format "{{.Name}}: Mem={{.HostConfig.Memory}}" {} 2>/dev/null
    | head -5

    echo ''=== 모니터링 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/monitoring_check.sh && bash /tmp/monitoring_check.sh'
  answer_detail: '컨테이너 모니터링의 3대 축: (1) 로그(Logs) - 애플리케이션/시스템 이벤트 추적, (2) 메트릭(Metrics) - CPU/메모리/네트워크 리소스
    측정, (3) 트레이스(Traces) - 요청 흐름 추적. 클라우드 네이티브 환경에서는 ELK/EFK(로그), Prometheus/Grafana(메트릭), Jaeger(트레이스)를
    사용합니다.'
  verify:
    type: output_contains
    expect: 모니터링 점검 완료
    field: stdout
    semantic:
      intent: '컨테이너 모니터링 종합 점검 스크립트 — /tmp/monitoring_check.sh heredoc. 5 지표: LoggingDriver, max-size
