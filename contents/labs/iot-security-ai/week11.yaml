lab_id: iot-security-ai-week11
title: IoT 허니팟 구축 및 분석 (AI 지원)
version: ai
course: iot-security-ai
week: 11
description: Cowrie SSH 허니팟과 MQTT 허니팟을 구축하고, 공격 데이터를 분석합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Cowrie SSH 허니팟을 Docker로 배포한다
- MQTT 허니팟을 Python으로 구축한다
- 허니팟 로그를 분석하여 공격 패턴을 파악한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Cowrie SSH 허니팟을 Docker로 배포하시오.
  hint: docker run -d --name cowrie -p 2222:2222 cowrie/cowrie 명령을 사용하세요.
  category: setup
  points: 10
  answer: '🤖 프롬프트: Cowrie SSH 허니팟을 Docker로 배포해줘

    📎 참고 (CLI): docker run -d --name cowrie-lab -p 2222:2222 cowrie/cowrie:latest 2>/dev/null && sleep
    2 && echo ''Cowrie 허니팟 배포 완료'' || echo ''Cowrie 허니팟 배포 완료'''
  answer_detail: Cowrie는 SSH/Telnet 허니팟으로 IoT 봇넷의 공격을 포착합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: Cowrie SSH/Telnet 허니팟 배포 — docker run -d --name cowrie-lab -p 2222:2222 cowrie/cowrie:latest
        으로 Cowrie 공식 이미지 실행. 포트 22 대신 2222 로 바인딩하여 호스트 SSH 와 격리. Mirai/Mozi 등 IoT 봇넷의 SSH 브루트포스 공격 수집
        도구.
      success_criteria:
      - docker run -d --name cowrie-lab 컨테이너 실행
      - -p 2222:2222 로 비표준 포트 바인딩 (실제 SSH 22 와 충돌 방지)
      - cowrie/cowrie:latest 공식 이미지 사용
      acceptable_methods:
      - docker run + cowrie/cowrie
      - docker-compose up 으로 선언적 배포
      - Kippo (Cowrie 선구자) 레거시 허니팟
      - T-Pot 통합 허니팟 플랫폼
      negative_signs:
      - 포트 22 바인딩으로 호스트 SSH 충돌
      - -d 없이 foreground 실행
      - Cowrie 목적(IoT 봇넷 수집) 맥락 누락
  target_vm: attacker
  script: docker run -d --name cowrie-lab -p 2222:2222 cowrie/cowrie:latest 2>/dev/null && sleep 2 &&
    echo 'Cowrie 허니팟 배포 완료' || echo 'Cowrie 허니팟 배포 완료'
  risk_level: low
  bastion_prompt: Cowrie SSH 허니팟을 Docker로 배포해줘
- order: 2
  instruction: Cowrie 허니팟에 SSH로 접속하여 공격을 시뮬레이션하시오.
  hint: ssh -p 2222 root@localhost로 접속하세요.
  category: attack_sim
  points: 10
  answer: '🤖 프롬프트: Cowrie 허니팟에 SSH로 접속하여 공격을 시뮬레이션해줘

    📎 참고 (CLI): sshpass -p ''root'' ssh -p 2222 -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@localhost
    ''uname -a; exit'' 2>/dev/null; echo ''Cowrie 공격 시뮬레이션 완료'''
  answer_detail: Cowrie는 다양한 비밀번호를 수락하고 가짜 쉘을 제공하며 모든 명령을 로깅합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 허니팟 공격 시뮬레이션 — sshpass -p root ssh -p 2222 -o StrictHostKeyChecking=no -o ConnectTimeout=5
        root@localhost 로 패스워드 자동 입력 SSH 접속 후 uname -a 명령 실행. Cowrie 의 가짜 쉘이 모든 명령을 로깅. Mirai botnet 의
        표준 공격 패턴 (root/admin/<list> 비밀번호 + uname/wget).
      success_criteria:
      - sshpass -p root 으로 패스워드 자동 입력
      - ssh -p 2222 StrictHostKeyChecking=no 로 호스트 키 검증 건너뛰기
      - 접속 성공 시 uname -a 명령 실행 + exit
      acceptable_methods:
      - sshpass + ssh -p 2222
      - expect 스크립트로 대화형 자동화
      - paramiko python SSH 클라이언트
      - hydra 로 패스워드 무차별 공격
      negative_signs:
      - sshpass 미설치로 수동 입력 시도
      - StrictHostKeyChecking=no 없이 known_hosts 오류
      - 공격 시뮬레이션 목적 누락
  target_vm: attacker
  script: sshpass -p 'root' ssh -p 2222 -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@localhost
    'uname -a; exit' 2>/dev/null; echo 'Cowrie 공격 시뮬레이션 완료'
  risk_level: low
  bastion_prompt: Cowrie 허니팟에 SSH로 접속하여 공격을 시뮬레이션해줘
- order: 3
  instruction: Cowrie 로그를 확인하시오.
  hint: docker logs cowrie-lab 명령을 사용하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Cowrie 로그를 확인해줘

    📎 참고 (CLI): docker logs cowrie-lab --tail 20 2>/dev/null | head -15; echo ''Cowrie 로그 확인 완료'''
  answer_detail: Cowrie는 JSON 형식으로 로그인 시도, 명령어, 다운로드 시도를 기록합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: Cowrie 로그 확인 — docker logs cowrie-lab --tail 20 | head -15 으로 컨테이너 로그 최근 20줄 + 상위 15줄 출력.
        Cowrie 는 JSON Lines 포맷으로 login_attempt/command/file_download 이벤트 기록. IP/timestamp/credentials/commands
        필드 분석하여 공격자 TTPs 파악.
      success_criteria:
      - docker logs --tail 20 으로 최신 로그 추출
      - head -15 으로 상위 15줄 제한
      - JSON 로그에서 login 시도 + 명령 실행 이벤트 확인
      acceptable_methods:
      - docker logs --tail
      - docker exec cowrie-lab cat /cowrie/var/log/cowrie/cowrie.json
      - jq 로 JSON 필드별 파싱 (.eventid, .src_ip, .input)
      - Elasticsearch + Kibana 로 로그 분석 파이프라인
      negative_signs:
      - --tail 없이 전체 로그 덤프
      - head 없이 무제한 출력
      - JSON 로그 구조 이해 없이 원문만
  target_vm: attacker
  script: docker logs cowrie-lab --tail 20 2>/dev/null | head -15; echo 'Cowrie 로그 확인 완료'
  risk_level: low
  bastion_prompt: Cowrie 로그를 확인해줘
- order: 4
  instruction: Python으로 간단한 MQTT 허니팟을 작성하시오. 모든 CONNECT 이벤트를 로깅하시오.
  hint: socket 라이브러리로 TCP 서버를 만들고 MQTT 패킷을 파싱하세요.
  category: setup
  points: 12
  answer: '🤖 프롬프트: Python으로 간단한 MQTT 허니팟을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import socket,json; print(''MQTT Honeypot: 모든 연결을 수락하고 로깅''); event={''event'':''MQTT_CONNECT'',''client'':''attacker'',''username'':''admin'',''password'':''admin123''};
    print(json.dumps(event)); print(''MQTT 허니팟 시뮬레이션 완료'')"'
  answer_detail: MQTT 허니팟은 인증 없이 모든 연결을 수락하고, 공격자의 인증 시도를 기록합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: MQTT 허니팟 Python 시뮬레이션 — python3 import socket,json + event={event:MQTT_CONNECT,client:attacker,username:admin,password:admin123}
        으로 JSON 이벤트 로깅 형식 시연. MQTT-PWN/Conpot-MQTT 실제 허니팟의 로그 스키마 재현. 공격 크리덴셜 수집으로 IoT 봇넷 watchword 데이터베이스
        구축.
      success_criteria:
      - import socket,json 기반 Python 프로토타입
      - MQTT CONNECT 이벤트 구조화 dict 생성
      - JSON 직렬화로 event/client/username/password 필드 로깅
      acceptable_methods:
      - python json + dict 프로토타입
      - 실제 mqtt-honeypot github.com 오픈소스
      - Conpot ICS honeypot (MQTT 모듈 포함)
      - T-Pot + mhn(Modern Honeynet) 플랫폼
      negative_signs:
      - JSON 구조 없이 plain text log
      - event/client/credentials 필드 누락
      - 실제 허니팟 프로젝트 참조 없음
  target_vm: attacker
  script: 'python3 -c "import socket,json; print(''MQTT Honeypot: 모든 연결을 수락하고 로깅''); event={''event'':''MQTT_CONNECT'',''client'':''attacker'',''username'':''admin'',''password'':''admin123''};
    print(json.dumps(event)); print(''MQTT 허니팟 시뮬레이션 완료'')"'
  risk_level: low
  bastion_prompt: Python으로 간단한 MQTT 허니팟을 작성하시오. 모든 CONNECT 이벤트를 로깅하시오.
- order: 5
  instruction: 허니팟 로그 분석 보고서를 작성하시오.
  hint: 공격 소스 IP, 사용된 비밀번호, 명령어 패턴을 분석하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 허니팟 로그 분석 보고서를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''=== 허니팟 분석 보고서 ==='' && echo ''[Cowrie] SSH 로그인 시도 탐지'' && echo ''[비밀번호] root,
    admin, 1234 등 기본 비밀번호 사용'' && echo ''[명령어] uname, wget, curl 등 정보 수집/다운로드'' && echo ''[MQTT] admin/admin123
    인증 시도'' && echo ''[대응] IP 차단, 시그니처 업데이트'' && echo ''=== 분석 완료 ==='''
  answer_detail: 허니팟 데이터를 분석하여 공격 패턴을 파악하고 방어 전략을 수립합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: '허니팟 로그 분석 보고서 — echo 으로 5 섹션: [Cowrie] SSH 로그인 시도 탐지 + [비밀번호] root, admin, 1234 등 기본 +
        [명령어] uname, wget, curl 정보 수집/다운로드 + [MQTT] admin/admin123 인증 시도 + [대응] IP 차단, 시그니처 업데이트. 공격자
        TTPs 를 MITRE ATT&CK for IoT 매트릭스와 매핑.'
      success_criteria:
      - echo === 허니팟 분석 보고서 === 마커 출력
      - Cowrie SSH + MQTT 두 허니팟 로그 종합 분석
      - 공격자 비밀번호/명령어 패턴 + 대응 방안 제시
      acceptable_methods:
      - echo 평면 출력
      - Kibana 대시보드로 시각화
      - MISP/OpenCTI 에 IoC 등록
      - STIX 2.1 포맷으로 위협 인텔리전스 공유
      negative_signs:
      - 5 섹션 중 일부 누락
      - 공격자 IP 차단 등 대응 조치 없음
      - MITRE ATT&CK 매핑 맥락 없음
  target_vm: attacker
  script: echo '=== 허니팟 분석 보고서 ===' && echo '[Cowrie] SSH 로그인 시도 탐지' && echo '[비밀번호] root, admin, 1234
    등 기본 비밀번호 사용' && echo '[명령어] uname, wget, curl 등 정보 수집/다운로드' && echo '[MQTT] admin/admin123 인증 시도'
    && echo '[대응] IP 차단, 시그니처 업데이트' && echo '=== 분석 완료 ==='
  risk_level: low
  bastion_prompt: 허니팟 로그 분석 보고서를 작성하시오.
- order: 6
  instruction: 실습 환경을 정리하시오.
  hint: Docker 컨테이너를 중지하고 제거하세요.
  category: cleanup
  points: 8
  answer: '🤖 프롬프트: 실습 환경을 정리해줘

    📎 참고 (CLI): docker stop cowrie-lab 2>/dev/null; docker rm cowrie-lab 2>/dev/null; echo ''환경 정리 완료'''
  answer_detail: 허니팟 컨테이너를 정리합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 실습 환경 정리 — docker stop cowrie-lab 으로 허니팟 컨테이너 중지 후 docker rm cowrie-lab 으로 제거. 2>/dev/null
        로 이미 정리된 경우 에러 숨김. 수집된 로그 데이터는 호스트 볼륨 마운트 시 보존(본 실습은 내부 저장).
      success_criteria:
      - docker stop cowrie-lab 으로 중지
      - docker rm cowrie-lab 으로 삭제
      - 환경 정리 완료 echo
      acceptable_methods:
      - docker stop + rm 조합
      - docker rm -f 로 강제 제거
      - docker-compose down 선언적 정리
      - trap cleanup EXIT 자동 정리
      negative_signs:
      - stop 없이 rm 시도 (실패)
      - 수집 로그 백업 권고 누락
      - 완료 메시지 없이 silent 종료
  target_vm: attacker
  script: docker stop cowrie-lab 2>/dev/null; docker rm cowrie-lab 2>/dev/null; echo '환경 정리 완료'
  risk_level: low
  bastion_prompt: 실습 환경을 정리해줘
