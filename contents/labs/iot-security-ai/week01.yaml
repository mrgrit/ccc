lab_id: iot-security-ai-week01
title: IoT 보안 개론 — MQTT 브로커 구축 및 정찰 (AI 지원)
version: ai
course: iot-security-ai
week: 1
description: IoT 아키텍처를 이해하고, MQTT 브로커를 Docker로 구축하여 IoT 서비스 정찰을 수행합니다.
difficulty: easy
duration_minutes: 120
objectives:
- MQTT 브로커를 Docker로 구축한다
- IoT 서비스 포트 스캔을 수행한다
- MQTT 토픽 구독/발행을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Docker로 Mosquitto MQTT 브로커를 실행하시오. 컨테이너 이름은 mqtt-broker, 포트는 1883으로
    설정하시오.
  hint: docker run -d --name mqtt-broker -p 1883:1883 eclipse-mosquitto:2 명령을 사용하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: web VM(10.20.30.80)에서 eclipse-mosquitto:2 이미지로 컨테이너 이름 mqtt-broker,
    포트 1883으로 MQTT 브로커를 docker로 실행해줘

    📎 참고 (CLI): docker run -d --name mqtt-broker -p 1883:1883 eclipse-mosquitto:2
    mosquitto -c /dev/null -p 1883 -v && echo ''MQTT 브로커 실행 완료'''
  answer_detail: Eclipse Mosquitto는 가장 널리 사용되는 오픈소스 MQTT 브로커입니다. -c /dev/null로 기본
    설정 없이 실행합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: IoT 실습 환경 구축 — docker run -d --name mqtt-broker -p 1883:1883 eclipse-mosquitto:2
        mosquitto -c /dev/null -p 1883 -v 로 Eclipse Mosquitto 2 이미지 기반 MQTT 브로커 컨테이너를
        데몬 모드로 실행. -c /dev/null 으로 기본 설정 없이(익명 접근 허용) 실행하여 OWASP IoT I1 취약점 실습 환경
        구성.
      success_criteria:
      - docker run -d 로 분리 모드 컨테이너 실행
      - --name mqtt-broker 로 식별자 지정
      - -p 1883:1883 포트 매핑 + eclipse-mosquitto:2 이미지 사용
      acceptable_methods:
      - docker run -d --name mqtt-broker -p 1883:1883 eclipse-mosquitto:2
      - podman run 으로 rootless 대체
      - docker-compose up -d 로 compose 파일 사용
      - eclipse-mosquitto:latest 태그로 버전 명시적 고정 대체
      negative_signs:
      - -d 없이 foreground 로 실행
      - --name 지정 없이 랜덤 이름 생성
      - 포트 매핑 누락으로 외부 접근 불가
  target_vm: attacker
  script: docker run -d --name mqtt-broker -p 1883:1883 eclipse-mosquitto:2 mosquitto
    -c /dev/null -p 1883 -v && echo 'MQTT 브로커 실행 완료'
  risk_level: low
  bastion_prompt: web VM(10.20.30.80)에서 eclipse-mosquitto:2 이미지로 컨테이너 이름 mqtt-broker,
    포트 1883으로 MQTT 브로커를 docker로 실행해줘
- order: 2
  instruction: MQTT 브로커가 정상적으로 동작하는지 확인하시오.
  hint: docker ps 명령으로 컨테이너 상태를 확인하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: web VM(10.20.30.80)에서 mqtt-broker 컨테이너가 실행 중인지 docker ps로 확인해줘

    📎 참고 (CLI): docker ps --filter name=mqtt-broker --format ''{{.Names}} {{.Status}}''
    && echo ''MQTT 상태 확인 완료'''
  answer_detail: docker ps로 컨테이너 상태를 확인합니다. Up 상태이면 정상 동작입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: MQTT 브로커 실행 상태 검증 — docker ps --filter name=mqtt-broker --format {{.Names}}
        {{.Status}} 로 mqtt-broker 컨테이너의 Up 상태 및 실행 시간 확인. Exited/Restarting 시 docker
        logs 로 원인 분석 필요.
      success_criteria:
      - docker ps 명령 실행으로 실행 중 컨테이너 조회
      - --filter name=mqtt-broker 로 대상 컨테이너만 출력
      - --format 으로 Names/Status 필드만 파싱하여 Up 상태 확인
      acceptable_methods:
      - docker ps --filter name=mqtt-broker --format
      - docker inspect mqtt-broker --format {{.State.Status}} 로 상세 상태
      - docker container ls | grep mqtt-broker
      - podman ps 로 대체 (rootless 환경)
      negative_signs:
      - docker ps 없이 설명만
      - --filter 없이 전체 컨테이너 덤프
      - Up 상태 확인 없이 완료 선언
  target_vm: attacker
  script: docker ps --filter name=mqtt-broker --format '{{.Names}} {{.Status}}' &&
    echo 'MQTT 상태 확인 완료'
  risk_level: low
  bastion_prompt: web VM(10.20.30.80)에서 mqtt-broker 컨테이너가 실행 중인지 docker ps로 확인해줘
- order: 3
  instruction: nmap으로 대상 서버({{WEB_IP}})의 IoT 관련 포트(1883, 5683, 8080, 8883)를 스캔하시오.
  hint: nmap -sV -p 1883,5683,8080,8883 명령을 사용하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap으로 대상 서버(10.20.30.80)의 IoT 관련 포트(1883, 5683, 8080, 8883)를 스캔해줘

    📎 참고 (CLI): nmap -sV -p 1883,5683,8080,8883 10.20.30.80 2>/dev/null && echo ''IoT
    포트 스캔 완료'''
  answer_detail: MQTT(1883), CoAP(5683), HTTP(8080), MQTT-TLS(8883) 등 IoT 관련 포트를 스캔합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: IoT 서비스 포트 정찰 — nmap -sV -p 1883,5683,8080,8883 10.20.30.80 으로 4개 IoT
        핵심 프로토콜 포트 버전 스캔. MQTT(1883 평문), CoAP(5683 UDP), HTTP/REST API(8080), MQTT-TLS(8883
        암호화) 서비스 노출 여부와 버전 정보 식별. MITRE T1046 Network Service Scanning.
      success_criteria:
      - nmap -sV 로 서비스 버전 감지 활성화
      - -p 1883,5683,8080,8883 네 포트 동시 스캔
      - 대상 IP 10.20.30.80 지정하여 외부 관점 서비스 탐지
      acceptable_methods:
      - nmap -sV -p 1883,5683,8080,8883 10.20.30.80
      - nmap -sU -p 5683 로 CoAP UDP 별도 스캔
      - rustscan -a 10.20.30.80 -p 1883,5683,8080,8883 빠른 스캔
      - masscan -p1883,5683,8080,8883 대체
      negative_signs:
      - -sV 없이 포트 오픈만 확인
      - 4개 포트 중 일부 누락
      - IoT 프로토콜 의미 맥락 없이 스캔
  target_vm: attacker
  script: nmap -sV -p 1883,5683,8080,8883 10.20.30.80 2>/dev/null && echo 'IoT 포트
    스캔 완료'
  risk_level: low
  bastion_prompt: 'nmap으로 대상 서버(10.20.30.80)의 IoT 관련 포트(1883, 5683, 8080, 8883)를 스캔해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: mosquitto_sub 명령으로 MQTT 브로커의 모든 토픽(#)을 구독하시오.
  hint: mosquitto_sub -h localhost -t "#" -v -C 5 명령으로 5개 메시지까지 수신합니다.
  category: mqtt
  points: 10
  answer: '🤖 프롬프트: mosquitto_sub 명령으로 MQTT 브로커의 모든 토픽(#)을 구독해줘

    📎 참고 (CLI): mosquitto_sub -h localhost -t ''#'' -v -C 1 -W 3 2>/dev/null; echo
    ''MQTT 구독 테스트 완료'''
  answer_detail: '# 은 모든 토픽을 구독하는 와일드카드입니다. -C 1은 1개 메시지 수신 후 종료합니다.'
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'MQTT 토픽 무차별 구독 (도청) — mosquitto_sub -h localhost -t # -v -C 1 -W 3
        으로 MQTT 와일드카드 # 을 사용해 모든 토픽 subscribe. -C 1 최대 1 메시지, -W 3 최대 3초 대기. 인증 없이
        도청 성공 시 OWASP IoT I1/I7(취약 인증/불안전 데이터 전송) 확인.'
      success_criteria:
      - 'mosquitto_sub -h localhost -t # 로 전체 토픽 와일드카드 구독'
      - -v 상세 출력(토픽명 + 페이로드) + -C 1 메시지 카운트 제한
      - -W 3 timeout 설정으로 무한 대기 방지
      acceptable_methods:
      - 'mosquitto_sub -h <host> -t # -v -C 1 -W 3'
      - paho-mqtt python 클라이언트로 subscribe(#) 구현
      - MQTT Explorer GUI 로 와일드카드 구독
      - mqttcli/emqx_ctl 대체 사용
      negative_signs:
      - '와일드카드 # 없이 특정 토픽만 구독'
      - timeout 없이 무한 대기
      - 도청 = OWASP I1 취약점 맥락 누락
  target_vm: attacker
  script: mosquitto_sub -h localhost -t '#' -v -C 1 -W 3 2>/dev/null; echo 'MQTT 구독
    테스트 완료'
  risk_level: low
  bastion_prompt: mosquitto_sub 명령으로 MQTT 브로커의 모든 토픽(#)을 구독해줘
- order: 5
  instruction: mosquitto_pub 명령으로 IoT 센서 데이터를 발행하시오. 토픽은 iot/sensor/temp, 메시지는 {"value":25.3,"unit":"C"}으로
    설정하시오.
  hint: mosquitto_pub -h localhost -t "iot/sensor/temp" -m '메시지' 명령을 사용하세요.
  category: mqtt
  points: 10
  answer: '🤖 프롬프트: mosquitto_pub 명령으로 IoT 센서 데이터를 발행해줘

    📎 참고 (CLI): mosquitto_pub -h localhost -t ''iot/sensor/temp'' -m ''{"value":25.3,"unit":"C"}''
    && echo ''MQTT 발행 완료'''
  answer_detail: mosquitto_pub으로 특정 토픽에 메시지를 발행합니다. IoT 센서가 데이터를 전송하는 것을 시뮬레이션합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: MQTT 데이터 주입 (센서 스푸핑) — mosquitto_pub -h localhost -t iot/sensor/temp
        -m {"value":25.3,"unit":"C"} 로 JSON 페이로드 temp 토픽에 publish. 인증 없이 가짜 센서 데이터
        주입 가능하면 OWASP IoT I7 + MITRE T1499(Endpoint DoS) 위협. 실제 IoT 시스템에서 센서 위조 공격
        실습.
      success_criteria:
      - mosquitto_pub -h localhost 명령으로 publisher 실행
      - -t iot/sensor/temp 로 토픽 지정 + -m 으로 JSON 페이로드 전달
      - value/unit 필드 포함 구조화 메시지 전송
      acceptable_methods:
      - mosquitto_pub -h <host> -t <topic> -m <msg>
      - paho-mqtt python client.publish() 로 programmatic 전송
      - MQTT Explorer GUI publish
      - ThingsBoard/NiFi 기반 대량 publish
      negative_signs:
      - JSON 형식 대신 plain text 전송
      - '특정 토픽 지정 없이 # 에 publish 시도'
      - 센서 스푸핑 위협 맥락 누락
  target_vm: attacker
  script: mosquitto_pub -h localhost -t 'iot/sensor/temp' -m '{"value":25.3,"unit":"C"}'
    && echo 'MQTT 발행 완료'
  risk_level: low
  bastion_prompt: mosquitto_pub 명령으로 IoT 센서 데이터를 발행해줘
- order: 6
  instruction: MQTT 시스템 토픽($SYS)을 구독하여 브로커 정보를 수집하시오.
  hint: mosquitto_sub -h localhost -t '$SYS/#' -v -C 10 명령을 사용하세요.
  category: recon
  points: 12
  answer: '🤖 프롬프트: MQTT 시스템 토픽($SYS)을 구독하여 브로커 정보를 수집해줘

    📎 참고 (CLI): mosquitto_sub -h localhost -t ''$SYS/#'' -v -C 5 -W 5 2>/dev/null;
    echo ''SYS 토픽 수집 완료'''
  answer_detail: $SYS 토픽은 MQTT 브로커의 상태 정보(연결 수, 메시지 수, 버전 등)를 제공합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: MQTT 브로커 정보 누출 ($SYS 토픽) — mosquitto_sub -h localhost -t $SYS/# -v -C
        5 -W 5 으로 $SYS 시스템 토픽 계층 전체 구독하여 브로커 버전/연결 클라이언트 수/송수신 메시지 통계/uptime 정보 5건
        수집. 공격자에게 인프라 정보 노출되는 정보 수집 단계.
      success_criteria:
      - mosquitto_sub -t $SYS/# 시스템 토픽 와일드카드 구독
      - -C 5 로 5 메시지 수신 제한 + -W 5 timeout
      - 브로커 version/client 수/uptime 등 정보 수집
      acceptable_methods:
      - mosquitto_sub -h localhost -t $SYS/# -v -C 5 -W 5
      - mosquitto_sub -t $SYS/broker/# 으로 broker 섹션만 필터
      - MQTT.fx GUI 로 $SYS 구독
      - paho-mqtt client 에서 subscribe($SYS/#)
      negative_signs:
      - '$SYS 대신 일반 토픽 # 구독'
      - -C/-W 없이 무한 대기
      - 브로커 정보 노출 = 정보 수집 공격 맥락 누락
  target_vm: attacker
  script: mosquitto_sub -h localhost -t '$SYS/#' -v -C 5 -W 5 2>/dev/null; echo 'SYS
    토픽 수집 완료'
  risk_level: low
  bastion_prompt: 'MQTT 시스템 토픽($SYS)을 구독하여 브로커 정보를 수집해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 7
  instruction: 5개의 서로 다른 IoT 토픽에 센서 데이터를 발행하시오 (temp, humidity, pressure, light, motion).
  hint: for 루프로 여러 토픽에 발행하세요.
  category: mqtt
  points: 10
  answer: "\U0001F916 프롬프트: 5개의 서로 다른 IoT 토픽에 센서 데이터를 발행하시오 (temp, humidity, pressure,\
    \ light, motion)해줘\n\U0001F4CE 참고 (CLI): for topic in temp humidity pressure light\
    \ motion; do\n  mosquitto_pub -h localhost -t \"iot/sensor/$topic\" -m \"{\\\"\
    value\\\":$RANDOM,\\\"sensor\\\":\\\"$topic\\\"}\";\ndone && echo '다중 토픽 발행 완료'"
  answer_detail: 실제 IoT 환경에서는 다양한 센서가 각기 다른 토픽으로 데이터를 발행합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 다중 IoT 센서 시뮬레이션 — for topic in temp humidity pressure light motion;
        do mosquitto_pub -t iot/sensor/$topic -m JSON($RANDOM); done 루프로 5개 서로 다른
        센서 토픽(온도/습도/기압/조도/동작감지)에 랜덤 값 publish. 실제 IoT 환경의 다중 센서 트래픽 모사.
      success_criteria:
      - for 루프로 5개 센서 토픽(temp/humidity/pressure/light/motion) 순회
      - iot/sensor/$topic 형식으로 계층 구조 토픽 사용
      - 각 루프에서 $RANDOM 기반 JSON 페이로드 생성 후 publish
      acceptable_methods:
      - for + mosquitto_pub 루프
      - xargs 로 병렬 publish
      - python paho-mqtt loop 로 multi-sensor simulator
      - Node-RED 로 센서 시뮬레이션 플로우
      negative_signs:
      - 단일 토픽만 publish 하고 5개 센서 루프 누락
      - JSON 형식이 아닌 plain text
      - 계층 구조(iot/sensor/*) 토픽 네이밍 무시
  target_vm: attacker
  script: "for topic in temp humidity pressure light motion; do\n  mosquitto_pub -h\
    \ localhost -t \"iot/sensor/$topic\" -m \"{\\\"value\\\":$RANDOM,\\\"sensor\\\"\
    :\\\"$topic\\\"}\";\ndone && echo '다중 토픽 발행 완료'\n"
  risk_level: low
  bastion_prompt: 5개의 서로 다른 IoT 토픽에 센서 데이터를 발행하시오 (temp, humidity, pressure, light,
    motion)해줘
- order: 8
  instruction: MQTT 브로커에 인증 없이 접근 가능한지 확인하고, OWASP IoT Top 10 I1 취약점과 연결하시오.
  hint: mosquitto_sub로 인증 없이 접근 가능 여부를 확인하세요.
  category: vulnerability
  points: 12
  answer: '🤖 프롬프트: MQTT 브로커에 인증 없이 접근 가능한지 확인하고, OWASP IoT Top 10 I1 취약점과 연결해줘

