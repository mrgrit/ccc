  instruction: Zigbee 기본 Trust Center Link Key(ZigBeeAlliance09)를 이용한 네트워크 키 복호화를 시뮬레이션하시오.
  hint: XOR 연산으로 간소화된 복호화를 수행하세요.
  category: zigbee
  points: 12
  answer: '🤖 프롬프트: Zigbee 기본 Trust Center Link Key(ZigBeeAlliance09)를 이용한 네트워크 키 복호화를 시뮬레이션해줘

    📎 참고 (CLI): python3 -c "import os,binascii; tclk=b''ZigBeeAlliance09''; nwk_key=os.urandom(16); enc_key=bytes(a^b for
    a,b in zip(nwk_key,tclk)); dec_key=bytes(a^b for a,b in zip(enc_key,tclk)); print(f''Network Key: {binascii.hexlify(nwk_key).decode()}'');
    print(f''Encrypted:   {binascii.hexlify(enc_key).decode()}''); print(f''Decrypted:   {binascii.hexlify(dec_key).decode()}'');
    print(f''Match: {nwk_key==dec_key}''); print(''Zigbee 키 복호화 완료'')"'
  answer_detail: Zigbee의 기본 TCLK가 공개되어 있어, 조인 과정에서 전송되는 네트워크 키를 복호화할 수 있습니다.
