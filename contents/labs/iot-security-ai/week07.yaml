lab_id: iot-security-ai-week07
title: BLE 해킹 시뮬레이션 (AI 지원)
version: ai
course: iot-security-ai
week: 7
description: Python으로 BLE 디바이스를 시뮬레이션하고, GATT 분석 및 스푸핑 공격을 실습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- BLE 디바이스를 시뮬레이션하고 스캔한다
- GATT 서비스와 특성을 열거한다
- BLE PIN 브루트포스 및 스푸핑을 시뮬레이션한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 BLE 디바이스(스마트 도어락) 시뮬레이터를 작성하고 GATT 프로파일을 정의하시오.
  hint: 딕셔너리로 서비스와 특성을 정의하세요.
  category: ble
  points: 10
  answer: '🤖 프롬프트: Python으로 BLE 디바이스(스마트 도어락) 시뮬레이터를 작성하고 GATT 프로파일을 정의하시오 구현 방법과
    예시를 설명해줘

    📎 참고 (CLI): python3 -c "devices={''SmartLock-01'':{''mac'':''AA:BB:CC:DD:EE:01'',''services'':{''Lock
    Control'':[''Lock Status(R)'',''Lock Command(W)'',''PIN Code(W)''],''Battery'':[''Battery
    Level(R)'']}}}; [print(f''Device: {n}, MAC: {d[\"mac\"]}'') for n,d in devices.items()];
    [print(f''  Service: {s}, Chars: {c}'') for d in devices.values() for s,c in d[''services''].items()];
    print(''BLE 시뮬레이터 생성 완료'')"'
  answer_detail: GATT 프로파일은 서비스 > 특성 > 디스크립터의 트리 구조입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "devices={''SmartLock-01'':{''mac'':''AA:BB:CC:DD:EE:01'',''services'':{''Lock
    Control'':[''Lock Status(R)'',''Lock Command(W)'',''PIN Code(W)''],''Battery'':[''Battery
    Level(R)'']}}}; [print(f''Device: {n}, MAC: {d[\"mac\"]}'') for n,d in devices.items()];
    [print(f''  Service: {s}, Chars: {c}'') for d in devices.values() for s,c in d[''services''].items()];
    print(''BLE 시뮬레이터 생성 완료'')"'
  risk_level: low
  bastion_prompt: Python으로 BLE 디바이스(스마트 도어락) 시뮬레이터를 작성하고 GATT 프로파일을 정의하시오.
- order: 2
  instruction: BLE 디바이스 스캔 결과를 시뮬레이션하시오. 4개 이상의 가상 디바이스를 출력하시오.
  hint: MAC, RSSI, 디바이스 유형을 포함하세요.
  category: ble
  points: 10
  answer: '🤖 프롬프트: BLE 디바이스 스캔 결과를 시뮬레이션하시오. 4개 이상의 가상 디바이스를 출력해줘

    📎 참고 (CLI): python3 -c "import random; devs=[(''SmartLock-01'',''AA:BB:CC:DD:EE:01'',''Lock''),(''FitBand'',''AA:BB:CC:DD:EE:02'',''Wearable''),(''SmartBulb'',''AA:BB:CC:DD:EE:03'',''Light''),(''iBeacon'',''AA:BB:CC:DD:EE:04'',''Beacon'')];
    print(''=== BLE Scan Results ===''); [print(f''  {n:15s} | {m} | RSSI: {random.randint(-90,-30)}
    dBm | {t}'') for n,m,t in devs]; print(''BLE 스캔 완료'')"'
  answer_detail: BLE 스캔은 근처의 모든 광고(Advertising) 디바이스를 탐지합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "import random; devs=[(''SmartLock-01'',''AA:BB:CC:DD:EE:01'',''Lock''),(''FitBand'',''AA:BB:CC:DD:EE:02'',''Wearable''),(''SmartBulb'',''AA:BB:CC:DD:EE:03'',''Light''),(''iBeacon'',''AA:BB:CC:DD:EE:04'',''Beacon'')];
    print(''=== BLE Scan Results ===''); [print(f''  {n:15s} | {m} | RSSI: {random.randint(-90,-30)}
    dBm | {t}'') for n,m,t in devs]; print(''BLE 스캔 완료'')"'
  risk_level: low
  bastion_prompt: BLE 디바이스 스캔 결과를 시뮬레이션하시오. 4개 이상의 가상 디바이스를 출력해줘
- order: 3
  instruction: BLE PIN 브루트포스 공격을 시뮬레이션하시오. 4자리 PIN을 순차적으로 시도하시오.
  hint: 0000부터 시작하여 올바른 PIN(1234)을 찾으세요.
  category: attack
  points: 12
  answer: "\U0001F916 프롬프트: BLE PIN 브루트포스 공격을 시뮬레이션하시오. 4자리 PIN을 순차적으로 시도해줘\n\U0001F4CE\
    \ 참고 (CLI): python3 -c \"correct='1234'; attempts=0;\nfor pin in ['0000','1111','1234','9999']:\n\
    \    attempts+=1\n    if pin==correct: print(f'[+] PIN Found: {pin} (attempts:\
    \ {attempts})'); break\n    else: print(f'[-] PIN {pin} failed')\nprint('PIN 브루트포스\
    \ 완료')\""
  answer_detail: 4자리 PIN은 최대 10,000번 시도로 크래킹 가능합니다. 시도 횟수 제한이 없으면 취약합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: "python3 -c \"correct='1234'; attempts=0;\nfor pin in ['0000','1111','1234','9999']:\n\
    \    attempts+=1\n    if pin==correct: print(f'[+] PIN Found: {pin} (attempts:\
    \ {attempts})'); break\n    else: print(f'[-] PIN {pin} failed')\nprint('PIN 브루트포스\
    \ 완료')\""
  risk_level: low
  bastion_prompt: BLE PIN 브루트포스 공격을 시뮬레이션하시오. 4자리 PIN을 순차적으로 시도해줘
- order: 4
  instruction: BLE 디바이스 클로닝(스푸핑) 공격을 시뮬레이션하시오.
  hint: 원본 디바이스의 MAC과 이름을 복제하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: BLE 디바이스 클로닝(스푸핑) 공격을 시뮬레이션해줘

    📎 참고 (CLI): python3 -c "print(''=== BLE 클로닝 공격 ===''); print(''원본: SmartLock-01
    (AA:BB:CC:DD:EE:01) RSSI:-60''); print(''클론: SmartLock-01 (AA:BB:CC:DD:EE:01)
    RSSI:-20''); print(''[!] 클론이 더 강한 신호 → 피해자 앱이 클론에 연결''); print(''[!] PIN 입력 시
    클론이 수집''); print(''BLE 스푸핑 시뮬레이션 완료'')"'
  answer_detail: BLE MAC 주소를 스푸핑하여 원본 디바이스를 복제하면 MitM 공격이 가능합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "print(''=== BLE 클로닝 공격 ===''); print(''원본: SmartLock-01 (AA:BB:CC:DD:EE:01)
    RSSI:-60''); print(''클론: SmartLock-01 (AA:BB:CC:DD:EE:01) RSSI:-20''); print(''[!]
    클론이 더 강한 신호 → 피해자 앱이 클론에 연결''); print(''[!] PIN 입력 시 클론이 수집''); print(''BLE 스푸핑
    시뮬레이션 완료'')"'
  risk_level: low
  bastion_prompt: BLE 디바이스 클로닝(스푸핑) 공격을 시뮬레이션해줘
- order: 5
  instruction: BLE GATT 퍼징 페이로드를 생성하시오. 다양한 비정상 입력을 테스트하시오.
  hint: 빈 값, 최대 길이, 널 바이트 등을 생성하세요.
  category: attack
  points: 10
  answer: '🤖 프롬프트: BLE GATT 퍼징 페이로드를 생성해줘

    📎 참고 (CLI): python3 -c "payloads=[(''Empty'',b''''),(''Max'',b''A''*512),(''Null'',b''\x00''*20),(''SQLi'',b\"''
    OR 1=1 --\"),(''Overflow'',b''B''*1024)]; print(''=== BLE Fuzzing Payloads ==='');
    [print(f''  {n:10s}: {len(p):5d} bytes'') for n,p in payloads]; print(''GATT 퍼징
    페이로드 생성 완료'')"'
  answer_detail: GATT 특성에 비정상 데이터를 전송하여 크래시나 예상치 못한 동작을 유발합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "payloads=[(''Empty'',b''''),(''Max'',b''A''*512),(''Null'',b''\x00''*20),(''SQLi'',b\"''
    OR 1=1 --\"),(''Overflow'',b''B''*1024)]; print(''=== BLE Fuzzing Payloads ==='');
    [print(f''  {n:10s}: {len(p):5d} bytes'') for n,p in payloads]; print(''GATT 퍼징
    페이로드 생성 완료'')"'
  risk_level: low
  bastion_prompt: BLE GATT 퍼징 페이로드를 생성해줘
- order: 6
  instruction: BLE 보안 강화 방안을 정리하시오.
  hint: 페어링, 암호화, PIN 정책, MAC 랜덤화를 포함하세요.
  category: verification
  points: 10
  answer: '🤖 프롬프트: BLE 보안 강화 방안을 정리해줘

    📎 참고 (CLI): echo ''=== BLE 보안 강화 ==='' && echo ''[페어링] Just Works 금지 → Passkey/Numeric
    Comparison'' && echo ''[암호화] LE Secure Connections (BLE 4.2+)'' && echo ''[PIN]
    6자리 이상 + 시도 횟수 제한 + 잠금'' && echo ''[MAC] Resolvable Private Address 사용'' && echo
    ''[인증] GATT 특성에 인증+암호화 요구'' && echo ''=== BLE 보안 완료 ==='''
  answer_detail: BLE 보안은 페어링 방식, 암호화, 접근 제어를 종합적으로 적용해야 합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: echo '=== BLE 보안 강화 ===' && echo '[페어링] Just Works 금지 → Passkey/Numeric
    Comparison' && echo '[암호화] LE Secure Connections (BLE 4.2+)' && echo '[PIN] 6자리
    이상 + 시도 횟수 제한 + 잠금' && echo '[MAC] Resolvable Private Address 사용' && echo '[인증]
    GATT 특성에 인증+암호화 요구' && echo '=== BLE 보안 완료 ==='
  risk_level: low
  bastion_prompt: BLE 보안 강화 방안을 정리해줘
