  risk_level: low
  bastion_prompt: MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입해줘
- order: 6
  instruction: 스마트홈 보안 아키텍처를 설계하시오. VLAN 분리, API 인증, 암호화를 포함하시오.
  hint: 네트워크, 인증, 암호화 각 계층의 대책을 정리하세요.
  category: verification
  points: 10
  answer: '🤖 프롬프트: 스마트홈 보안 아키텍처를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''=== 스마트홈 보안 아키텍처 ==='' && echo ''[네트워크] IoT 전용 VLAN + 방화벽'' && echo ''[인증] API JWT 토큰 + RBAC'' && echo
