      - 결과 확인 누락
      - IoT 보안와 무관한 기법
  target_vm: attacker
  script: echo '=== 스마트홈 보안 아키텍처 ===' && echo '[네트워크] IoT 전용 VLAN + 방화벽' && echo '[인증] API JWT 토큰 + RBAC' && echo '[암호화] MQTT
