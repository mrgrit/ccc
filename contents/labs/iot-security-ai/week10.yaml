lab_id: iot-security-ai-week10
title: 스마트홈 보안 (AI 지원)
version: ai
course: iot-security-ai
week: 10
description: 스마트홈 허브 API 공격, 디바이스 제어, 프로토콜 분석을 수행합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 스마트홈 허브의 API를 분석하고 취약점을 발견한다
- 미인증 API로 디바이스를 제어한다
- 스마트홈 보안 아키텍처를 설계한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 스마트홈 허브 API(8090)에서 디바이스 목록을 수집하시오.
  hint: curl http://{{WEB_IP}}:8090/api/devices를 사용하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: 스마트홈 허브 API(8090)에서 디바이스 목록을 수집해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:8090/api/devices 2>/dev/null | python3 -m json.tool 2>/dev/null | head -15; echo
    ''디바이스 목록 수집 완료'''
  answer_detail: 미인증 API에서 전체 디바이스 목록과 상태 정보를 수집할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'IoT 보안 w10 s1 — 스마트홈 허브 API(8090)에서 디바이스 목록을 수집하시오. (cmd: curl -s http://10.20.30.80:8090/api/devices 2>/dev/null
        | python3 -m json.tool 2)'
      success_criteria:
      - '명령 실행: curl -s http://10.20.30.80:8090/api/devices 2>/dev/null | py'
      - 결과 출력 또는 로그 확인
      - IoT 보안 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - IoT 보안 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - IoT 보안와 무관한 기법
  target_vm: attacker
  script: curl -s http://10.20.30.80:8090/api/devices 2>/dev/null | python3 -m json.tool 2>/dev/null | head -15; echo '디바이스
    목록 수집 완료'
  risk_level: low
  bastion_prompt: 스마트홈 허브 API(8090)에서 디바이스 목록을 수집해줘
- order: 2
  instruction: 허브 설정 정보(/api/config)에서 민감 데이터를 추출하시오.
  hint: WiFi 비밀번호, MQTT 인증 정보, API 키를 확인하세요.
  category: data_leak
  points: 12
  answer: '🤖 프롬프트: 허브 설정 정보(/api/config)에서 민감 데이터를 추출해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:8090/api/config 2>/dev/null | python3 -m json.tool 2>/dev/null | head -20; echo
    ''설정 정보 수집 완료'''
  answer_detail: 설정 API에서 WiFi 비밀번호, MQTT 인증 정보, 클라우드 API 키 등이 노출됩니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'IoT 보안 w10 s2 — 허브 설정 정보(/api/config)에서 민감 데이터를 추출하시오. (cmd: curl -s http://10.20.30.80:8090/api/config 2>/dev/null
        | python3 -m json.tool 2>)'
      success_criteria:
      - '명령 실행: curl -s http://10.20.30.80:8090/api/config 2>/dev/null | pyt'
      - 결과 출력 또는 로그 확인
