lab_id: iot-security-ai-week04
title: 펌웨어 분석 실습 (AI 지원)
version: ai
course: iot-security-ai
week: 4
description: binwalk를 이용한 펌웨어 분석, 파일시스템 추출, 민감 정보 검색을 수행합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 가상 펌웨어 이미지를 생성하고 분석한다
- binwalk로 파일시스템을 추출한다
- 펌웨어에서 하드코딩된 인증 정보를 찾는다
pass_threshold: 0.6
steps:
- order: 1
  instruction: binwalk를 설치하시오.
  hint: sudo apt install -y binwalk를 사용하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: binwalk를 설치해줘

    📎 참고 (CLI): which binwalk 2>/dev/null && echo ''binwalk 설치 확인 완료'' || (sudo apt install -y binwalk
    2>/dev/null && echo ''binwalk 설치 확인 완료'')'
  answer_detail: binwalk는 펌웨어 이미지의 시그니처를 분석하고 내장된 파일시스템을 추출하는 도구입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 펌웨어 분석 도구 설치 — which binwalk 로 기존 설치 확인 + 미설치 시 sudo apt install -y binwalk 로 Debian/Ubuntu
        패키지 설치. binwalk 는 IoT 펌웨어의 매직 바이트 시그니처 분석 및 embedded 파일시스템 자동 추출의 사실상 표준 도구.
      success_criteria:
      - which binwalk 로 경로 확인하여 설치 여부 판단
      - 미설치 시 apt install -y binwalk 자동 설치
      - 설치 확인 완료 echo 메시지
      acceptable_methods:
      - which + apt install 조합 (fallback)
      - pip3 install binwalk 로 Python 모듈 설치
      - git clone + sudo python3 setup.py install (source)
      - binwalk v2.3.4+ 최신 버전을 source 로 빌드
      negative_signs:
      - which 없이 바로 설치 시도 (이미 있을 때 중복)
      - 설치 검증 없이 완료 선언
      - binwalk 의 역할 맥락 누락
  target_vm: attacker
  script: which binwalk 2>/dev/null && echo 'binwalk 설치 확인 완료' || (sudo apt install -y binwalk 2>/dev/null
    && echo 'binwalk 설치 확인 완료')
  risk_level: low
  bastion_prompt: binwalk를 설치해줘
- order: 2
  instruction: 가상 IoT 펌웨어 이미지를 생성하시오. /etc/passwd, 설정 파일 등을 포함하는 디렉터리 구조를 만드시오.
  hint: mkdir -p로 디렉터리를 만들고 설정 파일을 생성하세요.
  category: setup
  points: 10
  answer: '🤖 프롬프트: 가상 IoT 펌웨어 이미지를 생성하시오. /etc/passwd, 설정 파일 등을 포함하는 디렉터리 구조를 만드시오해줘

    📎 참고 (CLI): mkdir -p /tmp/fw_rootfs/{etc,www,bin} && echo ''root:x:0:0:root:/root:/bin/sh'' > /tmp/fw_rootfs/etc/passwd
    && echo ''mqtt_password=IoTSecret123'' > /tmp/fw_rootfs/etc/config.ini && echo ''api_key=sk-iot-abcdef123456''
    >> /tmp/fw_rootfs/etc/config.ini && echo ''가상 루트 파일시스템 생성 완료'''
  answer_detail: IoT 펌웨어의 루트 파일시스템에는 시스템 설정, 인증 정보, 웹 인터페이스 파일 등이 포함됩니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 가상 IoT 펌웨어 루트 파일시스템 구성 — mkdir -p /tmp/fw_rootfs/{etc,www,bin} 으로 3개 표준 디렉터리 생성. /etc/passwd
        에 root:x:0:0 기록 + /etc/config.ini 에 mqtt_password=IoTSecret123 + api_key=sk-iot-abcdef123456 평문
        하드코딩. OWASP IoT I2(불안전한 네트워크 서비스), I6(불충분한 프라이버시) 취약점 재현.
      success_criteria:
      - mkdir -p 로 etc/www/bin 3개 디렉터리 한번에 생성
      - passwd 에 root 계정 정보 + config.ini 에 password/api_key 평문 저장
      - 민감 정보를 하드코딩으로 의도적 삽입하여 분석 대상화
      acceptable_methods:
      - mkdir -p + echo > + echo >> 조합
      - cp -r /etc/skel_rootfs 로 템플릿 복사
      - debootstrap 으로 완전한 rootfs 생성
      - buildroot make 로 현실적인 IoT 루트파일시스템
      negative_signs:
      - 3개 디렉터리 중 일부 누락
      - 민감 정보 하드코딩 없이 구조만 생성
      - OWASP IoT 매핑 맥락 누락
  target_vm: attacker
  script: mkdir -p /tmp/fw_rootfs/{etc,www,bin} && echo 'root:x:0:0:root:/root:/bin/sh' > /tmp/fw_rootfs/etc/passwd
    && echo 'mqtt_password=IoTSecret123' > /tmp/fw_rootfs/etc/config.ini && echo 'api_key=sk-iot-abcdef123456'
    >> /tmp/fw_rootfs/etc/config.ini && echo '가상 루트 파일시스템 생성 완료'
  risk_level: low
  bastion_prompt: 가상 IoT 펌웨어 이미지를 생성하시오. /etc/passwd, 설정 파일 등을 포함하는 디렉터리 구조를 만드시오해줘
- order: 3
  instruction: 생성한 루트 파일시스템을 SquashFS로 패키징하시오.
  hint: mksquashfs 명령을 사용하세요.
  category: firmware
  points: 10
  answer: '🤖 프롬프트: 생성한 루트 파일시스템을 SquashFS로 패키징해줘

    📎 참고 (CLI): mksquashfs /tmp/fw_rootfs /tmp/rootfs.sqsh -noappend -comp gzip 2>/dev/null && ls -lh
    /tmp/rootfs.sqsh && echo ''SquashFS 패키징 완료'''
  answer_detail: SquashFS는 IoT 펌웨어에서 가장 많이 사용되는 읽기 전용 파일시스템입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: SquashFS 파일시스템 패키징 — mksquashfs /tmp/fw_rootfs /tmp/rootfs.sqsh -noappend -comp gzip 으로
        IoT 펌웨어의 de facto standard read-only 파일시스템 생성. -noappend 로 기존 파일 덮어쓰기, -comp gzip 으로 gzip 압축 사용
        (IoT 에서 최다 채택). 결과 ls -lh 로 크기 확인.
      success_criteria:
      - mksquashfs <source> <target> -noappend -comp gzip 명령 실행
      - -noappend 옵션으로 기존 이미지 덮어쓰기
      - -comp gzip 으로 압축 알고리즘 명시 (xz/lz4/zstd 도 가능)
      acceptable_methods:
      - mksquashfs -noappend -comp gzip
      - mksquashfs -comp xz -Xdict-size 100% 로 고압축 대체
      - genext2fs 로 ext2 파일시스템 생성 대체
      - cramfs/JFFS2 (구형 IoT 에서 사용)
      negative_signs:
      - -noappend 없이 기존 파일에 append 시도
      - -comp 옵션 누락으로 기본 알고리즘 사용
      - ls -lh 로 생성 결과 확인 누락
  target_vm: attacker
  script: mksquashfs /tmp/fw_rootfs /tmp/rootfs.sqsh -noappend -comp gzip 2>/dev/null && ls -lh /tmp/rootfs.sqsh
    && echo 'SquashFS 패키징 완료'
  risk_level: low
  bastion_prompt: 생성한 루트 파일시스템을 SquashFS로 패키징해줘
- order: 4
  instruction: binwalk로 생성한 SquashFS 이미지를 분석하시오.
  hint: binwalk /tmp/rootfs.sqsh 명령을 실행하세요.
  category: firmware
  points: 10
  answer: '🤖 프롬프트: binwalk로 생성한 SquashFS 이미지를 분석해줘

    📎 참고 (CLI): binwalk /tmp/rootfs.sqsh && echo ''binwalk 시그니처 분석 완료'''
  answer_detail: binwalk는 매직 바이트를 검색하여 파일시스템, 압축 데이터, 헤더 등을 식별합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: binwalk 시그니처 분석 — binwalk /tmp/rootfs.sqsh 로 펌웨어 이미지의 매직 바이트 검색. 각 offset 별 식별된 파일시스템/압축
        데이터/헤더 타입 (SquashFS filesystem, gzip 압축 등) 출력. 펌웨어 구조 파악의 첫 단계.
      success_criteria:
      - binwalk <이미지> 기본 시그니처 스캔 실행
      - DECIMAL/HEXADECIMAL/DESCRIPTION 3 컬럼 출력 확인
      - SquashFS filesystem/gzip 등 식별된 포맷 명시
      acceptable_methods:
      - binwalk <file>
      - file <file> 로 간단 매직 바이트 식별 대체
      - unblob 도구로 대체 (차세대 펌웨어 추출기)
      - file-magic python 라이브러리 프로그래밍 분석
      negative_signs:
      - binwalk 실행 없이 개념만 설명
      - 시그니처 결과 해석 누락
      - 식별된 파일시스템 타입 언급 없음
  target_vm: attacker
  script: binwalk /tmp/rootfs.sqsh && echo 'binwalk 시그니처 분석 완료'
  risk_level: low
  bastion_prompt: binwalk로 생성한 SquashFS 이미지를 분석해줘
- order: 5
  instruction: binwalk -e 옵션으로 파일시스템을 추출하시오.
  hint: binwalk -e /tmp/rootfs.sqsh -C /tmp/fw_extract/ 명령을 사용하세요.
  category: firmware
  points: 10
  answer: '🤖 프롬프트: binwalk -e 옵션으로 파일시스템을 추출해줘

    📎 참고 (CLI): rm -rf /tmp/fw_extract 2>/dev/null; binwalk -e /tmp/rootfs.sqsh -C /tmp/fw_extract/ 2>/dev/null;
    find /tmp/fw_extract/ -type f 2>/dev/null | head -10; echo ''파일시스템 추출 완료'''
  answer_detail: binwalk -e는 식별된 파일시스템을 자동으로 추출합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: binwalk -e 파일시스템 자동 추출 — rm -rf /tmp/fw_extract (기존 추출 정리) 후 binwalk -e /tmp/rootfs.sqsh
        -C /tmp/fw_extract/ 로 식별된 SquashFS 를 _rootfs.sqsh.extracted/ 하위에 추출. find /tmp/fw_extract -type
        f | head -10 으로 추출 파일 검증. 펌웨어 risk_level 분석의 핵심 단계.
      success_criteria:
      - rm -rf 으로 이전 추출 결과 정리
      - binwalk -e -C <output_dir> 으로 추출 디렉터리 지정
      - find -type f 로 추출된 파일 목록 확인 (상위 10개)
      acceptable_methods:
      - binwalk -e -C
      - binwalk --dd=.* 로 모든 타입 강제 추출
      - unsquashfs /tmp/rootfs.sqsh -d /tmp/fw_extract 로 직접 추출
      - 7z x / jefferson (JFFS2 전용)
      negative_signs:
      - rm -rf 없이 누적 추출로 혼란
      - -C 옵션 없이 현재 디렉터리 오염
      - 추출 결과 find 검증 누락
  target_vm: attacker
  script: rm -rf /tmp/fw_extract 2>/dev/null; binwalk -e /tmp/rootfs.sqsh -C /tmp/fw_extract/ 2>/dev/null;
    find /tmp/fw_extract/ -type f 2>/dev/null | head -10; echo '파일시스템 추출 완료'
  risk_level: low
  bastion_prompt: binwalk -e 옵션으로 파일시스템을 추출해줘
- order: 6
  instruction: 추출된 파일시스템에서 하드코딩된 비밀번호와 API 키를 검색하시오.
  hint: grep -r 'password\|api_key\|secret' 명령을 사용하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 추출된 파일시스템에서 하드코딩된 비밀번호와 API 키를 검색해줘

    📎 참고 (CLI): grep -r -i ''password\|api_key\|secret\|psk'' /tmp/fw_extract/ 2>/dev/null; grep -r -i
    ''password\|api_key\|secret\|psk'' /tmp/fw_rootfs/ 2>/dev/null; echo ''민감 정보 검색 완료'''
  answer_detail: 펌웨어에서 하드코딩된 인증 정보를 찾는 것은 IoT 보안 점검의 핵심 단계입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 하드코딩 크리덴셜 검색 — grep -r -i password|api_key|secret|psk /tmp/fw_extract/ 로 추출된 파일시스템 재귀 검색
        + /tmp/fw_rootfs/ 원본도 검색. 대소문자 무시(-i) + 4개 키워드 정규식 패턴. OWASP IoT I1(Weak Auth) + MITRE T1552.001(Unsecured
        Credentials in Files).
      success_criteria:
      - grep -r 재귀 검색 옵션 사용
      - -i 대소문자 무시 + password|api_key|secret|psk 4개 패턴 OR
      - 추출된 fw_extract 와 원본 fw_rootfs 두 곳 모두 검색
      acceptable_methods:
      - grep -r -iE password|api_key|secret|psk
      - trufflehog 로 시크릿 자동 탐지
      - gitleaks scan 으로 고도화된 패턴
      - detect-secrets 도구로 베이스라인 + 비교
      negative_signs:
      - -i 없이 대소문자 매칭 실패
      - 4개 키워드 중 일부 누락
      - fw_extract 또는 fw_rootfs 한 곳만 검색
  target_vm: attacker
  script: grep -r -i 'password\|api_key\|secret\|psk' /tmp/fw_extract/ 2>/dev/null; grep -r -i 'password\|api_key\|secret\|psk'
    /tmp/fw_rootfs/ 2>/dev/null; echo '민감 정보 검색 완료'
  risk_level: low
  bastion_prompt: 추출된 파일시스템에서 하드코딩된 비밀번호와 API 키를 검색해줘
- order: 7
  instruction: strings 명령으로 바이너리에서 읽을 수 있는 문자열을 추출하시오.
  hint: strings /tmp/rootfs.sqsh | grep -i password를 사용하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: strings 명령으로 바이너리에서 읽을 수 있는 문자열을 추출해줘

    📎 참고 (CLI): strings /tmp/rootfs.sqsh | grep -iE ''(password|key|secret|admin)'' | head -10 && echo
    ''strings 분석 완료'''
  answer_detail: strings 명령은 바이너리 파일에서 출력 가능한 문자열을 추출합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 바이너리 문자열 추출 — strings /tmp/rootfs.sqsh 로 바이너리 내 printable ASCII 4자 이상 연속 문자열 추출 후 grep -iE
        (password|key|secret|admin) 으로 민감 키워드 필터링 + head -10 상위 결과. 펌웨어 추출 없이도 간이 분석 가능한 기법.
      success_criteria:
      - strings 명령으로 바이너리에서 문자열 추출
      - grep -iE 정규식으로 4개 키워드 필터
      - head -10 으로 상위 10건만 출력
      acceptable_methods:
      - strings + grep -iE + head
      - strings -n 8 로 최소 길이 8자 필터링
      - floss(FLARE) 로 stack/obfuscated 문자열까지 추출
      - radare2 iz 명령으로 대체
      negative_signs:
      - grep 없이 전체 strings 출력
      - -iE 대문자/소문자 무시 누락
      - head 없이 전체 덤프
  target_vm: attacker
  script: strings /tmp/rootfs.sqsh | grep -iE '(password|key|secret|admin)' | head -10 && echo 'strings
    분석 완료'
  risk_level: low
  bastion_prompt: strings 명령으로 바이너리에서 읽을 수 있는 문자열을 추출해줘
- order: 8
  instruction: binwalk -E 옵션으로 엔트로피 분석을 수행하시오.
  hint: 높은 엔트로피는 암호화/압축 영역을 의미합니다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: binwalk -E 옵션으로 엔트로피 분석을 수행해줘

    📎 참고 (CLI): binwalk -E /tmp/rootfs.sqsh 2>/dev/null | head -20 && echo ''엔트로피 분석 완료'''
  answer_detail: 엔트로피 분석으로 암호화된 영역(높은 엔트로피)과 평문 영역(낮은 엔트로피)을 구분합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: binwalk 엔트로피 분석 — binwalk -E /tmp/rootfs.sqsh 으로 Shannon 엔트로피 계산하여 파일 offset 별 정보 밀도 측정.
        엔트로피 ~8 (최대) 은 암호화/압축 영역, ~6-7 은 일반 바이너리, <5 는 평문/zero-padding. 펌웨어 내 암호화 영역 탐지 + head -20 으로
        상위 20건 확인.
      success_criteria:
      - binwalk -E 으로 엔트로피 분석 모드 활성화
      - Rising/Falling entropy edge 식별
