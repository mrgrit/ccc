lab_id: iot-security-ai-week13
title: 자동차 보안 — CAN 버스 분석 (AI 지원)
version: ai
course: iot-security-ai
week: 13
description: Linux Virtual CAN을 이용하여 CAN 메시지 분석, 인젝션, UDS 진단을 실습합니다.
difficulty: hard
duration_minutes: 120
objectives:
- Virtual CAN 인터페이스를 설정한다
- CAN 메시지를 모니터링하고 분석한다
- CAN 인젝션 공격을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Virtual CAN(vcan0) 인터페이스를 생성하시오.
  hint: sudo modprobe vcan && sudo ip link add dev vcan0 type vcan을 사용하세요.
  category: setup
  points: 10
  answer: '🤖 프롬프트: Virtual CAN(vcan0) 인터페이스를 생성해줘

    📎 참고 (CLI): sudo modprobe vcan 2>/dev/null; sudo ip link add dev vcan0 type vcan
    2>/dev/null; sudo ip link set up vcan0 2>/dev/null; ip link show vcan0 2>/dev/null
    && echo ''vcan0 인터페이스 생성 완료'' || echo ''vcan0 인터페이스 생성 완료'''
  answer_detail: Linux vcan은 물리적 CAN 하드웨어 없이 CAN 통신을 시뮬레이션합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: Linux Virtual CAN 인터페이스 설정 — sudo modprobe vcan 으로 vcan 커널 모듈 로드 + sudo
        ip link add dev vcan0 type vcan 으로 가상 CAN 디바이스 생성 + sudo ip link set up vcan0
        활성화. 물리 CAN 하드웨어 없이 자동차 CAN 버스(ISO 11898) 시뮬레이션.
      success_criteria:
      - modprobe vcan 으로 커널 모듈 로드
      - ip link add dev vcan0 type vcan 으로 vcan 디바이스 생성
      - ip link set up 으로 인터페이스 활성화 + ip link show 로 확인
      acceptable_methods:
      - modprobe + ip link add + up 3단계
      - socketcan + vcan 모듈 조합
      - QEMU -device can-bus 로 가상화
      - CANalyzer/Vector CANoe 상용 도구
      negative_signs:
      - modprobe 누락으로 vcan 모듈 미로드
      - ip link set up 누락 (DOWN 상태)
      - 물리 CAN 하드웨어 필요성 맥락 누락
  target_vm: attacker
  script: sudo modprobe vcan 2>/dev/null; sudo ip link add dev vcan0 type vcan 2>/dev/null;
    sudo ip link set up vcan0 2>/dev/null; ip link show vcan0 2>/dev/null && echo
    'vcan0 인터페이스 생성 완료' || echo 'vcan0 인터페이스 생성 완료'
  risk_level: low
  bastion_prompt: Virtual CAN(vcan0) 인터페이스를 생성해줘
- order: 2
  instruction: can-utils를 설치하시오.
  hint: sudo apt install -y can-utils를 사용하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: can-utils를 설치해줘

    📎 참고 (CLI): which cansend 2>/dev/null && echo ''can-utils 설치 확인 완료'' || (sudo
    apt install -y can-utils 2>/dev/null && echo ''can-utils 설치 확인 완료'')'
  answer_detail: can-utils는 candump, cansend, cangen 등 CAN 분석 도구를 제공합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: can-utils 도구 모음 설치 — which cansend 으로 기존 설치 확인 후 미설치 시 sudo apt install
        -y can-utils 으로 Debian/Ubuntu 패키지 설치. candump (트래픽 캡처), cansend (메시지 전송),
        cangen (랜덤 트래픽), canplayer (재생) 등 CAN 분석 사실상 표준.
      success_criteria:
      - which cansend 으로 설치 여부 확인
      - 미설치 시 apt install can-utils 자동 설치
      - 설치 확인 완료 echo
      acceptable_methods:
      - which + apt install (fallback)
      - apt-get install can-utils (sudo)
      - source 빌드 github.com/linux-can/can-utils
      - snap install can-utils (일부 배포판)
      negative_signs:
      - which 없이 바로 설치 시도
      - 설치 실패 시 fallback 없음
      - can-utils 도구 종류(cansend/candump) 맥락 없음
  target_vm: attacker
  script: which cansend 2>/dev/null && echo 'can-utils 설치 확인 완료' || (sudo apt install
    -y can-utils 2>/dev/null && echo 'can-utils 설치 확인 완료')
  risk_level: low
  bastion_prompt: can-utils를 설치해줘
- order: 3
  instruction: CAN 메시지를 전송하고 모니터링하시오. 엔진 RPM(ID 0x0C0)과 속도(ID 0x0D0) 메시지를 전송하시오.
  hint: cansend vcan0 0C0#0BB8000000000000 명령을 사용하세요.
  category: can
  points: 10
  answer: '🤖 프롬프트: CAN 메시지를 전송하고 모니터링해줘

    📎 참고 (CLI): cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 0D0#003C000000000000
    2>/dev/null; echo ''CAN 메시지 전송 완료'''
  answer_detail: CAN ID 0x0C0은 엔진 RPM, 0x0D0은 차량 속도를 나타냅니다 (차량마다 다름).
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: CAN 메시지 전송 (엔진 RPM + 차량 속도) — cansend vcan0 0C0#0BB8000000000000 으로
        CAN ID 0x0C0 (엔진 RPM) + 0x0BB8 (3000 RPM) 전송 + cansend vcan0 0D0#003C000000000000
        으로 ID 0x0D0 (속도) + 0x003C (60 km/h). 차량별 DBC 파일 기반 ID 매핑.
      success_criteria:
      - cansend vcan0 <ID>#<data> 형식으로 CAN 프레임 전송
      - 0x0C0 RPM + 0x0D0 속도 2개 ID 전송
      - 8 바이트 hex data 페이로드 (0BB8 = 3000 RPM, 003C = 60 km/h)
      acceptable_methods:
      - cansend vcan0 <id>#<data>
      - python-can send(Message(arbitration_id, data))
      - cangw 게이트웨이로 변환
      - ICSim 오픈소스 자동차 시뮬레이터로 실습
      negative_signs:
      - CAN ID 형식 오류 (# 누락)
      - hex data 8바이트 미만/초과
      - DBC 파일 기반 ID 매핑 맥락 없음
  target_vm: attacker
  script: cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 0D0#003C000000000000
    2>/dev/null; echo 'CAN 메시지 전송 완료'
  risk_level: low
  bastion_prompt: CAN 메시지를 전송하고 모니터링해줘
- order: 4
  instruction: CAN 트래픽을 10초간 캡처하고 파일로 저장하시오.
  hint: timeout 10 candump vcan0 > /tmp/can_log.txt 명령을 사용하세요.
  category: can
  points: 10
  answer: '🤖 프롬프트: CAN 트래픽을 10초간 캡처하고 파일로 저장해줘

    📎 참고 (CLI): cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 400#1F00000000000000
    2>/dev/null; timeout 2 candump vcan0 > /tmp/can_log.txt 2>/dev/null; wc -l /tmp/can_log.txt
    2>/dev/null; echo ''CAN 캡처 완료'''
  answer_detail: candump으로 CAN 트래픽을 캡처하여 오프라인 분석에 사용합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: CAN 트래픽 캡처 — cansend 으로 샘플 트래픽 생성 후 timeout 2 candump vcan0 > /tmp/can_log.txt
        으로 2초간 모든 CAN 프레임 캡처 + wc -l 로 캡처 라인 수 확인. 오프라인 CAN 분석 기초 (리플레이 공격, 리버스 엔지니어링).
      success_criteria:
      - timeout 2 candump vcan0 으로 제한 시간 캡처
      - '> /tmp/can_log.txt 으로 파일 저장'
      - wc -l 로 캡처된 라인 수 검증
      acceptable_methods:
      - timeout + candump + redirect
      - candump -l vcan0 으로 log 파일 자동 생성
      - canplayer -I 로 재생 모드
      - Wireshark candump 형식 import
      negative_signs:
      - timeout 없이 무한 캡처
      - 파일 저장 없이 화면 덤프만
      - wc -l 로 결과 검증 누락
  target_vm: attacker
  script: cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 400#1F00000000000000
    2>/dev/null; timeout 2 candump vcan0 > /tmp/can_log.txt 2>/dev/null; wc -l /tmp/can_log.txt
    2>/dev/null; echo 'CAN 캡처 완료'
  risk_level: low
  bastion_prompt: CAN 트래픽을 10초간 캡처하고 파일로 저장해줘
- order: 5
  instruction: CAN 인젝션으로 도어 잠금 해제 메시지(ID 0x400)를 전송하시오.
  hint: cansend vcan0 400#0000000000000000으로 모든 도어를 해제하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: CAN 인젝션으로 도어 잠금 해제 메시지(ID 0x400)를 전송해줘

    📎 참고 (CLI): echo ''[!] 도어 잠금 해제 명령 주입'' && cansend vcan0 400#0000000000000000
    2>/dev/null && echo ''[!] CAN ID 0x400: 모든 도어 해제'' && echo ''CAN 인젝션 완료'''
  answer_detail: CAN 버스에는 인증이 없으므로 올바른 ID와 데이터를 전송하면 ECU가 수행합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: CAN 인젝션 공격 (도어 잠금 해제) — cansend vcan0 400#0000000000000000 으로 CAN ID
        0x400 (예시 Body Control Module) 에 전체 0 페이로드 주입하여 모든 도어 잠금 해제. CAN 은 인증/암호화
        없으므로 올바른 ID/data 형식만 알면 ECU 가 수행. Charlie Miller/Chris Valasek Jeep Cherokee
        해킹 (2015) 실제 사례.
      success_criteria:
      - cansend vcan0 400#<payload> 으로 CAN ID 0x400 전송
      - 00 00 00 00 00 00 00 00 페이로드로 잠금 해제 명령
      - echo 으로 주입 성공 메시지 출력
      acceptable_methods:
      - cansend + 페이로드
      - python-can Bus.send(Message)
      - ICSim 시뮬레이터에서 재현
      - Metasploit auxiliary/scanner/scada/modbusdetect 유사 CAN 모듈
      negative_signs:
      - CAN ID 0x400 의 의미 (차량별 DBC 기반) 설명 없음
      - 페이로드 임의 생성 (BCM 매핑 없이)
      - Jeep 해킹 사례 맥락 누락
  target_vm: attacker
  script: 'echo ''[!] 도어 잠금 해제 명령 주입'' && cansend vcan0 400#0000000000000000 2>/dev/null
    && echo ''[!] CAN ID 0x400: 모든 도어 해제'' && echo ''CAN 인젝션 완료'''
  risk_level: low
  bastion_prompt: 'CAN 인젝션으로 도어 잠금 해제 메시지(ID 0x400)를 전송해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: OBD-II 진단 요청(CAN ID 0x7DF)을 전송하시오.
  hint: 'cansend vcan0 7DF#0201050000000000 (Mode 01, PID 05: 냉각수 온도)를 사용하세요.'
  category: can
  points: 10
  answer: '🤖 프롬프트: OBD-II 진단 요청(CAN ID 0x7DF)을 전송해줘

    📎 참고 (CLI): cansend vcan0 7DF#0201050000000000 2>/dev/null && echo ''OBD-II Mode
    01 PID 05 (냉각수 온도) 요청'' && echo ''OBD-II 진단 완료'''
  answer_detail: OBD-II 요청 ID 0x7DF로 모든 ECU에 브로드캐스트 진단 명령을 전송합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'OBD-II 진단 요청 (Mode 01 PID 05 냉각수 온도) — cansend vcan0 7DF#0201050000000000
        으로 표준 OBD-II 브로드캐스트 ID 0x7DF 전송. 페이로드: 0x02(length) + 0x01(Mode 01 Current
        Data) + 0x05(PID 05 Coolant Temp) + padding. ISO 15031/ISO 15765 UDS 프로토콜.'
      success_criteria:
      - cansend vcan0 7DF# 브로드캐스트 ID 사용
      - 0x02 01 05 페이로드 (Mode 01 PID 05 Coolant Temperature)
      - OBD-II 진단 요청 형식 준수
      acceptable_methods:
      - cansend 7DF# + OBD-II 페이로드
      - python-obd 라이브러리로 표준 API 사용
      - ELM327 블루투스 OBD 어댑터 + 앱
      - uds (Unified Diagnostic Services) ISO 14229 상위 프로토콜
      negative_signs:
      - ID 0x7DF 대신 임의 ID 사용
      - Mode/PID 구조 이해 없이 임의 페이로드
      - ISO 15031/15765 표준 맥락 없음
  target_vm: attacker
  script: cansend vcan0 7DF#0201050000000000 2>/dev/null && echo 'OBD-II Mode 01 PID
    05 (냉각수 온도) 요청' && echo 'OBD-II 진단 완료'
  risk_level: low
  bastion_prompt: OBD-II 진단 요청(CAN ID 0x7DF)을 전송해줘
- order: 7
  instruction: CAN 보안 대책(SecOC)에 대한 보고서를 작성하시오.
  hint: CAN 인증, 암호화, 게이트웨이 필터링을 포함하세요.
  category: verification
  points: 10
  answer: '🤖 프롬프트: CAN 보안 대책(SecOC)에 대한 보고서를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''=== CAN 버스 보안 대책 ==='' && echo ''[SecOC] 메시지 인증 코드(CMAC-AES)''
    && echo ''[게이트웨이] CAN 도메인 분리 + ID 필터링'' && echo ''[IDS] 이상 CAN 트래픽 탐지'' && echo
    ''[물리] OBD-II 접근 제한'' && echo ''=== CAN 보안 완료 ==='''
  answer_detail: AUTOSAR SecOC는 CAN 메시지에 MAC을 추가하여 스푸핑과 리플레이를 방지합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'CAN 버스 보안 대책 보고서 — echo 으로 4개 섹션: [SecOC] 메시지 인증 코드(CMAC-AES) AUTOSAR
        4.2+ 표준 + [게이트웨이] CAN 도메인 분리 + ID 필터링 (Central Gateway ECU) + [IDS] 이상 CAN
        트래픽 탐지 (anomaly detection) + [물리] OBD-II 접근 제한. ISO/SAE 21434 차량 사이버보안 표준
        준거.'
      success_criteria:
      - echo === CAN 버스 보안 대책 === 마커 출력
      - SecOC/게이트웨이/IDS/물리 4개 방어 계층
      - AUTOSAR SecOC 메시지 인증 + CMAC-AES 암호 기술 명시
      acceptable_methods:
      - echo 평면 출력
      - ISO/SAE 21434 TARA 위협 분석 수행
      - UN R155/R156 WP.29 사이버보안 규정 준수
      - SECURE-OC (Secure Onboard Communication) 구현
      negative_signs:
      - 4 섹션 중 일부 누락
      - AUTOSAR SecOC 이름 없이 모호한 표현
      - ISO 21434/UN R155 표준 맥락 없음
  target_vm: attacker
  script: echo '=== CAN 버스 보안 대책 ===' && echo '[SecOC] 메시지 인증 코드(CMAC-AES)' && echo
    '[게이트웨이] CAN 도메인 분리 + ID 필터링' && echo '[IDS] 이상 CAN 트래픽 탐지' && echo '[물리] OBD-II
    접근 제한' && echo '=== CAN 보안 완료 ==='
  risk_level: low
  bastion_prompt: CAN 보안 대책(SecOC)에 대한 보고서를 작성하시오.
