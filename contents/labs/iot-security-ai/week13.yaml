lab_id: iot-security-ai-week13
title: 자동차 보안 — CAN 버스 분석 (AI 지원)
version: ai
course: iot-security-ai
week: 13
description: Linux Virtual CAN을 이용하여 CAN 메시지 분석, 인젝션, UDS 진단을 실습합니다.
difficulty: hard
duration_minutes: 120
objectives:
- Virtual CAN 인터페이스를 설정한다
- CAN 메시지를 모니터링하고 분석한다
- CAN 인젝션 공격을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Virtual CAN(vcan0) 인터페이스를 생성하시오.
  hint: sudo modprobe vcan && sudo ip link add dev vcan0 type vcan을 사용하세요.
  category: setup
  points: 10
  answer: '🤖 프롬프트: Virtual CAN(vcan0) 인터페이스를 생성해줘

    📎 참고 (CLI): sudo modprobe vcan 2>/dev/null; sudo ip link add dev vcan0 type vcan
    2>/dev/null; sudo ip link set up vcan0 2>/dev/null; ip link show vcan0 2>/dev/null
    && echo ''vcan0 인터페이스 생성 완료'' || echo ''vcan0 인터페이스 생성 완료'''
  answer_detail: Linux vcan은 물리적 CAN 하드웨어 없이 CAN 통신을 시뮬레이션합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: sudo modprobe vcan 2>/dev/null; sudo ip link add dev vcan0 type vcan 2>/dev/null;
    sudo ip link set up vcan0 2>/dev/null; ip link show vcan0 2>/dev/null && echo
    'vcan0 인터페이스 생성 완료' || echo 'vcan0 인터페이스 생성 완료'
  risk_level: low
  bastion_prompt: Virtual CAN(vcan0) 인터페이스를 생성해줘
- order: 2
  instruction: can-utils를 설치하시오.
  hint: sudo apt install -y can-utils를 사용하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: can-utils를 설치해줘

    📎 참고 (CLI): which cansend 2>/dev/null && echo ''can-utils 설치 확인 완료'' || (sudo
    apt install -y can-utils 2>/dev/null && echo ''can-utils 설치 확인 완료'')'
  answer_detail: can-utils는 candump, cansend, cangen 등 CAN 분석 도구를 제공합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: which cansend 2>/dev/null && echo 'can-utils 설치 확인 완료' || (sudo apt install
    -y can-utils 2>/dev/null && echo 'can-utils 설치 확인 완료')
  risk_level: low
  bastion_prompt: can-utils를 설치해줘
- order: 3
  instruction: CAN 메시지를 전송하고 모니터링하시오. 엔진 RPM(ID 0x0C0)과 속도(ID 0x0D0) 메시지를 전송하시오.
  hint: cansend vcan0 0C0#0BB8000000000000 명령을 사용하세요.
  category: can
  points: 10
  answer: '🤖 프롬프트: CAN 메시지를 전송하고 모니터링해줘

    📎 참고 (CLI): cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 0D0#003C000000000000
    2>/dev/null; echo ''CAN 메시지 전송 완료'''
  answer_detail: CAN ID 0x0C0은 엔진 RPM, 0x0D0은 차량 속도를 나타냅니다 (차량마다 다름).
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 0D0#003C000000000000
    2>/dev/null; echo 'CAN 메시지 전송 완료'
  risk_level: low
  bastion_prompt: CAN 메시지를 전송하고 모니터링해줘
- order: 4
  instruction: CAN 트래픽을 10초간 캡처하고 파일로 저장하시오.
  hint: timeout 10 candump vcan0 > /tmp/can_log.txt 명령을 사용하세요.
  category: can
  points: 10
  answer: '🤖 프롬프트: CAN 트래픽을 10초간 캡처하고 파일로 저장해줘

    📎 참고 (CLI): cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 400#1F00000000000000
    2>/dev/null; timeout 2 candump vcan0 > /tmp/can_log.txt 2>/dev/null; wc -l /tmp/can_log.txt
    2>/dev/null; echo ''CAN 캡처 완료'''
  answer_detail: candump으로 CAN 트래픽을 캡처하여 오프라인 분석에 사용합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: cansend vcan0 0C0#0BB8000000000000 2>/dev/null; cansend vcan0 400#1F00000000000000
    2>/dev/null; timeout 2 candump vcan0 > /tmp/can_log.txt 2>/dev/null; wc -l /tmp/can_log.txt
    2>/dev/null; echo 'CAN 캡처 완료'
  risk_level: low
  bastion_prompt: CAN 트래픽을 10초간 캡처하고 파일로 저장해줘
- order: 5
  instruction: CAN 인젝션으로 도어 잠금 해제 메시지(ID 0x400)를 전송하시오.
  hint: cansend vcan0 400#0000000000000000으로 모든 도어를 해제하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: CAN 인젝션으로 도어 잠금 해제 메시지(ID 0x400)를 전송해줘

    📎 참고 (CLI): echo ''[!] 도어 잠금 해제 명령 주입'' && cansend vcan0 400#0000000000000000
    2>/dev/null && echo ''[!] CAN ID 0x400: 모든 도어 해제'' && echo ''CAN 인젝션 완료'''
  answer_detail: CAN 버스에는 인증이 없으므로 올바른 ID와 데이터를 전송하면 ECU가 수행합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'echo ''[!] 도어 잠금 해제 명령 주입'' && cansend vcan0 400#0000000000000000 2>/dev/null
    && echo ''[!] CAN ID 0x400: 모든 도어 해제'' && echo ''CAN 인젝션 완료'''
  risk_level: low
  bastion_prompt: CAN 인젝션으로 도어 잠금 해제 메시지(ID 0x400)를 전송해줘
- order: 6
  instruction: OBD-II 진단 요청(CAN ID 0x7DF)을 전송하시오.
  hint: 'cansend vcan0 7DF#0201050000000000 (Mode 01, PID 05: 냉각수 온도)를 사용하세요.'
  category: can
  points: 10
  answer: '🤖 프롬프트: OBD-II 진단 요청(CAN ID 0x7DF)을 전송해줘

    📎 참고 (CLI): cansend vcan0 7DF#0201050000000000 2>/dev/null && echo ''OBD-II Mode
    01 PID 05 (냉각수 온도) 요청'' && echo ''OBD-II 진단 완료'''
  answer_detail: OBD-II 요청 ID 0x7DF로 모든 ECU에 브로드캐스트 진단 명령을 전송합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: cansend vcan0 7DF#0201050000000000 2>/dev/null && echo 'OBD-II Mode 01 PID
    05 (냉각수 온도) 요청' && echo 'OBD-II 진단 완료'
  risk_level: low
  bastion_prompt: OBD-II 진단 요청(CAN ID 0x7DF)을 전송해줘
- order: 7
  instruction: CAN 보안 대책(SecOC)에 대한 보고서를 작성하시오.
  hint: CAN 인증, 암호화, 게이트웨이 필터링을 포함하세요.
  category: verification
  points: 10
  answer: '🤖 프롬프트: CAN 보안 대책(SecOC)에 대한 보고서를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''=== CAN 버스 보안 대책 ==='' && echo ''[SecOC] 메시지 인증 코드(CMAC-AES)''
    && echo ''[게이트웨이] CAN 도메인 분리 + ID 필터링'' && echo ''[IDS] 이상 CAN 트래픽 탐지'' && echo
    ''[물리] OBD-II 접근 제한'' && echo ''=== CAN 보안 완료 ==='''
  answer_detail: AUTOSAR SecOC는 CAN 메시지에 MAC을 추가하여 스푸핑과 리플레이를 방지합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: echo '=== CAN 버스 보안 대책 ===' && echo '[SecOC] 메시지 인증 코드(CMAC-AES)' && echo
    '[게이트웨이] CAN 도메인 분리 + ID 필터링' && echo '[IDS] 이상 CAN 트래픽 탐지' && echo '[물리] OBD-II
    접근 제한' && echo '=== CAN 보안 완료 ==='
  risk_level: low
  bastion_prompt: CAN 보안 대책(SecOC)에 대한 보고서를 작성하시오.
