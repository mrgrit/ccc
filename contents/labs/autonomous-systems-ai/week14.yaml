    :\"user\",\"content\":\"What are 5 unique challenges in CPS incident response compared to traditional\
    \ IT incident response?\"}],\"stream\":false,\"options\":{\"num_predict\":200}}' \\\n | python3 -c\
    \ \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
