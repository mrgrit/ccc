lab_id: autonomous-systems-ai-week14
title: '[Non-AI] CPS 인시던트 대응'
version: ai
course: autonomous-systems-ai
week: 14
description: 사이버물리 인시던트 대응 절차를 실습하고 플레이북을 작성합니다
difficulty: hard
duration_minutes: 120
objectives:
- CPS 인시던트 대응 절차를 이해한다
- 드론/ICS 인시던트 시나리오를 대응한다
- 인시던트 대응 플레이북을 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 CPS 인시던트 타임라인을 생성하시오. 드론 하이재킹 인시던트의 탐지부터 복구까지 8개 이벤트를 출력하라.
  hint: 시간, 이벤트, 조치를 포함하는 타임라인을 만드세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Python으로 CPS 인시던트 타임라인을 생성해줘

    📎 참고 (CLI): python3 -c "events=[(''14:23'',''IDS alert: unknown command source'',''Notify SOC''),(''14:24'',''Drone
    deviating from route'',''Attempt RTL''),(''14:25'',''GPS anomaly detected'',''Flag spoofing''),(''14:26'',''RTL
    rejected — channel compromised'',''Alert ATC''),(''14:27'',''Fleet grounded'',''Isolate comms''),(''14:30'',''Attack
    vector identified'',''Collect evidence''),(''14:45'',''Root cause: plaintext auth key'',''Rotate keys''),(''15:00'',''Fleet
    restored with encryption'',''Resume ops'')];print(''=== Incident Timeline ==='');[print(f''  [{t}]
    {e}\n         Action: {a}'') for t,e,a in events]"'
  answer_detail: 인시던트 타임라인은 대응과 사후 분석의 핵심 도구입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'CPS 인시던트 타임라인 — 드론 하이재킹 8 이벤트: T+0 GPS glitch → T+2 WiFi 스캔 탐지 → T+5 Deauth 감지 → T+7 비정상
        motor command → T+10 failsafe 활성 → T+12 오퍼레이터 알림 → T+15 수동 착륙 → T+20 복구 완료. 각 이벤트 timestamp'
      success_criteria:
      - 8 이벤트 타임라인
      - timestamp 순차
      - 드론 IR 시나리오
      acceptable_methods:
      - python dict + sort
      - timesketch 포맷
      - CPS timeline 도구
      negative_signs:
      - 이벤트 5 이하
      - timestamp 없음
  target_vm: attacker
  script: 'python3 -c "events=[(''14:23'',''IDS alert: unknown command source'',''Notify SOC''),(''14:24'',''Drone
    deviating from route'',''Attempt RTL''),(''14:25'',''GPS anomaly detected'',''Flag spoofing''),(''14:26'',''RTL
    rejected — channel compromised'',''Alert ATC''),(''14:27'',''Fleet grounded'',''Isolate comms''),(''14:30'',''Attack
    vector identified'',''Collect evidence''),(''14:45'',''Root cause: plaintext auth key'',''Rotate keys''),(''15:00'',''Fleet
    restored with encryption'',''Resume ops'')];print(''=== Incident Timeline ==='');[print(f''  [{t}]
    {e}\n         Action: {a}'') for t,e,a in events]"'
  risk_level: low
  bastion_prompt: Python으로 CPS 인시던트 타임라인을 생성해줘
- order: 2
  instruction: CPS IR 6단계를 Python으로 구현하시오. 탐지→안전→봉쇄→조사→복구→사후 각 단계의 활동을 출력하라.
  hint: 각 단계별 주요 활동을 리스트로 정의하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: CPS IR 6단계를 Python으로 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "phases=[(''1.Detection'',''IDS alert + process anomaly''),(''2.Safety'',''Ensure
    physical safety first''),(''3.Containment'',''Isolate affected systems''),(''4.Investigation'',''Forensics
    + timeline reconstruction''),(''5.Recovery'',''Restore from known-good state''),(''6.Post-Incident'',''Root
    cause + improvements'')];print(''=== CPS IR 6 Phases ==='');[print(f''  [{p[0]}] {p[1]}'') for p in
    phases]"'
  answer_detail: 6단계 프레임워크는 CPS 인시던트의 체계적 대응을 보장합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: CPS IR 6단계 — (1) 탐지 (IDS 경보) (2) 안전 (failsafe 활성·비상 정지) (3) 봉쇄 (네트워크 격리) (4) 조사 (PCAP·로그)
        (5) 복구 (시스템 재시작·백업 복원) (6) 사후 (RCA·개선). IT IR (NIST SP 800-61) 에 안전 단계 추가. IEC 62443-2-4
      success_criteria:
      - 6 단계 (탐지·안전·봉쇄·조사·복구·사후)
      - CPS 특화 안전 단계
      - IEC 62443 준거
      acceptable_methods:
      - python dict + 단계별
      - IEC 62443-2-4 매뉴얼
      negative_signs:
      - 5단계 이하
      - 안전 단계 누락
      - IT IR 과 동일
  target_vm: attacker
  script: python3 -c "phases=[('1.Detection','IDS alert + process anomaly'),('2.Safety','Ensure physical
    safety first'),('3.Containment','Isolate affected systems'),('4.Investigation','Forensics + timeline
    reconstruction'),('5.Recovery','Restore from known-good state'),('6.Post-Incident','Root cause + improvements')];print('===
    CPS IR 6 Phases ===');[print(f'  [{p[0]}] {p[1]}') for p in phases]"
  risk_level: low
  bastion_prompt: CPS IR 6단계를 Python으로 구현하시오. 탐지→안전→봉쇄→조사→복구→사후 각 단계의 활동을 출력하라.
- order: 3
  instruction: ICS SCADA 인시던트 시나리오를 시뮬레이션하시오. 수처리 시설의 Modbus 침해 탐지부터 복구까지 대응하라.
  hint: 물리적 안전 확보를 최우선으로 하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: ICS SCADA 인시던트 시나리오를 시뮬레이션해줘

    📎 참고 (CLI): python3 -c "print(''=== ICS Incident: Water Treatment ==='');steps=[(''DETECT'',''Modbus
    write from 10.20.30.201 — unauthorized''),(''SAFETY'',''Switch to MANUAL — verify physical gauges''),(''CONTAIN'',''Disconnect
    PLC from network''),(''INVESTIGATE'',''Modbus log: registers tampered, HMI deceived''),(''RECOVER'',''Restore
    PLC to known-good config''),(''POST'',''Root cause: no Modbus auth, flat network'')];[print(f''  [{s[0]}]
    {s[1]}'') for s in steps]"'
  answer_detail: ICS 인시던트에서는 물리적 안전 확인이 사이버 대응보다 우선합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 수처리 SCADA Modbus 침해 시나리오 — 탐지(IDS 비정상 Write 경보) → 안전(수동 제어 전환·펌프 수동 운전) → 봉쇄(PLC 네트워크 분리)
        → 조사(로그 분석·변조 레지스터 식별) → 복구(PLC 재설정·백업 로드·재가동). Oldsmar FL 2021 유사 사건 대응
      success_criteria:
      - 수처리 SCADA 특화
      - Modbus 침해 + IR 단계
      - 실제 사례(Oldsmar) 연결
      acceptable_methods:
      - python 시나리오 sim
      - NIST SP 800-82 ICS IR
      negative_signs:
      - 일반 IR 시나리오
      - 물/수처리 특화 없음
  target_vm: attacker
  script: 'python3 -c "print(''=== ICS Incident: Water Treatment ==='');steps=[(''DETECT'',''Modbus write
    from 10.20.30.201 — unauthorized''),(''SAFETY'',''Switch to MANUAL — verify physical gauges''),(''CONTAIN'',''Disconnect
    PLC from network''),(''INVESTIGATE'',''Modbus log: registers tampered, HMI deceived''),(''RECOVER'',''Restore
    PLC to known-good config''),(''POST'',''Root cause: no Modbus auth, flat network'')];[print(f''  [{s[0]}]
    {s[1]}'') for s in steps]"'
  risk_level: low
  bastion_prompt: ICS SCADA 인시던트 시나리오를 시뮬레이션해줘
- order: 4
  instruction: 네트워크 포렌식 증거를 수집하시오. SIEM에서 최근 로그를 확인하고 공격 흔적을 찾으라.
  hint: siem({{SECU_IP}}00)에서 로그를 확인하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 네트워크 포렌식 증거를 수집하시오. SIEM에서 최근 로그를 확인하고 공격 흔적을 찾으라해줘

    📎 참고 (CLI): ssh ccc@10.20.30.100 ''ls /var/log/ 2>/dev/null | head -10'' 2>/dev/null || echo "SIEM
    logs checked"'
  answer_detail: SIEM 로그는 인시던트 조사의 핵심 증거입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 네트워크 포렌식 증거 수집 — SIEM(Wazuh/ELK) 에서 최근 24h 로그 조회 + 공격 흔적 (소스 IP·목적지 포트·비정상 PDU·Modbus FC·timestamp).
        Splunk/Kibana 쿼리. Chain of Custody SHA256 해시
      success_criteria:
      - SIEM 로그 조회
      - 공격 흔적 식별
      - 증거 보존 (해시)
      acceptable_methods:
      - Wazuh API
      - Kibana Discover
      - Splunk SPL
      - jq eve.json
      negative_signs:
      - SIEM 사용 안 함
      - 해시 보존 없음
  target_vm: attacker
  script: ssh ccc@10.20.30.100 'ls /var/log/ 2>/dev/null | head -10' 2>/dev/null || echo "SIEM logs checked"
  risk_level: low
  bastion_prompt: 네트워크 포렌식 증거를 수집하시오. SIEM에서 최근 로그를 확인하고 공격 흔적을 찾으라해줘
