- order: 6
  instruction: 드론 인시던트 대응 플레이북을 Python으로 생성하시오. 탐지 지표, 안전 조치, 봉쇄, 조사, 복구 5개 섹션을 포함하라.
  hint: 각 섹션의 활동을 리스트로 정의하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 드론 인시던트 대응 플레이북을 Python으로 생성해줘

    📎 참고 (CLI): python3 -c "playbook={''Detection'':[''IDS alert on drone commands'',''Route deviation
    alarm'',''GPS anomaly''],''Safety'':[''Issue fleet RTL'',''Alert airspace authority'',''Evacuate impact
    area''],''Containment'':[''Switch to backup channel'',''Revoke keys'',''Ground fleet''],''Investigation'':[''Collect
    GCS logs'',''Analyze attack vector'',''Trace attacker IP''],''Recovery'':[''Rotate all keys'',''Enable
    MAVLink signing'',''Implement encryption'']};print(''=== Drone IR Playbook ==='');[(print(f''  [{k}]''),[print(f''    -
    {a}'') for a in v]) for k,v in playbook.items()]"'
  answer_detail: 인시던트 대응 플레이북은 사전 준비의 핵심 문서입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: '드론 IR 플레이북 /tmp/drone_playbook.md — 5 섹션: (1) 탐지 지표 (motor anomaly·GPS deviation·WiFi deauth)
        (2) 안전 조치 (RTL return-to-launch·altitude hold·motor cut) (3) 봉쇄 (jammer·geofence) (4) 조사 (flight
        log·ArduPilot telemetry) (5) 복구 (FW flash·calibration·재배포). UAV 특화 IR'
      success_criteria:
      - /tmp/drone_playbook.md 파일
      - 5 섹션 모두
      - UAV 특화 도구 언급
      acceptable_methods:
      - cat > file
      - FAA drone IR guidance
      negative_signs:
      - 섹션 3 이하
      - UAV 특화 없음
  target_vm: attacker
  script: python3 -c "playbook={'Detection':['IDS alert on drone commands','Route deviation alarm','GPS
    anomaly'],'Safety':['Issue fleet RTL','Alert airspace authority','Evacuate impact area'],'Containment':['Switch
    to backup channel','Revoke keys','Ground fleet'],'Investigation':['Collect GCS logs','Analyze attack
