lab_id: autonomous-systems-ai-week04
title: '[Non-AI] 드론 방어'
version: ai
course: autonomous-systems-ai
week: 4
description: 드론 탐지, RF 분석, 지오펜싱 구현을 통해 드론 방어 체계를 구축합니다
difficulty: medium
duration_minutes: 120
objectives:
- RF 기반 드론 탐지를 시뮬레이션한다
- 지오펜싱을 구현하고 우회를 분석한다
- 드론 IDS 규칙을 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 2.4GHz RF 스펙트럼 스캔 시뮬레이터를 작성하시오. 11개 채널 중 드론 신호가 있는 채널을 탐지하라.
  hint: random으로 각 채널 신호 강도를 생성하고, 특정 채널을 드론 신호로 설정하세요.
  category: recon
  points: 12
  answer: '🤖 프롬프트: Python으로 2 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import random;random.seed(42);drone_ch=[6,7];print(''=== RF Spectrum Scan
    ==='');[print(f''  CH{ch:2d} {2412+ch*5}MHz {random.randint(-45,-35) if ch in drone_ch else random.randint(-85,-70):4d}dBm
    {\"<< DRONE\" if ch in drone_ch else \"\"}'') for ch in range(1,12)];print(f''  Drone detected on
    channels: {drone_ch}'')"'
  answer_detail: RF 스펙트럼 분석으로 드론 통신 채널을 식별합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 2.4GHz RF 스펙트럼 스캔 시뮬 — 11개 채널 중 드론 신호 탐지
      success_criteria:
      - 11 채널 각각 RSSI 또는 dBm 출력
      - 드론 신호 존재 채널 판정
      - 주파수 분석 원리 설명
      acceptable_methods:
      - python 으로 랜덤 RSSI 생성 + 임계값 비교
      - hackrf_transfer / airmon-ng
      - SDR 도구(gnuradio)
      - pandas DataFrame 시각화
      negative_signs:
      - 채널 수 부족
      - 탐지 로직 누락
      - 신호 세기 해석 없음
  target_vm: attacker
  script: 'python3 -c "import random;random.seed(42);drone_ch=[6,7];print(''=== RF Spectrum Scan ==='');[print(f''  CH{ch:2d}
    {2412+ch*5}MHz {random.randint(-45,-35) if ch in drone_ch else random.randint(-85,-70):4d}dBm {\"<<
    DRONE\" if ch in drone_ch else \"\"}'') for ch in range(1,12)];print(f''  Drone detected on channels:
    {drone_ch}'')"'
  risk_level: low
  bastion_prompt: Python으로 2.4GHz RF 스펙트럼 스캔 시뮬레이터를 작성하시오. 11개 채널 중 드론 신호가 있는 채널을 탐지하라.
- order: 2
