  answer: '🤖 프롬프트: Python으로 드론 IDS를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c " known={''10.20.30.201''};alerts=[] ;pkts=[{''src'':''10.20.30.201'',''cmd'':''ARM'',''auth'':True},{''src'':''10.20.30.99'',''cmd'':''TAKEOFF'',''auth'':False},{''src'':''10.20.30.99'',''cmd'':''GOTO'',''auth'':False}]
    ;print(''=== Drone IDS ==='') ;[((alerts.append(f''Unknown src:{p[\"src\"]}'') if p[''src''] not in
    known else None),(alerts.append(f''No auth:{p[\"cmd\"]}'') if not p[''auth''] and p[''cmd''] in (''ARM'',''TAKEOFF'',''GOTO'')
    else None),print(f''  PKT src={p[\"src\"]} cmd={p[\"cmd\"]} auth={p[\"auth\"]} alerts={len(alerts)}''))
    for p in pkts] ;print(f''  Total alerts: {len(alerts)}'')"'
  answer_detail: 드론 IDS는 비정상 명령 패턴을 실시간 탐지합니다.
