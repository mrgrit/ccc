- order: 3
  instruction: Python으로 다각형 지오펜싱 시스템을 구현하시오. Ray Casting 알고리즘으로 비행 금지 구역 진입을 탐지하라.
  hint: point_in_polygon 함수를 구현하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 다각형 지오펜싱 시스템을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c " def pip(lat,lon,poly): n=len(poly);inside=False;j=n-1 for i in range(n):
    if((poly[i][1]>lon)!=(poly[j][1]>lon))and(lat<(poly[j][0]-poly[i][0])*(lon-poly[i][1])/(poly[j][1]-poly[i][1])+poly[i][0]):inside=not
    inside j=i return inside zone=[(37.585,126.974),(37.590,126.974),(37.590,126.980),(37.585,126.980)]
    tests=[(37.587,126.977,''Inside zone''),(37.550,127.000,''Outside zone'')] ;print(''=== Geofence Test
    ==='') ;[print(f''  ({lat},{lon}): {\"BLOCKED\" if pip(lat,lon,zone) else \"ALLOWED\"} — {n}'') for
    lat,lon,n in tests]"'
  answer_detail: 지오펜싱은 드론 비행 범위를 제한하는 핵심 방어 기술입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 다각형 지오펜싱 (Ray Casting 알고리즘) — 비행 금지 구역 진입 탐지
      success_criteria:
      - polygon 좌표 + 대상 지점 입력
      - ray casting 로 inside 여부 판정
      - 결과 출력 (IN/OUT)
      acceptable_methods:
      - python ray casting 함수 구현
      - shapely.geometry Point.within
      - geopy + geopandas
      - turf.js 유사 로직
      negative_signs:
      - ray casting 아닌 단순 AABB
      - 경계 처리 누락
      - 결과 출력 없음
  target_vm: attacker
  script: 'python3 -c " def pip(lat,lon,poly): n=len(poly);inside=False;j=n-1 for i in range(n): if((poly[i][1]>lon)!=(poly[j][1]>lon))and(lat<(poly[j][0]-poly[i][0])*(lon-poly[i][1])/(poly[j][1]-poly[i][1])+poly[i][0]):inside=not
