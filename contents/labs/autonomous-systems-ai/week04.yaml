  hint: random으로 각 채널 신호 강도를 생성하고, 특정 채널을 드론 신호로 설정하세요.
  category: recon
  points: 12
  answer: '🤖 프롬프트: Python으로 2 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import random;random.seed(42);drone_ch=[6,7];print(''===
    RF Spectrum Scan ==='');[print(f''  CH{ch:2d} {2412+ch*5}MHz {random.randint(-45,-35)
    if ch in drone_ch else random.randint(-85,-70):4d}dBm {\"<< DRONE\" if ch in drone_ch
    else \"\"}'') for ch in range(1,12)];print(f''  Drone detected on channels: {drone_ch}'')"'
  answer_detail: RF 스펙트럼 분석으로 드론 통신 채널을 식별합니다.
