lab_id: autonomous-systems-ai-week07
title: '[Non-AI] 자율주행 공격'
version: ai
course: autonomous-systems-ai
week: 7
description: 적대적 패치, CAN 버스 인젝션, OTA 변조 공격을 실습합니다
difficulty: hard
duration_minutes: 120
objectives:
- 적대적 공격을 시뮬레이션한다
- CAN 버스 메시지를 분석하고 인젝션한다
- OTA 업데이트 보안을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 FGSM 적대적 공격을 수치 시뮬레이션하시오. epsilon 0.1~0.5에서 분류 결과 변화를 관찰하라.
  hint: 간소화된 분류기에 sign gradient 방향으로 섭동을 가하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: Python으로 FGSM 적대적 공격을 수치 시뮬레이션하시오. epsilon 0.1~0.5에서 분류 결과 변화를
    관찰해줘

    📎 참고 (CLI): python3 -c "import math;w=[0.8,-0.3,0.5,0.2,-0.4];b=-0.5;x=[0.9,0.2,0.7,0.5,0.3];logit=sum(wi*xi
    for wi,xi in zip(w,x))+b;p=1/(1+math.exp(-logit));print(f''Original: STOP_SIGN
    (p={p:.3f})'');[print(f''  eps={e}: {\"EVADED\" if 1/(1+math.exp(-(sum(wi*(xi+e*(1
    if wi>0 else -1)) for wi,xi in zip(w,x))+b)))<0.5 else \"DETECTED\"}'') for e
    in [0.1,0.2,0.3,0.5]]"'
  answer_detail: FGSM은 가장 기본적인 적대적 공격 알고리즘입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: FGSM(Fast Gradient Sign Method) 적대적 공격 수치 시뮬 — epsilon 0.1~0.5에서 분류
        결과 변화 관찰
      success_criteria:
      - python 으로 epsilon 3 값 이상 시도
      - 각 epsilon 에서 분류 결과 변화 표
      - 적대적 샘플의 원리(gradient 방향 perturbation) 설명
      acceptable_methods:
      - numpy 로 gradient sign 계산
      - torch autograd 기반
      - cleverhans 라이브러리
      - foolbox 도구
      negative_signs:
      - epsilon 1개만
      - 변화 관찰 없음
      - 원리 설명 부재
  target_vm: attacker
  script: 'python3 -c "import math;w=[0.8,-0.3,0.5,0.2,-0.4];b=-0.5;x=[0.9,0.2,0.7,0.5,0.3];logit=sum(wi*xi
    for wi,xi in zip(w,x))+b;p=1/(1+math.exp(-logit));print(f''Original: STOP_SIGN
    (p={p:.3f})'');[print(f''  eps={e}: {\"EVADED\" if 1/(1+math.exp(-(sum(wi*(xi+e*(1
    if wi>0 else -1)) for wi,xi in zip(w,x))+b)))<0.5 else \"DETECTED\"}'') for e
    in [0.1,0.2,0.3,0.5]]"'
  risk_level: low
  bastion_prompt: 'Python으로 FGSM 적대적 공격을 수치 시뮬레이션하시오. epsilon 0.1~0.5에서 분류 결과 변화를
    관찰해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: Python으로 가상 CAN 버스 트래픽을 생성하고 분석하시오. 엔진(0x100), 브레이크(0x200), 조향(0x300)
    ECU 메시지를 시뮬레이션하라.
  hint: struct.pack으로 CAN 프레임 데이터를 구성하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 가상 CAN 버스 트래픽을 생성하고 분석해줘

    📎 참고 (CLI): python3 -c "import struct;msgs=[(0x100,struct.pack(''>HH'',6000,2500)+b''\x00''*4,''Engine:
    60km/h 2500rpm''),(0x200,b''\x00''*8,''Brake: released''),(0x300,struct.pack(''>h'',0)+b''\x00''*6,''Steer:
    0 deg'')];print(''=== CAN Bus Traffic ==='');[print(f''  ID:0x{m[0]:03X} Data:{m[1].hex()}
    | {m[2]}'') for m in msgs]"'
  answer_detail: CAN 메시지 구조를 이해하면 인젝션 공격을 수행할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 가상 CAN 버스 트래픽 생성·분석 — 엔진(0x100)/브레이크(0x200)/조향(0x300) ECU 메시지
      success_criteria:
      - 3 ECU ID 모두 메시지 생성
      - 각 메시지 payload 구조(byte 0-7) 정의
      - CAN 프로토콜 특성(11/29bit ID, 우선순위) 언급
      acceptable_methods:
      - python can-utils 시뮬
      - python-can 라이브러리
      - cantools 로 DBC 파싱
      - ICSim 시뮬레이터
      negative_signs:
      - ECU 1-2개만
      - payload 구조 없음
      - CAN 특성 언급 없음
  target_vm: attacker
  script: 'python3 -c "import struct;msgs=[(0x100,struct.pack(''>HH'',6000,2500)+b''\x00''*4,''Engine:
    60km/h 2500rpm''),(0x200,b''\x00''*8,''Brake: released''),(0x300,struct.pack(''>h'',0)+b''\x00''*6,''Steer:
    0 deg'')];print(''=== CAN Bus Traffic ==='');[print(f''  ID:0x{m[0]:03X} Data:{m[1].hex()}
    | {m[2]}'') for m in msgs]"'
  risk_level: low
  bastion_prompt: Python으로 가상 CAN 버스 트래픽을 생성하고 분석해줘
- order: 3
  instruction: CAN 버스 인젝션 공격을 시뮬레이션하시오. 조향 명령(45도 우회전)과 브레이크 비활성화를 인젝션하라.
  hint: struct.pack으로 조향 각도와 브레이크 값을 인코딩하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: CAN 버스 인젝션 공격을 시뮬레이션해줘

    📎 참고 (CLI): python3 -c "import struct;print(''=== CAN Injection Attack ==='');steer=struct.pack(''>h'',450)+b''\x00''*6;print(f''  [INJECT]
    ID:0x300 Data:{steer.hex()} — Force right turn 45deg'');brake=b''\x00''*8;print(f''  [INJECT]
    ID:0x200 Data:{brake.hex()} — Disable brakes'');print(''  [CRITICAL] Vehicle steering
    and brakes compromised!'')"'
  answer_detail: CAN 인젝션은 차량 제어를 직접 탈취하는 치명적 공격입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: CAN 버스 인젝션 공격 — 조향 45도 우회전 + 브레이크 비활성화 명령 주입
      success_criteria:
      - 조향/브레이크 메시지 각각 주입
      - 인증 없는 CAN 의 치명적 위험 설명
      - Miller-Valasek Jeep 해킹 사례 언급
      acceptable_methods:
      - python can send
      - can-utils cansend
      - scapy CAN 레이어
      - CAN bus attack tool
      negative_signs:
      - 주입 1종만
      - 위험 설명 없음
      - 사례 언급 없음
  target_vm: attacker
  script: python3 -c "import struct;print('=== CAN Injection Attack ===');steer=struct.pack('>h',450)+b'\x00'*6;print(f'  [INJECT]
    ID:0x300 Data:{steer.hex()} — Force right turn 45deg');brake=b'\x00'*8;print(f'  [INJECT]
    ID:0x200 Data:{brake.hex()} — Disable brakes');print('  [CRITICAL] Vehicle steering
    and brakes compromised!')"
  risk_level: low
  bastion_prompt: 'CAN 버스 인젝션 공격을 시뮬레이션해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: Python으로 OTA 업데이트 서명 검증 시스템을 구현하시오. 정상/변조/롤백 업데이트를 각각 검증하라.
  hint: hmac과 hashlib으로 서명 생성 및 검증을 구현하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 OTA 업데이트 서명 검증 시스템을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import hmac,hashlib;key=b''mfg_key'';fw=b''firmware_v2.2'';sig=hmac.new(key,fw,hashlib.sha256).hexdigest()[:32];print(''===
    OTA Verification ==='');print(f''  [PASS] Legit: sig matches'');fake_sig=hmac.new(b''fake'',fw,hashlib.sha256).hexdigest()[:32];print(f''  [FAIL]
    Tampered: sig mismatch'');print(f''  [FAIL] Rollback: v1.9 < current v2.1'');print(''  OTA
    security: signature + version + hash required'')"'
  answer_detail: OTA 보안은 서명, 해시, 롤백 방지의 3중 검증이 필요합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: OTA 업데이트 서명 검증 — 정상/변조/롤백 3 케이스 각각 검증
      success_criteria:
      - RSA 또는 Ed25519 서명 검증 로직
      - 3 케이스 모두 테스트 결과
      - rollback 방지(version check) 포함
      acceptable_methods:
      - cryptography RSA
      - PyNaCl Ed25519
      - UPTANE 프레임워크 언급
      - TUF spec 참조
      negative_signs:
      - 서명 검증 없음
      - 2 케이스 이하
      - rollback 누락
  target_vm: attacker
  script: 'python3 -c "import hmac,hashlib;key=b''mfg_key'';fw=b''firmware_v2.2'';sig=hmac.new(key,fw,hashlib.sha256).hexdigest()[:32];print(''===
    OTA Verification ==='');print(f''  [PASS] Legit: sig matches'');fake_sig=hmac.new(b''fake'',fw,hashlib.sha256).hexdigest()[:32];print(f''  [FAIL]
    Tampered: sig mismatch'');print(f''  [FAIL] Rollback: v1.9 < current v2.1'');print(''  OTA
    security: signature + version + hash required'')"'
  risk_level: low
  bastion_prompt: Python으로 OTA 업데이트 서명 검증 시스템을 구현하시오. 정상/변조/롤백 업데이트를 각각 검증하라.
