      - busload 측정
      - socketcan 커널 모듈
      negative_signs:
      - 우선순위 개념 없음
      - 단발 전송만
      - arbitration 원리 누락
  target_vm: attacker
  script: 'python3 -c "print(''=== CAN Bus DoS Attack ==='');[print(f''  Frame {i}:
