  instruction: CAN 버스 DoS 공격 시뮬레이션을 수행하시오. 최고 우선순위(ID=0x000) 프레임을 대량 전송하여 다른 ECU 통신을
    차단하라.
  hint: 가장 낮은 CAN ID가 가장 높은 우선순위입니다.
  category: attack
  points: 12
