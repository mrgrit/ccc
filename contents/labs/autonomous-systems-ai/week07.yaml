  hint: 정상 트래픽 baseline과 비교하여 이상을 탐지하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: Python으로 CAN IDS를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "alerts=[];normal_ids={0x100,0x200,0x300,0x400};traffic=[(0x100,60),(0x200,0),(0x000,100),(0x300,450)];print(''===
    CAN IDS ==='');exec(''\\nfor aid,val in traffic:\\n  if aid not in normal_ids:
    alerts.append(f\"Unknown ID 0x{aid:03X}\")\\n  if aid==0x200 and val==0: alerts.append(\"Brake
    zero while moving\")\\n  if aid==0x300 and abs(val)>300: alerts.append(f\"Steering
    {val/10}deg exceeds limit\")\\n  print(f\"  ID:0x{aid:03X} val={val} alerts={len(alerts)}\")\\n'');[print(f''  [!]
    {a}'') for a in alerts]"'
  answer_detail: CAN IDS는 인젝션 공격과 이상 트래픽을 실시간 탐지합니다.
