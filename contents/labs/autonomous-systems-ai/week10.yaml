- order: 7
  instruction: DDS Security 적용 전후 공격 성공률을 비교하는 시뮬레이션을 수행하시오.
  hint: 보안 적용 전/후 각 공격의 성공 여부를 비교하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: DDS Security 적용 전후 공격 성공률을 비교하는 시뮬레이션을 수행해줘

    📎 참고 (CLI): python3 -c "attacks=[(''Topic Sniffing'',''POSSIBLE'',''BLOCKED''),(''Command
    Injection'',''POSSIBLE'',''BLOCKED''),(''Discovery Scan'',''POSSIBLE'',''BLOCKED''),(''Node
    Spoofing'',''POSSIBLE'',''BLOCKED''),(''DoS Flooding'',''POSSIBLE'',''MITIGATED'')];print(''===
    DDS Security Comparison ==='');print(f''  {\"Attack\":<22} {\"Before\":<12} {\"After\":<12}'');[print(f''  {a[0]:<22}
    {a[1]:<12} {a[2]:<12}'') for a in attacks]"'
  answer_detail: DDS Security는 ROS2의 주요 공격 벡터를 효과적으로 차단합니다.
  verify:
    type: output_contains
    expect: null
