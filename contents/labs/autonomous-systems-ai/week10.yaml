  points: 10
  answer: '🤖 프롬프트: ROS2 보안 감사 보고서를 Python으로 생성해줘

    📎 참고 (CLI): python3 -c "print(''=== ROS2 Security Audit Report ==='');vulns=[(''No
    DDS auth'',''CRITICAL''),(''Topic open access'',''CRITICAL''),(''Plaintext data'',''HIGH''),(''Discovery
    exposed'',''HIGH'')];print(''  Vulnerabilities:'');[print(f''    [{s}] {v}'')
    for v,s in vulns];print(''  Recommendations:'');print(''    1. Enable SROS2 DDS
    Security'');print(''    2. Implement topic-level ACL'');print(''    3. Encrypt
    sensitive topics'');print(''    4. Segment robot network'')"'
  answer_detail: 보안 감사 보고서로 ROS2 환경의 보안 수준을 평가합니다.
  verify:
    type: output_contains
    expect: null
