- order: 7
  instruction: Python으로 드론 텔레메트리 데이터(위도, 경도, 고도, 배터리)를 JSON으로 생성하고 출력하시오.
  hint: json.dumps로 텔레메트리 데이터를 직렬화하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: Python으로 드론 텔레메트리 데이터(위도, 경도, 고도, 배터리)를 JSON으로 생성하고 출력해줘

    📎 참고 (CLI): python3 -c "import json;telemetry={''lat'':37.5665,''lon'':126.978,''alt'':50,''battery'':85,''speed'':5.2,''heading'':180};print(''Telemetry:'',json.dumps(telemetry,indent=2))"'
