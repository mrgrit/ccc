  target_vm: attacker
  script: python3 -c "import json;telemetry={'lat':37.5665,'lon':126.978,'alt':50,'battery':85,'speed':5.2,'heading':180};print('Telemetry:',json.dumps(telemetry,indent=2))"
  risk_level: low
  bastion_prompt: Python으로 드론 텔레메트리 데이터(위도, 경도, 고도, 배터리)를 JSON으로 생성하고 출력해줘
- order: 8
  instruction: Python으로 드론 통신의 보안 수준을 평가하는 스크립트를 작성하시오. 인증, 암호화, 서명, 무결성 4가지 항목을 체크하라.
  hint: 각 보안 항목을 딕셔너리로 정의하고 평가하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Python으로 드론 통신의 보안 수준을 평가하는 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c " checks={''Authentication'':False,''Encryption'':False,''MAVLink
    Signing'':False,''Integrity Check'':False} ;score=sum(checks.values())/len(checks)*100
    ;print(''=== Drone Comm Security ==='') ;[print(f''  [{\"OK\" if v else \"FAIL\"}]
    {k}'') for k,v in checks.items()] ;print(f''Score: {score:.0f}% - CRITICAL'')"'
  answer_detail: 드론 통신 보안 평가를 통해 개선점을 도출합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c " checks={''Authentication'':False,''Encryption'':False,''MAVLink
    Signing'':False,''Integrity Check'':False} ;score=sum(checks.values())/len(checks)*100
    ;print(''=== Drone Comm Security ==='') ;[print(f''  [{\"OK\" if v else \"FAIL\"}]
    {k}'') for k,v in checks.items()] ;print(f''Score: {score:.0f}% - CRITICAL'')"'
  risk_level: low
  bastion_prompt: Python으로 드론 통신의 보안 수준을 평가하는 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘
