- order: 5
  instruction: 자율주행 공격 표면을 Python으로 매핑하시오. 인지/통신/소프트웨어/물리 4가지 계층의 공격 벡터를 출력하라.
  hint: 각 계층별 공격 벡터를 리스트로 정의하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 자율주행 공격 표면을 Python으로 매핑해줘

    📎 참고 (CLI): python3 -c "surface={''Perception'':[''Adversarial patch'',''LiDAR
    spoofing'',''Camera blinding''],''Communication'':[''V2X forgery'',''CAN injection'',''GPS
