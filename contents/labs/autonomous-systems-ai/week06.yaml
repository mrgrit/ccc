    Decision Making ==='');[print(f''  {d[0]} at {d[1]}m → {\"STOP\" if d[0]==\"stop_sign\"
    and d[1]<30 else \"BRAKE\" if d[0]==\"pedestrian\" and d[1]<20 else \"MAINTAIN\"}'')
    for d in detections]"'
  answer_detail: 의사결정 시스템의 동작을 이해하면 공격 영향을 분석할 수 있습니다.
