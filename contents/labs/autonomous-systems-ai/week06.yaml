  points: 12
  answer: '🤖 프롬프트: Python으로 가상 객체 탐지기를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import random;random.seed(1);objects=[(''car'',''ahead''),(''pedestrian'',''crosswalk''),(''stop_sign'',''right''),(''traffic_light'',''overhead''),(''bicycle'',''left'')];print(''===
    Object Detection ==='');[print(f''  {o[0]:15} at {o[1]:10} conf={random.uniform(0.75,0.99):.3f}'')
    for o in objects];print(''  5 objects detected'')"'
  answer_detail: 객체 탐지 시뮬레이션으로 AI 인지 파이프라인을 이해합니다.
