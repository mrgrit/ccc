    semantic:
      intent: 가상 객체 탐지기 시뮬 — python3 에서 5개 도로 객체(차량/보행자/정지표지판/신호등/자전거) + 위치(ahead/crosswalk/right/overhead/left)
        + random.uniform(0.75, 0.99) 신뢰도 출력. AI 인지 파이프라인의 결과 형태 이해. YOLO·Faster R-CNN
        출력 모방
