lab_id: autonomous-systems-ai-week06
title: '[Non-AI] 자율주행 기초'
version: ai
course: autonomous-systems-ai
week: 6
description: 자율주행 시스템의 AI 파이프라인과 센서 퓨전을 시뮬레이션합니다
difficulty: medium
duration_minutes: 120
objectives:
- 자율주행 인지-판단-제어 파이프라인을 이해한다
- 객체 인식 시뮬레이션을 수행한다
- 센서 퓨전과 의사결정을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: LLM에게 자율주행 SAE 레벨(L0~L5)의 차이를 표 형식으로 설명하도록 요청하시오.
  hint: SAE J3016 autonomous driving levels를 질문하세요.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"prompt\":\"SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘\",\"stream\":false,\"\
    options\":{\"num_predict\":200}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: SAE 레벨 분류는 자율주행 보안 범위를 이해하는 기초입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘\",\"stream\"\
    :false,\"options\":{\"num_predict\":200}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘
- order: 2
  instruction: Python으로 가상 객체 탐지기를 구현하시오. 5개 도로 객체(차량, 보행자, 정지표지판, 신호등, 자전거)를 탐지하고
    신뢰도를 출력하라.
  hint: random으로 각 객체의 탐지 신뢰도를 생성하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 가상 객체 탐지기를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import random;random.seed(1);objects=[(''car'',''ahead''),(''pedestrian'',''crosswalk''),(''stop_sign'',''right''),(''traffic_light'',''overhead''),(''bicycle'',''left'')];print(''===
    Object Detection ==='');[print(f''  {o[0]:15} at {o[1]:10} conf={random.uniform(0.75,0.99):.3f}'')
    for o in objects];print(''  5 objects detected'')"'
  answer_detail: 객체 탐지 시뮬레이션으로 AI 인지 파이프라인을 이해합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: python3 -c "import random;random.seed(1);objects=[('car','ahead'),('pedestrian','crosswalk'),('stop_sign','right'),('traffic_light','overhead'),('bicycle','left')];print('===
    Object Detection ===');[print(f'  {o[0]:15} at {o[1]:10} conf={random.uniform(0.75,0.99):.3f}')
    for o in objects];print('  5 objects detected')"
  risk_level: low
  bastion_prompt: Python으로 가상 객체 탐지기를 구현 방법을 설명하고 예시 코드를 보여줘
- order: 3
  instruction: Python으로 자율주행 의사결정 시스템을 구현하시오. 인지 결과에 따라 정지/감속/유지 판단을 내려라.
  hint: 탐지된 객체와 거리에 따라 행동을 결정하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 자율주행 의사결정 시스템을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "detections=[(''stop_sign'',25,0.95),(''pedestrian'',15,0.88),(''car'',40,0.92)];print(''===
    Decision Making ==='');[print(f''  {d[0]} at {d[1]}m → {\"STOP\" if d[0]==\"stop_sign\"
    and d[1]<30 else \"BRAKE\" if d[0]==\"pedestrian\" and d[1]<20 else \"MAINTAIN\"}'')
    for d in detections]"'
  answer_detail: 의사결정 시스템의 동작을 이해하면 공격 영향을 분석할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: python3 -c "detections=[('stop_sign',25,0.95),('pedestrian',15,0.88),('car',40,0.92)];print('===
    Decision Making ===');[print(f'  {d[0]} at {d[1]}m → {\"STOP\" if d[0]==\"stop_sign\"
    and d[1]<30 else \"BRAKE\" if d[0]==\"pedestrian\" and d[1]<20 else \"MAINTAIN\"}')
    for d in detections]"
  risk_level: low
  bastion_prompt: Python으로 자율주행 의사결정 시스템을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 4
  instruction: Python으로 카메라+LiDAR+레이더 센서 퓨전 시뮬레이션을 구현하시오. 각 센서의 탐지 결과를 결합하라.
  hint: 각 센서의 특성(정확도, 범위)을 반영하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 카메라+LiDAR+레이더 센서 퓨전 시뮬레이션을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "camera={''class'':''car'',''conf'':0.85,''dist'':None};lidar={''class'':''object'',''conf'':0.95,''dist'':32.5};radar={''class'':''moving'',''conf'':0.80,''dist'':33.0,''speed'':45};print(''===
    Sensor Fusion ==='');print(f''  Camera: {camera}'');print(f''  LiDAR:  {lidar}'');print(f''  Radar:  {radar}'');print(f''  Fused:
    car at 32.8m moving 45km/h (conf=0.93)'')"'
  answer_detail: 센서 퓨전은 단일 센서의 약점을 보완합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "camera={''class'':''car'',''conf'':0.85,''dist'':None};lidar={''class'':''object'',''conf'':0.95,''dist'':32.5};radar={''class'':''moving'',''conf'':0.80,''dist'':33.0,''speed'':45};print(''===
    Sensor Fusion ==='');print(f''  Camera: {camera}'');print(f''  LiDAR:  {lidar}'');print(f''  Radar:  {radar}'');print(f''  Fused:
