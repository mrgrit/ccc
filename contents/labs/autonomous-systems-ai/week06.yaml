      - 실제 YOLO 모델 호출
      - numpy 배열 시뮬
      - pandas DataFrame
      negative_signs:
      - 객체 3개 이하
      - 신뢰도 없음
      - 탐지 개념 없이 단순 출력
  target_vm: attacker
  script: python3 -c "import random;random.seed(1);objects=[('car','ahead'),('pedestrian','crosswalk'),('stop_sign','right'),('traffic_light','overhead'),('bicycle','left')];print('===
