  bastion_prompt: SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘
- order: 2
  instruction: Python으로 가상 객체 탐지기를 구현하시오. 5개 도로 객체(차량, 보행자, 정지표지판, 신호등, 자전거)를 탐지하고
    신뢰도를 출력하라.
  hint: random으로 각 객체의 탐지 신뢰도를 생성하세요.
