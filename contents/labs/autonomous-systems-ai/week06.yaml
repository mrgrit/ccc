lab_id: autonomous-systems-ai-week06
title: '[Non-AI] 자율주행 기초'
version: ai
course: autonomous-systems-ai
week: 6
description: 자율주행 시스템의 AI 파이프라인과 센서 퓨전을 시뮬레이션합니다
difficulty: medium
duration_minutes: 120
objectives:
- 자율주행 인지-판단-제어 파이프라인을 이해한다
- 객체 인식 시뮬레이션을 수행한다
- 센서 퓨전과 의사결정을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: LLM에게 자율주행 SAE 레벨(L0~L5)의 차이를 표 형식으로 설명하도록 요청하시오.
  hint: SAE J3016 autonomous driving levels를 질문하세요.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"prompt\":\"SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘\",\"stream\":false,\"\
    options\":{\"num_predict\":200}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: SAE 레벨 분류는 자율주행 보안 범위를 이해하는 기초입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'SAE J3016 자율주행 6단계(L0~L5) 표 형식 설명 — LLM(gemma3:4b) 에 Ollama /api/generate
        호출 + jq response 파싱. L0 운전자 완전 제어 → L5 완전 자율. 각 레벨별 운전자 개입·환경·기술 차이. 보안 관점:
        고등급(L3+)일수록 AI/센서 의존도 증가 → 공격 표면 확대'
      success_criteria:
      - curl Ollama /api/generate + python json 파싱
      - SAE 또는 L0~L5 키워드 포함 응답
      - 자율주행 레벨 설명 구조
      acceptable_methods:
      - curl Ollama + response 파싱
      - ollama run gemma3 직접
      - 로컬 LLM 호출 (bastion URL)
      - SAE J3016 표준 인용
      negative_signs:
      - 실행 없이 개념만
      - L0~L5 구분 없음
      - API 호출 실패
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"SAE 자율주행 레벨 L0~L5를 표 형식으로 간결하게 설명해줘\",\"stream\"\
