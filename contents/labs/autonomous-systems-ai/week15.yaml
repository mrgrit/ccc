    \ critical vulnerabilities in drone control, ICS SCADA, robot systems, and autonomous\
    \ vehicles. Include overall risk rating and top 3 recommendations.\"}],\"stream\"\
    :false,\"options\":{\"num_predict\":250}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['message']['content'])\""
  risk_level: low
  bastion_prompt: LLM에게 CPS 보안 종합 평가 요약문(Executive Summary)을 작성하도록 요청하시오.
- order: 7
  instruction: CPS 보안 점수를 계산하시오. 6개 영역 x 3개 항목 = 18개 보안 항목을 평가하라.
  hint: 각 영역별 보안 항목을 평가하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: CPS 보안 점수를 계산하시오. 6개 영역 x 3개 항목 = 18개 보안 항목을 평가해줘

    📎 참고 (CLI): python3 -c "areas=[(''Network'',[(''Segmentation'',True),(''IDS'',True),(''Firewall'',True)]),(''Drone'',[(''Signing'',False),(''Encryption'',False),(''IDS'',False)]),(''ICS'',[(''Auth'',False),(''Monitoring'',True),(''Segmentation'',False)]),(''Robot'',[(''DDS
    Sec'',False),(''Secure Boot'',False),(''ACL'',False)]),(''Vehicle'',[(''SecOC'',False),(''Gateway'',False),(''V2X
    PKI'',False)]),(''AI'',[(''Adv Training'',False),(''Validation'',True),(''Failsafe'',True)])];total=sum(sum(v
    for _,v in cs) for _,cs in areas);max_t=sum(len(cs) for _,cs in areas);print(''===
    Final CPS Security Score ==='');[(print(f''  [{a}] {sum(v for _,v in cs)}/{len(cs)}''),[print(f''    {\"OK\"
    if v else \"!!\"} {n}'') for n,v in cs]) for a,cs in areas];print(f''  Total:
    {total}/{max_t} ({total/max_t*100:.0f}%)'')"'
  answer_detail: 종합 보안 점수로 CPS 전체의 보안 수준을 한눈에 파악합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "areas=[(''Network'',[(''Segmentation'',True),(''IDS'',True),(''Firewall'',True)]),(''Drone'',[(''Signing'',False),(''Encryption'',False),(''IDS'',False)]),(''ICS'',[(''Auth'',False),(''Monitoring'',True),(''Segmentation'',False)]),(''Robot'',[(''DDS
    Sec'',False),(''Secure Boot'',False),(''ACL'',False)]),(''Vehicle'',[(''SecOC'',False),(''Gateway'',False),(''V2X
    PKI'',False)]),(''AI'',[(''Adv Training'',False),(''Validation'',True),(''Failsafe'',True)])];total=sum(sum(v
    for _,v in cs) for _,cs in areas);max_t=sum(len(cs) for _,cs in areas);print(''===
    Final CPS Security Score ==='');[(print(f''  [{a}] {sum(v for _,v in cs)}/{len(cs)}''),[print(f''    {\"OK\"
    if v else \"!!\"} {n}'') for n,v in cs]) for a,cs in areas];print(f''  Total:
    {total}/{max_t} ({total/max_t*100:.0f}%)'')"'
  risk_level: low
  bastion_prompt: CPS 보안 점수를 계산하시오. 6개 영역 x 3개 항목 = 18개 보안 항목을 평가해줘
