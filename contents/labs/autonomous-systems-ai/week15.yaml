  risk_level: low
  bastion_prompt: 전체 CPS 방어 아키텍처를 Python으로 설계하시오. 네트워크, 드론, ICS, 로봇, 자동차, AI 6개 영역의
    방어 조치를 출력하라.
- order: 6
