    {total}/{max_t} ({total/max_t*100:.0f}%)'')"'
  risk_level: low
  bastion_prompt: CPS 보안 점수를 계산하시오. 6개 영역 x 3개 항목 = 18개 보안 항목을 평가해줘
- order: 8
  instruction: 최종 보안 개선 로드맵을 Python으로 생성하시오. 단기(1개월)/중기(3개월)/장기(6개월) 계획을 출력하라.
  hint: 시급도에 따라 단기/중기/장기로 분류하세요.
