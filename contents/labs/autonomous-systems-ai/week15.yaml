  bastion_prompt: '드론 시뮬레이터에 침투 테스트를 수행하시오. PING, AUTH 스니핑, 명령 인젝션을 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: Modbus PLC에 침투 테스트를 수행하시오. 레지스터 읽기, 쓰기, Coil 제어를 시도하라.
  hint: Modbus FC 0x03, 0x06, 0x05를 사용하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: Modbus PLC에 침투 테스트를 수행해줘

    📎 참고 (CLI): python3 -c "print(''=== Modbus Pentest ==='');tests=[(''Read Registers
    (FC03)'',''All registers readable'',''HIGH''),(''Write Register (FC06)'',''Process
    values writable'',''CRITICAL''),(''Write Coil (FC05)'',''Actuators controllable'',''CRITICAL''),(''Emergency
    Stop'',''Coil 10 accessible'',''CRITICAL'')];[print(f''  [{s}] {t}: {r}'') for
    t,r,s in tests];print(f''  CRITICAL findings: {sum(1 for _,_,s in tests if s==\"CRITICAL\")}'')"'
  answer_detail: Modbus 침투 테스트로 ICS 인증 부재를 확인합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: Modbus PLC 침투 — pymodbus read_holding_registers(0, 10) + write_register(0,
        9999) + write_coil(0, True) 3 작업. CIA (Confidentiality·Integrity·Availability)
        각각 검증. 미인증 상태 확인
      success_criteria:
      - Modbus 읽기 + 쓰기 + Coil 3 동작
      - pymodbus 또는 raw
      - CIA 영향 평가
      acceptable_methods:
      - pymodbus Client
      - smod 자동화 도구
      negative_signs:
      - 읽기만
      - CIA 평가 없음
  target_vm: attacker
  script: 'python3 -c "print(''=== Modbus Pentest ==='');tests=[(''Read Registers
    (FC03)'',''All registers readable'',''HIGH''),(''Write Register (FC06)'',''Process
    values writable'',''CRITICAL''),(''Write Coil (FC05)'',''Actuators controllable'',''CRITICAL''),(''Emergency
    Stop'',''Coil 10 accessible'',''CRITICAL'')];[print(f''  [{s}] {t}: {r}'') for
    t,r,s in tests];print(f''  CRITICAL findings: {sum(1 for _,_,s in tests if s==\"CRITICAL\")}'')"'
  risk_level: low
  bastion_prompt: 'Modbus PLC에 침투 테스트를 수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: 전체 CPS 취약점을 종합 정리하시오. 드론, ICS, 자율주행, ROS2 각 영역의 CRITICAL 취약점을 출력하라.
  hint: 각 영역별 가장 심각한 취약점을 정리하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 전체 CPS 취약점을 종합 정리해줘

    📎 참고 (CLI): python3 -c "vulns={''Drone'':[''Plaintext auth'',''No MAVLink signing''],''ICS'':[''No
    Modbus auth'',''Flat OT network''],''AV'':[''CAN no auth'',''Adversarial AI vulnerable''],''Robot'':[''No
    DDS security'',''UART root access'']};total=0;print(''=== CPS Vulnerability Summary
    ==='');[(print(f''  [{k}]''),[print(f''    [CRITICAL] {v}'') for v in vs]) for
    k,vs in vulns.items()];print(f''  Total CRITICAL: {sum(len(v) for v in vulns.values())}'')"'
  answer_detail: 종합 취약점 정리로 보안 개선 우선순위를 설정합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 전체 CPS CRITICAL 취약점 — 드론(WiFi 기본 pw·MAVLink 무인증) + ICS(Modbus 무인증·기본
        slave ID) + AV(CAN 무인증·V2X 미서명) + ROS2(DDS Discovery 공개·UART debug). 각 영역
        2+ CRITICAL. CVSS 9+ 수준
      success_criteria:
      - 4 영역 CRITICAL 취약점
      - 각 영역 2+
      - CVSS 9+ 등급
      acceptable_methods:
      - python dict + 표
      - OWASP IoT Top 10
      negative_signs:
