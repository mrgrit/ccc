      - LLM 호출 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a CPS\
    \ security consultant writing an executive summary.\"},{\"role\":\"user\",\"content\"\
    :\"Write a 5-sentence executive summary for a CPS security assessment that found\
