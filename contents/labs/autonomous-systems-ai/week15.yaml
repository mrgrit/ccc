      - CVSS 없음
  target_vm: attacker
  script: 'python3 -c "vulns={''Drone'':[''Plaintext auth'',''No MAVLink signing''],''ICS'':[''No
    Modbus auth'',''Flat OT network''],''AV'':[''CAN no auth'',''Adversarial AI vulnerable''],''Robot'':[''No
    DDS security'',''UART root access'']};total=0;print(''=== CPS Vulnerability Summary
    ==='');[(print(f''  [{k}]''),[print(f''    [CRITICAL] {v}'') for v in vs]) for
    k,vs in vulns.items()];print(f''  Total CRITICAL: {sum(len(v) for v in vulns.values())}'')"'
  risk_level: low
  bastion_prompt: 전체 CPS 취약점을 종합 정리해줘
- order: 5
  instruction: 전체 CPS 방어 아키텍처를 Python으로 설계하시오. 네트워크, 드론, ICS, 로봇, 자동차, AI 6개 영역의 방어
    조치를 출력하라.
  hint: 각 영역별 필수 보안 조치를 정의하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 전체 CPS 방어 아키텍처를 Python으로 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "defenses={''Network'':[''IT/OT segmentation'',''CPS-aware
    IDS''],''Drone'':[''MAVLink signing'',''Encrypted channel''],''ICS'':[''Modbus
    auth → OPC-UA'',''PLC integrity''],''Robot'':[''DDS Security'',''Secure boot''],''Vehicle'':[''SecOC'',''CAN
    gateway IDS''],''AI'':[''Adversarial training'',''Input validation'']};print(''===
    CPS Defense Architecture ==='');[(print(f''  [{k}]''),[print(f''    - {d}'') for
    d in ds]) for k,ds in defenses.items()];print(f''  Total controls: {sum(len(v)
    for v in defenses.values())}'')"'
  answer_detail: 다계층 방어 아키텍처로 전체 CPS를 보호합니다.
  verify:
    type: output_contains
    expect:
    - generate_report()
    - cps_defense_YYYYMMDD
    field: stdout
    semantic:
      intent: 'CPS 방어 아키텍처 — 6 영역: Network(nftables/VLAN/DPI) + Drone(OTA 서명·MAVLink
        암호화) + ICS(OPC-UA·allowlist·PAM) + Robot(DDS Security·UART lock) + Vehicle(SecOC·Domain
        Isolation·V2X PKI) + AI(Adversarial training·Ensemble·FIM). 각 영역 3+ 조치. IEC
        62443 + ISO/SAE 21434 통합'
      success_criteria:
      - 6 영역 × 3+ 조치
      - 표준 통합 (IEC/ISO)
      - defense-in-depth
      acceptable_methods:
      - python dict
      - NIST Cybersecurity Framework + IEC 62443
      negative_signs:
      - 영역 3 이하
      - 조치 1-2개만
  target_vm: attacker
  script: 'python3 -c "defenses={''Network'':[''IT/OT segmentation'',''CPS-aware IDS''],''Drone'':[''MAVLink
    signing'',''Encrypted channel''],''ICS'':[''Modbus auth → OPC-UA'',''PLC integrity''],''Robot'':[''DDS
    Security'',''Secure boot''],''Vehicle'':[''SecOC'',''CAN gateway IDS''],''AI'':[''Adversarial
    training'',''Input validation'']};print(''=== CPS Defense Architecture ==='');[(print(f''  [{k}]''),[print(f''    -
