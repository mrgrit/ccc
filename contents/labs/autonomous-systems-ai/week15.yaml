    semantic:
      intent: 'CPS 보안 Executive Summary LLM — 비기술 경영진 대상 1쪽: 현재 위험 수준·비즈니스 영향·즉시 조치
        3·예산·일정·규제 준수 (IEC 62443 Level 3 목표). 기술 용어 최소화'
      success_criteria:
      - LLM 호출 + Executive Summary
      - 비즈니스 영향 중심
      - 규제 언급
      acceptable_methods:
