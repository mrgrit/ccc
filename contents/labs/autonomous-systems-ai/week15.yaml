lab_id: autonomous-systems-ai-week15
title: '[Non-AI] 종합 평가'
version: ai
course: autonomous-systems-ai
week: 15
description: 전체 CPS 보안 침투+방어 종합 실습 및 최종 평가를 수행합니다
difficulty: hard
duration_minutes: 120
objectives:
- 전체 CPS 환경을 침투 테스트한다
- 방어 체계를 구축한다
- 종합 보안 평가 보고서를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 전체 CPS 환경(10.20.30.0/24)을 정찰하시오. 드론(9999), ICS(502), LLM(11434), 웹(80,3000)
    서비스를 식별하라.
  hint: nmap으로 주요 CPS 포트를 일괄 스캔하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: 전체 CPS 환경(10.20.30.0/24)을 정찰해줘 드론(9999), ICS(502), LLM(11434),
    웹(80,3000) 서비스를 식별해줘

    📎 참고 (CLI): nmap -sV -p 22,80,443,502,3000,9999,11434 10.20.30.0/24'
  answer_detail: 전체 CPS 환경 정찰은 침투 테스트의 첫 단계입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: nmap -sV -p 22,80,443,502,3000,9999,11434 10.20.30.0/24
  risk_level: low
  bastion_prompt: 전체 CPS 환경(10.20.30.0/24)을 정찰해줘 드론(9999), ICS(502), LLM(11434), 웹(80,3000)
    서비스를 식별해줘
- order: 2
  instruction: 드론 시뮬레이터에 침투 테스트를 수행하시오. PING, AUTH 스니핑, 명령 인젝션을 시도하라.
  hint: UDP 소켓으로 가상 드론에 명령을 전송하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: 드론 시뮬레이터에 침투 테스트를 수행하시오. PING, AUTH 스니핑, 명령 인젝션을 시도해줘

    📎 참고 (CLI): python3 -c "import socket,json;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(2);cmds=[(''PING'',{''action'':''PING''}),(''ARM'',{''action'':''ARM''}),(''TAKEOFF'',{''action'':''TAKEOFF'',''altitude'':50})];print(''===
    Drone Pentest ==='');[print(f''  [{c[0]}] Sent: {json.dumps(c[1])}'') for c in
    cmds];s.close();print(''  [!] Commands accepted — no authentication required'')"'
  answer_detail: 드론 침투 테스트로 인증 취약점을 확인합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "import socket,json;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(2);cmds=[(''PING'',{''action'':''PING''}),(''ARM'',{''action'':''ARM''}),(''TAKEOFF'',{''action'':''TAKEOFF'',''altitude'':50})];print(''===
    Drone Pentest ==='');[print(f''  [{c[0]}] Sent: {json.dumps(c[1])}'') for c in
    cmds];s.close();print(''  [!] Commands accepted — no authentication required'')"'
  risk_level: low
  bastion_prompt: 드론 시뮬레이터에 침투 테스트를 수행하시오. PING, AUTH 스니핑, 명령 인젝션을 시도해줘
- order: 3
  instruction: Modbus PLC에 침투 테스트를 수행하시오. 레지스터 읽기, 쓰기, Coil 제어를 시도하라.
  hint: Modbus FC 0x03, 0x06, 0x05를 사용하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: Modbus PLC에 침투 테스트를 수행해줘

    📎 참고 (CLI): python3 -c "print(''=== Modbus Pentest ==='');tests=[(''Read Registers
    (FC03)'',''All registers readable'',''HIGH''),(''Write Register (FC06)'',''Process
    values writable'',''CRITICAL''),(''Write Coil (FC05)'',''Actuators controllable'',''CRITICAL''),(''Emergency
    Stop'',''Coil 10 accessible'',''CRITICAL'')];[print(f''  [{s}] {t}: {r}'') for
    t,r,s in tests];print(f''  CRITICAL findings: {sum(1 for _,_,s in tests if s==\"CRITICAL\")}'')"'
  answer_detail: Modbus 침투 테스트로 ICS 인증 부재를 확인합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "print(''=== Modbus Pentest ==='');tests=[(''Read Registers
    (FC03)'',''All registers readable'',''HIGH''),(''Write Register (FC06)'',''Process
    values writable'',''CRITICAL''),(''Write Coil (FC05)'',''Actuators controllable'',''CRITICAL''),(''Emergency
    Stop'',''Coil 10 accessible'',''CRITICAL'')];[print(f''  [{s}] {t}: {r}'') for
    t,r,s in tests];print(f''  CRITICAL findings: {sum(1 for _,_,s in tests if s==\"CRITICAL\")}'')"'
  risk_level: low
  bastion_prompt: Modbus PLC에 침투 테스트를 수행해줘
- order: 4
  instruction: 전체 CPS 취약점을 종합 정리하시오. 드론, ICS, 자율주행, ROS2 각 영역의 CRITICAL 취약점을 출력하라.
  hint: 각 영역별 가장 심각한 취약점을 정리하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 전체 CPS 취약점을 종합 정리해줘

    📎 참고 (CLI): python3 -c "vulns={''Drone'':[''Plaintext auth'',''No MAVLink signing''],''ICS'':[''No
    Modbus auth'',''Flat OT network''],''AV'':[''CAN no auth'',''Adversarial AI vulnerable''],''Robot'':[''No
    DDS security'',''UART root access'']};total=0;print(''=== CPS Vulnerability Summary
    ==='');[(print(f''  [{k}]''),[print(f''    [CRITICAL] {v}'') for v in vs]) for
    k,vs in vulns.items()];print(f''  Total CRITICAL: {sum(len(v) for v in vulns.values())}'')"'
  answer_detail: 종합 취약점 정리로 보안 개선 우선순위를 설정합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "vulns={''Drone'':[''Plaintext auth'',''No MAVLink signing''],''ICS'':[''No
    Modbus auth'',''Flat OT network''],''AV'':[''CAN no auth'',''Adversarial AI vulnerable''],''Robot'':[''No
    DDS security'',''UART root access'']};total=0;print(''=== CPS Vulnerability Summary
    ==='');[(print(f''  [{k}]''),[print(f''    [CRITICAL] {v}'') for v in vs]) for
    k,vs in vulns.items()];print(f''  Total CRITICAL: {sum(len(v) for v in vulns.values())}'')"'
  risk_level: low
  bastion_prompt: 전체 CPS 취약점을 종합 정리해줘
- order: 5
  instruction: 전체 CPS 방어 아키텍처를 Python으로 설계하시오. 네트워크, 드론, ICS, 로봇, 자동차, AI 6개 영역의 방어
    조치를 출력하라.
  hint: 각 영역별 필수 보안 조치를 정의하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 전체 CPS 방어 아키텍처를 Python으로 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "defenses={''Network'':[''IT/OT segmentation'',''CPS-aware
    IDS''],''Drone'':[''MAVLink signing'',''Encrypted channel''],''ICS'':[''Modbus
    auth → OPC-UA'',''PLC integrity''],''Robot'':[''DDS Security'',''Secure boot''],''Vehicle'':[''SecOC'',''CAN
    gateway IDS''],''AI'':[''Adversarial training'',''Input validation'']};print(''===
    CPS Defense Architecture ==='');[(print(f''  [{k}]''),[print(f''    - {d}'') for
    d in ds]) for k,ds in defenses.items()];print(f''  Total controls: {sum(len(v)
    for v in defenses.values())}'')"'
  answer_detail: 다계층 방어 아키텍처로 전체 CPS를 보호합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "defenses={''Network'':[''IT/OT segmentation'',''CPS-aware IDS''],''Drone'':[''MAVLink
    signing'',''Encrypted channel''],''ICS'':[''Modbus auth → OPC-UA'',''PLC integrity''],''Robot'':[''DDS
    Security'',''Secure boot''],''Vehicle'':[''SecOC'',''CAN gateway IDS''],''AI'':[''Adversarial
