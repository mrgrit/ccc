  hint: CPS security assessment executive summary를 요청하세요.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: LLM에게 CPS 보안 종합 평가 요약문(Executive Summary)을 작성하도록 요청하시오\
    \ 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/chat\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\"\
    :\"You are a CPS security consultant writing an executive summary.\"},{\"role\"\
    :\"user\",\"content\":\"Write a 5-sentence executive summary for a CPS security\
    \ assessment that found critical vulnerabilities in drone control, ICS SCADA,\
    \ robot systems, and autonomous vehicles. Include overall risk rating and top\
    \ 3 recommendations.\"}],\"stream\":false,\"options\":{\"num_predict\":250}}'\
    \ \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 경영진 요약문은 보안 투자 결정의 핵심 문서입니다.
  verify:
    type: output_contains
    expect: ''
