lab_id: autonomous-systems-ai-week05
title: '[Non-AI] GPS 보안'
version: ai
course: autonomous-systems-ai
week: 5
description: GPS 스푸핑/재밍 공격을 시뮬레이션하고 안티스푸핑 탐지를 구현합니다
difficulty: medium
duration_minutes: 120
objectives:
- GPS 스푸핑 공격을 시뮬레이션한다
- GPS 스푸핑 탐지 알고리즘을 구현한다
- GPS+INS 센서 퓨전을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 가상 GPS 수신기를 구현하고, 정상 GPS 데이터(위도, 경도, 위성 수, SNR)를 생성하시오.
  hint: random.gauss로 GPS 노이즈를 시뮬레이션하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: Python으로 가상 GPS 수신기를 구현하고, 정상 GPS 데이터(위도, 경도, 위성 수, SNR)를 생성하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import random;random.seed(42);print(''=== GPS Receiver Simulation ==='');[print(f''  Fix
    {i}: Lat={37.5665+random.gauss(0,0.00003):.6f} Lon={126.978+random.gauss(0,0.00003):.6f} Sats=8 SNR={45+random.gauss(0,2):.1f}'')
    for i in range(5)]"'
  answer_detail: GPS 정상 데이터의 특성을 이해합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 가상 GPS 수신기 구현 — 정상 GPS 데이터(위도/경도/위성 수/SNR) 생성
      success_criteria:
      - python 으로 위도·경도·위성 수·SNR 출력
      - 최소 위성 4개 이상 시뮬
      - NMEA 또는 RMC 형식 언급
      acceptable_methods:
      - python random/dict 기반 시뮬
      - pynmea2 라이브러리
      - gpsd 가상 장치
      - dataclass 로 구조화
      negative_signs:
      - 필드 2개 이하
      - 위성 수 누락
      - 형식 언급 없음
  target_vm: attacker
  script: 'python3 -c "import random;random.seed(42);print(''=== GPS Receiver Simulation ==='');[print(f''  Fix
    {i}: Lat={37.5665+random.gauss(0,0.00003):.6f} Lon={126.978+random.gauss(0,0.00003):.6f} Sats=8 SNR={45+random.gauss(0,2):.1f}'')
    for i in range(5)]"'
  risk_level: low
  bastion_prompt: Python으로 가상 GPS 수신기를 구현하고, 정상 GPS 데이터(위도, 경도, 위성 수, SNR)를 생성하시오.
- order: 2
  instruction: Python으로 GPS 스푸핑 공격을 시뮬레이션하시오. 서울시청 위치를 인천공항으로 점진적으로 이동시키는 공격을 구현하라.
  hint: 5단계로 위치를 점진적으로 변경하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: Python으로 GPS 스푸핑 공격을 시뮬레이션하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "start=(37.5665,126.978);end=(37.446,126.453);steps=5;print(''=== GPS Spoofing
    (Gradual) ==='');[print(f''  Step {i}: Lat={start[0]+(end[0]-start[0])*i/steps:.4f} Lon={start[1]+(end[1]-start[1])*i/steps:.4f}
    Drift={((start[0]+(end[0]-start[0])*i/steps-start[0])**2+(start[1]+(end[1]-start[1])*i/steps-start[1])**2)**0.5*111000:.0f}m'')
    for i in range(steps+1)];print(''  [!] Position shifted ~40km to Incheon Airport'')"'
  answer_detail: 점진적 GPS 스푸핑은 탐지가 어려운 고급 공격입니다.
