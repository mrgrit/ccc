  instruction: GPS 스푸핑 탐지 알고리즘을 구현하시오. 속도 이상, SNR 이상, 위치 점프 3가지 탐지 규칙을 적용하라.
  hint: 이전 위치와 비교하여 물리적으로 불가능한 이동을 탐지하세요.
