    Spoofing''),(''Weak Geofence'',''HIGH'',''GPS Spoof Bypass''),(''No Encryption'',''HIGH'',''Traffic
    Sniffing'')];print(''=== Drone Vulnerability Assessment ==='');[print(f''  [{s}]
