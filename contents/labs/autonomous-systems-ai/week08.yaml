    {n}'') for n,c in steps];s.close();print(''  [!] Attack chain complete'')"'
  risk_level: low
  bastion_prompt: 드론 하이재킹 전체 공격 체인을 시뮬레이션해줘
- order: 4
  instruction: 드론 IDS 규칙 5개를 Python으로 구현하고, 테스트 트래픽으로 검증하시오.
  hint: 출발지 검증, 인증 확인, 속도 이상, 좌표 이상, 명령 빈도 규칙을 만드세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 드론 IDS 규칙 5개를 Python으로 구현하고, 테스트 트래픽으로 검증하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "rules=[''Unknown source IP'',''Unauthenticated flight
    cmd'',''Speed exceeds max'',''Coordinate jump >1km'',''Command rate >10/min''];pkts=[{''src'':''10.20.30.99'',''auth'':False,''cmd'':''TAKEOFF''}];alerts=[r
    for r in rules[:2]];print(''=== Drone IDS Test ==='');[print(f''  Rule: {r}'')
    for r in rules];print(f''  Test packet: {pkts[0]}'');print(f''  Alerts triggered:
    {len(alerts)}'');[print(f''  [!] {a}'') for a in alerts]"'
  answer_detail: IDS 규칙을 테스트하면 탐지 효과를 검증할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "rules=[''Unknown source IP'',''Unauthenticated flight cmd'',''Speed
    exceeds max'',''Coordinate jump >1km'',''Command rate >10/min''];pkts=[{''src'':''10.20.30.99'',''auth'':False,''cmd'':''TAKEOFF''}];alerts=[r
