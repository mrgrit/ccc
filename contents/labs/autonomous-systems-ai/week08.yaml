lab_id: autonomous-systems-ai-week08
title: '[Non-AI] 중간 평가'
version: ai
course: autonomous-systems-ai
week: 8
description: 드론/자율주행 보안 종합 실습 및 중간 평가를 수행합니다
difficulty: hard
duration_minutes: 120
objectives:
- Week 01-07 핵심 개념을 종합 실습한다
- 드론 침투+방어 시나리오를 수행한다
- 자율주행 보안 평가를 실시한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 실습 네트워크에서 CPS 자산을 스캔하고, 드론(9999), ICS(502), LLM(11434) 서비스를 식별하시오.
  hint: nmap으로 주요 CPS 포트를 스캔하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: 실습 네트워크에서 CPS 자산을 스캔하고, 드론(9999), ICS(502), LLM(11434) 서비스를 식별해줘

    📎 참고 (CLI): nmap -sV -p 22,80,443,502,9999,11434 10.20.30.200'
  answer_detail: CPS 환경의 자산 식별은 보안 평가의 첫 단계입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: CPS 자산 스캔 — nmap -sV -p 22,502,9999,11434 10.20.30.0/24 로 드론(9999)·Modbus
        ICS(502)·LLM(11434) 서비스 식별. CPS (Cyber-Physical System) 중간 평가 첫 단계 자산 식별
      success_criteria:
      - nmap 스캔 실행
      - 드론/ICS/LLM 3 서비스 식별
      - CPS 자산 매핑
      acceptable_methods:
      - nmap -sV -p 지정 포트
      - masscan
      - fping + nc
      negative_signs:
      - 특정 포트 없이
      - 서비스 탐지 없음
  target_vm: attacker
  script: nmap -sV -p 22,80,443,502,9999,11434 10.20.30.200
  risk_level: low
  bastion_prompt: '실습 네트워크에서 CPS 자산을 스캔하고, 드론(9999), ICS(502), LLM(11434) 서비스를 식별해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
