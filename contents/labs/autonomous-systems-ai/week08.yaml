- order: 5
  instruction: 자율주행 보안 위험 매트릭스를 Python으로 생성하시오. 5가지 시나리오의 발생 가능성 x 영향도로 위험 점수를 계산하라.
  hint: likelihood와 impact를 곱하여 risk score를 계산하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 자율주행 보안 위험 매트릭스를 Python으로 생성하시오. 5가지 시나리오의 발생 가능성 x 영향도로 위험 점수를
    계산해줘

    📎 참고 (CLI): python3 -c "scenarios=[(''Adversarial Patch'',0.6,0.95),(''CAN Injection'',0.4,1.0),(''GPS
    Spoofing'',0.5,0.7),(''OTA Tampering'',0.2,1.0),(''LiDAR Spoofing'',0.3,0.8)];print(''===
    AV Risk Matrix ==='');[print(f''  {s[0]:20} L={s[1]:.1f} I={s[2]:.1f} Risk={s[1]*s[2]:.2f}
    {\"CRIT\" if s[1]*s[2]>0.5 else \"HIGH\" if s[1]*s[2]>0.3 else \"MED\"}'') for
    s in scenarios]"'
  answer_detail: 위험 매트릭스는 보안 대응 우선순위를 결정합니다.
  verify:
