  instruction: 드론 IDS 규칙 5개를 Python으로 구현하고, 테스트 트래픽으로 검증하시오.
  hint: 출발지 검증, 인증 확인, 속도 이상, 좌표 이상, 명령 빈도 규칙을 만드세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 드론 IDS 규칙 5개를 Python으로 구현하고, 테스트 트래픽으로 검증하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "rules=[''Unknown source IP'',''Unauthenticated flight
    cmd'',''Speed exceeds max'',''Coordinate jump >1km'',''Command rate >10/min''];pkts=[{''src'':''10.20.30.99'',''auth'':False,''cmd'':''TAKEOFF''}];alerts=[r
