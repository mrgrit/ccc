    📎 참고 (CLI): python3 -c "data=[(37.5666,37.5666,44),(37.59,37.5667,56)];print(''===
    GPS Defense System ==='');[print(f''  GPS:{g:.4f} INS:{i:.4f} SNR:{s} → {\"GPS_OK\"
    if s<52 else \"SPOOFED→INS\"}'') for g,i,s in data];print(''  [OK] Auto-switched
    to INS on spoofing detection'')"'
  answer_detail: 통합 방어 시스템으로 GPS 스푸핑을 효과적으로 완화합니다.
