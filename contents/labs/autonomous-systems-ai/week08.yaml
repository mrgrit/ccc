  hint: 드론 통신, 인증, GPS, 지오펜싱, 펌웨어 취약점을 포함하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 드론 보안 취약점 5가지를 Python으로 정리하고 각 취약점의 심각도와 공격 방법을 출력해줘

    📎 참고 (CLI): python3 -c "vulns=[(''Plaintext Auth'',''CRITICAL'',''Sniff+Reuse''),(''No
