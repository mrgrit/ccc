lab_id: autonomous-systems-ai-week08
title: '[Non-AI] 중간 평가'
version: ai
course: autonomous-systems-ai
week: 8
description: 드론/자율주행 보안 종합 실습 및 중간 평가를 수행합니다
difficulty: hard
duration_minutes: 120
objectives:
- Week 01-07 핵심 개념을 종합 실습한다
- 드론 침투+방어 시나리오를 수행한다
- 자율주행 보안 평가를 실시한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 실습 네트워크에서 CPS 자산을 스캔하고, 드론(9999), ICS(502), LLM(11434) 서비스를 식별하시오.
  hint: nmap으로 주요 CPS 포트를 스캔하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: 실습 네트워크에서 CPS 자산을 스캔하고, 드론(9999), ICS(502), LLM(11434) 서비스를 식별해줘

    📎 참고 (CLI): nmap -sV -p 22,80,443,502,9999,11434 10.20.30.200'
  answer_detail: CPS 환경의 자산 식별은 보안 평가의 첫 단계입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: attacker
  script: nmap -sV -p 22,80,443,502,9999,11434 10.20.30.200
  risk_level: low
  bastion_prompt: 실습 네트워크에서 CPS 자산을 스캔하고, 드론(9999), ICS(502), LLM(11434) 서비스를 식별해줘
- order: 2
  instruction: 드론 보안 취약점 5가지를 Python으로 정리하고 각 취약점의 심각도와 공격 방법을 출력하시오.
  hint: 드론 통신, 인증, GPS, 지오펜싱, 펌웨어 취약점을 포함하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 드론 보안 취약점 5가지를 Python으로 정리하고 각 취약점의 심각도와 공격 방법을 출력해줘

    📎 참고 (CLI): python3 -c "vulns=[(''Plaintext Auth'',''CRITICAL'',''Sniff+Reuse''),(''No
    MAVLink Signing'',''CRITICAL'',''Command Injection''),(''GPS L1 Only'',''HIGH'',''GPS
    Spoofing''),(''Weak Geofence'',''HIGH'',''GPS Spoof Bypass''),(''No Encryption'',''HIGH'',''Traffic
    Sniffing'')];print(''=== Drone Vulnerability Assessment ==='');[print(f''  [{s}]
    {v} — Attack: {a}'') for v,s,a in vulns]"'
  answer_detail: 드론 취약점의 체계적 정리는 보안 개선 우선순위 설정에 필수입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "vulns=[(''Plaintext Auth'',''CRITICAL'',''Sniff+Reuse''),(''No
