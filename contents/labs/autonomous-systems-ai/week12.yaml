lab_id: autonomous-systems-ai-week12
title: '[Non-AI] V2X/자동차 보안'
version: ai
course: autonomous-systems-ai
week: 12
description: CAN 버스 분석, ECU 통신 시뮬레이션, V2X/커넥티드카 보안을 실습합니다
difficulty: hard
duration_minutes: 120
objectives:
- CAN 버스 메시지를 분석한다
- CAN 인젝션 공격을 수행한다
- 커넥티드카 공격 표면을 매핑한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 가상 CAN 버스 트래픽을 생성하시오. 엔진(0x100), 브레이크(0x200), 조향(0x300), ADAS(0x500) ECU 메시지를
    구현하라.
  hint: struct.pack으로 각 ECU의 CAN 데이터를 구성하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 가상 CAN 버스 트래픽을 생성하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import struct;ecus=[(0x100,struct.pack(''>HH'',6000,2500)+b''\x00''*4,''Engine:60km/h,2500rpm''),(0x200,b''\x1e''+b''\x00''*7,''Brake:30%''),(0x300,struct.pack(''>h'',50)+b''\x00''*6,''Steer:5.0deg''),(0x500,b''\x01\x00\x64''+b''\x00''*5,''ADAS:active'')];print(''===
    Virtual CAN Bus ==='');[print(f''  ID:0x{e[0]:03X} Data:{e[1].hex()} | {e[2]}'') for e in ecus]"'
  answer_detail: CAN 프레임 구조와 ECU 통신을 이해합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 'CAN 버스 트래픽 생성 — struct.pack >HH + bytes 로 CAN ID 별 페이로드: 0x100 Engine(RPM+Speed) · 0x200
        Brake(pressure) · 0x300 Steering(angle) · 0x400 ADAS. 4 ECU 메시지 시뮬. SAE J1939 스타일'
      success_criteria:
      - 4 CAN ID 별 메시지
      - struct.pack 데이터 구조화
      acceptable_methods:
      - python struct + bytes
      - python-can 라이브러리
      - candump/cansend
      negative_signs:
      - CAN ID 2개 이하
      - struct 없이 단순 문자열
  target_vm: attacker
  script: python3 -c "import struct;ecus=[(0x100,struct.pack('>HH',6000,2500)+b'\x00'*4,'Engine:60km/h,2500rpm'),(0x200,b'\x1e'+b'\x00'*7,'Brake:30%'),(0x300,struct.pack('>h',50)+b'\x00'*6,'Steer:5.0deg'),(0x500,b'\x01\x00\x64'+b'\x00'*5,'ADAS:active')];print('===
    Virtual CAN Bus ===');[print(f'  ID:0x{e[0]:03X} Data:{e[1].hex()} | {e[2]}') for e in ecus]"
  risk_level: low
  bastion_prompt: Python으로 가상 CAN 버스 트래픽을 생성하시오. 엔진(0x100), 브레이크(0x200), 조향(0x300), ADAS(0x500) ECU 메시지를
    구현하라.
- order: 2
  instruction: CAN 메시지 디코더를 구현하시오. 엔진 속도/RPM, 브레이크 압력, 조향 각도를 디코딩하라.
  hint: struct.unpack으로 바이너리 데이터를 디코딩하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: CAN 메시지 디코더를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import struct;frames=[(0x100,bytes.fromhex(''176400000CE40000'')),(0x200,bytes.fromhex(''1E00000000000000'')),(0x300,bytes.fromhex(''0032000000000000''))];print(''===
    CAN Decoder ==='');print(f''  0x100: Speed={struct.unpack(\">H\",frames[0][1][:2])[0]/100}km/h RPM={struct.unpack(\">H\",frames[0][1][2:4])[0]}'');print(f''  0x200:
    Brake={frames[1][1][0]}%'');print(f''  0x300: Steer={struct.unpack(\">h\",frames[2][1][:2])[0]/10}deg'')"'
  answer_detail: CAN 메시지 디코딩은 차량 상태 파악과 공격 설계의 기초입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: CAN 메시지 디코더 — struct.unpack >HH 로 Engine 속도/RPM 디코딩 + Brake 압력(0-100%) + 조향 각도(-540~+540°)
        디코딩. DBC 파일 없이 manual decoder. reverse engineering 기초
      success_criteria:
      - unpack 디코딩 3+ 메시지
      - 각 ECU 단위 변환 (km/h, psi, °)
      acceptable_methods:
      - struct.unpack
      - cantools DBC 파싱
      - SavvyCAN GUI
      negative_signs:
      - 디코딩 없이 raw bytes
      - 단위 변환 없음
  target_vm: attacker
  script: 'python3 -c "import struct;frames=[(0x100,bytes.fromhex(''176400000CE40000'')),(0x200,bytes.fromhex(''1E00000000000000'')),(0x300,bytes.fromhex(''0032000000000000''))];print(''===
    CAN Decoder ==='');print(f''  0x100: Speed={struct.unpack(\">H\",frames[0][1][:2])[0]/100}km/h RPM={struct.unpack(\">H\",frames[0][1][2:4])[0]}'');print(f''  0x200:
    Brake={frames[1][1][0]}%'');print(f''  0x300: Steer={struct.unpack(\">h\",frames[2][1][:2])[0]/10}deg'')"'
  risk_level: low
  bastion_prompt: CAN 메시지 디코더를 구현하시오. 엔진 속도/RPM, 브레이크 압력, 조향 각도를 디코딩하라.
- order: 3
  instruction: CAN 인젝션 공격(조향+브레이크)을 시뮬레이션하시오.
  hint: 조향 45도와 브레이크 0을 인젝션하세요.
