  points: 12
  answer: '🤖 프롬프트: CAN IDS를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "known={0x100,0x200,0x300,0x400,0x500};alerts=[];traffic=[(0x100,60),(0x000,0),(0x300,450),(0x200,0)];print(''===
    CAN IDS ==='');[((alerts.append(f''Unknown:0x{aid:03X}'') if aid not in known else None),(alerts.append(f''Steer:{val/10}deg'')
    if aid==0x300 and abs(val)>300 else None),(alerts.append(''Brake zero'') if aid==0x200 and val==0
    else None)) for aid,val in traffic];[print(f''  [!] {a}'') for a in alerts];print(f''  Total alerts:
    {len(alerts)}'')"'
  answer_detail: CAN IDS는 인젝션과 이상 트래픽을 실시간 탐지합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
