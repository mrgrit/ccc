  instruction: 드론 하이재킹 시나리오 전체를 시뮬레이션하시오. 정찰→Deauth→연결→인증→제어의 5단계를 출력하라.
  hint: 각 단계를 순서대로 출력하는 스크립트를 작성하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: 드론 하이재킹 시나리오 전체를 시뮬레이션해줘

    📎 참고 (CLI): python3 -c "steps=[(''RECON'',''Drone found at 10.20.30.200:9999''),(''DEAUTH'',''Legitimate
    controller disconnected''),(''CONNECT'',''Connected to drone WiFi AP''),(''AUTH'',''Authenticated
    with sniffed key''),(''CONTROL'',''ARM+TAKEOFF+GOTO executed'')];print(''=== Hijacking Simulation
    ==='');[print(f''  Phase {i+1} [{s[0]}]: {s[1]}'') for i,s in enumerate(steps)];print(''  [!] Drone
    fully compromised'')"'
  answer_detail: 전체 하이재킹 시나리오를 이해하면 방어 지점을 파악할 수 있습니다.
