  hint: MAVLink v2 signing을 질문하세요.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: MAVLink v2 메시지 서명 동작 원리와 command injection 방어 방법을 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\"\
    :[{\"role\":\"system\",\"content\":\"You are a drone security engineer.\"},{\"role\":\"user\",\"content\"\
    :\"MAVLink v2 메시지 서명 동작 원리와 command injection 방어 방법을 설명해줘\"}],\"stream\":false,\"options\":{\"num_predict\"\
    :150}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: MAVLink v2 서명은 명령 인젝션 방어의 핵심입니다.
  verify:
