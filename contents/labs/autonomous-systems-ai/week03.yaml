- order: 7
  instruction: Python으로 HMAC 기반 명령 서명 검증 시스템을 구현하시오. 서명된 명령과 위조된 명령을 구분하라.
  hint: hmac 모듈로 메시지 서명을 생성하고 검증하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 HMAC 기반 명령 서명 검증 시스템을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import hmac,hashlib,json;key=b''drone_secret'';cmd=json.dumps({''action'':''ARM''});sig=hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16];fake_sig=''0000000000000000'';print(''===
    Command Signing ==='');print(f''  Valid sig: {sig}'');print(f''  Verify valid: {hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16]==sig}'');print(f''  Verify
    fake:  {fake_sig==sig}'');print(''  [OK] Signing prevents command forgery'')"'
  answer_detail: HMAC 서명으로 명령 무결성을 보장할 수 있습니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: HMAC 기반 명령 서명 검증 시스템 구현 — 서명된 명령과 위조된 명령을 구분
      success_criteria:
      - python hmac.new 로 서명 생성·검증 함수
      - 유효/위조 케이스 각각 결과 출력
      - 비밀키 관리 언급
      acceptable_methods:
      - python hmac + hashlib
      - pymavlink signing API
      - cryptography.hazmat HMAC
      - JWT HS256 유사 구조
      negative_signs:
      - 서명 함수 없이 개념만
      - 유효/위조 구분 없음
      - 키 관리 누락
  target_vm: attacker
  script: 'python3 -c "import hmac,hashlib,json;key=b''drone_secret'';cmd=json.dumps({''action'':''ARM''});sig=hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16];fake_sig=''0000000000000000'';print(''===
    Command Signing ==='');print(f''  Valid sig: {sig}'');print(f''  Verify valid: {hmac.new(key,cmd.encode(),hashlib.sha256).hexdigest()[:16]==sig}'');print(f''  Verify
    fake:  {fake_sig==sig}'');print(''  [OK] Signing prevents command forgery'')"'
  risk_level: low
  bastion_prompt: Python으로 HMAC 기반 명령 서명 검증 시스템을 구현하시오. 서명된 명령과 위조된 명령을 구분하라.
- order: 8
  instruction: 드론 통신 보안 취약점 보고서를 Python으로 생성하시오. 발견된 취약점, 심각도, 대응 방안을 포함하라.
  hint: 취약점을 딕셔너리 리스트로 정의하고 보고서 형태로 출력하세요.
