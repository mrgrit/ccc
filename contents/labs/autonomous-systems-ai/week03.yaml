    command...'');print(f''  [!] No sequence number validation = replay possible'')"'
  risk_level: low
  bastion_prompt: MAVLink 리플레이 공격을 시뮬레이션하시오. 캡처된 TAKEOFF 명령을 재전송하는 코드를 작성하라.
