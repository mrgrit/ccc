      - 재전송 시도 없음
      - 방어 권고 없음
      - 시퀀스 번호 개념 누락
  target_vm: attacker
  script: 'python3 -c "import json;captured={''action'':''TAKEOFF'',''altitude'':50};print(''=== Replay
