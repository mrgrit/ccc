lab_id: autonomous-systems-ai-week09
title: '[Non-AI] 로봇 보안'
version: ai
course: autonomous-systems-ai
week: 9
description: ROS2 로봇 아키텍처, 시리얼 통신, 펌웨어 분석을 실습합니다
difficulty: medium
duration_minutes: 120
objectives:
- ROS2 통신 구조를 이해한다
- 시리얼 통신 취약점을 분석한다
- 로봇 펌웨어 보안을 평가한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 ROS2 토픽 기반 통신 시뮬레이터를 구현하시오. /scan, /cmd_vel, /odom 토픽에 메시지를
    발행하라.
  hint: 딕셔너리로 토픽-메시지 매핑을 만드세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 ROS2 토픽 기반 통신 시뮬레이터를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "topics={''/scan'':{''ranges'':[1.5,2.0,3.1]},'' /cmd_vel'':{''linear'':{''x'':0.5},''angular'':{''z'':0.1}},''
    /odom'':{''x'':3.14,''y'':1.59}};import json;print(''=== ROS2 Topic Simulation
    ==='');[print(f''  {t}: {json.dumps(m)}'') for t,m in topics.items()]"'
  answer_detail: ROS2 토픽 통신 구조를 이해합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "topics={''/scan'':{''ranges'':[1.5,2.0,3.1]},'' /cmd_vel'':{''linear'':{''x'':0.5},''angular'':{''z'':0.1}},''
    /odom'':{''x'':3.14,''y'':1.59}};import json;print(''=== ROS2 Topic Simulation
    ==='');[print(f''  {t}: {json.dumps(m)}'') for t,m in topics.items()]"'
  risk_level: low
  bastion_prompt: Python으로 ROS2 토픽 기반 통신 시뮬레이터를 구현 방법을 설명하고 예시 코드를 보여줘
- order: 2
  instruction: LLM에게 ROS2 DDS 프로토콜의 보안 취약점을 질의하시오.
  hint: ROS2 DDS security vulnerabilities를 질문하세요.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: What are the top 5 security vulnerabilities in ROS2 DDS\
    \ communication?\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/chat\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\"\
    :\"You are a robot security researcher.\"},{\"role\":\"user\",\"content\":\"What\
    \ are the top 5 security vulnerabilities in ROS2 DDS communication?\"}],\"stream\"\
    :false,\"options\":{\"num_predict\":200}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: ROS2 DDS의 보안 취약점을 체계적으로 파악합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a robot\
    \ security researcher.\"},{\"role\":\"user\",\"content\":\"What are the top 5\
    \ security vulnerabilities in ROS2 DDS communication?\"}],\"stream\":false,\"\
    options\":{\"num_predict\":200}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  risk_level: low
  bastion_prompt: What are the top 5 security vulnerabilities in ROS2 DDS communication?
- order: 3
  instruction: Python으로 DDS Discovery 시뮬레이션을 수행하시오. 네트워크에서 ROS2 노드와 토픽을 발견하는 과정을 출력하라.
  hint: SPDP/SEDP 과정을 시뮬레이션하세요.
  category: recon
  points: 12
  answer: '🤖 프롬프트: Python으로 DDS Discovery 시뮬레이션을 수행해줘

    📎 참고 (CLI): python3 -c "nodes=[(''lidar_driver'',['' /scan'']),(''nav_controller'',[''/cmd_vel'',''/odom'']),(''camera_node'',[''/camera/image'']),(''arm_ctrl'',[''/joint_states''])];print(''===
    DDS Discovery ==='');[print(f''  Node: {n[0]} Topics: {n[1]}'') for n in nodes];print(''  [!]
    All nodes/topics discoverable without auth'')"'
  answer_detail: DDS Discovery 과정은 공격자에게 전체 로봇 토폴로지를 노출합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "nodes=[(''lidar_driver'',['' /scan'']),(''nav_controller'',[''/cmd_vel'',''/odom'']),(''camera_node'',[''/camera/image'']),(''arm_ctrl'',[''/joint_states''])];print(''===
    DDS Discovery ==='');[print(f''  Node: {n[0]} Topics: {n[1]}'') for n in nodes];print(''  [!]
    All nodes/topics discoverable without auth'')"'
  risk_level: low
  bastion_prompt: Python으로 DDS Discovery 시뮬레이션을 수행해줘
- order: 4
  instruction: Python으로 UART 부트로그 분석 시뮬레이터를 작성하시오. 부트 과정에서 노출되는 보안 정보를 식별하라.
  hint: 부팅 로그에서 버전, 비밀번호, IP 등 민감 정보를 찾으세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: Python으로 UART 부트로그 분석 시뮬레이터를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "logs=[''U-Boot 2024.01'',''DRAM: 2GiB'',''Linux 5.15.0-robot'',''Firmware
    v2.3.1'',''WiFi: 192.168.1.100'',''Default pwd: robot123'',''ROS2 starting''];print(''===
    UART Boot Log Analysis ==='');[print(f''  {\"[VULN]\" if any(k in l.lower() for
    k in [\"pwd\",\"password\",\"key\"]) else \"[INFO]\" if any(k in l.lower() for
    k in [\"version\",\"firmware\"]) else \"[LOG] \"} {l}'') for l in logs]"'
  answer_detail: UART 디버그 포트는 민감 정보 유출의 주요 경로입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: 'python3 -c "logs=[''U-Boot 2024.01'',''DRAM: 2GiB'',''Linux 5.15.0-robot'',''Firmware
    v2.3.1'',''WiFi: 192.168.1.100'',''Default pwd: robot123'',''ROS2 starting''];print(''===
    UART Boot Log Analysis ==='');[print(f''  {\"[VULN]\" if any(k in l.lower() for
    k in [\"pwd\",\"password\",\"key\"]) else \"[INFO]\" if any(k in l.lower() for
    k in [\"version\",\"firmware\"]) else \"[LOG] \"} {l}'') for l in logs]"'
  risk_level: low
  bastion_prompt: Python으로 UART 부트로그 분석 시뮬레이터를 구현 방법을 설명하고 예시 코드를 보여줘
- order: 5
  instruction: Python으로 펌웨어 분석 시뮬레이터를 구현하시오. 펌웨어 섹션(부트로더, 커널, rootfs)을 분석하고 보안 문제를
    식별하라.
  hint: 각 섹션의 암호화 상태와 민감 문자열을 확인하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Python으로 펌웨어 분석 시뮬레이터를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "sections=[(''bootloader'',0x0,0x10000,False),(''kernel'',0x10000,0x400000,False),(''rootfs'',0x410000,0xA00000,False),(''config'',0xE10000,0x100000,True)];strings=[''robot123'',''API_KEY=sk-robot'',''ssh_host_rsa_key''];print(''===
    Firmware Analysis ==='');[print(f''  {s[0]:12} off=0x{s[1]:06X} size=0x{s[2]:06X}
    enc={s[3]}'') for s in sections];print(''  Sensitive strings:'');[print(f''  [!]
    {s}'') for s in strings]"'
  answer_detail: 펌웨어 분석으로 하드코딩된 자격 증명과 키를 발견합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: attacker
  script: python3 -c "sections=[('bootloader',0x0,0x10000,False),('kernel',0x10000,0x400000,False),('rootfs',0x410000,0xA00000,False),('config',0xE10000,0x100000,True)];strings=['robot123','API_KEY=sk-robot','ssh_host_rsa_key'];print('===
    Firmware Analysis ===');[print(f'  {s[0]:12} off=0x{s[1]:06X} size=0x{s[2]:06X}
