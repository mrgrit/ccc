- order: 8
  instruction: 로봇 보안 평가 보고서를 Python으로 생성하시오. 8가지 보안 항목을 평가하고 전체 점수를 계산하라.
  hint: 각 보안 항목의 상태를 평가하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 로봇 보안 평가 보고서를 Python으로 생성하시오. 8가지 보안 항목을 평가하고 전체 점수를 계산해줘

    📎 참고 (CLI): python3 -c "items=[(''DDS Security'',False),(''UART Disabled'',False),(''Secure
    Boot'',False),(''Encrypted Firmware'',False),(''No Default Creds'',False),(''Topic
    ACL'',False),(''Network Segmentation'',True),(''Logging'',True)];score=sum(v for
    _,v in items)/len(items)*100;print(''=== Robot Security Report ==='');[print(f''  [{\"OK\"
    if v else \"!!\"} ] {k}'') for k,v in items];print(f''  Score: {score:.0f}%'')"'
  answer_detail: 보안 보고서로 로봇 시스템의 취약점을 정리합니다.
