  hint: 토픽별 암호화/서명 정책과 노드별 권한을 정의하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Python으로 ROS2 보안 설정(DDS Security) 구성을 시뮬레이션해줘

    📎 참고 (CLI): python3 -c "gov={''auth_required'':True,''discovery_protection'':True,''topics'':{''/cmd_vel'':''ENCRYPT'',''/scan'':''SIGN'',''/emergency_stop'':''ENCRYPT''}};perms={''nav_ctrl'':[''pub:/cmd_vel'',''sub:/scan''],''lidar'':[''pub:/scan'']};print(''===
