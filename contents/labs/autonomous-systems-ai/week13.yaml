      - torch transforms
      - MagNet / Defense-GAN
      negative_signs:
      - 변환 없이 단일 예측
      - 임계치 없음
  target_vm: attacker
  script: 'python3 -c "import math;x_adv=[1.2,-0.1,1.0,0.7,0.0];x_squeezed=[round(x,1)
    for x in x_adv];x_normal=[0.9,0.2,0.7,0.5,0.3];n_squeezed=[round(x,1) for x in
