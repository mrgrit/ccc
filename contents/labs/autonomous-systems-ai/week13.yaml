description: 적대적 입력 생성, AI 로버스트니스 평가, 방어 기법을 실습합니다
difficulty: hard
duration_minutes: 120
objectives:
- FGSM/PGD 공격을 시뮬레이션한다
- 방어 기법을 구현하고 평가한다
- CPS AI 보안 체크리스트를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 FGSM 공격을 수치 시뮬레이션하시오. 5개 특징 벡터에 epsilon 0.1~0.5 섭동을 적용하여 분류
    결과 변화를 관찰하라.
  hint: 간소화된 선형 분류기에 sign gradient 방향 섭동을 가하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: Python으로 FGSM 공격을 수치 시뮬레이션하시오. 5개 특징 벡터에 epsilon 0.1~0.5 섭동을 적용하여
    분류 결과 변화를 관찰해줘

    📎 참고 (CLI): python3 -c "import math;w=[0.8,-0.3,0.5,0.2,-0.4];b=-0.5;x=[0.9,0.2,0.7,0.5,0.3];p0=1/(1+math.exp(-(sum(wi*xi
    for wi,xi in zip(w,x))+b)));print(f''=== FGSM Attack ==='');print(f''  Original:
    p={p0:.3f} → STOP_SIGN'');[print(f''  eps={e}: p={1/(1+math.exp(-(sum(wi*(xi-e*(1
    if wi>0 else -1)) for wi,xi in zip(w,x))+b))):.3f} → {\"EVADED\" if 1/(1+math.exp(-(sum(wi*(xi-e*(1
    if wi>0 else -1)) for wi,xi in zip(w,x))+b)))<0.5 else \"DETECTED\"}'') for e
    in [0.1,0.2,0.3,0.5]]"'
  answer_detail: FGSM은 그래디언트 부호 방향으로 섭동을 가하는 공격입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: FGSM 5 특징 수치 시뮬 — w=[0.8,-0.3,0.5,0.2,-0.4] + x=[0.9,0.2,0.7,0.5,0.3]
        logit + sigmoid prob + epsilon 0.1/0.2/0.3/0.5 별 perturbation sign(w) 방향 →
        prob < 0.5 EVADED vs DETECTED. Goodfellow 2014 FGSM 공식
      success_criteria:
      - epsilon 3+ 값 + 각 EVADED/DETECTED
      - gradient sign 원리
      - 수치 시뮬
      acceptable_methods:
      - python + math.exp
      - numpy + sigmoid
      - torch autograd (실제)
      - cleverhans
      negative_signs:
      - epsilon 1개만
      - sign 원리 없음
  target_vm: attacker
  script: 'python3 -c "import math;w=[0.8,-0.3,0.5,0.2,-0.4];b=-0.5;x=[0.9,0.2,0.7,0.5,0.3];p0=1/(1+math.exp(-(sum(wi*xi
    for wi,xi in zip(w,x))+b)));print(f''=== FGSM Attack ==='');print(f''  Original:
    p={p0:.3f} → STOP_SIGN'');[print(f''  eps={e}: p={1/(1+math.exp(-(sum(wi*(xi-e*(1
    if wi>0 else -1)) for wi,xi in zip(w,x))+b))):.3f} → {\"EVADED\" if 1/(1+math.exp(-(sum(wi*(xi-e*(1
    if wi>0 else -1)) for wi,xi in zip(w,x))+b)))<0.5 else \"DETECTED\"}'') for e
    in [0.1,0.2,0.3,0.5]]"'
  risk_level: low
  bastion_prompt: 'Python으로 FGSM 공격을 수치 시뮬레이션하시오. 5개 특징 벡터에 epsilon 0.1~0.5 섭동을 적용하여
    분류 결과 변화를 관찰해줘


