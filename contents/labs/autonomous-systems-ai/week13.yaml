    if majority else \"NOT_STOP\"}'');print(f''  Agreement: {sum(votes)}/{len(votes)}'')"'
  risk_level: low
  bastion_prompt: 앙상블 방어를 구현하시오. 3개 모델의 투표로 적대적 입력을 탐지하라.
