  instruction: 적대적 공격 탐지 시스템을 구현하시오. 입력 변환 전후의 차이로 적대적 입력을 판별하라.
  hint: 원본과 변환된 입력의 L2 거리를 측정하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 적대적 공격 탐지 시스템을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import math;x_adv=[1.2,-0.1,1.0,0.7,0.0];x_squeezed=[round(x,1)
    for x in x_adv];x_normal=[0.9,0.2,0.7,0.5,0.3];n_squeezed=[round(x,1) for x in
    x_normal];d_adv=math.sqrt(sum((a-b)**2 for a,b in zip(x_adv,x_squeezed)));d_normal=math.sqrt(sum((a-b)**2
    for a,b in zip(x_normal,n_squeezed)));thresh=0.1;print(''=== Adversarial Detection
    ==='');print(f''  Normal input diff:  {d_normal:.4f} → {\"OK\" if d_normal<thresh
    else \"SUSPICIOUS\"}'');print(f''  Adversarial diff:   {d_adv:.4f} → {\"OK\" if
    d_adv<thresh else \"SUSPICIOUS\"}'');print(f''  Threshold: {thresh}'')"'
  answer_detail: 변환 일관성 검사로 적대적 입력을 탐지합니다.
  verify:
