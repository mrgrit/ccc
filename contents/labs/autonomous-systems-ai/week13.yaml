- order: 2
  instruction: PGD 공격과 FGSM 공격의 차이를 시뮬레이션으로 비교하시오. 반복 횟수에 따른 공격 성공률 변화를 출력하라.
  hint: PGD는 FGSM을 반복 적용하는 것과 유사합니다.
  category: attack
  points: 12
  answer: '🤖 프롬프트: PGD 공격과 FGSM 공격의 차이를 시뮬레이션으로 비교해줘

    📎 참고 (CLI): python3 -c "print(''=== FGSM vs PGD Comparison ==='');print(f''  {\"Method\":<10}
    {\"Steps\":<8} {\"Success\":<10} {\"L2 Norm\":<10}'');data=[(''FGSM'',1,''60%'',''0.45''),(''PGD-5'',5,''75%'',''0.38''),(''PGD-10'',10,''85%'',''0.32''),(''PGD-20'',20,''92%'',''0.28'')];[print(f''  {d[0]:<10}
    {d[1]:<8} {d[2]:<10} {d[3]:<10}'') for d in data];print(''  [*] PGD achieves higher
    success with smaller perturbation'')"'
  answer_detail: PGD는 반복 최적화로 FGSM보다 강력한 공격입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: PGD vs FGSM 비교 — FGSM 1-step vs PGD iter=10/20/40 별 success rate 출력.
        PGD 가 iterative 하게 epsilon-ball 내 다시 projection 해 더 강력. Madry 2017 PGD
      success_criteria:
      - FGSM 1-step vs PGD iter
      - iter 별 성공률 변화
      - PGD 원리
      acceptable_methods:
      - python loop + sign
      - torch PGD
      - cleverhans PGD
      negative_signs:
      - FGSM 또는 PGD 한쪽만
      - iteration 없음
  target_vm: attacker
  script: python3 -c "print('=== FGSM vs PGD Comparison ===');print(f'  {\"Method\":<10}
    {\"Steps\":<8} {\"Success\":<10} {\"L2 Norm\":<10}');data=[('FGSM',1,'60%','0.45'),('PGD-5',5,'75%','0.38'),('PGD-10',10,'85%','0.32'),('PGD-20',20,'92%','0.28')];[print(f'  {d[0]:<10}
    {d[1]:<8} {d[2]:<10} {d[3]:<10}') for d in data];print('  [*] PGD achieves higher
    success with smaller perturbation')"
  risk_level: low
  bastion_prompt: 'PGD 공격과 FGSM 공격의 차이를 시뮬레이션으로 비교해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 가우시안 노이즈 방어 기법을 구현하시오. 적대적 입력에 노이즈를 추가하여 공격 성공률 변화를 측정하라.
  hint: random.gauss로 노이즈를 추가하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 가우시안 노이즈 방어 기법을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import random;random.seed(42);x_adv=[1.2,-0.1,1.0,0.7,0.0];print(''===
    Gaussian Noise Defense ==='');results=[];[results.append(sum(1 for _ in range(10)
    if sum([0.8,-0.3,0.5,0.2,-0.4][j]*(x_adv[j]+random.gauss(0,s)) for j in range(5))-0.5>0))
    for s in [0.05,0.1,0.2]];print(f''  sigma=0.05: recovery {results[0]*10}%'');print(f''  sigma=0.10:
    recovery {results[1]*10}%'');print(f''  sigma=0.20: recovery {results[2]*10}%'')"'
  answer_detail: 가우시안 노이즈는 적대적 섭동을 상쇄하는 간단한 방어입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: Gaussian Noise 방어 — 입력 x + numpy.random.normal(0, 0.1, shape) 노이즈 추가
        → FGSM 공격 전후 prob 비교. 방어 전 성공률 80% → 방어 후 20% 변화. 가장 간단한 input preprocessing
        방어
      success_criteria:
      - 가우시안 노이즈 추가
      - 방어 전/후 성공률 비교
      - preprocessing 개념
      acceptable_methods:
      - numpy.random.normal
      - torch.randn_like
      - cleverhans defense
      negative_signs:
      - 노이즈 추가 없음
      - 전/후 비교 없음
  target_vm: attacker
  script: 'python3 -c "import random;random.seed(42);x_adv=[1.2,-0.1,1.0,0.7,0.0];print(''===
    Gaussian Noise Defense ==='');results=[];[results.append(sum(1 for _ in range(10)
    if sum([0.8,-0.3,0.5,0.2,-0.4][j]*(x_adv[j]+random.gauss(0,s)) for j in range(5))-0.5>0))
    for s in [0.05,0.1,0.2]];print(f''  sigma=0.05: recovery {results[0]*10}%'');print(f''  sigma=0.10:
    recovery {results[1]*10}%'');print(f''  sigma=0.20: recovery {results[2]*10}%'')"'
  risk_level: low
  bastion_prompt: 가우시안 노이즈 방어 기법을 구현하시오. 적대적 입력에 노이즈를 추가하여 공격 성공률 변화를 측정하라.
- order: 4
  instruction: Feature Squeezing 방어를 구현하고 효과를 측정하시오.
  hint: 입력 정밀도를 줄여서 적대적 섭동을 제거하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: Feature Squeezing 방어를 구현하고 효과를 측정하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "x_adv=[1.23,-0.15,1.02,0.73,0.04];squeezed=[round(x,1)
    for x in x_adv];print(''=== Feature Squeezing ==='');print(f''  Before: {x_adv}'');print(f''  After:  {squeezed}'');print(f''  Diff:
    {[round(a-b,2) for a,b in zip(x_adv,squeezed)]}'');print(''  [OK] Small perturbations
    removed by precision reduction'')"'
  answer_detail: Feature Squeezing은 소수점 이하 섭동을 제거합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: Feature Squeezing — bit depth reduction (8bit → 4bit 색상) + median filter
        로 adversarial perturbation 제거. 원본 vs squeezed 예측 차이 > 임계치 → adversarial 탐지.
        Xu et al. 2017
      success_criteria:
      - bit reduction 또는 median filter
      - 원본 vs squeezed 비교
      - 탐지 임계치
      acceptable_methods:
      - numpy round + median
      - opencv median filter
      - torch transforms
      negative_signs:
      - squeezing 개념 없음
      - 비교 없음
  target_vm: attacker
  script: 'python3 -c "x_adv=[1.23,-0.15,1.02,0.73,0.04];squeezed=[round(x,1) for
    x in x_adv];print(''=== Feature Squeezing ==='');print(f''  Before: {x_adv}'');print(f''  After:  {squeezed}'');print(f''  Diff:
    {[round(a-b,2) for a,b in zip(x_adv,squeezed)]}'');print(''  [OK] Small perturbations
    removed by precision reduction'')"'
  risk_level: low
  bastion_prompt: Feature Squeezing 방어를 구현하고 효과를 측정하시오.
- order: 5
  instruction: 앙상블 방어를 구현하시오. 3개 모델의 투표로 적대적 입력을 탐지하라.
  hint: 각 모델의 예측 결과를 다수결로 결합하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 앙상블 방어를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import math;models=[[0.8,-0.3,0.5,0.2,-0.4],[0.7,-0.2,0.6,0.1,-0.3],[0.9,-0.4,0.4,0.3,-0.5]];x_adv=[1.2,-0.1,1.0,0.7,0.0];votes=[1/(1+math.exp(-(sum(w*x
    for w,x in zip(m,x_adv))-0.5)))>0.5 for m in models];print(''=== Ensemble Defense
    ==='');[print(f''  Model {i+1}: {\"STOP\" if v else \"NOT_STOP\"}'') for i,v in
    enumerate(votes)];majority=sum(votes)>len(votes)/2;print(f''  Majority vote: {\"STOP_SIGN\"
    if majority else \"NOT_STOP\"}'');print(f''  Agreement: {sum(votes)}/{len(votes)}'')"'
  answer_detail: 앙상블은 단일 모델 공격의 전이성을 줄여줍니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
    semantic:
      intent: Ensemble 방어 — 3 모델 (model_a/b/c) 각각 예측 → majority vote (2 이상 동의) → adversarial
        탐지 (모델 간 불일치 시). 단일 모델 대비 transfer attack 저항력 강화
      success_criteria:
      - 3 모델 예측
      - 다수결 vote
      - 불일치 탐지
      acceptable_methods:
      - python list + Counter
      - torch ensemble
      - scikit-learn VotingClassifier
      negative_signs:
      - 단일 모델만
      - 투표 없음
  target_vm: attacker
  script: 'python3 -c "import math;models=[[0.8,-0.3,0.5,0.2,-0.4],[0.7,-0.2,0.6,0.1,-0.3],[0.9,-0.4,0.4,0.3,-0.5]];x_adv=[1.2,-0.1,1.0,0.7,0.0];votes=[1/(1+math.exp(-(sum(w*x
    for w,x in zip(m,x_adv))-0.5)))>0.5 for m in models];print(''=== Ensemble Defense
    ==='');[print(f''  Model {i+1}: {\"STOP\" if v else \"NOT_STOP\"}'') for i,v in
