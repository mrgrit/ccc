- order: 99
  instruction: |
    [복합 시나리오] "표준 외 로그 형식 → 커스텀 decoder + rule 작성"

    ## 상황 (w01-w09 시나리오 연속)

    ABC 핀테크 SOC 신규 분석가, 10주 차.
    1~10 step 으로 sudo 실패 *rule* 작성·검증까지 했다. 그런데 학습 목표 #3 — *"디코더(decoder)
    의 역할을 이해하고 작성할 수 있다"* — 1~10 은 *rule* 만. decoder 는 표준 syslog 자동 파싱
    되는 거라 안 다뤘다.

    > 선임: "방금 우리 회사 결제 서비스가 새 로그 형식 도입했는데 — 표준 syslog 가 아니라
    >  *커스텀 JSON* 이야: '{\"event\":\"login_fail\",\"user\":\"alice\",\"src\":\"1.2.3.4\"}'.
    >  Wazuh 기본 decoder 가 이걸 못 풀어 — 그래서 *커스텀 decoder + 그 위에 rule* 작성해야
    >  alert 발생해. wazuh-logtest 로 매칭 cycle 직접 보면서 작성해."

    학습 목표 #3 (decoder 작성) 행동 증명.

    ## 임무 (3 단계, 약 25분)

    ### Phase A — 커스텀 로그 파일 + 모니터 추가 (5분)

    web 또는 siem 에 가짜 결제 로그 파일 생성:
      ```
      ssh ccc@10.20.30.100      # siem
      sudo touch /var/log/payment-app.log
      sudo chmod 644 /var/log/payment-app.log
      ```

    siem 의 ossec.conf 에 모니터 추가:
      ```
      sudo tee -a /var/ossec/etc/ossec.conf <<'EOF'
      <localfile>
        <log_format>json</log_format>
        <location>/var/log/payment-app.log</location>
      </localfile>
      EOF
      sudo systemctl restart wazuh-manager
      sleep 5
      ```

    ### Phase B — Decoder + Rule 작성 + wazuh-logtest 검증 (15분)

    siem 의 `/var/ossec/etc/decoders/local_decoder.xml` 에 decoder 추가:
      ```
      sudo tee -a /var/ossec/etc/decoders/local_decoder.xml <<'EOF'
      <decoder name="payment-app">
        <prematch>"event":"</prematch>
      </decoder>

      <decoder name="payment-app-fields">
        <parent>payment-app</parent>
        <regex>"event":"(\S+)","user":"(\S+)","src":"(\S+)"</regex>
        <order>event_name,user,src_ip</order>
      </decoder>
      EOF
      ```

    `/var/ossec/etc/rules/local_rules.xml` 에 rule 추가:
      ```
      sudo tee -a /var/ossec/etc/rules/local_rules.xml <<'EOF'
      <group name="payment-app,">
        <rule id="100400" level="10">
          <decoded_as>payment-app</decoded_as>
          <field name="event_name">login_fail</field>
          <description>Payment app login failure (decoder=payment-app, user=$(user))</description>
        </rule>
      </group>
      EOF
      ```

    문법 검증:
      `sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | grep -E 'OK|error|ERROR'`

    Manager 재시작:
      `sudo systemctl restart wazuh-manager && sleep 5`

    `wazuh-logtest` 로 매칭 cycle 직접 확인:
      ```
      echo '{"event":"login_fail","user":"alice","src":"1.2.3.4"}' | sudo /var/ossec/bin/wazuh-logtest
      ```
    → 예상 출력:
      ```
      Phase 1: Completed pre-decoding.
      Phase 2: Completed decoding. → name: 'payment-app-fields', user='alice', src_ip='1.2.3.4'
      Phase 3: Completed filtering (rules). → id: '100400', level: 10
      ```

    ### Phase C — 실 trigger + cross-check + 정리 (5분)

    실제 로그 라인 발생:
      ```
      echo '{"event":"login_fail","user":"alice","src":"1.2.3.4"}' | sudo tee -a /var/log/payment-app.log
      sleep 5
      ```

    siem alerts.json 에서 매칭 alert 검색:
      `sudo tail -100 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.rule.id=="100400")' | head`
    → 예상: 1 alert + decoded fields (user, src_ip).

    1~2 단락 회고:
    1. **Phase 1 (pre-decoding) → 2 (decoding) → 3 (rule matching) 의 책임 차이** —
       decoder 는 *raw → 구조화* (regex), rule 은 *구조화 → alert* (조건문)
    2. **decoder 없이 rule 만 작성하면** — `decoded_as` 매칭 안 됨, alert 미발생.
       또는 `<match>` 같은 raw 매칭 fallback 필요 (성능 X)
    3. **운영 시 표준 외 로그** — JSON / CEF / LEEF 형식이 흔함. 각 형식별 decoder 라이브러리
       (Wazuh 기본 + ossec-rules) 활용.

    종료 정리:
      ```
      sudo sed -i '/payment-app/,/^$/d' /var/ossec/etc/decoders/local_decoder.xml
      sudo sed -i '/payment-app/,/<\\/group>/d' /var/ossec/etc/rules/local_rules.xml
      sudo sed -i '/payment-app.log/,/<\\/localfile>/d' /var/ossec/etc/ossec.conf
      sudo rm /var/log/payment-app.log
      sudo systemctl restart wazuh-manager
      ```
