lab_id: secops-ai-week10
title: Wazuh 탐지 룰 작성 (AI 지원)
version: ai
course: secops-ai
week: 10
description: Wazuh decoder/rule 구조를 이해하고 커스텀 로컬 룰로 SSH 실패, sudo 실행 등을 탐지한다.
difficulty: medium
duration_minutes: 120
objectives:
- wazuh rules 디렉터리 구조와 local_rules.xml 의 역할을 이해한다
- wazuh-logtest 로 룰 매칭을 테스트한다
- reload 후 alerts.json 에서 새 룰이 적용된 결과를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: /var/ossec/ruleset/rules 디렉터리의 룰 파일 개수를 확인하시오.
  hint: ls /var/ossec/ruleset/rules | wc -l
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh ruleset/rules 디렉터리에 있는 룰 파일 개수를 확인해줘

    📎 참고 (CLI): sudo ls /var/ossec/ruleset/rules/ 2>/dev/null | wc -l'
  answer_detail: 'Wazuh 탐지 룰 작성: /var/ossec/ruleset/rules 디렉터리의 룰 파일 개수를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Wazuh builtin ruleset 파일 개수 — sudo ls /var/ossec/ruleset/rules/ | wc
        -l. /var/ossec/ruleset/rules/ 는 Wazuh 제공 기본 룰(읽기 전용 권장), /var/ossec/etc/rules/
        는 custom 룰 위치. 기본 룰 보통 200+ 파일(0020-syslog, 0080-sshd, 0250-apache, 0450-firewalld,
        0500-ms_logs_rules, 0700-nginx, 0800-mitre 등 번호 prefix). 업데이트 시 ruleset/rules
        덮어씀 → custom 은 etc/rules 에 분리
      success_criteria:
      - ls ruleset/rules | wc -l 실행
      - 파일 개수 숫자 출력
      - ruleset 디렉토리 정확
      acceptable_methods:
      - sudo ls /var/ossec/ruleset/rules/ | wc -l
      - sudo find /var/ossec/ruleset/rules -name *.xml | wc -l
      - dpkg -L wazuh-manager | grep rules | wc -l
      - ls 후 grep *.xml | wc
      - Wazuh Dashboard Management Rules 개수 확인
      - |
        **[OSS] find + wc (CRS 룰 카운트)** — 표준 텍스트 분석.
          # 1. ruleset/rules 의 .xml 파일 수
          sudo find /var/ossec/ruleset/rules -name "*.xml" -type f | wc -l
          # 2. 카테고리 별 분포 (0001-0950 prefix)
          sudo ls /var/ossec/ruleset/rules/ | awk -F- '{print $1}' | sort | uniq -c
          # 3. 룰 라인 수 (총 SecRule)
          sudo grep -c '<rule ' /var/ossec/ruleset/rules/*.xml | awk -F: '{s+=$2} END {print s}'
          # 4. 카테고리 별 룰 수 (file 별)
          for f in /var/ossec/ruleset/rules/*.xml; do
              n=$(sudo grep -c '<rule ' "$f")
              echo "$n $(basename $f)"
          done | sort -rn | head
        예상 출력 `200 / 0080-sshd_rules.xml: 25 rules / 0250-apache_rules.xml: 30 rules / Total 3500 rules`.
        운영 해석: builtin ruleset 분포. 0080 = sshd, 0250 = apache, 0450 = firewalld 등 service 별 매핑.
      - |
        **[OSS] xmllint (XML 룰 검증)** — 표준 검증.
          # 1. 모든 룰 파일 syntax 검증
          for f in /var/ossec/ruleset/rules/*.xml; do
              sudo xmllint --noout "$f" 2>&1 | head -1
          done
          # 2. 단일 파일 룰 수 추출
          sudo xmllint --xpath "count(//rule)" /var/ossec/ruleset/rules/0080-sshd_rules.xml
          # 3. 모든 룰 ID 목록
          sudo xmllint --xpath "//rule/@id" /var/ossec/ruleset/rules/0080-sshd_rules.xml | tr ' ' '\n' | head
          # 4. 특정 level 룰 추출
          sudo xmllint --xpath "//rule[@level='10']" /var/ossec/ruleset/rules/0080-sshd_rules.xml | head
        예상 출력 `25 / id="5710" id="5712" id="5715" / level="10" rule samples`.
        운영 해석: XML 구조 인식 정밀 query. grep 보다 정확.
      - |
        **[OSS] Wazuh Dashboard Management Rules** — GUI.
          # 1. https://10.20.30.100/ → Server management → Rules
          # 2. UI 동작:
          # - Rules 탭: 모든 룰 list (built-in + custom)
          # - 검색: keyword / level / group
          # - 필터: id / level / group
          # - "Edit" 버튼: 룰 직접 수정
          # 3. 카테고리 별 분포 시각화
          # 4. CSV export
        UI 동작: 200+ 룰셋 GUI 분석. category drill-down + 검색 통합.
        운영 해석: SOC 분석가 표준. CLI grep 보다 카테고리 + level + group 동시 분석.
      - |
        **[OSS] Wazuh API rules endpoint** — programmatic.
          # 1. JWT 토큰
          TOKEN=$(curl -sk -u wazuh-wui:wazuh-wui -X POST "https://localhost:55000/security/user/authenticate?raw=true")
          # 2. 모든 룰 list (페이지 단위)
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/rules?limit=10" | jq
          # 3. 룰 ID 별 상세
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/rules?rule_ids=5710,5712" | jq
          # 4. category 별 카운트
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/rules?status=enabled" | jq '.data.total_affected_items'
        예상 출력 `Total: 3500 / [{id:5710, level:5, description:"sshd:authentication failed"}]`.
        운영 해석: REST API 자동화 표준. 외부 도구 통합 + custom dashboard.
      - |
        **[OSS] git + ruleset 관리** — enterprise.
          # 1. 사내 룰 git repo
          mkdir -p /var/ossec/etc/rules-git && cd /var/ossec/etc/rules-git
          sudo git init
          # 2. local_rules.xml 을 git 추적
          sudo git add local_rules.xml
          sudo git commit -m "Initial custom rules"
          # 3. 변경 history
          sudo git log --oneline | head
          # 4. Wazuh 가 etc/rules/local_rules.xml 사용
          # symlink 또는 copy hook
          sudo ln -sf /var/ossec/etc/rules-git/local_rules.xml /var/ossec/etc/rules/local_rules.xml
        예상 출력: 룰 변경 git history.
        운영 해석: enterprise 표준. 룰 변경 audit + rollback + CI 통합.
      negative_signs:
      - etc/rules 경로 혼동
      - wc 누락
      - 0 정상 판정
  target_vm: siem
  script: sudo ls /var/ossec/ruleset/rules/ 2>/dev/null | wc -l
  risk_level: low
  bastion_prompt: siem VM의 wazuh ruleset/rules 디렉터리에 있는 룰 파일 개수를 확인해줘
- order: 2
  instruction: local_rules.xml 의 현재 내용을 확인하시오.
  hint: cat /var/ossec/etc/rules/local_rules.xml
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh local_rules.xml 상단 30줄을 보여줘

    📎 참고 (CLI): sudo cat /var/ossec/etc/rules/local_rules.xml 2>/dev/null | head -30'
  answer_detail: 'Wazuh 탐지 룰 작성: local_rules.xml 의 현재 내용을 확인하시오.'
  verify:
    type: output_contains
    expect: rules
    field: stdout
    semantic:
      intent: 'local_rules.xml 내용 확인 — sudo cat /var/ossec/etc/rules/local_rules.xml
        | head -30. Custom rule 정의 위치(ruleset/rules 와 분리, 업데이트 시 보존). 기본 템플릿: <group
        name="local,syslog,sshd,"><rule id="100001" level="5"><if_sid>5716</if_sid><srcip>!192.168.1.0/24</srcip><description>sshd:
        external ssh</description></rule></group>. rule ID 100000-120000 범위가 custom
        예약. XML 섹션 구조'
      success_criteria:
      - cat local_rules.xml 실행
      - rules 또는 group 키워드
      - 파일 내용 상단 출력
      acceptable_methods:
      - sudo cat /var/ossec/etc/rules/local_rules.xml | head -30
      - sudo less /var/ossec/etc/rules/local_rules.xml
      - sudo xmllint --format local_rules.xml
      - Wazuh Dashboard Management Rules local 필터
      - git log --oneline /var/ossec/etc/rules/ (버전관리 시)
      - |
        **[OSS] cat + xmllint (XML 정렬 view)** — 표준.
          # 1. 단순 cat
          sudo cat /var/ossec/etc/rules/local_rules.xml
          # 2. xmllint 로 pretty-print
          sudo xmllint --format /var/ossec/etc/rules/local_rules.xml
          # 3. 룰 ID 만 추출
          sudo xmllint --xpath "//rule/@id" /var/ossec/etc/rules/local_rules.xml | tr ' ' '\n'
          # 4. 그룹 별 룰 수
          sudo xmllint --xpath "//group/@name" /var/ossec/etc/rules/local_rules.xml | tr ' ' '\n' | sort | uniq -c
        예상 출력 `<group name="local,syslog,sshd,"> / <rule id="100001" level="5"> / id="100001" id="100002" / 5 local`.
        운영 해석: builtin (ruleset/rules) 보존 + custom (etc/rules) 분리 = update 시 custom 보존.
      - |
        **[OSS] Wazuh Dashboard Rules editor** — GUI 표준.
          # 1. https://10.20.30.100/ → Server management → Rules
          # 2. UI 동작:
          # - Custom rules tab → local_rules.xml 내용
          # - 각 룰 클릭 → 상세 + edit 버튼
          # - "Add new rule" 버튼
          # - syntax validate + save
          # 3. 변경 후 자동 manager restart
          # 4. CLI 검증
          ssh ccc@10.20.30.100 "sudo cat /var/ossec/etc/rules/local_rules.xml"
        UI 동작: 시각적 룰 편집 + auto validate + restart.
        운영 해석: 직접 sed 편집 위험 회피. validate 실패 시 변경 자동 롤백.
      - |
        **[OSS] git diff (변경 추적)** — version control.
          # 1. /var/ossec/etc/rules 가 git 관리 시
          cd /var/ossec/etc/rules
          sudo git log --oneline local_rules.xml | head
          # 2. 변경 history
          sudo git log --all --oneline -- local_rules.xml
          # 3. 특정 commit 의 내용
          sudo git show HEAD:local_rules.xml | head
          # 4. 모든 분기 변경 비교
          sudo git diff main..feature-branch -- local_rules.xml
        예상 출력 `commit abc123 + Add sudo brute rule / commit def456 - Initial / removed/added 라인`.
        운영 해석: 룰 변경 audit 표준. 누가 언제 무엇을 변경했는지 + rollback 가능.
      - |
        **[OSS] Wazuh API rules detail** — programmatic.
          # 1. JWT 토큰
          TOKEN=$(curl -sk -u wazuh-wui:wazuh-wui -X POST "https://localhost:55000/security/user/authenticate?raw=true")
          # 2. local rules 조회
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/rules?relative_dirname=etc/rules" | jq
          # 3. 특정 rule 상세
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/rules?rule_ids=100001" | jq
          # 4. 룰 그룹 별
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/rules/groups" | jq
        예상 출력 `[{filename:"local_rules.xml", id:100001, level:5, description:...}]`.
        운영 해석: API 자동화. CI 통합 + 외부 dashboard.
      - |
        **[OSS] etckeeper (변경 audit)** — git history.
          # 1. 변경 전 commit
          sudo etckeeper commit "before custom rule change"
          # 2. 변경
          sudo vim /var/ossec/etc/rules/local_rules.xml
          # 3. 변경 후 commit + restart
          sudo etckeeper commit "Add sudo brute rule (jira: SEC-1234)"
          sudo systemctl restart wazuh-manager
          # 4. diff
          sudo etckeeper vcs diff HEAD~1 HEAD -- /var/ossec/etc/rules/local_rules.xml
        예상 출력 `+<rule id="100100" level="10">...</rule>`.
        운영 해석: 변경 audit 표준. compliance + rollback.
      negative_signs:
      - ruleset/rules 와 혼동
      - XML 구조 이해 없이 실행
      - head 없이 cat(너무 많은 출력)
  target_vm: siem
  script: sudo cat /var/ossec/etc/rules/local_rules.xml 2>/dev/null | head -30
  risk_level: low
  bastion_prompt: siem VM의 wazuh local_rules.xml 상단 30줄을 보여줘
- order: 3
  instruction: 'local_rules.xml 에 ''여러 번 sudo 실패'' 탐지 룰(rule id 100100, level 10)을
    추가하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week10/3/auth.log 사전 주입. `grep
    -E ''Failed password|sudo|Accepted'' /home/ccc/cyber-range/fixtures/secops-ai-week10/3/auth.log`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: <rule id="100100" level="10">…
  category: configure
  points: 10
  answer: "\U0001F916 프롬프트: siem VM의 wazuh local_rules.xml에 sudo 실패 3회 탐지 룰(rule id\
    \ 100100, level 10)을 추가해줘\n\U0001F4CE 참고 (CLI): sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml\
    \ <<EOF\n<group name=\"local,syslog,sudo,\">\n  <rule id=\"100100\" level=\"10\"\
    \ frequency=\"3\" timeframe=\"120\">\n    <if_matched_sid>5402</if_matched_sid>\n\
    \    <description>Multiple sudo failures (custom)</description>\n  </rule>\n</group>\n\
    EOF'"
  answer_detail: 'Wazuh 탐지 룰 작성: local_rules.xml 에 ''여러 번 sudo 실패'' 탐지 룰(rule id 100100,
    level 10)을 추가하시오.'
  verify:
    type: output_contains
    expect: '100100'
    field: stdout
    semantic:
      intent: Sudo 실패 집계 rule 추가 — sudo bash -c cat >> local_rules.xml <<EOF ... 로
        <group name=local,syslog,sudo,> <rule id=100100 level=10 frequency=3 timeframe=120><if_matched_sid>5402</if_matched_sid><description>Multiple
        sudo failures (custom)</description></rule></group> 추가. rule 5402 는 sudo auth
        fail built-in rule. frequency=3 + timeframe=120 = 120초 내 3회 매칭 시 이 rule 발동(집계/correlation).
        level 10 = Medium-High. MITRE T1548.003(Sudo Abuse)
      success_criteria:
      - local_rules.xml 에 rule id=100100 추가
      - frequency + timeframe 또는 if_matched_sid
      - group 태그 구조 유지
      acceptable_methods:
      - sudo bash -c cat >> local_rules.xml <<EOF ... EOF
      - vim + append 수동 편집
      - Ansible blockinfile 모듈
      - Wazuh Dashboard Rules editor
      - git-managed rules + CI
      - |
        **[OSS] heredoc + tee (룰 추가 표준)** — XML append.
          # 1. heredoc 으로 추가
          sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml << "EOF"
          <group name="local,syslog,sudo,">
            <rule id="100100" level="10" frequency="3" timeframe="120">
              <if_matched_sid>5402</if_matched_sid>
              <description>Multiple sudo failures (custom)</description>
              <mitre>
                <id>T1548.003</id>
              </mitre>
            </rule>
          </group>
          EOF'
          # 2. syntax 검증
          sudo /var/ossec/bin/wazuh-analysisd -t
          # 3. restart 적용
          sudo systemctl restart wazuh-manager
        예상 출력 `Configuration loaded / wazuh-manager active`.
        운영 해석: append + validate + restart 의 3단계. heredoc = 정확한 XML 보존.
      - |
        **[OSS] Ansible blockinfile (IaC)** — 자동화.
          # playbook
          - name: Add custom Wazuh rule for sudo brute
            ansible.builtin.blockinfile:
              path: /var/ossec/etc/rules/local_rules.xml
              insertbefore: '</group>'
              marker: "<!-- {mark} ANSIBLE MANAGED rule 100100 -->"
              backup: yes
              block: |
                <group name="local,syslog,sudo,">
                  <rule id="100100" level="10" frequency="3" timeframe="120">
                    <if_matched_sid>5402</if_matched_sid>
                    <description>Multiple sudo failures</description>
                  </rule>
                </group>
            notify: restart wazuh-manager
          handlers:
            - name: restart wazuh-manager
              ansible.builtin.systemd:
                name: wazuh-manager
                state: restarted
          # 실행
          ansible-playbook -i inventory.yml wazuh-rules.yml --diff
        예상 출력 `changed: [siem] / +<rule id="100100" level="10">...`.
        운영 해석: 다중 host 일관 룰 배포. marker 로 idempotent + rollback.
      - |
        **[OSS] Wazuh Dashboard Rules Editor** — GUI.
          # 1. https://10.20.30.100/ → Server management → Rules → Custom rules
          # 2. UI 동작:
          # - "Add new rule" 버튼
          # - 폼: id / level / group / description / decoder match
          # - "Validate" 버튼 → wazuh-analysisd -t 자동 호출
          # - "Save and restart manager" 버튼
          # 3. CLI 검증
          ssh ccc@10.20.30.100 "sudo grep 'id=\"100100\"' /var/ossec/etc/rules/local_rules.xml"
        UI 동작: 시각적 룰 작성 + validate + auto restart.
        운영 해석: 신규 분석가도 안전 작성. XML syntax error 사전 차단.
      - |
        **[OSS] sigma → Wazuh** — 표준 룰 변환.
          # 1. Sigma 룰 작성 (sudo brute)
          cat > /tmp/sudo-brute.yml << 'EOF'
          title: Multiple Sudo Failures
          status: experimental
          logsource:
              product: linux
              category: process_creation
          detection:
              selection:
                  process: sudo
                  field|contains: 'incorrect password'
              count: 3
              timeframe: 2m
              condition: selection
          level: high
          tags:
              - attack.privilege_escalation
              - attack.t1548.003
          EOF
          # 2. Wazuh 변환 (community backend)
          sigma convert -t wazuh /tmp/sudo-brute.yml
        예상 출력 `<rule id="..." level="high"> ... <if_matched_sid>5402</if_matched_sid> ... <mitre><id>T1548.003</id></mitre> </rule>`.
        운영 해석: Sigma 표준 = 다중 SIEM 호환. 1 룰 → Wazuh + Suricata + Elastic 모두 변환.
      - |
        **[OSS] Wazuh API POST rules** — programmatic.
          # 1. JWT 토큰
          TOKEN=$(curl -sk -u wazuh-wui:wazuh-wui -X POST "https://localhost:55000/security/user/authenticate?raw=true")
          # 2. 룰 추가 (PUT to file)
          curl -sk -X PUT -H "Authorization: Bearer $TOKEN" \
              "https://localhost:55000/rules/files/local_rules.xml" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @- << 'EOF'
          <group name="local,syslog,sudo,">
            <rule id="100100" level="10" frequency="3" timeframe="120">
              <if_matched_sid>5402</if_matched_sid>
              <description>Multiple sudo failures</description>
            </rule>
          </group>
          EOF
          # 3. manager restart
          curl -sk -H "Authorization: Bearer $TOKEN" -X PUT "https://localhost:55000/manager/restart"
        예상 출력 `{"data":{"affected_items":["local_rules.xml"],"updated":1}}`.
        운영 해석: REST API 룰 추가. CI/CD 파이프라인 통합 표준.
      negative_signs:
      - group 태그 누락(XML 오류)
      - if_matched_sid 없음(correlation 불가)
      - rule id 중복
  target_vm: siem
  script: "sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF\n<group\
    \ name=\"local,syslog,sudo,\">\n  <rule id=\"100100\" level=\"10\" frequency=\"\
    3\" timeframe=\"120\">\n    <if_matched_sid>5402</if_matched_sid>\n    <description>Multiple\
    \ sudo failures (custom)</description>\n  </rule>\n</group>\nEOF'"
  risk_level: medium
  bastion_prompt: 'siem VM의 wazuh local_rules.xml에 sudo 실패 3회 탐지 룰(rule id 100100,
    level 10)을 추가해줘




    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week10/3/auth.log 사전 주입. `grep
