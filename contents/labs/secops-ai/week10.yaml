  answer_detail: 'Wazuh 탐지 룰 작성: 추가했던 custom 룰 그룹을 local_rules.xml 에서 제거하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'custom rule group cleanup — sudo sed -i /<rule id="100100"/,/<\/group>/d
        /var/ossec/etc/rules/local_rules.xml. sed range pattern 으로 <rule id="100100"
        시작 라인부터 </group> 까지 삭제. XML 구조 유지 중요 - <group> 블록 단위 정확 삭제. 백업 권장 sed -i.bak.
        잘못하면 XML 파싱 오류 → manager restart 실패. verify: grep 100100 local_rules.xml 로
        0건 확인'
      success_criteria:
      - sed -i range pattern 사용
      - rule id 100100 블록 삭제
      - XML 구조 파괴 없음
      acceptable_methods:
      - sudo sed -i /<rule id="100100"/,/<\/group>/d local_rules.xml
      - sudo sed -i.bak ... (백업)
      - xmlstarlet ed -d //rule[@id="100100"] local_rules.xml
      - vim 수동 편집
      - git revert 커밋(rule 추가 전 상태)
      - |
        **[OSS] sed range pattern** — 표준.
          # 1. 백업
          sudo cp /var/ossec/etc/rules/local_rules.xml{,.bak}
          # 2. <group> 블록 단위 삭제
          sudo sed -i '/<group name="local,syslog,sudo,">/,/<\/group>/d' /var/ossec/etc/rules/local_rules.xml
          # 3. 또는 <rule id="100100"> 시작 ~ </group>
          sudo sed -i '/<rule id="100100"/,/<\/group>/d' /var/ossec/etc/rules/local_rules.xml
          # 4. 검증
          sudo grep -c '100100' /var/ossec/etc/rules/local_rules.xml   # 0 = OK
          sudo /var/ossec/bin/wazuh-analysisd -t
        예상 출력 `0 / Configuration loaded`.
        운영 해석: range pattern 정확. 시작/끝 매칭 잘못하면 너무 많이 삭제.
      - |
        **[OSS] xmlstarlet (XML 정밀 삭제)** — 표준.
          # 1. xmlstarlet 설치
          sudo apt install xmlstarlet
          # 2. XPath 로 정확 매칭 + 삭제
          sudo xmlstarlet ed -d "//rule[@id='100100']" /var/ossec/etc/rules/local_rules.xml > /tmp/local_rules-new.xml
          sudo mv /tmp/local_rules-new.xml /var/ossec/etc/rules/local_rules.xml
          # 3. 부모 group 도 비어있으면 함께 삭제
          sudo xmlstarlet ed -d "//group[count(rule)=0]" /var/ossec/etc/rules/local_rules.xml
        예상 출력: 정확히 rule id 100100 만 삭제. 다른 룰 영향 없음.
