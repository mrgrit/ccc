    \ | jq -c 'select(.rule.id==\"100400\")' | head`\n→ 예상: 1 alert + decoded fields\
    \ (user, src_ip).\n\n1~2 단락 회고:\n1. **Phase 1 (pre-decoding) → 2 (decoding) →\
    \ 3 (rule matching) 의 책임 차이** —\n   decoder 는 *raw → 구조화* (regex), rule 은 *구조화\
