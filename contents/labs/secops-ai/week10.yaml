          sudo git log --oneline | grep "100100"
          # 3. revert 또는 checkout
          sudo git revert <commit_hash> --no-edit
          # 또는 즉시 복원
          sudo git checkout HEAD~1 -- local_rules.xml
          # 4. restart
          sudo systemctl restart wazuh-manager
        예상 출력 `Revert "Add sudo brute rule" / [main abc123] Revert ...`.
        운영 해석: git 관리 환경 표준 rollback. 1-command 복원.
      - |
        **[OSS] Ansible (state=absent IaC)** — 자동화.
          # playbook
