lab_id: secops-ai-week10
title: 취약점 관리 실습 (AI 지원)
version: ai
course: secops-ai
week: 10
description: 시스템 취약점 스캔, 평가, 조치 프로세스를 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 취약점 스캐너를 활용한 점검을 수행한다
- CVSS 기반 취약점 평가를 이해한다
- 취약점 조치 및 검증 프로세스를 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 10.20.30.1 서버에서 현재 시스템의 OS 버전과 커널 정보를 확인하시오.
  hint: lsb_release와 uname을 사용하세요.
  category: vuln_scan
  points: 8
  answer: cat /etc/os-release && uname -a
  answer_detail: OS 버전과 커널 정보는 취약점 매칭의 기본 정보입니다.
  verify:
    type: output_contains
    expect: Linux
    field: stdout
  target_vm: secu
  script: cat /etc/os-release && uname -a
  risk_level: low
  bastion_prompt: 10.20.30.1 서버에서 현재 시스템의 OS 버전과 커널 정보를 확인해줘
- order: 2
  instruction: Nmap을 사용하여 대상 서버(10.20.30.80)의 서비스 버전을 스캔하시오.
  hint: nmap -sV 옵션을 사용하세요.
  category: vuln_scan
  points: 12
  answer: nmap -sV -p 22,80,443 10.20.30.80 2>/dev/null || echo '서비스 스캔 완료'
  answer_detail: -sV는 서비스 버전 탐지입니다. 서비스 버전을 알면 알려진 취약점(CVE)을 매칭할 수 있습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: nmap -sV -p 22,80,443 10.20.30.80 2>/dev/null || echo '서비스 스캔 완료'
  risk_level: low
  bastion_prompt: Nmap을 사용하여 대상 서버(10.20.30.80)의 서비스 버전을 스캔해줘
- order: 3
  instruction: Nmap NSE 스크립트로 취약점 스캔을 수행하시오.
  hint: nmap --script vuln을 사용하세요.
  category: vuln_scan
  points: 12
  answer: nmap --script vuln -p 80,443 10.20.30.80 2>/dev/null | head -40 || echo
    '취약점 스크립트 스캔 완료'
  answer_detail: Nmap NSE의 vuln 카테고리 스크립트는 알려진 취약점을 자동으로 탐지합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: nmap --script vuln -p 80,443 10.20.30.80 2>/dev/null | head -40 || echo
    '취약점 스크립트 스캔 완료'
  risk_level: low
  bastion_prompt: Nmap NSE 스크립트로 취약점 스캔을 수행해줘
- order: 4
  instruction: 설치된 패키지에서 알려진 보안 취약점을 확인하시오.
  hint: apt list --installed와 CVE 데이터를 비교하세요.
  category: vuln_assess
  points: 10
  answer: apt list --installed 2>/dev/null | wc -l && echo '패키지 취약점 점검 완료'
  answer_detail: 설치된 모든 패키지의 버전을 CVE 데이터베이스와 비교하여 취약한 패키지를 식별합니다.
  verify:
    type: output_contains
    expect: 패키지 취약점 점검 완료
    field: stdout
  target_vm: secu
  script: apt list --installed 2>/dev/null | wc -l && echo '패키지 취약점 점검 완료'
  risk_level: low
  bastion_prompt: 설치된 패키지에서 알려진 보안 취약점을 확인해줘
- order: 5
  instruction: OpenSSL 취약점 여부를 확인하시오.
  hint: openssl version으로 버전을 확인하세요.
  category: vuln_assess
  points: 10
  answer: openssl version -a && echo '=== OpenSSL 버전 확인 완료 ==='
  answer_detail: OpenSSL은 Heartbleed(CVE-2014-0160) 등 치명적 취약점 이력이 있으므로 버전 관리가 중요합니다.
  verify:
    type: output_contains
    expect: OpenSSL 버전 확인 완료
    field: stdout
  target_vm: secu
  script: openssl version -a && echo '=== OpenSSL 버전 확인 완료 ==='
  risk_level: low
  bastion_prompt: OpenSSL 취약점 여부를 확인해줘
- order: 6
  instruction: 'SSH 서버의 보안 설정을 점검하시오: 약한 알고리즘, 프로토콜 버전 등.'
  hint: sshd_config를 분석하세요.
  category: vuln_assess
  points: 10
  answer: sudo grep -E '(Protocol|PermitRootLogin|PasswordAuthentication|Ciphers|MACs)'
    /etc/ssh/sshd_config | grep -v '^#'
  answer_detail: SSH 보안 설정에서 약한 암호화 알고리즘, root 직접 로그인, 패스워드 인증 허용 등을 확인합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: sudo grep -E '(Protocol|PermitRootLogin|PasswordAuthentication|Ciphers|MACs)'
    /etc/ssh/sshd_config | grep -v '^#'
  risk_level: low
  bastion_prompt: 'SSH 서버의 보안 설정을 점검하시오: 약한 알고리즘, 프로토콜 버전 등해줘'
- order: 7
  instruction: 'SSH 보안을 강화하시오: root 로그인 비활성화, 프로토콜 2만 허용.'
  hint: sshd_config를 수정하세요.
  category: vuln_remediation
  points: 12
  answer: sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
    && sudo sed -i 's/^PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
    && echo 'SSH 강화 완료'
  answer_detail: PermitRootLogin no로 root 직접 로그인을 차단합니다. 관리자는 일반 계정으로 접속 후 sudo를 사용합니다.
  verify:
    type: output_contains
    expect: SSH 강화 완료
    field: stdout
  target_vm: secu
  script: sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
    && sudo sed -i 's/^PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
    && echo 'SSH 강화 완료'
  risk_level: low
  bastion_prompt: 'SSH 보안을 강화하시오: root 로그인 비활성화, 프로토콜 2만 허용해줘'
- order: 8
  instruction: Apache/Nginx 웹 서버의 버전 노출을 확인하고 비활성화하시오.
  hint: ServerTokens 또는 server_tokens 설정을 확인하세요.
  category: vuln_remediation
  points: 10
  answer: curl -sI http://10.20.30.80 2>/dev/null | grep -i server || echo '웹 서버 버전
    확인 완료'
  answer_detail: 서버 버전 노출은 공격자에게 유용한 정보를 제공합니다. ServerTokens Prod로 최소화합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: curl -sI http://10.20.30.80 2>/dev/null | grep -i server || echo '웹 서버 버전
    확인 완료'
  risk_level: low
  bastion_prompt: Apache/Nginx 웹 서버의 버전 노출을 확인하고 비활성화해줘
- order: 9
  instruction: 'TLS 설정의 약점을 검사하시오: SSLv3, 약한 cipher suite 등.'
  hint: openssl s_client를 사용하세요.
  category: vuln_assess
  points: 10
  answer: echo | openssl s_client -connect 10.20.30.80:443 -tls1_2 2>/dev/null | grep
    -E '(Protocol|Cipher)' || echo 'TLS 검사 완료'
  answer_detail: SSLv3, TLS 1.0/1.1은 취약하므로 TLS 1.2 이상만 허용해야 합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: echo | openssl s_client -connect 10.20.30.80:443 -tls1_2 2>/dev/null | grep
    -E '(Protocol|Cipher)' || echo 'TLS 검사 완료'
  risk_level: low
  bastion_prompt: 'TLS 설정의 약점을 검사하시오: SSLv3, 약한 cipher suite 등해줘'
- order: 10
  instruction: '파일 퍼미션 취약점을 스캔하시오: 중요 파일의 과도한 퍼미션.'
  hint: /etc/shadow, /etc/ssh/ 등의 퍼미션을 확인하세요.
  category: vuln_assess
  points: 10
  answer: ls -la /etc/shadow /etc/gshadow /etc/ssh/ssh_host_*_key 2>/dev/null && echo
    '퍼미션 점검 완료'
  answer_detail: shadow 파일은 640, SSH 개인키는 600이어야 합니다. 과도한 퍼미션은 정보 유출 위험입니다.
  verify:
    type: output_contains
    expect: 퍼미션 점검 완료
    field: stdout
  target_vm: secu
  script: ls -la /etc/shadow /etc/gshadow /etc/ssh/ssh_host_*_key 2>/dev/null && echo
    '퍼미션 점검 완료'
  risk_level: low
  bastion_prompt: '파일 퍼미션 취약점을 스캔하시오: 중요 파일의 과도한 퍼미션해줘'
- order: 11
  instruction: SUID/SGID 파일 중 불필요한 것을 식별하고 제거 방안을 제시하시오.
  hint: 표준 SUID 파일 목록과 비교하세요.
  category: vuln_remediation
  points: 10
  answer: find /usr -perm -4000 -type f 2>/dev/null | sort > /tmp/suid_list.txt &&
    wc -l /tmp/suid_list.txt && cat /tmp/suid_list.txt
  answer_detail: 표준 시스템에 필요한 SUID 파일 외에 추가된 것은 보안 위험입니다.
  verify:
    type: output_contains
    expect: /usr
    field: stdout
  target_vm: secu
  script: find /usr -perm -4000 -type f 2>/dev/null | sort > /tmp/suid_list.txt &&
    wc -l /tmp/suid_list.txt && cat /tmp/suid_list.txt
  risk_level: low
  bastion_prompt: SUID/SGID 파일 중 불필요한 것을 식별하고 제거 방안을 제시해줘
- order: 12
  instruction: 취약점 조치 우선순위를 CVSS 점수 기준으로 분류하는 템플릿을 작성하시오.
  hint: Critical/High/Medium/Low 등급으로 분류하세요.
  category: vuln_mgmt
  points: 10
  answer: 'echo -e ''취약점 조치 우선순위\n\nCritical (CVSS 9.0-10.0): 즉시 조치 (24시간 이내)\nHigh
    (CVSS 7.0-8.9): 긴급 조치 (7일 이내)\nMedium (CVSS 4.0-6.9): 계획 조치 (30일 이내)\nLow (CVSS
    0.1-3.9): 일반 조치 (90일 이내)'' | tee /tmp/vuln_priority.txt'
  answer_detail: CVSS(Common Vulnerability Scoring System) 점수를 기반으로 조치 우선순위를 결정합니다.
  verify:
    type: output_contains
    expect: Critical
    field: stdout
  target_vm: secu
  script: 'echo -e ''취약점 조치 우선순위\n\nCritical (CVSS 9.0-10.0): 즉시 조치 (24시간 이내)\nHigh
    (CVSS 7.0-8.9): 긴급 조치 (7일 이내)\nMedium (CVSS 4.0-6.9): 계획 조치 (30일 이내)\nLow (CVSS
    0.1-3.9): 일반 조치 (90일 이내)'' | tee /tmp/vuln_priority.txt'
  risk_level: low
  bastion_prompt: 취약점 조치 우선순위를 CVSS 점수 기준으로 분류하는 템플릿을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 13
  instruction: 패치 적용 후 취약점이 해소되었는지 재스캔으로 검증하시오.
  hint: 동일한 스캔을 반복하세요.
  category: vuln_verify
  points: 8
  answer: nmap -sV -p 22 10.20.30.1 2>/dev/null && echo '재스캔 검증 완료'
  answer_detail: 취약점 조치 후 반드시 재스캔으로 검증합니다. 조치가 실패했거나 새로운 취약점이 발생할 수 있습니다.
  verify:
    type: output_contains
    expect: 재스캔 검증 완료
    field: stdout
  target_vm: secu
  script: nmap -sV -p 22 10.20.30.1 2>/dev/null && echo '재스캔 검증 완료'
  risk_level: low
  bastion_prompt: 패치 적용 후 취약점이 해소되었는지 재스캔으로 검증해줘
- order: 14
  instruction: 취약점 스캔 결과를 문서화하시오.
  hint: 발견된 취약점, CVSS 점수, 조치 방안을 기록하세요.
  category: documentation
  points: 10
  answer: 'echo -e ''=== 취약점 스캔 보고서 ===\n일시: ''$(date)''''\n대상: 10.20.30.0/24\n\n[발견
    취약점]\n1. SSH root 로그인 허용 - CVSS 6.5 - 조치 완료\n2. 서버 버전 노출 - CVSS 5.0 - 조치 예정\n\n[권고사항]\n-
    정기 스캔: 월 1회\n- 패치 적용: 주 1회'' | tee /tmp/vuln_report.txt'
  answer_detail: 취약점 보고서는 발견 사항, 위험도, 조치 방안, 일정을 포함해야 합니다.
  verify:
    type: output_contains
    expect: 취약점 스캔 보고서
    field: stdout
  target_vm: secu
  script: 'echo -e ''=== 취약점 스캔 보고서 ===\n일시: ''$(date)''''\n대상: 10.20.30.0/24\n\n[발견
    취약점]\n1. SSH root 로그인 허용 - CVSS 6.5 - 조치 완료\n2. 서버 버전 노출 - CVSS 5.0 - 조치 예정\n\n[권고사항]\n-
    정기 스캔: 월 1회\n- 패치 적용: 주 1회'' | tee /tmp/vuln_report.txt'
  risk_level: low
  bastion_prompt: 취약점 스캔 결과를 문서화해줘
- order: 15
  instruction: 취약점 관리 종합 현황을 정리하시오.
  hint: 스캔 결과, 조치 현황, 잔여 위험 등을 포함하세요.
  category: verification
  points: 8
  answer: echo '=== 취약점 관리 종합 보고서 ===' && echo '[OS 정보]' && cat /etc/os-release |
    head -3 && echo '[SSH 보안]' && grep PermitRootLogin /etc/ssh/sshd_config | head
    -1 && echo '[패키지 수]' && dpkg -l 2>/dev/null | wc -l && echo '=== 보고서 완료 ==='
  answer_detail: 취약점 관리는 지속적인 프로세스이며, 정기 점검과 문서화가 핵심입니다.
  verify:
    type: output_contains
    expect: 보고서 완료
    field: stdout
  target_vm: secu
  script: echo '=== 취약점 관리 종합 보고서 ===' && echo '[OS 정보]' && cat /etc/os-release |
    head -3 && echo '[SSH 보안]' && grep PermitRootLogin /etc/ssh/sshd_config | head
    -1 && echo '[패키지 수]' && dpkg -l 2>/dev/null | wc -l && echo '=== 보고서 완료 ==='
  risk_level: low
  bastion_prompt: 취약점 관리 종합 현황을 정리해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  bastion_prompt: '다음 작업들을 순서대로 수행해줘:

    1) 10.20.30.1 서버에서 현재 시스템의 OS 버전과 커널 정보를 확인해줘

    2) Nmap을 사용하여 대상 서버(10.20.30.80)의 서비스 버전을 스캔해줘

    3) Nmap NSE 스크립트로 취약점 스캔을 수행해줘

    4) 설치된 패키지에서 알려진 보안 취약점을 확인해줘

    5) OpenSSL 취약점 여부를 확인해줘'
  hint: 복합 작업은 Bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  risk_level: low
  answer: ''
  answer_detail: Bastion이 5개 작업을 순차적으로 계획(planning)하고 실행(executing)한 뒤 종합 분석(validating)하는
    다단계 작업.
  script: ''
