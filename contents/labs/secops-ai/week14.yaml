  answer: "echo '#!/bin/bash\necho \"=== 비활성 계정 자동 잠금 ===\"\nlastlog -b 90 2>/dev/null | awk \"NR>1 {print \\$1}\" | while read user; do\n  if id \"$user\" &>/dev/null && [ $(id -u \"$user\") -ge 1000 ];\
