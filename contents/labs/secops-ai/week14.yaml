lab_id: secops-ai-week14
title: 보안 자동화 실습 (AI 지원)
version: ai
course: secops-ai
week: 14
description: 보안 운영 작업을 스크립트와 도구를 활용하여 자동화합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 보안 점검 자동화 스크립트를 개발한다
- 자동 대응 체계를 구축한다
- SOAR 기초 개념을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 10.20.30.1 서버에서 자동 보안 점검 스크립트 프레임워크를 설계하시오.
  hint: 함수 기반으로 모듈화하세요.
  category: automation
  points: 10
  answer: 'echo ''#!/bin/bash

    # 보안 자동 점검 프레임워크

    RESULT_FILE=/tmp/security_scan_$(date +%Y%m%d).json

    PASS=0; FAIL=0


    check() { echo "[CHECK] $1"; }

    pass() { echo "  PASS: $1"; ((PASS++)); }

    fail() { echo "  FAIL: $1"; ((FAIL++)); }


    echo "프레임워크 초기화 완료"'' > /tmp/sec_framework.sh && chmod +x /tmp/sec_framework.sh && bash /tmp/sec_framework.sh'
  answer_detail: 모듈화된 점검 프레임워크로 재사용성과 유지보수성을 높입니다.
  verify:
    type: output_contains
    expect: 프레임워크 초기화 완료
    field: stdout
  script: 'echo ''#!/bin/bash

    # 보안 자동 점검 프레임워크

