lab_id: secops-ai-week14
title: 통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계 (AI 지원)
version: ai
course: secops-ai
week: 14
description: 각 보안 솔루션의 이벤트가 Wazuh SIEM으로 수렴되고 CTI와 연계되는 흐름을 점검한다.
difficulty: hard
duration_minutes: 120
objectives:
- Suricata → Wazuh 로 eve.json 이 수집되는지 확인한다
- ModSecurity → Wazuh 감사 로그 수집 경로를 확인한다
- CTI → nftables 차단 체인까지 이어지는 end-to-end 흐름을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에서 suricata eve.json 이 /var/log/suricata/eve.json 으로 기록되는지 확인하시오.
  hint: ls -la /var/log/suricata/eve.json
  category: survey
  points: 10
  answer: sudo ls -la /var/log/suricata/eve.json 2>/dev/null
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM에서 suricata eve.json 이
    /var/log/suricata/eve.json 으로 기록되는지 확인하시오.'
  verify:
    type: output_contains
    expect: eve.json
    field: stdout
  target_vm: secu
  script: sudo ls -la /var/log/suricata/eve.json 2>/dev/null
  risk_level: low
  bastion_prompt: secu VM의 suricata eve.json 파일 존재·크기를 확인해줘
- order: 2
  instruction: secu VM에 wazuh-agent 가 설치되어 있는지 확인하시오.
  hint: systemctl is-active wazuh-agent
  category: survey
  points: 10
  answer: systemctl is-active wazuh-agent || /var/ossec/bin/wazuh-control status 2>/dev/null
    | head
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM에 wazuh-agent 가 설치되어 있는지
    확인하시오.'
  verify:
    type: output_contains
    expect: wazuh
    field: stdout
  target_vm: secu
  script: systemctl is-active wazuh-agent || /var/ossec/bin/wazuh-control status 2>/dev/null
    | head
  risk_level: low
  bastion_prompt: secu VM에 wazuh-agent가 동작 중인지 확인해줘
- order: 3
  instruction: secu VM 의 ossec.conf 에서 eve.json 을 수집하는 <localfile> 설정을 확인하시오.
  hint: grep eve.json /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: sudo grep -A2 -B1 eve.json /var/ossec/etc/ossec.conf 2>/dev/null | head
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM 의 ossec.conf 에서 eve.json
    을 수집하는 <localfile> 설정을 확인하시오.'
  verify:
    type: output_contains
    expect: eve.json
    field: stdout
  target_vm: secu
  script: sudo grep -A2 -B1 eve.json /var/ossec/etc/ossec.conf 2>/dev/null | head
  risk_level: low
  bastion_prompt: secu VM ossec.conf에서 eve.json 을 수집하는 localfile 설정을 보여줘
- order: 4
  instruction: siem VM에서 attacker IP(10.20.30.201)에 대한 최근 wazuh alert를 조회하시오.
  hint: grep 10.20.30.201 alerts.json
  category: verify
  points: 10
  answer: sudo grep 10.20.30.201 /var/ossec/logs/alerts/alerts.json 2>/dev/null |
    tail -3
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: siem VM에서 attacker IP(10.20.30.201)에
    대한 최근 wazuh alert를 조회하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: sudo grep 10.20.30.201 /var/ossec/logs/alerts/alerts.json 2>/dev/null |
    tail -3
  risk_level: low
  bastion_prompt: siem VM의 wazuh alerts.json에서 10.20.30.201 관련 최근 alert를 보여줘
- order: 5
  instruction: web VM의 ossec.conf 에서 modsec_audit.log 수집 설정을 확인하시오.
  hint: grep modsec_audit ossec.conf
  category: survey
  points: 10
  answer: sudo grep -B1 -A2 modsec_audit /var/ossec/etc/ossec.conf 2>/dev/null | head
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: web VM의 ossec.conf 에서 modsec_audit.log
    수집 설정을 확인하시오.'
  verify:
    type: output_contains
    expect: modsec
    field: stdout
  target_vm: web
  script: sudo grep -B1 -A2 modsec_audit /var/ossec/etc/ossec.conf 2>/dev/null | head
  risk_level: low
  bastion_prompt: web VM ossec.conf에서 modsec_audit.log 수집 localfile 설정을 보여줘
- order: 6
  instruction: attacker VM에서 '<script>alert(1)</script>' payload로 web VM에 요청을 보내 전체
    체인을 트리거하시오.
  hint: curl …
  category: verify
  points: 10
  answer: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/?q=%3Cscript%3Ealert(1)%3C%2Fscript%3E'
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: attacker VM에서 ''<script>alert(1)</script>''
    payload로 web VM에 요청을 보내 전체 체인을 트리거하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: attacker
  script: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/?q=%3Cscript%3Ealert(1)%3C%2Fscript%3E'
  risk_level: medium
  bastion_prompt: attacker VM에서 web VM으로 <script>alert(1)</script> XSS 요청을 보내줘
- order: 7
  instruction: siem VM alerts.json 에서 XSS 또는 Cross-Site 관련 이벤트를 검색하시오.
  hint: grep -i xss alerts.json
  category: analysis
  points: 10
  answer: sudo grep -iE 'XSS|Cross-Site|script' /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail -3
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: siem VM alerts.json 에서 XSS 또는
    Cross-Site 관련 이벤트를 검색하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: sudo grep -iE 'XSS|Cross-Site|script' /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail -3
  risk_level: low
  bastion_prompt: siem VM wazuh alerts.json에서 XSS/Cross-Site 관련 이벤트 최근 3건을 찾아줘
- order: 8
  instruction: secu VM nftables 의 전체 테이블 목록에서 filter/blocklist/cti_ips 관련 상태를 확인하시오.
  hint: nft list tables
  category: analysis
  points: 10
  answer: sudo nft list tables
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM nftables 의 전체 테이블 목록에서
    filter/blocklist/cti_ips 관련 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: filter
    field: stdout
  target_vm: secu
  script: sudo nft list tables
  risk_level: low
  bastion_prompt: secu VM의 nftables 전체 테이블 목록을 보여줘
- order: 9
  instruction: secu VM의 Suricata 서비스와 wazuh-agent 서비스 모두 active 인지 확인하시오.
  hint: systemctl is-active …
  category: verify
  points: 10
  answer: systemctl is-active suricata wazuh-agent 2>&1
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM의 Suricata 서비스와 wazuh-agent
    서비스 모두 active 인지 확인하시오.'
  verify:
    type: output_contains
    expect: active
    field: stdout
  target_vm: secu
  script: systemctl is-active suricata wazuh-agent 2>&1
  risk_level: low
  bastion_prompt: secu VM에서 suricata와 wazuh-agent 서비스 상태를 동시에 확인해줘
- order: 10
  instruction: siem VM alerts.json 의 최근 100건에서 rule.level 별 분포를 집계하시오.
  hint: jq '.rule.level' …
  category: reporting
  points: 10
  answer: sudo tail -100 /var/ossec/logs/alerts/alerts.json 2>/dev/null | jq -r '.rule.level'
    2>/dev/null | sort | uniq -c
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: siem VM alerts.json 의 최근 100건에서
    rule.level 별 분포를 집계하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: sudo tail -100 /var/ossec/logs/alerts/alerts.json 2>/dev/null | jq -r '.rule.level'
    2>/dev/null | sort | uniq -c
  risk_level: low
  bastion_prompt: siem VM wazuh alerts.json 최근 100건에서 rule.level 별 분포를 집계해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  answer: ''
  answer_detail: ''
  risk_level: low
  bastion_prompt: 'secu/web/siem VM 전반에 대해 다음 작업들을 순서대로 수행해줘:

    1) secu VM의 suricata eve.json 파일 존재·크기를 확인해줘

    2) secu VM에 wazuh-agent가 동작 중인지 확인해줘

    3) secu VM ossec.conf에서 eve.json 을 수집하는 localfile 설정을 보여줘

    4) siem VM의 wazuh alerts.json에서 10.20.30.201 관련 최근 alert를 보여줘

    5) web VM ossec.conf에서 modsec_audit.log 수집 localfile 설정을 보여줘'
