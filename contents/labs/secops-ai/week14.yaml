- order: 3
  instruction: SSH 브루트포스 자동 차단 스크립트를 작성하시오.
  hint: auth.log에서 실패 횟수를 카운트하고 nftables로 차단하세요.
  category: auto_response
  points: 15
  answer: "echo '#!/bin/bash\nTHRESHOLD=10\nLOG=/var/log/auth.log\necho \"=== SSH 브루트포스 자동 차단 ===\"\nsudo grep \"Failed password\" $LOG 2>/dev/null | awk \"{print \\$(NF-3)}\" | sort | uniq -c | sort -rn\
    \ | while read count ip; do\n  if [ \"$count\" -gt $THRESHOLD ]; then\n    echo \"차단: $ip ($count회 실패)\"\n  fi\ndone\necho \"자동 차단 스크립트 완료\"' > /tmp/auto_block.sh && bash /tmp/auto_block.sh"
  answer_detail: 자동 차단 스크립트는 SOAR의 기본 개념으로, 탐지-판단-대응을 자동화합니다.
  verify:
    type: output_contains
    expect: 자동 차단 스크립트 완료
    field: stdout
  script: "echo '#!/bin/bash\nTHRESHOLD=10\nLOG=/var/log/auth.log\necho \"=== SSH 브루트포스 자동 차단 ===\"\nsudo grep \"Failed password\" $LOG 2>/dev/null | awk \"{print \\$(NF-3)}\" | sort | uniq -c | sort -rn\
    \ | while read count ip; do\n  if [ \"$count\" -gt $THRESHOLD ]; then\n    echo \"차단: $ip ($count회 실패)\"\n  fi\ndone\necho \"자동 차단 스크립트 완료\"' > /tmp/auto_block.sh && bash /tmp/auto_block.sh"
  risk_level: low
- order: 4
  instruction: 파일 무결성 자동 점검 스크립트를 작성하시오.
  hint: 주요 파일의 해시를 비교하세요.
  category: automation
  points: 12
  answer: "echo '#!/bin/bash\nBASELINE=/tmp/baseline_hashes.txt\nCURRENT=/tmp/current_hashes.txt\nFILES=\"/usr/bin/ssh /usr/bin/sudo /usr/bin/passwd\"\nfor f in $FILES; do sha256sum $f 2>/dev/null; done\
    \ > $CURRENT\nif [ -f $BASELINE ]; then\n  diff $BASELINE $CURRENT && echo \"무결성: 정상\" || echo \"경고: 변조 탐지\"\nelse\n  cp $CURRENT $BASELINE\n  echo \"기준선 생성 완료\"\nfi' > /tmp/integrity_check.sh && bash\
    \ /tmp/integrity_check.sh"
  answer_detail: 기준선 해시와 현재 해시를 비교하여 파일 변조를 자동 탐지합니다.
