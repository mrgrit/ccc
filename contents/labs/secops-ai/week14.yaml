lab_id: secops-ai-week14
title: 통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계 (AI 지원)
version: ai
course: secops-ai
week: 14
description: 각 보안 솔루션의 이벤트가 Wazuh SIEM으로 수렴되고 CTI와 연계되는 흐름을 점검한다.
difficulty: hard
duration_minutes: 120
objectives:
- Suricata → Wazuh 로 eve.json 이 수집되는지 확인한다
- ModSecurity → Wazuh 감사 로그 수집 경로를 확인한다
- CTI → nftables 차단 체인까지 이어지는 end-to-end 흐름을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'secu VM에서 suricata eve.json 이 /var/log/suricata/eve.json 으로 기록되는지
    확인하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week14/1/eve.json 사전 주입. `jq
    -c ''.alert'' /home/ccc/cyber-range/fixtures/secops-ai-week14/1/eve.json` 후 (1)
    빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: ls -la /var/log/suricata/eve.json
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata eve.json 파일 존재·크기를 확인해줘

    📎 참고 (CLI): sudo ls -la /var/log/suricata/eve.json 2>/dev/null'
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM에서 suricata eve.json 이
    /var/log/suricata/eve.json 으로 기록되는지 확인하시오.'
  verify:
    type: output_contains
    expect: eve.json
    field: stdout
    semantic:
      intent: Suricata eve.json 존재·크기 확인 — sudo ls -la /var/log/suricata/eve.json.
        통합 아키텍처 소스 1단계 - IDS 이벤트 원본 파일. 파일 크기 = Suricata 가 생성한 이벤트 량, mtime = 최근 이벤트
        시각. 파일 없음 = Suricata 비활성 또는 log config 오류. logrotate 설정 /etc/logrotate.d/suricata
        에 따라 rotate 발생
      success_criteria:
      - ls -la eve.json 실행
      - 파일 size·mtime 출력
      - eve.json 키워드 포함
      acceptable_methods:
      - sudo ls -la /var/log/suricata/eve.json
      - sudo stat /var/log/suricata/eve.json
      - sudo du -sh /var/log/suricata/
      - sudo find /var/log/suricata -name *.json -mmin -5
      - sudo wc -l eve.json
      - |
        **[OSS] ls/stat (메타정보 종합)** — 표준.
          # 1. 크기 + mtime + 권한
          sudo ls -la /var/log/suricata/eve.json
          # 2. 정밀 stat (atime/mtime/ctime + inode)
          sudo stat /var/log/suricata/eve.json
          # 3. mtime 기준 최근 5분 내 갱신된 *.json
          sudo find /var/log/suricata -name '*.json' -mmin -5
          # 4. 줄 수 + 디스크 사용량
          sudo wc -l /var/log/suricata/eve.json
          sudo du -sh /var/log/suricata/
        예상 출력 `-rw-r----- 1 root root 12M /var/log/suricata/eve.json (mtime: 2분 전) / 5,234 lines`.
        운영 해석: 크기·mtime·줄수 = Suricata 가 활발히 기록 중. 0byte 또는 오래된 mtime = 비활성.
      - |
        **[OSS] inotifywait (파일 변경 실시간 감지)** — 모니터링.
          # 1. 설치
          sudo apt install -y inotify-tools
          # 2. eve.json 변경 실시간 감시 (10초)
          sudo timeout 10 inotifywait -m -e modify /var/log/suricata/eve.json
          # 3. 변경 빈도 = Suricata 활성도
          sudo timeout 30 inotifywait -m -e modify --timefmt '%H:%M:%S' --format '%T %e' /var/log/suricata/eve.json | wc -l
          # 4. 변경 멈추면 alert
          sudo inotifywatch -t 60 /var/log/suricata/eve.json
        예상 출력 `MODIFY 변경 12회/30초 → 활성 / 0회 → 의심`.
        운영 해석: 파일 크기 변화 빈도 = 트래픽 활동도. 변경 멈춤 = Suricata 정지·NIC 변경.
      - |
        **[OSS] tail -F + jq (실시간 stream)** — 살아있음 검증.
          # 1. 최근 5건 기다리며 표시 (timeout 으로 제한)
          sudo timeout 10 tail -F /var/log/suricata/eve.json | head -5
          # 2. alert 만 필터
          sudo timeout 15 tail -F /var/log/suricata/eve.json | jq -c 'select(.event_type=="alert")'
          # 3. event_type 별 빈도 (최근 1000건)
          sudo tail -1000 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c
        예상 출력 `123 flow / 45 dns / 12 alert / 5 tls`.
        운영 해석: event_type 분포 = Suricata 가 무엇을 수집 중인가. alert 0 = 룰 미매칭.
      - |
        **[OSS] suricatasc (Suricata socket control)** — 내부 상태.
          # 1. socket 경로
          sudo ls -la /var/run/suricata/suricata-command.socket
          # 2. uptime + 버전
          sudo suricatasc -c uptime
          sudo suricatasc -c version
          # 3. 실시간 stats (memcap/drop)
          sudo suricatasc -c iface-stat-dump
          sudo suricatasc -c memcap-list
          # 4. 룰 reload 가능
          sudo suricatasc -c reload-rules
        예상 출력 `uptime: 2h / version: 7.0.x / packets received: 12345 / drops: 0`.
        운영 해석: process internal 상태. drops 증가 = NIC 또는 worker 부하.
      - |
        **[OSS] logrotate + journalctl (rotate 이력)** — 운영.
          # 1. logrotate 설정
          cat /etc/logrotate.d/suricata
          # 2. logrotate dry-run
          sudo logrotate -d /etc/logrotate.d/suricata
          # 3. rotate 이력
          ls -la /var/log/suricata/*.gz /var/log/suricata/*.1 2>/dev/null
          # 4. systemd journal 의 Suricata 시작·정지 이력
          sudo journalctl -u suricata --since '24h ago' | grep -E 'Started|Stopped|Reload'
        예상 출력 `daily / rotate 7 / suricata-2026-05-04.log.gz / Started 2026-05-04 ...`.
        운영 해석: rotate 정상 = 디스크 충만 회피. 잦은 restart 는 의심.
      negative_signs:
      - 다른 경로
      - 파일 없는데 정상 판정
      - 권한 에러 무시
  target_vm: secu
  script: sudo ls -la /var/log/suricata/eve.json 2>/dev/null
  risk_level: low
  bastion_prompt: 'secu VM의 suricata eve.json 파일 존재·크기를 확인해줘


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week14/1/eve.json 사전 주입. `jq
    -c ''.alert'' /home/ccc/cyber-range/fixtures/secops-ai-week14/1/eve.json` 후 (1)빈도·패턴
    (2)MITRE (3)방어 3섹션. raw dump 금지.'
  fixtures:
  - generator: suricata_alert
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/secops-ai-week14/1/eve.json
    params:
      seed: 42
      duration_days: 7
      alerts_per_day: 30
      c2_beacon_count: 12
      metadata_attempt_count: 4
    mode: overwrite
    cleanup: false
- order: 2
  instruction: secu VM에 wazuh-agent 가 설치되어 있는지 확인하시오.
  hint: systemctl is-active wazuh-agent
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM에 wazuh-agent가 동작 중인지 확인해줘

    📎 참고 (CLI): systemctl is-active wazuh-agent || /var/ossec/bin/wazuh-control status
    2>/dev/null | head'
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM에 wazuh-agent 가 설치되어 있는지
    확인하시오.'
  verify:
    type: output_contains
    expect: wazuh
    field: stdout
    semantic:
      intent: secu VM 의 wazuh-agent 동작 확인 — systemctl is-active wazuh-agent || /var/ossec/bin/wazuh-control
        status. wazuh-agent 는 Manager 로 로그 전송하는 client. secu VM 에 agent 있어야 Suricata
        eve.json → Wazuh Manager → alerts.json 파이프라인 완성. agent 없으면 Suricata 이벤트가 SIEM
        에 집계 안 됨. |\| fallback 으로 control 명령 시도
      success_criteria:
      - wazuh-agent 상태 확인
      - active 또는 wazuh 문자열
      - '|| fallback 로 wazuh-control'
      acceptable_methods:
      - systemctl is-active wazuh-agent || /var/ossec/bin/wazuh-control status
      - ps auxf | grep wazuh-agentd
      - /var/ossec/bin/agent_control -l(manager 에서)
      - curl Manager API GET /agents?name=secu
      - |
        **[OSS] systemctl + wazuh-control (이중 검증)** — 표준.
          # 1. systemd unit 상태
          systemctl is-active wazuh-agent && echo "ACTIVE" || echo "DOWN"
          # 2. wazuh 자체 control (RC + status text)
          sudo /var/ossec/bin/wazuh-control status
          # 3. 종합 (둘 다 OK 여야 정상)
          systemctl is-active wazuh-agent && sudo /var/ossec/bin/wazuh-control status | grep -E 'wazuh-agentd is running|wazuh-execd is running'
          # 4. 마지막 시작 시각
          systemctl show wazuh-agent --property=ActiveEnterTimestamp
        예상 출력 `ACTIVE / wazuh-agentd is running / wazuh-execd is running`.
        운영 해석: systemctl + wazuh-control 둘 다 정상 = 운영 ready. 한쪽만 OK 면 부분 fail.
      - |
        **[OSS] ps + journalctl (process + log 추적)** — 진단.
          # 1. wazuh agent process tree
          ps auxf | grep wazuh- | grep -v grep
          # 2. process 별 메모리·CPU
          ps -o pid,comm,rss,pcpu --pid $(pgrep wazuh-agentd) 2>/dev/null
          # 3. 최근 1시간 로그
          sudo journalctl -u wazuh-agent --since '1h ago' --no-pager | tail -20
          # 4. error 만
          sudo journalctl -u wazuh-agent --since '24h ago' | grep -iE 'error|fail'
        예상 출력 `wazuh-agentd PID 1234 RSS 12MB / Started agent / no errors`.
        운영 해석: process + log 통합. agent crash 시 즉시 진단.
      - |
        **[OSS] Wazuh Manager API (중앙 조회)** — manager 측.
          # 1. token 획득 (manager 측에서)
          # ssh ccc@10.20.30.100
          TOKEN=$(curl -sk -u admin:<pass> -X POST 'https://10.20.30.100:55000/security/user/authenticate?raw=true')
          # 2. agent 목록 (secu 만)
          curl -sk -H "Authorization: Bearer $TOKEN" 'https://10.20.30.100:55000/agents?name=secu' | jq .data.affected_items
          # 3. agent 마지막 keepalive (활성도)
          curl -sk -H "Authorization: Bearer $TOKEN" 'https://10.20.30.100:55000/agents?name=secu' | jq '.data.affected_items[0] | {id, status, lastKeepAlive}'
          # 4. group 정보
          curl -sk -H "Authorization: Bearer $TOKEN" 'https://10.20.30.100:55000/agents/<id>/group/is_sync' | jq .
        예상 출력 `id=001 status=active lastKeepAlive=2분전`.
        운영 해석: manager 가 agent 인식 = 통신 정상. lastKeepAlive 30초 이상 = disconnected.
      - |
        **[OSS] /var/ossec/queue/sockets (IPC 검증)** — 내부.
          # 1. queue/socket 디렉토리
          sudo ls -la /var/ossec/queue/sockets/
          # 2. 각 socket 의 최근 활동
          sudo ls -la /var/ossec/queue/sockets/queue
          sudo ls -la /var/ossec/queue/sockets/agentd
          # 3. agent buffer 가득 (Manager 통신 끊김 시)
          sudo cat /var/ossec/var/run/wazuh-agentd.state 2>/dev/null
          # 4. 통계 (수집·전송)
          sudo grep -E 'msg_sent|msg_buffered' /var/ossec/var/run/wazuh-agentd.state 2>/dev/null
        예상 출력 `socket queue 0 byte / msg_sent 12345 msg_buffered 0`.
        운영 해석: msg_buffered > 0 = Manager 통신 지연. 사고 진단의 핵심 지표.
      - |
        **[OSS] Prometheus wazuh_exporter** — 메트릭화.
          # 1. exporter 설치 (wazuh-exporter)
          docker run -d --name wazuh-exporter -p 9097:9097 \
            -e WAZUH_API_URL=https://10.20.30.100:55000 -e WAZUH_USER=admin -e WAZUH_PASS=<pass> \
            wazuh/exporter:latest
          # 2. 메트릭 확인
          curl -sS http://localhost:9097/metrics | grep wazuh_agent_status
          # 3. Prometheus rule (agent down 알림)
          # - alert: WazuhAgentDown
          #   expr: wazuh_agent_status{status="active"} == 0
          #   for: 5m
          # 4. Grafana dashboard
        예상 출력 `wazuh_agent_status{name="secu",status="active"} 1`.
        운영 해석: 시계열 모니터 + alert. 50개 agent 의 상태 동시 관리.
      negative_signs:
      - wazuh-manager 와 혼동
      - fallback 누락
      - agent 아닌 서비스
  target_vm: secu
  script: systemctl is-active wazuh-agent || /var/ossec/bin/wazuh-control status 2>/dev/null
    | head
  risk_level: low
  bastion_prompt: secu VM에 wazuh-agent가 동작 중인지 확인해줘
- order: 3
  instruction: 'secu VM 의 ossec.conf 에서 eve.json 을 수집하는 <localfile> 설정을 확인하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week14/3/eve.json 사전 주입. `jq
    -c ''.alert'' /home/ccc/cyber-range/fixtures/secops-ai-week14/3/eve.json` 후 (1)
    빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: grep eve.json /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM ossec.conf에서 eve.json 을 수집하는 localfile 설정을 보여줘

    📎 참고 (CLI): sudo grep -A2 -B1 eve.json /var/ossec/etc/ossec.conf 2>/dev/null |
    head'
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM 의 ossec.conf 에서 eve.json
    을 수집하는 <localfile> 설정을 확인하시오.'
  verify:
    type: output_contains
    expect: eve.json
    field: stdout
    semantic:
      intent: 'Wazuh agent ossec.conf 의 Suricata eve.json <localfile> 확인 — sudo grep
        -A2 -B1 eve.json /var/ossec/etc/ossec.conf | head. agent 가 모니터링할 파일 목록에 Suricata
        로그 포함 여부. 예: <localfile> <log_format>json</log_format> <location>/var/log/suricata/eve.json</location>
        </localfile>. -B1 로 log_format, -A2 로 location 까지 컨텍스트. 미설정 시 Suricata 이벤트
        수집 안 됨'
      success_criteria:
      - grep eve.json ossec.conf 실행
      - <localfile> context 포함
      - json/syslog 로그 포맷 확인
      acceptable_methods:
      - sudo grep -A2 -B1 eve.json ossec.conf
      - sudo xmllint --xpath //ossec_config/localfile ossec.conf
      - sudo awk /<localfile>/,/<\/localfile>/ ossec.conf | grep eve
      - Wazuh agent group configuration via API
      - |
        **[OSS] grep + 컨텍스트 (eve.json localfile)** — 표준.
          # 1. eve.json 주변 컨텍스트
          sudo grep -B1 -A2 eve.json /var/ossec/etc/ossec.conf
          # 2. 모든 <localfile> 블록 dump
          sudo awk '/<localfile>/,/<\/localfile>/' /var/ossec/etc/ossec.conf
          # 3. log_format json 확인 (eve.json 은 json 포맷이어야 함)
          sudo grep -B1 'eve.json' /var/ossec/etc/ossec.conf | grep log_format
        예상 출력 `<localfile><log_format>json</log_format><location>/var/log/suricata/eve.json</location></localfile>`.
        운영 해석: log_format json 필수 - syslog 면 Suricata 의 JSON 구조 못 파싱.
      - |
        **[OSS] xmllint (XML 정밀 파싱)** — 표준.
          # 1. ossec.conf 의 모든 localfile XPath
          sudo xmllint --xpath '//ossec_config/localfile/location/text()' /var/ossec/etc/ossec.conf
          # 2. eve.json 인 localfile 블록만
          sudo xmllint --xpath '//localfile[location="/var/log/suricata/eve.json"]' /var/ossec/etc/ossec.conf 2>/dev/null
          # 3. log_format 검증
          sudo xmllint --xpath 'string(//localfile[contains(location,"eve.json")]/log_format)' /var/ossec/etc/ossec.conf
          # 4. ossec.conf syntax 검증
          sudo xmllint --noout /var/ossec/etc/ossec.conf && echo "VALID XML"
        예상 출력 `json / VALID XML`.
        운영 해석: grep 보다 정확. XML 구조 보장. 자동화·CI 권장.
      - |
        **[OSS] yq + 변환 (XML→YAML 친화)** — 가독성.
          # 1. yq 로 XML 파싱 (xq 모드)
          sudo apt install -y yq
          sudo cat /var/ossec/etc/ossec.conf | xq '.ossec_config.localfile[] | select(.location // "" | contains("eve.json"))'
          # 2. log_format 만 추출
          sudo cat /var/ossec/etc/ossec.conf | xq -r '.ossec_config.localfile[]? | select(.location // "" | contains("eve.json")) | .log_format'
          # 3. 모든 localfile 의 location 목록
          sudo cat /var/ossec/etc/ossec.conf | xq -r '.ossec_config.localfile[]?.location // empty'
        예상 출력 `{"location":"/var/log/suricata/eve.json","log_format":"json"} / json`.
        운영 해석: jq 익숙한 분석가에게 친화. JSON 으로 변환해 dashboard 통합.
      - |
        **[OSS] Wazuh API agent config 조회** — 중앙.
          # 1. token (manager 측에서)
          T=$(curl -sk -u admin:<pass> -X POST 'https://10.20.30.100:55000/security/user/authenticate?raw=true')
          # 2. agent 의 active configuration 조회
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/agents/001/config/syscheck/syscheck' | jq .
          # 3. localfile 설정 (logcollector)
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/agents/001/config/logcollector/localfile' | jq '.data.localfile[] | select(.file | contains("eve.json"))'
          # 4. group config 와 동일한지
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/agents/001/group/is_sync' | jq .
        예상 출력 `{"file":"/var/log/suricata/eve.json","logformat":"json"}`.
        운영 해석: agent 측 ossec.conf + 활성 config 동기화 검증. group 미동기화 = 설정 미적용.
      - |
        **[OSS] Wazuh Dashboard (Management → Configuration)** — UI.
          # 1. 브라우저 → https://10.20.30.100 → 로그인
          # 2. Management → Configuration → Agents → secu (id=001) 선택
          # 3. Wazuh agent 카드 → Modules → Log collection → Files
          # 4. /var/log/suricata/eve.json 항목 확인 (json log_format)
          # 5. CLI 검증
          T=$(curl -sk -u admin:<pass> -X POST 'https://10.20.30.100:55000/security/user/authenticate?raw=true')
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/agents/001/config/logcollector/localfile' | jq -r '.data.localfile[] | "\(.file)\t\(.logformat)"' | column -t
        UI 동작: agent 별 모니터링 파일 목록 + status.
