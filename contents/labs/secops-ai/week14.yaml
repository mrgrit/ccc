  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata와 wazuh-agent 서비스 상태를 동시에 확인해줘

    📎 참고 (CLI): systemctl is-active suricata wazuh-agent 2>&1'
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM의 Suricata 서비스와 wazuh-agent 서비스 모두 active 인지
