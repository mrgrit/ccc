    \ > $CURRENT\nif [ -f $BASELINE ]; then\n  diff $BASELINE $CURRENT && echo \"무결성: 정상\" || echo \"경고: 변조 탐지\"\nelse\n  cp $CURRENT $BASELINE\n  echo \"기준선 생성 완료\"\nfi' > /tmp/integrity_check.sh && bash\
