  answer: "echo '#!/bin/bash\nsend_alert() {\n  SEVERITY=$1\n  MESSAGE=$2\n  TIMESTAMP=$(date -Iseconds)\n  echo \"{\\\"severity\\\":\\\"$SEVERITY\\\",\\\"message\\\":\\\"$MESSAGE\\\",\\\"time\\\":\\\"\
