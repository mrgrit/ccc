  risk_level: low
- order: 2
  instruction: 패스워드 정책 자동 점검 함수를 구현하시오.
  hint: pwquality.conf 값을 파싱하여 기준과 비교하세요.
  category: automation
  points: 10
  answer: "echo '#!/bin/bash\ncheck_password_policy() {\n  MINLEN=$(grep -oP \"minlen = \\K\\d+\" /etc/security/pwquality.conf 2>/dev/null || echo 0)\n  if [ \"$MINLEN\" -ge 12 ]; then\n    echo \"PASS:\
    \ 패스워드 최소길이 $MINLEN (기준: 12)\"\n  else\n    echo \"FAIL: 패스워드 최소길이 $MINLEN (기준: 12)\"\n  fi\n}\ncheck_password_policy' > /tmp/check_pwd.sh && bash /tmp/check_pwd.sh"
  answer_detail: 자동 점검 함수는 설정 값을 파싱하고 기준값과 비교하여 PASS/FAIL을 판정합니다.
  verify:
    type: output_contains
    expect: 패스워드 최소길이
    field: stdout
  script: "echo '#!/bin/bash\ncheck_password_policy() {\n  MINLEN=$(grep -oP \"minlen = \\K\\d+\" /etc/security/pwquality.conf 2>/dev/null || echo 0)\n  if [ \"$MINLEN\" -ge 12 ]; then\n    echo \"PASS:\
    \ 패스워드 최소길이 $MINLEN (기준: 12)\"\n  else\n    echo \"FAIL: 패스워드 최소길이 $MINLEN (기준: 12)\"\n  fi\n}\ncheck_password_policy' > /tmp/check_pwd.sh && bash /tmp/check_pwd.sh"
