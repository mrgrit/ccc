  hint: nft list set inet filter cti_ips
  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM filter.cti_ips set의 원소 목록을 확인해줘

    📎 참고 (CLI): sudo nft list set inet filter cti_ips'
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: 작성한 cti_ips set의 현재 원소를 확인하시오.'
  verify:
    type: output_contains
    expect: cti_ips
    field: stdout
    semantic:
      intent: 'cti_ips set 내용 확인 — sudo nft list set inet filter cti_ips. 현재 set 에
        등록된 element 수 확인. 출력: set cti_ips { type ipv4_addr; elements = { ip1, ip2,
        ip3 } }. 빈 set 이면 elements 생략. timeout 설정 시 elements = { ip1 expires Nhms
        } 형태로 남은 시간 표시. 대용량 set(수천 IP) 은 출력 길 수 있음 - counter 확인은 nft list sets'
      success_criteria:
      - nft list set inet filter cti_ips 실행
      - set 구조 출력
      - cti_ips 키워드 포함
      acceptable_methods:
      - sudo nft list set inet filter cti_ips
      - sudo nft -j list set inet filter cti_ips | jq
      - sudo nft list sets 로 모든 set 요약
      - sudo ipset list cti_ips(ipset 대체)
      negative_signs:
      - 다른 set 확인
      - 출력 구조 이해 없이 실행
      - 비어있을 때 정상 판정
  target_vm: secu
  script: sudo nft list set inet filter cti_ips
  risk_level: low
  bastion_prompt: secu VM filter.cti_ips set의 원소 목록을 확인해줘
