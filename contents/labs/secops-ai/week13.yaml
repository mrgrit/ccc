      RESP=$(curl -sX POST "$OPENCTI_URL" \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{"query": "{ indicators(first: 200, filters: {mode: and, filters: [{key: \"x_opencti_main_observable_type\", values: [\"IPv4-Addr\"]}], filterGroups: []}) { edges { node { pattern } } } }"}')

      # 2. jq 로 [ipv4-addr:value = 'X'] pattern 에서 IP 추출
      IPS=$(echo "$RESP" | jq -r '.data.indicators.edges[]?.node.pattern' \
            | grep -oE "'[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}'" \
            | tr -d \')

      if [ -z "$IPS" ]; then
