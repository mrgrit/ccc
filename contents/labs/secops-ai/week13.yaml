lab_id: secops-ai-week13
title: 컴플라이언스 실습 (AI 지원)
version: ai
course: secops-ai
week: 13
description: ISMS-P, PCI-DSS, GDPR 등 주요 보안 컴플라이언스 프레임워크의 기술적 요구사항을 점검합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 주요 컴플라이언스 프레임워크의 기술적 요구사항을 이해한다
- 컴플라이언스 점검을 자동화한다
- 증빙 자료를 수집하고 문서화한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 10.20.30.1 서버에서 ISMS-P 2.6.1 접근통제 요구사항을 점검하시오.
  hint: 패스워드 정책, 계정 잠금 정책을 확인하세요.
  category: compliance
  points: 10
  answer: echo '[ISMS-P 2.6.1 접근통제]' && grep -E '(minlen|ucredit|lcredit|dcredit)'
    /etc/security/pwquality.conf 2>/dev/null && grep PASS_MAX_DAYS /etc/login.defs
    && echo 'ISMS-P 접근통제 점검 완료'
  answer_detail: ISMS-P 2.6.1은 식별/인증, 접근권한 관리, 접근통제 영역을 요구합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: secu
  script: echo '[ISMS-P 2.6.1 접근통제]' && grep -E '(minlen|ucredit|lcredit|dcredit)'
    /etc/security/pwquality.conf 2>/dev/null && grep PASS_MAX_DAYS /etc/login.defs
    && echo 'ISMS-P 접근통제 점검 완료'
  risk_level: low
  bastion_prompt: 10.20.30.1 서버에서 ISMS-P 2.6.1 접근통제 요구사항을 점검해줘
- order: 2
  instruction: 개인정보 암호화 요구사항(ISMS-P 2.7.1)을 점검하시오.
  hint: DB 연결 암호화, 파일 암호화 상태를 확인하세요.
  category: compliance
  points: 10
  answer: echo '[암호화 점검]' && openssl version && echo '[TLS 설정]' && grep -r 'ssl' /etc/postgresql/
    2>/dev/null | head -5 && echo 'ISMS-P 암호화 점검 완료'
  answer_detail: ISMS-P 2.7.1은 개인정보의 전송 시 암호화와 저장 시 암호화를 요구합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: secu
  script: echo '[암호화 점검]' && openssl version && echo '[TLS 설정]' && grep -r 'ssl' /etc/postgresql/
    2>/dev/null | head -5 && echo 'ISMS-P 암호화 점검 완료'
  risk_level: low
  bastion_prompt: 개인정보 암호화 요구사항(ISMS-P 2.7.1)을 점검해줘
- order: 3
  instruction: 로그 관리 요구사항(ISMS-P 2.9.4)을 점검하시오.
  hint: 감사 로그 설정, 보존 기간, 무결성 보호를 확인하세요.
  category: compliance
  points: 10
  answer: echo '[로그 관리]' && sudo systemctl is-active auditd 2>/dev/null && echo '[보존
    설정]' && cat /etc/logrotate.d/rsyslog 2>/dev/null | head -5 && echo 'ISMS-P 로그
    관리 점검 완료'
  answer_detail: ISMS-P 2.9.4는 접근 기록의 저장, 보호, 점검을 요구합니다. 최소 6개월 보존이 필수입니다.
