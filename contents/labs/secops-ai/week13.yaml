  bastion_prompt: 'PCI-DSS 요구사항 2: 기본 패스워드 변경 여부를 점검해줘'
- order: 5
  instruction: 'PCI-DSS 요구사항 6: 보안 패치 적용 현황을 점검하시오.'
  hint: 미적용 보안 패치 목록을 확인하세요.
  category: compliance
  points: 10
  answer: echo '[PCI-DSS Req 6 패치]' && apt list --upgradable 2>/dev/null | head -10
    && echo 'PCI-DSS 패치 점검 완료'
  answer_detail: PCI-DSS 요구사항 6은 알려진 취약점에 대한 보안 패치를 1개월 내 적용하도록 요구합니다.
