                      m = re.search(r"'([0-9.]+)'", str(evt.get('data',{})))
                      if m and not evt.get('data',{}).get('revoked'):
                          subprocess.run(['sudo','nft','add','element','inet','filter','cti_ips','{ %s }' % m.group(1)])
                  elif evt.get('type') == 'delete':
                      m = re.search(r"'([0-9.]+)'", str(evt.get('data',{})))
                      if m:
                          subprocess.run(['sudo','nft','destroy','element','inet','filter','cti_ips','{ %s }' % m.group(1)])
          PY
          sudo chmod +x /usr/local/bin/cti-stream.py
          # 2. systemd service 로 영구 실행
          sudo tee /etc/systemd/system/cti-stream.service > /dev/null <<EOF
          [Unit]
          Description=OpenCTI live stream → nft
          After=network-online.target
          [Service]
          ExecStart=/usr/local/bin/cti-stream.py
          Restart=always
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl enable --now cti-stream
