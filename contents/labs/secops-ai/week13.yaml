- order: 99
  instruction: |
    [복합 시나리오] "OpenCTI → nft 자동 동기화 — 수동 1건 → 자동 N건 파이프라인"

    ## 상황 (w01-w12 시나리오 연속)

    ABC 핀테크 SOC 신규 분석가, 13주 차.
    1~10 step 으로 OpenCTI graphql 응답 + nft cti_ips set 작성 + IP *수동 1건* 주입까지.
    학습 목표 #4 — *"OpenCTI 데이터를 실제 보안 운영에 활용할 수 있다"* — 1~10 은 *수동 1건*.
    실무는 OpenCTI 의 *전체 indicator* 를 주기적으로 query → nft 자동 sync.

    > 선임: "운영 SOC 는 IoC 가 하루 수백~수천 건 들어와. 1~10 처럼 손으로 IP 하나씩 nft set
    >  에 넣으면 운영 안 돼. graphql query 로 OpenCTI 의 *모든 active IP indicator* 추출 →
    >  jq 로 IP 만 파싱 → nft set 갱신 — 이걸 5분 cron 으로 돌리면 돼. 한 번 작성해보고
    >  IP 추가 → query → nft set 반영 까지 cycle 직접 봐."

    학습 목표 #4 (CTI 보안 운영 활용) 행동 증명.

    ## 임무 (3 단계, 약 25분)

    ### Phase A — OpenCTI 에 다수 indicator 추가 (5분)

    w12 의 admin token 재사용. graphql 으로 5개 IP indicator 일괄 추가:
      ```
      OPENCTI_TOKEN="<.env 의 OPENCTI_ADMIN_TOKEN>"
      OPENCTI_URL=http://10.20.30.100:8080/graphql

      for ip in 198.51.100.10 198.51.100.20 198.51.100.30 198.51.100.40 198.51.100.50; do
        curl -sX POST "$OPENCTI_URL" \
          -H "Authorization: Bearer $OPENCTI_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"query\": \"mutation { indicatorAdd(input: {name: \\\"CTI test $ip\\\", pattern: \\\"[ipv4-addr:value = '$ip']\\\", pattern_type: \\\"stix\\\", x_opencti_main_observable_type: \\\"IPv4-Addr\\\"}) { id name } }\"}" \
          | jq -c '.data.indicatorAdd | {id, name}'
      done
      ```
    → 예상: 5건 indicator 추가 (id + name 응답).

    ### Phase B — Sync script 작성 + 실행 (15분)

    secu 에 동기화 script:
      ```
      sudo tee /usr/local/bin/cti-sync.sh > /dev/null <<'EOF'
      #!/usr/bin/env bash
      # OpenCTI graphql → nft set cti_ips 동기화
      set -euo pipefail
      OPENCTI_TOKEN="${OPENCTI_TOKEN:?need OPENCTI_TOKEN}"
      OPENCTI_URL="${OPENCTI_URL:-http://10.20.30.100:8080/graphql}"

      # 1. OpenCTI graphql 으로 모든 IPv4 indicator pattern 조회
      RESP=$(curl -sX POST "$OPENCTI_URL" \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{"query": "{ indicators(first: 200, filters: {mode: and, filters: [{key: \"x_opencti_main_observable_type\", values: [\"IPv4-Addr\"]}], filterGroups: []}) { edges { node { pattern } } } }"}')

      # 2. jq 로 [ipv4-addr:value = 'X'] pattern 에서 IP 추출
      IPS=$(echo "$RESP" | jq -r '.data.indicators.edges[]?.node.pattern' \
            | grep -oE "'[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}'" \
            | tr -d \')

      if [ -z "$IPS" ]; then
        echo "no IP indicators found"
        exit 0
      fi

      # 3. nft 의 cti_ips set 비우고 새 IP 들 일괄 입력 (atomic)
      sudo nft -- flush set inet filter cti_ips
      for ip in $IPS; do
        sudo nft add element inet filter cti_ips "{ $ip }" 2>/dev/null || true
      done

      # 4. 결과
      echo "synced $(echo "$IPS" | wc -w) IPs to cti_ips set:"
      sudo nft list set inet filter cti_ips
      EOF
      sudo chmod +x /usr/local/bin/cti-sync.sh
      ```

    실행 (Phase A 의 token 사용):
      ```
      OPENCTI_TOKEN="<token>" /usr/local/bin/cti-sync.sh
      ```
    → 예상: "synced 5 IPs" + cti_ips set 에 198.51.100.10-50 모두 등록.

    ### Phase C — 효과 검증 + cron 권장 + 정리 (5분)

    sync 후 cti_ips set 확인:
      `sudo nft list set inet filter cti_ips`
    → 예상: elements = { 198.51.100.10, 198.51.100.20, 198.51.100.30, 198.51.100.40, 198.51.100.50 }

    OpenCTI 에 indicator 추가 (Phase A 의 6번째 IP):
      ```
      curl -sX POST "$OPENCTI_URL" -H "Authorization: Bearer $OPENCTI_TOKEN" -H "Content-Type: application/json" \
        -d '{"query": "mutation { indicatorAdd(input: {name: \"CTI test 198.51.100.99\", pattern: \"[ipv4-addr:value = $\\\"198.51.100.99$\\\"]\", pattern_type: \"stix\", x_opencti_main_observable_type: \"IPv4-Addr\"}) { id } }"}'
      ```

    sync 재실행:
      `OPENCTI_TOKEN="<token>" /usr/local/bin/cti-sync.sh`
    → 예상: "synced 6 IPs" — 새 IP 즉시 반영.

    1~2 단락 회고:
    1. **수동 (1~10) vs 자동 (99) 비교** — 수동 = 1건씩 손, 자동 = sync script 1회 실행 으로 N건
    2. **운영 cron 주기 권장** — 5-15분. 너무 짧으면 OpenCTI graphql 부하, 너무 길면 신규 IoC
       반영 지연. 권장: `*/5 * * * * /usr/local/bin/cti-sync.sh`
    3. **운영 시 추가 고려 사항** — (a) flush + add 의 atomic 보장 (nft -j 또는 lock 파일)
       (b) OpenCTI 의 *score/confidence* 필터 (낮은 confidence 는 차단 X) (c) AS 화이트리스트
       (사내 IP 가 잘못 등록되어 차단되는 사고 방지)

    종료 정리:
      ```
      sudo nft -- flush set inet filter cti_ips
      sudo rm /usr/local/bin/cti-sync.sh
      # OpenCTI 의 indicator 는 그대로 (lab 영향 X)
      ```
