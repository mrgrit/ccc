  bastion_prompt: 로그 관리 요구사항(ISMS-P 2.9.4)을 점검해줘
- order: 4
  instruction: 'PCI-DSS 요구사항 2: 기본 패스워드 변경 여부를 점검하시오.'
  hint: 시스템 기본 계정의 패스워드 변경 여부를 확인하세요.
  category: compliance
  points: 10
  answer: 'echo ''[PCI-DSS Req 2]'' && sudo awk -F: ''($3 >= 1000) {print $1, $2}''
    /etc/shadow | while read u p; do echo "$u: $([ -z "$p" ] && echo ''NO_PASS'' ||
    echo ''SET'')"; done && echo ''PCI-DSS 패스워드 점검 완료'''
  answer_detail: PCI-DSS 요구사항 2는 벤더 제공 기본값(패스워드, 설정 등)을 변경하도록 요구합니다.
