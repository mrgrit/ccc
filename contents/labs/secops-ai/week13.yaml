lab_id: secops-ai-week13
title: OpenCTI 위협 인텔리전스 활용 (AI 지원)
version: ai
course: secops-ai
week: 13
description: OpenCTI에 CTI feed를 연동하고 IOC(악성 IP)를 nftables blocklist 와 연계한다.
difficulty: medium
duration_minutes: 120
objectives:
- OpenCTI GraphQL API 구조를 이해한다
- IOC를 조회해 nftables set에 주입하는 파이프라인을 설계한다
- CTI 기반 차단 룰이 적용되는 것을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpenCTI GraphQL 엔드포인트(/graphql) 가 응답하는지 확인하시오.
  hint: curl -X POST /graphql
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 OpenCTI /graphql 엔드포인트에 POST 테스트 요청을 보내 응답 코드를 보여줘

    📎 참고 (CLI): curl -sS -o /dev/null -w ''%{http_code}\n'' -X POST http://localhost:8080/graphql
    -H ''Content-Type: application/json'' -d ''{"query":"{ about { version } }"}'''
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: OpenCTI GraphQL 엔드포인트(/graphql) 가 응답하는지 확인하시오.'
  verify:
    type: output_contains
    expect:
    - OpenCTI
    - graphql
    - '200'
    - HTTP
    field: stdout
    semantic:
      intent: OpenCTI GraphQL API 응답 확인 — curl -sS -o /dev/null -w %{http_code}\n
        -X POST http://localhost:8080/graphql -H Content-Type:application/json -d
        {"query":"{ about { version } }"}. GraphQL 단일 endpoint - POST 로 모든 쿼리, body
        에 query string. about.version 은 public schema(인증 없이 접근 가능). 응답 200 + JSON
        data. 실제 CTI 조회는 Bearer token 필요. 401 Unauthorized 도 API 동작 정상 신호
      success_criteria:
      - POST /graphql 요청
      - Content-Type JSON + query body
      - HTTP 응답 코드 출력
      acceptable_methods:
      - curl -X POST http://localhost:8080/graphql -H Content-Type:application/json
        -d {query body}
      - 'curl -H Authorization: Bearer <token> 로 인증된 요청'
      - GraphiQL 웹 UI http://localhost:8080/graphql
      - 'Python pycti SDK: OpenCTIApiClient'
      - wget --post-data
      - |
        **[OSS] curl + jq (raw GraphQL probe)** — 표준.
          # 1. about.version 만 (인증 불필요)
          curl -sS -X POST http://localhost:8080/graphql \
            -H 'Content-Type: application/json' \
            -d '{"query":"{ about { version dependencies { name version } } }"}' | jq .data.about
          # 2. 응답 코드 + 시간
          curl -sS -o /dev/null -w 'code=%{http_code} time=%{time_total}s\n' -X POST http://localhost:8080/graphql -H 'Content-Type: application/json' -d '{"query":"{__typename}"}'
          # 3. 인증 query (token 필요)
          T=$(sudo grep ^OPENCTI_ADMIN_TOKEN /opt/opencti/.env | cut -d= -f2)
          curl -sS -X POST http://localhost:8080/graphql -H "Authorization: Bearer $T" -H 'Content-Type: application/json' -d '{"query":"{ me { name capabilities { name } } }"}' | jq .data.me
        예상 출력 `version=6.x.x / dependencies=[redis,elastic,...] / me.name=admin`.
        운영 해석: about(public) + me(인증) 두 단계로 API 살아있음 + token 유효성 검증.
      - |
        **[OSS] httpie (사람 친화 client)** — 가독성.
          # 1. 인증 + JSON body
          T=$(sudo grep ^OPENCTI_ADMIN_TOKEN /opt/opencti/.env | cut -d= -f2)
          http POST http://localhost:8080/graphql Authorization:"Bearer $T" query='{ about { version } }'
          # 2. 컬러 출력 + 헤더
          http -v POST http://localhost:8080/graphql query='{ me { name } }'
          # 3. Sessions 로 token 저장
          http --session=opencti POST http://localhost:8080/graphql Authorization:"Bearer $T" query='{me{name}}'
          http --session=opencti POST http://localhost:8080/graphql query='{about{version}}'
        예상 출력 `HTTP/1.1 200 OK + JSON pretty + 컬러`.
        운영 해석: trainee 가 GraphQL 응답 구조 한눈에. session 으로 token 재사용.
      - |
        **[OSS] OpenCTI GraphiQL Web UI** — 인터랙티브.
          # 1. 브라우저 → http://10.20.30.100:8080/graphql
          # 2. 우측 Docs 탭: schema 자동 탐색
          # 3. 좌측 query 작성:
          #   { indicators(first: 5) { edges { node { id name pattern } } } }
          # 4. Headers 탭에 Authorization: Bearer <token>
          # 5. ▶ Run 버튼 → JSON 응답
          # CLI 검증:
          curl -sS http://10.20.30.100:8080/graphql -X POST -H 'Content-Type: application/json' -d '{"query":"{__schema{types{name}}}"}'  | jq '.data.__schema.types | length'
        UI 동작: schema introspection + 자동완성 + 응답 JSON 컬러.
        운영 해석: 학습 단계 최적. trainee 가 schema 탐색 → query 만들기 → 결과 즉시.
      - |
        **[OSS] pycti (OpenCTI 공식 Python client)** — 운영 자동화.
          # 1. 설치
          pip3 install pycti
          # 2. 연결 + version 확인
          python3 <<PY
          from pycti import OpenCTIApiClient
          c = OpenCTIApiClient("http://10.20.30.100:8080", "$T")
          print(c.get_about())
          print(c.indicator.list(first=5))
          PY
          # 3. 인증 실패 처리
          python3 -c "from pycti import OpenCTIApiClient; OpenCTIApiClient('http://10.20.30.100:8080', 'wrong')" 2>&1 | head
        예상 출력 `{'version':'6.x.x',...} / 5 indicators / wrong → AuthError`.
        운영 해석: Connector 가 사용하는 SDK. 운영 자동화 표준. raw GraphQL 보다 추상.
      - |
        **[OSS] graphql-cli / gq (GraphQL 전용 CLI)** — 모던.
          # 1. 설치
          npm install -g graphqurl
          # 2. introspection (schema 구조)
          gq http://localhost:8080/graphql --introspect > /tmp/opencti-schema.graphql
          # 3. 쿼리 (헤더 포함)
          T=$(sudo grep ^OPENCTI_ADMIN_TOKEN /opt/opencti/.env | cut -d= -f2)
          gq http://localhost:8080/graphql -H "Authorization: Bearer $T" -q '{ me { name } indicators(first: 3) { edges { node { name } } } }'
          # 4. 자동완성 모드 (interactive)
          gq http://localhost:8080/graphql -H "Authorization: Bearer $T"
        예상 출력 `me.name=admin / indicators=[3건]`.
        운영 해석: schema 다운로드 + 자동완성. CI/CD 통합 + script 친화.
      negative_signs:
      - GET 요청(GraphQL 은 POST)
      - Content-Type 누락
      - body 없이 요청
  target_vm: siem
  script: 'curl -sS -o /dev/null -w ''%{http_code}\n'' -X POST http://localhost:8080/graphql
    -H ''Content-Type: application/json'' -d ''{"query":"{ about { version } }"}'''
  risk_level: low
  bastion_prompt: siem VM의 OpenCTI /graphql 엔드포인트에 POST 테스트 요청을 보내 응답 코드를 보여줘
- order: 2
  instruction: secu VM에 cti 전용 blocklist set 'cti_ips'(filter 테이블) 를 만드시오.
  hint: nft add set inet filter cti_ips
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 filter.cti_ips ipv4 set을 생성해줘

    📎 참고 (CLI): sudo nft add table inet filter 2>/dev/null ; sudo nft ''add set inet
    filter cti_ips { type ipv4_addr \; }'' 2>/dev/null && sudo nft list set inet filter
    cti_ips'
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: secu VM에 cti 전용 blocklist set ''cti_ips''(filter
    테이블) 를 만드시오.'
  verify:
    type: output_contains
    expect: cti_ips
    field: stdout
    semantic:
      intent: 'CTI 전용 blocklist set 생성 — sudo nft add table inet filter 2>/dev/null
        ; sudo nft add set inet filter cti_ips { type ipv4_addr ; } && sudo nft list
        set inet filter cti_ips. CTI feed 에서 가져온 IOC 저장 전용 set. 목적: (1) OpenCTI 일반
        blocklist 와 분리 (2) 자동 업데이트 시 전용 cleanup 가능. timeout 추가 권장 - CTI IOC 는 신뢰도
        시간에 따라 감소, timeout 30d 로 자동 만료'
      success_criteria:
      - nft add table + add set 실행
      - type ipv4_addr + set 이름 cti_ips
      - list set 으로 검증
      acceptable_methods:
      - sudo nft add table + add set + list set 체인
      - 'timeout 옵션 추가: set cti_ips { type ipv4_addr ; timeout 30d ; }'
      - flags interval 로 CIDR 지원
      - /etc/nftables.conf 에 영구 정의
      - ipset + iptables legacy 대체
      - |
        **[OSS] nft (CTI 전용 set 생성)** — 표준.
          # 1. table 보장 + cti_ips set 생성 (timeout 자동 만료 포함)
          sudo nft add table inet filter 2>/dev/null
          sudo nft 'add set inet filter cti_ips { type ipv4_addr ; flags timeout ; timeout 30d ; }'
          # 2. CIDR 지원 set (옵션)
          sudo nft 'add set inet filter cti_cidrs { type ipv4_addr ; flags interval ; }'
          # 3. 검증
          sudo nft list set inet filter cti_ips
          # 4. JSON 형식
          sudo nft -j list set inet filter cti_ips | jq .
        예상 출력 `set cti_ips { type ipv4_addr; flags timeout; timeout 30d; elements = { } }`.
        운영 해석: timeout 30d → CTI 신뢰도 시간 감소 자동 만료. flags interval 별도 set 으로 CIDR 차단.
      - |
        **[OSS] ipset (legacy 대체, 풍부 기능)** — 비교/마이그레이션.
          # 1. 설치
          sudo apt install -y ipset
          # 2. hash:ip set 생성 (timeout, counters)
          sudo ipset create cti_ips_legacy hash:ip timeout 2592000 counters
          # 3. 추가 + 만료
          sudo ipset add cti_ips_legacy 203.0.113.66 timeout 2592000
          # 4. 조회 (counters 표시)
          sudo ipset list cti_ips_legacy
          # 5. iptables 연동
          sudo iptables -I INPUT -m set --match-set cti_ips_legacy src -j DROP
        예상 출력 `Number of entries: 1 / 203.0.113.66 timeout 2591998 packets 0 bytes 0`.
        운영 해석: counter 로 차단 효과 측정 + 자동 만료. nft set 대체. 일부 환경에 유리.
      - |
        **[OSS] nftables.conf (영구 정의)** — 재부팅 보존.
          # 1. /etc/nftables.conf 편집
          sudo tee -a /etc/nftables.conf > /dev/null <<'EOF'
          table inet filter {
            set cti_ips {
              type ipv4_addr
              flags timeout
              timeout 30d
            }
          }
          EOF
          # 2. syntax 검증
          sudo nft -c -f /etc/nftables.conf
          # 3. apply + 재시작 활성
          sudo systemctl enable --now nftables
          sudo systemctl reload nftables
          # 4. 검증
          sudo nft list ruleset | grep -A 3 cti_ips
        예상 출력 `set cti_ips { ... } / nftables loaded`.
        운영 해석: 재부팅 후에도 set 정의 보존. CI/CD git 관리 가능.
      - |
        **[OSS] firewalld (RHEL/CentOS)** — distro 별 alternative.
          # 1. 설치 (Ubuntu 도 가능)
          sudo apt install -y firewalld
          sudo systemctl enable --now firewalld
          # 2. ipset 생성
          sudo firewall-cmd --permanent --new-ipset=cti_ips --type=hash:ip --option=timeout=2592000
          # 3. blocklist drop zone 등록
          sudo firewall-cmd --permanent --zone=drop --add-source=ipset:cti_ips
          # 4. apply
          sudo firewall-cmd --reload
          # 5. 검증
          sudo firewall-cmd --get-ipsets
          sudo firewall-cmd --info-ipset=cti_ips
        예상 출력 `cti_ips / type: hash:ip / timeout: 2592000`.
        운영 해석: zone 기반 정책 → blocklist 가 zone 단위 격리. 멀티 인터페이스 정책 시 강점.
      - |
        **[OSS] Ansible community.general.nftables_set** — IaC.
          # 1. /etc/ansible/playbooks/cti-set.yml
          # ---
          # - hosts: secu
          #   tasks:
          #     - name: ensure cti_ips set
          #       community.general.nftables_set:
          #         family: inet
          #         table: filter
          #         name: cti_ips
          #         type: ipv4_addr
          #         flags: [timeout]
          #         timeout: 30d
          #         state: present
          # 2. 적용
          ansible-playbook -i inventory cti-set.yml
          # 3. idempotent 검증 (2회 실행 → ok 만)
          ansible-playbook -i inventory cti-set.yml --check
        예상 출력 `changed=1 (1회) / ok=1 changed=0 (2회)`.
        운영 해석: 멀티 호스트 표준화 + idempotent. enterprise 운영 표준.
      negative_signs:
      - table 없이 set 생성(에러)
      - type 미지정
      - timeout 없이(영구 차단)
  target_vm: secu
  script: sudo nft add table inet filter 2>/dev/null ; sudo nft 'add set inet filter
    cti_ips { type ipv4_addr \; }' 2>/dev/null && sudo nft list set inet filter cti_ips
  risk_level: medium
  bastion_prompt: 'secu VM에 filter.cti_ips ipv4 set을 생성해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: filter.input 체인 초기에 ip saddr @cti_ips drop 룰을 추가하시오.
  hint: nft insert rule …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM filter.input 체인 맨 앞에 @cti_ips set 기반 drop 룰을 추가해줘

    📎 참고 (CLI): sudo nft add chain inet filter input ''{ type filter hook input priority
    0 \; }'' 2>/dev/null ; sudo nft insert rule inet filter input ip saddr @cti_ips
    drop'
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: filter.input 체인 초기에 ip saddr @cti_ips drop
    룰을 추가하시오.'
  verify:
    type: output_contains
    expect: cti_ips
    field: stdout
    semantic:
      intent: input chain 맨 앞에 CTI drop 룰 삽입 — sudo nft insert rule inet filter input
        ip saddr @cti_ips drop. insert rule = 위치 0 에 prepend, add rule = append 와
        대비. 성능 이유 - CTI blocklist 는 가장 먼저 평가되어 악성 트래픽 빠르게 drop. 이후 룰은 정상 트래픽만 평가.
        @cti_ips 가 빈 set 이면 no-op. add chain ... 은 chain 없을 때 보장, 2>/dev/null 로 exists
        에러 무시
      success_criteria:
      - nft insert rule 로 prepend
      - ip saddr @cti_ips drop expression
      - input chain 지정
      acceptable_methods:
      - sudo nft insert rule inet filter input ip saddr @cti_ips drop
      - sudo nft add rule ... index 0(위치 지정)
      - iptables -I INPUT 1 로 prepend
      - '룰 순서: CTI drop → allow 룰 → 기본 drop'
      - |
        **[OSS] nft insert rule (앞쪽 prepend + counter)** — 표준.
          # 1. input chain 보장
          sudo nft add chain inet filter input '{ type filter hook input priority 0 ; }' 2>/dev/null
          # 2. CTI drop 룰을 chain 0번 위치에 삽입 + counter 추가
          sudo nft insert rule inet filter input ip saddr @cti_ips counter drop comment '"CTI blocklist (auto-sync)"'
          # 3. 룰 순서 확인
          sudo nft -a list chain inet filter input
          # 4. counter 값 (drop 횟수)
          sudo nft list chain inet filter input | grep cti_ips
        예상 출력 `ip saddr @cti_ips counter packets 0 bytes 0 drop comment "CTI blocklist..."`.
        운영 해석: counter 로 차단 효과 측정. comment 로 운영자 식별. handle 로 후일 삭제.
      - |
        **[OSS] log-and-drop 패턴 (CTI 매칭 시 로그)** — audit.
          # 1. log + drop (단일 룰)
          sudo nft insert rule inet filter input ip saddr @cti_ips log prefix '"[CTI-DROP] "' level warn drop
          # 2. journalctl 로 매칭 로그
          sudo journalctl -k -f | grep CTI-DROP
          # 3. rsyslog 별도 file
          # /etc/rsyslog.d/cti-drop.conf:
          #   :msg, contains, "[CTI-DROP]" -/var/log/cti-drop.log
          #   & stop
          sudo systemctl restart rsyslog
          tail -F /var/log/cti-drop.log
          # 4. 통계 (10분 간격 매칭 IP top10)
          journalctl -k --since "10 min ago" | grep CTI-DROP | grep -oP 'SRC=\S+' | sort | uniq -c | sort -rn | head
        예상 출력 `[CTI-DROP] IN=ens33 SRC=203.0.113.66 DST=...`.
        운영 해석: 단순 drop 보다 audit trail. SOC 가 CTI 효과 정량화 가능.
      - |
        **[OSS] iptables-legacy + ipset (마이그레이션 환경)** — alt.
          # 1. iptables 와 ipset 연동
          sudo iptables -I INPUT 1 -m set --match-set cti_ips_legacy src -j LOG --log-prefix '[CTI-DROP] '
          sudo iptables -I INPUT 2 -m set --match-set cti_ips_legacy src -j DROP
          # 2. 정책 영구화
          sudo iptables-save | sudo tee /etc/iptables/rules.v4
          sudo apt install -y iptables-persistent
          # 3. 검증
          sudo iptables -L INPUT -nv --line-numbers
          # 4. 마이그레이션 (iptables → nft)
          sudo iptables-translate -I INPUT 1 -m set --match-set cti_ips_legacy src -j DROP
        예상 출력 `nft insert rule ip filter input ip saddr @cti_ips_legacy drop`.
        운영 해석: legacy 환경 + iptables-translate 으로 nft 변환. 운영 마이그레이션 path.
      - |
        **[OSS] nftables.conf (영구 룰)** — 재부팅 보존.
          # 1. /etc/nftables.conf 추가
          sudo tee -a /etc/nftables.conf > /dev/null <<'EOF'
          table inet filter {
            chain input {
              type filter hook input priority 0; policy drop;
              ip saddr @cti_ips counter drop comment "CTI blocklist"
              # ... 정상 룰
            }
          }
          EOF
          # 2. syntax 검증
          sudo nft -c -f /etc/nftables.conf
          # 3. apply
          sudo systemctl reload nftables
          # 4. 검증
          sudo nft list ruleset | grep -A 5 'chain input'
        예상 출력 `chain input { ... ip saddr @cti_ips counter drop ... }`.
        운영 해석: 재부팅 보존 + git 관리. enterprise IaC.
      - |
        **[OSS] CrowdSec (커뮤니티 IP reputation + nft bouncer)** — 보충.
          # 1. CrowdSec engine 설치 + nftables bouncer
          sudo apt install -y crowdsec
          sudo apt install -y crowdsec-firewall-bouncer-nftables
          # 2. 자동 차단 set + chain (CrowdSec 가 만들고 sync)
          sudo systemctl enable --now crowdsec-firewall-bouncer
          sudo nft list set inet crowdsec crowdsec-blacklists
          # 3. 차단 결정 확인
          sudo cscli decisions list
          # 4. CTI 정책 추가 (예: 외부 OpenCTI feed 통합)
          # /etc/crowdsec/notifications/opencti.yaml 으로 OpenCTI → CrowdSec 동기화 가능
          sudo cscli alerts list
        예상 출력 `decisions: 1234 IPs / set crowdsec-blacklists { ... }`.
        운영 해석: 커뮤니티 reputation + 자체 CTI 동시 적용. 세트 분리로 정책 충돌 회피.
      negative_signs:
      - add rule(append) 로 순서 오류
      - '@ 없이 set 참조'
      - drop 대신 accept
  target_vm: secu
  script: sudo nft add chain inet filter input '{ type filter hook input priority
    0 \; }' 2>/dev/null ; sudo nft insert rule inet filter input ip saddr @cti_ips
