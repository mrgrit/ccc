lab_id: secops-ai-week06
title: Suricata 운영 — 튜닝·알람 분석 (AI 지원)
version: ai
course: secops-ai
week: 6
description: suricata-update로 룰셋을 갱신하고, stats.log / fast.log / eve.json 을 활용해 운영 상태를
  점검한다.
difficulty: medium
duration_minutes: 120
objectives:
- suricata-update 로 공식 룰셋을 갱신할 수 있다
- eve.json 을 jq로 파싱해 상위 signature/source 를 추출한다
- 성능 통계(stats.log)를 확인해 drop/loss를 모니터링한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에서 suricata-update list-sources 로 사용 가능한 룰셋 소스를 확인하시오.
  hint: suricata-update list-sources
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata-update list-sources 를 실행해 사용 가능한 룰셋 소스를 보여줘

    📎 참고 (CLI): sudo suricata-update list-sources 2>&1 | head'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: secu VM에서 suricata-update list-sources 로
    사용 가능한 룰셋 소스를 확인하시오.'
  verify:
    type: output_contains
    expect: source
    field: stdout
    semantic:
      intent: 'suricata-update 룰셋 소스 탐색 — sudo suricata-update list-sources 2>&1 |
        head. Suricata 공식 룰셋 관리 도구, 여러 free/commercial source 제공: et/open(Emerging
        Threats free, 수천 룰), et/pro(상용 구독), oisf/trafficid(IDS 특화), ptresearch/attackdetection
        등. Source 이름·summary·license(GPL/commercial) 출력. /etc/suricata/update.yaml
        또는 /var/lib/suricata/update/sources/ 에 설정 저장'
      success_criteria:
      - suricata-update list-sources 실행
      - source 문자열 출력
      - et/open 또는 다른 source 이름 포함
      acceptable_methods:
      - sudo suricata-update list-sources
      - sudo suricata-update list-enabled-sources(현재 활성만)
      - cat /var/lib/suricata/update/cache/index.yaml
      - apt/dnf 로 snort rules 대체
      - git clone ET rules 수동
      - |
        **[OSS] suricata-update list-sources** — OISF 공식 룰셋 인덱스 도구.
          # 1. 모든 사용 가능한 source (free + commercial)
          sudo suricata-update list-sources 2>&1 | head -30
          # 2. 카테고리별 (free 만)
          sudo suricata-update list-sources --free
          # 3. 활성화된 source 만
          sudo suricata-update list-enabled-sources
          # 4. source 상세 정보 (license / vendor)
          sudo suricata-update list-sources --search emerging
        예상 출력 `et/open / Vendor: Proofpoint / Summary: Emerging Threats Open Ruleset / License: MIT`.
        운영 해석: 운영 환경에서 적절한 source 선택의 시작점. 무료 (et/open) vs 유료 (et/pro) 비교 + license 확인 표준.
      - |
        **[OSS] suricata-update index 직접 검색** — yaml 카탈로그.
          # 1. cache 된 index 직접 보기
          sudo cat /var/lib/suricata/update/cache/index.yaml | head -30
          # 2. yq 로 source 추출
          sudo yq '.sources | keys' /var/lib/suricata/update/cache/index.yaml
          # 3. 특정 source 의 url 확인
          sudo yq '.sources["et/open"]' /var/lib/suricata/update/cache/index.yaml
          # 4. index 갱신 (네트워크 접근)
          sudo suricata-update update-sources
        예상 출력 `["et/open", "et/pro", "oisf/trafficid", "ptresearch/attackdetection", ...]`.
        운영 해석: yaml 직접 분석 = 자동화 script 작성 시 source 메타정보 추출.
      - |
        **[OSS] scirius (룰 source 통합 GUI)** — Stamus Networks 표준.
          # 1. https://scirius:8000/sources 접속
          # 2. UI 동작:
          # - 새 source 추가: "+ Add Source" 버튼
          # - source type 선택: HTTP URL / Local file / git
          # - 자동 fetch 주기 설정 (daily / weekly)
          # - 활성/비활성 toggle
          # 3. ruleset 기반 카테고리화
          # - et/open → 30K 룰을 카테고리 (web / sql / dos) 별로 enable/disable
        UI 동작: source 추가 + ruleset 분리 관리. 룰별 enable/disable.
        운영 해석: 30K 룰 환경에서 사람이 *불필요한 카테고리* 비활성 = 성능 + FP 감소.
      - |
        **[OSS] OPNsense / pfSense Suricata plugin** — production GUI.
          # OPNsense web UI
          # 1. Services → Intrusion Detection → Download
          # 2. 사용 가능 ruleset 목록 (et/open, abuse-ch, OISF 등)
          # 3. 다운로드 버튼 클릭 → 자동 적용
          # 4. CLI 검증 (BSD)
          ssh root@opnsense
          ls /usr/local/etc/suricata/rules/
          /usr/local/etc/rc.d/suricata onestatus
        결과: GUI 의 ruleset 목록 + 다운로드 진행 상태.
        운영 해석: enterprise firewall appliance 표준. nft + Suricata 통합. lab 환경의 Linux 패키지와 동일 source 다른 frontend.
      - |
        **[OSS] git clone (custom private rule repo)** — enterprise 환경.
          # 1. 사내 사설 ruleset git repo 사용
          mkdir -p /var/lib/suricata/private-rules
          cd /var/lib/suricata/private-rules
          git clone https://gitlab.internal.example.com/security/suricata-rules.git .
          # 2. suricata-update source 등록
          sudo suricata-update enable-source private https://gitlab.internal.example.com/security/suricata-rules.git
          # 3. 자동 sync (cron)
          echo "0 3 * * * cd /var/lib/suricata/private-rules && git pull && suricata-update" | sudo crontab -
          # 4. git 변경 audit
          git -C /var/lib/suricata/private-rules log --oneline -10
        결과: 사내 룰셋의 git history + 매일 자동 sync.
        운영 해석: 사내 customized rule (회사 자체 attack pattern) 관리 표준. git audit + CI 통합.
      negative_signs:
      - list-sources 명령 오타
      - head 없이 너무 많은 출력
      - source 정보 확인 없이 실행만
  target_vm: secu
  script: sudo suricata-update list-sources 2>&1 | head
  risk_level: medium
  bastion_prompt: 'secu VM에서 suricata-update list-sources 를 실행해 사용 가능한 룰셋 소스를 보여줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: et/open 룰셋을 enable 하시오.
  hint: suricata-update enable-source et/open
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata-update에 et/open 룰셋을 enable 해줘

    📎 참고 (CLI): sudo suricata-update enable-source et/open 2>&1 | tail'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: et/open 룰셋을 enable 하시오.'
  verify:
    type: output_contains
    expect: et/open
    field: stdout
    semantic:
      intent: 'et/open 룰셋 활성화 — sudo suricata-update enable-source et/open 2>&1 |
        tail. Emerging Threats Open 룰셋은 free, 커뮤니티 기반 IDS 룰 - 최대 규모의 오픈 룰셋. 활성화 후
        suricata-update 실행 시 다운로드됨. /etc/suricata/update.yaml 의 sources 배열에 추가됨. 대안
        source: oisf/trafficid(OISF 공식), ptresearch/attackdetection. license 확인 필수'
      success_criteria:
      - enable-source et/open 실행
      - et/open 문자열 포함
      - enable 성공 메시지
      acceptable_methods:
      - sudo suricata-update enable-source et/open
      - sudo suricata-update add-source custom https://url/rules.tar.gz(private)
      - vim /etc/suricata/update.yaml 에 sources 블록 수동
      - Ansible community.general.suricata_rule_source 모듈
      - suricata-update disable-source / remove-source 대응
      - |
        **[OSS] suricata-update enable-source (공식 source 활성)** — 표준.
          # 1. et/open 활성화
          sudo suricata-update enable-source et/open
          # 2. 활성 status 검증
          sudo suricata-update list-enabled-sources
          # 3. update.yaml 자동 갱신 검증
          sudo cat /var/lib/suricata/update/sources.yaml
          # 4. 즉시 다운로드 (다음 sync 까지 안 기다림)
          sudo suricata-update --no-test
        예상 출력 `Source: et/open / Status: enabled / 30000 rules loaded`.
        운영 해석: enable-source 후 *반드시* suricata-update 실행 = 룰 다운로드. enable 만으로는 룰 적재 X.
      - |
        **[OSS] suricata-update add-source (사설 source)** — 사설 ruleset.
          # 1. 사설 URL source 추가
          sudo suricata-update add-source private-rules https://gitlab.internal.example.com/security/rules.tar.gz
          # 2. authentication (HTTP basic / Bearer token)
          sudo suricata-update add-source private-rules https://...rules.tar.gz \
            --http-header "Authorization: Bearer $TOKEN"
          # 3. checksum 검증 (security)
          sudo suricata-update add-source private-rules https://...rules.tar.gz --checksum sha256
        예상 출력 `Source: private-rules / URL: https://... / Status: added`.
        운영 해석: 사내 사설 룰셋 환경. checksum 검증 = 룰 변조 방지 (supply chain attack 대비).
      - |
        **[OSS] scirius (web GUI source enable)** — 시각적 관리.
          # 1. https://scirius:8000/sources 접속
          # 2. UI 동작:
          # - et/open source 옆 "Enable" toggle
          # - 자동 fetch interval 선택 (daily / weekly)
          # - SHA256 checksum 자동 검증
          # 3. activity log 자동 audit
          # - "Source et/open enabled by alice@example.com on 2026-05-06"
          # 4. CLI 검증
          ssh ccc@10.20.30.1 "sudo suricata-update list-enabled-sources"
        UI 동작: enable + 자동 sync 설정 + audit log 통합.
        운영 해석: 다중 source 환경 + 변경 audit 표준. compliance (누가 언제 무엇을 활성화) 자동.
      - |
        **[OSS] Ansible (community.general 모듈)** — IaC.
          # playbook
          - name: Enable et/open Suricata source
            ansible.builtin.command:
              cmd: suricata-update enable-source et/open
            register: result
            changed_when: "'has been enabled' in result.stdout"
            notify: update suricata rules
          - name: Disable noisy source
            ansible.builtin.command:
              cmd: suricata-update disable-source noisy/source
          handlers:
            - name: update suricata rules
              ansible.builtin.command: suricata-update --no-test
          # 실행
          ansible-playbook -i inventory.yml suricata-source.yml --diff
        예상 출력 `changed: [secu] / et/open enabled / rules updated`.
        운영 해석: 다중 host 일관 enable. IaC 표준.
      - |
        **[OSS] suricata-update update.yaml 직접 편집** — fine-grained 제어.
          # 1. /etc/suricata/update.yaml 편집
          sudo vim /etc/suricata/update.yaml
          # 또는 yq 로 in-place
          sudo yq -i '.sources += [{"name":"et/open","enabled":true}]' /etc/suricata/update.yaml
          # 2. 적용
          sudo suricata-update --no-test
          # 3. 영속 검증
          sudo cat /etc/suricata/update.yaml
          # 4. etckeeper 로 변경 audit
          sudo etckeeper commit "Enable et/open Suricata source"
        예상 출력 `sources: [{name: et/open, enabled: true, http-header: ..., checksum: sha256}]`.
        운영 해석: 직접 yaml 편집 = 모든 옵션 (header, checksum, license) 세밀 제어. enable-source 명령은 일부 옵션 미지원.
      negative_signs:
      - enable 대신 add-source 오용
      - 다른 source 활성화
      - tail 없이 긴 출력 숨김
  target_vm: secu
  script: sudo suricata-update enable-source et/open 2>&1 | tail
  risk_level: medium
  bastion_prompt: 'secu VM에서 suricata-update에 et/open 룰셋을 enable 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: suricata-update 를 실행해 룰셋을 다운로드·병합하시오.
  hint: sudo suricata-update
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata-update 를 실행해 룰셋을 갱신해줘

    📎 참고 (CLI): sudo suricata-update 2>&1 | tail -10'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: suricata-update 를 실행해 룰셋을 다운로드·병합하시오.'
  verify:
    type: output_contains
    expect: rules
    field: stdout
    semantic:
      intent: 'Suricata 룰셋 업데이트 실행 — sudo suricata-update 2>&1 | tail -10. 활성화된 모든
        source 에서 룰 다운로드 → merge → /var/lib/suricata/rules/suricata.rules 로 통합 저장.
        출력: Downloading <source>, Done., Loaded <N> rules, Writing rules to ..., Testing
        with suricata -T(자동), Done. 주기적 cron(daily)으로 자동화 권장. 네트워크 연결 필요'
      success_criteria:
      - suricata-update 실행
      - rules 키워드 또는 rule count 출력
      - 에러 없이 완료
      acceptable_methods:
      - sudo suricata-update
      - sudo suricata-update --no-test 로 TEST skip
      - sudo suricata-update --etoro-url 로 custom ET url
      - 'cron: 0 3 * * * root /usr/bin/suricata-update && systemctl reload suricata'
      - CI/CD 파이프라인에 rule sync
      - |
        **[OSS] suricata-update + reload (production cycle)** — 일일 갱신 표준.
          # 1. 다운로드 + merge + suricata -T 자동 검증
          sudo suricata-update 2>&1 | tail -10
          # 2. 검증 통과 후 즉시 reload (무중단)
          sudo suricatasc -c reload-rules
          # 3. 적재 룰 수 검증
          sudo suricatasc -c "ruleset-stats" | jq
        예상 출력 `Done. Loaded 30001 rules. / Writing rules to /var/lib/suricata/rules/suricata.rules / Testing with suricata -T...OK / {"loaded":30001,"failed":0}`.
        운영 해석: production daily cycle. --no-test 옵션은 위험 (검증 skip).
      - |
        **[OSS] cron (자동 일일 갱신)** — production 운영 표준.
          # 1. /etc/cron.d/suricata-update 작성
          sudo tee /etc/cron.d/suricata-update << 'EOF'
          # daily Suricata rule update at 3am
          0 3 * * * root /usr/bin/suricata-update --no-progress 2>&1 | logger -t suricata-update && /usr/bin/suricatasc -c reload-rules >> /var/log/suricata/update.log 2>&1
          EOF
          # 2. 다음 실행 시각 확인
          systemctl list-timers --all | grep suricata
          # 3. 실행 로그 모니터링
          sudo tail -f /var/log/suricata/update.log
        예상 출력 `0 3 * * * root /usr/bin/suricata-update ... / Last log: 2026-05-06T03:00:01 - 30001 rules loaded`.
        운영 해석: 매일 새벽 3시 자동 갱신 + reload. logger 로 syslog 기록 = SIEM 연동 자동.
      - |
        **[OSS] systemd timer (cron 대안)** — modern systemd 환경.
          # 1. timer + service 작성
          sudo tee /etc/systemd/system/suricata-update.service << 'EOF'
          [Unit]
          Description=Suricata Ruleset Update
          [Service]
          Type=oneshot
          ExecStart=/usr/bin/suricata-update --no-progress
          ExecStartPost=/usr/bin/suricatasc -c reload-rules
          EOF
          sudo tee /etc/systemd/system/suricata-update.timer << 'EOF'
          [Unit]
          Description=Daily Suricata Update
          [Timer]
          OnCalendar=daily
          RandomizedDelaySec=1h
          Persistent=true
          [Install]
          WantedBy=timers.target
          EOF
          # 2. 활성화
          sudo systemctl daemon-reload
          sudo systemctl enable --now suricata-update.timer
          # 3. 다음 실행 시각
          systemctl list-timers suricata-update.timer
        예상 출력 `Tue 2026-05-07 03:30:00 KST 16h left / suricata-update.timer / suricata-update.service`.
        운영 해석: cron 대안. RandomizedDelaySec = 다중 host 동시 갱신 방지 (네트워크 부하 분산).
      - |
        **[OSS] CI/CD pipeline (git-driven rule sync)** — enterprise 표준.
          # GitLab CI 예시 (.gitlab-ci.yml)
          stages: [validate, deploy]
          validate-rules:
            stage: validate
            script:
              - sudo suricata-update --no-test
              - sudo suricata -T -c /etc/suricata/suricata.yaml
              - ftw run --include tests/   # 회귀 테스트
          deploy-rules:
            stage: deploy
            only: [main]
            script:
              - ansible-playbook -i inventory.yml deploy-rules.yml
        결과: PR 마다 자동 검증 + main merge 시 자동 배포.
        운영 해석: 룰 변경의 *전체 lifecycle* 자동화. validation → review → deploy → audit 통합.
      - |
        **[OSS] suricata-update dry-run / verbose** — 디버깅.
          # 1. dry-run (다운로드만, disk 미적용)
          sudo suricata-update --dry-run
          # 2. verbose (상세 로그)
          sudo suricata-update -v --no-test
          # 3. 특정 source 만 (디버깅 시)
          sudo suricata-update --source-include et/open
          # 4. cache 강제 갱신
          sudo suricata-update --force
        예상 출력 `Source: et/open / Downloading https://rules.emergingthreats.net/... / Loaded 30001 rules / Skipping save (--dry-run)`.
        운영 해석: 룰 변경 영향 사전 분석. dry-run 으로 어떤 룰이 추가/제거되는지 미리 확인.
      negative_signs:
      - 출력 무시
      - 네트워크 에러 무시
      - reload 누락(룰 다운받았지만 미적용)
  target_vm: secu
  script: sudo suricata-update 2>&1 | tail -10
  risk_level: medium
  bastion_prompt: 'secu VM에서 suricata-update 를 실행해 룰셋을 갱신해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
