lab_id: secops-ai-week06
title: Suricata 운영 — 튜닝·알람 분석 (AI 지원)
version: ai
course: secops-ai
week: 6
description: suricata-update로 룰셋을 갱신하고, stats.log / fast.log / eve.json 을 활용해 운영 상태를 점검한다.
difficulty: medium
duration_minutes: 120
objectives:
- suricata-update 로 공식 룰셋을 갱신할 수 있다
- eve.json 을 jq로 파싱해 상위 signature/source 를 추출한다
- 성능 통계(stats.log)를 확인해 drop/loss를 모니터링한다
pass_threshold: 0.6
steps:
