- order: 99
  instruction: "[복합 시나리오] \"오탐 폭증 → threshold 로 억제\" — FP 식별과 관리 직접 체험\n\n## 상황 (w01-w05\
    \ 시나리오 연속)\n\nABC 핀테크 SOC 신규 분석가, 여섯째 주.\n1~10 step 으로 et/open 룰셋 갱신 + eve.json\
    \ 분석 + stats.log 까지 익혔다. 그런데\n학습 목표 #3 — *\"오탐(False Positive)을 식별하고 관리할 수 있다\"\
    * — 1~10 에선 *분석 도구*\n만 익힘. 실제 FP 발생 → 식별 → 억제 의 *전체 cycle* 은 안 함.\n\n> 선임: \"\
    FP 가 진짜 문제는 *알람 피로(alert fatigue)* 야. 1만 건 alert 중 9999 가 FP 면\n>  진짜 1건을 놓쳐.\
    \ 학생용으로 *의도적으로 FP 폭증* 시키는 광범위 룰 하나 넣고, threshold 로\n>  억제해 봐. 그 cycle 이 운영의 핵심이야.\"\
    \n\n학습 목표 #3 (FP 관리) 의 행동 증명.\n\n## 임무 (3 단계, 약 25분)\n\n### Phase A — 의도적 FP 폭증\
    \ 룰 작성 (5분)\n\n*너무 광범위* 한 룰을 추가 — 정상 트래픽이 모두 alert 발생하게:\n  ```\n  echo 'alert\
    \ tcp any any -> any 80 (msg:\"FP_TEST any HTTP traffic\"; sid:1000301; rev:1;)'\
    \ \\\n    | sudo tee -a /etc/suricata/rules/local.rules\n  sudo systemctl restart\
    \ suricata\n  ```\n\n의도: \"any tcp → any 80\" 이라 모든 HTTP 트래픽이 alert. 5분만 둬도 alert\
    \ 수십~수백 건.\n\n### Phase B — FP 폭증 측정 + threshold 억제 (15분)\n\nweb 으로 정상 트래픽 5회\
    \ 발생 (학생이 attacker 또는 secu 에서):\n  ```\n  for i in 1 2 3 4 5; do\n    curl -sI\
    \ http://10.20.30.80/ --max-time 2 > /dev/null\n    sleep 1\n  done\n  ```\n\n\
    secu 에서 FP_TEST alert 수 확인:\n  ```\n  sudo tail -200 /var/log/suricata/eve.json\
    \ | grep -c '\"sid\":1000301'\n  ```\n→ 예상: 5건 이상 (정상 트래픽 마다 alert)\n\n같은 sid\
    \ 의 *상위 5 source IP* 도 확인:\n  ```\n  sudo tail -500 /var/log/suricata/eve.json\
    \ | jq -r 'select(.alert.signature_id==1000301) | .src_ip' | sort | uniq -c |\
    \ sort -rn | head -5\n  ```\n→ 정상 source IP 가 top 에 — 이게 \"이 source 의 FP 만 suppress\
    \ 해야 한다\" 의 단서.\n\n이제 `/etc/suricata/threshold.config` 에 suppress 룰 추가:\n  ```\n\
    \  # 다음 라인을 추가:\n  # suppress gen_id 1, sig_id 1000301, track by_src, ip 10.20.30.0/24\n\
    \  sudo bash -c 'echo \"suppress gen_id 1, sig_id 1000301, track by_src, ip 10.20.30.0/24\"\
    \ >> /etc/suricata/threshold.config'\n  sudo grep '1000301' /etc/suricata/threshold.config\n\
    \  sudo systemctl restart suricata\n  ```\n\n의도: 내부 망 (10.20.30.0/24) 에서 발생한 sid\
    \ 1000301 alert 모두 *기록 안 함*.\n\n다시 동일 트래픽 발생:\n  ```\n  for i in 1 2 3 4 5; do\n\
    \    curl -sI http://10.20.30.80/ --max-time 2 > /dev/null\n    sleep 1\n  done\n\
    \  ```\n\nsecu 에서 FP_TEST alert 카운트 재확인:\n  `sudo tail -200 /var/log/suricata/eve.json\
    \ | grep -c '\"sid\":1000301'`\n→ 예상: 0 또는 추가된 카운트 없음 (suppress 적용)\n\n### Phase\
    \ C — 회고 + 정리 (5분)\n\n## Phase B 결과 비교표\n\n| 시점 | 트래픽 5건 | alert 카운트 | 비고 |\n\
    |------|----------|-------------|-----|\n| suppress 전 | 5 curl | 5+ | FP 폭증 |\n\
    | suppress 후 | 5 curl | 0 (또는 정지) | suppress 적용 |\n\n1~2 단락 회고:\n1. **suppress\
    \ 전후 alert 수 변화** — 정량 (X건 → 0건 차이)\n2. **threshold 의 *3 가지 액션* 차이** — suppress\
    \ (전체 차단) / threshold limit\n   (n분당 m건만) / threshold both (limit + 시간 윈도우 모두)\n\
    3. **운영 시 suppress 의 위험** — *지나친 suppress 는 진짜 공격을 놓치게 함*. 따라서\n   suppress 룰은\
    \ *최소한* + 정기 review (예: 분기별)\n\n종료 정리:\n  ```\n  sudo sed -i '/sid:1000301/d'\
    \ /etc/suricata/rules/local.rules\n  sudo sed -i '/1000301/d' /etc/suricata/threshold.config\n\
    \  sudo systemctl restart suricata\n  ```"
  hint: "Phase A: 광범위 alert 룰 (sid:1000301, \"any tcp → any 80\") 추가 → 정상 트래픽 alert\
    \ 발생 환경\nPhase B: 정상 curl 5회 → eve.json 에서 alert 카운트 확인 → threshold.config 에 suppress\
    \ 추가\n         → suricata restart → 동일 트래픽 5회 → alert 카운트 0 확인\nPhase C: suppress\
    \ 전후 비교표 + threshold 3 액션 차이 + suppress 위험 회고\n포인트: FP 식별 (alert 폭증) → 분석 (top\
    \ source) → 억제 (suppress) cycle 직접 체험.\n종료: sid:1000301 룰 + threshold.config suppress\
    \ 모두 정리.\n"
