          # - track + IP CIDR 자동 추천
          # - 변경 사유 + ticket 입력
          # 3. "Push" → SSH 통해 secu 의 threshold.config 자동 갱신
          # 4. CLI 검증
          ssh ccc@10.20.30.1 "sudo cat /etc/suricata/threshold.config"
        UI 동작: alert 패턴 → suppress 자동 추천 + audit log.
        운영 해석: FP 분석 + suppress 작성 워크플로우 통합. 신규 분석가도 안전 수정.
      - |
        **[OSS] evebox (FP 식별 + escalate)** — 협업 워크플로우.
          # 1. evebox 의 alert detail
          # 2. UI 동작:
          # - "False Positive" 버튼 클릭
          # - 사유 입력 (예: "정상 트래픽, 룰 광범위")
          # - 다른 분석가에게 review 요청
          # - approver 가 suppress 룰 자동 생성
          # 3. CLI 동등 (commenting)
          evebox-cli comment-add --event-id <id> --comment "FP - too broad rule"
        UI 동작: alert FP 라벨링 + 협업 review.
        운영 해석: 단순 차단 X, *FP 분석 패턴* 누적 = 룰 개선 evidence.
      - |
        **[OSS] Wazuh false_positive 처리** — SIEM 측 억제.
          # 1. Wazuh manager 의 룰 변경
          # /var/ossec/etc/rules/local_rules.xml:
          # <rule id="100501" level="0">
          #   <if_sid>86601</if_sid>  <!-- Suricata alert base rule -->
          #   <field name="alert.signature_id">1000301</field>
          #   <description>FP suppression - too broad sid 1000301</description>
          # </rule>
          # 2. level 0 = 알림 X. SIEM 측에서 차단.
          sudo systemctl restart wazuh-manager
        결과: Suricata alert 는 발생하나 Wazuh 가 무시.
        운영 해석: SIEM 측 fallback. Suricata 룰 수정 위험할 때 SIEM 단계에서 억제.
      - |
        **[OSS] CI integration (FP cycle 자동화)** — enterprise.
          # GitLab CI 예시
          # .gitlab-ci.yml:
          stages: [analyze, suppress, deploy]
          analyze-fp:
            stage: analyze
            script:
              # 자동 FP 후보 발견 (시간당 100건 초과)
              - sudo jq -r 'select(.event_type=="alert") | .alert.signature_id' /var/log/suricata/eve.json | sort | uniq -c | sort -rn | head -5 | awk '$1 > 100' > /tmp/fp-candidates.txt
              - test -s /tmp/fp-candidates.txt && cat /tmp/fp-candidates.txt
          suppress:
            stage: suppress
            when: manual
            script:
              - python3 generate-suppress.py < /tmp/fp-candidates.txt
              - ansible-playbook deploy-threshold.yml
        결과: 매일 자동 FP 후보 식별 + 분석가 manual approve 후 suppress 배포.
        운영 해석: enterprise 자동화 표준. FP cycle 의 *자동 식별 + manual review* 균형.
      negative_signs:
      - suppress 전 alert 수만 측정 + 후 측정 누락
      - threshold.config 수정 누락 (룰만 제거)
      - 회고에서 suppress 위험 (진짜 공격 놓침) 미언급
      - 정리 누락 (FP 룰 또는 suppress 남김)
