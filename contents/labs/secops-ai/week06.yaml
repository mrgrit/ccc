lab_id: secops-ai-week06
title: Suricata 운영 — 튜닝·알람 분석 (AI 지원)
version: ai
course: secops-ai
week: 6
description: suricata-update로 룰셋을 갱신하고, stats.log / fast.log / eve.json 을 활용해 운영 상태를
  점검한다.
difficulty: medium
duration_minutes: 120
objectives:
- suricata-update 로 공식 룰셋을 갱신할 수 있다
- eve.json 을 jq로 파싱해 상위 signature/source 를 추출한다
- 성능 통계(stats.log)를 확인해 drop/loss를 모니터링한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에서 suricata-update list-sources 로 사용 가능한 룰셋 소스를 확인하시오.
  hint: suricata-update list-sources
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata-update list-sources 를 실행해 사용 가능한 룰셋 소스를 보여줘

    📎 참고 (CLI): sudo suricata-update list-sources 2>&1 | head'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: secu VM에서 suricata-update list-sources 로
    사용 가능한 룰셋 소스를 확인하시오.'
  verify:
    type: output_contains
    expect: source
    field: stdout
    semantic:
      intent: 'suricata-update 룰셋 소스 탐색 — sudo suricata-update list-sources 2>&1 |
        head. Suricata 공식 룰셋 관리 도구, 여러 free/commercial source 제공: et/open(Emerging
        Threats free, 수천 룰), et/pro(상용 구독), oisf/trafficid(IDS 특화), ptresearch/attackdetection
        등. Source 이름·summary·license(GPL/commercial) 출력. /etc/suricata/update.yaml
        또는 /var/lib/suricata/update/sources/ 에 설정 저장'
      success_criteria:
      - suricata-update list-sources 실행
      - source 문자열 출력
      - et/open 또는 다른 source 이름 포함
      acceptable_methods:
      - sudo suricata-update list-sources
      - sudo suricata-update list-enabled-sources(현재 활성만)
      - cat /var/lib/suricata/update/cache/index.yaml
      - apt/dnf 로 snort rules 대체
      - git clone ET rules 수동
      negative_signs:
      - list-sources 명령 오타
      - head 없이 너무 많은 출력
      - source 정보 확인 없이 실행만
  target_vm: secu
  script: sudo suricata-update list-sources 2>&1 | head
  risk_level: medium
  bastion_prompt: 'secu VM에서 suricata-update list-sources 를 실행해 사용 가능한 룰셋 소스를 보여줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: et/open 룰셋을 enable 하시오.
  hint: suricata-update enable-source et/open
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata-update에 et/open 룰셋을 enable 해줘

    📎 참고 (CLI): sudo suricata-update enable-source et/open 2>&1 | tail'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: et/open 룰셋을 enable 하시오.'
  verify:
    type: output_contains
    expect: et/open
    field: stdout
    semantic:
      intent: 'et/open 룰셋 활성화 — sudo suricata-update enable-source et/open 2>&1 |
        tail. Emerging Threats Open 룰셋은 free, 커뮤니티 기반 IDS 룰 - 최대 규모의 오픈 룰셋. 활성화 후
        suricata-update 실행 시 다운로드됨. /etc/suricata/update.yaml 의 sources 배열에 추가됨. 대안
        source: oisf/trafficid(OISF 공식), ptresearch/attackdetection. license 확인 필수'
      success_criteria:
      - enable-source et/open 실행
      - et/open 문자열 포함
      - enable 성공 메시지
      acceptable_methods:
      - sudo suricata-update enable-source et/open
      - sudo suricata-update add-source custom https://url/rules.tar.gz(private)
      - vim /etc/suricata/update.yaml 에 sources 블록 수동
      - Ansible community.general.suricata_rule_source 모듈
      - suricata-update disable-source / remove-source 대응
      negative_signs:
      - enable 대신 add-source 오용
      - 다른 source 활성화
      - tail 없이 긴 출력 숨김
  target_vm: secu
  script: sudo suricata-update enable-source et/open 2>&1 | tail
  risk_level: medium
  bastion_prompt: 'secu VM에서 suricata-update에 et/open 룰셋을 enable 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: suricata-update 를 실행해 룰셋을 다운로드·병합하시오.
  hint: sudo suricata-update
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata-update 를 실행해 룰셋을 갱신해줘

    📎 참고 (CLI): sudo suricata-update 2>&1 | tail -10'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: suricata-update 를 실행해 룰셋을 다운로드·병합하시오.'
  verify:
    type: output_contains
    expect: rules
    field: stdout
    semantic:
      intent: 'Suricata 룰셋 업데이트 실행 — sudo suricata-update 2>&1 | tail -10. 활성화된 모든
        source 에서 룰 다운로드 → merge → /var/lib/suricata/rules/suricata.rules 로 통합 저장.
        출력: Downloading <source>, Done., Loaded <N> rules, Writing rules to ..., Testing
        with suricata -T(자동), Done. 주기적 cron(daily)으로 자동화 권장. 네트워크 연결 필요'
      success_criteria:
      - suricata-update 실행
      - rules 키워드 또는 rule count 출력
      - 에러 없이 완료
      acceptable_methods:
      - sudo suricata-update
      - sudo suricata-update --no-test 로 TEST skip
      - sudo suricata-update --etoro-url 로 custom ET url
      - 'cron: 0 3 * * * root /usr/bin/suricata-update && systemctl reload suricata'
      - CI/CD 파이프라인에 rule sync
      negative_signs:
      - 출력 무시
      - 네트워크 에러 무시
      - reload 누락(룰 다운받았지만 미적용)
  target_vm: secu
  script: sudo suricata-update 2>&1 | tail -10
  risk_level: medium
  bastion_prompt: 'secu VM에서 suricata-update 를 실행해 룰셋을 갱신해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: 갱신된 룰 파일 위치(/var/lib/suricata/rules/suricata.rules)의 룰 개수를 확인하시오.
  hint: wc -l /var/lib/suricata/rules/suricata.rules
  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM의 갱신된 suricata.rules 파일 룰 개수를 확인해줘

    📎 참고 (CLI): sudo wc -l /var/lib/suricata/rules/suricata.rules'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: 갱신된 룰 파일 위치(/var/lib/suricata/rules/suricata.rules)의
    룰 개수를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 업데이트된 suricata.rules 룰 개수 확인 — sudo wc -l /var/lib/suricata/rules/suricata.rules.
        총 라인 수 = 룰 수 + 주석. et/open 활성 시 보통 35,000-50,000 라인. 수가 0 이면 다운로드 실패, 몇 백대
        라인이면 기본 룰만 로드. suricata -T 로 syntax 검증도 함께 수행 권장. /var/lib/suricata/rules/
        는 merged 위치, /etc/suricata/rules/ 는 legacy
      success_criteria:
      - wc -l 실행
      - 숫자 출력(라인 수)
      - 파일 경로 정확
      acceptable_methods:
      - sudo wc -l /var/lib/suricata/rules/suricata.rules
      - sudo grep -c ^alert /var/lib/suricata/rules/suricata.rules(실제 alert 룰 수)
      - sudo grep -cv ^# /var/lib/suricata/rules/suricata.rules(비주석 라인)
      - sudo du -sh /var/lib/suricata/rules/
      - ls -l /var/lib/suricata/rules/*.rules
      negative_signs:
      - 잘못된 경로(/etc/suricata/rules)
      - wc 대신 cat(너무 많은 출력)
      - 0 라인 정상 판정
  target_vm: secu
  script: sudo wc -l /var/lib/suricata/rules/suricata.rules
  risk_level: low
  bastion_prompt: secu VM의 갱신된 suricata.rules 파일 룰 개수를 확인해줘
- order: 5
  instruction: eve.json 의 최근 50줄에서 event_type=alert 만 필터링해 상위 5개 signature 를 집계하시오.
  hint: jq 필터 + sort | uniq
  category: analysis
  points: 10
  answer: '🤖 프롬프트: secu VM eve.json에서 최근 alert event 중 상위 5개 signature를 집계해줘

    📎 참고 (CLI): sudo tail -500 /var/log/suricata/eve.json | jq -r ''select(.event_type=="alert")
    | .alert.signature'' 2>/dev/null | sort | uniq -c | sort -rn | head'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: eve.json 의 최근 50줄에서 event_type=alert 만 필터링해
    상위 5개 signature 를 집계하시오.'
  verify:
    type: output_contains
    expect: alert
    field: stdout
    semantic:
      intent: Top 5 alert signature 집계 — sudo tail -500 /var/log/suricata/eve.json
        | jq -r select(.event_type=="alert") | .alert.signature | sort | uniq -c |
        sort -rn | head. jq 로 alert 이벤트만 필터 → signature 추출 → sort + uniq -c 로 빈도 계산
        → sort -rn 로 내림차순 → head 5. 가장 많이 발생한 룰 = (1) tuning 필요(FP) 또는 (2) 실제 공격 패턴.
        튜닝 우선순위 결정
      success_criteria:
      - jq select event_type alert 필터
      - signature 추출 + 빈도 집계
      - top 결과 출력
      acceptable_methods:
      - jq + sort | uniq -c | sort -rn | head 파이프라인
      - Elastic Kibana aggregations
      - Wazuh dashboard rule.groups suricata + top rule.description
      - python Counter(signatures).most_common(5)
      - awk 로 alert 라인 파싱(jq 없을 때)
      negative_signs:
      - event_type 필터 없음(dns/http/flow 포함)
      - 집계 없이 단순 출력
      - 정렬 누락
  target_vm: secu
  script: sudo tail -500 /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert")
    | .alert.signature' 2>/dev/null | sort | uniq -c | sort -rn | head
  risk_level: low
  bastion_prompt: secu VM eve.json에서 최근 alert event 중 상위 5개 signature를 집계해줘
- order: 6
  instruction: eve.json 에서 alert 를 가장 많이 발생시킨 source IP top 5 를 추출하시오.
  hint: jq '.src_ip' …
  category: analysis
  points: 10
  answer: '🤖 프롬프트: secu VM eve.json에서 alert를 많이 발생시킨 source IP top 5를 추출해줘

    📎 참고 (CLI): sudo tail -500 /var/log/suricata/eve.json | jq -r ''select(.event_type=="alert")
    | .src_ip'' 2>/dev/null | sort | uniq -c | sort -rn | head'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: eve.json 에서 alert 를 가장 많이 발생시킨 source IP
    top 5 를 추출하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Top 5 alert source IP 집계 — sudo tail -500 /var/log/suricata/eve.json
        | jq -r select(.event_type=="alert") | .src_ip | sort | uniq -c | sort -rn
        | head. 가장 많은 alert 발생시킨 IP 식별 - 공격자 IP 또는 과탐 IP(친구/모니터링). 실전에서 IP + signature
        교차 분석으로 진양성 vs 오탐 구분. 결과 기반 IP 차단(nftables blacklist) 또는 threshold suppression
        대상 결정
      success_criteria:
      - jq src_ip 추출 + 집계
      - event_type=alert 필터
      - top 출력
      acceptable_methods:
      - jq .src_ip + sort | uniq -c | sort -rn | head
      - Kibana aggregation src_ip field + top 5
      - Splunk | stats count by src_ip
      - sort 기준 -nr 혹은 -rn 동일
      - Python pandas groupby(src_ip).size()
      negative_signs:
      - dst_ip 추출(방향 혼동)
      - IP 아닌 hostname 집계
      - 전체 eve(alert 외) 대상
  target_vm: secu
  script: sudo tail -500 /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert")
    | .src_ip' 2>/dev/null | sort | uniq -c | sort -rn | head
  risk_level: low
  bastion_prompt: secu VM eve.json에서 alert를 많이 발생시킨 source IP top 5를 추출해줘
- order: 7
  instruction: /var/log/suricata/stats.log 에서 'kernel_drops' 항목을 확인해 drop 여부를 점검하시오.
  hint: grep kernel_drops …
  category: analysis
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata stats.log에서 kernel_drops 수치를 확인해줘

    📎 참고 (CLI): sudo grep kernel_drops /var/log/suricata/stats.log | tail'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: /var/log/suricata/stats.log 에서 ''kernel_drops''
    항목을 확인해 drop 여부를 점검하시오.'
  verify:
    type: output_contains
    expect: kernel_drops
    field: stdout
    semantic:
      intent: 'kernel_drops 모니터링 — sudo grep kernel_drops /var/log/suricata/stats.log
        | tail. Suricata 가 시간 단위(기본 8초)로 stats.log 에 성능 지표 기록: capture.kernel_packets,
        capture.kernel_drops, capture.errors. kernel_drops 는 커널 ring buffer overflow
        로 놓친 패킷 - 탐지 공백 발생. 지속적 drop 증가 시: (1) CPU 과부하 (2) ring buffer 증설(ring-size)
        (3) 필터/threads 튜닝 필요. drop rate = drops/(drops+packets) < 0.1% 목표'
      success_criteria:
      - grep kernel_drops stats.log 실행
      - kernel_drops 값 출력
      - drop 수치 확인 가능
      acceptable_methods:
      - sudo grep kernel_drops /var/log/suricata/stats.log | tail
      - sudo suricatasc -c iface-stat ens33 | grep drops
      - sudo tail -f /var/log/suricata/stats.log | grep -E drops|errors
      - Prometheus suricata_exporter 로 시계열
      - ss -s 로 버퍼 용량 확인
      negative_signs:
      - 다른 로그(eve.log 등) 확인
      - 단일 시점만(추세 무시)
      - drop 증가 무시
  target_vm: secu
  script: sudo grep kernel_drops /var/log/suricata/stats.log | tail
  risk_level: low
  bastion_prompt: secu VM의 suricata stats.log에서 kernel_drops 수치를 확인해줘
- order: 8
  instruction: /var/log/suricata/fast.log 마지막 20줄을 출력해 최근 알람을 확인하시오.
  hint: tail -20 /var/log/suricata/fast.log
  category: analysis
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata fast.log 마지막 20줄을 보여줘

    📎 참고 (CLI): sudo tail -20 /var/log/suricata/fast.log'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: /var/log/suricata/fast.log 마지막 20줄을 출력해
    최근 알람을 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'fast.log 최근 alert 요약 — sudo tail -20 /var/log/suricata/fast.log. fast.log
        는 사람이 읽기 쉬운 텍스트 alert 로그(한 줄 당 한 알람): timestamp [**] [sid] msg [**] [Classification]
        [Priority] {proto} src:port -> dst:port. eve.json 의 JSON 대비 빠른 눈으로 확인용. 운영
        점검의 daily routine - priority 1 중심 분석. eve.json 이 상세 분석용'
      success_criteria:
      - tail fast.log 실행
      - alert 포맷 라인 출력(timestamp [**] msg)
      - 최근 N 개 이벤트 확인
      acceptable_methods:
      - sudo tail -20 /var/log/suricata/fast.log
      - sudo tail -f /var/log/suricata/fast.log(실시간)
      - sudo awk $NF > "[1:" /var/log/suricata/fast.log(priority 1만)
      - 'grep Priority: 1 /var/log/suricata/fast.log'
      - sudo journalctl -u suricata | tail
      negative_signs:
      - eve.json 을 fast.log 로 혼동
      - tail 없이 cat(전체)
      - priority 필터 없이 모든 알람
  target_vm: secu
  script: sudo tail -20 /var/log/suricata/fast.log
  risk_level: low
  bastion_prompt: secu VM의 suricata fast.log 마지막 20줄을 보여줘
- order: 9
  instruction: suricata.yaml의 threshold 설정 파일 경로를 확인하시오.
  hint: grep threshold-file /etc/suricata/suricata.yaml
  category: tuning
  points: 10
  answer: '🤖 프롬프트: secu VM suricata.yaml에서 threshold-file 설정 경로를 찾아줘

    📎 참고 (CLI): grep -n threshold-file /etc/suricata/suricata.yaml'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: suricata.yaml의 threshold 설정 파일 경로를 확인하시오.'
  verify:
    type: output_contains
    expect: threshold
    field: stdout
    semantic:
      intent: 'threshold-file 설정 확인 — grep -n threshold-file /etc/suricata/suricata.yaml.
        threshold.config 파일 경로(기본 /etc/suricata/threshold.config). threshold 는 룰별
        빈도·중복 제어: type threshold(N회당 1개), type limit(N초당 최대 M개), type suppress(특정
        IP/sid 무시). 과탐 룰 튜닝 핵심. suppress 예: suppress gen_id 1, sig_id 2001219, track
        by_src, ip 10.0.0.5'
      success_criteria:
      - grep threshold-file suricata.yaml 실행
      - 'threshold-file: 경로 출력'
      - line number 포함(-n)
      acceptable_methods:
