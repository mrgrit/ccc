- order: 99
  instruction: |
    [복합 시나리오] "오탐 폭증 → threshold 로 억제" — FP 식별과 관리 직접 체험

    ## 상황 (w01-w05 시나리오 연속)

    ABC 핀테크 SOC 신규 분석가, 여섯째 주.
    1~10 step 으로 et/open 룰셋 갱신 + eve.json 분석 + stats.log 까지 익혔다. 그런데
    학습 목표 #3 — *"오탐(False Positive)을 식별하고 관리할 수 있다"* — 1~10 에선 *분석 도구*
    만 익힘. 실제 FP 발생 → 식별 → 억제 의 *전체 cycle* 은 안 함.

    > 선임: "FP 가 진짜 문제는 *알람 피로(alert fatigue)* 야. 1만 건 alert 중 9999 가 FP 면
    >  진짜 1건을 놓쳐. 학생용으로 *의도적으로 FP 폭증* 시키는 광범위 룰 하나 넣고, threshold 로
    >  억제해 봐. 그 cycle 이 운영의 핵심이야."

    학습 목표 #3 (FP 관리) 의 행동 증명.

    ## 임무 (3 단계, 약 25분)

    ### Phase A — 의도적 FP 폭증 룰 작성 (5분)

    *너무 광범위* 한 룰을 추가 — 정상 트래픽이 모두 alert 발생하게:
      ```
      echo 'alert tcp any any -> any 80 (msg:"FP_TEST any HTTP traffic"; sid:1000301; rev:1;)' \
        | sudo tee -a /etc/suricata/rules/local.rules
      sudo systemctl restart suricata
      ```

    의도: "any tcp → any 80" 이라 모든 HTTP 트래픽이 alert. 5분만 둬도 alert 수십~수백 건.

    ### Phase B — FP 폭증 측정 + threshold 억제 (15분)

    web 으로 정상 트래픽 5회 발생 (학생이 attacker 또는 secu 에서):
      ```
      for i in 1 2 3 4 5; do
        curl -sI http://10.20.30.80/ --max-time 2 > /dev/null
        sleep 1
      done
      ```

    secu 에서 FP_TEST alert 수 확인:
      ```
      sudo tail -200 /var/log/suricata/eve.json | grep -c '"sid":1000301'
      ```
    → 예상: 5건 이상 (정상 트래픽 마다 alert)

    같은 sid 의 *상위 5 source IP* 도 확인:
      ```
      sudo tail -500 /var/log/suricata/eve.json | jq -r 'select(.alert.signature_id==1000301) | .src_ip' | sort | uniq -c | sort -rn | head -5
      ```
    → 정상 source IP 가 top 에 — 이게 "이 source 의 FP 만 suppress 해야 한다" 의 단서.

    이제 `/etc/suricata/threshold.config` 에 suppress 룰 추가:
      ```
      # 다음 라인을 추가:
      # suppress gen_id 1, sig_id 1000301, track by_src, ip 10.20.30.0/24
      sudo bash -c 'echo "suppress gen_id 1, sig_id 1000301, track by_src, ip 10.20.30.0/24" >> /etc/suricata/threshold.config'
      sudo grep '1000301' /etc/suricata/threshold.config
      sudo systemctl restart suricata
      ```

    의도: 내부 망 (10.20.30.0/24) 에서 발생한 sid 1000301 alert 모두 *기록 안 함*.

    다시 동일 트래픽 발생:
      ```
      for i in 1 2 3 4 5; do
        curl -sI http://10.20.30.80/ --max-time 2 > /dev/null
        sleep 1
      done
      ```

    secu 에서 FP_TEST alert 카운트 재확인:
      `sudo tail -200 /var/log/suricata/eve.json | grep -c '"sid":1000301'`
    → 예상: 0 또는 추가된 카운트 없음 (suppress 적용)

    ### Phase C — 회고 + 정리 (5분)

    ## Phase B 결과 비교표

    | 시점 | 트래픽 5건 | alert 카운트 | 비고 |
    |------|----------|-------------|-----|
    | suppress 전 | 5 curl | 5+ | FP 폭증 |
    | suppress 후 | 5 curl | 0 (또는 정지) | suppress 적용 |

    1~2 단락 회고:
    1. **suppress 전후 alert 수 변화** — 정량 (X건 → 0건 차이)
    2. **threshold 의 *3 가지 액션* 차이** — suppress (전체 차단) / threshold limit
       (n분당 m건만) / threshold both (limit + 시간 윈도우 모두)
    3. **운영 시 suppress 의 위험** — *지나친 suppress 는 진짜 공격을 놓치게 함*. 따라서
       suppress 룰은 *최소한* + 정기 review (예: 분기별)

    종료 정리:
      ```
      sudo sed -i '/sid:1000301/d' /etc/suricata/rules/local.rules
      sudo sed -i '/1000301/d' /etc/suricata/threshold.config
      sudo systemctl restart suricata
      ```
  hint: |
