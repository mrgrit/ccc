  answer: '🤖 프롬프트: secu VM에서 suricatasc 를 사용해 Suricata uptime을 조회해줘

    📎 참고 (CLI): sudo suricatasc -c uptime 2>&1 | head'
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: suricatasc 로 Suricata 엔진의 uptime 을 질의하시오.'
  verify:
    type: output_contains
    expect: uptime
    field: stdout
    semantic:
      intent: 'suricatasc uptime 조회 — sudo suricatasc -c uptime 2>&1 | head. suricatasc
        는 Suricata Unix socket control client - /var/run/suricata/suricata-command.socket
        로 실시간 제어·조회. uptime 명령으로 초 단위 가동 시간 반환. 다른 명령: iface-stat, reload-rules, ruleset-reload-rules,
        capture-mode, dump-counters. unix-command 는 suricata.yaml 에 enabled: yes 설정
        필요'
      success_criteria:
      - suricatasc -c uptime 실행
      - uptime 숫자(초) 출력
      - 응답 성공 확인
      acceptable_methods:
      - sudo suricatasc -c uptime
      - sudo suricatasc -c dump-counters(JSON 통계)
      - sudo suricatasc -c iface-stat <interface>
      - sudo suricatasc -c reload-rules(livereload)
      - ps -p $(pidof suricata) -o etime= (프로세스 uptime)
      - |
        **[OSS] suricatasc (Unix socket CLI)** — 운영 표준 도구.
          # 1. uptime (초 단위)
          sudo suricatasc -c uptime
          # 2. 사람 친화 시간 형식
          sudo suricatasc -c uptime 2>&1 | jq -r '.message' | awk '{
              days=int($1/86400); hours=int(($1%86400)/3600); mins=int(($1%3600)/60);
              printf "%dd %dh %dm\n", days, hours, mins
          }'
          # 3. 다른 명령들
          sudo suricatasc -c help        # 모든 명령 목록
          sudo suricatasc -c memcap-list # memcap 상태
          sudo suricatasc -c version     # Suricata 버전
        예상 출력 `{"return":"OK","message":86400} / 1d 0h 0m`.
        운영 해석: 운영자가 실시간 통신. systemd 가 보여주는 service uptime 과 다를 수 있음 (engine 자체 uptime).
      - |
        **[OSS] systemctl + ps (process uptime)** — 비교 검증.
          # 1. systemd 의 service active 시간
          systemctl show suricata --property=ActiveEnterTimestamp
          # 2. process uptime (etime)
          ps -p $(pidof suricata) -o etime=
          # 3. 부팅부터 (uptime 명령)
          uptime
          # 4. 비교: suricatasc uptime vs etime
          # 차이 = engine restart 한 번 (suricata 가 reload 시 새 PID)
        예상 출력 `Tue 2026-05-05 03:00:01 KST / 1-00:00:01 / up 25 hours`.
        운영 해석: systemd uptime 과 engine uptime 비교. 차이 큰 경우 = restart 빈번 = OOM 의심.
      - |
        **[OSS] suricatasc dump-counters (JSON 통계 표준)** — full metrics.
          # 1. 모든 카운터 dump
          sudo suricatasc -c "dump-counters" 2>&1 | jq '.message' > /tmp/all-counters.json
          # 2. 핵심 카테고리 추출
          sudo suricatasc -c "dump-counters" 2>&1 | jq '.message | {capture: {kernel_packets, kernel_drops}, detect: {alert, accept, drop}, app_layer: {flow, tx}}'
          # 3. 시간 별 변화 (1초 간격)
          while true; do
              sudo suricatasc -c "dump-counters" 2>&1 | jq '.message | {ts:now, capture}'
              sleep 1
          done | head
        예상 출력 `{"capture":{"kernel_packets":12345678,"kernel_drops":0},"detect":{"alert":1450,"accept":12000,"drop":12}}`.
        운영 해석: 100+ 카운터의 full metrics. Prometheus / Grafana 자동 import 표준 source.
      - |
        **[OSS] suricatasc helper script (운영 자동화)** — 헬스체크.
          # 1. 헬스체크 script
          sudo tee /usr/local/bin/suricata-health << 'EOF'
          #!/bin/bash
          uptime=$(suricatasc -c uptime 2>&1 | jq -r '.message')
          drops=$(suricatasc -c "dump-counters" 2>&1 | jq -r '.message["capture.kernel_drops"]')
          alerts=$(suricatasc -c "dump-counters" 2>&1 | jq -r '.message["detect.alert"]')
          echo "Uptime: ${uptime}s / Drops: $drops / Alerts: $alerts"
          # health 판정
          if [ "$drops" -gt 1000 ]; then echo "WARN: high drops"; exit 1; fi
          EOF
          sudo chmod +x /usr/local/bin/suricata-health
          # 2. cron 으로 매분 실행
          echo "* * * * * /usr/local/bin/suricata-health | logger -t suricata-health" | sudo crontab -
        예상 출력 `Uptime: 86400s / Drops: 0 / Alerts: 1450`.
        운영 해석: 매분 헬스체크 + syslog 기록. SIEM 연동 자동.
      - |
        **[OSS] Suricata REST API (suricata.yaml unix-command)** — 외부 통합.
          # 1. unix-command 활성화
          # /etc/suricata/suricata.yaml:
          # unix-command:
          #   enabled: yes
          #   filename: /var/run/suricata/suricata-command.socket
          # 2. socat 으로 socket → TCP bridge (외부 도구 연동)
          sudo socat TCP-LISTEN:8055,fork UNIX-CONNECT:/var/run/suricata/suricata-command.socket &
          # 3. 외부에서 TCP 통신
          echo '{"command":"uptime"}' | nc localhost 8055
        예상 출력 `{"return":"OK","message":86400}`.
        운영 해석: Unix socket → TCP bridge = 다른 host 의 SIEM 도구 연동. 단, 보안 위험 (인증 없음 = 내부 망만).
      negative_signs:
      - suricatasc 소켓 없음 무시
      - -c 누락(command 없음)
      - uptime 실제 값 확인 안 함
