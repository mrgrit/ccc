    1) secu VM에서 suricata-update list-sources 를 실행해 사용 가능한 룰셋 소스를 보여줘

    2) secu VM에서 suricata-update에 et/open 룰셋을 enable 해줘

    3) secu VM에서 suricata-update 를 실행해 룰셋을 갱신해줘

    4) secu VM의 갱신된 suricata.rules 파일 룰 개수를 확인해줘

    5) secu VM eve.json에서 최근 alert event 중 상위 5개 signature를 집계해줘'
