    field: stdout
    semantic:
      intent: '의도적으로 FP 폭증 룰을 작성해 alert fatigue 환경을 만들고, threshold.config 의 suppress

        로 억제. 학습 목표 #3 (FP 식별·관리) 의 cycle (식별 → 분석 → 억제) 직접 체험.

        '
      success_criteria:
      - Phase A — 광범위 sid:1000301 룰 작성 + suricata restart
      - Phase B — 정상 트래픽 5회 → alert 폭증 확인 (5건+)
      - Phase B — top source IP 분석 (jq 활용)
      - Phase B — threshold.config 에 suppress 룰 추가 + restart → alert 0 검증
      - 비교표 (suppress 전후 alert 수)
      - 회고 1~2 단락 + 정리 (룰 + threshold 모두 제거)
      acceptable_methods:
      - secu 에서 광범위 alert 룰 추가 + systemctl restart suricata
      - attacker/secu 에서 curl 정상 트래픽 발생
      - secu 에서 jq + sort + uniq 으로 top source 분석
      - secu 에서 threshold.config suppress 룰 추가 + restart
      - secu 에서 grep eve.json 으로 alert 카운트 비교
      - |
        **[OSS] threshold.config suppress (FP 억제 표준)** — production 운영.
          # 1. suppress 룰 형식
          # suppress gen_id <generator>, sig_id <sid>, track <by_src|by_dst|by_rule>, ip <CIDR>
          # 2. 본 시나리오 — 내부 망의 sid 1000301 alert 모두 suppress
          sudo bash -c 'echo "suppress gen_id 1, sig_id 1000301, track by_src, ip 10.20.30.0/24" >> /etc/suricata/threshold.config'
          # 3. 적용 + 검증
          sudo systemctl restart suricata
          sudo grep "1000301" /etc/suricata/threshold.config
          # 4. suppress 효과 확인 (alert 카운트 비교)
          before=$(sudo tail -200 /var/log/suricata/eve.json | grep -c "sid.:1000301")
          # ... trigger ...
          after=$(sudo tail -200 /var/log/suricata/eve.json | grep -c "sid.:1000301")
          echo "Before: $before / After: $after"
        예상 출력 `Before: 5 / After: 5` (after 가 변화 없음 = suppress 적용).
        운영 해석: FP 억제 표준 도구. by_src vs by_dst 결정이 핵심.
      - |
        **[OSS] threshold.config threshold (rate limit alert)** — suppress 대안.
          # 1. threshold limit (5초 내 1 alert만)
          # threshold gen_id <gen>, sig_id <sid>, type limit, track <track>, count <N>, seconds <sec>
          sudo bash -c 'echo "threshold gen_id 1, sig_id 1000301, type limit, track by_src, count 1, seconds 60" >> /etc/suricata/threshold.config'
          sudo systemctl restart suricata
          # 2. 효과: 같은 src 의 1000301 alert 가 60초당 최대 1건만
          # 3. type 종류
          # - limit: 시간당 N건 만
          # - threshold: N건 발생 후 1건 alert (배치)
          # - both: 둘 다 적용
        예상 결과: alert 폭주 방지 + 패턴 감지는 유지.
        운영 해석: suppress 는 *완전 차단*, threshold limit 는 *비율 제한*. 진짜 공격 놓치기 위험은 limit 가 낮음.
      - |
        **[OSS] scirius hunt (FP 패턴 분석 + suppress)** — GUI workflow.
          # 1. https://scirius:8000/hunt 접속
          # 2. UI 동작:
          # - signature 별 시간대 분포 차트
