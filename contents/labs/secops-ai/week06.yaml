      intent: 업데이트된 suricata.rules 룰 개수 확인 — sudo wc -l /var/lib/suricata/rules/suricata.rules.
        총 라인 수 = 룰 수 + 주석. et/open 활성 시 보통 35,000-50,000 라인. 수가 0 이면 다운로드 실패, 몇 백대
        라인이면 기본 룰만 로드. suricata -T 로 syntax 검증도 함께 수행 권장. /var/lib/suricata/rules/
        는 merged 위치, /etc/suricata/rules/ 는 legacy
      success_criteria:
      - wc -l 실행
      - 숫자 출력(라인 수)
      - 파일 경로 정확
      acceptable_methods:
      - sudo wc -l /var/lib/suricata/rules/suricata.rules
      - sudo grep -c ^alert /var/lib/suricata/rules/suricata.rules(실제 alert 룰 수)
      - sudo grep -cv ^# /var/lib/suricata/rules/suricata.rules(비주석 라인)
      - sudo du -sh /var/lib/suricata/rules/
      - ls -l /var/lib/suricata/rules/*.rules
      - |
        **[OSS] wc / grep (룰 카운트)** — 표준 텍스트 분석.
          # 1. 전체 라인 (룰 + 주석 + 빈 라인)
          sudo wc -l /var/lib/suricata/rules/suricata.rules
          # 2. 실제 룰만 (주석 제외)
          sudo grep -cE '^(alert|drop|reject|pass)' /var/lib/suricata/rules/suricata.rules
          # 3. action 별 분포
          sudo awk '/^[a-z]/ {print $1}' /var/lib/suricata/rules/suricata.rules | sort | uniq -c | sort -rn
          # 4. category 별 분포 (sid 기준)
          sudo grep -oE 'sid:[0-9]+' /var/lib/suricata/rules/suricata.rules | awk -F: '{print substr($2,1,3)"xxxxxx"}' | sort | uniq -c | sort -rn
        예상 출력 `35042 / 30001 / 28500 alert / 1500 drop / 1 pass`.
        운영 해석: action 별 분포로 ruleset 의 *공격적 정도* 측정. drop 다수 = production-ready ruleset.
      - |
        **[OSS] suricata --engine-analysis (룰 적재 통계)** — 공식 분석 도구.
          # 1. 모든 룰의 keyword 분석
          sudo suricata --engine-analysis -c /etc/suricata/suricata.yaml 2>&1 | tee /tmp/engine-analysis.log
          # 2. 룰별 적재 시간 + 메모리
          grep "loaded successfully" /tmp/engine-analysis.log
          # 3. 비효율 룰 식별 (slow rule)
          grep -A2 "slow rule" /tmp/engine-analysis.log
          # 4. payload-only 룰 vs full 룰 분포
          grep -E "payload-only|sticky" /tmp/engine-analysis.log | sort | uniq -c
        예상 출력 `30001 rules loaded / 145 slow rules / 12500 payload-only rules`.
        운영 해석: 단순 카운트 외 룰 *품질* 측정. slow rule 식별 → 튜닝 우선순위.
      - |
        **[OSS] sigma stats (Sigma 룰 통계)** — Sigma 룰 분석.
          # 1. Sigma 룰 → Suricata 변환 후 카운트
          sigma convert -t suricata /tmp/sigma/rules/ -o /tmp/sigma-suricata.rules
          wc -l /tmp/sigma-suricata.rules
          # 2. logsource 별 분포
          for f in /tmp/sigma/rules/*.yml; do
              yq '.logsource.product' "$f" 2>/dev/null
          done | sort | uniq -c | sort -rn
          # 3. severity 별 분포
          for f in /tmp/sigma/rules/*.yml; do
              yq '.level' "$f" 2>/dev/null
          done | sort | uniq -c
        예상 출력 `2500 sigma rules / 1200 windows / 800 linux / 500 web / level: 50 critical / 200 high / 1500 medium`.
        운영 해석: Sigma 카탈로그 통계. 환경에 맞는 logsource 만 import = 무관 룰 제거.
      - |
        **[OSS] yq + jq (룰 메타데이터 추출)** — 자동화 분석.
          # 1. JSON 으로 변환 (suricata 룰을 line-by-line)
          awk '/^alert|^drop/ {print $0}' /var/lib/suricata/rules/suricata.rules | head -100 > /tmp/sample.rules
          # 2. Python 으로 룰 파싱 + JSON 변환
          python3 << 'EOF'
          import re, json
          with open('/tmp/sample.rules') as f:
              rules = []
              for line in f:
                  m = re.search(r'sid:(\d+).*msg:"([^"]+)"', line)
                  if m: rules.append({'sid': int(m.group(1)), 'msg': m.group(2)})
              print(json.dumps(rules[:5], indent=2))
          EOF
        예상 출력 `[{"sid": 2003068, "msg": "ET POLICY GoToMyPC..."}, ...]`.
        운영 해석: 룰 메타데이터 자동 추출 = inventory + audit 표준.
      - |
        **[OSS] scirius (web GUI 룰 통계)** — dashboard.
          # 1. https://scirius:8000/dashboard 접속
          # 2. UI 동작:
          # - 좌측: total rules / enabled / disabled 카운트
          # - 우측: ruleset 별 분포 (et/open / private / sigma)
          # - timeline: 룰 변경 history
          # - 카테고리별 drill-down
          # 3. CSV / PDF 보고서 export
        UI 동작: 대시보드 + drill-down + 보고서.
        운영 해석: 일일/주간 ruleset 보고서 자동 생성. 경영진 보고용 표준.
      negative_signs:
      - 잘못된 경로(/etc/suricata/rules)
      - wc 대신 cat(너무 많은 출력)
      - 0 라인 정상 판정
