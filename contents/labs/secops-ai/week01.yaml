    2) 로그 라이브성: 각 layer 의 로그 파일에 최근 1시간 entry 가 있는지 (없으면 dead)
    3) Attack vector 매트릭스 준비: 5 vector 각각 본인 환경에서 시뮬레이션 (포트스캔=nmap, SQLi=curl, 등)
    4) 매트릭스 작성: 5×5 = 25 셀, 각 셀에 detect/block/log/none 표기
    5) 통합 보고: dead layer 가 있는지, 가장 활발한 layer, 다음 주 drill 까지 우선 보강 필요 영역 1개
