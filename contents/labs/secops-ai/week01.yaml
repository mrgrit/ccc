    당신은 ABC 회사의 신규 SOC 분석가다. 인계받은 보안 인프라는 5 layer (nftables/Suricata/
    ModSecurity/Wazuh/OpenCTI) 다. 다음 주 첫 incident drill 전까지 다음 두 가지를 입증해야 한다:

      (A) 5 layer 모두 *현재 가동 중* 이며 *룰셋이 비어있지 않다*
      (B) 5 가지 attack vector — 포트스캔, SQLi, Brute Force, Phishing 도메인 접속,
          멀웨어 다운로드 — 가 어느 layer 에 evidence 를 남기는지 *cross-layer matrix* 작성

    교안 §"실제 사례 — 1개 보안 layer 만 있으면 어떤 일이 벌어지나" 의 결론
    ("1 layer 만으로는 evidence 의 5.7%만 봄") 을 본인 실습 환경에서 직접 검증한다.

    아래 5 단계를 순서대로 수행하고, 마지막에 통합 보고 1줄을 작성하라.
  hint: |
