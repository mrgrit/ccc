- order: 99
  instruction: "[복합 시나리오] SOC 첫 출근 — \"5 layer 다 켜져 있는데 왜 침해를 놓치지?\"\n\n## 상황 (몰입을\
    \ 위한 배경)\n\n당신은 ABC 핀테크 회사 SOC (Security Operations Center) 의 신규 분석가다.\n오늘 첫 출근.\
    \ 인수인계 자료에는 한 줄만 적혀 있다:\n\n> \"우리 SOC 는 5 layer Defense in Depth — nftables 방화벽\
    \ + Suricata IDS +\n>  ModSecurity WAF + Wazuh SIEM + OpenCTI Threat Intel — 모두\
    \ 운영 중.\"\n\n옆 자리 선임이 커피를 쥐고 와서 한 마디 흘리고 갔다.\n\n> \"5 layer 다 켜져 있다고 다 일하고 있다는\
    \ 뜻은 아냐. 지난달 ransomware 침해는\n>  4번째 layer (Wazuh) 에서 잡았어. 만약 우리가 firewall 만 봤다면\
    \ evidence 의\n>  5.7% 만 보고 흘려보냈을 거야. 너 들어왔으니, 매트릭스 한 번 그려봐 —\n>  5 layer 가 *진짜*\
    \ 일하고 있는지, 어느 vector 가 어느 layer 에 흔적 남기는지.\n>  다음 주 첫 incident drill 전에 팀에 보고해.\"\
    \n\n교안 §\"실제 사례 — 1개 보안 layer 만 있으면 어떤 일이 벌어지나\" 에서 본 그 5.7%.\n실제 운영 SOC 1년치 데이터로\
    \ 검증된 수치다. 이제 본인 환경에서 검증할 차례다.\n\n## 임무 (4 단계, 약 35분)\n\n### Phase A — \"5 layer\
    \ 가 정말 살아있는가\" (10분)\n\n여기서 함정 — `systemctl is-active` 만 확인하면 안 된다. 살아있어도 룰셋이\
    \ 비어있으면\n*dead 와 동일* 하다 (예: nftables active 인데 룰 0개면 모든 트래픽 통과).\n\n각 layer 한\
    \ 줄씩 표 작성:\n\n  | layer | active? | 룰셋 카운트 | 최근 1h 로그 entry |\n  | nft     | ?\
    \       | ?           | ?                  |\n  | Suricata| ?       | ?      \
    \     | ?                  |\n  | ModSec  | ?       | ?           | ?        \
    \          |\n  | Wazuh   | ?       | ?           | ?                  |\n  |\
    \ OpenCTI | ?       | ?           | ?                  |\n\n어느 한 항목이라도 0/dead\
    \ 면 그 layer 는 사실상 무용 (Phase D 에서 보고 항목).\n\n### Phase B — \"5 attack vector 시뮬레이션\"\
    \ (5분)\n\n실제 침해까지는 아니지만 *각 layer 가 신호 발생할 만큼만* 시도한다. destructive 금지 —\nlog/alert\
    \ 만 발생시키는 수준. 5 vector 각각 1분 내:\n\n1. **포트 스캔** (네트워크 정찰)\n   `nmap -sS -F 10.20.30.80`\
    \ (attacker → web, 100 포트)\n   *예상*: nft counter 증가 + Suricata \"ET SCAN\" alert.\n\
    \n2. **SQL Injection 시도** (애플리케이션 공격)\n   `curl 'http://10.20.30.80:3000/rest/products/search?q=1%27+OR+1=1--'`\n\
    \   *예상*: ModSec CRS 942100 매칭 + Apache access log.\n\n3. **SSH Brute Force**\
    \ (인증 공격, 3 시도만)\n   `hydra -l ccc -P /tmp/3pwds.txt ssh://10.20.30.80 -t 1`\n\
    \   *예상*: Wazuh authentication_failed rule 발화.\n\n4. **Phishing 도메인 DNS 조회** (CTI\
    \ 매칭)\n   `dig +short malicious-test.invalid @10.20.30.100`\n   *예상*: OpenCTI\
    \ threat indicator 매칭 (feed 활성 시).\n\n5. **EICAR 멀웨어 다운로드 시도** (signature 매칭)\n\
    \   `curl http://eicar-test.local/test.txt -o /tmp/x.test`\n   *예상*: Suricata\
    \ + Wazuh FIM (파일 생성 감지).\n\n각 시뮬 직후 2~5초 정도 뒤 5 layer 의 로그/alert 확인:\n  - nft:\
    \ `nft list ruleset | grep counter`\n  - Suricata: `tail -50 /var/log/suricata/eve.json\
    \ | grep -c alert`\n  - ModSec: `tail -50 /var/log/apache2/modsec_audit.log`\n\
    \  - Wazuh: `tail -100 /var/ossec/logs/alerts/alerts.log`\n  - OpenCTI: `curl\
    \ http://10.20.30.100:8080/api/observables/recent`\n\n### Phase C — \"Cross-layer\
    \ matrix\" (15분, 가장 중요)\n\nPhase B 의 5 vector × Phase A 의 5 layer = **25 cell\
    \ 매트릭스** 작성.\n각 cell 에 4 가지 중 하나 + evidence 출처:\n\n  - **block** — 차단됨 (예: \"\
    nft input chain DROP, counter +12\")\n  - **detect** — alert 발생, 트래픽은 통과 (예: \"\
    Suricata eve.json SID=2010937, 3 alert\")\n  - **log** — 기록만, alert 없음 (예: \"\
    Apache access.log line 42, no rule match\")\n  - **none** — 흔적 없음 (이 layer 가 못\
    \ 봄)\n\n| Vector \\\\ Layer | nft | Suricata | ModSec | Wazuh | OpenCTI |\n|-----------------|-----|----------|--------|-------|---------|\n\
    | port scan       | ?   | ?        | ?      | ?     | ?       |\n| SQLi      \
    \      | ?   | ?        | ?      | ?     | ?       |\n| SSH brute       | ?  \
    \ | ?        | ?      | ?     | ?       |\n| phishing DNS    | ?   | ?       \
