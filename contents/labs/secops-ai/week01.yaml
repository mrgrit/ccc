    ModSecurity 로드 + CRS 룰 디렉토리 수 / siem 의 Wazuh Manager active + local_rules 행 수 /
    OpenCTI feeds API 응답 수 — 5건 모두 한 번에 수집.

    Phase B: attacker→web 으로 nmap -sS -F / curl SQLi 페이로드 / hydra ssh 3-pwd / dig
    malicious-test.invalid / curl eicar.test — 5 vector 1분 내 시뮬.

    Phase C: 5×5 cross-layer matrix markdown 표 작성. 각 cell 에 detect/block/log/none + evidence path.

    Phase D: 1줄 통합 보고 — 가장 활발 layer, dead layer, 다음 주 drill 보강 우선순위 1개.
