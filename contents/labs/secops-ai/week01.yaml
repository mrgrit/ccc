lab_id: secops-ai-week01
title: 보안 솔루션 인프라 점검 (AI 지원)
version: ai
course: secops-ai
week: 1
description: 실습 환경의 보안 솔루션(nftables, Suricata, ModSecurity, Wazuh, OpenCTI)이 각 VM에
  어떻게 배치·동작하는지 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- 실습 인프라 VM의 역할과 배포된 보안 솔루션을 파악한다
- 각 보안 솔루션이 실제로 동작하는지 명령어로 확인한다
- 솔루션별 주요 로그와 설정 파일 위치를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'secu VM({{SECU_IP}})의 nftables 테이블 목록을 확인하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft list tables
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 nftables 테이블 목록을 확인해줘

    📎 참고 (CLI): nft list tables'
  answer_detail: '보안 솔루션 인프라 점검: secu VM(10.20.30.1)의 nftables 테이블 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: 'secu VM nftables 테이블 목록 확인 — nft list tables 로 현재 로드된 netfilter tables
        (family + name) 열거. 기본 family: inet(IPv4+IPv6 공통), ip/ip6, arp, bridge, netdev.
        CCC 환경의 방화벽 룰셋 구조 파악의 시작점. iptables-nft compatibility 모드 시 filter/nat/mangle
        등 legacy 테이블 매핑 확인'
      success_criteria:
      - nft list tables 실행
      - 테이블 family 와 name 출력
      - table 키워드 포함
      acceptable_methods:
      - nft list tables
      - iptables-nft -L (compat 모드)
      - cat /etc/nftables.conf 로 선언 확인
      - systemctl status nftables 에서 로드 상태 확인
      - '**[OSS] firewalld / firewall-cmd** — `firewall-cmd --list-all-zones` (RHEL 계열) 로 zone 별 룰 view. 입문자가 처음 만나는 방화벽 GUI 의 백엔드는 nftables.'
      - '**[OSS] ufw** — `ufw status verbose` (Ubuntu) — nftables backend 의 frontend. 사람이 룰 작성 시 ufw 명령으로 입력하면 nft 로 자동 변환됨.'
      - '**[OSS] conntrack-tools** — `sudo conntrack -L | head -20` 로 현재 살아있는 connection state 조회. 방화벽 룰의 *효과* 를 보는 운영 도구. nft 통과한 flow 만 conntrack 에 등록됨.'
      - '**[OSS] iftop / nload** — `sudo iftop -i any -n -P` — 실시간 트래픽 시각화 ncurses UI. 방화벽 통과 트래픽을 사람이 *눈으로* 확인하는 표준.'
      - '**[OSS] tshark / wireshark** — `sudo tshark -i any -c 30 "tcp port 22"` — 패킷 wire-level 캡처. 룰 적용 전후 차이를 비교하여 동작 검증.'
      negative_signs:
      - nft 명령어 없이 개념 설명
      - family 구분 없이 table 이름만
      - 에러 숨김(2>/dev/null 만)
  target_vm: secu
  script: nft list tables
  risk_level: low
  bastion_prompt: 'secu VM의 nftables 테이블 목록을 확인해줘


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog`
    후 (1)빈도·패턴 (2)MITRE (3)방어 3섹션. raw dump 금지.'
  fixtures:
  - generator: firewall_log
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 2
  instruction: secu VM에서 Suricata 서비스 상태를 확인하시오.
  hint: systemctl is-active suricata
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 Suricata 서비스 상태를 확인해줘

    📎 참고 (CLI): systemctl status suricata --no-pager | head -15'
  answer_detail: '보안 솔루션 인프라 점검: secu VM에서 Suricata 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: suricata
    field: stdout
    semantic:
      intent: 'secu VM Suricata 서비스 상태 확인 — systemctl status suricata --no-pager |
        head -15 로 Active: active (running), Main PID, 최근 log line 출력. Suricata 는
        IDS/IPS 로 네트워크 트래픽 실시간 분석 + alert 생성. --no-pager 로 ssh 세션에서 pager block 방지.
        비활성이면 Suricata 탐지 공백 발생'
      success_criteria:
      - systemctl 또는 service 명령 실행
      - active 또는 inactive 상태 출력
      - suricata 문자열 포함
      acceptable_methods:
      - systemctl status suricata --no-pager
      - systemctl is-active suricata
      - ps auxf | grep -i suricata
      - suricatasc -c uptime 으로 ring 상태
      - journalctl -u suricata -n 20
      - '**[OSS] evebox** — Suricata eve.json 의 web UI dashboard. `evebox server -c /etc/evebox/evebox.yaml` 후 5636 포트 접속. SOC 분석가가 alert 검색·hunt 표준 OSS UI.'
      - '**[OSS] scirius** — Suricata 룰·threat hunting 종합 GUI (SELKS distro 포함). 룰셋 관리 + alert 분석 통합 dashboard. 운영 환경 표준.'
      - '**[OSS] Security Onion** — Suricata + Zeek + Wazuh 통합 배포판. `sudo so-status` 명령으로 stack 전체 health 한 번에. lab 환경 외 production 표준.'
      - '**[OSS] netdata** — `http://localhost:19999` 실시간 metrics dashboard. Suricata application module 활성화 시 thread 별 CPU/패킷 처리율 시각화.'
      - '**[OSS] htop / btop** — `htop` 으로 suricata 의 worker / detect / app-layer thread 별 CPU 분포. 한 thread 만 100% 면 NIC RSS 미설정.'
      negative_signs:
      - 다른 서비스(wazuh 등) 확인
      - active/inactive 판정 결과 누락
      - pager 에러로 출력 중단
  target_vm: secu
  script: systemctl status suricata --no-pager | head -15
  risk_level: low
  bastion_prompt: secu VM의 Suricata 서비스 상태를 확인해줘
- order: 3
  instruction: web VM({{WEB_IP}})에서 Apache + ModSecurity 모듈 로드 상태를 확인하시오.
  hint: apachectl -M | grep security
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM의 Apache ModSecurity 모듈이 로드되어 있는지 확인해줘

    📎 참고 (CLI): apachectl -M 2>/dev/null | grep -i security'
  answer_detail: '보안 솔루션 인프라 점검: web VM(10.20.30.80)에서 Apache + ModSecurity 모듈 로드
    상태를 확인하시오.'
  verify:
    type: output_contains
    expect: security
    field: stdout
    semantic:
      intent: web VM Apache ModSecurity 모듈 로드 확인 — apachectl -M 2>/dev/null | grep
        -i security 로 security2_module 로드 여부 검사. ModSecurity 는 Apache/Nginx 용 WAF,
        OWASP CRS(Core Rule Set) 와 함께 SQLi·XSS·RFI 등 Layer-7 공격 차단. 모듈 없으면 WAF 기능
        OFF. apache2 의 경우 mods-enabled/security2.conf 존재 + LoadModule 지시어 확인
      success_criteria:
      - apachectl -M 또는 apache2ctl -M 실행
      - security2_module 또는 mod_security 문자열 포함
      - 출력에 security 키워드
      acceptable_methods:
      - apachectl -M | grep -i security
      - apache2ctl -M | grep security
      - ls /etc/apache2/mods-enabled/ | grep security
      - httpd -t -D DUMP_MODULES
      - 'curl localhost -H X-Attack: test; grep 차단 로그'
      - '**[OSS] wafw00f** — `wafw00f http://10.20.30.80:8082` — WAF 존재·종류 fingerprinting. 외부에서 ModSec 가 보이는지 black-box 검증. 침투테스터 1차 도구.'
      - '**[OSS] gotestwaf** — `gotestwaf --url http://10.20.30.80:8082 --reportPath /tmp/wafreport` — WAF 우회 테스트 표준 OSS 도구. 룰 적재 + 차단 효과 종합 평가.'
      - '**[OSS] ftw (Framework for Testing WAFs)** — OWASP CRS 공식 테스트 프레임워크. `pip install ftw && ftw run --include-tags positive` 룰별 회귀 테스트. 운영 변경 후 검증 표준.'
      - '**[OSS] nikto** — `nikto -h http://10.20.30.80:8082` — 웹 vuln 스캐너. WAF 가 nikto User-Agent 차단하는지 + CRS 913 룰 동작 검증.'
      - '**[OSS] goaccess** — Apache log 실시간 대시보드. `goaccess /var/log/apache2/access.log -c --log-format=COMBINED` 로 ModSec 차단 패턴 시각화. 일별 추세 파악.'
      negative_signs:
      - 모듈 이름 미확인
      - Nginx 에서 검색(잘못된 VM)
      - security 키워드 매칭 실패
  target_vm: web
  script: apachectl -M 2>/dev/null | grep -i security
  risk_level: low
  bastion_prompt: web VM의 Apache ModSecurity 모듈이 로드되어 있는지 확인해줘
- order: 4
  instruction: siem VM({{SECU_IP}}00)에서 Wazuh Manager 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-manager
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 Wazuh Manager 서비스가 동작 중인지 확인해줘

    📎 참고 (CLI): systemctl is-active wazuh-manager || echo inactive'
  answer_detail: '보안 솔루션 인프라 점검: siem VM(10.20.30.100)에서 Wazuh Manager 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: 'siem VM Wazuh Manager 서비스 상태 — systemctl is-active wazuh-manager 로
        active/inactive/failed 판정. Wazuh Manager 는 SIEM 의 핵심 엔진: 에이전트 로그 수신 → decoder/rule
        매칭 → alert 생성 → alerts.json 저장. 비활성이면 모든 SOC 탐지 기능 마비. || echo inactive 로
        실패 시 명확한 출력'
      success_criteria:
      - systemctl is-active wazuh-manager 실행
      - active/inactive 문자열 출력
      - 상태 판정 결과 명확
      acceptable_methods:
      - systemctl is-active wazuh-manager
      - systemctl status wazuh-manager --no-pager
      - /var/ossec/bin/wazuh-control status
      - ps auxf | grep wazuh
      - curl -k https://localhost:55000 Wazuh API health
      - '**[OSS] Wazuh Dashboard (Kibana fork)** — `https://10.20.30.100:443` 웹 UI 의 Management → Status. agent 연결·alert 흐름·관리자 daemon 상태 한 번에. SOC 운영 표준.'
      - '**[OSS] wazuh-cli / wapi** — Wazuh REST API CLI 클라이언트. `wapi get manager status` 로 manager 상태 텍스트 출력. CI/CD pipeline 의 Wazuh 헬스체크에 사용.'
      - '**[OSS] cyb3rward0g/Wazuh-Tools** — Wazuh 운영 헬퍼 컬렉션 (GitHub). `wazuh-utils.sh status` 로 manager + indexer + dashboard 통합 상태.'
      - '**[OSS] netdata + wazuh-plugin** — `netdata` 의 Wazuh 모듈로 manager의 실시간 metrics (event/sec, agent count, queue depth) 시각화.'
      - '**[OSS] htop** — `htop` 으로 wazuh-analysisd / wazuh-remoted / wazuh-execd / wazuh-monitord 4 개 데몬 CPU·MEM 분포. 한 데몬만 100% 면 룰 무한 loop.'
      negative_signs:
      - wazuh-agent 확인(서버 측 아님)
      - active 판정 없이 로그만 출력
      - 에러 무시
  target_vm: siem
  script: systemctl is-active wazuh-manager || echo inactive
  risk_level: low
  bastion_prompt: siem VM의 Wazuh Manager 서비스가 동작 중인지 확인해줘
- order: 5
  instruction: siem VM에서 Wazuh Indexer(OpenSearch) 포트(9200) 리스닝 상태를 확인하시오.
  hint: ss -tlnp | grep 9200
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 Wazuh Indexer가 9200 포트로 리스닝하는지 확인해줘

    📎 참고 (CLI): ss -tlnp 2>/dev/null | grep -E '':9200|wazuh'''
  answer_detail: '보안 솔루션 인프라 점검: siem VM에서 Wazuh Indexer(OpenSearch) 포트(9200) 리스닝
    상태를 확인하시오.'
  verify:
    type: output_contains
    expect: '9200'
    field: stdout
    semantic:
      intent: siem VM Wazuh Indexer(OpenSearch) 9200 포트 리스닝 확인 — ss -tlnp 2>/dev/null
        | grep -E ":9200|wazuh" 로 TCP listening 소켓 검사. Wazuh Indexer 는 OpenSearch
        fork 로 alerts/events 저장, Wazuh Dashboard 가 9200 API 로 조회. 리스닝 없으면 dashboard
        쿼리 실패 + 인덱싱 중단. 로컬만(127.0.0.1) vs 외부(0.0.0.0) 바인딩 구분
      success_criteria:
      - ss 또는 netstat 실행
      - :9200 포트 LISTEN 확인
      - java 또는 wazuh 프로세스 매핑
      acceptable_methods:
      - ss -tlnp | grep :9200
      - netstat -tlnp | grep 9200
      - lsof -i:9200
      - curl -k -u admin:pass https://localhost:9200 로 API 응답
      - systemctl status wazuh-indexer
      - '**[OSS] Cerebro** — Elasticsearch/OpenSearch GUI. `cerebro` 실행 후 `http://localhost:9000` 에서 9200 cluster 등록하면 노드·shard·index 시각화. cluster 운영 표준 GUI.'
      - '**[OSS] elasticvue** — Browser 확장 형태 ES/OpenSearch UI. Chrome extension 설치 → cluster 추가. 인덱스 카운트·document 검색·query DSL 작성을 사람이 직접.'
      - '**[OSS] Dejavu** — ES/OpenSearch web UI (CRUD 가능). `docker run appbaseio/dejavu` 후 9200 연결. wazuh-alerts 인덱스를 spreadsheet 처럼 본다.'
      - '**[OSS] opensearch-cli** — OpenSearch 공식 CLI. `opensearch-cli curl get --path "/_cluster/health"` 로 인증 정보 자동 처리. 운영자 토큰 관리 편의.'
      - '**[OSS] Wazuh Dashboard** — `https://10.20.30.100/app/wazuh` 의 Server management → Status → Cluster 메뉴. 9200 backed cluster health 한눈에.'
      negative_signs:
      - 다른 포트 확인
      - 9200 LISTEN 판정 없음
      - 프로세스 매핑(PID) 누락
  target_vm: siem
  script: ss -tlnp 2>/dev/null | grep -E ':9200|wazuh'
  risk_level: low
  bastion_prompt: siem VM에서 Wazuh Indexer가 9200 포트로 리스닝하는지 확인해줘
- order: 6
  instruction: siem VM에서 OpenCTI 서비스(또는 docker 컨테이너) 상태를 확인하시오.
  hint: docker ps | grep opencti
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 OpenCTI가 동작 중인지 확인해줘

    📎 참고 (CLI): docker ps --format ''{{.Names}}\t{{.Status}}'' 2>/dev/null | grep
    -i opencti || systemctl is-active opencti'
  answer_detail: '보안 솔루션 인프라 점검: siem VM에서 OpenCTI 서비스(또는 docker 컨테이너) 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: opencti
    field: stdout
    semantic:
      intent: 'siem VM OpenCTI 서비스/컨테이너 상태 — docker ps --format으로 opencti 컨테이너 목록,
        또는 systemctl is-active opencti(native 설치 시). OpenCTI 는 CTI 플랫폼, STIX 2.1 기반
        threat intelligence 관리(MITRE ATT&CK·IOC·actors·campaigns). 다중 컨테이너(platform·worker·elastic·redis·rabbitmq·minio)
        구성. 헬스체크: curl localhost:8080/graphql'
      success_criteria:
      - docker ps 또는 systemctl 실행
      - opencti 컨테이너/서비스 이름 출력
      - 상태(Up/active) 확인
      acceptable_methods:
      - docker ps --format Table 필터링
      - docker compose ps in opencti 디렉토리
      - systemctl is-active opencti
      - curl -s localhost:8080/health
      - journalctl -u opencti 로 최근 로그
      - '**[OSS] Portainer** — Docker GUI. `https://localhost:9443` 에서 OpenCTI 컨테이너 6+ 개 (platform/worker/elastic/redis/rabbitmq/minio) 의 상태·로그·재시작 한 화면. 운영자 표준 도구.'
      - '**[OSS] lazydocker** — `lazydocker` 명령으로 ncurses TUI. Docker 컨테이너 + 로그 + stats 를 키보드로 navigate. 터미널 환경의 Portainer 대안.'
      - '**[OSS] OpenCTI 자체 Dashboard** — `http://10.20.30.100:9400` 에서 Settings → Customization → File integrations → Connectors. connector 별 health (last_run / queue size) 확인.'
      - '**[OSS] pycti (Python OpenCTI client)** — `pip install pycti && python -c "from pycti import OpenCTIApiClient; c=OpenCTIApiClient(...); print(c.about())"` 로 API 살아있는지. 운영자가 자동화 script 에서 사용.'
      - '**[OSS] ctix (CLI)** — OpenCTI 공식 CLI. `ctix get config` 로 platform 설정 조회. 운영자가 매개변수 변경 후 즉시 검증.'
      negative_signs:
      - 컨테이너 이름 없이 서비스 확인만
      - Up 상태 판정 누락
      - OpenCTI vs 다른 플랫폼 혼동
  target_vm: siem
  script: docker ps --format '{{.Names}}\t{{.Status}}' 2>/dev/null | grep -i opencti
    || systemctl is-active opencti
