  answer: |
    🤖 프롬프트:

    [복합 시나리오] 당신은 SOC 신규 분석가다. 5 layer 보안 인프라가 가동 중인지 + 5 attack vector
    가 어느 layer 에 evidence 남기는지 cross-layer matrix 를 작성하라.

    Phase A — Layer 가동 검증 (5건):
    1) secu(10.20.30.1) nftables — `nft list ruleset | wc -l` (룰 수)
    2) secu Suricata — `systemctl is-active suricata` + `ls /etc/suricata/rules/*.rules | wc -l`
    3) web(10.20.30.80) ModSecurity — `apachectl -M | grep security` + `ls /etc/modsecurity/crs/rules/ | wc -l`
    4) siem(10.20.30.100) Wazuh Manager — `systemctl is-active wazuh-manager` + `wc -l < /var/ossec/etc/rules/local_rules.xml`
    5) siem OpenCTI — `curl -s http://localhost:8080/api/feeds | jq length`

    Phase B — 5 attack vector 시뮬 (1분 내):
    1) Port scan — `nmap -sS -F 10.20.30.80` (attacker→web)
    2) SQLi — `curl 'http://10.20.30.80:3000/rest/products/search?q=1%27+OR+1=1--'`
    3) Brute force — `hydra -l ccc -P /tmp/3pwds.txt ssh://10.20.30.80 -t 1` (3개만)
    4) Phishing domain DNS — `dig +short malicious-test.invalid @10.20.30.100`
    5) EICAR malware test — `curl http://eicar.test/test.txt -o /tmp/eicar.test 2>&1 | head`

    Phase C — Cross-layer matrix:
    | Vector \\ Layer | nft | Suricata | ModSec | Wazuh | OpenCTI |
    | port scan      | ?   | ?        | ?      | ?     | ?       |
    | SQLi           | ?   | ?        | ?      | ?     | ?       |
    | brute force    | ?   | ?        | ?      | ?     | ?       |
    | phishing DNS   | ?   | ?        | ?      | ?     | ?       |
    | EICAR DL       | ?   | ?        | ?      | ?     | ?       |

    각 cell: detect (alert 발생) / block (차단) / log (로깅만) / none.
    evidence path 함께 (예 "Suricata `eve.json` SID=2010937" 또는 "nft counter +N").

    Phase D — 통합 보고 (1줄): 가장 활발한 layer / dead layer / 다음 보강 우선순위.
  answer_detail: |
    이 step 은 본 lab 의 1~10번 step 모두를 *cross-layer evidence 관점* 으로 묶는다.
    각 layer 점검 (1~10번) 만으로는 "왜 5 layer 가 필요한지" 못 깨닫지만,
    matrix 작성으로 "한 attack 이 여러 layer 에 흔적 남김 + 일부 vector 는 1-2 layer 에서만 보임"
    을 직접 입증한다. 교안 §"실제 사례" 의 5.7% 주장을 본인 환경에서 검증.
  risk_level: low
