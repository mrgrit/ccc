lab_id: secops-ai-week01
title: 보안 솔루션 인프라 점검 (AI 지원)
version: ai
course: secops-ai
week: 1
description: 실습 환경의 보안 솔루션(nftables, Suricata, ModSecurity, Wazuh, OpenCTI)이 각 VM에 어떻게 배치·동작하는지 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- 실습 인프라 VM의 역할과 배포된 보안 솔루션을 파악한다
- 각 보안 솔루션이 실제로 동작하는지 명령어로 확인한다
- 솔루션별 주요 로그와 설정 파일 위치를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM({{SECU_IP}})의 nftables 테이블 목록을 확인하시오.
  hint: nft list tables
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 nftables 테이블 목록을 확인해줘

    📎 참고 (CLI): nft list tables'
  answer_detail: '보안 솔루션 인프라 점검: secu VM(10.20.30.1)의 nftables 테이블 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: 'SecOps w1 s1 — secu VM({{SECU_IP}})의 nftables 테이블 목록을 확인하시오. (cmd: nft list tables)'
      success_criteria:
      - '명령 실행: nft list tables'
      - 결과 출력 또는 로그 확인
      - SecOps 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SecOps 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SecOps와 무관한 기법
  target_vm: secu
  script: nft list tables
  risk_level: low
  bastion_prompt: secu VM의 nftables 테이블 목록을 확인해줘
