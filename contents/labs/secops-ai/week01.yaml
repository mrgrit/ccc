lab_id: secops-ai-week01
title: 보안 솔루션 인프라 점검 (AI 지원)
version: ai
course: secops-ai
week: 1
description: 실습 환경의 보안 솔루션(nftables, Suricata, ModSecurity, Wazuh, OpenCTI)이 각 VM에
  어떻게 배치·동작하는지 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- 실습 인프라 VM의 역할과 배포된 보안 솔루션을 파악한다
- 각 보안 솔루션이 실제로 동작하는지 명령어로 확인한다
- 솔루션별 주요 로그와 설정 파일 위치를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'secu VM({{SECU_IP}})의 nftables 테이블 목록을 확인하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft list tables
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 nftables 테이블 목록을 확인해줘

    📎 참고 (CLI): nft list tables'
  answer_detail: '보안 솔루션 인프라 점검: secu VM(10.20.30.1)의 nftables 테이블 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: 'secu VM nftables 테이블 목록 확인 — nft list tables 로 현재 로드된 netfilter tables
        (family + name) 열거. 기본 family: inet(IPv4+IPv6 공통), ip/ip6, arp, bridge, netdev.
        CCC 환경의 방화벽 룰셋 구조 파악의 시작점. iptables-nft compatibility 모드 시 filter/nat/mangle
        등 legacy 테이블 매핑 확인'
      success_criteria:
      - nft list tables 실행
      - 테이블 family 와 name 출력
      - table 키워드 포함
      acceptable_methods:
      - '`sudo nft list tables` — 로드된 모든 family/name 출력. 예시 출력 `table inet filter` `table ip nat`. inet family 가 있으면 IPv4+IPv6 공통 룰셋 운용 중.'
      - '`sudo nft list ruleset | grep "^table"` — `list ruleset` 의 첫 줄만 추출하여 테이블 목록만 빠르게 식별. 룰셋 전체 dump 없이 카운트만 필요시.'
      - '`sudo nft -j list tables | jq -r ".nftables[].table | \"\\(.family) \\(.name)\""` — JSON 출력 후 jq 로 family/name 만 정규화. 자동화 파이프라인 입력으로 적합.'
      - '`cat /etc/nftables.conf | grep -E "^table"` — 영속 설정 파일 기준의 *선언* 확인. 부팅 시 자동 로드 대상. 런타임과 다르면 `nft -f` 미적용 또는 임시 추가.'
      - '`systemctl is-active nftables && systemctl status nftables --no-pager | head -10` — 서비스 활성 + 최근 로그 확인. inactive 시 `systemctl start nftables`.'
      - '`iptables-nft -L -v -n` — iptables compat 모드로 본 nft 룰. legacy iptables 명령에 익숙한 운영자 호환.'
      - '`sudo journalctl -t kernel -g "nft" --since "1 hour ago"` — drop 룰의 `log prefix` 트래픽 흐름 검증 — 룰이 실제 매치되는지의 evidence.'
      - '`sudo nft list set inet filter blacklist 2>/dev/null` — set 객체가 룰셋에 있는지 확인. CTI IOC 차단 set 운용 시 필수.'
      negative_signs:
      - nft 명령어 없이 개념 설명
      - family 구분 없이 table 이름만
      - 에러 숨김(2>/dev/null 만)
  target_vm: secu
  script: nft list tables
  risk_level: low
  bastion_prompt: 'secu VM의 nftables 테이블 목록을 확인해줘


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog`
    후 (1)빈도·패턴 (2)MITRE (3)방어 3섹션. raw dump 금지.'
  fixtures:
  - generator: firewall_log
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/secops-ai-week01/1/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 2
  instruction: secu VM에서 Suricata 서비스 상태를 확인하시오.
  hint: systemctl is-active suricata
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 Suricata 서비스 상태를 확인해줘

    📎 참고 (CLI): systemctl status suricata --no-pager | head -15'
  answer_detail: '보안 솔루션 인프라 점검: secu VM에서 Suricata 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: suricata
    field: stdout
    semantic:
      intent: 'secu VM Suricata 서비스 상태 확인 — systemctl status suricata --no-pager |
        head -15 로 Active: active (running), Main PID, 최근 log line 출력. Suricata 는
        IDS/IPS 로 네트워크 트래픽 실시간 분석 + alert 생성. --no-pager 로 ssh 세션에서 pager block 방지.
        비활성이면 Suricata 탐지 공백 발생'
      success_criteria:
      - systemctl 또는 service 명령 실행
      - active 또는 inactive 상태 출력
      - suricata 문자열 포함
      acceptable_methods:
      - '`systemctl status suricata --no-pager | head -15` — Active 상태 + Main PID + 최근 로그 한 번에. 예상 출력 `Active: active (running) since ...`. inactive 시 즉시 `systemctl start suricata`.'
      - '`systemctl is-active suricata` — active/inactive/failed 한 단어만 출력. 자동화 헬스체크에 적합.'
      - '`ps auxf | grep -E "[s]uricata" | head -3` — 프로세스 트리에서 실제 PID 확인. `[s]` 트릭으로 grep 자기 자신 제외.'
      - '`sudo suricatasc -c uptime` — Unix socket 으로 런타임 통계. 출력 예시 `{"return":"OK","message":{"days":2,"hours":4}}`. 데몬 응답성 확인.'
      - '`sudo journalctl -u suricata -n 20 --no-pager` — 최근 20 로그 라인. 시작 실패 시 root cause 즉시 식별.'
      - '`sudo grep -E "engine|Notice|Error" /var/log/suricata/suricata.log | tail -10` — 데몬 자체 로그. 룰 컴파일 오류, NIC 바인딩 실패 등 식별.'
      - '`pgrep -a suricata | wc -l` — Suricata 프로세스 카운트. multi-thread 모드 + management thread 확인. 0 = 정지.'
      - '`sudo ss -lp | grep suricata` — Suricata 가 listening 중인 unix socket (`/var/run/suricata-command.socket`) 확인. `suricatasc` 가 동작하는지 역추적.'
      negative_signs:
      - 다른 서비스(wazuh 등) 확인
      - active/inactive 판정 결과 누락
      - pager 에러로 출력 중단
  target_vm: secu
  script: systemctl status suricata --no-pager | head -15
  risk_level: low
  bastion_prompt: secu VM의 Suricata 서비스 상태를 확인해줘
- order: 3
  instruction: web VM({{WEB_IP}})에서 Apache + ModSecurity 모듈 로드 상태를 확인하시오.
  hint: apachectl -M | grep security
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM의 Apache ModSecurity 모듈이 로드되어 있는지 확인해줘

    📎 참고 (CLI): apachectl -M 2>/dev/null | grep -i security'
  answer_detail: '보안 솔루션 인프라 점검: web VM(10.20.30.80)에서 Apache + ModSecurity 모듈 로드
    상태를 확인하시오.'
  verify:
    type: output_contains
    expect: security
    field: stdout
    semantic:
      intent: web VM Apache ModSecurity 모듈 로드 확인 — apachectl -M 2>/dev/null | grep
        -i security 로 security2_module 로드 여부 검사. ModSecurity 는 Apache/Nginx 용 WAF,
        OWASP CRS(Core Rule Set) 와 함께 SQLi·XSS·RFI 등 Layer-7 공격 차단. 모듈 없으면 WAF 기능
        OFF. apache2 의 경우 mods-enabled/security2.conf 존재 + LoadModule 지시어 확인
      success_criteria:
      - apachectl -M 또는 apache2ctl -M 실행
      - security2_module 또는 mod_security 문자열 포함
      - 출력에 security 키워드
      acceptable_methods:
      - '`sudo apachectl -M 2>/dev/null | grep -i security` — 정확히 `security2_module (shared)` 한 줄 출력 = ModSec 로드. 빈 출력 = WAF OFF.'
      - '`sudo apache2ctl -M 2>/dev/null | grep -i security` — Debian/Ubuntu 표기 명령. 같은 결과지만 일부 환경에서 apachectl 미존재.'
      - '`ls -la /etc/apache2/mods-enabled/ | grep -E "security2|modsecurity"` — symlink 존재 확인. `security2.conf` + `security2.load` 두 파일 모두 있어야 정상 활성화.'
      - '`sudo grep -r "SecRuleEngine" /etc/apache2/mods-enabled/ 2>/dev/null` — `SecRuleEngine On` 확인 = 차단 모드. `DetectionOnly` 면 alert 만 + 차단 X.'
      - '`curl -s -o /dev/null -w "%{http_code}\n" "http://10.20.30.80:8082/?id=1%27+OR+1%3D1--"` — 실제 SQLi 페이로드 테스트. 403 = ModSec 차단 정상, 200 = WAF 미작동.'
      - '`sudo grep -E "ModSecurity:|secaction" /var/log/apache2/error.log | tail -3` — 최근 ModSec 차단 로그. 룰 ID + msg + matched data 확인.'
      - '`sudo apache2ctl -t -D DUMP_INCLUDES 2>&1 | grep -i security` — 설정 파일 트리에서 ModSec 관련 include 확인. 잘못된 위치에 룰 추가 시 식별.'
      - '`sudo grep -c "^[^#]*Include" /etc/modsecurity/*.conf 2>/dev/null` — CRS 룰 include 카운트. 30+ = OWASP CRS 정상 적재, 5 미만 = 룰셋 미설치.'
      negative_signs:
      - 모듈 이름 미확인
      - Nginx 에서 검색(잘못된 VM)
      - security 키워드 매칭 실패
  target_vm: web
  script: apachectl -M 2>/dev/null | grep -i security
  risk_level: low
  bastion_prompt: web VM의 Apache ModSecurity 모듈이 로드되어 있는지 확인해줘
- order: 4
  instruction: siem VM({{SECU_IP}}00)에서 Wazuh Manager 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-manager
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 Wazuh Manager 서비스가 동작 중인지 확인해줘

    📎 참고 (CLI): systemctl is-active wazuh-manager || echo inactive'
  answer_detail: '보안 솔루션 인프라 점검: siem VM(10.20.30.100)에서 Wazuh Manager 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: 'siem VM Wazuh Manager 서비스 상태 — systemctl is-active wazuh-manager 로
        active/inactive/failed 판정. Wazuh Manager 는 SIEM 의 핵심 엔진: 에이전트 로그 수신 → decoder/rule
        매칭 → alert 생성 → alerts.json 저장. 비활성이면 모든 SOC 탐지 기능 마비. || echo inactive 로
        실패 시 명확한 출력'
      success_criteria:
      - systemctl is-active wazuh-manager 실행
      - active/inactive 문자열 출력
      - 상태 판정 결과 명확
      acceptable_methods:
      - '`systemctl is-active wazuh-manager` — `active`/`inactive`/`failed` 한 단어. 헬스체크 자동화에 가장 적합.'
      - '`systemctl status wazuh-manager --no-pager | head -15` — Active 상태 + 최근 로그. Main PID + Memory + Tasks 한 번에 확인.'
      - '`sudo /var/ossec/bin/wazuh-control status` — Wazuh 자체 도구. wazuh-analysisd / wazuh-execd / wazuh-remoted / wazuh-monitord / wazuh-modulesd 5+ 데몬 개별 상태.'
      - '`ps auxf | grep -E "[w]azuh-(analysis|remote|exec|monitor)d" | wc -l` — 핵심 데몬 4 개 모두 실행 중인지. 4 미만 = 부분 장애.'
      - '`sudo curl -s -k -u wazuh-wui:wazuh-wui "https://localhost:55000/?pretty=true"` — Wazuh API 헬스체크. response `{"data": {"title": "Wazuh API REST"}}` 반환되면 정상.'
      - '`sudo journalctl -u wazuh-manager -n 30 --no-pager` — 최근 30 로그. crash, rule load error, agent connection drop 식별.'
      - '`sudo tail -10 /var/ossec/logs/ossec.log` — Manager 자체 로그. ERROR 라인이 있으면 즉시 조치.'
      - '`sudo /var/ossec/bin/wazuh-analysisd -t` — analysisd 단독 syntax check. local_rules.xml 변경 후 재시작 전 검증.'
      negative_signs:
      - wazuh-agent 확인(서버 측 아님)
      - active 판정 없이 로그만 출력
      - 에러 무시
  target_vm: siem
  script: systemctl is-active wazuh-manager || echo inactive
  risk_level: low
  bastion_prompt: siem VM의 Wazuh Manager 서비스가 동작 중인지 확인해줘
- order: 5
  instruction: siem VM에서 Wazuh Indexer(OpenSearch) 포트(9200) 리스닝 상태를 확인하시오.
  hint: ss -tlnp | grep 9200
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 Wazuh Indexer가 9200 포트로 리스닝하는지 확인해줘

    📎 참고 (CLI): ss -tlnp 2>/dev/null | grep -E '':9200|wazuh'''
  answer_detail: '보안 솔루션 인프라 점검: siem VM에서 Wazuh Indexer(OpenSearch) 포트(9200) 리스닝
    상태를 확인하시오.'
  verify:
    type: output_contains
    expect: '9200'
    field: stdout
    semantic:
      intent: siem VM Wazuh Indexer(OpenSearch) 9200 포트 리스닝 확인 — ss -tlnp 2>/dev/null
        | grep -E ":9200|wazuh" 로 TCP listening 소켓 검사. Wazuh Indexer 는 OpenSearch
        fork 로 alerts/events 저장, Wazuh Dashboard 가 9200 API 로 조회. 리스닝 없으면 dashboard
        쿼리 실패 + 인덱싱 중단. 로컬만(127.0.0.1) vs 외부(0.0.0.0) 바인딩 구분
      success_criteria:
      - ss 또는 netstat 실행
      - :9200 포트 LISTEN 확인
      - java 또는 wazuh 프로세스 매핑
      acceptable_methods:
      - '`sudo ss -tlnp | grep -E ":9200|wazuh-indexer"` — TCP LISTEN 소켓 + 프로세스 매핑. 출력 `LISTEN 0 128 *:9200 *:* users:(("java",pid=1234,fd=298))`.'
      - '`sudo netstat -tlnp 2>/dev/null | grep 9200` — netstat 호환 방식. Local Address 가 `0.0.0.0:9200` 이면 외부, `127.0.0.1` 이면 로컬만.'
      - '`sudo lsof -i :9200 -P -n | head -5` — 9200 사용 프로세스 + 사용자 권한 확인. wazuh-indexer 사용자가 java 프로세스 운영 중인지.'
      - '`curl -k -u admin:admin "https://localhost:9200/_cluster/health?pretty"` — cluster 상태 (status:green/yellow/red). yellow 이상이면 데이터 안전.'
      - '`curl -k -u admin:admin "https://localhost:9200/_cat/indices?v" | grep wazuh` — wazuh-alerts 인덱스 존재 + doc count 확인. 0 docs = alert 미수신.'
      - '`systemctl status wazuh-indexer --no-pager | head -10` — 서비스 상태. JVM heap OOM 등 메모리 이슈 식별.'
      - '`sudo grep -E "ERROR|FATAL" /var/log/wazuh-indexer/wazuh-cluster.log | tail -5` — Indexer 자체 로그. cluster 분리, mapping 충돌 등.'
      - '`sudo journalctl -u wazuh-indexer --since "10 min ago" | grep -i error` — 최근 시작 에러. JVM 옵션 / 디스크 / 권한 이슈 식별.'
      negative_signs:
      - 다른 포트 확인
      - 9200 LISTEN 판정 없음
      - 프로세스 매핑(PID) 누락
  target_vm: siem
  script: ss -tlnp 2>/dev/null | grep -E ':9200|wazuh'
  risk_level: low
  bastion_prompt: siem VM에서 Wazuh Indexer가 9200 포트로 리스닝하는지 확인해줘
