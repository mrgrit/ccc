lab_id: "secops-ai-week03"
title: "계정 관리 실습"
version: "ai"
course: "secops-ai"
week: 3
description: "리눅스 시스템의 사용자 계정 생명주기 관리, 권한 설정, 비활성 계정 관리를 실습합니다."
difficulty: "easy"
duration_minutes: 120
objectives:
  - "사용자 계정 생성/수정/삭제 프로세스를 이해한다"
  - "비활성 계정을 탐지하고 처리한다"
  - "계정 정책을 자동화한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "10.20.30.1 서버에서 현재 활성 사용자 계정 목록을 확인하시오. 시스템 계정은 제외하시오."
    hint: "awk를 사용해 UID 1000 이상만 필터링하세요."
    category: "account_mgmt"
    points: 8
    answer: "awk -F: '$3 >= 1000 && $3 < 65534 {print $1}' /etc/passwd"
    answer_detail: "UID 1000 이상은 일반 사용자 계정입니다. 65534(nobody)를 제외하여 실제 사용자만 표시합니다."
    script: "ai_secops_analyze --week 3 --step 1 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "root"
      field: "stdout"
  - order: 2
    instruction: "운영팀(ops-team) 계정 3개를 일괄 생성하시오: opsuser1, opsuser2, opsuser3."
    hint: "for 루프와 useradd를 사용하세요."
    category: "account_mgmt"
    points: 10
    answer: "sudo groupadd -f ops-team && for i in 1 2 3; do sudo useradd -m -G ops-team -s /bin/bash opsuser$i 2>/dev/null; done && getent group ops-team"
    answer_detail: "일괄 계정 생성은 스크립트를 통해 자동화할 수 있습니다. -G 옵션으로 보조 그룹, -s로 기본 쉘을 지정합니다."
    script: "ai_secops_analyze --week 3 --step 2 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "ops-team"
      field: "stdout"
  - order: 3
    instruction: "opsuser1 계정의 패스워드 만료 정책을 설정하시오: 최대 90일, 최소 7일, 경고 14일."
    hint: "chage 명령을 사용하세요."
    category: "account_mgmt"
    points: 10
    answer: "sudo chage -M 90 -m 7 -W 14 opsuser1 && sudo chage -l opsuser1"
    answer_detail: "chage는 패스워드 만료 정책을 관리합니다. -M(최대), -m(최소), -W(경고일)로 세밀하게 제어합니다."
    script: "ai_secops_analyze --week 3 --step 3 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "Maximum number of days"
      field: "stdout"
  - order: 4
    instruction: "90일 이상 로그인하지 않은 비활성 계정을 검색하시오."
    hint: "lastlog 명령을 사용하세요."
    category: "account_audit"
    points: 10
    answer: "lastlog -b 90 | grep -v 'Never logged in'"
    answer_detail: "lastlog -b 90은 90일 이상 로그인하지 않은 계정을 표시합니다. 비활성 계정은 보안 위험 요소입니다."
    script: "ai_secops_analyze --week 3 --step 4 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 5
    instruction: "한 번도 로그인하지 않은 사용자 계정을 찾아 나열하시오."
    hint: "lastlog 출력에서 'Never logged in'을 필터링하세요."
    category: "account_audit"
    points: 8
    answer: "lastlog | grep 'Never logged in' | awk '{print $1}'"
    answer_detail: "한 번도 로그인하지 않은 계정은 불필요하거나, 생성 후 방치된 계정일 수 있습니다."
    script: "ai_secops_analyze --week 3 --step 5 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 6
    instruction: "opsuser3 계정을 비활성화(잠금)하시오."
    hint: "usermod -L 또는 passwd -l 명령을 사용하세요."
    category: "account_mgmt"
    points: 10
    answer: "sudo usermod -L opsuser3 && sudo passwd -S opsuser3"
    answer_detail: "usermod -L은 계정을 잠금합니다. 패스워드 해시 앞에 !가 추가되어 로그인이 불가능해집니다."
    script: "ai_secops_analyze --week 3 --step 6 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "L"
      field: "stdout"
  - order: 7
    instruction: "현재 시스템에 접속 중인 사용자를 확인하시오."
    hint: "w 또는 who 명령을 사용하세요."
    category: "account_audit"
    points: 8
    answer: "w"
    answer_detail: "w 명령은 현재 접속 중인 사용자, 접속 시간, 수행 중인 작업을 표시합니다."
    script: "ai_secops_analyze --week 3 --step 7 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "load average"
      field: "stdout"
  - order: 8
    instruction: "최근 10건의 로그인 기록을 확인하시오."
    hint: "last 명령을 사용하세요."
    category: "account_audit"
    points: 8
    answer: "last -n 10"
    answer_detail: "last 명령은 /var/log/wtmp에서 로그인 기록을 읽어 표시합니다. -n으로 표시 건수를 제한합니다."
    script: "ai_secops_analyze --week 3 --step 8 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 9
    instruction: "실패한 로그인 시도를 확인하시오."
    hint: "faillog 또는 lastb 명령을 사용하세요."
    category: "account_audit"
    points: 10
    answer: "sudo lastb -n 10 2>/dev/null || echo '실패 로그인 기록 없음'"
    answer_detail: "lastb는 /var/log/btmp에서 실패한 로그인 시도를 표시합니다. 다수의 실패 시도는 브루트포스 공격의 징후일 수 있습니다."
    script: "ai_secops_analyze --week 3 --step 9 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 10
    instruction: "패스워드가 설정되지 않은(빈 패스워드) 계정을 검색하시오."
    hint: "/etc/shadow에서 빈 패스워드 필드를 찾으세요."
    category: "account_audit"
    points: 12
    answer: "sudo awk -F: '($2 == \"\" || $2 == \"!\") && $3 >= 1000 {print $1}' /etc/shadow"
    answer_detail: "shadow 파일에서 두 번째 필드가 비어있거나 !인 계정은 패스워드가 설정되지 않은 것입니다. 보안 위험이 높습니다."
    script: "ai_secops_analyze --week 3 --step 10 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 11
    instruction: "opsuser1에게 특정 시간대(업무시간)에만 로그인을 허용하는 설정을 하시오."
    hint: "/etc/security/time.conf를 설정하세요."
    category: "account_mgmt"
    points: 12
    answer: "echo 'login;*;opsuser1;Al0800-1800' | sudo tee -a /etc/security/time.conf"
    answer_detail: "time.conf에서 Al은 모든 요일, 0800-1800은 오전 8시부터 오후 6시까지를 의미합니다. PAM의 pam_time 모듈이 이를 적용합니다."
    script: "ai_secops_analyze --week 3 --step 11 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "opsuser1"
      field: "stdout"
  - order: 12
    instruction: "계정 만료일이 설정되지 않은 사용자 목록을 조회하시오."
    hint: "chage -l 출력을 활용하세요."
    category: "account_audit"
    points: 10
    answer: "for user in $(awk -F: '$3 >= 1000 && $3 < 65534 {print $1}' /etc/passwd); do expire=$(sudo chage -l $user 2>/dev/null | grep 'Account expires' | cut -d: -f2); echo \"$user: $expire\"; done"
    answer_detail: "계정 만료일이 'never'인 계정은 영구 활성 상태로, 퇴직자 등의 계정이 방치될 수 있습니다."
    script: "ai_secops_analyze --week 3 --step 12 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "never"
      field: "stdout"
  - order: 13
    instruction: "opsuser2의 로그인 쉘을 /sbin/nologin으로 변경하여 대화형 로그인을 차단하시오."
    hint: "usermod -s 명령을 사용하세요."
    category: "account_mgmt"
    points: 10
    answer: "sudo usermod -s /sbin/nologin opsuser2 && grep opsuser2 /etc/passwd"
    answer_detail: "/sbin/nologin을 쉘로 설정하면 SSH 등 대화형 로그인이 차단됩니다. 서비스 계정에 주로 사용합니다."
    script: "ai_secops_analyze --week 3 --step 13 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "nologin"
      field: "stdout"
  - order: 14
    instruction: "불필요한 계정(opsuser3)을 홈 디렉터리 포함하여 완전히 삭제하시오."
    hint: "userdel -r 옵션을 사용하세요."
    category: "account_mgmt"
    points: 12
    answer: "sudo userdel -r opsuser3 2>/dev/null; echo '계정 삭제 완료' && grep -c opsuser3 /etc/passwd || echo 'opsuser3 계정 없음 확인'"
    answer_detail: "userdel -r은 사용자 계정, 홈 디렉터리, 메일 스풀을 모두 삭제합니다. 삭제 전 데이터 백업 여부를 확인해야 합니다."
    script: "ai_secops_analyze --week 3 --step 14 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "계정"
      field: "stdout"
  - order: 15
    instruction: "계정 관리 현황을 종합 보고서로 출력하시오."
    hint: "활성 계정 수, 잠금 계정, 그룹 현황 등을 포함하세요."
    category: "verification"
    points: 12
    answer: "echo '=== 계정 관리 현황 보고서 ===' && echo '[활성 사용자]' && awk -F: '$3 >= 1000 && $3 < 65534 {print $1}' /etc/passwd && echo '[그룹 현황]' && getent group ops-team && echo '[잠금 계정]' && sudo awk -F: '$2 ~ /^!/ && $1 !~ /^(root|daemon|bin)/ {print $1}' /etc/shadow && echo '=== 보고서 완료 ==='"
    answer_detail: "정기적인 계정 현황 점검은 보안 운영의 기본입니다."
    script: "ai_secops_analyze --week 3 --step 15 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "보고서 완료"
      field: "stdout"
