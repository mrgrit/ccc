    web(10.20.30.80) 에서 secu 의 게이트웨이 통해 외부 시도:
      - `ssh ccc@10.20.30.80 'ping -c 3 -W 2 8.8.8.8 || curl -m 5 -sI http://example.com'`

    secu 의 tcpdump 출력 확인:
    - **NAT 적용 전**: 만약 verify_nat 룰 없었다면 src=10.20.30.80 (web 의 내부 IP) 그대로 외부로 (이건 ISP 가 drop)
    - **NAT 적용 후**: src=secu 의 외부 IP (10.20.30.1 의 ens33 IP, 보통 192.168.x.x 영역)
      → ISP 통과, 응답 패킷도 secu 가 다시 web 으로 전달

    secu 의 nft counter 도 확인: `nft list table inet verify_nat | grep masquerade`

    ### Phase C — 회고 (5분)

