lab_id: secops-ai-week03
title: nftables 실전 — NAT, 화이트리스트, 레이트리밋 (AI 지원)
version: ai
course: secops-ai
week: 3
description: masquerade NAT, 화이트리스트/블랙리스트, 연결 레이트리밋 등 실전 nftables 기법을 적용한다.
difficulty: medium
duration_minutes: 120
objectives:
- masquerade NAT 룰을 작성할 수 있다
- set(ip saddr) 기반 화이트리스트·블랙리스트를 구성할 수 있다
- ct state new limit으로 레이트리밋을 적용할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 'whitelist' 테이블을 만들고 input 체인을 생성하시오.
  hint: nft add table; nft add chain
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 whitelist 테이블과 policy drop의 input 체인을 만들어줘

    📎 참고 (CLI): sudo nft add table inet whitelist && sudo nft add chain inet whitelist input ''{ type
    filter hook input priority 0 \; policy drop \; }'''
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: secu VM에 inet ''whitelist'' 테이블을 만들고 input 체인을 생성하시오.'
  verify:
    type: output_contains
    expect: whitelist
    field: stdout
    semantic:
      intent: whitelist 테이블 + default-deny input chain 생성 — sudo nft add table inet whitelist 후 sudo nft
        add chain inet whitelist input { type filter hook input priority 0 ; policy drop ; }. Zero Trust
        원칙의 default-deny(allow-list) 모델 — 명시 허용되지 않은 모든 inbound 차단. policy drop 이 핵심 차이(w2 의 accept 대비).
        후속 룰에서 allowed_ips 로만 accept, 그 외 자동 drop
      success_criteria:
      - nft add table + add chain 실행
      - policy drop 명시(default-deny)
      - hook input + type filter 지정
      acceptable_methods:
      - sudo nft add table inet whitelist && sudo nft add chain inet whitelist input ...
      - /etc/nftables.conf 에 table+chain 선언 후 reload
      - Ansible ansible.posix.firewalld 또는 nftables role
      - iptables -P INPUT DROP 으로 legacy 기본 정책 변경
      negative_signs:
      - policy accept(default-allow, whitelist 의미 없음)
      - chain type nat 오염
      - hook prerouting 등 잘못된 hook
  target_vm: secu
  script: sudo nft add table inet whitelist && sudo nft add chain inet whitelist input '{ type filter
    hook input priority 0 \; policy drop \; }'
  risk_level: medium
  bastion_prompt: secu VM에 whitelist 테이블과 policy drop의 input 체인을 만들어줘
- order: 2
  instruction: whitelist 테이블에 set 'allowed_ips'(type ipv4_addr)를 생성하시오.
  hint: nft add set …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM whitelist 테이블에 ipv4 set ''allowed_ips''를 만들어줘

    📎 참고 (CLI): sudo nft add set inet whitelist allowed_ips ''{ type ipv4_addr \; }'''
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: whitelist 테이블에 set ''allowed_ips''(type ipv4_addr)를
    생성하시오.'
  verify:
    type: output_contains
    expect: allowed_ips
    field: stdout
    semantic:
      intent: IPv4 set allowed_ips 생성 — sudo nft add set inet whitelist allowed_ips { type ipv4_addr ;
        }. Set 은 O(1) lookup 가능한 해시셋/트리 - 수천~수만 IP 도 linear scan 없이 매칭. type ipv4_addr 외에 ipv6_addr, ether_addr,
        inet_service(port), inet_proto 사용 가능. flags interval 옵션 추가하면 CIDR range 지원, timeout 으로 자동 만료
      success_criteria:
      - nft add set ... type ipv4_addr 실행
      - set 이름 allowed_ips 또는 명시적 이름
      - table inet whitelist 내부
      acceptable_methods:
      - sudo nft add set inet whitelist allowed_ips { type ipv4_addr ; }
      - flags interval 추가해 CIDR 지원
      - timeout 3600s 추가해 동적 expiry
      - /etc/nftables.conf 에 set allowed_ips { ... } 블록
      - named set 대신 anonymous set 사용(성능 동등)
      negative_signs:
      - type 미지정(오류)
      - set 대신 개별 rule 여러 개(비효율)
      - 잘못된 type(int 등)
  target_vm: secu
  script: sudo nft add set inet whitelist allowed_ips '{ type ipv4_addr \; }'
  risk_level: low
  bastion_prompt: secu VM whitelist 테이블에 ipv4 set 'allowed_ips'를 만들어줘
- order: 3
  instruction: allowed_ips set에 {{ATTACKER_IP}}(attacker)을 추가하시오.
  hint: nft add element …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM whitelist.allowed_ips set에 10.20.30.201을 추가해줘

    📎 참고 (CLI): sudo nft add element inet whitelist allowed_ips ''{ 10.20.30.201 }'''
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: allowed_ips set에 10.20.30.201(attacker)을 추가하시오.'
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
    semantic:
      intent: 'allowed_ips set 에 attacker IP(10.20.30.201) 추가 — sudo nft add element inet whitelist allowed_ips
        { 10.20.30.201 }. add element 로 set 에 값 추가. 중괄호 구문 필수. 여러 IP 추가: { ip1, ip2, ip3 } 쉼표 구분. delete
        element 로 제거, flush set allowed_ips 로 전체 비우기. 조회: nft list set inet whitelist allowed_ips'
      success_criteria:
      - nft add element 실행
      - 10.20.30.201 IP 포함
      - set 이름 allowed_ips 지정
      acceptable_methods:
      - sudo nft add element inet whitelist allowed_ips { 10.20.30.201 }
      - '여러 IP 일괄 추가: { IP1, IP2, IP3 }'
      - '파일 기반 로드: nft -f 로 element 선언문'
      - 'timeout 추가: { IP timeout 1h }'
      - curl/pin CTI feed 로 자동 업데이트 스크립트
      negative_signs:
      - element 대신 rule 추가(의미 다름)
      - IP 문자열 없음
      - wildcard/CIDR 잘못 사용(flags interval 없이)
  target_vm: secu
  script: sudo nft add element inet whitelist allowed_ips '{ 10.20.30.201 }'
  risk_level: low
  bastion_prompt: secu VM whitelist.allowed_ips set에 10.20.30.201을 추가해줘
- order: 4
  instruction: input 체인에서 allowed_ips 에 속하는 소스만 accept 하도록 룰을 추가하시오.
  hint: ip saddr @allowed_ips accept
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM whitelist.input 체인에 allowed_ips set 기반 accept 룰을 추가해줘

    📎 참고 (CLI): sudo nft add rule inet whitelist input ip saddr @allowed_ips accept'
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: input 체인에서 allowed_ips 에 속하는 소스만 accept 하도록 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: allowed_ips
    field: stdout
    semantic:
      intent: 'Set 기반 accept 룰 — sudo nft add rule inet whitelist input ip saddr @allowed_ips accept.
        @<setname> 표기로 set 참조, ip saddr 가 set 에 속하면 accept. policy drop 과 조합하여 allow-list 완성: 명시 허용 IP
        만 통과, 나머지 자동 drop. set 동적 업데이트(add/delete element) 시 즉시 반영(룰 재작성 불필요). 대규모 환경에 적합'
      success_criteria:
      - ip saddr @allowed_ips 또는 set reference 문법
      - accept action
      - input chain 명시
      acceptable_methods:
      - sudo nft add rule inet whitelist input ip saddr @allowed_ips accept
      - ip daddr @set 으로 destination 매칭
      - 'meta iifname 조건과 AND: meta iifname eth0 ip saddr @set accept'
      - ipset + iptables legacy 로 동등 구현
      - Wazuh active-response + set 동기화
      negative_signs:
      - '@ 없이 set 이름 참조(syntax 오류)'
      - drop action(로직 반대)
      - set 아닌 IP 하드코딩
  target_vm: secu
  script: sudo nft add rule inet whitelist input ip saddr @allowed_ips accept
  risk_level: medium
  bastion_prompt: secu VM whitelist.input 체인에 allowed_ips set 기반 accept 룰을 추가해줘
- order: 5
  instruction: SSH tcp/22에 대해 ct state new limit rate 3/minute 를 적용해 브루트포스를 완화하시오.
  hint: tcp dport 22 ct state new limit rate 3/minute
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM whitelist.input에 SSH 브루트포스 방지용 레이트리밋 룰을 추가해줘

    📎 참고 (CLI): sudo nft add rule inet whitelist input tcp dport 22 ct state new limit rate 3/minute accept'
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: SSH tcp/22에 대해 ct state new limit rate 3/minute 를
    적용해 브루트포스를 완화하시오.'
  verify:
    type: output_contains
    expect: limit rate
    field: stdout
    semantic:
      intent: 'SSH brute-force rate limit — sudo nft add rule inet whitelist input tcp dport 22 ct state
        new limit rate 3/minute accept. ct state new 로 새 연결만 제한(established 는 영향 없음), limit rate 3/minute
        으로 분당 3회 초과 시 룰 미매칭 → default-drop. Fail2ban 와 유사한 네트워크 레벨 방어. burst 옵션: limit rate 3/minute burst
        5 packets 로 순간 폭증 허용. MITRE M1036(Account Lockout)'
      success_criteria:
      - limit rate <N>/minute|second 문법
      - tcp dport 22 명시
      - ct state new 조건
      acceptable_methods:
      - sudo nft add rule ... tcp dport 22 ct state new limit rate 3/minute accept
      - limit rate over <N>/second 로 초과 시 drop
      - limit 구문 + counter 추가해 통계 수집
      - fail2ban + recidive 로 userspace 대체
      - iptables -m recent --set/--update ... --hitcount 5 --seconds 60
      negative_signs:
      - ct state 없음(established 도 제한)
      - limit 대신 drop 일괄
      - rate 단위 누락(3/ 만)
  target_vm: secu
  script: sudo nft add rule inet whitelist input tcp dport 22 ct state new limit rate 3/minute accept
  risk_level: medium
  bastion_prompt: secu VM whitelist.input에 SSH 브루트포스 방지용 레이트리밋 룰을 추가해줘
- order: 6
  instruction: NAT 테이블과 postrouting 체인을 생성하고 masquerade 룰을 추가하시오.
  hint: type nat hook postrouting
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 NAT 테이블을 만들고 ens33 인터페이스로 나가는 트래픽에 masquerade를 적용해줘

    📎 참고 (CLI): sudo nft add table inet nat && sudo nft add chain inet nat postrouting ''{ type nat hook
    postrouting priority 100 \; }'' && sudo nft add rule inet nat postrouting oifname "ens33" masquerade'
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: NAT 테이블과 postrouting 체인을 생성하고 masquerade 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: masquerade
    field: stdout
    semantic:
      intent: NAT masquerade 설정 — (1) sudo nft add table inet nat (2) sudo nft add chain inet nat postrouting
        { type nat hook postrouting priority 100 ; } (3) sudo nft add rule inet nat postrouting oifname
        ens33 masquerade. postrouting hook + priority 100(NF_IP_PRI_NAT_SRC) 이 SNAT 표준 위치. masquerade
        는 outgoing interface IP 로 source NAT, IP 동적 변경 시에도 자동 대응. 내부 NAT 환경의 기본. ip_forward=1 + 라우팅 설정
        필요
      success_criteria:
      - table inet nat + chain postrouting + rule masquerade 3단계
      - type nat hook postrouting priority 100 정확
      - oifname 으로 출력 인터페이스 지정
      acceptable_methods:
      - sudo nft add table+chain+rule masquerade 3 단계
      - snat to <IP> 로 고정 IP SNAT
      - /etc/nftables.conf 에 nat 테이블 블록 선언
      - systemctl enable --now nftables + sysctl net.ipv4.ip_forward=1
      - iptables -t nat -A POSTROUTING -o ens33 -j MASQUERADE
      negative_signs:
      - priority 누락 또는 잘못된 값
      - postrouting 대신 prerouting(DNAT 용)
      - ip_forward sysctl 미설정
  target_vm: secu
  script: sudo nft add table inet nat && sudo nft add chain inet nat postrouting '{ type nat hook postrouting
    priority 100 \; }' && sudo nft add rule inet nat postrouting oifname "ens33" masquerade
  risk_level: medium
  bastion_prompt: secu VM에 NAT 테이블을 만들고 ens33 인터페이스로 나가는 트래픽에 masquerade를 적용해줘
