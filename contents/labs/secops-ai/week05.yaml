      - 결과 확인 누락
      - SecOps와 무관한 기법
  target_vm: secu
  script: echo 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot"; http_user_agent; sid:1000101;
    rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: medium
  bastion_prompt: secu VM local.rules에 User-Agent=BadBot 탐지 HTTP 룰(sid 1000101)을 추가해줘
