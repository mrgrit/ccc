lab_id: secops-ai-week05
title: Suricata 룰 작성 (AI 지원)
version: ai
course: secops-ai
week: 5
description: content, pcre, flow, flowbits 등 Suricata 룰 키워드를 활용해 HTTP·TCP 탐지 룰을 작성한다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata 룰 문법 (action protocol src → dst opts) 을 이해한다
- HTTP 요청에서 특정 User-Agent 를 탐지하는 룰을 작성할 수 있다
- suricata -T 로 룰 문법을 검증하고 eve.json 에서 매칭을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: local.rules 에 HTTP User-Agent 'BadBot'을 탐지하는 룰(sid:1000101)을 추가하시오.
  hint: content:"BadBot"; http_user_agent;
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 User-Agent=BadBot 탐지 HTTP 룰(sid 1000101)을
    추가해줘

    📎 참고 (CLI): echo ''alert http any any -> any any (msg:"Suspicious UA BadBot";
    content:"BadBot"; http_user_agent; sid:1000101; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata 룰 작성: local.rules 에 HTTP User-Agent ''BadBot''을 탐지하는 룰(sid:1000101)을
    추가하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
    semantic:
      intent: 'HTTP User-Agent BadBot 탐지 룰 — alert http any any -> any any (msg: Suspicious
        UA BadBot ; content: BadBot ; http_user_agent; sid:1000101; rev:1;). http_user_agent
        sticky buffer 로 User-Agent 헤더만 매칭 - 정규화된 HTTP parsing 거침. http_header 보다 효율적.
        content 기본 case-sensitive - nocase 추가 시 대소문자 무시. MITRE T1071.001 detection
        기반'
      success_criteria:
      - alert http 구문 + sid:1000101
      - 'content: BadBot + http_user_agent sticky buffer'
      - local.rules tee -a 로 추가
      acceptable_methods:
      - echo alert http ... | sudo tee -a /etc/suricata/rules/local.rules
      - 'http.user_agent; content: BadBot ; (Suricata 5+ 신문법)'
      - 'Snort 호환 syntax: content: BadBot ; http_header; (덜 구체)'
      - YARA User-Agent 규칙 (Zeek 이벤트 스트림)
      - Sigma rule + sigmac 으로 Suricata 변환
      negative_signs:
      - http_user_agent 없이 단순 content 매칭
      - sid 중복(1000001 재사용)
      - msg 필드 누락
  target_vm: secu
  script: echo 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot";
    http_user_agent; sid:1000101; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: medium
  bastion_prompt: 'secu VM local.rules에 User-Agent=BadBot 탐지 HTTP 룰(sid 1000101)을
    추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: SQL Injection 간단 룰 — URI에 'union select' 포함 탐지(sid:1000102)을 추가하시오.
  hint: content:"union select"; http_uri;
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 URI의 ''union select'' SQL Injection 탐지 룰(sid
    1000102)을 추가해줘

    📎 참고 (CLI): echo ''alert http any any -> any any (msg:"SQLi union select"; content:"union
    select"; nocase; http_uri; sid:1000102; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata 룰 작성: SQL Injection 간단 룰 — URI에 ''union select'' 포함 탐지(sid:1000102)을
    추가하시오.'
  verify:
    type: output_contains
    expect: union
    field: stdout
    semantic:
      intent: 'URI 기반 SQLi 탐지 룰 — alert http any any -> any any (msg: SQLi union select
        ; content: union select ; nocase; http_uri; sid:1000102; rev:1;). http_uri
        sticky buffer 로 URL 경로+쿼리스트링 매칭. nocase 로 UNION SELECT / Union Select 등 변형
        모두 탐지. 단, 공격자는 /**/ 주석·대소문자·hex 인코딩으로 우회 가능 → pcre 정규표현식 권장: pcre: /union\s+select/i'
      success_criteria:
      - alert http + http_uri sticky buffer
      - 'content: union select + nocase'
      - sid:1000102 포함
      acceptable_methods:
      - echo alert http ... http_uri ... | sudo tee -a local.rules
      - 'http.uri; content: union select ; nocase; (Suricata 6.0+ 신문법)'
      - 'pcre: /union\s+select/i 로 공백 변형 대응'
      - ModSecurity CRS rule 942100(더 포괄적)
      - libinjection + modsec 로 intention-based 탐지
      negative_signs:
      - http_uri 없이 content 단독(전체 payload)
      - nocase 누락(대소문자 우회)
      - 공격 우회 기법(/**/ 주석) 미인지
  target_vm: secu
  script: echo 'alert http any any -> any any (msg:"SQLi union select"; content:"union
    select"; nocase; http_uri; sid:1000102; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: medium
  bastion_prompt: 'secu VM local.rules에 URI의 ''union select'' SQL Injection 탐지 룰(sid
    1000102)을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.
  hint: tcp any any -> any 445 …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 TCP 445(SMB) 트래픽 탐지 룰(sid 1000103)을 추가해줘

    📎 참고 (CLI): echo ''alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103;
    rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata 룰 작성: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.'
  verify:
    type: output_contains
    expect: '445'
    field: stdout
    semantic:
      intent: 'SMB (tcp/445) 트래픽 탐지 — alert tcp any any -> any 445 (msg: SMB traffic
        ; sid:1000103; rev:1;). 5-tuple 기반 단순 매칭(content 없이). SMB 는 Windows 파일 공유
        프로토콜, 네트워크 세그먼트 내부만 허용 원칙. 외부→내부 445 는 WannaCry·EternalBlue 정찰 의심. 실 운영에서는
        alert 대신 drop 가능(IPS 모드). 내부→내부 허용 예외 추가 필요'
      success_criteria:
      - alert tcp + dst port 445 + sid:1000103
      - content 없이도 valid 룰(5-tuple 만)
      - msg 로 SMB 의미 명시
      acceptable_methods:
      - echo alert tcp any any -> any 445 ... | tee -a local.rules
      - drop tcp any any -> any 445 (inline IPS 모드)
      - alert tcp $EXTERNAL_NET any -> $HOME_NET 445 (범위 제한)
      - nftables tcp dport 445 drop(더 저렴)
      - Zeek smb 프로토콜 분석 + notice.log
      negative_signs:
      - 5-tuple 외 content 과다(필요 없음)
      - dst port 대신 src port 445(방향 오류)
      - sid 중복
  target_vm: secu
  script: echo 'alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103; rev:1;)'
    | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: low
  bastion_prompt: 'secu VM local.rules에 TCP 445(SMB) 트래픽 탐지 룰(sid 1000103)을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: suricata -T 로 룰 문법을 검증하시오.
  hint: sudo suricata -T
  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata 설정/룰 문법 검증을 실행해줘

    📎 참고 (CLI): sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5'
  answer_detail: 'Suricata 룰 작성: suricata -T 로 룰 문법을 검증하시오.'
  verify:
    type: output_contains
    expect: configuration
    field: stdout
    semantic:
      intent: '룰 문법 검증 (suricata -T) — sudo suricata -T -c /etc/suricata/suricata.yaml
        2>&1 | tail -5. 새 룰 추가 후 reload 전에 실행하는 안전 gate. Suricata 가 모든 rule parse
        + content/pcre 컴파일 시도 - syntax 오류 시 error 출력 with line number. 출력 끝: Configuration
        provided was successfully loaded. Exiting. 오류 예: unknown keyword, duplicate
        sid, quotes mismatch'
      success_criteria:
      - suricata -T -c 실행
      - configuration 또는 successfully 메시지
      - syntax 오류 없음 확인
      acceptable_methods:
      - sudo suricata -T -c /etc/suricata/suricata.yaml
      - sudo suricata -T -S /etc/suricata/rules/local.rules(특정 파일만)
      - suricatasc -c ruleset-reload-rules (live reload test)
      - CI 파이프라인에 suricata -T + sigmac 검증
      - python-suricatalogs library 로 룰 검증
      negative_signs:
      - -T 없이 production 재시작
      - error 메시지 무시
      - tail 없이 전체 출력(너무 많음)
  target_vm: secu
  script: sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5
  risk_level: medium
  bastion_prompt: secu VM에서 suricata 설정/룰 문법 검증을 실행해줘
- order: 5
  instruction: Suricata를 재로드하시오.
  hint: systemctl reload suricata
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 Suricata 서비스를 reload 해줘

    📎 참고 (CLI): sudo systemctl reload suricata && systemctl is-active suricata'
  answer_detail: 'Suricata 룰 작성: Suricata를 재로드하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - reload
    field: stdout
    semantic:
      intent: 'Suricata reload (rule only) — sudo systemctl reload suricata && systemctl
        is-active suricata. reload 는 SIGHUP 보내 rule 재로드만 수행(capture 중단 없음·성능 영향 없음).
        restart 는 서비스 전체 재시작으로 brief downtime. reload 로 충분한 경우: rule/thresholds/classification
        변경. config(suricata.yaml) 변경은 restart 필요. is-active 로 reload 후 상태 확인'
      success_criteria:
      - systemctl reload suricata 실행
      - is-active 로 검증
      - active 또는 reload 문자열 출력
      acceptable_methods:
      - sudo systemctl reload suricata && systemctl is-active suricata
      - sudo kill -USR2 $(pidof suricata) (SIGUSR2 로 live rule reload)
      - sudo suricatasc -c reload-rules (Unix socket control)
      - sudo suricatasc -c reload-rules-and-threshold
      - sudo systemctl restart suricata (overkill)
      negative_signs:
      - reload 없이 룰 추가만
      - is-active 검증 누락
      - restart 로 불필요한 downtime
  target_vm: secu
  script: sudo systemctl reload suricata && systemctl is-active suricata
  risk_level: medium
  bastion_prompt: 'secu VM의 Suricata 서비스를 reload 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: attacker VM에서 web VM으로 User-Agent BadBot 이 포함된 curl 요청을 보내시오.
  hint: curl -A BadBot http://{{WEB_IP}}/
  category: verify
  points: 10
  answer: '🤖 프롬프트: attacker VM에서 web VM(10.20.30.80)으로 User-Agent=BadBot curl 요청을
    보내줘

    📎 참고 (CLI): curl -sS -A BadBot http://10.20.30.80/ -o /dev/null && echo sent'
  answer_detail: 'Suricata 룰 작성: attacker VM에서 web VM으로 User-Agent BadBot 이 포함된 curl
    요청을 보내시오.'
  verify:
    type: output_contains
    expect:
    - sent
    - BadBot
    - curl
    - User-Agent
    - HTTP
    field: stdout
    semantic:
      intent: 'BadBot 트래픽 발생(룰 검증) — curl -sS -A BadBot http://10.20.30.80/ -o /dev/null
        && echo sent. -A 옵션으로 User-Agent 헤더 지정, -sS 로 silent but show errors, -o /dev/null
        로 응답 body 무시. Negative test: BadBot 룰이 로드됐으면 eve.json 에 alert 기록. 실패 시 응답
        코드 또는 connection error 출력. echo sent 로 명시적 성공 신호'
      success_criteria:
      - curl -A BadBot 로 User-Agent 지정
      - http://<WEB_IP> 요청
      - sent 문자열 출력
      acceptable_methods:
      - curl -sS -A BadBot http://<IP>/ -o /dev/null && echo sent
      - curl --user-agent BadBot http://<IP>/ 로 명시적
      - wget --user-agent=BadBot http://<IP>/
      - 'curl -H "User-Agent: BadBot" http://<IP>/'
      - 'python -c import requests; requests.get(..., headers={User-Agent: BadBot})'
      negative_signs:
      - User-Agent 변경 없이 기본값 사용
      - curl 실패 무시
      - HTTP 응답 필수(탐지 필요 없음)
  target_vm: attacker
  script: curl -sS -A BadBot http://10.20.30.80/ -o /dev/null && echo sent
  risk_level: medium
  bastion_prompt: attacker VM에서 web VM(10.20.30.80)으로 User-Agent=BadBot curl 요청을 보내줘
- order: 7
  instruction: secu VM eve.json 에서 BadBot 관련 알람을 확인하시오.
  hint: grep BadBot /var/log/suricata/eve.json
  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata eve.json에서 BadBot 알람을 찾아줘

    📎 참고 (CLI): sudo tail -100 /var/log/suricata/eve.json | grep -i BadBot | head'
  answer_detail: 'Suricata 룰 작성: secu VM eve.json 에서 BadBot 관련 알람을 확인하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
    semantic:
      intent: 'BadBot alert 검증 — sudo tail -100 /var/log/suricata/eve.json | grep
        -i BadBot | head. eve.json 에 Suricata UA BadBot 문자열 출현 시 룰 동작 확인. 실제 event_type=alert
        항목에 alert.signature=Suspicious UA BadBot + alert.signature_id=1000101 포함.
        tail -100 으로 최근 이벤트만 스캔. alert 없으면 원인 분석: (1) 룰 미로드 (2) 트래픽 못 본 인터페이스 (3)
        HTTP parse 실패 (4) HOME_NET/EXTERNAL_NET 설정'
      success_criteria:
      - eve.json tail 후 grep BadBot
      - 매칭 event_type=alert 확인
      - signature 또는 sid 출력
      acceptable_methods:
      - sudo tail -100 /var/log/suricata/eve.json | grep BadBot
      - sudo jq -c "select(.alert.signature_id==1000101)" /var/log/suricata/eve.json
      - sudo grep -F BadBot /var/log/suricata/fast.log
      - Wazuh dashboard 에서 Suricata rule.groups 필터
      - suricatasc -c iface-stat | grep alerts
      negative_signs:
      - 0 match 무시
      - 잘못된 경로(eve.log 등)
      - 필터 없이 tail 전체
  target_vm: secu
  script: sudo tail -100 /var/log/suricata/eve.json | grep -i BadBot | head
  risk_level: low
  bastion_prompt: secu VM의 suricata eve.json에서 BadBot 알람을 찾아줘
- order: 8
  instruction: attacker VM에서 URI에 'union select'을 포함한 HTTP 요청을 보내시오.
  hint: curl '…?id=1 union select 1,2'
  category: verify
  points: 10
  answer: '🤖 프롬프트: attacker VM에서 web VM으로 URI에 ''union select''가 포함된 curl 요청을 보내줘

    📎 참고 (CLI): curl -sS ''http://10.20.30.80/?id=1%20union%20select%201,2'' -o /dev/null
    && echo sent'
  answer_detail: 'Suricata 룰 작성: attacker VM에서 URI에 ''union select''을 포함한 HTTP 요청을
    보내시오.'
  verify:
    type: output_contains
    expect:
    - sent
    - union
    - select
    - SQLi
    - curl
    - http_uri
    field: stdout
    semantic:
      intent: URI SQLi 트래픽 발생 — curl -sS http://10.20.30.80/?id=1%20union%20select%201,2
        -o /dev/null && echo sent. %20 은 URL encoded space, Suricata HTTP 정규화 후 http_uri
        buffer 에 union select 형태로 매칭. -sS 로 progress 숨김 + 에러만 출력. 응답 코드 무시(탐지만 확인).
        실전 공격자는 더 복잡한 encoding(0x20·\u0020) 사용 - 룰은 pcre + nocase + normalization
        함께 필요
      success_criteria:
      - curl 로 union select URI 전송
      - '%20 또는 공백으로 쿼리스트링 구성'
      - sent 출력
      acceptable_methods:
      - curl -sS "http://<IP>/?id=1 union select 1,2" -o /dev/null && echo sent
      - curl --data-urlencode "id=1 union select 1,2" http://<IP>/
      - sqlmap -u "http://<IP>/?id=1" --level 1 --risk 1
      - 'Burp Intruder payload: union select 1,2'
      - 'Python requests.get(..., params={id: 1 union select 1,2 })'
      negative_signs:
      - union 없이 정상 요청
      - POST body 에 payload(URI 아님)
      - 응답 받지 못해도 판정 안 함
  target_vm: attacker
  script: curl -sS 'http://10.20.30.80/?id=1%20union%20select%201,2' -o /dev/null
    && echo sent
  risk_level: medium
  bastion_prompt: attacker VM에서 web VM으로 URI에 'union select'가 포함된 curl 요청을 보내줘
- order: 9
  instruction: secu VM eve.json 에서 SQLi union select 알람을 확인하시오.
  hint: grep -i 'union' /var/log/suricata/eve.json
  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata eve.json에서 SQL Injection union select 알람을 찾아줘

    📎 참고 (CLI): sudo tail -200 /var/log/suricata/eve.json | grep -i ''union select''
    | head'
  answer_detail: 'Suricata 룰 작성: secu VM eve.json 에서 SQLi union select 알람을 확인하시오.'
  verify:
    type: output_contains
    expect:
    - union
    - SQLi
    - select
    - eve.json
    - alert
    field: stdout
    semantic:
      intent: 'SQLi alert 검증 — sudo tail -200 /var/log/suricata/eve.json | grep -i
        union select | head. eve.json 에서 union select 문자열 매칭, event_type=alert + alert.signature=SQLi
        union select + signature_id=1000102 확인. fast.log 대안: /var/log/suricata/fast.log
        는 요약 형식(timestamp, classification, priority, proto, src->dst). 0-match 시 encoded
        문자(%20) 파싱 실패 가능성, http.uri 기본 decode 설정 확인'
