    2) secu VM local.rules에 URI의 ''union select'' SQL Injection 탐지 룰(sid 1000102)을 추가해줘

    3) secu VM local.rules에 TCP 445(SMB) 트래픽 탐지 룰(sid 1000103)을 추가해줘

    4) secu VM에서 suricata 설정/룰 문법 검증을 실행해줘

    5) secu VM의 Suricata 서비스를 reload 해줘'
