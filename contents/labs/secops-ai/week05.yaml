lab_id: secops-ai-week05
title: Suricata 룰 작성 (AI 지원)
version: ai
course: secops-ai
week: 5
description: content, pcre, flow, flowbits 등 Suricata 룰 키워드를 활용해 HTTP·TCP 탐지 룰을 작성한다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata 룰 문법 (action protocol src → dst opts) 을 이해한다
- HTTP 요청에서 특정 User-Agent 를 탐지하는 룰을 작성할 수 있다
- suricata -T 로 룰 문법을 검증하고 eve.json 에서 매칭을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: local.rules 에 HTTP User-Agent 'BadBot'을 탐지하는 룰(sid:1000101)을 추가하시오.
  hint: content:"BadBot"; http_user_agent;
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 User-Agent=BadBot 탐지 HTTP 룰(sid 1000101)을
    추가해줘

    📎 참고 (CLI): echo ''alert http any any -> any any (msg:"Suspicious UA BadBot";
    content:"BadBot"; http_user_agent; sid:1000101; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata 룰 작성: local.rules 에 HTTP User-Agent ''BadBot''을 탐지하는 룰(sid:1000101)을
    추가하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
    semantic:
      intent: 'HTTP User-Agent BadBot 탐지 룰 — alert http any any -> any any (msg: Suspicious
        UA BadBot ; content: BadBot ; http_user_agent; sid:1000101; rev:1;). http_user_agent
        sticky buffer 로 User-Agent 헤더만 매칭 - 정규화된 HTTP parsing 거침. http_header 보다 효율적.
        content 기본 case-sensitive - nocase 추가 시 대소문자 무시. MITRE T1071.001 detection
        기반'
      success_criteria:
      - alert http 구문 + sid:1000101
      - 'content: BadBot + http_user_agent sticky buffer'
      - local.rules tee -a 로 추가
      acceptable_methods:
      - echo alert http ... | sudo tee -a /etc/suricata/rules/local.rules
      - 'http.user_agent; content: BadBot ; (Suricata 5+ 신문법)'
      - 'Snort 호환 syntax: content: BadBot ; http_header; (덜 구체)'
      - YARA User-Agent 규칙 (Zeek 이벤트 스트림)
      - Sigma rule + sigmac 으로 Suricata 변환
      - |
        **[OSS] sigma-cli (표준 IDS 룰 → Suricata 변환)** — Sigma 표준.
          # 1. 설치
          pip install sigma-cli pysigma-backend-suricata
          # 2. Sigma 룰 작성 (badbot.yml)
          cat > /tmp/badbot.yml << 'EOF'
          title: Suspicious BadBot User-Agent
          status: experimental
          logsource:
              category: webserver
          detection:
              selection:
                  cs-user-agent: '*BadBot*'
              condition: selection
          level: medium
          tags:
              - attack.command_and_control
              - attack.t1071.001
          EOF
          # 3. Suricata 룰로 변환
          sigma convert -t suricata /tmp/badbot.yml
          # 4. 결과를 local.rules 에 추가
          sigma convert -t suricata /tmp/badbot.yml | sudo tee -a /etc/suricata/rules/local.rules
        예상 출력 `alert http any any -> any any (msg: "Suspicious BadBot User-Agent"; http.user_agent; content: "BadBot"; sid: 1; rev: 1;)`.
        운영 해석: 1 Sigma 룰 → Suricata + Wazuh + Elastic + Splunk 모두 자동 변환. multi-SIEM 환경 표준.
      - |
        **[OSS] scirius (web GUI 로 룰 작성)** — 시각적 작성 + push.
          # 1. https://scirius:8000 접속 → Sources → My Custom Rules → New Rule
          # 2. UI 동작:
          # - action: alert
          # - protocol: http
          # - src/dst: any/any
          # - msg: Suspicious UA BadBot
          # - sticky-buffer: http.user_agent
          # - content: BadBot
          # - sid: 1000101 / rev: 1
          # 3. "Validate" → suricata -T 자동 호출
          # 4. "Push to ruleset" → SSH 통해 secu 자동 배포
          # 5. CLI 검증
          ssh ccc@10.20.30.1 "sudo grep sid:1000101 /etc/suricata/rules/local.rules"
        UI 동작: 폼 입력 → 실시간 검증 → push 까지 1 click.
        운영 해석: SOC 분석가 표준. 룰 작성 시 자동 syntax check + audit log + git commit.
      - |
        **[OSS] OISF suricata-update + custom source** — git 기반 룰 관리.
          # 1. 사설 git 저장소에 룰 push (회사 룰 repo)
          mkdir -p /var/lib/suricata/custom-rules && cd /var/lib/suricata/custom-rules
          git init
          echo 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot"; http_user_agent; sid:1000101; rev:1;)' > local.rules
          git add . && git commit -m "Add BadBot UA detection"
          # 2. suricata-update source 등록
          sudo suricata-update enable-source /var/lib/suricata/custom-rules/
          sudo suricata-update --no-test
          # 3. 적재 검증
          sudo grep "sid:1000101" /var/lib/suricata/rules/suricata.rules
        예상 출력 `Loaded 30001 rules. / 1 new rule from custom-rules`.
        운영 해석: git history 로 룰 변경 audit. CI pipeline 의 git push → suricata-update 자동.
      - |
        **[OSS] Ansible (lineinfile + validate)** — IaC 룰 배포.
          # playbook
          - name: Add BadBot UA detection rule
            ansible.builtin.lineinfile:
              path: /etc/suricata/rules/local.rules
              line: 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot"; http_user_agent; sid:1000101; rev:1;)'
              regexp: '.*sid:1000101.*'
              state: present
              backup: yes
              validate: 'suricata -T -S %s'
            notify: reload suricata
          # 실행
          ansible-playbook -i inventory.yml suricata-rules.yml --diff --check  # dry-run
          ansible-playbook -i inventory.yml suricata-rules.yml
        예상 출력 `changed: [secu] / +alert http any any -> any any (msg:"Suspicious UA BadBot"; ...)`.
        운영 해석: validate 옵션이 핵심 — 잘못된 룰로 service 다운 방지. 다중 host 일관 배포.
      - |
        **[OSS] vim + suricata.vim (syntax highlight + lint)** — 룰 작성 표준 편집기.
          # 1. suricata.vim 설치
          mkdir -p ~/.vim/{syntax,ftdetect}
          curl -o ~/.vim/syntax/suricata.vim https://raw.githubusercontent.com/dyrnq/suricata-vim/main/syntax/suricata.vim
          echo "au BufRead,BufNewFile *.rules set filetype=suricata" > ~/.vim/ftdetect/suricata.vim
          # 2. 룰 편집
          sudo vim /etc/suricata/rules/local.rules
          # 3. 편집 도중 syntax check (':!sudo suricata -T -S %')
          # 4. ALE plugin 으로 실시간 lint
          # ~/.vimrc:
          # let g:ale_linters = {'suricata': ['suricata']}
        결과: action/keyword 색상 구분 + content/pcre quote 자동 검출 + 실시간 lint 에러 표시.
        운영 해석: 100+ 룰 운영 시 syntax error 사전 발견. vim 외 vscode 도 suricata-language extension.
      negative_signs:
      - http_user_agent 없이 단순 content 매칭
      - sid 중복(1000001 재사용)
      - msg 필드 누락
  target_vm: secu
  script: echo 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot";
    http_user_agent; sid:1000101; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: medium
  bastion_prompt: 'secu VM local.rules에 User-Agent=BadBot 탐지 HTTP 룰(sid 1000101)을
    추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: SQL Injection 간단 룰 — URI에 'union select' 포함 탐지(sid:1000102)을 추가하시오.
  hint: content:"union select"; http_uri;
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 URI의 ''union select'' SQL Injection 탐지 룰(sid
    1000102)을 추가해줘

    📎 참고 (CLI): echo ''alert http any any -> any any (msg:"SQLi union select"; content:"union
    select"; nocase; http_uri; sid:1000102; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata 룰 작성: SQL Injection 간단 룰 — URI에 ''union select'' 포함 탐지(sid:1000102)을
    추가하시오.'
  verify:
    type: output_contains
    expect: union
    field: stdout
    semantic:
      intent: 'URI 기반 SQLi 탐지 룰 — alert http any any -> any any (msg: SQLi union select
        ; content: union select ; nocase; http_uri; sid:1000102; rev:1;). http_uri
        sticky buffer 로 URL 경로+쿼리스트링 매칭. nocase 로 UNION SELECT / Union Select 등 변형
        모두 탐지. 단, 공격자는 /**/ 주석·대소문자·hex 인코딩으로 우회 가능 → pcre 정규표현식 권장: pcre: /union\s+select/i'
      success_criteria:
      - alert http + http_uri sticky buffer
      - 'content: union select + nocase'
      - sid:1000102 포함
      acceptable_methods:
      - echo alert http ... http_uri ... | sudo tee -a local.rules
      - 'http.uri; content: union select ; nocase; (Suricata 6.0+ 신문법)'
      - 'pcre: /union\s+select/i 로 공백 변형 대응'
      - ModSecurity CRS rule 942100(더 포괄적)
      - libinjection + modsec 로 intention-based 탐지
      - |
        **[OSS] sigma-cli (SQLi 룰 자동 변환)** — 표준 룰 → Suricata.
          # 1. Sigma 의 공식 SQL injection 룰 catalog
          git clone https://github.com/SigmaHQ/sigma /tmp/sigma
          ls /tmp/sigma/rules/web/web_sql_injection_*.yml
          # 2. 단일 룰 변환
          sigma convert -t suricata /tmp/sigma/rules/web/web_sql_injection_keywords.yml
          # 3. 일괄 변환 (디렉토리 전체)
          sigma convert -t suricata /tmp/sigma/rules/web/ --output /tmp/sigma-suricata.rules
          # 4. local.rules 에 추가
          cat /tmp/sigma-suricata.rules | sudo tee -a /etc/suricata/rules/local.rules
        예상 출력: 50+ SQLi 변형 패턴 룰 자동 생성 (union/select/exec/sleep/sqlmap 등).
        운영 해석: 단일 룰만 작성 X. SigmaHQ 공식 catalog 의 SQL 룰 50+ 일괄 import = 즉시 SOC baseline.
      - |
        **[OSS] libinjection + ModSecurity CRS** — 정확한 SQLi 탐지 (false positive 적음).
          # 1. 단순 content 매칭 보완 — Suricata 의 lua 스크립트 + libinjection
          sudo apt install libinjection-dev
          # 2. lua 스크립트 (/etc/suricata/lua/sqli.lua)
          cat > /etc/suricata/lua/sqli.lua << 'EOF'
          local libinjection = require("libinjection")
          function init () return {http_uri=tostring} end
          function match (args)
              local uri = tostring(args["http_uri"])
              if libinjection.sqli(uri) then return 1 end
              return 0
          end
          EOF
          # 3. Suricata 룰에서 lua 호출
          echo 'alert http any any -> any any (msg:"libinjection SQLi"; lua:sqli.lua; sid:1000200; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
        예상 결과: false positive 90%↓. simple content 룰은 `select * from products` 같은 정상 쿼리도 매칭, libinjection 은 *공격 의도* 분석.
        운영 해석: 단순 content vs 의도 분석 트레이드오프. 정확도 ↑ but CPU 오버헤드 ↑.
      - |
        **[OSS] sqlmap (SQLi rule 검증 도구)** — 침투테스터 표준.
          # 1. 일반 sqlmap 시도 (룰 발화 검증)
          sqlmap -u "http://10.20.30.80/?id=1" --level 1 --risk 1 --batch
          # 2. tamper script (룰 우회 시도) — encoding/comment 변형
          sqlmap -u "http://10.20.30.80/?id=1" --tamper=space2comment,charunicodeencode --level 3
          # 3. 우회 성공 시 → Suricata 룰의 false negative 발견 → 룰 강화
          # 4. 룰 강화 후 재시도 → 모든 tamper 가 차단되는지 확인
        예상 출력 `Parameter: id (GET) / Type: UNION query / Title: Generic UNION query`.
        운영 해석: sqlmap 으로 룰 자체 검증. tamper 옵션 = 룰 회피 시뮬. 룰의 *완전성* 측정 표준.
      - |
        **[OSS] pcregrep / pcre2grep (정규표현식 정밀 매칭)** — 룰 syntax pre-test.
          # 1. 룰 작성 전 패턴 시험
          echo "/?id=1 union select 1,2" | pcregrep -i 'union\s+select'
          # 2. 변형 패턴 매칭 (Suricata pcre 와 동일 syntax)
          echo "/?id=1 union/**/select 1,2" | pcregrep -i 'union[\s/*]+select'
          # 3. 정상 패턴 false positive 확인
          echo "/products?category=union" | pcregrep -i 'union\s+select'  # 0 매치 = 정상
          # 4. Suricata 룰에 적용
          echo 'alert http any any -> any any (msg:"SQLi union+select pcre"; pcre:"/union[\s\/\*]+select/i"; http.uri; sid:1000202; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
        예상 출력: 매칭 성공/실패 검증.
        운영 해석: pcre 는 false positive 위험 큼. 룰 작성 전 pcregrep 으로 *정상 트래픽* 미포함 검증 필수.
      - |
        **[OSS] ftw (룰 회귀 테스트)** — CI 통합 검증.
          # 1. 룰 테스트 yaml
          cat > /tmp/test-sqli.yml << 'EOF'
          ---
          tests:
              -   test_title: SQLi union select detection
                  desc: sid:1000102 should fire on URL with 'union select'
                  stages:
                      -   stage:
                              input:
                                  uri: /?id=1 union select 1,2
                                  protocol: http
                              output:
                                  alert: ["1000102"]
              -   test_title: Normal URL must not trigger
                  stages:
                      -   stage:
                              input:
                                  uri: /products?category=electronics
                              output:
                                  alert: []
          EOF
          # 2. 실행
          ftw run --include /tmp/test-sqli.yml --suricata-bin /usr/bin/suricata
        예상 출력 `Tests passed: 2 / 2 / SQLi detection: PASS / Normal URL: PASS`.
        운영 해석: 룰 변경 후 *기존 룰 회귀* 자동 테스트. CI 표준. positive (탐지) + negative (false positive) 양쪽 검증.
      negative_signs:
      - http_uri 없이 content 단독(전체 payload)
      - nocase 누락(대소문자 우회)
      - 공격 우회 기법(/**/ 주석) 미인지
  target_vm: secu
  script: echo 'alert http any any -> any any (msg:"SQLi union select"; content:"union
    select"; nocase; http_uri; sid:1000102; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: medium
  bastion_prompt: 'secu VM local.rules에 URI의 ''union select'' SQL Injection 탐지 룰(sid
    1000102)을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.
  hint: tcp any any -> any 445 …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 TCP 445(SMB) 트래픽 탐지 룰(sid 1000103)을 추가해줘

    📎 참고 (CLI): echo ''alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103;
    rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata 룰 작성: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.'
  verify:
    type: output_contains
    expect: '445'
    field: stdout
    semantic:
      intent: 'SMB (tcp/445) 트래픽 탐지 — alert tcp any any -> any 445 (msg: SMB traffic
        ; sid:1000103; rev:1;). 5-tuple 기반 단순 매칭(content 없이). SMB 는 Windows 파일 공유
        프로토콜, 네트워크 세그먼트 내부만 허용 원칙. 외부→내부 445 는 WannaCry·EternalBlue 정찰 의심. 실 운영에서는
        alert 대신 drop 가능(IPS 모드). 내부→내부 허용 예외 추가 필요'
      success_criteria:
      - alert tcp + dst port 445 + sid:1000103
      - content 없이도 valid 룰(5-tuple 만)
      - msg 로 SMB 의미 명시
      acceptable_methods:
      - echo alert tcp any any -> any 445 ... | tee -a local.rules
      - drop tcp any any -> any 445 (inline IPS 모드)
      - alert tcp $EXTERNAL_NET any -> $HOME_NET 445 (범위 제한)
      - nftables tcp dport 445 drop(더 저렴)
      - Zeek smb 프로토콜 분석 + notice.log
      - |
        **[OSS] Zeek (Bro) — SMB 분석 표준** — application-layer protocol parser.
          # 1. Zeek 설치
          sudo apt install zeek
          # 2. SMB 분석 활성화 (/usr/local/zeek/share/zeek/site/local.zeek)
          @load policy/protocols/smb
          # 3. 실시간 SMB 분석
          sudo zeek -i ens33 LogAscii::use_json=T
          # 4. SMB 로그 분석 (smb_*.log 자동 생성)
          tail -f /opt/zeek/logs/current/smb_files.log
          tail -f /opt/zeek/logs/current/smb_mapping.log
        예상 출력 `ts=2026-05-06T14:23:00 / id.orig_h=10.20.30.201 / id.resp_h=10.20.30.1 / id.resp_p=445 / action=SMB::FILE_READ / name=secret.docx`.
        운영 해석: Suricata 가 5-tuple 매칭, Zeek 은 *프로토콜 컨텐츠* 분석. SMB share 이름·파일명까지 추적. Suricata 보완 도구.
      - |
        **[OSS] suricata SMB protocol parser** — Suricata 자체 SMB 분석.
          # 1. /etc/suricata/suricata.yaml 의 app-layer SMB 활성화
          app-layer:
            protocols:
              smb:
                enabled: yes
                detection-ports:
                  dp: 445
          # 2. eve.json 의 smb event 확인
          sudo tail -f /var/log/suricata/eve.json | jq 'select(.event_type=="smb")'
          # 3. SMB 룰 강화 (5-tuple 외 protocol field 활용)
          echo 'alert smb any any -> any any (msg:"SMB write to admin share"; smb.share; content:"ADMIN$"; sid:1000300; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
        예상 출력 `event_type:"smb" / smb: {dialect:"3.0.2", command:"write", share:"\\10.20.30.1\\share"}`.
        운영 해석: Suricata 6.0+ 의 SMB parser. content 룰보다 정확. ADMIN$ / IPC$ 같은 관리 share 접근 탐지 표준.
      - |
        **[OSS] Wireshark / tshark SMB 디스플레이 필터** — 패킷 분석 표준.
          # 1. SMB2 트래픽만 캡처
          sudo tshark -i ens33 -Y "smb2" -c 20
          # 2. 특정 SMB 명령 필터
          sudo tshark -i ens33 -Y "smb2.cmd == 0x05" -c 5  # CREATE 명령
          # 3. SMB session setup (인증)
          sudo tshark -i ens33 -Y "smb2.cmd == 0x01" -T fields -e ip.src -e smb2.user
        예상 출력 `1   0.123  10.20.30.201 → 10.20.30.1   SMB2  Create Request File: secret.docx`.
        운영 해석: SMB 통신의 와이어 레벨 분석. EternalBlue 등 특정 SMB exploit 패턴 탐지.
      - |
