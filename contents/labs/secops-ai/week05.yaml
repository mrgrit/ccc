lab_id: secops-ai-week05
title: Suricata 룰 작성 (AI 지원)
version: ai
course: secops-ai
week: 5
description: content, pcre, flow, flowbits 등 Suricata 룰 키워드를 활용해 HTTP·TCP 탐지 룰을 작성한다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata 룰 문법 (action protocol src → dst opts) 을 이해한다
- HTTP 요청에서 특정 User-Agent 를 탐지하는 룰을 작성할 수 있다
- suricata -T 로 룰 문법을 검증하고 eve.json 에서 매칭을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: local.rules 에 HTTP User-Agent 'BadBot'을 탐지하는 룰(sid:1000101)을 추가하시오.
  hint: content:"BadBot"; http_user_agent;
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 User-Agent=BadBot 탐지 HTTP 룰(sid 1000101)을 추가해줘

    📎 참고 (CLI): echo ''alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot"; http_user_agent; sid:1000101;
    rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata 룰 작성: local.rules 에 HTTP User-Agent ''BadBot''을 탐지하는 룰(sid:1000101)을 추가하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
    semantic:
      intent: 'SecOps w5 s1 — local.rules 에 HTTP User-Agent ''BadBot''을 탐지하는 룰(sid:1000101)을 추가하시오. (cmd: echo ''alert http
        any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot)'
