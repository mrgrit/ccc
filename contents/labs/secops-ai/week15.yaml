lab_id: secops-ai-week15
title: 기말고사 — 보안 인프라 구축 종합 실기 (AI 지원)
version: ai
course: secops-ai
week: 15
description: nftables + Suricata + Wazuh + OpenCTI 연계를 활용해 공격 탐지·차단·기록 end-to-end
  시나리오를 구성한다.
difficulty: hard
duration_minutes: 180
objectives:
- nftables 'final' 테이블로 화이트리스트·블랙리스트 구조를 설계한다
- Suricata 커스텀 룰로 특정 공격을 탐지한다
- Wazuh alerts.json 에서 공격 이벤트를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 'final' 테이블을 만들고 input 체인(policy drop)을 생성하시오.
  hint: nft add table; nft add chain
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 ''inet final'' 테이블과 policy drop의 input 체인을 만들어줘

    📎 참고 (CLI): sudo nft add table inet final && sudo nft add chain inet final input
    ''{ type filter hook input priority 0 \; policy drop \; }'''
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: secu VM에 inet ''final'' 테이블을 만들고 input 체인(policy
    drop)을 생성하시오.'
  verify:
    type: output_contains
    expect: final
    field: stdout
    semantic:
      intent: Final 기말고사 - 보안 인프라 default-deny 시작 — sudo nft add table inet final
        && sudo nft add chain inet final input { type filter hook input priority 0
        ; policy drop ; }. 종합 방어 설계의 기반 chain. final 테이블 이름으로 기말 과제 전용. policy drop
        으로 Zero Trust. 이후 whitelist + blacklist + CTI 통합 구조로 확장. priority 0 filter
        표준
      success_criteria:
      - nft add table + add chain 2 명령
      - policy drop 명시
      - type filter hook input priority 0
      acceptable_methods:
      - sudo nft add table inet final && sudo nft add chain inet final input {...}
      - /etc/nftables.conf 에 선언 후 nft -f
      - ansible nftables role
      - Terraform 으로 IaC 관리
      negative_signs:
      - policy accept(Zero Trust 위반)
      - hook 누락
      - priority 비정상 값
  target_vm: secu
  script: sudo nft add table inet final && sudo nft add chain inet final input '{
    type filter hook input priority 0 \; policy drop \; }'
  risk_level: medium
  bastion_prompt: 'secu VM에 ''inet final'' 테이블과 policy drop의 input 체인을 만들어줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24 를 허용하시오.
  hint: nft add set + element
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM final 테이블에 whitelist_ips set(10.20.30.0/24)을 만들고 input
    체인에 @whitelist_ips accept 룰을 추가해줘

    📎 참고 (CLI): sudo nft ''add set inet final whitelist_ips { type ipv4_addr \; flags
    interval \; }'' && sudo nft add element inet final whitelist_ips ''{ 10.20.30.0/24
    }'' && sudo nft add rule inet final input ip saddr @whitelist_ips accept'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24
    를 허용하시오.'
  verify:
    type: output_contains
    expect: whitelist_ips
    field: stdout
    semantic:
      intent: whitelist_ips CIDR set + accept 룰 — sudo nft add set inet final whitelist_ips
        { type ipv4_addr ; flags interval ; } && sudo nft add element inet final whitelist_ips
        { 10.20.30.0/24 } && sudo nft add rule inet final input ip saddr @whitelist_ips
        accept. flags interval 필수 - CIDR prefix 저장/lookup 가능. 10.20.30.0/24 내부망 허용.
        3-step 체인(set 생성 + element 추가 + rule 추가) 으로 완성. CIDR 외 IP 는 drop(policy drop)
      success_criteria:
      - whitelist_ips set + flags interval
      - CIDR 10.20.30.0/24 element 추가
      - '@whitelist_ips accept 룰'
      acceptable_methods:
      - 3-step 체인(set+element+rule)
      - timeout + interval 조합
      - ipset hash:net 대체(legacy)
      - ansible nftables set module
      negative_signs:
      - flags interval 누락(CIDR 오류)
      - rule 없이 set+element 만
      - IP 오타
  target_vm: secu
  script: sudo nft 'add set inet final whitelist_ips { type ipv4_addr \; flags interval
    \; }' && sudo nft add element inet final whitelist_ips '{ 10.20.30.0/24 }' &&
    sudo nft add rule inet final input ip saddr @whitelist_ips accept
  risk_level: medium
  bastion_prompt: 'secu VM final 테이블에 whitelist_ips set(10.20.30.0/24)을 만들고 input
    체인에 @whitelist_ips accept 룰을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: final 테이블에 blacklist_ips set 을 만들고 input 체인 맨 앞에 drop 룰을 insert 하시오.
  hint: nft insert rule … @blacklist_ips drop
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM final 테이블에 blacklist_ips set을 만들고 input 체인 맨 앞에 drop 룰을
    삽입해줘

    📎 참고 (CLI): sudo nft ''add set inet final blacklist_ips { type ipv4_addr \; }''
    && sudo nft insert rule inet final input ip saddr @blacklist_ips drop'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 blacklist_ips set 을 만들고 input
    체인 맨 앞에 drop 룰을 insert 하시오.'
  verify:
    type: output_contains
    expect: blacklist_ips
    field: stdout
    semantic:
      intent: 'blacklist_ips set + drop 룰 prepend — sudo nft add set inet final blacklist_ips
        { type ipv4_addr ; } && sudo nft insert rule inet final input ip saddr @blacklist_ips
        drop. 블랙리스트는 화이트리스트보다 먼저 평가되어야 함 - insert 로 맨 앞에 prepend. final chain 룰 순서:
        (1) @blacklist_ips drop (2) @whitelist_ips accept (3) 기본 drop. timeout 없으면
        영구 차단 - CTI TTL 고려 timeout 30d 권장'
      success_criteria:
      - blacklist_ips set 생성
      - insert rule 로 맨 앞 삽입
      - '@blacklist_ips drop expression'
      acceptable_methods:
      - nft add set + nft insert rule 체인
      - timeout 30d 추가
      - index 0 명시
      - ipset hash:ip 대체
      negative_signs:
      - add rule(append) 로 순서 오류
      - accept 대신 drop
      - timeout 없이 영구
  target_vm: secu
  script: sudo nft 'add set inet final blacklist_ips { type ipv4_addr \; }' && sudo
    nft insert rule inet final input ip saddr @blacklist_ips drop
  risk_level: medium
  bastion_prompt: 'secu VM final 테이블에 blacklist_ips set을 만들고 input 체인 맨 앞에 drop 룰을
    삽입해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: Suricata local.rules 에 '.php?cmd=' 탐지 룰(sid:1000301) 을 추가하고 reload
    하시오.
  hint: content:"cmd="; http_uri;
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에 http_uri에 ''cmd=''가 포함된 요청을 탐지하는 룰(sid 1000301)을
    추가하고 suricata reload 해줘

    📎 참고 (CLI): echo ''alert http any any -> any any (msg:"Final exam - cmd injection";
    content:"cmd="; http_uri; sid:1000301; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules
    && sudo systemctl reload suricata'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: Suricata local.rules 에 ''.php?cmd='' 탐지
    룰(sid:1000301) 을 추가하고 reload 하시오.'
  verify:
    type: output_contains
    expect: '1000301'
    field: stdout
    semantic:
      intent: 'Suricata cmd injection 탐지 룰 — echo alert http any any -> any any (msg:
        Final exam - cmd injection ; content: cmd= ; http_uri; sid:1000301; rev:1;)
        | sudo tee -a /etc/suricata/rules/local.rules && sudo systemctl reload suricata.
        http_uri sticky buffer 에서 cmd= 패턴 매칭 - Command Injection 공격 탐지(MITRE T1059).
        reload 로 즉시 적용. 이후 공격자가 ?cmd= 포함 URI 전송 시 alert 생성'
      success_criteria:
      - 'alert http + content: cmd= + http_uri'
      - sid:1000301 포함
      - tee -a + reload suricata
      acceptable_methods:
      - echo alert http ... | sudo tee -a local.rules && systemctl reload suricata
      - 'pcre: /cmd=.+?$/i 로 정교화'
      - 'content: cmd= ; pcre로 payload 구체 매칭'
      - ModSecurity CRS 932xxx(RCE) 대체
      - Sigma rule → Suricata 변환
      negative_signs:
      - http_uri 없이 raw match(FP 많음)
      - reload 누락
      - sid 중복
  target_vm: secu
  script: echo 'alert http any any -> any any (msg:"Final exam - cmd injection"; content:"cmd=";
    http_uri; sid:1000301; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
    && sudo systemctl reload suricata
  risk_level: medium
  bastion_prompt: 'secu VM local.rules에 http_uri에 ''cmd=''가 포함된 요청을 탐지하는 룰(sid 1000301)을
    추가하고 suricata reload 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: attacker VM에서 web VM으로 /index.php?cmd=ls 요청을 보내 Suricata 탐지를 유도하시오.
  hint: curl /index.php?cmd=ls
  category: verify
  points: 10
  answer: '🤖 프롬프트: attacker VM에서 web VM으로 /index.php?cmd=ls 요청을 보내줘

    📎 참고 (CLI): curl -sS -o /dev/null -w ''%{http_code}\n'' ''http://10.20.30.80/index.php?cmd=ls'''
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: attacker VM에서 web VM으로 /index.php?cmd=ls
    요청을 보내 Suricata 탐지를 유도하시오.'
  verify:
    type: output_contains
    expect:
    - cmd=ls
    - curl
    - HTTP
    - index.php
    field: stdout
    semantic:
      intent: cmd injection 트래픽 트리거 — curl -sS -o /dev/null -w %{http_code}\n http://10.20.30.80/index.php?cmd=ls.
        s4 의 sid 1000301 룰 구동 테스트. attacker → web 방향 HTTP GET, URI 에 cmd=ls(common
        RCE pattern). 응답 코드 무시 - 룰 검증만 목적. 실 공격자는 encoding(?cmd=%6c%73), 쿼리 조합(?a=1&cmd=ls),
        POST body 등 다양한 우회 시도. 룰이 http_uri 로 static content 만 잡아 우회 가능
      success_criteria:
      - curl 로 ?cmd= URI 전송
      - <IP>/index.php?cmd=ls 포함
      - 응답 코드 출력
      acceptable_methods:
      - curl -sS -o /dev/null -w %{http_code} http://<IP>/index.php?cmd=ls
      - '다양한 payload: ?cmd=cat /etc/passwd, ?cmd=whoami'
      - Burp + Intruder sniper mode
      - commix 자동 RCE 도구
      - 'Python requests.get(params={cmd: ls})'
      negative_signs:
      - cmd= 파라미터 생략
      - 응답 확인 없음
      - 잘못된 호스트/포트
  target_vm: attacker
  script: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/index.php?cmd=ls'
  risk_level: medium
  bastion_prompt: attacker VM에서 web VM으로 /index.php?cmd=ls 요청을 보내줘
