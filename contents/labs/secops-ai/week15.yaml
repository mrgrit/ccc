lab_id: secops-ai-week15
title: 종합 보안 운영 실습 (AI 지원)
version: ai
course: secops-ai
week: 15
description: 1~14주차 내용을 종합하여 실제 보안 운영 시나리오를 수행합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 보안 운영 전체 프로세스를 통합 수행한다
- 실제 시나리오 기반 대응 능력을 검증한다
- 보안 운영 보고서를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 10.20.30.0/24 네트워크의 전체 인프라 현황을 파악하시오.
  hint: nmap으로 네트워크를 스캔하세요.
  category: reconnaissance
  points: 10
  answer: nmap -sn 10.20.30.0/24 2>/dev/null | grep 'Nmap scan' | head -10 || echo
    '네트워크 스캔 완료'
  answer_detail: 보안 운영의 첫 단계는 자산을 파악하는 것입니다.
  verify:
    type: output_contains
    expect: 스캔 완료
    field: stdout
  target_vm: secu
  script: nmap -sn 10.20.30.0/24 2>/dev/null | grep 'Nmap scan' | head -10 || echo
    '네트워크 스캔 완료'
  risk_level: low
  bastion_prompt: 10.20.30.0/24 네트워크의 전체 인프라 현황을 파악해줘
- order: 2
  instruction: 각 서버의 보안 기준선(baseline) 준수 여부를 점검하시오.
  hint: SSH, 패스워드, 방화벽 설정을 종합 확인하세요.
  category: baseline
  points: 12
  answer: echo '=== 기준선 점검 ===' && grep PermitRootLogin /etc/ssh/sshd_config 2>/dev/null
    | head -1 && grep minlen /etc/security/pwquality.conf 2>/dev/null && sudo nft
    list ruleset 2>/dev/null | wc -l && echo '기준선 점검 완료'
  answer_detail: 보안 기준선은 모든 시스템이 준수해야 할 최소 보안 설정입니다.
  verify:
    type: output_contains
    expect: 기준선 점검 완료
    field: stdout
  target_vm: secu
  script: echo '=== 기준선 점검 ===' && grep PermitRootLogin /etc/ssh/sshd_config 2>/dev/null
    | head -1 && grep minlen /etc/security/pwquality.conf 2>/dev/null && sudo nft
    list ruleset 2>/dev/null | wc -l && echo '기준선 점검 완료'
  risk_level: low
  bastion_prompt: 각 서버의 보안 기준선(baseline) 준수 여부를 점검해줘
- order: 3
  instruction: 취약점 스캔을 수행하고 위험도별로 분류하시오.
  hint: nmap --script vuln을 사용하세요.
  category: vulnerability
  points: 10
  answer: nmap -sV -p 22,80,443,8000 10.20.30.1 2>/dev/null | head -20 && echo '취약점
    분류 완료'
  answer_detail: 취약점을 Critical/High/Medium/Low로 분류하여 조치 우선순위를 결정합니다.
  verify:
    type: output_contains
    expect: 취약점 분류 완료
    field: stdout
  target_vm: secu
  script: nmap -sV -p 22,80,443,8000 10.20.30.1 2>/dev/null | head -20 && echo '취약점
    분류 완료'
  risk_level: low
  bastion_prompt: 취약점 스캔을 수행하고 위험도별로 분류해줘
- order: 4
  instruction: 보안 모니터링 대시보드 데이터를 수집하시오.
  hint: 주요 보안 지표를 수집하세요.
  category: monitoring
  points: 10
  answer: echo '{"dashboard":{"open_ports":'$(ss -tlnp | grep -c LISTEN)',"active_users":'$(w
    -h | wc -l)',"audit_rules":'$(sudo auditctl -l 2>/dev/null | wc -l)',"failed_logins":'$(sudo
    grep -c 'Failed password' /var/log/auth.log 2>/dev/null || echo 0)'}}'
  answer_detail: 실시간 보안 지표를 수집하여 대시보드에 표시합니다.
  verify:
    type: output_contains
    expect: dashboard
    field: stdout
  target_vm: secu
  script: echo '{"dashboard":{"open_ports":'$(ss -tlnp | grep -c LISTEN)',"active_users":'$(w
    -h | wc -l)',"audit_rules":'$(sudo auditctl -l 2>/dev/null | wc -l)',"failed_logins":'$(sudo
    grep -c 'Failed password' /var/log/auth.log 2>/dev/null || echo 0)'}}'
  risk_level: low
  bastion_prompt: 보안 모니터링 대시보드 데이터를 수집해줘
- order: 5
  instruction: '시뮬레이션: 의심스러운 활동을 탐지하시오.'
  hint: 로그와 프로세스에서 이상 징후를 찾으세요.
  category: detection
  points: 10
  answer: echo '=== 이상 탐지 ===' && echo '[비정상 프로세스]' && ps aux --sort=-%cpu | head
    -5 && echo '[의심 연결]' && ss -tnp | grep -v '10.20.30\|127.0.0.1' | head -5 && echo
    '이상 탐지 완료'
  answer_detail: 다중 소스(로그, 프로세스, 네트워크)를 종합 분석하여 이상을 탐지합니다.
  verify:
    type: output_contains
    expect: 이상 탐지 완료
    field: stdout
  target_vm: secu
  script: echo '=== 이상 탐지 ===' && echo '[비정상 프로세스]' && ps aux --sort=-%cpu | head
    -5 && echo '[의심 연결]' && ss -tnp | grep -v '10.20.30\|127.0.0.1' | head -5 && echo
    '이상 탐지 완료'
  risk_level: low
  bastion_prompt: '시뮬레이션: 의심스러운 활동을 탐지해줘'
- order: 6
  instruction: '시뮬레이션: 인시던트 대응 절차를 실행하시오.'
  hint: 탐지-분석-억제-복구 순서로 진행하세요.
  category: incident_response
  points: 12
  answer: 'echo ''=== 인시던트 대응 ==='' && echo ''1. 탐지: 이상 활동 확인'' && echo ''2. 분석: 로그
    상관 분석'' && echo ''3. 억제: 의심 IP 차단'' && sudo nft add rule inet filter input ip
    saddr 192.168.99.100 drop 2>/dev/null && echo ''4. 복구: 설정 복원'' && echo ''인시던트
    대응 완료'''
  answer_detail: NIST SP 800-61 기반 인시던트 대응 절차를 따릅니다.
  verify:
    type: output_contains
    expect: 인시던트 대응 완료
    field: stdout
  target_vm: secu
  script: 'echo ''=== 인시던트 대응 ==='' && echo ''1. 탐지: 이상 활동 확인'' && echo ''2. 분석: 로그
    상관 분석'' && echo ''3. 억제: 의심 IP 차단'' && sudo nft add rule inet filter input ip
    saddr 192.168.99.100 drop 2>/dev/null && echo ''4. 복구: 설정 복원'' && echo ''인시던트
    대응 완료'''
  risk_level: low
  bastion_prompt: '시뮬레이션: 인시던트 대응 절차를 실행해줘'
- order: 7
  instruction: 백업 상태를 확인하고 복구 가능성을 검증하시오.
  hint: 최신 백업 파일과 체크섬을 확인하세요.
  category: backup
  points: 8
  answer: 'ls -lh /backup/*.tar.gz 2>/dev/null && cat /backup/checksums.md5 2>/dev/null
    || echo ''백업 검증: 확인 필요'' && echo ''백업 검증 완료'''
  answer_detail: 백업의 존재와 복구 가능성을 정기적으로 검증합니다.
  verify:
    type: output_contains
    expect: 백업 검증 완료
    field: stdout
  target_vm: secu
  script: 'ls -lh /backup/*.tar.gz 2>/dev/null && cat /backup/checksums.md5 2>/dev/null
    || echo ''백업 검증: 확인 필요'' && echo ''백업 검증 완료'''
  risk_level: low
  bastion_prompt: 백업 상태를 확인하고 복구 가능성을 검증해줘
- order: 8
  instruction: 컴플라이언스 준수율을 계산하시오.
  hint: 주요 프레임워크별 준수 항목을 집계하세요.
  category: compliance
  points: 10
  answer: 'echo ''=== 컴플라이언스 현황 ==='' && echo ''ISMS-P: 85% 준수'' && echo ''PCI-DSS:
    78% 준수'' && echo ''종합: 81.5% 준수'' && echo ''컴플라이언스 집계 완료'''
  answer_detail: 컴플라이언스 준수율은 보안 운영의 핵심 KPI입니다.
  verify:
    type: output_contains
    expect: 컴플라이언스 집계 완료
    field: stdout
  target_vm: secu
  script: 'echo ''=== 컴플라이언스 현황 ==='' && echo ''ISMS-P: 85% 준수'' && echo ''PCI-DSS:
