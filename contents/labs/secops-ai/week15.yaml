  risk_level: low
  bastion_prompt: 컴플라이언스 준수율을 계산해줘
- order: 9
  instruction: 보안 자동화 현황을 점검하시오.
  hint: 자동화된 점검 스크립트와 cron 작업을 확인하세요.
  category: automation
  points: 8
  answer: echo '[자동화 현황]' && ls /etc/cron.d/ 2>/dev/null && echo '[스크립트]' && ls /tmp/*.sh
    2>/dev/null | head -10 && echo '자동화 현황 점검 완료'
  answer_detail: 자동화 커버리지를 높여 보안 운영 효율을 개선합니다.
  verify:
    type: output_contains
    expect: 자동화 현황 점검 완료
    field: stdout
  target_vm: secu
  script: echo '[자동화 현황]' && ls /etc/cron.d/ 2>/dev/null && echo '[스크립트]' && ls /tmp/*.sh
    2>/dev/null | head -10 && echo '자동화 현황 점검 완료'
  risk_level: low
  bastion_prompt: 보안 자동화 현황을 점검해줘
- order: 10
  instruction: 보안 교육 및 인식 현황을 문서화하시오.
  hint: 교육 이수율, 모의 훈련 결과를 정리하세요.
  category: governance
  points: 8
  answer: 'echo -e ''=== 보안 교육 현황 ===\n교육 이수율: 95%\n모의 피싱 클릭률: 8%\n인시던트 보고 비율: 72%\n보안
    교육 현황 완료'''
  answer_detail: 보안 인식 교육은 기술적 통제를 보완하는 핵심 활동입니다.
  verify:
    type: output_contains
    expect: 보안 교육 현황 완료
    field: stdout
  target_vm: secu
  script: 'echo -e ''=== 보안 교육 현황 ===\n교육 이수율: 95%\n모의 피싱 클릭률: 8%\n인시던트 보고 비율: 72%\n보안
