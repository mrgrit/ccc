  risk_level: low
  bastion_prompt: 보안 교육 및 인식 현황을 문서화해줘
- order: 11
  instruction: '위험 평가를 수행하시오: 자산-위협-취약점 매핑.'
  hint: 주요 자산과 관련 위협/취약점을 매핑하세요.
  category: risk
  points: 10
  answer: 'echo -e ''=== 위험 평가 ===\n자산: 웹 서버 (10.20.30.80)\n위협: SQL Injection, DDoS\n취약점:
    미패치 SW, 설정 오류\n위험도: 높음\n대책: WAF 운영, 정기 패치\n위험 평가 완료'''
  answer_detail: 위험 = 자산 x 위협 x 취약점. 정량적/정성적 위험 평가를 수행합니다.
  verify:
    type: output_contains
