  target_vm: secu
  script: 'echo -e ''=== 위험 평가 ===\n자산: 웹 서버 (10.20.30.80)\n위협: SQL Injection, DDoS\n취약점:
    미패치 SW, 설정 오류\n위험도: 높음\n대책: WAF 운영, 정기 패치\n위험 평가 완료'''
