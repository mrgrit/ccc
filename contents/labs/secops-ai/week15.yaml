lab_id: secops-ai-week15
title: 기말고사 — 보안 인프라 구축 종합 실기 (AI 지원)
version: ai
course: secops-ai
week: 15
description: nftables + Suricata + Wazuh + OpenCTI 연계를 활용해 공격 탐지·차단·기록 end-to-end
  시나리오를 구성한다.
difficulty: hard
duration_minutes: 180
objectives:
- nftables 'final' 테이블로 화이트리스트·블랙리스트 구조를 설계한다
- Suricata 커스텀 룰로 특정 공격을 탐지한다
- Wazuh alerts.json 에서 공격 이벤트를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 'final' 테이블을 만들고 input 체인(policy drop)을 생성하시오.
  hint: nft add table; nft add chain
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 ''inet final'' 테이블과 policy drop의 input 체인을 만들어줘

    📎 참고 (CLI): sudo nft add table inet final && sudo nft add chain inet final input
    ''{ type filter hook input priority 0 \; policy drop \; }'''
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: secu VM에 inet ''final'' 테이블을 만들고 input 체인(policy
    drop)을 생성하시오.'
  verify:
    type: output_contains
    expect: final
    field: stdout
    semantic:
      intent: Final 기말고사 - 보안 인프라 default-deny 시작 — sudo nft add table inet final
        && sudo nft add chain inet final input { type filter hook input priority 0
        ; policy drop ; }. 종합 방어 설계의 기반 chain. final 테이블 이름으로 기말 과제 전용. policy drop
        으로 Zero Trust. 이후 whitelist + blacklist + CTI 통합 구조로 확장. priority 0 filter
        표준
      success_criteria:
      - nft add table + add chain 2 명령
      - policy drop 명시
      - type filter hook input priority 0
      acceptable_methods:
      - sudo nft add table inet final && sudo nft add chain inet final input {...}
      - /etc/nftables.conf 에 선언 후 nft -f
      - ansible nftables role
      - Terraform 으로 IaC 관리
      - |
        **[OSS] nft (table + chain default-deny)** — 표준.
          # 1. table + chain (policy drop)
          sudo nft add table inet final
          sudo nft 'add chain inet final input { type filter hook input priority 0 ; policy drop ; }'
          # 2. counter 추가 (drop 횟수 측정)
          sudo nft 'add chain inet final input { type filter hook input priority 0 ; policy drop ; counter ; }'
          # 3. 검증
          sudo nft -a list table inet final
          # 4. JSON 검증
          sudo nft -j list table inet final | jq '.nftables[] | select(.chain) | {chain: .chain.name, policy: .chain.policy, hook: .chain.hook}'
        예상 출력 `chain input { type filter hook input priority 0; policy drop; }`.
        운영 해석: policy drop = Zero Trust 시작. 모든 트래픽 명시적 허용 외 차단.
      - |
        **[OSS] /etc/nftables.conf + IaC (영구 관리)** — 표준.
          # 1. /etc/nftables.conf 파일 정의
          sudo tee /etc/nftables.final.conf > /dev/null <<'EOF'
          #!/usr/sbin/nft -f
          flush table inet final 2>/dev/null
          table inet final {
            chain input {
              type filter hook input priority 0; policy drop;
              # rules will be added later
            }
          }
          EOF
          # 2. syntax 검증 + apply
          sudo nft -c -f /etc/nftables.final.conf && sudo nft -f /etc/nftables.final.conf
          # 3. 영구화 (재부팅 후 자동 로드)
          sudo cat /etc/nftables.final.conf | sudo tee -a /etc/nftables.conf
          sudo systemctl enable --now nftables
          # 4. 검증
          sudo nft list ruleset | grep -A 5 'table inet final'
        예상 출력 `flush + table created / nftables active`.
        운영 해석: 재부팅 보존 + git 관리. enterprise 표준.
      - |
        **[OSS] Ansible nftables role (멀티 호스트)** — IaC.
          # 1. /etc/ansible/playbooks/final-table.yml
          # ---
          # - hosts: secu
          #   roles:
          #     - role: ansible.posix.nftables
          #       vars:
          #         nftables_table:
          #           - name: final
          #             family: inet
          #             chains:
          #               - name: input
          #                 type: filter
          #                 hook: input
          #                 priority: 0
          #                 policy: drop
          # 2. 실행 + diff
          ansible-playbook -i inventory final-table.yml --diff
          # 3. idempotent 검증
          ansible-playbook -i inventory final-table.yml --check
        예상 출력 `changed=1 → ok=1 changed=0 (idempotent)`.
        운영 해석: 멀티 호스트 표준화. CI/CD 통합.
      - |
        **[OSS] Terraform + nftables provider** — IaC.
          # 1. main.tf
          # terraform {
          #   required_providers {
          #     nftables = { source = "ansible-collections/nftables" }
          #   }
          # }
          # resource "nftables_table" "final" {
          #   family = "inet"
          #   name = "final"
          # }
          # resource "nftables_chain" "input" {
          #   table = nftables_table.final.name
          #   family = "inet"
          #   name = "input"
          #   type = "filter"
          #   hook = "input"
          #   priority = 0
          #   policy = "drop"
          # }
          # 2. apply
          terraform init && terraform plan && terraform apply -auto-approve
          # 3. state file 로 drift 추적
          terraform state list
          # 4. destroy (cleanup)
          terraform destroy -auto-approve
        예상 출력 `Plan: 2 to add / Apply complete!`.
        운영 해석: Plan-Apply 분리 → review 워크플로우. 클라우드 IaC 와 동일 패턴.
      - |
        **[OSS] systemd unit + ExecStartPre validation** — 안전.
          # 1. /etc/systemd/system/nftables-final.service
          sudo tee /etc/systemd/system/nftables-final.service > /dev/null <<EOF
          [Unit]
          Description=Final exam nftables policy
          Before=network-pre.target
          [Service]
          Type=oneshot
          ExecStartPre=/usr/sbin/nft -c -f /etc/nftables.final.conf
          ExecStart=/usr/sbin/nft -f /etc/nftables.final.conf
          ExecStop=/usr/sbin/nft delete table inet final
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target
          EOF
          # 2. enable
          sudo systemctl daemon-reload
          sudo systemctl enable --now nftables-final
          # 3. 상태
          systemctl status nftables-final
        예상 출력 `Active: active (exited) / start succeeded`.
        운영 해석: ExecStartPre = syntax 검증 → 실패 시 ExecStart skip. safe deployment.
      negative_signs:
      - policy accept(Zero Trust 위반)
      - hook 누락
      - priority 비정상 값
  target_vm: secu
  script: sudo nft add table inet final && sudo nft add chain inet final input '{
    type filter hook input priority 0 \; policy drop \; }'
  risk_level: medium
  bastion_prompt: 'secu VM에 ''inet final'' 테이블과 policy drop의 input 체인을 만들어줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24 를 허용하시오.
  hint: nft add set + element
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM final 테이블에 whitelist_ips set(10.20.30.0/24)을 만들고 input
    체인에 @whitelist_ips accept 룰을 추가해줘

    📎 참고 (CLI): sudo nft ''add set inet final whitelist_ips { type ipv4_addr \; flags
    interval \; }'' && sudo nft add element inet final whitelist_ips ''{ 10.20.30.0/24
    }'' && sudo nft add rule inet final input ip saddr @whitelist_ips accept'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24
    를 허용하시오.'
  verify:
    type: output_contains
    expect: whitelist_ips
    field: stdout
    semantic:
      intent: whitelist_ips CIDR set + accept 룰 — sudo nft add set inet final whitelist_ips
        { type ipv4_addr ; flags interval ; } && sudo nft add element inet final whitelist_ips
        { 10.20.30.0/24 } && sudo nft add rule inet final input ip saddr @whitelist_ips
        accept. flags interval 필수 - CIDR prefix 저장/lookup 가능. 10.20.30.0/24 내부망 허용.
        3-step 체인(set 생성 + element 추가 + rule 추가) 으로 완성. CIDR 외 IP 는 drop(policy drop)
      success_criteria:
      - whitelist_ips set + flags interval
      - CIDR 10.20.30.0/24 element 추가
      - '@whitelist_ips accept 룰'
      acceptable_methods:
      - 3-step 체인(set+element+rule)
      - timeout + interval 조합
      - ipset hash:net 대체(legacy)
      - ansible nftables set module
      - |
        **[OSS] nft set + element + rule (3-step CIDR)** — 표준.
          # 1. CIDR set 생성 (flags interval 필수)
          sudo nft 'add set inet final whitelist_ips { type ipv4_addr ; flags interval ; }'
          # 2. CIDR element 추가 (다중 가능)
          sudo nft 'add element inet final whitelist_ips { 10.20.30.0/24, 192.168.0.0/24 }'
          # 3. accept rule (saddr 매칭)
          sudo nft 'add rule inet final input ip saddr @whitelist_ips counter accept'
          # 4. 검증
          sudo nft list set inet final whitelist_ips
          sudo nft -a list chain inet final input
        예상 출력 `elements = { 10.20.30.0/24, 192.168.0.0/24 } / rule ip saddr @whitelist_ips counter accept`.
        운영 해석: flags interval = CIDR 지원. counter = 정책 효과 측정.
      - |
        **[OSS] ipset hash:net (legacy 환경)** — 대체.
          # 1. 설치
          sudo apt install -y ipset
          # 2. CIDR set 생성 (hash:net)
          sudo ipset create whitelist_legacy hash:net counters comment
          sudo ipset add whitelist_legacy 10.20.30.0/24 comment "internal LAN"
          # 3. iptables 연동
          sudo iptables -I INPUT 1 -m set --match-set whitelist_legacy src -j ACCEPT
          # 4. 영구화
          sudo apt install -y iptables-persistent ipset-persistent
          sudo ipset save | sudo tee /etc/iptables/ipsets
          sudo iptables-save | sudo tee /etc/iptables/rules.v4
        예상 출력 `Number of entries: 1 / 10.20.30.0/24 comment "internal LAN" counters`.
        운영 해석: ipset 은 nft 이전 표준. 일부 distro 에서 여전히 운영. 마이그레이션 path.
      - |
        **[OSS] Ansible community.general.nftables_set** — IaC.
          # 1. /etc/ansible/playbooks/whitelist.yml
          # ---
          # - hosts: secu
          #   tasks:
          #     - name: ensure whitelist_ips set + rule
          #       community.general.nftables_set:
          #         family: inet
          #         table: final
          #         name: whitelist_ips
          #         type: ipv4_addr
          #         flags: [interval]
          #         elements:
          #           - 10.20.30.0/24
          #           - 192.168.0.0/24
          #         state: present
          #     - name: ensure accept rule
          #       community.general.nftables_rule:
          #         family: inet
          #         table: final
          #         chain: input
          #         rule: ip saddr @whitelist_ips counter accept
          #         state: present
          # 2. 실행
          ansible-playbook -i inventory whitelist.yml --diff
        예상 출력 `changed=2 / set + rule 동시 보장`.
        운영 해석: idempotent + diff. 멀티 호스트.
      - |
        **[OSS] nftables.conf 영구 정의 + git** — IaC + audit.
          # 1. /etc/nftables.final.conf 추가
          sudo tee -a /etc/nftables.final.conf > /dev/null <<'EOF'
          table inet final {
            set whitelist_ips {
              type ipv4_addr
              flags interval
              elements = { 10.20.30.0/24, 192.168.0.0/24 }
            }
            chain input {
              type filter hook input priority 0; policy drop;
              ip saddr @whitelist_ips counter accept comment "trusted CIDRs"
            }
          }
          EOF
          # 2. git commit (etckeeper)
          cd /etc && sudo git add nftables.final.conf && sudo git commit -m "Add whitelist 10.20.30.0/24 + 192.168.0.0/24"
          # 3. apply + 검증
          sudo nft -c -f /etc/nftables.final.conf && sudo nft -f /etc/nftables.final.conf
        예상 출력 `commit abc123 / nft applied / accept counter 0`.
        운영 해석: git = 변경 audit. enterprise 표준.
      - |
        **[OSS] 화이트리스트 효과 검증 (curl + counter)** — 검증.
          # 1. 화이트리스트 IP (10.20.30.x) 에서 ping
          # ssh ccc@10.20.30.100 (siem) → secu 로 ping
          ssh ccc@10.20.30.100 'ping -c 3 10.20.30.1'
          # 2. counter 증가 확인 (secu 측)
          sudo nft list chain inet final input | grep whitelist_ips
          # 3. 외부 IP 시뮬레이션 (drop 검증)
          ssh ccc@10.20.30.201 'ping -c 1 -W 2 10.20.30.1' || echo "blocked"
          # 4. attacker 측에서 drop 측정
          sudo nft -j list chain inet final input | jq '.nftables[] | select(.rule) | .rule.expr[]? | select(.counter)'
        예상 출력 `ping 정상 / counter +3 packets / blocked / drop counter +1`.
        운영 해석: 화이트리스트 작동 + 비-CIDR drop = Zero Trust 정책 검증.
      negative_signs:
      - flags interval 누락(CIDR 오류)
      - rule 없이 set+element 만
      - IP 오타
  target_vm: secu
  script: sudo nft 'add set inet final whitelist_ips { type ipv4_addr \; flags interval
    \; }' && sudo nft add element inet final whitelist_ips '{ 10.20.30.0/24 }' &&
    sudo nft add rule inet final input ip saddr @whitelist_ips accept
  risk_level: medium
  bastion_prompt: 'secu VM final 테이블에 whitelist_ips set(10.20.30.0/24)을 만들고 input
    체인에 @whitelist_ips accept 룰을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: final 테이블에 blacklist_ips set 을 만들고 input 체인 맨 앞에 drop 룰을 insert 하시오.
  hint: nft insert rule … @blacklist_ips drop
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM final 테이블에 blacklist_ips set을 만들고 input 체인 맨 앞에 drop 룰을
    삽입해줘

    📎 참고 (CLI): sudo nft ''add set inet final blacklist_ips { type ipv4_addr \; }''
    && sudo nft insert rule inet final input ip saddr @blacklist_ips drop'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 blacklist_ips set 을 만들고 input
    체인 맨 앞에 drop 룰을 insert 하시오.'
  verify:
    type: output_contains
    expect: blacklist_ips
    field: stdout
    semantic:
      intent: 'blacklist_ips set + drop 룰 prepend — sudo nft add set inet final blacklist_ips
        { type ipv4_addr ; } && sudo nft insert rule inet final input ip saddr @blacklist_ips
        drop. 블랙리스트는 화이트리스트보다 먼저 평가되어야 함 - insert 로 맨 앞에 prepend. final chain 룰 순서:
        (1) @blacklist_ips drop (2) @whitelist_ips accept (3) 기본 drop. timeout 없으면
        영구 차단 - CTI TTL 고려 timeout 30d 권장'
      success_criteria:
      - blacklist_ips set 생성
      - insert rule 로 맨 앞 삽입
      - '@blacklist_ips drop expression'
      acceptable_methods:
      - nft add set + nft insert rule 체인
      - timeout 30d 추가
      - index 0 명시
      - ipset hash:ip 대체
      - |
        **[OSS] nft blacklist + insert (먼저 평가)** — 표준.
          # 1. blacklist set (timeout 30d, comment)
          sudo nft 'add set inet final blacklist_ips { type ipv4_addr ; flags timeout ; timeout 30d ; }'
          # 2. drop 룰을 input 0번 위치에 prepend (whitelist 보다 먼저)
          sudo nft 'insert rule inet final input ip saddr @blacklist_ips log prefix "[BLOCK] " counter drop'
          # 3. 룰 순서 검증 (blacklist 가 가장 먼저)
          sudo nft -a list chain inet final input
          # 4. JSON 으로 순서 확인
          sudo nft -j list chain inet final input | jq '.nftables[] | select(.rule)'
        예상 출력 `[1] blacklist drop / [2] whitelist accept / [3] (default drop)`.
        운영 해석: insert = 0번 위치 prepend. blacklist 가 whitelist 보다 먼저 평가.
      - |
        **[OSS] Wazuh AR + nft (자동 blacklist 추가)** — 자동화.
          # 1. AR custom script (web/secu 측)
          sudo tee /var/ossec/active-response/bin/nft-block.sh > /dev/null <<'SCRIPT'
          #!/bin/bash
          # $1 = action (add/delete), $4 = srcip
          ACTION="$1"; SRCIP="$4"
          if [ "$ACTION" = "add" ]; then
            sudo /usr/sbin/nft add element inet final blacklist_ips "{ $SRCIP timeout 30d }"
            logger -t wazuh-ar "Blocked $SRCIP via nft blacklist_ips"
          fi
          SCRIPT
          sudo chmod +x /var/ossec/active-response/bin/nft-block.sh
          # 2. ossec.conf <command> + <active-response>
          # <command><name>nft-block</name><executable>nft-block.sh</executable></command>
          # <active-response>
          #   <command>nft-block</command>
          #   <location>local</location>
          #   <rules_id>5710</rules_id>  <!-- SSH brute force -->
          # </active-response>
          sudo systemctl restart wazuh-manager
          # 3. 검증
          sudo tail -F /var/ossec/logs/active-responses.log
        예상 출력 `Blocked 10.20.30.201 via nft blacklist_ips`.
        운영 해석: 무인 자동 차단. 야간·휴일에도 즉시 반응.
      - |
        **[OSS] OpenCTI → blacklist 자동 sync (w13 응용)** — 자동화.
          # 1. /usr/local/bin/blacklist-sync.sh (cti-sync 와 별도 set)
          sudo tee /usr/local/bin/blacklist-sync.sh > /dev/null <<'SH'
          #!/bin/bash
          T=$(sudo grep ^OPENCTI_ADMIN_TOKEN /opt/opencti/.env | cut -d= -f2)
          IPS=$(curl -sS -X POST http://10.20.30.100:8080/graphql \
            -H "Authorization: Bearer $T" -H 'Content-Type: application/json' \
            -d '{"query":"{ indicators(first:200,filters:{mode:and,filters:[{key:\"x_opencti_main_observable_type\",values:[\"IPv4-Addr\"]},{key:\"x_opencti_score\",values:[\"70\"],operator:gte}],filterGroups:[]}){edges{node{pattern x_opencti_score}}}}"}' \
            | jq -r '.data.indicators.edges[].node.pattern' | grep -oE "'[0-9.]+'" | tr -d "'" | sort -u)
          sudo nft flush set inet final blacklist_ips
          for ip in $IPS; do
            sudo nft add element inet final blacklist_ips "{ $ip timeout 30d }" 2>/dev/null
          done
          echo "synced $(echo "$IPS" | wc -w) IPs to blacklist_ips"
          SH
          sudo chmod +x /usr/local/bin/blacklist-sync.sh
          # 2. systemd timer
          # ... cti-sync 와 같은 패턴
        예상 출력 `synced 12 IPs to blacklist_ips`.
        운영 해석: w13 의 cti_ips 와 분리된 blacklist 운영. score≥70 만.
      - |
        **[OSS] CrowdSec firewall bouncer (커뮤니티 reputation)** — 보충.
          # 1. CrowdSec engine + nftables bouncer
          sudo apt install -y crowdsec crowdsec-firewall-bouncer-nftables
          # 2. 자동 set + chain (CrowdSec 가 만들고 sync)
          sudo systemctl enable --now crowdsec-firewall-bouncer
          sudo nft list set inet crowdsec crowdsec-blacklists | head
          # 3. 결정 확인 (커뮤니티 + local)
          sudo cscli decisions list --type ban
          # 4. final.input 에 crowdsec set 추가 (먼저 drop)
          sudo nft 'insert rule inet final input ip saddr @crowdsec-blacklists drop'
        예상 출력 `decisions ban 1234 IPs / set crowdsec-blacklists active`.
        운영 해석: CrowdSec 의 community feed + 자체 blacklist 합집합. 다층 reputation.
      - |
        **[OSS] log + drop + audit log forwarding** — audit.
          # 1. log + drop 룰 (이미 위에 포함)
          # ... ip saddr @blacklist_ips log prefix "[BLOCK] " drop
