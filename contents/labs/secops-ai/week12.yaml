  bastion_prompt: '암호화 설정을 감사하시오: TLS 버전, 키 길이해줘'
- order: 12
  instruction: 감사 체크리스트를 생성하시오.
  hint: 점검 항목, 기준, 결과를 표 형태로 작성하세요.
