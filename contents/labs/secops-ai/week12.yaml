lab_id: secops-ai-week12
title: OpenCTI 설치·구성 (AI 지원)
version: ai
course: secops-ai
week: 12
description: siem에 배포된 OpenCTI 컨테이너 구성·초기 상태·포트를 확인한다.
difficulty: easy
duration_minutes: 90
objectives:
- docker 기반 OpenCTI 구성을 확인한다
- OpenCTI 컨테이너 상태와 포트(8080)를 점검한다
- 초기 로그에서 에러가 없는지 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM에서 docker compose로 관리되는 컨테이너 목록을 확인하시오.
  hint: docker ps
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 docker 컨테이너 목록을 보여줘

    📎 참고 (CLI): docker ps --format ''{{.Names}}\t{{.Status}}'' 2>/dev/null | head'
  answer_detail: 'OpenCTI 설치·구성: siem VM에서 docker compose로 관리되는 컨테이너 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: opencti
    field: stdout
    semantic:
      intent: 'docker ps 컨테이너 전체 목록 — docker ps --format {{.Names}}\t{{.Status}} | head. Running 상태의 모든
        컨테이너 표시. OpenCTI 스택은 여러 컨테이너: opencti(platform), opencti-redis, opencti-elastic, opencti-rabbitmq,
        opencti-minio, opencti-worker, opencti-connector-*. --format 으로 tab 구분 출력(깔끔), head 로 처음 10개만.
        전체 확인: docker ps -a(exited 포함)'
      success_criteria:
      - docker ps 실행
      - 컨테이너 이름·상태 출력
      - opencti 관련 포함
      acceptable_methods:
      - docker ps --format {{.Names}}\t{{.Status}}
      - docker ps -a (전체)
      - docker compose ps(compose 관리)
      - docker inspect 로 단일 컨테이너 상세
      - kubectl get pods(K8s 환경)
      negative_signs:
      - running 외 포함하여 혼동
      - format 없이 긴 출력
      - head 누락
  target_vm: siem
  script: docker ps --format '{{.Names}}\t{{.Status}}' 2>/dev/null | head
  risk_level: low
  bastion_prompt: siem VM의 docker 컨테이너 목록을 보여줘
- order: 2
  instruction: opencti 관련 컨테이너만 필터링하시오.
  hint: docker ps | grep opencti
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 opencti 컨테이너만 필터링해서 보여줘

    📎 참고 (CLI): docker ps --format ''{{.Names}}\t{{.Status}}'' 2>/dev/null | grep -i opencti'
  answer_detail: 'OpenCTI 설치·구성: opencti 관련 컨테이너만 필터링하시오.'
  verify:
    type: output_contains
    expect: opencti
    field: stdout
    semantic:
      intent: 'OpenCTI 컨테이너 필터링 — docker ps --format {{.Names}}\t{{.Status}} | grep -i opencti. OpenCTI
        스택 관련 컨테이너 명시적 확인 - 이름에 opencti prefix 가진 여러 컨테이너(platform, worker, connector-*, depedencies).
        grep -i 로 대소문자 무시. 각 컨테이너 Up 상태인지·restarting 여부 확인. 이름 pattern: opencti-<role>(docker-compose
        로 자동 생성)'
      success_criteria:
      - grep -i opencti 필터링
      - opencti 문자열 매칭
      - 컨테이너 목록 출력
      acceptable_methods:
      - docker ps --format {{.Names}}\t{{.Status}} | grep -i opencti
      - docker compose -f docker-compose.yml ps
      - docker ps --filter name=opencti
      - docker inspect --format {{.Name}} $(docker ps -q) | grep opencti
      negative_signs:
      - opencti 매칭 없이 일반 grep
      - 필터 없이 전체 docker ps
      - 대소문자 구분 (기본)
  target_vm: siem
  script: docker ps --format '{{.Names}}\t{{.Status}}' 2>/dev/null | grep -i opencti
  risk_level: low
  bastion_prompt: siem VM에서 opencti 컨테이너만 필터링해서 보여줘
- order: 3
  instruction: OpenCTI 플랫폼 컨테이너의 최근 로그 20줄을 확인하시오.
  hint: docker logs --tail 20 opencti
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 opencti 플랫폼 컨테이너 로그 20줄을 보여줘

    📎 참고 (CLI): docker logs --tail 20 $(docker ps --format ''{{.Names}}'' | grep -i ''^opencti$'' | head
    -1) 2>&1 | tail -20'
  answer_detail: 'OpenCTI 설치·구성: OpenCTI 플랫폼 컨테이너의 최근 로그 20줄을 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'OpenCTI platform 로그 확인 — docker logs --tail 20 $(docker ps --format {{.Names}} | grep -i
        ^opencti$ | head -1) 2>&1 | tail -20. OpenCTI platform 컨테이너(주 API+UI) 로그 조회. ^opencti$ anchor
        로 정확 매칭(opencti-worker/connector 제외). stdout+stderr 합쳐(2>&1). 시작 시 INFO 다수, 안정 후 간헐적 로그. ERROR
        다수면 config 또는 dependency 이슈. 실시간 확인: docker logs -f'
      success_criteria:
      - docker logs --tail 20 실행
      - opencti 정확 매칭 ^opencti$
      - 로그 출력
      acceptable_methods:
      - docker logs --tail 20 <container>
      - docker logs --since 5m <container>
      - docker logs -f <container>(follow)
      - docker compose logs opencti
      - kubectl logs -l app=opencti (K8s)
      negative_signs:
      - container 이름 오타
      - 모든 컨테이너 로그 한번에
      - stderr 무시
  target_vm: siem
  script: docker logs --tail 20 $(docker ps --format '{{.Names}}' | grep -i '^opencti$' | head -1) 2>&1
    | tail -20
  risk_level: low
  bastion_prompt: siem VM의 opencti 플랫폼 컨테이너 로그 20줄을 보여줘
- order: 4
  instruction: OpenCTI 웹 UI 포트(8080) 가 리스닝 중인지 확인하시오.
  hint: ss -tlnp | grep 8080
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 8080 포트 리스닝 상태를 확인해줘

    📎 참고 (CLI): ss -tlnp 2>/dev/null | grep '':8080'''
  answer_detail: 'OpenCTI 설치·구성: OpenCTI 웹 UI 포트(8080) 가 리스닝 중인지 확인하시오.'
  verify:
    type: output_contains
    expect: '8080'
    field: stdout
    semantic:
      intent: 'OpenCTI 웹 포트 8080 리스닝 확인 — ss -tlnp 2>/dev/null | grep :8080. OpenCTI default HTTP port
        8080(또는 docker-compose 에서 다른 포트 매핑). LISTEN 상태 확인. Docker proxy 가 host:8080 → container:8080 포워딩
        담당. 포트 미LISTEN 시 (1) container 종료 (2) 다른 서비스 충돌 (3) compose 설정 문제. 포트 점유 프로세스: 보통 docker-proxy
        또는 opencti node.js'
      success_criteria:
      - ss -tlnp 실행
      - :8080 포트 매칭
      - LISTEN 상태 확인
      acceptable_methods:
      - ss -tlnp | grep :8080
      - netstat -tlnp | grep 8080
      - lsof -i:8080
      - curl http://localhost:8080 응답 확인
      - docker port <container> 로 매핑 확인
      negative_signs:
      - 다른 포트 확인
      - :8080 매칭 실패
      - LISTEN 외 상태(TIME_WAIT)
  target_vm: siem
  script: ss -tlnp 2>/dev/null | grep ':8080'
  risk_level: low
  bastion_prompt: siem VM에서 8080 포트 리스닝 상태를 확인해줘
- order: 5
  instruction: OpenCTI 의존 서비스(redis, elastic, rabbitmq, minio) 컨테이너 상태를 확인하시오.
  hint: docker ps | grep -E …
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 OpenCTI 의존 서비스(redis/elastic/rabbit/minio) 컨테이너 상태를 보여줘

    📎 참고 (CLI): docker ps --format ''{{.Names}}\t{{.Status}}'' 2>/dev/null | grep -Ei ''redis|elastic|rabbit|minio'''
  answer_detail: 'OpenCTI 설치·구성: OpenCTI 의존 서비스(redis, elastic, rabbitmq, minio) 컨테이너 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'OpenCTI 의존 서비스 상태 — docker ps --format {{.Names}}\t{{.Status}} | grep -Ei redis|elastic|rabbit|minio.
        OpenCTI 는 multi-service 아키텍처: Redis(cache + pub/sub), ElasticSearch(graph+search index), RabbitMQ(message
        queue for connectors), MinIO(S3-compatible object storage for files). 모두 Up 상태여야 정상 동작. 하나라도 Down
        시 platform restart/crash 유발. 의존성 실패 시 platform 로그에서 ECONNREFUSED 등 관찰'
      success_criteria:
      - grep -Ei redis elastic rabbit minio 실행
      - 최소 2개 의존 컨테이너 확인
      - Up 상태 출력
      acceptable_methods:
      - docker ps --format ... | grep -Ei redis|elastic|rabbit|minio
      - docker compose ps -a 로 전체
      - curl http://localhost:9200/_cluster/health(elastic)
      - docker exec redis redis-cli ping
      - docker exec minio mc admin info
      negative_signs:
      - 일부만 확인(모두 필요)
      - Up 아닌 상태 무시
      - regex 오타
  target_vm: siem
  script: docker ps --format '{{.Names}}\t{{.Status}}' 2>/dev/null | grep -Ei 'redis|elastic|rabbit|minio'
  risk_level: low
  bastion_prompt: siem VM에서 OpenCTI 의존 서비스(redis/elastic/rabbit/minio) 컨테이너 상태를 보여줘
- order: 6
  instruction: OpenCTI docker-compose.yml 파일 위치를 찾으시오.
  hint: find / -name docker-compose.yml 2>/dev/null | grep -i cti
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 opencti 관련 docker-compose 파일 위치를 찾아줘

    📎 참고 (CLI): find / -name ''docker-compose*.yml'' 2>/dev/null | grep -i cti | head'
  answer_detail: 'OpenCTI 설치·구성: OpenCTI docker-compose.yml 파일 위치를 찾으시오.'
  verify:
    type: output_contains
    expect: compose
    field: stdout
    semantic:
      intent: OpenCTI docker-compose.yml 위치 탐색 — find / -name docker-compose*.yml 2>/dev/null | grep -i
        cti | head. OpenCTI 설치 경로가 환경마다 다름(/opt/opencti, /home/user/opencti, /srv/opencti 등). find 로 전체
        파일시스템 스캔, grep 로 cti 관련만. 찾은 후 해당 디렉토리에서 docker compose up/down/logs 실행. 2>/dev/null 로 permission
        denied 노이즈 숨김
      success_criteria:
      - find + grep 실행
      - compose 파일 경로 출력
      - cti 관련 결과
      acceptable_methods:
      - find / -name docker-compose*.yml 2>/dev/null | grep cti
      - locate docker-compose | grep opencti
      - ps auxf | grep docker-compose 로 실행 중인 파일 경로
      - systemctl cat opencti (service 파일 경로 확인)
      - docker inspect --format {{.Config.Labels}} opencti
      negative_signs:
      - find / 전체 스캔 너무 느림(권한 많은 디렉토리)
      - compose 확장자(yaml) 놓침
      - permission denied 출력 노출
  target_vm: siem
  script: find / -name 'docker-compose*.yml' 2>/dev/null | grep -i cti | head
  risk_level: low
  bastion_prompt: siem VM에서 opencti 관련 docker-compose 파일 위치를 찾아줘
- order: 7
  instruction: localhost:8080 에 HTTP 요청을 보내 응답 코드를 확인하시오.
  hint: curl -w '%{http_code}' http://localhost:8080
  category: verify
  points: 10
  answer: '🤖 프롬프트: siem VM에서 http://localhost:8080 에 curl 요청을 보내 응답 코드를 보여줘

    📎 참고 (CLI): curl -sS -o /dev/null -w ''%{http_code}\n'' http://localhost:8080'
  answer_detail: 'OpenCTI 설치·구성: localhost:8080 에 HTTP 요청을 보내 응답 코드를 확인하시오.'
  verify:
    type: output_contains
    expect:
    - '200'
    - HTTP
    - OpenCTI
    - localhost
    - '8080'
    field: stdout
    semantic:
      intent: 'OpenCTI UI HTTP 응답 확인 — curl -sS -o /dev/null -w %{http_code}\n http://localhost:8080.
        200 OK 응답이면 platform UI 서빙 정상, 302 Redirect 는 login page 로 리다이렉트(정상). 5xx 는 backend 오류(ElasticSearch
        등). Connection refused 는 container down. -sS 로 progress 숨김 + error 만. %{http_code} 로 응답 코드만 추출.
        브라우저 접근: http://<siem-ip>:8080'
      success_criteria:
      - curl http://localhost:8080 실행
      - HTTP 응답 코드 출력
      - '%{http_code} 포맷'
      acceptable_methods:
      - curl -sS -o /dev/null -w %{http_code} http://localhost:8080
      - curl -v http://localhost:8080 (상세)
      - curl --resolve 로 hostname 테스트
      - wget -qO- http://localhost:8080/graphql(API endpoint)
      - docker exec opencti curl -v localhost:4000(내부)
      negative_signs:
      - 응답 코드 확인 없음
      - HTTPS 로 요청(HTTP 포트)
      - Connection refused 무시
  target_vm: siem
  script: curl -sS -o /dev/null -w '%{http_code}\n' http://localhost:8080
  risk_level: low
  bastion_prompt: siem VM에서 http://localhost:8080 에 curl 요청을 보내 응답 코드를 보여줘
- order: 8
  instruction: OpenCTI 플랫폼 컨테이너에서 'ERROR' 로그를 최근 50줄에서 카운트하시오.
  hint: docker logs … | grep ERROR
  category: analysis
  points: 10
  answer: '🤖 프롬프트: siem VM opencti 플랫폼 로그에서 ERROR 횟수를 세어줘

    📎 참고 (CLI): docker logs --tail 50 $(docker ps --format ''{{.Names}}'' | grep -i ''^opencti$'' | head
    -1) 2>&1 | grep -c ERROR'
  answer_detail: 'OpenCTI 설치·구성: OpenCTI 플랫폼 컨테이너에서 ''ERROR'' 로그를 최근 50줄에서 카운트하시오.'
  verify:
    type: output_contains
    expect:
    - ERROR
    - docker
    - logs
    - opencti
    - count
    field: stdout
    semantic:
      intent: 'ERROR 로그 카운트 — docker logs --tail 50 <opencti container> 2>&1 | grep -c ERROR. 최근 50 라인
        중 ERROR 발생 빈도. 0 또는 낮은 수 = 정상, 지속적 증가 = 설정/환경 문제. grep -c 는 매칭 라인 수 출력. 주요 ERROR 패턴: ECONNREFUSED(의존성
        fail), UnhandledPromiseRejection, Elasticsearch connection failed. 이후 상세 분석: docker logs | grep
        -A 5 ERROR'
      success_criteria:
      - docker logs + grep -c ERROR 실행
      - ERROR 카운트 숫자 출력
      - 50 라인 범위
      acceptable_methods:
      - docker logs --tail 50 <container> 2>&1 | grep -c ERROR
      - docker logs --since 1h 2>&1 | grep -c ERROR
      - docker logs | grep -iE error|critical|fatal
      - Elastic Kibana 또는 Loki 로 중앙 집계
      - Prometheus docker exporter + alert
      negative_signs:
      - --tail 없이 전체 로그
      - ERROR 외 WARN 혼동
      - 0 카운트 아닌데 정상 판정
  target_vm: siem
  script: docker logs --tail 50 $(docker ps --format '{{.Names}}' | grep -i '^opencti$' | head -1) 2>&1
    | grep -c ERROR
  risk_level: low
  bastion_prompt: siem VM opencti 플랫폼 로그에서 ERROR 횟수를 세어줘
- order: 9
  instruction: 컨테이너별 CPU/Memory 사용량(docker stats --no-stream)을 조회하시오.
  hint: docker stats --no-stream
  category: analysis
  points: 10
  answer: '🤖 프롬프트: siem VM의 docker stats로 컨테이너별 CPU/메모리 사용량을 보여줘

    📎 참고 (CLI): docker stats --no-stream --format ''{{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}'' 2>/dev/null
    | head'
  answer_detail: 'OpenCTI 설치·구성: 컨테이너별 CPU/Memory 사용량(docker stats --no-stream)을 조회하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'docker stats 컨테이너 리소스 현황 — docker stats --no-stream --format {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}
        | head. --no-stream 으로 1회 snapshot 만(연속 업데이트 회피). OpenCTI stack 은 메모리 집약적: ElasticSearch(4GB+),
        RabbitMQ(1GB), platform(2GB+), MinIO(512MB), Redis(256MB). 합계 host 자원의 주의. CPU% 는 평상시 낮음, 이벤트
        발생 시 스파이크'
      success_criteria:
      - docker stats --no-stream 실행
      - CPU·메모리 정보 출력
      - 컨테이너별 구분
      acceptable_methods:
      - docker stats --no-stream --format Table ...
      - docker stats <container> 특정
      - cat /sys/fs/cgroup/memory/docker/.../memory.usage_in_bytes
      - systemctl status docker 로 전체 리소스
      - Prometheus cadvisor 로 시계열 모니터링
      negative_signs:
      - --no-stream 없이 인터랙티브 모드
      - format 없이 wide 출력
      - 컨테이너 구분 없음
  target_vm: siem
  script: docker stats --no-stream --format '{{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}' 2>/dev/null | head
  risk_level: low
  bastion_prompt: siem VM의 docker stats로 컨테이너별 CPU/메모리 사용량을 보여줘
- order: 10
  instruction: OpenCTI 재기동이 필요하지 않은지 컨테이너 재시작 횟수를 확인하시오.
  hint: docker inspect … RestartCount
  category: verify
  points: 10
  answer: '🤖 프롬프트: siem VM의 opencti 컨테이너 재시작 횟수를 확인해줘

    📎 참고 (CLI): docker inspect $(docker ps --format ''{{.Names}}'' | grep -i opencti | head -1) --format
    ''{{.RestartCount}}'' 2>/dev/null'
  answer_detail: 'OpenCTI 설치·구성: OpenCTI 재기동이 필요하지 않은지 컨테이너 재시작 횟수를 확인하시오.'
  verify:
    type: output_contains
