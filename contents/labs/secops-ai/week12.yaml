lab_id: secops-ai-week12
title: OpenCTI 설치·구성 (AI 지원)
version: ai
course: secops-ai
week: 12
description: siem에 배포된 OpenCTI 컨테이너 구성·초기 상태·포트를 확인한다.
difficulty: easy
duration_minutes: 90
objectives:
- docker 기반 OpenCTI 구성을 확인한다
- OpenCTI 컨테이너 상태와 포트(8080)를 점검한다
- 초기 로그에서 에러가 없는지 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM에서 docker compose로 관리되는 컨테이너 목록을 확인하시오.
  hint: docker ps
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 docker 컨테이너 목록을 보여줘

    📎 참고 (CLI): docker ps --format ''{{.Names}}\t{{.Status}}'' 2>/dev/null | head'
  answer_detail: 'OpenCTI 설치·구성: siem VM에서 docker compose로 관리되는 컨테이너 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: opencti
    field: stdout
    semantic:
      intent: 'docker ps 컨테이너 전체 목록 — docker ps --format {{.Names}}\t{{.Status}} | head. Running 상태의 모든
        컨테이너 표시. OpenCTI 스택은 여러 컨테이너: opencti(platform), opencti-redis, opencti-elastic, opencti-rabbitmq,
        opencti-minio, opencti-worker, opencti-connector-*. --format 으로 tab 구분 출력(깔끔), head 로 처음 10개만.
        전체 확인: docker ps -a(exited 포함)'
      success_criteria:
      - docker ps 실행
      - 컨테이너 이름·상태 출력
      - opencti 관련 포함
      acceptable_methods:
      - docker ps --format {{.Names}}\t{{.Status}}
      - docker ps -a (전체)
      - docker compose ps(compose 관리)
      - docker inspect 로 단일 컨테이너 상세
      - kubectl get pods(K8s 환경)
      - |
        **[OSS] docker ps + format (표준)** — 컨테이너 상태 진단.
          # 1. 실행 중 컨테이너
          docker ps --format '{{.Names}}\t{{.Status}}\t{{.Image}}' | head
          # 2. 전체 (exited 포함)
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.RunningFor}}'
          # 3. compose 프로젝트 별
          cd /opt/opencti && docker compose ps
          # 4. health 상태 추가
          docker ps --format '{{.Names}}\t{{.Status}}\t{{.Ports}}'
        예상 출력 `opencti  Up 2 days (healthy)  0.0.0.0:8080->8080/tcp / opencti-redis  Up 2 days  6379/tcp`.
        운영 해석: Up 외 (Restarting / Exited) = 즉시 진단. (healthy) = healthcheck 통과. 시간 = uptime.
      - |
        **[OSS] Portainer (Docker GUI)** — 운영자 표준.
          # 1. Portainer 설치
          docker run -d -p 9443:9443 --name portainer \
              --restart=always \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v portainer_data:/data \
              portainer/portainer-ce:latest
          # 2. https://10.20.30.100:9443 접속
          # 3. UI:
          # - Container 목록 + 상태
          # - 단일 클릭 → logs / stats / inspect
          # - 시작/중지/재시작 버튼
          # - Stack (compose) 관리
        UI 동작: Docker 환경 통합 GUI. CLI 없이 운영 가능.
        운영 해석: SOC NOC 표준. 다중 host 관리.
      - |
        **[OSS] lazydocker (terminal TUI)** — 가벼운 GUI.
          # 1. 설치
          curl https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash
          # 2. 실행
          lazydocker
          # 3. UI:
          # - 좌측: 컨테이너/Image/Volume 트리
          # - 우측: logs/stats/info tab
          # - 키보드: r=restart / d=stop / s=start
        UI 동작: ncurses TUI. SSH 환경에서도 사용.
        운영 해석: Portainer 가 안 되는 air-gap 환경. 터미널 친화.
      - |
        **[OSS] docker compose (multi-container)** — Stack 관리.
          # 1. compose 파일 위치 찾기
          find / -name "docker-compose*.yml" 2>/dev/null | grep -i opencti | head
          # 2. compose 디렉토리에서 ps
          cd /opt/opencti
          docker compose ps
          docker compose top   # 프로세스 정보
          # 3. service 별 logs
          docker compose logs opencti --tail 20
          docker compose logs --follow worker
        예상 출력 `NAME COMMAND SERVICE STATUS PORTS / opencti-platform Up 2 days opencti running 0.0.0.0:8080->8080/tcp`.
        운영 해석: docker compose = stack 단위 관리. 단일 컨테이너 docker ps 보다 의도 명확.
      - |
        **[OSS] cAdvisor (Container metrics)** — Prometheus 통합.
          # 1. cAdvisor 설치
          docker run -d --name=cadvisor \
              -p 8085:8080 \
              -v /var/run:/var/run:ro \
              -v /sys:/sys:ro \
              -v /var/lib/docker:/var/lib/docker:ro \
              gcr.io/cadvisor/cadvisor:latest
          # 2. http://localhost:8085 접속
          # - 컨테이너별 CPU/Memory/Network/Disk
          # 3. Prometheus scrape (자동)
          curl -s http://localhost:8085/metrics | grep -E "container_cpu|container_memory" | head
        UI 동작: 실시간 metric dashboard.
        운영 해석: 100+ 컨테이너 운영 환경 표준. Prometheus + Grafana 통합.
      negative_signs:
      - running 외 포함하여 혼동
      - format 없이 긴 출력
      - head 누락
  target_vm: siem
  script: docker ps --format '{{.Names}}\t{{.Status}}' 2>/dev/null | head
  risk_level: low
  bastion_prompt: siem VM의 docker 컨테이너 목록을 보여줘
- order: 2
  instruction: opencti 관련 컨테이너만 필터링하시오.
  hint: docker ps | grep opencti
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 opencti 컨테이너만 필터링해서 보여줘

    📎 참고 (CLI): docker ps --format ''{{.Names}}\t{{.Status}}'' 2>/dev/null | grep -i opencti'
  answer_detail: 'OpenCTI 설치·구성: opencti 관련 컨테이너만 필터링하시오.'
  verify:
    type: output_contains
    expect: opencti
    field: stdout
    semantic:
      intent: 'OpenCTI 컨테이너 필터링 — docker ps --format {{.Names}}\t{{.Status}} | grep -i opencti. OpenCTI
        스택 관련 컨테이너 명시적 확인 - 이름에 opencti prefix 가진 여러 컨테이너(platform, worker, connector-*, depedencies).
        grep -i 로 대소문자 무시. 각 컨테이너 Up 상태인지·restarting 여부 확인. 이름 pattern: opencti-<role>(docker-compose
        로 자동 생성)'
      success_criteria:
      - grep -i opencti 필터링
      - opencti 문자열 매칭
      - 컨테이너 목록 출력
      acceptable_methods:
      - docker ps --format {{.Names}}\t{{.Status}} | grep -i opencti
      - docker compose -f docker-compose.yml ps
      - docker ps --filter name=opencti
      - docker inspect --format {{.Name}} $(docker ps -q) | grep opencti
      - |
        **[OSS] docker ps --filter** — 컨테이너 정밀 필터.
          # 1. name 필터
          docker ps --filter name=opencti --format 'table {{.Names}}\t{{.Status}}'
          # 2. label 필터 (compose project 단위)
          docker ps --filter "label=com.docker.compose.project=opencti"
          # 3. health 상태 필터
          docker ps --filter health=healthy
          # 4. status 필터
          docker ps --filter status=running --filter name=opencti
        예상 출력 `NAMES STATUS / opencti Up 2 days (healthy) / opencti-redis Up 2 days / opencti-elastic Up 2 days`.
        운영 해석: --filter = grep 보다 정확. label 필터 = compose project 통합.
      - |
        **[OSS] docker compose ps** — stack 단위.
          # 1. compose 디렉토리에서
          cd /opt/opencti
          docker compose ps
          # 2. 모든 서비스 (running + stopped)
          docker compose ps -a
          # 3. JSON 출력 (자동화)
          docker compose ps --format json | jq
          # 4. 특정 service 만
          docker compose ps opencti redis
        예상 출력 `NAME SERVICE STATUS PORTS / opencti-platform-1 opencti running 0.0.0.0:8080->8080`.
        운영 해석: compose project 의 *모든* 서비스 통합 view. 단일 docker ps 보다 의도 명확.
      - |
        **[OSS] grep + sort 조합** — 분석.
          # 1. opencti 관련 컨테이너 + 상태
          docker ps --format '{{.Names}}\t{{.Status}}' | grep -i opencti | sort
          # 2. 컨테이너 수 카운트
          docker ps --format '{{.Names}}' | grep -c -i opencti
          # 3. 상태별 분류
          docker ps --format '{{.Names}}\t{{.Status}}' | grep -i opencti | awk '{print $2}' | sort | uniq -c
          # 4. unhealthy 만
          docker ps --format '{{.Names}}\t{{.Status}}' | grep -E "opencti.*unhealthy"
        예상 출력 `8 opencti containers / 8 Up`.
        운영 해석: 단순 grep 외 통계 + 분류. 운영 KPI 측정.
      - |
        **[OSS] watch + docker ps (실시간)** — 모니터링.
          # 1. 1초 간격 watch
          watch -n 1 'docker ps --format "{{.Names}}\t{{.Status}}" | grep -i opencti'
          # 2. status 변화 감지
          watch -d 'docker ps --filter name=opencti --format "{{.Names}} {{.Status}}"'
          # -d = 변경 highlight
          # 3. health check 실시간
          watch -n 5 'docker inspect --format "{{.Name}} {{.State.Health.Status}}" $(docker ps -q --filter name=opencti)'
        UI 동작: 실시간 컨테이너 상태 추적.
        운영 해석: restart loop / health degradation 즉시 인지.
      - |
        **[OSS] Portainer GUI 필터** — 시각적.
          # 1. https://10.20.30.100:9443 → Containers
          # 2. UI 검색 box: opencti
          # 3. 결과 표:
          # - Name / Status / Ports / Image / Created
          # - 정렬 (column 클릭)
          # - bulk action (start/stop/restart 다중 선택)
          # 4. label 필터: com.docker.compose.project = opencti
        UI 동작: 시각적 필터 + bulk action.
        운영 해석: CLI 보다 빠른 운영 + 다중 컨테이너 동시 관리.
      negative_signs:
      - opencti 매칭 없이 일반 grep
      - 필터 없이 전체 docker ps
      - 대소문자 구분 (기본)
  target_vm: siem
  script: docker ps --format '{{.Names}}\t{{.Status}}' 2>/dev/null | grep -i opencti
  risk_level: low
  bastion_prompt: siem VM에서 opencti 컨테이너만 필터링해서 보여줘
- order: 3
  instruction: OpenCTI 플랫폼 컨테이너의 최근 로그 20줄을 확인하시오.
  hint: docker logs --tail 20 opencti
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 opencti 플랫폼 컨테이너 로그 20줄을 보여줘

    📎 참고 (CLI): docker logs --tail 20 $(docker ps --format ''{{.Names}}'' | grep -i ''^opencti$'' | head
    -1) 2>&1 | tail -20'
  answer_detail: 'OpenCTI 설치·구성: OpenCTI 플랫폼 컨테이너의 최근 로그 20줄을 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'OpenCTI platform 로그 확인 — docker logs --tail 20 $(docker ps --format {{.Names}} | grep -i
        ^opencti$ | head -1) 2>&1 | tail -20. OpenCTI platform 컨테이너(주 API+UI) 로그 조회. ^opencti$ anchor
        로 정확 매칭(opencti-worker/connector 제외). stdout+stderr 합쳐(2>&1). 시작 시 INFO 다수, 안정 후 간헐적 로그. ERROR
        다수면 config 또는 dependency 이슈. 실시간 확인: docker logs -f'
      success_criteria:
      - docker logs --tail 20 실행
      - opencti 정확 매칭 ^opencti$
      - 로그 출력
      acceptable_methods:
      - docker logs --tail 20 <container>
      - docker logs --since 5m <container>
      - docker logs -f <container>(follow)
      - docker compose logs opencti
      - kubectl logs -l app=opencti (K8s)
      - |
        **[OSS] docker logs (표준)** — 단일 컨테이너 분석.
          # 1. tail
          docker logs --tail 20 opencti 2>&1 | tail -20
          # 2. 시간 범위
          docker logs --since 5m opencti
          docker logs --since 2026-05-06T10:00:00 opencti
          # 3. 실시간 follow
          docker logs -f opencti
          # 4. 라인 카운트
          docker logs --tail 100 opencti 2>&1 | wc -l
        예상 출력 `2026-05-06T14:23 INFO Server listening on port 4000 / Connected to Redis`.
        운영 해석: --since = 시간 기반. -f = realtime. 2>&1 = stdout + stderr 통합.
      - |
        **[OSS] docker compose logs (multi-service)** — stack.
          # 1. compose 의 모든 서비스 통합
          cd /opt/opencti && docker compose logs --tail 20
          # 2. 특정 서비스 만
          docker compose logs opencti --tail 50
          # 3. multi-service 동시
          docker compose logs opencti redis elastic
          # 4. 시간 표시 + 색상
          docker compose logs --timestamps --no-log-prefix opencti
        예상 출력 `opencti  | 2026-05-06T14:23 INFO ... / opencti-redis  | 1:M 06 May 14:23 ...`.
        운영 해석: 다중 서비스 동시 추적. service 별 prefix 자동.
      - |
        **[OSS] dozzle (web log viewer)** — GUI.
          # 1. Dozzle 설치
          docker run -d --name=dozzle \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -p 9999:8080 \
              amir20/dozzle:latest
          # 2. http://localhost:9999 접속
          # 3. UI:
          # - 컨테이너 목록 + 검색
          # - 단일 컨테이너 → realtime logs
          # - search box (in-log search)
          # - level filter (ERROR/WARN/INFO)
          # 4. multi-container 비교 view
        UI 동작: web 기반 log viewer. portainer 의 logs 만 특화.
        운영 해석: 다중 컨테이너 동시 모니터링. SOC 분석가 친화.
      - |
        **[OSS] lnav (log analysis)** — terminal TUI.
          # 1. 컨테이너 logs 를 lnav 로
          docker logs opencti 2>&1 | sudo tee /tmp/opencti.log
          sudo lnav /tmp/opencti.log
          # 2. 자동 timestamp 파싱 + level highlight
          # 3. SQL query
          # :;SELECT count(*), log_level FROM logline GROUP BY log_level
          # 4. 검색
          # /ERROR
        UI 동작: ncurses + SQL query.
        운영 해석: 다량 log 분석 표준. JSON 자동 파싱 + 시간 분포.
      - |
        **[OSS] Loki + Grafana (log aggregation)** — enterprise.
          # 1. Promtail 로 Docker logs → Loki
          # /etc/promtail/config.yml:
          # scrape_configs:
          # - job_name: docker
          #   docker_sd_configs:
          #   - host: unix:///var/run/docker.sock
          # 2. Loki 적재
          docker run -d --name=loki -p 3100:3100 grafana/loki:latest
          # 3. Grafana 의 Loki datasource
          # LogQL: {container="opencti"} |= "ERROR"
        UI 동작: 다중 host 의 모든 컨테이너 log 통합.
        운영 해석: enterprise 표준. ELK 의 Prometheus 생태계 대안.
      negative_signs:
      - container 이름 오타
      - 모든 컨테이너 로그 한번에
      - stderr 무시
  target_vm: siem
  script: docker logs --tail 20 $(docker ps --format '{{.Names}}' | grep -i '^opencti$' | head -1) 2>&1
    | tail -20
  risk_level: low
  bastion_prompt: siem VM의 opencti 플랫폼 컨테이너 로그 20줄을 보여줘
- order: 4
  instruction: OpenCTI 웹 UI 포트(8080) 가 리스닝 중인지 확인하시오.
  hint: ss -tlnp | grep 8080
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 8080 포트 리스닝 상태를 확인해줘

    📎 참고 (CLI): ss -tlnp 2>/dev/null | grep '':8080'''
  answer_detail: 'OpenCTI 설치·구성: OpenCTI 웹 UI 포트(8080) 가 리스닝 중인지 확인하시오.'
  verify:
    type: output_contains
    expect: '8080'
    field: stdout
    semantic:
      intent: 'OpenCTI 웹 포트 8080 리스닝 확인 — ss -tlnp 2>/dev/null | grep :8080. OpenCTI default HTTP port
        8080(또는 docker-compose 에서 다른 포트 매핑). LISTEN 상태 확인. Docker proxy 가 host:8080 → container:8080 포워딩
        담당. 포트 미LISTEN 시 (1) container 종료 (2) 다른 서비스 충돌 (3) compose 설정 문제. 포트 점유 프로세스: 보통 docker-proxy
        또는 opencti node.js'
      success_criteria:
      - ss -tlnp 실행
      - :8080 포트 매칭
      - LISTEN 상태 확인
      acceptable_methods:
      - ss -tlnp | grep :8080
      - netstat -tlnp | grep 8080
      - lsof -i:8080
      - curl http://localhost:8080 응답 확인
      - docker port <container> 로 매핑 확인
      - |
        **[OSS] ss + lsof (포트 진단)** — 표준.
          # 1. ss 로 LISTEN 상태
          sudo ss -tlnp | grep ':8080'
          # 2. lsof 로 프로세스 상세
          sudo lsof -i :8080 -P -n
          # 3. 활성 connection 카운트 (active session)
          sudo ss -tn 'sport = :8080' | wc -l
          # 4. listen 주소 (0.0.0.0 vs 127.0.0.1)
          sudo ss -tlnp | awk '$5 ~ /:8080/ {print $5}'
        예상 출력 `LISTEN 0:8080 docker-proxy / docker-proxy 12345 root TCP *:8080 (LISTEN)`.
        운영 해석: docker-proxy = 호스트 → 컨테이너 포트 포워딩. *:8080 = 외부 접근. 127.0.0.1:8080 = 로컬만.
      - |
        **[OSS] docker port (포트 매핑)** — 컨테이너 매핑.
          # 1. 단일 컨테이너 포트 매핑
          docker port opencti
          # 2. inspect 로 상세 매핑
          docker inspect opencti --format '{{range $p, $conf := .NetworkSettings.Ports}}{{$p}} -> {{(index $conf 0).HostPort}}{{"\n"}}{{end}}'
          # 3. compose 의 service 매핑
          cd /opt/opencti && docker compose port opencti 8080
          # 4. 모든 컨테이너의 포트 매핑
          docker ps --format 'table {{.Names}}\t{{.Ports}}'
        예상 출력 `8080/tcp -> 0.0.0.0:8080`.
        운영 해석: container:8080 → host:8080 매핑. host 의 ss 와 일치 검증.
      - |
        **[OSS] curl health check** — application layer.
          # 1. HTTP 응답
          curl -sS -o /dev/null -w "Status: %{http_code} / Time: %{time_total}s\n" http://localhost:8080
          # 2. health endpoint (있는 경우)
