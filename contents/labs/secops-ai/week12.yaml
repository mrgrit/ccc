    type: output_contains
    expect: opencti
    field: stdout
    semantic:
      intent: 'SecOps w12 s1 — siem VM에서 docker compose로 관리되는 컨테이너 목록을 확인하시오. (cmd: docker ps --format ''{{.Names}}\t{{.Status}}''
        2>/dev/null | head)'
