            "id": "indicator--$(uuidgen)",
            "created": "2026-05-01T00:00:00.000Z",
            "modified": "2026-05-01T00:00:00.000Z",
            "name": "Ransomware EXE hash",
            "description": "Hash of WannaCry sample (EICAR-style test, 무해)",
            "indicator_types": ["malicious-activity"],
            "pattern": "[file:hashes.'SHA-256' = '275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f']",
            "pattern_type": "stix",
            "valid_from": "2026-05-01T00:00:00.000Z"
          }
        ]
      }
      EOF

      # uuidgen 치환 (uuidgen 명령 없으면 python3 -c 'import uuid; print(uuid.uuid4())' 으로)
      python3 -c "
      import json, uuid
      with open('/tmp/stix-import/3-iocs.json') as f:
          content = f.read()
      lines = content.split('\\n')
      for i, l in enumerate(lines):
          if '\$(uuidgen)' in l:
              lines[i] = l.replace('\$(uuidgen)', str(uuid.uuid4()))
      open('/tmp/stix-import/3-iocs.json', 'w').write('\\n'.join(lines))
      "
      cat /tmp/stix-import/3-iocs.json | python3 -m json.tool | head -10
      ```

    ▶ Phase B — OpenCTI REST API 으로 import (10분)

    OpenCTI 의 admin token 확인 (이미 .env 에 있음):
      `ssh ccc@10.20.30.100 'sudo grep -E ^OPENCTI_ADMIN_TOKEN /opt/opencti/.env'`
    → token 값 메모.

    `OPENCTI_TOKEN=<token>` export 후 STIX bundle import:
      ```
      OPENCTI_TOKEN="<위에서 얻은 token>"
      curl -X POST 'http://10.20.30.100:8080/graphql' \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d "$(cat <<EOF
      {
        "query": "mutation StixBundleImport(\$file: Upload!) { stixCoreObjectsExportPush(file: \$file) { name } }",
        "variables": null
      }
      EOF
      )"
      ```

    또는 단순화 — UI 의 *Data → Import* 메뉴 흉내 (CSV 같은 한 line) :
      ```
      curl -X POST 'http://10.20.30.100:8080/graphql' \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{
          "query": "mutation { indicatorAdd(input: {name: \\"Malicious IP test\\", pattern: \\"[ipv4-addr:value = $\\\\\\"198.51.100.66$\\\\\\"]\\", pattern_type: \\"stix\\", x_opencti_main_observable_type: \\"IPv4-Addr\\"}) { id name } }"
        }'
      ```
    → 예상: id 와 name 이 응답에.

    ▶ Phase C — 검색 + 회고 + 정리 (5분)

    OpenCTI 에서 등록된 indicator 검색:
      ```
      curl -X POST 'http://10.20.30.100:8080/graphql' \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{"query": "{ indicators(first: 5, search: \\"Malicious IP test\\") { edges { node { id name pattern } } } }"}' \
        | jq .
      ```
    → 예상: edges 에 작성한 indicator.

    1~2 단락 회고:
    1. **STIX 2.1 의 핵심 객체** — bundle 로 묶인 indicator/observable. pattern 이 STIX 패턴 표준
    2. **TAXII vs 직접 import** — TAXII 는 STIX 의 *전송 프로토콜* (HTTP poll/push). 본 lab 은
       직접 graphql + REST. 운영 시 Connector 가 TAXII 자동 polling
    3. **운영 시 IoC volume** — 하루 수천~수만 IoC. *수동 작성은 비현실* — 그래서 Connector 자동화

    종료 정리: lab 변경 없음 (OpenCTI 에 indicator 남음). 또는 admin UI 에서 수동 삭제:
      `curl -X POST '...' -d '{"query": "mutation { indicatorDelete(id: \"...\") }"}'`
