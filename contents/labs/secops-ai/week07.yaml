lab_id: secops-ai-week07
title: Apache + ModSecurity WAF (AI 지원)
version: ai
course: secops-ai
week: 7
description: web VM의 Apache + ModSecurity WAF 구성을 점검하고 CRS 룰로 SQLi/XSS 탐지가 작동하는지 검증한다.
difficulty: medium
duration_minutes: 120
objectives:
- ModSecurity의 기본 구성·엔진 on/off·감사 로그 위치를 확인한다
- OWASP CRS 룰로 SQLi/XSS 차단을 테스트한다
- /var/log/apache2/modsec_audit.log 에서 차단 기록을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web VM에서 Apache + ModSecurity가 동작 중인지 확인하시오.
  hint: apachectl -M | grep -i security
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM의 Apache에 ModSecurity 모듈이 로드됐는지 확인해줘

    📎 참고 (CLI): apachectl -M 2>/dev/null | grep -i security'
  answer_detail: 'Apache + ModSecurity WAF: web VM에서 Apache + ModSecurity가 동작 중인지
    확인하시오.'
  verify:
    type: output_contains
    expect: security
    field: stdout
    semantic:
      intent: Apache ModSecurity 모듈 로드 확인 — apachectl -M 2>/dev/null | grep -i security.
        security2_module (shared) 출력 시 ModSecurity v2 로드됨, unique_id_module 등 연관 모듈도
        확인 가능. libapache2-mod-security2 패키지 필수. Nginx 는 ModSecurity v3 + ngx_http_modsecurity_module
        별도 컴파일 필요. ModSecurity 3 (libmodsecurity) 가 최신이지만 v2 가 여전히 운영 환경 주류
      success_criteria:
      - apachectl -M 실행
      - security2_module 또는 security 키워드 포함
      - grep 결과 출력
      acceptable_methods:
      - apachectl -M | grep security
      - apache2ctl -M | grep security
      - httpd -M 2>&1 | grep security(CentOS)
      - ls /etc/apache2/mods-enabled/security2.*
      - dpkg -l | grep libapache2-mod-security
      - |
        **[OSS] apachectl -M (모듈 목록)** — Apache 표준 진단.
          # 1. 로드된 모든 모듈
          sudo apachectl -M 2>&1 | head -20
          # 2. ModSecurity 만 grep
          sudo apachectl -M 2>&1 | grep -i security
          # 3. shared vs static 구분
          sudo apachectl -M 2>&1 | grep "(shared)"
          # 4. 모듈 의존성 dump
          sudo apachectl -t -D DUMP_INCLUDES 2>&1 | grep -i security
        예상 출력 `security2_module (shared)` (ModSec v2 정상 로드).
        운영 해석: shared = 동적 로드 (정상). static (없음) = 컴파일 통합. ModSec 미로드 시 패키지 + a2enmod 검사.
      - |
        **[OSS] wafw00f (외부 black-box 검증)** — 침투테스터 표준.
          # 1. WAF fingerprinting
          wafw00f http://10.20.30.80
          # 2. 다중 URL 테스트
          for path in / /login /admin; do
              wafw00f "http://10.20.30.80$path"
          done
          # 3. verbose (어떤 패턴으로 식별했는지)
          wafw00f -v http://10.20.30.80
        예상 출력 `The site is behind a Apache (Apache Software Foundation) / The site appears to be behind a WAF`.
        운영 해석: 외부에서 본 WAF 탐지. wafw00f 가 응답 헤더 + 차단 패턴으로 fingerprint. ModSec 식별되면 운영 시 expose 줄여야 (Server 헤더 hide).
      - |
        **[OSS] curl 응답 헤더 분석** — Server 헤더 + 차단 응답.
          # 1. Server 헤더 + 정상 응답
          curl -sI http://10.20.30.80/ | head
          # 2. ModSec 차단 응답 (악성 payload 시 추가 헤더)
          curl -sI 'http://10.20.30.80/?id=1+UNION+SELECT' | head
          # 3. Server 헤더 hide 검증 (보안 권장: ServerTokens Prod)
          curl -sI http://10.20.30.80/ | grep -i server
        예상 출력 `Server: Apache/2.4.41 (Ubuntu) / X-Mod-Security: drop` (차단 시 추가 헤더).
        운영 해석: Server 헤더 = 침투 정보 노출. `ServerTokens Prod` 설정으로 `Apache` 만 표시. ModSec 차단 응답에 X-* 헤더 추가 가능.
      - |
        **[OSS] dpkg / apt (패키지 메타정보)** — 설치 출처.
          # 1. ModSec 패키지 + 의존
          dpkg -l | grep -E "modsec|apache2"
          # 2. 설치된 파일 목록
          dpkg -L libapache2-mod-security2 | head
          # 3. 패키지 출처 (PPA / official)
          apt show libapache2-mod-security2 2>/dev/null | grep -E "Origin|Maintainer"
          # 4. 보안 패치 가능 여부
          apt list --upgradable 2>/dev/null | grep modsec
        예상 출력 `ii libapache2-mod-security2 2.9.5-1 / Origin: Debian / Maintainer: Alberto Gonzalez Iniesta`.
        운영 해석: ModSec v2 (Apache module) vs ModSec v3 (libmodsecurity, Nginx 호환). 신규 환경은 v3 권장.
      - |
        **[OSS] cockpit + apache module page** — GUI 진단.
          # 1. Cockpit 접속 (https://10.20.30.80:9090)
          # 2. 좌측 Services → apache2.service 확인
          # 3. Logs 페이지에서 ModSec 관련 메시지 검색
          sudo journalctl -u apache2 --since "1 hour ago" | grep -i modsec
          # 4. Cockpit terminal 에서 모듈 검증
          # apache2ctl -M | grep security
        UI 동작: GUI 로 service status + log 검색.
        운영 해석: GUI 운영자 표준. CLI 모르는 매니저도 빠른 진단.
      negative_signs:
      - Nginx 확인(다른 웹서버)
      - 패키지만 확인(로드 검증 없음)
      - stderr 무시로 오류 숨김
  target_vm: web
  script: apachectl -M 2>/dev/null | grep -i security
  risk_level: low
  bastion_prompt: web VM의 Apache에 ModSecurity 모듈이 로드됐는지 확인해줘
- order: 2
  instruction: modsecurity.conf 에서 SecRuleEngine 값을 확인하시오.
  hint: grep SecRuleEngine …
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM에서 ModSecurity SecRuleEngine 설정 값을 확인해줘

    📎 참고 (CLI): sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf /etc/apache2/mods-enabled/security2.conf
    2>/dev/null'
  answer_detail: 'Apache + ModSecurity WAF: modsecurity.conf 에서 SecRuleEngine 값을 확인하시오.'
  verify:
    type: output_contains
    expect: SecRuleEngine
    field: stdout
    semantic:
      intent: 'SecRuleEngine 상태 확인 — sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf
        /etc/apache2/mods-enabled/security2.conf 2>/dev/null. SecRuleEngine 3가지 값:
        On(blocking 모드, 실제 차단), DetectionOnly(탐지만 log, 통과 허용), Off(완전 비활성). Production
        deploy 절차: DetectionOnly 로 FP 튜닝 → On 전환. -H 는 matched 라인에 파일명 prefix 포함'
      success_criteria:
      - grep SecRuleEngine 실행
      - SecRuleEngine On/DetectionOnly/Off 값 출력
      - 파일 경로 포함
      acceptable_methods:
      - sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf
      - sudo grep -rE SecRuleEngine /etc/modsecurity/ /etc/apache2/
      - sudo apachectl -S 로 config dump
      - echo check | ModSecurity test-rules 스크립트
      - curl localhost/test 후 log 관찰
      - |
        **[OSS] grep (다중 파일 + line number)** — config 정밀 검색.
          # 1. 모든 ModSec 관련 파일 search
          sudo grep -rHn "SecRuleEngine" /etc/modsecurity/ /etc/apache2/
          # 2. 주석 제외 (실제 적용 라인만)
          sudo grep -rHn -v "^\s*#" /etc/modsecurity/ /etc/apache2/ 2>/dev/null | grep "SecRuleEngine"
          # 3. 중복 정의 check (마지막 값이 우선 적용)
          sudo grep -rHn "^SecRuleEngine" /etc/modsecurity/ /etc/apache2/
        예상 출력 `/etc/modsecurity/modsecurity.conf:7: SecRuleEngine On`.
        운영 해석: 다중 파일에 정의 시 *마지막 로드된 라인* 적용. apache2.conf → modsecurity.conf → security2.conf 순.
      - |
        **[OSS] apachectl -t -D DUMP_RUN_CFG (런타임 적용 config)** — 진실의 단일 출처.
          # 1. 런타임 적용된 directive 만 dump
          sudo apachectl -t -D DUMP_RUN_CFG 2>&1 | grep -i SecRuleEngine
          # 2. 모든 IfModule + Include 처리 후 최종 config
          sudo apachectl -t -D DUMP_VHOSTS
          # 3. config 파일 syntax 검증
          sudo apachectl configtest
        예상 출력 `SecRuleEngine On / Syntax OK`.
        운영 해석: grep 은 텍스트, apachectl -D 는 *런타임* 적용. IfModule directive 가 중간에 비활성 시 grep 으로 못 잡음.
      - |
        **[OSS] ModSec 자체 status page (mod_status)** — 런타임 검증.
          # 1. mod_status 활성화 (한 번만 설정)
          sudo a2enmod status
          # 2. /etc/apache2/mods-enabled/status.conf 에 ExtendedStatus On 추가
          sudo systemctl reload apache2
          # 3. localhost 에서 status 페이지 접근
          curl -s "http://localhost/server-status?auto" | head
          # 4. ModSec 자체 status (community module)
          curl -s "http://localhost/modsec-status"
        UI 동작: server-status 페이지에 active connection / request rate / module 상태.
        운영 해석: production 모니터링 표준. RequestsPerSecond / BusyWorkers 추적.
      - |
        **[OSS] Ansible (SecRuleEngine IaC)** — 자동 설정.
          # playbook
          - name: Set ModSecurity to On
            ansible.builtin.lineinfile:
              path: /etc/modsecurity/modsecurity.conf
              regexp: '^SecRuleEngine\s+'
              line: 'SecRuleEngine On'
              backup: yes
              validate: 'apache2ctl -t'
            notify: restart apache2
          handlers:
            - name: restart apache2
              ansible.builtin.systemd:
                name: apache2
                state: restarted
          # 실행
          ansible-playbook -i inventory.yml modsec-config.yml --diff
        예상 출력 `changed: [web] / -SecRuleEngine DetectionOnly / +SecRuleEngine On`.
        운영 해석: validate = 잘못된 syntax 적용 후 service 다운 방지. backup 으로 즉시 롤백.
      - |
        **[OSS] etckeeper (config 변경 audit)** — git history.
          # 1. 변경 전 commit
          sudo etckeeper commit "before SecRuleEngine change"
          # 2. 변경
          sudo sed -i 's/SecRuleEngine DetectionOnly/SecRuleEngine On/' /etc/modsecurity/modsecurity.conf
          sudo systemctl restart apache2
          # 3. 변경 후 commit
          sudo etckeeper commit "SecRuleEngine: DetectionOnly -> On (jira: SEC-1234)"
          # 4. 변경 history
          sudo etckeeper vcs log --oneline -- /etc/modsecurity/modsecurity.conf
        예상 출력 `commit abc123 SecRuleEngine: DetectionOnly -> On / commit def456 before SecRuleEngine change`.
        운영 해석: 누가 언제 SecRuleEngine 변경했는지 audit. compliance 표준.
      negative_signs:
      - 기본 기대 값(On) 가정
      - 파일 여러 개 중 하나만 확인
      - 설정 파일 위치 틀림
  target_vm: web
  script: sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf /etc/apache2/mods-enabled/security2.conf
    2>/dev/null
  risk_level: low
  bastion_prompt: web VM에서 ModSecurity SecRuleEngine 설정 값을 확인해줘
- order: 3
  instruction: OWASP CRS 디렉터리의 룰 파일 개수를 확인하시오.
  hint: ls /usr/share/modsecurity-crs/rules | wc -l
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM의 ModSecurity CRS 룰 파일 개수를 세어줘

    📎 참고 (CLI): ls /usr/share/modsecurity-crs/rules/ 2>/dev/null | wc -l || ls /etc/modsecurity/crs/rules
    2>/dev/null | wc -l'
  answer_detail: 'Apache + ModSecurity WAF: OWASP CRS 디렉터리의 룰 파일 개수를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'OWASP CRS 룰 파일 개수 — ls /usr/share/modsecurity-crs/rules/ 또는 /etc/modsecurity/crs/rules/
        | wc -l. CRS 4.x 는 약 40개 .conf 파일(REQUEST-900-EXCLUSION, REQUEST-901-INITIALIZATION,
        REQUEST-905-COMMON-EXCEPTIONS, REQUEST-910/911/912/913/920/921/922, REQUEST-930-940/941/942/943/944,
        REQUEST-949, REQUEST-950/951/952/953/954/955/959/980 + setup/data 파일). 번호
        체계: 9xx 는 CRS 자체 관리, 다른 대역은 커스텀'
      success_criteria:
      - ls + wc -l 실행
      - 파일 개수 숫자 출력
      - 두 경로 대체 시도
      acceptable_methods:
      - ls /usr/share/modsecurity-crs/rules/ | wc -l
      - find /usr/share/modsecurity-crs -name "*.conf" | wc -l
      - dpkg -L modsecurity-crs | grep rules | wc -l
      - apt policy modsecurity-crs 로 버전 확인 후 릴리스 노트 참조
      - |
        **[OSS] find / wc (CRS 룰 카운트 + 분류)** — 표준 분석.
          # 1. CRS 디렉토리의 .conf 파일 수
          sudo find /usr/share/modsecurity-crs/rules -name "*.conf" | wc -l
          # 2. 카테고리 별 분포 (REQUEST-9xx)
          sudo ls /usr/share/modsecurity-crs/rules/ | awk -F- '{print $2}' | sort | uniq -c
          # 3. 룰 라인 수 (총 SecRule)
          sudo grep -hc "^SecRule " /usr/share/modsecurity-crs/rules/*.conf | awk '{s+=$1} END {print s}'
          # 4. 카테고리 별 룰 수
          for f in /usr/share/modsecurity-crs/rules/*.conf; do
              n=$(grep -c "^SecRule " "$f" 2>/dev/null)
              echo "$n $(basename $f)"
          done | sort -rn | head
        예상 출력 `40 / SQLI: 12 / XSS: 10 / 200 SecRule / REQUEST-942-APPLICATION-ATTACK-SQLI.conf 56`.
        운영 해석: 카테고리별 분포 확인. 942 (SQLi) 가 가장 많음 = 가장 정밀한 보호.
      - |
        **[OSS] OWASP CRS official documentation 검증** — 공식 git repo.
          # 1. CRS 공식 repo clone
          git clone https://github.com/coreruleset/coreruleset /tmp/crs
          cd /tmp/crs
          # 2. 설치 버전과 비교
          cat util/regression-tests/CHANGES.md | head
          # 3. 룰 변경 history
          git log --oneline rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf | head
          # 4. 설치 버전 신구 확인
          dpkg -l modsecurity-crs | awk '/^ii/ {print $3}'
          # 최신 비교: https://coreruleset.org/installation/
        예상 출력 `CRS 4.4.0 / 50 commits / installed: 4.0.0 → 4.4.0 upgrade 가능`.
        운영 해석: 보안 패치 누락 여부 확인. CRS upstream 자주 갱신 (월 1-2회).
      - |
        **[OSS] coraza-cli (modern CRS 호환 도구)** — Go 기반 ModSec 후속.
          # 1. coraza 설치
          go install github.com/corazawaf/coraza-cli@latest
          # 2. CRS 룰 syntax 검증
          coraza-cli match --rules /usr/share/modsecurity-crs/rules/ --input "id=1 union select"
          # 3. 룰 별 적재 분석
          coraza-cli rules-info --directory /usr/share/modsecurity-crs/
        예상 출력 `Loaded 200 rules / Match: rule 942100 fired`.
        운영 해석: ModSec v3 후속. Nginx + Coraza 환경에서 CRS 그대로 사용 가능.
      - |
        **[OSS] ftw (CRS regression test 표준)** — 회귀 검증.
          # 1. ftw + CRS test corpus 설치
          pip install ftw
          git clone https://github.com/coreruleset/coreruleset /tmp/crs
          # 2. 모든 회귀 테스트 실행
          ftw run --include /tmp/crs/util/regression-tests/tests/REQUEST-942-APPLICATION-ATTACK-SQLI/
          # 3. 결과 분석 (PASS/FAIL count)
          ftw run --include /tmp/crs/util/regression-tests/tests/ -o json | jq '.summary'
        예상 출력 `Tests passed: 856 / Tests failed: 0 / Total: 856`.
        운영 해석: CRS 룰 수정 후 *기존 테스트 회귀* 자동 검증. CI 표준.
      - |
        **[OSS] sigma → ModSec 변환** — 표준 룰 → CRS 추가.
          # 1. Sigma 의 web 카테고리 룰
          ls /tmp/sigma/rules/web/ | wc -l
          # 2. Sigma → ModSec 변환 (community backend)
          pip install pysigma-backend-modsecurity
          sigma convert -t modsecurity /tmp/sigma/rules/web/web_xss_keywords.yml
          # 3. 결과 ModSec 룰 추가
          sigma convert -t modsecurity /tmp/sigma/rules/web/ | sudo tee /etc/modsecurity/sigma-rules.conf
        예상 출력 `SecRule ARGS "@rx (?i)(script|alert|onload)" "id:9999001,phase:2,deny,..."`.
        운영 해석: Sigma 표준 → ModSec 변환. multi-tool 룰 관리 표준.
      negative_signs:
      - 파일 개수 숫자 확인 안 함
      - wc 대신 ls(리스트만)
      - 두 경로 중 하나만 시도
  target_vm: web
  script: ls /usr/share/modsecurity-crs/rules/ 2>/dev/null | wc -l || ls /etc/modsecurity/crs/rules
    2>/dev/null | wc -l
  risk_level: low
  bastion_prompt: web VM의 ModSecurity CRS 룰 파일 개수를 세어줘
- order: 4
  instruction: SecRuleEngine 이 DetectionOnly 라면 On 으로 바꾸시오(이미 On 이면 건너뜀).
  hint: sed … SecRuleEngine
  category: configure
  points: 10
  answer: '🤖 프롬프트: web VM의 ModSecurity SecRuleEngine을 On으로 설정해줘

    📎 참고 (CLI): sudo sed -i ''s/^SecRuleEngine DetectionOnly/SecRuleEngine On/'' /etc/modsecurity/modsecurity.conf
    2>/dev/null ; grep SecRuleEngine /etc/modsecurity/modsecurity.conf'
  answer_detail: 'Apache + ModSecurity WAF: SecRuleEngine 이 DetectionOnly 라면 On 으로
    바꾸시오(이미 On 이면 건너뜀).'
  verify:
    type: output_contains
    expect: SecRuleEngine
    field: stdout
    semantic:
      intent: 'SecRuleEngine DetectionOnly → On 전환 — sudo sed -i s/^SecRuleEngine
        DetectionOnly/SecRuleEngine On/ /etc/modsecurity/modsecurity.conf + grep 검증.
        sed in-place edit, ^ anchor 로 주석(#) 라인 제외. Production 전환 전 FP 리스트 검토 필수 —
        On 으로 전환 시 정당한 트래픽도 차단 가능. rollback: DetectionOnly 로 역변경. 백업: sed -i.bak 권장'
      success_criteria:
      - sed 명령으로 SecRuleEngine 값 변경
      - 변경 후 grep 으로 확인
      - SecRuleEngine On 최종 상태
      acceptable_methods:
      - sudo sed -i s/SecRuleEngine DetectionOnly/SecRuleEngine On/ ...
      - sudo sed -i.bak ... (백업 포함)
      - vim + :%s/DetectionOnly/On/ 수동
      - ansible lineinfile + state=present
      - paranoia_level 조정과 함께 단계적 전환
      - |
        **[OSS] sed in-place + backup** — 표준 변경.
          # 1. 백업 + 변경
          sudo cp /etc/modsecurity/modsecurity.conf{,.bak}
          sudo sed -i 's/^SecRuleEngine DetectionOnly/SecRuleEngine On/' /etc/modsecurity/modsecurity.conf
          # 2. diff 확인
          sudo diff /etc/modsecurity/modsecurity.conf{,.bak}
          # 3. apachectl configtest 로 검증
          sudo apachectl configtest
