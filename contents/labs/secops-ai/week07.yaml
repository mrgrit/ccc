lab_id: secops-ai-week07
title: Apache + ModSecurity WAF (AI 지원)
version: ai
course: secops-ai
week: 7
description: web VM의 Apache + ModSecurity WAF 구성을 점검하고 CRS 룰로 SQLi/XSS 탐지가 작동하는지 검증한다.
difficulty: medium
duration_minutes: 120
objectives:
- ModSecurity의 기본 구성·엔진 on/off·감사 로그 위치를 확인한다
- OWASP CRS 룰로 SQLi/XSS 차단을 테스트한다
- /var/log/apache2/modsec_audit.log 에서 차단 기록을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web VM에서 Apache + ModSecurity가 동작 중인지 확인하시오.
  hint: apachectl -M | grep -i security
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM의 Apache에 ModSecurity 모듈이 로드됐는지 확인해줘

    📎 참고 (CLI): apachectl -M 2>/dev/null | grep -i security'
  answer_detail: 'Apache + ModSecurity WAF: web VM에서 Apache + ModSecurity가 동작 중인지
    확인하시오.'
  verify:
    type: output_contains
    expect: security
    field: stdout
    semantic:
      intent: Apache ModSecurity 모듈 로드 확인 — apachectl -M 2>/dev/null | grep -i security.
        security2_module (shared) 출력 시 ModSecurity v2 로드됨, unique_id_module 등 연관 모듈도
        확인 가능. libapache2-mod-security2 패키지 필수. Nginx 는 ModSecurity v3 + ngx_http_modsecurity_module
        별도 컴파일 필요. ModSecurity 3 (libmodsecurity) 가 최신이지만 v2 가 여전히 운영 환경 주류
      success_criteria:
      - apachectl -M 실행
      - security2_module 또는 security 키워드 포함
      - grep 결과 출력
      acceptable_methods:
      - apachectl -M | grep security
      - apache2ctl -M | grep security
      - httpd -M 2>&1 | grep security(CentOS)
      - ls /etc/apache2/mods-enabled/security2.*
      - dpkg -l | grep libapache2-mod-security
      negative_signs:
      - Nginx 확인(다른 웹서버)
      - 패키지만 확인(로드 검증 없음)
      - stderr 무시로 오류 숨김
  target_vm: web
  script: apachectl -M 2>/dev/null | grep -i security
  risk_level: low
  bastion_prompt: web VM의 Apache에 ModSecurity 모듈이 로드됐는지 확인해줘
- order: 2
  instruction: modsecurity.conf 에서 SecRuleEngine 값을 확인하시오.
  hint: grep SecRuleEngine …
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM에서 ModSecurity SecRuleEngine 설정 값을 확인해줘

    📎 참고 (CLI): sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf /etc/apache2/mods-enabled/security2.conf
    2>/dev/null'
  answer_detail: 'Apache + ModSecurity WAF: modsecurity.conf 에서 SecRuleEngine 값을 확인하시오.'
  verify:
    type: output_contains
    expect: SecRuleEngine
    field: stdout
    semantic:
      intent: 'SecRuleEngine 상태 확인 — sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf
        /etc/apache2/mods-enabled/security2.conf 2>/dev/null. SecRuleEngine 3가지 값:
        On(blocking 모드, 실제 차단), DetectionOnly(탐지만 log, 통과 허용), Off(완전 비활성). Production
        deploy 절차: DetectionOnly 로 FP 튜닝 → On 전환. -H 는 matched 라인에 파일명 prefix 포함'
      success_criteria:
      - grep SecRuleEngine 실행
      - SecRuleEngine On/DetectionOnly/Off 값 출력
      - 파일 경로 포함
      acceptable_methods:
      - sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf
      - sudo grep -rE SecRuleEngine /etc/modsecurity/ /etc/apache2/
      - sudo apachectl -S 로 config dump
      - echo check | ModSecurity test-rules 스크립트
      - curl localhost/test 후 log 관찰
      negative_signs:
      - 기본 기대 값(On) 가정
      - 파일 여러 개 중 하나만 확인
      - 설정 파일 위치 틀림
  target_vm: web
  script: sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf /etc/apache2/mods-enabled/security2.conf
    2>/dev/null
  risk_level: low
  bastion_prompt: web VM에서 ModSecurity SecRuleEngine 설정 값을 확인해줘
- order: 3
  instruction: OWASP CRS 디렉터리의 룰 파일 개수를 확인하시오.
  hint: ls /usr/share/modsecurity-crs/rules | wc -l
  category: survey
  points: 10
  answer: '🤖 프롬프트: web VM의 ModSecurity CRS 룰 파일 개수를 세어줘

    📎 참고 (CLI): ls /usr/share/modsecurity-crs/rules/ 2>/dev/null | wc -l || ls /etc/modsecurity/crs/rules
    2>/dev/null | wc -l'
  answer_detail: 'Apache + ModSecurity WAF: OWASP CRS 디렉터리의 룰 파일 개수를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'OWASP CRS 룰 파일 개수 — ls /usr/share/modsecurity-crs/rules/ 또는 /etc/modsecurity/crs/rules/
        | wc -l. CRS 4.x 는 약 40개 .conf 파일(REQUEST-900-EXCLUSION, REQUEST-901-INITIALIZATION,
        REQUEST-905-COMMON-EXCEPTIONS, REQUEST-910/911/912/913/920/921/922, REQUEST-930-940/941/942/943/944,
        REQUEST-949, REQUEST-950/951/952/953/954/955/959/980 + setup/data 파일). 번호
        체계: 9xx 는 CRS 자체 관리, 다른 대역은 커스텀'
      success_criteria:
      - ls + wc -l 실행
      - 파일 개수 숫자 출력
      - 두 경로 대체 시도
      acceptable_methods:
      - ls /usr/share/modsecurity-crs/rules/ | wc -l
      - find /usr/share/modsecurity-crs -name "*.conf" | wc -l
      - dpkg -L modsecurity-crs | grep rules | wc -l
      - apt policy modsecurity-crs 로 버전 확인 후 릴리스 노트 참조
      negative_signs:
      - 파일 개수 숫자 확인 안 함
      - wc 대신 ls(리스트만)
      - 두 경로 중 하나만 시도
  target_vm: web
  script: ls /usr/share/modsecurity-crs/rules/ 2>/dev/null | wc -l || ls /etc/modsecurity/crs/rules
    2>/dev/null | wc -l
  risk_level: low
  bastion_prompt: web VM의 ModSecurity CRS 룰 파일 개수를 세어줘
- order: 4
  instruction: SecRuleEngine 이 DetectionOnly 라면 On 으로 바꾸시오(이미 On 이면 건너뜀).
  hint: sed … SecRuleEngine
  category: configure
  points: 10
  answer: '🤖 프롬프트: web VM의 ModSecurity SecRuleEngine을 On으로 설정해줘

    📎 참고 (CLI): sudo sed -i ''s/^SecRuleEngine DetectionOnly/SecRuleEngine On/'' /etc/modsecurity/modsecurity.conf
    2>/dev/null ; grep SecRuleEngine /etc/modsecurity/modsecurity.conf'
  answer_detail: 'Apache + ModSecurity WAF: SecRuleEngine 이 DetectionOnly 라면 On 으로
    바꾸시오(이미 On 이면 건너뜀).'
  verify:
    type: output_contains
    expect: SecRuleEngine
    field: stdout
    semantic:
      intent: 'SecRuleEngine DetectionOnly → On 전환 — sudo sed -i s/^SecRuleEngine
        DetectionOnly/SecRuleEngine On/ /etc/modsecurity/modsecurity.conf + grep 검증.
        sed in-place edit, ^ anchor 로 주석(#) 라인 제외. Production 전환 전 FP 리스트 검토 필수 —
        On 으로 전환 시 정당한 트래픽도 차단 가능. rollback: DetectionOnly 로 역변경. 백업: sed -i.bak 권장'
      success_criteria:
      - sed 명령으로 SecRuleEngine 값 변경
      - 변경 후 grep 으로 확인
      - SecRuleEngine On 최종 상태
      acceptable_methods:
      - sudo sed -i s/SecRuleEngine DetectionOnly/SecRuleEngine On/ ...
      - sudo sed -i.bak ... (백업 포함)
      - vim + :%s/DetectionOnly/On/ 수동
      - ansible lineinfile + state=present
      - paranoia_level 조정과 함께 단계적 전환
      negative_signs:
      - ^ anchor 없이 주석 매칭
      - grep 검증 누락
      - 백업 없이 in-place
  target_vm: web
  script: sudo sed -i 's/^SecRuleEngine DetectionOnly/SecRuleEngine On/' /etc/modsecurity/modsecurity.conf
    2>/dev/null ; grep SecRuleEngine /etc/modsecurity/modsecurity.conf
  risk_level: high
  bastion_prompt: 'web VM의 ModSecurity SecRuleEngine을 On으로 설정해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: Apache를 재시작해 설정을 반영하시오.
  hint: systemctl restart apache2
  category: configure
  points: 10
  answer: '🤖 프롬프트: web VM의 Apache 서비스를 재시작해줘

    📎 참고 (CLI): sudo systemctl restart apache2 && systemctl is-active apache2'
  answer_detail: 'Apache + ModSecurity WAF: Apache를 재시작해 설정을 반영하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - 재시작
    field: stdout
    semantic:
      intent: Apache restart + 활성 검증 — sudo systemctl restart apache2 && systemctl
        is-active apache2. restart 로 modsecurity.conf + CRS 룰 재로드(reload 는 graceful,
        설정 변경에 따라 일부 미반영). sleep 없이 바로 is-active 체크(apache 는 빠른 재시작). 활성 실패 시 apachectl
        configtest 로 syntax 에러 확인. ModSecurity 규칙 오류 시 Apache 기동 실패 가능 - 롤백 절차 준비
      success_criteria:
      - systemctl restart apache2 실행
      - is-active 로 검증
      - active 문자열 출력
      acceptable_methods:
      - sudo systemctl restart apache2 && systemctl is-active apache2
      - sudo systemctl reload apache2(graceful, 일부 설정만)
      - sudo apachectl graceful(프로세스 유지하며 재로드)
      - sudo apachectl -t 로 config test 먼저
      - journalctl -u apache2 -n 20 로 로그 확인
      negative_signs:
      - restart 실패 무시
      - configtest 생략
      - is-active 대신 status 전체(너무 많음)
  target_vm: web
  script: sudo systemctl restart apache2 && systemctl is-active apache2
  risk_level: high
  bastion_prompt: 'web VM의 Apache 서비스를 재시작해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: attacker VM에서 SQL Injection payload로 테스트 요청을 보내시오 (403 차단 확인).
  hint: curl -o /dev/null -w '%{http_code}' '…union select…'
  category: verify
  points: 10
  answer: '🤖 프롬프트: attacker VM에서 web VM으로 ''union select'' SQLi payload를 curl로 보내고
    HTTP 응답 코드를 보여줘

    📎 참고 (CLI): curl -sS -o /dev/null -w ''%{http_code}\n'' ''http://10.20.30.80/?id=1%20union%20select%201,2'''
  answer_detail: 'Apache + ModSecurity WAF: attacker VM에서 SQL Injection payload로 테스트
    요청을 보내시오 (403 차단 확인).'
  verify:
    type: output_contains
    expect:
    - '403'
    - Forbidden
    - ModSecurity
    - blocked
    - SQLi
    field: stdout
    semantic:
      intent: SQLi payload 차단 확인 — curl -sS -o /dev/null -w %{http_code}\n http://10.20.30.80/?id=1%20union%20select%201,2.
        ModSecurity + CRS 정상 작동 시 CRS rule 942100/942150/942190/942200/942260 등 SQLi
        패턴 매칭 → 403 Forbidden 반환. paranoia_level 에 따라 엄격도 조정. %{http_code} 로 응답 코드만
        추출. 200 응답이면 WAF 미동작 또는 SecRuleEngine=DetectionOnly
      success_criteria:
      - curl 로 SQLi payload 전송
      - 응답 코드 403 기대
      - '%{http_code} 포맷으로 코드 출력'
      acceptable_methods:
      - curl -sS -o /dev/null -w %{http_code} http://<IP>/?id=... union select ...
      - sqlmap --level 3 로 자동 테스트
      - Burp Intruder + payload list
      - nikto -h http://<IP> 로 웹 취약점 스캔
      - OWASP ZAP active scan
      negative_signs:
      - 응답 코드 확인 없음
      - 단순 GET(payload 없음)
      - 200 응답 정상 판정(WAF 실패 미인지)
  target_vm: attacker
  script: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/?id=1%20union%20select%201,2'
  risk_level: medium
  bastion_prompt: attacker VM에서 web VM으로 'union select' SQLi payload를 curl로 보내고 HTTP
    응답 코드를 보여줘
- order: 7
  instruction: attacker VM에서 XSS payload 요청을 보내 차단 응답을 확인하시오.
  hint: curl -w '%{http_code}' '…<script>…'
  category: verify
  points: 10
  answer: '🤖 프롬프트: attacker VM에서 web VM으로 <script>alert(1)</script> XSS payload를 curl로
    보내고 응답 코드를 보여줘

    📎 참고 (CLI): curl -sS -o /dev/null -w ''%{http_code}\n'' ''http://10.20.30.80/?q=%3Cscript%3Ealert(1)%3C%2Fscript%3E'''
  answer_detail: 'Apache + ModSecurity WAF: attacker VM에서 XSS payload 요청을 보내 차단 응답을
    확인하시오.'
  verify:
    type: output_contains
    expect:
    - '403'
    - Forbidden
    - XSS
    - script
    - ModSecurity
    field: stdout
    semantic:
      intent: 'XSS payload 차단 확인 — curl -sS -o /dev/null -w %{http_code}\n http://10.20.30.80/?q=%3Cscript%3Ealert(1)%3C%2Fscript%3E.
        %3C=<, %3E=>, %2F=/ URL encoded 형태로 <script>alert(1)</script>. CRS 941xxx
        대역(XSS) 에서 차단: 941100(NoScript XSS), 941110(script tag), 941160(NoScript XSS
        2), 941170 등. 응답 403 기대. Reflected/Stored/DOM XSS 모두 탐지. MITRE T1059.007(JavaScript)'
      success_criteria:
      - curl 로 script tag 포함 URL 요청
      - 응답 코드 403 기대
      - '%{http_code} 확인'
      acceptable_methods:
      - curl -sS -w %{http_code} http://<IP>/?q=<script>alert(1)</script>
      - '다양한 payload: javascript:, onerror=, <img src=x onerror=>'
      - Burp XSS Reflector plugin
      - XSStrike 자동 탐지 도구
      - Selenium 기반 DOM XSS 테스트
      negative_signs:
      - script tag 인코딩 누락(차단 안 되는 이유 오해)
      - 응답 코드 확인 없음
      - 200 응답 정상 판정
  target_vm: attacker
  script: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/?q=%3Cscript%3Ealert(1)%3C%2Fscript%3E'
  risk_level: medium
  bastion_prompt: attacker VM에서 web VM으로 <script>alert(1)</script> XSS payload를 curl로
    보내고 응답 코드를 보여줘
- order: 8
  instruction: web VM에서 modsec_audit.log 마지막 30줄을 확인해 차단 기록을 찾으시오.
  hint: tail /var/log/apache2/modsec_audit.log
  category: analysis
  points: 10
  answer: '🤖 프롬프트: web VM의 modsec_audit.log 최근 30줄을 보여줘

    📎 참고 (CLI): sudo tail -30 /var/log/apache2/modsec_audit.log 2>/dev/null | head
    -20'
  answer_detail: 'Apache + ModSecurity WAF: web VM에서 modsec_audit.log 마지막 30줄을 확인해
    차단 기록을 찾으시오.'
  verify:
    type: output_contains
    expect: ModSec
    field: stdout
    semantic:
      intent: 'modsec_audit.log 차단 기록 조회 — sudo tail -30 /var/log/apache2/modsec_audit.log
        | head -20. Audit log 는 멀티파트 형식(A-K sections): A(timestamp+txid), B(request
        headers+body), E(response body), F(response headers), H(audit logging details,
        rule match), K(rules matched). ModSec 2.x 출력은 긴 텍스트. 차단된 요청의 rule id + msg
        + payload 확인. 경로 대안: /var/log/apache2/modsec_audit.log 또는 /var/log/modsec/audit.log'
      success_criteria:
      - modsec_audit.log tail 실행
      - ModSec 또는 related 키워드 포함
      - audit 섹션 헤더 확인
      acceptable_methods:
      - sudo tail -30 /var/log/apache2/modsec_audit.log
      - sudo grep -A 20 --Boundary /var/log/apache2/modsec_audit.log
      - sudo cat /var/log/apache2/modsec_audit.log | awk /--[a-f0-9]+-A--/,/--[a-f0-9]+-Z--/
      - mlogc 로 원격 수집
      - ModSecurity JSON logging(SecAuditLogFormat JSON) 후 jq
      negative_signs:
      - 경로 오타
      - error.log 와 혼동
      - 섹션 구조 이해 없이 무작위 tail
  target_vm: web
  script: sudo tail -30 /var/log/apache2/modsec_audit.log 2>/dev/null | head -20
  risk_level: low
  bastion_prompt: web VM의 modsec_audit.log 최근 30줄을 보여줘
- order: 9
  instruction: modsec_audit.log 에서 rule id 942(SQLi)에 해당하는 이벤트를 카운트하시오.
  hint: grep -c '942'
  category: analysis
  points: 10
  answer: '🤖 프롬프트: web VM의 modsec_audit.log에서 rule id 942 관련 이벤트 개수를 세어줘

    📎 참고 (CLI): sudo grep -c ''\[id \"942'' /var/log/apache2/modsec_audit.log 2>/dev/null'
  answer_detail: 'Apache + ModSecurity WAF: modsec_audit.log 에서 rule id 942(SQLi)에
    해당하는 이벤트를 카운트하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: CRS SQLi(942) 이벤트 카운트 — sudo grep -c \[id "942 /var/log/apache2/modsec_audit.log.
        CRS rule id 942xxx 범위가 SQLi(REQUEST-942-APPLICATION-ATTACK-SQLI). [id "942100"]
        형식으로 audit log 에 기록. grep -c 로 매칭 라인 수 카운트. 카운트 기반으로 공격 빈도 추이 측정, 급증 시 공격
        시도 의심. REQUEST-941(XSS)·943(Session fixation)·944(Java 공격)·929(Attack Reputation)
        대역도 함께 모니터링
      success_criteria:
      - grep -c 로 카운트 실행
      - 942 rule id 패턴 매칭
      - 숫자 결과 출력
      acceptable_methods:
      - sudo grep -c \[id "942 /var/log/apache2/modsec_audit.log
      - sudo awk /\[id "942/{count++} END{print count}
      - Kibana aggregation rule.id field starts with 942
      - splunk | stats count by rule_id where rule_id LIKE 942%
      - Elastic SIEM rule 942* alerts count
      negative_signs:
      - 다른 rule id(941/943) 카운트
      - -c 없이 grep 라인 출력
      - 0 카운트 정상 판정
  target_vm: web
  script: sudo grep -c '\[id \"942' /var/log/apache2/modsec_audit.log 2>/dev/null
  risk_level: low
