- order: 99
  instruction: |
    [중간고사 복합 시나리오] "두 공격 vector → nft + Suricata 양쪽 로그 상호 검증"

    ## 상황 (w01-w07 시나리오 연속)

    ABC 핀테크 SOC 신규 분석가, 8주 차 — *중간고사* 시점.
    1~7주 학습한 nftables + Suricata 를 *조합* 해 실 SOC 운영 능력을 검증한다.

    > 선임 (이번엔 평가자 모드):
    >  "오늘 가짜 incident 두 가지 발생시킬게. 너는 *두 솔루션 양쪽 로그* 에서 어떤 evidence 가
    >  남는지 매핑하고 cross-check 해. 한 쪽만 보면 incident 의 일부만 보여 — 7주차 ModSec
    >  처럼 SecRuleRemoveById 로 942100 비활성화하면 SQLi 가 통과하는 걸 nft counter 만 봐선
    >  모르거든. *양쪽 로그가 일치하는지* — 이게 중간고사 핵심이야."

    학습 목표 #3 (두 솔루션 로그 상호 검증) 의 *행동 증명*.

    ## 임무 (3 단계, 약 30분)

    ### Phase A — 시험 환경 재구성 (5분, 1~10 에서 정리했음)

    1~10 에서 exam 테이블과 sid:1000201 룰 모두 제거했으므로 다시 작성:
      ```
      # secu 의 nft (1~10 의 1~4번 재현)
      sudo nft add table inet exam
      sudo nft add chain inet exam input { type filter hook input priority 0 \; policy drop \; }
      sudo nft add rule inet exam input ct state established,related accept
      sudo nft add rule inet exam input iif lo accept
      sudo nft add rule inet exam input ip saddr 10.20.30.0/24 tcp dport 22 ct state new limit rate 5/minute accept
      sudo nft add rule inet exam input ip saddr 10.20.30.0/24 tcp dport 22 ct state new drop
      sudo nft add rule inet exam input icmp type echo-request accept

      # Suricata 의 .exe 탐지 룰 (1~10 의 5번 재현)
      echo 'alert http any any -> any any (msg:".exe download attempt"; flow:established,to_server; http.uri; content:".exe"; nocase; sid:1000201; rev:1;)' \
        | sudo tee -a /etc/suricata/rules/local.rules
      sudo systemctl reload suricata
      ```

    ### Phase B — 두 incident 시나리오 + 양쪽 로그 측정 (20분)

    #### Incident 1 — SSH Brute Force (nft rate limit 영역)

    attacker 에서 hydra 빠르게 7 시도 (5/minute 제한):
      ```
      attacker: echo -e 'a\\nb\\nc\\nd\\ne\\nf\\ng' > /tmp/7pwds.txt
      attacker: hydra -l ccc -P /tmp/7pwds.txt ssh://10.20.30.1 -t 1 -W 1
      ```

    secu 에서 양쪽 측면 측정:
    - **nft** counter: `sudo nft list table inet exam | grep -E -A1 'limit|drop'`
      → 예상: 5 accept + 2 drop
    - **Suricata** eve.json: `sudo tail -100 /var/log/suricata/eve.json | grep -E 'ssh|22'`
      → 예상: Suricata 는 SSH brute 룰 없으므로 *기록 없음 또는 무관 ICMP/HTTP*
    - 결론: *nft 는 차단 evidence 보유 / Suricata 는 미보유* — 학생 보고서에 명시

    #### Incident 2 — `.exe` 다운로드 시도 (Suricata 영역)

    attacker 에서 web 으로:
      ```
      attacker: curl -sI 'http://10.20.30.80/malware.exe' --max-time 5
      attacker: curl -sI 'http://10.20.30.80/files/setup.exe' --max-time 5
      ```

    secu 에서 양쪽 측면 측정:
    - **nft** counter: `sudo nft list table inet exam`
      → 예상: input chain 의 룰들 *직접 매칭 안 함* (이 트래픽은 forward 없이 web 직접 통신).
      counter 기록 한정적
    - **Suricata** eve.json: `sudo tail -100 /var/log/suricata/eve.json | grep 'sid":1000201'`
      → 예상: 2 alert 발생 (.exe 마다)
    - 결론: *Suricata 는 alert 보유 / nft 는 input chain 으로 없음* (네트워크 layer 미스매칭)

    ### Phase C — 상호 검증 표 + 회고 + 정리 (5분)

    ## Cross-check 표

    | Incident | nft evidence | Suricata evidence | 양쪽 일치? |
    |----------|-------------|------------------|----------|
    | 1. SSH brute 7 시도 | accept +5 / drop +2 (rate limit) | (없음 — 룰 미작성) | X — 한 쪽만 |
    | 2. `.exe` 다운로드 2회 | (없음 — input chain 미매칭) | sid:1000201 alert ×2 | X — 한 쪽만 |

    1~2 단락 회고:
    1. **각 incident 가 어느 layer 에 evidence 남겼나** — 정량 (count + sid)
    2. **양쪽 로그가 *불일치* 하는 게 정상인가?** 그렇다 — *각 layer 가 다른 mechanism 책임짐*.
       SSH brute 는 connection rate 라 nft 영역, .exe 는 application content 라 Suricata 영역.
       완전 cross-check 를 원하면 *Suricata SSH brute 룰* 추가 또는 *nft .exe content match*
       (어렵음) 가 필요.
    3. **운영 시 한 솔루션 만으로 SOC 운영하면** — incident 의 일부만 보고 잘못 결론. 그래서
       *Wazuh 같은 SIEM 으로 두 layer log 통합* 이 필요 (w09-w11 학습 예정).

    종료 정리:
      ```
      sudo nft delete table inet exam
      sudo sed -i '/sid:1000201/d' /etc/suricata/rules/local.rules
      sudo systemctl reload suricata
      ```
