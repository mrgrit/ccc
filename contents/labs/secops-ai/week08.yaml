lab_id: secops-ai-week08
title: 중간고사 — 방화벽 + IPS 구성 실기 (AI 지원)
version: ai
course: secops-ai
week: 8
description: nftables와 Suricata를 조합해 실전 보안 인프라의 일부를 구성하고 검증한다.
difficulty: hard
duration_minutes: 150
objectives:
- nftables로 기본 방어선(화이트리스트+SSH 레이트리밋)을 구축한다
- Suricata 커스텀 룰로 특정 공격 패턴을 탐지한다
- 두 솔루션의 로그를 상호 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'secu VM에 ''exam'' nftables 테이블과 policy drop input 체인을 만드시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week08/1/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/secops-ai-week08/1/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft add table inet exam; nft add chain …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 ''inet exam'' 테이블과 policy drop의 input 체인을 만들어줘

    📎 참고 (CLI): sudo nft add table inet exam && sudo nft add chain inet exam input
    ''{ type filter hook input priority 0 \; policy drop \; }'''
  answer_detail: '중간고사 — 방화벽 + IPS 구성 실기: secu VM에 ''exam'' nftables 테이블과 policy drop
    input 체인을 만드시오.'
  verify:
    type: output_contains
    expect: exam
    field: stdout
    semantic:
      intent: 'exam 테이블 + default-deny input chain — 통합 실기: sudo nft add table inet
        exam && sudo nft add chain inet exam input { type filter hook input priority
        0 ; policy drop ; }. Zero Trust 원칙 적용(w3 와 동일 패턴). exam 은 중간고사 용 전용 테이블, 기존
        filter/ip/ip6 과 분리. priority 0 으로 filter 표준 위치, policy drop 로 default-deny'
      success_criteria:
      - nft add table + add chain 2 명령
      - policy drop(default-deny)
      - type filter hook input priority 0
      acceptable_methods:
      - sudo nft add table inet exam && sudo nft add chain ...
      - /etc/nftables.conf 에 table+chain 블록 후 nft -f 로드
      - Ansible ansible.posix.firewalld 모듈
      - sudo nft create table(idempotent 아님)
      - |
        **[OSS] nft (default-deny table 생성)** — 표준 명령.
          # 1. table + policy drop chain 생성 (한 줄)
          sudo nft add table inet exam && sudo nft add chain inet exam input '{ type filter hook input priority 0 \; policy drop \; }'
          # 2. 적재 검증 (chain 의 policy + hook)
          sudo nft list chain inet exam input
          # 3. JSON 출력 (자동화 검증)
          sudo nft -j list chain inet exam input | jq '.nftables[].chain | {name, type, hook, prio, policy}'
        예상 출력 `chain input { type filter hook input priority filter; policy drop; }`.
        운영 해석: priority filter (= 0) + policy drop = default-deny 표준. 후속 룰에서 명시 허용만 통과.
      - |
        **[OSS] firewalld (zone 기반 default-deny)** — RHEL 표준.
          # 1. firewalld 의 drop zone (built-in)
          sudo firewall-cmd --get-default-zone
          sudo firewall-cmd --info-zone=drop
          # 2. 새 zone 'exam' 생성 + target=DROP
          sudo firewall-cmd --permanent --new-zone=exam
          sudo firewall-cmd --permanent --zone=exam --set-target=DROP
          sudo firewall-cmd --reload
          # 3. 검증
          sudo firewall-cmd --zone=exam --list-all
        예상 출력 `target: DROP / interfaces: / sources: / services:`.
        운영 해석: zone 의 target=DROP = nft policy drop 와 동등. interface/source 추가 시 zone 적용.
      - |
        **[OSS] ufw default deny** — Ubuntu 환경.
          # 1. default policy
          sudo ufw default deny incoming
          sudo ufw default allow outgoing
          # 2. lockout 방지: SSH 먼저 허용 (이후 step 에서 추가)
          sudo ufw allow ssh
          sudo ufw enable
          # 3. backend nft 검증
          sudo nft list table inet ufw
          sudo ufw status verbose
        예상 출력 `Default: deny (incoming), allow (outgoing) / [1] 22/tcp ALLOW IN Anywhere`.
        운영 해석: ufw 가 backend nft 에 자동 변환. 학습 친화 frontend.
      - |
        **[OSS] Ansible (ansible.posix.firewalld)** — IaC 표준.
          # playbook
          - name: Create exam zone with default-deny
            ansible.posix.firewalld:
              zone: exam
              target: DROP
              state: enabled
              permanent: yes
              immediate: yes
          # 실행
          ansible-playbook -i inventory.yml exam-zone.yml --check
          ansible-playbook -i inventory.yml exam-zone.yml --diff
        예상 출력 `changed: [secu] / target=DROP applied`.
        운영 해석: 다중 host 일관 default-deny 배포. dry-run + diff 로 변경 확인.
      - |
        **[OSS] etckeeper (config 변경 audit)** — git 기반.
          # 1. 변경 전 commit
          sudo etckeeper commit "before exam table"
          # 2. nft.conf 에 table 정의 추가
          sudo tee -a /etc/nftables.conf << 'EOF'
          table inet exam {
              chain input { type filter hook input priority 0; policy drop; }
          }
          EOF
          sudo nft -f /etc/nftables.conf
          # 3. 변경 후 commit
          sudo etckeeper commit "Add exam table with default-deny (jira: SEC-1234)"
          # 4. diff 확인
          sudo etckeeper vcs diff HEAD~1 HEAD -- /etc/nftables.conf
        예상 출력 `+table inet exam { ... policy drop ... }`.
        운영 해석: 변경 audit + git history. compliance + rollback 표준.
      negative_signs:
      - policy accept(default-allow)
      - other family(ip 등) 사용
      - hook 누락
  target_vm: secu
  script: sudo nft add table inet exam && sudo nft add chain inet exam input '{ type
    filter hook input priority 0 \; policy drop \; }'
  risk_level: medium
  bastion_prompt: 'secu VM에 ''inet exam'' 테이블과 policy drop의 input 체인을 만들어줘




    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-ai-week08/1/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/secops-ai-week08/1/syslog`
    후 (1)빈도·패턴 (2)MITRE (3)방어 3섹션. raw dump 금지.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
  fixtures:
  - generator: firewall_log
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/secops-ai-week08/1/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 2
  instruction: established,related 상태와 loopback 을 허용하시오.
  hint: ct state established,related accept; iifname lo accept
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM exam.input 체인에 established 연결과 loopback 허용 룰을 추가해줘

    📎 참고 (CLI): sudo nft add rule inet exam input ct state established,related accept
    && sudo nft add rule inet exam input iifname lo accept'
  answer_detail: '중간고사 — 방화벽 + IPS 구성 실기: established,related 상태와 loopback 을 허용하시오.'
  verify:
    type: output_contains
    expect: lo
    field: stdout
    semantic:
      intent: 'Stateful + loopback 허용 기본 룰 — sudo nft add rule inet exam input ct
        state established,related accept + sudo nft add rule inet exam input iifname
        lo accept. 2 룰을 && 로 순차 실행. Stateful firewall 의 표준 첫 룰 세트: 기존 연결 응답 허용 + localhost
        통신 허용. 이 없으면 많은 앱 오동작. w2 의 교훈 통합 적용'
      success_criteria:
      - ct state established,related accept 룰 추가
      - iifname lo accept 룰 추가
      - 2 룰 모두 실행
      acceptable_methods:
      - sudo nft add rule ... ct state established,related accept && sudo nft add
        rule ... iifname lo accept
      - '한 줄에 2 expression 결합: ct state established,related accept 후 iifname lo accept'
      - iptables -I INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
      - nft 로 base chain 에 기본 rule 배치
      - |
        **[OSS] nft (stateful + lo 표준 룰)** — Linux firewall 첫 룰 세트.
          # 1. 두 룰 순차 추가 (&& 로 둘 다 성공 보장)
          sudo nft add rule inet exam input ct state established,related accept && \
            sudo nft add rule inet exam input iifname lo accept
          # 2. 적용 검증
          sudo nft list chain inet exam input
          # 3. counter 추가 (어느 룰이 hit 되는지)
          sudo nft replace rule inet exam input handle 4 ct state established,related counter accept
        예상 출력 `chain input { ... ct state established,related accept / iifname "lo" accept }`.
        운영 해석: 모든 firewall 의 첫 2 룰. 누락 시 outbound 응답 모두 drop = 시스템 마비.
      - |
        **[OSS] conntrack-tools (state 동작 검증)** — stateful 의 ground truth.
          # 1. 현재 conntrack table (live state)
          sudo conntrack -L --any | head
          # 2. ESTABLISHED 만 필터
          sudo conntrack -L --state ESTABLISHED
          # 3. 신규 connection 실시간 monitor
          sudo conntrack -E -e new
          # 4. 통계
          sudo conntrack -S
        예상 출력 `tcp 6 ESTABLISHED src=10.20.30.201 dst=10.20.30.1 sport=44321 dport=22 [ASSURED] / Found 25 entries`.
        운영 해석: ct state established accept 룰의 *실효성* 측정. ESTABLISHED 가 0 이면 룰 무용.
      - |
        **[OSS] firewalld (zone 의 conntrack 자동)** — built-in.
          # firewalld 는 default 로 ct state established,related 자동 처리
          # 1. zone 정보 (built-in conntrack 확인)
          sudo firewall-cmd --info-zone=public | grep -i conn
          # 2. interface lo 처리
          sudo firewall-cmd --info-zone=trusted
          # firewalld 에서 lo 는 자동 trusted (별도 설정 X)
          # 3. 운영 시 권장: lo 트래픽 = trusted zone
          sudo firewall-cmd --permanent --zone=trusted --add-interface=lo
        예상 출력 `target: ACCEPT / interfaces: lo / services: ...`.
        운영 해석: firewalld 의 zone 모델 = nft 의 룰 자동 처리. 운영자 관리 부담 감소.
      - |
        **[OSS] ufw (loopback 자동)** — default.
          # ufw 는 default 로 lo 자동 허용
          # 1. ufw 상태
          sudo ufw status verbose | grep -i loopback
          # 2. /etc/ufw/before.rules 에 loopback 룰 자동 포함
          grep -A3 "loopback" /etc/ufw/before.rules
          # 3. 명시적 추가 (이미 있어도 idempotent)
          sudo ufw allow in on lo
          sudo ufw allow out on lo
        예상 출력 `Anywhere on lo                  ALLOW IN`.
        운영 해석: ufw 가 대부분 환경에서 lo 자동 허용. 명시적 추가는 audit 친화적.
      - |
        **[OSS] netstat / ss (loopback 트래픽 검증)** — IPC 의존성.
          # 1. lo 의 listening 서비스 (IPC 의존)
          sudo ss -tnlp | grep -E "127\.0\.0\.1|::1"
          # 2. 활성 lo connection
          sudo ss -tn | grep "127.0.0.1"
          # 3. lo 트래픽 통계
          ip -s link show lo
          # 4. lo 차단 시 영향 받을 서비스 사전 식별
          sudo lsof -i @127.0.0.1 -P -n | head
        예상 출력 `LISTEN 0 128 127.0.0.1:5432 ... (postgres) / LISTEN 0 128 127.0.0.1:6379 (redis)`.
        운영 해석: PostgreSQL/Redis 등 IPC 사용 서비스 식별. lo 차단 시 이런 서비스 통신 마비.
      negative_signs:
      - ct state 만 추가(loopback 누락)
      - NEW state 포함(과도한 허용)
      - iifname 오타
  target_vm: secu
  script: sudo nft add rule inet exam input ct state established,related accept &&
    sudo nft add rule inet exam input iifname lo accept
  risk_level: medium
  bastion_prompt: 'secu VM exam.input 체인에 established 연결과 loopback 허용 룰을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 소스 IP 10.20.30.0/24 에서 SSH(22) 를 허용하되 new 연결은 5/minute 로 제한하시오.
  hint: ip saddr 10.20.30.0/24 tcp dport 22 ct state new limit rate 5/minute accept
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM exam.input에 10.20.30.0/24에서 SSH new 연결을 5/minute로 제한하는
    룰을 추가해줘

    📎 참고 (CLI): sudo nft add rule inet exam input ip saddr 10.20.30.0/24 tcp dport
    22 ct state new limit rate 5/minute accept'
  answer_detail: '중간고사 — 방화벽 + IPS 구성 실기: 소스 IP 10.20.30.0/24 에서 SSH(22) 를 허용하되 new
    연결은 5/minute 로 제한하시오.'
  verify:
    type: output_contains
    expect: limit rate
    field: stdout
    semantic:
      intent: SSH rate-limited whitelist — sudo nft add rule inet exam input ip saddr
        10.20.30.0/24 tcp dport 22 ct state new limit rate 5/minute accept. 소스 CIDR
        제한(10.20.30.0/24 내부망) + ct state new(SYN) + rate 5/minute 으로 brute-force 방어.
        여러 expression 조합 = AND 조건. 내부망 외 SSH 시도는 자동 drop (policy drop 에 의해). established
        트래픽은 s2 룰로 이미 허용됨
      success_criteria:
      - ip saddr CIDR + tcp dport 22 + limit rate 조합
      - ct state new 조건
      - accept action
      acceptable_methods:
      - sudo nft add rule ... ip saddr 10.20.30.0/24 tcp dport 22 ct state new limit
        rate 5/minute accept
      - 'burst 옵션 추가: limit rate 5/minute burst 3 packets'
      - fail2ban 와 조합
      - 'set @trusted_ips 활용: ip saddr @trusted_ips tcp dport 22 accept'
      - iptables -m hashlimit --hashlimit 5/minute
      - |
        **[OSS] nft (rate-limited SSH whitelist)** — multi-condition 룰.
          # 1. 다중 조건 결합 (CIDR + port + state + rate)
          sudo nft add rule inet exam input \
              ip saddr 10.20.30.0/24 tcp dport 22 ct state new limit rate 5/minute accept
          # 2. burst 추가 (rate limit 시 일시 폭증 허용)
          sudo nft add rule inet exam input \
              ip saddr 10.20.30.0/24 tcp dport 22 ct state new limit rate 5/minute burst 3 packets accept
          # 3. counter + log 결합 (운영 감사)
          sudo nft add rule inet exam input \
              ip saddr 10.20.30.0/24 tcp dport 22 ct state new counter log prefix "SSH-RATE-OK " limit rate 5/minute accept
        예상 출력 `ip saddr 10.20.30.0/24 tcp dport 22 ct state new counter packets X bytes Y log prefix "SSH-RATE-OK " limit rate 5/minute accept`.
        운영 해석: AND 조건 결합. 5/min 초과 시 룰 미매칭 → policy drop. burst 3 = 5/min 평균 + 3 packets 즉시 허용.
      - |
        **[OSS] fail2ban (userspace SSH brute 차단)** — nft + 보완.
          # 1. /etc/fail2ban/jail.local
          sudo tee /etc/fail2ban/jail.d/sshd-nft.local << 'EOF'
          [sshd]
          enabled = true
          banaction = nftables-allports
          maxretry = 3
          findtime = 60
          bantime = 600
          EOF
          sudo systemctl restart fail2ban
          # 2. 차단 IP 목록
          sudo fail2ban-client status sshd
          # 3. nft set 자동 동기화
          sudo nft list set inet fail2ban f2b-sshd
        예상 출력 `Currently banned: 2 / IP list: 1.2.3.4 5.6.7.8`.
        운영 해석: nft rate limit (network layer) + fail2ban (application log layer) 이중 방어. 표준 패턴.
      - |
        **[OSS] crowdsec ssh-bf scenario** — community 차단.
          # 1. SSH brute scenario 활성화
          sudo cscli scenarios install crowdsecurity/ssh-bf crowdsecurity/ssh-slow-bf
          sudo systemctl restart crowdsec
          # 2. nft bouncer 와 자동 동기화
          sudo apt install crowdsec-firewall-bouncer-nftables
          sudo systemctl enable --now crowdsec-firewall-bouncer
          # 3. 결정 목록 (community + 본인 환경)
          sudo cscli decisions list --scenario crowdsecurity/ssh-bf
          # 4. nft set 자동 적재
          sudo nft list set inet crowdsec crowdsec-blacklists | wc -l
        예상 출력 `crowdsecurity/ssh-bf trigger / 50 known-bad IPs in nft set`.
        운영 해석: community-shared IOC 자동 반영. 단순 rate limit 외 *known-bad pre-block*.
      - |
        **[OSS] sshguard (가벼운 SSH 보호)** — fail2ban 대안.
          # 1. 설치
          sudo apt install sshguard
          # 2. nft backend 설정
          sudo tee -a /etc/sshguard/sshguard.conf << 'EOF'
          BACKEND="/usr/libexec/sshg-fw-nft-sets"
          THRESHOLD=30
          BLOCK_TIME=120
          DETECTION_TIME=1800
          EOF
          sudo systemctl restart sshguard
          # 3. 차단 IP 목록
          sudo nft list set inet sshguard attackers
          sudo journalctl -u sshguard | grep "Blocking"
        예상 출력 `Blocking 1.2.3.4:4 for >120secs`.
        운영 해석: fail2ban 대비 메모리 1/10. SSH 만 보호 시 권장.
      - |
        **[OSS] auditd (SSH 시도 audit)** — accountability.
          # 1. SSH 인증 시도 audit
          sudo auditctl -w /var/log/auth.log -p wa -k ssh_attempts
          # 2. 검색
          sudo ausearch -k ssh_attempts --start today | head
          # 3. SSH 실패 추출 + IP 별 통계
          sudo journalctl -u ssh --since today | grep "Failed password" | awk '{print $11}' | sort | uniq -c | sort -rn
        예상 출력 `12 attempts from 10.20.30.201 / 5 attempts from 192.168.1.5`.
        운영 해석: nft rate limit 가 차단해도 *SSH 인증 단계* 실패는 별도 audit. compliance 표준.
      negative_signs:
      - CIDR 생략(전체 허용)
      - rate 제한 없음
      - ct state new 없이(established 포함)
  target_vm: secu
  script: sudo nft add rule inet exam input ip saddr 10.20.30.0/24 tcp dport 22 ct
    state new limit rate 5/minute accept
  risk_level: medium
  bastion_prompt: 'secu VM exam.input에 10.20.30.0/24에서 SSH new 연결을 5/minute로 제한하는
    룰을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: icmp echo-request 를 허용하는 룰을 추가하시오.
  hint: icmp type echo-request accept
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM exam.input에 ICMP echo-request 허용 룰을 추가해줘

    📎 참고 (CLI): sudo nft add rule inet exam input icmp type echo-request accept'
  answer_detail: '중간고사 — 방화벽 + IPS 구성 실기: icmp echo-request 를 허용하는 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: echo-request
    field: stdout
    semantic:
      intent: 'ICMP echo-request 허용 — sudo nft add rule inet exam input icmp type
        echo-request accept. Ping 허용 룰. icmp type echo-request(type 8)은 요청, echo-reply(type
