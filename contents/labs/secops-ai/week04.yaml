lab_id: "secops-ai-week04"
title: "패치 관리 실습"
version: "ai"
course: "secops-ai"
week: 4
description: "리눅스 시스템의 패키지 업데이트와 보안 패치를 관리하는 프로세스를 실습합니다."
difficulty: "medium"
duration_minutes: 120
objectives:
  - "패키지 관리자를 활용한 보안 업데이트를 수행한다"
  - "패치 적용 전후 검증 프로세스를 이해한다"
  - "자동 업데이트 정책을 구성한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "10.20.30.1 서버에서 현재 설치된 패키지의 보안 업데이트 목록을 확인하시오."
    hint: "apt list --upgradable 또는 yum check-update를 사용하세요."
    category: "patch_mgmt"
    points: 8
    answer: "apt list --upgradable 2>/dev/null || yum check-update 2>/dev/null"
    answer_detail: "보안 업데이트 목록을 먼저 확인하여 적용 대상을 파악합니다."
    script: "ai_secops_analyze --week 4 --step 1 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 2
    instruction: "패키지 저장소 목록과 상태를 확인하시오."
    hint: "/etc/apt/sources.list를 확인하세요."
    category: "patch_mgmt"
    points: 8
    answer: "cat /etc/apt/sources.list 2>/dev/null && ls /etc/apt/sources.list.d/ 2>/dev/null || cat /etc/yum.repos.d/*.repo 2>/dev/null"
    answer_detail: "패키지 저장소 설정을 확인하여 보안 업데이트 소스가 올바르게 구성되어 있는지 점검합니다."
    script: "ai_secops_analyze --week 4 --step 2 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 3
    instruction: "패키지 데이터베이스를 최신 상태로 동기화하시오."
    hint: "apt update 또는 yum makecache를 사용하세요."
    category: "patch_mgmt"
    points: 8
    answer: "sudo apt update 2>/dev/null || sudo yum makecache 2>/dev/null"
    answer_detail: "패키지 DB를 동기화해야 최신 보안 패치 정보를 가져올 수 있습니다."
    script: "ai_secops_analyze --week 4 --step 3 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 4
    instruction: "특정 패키지(openssl)의 현재 버전과 최신 버전을 비교하시오."
    hint: "apt show 또는 dpkg -l을 사용하세요."
    category: "patch_mgmt"
    points: 10
    answer: "dpkg -l openssl 2>/dev/null && apt-cache policy openssl 2>/dev/null || rpm -qi openssl 2>/dev/null"
    answer_detail: "설치된 버전과 저장소의 최신 버전을 비교하여 업데이트 필요성을 판단합니다."
    script: "ai_secops_analyze --week 4 --step 4 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "openssl"
      field: "stdout"
  - order: 5
    instruction: "패치 적용 전 현재 시스템 상태를 스냅샷으로 기록하시오."
    hint: "패키지 목록과 커널 버전을 파일로 저장하세요."
    category: "patch_mgmt"
    points: 10
    answer: "dpkg -l > /tmp/pkg_before.txt 2>/dev/null && uname -r > /tmp/kernel_before.txt && echo '스냅샷 생성 완료'"
    answer_detail: "패치 적용 전 상태를 기록해두면 문제 발생 시 롤백 판단에 활용할 수 있습니다."
    script: "ai_secops_analyze --week 4 --step 5 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "스냅샷 생성 완료"
      field: "stdout"
  - order: 6
    instruction: "보안 업데이트만 선별적으로 설치하시오."
    hint: "unattended-upgrade 또는 --security 옵션을 사용하세요."
    category: "patch_mgmt"
    points: 12
    answer: "sudo apt-get upgrade -s 2>/dev/null | head -20 || echo '시뮬레이션 완료'"
    answer_detail: "-s 옵션은 시뮬레이션(dry-run)으로, 실제 설치 없이 어떤 패키지가 업데이트되는지 확인합니다."
    script: "ai_secops_analyze --week 4 --step 6 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 7
    instruction: "커널 버전을 확인하고 사용 가능한 커널 업데이트가 있는지 확인하시오."
    hint: "uname -r과 패키지 검색을 사용하세요."
    category: "patch_mgmt"
    points: 10
    answer: "uname -r && apt-cache search linux-image 2>/dev/null | tail -5"
    answer_detail: "커널 업데이트는 재부팅이 필요하므로 유지보수 창에서 수행해야 합니다."
    script: "ai_secops_analyze --week 4 --step 7 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 8
    instruction: "unattended-upgrades 패키지를 설치하고 자동 보안 업데이트를 구성하시오."
    hint: "apt install unattended-upgrades를 사용하세요."
    category: "auto_update"
    points: 12
    answer: "dpkg -l unattended-upgrades 2>/dev/null || echo 'unattended-upgrades 확인' && cat /etc/apt/apt.conf.d/50unattended-upgrades 2>/dev/null | head -20"
    answer_detail: "unattended-upgrades는 데비안/우분투에서 보안 패치를 자동으로 설치하는 도구입니다."
    script: "ai_secops_analyze --week 4 --step 8 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 9
    instruction: "자동 업데이트 스케줄을 확인하고 매일 새벽 3시에 실행되도록 설정하시오."
    hint: "/etc/apt/apt.conf.d/20auto-upgrades를 확인하세요."
    category: "auto_update"
    points: 10
    answer: "cat /etc/apt/apt.conf.d/20auto-upgrades 2>/dev/null || echo 'APT::Periodic::Update-Package-Lists \"1\";' | sudo tee /etc/apt/apt.conf.d/20auto-upgrades"
    answer_detail: "APT::Periodic 설정으로 패키지 목록 갱신과 자동 업데이트 주기를 제어합니다."
    script: "ai_secops_analyze --week 4 --step 9 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "Periodic"
      field: "stdout"
  - order: 10
    instruction: "특정 패키지(nginx)를 현재 버전에서 고정(hold)하여 자동 업데이트를 방지하시오."
    hint: "apt-mark hold 명령을 사용하세요."
    category: "patch_mgmt"
    points: 10
    answer: "sudo apt-mark hold nginx 2>/dev/null || echo 'nginx hold 설정' && apt-mark showhold 2>/dev/null"
    answer_detail: "운영 중인 서비스의 패키지를 hold하면 의도치 않은 업데이트를 방지할 수 있습니다. 테스트 후 unhold로 해제합니다."
    script: "ai_secops_analyze --week 4 --step 10 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 11
    instruction: "최근 적용된 패치 이력을 확인하시오."
    hint: "/var/log/dpkg.log 또는 /var/log/apt/를 확인하세요."
    category: "patch_audit"
    points: 10
    answer: "grep ' install\\| upgrade' /var/log/dpkg.log 2>/dev/null | tail -20 || echo '패치 이력 확인'"
    answer_detail: "dpkg.log에는 모든 패키지 설치/업그레이드/제거 이력이 기록됩니다."
    script: "ai_secops_analyze --week 4 --step 11 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 12
    instruction: "CVE 기반으로 특정 취약점 패치 여부를 확인하시오."
    hint: "apt changelog 또는 패키지 변경 로그를 확인하세요."
    category: "patch_audit"
    points: 12
    answer: "apt changelog openssl 2>/dev/null | head -30 || echo 'CVE 패치 이력 확인'"
    answer_detail: "패키지 변경 로그에서 CVE 번호를 검색하여 특정 취약점이 패치되었는지 확인할 수 있습니다."
    script: "ai_secops_analyze --week 4 --step 12 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 13
    instruction: "재부팅이 필요한 패치가 있는지 확인하시오."
    hint: "/var/run/reboot-required 파일을 확인하세요."
    category: "patch_mgmt"
    points: 8
    answer: "test -f /var/run/reboot-required && cat /var/run/reboot-required || echo '재부팅 불필요'"
    answer_detail: "커널 업데이트 등 일부 패치는 적용을 위해 재부팅이 필요합니다. 이 파일의 존재 여부로 확인할 수 있습니다."
    script: "ai_secops_analyze --week 4 --step 13 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 14
    instruction: "패치 적용 후 시스템 상태를 비교하는 차이점 보고서를 생성하시오."
    hint: "패치 전 스냅샷과 현재 상태를 비교하세요."
    category: "patch_audit"
    points: 12
    answer: "dpkg -l > /tmp/pkg_after.txt 2>/dev/null && diff /tmp/pkg_before.txt /tmp/pkg_after.txt 2>/dev/null | head -20 || echo '변경 없음'"
    answer_detail: "패치 전후 비교로 실제 변경된 패키지를 확인하고 문서화합니다."
    script: "ai_secops_analyze --week 4 --step 14 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
  - order: 15
    instruction: "패치 관리 종합 보고서를 생성하시오: 현재 패키지 수, 보안 업데이트 수, 커널 버전, 마지막 업데이트 일시."
    hint: "여러 명령의 출력을 조합하세요."
    category: "verification"
    points: 10
    answer: "echo '=== 패치 관리 보고서 ===' && echo \"패키지 수: $(dpkg -l 2>/dev/null | grep ^ii | wc -l)\" && echo \"커널: $(uname -r)\" && echo \"마지막 업데이트: $(stat -c %y /var/cache/apt/pkgcache.bin 2>/dev/null | cut -d. -f1)\" && echo '=== 보고서 완료 ==='"
    answer_detail: "정기적인 패치 관리 보고서는 보안 컴플라이언스의 핵심 증빙입니다."
    script: "ai_secops_analyze --week 4 --step 15 --target 10.20.30.0/24 --mode ai-assisted"
    verify:
      type: "output_contains"
      expect: "보고서 완료"
      field: "stdout"
