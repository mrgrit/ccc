lab_id: secops-ai-week04
title: Suricata IPS 설치·구성 (AI 지원)
version: ai
course: secops-ai
week: 4
description: Suricata의 기본 설정, 인터페이스·규칙 경로, 초기 동작을 확인하고 기본 룰로 간단한 탐지를 수행한다.
difficulty: easy
duration_minutes: 120
objectives:
- Suricata 서비스 설치·구성 상태를 확인할 수 있다
- suricata.yaml의 HOME_NET, 인터페이스 설정을 이해한다
- 간단한 테스트 룰로 eve.json에 알람이 기록되는 것을 검증할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 Suricata가 설치되어 있는지 확인하시오.
  hint: suricata -V
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 Suricata 설치 버전을 확인해줘

    📎 참고 (CLI): suricata -V 2>&1 | head'
  answer_detail: 'Suricata IPS 설치·구성: secu VM에 Suricata가 설치되어 있는지 확인하시오.'
  verify:
    type: output_contains
    expect: Suricata
    field: stdout
    semantic:
      intent: 'Suricata 설치·버전 확인 — suricata -V 로 버전 출력 (Suricata version 6.0.x 또는
        7.0.x). 버전 차이: 6.0 은 rust 통합, 7.0 은 afxdp·dataset 개선. 메이저 버전별 지원 기능(JA3·http2·eBPF
        XDP) 차이 있음. -V 로 간단 확인, suricata --build-info 로 컴파일 옵션(enable-af-packet, enable-hyperscan)
        상세'
      success_criteria:
      - suricata -V 또는 --version 실행
      - Suricata 문자열 포함
      - 버전 숫자 출력
      acceptable_methods:
      - suricata -V
      - suricata --build-info (상세)
      - dpkg -l suricata 또는 rpm -q suricata
      - systemctl show suricata --property=Version
      - apt policy suricata
      - |
        **[OSS] suricata --build-info** — 컴파일 옵션 + 라이브러리 의존성 진단.
          # 1. build 정보 전체
          suricata --build-info | head -30
          # 2. 핵심 옵션 grep
          suricata --build-info | grep -E "AF_PACKET|HYPERSCAN|LUA|RUST"
          # 3. CPU SIMD 지원 (성능 영향)
          suricata --build-info | grep -E "SIMD|hyperscan"
        예상 출력 `Suricata version 7.0.4 / Features: AF_PACKET HYPERSCAN PCRE2_JIT RUST / Hyperscan support: yes`.
        운영 해석: HYPERSCAN=yes 면 PCRE 매칭 5-10x 빠름. RUST=yes 면 modern protocol parser. 설치 환경 성능 baseline.
      - |
        **[OSS] dpkg / apt (Debian 패키지 메타정보)** — 설치 출처 + 의존성.
          # 1. 설치된 버전 + 출처
          dpkg -l suricata | grep '^ii'
          # 2. 패키지 의존성 트리
          apt-cache depends suricata
          # 3. 설치 파일 목록 (config / binary 위치 확인)
          dpkg -L suricata | head -10
          # 4. 패키지 release date
          apt show suricata 2>/dev/null | grep -E "Version|Origin|Maintainer"
        예상 출력 `ii  suricata  1:7.0.4-1   amd64   Next Generation Intrusion Detection ... / Origin: Debian / Maintainer: Pierre Chifflier`.
        운영 해석: 공식 repo (Debian) vs OISF PPA 출처 차이. PPA 가 더 신규 버전 (7.x) 제공 — 실무 권장.
      - |
        **[OSS] systemctl show (systemd unit 상세)** — service 메타 점검.
          # 1. 핵심 properties
          systemctl show suricata --property=Version,FragmentPath,ExecStart,LoadState
          # 2. unit 파일 직접 view
          systemctl cat suricata
          # 3. 환경 변수 + drop-in
          systemctl show suricata --property=Environment,DropInPaths
        예상 출력 `FragmentPath=/lib/systemd/system/suricata.service / ExecStart=...suricata -c /etc/suricata/suricata.yaml --pidfile /run/suricata.pid -i ens33`.
        운영 해석: ExecStart 의 -i 옵션이 캡처 인터페이스 결정. 잘못 지정 시 트래픽 캡처 못함.
      - |
        **[OSS] OISF suricata-update** — 룰 + 버전 통합 관리 표준.
          # 1. 도구 자체 버전
          suricata-update --version
          # 2. 호환 가능한 Suricata 엔진 버전 확인
          suricata-update list-sources --enabled | head
          # 3. 신규 버전 업그레이드 가능 여부 (apt 우회)
          curl -s https://oisf-pkg-mirror.s3.amazonaws.com/Release | grep -E "Version|Suite"
        예상 출력 `suricata-update 1.3.0 / Source: et/open / Version: 7.0.x compatible`.
        운영 해석: 룰 source 와 Suricata 엔진 버전 호환성 확인. 7.x 룰을 6.x 엔진에 적용 시 일부 keyword 무효.
      - |
        **[OSS] OPNsense / pfSense Suricata plugin** — production GUI 환경.
          # OPNsense web UI 기준
          # 1. Services → Intrusion Detection → Administration
          # 2. 우상단 버전 표시 (예: 7.0.5)
          # 3. CLI 검증 (BSD)
          pkg info suricata
          ssh root@opnsense
          /usr/local/etc/rc.d/suricata onestatus
        결과: GUI 의 "Suricata 7.0.5 / Engine: ON / Logger: ON" status panel.
        운영 해석: enterprise firewall appliance 표준. nft + Suricata 통합 관리. lab 환경의 Linux Suricata 와 동일 엔진 다른 frontend.
      negative_signs:
      - 패키지 매니저만 확인(실행파일 아님)
      - 다른 IDS(Snort) 버전 확인
      - Suricata 문자열 없이 숫자만
  target_vm: secu
  script: suricata -V 2>&1 | head
  risk_level: low
  bastion_prompt: secu VM의 Suricata 설치 버전을 확인해줘
- order: 2
  instruction: /etc/suricata/suricata.yaml 에서 HOME_NET 값을 확인하시오.
  hint: grep HOME_NET /etc/suricata/suricata.yaml
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata.yaml에서 HOME_NET 설정을 확인해줘

    📎 참고 (CLI): grep -n HOME_NET /etc/suricata/suricata.yaml | head'
  answer_detail: 'Suricata IPS 설치·구성: /etc/suricata/suricata.yaml 에서 HOME_NET 값을 확인하시오.'
  verify:
    type: output_contains
    expect: HOME_NET
    field: stdout
    semantic:
      intent: 'HOME_NET 변수 확인 — grep -n HOME_NET /etc/suricata/suricata.yaml | head.
        HOME_NET 은 내부 네트워크 CIDR 정의(예: [10.20.30.0/24, 192.168.0.0/16]) — inbound/outbound
        방향 판단 기준. 잘못 설정 시 룰의 $HOME_NET 이 모든 트래픽 매칭 또는 트래픽 누락. EXTERNAL_NET 은 보통 !$HOME_NET.
        vars section 에 함께 정의됨'
      success_criteria:
      - grep HOME_NET suricata.yaml 실행
      - HOME_NET 변수값 출력(CIDR)
      - line number(-n) 또는 context 포함
      acceptable_methods:
      - grep -n HOME_NET /etc/suricata/suricata.yaml
      - yq .vars.address-groups.HOME_NET suricata.yaml
      - sed -n /vars:/,/^ *[^ ]/p suricata.yaml
      - suricata --dump-config | grep HOME_NET
      - |
        **[OSS] yq (YAML 정밀 query)** — yaml 파싱 표준.
          # 1. yq 설치
          sudo snap install yq    # 또는 pip install yq
          # 2. HOME_NET 값만 추출
          sudo yq '.vars.address-groups.HOME_NET' /etc/suricata/suricata.yaml
          # 3. 모든 address-groups 변수 dump
          sudo yq '.vars.address-groups' /etc/suricata/suricata.yaml
          # 4. 수정 (in-place)
          sudo yq -i '.vars.address-groups.HOME_NET = "[10.20.30.0/24]"' /etc/suricata/suricata.yaml
        예상 출력 `"[10.20.30.0/24, 192.168.1.0/24]"`.
        운영 해석: grep 보다 정확. multi-line CIDR 리스트도 한 번에. CI/CD pipeline 의 config validation 표준.
      - |
        **[OSS] suricata --dump-config** — 런타임 사용 중인 모든 설정 dump.
          # 1. 전체 설정 (hierarchical)
          sudo suricata --dump-config 2>&1 | head -50
          # 2. HOME_NET 만 grep
          sudo suricata --dump-config 2>&1 | grep -i home-net
          # 3. var 전체 (vars+address-groups+port-groups)
          sudo suricata --dump-config 2>&1 | grep -E "vars\.|address-group|port-group"
        예상 출력 `vars.address-groups.HOME_NET = [10.20.30.0/24]`.
        운영 해석: yaml 파일 + override 합쳐진 *진짜 적용된* 값. trouble shoot 시 yaml 과 비교 검증.
      - |
        **[OSS] scirius (web GUI)** — Suricata 룰/설정 통합 관리 OSS.
          # 1. SELKS 배포판에 포함 (또는 docker)
          docker run -d -p 8000:8000 stamus/scirius
          # 2. https://scirius:8000/appliances/suricata 접속
          # 3. UI: Sources → suricata.yaml → Vars → HOME_NET 시각 편집
          # 4. SSH ruleset push (변경 시 자동 반영)
        UI 동작: HOME_NET 의 CIDR 리스트를 GUI 로 추가/삭제. 변경 시 git history 자동 commit.
        운영 해석: enterprise 환경 표준. multi-host Suricata 통합 관리.
      - |
        **[OSS] Ansible (community.general.suricata 모듈)** — IaC 표준.
          # playbook
          - name: Set Suricata HOME_NET
            ansible.builtin.lineinfile:
              path: /etc/suricata/suricata.yaml
              regexp: '^(\s*HOME_NET:)\s*'
              line: '    HOME_NET: "[10.20.30.0/24]"'
              backup: yes
              validate: 'suricata -T -c %s'
            notify: restart suricata
          # 실행
          ansible-playbook -i inventory.yml suricata-config.yml --diff
        예상 출력 `changed: [secu] / -- HOME_NET: ... / ++ HOME_NET: [10.20.30.0/24]`.
        운영 해석: validate 옵션이 핵심 — 잘못된 yaml 적용 후 service 다운 방지. backup 으로 롤백 가능.
      - |
        **[OSS] suricata.yaml validator (외부 lint)** — yamllint + 커스텀 규칙.
          # 1. yamllint 기본 검사
          yamllint /etc/suricata/suricata.yaml
          # 2. 사용자 정의 규칙 (.yamllint)
          cat > .yamllint << 'EOF'
          extends: default
          rules:
            line-length: { max: 200 }
            indentation: { spaces: 2 }
          EOF
          # 3. CI 통합 (GitLab CI 예시)
          # script:
          #   - yamllint suricata.yaml
          #   - suricata -T -c suricata.yaml
        예상 출력 `12:5 warning trailing spaces (trailing-spaces) / 24:81 error line too long (line-length)`.
        운영 해석: yaml syntax 가 valid 해도 indentation 오류는 변수 무효화. CI 표준 lint.
      negative_signs:
      - HOME_NET 검색 없이 전체 yaml 출력
      - HTTP_PORTS 등 다른 변수
      - CIDR 형식 아닌 hostname
  target_vm: secu
  script: grep -n HOME_NET /etc/suricata/suricata.yaml | head
  risk_level: low
  bastion_prompt: secu VM의 suricata.yaml에서 HOME_NET 설정을 확인해줘
- order: 3
  instruction: Suricata가 사용 중인 네트워크 인터페이스(af-packet section)를 확인하시오.
  hint: awk '/af-packet/,/pcap/' /etc/suricata/suricata.yaml
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata.yaml에서 af-packet 설정을 확인해줘

    📎 참고 (CLI): awk ''/af-packet/,/pcap:/'' /etc/suricata/suricata.yaml | head -15'
  answer_detail: 'Suricata IPS 설치·구성: Suricata가 사용 중인 네트워크 인터페이스(af-packet section)를
    확인하시오.'
  verify:
    type: output_contains
    expect: interface
    field: stdout
    semantic:
      intent: 'af-packet capture interface 확인 — awk /af-packet/,/pcap:/ /etc/suricata/suricata.yaml
        | head -15 로 af-packet 블록 출력. af-packet 은 Linux kernel AF_PACKET socket 기반
        high-performance 캡처. interface: eth0(또는 ens33), cluster-id, cluster-type(cluster_flow
        로 멀티 스레드 흐름 해시), tpacket-v3 활성화로 zero-copy 처리. threads: 수 조정으로 CPU 병렬화'
      success_criteria:
      - af-packet 블록 출력
      - interface 또는 cluster-id 키워드
      - interface 지정 확인(ens33/eth0)
      acceptable_methods:
      - awk /af-packet/,/pcap:/ suricata.yaml
      - sed -n /af-packet:/,/^[^ ]/p suricata.yaml
      - yq .af-packet suricata.yaml
      - suricata --list-runmodes 로 캡처 모드 확인
      - ip link show 로 사용 가능한 NIC 확인
      - |
        **[OSS] yq (af-packet 블록 정밀 추출)** — yaml hierarchical query.
          # 1. af-packet 블록 전체
          sudo yq '.["af-packet"]' /etc/suricata/suricata.yaml
          # 2. 첫 인터페이스의 cluster-type
          sudo yq '.["af-packet"][0].interface' /etc/suricata/suricata.yaml
          sudo yq '.["af-packet"][0]."cluster-type"' /etc/suricata/suricata.yaml
          # 3. threads 설정 (CPU 병렬)
          sudo yq '.["af-packet"][] | select(.threads != null) | .threads' /etc/suricata/suricata.yaml
        예상 출력 `interface: ens33 / cluster-type: cluster_flow / threads: auto`.
        운영 해석: `cluster_flow` = 흐름 별 hash 로 thread 분배 (대부분 환경 권장). threads=auto = nproc 대로.
      - |
        **[OSS] ethtool (NIC 능력 진단)** — Suricata 캡처 성능 결정.
          # 1. 인터페이스 link 정보
          sudo ethtool ens33
          # 2. RX/TX queue 수 (multi-queue NIC)
          sudo ethtool -l ens33
          # 3. ring buffer 크기 (드롭 방지)
          sudo ethtool -g ens33
          # 4. offload 상태 (TSO/LRO 등 — Suricata 와 충돌 가능)
          sudo ethtool -k ens33 | grep -E "tcp-segmentation-offload|large-receive-offload"
          # 5. driver 정보
          sudo ethtool -i ens33
        예상 출력 `Speed: 1000Mb/s / Duplex: Full / Combined: 4 / RX: 256 ... / large-receive-offload: on`.
        운영 해석: LRO=on 이면 Suricata 가 TCP reassembly 잘못 인식. `sudo ethtool -K ens33 lro off` 로 끄기 권장. RX ring buffer 256 = SYN flood 시 부족, 4096 권장.
      - |
        **[OSS] dmesg (NIC driver 메시지)** — 하드웨어 레벨 진단.
          # 1. NIC 관련 최근 로그
          sudo dmesg -T | grep -i ens33 | tail -10
          # 2. NIC 에러 (frame drops, link flap)
          sudo dmesg -T | grep -iE "ens33.*error|tx full|rx full"
          # 3. 부팅 시 driver 로드
          sudo dmesg | grep -i e1000
        예상 출력 `[Tue May  6 14:00:00] e1000 0000:02:01.0 ens33: NIC Link is Up 1000 Mbps`.
        운영 해석: link flap 자주 발생 시 Suricata 캡처 단절. driver bug 또는 케이블 이슈 진단 표준.
      - |
        **[OSS] ip link / ip -s (인터페이스 통계)** — drop 카운터 모니터링.
          # 1. 인터페이스 목록 + 상태
          ip -br link show
          # 2. statistics (RX/TX bytes/packets/errors/drops)
          ip -s link show ens33
          # 3. 실시간 (1초 간격)
          watch -n 1 "ip -s link show ens33"
        예상 출력 `RX: bytes packets errors dropped overrun mcast / 12345678 6789 0 0 0 ... `.
        운영 해석: dropped > 0 면 Suricata thread 부족 또는 NIC ring buffer 부족. errors > 0 면 ethtool -k 의 offload 설정 점검.
      - |
        **[OSS] suricata --list-runmodes** — 사용 가능 캡처 모드.
          # 1. 모든 runmode 표시
          suricata --list-runmodes
          # 2. af-packet 의 사용 가능한 runmode
          suricata --list-runmodes 2>&1 | grep -A1 af-packet
          # 3. 현재 실행 중 runmode 확인
          ps aux | grep suricata | grep -- "-q\|-i\|--af-packet"
        예상 출력 `af-packet runmodes: workers / autofp / single ...` (af-packet 의 3 모드).
        운영 해석: `workers` 모드 = 모든 thread 가 RX-side queue 처리 (성능 최고). `autofp` = flow pinning 자동. 일반 환경 workers 권장.
      negative_signs:
      - pcap 블록 출력(af-packet 아님)
      - interface 값 확인 없음
      - cluster-type 오타
  target_vm: secu
  script: awk '/af-packet/,/pcap:/' /etc/suricata/suricata.yaml | head -15
  risk_level: low
  bastion_prompt: secu VM의 suricata.yaml에서 af-packet 설정을 확인해줘
- order: 4
  instruction: /etc/suricata/rules/local.rules 에 'alert icmp any any -> any any (msg:"ICMP
    ping"; sid:1000001; rev:1;)' 룰을 추가하시오.
  hint: echo … | sudo tee -a
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata local.rules에 ICMP ping 탐지 룰(sid 1000001)을 추가해줘

    📎 참고 (CLI): echo ''alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001;
    rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata IPS 설치·구성: /etc/suricata/rules/local.rules 에 ''alert icmp
    any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)'' 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: ICMP
    field: stdout
    semantic:
      intent: 'Custom Suricata rule 추가 — echo alert icmp any any -> any any (msg:
        ICMP ping ; sid:1000001; rev:1;) | sudo tee -a /etc/suricata/rules/local.rules.
        Suricata rule 구조: action(alert/drop/reject/pass) + protocol + src_ip src_port
        -> dst_ip dst_port + options(msg/sid/rev/classtype/content/threshold). sid
        1000000+ 범위는 local custom 예약. ICMP 는 포트 없어서 any any'
      success_criteria:
      - local.rules 에 룰 추가(tee -a)
      - alert icmp + sid 1000001 포함
      - 완전한 룰 문법 준수
      acceptable_methods:
      - echo alert icmp ... | sudo tee -a /etc/suricata/rules/local.rules
      - cat >> /etc/suricata/rules/local.rules <<EOF ... EOF
      - vim + append 수동 편집
      - ansible lineinfile 모듈
      - suricata-update 로 sources 추가(outofbox 룰)
      - |
        **[OSS] suricata-update + custom source** — 룰 source 등록 + 자동 fetch.
          # 1. 로컬 디렉토리를 source 로 등록
          sudo mkdir -p /var/lib/suricata/rules-custom
          sudo tee /etc/suricata/update.yaml << 'EOF'
          sources:
            - name: local-icmp
              url: file:///var/lib/suricata/rules-custom/local.rules
          EOF
          # 2. 커스텀 룰 작성 + 적용
          echo 'alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)' | \
