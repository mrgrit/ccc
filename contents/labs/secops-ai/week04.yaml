lab_id: secops-ai-week04
title: Suricata IPS 설치·구성 (AI 지원)
version: ai
course: secops-ai
week: 4
description: Suricata의 기본 설정, 인터페이스·규칙 경로, 초기 동작을 확인하고 기본 룰로 간단한 탐지를 수행한다.
difficulty: easy
duration_minutes: 120
objectives:
- Suricata 서비스 설치·구성 상태를 확인할 수 있다
- suricata.yaml의 HOME_NET, 인터페이스 설정을 이해한다
- 간단한 테스트 룰로 eve.json에 알람이 기록되는 것을 검증할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 Suricata가 설치되어 있는지 확인하시오.
  hint: suricata -V
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 Suricata 설치 버전을 확인해줘

    📎 참고 (CLI): suricata -V 2>&1 | head'
  answer_detail: 'Suricata IPS 설치·구성: secu VM에 Suricata가 설치되어 있는지 확인하시오.'
  verify:
    type: output_contains
    expect: Suricata
    field: stdout
    semantic:
      intent: 'Suricata 설치·버전 확인 — suricata -V 로 버전 출력 (Suricata version 6.0.x 또는 7.0.x). 버전 차이: 6.0 은
        rust 통합, 7.0 은 afxdp·dataset 개선. 메이저 버전별 지원 기능(JA3·http2·eBPF XDP) 차이 있음. -V 로 간단 확인, suricata
        --build-info 로 컴파일 옵션(enable-af-packet, enable-hyperscan) 상세'
      success_criteria:
      - suricata -V 또는 --version 실행
      - Suricata 문자열 포함
      - 버전 숫자 출력
      acceptable_methods:
      - suricata -V
      - suricata --build-info (상세)
      - dpkg -l suricata 또는 rpm -q suricata
      - systemctl show suricata --property=Version
      - apt policy suricata
      negative_signs:
      - 패키지 매니저만 확인(실행파일 아님)
      - 다른 IDS(Snort) 버전 확인
      - Suricata 문자열 없이 숫자만
  target_vm: secu
  script: suricata -V 2>&1 | head
  risk_level: low
  bastion_prompt: secu VM의 Suricata 설치 버전을 확인해줘
- order: 2
  instruction: /etc/suricata/suricata.yaml 에서 HOME_NET 값을 확인하시오.
  hint: grep HOME_NET /etc/suricata/suricata.yaml
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata.yaml에서 HOME_NET 설정을 확인해줘

    📎 참고 (CLI): grep -n HOME_NET /etc/suricata/suricata.yaml | head'
  answer_detail: 'Suricata IPS 설치·구성: /etc/suricata/suricata.yaml 에서 HOME_NET 값을 확인하시오.'
  verify:
    type: output_contains
    expect: HOME_NET
    field: stdout
    semantic:
      intent: 'HOME_NET 변수 확인 — grep -n HOME_NET /etc/suricata/suricata.yaml | head. HOME_NET 은 내부 네트워크
        CIDR 정의(예: [10.20.30.0/24, 192.168.0.0/16]) — inbound/outbound 방향 판단 기준. 잘못 설정 시 룰의 $HOME_NET
        이 모든 트래픽 매칭 또는 트래픽 누락. EXTERNAL_NET 은 보통 !$HOME_NET. vars section 에 함께 정의됨'
      success_criteria:
      - grep HOME_NET suricata.yaml 실행
      - HOME_NET 변수값 출력(CIDR)
      - line number(-n) 또는 context 포함
      acceptable_methods:
      - grep -n HOME_NET /etc/suricata/suricata.yaml
      - yq .vars.address-groups.HOME_NET suricata.yaml
      - sed -n /vars:/,/^ *[^ ]/p suricata.yaml
      - suricata --dump-config | grep HOME_NET
      negative_signs:
      - HOME_NET 검색 없이 전체 yaml 출력
      - HTTP_PORTS 등 다른 변수
      - CIDR 형식 아닌 hostname
  target_vm: secu
  script: grep -n HOME_NET /etc/suricata/suricata.yaml | head
  risk_level: low
  bastion_prompt: secu VM의 suricata.yaml에서 HOME_NET 설정을 확인해줘
- order: 3
  instruction: Suricata가 사용 중인 네트워크 인터페이스(af-packet section)를 확인하시오.
  hint: awk '/af-packet/,/pcap/' /etc/suricata/suricata.yaml
  category: survey
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata.yaml에서 af-packet 설정을 확인해줘

    📎 참고 (CLI): awk ''/af-packet/,/pcap:/'' /etc/suricata/suricata.yaml | head -15'
  answer_detail: 'Suricata IPS 설치·구성: Suricata가 사용 중인 네트워크 인터페이스(af-packet section)를 확인하시오.'
  verify:
    type: output_contains
    expect: interface
    field: stdout
    semantic:
      intent: 'af-packet capture interface 확인 — awk /af-packet/,/pcap:/ /etc/suricata/suricata.yaml |
        head -15 로 af-packet 블록 출력. af-packet 은 Linux kernel AF_PACKET socket 기반 high-performance 캡처.
        interface: eth0(또는 ens33), cluster-id, cluster-type(cluster_flow 로 멀티 스레드 흐름 해시), tpacket-v3 활성화로
        zero-copy 처리. threads: 수 조정으로 CPU 병렬화'
      success_criteria:
      - af-packet 블록 출력
      - interface 또는 cluster-id 키워드
      - interface 지정 확인(ens33/eth0)
      acceptable_methods:
      - awk /af-packet/,/pcap:/ suricata.yaml
      - sed -n /af-packet:/,/^[^ ]/p suricata.yaml
      - yq .af-packet suricata.yaml
      - suricata --list-runmodes 로 캡처 모드 확인
      - ip link show 로 사용 가능한 NIC 확인
      negative_signs:
      - pcap 블록 출력(af-packet 아님)
      - interface 값 확인 없음
      - cluster-type 오타
  target_vm: secu
  script: awk '/af-packet/,/pcap:/' /etc/suricata/suricata.yaml | head -15
  risk_level: low
  bastion_prompt: secu VM의 suricata.yaml에서 af-packet 설정을 확인해줘
- order: 4
  instruction: /etc/suricata/rules/local.rules 에 'alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001;
    rev:1;)' 룰을 추가하시오.
  hint: echo … | sudo tee -a
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata local.rules에 ICMP ping 탐지 룰(sid 1000001)을 추가해줘

    📎 참고 (CLI): echo ''alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)'' | sudo tee
    -a /etc/suricata/rules/local.rules'
  answer_detail: 'Suricata IPS 설치·구성: /etc/suricata/rules/local.rules 에 ''alert icmp any any -> any any
    (msg:"ICMP ping"; sid:1000001; rev:1;)'' 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: ICMP
    field: stdout
    semantic:
      intent: 'Custom Suricata rule 추가 — echo alert icmp any any -> any any (msg: ICMP ping ; sid:1000001;
        rev:1;) | sudo tee -a /etc/suricata/rules/local.rules. Suricata rule 구조: action(alert/drop/reject/pass)
        + protocol + src_ip src_port -> dst_ip dst_port + options(msg/sid/rev/classtype/content/threshold).
        sid 1000000+ 범위는 local custom 예약. ICMP 는 포트 없어서 any any'
      success_criteria:
      - local.rules 에 룰 추가(tee -a)
      - alert icmp + sid 1000001 포함
      - 완전한 룰 문법 준수
      acceptable_methods:
      - echo alert icmp ... | sudo tee -a /etc/suricata/rules/local.rules
      - cat >> /etc/suricata/rules/local.rules <<EOF ... EOF
      - vim + append 수동 편집
      - ansible lineinfile 모듈
      - suricata-update 로 sources 추가(outofbox 룰)
      negative_signs:
      - sid 중복(1000001 이 다른 룰과 충돌)
      - 쌍따옴표 이스케이프 실수
      - rev 누락(권장 필드)
  target_vm: secu
  script: echo 'alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: medium
  bastion_prompt: secu VM의 suricata local.rules에 ICMP ping 탐지 룰(sid 1000001)을 추가해줘
- order: 5
  instruction: local.rules 가 suricata.yaml의 rule-files 섹션에 포함되어 있는지 확인하시오.
  hint: grep local.rules /etc/suricata/suricata.yaml
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata.yaml에 local.rules가 참조되어 있는지 확인해줘

    📎 참고 (CLI): grep -n local.rules /etc/suricata/suricata.yaml || echo ''not referenced'''
  answer_detail: 'Suricata IPS 설치·구성: local.rules 가 suricata.yaml의 rule-files 섹션에 포함되어 있는지 확인하시오.'
  verify:
    type: output_contains
    expect: local.rules
    field: stdout
    semantic:
      intent: 'local.rules 참조 확인 — grep -n local.rules /etc/suricata/suricata.yaml || echo not referenced.
        default-rule-path + rule-files 섹션에 local.rules 항목 있어야 로드됨. rule-files: - suricata.rules - local.rules
        형태 YAML 리스트. 미참조 시 Suricata 재시작해도 custom 룰 적용 안 됨. || echo 로 grep no match(exit 1) 시 명확한 출력 제공'
      success_criteria:
      - grep local.rules suricata.yaml 실행
      - local.rules 참조 라인 출력 또는 not referenced
      - line number 포함(-n)
      acceptable_methods:
      - grep -n local.rules suricata.yaml
      - yq .rule-files[] suricata.yaml | grep local
      - awk /rule-files:/,/^[^ -]/ suricata.yaml
      - suricata --list-rulefiles 또는 --dump-config | grep rule
      negative_signs:
      - rule-files section 위치 확인 없이 단순 grep
      - 참조 없을 때 판정 누락
      - 다른 파일(default-rule-path) 오해
  target_vm: secu
  script: grep -n local.rules /etc/suricata/suricata.yaml || echo 'not referenced'
  risk_level: low
  bastion_prompt: secu VM의 suricata.yaml에 local.rules가 참조되어 있는지 확인해줘
- order: 6
  instruction: Suricata 설정 파일 문법을 --test-config 로 검증하시오.
  hint: suricata -T -c /etc/suricata/suricata.yaml
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 suricata -T로 설정 파일 문법 검증을 해줘

    📎 참고 (CLI): sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5'
  answer_detail: 'Suricata IPS 설치·구성: Suricata 설정 파일 문법을 --test-config 로 검증하시오.'
  verify:
    type: output_contains
    expect: configuration
    field: stdout
    semantic:
      intent: 'Suricata config dry-run 검증 — sudo suricata -T -c /etc/suricata/suricata.yaml. -T 옵션으로 config
        + rule syntax 검증만 수행(실제 capture 시작 안 함). production restart 전 필수 관행 - syntax error 시 service 중단
        방지. 출력: Configuration provided was successfully loaded. Exiting 성공 메시지, 또는 syntax error 상세 위치.
        tail -5 로 최종 판정 빠르게 확인'
      success_criteria:
      - suricata -T -c 실행
      - configuration 또는 successfully 키워드
      - 에러 메시지 없거나 명시 확인
      acceptable_methods:
      - sudo suricata -T -c /etc/suricata/suricata.yaml
      - sudo suricata -T -S /etc/suricata/rules/local.rules(특정 룰만)
      - suricata-update check-versions + check-rules
      - systemctl is-active suricata + journalctl -u suricata -n 20
      negative_signs:
      - -T 없이 --init 실행(production 시작)
      - 에러 있는데 정상 판정
      - verify 단계 없이 재시작
  target_vm: secu
  script: sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5
  risk_level: medium
  bastion_prompt: secu VM에서 suricata -T로 설정 파일 문법 검증을 해줘
- order: 7
  instruction: Suricata 서비스를 재시작해 새 룰을 로드하시오.
  hint: systemctl restart suricata
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 Suricata 서비스를 재시작해줘

    📎 참고 (CLI): sudo systemctl restart suricata && sleep 2 && systemctl is-active suricata'
  answer_detail: 'Suricata IPS 설치·구성: Suricata 서비스를 재시작해 새 룰을 로드하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - Suricata
    field: stdout
    semantic:
      intent: Suricata 재시작 + 활성 상태 검증 — sudo systemctl restart suricata && sleep 2 && systemctl is-active
        suricata. reload 대신 restart 로 rule + config 전체 재로드. sleep 2 는 초기화 시간(룰 파싱·엔진 초기화) 확보. is-active
        로 최종 판정 - active 문자열 출력 시 성공. reload 는 signal SIGHUP 보내 rule 재로드만(일부 설정 반영 안 됨)
      success_criteria:
      - systemctl restart suricata 실행
      - sleep + is-active 로 검증
      - active 또는 Suricata 문자열 출력
      acceptable_methods:
      - sudo systemctl restart suricata && sleep 2 && systemctl is-active suricata
      - sudo systemctl reload suricata (rule 만 재로드)
      - sudo kill -USR2 $(pidof suricata) 로 livereload
      - sudo suricatasc -c reload-rules
      - sudo systemctl status suricata --no-pager
      negative_signs:
      - restart 후 검증 없음
      - sleep 없이 바로 체크(초기화 중)
      - is-active 대신 status 전체 출력
  target_vm: secu
  script: sudo systemctl restart suricata && sleep 2 && systemctl is-active suricata
  risk_level: high
  bastion_prompt: secu VM의 Suricata 서비스를 재시작해줘
- order: 8
  instruction: attacker VM에서 secu VM으로 ping을 3회 보내 ICMP 트래픽을 발생시키시오.
  hint: ping -c 3 {{SECU_IP}}
  category: verify
  points: 10
  answer: '🤖 프롬프트: attacker VM에서 10.20.30.1로 ping을 3회 보내줘

    📎 참고 (CLI): ping -c 3 10.20.30.1'
  answer_detail: 'Suricata IPS 설치·구성: attacker VM에서 secu VM으로 ping을 3회 보내 ICMP 트래픽을 발생시키시오.'
  verify:
    type: output_contains
    expect:
    - bytes
    - ping
    field: stdout
    semantic:
      intent: '탐지 테스트용 ICMP 트래픽 생성 — ping -c 3 10.20.30.1 로 attacker→secu 방향 ICMP echo request 3패킷. 탐지
        검증을 위한 negative test - rule 이 잘 동작하면 eve.json 에 alert 기록. 출력: 3 packets transmitted, N received,
        Y% packet loss + RTT. 패킷 수를 -c 3 으로 정확 제어(무제한 금지). bytes from 응답이 정상 도달 신호'
      success_criteria:
      - ping -c 3 <IP> 실행
      - bytes from 응답 출력
      - 패킷 전송 성공 확인
      acceptable_methods:
      - ping -c 3 10.20.30.1
      - ping -c 3 -i 0.2 (interval 조정)
      - hping3 -1 -c 3 <IP> 로 ICMP 생성
      - nping --icmp -c 3 <IP>
      - arping <IP> 로 L2 확인
      negative_signs:
      - ping 실패 무시
      - -c 없이 무한 ping
      - 다른 호스트로 ping
  target_vm: attacker
  script: ping -c 3 10.20.30.1
  risk_level: low
  bastion_prompt: attacker VM에서 10.20.30.1로 ping을 3회 보내줘
- order: 9
  instruction: secu VM의 /var/log/suricata/eve.json 마지막 20줄에서 ICMP 알람을 찾으시오.
  hint: tail /var/log/suricata/eve.json | grep ICMP
  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM의 suricata eve.json에서 ICMP ping 알람 항목을 찾아줘

    📎 참고 (CLI): sudo tail -50 /var/log/suricata/eve.json | grep -i ''ICMP ping'' | head'
  answer_detail: 'Suricata IPS 설치·구성: secu VM의 /var/log/suricata/eve.json 마지막 20줄에서 ICMP 알람을 찾으시오.'
  verify:
    type: output_contains
    expect: ICMP
    field: stdout
    semantic:
      intent: 'Suricata alert 검증 — eve.json 에서 ICMP ping 매칭 — sudo tail -50 /var/log/suricata/eve.json
        | grep -i ICMP ping | head. eve.json 은 JSON-per-line 포맷(alerts/http/dns/tls/flow events). event_type=alert
        의 alert.signature=ICMP ping 필드 확인. jq 로 구조화된 파싱 권장: jq select(.event_type=="alert"). alert 없으면
        rule 미로드 또는 트래픽 도달 안 함'
      success_criteria:
      - eve.json tail + grep 실행
      - ICMP 문자열 매칭
      - alert event 또는 msg 필드 확인
      acceptable_methods:
      - sudo tail -50 /var/log/suricata/eve.json | grep -i "ICMP ping"
      - sudo jq -c select(.alert.signature=="ICMP ping") /var/log/suricata/eve.json | tail
      - sudo tail -f /var/log/suricata/eve.json | grep ICMP
      - sudo grep ICMP /var/log/suricata/fast.log
      - suricatasc -c iface-stat eth0
      negative_signs:
      - eve.json 경로 오타
      - grep 아닌 단순 tail(필터 없음)
      - 0 match 무시
  target_vm: secu
  script: sudo tail -50 /var/log/suricata/eve.json | grep -i 'ICMP ping' | head
  risk_level: low
  bastion_prompt: secu VM의 suricata eve.json에서 ICMP ping 알람 항목을 찾아줘
- order: 10
  instruction: 추가한 ICMP 테스트 룰(sid:1000001)을 local.rules 에서 제거하시오.
  hint: sed -i '/sid:1000001/d' …
  category: cleanup
  points: 10
  answer: '🤖 프롬프트: secu VM local.rules에서 sid:1000001 룰을 삭제하고 suricata를 reload 해줘

    📎 참고 (CLI): sudo sed -i ''/sid:1000001/d'' /etc/suricata/rules/local.rules && sudo systemctl reload
    suricata'
  answer_detail: 'Suricata IPS 설치·구성: 추가한 ICMP 테스트 룰(sid:1000001)을 local.rules 에서 제거하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '테스트 룰 cleanup — sudo sed -i /sid:1000001/d /etc/suricata/rules/local.rules && sudo systemctl
        reload suricata. sed -i in-place edit 로 sid 1000001 포함 라인 삭제. reload 로 즉시 반영 (restart 보다 빠름, rule
        재로드만). 추가 안전: sed -i.bak 으로 백업 + diff 비교 권장. Production 에서는 git-controlled rule repo + CI syntax
        check 후 배포'
      success_criteria:
      - sed -i 로 sid:1000001 라인 삭제
      - systemctl reload 또는 restart 실행
