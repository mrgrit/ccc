    type: output_contains
    expect: directories
    field: stdout
    semantic:
      intent: 'SecOps w11 s1 — ossec.conf의 <syscheck> 섹션에서 감시 디렉터리 목록을 확인하시오. (cmd: sudo grep -E ''<directories'' /var/ossec/etc/ossec.conf
        | head -10)'
