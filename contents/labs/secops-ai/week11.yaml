  hint: grep ccc-fim-test …
  category: analysis
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh alerts.json에서 /etc/ccc-fim-test 관련 이벤트를 찾아줘

    📎 참고 (CLI): sleep 10 && sudo grep ccc-fim-test /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail'
  answer_detail: 'Wazuh FIM / SCA / Active Response: alerts.json 에서 /etc/ccc-fim-test
    관련 이벤트를 검색하시오(FIM 이벤트 지연 반영 가능).'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
