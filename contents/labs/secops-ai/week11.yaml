lab_id: secops-ai-week11
title: Wazuh FIM / SCA / Active Response (AI 지원)
version: ai
course: secops-ai
week: 11
description: File Integrity Monitoring, Security Configuration Assessment, Active
  Response 기능을 구성·검증한다.
difficulty: medium
duration_minutes: 120
objectives:
- FIM(syscheck)이 감시 중인 경로를 확인한다
- SCA 모듈의 최근 스캔 결과를 조회한다
- Active Response로 악성 IP를 firewall-drop 하는 체인을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: ossec.conf의 <syscheck> 섹션에서 감시 디렉터리 목록을 확인하시오.
  hint: grep directories /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 ossec.conf에서 syscheck 감시 디렉터리 목록을 보여줘

    📎 참고 (CLI): sudo grep -E ''<directories'' /var/ossec/etc/ossec.conf | head -10'
  answer_detail: 'Wazuh FIM / SCA / Active Response: ossec.conf의 <syscheck> 섹션에서 감시
    디렉터리 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: directories
    field: stdout
    semantic:
      intent: 'Wazuh syscheck(FIM) 감시 디렉토리 확인 — sudo grep -E <directories /var/ossec/etc/ossec.conf
        | head -10. FIM 은 파일 무결성 모니터링(MITRE T1562.004 방어) - <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
        형태. check_all 속성: size·perm·owner·group·md5·sha1·sha256 체크. realtime="yes"
        속성으로 inotify 기반 실시간 감시. 기본 디렉토리: /etc, /usr/bin, /usr/sbin, /bin, /sbin, /boot.
        Windows 환경은 registry keys 도 모니터링'
      success_criteria:
      - grep <directories ossec.conf 실행
      - directories 태그 라인 출력
      - 감시 경로 정보 확인
      acceptable_methods:
      - sudo grep -E <directories /var/ossec/etc/ossec.conf
      - sudo awk /<syscheck>/,/<\/syscheck>/ /var/ossec/etc/ossec.conf
      - sudo xmllint --xpath //syscheck/directories ossec.conf
      - Wazuh Dashboard Configuration Integrity Monitoring
      - agent-level 설정은 agent.conf 에서
      negative_signs:
      - <directories> 대신 다른 태그
      - 전체 syscheck 블록 cat(과다)
      - realtime 속성 미인지
  target_vm: siem
  script: sudo grep -E '<directories' /var/ossec/etc/ossec.conf | head -10
  risk_level: low
  bastion_prompt: siem VM의 ossec.conf에서 syscheck 감시 디렉터리 목록을 보여줘
- order: 2
  instruction: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의 존재를 확인하시오.
  hint: ls -la /var/ossec/queue/fim/db/fim.db
  category: verify
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh FIM db 파일 존재 여부를 확인해줘

    📎 참고 (CLI): sudo ls -la /var/ossec/queue/fim/db/fim.db 2>/dev/null || echo ''no
    fim.db'''
  answer_detail: 'Wazuh FIM / SCA / Active Response: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의
    존재를 확인하시오.'
  verify:
    type: output_contains
    expect: fim
    field: stdout
    semantic:
      intent: FIM baseline database 존재 확인 — sudo ls -la /var/ossec/queue/fim/db/fim.db
        || echo no fim.db. fim.db 는 SQLite 기반 baseline 해시 저장소 - 각 감시 파일의 SHA-256 +
        메타데이터 저장. 파일 변경 시 baseline 과 비교하여 alert 생성. 크기 MB~GB 단위 가능(감시 파일 수에 비례). 초기
        스캔 시 생성되므로 없으면 syscheck 초기화 실패 가능성. realtime 감시 이벤트 pipeline 의 anchor
      success_criteria:
      - ls fim.db 실행
      - 파일 존재 또는 no fim.db 출력
      - fim 키워드 확인
      acceptable_methods:
      - sudo ls -la /var/ossec/queue/fim/db/fim.db
      - sudo sqlite3 fim.db .schema(schema 확인)
      - sudo sqlite3 fim.db "SELECT count(*) FROM file_entry"(레코드 수)
      - sudo stat /var/ossec/queue/fim/db/fim.db
      - Wazuh Dashboard Security events 로 간접 확인
      negative_signs:
      - 잘못된 경로
      - 파일 없어도 정상 판정
      - 권한 에러 무시
  target_vm: siem
  script: sudo ls -la /var/ossec/queue/fim/db/fim.db 2>/dev/null || echo 'no fim.db'
  risk_level: low
  bastion_prompt: siem VM의 wazuh FIM db 파일 존재 여부를 확인해줘
- order: 3
  instruction: test 파일 /etc/ccc-fim-test 를 생성해 FIM 이벤트를 발생시키시오.
  hint: sudo touch /etc/ccc-fim-test
  category: verify
  points: 10
  answer: '🤖 프롬프트: siem VM에서 /etc/ccc-fim-test 파일을 생성해 FIM 이벤트를 트리거해줘

    📎 참고 (CLI): sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test'
  answer_detail: 'Wazuh FIM / SCA / Active Response: test 파일 /etc/ccc-fim-test 를 생성해
    FIM 이벤트를 발생시키시오.'
  verify:
    type: output_contains
    expect: ccc-fim
    field: stdout
    semantic:
      intent: FIM 이벤트 트리거 - 테스트 파일 생성 — sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test.
        /etc/ 는 FIM 감시 디렉토리(표준 설정). touch 로 새 파일 생성 → inotify event → wazuh-syscheckd
        감지 → alert 생성. realtime=yes 시 즉시, 아니면 다음 scan interval 에 감지. 실습 후 rm 로 cleanup
        필요. 실운영에서는 temp 디렉토리 사용 권장
      success_criteria:
      - touch /etc/ccc-fim-test 실행
      - ls -la 로 파일 생성 확인
      - ccc-fim 문자열 포함
      acceptable_methods:
      - sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
      - echo > /etc/ccc-fim-test(쓰기)
      - stat /etc/ccc-fim-test 로 inode 정보
      - '기존 파일 수정: echo test >> /etc/test-existing'
      - chmod 으로 permission 변경(FIM 감지)
      negative_signs:
      - 감시 디렉토리 외 위치(/tmp)
      - ls 없이 touch 만(생성 확인 없음)
      - cleanup 계획 없음
  target_vm: siem
  script: sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
  risk_level: medium
  bastion_prompt: siem VM에서 /etc/ccc-fim-test 파일을 생성해 FIM 이벤트를 트리거해줘
- order: 4
  instruction: alerts.json 에서 /etc/ccc-fim-test 관련 이벤트를 검색하시오(FIM 이벤트 지연 반영 가능).
  hint: grep ccc-fim-test …
  category: analysis
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh alerts.json에서 /etc/ccc-fim-test 관련 이벤트를 찾아줘

    📎 참고 (CLI): sleep 10 && sudo grep ccc-fim-test /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail'
  answer_detail: 'Wazuh FIM / SCA / Active Response: alerts.json 에서 /etc/ccc-fim-test
    관련 이벤트를 검색하시오(FIM 이벤트 지연 반영 가능).'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'FIM alert 검색 - alerts.json 에서 /etc/ccc-fim-test — sleep 10 && sudo
        grep ccc-fim-test /var/ossec/logs/alerts/alerts.json | tail. sleep 10 으로 FIM
        detection + rule 처리 대기(realtime=yes 시 수초, scan mode 면 시간 단위). Alert 구조: rule.id=554(syscheck
        new file detected) 또는 550 (changed)·553(deleted), syscheck.path=/etc/ccc-fim-test,
        agent.name, changed_attributes(size/perm/hash). 관련 rule 그룹: syscheck'
      success_criteria:
      - sleep + grep ccc-fim-test 실행
      - syscheck alert 매칭 또는 빈 결과
      - tail 결과
      acceptable_methods:
      - sleep 10 && sudo grep ccc-fim-test alerts.json | tail
      - sudo jq select(.rule.id=="554") alerts.json | grep ccc-fim-test
      - Wazuh Dashboard Security Events Module Integrity Monitoring
      - Wazuh API GET /syscheck/<agent_id>
      - sudo tail -f alerts.json 으로 실시간
      negative_signs:
      - sleep 없이 즉시 grep(아직 이벤트 없음)
      - alerts.log 와 혼동
      - realtime 설정 안 한 채 즉각 기대
  target_vm: siem
  script: sleep 10 && sudo grep ccc-fim-test /var/ossec/logs/alerts/alerts.json 2>/dev/null
    | tail
  risk_level: low
  bastion_prompt: siem VM의 wazuh alerts.json에서 /etc/ccc-fim-test 관련 이벤트를 찾아줘
- order: 5
  instruction: SCA 모듈의 활성 여부를 ossec.conf 에서 확인하시오.
  hint: grep -A3 '<sca>' /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 ossec.conf에서 <sca> 섹션 설정을 보여줘

    📎 참고 (CLI): sudo awk ''/<sca>/,/<\/sca>/'' /var/ossec/etc/ossec.conf | head'
  answer_detail: 'Wazuh FIM / SCA / Active Response: SCA 모듈의 활성 여부를 ossec.conf 에서
    확인하시오.'
  verify:
    type: output_contains
    expect: sca
    field: stdout
    semantic:
      intent: 'SCA(Security Configuration Assessment) 설정 확인 — sudo awk /<sca>/,/<\/sca>/
        /var/ossec/etc/ossec.conf | head. SCA 는 CIS Benchmark 기반 보안 설정 감사 모듈. 주요 설정:
        <enabled>yes</enabled>, <scan_on_start>yes</scan_on_start>, <interval>12h</interval>,
        <policies><policy>cis_debian10.yml</policy></policies>. Policy 파일은 /var/ossec/ruleset/sca/
        에 저장(CIS Ubuntu/Debian/RHEL 등). 결과는 alerts.json + wazuh-db API 통해 노출'
      success_criteria:
      - awk sca 섹션 추출 실행
      - <sca> 또는 <enabled> 출력
      - sca 키워드 확인
      acceptable_methods:
      - sudo awk /<sca>/,/<\/sca>/ ossec.conf
      - sudo grep -A 5 <sca> ossec.conf
      - sudo xmllint --xpath //sca ossec.conf
      - Wazuh Dashboard Security Configuration Assessment
      - Wazuh API GET /sca/<agent_id>
      negative_signs:
      - 다른 섹션(vulnerability-detector) 확인
      - awk range 오타
      - enabled 값 확인 없음
  target_vm: siem
  script: sudo awk '/<sca>/,/<\/sca>/' /var/ossec/etc/ossec.conf | head
  risk_level: low
  bastion_prompt: siem VM의 ossec.conf에서 <sca> 섹션 설정을 보여줘
- order: 6
  instruction: SCA 최근 스캔 결과(/var/ossec/logs/alerts/alerts.json) 에서 'sca'를 필터링하시오.
  hint: grep sca … alerts.json
  category: analysis
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh alerts.json에서 SCA 관련 이벤트 최근 3건을 보여줘

    📎 참고 (CLI): sudo grep ''"sca"'' /var/ossec/logs/alerts/alerts.json 2>/dev/null
    | tail -3'
  answer_detail: 'Wazuh FIM / SCA / Active Response: SCA 최근 스캔 결과(/var/ossec/logs/alerts/alerts.json)
    에서 ''sca''를 필터링하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: SCA alert 검색 — sudo grep "sca" /var/ossec/logs/alerts/alerts.json |
        tail -3. SCA 이벤트는 alerts.json 에 data.sca.check 필드 포함(CIS rule id, description,
        result=passed/failed, compliance 매핑). rule.id 19000+ 범위 또는 rule.groups 에 sca
        포함. 실패한 check 로 시스템 hardening gap 식별. 주기적 scan 으로 configuration drift 감지
      success_criteria:
      - grep sca alerts.json 실행
      - SCA alert 또는 빈 결과
      - tail 결과 출력
      acceptable_methods:
      - sudo grep "sca" /var/ossec/logs/alerts/alerts.json | tail -3
      - sudo jq select(.rule.groups[]?=="sca") alerts.json
      - Wazuh Dashboard SCA 모듈 직접 조회
      - curl Wazuh API /sca/<agent>/checks?result=failed
      - 'policy file parsing: cat /var/ossec/ruleset/sca/cis_*.yml'
      negative_signs:
      - sca 필터 없이 alerts.json 전체
      - 빈 결과 정상 판정
      - API 활용 없이 grep 만
  target_vm: siem
  script: sudo grep '"sca"' /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail
    -3
  risk_level: low
  bastion_prompt: siem VM의 wazuh alerts.json에서 SCA 관련 이벤트 최근 3건을 보여줘
- order: 7
  instruction: Active Response 설정(<active-response>)에서 command 목록을 확인하시오.
  hint: awk active-response
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 ossec.conf에서 active-response 블록 설정을 보여줘

    📎 참고 (CLI): sudo awk ''/<active-response>/,/<\/active-response>/'' /var/ossec/etc/ossec.conf
    | head -15'
  answer_detail: 'Wazuh FIM / SCA / Active Response: Active Response 설정(<active-response>)에서
    command 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: active-response
    field: stdout
    semantic:
      intent: 'Active Response 설정 확인 — sudo awk /<active-response>/,/<\/active-response>/
        /var/ossec/etc/ossec.conf | head -15. Active Response 는 alert 발생 시 자동 대응 트리거
        - <command>·<location>·<rules_id> 또는 <level>·<timeout> 설정. 기본 command: firewall-drop(IP
        차단), disable-account, restart-wazuh. location: local(agent 측), server(manager),
        defined-agent. MITRE D3-NTA(Network Traffic Analysis) 통합 대응'
      success_criteria:
      - awk active-response 추출 실행
      - active-response 태그 포함
      - command 또는 설정 출력
      acceptable_methods:
      - sudo awk /<active-response>/,/<\/active-response>/ ossec.conf
      - sudo xmllint --xpath //active-response ossec.conf
      - ls /var/ossec/active-response/bin/ 로 스크립트 확인
      - Wazuh Dashboard Active Response
      - 'Custom AR script 작성: /var/ossec/active-response/bin/'
      negative_signs:
      - active-response 블록 아닌 다른
      - AR script 실행 경로 미인지
      - level/rule_id 조건 이해 부족
  target_vm: siem
  script: sudo awk '/<active-response>/,/<\/active-response>/' /var/ossec/etc/ossec.conf
    | head -15
  risk_level: low
  bastion_prompt: siem VM의 ossec.conf에서 active-response 블록 설정을 보여줘
- order: 8
  instruction: secu VM에 blocklist set (type ipv4_addr) 을 만들고 nftables 에 blocklist
    drop 룰을 추가하시오.
  hint: nft add set; nft add rule
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 filter.blocklist ipv4 set을 만들고 input 체인에 saddr @blocklist
    drop 룰을 추가해줘

    📎 참고 (CLI): sudo nft add table inet filter 2>/dev/null ; sudo nft ''add set inet
    filter blocklist { type ipv4_addr \; }'' 2>/dev/null ; sudo nft add rule inet
    filter input ip saddr @blocklist drop 2>/dev/null ; sudo nft list set inet filter
    blocklist'
  answer_detail: 'Wazuh FIM / SCA / Active Response: secu VM에 blocklist set (type
    ipv4_addr) 을 만들고 nftables 에 blocklist drop 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: blocklist
    field: stdout
    semantic:
      intent: nftables blocklist set + drop 룰 구성 — sudo nft add table inet filter
        2>/dev/null ; sudo nft "add set inet filter blocklist { type ipv4_addr ; }"
        ; sudo nft add rule inet filter input ip saddr @blocklist drop ; sudo nft
        list set inet filter blocklist. Active Response 통합 기반 - Wazuh 가 alert 시 이
        set 에 공격자 IP 추가해 자동 차단. set 기반이면 O(1) lookup, 수천 IP 도 효율. idempotent 한 패턴(이미
        있으면 무시)
      success_criteria:
      - nft add set + nft add rule 실행
      - blocklist 이름 + type ipv4_addr
      - nft list set 으로 검증
      acceptable_methods:
      - sudo nft add set + add rule + list set 체인
      - /etc/nftables.conf 에 set 선언 포함 permanent 설정
      - 'timeout 추가: set { type ipv4_addr ; timeout 1h ; }'
      - Wazuh firewall-drop 스크립트와 통합 - script 가 nft add element 호출
      - ipset + iptables legacy 대체
      negative_signs:
      - table 없이 set 생성(에러)
      - drop 룰 누락(set 만으로는 차단 안 됨)
      - list set 검증 없음
  target_vm: secu
  script: sudo nft add table inet filter 2>/dev/null ; sudo nft 'add set inet filter
    blocklist { type ipv4_addr \; }' 2>/dev/null ; sudo nft add rule inet filter input
    ip saddr @blocklist drop 2>/dev/null ; sudo nft list set inet filter blocklist
  risk_level: medium
  bastion_prompt: 'secu VM에 filter.blocklist ipv4 set을 만들고 input 체인에 saddr @blocklist
    drop 룰을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 9
  instruction: blocklist set 에 {{ATTACKER_IP}} 을 임시로 추가해 공격자 차단을 시뮬레이션하시오.
  hint: nft add element inet filter blocklist { {{ATTACKER_IP}} }
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 filter.blocklist set에 10.20.30.201을 추가해줘

    📎 참고 (CLI): sudo nft add element inet filter blocklist ''{ 10.20.30.201 }'' &&
    sudo nft list set inet filter blocklist'
  answer_detail: 'Wazuh FIM / SCA / Active Response: blocklist set 에 10.20.30.201
    을 임시로 추가해 공격자 차단을 시뮬레이션하시오.'
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
    semantic:
      intent: attacker IP 10.20.30.201 를 blocklist 에 추가(차단 시뮬레이션) — sudo nft add element
        inet filter blocklist { 10.20.30.201 } && sudo nft list set inet filter blocklist.
        element 는 실시간 set 추가 - rule 재작성 없이 효력. Wazuh Active Response firewall-drop
        스크립트가 실제로 수행하는 동작과 동일. 이후 공격자 IP 의 패킷은 s8 의 drop 룰에 의해 즉시 drop. timeout 지정
        없으면 영구 차단
      success_criteria:
      - nft add element 실행
      - 10.20.30.201 IP 추가 확인
      - list set 으로 확인
      acceptable_methods:
