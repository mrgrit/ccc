lab_id: secops-ai-week11
title: Wazuh FIM / SCA / Active Response (AI 지원)
version: ai
course: secops-ai
week: 11
description: File Integrity Monitoring, Security Configuration Assessment, Active
  Response 기능을 구성·검증한다.
difficulty: medium
duration_minutes: 120
objectives:
- FIM(syscheck)이 감시 중인 경로를 확인한다
- SCA 모듈의 최근 스캔 결과를 조회한다
- Active Response로 악성 IP를 firewall-drop 하는 체인을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: ossec.conf의 <syscheck> 섹션에서 감시 디렉터리 목록을 확인하시오.
  hint: grep directories /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 ossec.conf에서 syscheck 감시 디렉터리 목록을 보여줘

    📎 참고 (CLI): sudo grep -E ''<directories'' /var/ossec/etc/ossec.conf | head -10'
  answer_detail: 'Wazuh FIM / SCA / Active Response: ossec.conf의 <syscheck> 섹션에서 감시
    디렉터리 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: directories
    field: stdout
    semantic:
      intent: 'Wazuh syscheck(FIM) 감시 디렉토리 확인 — sudo grep -E <directories /var/ossec/etc/ossec.conf
        | head -10. FIM 은 파일 무결성 모니터링(MITRE T1562.004 방어) - <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
        형태. check_all 속성: size·perm·owner·group·md5·sha1·sha256 체크. realtime="yes"
        속성으로 inotify 기반 실시간 감시. 기본 디렉토리: /etc, /usr/bin, /usr/sbin, /bin, /sbin, /boot.
        Windows 환경은 registry keys 도 모니터링'
      success_criteria:
      - grep <directories ossec.conf 실행
      - directories 태그 라인 출력
      - 감시 경로 정보 확인
      acceptable_methods:
      - sudo grep -E <directories /var/ossec/etc/ossec.conf
      - sudo awk /<syscheck>/,/<\/syscheck>/ /var/ossec/etc/ossec.conf
      - sudo xmllint --xpath //syscheck/directories ossec.conf
      - Wazuh Dashboard Configuration Integrity Monitoring
      - agent-level 설정은 agent.conf 에서
      - |
        **[OSS] grep + xmllint (syscheck 정밀 추출)** — 표준.
          # 1. 단순 grep
          sudo grep -E '<directories' /var/ossec/etc/ossec.conf
          # 2. xmllint XPath
          sudo xmllint --xpath '//syscheck/directories/text()' /var/ossec/etc/ossec.conf
          # 3. realtime 속성 추출
          sudo xmllint --xpath '//syscheck/directories[@realtime="yes"]' /var/ossec/etc/ossec.conf
          # 4. 모든 감시 경로 + 속성 한 번에
          sudo xmllint --xpath '//syscheck/directories' /var/ossec/etc/ossec.conf
        예상 출력 `<directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin</directories>`.
        운영 해석: realtime="yes" = inotify 기반 즉시 감지. check_all="yes" = size+perm+owner+md5+sha1+sha256.
      - |
        **[OSS] inotifywait (kernel layer 직접 검증)** — FIM 동작 mechanism.
          # 1. inotify-tools 설치
          sudo apt install inotify-tools
          # 2. /etc 의 변경 실시간 watch
          sudo inotifywait -mr /etc -e modify,attrib,create,delete | head
          # 3. 다른 터미널에서 변경 발생
          sudo touch /etc/test-inotify
          # 4. 첫 줄에 inotify event 보임
          # /etc/ CREATE test-inotify
        예상 출력 `/etc/ CREATE test-inotify / /etc/ MODIFY test-inotify`.
        운영 해석: Wazuh syscheck 가 사용하는 *kernel layer* 메커니즘. inotify event = FIM alert 의 source.
      - |
        **[OSS] Wazuh Dashboard Integrity Monitoring** — GUI.
          # 1. https://10.20.30.100/ → Modules → Integrity Monitoring
          # 2. UI 동작:
          # - Inventory: 모든 감시 파일 + last_check
          # - Files: 실시간 변경 timeline
          # - Stats: 변경 횟수 / 디렉토리 별
          # - Settings: agent 별 syscheck 설정 view + edit
          # 3. drill-down: 단일 파일 클릭 → 변경 history
          # 4. 인벤토리 export
        UI 동작: FIM 이벤트 통합 view + drill-down.
        운영 해석: SOC 분석가 표준. CLI grep 보다 시각적 + history 추적.
      - |
        **[OSS] auditd (Linux audit subsystem 통합)** — 보완 layer.
          # 1. auditd 설치 + watch 룰
          sudo apt install auditd
          sudo auditctl -w /etc/passwd -p wa -k passwd_change
          sudo auditctl -w /etc/shadow -p wa -k shadow_change
          # 2. 변경 trigger
          sudo touch /etc/passwd
          # 3. audit log 검색
          sudo ausearch -k passwd_change --start today | head
          # 4. Wazuh 가 audit.log 도 수집
          sudo grep "ausearch" /var/log/audit/audit.log | head
        예상 출력 `type=PATH msg=audit(1234567890.123:456) item=0 name="/etc/passwd"`.
        운영 해석: auditd = kernel-level 표준 audit. Wazuh syscheck 와 다른 mechanism. 양쪽 비교 표준.
      - |
        **[OSS] Wazuh API syscheck endpoint** — programmatic.
          # 1. JWT 토큰
          TOKEN=$(curl -sk -u wazuh-wui:wazuh-wui -X POST "https://localhost:55000/security/user/authenticate?raw=true")
          # 2. agent 의 syscheck inventory
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/syscheck/000?limit=10" | jq
          # 3. 특정 파일 last_check
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/syscheck/000?file=/etc/passwd" | jq
          # 4. agent 별 last_scan
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/syscheck/000/last_scan" | jq
        예상 출력 `[{file:"/etc/passwd", size:2456, sha256:"abc123...", last_scan:"2026-05-06T14:23:00"}]`.
        운영 해석: REST API 자동화. CI 통합 + 정기 inventory 보고.
      negative_signs:
      - <directories> 대신 다른 태그
      - 전체 syscheck 블록 cat(과다)
      - realtime 속성 미인지
  target_vm: siem
  script: sudo grep -E '<directories' /var/ossec/etc/ossec.conf | head -10
  risk_level: low
  bastion_prompt: siem VM의 ossec.conf에서 syscheck 감시 디렉터리 목록을 보여줘
- order: 2
  instruction: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의 존재를 확인하시오.
  hint: ls -la /var/ossec/queue/fim/db/fim.db
  category: verify
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh FIM db 파일 존재 여부를 확인해줘

    📎 참고 (CLI): sudo ls -la /var/ossec/queue/fim/db/fim.db 2>/dev/null || echo ''no
    fim.db'''
  answer_detail: 'Wazuh FIM / SCA / Active Response: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의
    존재를 확인하시오.'
  verify:
    type: output_contains
    expect: fim
    field: stdout
    semantic:
      intent: FIM baseline database 존재 확인 — sudo ls -la /var/ossec/queue/fim/db/fim.db
        || echo no fim.db. fim.db 는 SQLite 기반 baseline 해시 저장소 - 각 감시 파일의 SHA-256 +
        메타데이터 저장. 파일 변경 시 baseline 과 비교하여 alert 생성. 크기 MB~GB 단위 가능(감시 파일 수에 비례). 초기
        스캔 시 생성되므로 없으면 syscheck 초기화 실패 가능성. realtime 감시 이벤트 pipeline 의 anchor
      success_criteria:
      - ls fim.db 실행
      - 파일 존재 또는 no fim.db 출력
      - fim 키워드 확인
      acceptable_methods:
      - sudo ls -la /var/ossec/queue/fim/db/fim.db
      - sudo sqlite3 fim.db .schema(schema 확인)
      - sudo sqlite3 fim.db "SELECT count(*) FROM file_entry"(레코드 수)
      - sudo stat /var/ossec/queue/fim/db/fim.db
      - Wazuh Dashboard Security events 로 간접 확인
      - |
        **[OSS] sqlite3 (FIM DB 직접 query)** — 표준.
          # 1. db 존재 + 크기
          sudo ls -lh /var/ossec/queue/fim/db/fim.db
          # 2. schema 확인
          sudo sqlite3 /var/ossec/queue/fim/db/fim.db ".schema"
          # 3. 모니터링 파일 수
          sudo sqlite3 /var/ossec/queue/fim/db/fim.db "SELECT count(*) FROM file_entry;"
          # 4. 특정 파일 hash
          sudo sqlite3 /var/ossec/queue/fim/db/fim.db "SELECT path, sha256 FROM file_entry WHERE path='/etc/passwd';"
        예상 출력 `Total monitored: 12345 files / sha256: abc123...`.
        운영 해석: FIM DB = SQLite. 모든 baseline hash 저장. 직접 query 로 수동 검증.
      - |
        **[OSS] stat + ls (파일 메타정보)** — 빠른 진단.
          # 1. 파일 상태 + 권한
          sudo stat /var/ossec/queue/fim/db/fim.db
          # 2. 마지막 변경 시각 (last sync)
          sudo stat -c '%y' /var/ossec/queue/fim/db/fim.db
          # 3. 디스크 사용량 (FIM DB 크기 추세)
          sudo du -h /var/ossec/queue/fim/db/
          # 4. 권한 검증 (wazuh user 만 읽기/쓰기)
          sudo ls -la /var/ossec/queue/fim/db/
        예상 출력 `Modify: 2026-05-06 14:23:00 / 50M / -rw-rw---- 1 wazuh wazuh`.
        운영 해석: 정기 점검 표준. db 크기 1GB+ 시 syscheck 감시 디렉토리 너무 많음.
      - |
        **[OSS] sqlite-utils (Python 통합)** — 자동화.
          # 1. sqlite-utils 설치
          pip install sqlite-utils
          # 2. CSV export (분석)
          sudo sqlite-utils dump /var/ossec/queue/fim/db/fim.db | head
          # 3. 특정 dir 의 모든 파일
          sudo sqlite-utils memory /var/ossec/queue/fim/db/fim.db "SELECT * FROM file_entry WHERE path LIKE '/etc/%' LIMIT 5"
          # 4. JSON 출력
          sudo sqlite-utils memory /var/ossec/queue/fim/db/fim.db "SELECT count(*) c, substr(path,1,5) p FROM file_entry GROUP BY p ORDER BY c DESC" --json
        예상 출력 `[{"c":5234,"p":"/etc/"},{"c":2145,"p":"/usr/"}]`.
        운영 해석: 디렉토리 별 모니터링 파일 분포 분석. 자동화 친화.
      - |
        **[OSS] inotifywait + diff (실시간 변경 검증)** — kernel level.
          # 1. inotify 로 fim.db 자체 변경 watch (Wazuh 가 어떻게 update 하는지)
          sudo inotifywait -m /var/ossec/queue/fim/db/ -e modify,attrib | head
          # 2. 다른 터미널에서 /etc 변경
          sudo touch /etc/test-fim
          # 3. fim.db 변경 즉시 발생 확인
          # /var/ossec/queue/fim/db/ MODIFY fim.db
        예상 출력 `MODIFY fim.db (Wazuh syscheckd 가 baseline 업데이트)`.
        운영 해석: FIM 동작 mechanism 직접 관찰. fim.db 가 변경 감지 시 즉시 update = realtime 정상.
      - |
        **[OSS] Wazuh Dashboard FIM Inventory** — GUI 검증.
          # 1. https://10.20.30.100/ → Modules → Integrity Monitoring → Inventory
          # 2. UI:
          # - 전체 모니터링 파일 list (fim.db 의 시각적 view)
          # - 파일 hash + last_check + size + permissions
          # - 검색: path / sha256 / agent
          # 3. 통계:
          # - 변경된 파일 24h
          # - 카테고리 별 분포
        UI 동작: GUI 로 fim.db 내용 시각화.
        운영 해석: CLI sqlite3 의 GUI 버전. SOC 분석가 친화적.
      negative_signs:
      - 잘못된 경로
      - 파일 없어도 정상 판정
      - 권한 에러 무시
  target_vm: siem
  script: sudo ls -la /var/ossec/queue/fim/db/fim.db 2>/dev/null || echo 'no fim.db'
  risk_level: low
  bastion_prompt: siem VM의 wazuh FIM db 파일 존재 여부를 확인해줘
- order: 3
  instruction: test 파일 /etc/ccc-fim-test 를 생성해 FIM 이벤트를 발생시키시오.
  hint: sudo touch /etc/ccc-fim-test
  category: verify
  points: 10
  answer: '🤖 프롬프트: siem VM에서 /etc/ccc-fim-test 파일을 생성해 FIM 이벤트를 트리거해줘

    📎 참고 (CLI): sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test'
  answer_detail: 'Wazuh FIM / SCA / Active Response: test 파일 /etc/ccc-fim-test 를 생성해
    FIM 이벤트를 발생시키시오.'
  verify:
    type: output_contains
    expect: ccc-fim
    field: stdout
    semantic:
      intent: FIM 이벤트 트리거 - 테스트 파일 생성 — sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test.
        /etc/ 는 FIM 감시 디렉토리(표준 설정). touch 로 새 파일 생성 → inotify event → wazuh-syscheckd
        감지 → alert 생성. realtime=yes 시 즉시, 아니면 다음 scan interval 에 감지. 실습 후 rm 로 cleanup
        필요. 실운영에서는 temp 디렉토리 사용 권장
      success_criteria:
      - touch /etc/ccc-fim-test 실행
      - ls -la 로 파일 생성 확인
      - ccc-fim 문자열 포함
      acceptable_methods:
      - sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
      - echo > /etc/ccc-fim-test(쓰기)
      - stat /etc/ccc-fim-test 로 inode 정보
      - '기존 파일 수정: echo test >> /etc/test-existing'
      - chmod 으로 permission 변경(FIM 감지)
      - |
        **[OSS] touch + ls (표준 trigger)** — 가장 단순.
          # 1. 파일 생성 + 검증
          sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
          # 2. 변경 trigger (touch 외 다양)
          # a) write
          echo "test" | sudo tee /etc/ccc-fim-test
          # b) permission
          sudo chmod 644 /etc/ccc-fim-test
          # c) ownership
          sudo chown root:root /etc/ccc-fim-test
          # d) attribute
          sudo chattr +i /etc/ccc-fim-test
        예상 출력 `-rw-r--r-- 1 root root 0 May 06 14:23 /etc/ccc-fim-test`.
        운영 해석: FIM 은 *모든 변경* 감지. touch (mtime), chmod (perm), echo (size+md5) 모두 alert 발생.
      - |
        **[OSS] chattr + lsattr (immutable 시뮬)** — 고급 trigger.
          # 1. immutable 속성 추가
          sudo chattr +i /etc/ccc-fim-test
          # 2. 검증
          sudo lsattr /etc/ccc-fim-test
          # 3. 정상 (immutable 시 변경 불가)
          sudo rm /etc/ccc-fim-test
          # → "Operation not permitted"
          # 4. 해제
          sudo chattr -i /etc/ccc-fim-test
        예상 출력 `----i--------e----- /etc/ccc-fim-test / Operation not permitted`.
        운영 해석: FIM 이 chattr +i 변경도 감지 (extended attributes). rootkit 의 자기 보호 패턴 탐지.
      - |
        **[OSS] dd / fallocate (대량 변경 시뮬)** — performance test.
          # 1. 큰 파일 생성 (FIM hash 계산 부하)
          sudo dd if=/dev/zero of=/etc/big-fim-test bs=1M count=10
          # 2. fallocate 로 빠른 생성
          sudo fallocate -l 100M /etc/big-fim-test
          # 3. FIM 응답 시간 측정
          time sudo cp /etc/big-fim-test /etc/big-fim-test-copy
          # 4. cleanup
          sudo rm /etc/big-fim-test*
        예상 결과: 10MB 파일은 sha256 계산 1-2초. 1GB+ 시 분 단위.
        운영 해석: 큰 파일 다수 변경 시 FIM 부하 측정. 디스크 + CPU 영향.
      - |
        **[OSS] inotifywait (FIM event 직접 관찰)** — kernel 검증.
          # 1. /etc 의 모든 변경 watch
          sudo inotifywait -mr /etc -e modify,attrib,create,delete,move 2>&1 &
          # 2. 다른 터미널에서 trigger
          sudo touch /etc/ccc-fim-test
          # 3. 첫 줄 inotify event 확인
          # /etc/ CREATE ccc-fim-test
          # 4. Wazuh 의 syscheckd 가 같은 event 수신 후 alert 생성
          sudo grep "ccc-fim-test" /var/ossec/logs/ossec.log | head
        예상 출력 `/etc/ CREATE ccc-fim-test / wazuh-syscheckd: file added: ccc-fim-test`.
        운영 해석: kernel inotify event 가 source. Wazuh 의 syscheckd 가 받아서 baseline 비교.
      - |
        **[OSS] python 자동화 trigger** — CI test.
          # 1. multi-event trigger
          python3 << 'EOF'
          import os, time
          for i in range(3):
              fname = f"/etc/fim-test-{i}"
              os.system(f"sudo touch {fname}")
              time.sleep(2)
              os.system(f"sudo chmod 600 {fname}")
              time.sleep(2)
              os.system(f"sudo rm {fname}")
              print(f"Trigger {i}: create + chmod + delete")
          EOF
          # 2. alert 검증
          sleep 30
          sudo grep -c "fim-test" /var/ossec/logs/alerts/alerts.json
        예상 출력 `9 alerts (3 trigger × 3 event types)`.
        운영 해석: 자동화 회귀 테스트. CI 통합 + FIM coverage 정량 측정.
      negative_signs:
      - 감시 디렉토리 외 위치(/tmp)
      - ls 없이 touch 만(생성 확인 없음)
      - cleanup 계획 없음
  target_vm: siem
  script: sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
  risk_level: medium
  bastion_prompt: siem VM에서 /etc/ccc-fim-test 파일을 생성해 FIM 이벤트를 트리거해줘
