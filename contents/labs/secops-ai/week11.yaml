lab_id: secops-ai-week11
title: Wazuh FIM / SCA / Active Response (AI 지원)
version: ai
course: secops-ai
week: 11
description: File Integrity Monitoring, Security Configuration Assessment, Active
  Response 기능을 구성·검증한다.
difficulty: medium
duration_minutes: 120
objectives:
- FIM(syscheck)이 감시 중인 경로를 확인한다
- SCA 모듈의 최근 스캔 결과를 조회한다
- Active Response로 악성 IP를 firewall-drop 하는 체인을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: ossec.conf의 <syscheck> 섹션에서 감시 디렉터리 목록을 확인하시오.
  hint: grep directories /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: sudo grep -E '<directories' /var/ossec/etc/ossec.conf | head -10
  answer_detail: 'Wazuh FIM / SCA / Active Response: ossec.conf의 <syscheck> 섹션에서 감시
    디렉터리 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: directories
    field: stdout
  target_vm: siem
  script: sudo grep -E '<directories' /var/ossec/etc/ossec.conf | head -10
  risk_level: low
  bastion_prompt: siem VM의 ossec.conf에서 syscheck 감시 디렉터리 목록을 보여줘
- order: 2
  instruction: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의 존재를 확인하시오.
  hint: ls -la /var/ossec/queue/fim/db/fim.db
  category: verify
  points: 10
  answer: sudo ls -la /var/ossec/queue/fim/db/fim.db 2>/dev/null || echo 'no fim.db'
  answer_detail: 'Wazuh FIM / SCA / Active Response: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의
    존재를 확인하시오.'
  verify:
    type: output_contains
    expect: fim
    field: stdout
  target_vm: siem
  script: sudo ls -la /var/ossec/queue/fim/db/fim.db 2>/dev/null || echo 'no fim.db'
  risk_level: low
  bastion_prompt: siem VM의 wazuh FIM db 파일 존재 여부를 확인해줘
- order: 3
  instruction: test 파일 /etc/ccc-fim-test 를 생성해 FIM 이벤트를 발생시키시오.
  hint: sudo touch /etc/ccc-fim-test
  category: verify
  points: 10
  answer: sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
  answer_detail: 'Wazuh FIM / SCA / Active Response: test 파일 /etc/ccc-fim-test 를 생성해
    FIM 이벤트를 발생시키시오.'
  verify:
    type: output_contains
    expect: ccc-fim
    field: stdout
  target_vm: siem
  script: sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
  risk_level: medium
  bastion_prompt: siem VM에서 /etc/ccc-fim-test 파일을 생성해 FIM 이벤트를 트리거해줘
- order: 4
  instruction: alerts.json 에서 /etc/ccc-fim-test 관련 이벤트를 검색하시오(FIM 이벤트 지연 반영 가능).
  hint: grep ccc-fim-test …
  category: analysis
  points: 10
  answer: sleep 10 && sudo grep ccc-fim-test /var/ossec/logs/alerts/alerts.json 2>/dev/null
    | tail
  answer_detail: 'Wazuh FIM / SCA / Active Response: alerts.json 에서 /etc/ccc-fim-test
    관련 이벤트를 검색하시오(FIM 이벤트 지연 반영 가능).'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: sleep 10 && sudo grep ccc-fim-test /var/ossec/logs/alerts/alerts.json 2>/dev/null
    | tail
  risk_level: low
  bastion_prompt: siem VM의 wazuh alerts.json에서 /etc/ccc-fim-test 관련 이벤트를 찾아줘
- order: 5
  instruction: SCA 모듈의 활성 여부를 ossec.conf 에서 확인하시오.
  hint: grep -A3 '<sca>' /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: sudo awk '/<sca>/,/<\/sca>/' /var/ossec/etc/ossec.conf | head
  answer_detail: 'Wazuh FIM / SCA / Active Response: SCA 모듈의 활성 여부를 ossec.conf 에서
    확인하시오.'
  verify:
    type: output_contains
    expect: sca
    field: stdout
  target_vm: siem
  script: sudo awk '/<sca>/,/<\/sca>/' /var/ossec/etc/ossec.conf | head
  risk_level: low
  bastion_prompt: siem VM의 ossec.conf에서 <sca> 섹션 설정을 보여줘
- order: 6
  instruction: SCA 최근 스캔 결과(/var/ossec/logs/alerts/alerts.json) 에서 'sca'를 필터링하시오.
  hint: grep sca … alerts.json
  category: analysis
  points: 10
  answer: sudo grep '"sca"' /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail
    -3
  answer_detail: 'Wazuh FIM / SCA / Active Response: SCA 최근 스캔 결과(/var/ossec/logs/alerts/alerts.json)
    에서 ''sca''를 필터링하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: sudo grep '"sca"' /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail
    -3
  risk_level: low
  bastion_prompt: siem VM의 wazuh alerts.json에서 SCA 관련 이벤트 최근 3건을 보여줘
- order: 7
  instruction: Active Response 설정(<active-response>)에서 command 목록을 확인하시오.
  hint: awk active-response
  category: survey
  points: 10
  answer: sudo awk '/<active-response>/,/<\/active-response>/' /var/ossec/etc/ossec.conf
    | head -15
  answer_detail: 'Wazuh FIM / SCA / Active Response: Active Response 설정(<active-response>)에서
    command 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: active-response
    field: stdout
  target_vm: siem
  script: sudo awk '/<active-response>/,/<\/active-response>/' /var/ossec/etc/ossec.conf
    | head -15
  risk_level: low
  bastion_prompt: siem VM의 ossec.conf에서 active-response 블록 설정을 보여줘
- order: 8
  instruction: secu VM에 blocklist set (type ipv4_addr) 을 만들고 nftables 에 blocklist
    drop 룰을 추가하시오.
  hint: nft add set; nft add rule
  category: configure
  points: 10
  answer: sudo nft add table inet filter 2>/dev/null ; sudo nft 'add set inet filter
    blocklist { type ipv4_addr \; }' 2>/dev/null ; sudo nft add rule inet filter input
    ip saddr @blocklist drop 2>/dev/null ; sudo nft list set inet filter blocklist
  answer_detail: 'Wazuh FIM / SCA / Active Response: secu VM에 blocklist set (type
    ipv4_addr) 을 만들고 nftables 에 blocklist drop 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: blocklist
    field: stdout
  target_vm: secu
  script: sudo nft add table inet filter 2>/dev/null ; sudo nft 'add set inet filter
    blocklist { type ipv4_addr \; }' 2>/dev/null ; sudo nft add rule inet filter input
    ip saddr @blocklist drop 2>/dev/null ; sudo nft list set inet filter blocklist
  risk_level: medium
  bastion_prompt: secu VM에 filter.blocklist ipv4 set을 만들고 input 체인에 saddr @blocklist
    drop 룰을 추가해줘
- order: 9
  instruction: blocklist set 에 10.20.30.201 을 임시로 추가해 공격자 차단을 시뮬레이션하시오.
  hint: nft add element inet filter blocklist { 10.20.30.201 }
  category: configure
  points: 10
  answer: sudo nft add element inet filter blocklist '{ 10.20.30.201 }' && sudo nft
    list set inet filter blocklist
  answer_detail: 'Wazuh FIM / SCA / Active Response: blocklist set 에 10.20.30.201
    을 임시로 추가해 공격자 차단을 시뮬레이션하시오.'
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
  target_vm: secu
  script: sudo nft add element inet filter blocklist '{ 10.20.30.201 }' && sudo nft
    list set inet filter blocklist
  risk_level: medium
  bastion_prompt: secu VM의 filter.blocklist set에 10.20.30.201을 추가해줘
- order: 10
  instruction: blocklist 에서 10.20.30.201을 제거해 원상 복구하시오.
  hint: nft delete element …
  category: cleanup
  points: 10
  answer: sudo nft delete element inet filter blocklist '{ 10.20.30.201 }'
  answer_detail: 'Wazuh FIM / SCA / Active Response: blocklist 에서 10.20.30.201을 제거해
    원상 복구하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: sudo nft delete element inet filter blocklist '{ 10.20.30.201 }'
  risk_level: medium
  bastion_prompt: secu VM의 filter.blocklist set에서 10.20.30.201을 제거해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  answer: ''
  answer_detail: ''
  risk_level: low
  bastion_prompt: 'secu/web/siem VM 전반에 대해 다음 작업들을 순서대로 수행해줘:

    1) siem VM의 ossec.conf에서 syscheck 감시 디렉터리 목록을 보여줘

    2) siem VM의 wazuh FIM db 파일 존재 여부를 확인해줘

    3) siem VM에서 /etc/ccc-fim-test 파일을 생성해 FIM 이벤트를 트리거해줘

    4) siem VM의 wazuh alerts.json에서 /etc/ccc-fim-test 관련 이벤트를 찾아줘

    5) siem VM의 ossec.conf에서 <sca> 섹션 설정을 보여줘'
