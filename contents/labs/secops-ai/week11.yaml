    | 측면 | 수동 (1~10 의 8-9번) | 자동 (AR, 99번) |
    |------|------------------|---------------|
    | trigger | 운영자가 직접 nft add | rule 5710 매칭 시 자동 |
    | 반응 시간 | 분 단위 (alert→인지→실행) | 초 단위 (alert 즉시) |
    | 해제 | 운영자가 직접 nft delete | timeout 60s 자동 |
    | 위험 | 잊어버림 → 영구 차단 | FP 시 정상 IP 일시 차단 |
    | 운영 가치 | 명확한 의도 차단 | 자동 방어선 |

    1~2 단락 회고:
    1. **AR 자동 흐름의 4 단계** — alerts.json (단계 1) → active-responses.log (단계 2) →
