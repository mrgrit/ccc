    ## 임무 (3 단계, 약 25분)

    ### Phase A — AR 설정 추가 (10분)

    siem 의 `/var/ossec/etc/ossec.conf` 에 AR command + 매칭 추가:
      ```
      sudo cp /var/ossec/etc/ossec.conf /var/ossec/etc/ossec.conf.bak

      sudo tee -a /var/ossec/etc/ossec.conf <<'EOF'
      <command>
        <name>verify-firewall-drop</name>
        <executable>firewall-drop</executable>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      <active-response>
        <command>verify-firewall-drop</command>
        <location>local</location>
        <rules_id>5710,5712</rules_id>
        <timeout>60</timeout>
      </active-response>
      EOF

      sudo systemctl restart wazuh-manager && sleep 5
      sudo grep verify-firewall-drop /var/ossec/etc/ossec.conf | head
      ```

    의도: rule 5710 (multiple auth fail) 매칭 시 wazuh AR 의 firewall-drop script 자동 실행
    → 60초 차단 후 자동 해제.

