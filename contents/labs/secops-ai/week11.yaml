    확인하시오.'
  verify:
    type: output_contains
    expect: sca
    field: stdout
    semantic:
      intent: 'SCA(Security Configuration Assessment) 설정 확인 — sudo awk /<sca>/,/<\/sca>/
        /var/ossec/etc/ossec.conf | head. SCA 는 CIS Benchmark 기반 보안 설정 감사 모듈. 주요 설정:
        <enabled>yes</enabled>, <scan_on_start>yes</scan_on_start>, <interval>12h</interval>,
        <policies><policy>cis_debian10.yml</policy></policies>. Policy 파일은 /var/ossec/ruleset/sca/
        에 저장(CIS Ubuntu/Debian/RHEL 등). 결과는 alerts.json + wazuh-db API 통해 노출'
      success_criteria:
      - awk sca 섹션 추출 실행
      - <sca> 또는 <enabled> 출력
      - sca 키워드 확인
      acceptable_methods:
      - sudo awk /<sca>/,/<\/sca>/ ossec.conf
      - sudo grep -A 5 <sca> ossec.conf
      - sudo xmllint --xpath //sca ossec.conf
      - Wazuh Dashboard Security Configuration Assessment
      - Wazuh API GET /sca/<agent_id>
      - |
        **[OSS] awk + xmllint (SCA 설정 추출)** — 표준.
          # 1. SCA 블록 추출
          sudo awk '/<sca>/,/<\/sca>/' /var/ossec/etc/ossec.conf
          # 2. xmllint XPath
          sudo xmllint --xpath '//sca/enabled/text()' /var/ossec/etc/ossec.conf
          # 3. SCA 정책 파일 목록
          sudo xmllint --xpath '//sca/policies/policy/text()' /var/ossec/etc/ossec.conf
          # 4. SCA scan interval
          sudo xmllint --xpath 'string(//sca/interval)' /var/ossec/etc/ossec.conf
        예상 출력 `<sca><enabled>yes</enabled><interval>12h</interval><policies><policy>cis_debian10.yml</policy></policies></sca>`.
        운영 해석: enabled=yes 필수. interval 12h = 일 2회. policies = CIS benchmark 파일.
      - |
        **[OSS] SCA policy file 직접 분석** — CIS benchmark.
          # 1. 적용된 SCA policy 파일 목록
          ls /var/ossec/ruleset/sca/
          # 2. 단일 policy 의 check 수
          sudo grep -c "^- id:" /var/ossec/ruleset/sca/cis_debian10.yml
          # 3. 카테고리 별 check 수 (yaml format)
          sudo yq '.checks | length' /var/ossec/ruleset/sca/cis_debian10.yml
          # 4. specific check 상세
          sudo yq '.checks[] | select(.id == 31000)' /var/ossec/ruleset/sca/cis_debian10.yml
        예상 출력 `cis_debian10.yml: 250 checks / cis_debian11.yml: 280 checks`.
        운영 해석: CIS Benchmark 의 *250+ check* 자동 평가. 시스템 hardening gap 식별.
      - |
        **[OSS] Wazuh Dashboard SCA module** — GUI.
          # 1. https://10.20.30.100/ → Modules → Security Configuration Assessment
          # 2. UI:
          # - Inventory: 모든 agent 의 SCA 결과
          # - Score: passed / failed / not_applicable
          # - Drill-down: 단일 check 의 결과 + remediation
          # - Filter: by agent / policy / result
          # 3. CIS Benchmark 매핑
          # 4. CSV / JSON export
        UI 동작: SCA 결과 시각화 + remediation guide.
        운영 해석: SOC + 컴플라이언스 표준. CIS benchmark 자동 평가.
      - |
        **[OSS] OpenSCAP (대안 도구)** — 비교 표준.
          # 1. OpenSCAP 설치
          sudo apt install openscap-scanner libopenscap-utils
          # 2. SCAP datastream 다운로드
          wget https://www.cisecurity.org/cis-scap-datastream/...
          # 3. scan 실행
          sudo oscap xccdf eval --profile xccdf_org.cisecurity.benchmarks_profile_Level_1_-_Server \
              --results /tmp/scan-results.xml \
              ssg-debian10-ds.xml
          # 4. HTML 보고서
          sudo oscap xccdf generate report /tmp/scan-results.xml > /tmp/report.html
        예상 출력 `Score: 45.67% / Passed: 100/250 / Failed: 150/250 / Report saved`.
        운영 해석: OpenSCAP = NIST 공식. Wazuh SCA 와 동등 기능 다른 도구. multi-tool audit.
      - |
        **[OSS] Wazuh API SCA endpoint** — programmatic.
          # 1. JWT 토큰
          TOKEN=$(curl -sk -u wazuh-wui:wazuh-wui -X POST "https://localhost:55000/security/user/authenticate?raw=true")
          # 2. agent 의 SCA 결과 요약
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/sca/000" | jq
          # 3. failed checks 만
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/sca/000/checks/cis_debian10?result=failed" | jq
          # 4. compliance 매핑 (PCI/HIPAA/NIST)
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/sca/000/checks/cis_debian10?compliance=pci_dss" | jq
        예상 출력 `[{id:31000, title:"Ensure...", result:"failed", remediation:"Edit /etc/..."}]`.
        운영 해석: REST API. compliance audit 보고서 자동 생성. PCI / HIPAA / NIST 매핑.
      negative_signs:
      - 다른 섹션(vulnerability-detector) 확인
      - awk range 오타
      - enabled 값 확인 없음
