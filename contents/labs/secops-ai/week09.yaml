        **[OSS] awk range (XML 섹션 추출)** — 표준 텍스트.
          # 1. <global> ~ </global> 범위 추출
          sudo awk '/<global>/,/<\/global>/' /var/ossec/etc/ossec.conf
          # 2. 다중 ossec_config 블록 처리
          sudo awk '/<ossec_config>/{f=1} f; /<\/ossec_config>/{f=0}' /var/ossec/etc/ossec.conf | head -50
          # 3. 특정 directive 만 추출
          sudo awk '/<global>/,/<\/global>/' /var/ossec/etc/ossec.conf | grep -E "logall|jsonout|email"
        예상 출력 `<global> / <jsonout_output>yes</jsonout_output> / <alerts_log>yes</alerts_log> / <logall>no</logall> / <email_notification>no</email_notification> / </global>`.
