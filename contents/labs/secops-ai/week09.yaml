lab_id: secops-ai-week09
title: Wazuh SIEM 설치·구성 (AI 지원)
version: ai
course: secops-ai
week: 9
description: Wazuh Manager·Indexer·Dashboard 구성 상태를 확인하고 siem의 agent 목록을 조회한다.
difficulty: medium
duration_minutes: 120
objectives:
- Wazuh Manager/Indexer/Dashboard/agent 서비스 상태를 확인한다
- /var/ossec/etc/ossec.conf 의 주요 설정을 이해한다
- agent_control / wazuh-wui 로 에이전트 목록을 조회한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM에서 Wazuh Manager 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-manager
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh-manager 서비스 상태를 확인해줘

    📎 참고 (CLI): systemctl is-active wazuh-manager'
  answer_detail: 'Wazuh SIEM 설치·구성: siem VM에서 Wazuh Manager 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: Wazuh Manager daemon 활성 확인 — systemctl is-active wazuh-manager. Wazuh
        Manager 는 agent 로부터 수집된 로그를 decoder + rule 로 분석하여 alert 생성하는 core. wazuh-analysisd·wazuh-logcollector·wazuh-remoted·wazuh-monitord
        등 multi-daemon 구조. Active 아니면 모든 SOC 탐지 중단. SecOps 과정의 SIEM 허브
      success_criteria:
      - systemctl is-active wazuh-manager 실행
      - active 문자열 출력
      - 상태 판정 결과
      acceptable_methods:
      - systemctl is-active wazuh-manager
      - sudo /var/ossec/bin/wazuh-control status
      - ps auxf | grep wazuh-
      - curl -k https://localhost:55000 (Wazuh API health)
      - journalctl -u wazuh-manager --since 10min
      - |
        **[OSS] systemctl + wazuh-control (이중 확인)** — service + daemon 단위.
          # 1. systemd 단위 체크
          systemctl is-active wazuh-manager
          # 2. wazuh 자체 도구 (모든 데몬 status)
          sudo /var/ossec/bin/wazuh-control status
          # 3. journal 최근 로그 (실패 원인 분석)
          sudo journalctl -u wazuh-manager --since "10 min ago" --no-pager | tail -20
          # 4. enable + start 일괄
          sudo systemctl enable --now wazuh-manager
        예상 출력 `active / wazuh-analysisd is running... / wazuh-remoted is running... / wazuh-monitord is running...`.
        운영 해석: systemctl 만으로는 *내부 데몬* 상태 모름. wazuh-control 로 5+ 데몬 (analysisd/remoted/monitord/execd/modulesd) 개별 확인 필수.
      - |
        **[OSS] Wazuh API (REST 헬스체크)** — programmatic 진단.
          # 1. JWT 토큰 발급
          TOKEN=$(curl -sk -u wazuh-wui:wazuh-wui -X POST "https://localhost:55000/security/user/authenticate?raw=true")
          # 2. manager 정보 조회
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/manager/info" | jq
          # 3. manager 서비스 상태
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/manager/status" | jq
          # 4. 헬스체크 1줄
          curl -sk "https://localhost:55000/" -o /dev/null -w "API %{http_code}\n"
        예상 출력 `{"version":"v4.7.5","compilation_date":"2024-...","status":"running"} / API 200`.
        운영 해석: API 응답 = manager 정상. systemctl active 인데 API 응답 X = JWT 인증 시스템 (Wazuh-RBAC) 문제.
      - |
        **[OSS] Wazuh Dashboard (web GUI)** — 운영자 표준.
          # 1. https://10.20.30.100/ 접속 (admin/SecretPassword)
          # 2. Server management → Status 메뉴
          # - Manager: green
          # - Indexer: green
          # - Dashboard: green
          # 3. agents 통계 (active / disconnected / never connected)
          # 4. Latest events stream
        UI 동작: 통합 status panel + agents + events.
        운영 해석: SOC 운영자가 매일 첫 화면. CLI 보다 빠른 종합 진단.
      - |
        **[OSS] netstat / ss (Wazuh 포트 확인)** — 네트워크 layer.
          # 1. Wazuh 의 모든 포트 (1514 agent, 1515 enrollment, 55000 API, 9200 indexer, 443 dashboard)
          sudo ss -tlnp | grep -E "1514|1515|55000|9200|443"
          # 2. agent 연결 통계
          sudo ss -an | grep ":1514" | awk '{print $5}' | wc -l
          # 3. 포트 충돌 검사
          sudo lsof -i :1514 -P -n
          # 4. firewall 룰 (다른 host 의 agent 가 도달 가능?)
          sudo nft list ruleset | grep -E "1514|1515"
        예상 출력 `LISTEN 0:1514 wazuh-remoted / LISTEN 0:55000 wazuh-server / 25 active agent connections`.
        운영 해석: 1514 (UDP/TCP) = agent 통신. 1515 = enrollment (initial registration). 55000 = REST API.
      - |
        **[OSS] cockpit + Wazuh service** — 통합 GUI.
          # 1. https://10.20.30.100:9090 접속
          # 2. Services 페이지 → wazuh-manager / wazuh-indexer / wazuh-dashboard 검색
          # 3. 각 service status + logs + restart 버튼
          # 4. CLI 검증 (Cockpit Terminal 에서)
          # systemctl list-units --type=service --state=running | grep wazuh
        UI 동작: 모든 service GUI 통합 관리.
        운영 해석: Wazuh Dashboard 와 별개. systemd 자체 GUI. service 시작 실패 원인 빠른 진단.
      negative_signs:
      - wazuh-agent 확인(다른 컴포넌트)
      - 상태 문자열 확인 안 함
      - status 대신 start 시도
  target_vm: siem
  script: systemctl is-active wazuh-manager
  risk_level: low
  bastion_prompt: siem VM의 wazuh-manager 서비스 상태를 확인해줘
- order: 2
  instruction: Wazuh Indexer 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-indexer
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh-indexer 서비스 상태를 확인해줘

    📎 참고 (CLI): systemctl is-active wazuh-indexer || echo inactive'
  answer_detail: 'Wazuh SIEM 설치·구성: Wazuh Indexer 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Wazuh Indexer(OpenSearch fork) 상태 확인 — systemctl is-active wazuh-indexer.
        Indexer 는 alerts/events 저장 + 전문 검색 엔진(OpenSearch 기반, ElasticSearch fork).
        Dashboard + Manager 모두 Indexer 에 의존. port 9200(REST API) + 9300(cluster 통신)
        사용. || echo inactive 로 실패 시 명확한 표시. multi-node 클러스터 시 각 node 별 확인 필요
      success_criteria:
      - systemctl is-active wazuh-indexer 실행
      - active/inactive 출력
      - '|| echo fallback'
      acceptable_methods:
      - systemctl is-active wazuh-indexer || echo inactive
      - curl -k -u admin:admin https://localhost:9200/_cluster/health
      - sudo /usr/share/wazuh-indexer/bin/opensearch-cluster-manager
      - journalctl -u wazuh-indexer -n 20
      - GET /_cat/nodes?v API
      - |
        **[OSS] OpenSearch cluster API** — 표준 진단.
          # 1. cluster health (color status: green/yellow/red)
          curl -sk -u admin:admin https://localhost:9200/_cluster/health | jq
          # 2. node 정보 (단일 / cluster mode)
          curl -sk -u admin:admin https://localhost:9200/_cat/nodes?v
          # 3. 인덱스 목록 (wazuh-alerts-* 자동 생성)
          curl -sk -u admin:admin https://localhost:9200/_cat/indices/wazuh-alerts-*?v
          # 4. shard 분배 (cluster mode)
          curl -sk -u admin:admin https://localhost:9200/_cat/shards?v | head
        예상 출력 `{"cluster_name":"wazuh-cluster","status":"green","number_of_nodes":1,"active_shards":3} / wazuh-alerts-4.x-2026.05.06 green`.
        운영 해석: green=정상, yellow=replica 부족, red=primary shard 장애. red 즉시 조치 (디스크 / 메모리).
      - |
        **[OSS] Cerebro / elasticvue (cluster GUI)** — 시각화 표준.
          # Cerebro 설치 + 실행
          # docker run -d -p 9000:9000 lmenezes/cerebro
          # http://localhost:9000 → Connect 에 https://10.20.30.100:9200 입력
          # UI 동작:
          # - Overview: cluster health (green/yellow/red)
          # - Nodes: 각 node 의 heap/disk/load
          # - Indices: index 별 doc count + size
          # - Shards: shard 분배 시각화
          # elasticvue (browser extension) 도 동등
        UI 동작: cluster + indices 통합 GUI. shard relocation 시 시각화.
        운영 해석: 100+ index 환경 표준. CLI 보다 시각적 분석.
      - |
        **[OSS] netstat / ss (9200 + 9300)** — port 진단.
          # 1. 9200 (REST API) + 9300 (cluster transport) 둘 다 확인
          sudo ss -tlnp | grep -E "9200|9300"
          # 2. java 프로세스 확인
          ps aux | grep wazuh-indexer | grep -v grep
          # 3. 메모리 사용량 (JVM heap)
          ps -o pid,rss,vsz,cmd -p $(pgrep -f wazuh-indexer) | head
          # 4. 디스크 사용 (data path)
          sudo du -sh /var/lib/wazuh-indexer/
        예상 출력 `LISTEN 0:9200 java(wazuh-indexer) / LISTEN 0:9300 / RSS 2GB / Data 5GB`.
        운영 해석: 9200 = client API. 9300 = cluster 내부 통신 (multi-node). disk 80%+ 시 indexing 중단.
      - |
        **[OSS] Wazuh Dashboard (Indexer 통합 view)** — 운영 GUI.
          # 1. https://10.20.30.100/ 접속
          # 2. Indexer Management → Index management
          # - Indices 목록 + size + doc count
          # - lifecycle policy (rollover/delete)
          # 3. Discover 탭에서 index 검색
          # event_type:"alert" and rule.level:>=10
          # 4. CLI 검증
          curl -sk -u admin:admin https://localhost:9200/_cat/indices?v
        UI 동작: index 관리 + 검색 통합. SOC 분석가 표준.
        운영 해석: 100+ days 데이터 환경 표준. ILM 으로 cold/warm tier 자동 분배.
      - |
        **[OSS] opensearch-cli (공식 CLI)** — 자동화 표준.
          # 1. opensearch-cli 설치
          go install github.com/opensearch-project/opensearch-cli@latest
          # 2. cluster profile 등록
          opensearch-cli profile create --name wazuh \
              --endpoint https://localhost:9200 \
              --user admin --password admin --insecure
          # 3. cluster query
          opensearch-cli curl get --path "/_cluster/health" --profile wazuh
          # 4. 인덱스 통계
          opensearch-cli curl get --path "/_stats" --profile wazuh | jq '._all.total'
        예상 출력 `{"status":"green","number_of_nodes":1} / Total docs: 1500000`.
        운영 해석: curl + auth 자동화. 다중 cluster 환경 profile 분리.
      negative_signs:
      - indexer 대신 other service 확인
      - API health 확인 없이 systemctl 만
      - cluster 모드 고려 없음
  target_vm: siem
  script: systemctl is-active wazuh-indexer || echo inactive
  risk_level: low
  bastion_prompt: siem VM의 wazuh-indexer 서비스 상태를 확인해줘
- order: 3
  instruction: Wazuh Dashboard 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-dashboard
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM의 wazuh-dashboard 서비스 상태를 확인해줘

    📎 참고 (CLI): systemctl is-active wazuh-dashboard || echo inactive'
  answer_detail: 'Wazuh SIEM 설치·구성: Wazuh Dashboard 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Wazuh Dashboard(OpenSearch Dashboards) 상태 확인 — systemctl is-active wazuh-dashboard.
        Dashboard 는 시각화 + 관리 UI, OpenSearch Dashboards(Kibana fork) 기반. port 443 HTTPS
        또는 5601 기본. Wazuh 전용 plugin 으로 agent 관리·rules/decoders 편집·MITRE ATT&CK 매핑
        제공. 중단 시 운영자 UI 접근 불가 but core 탐지는 영향 없음(Manager+Indexer 로 지속)
      success_criteria:
      - systemctl is-active wazuh-dashboard 실행
      - active 또는 inactive 출력
      - '|| echo fallback'
      acceptable_methods:
      - systemctl is-active wazuh-dashboard || echo inactive
      - curl -k https://localhost/app/wazuh (dashboard URL)
      - ss -tlnp | grep :443|:5601
      - journalctl -u wazuh-dashboard
      - docker ps | grep dashboard (container 모드)
      - |
        **[OSS] Wazuh Dashboard 헬스체크** — 표준 운영.
          # 1. systemd 서비스
          systemctl is-active wazuh-dashboard
          # 2. HTTP endpoint 응답
          curl -sk -o /dev/null -w "Dashboard: %{http_code}\n" https://localhost/app/wazuh
          # 3. listening port (443 or 5601)
          sudo ss -tlnp | grep -E ":443|:5601"
          # 4. plugin 적재 확인
          sudo ls /usr/share/wazuh-dashboard/plugins/ | grep -i wazuh
          # 5. journal 로그 (시작 실패 시)
          sudo journalctl -u wazuh-dashboard --since "5 min ago" | grep -iE "error|warning"
        예상 출력 `active / Dashboard: 200 / LISTEN 0:443 / wazuh / wazuhCheckUpdates`.
        운영 해석: 200 = 정상, 503 = backend (Indexer) 미준비. plugin 누락 시 Wazuh 메뉴 비활성.
      - |
        **[OSS] OpenSearch Dashboards (frontend)** — backend.
          # Wazuh Dashboard = OpenSearch Dashboards + Wazuh plugin
          # 1. /etc/wazuh-dashboard/opensearch_dashboards.yml 설정
          sudo cat /etc/wazuh-dashboard/opensearch_dashboards.yml | grep -E "host|port"
          # 2. node 시작 옵션
          sudo cat /usr/share/wazuh-dashboard/config/node.options | head
          # 3. 메모리 사용량
          ps -o pid,rss,cmd -p $(pgrep -f wazuh-dashboard)
        예상 출력 `server.host: "0.0.0.0" / server.port: 443 / Memory: 800MB`.
        운영 해석: OpenSearch Dashboards = Kibana fork. Node.js + plugins. memory leak 의심 시 PID restart.
      - |
        **[OSS] curl + JSON API (자동화 진단)** — programmatic.
          # 1. Dashboard API endpoint
          curl -sk https://localhost/api/status | jq '.status.overall'
          # 2. plugin 목록
          curl -sk https://localhost/api/stats | jq '.process'
          # 3. login + session API
          curl -sk -X POST https://localhost/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin"}'
        예상 출력 `{"state":"green","title":"Green"} / process_uptime: 86400`.
        운영 해석: Dashboard 의 health API 로 자동 진단. monit 등 watchdog 통합 표준.
      - |
        **[OSS] cockpit + nginx reverse proxy** — multi-tenancy.
          # 1. nginx 가 wazuh-dashboard 앞단 프록시 (production)
          sudo cat /etc/nginx/sites-enabled/wazuh-dashboard.conf
          # location / {
          #   proxy_pass https://localhost:5601;
          #   proxy_ssl_verify off;
          # }
          # 2. nginx + dashboard 동시 health check
          curl -sk https://localhost/ -o /dev/null -w "nginx %{http_code}\n"
          curl -sk https://localhost:5601/ -o /dev/null -w "dashboard %{http_code}\n"
          # 3. nginx access.log 의 dashboard 응답 분석
          sudo tail -f /var/log/nginx/access.log | grep "wazuh"
        UI 동작: nginx 가 SSL 종단 + 인증 + load balance.
        운영 해석: production 표준. multi-host dashboard cluster 환경.
      - |
        **[OSS] Wazuh Dashboard plugins 관리** — 확장 + 사용자화.
          # 1. plugin 목록
          sudo /usr/share/wazuh-dashboard/bin/opensearch-dashboards-plugin list
          # 2. plugin 설치 (예: alerting)
          sudo /usr/share/wazuh-dashboard/bin/opensearch-dashboards-plugin install \
              https://artifacts.opensearch.org/.../alertingDashboards-2.x.zip
          # 3. plugin 적재 후 restart
          sudo systemctl restart wazuh-dashboard
          # 4. UI: Settings → Plugins → 추가/비활성
        예상 출력 `wazuh, alerting, anomalyDetection`.
        운영 해석: Wazuh 외 추가 OpenSearch plugin 통합 가능. 룰 기반 alert + ML anomaly detection.
      negative_signs:
      - dashboard 대신 manager 확인
      - URL 접근 없이 systemctl 만
      - plugin 설치 상태 확인 누락
  target_vm: siem
  script: systemctl is-active wazuh-dashboard || echo inactive
  risk_level: low
  bastion_prompt: siem VM의 wazuh-dashboard 서비스 상태를 확인해줘
- order: 4
  instruction: wazuh-control info 로 Wazuh 버전·설치 정보를 확인하시오.
  hint: /var/ossec/bin/wazuh-control info
  category: survey
  points: 10
  answer: '🤖 프롬프트: siem VM에서 wazuh-control info 로 설치 정보를 확인해줘

    📎 참고 (CLI): sudo /var/ossec/bin/wazuh-control info 2>&1 | head'
  answer_detail: 'Wazuh SIEM 설치·구성: wazuh-control info 로 Wazuh 버전·설치 정보를 확인하시오.'
  verify:
    type: output_contains
    expect: WAZUH
    field: stdout
    semantic:
      intent: 'Wazuh 버전·설치 정보 — sudo /var/ossec/bin/wazuh-control info 2>&1 | head.
        출력: WAZUH_VERSION=v4.7.x, WAZUH_REVISION=40700, WAZUH_TYPE=server. 버전 별 호환성
        이슈: Manager + Indexer + Dashboard + Agent 모두 메이저 버전 일치 권장. 업데이트: apt-get install
        wazuh-manager=4.8.* 로 pin, indexer/dashboard 순차 업그레이드 프로세스. WAZUH_REVISION
        은 상세 build 번호'
      success_criteria:
      - wazuh-control info 실행
      - WAZUH 문자열 포함
      - 버전·리비전 출력
      acceptable_methods:
      - sudo /var/ossec/bin/wazuh-control info
      - cat /var/ossec/.manifest.json | jq .version
      - dpkg -l wazuh-manager(배포판)
      - rpm -q wazuh-manager
      - curl -k https://localhost:55000/security/user/authenticate -u wazuh-wui:...
        (API version)
      - |
        **[OSS] wazuh-control info (공식 도구)** — 표준 진단.
          # 1. 버전 + 메타 정보
          sudo /var/ossec/bin/wazuh-control info
          # 2. 출력 분석
          # WAZUH_VERSION="v4.7.5"
          # WAZUH_REVISION="40700"
          # WAZUH_TYPE="server"
          # 3. shell 변수로 사용
          source <(sudo /var/ossec/bin/wazuh-control info)
          echo "Version: $WAZUH_VERSION / Revision: $WAZUH_REVISION"
        예상 출력 `WAZUH_VERSION="v4.7.5" / WAZUH_REVISION="40700" / WAZUH_TYPE="server"`.
        운영 해석: shell 친화적 변수 형식. CI script 에 source 로 import. server / agent type 구분.
      - |
        **[OSS] Wazuh API (manager/info endpoint)** — REST.
          # 1. JWT 토큰
          TOKEN=$(curl -sk -u wazuh-wui:wazuh-wui -X POST "https://localhost:55000/security/user/authenticate?raw=true")
          # 2. manager 정보 조회
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/manager/info" | jq
          # 3. version 만 추출
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/manager/info" | jq -r '.data.affected_items[0].version'
