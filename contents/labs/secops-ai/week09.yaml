    📎 참고 (CLI): sudo grep -n log_alert_level /var/ossec/etc/ossec.conf'
  answer_detail: 'Wazuh SIEM 설치·구성: ossec.conf 에서 <alerts>/<log_alert_level> 값을 확인하시오.'
  verify:
    type: output_contains
    expect: log_alert_level
    field: stdout
    semantic:
      intent: log_alert_level 설정 확인 — sudo grep -n log_alert_level /var/ossec/etc/ossec.conf.
        Wazuh rule level 0-15(0=ignore, 15=critical). <log_alert_level>N</log_alert_level>
        은 alerts.log 에 기록할 최소 level 임계치 - 기본 3(low)이면 level 3 이상만 기록. 높게 설정 시 저수준
        alert 무시(log noise 감소), 낮게 설정 시 모든 alert 기록. <email_alert_level> 은 이메일 기준
        별도
      success_criteria:
      - grep log_alert_level 실행
      - 설정 값 출력
      - line number 포함
      acceptable_methods:
      - sudo grep -n log_alert_level /var/ossec/etc/ossec.conf
      - sudo xmllint --xpath //log_alert_level ossec.conf
      - cat 후 수동 검색
      - Wazuh Dashboard Configuration editor
      - /var/ossec/etc/rules/*.xml 에서 rule level 분포
      - |
        **[OSS] grep + line number (정확한 위치)** — 표준.
          # 1. log_alert_level 값 + 라인 번호
          sudo grep -nE "log_alert_level|email_alert_level" /var/ossec/etc/ossec.conf
          # 2. <alerts> 블록 전체
          sudo awk '/<alerts>/,/<\/alerts>/' /var/ossec/etc/ossec.conf
          # 3. 환경 변수로 값 추출
          LEVEL=$(sudo grep -oP '<log_alert_level>\K[0-9]+' /var/ossec/etc/ossec.conf)
          echo "Current log alert level: $LEVEL"
        예상 출력 `42:    <log_alert_level>3</log_alert_level> / 43:    <email_alert_level>12</email_alert_level>`.
        운영 해석: log_alert_level 3 = 기본. 5+ 면 noise 줄임 but 일부 alert 누락. 12+ 면 오로지 critical 만.
      - |
        **[OSS] xmllint XPath (정밀)** — XML query 표준.
          # 1. log_alert_level 값
          sudo xmllint --xpath 'string(//ossec_config/alerts/log_alert_level)' /var/ossec/etc/ossec.conf
          # 2. 모든 alert 관련 설정
          sudo xmllint --xpath '//ossec_config/alerts' /var/ossec/etc/ossec.conf
          # 3. email_alert_level 별도 추출
          sudo xmllint --xpath 'string(//ossec_config/alerts/email_alert_level)' /var/ossec/etc/ossec.conf
        예상 출력 `3 / <alerts><log_alert_level>3</log_alert_level><email_alert_level>12</email_alert_level></alerts> / 12`.
        운영 해석: log = file 저장 임계, email = 메일 발송 임계. log 3, email 12 가 표준 권장.
      - |
        **[OSS] /var/ossec/etc/rules/ 의 rule level 분포** — 룰 카탈로그 분석.
          # 1. 모든 rule level 빈도
          sudo grep -oE 'level="[0-9]+"' /var/ossec/ruleset/rules/*.xml | sort | uniq -c | sort -rn | head
          # 2. 특정 level 룰 (예: critical = 12+)
          sudo grep -B2 'level="12"' /var/ossec/ruleset/rules/*.xml | head
          # 3. 룰 ID 별 level 매핑
          sudo grep -oE 'id="[0-9]+" level="[0-9]+"' /var/ossec/ruleset/rules/*.xml | head
        예상 출력 `1500 level="3" / 800 level="5" / 200 level="10" / 50 level="12" / 5 level="15"`.
        운영 해석: 룰 분포 = log_alert_level 임계 결정 근거. level 3 = 일반 audit, level 12+ = 즉시 대응.
      - |
        **[OSS] Wazuh Dashboard Threshold tuning** — GUI.
          # 1. https://10.20.30.100/ → Settings → Configuration
          # 2. Alerts 섹션:
          # - log_alert_level
          # - email_alert_level
          # 3. 변경 후 "Restart manager" 자동 호출
          # 4. 효과 측정
          # - alerts.json 라인 수 변화 (전후 비교)
          # 5. 권장 단계적 조정
          # - 기본 3 → 운영 안정 후 5 (noise 감소)
          # - 5 → critical 환경에서 7
        UI 동작: GUI 편집 + auto restart + audit log.
        운영 해석: 신규 분석가도 안전한 threshold 조정. CLI 직접 sed 편집 위험 회피.
      - |
        **[OSS] log alert level 효과 측정** — 정량 비교.
          # 1. 변경 전 alert 수 측정
          before=$(sudo wc -l < /var/ossec/logs/alerts/alerts.json)
