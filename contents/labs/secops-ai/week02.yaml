      - ip addr show lo 로 127.0.0.1 확인 후 source/dest 기반 룰
      negative_signs:
      - lo 인터페이스 드롭
      - iifname 오타(iifnamelo 등)
      - accept 대신 jump/return
  target_vm: secu
  script: sudo nft add rule inet lab input iifname lo accept
  risk_level: low
  bastion_prompt: 'secu VM의 lab.input 체인에 loopback 인터페이스 허용 룰을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
