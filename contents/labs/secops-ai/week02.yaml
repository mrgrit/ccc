lab_id: secops-ai-week02
title: nftables 방화벽 기초 (AI 지원)
version: ai
course: secops-ai
week: 2
description: nftables로 간단한 방화벽 테이블/체인/룰을 작성하고 input/output/forward 체인의 동작을 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- nftables의 테이블/체인/룰 개념을 이해한다
- input 체인에서 특정 포트를 허용/차단할 수 있다
- 룰 추가·삭제·확인 명령어를 숙지한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 계열 테이블 'lab'을 생성하시오.
  hint: nft add table inet lab
  category: configure
  points: 10
  answer: sudo nft add table inet lab
  answer_detail: 'nftables 방화벽 기초: secu VM에 inet 계열 테이블 ''lab''을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: sudo nft add table inet lab
  risk_level: low
  bastion_prompt: secu VM에 'inet lab' nftables 테이블을 만들어줘
- order: 2
  instruction: lab 테이블에 input 체인(hook input, priority 0, policy accept)을 생성하시오.
  hint: nft add chain …
  category: configure
  points: 10
  answer: sudo nft add chain inet lab input '{ type filter hook input priority 0 \;
    policy accept \; }'
  answer_detail: 'nftables 방화벽 기초: lab 테이블에 input 체인(hook input, priority 0, policy
    accept)을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: sudo nft add chain inet lab input '{ type filter hook input priority 0 \;
    policy accept \; }'
  risk_level: low
  bastion_prompt: secu VM의 lab 테이블에 input hook 체인을 만들어줘
- order: 3
  instruction: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.
  hint: nft add rule inet lab input tcp dport 23 drop
  category: configure
  points: 10
  answer: sudo nft add rule inet lab input tcp dport 23 drop
  answer_detail: 'nftables 방화벽 기초: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: drop
    field: stdout
  target_vm: secu
  script: sudo nft add rule inet lab input tcp dport 23 drop
  risk_level: low
  bastion_prompt: secu VM의 lab.input에 telnet(tcp/23) 차단 룰을 추가해줘
- order: 4
  instruction: nft list table inet lab 으로 작성한 룰을 확인하시오.
  hint: nft list table inet lab
  category: verify
  points: 10
  answer: sudo nft list table inet lab
  answer_detail: 'nftables 방화벽 기초: nft list table inet lab 으로 작성한 룰을 확인하시오.'
  verify:
    type: output_contains
    expect: dport 23
    field: stdout
  target_vm: secu
  script: sudo nft list table inet lab
  risk_level: low
  bastion_prompt: secu VM의 lab 테이블 룰셋을 출력해줘
- order: 5
  instruction: established, related 연결을 허용하는 상태 기반 룰을 input 체인 맨 앞에 삽입하시오.
  hint: nft insert rule …
  category: configure
  points: 10
  answer: sudo nft insert rule inet lab input ct state established,related accept
  answer_detail: 'nftables 방화벽 기초: established, related 연결을 허용하는 상태 기반 룰을 input 체인
    맨 앞에 삽입하시오.'
  verify:
    type: output_contains
    expect: established
    field: stdout
  target_vm: secu
  script: sudo nft insert rule inet lab input ct state established,related accept
  risk_level: low
  bastion_prompt: secu VM에서 lab.input 체인 맨 앞에 ct state established,related accept
    룰을 삽입해줘
- order: 6
  instruction: loopback(lo)에서 들어오는 트래픽을 허용하는 룰을 추가하시오.
  hint: iifname lo accept
  category: configure
  points: 10
  answer: sudo nft add rule inet lab input iifname lo accept
  answer_detail: 'nftables 방화벽 기초: loopback(lo)에서 들어오는 트래픽을 허용하는 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: lo
    field: stdout
  target_vm: secu
  script: sudo nft add rule inet lab input iifname lo accept
  risk_level: low
  bastion_prompt: secu VM의 lab.input 체인에 loopback 인터페이스 허용 룰을 추가해줘
- order: 7
  instruction: tcp 22(ssh) 포트를 허용하는 룰을 추가하시오.
  hint: tcp dport 22 accept
  category: configure
  points: 10
  answer: sudo nft add rule inet lab input tcp dport 22 accept
  answer_detail: 'nftables 방화벽 기초: tcp 22(ssh) 포트를 허용하는 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: dport 22
    field: stdout
  target_vm: secu
  script: sudo nft add rule inet lab input tcp dport 22 accept
  risk_level: low
  bastion_prompt: secu VM의 lab.input 체인에 ssh(tcp/22) 허용 룰을 추가해줘
- order: 8
  instruction: 전체 룰셋(모든 테이블)을 nft list ruleset 명령으로 확인하시오.
  hint: nft list ruleset
  category: verify
  points: 10
  answer: sudo nft list ruleset
  answer_detail: 'nftables 방화벽 기초: 전체 룰셋(모든 테이블)을 nft list ruleset 명령으로 확인하시오.'
  verify:
    type: output_contains
    expect: table inet lab
    field: stdout
  target_vm: secu
  script: sudo nft list ruleset
  risk_level: low
  bastion_prompt: secu VM의 nftables 전체 룰셋을 확인해줘
- order: 9
  instruction: 실습 종료 후 lab 테이블을 삭제하시오.
  hint: nft delete table inet lab
  category: cleanup
  points: 10
  answer: sudo nft delete table inet lab
  answer_detail: 'nftables 방화벽 기초: 실습 종료 후 lab 테이블을 삭제하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: sudo nft delete table inet lab
  risk_level: low
  bastion_prompt: secu VM의 inet lab nftables 테이블을 삭제해줘
- order: 10
  instruction: lab 테이블이 삭제되었는지 nft list tables 로 확인하시오.
  hint: nft list tables
  category: verify
  points: 10
  answer: sudo nft list tables | grep -v ' lab$' | tail
  answer_detail: 'nftables 방화벽 기초: lab 테이블이 삭제되었는지 nft list tables 로 확인하시오.'
  verify:
    type: output_contains
    expect: table
    field: stdout
  target_vm: secu
  script: sudo nft list tables | grep -v ' lab$' | tail
  risk_level: low
  bastion_prompt: secu VM에서 nftables 테이블 목록을 확인해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  answer: ''
  answer_detail: ''
  risk_level: low
  bastion_prompt: 'secu/web/siem VM 전반에 대해 다음 작업들을 순서대로 수행해줘:

    1) secu VM에 ''inet lab'' nftables 테이블을 만들어줘

    2) secu VM의 lab 테이블에 input hook 체인을 만들어줘

    3) secu VM의 lab.input에 telnet(tcp/23) 차단 룰을 추가해줘

    4) secu VM의 lab 테이블 룰셋을 출력해줘

    5) secu VM에서 lab.input 체인 맨 앞에 ct state established,related accept 룰을 삽입해줘'
