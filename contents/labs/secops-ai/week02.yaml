lab_id: secops-ai-week02
title: nftables 방화벽 기초 (AI 지원)
version: ai
course: secops-ai
week: 2
description: nftables로 간단한 방화벽 테이블/체인/룰을 작성하고 input/output/forward 체인의 동작을 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- nftables의 테이블/체인/룰 개념을 이해한다
- input 체인에서 특정 포트를 허용/차단할 수 있다
- 룰 추가·삭제·확인 명령어를 숙지한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 계열 테이블 'lab'을 생성하시오.
  hint: nft add table inet lab
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에 ''inet lab'' nftables 테이블을 만들어줘

    📎 참고 (CLI): sudo nft add table inet lab'
  answer_detail: 'nftables 방화벽 기초: secu VM에 inet 계열 테이블 ''lab''을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'inet family lab 테이블 생성 — sudo nft add table inet lab 로 IPv4+IPv6 공통
        필터링 가능한 inet 테이블 생성. nftables 의 계층: table → chain → rule. inet family 는 ip
        + ip6 통합 관리로 운영 효율적. 생성 후 nft list tables | grep lab 로 존재 확인. 기존 동일 이름 있으면
        idempotent 하게 유지(에러 없음)'
      success_criteria:
      - nft add table inet lab 실행
      - sudo 또는 root 권한 사용
      - 에러 없이 종료 또는 기존 존재 확인
      acceptable_methods:
      - sudo nft add table inet lab
      - echo add table inet lab | sudo nft -f -
      - /etc/nftables.conf 에 table inet lab {} 추가 후 systemctl restart nftables
      - nft create table inet lab(idempotent 아님)
      negative_signs:
      - ip 또는 ip6 family 만 사용(v4/v6 분리 필요 시 제외 OK)
      - sudo 없이 permission denied 무시
      - nft 없이 iptables 로 대체
  target_vm: secu
  script: sudo nft add table inet lab
  risk_level: low
  bastion_prompt: 'secu VM에 ''inet lab'' nftables 테이블을 만들어줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: lab 테이블에 input 체인(hook input, priority 0, policy accept)을 생성하시오.
  hint: nft add chain …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 lab 테이블에 input hook 체인을 만들어줘

    📎 참고 (CLI): sudo nft add chain inet lab input ''{ type filter hook input priority
    0 \; policy accept \; }'''
  answer_detail: 'nftables 방화벽 기초: lab 테이블에 input 체인(hook input, priority 0, policy
    accept)을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: lab 테이블 input chain 생성 — nft add chain inet lab input { type filter
        hook input priority 0 ; policy accept ; }. hook=input(호스트로 들어오는 트래픽), priority=0(netfilter
        filter priority), policy=accept(체인 끝까지 매칭 없을 때 기본). semicolon 은 쉘에서 backslash
        이스케이프 또는 single quote 로 감싸기. Base chain 이어야 hook 실제 동작, regular chain 은 jump
        대상만 됨
      success_criteria:
      - nft add chain inet lab input 실행
      - type filter hook input priority 0 필수 요소
      - policy accept 또는 drop 지정
      acceptable_methods:
      - sudo nft add chain inet lab input { type filter hook input priority 0 ; policy
        accept ; }
      - /etc/nftables.conf 에 chain 블록 정의 후 nft -f 로드
      - nft edit 명령어 사용
      - 'base chain priority: -300(raw), -150(mangle), -100(dstnat), 0(filter), 100(srcnat)'
      negative_signs:
      - hook 지정 없이 regular chain 생성(동작 안 함)
      - semicolon 이스케이프 실수로 문법 오류
      - priority 누락
  target_vm: secu
  script: sudo nft add chain inet lab input '{ type filter hook input priority 0 \;
    policy accept \; }'
  risk_level: low
  bastion_prompt: 'secu VM의 lab 테이블에 input hook 체인을 만들어줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.
  hint: nft add rule inet lab input tcp dport 23 drop
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 lab.input에 telnet(tcp/23) 차단 룰을 추가해줘

    📎 참고 (CLI): sudo nft add rule inet lab input tcp dport 23 drop'
  answer_detail: 'nftables 방화벽 기초: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.'
  verify:
    type: output_contains
    expect:
    - drop
    - 차단
    field: stdout
    semantic:
      intent: 'telnet(tcp/23) drop 룰 추가 — nft add rule inet lab input tcp dport 23
        drop. Telnet 은 평문 프로토콜, 원칙적으로 차단 권장(대체: SSH). 입력 체인에서 destination port 23
        매칭 시 drop(silent discard) - reject 와 다르게 RST 응답 없음. 공격자의 port scan 에 stealth
        효과. CIS Benchmark 에서도 telnet 차단 권장'
      success_criteria:
      - nft add rule ... tcp dport 23 drop 실행
      - drop 또는 reject action 지정
      - telnet 포트 23 명시
      acceptable_methods:
      - sudo nft add rule inet lab input tcp dport 23 drop
      - sudo nft add rule inet lab input tcp dport 23 reject
      - iptables -A INPUT -p tcp --dport 23 -j DROP
      - ufw deny 23/tcp
      - firewalld rich-rule 로 차단
      negative_signs:
      - udp 포트 차단
      - accept action(차단 아님)
      - 다른 포트(22/80) 차단
  target_vm: secu
  script: sudo nft add rule inet lab input tcp dport 23 drop
  risk_level: low
  bastion_prompt: 'secu VM의 lab.input에 telnet(tcp/23) 차단 룰을 추가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: nft list table inet lab 으로 작성한 룰을 확인하시오.
  hint: nft list table inet lab
  category: verify
  points: 10
  answer: '🤖 프롬프트: secu VM의 lab 테이블 룰셋을 출력해줘

    📎 참고 (CLI): sudo nft list table inet lab'
  answer_detail: 'nftables 방화벽 기초: nft list table inet lab 으로 작성한 룰을 확인하시오.'
  verify:
    type: output_contains
    expect: dport 23
    field: stdout
    semantic:
      intent: 'lab 테이블 룰셋 출력 — sudo nft list table inet lab 로 lab 테이블의 모든 chain +
        rule 시각화. 출력 포맷: table inet lab { chain input { type filter hook input priority
        filter; policy accept; tcp dport 23 drop } } + handle 번호(룰 수정/삭제 시 참조). -a
        옵션 추가하면 handle 표시, -j 로 JSON 포맷'
      success_criteria:
      - nft list table inet lab 실행
      - chain input 또는 rule 구조 출력
      - dport 23 또는 drop 확인
      acceptable_methods:
      - sudo nft list table inet lab
      - sudo nft -a list table inet lab(handle 번호 표시)
      - sudo nft -j list table inet lab | jq
      - sudo nft list chain inet lab input(특정 chain 만)
      negative_signs:
      - 다른 테이블 출력
      - 룰 내용 확인 없이 테이블명만
      - 에러 숨김
  target_vm: secu
  script: sudo nft list table inet lab
  risk_level: low
  bastion_prompt: secu VM의 lab 테이블 룰셋을 출력해줘
- order: 5
  instruction: established, related 연결을 허용하는 상태 기반 룰을 input 체인 맨 앞에 삽입하시오.
  hint: nft insert rule …
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM에서 lab.input 체인 맨 앞에 ct state established,related accept
    룰을 삽입해줘

    📎 참고 (CLI): sudo nft insert rule inet lab input ct state established,related accept'
  answer_detail: 'nftables 방화벽 기초: established, related 연결을 허용하는 상태 기반 룰을 input 체인
    맨 앞에 삽입하시오.'
  verify:
    type: output_contains
    expect: established
    field: stdout
    semantic:
      intent: Stateful firewall - ct state established,related accept 룰 맨 앞 삽입 — nft
        insert rule(= add at position 0). Conntrack 의 established(이미 allow 된 outbound
        응답), related(FTP data·ICMP error 같은 연관 연결) 를 최우선 허용하여 성능 + 정확성 향상. 안 하면 outbound
        응답마다 룰 재매칭, stateful firewall 핵심 패턴. first rule 위치 중요(성능상)
      success_criteria:
      - nft insert rule 명령 사용(append 아닌 prepend)
      - ct state established,related accept 전체 expression
      - input chain 지정
      acceptable_methods:
      - sudo nft insert rule inet lab input ct state established,related accept
      - /etc/nftables.conf 에 첫 룰로 배치 후 reload
      - nft add rule ... index 0 ... 형태
      - iptables -I INPUT 1 -m state --state ESTABLISHED,RELATED -j ACCEPT
      negative_signs:
      - add 로 맨 뒤 추가(순서 중요한데)
      - ct state 없이 단순 accept
      - new 포함(정상 SYN 도 허용하게 됨)
  target_vm: secu
  script: sudo nft insert rule inet lab input ct state established,related accept
  risk_level: low
  bastion_prompt: 'secu VM에서 lab.input 체인 맨 앞에 ct state established,related accept
    룰을 삽입해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: loopback(lo)에서 들어오는 트래픽을 허용하는 룰을 추가하시오.
  hint: iifname lo accept
  category: configure
  points: 10
  answer: '🤖 프롬프트: secu VM의 lab.input 체인에 loopback 인터페이스 허용 룰을 추가해줘

    📎 참고 (CLI): sudo nft add rule inet lab input iifname lo accept'
  answer_detail: 'nftables 방화벽 기초: loopback(lo)에서 들어오는 트래픽을 허용하는 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: lo
    field: stdout
    semantic:
      intent: loopback 인터페이스 허용 — nft add rule inet lab input iifname lo accept. 많은
        앱이 localhost(127.0.0.1)로 IPC 통신(DB/API/monitoring). lo interface 트래픽 차단 시
        시스템 오동작. iifname=input interface name. 보통 stateful + loopback 이 firewall 의
        기본 2줄. RFC 5735 loopback 주소
      success_criteria:
