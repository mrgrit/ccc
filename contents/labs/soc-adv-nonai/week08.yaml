lab_id: "soc-adv-nonai-week08"
title: "메모리 포렌식 - 휘발성 데이터 분석"
version: "non-ai"
course: "soc-adv-nonai"
week: 8
description: "Volatility를 활용하여 메모리 덤프에서 악성코드, 루트킷, 인젝션된 코드를 분석하는 실습"
difficulty: "hard"
duration_minutes: 120
objectives:
  - "메모리 포렌식의 원리와 필요성을 이해한다"
  - "Volatility 도구로 메모리 아티팩트를 분석할 수 있다"
  - "메모리에서 악성코드 흔적을 식별할 수 있다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "메모리 포렌식의 필요성을 설명하라. 디스크 포렌식으로는 발견할 수 없는 메모리 전용 아티팩트(프로세스, 네트워크 연결, 레지스트리 하이브, 암호화 키)를 나열하라."
    hint: "fileless 악성코드는 디스크에 흔적을 남기지 않는다"
    category: "analysis"
    points: 8
    answer: "메모리 전용 아티팩트: 1) 실행 중 프로세스+커맨드라인, 2) 활성 네트워크 연결, 3) 언패킹된 악성코드, 4) 암호화 키/비밀번호, 5) 인젝션된 코드, 6) 커널 후킹"
    answer_detail: "메모리 포렌식은 디스크 포렌식의 한계를 극복한다. Fileless 악성코드, 프로세스 인젝션, 루트킷은 디스크에 흔적을 남기지 않으므로 메모리 분석이 유일한 탐지 수단이다."
    verify:
      type: "output_contains"
      expect: "메모리"

  - order: 2
    instruction: "메모리 덤프 수집 방법을 실습하라. Linux 환경에서 /proc/kcore, LiME(Linux Memory Extractor)를 활용한 메모리 덤프 수집 절차를 설명하고 실행하라."
    hint: "LiME은 커널 모듈로 로드하여 메모리를 덤프한다: insmod lime.ko path=/tmp/mem.lime format=lime"
    category: "collection"
    points: 10
    answer: "수집 방법: 1) LiME 커널 모듈 로드(insmod), 2) /proc/kcore 복사(제한적), 3) AVML(Azure VM), 4) /dev/mem(제한적). 수집 직후 SHA-256 해시 생성"
    answer_detail: "메모리 수집은 시스템에 최소한의 영향을 주어야 한다. LiME은 커널 모듈로 동작하므로 사전 컴파일이 필요하며, 분석 대상 시스템의 커널 버전에 맞는 모듈을 준비해야 한다."
    verify:
      type: "output_contains"
      expect: "LiME"

  - order: 3
    instruction: "Volatility 3의 기본 사용법을 익혀라. 메모리 덤프의 OS 프로파일을 식별하고, 프로세스 목록(linux.pslist), 네트워크 연결(linux.sockstat), 파일 시스템(linux.mount)을 확인하라."
    hint: "vol3 -f mem.lime linux.pslist.PsList"
    category: "analysis"
    points: 10
    answer: "pslist: PID, PPID, UID, 프로세스명, 커맨드라인 출력. sockstat: 활성 소켓(TCP/UDP), 연결 상태, 로컬/원격 주소. mount: 마운트된 파일시스템 목록"
    answer_detail: "Volatility 3은 메모리 분석의 표준 도구이다. 프로세스, 네트워크, 파일시스템 정보를 추출하여 시스템 상태를 재구성한다. 각 플러그인의 출력을 교차 분석하여 이상 징후를 식별한다."
    verify:
      type: "output_contains"
      expect: "Volatility"

  - order: 4
    instruction: "프로세스 트리를 분석하라. 부모-자식 관계를 추적하여 비정상적인 프로세스 계층(예: 웹서버에서 셸 실행)을 식별하라."
    hint: "linux.pstree 플러그인으로 트리 구조를 확인하라"
    category: "analysis"
    points: 10
    answer: "비정상 패턴: 1) apache→bash→wget(웹쉘 의심), 2) sshd→bash→python(리버스쉘), 3) cron→sh→curl(C2 통신), 4) init→고아프로세스(부모 종료)"
    answer_detail: "프로세스 트리 분석은 공격자의 실행 경로를 추적한다. 웹서버(httpd/apache/nginx)에서 셸이 생성되면 웹쉘 의심, 서비스 프로세스에서 비정상 자식이 생성되면 침해 의심이다."
    verify:
      type: "output_contains"
      expect: "프로세스"

  - order: 5
    instruction: "숨겨진 프로세스를 탐지하라. pslist와 다른 방법(psscan, psaux)의 결과를 비교하여 루트킷이 숨긴 프로세스를 식별하라."
    hint: "pslist는 커널 리스트를 따르고, psscan은 메모리 전체를 스캔한다"
    category: "detection"
    points: 12
    answer: "비교 분석: pslist에 없지만 psscan에 있는 프로세스 = 숨겨진 프로세스(루트킷 의심). 프로세스의 실행 파일 경로와 열린 파일을 추가 분석"
    answer_detail: "루트킷은 커널의 프로세스 리스트를 조작하여 프로세스를 숨긴다. pslist는 조작된 리스트를 읽지만, psscan은 메모리를 직접 스캔하므로 숨겨진 프로세스를 발견할 수 있다."
    verify:
      type: "output_contains"
      expect: "루트킷"

  - order: 6
    instruction: "네트워크 연결을 분석하라. 활성 네트워크 소켓에서 의심스러운 외부 연결(C2, 데이터 유출)을 식별하고, 해당 프로세스를 추적하라."
    hint: "linux.sockstat으로 소켓 목록을 확인하고, PID로 프로세스를 매핑하라"
    category: "analysis"
    points: 10
    answer: "의심 연결: 1) 비표준 포트의 외부 연결, 2) ESTABLISHED 상태의 알 수 없는 목적지, 3) LISTEN 상태의 예상치 못한 포트. 각 연결의 PID→프로세스명 매핑"
    answer_detail: "메모리에서의 네트워크 분석은 현재 활성 연결의 스냅샷을 제공한다. netstat 명령이 숨긴 연결도 메모리에서는 발견할 수 있으며, 프로세스-소켓 매핑으로 악성 통신의 주체를 특정한다."
    verify:
      type: "output_contains"
      expect: "네트워크"

  - order: 7
    instruction: "프로세스 메모리에서 문자열을 추출하라. 의심 프로세스의 메모리 영역에서 URL, IP 주소, 명령어, 인증 정보 등 유의미한 문자열을 추출하라."
    hint: "linux.proc.Maps + strings 또는 vol3의 procdump으로 프로세스를 덤프한 후 strings를 실행하라"
    category: "extraction"
    points: 10
    answer: "추출된 문자열: C2 URL, 인코딩된 명령, 비밀번호, SSH 키 조각, 설정 파일 내용 등"
    answer_detail: "프로세스 메모리의 문자열 추출은 악성코드의 기능과 설정을 파악하는 핵심 기법이다. 암호화되지 않은 C2 주소, 하드코딩된 인증 정보, 명령 이력 등을 발견할 수 있다."
    verify:
      type: "output_contains"
      expect: "문자열"

  - order: 8
    instruction: "커널 모듈을 분석하라. 로드된 커널 모듈 목록을 확인하고, 비정상적인 모듈(루트킷)을 식별하라."
    hint: "linux.lsmod 플러그인으로 모듈 목록을 확인하고, 기본 모듈과 비교하라"
    category: "detection"
    points: 10
    answer: "커널 모듈 분석: 전체 로드 모듈 N개, 서명 없는 모듈 M개, 비표준 경로 모듈 K개. 의심 모듈의 메모리 영역 덤프 및 문자열 분석"
    answer_detail: "커널 루트킷은 커널 모듈로 설치되어 시스템 호출을 후킹한다. 서명되지 않은 모듈, 비표준 경로에서 로드된 모듈, 숨겨진 모듈은 루트킷의 지표이다."
    verify:
      type: "output_contains"
      expect: "커널"

  - order: 9
    instruction: "파일 캐시를 분석하라. 메모리의 파일 캐시에서 삭제된 파일이나 최근 접근한 파일의 내용을 복구하라."
    hint: "linux.pagecache 또는 linux.find_file 플러그인을 활용하라"
    category: "recovery"
    points: 10
    answer: "파일 캐시 복구: 삭제되었지만 캐시에 남아있는 파일 N개, 최근 접근 파일 목록, 복구된 파일의 내용 분석"
    answer_detail: "Linux의 페이지 캐시는 최근 접근한 파일의 내용을 메모리에 보관한다. 공격자가 파일을 삭제해도 캐시에 남아있을 수 있으며, 이를 통해 삭제된 악성 도구나 유출 데이터를 복구할 수 있다."
    verify:
      type: "output_contains"
      expect: "캐시"

  - order: 10
    instruction: "bash 히스토리와 환경 변수를 추출하라. 각 사용자의 bash 히스토리, 환경 변수, 별칭(alias)을 메모리에서 추출하여 공격자의 활동을 재구성하라."
    hint: "linux.bash 플러그인 또는 프로세스 메모리에서 직접 추출하라"
    category: "extraction"
    points: 10
    answer: "bash 히스토리: 실행된 명령 목록(시간순), 환경 변수(PATH, HOME, SSH_CONNECTION), 의심 명령(wget, curl, nc, base64, chmod +x)"
    answer_detail: "bash 히스토리는 공격자의 행동을 직접 보여주는 핵심 증거이다. .bash_history 파일은 삭제되었더라도 메모리의 readline 버퍼에 남아있을 수 있다."
    verify:
      type: "output_contains"
      expect: "bash"

  - order: 11
    instruction: "시스템 콜 테이블 무결성을 검증하라. 커널의 시스템 콜 테이블이 변조되지 않았는지 확인하고, 후킹된 시스템 콜을 식별하라."
    hint: "linux.check_syscall 플러그인으로 시스템 콜 테이블을 검증하라"
    category: "detection"
    points: 10
    answer: "시스템 콜 검증: 전체 시스템 콜 N개, 정상 커널 텍스트 범위 내 M개, 범위 외(후킹 의심) K개. 후킹된 시스템 콜 번호와 리다이렉트 주소"
    answer_detail: "시스템 콜 후킹은 루트킷의 핵심 기법이다. 정상적인 시스템 콜 핸들러 주소는 커널 텍스트 영역 내에 있으며, 외부 주소로 리다이렉트되면 후킹이 의심된다."
    verify:
      type: "output_contains"
      expect: "syscall"

  - order: 12
    instruction: "타임라인 분석을 수행하라. 메모리 아티팩트의 시간 정보를 추출하여 프로세스 생성, 네트워크 연결, 파일 접근의 시간순 타임라인을 작성하라."
    hint: "각 아티팩트의 timestamp를 UTC로 정규화하여 통합 타임라인을 작성하라"
    category: "reconstruction"
    points: 10
    answer: "통합 타임라인: T1-SSH로그인, T2-악성도구다운로드, T3-권한상승, T4-지속성설치, T5-데이터수집, T6-외부전송. 각 이벤트의 메모리 증거 첨부"
    answer_detail: "메모리 타임라인은 네트워크/디스크 포렌식 타임라인과 결합하면 공격의 전체 그림을 완성한다. 메모리 특유의 아티팩트(프로세스 생성 시간, 소켓 생성 시간)가 추가 컨텍스트를 제공한다."
    verify:
      type: "output_contains"
      expect: "타임라인"

  - order: 13
    instruction: "메모리 포렌식 자동화 스크립트를 설계하라. 주요 분석 단계(프로세스, 네트워크, 모듈, 문자열)를 자동 실행하고 결과를 통합하는 스크립트의 구조를 설계하라."
    hint: "Volatility 3의 Python API를 활용하여 프로그래매틱 분석이 가능하다"
    category: "automation"
    points: 8
    answer: "자동화 스크립트 구조: 1) 메모리 프로파일 자동 탐지, 2) 주요 플러그인 순차 실행, 3) 결과 JSON 저장, 4) 이상 징후 자동 플래그, 5) HTML 보고서 생성"
    answer_detail: "포렌식 자동화는 분석 속도와 일관성을 높인다. 기본 분석을 자동화하고 이상 징후를 자동 플래그하면, 분석관은 심층 분석에 집중할 수 있다."
    verify:
      type: "output_contains"
      expect: "자동화"

  - order: 14
    instruction: "메모리 포렌식의 한계와 안티포렌식 기법을 분석하라. 공격자가 메모리 포렌식을 방해하는 기법(메모리 와이핑, 타임스탬프 조작)과 대응 방안을 정리하라."
    hint: "DKOM(Direct Kernel Object Manipulation), 메모리 세탁(scrubbing) 등을 포함하라"
    category: "analysis"
    points: 8
    answer: "안티포렌식: 1) DKOM(커널 객체 직접 조작), 2) 메모리 와이핑(0으로 덮어쓰기), 3) 타임스탬프 조작(stomp), 4) 프로세스 할로윙. 대응: 다중 소스 교차검증, 하이퍼바이저 레벨 덤프"
    answer_detail: "안티포렌식은 분석을 방해하지만 완벽할 수 없다. DKOM은 pslist를 속이지만 psscan은 속이기 어렵고, 메모리 와이핑은 흔적을 남긴다. 다중 분석 기법의 교차검증이 핵심 대응이다."
    verify:
      type: "output_contains"
      expect: "안티포렌식"

  - order: 15
    instruction: "메모리 포렌식 종합 보고서를 작성하라. 수집 절차, 분석 결과, 발견된 악성 활동, 타임라인, 증거 목록, 권고사항을 포함하라."
    hint: "각 발견사항에 메모리 오프셋, 스크린샷(플러그인 출력), 추출된 아티팩트를 증거로 첨부하라"
    category: "reporting"
    points: 14
    answer: "종합: 메모리 덤프 XGB, 프로세스 N개 분석, 의심 프로세스 M개, 숨겨진 프로세스 K개, C2 연결 L건, 추출 문자열 P건. 결론: 침해 확인/미확인, 권고사항"
    answer_detail: "메모리 포렌식 보고서는 휘발성 증거의 특성상 재현이 어려우므로, 분석 과정과 결과를 상세히 기록해야 한다. 각 발견사항에 Volatility 명령과 출력을 증거로 첨부한다."
    verify:
      type: "output_contains"
      expect: "포렌식"
