lab_id: soc-adv-nonai-week06
title: 위협 헌팅 - 가설 기반 능동 탐지
version: non-ai
course: soc-adv-nonai
week: 6
description: 가설 기반 위협 헌팅 방법론을 적용하여 잠복 위협을 능동적으로 탐색하는 실습
difficulty: hard
duration_minutes: 120
objectives:
- 위협 헌팅의 방법론과 프로세스를 이해한다
- 가설 기반 헌팅을 실제 환경에서 수행할 수 있다
- 헌팅 결과를 탐지 룰로 전환할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 위협 헌팅의 3가지 접근법(가설 기반, IOC 기반, 데이터 기반)을 비교 분석하고, 각 접근법의 적용 시나리오를 정의하라.
  hint: Sqrrl의 Threat Hunting Maturity Model(HMM)을 참고하라
  category: analysis
  points: 8
  answer: '가설기반: ATT&CK에서 가설 도출→데이터 검증(APT 탐지에 적합). IOC기반: 알려진 IOC 검색(즉각적 위협 확인).
    데이터기반: 이상치/통계적 편차 탐색(알려지지 않은 위협)'
  answer_detail: 세 접근법은 상호 보완적이다. 가설 기반은 ATT&CK 프레임워크와 결합할 때 가장 효과적이고, IOC 기반은 빠른
    확인에, 데이터 기반은 미지의 위협 발견에 유용하다.
  verify:
    type: output_contains
    expect: 가설
    semantic:
      intent: 위협 헌팅 3 접근법 — (1) Hypothesis-driven (가설 기반 + ATT&CK 매핑 → APT 탐지) + (2)
        IOC-driven (알려진 IOC 검색 → 즉각 확인) + (3) Data-driven (통계 편차/이상치 → 미지 위협). Sqrrl
        HMM framework. 상호 보완적 조합.
      success_criteria:
      - 가설 키워드
      - 3개 접근법 모두 설명
      - 각 접근 적용 시나리오
      acceptable_methods:
      - Sqrrl HMM 문서 참조
      - SANS FOR508 course 자료
      - MITRE Threat Hunting Framework
      - Cyborg Security (Hunt Evil)
      negative_signs:
      - 접근법 2개 이하
      - 시나리오 매핑 없음
      - HMM 맥락 없음
  target_vm: siem
- order: 2
  instruction: 헌팅 가설을 수립하라. 'C2 통신이 DNS 터널링을 통해 이루어지고 있다'는 가설을 세우고, 검증에 필요한 데이터 소스와
    분석 기법을 정의하라.
  hint: 'DNS 터널링의 특성: 긴 서브도메인, 높은 쿼리 빈도, TXT 레코드 사용'
  category: planning
  points: 10
  answer: '가설: DNS 터널링 C2. 데이터소스: DNS 쿼리 로그, 네트워크 트래픽. 분석기법: 1) 서브도메인 길이 분포, 2) 도메인별
    쿼리 빈도, 3) TXT 레코드 비율, 4) 엔트로피 분석'
  answer_detail: DNS 터널링은 정상 DNS 트래픽에 데이터를 숨기는 기법이다. 서브도메인에 인코딩된 데이터를 포함하므로 길이가 비정상적으로
    길고, 쿼리 빈도가 높으며, 엔트로피가 높다.
  verify:
    type: output_contains
    expect: DNS
    semantic:
      intent: 'DNS 터널링 C2 가설 수립 — 데이터 소스 (DNS 쿼리 로그 + 네트워크 트래픽) + 분석 기법 (1) 서브도메인
        길이 분포 (2) 도메인별 쿼리 빈도 (3) TXT 레코드 비율 (4) 엔트로피 분석. MITRE ATT&CK T1071.004 Application
        Layer Protocol: DNS / T1572 Protocol Tunneling.'
      success_criteria:
      - DNS 키워드
      - 데이터 소스 + 분석 기법 각 2개 이상
      - T1071.004 또는 DNS tunneling 맥락
      acceptable_methods:
      - iodine / dnscat2 도구 특성 참조
      - Zeek dns.log 분석
      - Splunk DNS hunting queries
      - Jupyter + pandas value_counts
      negative_signs:
      - 데이터 소스 1개만
      - 분석 기법 없이 가설만
      - T1071 맥락 없음
  target_vm: siem
- order: 3
  instruction: 실습 환경의 DNS 로그를 수집하라. Wazuh alerts.json 사본이 `/home/ccc/cyber-range/fixtures/soc-adv-nonai-week06/3/alerts.json`
    에 사전 주입되어 있다 (7일 분, 350+ alert, brute force burst + DNS group 포함). rule.groups
    dns 매칭 알림을 추출하고 도메인별 쿼리 빈도를 jq + sort 로 집계하라.
  hint: Wazuh API에서 rule.groups에 'dns'가 포함된 알림을 검색하라
  category: collection
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): DNS 이벤트 수집 결과: 도메인별 쿼리 빈도 Top 10, 비정상적으로 긴 서브도메인 존재 여부 확인'
  answer_detail: DNS 로그는 위협 헌팅의 핵심 데이터 소스이다. 쿼리 빈도가 비정상적으로 높거나, 서브도메인이 30자 이상인 경우,
    또는 알려지지 않은 도메인에 대한 반복적 쿼리는 의심 지표이다.
  verify:
    type: output_contains
    expect: DNS
    semantic:
      intent: DNS 로그 수집 실습 — Wazuh rule.groups dns 알림 검색 + 도메인별 쿼리 빈도 집계 + 비정상 서브도메인
        길이 (>30자) 확인. 위협 헌팅 첫 데이터 수집 단계. 정상 baseline vs 이상치 비교 기초 자료.
      success_criteria:
      - DNS 키워드
      - 도메인별 빈도 집계
      - 서브도메인 길이 임계치
      acceptable_methods:
      - Wazuh Dashboard Security events + rule.groups=dns
      - curl /alerts?q=rule.groups%3Adns API
      - Kibana Lens DNS visualization
      - Elasticsearch aggregations terms by domain
      negative_signs:
      - DNS 로그 수집 없이 이론
      - 빈도 집계 누락
      - 비정상 기준 없음
  target_vm: siem
  fixtures:
  - generator: wazuh_alert
    target_vm: siem
    path: /home/ccc/cyber-range/fixtures/soc-adv-nonai-week06/3/alerts.json
    params:
      seed: 42
      duration_days: 7
      alerts_per_day: 50
      brute_force_burst: true
      malware_detection_count: 2
      ar_trigger_count: 4
    mode: overwrite
    cleanup: false
- order: 4
  instruction: 네트워크 비콘 활동을 헌팅하라. 내부 호스트의 외부 통신 패턴에서 주기적 비콘(beaconing) 활동을 식별하라. 통신
    간격의 표준편차를 계산하라.
  hint: 주기적 통신은 일정한 간격으로 발생하므로 표준편차가 낮다
  category: hunting
  points: 12
  answer: '비콘 탐지: 특정 외부 IP에 대한 통신 간격 분석 → 간격 평균 60초, 표준편차 2초 이하면 비콘 의심. jitter가 있어도
    분포가 정규분포면 의심'
  answer_detail: C2 비콘은 일정 간격으로 체크인하므로 통신 간격의 분산이 낮다. jitter(±10%)를 추가해도 통계적으로 구분
    가능하다. 정상 트래픽은 사용자 행위에 따라 불규칙하다.
  verify:
    type: output_contains
    expect: 비콘
    semantic:
      intent: 네트워크 비콘 헌팅 — 외부 IP 통신 간격 분석 + 간격 평균 60초 + 표준편차 ≤ 2초면 비콘 의심. jitter (±10%)
        보정해도 정규분포면 의심. 통계적 주기성 탐지. MITRE ATT&CK T1071 C2 + T1571 Non-Standard Port
        + RITA tool.
      success_criteria:
      - 비콘 키워드 또는 beaconing
      - 통신 간격 + 표준편차 수치
      - 통계 분석 개념
      acceptable_methods:
      - RITA (Real Intelligence Threat Analytics)
      - Zeek conn.log + Python pandas stats
      - Splunk ESCU app (C2 beaconing)
      - AC-Hunter (Active Countermeasures)
      negative_signs:
      - 통신 간격만 + 표준편차 없음
      - jitter 맥락 없음
      - RITA / 통계 도구 언급 없음
  target_vm: siem
- order: 5
  instruction: 비정상 프로세스 실행을 헌팅하라. Wazuh의 syscheck와 rootcheck 데이터에서 비정상적인 프로세스 생성,
    SUID 파일, 숨겨진 프로세스를 탐색하라.
  hint: 정상 베이스라인과 비교하여 새로 추가된 SUID 파일이나 비정상 경로의 실행 파일을 찾아라
  category: hunting
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): 헌팅 결과: 1) 비정상 경로(/tmp, /dev/shm)의 실행파일, 2) 신규 SUID 파일, 3) 커널 모듈 변경,
    4) 숨겨진 디렉토리(.로 시작하는 비정상 디렉토리)'
  answer_detail: 비정상 프로세스 헌팅은 호스트 레벨의 침해 지표를 탐색한다. /tmp이나 /dev/shm에서 실행되는 바이너리, 예상치
    못한 SUID 파일, 숨겨진 디렉토리는 공격자의 일반적 행동 패턴이다.
  verify:
    type: output_contains
    expect: 프로세스
    semantic:
      intent: 비정상 프로세스 헌팅 — (1) 비정상 경로 (/tmp, /dev/shm) 실행 파일 + (2) 신규 SUID 파일 + (3)
        커널 모듈 변경 + (4) 숨겨진 디렉토리 (.prefix). Wazuh syscheck + rootcheck 데이터 활용. 호스트
        레벨 침해 지표 (IoC). MITRE ATT&CK T1036 Masquerading + T1548.001 SUID.
      success_criteria:
      - 프로세스 키워드
      - 비정상 경로 (/tmp/dev/shm) + SUID 파일
      - 4개 헌팅 대상 중 3개 이상
      acceptable_methods:
      - Wazuh syscheck FIM 알림 분석
      - rootcheck policy monitoring
      - osquery processes/suid_bin tables
      - LinPEAS + 헌팅 쿼리
      negative_signs:
      - 경로 체크만 + SUID 누락
      - 베이스라인 비교 없음
      - 호스트 헌팅 맥락 부족
  target_vm: siem
- order: 6
  instruction: 횡적 이동(Lateral Movement) 흔적을 헌팅하라. SSH 로그, 네트워크 연결 로그에서 내부 호스트 간 비정상적인
    통신 패턴을 탐색하라.
  hint: 정상적인 내부 통신 패턴을 먼저 파악하고, 편차를 찾아라
  category: hunting
  points: 12
  answer: '헌팅 기법: 1) 비정상 SSH 연결(새로운 소스-목적지 쌍), 2) 관리포트(22,3389,5985) 통신 패턴, 3) 서비스
    계정의 대화형 로그인, 4) 비업무시간 내부 통신'
  answer_detail: 횡적 이동은 침해 사고의 핵심 단계이다. 정상적인 내부 통신 베이스라인을 구축하고, 새로운 통신 패턴(이전에 없던 호스트
    간 연결)을 식별하면 초기 횡적 이동을 탐지할 수 있다.
  verify:
    type: output_contains
    expect: 횡적
    semantic:
      intent: 횡적 이동 헌팅 — (1) 비정상 SSH 연결 (새로운 source-dest 쌍) + (2) 관리 포트 통신 (22/3389/5985)
        + (3) 서비스 계정 대화형 로그인 + (4) 비업무 시간 내부 통신. 내부 통신 baseline 대비 편차. MITRE ATT&CK
        Lateral Movement (T1021.001 RDP/T1021.002 SMB/T1021.006 WinRM).
      success_criteria:
      - 횡적 키워드
      - 관리 포트 (22/3389/5985) 언급
      - 내부 통신 baseline 개념
      acceptable_methods:
      - Zeek conn.log + 새 쌍 탐지
      - Wazuh rule groups + internal traffic
      - JA3 / JARM fingerprint + lateral
      - AC-Hunter internal traffic
      negative_signs:
      - 포트 언급 없음
      - baseline 개념 없음
      - Tactic 4개 중 1개 이하
  target_vm: siem
- order: 7
  instruction: 데이터 유출(Exfiltration) 헌팅을 수행하라. 외부로의 대용량 데이터 전송, 비정상 프로토콜 사용, 인코딩된 데이터
    전송을 탐색하라.
  hint: 아웃바운드 트래픽 볼륨 이상치, DNS TXT 레코드 크기, ICMP 페이로드 크기를 확인하라
  category: hunting
  points: 10
  answer: '헌팅 기법: 1) 호스트별 아웃바운드 트래픽 Top 10, 2) 비정상 포트 사용, 3) DNS 쿼리 크기 이상치, 4) ICMP
    페이로드 이상, 5) 업무시간 외 대량 전송'
  answer_detail: 데이터 유출은 다양한 채널(HTTP, DNS, ICMP, 클라우드 스토리지)을 통해 이루어질 수 있다. 각 채널별 정상
    패턴을 파악하고, 통계적 이상치를 탐색하는 것이 핵심이다.
  verify:
    type: output_contains
    expect: 유출
    semantic:
      intent: 데이터 유출 헌팅 — (1) 호스트별 아웃바운드 Top 10 + (2) 비정상 포트 사용 + (3) DNS 쿼리 크기 이상치
        + (4) ICMP 페이로드 이상 + (5) 업무시간 외 대량 전송. 다양한 채널 (HTTP/DNS/ICMP/Cloud Storage).
        MITRE ATT&CK Exfiltration (T1041/T1048/T1567).
      success_criteria:
      - 유출 키워드
      - 5개 채널 중 3개 이상
      - 아웃바운드 볼륨 이상치 분석
      acceptable_methods:
      - Zeek conn.log orig_bytes 순위
      - NetFlow / IPFIX + Elastic visualizations
      - Wireshark DNS size anomaly
      - DLP 솔루션 로그 분석
      negative_signs:
      - 채널 1개만 (HTTP)
      - 볼륨 이상치 개념 없음
      - 업무시간 baseline 없음
  target_vm: siem
- order: 8
  instruction: 지속성(Persistence) 메커니즘을 헌팅하라. cron job, systemd service, .bashrc 변조,
    커널 모듈 등 Linux 환경의 지속성 메커니즘을 탐색하라.
  hint: 각 호스트의 crontab, systemd unit files, shell 초기화 파일을 베이스라인과 비교하라
  category: hunting
  points: 10
  answer: '헌팅 대상: 1) /etc/crontab + /var/spool/cron/*, 2) /etc/systemd/system/*.service,
    3) ~/.bashrc,~/.profile 변경, 4) /etc/ld.so.preload, 5) /lib/modules/ 변경'
  answer_detail: 공격자는 재부팅이나 세션 종료 후에도 접근을 유지하기 위해 지속성 메커니즘을 설치한다. Linux에서는 cron, systemd,
    shell 초기화, 커널 모듈이 주요 벡터이며, 파일 무결성 모니터링과 병행하여 헌팅한다.
  verify:
    type: output_contains
    expect: Persistence
    semantic:
      intent: Linux Persistence 헌팅 — (1) /etc/crontab + /var/spool/cron/* (2) /etc/systemd/system/*.service
        (3) ~/.bashrc, ~/.profile 변경 (4) /etc/ld.so.preload (5) /lib/modules/ 변경.
        5 주요 벡터 + FIM baseline 비교. MITRE ATT&CK Persistence (T1053.003 cron/T1543.002
        systemd/T1546.004 .bashrc).
      success_criteria:
      - Persistence 키워드 또는 persistence
      - cron + systemd + bashrc 등 3 벡터 이상
      - FIM baseline 비교 개념
      acceptable_methods:
      - Wazuh syscheck + whitelist baseline
      - LinEnum / LinPEAS + comparison
      - LOLBAS (Linux) + auditd
      - Detection Lab Velociraptor persistence artifacts
      negative_signs:
      - 벡터 2개 이하
      - FIM baseline 없음
      - Persistence tactic 맥락 없음
  target_vm: siem
- order: 9
  instruction: 헌팅 노트북(Jupyter 형태)을 설계하라. 각 헌팅 가설에 대해 데이터 수집 쿼리, 분석 코드, 시각화, 결론을 포함하는
    재사용 가능한 헌팅 노트북 템플릿을 작성하라.
  hint: 가설→데이터수집→분석→시각화→결론→탐지룰전환의 구조를 따르라
  category: design
