lab_id: soc-adv-nonai-week11
title: 인시던트 대응 - 실전 시나리오 훈련
version: non-ai
course: soc-adv-nonai
week: 11
description: 실제 침해사고 시나리오를 기반으로 탐지부터 복구까지 전체 인시던트 대응 프로세스를 실습
difficulty: hard
duration_minutes: 120
objectives:
- NIST SP 800-61 기반 인시던트 대응 절차를 실행할 수 있다
- 다양한 공격 시나리오에 대한 대응 역량을 갖춘다
- 인시던트 보고서를 체계적으로 작성할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: NIST SP 800-61의 인시던트 대응 4단계(준비, 탐지/분석, 격리/근절/복구, 사후활동)를 설명하고, 각 단계의
    핵심 활동을 정리하라.
  hint: 각 단계의 입력, 활동, 산출물을 정리하라
  category: framework
  points: 8
  answer: 1) 준비(IR팀구성, 도구준비, 절차문서화), 2) 탐지/분석(알림분류, 심각도평가, 범위파악), 3) 격리/근절/복구(감염격리,
    악성코드제거, 시스템복원), 4) 사후활동(교훈도출, 절차개선, 보고서)
  answer_detail: 4단계 프레임워크는 인시던트 대응의 국제 표준이다. 각 단계는 순차적이지만, 분석과 격리는 동시에 진행될 수 있으며,
    사후활동은 미래 대응 역량 향상의 핵심이다.
  verify:
    type: output_contains
    expect: NIST
    semantic:
      intent: NIST SP 800-61 IR 4단계 — (1) Preparation (IR 팀/도구/절차) + (2) Detection
        & Analysis (알림 분류/심각도/범위) + (3) Containment/Eradication/Recovery (격리/제거/복원)
        + (4) Post-Incident Activity (교훈/개선/보고서). Rev.2 표준 프레임워크. Preparation 이 지속적
        활동.
      success_criteria:
      - NIST 키워드
      - 4 단계 모두 정의
      - 각 단계 핵심 활동
      acceptable_methods:
      - NIST SP 800-61 Rev.2 문서 준수
      - SANS PICERL 6단계 유사 매핑
      - ISO/IEC 27035 인시던트 관리
      - FIRST CSIRT Services Framework
      negative_signs:
      - 단계 3개 이하
      - NIST 언급 없이 일반 서술
      - 각 단계 활동 누락
  target_vm: siem
- order: 2
  instruction: '시나리오: Wazuh에서 웹서버({{WEB_IP}})의 SQL Injection 알림이 다수 발생했다. 초기 분류(Triage)를
    수행하라. 알림의 진양성 여부를 판단하고 심각도를 평가하라.'
  hint: 알림 상세 내용, 소스 IP, 공격 성공 여부(응답 코드)를 확인하라
  category: detection
  points: 10
  answer: '🖥️ UI: Dashboard → Security events → 필터 적용 후 이벤트 확인

    📎 참고 (CLI): Triage: 1) 알림 상세 확인(rule ID, 설명), 2) 소스IP 확인(외부/내부), 3) 공격 성공 여부(200
    OK면 성공 의심), 4) 영향 범위(DB 접근 여부). 심각도: High(웹서버 DB 접근 가능)'
  answer_detail: 초기 분류는 대응의 방향을 결정한다. SQLi 알림의 경우 실제 DB 데이터 유출 여부가 심각도를 결정하며, 응답 코드,
    응답 크기, DB 에러 메시지 유무로 성공 여부를 추정한다.
  verify:
    type: output_contains
    expect: Triage
    semantic:
      intent: 'SQLi 알림 Triage — 초기 분류: (1) 알림 상세 rule ID/설명 + (2) 소스 IP 외부/내부 + (3)
        공격 성공 여부 (200 OK + DB 에러 메시지) + (4) 영향 범위 DB 접근 가능성. 심각도: High (웹서버 DB 접근
        가능). MITRE ATT&CK T1190 Exploit Public-Facing Application.'
      success_criteria:
      - Triage 키워드
      - 4 체크포인트 중 3개 이상
      - 심각도 결정 근거
      acceptable_methods:
      - Wazuh Dashboard Security events 상세
      - curl Wazuh API alert detail
      - ModSecurity audit log 교차 확인
      - SIEM enrichment context
      negative_signs:
      - Triage 개념 없음
      - 응답 코드 확인 누락
      - 심각도 분류 없음
  target_vm: siem
- order: 3
  instruction: 공격 범위를 파악하라. 웹서버 로그, DB 접근 로그, 네트워크 트래픽에서 공격의 시작 시점, 영향 받은 시스템, 유출
    가능 데이터를 조사하라.
  hint: 공격 소스 IP의 전체 활동을 시간순으로 추적하라
  category: analysis
  points: 12
  answer: '범위 분석: 시작시점(첫 SQLi 시도 시각), 공격IP의 전체 요청 기록, 접근한 DB 테이블, 응답 데이터 크기(유출량 추정),
    다른 시스템 접근 시도 여부'
  answer_detail: 범위 파악은 격리 범위와 대응 수준을 결정한다. 공격 IP의 전체 활동을 추적하여 SQLi 외에 다른 공격(XSS,
    파일 업로드)도 시도했는지, 다른 시스템에 피벗했는지 확인한다.
  verify:
    type: output_contains
    expect: 범위
    semantic:
      intent: 공격 범위 파악 — 공격 IP 전체 활동 시간순 추적 + 접근 DB 테이블 + 응답 데이터 크기 (유출량 추정) + 다른
        시스템 피벗 시도. apache access.log + db query log + netflow 통합. Full Kill Chain
        재구성.
      success_criteria:
      - 범위 키워드
      - 공격 IP 추적 + DB 접근
      - 응답 크기 또는 유출량 추정
      acceptable_methods:
      - tail + grep 공격 IP
      - Elasticsearch query by src_ip
      - Splunk timechart by source IP
      - Kibana Lens + pivot table
      negative_signs:
      - 공격 IP 추적 없이 단일 알림만
      - 유출량 추정 누락
      - 피벗 확인 없음
  target_vm: siem
- order: 4
  instruction: '격리 조치를 실행하라. 공격 소스 IP를 방화벽(nftables)에서 차단하고, 웹서버의 취약 엔드포인트를 비활성화하라.


    [FIXTURE] /home/ccc/cyber-range/fixtures/soc-adv-nonai-week11/4/syslog 사전 주입.
    `grep -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/soc-adv-nonai-week11/4/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft add element inet filter blacklist {공격IP} 또는 WAF 룰 추가
  category: containment
  points: 10
  answer: '격리: 1) nftables에서 공격IP 차단(secu 서버), 2) WAF에서 SQLi 패턴 강화, 3) 취약 페이지 임시 비활성화,
    4) DB 접속 비밀번호 변경'
  answer_detail: 격리는 추가 피해를 방지하는 즉각적 조치이다. 네트워크(IP 차단)와 애플리케이션(엔드포인트 비활성화) 수준의 이중
    격리가 효과적이며, 격리 범위는 서비스 영향을 최소화해야 한다.
  verify:
    type: output_contains
    expect: 차단
    semantic:
      intent: 격리 조치 (Containment) — (1) nftables 공격 IP 차단 (nft add element inet filter
        blacklist + drop) + (2) WAF SQLi 패턴 강화 + (3) 취약 페이지 임시 비활성화 + (4) DB 비밀번호
        변경. 네트워크 + 애플리케이션 이중 격리. MITRE D3FEND Respond.
      success_criteria:
      - 차단 키워드
      - nftables + WAF 이중 격리
      - 4 조치 중 3개 이상
      acceptable_methods:
      - nft add element + ssh secu VM
      - ModSecurity SecRule 강화
      - iptables + fail2ban 대체
      - SOAR 자동 격리 플레이북
      negative_signs:
      - 단일 방화벽 차단만
      - WAF 강화 언급 없음
      - DB 권한 변경 누락
  target_vm: siem
  fixtures:
  - generator: firewall_log
    target_vm: siem
    path: /home/ccc/cyber-range/fixtures/soc-adv-nonai-week11/4/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 5
  instruction: 증거를 수집하라. 웹서버 로그, DB 로그, 네트워크 캡처, 메모리 덤프를 수집하고 무결성 해시를 생성하라.
  hint: 각 증거의 SHA-256 해시를 생성하고 Chain of Custody 문서를 작성하라
  category: collection
  points: 10
  answer: '증거 목록: 1) /var/log/apache2/access.log(SHA-256), 2) DB slow query log(SHA-256),
    3) pcap 파일(SHA-256), 4) 메모리 덤프(SHA-256). Chain of Custody 기록'
  answer_detail: 증거 수집은 법적 절차와 포렌식 분석의 기반이다. 원본 보존, 해시 무결성 확인, 수집 과정 기록이 3대 원칙이며,
    실시간 서비스 중인 시스템에서는 휘발성 데이터를 먼저 수집한다.
  verify:
    type: output_contains
    expect: 증거
    semantic:
      intent: 증거 수집 — (1) /var/log/apache2/access.log + (2) DB slow query log + (3)
        pcap 파일 + (4) 메모리 덤프. 각 파일 SHA-256 해시 + Chain of Custody 문서 (수집자/시간/장소/방법).
        ISO 27037 + RFC 3227 준수. 법적 증거 보존.
      success_criteria:
      - 증거 키워드
      - 4 증거 유형 중 3개 이상
      - SHA-256 해시 + Chain of Custody
      acceptable_methods:
      - sha256sum + 로그 파일 복사
      - LiME / AVML 메모리 덤프
      - tcpdump pcap + 동시 hash
      - CAINE / SIFT forensic OS
      negative_signs:
      - 해시 생성 누락
      - Chain of Custody 없음
      - 휘발성 증거 우선순위 누락
  target_vm: siem
- order: 6
  instruction: 근절(Eradication) 조치를 수행하라. SQLi 취약점의 근본 원인을 분석하고, 코드 수정, WAF 룰 추가, DB
    권한 제한 등의 조치를 실행하라.
  hint: 취약점의 근본 원인(parameterized query 미사용 등)을 파악하라
  category: eradication
  points: 10
  answer: '근절: 1) 취약 코드 수정(prepared statement 적용), 2) WAF CRS 룰 강화, 3) DB 사용자 권한 최소화(least
    privilege), 4) 다른 엔드포인트 동일 취약점 점검'
  answer_detail: 근절은 동일 취약점을 통한 재공격을 방지한다. 코드 수정(근본 해결), WAF 룰(보완적 방어), 권한 제한(피해 최소화)의
    다층 접근이 필요하며, 유사 취약점이 있는 다른 위치도 함께 점검해야 한다.
  verify:
    type: output_contains
    expect: 근절
    semantic:
      intent: Eradication 근절 — (1) 취약 코드 수정 (prepared statement / parameterized query)
        + (2) WAF OWASP CRS 룰 강화 + (3) DB 사용자 권한 최소화 (least privilege) + (4) 다른 엔드포인트
        동일 취약점 점검. 근본 해결 + 보완 방어. MITRE D3FEND Eviction.
      success_criteria:
      - 근절 키워드
      - 코드 수정 + WAF 강화 + 권한 최소화
      - 유사 취약점 점검
      acceptable_methods:
      - prepared statement (PDO/psycopg2)
      - ModSecurity OWASP CRS v4
      - MySQL GRANT 최소 권한
      - SonarQube 정적 분석 전체 코드
      negative_signs:
      - 코드 수정 없이 WAF 만
      - 권한 최소화 언급 없음
      - 유사 취약점 점검 누락
  target_vm: siem
- order: 7
  instruction: 복구 계획을 수립하고 실행하라. 서비스 정상화, 데이터 무결성 확인, 모니터링 강화를 포함한 복구 절차를 정의하고 실행하라.
  hint: 단계적 복구(격리→검증→일부 복구→전체 복구)를 적용하라
  category: recovery
  points: 10
  answer: '복구: 1) 취약점 패치 확인, 2) DB 무결성 점검(데이터 변조 여부), 3) 서비스 단계적 재개, 4) 모니터링 강화(24시간
    집중 감시), 5) 정상 확인 후 격리 해제'
  answer_detail: 복구는 안전한 상태를 확인한 후 단계적으로 진행한다. 패치 적용 확인, 백도어 부재 확인, 데이터 무결성 검증을 거친
    후 서비스를 재개하며, 재발 모니터링을 강화한다.
  verify:
    type: output_contains
    expect: 복구
    semantic:
      intent: 복구 계획 — (1) 취약점 패치 확인 + (2) DB 무결성 점검 (데이터 변조 여부) + (3) 서비스 단계적 재개 +
        (4) 모니터링 강화 (24시간 집중 감시) + (5) 정상 확인 후 격리 해제. 단계적 복구 (격리 → 검증 → 일부 복구 → 전체
        복구). Blue-Green deployment 변형.
      success_criteria:
      - 복구 키워드
      - 5 단계 중 3개 이상
      - 단계적 복구 개념
      acceptable_methods:
      - 패치 검증 + smoke test
      - DB 무결성 (CHECKSUM TABLE)
      - canary deployment + traffic 5%→100%
      - 24h 집중 모니터링 + 알림 강화
      negative_signs:
      - 즉시 전체 복구 (위험)
      - 단계적 개념 없음
      - 모니터링 강화 누락
  target_vm: siem
- order: 8
  instruction: 커뮤니케이션 계획을 수립하라. 내부(경영진, IT팀, 법무팀)와 외부(고객, 규제기관, 미디어)에 대한 커뮤니케이션 전략을
    정의하라.
  hint: 정보 공개 범위와 시기를 이해관계자별로 차별화하라
  category: communication
  points: 8
  answer: '내부: 경영진(즉시, 비즈니스 영향+대응 현황), IT팀(즉시, 기술 세부사항), 법무팀(4시간 내, 법적 의무). 외부: 규제기관(72시간
    내, GDPR 요건), 고객(확인 후, 영향 범위+보호조치)'
  answer_detail: 커뮤니케이션은 인시던트 대응의 핵심 요소이다. 적절한 시기에 정확한 정보를 올바른 대상에게 전달해야 하며, 과도하거나
    부족한 공개 모두 위험하다.
  verify:
    type: output_contains
    expect: 커뮤니케이션
    semantic:
      intent: '커뮤니케이션 계획 — 내부: 경영진 (즉시, 비즈니스 영향) + IT팀 (즉시, 기술 세부) + 법무팀 (4시간 내, 법적
        의무). 외부: 규제기관 (72시간 내 GDPR) + 고객 (확인 후 영향+보호조치). 시기/대상/내용 차별화. GDPR Art.33/34
        + 한국 개인정보보호법.'
      success_criteria:
      - 커뮤니케이션 키워드
      - 내부 + 외부 구분
      - 시간 SLA + 대상별 내용
      acceptable_methods:
      - PagerDuty + Slack alert 분기
      - 이해관계자 매트릭스 (RACI)
      - Holding statement pre-drafted
      - 법무팀 review 프로세스
      negative_signs:
      - 단일 대상만
      - 시간 SLA 없음
      - GDPR Art.33 언급 없음
  target_vm: siem
- order: 9
