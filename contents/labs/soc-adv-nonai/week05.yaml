lab_id: soc-adv-nonai-week05
title: 위협 인텔리전스 수집 및 활용
version: non-ai
course: soc-adv-nonai
week: 5
description: CTI(Cyber Threat Intelligence) 수집, 분석, 공유 체계를 구축하고 SOC 운영에 통합하는 실습
difficulty: hard
duration_minutes: 120
objectives:
- 위협 인텔리전스의 유형과 활용 방안을 이해한다
- STIX/TAXII 기반 TI 공유 체계를 구현할 수 있다
- TI를 SIEM/IDS와 연동하여 탐지 역량을 강화할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 위협 인텔리전스의 4개 계층(Strategic, Operational, Tactical, Technical)을 정의하고, 각 계층의 소비자, 데이터 유형,
    활용 방안을 정리하라.
  hint: 경영진→전략적 TI, SOC팀→전술/기술적 TI로 매핑하라
  category: analysis
  points: 8
  answer: 'Strategic: 경영진, 위협동향/지정학적리스크, 투자결정. Operational: SOC관리자, 캠페인분석/공격그룹, 방어전략. Tactical: 분석관, TTP/킬체인,
    탐지룰설계. Technical: 자동화시스템, IOC(IP/Hash/Domain), 실시간차단'
  answer_detail: TI의 4계층은 서로 다른 시간 범위와 소비자를 대상으로 한다. Technical IOC는 수시간~수일, Strategic TI는 수개월~수년의 유효 기간을
    가진다.
  verify:
    type: output_contains
    expect: Strategic
    semantic:
      intent: TI 4계층 정의 — Strategic (경영진/위협동향/투자결정) + Operational (SOC 관리자/캠페인/방어전략) + Tactical (분석관/TTP/킬체인)
        + Technical (자동화/IOC IP·Hash·Domain/실시간 차단). 시간 범위와 소비자가 다른 4-tier pyramid. Intel Pyramid of Pain
        (David Bianco).
      success_criteria:
      - Strategic 키워드
      - 4개 계층 모두 정의
      - 계층별 소비자 + 데이터 유형
      acceptable_methods:
      - Gartner CTI Maturity Model
      - SANS FOR578 Cyber Threat Intelligence
      - MITRE ATT&CK Tactics → TI tier 매핑
      - Intel 701 TI lifecycle
      negative_signs:
      - 4개 계층 구분 없이 단일
      - 소비자 매핑 없음
      - Technical IOC 만 언급
  target_vm: siem
- order: 2
  instruction: STIX 2.1 객체 모델을 분석하라. SDO(STIX Domain Object) 18종의 유형과 관계(SRO)를 정리하고, 공격 시나리오를 STIX 그래프로
    모델링하라.
  hint: Attack Pattern, Campaign, Indicator, Malware, Threat Actor 등을 연결하라
  category: analysis
  points: 10
  answer: 'SDO: Attack Pattern, Campaign, Course of Action, Grouping, Identity, Indicator, Infrastructure,
    Intrusion Set, Location, Malware, Malware Analysis, Note, Observed Data, Opinion, Report, Threat Actor,
    Tool, Vulnerability. SRO: relationship, sighting'
  answer_detail: STIX는 위협 정보를 구조화하는 국제 표준이다. SDO는 위협의 개별 요소를, SRO는 요소 간 관계를 표현한다. 이를 통해 기계 판독 가능한 위협 정보를
    생산하고 공유할 수 있다.
  verify:
    type: output_contains
    expect: STIX
    semantic:
      intent: STIX 2.1 객체 모델 — SDO 18종 (Attack Pattern/Campaign/Course of Action/Grouping/Identity/Indicator/Infrastructure/Intrusion
        Set/Location/Malware/Malware Analysis/Note/Observed Data/Opinion/Report/Threat Actor/Tool/Vulnerability)
        + SRO 2종 (relationship/sighting). OASIS CTI TC 표준.
      success_criteria:
      - STIX 키워드
      - SDO 10개 이상 유형 언급
      - SRO relationship/sighting 구조
      acceptable_methods:
      - OASIS STIX 2.1 spec 문서
      - stix2 Python library
      - OpenCTI GraphQL browser
      - ATT&CK STIX bundle import
      negative_signs:
      - SDO 5개 이하
      - SRO 개념 없음
      - OASIS 표준 맥락 없음
  target_vm: siem
- order: 3
  instruction: STIX Indicator 객체를 작성하라. 악성 IP 주소, 파일 해시, 도메인 각각에 대한 STIX 2.1 Indicator JSON을 작성하고 pattern
    필드의 문법을 설명하라.
  hint: 'pattern: "[ipv4-addr:value = ''10.0.0.1'']" 형태를 사용하라'
  category: implementation
  points: 10
  answer: 'IP: [ipv4-addr:value=''악성IP''], Hash: [file:hashes.''SHA-256''=''해시값''], Domain: [domain-name:value=''악성도메인''].
    valid_from, valid_until, kill_chain_phases 포함'
  answer_detail: STIX Pattern은 IOC를 표현하는 전용 쿼리 언어이다. 복합 조건(AND/OR), 시간 범위(WITHIN), 반복(REPEATS) 등 고급 표현이
    가능하다.
  verify:
    type: output_contains
    expect: Indicator
    semantic:
      intent: STIX Indicator 객체 작성 — IP pattern [ipv4-addr:value='악성IP'] + Hash [file:hashes.'SHA-256'='해시값']
        + Domain [domain-name:value='악성도메인'] + valid_from / valid_until / kill_chain_phases 필수. STIX Pattern
        Language 문법. AND/OR/WITHIN/REPEATS 고급 조건.
      success_criteria:
      - Indicator 키워드
      - pattern 문법 ([type:field='value'])
      - IP/Hash/Domain 3 유형
      acceptable_methods:
      - stix2.Indicator() Python
      - OpenCTI Web UI indicator 생성
      - MISP → STIX export
      - JSON 직접 작성 + stix2 validate
      negative_signs:
      - pattern 문법 없음
      - valid_from/until 누락
      - kill_chain_phases 언급 없음
  target_vm: siem
- order: 4
  instruction: 공개 TI 피드를 수집하라. OTX(AlienVault), AbuseIPDB, URLhaus에서 최신 IOC를 수집하고 형식을 비교 분석하라.
  hint: 각 피드의 API 또는 RSS를 활용하여 최근 24시간 IOC를 수집하라
  category: collection
  points: 10
  answer: 'OTX: Pulse 기반 구조화된 IOC, AbuseIPDB: IP 신뢰도 점수, URLhaus: 악성URL+페이로드정보. 공통필드: IP/Domain/Hash,
    차이: 컨텍스트 깊이, 업데이트 주기'
  answer_detail: 공개 TI 피드는 무료로 활용 가능하지만, 품질과 적시성이 다양하다. 여러 소스를 통합하여 교차 검증하면 신뢰도를 높일 수 있다. API 키 관리와 요청
    제한(rate limit)에 주의해야 한다.
  verify:
    type: output_contains
    expect: OTX
    semantic:
      intent: '공개 TI 피드 수집 — OTX AlienVault (Pulse 기반 구조화 IOC) + AbuseIPDB (IP 신뢰도 점수) + URLhaus (악성 URL
        + 페이로드 정보) 각 API 호출 + IOC 수집. 공통 IP/Domain/Hash 필드 + 차이: 컨텍스트 깊이 + 업데이트 주기. Rate limit + API key
        관리.'
      success_criteria:
      - OTX 키워드
      - 3개 이상 피드 소스 언급
      - 공통 필드 + 차이 분석
      acceptable_methods:
      - OTX API v1 /pulses/subscribed
      - AbuseIPDB v2 check endpoint
      - URLhaus CSV/JSON download
      - CIRCL TI feed + PyMISP
      negative_signs:
      - 단일 피드만
      - API 호출 없이 수집
      - rate limit 언급 없음
  target_vm: siem
- order: 5
  instruction: 수집한 IOC를 Suricata 룰로 변환하라. 악성 IP 목록을 Suricata의 IP reputation 또는 커스텀 룰로 적용하고, 탐지 테스트를 수행하라.
  hint: iprep 또는 alert ip $HOME_NET any -> $EXTERNAL_NET any (msg:"TI Match"; content:"...";) 형태
  category: implementation
  points: 10
  answer: '1) IP리스트 → iprep.list 파일 생성, 2) Suricata 설정에 iprep 활성화, 3) 커스텀 룰: alert ip any any -> [악성IP]
    any (msg:''TI-IOC Match''; sid:9000001; rev:1;)'
  answer_detail: TI를 IDS에 적용하면 네트워크 수준에서 알려진 악성 통신을 실시간 탐지할 수 있다. IP reputation 방식은 대량 IOC를 효율적으로 처리하고,
    커스텀 룰은 세밀한 조건 지정이 가능하다.
  verify:
    type: output_contains
    expect: Suricata
    semantic:
      intent: TI → Suricata 룰 변환 — (1) IP 리스트 → iprep.list 파일 + Suricata iprep.yaml 활성화 + reputation 기반
        탐지 + (2) 커스텀 룰 'alert ip any any -> [악성IP] any (msg:"TI-IOC Match"; sid:9000001; rev:1;)'. 대량
        IOC 효율 vs 세밀한 조건. MITRE ATT&CK T1071 Application Layer Protocol.
      success_criteria:
      - Suricata 키워드
      - iprep 또는 alert ip 룰
      - SID 번호 + msg 포함
      acceptable_methods:
      - suricata-update + custom source
      - iprep.yaml + categories
      - scirius rule manager
      - Zeek Intel framework (대체)
      negative_signs:
      - SID 누락
      - iprep/alert ip 선택 없음
      - IOC 파일 경로 없음
  target_vm: siem
- order: 6
  instruction: IOC를 Wazuh CDB(Constant Database)에 등록하라. 악성 IP, 해시, 도메인 목록을 CDB list로 등록하고 룰에서 참조하는 설정을
    구현하라.
  hint: /var/ossec/etc/lists/ 디렉토리에 CDB 파일을 생성하고 ossec.conf에 등록하라
  category: implementation
  points: 10
  answer: '🖥️ UI: Dashboard → Management → Rules → 룰 목록 검색

    📎 참고 (CLI): 1) /var/ossec/etc/lists/malicious_ips 파일 생성(IP:분류 형식), 2) ossec.conf에 <list> 태그 추가, 3)
    룰에서 <list field=''srcip'' lookup=''address_match_key''>malicious_ips</list>'
  answer_detail: Wazuh CDB는 대용량 IOC를 효율적으로 조회하는 해시 기반 데이터베이스이다. 수십만 개의 IOC를 밀리초 단위로 조회할 수 있어, 실시간 이벤트
    매칭에 적합하다.
  verify:
    type: output_contains
    expect: CDB
    semantic:
      intent: Wazuh CDB IOC 등록 — /var/ossec/etc/lists/malicious_ips (IP:분류 형식) + ossec.conf <list> 태그
        등록 + 룰에서 <list field='srcip' lookup='address_match_key'>malicious_ips</list>. CDB = 해시 기반 DB =
        수십만 IOC millisec 조회. 실시간 이벤트 매칭.
      success_criteria:
      - CDB 키워드
      - /var/ossec/etc/lists/ 경로
      - address_match_key 또는 list lookup 방식
      acceptable_methods:
      - wazuh-logtest + CDB 테스트
      - ossec-control reload 반영
      - API POST /lists/files
      - cdb-tools (wazuh 제공 유틸)
      negative_signs:
      - CDB 경로 없음
      - lookup 방식 명시 없음
      - format (IP:분류) 설명 누락
  target_vm: siem
- order: 7
  instruction: IOC 품질 평가 프레임워크를 설계하라. 신뢰도(confidence), 심각도(severity), 유효기간(TTL), 소스 신뢰도를 포함한 평가 기준을 정의하라.
  hint: Traffic Light Protocol(TLP)과 Admiralty Code를 참고하라
  category: design
  points: 10
  answer: '평가 프레임워크: 신뢰도(1~100, 복수 소스 교차검증), 심각도(Low/Medium/High/Critical), TTL(IP:7일, Hash:30일, Domain:14일),
    소스 신뢰도(A~F 등급)'
  answer_detail: IOC 품질 평가는 오탐을 줄이고 효과적인 방어를 위해 필수적이다. 단일 소스의 IOC보다 복수 소스에서 확인된 IOC가 신뢰도가 높다. TTL은 IOC
    유형별로 다르게 설정해야 한다.
  verify:
    type: output_contains
    expect: 신뢰도
    semantic:
      intent: IOC 품질 평가 프레임워크 — (1) 신뢰도 1-100 (복수 소스 교차검증) + (2) 심각도 Low/Medium/High/Critical + (3) TTL
        (IP 7일 / Hash 30일 / Domain 14일 유형별) + (4) 소스 신뢰도 Admiralty Code A-F 등급. TLP + Admiralty joint
        framework.
      success_criteria:
      - 신뢰도 키워드
      - TTL + 유형별 기간
      - Admiralty Code 또는 소스 신뢰도 분류
      acceptable_methods:
      - MISP confidence scoring
      - OpenCTI x_opencti_score
      - NIST SP 800-150 IOC 교환 가이드
      - CIRCL Admiralty scale
      negative_signs:
      - 신뢰도 수치 없음
      - TTL 유형별 차등 없음
      - Admiralty Code 언급 없음
  target_vm: siem
- order: 8
  instruction: Diamond Model을 활용하여 위협 분석을 수행하라. 최근 공격 사례를 Adversary, Capability, Infrastructure, Victim
    4개 축으로 분석하라.
  hint: 각 축의 관계와 메타특성(timestamp, phase, result, direction)을 포함하라
  category: analysis
  points: 10
  answer: 'Adversary: APT그룹(동기/능력), Capability: 사용도구/기법(TTP), Infrastructure: C2서버/도메인/프록시, Victim: 대상조직/산업/자산.
    축 간 관계로 피벗 분석 수행'
  answer_detail: Diamond Model은 MITRE ATT&CK과 보완적으로 사용된다. 4개 축 중 하나를 기점으로 다른 축을 탐색(피벗)하면 위협의 전체적인 그림을
    파악할 수 있다.
  verify:
    type: output_contains
    expect: Diamond
    semantic:
      intent: Diamond Model 위협 분석 — 4 축 (Adversary 동기/능력 + Capability TTP/도구 + Infrastructure C2/프록시 +
        Victim 대상 조직/산업) + 메타특성 (timestamp/phase/result/direction). 축 간 피벗 분석. MITRE ATT&CK 과 보완적 사용.
        Caltagirone 2013 Diamond Model of Intrusion Analysis.
      success_criteria:
      - Diamond 키워드
      - 4 축 모두 분석 (Adversary/Capability/Infra/Victim)
      - 피벗 분석 개념
      acceptable_methods:
      - Threat Connect Diamond tool
      - MISP Galaxy + Diamond clusters
      - OpenCTI Knowledge Graph
      - Diamond Model 논문 (Caltagirone 2013)
      negative_signs:
      - 축 3개 이하
      - 피벗 개념 없음
      - 메타특성 누락
  target_vm: siem
- order: 9
  instruction: TI 자동 수집 파이프라인을 구축하라. cron으로 주기적으로 TI 피드를 수집하고, IOC를 정규화하여 Wazuh CDB와 Suricata 룰을 자동 업데이트하는
    스크립트를 설계하라.
  hint: 수집→파싱→정규화→중복제거→배포의 5단계 파이프라인을 설계하라
  category: automation
  points: 12
  answer: '🖥️ UI: Dashboard → Management → Rules → 룰 목록 검색

    📎 참고 (CLI): 파이프라인: 1) cron 매시간 실행, 2) API로 피드 수집, 3) JSON→통합 포맷 정규화, 4) 기존 IOC와 중복 제거, 5) CDB/Suricata
    룰 자동 업데이트, 6) 서비스 reload'
  answer_detail: TI 파이프라인 자동화는 SOC의 반응 속도를 결정한다. 수동 업데이트는 시간 지연이 크고 인적 오류가 발생하므로, 자동화하되 품질 검증 단계를 포함해야
    한다.
  verify:
    type: output_contains
    expect: 파이프라인
    semantic:
      intent: TI 자동 수집 파이프라인 — cron 매시간 → API 피드 수집 → JSON 통합 포맷 정규화 → 중복 제거 → Wazuh CDB + Suricata 룰
        자동 업데이트 → 서비스 reload. 5단계 파이프라인. IaC (Infrastructure as Code) 패턴.
      success_criteria:
      - 파이프라인 키워드
      - 수집 → 정규화 → 배포 단계
      - cron 또는 스케줄러
      acceptable_methods:
      - systemd timer + Python script
      - Ansible playbook + cron
      - GitHub Actions (self-hosted runner)
      - n8n / Airflow workflow
      negative_signs:
      - 단계 3개 이하
      - 자동화 없이 수동 배포
      - 서비스 reload 언급 없음
  target_vm: siem
- order: 10
  instruction: '위협 행위자 프로파일을 작성하라. 특정 APT 그룹(예: APT28, Lazarus)의 TTP, 사용 도구, 표적 산업, 캠페인 이력을 STIX 형식으로
    정리하라.'
  hint: MITRE ATT&CK의 Groups 페이지를 참조하라
  category: analysis
  points: 10
  answer: Threat Actor(이름/동기/국가), 사용 Malware 목록, Attack Pattern(ATT&CK 기법), Campaign(시기/대상), relationship으로
    연결
  answer_detail: 위협 행위자 프로파일은 방어 우선순위를 결정하는 핵심 정보이다. 특정 산업을 표적으로 하는 그룹의 TTP를 파악하면, 해당 기법에 대한 탐지 룰을 우선
    구축할 수 있다.
  verify:
    type: output_contains
    expect: APT
    semantic:
      intent: APT 프로파일 STIX — Threat Actor 객체 (이름/동기/국가) + 사용 Malware 리스트 + Attack Pattern (ATT&CK 기법
        ID) + Campaign (시기/대상) + relationship 연결. MITRE ATT&CK Groups (APT28/Lazarus 등) 참조. 표적 산업 분석 →
        방어 우선순위 결정.
      success_criteria:
      - APT 키워드
      - Threat Actor + Malware + Campaign 객체
      - ATT&CK Technique ID 매핑
      acceptable_methods:
