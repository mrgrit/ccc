lab_id: soc-adv-nonai-week09
title: 악성코드 분석 - 정적/동적 분석 기법
version: non-ai
course: soc-adv-nonai
week: 9
description: 악성코드의 정적 분석(코드/구조)과 동적 분석(행위/네트워크)을 수행하여 기능과 목적을 파악하는 실습
difficulty: hard
duration_minutes: 120
objectives:
- 악성코드 정적 분석 기법을 숙달한다
- 동적 분석 환경을 구축하고 행위를 분석할 수 있다
- 분석 결과를 IOC와 탐지 룰로 전환할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 악성코드 분석의 4단계 방법론(자동화 분석, 정적 속성, 대화형 동적, 코드 리버싱)을 설명하고 각 단계의 목적과 도구를 정리하라.
  hint: 각 단계는 이전 단계의 결과를 기반으로 심화된다
  category: framework
  points: 8
  answer: '1) 자동화(AV 스캔, 샌드박스): 빠른 분류. 2) 정적 속성(strings, PE 구조, import): 기능 추정. 3) 동적 분석(실행+모니터링): 실제
    행위 관찰. 4) 코드 리버싱(디스어셈블리): 상세 로직 분석'
  answer_detail: 단계적 접근은 분석 효율을 극대화한다. 대부분의 샘플은 1~2단계에서 충분히 분류되며, 고급 분석(3~4단계)은 신종 악성코드나 APT 도구에만 적용한다.
  verify:
    type: output_contains
    expect: 정적
    semantic:
      intent: 악성코드 분석 4단계 방법론 — (1) 자동화 (AV/샌드박스 빠른 분류) + (2) 정적 속성 (strings/PE/import) + (3) 대화형 동적 (실행+모니터링)
        + (4) 코드 리버싱 (디스어셈블리 상세). Sikorski & Honig Practical Malware Analysis 커리큘럼. 단계적 에스컬레이션.
      success_criteria:
      - 정적 키워드
      - 4 단계 모두 정의
      - 각 단계 목적 + 도구
      acceptable_methods:
      - Sikorski Practical Malware Analysis 책
      - SANS FOR610 REM 커리큘럼
      - Lenny Zeltser Malware Analysis Cheatsheet
      - Joe Sandbox / ANY.RUN 온라인 샌드박스
      negative_signs:
      - 단계 2개 이하
      - 단계별 도구 매핑 없음
      - 에스컬레이션 원칙 없음
  target_vm: siem
- order: 2
  instruction: 정적 속성 분석을 수행하라. 의심 파일의 파일 유형(file/magic), 해시(MD5/SHA-256), 문자열(strings), PE 헤더(readelf/objdump)를
    분석하라.
  hint: ELF 바이너리의 경우 readelf -h, strings -a, objdump -d를 사용하라
  category: analysis
  points: 10
  answer: '분석 결과: 파일유형(ELF/PE/Script), 해시값, 의미 있는 문자열(IP, URL, 명령어, 에러메시지), 임포트 함수(네트워크, 파일, 프로세스 관련)'
  answer_detail: 정적 속성 분석은 파일을 실행하지 않고 특성을 파악한다. 문자열에서 C2 주소, 임포트에서 악성 기능(네트워크 통신, 파일 조작, 프로세스 인젝션)을 추정할
    수 있다.
  verify:
    type: output_contains
    expect: 해시
    semantic:
      intent: 정적 속성 분석 — file/magic (파일 유형) + md5sum/sha256sum (해시) + strings (IP/URL/명령어) + readelf -h
        / objdump -d (PE/ELF 헤더) + 임포트 함수 (네트워크/파일/프로세스). 실행 없이 파일 특성 파악.
      success_criteria:
      - 해시 키워드
      - file/strings/readelf 3+ 도구
      - 의미있는 문자열 or 임포트 분석
      acceptable_methods:
      - file + sha256sum + strings + readelf 조합
      - PEstudio (Windows)
      - Ghidra/Radare2 정적 분석
      - CFF Explorer / Detect It Easy
      negative_signs:
      - 해시 생성 누락
      - strings 만 사용
      - 임포트 함수 분석 없음
  target_vm: siem
- order: 3
  instruction: 패킹/난독화 탐지를 수행하라. 파일의 엔트로피를 계산하고, 알려진 패커 시그니처를 확인하며, 섹션별 특성을 분석하라.
  hint: 고엔트로피(>7.0) 섹션은 암호화/압축 가능성이 높다
  category: analysis
  points: 10
  answer: '엔트로피 분석: 전체 7.2(패킹 의심), 섹션별(.text:6.5, .data:7.8). 패커 시그니처: UPX/없음. 섹션 특성: 실행+쓰기 권한(비정상)'
  answer_detail: 패킹된 파일은 정적 분석을 어렵게 한다. 엔트로피가 높고 의미 있는 문자열이 적으면 패킹을 의심하며, 언패킹 후 재분석이 필요하다.
  verify:
    type: output_contains
    expect: 엔트로피
    semantic:
      intent: 패킹/난독화 탐지 — 파일 전체 엔트로피 계산 (math.entropy) + 섹션별 엔트로피 (.text 6.5 normal/.data 7.8 의심) + 패커
        시그니처 (UPX/Themida) + 실행+쓰기 권한 섹션 (비정상). 엔트로피 > 7.0 = 암호화/압축 의심. 언패킹 후 재분석 요구.
      success_criteria:
      - 엔트로피 키워드
      - 전체 + 섹션별 엔트로피
      - 패커 시그니처 언급
      acceptable_methods:
      - pefile + entropy.entropy() (Python)
      - DIE (Detect It Easy)
      - PEiD signatures + signsrch
      - binwalk --entropy graph
      negative_signs:
      - 엔트로피 계산 없음
      - 섹션별 미분석
      - 패커 이름 (UPX 등) 없음
  target_vm: siem
- order: 4
  instruction: 동적 분석 환경을 구성하라. 격리된 분석 환경(네트워크 격리, 스냅샷, 모니터링 도구)의 구성 요소와 안전 수칙을 정의하라.
  hint: 가상머신 + 가상 네트워크 + INetSim/FakeNet + 프로세스 모니터링 도구
  category: setup
  points: 10
  answer: '환경: 1) 격리된 VM(스냅샷), 2) 가상 네트워크(인터넷 차단), 3) FakeNet/INetSim(DNS/HTTP 시뮬레이션), 4) 모니터링(strace/ltrace/tcpdump),
    5) 안전수칙: 호스트 격리, 네트워크 차단'
  answer_detail: 동적 분석 환경은 악성코드를 안전하게 실행하면서 행위를 관찰하는 것이 목적이다. 물리 네트워크와 완전히 격리하고, 분석 후 스냅샷으로 복원해야 한다.
  verify:
    type: output_contains
    expect: 격리
    semantic:
      intent: 동적 분석 환경 — (1) 격리된 VM + 스냅샷 + (2) 가상 네트워크 (인터넷 차단) + (3) FakeNet / INetSim (DNS/HTTP 시뮬레이션)
        + (4) 모니터링 (strace/ltrace/tcpdump) + (5) 안전수칙 (호스트 격리 + 네트워크 차단). REMnux 분석 배포판 표준.
      success_criteria:
      - 격리 키워드
      - VM + 가상 네트워크 + FakeNet 3요소
      - 스냅샷 + 안전수칙
      acceptable_methods:
      - VMware/VirtualBox + host-only network
      - REMnux/FLARE VM 분석 배포판
      - FakeNet-NG + INetSim
      - Cuckoo Sandbox + Volatility
      negative_signs:
      - 격리 환경 없음
      - FakeNet/INetSim 언급 없음
      - 스냅샷 복원 계획 없음
  target_vm: siem
- order: 5
  instruction: 시스템 콜 추적을 수행하라. strace/ltrace로 악성코드의 시스템 콜을 추적하여 파일 생성, 네트워크 연결, 프로세스 생성 행위를 기록하라.
  hint: strace -f -e trace=network,file,process -o trace.log ./malware
  category: analysis
  points: 12
  answer: '추적 결과: connect(C2_IP:PORT), open(/etc/passwd, O_RDONLY), fork+execve(셸 생성), unlink(자기삭제). 시간순으로
    행위 시퀀스 정리'
  answer_detail: 시스템 콜 추적은 악성코드의 실제 행위를 상세히 기록한다. 네트워크 연결(connect/sendto), 파일 조작(open/read/write/unlink),
    프로세스 관리(fork/execve/kill)를 추적하여 기능을 파악한다.
  verify:
    type: output_contains
    expect: strace
    semantic:
      intent: 시스템 콜 추적 — strace -f -e trace=network,file,process -o trace.log ./malware. 네트워크 connect
        (C2), 파일 open/read/write/unlink, 프로세스 fork/execve/kill 기록. 시간순 행위 시퀀스 재구성. MITRE ATT&CK T1059
        Command Execution.
      success_criteria:
      - strace 키워드
      - -f -e trace 옵션
      - network/file/process 3 카테고리
      acceptable_methods:
      - strace -f -e + filter
      - ltrace 라이브러리 함수
      - sysdig / Falco 런타임
      - eBPF bcc (execsnoop/opensnoop)
      negative_signs:
      - strace 옵션 없이 기본
      - trace 카테고리 1개만
      - 시간순 시퀀스 없음
  target_vm: siem
- order: 6
  instruction: 네트워크 행위를 분석하라. 악성코드 실행 중 생성되는 네트워크 트래픽을 캡처하고, C2 통신 프로토콜, 비콘 간격, 데이터 인코딩을 분석하라.
  hint: tcpdump + Wireshark로 트래픽을 캡처하고 분석하라
  category: analysis
  points: 10
  answer: '네트워크 행위: 1) DNS 쿼리(C2 도메인), 2) HTTP/HTTPS 연결(C2 서버), 3) 비콘 간격(60초±10%), 4) 데이터 인코딩(base64/XOR).
    C2 프로토콜 역공학'
  answer_detail: 네트워크 행위 분석은 C2 인프라를 파악하는 핵심이다. 비콘 패턴, 통신 프로토콜, 데이터 인코딩을 분석하면 네트워크 수준의 탐지 룰을 작성할 수 있다.
  verify:
    type: output_contains
    expect: C2
    semantic:
      intent: 네트워크 행위 분석 — tcpdump + Wireshark 캡처 + (1) DNS 쿼리 C2 도메인 + (2) HTTP/HTTPS 연결 + (3) 비콘 간격
        (60초 ±10%) + (4) 데이터 인코딩 (base64/XOR). C2 프로토콜 역공학. MITRE ATT&CK T1071 Application Layer Protocol
        + T1132 Data Encoding.
      success_criteria:
      - C2 키워드
      - DNS + HTTP 두 채널 이상
      - 비콘 간격 또는 인코딩 분석
      acceptable_methods:
      - tcpdump + Wireshark Follow
      - Zeek 다중 로그 (conn/dns/http/ssl)
      - PacketBeat + Elastic
      - RITA 비콘 통계
      negative_signs:
      - 캡처 없이 이론
      - 인코딩 분석 누락
      - 비콘 맥락 없음
  target_vm: siem
  bastion_prompt: 악성코드 샘플의 네트워크 행위를 분석해줘. DNS 쿼리, C2 서버 통신, 외부 연결 엔드포인트를 정리해서
- order: 7
  instruction: 파일시스템 변경을 추적하라. 악성코드가 생성/수정/삭제하는 파일을 모니터링하고, 지속성 메커니즘(cron, service, startup) 설치를 탐지하라.
  hint: inotifywait으로 파일시스템 변경을 실시간 모니터링하라
  category: analysis
  points: 10
  answer: '파일 변경: 생성(/tmp/payload, /etc/cron.d/backdoor), 수정(.bashrc에 명령 추가), 삭제(원본 악성코드 자기삭제). 지속성: cron
    job 추가 확인'
  answer_detail: 파일시스템 모니터링은 악성코드의 설치 과정과 지속성 메커니즘을 파악한다. 생성된 파일은 추가 분석 대상이며, 수정된 파일은 원본과 비교하여 변경 내용을
    확인한다.
  verify:
    type: output_contains
    expect: 파일
    semantic:
      intent: 파일시스템 변경 추적 — inotifywait -m -r -e create,modify,delete / 실시간 모니터링. 생성 (/tmp/payload + /etc/cron.d/backdoor)
        + 수정 (.bashrc 명령 추가) + 삭제 (자기삭제). 지속성 cron/systemd 설치 탐지. MITRE ATT&CK T1053 Scheduled Task +
        T1070 Indicator Removal.
      success_criteria:
      - 파일 키워드
      - inotifywait 또는 실시간 모니터링
      - 생성/수정/삭제 3 작업
      acceptable_methods:
      - inotifywait + 이벤트 로깅
      - auditd file watch rules
      - fs.notify kernel API
      - osquery file_events
      negative_signs:
      - inotify 미사용 (snapshot 비교만)
      - 지속성 메커니즘 언급 없음
      - 자기삭제 맥락 없음
  target_vm: siem
  bastion_prompt: 악성코드 실행으로 인한 파일시스템 변경을 추적해줘. 생성/수정/삭제된 파일 목록과 경로를 정리해서
- order: 8
  instruction: 안티 분석 기법을 식별하라. 악성코드의 VM 탐지, 디버거 탐지, 시간 지연, 환경 체크 등 분석 방해 기법을 분석하고 우회 방법을 제시하라.
  hint: VMware/VirtualBox 관련 문자열, ptrace 탐지, sleep 호출 등을 확인하라
  category: analysis
  points: 10
  answer: '안티분석 기법: 1) VM 탐지(cpuid, MAC 주소), 2) 디버거 탐지(ptrace), 3) 시간 지연(sleep 3600), 4) 사용자 인터랙션 체크.
    우회: 환경 위장, ptrace 후킹, 시간 가속'
  answer_detail: 안티 분석 기법은 자동화 분석과 수동 분석 모두를 방해한다. VM/샌드박스 탐지가 가장 흔하며, 실제 하드웨어 환경을 모방하거나 탐지 로직을 패치하여 우회한다.
  verify:
    type: output_contains
    expect: 안티
    semantic:
      intent: '안티 분석 기법 — (1) VM 탐지 (cpuid/MAC 주소) + (2) 디버거 탐지 (ptrace) + (3) 시간 지연 (sleep 3600) + (4)
        사용자 인터랙션 체크. 우회: 환경 위장 + ptrace 후킹 + 시간 가속. MITRE ATT&CK T1497 Virtualization/Sandbox Evasion.'
      success_criteria:
      - 안티 키워드
      - VM/디버거/시간 3 기법
      - 우회 방법 제시
      acceptable_methods:
      - al-khaser Anti-Analysis Detection
      - pafish 샘플
      - checkvm/scoopyng
      - VMCloak anti-VM 우회
      negative_signs:
      - 기법 1개만
      - 우회 방법 없음
      - T1497 맥락 없음
  target_vm: siem
- order: 9
  instruction: 악성코드 분류를 수행하라. 분석 결과를 바탕으로 악성코드의 유형(RAT, 랜섬웨어, 봇넷, 드롭퍼), 기능, 공격 대상을 분류하라.
  hint: MITRE ATT&CK의 Software 매핑을 활용하라
  category: classification
  points: 10
  answer: '분류: 유형(RAT/백도어), 기능(원격제어/파일전송/키로깅), ATT&CK 기법(T1059 명령실행, T1071 C2프로토콜, T1005 데이터수집), 공격대상(Linux
    서버)'
  answer_detail: 악성코드 분류는 위협의 심각도를 판단하고 적절한 대응을 결정하는 기반이다. ATT&CK 매핑으로 사용된 기법을 체계적으로 정리하면 탐지 룰 작성과 방어
    전략 수립에 활용할 수 있다.
  verify:
    type: output_contains
    expect: 분류
    semantic:
