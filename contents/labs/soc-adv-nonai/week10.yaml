lab_id: "soc-adv-nonai-week10"
title: "SOAR 플랫폼 구축 및 자동화 플레이북"
version: "non-ai"
course: "soc-adv-nonai"
week: 10
description: "SOAR(Security Orchestration, Automation and Response) 플랫폼을 구축하고 자동화된 인시던트 대응 플레이북을 개발하는 실습"
difficulty: "hard"
duration_minutes: 120
objectives:
  - "SOAR 아키텍처와 핵심 기능을 이해한다"
  - "자동화 플레이북을 설계하고 구현할 수 있다"
  - "SIEM/TI/IDS와 연동하는 오케스트레이션을 구축할 수 있다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "SOAR의 3대 핵심 기능(Orchestration, Automation, Response)을 정의하고, 각 기능의 구현 방안을 설명하라."
    hint: "Orchestration=도구 연동, Automation=반복작업 자동화, Response=대응 실행"
    category: "framework"
    points: 8
    answer: "Orchestration: 다양한 보안도구 API 연동(SIEM, TI, Firewall, EDR). Automation: 반복적 분석/조회 작업 자동화(IOC 조회, 티켓 생성). Response: 차단/격리/복구 자동 실행"
    answer_detail: "SOAR는 SOC의 효율을 혁신적으로 향상시킨다. 수동으로 30분 걸리던 IOC 조회+차단 작업을 30초로 단축하고, 인적 오류를 제거한다."
    verify:
      type: "output_contains"
      expect: "SOAR"

  - order: 2
    instruction: "OpsClaw의 SOAR 기능을 분석하라. Manager API의 Playbook 기능을 활용하여 자동화 플레이북을 생성하고 실행하는 방법을 설명하라."
    hint: "POST /playbooks로 생성, /projects/{id}/execute-plan으로 실행"
    category: "analysis"
    points: 10
    answer: "OpsClaw SOAR: 1) Playbook CRUD(POST/GET /playbooks), 2) Task 배열로 단계 정의, 3) execute-plan으로 순차 실행, 4) evidence로 결과 기록, 5) SubAgent로 원격 실행"
    answer_detail: "OpsClaw의 Manager API는 기본적인 SOAR 기능을 제공한다. Playbook으로 대응 절차를 정의하고, execute-plan으로 자동 실행하며, evidence로 모든 과정을 기록한다."
    verify:
      type: "output_contains"
      expect: "Playbook"

  - order: 3
    instruction: "피싱 이메일 대응 플레이북을 설계하라. 알림 수신 → 이메일 분석 → IOC 추출 → TI 조회 → 차단 → 사용자 통보의 6단계를 정의하라."
    hint: "각 단계의 입력/출력, 자동화 가능 여부, 필요 도구를 명시하라"
    category: "design"
    points: 12
    answer: "1) 알림수신(SIEM 트리거, 자동), 2) 이메일분석(첨부파일 해시+URL 추출, 자동), 3) IOC추출(발신IP/도메인/해시, 자동), 4) TI조회(VT/OTX, 자동), 5) 차단(방화벽+메일필터, 반자동), 6) 사용자통보(이메일, 자동)"
    answer_detail: "피싱 대응은 SOAR 자동화의 대표적 사례이다. 전체 프로세스의 80%를 자동화할 수 있으며, 차단 단계만 분석관 승인을 거치는 반자동 방식이 권장된다."
    verify:
      type: "output_contains"
      expect: "피싱"

  - order: 4
    instruction: "악성 IP 자동 차단 플레이북을 구현하라. Wazuh 알림에서 악성 IP를 추출하고, TI 검증 후 nftables에 자동 차단 룰을 추가하는 플레이북을 작성하라."
    hint: "OpsClaw execute-plan의 tasks 배열에 단계별 명령을 정의하라"
    category: "implementation"
    points: 12
    answer: "tasks: [{order:1, instruction:'Wazuh에서 악성 IP 추출'}, {order:2, instruction:'AbuseIPDB 조회로 검증'}, {order:3, instruction:'nft add rule inet filter input ip saddr {악성IP} drop', subagent_url:'http://10.20.30.1:8002'}]"
    answer_detail: "자동 차단은 빠른 대응의 핵심이지만, 오탐으로 인한 정상 트래픽 차단 위험이 있다. TI 교차 검증과 신뢰도 임계값을 설정하고, 차단 로그를 기록하여 추후 검토할 수 있어야 한다."
    verify:
      type: "output_contains"
      expect: "nft"

  - order: 5
    instruction: "인시던트 티켓 자동 생성 플레이북을 구현하라. SIEM 알림의 심각도에 따라 자동으로 인시던트 티켓을 생성하고 담당자에게 할당하는 로직을 설계하라."
    hint: "알림 level에 따라 우선순위와 담당 Tier를 자동 결정하라"
    category: "implementation"
    points: 10
    answer: "로직: level 6-9→P3(Tier1, 30분SLA), level 10-12→P2(Tier2, 15분SLA), level 13+→P1(Tier3, 즉시). 티켓 내용: 알림ID, 소스IP, 룰정보, enrichment 결과 자동 포함"
    answer_detail: "자동 티켓 생성은 알림과 대응 사이의 시간 지연을 줄인다. 알림 컨텍스트를 자동으로 enrichment하여 티켓에 포함하면 분석관이 즉시 분석을 시작할 수 있다."
    verify:
      type: "output_contains"
      expect: "티켓"

  - order: 6
    instruction: "IOC 자동 enrichment 워크플로우를 구현하라. 알림에서 추출된 IOC(IP, Hash, Domain)를 자동으로 여러 TI 소스에 조회하고 결과를 통합하는 로직을 설계하라."
    hint: "각 IOC 유형별로 적합한 TI 소스를 매핑하라"
    category: "implementation"
    points: 10
    answer: "워크플로우: IP→[AbuseIPDB, OTX, GeoIP], Hash→[VT, MalwareBazaar], Domain→[OTX, URLhaus, Whois]. 결과를 JSON으로 통합하여 신뢰도 점수 계산"
    answer_detail: "자동 enrichment는 분석관의 수동 조회 시간을 절약한다. 여러 소스의 결과를 통합하여 가중 평균 신뢰도를 계산하면 오탐을 줄일 수 있다."
    verify:
      type: "output_contains"
      expect: "enrichment"

  - order: 7
    instruction: "에스컬레이션 자동화를 구현하라. 인시던트 심각도, 영향 범위, 자산 중요도에 따라 자동 에스컬레이션 경로를 정의하라."
    hint: "의사결정 트리 형태로 에스컬레이션 로직을 설계하라"
    category: "implementation"
    points: 10
    answer: "에스컬레이션 매트릭스: 심각도×자산중요도 매트릭스. High×Critical=CISO+법무팀 즉시보고, Medium×High=SOC Manager 15분 내, Low×Medium=Tier2 30분 내"
    answer_detail: "자동 에스컬레이션은 중요 인시던트의 대응 지연을 방지한다. 복수 조건을 조합하여 정확한 에스컬레이션 레벨을 결정하고, 알림 채널(이메일, Slack, SMS, 전화)도 심각도에 따라 차등 적용한다."
    verify:
      type: "output_contains"
      expect: "에스컬레이션"

  - order: 8
    instruction: "플레이북 테스트 방법론을 수립하라. 작성한 플레이북의 각 단계를 검증하는 테스트 케이스를 작성하고, 시뮬레이션 테스트를 수행하라."
    hint: "정상 동작, 오류 처리, 타임아웃, 롤백 시나리오를 모두 테스트하라"
    category: "testing"
    points: 10
    answer: "테스트: 1) 정상 플로우(모든 단계 성공), 2) API 오류(TI 조회 실패→재시도/스킵), 3) 타임아웃(단계별 제한시간 초과), 4) 오탐 시나리오(정상 IP 차단 방지), 5) 롤백(차단 해제)"
    answer_detail: "플레이북 테스트는 프로덕션 배포 전 필수이다. 특히 차단/격리 같은 파괴적 액션은 롤백 메커니즘이 반드시 작동하는지 검증해야 하며, 오탐 시나리오 테스트가 중요하다."
    verify:
      type: "output_contains"
      expect: "테스트"

  - order: 9
    instruction: "SOAR 메트릭을 정의하라. 자동화율, 평균 대응 시간(MTTR), 플레이북 실행 성공률, 분석관 시간 절약량 등의 KPI를 설계하라."
    hint: "자동화 전후의 비교 데이터가 핵심이다"
    category: "measurement"
    points: 8
    answer: "KPI: 1) 자동화율(자동처리건수/전체건수), 2) MTTR(자동화 전 30분→후 5분), 3) 플레이북 성공률(>95% 목표), 4) 분석관 시간절약(주당 N시간), 5) 오차단율(<1%)"
    answer_detail: "SOAR 메트릭은 투자 대비 효과를 입증한다. MTTR 개선과 분석관 시간 절약은 가장 직관적인 지표이며, 경영진 보고에 효과적이다."
    verify:
      type: "output_contains"
      expect: "MTTR"

  - order: 10
    instruction: "Wazuh Active Response와 OpsClaw의 연동을 설계하라. Wazuh 알림이 자동으로 OpsClaw 프로젝트를 생성하고 대응 플레이북을 실행하는 파이프라인을 구현하라."
    hint: "Wazuh의 integration 또는 active-response를 통해 OpsClaw API를 호출하라"
    category: "integration"
    points: 10
    answer: "연동: 1) Wazuh integration에 OpsClaw webhook 등록, 2) 알림→프로젝트 자동 생성(POST /projects), 3) 심각도별 플레이북 자동 선택+실행, 4) 결과 Wazuh에 피드백"
    answer_detail: "SIEM-SOAR 연동은 탐지에서 대응까지의 자동화를 완성한다. Wazuh의 알림이 OpsClaw의 오케스트레이션 엔진을 트리거하여 다중 보안 도구를 협조적으로 동작시킨다."
    verify:
      type: "output_contains"
      expect: "연동"

  - order: 11
    instruction: "복합 인시던트 대응 플레이북을 설계하라. 랜섬웨어 감염 시나리오에 대한 종합 대응 플레이북(탐지→격리→분석→복구→보고)을 작성하라."
    hint: "NIST SP 800-61의 인시던트 대응 4단계를 기반으로 설계하라"
    category: "design"
    points: 12
    answer: "랜섬웨어 플레이북: 1) 탐지(파일 암호화 패턴), 2) 격리(네트워크 차단), 3) 범위 파악(감염 호스트 식별), 4) 증거 수집(메모리+디스크), 5) 복구(백업 복원), 6) 보고(경영진+법적 신고)"
    answer_detail: "랜섬웨어 대응은 시간이 핵심이다. 감염 확산 방지를 위한 즉각적 격리, 복호화 키 확보를 위한 메모리 덤프, 백업 무결성 확인이 초기 대응의 3대 우선사항이다."
    verify:
      type: "output_contains"
      expect: "랜섬웨어"

  - order: 12
    instruction: "플레이북 버전 관리와 지속적 개선 프로세스를 수립하라. 플레이북의 생명주기(작성→검토→배포→모니터링→개선)를 정의하라."
    hint: "Git 기반 버전 관리 + 실행 결과 피드백 루프를 설계하라"
    category: "governance"
    points: 8
    answer: "생명주기: 1) 작성(템플릿 기반), 2) 리뷰(보안팀 검토), 3) 테스트(시뮬레이션), 4) 배포(프로덕션), 5) 모니터링(성공률/MTTR), 6) 개선(분기별 리뷰). Git으로 변경이력 관리"
    answer_detail: "플레이북은 살아있는 문서이다. 위협 환경 변화, 도구 업데이트, 운영 경험에 따라 지속적으로 개선되어야 하며, 실행 메트릭이 개선의 근거가 된다."
    verify:
      type: "output_contains"
      expect: "버전"

  - order: 13
    instruction: "SOAR 도입의 리스크를 분석하라. 자동 차단의 오탐 위험, 단일 장애점, 과도한 자동화의 위험성을 평가하고 완화 방안을 제시하라."
    hint: "자동화 범위와 사람의 개입(human-in-the-loop) 균형을 고려하라"
    category: "risk"
    points: 8
    answer: "리스크: 1) 오탐차단(정상서비스 중단), 2) 단일장애점(SOAR 다운=전체 대응 불가), 3) 과도자동화(컨텍스트 무시), 4) API 키 노출. 완화: 임계값 기반 자동/수동 분리, HA 구성, 감사 로깅"
    answer_detail: "SOAR의 강력함은 동시에 위험이다. 자동 차단이 정상 서비스를 중단시키면 자동화하지 않은 것보다 피해가 크다. human-in-the-loop을 적절히 유지하고, 자동 차단에는 반드시 롤백 메커니즘을 포함한다."
    verify:
      type: "output_contains"
      expect: "리스크"

  - order: 14
    instruction: "ROI 분석을 수행하라. SOAR 도입 전후의 MTTR, 인력 시간, 인시던트 처리 비용을 비교하여 투자 대비 효과를 산출하라."
    hint: "분석관의 시급 × 절약된 시간 = 비용 절감 효과"
    category: "measurement"
    points: 8
    answer: "ROI: 도입 전 MTTR 30분×월 500건=250시간, 도입 후 5분×500건=42시간. 월 208시간 절약. 분석관 시급 5만원 기준 월 1,040만원 절감. 1년 ROI: 12,480만원/도입비용"
    answer_detail: "ROI 분석은 SOAR 투자를 정당화하는 핵심이다. 직접적 비용 절감(인력 시간)과 간접적 효과(MTTR 개선으로 인한 피해 감소)를 모두 포함하여 종합적으로 산출한다."
    verify:
      type: "output_contains"
      expect: "ROI"

  - order: 15
    instruction: "SOAR 구축 종합 보고서를 작성하라. 아키텍처, 구현된 플레이북, 연동 도구, 메트릭, ROI, 향후 발전 계획을 포함하라."
    hint: "경영진용 요약과 기술팀용 상세 내용을 모두 포함하라"
    category: "reporting"
    points: 14
    answer: "종합: N개 플레이북 구현, M개 도구 연동, 자동화율 60%, MTTR 83% 개선, 연간 ROI 12,480만원. 발전: AI 기반 의사결정 보조, 플레이북 자동 생성"
    answer_detail: "SOAR 종합 보고서는 자동화 성과와 향후 비전을 모두 담아야 한다. 현재 달성한 성과(숫자 기반)와 아직 자동화되지 않은 영역(향후 기회)을 명확히 구분하여 지속적 투자를 유도한다."
    verify:
      type: "output_contains"
      expect: "SOAR"
