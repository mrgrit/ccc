lab_id: compliance-nonai-week13
title: 보안정책 문서 작성 실습
version: non-ai
course: compliance-nonai
week: 13
description: 조직의 보안정책 문서를 작성하고, 정책 내용을 시스템 설정으로 구현합니다. 접근 통제 정책, 패스워드 정책, 감사 정책, 인시던트 대응 정책을 작성하고 기술적으로
  적용합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 보안정책 문서 체계(상위-하위 정책, 지침, 절차)를 이해한다
- 정책 문서를 작성하고 시스템에 구현한다
- 정책과 실제 설정의 일관성을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})에 보안정책 디렉터리를 생성하고, 상위 정보보안 정책서를 작성하시오.
  hint: mkdir로 디렉터리를 만들고 tee로 정책 문서를 작성하세요.
  category: config
  points: 10
  answer: 'sudo mkdir -p /opt/security-policy && cat << ''EOF'' | sudo tee /opt/security-policy/information_security_policy.txt

    === 정보보안 정책서 ===

    1. 목적: 조직의 정보자산을 보호하고 비즈니스 연속성을 확보한다

    2. 적용범위: 전 임직원, 정보시스템, 협력업체

    3. 기본원칙: 기밀성, 무결성, 가용성 보장

    4. 하위정책: 접근통제, 패스워드, 감사, 인시던트대응

    5. 위반시 조치: 경고, 직무정지, 해고, 법적조치

    6. 검토주기: 연 1회

    EOF'
  answer_detail: 정보보안 정책서는 조직의 보안 방향을 정하는 최상위 문서입니다. 목적, 적용범위, 기본원칙, 하위정책 체계, 위반 조치, 검토 주기가 포함되어야 합니다.
    경영진의 서명/승인을 받아 권위를 부여합니다.
  verify:
    type: output_contains
    expect: 정보보안 정책서
    field: stdout
    semantic:
      intent: '정보보안 정책서(최상위) — /opt/security-policy/information_security_policy.txt: 목적 + 적용범위 + 기본원칙(CIA)
        + 하위정책 + 위반 조치 + 검토 주기(연 1회). 경영진 서명 승인으로 권위 부여.'
      success_criteria:
      - 정보보안 정책서 키워드
      - /opt/security-policy 디렉터리 + 6개 이상 조항
      - 최상위 정책 구조
      acceptable_methods:
      - sudo mkdir + tee 정책 문서
      - Confluence / SharePoint 정책 문서
      - ISO 27001 Template + 조직화
      - OneTrust / GRC 플랫폼
      negative_signs:
      - 6개 조항 중 4개 이상 누락
      - 최상위 정책 위치 맥락 없음
      - 경영진 승인 맥락 없음
  target_vm: secu
- order: 2
  instruction: 접근 통제 정책 문서를 작성하시오.
  hint: 계정 관리, 권한 부여, 원격 접근, 물리적 접근 통제를 포함하세요.
  category: config
  points: 10
  answer: "cat << 'EOF' | sudo tee /opt/security-policy/access_control_policy.txt\n=== 접근 통제 정책 ===\n\
    1. 계정관리\n   - 개인 계정 사용 원칙 (공용 계정 금지)\n   - 퇴직/전보 시 24시간 이내 계정 비활성화\n   - 30일 미사용 계정 자동 잠금\n2. 권한관리\n\
    \   - 최소 권한 원칙 적용\n   - 특권 계정(root/sudo) 사용 시 승인 필요\n   - 분기별 권한 재검토\n3. 원격접근\n   - SSH 키 기반 인증 권장\n\
    \   - root 원격 접속 금지\n   - 접속 시 경고 배너 표시\nEOF"
  answer_detail: 접근 통제 정책은 '누가, 어떤 조건에서, 어떤 자원에 접근할 수 있는가'를 정의합니다. 최소 권한 원칙(PoLP), 직무 분리(SoD), 필요 지식(Need-to-Know)
    원칙을 기반으로 합니다.
  verify:
    type: output_contains
    expect: 접근 통제 정책
    field: stdout
    semantic:
      intent: '접근 통제 정책 — /opt/security-policy/access_control_policy.txt: 계정관리 (공용 금지/24h 비활성화/30d 잠금)
        + 권한관리 (최소권한/특권 승인/분기 재검토) + 원격접근 (SSH 키/root 금지/경고 배너). PoLP + SoD + Need-to-Know 원칙.'
      success_criteria:
      - 접근 통제 정책 키워드
      - 계정/권한/원격접근 3대 영역
      - 최소 권한 원칙
      acceptable_methods:
      - tee 접근 통제 문서
      - Okta / Azure AD 정책 설정
      - SailPoint IAM governance
      - RBAC / ABAC 모델링 도구
      negative_signs:
      - 3대 영역 중 누락
      - PoLP/SoD 맥락 없음
      - 특권 승인 맥락 없음
  target_vm: secu
- order: 3
  instruction: 접근 통제 정책의 'root 원격 접속 금지' 조항을 시스템에 구현하시오.
  hint: sshd_config에서 PermitRootLogin을 no로 설정하세요.
  category: config
  points: 12
  answer: sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config && grep '^PermitRootLogin'
    /etc/ssh/sshd_config
  answer_detail: 정책 문서가 있어도 기술적으로 강제하지 않으면 실효성이 없습니다. PermitRootLogin no를 설정하면 SSH를 통한 root 직접 접속이 차단되어,
    접근 통제 정책의 '원격 root 접속 금지' 조항이 기술적으로 구현됩니다.
  verify:
    type: output_contains
    expect: PermitRootLogin no
    field: stdout
    semantic:
      intent: root 원격 접속 차단 구현 — sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
        + grep 검증. 정책 문서 → 시스템 강제. 정책 없이 문서만 존재 = 실효성 없음.
      success_criteria:
      - PermitRootLogin no 키워드
      - sed 수정 + grep 검증
      - 정책→구현 매핑
      acceptable_methods:
      - sed + grep 검증
      - augeas /etc/ssh/sshd_config
      - Ansible authorized_key + PermitRootLogin no
      - CIS-CAT 자동 적용
      negative_signs:
      - PermitRootLogin no 미적용
      - 검증 없음
      - 정책-구현 매핑 맥락 없음
  target_vm: secu
- order: 4
  instruction: 패스워드 정책 문서를 작성하시오.
  hint: 최소 길이, 복잡도, 변경 주기, 이전 패스워드 재사용 금지를 포함하세요.
  category: config
  points: 10
  answer: 'cat << ''EOF'' | sudo tee /opt/security-policy/password_policy.txt

    === 패스워드 정책 ===

    1. 최소길이: 12자 이상

    2. 복잡도: 대문자, 소문자, 숫자, 특수문자 중 3종 이상 조합

    3. 변경주기: 90일마다 변경 의무

    4. 이력관리: 최근 5개 패스워드 재사용 금지

    5. 잠금정책: 5회 연속 실패 시 10분 잠금

    6. 초기패스워드: 최초 로그인 시 즉시 변경

    EOF'
  answer_detail: 패스워드 정책은 가장 기본적인 인증 통제입니다. NIST SP 800-63B 최신 가이드라인에서는 복잡도보다 길이를 강조하며, 정기적 변경 강제보다 침해
    시 즉시 변경을 권장합니다. 다만 한국 법규에서는 아직 정기 변경을 요구합니다.
  verify:
    type: output_contains
    expect: 패스워드 정책
    field: stdout
    semantic:
      intent: '패스워드 정책 — /opt/security-policy/password_policy.txt: 12자 + 복잡도 3종 + 90일 + 최근 5개 재사용 금지 +
        5회 실패 10분 잠금 + 초기 즉시 변경. NIST SP 800-63B: 길이 강조 + 정기 변경보다 침해 시 즉시 변경. 한국 법규는 정기 변경 유지.'
      success_criteria:
      - 패스워드 정책 키워드
      - 최소길이 + 복잡도 + 변경주기 + 잠금
      - 6개 항목 이상
      acceptable_methods:
      - tee 패스워드 정책 문서
      - AD GPO Password Policy
      - FreeIPA 패스워드 정책
      - NIST 800-63B 가이드
      negative_signs:
      - 6개 항목 중 3개 이하
      - NIST 800-63B 맥락 없음
      - 길이/복잡도 구분 없음
  target_vm: secu
- order: 5
  instruction: 패스워드 정책을 시스템에 구현하시오. minlen=12, 복잡도, PASS_MAX_DAYS=90을 적용합니다.
  hint: pwquality.conf와 login.defs를 수정하세요.
  category: config
  points: 12
  answer: sudo sed -i 's/^# minlen.*/minlen = 12/' /etc/security/pwquality.conf && sudo sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   90/'
    /etc/login.defs && echo '=== 적용 확인 ===' && grep 'minlen' /etc/security/pwquality.conf | grep -v '^#'
    && grep '^PASS_MAX_DAYS' /etc/login.defs
  answer_detail: 정책 문서의 각 조항에 대해 기술적 구현 수단을 매핑해야 합니다. minlen=12 -> pwquality.conf, 변경주기 90일 -> login.defs
    PASS_MAX_DAYS, 잠금정책 -> pam_faillock. 정책과 구현의 매핑 문서를 관리하면 감사 시 증적으로 활용됩니다.
  verify:
    type: output_contains
    expect: minlen
    field: stdout
    semantic:
      intent: '패스워드 정책 구현 — pwquality.conf minlen=12 + login.defs PASS_MAX_DAYS=90. sed 2건 + grep 적용 확인.
        정책-구현 매핑: minlen→pwquality, 변경주기→login.defs, 잠금→pam_faillock.'
      success_criteria:
      - minlen 키워드
      - pwquality + login.defs 2파일 수정
      - 적용 확인
      acceptable_methods:
      - sed + grep 적용 확인
      - authconfig --passminlen=12 (RHEL)
      - Ansible pam 모듈
      - CIS Benchmark 자동 적용 도구
      negative_signs:
      - minlen/PASS_MAX_DAYS 중 누락
      - 적용 확인 없음
      - 정책-구현 매핑 맥락 없음
  target_vm: secu
- order: 6
  instruction: 감사 정책 문서를 작성하시오.
  hint: 감사 대상, 보관 기간, 검토 주기, 이상 징후 대응을 포함하세요.
  category: config
  points: 10
  answer: 'cat << ''EOF'' | sudo tee /opt/security-policy/audit_policy.txt

    === 감사 정책 ===

    1. 감사대상: 로그인/로그아웃, 권한변경, 파일접근, 정책변경

    2. 보관기간: 최소 1년 (개인정보 처리 시 2년)

    3. 로그보호: 로그 파일 640 이하 권한, 원격 백업

    4. 검토주기: 주 1회 이상 로그 검토

    5. 이상징후: 5회 이상 로그인 실패, 비정상 시간 접속 시 알림

    6. SIEM연동: 모든 로그를 중앙 SIEM(10.20.30.100)으로 전송

    EOF'
  answer_detail: 감사 정책은 '무엇을, 어떻게, 얼마나 오래 기록하고 검토하는가'를 정의합니다. SIEM 연동은 로그의 중앙 관리와 실시간 상관 분석을 가능하게 하며,
    로그 위변조 방지에도 효과적입니다.
  verify:
    type: output_contains
    expect: 감사 정책
    field: stdout
    semantic:
      intent: '감사 정책 — /opt/security-policy/audit_policy.txt: 감사대상 (로그인/권한/파일/정책) + 보관 1년(개인정보 2년) + 640
        이하 권한 + 주 1회 검토 + 5회 실패 알림 + SIEM(10.20.30.100) 중앙 전송. 로그 위변조 방지.'
      success_criteria:
      - 감사 정책 키워드
      - 감사대상 + 보관기간 + SIEM 연동
      - 6개 이상 조항
      acceptable_methods:
      - tee 감사 정책 문서
      - Wazuh ruleset + alerts
      - Graylog stream + alerts
      - Splunk Enterprise Security
      negative_signs:
      - SIEM 연동 맥락 없음
      - 보관 기간 명시 없음
      - 주기적 검토 맥락 없음
  target_vm: secu
- order: 7
  instruction: 작성한 보안정책 문서 목록을 확인하고, 각 정책이 시스템에 구현되었는지 검증하시오.
  hint: /opt/security-policy/ 디렉터리의 파일을 확인하고, 정책-구현 매핑을 검증하세요.
  category: audit
  points: 12
  answer: echo '=== 정책 문서 목록 ===' && ls -la /opt/security-policy/ && echo '' && echo '=== 정책-구현 매핑 검증
    ===' && echo '[접근통제] PermitRootLogin:' && grep '^PermitRootLogin' /etc/ssh/sshd_config && echo '[패스워드]
    minlen:' && grep 'minlen' /etc/security/pwquality.conf | grep -v '^#' && echo '[패스워드] PASS_MAX_DAYS:'
    && grep '^PASS_MAX_DAYS' /etc/login.defs && echo '[감사] auditd:' && sudo systemctl is-active auditd
    2>/dev/null
  answer_detail: 정책 문서와 실제 구현 사이의 차이(gap)를 식별하는 것이 중요합니다. 정책에 'root 접속 금지'라고 되어 있는데 PermitRootLogin이 yes이면
    정책과 구현이 불일치한 것입니다. 이런 불일치를 정기적으로 점검하는 것이 보안감사의 핵심입니다.
  verify:
    type: output_contains
    expect: 정책-구현 매핑 검증
    field: stdout
    semantic:
      intent: 정책-구현 매핑 검증 — ls /opt/security-policy/ + [접근통제] PermitRootLogin + [패스워드] minlen + PASS_MAX_DAYS
        + [감사] auditd active. 정책-구현 gap 식별 = 보안감사 핵심.
      success_criteria:
      - 정책-구현 매핑 검증 섹션 키워드
      - 정책 문서 목록 + 4개 구현 확인
      - gap 식별 구조
      acceptable_methods:
      - ls + grep 통합 검증
      - OSCAL 기계판독 정책 + SCAP scan
      - GRC 플랫폼 Control Mapping
      - Chef InSpec 정책 코드
      negative_signs:
      - 정책-구현 중 한쪽만
      - 4개 항목 중 2개 이하
      - gap 식별 맥락 없음
  target_vm: secu
- order: 8
  instruction: 보안정책 준수 자동 점검 스크립트를 작성하고 실행하시오. 정책 문서의 각 조항과 시스템 설정을 자동 대조합니다.
  hint: 각 정책 항목에 대해 기준값과 현재값을 비교하는 로직을 구현하세요.
  category: audit
  points: 14
  answer: "cat << 'SCRIPT' > /tmp/policy_compliance.sh\n#!/bin/bash\necho '=== 보안정책 준수 자동 점검 ==='\nPASS=0;\
    \ FAIL=0\ncheck() {\n  if [ \"$2\" = \"true\" ]; then\n    echo \"  [적합] $1\"\n    PASS=$((PASS+1))\n\
    \  else\n    echo \"  [미흡] $1\"\n    FAIL=$((FAIL+1))\n  fi\n}\necho '[접근 통제 정책]'\nROOT=$(grep '^PermitRootLogin\
    \ no' /etc/ssh/sshd_config 2>/dev/null | wc -l)\ncheck 'root 원격 접속 차단' \"$([ $ROOT -gt 0 ] && echo\
    \ true || echo false)\"\necho '[패스워드 정책]'\nMINLEN=$(grep 'minlen' /etc/security/pwquality.conf 2>/dev/null\
    \ | grep -v '^#' | awk -F= '{print $2}' | tr -d ' ')\ncheck \"최소길이 12자 (현재: ${MINLEN:-미설정})\" \"$([\
    \ \"${MINLEN:-0}\" -ge 12 ] && echo true || echo false)\"\nMAXDAYS=$(grep '^PASS_MAX_DAYS' /etc/login.defs\
    \ | awk '{print $2}')\ncheck \"변경주기 90일 (현재: ${MAXDAYS}일)\" \"$([ $MAXDAYS -le 90 ] && echo true ||\
    \ echo false)\"\necho '[감사 정책]'\nAUDIT=$(sudo systemctl is-active auditd 2>/dev/null)\ncheck \"auditd\
    \ 활성 (현재: $AUDIT)\" \"$([ \"$AUDIT\" = 'active' ] && echo true || echo false)\"\necho ''\necho \"\
    결과: 적합 ${PASS}건, 미흡 ${FAIL}건\"\necho '=== 정책 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/policy_compliance.sh\
    \ && bash /tmp/policy_compliance.sh"
