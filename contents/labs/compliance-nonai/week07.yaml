lab_id: compliance-nonai-week07
title: SOX IT 통제 점검 실습
version: non-ai
course: compliance-nonai
week: 7
description: SOX(Sarbanes-Oxley Act) Section 404의 IT 일반통제(ITGC) 요구사항을 시스템에서 점검합니다. 접근 통제, 변경 관리, 컴퓨터 운영,
  프로그램 개발 관련 설정을 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- SOX ITGC의 네 가지 도메인(접근통제, 변경관리, 운영, 개발)을 이해한다
- 시스템의 접근 통제와 변경 관리 설정을 점검한다
- IT 통제 증적(evidence)을 수집하고 보관한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'SECU 서버({{SECU_IP}})에서 사용자 계정의 최종 로그인 이력을 확인하시오. SOX ITGC - 접근 통제: 비활성 계정 식별.'
  hint: lastlog 명령으로 각 계정의 마지막 로그인을 확인하세요.
  category: audit
  points: 10
  answer: lastlog | grep -v 'Never logged in' | head -20
  answer_detail: SOX ITGC 접근 통제 도메인은 시스템 접근을 인가된 사용자로 제한할 것을 요구합니다. 장기간 미사용 계정은 비활성화해야 하며, lastlog로 각
    계정의 마지막 로그인 일시와 출발지 IP를 확인할 수 있습니다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: SOX ITGC 접근 통제 — lastlog | grep -v 'Never logged in' | head -20. 각 계정 마지막 로그인 일시 + 출발지 IP.
        장기 미사용 계정 비활성. SOX 접근 통제 도메인 기초. 재무 시스템 인가 접근.
      success_criteria:
      - root 키워드
      - lastlog 명령
      - 로그인 이력
      acceptable_methods:
      - lastlog | grep -v
      - last | head
      - awk /etc/shadow lastchange
      - Wazuh login tracking
      negative_signs:
      - Never logged in 필터 없음
      - SOX 접근 통제 맥락 없음
      - 비활성 계정 식별 없음
  target_vm: secu
- order: 2
  instruction: '실패한 로그인 시도를 확인하시오. SOX ITGC - 접근 통제: 비인가 접근 시도 모니터링.'
  hint: /var/log/auth.log에서 Failed 키워드를 검색하세요.
  category: audit
  points: 10
  answer: sudo grep -c 'Failed' /var/log/auth.log 2>/dev/null && echo '건 실패' && sudo grep 'Failed' /var/log/auth.log
    2>/dev/null | tail -5
  answer_detail: SOX는 재무 데이터에 대한 비인가 접근 시도를 모니터링할 것을 요구합니다. 로그인 실패가 특정 계정이나 IP에서 집중되면 무차별 대입 공격의 징후일 수
    있습니다. 이를 자동 차단하는 메커니즘(fail2ban 등)도 필요합니다.
  verify:
    type: output_contains
    expect: 실패
    field: stdout
    semantic:
      intent: 실패 로그인 모니터링 — sudo grep -c 'Failed' /var/log/auth.log + tail -5. 비인가 접근 시도 추적. 특정 계정/IP
        집중 = 브루트포스 징후. fail2ban 자동 차단 필요. MITRE ATT&CK T1110.
      success_criteria:
      - 실패 키워드
      - grep Failed auth.log
      - 실패 카운트
      acceptable_methods:
      - grep -c Failed + tail
      - lastb (실패 로그인)
      - journalctl _SYSTEMD_UNIT=ssh.service + grep
      - Wazuh rule 5760
      negative_signs:
      - Failed 카운트 없음
      - T1110 맥락 없음
      - 자동 차단 대안 없음
  target_vm: secu
- order: 3
  instruction: '시스템 패키지 변경 이력을 확인하시오. SOX ITGC - 변경 관리: 모든 시스템 변경을 추적.'
  hint: apt 또는 dpkg 로그에서 설치/업데이트 이력을 확인하세요.
  category: audit
  points: 10
  answer: tail -50 /var/log/dpkg.log 2>/dev/null | grep -E '(install|upgrade|remove)' | tail -15
  answer_detail: SOX ITGC 변경 관리 도메인은 IT 시스템의 모든 변경을 문서화하고 승인 절차를 거칠 것을 요구합니다. dpkg.log는 패키지 설치, 업그레이드,
    삭제 이력을 기록하며, 이 로그가 SOX 감사의 변경 관리 증적이 됩니다.
  verify:
    type: output_contains
    expect: install
    field: stdout
    semantic:
      intent: SOX 변경 관리 패키지 이력 — tail -50 /var/log/dpkg.log | grep -E '(install|upgrade|remove)' | tail
        -15. 모든 시스템 변경 문서화 + 승인 절차. dpkg.log = 패키지 설치/업그레이드/삭제 이력 = SOX 변경 관리 증적. CMDB 대조.
      success_criteria:
      - install 키워드
      - dpkg.log 조회
      - install/upgrade/remove 필터
      acceptable_methods:
      - tail dpkg.log + grep
      - apt history list
      - rpm -qa --last (RHEL)
      - Ansible + idempotent tracking
      negative_signs:
      - dpkg.log 경로 혼동
      - 변경 관리 증적 맥락 없음
      - CMDB 대조 언급 없음
  target_vm: secu
- order: 4
  instruction: '시스템 설정 파일의 최근 변경을 확인하시오. SOX ITGC - 변경 관리: 설정 변경 추적.'
  hint: find 명령으로 최근 7일 내 변경된 /etc 파일을 검색하세요.
  category: audit
  points: 10
  answer: sudo find /etc -type f -mtime -7 -ls 2>/dev/null | sort -k11 | tail -15
  answer_detail: SOX 변경 관리에서는 운영 환경의 설정 변경이 승인된 것인지 확인해야 합니다. /etc 디렉터리의 최근 변경 파일 목록은 비인가 변경을 탐지하는 증적이
    됩니다. 변경 관리 시스템(CMDB)과 대조하여 모든 변경이 승인된 것인지 확인해야 합니다.
  verify:
    type: output_contains
    expect: /etc
    field: stdout
    semantic:
      intent: /etc 최근 변경 — sudo find /etc -type f -mtime -7 -ls | sort -k11 | tail -15. 7일 내 변경 파일. 비인가
        변경 탐지 증적. 변경 관리 시스템 (CMDB) 대조 필수. Wazuh FIM 실시간 보완.
      success_criteria:
      - /etc 키워드
      - find -mtime -7
      - 변경 파일 목록
      acceptable_methods:
      - find -mtime -7 -ls
      - Wazuh syscheck FIM
      - auditd watch /etc
      - AIDE baseline
      negative_signs:
      - -mtime 범위 없음
      - 비인가 변경 탐지 맥락 없음
      - FIM 대안 언급 없음
  target_vm: secu
- order: 5
  instruction: '백업 작업의 실행 이력과 성공 여부를 확인하시오. SOX ITGC - 컴퓨터 운영: 데이터 백업 및 복원.'
  hint: 시스템 로그에서 백업 관련 작업을 검색하세요.
  category: audit
  points: 10
  answer: sudo grep -i 'backup\|rsync\|dump\|cron' /var/log/syslog 2>/dev/null | tail -10; echo '--- 예약
    작업 ---' && sudo crontab -l 2>/dev/null
  answer_detail: SOX ITGC 컴퓨터 운영 도메인은 데이터의 정기적 백업과 복원 테스트를 요구합니다. 백업 작업이 예약(cron)되어 실행되고 있는지, 성공했는지, 복원
    테스트를 수행했는지 확인해야 합니다.
  verify:
    type: output_contains
    expect: cron
    field: stdout
    semantic:
      intent: SOX 컴퓨터 운영 백업 — sudo grep -i 'backup|rsync|dump|cron' /var/log/syslog + sudo crontab -l.
        데이터 정기 백업 + 복원 테스트. ITGC 컴퓨터 운영 도메인. 백업 성공/실패 로그 추적.
      success_criteria:
      - cron 키워드
      - backup 관련 grep + crontab
      - 백업 작업 확인
      acceptable_methods:
      - grep backup syslog + crontab -l
      - systemctl list-timers
      - Veeam / Commvault enterprise
      - restic / BorgBackup 오픈소스
      negative_signs:
      - 백업 개념 없음
      - 복원 테스트 맥락 없음
      - SOX ITGC 운영 도메인 없음
  target_vm: secu
- order: 6
  instruction: '시스템 시간 동기화 상태를 확인하시오. SOX ITGC - 컴퓨터 운영: 정확한 시간 기록.'
  hint: timedatectl로 시간 동기화 상태를 확인하세요.
  category: audit
  points: 10
  answer: timedatectl status
  answer_detail: SOX 감사에서 로그의 시간 정확성은 매우 중요합니다. 모든 서버의 시간이 동기화되지 않으면 이벤트의 시간 순서를 정확히 파악할 수 없어 감사 증적의 신뢰성이
    떨어집니다. NTP로 모든 서버 시간을 동기화해야 합니다.
  verify:
    type: output_contains
    expect: Time zone
    field: stdout
    semantic:
      intent: SOX 시간 동기화 — timedatectl status. 로그 시간 정확성 = 감사 증적 신뢰성. 모든 서버 시간 동기화 = 이벤트 순서 정확 파악. NTP
        또는 chrony 필수.
      success_criteria:
      - Time zone 키워드
      - timedatectl status
      - 동기화 상태
      acceptable_methods:
      - timedatectl status
      - chronyc sources -v
      - ntpq -pn
      - auditd time-change rule
      negative_signs:
      - 동기화 맥락 없음
      - 감사 증적 신뢰성 없음
      - date 명령만
  target_vm: secu
- order: 7
  instruction: 'sudo 명령 실행 로그를 확인하시오. SOX ITGC - 접근 통제: 권한 있는 계정의 활동 추적.'
  hint: /var/log/auth.log에서 sudo 사용 이력을 검색하세요.
  category: audit
  points: 12
  answer: sudo grep 'sudo:' /var/log/auth.log 2>/dev/null | tail -10
  answer_detail: SOX는 특권 계정(sudo, root) 사용을 특히 엄격하게 모니터링할 것을 요구합니다. sudo 로그에는 실행 사용자, 실행 명령, 실행 시간이 기록됩니다.
    비인가된 관리 명령 실행은 즉시 조사해야 합니다.
  verify:
    type: output_contains
    expect: sudo
    field: stdout
    semantic:
      intent: sudo 실행 로그 — sudo grep 'sudo:' /var/log/auth.log | tail -10. 특권 계정 활동 추적. 실행 사용자 + 명령 +
        시간 기록. 비인가 관리 명령 즉시 조사. SOX 특권 접근 엄격 모니터링.
      success_criteria:
      - sudo 키워드
      - 'grep sudo: auth.log'
      - 특권 로그 이력
      acceptable_methods:
      - 'grep sudo: auth.log'
      - journalctl _COMM=sudo
      - Wazuh rule 5400 sudo alerts
      - Splunk rex sudo command
      negative_signs:
      - 특권 모니터링 맥락 없음
      - auth.log 누락
      - SOX 엄격 감시 맥락 없음
  target_vm: secu
- order: 8
  instruction: '직무 분리(SoD) 관점에서 사용자 권한을 분석하시오. SOX ITGC - 접근 통제: 직무 분리.'
  hint: 각 사용자의 그룹 멤버십과 sudo 권한을 분석하세요.
  category: audit
  points: 12
  answer: 'echo ''=== 사용자별 그룹 멤버십 ==='' && for user in $(awk -F: ''$7 !~ /nologin|false/ {print $1}''
    /etc/passwd); do echo "$user: $(groups $user 2>/dev/null | cut -d: -f2)"; done && echo ''=== sudoers
    설정 ==='' && sudo grep -v ''^#\|^$\|^Defaults'' /etc/sudoers 2>/dev/null'
  answer_detail: SOX의 직무 분리(Segregation of Duties)는 한 사람이 승인과 실행을 모두 수행할 수 없도록 하는 것입니다. IT 환경에서는 개발자에게
    운영 서버 접근 권한을 부여하지 않고, DBA에게 애플리케이션 관리 권한을 부여하지 않는 등의 통제가 필요합니다.
  verify:
    type: output_contains
    expect: 그룹 멤버십
    field: stdout
    semantic:
      intent: 'SoD (Segregation of Duties) — for user: groups $user + sudo grep sudoers. 한 사람 승인 + 실행
        불가. 개발자 ↔ 운영 서버 접근 금지 + DBA ↔ 앱 관리 분리. SOX 직무 분리 원칙. 감사 회계 재무 통제.'
      success_criteria:
      - 그룹 멤버십 키워드
      - for user + groups + sudoers
      - SoD 분석
      acceptable_methods:
      - bash for + groups + sudoers
      - SailPoint IdentityIQ
      - CyberArk PAM 권한 분리
      - RBAC 매트릭스 수동
      negative_signs:
      - SoD 개념 없음
      - 개발/운영 분리 맥락 없음
      - 단일 그룹 조회만
  target_vm: secu
- order: 9
  instruction: SOX ITGC 종합 점검 보고서 스크립트를 작성하고 실행하시오.
  hint: 접근 통제, 변경 관리, 운영 항목을 종합하세요.
  category: audit
  points: 16
  answer: 'cat << ''SCRIPT'' > /tmp/sox_itgc_audit.sh

    #!/bin/bash

    echo ''=== SOX ITGC 종합 점검 보고서 ===''

    echo ''''

    echo ''[접근 통제]''

    echo "활성 계정 수: $(grep -vc ''nologin\|false'' /etc/passwd)"

    echo "sudo 그룹: $(getent group sudo | cut -d: -f4)"

    echo "금일 실패 로그인: $(sudo grep -c ''Failed'' /var/log/auth.log 2>/dev/null || echo 0)"

    echo ''[변경 관리]''

    echo "최근 7일 /etc 변경: $(sudo find /etc -type f -mtime -7 2>/dev/null | wc -l)건"

    echo "최근 패키지 변경: $(grep -c ''install\|upgrade'' /var/log/dpkg.log 2>/dev/null || echo 0)건"

    echo ''[컴퓨터 운영]''

    timedatectl status | grep ''synchronized''

    echo "감사 로그 규칙: $(sudo auditctl -l 2>/dev/null | wc -l)개"

    echo ''''

    echo ''=== SOX ITGC 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/sox_itgc_audit.sh && bash /tmp/sox_itgc_audit.sh'
  answer_detail: SOX Section 404는 경영진이 내부 통제의 효과성을 평가하고 외부 감사인이 이를 감사할 것을 요구합니다. ITGC는 접근 통제, 변경 관리, 컴퓨터
    운영, 프로그램 개발의 네 도메인으로 구성되며, 이 스크립트는 각 도메인의 핵심 점검 항목을 자동으로 수집합니다.
  verify:
    type: output_contains
    expect: SOX ITGC 점검 완료
    field: stdout
    semantic:
      intent: 'SOX ITGC 종합 점검 — /tmp/sox_itgc_audit.sh: 접근 통제 (활성 계정/sudo 그룹/실패 로그인) + 변경 관리 (/etc 변경/패키지)
        + 컴퓨터 운영 (시간 동기화/감사 규칙). SOX Section 404 내부 통제 평가. 4 도메인 (접근/변경/운영/개발) 중 3 도메인 자동 점검.'
      success_criteria:
      - SOX ITGC 점검 완료 키워드
      - /tmp/sox_itgc_audit.sh
      - 3 도메인 이상 점검
      acceptable_methods:
      - bash + 3 도메인 매핑
      - ACL Audit Command Language
      - Oracle GRC Controls Monitor
      - Excel SOX dashboard
      negative_signs:
      - 4 도메인 구분 없음
      - Section 404 맥락 없음
      - 도메인 2개 이하
  target_vm: secu
