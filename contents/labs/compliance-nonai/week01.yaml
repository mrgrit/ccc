lab_id: "compliance-nonai-week01"
title: "[Non-AI] 개인정보보호법"
version: "non-ai"
course: "compliance-nonai"
week: 1
description: "개인정보보호법의 주요 조항과 기업 준수 사항을 학습합니다"
difficulty: "easy"
duration_minutes: 120
objectives:
  - "개인정보보호법의 핵심 개념을 이해한다"
  - "개인정보보호법 관련 실무 기술을 습득한다"
  - "개인정보보호법 보안 대책을 수립하고 적용한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "개인정보보호법 주요 조항을 조회하고 핵심 조항 목록을 작성하세요"
    hint: "cat 명령어로 법률 요약 파일을 확인하세요"
    category: "recon"
    points: 10
    answer: "개인정보보호법 주요 조항: 제15조(수집·이용), 제17조(제공), 제23조(민감정보), 제24조(고유식별정보)"
    answer_detail: "개인정보보호법은 2011년 제정되어 개인정보의 수집, 이용, 제공, 파기에 대한 기본 원칙을 규정합니다. 제15조는 수집·이용 동의, 제17조는 제3자 제공, 제23조는 민감정보 처리 제한을 다룹니다."
    verify:
      type: "output_contains"
      expect: "제15조"
  - order: 2
    instruction: "개인정보 수집 동의서 템플릿의 필수 항목을 확인하세요"
    hint: "동의서에 반드시 포함되어야 할 7가지 항목을 확인하세요"
    category: "analysis"
    points: 10
    answer: "필수항목: 수집목적, 수집항목, 보유기간, 동의거부권, 거부시 불이익, 제3자제공, 위탁"
    answer_detail: "개인정보 수집 동의서에는 법 제15조 및 제22조에 따라 수집 목적, 수집 항목, 보유 및 이용 기간, 동의 거부권 및 불이익 내용이 필수적으로 포함되어야 합니다."
    verify:
      type: "output_contains"
      expect: "수집목적"
  - order: 3
    instruction: "시스템에서 개인정보 처리 현황을 점검하세요"
    hint: "find 명령어로 개인정보가 포함된 파일을 검색하세요"
    category: "audit"
    points: 10
    answer: "find /var/log -name '*.log' -exec grep -l '주민등록번호\|전화번호' {} \;"
    answer_detail: "개인정보 처리 현황 점검은 시스템 내 개인정보 파일의 위치, 접근 권한, 암호화 상태를 확인하는 과정입니다. 로그 파일에 개인정보가 평문으로 저장되어 있는지 반드시 확인해야 합니다."
    verify:
      type: "output_contains"
      expect: "find"
  - order: 4
    instruction: "개인정보 암호화 상태를 점검하세요"
    hint: "openssl 명령어로 암호화 설정을 확인하세요"
    category: "config"
    points: 10
    answer: "openssl enc -aes-256-cbc 알고리즘이 적용되어 있어야 합니다"
    answer_detail: "개인정보보호법 제29조에 따라 개인정보는 암호화하여 저장해야 합니다. 주민등록번호, 비밀번호, 바이오정보 등은 반드시 암호화 대상이며, AES-256 이상의 알고리즘을 사용해야 합니다."
    verify:
      type: "output_contains"
      expect: "aes-256"
  - order: 5
    instruction: "개인정보 접근 통제 설정을 확인하세요"
    hint: "접근 권한 설정 파일을 확인하세요"
    category: "defense"
    points: 10
    answer: "chmod 600으로 개인정보 파일 접근을 제한해야 합니다"
    answer_detail: "개인정보 접근 통제는 법 제29조의 안전조치 의무에 해당합니다. 최소 권한 원칙에 따라 업무상 필요한 최소한의 인원만 접근할 수 있도록 설정해야 합니다."
    verify:
      type: "output_contains"
      expect: "chmod"
  - order: 6
    instruction: "개인정보 처리방침 공개 여부를 점검하세요"
    hint: "웹사이트에서 처리방침 페이지를 확인하세요"
    category: "audit"
    points: 10
    answer: "curl http://10.20.30.80/privacy-policy 로 처리방침 확인"
    answer_detail: "개인정보 처리방침은 법 제30조에 따라 인터넷 홈페이지에 지속적으로 게재해야 합니다. 처리목적, 처리항목, 보유기간, 파기절차 등이 포함되어야 합니다."
    verify:
      type: "output_contains"
      expect: "privacy-policy"
  - order: 7
    instruction: "개인정보 파기 절차를 수립하고 점검하세요"
    hint: "파기 정책 설정 파일을 확인하세요"
    category: "config"
    points: 10
    answer: "보유기간 만료 후 5일 이내 파기, 복구 불가능한 방법 사용"
    answer_detail: "법 제21조에 따라 보유기간 경과 시 지체 없이 파기해야 합니다. 전자적 파일은 복구 불가능한 방법(완전삭제, 덮어쓰기)으로 파기하고, 종이문서는 파쇄 또는 소각합니다."
    verify:
      type: "output_contains"
      expect: "파기"
  - order: 8
    instruction: "개인정보 유출 통지 프로세스를 구성하세요"
    hint: "유출 시 통지 절차와 시한을 확인하세요"
    category: "response"
    points: 10
    answer: "유출 인지 후 72시간 이내 정보주체 및 개인정보보호위원회 통지"
    answer_detail: "법 제34조에 따라 개인정보 유출 시 72시간 이내에 정보주체에게 통지하고, 1,000명 이상 유출 시 개인정보보호위원회와 전문기관에 신고해야 합니다."
    verify:
      type: "output_contains"
      expect: "72시간"
  - order: 9
    instruction: "개인정보 영향평가 대상을 식별하세요"
    hint: "영향평가 의무 대상 시스템을 확인하세요"
    category: "analysis"
    points: 10
    answer: "5만명 이상 민감정보 또는 고유식별정보 처리 시스템은 영향평가 필수"
    answer_detail: "법 제33조에 따라 공공기관은 대규모 개인정보 처리 시스템 구축 시 영향평가를 수행해야 합니다. 민감정보·고유식별정보 5만명 이상, 내·외부 연계 시스템 등이 대상입니다."
    verify:
      type: "output_contains"
      expect: "영향평가"
  - order: 10
    instruction: "개인정보보호 책임자(CPO) 지정 요건을 확인하세요"
    hint: "CPO 자격 요건과 역할을 확인하세요"
    category: "config"
    points: 10
    answer: "CPO: 임원급 지정, 개인정보 처리 관련 업무 총괄"
    answer_detail: "법 제31조에 따라 개인정보처리자는 개인정보보호 책임자를 지정해야 합니다. 사업주 또는 대표자, 임원, 개인정보 처리 관련 업무를 담당하는 부서장이 될 수 있습니다."
    verify:
      type: "output_contains"
      expect: "CPO"
  - order: 11
    instruction: "개인정보 처리 위탁 관리 현황을 점검하세요"
    hint: "위탁 계약서 필수 항목을 확인하세요"
    category: "audit"
    points: 10
    answer: "위탁 계약서: 위탁업무 내용, 재위탁 제한, 안전조치, 감독, 손해배상"
    answer_detail: "법 제26조에 따라 개인정보 처리를 위탁할 때는 문서로 계약하고, 위탁받는 자가 안전하게 처리하도록 관리·감독해야 합니다."
    verify:
      type: "output_contains"
      expect: "위탁"
  - order: 12
    instruction: "정보주체의 권리 행사 절차를 수립하세요"
    hint: "열람·정정·삭제 요청 처리 절차를 확인하세요"
    category: "response"
    points: 10
    answer: "열람 요청 접수 후 10일 이내 처리, 정정·삭제 요청 시 즉시 처리"
    answer_detail: "법 제35~37조에 따라 정보주체는 자신의 개인정보에 대해 열람, 정정·삭제, 처리 정지를 요구할 수 있으며, 개인정보처리자는 이를 지체 없이 처리해야 합니다."
    verify:
      type: "output_contains"
      expect: "열람"
  - order: 13
    instruction: "개인정보 로그 기록 및 보관 상태를 점검하세요"
    hint: "접속기록 보관 설정을 확인하세요"
    category: "monitor"
    points: 10
    answer: "개인정보 처리 시스템 접속기록 최소 1년(5만명 이상 2년) 보관"
    answer_detail: "안전조치 기준에 따라 개인정보 취급자의 접속기록은 최소 1년 이상 보관해야 하며, 5만명 이상 정보주체의 개인정보를 처리하는 경우 2년 이상 보관해야 합니다."
    verify:
      type: "output_contains"
      expect: "접속기록"
  - order: 14
    instruction: "개인정보 안전성 확보조치 전체 체크리스트를 작성하세요"
    hint: "법 제29조 기준 체크리스트를 작성하세요"
    category: "audit"
    points: 10
    answer: "체크리스트: 접근권한관리, 접근통제, 암호화, 접속기록, 보안프로그램, 물리적조치"
    answer_detail: "개인정보의 안전성 확보조치 기준(고시)에 따라 내부관리계획, 접근권한 관리, 접근통제, 암호화, 접속기록, 악성프로그램 방지, 물리적 안전조치 등을 종합 점검해야 합니다."
    verify:
      type: "output_contains"
      expect: "체크리스트"
  - order: 15
    instruction: "개인정보보호법 위반 사례를 분석하고 개선방안을 도출하세요"
    hint: "최근 주요 위반 사례와 과징금 현황을 분석하세요"
    category: "analysis"
    points: 10
    answer: "주요 위반 유형: 동의 없는 수집, 목적 외 이용, 안전조치 미흡, 유출 미통지"
    answer_detail: "개인정보보호법 위반 시 전체 매출의 3% 이하 과징금, 5년 이하 징역 또는 5천만원 이하 벌금이 부과될 수 있습니다. 주요 위반 유형을 분석하고 예방 대책을 수립해야 합니다."
    verify:
      type: "output_contains"
      expect: "위반"
