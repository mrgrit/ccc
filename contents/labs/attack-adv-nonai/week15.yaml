lab_id: attack-adv-nonai-week15
title: 모의해킹 보고서 작성
version: non-ai
course: attack-adv-nonai
week: 15
description: 전문적인 모의해킹 보고서를 작성한다. 발견사항의 문서화, CVSS 평가, 공격 체인 시각화, 방어 권고사항 작성 등 보고서의 모든 구성 요소를 실습한다.
difficulty: hard
duration_minutes: 120
objectives:
- PTES 표준에 따른 전문 모의해킹 보고서를 작성한다
- 발견사항을 CVSS로 평가하고 증거를 체계적으로 정리한다
- 경영진용 요약과 기술팀용 상세 보고서를 구분하여 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 모의해킹 보고서의 전체 구조를 설계하라. 표지, 목차, 각 섹션의 구성을 /tmp/report_outline.txt에 작성하라.
  hint: PTES 보고서 표준의 필수 섹션을 포함한다
  category: analysis
  points: 10
  answer: "cat > /tmp/report_outline.txt << 'EOF'\n=== Penetration Test Report Structure ===\n\n1. Cover\
    \ Page\n   - Client name, report date, classification\n   - Tester name and certification\n\n2. Executive\
    \ Summary (1-2 pages)\n   - Overall risk rating\n   - Key findings summary\n   - Business impact\n\
    \   - Top recommendations\n\n3. Scope and Methodology\n   - Target systems and IP ranges\n   - Testing\
    \ methodology (PTES/OWASP)\n   - Tools used\n   - Testing timeline\n\n4. Findings Summary\n   - Vulnerability\
    \ statistics (Critical/High/Medium/Low)\n   - Risk heat map\n   - CVSS score distribution\n\n5. Detailed\
    \ Findings\n   - For each finding:\n     a. Title and CVSS score\n     b. Affected systems\n     c.\
    \ Description\n     d. Evidence (screenshots, commands, output)\n     e. Impact analysis\n     f.\
    \ Remediation steps\n\n6. Attack Narrative\n   - Step-by-step attack chain\n   - Timeline of activities\n\
    \   - Techniques mapped to MITRE ATT&CK\n\n7. Recommendations\n   - Prioritized by risk and effort\n\
    \   - Short/medium/long-term roadmap\n\n8. Appendices\n   - Raw scan results\n   - Tool configurations\n\
    \   - Methodology details\nEOF\ncat /tmp/report_outline.txt"
  answer_detail: 모의해킹 보고서는 경영진과 기술팀 두 대상을 모두 만족시켜야 한다. Executive Summary는 비기술적 언어로 비즈니스 영향을 전달하고, Detailed
    Findings는 기술팀이 재현하고 수정할 수 있을 만큼 상세해야 한다. PTES 보고서 표준은 업계에서 널리 인정받는 구조이다.
  verify:
    type: output_contains
    expect: Report Structure
    field: stdout
    semantic:
      intent: '보고서 구조 — echo > /tmp/report_outline.txt: 1. Cover + 2. Executive Summary + 3. Scope/Methodology(PTES/OWASP)
        + 4. Findings Summary + 5. Detailed Findings (CVSS/affected/desc/evidence/impact/remediation)
        + 6. Attack Narrative (MITRE) + 7. Recommendations + 8. Appendices. PTES Reporting Standard. 경영진
        + 기술팀 모두 만족.'
      success_criteria:
      - Report Structure 키워드
      - 8개 섹션 모두 (Cover~Appendices)
      - Detailed Finding 6하위 항목
      acceptable_methods:
      - PTES 보고서 표준
      - OWASP Testing Guide v4.2
      - OffSec/SANS 보고서
      negative_signs:
      - 섹션 5개 이하
      - Detailed 하위 항목 부족
      - 표준 미준수
  target_vm: attacker
- order: 2
  instruction: 취약점 발견사항(Finding)을 표준 형식으로 작성하라. SQL Injection 취약점을 예제로 하여 완전한 Finding 문서를 작성하라.
  hint: 제목, CVSS, 영향받는 시스템, 설명, 증거, 영향, 수정 방법을 포함한다
  category: analysis
  points: 10
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): cat > /tmp/finding_sqli.txt\
    \ << 'EOF'\n=== Finding: F-001 SQL Injection in Authentication ===\n\n[Severity] Critical (CVSS 9.8)\n\
    [Vector] AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H\n[Status] Open\n[Affected] 10.20.30.80:3000 (JuiceShop)\n\
    \n[Description]\nThe login endpoint (/rest/user/login) is vulnerable to SQL injection.\nThe email\
    \ parameter is directly concatenated into a SQL query without\nparameterization, allowing authentication\
    \ bypass.\n\n[Evidence]\nRequest:\n  POST /rest/user/login\n  {\"email\":\"' OR 1=1--\",\"password\"\
    :\"x\"}\nResponse:\n  200 OK - Authentication token returned\n  Admin access granted without valid\
    \ credentials\n\n[Impact]\n- Complete authentication bypass\n- Access to all user accounts including\
    \ admin\n- Potential data exfiltration (UNION-based SQLi)\n- Database modification/deletion possible\n\
    \n[Remediation]\n1. Use parameterized queries / prepared statements\n2. Implement input validation\
    \ (whitelist)\n3. Deploy WAF with SQLi protection rules\n4. Implement rate limiting on login endpoint\n\
    5. Add monitoring for SQLi patterns in logs\n\n[References]\n- CWE-89: SQL Injection\n- OWASP Top\
    \ 10 2021: A03 Injection\nEOF\ncat /tmp/finding_sqli.txt"
  answer_detail: Finding 문서는 보고서의 핵심 구성 요소이다. 각 발견사항은 재현 가능한 증거(명령어, 요청/응답), 구체적인 영향 분석, 단계별 수정 방법을 포함해야
    한다. CVSS 벡터 문자열을 명시하여 객관적인 심각도를 전달하고, CWE/OWASP 참조로 표준 분류를 제공한다.
  verify:
    type: output_contains
    expect: 'Finding: F-001'
    field: stdout
    semantic:
      intent: Finding F-001 SQLi — Severity Critical CVSS 9.8 + Vector + Status + Affected + Description
        + Evidence(요청/응답) + Impact + Remediation(parameterized + 입력 검증 + WAF + rate limit + 모니터링) + References(CWE-89
        + OWASP A03). 재현 가능 증거 + 단계별 수정.
      success_criteria:
      - Finding F-001 키워드
      - CVSS + Vector + Evidence + Remediation
      - CWE/OWASP 참조
      acceptable_methods:
      - PTES Finding 형식
      - DefectDojo Finding
      - Mandiant 보고서 템플릿
      negative_signs:
      - Vector 없음
      - Evidence 없음
      - Remediation 없음
  target_vm: attacker
- order: 3
  instruction: 두 번째 발견사항으로 기본 자격증명 취약점을 작성하라.
  hint: Wazuh SIEM의 기본 자격증명 문제를 Finding 형식으로 문서화한다
  category: analysis
  points: 10
  answer: "cat > /tmp/finding_default_creds.txt << 'EOF'\n=== Finding: F-002 Default Credentials on SIEM\
    \ ===\n\n[Severity] Critical (CVSS 9.1)\n[Vector] AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N\n[Status] Open\n\
    [Affected] 10.20.30.100:55000 (Wazuh Manager API)\n\n[Description]\nThe Wazuh SIEM Manager API is\
    \ accessible with default\ncredentials (wazuh-wui:wazuh-wui). This provides full\nadministrative access\
    \ to the security monitoring platform.\n\n[Evidence]\nRequest:\n  curl -sk -u 'wazuh-wui:wazuh-wui'\
    \ https://10.20.30.100:55000/\nResponse:\n  200 OK - API accessible with full admin rights\n\n[Impact]\n\
    - Attacker can disable security alerts\n- Modify or delete security logs\n- Access sensitive security\
    \ event data\n- Blind spot in security monitoring\n- Lateral movement intelligence gathering\n\n[Remediation]\n\
    1. Immediately change default API credentials\n2. Implement strong password policy for SIEM\n3. Restrict\
    \ API access to management network only\n4. Enable API access logging and alerting\n5. Implement MFA\
    \ for SIEM admin access\n\n[References]\n- CWE-798: Use of Hard-coded Credentials\n- CWE-1188: Insecure\
    \ Default Initialization\nEOF\ncat /tmp/finding_default_creds.txt"
  answer_detail: 기본 자격증명은 가장 흔하고 치명적인 취약점 중 하나이다. 특히 SIEM 같은 보안 시스템의 기본 자격증명은 공격자에게 보안 모니터링을 무력화하고 로그를
    조작할 수 있는 능력을 부여한다. Finding 문서에는 구체적인 자격증명이 아닌 취약점의 존재만 기록하는 것이 윤리적이다.
  verify:
    type: output_contains
    expect:
    - 'Finding: F-002'
    - F-002
    field: stdout
    semantic:
      intent: 'Finding F-002 Default Creds — Wazuh API (wazuh-wui:wazuh-wui) Critical CVSS 9.1. SIEM 권한
        = 보안 알림 비활성/로그 삭제/이벤트 데이터/맹점/측면이동 정보. Remediation: 즉시 변경 + 강력 비번 + API 관리망 제한 + 로깅 + MFA. CWE-798
        Hard-coded + CWE-1188 Insecure Default. 윤리: 실 자격증명 비기록.'
      success_criteria:
      - Finding F-002 키워드
      - Wazuh + 기본 자격증명 + CVSS 9.1
      - CWE-798 또는 CWE-1188 참조
      acceptable_methods:
      - F-002 형식
      - DefectDojo CVE-매핑
      - OWASP Default Creds DB
      negative_signs:
      - CWE 없음
      - SIEM 영향 누락
      - Remediation 부족
  target_vm: attacker
- order: 4
  instruction: 발견사항 요약 테이블을 작성하라. 모든 취약점의 ID, 제목, CVSS, 위험도, 상태를 한 눈에 보여주는 테이블을 만들라.
  hint: 표 형식으로 취약점을 정리하여 한 페이지에 전체 현황을 보여준다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Findings Summary Table ===\n\nID     | Title                          | CVSS
    | Risk     | Status\n------ | ------------------------------ | ---- | -------- | ------\nF-001  |
    SQL Injection in Auth          | 9.8  | Critical | Open\nF-002  | Default SIEM Credentials       |
    9.1  | Critical | Open\nF-003  | Credential Reuse Across Hosts  | 8.1  | High     | Open\nF-004  |
    Missing HTTP Security Headers  | 5.3  | Medium   | Open\nF-005  | SSH Password Auth Enabled      |
    6.5  | Medium   | Open\nF-006  | Directory Listing Enabled      | 5.3  | Medium   | Open\nF-007  |
    Outdated Software Versions     | 7.5  | High     | Open\nF-008  | Unrestricted File Upload       |
    8.8  | High     | Open\nF-009  | CORS Misconfiguration          | 6.1  | Medium   | Open\nF-010  |
    Information Disclosure         | 5.3  | Medium   | Open\n\nTotal: 2 Critical, 3 High, 5 Medium\nOverall
    Risk: HIGH'''
  answer_detail: 요약 테이블은 보고서의 빠른 참조(Quick Reference)로 활용된다. 한 눈에 전체 취약점 현황을 파악할 수 있으며, 위험도별로 정렬하여 우선순위를
    명확하게 전달한다. 색상 코딩(Critical=빨강, High=주황, Medium=노랑)을 적용하면 시각적 효과가 높아진다.
  verify:
    type: output_contains
    expect: Findings Summary
    field: stdout
    semantic:
      intent: 'Findings Summary Table — F-001~F-010 ID/Title/CVSS/Risk/Status. 2 Critical(SQLi 9.8/Default
        9.1) + 3 High(Cred Reuse 8.1/Outdated 7.5/File Upload 8.8) + 5 Medium. Overall: HIGH. 빠른 참조 +
        색상 코딩 (Critical=red/High=orange/Medium=yellow). 위험도 정렬.'
      success_criteria:
      - Findings Summary 키워드
      - 표 형식 + 5개 이상 항목
      - Risk 분류 + Total 통계
      acceptable_methods:
      - 표 형식 요약
      - DefectDojo dashboard
      - Excel/CSV 매트릭스
      negative_signs:
      - 표 없음
      - 통계 없음
      - 분류 없음
  target_vm: attacker
- order: 5
  instruction: 공격 내러티브(Attack Narrative)를 작성하라. 시간순으로 공격 과정을 서술하는 스토리를 구성하라.
  hint: 타임라인 형식으로 각 단계의 시간, 행위, 결과를 서술한다
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo -e ''=== Attack Narrative ===\n\n[T+0:00] Reconnaissance\n- nmap scan discovered
    4 active hosts\n- Web service identified on 10.20.30.80:3000\n- Technologies: Node.js, Express, JuiceShop\n\n[T+0:15]
    Web Vulnerability Discovery\n- SQL Injection found in login endpoint\n- Default credentials tested
    on all services\n- Directory listing revealed sensitive files\n\n[T+0:30] Initial Exploitation\n-
    SQL Injection bypassed authentication\n- Admin panel access achieved\n- JWT token obtained for API
    access\n\n[T+0:45] Post-Exploitation & Lateral Movement\n- System information collected from web server\n-
    Credentials discovered in configuration files\n- SSH access to firewall using reused credentials\n\n[T+1:00]
    Privilege Escalation\n- SUID binary identified for root access\n- Wazuh accessed with default credentials\n\n[T+1:15]
    Objective Achievement\n- Full network access demonstrated\n- Data exfiltration capability confirmed\n-
    SIEM monitoring potentially compromised\n\n[T+1:30] Cleanup & Documentation\n- All artifacts removed\n-
    Evidence preserved for reporting'''
  answer_detail: 공격 내러티브는 보고서에서 가장 읽기 쉬운 섹션이다. 시간순으로 공격 과정을 서술하여 독자가 전체 흐름을 이해할 수 있게 한다. 각 단계에서 사용한 기법,
    발견한 정보, 달성한 목표를 명확히 기술하고, MITRE ATT&CK 기법 ID를 매핑한다.
  verify:
    type: output_contains
    expect: Attack Narrative
    field: stdout
    semantic:
      intent: Attack Narrative — 시간순 [T+0:00] Recon → [T+0:15] Web Vuln → [T+0:30] Initial Exploit → [T+0:45]
        Post-Exploit/Lateral → [T+1:00] PrivEsc → [T+1:15] Objective → [T+1:30] Cleanup. 각 단계 시간/행위/결과/MITRE
        ATT&CK 매핑. 스토리 형식 + 가독성↑.
      success_criteria:
      - Attack Narrative 키워드
      - 타임라인 형식 (T+) + 6단계 이상
      - 각 단계 행위 + 결과
      acceptable_methods:
      - 타임라인 + Markdown
      - Mandiant attribution narrative
      - PTES storytelling
      negative_signs:
      - 타임라인 없음
      - 단계 4개 이하
      - 결과 없음
  target_vm: attacker
- order: 6
  instruction: MITRE ATT&CK 매핑 테이블을 작성하라. 사용한 공격 기법을 ATT&CK 프레임워크에 매핑하라.
  hint: 각 공격 단계에서 사용한 기법의 ATT&CK ID와 전술을 매핑한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== MITRE ATT&CK Mapping ===\n\nTactic              | Technique                    |
    ID\n------------------- | ---------------------------- | --------\nReconnaissance      | Active Scanning              |
    T1595\nReconnaissance      | Gather Victim Host Info      | T1592\nInitial Access      | Exploit Public
    Application   | T1190\nCredential Access   | Brute Force                  | T1110\nCredential Access   |
    OS Credential Dumping        | T1003\nDiscovery           | System Information Discovery | T1082\nDiscovery           |
    Network Service Discovery    | T1046\nLateral Movement    | Remote Services: SSH         | T1021.004\nPrivilege
    Escalation| Exploitation for Priv Esc    | T1068\nPersistence         | Valid Accounts               |
    T1078\nCollection          | Data from Local System       | T1005\nExfiltration        | Exfil Over
    Web Service       | T1567\nImpact              | Account Manipulation         | T1098'''
  answer_detail: MITRE ATT&CK 매핑은 모의해킹 결과를 표준화된 프레임워크로 분류한다. 이를 통해 방어팀은 탐지 규칙을 ATT&CK 기법별로 개선하고, 탐지 커버리지의
    갭을 식별할 수 있다. ATT&CK Navigator에서 시각화하면 조직의 위협 탐지 성숙도를 한 눈에 파악할 수 있다.
  verify:
    type: output_contains
    expect:
    - MITRE ATT&CK Mapping
    - 매핑
    field: stdout
    semantic:
      intent: MITRE ATT&CK 매핑 — Recon(T1595/T1592) + Initial Access(T1190) + Cred Access(T1110/T1003)
        + Discovery(T1082/T1046) + Lateral(T1021.004) + PrivEsc(T1068) + Persistence(T1078) + Collection(T1005)
        + Exfil(T1567) + Impact(T1098). ATT&CK Navigator 시각화. 탐지 커버리지 갭 식별. DeTT&CT.
      success_criteria:
      - MITRE ATT&CK Mapping 키워드
      - 전술 6개 이상 + 기법 ID
      - 탐지 커버리지 맥락
      acceptable_methods:
      - ATT&CK Navigator
      - DeTT&CT 매핑
      - ATT&CK Sigma 룰
      negative_signs:
      - 기법 4개 이하
      - 전술 누락
      - ID 없음
  target_vm: attacker
- order: 7
  instruction: 위험 히트맵(Risk Heat Map)을 텍스트로 작성하라. 발생 가능성과 영향도의 2차원 매트릭스를 구성하라.
  hint: 가능성(Likelihood)과 영향(Impact)의 5x5 매트릭스를 작성한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Risk Heat Map ===\n\nImpact ->     | Very Low | Low    | Medium | High   | Critical\nLikelihood    |          |        |        |        |\n-------------
    | -------- | ------ | ------ | ------ | --------\nAlmost Certain|          |        | F-004  | F-003  |
    F-001\nLikely        |          |        | F-005  | F-008  | F-002\nPossible      |          | F-010  |
    F-006  | F-007  |\nUnlikely      |          |        | F-009  |        |\nRare          |          |        |        |        |\n\nLegend:
    F-001=SQLi, F-002=DefaultCreds, F-003=CredReuse\n        F-004=MissingHeaders, F-005=SSHPassAuth\n        F-006=DirListing,
    F-007=Outdated, F-008=FileUpload\n        F-009=CORS, F-010=InfoDisclosure'''
  answer_detail: 위험 히트맵은 취약점의 발생 가능성과 비즈니스 영향을 2차원으로 시각화한다. 경영진이 직관적으로 위험 수준을 이해할 수 있어 보고서에서 매우 효과적이다.
    오른쪽 위(높은 가능성 + 높은 영향)에 위치한 취약점이 최우선 수정 대상이다.
  verify:
    type: output_contains
    expect: Risk Heat Map
    field: stdout
    semantic:
      intent: Risk Heat Map — Likelihood (Almost Certain/Likely/Possible/Unlikely/Rare) × Impact (Very
        Low/Low/Medium/High/Critical) 5×5 매트릭스 + F-001~F-010 매핑. 오른쪽 위 = 최우선. 경영진 직관 시각화. NIST RMF Risk
        Management.
      success_criteria:
      - Risk Heat Map 키워드
      - 5x5 매트릭스 + 발견사항 매핑
      - Likelihood × Impact 차원
      acceptable_methods:
      - 5x5 ASCII 매트릭스
      - Excel heatmap
      - Risk Matrix calculator
      negative_signs:
      - 매트릭스 없음
      - 매핑 없음
      - 차원 1개
  target_vm: attacker
- order: 8
  instruction: 방어 권고사항의 비용 대비 효과를 분석하라. 각 수정 조치의 구현 난이도와 위험 감소 효과를 비교하라.
  hint: 노력(Effort)과 효과(Impact)의 2x2 매트릭스로 우선순위를 결정한다
  category: analysis
  points: 10
