lab_id: attack-adv-nonai-week03
title: 네트워크 우회 기법
version: non-ai
course: attack-adv-nonai
week: 3
description: 방화벽, IDS/IPS를 우회하는 다양한 네트워크 기법을 실습한다. 패킷 조작, 터널링, 프로토콜 남용 등을 통해 보안 장비의
  탐지를 회피하는 고급 기법을 다룬다.
difficulty: hard
duration_minutes: 120
objectives:
- nmap 방화벽 우회 옵션을 활용하여 필터링된 포트를 탐지한다
- SSH 터널링과 포트 포워딩을 통한 접근 통제 우회를 수행한다
- 패킷 분할, 디코이 등 IDS 회피 기법을 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap의 ACK 스캔(-sA)을 사용하여 {{SECU_IP}}의 방화벽 규칙을 매핑하라. 포트 22,80,443,8080에
    대해 필터링 상태를 확인하라.
  hint: -sA 스캔은 방화벽의 상태 추적(stateful) 여부를 판별한다
  category: recon
  points: 10
  answer: nmap -sA -p 22,80,443,8080 10.20.30.1
  answer_detail: ACK 스캔은 RST 응답 여부로 방화벽의 필터링 규칙을 매핑한다. unfiltered는 포트에 도달 가능(방화벽 허용),
    filtered는 차단됨을 의미한다. 상태 기반 방화벽은 ACK 패킷도 차단하지만, 무상태 방화벽은 통과시킨다. 이를 통해 방화벽 유형과 규칙을
    추정할 수 있다.
  verify:
    type: output_contains
    expect: filtered
    field: stdout
    semantic:
      intent: ACK 스캔 방화벽 매핑 — nmap -sA -p 22,80,443,8080 10.20.30.1. RST 응답 = unfiltered(허용)
        / 무응답 = filtered. Stateful FW는 ACK 차단 / Stateless 통과 → 방화벽 유형 추정. MITRE T1046.
      success_criteria:
      - -sA ACK 스캔
      - filtered 키워드 출력
      - 다중 포트 (4개)
      acceptable_methods:
      - nmap -sA
      - hping3 -A SYN+ACK
      - scapy TCP(flags='A')
      negative_signs:
      - -sA 없음
      - 단일 포트
      - filtered/unfiltered 분석 없음
  target_vm: attacker
- order: 2
  instruction: nmap의 패킷 분할(-f) 옵션을 사용하여 IDS를 우회하면서 {{WEB_IP}}의 포트 스캔을 수행하라. MTU를 24로
    설정하라.
  hint: --mtu 옵션으로 패킷 분할 크기를 지정한다
  category: exploit
  points: 10
  answer: nmap -f --mtu 24 -p 80,443,3000 10.20.30.80
  answer_detail: 패킷 분할(Fragmentation)은 IP 패킷을 작은 조각으로 나누어 IDS의 시그니처 매칭을 방해한다. 많은 IDS는
    분할된 패킷을 재조립하여 검사하지만, 비정상적인 MTU 크기나 중첩 분할은 재조립 로직의 취약점을 유발할 수 있다. --mtu 값은 8의 배수여야
    한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 패킷 분할 IDS 회피 — nmap -f --mtu 24 -p 80,443,3000 10.20.30.80. IP fragmentation으로
        시그니처 매칭 방해. --mtu 8의 배수. 비정상 MTU/중첩 분할로 IDS 재조립 취약점 유발. MITRE T1090.
      success_criteria:
      - -f + --mtu 옵션
      - open 포트 출력
      - MTU 8의 배수 (24)
      acceptable_methods:
      - nmap -f --mtu
      - scapy fragment()
      - hping3 -f
      negative_signs:
      - 분할 옵션 없음
      - MTU 미지정
      - 재조립 우회 맥락 없음
  target_vm: attacker
- order: 3
  instruction: nmap의 디코이(-D) 옵션을 사용하여 소스 IP를 위장하면서 {{WEB_IP}}을 스캔하라. 디코이 IP 3개를 포함하라.
  hint: -D decoy1,decoy2,ME 형태로 자신의 IP를 디코이 사이에 섞는다
  category: exploit
  points: 10
  answer: nmap -D 10.20.30.50,10.20.30.60,ME,10.20.30.70 -p 80,3000 10.20.30.80
  answer_detail: 디코이 스캔은 여러 가짜 소스 IP에서 동시에 스캔하는 것처럼 위장하여 실제 공격자의 IP를 식별하기 어렵게 만든다.
    ME는 실제 IP의 위치를 지정한다. 방어자 로그에는 디코이 IP들도 함께 기록되어 분석을 복잡하게 만든다. 단, 디코이 IP가 실제 존재하지
    않으면 SYN flood로 오탐될 수 있다.
  verify:
    type: output_contains
    expect: 10.20.30.80
    field: stdout
    semantic:
      intent: 디코이 스캔 — nmap -D 10.20.30.50,10.20.30.60,ME,10.20.30.70 -p 80,3000 10.20.30.80.
        가짜 소스 IP 다수 → 실제 공격자 식별 어려움. ME 위치 지정. 디코이 미존재 시 SYN flood 오탐. MITRE T1036
        Masquerading.
      success_criteria:
      - -D 디코이 다수 + ME
      - 10.20.30.80 타겟 출력
      - 디코이 3개 이상
      acceptable_methods:
      - nmap -D RND:N
      - hping3 -a (위장)
      - scapy 소스 IP 위조
      negative_signs:
      - 디코이 없음
      - ME 위치 미지정
      - 단일 디코이
  target_vm: attacker
- order: 4
  instruction: SSH 로컬 포트 포워딩을 설정하여 방화벽 뒤의 서비스에 접근하는 시나리오를 구성하라. 로컬 포트 8888을 {{WEB_IP}}:3000으로
    포워딩하는 명령을 작성하라(실행은 하지 않고 명령만 출력).
  hint: ssh -L 로컬포트:대상:대상포트 사용자@중간서버 형태이다
  category: exploit
  points: 10
  answer: echo 'ssh -L 8888:10.20.30.80:3000 -N -f ccc@10.20.30.1'
  answer_detail: SSH 로컬 포트 포워딩(-L)은 암호화된 SSH 터널을 통해 방화벽 뒤의 서비스에 접근하는 기법이다. 방화벽이 SSH(22번
    포트)만 허용하는 경우, 터널을 통해 내부의 임의 서비스에 접근할 수 있다. -N은 원격 명령 실행 없이 포워딩만, -f는 백그라운드 실행이다.
  verify:
    type: output_contains
    expect: ssh -L
    field: stdout
    semantic:
      intent: SSH 로컬 포워딩 — ssh -L 8888:10.20.30.80:3000 -N -f ccc@10.20.30.1. 방화벽
        SSH(22)만 허용 시 터널로 내부 임의 서비스 접근. -N 명령 실행 없이/ -f 백그라운드. MITRE T1572 Protocol
        Tunneling.
      success_criteria:
      - ssh -L + 8888:대상:3000
      - -N -f 백그라운드
      - 포트 포워딩 명령 출력
      acceptable_methods:
      - ssh -L
      - ssh ProxyCommand
      - stunnel 4 SSL 터널
      negative_signs:
      - -L 없음
      - 백그라운드 옵션 없음
      - 내부:외부 매핑 명확하지 않음
  target_vm: attacker
- order: 5
  instruction: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하는 명령을 작성하라. 로컬 포트 1080에서 SOCKS5 프록시를 생성하라.
  hint: ssh -D 포트번호 사용자@서버 형태이다
  category: exploit
  points: 10
  answer: echo 'ssh -D 1080 -N -f ccc@10.20.30.1 && curl --socks5 127.0.0.1:1080 http://10.20.30.80:3000'
  answer_detail: SSH 동적 포워딩(-D)은 SOCKS 프록시를 생성하여 모든 트래픽을 SSH 터널로 라우팅한다. 특정 포트가 아닌
    모든 대상에 접근할 수 있어 피봇팅(Pivoting)에 매우 유용하다. proxychains와 결합하면 nmap, curl 등 대부분의 도구를
    SOCKS 프록시를 통해 실행할 수 있다.
  verify:
    type: output_contains
    expect:
    - ssh -D
    - SOCKS5
    field: stdout
    semantic:
      intent: SSH 동적 SOCKS — ssh -D 1080 -N -f ccc@10.20.30.1 + curl --socks5 127.0.0.1:1080.
        SOCKS5로 모든 트래픽 SSH 터널 라우팅. proxychains + nmap/curl 가능. 피봇팅 핵심. MITRE T1090.001
        Internal Proxy.
      success_criteria:
      - ssh -D 1080 또는 SOCKS5
      - 동적 포워딩 + curl 사용
      - SOCKS 프록시 활용
      acceptable_methods:
      - ssh -D + SOCKS5
      - proxychains4
      - redsocks 투명 프록시
      negative_signs:
      - -D 없음
      - SOCKS 클라이언트 없음
      - 피봇 맥락 없음
  target_vm: attacker
- order: 6
  instruction: nmap의 소스 포트 조작(--source-port) 옵션을 사용하여 DNS 소스 포트(53)에서 스캔을 수행하라. 일부
    방화벽이 DNS 응답을 허용하는 규칙을 악용하라.
  hint: --source-port 53 옵션으로 소스 포트를 53으로 설정한다
  category: exploit
  points: 10
  answer: nmap --source-port 53 -p 22,80,443 10.20.30.80
  answer_detail: 일부 방화벽은 DNS 응답 패킷(소스 포트 53)을 무조건 허용하는 잘못된 규칙을 가지고 있다. --source-port
    53으로 스캔하면 이러한 규칙을 우회할 수 있다. FTP(20), HTTP(80) 등 다른 잘 알려진 포트로도 시도할 수 있다. 현대 상태
    기반 방화벽에서는 효과가 제한적이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 소스 포트 53 위장 — nmap --source-port 53 -p 22,80,443 10.20.30.80. DNS 응답
        무조건 허용 잘못 구성된 stateless FW 우회. FTP(20)/HTTP(80) 변형 가능. 현대 stateful FW에는 효과
        제한. MITRE T1036.
      success_criteria:
      - --source-port 53
      - open 출력
      - DNS 위장 맥락
      acceptable_methods:
      - nmap --source-port
      - hping3 -s 53
      - scapy sport=53
      negative_signs:
      - --source-port 없음
      - DNS 위장 맥락 없음
      - 단일 포트만
  target_vm: attacker
- order: 7
  instruction: ICMP 터널링의 원리를 이해하기 위해 ping 명령에 데이터를 포함하여 전송하라. 16바이트 패턴 데이터와 함께 {{WEB_IP}}으로
    ICMP 패킷을 보내라.
  hint: ping -p 옵션으로 16진수 패딩 패턴을 지정할 수 있다
  category: exploit
  points: 10
  answer: ping -c 3 -p 4141414141414141 -s 64 10.20.30.80
  answer_detail: ICMP 터널링은 ICMP 패킷의 데이터 필드에 실제 전송하려는 데이터를 숨기는 기법이다. 대부분의 방화벽이 ICMP를
    허용하므로, 이를 통해 데이터 유출이나 C2 통신이 가능하다. icmpsh, ptunnel 등의 도구가 존재한다. 방어를 위해서는 ICMP
    페이로드 크기와 빈도를 모니터링해야 한다.
  verify:
    type: output_contains
    expect: bytes from
    field: stdout
    semantic:
      intent: 'ICMP 페이로드 — ping -c 3 -p 4141414141414141 -s 64 10.20.30.80. ICMP 데이터
        필드 데이터 은닉. FW가 ICMP 허용 시 데이터 유출/C2. 도구: icmpsh/ptunnel. 방어: ICMP 페이로드 크기/빈도
        모니터링. MITRE T1095.'
      success_criteria:
      - ping -p (패딩 패턴)
      - bytes from 키워드
      - -s 64 크기 명시
      acceptable_methods:
      - ping -p
      - hping3 ICMP 페이로드
      - scapy IP/ICMP/Raw
      negative_signs:
      - -p 패턴 없음
      - ICMP 데이터 맥락 없음
      - 단순 ping
  target_vm: attacker
- order: 8
  instruction: HTTP 터널링을 시뮬레이션하라. curl을 사용하여 POST 요청의 본문에 Base64 인코딩된 명령을 숨겨서 전송하라.
  hint: curl -X POST -d 옵션으로 데이터를 HTTP 본문에 포함한다
  category: exploit
  points: 10
  answer: 'CMD=$(echo ''whoami && hostname'' | base64) && curl -s -X POST -d "data=$CMD"
    http://10.20.30.80:3000/ -o /dev/null -w ''%{http_code}'' && echo '''' && echo
    "Encoded payload: $CMD"'
  answer_detail: HTTP 터널링은 정상적인 HTTP 트래픽 안에 비정상 데이터를 숨기는 기법이다. HTTPS를 사용하면 내용이 암호화되어
    DPI(Deep Packet Inspection)로도 탐지하기 어렵다. 실제 APT 그룹은 정상 웹 요청과 구별하기 어려운 패턴으로 C2 통신을
    구현한다.
  verify:
    type: output_contains
    expect: Encoded payload
    field: stdout
    semantic:
      intent: HTTP 터널 — CMD=$(echo whoami|base64) + curl -X POST -d 'data=$CMD' /.
        HTTPS면 DPI도 어려움. 정상 웹 요청과 구별 어려운 패턴이 APT C2. MITRE T1071.001 Web Protocols.
      success_criteria:
      - base64 인코딩 + POST
      - Encoded payload 키워드
      - POST -d 데이터 전송
      acceptable_methods:
      - curl POST + base64
      - Cobalt Strike Malleable C2
      - Empire HTTP listener
      negative_signs:
      - 인코딩 없음
      - GET 요청
      - C2 맥락 없음
  target_vm: attacker
- order: 9
  instruction: nmap의 타이밍 옵션을 비교 분석하라. {{WEB_IP}}에 대해 T0(paranoid)부터 T4(aggressive)까지
    다른 속도로 포트 80을 스캔하고, 소요 시간을 비교하라.
  hint: time 명령으로 각 스캔의 소요 시간을 측정한다
  category: analysis
  points: 10
  answer: for t in 0 2 4; do echo "=== Timing T$t ==="; time nmap -T$t -p 80 10.20.30.80
    2>&1 | grep -E '(open|closed|filtered)'; echo '---'; done 2>&1
  answer_detail: nmap 타이밍 옵션은 스캔 속도와 탐지 회피 사이의 트레이드오프를 조절한다. T0(paranoid, 5분 간격)은
    가장 느리지만 IDS 탐지 확률이 낮고, T4(aggressive)는 빠르지만 IDS에 즉시 탐지된다. 실제 모의해킹에서는 환경에 따라 T1~T2를
    주로 사용한다.
  verify:
    type: output_contains
    expect: Timing
    field: stdout
    semantic:
      intent: '타이밍 비교 — for t in 0 2 4; do time nmap -T$t -p 80 target; done. T0 paranoid(5분
        간격, 가장 느림/탐지 낮음) ↔ T4 aggressive(빠름/즉시 탐지). 모의해킹 실전: T1~T2 주로. nmap timing
        template.'
      success_criteria:
      - Timing 비교 루프
      - T0/T2/T4 3개 이상
      - time 측정
      acceptable_methods:
      - nmap -T0~5
      - --scan-delay 명시
      - --max-rate 패킷/초
      negative_signs:
      - 타이밍 1개만
      - 비교 없음
      - trade-off 맥락 없음
  target_vm: attacker
- order: 10
  instruction: IPv6를 활용한 방화벽 우회를 시도하라. nmap으로 {{WEB_IP}}에서 IPv6 주소를 탐지하고, IPv6 기반
    스캔을 수행하라.
  hint: nmap -6 옵션으로 IPv6 스캔을 수행한다. --script targets-ipv6-multicast-echo로 IPv6 호스트를
    탐지할 수 있다
  category: exploit
  points: 10
  answer: nmap --script targets-ipv6-multicast-echo --script-args newtargets -e eth0
    2>&1 | head -20
  answer_detail: 많은 방화벽 규칙이 IPv4에만 적용되어 IPv6 트래픽은 필터링되지 않는 경우가 있다. IPv6 멀티캐스트 핑(ff02::1)으로
    네트워크의 IPv6 활성 호스트를 탐지하고, IPv6 주소로 서비스에 접근하면 IPv4 기반 ACL을 우회할 수 있다. 이중 스택(Dual
    Stack) 환경에서 흔한 보안 맹점이다.
  verify:
    type: output_contains
    expect: nmap
    field: stdout
    semantic:
      intent: IPv6 방화벽 우회 — nmap --script targets-ipv6-multicast-echo --script-args
        newtargets -e eth0. ff02::1 멀티캐스트 ping → IPv6 활성 호스트 탐지. 듀얼 스택에서 IPv4 ACL만
        적용 → IPv6 우회. NIST SP 800-119.
      success_criteria:
      - targets-ipv6-multicast-echo 스크립트
      - nmap 실행 + 인터페이스
      - IPv6 우회 맥락
      acceptable_methods:
      - nmap IPv6 스크립트
      - ping6 ff02::1
      - thc-ipv6 도구
      negative_signs:
