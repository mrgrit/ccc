lab_id: attack-adv-nonai-week02
title: OSINT 고급 정보수집
version: non-ai
course: attack-adv-nonai
week: 2
description: 고급 OSINT(Open Source Intelligence) 기법을 활용하여 대상 조직과 인프라의 심층 정보를 수집한다. DNS 열거, 인증서 투명성 로그,
  메타데이터 분석 등 다양한 수동 정찰 기법을 실습한다.
difficulty: hard
duration_minutes: 120
objectives:
- DNS 열거, 서브도메인 브루트포스 등 고급 정찰 기법을 적용한다
- 인증서 투명성 로그와 WHOIS 이력을 활용한 인프라 매핑을 수행한다
- 문서 메타데이터에서 민감 정보를 추출한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: dig를 사용하여 {{SECU_IP}} DNS 서버에 대해 AXFR(존 전송) 요청을 시도하라. 도메인은 lab.local로 설정하라.
  hint: dig axfr @서버 도메인 형태로 존 전송을 요청한다
  category: recon
  points: 10
  answer: dig axfr @10.20.30.1 lab.local
  answer_detail: DNS 존 전송(AXFR)은 DNS 서버의 전체 레코드를 한 번에 가져오는 기법이다. 잘못 구성된 DNS 서버는 인증 없이 존 전송을 허용하여 내부 호스트명,
    IP 매핑이 모두 노출된다. MITRE ATT&CK T1596.001에 해당하며, 대부분의 현대 DNS 서버는 이를 차단한다.
  verify:
    type: output_contains
    expect: XFR
    field: stdout
    semantic:
      intent: DNS AXFR 존 전송 — dig axfr @10.20.30.1 lab.local. MITRE T1596.001 DNS/Passive DNS. 잘못된 DNS
        서버는 인증 없이 전송 허용 → 내부 호스트/IP 매핑 노출. 현대 DNS는 차단. RFC 5936 AXFR.
      success_criteria:
      - dig axfr @서버 도메인
      - XFR 키워드 출력
      - lab.local 또는 응답
      acceptable_methods:
      - dig axfr
      - host -l domain
      - dnsrecon -t axfr
      negative_signs:
      - axfr 옵션 없음
      - 단순 dig만
      - 도메인 미지정
  target_vm: attacker
- order: 2
  instruction: dig를 사용하여 10.20.30.0/24 대역의 PTR 레코드를 역방향 조회하라. for 루프를 사용하여 1~254까지 순회하라.
  hint: for i in $(seq 1 254); do dig -x 10.20.30.$i +short; done 형태로 순회한다
  category: recon
  points: 10
  answer: for i in $(seq 1 254); do result=$(dig -x 10.20.30.$i +short 2>/dev/null); [ -n "$result" ]
    && echo "10.20.30.$i -> $result"; done
  answer_detail: '역방향 DNS 스위핑은 IP 대역 전체에 대해 PTR 레코드를 조회하여 호스트명을 수집하는 기법이다. 내부 명명 규칙(예: db-prod-01, web-staging)이
    노출되어 서버 역할과 환경을 추정할 수 있다. 이는 네트워크 맵 작성의 핵심 정보원이다.'
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: 역방향 DNS 스위핑 — for i in $(seq 1 254); do dig -x 10.20.30.$i +short; done. MITRE T1018 Remote
        System Discovery. 내부 명명 규칙(db-prod-01/web-staging) 노출 → 서버 역할/환경 추정. 네트워크 맵 핵심.
      success_criteria:
      - seq 1 254 + dig -x 루프
      - 10.20.30 출력
      - 조건부 결과 (-n 검사)
      acceptable_methods:
      - dig -x 루프
      - nmap -sL (DNS lookup만)
      - dnsrecon -r
      negative_signs:
      - 루프 없음
      - 역방향 (-x) 없음
      - 단일 IP만
  target_vm: attacker
- order: 3
  instruction: nmap을 사용하여 {{WEB_IP}}의 SSL/TLS 인증서 정보를 수집하라. 포트 443을 대상으로 ssl-cert 스크립트를 실행하라.
  hint: nmap --script ssl-cert -p 443 대상 형태로 인증서를 수집한다
  category: recon
  points: 10
  answer: nmap --script ssl-cert -p 443 10.20.30.80
  answer_detail: SSL/TLS 인증서에는 조직명, 도메인, 발급자, 유효기간 등 풍부한 정보가 포함된다. 인증서의 SAN(Subject Alternative Name)
    필드에서 추가 서브도메인을 발견할 수 있다. Certificate Transparency 로그를 검색하면 과거 발급된 모든 인증서를 확인할 수 있다.
  verify:
    type: output_contains
    expect: ssl-cert
    field: stdout
    semantic:
      intent: SSL/TLS 인증서 수집 — nmap --script ssl-cert -p 443 10.20.30.80. 조직명/도메인/발급자/유효기간 + SAN 필드에서
        추가 서브도메인 발견. Certificate Transparency 로그 (crt.sh) 과거 인증서. MITRE T1596.005 Scan Databases.
      success_criteria:
      - --script ssl-cert
      - ssl-cert 키워드 출력
      - 포트 443 지정
      acceptable_methods:
      - nmap ssl-cert
      - openssl s_client -connect
      - crt.sh API 검색
      negative_signs:
      - 인증서 스크립트 없음
      - 포트 443 미지정
      - SAN 활용 없음
  target_vm: attacker
- order: 4
  instruction: curl을 사용하여 {{WEB_IP}}:3000 웹서버의 다양한 HTTP 헤더를 분석하라. 보안 헤더(X-Frame-Options, CSP, HSTS 등)의
    존재 여부를 확인하라.
  hint: curl -I 또는 curl -v로 응답 헤더를 확인한다
  category: recon
  points: 10
  answer: curl -sI http://10.20.30.80:3000 | grep -iE '(x-frame|content-security|strict-transport|x-content-type|x-xss|server|x-powered)'
  answer_detail: HTTP 보안 헤더의 부재는 공격 표면을 나타낸다. X-Frame-Options 미설정은 클릭재킹, CSP 미설정은 XSS, HSTS 미설정은 다운그레이드
    공격의 가능성을 의미한다. Server 헤더와 X-Powered-By 헤더는 기술 스택을 직접 노출하여 CVE 기반 공격을 용이하게 한다.
  verify:
    type: output_contains
    expect: Server
    field: stdout
    semantic:
      intent: HTTP 보안 헤더 분석 — curl -sI + grep -iE '(x-frame|content-security|strict-transport|x-content-type|x-xss|server|x-powered)'.
        OWASP Secure Headers Project. X-Frame=클릭재킹 / CSP=XSS / HSTS=다운그레이드 / Server+X-Powered-By=기술 스택
        노출.
      success_criteria:
      - curl -sI 헤더 요청
      - 보안 헤더 grep (5개 이상)
      - Server 헤더 출력
      acceptable_methods:
      - curl -sI + grep
      - securityheaders.com 점수
      - Mozilla Observatory
      negative_signs:
      - 헤더 분석 없음
      - 단순 GET
      - 보안 헤더 미점검
  target_vm: attacker
- order: 5
  instruction: 웹서버에서 다운로드한 파일의 메타데이터를 분석하라. curl로 {{WEB_IP}}:3000/ftp 경로의 파일을 다운로드하고, exiftool 또는 strings로
    메타데이터를 추출하라.
  hint: curl로 파일을 다운로드하고 file, strings 명령으로 분석한다
  category: recon
  points: 10
  answer: curl -s http://10.20.30.80:3000/ftp -o /tmp/ftp_index.html && strings /tmp/ftp_index.html |
    head -30
  answer_detail: 문서 메타데이터에는 작성자명, 소프트웨어 버전, 내부 경로 등이 포함될 수 있다. PDF, Office 문서에서 exiftool로 추출한 메타데이터는 직원
    이름(스피어 피싱 대상), 내부 디렉토리 구조, 사용 소프트웨어 버전 등 귀중한 OSINT 정보를 제공한다.
  verify:
    type: output_contains
    expect: ftp
    field: stdout
    semantic:
      intent: 메타데이터 추출 — curl -o /tmp/ftp_index.html + strings. PDF/Office는 exiftool로 작성자/SW 버전/내부 경로
        추출 → 직원 이름(스피어 피싱)/디렉터리/SW 버전 OSINT. MITRE T1592.004 Client Configurations.
      success_criteria:
      - curl 다운로드 + strings
      - ftp 키워드 출력
      - 메타데이터 분석 맥락
      acceptable_methods:
      - strings + exiftool
      - FOCA 메타데이터 도구
      - Metagoofil OSINT
      negative_signs:
      - 다운로드 없음
      - 분석 없음
      - 메타데이터 활용 맥락 없음
  target_vm: attacker
- order: 6
  instruction: 웹서버의 숨겨진 디렉토리를 탐색하라. curl을 사용하여 일반적인 관리자 경로(/admin, /api, /swagger, /debug, /console)에
    접근을 시도하라.
  hint: for 루프로 여러 경로를 순회하며 HTTP 상태 코드를 확인한다
  category: recon
  points: 10
  answer: for path in admin api swagger debug console backup .git .env api-docs; do code=$(curl -s -o
    /dev/null -w '%{http_code}' http://10.20.30.80:3000/$path); echo "/$path -> $code"; done
  answer_detail: 디렉토리 브루트포스는 웹 정찰의 핵심 기법이다. /api-docs, /swagger는 API 명세 노출, /.git은 소스코드 유출, /.env는 환경변수(DB
    비밀번호 등) 노출로 이어진다. 200(존재), 301/302(리다이렉트), 403(접근차단=존재확인) 응답을 구분하여 분석한다.
  verify:
    type: output_contains
    expect: ->
    field: stdout
    semantic:
      intent: 디렉터리 브루트포스 — for path in admin api swagger debug console backup .git .env api-docs; do curl
        -w '%{http_code}'; done. /api-docs=API 명세 / .git=소스 유출 / .env=DB 비밀번호 노출. 200/301/302/403 구분 분석.
      success_criteria:
      - for 루프 + 다중 경로
      - HTTP 상태 코드 출력
      - 민감 경로 (.git/.env/swagger) 포함
      acceptable_methods:
      - curl 루프 + status code
      - ffuf -w 워드리스트
      - dirb/dirsearch/gobuster
      negative_signs:
      - 경로 3개 이하
      - 상태 코드 없음
      - 민감 경로 누락
  target_vm: attacker
- order: 7
  instruction: JavaScript 소스코드에서 API 엔드포인트를 추출하라. curl로 {{WEB_IP}}:3000의 메인 페이지를 가져와서 grep으로 API 경로와 URL
    패턴을 검색하라.
  hint: grep -oE 옵션으로 정규식에 매칭되는 부분만 추출한다
  category: recon
  points: 10
  answer: curl -s http://10.20.30.80:3000 | grep -oE '(api|rest|/api/)[a-zA-Z0-9/_-]+' | sort -u
  answer_detail: JavaScript 소스코드에는 클라이언트 측에서 호출하는 API 엔드포인트가 하드코딩되어 있는 경우가 많다. fetch(), XMLHttpRequest,
    axios 호출에서 URL을 추출하면 인증이 필요한 관리자 API나 문서화되지 않은 엔드포인트를 발견할 수 있다.
  verify:
    type: output_contains
    expect: api
    field: stdout
    semantic:
      intent: JS API 엔드포인트 추출 — curl + grep -oE '(api|rest|/api/)[a-zA-Z0-9/_-]+' | sort -u. 클라이언트 JS에
        하드코딩된 fetch/axios URL 추출 → 인증 필요 관리자 API/문서화 안 된 엔드포인트 발견. MITRE T1593.
      success_criteria:
      - grep -oE 정규식 추출
      - api 키워드 출력
      - sort -u 중복 제거
      acceptable_methods:
      - grep regex 추출
      - JSluice / LinkFinder
      - Burp Spider JS 분석
      negative_signs:
      - 정규식 없음
      - 단순 grep 키워드
      - 중복 제거 없음
  target_vm: attacker
- order: 8
  instruction: nmap의 http-enum 스크립트를 사용하여 {{WEB_IP}}의 웹서버에서 알려진 경로와 파일을 자동으로 열거하라.
  hint: --script http-enum 옵션을 사용한다
  category: recon
  points: 10
  answer: nmap --script http-enum -p 3000 10.20.30.80
  answer_detail: http-enum NSE 스크립트는 수천 개의 알려진 웹 경로(관리 콘솔, 기본 파일, 백업 등)를 자동으로 검사한다. 수동 브루트포스보다 효율적이며,
    CMS별 특화 경로도 포함한다. nikto, dirsearch 등 전용 도구와 병행하면 더 높은 커버리지를 달성할 수 있다.
  verify:
    type: output_contains
    expect: http-enum
    field: stdout
    semantic:
      intent: http-enum NSE — nmap --script http-enum -p 3000 10.20.30.80. 수천 개 알려진 웹 경로(관리/기본 파일/백업)
        자동 검사. CMS별 특화 경로 포함. 수동 브루트포스보다 효율적. nikto/dirsearch와 병행 시 커버리지↑.
      success_criteria:
      - --script http-enum
      - http-enum 키워드 출력
      - 포트 지정
      acceptable_methods:
      - nmap http-enum
      - nikto -h
      - dirsearch -u
      negative_signs:
      - 스크립트 없음
      - 단순 포트 스캔만
      - 자동 열거 맥락 없음
  target_vm: attacker
- order: 9
  instruction: SNMP를 통한 정보수집을 시뮬레이션하라. snmpwalk 또는 nmap의 snmp-brute 스크립트로 {{SECU_IP}}에서 SNMP 커뮤니티 문자열을
    탐지하라.
  hint: nmap --script snmp-brute -p 161 대상 형태로 실행한다
  category: recon
  points: 10
  answer: nmap -sU --script snmp-brute -p 161 10.20.30.1
  answer_detail: SNMP(Simple Network Management Protocol)는 네트워크 장비 관리에 사용되며, 기본 커뮤니티 문자열(public/private)이
    변경되지 않은 경우가 많다. SNMPv1/v2c는 평문 전송이므로 인터페이스 목록, 라우팅 테이블, 프로세스 목록 등 상세 정보가 유출된다.
  verify:
    type: output_contains
    expect: '161'
    field: stdout
    semantic:
      intent: SNMP 정보수집 — nmap -sU --script snmp-brute -p 161 10.20.30.1. 기본 커뮤니티 (public/private) 미변경
        흔함. SNMPv1/v2c 평문 → 인터페이스/라우팅/프로세스 노출. MITRE T1046.
      success_criteria:
      - -sU UDP + snmp-brute
      - 포트 161 명시
      - SNMP 맥락
      acceptable_methods:
      - nmap snmp-brute
      - snmpwalk -c public -v1
      - onesixtyone 빠른 스캔
      negative_signs:
      - UDP 없음
      - snmp 스크립트 없음
      - 기본 커뮤니티 맥락 없음
  target_vm: attacker
- order: 10
  instruction: SMB 프로토콜을 통한 정보수집을 수행하라. nmap의 smb-os-discovery와 smb-enum-shares 스크립트로 {{WEB_IP}}을 스캔하라.
  hint: --script smb-os-discovery,smb-enum-shares -p 445 형태로 복수 스크립트를 실행한다
  category: recon
  points: 10
  answer: nmap --script smb-os-discovery,smb-enum-shares -p 445 10.20.30.80
  answer_detail: SMB 프로토콜은 Windows 네트워크에서 파일 공유에 사용되며, 인증 없이도 OS 버전, 도메인명, 호스트명을 노출할 수 있다. 익명 공유(null
    session)가 허용되면 사용자 목록, 공유 폴더 등이 추가로 유출된다. EternalBlue(MS17-010) 등 치명적 취약점의 공격 표면이기도 하다.
  verify:
    type: output_contains
    expect: '445'
    field: stdout
    semantic:
      intent: SMB 정보수집 — nmap --script smb-os-discovery,smb-enum-shares -p 445. 인증 없이 OS/도메인/호스트명 노출.
        Null session 시 사용자 목록/공유. EternalBlue MS17-010 공격 표면. MITRE T1135 Network Share Discovery.
      success_criteria:
      - smb-os-discovery + smb-enum-shares 2개
      - 포트 445 지정
      - 복수 스크립트 콤마
      acceptable_methods:
      - nmap smb-* 스크립트
      - smbclient -L //target -N
      - enum4linux-ng
      negative_signs:
      - 스크립트 1개만
      - 포트 미지정
      - SMB 맥락 없음
  target_vm: attacker
- order: 11
  instruction: 대상 네트워크의 서비스 배너를 체계적으로 수집하라. nmap으로 10.20.30.0/24의 주요 포트(22,80,443,3000,8080,8443)를 배너
    그래빙하라.
  hint: -sV --version-intensity 5 옵션으로 상세 배너를 수집한다
  category: recon
  points: 10
  answer: nmap -sV --version-intensity 5 -p 22,80,443,3000,8080,8443 10.20.30.0/24
