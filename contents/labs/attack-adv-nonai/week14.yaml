  answer_detail: Executive Summary는 경영진이 읽는 1페이지 요약이다. 전체 위험 등급, 핵심 발견사항(비기술적 언어), 비즈니스 영향, 상위 3개 권고사항, 긍정적 발견을 포함한다. 기술적 세부사항은 별도의 Technical Report에 포함한다. 좋은 보고서는 위험을 비즈니스 언어로 번역한다.
  verify:
    type: output_contains
    expect: Executive Summary
    field: stdout
  target_vm: attacker
