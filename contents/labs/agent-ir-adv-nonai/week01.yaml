  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: analysis
  points: 11
  answer: python3 -c "exec(open('$HOME/w01-depconf/pkg/setup.py').read())" 2>&1 | head -3 && ls /tmp/phone-home.json
    2>/dev/null || echo 'sim_complete'
  answer_detail: '[공격] post-install 실행 시뮬. /tmp/phone-home.json에 민감 환경변수가 기록됨.'
  verify:
    type: output_contains
    expect: sim
    field: stdout
    semantic:
      intent: '[공격] CI 재현 — python3 -c exec(open setup.py).read() + ls phone-home.json + sim_complete.
        post-install 실행 시뮬. 민감 환경변수 수집 증명.'
      success_criteria:
      - sim 마커
      - exec setup.py
      - phone-home.json
      acceptable_methods:
      - python exec
      - pip install -e
      - setup.py install
      negative_signs:
      - exec 없음
      - phone-home 확인 없음
      - 결과 미기록
  target_vm: web
  script: python3 -c "exec(open('$HOME/w01-depconf/pkg/setup.py').read())" 2>&1 | head -3 && ls /tmp/phone-home.json
    2>/dev/null || echo 'sim_complete'
  risk_level: low
  bastion_prompt: ''
