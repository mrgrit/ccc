lab_id: agent-ir-adv-nonai-week01
title: Dependency Confusion IR — 공격부터 재발방지까지 (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 1
description: PyPI/npm 내부 패키지명을 공개 레지스트리에 악성 버전으로 올려 CI runner를 탈취하는 공격. 공격→탐지→분석→초동대응→보고→재발방지
  6단계 전체를 실행한다. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- Dependency Confusion 공격 원리를 setup.py 수준에서 이해
- CI 네트워크에서 외부 레지스트리 접근을 탐지한다
- 6단계 IR 절차를 동일 사건에 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 공격자 setup.py를 작성하시오 — post-install에서 환경변수를 phone-home으로 전송하는 구조를 모사한다.
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: 'mkdir -p ~/w01-depconf/pkg && cat > ~/w01-depconf/pkg/setup.py <<''PY''

    from setuptools import setup

    import os, json

    # post-install sim — 실제론 외부 전송이지만 본 실습은 파일로 기록

    log = {k:v for k,v in os.environ.items() if any(s in k.lower() for s in [''key'',''token'',''pass''])}

    open(''/tmp/phone-home.json'',''w'').write(json.dumps(log))

    setup(name=''internal-company-utils'', version=''9999.99.99'', packages=[])

    PY

    ls ~/w01-depconf/pkg/setup.py'
  answer_detail: '[공격] 공격 패키지 구조. version 9999는 ''더 높은 버전 우선'' 규칙 악용.'
  verify:
    type: output_contains
    expect: setup.py
    field: stdout
  target_vm: web
  script: 'mkdir -p ~/w01-depconf/pkg && cat > ~/w01-depconf/pkg/setup.py <<''PY''

    from setuptools import setup

    import os, json

    # post-install sim — 실제론 외부 전송이지만 본 실습은 파일로 기록

    log = {k:v for k,v in os.environ.items() if any(s in k.lower() for s in [''key'',''token'',''pass''])}

    open(''/tmp/phone-home.json'',''w'').write(json.dumps(log))

    setup(name=''internal-company-utils'', version=''9999.99.99'', packages=[])

    PY

    ls ~/w01-depconf/pkg/setup.py'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 패키지 빌드 시뮬 — python3 -m build (없으면 tar로 대체).
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 10
  answer: cd ~/w01-depconf/pkg && (python3 -m build 2>&1 | tail -5 || tar czf ../malicious-pkg.tar.gz
    setup.py) && ls ~/w01-depconf/
  answer_detail: '[공격] 공격 아티팩트 생성. 실제 공격에선 pypi.org에 업로드.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  script: cd ~/w01-depconf/pkg && (python3 -m build 2>&1 | tail -5 || tar czf ../malicious-pkg.tar.gz
    setup.py) && ls ~/w01-depconf/
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: CI runner 시뮬 — pip install로 공격 재현(강사 통제 레지스트리).
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: analysis
  points: 11
  answer: python3 -c "exec(open('$HOME/w01-depconf/pkg/setup.py').read())" 2>&1 |
    head -3 && ls /tmp/phone-home.json 2>/dev/null || echo 'sim_complete'
  answer_detail: '[공격] post-install 실행 시뮬. /tmp/phone-home.json에 민감 환경변수가 기록됨.'
  verify:
    type: output_contains
    expect: sim
    field: stdout
  target_vm: web
  script: python3 -c "exec(open('$HOME/w01-depconf/pkg/setup.py').read())" 2>&1 |
    head -3 && ls /tmp/phone-home.json 2>/dev/null || echo 'sim_complete'
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: SIGMA 룰 초안 — CI egress to public registry.
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 12
  answer: "mkdir -p ~/w01-depconf/detect && cat > ~/w01-depconf/detect/rule.yml <<'Y'\n\
    title: DepConf external egress\nlogsource: {product: suricata, category: flow}\n\
    detection:\n  selection: {dest_domain: [pypi.org, registry.npmjs.org], src_network:\
    \ internal_ci}\n  condition: selection\nlevel: medium\nY\ncat ~/w01-depconf/detect/rule.yml"
  answer_detail: '[탐지] 탐지 룰. internal CI → 공개 레지스트리 egress가 의심 신호.'
  verify:
    type: output_contains
    expect: dest_domain
    field: stdout
  target_vm: bastion
  script: "mkdir -p ~/w01-depconf/detect && cat > ~/w01-depconf/detect/rule.yml <<'Y'\n\
    title: DepConf external egress\nlogsource: {product: suricata, category: flow}\n\
    detection:\n  selection: {dest_domain: [pypi.org, registry.npmjs.org], src_network:\
