  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: Wazuh rule 수동 변환 초안.
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 13
  answer: "cat > ~/w01-depconf/detect/wazuh-100801.xml <<'X'\n<rule id=\"100801\"\
    \ level=\"10\">\n  <if_sid>60000</if_sid>\n  <match>pypi.org</match>\n  <field\
    \ name=\"src_ip\">10\\.20\\.30\\.80</field>\n  <description>DepConf suspect —\
    \ CI accessed public PyPI</description>\n</rule>\nX\ncat ~/w01-depconf/detect/wazuh-100801.xml"
  answer_detail: '[탐지] SIGMA → Wazuh 수동 변환. SID 100801.'
  verify:
    type: output_contains
    expect:
    - '100801'
    - 템플릿
    field: stdout
  target_vm: bastion
  script: "cat > ~/w01-depconf/detect/wazuh-100801.xml <<'X'\n<rule id=\"100801\"\
    \ level=\"10\">\n  <if_sid>60000</if_sid>\n  <match>pypi.org</match>\n  <field\
