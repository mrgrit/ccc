lab_id: agent-ir-adv-nonai-week03
title: AD Kerberoasting 자동화 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 3
description: SharpHound·Rubeus·Hashcat 파이프라인이 자동화된 AD 공격. 4769 RC4 burst 탐지·krbtgt 회전·gMSA 도입까지. 학생이 수동
  수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
