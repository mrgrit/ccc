lab_id: agent-ir-adv-nonai-week03
title: AD Kerberoasting 자동화 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 3
description: SharpHound·Rubeus·Hashcat 파이프라인이 자동화된 AD 공격. 4769 RC4 burst 탐지·krbtgt
  회전·gMSA 도입까지. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SPN 목록 조회 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=siem.
  category: analysis
  points: 9
  answer: 'getent passwd | awk -F: ''{print $1}'' | head'
  answer_detail: '[공격] SPN 식별 첫 단계.'
  verify:
    type: output_contains
    expect:
    - SPN
    field: stdout
  target_vm: siem
  script: 'getent passwd | awk -F: ''{print $1}'' | head'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: RC4 TGS 요청 시뮬(로그 생성용)
  hint: 6단계 IR 중 공격 단계. target_vm=siem.
  category: analysis
  points: 10
  answer: echo 'simulated TGS request for svc_sql' > /tmp/w03-tgs.txt && cat /tmp/w03-tgs.txt
  answer_detail: '[공격] 실제는 impacket-GetUserSPNs.'
  verify:
    type: output_contains
    expect: TGS
    field: stdout
  target_vm: siem
  script: echo 'simulated TGS request for svc_sql' > /tmp/w03-tgs.txt && cat /tmp/w03-tgs.txt
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: 4769 RC4 SIGMA
  hint: 6단계 IR 중 탐지 단계. target_vm=siem.
  category: analysis
  points: 11
  answer: "cat > ~/w03/rule.yml <<'Y'\ntitle: Kerberoasting RC4 burst\ndetection:\n\
    \  selection: {EventID: 4769, TicketEncryptionType: '0x17'}\n  timeframe: 60s\n\
    \  condition: selection | count(ServiceName) by AccountName > 5\nY\nmkdir -p ~/w03\
    \ && cat ~/w03/rule.yml"
  answer_detail: '[탐지] 4769 + RC4 + 다수 SPN burst.'
  verify:
    type: output_contains
    expect: '4769'
    field: stdout
  target_vm: siem
  script: "cat > ~/w03/rule.yml <<'Y'\ntitle: Kerberoasting RC4 burst\ndetection:\n\
    \  selection: {EventID: 4769, TicketEncryptionType: '0x17'}\n  timeframe: 60s\n\
    \  condition: selection | count(ServiceName) by AccountName > 5\nY\nmkdir -p ~/w03\
    \ && cat ~/w03/rule.yml"
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: BloodHound LDAP burst
  hint: 6단계 IR 중 탐지 단계. target_vm=siem.
  category: analysis
  points: 12
  answer: 'cat > ~/w03/ldap.md <<''M''

    - objectClass=* 대량 조회

    - ±1분 내 수천 건

    - 특정 계정이 거의 모든 OU 조회

    M

    cat ~/w03/ldap.md'
  answer_detail: '[탐지] BloodHound 수집 지문.'
  verify:
    type: output_contains
    expect: objectClass
    field: stdout
  target_vm: siem
  script: 'cat > ~/w03/ldap.md <<''M''

    - objectClass=* 대량 조회

    - ±1분 내 수천 건

    - 특정 계정이 거의 모든 OU 조회

    M

    cat ~/w03/ldap.md'
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: 공격 경로 Cypher
  hint: 6단계 IR 중 분석 단계. target_vm=siem.
  category: analysis
  points: 13
  answer: 'cat > ~/w03/cypher.md <<''M''

    MATCH p=shortestPath((u:User)-[*1..]->(g:Group {name:''DOMAIN ADMINS@...''}))

    RETURN p LIMIT 5

    M

    cat ~/w03/cypher.md'
  answer_detail: '[분석] Shortest path to Domain Admins.'
  verify:
    type: output_contains
    expect: MATCH
    field: stdout
  target_vm: siem
  script: 'cat > ~/w03/cypher.md <<''M''

    MATCH p=shortestPath((u:User)-[*1..]->(g:Group {name:''DOMAIN ADMINS@...''}))

    RETURN p LIMIT 5

    M

    cat ~/w03/cypher.md'
  risk_level: low
  bastion_prompt: ''
- order: 6
  instruction: 타임라인
  hint: 6단계 IR 중 분석 단계. target_vm=siem.
  category: analysis
  points: 14
  answer: 'cat > ~/w03/timeline.md <<''M''

    - T+0 초기 로그인

    - T+5 LDAP 대량 조회

    - T+10 4769 burst (12 SPN)

    - T+45 크랙 성공 추정

    - T+60 DCSync 시도

    M

    cat ~/w03/timeline.md'
  answer_detail: '[분석] 분 단위 타임라인.'
  verify:
    type: output_contains
    expect: T+
    field: stdout
  target_vm: siem
  script: 'cat > ~/w03/timeline.md <<''M''

