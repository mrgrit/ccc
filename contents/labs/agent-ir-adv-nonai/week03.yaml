  hint: 6단계 IR 중 초동대응 단계. target_vm=bastion.
  category: analysis
  points: 16
  answer: "cat > ~/w03/agent.yaml <<'Y'\nplaybook_id: pb-kerberoast\nsteps:\n  - skill:\
