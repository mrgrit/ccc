    **Impact**: 12 SPN. 크랙 확인 중. 고객 영향 없음.

    **Ask**: krbtgt 2회 회전 (전사 재인증) D+1 승인.

    M

    cat ~/w03/exec.md'
  answer_detail: '[보고] 도메인 장악 리스크.'
