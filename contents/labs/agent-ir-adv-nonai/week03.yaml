  risk_level: low
  bastion_prompt: ''
- order: 7
  instruction: Human 흐름
  hint: 6단계 IR 중 초동대응 단계. target_vm=bastion.
  category: analysis
  points: 15
  answer: 'cat > ~/w03/human.md <<''M''

