  instruction: SPN 목록 조회 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=siem.
  category: analysis
  points: 9
  answer: 'getent passwd | awk -F: ''{print $1}'' | head'
  answer_detail: '[공격] SPN 식별 첫 단계.'
  verify:
    type: output_contains
    expect:
    - SPN
    field: stdout
    semantic:
      intent: '[공격] SPN 목록 조회 — getent passwd | awk ''{print $1}''. AD SPN 식별. impacket-GetUserSPNs 대체.
        MITRE T1558.003 Kerberoasting.'
      success_criteria:
      - SPN 키워드
      - getent + awk
      - 계정 목록
      acceptable_methods:
      - GetUserSPNs.py
      - PowerView Get-NetUser
      - ldapsearch
      negative_signs:
      - getent 없음
      - 출력 없음
      - SPN 맥락 없음
  target_vm: siem
  script: 'getent passwd | awk -F: ''{print $1}'' | head'
  risk_level: low
  bastion_prompt: ''
