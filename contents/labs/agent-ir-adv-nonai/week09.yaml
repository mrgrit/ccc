  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: Sysmon 구성\n\U0001F4CE 참고 (CLI): cat > ~/w09/sysmon.xml <<'X'\n<Sysmon schemaversion=\"4.70\">\n  <EventFiltering>\n    <RuleGroup><ProcessCreate onmatch=\"include\"><ParentImage condition=\"end with\">powershell.exe</ParentImage></ProcessCreate></RuleGroup>\n  </EventFiltering>\n</Sysmon>\nX\ncat ~/w09/sysmon.xml"
  answer_detail: Sysmon.
  verify:
    type: output_contains
