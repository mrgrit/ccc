  category: analysis
  points: 13
  answer: 'cat > ~/w09/memdump.md <<''M''

    - LiME: sudo insmod lime.ko path=/tmp/mem.lime format=lime

    - AVML: avml /tmp/mem.dump

    - Volatility 3: vol -f mem.dump linux.pslist

    M

    cat ~/w09/memdump.md'
  answer_detail: '[분석] 디스크 없으니 메모리가 전부.'
  verify:
    type: output_contains
    expect: Volatility
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w09/memdump.md <<''M''

