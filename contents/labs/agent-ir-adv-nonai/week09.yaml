  hint: 본 과정 공통 6단계 절차에 따라 수행
  category: analysis
  points: 9
  answer: "\U0001F916 프롬프트: LOLBAS SIGMA 룰\n\U0001F4CE 참고 (CLI): cat > ~/w09/lolbas.yml <<'Y'\ntitle: certutil urlcache\ndetection:\n  selection: { EventID: 1, Image|endswith: certutil.exe, CommandLine|contains: urlcache }\n  condition: selection\nY\ncat ~/w09/lolbas.yml"
  answer_detail: 룰.
  verify:
    type: output_contains
    expect: urlcache
    field: stdout
  target_vm: bastion
  script: "cat > ~/w09/lolbas.yml <<'Y'\ntitle: certutil urlcache\ndetection:\n  selection: { EventID: 1, Image|endswith: certutil.exe, CommandLine|contains: urlcache }\n  condition: selection\nY\ncat ~/w09/lolbas.yml"
  risk_level: low
