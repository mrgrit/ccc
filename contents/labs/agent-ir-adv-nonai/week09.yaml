  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 12
  answer: "cat > ~/w09/lolbin-rule.yml <<'Y'\ntitle: LOLBin certutil urlcache download\n\
    detection:\n  selection: {EventID: 1, Image|endswith: certutil.exe, CommandLine|contains:\
    \ urlcache}\n  condition: selection\nlevel: high\nY\ncat ~/w09/lolbin-rule.yml"
  answer_detail: '[탐지] LOLBAS 기반.'
  verify:
    type: output_contains
    expect: urlcache
    field: stdout
  target_vm: bastion
  script: "cat > ~/w09/lolbin-rule.yml <<'Y'\ntitle: LOLBin certutil urlcache download\n\
