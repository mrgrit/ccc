- order: 5
  instruction: PowerShell Script Block 로깅
  hint: 본 과정 공통 6단계 절차에 따라 수행
  category: analysis
  points: 13
  answer: '🤖 프롬프트: PowerShell Script Block 로깅

    📎 참고 (CLI): cat > ~/w09/ps_logging.reg <<''R''

    [HKLM\Software\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging]

