- order: 5
  instruction: 재조합 스크립트
  hint: 6단계 IR 중 분석 단계. target_vm=bastion.
  category: analysis
  points: 13
  answer: 'cat > ~/w10/reassemble.py <<''PY''

    queries = [''48454c4c4f.attacker.example'', ''20776f726c64.attacker.example'', ''21.attacker.example'']

    hex_parts = [q.split(''.'')[0] for q in queries]

    message = bytes.fromhex(''''.join(hex_parts)).decode()

    print(''message:'', repr(message))

    PY

    python3 ~/w10/reassemble.py'
  answer_detail: '[분석] 유출 본문 복원.'
