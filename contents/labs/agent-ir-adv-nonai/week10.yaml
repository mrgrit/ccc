  points: 9
  answer: "\U0001F916 프롬프트: Zeek 긴 쿼리 룰\n\U0001F4CE 참고 (CLI): cat > ~/w10/zeek.zeek <<'Z'\nevent dns_request(c: connection, msg: dns_msg, query: string, qtype: count, qclass: count) {\n  if (|query| > 50) print query;\n}\nZ\ncat ~/w10/zeek.zeek"
