- order: 2
  instruction: 도메인 엔트로피 함수
  hint: 본 과정 공통 6단계 절차에 따라 수행
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 도메인 엔트로피 함수

    📎 참고 (CLI): cat > ~/w10/entropy.py <<''P''

    import math

    from collections import Counter

    def H(s): c=Counter(s); t=len(s); return -sum((f/t)*math.log2(f/t) for f in c.values()) if t else 0

    print(H(''48454c4c4f.attacker.example''))

    P

    python3 ~/w10/entropy.py'
  answer_detail: 엔트로피.
  verify:
    type: output_contains
    expect: '3.'
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w10/entropy.py <<''P''

    import math

    from collections import Counter

    def H(s): c=Counter(s); t=len(s); return -sum((f/t)*math.log2(f/t) for f in c.values()) if t else 0

    print(H(''48454c4c4f.attacker.example''))

    P

    python3 ~/w10/entropy.py'
