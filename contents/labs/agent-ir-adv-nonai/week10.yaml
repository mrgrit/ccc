lab_id: agent-ir-adv-nonai-week10
title: DNS Exfiltration + AI 인코딩 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 10
description: 저속 은밀한 누출. Zeek·엔트로피·RPZ·DoH 차단. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
