- order: 4
  instruction: 엔트로피 기반 탐지
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 12
  answer: "cat > ~/w10/entropy.py <<'PY'\nimport math\nfrom collections import Counter\n\
    def H(s):\n    c = Counter(s); t = len(s)\n    return -sum((f/t)*math.log2(f/t)\
    \ for f in c.values()) if t else 0\nprint('normal', H('www.google.com'))\nprint('encoded',\
    \ H('48454c4c4f.attacker.example'))\nPY\npython3 ~/w10/entropy.py"
  answer_detail: '[탐지] >4.5 의심.'
  verify:
    type: output_contains
    expect: normal
    field: stdout
  target_vm: bastion
  script: "cat > ~/w10/entropy.py <<'PY'\nimport math\nfrom collections import Counter\n\
    def H(s):\n    c = Counter(s); t = len(s)\n    return -sum((f/t)*math.log2(f/t)\
