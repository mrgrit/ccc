- order: 3
  instruction: Zeek 긴 쿼리 룰
  hint: 6단계 IR 중 탐지 단계. target_vm=secu.
  category: analysis
  points: 11
  answer: "cat > ~/w10/zeek.zeek <<'Z'\nevent dns_request(c: connection, msg: dns_msg,\
    \ query: string, qtype: count, qclass: count) {\n  if (|query| > 50) {\n    print\
    \ fmt(\"long_query: src=%s q=%s\", c$id$orig_h, query);\n  }\n}\nZ\ncat ~/w10/zeek.zeek"
  answer_detail: '[탐지] 50자 이상 쿼리.'
  verify:
    type: output_contains
    expect: dns_request
    field: stdout
  target_vm: secu
  script: "cat > ~/w10/zeek.zeek <<'Z'\nevent dns_request(c: connection, msg: dns_msg,\
    \ query: string, qtype: count, qclass: count) {\n  if (|query| > 50) {\n    print\
    \ fmt(\"long_query: src=%s q=%s\", c$id$orig_h, query);\n  }\n}\nZ\ncat ~/w10/zeek.zeek"
