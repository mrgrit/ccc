  instruction: hex 인코딩 서브도메인
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: mkdir -p ~/w10 && echo 'HELLO' | xxd -p | head -c 20; echo '.attacker.example'
  answer_detail: '[공격] Subdomain 인코딩 기본.'
  verify:
    type: output_contains
    expect:
    - .attacker
    - HEX
    field: stdout
  target_vm: web
  script: mkdir -p ~/w10 && echo 'HELLO' | xxd -p | head -c 20; echo '.attacker.example'
  risk_level: low
  bastion_prompt: ''
