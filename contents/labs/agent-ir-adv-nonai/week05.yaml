lab_id: agent-ir-adv-nonai-week05
title: 0-day 웹 프레임워크 자동 악용 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 5
description: 에이전트가 공개 소스 → 취약점 후보 → PoC 생성. 시그니처 없는 탐지 + RASP + SDLC 통합. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SSTI 페이로드 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: echo '${T(java.lang.Runtime).getRuntime().exec("id")}' > /tmp/w05-ssti.txt && cat /tmp/w05-ssti.txt
  answer_detail: '[공격] Spring SSTI 예.'
  verify:
    type: output_contains
    expect: Runtime
    field: stdout
    semantic:
      intent: '[공격] SSTI Spring — echo ''${T(java.lang.Runtime).getRuntime().exec("id")}'' > w05-ssti.txt.
        Spring SpEL 페이로드. CVE-2022-22965 Spring4Shell. MITRE T1190.'
      success_criteria:
      - Runtime 키워드
      - SpEL 문법
      - Spring SSTI
      acceptable_methods:
      - SpEL ${T()}
      - Thymeleaf ${...}
      - Velocity template
      negative_signs:
      - SpEL 없음
      - Runtime 없음
      - SSTI 맥락 없음
  target_vm: web
  script: echo '${T(java.lang.Runtime).getRuntime().exec("id")}' > /tmp/w05-ssti.txt && cat /tmp/w05-ssti.txt
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: Deserialization 페이로드
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 10
  answer: echo 'ysoserial CommonsCollections5 ...' > /tmp/w05-deser.txt && cat /tmp/w05-deser.txt
  answer_detail: '[공격] Java 역직렬화.'
  verify:
    type: output_contains
    expect: ysoserial
    field: stdout
    semantic:
      intent: '[공격] Java Deserialization — echo ''ysoserial CommonsCollections5 ...'' > w05-deser.txt.
        ysoserial CommonsCollections 가젯 체인. MITRE T1055 Java.'
      success_criteria:
      - ysoserial 키워드
      - CommonsCollections
      - 가젯
      acceptable_methods:
      - ysoserial CC5/CC6
      - marshalsec
      - SerialBytes
      negative_signs:
      - ysoserial 누락
      - 가젯 체인 없음
      - Java 맥락 없음
  target_vm: web
  script: echo 'ysoserial CommonsCollections5 ...' > /tmp/w05-deser.txt && cat /tmp/w05-deser.txt
  risk_level: low
  bastion_prompt: ''
- order: 3
