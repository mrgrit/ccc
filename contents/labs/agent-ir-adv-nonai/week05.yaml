  verify:
    type: output_contains
    expect: OOB
    field: stdout
    semantic:
      intent: '[탐지] 행위 지표 5 — cat > indicators.md: URL >1KB / 템플릿 ${..} {{..}} / 응답 p95×3 / OOB callback
