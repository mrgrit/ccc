- order: 4
  instruction: 엔트로피 분석 함수
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 12
  answer: "cat > ~/w05/entropy.py <<'PY'\nimport math\nfrom collections import Counter\ndef H(s):\n  \
    \  if not s: return 0\n    c = Counter(s); t = len(s)\n    return -sum((f/t)*math.log2(f/t) for f\
    \ in c.values())\nprint(H('normal_request'))\nprint(H('aaaaaaabbbbbbb${T(x)}${T(y)}'))\nPY\npython3\
    \ ~/w05/entropy.py"
  answer_detail: '[탐지] 엔트로피>4.5 의심.'
  verify:
    type: output_contains
    expect: '0.'
    field: stdout
    semantic:
      intent: '[탐지] 엔트로피 함수 — cat > entropy.py: Shannon H(s) Counter + 정상 vs 악성 비교. H>4.5 의심. payload
        엔트로피 탐지.'
      success_criteria:
      - 0. 출력
      - Shannon + Counter
      - 비교 사례
      acceptable_methods:
      - Shannon entropy
      - scipy.stats
      - YARA entropy
      negative_signs:
      - 공식 없음
      - 비교 없음
      - H 임계 없음
  target_vm: bastion
  script: "cat > ~/w05/entropy.py <<'PY'\nimport math\nfrom collections import Counter\ndef H(s):\n  \
    \  if not s: return 0\n    c = Counter(s); t = len(s)\n    return -sum((f/t)*math.log2(f/t) for f\
    \ in c.values())\nprint(H('normal_request'))\nprint(H('aaaaaaabbbbbbb${T(x)}${T(y)}'))\nPY\npython3\
