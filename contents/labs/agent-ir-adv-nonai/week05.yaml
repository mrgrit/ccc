  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 11
  answer: 'mkdir -p ~/w05 && cat > ~/w05/indicators.md <<''M''

    - URL >1KB

    - 템플릿 문법 ${..} {{..}}

    - 응답 시간 p95×3

    - OOB callback

    - 응답 크기 이상

    M

    cat ~/w05/indicators.md'
