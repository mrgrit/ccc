lab_id: agent-ir-adv-nonai-week06
title: N-day 대규모 악용 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 6
description: Log4Shell류 4시간 내 대응 파이프라인. 학생이 수동 수행.
difficulty: hard
duration_minutes: 120
objectives:
- 공격 유형의 원리를 이해한다
- 탐지·분석·초동대응·보고·재발방지의 6단계 IR 절차를 수행한다
- Human vs Agent 대응의 차이를 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SBOM 생성 시뮬
  hint: 본 과정 공통 6단계 절차에 따라 수행
  category: analysis
  points: 9
  answer: '🤖 프롬프트: SBOM 생성 시뮬

    📎 참고 (CLI): cat > ~/w06/sbom.json <<''J''

    {"components":[{"name":"log4j-core","version":"2.14.1"}]}

    J

    cat ~/w06/sbom.json'
  answer_detail: SBOM.
  verify:
    type: output_contains
    expect: log4j
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/sbom.json <<''J''

    {"components":[{"name":"log4j-core","version":"2.14.1"}]}

    J

    cat ~/w06/sbom.json'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: Virtual Patch — WAF 룰
  hint: 본 과정 공통 6단계 절차에 따라 수행
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: Virtual Patch — WAF 룰\n\U0001F4CE 참고 (CLI): cat > ~/w06/virtual_patch.rules <<'R'\nSecRule ARGS|REQUEST_HEADERS \\\n  \"@rx \\\\$\\\\{jndi:\" \\\n  \"id:9001000,phase:2,deny,status:403\"\nR\ncat ~/w06/virtual_patch.rules"
  answer_detail: Virtual Patch.
  verify:
    type: output_contains
    expect: jndi
    field: stdout
  target_vm: web
  script: "cat > ~/w06/virtual_patch.rules <<'R'\nSecRule ARGS|REQUEST_HEADERS \\\n  \"@rx \\\\$\\\\{jndi:\" \\\n  \"id:9001000,phase:2,deny,status:403\"\nR\ncat ~/w06/virtual_patch.rules"
  risk_level: low
  bastion_prompt: ''
