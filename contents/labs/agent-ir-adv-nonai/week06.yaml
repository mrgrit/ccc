  category: analysis
  points: 11
  answer: '🤖 프롬프트: CVE 피드 구독

    📎 참고 (CLI): cat > ~/w06/feed.py <<''P''

    # CISA KEV 주기 조회

    import json

    print(json.dumps({''cve'':''CVE-2021-44228'',''kev'':True}))

    P

    python3 ~/w06/feed.py'
  answer_detail: 피드.
  verify:
    type: output_contains
    expect: CVE-2021
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/feed.py <<''P''

