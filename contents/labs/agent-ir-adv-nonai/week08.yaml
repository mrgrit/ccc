    **What**: 취약 Pod에서 privileged 시도. Bastion Pod 격리.

    **Impact**: 1 Pod. 클러스터 확산 없음.

    **Ask**: PSA baseline→restricted 전환 (D+7).

    M

    cat ~/w08/exec.md'
  answer_detail: '[보고] 긴급 정책.'
  verify:
    type: output_contains
    expect:
    - PSA
    - 브리핑
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w08/exec.md <<''M''

