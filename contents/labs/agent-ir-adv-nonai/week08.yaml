    \ level: RequestResponse\n    verbs: [create, update, patch, delete]\n    resources:\n      - group:\
    \ ''\n        resources: [pods, secrets, configmaps]\nY\ncat ~/w08/audit-policy.yaml"
  answer_detail: '[탐지] API 호출 전수 감사.'
  verify:
    type: output_contains
    expect: RequestResponse
    field: stdout
    semantic:
      intent: '[탐지] kube-audit policy — cat > audit-policy.yaml: level RequestResponse + verbs create/update/patch/delete
        + resources pods/secrets/configmaps. API 호출 전수.'
      success_criteria:
      - RequestResponse 키워드
      - verbs + resources
      - audit.k8s.io/v1
