lab_id: agent-ir-adv-nonai-week08
title: K8s Pod Escape + API 악용 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 8
description: privileged·hostPath·capability로 탈출. PSA restricted·Falco·NetworkPolicy
  방어. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: privileged Pod 매니페스트 예시
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: attack
  points: 9
  answer: "mkdir -p ~/w08 && cat > ~/w08/bad-pod.yaml <<'Y'\napiVersion: v1\nkind:\
    \ Pod\nmetadata: {name: bad-pod}\nspec:\n  containers:\n    - name: c\n      image:\
    \ alpine\n      securityContext: {privileged: true}\n      volumeMounts: [{name:\
    \ host, mountPath: /host}]\n  volumes:\n    - name: host\n      hostPath: {path:\
    \ /}\nY\ncat ~/w08/bad-pod.yaml"
  answer_detail: '[공격] privileged+hostPath=완전 호스트 접근.'
  verify:
    type: output_contains
    expect: privileged
    field: stdout
  target_vm: bastion
  script: "mkdir -p ~/w08 && cat > ~/w08/bad-pod.yaml <<'Y'\napiVersion: v1\nkind:\
    \ Pod\nmetadata: {name: bad-pod}\nspec:\n  containers:\n    - name: c\n      image:\
    \ alpine\n      securityContext: {privileged: true}\n      volumeMounts: [{name:\
    \ host, mountPath: /host}]\n  volumes:\n    - name: host\n      hostPath: {path:\
    \ /}\nY\ncat ~/w08/bad-pod.yaml"
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: kubectl 권한 열거 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: attack
  points: 10
  answer: 'cat > ~/w08/enum.sh <<''S''

    #!/bin/bash

    echo ''kubectl auth can-i --list''

    echo ''cat /var/run/secrets/kubernetes.io/serviceaccount/token''

    S

    cat ~/w08/enum.sh'
  answer_detail: '[공격] SA 토큰 + can-i.'
  verify:
    type: output_contains
    expect: can-i
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w08/enum.sh <<''S''

    #!/bin/bash

    echo ''kubectl auth can-i --list''

    echo ''cat /var/run/secrets/kubernetes.io/serviceaccount/token''

    S

    cat ~/w08/enum.sh'
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: kube-audit 설정
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 11
  answer: "cat > ~/w08/audit-policy.yaml <<'Y'\napiVersion: audit.k8s.io/v1\nkind:\
    \ Policy\nrules:\n  - level: RequestResponse\n    verbs: [create, update, patch,\
    \ delete]\n    resources:\n      - group: ''\n        resources: [pods, secrets,\
    \ configmaps]\nY\ncat ~/w08/audit-policy.yaml"
  answer_detail: '[탐지] API 호출 전수 감사.'
  verify:
    type: output_contains
    expect: RequestResponse
    field: stdout
  target_vm: bastion
  script: "cat > ~/w08/audit-policy.yaml <<'Y'\napiVersion: audit.k8s.io/v1\nkind:\
    \ Policy\nrules:\n  - level: RequestResponse\n    verbs: [create, update, patch,\
    \ delete]\n    resources:\n      - group: ''\n        resources: [pods, secrets,\
    \ configmaps]\nY\ncat ~/w08/audit-policy.yaml"
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: Falco 룰
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 12
  answer: "cat > ~/w08/falco.yml <<'Y'\n- rule: Terminal shell in container\n  condition:\
    \ spawned_process and container and shell_procs\n- rule: Contact K8s API Server\
    \ From Pod\n  condition: (k8s_api_server)\nY\ncat ~/w08/falco.yml"
  answer_detail: '[탐지] 런타임 이상.'
  verify:
    type: output_contains
    expect: shell_procs
    field: stdout
  target_vm: bastion
  script: "cat > ~/w08/falco.yml <<'Y'\n- rule: Terminal shell in container\n  condition:\
    \ spawned_process and container and shell_procs\n- rule: Contact K8s API Server\
    \ From Pod\n  condition: (k8s_api_server)\nY\ncat ~/w08/falco.yml"
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: 감사 로그 쿼리
  hint: 6단계 IR 중 분석 단계. target_vm=bastion.
  category: analysis
  points: 13
  answer: 'cat > ~/w08/query.md <<''M''

    - 권한 열거 burst: verb=list on secrets|pods

    - privileged Pod 생성: spec.containers[].securityContext.privileged=true

    - SA 토큰 읽기: path=/var/run/secrets/...

    M

    cat ~/w08/query.md'
  answer_detail: '[분석] 3가지 신호.'
  verify:
    type: output_contains
    expect: privileged
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w08/query.md <<''M''

    - 권한 열거 burst: verb=list on secrets|pods

    - privileged Pod 생성: spec.containers[].securityContext.privileged=true

    - SA 토큰 읽기: path=/var/run/secrets/...

    M

    cat ~/w08/query.md'
  risk_level: low
  bastion_prompt: ''
- order: 6
  instruction: 범위 확산 평가
  hint: 6단계 IR 중 분석 단계. target_vm=bastion.
  category: analysis
  points: 14
  answer: 'cat > ~/w08/scope.md <<''M''

    - Pod → Node: privileged 탈출?

    - Node → 클러스터: kubelet token?

    - 동일 namespace 다른 Pod?

    - 클러스터 전체?

    M

    cat ~/w08/scope.md'
  answer_detail: '[분석] 4단계 평가.'
  verify:
    type: output_contains
    expect: Pod
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w08/scope.md <<''M''

    - Pod → Node: privileged 탈출?

    - Node → 클러스터: kubelet token?

    - 동일 namespace 다른 Pod?

    - 클러스터 전체?

    M

    cat ~/w08/scope.md'
  risk_level: low
  bastion_prompt: ''
- order: 7
  instruction: Pod 격리
  hint: 6단계 IR 중 초동대응 단계. target_vm=bastion.
  category: analysis
  points: 15
  answer: "cat > ~/w08/netpol-quarantine.yaml <<'Y'\napiVersion: networking.k8s.io/v1\n\
    kind: NetworkPolicy\nmetadata: {name: quarantine-bad-pod, namespace: default}\n\
    spec:\n  podSelector: {matchLabels: {quarantine: 'true'}}\n  policyTypes: [Ingress,\
    \ Egress]\nY\ncat ~/w08/netpol-quarantine.yaml"
  answer_detail: '[초동대응] NetworkPolicy deny all.'
  verify:
    type: output_contains
    expect:
    - quarantine
    - 격리
    field: stdout
  target_vm: bastion
  script: "cat > ~/w08/netpol-quarantine.yaml <<'Y'\napiVersion: networking.k8s.io/v1\n\
    kind: NetworkPolicy\nmetadata: {name: quarantine-bad-pod, namespace: default}\n\
    spec:\n  podSelector: {matchLabels: {quarantine: 'true'}}\n  policyTypes: [Ingress,\
    \ Egress]\nY\ncat ~/w08/netpol-quarantine.yaml"
  risk_level: low
  bastion_prompt: ''
- order: 8
  instruction: Agent Playbook
  hint: 6단계 IR 중 초동대응 단계. target_vm=bastion.
  category: analysis
  points: 16
  answer: "cat > ~/w08/agent.yaml <<'Y'\nplaybook_id: pb-k8s-escape\nsteps:\n  - skill:\
    \ label_pod_quarantine\n  - skill: apply_netpol_deny\n  - skill: rotate_sa_token\n\
    \  - skill: taint_node\n    args: {human_approval_required: true}\nY\ncat ~/w08/agent.yaml"
  answer_detail: '[초동대응] 노드는 사람 승인.'
  verify:
    type: output_contains
    expect:
    - quarantine
    - Playbook
    field: stdout
  target_vm: bastion
  script: "cat > ~/w08/agent.yaml <<'Y'\nplaybook_id: pb-k8s-escape\nsteps:\n  - skill:\
    \ label_pod_quarantine\n  - skill: apply_netpol_deny\n  - skill: rotate_sa_token\n\
    \  - skill: taint_node\n    args: {human_approval_required: true}\nY\ncat ~/w08/agent.yaml"
  risk_level: low
  bastion_prompt: ''
- order: 9
  instruction: 임원 브리핑
  hint: 6단계 IR 중 보고 단계. target_vm=bastion.
  category: analysis
  points: 17
  answer: 'cat > ~/w08/exec.md <<''M''

