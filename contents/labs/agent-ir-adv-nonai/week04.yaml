  hint: 6단계 IR 중 탐지 단계. target_vm=siem.
  category: analysis
  points: 11
  answer: "mkdir -p ~/w04 && cat > ~/w04/rule.yml <<'Y'\ntitle: IAM Enumeration Burst\ndetection:\n  selection:\
    \ {eventSource: iam.amazonaws.com, eventName|startswith: [List, Get, Describe]}\n  timeframe: 60s\n\
    \  condition: selection | count() by userIdentity.userName > 20\nY\ncat ~/w04/rule.yml"
  answer_detail: '[탐지] 60초 20+회.'
  verify:
    type: output_contains
    expect: Enumeration
    field: stdout
    semantic:
      intent: '[탐지] IAM 열거 burst SIGMA — cat > rule.yml: eventSource iam.amazonaws.com + eventName startswith
        List/Get/Describe + timeframe 60s + count() > 20. CloudTrail 기반.'
      success_criteria:
      - Enumeration 키워드
      - List/Get/Describe
      - timeframe + count
      acceptable_methods:
      - SIGMA CloudTrail
      - CloudWatch Insights
      - Elastic cloudtrail
      negative_signs:
