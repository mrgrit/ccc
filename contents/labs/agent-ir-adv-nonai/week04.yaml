lab_id: agent-ir-adv-nonai-week04
title: Cloud IAM 자동 Pivot IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 4
description: 유출 API 키 → 권한 열거 → PE 체인 → 자산 확장. 6단계 IR + SCP·OIDC·VPC Endpoint 예방. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: IAM 키 유효성 확인 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: analysis
  points: 9
  answer: 'echo ''aws sts get-caller-identity  # simulated'' > /tmp/w04-check.sh && cat /tmp/w04-check.sh'
  answer_detail: '[공격] 공격 첫 단계.'
  verify:
    type: output_contains
    expect: sts
    field: stdout
    semantic:
      intent: '[공격] IAM 키 유효성 — echo ''aws sts get-caller-identity'' > w04-check.sh. 유출 키 검증. MITRE T1078.004
        Valid Accounts Cloud.'
      success_criteria:
      - sts 키워드
      - get-caller-identity
      - 시뮬
      acceptable_methods:
      - aws sts
      - PACU list
      - CloudBrute
      negative_signs:
      - sts 없음
      - identity 확인 없음
      - 시뮬 맥락 없음
  target_vm: bastion
  script: 'echo ''aws sts get-caller-identity  # simulated'' > /tmp/w04-check.sh && cat /tmp/w04-check.sh'
  risk_level: low
  bastion_prompt: ''
