      - timeframe 없음
      - count 없음
  target_vm: siem
  script: "mkdir -p ~/w04 && cat > ~/w04/rule.yml <<'Y'\ntitle: IAM Enumeration Burst\ndetection:\n  selection:\
    \ {eventSource: iam.amazonaws.com, eventName|startswith: [List, Get, Describe]}\n  timeframe: 60s\n\
