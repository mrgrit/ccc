  verify:
    type: output_contains
    expect: list-roles
    field: stdout
    semantic:
      intent: '[공격] IAM 권한 열거 — cat > w04-enum.sh: aws iam get-user + list-attached-user-policies + list-roles.
        Get/List/Describe 20+회. MITRE T1087.004 + T1069.003.'
