lab_id: agent-ir-adv-nonai-week14
title: CI/CD 공급망 오염 IR (Non-AI)
version: nonai
course: agent-ir-adv-nonai
week: 14
description: GitHub Actions pull_request_target·Runner 탈취. SLSA·cosign. 학생이 수동 수행·기록.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: pull_request_target 예시
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: attack
  points: 9
  answer: "mkdir -p ~/w14 && cat > ~/w14/bad-workflow.yml <<'Y'\non: pull_request_target\njobs:\n  test:\n\
    \    steps:\n      - uses: actions/checkout@v4\n        with: {ref: ${{ github.event.pull_request.head.sha\
    \ }}}  # external code\n      - run: npm test\n        env: {API_KEY: ${{ secrets.PROD_API_KEY }}}\
    \  # LEAK\nY\ncat ~/w14/bad-workflow.yml"
  answer_detail: '[공격] 외부 PR에 시크릿 노출.'
  verify:
    type: output_contains
    expect: pull_request_target
    field: stdout
    semantic:
      intent: '[공격] pull_request_target — cat > bad-workflow.yml: on pull_request_target + checkout ref
        pull_request.head.sha + env API_KEY secrets.PROD_API_KEY LEAK. 외부 PR 시크릿 노출. GitHub Actions CVE.'
      success_criteria:
      - pull_request_target 키워드
      - secrets LEAK
      - external PR
      acceptable_methods:
      - pull_request_target abuse
      - workflow_run 악용
      - GitHub OIDC 오남용
      negative_signs:
      - secrets 누락
      - external 맥락 없음
      - pull_request_target 없음
  target_vm: bastion
  script: "mkdir -p ~/w14 && cat > ~/w14/bad-workflow.yml <<'Y'\non: pull_request_target\njobs:\n  test:\n\
    \    steps:\n      - uses: actions/checkout@v4\n        with: {ref: ${{ github.event.pull_request.head.sha\
    \ }}}  # external code\n      - run: npm test\n        env: {API_KEY: ${{ secrets.PROD_API_KEY }}}\
    \  # LEAK\nY\ncat ~/w14/bad-workflow.yml"
  risk_level: low
  bastion_prompt: ''
- order: 2
