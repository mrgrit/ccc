week: 15
description: 저속 지속 공격 대응 + 과정 전체 통합. 학생이 수동 수행.
difficulty: hard
duration_minutes: 120
objectives:
- 공격 유형의 원리를 이해한다
- 탐지·분석·초동대응·보고·재발방지의 6단계 IR 절차를 수행한다
- Human vs Agent 대응의 차이를 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Long-term drift 스크립트
  hint: 본 과정 공통 6단계 절차에 따라 수행
  category: analysis
  points: 9
  answer: '🤖 프롬프트: Long-term drift 스크립트

    📎 참고 (CLI): cat > ~/w15/drift.py <<''P''

    import statistics

    def drift(baseline_vals, recent): return abs(recent - statistics.mean(baseline_vals)) > 2*statistics.stdev(baseline_vals)

    P

    python3 -c ''print("ok")'''
  answer_detail: Drift.
  verify:
    type: output_contains
    expect: ok
    field: stdout
  target_vm: bastion
  script: 'cat > ~/w15/drift.py <<''P''

    import statistics

    def drift(baseline_vals, recent): return abs(recent - statistics.mean(baseline_vals)) > 2*statistics.stdev(baseline_vals)

