lab_id: agent-ir-adv-ai-week03
title: AD Kerberoasting 자동화 IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 3
description: SharpHound·Rubeus·Hashcat 파이프라인이 자동화된 AD 공격. 4769 RC4 burst 탐지·krbtgt
  회전·gMSA 도입까지. AI SubAgent 자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SPN 목록 조회 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=siem.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: SPN 목록 조회 시뮬

    📎 참고 (CLI): getent passwd | awk -F: ''{print $1}'' | head'
  answer_detail: '[공격] SPN 식별 첫 단계.'
  verify:
    type: output_contains
    expect:
    - SPN
    field: stdout
    semantic:
      intent: SPN 목록 조회 시뮬 — ldapsearch -x -H ldap://dc -D user -W -b CN=Users,DC=corp
        또는 Impacket GetUserSPNs.py 로 Service Principal Name 열거. Kerberoasting 준비 단계
      success_criteria:
      - SPN 열거 명령
      - ldapsearch 또는 GetUserSPNs.py
      acceptable_methods:
      - Impacket GetUserSPNs
      - ldapsearch
      negative_signs:
      - SPN 개념 없음
  target_vm: siem
  script: 'getent passwd | awk -F: ''{print $1}'' | head'
  risk_level: low
  bastion_prompt: SPN 목록 조회 시뮬
- order: 2
  instruction: RC4 TGS 요청 시뮬(로그 생성용)
  hint: 6단계 IR 중 공격 단계. target_vm=siem.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: RC4 TGS 요청 시뮬(로그 생성용)

    📎 참고 (CLI): echo ''simulated TGS request for svc_sql'' > /tmp/w03-tgs.txt && cat
    /tmp/w03-tgs.txt'
  answer_detail: '[공격] 실제는 impacket-GetUserSPNs.'
  verify:
    type: output_contains
    expect: TGS
    field: stdout
    semantic:
      intent: RC4 TGS 요청 시뮬 — Event ID 4769 Kerberos TGS request with encryption_type
        0x17 (RC4-HMAC). 현대 환경에서 RC4 요청은 이례적 → Kerberoasting signature. 로그 생성 시뮬만
        (실제 공격 아님)
      success_criteria:
      - Event ID 4769 + RC4
      - encryption_type 0x17
      acceptable_methods:
      - 로그 시뮬 + eventcreate
      - 실제 Impacket (통제 환경)
      negative_signs:
      - RC4 개념 없음
  target_vm: siem
  script: echo 'simulated TGS request for svc_sql' > /tmp/w03-tgs.txt && cat /tmp/w03-tgs.txt
  risk_level: low
  bastion_prompt: RC4 TGS 요청 시뮬(로그 생성용)
- order: 3
  instruction: 4769 RC4 SIGMA
  hint: 6단계 IR 중 탐지 단계. target_vm=siem.
  category: analysis
  points: 11
  answer: "\U0001F916 프롬프트: 4769 RC4 SIGMA\n\U0001F4CE 참고 (CLI): cat > ~/w03/rule.yml\
    \ <<'Y'\ntitle: Kerberoasting RC4 burst\ndetection:\n  selection: {EventID: 4769,\
    \ TicketEncryptionType: '0x17'}\n  timeframe: 60s\n  condition: selection | count(ServiceName)\
    \ by AccountName > 5\nY\nmkdir -p ~/w03 && cat ~/w03/rule.yml"
  answer_detail: '[탐지] 4769 + RC4 + 다수 SPN burst.'
  verify:
    type: output_contains
    expect: '4769'
    field: stdout
    semantic:
      intent: SIGMA 4769 RC4 — detection.selection.EventID=4769 AND TicketEncryptionType=0x17
        AND ServiceName not in [krbtgt,kadmin]. Kerberoasting 전형 패턴 탐지
      success_criteria:
      - SIGMA YAML
      - 4769 + 0x17 매칭
      acceptable_methods:
      - SIGMA spec
      negative_signs:
      - SIGMA 아님
  target_vm: siem
  script: "cat > ~/w03/rule.yml <<'Y'\ntitle: Kerberoasting RC4 burst\ndetection:\n\
    \  selection: {EventID: 4769, TicketEncryptionType: '0x17'}\n  timeframe: 60s\n\
    \  condition: selection | count(ServiceName) by AccountName > 5\nY\nmkdir -p ~/w03\
    \ && cat ~/w03/rule.yml"
  risk_level: low
  bastion_prompt: 4769 RC4 SIGMA
