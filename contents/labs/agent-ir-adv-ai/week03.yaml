    AD Kerberoasting 자동화 IR 5단계 chain 을 한 흐름으로 수행해줘. AD 환경 없이 의사 시뮬.

    1) [SPN 목록 조회 시뮬] mkdir -p ~/w03; cat > ~/w03/spn-enum.log <<EOF
       === GetUserSPNs.py output (시뮬) ===
       ServicePrincipalName            Name         MemberOf       PasswordLastSet      LastLogon
       --------------------------------- ------------ -------------- --------------------- -----------
       MSSQLSvc/db01.lab.local:1433    svc_sql      Domain Admins  2024-01-15 09:00:00  2024-12-20
       HTTP/web01.lab.local           svc_iis      svc_group      2023-11-01 14:00:00  2024-12-19
       cifs/file01.lab.local          svc_file     -              2024-03-20 11:00:00  -
       EOF
       cat ~/w03/spn-enum.log. MITRE T1558.003 매핑.

    2) [RC4 TGS 요청 시뮬 - 로그 생성] cat > ~/w03/4769-events.log <<EOF
       === Windows Event 4769 (Kerberos Service Ticket Request) ===
       Timestamp           User      ServiceName              EncryptionType    Source IP
       2024-12-21 14:32:15 attacker  MSSQLSvc/db01.lab        0x17 (RC4-HMAC)   10.20.30.150
       2024-12-21 14:32:18 attacker  HTTP/web01.lab           0x17 (RC4-HMAC)   10.20.30.150
       2024-12-21 14:32:20 attacker  cifs/file01.lab          0x17 (RC4-HMAC)   10.20.30.150
       (RC4 = legacy crypto, hashcat -m 13100 crackable, 의심 패턴)
       EOF
       cat ~/w03/4769-events.log.

    3) [SIGMA 룰 - 4769 RC4 detection] cat > ~/w03/sigma-4769-rc4.yml <<EOF
       title: Kerberoasting via RC4 TGS Request Burst
       id: 00000000-0000-0000-0000-000000000003
       status: experimental
       description: Detect Kerberos service ticket requests with RC4 encryption from single source
       logsource:
         product: windows
         service: security
       detection:
         selection:
