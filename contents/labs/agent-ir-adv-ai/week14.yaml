    field: stdout
    semantic:
      intent: 'Action 태그 이동 공격 — uses: org/action@v1 에서 태그 v1 이 malicious commit 으로 재이동 (mutable tag).
        SHA pin 하지 않으면 supply chain 취약. tj-actions/changed-files 2025 사건'
      success_criteria:
      - mutable tag 개념
      - SHA pin 필요
