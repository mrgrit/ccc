  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Action SHA pin 체크

    📎 참고 (CLI): cat > ~/w14/pin-check.sh <<''S''

    #!/bin/bash

    grep -rnE ''uses:.*@v[0-9]'' .github/workflows/ 2>/dev/null | head

    S

    cat ~/w14/pin-check.sh'
  answer_detail: '[탐지] 비고정 Action.'
  verify:
    type: output_contains
    expect:
    - non
    - SHA
    field: stdout
    semantic:
      intent: 'Action SHA pin 체크 — python regex uses: [^@]+@([a-f0-9]{40}) 매칭 검사. SHA (40 char) 아닌 tag/branch
        는 mutable 위험. 자동화 체크'
      success_criteria:
      - regex SHA 매칭
      - 40자 해시 검증
      acceptable_methods:
      - python re
      - dependabot
      negative_signs:
      - SHA 검증 없음
  target_vm: bastion
  script: 'cat > ~/w14/pin-check.sh <<''S''

    #!/bin/bash

    grep -rnE ''uses:.*@v[0-9]'' .github/workflows/ 2>/dev/null | head

