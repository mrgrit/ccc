lab_id: agent-ir-adv-ai-week14
title: CI/CD 공급망 오염 IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 14
description: GitHub Actions pull_request_target·Runner 탈취. SLSA·cosign. AI SubAgent 자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: pull_request_target 예시
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: attack
  points: 9
  answer: "\U0001F916 프롬프트: pull_request_target 예시\n\U0001F4CE 참고 (CLI): mkdir -p ~/w14 && cat > ~/w14/bad-workflow.yml\
    \ <<'Y'\non: pull_request_target\njobs:\n  test:\n    steps:\n      - uses: actions/checkout@v4\n\
    \        with: {ref: ${{ github.event.pull_request.head.sha }}}  # external code\n      - run: npm\
    \ test\n        env: {API_KEY: ${{ secrets.PROD_API_KEY }}}  # LEAK\nY\ncat ~/w14/bad-workflow.yml"
  answer_detail: '[공격] 외부 PR에 시크릿 노출.'
  verify:
    type: output_contains
    expect: pull_request_target
    field: stdout
    semantic:
      intent: 'pull_request_target 예시 — GitHub Actions workflow 에 on: pull_request_target 은 fork PR 에서도
        secrets 접근 가능. 악의적 fork PR이 secrets 유출. 2021+ 유명 취약점'
      success_criteria:
      - pull_request_target 위험 설명
      - secrets 접근
      acceptable_methods:
      - cat > yml + workflow 예
      negative_signs:
      - pull_request (안전 버전) 사용
  target_vm: bastion
  script: "mkdir -p ~/w14 && cat > ~/w14/bad-workflow.yml <<'Y'\non: pull_request_target\njobs:\n  test:\n\
    \    steps:\n      - uses: actions/checkout@v4\n        with: {ref: ${{ github.event.pull_request.head.sha\
    \ }}}  # external code\n      - run: npm test\n        env: {API_KEY: ${{ secrets.PROD_API_KEY }}}\
    \  # LEAK\nY\ncat ~/w14/bad-workflow.yml"
  risk_level: low
  bastion_prompt: pull_request_target 예시
- order: 2
