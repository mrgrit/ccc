  instruction: '[Multi-task] CI/CD 공급망 오염 IR 5단계 통합.'
  bastion_prompt: |
    CI/CD 공급망 오염 (GitHub Actions / Jenkins) IR 5단계 chain.

    1) [pull_request_target 예시 (GitHub Actions 의 위험 trigger)] mkdir -p ~/w14; cat > ~/w14/evil-workflow.yml
       <<EOF
       name: CI on PR
       on: pull_request_target  # ★ 위험: secrets 노출 + write 권한
       jobs:
         build:
           runs-on: ubuntu-latest
           steps:
           - uses: actions/checkout@v4
             with: {ref: \${{ github.event.pull_request.head.sha }}}  # PR 의 코드 checkout
           - run: ./scripts/test.sh  # 공격자 코드 실행 가능
           - env:
               TOKEN: \${{ secrets.DEPLOY_TOKEN }}  # secrets 유출 위험
       EOF
       cat ~/w14/evil-workflow.yml. CVE-many + GitHub Actions 정책 매핑.

    2) [Action 태그 이동 공격] cat > ~/w14/tag-move.md <<EOF
       # GitHub Action 태그 이동 공격 (taggle)
       ## 시나리오
       - 사용자: uses: my-action@v1
       - 공격자: v1 태그 의 SHA 를 evil commit 으로 force-update
       - 결과: 모든 신규 CI run 에 evil code 실행

       ## 방어
       - Action 사용 시 SHA pin 강제:
         uses: my-action@a1b2c3d4e5f6  # full SHA, NOT @v1
       - Dependabot 의 SHA auto-update + PR review
       - GitHub 의 verified marketplace 만 사용 (signed)
       EOF
       cat ~/w14/tag-move.md.

    3) [워크플로 감사 스크립트] cat > ~/w14/audit-workflow.sh <<EOF
       #!/bin/bash
       # 모든 워크플로 의 위험 패턴 audit
       echo "=== pull_request_target usage (위험) ==="
       grep -r "pull_request_target" .github/workflows/ 2>/dev/null

       echo "=== Action 의 tag (SHA 아닌) ==="
