    📎 참고 (CLI): cat > ~/w14/tag-attack.md <<''M''

    - 공격자가 v1 태그를 악성 commit으로 재발행

    - uses: bad-user/bad-action@v1 하는 repo가 전부 영향

    - SHA pin 필수 이유

    M

    cat ~/w14/tag-attack.md'
  answer_detail: '[공격] 공급망.'
