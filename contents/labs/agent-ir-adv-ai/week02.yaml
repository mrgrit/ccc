lab_id: agent-ir-adv-ai-week02
title: Indirect Prompt Injection IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 2
description: RAG 챗봇의 *컨텐츠 채널*(고객 문의·웹 크롤·첨부)에 숨긴 지시로 에이전트를 조작하는 공격의 6단계 IR. AI SubAgent
  자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- Direct vs Indirect PI의 차이를 이해
- Semantic Gate와 정규식 필터의 보완 관계를 체험
- 4층 예방 설계를 적용한다
pass_threshold: 0.6
