- order: 5
  instruction: Bastion skill — detect_indirect_pi 초안.
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 13
  answer: "\U0001F916 프롬프트: Bastion skill — detect_indirect_pi 초안.\n\U0001F4CE 참고\
    \ (CLI): cat > ~/w02-ipi/skill.py <<'PY'\nimport re\nPATTERNS = re.compile(r'(ignore|disregard|forget)\\\
    s+(previous|all)', re.I)\ndef detect(turn):\n    text = (turn.get('user_input','')\
    \ or '') + (turn.get('rag_content','') or '')\n    return bool(PATTERNS.search(text))\n\
    print(detect({'user_input':'ignore previous', 'rag_content':''}))\nPY\npython3\
    \ ~/w02-ipi/skill.py"
  answer_detail: '[탐지] Bastion 스킬 초안.'
  verify:
    type: output_contains
    expect: 'True'
    field: stdout
  target_vm: bastion
  script: "cat > ~/w02-ipi/skill.py <<'PY'\nimport re\nPATTERNS = re.compile(r'(ignore|disregard|forget)\\\
    s+(previous|all)', re.I)\ndef detect(turn):\n    text = (turn.get('user_input','')\
    \ or '') + (turn.get('rag_content','') or '')\n    return bool(PATTERNS.search(text))\n\
