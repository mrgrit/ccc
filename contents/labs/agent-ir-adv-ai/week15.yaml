       baseline = [2.0, 2.1, 1.9, 2.0, 2.2, 1.8, 2.1, 2.0]  # week 1-8 평균
       recent = [2.5, 3.0, 3.5, 4.2, 5.1, 6.0, 7.2, 8.5]   # week 17-24
       # statistical drift test
       b_mean, b_std = statistics.mean(baseline), statistics.stdev(baseline)
       r_mean = statistics.mean(recent)
       z = (r_mean - b_mean) / b_std
       print(f"Baseline: {b_mean:.2f} (stddev {b_std:.2f})")
       print(f"Recent:   {r_mean:.2f}")
