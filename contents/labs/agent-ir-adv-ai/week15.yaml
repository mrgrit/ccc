- order: 3
  instruction: Long-term drift 탐지
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 11
  answer: "\U0001F916 프롬프트: Long-term drift 탐지\n\U0001F4CE 참고 (CLI): cat > ~/w15/drift.py\
    \ <<'PY'\nimport statistics\ndef drift(baseline_vals, recent_val):\n    if not\
    \ baseline_vals: return False\n    m = statistics.mean(baseline_vals)\n    s =\
    \ statistics.stdev(baseline_vals) if len(baseline_vals) > 1 else 1\n    return\
    \ abs(recent_val - m) > 2*s\nprint(drift([10,12,11,13,11,12,13], 25))\nPY\npython3\
    \ ~/w15/drift.py"
  answer_detail: '[탐지] 2σ 이탈.'
  verify:
    type: output_contains
    expect:
    - 'True'
    - Drift
    field: stdout
    semantic:
      intent: Long-term drift 탐지 — sliding window 90 days + user behavior drift (Wasserstein
        distance). 서서히 변화하는 패턴 포착. ML 기반 drift detection
      success_criteria:
      - sliding window 90d
      - drift distance 지표
      acceptable_methods:
      - River/scikit-multiflow drift
      negative_signs:
      - point-in-time만
  target_vm: bastion
  script: "cat > ~/w15/drift.py <<'PY'\nimport statistics\ndef drift(baseline_vals,\
    \ recent_val):\n    if not baseline_vals: return False\n    m = statistics.mean(baseline_vals)\n\
    \    s = statistics.stdev(baseline_vals) if len(baseline_vals) > 1 else 1\n  \
    \  return abs(recent_val - m) > 2*s\nprint(drift([10,12,11,13,11,12,13], 25))\n\
    PY\npython3 ~/w15/drift.py"
