       === kubectl auth can-i --list (시뮬) ===
       Resources                  Non-Resource URLs   Resource Names   Verbs
       *.*                        []                  []               [*]   ← cluster-admin
       pods                       []                  []               [create get list]
       secrets                    []                  []               [get list]
       persistentvolumes          []                  []               [get list]
       === ServiceAccount: default/evil-sa ===
