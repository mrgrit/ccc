    field: stdout
  target_vm: attacker
  script: 'echo ''=== SQL Injection 분석 보고서 ==='' && echo ''대상: http://10.20.30.80'' && echo ''발견: SQLi 취약점 (검색 기능)'' && echo ''유형: Error-based, Union-based'' && echo ''영향: 데이터 탈취, 인증 우회'' && echo ''권고:
    Prepared Statement 적용'' && echo ''=== 보고서 완료 ==='''
  risk_level: low
