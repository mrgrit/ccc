    type: output_contains
    expect: 완료
    field: stdout
    semantic:
      intent: 로그인 메커니즘 분석 — 로그인 엔드포인트·필드명·응답 코드·세션 쿠키 설정 파악
      success_criteria:
      - curl 로 정상/잘못된 자격증명 시도 후 응답 비교
      - Set-Cookie 헤더에서 세션 쿠키명과 속성 확인
      - 응답 본문 또는 상태 코드 차이 (타이밍 차이 포함) 기록
      acceptable_methods:
      - curl -v -d username=test -d password=test <login>
