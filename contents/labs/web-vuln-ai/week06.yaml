lab_id: web-vuln-ai-week06
title: 인증/세션 취약점 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 6
description: 인증 메커니즘과 세션 관리의 취약점을 분석하고 공격과 방어를 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 인증 취약점을 탐지한다
- 세션 관리 취약점을 이해한다
- 안전한 인증 구현을 학습한다
pass_threshold: 0.6
steps:
- order: 1
