  category: auth
  points: 8
  answer: "\U0001F916 프롬프트: 10.20.30.80 대상으로 로그인 메커니즘 분석을(를) 수행해줘\n\U0001F4CE 참고 (CLI): curl -s -X POST\
    \ http://10.20.30.80/rest/user/login \\\n  -H 'Content-Type: application/json' \\\n  -d '{}' 2>/dev/null\
    \ \\\n | head -5 && echo '로그인 메커니즘 분석 완료'"
  answer_detail: 로그인 메커니즘 분석은(는) 웹 보안 진단의 핵심 단계입니다. 체계적인 접근이 필요합니다.
