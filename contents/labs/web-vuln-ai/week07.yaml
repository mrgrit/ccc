lab_id: web-vuln-ai-week07
title: SSRF 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 7
description: SSRF 공격으로 내부 서비스 접근 및 클라우드 메타데이터 탈취를 실습합니다. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SSRF 공격 원리를 이해한다
- 내부 서비스 접근을 실습한다
- SSRF 방어 기법을 학습한다
pass_threshold: 0.6
steps:
