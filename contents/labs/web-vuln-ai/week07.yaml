  instruction: '{{WEB_IP}} 대상으로 SSRF 취약점 포인트 식별을(를) 수행하시오.'
  hint: SSRF 취약점 포인트 식별 관련 도구와 기법을 활용하세요.
  category: ssrf
  points: 8
  answer: '🤖 프롬프트: 10.20.30.80 대상으로 SSRF 취약점 포인트 식별을(를) 수행해줘

    📎 참고 (CLI): curl -s http://10.20.30.80 2>/dev/null | head -5 && echo ''SSRF 취약점
    포인트 식별 완료'''
  answer_detail: SSRF 취약점 포인트 식별은(는) 웹 보안 진단의 핵심 단계입니다. 체계적인 접근이 필요합니다.
  verify:
    type: output_contains
    expect:
    - 완료
    - 10.20.30.80
    field: stdout
    semantic:
      intent: SSRF 취약점 포인트 식별 — URL 파라미터·webhook·프로필 이미지 URL 등 서버가 외부 URL 요청하는 기능
        탐색
      success_criteria:
      - 폼·API 에서 URL 파라미터 이름(url, uri, image, callback 등) 최소 2개 식별
      - 외부 URL 반영 여부 테스트
      - 블랙리스트/화이트리스트 존재 여부 판정
      acceptable_methods:
      - curl 로 url=http://attacker 파라미터 시도
      - Burp Collaborator 로 OOB 콜백 수신
      - SSRFmap 자동 탐지
      - Gopherus 페이로드 생성
      negative_signs:
      - URL 파라미터 식별 없음
      - 외부 요청 검증 없음
      - 필터 유형 판정 누락
