lab_id: web-vuln-ai-week01
title: HTTP 기초 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 1
description: HTTP 프로토콜의 구조, 요청/응답 메시지, 헤더 분석 등 웹 보안의 기초를 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- HTTP 요청/응답 구조를 이해한다
- 주요 HTTP 헤더의 보안 의미를 파악한다
- 웹 서버 정보 수집 기법을 익힌다
pass_threshold: 0.6
steps:
- order: 1
  instruction: curl을 사용하여 대상 웹 서버(http://{{WEB_IP}})에 GET 요청을 보내고 응답 헤더를 확인하시오.
  hint: curl -I 옵션을 사용하세요.
  category: http_basics
  points: 8
  answer: '🤖 프롬프트: curl을 사용하여 대상 웹 서버(http://10.20.30.80)에 GET 요청을 보내고 응답 헤더를 확인해줘

    📎 참고 (CLI): curl -I http://10.20.30.80'
  answer_detail: curl -I는 HEAD 요청으로 응답 헤더만 받습니다. Server, Content-Type, Set-Cookie 등 보안 관련 헤더를 확인합니다.
  verify:
    type: output_contains
    expect: HTTP/
    field: stdout
    semantic:
      intent: curl GET 요청으로 대상 웹서버 응답 헤더 수집 — 기본 HTTP 통신 흐름 이해
      success_criteria:
      - curl -I 또는 curl -v 로 헤더 획득
      - Server/Content-Type/Status 코드 등 주요 헤더 3개 이상 확인
      - 응답 상태 코드 해석
      acceptable_methods:
      - curl -sI <url>
      - curl -v <url> 2>&1 | head
      - wget --server-response --spider <url>
      - python requests.head(url).headers
      negative_signs:
      - 본문만 다운로드하고 헤더 무시
      - 단일 헤더만 확인
      - 상태 코드 해석 없음
  target_vm: attacker
  script: curl -I http://10.20.30.80
  risk_level: low
  bastion_prompt: curl을 사용하여 대상 웹 서버(http://10.20.30.80)에 GET 요청을 보내고 응답 헤더를 확인해줘
- order: 2
  instruction: 'HTTP 응답 코드 종류를 확인하시오: 존재하는 페이지와 존재하지 않는 페이지의 응답 코드 차이.'
  hint: curl -o /dev/null -w '%{http_code}' 옵션을 사용하세요.
  category: http_basics
  points: 8
  answer: '🤖 프롬프트: HTTP 응답 코드 종류를 확인하시오: 존재하는 페이지와 존재하지 않는 페이지의 응답 코드 차이를 확인해줘

    📎 참고 (CLI): echo ''존재하는 페이지:'' && curl -o /dev/null -s -w ''%{http_code}'' http://10.20.30.80/ &&
    echo '''' && echo ''존재하지 않는 페이지:'' && curl -o /dev/null -s -w ''%{http_code}'' http://10.20.30.80/nonexistent
    && echo '''''
  answer_detail: 200은 성공, 404는 페이지 없음, 301/302는 리다이렉트, 500은 서버 에러입니다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: HTTP 응답 코드 비교 — 존재 페이지(200) vs 비존재(404) 응답 코드와 Content-Length 차이
      success_criteria:
      - 최소 2개 경로(루트 + 존재하지 않는 경로) 테스트
      - 각 응답 코드 명시 (200/404/403/500)
      - Content-Length 또는 본문 길이 차이 비교
      acceptable_methods:
      - curl -o /dev/null -w %{http_code}\n <url>
      - curl -I <url>
      - for path in / /nonexistent; do curl ...; done
      - python requests.get status_code
      negative_signs:
      - 단일 URL 만 테스트
      - 응답 코드 해석 없음
      - Content 비교 없음
  target_vm: attacker
  script: echo '존재하는 페이지:' && curl -o /dev/null -s -w '%{http_code}' http://10.20.30.80/ && echo '' &&
    echo '존재하지 않는 페이지:' && curl -o /dev/null -s -w '%{http_code}' http://10.20.30.80/nonexistent && echo
    ''
  risk_level: low
  bastion_prompt: 'HTTP 응답 코드 종류를 확인하시오: 존재하는 페이지와 존재하지 않는 페이지의 응답 코드 차이를 확인해줘'
- order: 3
  instruction: HTTP 요청 메서드(GET, POST, PUT, DELETE, OPTIONS)를 테스트하여 서버가 허용하는 메서드를 확인하시오.
  hint: curl -X OPTIONS를 사용하세요.
  category: http_basics
  points: 10
  answer: '🤖 프롬프트: HTTP 요청 메서드(GET, POST, PUT, DELETE, OPTIONS)를 테스트하여 서버가 허용하는 메서드를 확인해줘

    📎 참고 (CLI): curl -s -X OPTIONS http://10.20.30.80/ -I 2>/dev/null | grep -i allow && echo ''OPTIONS
    확인 완료'''
  answer_detail: OPTIONS 메서드로 서버가 허용하는 HTTP 메서드를 확인합니다. 불필요한 메서드(PUT, DELETE)는 비활성화해야 합니다.
  verify:
    type: output_contains
    expect: OPTIONS 확인 완료
    field: stdout
    semantic:
      intent: HTTP 메서드(GET/POST/PUT/DELETE/OPTIONS) 테스트 — 서버 허용 메서드 파악, OPTIONS Allow 헤더 확인
      success_criteria:
      - 5개 주요 메서드 시도 또는 OPTIONS 요청으로 Allow 헤더 수집
      - 각 메서드 응답 코드(200/405) 해석
      - PUT/DELETE 허용 시 위험(unintended resource modification) 언급
      acceptable_methods:
      - curl -X <METHOD> <url>
      - curl -X OPTIONS <url> -I
      - python requests.request(method, url)
      - nmap --script http-methods -p 80 <target>
      negative_signs:
      - GET 만 사용
      - OPTIONS 확인 없음
      - 허용 메서드의 보안 영향 누락
  target_vm: attacker
  script: curl -s -X OPTIONS http://10.20.30.80/ -I 2>/dev/null | grep -i allow && echo 'OPTIONS 확인 완료'
  risk_level: low
  bastion_prompt: HTTP 요청 메서드(GET, POST, PUT, DELETE, OPTIONS)를 테스트하여 서버가 허용하는 메서드를 확인해줘
- order: 4
  instruction: 응답 헤더에서 보안 헤더(X-Frame-Options, X-XSS-Protection, Content-Security-Policy 등)의 존재 여부를 확인하시오.
  hint: curl -I로 헤더를 분석하세요.
  category: security_headers
  points: 12
  answer: '🤖 프롬프트: 응답 헤더에서 보안 헤더(X-Frame-Options, X-XSS-Protection, Content-Security-Policy 등)의 존재 여부를
    확인해줘

    📎 참고 (CLI): curl -sI http://10.20.30.80 | grep -iE ''(x-frame|x-xss|content-security|strict-transport|x-content-type)''
    && echo ''보안 헤더 분석 완료'' || echo ''보안 헤더 미설정 탐지'''
  answer_detail: 보안 헤더 부재는 XSS, 클릭재킹, MIME 스니핑 등의 공격에 취약해집니다.
  verify:
    type: output_contains
    expect: 보안 헤더
    field: stdout
    semantic:
      intent: 보안 헤더 점검 — X-Frame-Options, CSP, HSTS, X-Content-Type-Options, X-XSS-Protection, Referrer-Policy
        존재 여부
      success_criteria:
      - 6개 주요 보안 헤더 중 4개 이상 확인 (grep 또는 -iE 패턴)
      - 누락된 헤더의 공격 벡터 설명(클릭재킹/XSS/MIME sniffing)
      - securityheaders.com 또는 Mozilla Observatory 언급
      acceptable_methods:
      - curl -sI <url> | grep -iE <pattern>
      - securityheaders.com API
      - OWASP ZAP 자동 점검
      - nikto -h <url>
      negative_signs:
      - 보안 헤더 2개 이하
      - 누락 의미 해석 없음
      - 자동화 도구 언급 없음
  target_vm: attacker
  script: curl -sI http://10.20.30.80 | grep -iE '(x-frame|x-xss|content-security|strict-transport|x-content-type)'
    && echo '보안 헤더 분석 완료' || echo '보안 헤더 미설정 탐지'
  risk_level: low
  bastion_prompt: 응답 헤더에서 보안 헤더(X-Frame-Options, X-XSS-Protection, Content-Security-Policy 등)의 존재 여부를
    확인해줘
- order: 5
  instruction: 쿠키 속성(HttpOnly, Secure, SameSite)을 분석하시오.
  hint: curl -c 옵션으로 쿠키를 저장하세요.
  category: security_headers
  points: 10
  answer: '🤖 프롬프트: 쿠키 속성(HttpOnly, Secure, SameSite)을 분석해줘

    📎 참고 (CLI): curl -sI http://10.20.30.80 | grep -i ''set-cookie'' && echo ''쿠키 분석 완료'' || echo ''쿠키
    없음'''
  answer_detail: HttpOnly는 JavaScript 접근 차단, Secure는 HTTPS만 전송, SameSite는 CSRF 방지 속성입니다.
  verify:
    type: output_contains
    expect: 쿠키
    field: stdout
    semantic:
      intent: 쿠키 보안 속성 분석 — HttpOnly(XSS 방어), Secure(HTTPS only), SameSite(CSRF 방어) 여부
      success_criteria:
      - Set-Cookie 헤더 수집 (curl -c 또는 -I)
      - HttpOnly/Secure/SameSite 각 속성 확인
      - 누락 속성의 공격(XSS 쿠키 탈취, CSRF) 시나리오 설명
      acceptable_methods:
      - curl -I <url> | grep -i set-cookie
      - curl -c cookies.txt <url>; cat cookies.txt
      - python requests 로 cookies dict 확인
      - browser dev tools Application > Cookies
      negative_signs:
      - 쿠키 수집만 하고 속성 분석 없음
      - 속성 하나만 언급
      - 공격 시나리오 누락
  target_vm: attacker
  script: curl -sI http://10.20.30.80 | grep -i 'set-cookie' && echo '쿠키 분석 완료' || echo '쿠키 없음'
  risk_level: low
  bastion_prompt: 쿠키 속성(HttpOnly, Secure, SameSite)을 분석해줘
- order: 6
  instruction: 서버 배너 정보를 수집하여 웹 서버 종류와 버전을 파악하시오.
  hint: Server 헤더와 에러 페이지를 분석하세요.
  category: fingerprinting
  points: 10
  answer: '🤖 프롬프트: 서버 배너 정보를 수집하여 웹 서버 종류와 버전을 파악해줘

    📎 참고 (CLI): curl -sI http://10.20.30.80 | grep -i ''server'' && echo ''배너 수집 완료'''
  answer_detail: Server 헤더에서 웹 서버 종류(Apache, Nginx)와 버전을 파악하여 알려진 취약점을 매칭합니다.
  verify:
    type: output_contains
    expect:
    - 배너 수집 완료
    - Apache
    field: stdout
    semantic:
      intent: 서버 배너 수집 — Server, X-Powered-By, Via 헤더로 웹서버 종류·버전 식별 (Nginx/Apache/IIS)
      success_criteria:
      - Server 헤더 값 수집 및 해석 (nginx/1.18.0 등)
      - X-Powered-By 또는 기술 스택 힌트 헤더 확인
      - 버전 기반 CVE 조회 가능성 언급
      acceptable_methods:
      - curl -sI <url>
      - whatweb <url>
      - nmap -sV -p 80,443 <target>
      - telnet <host> 80 후 HEAD / HTTP/1.1
      negative_signs:
      - 배너 수집 후 해석 없음
      - 버전 정보 확인 없음
      - CVE 매핑 언급 없음
  target_vm: attacker
  script: curl -sI http://10.20.30.80 | grep -i 'server' && echo '배너 수집 완료'
  risk_level: low
  bastion_prompt: 서버 배너 정보를 수집하여 웹 서버 종류와 버전을 파악해줘
- order: 7
  instruction: robots.txt 파일을 확인하여 숨겨진 경로를 찾으시오.
  hint: http://{{WEB_IP}}/robots.txt에 접근하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: robots.txt 파일을 확인하여 숨겨진 경로를 찾으시오해줘

    📎 참고 (CLI): curl -s http://10.20.30.80/robots.txt 2>/dev/null && echo ''robots.txt 확인 완료'''
  answer_detail: robots.txt에는 크롤러 접근을 제한하는 경로가 포함되며, 민감한 디렉터리 정보를 노출할 수 있습니다.
  verify:
    type: output_contains
    expect:
    - robots.txt 확인 완료
    - ftp
    field: stdout
    semantic:
      intent: robots.txt 확인 — 숨겨진 경로(/admin, /api, Disallow 항목) 식별
      success_criteria:
      - curl <url>/robots.txt 로 파일 획득 시도
      - Disallow 엔트리 파싱 및 목록화
      - robots.txt 가 정찰 실패가 아닌 경로 힌트로 쓰임 언급
      acceptable_methods:
      - curl -s <url>/robots.txt
      - wget -O - <url>/robots.txt
      - python urllib.request 로 파싱
      - humans.txt, sitemap.xml 추가 확인
      negative_signs:
      - 404 응답만 받고 종료
      - robots 외 다른 메타 파일 무시
      - 경로 해석 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80/robots.txt 2>/dev/null && echo 'robots.txt 확인 완료'
  risk_level: low
  bastion_prompt: robots.txt 파일을 확인하여 숨겨진 경로를 찾으시오해줘
- order: 8
  instruction: 'HTTP 리다이렉트 동작을 분석하시오: HTTP에서 HTTPS로의 리다이렉트 여부.'
  hint: curl -L -v 옵션을 사용하세요.
  category: http_basics
  points: 10
  answer: '🤖 프롬프트: HTTP 리다이렉트 동작을 분석하시오: HTTP에서 HTTPS로의 리다이렉트 여부해줘

    📎 참고 (CLI): curl -sI -L http://10.20.30.80 2>&1 | grep -iE ''(location|HTTP/)'' && echo ''리다이렉트 분석
    완료'''
  answer_detail: HTTP→HTTPS 리다이렉트가 없으면 중간자 공격에 취약합니다.
  verify:
    type: output_contains
    expect: 리다이렉트 분석 완료
    field: stdout
    semantic:
      intent: HTTP→HTTPS 리다이렉트 확인 — 301/302 응답과 Location 헤더 분석, HSTS 적용 여부
      success_criteria:
      - curl -L 또는 -I 로 리다이렉트 체인 추적
      - Location 헤더 분석 (https:// 프리픽스)
      - HSTS 헤더 존재 여부 검증
      acceptable_methods:
      - curl -IL <http://url>
      - curl -I <http://url> + Location 추출
      - browser dev tools Network 탭
      - sslyze --resume_attempts
      negative_signs:
      - 단일 응답만 확인 (리다이렉트 체인 X)
      - HSTS 언급 없음
      - Mixed Content 위험 누락
  target_vm: attacker
  script: curl -sI -L http://10.20.30.80 2>&1 | grep -iE '(location|HTTP/)' && echo '리다이렉트 분석 완료'
  risk_level: low
  bastion_prompt: 'HTTP 리다이렉트 동작을 분석하시오: HTTP에서 HTTPS로의 리다이렉트 여부해줘'
- order: 9
  instruction: POST 요청을 전송하고 요청/응답을 분석하시오.
  hint: curl -d 옵션으로 데이터를 전송하세요.
  category: http_basics
  points: 10
  answer: "\U0001F916 프롬프트: POST 요청을 전송하고 요청/응답을 분석해줘\n\U0001F4CE 참고 (CLI): curl -s -X POST http://10.20.30.80/rest/user/login\
    \ \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"test@test.com\",\"password\":\"\
    test\"}' 2>/dev/null \\\n | head -5 && echo 'POST 분석 완료'"
  answer_detail: POST 요청은 로그인, 폼 제출 등에 사용됩니다. 요청 본문과 응답 구조를 분석합니다.
  verify:
    type: output_contains
    expect: POST 분석 완료
    field: stdout
    semantic:
      intent: POST 요청 구성·전송 — -X POST -d 로 form data 또는 JSON 전송 후 응답 분석
      success_criteria:
      - curl -X POST -d 또는 --data-urlencode 로 바디 전송
      - Content-Type 명시(application/x-www-form-urlencoded 또는 application/json)
      - 응답 코드와 본문 일부 확인
      acceptable_methods:
      - curl -X POST -d param=value <url>
      - curl -H Content-Type:application/json -d {json} <url>
      - python requests.post(url, data=...)
      - wget --post-data <url>
      negative_signs:
      - GET 요청으로 대체
      - Content-Type 없음
      - 응답 해석 없음
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80/rest/user/login \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"test@test.com\",\"password\":\"test\"}' 2>/dev/null \\\n | head -5 && echo\
    \ 'POST 분석 완료'"
  risk_level: low
  bastion_prompt: POST 요청을 전송하고 요청/응답을 분석해줘
- order: 10
  instruction: 웹 서버의 디렉터리 목록 노출(Directory Listing) 여부를 확인하시오.
  hint: 다양한 경로에 접근해보세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: 웹 서버의 디렉터리 목록 노출(Directory Listing) 여부를 확인해줘

