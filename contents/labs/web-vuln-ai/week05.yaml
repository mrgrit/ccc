    type: output_contains
    expect: 완료
    field: stdout
    semantic:
      intent: 파일 업로드 기능 탐색 — 폼·API 에서 multipart/form-data 엔드포인트 식별
      success_criteria:
      - curl 또는 크롤링으로 업로드 엔드포인트 발견
      - multipart form 또는 PUT 요청 방식 확인
