lab_id: web-vuln-ai-week05
title: 파일 업로드 취약점 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 5
description: 파일 업로드 기능의 취약점을 악용한 웹쉘 업로드와 확장자 우회 등을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 파일 업로드 취약점을 이해한다
- 웹쉘 업로드를 실습한다
- 업로드 방어 기법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
