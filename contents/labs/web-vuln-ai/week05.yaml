  hint: 업로드 기능 식별 관련 도구와 기법을 활용하세요.
  category: upload
  points: 8
  answer: '🤖 프롬프트: 10.20.30.80 대상으로 업로드 기능 식별을(를) 수행해줘

    📎 참고 (CLI): curl -s http://10.20.30.80 2>/dev/null | head -5 && echo ''업로드 기능
    식별 완료'''
  answer_detail: 업로드 기능 식별은(는) 웹 보안 진단의 핵심 단계입니다. 체계적인 접근이 필요합니다.
