lab_id: secops-nonai-week02
title: nftables 방화벽 기초
version: non-ai
course: secops-nonai
week: 2
description: nftables로 간단한 방화벽 테이블/체인/룰을 작성하고 input/output/forward 체인의 동작을 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- nftables의 테이블/체인/룰 개념을 이해한다
- input 체인에서 특정 포트를 허용/차단할 수 있다
- 룰 추가·삭제·확인 명령어를 숙지한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 계열 테이블 'lab'을 생성하시오.
  hint: nft add table inet lab
  category: configure
  points: 10
  answer: sudo nft add table inet lab
  answer_detail: 'nftables 방화벽 기초: secu VM에 inet 계열 테이블 ''lab''을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: nftables inet lab 테이블 생성 — sudo nft add table inet lab. inet family
        = IPv4 + IPv6 통합. 테이블은 chain/rule 의 최상위 컨테이너. 멱등 아님 (기존 있으면 에러).
      success_criteria:
      - nft add table 명령
      - inet family 사용
      - lab 테이블명
      acceptable_methods:
      - sudo nft add table inet lab
      - echo 'add table inet lab' | sudo nft -f -
      - /etc/nftables.conf 편집 후 systemctl restart
      - ansible ansible.posix.nftables
      negative_signs:
      - ip 또는 ip6 family 만
      - table 명 다름
      - sudo 없이 permission denied 무시
  target_vm: secu
- order: 2
  instruction: lab 테이블에 input 체인(hook input, priority 0, policy accept)을 생성하시오.
  hint: nft add chain …
  category: configure
  points: 10
  answer: sudo nft add chain inet lab input '{ type filter hook input priority 0 \;
    policy accept \; }'
  answer_detail: 'nftables 방화벽 기초: lab 테이블에 input 체인(hook input, priority 0, policy
    accept)을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: input 체인 생성 — sudo nft add chain inet lab input '{ type filter hook
        input priority 0 \; policy accept \; }'. type=filter + hook=input + priority=0
        + policy=accept. priority 0 = filter 기본. policy accept = 기본 허용 (이후 drop 룰
        추가).
      success_criteria:
      - nft add chain 명령
      - hook input + priority 0
      - policy accept 또는 drop 명시
      acceptable_methods:
      - sudo nft add chain inet lab input '{...}'
      - /etc/nftables.conf 에 체인 정의
      - nft -f script.nft
      - JSON API nft -j
      negative_signs:
      - type/hook/priority 누락
      - policy 미지정
      - 하위 체인 (forward/output) 혼동
  target_vm: secu
- order: 3
  instruction: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.
  hint: nft add rule inet lab input tcp dport 23 drop
  category: configure
  points: 10
  answer: sudo nft add rule inet lab input tcp dport 23 drop
  answer_detail: 'nftables 방화벽 기초: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.'
  verify:
    type: output_contains
    expect:
    - drop
    - 차단
    field: stdout
    semantic:
      intent: TCP 23 (telnet) 차단 룰 — sudo nft add rule inet lab input tcp dport 23
        drop. telnet 평문 프로토콜 차단 (보안 기본). dport 목적지 포트. drop = 조용히 폐기 (reject 는 ICMP
        응답). MITRE D3FEND Network Isolation.
      success_criteria:
      - drop 키워드 또는 차단
      - tcp dport 23
      - nft add rule
      acceptable_methods:
      - sudo nft add rule inet lab input tcp dport 23 drop
      - iptables -A INPUT -p tcp --dport 23 -j DROP
      - firewalld --add-rich-rule
      - ansible nftables rule
      negative_signs:
      - drop 대신 accept
      - 포트 번호 혼동
      - tcp/udp 구분 없이
  target_vm: secu
- order: 4
  instruction: nft list table inet lab 으로 작성한 룰을 확인하시오.
  hint: nft list table inet lab
  category: verify
  points: 10
  answer: sudo nft list table inet lab
  answer_detail: 'nftables 방화벽 기초: nft list table inet lab 으로 작성한 룰을 확인하시오.'
  verify:
    type: output_contains
    expect: dport 23
    field: stdout
    semantic:
      intent: 룰 확인 — sudo nft list table inet lab. 작성한 chain/rule 구조 덤프 + dport 23
        룰 확인. 정상 적용 검증 단계. 트러블슈팅 기본.
      success_criteria:
      - dport 23 키워드
      - nft list table 명령
      - 테이블 내용 출력
      acceptable_methods:
      - sudo nft list table inet lab
      - sudo nft list ruleset | grep lab
      - nft -n list table (숫자)
      - nft -j list table (JSON)
      negative_signs:
      - list 하지 않고 다른 조회
      - table 이름 혼동
      - dport 확인 없이 덤프만
  target_vm: secu
- order: 5
  instruction: established, related 연결을 허용하는 상태 기반 룰을 input 체인 맨 앞에 삽입하시오.
  hint: nft insert rule …
  category: configure
  points: 10
  answer: sudo nft insert rule inet lab input ct state established,related accept
  answer_detail: 'nftables 방화벽 기초: established, related 연결을 허용하는 상태 기반 룰을 input 체인
    맨 앞에 삽입하시오.'
  verify:
    type: output_contains
    expect: established
    field: stdout
    semantic:
      intent: Stateful 룰 삽입 — sudo nft insert rule inet lab input ct state established,related
        accept. ct state established/related 이미 성립된 연결 + 관련 트래픽 허용. insert = 체인 맨
        앞 (우선순위 최고). 성능 최적화 + 응답 패킷 허용.
      success_criteria:
      - established 키워드
      - ct state 조건
      - insert rule (맨 앞)
      acceptable_methods:
      - nft insert rule + ct state
      - iptables -I INPUT -m state --state ESTABLISHED,RELATED
      - conntrack 기반 상태 추적
      - firewalld default established
      negative_signs:
      - ct state 없이 단순 accept
      - append (뒤) insert 대신
      - related 누락
  target_vm: secu
- order: 6
  instruction: loopback(lo)에서 들어오는 트래픽을 허용하는 룰을 추가하시오.
  hint: iifname lo accept
  category: configure
  points: 10
  answer: sudo nft add rule inet lab input iifname lo accept
  answer_detail: 'nftables 방화벽 기초: loopback(lo)에서 들어오는 트래픽을 허용하는 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: lo
    field: stdout
    semantic:
      intent: loopback 허용 룰 — sudo nft add rule inet lab input iifname lo accept.
        로컬 프로세스 간 통신 (127.0.0.1) 허용. iifname = 입력 인터페이스 이름. loopback 차단 시 로컬 서비스 간
        연결 실패. 기본 필수 룰.
      success_criteria:
      - lo 키워드
      - iifname 조건
      - accept 동작
      acceptable_methods:
      - nft add rule iifname lo accept
      - iptables -A INPUT -i lo -j ACCEPT
      - firewalld trusted zone 포함
      - ansible iifname 매개변수
      negative_signs:
      - iifname 누락
      - lo 대신 127.0.0.1 IP
      - accept 없이 drop
  target_vm: secu
- order: 7
  instruction: tcp 22(ssh) 포트를 허용하는 룰을 추가하시오.
  hint: tcp dport 22 accept
  category: configure
  points: 10
  answer: sudo nft add rule inet lab input tcp dport 22 accept
  answer_detail: 'nftables 방화벽 기초: tcp 22(ssh) 포트를 허용하는 룰을 추가하시오.'
  verify:
    type: output_contains
    expect:
    - dport 22
    - SSH
    field: stdout
    semantic:
      intent: TCP 22 (SSH) 허용 룰 — sudo nft add rule inet lab input tcp dport 22 accept.
        SSH 관리 접근 허용. 일반적으로 source IP 제한 병행 권장. SSH 차단 시 원격 관리 불가 (락아웃 위험).
      success_criteria:
      - dport 22 키워드 또는 SSH
      - tcp dport 22
      - accept 동작
      acceptable_methods:
      - nft add rule tcp dport 22 accept
      - nft add rule tcp dport 22 ip saddr 10.20.30.0/24 accept
      - iptables -A INPUT -p tcp --dport 22 -j ACCEPT
      - fail2ban + nft 통합
      negative_signs:
      - 포트 번호 혼동
      - source IP 제한 없이 전체 허용 주의 부족
      - drop 룰
  target_vm: secu
- order: 8
  instruction: 전체 룰셋(모든 테이블)을 nft list ruleset 명령으로 확인하시오.
  hint: nft list ruleset
  category: verify
  points: 10
  answer: sudo nft list ruleset
  answer_detail: 'nftables 방화벽 기초: 전체 룰셋(모든 테이블)을 nft list ruleset 명령으로 확인하시오.'
  verify:
    type: output_contains
    expect: table inet lab
    field: stdout
    semantic:
      intent: 전체 룰셋 확인 — sudo nft list ruleset. 모든 테이블 + 체인 + 룰 전체 덤프. 'table inet
        lab' 포함 확인. 운영 전체 상태 파악. JSON 형식 변환 시 -j 옵션.
      success_criteria:
      - table inet lab 키워드
      - nft list ruleset 명령
      - 전체 덤프 출력
      acceptable_methods:
      - sudo nft list ruleset
      - sudo nft -n list ruleset
      - sudo nft -j list ruleset (JSON)
      - sudo nft -s list ruleset (stateless)
      negative_signs:
      - 특정 테이블만 조회
      - ruleset 아닌 table 키워드
      - 전체 상태 아님
  target_vm: secu
- order: 9
  instruction: 실습 종료 후 lab 테이블을 삭제하시오.
  hint: nft delete table inet lab
  category: cleanup
  points: 10
  answer: sudo nft delete table inet lab
  answer_detail: 'nftables 방화벽 기초: 실습 종료 후 lab 테이블을 삭제하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 테이블 삭제 cleanup — sudo nft delete table inet lab. 실습 정리 + 프로덕션 영향 없음.
        삭제 시 포함된 모든 chain/rule 함께 제거. idempotent 아님 (없으면 에러).
      success_criteria:
      - nft delete table 명령
      - inet lab 대상
      - 삭제 실행
      acceptable_methods:
      - sudo nft delete table inet lab
      - sudo nft flush ruleset (전체)
      - systemctl stop nftables (임시)
      - /etc/nftables.conf 편집 후 재로드
      negative_signs:
      - flush 대신 delete 아님
      - 테이블 이름 혼동
      - cleanup 의도 없음
  target_vm: secu
- order: 10
  instruction: lab 테이블이 삭제되었는지 nft list tables 로 확인하시오.
  hint: nft list tables
  category: verify
  points: 10
  answer: sudo nft list tables | grep -v ' lab$' | tail
  answer_detail: 'nftables 방화벽 기초: lab 테이블이 삭제되었는지 nft list tables 로 확인하시오.'
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: 테이블 삭제 검증 — sudo nft list tables | grep -v ' lab$' | tail. lab 테이블 삭제
        확인. 나머지 테이블 (filter/nat/mangle 등) 목록 + grep -v 로 lab 제외. 정리 완료 검증.
      success_criteria:
      - table 키워드
      - nft list tables 명령
      - lab 제외 또는 부재 확인
      acceptable_methods:
      - nft list tables | grep -v lab
      - nft list table inet lab (에러 확인)
      - nft list ruleset | grep -c 'table inet lab'
      - ansible assert 모듈
      negative_signs:
      - 삭제 검증 없음
      - grep 필터 없음
      - list tables 이외 명령
  target_vm: secu
- order: 99
  instruction: "[복합 시나리오] \"내가 짠 방화벽 룰, 정말 일하나?\" — attacker 에서 trigger 검증\n\n## 상황\
    \ (w01 시나리오 연속)\n\n당신은 ABC 핀테크 SOC 신규 분석가. 둘째 주.\n\n어제까지 1~10번 step 으로 nftables\
    \ 의 *문법* 을 배웠다 — 테이블 만들고, 체인 걸고,\n포트 차단 룰 작성하고, 다시 삭제까지. 명령어는 익혔다.\n\n오늘 아침 선임이\
    \ 옆에 와서 한 마디:\n\n> \"룰 syntax 익힌 건 알겠어. 그런데 그 룰이 *진짜* 외부 트래픽을 차단하는지 확인했어?\n> \
    \ 내가 처음 nftables 했을 때 input chain 에 drop 룰 넣어놓고도 telnet 이 통하길래\n>  당황했었거든. priority\
    \ / hook / family 가 안 맞으면 룰은 silently 무용지물이야.\n>  attacker(10.20.30.201) 에서 직접\
    \ 시도해보고, 어느 룰이 어떤 trigger 를 잡는지 매핑해봐.\"\n\n학습 목표 #2 — *\"input 체인에서 특정 포트를 허용/차단할\
    \ 수 있다\"* — 의 *증명* 단계.\nsyntax 가 아니라 *효과* 를 본인 손으로 trigger 해서 확인하는 것.\n\n※ 본 과정은\
    \ Non-AI 트랙이므로 모든 명령은 학생이 *직접* SSH 접속·실행·결과 캡처한다.\n\n## 임무 (3 단계, 약 20분)\n\n###\
    \ Phase A — 검증용 룰셋 다시 구성 (5분, secu 에서)\n\n1~10번 step 에서 lab 테이블을 *삭제* 했으므로, 검증을\
    \ 위해 동일 룰셋을 다시\n작성한다. 이번엔 이름을 `verify` 로 (실 운영 룰셋과 충돌 방지).\n\n학생이 직접 secu 에 SSH\
    \ 후 실행:\n  `ssh ccc@10.20.30.1`\n  ```\n  sudo nft add table inet verify\n  sudo\
    \ nft add chain inet verify input { type filter hook input priority 0 \\; policy\
    \ accept \\; }\n  sudo nft add rule inet verify input ct state established,related\
    \ accept\n  sudo nft add rule inet verify input iif lo accept\n  sudo nft add\
    \ rule inet verify input tcp dport 22 accept\n  sudo nft add rule inet verify\
    \ input tcp dport 23 drop\n  sudo nft list table inet verify     # 작성된 룰셋 + counter\
    \ 초기값 0 확인\n  ```\n\n### Phase B — attacker 에서 3 trigger (10분)\n\n학생이 attacker(10.20.30.201)\
    \ 에 SSH 후 secu(10.20.30.1) 로 3 가지 시도. 각 시도\n직후 secu 에서 `nft list table inet verify`\
    \ 로 counter 변동 확인 (별도 SSH 세션 권장).\n\n1. **telnet 차단 검증** (drop 룰 효과)\n   - attacker:\
    \ `nc -vz -w 3 10.20.30.1 23`\n   - 예상: connection refused / timeout\n   - secu:\
    \ `sudo nft list table inet verify | grep -A1 'tcp dport 23'` (counter +1?)\n\n\
    2. **SSH 허용 검증** (accept 룰 효과)\n   - attacker: `ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no\
    \ ccc@10.20.30.1 'echo ok' 2>&1 | head`\n   - 예상: 인증 프롬프트 또는 정상 응답\n   - secu:\
    \ `sudo nft list table inet verify | grep -A1 'tcp dport 22'` (counter +1?)\n\n\
    3. **established 룰 동작 확인** (상태 기반 룰)\n   - SSH 접속 유지하면서 secu 에서: `sudo nft list\
    \ table inet verify | grep -A1 'ct state'`\n   - 의미: 한 번 ssh 가 accept 되면 그 후 패킷은\
    \ *established* 룰에서 빠르게 처리\n\n### Phase C — 결과 회고 (5분)\n\nmatrix 형식이 아니라 *문장 회고*\
    \ 1~2 단락:\n\n1. **Phase B 의 3 trigger 각각 어느 룰이 hit 되었나** — counter 변동 명시\n2. **예상과\
    \ 다른 결과가 있었나** — 예: telnet 차단됐는데 counter 증가 안 함 (룰 순서·priority 문제)\n3. **다음에 룰\
    \ 작성할 때 주의할 점 1가지** (예: \"policy accept 인 chain 끝에 drop 룰 두면\n   그 위 accept 룰이\
    \ 우선됨\")\n\nPhase A 의 verify 테이블은 lab 종료 시 정리: `sudo nft delete table inet verify`.\n\
    \n## 학습 포인트\n\n이 step 의 핵심은 *명령어 sequence 의 정확성* 이 아니라 *룰의 효과를 본인이 trigger 해\n\
    봤다는 경험*. w03 부터는 더 복잡한 룰셋 (NAT, masquerade, set 기반 IP 차단) 을 다루는데,\n문법 만으로는 룰이\
    \ 일하는지 모른다는 것을 이번 주에 체득해 둬야 한다.\n\n## Non-AI 트랙 제출물\n\nPhase A (룰 작성 + 초기 nft\
    \ list 출력) / Phase B (3 trigger 의 attacker 명령 출력 + secu nft\ncounter 변동) / Phase\
    \ C (1~2 단락 회고) — 3 산출물을 lab 제출 페이지의 Cyber Range 답변\ntextarea 에 `$ command` +\
    \ 출력 형식으로 붙여넣어 제출."
  hint: 'Phase A: secu 에 verify 테이블 + 4 룰 (established/lo/22accept/23drop) 작성

    Phase B: attacker(10.20.30.201) 에서 nc telnet/ssh/established 3 trigger, secu 에서
    nft counter 확인

    Phase C: 3 trigger 의 hit 룰 매핑 + 예상 외 결과 + 룰 작성 시 주의점

    포인트: syntax 만 익히면 안 됨, *효과* 를 직접 trigger 해서 확인.

    '
  category: integration_scenario
  points: 50
  verify:
    type: output_contains
    expect: counter
    field: stdout
    semantic:
      intent: 'nftables 룰의 *효과* 를 attacker→secu 실 trigger 로 검증. 학습 목표 #2 (input 체인

