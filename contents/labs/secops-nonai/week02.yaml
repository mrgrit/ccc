lab_id: secops-nonai-week02
title: nftables 방화벽 기초
version: non-ai
course: secops-nonai
week: 2
description: nftables로 간단한 방화벽 테이블/체인/룰을 작성하고 input/output/forward 체인의 동작을 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- nftables의 테이블/체인/룰 개념을 이해한다
- input 체인에서 특정 포트를 허용/차단할 수 있다
- 룰 추가·삭제·확인 명령어를 숙지한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 계열 테이블 'lab'을 생성하시오.
  hint: nft add table inet lab
  category: configure
  points: 10
  answer: sudo nft add table inet lab
  answer_detail: 'nftables 방화벽 기초: secu VM에 inet 계열 테이블 ''lab''을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: nftables inet lab 테이블 생성 — sudo nft add table inet lab. inet family
        = IPv4 + IPv6 통합. 테이블은 chain/rule 의 최상위 컨테이너. 멱등 아님 (기존 있으면 에러).
      success_criteria:
      - nft add table 명령
      - inet family 사용
      - lab 테이블명
      acceptable_methods:
      - sudo nft add table inet lab
      - echo 'add table inet lab' | sudo nft -f -
      - /etc/nftables.conf 편집 후 systemctl restart
      - ansible ansible.posix.nftables
      - |
        **[OSS] nft (테이블 생성 + 검증)** — 표준.
          # 1. 테이블 생성 (idempotent 아님)
          sudo nft add table inet lab
          # 2. 즉시 검증
          sudo nft list tables | grep lab
          # 3. JSON 으로 family 확인
          sudo nft -j list tables | jq '.nftables[] | select(.table) | {name: .table.name, family: .table.family}'
          # 4. 이미 있으면 무시 (idempotent 패턴)
          sudo nft list table inet lab > /dev/null 2>&1 || sudo nft add table inet lab
        예상 출력 `inet lab / family=inet name=lab / table 생성 완료`.
        운영 해석: inet = IPv4+IPv6 통합. ip / ip6 / arp / netdev 별 family. 명시 필수.
      - |
        **[OSS] nft -f script (배치 + 트랜잭션)** — atomic.
          # 1. script 파일 작성
          tee /tmp/lab.nft <<'EOF'
          add table inet lab
          # 추후 chain/rule 추가
          EOF
          # 2. syntax 검증 (-c) → 실행 (-f)
          sudo nft -c -f /tmp/lab.nft && sudo nft -f /tmp/lab.nft
          # 3. JSON 형식도 가능
          echo '{"nftables":[{"add":{"table":{"family":"inet","name":"lab"}}}]}' | sudo nft -j -f -
          # 4. 검증
          sudo nft list tables
        예상 출력 `Configuration loaded successfully / inet lab created`.
        운영 해석: 다중 명령 한 번에 + atomic. 일부 실패 시 전체 rollback.
      - |
        **[OSS] /etc/nftables.conf + systemd (영구화)** — 재부팅 보존.
          # 1. /etc/nftables.lab.conf 편집
          sudo tee -a /etc/nftables.lab.conf <<'EOF'
          #!/usr/sbin/nft -f
          table inet lab {
            # chain/rule 정의
          }
          EOF
          # 2. syntax 검증
          sudo nft -c -f /etc/nftables.lab.conf
          # 3. 영구 적용 (/etc/nftables.conf 에 include)
          echo "include \"/etc/nftables.lab.conf\"" | sudo tee -a /etc/nftables.conf
          # 4. systemd unit 재시작
          sudo systemctl restart nftables
          systemctl status nftables --no-pager
        예상 출력 `nft -c valid / nftables active`.
        운영 해석: 재부팅 후 보존. enterprise 표준.
      - |
        **[OSS] Ansible community.general.nftables_table** — IaC.
          # 1. /etc/ansible/playbooks/lab-table.yml
          # ---
          # - hosts: secu
          #   tasks:
          #     - name: ensure lab table
          #       community.general.nftables_table:
          #         family: inet
          #         name: lab
          #         state: present
          # 2. 실행
          ansible-playbook -i inventory lab-table.yml
          # 3. idempotent 검증 (2회 실행 → ok)
          ansible-playbook -i inventory lab-table.yml --check
          # 4. dry-run 으로 변경 없음 확인
          ansible-playbook -i inventory lab-table.yml --diff --check
        예상 출력 `changed=1 (1회) / ok=1 changed=0 (2회)`.
        운영 해석: 멀티 호스트 동시 표준화. PR-driven 운영.
      - |
        **[OSS] systemd-tmpfiles + ExecStartPre 검증 패턴** — 안전.
          # 1. /etc/systemd/system/nftables-lab.service
          sudo tee /etc/systemd/system/nftables-lab.service > /dev/null <<EOF
          [Unit]
          Description=Lab nftables table
          [Service]
          Type=oneshot
          ExecStartPre=/usr/sbin/nft -c -f /etc/nftables.lab.conf
          ExecStart=/usr/sbin/nft -f /etc/nftables.lab.conf
          ExecStop=/usr/sbin/nft delete table inet lab
          RemainAfterExit=yes
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          sudo systemctl enable --now nftables-lab
          systemctl status nftables-lab --no-pager
        예상 출력 `Active: active (exited) / ExecStart succeeded`.
        운영 해석: ExecStartPre = syntax 검증 → 실패 시 ExecStart skip. safe deploy.
      negative_signs:
      - ip 또는 ip6 family 만
      - table 명 다름
      - sudo 없이 permission denied 무시
  target_vm: secu
- order: 2
  instruction: lab 테이블에 input 체인(hook input, priority 0, policy accept)을 생성하시오.
  hint: nft add chain …
  category: configure
  points: 10
  answer: sudo nft add chain inet lab input '{ type filter hook input priority 0 \;
    policy accept \; }'
  answer_detail: 'nftables 방화벽 기초: lab 테이블에 input 체인(hook input, priority 0, policy
    accept)을 생성하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: input 체인 생성 — sudo nft add chain inet lab input '{ type filter hook
        input priority 0 \; policy accept \; }'. type=filter + hook=input + priority=0
        + policy=accept. priority 0 = filter 기본. policy accept = 기본 허용 (이후 drop 룰
        추가).
      success_criteria:
      - nft add chain 명령
      - hook input + priority 0
      - policy accept 또는 drop 명시
      acceptable_methods:
      - sudo nft add chain inet lab input '{...}'
      - /etc/nftables.conf 에 체인 정의
      - nft -f script.nft
      - JSON API nft -j
      - |
        **[OSS] nft add chain (체인 표준 정의)** — 표준.
          # 1. input chain (filter / hook input / priority 0 / accept)
          sudo nft 'add chain inet lab input { type filter hook input priority 0 ; policy accept ; }'
          # 2. -a 로 handle 포함 검증
          sudo nft -a list chain inet lab input
          # 3. JSON 검증 (자동화 친화)
          sudo nft -j list chain inet lab input | jq '.nftables[] | select(.chain) | {name, hook, priority, policy}'
          # 4. counter 추가 (drop 빈도 측정)
          sudo nft 'add chain inet lab input { type filter hook input priority 0 ; policy accept ; counter ; }'
        예상 출력 `chain input { type filter hook input priority 0; policy accept; }`.
        운영 해석: hook 위치 (prerouting/input/forward/output/postrouting). priority = 평가 순서.
      - |
        **[OSS] hook + priority 종합 비교** — 학습.
          # 1. 표준 hook 별 정책 그래프
          # prerouting → input → output → postrouting (방향 고려)
          # forward 는 다른 호스트 향하는 트래픽
          # 2. priority 권장 (낮을수록 먼저)
          # raw=-300 / mangle=-150 / nat=-100 / filter=0 / security=50
          # 3. 모든 hook 에 chain 생성 (학습)
          for h in input forward output; do
            sudo nft "add chain inet lab $h { type filter hook $h priority 0 ; policy accept ; }"
          done
          # 4. 검증
          sudo nft -j list table inet lab | jq '.nftables[] | select(.chain) | {name, hook}'
        예상 출력 `input,forward,output 3 chain / hook 위치 종합`.
        운영 해석: 패킷이 통과하는 hook 매핑. forward 는 router 역할 시 핵심.
      - |
        **[OSS] nft -f atomic batch (chain 생성)** — 안전.
          # 1. 다중 chain atomic 작성
          sudo nft -f - <<'EOF'
          add chain inet lab input { type filter hook input priority 0 ; policy accept ; }
          add chain inet lab forward { type filter hook forward priority 0 ; policy drop ; }
          add chain inet lab output { type filter hook output priority 0 ; policy accept ; }
          EOF
          # 2. 검증
          sudo nft list chains | grep -E 'lab.*(input|forward|output)'
          # 3. syntax 검증
          sudo nft -c -f /tmp/chains.nft
        예상 출력 `3 chain atomic 생성 / syntax valid`.
        운영 해석: 중간 실패 시 전체 rollback. 운영 표준.
      - |
        **[OSS] policy drop vs accept (Zero Trust 비교)** — 정책.
          # 1. policy accept (기본 허용) — 학습용
          sudo nft 'add chain inet lab input_accept { type filter hook input priority 5 ; policy accept ; }'
          # 2. policy drop (Zero Trust) — 운영 권장
          sudo nft 'add chain inet lab input_drop { type filter hook input priority 10 ; policy drop ; }'
          # 3. 두 chain 비교
          sudo nft list chains
          # 4. 운영 환경에서 policy drop 권장 — 명시적 허용 외 모두 차단
          sudo nft -j list table inet lab | jq '.nftables[] | select(.chain) | {name, policy}'
        예상 출력 `input_accept policy=accept / input_drop policy=drop`.
        운영 해석: policy drop = enterprise default. 명시적 allow 룰 필수.
      - |
        **[OSS] Ansible community.general.nftables_chain** — IaC.
          # 1. /etc/ansible/playbooks/lab-chain.yml
          # ---
          # - hosts: secu
          #   tasks:
          #     - name: ensure input chain
          #       community.general.nftables_chain:
          #         family: inet
          #         table: lab
          #         name: input
          #         type: filter
          #         hook: input
          #         priority: 0
          #         policy: accept
          # 2. 실행
          ansible-playbook -i inventory lab-chain.yml --diff
          # 3. idempotent
          ansible-playbook -i inventory lab-chain.yml --check
        예상 출력 `changed=1 / 2회 실행: ok=1 changed=0`.
        운영 해석: 멀티 호스트 chain 표준화. PR review 워크플로우.
      negative_signs:
      - type/hook/priority 누락
      - policy 미지정
      - 하위 체인 (forward/output) 혼동
  target_vm: secu
- order: 3
  instruction: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.
  hint: nft add rule inet lab input tcp dport 23 drop
  category: configure
  points: 10
  answer: sudo nft add rule inet lab input tcp dport 23 drop
  answer_detail: 'nftables 방화벽 기초: lab 테이블 input 체인에 tcp 포트 23(telnet) 차단 룰을 추가하시오.'
  verify:
    type: output_contains
    expect:
    - drop
    - 차단
    field: stdout
    semantic:
      intent: TCP 23 (telnet) 차단 룰 — sudo nft add rule inet lab input tcp dport 23
        drop. telnet 평문 프로토콜 차단 (보안 기본). dport 목적지 포트. drop = 조용히 폐기 (reject 는 ICMP
        응답). MITRE D3FEND Network Isolation.
      success_criteria:
      - drop 키워드 또는 차단
      - tcp dport 23
      - nft add rule
      acceptable_methods:
      - sudo nft add rule inet lab input tcp dport 23 drop
      - iptables -A INPUT -p tcp --dport 23 -j DROP
      - firewalld --add-rich-rule
      - ansible nftables rule
      - |
        **[OSS] nft add rule (TCP 포트 차단)** — 표준.
          # 1. telnet (23) drop + counter + log
          sudo nft 'add rule inet lab input tcp dport 23 counter log prefix "[telnet-drop] " drop'
          # 2. 검증
          sudo nft -a list chain inet lab input
          # 3. counter 추적 (실시간 매칭 횟수)
          sudo nft list chain inet lab input | grep 'tcp dport 23'
          # 4. 다중 포트 (telnet + ftp 평문 프로토콜)
          sudo nft 'add rule inet lab input tcp dport { 21, 23, 80 } counter drop comment "plaintext-block"'
        예상 출력 `tcp dport 23 counter packets 0 bytes 0 log prefix "[telnet-drop] " drop`.
        운영 해석: counter + log = 차단 감사. set 으로 다중 포트 1줄.
      - |
        **[OSS] iptables-translate (legacy → nft 변환)** — 마이그레이션.
          # 1. legacy iptables 명령 작성
          IPT='iptables -A INPUT -p tcp --dport 23 -j DROP'
          # 2. nft 등가 룰 변환
          iptables-translate -A INPUT -p tcp --dport 23 -j DROP
          # 3. iptables-save 전체 변환
          sudo iptables-save | iptables-translate-restore | head
          # 4. 변환 결과 적용
          iptables-translate -A INPUT -p tcp --dport 23 -j DROP | sudo nft -f -
        예상 출력 `nft add rule ip filter INPUT tcp dport 23 counter drop`.
        운영 해석: 기존 iptables script → nft 자동 변환. 마이그레이션 path.
      - |
        **[OSS] firewalld rich-rule (zone 기반)** — alt distro.
          # 1. firewalld zone 별 telnet 차단
          sudo firewall-cmd --permanent --zone=public --add-rich-rule='rule family="ipv4" port port=23 protocol=tcp drop'
          # 2. apply
          sudo firewall-cmd --reload
          # 3. 검증
          sudo firewall-cmd --list-rich-rules
          # 4. service 별 차단도 가능
          sudo firewall-cmd --permanent --zone=public --remove-service=telnet
        예상 출력 `rule family="ipv4" port port="23" protocol="tcp" drop`.
        운영 해석: RHEL/CentOS 표준. zone + rich-rule 추상.
      - |
        **[OSS] log prefix + journalctl (차단 audit)** — audit.
          # 1. log + drop 룰
          sudo nft 'add rule inet lab input tcp dport 23 log prefix "[telnet-drop] " level warn drop'
          # 2. journalctl 로 매칭 로그
          sudo journalctl -k -f | grep telnet-drop
          # 3. rsyslog 로 별도 file
          sudo tee /etc/rsyslog.d/telnet-drop.conf > /dev/null <<'EOF'
          :msg, contains, "[telnet-drop]" -/var/log/telnet-drop.log
          & stop
          EOF
          sudo systemctl restart rsyslog
          # 4. 통계 (top10 source IP)
          sudo grep telnet-drop /var/log/telnet-drop.log | grep -oP 'SRC=\S+' | sort | uniq -c | sort -rn | head
        예상 출력 `[telnet-drop] IN=ens33 SRC=10.20.30.201 DST=... DPT=23`.
        운영 해석: drop 효과 정량 + source IP 식별. 자동 차단 후보.
      - |
        **[OSS] tcpdump 으로 차단 효과 검증** — 트래픽.
          # 1. attacker 측에서 telnet 시도 (시뮬)
          # ssh ccc@10.20.30.201 'nc -vz -w 2 10.20.30.1 23'
          # 2. secu 측에서 packet capture
          sudo tcpdump -i any -nn 'tcp port 23' -c 5
          # 3. 응답 없음 = drop 성공
          # SYN 만 보이고 SYN-ACK 없으면 drop
          # 4. counter 변화
          sudo nft list chain inet lab input | grep 'dport 23'
        예상 출력 `tcp 23 SYN seen / no SYN-ACK / counter packets 1 bytes 60`.
        운영 해석: tcpdump SYN 만 + counter 증가 = drop 성공.
      negative_signs:
      - drop 대신 accept
      - 포트 번호 혼동
      - tcp/udp 구분 없이
  target_vm: secu
- order: 4
  instruction: nft list table inet lab 으로 작성한 룰을 확인하시오.
  hint: nft list table inet lab
  category: verify
  points: 10
  answer: sudo nft list table inet lab
  answer_detail: 'nftables 방화벽 기초: nft list table inet lab 으로 작성한 룰을 확인하시오.'
  verify:
    type: output_contains
    expect: dport 23
    field: stdout
    semantic:
      intent: 룰 확인 — sudo nft list table inet lab. 작성한 chain/rule 구조 덤프 + dport 23
        룰 확인. 정상 적용 검증 단계. 트러블슈팅 기본.
      success_criteria:
      - dport 23 키워드
      - nft list table 명령
      - 테이블 내용 출력
      acceptable_methods:
      - sudo nft list table inet lab
      - sudo nft list ruleset | grep lab
      - nft -n list table (숫자)
      - nft -j list table (JSON)
      - |
        **[OSS] nft list (텍스트 + handle + JSON)** — 표준.
          # 1. 텍스트 출력
          sudo nft list table inet lab
          # 2. handle 포함 (룰 식별자)
          sudo nft -a list table inet lab
          # 3. JSON 출력 → jq 파싱
          sudo nft -j list table inet lab | jq '.nftables[] | select(.rule)'
          # 4. 특정 룰 grep
          sudo nft list table inet lab | grep -E 'dport|drop|accept'
        예상 출력 `chain input { ip ... tcp dport 23 drop # handle 5 }`.
        운영 해석: handle = 룰 ID. JSON = 자동화. grep = 빠른 확인.
      - |
        **[OSS] nft monitor (실시간 변경)** — audit.
          # 1. 백그라운드 모니터
          sudo nft monitor > /tmp/nft-events.log &
          MON=$!
          # 2. 변경 발생 시 즉시 캡처
          sudo nft add rule inet lab input tcp dport 80 accept
          # 3. 결과
          tail /tmp/nft-events.log
          # 4. 종료
          kill $MON
        예상 출력 `add rule inet lab input tcp dport 80 accept`.
        운영 해석: 실시간 audit. 누가 룰 추가했는지 추적.
      - |
        **[OSS] auditd 로 nft 명령 추적** — 감사.
          # 1. nft 실행 추적 (kernel audit)
          sudo auditctl -w /usr/sbin/nft -p x -k nft-cmd
          # 2. 누가·언제·무엇을
          sudo ausearch -k nft-cmd -ts recent | head
          # 3. summary
          sudo aureport --executable | grep nft
          # 4. JSON 출력
          sudo ausearch -k nft-cmd --format json | jq .
        예상 출력 `time=2026-05-04 user=ccc cmd=nft list ...`.
        운영 해석: 모든 nft 명령 추적. compliance 감사.
      - |
        **[OSS] nft -j + 정량 비교 (drift 감지)** — IaC.
          # 1. baseline (의도) JSON dump
          sudo nft -j list ruleset > /tmp/baseline.json
          # 2. 임의 변경 후 비교
          sudo nft add rule inet lab input tcp dport 8080 accept
          sudo nft -j list ruleset > /tmp/current.json
          diff <(jq -S . /tmp/baseline.json) <(jq -S . /tmp/current.json)
          # 3. drift 자동 감지 (cron)
          # */5 * * * * /usr/local/bin/nft-drift-check.sh
          # 4. baseline 복원
          sudo nft delete rule inet lab input handle <handle>
        예상 출력 `+ tcp dport 8080 accept (drift 감지)`.
        운영 해석: 정책 변경 감지. SOC audit · CI 검증.
      - |
        **[OSS] watch + diff (변동 추적)** — 모니터.
          # 1. 1초마다 룰셋 변경 감시
          watch -n 1 -d 'sudo nft list table inet lab'
          # 2. 시계열 스냅샷 저장
          while true; do
            sudo nft list table inet lab > /tmp/lab-$(date +%s).txt
            sleep 30
          done &
          # 3. 가장 최근 두 스냅샷 diff
          ls -t /tmp/lab-*.txt | head -2 | xargs diff
          # 4. 변경 인스턴스 카운트
          ls /tmp/lab-*.txt | wc -l
        예상 출력 `watch 인터랙티브 + diff 변경 표시`.
        운영 해석: 단순 시각 모니터. 학습용 + 변동 추적.
