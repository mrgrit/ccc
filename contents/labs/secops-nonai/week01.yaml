lab_id: secops-nonai-week01
title: 보안 솔루션 인프라 점검
version: non-ai
course: secops-nonai
week: 1
description: 실습 환경의 보안 솔루션(nftables, Suricata, ModSecurity, Wazuh, OpenCTI)이 각 VM에
  어떻게 배치·동작하는지 확인한다.
difficulty: easy
duration_minutes: 120
objectives:
- 실습 인프라 VM의 역할과 배포된 보안 솔루션을 파악한다
- 각 보안 솔루션이 실제로 동작하는지 명령어로 확인한다
- 솔루션별 주요 로그와 설정 파일 위치를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'secu VM({{SECU_IP}})의 nftables 테이블 목록을 확인하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-nonai-week01/1/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/secops-nonai-week01/1/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft list tables
  category: survey
  points: 10
  answer: nft list tables
  answer_detail: '보안 솔루션 인프라 점검: secu VM(10.20.30.1)의 nftables 테이블 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: secu VM nftables 테이블 목록 — nft list tables 실행 + 결과에 table 키워드. IPv4/IPv6/inet
        family 테이블 확인. 방화벽 설정 첫 점검. MITRE D3FEND Network Hardening.
      success_criteria:
      - table 키워드
      - nft list 명령 실행
      - 테이블 family 확인
      acceptable_methods:
      - nft list tables
      - iptables -L (legacy)
      - firewall-cmd --list-all (firewalld)
      - /etc/nftables.conf 직접 조회
      - |
        **[OSS] nft (모던 표준 + JSON)** — 표준.
          # 1. 모든 table 요약
          sudo nft list tables
          # 2. set/chain 요약
          sudo nft list sets
          sudo nft list chains
          # 3. JSON 구조화 (자동화 친화)
          sudo nft -j list ruleset | jq '[.nftables[] | select(.table) | .table.name]'
          # 4. 룰 갯수 정량
          sudo nft -j list ruleset | jq '[.nftables[] | select(.rule)] | length'
        예상 출력 `table inet filter / table ip nat / 룰 갯수 23개`.
        운영 해석: nft 가 iptables 후속 표준. JSON 으로 자동화·dashboard 통합 가능.
      - |
        **[OSS] iptables / iptables-translate (legacy 마이그레이션)** — 비교.
          # 1. legacy iptables 룰셋
          sudo iptables -L -nv --line-numbers
          # 2. 환경에 ip6tables 도 있으면 동시
          sudo ip6tables -L -nv
          # 3. iptables → nft 자동 변환
          sudo iptables -L | head
          sudo iptables-translate -L INPUT -nv | head
          # 4. 변환 결과를 nft 룰로 적용
          sudo iptables-save | iptables-translate-restore
        예상 출력 `Chain INPUT (policy ACCEPT) / nft 등가 룰 출력`.
        운영 해석: 기존 iptables 환경 → nft 마이그레이션 path. 운영 분석.
      - |
        **[OSS] firewalld (RHEL/CentOS 표준)** — distro 별 alt.
          # 1. firewalld 상태 + zone 목록
          sudo firewall-cmd --state
          sudo firewall-cmd --get-active-zones
          # 2. 각 zone 의 활성 룰
          sudo firewall-cmd --list-all-zones | head -30
          # 3. 백엔드 확인 (nft 또는 iptables)
          sudo firewall-cmd --get-default-zone
          firewall-cmd --version
          # 4. 기본 정책
          sudo firewall-cmd --info-zone=public
        예상 출력 `running / public (active) / target: default / interfaces ens33`.
        운영 해석: firewalld 는 zone 기반 추상. 멀티 인터페이스 정책 친화.
      - |
        **[OSS] /etc/nftables.conf + git audit** — IaC.
          # 1. 영구 정책 파일 조회
          sudo cat /etc/nftables.conf
          # 2. syntax 검증
          sudo nft -c -f /etc/nftables.conf && echo "VALID"
          # 3. systemd unit 활성화 상태
          systemctl is-enabled nftables
          # 4. /etc 변경 history (etckeeper)
          cd /etc && sudo git log --oneline nftables.conf | head -5
        예상 출력 `flush ruleset / table inet filter ... / VALID / enabled`.
        운영 해석: 재부팅 후 보존되는 영구 정책. git 으로 audit.
      - |
        **[OSS] nstat / ss (커널 통계)** — 효과 측정.
          # 1. nf_conntrack 통계
          sudo cat /proc/sys/net/netfilter/nf_conntrack_count
          # 2. ss 로 active 연결 (상태별)
          ss -s
          # 3. nstat 으로 IP/TCP 통계
          nstat -a | head
          # 4. 방화벽 drop 카운터 (전체)
          sudo nft list ruleset | grep -E 'counter|policy'
        예상 출력 `nf_conntrack_count 1234 / Total: 567 / IP/TCP 통계`.
        운영 해석: 룰뿐 아니라 효과(연결 수, drop 빈도) 도 동시 측정.
      negative_signs:
      - 명령 실행 없이 이론
      - nft list 이외 도구
      - 결과 확인 누락
  target_vm: secu
  fixtures:
  - generator: firewall_log
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/secops-nonai-week01/1/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 2
  instruction: secu VM에서 Suricata 서비스 상태를 확인하시오.
  hint: systemctl is-active suricata
  category: survey
  points: 10
  answer: systemctl status suricata --no-pager | head -15
  answer_detail: '보안 솔루션 인프라 점검: secu VM에서 Suricata 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: suricata
    field: stdout
    semantic:
      intent: Suricata 서비스 상태 — systemctl is-active suricata 또는 systemctl status suricata
        --no-pager | head -15. IDS 데몬 가동 확인. 패킷 캡처 + 룰 매칭 + alert 생성 전제. 비활성 시 네트워크
        IDS 기능 부재.
      success_criteria:
      - suricata 키워드
      - systemctl 또는 status 실행
      - active 또는 running 출력
      acceptable_methods:
      - systemctl is-active suricata
      - systemctl status suricata --no-pager
      - ps aux | grep suricata
      - suricatasc -c version
      - |
        **[OSS] systemctl (서비스 상태 표준)** — 표준.
          # 1. 활성 여부 (exit code 친화)
          systemctl is-active suricata && echo ACTIVE
          # 2. 자세한 상태 + 최근 로그
          systemctl status suricata --no-pager --lines=10
          # 3. 메타정보 (uptime + memory + cgroup)
          systemctl show suricata --property=ActiveState,ActiveEnterTimestamp,MemoryCurrent
          # 4. 부팅시 자동 시작 여부
          systemctl is-enabled suricata
        예상 출력 `ACTIVE / Active: active (running) / uptime 2h memory 256MB / enabled`.
        운영 해석: is-active = 자동화. show = 메트릭. enabled = 부팅 자동 시작.
      - |
        **[OSS] suricatasc (Suricata 내부 socket)** — 정밀.
          # 1. socket 경로
          sudo ls -la /var/run/suricata/
          # 2. version + uptime
          sudo suricatasc -c version
          sudo suricatasc -c uptime
          # 3. iface 통계 (packet count + drop)
          sudo suricatasc -c iface-stat-dump
          # 4. counters dump (alert, decode, flow)
          sudo suricatasc -c dump-counters | jq '.detect_alert, .decoder_pkt'
        예상 출력 `version: 7.0.x / uptime: 2h / packets received: 12345, drops: 0 / alerts: 234`.
        운영 해석: process internal 메트릭. drops 증가 = NIC 병목.
      - |
        **[OSS] journalctl (서비스 로그 종합)** — 진단.
          # 1. 최근 1시간 로그
          sudo journalctl -u suricata --since '1h ago' --no-pager
          # 2. error 만
          sudo journalctl -u suricata -p err --since today
          # 3. 시작·정지·reload 이벤트
          sudo journalctl -u suricata | grep -E 'Started|Stopped|Reload|Configuration'
          # 4. live tail
          sudo journalctl -u suricata -f
        예상 출력 `Started Suricata IDS / Configuration loaded / Reloading rules`.
        운영 해석: systemd journal = 기본 로그. start/stop/reload + error 감지.
      - |
        **[OSS] ps + cgroup 통합 (process tree)** — 진단.
          # 1. process list (자식 포함)
          ps auxf | grep -E 'suricata|Suricata' | grep -v grep
          # 2. systemd cgroup tree
          systemd-cgls /system.slice/suricata.service
          # 3. PID + open file descriptor
          PID=$(pgrep -x suricata | head -1)
          ls /proc/$PID/fd 2>/dev/null | wc -l
          # 4. memory + CPU 시계열
          top -b -n 1 -p $PID
        예상 출력 `suricata PID 1234 RSS 256MB / FDs 128 / CPU 8%`.
        운영 해석: PID + FD + memory. memory leak 조기 감지.
      - |
        **[OSS] eve.json 활성도 (실시간 검증)** — 데이터.
          # 1. 파일 존재 + mtime (최근 갱신?)
          sudo ls -la /var/log/suricata/eve.json
          # 2. 최근 5초 갱신 여부 (활성 트래픽)
          sudo find /var/log/suricata -name 'eve.json' -mmin -1
          # 3. event_type 분포 (최근 1000건)
          sudo tail -1000 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c
          # 4. inotifywait 으로 실시간 변경
          sudo timeout 5 inotifywait -m -e modify /var/log/suricata/eve.json
        예상 출력 `eve.json 12MB mtime 1초 전 / event_type 분포 flow 80% alert 5%`.
        운영 해석: systemctl active 외 데이터 흐름까지 검증. dead 와 운영 구분.
      negative_signs:
      - 명령 실행 없이 이론
      - Wazuh/other 서비스 혼동
      - 상태 해석 누락
  target_vm: secu
- order: 3
  instruction: web VM({{WEB_IP}})에서 Apache + ModSecurity 모듈 로드 상태를 확인하시오.
  hint: apachectl -M | grep security
  category: survey
  points: 10
  answer: apachectl -M 2>/dev/null | grep -i security
  answer_detail: '보안 솔루션 인프라 점검: web VM(10.20.30.80)에서 Apache + ModSecurity 모듈 로드
    상태를 확인하시오.'
  verify:
    type: output_contains
    expect: security
    field: stdout
    semantic:
      intent: web VM Apache ModSecurity 모듈 — apachectl -M 2>/dev/null | grep -i security.
        WAF 기능 (ModSecurity/security2_module) 로드 확인. OWASP CRS 전제. 로드 안 되면 웹 공격 필터링
        불가.
      success_criteria:
      - security 키워드
      - apachectl -M 명령
      - ModSecurity 모듈 확인
      acceptable_methods:
      - apachectl -M | grep security
      - apache2ctl -M (Debian)
      - httpd -M (RHEL)
      - /etc/apache2/mods-enabled/ 디렉토리 조회
      - |
        **[OSS] apachectl + grep (모듈 로드 표준)** — 표준.
          # 1. ModSecurity 모듈 검색
          sudo apachectl -M 2>/dev/null | grep -i security
          # 2. 모든 모듈 (검토)
          sudo apachectl -M 2>/dev/null | head -30
          # 3. mods-enabled 직접 (Debian/Ubuntu)
          sudo ls -la /etc/apache2/mods-enabled/ | grep -i security
          # 4. apache2 binary 정보 (compile-in 모듈)
          sudo apache2 -V 2>&1 | head
        예상 출력 `security2_module (shared)`.
        운영 해석: shared = .so 동적 로드. compile-in 보다 운영 친화 (재기동 없이 비활성).
      - |
        **[OSS] modsecurity 설정 검증** — 표준.
          # 1. modsecurity 설정 디렉토리
          sudo cat /etc/modsecurity/modsecurity.conf | grep -E '^SecRuleEngine|^SecAuditEngine'
          # 2. CRS 룰 갯수
          sudo ls /etc/modsecurity/crs/rules/REQUEST-*.conf 2>/dev/null | wc -l
          # 3. 설치된 패키지
          dpkg -l | grep -E 'modsecurity|apache2' | head
          # 4. ldd 로 .so 의존성
          ldd /usr/lib/apache2/modules/mod_security2.so | head -5
        예상 출력 `SecRuleEngine On / SecAuditEngine RelevantOnly / 룰 23개`.
        운영 해석: SecRuleEngine On = 차단 모드. DetectionOnly = log only. 운영 정책.
      - |
        **[OSS] Apache 동작 검증 (응답 헤더)** — 동작.
          # 1. Apache 응답 + Server 헤더
          curl -sI http://localhost/ | head
          # 2. ModSecurity 가 차단 트리거 (간단 SQLi)
          curl -sI 'http://localhost/?q=test%27+OR+1=1--'
          # 3. ModSecurity 의 audit log 살펴보기
          sudo tail -10 /var/log/apache2/modsec_audit.log
          # 4. error.log 의 ModSec 메시지
          sudo tail -20 /var/log/apache2/error.log | grep -i modsec
        예상 출력 `HTTP/1.1 200 OK / 두 번째: 403 Forbidden / [client] ModSecurity ...`.
        운영 해석: 단순 응답 + 단순 SQLi → 403 동작 = 활성화 + 정책 정상.
      - |
        **[OSS] ModSecurity packaging + compile flag** — 진단.
          # 1. 설치된 ModSecurity 버전
          dpkg -s libapache2-mod-security2 2>/dev/null | grep -E 'Version|Status'
          # 2. CRS 버전
          sudo head -5 /etc/modsecurity/crs/crs-setup.conf | grep -i version
          sudo head -5 /usr/share/modsecurity-crs/rules/REQUEST-901-INITIALIZATION.conf 2>/dev/null
          # 3. apache2 의 listening port
          sudo ss -tlnp | grep apache2
          # 4. ModSec 통계 (audit log 크기 + count)
          sudo wc -l /var/log/apache2/modsec_audit.log
          sudo du -sh /var/log/apache2/
        예상 출력 `Version 2.9.x / CRS v3.3 / Listening 80,443 / audit 12345 lines`.
        운영 해석: 버전·CRS·port·로그 전체 가시화. SOC 표준 점검.
      - |
        **[OSS] WAF 효과 (테스트 페이로드)** — 검증.
          # 1. CRS 룰 ID 별 매칭 (audit log)
          sudo grep -oE 'id "[0-9]+"' /var/log/apache2/modsec_audit.log | sort | uniq -c | sort -rn | head
          # 2. paranoia level 확인
          sudo grep -E 'paranoia_level' /etc/modsecurity/crs/crs-setup.conf
          # 3. 차단 응답 확인 (curl 다양 payload)
          for p in '<script>' "' OR 1=1--" "../../etc/passwd"; do
            ENC=$(python3 -c "import urllib.parse;print(urllib.parse.quote('$p'))")
            CODE=$(curl -sS -o /dev/null -w '%{http_code}' "http://localhost/?q=$ENC")
            echo "$p → $CODE"
          done
          # 4. ModSec 매칭 통계
          sudo grep -c 'Access denied' /var/log/apache2/modsec_audit.log
        예상 출력 `941100: 12 / 942100: 8 / paranoia 1 / 403,403,403 / Access denied: 23`.
        운영 해석: CRS 룰별 매칭 빈도 + paranoia 수준 + 실제 차단. WAF 운영 효과.
      negative_signs:
      - apachectl 미사용
      - grep security 필터 없음
      - WAF 맥락 없음
  target_vm: web
- order: 4
  instruction: siem VM({{SECU_IP}}00)에서 Wazuh Manager 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-manager
  category: survey
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): systemctl is-active wazuh-manager || echo inactive'
  answer_detail: '보안 솔루션 인프라 점검: siem VM(10.20.30.100)에서 Wazuh Manager 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: 'Wazuh Manager 서비스 상태 — systemctl is-active wazuh-manager 또는 UI Dashboard
        Management → Status. SIEM 핵심 엔진: 로그 수집 + 디코딩 + 룰 매칭 + alert. 비활성 시 모든 SOC
        기능 마비.'
      success_criteria:
      - active 키워드
      - wazuh-manager 서비스 대상
      - systemctl 또는 UI 확인
      acceptable_methods:
      - systemctl is-active wazuh-manager
      - systemctl status wazuh-manager --no-pager
      - /var/ossec/bin/wazuh-control status
      - Wazuh API /manager/status
      - |
        **[OSS] systemctl + wazuh-control (이중 검증)** — 표준.
          # 1. systemd unit 활성
          systemctl is-active wazuh-manager && echo "ACTIVE"
          # 2. wazuh 자체 control (모든 sub-daemon 확인)
          sudo /var/ossec/bin/wazuh-control status
          # 3. analysisd / remoted / monitord / db / api 등
          sudo /var/ossec/bin/wazuh-control status | grep -E 'is running|not running'
          # 4. 시작 시간
          systemctl show wazuh-manager --property=ActiveEnterTimestamp,ActiveState
        예상 출력 `wazuh-analysisd is running / wazuh-remoted is running / ... 8 daemons`.
        운영 해석: systemctl + wazuh-control 둘 다 정상 = 8 daemon 모두 ready.
      - |
        **[OSS] Wazuh API /manager/status (REST)** — 운영자 표준.
          # 1. token 획득
          T=$(curl -sk -u admin:<pass> -X POST 'https://10.20.30.100:55000/security/user/authenticate?raw=true')
          # 2. manager status
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/manager/status' | jq .
          # 3. info (버전 + cluster)
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/manager/info' | jq .
          # 4. version
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/manager/version/check' | jq .
        예상 출력 `wazuh-analysisd: running / wazuh-remoted: running / version 4.x.y`.
        운영 해석: API 응답 = manager 가 외부 통신 ready. dashboard 도 동일 backend.
      - |
        **[OSS] Wazuh Dashboard (UI)** — 분석가 표준.
          # 1. 브라우저 → https://10.20.30.100 → admin 로그인
          # 2. Server management → Status
          # 3. 8 daemon 상태 panel (analysisd, remoted, monitord, db, api, exec, modulesd, integrator)
          # 4. CLI 검증
          T=$(curl -sk -u admin:<pass> -X POST 'https://10.20.30.100:55000/security/user/authenticate?raw=true')
          curl -sk -H "Authorization: Bearer $T" 'https://10.20.30.100:55000/manager/status' | jq -r '.data.affected_items[] | "\(.process)\t\(.status)"'
        UI 동작: panel 별 상태 + 시계열 + uptime.
        운영 해석: 비기술 운영자 표준 dashboard. SOC daily 점검.
      - |
        **[OSS] journalctl + Wazuh 자체 로그** — 진단.
          # 1. systemd 로그
          sudo journalctl -u wazuh-manager --since '1h ago' --no-pager
