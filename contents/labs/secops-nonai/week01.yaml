- order: 99
  instruction: "[복합 시나리오] SOC 첫 출근 — \"5 layer 다 켜져 있는데 왜 침해를 놓치지?\"\n\n## 상황 (몰입을\
    \ 위한 배경)\n\n당신은 ABC 핀테크 회사 SOC (Security Operations Center) 의 신규 분석가다.\n오늘 첫 출근.\
    \ 인수인계 자료에는 한 줄만 적혀 있다:\n\n> \"우리 SOC 는 5 layer Defense in Depth — nftables 방화벽\
    \ + Suricata IDS +\n>  ModSecurity WAF + Wazuh SIEM + OpenCTI Threat Intel — 모두\
    \ 운영 중.\"\n\n옆 자리 선임이 커피를 쥐고 와서 한 마디 흘리고 갔다.\n\n> \"5 layer 다 켜져 있다고 다 일하고 있다는\
    \ 뜻은 아냐. 지난달 ransomware 침해는\n>  4번째 layer (Wazuh) 에서 잡았어. 만약 우리가 firewall 만 봤다면\
    \ evidence 의\n>  5.7% 만 보고 흘려보냈을 거야. 너 들어왔으니, 매트릭스 한 번 그려봐 —\n>  5 layer 가 *진짜*\
    \ 일하고 있는지, 어느 vector 가 어느 layer 에 흔적 남기는지.\n>  다음 주 첫 incident drill 전에 팀에 보고해.\"\
    \n\n교안 §\"실제 사례 — 1개 보안 layer 만 있으면 어떤 일이 벌어지나\" 에서 본 그 5.7%.\n실제 운영 SOC 1년치 데이터로\
    \ 검증된 수치다. 이제 본인 환경에서 검증할 차례다.\n\n※ 본 과정은 Non-AI 트랙이므로 모든 명령은 학생이 *직접* SSH 접속·실행·결과\
    \ 캡처한다.\n  Bastion 자동 실행은 사용하지 않는다.\n\n## 임무 (4 단계, 약 35분)\n\n### Phase A — \"\
    5 layer 가 정말 살아있는가\" (10분)\n\n여기서 함정 — `systemctl is-active` 만 확인하면 안 된다. 살아있어도\
    \ 룰셋이 비어있으면\n*dead 와 동일* 하다 (예: nftables active 인데 룰 0개면 모든 트래픽 통과).\n\n각 layer\
    \ 한 줄씩 표 작성 (학생이 직접 SSH 접속 후 명령 실행):\n\n  | layer | active? | 룰셋 카운트 | 최근 1h 로그\
    \ entry |\n  | nft     | ?       | ?           | ?                  |\n  | Suricata|\
    \ ?       | ?           | ?                  |\n  | ModSec  | ?       | ?    \
    \       | ?                  |\n  | Wazuh   | ?       | ?           | ?      \
    \            |\n  | OpenCTI | ?       | ?           | ?                  |\n\n\
    어느 한 항목이라도 0/dead 면 그 layer 는 사실상 무용 (Phase D 에서 보고 항목).\n\n학생 직접 실행 명령:\n  -\
    \ `ssh ccc@10.20.30.1 \"sudo nft list ruleset | wc -l\"`\n  - `ssh ccc@10.20.30.1\
    \ \"systemctl is-active suricata; ls /etc/suricata/rules/*.rules | wc -l\"`\n\
    \  - `ssh ccc@10.20.30.80 \"apachectl -M | grep security; ls /etc/modsecurity/crs/rules/\
    \ | wc -l\"`\n  - `ssh ccc@10.20.30.100 \"systemctl is-active wazuh-manager; wc\
    \ -l < /var/ossec/etc/rules/local_rules.xml\"`\n  - `curl -s http://10.20.30.100:8080/api/feeds\
    \ | jq length` (OpenCTI)\n\n### Phase B — \"5 attack vector 시뮬레이션\" (5분)\n\n실제\
    \ 침해까지는 아니지만 *각 layer 가 신호 발생할 만큼만* 시도한다. destructive 금지 —\nlog/alert 만 발생시키는\
    \ 수준. 5 vector 각각 1분 내 (학생이 attacker VM 에서 직접 실행):\n\n1. **포트 스캔** (네트워크 정찰)\n\
    \   `nmap -sS -F 10.20.30.80` (attacker → web, 100 포트)\n   *예상*: nft counter 증가\
    \ + Suricata \"ET SCAN\" alert.\n\n2. **SQL Injection 시도** (애플리케이션 공격)\n   `curl\
    \ 'http://10.20.30.80:3000/rest/products/search?q=1%27+OR+1=1--'`\n   *예상*: ModSec\
    \ CRS 942100 매칭 + Apache access log.\n\n3. **SSH Brute Force** (인증 공격, 3 시도만)\n\
    \   `hydra -l ccc -P /tmp/3pwds.txt ssh://10.20.30.80 -t 1`\n   *예상*: Wazuh authentication_failed\
    \ rule 발화.\n\n4. **Phishing 도메인 DNS 조회** (CTI 매칭)\n   `dig +short malicious-test.invalid\
