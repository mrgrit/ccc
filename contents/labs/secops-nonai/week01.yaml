          sudo tail -1000 /var/ossec/logs/alerts/alerts.json | wc -l
          # 4. high level (≥10) 갯수
          sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.rule.level>=10)' | wc -l
        예상 출력 `최근 alerts JSON 3건 / 1000 lines / 12 high-level`.
