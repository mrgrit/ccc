- order: 99
  instruction: |
    [복합 시나리오] SOC 첫 출근 — "5 layer 다 켜져 있는데 왜 침해를 놓치지?"

    ## 상황 (몰입을 위한 배경)

    당신은 ABC 핀테크 회사 SOC (Security Operations Center) 의 신규 분석가다.
    오늘 첫 출근. 인수인계 자료에는 한 줄만 적혀 있다:

    > "우리 SOC 는 5 layer Defense in Depth — nftables 방화벽 + Suricata IDS +
    >  ModSecurity WAF + Wazuh SIEM + OpenCTI Threat Intel — 모두 운영 중."

    옆 자리 선임이 커피를 쥐고 와서 한 마디 흘리고 갔다.

    > "5 layer 다 켜져 있다고 다 일하고 있다는 뜻은 아냐. 지난달 ransomware 침해는
    >  4번째 layer (Wazuh) 에서 잡았어. 만약 우리가 firewall 만 봤다면 evidence 의
    >  5.7% 만 보고 흘려보냈을 거야. 너 들어왔으니, 매트릭스 한 번 그려봐 —
    >  5 layer 가 *진짜* 일하고 있는지, 어느 vector 가 어느 layer 에 흔적 남기는지.
    >  다음 주 첫 incident drill 전에 팀에 보고해."

    교안 §"실제 사례 — 1개 보안 layer 만 있으면 어떤 일이 벌어지나" 에서 본 그 5.7%.
    실제 운영 SOC 1년치 데이터로 검증된 수치다. 이제 본인 환경에서 검증할 차례다.

    ※ 본 과정은 Non-AI 트랙이므로 모든 명령은 학생이 *직접* SSH 접속·실행·결과 캡처한다.
      Bastion 자동 실행은 사용하지 않는다.

    ## 임무 (4 단계, 약 35분)

    ### Phase A — "5 layer 가 정말 살아있는가" (10분)

    여기서 함정 — `systemctl is-active` 만 확인하면 안 된다. 살아있어도 룰셋이 비어있으면
    *dead 와 동일* 하다 (예: nftables active 인데 룰 0개면 모든 트래픽 통과).

    각 layer 한 줄씩 표 작성 (학생이 직접 SSH 접속 후 명령 실행):

      | layer | active? | 룰셋 카운트 | 최근 1h 로그 entry |
      | nft     | ?       | ?           | ?                  |
      | Suricata| ?       | ?           | ?                  |
      | ModSec  | ?       | ?           | ?                  |
      | Wazuh   | ?       | ?           | ?                  |
      | OpenCTI | ?       | ?           | ?                  |

    어느 한 항목이라도 0/dead 면 그 layer 는 사실상 무용 (Phase D 에서 보고 항목).

    학생 직접 실행 명령:
      - `ssh ccc@10.20.30.1 "sudo nft list ruleset | wc -l"`
      - `ssh ccc@10.20.30.1 "systemctl is-active suricata; ls /etc/suricata/rules/*.rules | wc -l"`
      - `ssh ccc@10.20.30.80 "apachectl -M | grep security; ls /etc/modsecurity/crs/rules/ | wc -l"`
      - `ssh ccc@10.20.30.100 "systemctl is-active wazuh-manager; wc -l < /var/ossec/etc/rules/local_rules.xml"`
      - `curl -s http://10.20.30.100:8080/api/feeds | jq length` (OpenCTI)

    ### Phase B — "5 attack vector 시뮬레이션" (5분)

    실제 침해까지는 아니지만 *각 layer 가 신호 발생할 만큼만* 시도한다. destructive 금지 —
    log/alert 만 발생시키는 수준. 5 vector 각각 1분 내 (학생이 attacker VM 에서 직접 실행):

    1. **포트 스캔** (네트워크 정찰)
       `nmap -sS -F 10.20.30.80` (attacker → web, 100 포트)
       *예상*: nft counter 증가 + Suricata "ET SCAN" alert.

    2. **SQL Injection 시도** (애플리케이션 공격)
       `curl 'http://10.20.30.80:3000/rest/products/search?q=1%27+OR+1=1--'`
       *예상*: ModSec CRS 942100 매칭 + Apache access log.

    3. **SSH Brute Force** (인증 공격, 3 시도만)
       `hydra -l ccc -P /tmp/3pwds.txt ssh://10.20.30.80 -t 1`
       *예상*: Wazuh authentication_failed rule 발화.

    4. **Phishing 도메인 DNS 조회** (CTI 매칭)
       `dig +short malicious-test.invalid @10.20.30.100`
       *예상*: OpenCTI threat indicator 매칭 (feed 활성 시).

    5. **EICAR 멀웨어 다운로드 시도** (signature 매칭)
       `curl http://eicar-test.local/test.txt -o /tmp/x.test`
       *예상*: Suricata + Wazuh FIM (파일 생성 감지).

    각 시뮬 직후 2~5초 정도 뒤 5 layer 의 로그/alert 를 학생이 직접 SSH 로 확인:
      - `ssh ccc@10.20.30.1 "sudo nft list ruleset | grep counter"`
      - `ssh ccc@10.20.30.1 "tail -50 /var/log/suricata/eve.json | grep -c alert"`
      - `ssh ccc@10.20.30.80 "tail -50 /var/log/apache2/modsec_audit.log"`
      - `ssh ccc@10.20.30.100 "tail -100 /var/ossec/logs/alerts/alerts.log"`
      - `curl http://10.20.30.100:8080/api/observables/recent`

    ### Phase C — "Cross-layer matrix" (15분, 가장 중요)

    Phase B 의 5 vector × Phase A 의 5 layer = **25 cell 매트릭스** 작성.
    각 cell 에 4 가지 중 하나 + evidence 출처:

      - **block** — 차단됨 (예: "nft input chain DROP, counter +12")
      - **detect** — alert 발생, 트래픽은 통과 (예: "Suricata eve.json SID=2010937, 3 alert")
      - **log** — 기록만, alert 없음 (예: "Apache access.log line 42, no rule match")
      - **none** — 흔적 없음 (이 layer 가 못 봄)

    | Vector \\ Layer | nft | Suricata | ModSec | Wazuh | OpenCTI |
    |-----------------|-----|----------|--------|-------|---------|
    | port scan       | ?   | ?        | ?      | ?     | ?       |
    | SQLi            | ?   | ?        | ?      | ?     | ?       |
    | SSH brute       | ?   | ?        | ?      | ?     | ?       |
    | phishing DNS    | ?   | ?        | ?      | ?     | ?       |
    | EICAR DL        | ?   | ?        | ?      | ?     | ?       |

    ### Phase D — "선임에게 3줄 보고" (5분)

    매트릭스 완성 후, 옆 선임에게 보낼 *3 줄 메모*:

    1. **가장 활발한 layer**: 어느 layer 가 가장 많은 cell 에 evidence 를 남겼나?
       (예: "Wazuh 가 5/5 vector 모두 log 또는 detect — 본 SOC 의 핵심 가시성 layer")

    2. **dead layer**: none 만 5개인 layer 가 있나? 있으면 다음 주까지 보강해야 함.
       (예: "OpenCTI 가 5/5 none — feed 활성화 안 됨, 다음 주 incident drill 전 enrichment 무용")

    3. **다음 주 drill 전 보강 우선순위 1개**: dead layer 가 가장 우선. 또는 1 vector 가
       0 evidence 면 그 vector 의 detection rule 추가가 우선.

    ## 학습 포인트 (Phase D 직후 학생이 갖게 되는 통찰)

    교안의 "1 layer 만이면 5.7%" 는 dataset 평균 — 본인 환경은 layer 별 활성도와 룰셋
    현황에 따라 다르다. **이 매트릭스가 본인 SOC 의 실제 가시성 점수다.**
    다음 주차 (w02 nftables 심화) 부터는 매주 이 매트릭스를 갱신해 가시성 변화를 추적한다.

    ## Non-AI 트랙 제출물

    Phase A 표 / Phase B 5 vector 시뮬 명령·결과 / Phase C 25 cell matrix /
    Phase D 3줄 메모 — 4 산출물을 lab 제출 페이지의 Cyber Range 답변 textarea 에
    `$ command` + 출력 형식으로 붙여넣어 제출.
