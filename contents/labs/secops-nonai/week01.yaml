          curl -sk -u admin:<pass> 'https://10.20.30.100:9200/wazuh-alerts-*/_search?size=5' | jq '.hits.hits[]._source | {ts:.["@timestamp"], rule:.rule.description}'
        UI 동작: timeline + KQL + chart + saved search.
