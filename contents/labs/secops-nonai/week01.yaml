          sudo grep -A 20 '^rule-files:' /etc/suricata/suricata.yaml
          # 2. default-rule-path 확인
          sudo grep -E '^default-rule-path' /etc/suricata/suricata.yaml
          # 3. yq 로 정확 파싱
          sudo apt install -y yq
          sudo yq '.["rule-files"]' /etc/suricata/suricata.yaml
          # 4. 활성 .rules 파일 ↔ default-path 매칭
          sudo find $(sudo grep -E '^default-rule-path' /etc/suricata/suricata.yaml | awk '{print $2}') -name '*.rules' | wc -l
        예상 출력 `rule-files: - suricata.rules / default-rule-path: /var/lib/suricata/rules`.
        운영 해석: yaml 의 rule-files 와 실제 파일 개수가 일치해야 정상.
      - |
        **[OSS] suricatasc 로 활성 룰 갯수** — runtime.
          # 1. process 가 실제 로드한 룰 수
          sudo suricatasc -c reload-rules
          sudo suricatasc -c dump-counters | jq '.detect | {rules_loaded, alerts}'
          # 2. iface 별 통계
          sudo suricatasc -c iface-stat-dump
          # 3. 룰 reload 후 변화
          # ... 새 룰 추가 후 reload-rules → counter 재시작
          sudo suricatasc -c uptime
        예상 출력 `rules_loaded: 30234 / alerts: 234 / uptime 2h`.
        운영 해석: runtime 룰 갯수 = 실제 적용. 파일 갯수와 일치 확인.
      - |
        **[OSS] rule classification + sid 분포** — 분석.
          # 1. classtype 별 룰 수 (어떤 공격 유형 강한가)
          sudo grep -hoE 'classtype:[a-z-]+' /etc/suricata/rules/*.rules /var/lib/suricata/rules/*.rules 2>/dev/null | sort | uniq -c | sort -rn | head
          # 2. 활성 sid 범위
          sudo grep -hoE 'sid:[0-9]+' /var/lib/suricata/rules/suricata.rules 2>/dev/null | sort -u | head
          # 3. 우리 local 룰만
          sudo grep -hoE 'sid:[0-9]+' /etc/suricata/rules/local.rules 2>/dev/null | wc -l
          # 4. 가장 많은 카테고리 (.rules 파일 별)
          for f in /etc/suricata/rules/*.rules; do echo "$(basename $f): $(grep -c '^alert' $f)"; done | sort -t: -k2 -rn | head
        예상 출력 `web-application-attack 5234 / trojan-activity 3210 / emerging-malware.rules 4500`.
        운영 해석: classification 분포 = SOC 의 강·약점. local.rules 만 자체 룰.
      negative_signs:
      - 파일 카운트 없이 목록만
      - '*.rules 필터 누락'
      - 총 수치 누락
