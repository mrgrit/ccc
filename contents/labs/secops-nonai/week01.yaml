- order: 9
  instruction: web VM에서 ModSecurity CRS 룰 디렉터리 목록을 확인하시오.
  hint: ls /etc/modsecurity/crs/rules/ 2>/dev/null | head
  category: analysis
  points: 10
  answer: ls /etc/modsecurity/crs/rules/ 2>/dev/null | head -5 || ls /usr/share/modsecurity-crs/rules/
    2>/dev/null | head -5
  answer_detail: '보안 솔루션 인프라 점검: web VM에서 ModSecurity CRS 룰 디렉터리 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: rules
    field: stdout
    semantic:
      intent: ModSecurity CRS 룰 디렉터리 — ls /etc/modsecurity/crs/rules/ 또는 /usr/share/modsecurity-crs/rules/.
        OWASP Core Rule Set 파일 목록 (REQUEST-*.conf/RESPONSE-*.conf). WAF 탐지 룰 핵심 디렉토리.
        CRS v3.x / v4.x.
      success_criteria:
      - rules 키워드
      - ls 디렉토리 조회
      - CRS 또는 modsecurity 경로
      acceptable_methods:
      - ls /etc/modsecurity/crs/rules/
      - ls /usr/share/modsecurity-crs/rules/
      - find / -name 'REQUEST-*.conf' 2>/dev/null
      - apt list --installed | grep modsecurity
      - |
        **[OSS] ls + find (CRS 디렉토리 표준)** — 표준.
          # 1. 두 표준 위치 모두 확인
          sudo ls /etc/modsecurity/crs/rules/ 2>/dev/null | head -10
          sudo ls /usr/share/modsecurity-crs/rules/ 2>/dev/null | head -10
          # 2. REQUEST + RESPONSE 분류
          sudo ls /usr/share/modsecurity-crs/rules/ | grep -E '^REQUEST|^RESPONSE' | wc -l
          # 3. .conf 파일 갯수 (총 룰셋 갯수)
          sudo find /usr/share/modsecurity-crs/rules/ -name '*.conf' | wc -l
          # 4. find 으로 시스템 전체 검색
          sudo find / -name 'REQUEST-901-INITIALIZATION.conf' 2>/dev/null
        예상 출력 `crs-setup.conf REQUEST-901 ... RESPONSE-959 / 23 conf files`.
        운영 해석: REQUEST-9xx = inbound 검사, RESPONSE-9xx = outbound. 합 23 .conf.
      - |
        **[OSS] CRS 룰 갯수 + paranoia level** — 정량.
          # 1. SecRule 갯수 (모든 conf)
          sudo grep -c '^SecRule' /usr/share/modsecurity-crs/rules/*.conf 2>/dev/null | awk -F: '{sum+=$2}END{print "Total SecRule:", sum}'
          # 2. paranoia level (1-4)
          sudo grep -E 'tx.paranoia_level' /etc/modsecurity/crs/crs-setup.conf | head
          # 3. paranoia 별 룰 분포
          for p in 1 2 3 4; do
            cnt=$(sudo grep -c "tag:'paranoia-level/$p'" /usr/share/modsecurity-crs/rules/*.conf 2>/dev/null | awk -F: '{sum+=$2}END{print sum}')
            echo "Paranoia $p: $cnt rules"
          done
          # 4. CRS 버전
          sudo grep 'rule \"id:900990\"' /etc/modsecurity/crs/crs-setup.conf | head
        예상 출력 `Total SecRule: 1234 / paranoia_level=1 / Paranoia 1: 600 / 2: 300 / 3: 200 / 4: 134`.
        운영 해석: paranoia level 높을수록 strict + FP 많음. 1=안전 default, 2=권장.
      - |
        **[OSS] dpkg / apt (패키지 정보)** — 환경.
          # 1. 설치된 ModSec 패키지
          dpkg -l | grep -iE 'modsecurity|crs'
          # 2. 패키지 파일 목록
          dpkg -L modsecurity-crs | head
          # 3. 버전 + maintainer
          apt show modsecurity-crs | head
          apt show libapache2-mod-security2 | head
          # 4. 설치된 ModSec 의 의존 라이브러리
          dpkg -L libapache2-mod-security2 | grep '\.so'
        예상 출력 `modsecurity-crs 3.3.2 / libapache2-mod-security2 2.9.6 / mod_security2.so`.
        운영 해석: 버전·의존성 명확. CVE 대비 + upgrade plan.
      - |
        **[OSS] git clone OWASP CRS (최신 룰)** — 운영.
          # 1. 공식 OWASP CRS clone
          git clone https://github.com/coreruleset/coreruleset.git /tmp/crs-latest
          cd /tmp/crs-latest
          # 2. 룰 파일 비교 (현재 vs 최신)
          diff -q /usr/share/modsecurity-crs/rules /tmp/crs-latest/rules | head
          # 3. 최신 release tag
          git tag --sort=-creatordate | head -5
          # 4. 변경된 룰 ID (어느 룰 추가/수정?)
          git log --oneline rules/ | head -10
        예상 출력 `v4.0.0 v3.3.5 v3.3.4 / Only in /tmp/crs-latest: REQUEST-922-MULTIPART-ATTACK.conf`.
        운영 해석: 최신 룰 추적. 분기별 update 권장.
      - |
        **[OSS] crs-setup.conf 정책 검토** — 정확.
          # 1. crs-setup.conf 의 핵심 정책
          sudo grep -E '^[^#].*tx\.' /etc/modsecurity/crs/crs-setup.conf | head -10
          # 2. anomaly_score threshold
          sudo grep -E 'inbound_anomaly_score|outbound_anomaly_score' /etc/modsecurity/crs/crs-setup.conf
          # 3. exclude_directives (성능 우회)
          sudo grep -E '^SecAction.*900' /etc/modsecurity/crs/crs-setup.conf
          # 4. before-crs / after-crs 사용자 설정
          sudo ls /etc/modsecurity/include-before*.conf /etc/modsecurity/include-after*.conf 2>/dev/null
        예상 출력 `paranoia_level=1 / inbound_anomaly_score_threshold=5 / outbound_anomaly_score_threshold=4`.
        운영 해석: anomaly threshold 가 차단 결정 — 룰 score 합 >= threshold 시 block.
      negative_signs:
      - 디렉토리 미확인
      - CRS 경로 혼동
      - 파일 없음 응답 무시
