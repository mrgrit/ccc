lab_id: secops-nonai-week03
title: nftables 실전 — NAT, 화이트리스트, 레이트리밋
version: non-ai
course: secops-nonai
week: 3
description: masquerade NAT, 화이트리스트/블랙리스트, 연결 레이트리밋 등 실전 nftables 기법을 적용한다.
difficulty: medium
duration_minutes: 120
objectives:
- masquerade NAT 룰을 작성할 수 있다
- set(ip saddr) 기반 화이트리스트·블랙리스트를 구성할 수 있다
- ct state new limit으로 레이트리밋을 적용할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 'whitelist' 테이블을 만들고 input 체인을 생성하시오.
  hint: nft add table; nft add chain
  category: configure
  points: 10
  answer: sudo nft add table inet whitelist && sudo nft add chain inet whitelist input
    '{ type filter hook input priority 0 \; policy drop \; }'
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: secu VM에 inet ''whitelist'' 테이블을
    만들고 input 체인을 생성하시오.'
  verify:
    type: output_contains
    expect: whitelist
    field: stdout
    semantic:
      intent: whitelist 테이블 + policy drop — sudo nft add table inet whitelist && sudo
        nft add chain inet whitelist input '{ type filter hook input priority 0 \;
        policy drop \; }'. policy drop = 기본 차단 (deny-all). 화이트리스트 IP 만 허용 전제. zero-trust
        네트워크 원칙.
      success_criteria:
      - whitelist 키워드
      - policy drop 체인
      - add table + add chain
      acceptable_methods:
      - nft add table inet whitelist + add chain policy drop
      - iptables -P INPUT DROP (legacy)
      - firewalld drop zone
      - NIST SP 800-41 deny-all default
      - |
        **[OSS] nft (Zero Trust 표준)** — 표준.
          # 1. table + chain policy drop
          sudo nft add table inet whitelist
          sudo nft 'add chain inet whitelist input { type filter hook input priority 0 ; policy drop ; }'
          # 2. SSH lockout 회피 룰 (필수)
          sudo nft 'add rule inet whitelist input tcp dport 22 ip saddr 10.20.30.0/24 counter accept'
          # 3. 검증
          sudo nft -j list table inet whitelist | jq '.nftables[] | select(.chain) | {policy, hook}'
          # 4. atomic 적용 (실패 시 rollback)
          sudo nft -c -f /tmp/wl.nft
        예상 출력 `chain { policy: drop, hook: input } / SSH accept rule`.
        운영 해석: policy drop = Zero Trust. SSH lockout 회피 룰 필수.
      - |
        **[OSS] firewalld drop zone (RHEL/CentOS)** — 표준 alt.
          # 1. drop zone 활성화 (deny-all)
          sudo firewall-cmd --permanent --new-zone=whitelist 2>/dev/null
          sudo firewall-cmd --permanent --zone=whitelist --set-target=DROP
          # 2. SSH 만 허용
          sudo firewall-cmd --permanent --zone=whitelist --add-service=ssh
          # 3. apply
          sudo firewall-cmd --reload
          # 4. 검증
          sudo firewall-cmd --info-zone=whitelist
        예상 출력 `target: DROP / services: ssh`.
        운영 해석: zone target DROP = 명시적 허용 외 차단. enterprise.
      - |
        **[OSS] iptables -P INPUT DROP (legacy)** — 마이그레이션.
          # 1. legacy 표준
          sudo iptables -P INPUT DROP
          sudo iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
          sudo iptables -A INPUT -i lo -j ACCEPT
          sudo iptables -A INPUT -p tcp --dport 22 -s 10.20.30.0/24 -j ACCEPT
          # 2. 검증
          sudo iptables -L INPUT -nv --line-numbers | head
          # 3. nft 변환
          iptables-save | iptables-translate-restore | head
        예상 출력 `Chain INPUT (policy DROP) / 4 rules`.
        운영 해석: 동일 의미 — nft 가 표현 풍부. 마이그레이션 path.
      - |
        **[OSS] Ansible community.general (멀티 호스트)** — IaC.
          # 1. /etc/ansible/playbooks/whitelist-base.yml
          # ---
          # - hosts: all
          #   tasks:
          #     - name: ensure whitelist table + drop policy
          #       community.general.nftables_table: {family: inet, name: whitelist, state: present}
          #     - name: ensure input chain
          #       community.general.nftables_chain:
          #         family: inet
          #         table: whitelist
          #         name: input
          #         type: filter
          #         hook: input
          #         priority: 0
          #         policy: drop
          # 2. 실행
          ansible-playbook -i inventory whitelist-base.yml --diff
        예상 출력 `changed=2 / chain policy drop applied`.
        운영 해석: 멀티 호스트 표준화. PR review.
      - |
        **[OSS] policy drop 효과 검증 (필수 안전)** — 안전.
          # 1. 적용 전: 모든 ICMP 응답
          ping -c 1 -W 1 10.20.30.1
          # 2. policy drop 적용 후 즉시 검증 (lockout 회피 핵심)
          ssh -o ConnectTimeout=3 ccc@10.20.30.1 'echo SSH OK' || echo "WARN: SSH lockout"
          # 3. 외부 IP 차단 검증 (시뮬)
          # ssh ccc@10.20.30.201 'nc -zv -w 2 10.20.30.1 80' (모든 외부 차단 확인)
          # 4. 룰 효과 (counter 변동)
          sudo nft list chain inet whitelist input | grep counter
        예상 출력 `ping no response / SSH OK (lockout 회피) / 외부 차단`.
        운영 해석: policy drop 후 본인 SSH 즉시 검증 필수. lockout = lab 종료.
      negative_signs:
      - policy accept (화이트리스트 의미 없음)
      - 테이블 이름 혼동
      - drop 개념 없음
  target_vm: secu
- order: 2
  instruction: whitelist 테이블에 set 'allowed_ips'(type ipv4_addr)를 생성하시오.
  hint: nft add set …
  category: configure
  points: 10
  answer: sudo nft add set inet whitelist allowed_ips '{ type ipv4_addr \; }'
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: whitelist 테이블에 set ''allowed_ips''(type
    ipv4_addr)를 생성하시오.'
  verify:
    type: output_contains
    expect: allowed_ips
    field: stdout
    semantic:
      intent: nftables set 'allowed_ips' — sudo nft add set inet whitelist allowed_ips
        '{ type ipv4_addr \; }'. set = 고속 IP 조회 자료구조 (해시 기반). type ipv4_addr = IPv4.
        대량 IP 관리 효율화. CDB / ipset 과 유사.
      success_criteria:
      - allowed_ips 키워드
      - nft add set 명령
      - type ipv4_addr
      acceptable_methods:
      - nft add set + type ipv4_addr
      - ipset create (legacy)
      - nft add set + flags interval (CIDR)
      - JSON API nft -j
      - |
        **[OSS] nft set (다양한 옵션)** — 표준.
          # 1. 기본 set (단일 IP)
          sudo nft 'add set inet whitelist allowed_ips { type ipv4_addr ; }'
          # 2. CIDR 지원 (interval)
          sudo nft 'add set inet whitelist allowed_cidrs { type ipv4_addr ; flags interval ; }'
          # 3. timeout 지원 (자동 만료)
          sudo nft 'add set inet whitelist allowed_temp { type ipv4_addr ; flags timeout ; timeout 1h ; }'
          # 4. 검증
          sudo nft list sets | grep whitelist
          sudo nft -j list set inet whitelist allowed_ips | jq .
        예상 출력 `set allowed_ips { type ipv4_addr } / 3 sets created`.
        운영 해석: 단일 / CIDR / timeout 별 set 분리 = 명확한 정책.
      - |
        **[OSS] ipset (legacy hash:net 비교)** — 마이그레이션.
          # 1. ipset 설치
          sudo apt install -y ipset
          # 2. hash:ip set (단일 IP)
          sudo ipset create allowed_ips_legacy hash:ip counters comment
          # 3. hash:net (CIDR)
          sudo ipset create allowed_cidrs_legacy hash:net
          # 4. iptables 연동
          sudo iptables -I INPUT -m set --match-set allowed_ips_legacy src -j ACCEPT
          sudo ipset list allowed_ips_legacy | head
        예상 출력 `Number of entries: 0 / counters / iptables 매칭 룰 추가`.
        운영 해석: legacy 환경 alternative. nft 마이그레이션 path.
      - |
        **[OSS] nft -j list set + jq (set 분석)** — 자동화.
          # 1. JSON 으로 set 갯수
          sudo nft -j list ruleset | jq '[.nftables[] | select(.set)] | length'
          # 2. set 별 element 갯수
          sudo nft -j list ruleset | jq '.nftables[] | select(.set) | "\(.set.name): \((.set.elem // []) | length) elements"'
          # 3. 특정 set 의 type / flags
          sudo nft -j list set inet whitelist allowed_ips | jq '.nftables[1].set | {type, flags}'
          # 4. 모든 set 의 메타정보 dump
          sudo nft -j list ruleset | jq '[.nftables[] | select(.set) | {name: .set.name, type: .set.type, flags: .set.flags // []}]'
        예상 출력 `set count 3 / allowed_ips: 0 elements / type: ipv4_addr`.
        운영 해석: JSON 으로 정량 분석 + dashboard.
      - |
        **[OSS] Ansible community.general.nftables_set** — IaC.
          # 1. /etc/ansible/playbooks/wl-set.yml
          # ---
          # - hosts: secu
          #   tasks:
          #     - name: ensure allowed_ips set
          #       community.general.nftables_set:
          #         family: inet
          #         table: whitelist
          #         name: allowed_ips
          #         type: ipv4_addr
          #         state: present
          #     - name: ensure allowed_cidrs set
          #       community.general.nftables_set:
          #         family: inet
          #         table: whitelist
          #         name: allowed_cidrs
          #         type: ipv4_addr
          #         flags: [interval]
          #         state: present
          # 2. 실행
          ansible-playbook -i inventory wl-set.yml --diff
        예상 출력 `changed=2 / 2 sets created`.
        운영 해석: idempotent + 다중 set 동시. 표준화.
      - |
        **[OSS] /etc/nftables.conf 영구 정의 + git** — IaC.
          # 1. /etc/nftables.whitelist.conf
          sudo tee /etc/nftables.whitelist.conf <<'EOF'
          table inet whitelist {
            set allowed_ips {
              type ipv4_addr
            }
            set allowed_cidrs {
              type ipv4_addr
              flags interval
            }
            set allowed_temp {
              type ipv4_addr
              flags timeout
              timeout 1h
            }
            chain input {
              type filter hook input priority 0; policy drop;
              ct state established,related accept
              iifname lo accept
              ip saddr @allowed_ips counter accept
              ip saddr @allowed_cidrs counter accept
            }
          }
          EOF
          # 2. syntax 검증
          sudo nft -c -f /etc/nftables.whitelist.conf
          # 3. apply
          sudo nft -f /etc/nftables.whitelist.conf
          # 4. git audit
          cd /etc && sudo git add nftables.whitelist.conf && sudo git commit -m "Add whitelist sets"
        예상 출력 `valid syntax / applied / git commit`.
        운영 해석: IaC + git audit. 변경 history + rollback.
      negative_signs:
      - type 지정 없음
      - set 개념 없음
      - ipv4_addr 대신 기본 타입
  target_vm: secu
- order: 3
  instruction: allowed_ips set에 {{ATTACKER_IP}}(attacker)을 추가하시오.
  hint: nft add element …
  category: configure
  points: 10
  answer: sudo nft add element inet whitelist allowed_ips '{ 10.20.30.201 }'
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: allowed_ips set에 10.20.30.201(attacker)을
    추가하시오.'
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
    semantic:
      intent: IP set 요소 추가 — sudo nft add element inet whitelist allowed_ips '{ 10.20.30.201
        }'. attacker IP 를 화이트리스트에 등록. set 요소 추가 = DB INSERT. 대량 추가 시 stdin 파일 기반 효율.
      success_criteria:
      - 10.20.30.201 키워드
      - nft add element 명령
      - set 에 IP 삽입
      acceptable_methods:
      - nft add element + set 이름 + IP
      - echo 'IP' | nft add element file
      - ansible ad-hoc 대량 등록
      - ipset add legacy 명령
      - |
        **[OSS] nft add element (단일 + 다중 atomic)** — 표준.
          # 1. 단일 IP
          sudo nft add element inet whitelist allowed_ips '{ 10.20.30.201 }'
          # 2. 다중 atomic
          sudo nft add element inet whitelist allowed_ips '{ 10.20.30.100, 10.20.30.80, 10.20.30.201 }'
          # 3. comment 로 출처 추적
          sudo nft 'add element inet whitelist allowed_ips { 10.20.30.201 comment "attacker-vm-2026-w03" }'
          # 4. JSON RPC batch (대량)
          echo '{"nftables":[{"add":{"element":{"family":"inet","table":"whitelist","name":"allowed_ips","elem":[{"set_elem":{"val":"10.20.30.201","comment":"attacker"}}]}}}]}' | sudo nft -j -f -
        예상 출력 `elements = { 10.20.30.201 comment "attacker..." }`.
        운영 해석: comment = 출처. atomic = 다중 IP 한 번에. JSON = 자동화.
      - |
        **[OSS] 대량 등록 (file 기반 + script)** — 운영.
          # 1. 파일에 IP 목록
          tee /tmp/allowed.txt <<EOF
          10.20.30.100
          10.20.30.80
          10.20.30.201
          198.51.100.10
          198.51.100.20
          EOF
          # 2. for loop 으로 일괄 추가
          for ip in $(cat /tmp/allowed.txt); do
            sudo nft add element inet whitelist allowed_ips "{ $ip }" 2>/dev/null
          done
          # 3. atomic batch (nft -f)
          (echo "add element inet whitelist allowed_ips { $(paste -sd, /tmp/allowed.txt) }") | sudo nft -f -
          # 4. 검증
          sudo nft list set inet whitelist allowed_ips | head
        예상 출력 `5 IPs in elements / atomic batch 성공`.
        운영 해석: 대량 IP 운영 = atomic batch 권장. 일부 실패 시 rollback.
      - |
        **[OSS] Ansible nftables_set elements** — IaC.
          # 1. /etc/ansible/playbooks/wl-elements.yml
          # ---
          # - hosts: secu
          #   tasks:
          #     - name: add IPs to allowed_ips
          #       community.general.nftables_set:
          #         family: inet
          #         table: whitelist
          #         name: allowed_ips
          #         elements:
          #           - 10.20.30.201
          #           - 10.20.30.100
          #           - 10.20.30.80
          #         state: present
          # 2. 실행
          ansible-playbook -i inventory wl-elements.yml --diff
          # 3. idempotent
          ansible-playbook -i inventory wl-elements.yml --check
        예상 출력 `changed=1 / 3 IPs / 2회 실행: ok`.
        운영 해석: idempotent + diff 모드. PR review.
      - |
        **[OSS] CTI feed 자동 등록 (실제 운영)** — 자동화.
          # 1. OpenCTI 에서 score>=70 IP 추출
          T=$(ssh ccc@10.20.30.100 'sudo grep ^OPENCTI_ADMIN_TOKEN /opt/opencti/.env | cut -d= -f2')
          curl -sS -X POST http://10.20.30.100:8080/graphql \
            -H "Authorization: Bearer $T" -H 'Content-Type: application/json' \
            -d '{"query":"{ indicators(first:200,filters:{mode:and,filters:[{key:\"x_opencti_main_observable_type\",values:[\"IPv4-Addr\"]}],filterGroups:[]}){edges{node{pattern}}}}"}' \
            | jq -r '.data.indicators.edges[].node.pattern' | grep -oE "'[0-9.]+'" | tr -d "'" > /tmp/threat-ips.txt
          # 2. 자동 set 갱신 (CTI feed → blacklist)
          # for ip in $(cat /tmp/threat-ips.txt); do
          #   sudo nft add element inet whitelist blacklist "{ $ip timeout 30d }" 2>/dev/null
          # done
          # 3. 검증
          wc -l /tmp/threat-ips.txt
        예상 출력 `12 threat IPs from OpenCTI`.
        운영 해석: 외부 CTI feed 자동 통합. 운영 표준.
      - |
        **[OSS] etckeeper / git audit (변경 추적)** — IaC.
          # 1. 매 set 변경 시 commit (자동)
          sudo nft list set inet whitelist allowed_ips > /etc/nftables.allowed_ips.snapshot
          cd /etc && sudo git add nftables.allowed_ips.snapshot
          sudo git commit -m "Add 10.20.30.201 (attacker) to allowed_ips"
          # 2. 변경 history
          sudo git log --oneline nftables.allowed_ips.snapshot | head
          # 3. diff (이전 vs 현재)
          sudo git log -p nftables.allowed_ips.snapshot | head -30
          # 4. rollback (실수 복구)
          # sudo git checkout <sha> -- nftables.allowed_ips.snapshot
        예상 출력 `commit abc123 Add 10.20.30.201 / + 10.20.30.201 added`.
        운영 해석: 누가·언제·왜 추가했는지 audit. compliance.
      negative_signs:
      - IP 혼동
      - set 이름 혼동
      - add element 구문 없음
  target_vm: secu
- order: 4
  instruction: input 체인에서 allowed_ips 에 속하는 소스만 accept 하도록 룰을 추가하시오.
  hint: ip saddr @allowed_ips accept
  category: configure
  points: 10
  answer: sudo nft add rule inet whitelist input ip saddr @allowed_ips accept
  answer_detail: 'nftables 실전 — NAT, 화이트리스트, 레이트리밋: input 체인에서 allowed_ips 에 속하는 소스만
    accept 하도록 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: allowed_ips
    field: stdout
    semantic:
      intent: 화이트리스트 룰 — sudo nft add rule inet whitelist input ip saddr @allowed_ips
        accept. ip saddr @allowed_ips = set 내 IP 매칭. policy drop 기본 + 화이트리스트만 accept
        = zero-trust 구현. set 참조는 @ 접두어.
      success_criteria:
      - allowed_ips 키워드
      - ip saddr @ 구문
      - accept 동작
      acceptable_methods:
      - nft add rule ip saddr @set accept
      - iptables + ipset match set
      - firewalld source address rule
      - XDP/eBPF 대량 처리 최적화
      - |
        **[OSS] nft set match (saddr/daddr 표준)** — 표준.
          # 1. saddr (source) 매칭 — 화이트리스트
          sudo nft 'add rule inet whitelist input ip saddr @allowed_ips counter accept'
          # 2. daddr (destination) 매칭 — 특정 서버 접근 제한
          sudo nft 'add rule inet whitelist input ip daddr @allowed_dests counter accept'
          # 3. 결합 (saddr AND daddr)
          sudo nft 'add rule inet whitelist input ip saddr @allowed_ips ip daddr @critical_servers tcp dport 22 counter accept'
          # 4. 검증
          sudo nft -a list chain inet whitelist input | head
        예상 출력 `ip saddr @allowed_ips counter accept # handle 5`.
        운영 해석: saddr = 누가 접속, daddr = 어디로 접속. 다층 정책.
      - |
        **[OSS] iptables + ipset match (legacy)** — 마이그레이션.
          # 1. ipset 의 set 매칭
          sudo iptables -A INPUT -m set --match-set allowed_ips_legacy src -j ACCEPT
          # 2. 다중 set 매칭
          sudo iptables -A INPUT -m set --match-set allowed_src src -m set --match-set critical_dst dst -j ACCEPT
          # 3. iptables-translate
          iptables-translate -A INPUT -m set --match-set allowed_ips_legacy src -j ACCEPT
        예상 출력 `nft equivalent: ip saddr @allowed_ips_legacy counter accept`.
        운영 해석: iptables m set = nft @set. 동일 의미.
      - |
        **[OSS] log + accept (audit 패턴)** — audit.
          # 1. log + accept (자동 감사)
          sudo nft 'add rule inet whitelist input ip saddr @allowed_ips log prefix "[WL-ACCEPT] " counter accept'
          # 2. journalctl 로 감사
          sudo journalctl -k -f | grep WL-ACCEPT
          # 3. rsyslog 분리 file
          sudo tee /etc/rsyslog.d/wl-accept.conf > /dev/null <<'EOF'
          :msg, contains, "[WL-ACCEPT]" -/var/log/wl-accept.log
          & stop
          EOF
          sudo systemctl restart rsyslog
          # 4. 통계 (top10 source IP)
          sudo grep WL-ACCEPT /var/log/wl-accept.log | grep -oP 'SRC=\S+' | sort | uniq -c | sort -rn | head
        예상 출력 `[WL-ACCEPT] SRC=10.20.30.201 ... / top10 분포`.
        운영 해석: 화이트리스트 통과한 source 의 분포. anomaly 식별.
      - |
