    semantic:
      intent: 'masquerade NAT 의 *src IP 변환* mechanism 을 tcpdump 로 직접 캡처해 검증. nft counter

        는 hit 횟수만 보여주고 *변환 결과* 는 패킷 capture 로만 확인 가능. 학습 목표 #1 (NAT 구성).

        '
      success_criteria:
      - verify_nat 테이블 + postrouting hook + masquerade 룰 작성
      - secu 외부 인터페이스 이름 확인 (ip -br link)
      - secu 에서 sudo tcpdump 로 web outbound 캡처
      - web 에서 외부 ping/curl 시도
      - tcpdump 출력으로 src IP 변환 직접 확인 (web 내부 IP → secu 외부 IP)
      - 회고 1~2 단락
      acceptable_methods:
      - secu 에서 sudo nft add chain postrouting + masquerade 룰
      - secu 에서 sudo tcpdump -i <iface> -n host <web>
      - web 에서 ping / curl 외부 시도
      - secu 에서 nft list table | grep counter (보조)
      - |
        **[OSS] Phase A — verify_nat + 외부 인터페이스 식별** — 표준.
          # 1. 외부 인터페이스 식별
          IFACE=$(ssh ccc@10.20.30.1 "ip -br link show | grep -v '^lo' | awk '{print \$1}' | head -1")
          echo "External iface: $IFACE"
          # 2. atomic build
          ssh ccc@10.20.30.1 "sudo tee /tmp/nat-build.nft" <<EOF
          add table inet verify_nat
          add chain inet verify_nat postrouting { type nat hook postrouting priority 100 ; }
          add rule inet verify_nat postrouting oifname "$IFACE" counter masquerade
          EOF
          # 3. atomic apply
          ssh ccc@10.20.30.1 'sudo nft -c -f /tmp/nat-build.nft && sudo nft -f /tmp/nat-build.nft'
          # 4. IP forwarding 활성 (전제 조건)
          ssh ccc@10.20.30.1 'sudo sysctl -w net.ipv4.ip_forward=1'
        예상 출력 `External iface: ens33 / valid / applied / ip_forward = 1`.
        운영 해석: 외부 인터페이스 자동 식별 + IP forwarding 필수.
      - |
        **[OSS] Phase B — tcpdump 양방향 capture** — 정밀.
          # 1. 외부 인터페이스 (NAT 후) capture
          ssh ccc@10.20.30.1 'sudo timeout 60 tcpdump -i ens33 -nn "host 10.20.30.80 and (icmp or port 80)" -c 30 -w /tmp/nat-out.pcap' &
          # 2. 내부 인터페이스 (NAT 전) capture
          ssh ccc@10.20.30.1 'sudo timeout 60 tcpdump -i ens34 -nn "host 10.20.30.80" -c 30 -w /tmp/nat-in.pcap' &
          sleep 2
          # 3. web 에서 외부 트래픽 발생
          ssh ccc@10.20.30.80 'ping -c 3 -W 2 8.8.8.8 || curl -m 5 -sI http://example.com'
          sleep 3
          # 4. pcap 분석 (src IP 변환 확인)
          echo "=== Outbound (NAT 후) ==="
          ssh ccc@10.20.30.1 'sudo tcpdump -r /tmp/nat-out.pcap -nn 2>/dev/null | head -10'
          echo "=== Inbound (NAT 전) ==="
          ssh ccc@10.20.30.1 'sudo tcpdump -r /tmp/nat-in.pcap -nn 2>/dev/null | head -10'
        예상 출력 `out: src=192.168.0.103 / in: src=10.20.30.80`.
        운영 해석: 같은 패킷 두 인터페이스 다른 src = NAT 작동 정밀 증명.
      - |
        **[OSS] conntrack 으로 NAT 매핑 확인** — 검증.
          # 1. 활성 NAT 연결 (web → 외부)
          ssh ccc@10.20.30.1 'sudo conntrack -L --src 10.20.30.80 | head'
          # 2. snat 표시 확인
          ssh ccc@10.20.30.1 'sudo conntrack -L | grep -i snat | head'
          # 3. 통계 (NAT 처리 갯수)
          ssh ccc@10.20.30.1 'sudo conntrack -S'
          # 4. 특정 외부 호스트 NAT 추적
          ssh ccc@10.20.30.1 'sudo conntrack -L -d 8.8.8.8'
        예상 출력 `tcp src=10.20.30.80 ... [snat → 192.168.0.103] / inserted 234`.
        운영 해석: snat 표시 = NAT 매핑 활성. inserted 갯수 = 처리량.
      - |
        **[OSS] iperf3 으로 NAT 처리 성능 측정** — 부하.
          # 1. 외부 호스트 (참고 — 실제로는 secu 내부에서)
          # iperf3 -s -1 (server) - 외부 측
          # 2. web 에서 외부로 부하 (NAT 통과)
          ssh ccc@10.20.30.80 'iperf3 -c iperf-server -t 5 -R'
          # 3. secu 의 nft counter 변화
          ssh ccc@10.20.30.1 'sudo nft list chain inet verify_nat postrouting | grep masquerade'
          # 4. conntrack 처리량
          ssh ccc@10.20.30.1 'sudo conntrack -S | grep -E "inserted|searched"'
        예상 출력 `1Gbps / counter packets 100K / inserted 5000`.
        운영 해석: 부하 시 NAT 성능. 운영 capacity 측정.
      - |
        **[OSS] Phase C — 회고 + SNAT vs masquerade 결정** — 보고.
          # 1. 결과 markdown
          tee /tmp/nat-report.md <<'EOF'
          # Week03 NAT masquerade Verification
          ## Phase B 결과
          | 인터페이스 | src IP | 의미 |
          |-----------|--------|------|
          | ens34 (내부) | 10.20.30.80 | NAT 전 (web 내부 IP) |
          | ens33 (외부) | 192.168.0.103 | NAT 후 (secu 외부 IP) |
          ## priority 100 의미
          - postrouting 의 default 우선순위
          - filter chain (priority 0) 후 NAT 적용
          - 룰 순서: filter → mangle → NAT
          ## SNAT vs masquerade 선택
          | 구분 | 사용 케이스 | 성능 |
          |------|-------------|------|
          | masquerade | 동적 외부 IP (DHCP) | 약간 느림 (IP 조회) |
          | SNAT | 정적 외부 IP | 약간 빠름 |
          ## 운영 권장
          - masquerade: home/SOHO 네트워크
          - SNAT: 정적 IP enterprise 환경
          EOF
          sha256sum /tmp/nat-report.md
        예상 출력 `보고서 + sha256`.
        운영 해석: NAT 효과 packet level 검증 + 운영 결정 기준.
      negative_signs:
      - tcpdump 없이 nft counter 만 (변환 결과 미입증)
      - web outbound 시도 누락
      - priority 미지정
      - postrouting 대신 prerouting 사용
  target_vm: bastion
  answer: ''
  answer_detail: 'NAT 의 효과는 counter 가 아니라 *변환된 패킷의 src 자체* 를 봐야 확실. tcpdump 사용 경험을

    이 step 에서 강제. 다음 주차 IDS 탐지 (Suricata) 도 패킷 캡처 기반이라 연속.

    '
