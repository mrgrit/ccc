      negative_signs:
      - 파일 경로 혼동
      - wc -l 실행 안 함
      - 룰 규모 해석 없음
  target_vm: secu
- order: 5
  instruction: 'eve.json 의 최근 50줄에서 event_type=alert 만 필터링해 상위 5개 signature 를 집계하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-nonai-week06/5/eve.json 사전 주입.
    `jq -c ''.alert'' /home/ccc/cyber-range/fixtures/secops-nonai-week06/5/eve.json`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: jq 필터 + sort | uniq
  category: analysis
  points: 10
  answer: sudo tail -500 /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert")
    | .alert.signature' 2>/dev/null | sort | uniq -c | sort -rn | head
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: eve.json 의 최근 50줄에서 event_type=alert 만 필터링해
    상위 5개 signature 를 집계하시오.'
  verify:
    type: output_contains
    expect: alert
    field: stdout
    semantic:
      intent: Top signature 집계 — sudo tail -500 eve.json | jq -r 'select(.event_type=="alert")
        | .alert.signature' | sort | uniq -c | sort -rn | head. event_type=alert 필터
        → signature 추출 → 빈도 집계 → Top 5. 주요 탐지 시그니처 파악 + 오탐 후보 식별.
      success_criteria:
      - alert 키워드
      - jq + sort + uniq 파이프라인
      - Top 집계
      acceptable_methods:
      - jq select + sort + uniq -c
      - python json Counter
      - Kibana Lens top signatures
      - Elasticsearch aggs terms
      negative_signs:
      - jq 없이 grep 만
      - 집계 없이 alert 목록만
      - Top N 추출 없음
  target_vm: secu
