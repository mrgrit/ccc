lab_id: secops-nonai-week06
title: Suricata 운영 — 튜닝·알람 분석
version: non-ai
course: secops-nonai
week: 6
description: suricata-update로 룰셋을 갱신하고, stats.log / fast.log / eve.json 을 활용해 운영 상태를
  점검한다.
difficulty: medium
duration_minutes: 120
objectives:
- suricata-update 로 공식 룰셋을 갱신할 수 있다
- eve.json 을 jq로 파싱해 상위 signature/source 를 추출한다
- 성능 통계(stats.log)를 확인해 drop/loss를 모니터링한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에서 suricata-update list-sources 로 사용 가능한 룰셋 소스를 확인하시오.
  hint: suricata-update list-sources
  category: configure
  points: 10
  answer: sudo suricata-update list-sources 2>&1 | head
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: secu VM에서 suricata-update list-sources 로
    사용 가능한 룰셋 소스를 확인하시오.'
  verify:
    type: output_contains
    expect: source
    field: stdout
    semantic:
      intent: suricata-update 룰셋 소스 — sudo suricata-update list-sources. 사용 가능한 공식/커뮤니티
        룰셋 목록 (et/open Free + et/pro 상용 + ptrules 등). 룰셋 소스 관리 도구. scirius 대안.
      success_criteria:
      - source 키워드
      - suricata-update list-sources
      - 목록 출력
      acceptable_methods:
      - suricata-update list-sources
      - scirius rule management UI
      - 수동 git clone + 병합
      - OISF 공식 문서
      negative_signs:
      - list-sources 실행 없음
      - 도구 존재 언급만
      - 소스 정보 없음
  target_vm: secu
- order: 2
  instruction: et/open 룰셋을 enable 하시오.
  hint: suricata-update enable-source et/open
  category: configure
  points: 10
  answer: sudo suricata-update enable-source et/open 2>&1 | tail
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: et/open 룰셋을 enable 하시오.'
  verify:
    type: output_contains
    expect: et/open
    field: stdout
    semantic:
      intent: ET Open 룰셋 활성화 — sudo suricata-update enable-source et/open. Emerging
        Threats Open 무료 룰셋 (30,000+ 룰). 활성화 후 suricata-update 실행 시 다운로드. 기본 IDS 커버리지.
      success_criteria:
      - et/open 키워드
      - enable-source 명령
      - 활성화 성공
      acceptable_methods:
      - suricata-update enable-source et/open
      - disable-source 로 토글
      - --url 옵션으로 커스텀 source
      - scirius UI 활성화
      negative_signs:
      - enable-source 대신 add
      - 다른 소스 활성화
      - 활성화 확인 누락
  target_vm: secu
- order: 3
  instruction: suricata-update 를 실행해 룰셋을 다운로드·병합하시오.
  hint: sudo suricata-update
  category: configure
  points: 10
  answer: sudo suricata-update 2>&1 | tail -10
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: suricata-update 를 실행해 룰셋을 다운로드·병합하시오.'
  verify:
    type: output_contains
    expect: rules
    field: stdout
    semantic:
      intent: suricata-update 룰셋 다운로드 — sudo suricata-update 2>&1 | tail -10. 활성 소스에서
        룰 다운로드 + 로컬 병합 + /var/lib/suricata/rules/suricata.rules 생성. N rules loaded
        메시지. 주기 실행 (cron/systemd timer) 권장.
      success_criteria:
      - rules 키워드
      - suricata-update 실행
      - 다운로드/병합 완료
      acceptable_methods:
      - suricata-update
      - systemd timer 자동 실행
      - cron 매일 실행
      - scirius 통한 자동 업데이트
      negative_signs:
      - update 실행 없이 이론
      - 병합 결과 확인 누락
      - cron/timer 주기 언급 없음
  target_vm: secu
- order: 4
