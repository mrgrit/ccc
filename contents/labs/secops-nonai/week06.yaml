- order: 99
  instruction: "[복합 시나리오] \"오탐 폭증 → threshold 로 억제\" — FP 식별과 관리 직접 체험\n\n## 상황 (w01-w05\
    \ 시나리오 연속)\n\nABC 핀테크 SOC 신규 분석가, 여섯째 주.\n1~10 step 으로 et/open 룰셋 갱신 + eve.json\
    \ 분석 + stats.log 까지 익혔다. 학습 목표 #3 —\n*\"오탐(False Positive) 을 식별하고 관리할 수 있다\"*\
    \ — 분석 도구만 익혔지 실제 FP 발생→\n식별→억제 cycle 은 안 함.\n\n> 선임: \"FP 가 진짜 문제는 *알람 피로(alert\
    \ fatigue)* 야. 1만 건 alert 중 9999 가 FP 면\n>  진짜 1건을 놓쳐. 학생용으로 *의도적으로 FP 폭증* 시키는\
    \ 광범위 룰 하나 넣고, threshold 로\n>  억제해 봐. 그 cycle 이 운영의 핵심이야.\"\n\n학습 목표 #3 (FP 관리)\
    \ 의 행동 증명.\n\n※ Non-AI 트랙: 학생 직접 SSH + transcript paste.\n\n## 임무 (3 단계, 약 25분)\n\
    \n### Phase A — 의도적 FP 폭증 룰 작성 (5분, secu 에서)\n\nsecu(10.20.30.1) SSH 후 광범위 룰 추가\
    \ — 정상 트래픽이 모두 alert 발생하게:\n  ```\n  ssh ccc@10.20.30.1\n  echo 'alert tcp any\
    \ any -> any 80 (msg:\"FP_TEST any HTTP traffic\"; sid:1000301; rev:1;)' \\\n\
    \    | sudo tee -a /etc/suricata/rules/local.rules\n  sudo systemctl restart suricata\n\
    \  ```\n\n의도: \"any tcp → any 80\" 이라 모든 HTTP 트래픽이 alert.\n\n### Phase B — FP\
    \ 폭증 측정 + threshold 억제 (15분)\n\nattacker(10.20.30.201) 또는 secu 에서 web 으로 정상 curl\
    \ 5회:\n  ```\n  for i in 1 2 3 4 5; do\n    curl -sI http://10.20.30.80/ --max-time\
    \ 2 > /dev/null\n    sleep 1\n  done\n  ```\n\nsecu (별도 SSH 세션) 에서 FP_TEST alert\
    \ 카운트:\n  ```\n  sudo tail -200 /var/log/suricata/eve.json | grep -c '\"sid\"\
    :1000301'\n  ```\n→ 예상: 5 이상 (각 정상 트래픽마다 alert)\n\nTop source IP 분석 (jq):\n  ```\n\
    \  sudo tail -500 /var/log/suricata/eve.json \\\n    | jq -r 'select(.alert.signature_id==1000301)\
    \ | .src_ip' \\\n    | sort | uniq -c | sort -rn | head -5\n  ```\n→ 정상 source\
    \ IP 가 top — \"이 source 만 suppress\" 단서.\n\nthreshold.config 에 suppress 룰 추가 후\
    \ 재시작:\n  ```\n  sudo bash -c 'echo \"suppress gen_id 1, sig_id 1000301, track\
    \ by_src, ip 10.20.30.0/24\" >> /etc/suricata/threshold.config'\n  sudo grep '1000301'\
    \ /etc/suricata/threshold.config       # 추가 확인\n  sudo systemctl restart suricata\n\
    \  ```\n\n의도: 내부 망 (10.20.30.0/24) 에서 발생한 sid 1000301 alert 모두 *기록 안 함*.\n\n같은\
    \ curl 5회 반복:\n  `for i in 1..5; do curl -sI http://10.20.30.80/ --max-time 2;\
    \ sleep 1; done`\n\nsecu 에서 alert 카운트 재측정:\n  `sudo tail -200 /var/log/suricata/eve.json\
