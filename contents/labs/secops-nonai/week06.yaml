  hint: wc -l /var/lib/suricata/rules/suricata.rules
  category: verify
  points: 10
  answer: sudo wc -l /var/lib/suricata/rules/suricata.rules
  answer_detail: 'Suricata 운영 — 튜닝·알람 분석: 갱신된 룰 파일 위치(/var/lib/suricata/rules/suricata.rules)의
    룰 개수를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 병합된 룰 파일 크기 — sudo wc -l /var/lib/suricata/rules/suricata.rules. ET
        Open 활성화 후 룰 수 (~30,000+ 기대). 룰셋 볼륨 파악 = 메모리 예상 + 성능 영향 평가.
      success_criteria:
      - wc -l 명령
      - /var/lib/suricata/rules/suricata.rules 경로
      - 숫자 출력
      acceptable_methods:
