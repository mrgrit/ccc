- order: 99
  instruction: "[복합 시나리오] \"alert · drop · reject — 같은 SQLi 룰의 3 액션 비교\"\n\n## 상황\
    \ (w01-w04 시나리오 연속)\n\nABC 핀테크 SOC 신규 분석가, 다섯째 주.\n1~10 step 으로 SQLi union select\
    \ 탐지 룰 (sid:1000102) 을 작성하고 attacker→web 트래픽\n에서 alert 발생까지 봤다. lecture 학습 목표\
    \ #2 — *\"alert/drop/reject 액션의 차이를\n구분할 수 있다\"* — 1~10 은 alert 만. drop·reject\
    \ 는 아직.\n\n> 선임: \"alert 만 쓰면 *결국 학생용 IDS* 야. drop 은 조용히 패킷 폐기 — 클라이언트는\n>  timeout.\
    \ reject 는 RST 패킷을 보내서 연결을 명시적으로 끊어 — 클라이언트는 즉시\n>  connection refused. 셋 다 같은\
    \ SQLi 룰로 직접 비교해 봐.\"\n\n학습 목표 #2 (3 액션 차이) 의 *행동 증명*. w04 의 NFQUEUE 설정 재사용.\n\
    \n※ Non-AI 트랙: 학생 직접 SSH + transcript paste.\n\n## 임무 (3 단계 = 3 액션 비교, 약 25분)\n\
    \n### Phase A — `alert` baseline (5분)\n\nsecu(10.20.30.1) SSH 후 SQLi alert 룰 재추가:\n\
    \  ```\n  ssh ccc@10.20.30.1\n  echo 'alert http any any -> any any (msg:\"SQLi\
    \ union select alert\"; flow:established,to_server; http.uri; content:\"union\
    \ select\"; nocase; sid:1000110; rev:1;)' \\\n    | sudo tee -a /etc/suricata/rules/local.rules\n\
    \  sudo systemctl restart suricata\n  ```\n\nattacker(10.20.30.201) SSH 후 SQLi\
    \ 시도:\n  ```\n  ssh ccc@10.20.30.201\n  curl -sI 'http://10.20.30.80:3000/?id=1+union+select+1,2,3--'\
    \ --max-time 5\n  ```\n예상: 200 또는 404 응답 옴.\n\nsecu (별도 세션) 에서 alert 확인:\n  `sudo\
    \ tail -30 /var/log/suricata/eve.json | grep 'sid\":1000110\\|union'`\n\n→ A 결과:\
    \ 클라이언트 = HTTP 응답, secu = alert event\n\n### Phase B — `drop` (NFQUEUE 모드, 10분)\n\
    \nsecu 에서 같은 sid 의 action 을 alert→drop 으로:\n  ```\n  sudo sed -i 's|^alert http\
    \ any any -> any any (msg:\"SQLi union select alert\"|drop http any any -> any\
    \ any (msg:\"SQLi union select drop\"|' /etc/suricata/rules/local.rules\n  sudo\
    \ grep 'sid:1000110' /etc/suricata/rules/local.rules\n\n  sudo nft add table inet\
    \ verify_w5\n  sudo nft add chain inet verify_w5 forward { type filter hook forward\
    \ priority -150 \\; }\n  sudo nft add rule inet verify_w5 forward ip protocol\
    \ tcp tcp dport 3000 queue num 0\n  sudo nft list table inet verify_w5\n\n  sudo\
    \ systemctl stop suricata\n  sudo suricata -q 0 -c /etc/suricata/suricata.yaml\
    \ -D\n  sleep 3\n  ps -ef | grep 'suricata -q' | grep -v grep\n  ```\n\nattacker\
    \ 에서 같은 SQLi:\n  `curl -sI 'http://10.20.30.80:3000/?id=1+union+select+1,2,3--'\
    \ --max-time 5`\n→ 예상: timeout (curl exit 28).\n\nsecu: `sudo tail -30 /var/log/suricata/eve.json\
    \ | grep -E 'sid\":1000110|drop'`\n\n→ B 결과: 클라이언트 = timeout, secu = drop event\n\
    \n### Phase C — `reject` (RST 응답, 10분)\n\nsecu 에서 drop → reject:\n  ```\n  sudo\
    \ sed -i 's|^drop http any any -> any any (msg:\"SQLi union select drop\"|reject\
    \ http any any -> any any (msg:\"SQLi union select reject\"|' /etc/suricata/rules/local.rules\n\
    \  sudo grep 'sid:1000110' /etc/suricata/rules/local.rules\n\n  sudo pkill -f\
    \ 'suricata -q'\n  sleep 2\n  sudo suricata -q 0 -c /etc/suricata/suricata.yaml\
    \ -D\n  sleep 3\n  ```\n\nattacker 에서 동시에 두 터미널:\n  - 터미널 1 (RST 캡처): `sudo tcpdump\
    \ -i any -n -c 10 'host 10.20.30.80 and (tcp[tcpflags] & tcp-rst != 0)'`\n  -\
    \ 터미널 2 (SQLi 시도): `curl -sI 'http://10.20.30.80:3000/?id=1+union+select+1,2,3--'\
    \ --max-time 5`\n→ 예상: 즉시 connection reset (curl exit 56), tcpdump 출력에 RST flag.\n\
    \nsecu: `sudo tail -30 /var/log/suricata/eve.json | grep -E 'sid\":1000110|reject'`\n\
    \n→ C 결과: 클라이언트 = 즉시 RST, secu = reject event\n\n## 비교표 (회고 일부)\n\n| 액션 | 클라이언트\
    \ 응답 시간 | 클라이언트 결과 | secu eve.json action | 운영 영향 |\n|------|------------------|---------------|--------------------|---------|\n\
    | alert | 정상 (수 ms) | HTTP 200/404 | alert | 차단 X — IDS only |\n| drop | timeout\
    \ (5s+) | curl exit 28 | drop | 조용히 폐기 (스캐너 혼란) |\n| reject | 즉시 (수십 ms) | curl\
