lab_id: "secops-nonai-week05"
title: "백업/복구 실습"
version: "non-ai"
course: "secops-nonai"
week: 5
description: "시스템 및 데이터 백업 전략을 수립하고, 다양한 백업 도구를 활용한 백업/복구 절차를 실습합니다."
difficulty: "medium"
duration_minutes: 120
objectives:
  - "전체/증분/차등 백업 전략을 이해한다"
  - "tar, rsync 등 백업 도구를 활용한다"
  - "복구 테스트를 수행한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "10.20.30.1 서버에서 백업 대상 디렉터리(/etc, /home)의 크기를 확인하시오."
    hint: "du -sh 명령을 사용하세요."
    category: "backup"
    points: 8
    answer: "du -sh /etc /home 2>/dev/null"
    answer_detail: "백업 전 대상 크기를 파악하여 저장 공간 계획을 수립합니다."
    verify:
      type: "output_contains"
      expect: "/etc"
      field: "stdout"
  - order: 2
    instruction: "백업 저장 디렉터리 /backup을 생성하고 적절한 퍼미션을 설정하시오."
    hint: "root만 접근 가능하도록 설정하세요."
    category: "backup"
    points: 8
    answer: "sudo mkdir -p /backup && sudo chmod 700 /backup && ls -ld /backup"
    answer_detail: "백업 디렉터리는 root만 접근 가능하도록 700 퍼미션을 설정합니다."
    verify:
      type: "output_contains"
      expect: "drwx------"
      field: "stdout"
  - order: 3
    instruction: "/etc 디렉터리의 전체 백업을 tar로 생성하시오."
    hint: "tar czf 옵션을 사용하세요."
    category: "backup"
    points: 10
    answer: "sudo tar czf /backup/etc_full_$(date +%Y%m%d).tar.gz /etc 2>/dev/null && ls -lh /backup/etc_full_*.tar.gz"
    answer_detail: "tar czf는 gzip 압축을 포함한 아카이브를 생성합니다. 날짜를 파일명에 포함하여 관리합니다."
    verify:
      type: "output_contains"
      expect: "etc_full"
      field: "stdout"
  - order: 4
    instruction: "생성된 백업 파일의 무결성을 검증하시오."
    hint: "tar tzf로 목록 확인, md5sum으로 체크섬을 생성하세요."
    category: "backup"
    points: 10
    answer: "sudo tar tzf /backup/etc_full_*.tar.gz | wc -l && md5sum /backup/etc_full_*.tar.gz | sudo tee /backup/checksums.md5"
    answer_detail: "tar tzf로 아카이브 내용을 확인하고, md5sum으로 체크섬을 생성하여 백업 무결성을 검증합니다."
    verify:
      type: "output_contains"
      expect: "etc_full"
      field: "stdout"
  - order: 5
    instruction: "rsync를 사용하여 /home 디렉터리를 /backup/home_mirror/에 미러링하시오."
    hint: "rsync -avz 옵션을 사용하세요."
    category: "backup"
    points: 12
    answer: "sudo rsync -avz /home/ /backup/home_mirror/ 2>/dev/null && echo '미러링 완료'"
    answer_detail: "rsync -a는 아카이브 모드(퍼미션, 소유자 보존), -v는 상세출력, -z는 압축 전송입니다."
    verify:
      type: "output_contains"
      expect: "미러링 완료"
      field: "stdout"
  - order: 6
    instruction: "증분 백업을 위한 find 기반 백업을 구현하시오: 최근 24시간 내 변경된 파일만 백업."
    hint: "find -newer 또는 -mtime 옵션을 사용하세요."
    category: "backup"
    points: 12
    answer: "sudo find /etc -mtime -1 -type f | sudo tar czf /backup/etc_incr_$(date +%Y%m%d).tar.gz -T - 2>/dev/null && ls -lh /backup/etc_incr_*.tar.gz"
    answer_detail: "-mtime -1은 24시간 이내 수정된 파일을 찾습니다. -T -는 표준입력에서 파일 목록을 읽습니다."
    verify:
      type: "output_contains"
      expect: "etc_incr"
      field: "stdout"
  - order: 7
    instruction: "crontab에 매일 새벽 2시 전체 백업을 스케줄링하시오."
    hint: "crontab -e를 사용하세요."
    category: "backup"
    points: 10
    answer: "echo '0 2 * * * tar czf /backup/etc_daily_$(date +\\%Y\\%m\\%d).tar.gz /etc 2>/dev/null' | sudo tee /etc/cron.d/daily_backup"
    answer_detail: "cron의 0 2 * * *는 매일 02:00을 의미합니다. 정기 백업으로 데이터 손실 위험을 최소화합니다."
    verify:
      type: "output_contains"
      expect: "daily_backup"
      field: "stdout"
  - order: 8
    instruction: "7일 이상 된 백업 파일을 자동 삭제하는 정리 스크립트를 작성하시오."
    hint: "find -mtime +7 -delete를 사용하세요."
    category: "backup"
    points: 10
    answer: "echo '#!/bin/bash\nfind /backup -name \"*.tar.gz\" -mtime +7 -delete\necho \"오래된 백업 정리 완료\"' | sudo tee /backup/cleanup.sh && sudo chmod +x /backup/cleanup.sh"
    answer_detail: "백업 보존 정책에 따라 오래된 백업을 자동 삭제하여 디스크 공간을 관리합니다."
    verify:
      type: "output_contains"
      expect: "cleanup.sh"
      field: "stdout"
  - order: 9
    instruction: "백업 파일에서 특정 파일(/etc/hostname)만 복구하시오."
    hint: "tar --extract 옵션을 사용하세요."
    category: "restore"
    points: 12
    answer: "sudo tar xzf /backup/etc_full_*.tar.gz -C /tmp etc/hostname 2>/dev/null && cat /tmp/etc/hostname && echo '복구 완료'"
    answer_detail: "tar에서 특정 파일만 추출하려면 아카이브 내 경로를 지정합니다. -C로 추출 위치를 변경합니다."
    verify:
      type: "output_contains"
      expect: "복구 완료"
      field: "stdout"
  - order: 10
    instruction: "전체 복구 테스트를 수행하시오: 백업을 /tmp/restore_test/에 복구하고 원본과 비교."
    hint: "tar xzf와 diff 명령을 사용하세요."
    category: "restore"
    points: 12
    answer: "sudo mkdir -p /tmp/restore_test && sudo tar xzf /backup/etc_full_*.tar.gz -C /tmp/restore_test 2>/dev/null && diff -rq /etc/hostname /tmp/restore_test/etc/hostname 2>/dev/null && echo '복구 검증 완료'"
    answer_detail: "복구 테스트는 백업의 유효성을 검증하는 필수 절차입니다. diff -rq로 원본과 복구본을 비교합니다."
    verify:
      type: "output_contains"
      expect: "복구 검증 완료"
      field: "stdout"
  - order: 11
    instruction: "데이터베이스(PostgreSQL) 백업을 수행하시오."
    hint: "pg_dump 명령을 사용하세요."
    category: "backup"
    points: 10
    answer: "pg_dump -h 127.0.0.1 -U ccc ccc > /tmp/db_backup.sql 2>/dev/null || echo 'DB 백업 시뮬레이션 완료'"
    answer_detail: "pg_dump는 PostgreSQL 데이터베이스를 SQL 덤프로 백업합니다. 정기적인 DB 백업은 필수입니다."
    verify:
      type: "output_contains"
      expect: "백업"
      field: "stdout"
  - order: 12
    instruction: "암호화된 백업을 생성하시오: gpg로 백업 파일을 암호화."
    hint: "gpg --symmetric 옵션을 사용하세요."
    category: "backup"
    points: 10
    answer: "echo 'backup_encryption_test' > /tmp/test_backup.txt && gpg --batch --passphrase 'backup2026!' --symmetric /tmp/test_backup.txt 2>/dev/null && ls -la /tmp/test_backup.txt.gpg && echo '암호화 백업 완료'"
    answer_detail: "gpg --symmetric은 대칭키 암호화를 사용합니다. 백업 암호화로 데이터 유출 시에도 기밀성을 보호합니다."
    verify:
      type: "output_contains"
      expect: "암호화 백업 완료"
      field: "stdout"
  - order: 13
    instruction: "현재 디스크 사용량을 확인하고 백업 저장소 공간이 충분한지 검증하시오."
    hint: "df -h 명령을 사용하세요."
    category: "verification"
    points: 8
    answer: "df -h /backup && echo '=== 백업 저장소 현황 ===' && du -sh /backup/"
    answer_detail: "백업 저장소의 여유 공간을 정기적으로 모니터링하여 백업 실패를 방지합니다."
    verify:
      type: "output_contains"
      expect: "백업 저장소 현황"
      field: "stdout"
  - order: 14
    instruction: "백업 정책 문서를 작성하시오: RPO, RTO, 백업 주기, 보존 기간을 포함."
    hint: "/backup/ 에 policy.txt를 작성하세요."
    category: "documentation"
    points: 10
    answer: "echo -e '백업 정책서\\n\\nRPO: 24시간\\nRTO: 4시간\\n백업 주기: 전체-주1회, 증분-매일\\n보존 기간: 30일\\n암호화: 필수\\n복구 테스트: 월1회' | sudo tee /backup/policy.txt"
    answer_detail: "RPO(복구 시점 목표)와 RTO(복구 시간 목표)는 백업 정책의 핵심 지표입니다."
    verify:
      type: "output_contains"
      expect: "RPO"
      field: "stdout"
  - order: 15
    instruction: "백업/복구 종합 점검 보고서를 생성하시오."
    hint: "백업 파일 목록, 체크섬, 디스크 사용량 등을 포함하세요."
    category: "verification"
    points: 8
    answer: "echo '=== 백업 종합 보고서 ===' && echo '[백업 파일]' && ls -lh /backup/*.tar.gz 2>/dev/null && echo '[체크섬]' && cat /backup/checksums.md5 2>/dev/null && echo '[디스크]' && df -h /backup && echo '=== 보고서 완료 ==='"
    answer_detail: "백업 종합 보고서는 감사 증빙과 운영 현황 파악에 필수입니다."
    verify:
      type: "output_contains"
      expect: "보고서 완료"
      field: "stdout"
