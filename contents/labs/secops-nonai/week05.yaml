lab_id: secops-nonai-week05
title: Suricata 룰 작성
version: non-ai
course: secops-nonai
week: 5
description: content, pcre, flow, flowbits 등 Suricata 룰 키워드를 활용해 HTTP·TCP 탐지 룰을 작성한다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata 룰 문법 (action protocol src → dst opts) 을 이해한다
- HTTP 요청에서 특정 User-Agent 를 탐지하는 룰을 작성할 수 있다
- suricata -T 로 룰 문법을 검증하고 eve.json 에서 매칭을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: local.rules 에 HTTP User-Agent 'BadBot'을 탐지하는 룰(sid:1000101)을 추가하시오.
  hint: content:"BadBot"; http_user_agent;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot"; http_user_agent;
    sid:1000101; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: local.rules 에 HTTP User-Agent ''BadBot''을 탐지하는 룰(sid:1000101)을 추가하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
    semantic:
      intent: BadBot User-Agent 탐지 룰 — alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot";
        http_user_agent; sid:1000101; rev:1;). content 키워드 + http_user_agent 수정자 = HTTP 헤더 중 User-Agent
        필드만 검색. 봇/스캐너 탐지 패턴. MITRE ATT&CK T1595 Active Scanning.
      success_criteria:
      - BadBot 키워드
      - content + http_user_agent
      - sid 1000101
      acceptable_methods:
      - content + http_user_agent 수정자
      - pcre for regex UA
      - Snort/Suricata 공통 문법
      - Zeek http.log user_agent 매칭 대체
      negative_signs:
      - http_user_agent 수정자 누락
      - sid 중복
      - msg 누락
  target_vm: secu
- order: 2
  instruction: SQL Injection 간단 룰 — URI에 'union select' 포함 탐지(sid:1000102)을 추가하시오.
  hint: content:"union select"; http_uri;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"SQLi union select"; content:"union select"; nocase;
    http_uri; sid:1000102; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: SQL Injection 간단 룰 — URI에 ''union select'' 포함 탐지(sid:1000102)을 추가하시오.'
  verify:
    type: output_contains
    expect: union
    field: stdout
    semantic:
      intent: SQLi union select 룰 — alert http any any -> any any (msg:"SQLi union select"; content:"union
        select"; nocase; http_uri; sid:1000102; rev:1;). http_uri 수정자 = URI 파라미터만 검색. nocase = 대소문자 무시.
        MITRE ATT&CK T1190 + OWASP Top 10 A03 Injection.
      success_criteria:
      - union 키워드
      - http_uri 수정자 + nocase
      - sid 1000102
      acceptable_methods:
      - content nocase http_uri 조합
      - pcre /union\s+select/i
      - ModSecurity OWASP CRS 912110 유사
      - Suricata Emerging Threats rule
      negative_signs:
      - nocase 없음 (대소문자 우회)
      - http_uri 수정자 없음
      - URI vs HTTP body 혼동
  target_vm: secu
- order: 3
  instruction: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.
  hint: tcp any any -> any 445 …
  category: configure
  points: 10
  answer: echo 'alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.'
  verify:
    type: output_contains
    expect: '445'
    field: stdout
    semantic:
      intent: SMB 445 포트 탐지 — alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103; rev:1;). SMB/CIFS
        포트 445 모니터링. 내부 lateral movement (PsExec/SMB share 접근) 탐지 지시자. MITRE ATT&CK T1021.002 SMB/Windows
        Admin Shares.
      success_criteria:
      - 445 키워드
      - tcp any any -> any 445
      - sid 1000103
      acceptable_methods:
      - alert tcp -> any 445
      - smb 프로토콜 키워드 (Suricata 5+)
      - Zeek smb_files.log 대체
      - Wireshark 445 필터
      negative_signs:
      - 포트 번호 혼동
      - tcp 프로토콜 누락
      - lateral movement 맥락 없음
  target_vm: secu
- order: 4
  instruction: suricata -T 로 룰 문법을 검증하시오.
  hint: sudo suricata -T
  category: verify
  points: 10
  answer: sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5
  answer_detail: 'Suricata 룰 작성: suricata -T 로 룰 문법을 검증하시오.'
  verify:
    type: output_contains
    expect: configuration
    field: stdout
    semantic:
      intent: 룰 문법 검증 — sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5. -T = test 모드 +
        룰 + YAML 구문 파싱. 배포 전 필수. configuration ok 또는 N rules loaded 메시지. 오류 시 파일:라인 출력.
      success_criteria:
      - configuration 키워드
      - -T 옵션
      - 검증 메시지
      acceptable_methods:
      - suricata -T -c config
      - suricatasc -c reload-rules 후 확인
      - CI/CD 자동 검증
      - Suricata docker check
      negative_signs:
      - -T 없이 실제 실행
      - 에러 메시지 무시
      - tail -5 결과 해석 없음
  target_vm: secu
- order: 5
  instruction: Suricata를 재로드하시오.
  hint: systemctl reload suricata
  category: configure
  points: 10
  answer: sudo systemctl reload suricata && systemctl is-active suricata
  answer_detail: 'Suricata 룰 작성: Suricata를 재로드하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - reload
    field: stdout
    semantic:
      intent: Suricata reload — sudo systemctl reload suricata && systemctl is-active suricata. reload
        = SIGUSR2 전송 = 룰 재로딩 (다운타임 없음). restart 와 달리 서비스 재시작 없이 룰만 갱신. is-active active 확인.
      success_criteria:
      - active 또는 reload 키워드
      - systemctl reload 명령
      - 상태 검증
      acceptable_methods:
      - systemctl reload + is-active
      - suricatasc -c reload-rules (런타임 SIGUSR2)
      - kill -USR2 $(pidof suricata)
      - Ansible service reload
      negative_signs:
      - restart 만 (불필요 재시작)
      - reload 후 상태 확인 없음
      - reload vs restart 구분 없음
  target_vm: secu
- order: 6
  instruction: attacker VM에서 web VM으로 User-Agent BadBot 이 포함된 curl 요청을 보내시오.
  hint: curl -A BadBot http://{{WEB_IP}}/
  category: verify
  points: 10
  answer: curl -sS -A BadBot http://10.20.30.80/ -o /dev/null && echo sent
  answer_detail: 'Suricata 룰 작성: attacker VM에서 web VM으로 User-Agent BadBot 이 포함된 curl 요청을 보내시오.'
  verify:
    type: output_contains
    expect: sent
    field: stdout
    semantic:
      intent: BadBot curl 요청 — curl -sS -A BadBot http://10.20.30.80/ -o /dev/null && echo sent. -A =
        User-Agent 설정. -s 조용히 + -o /dev/null body 무시. Suricata 룰 매칭 유발 테스트 트래픽. MITRE ATT&CK T1595.
      success_criteria:
      - sent 키워드
      - curl -A 옵션
      - web IP 대상
      acceptable_methods:
      - curl -A BadBot URL
      - wget --user-agent=BadBot URL
      - python requests + headers
      - 'Apache Bench -H ''User-Agent: BadBot'''
      negative_signs:
      - UA 지정 없이 기본 curl
      - sent 확인 누락
      - 대상 IP 혼동
  target_vm: attacker
- order: 7
  instruction: secu VM eve.json 에서 BadBot 관련 알람을 확인하시오.
  hint: grep BadBot /var/log/suricata/eve.json
  category: verify
  points: 10
  answer: sudo tail -100 /var/log/suricata/eve.json | grep -i BadBot | head
  answer_detail: 'Suricata 룰 작성: secu VM eve.json 에서 BadBot 관련 알람을 확인하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
    semantic:
      intent: BadBot alert 확인 — sudo tail -100 /var/log/suricata/eve.json | grep -i BadBot | head. 작성한
        룰 매칭 검증. alert.signature='Suspicious UA BadBot' 출력. IDS end-to-end 동작 확인.
      success_criteria:
      - BadBot 키워드
      - eve.json grep
      - alert 이벤트 확인
      acceptable_methods:
      - tail eve.json | grep BadBot
      - jq 'select(.alert.signature | contains("BadBot"))'
      - Kibana 'BadBot' 검색
      - grep fast.log 대체
      negative_signs:
      - eve.json 경로 혼동
      - grep 실행 없음
      - alert.signature 매칭 확인 없음
  target_vm: secu
- order: 8
  instruction: attacker VM에서 URI에 'union select'을 포함한 HTTP 요청을 보내시오.
  hint: curl '…?id=1 union select 1,2'
  category: verify
  points: 10
  answer: curl -sS 'http://10.20.30.80/?id=1%20union%20select%201,2' -o /dev/null && echo sent
  answer_detail: 'Suricata 룰 작성: attacker VM에서 URI에 ''union select''을 포함한 HTTP 요청을 보내시오.'
  verify:
    type: output_contains
    expect: sent
    field: stdout
    semantic:
      intent: union select SQLi HTTP 요청 — curl -sS 'http://10.20.30.80/?id=1%20union%20select%201,2' -o
        /dev/null && echo sent. URL 인코딩 (%20 = space). URI 파라미터에 union select 포함. http_uri 매칭 테스트 트래픽.
        MITRE T1190.
      success_criteria:
      - sent 키워드
      - curl + URL encode
      - union select URI
      acceptable_methods:
      - curl with %20 encoded URL
      - wget --header-only
      - sqlmap --random-agent --url=...
      - Burp Intruder + payload
      negative_signs:
      - URL 인코딩 없이 raw space (curl 에러)
      - URI 아닌 body 전송
      - sent 확인 누락
  target_vm: attacker
- order: 9
  instruction: secu VM eve.json 에서 SQLi union select 알람을 확인하시오.
  hint: grep -i 'union' /var/log/suricata/eve.json
  category: verify
  points: 10
  answer: sudo tail -200 /var/log/suricata/eve.json | grep -i 'union select' | head
  answer_detail: 'Suricata 룰 작성: secu VM eve.json 에서 SQLi union select 알람을 확인하시오.'
  verify:
    type: output_contains
    expect: union
    field: stdout
    semantic:
      intent: union select alert 확인 — sudo tail -200 /var/log/suricata/eve.json | grep -i 'union select'
        | head. 룰 sid:1000102 매칭 alert 확인. nocase 동작 검증 (대소문자 무시).
      success_criteria:
      - union 키워드
      - eve.json grep 또는 파싱
      - alert 이벤트 존재
      acceptable_methods:
      - tail eve.json | grep union
      - jq .alert.signature
      - Wazuh Dashboard Security events 검색
      - fast.log grep
      negative_signs:
      - eve.json 경로 혼동
      - 대소문자 구분 매칭 (nocase 테스트 아님)
      - alert 맥락 없음
  target_vm: secu
- order: 10
  instruction: 추가한 3개 룰을 local.rules 에서 제거하고 suricata를 reload 하시오.
  hint: sed … sid:100010[1-3]
  category: cleanup
  points: 10
  answer: sudo sed -i '/sid:100010[1-3]/d' /etc/suricata/rules/local.rules && sudo systemctl reload suricata
  answer_detail: 'Suricata 룰 작성: 추가한 3개 룰을 local.rules 에서 제거하고 suricata를 reload 하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 3개 룰 제거 cleanup — sudo sed -i '/sid:100010[1-3]/d' /etc/suricata/rules/local.rules && sudo
        systemctl reload suricata. sed regex 범위 [1-3] = sid 1000101/1000102/1000103 동시 삭제. reload 반영.
        실습 정리.
      success_criteria:
      - sed 명령
      - sid:100010[1-3] regex
      - reload 반영
      acceptable_methods:
      - sed -i + regex + reload
      - 개별 sed 3회
      - ansible lineinfile regexp
      - git revert local.rules
      negative_signs:
      - 단일 룰 삭제 (3개 아님)
      - reload 누락
      - regex 실수로 다른 룰 삭제
  target_vm: secu
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  answer: ''
  answer_detail: ''
