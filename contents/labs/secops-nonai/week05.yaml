lab_id: secops-nonai-week05
title: Suricata 룰 작성
version: non-ai
course: secops-nonai
week: 5
description: content, pcre, flow, flowbits 등 Suricata 룰 키워드를 활용해 HTTP·TCP 탐지 룰을 작성한다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata 룰 문법 (action protocol src → dst opts) 을 이해한다
- HTTP 요청에서 특정 User-Agent 를 탐지하는 룰을 작성할 수 있다
- suricata -T 로 룰 문법을 검증하고 eve.json 에서 매칭을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: local.rules 에 HTTP User-Agent 'BadBot'을 탐지하는 룰(sid:1000101)을 추가하시오.
  hint: content:"BadBot"; http_user_agent;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot";
    http_user_agent; sid:1000101; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: local.rules 에 HTTP User-Agent ''BadBot''을 탐지하는 룰(sid:1000101)을
    추가하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
  target_vm: secu
- order: 2
  instruction: SQL Injection 간단 룰 — URI에 'union select' 포함 탐지(sid:1000102)을 추가하시오.
  hint: content:"union select"; http_uri;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"SQLi union select"; content:"union
    select"; nocase; http_uri; sid:1000102; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: SQL Injection 간단 룰 — URI에 ''union select'' 포함 탐지(sid:1000102)을
    추가하시오.'
  verify:
    type: output_contains
    expect: union
    field: stdout
  target_vm: secu
- order: 3
  instruction: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.
  hint: tcp any any -> any 445 …
  category: configure
  points: 10
  answer: echo 'alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103; rev:1;)'
    | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.'
  verify:
    type: output_contains
    expect: '445'
    field: stdout
  target_vm: secu
- order: 4
  instruction: suricata -T 로 룰 문법을 검증하시오.
  hint: sudo suricata -T
  category: verify
  points: 10
  answer: sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5
  answer_detail: 'Suricata 룰 작성: suricata -T 로 룰 문법을 검증하시오.'
  verify:
    type: output_contains
    expect: configuration
    field: stdout
  target_vm: secu
- order: 5
  instruction: Suricata를 재로드하시오.
  hint: systemctl reload suricata
  category: configure
  points: 10
  answer: sudo systemctl reload suricata && systemctl is-active suricata
  answer_detail: 'Suricata 룰 작성: Suricata를 재로드하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - reload
    field: stdout
  target_vm: secu
- order: 6
  instruction: attacker VM에서 web VM으로 User-Agent BadBot 이 포함된 curl 요청을 보내시오.
  hint: curl -A BadBot http://{{WEB_IP}}/
  category: verify
  points: 10
  answer: curl -sS -A BadBot http://10.20.30.80/ -o /dev/null && echo sent
  answer_detail: 'Suricata 룰 작성: attacker VM에서 web VM으로 User-Agent BadBot 이 포함된 curl
    요청을 보내시오.'
  verify:
    type: output_contains
    expect: sent
    field: stdout
  target_vm: attacker
- order: 7
  instruction: secu VM eve.json 에서 BadBot 관련 알람을 확인하시오.
  hint: grep BadBot /var/log/suricata/eve.json
  category: verify
  points: 10
  answer: sudo tail -100 /var/log/suricata/eve.json | grep -i BadBot | head
  answer_detail: 'Suricata 룰 작성: secu VM eve.json 에서 BadBot 관련 알람을 확인하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
  target_vm: secu
- order: 8
  instruction: attacker VM에서 URI에 'union select'을 포함한 HTTP 요청을 보내시오.
  hint: curl '…?id=1 union select 1,2'
  category: verify
  points: 10
  answer: curl -sS 'http://10.20.30.80/?id=1%20union%20select%201,2' -o /dev/null
    && echo sent
  answer_detail: 'Suricata 룰 작성: attacker VM에서 URI에 ''union select''을 포함한 HTTP 요청을
    보내시오.'
  verify:
    type: output_contains
    expect: sent
    field: stdout
  target_vm: attacker
- order: 9
  instruction: secu VM eve.json 에서 SQLi union select 알람을 확인하시오.
  hint: grep -i 'union' /var/log/suricata/eve.json
  category: verify
  points: 10
  answer: sudo tail -200 /var/log/suricata/eve.json | grep -i 'union select' | head
  answer_detail: 'Suricata 룰 작성: secu VM eve.json 에서 SQLi union select 알람을 확인하시오.'
  verify:
    type: output_contains
    expect: union
    field: stdout
  target_vm: secu
- order: 10
  instruction: 추가한 3개 룰을 local.rules 에서 제거하고 suricata를 reload 하시오.
  hint: sed … sid:100010[1-3]
  category: cleanup
  points: 10
  answer: sudo sed -i '/sid:100010[1-3]/d' /etc/suricata/rules/local.rules && sudo
    systemctl reload suricata
  answer_detail: 'Suricata 룰 작성: 추가한 3개 룰을 local.rules 에서 제거하고 suricata를 reload 하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  answer: ''
  answer_detail: ''
