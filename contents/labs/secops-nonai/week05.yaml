lab_id: secops-nonai-week05
title: Suricata 룰 작성
version: non-ai
course: secops-nonai
week: 5
description: content, pcre, flow, flowbits 등 Suricata 룰 키워드를 활용해 HTTP·TCP 탐지 룰을 작성한다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata 룰 문법 (action protocol src → dst opts) 을 이해한다
- HTTP 요청에서 특정 User-Agent 를 탐지하는 룰을 작성할 수 있다
- suricata -T 로 룰 문법을 검증하고 eve.json 에서 매칭을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: local.rules 에 HTTP User-Agent 'BadBot'을 탐지하는 룰(sid:1000101)을 추가하시오.
  hint: content:"BadBot"; http_user_agent;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"Suspicious UA BadBot"; content:"BadBot";
    http_user_agent; sid:1000101; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: local.rules 에 HTTP User-Agent ''BadBot''을 탐지하는 룰(sid:1000101)을
    추가하시오.'
  verify:
    type: output_contains
    expect: BadBot
    field: stdout
    semantic:
      intent: BadBot User-Agent 탐지 룰 — alert http any any -> any any (msg:"Suspicious
        UA BadBot"; content:"BadBot"; http_user_agent; sid:1000101; rev:1;). content
        키워드 + http_user_agent 수정자 = HTTP 헤더 중 User-Agent 필드만 검색. 봇/스캐너 탐지 패턴. MITRE
        ATT&CK T1595 Active Scanning.
      success_criteria:
      - BadBot 키워드
      - content + http_user_agent
      - sid 1000101
      acceptable_methods:
      - content + http_user_agent 수정자
      - pcre for regex UA
      - Snort/Suricata 공통 문법
      - Zeek http.log user_agent 매칭 대체
      negative_signs:
      - http_user_agent 수정자 누락
      - sid 중복
      - msg 누락
  target_vm: secu
- order: 2
  instruction: SQL Injection 간단 룰 — URI에 'union select' 포함 탐지(sid:1000102)을 추가하시오.
  hint: content:"union select"; http_uri;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"SQLi union select"; content:"union
    select"; nocase; http_uri; sid:1000102; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: SQL Injection 간단 룰 — URI에 ''union select'' 포함 탐지(sid:1000102)을
    추가하시오.'
  verify:
    type: output_contains
    expect: union
    field: stdout
    semantic:
      intent: SQLi union select 룰 — alert http any any -> any any (msg:"SQLi union
        select"; content:"union select"; nocase; http_uri; sid:1000102; rev:1;). http_uri
        수정자 = URI 파라미터만 검색. nocase = 대소문자 무시. MITRE ATT&CK T1190 + OWASP Top 10 A03
        Injection.
      success_criteria:
      - union 키워드
      - http_uri 수정자 + nocase
      - sid 1000102
      acceptable_methods:
      - content nocase http_uri 조합
      - pcre /union\s+select/i
      - ModSecurity OWASP CRS 912110 유사
      - Suricata Emerging Threats rule
      negative_signs:
      - nocase 없음 (대소문자 우회)
      - http_uri 수정자 없음
      - URI vs HTTP body 혼동
  target_vm: secu
- order: 3
  instruction: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.
  hint: tcp any any -> any 445 …
  category: configure
  points: 10
  answer: echo 'alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103; rev:1;)'
    | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata 룰 작성: TCP 445 포트로 향하는 트래픽을 단순 탐지하는 룰(sid:1000103)을 추가하시오.'
  verify:
    type: output_contains
    expect: '445'
    field: stdout
    semantic:
      intent: SMB 445 포트 탐지 — alert tcp any any -> any 445 (msg:"SMB traffic"; sid:1000103;
        rev:1;). SMB/CIFS 포트 445 모니터링. 내부 lateral movement (PsExec/SMB share 접근) 탐지
        지시자. MITRE ATT&CK T1021.002 SMB/Windows Admin Shares.
      success_criteria:
      - 445 키워드
      - tcp any any -> any 445
      - sid 1000103
      acceptable_methods:
      - alert tcp -> any 445
      - smb 프로토콜 키워드 (Suricata 5+)
      - Zeek smb_files.log 대체
      - Wireshark 445 필터
      negative_signs:
      - 포트 번호 혼동
      - tcp 프로토콜 누락
      - lateral movement 맥락 없음
  target_vm: secu
- order: 4
  instruction: suricata -T 로 룰 문법을 검증하시오.
  hint: sudo suricata -T
  category: verify
  points: 10
  answer: sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5
  answer_detail: 'Suricata 룰 작성: suricata -T 로 룰 문법을 검증하시오.'
  verify:
    type: output_contains
    expect: configuration
    field: stdout
    semantic:
      intent: 룰 문법 검증 — sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail
        -5. -T = test 모드 + 룰 + YAML 구문 파싱. 배포 전 필수. configuration ok 또는 N rules loaded
        메시지. 오류 시 파일:라인 출력.
      success_criteria:
      - configuration 키워드
      - -T 옵션
      - 검증 메시지
      acceptable_methods:
      - suricata -T -c config
      - suricatasc -c reload-rules 후 확인
      - CI/CD 자동 검증
      - Suricata docker check
      negative_signs:
      - -T 없이 실제 실행
      - 에러 메시지 무시
      - tail -5 결과 해석 없음
  target_vm: secu
- order: 5
  instruction: Suricata를 재로드하시오.
  hint: systemctl reload suricata
  category: configure
  points: 10
  answer: sudo systemctl reload suricata && systemctl is-active suricata
  answer_detail: 'Suricata 룰 작성: Suricata를 재로드하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - reload
    field: stdout
    semantic:
      intent: Suricata reload — sudo systemctl reload suricata && systemctl is-active
        suricata. reload = SIGUSR2 전송 = 룰 재로딩 (다운타임 없음). restart 와 달리 서비스 재시작 없이 룰만
        갱신. is-active active 확인.
      success_criteria:
      - active 또는 reload 키워드
      - systemctl reload 명령
      - 상태 검증
      acceptable_methods:
      - systemctl reload + is-active
      - suricatasc -c reload-rules (런타임 SIGUSR2)
      - kill -USR2 $(pidof suricata)
      - Ansible service reload
      negative_signs:
      - restart 만 (불필요 재시작)
      - reload 후 상태 확인 없음
      - reload vs restart 구분 없음
  target_vm: secu
- order: 6
