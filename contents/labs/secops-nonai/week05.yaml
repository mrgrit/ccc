  category: verify
  points: 10
  answer: curl -sS -A BadBot http://10.20.30.80/ -o /dev/null && echo sent
  answer_detail: 'Suricata 룰 작성: attacker VM에서 web VM으로 User-Agent BadBot 이 포함된 curl
    요청을 보내시오.'
  verify:
    type: output_contains
    expect: sent
    field: stdout
    semantic:
      intent: BadBot curl 요청 — curl -sS -A BadBot http://10.20.30.80/ -o /dev/null
        && echo sent. -A = User-Agent 설정. -s 조용히 + -o /dev/null body 무시. Suricata
        룰 매칭 유발 테스트 트래픽. MITRE ATT&CK T1595.
