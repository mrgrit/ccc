lab_id: secops-nonai-week07
title: Apache + ModSecurity WAF
version: non-ai
course: secops-nonai
week: 7
description: web VM의 Apache + ModSecurity WAF 구성을 점검하고 CRS 룰로 SQLi/XSS 탐지가 작동하는지 검증한다.
difficulty: medium
duration_minutes: 120
objectives:
- ModSecurity의 기본 구성·엔진 on/off·감사 로그 위치를 확인한다
- OWASP CRS 룰로 SQLi/XSS 차단을 테스트한다
- /var/log/apache2/modsec_audit.log 에서 차단 기록을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web VM에서 Apache + ModSecurity가 동작 중인지 확인하시오.
  hint: apachectl -M | grep -i security
  category: survey
  points: 10
  answer: apachectl -M 2>/dev/null | grep -i security
  answer_detail: 'Apache + ModSecurity WAF: web VM에서 Apache + ModSecurity가 동작 중인지
    확인하시오.'
  verify:
    type: output_contains
    expect: security
    field: stdout
  target_vm: web
- order: 2
  instruction: modsecurity.conf 에서 SecRuleEngine 값을 확인하시오.
  hint: grep SecRuleEngine …
  category: survey
  points: 10
  answer: sudo grep -H SecRuleEngine /etc/modsecurity/modsecurity.conf /etc/apache2/mods-enabled/security2.conf
    2>/dev/null
  answer_detail: 'Apache + ModSecurity WAF: modsecurity.conf 에서 SecRuleEngine 값을 확인하시오.'
  verify:
    type: output_contains
    expect: SecRuleEngine
    field: stdout
  target_vm: web
- order: 3
  instruction: OWASP CRS 디렉터리의 룰 파일 개수를 확인하시오.
  hint: ls /usr/share/modsecurity-crs/rules | wc -l
  category: survey
  points: 10
  answer: ls /usr/share/modsecurity-crs/rules/ 2>/dev/null | wc -l || ls /etc/modsecurity/crs/rules
    2>/dev/null | wc -l
  answer_detail: 'Apache + ModSecurity WAF: OWASP CRS 디렉터리의 룰 파일 개수를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
- order: 4
  instruction: SecRuleEngine 이 DetectionOnly 라면 On 으로 바꾸시오(이미 On 이면 건너뜀).
  hint: sed … SecRuleEngine
  category: configure
  points: 10
  answer: sudo sed -i 's/^SecRuleEngine DetectionOnly/SecRuleEngine On/' /etc/modsecurity/modsecurity.conf
    2>/dev/null ; grep SecRuleEngine /etc/modsecurity/modsecurity.conf
  answer_detail: 'Apache + ModSecurity WAF: SecRuleEngine 이 DetectionOnly 라면 On 으로
    바꾸시오(이미 On 이면 건너뜀).'
  verify:
    type: output_contains
    expect: SecRuleEngine
    field: stdout
  target_vm: web
- order: 5
  instruction: Apache를 재시작해 설정을 반영하시오.
  hint: systemctl restart apache2
  category: configure
  points: 10
  answer: sudo systemctl restart apache2 && systemctl is-active apache2
  answer_detail: 'Apache + ModSecurity WAF: Apache를 재시작해 설정을 반영하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - 재시작
    field: stdout
  target_vm: web
- order: 6
  instruction: attacker VM에서 SQL Injection payload로 테스트 요청을 보내시오 (403 차단 확인).
  hint: curl -o /dev/null -w '%{http_code}' '…union select…'
  category: verify
  points: 10
  answer: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/?id=1%20union%20select%201,2'
  answer_detail: 'Apache + ModSecurity WAF: attacker VM에서 SQL Injection payload로 테스트
    요청을 보내시오 (403 차단 확인).'
  verify:
    type: output_contains
    expect: '403'
    field: stdout
  target_vm: attacker
- order: 7
  instruction: attacker VM에서 XSS payload 요청을 보내 차단 응답을 확인하시오.
  hint: curl -w '%{http_code}' '…<script>…'
  category: verify
  points: 10
  answer: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/?q=%3Cscript%3Ealert(1)%3C%2Fscript%3E'
  answer_detail: 'Apache + ModSecurity WAF: attacker VM에서 XSS payload 요청을 보내 차단 응답을
    확인하시오.'
  verify:
    type: output_contains
    expect: '403'
    field: stdout
  target_vm: attacker
- order: 8
  instruction: web VM에서 modsec_audit.log 마지막 30줄을 확인해 차단 기록을 찾으시오.
  hint: tail /var/log/apache2/modsec_audit.log
  category: analysis
  points: 10
  answer: sudo tail -30 /var/log/apache2/modsec_audit.log 2>/dev/null | head -20
  answer_detail: 'Apache + ModSecurity WAF: web VM에서 modsec_audit.log 마지막 30줄을 확인해
    차단 기록을 찾으시오.'
  verify:
    type: output_contains
    expect: ModSec
    field: stdout
  target_vm: web
- order: 9
  instruction: modsec_audit.log 에서 rule id 942(SQLi)에 해당하는 이벤트를 카운트하시오.
  hint: grep -c '942'
  category: analysis
  points: 10
  answer: sudo grep -c '\[id \"942' /var/log/apache2/modsec_audit.log 2>/dev/null
  answer_detail: 'Apache + ModSecurity WAF: modsec_audit.log 에서 rule id 942(SQLi)에
    해당하는 이벤트를 카운트하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
- order: 10
  instruction: 정상 GET 요청(/ 루트)이 200 으로 응답하는지 확인하시오(정상 트래픽 미차단 검증).
  hint: curl -w '%{http_code}' http://{{WEB_IP}}/
  category: verify
  points: 10
  answer: curl -sS -o /dev/null -w '%{http_code}\n' http://10.20.30.80/
  answer_detail: 'Apache + ModSecurity WAF: 정상 GET 요청(/ 루트)이 200 으로 응답하는지 확인하시오(정상
    트래픽 미차단 검증).'
  verify:
    type: output_contains
    expect: '200'
    field: stdout
  target_vm: attacker
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  answer: ''
  answer_detail: ''
