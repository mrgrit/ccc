  hint: nft list table inet exam
  category: verify
  points: 10
  answer: sudo nft list table inet exam
  answer_detail: '중간고사 — 방화벽 + IPS 구성 실기: exam 테이블 전체 룰셋을 확인하시오.'
  verify:
    type: output_contains
    expect: exam
    field: stdout
    semantic:
      intent: exam 테이블 룰셋 확인 — sudo nft list table inet exam. 작성한 모든 룰 (stateful + lo + SSH rate limit
        + icmp echo-request) 확인. 체인 구조 + 룰 순서 검증.
