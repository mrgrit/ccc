lab_id: secops-nonai-week04
title: Suricata IPS 설치·구성
version: non-ai
course: secops-nonai
week: 4
description: Suricata의 기본 설정, 인터페이스·규칙 경로, 초기 동작을 확인하고 기본 룰로 간단한 탐지를 수행한다.
difficulty: easy
duration_minutes: 120
objectives:
- Suricata 서비스 설치·구성 상태를 확인할 수 있다
- suricata.yaml의 HOME_NET, 인터페이스 설정을 이해한다
- 간단한 테스트 룰로 eve.json에 알람이 기록되는 것을 검증할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 Suricata가 설치되어 있는지 확인하시오.
  hint: suricata -V
  category: survey
  points: 10
  answer: suricata -V 2>&1 | head
  answer_detail: 'Suricata IPS 설치·구성: secu VM에 Suricata가 설치되어 있는지 확인하시오.'
  verify:
    type: output_contains
    expect: Suricata
    field: stdout
  target_vm: secu
- order: 2
  instruction: /etc/suricata/suricata.yaml 에서 HOME_NET 값을 확인하시오.
  hint: grep HOME_NET /etc/suricata/suricata.yaml
  category: survey
  points: 10
  answer: grep -n HOME_NET /etc/suricata/suricata.yaml | head
  answer_detail: 'Suricata IPS 설치·구성: /etc/suricata/suricata.yaml 에서 HOME_NET 값을 확인하시오.'
  verify:
    type: output_contains
    expect: HOME_NET
    field: stdout
  target_vm: secu
- order: 3
  instruction: Suricata가 사용 중인 네트워크 인터페이스(af-packet section)를 확인하시오.
  hint: awk '/af-packet/,/pcap/' /etc/suricata/suricata.yaml
  category: survey
  points: 10
  answer: awk '/af-packet/,/pcap:/' /etc/suricata/suricata.yaml | head -15
  answer_detail: 'Suricata IPS 설치·구성: Suricata가 사용 중인 네트워크 인터페이스(af-packet section)를
    확인하시오.'
  verify:
    type: output_contains
    expect: interface
    field: stdout
  target_vm: secu
- order: 4
  instruction: /etc/suricata/rules/local.rules 에 'alert icmp any any -> any any (msg:"ICMP
    ping"; sid:1000001; rev:1;)' 룰을 추가하시오.
  hint: echo … | sudo tee -a
  category: configure
  points: 10
  answer: echo 'alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)'
    | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata IPS 설치·구성: /etc/suricata/rules/local.rules 에 ''alert icmp
    any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)'' 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: ICMP
    field: stdout
  target_vm: secu
- order: 5
  instruction: local.rules 가 suricata.yaml의 rule-files 섹션에 포함되어 있는지 확인하시오.
  hint: grep local.rules /etc/suricata/suricata.yaml
  category: configure
  points: 10
  answer: grep -n local.rules /etc/suricata/suricata.yaml || echo 'not referenced'
  answer_detail: 'Suricata IPS 설치·구성: local.rules 가 suricata.yaml의 rule-files 섹션에
    포함되어 있는지 확인하시오.'
  verify:
    type: output_contains
    expect: local.rules
    field: stdout
  target_vm: secu
- order: 6
  instruction: Suricata 설정 파일 문법을 --test-config 로 검증하시오.
  hint: suricata -T -c /etc/suricata/suricata.yaml
  category: configure
  points: 10
  answer: sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5
  answer_detail: 'Suricata IPS 설치·구성: Suricata 설정 파일 문법을 --test-config 로 검증하시오.'
  verify:
    type: output_contains
    expect: configuration
    field: stdout
  target_vm: secu
- order: 7
  instruction: Suricata 서비스를 재시작해 새 룰을 로드하시오.
  hint: systemctl restart suricata
  category: configure
  points: 10
  answer: sudo systemctl restart suricata && sleep 2 && systemctl is-active suricata
  answer_detail: 'Suricata IPS 설치·구성: Suricata 서비스를 재시작해 새 룰을 로드하시오.'
  verify:
    type: output_contains
    expect:
    - active
    - Suricata
    field: stdout
  target_vm: secu
- order: 8
  instruction: attacker VM에서 secu VM으로 ping을 3회 보내 ICMP 트래픽을 발생시키시오.
  hint: ping -c 3 10.20.30.1
  category: verify
  points: 10
  answer: ping -c 3 10.20.30.1
  answer_detail: 'Suricata IPS 설치·구성: attacker VM에서 secu VM으로 ping을 3회 보내 ICMP 트래픽을
    발생시키시오.'
  verify:
    type: output_contains
    expect:
    - bytes
    - ping
    field: stdout
  target_vm: attacker
- order: 9
  instruction: secu VM의 /var/log/suricata/eve.json 마지막 20줄에서 ICMP 알람을 찾으시오.
  hint: tail /var/log/suricata/eve.json | grep ICMP
  category: verify
  points: 10
  answer: sudo tail -50 /var/log/suricata/eve.json | grep -i 'ICMP ping' | head
  answer_detail: 'Suricata IPS 설치·구성: secu VM의 /var/log/suricata/eve.json 마지막 20줄에서
    ICMP 알람을 찾으시오.'
  verify:
    type: output_contains
    expect: ICMP
    field: stdout
  target_vm: secu
- order: 10
  instruction: 추가한 ICMP 테스트 룰(sid:1000001)을 local.rules 에서 제거하시오.
  hint: sed -i '/sid:1000001/d' …
  category: cleanup
  points: 10
  answer: sudo sed -i '/sid:1000001/d' /etc/suricata/rules/local.rules && sudo systemctl
    reload suricata
  answer_detail: 'Suricata IPS 설치·구성: 추가한 ICMP 테스트 룰(sid:1000001)을 local.rules 에서
    제거하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  answer: ''
  answer_detail: ''
