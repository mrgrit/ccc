  hint: echo … | sudo tee -a
  category: configure
  points: 10
  answer: echo 'alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  answer_detail: 'Suricata IPS 설치·구성: /etc/suricata/rules/local.rules 에 ''alert icmp any any -> any any
    (msg:"ICMP ping"; sid:1000001; rev:1;)'' 룰을 추가하시오.'
  verify:
    type: output_contains
    expect: ICMP
    field: stdout
    semantic:
      intent: 테스트 룰 작성 — echo 'alert icmp any any -> any any (msg:"ICMP ping"; sid:1000001; rev:1;)' |
        sudo tee -a /etc/suricata/rules/local.rules. alert (동작) + icmp (프로토콜) + any any -> any any (방향성
