  category: cleanup
  points: 10
  answer: sudo sed -i '/sid:1000001/d' /etc/suricata/rules/local.rules && sudo systemctl reload suricata
  answer_detail: 'Suricata IPS 설치·구성: 추가한 ICMP 테스트 룰(sid:1000001)을 local.rules 에서 제거하시오.'
