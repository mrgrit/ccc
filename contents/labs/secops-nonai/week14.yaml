- order: 99
  instruction: |
    [복합 시나리오] "End-to-End 인시던트 대응 — XSS 공격 → 5 layer 통합 추적 + IR 5 단계"

    ## 상황 (w01-w13 시나리오 종합)

    ABC 핀테크 SOC 신규 분석가, 14주 차 (학기 후반).
    1~10 step 으로 5 솔루션 (nft, Suricata, ModSec, Wazuh, OpenCTI) 연계 *상태 점검* 까지. 학습
    목표 #4 — IR 프로세스 — 1~10 은 모니터링 점검. 실 incident 의 NIST IR 5 단계 수행 X.

    > 선임: "이제 *진짜 incident drill* 해보자. attacker 가 web 으로 XSS 공격 → 5 layer 가
    >  evidence 남기고 → SOC 가 5 단계 IR (Detection/Containment/Eradication/Recovery/
    >  Lessons Learned). 1주차부터 13주차 까지 모든 도구 종합 활용."

    학습 목표 #4 (IR 프로세스) 행동 증명 + w01-w13 종합 활용.

    ※ Non-AI 트랙: 학생 직접 SSH + transcript paste. attacker, secu, web, siem 4 VM 모두 사용.

    ## 임무 (5 단계 = NIST IR 5 단계, 약 35분)

    ### Phase 1 — Detection (5분)

    학생이 attacker(10.20.30.201) SSH 후 XSS 공격 2회:
      ```
      ssh ccc@10.20.30.201
      curl -sI -A 'XSSAttacker/1.0' "http://10.20.30.80/?q=<script>alert(document.cookie)</script>" --max-time 5
      curl -sI "http://10.20.30.80/api/Reviews?q=<img src=x onerror=alert(1)>" --max-time 5
      ```
    → t0 = 첫 alert 발생 시각 (학생이 메모).

    5 layer evidence 동시 수집 (5초 이내):
      - **nft** (secu): `ssh ccc@10.20.30.1 'sudo nft list table inet filter | grep counter | head -5'`
      - **Suricata**: `ssh ccc@10.20.30.1 'sudo tail -50 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\")" | head -3'`
      - **ModSec** (web): `ssh ccc@10.20.30.80 'sudo tail -50 /var/log/apache2/modsec_audit.log | grep -E "942|XSS|script"'`
      - **Wazuh** (siem): `ssh ccc@10.20.30.100 'sudo tail -100 /var/ossec/logs/alerts/alerts.json | jq -c "select(.data.url? | tostring | contains(\"<script>\"))" | head -3'`
      - **OpenCTI**: graphql 으로 attacker IP indicator 검색

    ### Phase 2 — Containment (10분)

    OpenCTI 에 attacker IP 추가:
      ```
      OPENCTI_TOKEN="<.env 토큰>"
      curl -sX POST 'http://10.20.30.100:8080/graphql' \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{"query": "mutation { indicatorAdd(input: {name: \"XSS attack source 10.20.30.201\", pattern: \"[ipv4-addr:value = $\\\"10.20.30.201$\\\"]\", pattern_type: \"stix\", x_opencti_main_observable_type: \"IPv4-Addr\"}) { id } }"}'
      ```

    secu 의 cti-sync.sh 실행 (w13 의 script 재사용):
      `ssh ccc@10.20.30.1 "OPENCTI_TOKEN=$OPENCTI_TOKEN /usr/local/bin/cti-sync.sh"`
    → cti_ips set 에 10.20.30.201 추가.

    → t1 = containment 완료, **MTTC = t1 - t0** (목표 ≤ 10분, 학생이 메모).

    ### Phase 3 — Eradication (5분)

    web 의 ModSec 에 IP-deny 룰:
      ```
      ssh ccc@10.20.30.80
      sudo bash -c 'cat > /etc/modsecurity/include-after.conf <<"EOF"
      <LocationMatch ".*">
        SecRule REMOTE_ADDR "@ipMatch 10.20.30.201" \
          "phase:1,id:99000099,deny,status:403,msg:\"Blocked XSS attack source\""
      </LocationMatch>
      EOF'
      sudo systemctl reload apache2
      ```

    검증:
      attacker 에서 `curl -sI 'http://10.20.30.80/?test=normal' --max-time 5`
    → 예상: 403 (이전엔 200 정상 — IP 자체 차단).

    ### Phase 4 — Recovery (5분)

    정상 사용자 (web 자체) 의 GET 응답:
      `ssh ccc@10.20.30.80 'curl -sI http://localhost/ --max-time 3'`
    → 예상: 200 (다른 IP 의 정상 트래픽 영향 없음).

    Wazuh FIM 으로 backend 손상 무결성 확인:
      `ssh ccc@10.20.30.100 'sudo tail -50 /var/ossec/logs/alerts/alerts.json | jq -c "select(.syscheck?)" | head'`

    ### Phase 5 — Lessons Learned (10분)

    학생이 작성하는 markdown 보고서:
    ```
    # Incident IR-2026-W14-001 — XSS Attack Response

    ## Timeline
    - t0 (Phase 1): XSS payload curl → 5 layer evidence 발생 시각 [기록]
    - t1 (Phase 2): OpenCTI 등록 + cti-sync 완료 [기록]
    - **MTTC = t1 - t0 = N 분** (목표 ≤ 10분)
