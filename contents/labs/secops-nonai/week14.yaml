lab_id: secops-nonai-week14
title: 통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계
version: non-ai
course: secops-nonai
week: 14
description: 각 보안 솔루션의 이벤트가 Wazuh SIEM으로 수렴되고 CTI와 연계되는 흐름을 점검한다.
difficulty: hard
duration_minutes: 120
objectives:
- Suricata → Wazuh 로 eve.json 이 수집되는지 확인한다
- ModSecurity → Wazuh 감사 로그 수집 경로를 확인한다
- CTI → nftables 차단 체인까지 이어지는 end-to-end 흐름을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에서 suricata eve.json 이 /var/log/suricata/eve.json 으로 기록되는지 확인하시오.
  hint: ls -la /var/log/suricata/eve.json
  category: survey
  points: 10
  answer: sudo ls -la /var/log/suricata/eve.json 2>/dev/null
  answer_detail: '통합 보안 아키텍처 — 방화벽·IPS·SIEM·CTI 연계: secu VM에서 suricata eve.json 이 /var/log/suricata/eve.json
    으로 기록되는지 확인하시오.'
  verify:
    type: output_contains
    expect: eve.json
    field: stdout
    semantic:
      intent: eve.json 기록 확인 — sudo ls -la /var/log/suricata/eve.json. Suricata 실시간 JSON 로그 파일. 통합 아키텍처의
        핵심 데이터 소스. SIEM 수집 전제. 파일 크기 + 권한 + 시간 확인.
      success_criteria:
      - eve.json 키워드
      - ls -la 실행
      - 파일 정보 출력
      acceptable_methods:
      - ls -la eve.json
      - stat eve.json
      - du -h eve.json 크기
      - logrotate 상태 확인
      negative_signs:
      - 파일 존재 확인 없음
      - 경로 혼동
      - 권한 확인 없음
  target_vm: secu
- order: 2
