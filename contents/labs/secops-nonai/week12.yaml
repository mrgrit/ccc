- order: 99
  instruction: |
    [복합 시나리오] "STIX 2.1 IoC 직접 작성·import — CTI 의 raw cycle"

    ■ 상황 (w01-w11 시나리오 연속)

    ABC 핀테크 SOC 신규 분석가, 12주 차.
    1~10 step 으로 OpenCTI 컨테이너 + 의존 서비스 + 8080 포트 동작 확인까지. 학습 목표 #2 —
    *STIX/TAXII 표준* — 1~10 은 *플랫폼 헬스체크* 만. 표준 데이터 형식·import cycle 미검증.

    ※ 선임: "OpenCTI 의 진짜 가치는 *외부 위협 인텔* 받아서 보관·correlation. 표준 형식이
    ※  STIX 2.1 — 위협 정보의 'JSON XML' 같은 거야. ISAC 에서 받은 IoC 3건 (악성 IP, 도메인,
    ※  멀웨어 해시) 을 STIX 형식으로 직접 작성하고 OpenCTI 에 import 해봐. Connector 자동화
    ※  전에 *raw cycle* 부터 손으로 해야 STIX 가 머리에 남아."

    학습 목표 #2 (STIX/TAXII) + #4 (Connector 사전 단계) 행동 증명.

    ※ Non-AI 트랙: 학생 직접 SSH + transcript paste.

    ■ 임무 (3 단계, 약 25분)

    ▶ Phase A — STIX 2.1 IoC 3건 작성 (10분)

    siem 또는 manager 에서 작성:
      ```
      ssh ccc@10.20.30.100
      mkdir -p /tmp/stix-import
      cat > /tmp/stix-import/3-iocs.json <<'EOF'
      {
        "type": "bundle",
        "id": "bundle--PLACEHOLDER",
        "objects": [
          {
            "type": "indicator",
            "spec_version": "2.1",
            "id": "indicator--PLACEHOLDER",
            "created": "2026-05-01T00:00:00.000Z",
            "modified": "2026-05-01T00:00:00.000Z",
            "name": "Malicious IP — APT29 C2",
            "indicator_types": ["malicious-activity"],
            "pattern": "[ipv4-addr:value = '198.51.100.66']",
            "pattern_type": "stix",
            "valid_from": "2026-05-01T00:00:00.000Z"
          },
          {
            "type": "indicator",
            "spec_version": "2.1",
            "id": "indicator--PLACEHOLDER",
            "created": "2026-05-01T00:00:00.000Z",
            "modified": "2026-05-01T00:00:00.000Z",
            "name": "Malicious domain — phishing",
            "indicator_types": ["malicious-activity"],
            "pattern": "[domain-name:value = 'evil-test.invalid']",
            "pattern_type": "stix",
            "valid_from": "2026-05-01T00:00:00.000Z"
          },
          {
            "type": "indicator",
            "spec_version": "2.1",
            "id": "indicator--PLACEHOLDER",
            "created": "2026-05-01T00:00:00.000Z",
            "modified": "2026-05-01T00:00:00.000Z",
            "name": "Ransomware EXE hash",
            "indicator_types": ["malicious-activity"],
            "pattern": "[file:hashes.'SHA-256' = '275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f']",
            "pattern_type": "stix",
            "valid_from": "2026-05-01T00:00:00.000Z"
          }
        ]
      }
      EOF

      python3 -c "
      import json, uuid, re
      with open('/tmp/stix-import/3-iocs.json') as f: c = f.read()
      while 'PLACEHOLDER' in c:
          c = c.replace('PLACEHOLDER', str(uuid.uuid4()), 1)
      open('/tmp/stix-import/3-iocs.json', 'w').write(c)
      "
      cat /tmp/stix-import/3-iocs.json | python3 -m json.tool | head -10
      ```

    ▶ Phase B — OpenCTI GraphQL API 으로 import (10분)

    OpenCTI admin token 추출:
      `sudo grep ^OPENCTI_ADMIN_TOKEN /opt/opencti/.env 2>/dev/null || echo "token 위치 확인 필요"`
    → token 메모.

    GraphQL mutation 으로 indicator 1건 import:
      ```
      OPENCTI_TOKEN="<위에서 얻은 token>"
      curl -X POST 'http://10.20.30.100:8080/graphql' \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{
          "query": "mutation { indicatorAdd(input: {name: \\"Malicious IP test\\", pattern: \\"[ipv4-addr:value = $\\\\\\"198.51.100.66$\\\\\\"]\\", pattern_type: \\"stix\\", x_opencti_main_observable_type: \\"IPv4-Addr\\"}) { id name } }"
        }'
      ```
    → 예상: id 와 name 응답.

    ▶ Phase C — 검색 + 회고 + 정리 (5분)

    GraphQL query 로 검색:
      ```
      curl -X POST 'http://10.20.30.100:8080/graphql' \
        -H "Authorization: Bearer $OPENCTI_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{"query": "{ indicators(first: 5, search: \\"Malicious IP test\\") { edges { node { id name pattern } } } }"}' \
        | jq .
      ```
    → 예상: edges 에 작성한 indicator.

    1~2 단락 회고:
    1. **STIX 2.1 핵심 객체** — bundle 로 묶인 indicator/observable. pattern 이 STIX 표준
    2. **TAXII vs 직접 import** — TAXII = STIX 의 *전송 프로토콜*. 본 lab 은 직접 graphql + REST.
