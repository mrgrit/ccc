      - sudo-modified-file trigger
      negative_signs:
      - FIM 감시 외 경로
      - 파일 생성 확인 없음
      - 트리거 의도 없음
  target_vm: siem
- order: 4
  instruction: 'alerts.json 에서 /etc/ccc-fim-test 관련 이벤트를 검색하시오(FIM 이벤트 지연 반영 가능).


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-nonai-week11/4/alerts.json 사전
    주입. `jq -c ''.rule'' /home/ccc/cyber-range/fixtures/secops-nonai-week11/4/alerts.json`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: grep ccc-fim-test …
  category: analysis
  points: 10
  answer: sleep 10 && sudo grep ccc-fim-test /var/ossec/logs/alerts/alerts.json 2>/dev/null
    | tail
  answer_detail: 'Wazuh FIM / SCA / Active Response: alerts.json 에서 /etc/ccc-fim-test
    관련 이벤트를 검색하시오(FIM 이벤트 지연 반영 가능).'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: FIM alert 확인 — sleep 10 && sudo grep ccc-fim-test /var/ossec/logs/alerts/alerts.json
        | tail. syscheck 주기 탐지 지연 (기본 12h + realtime 옵션 설정 시 즉시). sleep 10 대기 후 alerts
        조회. FIM alert rule 550 (new file) / 553 (modified).
      success_criteria:
