lab_id: secops-nonai-week11
title: Wazuh FIM / SCA / Active Response
version: non-ai
course: secops-nonai
week: 11
description: File Integrity Monitoring, Security Configuration Assessment, Active
  Response 기능을 구성·검증한다.
difficulty: medium
duration_minutes: 120
objectives:
- FIM(syscheck)이 감시 중인 경로를 확인한다
- SCA 모듈의 최근 스캔 결과를 조회한다
- Active Response로 악성 IP를 firewall-drop 하는 체인을 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: ossec.conf의 <syscheck> 섹션에서 감시 디렉터리 목록을 확인하시오.
  hint: grep directories /var/ossec/etc/ossec.conf
  category: survey
  points: 10
  answer: sudo grep -E '<directories' /var/ossec/etc/ossec.conf | head -10
  answer_detail: 'Wazuh FIM / SCA / Active Response: ossec.conf의 <syscheck> 섹션에서 감시
    디렉터리 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: directories
    field: stdout
    semantic:
      intent: FIM 감시 디렉터리 — sudo grep -E '<directories' /var/ossec/etc/ossec.conf
        | head -10. <syscheck><directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
        형식. 파일 무결성 모니터링 (File Integrity Monitoring). MITRE ATT&CK T1070 Indicator
        Removal 탐지 + T1543 Service Create.
      success_criteria:
      - directories 키워드
      - grep ossec.conf
      - 감시 경로 출력
      acceptable_methods:
      - grep <directories ossec.conf
      - awk '/<syscheck>/,/<\/syscheck>/'
      - Wazuh API /syscheck/configuration
      - xmllint --xpath
      negative_signs:
      - syscheck 섹션 없음
      - 감시 경로 언급 없음
      - FIM 개념 없음
  target_vm: siem
- order: 2
  instruction: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의 존재를 확인하시오.
  hint: ls -la /var/ossec/queue/fim/db/fim.db
  category: verify
  points: 10
  answer: sudo ls -la /var/ossec/queue/fim/db/fim.db 2>/dev/null || echo 'no fim.db'
  answer_detail: 'Wazuh FIM / SCA / Active Response: FIM 데이터베이스(/var/ossec/queue/fim/db/fim.db)의
    존재를 확인하시오.'
  verify:
    type: output_contains
    expect: fim
    field: stdout
    semantic:
      intent: FIM DB 존재 확인 — sudo ls -la /var/ossec/queue/fim/db/fim.db. SQLite 기반
        FIM 상태 DB. 파일 해시 + 메타데이터 저장 + 변경 비교 baseline. 삭제 시 재스캔 필수.
      success_criteria:
      - fim 키워드
      - ls -la 실행
      - fim.db 경로 확인
      acceptable_methods:
      - ls -la fim.db
      - sqlite3 fim.db .tables (내부 조회)
      - stat fim.db
      - find /var/ossec -name 'fim.db'
      negative_signs:
      - 경로 혼동
      - 파일 존재 여부 확인 없음
      - SQLite 기반 언급 없음
  target_vm: siem
- order: 3
  instruction: test 파일 /etc/ccc-fim-test 를 생성해 FIM 이벤트를 발생시키시오.
  hint: sudo touch /etc/ccc-fim-test
  category: verify
  points: 10
  answer: sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test
  answer_detail: 'Wazuh FIM / SCA / Active Response: test 파일 /etc/ccc-fim-test 를 생성해
    FIM 이벤트를 발생시키시오.'
  verify:
    type: output_contains
    expect: ccc-fim
    field: stdout
    semantic:
      intent: FIM 이벤트 유발 — sudo touch /etc/ccc-fim-test && ls -la /etc/ccc-fim-test.
        /etc/ 아래 파일 생성 = FIM 감시 디렉토리 이벤트 발생. syscheck daemon 이 주기 스캔 시 탐지. 실제 트리거
        테스트.
      success_criteria:
      - ccc-fim 키워드
      - touch /etc/ccc-fim-test
      - 파일 생성 확인
      acceptable_methods:
      - touch /etc/ccc-fim-test + ls
      - echo 'test' > /etc/ccc-fim-test
