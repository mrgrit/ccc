      - grep 필터 없음
      - syscheck 스캔 주기 이해 없음
  target_vm: siem
  fixtures:
  - generator: wazuh_alert
    target_vm: siem
    path: /home/ccc/cyber-range/fixtures/secops-nonai-week11/4/alerts.json
    params:
