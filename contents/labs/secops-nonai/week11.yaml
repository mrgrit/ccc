- order: 99
  instruction: "[복합 시나리오] \"Wazuh AR — SSH brute 자동 차단\" (수동 → 자동 비교)\n\n## 상황 (w01-w10\
    \ 시나리오 연속)\n\nABC 핀테크 SOC 신규 분석가, 11주 차.\n1~10 step 으로 FIM trigger + SCA 조회 +\
    \ AR 설정 확인 + 수동 nft 차단 시뮬까지. 학습 목표\n#3 — Active Response 자동 대응 — 1~10 의 8-9 는\
    \ *수동*. AR 자동 흐름 미검증.\n\n> 선임: \"AR 의 진짜 가치는 *수동 개입 없이* 차단되는 거야. SSH brute rule\
    \ 5710 매칭 시\n>  attacker IP 자동 차단하는 체인 만들어봐. 1분간 차단 후 자동 해제 — temporary block\
    \ 패턴.\"\n\n학습 목표 #3 (AR 자동 대응) 행동 증명.\n\n※ Non-AI 트랙: 학생 직접 SSH + transcript paste.\n\
    \n## 임무 (3 단계, 약 25분)\n\n### Phase A — AR 설정 추가 (10분)\n\nsiem(10.20.30.100) SSH\
    \ 후:\n  ```\n  ssh ccc@10.20.30.100\n  sudo cp /var/ossec/etc/ossec.conf /var/ossec/etc/ossec.conf.bak\n\
    \n  sudo tee -a /var/ossec/etc/ossec.conf <<'EOF'\n  <command>\n    <name>verify-firewall-drop</name>\n\
    \    <executable>firewall-drop</executable>\n    <timeout_allowed>yes</timeout_allowed>\n\
    \  </command>\n\n  <active-response>\n    <command>verify-firewall-drop</command>\n\
    \    <location>local</location>\n    <rules_id>5710,5712</rules_id>\n    <timeout>60</timeout>\n\
    \  </active-response>\n  EOF\n\n  sudo systemctl restart wazuh-manager && sleep\
    \ 5\n  sudo grep verify-firewall-drop /var/ossec/etc/ossec.conf | head\n  ```\n\
    \n의도: rule 5710/5712 매칭 시 wazuh AR 의 firewall-drop script 자동 실행 → 60초 차단.\n\n\
    ▶ Phase B — SSH brute 발동 + AR 자동 흐름 4단계 cross-check (10분)\n\nattacker SSH 후\
    \ web 으로 7회 fail:\n  ```\n  ssh ccc@10.20.30.201\n  for pw in wrong1 wrong2 wrong3\
    \ wrong4 wrong5 wrong6 wrong7; do\n    sshpass -p \"$pw\" ssh -o StrictHostKeyChecking=no\
    \ -o ConnectTimeout=2 ccc@10.20.30.80 'echo' 2>/dev/null\n  done\n  ```\n\nsiem\
    \ 에서 4 단계 cross-check (5초 이내):\n\n**단계 1** — alerts.json rule 5710:\n  `sudo tail\
    \ -50 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.rule.id==\"5710\" or\
    \ .rule.id==\"5712\")' | head -1`\n\n**단계 2** — active-responses.log AR 호출:\n\
    \  `sudo tail -20 /var/ossec/logs/active-responses.log | grep -E 'firewall-drop|verify-firewall-drop'`\n\
    \n**단계 3** — iptables 자동 추가:\n  `sudo iptables -L -n | grep -E '198.51|10.20.30.201|DROP'\
    \ | head`\n\n**단계 4** — 60초 후 자동 해제:\n  `sleep 65 && sudo iptables -L -n | grep\
    \ -E '10.20.30.201|DROP' | head`\n→ 예상: 차단 룰 *제거됨*.\n\n### Phase C — 수동 vs 자동\
    \ 비교 + 회고 + 정리 (5분)\n\n## 비교표 (1~10 수동 vs 99 자동)\n\n| 측면 | 수동 (1~10 의 8-9번) |\
    \ 자동 (AR, 99번) |\n|------|------------------|---------------|\n| trigger | 운영자\
