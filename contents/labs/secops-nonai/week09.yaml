lab_id: secops-nonai-week09
title: Wazuh SIEM 설치·구성
version: non-ai
course: secops-nonai
week: 9
description: Wazuh Manager·Indexer·Dashboard 구성 상태를 확인하고 siem의 agent 목록을 조회한다.
difficulty: medium
duration_minutes: 120
objectives:
- Wazuh Manager/Indexer/Dashboard/agent 서비스 상태를 확인한다
- /var/ossec/etc/ossec.conf 의 주요 설정을 이해한다
- agent_control / wazuh-wui 로 에이전트 목록을 조회한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM에서 Wazuh Manager 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-manager
  category: survey
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): systemctl is-active wazuh-manager'
  answer_detail: 'Wazuh SIEM 설치·구성: siem VM에서 Wazuh Manager 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: active
    field: stdout
  target_vm: siem
- order: 2
  instruction: Wazuh Indexer 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-indexer
  category: survey
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): systemctl is-active wazuh-indexer || echo inactive'
  answer_detail: 'Wazuh SIEM 설치·구성: Wazuh Indexer 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 3
  instruction: Wazuh Dashboard 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-dashboard
  category: survey
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): systemctl is-active wazuh-dashboard || echo inactive'
  answer_detail: 'Wazuh SIEM 설치·구성: Wazuh Dashboard 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 4
  instruction: wazuh-control info 로 Wazuh 버전·설치 정보를 확인하시오.
  hint: /var/ossec/bin/wazuh-control info
  category: survey
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): sudo /var/ossec/bin/wazuh-control info 2>&1 | head'
  answer_detail: 'Wazuh SIEM 설치·구성: wazuh-control info 로 Wazuh 버전·설치 정보를 확인하시오.'
  verify:
    type: output_contains
    expect: WAZUH
    field: stdout
  target_vm: siem
- order: 5
  instruction: agent_control -l 로 등록된 에이전트 목록을 조회하시오.
  hint: /var/ossec/bin/agent_control -l
  category: survey
  points: 10
  answer: sudo /var/ossec/bin/agent_control -l 2>&1 | head
  answer_detail: 'Wazuh SIEM 설치·구성: agent_control -l 로 등록된 에이전트 목록을 조회하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 6
  instruction: /var/ossec/etc/ossec.conf 에서 <global> 섹션을 확인하시오.
  hint: awk '/<global>/,/<\/global>/' …
  category: survey
  points: 10
  answer: sudo awk '/<global>/,/<\/global>/' /var/ossec/etc/ossec.conf | head -20
  answer_detail: 'Wazuh SIEM 설치·구성: /var/ossec/etc/ossec.conf 에서 <global> 섹션을 확인하시오.'
  verify:
    type: output_contains
    expect: global
    field: stdout
  target_vm: siem
- order: 7
  instruction: ossec.conf 에서 <alerts>/<log_alert_level> 값을 확인하시오.
  hint: grep log_alert_level …
  category: survey
  points: 10
  answer: sudo grep -n log_alert_level /var/ossec/etc/ossec.conf
  answer_detail: 'Wazuh SIEM 설치·구성: ossec.conf 에서 <alerts>/<log_alert_level> 값을 확인하시오.'
  verify:
    type: output_contains
    expect: log_alert_level
    field: stdout
  target_vm: siem
- order: 8
  instruction: Wazuh Manager의 최근 alerts.json 2줄을 확인하시오.
  hint: tail -2 /var/ossec/logs/alerts/alerts.json
  category: verify
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): sudo tail -2 /var/ossec/logs/alerts/alerts.json 2>/dev/null'
  answer_detail: 'Wazuh SIEM 설치·구성: Wazuh Manager의 최근 alerts.json 2줄을 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 9
  instruction: Wazuh Indexer API(9200) 가 응답하는지 확인하시오.
  hint: curl -k https://localhost:9200
  category: verify
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): curl -sk -o /dev/null -w ''%{http_code}\n'' https://localhost:9200
    -u admin:admin 2>/dev/null || ss -tlnp | grep 9200'
  answer_detail: 'Wazuh SIEM 설치·구성: Wazuh Indexer API(9200) 가 응답하는지 확인하시오.'
  verify:
    type: output_contains
    expect: '9200'
    field: stdout
  target_vm: siem
- order: 10
  instruction: 최근 1시간 alerts.json 내 alert 수를 집계하시오.
  hint: wc -l alerts.json
  category: analysis
  points: 10
  answer: sudo wc -l /var/ossec/logs/alerts/alerts.json 2>/dev/null
  answer_detail: 'Wazuh SIEM 설치·구성: 최근 1시간 alerts.json 내 alert 수를 집계하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
