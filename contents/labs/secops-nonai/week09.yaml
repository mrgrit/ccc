lab_id: secops-nonai-week09
title: Wazuh SIEM 설치·구성
version: non-ai
course: secops-nonai
week: 9
description: Wazuh Manager·Indexer·Dashboard 구성 상태를 확인하고 siem의 agent 목록을 조회한다.
difficulty: medium
duration_minutes: 120
objectives:
- Wazuh Manager/Indexer/Dashboard/agent 서비스 상태를 확인한다
- /var/ossec/etc/ossec.conf 의 주요 설정을 이해한다
- agent_control / wazuh-wui 로 에이전트 목록을 조회한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM에서 Wazuh Manager 서비스 상태를 확인하시오.
  hint: systemctl is-active wazuh-manager
  category: survey
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): systemctl is-active wazuh-manager'
  answer_detail: 'Wazuh SIEM 설치·구성: siem VM에서 Wazuh Manager 서비스 상태를 확인하시오.'
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: 'Wazuh Manager 서비스 — systemctl is-active wazuh-manager. SIEM 핵심 데몬:
        로그 수집 + 디코딩 + 룰 매칭 + alert 생성. active 확인. 비활성 = SOC 기능 전무.'
      success_criteria:
      - active 키워드
      - systemctl is-active
      - wazuh-manager 대상
      acceptable_methods:
      - systemctl is-active wazuh-manager
      - /var/ossec/bin/wazuh-control status
      - systemctl status --no-pager
      - Wazuh API /manager/status
      negative_signs:
      - wazuh-agent 혼동
      - ps aux 로만 확인
      - active 상태 해석 누락
  target_vm: siem
