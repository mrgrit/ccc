- order: 99
  instruction: "[복합 시나리오] \"agent → manager event flow — web 에서 trigger 한 alert 가\
    \ siem 까지\"\n\n## 상황 (w01-w08 시나리오 연속)\n\nABC 핀테크 SOC 신규 분석가, 9주 차.\n1~10 step\
    \ 으로 Wazuh 설치 상태 + agent 목록 확인까지 했다. 학습 목표 #2 — Manager/Agent\n아키텍처 — *상태만* 봤지\
    \ *event flow* 는 검증 안 됨.\n\n> 선임: \"w08 중간고사에서 SIEM 통합의 필요성 확인했지? 이제 그 SIEM 이\
    \ *진짜 일하는지*\n>  보자. web 에서 SSH 인증 실패 5회 발생시켜봐. Wazuh rule 5710 (multiple authentication\n\
    ※  failures) 가 매칭되어야 해. 그게 manager 까지 도달하면 agent flow 가 작동하는 거야.\n>  log → agent\
    \ → manager → alerts.json 의 4 단계 evidence 를 모두 확인해.\"\n\n학습 목표 #2 (Manager/Agent\
    \ 아키텍처) 의 *event flow* 행동 증명.\n\n※ Non-AI 트랙: 학생 직접 SSH + transcript paste.\n\n\
    ■ 임무 (3 단계, 약 25분)\n\n### Phase A — Agent 상태 + 4단계 evidence 위치 사전 확인 (5분)\n\n\
    siem(10.20.30.100) SSH 후:\n  ```\n  ssh ccc@10.20.30.100\n  sudo /var/ossec/bin/agent_control\
    \ -l\n  ```\n→ web (10.20.30.80) agent 가 *Active* 인지 확인. ID 메모.\n\n각 단계 의 evidence\
    \ 위치:\n\n| 단계 | 위치 | 의미 |\n|------|-----|-----|\n| 1. log (web) | `/var/log/auth.log`\
    \ | SSH 인증 실패 원본 |\n| 2. agent → manager 전송 | (메모리) | wazuh-agent 가 전송 |\n| 3.\
    \ manager 수신 | `/var/ossec/logs/archives/archives.log` (선택) | manager raw event\
    \ |\n| 4. alert 생성 | `/var/ossec/logs/alerts/alerts.json` | rule 매칭 alert |\n\n\
    ▶ Phase B — Trigger + 4 단계 cross-check (15분)\n\nattacker(10.20.30.201) SSH 후\
    \ web 으로 SSH 5 fail:\n  ```\n  ssh ccc@10.20.30.201\n  for pw in wrong1 wrong2\
    \ wrong3 wrong4 wrong5; do\n    sshpass -p \"$pw\" ssh -o StrictHostKeyChecking=no\
    \ -o ConnectTimeout=2 \\\n      ccc@10.20.30.80 'echo' 2>/dev/null\n  done\n \
    \ ```\n\n4 단계 cross-check (5초 정도 기다린 후):\n\n**단계 1** (web 측):\n  ```\n  ssh ccc@10.20.30.80\n\
    \  sudo tail -20 /var/log/auth.log | grep -E 'Failed password|authentication failure'\n\
    \  ```\n→ 예상: 5건 이상.\n\n**단계 2** (web wazuh-agent 동작):\n  `ssh ccc@10.20.30.80\
    \ \"sudo systemctl is-active wazuh-agent && sudo wc -l /var/ossec/logs/ossec.log\"\
    `\n→ 예상: active + ossec.log 라인 수 증가.\n\n**단계 3** (siem archives, 옵션):\n  `ssh\
    \ ccc@10.20.30.100 \"sudo tail -20 /var/ossec/logs/archives/archives.log 2>/dev/null\
    \ | grep -E 'Failed password' | head\"`\n→ 예상: 옵션 (archives 활성 시). 비활성이면 단계 4\
    \ 만으로 충분.\n\n**단계 4** (siem alerts.json):\n  ```\n  ssh ccc@10.20.30.100\n  sudo\
    \ tail -100 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.rule.id==\"5710\"\
    \ or .rule.id==\"5711\" or .rule.id==\"5712\")' | head -3\n  ```\n→ 예상: rule.id\
    \ 5710/5711/5712 alert + web agent_id 명시.\n\n### Phase C — Event flow 다이어그램 +\
    \ 회고 (5분)\n\n## Event flow\n\n```\n[web 의 sshd]\n   └→ syslog → /var/log/auth.log\
    \     (단계 1: 5+ \"Failed password\")\n          └→ wazuh-agent (web)\n       \
    \         └→ 암호화 전송 → manager:1514       (단계 2)\n                      └→ wazuh-manager\
    \ analysisd\n                            ├→ /var/ossec/logs/archives/* (단계 3,\
    \ 선택)\n                            └→ rule 5710/5711/5712 매칭\n               \
    \                   └→ /var/ossec/logs/alerts/alerts.json (단계 4)\n```\n\n1~2 단락\
