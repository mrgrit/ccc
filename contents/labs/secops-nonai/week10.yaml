lab_id: secops-nonai-week10
title: Wazuh 탐지 룰 작성
version: non-ai
course: secops-nonai
week: 10
description: Wazuh decoder/rule 구조를 이해하고 커스텀 로컬 룰로 SSH 실패, sudo 실행 등을 탐지한다.
difficulty: medium
duration_minutes: 120
objectives:
- wazuh rules 디렉터리 구조와 local_rules.xml 의 역할을 이해한다
- wazuh-logtest 로 룰 매칭을 테스트한다
- reload 후 alerts.json 에서 새 룰이 적용된 결과를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: /var/ossec/ruleset/rules 디렉터리의 룰 파일 개수를 확인하시오.
  hint: ls /var/ossec/ruleset/rules | wc -l
  category: survey
  points: 10
  answer: sudo ls /var/ossec/ruleset/rules/ 2>/dev/null | wc -l
  answer_detail: 'Wazuh 탐지 룰 작성: /var/ossec/ruleset/rules 디렉터리의 룰 파일 개수를 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 기본 룰 파일 수 — sudo ls /var/ossec/ruleset/rules/ | wc -l. Wazuh 기본 룰셋 볼륨
        (보통 100+ XML 파일). SSH/SUDO/APACHE 등 카테고리별 파일.
      success_criteria:
      - ls 또는 wc -l
      - 기본 룰 경로 /var/ossec/ruleset/rules/
      - 숫자 출력
      acceptable_methods:
      - ls + wc -l
      - find + -type f
      - grep -c '<rule id'
      - Wazuh API /rules/files
      negative_signs:
      - 커스텀 경로 혼동
      - 파일 수 집계 없음
      - 기본 vs 커스텀 구분 없음
  target_vm: siem
- order: 2
  instruction: local_rules.xml 의 현재 내용을 확인하시오.
  hint: cat /var/ossec/etc/rules/local_rules.xml
  category: survey
  points: 10
  answer: sudo cat /var/ossec/etc/rules/local_rules.xml 2>/dev/null | head -30
  answer_detail: 'Wazuh 탐지 룰 작성: local_rules.xml 의 현재 내용을 확인하시오.'
  verify:
    type: output_contains
    expect: rules
    field: stdout
    semantic:
      intent: 'local_rules.xml 현재 내용 — sudo cat /var/ossec/etc/rules/local_rules.xml
        | head -30. 커스텀 룰 전용 파일. 기본: <group name=''local,syslog,''> 빈 그룹 주석. 커스텀 룰
        추가 위치.'
      success_criteria:
      - rules 키워드
      - cat local_rules.xml 실행
      - 파일 내용 출력
      acceptable_methods:
      - cat local_rules.xml
      - less local_rules.xml
      - Wazuh API /rules/files/local_rules.xml
      - xmllint --format
      negative_signs:
      - 기본 rules 경로와 혼동
      - 파일 존재 확인 없음
      - XML 구조 해석 없음
  target_vm: siem
- order: 3
  instruction: 'local_rules.xml 에 ''여러 번 sudo 실패'' 탐지 룰(rule id 100100, level 10)을
    추가하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/secops-nonai-week10/3/auth.log 사전 주입.
    `grep -E ''Failed password|sudo|Accepted'' /home/ccc/cyber-range/fixtures/secops-nonai-week10/3/auth.log`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: <rule id="100100" level="10">…
  category: configure
  points: 10
  answer: "sudo bash -c 'cat >> /var/ossec/etc/rules/local_rules.xml <<EOF\n<group\
    \ name=\"local,syslog,sudo,\">\n  <rule id=\"100100\" level=\"10\" frequency=\"\
    3\" timeframe=\"120\">\n    <if_matched_sid>5402</if_matched_sid>\n    <description>Multiple\
    \ sudo failures (custom)</description>\n  </rule>\n</group>\nEOF'"
  answer_detail: 'Wazuh 탐지 룰 작성: local_rules.xml 에 ''여러 번 sudo 실패'' 탐지 룰(rule id 100100,
    level 10)을 추가하시오.'
  verify:
    type: output_contains
    expect: '100100'
    field: stdout
    semantic:
      intent: sudo 실패 빈도 룰 100100 — <rule id=100100 level=10 frequency=3 timeframe=120>
        + <if_matched_sid>5402</if_matched_sid> + <description>Multiple sudo failures.
        if_matched_sid 5402 기반 + 2분 내 3회 = 브루트포스 상관. MITRE ATT&CK T1548.003 Abuse
        Elevation Control Mechanism.
      success_criteria:
      - 100100 키워드
      - frequency + timeframe
      - if_matched_sid 5402
      acceptable_methods:
      - cat >> local_rules.xml heredoc
      - xmlstarlet edit
      - Ansible lineinfile blockinfile
      - Dashboard UI Rules editor
      negative_signs:
      - frequency/timeframe 없음
      - if_matched_sid 누락
      - 5402 (sudo 실패) 맥락 없음
  target_vm: siem
  fixtures:
  - generator: auth_log
    target_vm: siem
    path: /home/ccc/cyber-range/fixtures/secops-nonai-week10/3/auth.log
    params:
      seed: 42
      duration_days: 30
      burst_count: 3
      spray_attempts: 100
      normal_logins_per_day: 8
    mode: overwrite
    cleanup: false
- order: 4
  instruction: wazuh-analysisd -t 로 룰 문법을 검증하시오.
  hint: sudo /var/ossec/bin/wazuh-analysisd -t
  category: verify
  points: 10
  answer: '🖥️ UI: Dashboard → Management → Rules → 룰 목록 검색

    📎 참고 (CLI): sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail'
  answer_detail: 'Wazuh 탐지 룰 작성: wazuh-analysisd -t 로 룰 문법을 검증하시오.'
  verify:
    type: output_contains
    expect: Configuration
    field: stdout
    semantic:
      intent: 룰 문법 검증 — sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail. -t = test
        mode (설정 + 룰 파싱 검증). Configuration 성공 메시지 또는 XML parse error. 배포 전 필수.
      success_criteria:
      - Configuration 키워드
      - wazuh-analysisd -t 실행
      - 검증 메시지
      acceptable_methods:
      - wazuh-analysisd -t
      - xmllint --noout local_rules.xml (구문만)
      - wazuh-logtest 룰 로드 테스트
