- order: 99
  instruction: "[복합 시나리오] \"표준 외 로그 형식 → 커스텀 decoder + rule 작성\"\n\n## 상황 (w01-w09\
    \ 시나리오 연속)\n\nABC 핀테크 SOC 신규 분석가, 10주 차.\n1~10 step 으로 sudo 실패 *rule* 작성·검증까지\
    \ 했다. 학습 목표 #3 — 디코더 작성 — 1~10 은\n*rule* 만. decoder 는 표준 syslog 자동 파싱 되는 거라 안\
    \ 다뤘다.\n\n> 선임: \"방금 우리 회사 결제 서비스가 새 로그 형식 도입했는데 — 표준 syslog 가 아니라\n>  *커스텀 JSON*\
    \ 이야: '{\\\"event\\\":\\\"login_fail\\\",\\\"user\\\":\\\"alice\\\",\\\"src\\\"\
    :\\\"1.2.3.4\\\"}'.\n>  Wazuh 기본 decoder 가 이걸 못 풀어 — *커스텀 decoder + rule* 작성해야\
    \ alert 발생해.\n>  wazuh-logtest 로 phase 1/2/3 매칭 cycle 보면서 작성해.\"\n\n학습 목표 #3 (decoder\
    \ 작성) 행동 증명.\n\n※ Non-AI 트랙: 학생 직접 SSH + transcript paste.\n\n## 임무 (3 단계, 약 25분)\n\
    \n### Phase A — 커스텀 로그 파일 + 모니터 추가 (5분)\n\nsiem(10.20.30.100) SSH 후:\n  ```\n\
    \  ssh ccc@10.20.30.100\n  sudo touch /var/log/payment-app.log\n  sudo chmod 644\
    \ /var/log/payment-app.log\n\n  sudo tee -a /var/ossec/etc/ossec.conf <<'EOF'\n\
    \  <localfile>\n    <log_format>json</log_format>\n    <location>/var/log/payment-app.log</location>\n\
    \  </localfile>\n  EOF\n  sudo systemctl restart wazuh-manager\n  sleep 5\n  ```\n\
    \n### Phase B — Decoder + Rule + wazuh-logtest 검증 (15분)\n\nsiem 의 `/var/ossec/etc/decoders/local_decoder.xml`\
    \ 에 decoder:\n  ```\n  sudo tee -a /var/ossec/etc/decoders/local_decoder.xml <<'EOF'\n\
    \  <decoder name=\"payment-app\">\n    <prematch>\"event\":\"</prematch>\n  </decoder>\n\
    \n  <decoder name=\"payment-app-fields\">\n    <parent>payment-app</parent>\n\
    \    <regex>\"event\":\"(\\S+)\",\"user\":\"(\\S+)\",\"src\":\"(\\S+)\"</regex>\n\
    \    <order>event_name,user,src_ip</order>\n  </decoder>\n  EOF\n  ```\n\n`/var/ossec/etc/rules/local_rules.xml`\
    \ 에 rule:\n  ```\n  sudo tee -a /var/ossec/etc/rules/local_rules.xml <<'EOF'\n\
    \  <group name=\"payment-app,\">\n    <rule id=\"100400\" level=\"10\">\n    \
    \  <decoded_as>payment-app</decoded_as>\n      <field name=\"event_name\">login_fail</field>\n\
    \      <description>Payment app login failure</description>\n    </rule>\n  </group>\n\
    \  EOF\n  ```\n\n문법 검증 + 재시작:\n  ```\n  sudo /var/ossec/bin/wazuh-analysisd -t\
    \ 2>&1 | grep -E 'OK|error|ERROR'\n  sudo systemctl restart wazuh-manager && sleep\
    \ 5\n  ```\n\n`wazuh-logtest` 로 매칭 cycle 직접 확인:\n  `echo '{\"event\":\"login_fail\"\
    ,\"user\":\"alice\",\"src\":\"1.2.3.4\"}' | sudo /var/ossec/bin/wazuh-logtest`\n\
    \n예상:\n  Phase 1: pre-decoding 완료\n  Phase 2: decoding name='payment-app-fields',\
    \ user='alice', src_ip='1.2.3.4'\n  Phase 3: rule id 100400 level 10 매칭\n\n###\
    \ Phase C — 실 trigger + cross-check + 정리 (5분)\n\n실제 로그 발생:\n  `echo '{\"event\"\
    :\"login_fail\",\"user\":\"alice\",\"src\":\"1.2.3.4\"}' | sudo tee -a /var/log/payment-app.log;\
    \ sleep 5`\n\nalerts.json 매칭 검색:\n  `sudo tail -100 /var/ossec/logs/alerts/alerts.json\
    \ | jq -c 'select(.rule.id==\"100400\")' | head`\n→ 예상: 1 alert + decoded fields\
