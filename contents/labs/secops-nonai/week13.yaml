lab_id: secops-nonai-week13
title: OpenCTI 위협 인텔리전스 활용
version: non-ai
course: secops-nonai
week: 13
description: OpenCTI에 CTI feed를 연동하고 IOC(악성 IP)를 nftables blocklist 와 연계한다.
difficulty: medium
duration_minutes: 120
objectives:
- OpenCTI GraphQL API 구조를 이해한다
- IOC를 조회해 nftables set에 주입하는 파이프라인을 설계한다
- CTI 기반 차단 룰이 적용되는 것을 검증한다
pass_threshold: 0.6
