lab_id: secops-nonai-week13
title: OpenCTI 위협 인텔리전스 활용
version: non-ai
course: secops-nonai
week: 13
description: OpenCTI에 CTI feed를 연동하고 IOC(악성 IP)를 nftables blocklist 와 연계한다.
difficulty: medium
duration_minutes: 120
objectives:
- OpenCTI GraphQL API 구조를 이해한다
- IOC를 조회해 nftables set에 주입하는 파이프라인을 설계한다
- CTI 기반 차단 룰이 적용되는 것을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: OpenCTI GraphQL 엔드포인트(/graphql) 가 응답하는지 확인하시오.
  hint: curl -X POST /graphql
  category: survey
  points: 10
  answer: 'curl -sS -o /dev/null -w ''%{http_code}\n'' -X POST http://localhost:8080/graphql
    -H ''Content-Type: application/json'' -d ''{"query":"{ about { version } }"}'''
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: OpenCTI GraphQL 엔드포인트(/graphql) 가 응답하는지 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 2
  instruction: secu VM에 cti 전용 blocklist set 'cti_ips'(filter 테이블) 를 만드시오.
  hint: nft add set inet filter cti_ips
  category: configure
  points: 10
  answer: sudo nft add table inet filter 2>/dev/null ; sudo nft 'add set inet filter
    cti_ips { type ipv4_addr \; }' 2>/dev/null && sudo nft list set inet filter cti_ips
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: secu VM에 cti 전용 blocklist set ''cti_ips''(filter
    테이블) 를 만드시오.'
  verify:
    type: output_contains
    expect: cti_ips
    field: stdout
  target_vm: secu
- order: 3
  instruction: filter.input 체인 초기에 ip saddr @cti_ips drop 룰을 추가하시오.
  hint: nft insert rule …
  category: configure
  points: 10
  answer: sudo nft add chain inet filter input '{ type filter hook input priority
    0 \; }' 2>/dev/null ; sudo nft insert rule inet filter input ip saddr @cti_ips
    drop
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: filter.input 체인 초기에 ip saddr @cti_ips drop
    룰을 추가하시오.'
  verify:
    type: output_contains
    expect: cti_ips
    field: stdout
  target_vm: secu
- order: 4
  instruction: 작성한 cti_ips set의 현재 원소를 확인하시오.
  hint: nft list set inet filter cti_ips
  category: verify
  points: 10
  answer: sudo nft list set inet filter cti_ips
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: 작성한 cti_ips set의 현재 원소를 확인하시오.'
  verify:
    type: output_contains
    expect: cti_ips
    field: stdout
  target_vm: secu
- order: 5
  instruction: 샘플 악성 IP 203.0.113.66 을 cti_ips 에 주입하시오(OpenCTI 조회 결과를 가정).
  hint: nft add element inet filter cti_ips { 203.0.113.66 }
  category: configure
  points: 10
  answer: sudo nft add element inet filter cti_ips '{ 203.0.113.66 }' && sudo nft
    list set inet filter cti_ips
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: 샘플 악성 IP 203.0.113.66 을 cti_ips 에 주입하시오(OpenCTI
    조회 결과를 가정).'
  verify:
    type: output_contains
    expect: 203.0.113.66
    field: stdout
  target_vm: secu
- order: 6
  instruction: 203.0.113.66 가 blocklist 로 등록됐는지 확인하시오.
  hint: nft list set inet filter cti_ips
  category: verify
  points: 10
  answer: sudo nft list set inet filter cti_ips
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: 203.0.113.66 가 blocklist 로 등록됐는지 확인하시오.'
  verify:
    type: output_contains
    expect: 203.0.113.66
    field: stdout
  target_vm: secu
- order: 7
  instruction: OpenCTI 컨테이너에서 최근 5개 Indicator 생성 이벤트 로그를 조회하시오(platform 컨테이너 로그).
  hint: docker logs | grep Indicator
  category: analysis
  points: 10
  answer: docker logs --tail 200 $(docker ps --format '{{.Names}}' | grep -i '^opencti$'
    | head -1) 2>&1 | grep -i indicator | tail -5
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: OpenCTI 컨테이너에서 최근 5개 Indicator 생성 이벤트 로그를 조회하시오(platform
    컨테이너 로그).'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 8
  instruction: OpenCTI connectors 컨테이너 목록을 확인하시오.
  hint: docker ps | grep connector
  category: survey
  points: 10
  answer: docker ps --format '{{.Names}}\t{{.Status}}' 2>/dev/null | grep -i connector
    | head
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: OpenCTI connectors 컨테이너 목록을 확인하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 9
  instruction: 샘플 IP 203.0.113.66 을 cti_ips 에서 제거하시오.
  hint: nft delete element …
  category: cleanup
  points: 10
  answer: sudo nft delete element inet filter cti_ips '{ 203.0.113.66 }'
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: 샘플 IP 203.0.113.66 을 cti_ips 에서 제거하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
- order: 10
  instruction: filter.input 체인의 현재 룰을 확인해 정리 상태를 점검하시오.
  hint: nft list chain inet filter input
  category: analysis
  points: 10
  answer: sudo nft list chain inet filter input
  answer_detail: 'OpenCTI 위협 인텔리전스 활용: filter.input 체인의 현재 룰을 확인해 정리 상태를 점검하시오.'
  verify:
    type: output_contains
    expect: cti_ips
    field: stdout
  target_vm: secu
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  answer: ''
  answer_detail: ''
