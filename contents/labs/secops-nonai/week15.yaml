      success_criteria:
      - Phase A — 25 cell matrix (각 cell 1-5 점 + 근거 1줄)
      - Phase A — layer 별 / mech 별 합계 + 총합 / 125
      - Phase B — 최저 점수 3 영역 식별
      - Phase B — Plan 3개 (Strategy + Todo 분해 + KPI + timeline + realizes)
