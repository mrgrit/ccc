lab_id: secops-nonai-week15
title: 기말고사 — 보안 인프라 구축 종합 실기
version: non-ai
course: secops-nonai
week: 15
description: nftables + Suricata + Wazuh + OpenCTI 연계를 활용해 공격 탐지·차단·기록 end-to-end
  시나리오를 구성한다.
difficulty: hard
duration_minutes: 180
objectives:
- nftables 'final' 테이블로 화이트리스트·블랙리스트 구조를 설계한다
- Suricata 커스텀 룰로 특정 공격을 탐지한다
- Wazuh alerts.json 에서 공격 이벤트를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 'final' 테이블을 만들고 input 체인(policy drop)을 생성하시오.
  hint: nft add table; nft add chain
  category: configure
  points: 10
  answer: sudo nft add table inet final && sudo nft add chain inet final input '{
    type filter hook input priority 0 \; policy drop \; }'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: secu VM에 inet ''final'' 테이블을 만들고 input 체인(policy
    drop)을 생성하시오.'
  verify:
    type: output_contains
    expect: final
    field: stdout
  target_vm: secu
- order: 2
  instruction: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24 를 허용하시오.
  hint: nft add set + element
  category: configure
  points: 10
  answer: sudo nft 'add set inet final whitelist_ips { type ipv4_addr \; flags interval
    \; }' && sudo nft add element inet final whitelist_ips '{ 10.20.30.0/24 }' &&
    sudo nft add rule inet final input ip saddr @whitelist_ips accept
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24
    를 허용하시오.'
  verify:
    type: output_contains
    expect: whitelist_ips
    field: stdout
  target_vm: secu
- order: 3
  instruction: final 테이블에 blacklist_ips set 을 만들고 input 체인 맨 앞에 drop 룰을 insert 하시오.
  hint: nft insert rule … @blacklist_ips drop
  category: configure
  points: 10
  answer: sudo nft 'add set inet final blacklist_ips { type ipv4_addr \; }' && sudo
    nft insert rule inet final input ip saddr @blacklist_ips drop
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 blacklist_ips set 을 만들고 input
    체인 맨 앞에 drop 룰을 insert 하시오.'
  verify:
    type: output_contains
    expect: blacklist_ips
    field: stdout
  target_vm: secu
- order: 4
  instruction: Suricata local.rules 에 '.php?cmd=' 탐지 룰(sid:1000301) 을 추가하고 reload
    하시오.
  hint: content:"cmd="; http_uri;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"Final exam - cmd injection"; content:"cmd=";
    http_uri; sid:1000301; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
    && sudo systemctl reload suricata
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: Suricata local.rules 에 ''.php?cmd='' 탐지
    룰(sid:1000301) 을 추가하고 reload 하시오.'
  verify:
    type: output_contains
    expect: '1000301'
    field: stdout
  target_vm: secu
- order: 5
  instruction: attacker VM에서 web VM으로 /index.php?cmd=ls 요청을 보내 Suricata 탐지를 유도하시오.
  hint: curl /index.php?cmd=ls
  category: verify
  points: 10
  answer: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/index.php?cmd=ls'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: attacker VM에서 web VM으로 /index.php?cmd=ls
    요청을 보내 Suricata 탐지를 유도하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: attacker
- order: 6
  instruction: secu VM eve.json 에서 sid:1000301 알람을 확인하시오.
  hint: grep 1000301 eve.json
  category: verify
  points: 10
  answer: sudo grep '"signature_id":1000301' /var/log/suricata/eve.json 2>/dev/null
    | tail -3 || sudo grep 1000301 /var/log/suricata/eve.json | tail
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: secu VM eve.json 에서 sid:1000301 알람을 확인하시오.'
  verify:
    type: output_contains
    expect: '1000301'
    field: stdout
  target_vm: secu
- order: 7
  instruction: siem VM alerts.json 에서 sid 1000301 혹은 cmd injection 관련 이벤트를 검색하시오.
  hint: grep cmd alerts.json
  category: verify
  points: 10
  answer: sudo grep -i 'cmd injection\|1000301' /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: siem VM alerts.json 에서 sid 1000301 혹은 cmd
    injection 관련 이벤트를 검색하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 8
  instruction: CTI 결과를 가정해 blacklist_ips set에 203.0.113.77 을 주입하시오.
  hint: nft add element inet final blacklist_ips { 203.0.113.77 }
  category: configure
  points: 10
  answer: sudo nft add element inet final blacklist_ips '{ 203.0.113.77 }' && sudo
    nft list set inet final blacklist_ips
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: CTI 결과를 가정해 blacklist_ips set에 203.0.113.77
    을 주입하시오.'
  verify:
    type: output_contains
    expect: 203.0.113.77
    field: stdout
  target_vm: secu
- order: 9
  instruction: final 테이블 전체 룰셋을 확인해 구성 무결성을 점검하시오.
  hint: nft list table inet final
  category: verify
  points: 10
  answer: sudo nft list table inet final
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블 전체 룰셋을 확인해 구성 무결성을 점검하시오.'
  verify:
    type: output_contains
    expect: final
    field: stdout
  target_vm: secu
- order: 10
  instruction: '실습 종료: final 테이블 삭제 + sid:1000301 룰 삭제 + suricata reload 를 수행하시오.'
  hint: nft delete table; sed; reload
  category: cleanup
  points: 10
  answer: sudo nft delete table inet final && sudo sed -i '/sid:1000301/d' /etc/suricata/rules/local.rules
    && sudo systemctl reload suricata
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: 실습 종료: final 테이블 삭제 + sid:1000301 룰 삭제 +
    suricata reload 를 수행하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  hint: 복합 작업은 bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  answer: ''
  answer_detail: ''
