  points: 10
  answer: curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/index.php?cmd=ls'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: attacker VM에서 web VM으로 /index.php?cmd=ls 요청을 보내 Suricata 탐지를
    유도하시오.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: cmd injection 요청 — curl -sS -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80/index.php?cmd=ls'.
        /index.php?cmd=ls = 원격 명령 실행 시도. Suricata 룰 (s4) 트리거 테스트. MITRE ATT&CK T1190 + T1059 체인.
