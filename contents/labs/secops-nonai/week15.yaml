- order: 99
  instruction: |
    [기말고사 — 학기 종합 capstone] "내 SOC 의 maturity 자가 진단 + 다음 분기 개선 계획"

    ## 상황 (학기 마지막 — 15주차)

    ABC 핀테크 SOC 신규 분석가, 학기 마지막. 1~10 step 으로 *기말 종합 실기* — final 테이블 +
    Suricata + Wazuh + CTI 모두 연계까지 수행. 99번은 마지막 임무 — *학기 학습 전체* 자가
    평가 + 다음 분기 개선 계획.

    > 선임 (평가자 + 멘토): "1~10 은 *구축 능력*. 99번은 *진단 능력*. 본인 SOC 의 maturity 를
    >  5 layer × 5 mechanism (deploy/monitor/detect/respond/improve) = 25 cell 로 자가 진단해.
    >  1점(없음) ~ 5점(완벽 자동화). 약점 찾고 다음 분기 (Q+1) Plan 3개 작성. 학기 동안 익힌
    >  KG 9-tier (Mission/Vision/Goal/Strategy/KPI/Plan/Todo/Playbook/Experience) 의 *Plan
    >  단계* 작성하는 거야."

    학습 목표 #4 (15주 학습 내재화) + 9-tier KG Plan tier 활용.

    ※ Non-AI 트랙: 학생 직접 보고서 작성 + paste 제출.

    ## 임무 (3 단계, 약 40분)

    ### Phase A — Maturity 25 cell 자가 진단 (15분)

    5 layer × 5 mechanism 매트릭스. 본인 SOC 환경 기준 1-5 점.

    **5 layer**: nft / Suricata / ModSec / Wazuh / OpenCTI
    **5 mechanism**:
      - Deploy: 솔루션 배포·기본 설정 완료도
      - Monitor: 로그·alert·counter 실시간 가시성
      - Detect: custom 룰·decoder·IoC 매칭 정확도
      - Respond: AR / sync / exception / IR 절차 자동화
      - Improve: FP/FN 회고·튜닝·정기 review

    각 cell 점수 (1=없음 / 2=수동만 / 3=일부 자동 / 4=대부분 자동 / 5=완전 자동+검증):

    | Layer \\ Mech | Deploy | Monitor | Detect | Respond | Improve |
    |--------------|--------|---------|--------|---------|---------|
    | nft          | ?      | ?       | ?      | ?       | ?       |
    | Suricata     | ?      | ?       | ?      | ?       | ?       |
    | ModSec       | ?      | ?       | ?      | ?       | ?       |
    | Wazuh        | ?      | ?       | ?      | ?       | ?       |
    | OpenCTI      | ?      | ?       | ?      | ?       | ?       |

    *근거*: 학기 동안 작성한 verify 테이블, suricata-update, ModSec exception, Wazuh AR, cti-sync 등으로 점수 산정. 각 cell 옆에 1줄 근거.

    **합계**: layer 별 합 + mechanism 별 합 + 총합 / 125.

    ### Phase B — 약점 분석 + 9-tier Plan 3개 (15분)

    Phase A 매트릭스에서 *최저 점수 영역* 3개 식별. 각 영역에 Plan 작성 (KG 9-tier Plan 형식):

    ```
    ### Plan #1 — [약점 1 영역]
    - **Strategy**: [상위 전략 인용]
    - **derives_from**: [Goal 인용]
    - **Plan 본문**:
      - 분기: Q+1
      - 책임: SOC team
      - Todo: (Plan 분해)
        - Todo A: ...
        - Todo B: ...
    - **measures (KPI)**: ...
    - **timeline**: 12주
    - **realizes**: Strategy "..."
    ```

    Plan 3개 작성.

    ### Phase C — capstone 보고서 + sha256 + KG 등록 의향 (10분)

    markdown 보고서:
    ```
    # SOC Maturity 자가 진단 + Q+1 개선 Plan
    학생: <id> / 학기: 2026-Spring

    ## Phase A — 25 cell maturity matrix
    [표]
    - Layer 합 / Mechanism 합 / **총합 X/125**

    ## Phase B — 약점 + Q+1 Plan 3개
    [Plan 3개 markdown]

    ## Phase C — KG 등록 의향
    위 Plan 3개를 KG 의 Plan node 로 등록하려면:
      - bastion API: POST /api/graph/node {type: "Plan", ...}
      - derives_from edge → Strategy node
      - 학기 학습 → 운영 도입 의 첫걸음

    ## 무결성
    sha256sum capstone.md > capstone.sha256
    ```

    종료 정리: lab 변경 없음 (보고서 작성만).
  hint: |
