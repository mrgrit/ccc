lab_id: secops-nonai-week15
title: 기말고사 — 보안 인프라 구축 종합 실기
version: non-ai
course: secops-nonai
week: 15
description: nftables + Suricata + Wazuh + OpenCTI 연계를 활용해 공격 탐지·차단·기록 end-to-end 시나리오를 구성한다.
difficulty: hard
duration_minutes: 180
objectives:
- nftables 'final' 테이블로 화이트리스트·블랙리스트 구조를 설계한다
- Suricata 커스텀 룰로 특정 공격을 탐지한다
- Wazuh alerts.json 에서 공격 이벤트를 확인한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu VM에 inet 'final' 테이블을 만들고 input 체인(policy drop)을 생성하시오.
  hint: nft add table; nft add chain
  category: configure
  points: 10
  answer: sudo nft add table inet final && sudo nft add chain inet final input '{ type filter hook input
    priority 0 \; policy drop \; }'
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: secu VM에 inet ''final'' 테이블을 만들고 input 체인(policy drop)을 생성하시오.'
  verify:
    type: output_contains
    expect: final
    field: stdout
    semantic:
      intent: final 테이블 + policy drop — sudo nft add table inet final && sudo nft add chain inet final
        input '{ type filter hook input priority 0 \; policy drop \; }'. 기말고사 시작 = zero-trust 기본 구조.
      success_criteria:
      - final 키워드
      - policy drop 체인
      - add table + add chain
      acceptable_methods:
      - nft add table + add chain policy drop
      - /etc/nftables.conf 배치
      - ansible nftables + default-drop
      - nft -f script
      negative_signs:
      - policy accept (zero-trust 불가)
      - hook input 누락
      - 테이블 이름 혼동
  target_vm: secu
- order: 2
  instruction: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24 를 허용하시오.
  hint: nft add set + element
  category: configure
  points: 10
  answer: sudo nft 'add set inet final whitelist_ips { type ipv4_addr \; flags interval \; }' && sudo
    nft add element inet final whitelist_ips '{ 10.20.30.0/24 }' && sudo nft add rule inet final input
    ip saddr @whitelist_ips accept
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 whitelist_ips set 을 만들어 10.20.30.0/24 를 허용하시오.'
  verify:
    type: output_contains
    expect: whitelist_ips
    field: stdout
    semantic:
      intent: whitelist_ips set + CIDR 허용 — nft 'add set inet final whitelist_ips { type ipv4_addr \;
        flags interval \; }' + add element 10.20.30.0/24 + add rule ip saddr @whitelist_ips accept. flags
        interval = CIDR 범위 지원. 내부 대역 허용.
      success_criteria:
      - whitelist_ips 키워드
      - flags interval 또는 CIDR
      - add element + rule 조합
      acceptable_methods:
      - flags interval + CIDR 원소
      - 개별 IP 나열 (interval 없이)
      - ipset hash:net (legacy)
      - nft CIDR 직접 지원
      negative_signs:
      - flags interval 누락 (CIDR 불가)
      - accept 룰 없이 set 만
      - set 이름 혼동
  target_vm: secu
- order: 3
  instruction: final 테이블에 blacklist_ips set 을 만들고 input 체인 맨 앞에 drop 룰을 insert 하시오.
  hint: nft insert rule … @blacklist_ips drop
  category: configure
  points: 10
  answer: sudo nft 'add set inet final blacklist_ips { type ipv4_addr \; }' && sudo nft insert rule inet
    final input ip saddr @blacklist_ips drop
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: final 테이블에 blacklist_ips set 을 만들고 input 체인 맨 앞에 drop 룰을 insert
    하시오.'
  verify:
    type: output_contains
    expect: blacklist_ips
    field: stdout
    semantic:
      intent: blacklist_ips set + insert drop — nft 'add set inet final blacklist_ips { type ipv4_addr
        \; }' + nft insert rule inet final input ip saddr @blacklist_ips drop. insert = 맨 앞 우선순위. 블랙리스트가
        화이트리스트보다 먼저 평가.
      success_criteria:
      - blacklist_ips 키워드
      - insert rule (맨 앞)
      - '@ set drop 동작'
      acceptable_methods:
      - nft insert rule + @ set + drop
      - iptables + ipset match-set DROP
      - eBPF XDP 대량 차단
      - BGP RTBH
      negative_signs:
      - insert 대신 add (뒤)
      - '@ 참조 없음'
      - set 이름 혼동
  target_vm: secu
- order: 4
  instruction: Suricata local.rules 에 '.php?cmd=' 탐지 룰(sid:1000301) 을 추가하고 reload 하시오.
  hint: content:"cmd="; http_uri;
  category: configure
  points: 10
  answer: echo 'alert http any any -> any any (msg:"Final exam - cmd injection"; content:"cmd="; http_uri;
    sid:1000301; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules && sudo systemctl reload suricata
  answer_detail: '기말고사 — 보안 인프라 구축 종합 실기: Suricata local.rules 에 ''.php?cmd='' 탐지 룰(sid:1000301) 을 추가하고
    reload 하시오.'
  verify:
    type: output_contains
    expect: '1000301'
    field: stdout
    semantic:
      intent: cmd injection Suricata 룰 — alert http any any -> any any (msg:"Final exam - cmd injection";
        content:"cmd="; http_uri; sid:1000301; rev:1;) + reload. URL 파라미터 cmd= 매칭 = 명령 인젝션 지표. reload
        반영. MITRE ATT&CK T1059 Command Injection.
      success_criteria:
      - 1000301 sid
      - content 'cmd=' + http_uri
      - reload 반영
      acceptable_methods:
      - echo + tee -a + reload
      - suricata-update + custom rule
      - SIGMA → Suricata 변환
      - Zeek notice + webshell 보안
      negative_signs:
      - sid 혼동
      - http_uri 수정자 없음
      - reload 누락
  target_vm: secu
- order: 5
  instruction: attacker VM에서 web VM으로 /index.php?cmd=ls 요청을 보내 Suricata 탐지를 유도하시오.
