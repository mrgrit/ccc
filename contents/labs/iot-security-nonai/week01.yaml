lab_id: iot-security-nonai-week01
title: IoT 보안 개론 — MQTT 브로커 구축 및 정찰
version: non-ai
course: iot-security-nonai
week: 1
description: IoT 아키텍처를 이해하고, MQTT 브로커를 Docker로 구축하여 IoT 서비스 정찰을 수행합니다.
difficulty: easy
duration_minutes: 120
objectives:
- MQTT 브로커를 Docker로 구축한다
- IoT 서비스 포트 스캔을 수행한다
- MQTT 토픽 구독/발행을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Docker로 Mosquitto MQTT 브로커를 실행하시오. 컨테이너 이름은 mqtt-broker, 포트는 1883으로
    설정하시오.
  hint: docker run -d --name mqtt-broker -p 1883:1883 eclipse-mosquitto:2 명령을 사용하세요.
  category: setup
  points: 8
  answer: docker run -d --name mqtt-broker -p 1883:1883 eclipse-mosquitto:2 mosquitto
    -c /dev/null -p 1883 -v && echo 'MQTT 브로커 실행 완료'
  answer_detail: Eclipse Mosquitto는 가장 널리 사용되는 오픈소스 MQTT 브로커입니다. -c /dev/null로 기본
    설정 없이 실행합니다.
  verify:
    type: output_contains
    expect: MQTT 브로커 실행 완료
    field: stdout
  target_vm: attacker
- order: 2
  instruction: MQTT 브로커가 정상적으로 동작하는지 확인하시오.
  hint: docker ps 명령으로 컨테이너 상태를 확인하세요.
  category: setup
  points: 8
  answer: docker ps --filter name=mqtt-broker --format '{{.Names}} {{.Status}}' &&
    echo 'MQTT 상태 확인 완료'
  answer_detail: docker ps로 컨테이너 상태를 확인합니다. Up 상태이면 정상 동작입니다.
  verify:
    type: output_contains
    expect: MQTT 상태 확인 완료
    field: stdout
  target_vm: attacker
- order: 3
  instruction: nmap으로 대상 서버({{WEB_IP}})의 IoT 관련 포트(1883, 5683, 8080, 8883)를 스캔하시오.
  hint: nmap -sV -p 1883,5683,8080,8883 명령을 사용하세요.
  category: recon
  points: 10
  answer: nmap -sV -p 1883,5683,8080,8883 10.20.30.80 2>/dev/null && echo 'IoT 포트
    스캔 완료'
  answer_detail: MQTT(1883), CoAP(5683), HTTP(8080), MQTT-TLS(8883) 등 IoT 관련 포트를 스캔합니다.
  verify:
    type: output_contains
    expect: IoT 포트 스캔 완료
    field: stdout
  target_vm: attacker
- order: 4
  instruction: mosquitto_sub 명령으로 MQTT 브로커의 모든 토픽(#)을 구독하시오.
  hint: mosquitto_sub -h localhost -t "#" -v -C 5 명령으로 5개 메시지까지 수신합니다.
  category: mqtt
  points: 10
  answer: mosquitto_sub -h localhost -t '#' -v -C 1 -W 3 2>/dev/null; echo 'MQTT 구독
    테스트 완료'
  answer_detail: '# 은 모든 토픽을 구독하는 와일드카드입니다. -C 1은 1개 메시지 수신 후 종료합니다.'
  verify:
    type: output_contains
    expect: MQTT 구독 테스트 완료
    field: stdout
  target_vm: attacker
- order: 5
  instruction: mosquitto_pub 명령으로 IoT 센서 데이터를 발행하시오. 토픽은 iot/sensor/temp, 메시지는 {"value":25.3,"unit":"C"}으로
    설정하시오.
  hint: mosquitto_pub -h localhost -t "iot/sensor/temp" -m '메시지' 명령을 사용하세요.
  category: mqtt
  points: 10
  answer: mosquitto_pub -h localhost -t 'iot/sensor/temp' -m '{"value":25.3,"unit":"C"}'
    && echo 'MQTT 발행 완료'
  answer_detail: mosquitto_pub으로 특정 토픽에 메시지를 발행합니다. IoT 센서가 데이터를 전송하는 것을 시뮬레이션합니다.
  verify:
    type: output_contains
    expect: MQTT 발행 완료
    field: stdout
  target_vm: attacker
- order: 6
  instruction: MQTT 시스템 토픽($SYS)을 구독하여 브로커 정보를 수집하시오.
  hint: mosquitto_sub -h localhost -t '$SYS/#' -v -C 10 명령을 사용하세요.
  category: recon
  points: 12
  answer: mosquitto_sub -h localhost -t '$SYS/#' -v -C 5 -W 5 2>/dev/null; echo 'SYS
    토픽 수집 완료'
  answer_detail: $SYS 토픽은 MQTT 브로커의 상태 정보(연결 수, 메시지 수, 버전 등)를 제공합니다.
  verify:
    type: output_contains
    expect: SYS 토픽 수집 완료
    field: stdout
  target_vm: attacker
- order: 7
  instruction: 5개의 서로 다른 IoT 토픽에 센서 데이터를 발행하시오 (temp, humidity, pressure, light, motion).
  hint: for 루프로 여러 토픽에 발행하세요.
  category: mqtt
  points: 10
  answer: "for topic in temp humidity pressure light motion; do\n  mosquitto_pub -h\
    \ localhost -t \"iot/sensor/$topic\" -m \"{\\\"value\\\":$RANDOM,\\\"sensor\\\"\
    :\\\"$topic\\\"}\";\ndone && echo '다중 토픽 발행 완료'\n"
  answer_detail: 실제 IoT 환경에서는 다양한 센서가 각기 다른 토픽으로 데이터를 발행합니다.
  verify:
    type: output_contains
    expect: 다중 토픽 발행 완료
    field: stdout
  target_vm: attacker
- order: 8
  instruction: MQTT 브로커에 인증 없이 접근 가능한지 확인하고, OWASP IoT Top 10 I1 취약점과 연결하시오.
  hint: mosquitto_sub로 인증 없이 접근 가능 여부를 확인하세요.
  category: vulnerability
  points: 12
  answer: mosquitto_sub -h localhost -t '#' -v -C 1 -W 3 2>/dev/null && echo '[취약]
    MQTT 미인증 접근 가능 - OWASP IoT I1' || echo '[안전] MQTT 인증 필요'
  answer_detail: OWASP IoT Top 10 I1은 취약한 비밀번호/인증 부재입니다. MQTT 브로커에 인증 없이 접근 가능하면 Critical
    취약점입니다.
  verify:
    type: output_contains
    expect: OWASP IoT I1
    field: stdout
  target_vm: attacker
- order: 9
  instruction: IoT 공격 표면 분석 보고서를 작성하시오. 발견된 서비스, 프로토콜, 취약점을 정리하시오.
  hint: echo 명령으로 보고서를 출력하세요.
  category: verification
  points: 10
  answer: 'echo ''=== IoT 공격 표면 분석 보고서 ==='' && echo ''[서비스] MQTT Broker: localhost:1883''
    && echo ''[인증] 미인증 접근 가능 (Critical)'' && echo ''[암호화] TLS 미적용 (High)'' && echo
    ''[토픽] 와일드카드 구독 가능 (High)'' && echo ''[OWASP] I1 - Weak Authentication'' && echo
    ''[OWASP] I7 - Insecure Data Transfer'' && echo ''=== 분석 보고서 완료 ===''

    '
  answer_detail: 체계적인 공격 표면 분석은 IoT 보안 점검의 기초입니다.
  verify:
    type: output_contains
    expect: 분석 보고서 완료
    field: stdout
  target_vm: attacker
- order: 10
  instruction: 실습 환경을 정리하시오. mqtt-broker 컨테이너를 중지하고 제거하시오.
  hint: docker stop && docker rm 명령을 사용하세요.
  category: cleanup
  points: 10
  answer: docker stop mqtt-broker 2>/dev/null; docker rm mqtt-broker 2>/dev/null;
    echo '환경 정리 완료'
  answer_detail: 실습 후 컨테이너를 정리하여 리소스를 확보합니다.
  verify:
    type: output_contains
    expect: 환경 정리 완료
    field: stdout
  target_vm: attacker
