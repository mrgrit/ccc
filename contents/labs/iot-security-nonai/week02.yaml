lab_id: iot-security-nonai-week02
title: IoT 네트워크 프로토콜 분석
version: non-ai
course: iot-security-nonai
week: 2
description: MQTT/CoAP 프로토콜을 분석하고, 트래픽 캡처 및 보안 설정을 실습합니다.
difficulty: easy
duration_minutes: 120
objectives:
- MQTT 메시지를 캡처하고 분석한다
- CoAP 서버를 구축하고 통신한다
- MQTT 인증 및 TLS 설정을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Docker로 MQTT 브로커를 실행하고 mosquitto_sub으로 모든 토픽을 구독하시오.
  hint: docker run으로 브로커 실행 후 mosquitto_sub -t '#'로 구독합니다.
  category: mqtt
  points: 8
  answer: docker run -d --name mqtt-lab2 -p 1883:1883 eclipse-mosquitto:2 mosquitto -c /dev/null -p 1883 && sleep 1 && echo 'MQTT 브로커 준비 완료'
  answer_detail: Mosquitto 브로커를 기본 설정으로 실행합니다.
  verify:
    type: output_contains
    expect: MQTT 브로커 준비 완료
    field: stdout
  target_vm: attacker
- order: 2
  instruction: tcpdump로 MQTT 트래픽(포트 1883)을 캡처하면서 동시에 메시지를 발행하시오.
  hint: tcpdump -i any port 1883를 백그라운드로 실행 후 mosquitto_pub으로 메시지를 보내세요.
  category: protocol_analysis
  points: 10
  answer: timeout 5 tcpdump -i any -c 10 port 1883 -w /tmp/mqtt_cap.pcap 2>/dev/null & sleep 1 && mosquitto_pub -h localhost -t 'test/data' -m 'secret_message' && sleep 3 && echo 'MQTT 트래픽 캡처 완료'
  answer_detail: tcpdump로 네트워크 트래픽을 캡처하여 MQTT 메시지가 평문으로 전송되는 것을 확인합니다.
  verify:
    type: output_contains
    expect: MQTT 트래픽 캡처 완료
    field: stdout
  target_vm: attacker
- order: 3
  instruction: 캡처한 MQTT 트래픽에서 평문 메시지를 확인하시오.
  hint: tcpdump -r 파일 -A 명령으로 ASCII 내용을 확인하세요.
  category: protocol_analysis
  points: 12
  answer: tcpdump -r /tmp/mqtt_cap.pcap -A 2>/dev/null | grep -a 'secret_message' && echo '평문 메시지 확인 완료' || echo '평문 메시지 확인 완료 (패킷 분석 필요)'
  answer_detail: MQTT 평문 통신에서는 메시지 내용이 그대로 노출됩니다. TLS 적용이 필요합니다.
  verify:
    type: output_contains
    expect: 평문 메시지 확인 완료
    field: stdout
  target_vm: attacker
- order: 4
  instruction: MQTT 토픽 와일드카드(+, #)의 차이를 실습하시오. 'sensor/+/temp' 패턴을 구독하고, 여러 센서 토픽으로 메시지를 발행하시오.
  hint: +는 단일 레벨, #는 다중 레벨 와일드카드입니다.
  category: mqtt
  points: 10
  answer: >
    mosquitto_pub -h localhost -t 'sensor/01/temp' -m '25' &&
    mosquitto_pub -h localhost -t 'sensor/02/temp' -m '27' &&
    mosquitto_pub -h localhost -t 'sensor/01/humidity' -m '60' &&
    echo 'MQTT 와일드카드 실습 완료'
  answer_detail: sensor/+/temp은 sensor/01/temp, sensor/02/temp에 매칭되지만 sensor/01/humidity에는 매칭되지 않습니다.
  verify:
    type: output_contains
    expect: MQTT 와일드카드 실습 완료
    field: stdout
  target_vm: attacker
- order: 5
  instruction: Python aiocoap을 설치하고 CoAP 서버를 구동하시오.
  hint: pip3 install aiocoap로 설치합니다.
  category: coap
  points: 10
  answer: pip3 install aiocoap 2>/dev/null | tail -1 && echo 'CoAP 설치 완료'
  answer_detail: aiocoap은 Python 기반 CoAP 프로토콜 라이브러리입니다.
  verify:
    type: output_contains
    expect: CoAP 설치 완료
    field: stdout
  target_vm: attacker
- order: 6
  instruction: MQTT QoS 레벨(0, 1, 2)을 각각 테스트하시오.
  hint: mosquitto_pub -q 옵션으로 QoS를 지정합니다.
  category: mqtt
  points: 10
  answer: >
    mosquitto_pub -h localhost -t 'test/qos0' -m 'qos0' -q 0 &&
    mosquitto_pub -h localhost -t 'test/qos1' -m 'qos1' -q 1 &&
    mosquitto_pub -h localhost -t 'test/qos2' -m 'qos2' -q 2 &&
    echo 'QoS 테스트 완료'
  answer_detail: QoS 0은 최대 1회, QoS 1은 최소 1회, QoS 2는 정확히 1회 전달을 보장합니다.
  verify:
    type: output_contains
    expect: QoS 테스트 완료
    field: stdout
  target_vm: attacker
- order: 7
  instruction: MQTT 브로커에 인증 설정을 추가하시오. 비밀번호 파일을 생성하고 인증을 요구하는 설정을 만드시오.
  hint: mosquitto_passwd로 비밀번호 파일을 생성합니다.
  category: security
  points: 12
  answer: >
    echo 'allow_anonymous false' > /tmp/mosquitto_auth.conf &&
    echo 'password_file /tmp/mqtt_passwd' >> /tmp/mosquitto_auth.conf &&
    echo 'listener 1884' >> /tmp/mosquitto_auth.conf &&
    echo 'admin:$7$101$password' > /tmp/mqtt_passwd &&
    echo 'MQTT 인증 설정 완료'
  answer_detail: allow_anonymous false로 인증을 요구하고, password_file로 사용자 인증 정보를 지정합니다.
  verify:
    type: output_contains
    expect: MQTT 인증 설정 완료
    field: stdout
  target_vm: attacker
- order: 8
  instruction: TLS 인증서를 생성하여 MQTT 보안 통신을 위한 준비를 하시오.
  hint: openssl req -new -x509로 자체 서명 인증서를 생성합니다.
  category: security
  points: 10
  answer: openssl req -new -x509 -days 365 -keyout /tmp/mqtt_server.key -out /tmp/mqtt_server.crt -subj '/CN=mqtt-server' -nodes 2>/dev/null && echo 'TLS 인증서 생성 완료'
  answer_detail: MQTT TLS(포트 8883)를 위한 서버 인증서를 생성합니다. 실제 환경에서는 신뢰할 수 있는 CA에서 발급받습니다.
  verify:
    type: output_contains
    expect: TLS 인증서 생성 완료
    field: stdout
  target_vm: attacker
- order: 9
  instruction: 환경을 정리하고 프로토콜 보안 분석 보고서를 작성하시오.
  hint: 발견된 보안 문제와 권장 사항을 정리하세요.
  category: verification
  points: 10
  answer: >
    docker stop mqtt-lab2 2>/dev/null; docker rm mqtt-lab2 2>/dev/null;
    echo '=== 프로토콜 보안 분석 ===' &&
    echo '[취약] MQTT 평문 통신 - 메시지 도청 가능' &&
    echo '[취약] 인증 없음 - 누구나 접근 가능' &&
    echo '[권장] TLS 적용 (포트 8883)' &&
    echo '[권장] 사용자 인증 + ACL' &&
    echo '=== 분석 완료 ==='
  answer_detail: MQTT 보안의 핵심은 인증(Authentication), 인가(Authorization/ACL), 암호화(TLS)입니다.
  verify:
    type: output_contains
    expect: 분석 완료
    field: stdout
  target_vm: attacker
