lab_id: soc-ai-week08
title: 대응 절차 - 인시던트 억제와 차단 실습 (AI 지원)
version: ai
course: soc-ai
week: 8
description: 탐지된 인시던트에 대한 대응 절차를 실습합니다. Wazuh Active Response, nftables 차단, 프로세스 격리 등 실제 억제(containment)
  기법을 수행합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 150
objectives:
- Wazuh Active Response의 동작 원리와 설정을 이해한다
- nftables를 사용하여 악성 IP를 차단할 수 있다
- 인시던트 대응 절차(탐지-분석-억제-제거-복구)를 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh Active Response 설정을 확인하시오. 어떤 자동 대응 명령이 설정되어 있는지 조회하시오.
  hint: ossec.conf에서 active-response 섹션을 확인하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: SIEM VM에서 Wazuh Active Response 설정을 확인해줘

    📎 참고 (CLI): grep -A 10 "<active-response>" /var/ossec/etc/ossec.conf'
  answer_detail: Active Response는 특정 룰이 트리거되면 자동으로 대응 명령(IP 차단, 프로세스 종료 등)을 실행합니다. command, location,
    rules_id, timeout이 핵심 설정 요소입니다.
  verify:
    type: output_contains
    expect: active-response
    field: stdout
    semantic:
      intent: Active Response 설정 조회 — grep -A 10 <active-response> /var/ossec/etc/ossec.conf 로 자동 대응 command·location·rules_id·timeout
        블록 확인. 현재 active response 배포 상태 파악
      success_criteria:
      - active-response 태그 매칭
      - command + rules_id 포함
      - XML 구조
      acceptable_methods:
      - grep -A + xmllint
      negative_signs:
      - active-response 개념 없음
      - 태그 매칭 실패
  target_vm: siem
  script: grep -A 10 "<active-response>" /var/ossec/etc/ossec.conf
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh Active Response 설정을 확인해줘
- order: 2
  instruction: SIEM VM에서 Wazuh가 제공하는 Active Response 스크립트 목록을 확인하시오.
  hint: /var/ossec/active-response/bin/ 디렉토리를 확인하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: SIEM VM에서 Wazuh가 제공하는 Active Response 스크립트 목록을 확인해줘

    📎 참고 (CLI): ls -la /var/ossec/active-response/bin/'
  answer_detail: firewall-drop(IP 차단), host-deny(hosts.deny 추가), disable-account(계정 비활성화) 등의 스크립트가 있습니다.
    각 스크립트는 인시던트 유형에 맞는 대응 액션을 수행합니다.
  verify:
    type: output_contains
    expect: firewall-drop
    field: stdout
    semantic:
      intent: Active Response 스크립트 목록 — ls -la /var/ossec/active-response/bin/ 로 firewall-drop·host-deny·disable-account·restart.sh
        등 기본 제공 스크립트 확인. 커스텀 추가 전 기본 인벤토리
      success_criteria:
      - active-response/bin 디렉토리
      - 스크립트 목록
      acceptable_methods:
      - ls -la
      negative_signs:
      - 경로 오류
  target_vm: siem
  script: ls -la /var/ossec/active-response/bin/
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh가 제공하는 Active Response 스크립트 목록을 확인해줘
- order: 3
  instruction: SECU VM에서 nftables의 현재 방화벽 규칙을 확인하시오.
  hint: nft list ruleset 명령을 사용하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: SECU VM에서 nftables의 현재 방화벽 규칙을 확인해줘

    📎 참고 (CLI): nft list ruleset'
  answer_detail: nftables의 현재 규칙을 파악해야 새로운 차단 룰을 추가할 때 기존 정책과 충돌이 없는지 확인할 수 있습니다. chain, rule, accept,
    drop 키워드를 주목하세요.
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: SECU nftables 현재 룰셋 — nft list ruleset 으로 방화벽 정책 확인. 차단 룰 추가 전 baseline. Active Response
        자동 차단이 이 rule set 에 삽입되는지 확인
      success_criteria:
      - nft list ruleset
      - table 키워드
      - baseline 파악
      acceptable_methods:
      - nft list + iptables -L
      negative_signs:
      - rule 확인 없이
  target_vm: siem
  script: nft list ruleset
  risk_level: low
  bastion_prompt: SECU VM에서 nftables의 현재 방화벽 규칙을 확인해줘
- order: 4
  instruction: SIEM VM의 Wazuh 알림에서 ATTACKER IP({{ATTACKER_IP}})로부터의 최근 공격 이벤트를 확인하시오.
  hint: alerts.log에서 ATTACKER IP를 검색하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: SIEM VM의 Wazuh 알림에서 ATTACKER IP(10.20.30.201)로부터의 최근 공격 이벤트를 확인해줘

    📎 참고 (CLI): grep -B 2 -A 5 "10.20.30.201" /var/ossec/logs/alerts/alerts.log | tail -30'
  answer_detail: 대응 절차의 첫 단계는 탐지된 이벤트를 분석하여 실제 위협인지 확인하는 것입니다. ATTACKER IP에서의 이벤트 유형, 빈도, 대상을 파악합니다.
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
    semantic:
      intent: ATTACKER IP 공격 이벤트 — grep -B 2 -A 5 10.20.30.201 alerts.log | tail -30 으로 공격자 활동 증거 최근 30줄.
        Containment 대상 IP 의 행동 분석 → 차단 결정 근거
      success_criteria:
      - 10.20.30.201 필터
      - 이벤트 증거
      - 차단 근거
      acceptable_methods:
      - grep -B -A
      negative_signs:
      - 증거 부족
  target_vm: siem
  script: grep -B 2 -A 5 "10.20.30.201" /var/ossec/logs/alerts/alerts.log | tail -30
  risk_level: low
  bastion_prompt: SIEM VM의 Wazuh 알림에서 ATTACKER IP(10.20.30.201)로부터의 최근 공격 이벤트를 확인해줘
- order: 5
  instruction: WEB VM에서 현재 설정된 TCP 연결 중 ATTACKER IP({{ATTACKER_IP}})와의 활성 연결을 확인하시오.
  hint: ss 또는 netstat으로 연결 상태를 확인하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: WEB VM에서 현재 설정된 TCP 연결 중 ATTACKER IP(10.20.30.201)와의 활성 연결을 확인해줘

    📎 참고 (CLI): ss -tnp | grep "10.20.30.201"'
  answer_detail: 활성 연결을 확인하여 공격자가 현재 시스템에 접속 중인지 파악합니다. ESTABLISHED 상태의 연결이 있다면 즉시 억제 조치가 필요합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: ATTACKER IP 활성 연결 — ss -tnp | grep 10.20.30.201 로 현재 ESTAB 연결 + 프로세스. 격리 전 실시간 세션 스냅샷 보존
        → 포렌식
      success_criteria:
      - ss -tnp 필터
      - ESTABLISHED
      - 프로세스 식별
      acceptable_methods:
      - ss + netstat
      - lsof -i
      negative_signs:
      - -p 없음 (프로세스 누락)
  target_vm: siem
  script: ss -tnp | grep "10.20.30.201"
  risk_level: low
  bastion_prompt: WEB VM에서 현재 설정된 TCP 연결 중 ATTACKER IP(10.20.30.201)와의 활성 연결을 확인해줘
- order: 6
  instruction: WEB VM에서 최근 실행 중인 프로세스 중 의심스러운 프로세스를 확인하시오. 비정상적인 네트워크 연결을 가진 프로세스를 찾으시오.
  hint: ss -tnp 또는 lsof -i로 네트워크 연결이 있는 프로세스를 확인하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: WEB VM에서 최근 실행 중인 프로세스 중 의심스러운 프로세스를 확인해줘

    📎 참고 (CLI): ss -tnp | grep ESTABLISHED'
  answer_detail: ESTABLISHED 연결을 가진 프로세스를 확인하면 정상 서비스(apache2, sshd)와 의심스러운 연결을 구분할 수 있습니다. 알 수 없는 프로세스의
    외부 연결은 악성코드 활동 징후입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 의심 프로세스 연결 — ss -tnp | grep ESTABLISHED 로 모든 활성 TCP + 프로세스 매핑. 외부 연결 가진 프로세스 비정상성 검토. reverse
        shell 탐지
      success_criteria:
      - ss -tnp ESTABLISHED
      - 프로세스+연결 매핑
      - reverse shell 개념
      acceptable_methods:
      - ss + ps aux
      - lsof -iTCP -sTCP:ESTABLISHED
      negative_signs:
      - 프로세스 정보 없음
  target_vm: siem
  script: ss -tnp | grep ESTABLISHED
  risk_level: low
  bastion_prompt: WEB VM에서 최근 실행 중인 프로세스 중 의심스러운 프로세스를 확인해줘
- order: 7
  instruction: SECU VM에서 nftables를 사용하여 ATTACKER IP({{ATTACKER_IP}})에서 WEB VM({{WEB_IP}})으로의 새로운 연결을 차단하는
    규칙을 확인하시오. (실제 차단 규칙 적용 대신 현재 규칙에 ATTACKER 관련 항목이 있는지 확인)
  hint: nft list ruleset에서 {{ATTACKER_IP}} 관련 규칙을 검색하세요.
  category: response
  points: 12
  answer: '🤖 프롬프트: SECU VM에서 nftables를 사용하여 ATTACKER IP(10.20.30.201)에서 WEB VM(10.20.30.80)으로의 새로운 연결을
    차단하는 규칙을 확인하시오. (실제 차단 규칙 적용 대신 현재 규칙에 ATTACKER 관련 항목이 있는지 확인)해줘

    📎 참고 (CLI): nft list ruleset | grep -i "10.20.30.201\|drop\|reject"'
  answer_detail: 방화벽에서 공격 소스 IP를 차단하는 것이 인시던트 억제의 핵심입니다. nftables에서 ip saddr 10.20.30.201 drop 형태의 규칙이
    적용되면 해당 IP의 모든 트래픽이 차단됩니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: IP 차단 룰 확인 — nft list ruleset | grep 10.20.30.201|drop|reject. Active Response 또는 수동 차단으로
        추가된 drop 룰 검증. containment 적용 여부
      success_criteria:
      - nft + grep IP/drop
      - 차단 적용 확인
      acceptable_methods:
      - nft list + grep
      negative_signs:
      - drop 룰 없음 처리
  target_vm: siem
  script: nft list ruleset | grep -i "10.20.30.201\|drop\|reject"
  risk_level: low
  bastion_prompt: SECU VM에서 nftables를 사용하여 ATTACKER IP(10.20.30.201)에서 WEB VM(10.20.30.80)으로의 새로운 연결을
    차단하는 규칙을 확인하시오. (실제 차단 규칙 적용 대신 현재 규칙에 ATTACKER 관련 항목이 있는지 확인)해줘
- order: 8
  instruction: WEB VM에서 auth.log를 확인하여 ATTACKER IP에서의 인증 시도 기록을 분석하시오.
