  verify:
    type: output_contains
    expect: running
    field: stdout
    semantic:
      intent: FIM syscheck 상태 — wazuh-control status | grep syscheck + ls /var/ossec/queue/syscheck/ 로
        파일 무결성 모니터링 활성 + DB 확인. 공격 중 파일 변조 탐지 backbone
      success_criteria:
      - syscheck 활성 확인
      - queue/syscheck DB
      acceptable_methods:
      - wazuh-control + ls
      negative_signs:
      - FIM 개념 없음
  target_vm: siem
  script: /var/ossec/bin/wazuh-control status | grep syscheck && ls -la /var/ossec/queue/syscheck/ 2>/dev/null
  risk_level: low
  bastion_prompt: WEB VM에서 최근 수정된 시스템 파일이 있는지 Wazuh 파일 무결성 검사(syscheck) 결과를 확인해줘
