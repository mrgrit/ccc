        로그인·sudo 시도 기록. 공격자의 인증 시도 패턴 + 성공 여부
      success_criteria:
      - auth.log IP 필터
      - 인증 시도 기록
      acceptable_methods:
      - grep + tail
      negative_signs:
      - 다른 로그
  target_vm: siem
  script: grep "10.20.30.201" /var/log/auth.log | tail -15
  risk_level: low
  bastion_prompt: WEB VM에서 auth.log를 확인하여 ATTACKER IP에서의 인증 시도 기록을 분석해줘
- order: 9
  instruction: SIEM VM에서 Wazuh Active Response의 실행 로그를 확인하시오. 자동 차단이 수행된 기록을 찾으시오.
  hint: /var/ossec/logs/active-responses.log 파일을 확인하세요.
  category: response
  points: 12
  answer: '🤖 프롬프트: SIEM VM에서 Wazuh Active Response의 실행 로그를 확인해줘

    📎 참고 (CLI): cat /var/ossec/logs/active-responses.log 2>/dev/null | tail -20 || echo "No active response
    log found"'
  answer_detail: active-responses.log는 Active Response가 실행된 모든 기록을 저장합니다. 차단된 IP, 실행 시간, 타임아웃 정보가 포함되어
    있어 대응 조치의 이력을 추적할 수 있습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Active Response 실행 로그 — cat /var/ossec/logs/active-responses.log | tail -20 으로 자동 차단 실행
        이력 (firewall-drop 명령 + 대상 IP + 결과). Containment 자동화 효과 검증
      success_criteria:
      - active-responses.log 조회
      - 실행 이력 확인
      acceptable_methods:
      - tail + fallback echo
      negative_signs:
      - 파일 경로 오류
  target_vm: siem
  script: cat /var/ossec/logs/active-responses.log 2>/dev/null | tail -20 || echo "No active response
    log found"
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh Active Response의 실행 로그를 확인해줘
