  answer_detail: 인시던트 대응에서 공격자의 인증 시도 기록은 침해 범위를 판단하는 핵심 정보입니다. 성공한 로그인이 있다면 해당 계정의 비밀번호 변경과 세션 종료가 필요합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
