lab_id: soc-ai-week01
title: SOC 구축 기초 - 환경 확인 및 구성 점검 (AI 지원)
version: ai
course: soc-ai
week: 1
description: 보안관제센터(SOC) 인프라를 구성하는 핵심 VM들의 상태를 점검하고, Wazuh SIEM·Suricata IDS·웹서버 등 각 구성 요소의 역할과 연결 상태를
  확인합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 90
objectives:
- SOC를 구성하는 VM별 역할(SIEM, SECU, WEB, ATTACKER)을 이해한다
- Wazuh 매니저와 에이전트의 동작 상태를 확인할 수 있다
- SOC 네트워크 토폴로지를 파악하고 연결성을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악하시오.
  hint: hostname과 ip addr 명령을 조합하세요.
  category: setup
  points: 5
  answer: '🤖 프롬프트: 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악해줘

    📎 참고 (CLI): hostname && ip -4 addr show | grep inet'
  answer_detail: hostname은 현재 VM의 이름을 출력하고, ip -4 addr show는 IPv4 주소를 표시합니다. SOC 환경에서 자신이 어떤 역할의 VM에 있는지
    먼저 파악하는 것이 기본입니다.
  verify:
    type: output_contains
    expect: inet
    field: stdout
    semantic:
      intent: 'SIEM VM 접속 확인 — hostname (예: ccc-siem 반환) + ip -4 addr show | grep inet 로 인터페이스 IP(10.20.30.100)
        확인. SOC 실습 시작 시 자신이 어느 역할 VM(SIEM/SECU/WEB/ATTACKER) 에 있는지 식별하는 기본 정찰'
      success_criteria:
      - hostname 명령 실행 + VM 이름 반환
      - ip -4 addr + inet 10.20.30.x 출력
      - SIEM 역할 VM 10.20.30.100 확인
      acceptable_methods:
      - hostname + ip -4 addr show
      - hostnamectl + ip -br addr
      - cat /etc/hostname + ifconfig
      negative_signs:
      - hostname 또는 IP 확인 하나만
      - 어느 VM 인지 식별 없음
      - IPv6 만 확인 (IPv4 누락)
  target_vm: siem
  script: hostname && ip -4 addr show | grep inet
  risk_level: low
  bastion_prompt: 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악해줘
- order: 2
  instruction: SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인하시오.
  hint: SIEM({{SECU_IP}}00), SECU({{SECU_IP}}), WEB({{WEB_IP}}), ATTACKER({{ATTACKER_IP}})에 ping을 보내세요.
  category: setup
  points: 5
  answer: '🤖 프롬프트: SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인해줘

    📎 참고 (CLI): ping -c 1 -W 2 10.20.30.100 && ping -c 1 -W 2 10.20.30.1 && ping -c 1 -W 2 10.20.30.80
    && ping -c 1 -W 2 10.20.30.201'
  answer_detail: ping -c 1은 ICMP 패킷 1개를 보내고, -W 2는 2초 타임아웃을 설정합니다. SOC 구축 시 모든 구성 요소 간 네트워크 연결이 정상인지 확인하는
    것이 첫 단계입니다.
  verify:
    type: output_contains
    expect: bytes from 10.20.30
    field: stdout
    semantic:
      intent: 'SOC 네트워크 4 VM ping sweep — ping -c 1 -W 2 10.20.30.100 (SIEM/Wazuh) + .1 (SECU/Gateway)
        + .80 (WEB/Apache+JuiceShop) + .201 (ATTACKER). ICMP 1 패킷 + 2초 타임아웃으로 빠른 가용성 확인. SOC 구축 첫 단계:
        모든 구성 요소 reachable 검증'
      success_criteria:
      - 4 IP ping 모두 실행
      - bytes from 10.20.30 응답 포함
      - 4 VM 역할 구분 (SIEM/SECU/WEB/ATTACKER)
      acceptable_methods:
      - for vm in 4ip; do ping -c1 -W2; done
      - fping 10.20.30.1 10.20.30.80 10.20.30.100 10.20.30.201
      - nmap -sn 10.20.30.0/24
      negative_signs:
      - 3 VM 이하만 ping
      - 타임아웃 없이 무한 대기
      - 역할 구분 없이 IP만
  target_vm: siem
  script: ping -c 1 -W 2 10.20.30.100 && ping -c 1 -W 2 10.20.30.1 && ping -c 1 -W 2 10.20.30.80 && ping
    -c 1 -W 2 10.20.30.201
  risk_level: low
  bastion_prompt: SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인해줘
- order: 3
  instruction: SIEM VM({{SECU_IP}}00)에서 Wazuh 매니저 서비스의 실행 상태를 확인하시오.
  hint: systemctl 명령으로 wazuh-manager 서비스 상태를 조회하세요.
  category: setup
  points: 5
  answer: '🤖 프롬프트: SIEM VM(10.20.30.100)에서 Wazuh 매니저 서비스의 실행 상태를 확인해줘

    📎 참고 (CLI): systemctl status wazuh-manager --no-pager'
  answer_detail: wazuh-manager는 SOC의 핵심인 SIEM 엔진입니다. active (running) 상태여야 로그 수집, 분석, 알림 생성이 정상 동작합니다.
  verify:
    type: output_contains
    expect:
    - active
    - failed
    field: stdout
    semantic:
      intent: 'Wazuh Manager 데몬 상태 — systemctl status wazuh-manager --no-pager 로 Active: active (running)
        확인. SIEM 의 핵심 엔진: 로그 수집·디코딩·룰 매칭·경보 생성. 비활성 시 모든 SOC 기능 마비. --no-pager 로 ssh 환경 호환'
      success_criteria:
      - systemctl status wazuh-manager 실행
      - active 또는 failed 상태 문자열
      - --no-pager 또는 tail 로 ssh 호환
      acceptable_methods:
      - systemctl status wazuh-manager
      - systemctl is-active wazuh-manager
      - ps auxf | grep wazuh
      negative_signs:
      - wazuh-agent 확인 (다른 데몬)
      - status 대신 start 시도
      - exit code 무시
  target_vm: siem
  script: systemctl status wazuh-manager --no-pager
  risk_level: low
  bastion_prompt: SIEM VM(10.20.30.100)에서 Wazuh 매니저 서비스의 실행 상태를 확인해줘
- order: 4
  instruction: Wazuh 매니저에 등록된 에이전트 목록을 확인하시오.
  hint: /var/ossec/bin/agent_control 명령을 사용하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: Wazuh 매니저에 등록된 에이전트 목록을 확인해줘

    📎 참고 (CLI): /var/ossec/bin/agent_control -l'
  answer_detail: agent_control -l은 Wazuh 매니저에 등록된 모든 에이전트의 ID, 이름, IP, 상태를 표시합니다. Active 상태가 정상이며, WEB
    VM의 에이전트가 등록되어 있어야 합니다.
  verify:
    type: output_contains
    expect: Active
    field: stdout
    semantic:
      intent: Wazuh 에이전트 목록 조회 — /var/ossec/bin/agent_control -l 로 매니저에 등록된 모든 에이전트의 ID·이름·IP·Active/Disconnected
        상태 출력. WEB VM 의 에이전트가 Active 여야 파일 무결성·로그 수집 정상
      success_criteria:
      - agent_control -l 실행
      - Active 키워드 출력 (최소 1 에이전트)
      - WEB 에이전트 등록 확인
      acceptable_methods:
      - /var/ossec/bin/agent_control -l
      - /var/ossec/bin/agent_control -i <id>
      - Wazuh API /agents endpoint
      negative_signs:
      - agent_control 경로 틀림
      - Disconnected 상태를 Active 로 오판
      - 에이전트 수 0
  target_vm: siem
  script: /var/ossec/bin/agent_control -l
  risk_level: low
  bastion_prompt: Wazuh 매니저에 등록된 에이전트 목록을 확인해줘
- order: 5
  instruction: SECU VM({{SECU_IP}})에서 Suricata IDS 서비스의 실행 상태를 확인하시오.
  hint: ssh로 SECU VM에 접속하여 systemctl로 suricata 상태를 확인하세요.
  category: setup
  points: 5
  answer: '🤖 프롬프트: SECU VM(10.20.30.1)에서 Suricata IDS 서비스의 실행 상태를 확인해줘

    📎 참고 (CLI): systemctl status suricata --no-pager'
  answer_detail: Suricata는 네트워크 기반 IDS/IPS로, SOC에서 네트워크 트래픽을 실시간 분석하여 위협을 탐지합니다. active 상태여야 정상 동작합니다.
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: SECU VM Suricata 상태 — systemctl status suricata --no-pager 로 네트워크 IDS 엔진 가동 여부 확인. SECU(10.20.30.1)
        는 보안 게이트웨이로 트래픽 inspection 담당. Suricata 중단 시 네트워크 탐지 완전 공백
      success_criteria:
      - systemctl status suricata
      - active 상태 확인
      - SECU VM 대상
      acceptable_methods:
      - systemctl status
      - suricatasc -c uptime
      - ps aux | grep suricata
      negative_signs:
      - Wazuh 재확인 (다른 서비스)
      - SECU 가 아닌 VM
      - suricata-update 와 혼동
  target_vm: secu
  script: systemctl status suricata --no-pager
  risk_level: low
  bastion_prompt: SECU VM(10.20.30.1)에서 Suricata IDS 서비스의 실행 상태를 확인해줘
- order: 6
  instruction: SECU VM에서 nftables 방화벽 규칙을 확인하시오.
  hint: ssh로 SECU에 접속하여 nft list ruleset 명령을 실행하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: SECU VM에서 nftables 방화벽 규칙을 확인해줘

    📎 참고 (CLI): nft list ruleset'
  answer_detail: nftables는 Linux의 패킷 필터링 프레임워크입니다. SOC의 보안 게이트웨이 역할을 하는 SECU VM에서 어떤 트래픽이 허용/차단되는지 방화벽
    정책을 확인합니다.
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: SECU nftables 룰셋 조회 — nft list ruleset 로 SECU 의 방화벽 정책 전체 출력. table inet filter + input/forward/output
        체인 + 각 룰 확인. SOC 보안 게이트웨이의 현재 허용/차단 정책 파악
      success_criteria:
      - nft list ruleset 실행
      - table 키워드 포함 (최소 1 테이블)
      - 체인·룰 구조 확인
      acceptable_methods:
      - nft list ruleset
      - nft list tables + nft list chain ...
      - iptables -L -n -v (레거시 호환)
      negative_signs:
      - sudo 누락으로 권한 실패
      - 개별 체인만 (전체 ruleset 아님)
      - 빈 출력 해석 없음
  target_vm: secu
  script: nft list ruleset
  risk_level: low
  bastion_prompt: SECU VM에서 nftables 방화벽 규칙을 확인해줘
- order: 7
  instruction: WEB VM({{WEB_IP}})에서 Apache 웹서버와 JuiceShop 애플리케이션의 실행 상태를 확인하시오.
  hint: ssh로 WEB VM에 접속하여 systemctl과 curl로 확인하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: WEB VM(10.20.30.80)에서 Apache 웹서버와 JuiceShop 애플리케이션의 실행 상태를 확인해줘

    📎 참고 (CLI): systemctl status apache2 --no-pager && curl -s -o /dev/null -w "%{http_code}" http://localhost:3000'
  answer_detail: Apache는 웹서버, JuiceShop(:3000)은 취약한 웹 애플리케이션입니다. SOC 모니터링 대상이 되는 자산이 정상 동작하는지 확인합니다. HTTP
    200이면 정상입니다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: WEB VM Apache + JuiceShop 상태 — systemctl status apache2 --no-pager (웹서버 active) + curl -s
        -o /dev/null -w %{http_code} http://localhost:3000 (JuiceShop 취약 웹앱 HTTP 200). SOC 모니터링 대상 자산
        2종 (웹서버 + 취약앱) 동시 검증
      success_criteria:
      - apache2 + JuiceShop(3000) 둘 다 확인
      - HTTP 200 응답
      - curl -w 로 상태코드만 추출
      acceptable_methods:
      - systemctl + curl -w
      - ss -ltnp | grep :3000 포트 확인
      - wget --spider
      negative_signs:
      - Apache 또는 JuiceShop 한쪽만
      - -w 없이 응답 본문 전체
      - 200 vs 기타 구분 없음
  target_vm: web
  script: systemctl status apache2 --no-pager && curl -s -o /dev/null -w "%{http_code}" http://localhost:3000
  risk_level: low
  bastion_prompt: WEB VM(10.20.30.80)에서 Apache 웹서버와 JuiceShop 애플리케이션의 실행 상태를 확인해줘
- order: 8
  instruction: SIEM VM에서 rsyslog가 UDP 514 포트에서 리스닝 중인지 확인하시오.
  hint: ss 또는 netstat으로 514 포트 수신 상태를 확인하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: SIEM VM에서 rsyslog가 UDP 514 포트에서 리스닝 중인지 확인해줘

    📎 참고 (CLI): ss -ulnp | grep 514'
  answer_detail: rsyslog는 중앙 로그 서버 역할을 합니다. UDP 514 포트에서 수신 대기 중이어야 다른 VM들(SECU, WEB)로부터 syslog를 수집할 수
    있습니다.
  verify:
    type: output_contains
    expect: '514'
    field: stdout
    semantic:
      intent: SIEM rsyslog UDP 514 리스닝 — ss -ulnp | grep 514 로 UDP 514 소켓 바인딩 + rsyslogd 프로세스 확인. 중앙 로그
        서버 수신 준비 상태. 다른 VM(SECU/WEB) 의 syslog 포워딩 수신 전제
      success_criteria:
      - ss -ulnp 또는 ss -ul + grep 514
      - 514 포트 출력
      - rsyslogd 프로세스 매핑
      acceptable_methods:
      - ss -ulnp
      - netstat -ulnp | grep 514 (레거시)
      - lsof -iUDP:514
      negative_signs:
      - TCP(-tlnp) 확인 (UDP 아님)
      - -p 없어 프로세스 안 보임
      - 다른 포트 확인
  target_vm: siem
  script: ss -ulnp | grep 514
  risk_level: low
  bastion_prompt: SIEM VM에서 rsyslog가 UDP 514 포트에서 리스닝 중인지 확인해줘
- order: 9
  instruction: SECU VM의 rsyslog가 SIEM({{SECU_IP}}00)으로 로그를 전달하도록 설정되어 있는지 확인하시오.
  hint: SECU VM의 rsyslog 설정 파일에서 포워딩 대상을 확인하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: SECU VM의 rsyslog가 SIEM(10.20.30.100)으로 로그를 전달하도록 설정되어 있는지 확인해줘

    📎 참고 (CLI): grep -r "10.20.30.100" /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null'
  answer_detail: rsyslog 설정에서 @10.20.30.100(UDP) 또는 @@10.20.30.100(TCP) 형태로 SIEM 서버가 지정되어 있어야 합니다. 이것이
    로그 수집 파이프라인의 핵심 연결고리입니다.
  verify:
    type: output_contains
    expect: 10.20.30.100
    field: stdout
    semantic:
      intent: SECU rsyslog SIEM 포워딩 — grep -r 10.20.30.100 /etc/rsyslog.conf /etc/rsyslog.d/ 로 *.* @10.20.30.100:514
        (UDP) 또는 @@10.20.30.100:514 (TCP) 설정 확인. 로그 중앙 집중 파이프라인의 연결고리
      success_criteria:
      - grep -r 10.20.30.100 /etc/rsyslog*
      - 포워딩 설정 출력
      - '@/@@ UDP/TCP 구분 인지'
      acceptable_methods:
      - grep -r + 설정 파일
      - rsyslogd -N 1 으로 validate
      - systemctl status rsyslog
      negative_signs:
      - 10.20.30.100 포워딩 설정 없음
      - grep 없이 전체 파일 cat
      - '@/@@ 차이 무시'
  target_vm: secu
  script: grep -r "10.20.30.100" /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null
  risk_level: low
  bastion_prompt: SECU VM의 rsyslog가 SIEM(10.20.30.100)으로 로그를 전달하도록 설정되어 있는지 확인해줘
- order: 10
  instruction: Wazuh 매니저의 ossec.conf에서 syslog 출력 설정이 어떻게 되어 있는지 확인하시오.
  hint: SIEM VM의 /var/ossec/etc/ossec.conf 파일을 확인하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Wazuh 매니저의 ossec.conf에서 syslog 출력 설정이 어떻게 되어 있는지 확인해줘

    📎 참고 (CLI): grep -A 5 "<syslog_output>" /var/ossec/etc/ossec.conf'
  answer_detail: ossec.conf의 syslog_output 섹션은 Wazuh 알림을 외부 syslog 서버로 전달하는 설정입니다. SOC에서 SIEM과 다른 시스템
    간 알림 연동에 사용됩니다.
  verify:
    type: output_contains
    expect: syslog_output
    field: stdout
    semantic:
