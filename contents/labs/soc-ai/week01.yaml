lab_id: soc-ai-week01
title: SOC 구축 기초 - 환경 확인 및 구성 점검 (AI 지원)
version: ai
course: soc-ai
week: 1
description: 보안관제센터(SOC) 인프라를 구성하는 핵심 VM들의 상태를 점검하고, Wazuh SIEM·Suricata IDS·웹서버 등 각 구성 요소의 역할과 연결 상태를 확인합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 90
objectives:
- SOC를 구성하는 VM별 역할(SIEM, SECU, WEB, ATTACKER)을 이해한다
- Wazuh 매니저와 에이전트의 동작 상태를 확인할 수 있다
- SOC 네트워크 토폴로지를 파악하고 연결성을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악하시오.
  hint: hostname과 ip addr 명령을 조합하세요.
  category: setup
  points: 5
  answer: '🤖 프롬프트: 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악해줘

    📎 참고 (CLI): hostname && ip -4 addr show | grep inet'
  answer_detail: hostname은 현재 VM의 이름을 출력하고, ip -4 addr show는 IPv4 주소를 표시합니다. SOC 환경에서 자신이 어떤 역할의 VM에 있는지 먼저 파악하는 것이 기본입니다.
  verify:
    type: output_contains
    expect: inet
    field: stdout
    semantic:
      intent: 'SOC 운영 w1 s1 — 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악하시오. (cmd: hostname && ip -4 addr show | grep inet)'
      success_criteria:
      - '명령 실행: hostname && ip -4 addr show | grep inet'
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: hostname && ip -4 addr show | grep inet
  risk_level: low
  bastion_prompt: 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악해줘
- order: 2
  instruction: SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인하시오.
  hint: SIEM({{SECU_IP}}00), SECU({{SECU_IP}}), WEB({{WEB_IP}}), ATTACKER({{ATTACKER_IP}})에 ping을 보내세요.
  category: setup
  points: 5
  answer: '🤖 프롬프트: SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인해줘

    📎 참고 (CLI): ping -c 1 -W 2 10.20.30.100 && ping -c 1 -W 2 10.20.30.1 && ping -c 1 -W 2 10.20.30.80 && ping -c 1 -W 2 10.20.30.201'
  answer_detail: ping -c 1은 ICMP 패킷 1개를 보내고, -W 2는 2초 타임아웃을 설정합니다. SOC 구축 시 모든 구성 요소 간 네트워크 연결이 정상인지 확인하는 것이 첫 단계입니다.
  verify:
    type: output_contains
    expect: bytes from 10.20.30
    field: stdout
    semantic:
      intent: 'SOC 운영 w1 s2 — SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인하시오. (cmd: ping -c 1 -W 2 10.20.30.100 &&
        ping -c 1 -W 2 10.20.30.1 && ping -c 1 -W 2 10.20)'
      success_criteria:
      - '명령 실행: ping -c 1 -W 2 10.20.30.100 && ping -c 1 -W 2 10.20.30.1 && '
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: ping -c 1 -W 2 10.20.30.100 && ping -c 1 -W 2 10.20.30.1 && ping -c 1 -W 2 10.20.30.80 && ping -c 1 -W 2 10.20.30.201
  risk_level: low
  bastion_prompt: SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인해줘
- order: 3
  instruction: SIEM VM({{SECU_IP}}00)에서 Wazuh 매니저 서비스의 실행 상태를 확인하시오.
  hint: systemctl 명령으로 wazuh-manager 서비스 상태를 조회하세요.
