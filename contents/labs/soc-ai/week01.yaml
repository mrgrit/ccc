        /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null)'
      success_criteria:
      - '명령 실행: grep -r "10.20.30.100" /etc/rsyslog.conf /etc/rsyslog.d/ 2>/'
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
