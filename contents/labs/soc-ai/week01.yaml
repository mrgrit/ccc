lab_id: soc-ai-week01
title: SOC 구축 기초 - 환경 확인 및 구성 점검 (AI 지원)
version: ai
course: soc-ai
week: 1
description: 보안관제센터(SOC) 인프라를 구성하는 핵심 VM들의 상태를 점검하고, Wazuh SIEM·Suricata IDS·웹서버 등 각 구성 요소의 역할과 연결 상태를 확인합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 90
objectives:
- SOC를 구성하는 VM별 역할(SIEM, SECU, WEB, ATTACKER)을 이해한다
- Wazuh 매니저와 에이전트의 동작 상태를 확인할 수 있다
- SOC 네트워크 토폴로지를 파악하고 연결성을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 시스템의 호스트명과 IP 주소를 확인하여 어떤 VM에 접속했는지 파악하시오.
  hint: hostname과 ip addr 명령을 조합하세요.
  category: setup
  points: 5
  answer: hostname && ip -4 addr show | grep inet
  answer_detail: hostname은 현재 VM의 이름을 출력하고, ip -4 addr show는 IPv4 주소를 표시합니다. SOC 환경에서 자신이 어떤 역할의 VM에 있는지 먼저 파악하는 것이 기본입니다.
  verify:
    type: output_contains
    expect: inet
    field: stdout
  target_vm: siem
  script: hostname && ip -4 addr show | grep inet
  risk_level: low
- order: 2
  instruction: SOC 네트워크(10.20.30.0/24)에서 주요 VM 4대의 연결 상태를 ping으로 확인하시오.
  hint: SIEM(10.20.30.100), SECU(10.20.30.1), WEB(10.20.30.80), ATTACKER(10.20.30.201)에 ping을 보내세요.
  category: setup
  points: 5
  answer: ping -c 1 -W 2 10.20.30.100 && ping -c 1 -W 2 10.20.30.1 && ping -c 1 -W 2 10.20.30.80 && ping -c 1 -W 2 10.20.30.201
  answer_detail: ping -c 1은 ICMP 패킷 1개를 보내고, -W 2는 2초 타임아웃을 설정합니다. SOC 구축 시 모든 구성 요소 간 네트워크 연결이 정상인지 확인하는 것이 첫 단계입니다.
  verify:
    type: output_contains
    expect: bytes from 10.20.30
    field: stdout
  target_vm: siem
  script: ping -c 1 -W 2 10.20.30.100 && ping -c 1 -W 2 10.20.30.1 && ping -c 1 -W 2 10.20.30.80 && ping -c 1 -W 2 10.20.30.201
  risk_level: low
- order: 3
  instruction: SIEM VM(10.20.30.100)에서 Wazuh 매니저 서비스의 실행 상태를 확인하시오.
  hint: systemctl 명령으로 wazuh-manager 서비스 상태를 조회하세요.
  category: setup
  points: 5
  answer: systemctl status wazuh-manager --no-pager
  answer_detail: wazuh-manager는 SOC의 핵심인 SIEM 엔진입니다. active (running) 상태여야 로그 수집, 분석, 알림 생성이 정상 동작합니다.
  verify:
    type: output_contains
    expect: active
    field: stdout
  target_vm: siem
  script: systemctl status wazuh-manager --no-pager
  risk_level: low
- order: 4
  instruction: Wazuh 매니저에 등록된 에이전트 목록을 확인하시오.
  hint: /var/ossec/bin/agent_control 명령을 사용하세요.
  category: setup
  points: 8
  answer: /var/ossec/bin/agent_control -l
  answer_detail: agent_control -l은 Wazuh 매니저에 등록된 모든 에이전트의 ID, 이름, IP, 상태를 표시합니다. Active 상태가 정상이며, WEB VM의 에이전트가 등록되어 있어야 합니다.
  verify:
    type: output_contains
    expect: Active
    field: stdout
  target_vm: siem
  script: /var/ossec/bin/agent_control -l
  risk_level: low
- order: 5
  instruction: SECU VM(10.20.30.1)에서 Suricata IDS 서비스의 실행 상태를 확인하시오.
  hint: ssh로 SECU VM에 접속하여 systemctl로 suricata 상태를 확인하세요.
  category: setup
  points: 5
  answer: systemctl status suricata --no-pager
  answer_detail: Suricata는 네트워크 기반 IDS/IPS로, SOC에서 네트워크 트래픽을 실시간 분석하여 위협을 탐지합니다. active 상태여야 정상 동작합니다.
  verify:
    type: output_contains
    expect: active
    field: stdout
  target_vm: secu
  script: systemctl status suricata --no-pager
  risk_level: low
- order: 6
  instruction: SECU VM에서 nftables 방화벽 규칙을 확인하시오.
  hint: ssh로 SECU에 접속하여 nft list ruleset 명령을 실행하세요.
  category: setup
  points: 8
  answer: nft list ruleset
  answer_detail: nftables는 Linux의 패킷 필터링 프레임워크입니다. SOC의 보안 게이트웨이 역할을 하는 SECU VM에서 어떤 트래픽이 허용/차단되는지 방화벽 정책을 확인합니다.
  verify:
    type: output_contains
    expect: table
    field: stdout
  target_vm: secu
  script: nft list ruleset
  risk_level: low
- order: 7
  instruction: WEB VM(10.20.30.80)에서 Apache 웹서버와 JuiceShop 애플리케이션의 실행 상태를 확인하시오.
  hint: ssh로 WEB VM에 접속하여 systemctl과 curl로 확인하세요.
  category: setup
  points: 8
  answer: systemctl status apache2 --no-pager && curl -s -o /dev/null -w "%{http_code}" http://localhost:3000
  answer_detail: Apache는 웹서버, JuiceShop(:3000)은 취약한 웹 애플리케이션입니다. SOC 모니터링 대상이 되는 자산이 정상 동작하는지 확인합니다. HTTP 200이면 정상입니다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
  target_vm: web
  script: systemctl status apache2 --no-pager && curl -s -o /dev/null -w "%{http_code}" http://localhost:3000
  risk_level: low
- order: 8
  instruction: SIEM VM에서 rsyslog가 UDP 514 포트에서 리스닝 중인지 확인하시오.
  hint: ss 또는 netstat으로 514 포트 수신 상태를 확인하세요.
  category: setup
  points: 8
  answer: ss -ulnp | grep 514
  answer_detail: rsyslog는 중앙 로그 서버 역할을 합니다. UDP 514 포트에서 수신 대기 중이어야 다른 VM들(SECU, WEB)로부터 syslog를 수집할 수 있습니다.
  verify:
    type: output_contains
    expect: '514'
    field: stdout
  target_vm: siem
  script: ss -ulnp | grep 514
  risk_level: low
- order: 9
  instruction: SECU VM의 rsyslog가 SIEM(10.20.30.100)으로 로그를 전달하도록 설정되어 있는지 확인하시오.
  hint: SECU VM의 rsyslog 설정 파일에서 포워딩 대상을 확인하세요.
  category: analysis
  points: 10
  answer: grep -r "10.20.30.100" /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null
  answer_detail: rsyslog 설정에서 @10.20.30.100(UDP) 또는 @@10.20.30.100(TCP) 형태로 SIEM 서버가 지정되어 있어야 합니다. 이것이 로그 수집 파이프라인의 핵심 연결고리입니다.
  verify:
    type: output_contains
    expect: 10.20.30.100
    field: stdout
  target_vm: secu
  script: grep -r "10.20.30.100" /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null
  risk_level: low
- order: 10
  instruction: Wazuh 매니저의 ossec.conf에서 syslog 출력 설정이 어떻게 되어 있는지 확인하시오.
  hint: SIEM VM의 /var/ossec/etc/ossec.conf 파일을 확인하세요.
  category: analysis
  points: 10
  answer: grep -A 5 "<syslog_output>" /var/ossec/etc/ossec.conf
  answer_detail: ossec.conf의 syslog_output 섹션은 Wazuh 알림을 외부 syslog 서버로 전달하는 설정입니다. SOC에서 SIEM과 다른 시스템 간 알림 연동에 사용됩니다.
  verify:
    type: output_contains
    expect: syslog_output
    field: stdout
  target_vm: siem
  script: grep -A 5 "<syslog_output>" /var/ossec/etc/ossec.conf
  risk_level: low
