lab_id: soc-ai-week04
title: 이벤트 분석 - Wazuh 알림과 로그 이벤트 해석 (AI 지원)
version: ai
course: soc-ai
week: 4
description: Wazuh가 생성하는 보안 알림의 구조를 분석하고, 룰 레벨·카테고리별 이벤트를 분류하여 실제 위협과 오탐을 구분하는 기초 분석 기술을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- Wazuh 알림 로그의 구조(룰 ID, 레벨, 설명)를 이해한다
- 알림 레벨별 심각도를 판단하고 분류할 수 있다
- SSH, 웹, 시스템 이벤트를 로그에서 식별하고 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh 알림 로그의 최근 30줄을 확인하고, 알림 구조를 파악하시오.
  hint: /var/ossec/logs/alerts/alerts.log 파일을 확인하세요.
  category: analysis
  points: 5
  answer: ssh siem 'tail -30 /var/ossec/logs/alerts/alerts.log'
  answer_detail: Wazuh 알림은 타임스탬프, Rule ID, Level, Description, 소스 정보를 포함합니다. 이 구조를 이해해야 이벤트를 효율적으로 분석할 수 있습니다.
  verify:
    type: output_contains
    expect: 'Rule:'
    field: stdout
  script: ssh siem 'tail -30 /var/ossec/logs/alerts/alerts.log'
  risk_level: low
- order: 2
  instruction: SIEM VM에서 알림 레벨별 발생 빈도를 집계하시오.
  hint: alerts.log에서 level 필드를 추출하고 sort, uniq -c로 집계하세요.
  category: analysis
  points: 10
  answer: ssh siem 'grep -oP "level \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn'
  answer_detail: 레벨별 빈도를 파악하면 현재 SOC 환경의 보안 상태를 한눈에 볼 수 있습니다. 레벨 0-4는 정보성, 5-7은 낮은 위험, 8-11은 중간, 12 이상은 높은 위험입니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
  script: ssh siem 'grep -oP "level \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn'
  risk_level: low
- order: 3
  instruction: SIEM VM에서 룰 ID별 알림 발생 빈도 Top 10을 추출하시오.
  hint: 'alerts.log에서 Rule: 뒤의 숫자를 추출하여 집계하세요.'
  category: analysis
  points: 10
  answer: 'ssh siem ''grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -10'''
  answer_detail: 빈번하게 발생하는 룰 ID를 파악하면 가장 많은 이벤트를 유발하는 활동을 식별할 수 있습니다. 상위 룰을 분석하여 오탐 여부를 판단하고 튜닝 대상을 선정합니다.
  verify:
    type: output_contains
    expect: 'Rule:'
    field: stdout
  script: 'ssh siem ''grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -10'''
  risk_level: low
- order: 4
  instruction: SIEM VM에서 SSH 관련 Wazuh 알림만 필터링하여 확인하시오.
  hint: alerts.log에서 sshd 또는 authentication 키워드를 검색하세요.
  category: analysis
  points: 8
  answer: ssh siem 'grep -B 2 -A 3 "sshd\|authentication" /var/ossec/logs/alerts/alerts.log | tail -30'
  answer_detail: SSH 관련 이벤트는 SOC에서 가장 흔한 모니터링 대상입니다. 로그인 성공/실패, 브루트포스 시도 등이 포함됩니다. Rule 5501(로그인 성공), 5503(실패) 등이 대표적입니다.
  verify:
    type: output_contains
    expect: ssh
    field: stdout
  script: ssh siem 'grep -B 2 -A 3 "sshd\|authentication" /var/ossec/logs/alerts/alerts.log | tail -30'
  risk_level: low
- order: 5
  instruction: SIEM VM에서 알림 JSON 로그를 활용하여 특정 룰의 상세 정보를 추출하시오. 룰 ID 5501의 알림을 검색하시오.
  hint: /var/ossec/logs/alerts/alerts.json에서 rule.id를 검색하세요.
  category: analysis
  points: 10
  answer: ssh siem 'grep "5501" /var/ossec/logs/alerts/alerts.json | tail -3'
  answer_detail: JSON 형식 알림에는 agent.name, rule.id, rule.level, rule.description, data.srcip 등 구조화된 필드가 포함되어 있어 프로그래밍적 분석에 유리합니다.
  verify:
    type: output_contains
    expect: rule
    field: stdout
  script: ssh siem 'grep "5501" /var/ossec/logs/alerts/alerts.json | tail -3'
  risk_level: low
- order: 6
  instruction: Wazuh 룰셋에서 SSH 관련 탐지 룰의 내용을 확인하시오.
  hint: /var/ossec/ruleset/rules/ 에서 sshd 관련 룰 파일을 찾으세요.
  category: analysis
  points: 10
  answer: ssh siem 'head -50 /var/ossec/ruleset/rules/0095-sshd_rules.xml'
  answer_detail: sshd_rules.xml은 SSH 관련 탐지 룰을 정의합니다. rule id, level, description, match/regex 패턴을 포함하며, 이 룰에 매칭되는 로그가 알림으로 생성됩니다.
  verify:
    type: output_contains
    expect: <rule
    field: stdout
  script: ssh siem 'head -50 /var/ossec/ruleset/rules/0095-sshd_rules.xml'
  risk_level: low
- order: 7
  instruction: WEB VM의 auth.log에서 SSH 로그인 시도 기록을 확인하시오.
  hint: /var/log/auth.log에서 sshd 관련 로그를 검색하세요.
  category: analysis
  points: 8
  answer: ssh web 'grep "sshd" /var/log/auth.log | tail -15'
  answer_detail: auth.log는 인증 관련 이벤트를 기록합니다. Accepted(성공), Failed password(실패), Invalid user(존재하지 않는 사용자) 등의 패턴으로 SSH 공격 여부를 판단합니다.
  verify:
    type: output_contains
    expect: sshd
    field: stdout
  script: ssh web 'grep "sshd" /var/log/auth.log | tail -15'
  risk_level: low
- order: 8
  instruction: SIEM VM에서 레벨 10 이상의 고위험 알림을 검색하시오.
  hint: alerts.log에서 level 10 이상을 필터링하세요.
  category: analysis
  points: 12
  answer: ssh siem 'grep -E "level 1[0-5]" /var/ossec/logs/alerts/alerts.log | tail -10'
  answer_detail: 레벨 10 이상의 알림은 즉시 조사가 필요한 고위험 이벤트입니다. 레벨 12는 높은 중요도, 레벨 14-15는 공격 탐지를 의미합니다. SOC에서는 이 레벨의 알림을 우선 처리합니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
  script: ssh siem 'grep -E "level 1[0-5]" /var/ossec/logs/alerts/alerts.log | tail -10'
  risk_level: low
- order: 9
  instruction: SIEM VM에서 오늘 발생한 알림의 시간대별 분포를 확인하시오.
  hint: alerts.log에서 날짜/시간 필드를 추출하여 시간별로 집계하세요.
  category: analysis
  points: 12
  answer: ssh siem 'grep -oP "\d{4} \w+ \d+ \d{2}" /var/ossec/logs/alerts/alerts.log | awk "{print \$NF}" | sort | uniq -c | sort -k2 -n'
  answer_detail: 시간대별 알림 분포를 분석하면 특정 시간에 집중되는 이벤트 패턴을 발견할 수 있습니다. 비업무 시간대의 급증은 공격 징후일 수 있습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  script: ssh siem 'grep -oP "\d{4} \w+ \d+ \d{2}" /var/ossec/logs/alerts/alerts.log | awk "{print \$NF}" | sort | uniq -c | sort -k2 -n'
  risk_level: low
- order: 10
  instruction: SECU VM의 Suricata 로그에서 최근 탐지된 이벤트를 확인하시오.
  hint: Suricata의 eve.json 또는 fast.log 파일을 확인하세요.
  category: analysis
  points: 10
  answer: ssh secu 'tail -20 /var/log/suricata/fast.log 2>/dev/null || tail -20 /var/log/suricata/eve.json 2>/dev/null'
  answer_detail: Suricata의 fast.log는 간단한 알림을, eve.json은 상세한 JSON 형식의 이벤트를 기록합니다. IDS 이벤트와 SIEM 알림을 교차 분석하면 위협 탐지 정확도가 높아집니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  script: ssh secu 'tail -20 /var/log/suricata/fast.log 2>/dev/null || tail -20 /var/log/suricata/eve.json 2>/dev/null'
  risk_level: low
