lab_id: soc-ai-week02
title: SIEM 기초 - Wazuh 매니저 구조와 기본 운용 (AI 지원)
version: ai
course: soc-ai
week: 2
description: Wazuh SIEM의 핵심 구성 요소(매니저, 에이전트, 디코더, 룰셋)를 탐색하고, 알림 생성 파이프라인과 기본 운용 명령어를 학습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 90
objectives:
- Wazuh 매니저의 디렉토리 구조와 핵심 설정 파일을 이해한다
- Wazuh 알림(alerts)의 생성 흐름을 파악한다
- agent_control, manage_agents 등 기본 관리 명령을 사용할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh 매니저의 버전 정보를 확인하시오.
  hint: /var/ossec/bin/ 디렉토리의 바이너리를 활용하세요.
  category: setup
  points: 5
  answer: /var/ossec/bin/wazuh-control info
  answer_detail: wazuh-control info는 설치된 Wazuh의 버전, 타입(manager/agent), 경로 정보를 출력합니다. SIEM 운영 시 버전 관리는 패치 및 호환성 관리에 필수입니다.
  verify:
    type: output_contains
    expect: WAZUH_VERSION
    field: stdout
  target_vm: siem
  script: /var/ossec/bin/wazuh-control info
  risk_level: low
- order: 2
  instruction: Wazuh 매니저의 주요 디렉토리 구조를 확인하시오. /var/ossec/ 하위의 핵심 디렉토리 목록을 조회하시오.
  hint: ls 명령으로 /var/ossec/ 하위 디렉토리를 확인하세요.
  category: setup
  points: 5
  answer: ls /var/ossec/
  answer_detail: bin(실행파일), etc(설정), logs(로그), ruleset(탐지룰), queue(큐) 등이 Wazuh의 핵심 디렉토리입니다. 각 디렉토리의 역할을 이해해야 SIEM을 효과적으로 운용할 수 있습니다.
  verify:
    type: output_contains
    expect: ruleset
    field: stdout
  target_vm: siem
  script: ls /var/ossec/
  risk_level: low
- order: 3
  instruction: Wazuh 매니저에서 현재 활성화된 에이전트 수와 상세 정보를 확인하시오.
  hint: /var/ossec/bin/agent_control -l 명령을 사용하세요.
  category: setup
  points: 5
  answer: /var/ossec/bin/agent_control -l
  answer_detail: agent_control -l은 등록된 모든 에이전트를 ID, 이름, IP, 상태와 함께 출력합니다. SOC 운영에서 에이전트 상태 모니터링은 로그 수집 누락을 방지하는 핵심 업무입니다.
  verify:
    type: output_contains
    expect: Active
    field: stdout
  target_vm: siem
  script: /var/ossec/bin/agent_control -l
  risk_level: low
- order: 4
  instruction: Wazuh의 기본 룰셋 디렉토리에서 룰 파일 목록을 확인하시오.
  hint: /var/ossec/ruleset/rules/ 경로를 확인하세요.
  category: analysis
  points: 8
  answer: ls /var/ossec/ruleset/rules/ | head -20
  answer_detail: ruleset/rules/ 디렉토리에는 Wazuh 기본 탐지 룰 XML 파일들이 있습니다. 0010-rules_config.xml부터 시작하여 syslog, sshd, web 등 다양한 카테고리별 룰이 존재합니다.
  verify:
    type: output_contains
    expect: .xml
    field: stdout
  target_vm: siem
  script: ls /var/ossec/ruleset/rules/ | head -20
  risk_level: low
- order: 5
  instruction: Wazuh의 디코더(decoder) 파일 목록을 확인하시오. 디코더는 로그를 파싱하는 역할을 합니다.
  hint: /var/ossec/ruleset/decoders/ 경로를 확인하세요.
  category: analysis
  points: 8
  answer: ls /var/ossec/ruleset/decoders/ | head -20
  answer_detail: 디코더는 수신된 원시 로그를 구조화된 필드로 파싱합니다. 로그 -> 디코더(파싱) -> 룰(매칭) -> 알림(생성) 순서가 Wazuh의 이벤트 처리 파이프라인입니다.
  verify:
    type: output_contains
    expect: .xml
    field: stdout
  target_vm: siem
  script: ls /var/ossec/ruleset/decoders/ | head -20
  risk_level: low
- order: 6
  instruction: Wazuh 알림 로그 파일에서 최근 알림 10건을 확인하시오.
  hint: 알림 로그는 /var/ossec/logs/alerts/ 경로에 있습니다.
  category: analysis
  points: 8
  answer: tail -20 /var/ossec/logs/alerts/alerts.log
  answer_detail: alerts.log는 Wazuh가 생성한 모든 보안 알림을 기록합니다. 각 알림에는 룰 ID, 레벨, 설명, 소스 IP 등이 포함되어 있어 SOC 분석가가 이벤트를 판단하는 핵심 데이터입니다.
  verify:
    type: output_contains
    expect: 'Rule:'
    field: stdout
  target_vm: siem
  script: tail -20 /var/ossec/logs/alerts/alerts.log
  risk_level: low
- order: 7
  instruction: Wazuh 알림을 JSON 형식으로 확인하시오. JSON 알림이 더 상세한 필드 정보를 제공합니다.
  hint: /var/ossec/logs/alerts/alerts.json 파일을 확인하세요.
  category: analysis
  points: 10
  answer: tail -5 /var/ossec/logs/alerts/alerts.json
  answer_detail: alerts.json은 알림을 JSON 구조로 저장합니다. rule.id, rule.level, rule.description, agent.name, data 등의 필드가 포함되어 있어 프로그래밍적 분석이나 SIEM 대시보드 연동에 유리합니다.
  verify:
    type: output_contains
    expect: rule
    field: stdout
  target_vm: siem
  script: tail -5 /var/ossec/logs/alerts/alerts.json
  risk_level: low
- order: 8
  instruction: Wazuh 매니저의 ossec.conf에서 로그 분석(logall) 설정을 확인하시오.
  hint: /var/ossec/etc/ossec.conf에서 logall 관련 설정을 grep하세요.
  category: analysis
  points: 8
  answer: grep -i "logall" /var/ossec/etc/ossec.conf
  answer_detail: logall을 yes로 설정하면 룰에 매칭되지 않는 이벤트도 모두 기록합니다. SOC 구축 초기에는 모든 로그를 수집하여 베이스라인을 수립하는 것이 중요합니다.
  verify:
    type: output_contains
    expect: logall
    field: stdout
  target_vm: siem
  script: grep -i "logall" /var/ossec/etc/ossec.conf
  risk_level: low
- order: 9
  instruction: Wazuh에서 오늘 발생한 알림 중 레벨 7 이상의 알림 수를 세시오.
  hint: alerts.log에서 level 필드를 grep하여 필터링하세요.
  category: analysis
  points: 10
  answer: grep -c "level [7-9]\|level 1[0-5]" /var/ossec/logs/alerts/alerts.log
  answer_detail: Wazuh 알림 레벨은 0-15까지이며, 레벨 7 이상은 주의가 필요한 이벤트입니다. SOC에서는 레벨별로 대응 우선순위를 분류합니다. 레벨 10 이상이면 즉시 대응이 필요합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: grep -c "level [7-9]\|level 1[0-5]" /var/ossec/logs/alerts/alerts.log
  risk_level: low
- order: 10
  instruction: Wazuh 매니저의 내부 상태(stats)를 확인하여 분석 엔진이 처리한 이벤트 통계를 조회하시오.
  hint: /var/ossec/bin/wazuh-control 명령으로 상태를 확인하세요.
  category: analysis
  points: 10
  answer: /var/ossec/bin/wazuh-analysisd -t 2>&1; cat /var/ossec/var/run/wazuh-analysisd.state 2>/dev/null || echo "stats available via API"
  answer_detail: analysisd.state 파일은 분석 엔진의 실시간 통계(초당 이벤트 수, 총 처리 이벤트, 알림 생성 수 등)를 보여줍니다. SOC 운영에서 SIEM의 처리 성능을 모니터링하는 데 사용됩니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: /var/ossec/bin/wazuh-analysisd -t 2>&1; cat /var/ossec/var/run/wazuh-analysisd.state 2>/dev/null || echo "stats available via API"
  risk_level: low
