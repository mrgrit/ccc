lab_id: soc-ai-week13
title: 보고서 작성 - SOC 운영 보고서와 인시던트 보고서 작성 (AI 지원)
version: ai
course: soc-ai
week: 13
description: SOC 운영 데이터를 수집하여 일일/주간 운영 보고서와 인시던트 보고서를 작성하는 데 필요한 데이터 추출 및 정리 기법을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 150
objectives:
- SOC 운영 지표(KPI)를 산출하기 위한 데이터를 추출한다
- 인시던트 타임라인과 영향 분석 데이터를 수집한다
- 보고서에 포함할 통계와 시각화 데이터를 생성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 오늘 발생한 총 알림 수, 고유 룰 수, 고유 소스 IP 수를 산출하시오.
  hint: alerts.log에서 wc, sort -u, uniq 명령을 활용하세요.
  category: reporting
  points: 8
  answer: '🤖 프롬프트: SIEM VM에서 오늘 발생한 총 알림 수, 고유 룰 수, 고유 소스 IP 수를 산출해줘

    📎 참고 (CLI): echo "총 알림 수: $(grep -c "Rule:" /var/ossec/logs/alerts/alerts.log)"; echo "고유 룰 수: $(grep -oP "Rule: \d+"
    /var/ossec/logs/alerts/alerts.log | sort -u | wc -l)"; echo "고유 소스 IP: $(grep -oP "Src IP: \S+" /var/ossec/logs/alerts/alerts.log
    | sort -u | wc -l)"'
  answer_detail: 이 세 가지 수치는 SOC 일일 보고서의 필수 KPI입니다. 전일 대비 증가율을 함께 제시하면 보안 상태 변화 추이를 파악할 수 있습니다.
  verify:
    type: output_contains
    expect: 총 알림 수
    field: stdout
    semantic:
      intent: 'SOC 운영 w13 s1 — SIEM VM에서 오늘 발생한 총 알림 수, 고유 룰 수, 고유 소스 IP 수를 산출하시오. (cmd: echo "총 알림 수: $(grep -c "Rule:" /var/ossec/logs/alerts/alerts.log)";
        echo "고유 룰 )'
      success_criteria:
      - '명령 실행: echo "총 알림 수: $(grep -c "Rule:" /var/ossec/logs/alerts/alert'
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: 'echo "총 알림 수: $(grep -c "Rule:" /var/ossec/logs/alerts/alerts.log)"; echo "고유 룰 수: $(grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log
    | sort -u | wc -l)"; echo "고유 소스 IP: $(grep -oP "Src IP: \S+" /var/ossec/logs/alerts/alerts.log | sort -u | wc -l)"'
  risk_level: low
  bastion_prompt: SIEM VM에서 오늘 발생한 총 알림 수, 고유 룰 수, 고유 소스 IP 수를 산출해줘
- order: 2
  instruction: SIEM VM에서 심각도(레벨)별 알림 분포를 보고서용 형태로 정리하시오.
  hint: 레벨을 추출하여 Low(1-4), Medium(5-9), High(10-12), Critical(13-15)로 분류하세요.
  category: reporting
  points: 12
  answer: '🤖 프롬프트: SIEM VM에서 심각도(레벨)별 알림 분포를 보고서용 형태로 정리해줘

    📎 참고 (CLI): echo "=== 심각도별 알림 분포 ==="; L=$(grep -cP "level [1-4]" /var/ossec/logs/alerts/alerts.log); M=$(grep -cP "level
    [5-9]" /var/ossec/logs/alerts/alerts.log); H=$(grep -cP "level 1[0-2]" /var/ossec/logs/alerts/alerts.log); C=$(grep -cP
    "level 1[3-5]" /var/ossec/logs/alerts/alerts.log); echo "Low(1-4): $L"; echo "Medium(5-9): $M"; echo "High(10-12): $H";
    echo "Critical(13-15): $C"'
  answer_detail: 심각도별 분포는 SOC 보고서의 핵심 차트입니다. Critical과 High 비율이 높으면 긴급 대응이 필요하고, Low가 대부분이면 튜닝으로 노이즈를 줄여야 합니다.
  verify:
