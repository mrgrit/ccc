      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: 'echo "=== 심각도별 알림 분포 ==="; L=$(grep -cP "level [1-4]" /var/ossec/logs/alerts/alerts.log); M=$(grep -cP "level [5-9]"
