    field: stdout
    semantic:
      intent: 'SOC 운영 w14 s2 — 포트 스캔 후 SIEM VM에서 해당 공격이 탐지되었는지 Wazuh 알림을 확인하시오. (cmd: grep -B 2 -A 5 "10.20.30.201" /var/ossec/logs/alerts/alerts.log
        | tail -30)'
      success_criteria:
      - '명령 실행: grep -B 2 -A 5 "10.20.30.201" /var/ossec/logs/alerts/alerts.'
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: grep -B 2 -A 5 "10.20.30.201" /var/ossec/logs/alerts/alerts.log | tail -30
  risk_level: low
  bastion_prompt: 포트 스캔 후 SIEM VM에서 해당 공격이 탐지되었는지 Wazuh 알림을 확인해줘
