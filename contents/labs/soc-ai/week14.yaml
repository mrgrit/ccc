lab_id: soc-ai-week14
title: 레드팀 연동 - 공격 시뮬레이션과 탐지 검증 (AI 지원)
version: ai
course: soc-ai
week: 14
description: ATTACKER VM에서 실제 공격 도구(nmap, hydra, sqlmap)를 사용하여 공격을 시뮬레이션하고, SOC 입장에서 각 공격 단계가 SIEM에 어떻게 탐지되는지 검증합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 180
objectives:
- 공격 도구(nmap, hydra, sqlmap)의 기본 사용법을 이해한다
- 공격 시뮬레이션 결과가 SIEM 알림으로 생성되는 과정을 검증한다
- 탐지 누락(gap)을 식별하고 룰 개선 방안을 도출한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: ATTACKER VM에서 WEB VM({{WEB_IP}})에 대한 포트 스캔을 실행하고, 개방된 포트를 확인하시오.
  hint: nmap으로 전체 포트 스캔을 수행하세요.
  category: detection
  points: 10
  answer: '🤖 프롬프트: ATTACKER VM에서 WEB VM(10.20.30.80)에 대한 포트 스캔을 실행하고, 개방된 포트를 확인해줘

    📎 참고 (CLI): nmap -sT -p 1-10000 --open 10.20.30.80 2>/dev/null | head -30'
  answer_detail: nmap -sT는 TCP Connect 스캔으로, 가장 기본적인 포트 스캔 방식입니다. SOC에서는 이 스캔이 Wazuh 알림이나 Suricata 이벤트로 탐지되는지 확인해야 합니다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 'SOC 운영 w14 s1 — ATTACKER VM에서 WEB VM({{WEB_IP}})에 대한 포트 스캔을 실행하고, 개방된 포트를 확인하시오. (cmd: nmap -sT -p 1-10000
        --open 10.20.30.80 2>/dev/null | head -30)'
      success_criteria:
      - '명령 실행: nmap -sT -p 1-10000 --open 10.20.30.80 2>/dev/null | head -3'
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: nmap -sT -p 1-10000 --open 10.20.30.80 2>/dev/null | head -30
  risk_level: low
  bastion_prompt: ATTACKER VM에서 WEB VM(10.20.30.80)에 대한 포트 스캔을 실행하고, 개방된 포트를 확인해줘
- order: 2
  instruction: 포트 스캔 후 SIEM VM에서 해당 공격이 탐지되었는지 Wazuh 알림을 확인하시오.
  hint: alerts.log에서 ATTACKER IP({{ATTACKER_IP}})의 최근 알림을 검색하세요.
  category: detection
  points: 10
  answer: '🤖 프롬프트: 포트 스캔 후 SIEM VM에서 해당 공격이 탐지되었는지 Wazuh 알림을 확인해줘

    📎 참고 (CLI): grep -B 2 -A 5 "10.20.30.201" /var/ossec/logs/alerts/alerts.log | tail -30'
  answer_detail: 포트 스캔은 정찰(Reconnaissance) 단계로, SOC에서 공격의 시작을 알리는 지표입니다. Wazuh가 다수의 연결 시도를 브루트포스나 스캔으로 탐지했는지 확인합니다.
