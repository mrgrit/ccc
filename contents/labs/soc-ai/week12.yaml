lab_id: soc-ai-week12
title: 자동화 대응 - Wazuh Active Response와 스크립트 기반 자동화 (AI 지원)
version: ai
course: soc-ai
week: 12
description: Wazuh Active Response 설정을 분석하고, 쉘 스크립트를 활용한 자동화 대응 파이프라인을 구축합니다. 알림 수집, IP 차단, 알림 전파의 자동화를 실습합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 150
objectives:
- Wazuh Active Response의 설정과 동작 메커니즘을 이해한다
- 쉘 스크립트로 로그 분석과 자동 대응을 구현한다
- 자동화 대응의 효과를 검증하고 오탐 방지 방안을 수립한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh Active Response에 등록된 명령(command)과 대응 설정을 전체 확인하시오.
  hint: ossec.conf에서 command와 active-response 섹션을 모두 추출하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: SIEM VM에서 Wazuh Active Response에 등록된 명령(command)과 대응 설정을 전체 확인해줘

    📎 참고 (CLI): grep -A 5 "<command>" /var/ossec/etc/ossec.conf && echo "===" && grep -A 8 "<active-response>" /var/ossec/etc/ossec.conf'
  answer_detail: command 섹션은 실행할 스크립트와 파라미터를 정의하고, active-response 섹션은 어떤 룰(rules_id)이 트리거되면 어떤 command를 실행할지 매핑합니다.
  verify:
    type: output_contains
    expect: command
    field: stdout
    semantic:
      intent: 'SOC 운영 w12 s1 — SIEM VM에서 Wazuh Active Response에 등록된 명령(command)과 대응 설정을 전체 확인하시오. (cmd: grep -A 5 "<command>"
        /var/ossec/etc/ossec.conf && echo "===" && grep -A 8 "<act)'
      success_criteria:
      - '명령 실행: grep -A 5 "<command>" /var/ossec/etc/ossec.conf && echo "==='
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: grep -A 5 "<command>" /var/ossec/etc/ossec.conf && echo "===" && grep -A 8 "<active-response>" /var/ossec/etc/ossec.conf
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh Active Response에 등록된 명령(command)과 대응 설정을 전체 확인해줘
