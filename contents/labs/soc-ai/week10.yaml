  category: detection
  points: 10
  answer: '🤖 프롬프트: WEB VM에서 setuid/setgid 비트가 설정된 파일 목록을 확인해줘

    📎 참고 (CLI): find / -perm -4000 -type f -ls 2>/dev/null | head -20'
  answer_detail: setuid 파일은 실행 시 파일 소유자 권한으로 동작합니다. 알려진 시스템 파일(passwd, su, sudo 등) 외에 비정상적인 setuid 파일이 있으면 권한 상승 백도어일 수 있습니다.
