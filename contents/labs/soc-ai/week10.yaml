  risk_level: low
  bastion_prompt: WEB VM에서 실행 가능한 파일 중 최근 수정된 것을 검색하시오. /usr/local/bin과 /opt 디렉토리를 확인해줘
- order: 3
  instruction: WEB VM에서 Apache 웹서버 바이너리의 무결성을 확인하시오. dpkg로 패키지 파일의 변조 여부를 검증하시오.
  hint: dpkg --verify 명령으로 패키지 파일의 무결성을 검증하세요.
  category: detection
  points: 12
  answer: '🤖 프롬프트: WEB VM에서 Apache 웹서버 바이너리의 무결성을 확인하시오. dpkg로 패키지 파일의 변조 여부를 검증해줘

    📎 참고 (CLI): dpkg --verify apache2 2>/dev/null || rpm -V httpd 2>/dev/null; echo "hash: $(md5sum /usr/sbin/apache2 2>/dev/null)"'
  answer_detail: dpkg --verify는 설치된 패키지 파일의 해시를 원본과 비교합니다. 출력이 없으면 변조가 없는 것이고, '5'가 표시되면 MD5 해시가 변경된 것입니다.
  verify:
    type: output_contains
    expect:
    - hash
    - dpkg
    field: stdout
    semantic:
      intent: 'SOC 운영 w10 s3 — WEB VM에서 Apache 웹서버 바이너리의 무결성을 확인하시오. dpkg로 패키지 파일의 변조 여부를 검증하시오. (cmd: dpkg --verify apache2
