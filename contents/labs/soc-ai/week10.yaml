  bastion_prompt: WEB VM에서 setuid/setgid 비트가 설정된 파일 목록을 확인해줘
- order: 5
  instruction: WEB VM에서 /etc/passwd 파일을 분석하여 UID 0(root 권한)을 가진 계정이 root 외에 있는지 확인하시오.
  hint: awk로 UID 필드(3번째)가 0인 라인을 검색하세요.
  category: detection
  points: 10
  answer: '🤖 프롬프트: WEB VM에서 /etc/passwd 파일을 분석하여 UID 0(root 권한)을 가진 계정이 root 외에 있는지 확인해줘

    📎 참고 (CLI): awk -F: "\$3==0" /etc/passwd'
  answer_detail: UID 0 계정은 root와 동일한 권한을 가집니다. root 외에 UID 0 계정이 있으면 공격자가 생성한 백도어 계정입니다. 이는 심각한 침해 지표(IoC)입니다.
