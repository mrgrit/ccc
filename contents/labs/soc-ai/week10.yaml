lab_id: soc-ai-week10
title: 악성코드 분석 - 의심 파일 정적 분석과 행위 기반 탐지 (AI 지원)
version: ai
course: soc-ai
week: 10
description: 의심스러운 파일의 정적 분석(해시, 문자열, 파일 타입)과 시스템 행위 기반 탐지(프로세스, 네트워크, 파일 변경)를 통한 악성코드 분석 기초를 학습합니다. AI SubAgent가 자동으로 명령을
  실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 150
objectives:
- 파일의 해시값과 메타데이터를 활용한 정적 분석을 수행한다
- 프로세스와 네트워크 활동을 모니터링하여 악성 행위를 식별한다
- Wazuh의 rootkit 탐지와 파일 무결성 검사를 활용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB VM에서 /tmp과 /var/tmp 디렉토리에 최근 생성된 의심스러운 파일이 있는지 확인하시오.
  hint: find 명령으로 최근 7일 내 생성된 파일을 검색하세요.
  category: analysis
  points: 8
  answer: '🤖 프롬프트: WEB VM에서 /tmp과 /var/tmp 디렉토리에 최근 생성된 의심스러운 파일이 있는지 확인해줘

    📎 참고 (CLI): find /tmp /var/tmp -type f -mtime -7 -ls 2>/dev/null'
  answer_detail: /tmp과 /var/tmp은 악성코드가 자주 사용하는 디렉토리입니다. 실행 권한이 있는 파일, 이상한 이름의 파일, 숨김 파일(.으로 시작)이 있으면 의심해야 합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'SOC 운영 w10 s1 — WEB VM에서 /tmp과 /var/tmp 디렉토리에 최근 생성된 의심스러운 파일이 있는지 확인하시오. (cmd: find /tmp /var/tmp -type f
        -mtime -7 -ls 2>/dev/null)'
      success_criteria:
      - '명령 실행: find /tmp /var/tmp -type f -mtime -7 -ls 2>/dev/null'
      - 결과 출력 또는 로그 확인
      - SOC 운영 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 운영 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 운영와 무관한 기법
  target_vm: siem
  script: find /tmp /var/tmp -type f -mtime -7 -ls 2>/dev/null
  risk_level: low
  bastion_prompt: WEB VM에서 /tmp과 /var/tmp 디렉토리에 최근 생성된 의심스러운 파일이 있는지 확인해줘
- order: 2
  instruction: WEB VM에서 실행 가능한 파일 중 최근 수정된 것을 검색하시오. /usr/local/bin과 /opt 디렉토리를 확인하시오.
  hint: find 명령으로 실행 권한이 있는 파일을 검색하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: WEB VM에서 실행 가능한 파일 중 최근 수정된 것을 검색하시오. /usr/local/bin과 /opt 디렉토리를 확인해줘

    📎 참고 (CLI): find /usr/local/bin /opt -type f -executable -mtime -30 -ls 2>/dev/null | head -15'
  answer_detail: 공격자는 정상 경로에 악성 바이너리를 배치하여 은닉합니다. 최근 수정된 실행 파일은 변조 여부를 확인해야 합니다. file 명령으로 파일 유형, md5sum으로 해시를 비교합니다.
