lab_id: soc-ai-week07
title: 인시던트 분류 - 알림 우선순위 판단과 분류 체계 (AI 지원)
version: ai
course: soc-ai
week: 7
description: Wazuh 알림을 심각도, 유형, 자산 중요도 기준으로 분류하고, 실제 위협(True Positive)과 오탐(False Positive)을
  구분하는 인시던트 분류(Triage) 기법을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Wazuh 알림 레벨 체계를 이해하고 심각도별로 분류한다
- 알림의 True/False Positive 여부를 판단하는 기준을 수립한다
- 인시던트 분류 기준에 따라 대응 우선순위를 결정한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 알림 레벨별 발생 건수를 집계하여 현재 보안 상태 개요를 파악하시오.
  hint: alerts.log에서 level 필드를 추출하여 정렬/집계하세요.
  category: analysis
  points: 8
  answer: grep -oP "\(level \d+\)" /var/ossec/logs/alerts/alerts.log | sort | uniq
    -c | sort -rn
  answer_detail: 레벨 분포를 통해 현재 SOC 환경의 전체 보안 상태를 한눈에 파악합니다. 레벨 12 이상이 다수 존재하면 심각한 보안
    문제가 있을 수 있습니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
  target_vm: siem
  script: grep -oP "\(level \d+\)" /var/ossec/logs/alerts/alerts.log | sort | uniq
    -c | sort -rn
  risk_level: low
  bastion_prompt: SIEM VM에서 알림 레벨별 발생 건수를 집계하여 현재 보안 상태 개요를 파악해줘
- order: 2
  instruction: SIEM VM에서 룰 그룹(카테고리)별 알림 발생 빈도를 분석하시오.
  hint: alerts.json에서 rule.groups 필드를 추출하세요.
  category: analysis
  points: 10
  answer: 'grep -oP '
  answer_detail: Wazuh 룰 그룹에는 authentication_failed, sshd, web-log, syslog 등이 있습니다.
    그룹별 빈도를 파악하면 어떤 유형의 이벤트가 가장 많은지, 튜닝이 필요한 카테고리가 어디인지 판단할 수 있습니다.
  verify:
    type: output_contains
    expect: groups
    field: stdout
  target_vm: siem
  script: 'grep -oP '
  risk_level: low
  bastion_prompt: SIEM VM에서 룰 그룹(카테고리)별 알림 발생 빈도를 분석해줘
- order: 3
  instruction: SIEM VM에서 에이전트별(자산별) 알림 발생 건수를 집계하시오.
  hint: alerts.log에서 에이전트 이름 또는 Location 필드를 추출하세요.
  category: analysis
  points: 10
  answer: 'grep -oP "Location: \S+" /var/ossec/logs/alerts/alerts.log | sort | uniq
    -c | sort -rn | head -10'
  answer_detail: 자산별 알림 빈도를 파악하면 가장 많은 보안 이벤트가 발생하는 시스템을 식별할 수 있습니다. WEB VM에서 많은 알림이
    발생한다면 웹 서비스에 대한 공격이 집중되고 있다는 의미입니다.
  verify:
    type: output_contains
    expect: Location
    field: stdout
  target_vm: siem
  script: 'grep -oP "Location: \S+" /var/ossec/logs/alerts/alerts.log | sort | uniq
    -c | sort -rn | head -10'
  risk_level: low
  bastion_prompt: SIEM VM에서 에이전트별(자산별) 알림 발생 건수를 집계해줘
- order: 4
  instruction: SIEM VM에서 반복적으로 발생하는 낮은 레벨(1-4) 알림의 룰 ID를 확인하시오. 이들은 오탐 튜닝 대상 후보입니다.
  hint: alerts.log에서 레벨 1-4를 필터링하고 룰 ID를 집계하세요.
  category: analysis
  points: 10
  answer: 'grep -E "\(level [1-4]\)" /var/ossec/logs/alerts/alerts.log | grep -oP
    "Rule: \d+" | sort | uniq -c | sort -rn | head -10'
  answer_detail: 반복적인 낮은 레벨 알림은 SOC 분석가의 피로(alert fatigue)를 유발합니다. 이들을 식별하여 튜닝하면 실제
    위협에 집중할 수 있습니다.
  verify:
    type: output_contains
    expect: 'Rule:'
    field: stdout
  target_vm: siem
  script: 'grep -E "\(level [1-4]\)" /var/ossec/logs/alerts/alerts.log | grep -oP
    "Rule: \d+" | sort | uniq -c | sort -rn | head -10'
  risk_level: low
  bastion_prompt: SIEM VM에서 반복적으로 발생하는 낮은 레벨(1-4) 알림의 룰 ID를 확인해줘
- order: 5
  instruction: SIEM VM에서 특정 룰 ID의 상세 설명을 조회하시오. 가장 많이 발생하는 룰의 정의를 확인하시오.
  hint: grep으로 /var/ossec/ruleset/rules/ 전체에서 해당 룰 ID를 검색하세요.
  category: analysis
  points: 10
  answer: grep -rn "id=\"5501\"" /var/ossec/ruleset/rules/ && echo "---" && grep -rn
    "id=\"5503\"" /var/ossec/ruleset/rules/
  answer_detail: 룰의 description, level, group을 확인하면 해당 이벤트가 어떤 상황을 의미하는지 정확히 이해할 수
    있습니다. 이 이해를 바탕으로 True/False Positive를 판단합니다.
  verify:
    type: output_contains
    expect: id=
    field: stdout
  target_vm: siem
  script: grep -rn "id=\"5501\"" /var/ossec/ruleset/rules/ && echo "---" && grep -rn
    "id=\"5503\"" /var/ossec/ruleset/rules/
  risk_level: low
  bastion_prompt: SIEM VM에서 특정 룰 ID의 상세 설명을 조회해줘
- order: 6
  instruction: SIEM VM에서 레벨 10 이상의 고위험 알림을 최근 것부터 표시하고, 각 알림의 룰 ID와 설명을 추출하시오.
  hint: alerts.log에서 고위험 알림을 필터링하세요.
  category: analysis
  points: 12
  answer: grep -B 1 -A 5 "level 1[0-5]" /var/ossec/logs/alerts/alerts.log | tail -40
  answer_detail: 레벨 10 이상의 알림은 SOC에서 즉시 분류(triage)해야 합니다. 룰 설명과 소스 IP, 대상 자산을 함께 확인하여
    대응 우선순위를 결정합니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
  target_vm: siem
  script: grep -B 1 -A 5 "level 1[0-5]" /var/ossec/logs/alerts/alerts.log | tail -40
  risk_level: low
  bastion_prompt: SIEM VM에서 레벨 10 이상의 고위험 알림을 최근 것부터 표시하고, 각 알림의 룰 ID와 설명을 추출해줘
- order: 7
  instruction: WEB VM에서 최근 실패한 SSH 로그인 시도의 소스 IP와 사용자 이름을 추출하시오.
  hint: auth.log에서 Failed password 패턴을 검색하세요.
  category: analysis
  points: 10
  answer: grep "Failed password" /var/log/auth.log | awk "{print \$(NF-3), \$(NF-5)}"
    | sort | uniq -c | sort -rn | head -10
  answer_detail: 실패한 로그인의 소스 IP와 사용자 이름 조합을 분석하면 브루트포스 공격인지, 단순 오입력인지 판단할 수 있습니다.
    존재하지 않는 사용자(root, admin 등)에 대한 시도는 공격 가능성이 높습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: grep "Failed password" /var/log/auth.log | awk "{print \$(NF-3), \$(NF-5)}"
    | sort | uniq -c | sort -rn | head -10
  risk_level: low
  bastion_prompt: WEB VM에서 최근 실패한 SSH 로그인 시도의 소스 IP와 사용자 이름을 추출해줘
- order: 8
  instruction: SIEM VM에서 동일 룰이 5분 내 10회 이상 발생한 경우(노이즈 후보)를 식별하시오.
  hint: alerts.log의 타임스탬프와 룰 ID를 함께 추출하여 시간 윈도우 내 빈도를 분석하세요.
  category: analysis
  points: 12
  answer: awk "/^\*\*/ {ts=\$0} /Rule:/ {print ts, \$0}" /var/ossec/logs/alerts/alerts.log
    | tail -50
  answer_detail: 동일 룰이 짧은 시간 내 반복 발생하면 노이즈(오탐)이거나 진행 중인 공격입니다. 시간 패턴을 분석하여 버스트 형태면
    공격, 일정 간격이면 정상 활동으로 판단합니다.
  verify:
    type: output_contains
    expect: Rule
    field: stdout
  target_vm: siem
  script: awk "/^\*\*/ {ts=\$0} /Rule:/ {print ts, \$0}" /var/ossec/logs/alerts/alerts.log
    | tail -50
  risk_level: low
  bastion_prompt: SIEM VM에서 동일 룰이 5분 내 10회 이상 발생한 경우(노이즈 후보)를 식별해줘
- order: 9
  instruction: SIEM VM에서 Wazuh의 알림 통계 요약(오늘 기준)을 확인하시오.
  hint: /var/ossec/stats/ 디렉토리 또는 alerts.log의 오늘 날짜 기준으로 집계하세요.
  category: reporting
  points: 10
  answer: 'echo "=== 총 알림 수 ===" && wc -l /var/ossec/logs/alerts/alerts.log && echo
    "=== 고위험(level 10+) ===" && grep -c "level 1[0-5]" /var/ossec/logs/alerts/alerts.log
    && echo "=== 고유 룰 수 ===" && grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log
    | sort -u | wc -l'
  answer_detail: 인시던트 분류의 결과로 총 알림 수, 고위험 비율, 활성 룰 수 등의 통계를 산출합니다. 이 데이터는 SOC 운영 보고서와
    성과 지표(KPI)의 기초가 됩니다.
  verify:
    type: output_contains
    expect: 알림
    field: stdout
  target_vm: siem
  script: 'echo "=== 총 알림 수 ===" && wc -l /var/ossec/logs/alerts/alerts.log && echo
    "=== 고위험(level 10+) ===" && grep -c "level 1[0-5]" /var/ossec/logs/alerts/alerts.log
    && echo "=== 고유 룰 수 ===" && grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log
    | sort -u | wc -l'
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh의 알림 통계 요약(오늘 기준)을 확인해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  bastion_prompt: '다음 작업들을 순서대로 수행해줘:

    1) SIEM VM에서 알림 레벨별 발생 건수를 집계하여 현재 보안 상태 개요를 파악해줘

    2) SIEM VM에서 룰 그룹(카테고리)별 알림 발생 빈도를 분석해줘

    3) SIEM VM에서 에이전트별(자산별) 알림 발생 건수를 집계해줘

    4) SIEM VM에서 반복적으로 발생하는 낮은 레벨(1-4) 알림의 룰 ID를 확인해줘

    5) SIEM VM에서 특정 룰 ID의 상세 설명을 조회해줘'
  hint: 복합 작업은 Bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  risk_level: low
  answer: ''
  answer_detail: Bastion이 5개 작업을 순차적으로 계획(planning)하고 실행(executing)한 뒤 종합 분석(validating)하는
    다단계 작업.
  script: ''
