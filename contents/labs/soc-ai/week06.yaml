lab_id: soc-ai-week06
title: 위협 탐지 룰 - Wazuh 커스텀 룰 작성과 Suricata 시그니처 (AI 지원)
version: ai
course: soc-ai
week: 6
description: Wazuh 커스텀 탐지 룰과 Suricata 시그니처를 작성하여 특정 위협 패턴을 탐지하는 방법을 학습합니다. 룰 작성, 테스트,
  배포의 전체 과정을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Wazuh 커스텀 룰의 XML 구조를 이해하고 작성할 수 있다
- Suricata 시그니처 문법을 이해하고 기본 룰을 작성한다
- 작성한 룰의 동작을 테스트하고 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh 커스텀 룰 파일의 위치와 현재 내용을 확인하시오.
  hint: /var/ossec/etc/rules/ 디렉토리에서 local_rules.xml 파일을 찾으세요.
  category: setup
  points: 5
  answer: cat /var/ossec/etc/rules/local_rules.xml
  answer_detail: local_rules.xml은 사용자 정의 탐지 룰을 작성하는 파일입니다. /var/ossec/ruleset/rules/의
    기본 룰과 달리 업데이트 시 덮어쓰이지 않아 커스텀 룰은 반드시 이곳에 작성해야 합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: siem
  script: cat /var/ossec/etc/rules/local_rules.xml
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh 커스텀 룰 파일의 위치와 현재 내용을 확인해줘
- order: 2
  instruction: Wazuh 기본 룰셋에서 웹 공격 탐지 룰(web rules)의 구조를 분석하시오.
  hint: /var/ossec/ruleset/rules/ 에서 web 관련 XML 파일을 찾으세요.
  category: analysis
  points: 8
  answer: ls /var/ossec/ruleset/rules/ | grep -i web
  answer_detail: 0250-apache_rules.xml, 0260-nginx_rules.xml 등의 웹 관련 룰 파일이 존재합니다.
    이 파일들의 구조를 참고하여 커스텀 룰을 작성합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: siem
  script: ls /var/ossec/ruleset/rules/ | grep -i web
  risk_level: low
  bastion_prompt: Wazuh 기본 룰셋에서 웹 공격 탐지 룰(web rules)의 구조를 분석해줘
- order: 3
  instruction: Wazuh Apache 룰 파일에서 SQL Injection 탐지 룰의 패턴을 확인하시오.
  hint: apache 룰 파일에서 sql 또는 injection 키워드를 검색하세요.
  category: analysis
  points: 10
  answer: grep -i -A 5 "sql\|injection" /var/ossec/ruleset/rules/0250-apache_rules.xml
    | head -30
  answer_detail: Wazuh의 웹 공격 탐지 룰은 match 또는 regex 태그로 로그 패턴을 매칭합니다. SQL Injection은
    SELECT, UNION, OR 1=1 등의 패턴을 탐지합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: siem
  script: grep -i -A 5 "sql\|injection" /var/ossec/ruleset/rules/0250-apache_rules.xml
    | head -30
  risk_level: low
  bastion_prompt: Wazuh Apache 룰 파일에서 SQL Injection 탐지 룰의 패턴을 확인해줘
- order: 4
  instruction: Wazuh 로그 테스트 도구(wazuh-logtest)를 사용하여 샘플 로그가 어떤 룰에 매칭되는지 테스트하시오.
  hint: /var/ossec/bin/wazuh-logtest를 사용하세요. echo로 파이프하면 자동 테스트 가능합니다.
  category: detection
  points: 12
  answer: 'echo "Apr  6 10:00:00 web sshd[1234]: Failed password for invalid user
    admin from 10.20.30.201 port 22 ssh2" | /var/ossec/bin/wazuh-logtest 2>&1 | head
    -30'
  answer_detail: wazuh-logtest는 로그 라인을 입력하면 디코더 매칭, 룰 매칭 결과를 보여줍니다. 커스텀 룰 작성 전후로 반드시
    이 도구로 테스트하여 의도한 대로 동작하는지 확인해야 합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: siem
  script: 'echo "Apr  6 10:00:00 web sshd[1234]: Failed password for invalid user
    admin from 10.20.30.201 port 22 ssh2" | /var/ossec/bin/wazuh-logtest 2>&1 | head
    -30'
  risk_level: low
  bastion_prompt: Wazuh 로그 테스트 도구(wazuh-logtest)를 사용하여 샘플 로그가 어떤 룰에 매칭되는지 테스트해줘
- order: 5
  instruction: SECU VM에서 현재 Suricata에 로드된 룰 파일 목록을 확인하시오.
  hint: Suricata 설정 파일(suricata.yaml)에서 rule-files 섹션을 확인하세요.
  category: setup
  points: 8
  answer: grep -A 20 "rule-files" /etc/suricata/suricata.yaml | head -25
  answer_detail: suricata.yaml의 rule-files 섹션에 로드할 룰 파일이 지정됩니다. 기본 룰과 커스텀 룰 파일이 모두
    여기에 등록되어야 Suricata가 해당 시그니처를 사용합니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: siem
  script: grep -A 20 "rule-files" /etc/suricata/suricata.yaml | head -25
  risk_level: low
  bastion_prompt: SECU VM에서 현재 Suricata에 로드된 룰 파일 목록을 확인해줘
- order: 6
  instruction: SECU VM에서 Suricata 룰 파일 중 하나를 열어 시그니처 문법 구조를 확인하시오.
  hint: /etc/suricata/rules/ 또는 /var/lib/suricata/rules/ 디렉토리를 확인하세요.
  category: analysis
  points: 10
  answer: ls /etc/suricata/rules/ /var/lib/suricata/rules/ 2>/dev/null | head -10
    && head -10 /etc/suricata/rules/local.rules 2>/dev/null || head -10 /var/lib/suricata/rules/suricata.rules
    2>/dev/null
  answer_detail: Suricata 룰은 'action protocol src_ip src_port -> dst_ip dst_port (options)'
    형식입니다. alert, msg, content, sid, rev 등이 핵심 키워드입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: ls /etc/suricata/rules/ /var/lib/suricata/rules/ 2>/dev/null | head -10
    && head -10 /etc/suricata/rules/local.rules 2>/dev/null || head -10 /var/lib/suricata/rules/suricata.rules
    2>/dev/null
  risk_level: low
  bastion_prompt: SECU VM에서 Suricata 룰 파일 중 하나를 열어 시그니처 문법 구조를 확인해줘
- order: 7
  instruction: SECU VM에서 Suricata가 현재 로드한 룰 수와 시그니처 통계를 확인하시오.
  hint: Suricata 로그에서 rules loaded 메시지를 검색하세요.
  category: analysis
  points: 8
  answer: grep -i "rules loaded\|signatures" /var/log/suricata/suricata.log | tail
    -5
  answer_detail: Suricata 시작 시 로드된 룰 수가 로그에 기록됩니다. 룰 수가 0이면 시그니처 파일 경로 설정에 문제가 있는
    것입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: grep -i "rules loaded\|signatures" /var/log/suricata/suricata.log | tail
    -5
  risk_level: low
  bastion_prompt: SECU VM에서 Suricata가 현재 로드한 룰 수와 시그니처 통계를 확인해줘
- order: 8
  instruction: WEB VM에서 ModSecurity의 설정 상태와 활성화된 룰셋을 확인하시오.
  hint: Apache의 modsecurity 관련 설정 파일을 확인하세요.
  category: analysis
  points: 10
  answer: cat /etc/modsecurity/modsecurity.conf 2>/dev/null | grep -i "SecRuleEngine\|SecAuditLog"
    || ls /etc/apache2/mods-enabled/ | grep security
  answer_detail: ModSecurity는 웹 애플리케이션 방화벽(WAF)입니다. SecRuleEngine이 On이면 차단 모드, DetectionOnly이면
    탐지만 합니다. SOC에서는 WAF 로그도 중요한 이벤트 소스입니다.
  verify:
    type: output_contains
    expect: null
    field: stdout
  target_vm: siem
  script: cat /etc/modsecurity/modsecurity.conf 2>/dev/null | grep -i "SecRuleEngine\|SecAuditLog"
    || ls /etc/apache2/mods-enabled/ | grep security
  risk_level: low
  bastion_prompt: WEB VM에서 ModSecurity의 설정 상태와 활성화된 룰셋을 확인해줘
- order: 9
  instruction: Wazuh의 룰 설정 검증 명령을 실행하여 현재 룰셋에 문법 오류가 없는지 확인하시오.
  hint: /var/ossec/bin/wazuh-analysisd -t 명령으로 룰 검증이 가능합니다.
  category: detection
  points: 10
  answer: /var/ossec/bin/wazuh-analysisd -t 2>&1
  answer_detail: wazuh-analysisd -t는 모든 디코더와 룰 파일의 문법을 검증합니다. 커스텀 룰 추가 후 반드시 이 명령으로
    오류가 없는지 확인한 뒤 서비스를 재시작해야 합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: /var/ossec/bin/wazuh-analysisd -t 2>&1
  risk_level: low
  bastion_prompt: Wazuh의 룰 설정 검증 명령을 실행하여 현재 룰셋에 문법 오류가 없는지 확인해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  bastion_prompt: '다음 작업들을 순서대로 수행해줘:

    1) SIEM VM에서 Wazuh 커스텀 룰 파일의 위치와 현재 내용을 확인해줘

    2) Wazuh 기본 룰셋에서 웹 공격 탐지 룰(web rules)의 구조를 분석해줘

    3) Wazuh Apache 룰 파일에서 SQL Injection 탐지 룰의 패턴을 확인해줘

    4) Wazuh 로그 테스트 도구(wazuh-logtest)를 사용하여 샘플 로그가 어떤 룰에 매칭되는지 테스트해줘

    5) SECU VM에서 현재 Suricata에 로드된 룰 파일 목록을 확인해줘'
  hint: 복합 작업은 Bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  risk_level: low
  answer: ''
  answer_detail: Bastion이 5개 작업을 순차적으로 계획(planning)하고 실행(executing)한 뒤 종합 분석(validating)하는
    다단계 작업.
  script: ''
