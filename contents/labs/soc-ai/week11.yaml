    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  risk_level: low
  answer: '🤖 프롬프트: 다음 작업들을 순서대로 수행해줘:

    1) SIEM VM에서 Wazuh의 CDB(Constant DataBase) 리스트 디렉토리를 확인해줘

    2) SIEM VM에서 Wazuh 룰셋에 포함된 기본 CDB 리스트의 내용을 확인해줘

    3) SIEM VM의 Wazuh 알림 로그에서 ATTACKER IP(10.20.30.201)의 모든 활동 이력을 추출해줘

    4) SIEM VM에서 Wazuh 룰셋 중 CDB 리스트를 참조하는 룰의 예시를 찾으시오해줘

    5) WEB VM의 Apache 접근 로그에서 알려진 공격 패턴(SQL Injection, XSS, 디렉토리 트래버설) 시도를 검색해줘'
  answer_detail: Bastion이 5개 작업을 순차적으로 계획(planning)하고 실행(executing)한 뒤 종합 분석(validating)하는 다단계 작업.
  script: ''
