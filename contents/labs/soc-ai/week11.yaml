lab_id: soc-ai-week11
title: 위협 인텔리전스 - IoC 기반 탐지와 로그 매칭 (AI 지원)
version: ai
course: soc-ai
week: 11
description: '침해 지표(IoC: IP, 해시, 도메인)를 수집하고, Wazuh CDB 리스트와 로그 분석에 활용하여 알려진 위협을 탐지하는 위협 인텔리전스 기법을 학습합니다.
  AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.'
difficulty: medium
duration_minutes: 150
objectives:
- IoC(침해 지표)의 유형과 수집 방법을 이해한다
- Wazuh CDB 리스트를 활용한 IoC 매칭 기법을 실습한다
- 로그에서 IoC를 검색하여 과거 침해 여부를 조사한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh의 CDB(Constant DataBase) 리스트 디렉토리를 확인하시오. 어떤 리스트가 존재하는지 파악하시오.
  hint: /var/ossec/etc/lists/ 디렉토리를 확인하세요.
  category: setup
  points: 8
  answer: '🤖 프롬프트: SIEM VM에서 Wazuh의 CDB(Constant DataBase) 리스트 디렉토리를 확인해줘

    📎 참고 (CLI): ls -la /var/ossec/etc/lists/'
  answer_detail: CDB 리스트는 Wazuh에서 IP, 도메인, 해시 등의 IoC를 key:value 형태로 저장하는 데이터베이스입니다. 룰에서 list 옵션으로 참조하여
    실시간 매칭에 사용합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: CDB 리스트 디렉토리 — ls -la /var/ossec/etc/lists/ 로 CDB(Constant DataBase) 파일들 확인. audit-keys·amazon·malicious-ioc
        등 IP/domain/hash 리스트. 위협 인텔 기반 탐지의 데이터 소스
      success_criteria:
      - ls /var/ossec/etc/lists/
      - CDB 파일 목록
      acceptable_methods:
      - ls -la
      negative_signs:
      - CDB 개념 없음
  target_vm: siem
  script: ls -la /var/ossec/etc/lists/
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh의 CDB(Constant DataBase) 리스트 디렉토리를 확인해줘
- order: 2
  instruction: SIEM VM에서 Wazuh 룰셋에 포함된 기본 CDB 리스트의 내용을 확인하시오.
  hint: /var/ossec/etc/lists/ 하위 파일의 내용을 확인하세요.
  category: analysis
  points: 8
  answer: '🤖 프롬프트: SIEM VM에서 Wazuh 룰셋에 포함된 기본 CDB 리스트의 내용을 확인해줘

    📎 참고 (CLI): for f in /var/ossec/etc/lists/*; do echo "=== $f ==="; head -5 "$f" 2>/dev/null; done'
  answer_detail: CDB 리스트는 'key:value' 형식입니다. 예를 들어 IP 블랙리스트는 '10.20.30.201:attacker' 형태로 저장됩니다. 이 리스트에
    매칭되는 이벤트가 발생하면 알림이 트리거됩니다.
  verify:
    type: output_contains
    expect: ===
    field: stdout
    semantic:
      intent: CDB 리스트 내용 샘플 — for f in lists/*; do head -5 $f; done 으로 각 리스트의 처음 5 항목. IoC 형식 (key:value)
        학습. 위협 인텔 consumption
      success_criteria:
      - for 루프 + head 5
      - 각 CDB 샘플
      acceptable_methods:
      - for + head
      negative_signs:
      - 단일 파일만
  target_vm: siem
  script: for f in /var/ossec/etc/lists/*; do echo "=== $f ==="; head -5 "$f" 2>/dev/null; done
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh 룰셋에 포함된 기본 CDB 리스트의 내용을 확인해줘
- order: 3
  instruction: SIEM VM의 Wazuh 알림 로그에서 ATTACKER IP({{ATTACKER_IP}})의 모든 활동 이력을 추출하시오.
  hint: alerts.log와 archives에서 ATTACKER IP를 검색하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: SIEM VM의 Wazuh 알림 로그에서 ATTACKER IP(10.20.30.201)의 모든 활동 이력을 추출해줘

    📎 참고 (CLI): grep -c "10.20.30.201" /var/ossec/logs/alerts/alerts.log && echo "events from attacker"
    && grep "10.20.30.201" /var/ossec/logs/alerts/alerts.log | grep -oP "Rule: \d+" | sort | uniq -c |
    sort -rn'
  answer_detail: 특정 IP의 과거 활동을 추적하는 것이 위협 인텔리전스의 핵심입니다. 해당 IP가 트리거한 룰 유형과 빈도를 분석하면 공격 패턴과 의도를 파악할 수 있습니다.
  verify:
    type: output_contains
    expect: events
    field: stdout
    semantic:
      intent: ATTACKER IP 활동 카운트 — grep -c 10.20.30.201 alerts.log. 단순 수치 + events from attacker 메시지.
        특정 IOC 발생 빈도 baseline
      success_criteria:
      - grep -c 로 수치
      - 메시지 포함
      acceptable_methods:
      - grep -c + echo
      negative_signs:
      - 카운트 없음
  target_vm: siem
  script: 'grep -c "10.20.30.201" /var/ossec/logs/alerts/alerts.log && echo "events from attacker" &&
    grep "10.20.30.201" /var/ossec/logs/alerts/alerts.log | grep -oP "Rule: \d+" | sort | uniq -c | sort
    -rn'
  risk_level: low
  bastion_prompt: SIEM VM의 Wazuh 알림 로그에서 ATTACKER IP(10.20.30.201)의 모든 활동 이력을 추출해줘
- order: 4
  instruction: SIEM VM에서 Wazuh 룰셋 중 CDB 리스트를 참조하는 룰의 예시를 찾으시오.
  hint: 룰 파일에서 list 키워드를 검색하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: SIEM VM에서 Wazuh 룰셋 중 CDB 리스트를 참조하는 룰의 예시를 찾으시오해줘

    📎 참고 (CLI): grep -rn "<list" /var/ossec/ruleset/rules/*.xml | head -10'
  answer_detail: Wazuh 룰에서 <list field="srcip" lookup="address_match">etc/lists/blacklist</list> 형태로 CDB를
    참조합니다. 이렇게 하면 알려진 악성 IP에서의 이벤트를 자동 탐지합니다.
  verify:
    type: output_contains
    expect: list
    field: stdout
    semantic:
      intent: CDB 참조 룰 — grep -rn <list /var/ossec/ruleset/rules/*.xml | head -10 으로 <list>path/to/cdb</list>
        태그 포함 룰. CDB 와 rule 연결 점검. Lookup-based detection pattern
      success_criteria:
      - grep -rn <list
      - 룰 예시
      acceptable_methods:
      - grep -rn + head
      negative_signs:
      - <list 개념 없음
  target_vm: siem
  script: grep -rn "<list" /var/ossec/ruleset/rules/*.xml | head -10
  risk_level: low
  bastion_prompt: SIEM VM에서 Wazuh 룰셋 중 CDB 리스트를 참조하는 룰의 예시를 찾으시오해줘
- order: 5
  instruction: WEB VM의 Apache 접근 로그에서 알려진 공격 패턴(SQL Injection, XSS, 디렉토리 트래버설) 시도를 검색하시오.
  hint: access.log에서 select, union, script, ../ 등의 패턴을 검색하세요.
  category: detection
  points: 12
  answer: '🤖 프롬프트: WEB VM의 Apache 접근 로그에서 알려진 공격 패턴(SQL Injection, XSS, 디렉토리 트래버설) 시도를 검색해줘

    📎 참고 (CLI): grep -iE "(select|union|script|alert\(|\.\./)" /var/log/apache2/access.log | tail -10'
  answer_detail: 웹 로그에서 공격 시그니처를 직접 검색하는 것은 IoC 기반 탐지의 기본입니다. SQL Injection(select, union), XSS(script,
    alert), Path Traversal(../) 패턴이 대표적입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Apache 공격 패턴 — grep -iE (select|union|script|alert\(|\.\./) access.log 로 SQL Injection·XSS·directory
        traversal 시도 종합 필터. 웹 공격 IoC pattern
      success_criteria:
      - 정규식 그룹 5+
      - 웹 공격 패턴 종합
      acceptable_methods:
      - grep -iE + tail
      negative_signs:
      - 단일 패턴
  target_vm: siem
  script: grep -iE "(select|union|script|alert\(|\.\./)" /var/log/apache2/access.log | tail -10
  risk_level: low
  bastion_prompt: WEB VM의 Apache 접근 로그에서 알려진 공격 패턴(SQL Injection, XSS, 디렉토리 트래버설) 시도를 검색해줘
- order: 6
  instruction: WEB VM의 Apache 에러 로그에서 ModSecurity가 탐지/차단한 요청을 확인하시오.
  hint: /var/log/apache2/error.log 또는 modsec_audit.log에서 ModSecurity를 검색하세요.
  category: detection
  points: 12
  answer: '🤖 프롬프트: WEB VM의 Apache 에러 로그에서 ModSecurity가 탐지/차단한 요청을 확인해줘

    📎 참고 (CLI): grep -i "modsecurity\|ModSecurity" /var/log/apache2/error.log /var/log/apache2/modsec_audit.log
    2>/dev/null | tail -10'
  answer_detail: ModSecurity WAF가 차단한 요청에는 공격 유형(SQL Injection, XSS 등), 소스 IP, 요청 URL이 포함됩니다. 이 정보를 IoC로
    활용하여 동일 공격자의 다른 시도를 추적합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: ModSec 차단 로그 — grep -i ModSecurity error.log + modsec_audit.log 로 WAF 차단/탐지 이벤트. rule id
        + 요청 페이로드 정보. WAF 효과 검증
      success_criteria:
      - ModSec 로그 조회
      - 차단 이벤트
      acceptable_methods:
      - grep + tail
      negative_signs:
      - WAF 개념 없음
  target_vm: siem
  script: grep -i "modsecurity\|ModSecurity" /var/log/apache2/error.log /var/log/apache2/modsec_audit.log
    2>/dev/null | tail -10
  risk_level: low
  bastion_prompt: WEB VM의 Apache 에러 로그에서 ModSecurity가 탐지/차단한 요청을 확인해줘
- order: 7
  instruction: SECU VM에서 Suricata가 탐지한 이벤트의 시그니처 ID(SID)별 발생 횟수를 집계하시오.
  hint: eve.json 또는 fast.log에서 SID를 추출하여 집계하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: SECU VM에서 Suricata가 탐지한 이벤트의 시그니처 ID(SID)별 발생 횟수를 집계해줘

    📎 참고 (CLI): grep -oP "\[\d+:\d+:\d+\]" /var/log/suricata/fast.log 2>/dev/null | sort | uniq -c | sort
    -rn | head -10 || echo "check eve.json"'
  answer_detail: Suricata SID별 빈도를 분석하면 가장 활발한 위협 유형을 파악할 수 있습니다. 특정 SID의 급증은 진행 중인 공격을 나타냅니다. SID를 기반으로
    위협 인텔리전스 DB를 조회합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Suricata SID 집계 — grep -oP \[\d+:\d+:\d+\] fast.log | sort | uniq -c | sort -rn. 시그니처 ID
        별 발생 횟수 Top. 자주 트리거되는 룰 tuning 후보 식별
      success_criteria:
      - '[gid:sid:rev] 추출'
      - SID 빈도 집계
      acceptable_methods:
      - grep -oP + uniq -c
      negative_signs:
      - SID 형식 모름
  target_vm: siem
  script: grep -oP "\[\d+:\d+:\d+\]" /var/log/suricata/fast.log 2>/dev/null | sort | uniq -c | sort -rn
    | head -10 || echo "check eve.json"
  risk_level: low
  bastion_prompt: SECU VM에서 Suricata가 탐지한 이벤트의 시그니처 ID(SID)별 발생 횟수를 집계해줘
- order: 8
  instruction: SIEM VM에서 ossec.conf의 룰셋 설정을 확인하여 CDB 리스트가 올바르게 참조되고 있는지 검증하시오.
  hint: ossec.conf에서 list 또는 ruleset 섹션을 확인하세요.
  category: setup
  points: 10
  answer: '🤖 프롬프트: SIEM VM에서 ossec.conf의 룰셋 설정을 확인하여 CDB 리스트가 올바르게 참조되고 있는지 검증해줘

    📎 참고 (CLI): grep -A 20 "<ruleset>" /var/ossec/etc/ossec.conf | head -25'
  answer_detail: ossec.conf의 ruleset 섹션에서 list와 decoder, rule_dir 경로가 올바르게 설정되어야 CDB 리스트와 탐지 룰이 정상 동작합니다.
  verify:
    type: output_contains
    expect: ruleset
    field: stdout
    semantic:
      intent: ruleset 설정 검증 — grep -A 20 <ruleset> ossec.conf | head -25 로 <include>, <list>, <rule_dir>
        등 룰셋 포함 경로 확인. CDB 참조 올바른지 검증
      success_criteria:
      - <ruleset> 태그 내부
      - include/list 경로
      acceptable_methods:
      - grep + xmllint
      negative_signs:
      - ruleset 태그 미확인
  target_vm: siem
  script: grep -A 20 "<ruleset>" /var/ossec/etc/ossec.conf | head -25
  risk_level: low
  bastion_prompt: SIEM VM에서 ossec.conf의 룰셋 설정을 확인하여 CDB 리스트가 올바르게 참조되고 있는지 검증해줘
- order: 9
  instruction: SIEM VM의 Wazuh 알림에서 파일 무결성 변경(syscheck) 이벤트를 추출하고, 변경된 파일 경로를 목록화하시오.
  hint: alerts.json에서 syscheck 룰 그룹을 검색하세요.
  category: detection
  points: 12
  answer: '🤖 프롬프트: SIEM VM의 Wazuh 알림에서 파일 무결성 변경(syscheck) 이벤트를 추출하고, 변경된 파일 경로를 목록화해줘

    📎 참고 (CLI): grep "syscheck" /var/ossec/logs/alerts/alerts.json | grep -oP "\"path\":\"[^\"]+\"" |
    sort -u | head -15'
  answer_detail: 파일 해시 변경은 강력한 IoC입니다. syscheck가 탐지한 변경 파일의 경로, 이전/이후 해시, 변경 시간을 분석하여 악성코드 설치나 설정 변조를
    식별합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: syscheck 변경 파일 목록 — grep syscheck alerts.json | grep -oP "path":"[^"]+. FIM 이벤트의 변경 파일 경로만
        추출. 공격으로 변조된 파일 list
      success_criteria:
      - syscheck JSON 필터
      - path 필드 추출
      acceptable_methods:
      - grep + jq .syscheck.path
      negative_signs:
      - path 추출 없음
  target_vm: siem
  script: grep "syscheck" /var/ossec/logs/alerts/alerts.json | grep -oP "\"path\":\"[^\"]+\"" | sort -u
    | head -15
  risk_level: low
  bastion_prompt: SIEM VM의 Wazuh 알림에서 파일 무결성 변경(syscheck) 이벤트를 추출하고, 변경된 파일 경로를 목록화해줘
