lab_id: "soc-ai-week11"
title: "[AI] 위협인텔리전스"
version: "ai"
course: "soc-ai"
week: 11
description: "위협 인텔리전스 수집과 활용을 학습합니다"
difficulty: "hard"
duration_minutes: 120
objectives:
  - "위협인텔리전스의 핵심 개념을 이해한다"
  - "위협인텔리전스 관련 실무 기술을 습득한다"
  - "위협인텔리전스 보안 대책을 수립하고 적용한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "위협인텔리전스의 기본 개념과 구성 요소를 조사하세요"
    hint: "위협인텔리전스 관련 핵심 용어와 구조를 확인하세요"
    category: "recon"
    points: 10
    answer: "위협인텔리전스의 주요 구성요소와 핵심 개념을 정리"
    answer_detail: "위협인텔리전스는 보안관제 분야의 핵심 주제로, 기본 개념을 정확히 이해하는 것이 실무 적용의 기초입니다."
    script: "ai_soc_designer --blueprint standard --components firewall,ids,siem --layout recommend"
    verify:
      type: "output_contains"
      expect: "위협인텔리전스의 주요 구성요소와 핵심 개념을 정리"
  - order: 2
    instruction: "위협인텔리전스 관련 현재 환경을 분석하세요"
    hint: "시스템 상태와 설정을 확인하세요"
    category: "analysis"
    points: 10
    answer: "현재 환경의 위협인텔리전스 적용 현황 분석 완료"
    answer_detail: "위협인텔리전스 적용을 위해서는 먼저 현재 환경의 상태를 정확히 파악해야 합니다. 기존 설정과 구성을 분석하여 개선점을 식별합니다."
    script: "ai_siem_setup --platform wazuh --configure basic --target 10.20.30.100"
    verify:
      type: "output_contains"
      expect: "현재 환경의 위협인텔리전스 적용 현황 분석 완료"
  - order: 3
    instruction: "위협인텔리전스 관련 보안 정책을 수립하세요"
    hint: "정책 문서의 필수 항목을 확인하세요"
    category: "config"
    points: 10
    answer: "위협인텔리전스 보안 정책: 목적, 범위, 역할, 절차, 위반조치 포함"
    answer_detail: "보안 정책은 위협인텔리전스에 대한 조직의 방향과 기준을 제시하는 최상위 문서입니다. 명확한 목적, 범위, 역할과 책임을 포함해야 합니다."
    script: "ai_log_collector --sources syslog,apache,auth --normalize cef --target 10.20.30.0/24"
    verify:
      type: "output_contains"
      expect: "위협인텔리전스 보안 정책: 목적, 범위, 역할, 절차,"
  - order: 4
    instruction: "위협인텔리전스의 위험 요소를 식별하고 평가하세요"
    hint: "위험 식별 기법을 활용하세요"
    category: "analysis"
    points: 10
    answer: "위험 평가: 위협 식별, 취약점 분석, 영향도 평가, 위험도 산정"
    answer_detail: "위협인텔리전스 관련 위험을 체계적으로 식별하고 평가하는 것은 효과적인 보안 대책 수립의 기반입니다."
    script: "ai_event_analyzer --source siem --timerange 24h --classify severity"
    verify:
      type: "output_contains"
      expect: "위험 평가: 위협 식별, 취약점 분석, 영향도 평가, "
  - order: 5
    instruction: "위협인텔리전스 보호 대책을 구현하세요"
    hint: "기술적 통제와 관리적 통제를 모두 적용하세요"
    category: "defense"
    points: 10
    answer: "기술적 통제: 접근제어, 암호화, 모니터링 / 관리적 통제: 정책, 교육, 감사"
    answer_detail: "위협인텔리전스에 대한 보호 대책은 기술적 통제와 관리적 통제를 균형 있게 적용하여 다층 방어를 구현해야 합니다."
    script: "ai_correlation_engine --rules cross-source --detect lateral-movement --threshold 3"
    verify:
      type: "output_contains"
      expect: "기술적 통제: 접근제어, 암호화, 모니터링 / 관리적 "
  - order: 6
    instruction: "10.20.30.0/24 네트워크에서 위협인텔리전스 관련 설정을 점검하세요"
    hint: "대상 서버의 설정 파일을 확인하세요"
    category: "audit"
    points: 10
    answer: "네트워크 스캔 및 설정 점검으로 위협인텔리전스 적용 상태 확인"
    answer_detail: "실제 네트워크 환경에서 위협인텔리전스 관련 설정이 올바르게 적용되어 있는지 점검합니다. 10.20.30.0/24 대역의 모든 호스트를 대상으로 합니다."
    script: "ai_rule_generator --type detection --technique mitre-attack --auto-tune"
    verify:
      type: "output_contains"
      expect: "네트워크 스캔 및 설정 점검으로 위협인텔리전스 적용 상"
  - order: 7
    instruction: "위협인텔리전스 모니터링 체계를 구성하세요"
    hint: "모니터링 도구와 알림 설정을 확인하세요"
    category: "monitor"
    points: 10
    answer: "모니터링: 실시간 감시, 임계값 알림, 대시보드, 로그 분석"
    answer_detail: "위협인텔리전스의 지속적인 모니터링은 보안 위협을 조기에 탐지하고 대응하기 위해 필수적입니다."
    script: "ai_incident_classifier --input events --taxonomy nist --priority auto"
    verify:
      type: "output_contains"
      expect: "모니터링: 실시간 감시, 임계값 알림, 대시보드, 로그"
  - order: 8
    instruction: "위협인텔리전스 관련 로그를 수집하고 분석하세요"
    hint: "로그 소스와 분석 도구를 활용하세요"
    category: "analysis"
    points: 10
    answer: "로그 수집: syslog, 애플리케이션 로그, 감사 로그 통합 분석"
    answer_detail: "로그 분석은 위협인텔리전스 관련 보안 이벤트를 추적하고 이상 징후를 탐지하는 핵심 활동입니다."
    script: "ai_playbook_executor --incident malware --steps contain,eradicate,recover"
    verify:
      type: "output_contains"
      expect: "로그 수집: syslog, 애플리케이션 로그, 감사 로"
  - order: 9
    instruction: "위협인텔리전스에 대한 방어 체계를 강화하세요"
    hint: "다층 방어 전략을 적용하세요"
    category: "defense"
    points: 10
    answer: "다층 방어: 네트워크, 호스트, 애플리케이션, 데이터 계층별 보안 강화"
    answer_detail: "위협인텔리전스에 대한 단일 방어선은 충분하지 않습니다. 네트워크부터 데이터까지 모든 계층에서 방어 체계를 구축해야 합니다."
    script: "ai_forensic_collector --target 10.20.30.80 --evidence memory,disk,network --chain-of-custody"
    verify:
      type: "output_contains"
      expect: "다층 방어: 네트워크, 호스트, 애플리케이션, 데이터 "
  - order: 10
    instruction: "위협인텔리전스 인시던트 대응 절차를 수립하세요"
    hint: "대응 단계별 역할과 절차를 정의하세요"
    category: "response"
    points: 10
    answer: "인시던트 대응: 탐지→분석→억제→제거→복구→교훈 6단계"
    answer_detail: "위협인텔리전스 관련 보안 인시던트 발생 시 신속하고 체계적으로 대응하기 위한 절차를 사전에 수립해야 합니다."
    script: "ai_malware_analyzer --sample /tmp/suspicious --sandbox isolated --report ioc"
    verify:
      type: "output_contains"
      expect: "인시던트 대응: 탐지→분석→억제→제거→복구→교훈 6단계"
  - order: 11
    instruction: "위협인텔리전스의 접근 권한을 관리하세요"
    hint: "최소 권한 원칙을 적용하세요"
    category: "config"
    points: 10
    answer: "접근 관리: RBAC 기반, 최소 권한, 주기적 검토, 권한 변경 로깅"
    answer_detail: "접근 권한 관리는 위협인텔리전스의 보안을 확보하기 위한 기본적인 통제입니다. 최소 권한 원칙에 따라 필요한 최소한의 권한만 부여해야 합니다."
    script: "ai_threat_intel --feeds otx,misp --correlate local-events --enrich ioc"
    verify:
      type: "output_contains"
      expect: "접근 관리: RBAC 기반, 최소 권한, 주기적 검토,"
  - order: 12
    instruction: "위협인텔리전스 관련 감사를 수행하세요"
    hint: "감사 계획, 수행, 보고 절차를 따르세요"
    category: "audit"
    points: 10
    answer: "감사: 계획수립→증거수집→분석→발견사항→개선권고 프로세스"
    answer_detail: "정기적인 감사를 통해 위협인텔리전스 관련 통제의 효과성을 평가하고, 미흡한 사항을 식별하여 개선해야 합니다."
    script: "ai_soar_executor --playbook auto-response --trigger high-severity --action block,notify"
    verify:
      type: "output_contains"
      expect: "감사: 계획수립→증거수집→분석→발견사항→개선권고 프로세"
  - order: 13
    instruction: "위협인텔리전스의 성능과 효과를 측정하세요"
    hint: "핵심 성과지표(KPI)를 설정하세요"
    category: "monitor"
    points: 10
    answer: "KPI: 탐지율, 대응시간, 오탐률, 준수율, 개선 완료율"
    answer_detail: "위협인텔리전스의 효과를 객관적으로 측정하기 위해 핵심 성과지표를 설정하고 정기적으로 측정해야 합니다."
    script: "ai_report_generator --type incident --format pdf --include timeline,impact,remediation"
    verify:
      type: "output_contains"
      expect: "KPI: 탐지율, 대응시간, 오탐률, 준수율, 개선 완"
  - order: 14
    instruction: "위협인텔리전스 개선 계획을 수립하세요"
    hint: "발견된 문제점과 개선 방안을 정리하세요"
    category: "analysis"
    points: 10
    answer: "개선 계획: 단기(1개월), 중기(3개월), 장기(1년) 로드맵 수립"
    answer_detail: "지속적인 개선은 위협인텔리전스 관리의 핵심입니다. 발견된 문제점에 대한 우선순위별 개선 계획을 수립해야 합니다."
    script: "ai_purple_team --red simulate-attack --blue detect-respond --evaluate gap"
    verify:
      type: "output_contains"
      expect: "개선 계획: 단기(1개월), 중기(3개월), 장기(1년"
  - order: 15
    instruction: "위협인텔리전스 종합 평가 보고서를 작성하세요"
    hint: "전체 실습 내용을 종합하세요"
    category: "audit"
    points: 10
    answer: "위협인텔리전스 종합 평가: 현황, 위험, 대책, 모니터링, 개선계획 총괄"
    answer_detail: "위협인텔리전스에 대한 전체 학습 내용을 종합하여 평가 보고서를 작성합니다. 현황 분석, 위험 평가, 대책 구현, 모니터링, 개선 계획을 모두 포함합니다."
    script: "ai_soc_evaluator --comprehensive --metrics mttd,mttr,coverage --report"
    verify:
      type: "output_contains"
      expect: "위협인텔리전스 종합 평가: 현황, 위험, 대책, 모니터"
