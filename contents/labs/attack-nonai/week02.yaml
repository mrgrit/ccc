lab_id: attack-nonai-week02
title: 포트스캐닝 기초 (Port Scanning)
version: non-ai
course: attack-nonai
week: 2
description: nmap의 다양한 스캔 기법(TCP Connect, SYN, UDP, 스텔스 스캔)을 학습하고, 서비스 버전 탐지 및 OS
  핑거프린팅을 수행한다. 스캔 결과를 분석하여 공격 표면을 도출한다.
difficulty: easy
duration_minutes: 120
objectives:
- nmap의 주요 스캔 유형(TCP Connect, SYN, UDP)의 원리를 이해한다
- 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 수행할 수 있다
- 스캔 결과를 XML/JSON으로 저장하고 분석할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap을 사용하여 {{WEB_IP}}의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행하라.
  hint: nmap의 기본 스캔은 TCP Connect 스캔이다
  category: recon
  points: 5
  answer: nmap -sT 10.20.30.80
  answer_detail: TCP Connect 스캔(-sT)은 OS의 connect() 시스템 콜을 사용하여 완전한 TCP 3-way handshake를
    수행한다. root 권한이 필요 없지만, 연결 로그가 남아 탐지되기 쉽다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
- order: 2
  instruction: sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 {{WEB_IP}}의 열린 포트를 확인하라.
  hint: SYN 스캔은 -sS 옵션이며 root 권한이 필요하다
  category: recon
  points: 10
  answer: sudo nmap -sS 10.20.30.80
  answer_detail: SYN 스캔(-sS)은 TCP handshake를 완료하지 않고 SYN-ACK 응답만 확인하는 스텔스 스캔이다. 연결이
    완성되지 않아 로그에 남지 않는 경우가 많으며, 가장 널리 사용되는 스캔 기법이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
- order: 3
  instruction: '{{WEB_IP}}에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행하라. 속도를 위해 T4 타이밍을 사용하라.'
  hint: -p- 옵션은 전체 포트 범위를 의미한다
  category: recon
  points: 10
  answer: sudo nmap -sS -p- -T4 10.20.30.80
  answer_detail: 전체 포트 스캔(-p-)은 기본 1000개 포트 외에 숨겨진 서비스를 발견할 수 있다. T4 타이밍은 공격적인 속도
    설정으로, 실습 환경에서 스캔 시간을 단축한다. 실전에서는 IDS/IPS 탐지를 피하기 위해 낮은 타이밍을 사용한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
- order: 4
  instruction: 서비스 버전 탐지(-sV)를 수행하여 {{WEB_IP}}에서 실행 중인 서비스의 이름과 버전을 식별하라.
  hint: -sV 옵션은 서비스 프로브를 전송하여 버전 정보를 수집한다
  category: recon
  points: 10
  answer: sudo nmap -sV 10.20.30.80
  answer_detail: 서비스 버전 탐지(-sV)는 열린 포트에 다양한 프로브를 전송하여 실행 중인 서비스의 정확한 이름과 버전을 식별한다.
    이 정보로 CVE 데이터베이스에서 알려진 취약점을 검색할 수 있다.
  verify:
    type: output_contains
    expect: VERSION
    field: stdout
  target_vm: attacker
- order: 5
  instruction: OS 핑거프린팅(-O)을 수행하여 {{WEB_IP}}의 운영체제를 추정하라.
  hint: -O 옵션은 root 권한이 필요하다
  category: recon
  points: 10
  answer: sudo nmap -O 10.20.30.80
  answer_detail: OS 핑거프린팅(-O)은 TCP/IP 스택의 특성(TTL, 윈도우 크기, 옵션 순서 등)을 분석하여 운영체제를 추정한다.
    정확한 OS 정보는 커널 익스플로잇 선택에 핵심적이다.
  verify:
    type: output_contains
    expect: OS
    field: stdout
  target_vm: attacker
- order: 6
  instruction: UDP 스캔을 수행하여 {{WEB_IP}}의 상위 20개 UDP 포트 상태를 확인하라.
  hint: -sU 옵션으로 UDP 스캔을 수행하고 --top-ports로 상위 포트를 지정한다
  category: recon
  points: 10
  answer: sudo nmap -sU --top-ports 20 10.20.30.80
  answer_detail: UDP 스캔(-sU)은 TCP와 달리 handshake가 없어 응답이 느리고 결과가 불확실할 수 있다. DNS(53),
    SNMP(161), DHCP(67/68) 등 중요한 서비스가 UDP를 사용하므로 반드시 확인해야 한다.
  verify:
    type: output_contains
    expect: PORT
    field: stdout
  target_vm: attacker
- order: 7
  instruction: nmap 스크립트 엔진(NSE)의 기본 스크립트를 사용하여 {{WEB_IP}}을 스캔하라.
  hint: -sC 옵션은 기본 NSE 스크립트를 실행한다
  category: recon
  points: 10
  answer: sudo nmap -sC -sV 10.20.30.80
  answer_detail: NSE(Nmap Scripting Engine)는 Lua 스크립트를 사용하여 취약점 탐지, 정보 수집, 브루트포스 등을
    자동화한다. -sC는 default 카테고리의 안전한 스크립트를 실행한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
- order: 8
  instruction: nmap의 http-enum 스크립트를 사용하여 {{WEB_IP}}:3000의 웹 디렉토리를 열거하라.
  hint: --script http-enum 옵션을 사용하고 포트를 지정한다
  category: recon
  points: 10
  answer: nmap --script http-enum -p 3000 10.20.30.80
  answer_detail: http-enum 스크립트는 알려진 웹 경로(관리자 페이지, 설정 파일, 백업 등)에 대한 요청을 보내 존재하는 디렉토리와
    파일을 열거한다. 디렉토리 브루트포싱의 빠른 대안이 된다.
  verify:
    type: output_contains
    expect: '3000'
    field: stdout
  target_vm: attacker
- order: 9
  instruction: 방화벽 서버({{SECU_IP}})에 대해 ACK 스캔을 수행하여 방화벽 규칙(필터링 여부)을 파악하라.
  hint: -sA 옵션은 ACK 스캔으로 방화벽 규칙을 매핑한다
  category: recon
  points: 10
  answer: sudo nmap -sA 10.20.30.1
  answer_detail: ACK 스캔(-sA)은 포트의 열림/닫힘을 판별하는 것이 아니라, 방화벽의 필터링 규칙을 매핑하는 데 사용된다. 응답이
    RST이면 unfiltered(방화벽 미적용), 응답이 없으면 filtered(방화벽 차단)이다.
  verify:
    type: output_contains
    expect: PORT
    field: stdout
  target_vm: attacker
- order: 10
  instruction: 10.20.30.0/24 네트워크 전체에 대해 빠른 스캔(-F)을 수행하여 활성 호스트와 열린 포트를 한 번에 확인하라.
  hint: -F 옵션은 상위 100개 포트만 스캔하여 속도를 높인다
  category: recon
  points: 10
  answer: sudo nmap -sS -F 10.20.30.0/24
  answer_detail: 네트워크 대역 전체 스캔은 모든 활성 호스트와 서비스를 한 번에 파악하는 기법이다. -F(Fast) 옵션은 상위 100개
    포트만 스캔하여 전체 네트워크에 대한 빠른 개요를 제공한다.
  verify:
    type: output_contains
    expect: Nmap scan report
    field: stdout
  target_vm: attacker
- order: 11
  instruction: nmap 스캔 결과를 XML 형식으로 /tmp/scan_result.xml에 저장하라. 대상은 {{WEB_IP}}이다.
  hint: -oX 옵션으로 XML 출력을 지정한다
  category: recon
  points: 10
  answer: sudo nmap -sV -oX /tmp/scan_result.xml 10.20.30.80 && head -20 /tmp/scan_result.xml
  answer_detail: 스캔 결과를 XML(-oX)로 저장하면 다른 도구(Metasploit, searchsploit 등)에서 파싱하여 자동화된
    취약점 분석에 활용할 수 있다. 체계적인 보고서 작성에도 필수적이다.
  verify:
    type: output_contains
    expect: xml
    field: stdout
  target_vm: attacker
- order: 12
  instruction: nmap의 vuln 카테고리 스크립트를 사용하여 {{WEB_IP}}:3000에 대한 간단한 취약점 스캔을 수행하라.
  hint: --script vuln 옵션으로 취약점 탐지 스크립트를 실행한다
  category: recon
  points: 10
  answer: nmap --script vuln -p 3000 10.20.30.80
  answer_detail: NSE의 vuln 카테고리 스크립트는 알려진 취약점(CVE)을 자동으로 검사한다. Heartbleed, ShellShock
    등 주요 취약점을 빠르게 탐지할 수 있지만, 전문 취약점 스캐너보다 커버리지가 제한적이다.
  verify:
    type: output_contains
    expect: '3000'
    field: stdout
  target_vm: attacker
- order: 13
  instruction: SIEM 서버({{SECU_IP}}00)의 포트 443(Wazuh)과 9400(OpenCTI)이 열려 있는지 특정 포트만
    지정하여 스캔하라.
  hint: -p 옵션으로 특정 포트를 콤마로 구분하여 지정한다
  category: recon
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://SIEM_IP:8080 접속 → 해당 메뉴 탐색

    📎 참고 (CLI): nmap -sT -p 443,9400 10.20.30.100'
  answer_detail: 특정 포트만 스캔하면 불필요한 트래픽을 줄이고 빠르게 결과를 얻을 수 있다. 알려진 서비스 포트를 지정하여 해당 서비스의
    가용성을 확인하는 것은 정찰의 효율적인 방법이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
- order: 14
  instruction: Idle 스캔(Zombie 스캔)의 원리를 이해하기 위해, 먼저 {{SECU_IP}}의 IP ID 값 변화를 확인하라.
    hping3를 사용하여 SYN 패킷을 3회 보내라.
  hint: hping3 -S -p 포트 -c 3 옵션을 사용한다
  category: recon
  points: 15
  answer: sudo hping3 -S -p 22 -c 3 10.20.30.1
  answer_detail: Idle 스캔은 제3의 호스트(Zombie)의 IP ID 값 변화를 이용하여 공격자의 IP를 숨기면서 포트 스캔을 수행하는
    기법이다. hping3로 IP ID의 순차적 증가를 확인하면 해당 호스트가 Zombie로 사용 가능한지 판단할 수 있다.
  verify:
    type: output_contains
    expect: hping
    field: stdout
  target_vm: attacker
- order: 15
  instruction: 모든 스캔 결과를 종합하여 /tmp/port_scan_report.txt에 정리하라. 각 호스트별 열린 포트, 서비스명,
    버전을 기록하라.
  hint: nmap -oN 옵션으로 일반 텍스트 출력을 저장할 수도 있다
  category: recon
  points: 10
  answer: sudo nmap -sV -p- -T4 -oN /tmp/port_scan_report.txt 10.20.30.1 10.20.30.80
    10.20.30.100 && head -50 /tmp/port_scan_report.txt
  answer_detail: 종합적인 포트 스캔 보고서는 모의해킹의 정찰 단계 산출물이다. 호스트별 열린 포트, 서비스, 버전 정보를 정리하면 취약점
    분석 및 익스플로잇 선택의 기반 자료가 된다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
