lab_id: attack-nonai-week02
title: 포트스캐닝 기초 (Port Scanning)
version: non-ai
course: attack-nonai
week: 2
description: nmap의 다양한 스캔 기법(TCP Connect, SYN, UDP, 스텔스 스캔)을 학습하고, 서비스 버전 탐지 및 OS 핑거프린팅을 수행한다. 스캔 결과를
  분석하여 공격 표면을 도출한다.
difficulty: easy
duration_minutes: 120
objectives:
- nmap의 주요 스캔 유형(TCP Connect, SYN, UDP)의 원리를 이해한다
- 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 수행할 수 있다
- 스캔 결과를 XML/JSON으로 저장하고 분석할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap을 사용하여 {{WEB_IP}}의 가장 일반적인 1000개 포트에 대해 TCP Connect 스캔을 수행하라.
  hint: |
    nmap의 기본 스캔은 TCP Connect 스캔이다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: nmap -sT 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - nmap -sT --top-ports 100 10.20.30.80 (빠른 첫 정찰)
       - sudo masscan 10.20.30.80 -p1-1000 --rate=1000 (100배 빠름)
       - rustscan -a 10.20.30.80 --top -- -sV (Rust binary chain)
       - naabu -host 10.20.30.80 -top-ports 1000 (ProjectDiscovery)
       - python3 -c "import socket; [print(p, 'open' if not socket.socket().connect_ex(('10.20.30.80', p)) else 'closed') for p in [22,80,443,3000]]" (의존성 zero)
       - for p in 22 80 443 3000; do ncat -zv -w 1 10.20.30.80 $p; done
    4) 검증: PORT/STATE/SERVICE 컬럼 + open 표시. -sT = 완전 3-way handshake → IDS 탐지 쉬움.
  category: recon
  points: 5
  answer: nmap -sT 10.20.30.80
  answer_detail: TCP Connect 스캔(-sT)은 OS의 connect() 시스템 콜을 사용하여 완전한 TCP 3-way handshake를 수행한다. root 권한이
    필요 없지만, 연결 로그가 남아 탐지되기 쉽다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: TCP Connect 스캔 — nmap -sT 10.20.30.80. 기본 스캔. 완전 3-way handshake. root 권한 불필요. 로그 남음.
      success_criteria:
      - open 키워드
      - nmap -sT
      - TCP Connect
      acceptable_methods:
      - "nmap -sT (수기 baseline): 명령 `nmap -sT 10.20.30.80`. 출력 `PORT    STATE SERVICE\\n22/tcp  open  ssh\\n80/tcp  open  http\\n3000/tcp open  ppp` → 완전 3-way handshake. root 권한 X. 연결 로그 남음 → IDS 탐지 쉬움."
      - "nmap -sT --top-ports: 명령 `nmap -sT --top-ports 100 10.20.30.80`. top 100 only. 빠른 첫 정찰."
      - "hping3 -S (TCP SYN scan): 명령 `sudo hping3 -S -p 22 -c 1 10.20.30.80`. SYN 스캔 single-shot. 결과 `flags=SA` = open, `RA` = closed."
      - "masscan (대량): 명령 `sudo masscan 10.20.30.80 -p1-1000 --rate=1000`. 100배 빠름. -sT 와 유사하지만 자체 stack."
      - "rustscan: 명령 `rustscan -a 10.20.30.80 --top -- -sV`. masscan + nmap chain. Rust binary."
      - "naabu: 명령 `naabu -host 10.20.30.80 -top-ports 1000`. ProjectDiscovery."
      - "Python socket scan: 명령 `python3 -c \"import socket; [print(p, 'open' if not socket.socket().connect_ex(('10.20.30.80', p)) else 'closed') for p in [22,80,443,3000]]\"`. 의존성 zero."
      - "ncat scan: 명령 `for p in 22 80 443 3000; do ncat -zv -w 1 10.20.30.80 $p; done`. nmap modern nc."
      - "Burp Discover ports: Pro Engagement Tools. manual."
      negative_signs:
      - -sT 또는 TCP 맥락 없음
      - 연결 방식 맥락 없음
  target_vm: attacker
- order: 2
  instruction: sudo 권한으로 SYN 스캔(Half-open 스캔)을 수행하여 {{WEB_IP}}의 열린 포트를 확인하라.
  hint: |
    SYN 스캔은 -sS 옵션이며 root 권한이 필요하다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -sS 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - sudo masscan 10.20.30.80 -p1-1000 --rate=1000 (자체 SYN stack, 100배 빠름)
       - sudo zmap -p 80 10.20.30.0/24 (인터넷 스케일)
       - sudo hping3 -S -p 22 -c 1 10.20.30.80 (single-shot SYN, flags=SA = open)
       - rustscan -a 10.20.30.80 --top (sudo 없는 환경 — Connect fallback)
       - python scapy: python3 -c "from scapy.all import *; r=sr1(IP(dst='10.20.30.80')/TCP(dport=22, flags='S'), timeout=2, verbose=0); print('open' if r and r[TCP].flags=='SA' else 'closed')"
    4) 검증: SYN-ACK 응답만 확인 → handshake 완료 X → 로그 회피 (IDS 일부 탐지 가능).
  category: recon
  points: 10
  answer: sudo nmap -sS 10.20.30.80
  answer_detail: SYN 스캔(-sS)은 TCP handshake를 완료하지 않고 SYN-ACK 응답만 확인하는 스텔스 스캔이다. 연결이 완성되지 않아 로그에 남지 않는
    경우가 많으며, 가장 널리 사용되는 스캔 기법이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: SYN Half-open 스캔 — sudo nmap -sS 10.20.30.80. SYN-ACK만 확인. 스텔스. 로그 회피. root 필요.
      success_criteria:
      - open 키워드
      - sudo nmap -sS
      - SYN 스캔
      acceptable_methods:
      - "sudo nmap -sS (수기 baseline): 명령 `sudo nmap -sS 10.20.30.80`. 출력 `PORT  STATE SERVICE\\n22/tcp open ssh\\n80/tcp open http\\n3000/tcp open ppp` → SYN-ACK 만 확인. handshake 미완료 → 로그 일부 회피."
      - "sudo masscan -sS: 명령 `sudo masscan 10.20.30.80 -p1-1000 --rate=1000`. 자체 SYN stack 사용. 100배 빠름. 광범위."
      - "sudo zmap: 명령 `sudo zmap -p 80 10.20.30.0/24 -B 10M`. 인터넷 스케일. /24 = 1초."
      - "sudo hping3 -S: 명령 `sudo hping3 -S -p 22 -c 1 10.20.30.80`. single-shot SYN. flags=SA = open, RA = closed."
      - "rustscan + nmap: 명령 `rustscan -a 10.20.30.80 --top -- -sS`. masscan + nmap chain."
      - "naabu -p- (SYN): 명령 `sudo naabu -host 10.20.30.80 -p - -scan-type s`. ProjectDiscovery."
      - "python scapy SYN: `python3 -c \"from scapy.all import *; r=sr1(IP(dst='10.20.30.80')/TCP(dport=22, flags='S'), timeout=2, verbose=0); print('open' if r and r[TCP].flags=='SA' else 'closed')\"`. 의존성 zero."
      - "Snort / Suricata 검출: 같은 SYN 스캔이라도 IDS rule (`alert tcp any any -> $HOME_NET any (flags:S; threshold:type both, count 5)`) 으로 탐지. 방어자 시각."
      - "FW 우회 가능 시나리오: 1port/sec rate-limit (-T1) + decoy IP (-D) + fragmentation (-f) 조합 → 탐지 회피."
      negative_signs:
      - -sS 없음
      - half-open 맥락 없음
  target_vm: attacker
- order: 3
  instruction: '{{WEB_IP}}에 대해 포트 1-65535 전체 범위의 SYN 스캔을 수행하라. 속도를 위해 T4 타이밍을 사용하라.'
  hint: |
    -p- 옵션은 전체 포트 범위를 의미한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -sS -p- -T4 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안 (속도 환경별):
       - sudo masscan 10.20.30.80 -p1-65535 --rate=10000 (10배 빠름, 1분 이내)
       - rustscan -a 10.20.30.80 -r 1-65535 -- -sS (Rust + nmap chain, 가장 빠름)
       - sudo naabu -host 10.20.30.80 -p - (ProjectDiscovery)
       - sudo nmap -sS -p- --min-rate 10000 (rate 직접 지정)
       - sudo nmap -sS -p- -T5 (가장 공격적, 패킷 손실 위험)
    4) 타이밍 가이드: -T0 paranoid → -T5 insane. 실전 IDS 환경: -T2 polite. 실습: -T4 aggressive.
    5) 검증: 1-65535 전체 → 숨겨진 service (8080 admin / 9090 monitor 등) 발견.
  category: recon
  points: 10
  answer: sudo nmap -sS -p- -T4 10.20.30.80
  answer_detail: 전체 포트 스캔(-p-)은 기본 1000개 포트 외에 숨겨진 서비스를 발견할 수 있다. T4 타이밍은 공격적인 속도 설정으로, 실습 환경에서 스캔 시간을
    단축한다. 실전에서는 IDS/IPS 탐지를 피하기 위해 낮은 타이밍을 사용한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 전체 포트 SYN 스캔 — sudo nmap -sS -p- -T4. 1-65535 전체 + 공격적 타이밍. 숨겨진 서비스 발견.
      success_criteria:
      - open 키워드
      - -p- 전체 포트
      - -T4 타이밍
      acceptable_methods:
      - "sudo nmap -sS -p- -T4 (수기 baseline): 명령 `sudo nmap -sS -p- -T4 10.20.30.80`. 출력 `Discovered open port 22/tcp...\\nNot shown: 65532 closed tcp ports\\nPORT  STATE SERVICE\\n22/tcp open ssh\\n80/tcp open http\\n3000/tcp open ppp\\n8080/tcp open http-proxy`. T4 = aggressive timing."
      - "sudo masscan -p1-65535: 명령 `sudo masscan 10.20.30.80 -p1-65535 --rate=10000 -oG /tmp/m.gnmap`. 1분 이내. 자체 SYN."
      - "rustscan -r 1-65535: 명령 `rustscan -a 10.20.30.80 -r 1-65535 -- -sS -sV`. Rust + nmap chain."
      - "sudo naabu -p -: 명령 `sudo naabu -host 10.20.30.80 -p -`. ProjectDiscovery."
      - "sudo nmap -sS -p- --min-rate 10000: rate 직접 지정. 5초 내 전체."
      - "zmap (단일 포트 인터넷): 명령 `sudo zmap -p 22 -B 10M 0.0.0.0/0`. 단일 포트만. 4시간 인터넷 스캔."
      - "scapy port scan: python3 + Random subset → 자동화."
      - "분할 전략: nmap -sS -p1-1000 + masscan -p1001-65535 동시 실행. 시간 단축."
      - "stealth 변형: -T0 + -f (fragment) + decoy IP (-D RND:10) → IDS 회피."
      negative_signs:
      - -p- 없음
      - 전체 포트 맥락 없음
  target_vm: attacker
- order: 4
  instruction: 서비스 버전 탐지(-sV)를 수행하여 {{WEB_IP}}에서 실행 중인 서비스의 이름과 버전을 식별하라.
  hint: |
    -sV 옵션은 서비스 프로브를 전송하여 버전 정보를 수집한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -sV 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - sudo nmap -sV --version-intensity 9 10.20.30.80 (9단계 probe, 가장 정밀)
       - sudo nmap -A 10.20.30.80 (-sV + -O + -sC + traceroute 종합)
       - whatweb -v http://10.20.30.80:3000 (web 만)
       - amap -B 10.20.30.80 22,80,3000 (banner only)
       - sudo nmap -sV --script=banner 10.20.30.80 (NSE 추가)
       - rustscan -a 10.20.30.80 --top -- -sV
    4) 후속 CVE 검색: searchsploit <service-version> / NVD API / vulners.
    5) 검증: VERSION 컬럼 + Apache/X.Y, OpenSSH/X.Y 확인.
  category: recon
  points: 10
  answer: sudo nmap -sV 10.20.30.80
  answer_detail: 서비스 버전 탐지(-sV)는 열린 포트에 다양한 프로브를 전송하여 실행 중인 서비스의 정확한 이름과 버전을 식별한다. 이 정보로 CVE 데이터베이스에서
    알려진 취약점을 검색할 수 있다.
  verify:
    type: output_contains
    expect: VERSION
    field: stdout
    semantic:
      intent: 서비스 버전 탐지 — sudo nmap -sV 10.20.30.80. 프로브 → 서비스/버전. CVE DB 검색 기반.
      success_criteria:
      - VERSION 키워드
      - -sV 옵션
      - 버전 탐지
      acceptable_methods:
      - "sudo nmap -sV (수기 baseline): 명령 `sudo nmap -sV 10.20.30.80`. 출력 `PORT  STATE SERVICE   VERSION\\n22/tcp open ssh OpenSSH 9.6p1\\n80/tcp open http Apache httpd 2.4.58\\n3000/tcp open http nodejs Express`. CVE 검색 base."
      - "nmap -sV --version-intensity 9: 9단계 probe (0~9). 가장 정밀. 9 = 모든 probe 송신."
      - "nmap -A: -sV + -O + -sC + --traceroute 종합."
      - "whatweb -v http://...: 200+ plugin (web only)."
      - "amap -B: banner only, 정밀."
      - "nmap --script=banner: NSE banner extraction."
      - "rustscan -- -sV: chain."
      - "Wappalyzer CLI: 1500+ tech (web)."
      - "후속 CVE 매칭: searchsploit / NVD / vulners API → 자동 finding."
      negative_signs:
      - -sV 없음
      - 버전 탐지 맥락 없음
  target_vm: attacker
- order: 5
  instruction: OS 핑거프린팅(-O)을 수행하여 {{WEB_IP}}의 운영체제를 추정하라.
  hint: |
    -O 옵션은 root 권한이 필요하다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -O 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - sudo nmap -O --osscan-guess 10.20.30.80 (불확실해도 추정)
       - sudo nmap -A 10.20.30.80 (OS + 버전 + 스크립트 + traceroute)
       - sudo p0f -i eth0 (passive OS fingerprinting)
       - sudo xprobe2 10.20.30.80 (legacy active OS detection)
       - TTL only (간이): ping -c 1 10.20.30.80 → ttl=64 (Linux), ttl=128 (Windows), ttl=255 (Cisco/router)
    4) 검증: OS details + Aggressive OS guesses 라인. 일치도 % 확인.
  category: recon
  points: 10
  answer: sudo nmap -O 10.20.30.80
  answer_detail: OS 핑거프린팅(-O)은 TCP/IP 스택의 특성(TTL, 윈도우 크기, 옵션 순서 등)을 분석하여 운영체제를 추정한다. 정확한 OS 정보는 커널 익스플로잇
    선택에 핵심적이다.
  verify:
    type: output_contains
    expect: OS
    field: stdout
    semantic:
      intent: OS 핑거프린팅 — sudo nmap -O. TCP/IP 스택 특성 (TTL/윈도우/옵션) 분석. 커널 익스플로잇 선택 기반.
      success_criteria:
      - OS 키워드
      - -O 옵션
      - OS 추정
      acceptable_methods:
      - "sudo nmap -O (수기 baseline): 명령 `sudo nmap -O 10.20.30.80`. 출력 `Running: Linux 5.X\\nOS CPE: cpe:/o:linux:linux_kernel:5\\nOS details: Linux 5.0 - 5.15`. TCP/IP stack 특성 분석."
      - "nmap -O --osscan-guess: 불확실해도 추정 (정상 모드는 정확도 부족 시 무응답)."
      - "sudo nmap -A: OS + 버전 + NSE + traceroute 종합."
      - "p0f passive: 명령 `sudo p0f -i eth0`. 트래픽 청취 → OS fingerprint. 자체 트래픽 0 (stealth)."
      - "xprobe2 (legacy): 명령 `sudo xprobe2 10.20.30.80`. ICMP 기반 active. 90년대 표준."
      - "TTL 간이: `ping -c 1 ... | grep ttl`. ttl=64 Linux, 128 Windows, 255 Cisco. 빠른 추정."
      - "scapy IP fingerprint: Python `from scapy.all import *; r=sr1(IP(dst='10.20.30.80')/ICMP()); print(r.ttl)`."
      - "ettercap fingerprint: GUI/CLI. ARP poisoning 환경에서 통합."
      - "Wireshark + ja3: TLS handshake 로 OS 추정 가능 (cipher suite 순서)."
      negative_signs:
      - -O 없음
      - OS 추정 맥락 없음
  target_vm: attacker
- order: 6
  instruction: UDP 스캔을 수행하여 {{WEB_IP}}의 상위 20개 UDP 포트 상태를 확인하라.
  hint: |
    -sU 옵션으로 UDP 스캔을 수행하고 --top-ports로 상위 포트를 지정한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: sudo nmap -sU --top-ports 20 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안:
       - sudo nmap -sU -p 53,67,68,69,123,161,162,500,514 10.20.30.80 (지정 포트만 빠름)
       - sudo nmap -sU --top-ports 100 --max-rtt-timeout 100ms 10.20.30.80 (timeout 단축)
       - sudo udp-proto-scanner.pl 10.20.30.80 (perl, 표준 protocol probe)
       - sudo hping3 --udp -p 53 -c 3 10.20.30.80 (UDP single)
       - sudo masscan -pU:53,161,500 10.20.30.80 (자체 UDP)
       - sudo nmap -sU --version-intensity 0 (가장 빠름, 정확도 낮음)
    4) 주의: UDP 는 응답 없으면 open|filtered. 정확도 낮음. SNMP(161), DNS(53), DHCP(67/68) 핵심.
  category: recon
  points: 10
  answer: sudo nmap -sU --top-ports 20 10.20.30.80
  answer_detail: UDP 스캔(-sU)은 TCP와 달리 handshake가 없어 응답이 느리고 결과가 불확실할 수 있다. DNS(53), SNMP(161), DHCP(67/68)
    등 중요한 서비스가 UDP를 사용하므로 반드시 확인해야 한다.
  verify:
    type: output_contains
    expect: PORT
    field: stdout
    semantic:
      intent: UDP 스캔 — sudo nmap -sU --top-ports 20. DNS(53)/SNMP(161)/DHCP(67/68). handshake 없음 → 느림.
      success_criteria:
      - PORT 키워드
      - -sU + --top-ports
