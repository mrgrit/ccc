lab_id: attack-nonai-week03
title: 취약점 스캐닝 (Vulnerability Scanning)
version: non-ai
course: attack-nonai
week: 3
description: 자동화된 취약점 스캐너와 수동 취약점 분석 기법을 학습한다. Nikto, searchsploit을 활용하여 웹 애플리케이션과
  서비스의 취약점을 탐지하고, CVE 데이터베이스를 조회하여 익스플로잇 가능성을 평가한다.
difficulty: easy
duration_minutes: 120
objectives:
- Nikto를 사용하여 웹 서버 취약점을 스캔할 수 있다
- searchsploit으로 알려진 취약점의 익스플로잇을 검색할 수 있다
- CVE/CVSS 정보를 해석하여 위험도를 평가할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Nikto를 사용하여 {{WEB_IP}}:3000(JuiceShop) 웹 서버의 취약점을 스캔하라.
  hint: |
    nikto -h 옵션으로 대상 호스트를 지정한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: nikto -h http://10.20.30.80:3000
    2) 미설치 시: sudo apt install -y nikto (Debian/Ubuntu) 또는 sudo yum install -y nikto
    3) 실패/대안 (web vuln scanner):
       - nuclei -u http://10.20.30.80:3000 -severity critical,high (ProjectDiscovery, 6000+ template)
       - sudo nmap --script=vuln,http-vuln-* -p 3000 10.20.30.80 (NSE)
       - wapiti -u http://10.20.30.80:3000 (Python, OWASP Top 10)
       - skipfish -o /tmp/skipfish http://10.20.30.80:3000 (Google, 빠름)
       - w3af_console (대화형, 200+ plugin)
       - OWASP ZAP baseline scan (zaproxy -daemon -port 8080)
       - arachni (Ruby, 종합)
    4) 검증: Server: 헤더 + + 발견 라인 + Vulnerable.
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): nikto -h http://10.20.30.80:3000'
  answer_detail: Nikto는 오픈소스 웹 서버 취약점 스캐너로, 위험한 파일, 오래된 서버 소프트웨어, 보안 설정 미흡 등을 자동으로
    검사한다. 6700개 이상의 잠재적 문제를 확인할 수 있다.
  verify:
    type: output_contains
    expect: 'Server:'
    field: stdout
    semantic:
      intent: Nikto 웹 취약점 스캔 — nikto -h http://10.20.30.80:3000. JuiceShop 자동 취약점
        스캐너. 6700+ 잠재적 문제 검사.
      success_criteria:
      - 'Server: 키워드'
      - nikto -h + 3000
      - 웹 취약점 스캔
      acceptable_methods:
      - "nikto -h (수기 baseline): 명령 `nikto -h http://10.20.30.80:3000`. 출력 `+ Server: nginx\\n+ X-Frame-Options header missing\\n+ /admin/: Admin login page\\n+ 6700 items checked: 12 findings`. 6700+ 잠재 문제 + OSVDB 매핑."
      - "nuclei -severity critical,high: 6000+ template, CVE 매핑."
      - "nmap --script=vuln NSE: 표준 NSE."
      - "wapiti: Python OWASP Top 10."
      - "skipfish: Google 도구. 빠름."
      - "w3af_console: 200+ plugin."
      - "OWASP ZAP baseline: web UI + 자동."
      - "arachni: Ruby 종합."
      - "Burp Pro Active Scan: 상용."
      negative_signs:
      - nikto 없음
      - 취약점 스캐너 맥락 없음
  target_vm: attacker
- order: 2
  instruction: Nikto를 사용하여 {{WEB_IP}}:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장하라.
  hint: |
    -o 옵션으로 출력 파일을 지정한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt
    2) 미설치 시: sudo apt install -y nikto
    3) 실패/대안 (포맷별):
       - nikto -h http://10.20.30.80:80 -Format html -o /tmp/nikto.html (HTML)
       - nikto -h http://10.20.30.80:80 -Format xml -o /tmp/nikto.xml (XML)
       - nikto -h http://10.20.30.80:80 -Format json -o /tmp/nikto.json (JSON)
       - nikto -h http://10.20.30.80:80 -Format csv -o /tmp/nikto.csv (CSV)
       - nuclei -u http://10.20.30.80:80 -o /tmp/nuclei.txt (대안)
       - nmap --script=vuln -p 80 10.20.30.80 -oN /tmp/nmap_vuln.txt
    4) 검증: cat /tmp/nikto_apache.txt → Apache 전용 finding (mod_status, ServerSignature 등).
  category: analysis
  points: 10
  answer: nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt && cat /tmp/nikto_apache.txt
  answer_detail: 같은 호스트의 다른 포트에서 실행 중인 웹 서버도 별도로 스캔해야 한다. Apache와 Node.js는 서로 다른 취약점
    패턴을 가지므로 각각 독립적으로 분석한다.
  verify:
    type: output_contains
    expect: nikto
    field: stdout
    semantic:
      intent: Nikto Apache 스캔 + 저장 — nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt.
        포트별 독립 스캔. 파일 저장.
      success_criteria:
      - nikto 키워드
      - -o 출력 옵션
      - Apache 80
      acceptable_methods:
      - "nikto -h -o (수기 baseline): 명령 위 answer. Apache 전용 finding (mod_status/ServerSignature/.htaccess)."
      - "nikto -Format html/xml/json/csv: 다양한 포맷."
      - "nikto -Tuning 9: SSL/TLS 약점 추가."
      - "nuclei -o: 대안."
      - "nmap --script=vuln -oN: NSE."
      - "OWASP ZAP report: HTML/PDF export."
      - "wapiti -f json -o report: Python."
      - "Burp Pro report: 상용."
      - "DefectDojo Engagement: 자동 import + dashboard."
      negative_signs:
      - -o 출력 없음
      - 80 포트 맥락 없음
  target_vm: attacker
- order: 3
  instruction: searchsploit을 사용하여 'juice shop' 관련 알려진 익스플로잇을 검색하라.
  hint: |
    searchsploit 키워드 형태로 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: searchsploit juice shop
    2) 미설치 시: sudo apt install -y exploitdb (Debian/Ubuntu) 또는 git clone https://gitlab.com/exploit-database/exploitdb /opt/exploitdb
    3) 실패/대안 (CVE/exploit DB 검색):
       - searchsploit -t "juice shop" (정확 매칭)
       - curl -s 'https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=juice-shop' | jq (NVD API)
       - curl -s 'https://vulners.com/api/v3/search/lucene/?query=juice-shop' | jq (Vulners)
       - msfconsole -q -x 'search type:exploit name:juice-shop' (Metasploit)
       - github 검색: PoC 코드 (https://github.com/search?q=juice-shop+exploit)
       - exploit-db.com 웹 (offline DB 미작동 시)
       - cve-search-tool: cli + 자체 DB
    4) 후속: searchsploit -m <id> (PoC 다운로드). searchsploit -p <id> (경로 표시).
    5) 검증: Title + Path 컬럼. PoC 코드 파일 존재.
  category: analysis
  points: 10
  answer: searchsploit juice shop
  answer_detail: searchsploit은 Exploit-DB의 오프라인 검색 도구이다. 대상 소프트웨어에 대한 공개된 익스플로잇 코드를
    빠르게 찾을 수 있다. 검색 결과에 PoC 코드 경로가 표시된다.
  verify:
    type: output_contains
    expect: Exploit
    field: stdout
    semantic:
      intent: searchsploit juice shop — searchsploit juice shop. Exploit-DB 오프라인 검색.
        PoC 코드 경로 출력.
      success_criteria:
      - Exploit 키워드
      - searchsploit juice shop
      - Exploit-DB 검색
      acceptable_methods:
      - "searchsploit (수기 baseline): 명령 `searchsploit juice shop`. 출력 `Exploit Title | Path\\nJuice Shop ... | webapps/...`. local DB."
      - "searchsploit -t 정확 매칭."
      - "NVD API: jq 친화."
      - "Vulners API: 1M+ vuln."
      - "Metasploit msfconsole search: type:exploit."
      - "github 검색: PoC."
      - "cve-search-tool: 자체 DB."
      - "Trickest CVE Repo: GitHub 큐레이션."
      - "ExploitDB 웹 (https://www.exploit-db.com): online."
      negative_signs:
      - searchsploit 없음
      - Exploit-DB 맥락 없음
  target_vm: attacker
- order: 4
  instruction: searchsploit으로 'node.js' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라.
  hint: |
    searchsploit node.js 또는 nodejs로 검색한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: searchsploit nodejs
    2) 미설치 시: sudo apt install -y exploitdb
    3) 실패/대안:
       - searchsploit -t "node.js" (정확 매칭)
       - searchsploit express (프레임워크)
       - curl -s 'https://services.nvd.nist.gov/rest/json/cves/2.0?cpeName=cpe:2.3:a:nodejs:node.js:*' | jq
       - npm audit (실 프로젝트, package.json 기반)
       - Snyk vuln DB (snyk test --all-projects)
       - Vulners search "node.js"
       - Metasploit search platform:linux name:node
    4) 검증: Title 컬럼 + Path. node.js 버전 매칭 핵심.
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): searchsploit nodejs'
  answer_detail: 서비스 버전 탐지 결과(Node.js)를 기반으로 관련 익스플로잇을 검색한다. 버전별로 적용 가능한 취약점이 다르므로
    정확한 버전 매칭이 중요하다.
  verify:
    type: output_contains
    expect: Title
    field: stdout
    semantic:
      intent: searchsploit nodejs — JuiceShop 백엔드 관련 익스플로잇 검색. 서비스 버전 (Node.js) 기반
        적용 가능 취약점.
      success_criteria:
      - Title 키워드
      - searchsploit nodejs
      - Node.js 버전 매칭
      acceptable_methods:
      - "searchsploit nodejs (수기 baseline): 명령 `searchsploit nodejs`. Title + Path."
      - "searchsploit -t: 정확 매칭."
      - "searchsploit express: 프레임워크."
      - "NVD CPE 검색: cpe:2.3:a:nodejs:node.js."
      - "npm audit: package.json 기반."
      - "Snyk: snyk test."
      - "Vulners API."
      - "Metasploit search."
      - "github CVE-XXXX-YYYY 검색."
      negative_signs:
      - searchsploit 없음
      - Node.js 버전 매칭 맥락 없음
  target_vm: attacker
- order: 5
  instruction: nmap의 http-sql-injection 스크립트를 사용하여 {{WEB_IP}}:3000에 SQL Injection
    취약점이 있는지 스캔하라.
  hint: |
    --script http-sql-injection 옵션을 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: nmap --script http-sql-injection -p 3000 10.20.30.80
    2) 미설치 시: sudo apt install -y nmap
    3) 실패/대안 (SQLi 도구별 정밀도):
       - sqlmap -u "http://10.20.30.80:3000/rest/products/search?q=" --batch --random-agent (가장 정밀)
       - sqlmap -u URL --crawl=2 --batch (자동 crawl + SQLi)
       - nuclei -u http://10.20.30.80:3000 -t /usr/share/nuclei-templates/vulnerabilities/sql/ (template 기반)
       - Burp Pro Active Scan SQLi (상용)
       - OWASP ZAP Active Scan
       - wapiti -u http://10.20.30.80:3000 -m sql
       - 수동: curl 'http://10.20.30.80:3000/...?q=1%27' → 에러 메시지 분석
    4) 검증: VULNERABLE 라인 + payload + extractable info.
  category: analysis
  points: 10
  answer: nmap --script http-sql-injection -p 3000 10.20.30.80
  answer_detail: nmap의 http-sql-injection 스크립트는 웹 폼과 URL 파라미터에 SQL Injection 페이로드를
    자동으로 테스트한다. 전문 도구(SQLMap)보다 간단하지만 빠른 초기 탐색에 유용하다.
  verify:
    type: output_contains
    expect: '3000'
    field: stdout
    semantic:
      intent: NSE SQL Injection 스캔 — nmap --script http-sql-injection -p 3000 10.20.30.80.
        웹 폼/URL 파라미터 자동 SQLi 탐지. SQLMap 대안 초기 탐색.
      success_criteria:
      - 3000 키워드
      - --script http-sql-injection
      - SQL Injection 자동 탐지
      acceptable_methods:
      - "nmap --script http-sql-injection (수기 baseline): NSE 자동. 빠른 첫 탐색."
      - "sqlmap --batch: 가장 정밀. 자동 DB extract."
      - "sqlmap --crawl=2: 자동 crawl + SQLi."
      - "nuclei vulnerabilities/sql: template 기반."
      - "Burp Pro Active Scan: 상용."
      - "OWASP ZAP Active Scan: 무료."
      - "wapiti -m sql: Python."
      - "수동 curl + 에러 메시지: % 27/' UNION 등."
      - "Ghauri (SQLi automation): GitHub."
      negative_signs:
      - http-sql-injection 스크립트 없음
      - SQLi 탐지 맥락 없음
  target_vm: attacker
- order: 6
  instruction: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문 목록을
    확인하라. 이는 인증 공격에 활용할 수 있는 정보이다.
  hint: |
    REST API에 GET 요청을 보내라.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m json.tool
    2) 미설치 시: sudo apt install -y curl python3
    3) 실패/대안:
       - curl -s ... | jq '.data[]' (jq 더 간결)
       - http GET http://10.20.30.80:3000/api/SecurityQuestions (httpie)
       - python3 -c "import urllib.request, json; d=json.loads(urllib.request.urlopen('http://10.20.30.80:3000/api/SecurityQuestions').read()); print(json.dumps(d, indent=2))"
       - Burp Repeater: GET 수동 + response 분석
       - Postman GET request
       - katana endpoint discovery
    4) 후속: SecurityQuestions 답변 → OSINT (FB/LinkedIn 직원 답변 추측) → 비밀번호 재설정 abuse.
    5) 검증: question 필드 + 다양한 질문 (어머니 결혼 전 성/첫 학교 등).
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m
    json.tool'
  answer_detail: 보안 질문은 비밀번호 재설정에 사용되므로, 질문 내용이 노출되면 소셜 엔지니어링이나 OSINT로 답변을 추측할 수 있다.
    이는 인증 우회 공격의 사전 정보가 된다.
  verify:
    type: output_contains
    expect: question
    field: stdout
    semantic:
      intent: SecurityQuestions API — curl /api/SecurityQuestions | python3 json.tool.
        비밀번호 재설정용 보안 질문 노출. OSINT/소셜 엔지니어링 기반 답변 추측 → 인증 우회 사전 정보.
      success_criteria:
      - question 키워드
      - curl /api/SecurityQuestions
      - JSON 파싱
      acceptable_methods:
      - "curl + json.tool (수기 baseline): 명령 위 answer. question 필드 + 다양한 질문."
      - "curl + jq: 더 간결."
      - "httpie GET: modern."
      - "Python urllib: 의존성 zero."
      - "Burp Repeater: manual."
      - "Postman: GUI."
      - "katana: 자동 endpoint discovery."
      - "후속 OSINT: theHarvester + 직원 SNS → 답변 추측."
      - "Bastion AI orchestrator: 질문 ↔ 직원 SNS 매칭 자동."
      negative_signs:
      - /api/SecurityQuestions 없음
      - OSINT/답변 추측 맥락 없음
  target_vm: attacker
- order: 7
  instruction: curl로 JuiceShop의 /api/Users 엔드포인트에 접근하여 사용자 정보가 노출되는지 확인하라.
  hint: |
    인증 없이 사용자 API에 접근을 시도하라.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -s http://10.20.30.80:3000/api/Users | python3 -m json.tool | head -30
    2) 미설치 시: sudo apt install -y curl python3
    3) 실패/대안:
       - curl -s ... | jq '.data[].email' (이메일만)
       - http GET http://10.20.30.80:3000/api/Users
       - Burp Intruder ID brute (Pitchfork): /api/Users/1, /api/Users/2 ... → IDOR
       - ffuf -u http://10.20.30.80:3000/api/Users/FUZZ -w numbers.txt (ID enum)
       - Arjun (HTTP parameter discovery)
       - katana endpoint discovery
       - OWASP ZAP API spider
    4) 후속: 노출 이메일 → 후속 brute force/phishing target list.
    5) 검증: email/username 필드 노출 → OWASP A01 Broken Access Control + IDOR.
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -m json.tool |
    head -30'
  answer_detail: 사용자 목록 API가 인증 없이 접근 가능하면 Broken Access Control(OWASP A01) 취약점이다.
    사용자 이메일, ID 등의 정보가 노출되어 후속 공격(브루트포스, 피싱)에 활용될 수 있다.
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: Users API 정보 유출 — curl /api/Users | python3 json.tool | head -30. 인증
        없이 사용자 이메일/ID 노출. OWASP A01 Broken Access Control + IDOR. 후속 브루트포스/피싱 기반.
      success_criteria:
      - email 키워드
      - curl /api/Users
      - 사용자 데이터 노출
      acceptable_methods:
      - "curl + json.tool (수기 baseline): 명령 위 answer. email 필드 노출 → OWASP A01."
      - "curl + jq: email/username 추출."
