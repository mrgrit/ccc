lab_id: attack-nonai-week03
title: 취약점 스캐닝 (Vulnerability Scanning)
version: non-ai
course: attack-nonai
week: 3
description: 자동화된 취약점 스캐너와 수동 취약점 분석 기법을 학습한다. Nikto, searchsploit을 활용하여 웹 애플리케이션과
  서비스의 취약점을 탐지하고, CVE 데이터베이스를 조회하여 익스플로잇 가능성을 평가한다.
difficulty: easy
duration_minutes: 120
objectives:
- Nikto를 사용하여 웹 서버 취약점을 스캔할 수 있다
- searchsploit으로 알려진 취약점의 익스플로잇을 검색할 수 있다
- CVE/CVSS 정보를 해석하여 위험도를 평가할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Nikto를 사용하여 {{WEB_IP}}:3000(JuiceShop) 웹 서버의 취약점을 스캔하라.
  hint: nikto -h 옵션으로 대상 호스트를 지정한다
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): nikto -h http://10.20.30.80:3000'
  answer_detail: Nikto는 오픈소스 웹 서버 취약점 스캐너로, 위험한 파일, 오래된 서버 소프트웨어, 보안 설정 미흡 등을 자동으로
    검사한다. 6700개 이상의 잠재적 문제를 확인할 수 있다.
  verify:
    type: output_contains
    expect: 'Server:'
    field: stdout
    semantic:
      intent: Nikto 웹 취약점 스캔 — nikto -h http://10.20.30.80:3000. JuiceShop 자동 취약점
        스캐너. 6700+ 잠재적 문제 검사.
      success_criteria:
      - 'Server: 키워드'
      - nikto -h + 3000
      - 웹 취약점 스캔
      acceptable_methods:
      - nikto -h
      - Wapiti
      - OWASP ZAP baseline
      negative_signs:
      - nikto 없음
      - 취약점 스캐너 맥락 없음
  target_vm: attacker
- order: 2
  instruction: Nikto를 사용하여 {{WEB_IP}}:80(Apache) 웹 서버를 스캔하고, 결과를 /tmp/nikto_apache.txt에
    저장하라.
  hint: -o 옵션으로 출력 파일을 지정한다
  category: analysis
  points: 10
  answer: nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt && cat /tmp/nikto_apache.txt
  answer_detail: 같은 호스트의 다른 포트에서 실행 중인 웹 서버도 별도로 스캔해야 한다. Apache와 Node.js는 서로 다른 취약점
    패턴을 가지므로 각각 독립적으로 분석한다.
  verify:
    type: output_contains
    expect: nikto
    field: stdout
    semantic:
      intent: Nikto Apache 스캔 + 저장 — nikto -h http://10.20.30.80:80 -o /tmp/nikto_apache.txt.
        포트별 독립 스캔. 파일 저장.
      success_criteria:
      - nikto 키워드
      - -o 출력 옵션
      - Apache 80
      acceptable_methods:
      - nikto -h -o
      - nikto -Format html
      negative_signs:
      - -o 출력 없음
      - 80 포트 맥락 없음
  target_vm: attacker
- order: 3
  instruction: searchsploit을 사용하여 'juice shop' 관련 알려진 익스플로잇을 검색하라.
  hint: searchsploit 키워드 형태로 검색한다
  category: analysis
  points: 10
  answer: searchsploit juice shop
  answer_detail: searchsploit은 Exploit-DB의 오프라인 검색 도구이다. 대상 소프트웨어에 대한 공개된 익스플로잇 코드를
    빠르게 찾을 수 있다. 검색 결과에 PoC 코드 경로가 표시된다.
  verify:
    type: output_contains
    expect: Exploit
    field: stdout
    semantic:
      intent: searchsploit juice shop — searchsploit juice shop. Exploit-DB 오프라인 검색.
        PoC 코드 경로 출력.
      success_criteria:
      - Exploit 키워드
      - searchsploit juice shop
      - Exploit-DB 검색
      acceptable_methods:
      - searchsploit
      - Exploit-DB 웹 검색
      - Metasploit msfconsole search
      negative_signs:
      - searchsploit 없음
      - Exploit-DB 맥락 없음
  target_vm: attacker
- order: 4
  instruction: searchsploit으로 'node.js' 관련 취약점을 검색하여 JuiceShop 백엔드에 적용 가능한 익스플로잇을
    찾아라.
  hint: searchsploit node.js 또는 nodejs로 검색한다
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): searchsploit nodejs'
  answer_detail: 서비스 버전 탐지 결과(Node.js)를 기반으로 관련 익스플로잇을 검색한다. 버전별로 적용 가능한 취약점이 다르므로
    정확한 버전 매칭이 중요하다.
  verify:
    type: output_contains
    expect: Title
    field: stdout
    semantic:
      intent: searchsploit nodejs — JuiceShop 백엔드 관련 익스플로잇 검색. 서비스 버전 (Node.js) 기반
        적용 가능 취약점.
      success_criteria:
      - Title 키워드
      - searchsploit nodejs
      - Node.js 버전 매칭
      acceptable_methods:
      - searchsploit
      - Exploit-DB 웹 검색
      - Metasploit search type:exploit name:node
      negative_signs:
      - searchsploit 없음
      - Node.js 버전 매칭 맥락 없음
  target_vm: attacker
- order: 5
  instruction: nmap의 http-sql-injection 스크립트를 사용하여 {{WEB_IP}}:3000에 SQL Injection
    취약점이 있는지 스캔하라.
  hint: --script http-sql-injection 옵션을 사용한다
  category: analysis
  points: 10
  answer: nmap --script http-sql-injection -p 3000 10.20.30.80
  answer_detail: nmap의 http-sql-injection 스크립트는 웹 폼과 URL 파라미터에 SQL Injection 페이로드를
    자동으로 테스트한다. 전문 도구(SQLMap)보다 간단하지만 빠른 초기 탐색에 유용하다.
  verify:
    type: output_contains
    expect: '3000'
    field: stdout
    semantic:
      intent: NSE SQL Injection 스캔 — nmap --script http-sql-injection -p 3000 10.20.30.80.
        웹 폼/URL 파라미터 자동 SQLi 탐지. SQLMap 대안 초기 탐색.
      success_criteria:
      - 3000 키워드
      - --script http-sql-injection
      - SQL Injection 자동 탐지
      acceptable_methods:
      - nmap --script http-sql-injection
      - sqlmap -u URL --batch
      - Burp Scanner SQLi
      - Nuclei dast sqli
      negative_signs:
      - http-sql-injection 스크립트 없음
      - SQLi 탐지 맥락 없음
  target_vm: attacker
- order: 6
  instruction: curl을 사용하여 JuiceShop의 /api/SecurityQuestions 엔드포인트에 접근하여 보안 질문 목록을
    확인하라. 이는 인증 공격에 활용할 수 있는 정보이다.
  hint: REST API에 GET 요청을 보내라
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/SecurityQuestions | python3 -m
    json.tool'
  answer_detail: 보안 질문은 비밀번호 재설정에 사용되므로, 질문 내용이 노출되면 소셜 엔지니어링이나 OSINT로 답변을 추측할 수 있다.
    이는 인증 우회 공격의 사전 정보가 된다.
  verify:
    type: output_contains
    expect: question
    field: stdout
    semantic:
      intent: SecurityQuestions API — curl /api/SecurityQuestions | python3 json.tool.
        비밀번호 재설정용 보안 질문 노출. OSINT/소셜 엔지니어링 기반 답변 추측 → 인증 우회 사전 정보.
      success_criteria:
      - question 키워드
      - curl /api/SecurityQuestions
      - JSON 파싱
      acceptable_methods:
      - curl + json.tool
      - curl + jq
      - Burp Repeater
      negative_signs:
      - /api/SecurityQuestions 없음
      - OSINT/답변 추측 맥락 없음
  target_vm: attacker
- order: 7
  instruction: curl로 JuiceShop의 /api/Users 엔드포인트에 접근하여 사용자 정보가 노출되는지 확인하라.
  hint: 인증 없이 사용자 API에 접근을 시도하라
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -m json.tool |
    head -30'
  answer_detail: 사용자 목록 API가 인증 없이 접근 가능하면 Broken Access Control(OWASP A01) 취약점이다.
    사용자 이메일, ID 등의 정보가 노출되어 후속 공격(브루트포스, 피싱)에 활용될 수 있다.
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: Users API 정보 유출 — curl /api/Users | python3 json.tool | head -30. 인증
        없이 사용자 이메일/ID 노출. OWASP A01 Broken Access Control + IDOR. 후속 브루트포스/피싱 기반.
      success_criteria:
      - email 키워드
      - curl /api/Users
      - 사용자 데이터 노출
      acceptable_methods:
      - curl + jq
      - Burp Intruder enum
      - httpx -path /api/Users
      negative_signs:
      - /api/Users 없음
      - OWASP A01/IDOR 맥락 없음
  target_vm: attacker
- order: 8
  instruction: nmap의 ssl-enum-ciphers 스크립트를 사용하여 SIEM 서버({{SECU_IP}}00:443)의 SSL/TLS
    설정을 분석하라.
  hint: --script ssl-enum-ciphers 옵션을 사용한다
  category: analysis
  points: 10
  answer: nmap --script ssl-enum-ciphers -p 443 10.20.30.100
  answer_detail: SSL/TLS 설정 분석은 암호화 강도를 평가하는 중요한 보안 점검이다. 약한 암호 스위트(RC4, DES), 구버전
    프로토콜(SSLv3, TLS 1.0)이 사용되면 중간자 공격에 취약하다.
  verify:
    type: output_contains
    expect: TLS
    field: stdout
    semantic:
      intent: SSL/TLS 설정 분석 — nmap --script ssl-enum-ciphers -p 443 10.20.30.100.
        SIEM 서버 암호 스위트 + 프로토콜 버전 나열. 약한 암호 (RC4/DES) + 구버전 (SSLv3/TLS 1.0) → MITM
        취약.
      success_criteria:
      - TLS 키워드
      - --script ssl-enum-ciphers -p 443
      - 암호 스위트 나열
      acceptable_methods:
      - nmap ssl-enum-ciphers
      - testssl.sh
      - sslscan
      - SSLyze
      - SSL Labs
      negative_signs:
      - ssl-enum-ciphers 없음
      - 암호 스위트 맥락 없음
  target_vm: attacker
- order: 9
  instruction: JuiceShop의 /rest/products/search?q= 엔드포인트에 특수문자(')를 포함한 검색어를 보내 에러
    메시지를 유발하라.
  hint: URL 인코딩된 작은따옴표(%27)를 사용하라
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=%27'' | python3
    -m json.tool'
  answer_detail: 에러 메시지에 SQL 문법, 스택 트레이스, 데이터베이스 정보 등이 포함되면 SQL Injection 취약점의 강력한
    징후이다. 상세한 에러 메시지 노출은 Information Disclosure 취약점이기도 하다.
  verify:
    type: output_contains
    expect: error
    field: stdout
    semantic:
      intent: SQLi 특수문자 프로빙 — curl '/rest/products/search?q=%27' | python3 json.tool.
        URL 인코딩된 작은따옴표(%27) 삽입 → DB 에러 유발. 에러 메시지 누설 = SQLi 강력 징후 + Information Disclosure
        동반.
      success_criteria:
      - error 키워드
      - '%27 (URL 인코딩 작은따옴표)'
      - /rest/products/search?q=
      acceptable_methods:
      - curl + URL 인코딩
      - Burp Repeater + payload
      - sqlmap --dbs
      negative_signs:
      - '%27 또는 작은따옴표 없음'
      - 에러 유발 맥락 없음
  target_vm: attacker
- order: 10
  instruction: dirb 또는 gobuster를 사용하여 {{WEB_IP}}:3000의 숨겨진 디렉토리를 브루트포스로 열거하라.
  hint: dirb URL wordlist 형태로 실행한다
  category: analysis
  points: 10
  answer: dirb http://10.20.30.80:3000 /usr/share/wordlists/dirb/common.txt -r
  answer_detail: 디렉토리 브루트포싱은 robots.txt나 소스코드에 노출되지 않은 숨겨진 경로를 발견하는 기법이다. 관리자 패널,
    백업 파일, API 문서 등 민감한 리소스를 찾을 수 있다.
  verify:
    type: output_contains
    expect: FOUND
    field: stdout
    semantic:
      intent: 디렉토리 브루트포스 — dirb http://10.20.30.80:3000 /usr/share/wordlists/dirb/common.txt
        -r. common.txt 사전 + 재귀(-r) 탐색. 숨겨진 관리자/백업/API 문서 경로 발견. Recon 심화.
      success_criteria:
      - FOUND 키워드
      - dirb + URL + wordlist
      - 재귀 탐색
      acceptable_methods:
      - dirb
      - gobuster dir
      - ffuf -u URL/FUZZ -w wordlist
      - feroxbuster
      - dirsearch
      negative_signs:
      - dirb/유사 도구 없음
      - wordlist 없음
  target_vm: attacker
- order: 11
  instruction: JuiceShop의 /rest/admin/application-configuration 엔드포인트에 접근하여 서버 설정
    정보가 노출되는지 확인하라.
  hint: 관리자용 REST API 경로에 인증 없이 접근을 시도하라
  category: analysis
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/rest/admin/application-configuration
    | python3 -m json.tool | head -30'
  answer_detail: 관리자용 설정 API가 인증 없이 접근 가능하면 심각한 Information Disclosure이다. 데이터베이스 연결
    정보, 비밀 키, 내부 경로 등이 노출될 수 있다.
  verify:
    type: output_contains
    expect: config
    field: stdout
    semantic:
      intent: application-configuration 유출 — curl /rest/admin/application-configuration
        | json.tool | head -30. 관리자 API 인증 없이 접근 가능 → DB 연결 정보/비밀 키/내부 경로 노출. Critical
        Information Disclosure.
      success_criteria:
      - config 키워드
      - curl /rest/admin/application-configuration
      - JSON 파싱
      acceptable_methods:
      - curl + json.tool
      - curl + jq
      - Burp Repeater
      negative_signs:
      - application-configuration 경로 없음
      - 관리자 API 노출 맥락 없음
  target_vm: attacker
- order: 12
  instruction: nmap의 http-headers 스크립트로 {{WEB_IP}}:3000의 보안 헤더 설정을 점검하라.
  hint: --script http-headers 옵션을 사용한다
  category: analysis
  points: 10
  answer: nmap --script http-headers -p 3000 10.20.30.80
  answer_detail: X-Frame-Options, Content-Security-Policy, X-XSS-Protection 등 보안 헤더가
    누락되면 Clickjacking, XSS 등의 공격에 취약하다. 보안 헤더 점검은 웹 취약점 분석의 기본 항목이다.
  verify:
    type: output_contains
    expect: header
    field: stdout
    semantic:
      intent: 보안 헤더 점검 — nmap --script http-headers -p 3000. X-Frame-Options/CSP/X-XSS-Protection/HSTS
        등 누락 시 Clickjacking/XSS/MITM 취약. OWASP Secure Headers Project 체크리스트.
      success_criteria:
      - header 키워드
      - --script http-headers -p 3000
      - 보안 헤더 점검
      acceptable_methods:
      - nmap --script http-headers
      - curl -sI + grep security headers
      - Mozilla Observatory
      - securityheaders.com
      negative_signs:
      - http-headers 스크립트 없음
      - 보안 헤더 맥락 없음
  target_vm: attacker
- order: 13
  instruction: searchsploit으로 'apache 2.4' 관련 취약점을 검색하여 web 서버에 적용 가능한 익스플로잇을 찾아라.
  hint: searchsploit apache 2.4로 검색한다
  category: analysis
  points: 10
  answer: searchsploit apache 2.4
  answer_detail: Apache 2.4는 널리 사용되는 웹 서버로 다수의 공개 CVE가 존재한다. 정확한 마이너 버전을 매칭하여 실제 적용
    가능한 익스플로잇을 선별하는 것이 중요하다.
  verify:
    type: output_contains
    expect: Apache
    field: stdout
    semantic:
      intent: searchsploit apache 2.4 — Apache 2.4 알려진 CVE 익스플로잇 검색. CVE-2021-41773
        Path Traversal, CVE-2021-42013 RCE 등. 마이너 버전 정확 매칭 필수.
      success_criteria:
      - Apache 키워드
      - searchsploit apache 2.4
      - Apache 익스플로잇
      acceptable_methods:
      - searchsploit
      - Exploit-DB 검색
      - NVD CVE 검색
      negative_signs:
      - searchsploit 없음
      - Apache 버전 매칭 맥락 없음
  target_vm: attacker
- order: 14
  instruction: curl로 JuiceShop의 /metrics 또는 /api-docs 엔드포인트에 접근하여 내부 정보가 노출되는지 확인하라.
  hint: 개발/디버그용 엔드포인트가 프로덕션에 노출되어 있을 수 있다
  category: analysis
  points: 15
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api-docs/ | head -50'
  answer_detail: Swagger/OpenAPI 문서, Prometheus 메트릭, 디버그 엔드포인트 등이 프로덕션에 노출되면 공격자에게
    API 구조와 내부 상태 정보를 제공하게 된다. Security Misconfiguration(OWASP A05)에 해당한다.
  verify:
    type: output_contains
    expect: api
    field: stdout
    semantic:
      intent: api-docs 유출 — curl /api-docs/ | head -50. Swagger/OpenAPI 문서 노출 → API
        구조/엔드포인트/파라미터 전부 공개. OWASP A05 Security Misconfiguration. 프로덕션에 디버그 엔드포인트
        금지.
      success_criteria:
      - api 키워드
      - curl /api-docs/
      - Swagger/OpenAPI 노출
      acceptable_methods:
      - curl /api-docs
      - curl /swagger
      - curl /openapi.json
      - Burp Repeater
      negative_signs:
      - /api-docs 없음
      - Swagger/OpenAPI 맥락 없음
  target_vm: attacker
- order: 15
  instruction: 취약점 스캔 결과를 종합하여 /tmp/vuln_report.txt에 위험도별(Critical/High/Medium/Low)로
    분류하여 보고서를 작성하라.
  hint: 발견된 취약점을 CVSS 기준으로 분류하라
  category: analysis
  points: 15
  answer: 'echo -e ''=== Vulnerability Assessment Report ===\nTarget: 10.20.30.80\nDate:
    $(date)\n\n[CRITICAL]\n- SQL Injection in /rest/products/search (OWASP A03)\n-
    User data exposure via /api/Users (OWASP A01)\n\n[HIGH]\n- Application config
    exposure /rest/admin/application-configuration\n- FTP directory listing enabled\n\n[MEDIUM]\n-
    Missing security headers (X-Frame-Options, CSP)\n- Application version disclosure\n\n[LOW]\n-
    robots.txt information disclosure\n- Verbose error messages'' > /tmp/vuln_report.txt
    && cat /tmp/vuln_report.txt'
  answer_detail: 취약점 보고서는 위험도별 분류, 영향 범위, 재현 방법, 대응 방안을 포함해야 한다. CVSS 점수를 기준으로 Critical(9.0-10.0),
    High(7.0-8.9), Medium(4.0-6.9), Low(0.1-3.9)로 분류하는 것이 표준이다.
  verify:
    type: output_contains
    expect:
    - Vulnerability Assessment Report
    - report
    field: stdout
    semantic:
      intent: '취약점 보고서 위험도 분류 — echo > /tmp/vuln_report.txt: CRITICAL (SQLi OWASP
        A03, User data exposure A01) + HIGH (config exposure, FTP listing) + MEDIUM
        (보안 헤더 누락, 버전 노출) + LOW (robots.txt, verbose errors). CVSS v3 기준 분류.'
      success_criteria:
      - Vulnerability Assessment Report 키워드
      - CRITICAL/HIGH/MEDIUM/LOW 4단계
      - /tmp/vuln_report.txt 저장
      acceptable_methods:
      - echo > 보고서
      - DefectDojo Finding
      - CVSS v3.1 계산기
      - OWASP Risk Rating
      negative_signs:
      - 4단계 위험도 없음
      - CRITICAL 카테고리 없음
      - 파일 저장 없음
  target_vm: attacker
- order: 99
  instruction: |
    [복합 시나리오] "HTTP 정찰 + Nikto + searchsploit CVE 매칭 + 익스플로잇 우선순위 매트릭스"

    ## 상황 (w02 → w03 시나리오 연속)

    > 선임: "스캔만으론 부족. *어떤 CVE 가 적용 가능한지* 매핑해야 익스플로잇 단계 진입.
    > HTTP 정찰 → Nikto·searchsploit CVE 매칭 → CVSS 우선순위. w04 입력."

    학습 목표 (lecture #1·#2 HTTP + #5 REST API) + (lab #1·#3·#4·#13 Nikto/searchsploit) 통합.

    ## 임무 (3 단계, 약 35분)

    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행.

    ### Phase A — HTTP 정찰
    `curl -s -I http://10.20.30.80:3000/ | head -10`
    `curl -s -X OPTIONS -i http://10.20.30.80:3000/ 2>&1 | grep -i Allow | head -3`
    `curl -s -I http://10.20.30.80:3000/ | grep -i "csp\|hsts\|x-frame\|x-content" 2>&1 | head -5`

    ### Phase B — Nikto + searchsploit
    `nikto -h http://10.20.30.80:3000 -maxtime 60 -nointeractive 2>&1 | head -30`
    `searchsploit -t "juice shop" 2>&1 | head -10`
    `searchsploit -t "express" 2>&1 | head -10`
    `searchsploit -t "apache 2.4" 2>&1 | head -10`

    ### Phase C — 익스플로잇 매트릭스
    | CVE / 발견 | 영향 | CVSS | exploit-db | 우선순위 |
    | CVE-Node-Express | RCE | 9.8 | exploits/nodejs/... | #1 |
    | Nikto admin 노출 | 정보 | 5.3 | (수동) | #2 |
    | CVE-Apache 2.4.x | DoS/RCE | 7.5 | exploits/linux/... | #2 |
    | OPTIONS Allow | 위험 정보 | 3.7 | (수동) | #3 |
    | 보안 헤더 5종 | XSS | 5.5 | (수동) | #2 |
    표 끝 "w04 입력: Express prototype #1, 보안 헤더 우회 #2." 한 줄.

    종료: echo "=== Phase A HTTP ===" / "=== Phase B Nikto+CVE ===" / "=== Phase C 매트릭스 ===".
  hint: |
    Phase A: -I + OPTIONS + 누락 헤더 grep.
    Phase B: nikto -maxtime 60 + searchsploit -t.
    Phase C: 5행 매트릭스 + w04 입력.
    포인트: 정찰 → CVE 매칭 → 우선순위.
  category: integration_scenario
  points: 50
  verify:
    type: output_contains
    expect: 익스플로잇
    field: stdout
    semantic:
      intent: |
        HTTP 정찰 + Nikto + searchsploit + CVSS 우선순위 매트릭스.
        lecture #1·#2·#5 + lab #1·#3·#4·#13 동시 행동 증명.
      success_criteria:
      - Phase A — curl -I / OPTIONS / 헤더 grep
      - Phase B — Nikto + searchsploit 4 케이스
      - Phase C — 5행 매트릭스 + w04 입력
      acceptable_methods:
      - curl + grep
      - nikto / searchsploit / nuclei
      - markdown table CVE/CVSS
      - exploit-db 경로
      negative_signs:
      - 정찰 또는 nikto만
      - CVE 매칭 누락
      - 매트릭스 누락
      - w04 입력 누락
  target_vm: attacker
  risk_level: low
  answer_detail: |
    학생이 ssh attacker 직접. searchsploit 은 exploitdb 패키지. exploit-db 경로 형식 학습 핵심.
