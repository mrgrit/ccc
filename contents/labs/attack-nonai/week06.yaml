lab_id: attack-nonai-week06
title: 네트워크 공격 (Network Attacks)
version: non-ai
course: attack-nonai
week: 6
description: ARP 스푸핑, DNS 스푸핑, MITM(중간자 공격), 패킷 스니핑 등 네트워크 계층의 공격 기법을 실습한다. tcpdump,
  arpspoof, ettercap 등의 도구를 활용한다.
difficulty: medium
duration_minutes: 120
objectives:
- ARP/DNS 스푸핑의 원리를 이해하고 실습한다
- tcpdump를 사용하여 네트워크 트래픽을 캡처하고 분석한다
- MITM 공격의 위험성과 대응 방안(TLS, DNSSEC)을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: tcpdump를 사용하여 {{WEB_IP}}으로 향하는 HTTP 트래픽(포트 3000)을 캡처하라. 10개 패킷만 캡처하라.
  hint: |
    tcpdump -c 옵션으로 캡처 수를 제한하고 host와 port 필터를 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo tcpdump -c 10 -i any host 10.20.30.80 and port 3000 -nn
    2) 미설치: sudo apt install -y tcpdump
    3) 실패/대안:
       - tshark -f "host 10.20.30.80 and port 3000" -c 10
       - Wireshark GUI capture filter
       - tcpflow -i any host 10.20.30.80 port 3000
       - dumpcap -f "BPF" -c 10
       - ngrep -d any -W byline "" host 10.20.30.80
    4) 검증: IP 헤더 + TCP flag 출력. CWE-319.
  category: analysis
  points: 10
  answer: sudo tcpdump -c 10 -i any host 10.20.30.80 and port 3000 -nn
  answer_detail: tcpdump는 네트워크 패킷 캡처 도구이다. -c 10은 10개 패킷 후 종료, -nn은 DNS/포트 역방향 조회를
    생략한다. host와 port 필터로 특정 트래픽만 선별 캡처할 수 있다.
  verify:
    type: output_contains
    expect: tcpdump
    field: stdout
    semantic:
      intent: tcpdump HTTP 캡처 — sudo tcpdump -c 10 -i any host 10.20.30.80 and port
        3000 -nn. -c 10 패킷 제한 + -nn DNS/포트 역방향 생략. BPF 필터 host+port.
      success_criteria:
      - tcpdump 키워드
      - -c 10 + host + port 3000 필터
      - -nn 옵션
      acceptable_methods:
      - "sudo tcpdump -c 10 -i any host IP and port 3000 -nn (수기 baseline)."
      - "tshark -f 'BPF' -c 10."
      - "Wireshark GUI capture filter."
      - "tcpflow -i any host IP port 3000."
      - "dumpcap -f BPF -c 10."
      - "ngrep -d any -W byline."
      - "termshark TUI."
      - "Bastion AI 패킷 캡처 orchestrator."
      negative_signs:
      - BPF 필터 없음
      - -c 패킷 제한 없음
  target_vm: attacker
- order: 2
  instruction: tcpdump로 HTTP 요청/응답의 ASCII 내용을 캡처하라. {{WEB_IP}}:3000에 대한 트래픽을 5개 패킷만
    캡처하라.
  hint: |
    -A 옵션은 패킷 내용을 ASCII로 출력한다.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 5 -A -i any host 10.20.30.80 and port 3000 -nn 2>&1 | head -50
    2) 미설치: sudo apt install -y tcpdump curl
    3) 실패/대안:
       - tshark -V (verbose 디코드)
       - Wireshark Follow TCP Stream
       - tcpflow -c (콘솔 ASCII)
       - ngrep -W byline -d any "GET|POST" port 3000
       - tcpdump -X (HEX+ASCII 동시)
    4) 검증: GET/Host/User-Agent 평문. HTTPS 필요성. CWE-319.
  category: analysis
  points: 10
  answer: curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 5 -A -i any
    host 10.20.30.80 and port 3000 -nn 2>&1 | head -50
  answer_detail: -A 옵션은 패킷 페이로드를 ASCII 텍스트로 출력한다. HTTP는 평문 프로토콜이므로 URL, 헤더, 쿠키, 폼
    데이터 등이 모두 노출된다. 이것이 HTTPS가 필수인 이유이다.
  verify:
    type: output_contains
    expect: tcpdump
    field: stdout
    semantic:
      intent: HTTP 평문 ASCII — curl 백그라운드 + sudo tcpdump -c 5 -A 패킷 ASCII 출력. HTTP
        URL/헤더/쿠키/폼 평문 노출 → HTTPS 필수성 증명.
      success_criteria:
      - tcpdump 키워드
      - -A ASCII 출력
      - curl 백그라운드 + tcpdump
      acceptable_methods:
      - "sudo tcpdump -c 5 -A (수기 baseline)."
      - "tshark -V verbose."
      - "Wireshark Follow TCP Stream."
      - "tcpflow -c."
      - "ngrep -W byline -d any."
      - "tcpdump -X (HEX+ASCII)."
      - "termshark TUI."
      - "Bastion AI 평문 스니퍼 orchestrator."
      negative_signs:
      - -A 없음
      - HTTP 평문 맥락 없음
  target_vm: attacker
- order: 3
  instruction: ARP 테이블을 확인하여 실습 네트워크의 MAC 주소 매핑을 조사하라.
  hint: |
    arp -a 또는 ip neigh 명령으로 ARP 캐시를 확인한다.

    📎 도구 우선순위 (힌트):
    1) 우선: ip neigh show && echo '---' && arp -a
    2) 미설치: sudo apt install -y iproute2 net-tools
    3) 실패/대안:
       - arp-scan --localnet
       - netdiscover -r 10.20.30.0/24 -P
       - nmap -sn -PR 10.20.30.0/24 (ARP ping)
       - fping -a -g 10.20.30.0/24
       - python scapy ARPing
    4) 검증: 동일 MAC → 여러 IP = 스푸핑 징후.
  category: recon
  points: 10
  answer: ip neigh show && echo '---' && arp -a 2>/dev/null
  answer_detail: ARP(Address Resolution Protocol) 테이블은 IP와 MAC 주소의 매핑을 저장한다. ARP 스푸핑은
    이 매핑을 조작하여 트래픽을 가로채는 기법이다. 정상 MAC 주소를 먼저 기록해두면 변조를 탐지할 수 있다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: ARP 테이블 조회 — ip neigh show + arp -a. IP ↔ MAC 매핑 조사. ARP 스푸핑 기준선. 동일
        MAC → 여러 IP 매핑 시 스푸핑 징후.
      success_criteria:
      - 10.20.30 키워드
      - ip neigh 또는 arp -a
      - MAC 매핑 조회
      acceptable_methods:
      - "ip neigh show + arp -a (수기 baseline)."
      - "arp-scan --localnet."
      - "netdiscover -r."
      - "nmap -sn -PR (ARP ping)."
      - "fping -a -g."
      - "scapy ARPing()."
      - "Wireshark ARP 디스플레이 필터."
      - "Bastion AI ARP 자산 audit."
      negative_signs:
      - ARP 조회 없음
      - ARP 스푸핑 맥락 없음
  target_vm: attacker
- order: 4
  instruction: nmap을 사용하여 실습 네트워크(10.20.30.0/24)의 모든 호스트의 MAC 주소를 수집하라.
  hint: |
    nmap -sn 옵션은 호스트 발견 시 MAC 주소도 표시한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo nmap -sn 10.20.30.0/24
    2) 미설치: sudo apt install -y nmap
    3) 실패/대안:
       - arp-scan -l (자동 인터페이스)
       - netdiscover -r 10.20.30.0/24
       - fping -a -g 10.20.30.0/24
       - masscan --ping
       - rustscan -a 10.20.30.0/24 -- -sn
       - scapy ARPing("10.20.30.0/24")
    4) 검증: MAC + 벤더 OUI + IP 매핑.
  category: recon
  points: 10
  answer: sudo nmap -sn 10.20.30.0/24
  answer_detail: MAC 주소 수집은 네트워크 자산 목록 작성과 ARP 스푸핑 탐지의 기초이다. 같은 MAC 주소가 여러 IP에 매핑되면
    ARP 스푸핑이 진행 중일 수 있다.
  verify:
    type: output_contains
    expect: Nmap scan report
    field: stdout
    semantic:
      intent: nmap MAC 수집 — sudo nmap -sn 10.20.30.0/24. 호스트 발견 + MAC 주소 수집 (동일 서브넷에서
        ARP로 MAC 확인). 자산 목록 + ARP 스푸핑 탐지 기초.
      success_criteria:
      - Nmap scan report 키워드
      - nmap -sn + /24
      - MAC 주소 맥락
      acceptable_methods:
      - "sudo nmap -sn /24 (수기 baseline)."
      - "arp-scan -l."
      - "netdiscover -r."
      - "fping -a -g."
      - "masscan --ping."
      - "rustscan -a /24 -- -sn."
      - "scapy ARPing()."
      - "Bastion AI 자산 발견 orchestrator."
      negative_signs:
      - -sn 없음
      - MAC 수집 맥락 없음
  target_vm: attacker
- order: 5
  instruction: tcpdump를 사용하여 ARP 패킷을 캡처하라. 네트워크에서 ARP 요청과 응답을 10개 관찰하라.
  hint: |
    tcpdump arp 필터를 사용한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo tcpdump -c 10 -i any arp -nn
    2) 미설치: sudo apt install -y tcpdump
    3) 실패/대안:
       - tshark -Y arp -c 10
       - Wireshark display filter 'arp'
       - arpwatch 데몬 (변화 모니터)
       - arping -c 5 + tcpdump
       - scapy sniff(filter='arp', count=10)
    4) 검증: who-has / is-at + 비정상 gratuitous ARP. T1557.002.
  category: analysis
  points: 10
  answer: sudo tcpdump -c 10 -i any arp -nn
  answer_detail: ARP 패킷 캡처는 네트워크 모니터링의 기본이다. 비정상적으로 많은 ARP 응답(gratuitous ARP)이 관찰되면
    ARP 스푸핑 공격이 진행 중일 수 있다.
  verify:
    type: output_contains
    expect: ARP
    field: stdout
    semantic:
      intent: ARP 패킷 캡처 — sudo tcpdump -c 10 -i any arp -nn. ARP 요청/응답 관찰. 비정상 gratuitous
        ARP 탐지 기초 (DAI 판단).
      success_criteria:
      - ARP 키워드
      - tcpdump arp 필터
      - -c 10 제한
      acceptable_methods:
      - "sudo tcpdump -i any arp -nn (수기 baseline)."
      - "tshark -Y arp."
      - "Wireshark 'arp' 필터."
      - "arpwatch 데몬."
      - "arping + tcpdump."
      - "scapy sniff(filter='arp')."
      - "Suricata ARP 룰."
      - "Bastion AI ARP 변화 탐지 orchestrator."
      negative_signs:
      - arp 필터 없음
      - ARP 스푸핑 탐지 맥락 없음
  target_vm: attacker
- order: 6
  instruction: DNS 조회 패킷을 tcpdump로 캡처하라. dig 명령으로 DNS 쿼리를 발생시키면서 동시에 캡처하라.
  hint: |
    tcpdump port 53 필터를 사용하고, 별도 터미널에서 dig를 실행한다.

    📎 도구 우선순위 (힌트):
    1) 우선: dig google.com @8.8.8.8 > /dev/null 2>&1 & sudo tcpdump -c 4 -i any port 53 -nn 2>&1 | head -20
    2) 미설치: sudo apt install -y tcpdump dnsutils
    3) 실패/대안:
       - tshark -Y dns -f "port 53" -c 4
       - Wireshark dns.flags 필터
       - dnstop -l 5 eth0
       - scapy sniff(filter='udp port 53')
       - dnschef + 캡처
       - host -v / nslookup
    4) 검증: question/answer + UDP 평문. DNSSEC 필요성. T1557.002.
  category: analysis
  points: 10
  answer: dig google.com @8.8.8.8 > /dev/null 2>&1 & sudo tcpdump -c 4 -i any port
    53 -nn 2>&1 | head -20
  answer_detail: DNS 쿼리는 기본적으로 UDP 53번 포트를 사용하며 평문으로 전송된다. DNS 스푸핑은 이 쿼리에 대해 위조된 응답을
    먼저 보내 피해자를 악성 사이트로 유도하는 공격이다.
  verify:
    type: output_contains
    expect: '53'
    field: stdout
    semantic:
      intent: DNS 쿼리 캡처 — dig google.com @8.8.8.8 백그라운드 + sudo tcpdump -c 4 port 53.
        UDP 53 평문 → DNS 스푸핑 위험. DNSSEC 필요성.
      success_criteria:
      - 53 키워드
      - port 53 필터
      - dig + tcpdump 동시
      acceptable_methods:
      - "sudo tcpdump port 53 (수기 baseline)."
      - "tshark -Y dns -f 'port 53'."
      - "Wireshark dns.flags 필터."
      - "dnstop -l 5."
      - "scapy sniff(filter='udp port 53')."
      - "dnschef + 캡처."
      - "host -v + 캡처."
      - "Bastion AI DNS 평문 분석 orchestrator."
      negative_signs:
      - port 53 없음
      - DNS 스푸핑 맥락 없음
  target_vm: attacker
- order: 7
  instruction: scapy(python3)를 사용하여 커스텀 ICMP 패킷을 생성하고 {{WEB_IP}}에 전송하라.
  hint: |
    scapy의 IP()/ICMP() 레이어를 조합한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo python3 -c "from scapy.all import *; pkt=IP(dst='10.20.30.80')/ICMP(); resp=sr1(pkt, timeout=3, verbose=0); print(f'src:{resp.src} TTL:{resp.ttl}')"
    2) 미설치: sudo apt install -y python3-scapy
    3) 실패/대안:
       - hping3 -1 10.20.30.80 (--icmp)
       - ping -c 3 -t 64 10.20.30.80
       - nping --icmp --icmp-type 8 10.20.30.80
       - python3 raw socket SOCK_RAW
       - fping 10.20.30.80
    4) 검증: ICMP echo reply + TTL.
  category: exploit
  points: 10
  answer: 'sudo python3 -c "from scapy.all import *; pkt=IP(dst=''10.20.30.80'')/ICMP();
    resp=sr1(pkt, timeout=3, verbose=0); print(f''Response from: {resp.src}, TTL:
    {resp.ttl}'') if resp else print(''No response'')"'
  answer_detail: scapy는 Python 기반의 패킷 조작 도구로, 임의의 네트워크 패킷을 생성/전송/수신할 수 있다. ARP 스푸핑,
    SYN 플러드, 패킷 위조 등 다양한 네트워크 공격 시뮬레이션에 사용된다.
  verify:
    type: output_contains
    expect: Response
    field: stdout
    semantic:
      intent: scapy ICMP 커스텀 패킷 — python3 scapy + IP(dst='10.20.30.80')/ICMP() + sr1
        timeout:3 + resp TTL/src. 임의 패킷 생성/전송. 네트워크 공격 시뮬 기반.
      success_criteria:
      - Response 키워드
      - scapy IP/ICMP + sr1
      - TTL 확인
      acceptable_methods:
      - "scapy IP()/ICMP() + sr1 (수기 baseline)."
      - "hping3 -1 (ICMP)."
      - "ping -c 3."
      - "nping --icmp --icmp-type 8."
      - "fping."
      - "python raw SOCK_RAW."
      - "C 자작 ICMP packet."
      - "Bastion AI 패킷 위조 orchestrator."
      negative_signs:
      - scapy 없음
      - ICMP 맥락 없음
  target_vm: attacker
- order: 8
  instruction: scapy를 사용하여 ARP 요청 패킷을 생성하고 {{WEB_IP}}의 MAC 주소를 확인하라.
  hint: |
    ARP(pdst='타겟IP') 패킷을 Ether(dst='ff:ff:ff:ff:ff:ff')와 조합한다.

    📎 도구 우선순위 (힌트):
    1) 우선: sudo python3 -c "from scapy.all import *; ans,_=srp(Ether(dst='ff:ff:ff:ff:ff:ff')/ARP(pdst='10.20.30.80'), timeout=3, verbose=0); [print(f'IP:{r[1].psrc} MAC:{r[1].hwsrc}') for r in ans]"
    2) 미설치: sudo apt install -y python3-scapy
    3) 실패/대안:
       - arping -c 1 10.20.30.80
       - arp-scan 10.20.30.80
       - nmap -sn -PR 10.20.30.80
       - arpspoof -i eth0 -t (단순 송신)
       - bettercap arp.spoof
    4) 검증: hwsrc / vendor OUI. T1557.002.
  category: exploit
  points: 10
  answer: 'sudo python3 -c "from scapy.all import *; ans,_=srp(Ether(dst=''ff:ff:ff:ff:ff:ff'')/ARP(pdst=''10.20.30.80''),
    timeout=3, verbose=0); [print(f''IP: {r[1].psrc}, MAC: {r[1].hwsrc}'') for r in
    ans]"'
  answer_detail: ARP 요청을 브로드캐스트로 전송하면 대상 호스트가 자신의 MAC 주소로 응답한다. 이 메커니즘을 악용하여 위조된 ARP
    응답을 보내면 트래픽 가로채기가 가능하다.
  verify:
    type: output_contains
    expect: 'MAC:'
    field: stdout
    semantic:
      intent: scapy ARP 요청 — python3 scapy + Ether(dst='ff:ff:ff:ff:ff:ff')/ARP(pdst='10.20.30.80')
        + srp + hwsrc (MAC). 브로드캐스트 ARP → MAC 응답. ARP 스푸핑 기반 메커니즘.
      success_criteria:
      - 'MAC: 키워드'
      - Ether(dst=ff:...)/ARP(pdst)
      - srp 브로드캐스트
      acceptable_methods:
      - "scapy srp + Ether/ARP brd (수기 baseline)."
      - "arping -c 1."
      - "arp-scan IP."
      - "nmap -sn -PR."
      - "arpspoof."
      - "bettercap arp.spoof."
      - "ettercap -T -M arp."
      - "Bastion AI ARP 검증 orchestrator."
      negative_signs:
      - Ether/ARP 없음
      - 브로드캐스트 맥락 없음
  target_vm: attacker
- order: 9
  instruction: tcpdump로 HTTP 트래픽을 pcap 파일로 저장하라. /tmp/capture.pcap에 20개 패킷을 저장하라.
  hint: |
    -w 옵션으로 pcap 파일에 저장한다.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 20 -i any host 10.20.30.80 -w /tmp/capture.pcap; echo 'Captured:' && tcpdump -r /tmp/capture.pcap | wc -l
    2) 미설치: sudo apt install -y tcpdump
    3) 실패/대안:
