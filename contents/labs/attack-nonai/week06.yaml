lab_id: attack-nonai-week06
title: 네트워크 공격 (Network Attacks)
version: non-ai
course: attack-nonai
week: 6
description: ARP 스푸핑, DNS 스푸핑, MITM(중간자 공격), 패킷 스니핑 등 네트워크 계층의 공격 기법을 실습한다. tcpdump,
  arpspoof, ettercap 등의 도구를 활용한다.
difficulty: medium
duration_minutes: 120
objectives:
- ARP/DNS 스푸핑의 원리를 이해하고 실습한다
- tcpdump를 사용하여 네트워크 트래픽을 캡처하고 분석한다
- MITM 공격의 위험성과 대응 방안(TLS, DNSSEC)을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: tcpdump를 사용하여 {{WEB_IP}}으로 향하는 HTTP 트래픽(포트 3000)을 캡처하라. 10개 패킷만 캡처하라.
  hint: tcpdump -c 옵션으로 캡처 수를 제한하고 host와 port 필터를 사용한다
  category: analysis
  points: 10
  answer: sudo tcpdump -c 10 -i any host 10.20.30.80 and port 3000 -nn
  answer_detail: tcpdump는 네트워크 패킷 캡처 도구이다. -c 10은 10개 패킷 후 종료, -nn은 DNS/포트 역방향 조회를
    생략한다. host와 port 필터로 특정 트래픽만 선별 캡처할 수 있다.
  verify:
    type: output_contains
    expect: tcpdump
    field: stdout
  target_vm: attacker
- order: 2
  instruction: tcpdump로 HTTP 요청/응답의 ASCII 내용을 캡처하라. {{WEB_IP}}:3000에 대한 트래픽을 5개 패킷만
    캡처하라.
  hint: -A 옵션은 패킷 내용을 ASCII로 출력한다
  category: analysis
  points: 10
  answer: curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 5 -A -i any
    host 10.20.30.80 and port 3000 -nn 2>&1 | head -50
  answer_detail: -A 옵션은 패킷 페이로드를 ASCII 텍스트로 출력한다. HTTP는 평문 프로토콜이므로 URL, 헤더, 쿠키, 폼
    데이터 등이 모두 노출된다. 이것이 HTTPS가 필수인 이유이다.
  verify:
    type: output_contains
    expect: tcpdump
    field: stdout
  target_vm: attacker
- order: 3
  instruction: ARP 테이블을 확인하여 실습 네트워크의 MAC 주소 매핑을 조사하라.
  hint: arp -a 또는 ip neigh 명령으로 ARP 캐시를 확인한다
  category: recon
  points: 10
  answer: ip neigh show && echo '---' && arp -a 2>/dev/null
  answer_detail: ARP(Address Resolution Protocol) 테이블은 IP와 MAC 주소의 매핑을 저장한다. ARP 스푸핑은
    이 매핑을 조작하여 트래픽을 가로채는 기법이다. 정상 MAC 주소를 먼저 기록해두면 변조를 탐지할 수 있다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
  target_vm: attacker
- order: 4
  instruction: nmap을 사용하여 실습 네트워크(10.20.30.0/24)의 모든 호스트의 MAC 주소를 수집하라.
  hint: nmap -sn 옵션은 호스트 발견 시 MAC 주소도 표시한다
  category: recon
  points: 10
  answer: sudo nmap -sn 10.20.30.0/24
  answer_detail: MAC 주소 수집은 네트워크 자산 목록 작성과 ARP 스푸핑 탐지의 기초이다. 같은 MAC 주소가 여러 IP에 매핑되면
    ARP 스푸핑이 진행 중일 수 있다.
  verify:
    type: output_contains
    expect: Nmap scan report
    field: stdout
  target_vm: attacker
- order: 5
  instruction: tcpdump를 사용하여 ARP 패킷을 캡처하라. 네트워크에서 ARP 요청과 응답을 10개 관찰하라.
  hint: tcpdump arp 필터를 사용한다
  category: analysis
  points: 10
  answer: sudo tcpdump -c 10 -i any arp -nn
  answer_detail: ARP 패킷 캡처는 네트워크 모니터링의 기본이다. 비정상적으로 많은 ARP 응답(gratuitous ARP)이 관찰되면
    ARP 스푸핑 공격이 진행 중일 수 있다.
  verify:
    type: output_contains
    expect: ARP
    field: stdout
  target_vm: attacker
- order: 6
  instruction: DNS 조회 패킷을 tcpdump로 캡처하라. dig 명령으로 DNS 쿼리를 발생시키면서 동시에 캡처하라.
  hint: tcpdump port 53 필터를 사용하고, 별도 터미널에서 dig를 실행한다
  category: analysis
  points: 10
  answer: dig google.com @8.8.8.8 > /dev/null 2>&1 & sudo tcpdump -c 4 -i any port
    53 -nn 2>&1 | head -20
  answer_detail: DNS 쿼리는 기본적으로 UDP 53번 포트를 사용하며 평문으로 전송된다. DNS 스푸핑은 이 쿼리에 대해 위조된 응답을
    먼저 보내 피해자를 악성 사이트로 유도하는 공격이다.
  verify:
    type: output_contains
    expect: '53'
    field: stdout
  target_vm: attacker
- order: 7
  instruction: scapy(python3)를 사용하여 커스텀 ICMP 패킷을 생성하고 {{WEB_IP}}에 전송하라.
  hint: scapy의 IP()/ICMP() 레이어를 조합한다
  category: exploit
  points: 10
  answer: 'sudo python3 -c "from scapy.all import *; pkt=IP(dst=''10.20.30.80'')/ICMP();
    resp=sr1(pkt, timeout=3, verbose=0); print(f''Response from: {resp.src}, TTL:
    {resp.ttl}'') if resp else print(''No response'')"'
  answer_detail: scapy는 Python 기반의 패킷 조작 도구로, 임의의 네트워크 패킷을 생성/전송/수신할 수 있다. ARP 스푸핑,
    SYN 플러드, 패킷 위조 등 다양한 네트워크 공격 시뮬레이션에 사용된다.
  verify:
    type: output_contains
    expect: Response
    field: stdout
  target_vm: attacker
- order: 8
  instruction: scapy를 사용하여 ARP 요청 패킷을 생성하고 {{WEB_IP}}의 MAC 주소를 확인하라.
  hint: ARP(pdst='타겟IP') 패킷을 Ether(dst='ff:ff:ff:ff:ff:ff')와 조합한다
  category: exploit
  points: 10
  answer: 'sudo python3 -c "from scapy.all import *; ans,_=srp(Ether(dst=''ff:ff:ff:ff:ff:ff'')/ARP(pdst=''10.20.30.80''),
    timeout=3, verbose=0); [print(f''IP: {r[1].psrc}, MAC: {r[1].hwsrc}'') for r in
    ans]"'
  answer_detail: ARP 요청을 브로드캐스트로 전송하면 대상 호스트가 자신의 MAC 주소로 응답한다. 이 메커니즘을 악용하여 위조된 ARP
    응답을 보내면 트래픽 가로채기가 가능하다.
  verify:
    type: output_contains
    expect: 'MAC:'
    field: stdout
  target_vm: attacker
- order: 9
  instruction: tcpdump로 HTTP 트래픽을 pcap 파일로 저장하라. /tmp/capture.pcap에 20개 패킷을 저장하라.
  hint: -w 옵션으로 pcap 파일에 저장한다
  category: analysis
  points: 10
  answer: curl -s http://10.20.30.80:3000/ > /dev/null & sudo tcpdump -c 20 -i any
    host 10.20.30.80 -w /tmp/capture.pcap 2>&1; echo 'Captured:' && tcpdump -r /tmp/capture.pcap
    2>/dev/null | wc -l
  answer_detail: pcap(Packet Capture) 파일은 네트워크 패킷의 표준 저장 형식이다. Wireshark, tshark 등의
    도구로 상세 분석할 수 있으며, 포렌식 증거로도 활용된다.
  verify:
    type: output_contains
    expect: 'Captured:'
    field: stdout
  target_vm: attacker
- order: 10
  instruction: nmap의 --traceroute 옵션을 사용하여 {{WEB_IP}}까지의 경로를 매핑하고, 중간 네트워크 장비를 식별하라.
  hint: nmap --traceroute 옵션은 포트 스캔과 동시에 경로를 추적한다
  category: recon
  points: 10
  answer: sudo nmap --traceroute -sn 10.20.30.80
  answer_detail: 네트워크 경로 매핑은 MITM 공격의 가능한 위치를 식별하는 데 유용하다. 중간 hop에 위치한 공격자는 모든 트래픽을
    가로챌 수 있으므로, 네트워크 토폴로지 파악은 보안 분석에 필수적이다.
  verify:
    type: output_contains
    expect: TRACEROUTE
    field: stdout
  target_vm: attacker
- order: 11
  instruction: netstat 또는 ss 명령으로 현재 시스템의 네트워크 연결 상태를 확인하라. ESTABLISHED 상태의 연결만 필터링하라.
  hint: ss -tn state established 명령을 사용한다
  category: analysis
  points: 10
  answer: ss -tn state established
  answer_detail: 현재 활성 연결을 확인하면 의심스러운 외부 연결(C2 서버, 데이터 유출)을 탐지할 수 있다. 알려지지 않은 외부 IP로의
    연결은 침해 지표(IoC)가 될 수 있다.
  verify:
    type: output_contains
    expect: ESTAB
    field: stdout
  target_vm: attacker
- order: 12
  instruction: hping3를 사용하여 SYN Flood 공격을 시뮬레이션하라. {{WEB_IP}}:3000에 소스 IP를 랜덤으로 설정하여
    5개 SYN 패킷만 전송하라.
  hint: hping3 --rand-source -S -p 포트 -c 횟수 옵션을 사용한다
  category: exploit
  points: 10
  answer: sudo hping3 --rand-source -S -p 3000 -c 5 10.20.30.80
  answer_detail: SYN Flood는 소스 IP를 위조하여 대량의 SYN 패킷을 보내 서버의 TCP 연결 큐를 고갈시키는 DoS 공격이다.
    서버는 SYN-ACK를 보내고 ACK를 기다리지만, 위조된 IP에서는 응답이 오지 않는다.
  verify:
    type: output_contains
    expect: hping
    field: stdout
  target_vm: attacker
- order: 13
  instruction: nftables 방화벽 서버({{SECU_IP}})의 방화벽 규칙을 원격으로 확인하라. SSH로 접속하여 nft list
    ruleset 명령을 실행하라.
  hint: sshpass를 사용하여 원격 명령을 실행한다
  category: analysis
  points: 10
  answer: ssh ccc@10.20.30.1 'sudo nft list ruleset' 2>/dev/null | head -40
  answer_detail: 방화벽 규칙을 확인하면 네트워크 공격의 성공 가능성을 평가할 수 있다. 허용/차단 정책, NAT 규칙, rate limiting
    설정 등이 네트워크 공격에 대한 방어 수준을 결정한다.
  verify:
    type: output_contains
    expect: table
    field: stdout
  target_vm: attacker
- order: 14
  instruction: scapy를 사용하여 TCP SYN 패킷을 수동으로 생성하고 {{WEB_IP}}:3000에 전송하라. SYN-ACK 응답의
    시퀀스 번호를 확인하라.
  hint: IP()/TCP(dport=3000, flags='S') 패킷을 생성한다
  category: exploit
  points: 15
  answer: 'sudo python3 -c "from scapy.all import *; pkt=IP(dst=''10.20.30.80'')/TCP(dport=3000,
    flags=''S''); resp=sr1(pkt, timeout=3, verbose=0); print(f''Response flags: {resp[TCP].flags},
    Seq: {resp[TCP].seq}, Ack: {resp[TCP].ack}'') if resp else print(''No response'')"'
  answer_detail: TCP handshake의 각 단계를 수동으로 수행하면 프로토콜의 동작 원리를 깊이 이해할 수 있다. 시퀀스 번호 예측은
    TCP 하이재킹 공격의 핵심이며, 현대 OS는 ISN(Initial Sequence Number) 랜덤화로 방어한다.
  verify:
    type: output_contains
    expect: Response
    field: stdout
  target_vm: attacker
- order: 15
  instruction: 네트워크 공격 실습 결과를 /tmp/network_attack_report.txt에 정리하라. 수행한 공격, 캡처된 데이터,
    방어 방안을 포함하라.
  hint: 각 공격 기법의 결과와 대응 방안을 정리한다
  category: analysis
  points: 15
  answer: 'echo -e ''=== Network Attack Report ===\n\n[Attacks Performed]\n1. Packet
    Sniffing: HTTP 평문 트래픽 캡처 성공\n2. ARP Recon: MAC 주소 매핑 수집\n3. SYN Flood Simulation:
    5 packets sent\n4. Custom Packet Crafting: scapy 활용\n\n[Findings]\n- HTTP(3000)
    트래픽 평문 노출\n- ARP 캐시 조작 가능\n- 방화벽(secu) nftables 규칙 확인\n\n[Recommendations]\n1.
    HTTPS 강제 적용 (HSTS)\n2. Dynamic ARP Inspection(DAI) 활성화\n3. SYN Cookie 또는 rate
    limiting 적용\n4. 802.1X 네트워크 인증 도입'' > /tmp/network_attack_report.txt && cat /tmp/network_attack_report.txt'
  answer_detail: 네트워크 공격 보고서는 공격 유형, 영향 범위, 캡처된 증거, 계층별 대응 방안을 포함해야 한다. L2(ARP 보안),
    L3(IP 필터링), L4(SYN 보호), L7(TLS/HTTPS) 각 계층의 방어를 제시한다.
  verify:
    type: output_contains
    expect: Network Attack Report
    field: stdout
  target_vm: attacker
