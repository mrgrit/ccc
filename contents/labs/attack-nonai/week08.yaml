lab_id: attack-nonai-week08
title: 권한 상승 (Privilege Escalation)
version: non-ai
course: attack-nonai
week: 8
description: Linux 시스템에서의 로컬 권한 상승 기법을 실습한다. SUID 악용, sudo 미스컨피규레이션, cron 조작, 커널 익스플로잇 등 다양한 경로를 통해 root
  권한을 획득한다.
difficulty: medium
duration_minutes: 120
objectives:
- Linux 권한 상승의 다양한 벡터를 이해한다
- LinPEAS 등 자동화 도구로 권한 상승 경로를 탐색할 수 있다
- SUID, sudo, cron 기반 권한 상승을 수행할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 서버({{WEB_IP}})에 SSH로 접속하여 현재 사용자의 권한과 그룹 정보를 확인하라.
  hint: id, whoami, groups 명령을 사용한다
  category: recon
  points: 5
  answer: id && whoami && groups
  answer_detail: 현재 사용자의 UID, GID, 소속 그룹을 파악하는 것은 권한 상승의 첫 단계이다. docker, lxd, disk 등의 그룹에 속하면 컨테이너 탈출이나
    직접적인 권한 상승이 가능할 수 있다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
    semantic:
      intent: 사용자 권한 확인 — id && whoami && groups. UID/GID/그룹 식별. docker/lxd/disk 그룹 소속 시 컨테이너 탈출/직접 권한
        상승 가능. LPE 1단계.
      success_criteria:
      - uid= 키워드
      - id + whoami + groups 조합
      - LPE 맥락
      acceptable_methods:
      - id + whoami + groups
      - cat /proc/self/status
      - python os.geteuid
      negative_signs:
      - id 없음
      - LPE 맥락 없음
      - 그룹 조사 없음
  target_vm: web
- order: 2
  instruction: web 서버에서 sudo -l 명령으로 현재 사용자가 sudo로 실행할 수 있는 명령을 확인하라.
  hint: sudo -l은 현재 사용자의 sudo 권한을 표시한다
  category: recon
  points: 10
  answer: echo 1 | sudo -S -l 2>/dev/null
  answer_detail: sudo -l 출력에서 NOPASSWD 항목이나 와일드카드(*) 사용, 위험한 바이너리(vim, python, bash 등)가 허용되면 즉시 root 셸을
    획득할 수 있다. GTFOBins에서 각 바이너리의 sudo 권한 상승 방법을 확인한다.
  verify:
    type: output_contains
    expect: sudo
    field: stdout
    semantic:
      intent: sudo -l 권한 확인 — echo 1 | sudo -S -l. NOPASSWD + 와일드카드 + 위험 바이너리(vim/python/bash) → GTFOBins
        즉시 root 셸. CWE-732.
      success_criteria:
      - sudo 키워드
      - sudo -l 실행
      - NOPASSWD 조사 맥락
      acceptable_methods:
      - sudo -l
      - linpeas.sh + sudo check
      - GTFOBins 조회
      negative_signs:
      - sudo -l 없음
      - GTFOBins 맥락 없음
  target_vm: web
- order: 3
  instruction: web 서버에서 SUID 비트가 설정된 모든 바이너리를 검색하고, 비정상적인 항목을 식별하라.
  hint: find / -perm -4000 -type f로 검색한다
  category: recon
  points: 10
  answer: find / -perm -4000 -type f 2>/dev/null | sort
  answer_detail: 표준 SUID 바이너리(passwd, ping, su 등) 외에 비정상적인 SUID 파일이 있으면 권한 상승에 악용할 수 있다. /usr/bin/python3,
    /usr/bin/vim 등이 SUID이면 즉시 root 획득이 가능하다.
  verify:
    type: output_contains
    expect: /usr
    field: stdout
    semantic:
      intent: SUID 바이너리 검색 — find / -perm -4000 -type f 2>/dev/null | sort. SUID 비트 (4000) = 소유자 권한 실행.
        비표준 SUID (python3/vim) → 즉시 root. GTFOBins 매칭.
      success_criteria:
      - /usr 키워드
      - find / -perm -4000 -type f
      - 정렬 출력
      acceptable_methods:
      - find -perm -4000
      - find -u+s
      - linpeas.sh
      negative_signs:
      - -perm -4000 없음
      - SUID 맥락 없음
  target_vm: web
- order: 4
  instruction: web 서버에서 world-writable 파일을 검색하라. 특히 root가 소유한 world-writable 파일에 주목하라.
  hint: find / -writable -type f로 검색한다
  category: recon
  points: 10
  answer: find / -writable -type f -not -path "/proc/*" -not -path "/sys/*" 2>/dev/null | head -20
  answer_detail: world-writable 파일은 모든 사용자가 수정할 수 있다. root 소유의 스크립트나 설정 파일이 world-writable이면 악성 코드를 삽입하여
    root 권한으로 실행시킬 수 있다.
  verify:
    type: output_contains
    expect: /
    field: stdout
    semantic:
      intent: World-writable 파일 — find / -writable -type f -not -path '/proc/*' -not -path '/sys/*' |
        head -20. root 소유 + world-writable 스크립트 → 악성 코드 삽입 시 root 실행. /proc/sys 제외.
      success_criteria:
      - / 경로 키워드
      - find -writable + -not -path proc/sys
      - world-writable 맥락
      acceptable_methods:
      - find -writable -not -path
      - find -perm -o+w
      - linpeas.sh
      negative_signs:
      - -writable 없음
      - proc/sys 제외 없음
  target_vm: web
- order: 5
  instruction: web 서버의 /etc/passwd 파일에서 셸 접근이 가능한 사용자를 나열하라.
  hint: /bin/bash 또는 /bin/sh가 설정된 사용자를 필터링한다
  category: recon
  points: 10
  answer: grep -E "/bin/(bash|sh|zsh)$" /etc/passwd
  answer_detail: 셸 접근이 가능한 사용자 계정은 잠재적 공격 대상이다. 불필요한 계정에 셸이 할당되어 있으면 해당 계정을 침해하여 시스템에 접근할 수 있다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: 셸 접근 사용자 — grep -E '/bin/(bash|sh|zsh)$' /etc/passwd. 셸 할당 계정 = 잠재적 공격 대상. 불필요 계정 nologin
        권장.
      success_criteria:
      - root 키워드
      - /etc/passwd + /bin/(bash|sh|zsh)
      - grep -E 정규식
      acceptable_methods:
      - grep /etc/passwd
      - 'awk -F: ''$7 ~ /bash/'''
      - getent passwd
      negative_signs:
      - /etc/passwd 없음
      - 셸 필터 없음
  target_vm: web
- order: 6
  instruction: web 서버의 crontab과 cron 디렉토리를 검사하여 root로 실행되는 예약 작업을 찾아라.
  hint: /etc/crontab, /etc/cron.d/, /var/spool/cron/ 디렉토리를 확인한다
  category: recon
  points: 10
  answer: cat /etc/crontab 2>/dev/null; echo ---; ls -la /etc/cron.d/ 2>/dev/null; echo ---; ls -la /var/spool/cron/crontabs/
    2>/dev/null
  answer_detail: root 권한으로 실행되는 cron 작업이 일반 사용자가 수정할 수 있는 스크립트를 참조하면, 해당 스크립트에 리버스 셸을 삽입하여 root 권한을 획득할
    수 있다.
  verify:
    type: output_contains
    expect: cron
    field: stdout
    semantic:
      intent: cron 작업 검사 — cat /etc/crontab + ls /etc/cron.d/ + ls /var/spool/cron/crontabs/. root cronjob
        + writable 스크립트 → LPE 벡터. 5분마다 root로 실행되는 스크립트가 가장 위험.
      success_criteria:
      - cron 키워드
      - /etc/crontab + /etc/cron.d + /var/spool/cron/crontabs
      - 3개 경로 조사
      acceptable_methods:
      - cat + ls cron 경로
      - systemctl list-timers
      - pspy 프로세스 모니터
      negative_signs:
      - cron 경로 조사 없음
      - root cronjob 맥락 없음
  target_vm: web
- order: 7
  instruction: web 서버에서 capabilities가 설정된 바이너리를 검색하라. 특수 capability는 SUID와 유사한 권한 상승에 사용될 수 있다.
  hint: getcap -r / 명령으로 검색한다
  category: recon
  points: 10
  answer: getcap -r / 2>/dev/null
  answer_detail: Linux Capabilities는 root 권한을 세분화한 시스템이다. cap_setuid, cap_dac_override 등이 설정된 바이너리는 SUID
    없이도 권한 상승이 가능하다. python3에 cap_setuid가 있으면 os.setuid(0)으로 root가 된다.
  verify:
    type: output_contains
    expect: cap
    field: stdout
    semantic:
      intent: Linux Capabilities — getcap -r / 2>/dev/null. cap_setuid/cap_dac_override 등 = SUID 없이 권한
        상승. python3 cap_setuid → os.setuid(0). GTFOBins Capability 섹션 참조.
      success_criteria:
      - cap 키워드
      - getcap -r /
      - Linux Capabilities 맥락
      acceptable_methods:
      - getcap -r
      - linpeas capability check
      - GTFOBins Capabilities
      negative_signs:
      - getcap 없음
      - cap_setuid 맥락 없음
  target_vm: web
- order: 8
  instruction: web 서버에서 /etc/shadow 파일의 읽기 권한을 확인하라. 일반 사용자가 읽을 수 있으면 오프라인 크래킹이 가능하다.
  hint: ls -la /etc/shadow로 권한을 확인한다
  category: analysis
  points: 10
  answer: ls -la /etc/shadow; cat /etc/shadow 2>/dev/null || echo "Permission denied (normal)"
  answer_detail: /etc/shadow는 보통 root만 읽을 수 있다(640). 권한 미스컨피규레이션으로 일반 사용자가 읽을 수 있으면 비밀번호 해시를 추출하여 john이나
    hashcat으로 오프라인 크래킹할 수 있다.
  verify:
    type: output_contains
    expect: shadow
    field: stdout
    semantic:
      intent: /etc/shadow 권한 확인 — ls -la /etc/shadow + cat /etc/shadow. 기본 640 (root만 읽기). 미스컨피그로 읽기 가능
        시 → 해시 추출 → john/hashcat 오프라인 크래킹. CVE-2023-4911 등.
      success_criteria:
      - shadow 키워드
      - ls -la /etc/shadow + cat 시도
      - 권한 조사
      acceptable_methods:
      - ls -la + cat
      - stat /etc/shadow
      - linpeas file check
      negative_signs:
      - shadow 권한 조사 없음
      - 해시 크래킹 맥락 없음
  target_vm: web
- order: 9
  instruction: web 서버에서 환경변수에 민감한 정보(비밀번호, API 키)가 포함되어 있는지 확인하라.
  hint: env 또는 printenv 명령으로 환경변수를 확인한다
  category: recon
  points: 10
  answer: env | grep -iE "(pass|key|secret|token|api)"; echo '---'; cat /proc/1/environ 2>/dev/null |
    tr "\0" "\n" | grep -iE "(pass|key|secret)" || echo "Cannot read /proc/1/environ"
  answer_detail: 환경변수에 저장된 비밀번호나 API 키는 프로세스 목록이나 /proc/PID/environ에서 노출될 수 있다. Docker 컨테이너 환경에서는 특히 환경변수를
    통한 시크릿 전달이 위험하다.
  verify:
    type: output_contains
    expect:
    - '---'
    - 검증
    field: stdout
    semantic:
      intent: 환경변수 민감 정보 — env | grep -iE '(pass|key|secret|token|api)' + /proc/1/environ. Docker 컨테이너
        환경변수 시크릿 위험. CWE-526 Sensitive Info in Environment Variables.
      success_criteria:
      - '--- 또는 검증 키워드'
      - env + /proc/1/environ
      - pass/key/secret/token/api grep
      acceptable_methods:
      - env + grep
      - cat /proc/$PID/environ
      - linpeas env check
      negative_signs:
      - env 조사 없음
      - Docker/컨테이너 맥락 없음
  target_vm: web
- order: 10
  instruction: web 서버에서 PATH 하이재킹 가능성을 확인하라. 현재 사용자가 쓸 수 있는 디렉토리가 PATH에 포함되어 있는지 확인하라.
  hint: echo $PATH로 PATH를 확인하고, 각 디렉토리의 쓰기 권한을 확인한다
  category: analysis
  points: 10
  answer: IFS=:; for d in $PATH; do echo -n "$d -> "; test -w "$d" && echo "WRITABLE" || echo "not writable";
    done
  answer_detail: PATH 하이재킹은 상대 경로로 명령을 실행하는 프로그램을 악용한다. PATH의 앞쪽에 있는 writable 디렉토리에 같은 이름의 악성 바이너리를 배치하면,
    원래 명령 대신 악성 코드가 실행된다.
  verify:
    type: output_contains
    expect: ->
    field: stdout
    semantic:
      intent: PATH 하이재킹 — IFS=:; for d in $PATH; do test -w $d && WRITABLE || not writable. PATH 앞쪽 writable
        디렉토리 + 같은 이름 악성 바이너리 → 원래 명령 대신 실행. LPE 벡터.
      success_criteria:
      - -> 키워드
      - 'IFS=: + for d in $PATH'
      - writable 테스트
      acceptable_methods:
      - 'IFS=: + test -w'
      - find $PATH -writable
      - linpeas PATH check
      negative_signs:
      - $PATH 순회 없음
      - writable 테스트 없음
  target_vm: web
- order: 11
  instruction: web 서버에서 Docker 소켓이 일반 사용자에게 접근 가능한지 확인하라. docker.sock 접근이 가능하면 컨테이너 탈출로 root를 획득할 수 있다.
  hint: ls -la /var/run/docker.sock 또는 docker ps를 실행한다
  category: analysis
  points: 10
  answer: ls -la /var/run/docker.sock 2>/dev/null; docker ps 2>/dev/null || echo "Docker not accessible"
  answer_detail: Docker 소켓에 접근 가능하면 docker run --privileged -v /:/mnt alpine chroot /mnt 명령으로 호스트 파일시스템에
    root 접근이 가능하다. docker 그룹은 사실상 root와 동등한 권한이다.
  verify:
    type: output_contains
    expect: docker
    field: stdout
    semantic:
      intent: Docker 소켓 접근 — ls -la /var/run/docker.sock + docker ps. 접근 가능 시 docker run --privileged
        -v /:/mnt alpine chroot /mnt → 호스트 root. docker 그룹 = 사실상 root.
      success_criteria:
      - docker 키워드
      - /var/run/docker.sock + docker ps
      - 컨테이너 탈출 맥락
      acceptable_methods:
      - ls /var/run/docker.sock
      - docker ps
      - deepce.sh 컨테이너 열거
      negative_signs:
      - docker.sock 없음
      - 컨테이너 탈출 맥락 없음
  target_vm: web
- order: 12
  instruction: web 서버의 네트워크 서비스 중 내부 전용 서비스(localhost에만 바인딩)를 확인하라. 포트 포워딩으로 접근할 수 있는 서비스를 식별하라.
  hint: ss -tlnp 명령으로 리스닝 포트를 확인한다
  category: recon
  points: 10
  answer: ss -tlnp 2>/dev/null
  answer_detail: 127.0.0.1에만 바인딩된 서비스는 외부에서 직접 접근할 수 없지만, SSH 포트 포워딩(-L)이나 proxychains를 통해 접근할 수 있다. 내부
    전용 관리 인터페이스가 대상이 될 수 있다.
  verify:
    type: output_contains
    expect: LISTEN
    field: stdout
    semantic:
      intent: 내부 전용 서비스 — ss -tlnp 2>/dev/null. 127.0.0.1 바인딩 서비스 식별. SSH -L 포워딩 또는 proxychains 접근. 내부
        관리 인터페이스 공격 벡터.
      success_criteria:
      - LISTEN 키워드
      - ss -tlnp
      - 내부 서비스 맥락
      acceptable_methods:
      - ss -tlnp
      - netstat -tlnp
      - lsof -i -P
      negative_signs:
      - LISTEN 없음
      - 127.0.0.1 내부 서비스 맥락 없음
  target_vm: web
- order: 13
  instruction: web 서버에서 history 파일을 확인하여 이전에 실행된 명령 중 민감한 정보(비밀번호, 토큰)가 포함된 것이 있는지 찾아라.
  hint: .bash_history 파일을 확인한다
  category: recon
  points: 10
  answer: cat ~/.bash_history 2>/dev/null | grep -iE "(pass|key|secret|token|mysql|psql)" | head -10;
    echo ---; cat ~/.bash_history 2>/dev/null | tail -20
  answer_detail: 셸 히스토리 파일에는 이전에 실행된 명령이 저장되며, 비밀번호가 명령줄에 포함된 경우가 많다(mysql -u root -p패스워드). 침해 후 히스토리
    검사는 추가 자격 증명을 수집하는 중요한 기법이다.
  verify:
    type: output_contains
    expect:
    - '---'
    - 없음
    field: stdout
    semantic:
      intent: 셸 히스토리 조사 — cat ~/.bash_history | grep -iE '(pass|key|secret|token|mysql|psql)' + tail -20.
        'mysql -u root -ppwd' 같은 명령줄 비밀번호. Post-exploitation 자격 증명 수집.
      success_criteria:
      - '--- 또는 없음 키워드'
      - .bash_history + grep
      - 자격 증명 수집 맥락
      acceptable_methods:
      - cat ~/.bash_history
      - grep history 파일
      - linpeas history check
      negative_signs:
      - history 조사 없음
      - 자격 증명 맥락 없음
  target_vm: web
- order: 14
