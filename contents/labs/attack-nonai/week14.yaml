      - "Credential Harvester 실 워크플로 — echo '=== Credential Harvester 6 단계 ==='; echo '1. setoolkit (Kali 터미널)'; echo '2. 메뉴 1 (Social-Engineering)'; echo '3. 메뉴 2 (Website Attack)'; echo '4. 메뉴 3 (Credential Harvester)'; echo '5. 메뉴 2 (Site Cloner)'; echo '6. POST URL 입력 → 클론 대상 URL 입력 (예: https://accounts.google.com)'; echo '결과: /var/www/html/index.html 에 클론 + 캡처 시 /var/www/html/harvester_*.txt'. 출력: 6 단계 + 산출 파일 경로. 해석: SET 가 페이지 HTML 다운 → form action 만 자기 IP:80 으로 변조 → 캡처. 실 환경 X (lab 가상). MITRE T1056.003."
