lab_id: attack-nonai-week14
title: 소셜 엔지니어링 (Social Engineering)
version: non-ai
course: attack-nonai
week: 14
description: 기술적 취약점이 아닌 인간의 심리적 취약점을 공격하는 소셜 엔지니어링 기법을 학습한다. 피싱 이메일 분석, SET(Social Engineering Toolkit)
  활용, 프리텍스팅 등을 실습한다.
difficulty: medium
duration_minutes: 120
objectives:
- 소셜 엔지니어링의 주요 기법(피싱, 프리텍스팅, 베이팅)을 이해한다
- 피싱 이메일을 분석하고 탐지 지표를 식별할 수 있다
- 조직의 보안 인식 교육 프로그램을 설계할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 소셜 엔지니어링의 6가지 영향력 원칙(치알디니)을 정리하고, 각 원칙이 피싱에 어떻게 활용되는지 설명하라.
  hint: 상호성, 일관성, 사회적 증거, 호감, 권위, 희소성의 6가지이다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Cialdini 6 Principles of Influence ===\n\n1. Reciprocity (상호성)\n   Phishing:
    "We gave you a free gift, now verify your account"\n\n2. Commitment/Consistency (일관성)\n   Phishing:
    "You started the verification, please complete it"\n\n3. Social Proof (사회적 증거)\n   Phishing: "50,000
    users already updated their info"\n\n4. Liking (호감)\n   Phishing: Impersonate trusted colleague/friend\n\n5.
    Authority (권위)\n   Phishing: "IT Department requires immediate password reset"\n\n6. Scarcity (희소성)\n   Phishing:
    "Your account will be suspended in 24 hours"'''
  answer_detail: 치알디니의 6가지 영향력 원칙은 소셜 엔지니어링의 이론적 기반이다. 공격자는 이 원칙을 조합하여 피해자의 비합리적 행동(링크 클릭, 정보 제공)을 유도한다.
    보안 인식 교육에서 이 원칙을 가르치면 방어력이 향상된다.
  verify:
    type: output_contains
    expect: Cialdini
    field: stdout
    semantic:
      intent: 치알디니 6원칙 — Reciprocity(상호성)/Commitment(일관성)/Social Proof(사회적 증거)/Liking(호감)/Authority(권위)/Scarcity(희소성).
        Cialdini 'Influence' 1984. 각 원칙의 피싱 활용 사례 — 권위(IT 부서)/희소성(24시간 만료)/사회적 증거(5만 사용자) 등.
      success_criteria:
      - Cialdini 키워드
      - 6개 원칙 모두 (한글/영어 명칭)
      - 각 원칙별 피싱 예시
      acceptable_methods:
      - "Cialdini 6 원칙 영문/한글 매트릭스 (printf) — printf '%-25s | %-12s | %s\\n' 'Reciprocity' '상호성' '무료선물→정보요구'; printf '%-25s | %-12s | %s\\n' 'Commitment' '일관성' '소단계→큰 요청'; printf '%-25s | %-12s | %s\\n' 'Social Proof' '사회적 증거' '수만 사용자 동참'; printf '%-25s | %-12s | %s\\n' 'Liking' '호감' '동료/친구 사칭'; printf '%-25s | %-12s | %s\\n' 'Authority' '권위' 'IT부서/CEO 사칭'; printf '%-25s | %-12s | %s\\n' 'Scarcity' '희소성' '24시간 만료'. 출력: 정렬된 6열 표. 해석: Cialdini 'Influence' (1984) 6 원칙 — 영문 정명·한글 번역·피싱 활용 1줄 요약. printf 정렬은 강의 슬라이드 그대로 학생 자체 출력 가능."
      - "원칙별 피싱 예시 6개 echo — for p in 'Reciprocity:무료 보안 점검 후 인증 요청' 'Commitment:1단계 동의 후 3단계 인증 강요' 'SocialProof:동료 50,000명 이미 업데이트' 'Liking:이름·취미 일치 동료 사칭' 'Authority:IT보안팀 김부장 명의' 'Scarcity:24시간 후 계정 잠금'; do echo \"[Cialdini] $p\"; done. 출력: 6 줄 [Cialdini] 원칙명:실제 피싱 문구. 해석: 원칙 → 실 캠페인 변환 능력. 단순 암기가 아니라 임의 메일을 6원칙으로 분류·생성 가능 여부 검증."
      - "MITRE PRE T1598 매핑 — echo 'MITRE ATT&CK PRE — TA0043 Reconnaissance'; echo '  T1598 Phishing for Information'; echo '    .001 Spearphishing Service (소셜미디어)'; echo '    .002 Spearphishing Attachment'; echo '    .003 Spearphishing Link'; echo '    .004 Spearphishing Voice (vishing)'; echo 'T1589 Gather Victim Identity Information'. 출력: PRE-ATT&CK Tactic·Technique·Sub-technique 계층. 해석: 6원칙은 심리학·MITRE는 행위 분류 — 두 모델을 cross-walk 해야 위협 탐지 룰 (KQL/Sigma) 매핑 가능."
      - "Hadnagy SE Framework 6 단계 — echo '=== Hadnagy SE Engagement Lifecycle ==='; echo '1. Information Gathering (OSINT — LinkedIn/GitHub/WHOIS)'; echo '2. Pretext Development (페르소나·신분 제작)'; echo '3. Attack Plan (공격 벡터 선택 — phishing/vishing/in-person)'; echo '4. Attack Execution (실행 + 대화 적응)'; echo '5. Reporting (deliverable + 통계)'; echo '6. After-action Review (학습 반영)'. 출력: 6단계 라이프사이클. 해석: Cialdini = 무엇을 활용 / Hadnagy = 어떻게 캠페인 운영. 둘 다 알아야 SE 평가 (PTES SE) 수행 가능."
      - "NIST SP 800-50 / SP 800-100 인용 — echo 'NIST SP 800-50: Building IT Security Awareness'; echo '  - Identify Awareness Needs'; echo '  - Develop Awareness Plan'; echo '  - Implement (training + testing)'; echo '  - Maintain (refresh + metrics)'; echo 'NIST SP 800-100 §8 Awareness & Training'. 출력: 미국 정부 표준 4 phase 인용. 해석: 본 lab 의 Cialdini 학습 → 조직 awareness 프로그램 (step 14 연계) 의 표준 framework. 미국 연방기관·계약사 의무."
      - "KISA / 한국 가이드 인용 — echo '[KISA 보호나라]'; echo '  - 사이버 위협 인텔리전스 — phishing 동향 월간 보고서'; echo '  - 모의 훈련 가이드 (분기/연 1회 권고)'; echo '  - 안전한 비밀번호 가이드 (6원칙 미끼 차단)'; echo '[금융보안원] 전자금융감독규정 §17 — 임직원 정보보호 교육 의무'; echo '[개인정보위] 개정 개인정보보호법 §29 — 안전조치의무 + 인적 통제'. 출력: 한국 법·기관 가이드. 해석: 한국 BPO/금융권 → 의무 적용. 6원칙 인식교육 = 법규 준수 산출물."
      - "Case study — Twitter 2020 hack (vishing) — echo '[Case 2020-07] Twitter 0day 사건'; echo '  공격자: 17세 청소년 + 협력자 3명'; echo '  Pretext: IT 헬프데스크 사칭 (Authority + Liking)'; echo '  대상: VPN 인증 담당 직원'; echo '  결과: 130 계정 탈취 (Obama/Biden/Apple)'; echo '  손실: BTC 12만 USD + 시총 \\$130 억 휘청'; echo '  교훈: Authority + Urgency 결합은 MFA 도 우회'. 출력: 실 사건 타임라인. 해석: 6원칙이 추상 이론이 아니라 실 피해 케이스. 학생이 임의 BPO 환경에 적용 시 반드시 Authority+Liking 우선 방어 통제 설계."
      - "각 원칙별 방어 통제 매핑 — echo 'Reciprocity → 출처 확인 + 무료 제공 의심'; echo 'Commitment → 단계별 검증 (MFA push fatigue 차단)'; echo 'Social Proof → 출처 검증 + 통계 위조 의심'; echo 'Liking → 신원 검증 (콜백 + 영상 회의)'; echo 'Authority → out-of-band 검증 (직통번호 콜백)'; echo 'Scarcity → 시간 압박 거부 + IT 직접 확인'. 출력: 6 원칙 → 6 방어 통제 1:1. 해석: 인식교육의 핵심 = 원칙별 차단 액션. 일률적 '의심하기' 가 아니라 원칙별 SOP. step 14 (인식교육 프로그램) 의 실 자료."
      negative_signs:
      - 원칙 4개 이하 (6 원칙 모두 영문+한글 명시 필수)
      - 각 원칙별 피싱 예시 누락
      - MITRE PRE / Hadnagy / NIST / KISA 인용 0개
      - case study 없이 추상 이론만
      - 방어 통제 1:1 매핑 누락
      - 한글 또는 영문 단일 (이중표기 X)
  target_vm: attacker
- order: 2
  instruction: 피싱 이메일의 헤더를 분석하는 방법을 시연하라. 발신자 위조를 탐지하기 위한 SPF, DKIM, DMARC 확인 방법을 설명하라.
  hint: 이메일 헤더의 Received, Return-Path, Authentication-Results를 분석한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Phishing Email Header Analysis ===\n\n[Key Headers to Check]\n1. From: vs Return-Path:
    (mismatch = suspicious)\n2. Received: chain (trace actual path)\n3. Authentication-Results:\n   -
    SPF: pass/fail (sender IP authorized?)\n   - DKIM: pass/fail (email signed by domain?)\n   - DMARC:
    pass/fail (policy alignment?)\n\n[Red Flags]\n- From shows "bank@secure.com" but Return-Path is "x@evil.com"\n-
    Received chain shows foreign IP\n- SPF: fail -> sender IP not authorized\n- No DKIM signature\n- Reply-To
    different from From\n\n[Verification Commands]\ndig TXT _dmarc.example.com  # Check DMARC policy\ndig
    TXT example.com         # Check SPF record\n\n[Example SPF Check]'' && dig TXT google.com +short 2>/dev/null
    | head -3'
  answer_detail: 이메일 헤더 분석은 피싱 탐지의 핵심 기술이다. SPF는 발신 IP를 검증하고, DKIM은 이메일 무결성을 보장하며, DMARC는 SPF/DKIM 검증
    실패 시의 정책을 정의한다. 세 가지 모두 통과해야 신뢰할 수 있다.
  verify:
    type: output_contains
    expect: Phishing Email Header
    field: stdout
    semantic:
      intent: '이메일 헤더 분석 — From vs Return-Path / Received chain / Authentication-Results: SPF(IP)/DKIM(서명)/DMARC(정책
        정렬). dig TXT _dmarc.domain + dig TXT domain. RFC 7489 DMARC + RFC 7208 SPF + RFC 6376 DKIM.'
      success_criteria:
      - Phishing Email Header 키워드
      - SPF + DKIM + DMARC 3종 모두
      - dig TXT 검증 명령
      acceptable_methods:
      - "From vs Return-Path 비교 — echo 'From: bank@secure-portal.com'; echo 'Return-Path: <x@evil-site.tk>'; echo 'Reply-To: x@evil-site.tk'; echo '⚠️ MISMATCH: From 도메인 ≠ Return-Path 도메인 → 위조 확정'. 출력: 3 헤더 + 분석. 해석: From 은 표시용·Return-Path 는 SMTP 봉투 (실 발신). 발송지 위조의 가장 빠른 검출. RFC 5321/5322. 정상 메일은 From 도메인 = Return-Path 도메인."
      - "Received chain 분석 (역방향) — echo 'Received: from mail.evil.tk ([45.33.xx.xx]) by mx.target.com'; echo 'Received: from internal-relay.target.com by mx.target.com'; echo 'Received: from gateway.target.com by internal-relay'; echo '↑ 분석: 첫 Received(맨 위)가 마지막 hop. 외부 IP 45.33.xx.xx 발견 → 정상이면 target.com 만 등장'. 출력: chain + 외부 IP. 해석: Received 헤더는 역순 (위가 최신). 역방향으로 추적 → 정상은 자사 인프라만 / 위조는 외부 IP."
      - "SPF 검증 — dig TXT example.com +short | grep -i spf 또는 dig TXT example.com +short. 출력: 'v=spf1 include:_spf.google.com ~all' 형식. 해석: v=spf1 = SPF 버전 / include = 위임 / ~all = soft fail / -all = hard fail. 메일 헤더의 Authentication-Results: spf=pass 와 발신 IP 비교 — pass = 발신 IP 가 SPF 인가. RFC 7208."
      - "DKIM 검증 — dig TXT default._domainkey.example.com +short; echo '헤더: DKIM-Signature: v=1; a=rsa-sha256; d=example.com; s=default; bh=...; b=...'. 출력: 공개키 (p=MIGfMA0G...) + 서명 헤더. 해석: DKIM = 발신 도메인의 개인키 서명. 수신 서버가 d=domain의 selector._domainkey TXT 의 공개키로 검증. 변조·재발송 차단. RFC 6376."
      - "DMARC 검증 — dig TXT _dmarc.example.com +short. 출력: 'v=DMARC1; p=reject; rua=mailto:dmarc@example.com; pct=100' 형식. 해석: p=none/quarantine/reject = SPF/DKIM 실패 시 정책 / pct = 적용 비율 / rua = 보고서 수신 주소. p=reject + pct=100 = 가장 엄격. RFC 7489. 한국 .gov 도메인 의무."
      - "Authentication-Results 헤더 파싱 — echo 'Authentication-Results: mx.google.com;'; echo '  spf=pass smtp.mailfrom=bank@secure.com;'; echo '  dkim=fail header.i=@bank.com;'; echo '  dmarc=fail (p=NONE) header.from=bank.com'. 출력: 3 결과. 해석: spf pass + dkim fail = 봉투 발신은 인가지만 본문 변조. dmarc fail + p=NONE = 정책 미적용 → quarantine 안됨. 학생은 3 결과를 모두 읽어야."
      - "M3AAWG / Microsoft Header Analyzer 인용 — echo 'M3AAWG (Messaging Anti-Abuse Working Group)'; echo '  - Sender Authentication BCP'; echo '  - DKIM key rotation 권고 6개월'; echo 'Microsoft Message Header Analyzer:'; echo '  https://mha.azurewebsites.net/'; echo '  - Outlook .msg 파일 업로드 → SPF/DKIM/DMARC 자동 분석'. 출력: 표준 + 도구. 해석: 학생이 헤더 raw 를 직접 못 읽어도 MS 도구로 입문 → 점진 학습. M3AAWG 는 industry BCP."
      - "Red flag + 방어 체크리스트 — echo '[Red Flag]'; echo '1. From ≠ Return-Path'; echo '2. Reply-To 외부 도메인'; echo '3. Received chain 외부 IP'; echo '4. SPF/DKIM/DMARC 1개 이상 fail'; echo '5. X-Mailer 비표준'; echo '[방어 통제]'; echo '- 게이트웨이 (Mimecast/Proofpoint) DMARC reject 강제'; echo '- 사용자 헤더 분석 1-day 교육'; echo '- 의심 메일 #phishing-report 즉시 신고 채널'. 출력: 5 red flag + 3 통제. 해석: 학생이 임의 메일 받았을 때 즉시 적용 가능한 SOP. step 14 (인식교육) 연계."
      negative_signs:
      - SPF/DKIM/DMARC 3종 중 1개 이하 (3 모두 dig 명령 + RFC 명시 필수)
      - Red flag 예시 (From≠Return-Path / 외부 IP) 누락
      - dig TXT 검증 명령 없음
      - Authentication-Results 헤더 파싱 X
      - Received chain 역방향 분석 X
      - M3AAWG / MS Header Analyzer 도구 인용 X
  target_vm: attacker
- order: 3
  instruction: 피싱 URL을 분석하는 기법을 시연하라. URL의 도메인, 경로, 파라미터에서 악성 지표를 식별하라.
  hint: URL의 각 구성 요소를 분해하여 분석한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Phishing URL Analysis ===\n\n[Suspicious URL Patterns]\n1. Typosquatting: g00gle.com,
    googIe.com (I vs l)\n2. Subdomain abuse: google.com.evil-site.com\n3. URL shortener: bit.ly/xxxxx
    (hides real destination)\n4. IP address: http://192.168.1.1/login\n5. Long subdomain: secure-login-google-verify.evil.com\n6.
    Unicode/Punycode: xn--ggle-55da.com (looks like google.com)\n\n[Analysis Steps]\n1. Hover over link
    (don\''t click)\n2. Check actual domain (rightmost before TLD)\n3. Verify SSL certificate issuer\n4.
    Check URL reputation: VirusTotal, URLhaus\n5. Use sandbox: any.run, hybrid-analysis\n\n[Python URL
    Parser]'' && python3 -c "from urllib.parse import urlparse; u=urlparse(''https://secure-login.google.com.evil-site.com/verify?user=admin&token=abc'');
    print(f''Scheme: {u.scheme}''); print(f''Netloc: {u.netloc}''); print(f''Actual domain: evil-site.com'');
    print(f''Path: {u.path}''); print(f''Params: {u.query}'')"'
  answer_detail: URL 분석에서 가장 중요한 것은 실제 도메인을 식별하는 것이다. TLD 바로 앞의 도메인이 실제 소유자이다. google.com.evil-site.com에서
    실제 도메인은 evil-site.com이다.
  verify:
    type: output_contains
    expect: Phishing URL Analysis
    field: stdout
    semantic:
      intent: 피싱 URL 분석 — Typosquatting(g00gle.com) / Subdomain abuse(google.com.evil.com) / URL shortener
        / IP 주소 / 긴 서브도메인 / Unicode Punycode(xn--ggle-55da). VirusTotal/URLhaus 평판. python urlparse 분해.
        TLD 바로 앞이 실제 도메인.
      success_criteria:
      - Phishing URL Analysis 키워드
      - 악성 패턴 4개 이상
      - urlparse + 평판 도구
      acceptable_methods:
      - "Typosquatting 탐지 — echo '[Typosquatting]'; echo '  google.com (정상)'; echo '  g00gle.com (0/o)'; echo '  googIe.com (대문자 I/소문자 l)'; echo '  goog1e.com (1/l)'; echo '  gooogle.com (오타)'; echo '[Levenshtein 거리]'; python3 -c \"def lev(a,b):\\n  if not a:return len(b)\\n  if not b:return len(a)\\n  return min(lev(a[1:],b[1:])+(a[0]!=b[0]),lev(a[1:],b)+1,lev(a,b[1:])+1)\\nprint(lev('google.com','g00gle.com'))\". 출력: 정상 vs 변종 5종 + Levenshtein 2. 해석: 1~3 거리는 typosquatting 전형. dnstwist 같은 도구 자동화 가능. T1583.001 도메인 등록 방어용 baseline."
