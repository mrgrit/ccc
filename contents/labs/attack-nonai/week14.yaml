- order: 14
  instruction: 조직의 보안 인식 교육 프로그램을 설계하라. 대상, 내용, 빈도, 평가 방법을 포함하라.
  hint: 역할별 맞춤 교육과 정기적 훈련을 포함한다
  category: analysis
  points: 15
  answer: 'echo -e ''=== Security Awareness Training Program ===\n\n[Target Groups]\n1. 전 직원: 기본 보안 인식\n2.
    관리자: 비즈니스 이메일 사기(BEC) 대응\n3. IT 부서: 기술적 피싱 분석\n4. 신규 입사자: 온보딩 보안 교육\n\n[Curriculum]\n1. 피싱 이메일 식별
    (실습)\n2. 안전한 비밀번호 관리\n3. USB/물리적 보안\n4. 사내 보안 정책 숙지\n5. 사고 보고 절차\n\n[Frequency]\n- 전 직원: 분기 1회 교육
    + 월 1회 모의 피싱\n- 신규 입사: 입사 1주 내 필수\n- 갱신: 연 1회 전체 교육\n\n[Metrics]\n- 모의 피싱 클릭률 (목표: <5%)\n- 사고 보고율
    (목표: >80%)\n- 교육 이수율 (목표: 100%)\n- 퀴즈 통과율 (목표: >90%)'''
  answer_detail: 효과적인 보안 인식 교육은 일회성 강의가 아닌 지속적인 프로그램이어야 한다. 모의 피싱으로 실전 경험을 제공하고, 게임화(gamification)로 참여도를
    높이며, 정량적 지표로 개선을 추적한다.
  verify:
    type: output_contains
    expect: Security Awareness Training
    field: stdout
    semantic:
      intent: 보안 인식 교육 프로그램 — Targets(전직원/관리자 BEC/IT/신규) + Curriculum(피싱/비번/USB/정책/보고) + Frequency(전직원
        분기 1회 + 월 모의피싱) + Metrics(클릭률<5%/보고율>80%/이수율 100%/퀴즈>90%). NIST SP 800-50 + ISO 27002 6.3.
      success_criteria:
