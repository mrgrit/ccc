      - "법적·윤리적 사용 범위 — echo '[합법 사용 — 명시적 권한 必]'; echo '1. 자사 모의피싱 (인사·법무 사전 승인)'; echo '2. 침투테스트 RoE (계약서 명시)'; echo '3. 보안 awareness 분기 캠페인'; echo '4. 학술 연구 IRB 승인'; echo '[불법 — 정통망법 §48 위반]'; echo '1. 외부 조직·개인 대상'; echo '2. 권한 없이 클론 + 발송'; echo '3. 형사처벌 5 년/5천만 + 민사 손배'. 출력: 합법 4 + 불법 3. 해석: SET 자체는 합법 도구. 사용 맥락이 합법성 결정. 본 lab 가상 환경 학습 한정."
      negative_signs:
