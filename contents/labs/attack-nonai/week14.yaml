      - "Curriculum 5 모듈 — echo '=== Module 1: Phishing Identification ==='; echo '  - From/Return-Path 분석 (실습)'; echo '  - URL 분해 (urlparse 사용)'; echo '  - SPF/DKIM/DMARC 결과 읽기'; echo '=== Module 2: 비밀번호 ==='; echo '  - MFA + WebAuthn 강제'; echo '  - Password Manager (1Password/Bitwarden)'; echo '  - Passkey 도입'; echo '=== Module 3: USB / 물리 ==='; echo '  - 길거리 USB 절대 X'; echo '  - Tailgating 차단 의무'; echo '=== Module 4: 사내 SOP ==='; echo '  - #phishing-report 채널'; echo '  - IT 직통 X-XXXX (콜백)'; echo '=== Module 5: 사고 보고 ==='; echo '  - 무처벌 보고 문화'; echo '  - 즉시 + 상세 정보'. 출력: 5 모듈. 해석: 본 lab 학습 항목 = 모듈 1·3 의 실 자료."
