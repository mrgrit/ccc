- order: 11
  instruction: OSINT를 활용한 타겟 프로파일링을 시연하라. 공개된 정보만으로 가상의 대상 조직 정보를 수집하는 방법을 정리하라.
  hint: LinkedIn, GitHub, DNS, WHOIS 등의 공개 정보를 활용한다
  category: recon
  points: 10
  answer: 'echo -e ''=== OSINT Target Profiling ===\n\n[Information Sources]\n1. LinkedIn: 조직 구조, 직원 이름/직급,
    기술 스택\n2. GitHub: 소스코드, 이메일, API 키 노출\n3. DNS/WHOIS: 도메인 소유자, 네임서버, IP 대역\n4. Shodan/Censys: 공개 서비스,
    배너, 인증서\n5. Google Dork: site:target.com filetype:pdf\n6. Social Media: 내부 사진(배지, 화면), 이벤트\n7. Job
    Postings: 사용 기술, 보안 도구 정보\n\n[Tools]\n- theHarvester, Maltego, Recon-ng\n- Sherlock (username search)\n-
    SpiderFoot (automated OSINT)\n---\nWHOIS example: whois google.com'''
  answer_detail: OSINT는 소셜 엔지니어링의 사전 준비 단계로, 대상의 조직 구조, 직원 정보, 기술 스택을 파악한다. LinkedIn에서 직원 목록과 직급을 수집하고,
    이메일 패턴을 추출하여 타겟 피싱에 활용한다.
  verify:
    type: output_contains
    expect: OSINT Target Profiling
    field: stdout
    semantic:
      intent: 'OSINT 타겟 프로파일링 — LinkedIn(조직/직급) + GitHub(소스/이메일/키 노출) + DNS/WHOIS + Shodan/Censys + Google
        Dork(site:domain filetype:pdf) + 소셜미디어 + 채용공고. 도구: theHarvester/Maltego/Recon-ng/Sherlock/SpiderFoot.
        MITRE T1589 Gather Victim Identity.'
      success_criteria:
      - OSINT Target Profiling 키워드
      - 정보 소스 5개 이상
      - 도구 (theHarvester/Maltego 등) 명시
      acceptable_methods:
      - "WHOIS + DNS 정찰 — whois example.com 2>/dev/null | grep -iE 'registrar|registrant|created|expires|name server' | head -10 || echo '[가상] Registrar: GoDaddy / Created: 1997-09-15 / Name Server: ns1.google.com'; dig example.com ANY +short 2>/dev/null | head -10; dig MX example.com +short 2>/dev/null. 출력: 도메인 소유자·생성일·MX. 해석: WHOIS = 등록자 (개인정보 마스킹 가능) / DNS = 인프라. MX 레코드는 메일 게이트웨이 (Mimecast/Office365 등 식별). 평가 1차 정보."
      - "LinkedIn 직원 프로파일링 — echo '[수동 — LinkedIn People Search]'; echo '  https://www.linkedin.com/search/results/people/?company=COMPANY'; echo '[OSINT 도구]'; echo '  - linkedin2username (이메일 패턴 추론)'; echo '  - SpiderFoot LinkedIn module'; echo '  - phantombuster (자동 스크래핑)'; echo '[수집 정보]'; echo '  - 이름·직급·부서·기술스택'; echo '  - 입사·퇴사 시기 (재직증명)'; echo '  - 사진 (피싱 메일 첨부 사칭)'; echo '[이메일 패턴 추론]'; echo '  John Smith → john.smith / jsmith / john_s @company.com'. 출력: LinkedIn 흐름. 해석: 직원 200명 → 이메일 1차 list 자동 생성. spear-phishing 의 1단계."
      - "GitHub 비밀 노출 (truffleHog / gitleaks) — git clone https://github.com/example/repo /tmp/scan 2>/dev/null && trufflehog filesystem /tmp/scan 2>/dev/null || echo '[가상] truffleHog: AWS_ACCESS_KEY_ID found in commit abc123'; gitleaks detect --source /tmp/scan 2>/dev/null || echo '[가상] gitleaks: 12 secrets detected'; echo '[GitHub Search]'; echo '  https://github.com/search?q=org:COMPANY+password+filename:.env'; echo '  https://github.com/search?q=org:COMPANY+AKIA+filename:.aws'. 출력: 도구 + 검색. 해석: 직원 개인 GitHub 가 사내 코드·키 누출 통로. 정기 스캔 (truffleHog cron) 필수."
      - "Shodan / Censys (인프라 노출) — echo '[Shodan]'; curl -s 'https://api.shodan.io/shodan/host/search?key=YOUR_KEY&query=org:COMPANY' 2>/dev/null | head -10 || echo '[가상] 23 hosts: 192.168.1.10:22 (OpenSSH 7.4) / .11:443 (Apache 2.4.6)'; echo '[Censys]'; echo '  https://search.censys.io/'; echo '  search: example.com'; echo '  → 인증서·서비스·취약 버전'; echo '[FOFA (중국)]'; echo '  cn 인프라 + 동일 기능'. 출력: Shodan 검색. 해석: 공개 IP 의 모든 서비스 + 배너. Apache 2.4.6 = 2012 버전 (CVE 다수). 자사 인프라 정기 점검 필수."
      - "Google Dork (고급 검색) — echo '=== Google Dork — OSINT ==='; echo 'site:example.com filetype:pdf'; echo 'site:example.com filetype:xlsx confidential'; echo 'site:example.com inurl:admin'; echo 'site:example.com intitle:\"index of\"'; echo 'site:linkedin.com \"COMPANY\" \"engineer\"'; echo 'site:pastebin.com \"@example.com\"'; echo '[Google Hacking Database]'; echo '  https://www.exploit-db.com/google-hacking-database'. 출력: 6 dork. 해석: 공개 검색만으로 내부 문서·관리자 페이지 노출. 학생이 자사 도메인 dork 후 결과 확인 = 노출 점검 시작."
      - "theHarvester / Maltego / Recon-ng — echo '[theHarvester]'; theHarvester -d example.com -b google,linkedin,bing -l 100 2>/dev/null | head -20 || echo '[가상] Found 23 emails / 5 hosts / 2 IPs'; echo '[Maltego]'; echo '  - 그래프 시각화 (도메인→IP→직원→이메일)'; echo '  - Transform = OSINT 자동 모듈'; echo '[Recon-ng]'; echo '  recon-ng → workspaces create COMPANY → modules load recon/...'; echo '[SpiderFoot]'; echo '  - 200+ OSINT 모듈 자동 통합'; echo '  - 웹 UI + JSON export'. 출력: 4 도구 비교. 해석: theHarvester = 빠른 1차 / Maltego = 시각화 / SpiderFoot = 자동 통합. 표준 OSINT 스택."
      - "Sherlock (username 추적) — echo '[Sherlock]'; echo '  https://github.com/sherlock-project/sherlock'; echo 'sherlock johndoe 2>/dev/null | head -10 || echo \"[가상] Found on Twitter, GitHub, Reddit, LinkedIn (4/300 sites)\"'; echo '[활용]'; echo '  - 동일 닉네임 → 다른 SNS 계정 발견'; echo '  - 직원 사생활 정보 (취미/가족)'; echo '  - spear-phishing 개인화 (Liking 원칙)'. 출력: Sherlock 흐름. 해석: 사용자 닉네임 1개 → 300+ 사이트 자동 검색. 직원 personal life 까지 노출 → 정밀 spear-phishing."
      - "OSINT → spear-phishing 시나리오 — echo '=== OSINT 결과 활용 시나리오 ==='; echo '[수집]'; echo '  - LinkedIn: 김부장 (재무팀, 2010 입사)'; echo '  - GitHub: 가족사진 (딸 이름 노출)'; echo '  - Sherlock: Instagram (등산 취미)'; echo '  - Google Dork: 작년 재무보고서 PDF'; echo '[Spear-Phishing 메일]'; echo '  From: 등산 동호회 <hike@kor-mountain.com>'; echo '  Subject: 김부장님 — 작년 등산모임 사진'; echo '  본문: 딸 이름 + 작년 보고서 양식 + 첨부 PDF (악성)'; echo '[성공률] 일반 phish 5% → spear 35%'. 출력: 시나리오. 해석: OSINT 의 실 가치 = 개인화 → 신뢰 → 클릭. 본 lab 핵심 학습 포인트."
      negative_signs:
      - 정보 소스 (LinkedIn/GitHub/DNS/Shodan/Google Dork) 5개 미만
      - theHarvester/Maltego/SpiderFoot/Sherlock 등 도구 1개 미만
      - GitHub 비밀 노출 (truffleHog/gitleaks) 누락
      - Shodan / Censys 인프라 노출 미언급
      - OSINT → spear-phishing 활용 시나리오 누락
      - Google Dork 6 종 패턴 X
      - MITRE T1589 Gather Victim Identity 매핑 X
  target_vm: attacker
- order: 12
  instruction: 피싱 시뮬레이션(모의 피싱) 프로그램을 설계하라. 조직의 보안 인식을 측정하기 위한 테스트 계획을 작성하라.
  hint: GoPhish 등의 도구를 사용한 캠페인 설계이다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Phishing Simulation Plan ===\n\n[Tool: GoPhish]\n\n[Phase 1: Preparation]\n-
    Target list: HR 부서 직원 50명\n- Email template: 급여 명세서 확인 요청\n- Landing page: 사내 포털 로그인 페이지 복제\n- Tracking:
    오픈/클릭/자격증명 입력 추적\n\n[Phase 2: Execution]\n- Week 1: Level 1 (쉬운 탐지: 외부 도메인, 오타)\n- Week 3: Level 2
    (중간: 유사 도메인)\n- Week 5: Level 3 (어려움: 내부 발신 위장)\n\n[Phase 3: Metrics]\n- Email open rate\n- Link click
    rate\n- Credential submission rate\n- Report rate (신고 비율)\n\n[Phase 4: Training]\n- 클릭한 직원에게 즉시 교육
    페이지 표시\n- 전체 결과 보고 (익명화)\n- 분기별 반복 실시'''
  answer_detail: 모의 피싱은 조직의 보안 인식 수준을 객관적으로 측정하는 효과적인 방법이다. GoPhish는 오픈소스 피싱 시뮬레이션 도구로, 이메일 발송/추적/리포팅을
    자동화한다. 단계적 난이도 상승과 반복 훈련이 핵심이다.
  verify:
    type: output_contains
    expect: Phishing Simulation Plan
    field: stdout
    semantic:
      intent: GoPhish 모의 피싱 캠페인 — Phase1 준비(타겟/템플릿/랜딩/추적) + Phase2 실행(Level 1 외부 → Level 3 내부 위장) + Phase3
        지표(open/click/credential/report rate) + Phase4 즉시 교육 + 분기 반복.
      success_criteria:
      - Phishing Simulation Plan 키워드
      - GoPhish 또는 도구 명시
      - 지표 (open/click/report) 4개 이상
      acceptable_methods:
      - "GoPhish 설치·구동 — echo '[GoPhish 설치]'; echo '  wget https://github.com/gophish/gophish/releases/download/v0.12.1/gophish-v0.12.1-linux-64bit.zip'; echo '  unzip + ./gophish'; echo '  Admin UI: https://localhost:3333 (admin/gophish)'; echo '  Phishing server: http://localhost:80'; echo '[Docker 대안] docker run -d -p 3333:3333 -p 80:80 gophish/gophish'; echo '[설정 — config.json]'; echo '  - admin_server.listen_url: 0.0.0.0:3333'; echo '  - phish_server.listen_url: 0.0.0.0:80'. 출력: 설치 흐름. 해석: oss + Go binary. Docker 이미지 도 공식 제공. 회사 내부망 분리 운영."
      - "캠페인 4 단계 (Sending Profile/Template/Landing/Group) — echo '=== GoPhish 캠페인 구성 ==='; echo '[1] Sending Profile (SMTP)'; echo '  Host: smtp.gmail.com:587'; echo '  Username: phish-test@company.com'; echo '[2] Email Template'; echo '  Subject: [HR] 급여명세서 확인'; echo '  Body: HTML + {{.URL}} + {{.FirstName}}'; echo '[3] Landing Page'; echo '  사내 포털 클론 (Capture Submitted Data)'; echo '[4] Users & Groups'; echo '  CSV import — Email/First Name/Last Name'; echo '  HR 부서 50명'. 출력: 4 구성 + 예시. 해석: 4 구성요소 모두 사전 준비 → Campaign 시작 시 결합. {{.URL}} = 추적 변수."
      - "단계적 난이도 (Level 1→3) — echo '=== 분기 캠페인 — Level 1→3 ==='; echo '[Week 1: Level 1 - 쉬운]'; echo '  - 외부 도메인 (company-test.com)'; echo '  - 명백한 오타·문법'; echo '  - 일반 인사 (이름 X)'; echo '  - 목표 클릭률: <30%'; echo '[Week 3: Level 2 - 중간]'; echo '  - 유사 도메인 (compny.com)'; echo '  - 정상 문법 + 부서명 명시'; echo '  - 목표 클릭률: <15%'; echo '[Week 5: Level 3 - 어려운]'; echo '  - 자사 도메인 위장 (CEO 사칭)'; echo '  - 개인 OSINT 사용'; echo '  - 목표 클릭률: <5%'. 출력: 3 레벨. 해석: 점진 난이도 = 학습 효과 측정 가능. NIST SP 800-50 권고."
      - "추적 지표 (KPI) 4종 — echo '=== Phishing KPI ==='; printf '%-20s | %-10s | %s\\n' 'Metric' 'Target' '계산'; printf '%-20s | %-10s | %s\\n' 'Email Open Rate' '<60%' 'opened/sent'; printf '%-20s | %-10s | %s\\n' 'Link Click Rate' '<5%' 'clicked/sent'; printf '%-20s | %-10s | %s\\n' 'Credential Submit' '<2%' 'submitted/sent'; printf '%-20s | %-10s | %s\\n' 'Report Rate' '>30%' 'reported/sent'; echo '[Verizon DBIR 2024 평균]'; echo '  Open: 18% / Click: 4% / Report: 12%'. 출력: 4 KPI + 산업 평균. 해석: 4 지표 모두 추적. Report Rate 가 가장 중요 (인지+신고 능동 행위)."
      - "Microsoft Attack Simulator (M365) — echo '[Microsoft 365 Defender]'; echo '  - Attack Simulator (E5 라이센스)'; echo '  - 통합 — AzureAD + Outlook + Teams'; echo '  - 자동 — Conditional Access 위반 추적'; echo '[흐름]'; echo '  1. Defender Portal → Email & collaboration → Attack Simulator'; echo '  2. Simulation 종류 선택 (Credential Harvest/Drive-by/Malware)'; echo '  3. Payload 선택 (M365 라이브러리)'; echo '  4. Target group 선택 (AzureAD 자동 동기)'; echo '  5. 결과 → Power BI 대시보드'; echo '[장점] AAD 통합 + 자동 교육 모듈'. 출력: M365 흐름. 해석: M365 환경은 Attack Simulator 가 표준. GoPhish 와 비교 — 통합·자동·고가."
      - "KnowBe4 / Proofpoint Wombat — echo '[KnowBe4]'; echo '  - Phishing simulation + LMS (학습 관리)'; echo '  - PhishER (사용자 신고 자동 분류)'; echo '  - Industry benchmarking (업계 비교)'; echo '[Proofpoint Security Awareness (구 Wombat)]'; echo '  - 위협 인텔리전스 통합'; echo '  - 자동 적응 학습 (실패자 → 추가 교육)'; echo '[Cofense (구 PhishMe)]'; echo '  - Reporter 버튼 (Outlook 추가)'; echo '  - 신고 → 자동 분석 + IR 통합'. 출력: 3 상용 도구. 해석: 운영 팀이 작은 곳 = GoPhish + 무료 / 큰 조직 = KnowBe4. 도구 선택 기준 알아야."
      - "사용자 즉시 교육 페이지 — cat > /tmp/edu_page.html <<'EOF'\\n<!DOCTYPE html><html><head><title>피싱 시뮬레이션</title></head>\\n<body style=\"font-family:Arial;max-width:600px;margin:50px auto;padding:20px;background:#fee;\">\\n<h1>⚠️ 피싱 시뮬레이션입니다</h1>\\n<p>방금 클릭하신 링크는 IT 보안팀의 분기 모의피싱 훈련입니다.</p>\\n<p>실제 메일이었다면 비밀번호가 탈취됐을 것입니다.</p>\\n<h2>다음 번에 확인할 점</h2>\\n<ul><li>발신 도메인 (company-test.com vs company.com)</li>\\n<li>긴급성·권위 사용</li><li>외부 링크</li></ul>\\n<a href=\"https://intranet/phishing-quiz\">5분 퀴즈로 학습하기 →</a>\\n</body></html>\\nEOF\\necho '[OK] 즉시 교육 페이지'. 출력: HTML 교육 페이지. 해석: 클릭 즉시 교육 = 가장 효과적. 처벌 X (무처벌 보고 문화)."
      - "분기 보고 + 경영진 KPI — cat > /tmp/q1_report.md <<'EOF'\\n# 2026 Q1 Phishing Simulation Report\\n## Summary\\n- Sent: 1,200 emails (전 직원)\\n- Opened: 432 (36%)\\n- Clicked: 124 (10.3%) [목표 5%]\\n- Submitted: 38 (3.2%)\\n- Reported: 287 (23.9%)\\n## 부서별\\n| 부서 | 클릭률 | 신고율 |\\n| HR | 18% | 12% |\\n| Sales | 14% | 18% |\\n| IT | 3% | 78% |\\n## Q2 액션\\n- HR/Sales 의무 추가 교육\\n- 신고율 30% 목표\\nEOF\\ncat /tmp/q1_report.md. 출력: 분기 보고. 해석: 경영진 = 부서별 비교 + 추세 + 액션 항목. 보안투자 ROI 증빙."
      negative_signs:
      - GoPhish 4 단계 (Sending Profile/Template/Landing/Group) 누락
      - Level 1→3 단계적 난이도 X
      - KPI 4종 (Open/Click/Submit/Report) 미명시
      - Microsoft Attack Simulator / KnowBe4 도구 0개
      - 즉시 교육 페이지 누락
      - 분기 보고 (경영진 KPI) 누락
      - Verizon DBIR 등 산업 평균 인용 X
  target_vm: attacker
- order: 13
  instruction: Pretexting(프리텍스팅) 시나리오를 작성하라. IT 지원 직원을 사칭하여 원격 접속 도구 설치를 유도하는 대본을 만들어라.
  hint: 신뢰할 수 있는 역할(IT 지원)을 가장하여 시나리오를 구성한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Pretexting Scenario: IT Support ===\n\n[Setup]\n- 공격자: IT 헬프데스크 직원 "박지성" 사칭\n-
    대상: 재무부서 직원\n- 목표: 원격 접속 도구 설치 유도\n\n[Script]\n"안녕하세요, IT 헬프데스크 박지성입니다.\n어제 보안 업데이트 후 일부 PC에서 오류가
    발생했는데,\n재무부서 쪽도 확인이 필요합니다.\n제가 원격으로 확인해 드릴 테니,\nteamviewer-support.com 에 접속하셔서\n프로그램을 설치해 주시겠어요?\n금방
    확인하고 끝납니다."\n\n[Countermeasures]\n1. IT 부서 직통번호로 콜백 확인\n2. 원격 접속은 공식 절차만 허용\n3. 인가되지 않은 소프트웨어 설치 금지\n4.
    직원 본인 확인 프로토콜 수립'''
  answer_detail: 프리텍스팅은 허구의 상황과 신분을 만들어 피해자의 신뢰를 얻는 기법이다. IT 지원, 경영진, 거래처 등을 사칭하며, 실시간 대화에서 피해자의 반응에 맞춰
    유연하게 대응한다.
  verify:
    type: output_contains
    expect: Pretexting Scenario
