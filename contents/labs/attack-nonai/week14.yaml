- order: 10
  instruction: Smishing(SMS Phishing) 메시지를 분석하라. 일반적인 스미싱 패턴과 탐지 방법을 정리하라.
  hint: 택배, 정부기관, 금융기관 사칭 패턴을 분석한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Smishing Analysis ===\n\n[Common Patterns in Korea]\n1. 택배 사칭: "[CJ대한통운] 배송 불가.
    주소 확인: bit.ly/xxx"\n2. 정부기관: "[국세청] 세금 환급금 확인: http://nts-refund.com"\n3. 금융기관: "[카카오뱅크] 비정상 접속 감지.
    본인확인: xxx"\n4. 지인 사칭: "엄마 나 폰 고장났어. 이 링크로 연락해"\n5. 이벤트: "[네이버] 당첨! 경품 수령: naver-event.cc"\n\n[Red
    Flags]\n- URL 단축기 사용 (bit.ly, url.kr)\n- 비공식 도메인 (nts-refund.com vs nts.go.kr)\n- 설치 유도 (APK 다운로드)\n-
    개인정보 입력 요구\n\n[Defense]\n- 공식 앱/웹사이트에서 직접 확인\n- URL 클릭 전 도메인 확인\n- 통신사 스미싱 차단 서비스 이용'''
  answer_detail: 스미싱은 한국에서 특히 빈번한 공격으로, 택배 미수령, 세금 환급, 계정 이상 등을 사칭한다. 악성 앱(APK) 설치를 유도하여 금융 앱을 제어하거나 개인정보를
    탈취한다.
  verify:
    type: output_contains
    expect: Smishing Analysis
    field: stdout
    semantic:
      intent: 'Smishing 분석 — 한국 패턴: 택배(CJ대한통운) + 정부(국세청) + 금융(카카오뱅크) + 지인 사칭(엄마 폰 고장) + 이벤트 당첨. Red flag:
        bit.ly + 비공식 도메인(nts-refund.com vs nts.go.kr) + APK 설치 유도. 통신사 차단 서비스.'
      success_criteria:
      - Smishing Analysis 키워드
      - 한국 사칭 패턴 4개 이상
      - Red flag + 방어
      acceptable_methods:
      - "한국 #1 — 택배 사칭 — echo '=== [택배] CJ대한통운 사칭 ==='; echo '본문: \"[CJ대한통운] 배송불가. 주소확인 bit.ly/3xY2z\"'; echo '도메인 분석:'; echo '  실제: cjlogistics.com / cj-korea.co.kr'; echo '  사칭: bit.ly/3xY2z (단축) → cj-track-kr.tk'; echo 'TLD .tk = 무료 도메인 (98% 악성)'; echo '[KISA 통계 2024] 택배 사칭 = 신고의 35%'. 출력: 택배 패턴. 해석: 한국 #1. 추석/설날 +200% spike. bit.ly + 비공식 도메인 결합."
      - "정부기관 사칭 (국세청·검찰) — echo '=== [정부] 국세청·검찰 사칭 ==='; echo '본문: \"[국세청] 세금환급 32,500원 확인 nts-refund.kr\"'; echo '도메인 비교:'; echo '  정상: nts.go.kr (.go.kr 정부 전용 TLD)'; echo '  사칭: nts-refund.kr / nts-refund.com'; echo '[검찰] 02-3480-XXXX 발신번호 위조 + APK 설치'; echo '[Red Flag] .go.kr 외 TLD 100% 사칭'. 출력: 정부 패턴. 해석: .go.kr 은 정부 전용 TLD — 다른 TLD (.com/.kr/.tk) 는 100% 사칭. 학생 즉시 식별 기준."
      - "금융기관 사칭 (카카오뱅크·신한·국민) — echo '=== [금융] 비정상 접속 감지 ==='; echo '본문: \"[카카오뱅크] 비정상 접속 차단. 본인확인 kbank-secure.tk\"'; echo '도메인:'; echo '  정상: kakaobank.com / shinhan.com / kbstar.com'; echo '  사칭: kbank-secure.tk / shinhan-auth.cc'; echo '[탐지] 금융기관은 SMS 로 링크 발송 X (앱 알림만)'. 출력: 금융 패턴. 해석: 카카오뱅크/토스/신한 등 절대 SMS 링크 미발송. SMS 링크 받으면 100% 사칭 (KISA 가이드)."
      - "지인 사칭 (자녀·부모) — echo '=== [지인] 자녀 사칭 ==='; echo '본문: \"엄마 나 폰 깨졌어. 이 번호로 카톡 보내줘. https://line.me/...\"'; echo '심리: Liking + Fear + Urgency'; echo '실 흐름:'; echo '  1. 자녀 번호 spoofing (또는 비슷한 번호)'; echo '  2. 카카오톡/라인 사칭 → 가족 추가'; echo '  3. \"급해서 30만원만 송금\"'; echo '[2024 사례] 60대 여성 4,500만원 피해'; echo '[방어] 항상 자녀 번호 직접 콜백'. 출력: 지인 패턴. 해석: AI Voice Cloning 결합 시 위험 가속. 가족 콜백이 유일 방어."
      - "이벤트/당첨 사칭 — echo '=== [이벤트] 당첨 사칭 ==='; echo '본문: \"[네이버] 신년 이벤트 당첨! naver-event.cc 에서 경품 수령\"'; echo '도메인:'; echo '  정상: naver.com (이벤트는 보통 events.naver.com)'; echo '  사칭: naver-event.cc / naver-2026.tk'; echo '[심리] 사람 = 손실보다 이득에 약함 (Reciprocity 변형)'; echo '[목적] APK 설치 → 금융 정보 탈취'. 출력: 이벤트 패턴. 해석: 정상 이벤트는 공식 앱·메일 발송. SMS 당첨 링크 100% 사칭."
      - "URL 분석 도구 (urlscan + VirusTotal API) — curl -s 'https://urlscan.io/api/v1/scan/' -X POST -H 'API-Key: YOUR_KEY' -H 'Content-Type: application/json' -d '{\"url\":\"https://nts-refund.kr\",\"visibility\":\"public\"}' 2>/dev/null | head -10; echo '[가상 결과] result: phishing detected, brand: NTS, score: 95'; curl -s 'https://www.virustotal.com/api/v3/domains/cj-track-kr.tk' -H 'x-apikey: YOUR_KEY' 2>/dev/null | head -10. 출력: API 호출 + 결과. 해석: urlscan = 시각적 DOM 분석 / VT = 평판. 학생이 의심 URL 받으면 즉시 두 도구로 검증."
      - "탐지·방어 도구 — echo '[통신사 차단 서비스 — 무료]'; echo '  - SKT T스팸필터링'; echo '  - KT 후후(whowho)'; echo '  - LGU+ 스팸차단'; echo '[Whowho 앱]'; echo '  - 발신번호 평판 DB (1억 번호)'; echo '  - 신고 시 즉시 차단 + 통계'; echo '[KISA 보호나라]'; echo '  - 보호나라(boho.or.kr) 신고센터'; echo '  - 118 (사이버범죄 신고)'; echo '[모바일 OS]'; echo '  - iOS: 메시지 앱 차단 + 신고'; echo '  - Android: 스팸 신고 + Google Play Protect'. 출력: 4 도구. 해석: 한국 인프라 잘 갖춰짐. 학생이 신고/차단 흐름 알아야 인식교육 효과 ↑."
      - "MITRE T1660 + KISA 가이드 — echo '[MITRE ATT&CK Mobile]'; echo '  T1660 Phishing (Mobile)'; echo '  T1404 Exploitation for Privilege Escalation'; echo '  T1481.003 C2 — Web Service'; echo '[KISA 보호나라 권고]'; echo '  1. 출처불명 APK 설치 차단 (Android 설정)'; echo '  2. 통신사 스팸필터링 가입'; echo '  3. 의심 SMS 즉시 #118 신고'; echo '  4. 모의훈련 (분기 1회 권고)'. 출력: MITRE + KISA. 해석: 본 lab 의 학습 결과 = 실 환경 SOP 적용. 분기 모의훈련 + 자동 차단 결합."
      negative_signs:
      - 한국 사칭 패턴 (택배/정부/금융/지인/이벤트) 4개 미만
      - .go.kr 등 TLD 비교 분석 누락
      - urlscan / VirusTotal API 검증 X
      - 통신사 차단 / KISA 보호나라 도구 미인용
      - MITRE T1660 (Mobile Phishing) 매핑 X
      - APK 설치 유도 패턴 미언급
