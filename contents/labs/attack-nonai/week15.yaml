  instruction: 'Phase 8 - 정리: 모의해킹 중 생성한 모든 아티팩트(백도어 키, 임시 파일)를 정리하라.'
  hint: 테스트 중 생성한 SSH 키, 임시 파일, 백도어를 제거한다
  category: analysis
  points: 10
  answer: echo '=== Cleanup ===' && rm -f /tmp/pentest_key /tmp/pentest_key.pub /tmp/pentest_exfil.txt
    /tmp/pentest_exfil.enc && echo 'Local artifacts removed' && sshpass -p1 ssh -o StrictHostKeyChecking=no
    ccc@10.20.30.80 'sed -i "/pentest/d" ~/.ssh/authorized_keys 2>/dev/null; rm -rf /tmp/.hidden_backdoor
