lab_id: attack-nonai-week15
title: 종합 모의해킹 (Full Pentest)
version: non-ai
course: attack-nonai
week: 15
description: 14주 동안 배운 모든 기법을 종합하여 실습 인프라에 대한 완전한 모의해킹을 수행한다. 정찰부터 보고서 작성까지 전체 모의해킹 라이프사이클을 경험한다.
difficulty: medium
duration_minutes: 120
objectives:
- 모의해킹의 전체 단계(Recon -> Scan -> Exploit -> Post-Exploit -> Report)를 독립적으로 수행한다
- 발견된 취약점을 CVSS로 평가하고 전문적인 보고서를 작성한다
- 모의해킹 결과를 기반으로 실효적 보안 강화 방안을 제시한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'Phase 1 - 정찰: 대상 네트워크(10.20.30.0/24)의 활성 호스트를 발견하고, 각 호스트의 열린 포트와 서비스를 식별하라.'
  hint: nmap -sn으로 호스트 발견 후 -sV로 서비스 탐지를 수행한다
  category: recon
  points: 10
  answer: sudo nmap -sn 10.20.30.0/24 --max-retries 1 --host-timeout 15s -T4 && echo '===== Service Detection
    =====' && sudo nmap -sV -T4 --max-retries 1 --host-timeout 15s --top-ports 100 10.20.30.1 10.20.30.80
    10.20.30.100
  answer_detail: 모의해킹의 첫 단계는 대상 범위(scope) 내 모든 자산을 식별하는 것이다. 호스트 발견 -> 포트 스캔 -> 서비스/버전 탐지 순서로 수행하며, 결과를
    체계적으로 기록한다.
  verify:
    type: output_contains
    expect: Nmap scan report
    field: stdout
    semantic:
      intent: Phase 1 정찰 — sudo nmap -sn 10.20.30.0/24 + nmap -sV --top-ports 100 호스트 3개. PTES Pre-engagement
        → Intelligence Gathering. 호스트 발견 → 포트 스캔 → 서비스 버전 탐지. MITRE T1595 Active Scanning + T1046.
      success_criteria:
      - nmap -sn 호스트 발견
      - nmap -sV 서비스 탐지
      - Nmap scan report 출력
      acceptable_methods:
      - "Host discovery (nmap -sn) — sudo nmap -sn 10.20.30.0/24 --max-retries 1 --host-timeout 15s -T4 2>/dev/null | grep -E 'Nmap scan report|MAC' | head -20. 출력: 'Nmap scan report for 10.20.30.1/.80/.100/.200/.201' + MAC. 해석: -sn = no port scan (ARP/ICMP ping only). /24 전체 스윕. PTES Pre-engagement → Intelligence Gathering 1차. T1018 Remote System Discovery."
      - "Service version (nmap -sV) — sudo nmap -sV -T4 --max-retries 1 --host-timeout 15s --top-ports 100 10.20.30.1 10.20.30.80 10.20.30.100 2>/dev/null | grep -E 'open|PORT' | head -30. 출력: 22/tcp open ssh OpenSSH 8.9 / 80/tcp open http Apache 2.4.52 / 3000/tcp open ppp / 9200/tcp open elasticsearch. 해석: --top-ports 100 = 가장 흔한 100 포트 (전체 65535 대신 빠름). version banner 로 패치 수준 추정. T1046 Network Service Scanning."
      - "OS fingerprinting (-O) — sudo nmap -O 10.20.30.80 --max-retries 1 --host-timeout 15s 2>/dev/null | grep -E 'Running|OS details|Aggressive' | head -5. 출력: Running: Linux 5.X / OS details: Linux 5.10-5.18. 해석: TCP/IP 스택 fingerprint 로 OS 추측. 정확도 90%+ (포트 22 open 시). 후속 exploit 선택 (Linux/Windows 분기)."
      - "Aggressive scan (-A) — sudo nmap -A -T4 --top-ports 50 10.20.30.80 --host-timeout 30s 2>/dev/null | head -40. 출력: -sV + -O + -sC (default scripts) + traceroute. 해석: -A = 통합 active. 시간 ↑ but 정보 ↑. NSE script (http-title/ssh-hostkey/ssl-cert) 자동 실행. lab/CTF 첫 스캔으로 표준."
      - "masscan 빠른 스캔 (대규모) — sudo masscan 10.20.30.0/24 -p1-65535 --rate 1000 -oG /tmp/masscan.txt 2>&1 | tail -10 || echo '[masscan 미설치 — apt install masscan]'; head -5 /tmp/masscan.txt 2>/dev/null. 출력: 1000pps 로 65535 포트 스캔 결과. 해석: nmap 대비 100× 속도. 발견 후 nmap -sV fingerprint 결합 = 표준. 실 환경 (1000+ 호스트) 필수."
      - "rustscan + nmap 결합 — rustscan -a 10.20.30.80 --range 1-65535 --ulimit 5000 -- -sV 2>&1 | tail -20 || echo '[rustscan 미설치 — cargo install rustscan]'; echo '[흐름] rustscan 빠른 포트 발견 → nmap -sV fingerprint 자동 pipe'. 출력: rustscan 결과 + nmap 자동 호출. 해석: Rust 작 — 빠르고 안정. 발견된 포트만 nmap 으로 fingerprint → 가장 효율."
      - "결과 저장 + 분류 — sudo nmap -sV -oA /tmp/recon_phase1 -T4 --top-ports 100 10.20.30.1 10.20.30.80 10.20.30.100 2>/dev/null > /dev/null; ls -l /tmp/recon_phase1.* 2>/dev/null; grep '^open' /tmp/recon_phase1.gnmap 2>/dev/null | head -10. 출력: -oA = nmap/gnmap/xml 3 형식 동시 저장. 해석: PTES Reporting 1차 자료. -oG = grep 가능. 후속 phase 의 입력."
      - "PTES 단계 맥락 + MITRE 매핑 — echo '[PTES 7 Phase]'; echo '1. Pre-engagement (RoE)'; echo '2. Intelligence Gathering ← 본 step'; echo '3. Threat Modeling'; echo '4. Vulnerability Analysis'; echo '5. Exploitation'; echo '6. Post-Exploitation'; echo '7. Reporting'; echo '[MITRE ATT&CK]'; echo '  T1595.001 Active Scanning: Scanning IP Blocks'; echo '  T1595.002 Active Scanning: Vulnerability Scanning'; echo '  T1046 Network Service Discovery'. 출력: PTES + ATT&CK 매핑. 해석: lab w15 의 9 phase 가 PTES + ATT&CK 와 일치. Phase 1 = Intel Gathering = T1595/T1046."
      negative_signs:
      - nmap -sn 호스트 발견 누락
      - nmap -sV 서비스 탐지 누락
      - 단일 호스트만 (3 호스트 이상 필수)
      - -oA / -oG 결과 저장 X
      - PTES Phase / MITRE T1595 매핑 X
      - masscan / rustscan 빠른 스캔 도구 0개
  target_vm: attacker
- order: 2
  instruction: 'Phase 1 - 웹 정찰: JuiceShop({{WEB_IP}}:3000)의 기술 스택, API 엔드포인트, 공개 파일을 수집하라.'
  hint: whatweb, robots.txt, /ftp, /api 등을 종합적으로 조사한다
  category: recon
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo ''=== Web Recon ==='' && curl -sI http://10.20.30.80:3000 | head -10 && echo ''---
    robots.txt ---'' && curl -s http://10.20.30.80:3000/robots.txt && echo ''--- /ftp ---'' && curl -s
    http://10.20.30.80:3000/ftp | head -10 && echo ''--- API ---'' && curl -s http://10.20.30.80:3000/api/Products
    | python3 -c ''import sys,json; print(f"Products: {len(json.load(sys.stdin)["data"])}")'' 2>/dev/null'
  answer_detail: 웹 정찰에서는 서버 헤더, robots.txt, 디렉토리 리스팅, API 엔드포인트, JavaScript 소스를 모두 분석한다. 수집된 정보의 양과 질이
    이후 공격의 성공률을 결정한다.
  verify:
    type: output_contains
    expect: Web Recon
    field: stdout
    semantic:
      intent: Phase 1 웹 정찰 — curl -sI 헤더 + robots.txt + /ftp + /api/Products. PTES Information Gathering.
        whatweb/wappalyzer 기술 스택 + API 엔드포인트 매핑. 수집 정보 양/질이 공격 성공률 결정.
      success_criteria:
      - Web Recon 키워드
      - 헤더 + robots + API 3종
      - JSON 파싱 (제품 수)
      acceptable_methods:
      - "헤더 분석 (curl -sI) — echo '=== Web Recon ==='; curl -sI http://10.20.30.80:3000 2>/dev/null | head -10. 출력: HTTP/1.1 200 OK / X-Powered-By: Express / Content-Type: application/json. 해석: -I = HEAD only (body 받지 않음, 빠름). X-Powered-By = 기술 스택 노출 (Express → Node.js). 정보 노출 = OWASP A05. 1차 fingerprinting."
      - "robots.txt + sitemap — curl -s http://10.20.30.80:3000/robots.txt 2>/dev/null; echo '---'; curl -s http://10.20.30.80:3000/sitemap.xml 2>/dev/null | head -10. 출력: User-agent: * / Disallow: /ftp / Disallow: /api/Users. 해석: robots.txt = 관리자가 숨기고 싶은 경로 노출 (역설적). Disallow = 정찰 핵심 단서. JuiceShop 의 /ftp, /api/Users 가 후속 exploit 입력."
      - "디렉토리 노출 (/ftp + 디렉토리 리스팅) — curl -s http://10.20.30.80:3000/ftp 2>/dev/null | head -20. 출력: 'Index of /ftp' + acquisitions.md / coupons_2013.md.bak / package.json.bak / suspicious_errors.yml. 해석: Apache/Express 의 디렉토리 리스팅 활성화 = OWASP A05. JuiceShop intentional. 백업 파일 (.bak/.old) = 민감 정보 누출 (소스코드/credentials)."
      - "API 엔드포인트 매핑 — curl -s http://10.20.30.80:3000/api/Products 2>/dev/null | python3 -c \"import sys,json; d=json.load(sys.stdin); print(f'Products: {len(d[\\\"data\\\"])}'); print(f'fields: {list(d[\\\"data\\\"][0].keys())}')\" 2>/dev/null; echo '---'; curl -s http://10.20.30.80:3000/api-docs 2>/dev/null | head -10; echo '[REST endpoints]'; for p in api/Users rest/user/whoami rest/user/login api/Products; do echo \"  GET /$p\"; done. 출력: Products 38 / fields list / endpoint 4. 해석: /api-docs (Swagger) 공개 시 즉시 노출. /api/Users 인증 미설정 = OWASP A01 BOLA."
      - "기술 스택 (whatweb / wappalyzer) — whatweb http://10.20.30.80:3000 2>/dev/null | tr ',' '\\n' | head -10 || echo '[가상] WhatWeb: Apache, jQuery, Bootstrap, AngularJS, Express, Node.js'; echo '[Wappalyzer 브라우저]'; echo '  - Chrome/FF 확장 → 자동 fingerprint'; echo '  - JS 라이브러리·프레임워크·CMS·CDN 식별'. 출력: 기술 스택. 해석: AngularJS 1.x = 2018 deprecated (CVE 다수). Express 4.x 의 prototype pollution 가능성. 기술 스택 → CVE → exploit 선택."
      - "JS 소스 분석 — curl -s http://10.20.30.80:3000/main.js 2>/dev/null | grep -oE 'api/[a-zA-Z]+' | sort -u | head -10 || echo '[가상] api/Users / api/Products / api/Orders / api/Coupons'; echo '[정규식 검색]'; echo 'curl ... | grep -oE \"AKIA[0-9A-Z]{16}\" — AWS access key'; echo 'curl ... | grep -oE \"sk_live_[0-9a-zA-Z]{32}\" — Stripe API key'. 출력: JS 에서 추출한 API 경로. 해석: JS bundle 안에 API 경로·secret·debug 코드 포함 가능. 정규식으로 노출 secret 검색."
      - "디렉토리 brute (ffuf/dirsearch) — ffuf -u http://10.20.30.80:3000/FUZZ -w /usr/share/wordlists/dirb/common.txt -t 50 -mc 200,301,302 -timeout 5 2>/dev/null | head -10 || echo '[ffuf 미설치 — apt install ffuf]'; echo '[dirsearch 대안]'; echo 'dirsearch -u http://10.20.30.80:3000 -e php,html,js -w wordlist.txt'. 출력: ffuf 발견 경로. 해석: 일반적 admin/test/dev/backup 경로 brute. JuiceShop 의 hidden /admin 발견 가능. nuclei 와 결합 = 자동화."
      - "nuclei 자동 취약점 스캔 — nuclei -u http://10.20.30.80:3000 -t cves/ -severity high,critical 2>&1 | tail -10 || echo '[nuclei 미설치 — go install github.com/projectdiscovery/nuclei]'; echo '[가상 결과]'; echo '  [http-missing-security-headers] http://target [info]'; echo '  [exposed-git] http://target/.git/config [high]'; echo '  [angular-1.x-deprecated] http://target [medium]'. 출력: nuclei 결과. 해석: nuclei = ProjectDiscovery 의 template 기반 스캐너. 5,000+ template (CVE/exposure/misconfig). Phase 2 입력."
      negative_signs:
      - 헤더 + robots + API 3종 미만
      - JSON 파싱 (Products 수) 누락
      - 기술 스택 (whatweb/Wappalyzer) X
      - JS 소스 분석 (정규식 secret) X
      - ffuf / dirsearch / nuclei 도구 0개
      - PTES Information Gathering 맥락 X
      - 백업 파일 (.bak) / 디렉토리 리스팅 미언급
  target_vm: attacker
- order: 3
  instruction: 'Phase 2 - 취약점 스캔: Nikto와 nmap NSE 스크립트로 웹 서버의 취약점을 자동 스캔하라.'
  hint: nikto -h와 nmap --script vuln을 실행한다
  category: analysis
  points: 10
  answer: echo '=== Nikto Scan ===' && nikto -h http://10.20.30.80:3000 -maxtime 60 2>/dev/null | tail
    -20 && echo '=== NSE Vuln Scan ===' && nmap --script vuln -p 3000 10.20.30.80 --max-retries 1 --host-timeout
    15s -T4 2>/dev/null | head -30
  answer_detail: 자동화 스캐너의 결과는 시작점이며, 오탐(false positive)을 수동으로 검증해야 한다. 여러 도구의 결과를 교차 확인하면 탐지율을 높이고 오탐을
    줄일 수 있다.
  verify:
    type: output_contains
    expect: Scan
    field: stdout
    semantic:
      intent: Phase 2 취약점 스캔 — nikto -h target -maxtime 60 + nmap --script vuln. PTES Vulnerability Analysis.
        자동 결과는 시작점 → 수동 검증으로 오탐 제거. 다중 도구 교차 확인.
      success_criteria:
      - Nikto Scan + NSE Vuln Scan
      - 두 도구 결과 비교
      - 오탐 검증 맥락
      acceptable_methods:
      - "Nikto 웹 취약점 스캔 — echo '=== Nikto Scan ==='; nikto -h http://10.20.30.80:3000 -maxtime 60 -ask no 2>/dev/null | tail -20; echo '---'; echo '[주요 발견]'; echo '  + X-Frame-Options 헤더 누락'; echo '  + X-Content-Type-Options 헤더 누락'; echo '  + Cookie HttpOnly flag 미설정'; echo '  + /api/Users 인증 X'. 출력: Nikto 결과 + 분류. 해석: Nikto = 웹 서버 misconfig + 알려진 취약 경로 6,700+ DB. -maxtime 60 = 1분 제한. 빠른 1차 스캔."
      - "nmap NSE vuln scripts — echo '=== NSE Vuln Scan ==='; nmap --script vuln -p 3000 10.20.30.80 --max-retries 1 --host-timeout 30s -T4 2>/dev/null | head -30; echo '---'; echo '[NSE 카테고리]'; echo '  vuln (검출 시도)'; echo '  exploit (실 익스플로잇)'; echo '  auth (인증 우회)'; echo '  brute (brute force)'; echo '  intrusive (시끄러움)'. 출력: NSE 결과 + 카테고리. 해석: NSE = nmap 의 Lua 스크립트 엔진. /usr/share/nmap/scripts 에 600+ 스크립트. --script vuln = vuln/safe 동시. 결과 = 가능 CVE list."
      - "nuclei (template 기반) — nuclei -u http://10.20.30.80:3000 -t cves/ -t exposures/ -t misconfiguration/ -severity high,critical -silent 2>/dev/null | head -10 || echo '[가상] [http-missing-security-headers] high / [exposed-package-json] info / [angular-jq-1.x] medium'; echo '[template 통계]'; echo '  - CVE templates: 2,500+'; echo '  - Exposure: 300+'; echo '  - Misconfig: 200+'. 출력: nuclei 발견. 해석: ProjectDiscovery (소속 GitLab). 매주 CVE 등록 → template 업데이트. 가장 빠른 update 주기. CI/CD 통합."
      - "오탐 검증 (수동) — echo '[Nikto 발견 #1: SQLi 가능 /search?q=]'; curl -s 'http://10.20.30.80:3000/search?q=test' 2>/dev/null | head -5; echo '[수동 검증]'; curl -s \"http://10.20.30.80:3000/search?q=test'\" 2>/dev/null | grep -i 'syntax\\|error\\|sqlite' | head -3; echo '[결과] error 노출 = SQLi 확정'; echo '[Nikto 오탐 예]'; echo '  + /admin found → 실제는 정상 SPA route (오탐)'. 출력: 수동 검증 흐름. 해석: 자동 결과는 '시작점'. ' 한 글자 추가로 SQL error 발생 = 확정. 오탐 vs 진짜 결정."
      - "OpenVAS / Nessus 통합 스캐너 — echo '[OpenVAS (GVM)]'; echo '  - greenbone.net (오픈소스)'; echo '  - 100,000+ NVT (Network Vulnerability Test)'; echo '  - 인증 스캔 (SSH/SMB) → 깊은 분석'; echo '[Nessus]'; echo '  - Tenable.com'; echo '  - Pro: \\$3K/년'; echo '  - 200,000+ plugin'; echo '  - PCI-DSS / HIPAA 자동 준수 보고'; echo '[비교]'; echo '  - Nikto/nuclei = 웹 only / OpenVAS/Nessus = 종합'. 출력: 통합 스캐너 비교. 해석: 운영 환경은 OpenVAS/Nessus 가 표준. 본 lab 는 시간 제약상 Nikto/nuclei. 학생이 도구 선택 기준 알아야."
      - "다중 도구 교차 검증 (다이어그램) — echo '[교차 검증 매트릭스]'; printf '%-30s | %-8s | %-8s | %-8s\\n' 'Vuln' 'Nikto' 'NSE' 'nuclei'; printf '%-30s | %-8s | %-8s | %-8s\\n' 'X-Frame-Options 누락' '✓' '-' '✓'; printf '%-30s | %-8s | %-8s | %-8s\\n' 'SQLi /search' '✓' '✓' '-'; printf '%-30s | %-8s | %-8s | %-8s\\n' 'Outdated jQuery' '-' '-' '✓'; echo '[결론] 3 도구 모두 매치 = 진짜 / 1 도구만 = 오탐 의심'. 출력: 매트릭스. 해석: 단일 도구 신뢰 X. 3 도구 교차 = false positive 90% 감소."
      - "PTES Vulnerability Analysis 매핑 — echo '[PTES Phase 4]'; echo '  4.1 Active Vulnerability Scanning'; echo '    - Banner grabbing'; echo '    - Web app scanner'; echo '    - VA scanner (Nessus/OpenVAS)'; echo '  4.2 Passive Vulnerability Analysis'; echo '    - Metadata analysis'; echo '    - Traffic monitoring'; echo '  4.3 Vulnerability Validation'; echo '    - Public exploit search (Exploit-DB)'; echo '    - 수동 검증'. 출력: PTES Phase 4. 해석: 본 step = PTES 4.1+4.3. Phase 5 (Exploitation) 의 입력. searchsploit (Exploit-DB) = CVE → public PoC 검색."
      - "결과 통합 보고 (CSV) — echo 'Vuln,Severity,CVE,CVSS,Source,Verified' > /tmp/phase2_findings.csv; echo 'X-Frame-Options missing,Medium,-,5.0,Nikto+nuclei,Yes' >> /tmp/phase2_findings.csv; echo 'SQLi /rest/products/search,Critical,-,9.8,Nikto+NSE+manual,Yes' >> /tmp/phase2_findings.csv; echo 'Outdated jQuery 1.x,Medium,CVE-2020-11023,6.5,nuclei,Yes' >> /tmp/phase2_findings.csv; echo 'API /api/Users no-auth,High,-,7.5,manual,Yes' >> /tmp/phase2_findings.csv; cat /tmp/phase2_findings.csv. 출력: CSV 4 행. 해석: Phase 7 (CVSS 분류) 의 입력. CVSS·CVE·source·verification 4 컬럼이 표준."
      negative_signs:
      - 단일 스캐너만 (Nikto/NSE/nuclei 중 1개 이하)
      - 오탐 검증 (수동) 누락
      - OpenVAS/Nessus 통합 스캐너 미인용
