  answer_detail: 모의해킹 종료 후 정리(cleanup)는 전문 침투 테스터의 필수 의무이다. 테스트 중 생성한 모든 백도어, 사용자 계정, 임시 파일을 완전히 제거하여
    시스템을 원래 상태로 복원해야 한다.
  verify:
    type: output_contains
    expect:
    - Cleanup complete
    - 정리
    field: stdout
    semantic:
      intent: Phase 8 정리 — rm 임시 파일 + sed -i /pentest/d ~/.ssh/authorized_keys + 백도어 제거. PTES Cleanup
        의무. 모든 백도어/계정/임시 파일 완전 제거 → 시스템 원상 복원. 모의해킹 윤리.
      success_criteria:
      - Cleanup complete 키워드
      - 로컬 + 원격 정리 모두
      - authorized_keys에서 백도어 키 제거
      acceptable_methods:
      - "로컬 아티팩트 정리 (rm) — echo '=== Cleanup ==='; rm -f /tmp/pentest_key /tmp/pentest_key.pub /tmp/pentest_exfil.txt /tmp/pentest_exfil.enc /tmp/exfil_bundle.tar.gz* /tmp/chunk_* 2>/dev/null && echo 'Local artifacts removed'; ls -l /tmp/pentest_* /tmp/exfil_* /tmp/chunk_* 2>/dev/null || echo '[OK] 로컬 정리 완료 (파일 없음 = 정상)'. 출력: 로컬 파일 제거. 해석: attacker VM 의 모든 pentest 산출물 제거. /tmp 외 ~/.bash_history 도 점검 권장. 무결성 검증."
      - "원격 백도어 정리 (sed) — sshpass -p '1' ssh -o StrictHostKeyChecking=no ccc@10.20.30.80 'sed -i \"/pentest@2026/d\" ~/.ssh/authorized_keys 2>/dev/null; rm -rf /tmp/.hidden_backdoor /tmp/harvester.* 2>/dev/null; wc -l ~/.ssh/authorized_keys' 2>/dev/null && echo 'Remote backdoors cleaned'. 출력: 원격 정리 + 키 수 확인. 해석: sed -i = 백도어 키 라인 삭제. /pentest@2026/ pattern 으로 step 8 의 키만 제거 (정상 키 보존). authorized_keys 라인 수 = 원래값."
      - "체크리스트 기반 정리 — cat <<'EOF' > /tmp/cleanup_checklist.md\\n## Pentest Cleanup Checklist\\n[로컬 attacker VM]\\n- [x] /tmp/pentest_key + .pub 삭제\\n- [x] /tmp/pentest_exfil.* 삭제\\n- [x] /tmp/chunk_* 삭제\\n- [x] /tmp/harvester.py 삭제\\n[원격 web (10.20.30.80)]\\n- [x] ~/.ssh/authorized_keys 백도어 키 제거\\n- [x] /tmp/.hidden_backdoor 디렉토리 삭제\\n- [x] crontab 변조 원복\\n[원격 secu (10.20.30.1)]\\n- [x] iptables 변조 원복\\n[검증]\\n- [x] sha256sum 비교 (전후)\\n- [x] /var/log/audit/audit.log 검토\\nEOF\\ncat /tmp/cleanup_checklist.md. 출력: 체크리스트. 해석: 7+ 항목 체크리스트. 항목 누락 = 인시던트. PTES 의무."
      - "ansible 자동 정리 — cat <<'EOF' > /tmp/cleanup.yml\\n---\\n- hosts: pentest_targets\\n  tasks:\\n    - name: Remove SSH backdoor key\\n      lineinfile:\\n        path: ~/.ssh/authorized_keys\\n        state: absent\\n        regexp: 'pentest@2026'\\n    - name: Remove hidden backdoor\\n      file:\\n        path: /tmp/.hidden_backdoor\\n        state: absent\\n    - name: Restore original crontab\\n      copy:\\n        src: /backup/crontab.original\\n        dest: /etc/crontab\\nEOF\\necho 'ansible-playbook -i inventory cleanup.yml'. 출력: ansible 플레이북. 해석: 다중 호스트 자동화. 운영 환경 = 100+ 호스트 = ansible 필수."
      - "감사 로그 검증 — ssh ccc@10.20.30.80 'sudo grep -E \"sudo|sshd|backdoor\" /var/log/auth.log /var/log/audit/audit.log 2>/dev/null | tail -20' 2>/dev/null; echo '---'; echo '[정리 흔적 검증]'; echo '  - sed -i 명령 자체가 audit.log 기록'; echo '  - 백도어 키 등록 + 제거 쌍 확인'; echo '  - 시간 일치 확인'; echo '[고지]'; echo '  운영팀에 정리 시작/종료 시간 통보'. 출력: 감사 로그. 해석: 정리도 감사 대상. SOC 가 본 활동 정상 인지. 미고지 시 인시던트로 오인."
      - "PTES Pre-engagement RoE 의무 — echo '[PTES Pre-engagement RoE — 계약 명시]'; echo '  - 모의해킹 종료 시점'; echo '  - 모든 백도어/계정/임시 파일 제거'; echo '  - 시스템 원상 복구 보장'; echo '  - 정리 보고서 첨부 의무'; echo '[보고서 정리 섹션]'; echo '  - 생성한 자산 목록'; echo '  - 제거 검증 방법'; echo '  - 잔여 위험 (있다면)'. 출력: RoE 의무. 해석: 계약서에 명시 = 위반 시 법적 책임. 정리 미흡 = 모의해킹 자체가 새로운 인시던트."
      - "법적·윤리적 의무 — echo '[법적 의무]'; echo '  계약 위반 시: 민사 손배 + 형사 추가'; echo '  미정리 백도어 → 제3자 활용 시 PT 회사 책임'; echo '[윤리적 의무]'; echo '  CEH Code of Ethics: \"All testing artifacts removed\"'; echo '  OSCP / OSCE Certification: 시험에서 정리 누락 = 부분 점수 차감'; echo '  PTES: 정리는 7 phase 중 의무'; echo '[클라이언트 신뢰]'; echo '  정리 미흡 = 재계약 X + 평판 손상'. 출력: 법적 + 윤리. 해석: PT 산업 = 신뢰 산업. 정리 의무 위반 = 직업 위협."
      - "최종 검증 + 보고 — sshpass -p '1' ssh -o StrictHostKeyChecking=no ccc@10.20.30.80 'wc -l ~/.ssh/authorized_keys; ls -la /tmp/.hidden* 2>/dev/null; sudo crontab -l 2>/dev/null | grep -v \"^#\" | grep -v \"^$\" | wc -l' 2>/dev/null; echo '---'; echo 'Cleanup complete'; date '+%Y-%m-%dT%H:%M:%S%z'; echo '[최종 보고서 첨부]'; echo '  - cleanup_checklist.md (7+ 항목)'; echo '  - cleanup_audit.log (정리 명령 + 시간)'; echo '  - sha256_diff.txt (전후 비교)'. 출력: 검증 + 시간. 해석: 'Cleanup complete' 키워드 + 시간 도장. 최종 보고서에 cleanup section 첨부."
      negative_signs:
      - 로컬 정리 (rm /tmp/pentest_*) 누락
      - 원격 authorized_keys (sed -i) 정리 X
      - 체크리스트 (7+ 항목) 누락
      - ansible 자동화 또는 다중 호스트 정리 X
      - 감사 로그 검증 미언급
      - PTES RoE / CEH Code of Ethics 인용 X
      - 정리 시간 + sha256 검증 누락
      - "'Cleanup complete' 키워드 X"
  target_vm: attacker
- order: 14
  instruction: 'Phase 8 - 보안 강화 권고: 발견된 취약점에 대한 구체적인 대응 방안을 우선순위별로 작성하라.'
  hint: Critical -> High -> Medium 순서로 대응 방안을 작성한다
  category: analysis
  points: 15
  answer: echo -e '=== Remediation Recommendations ===\n\n[CRITICAL - 즉시 조치 (1주 이내)]\n1. SQL Injection
    수정\n   - Parameterized queries/Prepared statements 적용\n   - ORM 사용 (Sequelize, SQLAlchemy)\n   - WAF
    rule 추가\n\n2. User API 접근 제어\n   - /api/Users 인증 필수화\n   - 민감 필드(password) 응답에서 제외\n\n[HIGH - 단기 조치
    (1개월 이내)]\n3. SSH 비밀번호 정책\n   - 서버별 고유 비밀번호\n   - SSH 키 기반 인증으로 전환\n   - 비밀번호 인증 비활성화\n\n4. Rate Limiting\n   -
    로그인 API에 rate limit 적용 (5회/분)\n   - 계정 잠금 (10회 실패 후 30분)\n\n[MEDIUM - 중기 조치 (3개월 이내)]\n5. 보안 헤더 추가\n6.
    에러 메시지 최소화\n7. 디렉토리 리스팅 비활성화\n8. 정기 취약점 스캔 자동화'
  answer_detail: 대응 방안은 위험도와 구현 난이도를 고려하여 우선순위를 매겨야 한다. Critical 취약점은 즉시 조치하고, High는 1개월 이내, Medium은 분기
    내 해결을 목표로 설정한다.
  verify:
    type: output_contains
    expect: Remediation Recommendations
    field: stdout
    semantic:
      intent: Phase 8 대응 권고 — Critical 1주(Parameterized query/ORM/WAF + API 인증/민감 필드 제외) + High 1개월(서버별
        비번/SSH 키 + Rate limit + 잠금) + Medium 3개월(보안 헤더/에러/디렉터리/스캔 자동화). PTES Recommendations.
      success_criteria:
      - Remediation Recommendations 키워드
      - CRITICAL/HIGH/MEDIUM 우선순위 + 기간
      - 권고 5개 이상
      acceptable_methods:
      - "Critical (1주 이내) 권고 — cat <<'EOF' > /tmp/remediation.md\\n## CRITICAL — 1주 이내\\n### 1. SQL Injection 수정 (CVSS 9.8)\\n- Parameterized queries 적용 (Sequelize/Prisma)\\n- 예: db.run('SELECT * FROM users WHERE email=?', [email])\\n- 모든 query 코드 검토\\n- WAF rule 임시 차단 (ModSecurity CRS)\\n### 2. /api/Users 인증 적용 (CVSS 7.5)\\n- JWT middleware 모든 /api/* 적용\\n- password 필드 응답 제외 (toJSON override)\\nEOF\\ncat /tmp/remediation.md | head -10. 출력: Critical 2건. 해석: SLA 1주 = Critical 표준. 구체적 코드·도구 명시. step 4·5 의 SQLi 와 step 5 의 BOLA 직접 대응."
      - "High (1개월 이내) 권고 — cat <<'EOF' >> /tmp/remediation.md\\n## HIGH — 1개월 이내\\n### 3. SSH 비밀번호 정책 강화 (CVSS 8.1)\\n- 호스트별 고유 비밀번호 (Vault)\\n- SSH 키 기반 인증 강제\\n  PasswordAuthentication no (sshd_config)\\n  PubkeyAuthentication yes\\n- ssh key 회전 90일\\n### 4. Rate Limiting (CVSS 7.3)\\n- 로그인 5회/분 → 30분 lockout\\n- nginx limit_req_zone\\n- API gateway throttle\\n### 5. BOLA 추가 검사\\n- 사용자 본인 데이터만 접근\\n- ABAC (Attribute-Based AC)\\nEOF. 출력: High 3건. 해석: 1개월 SLA. step 6 의 cred reuse + step 7 의 권한 + step 12 의 rate limit. 표준 통제."
      - "Medium (3개월 이내) 권고 — cat <<'EOF' >> /tmp/remediation.md\\n## MEDIUM — 3개월 이내\\n### 6. 보안 헤더 추가\\n- X-Frame-Options: DENY\\n- X-Content-Type-Options: nosniff\\n- Strict-Transport-Security: max-age=31536000\\n- Content-Security-Policy\\n### 7. 에러 메시지 최소화\\n- production: 일반 메시지만\\n- 상세 에러는 logging only\\n### 8. 디렉토리 리스팅 비활성화\\n- Apache: Options -Indexes\\n- Nginx: autoindex off\\n### 9. 정기 취약점 스캔 자동화\\n- nuclei + Trivy CI/CD 통합\\n- 월 1회 OpenVAS 전체 스캔\\nEOF. 출력: Medium 4건. 해석: 3개월 SLA. step 2 의 디렉토리 + step 3 의 헤더 누락 + step 9 의 verbose error 직접 대응."
      - "OWASP ASVS 매핑 — echo '[OWASP ASVS 4.0 (Application Security Verification Standard)]'; echo '  V1 Architecture, Design, Threat Modeling'; echo '  V2 Authentication ← step 4·6'; echo '  V3 Session Management'; echo '  V4 Access Control ← step 5'; echo '  V5 Validation, Sanitization, Encoding ← step 4·5'; echo '  V6 Stored Cryptography'; echo '  V7 Error Handling ← step 9 verbose'; echo '  V8 Data Protection'; echo '  V9 Communications ← TLS'; echo '  V10 Malicious Code'; echo '  V11 Business Logic'; echo '  V12 Files and Resources'; echo '  V13 API ← step 5 BOLA'; echo '[Level] L1 (basic) / L2 (standard) / L3 (high)'. 출력: ASVS 13 카테고리. 해석: 본 lab 발견 = V2/V4/V5/V7/V13. 대응 = ASVS 항목별 통제 적용."
      - "NIST CSF + NIST SP 800-53 — echo '[NIST Cybersecurity Framework v2.0]'; echo '  IDENTIFY (ID) — 자산·위협 식별'; echo '  PROTECT (PR) — 통제 적용'; echo '  DETECT (DE) — 모니터링'; echo '  RESPOND (RS) — 대응'; echo '  RECOVER (RC) — 복구'; echo '  GOVERN (GV) — 거버넌스'; echo '[NIST SP 800-53 통제]'; echo '  AC Access Control'; echo '  AU Audit'; echo '  IA Identification'; echo '  SC System and Comm Protection'; echo '  SI System and Information Integrity'. 출력: CSF + 800-53. 해석: 본 권고 = PR(통제) + DE(모니터링) 위주. 한국 K-ISMS 도 동일 카테고리."
      - "구현 도구 매핑 — printf '%-25s | %-15s | %s\\n' 'Vuln' 'Tool' 'Cost'; printf '%-25s | %-15s | %s\\n' 'SQLi' 'WAF (ModSec)' 'Free'; printf '%-25s | %-15s | %s\\n' 'BOLA' 'API Gateway' 'Variable'; printf '%-25s | %-15s | %s\\n' 'Cred reuse' 'HashiCorp Vault' 'Free OSS'; printf '%-25s | %-15s | %s\\n' 'Rate limit' 'nginx limit_req' 'Free'; printf '%-25s | %-15s | %s\\n' 'Security headers' 'helmet (Express)' 'Free npm'; printf '%-25s | %-15s | %s\\n' 'Vuln scan' 'nuclei + Trivy' 'Free OSS'. 출력: 6 도구. 해석: 90% 무료 OSS. 비용 0 구현 가능. 핑계 X."
      - "Quick Wins (1일 내) — echo '[Quick Wins — 1일 내 즉시]'; echo '1. WAF rule SQLi 차단 (ModSecurity)'; echo '   SecRule ARGS \"@detectSQLi\" \"deny,status:403\"'; echo '2. /api/Users JWT 강제 (1줄 추가)'; echo '   app.use(\"/api/Users\", authMiddleware)'; echo '3. 디렉토리 리스팅 off'; echo '   Apache: Options -Indexes'; echo '4. PasswordAuthentication no (SSH)'; echo '5. helmet middleware 추가 (Node.js)'; echo '   app.use(helmet())'. 출력: 5 quick wins. 해석: 1줄 코드 또는 설정으로 즉시 위험 ↓. 본격 수정 전 임시 차단."
      - "예산 + ROI — echo '[1년 예산]'; echo '  WAF 라이센스 (Cloudflare Pro): \\$240/년'; echo '  Vault 자체 호스팅: \\$0 (인건비)'; echo '  nuclei + Trivy: \\$0'; echo '  helmet + ASVS: \\$0'; echo '  교육 (개발팀 OWASP Top 10): \\$2,000'; echo '  총: \\$2,240/년'; echo '[ROI]'; echo '  IBM Breach Cost 평균: \\$4.88M (2024)'; echo '  SQLi 사고 회피 1건 = ROI 218,000%'; echo '[비용 정당화]'; echo '  ASVS L1 충족 = 인증 + 거래처 신뢰'. 출력: 예산 + ROI. 해석: 보안투자 정당화. 경영진 승인용."
      negative_signs:
      - Critical/High/Medium 우선순위 분류 X
      - 1일/1주/1개월/3개월 SLA 누락
      - OWASP ASVS / NIST CSF / NIST SP 800-53 매핑 X
      - 구현 도구 (WAF/Vault/helmet/nuclei) 미명시
      - 권고 5개 이하 (10개 권장)
      - Quick Wins (1일 내) 섹션 누락
      - 예산 + ROI 정량 분석 X
  target_vm: attacker
- order: 15
  instruction: 'Phase 9 - 최종 보고서: 모의해킹 결과를 종합한 Executive Summary를 /tmp/pentest_final_report.txt에 작성하라.'
  hint: 경영진 요약, 범위, 발견사항, 권고를 포함한다
  category: analysis
  points: 15
  answer: 'echo -e ''=== PENETRATION TEST REPORT ===\n=== Executive Summary ===\n\nDate: 2026-04-03\nScope:
    10.20.30.0/24 (4 servers)\nTesters: Security Lab Student\nClassification: Confidential\n\n[Overall
    Risk: HIGH]\n\nThe penetration test identified 10 vulnerabilities across\nthe target infrastructure.
    2 Critical and 3 High severity\nvulnerabilities were discovered, allowing:\n\n1. Complete database
    compromise via SQL Injection\n2. Full lateral movement across all servers\n3. Persistent unauthorized
    access\n4. Potential data exfiltration\n\n[Statistics]\n- Critical: 2 (SQL Injection, Data Exposure)\n-
    High: 3 (Cred Reuse, No Rate Limit, IDOR)\n- Medium: 4 (XSS, Missing Headers, DirList, Verbose Errors)\n-
    Low: 1 (Version Disclosure)\n\n[Top 3 Recommendations]\n1. Fix SQL Injection immediately (parameterized
    queries)\n2. Implement unique passwords per server + SSH key auth\n3. Add authentication to all API
    endpoints\n\n[Conclusion]\nThe current security posture requires significant improvement.\nImmediate
    action on Critical findings is strongly recommended.'' > /tmp/pentest_final_report.txt && cat /tmp/pentest_final_report.txt'
  answer_detail: 모의해킹 최종 보고서는 경영진이 이해할 수 있는 Executive Summary로 시작해야 한다. 전체 위험 수준, 주요 발견 사항, 핵심 권고를 간결하게
    요약하고, 상세 기술 내용은 부록에 첨부한다.
  verify:
    type: output_contains
    expect: PENETRATION TEST REPORT
    field: stdout
    semantic:
      intent: 'Phase 9 최종 보고서 — echo > /tmp/pentest_final_report.txt: Executive Summary [Date/Scope/Tester/Class]
        + Overall Risk HIGH + 4가지 영향 + Statistics(Critical 2/High 3/Medium 4/Low 1) + Top 3 Recommendations
        + Conclusion. PTES Reporting Standard. 경영진 1페이지 요약.'
      success_criteria:
      - PENETRATION TEST REPORT 키워드
      - Executive Summary 형식
      - Statistics + Top 3 권고 + Conclusion
      acceptable_methods:
      - "보고서 헤더 + 메타데이터 — cat <<'EOF' > /tmp/pentest_final_report.txt\\n=== PENETRATION TEST REPORT ===\\n=== Executive Summary ===\\n\\nDate: 2026-04-29\\nScope: 10.20.30.0/24 (4 servers — web/secu/siem/attacker)\\nTesters: Security Lab Student (attack-nonai-w15)\\nClassification: Confidential\\nReport ID: PT-2026-0429-001\\nMethodology: PTES 7 phase + MITRE ATT&CK\\nEOF\\nhead -10 /tmp/pentest_final_report.txt. 출력: 메타 헤더. 해석: 6 컬럼 (Date/Scope/Testers/Class/ID/Method) = 표준. 추후 검색·감사 위해 ID + Class 필수."
      - "Overall Risk + 4 영향 — cat <<'EOF' >> /tmp/pentest_final_report.txt\\n\\n[Overall Risk: HIGH]\\n\\nThe penetration test identified 10 vulnerabilities across\\nthe target infrastructure. 2 Critical and 3 High severity\\nvulnerabilities were discovered, allowing:\\n\\n1. Complete database compromise via SQL Injection\\n2. Full lateral movement across all servers (cred reuse)\\n3. Persistent unauthorized access (SSH key backdoor)\\n4. Potential data exfiltration (encrypted bundle)\\nEOF\\necho '[Overall Risk + 4 Impact]'. 출력: 위험 평가 + 영향. 해석: HIGH = Critical 2건 이상. 4 영향 = CIA + Persistence. 경영진 1줄 요약."
      - "Statistics 섹션 — cat <<'EOF' >> /tmp/pentest_final_report.txt\\n\\n[Statistics]\\n- Critical: 2 (SQL Injection auth bypass, UNION SQLi)\\n- High: 3 (Cred Reuse, BOLA /api/Users, No Rate Limit)\\n- Medium: 4 (XSS Reflected, Missing Headers, DirList, Verbose Errors)\\n- Low: 1 (Version Disclosure)\\n- Total: 10\\n\\n[CVSS Distribution]\\n  9.0-10.0: ▆▆ (2)\\n  7.0-8.9:  ▆▆▆ (3)\\n  4.0-6.9:  ▆▆▆▆ (4)\\n  0.1-3.9:  ▆ (1)\\nEOF\\ngrep -A 12 'Statistics' /tmp/pentest_final_report.txt. 출력: 통계 + ASCII bar chart. 해석: 분포로 위험 시각화. 경영진이 한눈에 이해."
      - "Top 3 Recommendations — cat <<'EOF' >> /tmp/pentest_final_report.txt\\n\\n[Top 3 Recommendations]\\n1. Fix SQL Injection immediately (parameterized queries)\\n   - 1주 이내 / 비용: \\$0 (오픈소스)\\n   - Sequelize/Prisma 적용 + WAF 임시 차단\\n2. Implement unique passwords per server + SSH key auth\\n   - 1개월 이내 / 비용: \\$0 + Vault 도입\\n3. Add authentication to all API endpoints (BOLA fix)\\n   - 2주 이내 / 비용: 코드 수정 (1 문장 middleware)\\nEOF. 출력: Top 3 권고. 해석: 경영진 의사결정 = Top 3 만 본다. SLA + 비용 + 도구 명시 → 즉시 결재 가능."
      - "Conclusion + Sign-off — cat <<'EOF' >> /tmp/pentest_final_report.txt\\n\\n[Conclusion]\\nThe current security posture requires significant improvement.\\nImmediate action on Critical findings is strongly recommended.\\nAll backdoors and artifacts have been removed (see Cleanup Section).\\n\\n[Cleanup Verified]\\n- Remote SSH backdoor key: REMOVED\\n- Local pentest artifacts: REMOVED\\n- /tmp/.hidden_*: REMOVED\\n\\n[Sign-off]\\nTester: ___________ Date: ___________\\nClient: ___________ Date: ___________\\nEOF\\ntail -15 /tmp/pentest_final_report.txt. 출력: 결론 + sign-off. 해석: PTES 표준. cleanup 검증 + 양측 서명 = 계약 종료. step 13 의 cleanup 결과 인용."
