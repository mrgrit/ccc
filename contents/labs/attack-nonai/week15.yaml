      - "ASCII 공격 경로 다이어그램 — cat <<'EOF' > /tmp/attack_path.txt\\n=== Attack Path Diagram ===\\n\\n[Attacker: 10.20.30.201]\\n        |\\n        | (1) Recon: nmap -sn / -sV (Phase 1)\\n        v\\n[Web: 10.20.30.80]\\n   |    |    |\\n   |    |    +-- (2) SQLi login bypass → Admin JWT (Phase 3, CVSS 9.8)\\n   |    |    +-- (3) UNION SQLi → Users DB dump (Phase 3, CVSS 9.1)\\n   |    |    +-- (4) BOLA /api/Users no-auth (CVSS 7.5)\\n   |    |\\n   |    +-- (5) SSH cred reuse ccc:1\\n   |              |\\n   |              v\\n   |    [Secu: 10.20.30.1] (Phase 4)\\n   |         +-- (6) Firewall config 접근\\n   |         +-- (7) Suricata rule 접근\\n   |\\n   +-- (5b) SSH cred reuse\\n              |\\n              v\\n   [SIEM: 10.20.30.100] (Phase 4)\\n        +-- (8) Wazuh config 접근\\n        +-- (9) Alert log 접근\\n[Persistence: Phase 5]\\n  - SSH key backdoor (T1098.004)\\nEOF\\ncat /tmp/attack_path.txt. 출력: ASCII 다이어그램. 해석: 호스트·화살표·CVSS 명시. 경영진이 직관 이해 가능."
      - "Mermaid 그래프 (markdown 호환) — cat <<'EOF' > /tmp/attack_path.mmd\\ngraph TD\\n  A[Attacker 10.20.30.201] -->|nmap -sV| W[Web 10.20.30.80]\\n  W -->|SQLi auth bypass<br/>CVSS 9.8| W2[Admin JWT]\\n  W -->|UNION SQLi<br/>CVSS 9.1| W3[Users DB dump]\\n  W -->|BOLA /api/Users<br/>CVSS 7.5| W4[All users data]\\n  W -->|ssh ccc:1<br/>cred reuse| S[Secu 10.20.30.1]\\n  W -->|ssh ccc:1| SI[SIEM 10.20.30.100]\\n  W -->|SSH key backdoor<br/>T1098.004| P[Persistence]\\n  S --> S1[Firewall config]\\n  SI --> SI1[Wazuh config]\\nEOF\\necho '[Mermaid 렌더]'; echo '  GitHub README 자동 렌더'; echo '  https://mermaid.live/ 미리보기'. 출력: Mermaid 코드. 해석: ASCII 보다 시각적. PR/위키/Confluence 자동 렌더. 산업 표준."
      - "MITRE ATT&CK Navigator Layer JSON — cat <<'EOF' > /tmp/attack_layer.json\\n{\\n  \"name\": \"JuiceShop Pentest 2026-04-29\",\\n  \"versions\": {\"attack\": \"16\", \"navigator\": \"5.1.0\", \"layer\": \"4.5\"},\\n  \"domain\": \"enterprise-attack\",\\n  \"techniques\": [\\n    {\"techniqueID\": \"T1595.001\", \"score\": 100, \"comment\": \"Phase 1 nmap\"},\\n    {\"techniqueID\": \"T1190\", \"score\": 100, \"comment\": \"Phase 3 SQLi\"},\\n    {\"techniqueID\": \"T1078.003\", \"score\": 100, \"comment\": \"Phase 4 cred reuse\"},\\n    {\"techniqueID\": \"T1021.004\", \"score\": 100, \"comment\": \"Phase 4 SSH lateral\"},\\n    {\"techniqueID\": \"T1098.004\", \"score\": 100, \"comment\": \"Phase 5 SSH key\"},\\n    {\"techniqueID\": \"T1041\", \"score\": 100, \"comment\": \"Phase 5 exfil\"},\\n    {\"techniqueID\": \"T1573.001\", \"score\": 100, \"comment\": \"Phase 5 AES256\"}\\n  ]\\n}\\nEOF\\njq . /tmp/attack_layer.json | head -10; echo '[Navigator 시각화]'; echo '  attack-navigator import → heatmap'. 출력: Navigator JSON. 해석: 본 lab 의 ATT&CK 매핑 = Navigator 으로 시각화. 7 technique heatmap → 경영진 대시보드."
      - "Cyber Kill Chain 매핑 — printf '%-20s | %-30s | %s\\n' 'Kill Chain' 'JuiceShop step' 'MITRE'; printf '%-20s | %-30s | %s\\n' '1 Recon' 'Phase 1 nmap+web' 'T1595/T1592'; printf '%-20s | %-30s | %s\\n' '2 Weaponization' 'SQLi 페이로드' 'T1588'; printf '%-20s | %-30s | %s\\n' '3 Delivery' 'POST /rest/user/login' 'T1190'; printf '%-20s | %-30s | %s\\n' '4 Exploitation' 'auth bypass' 'T1190+T1078'; printf '%-20s | %-30s | %s\\n' '5 Installation' 'SSH key backdoor' 'T1098.004'; printf '%-20s | %-30s | %s\\n' '6 C2' 'reverse shell' 'T1041'; printf '%-20s | %-30s | %s\\n' '7 Actions' 'data exfil' 'T1567'. 출력: 7 단계 매핑. 해석: Lockheed Martin Kill Chain ↔ MITRE ATT&CK + 본 lab phase."
      - "Impact 섹션 (정량 + 정성) — cat <<'EOF' >> /tmp/attack_path.txt\\n\\n[Impact — 정량]\\n- 영향 사용자: 18명 (전체 100%)\\n- 노출 자산: JuiceShop DB + secu config + SIEM config\\n- 데이터 손실 가능성: 100%\\n- 다운타임 위험: HIGH (백도어 + 측면이동)\\n\\n[Impact — 정성]\\n- Confidentiality: 전체 사용자 자격증명 노출\\n- Integrity: SSH 키 백도어 (변조 가능)\\n- Availability: DoS 가능 (SQLi DELETE)\\n- 비즈니스: 평판 손상 + 규제 (개보법 §29 위반)\\nEOF\\ntail -15 /tmp/attack_path.txt. 출력: Impact 섹션. 해석: 경영진 = 정량 (숫자) + 정성 (분류). CIA + 비즈니스 영향 분류."
      - "PTES Reporting + STRIDE — echo '[PTES Reporting Section]'; echo '  - Executive Summary'; echo '  - Scope'; echo '  - Findings (CVSS + 다이어그램)'; echo '  - Remediation'; echo '  - Conclusion + Appendix'; echo '[STRIDE 위협 모델]'; echo '  S Spoofing → SQLi 인증 우회'; echo '  T Tampering → SSH 키 백도어'; echo '  R Repudiation → 로그 변조 가능'; echo '  I Info Disclosure → DB dump'; echo '  D DoS → SQLi DELETE'; echo '  E Elevation → BOLA + cred reuse'. 출력: PTES + STRIDE. 해석: STRIDE 모델로 위협 분류 = MS Threat Modeling 표준. 본 lab 발견은 STRIDE 6 카테고리 모두 매치."
      - "Graphviz / drawio (전문 시각화) — echo '[Graphviz dot]'; cat <<'EOF'\\ndigraph attack_path {\\n  rankdir=LR;\\n  attacker [shape=box,color=red,label=\"Attacker\\\\n10.20.30.201\"];\\n  web [shape=box,label=\"Web\\\\n10.20.30.80\"];\\n  attacker -> web [label=\"SQLi 9.8\"];\\n  web -> secu [label=\"ssh ccc:1\"];\\n  web -> siem [label=\"ssh ccc:1\"];\\n}\\nEOF\\necho '[렌더]'; echo '  dot -Tpng attack.dot -o attack.png'; echo '[draw.io]'; echo '  https://app.diagrams.net/'; echo '  - 무료 + 협업 + 다양한 stencil'. 출력: Graphviz + drawio. 해석: 정식 보고서는 PNG/PDF 임베드. drawio 가 산업 표준 (Confluence/Jira 통합)."
