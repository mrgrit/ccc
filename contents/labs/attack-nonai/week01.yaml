lab_id: attack-nonai-week01
title: 정보수집 기초 (Reconnaissance)
version: non-ai
course: attack-nonai
week: 1
description: OSINT 및 능동적 정보수집 기법을 활용하여 대상 네트워크와 호스트의 정보를 체계적으로 수집한다. whois, DNS 조회,
  배너 그래빙, 웹 핑거프린팅 등 기본적인 정찰 기술을 실습한다.
difficulty: easy
duration_minutes: 120
objectives:
- 수동 정보수집(OSINT)과 능동 정보수집의 차이를 이해한다
- DNS, whois, 배너 그래빙 등 기본 정찰 도구를 사용할 수 있다
- 수집된 정보를 체계적으로 정리하고 공격 표면을 식별한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: ping을 사용하여 대상 호스트 {{WEB_IP}}이 활성 상태인지 확인하라. ICMP 응답을 3회만 보내라.
  hint: |
    ping -c 옵션으로 횟수를 제한할 수 있다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: ping -c 3 10.20.30.80
    2) 미설치 시: sudo apt install -y iputils-ping (Debian/Ubuntu) 또는 sudo yum install -y iputils (RHEL)
    3) ICMP 차단/실패 시 fallback (순서대로):
       - fping -c 3 10.20.30.80 (병렬 ICMP)
       - sudo hping3 --icmp -c 3 10.20.30.80 (방화벽 우회)
       - sudo nmap -sn 10.20.30.80 (ARP+ICMP+TCP 결합)
       - tcping -c 3 10.20.30.80 80 (TCP-only)
       - python3 -c "import socket; s=socket.socket(); s.settimeout(2); print('alive' if s.connect_ex(('10.20.30.80',80))==0 else 'no reply')"
    4) 검증: TTL=64 (Linux) / 128 (Windows). 0% loss = 활성.
  category: recon
  points: 5
  answer: ping -c 3 10.20.30.80
  answer_detail: ping -c 3은 ICMP Echo Request를 3회 전송하여 대상 호스트의 생존 여부를 확인한다. TTL 값과
    응답 시간으로 OS 유형을 추정할 수 있다.
  verify:
    type: output_contains
    expect: bytes from 10.20.30.80
    field: stdout
    semantic:
      intent: ping ICMP 생존 확인 — ping -c 3 10.20.30.80. ICMP Echo Request 3회. TTL로
        OS 추정 (Linux 64 / Windows 128).
      success_criteria:
      - bytes from 10.20.30.80 키워드
      - ping -c 3
      - ICMP 응답
      acceptable_methods:
      - "ping -c 3 (수기 baseline): 명령 `ping -c 3 10.20.30.80`. 출력 `PING 10.20.30.80 (10.20.30.80) 56(84) bytes of data.\\n64 bytes from 10.20.30.80: icmp_seq=1 ttl=64 time=0.234 ms\\n64 bytes from 10.20.30.80: icmp_seq=2 ttl=64 time=0.198 ms\\n--- 10.20.30.80 ping statistics ---\\n3 packets transmitted, 3 received, 0% packet loss` → ttl=64 = Linux, ttl=128 = Windows. 0% loss = 호스트 활성."
      - "fping target (대량 ICMP): 명령 `fping -c 3 -q 10.20.30.80`. -c 3 = 3 packet, -q = quiet (요약만). 출력 `10.20.30.80 : xmt/rcv/%loss = 3/3/0%, min/avg/max = 0.198/0.220/0.234`. 다중 호스트 동시 (`fping -a -g 10.20.30.0/24`) — 1초에 /24 sweep."
      - "hping3 --icmp: 명령 `sudo hping3 --icmp -c 3 10.20.30.80`. 출력 `len=46 ip=10.20.30.80 ttl=64 id=12345 icmp_seq=0 rtt=0.3 ms`. ICMP 외 TCP/UDP/RAW 도 — 방화벽 우회 (`hping3 -S -p 80` SYN ping). pentest 표준."
      - "nmap -sn (ping sweep): 명령 `sudo nmap -sn 10.20.30.80`. 출력 `Nmap scan report for 10.20.30.80\\nHost is up (0.00023s latency).\\nMAC Address: 00:0c:29:11:22:33 (VMware)`. ARP + ICMP + TCP SYN/ACK 자동 — 방화벽 우회."
      - "Python scapy ICMP: 명령 `python3 -c \"from scapy.all import *; r = sr1(IP(dst='10.20.30.80')/ICMP(), timeout=2, verbose=0); print(r.ttl if r else 'no reply')\"`. 출력 `64`. ICMP 응답 객체 → 후속 자동화 (TTL fingerprinting)."
      - "tcping (TCP-only, 방화벽 우회): 명령 `tcping -c 3 10.20.30.80 80`. 출력 `Reply from 10.20.30.80: bytes=0 time<1ms ttl=64`. ICMP 차단 환경에서 TCP SYN/ACK 만 — 방화벽이 ICMP drop 시 대안."
      - "fping6 (IPv6 호환): 명령 `fping6 -c 3 fe80::1`. ICMPv6 Echo. 듀얼 스택 환경 정찰. IPv6-only 호스트 식별."
      - "Wireshark + ping 분석: 명령 `sudo tshark -i eth0 -f 'icmp' -T fields -e ip.src -e icmp.type -e ip.ttl -c 6 & ping -c 3 10.20.30.80`. icmp.type 8 = request, 0 = reply. 패킷 레벨 검증."
      negative_signs:
      - ping -c 없음
      - 대상 IP 없음
      - TTL 맥락 없음
      negative_signs:
      - ping -c 없음
      - 대상 IP 없음
      - TTL 맥락 없음
  target_vm: attacker
- order: 2
  instruction: nslookup 또는 dig를 사용하여 실습 네트워크의 DNS 서버에 {{WEB_IP}}의 역방향 DNS 조회를 수행하라.
  hint: |
    dig -x 옵션으로 역방향 조회가 가능하다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: dig -x 10.20.30.80 +short
    2) 미설치 시: sudo apt install -y dnsutils 또는 sudo yum install -y bind-utils
    3) 실패/대안:
       - host 10.20.30.80 (간결)
       - nslookup 10.20.30.80 (legacy)
       - drill -x 10.20.30.80 (BIND 대안)
       - python3 -c "import dns.reversename, dns.resolver; addr = dns.reversename.from_address('10.20.30.80'); print(dns.resolver.resolve(addr, 'PTR')[0])"
       - getent hosts 10.20.30.80 (의존성 zero, NSS)
    4) 검증: PTR 레코드 → 명명 규칙 → 역할 추정.
  category: recon
  points: 10
  answer: dig -x 10.20.30.80
  answer_detail: 역방향 DNS 조회(Reverse DNS Lookup)는 IP 주소로부터 호스트명을 알아내는 기법이다. PTR 레코드를
    조회하며, 대상 시스템의 명명 규칙이나 역할을 추정할 수 있다.
  verify:
    type: output_contains
    expect: IN
    field: stdout
    semantic:
      intent: 역방향 DNS — dig -x 10.20.30.80. PTR 레코드 조회. 호스트명 → 역할 추정. Reverse DNS
        Lookup.
      success_criteria:
      - IN 키워드
      - dig -x 역방향
      - PTR 레코드
      acceptable_methods:
      - "dig -x (수기 baseline): 명령 `dig -x 10.20.30.80 +short`. 출력 `web.corp.local.` → PTR 레코드. 명명 규칙 → 역할 (web/db/auth/secu) 추론. corp.local 도메인 발견."
      - "dig -x 상세: 명령 `dig -x 10.20.30.80`. 출력 `;; ANSWER SECTION:\\n80.30.20.10.in-addr.arpa. 3600 IN PTR web.corp.local.\\n;; AUTHORITY SECTION:\\n30.20.10.in-addr.arpa. 3600 IN NS ns1.corp.local.`. TTL + Authority 까지."
      - "host <ip> (간단): 명령 `host 10.20.30.80`. 출력 `80.30.20.10.in-addr.arpa domain name pointer web.corp.local`. dig 보다 간결. 빠른 lookup."
      - "nslookup (legacy): 명령 `nslookup 10.20.30.80`. 출력 `Server: 10.20.30.1\\nAddress: 10.20.30.1#53\\n80.30.20.10.in-addr.arpa name = web.corp.local.`. Windows/old Linux 호환."
      - "Python dnspython: 명령 `python3 -c \"import dns.reversename, dns.resolver; addr = dns.reversename.from_address('10.20.30.80'); print(dns.resolver.resolve(addr, 'PTR')[0])\"`. 출력 `web.corp.local.`. 자동화 + 후속 처리."
      - "fierce: 명령 `fierce --domain corp.local`. zone transfer 시도 + 역방향 brute. recon 표준."
      - "dnsrecon: 명령 `dnsrecon -r 10.20.30.0/24 -n 10.20.30.1`. -r = range 역방향 brute. /24 전체 한 번에. 표준 reverse sweep."
      - "amass + 역방향: 명령 `amass enum -active -d corp.local -ip`. CT log + DNS brute + 역방향 통합. 외부 자산."
      - "drill -x (BIND 대안): 명령 `drill -x 10.20.30.80 @10.20.30.1`. ldns 의 dig 대안. DNSSEC 친화."
      negative_signs:
      - -x 없음
      - 역방향 맥락 없음
      - PTR 맥락 없음
      negative_signs:
      - -x 없음
      - 역방향 맥락 없음
      - PTR 맥락 없음
  target_vm: attacker
- order: 3
  instruction: curl을 사용하여 웹서버({{WEB_IP}}:3000)의 HTTP 헤더만 확인하라. 서버 소프트웨어 정보를 파악하라.
  hint: |
    curl -I 옵션은 HEAD 요청을 보내 헤더만 가져온다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -I http://10.20.30.80:3000
    2) 미설치 시: sudo apt install -y curl
    3) 실패/대안:
       - wget --server-response --spider http://10.20.30.80:3000 (BusyBox)
       - http --headers HEAD http://10.20.30.80:3000 (httpie)
       - echo http://10.20.30.80:3000 | httpx -title -tech-detect -silent
       - whatweb -v http://10.20.30.80:3000 (200+ plugin)
       - sudo nmap -sV -p 3000 10.20.30.80 (NSE)
       - python3 -c "import urllib.request; r=urllib.request.urlopen('http://10.20.30.80:3000'); print(dict(r.headers))"
    4) 검증: Server/X-Powered-By/Set-Cookie → 기술 스택 → CVE 검색.
  category: recon
  points: 10
  answer: curl -I http://10.20.30.80:3000
  answer_detail: HTTP 응답 헤더에는 Server, X-Powered-By 등 서버 기술 스택 정보가 포함될 수 있다. 이 정보로
    사용 중인 프레임워크와 버전을 식별하여 알려진 취약점을 검색할 수 있다.
  verify:
    type: output_contains
    expect: HTTP/
    field: stdout
    semantic:
      intent: HTTP 헤더 핑거프린팅 — curl -I http://10.20.30.80:3000. HEAD 요청 + Server/X-Powered-By
        헤더. CVE 검색 기반. 서버 기술 스택.
      success_criteria:
      - HTTP/ 키워드
      - curl -I 3000
      - 헤더 조회
      acceptable_methods:
      - "curl -I (HEAD 요청): 명령 `curl -I http://10.20.30.80:3000`. 출력 `HTTP/1.1 200 OK\\nServer: nginx/1.24.0\\nX-Powered-By: Express\\nContent-Type: text/html` → Server + X-Powered-By → CVE 검색 기반."
      - "wget --server-response: 명령 `wget --server-response --spider http://10.20.30.80:3000 2>&1 | grep -E 'HTTP|Server|X-'`. --spider = HEAD only. curl 미설치 환경 (BusyBox)."
      - "httpie HEAD: 명령 `http --headers HEAD http://10.20.30.80:3000`. 출력 syntax-highlighted JSON-like. modern Python."
      - "httpx -tech-detect (ProjectDiscovery): 명령 `echo http://10.20.30.80:3000 | httpx -title -tech-detect -status-code -silent`. 출력 `[200] [Login] [nginx,Express,Vue.js]`. 1500+ tech detect."
      - "whatweb: 명령 `whatweb -v http://10.20.30.80:3000`. 출력 `HTTPServer[nginx/1.24.0], Express[4.18.2], JQuery[3.6.0]`. 200+ plugin."
      - "Wappalyzer CLI: 명령 `wappalyzer http://10.20.30.80:3000 --pretty`. JSON tech list."
      - "nmap -sV --version-intensity 9: 명령 `sudo nmap -sV --version-intensity 9 -p 3000 10.20.30.80`. NSE banner + version probe — curl 보다 정밀."
      - "Burp Site Map: Pro → Target → http://10.20.30.80:3000 → Crawl. 자동 spider + JS-rendered."
      - "OWASP ZAP: 명령 `zaproxy -daemon -port 8080`. proxy + Active Scan."
      negative_signs:
      - curl -I 없음
      - 헤더 조회 맥락 없음
      - 3000 포트 없음
      negative_signs:
      - curl -I 없음
      - 헤더 조회 맥락 없음
      - 3000 포트 없음
  target_vm: attacker
- order: 4
  instruction: curl로 웹서버({{WEB_IP}}:3000)의 robots.txt 파일을 확인하여 숨겨진 경로를 찾아라.
  hint: |
    robots.txt는 웹 루트에 위치한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -s http://10.20.30.80:3000/robots.txt
    2) 미설치 시: sudo apt install -y curl
    3) 실패/대안:
       - wget -qO- http://10.20.30.80:3000/robots.txt
       - http GET http://10.20.30.80:3000/robots.txt (httpie)
       - echo 10.20.30.80:3000 | httpx -path /robots.txt -silent
       - feroxbuster -u http://10.20.30.80:3000 -w common.txt -x txt
       - python3 -c "import urllib.request; print(urllib.request.urlopen('http://10.20.30.80:3000/robots.txt').read().decode())"
    4) 후속: Disallow 경로 자동 fuzz (curl + grep + xargs).
    5) 검증: Disallow 라인 → 관리자/백업/숨겨진 API.
  category: recon
  points: 10
  answer: curl -s http://10.20.30.80:3000/robots.txt
  answer_detail: robots.txt는 검색엔진 크롤러에게 접근을 제한할 경로를 알려주는 파일이다. 공격자 관점에서는 관리자 페이지,
    백업 파일 등 민감한 경로가 노출될 수 있어 정찰에 유용하다.
  verify:
    type: output_contains
    expect: Disallow
    field: stdout
    semantic:
      intent: robots.txt 조회 — curl -s http://10.20.30.80:3000/robots.txt. Disallow
        경로 → 관리자 페이지/백업 파일 노출. 숨겨진 경로 발견.
      success_criteria:
      - Disallow 키워드
      - curl robots.txt
      - 숨겨진 경로
      acceptable_methods:
      - "curl robots.txt (수기 baseline): 명령 `curl -s http://10.20.30.80:3000/robots.txt`. 출력 `User-agent: *\\nDisallow: /admin\\nDisallow: /backup\\nDisallow: /ftp\\nDisallow: /api/v1` → Disallow 경로 = 관리자/백업/숨겨진 API 노출. 검색엔진 차단 의도지만 attacker 에게는 1차 정찰."
      - "wget robots.txt: 명령 `wget -qO- http://10.20.30.80:3000/robots.txt`. -q = quiet, -O- = stdout. curl 미설치 환경."
      - "httpx -path /robots.txt: 명령 `echo 10.20.30.80:3000 | httpx -path /robots.txt -silent`. CI 통합."
      - "Burp Repeater: Burp Pro → Repeater → GET /robots.txt → response 분석. manual."
      - "feroxbuster + recursive: 명령 `feroxbuster -u http://10.20.30.80:3000 -w /usr/share/seclists/Discovery/Web-Content/common.txt -x txt`. robots.txt 발견 + Disallow 경로 자동 follow."
      - "nikto -h: 명령 `nikto -h http://10.20.30.80:3000`. robots.txt 자동 + 200+ 보안 체크."
      - "ffuf + Disallow 추출: 명령 `curl -s http://10.20.30.80:3000/robots.txt | grep Disallow | awk '{print $2}' | xargs -I{} ffuf -u http://10.20.30.80:3000{}`. 자동화."
      - "gobuster + robots dictionary: 명령 `gobuster dir -u http://10.20.30.80:3000 -w /usr/share/wordlists/dirb/common.txt`. 200+ path."
      - "OWASP ZAP Spider: web UI Tools → Spider → robots.txt 자동 사용 + 발견 path 추가 crawl."
      negative_signs:
      - robots.txt 없음
      - Disallow 맥락 없음
      negative_signs:
      - robots.txt 없음
      - Disallow 맥락 없음
  target_vm: attacker
- order: 5
  instruction: curl을 사용하여 {{WEB_IP}}:3000 웹 애플리케이션의 기술 스택을 핑거프린팅하라.
  hint: |
    curl -sI로 응답 헤더를 확인하고 Server 등의 정보를 추출한다.

    📎 도구 우선순위 (힌트):
    1) 우선 사용: curl -sI http://10.20.30.80:3000 | grep -iE "(Server|X-Powered-By|X-Frame|Content-Type|Set-Cookie)"
    2) 미설치 시: sudo apt install -y curl
    3) 실패/대안:
       - whatweb -v http://10.20.30.80:3000 (200+ plugin)
       - wappalyzer http://10.20.30.80:3000 --pretty (1500+ tech)
       - echo http://10.20.30.80:3000 | httpx -title -tech-detect -status-code -silent
       - sudo nmap -p 3000 --script http-headers,http-server-header 10.20.30.80
       - python3 EyeWitness.py -f targets.txt --web -d /tmp/ew (스크린샷)
       - aquatone (HTML report + 시각)
    4) 검증: 보안 헤더 (HSTS/CSP/X-Frame) 누락 시 finding 후보.
  category: recon
  points: 10
  answer: curl -sI http://10.20.30.80:3000 | grep -iE "(Server|X-Powered-By|X-Frame|Content-Type|Set-Cookie)"
  answer_detail: HTTP 응답 헤더에서 Server, X-Powered-By, Set-Cookie 등의 정보를 통해 웹 서버 종류,
    프레임워크, 세션 관리 방식을 파악할 수 있다. 패시브 핑거프린팅을 통해 공격 표면을 빠르게 파악할 수 있다.
  verify:
    type: output_contains
    expect: Server
    field: stdout
    semantic:
      intent: 핑거프린팅 — curl -sI + grep -iE '(Server|X-Powered-By|X-Frame|Content-Type|Set-Cookie)'.
        웹 서버/프레임워크/쿠키 정보. Passive fingerprinting.
      success_criteria:
      - Server 키워드
      - 다중 헤더 grep
      - 핑거프린팅
      acceptable_methods:
      - "curl -sI + grep (수기 baseline): 명령 `curl -sI http://10.20.30.80:3000 | grep -iE '(Server|X-Powered-By|X-Frame|Content-Type|Set-Cookie)'`. 출력 `Server: nginx/1.24.0\\nX-Powered-By: Express\\nX-Frame-Options: SAMEORIGIN\\nContent-Type: text/html\\nSet-Cookie: connect.sid=s%3A...; HttpOnly; Path=/`. cookie 의 secure/HttpOnly flag → 보안 정책. X-Frame → clickjacking 방어."
      - "whatweb: 명령 `whatweb -v --no-errors http://10.20.30.80:3000`. 200+ plugin → 종합 fingerprint."
      - "wappalyzer CLI: 명령 `wappalyzer http://10.20.30.80:3000 --pretty`. 1500+ tech."
