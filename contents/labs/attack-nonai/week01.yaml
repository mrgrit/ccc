    ■ 임무 (3 단계, 약 35분)

    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행.

    ▶ Phase A — RoE + Passive OSINT
    1) RoE heredoc:
       ```
       [Rules of Engagement]
       - 대상: 10.20.30.0/24 (ABC 핀테크 외주)
       - 기간: 14주
       - 허용: 정찰/침투/PoC. DoS·실 데이터 유출 X
       - 의무: Critical 즉시 보고. 활동 로그 보존
       - 법적: 정통망법 제48조 (위탁 점검)
       서명: 2026-04-30
       ```
    2) `curl -s -I http://10.20.30.80:3000/ 2>&1 | grep -E "Server|X-Powered"`
    3) `curl -s http://10.20.30.80:3000/robots.txt 2>&1 | head -5`

    ▶ Phase B — Active 정찰
    `ping -c 3 -W 1 10.20.30.80 2>&1 | tail -3`
    `for i in 1 80 100 112 201; do
       ping -c 1 -W 1 10.20.30.$i &>/dev/null && echo "10.20.30.$i: alive" || echo "10.20.30.$i: down"; done`
    `nmap -p 22,80,443,3000,3306,8080 -sV --open --max-rtt-timeout 1000 10.20.30.80 2>&1 | head -20`

    ▶ Phase C — 공격 표면 매트릭스
    | 자산 | 포트 | 서비스 | 기술 스택 | 공격 우선순위 |
    | web (10.20.30.80) | 80 | HTTP+ModSec | Apache+CRS | 중 |
    | web (10.20.30.80) | 3000 | HTTP | JuiceShop/Express/Node | 높음 |
    | web (10.20.30.80) | 8080 | HTTP | DVWA/PHP/Apache | 높음 |
    | bastion (10.20.30.201) | 22 | SSH | OpenSSH | 낮음 |
    | siem (10.20.30.100) | 1514 | Wazuh | - | 회피 대상 |
    표 끝 "w02 침투 우선순위: JuiceShop:3000 → DVWA:8080. SIEM 회피 필요." 한 줄.

    종료: echo "=== Phase A RoE+OSINT ===" / "=== Phase B Active ===" / "=== Phase C 공격 표면 ===".
