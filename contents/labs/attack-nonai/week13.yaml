  answer: 'echo -e ''=== WPA3-SAE vs WPA2-PSK ===\n\n[WPA2-PSK]\n- PSK -> PMK (static,
    derived from password)\n- Offline dictionary attack possible with handshake capture\n-
    No forward secrecy\n\n[WPA3-SAE (Dragonfly)]\n- Password used in Diffie-Hellman
    exchange\n- PMK is ephemeral (different each session)\n- Offline dictionary attack
    IMPOSSIBLE\n  (attacker must interact with AP for each guess)\n- Forward secrecy:
    past sessions safe even if password leaked\n\n[Comparison]\n| Feature | WPA2-PSK
    | WPA3-SAE |\n|---------|----------|----------|\n| Offline attack | Possible |
    Impossible |\n| Forward secrecy | No | Yes |\n| PMF | Optional | Mandatory |\n|
    Dictionary attack | Offline | Online only |'''
  answer_detail: WPA3-SAE는 Dragonfly 핸드셰이크를 사용하여 비밀번호를 직접 전송하지 않고 Diffie-Hellman 교환에
    사용한다. 핸드셰이크를 캡처해도 오프라인 사전 공격이 불가능하며, 세션별 고유한 키를 생성하여 Forward Secrecy를 제공한다.
