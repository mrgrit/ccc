        해석: AES-CCMP nonce 재사용 → 동일 keystream 2회 → XOR 으로 평문 추출."
      - "krackattacks-scripts (Mathy Vanhoef 공식 PoC, github.com/vanhoef/krackattacks-scripts)
        — python3 krack-test-client.py wlan0mon. 출력: client 의 KRACK 취약 여부 진단.
        해석: 학술 PoC. 학생 환경 검증 가능."
      - "CVE 매핑 — CVE-2017-13077 (key reinstall in 4-way), CVE-2017-13078 (Group
