    expect: WPA3-SAE vs WPA2-PSK
    field: stdout
    semantic:
      intent: 'WPA3-SAE vs WPA2-PSK — WPA2: 정적 PMK + 오프라인 사전 공격 가능 + Forward Secrecy
        없음 / WPA3: Dragonfly DH 교환 + 일시적 PMK + 오프라인 공격 불가 + FS + PMF 필수. RFC 7664
        SAE.'
      success_criteria:
      - WPA3-SAE vs WPA2-PSK 키워드
