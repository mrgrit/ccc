lab_id: attack-nonai-week13
title: 무선 네트워크 공격 (Wireless)
version: non-ai
course: attack-nonai
week: 13
description: 무선 네트워크의 보안 취약점과 공격 기법을 학습한다. Wi-Fi 프로토콜 분석, WPA/WPA2 크래킹, Evil Twin,
  Deauthentication 공격의 원리를 이론과 시뮬레이션으로 실습한다.
difficulty: medium
duration_minutes: 120
objectives:
- Wi-Fi 보안 프로토콜(WEP, WPA, WPA2, WPA3)의 차이를 이해한다
- 무선 공격 도구(aircrack-ng suite)의 사용법을 학습한다
- 무선 네트워크 보안 강화 방안을 설계할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 무선 네트워크 인터페이스를 확인하라. 시스템에서 사용 가능한 네트워크 인터페이스를 나열하고, 무선 인터페이스가 있는지 확인하라.
  hint: iwconfig 또는 ip link show 명령을 사용한다
  category: recon
  points: 5
  answer: ip link show && echo '---' && iwconfig 2>/dev/null || echo 'No wireless
    interfaces (expected in lab VM)'
  answer_detail: iwconfig는 무선 인터페이스 정보를 표시한다. 실습 VM에는 물리 무선 카드가 없지만, 실전에서는 wlan0 등의
    무선 인터페이스를 Monitor 모드로 전환하여 패킷 캡처에 사용한다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: '무선 인터페이스 확인 — ip link show + iwconfig. 실습 VM에는 무선 카드 없음 (이론/시뮬). 실전:
        wlan0 → Monitor 모드 (airmon-ng start wlan0). MITRE T1011 Exfiltration Over
        Other Network Medium 전제 단계.'
      success_criteria:
      - ip link show + iwconfig 병행
      - '--- 구분자'
      - 무선 인터페이스 부재 처리
      acceptable_methods:
      - ip link + iwconfig
      - iw dev list
      - ls /sys/class/net/*/wireless
      negative_signs:
      - wireless 검사 없음
      - 단일 명령만
      - VM 부재 처리 없음
  target_vm: attacker
- order: 2
  instruction: Wi-Fi 보안 프로토콜의 발전 과정을 정리하라. WEP, WPA, WPA2, WPA3 각각의 암호화 방식과 취약점을 비교하라.
  hint: 각 프로토콜의 암호화 알고리즘과 주요 취약점을 나열한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Wi-Fi Security Protocols ===\n\n| Protocol | Year | Encryption
    | Key Mgmt | Known Vulnerabilities |\n|----------|------|-----------|----------|---------------------|\n|
    WEP | 1997 | RC4 (40/104-bit) | Static key | IV collision, FMS attack |\n| WPA
    | 2003 | TKIP (RC4) | PSK/EAP | TKIP weak, dictionary attack |\n| WPA2 | 2004
    | AES-CCMP | PSK/EAP | KRACK, dictionary on PSK |\n| WPA3 | 2018 | AES-GCMP |
    SAE(Dragonfly) | Dragonblood (patched) |\n\n[Summary]\n- WEP: BROKEN - never use\n-
    WPA: DEPRECATED - TKIP vulnerable\n- WPA2-PSK: Vulnerable to offline dictionary
    attack\n- WPA2-Enterprise: Strong (with proper RADIUS)\n- WPA3-SAE: Currently
    most secure'''
  answer_detail: Wi-Fi 보안은 WEP(완전히 깨진) -> WPA(개선, 여전히 취약) -> WPA2(현재 표준, PSK는 사전 공격
    가능) -> WPA3(SAE로 오프라인 사전 공격 방지)로 발전했다. WPA3-SAE의 Dragonfly 핸드셰이크는 오프라인 사전 공격을
    원천 차단한다.
  verify:
    type: output_contains
    expect: Wi-Fi Security Protocols
    field: stdout
    semantic:
      intent: Wi-Fi 프로토콜 비교 — WEP(1997, RC4 40/104bit, IV 충돌+FMS) / WPA(2003, TKIP,
        사전 공격) / WPA2(2004, AES-CCMP, KRACK+사전 공격) / WPA3(2018, AES-GCMP, SAE Dragonfly
        + Dragonblood 패치). IEEE 802.11i/802.11-2020.
      success_criteria:
      - Wi-Fi Security Protocols 키워드
      - WEP/WPA/WPA2/WPA3 4프로토콜 비교
      - 암호화 알고리즘 + 취약점 명시
      acceptable_methods:
      - 프로토콜 비교 표
      - NIST SP 800-153 무선 보안
      - Wi-Fi Alliance 표준 문서
      negative_signs:
      - 프로토콜 2개 이하
      - 취약점 누락
      - WPA3 누락
  target_vm: attacker
- order: 3
  instruction: aircrack-ng 도구 스위트의 구성 요소와 각 도구의 역할을 정리하라.
  hint: airmon-ng, airodump-ng, aireplay-ng, aircrack-ng 각각의 역할을 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Aircrack-ng Suite ===\n\n1. airmon-ng: 무선 인터페이스를 Monitor
    모드로 전환\n   Usage: airmon-ng start wlan0\n\n2. airodump-ng: 무선 네트워크 스캐닝 및 패킷 캡처\n   Usage:
    airodump-ng wlan0mon\n   Usage: airodump-ng -c CH --bssid AP_MAC -w capture wlan0mon\n\n3.
    aireplay-ng: 패킷 인젝션 (Deauth, ARP replay)\n   Usage: aireplay-ng -0 5 -a AP_MAC
    -c CLIENT_MAC wlan0mon\n\n4. aircrack-ng: WEP/WPA 키 크래킹\n   Usage: aircrack-ng
    -w wordlist.txt capture.cap\n\n5. airbase-ng: Fake AP (Evil Twin) 생성\n   Usage:
    airbase-ng -e "Free WiFi" -c 6 wlan0mon'''
  answer_detail: aircrack-ng은 Wi-Fi 보안 감사의 표준 도구 모음이다. Monitor 모드 전환 -> 네트워크 스캐닝 ->
    패킷 캡처 -> 크래킹의 워크플로를 따른다. Kali Linux에 기본 포함되어 있다.
  verify:
    type: output_contains
    expect: Aircrack-ng Suite
    field: stdout
    semantic:
      intent: aircrack-ng 스위트 — airmon-ng(Monitor 모드) + airodump-ng(스캔/캡처) + aireplay-ng(인젝션)
        + aircrack-ng(WEP/WPA 크래킹) + airbase-ng(Fake AP). Kali 기본. 표준 워크플로 5도구.
      success_criteria:
      - Aircrack-ng Suite 키워드
      - 5개 도구 (airmon/airodump/aireplay/aircrack/airbase)
      - 각 도구 사용법 예시
      acceptable_methods:
      - aircrack-ng 5종 설명
      - wifite (래퍼)
      - Bettercap wifi 모듈
      negative_signs:
      - 도구 3개 이하
      - 사용 예시 없음
      - 워크플로 맥락 없음
  target_vm: attacker
- order: 4
  instruction: WPA2-PSK 4-Way Handshake의 원리를 설명하고, 각 단계에서 교환되는 메시지를 정리하라.
  hint: ANonce, SNonce, MIC, GTK 교환 과정을 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== WPA2 4-Way Handshake ===\n\nPMK = PBKDF2(PSK, SSID, 4096,
    256)\n\n[Message 1] AP -> Client\n  - ANonce (AP random number)\n  - Client derives
    PTK from PMK + ANonce + SNonce + MACs\n\n[Message 2] Client -> AP\n  - SNonce
    (Client random number)\n  - MIC (Message Integrity Check)\n  - AP derives PTK
    and verifies MIC\n\n[Message 3] AP -> Client\n  - GTK (Group Temporal Key, encrypted)\n  -
    MIC\n\n[Message 4] Client -> AP\n  - ACK\n  - Encrypted communication begins\n\n[Attack
    Vector]\n- Capture handshake (Msg 1-2 sufficient)\n- Offline dictionary attack:
    try passwords to derive PMK\n- If PMK matches -> password found'''
  answer_detail: WPA2-PSK의 4-Way Handshake를 캡처하면 오프라인 사전 공격이 가능하다. PSK에서 PMK를 도출하고(PBKDF2),
    PTK를 계산하여 MIC를 검증한다. 캡처된 핸드셰이크의 MIC와 일치하는 PSK를 찾으면 비밀번호를 복원할 수 있다.
  verify:
    type: output_contains
    expect: 4-Way Handshake
    field: stdout
    semantic:
      intent: WPA2 4-Way Handshake — PMK=PBKDF2(PSK,SSID,4096,256). M1 ANonce → M2
        SNonce+MIC → M3 GTK → M4 ACK. PTK 도출 + MIC 검증. 캡처(M1-M2) → 오프라인 사전 공격 → PMK
        일치 비번 복원. IEEE 802.11i.
      success_criteria:
      - 4-Way Handshake 키워드
      - ANonce/SNonce/MIC/PMK/PTK 용어
      - Message 1-4 단계 + 공격 벡터
      acceptable_methods:
      - 802.11i 핸드셰이크 도식
      - hcxdumptool + hashcat 변환
      - PMK = PBKDF2 수식
      negative_signs:
      - 핸드셰이크 단계 없음
      - PMK/PTK 용어 없음
      - 공격 벡터 누락
  target_vm: attacker
- order: 5
  instruction: aircrack-ng를 사용하여 사전에 준비된 WPA2 핸드셰이크 캡처 파일을 크래킹하라(시뮬레이션).
  hint: aircrack-ng -w wordlist capture.cap 형태이다
  category: exploit
  points: 10
  answer: 'echo ''=== WPA2 Cracking Simulation ==='' && echo ''Step 1: Monitor mode''
    && echo ''  airmon-ng start wlan0'' && echo ''Step 2: Capture handshake'' && echo
    ''  airodump-ng -c 6 --bssid AA:BB:CC:DD:EE:FF -w capture wlan0mon'' && echo ''Step
    3: Force deauth to trigger handshake'' && echo ''  aireplay-ng -0 5 -a AA:BB:CC:DD:EE:FF
    wlan0mon'' && echo ''Step 4: Crack with wordlist'' && echo ''  aircrack-ng -w
    /usr/share/wordlists/rockyou.txt capture-01.cap'' && echo ''---'' && echo ''hashcat
    GPU crack: hashcat -m 22000 hash.hc22000 rockyou.txt'' && echo ''Speed: ~500K
    passwords/sec (GPU) vs ~2K/sec (CPU)'''
  answer_detail: WPA2 크래킹의 핵심은 4-Way Handshake 캡처와 사전 공격이다. CPU로는 초당 약 2,000개 비밀번호를
    테스트하지만, GPU(hashcat)를 사용하면 초당 50만 개 이상 가능하다. 강력한 비밀번호(12자 이상, 랜덤)는 사실상 크래킹 불가능하다.
  verify:
    type: output_contains
    expect: WPA2 Cracking
    field: stdout
    semantic:
      intent: WPA2 크래킹 시뮬 — airmon-ng start wlan0 + airodump-ng -c 6 --bssid AP -w
        cap + aireplay-ng -0 5 -a AP (deauth) + aircrack-ng -w rockyou capture-01.cap.
        hashcat -m 22000 GPU 50만/sec vs CPU 2K/sec. PBKDF2 4096 반복 = 강력 비번 사실상 불가능.
      success_criteria:
      - WPA2 Cracking 키워드
      - 4단계 워크플로 (Monitor→Capture→Deauth→Crack)
      - GPU vs CPU 속도 비교
      acceptable_methods:
      - aircrack-ng + rockyou
      - hashcat -m 22000
      - wifite 자동화
      negative_signs:
      - 워크플로 단계 부족
      - wordlist 없음
      - 속도 비교 없음
  target_vm: attacker
- order: 6
  instruction: Evil Twin 공격의 원리를 설명하고 구성 요소를 정리하라.
  hint: Fake AP, DHCP 서버, DNS 스푸핑, 캡처 포털이 필요하다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Evil Twin Attack ===\n\n[Architecture]\nVictim --> Fake AP(Evil
    Twin) --> Internet\n                |\n                v\n        Attacker captures
    all traffic\n\n[Components]\n1. Fake AP: airbase-ng -e "Target_SSID" -c 6 wlan0mon\n2.
    DHCP: dnsmasq --dhcp-range=192.168.1.10,192.168.1.50\n3. NAT: iptables -t nat
    -A POSTROUTING -o eth0 -j MASQUERADE\n4. Captive Portal: nginx serving fake login
    page\n5. SSL Strip: downgrade HTTPS to HTTP\n\n[Attack Flow]\n1. Create AP with
    same SSID as target\n2. Deauth clients from real AP\n3. Clients auto-connect to
    stronger (closer) signal\n4. Capture credentials via fake portal\n\n[Detection]\n-
    Multiple BSSIDs for same SSID\n- Unexpected MAC address changes\n- Certificate
    warnings (SSL strip)'''
  answer_detail: Evil Twin은 정상 AP와 동일한 SSID로 가짜 AP를 생성하여 클라이언트를 유인하는 공격이다. 연결된 클라이언트의
    모든 트래픽을 가로채고, 캡처 포털로 자격 증명을 수집할 수 있다.
  verify:
    type: output_contains
    expect: Evil Twin Attack
    field: stdout
    semantic:
      intent: Evil Twin — Fake AP(airbase-ng) + DHCP(dnsmasq) + NAT(iptables MASQUERADE)
        + Captive Portal(nginx) + SSL Strip. 동일 SSID + 강한 신호 → 클라이언트 자동 연결 → 자격증명
        수집. MITRE T1557.002 ARP Cache Poisoning + T1556 Modify Authentication Process.
      success_criteria:
      - Evil Twin Attack 키워드
      - 5개 구성요소 (AP/DHCP/NAT/Portal/SSL)
      - 공격 흐름 + 탐지 방법
      acceptable_methods:
      - airbase-ng + dnsmasq + nginx
      - wifiphisher 자동화
      - Bettercap evil twin
      negative_signs:
      - 구성요소 3개 이하
      - 공격 흐름 없음
      - 탐지 누락
  target_vm: attacker
- order: 7
  instruction: Deauthentication 공격의 원리를 설명하라. 802.11 관리 프레임의 취약점이 어떻게 악용되는지 분석하라.
  hint: 802.11 관리 프레임은 인증 없이 전송된다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Deauthentication Attack ===\n\n[Principle]\n- 802.11 management
    frames are NOT authenticated\n- Anyone can send deauth frames with spoofed source
    MAC\n\n[Attack]\n  aireplay-ng -0 0 -a AP_BSSID -c CLIENT_MAC wlan0mon\n  -0:
    deauth attack\n  0: continuous (use specific count in practice)\n\n[Uses]\n1.
    Capture WPA handshake (force reconnection)\n2. DoS (deny wireless access)\n3.
    Force client to Evil Twin\n\n[Defense]\n- 802.11w (Protected Management Frames)\n-
    WPA3 mandates PMF\n- WIDS (Wireless IDS) to detect deauth floods'''
  answer_detail: 802.11 관리 프레임(Deauthentication, Disassociation)은 암호화/인증 없이 전송되어 위조가
    가능하다. 802.11w(PMF, Protected Management Frames)가 이 문제를 해결하며, WPA3에서는 PMF가 필수이다.
  verify:
    type: output_contains
    expect: Deauthentication Attack
    field: stdout
    semantic:
      intent: 'Deauth 공격 — aireplay-ng -0 0 -a AP -c CLIENT wlan0mon. 802.11 관리 프레임
        비인증 → MAC 위조 가능. 용도: 핸드셰이크 강제/DoS/Evil Twin 유도. 방어: 802.11w PMF (WPA3 필수),
        WIDS deauth flood 탐지.'
      success_criteria:
      - Deauthentication Attack 키워드
      - aireplay-ng -0 명령
      - 802.11w PMF 방어 언급
      acceptable_methods:
      - aireplay-ng -0
      - mdk3 deauth flood
      - scapy Dot11Deauth()
      negative_signs:
      - aireplay 없음
      - PMF 방어 없음
      - 관리 프레임 맥락 없음
  target_vm: attacker
- order: 8
  instruction: WEP 크래킹의 원리를 설명하라. IV(Initialization Vector) 충돌 취약점이 어떻게 악용되는지 분석하라.
  hint: WEP의 RC4 스트림 암호화와 24-bit IV의 한계를 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== WEP Cracking ===\n\n[WEP Weakness]\n- RC4 stream cipher with
    24-bit IV\n- Only 2^24 = 16,777,216 possible IVs\n- After ~5000 packets, IV reuse
    is likely\n- Same IV + same key = same keystream\n\n[FMS Attack (Fluhrer, Mantin,
    Shamir)]\n- Certain weak IVs reveal key bytes\n- Collect ~40,000 to 85,000 IVs\n-
    Statistical analysis recovers the key\n\n[PTW Attack (faster)]\n- Needs only ~20,000
    packets\n- Works with ARP request replay\n\n[Commands]\n1. airodump-ng -c CH --bssid
    AP -w capture wlan0mon\n2. aireplay-ng -3 -b AP wlan0mon  (ARP replay to generate
    IVs)\n3. aircrack-ng capture-01.cap\n\n[Status: WEP is COMPLETELY BROKEN]'''
  answer_detail: WEP의 24-bit IV는 약 5,000 패킷 후 재사용되어 키스트림이 노출된다. FMS/PTW 공격으로 수만 패킷만
    수집하면 키를 복원할 수 있다. WEP은 완전히 깨진 프로토콜로 절대 사용하면 안 된다.
  verify:
    type: output_contains
    expect: WEP Cracking
    field: stdout
    semantic:
      intent: WEP 크래킹 — RC4 24-bit IV (2^24 = 16M, ~5K 패킷 후 재사용). FMS 공격(Fluhrer-Mantin-Shamir
        2001, 4만~8.5만 IV) / PTW 공격(2007, 2만 패킷). aireplay-ng -3 ARP replay로 IV 생성.
        WEP은 완전히 BROKEN.
      success_criteria:
      - WEP Cracking 키워드
      - FMS 또는 PTW 공격 명시
      - 24-bit IV 한계 + 명령 흐름
      acceptable_methods:
      - FMS/PTW + aireplay-ng -3
      - aircrack-ng + ARP replay
      - WEPCrack/dwepcrack
      negative_signs:
      - IV 24-bit 맥락 없음
      - FMS/PTW 누락
      - WEP BROKEN 인식 없음
  target_vm: attacker
- order: 9
  instruction: KRACK(Key Reinstallation Attack) 취약점의 원리를 설명하라.
  hint: 4-Way Handshake의 Message 3 재전송을 악용한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== KRACK Attack (CVE-2017-13077) ===\n\n[Principle]\n- Exploits
    WPA2 4-Way Handshake implementation\n- Attacker replays Message 3 of handshake\n-
    Client reinstalls already-in-use encryption key\n- Nonce is reset to zero\n- Nonce
    reuse in AES-CCMP allows decryption\n\n[Impact]\n- Decrypt packets (read encrypted
    traffic)\n- Replay packets\n- TCP hijacking (in some cases)\n- Affects ALL correct
    WPA2 implementations\n\n[Mitigation]\n- Patch client OS (most important)\n- Accept
    retransmitted Message 3 without key reinstallation\n- 802.11r (Fast BSS Transition)
    most vulnerable\n- WPA3 not affected\n\n[Status: Patched in all major OS since
    late 2017]'''
  answer_detail: KRACK은 WPA2 프로토콜 자체가 아닌 구현의 취약점이다. Message 3 재전송 시 nonce를 리셋하면 키스트림이
    재사용되어 암호화가 무력화된다. 모든 주요 OS에서 패치되었지만, IoT 기기는 여전히 취약할 수 있다.
  verify:
    type: output_contains
    expect:
    - KRACK Attack
    - KRACK
    field: stdout
