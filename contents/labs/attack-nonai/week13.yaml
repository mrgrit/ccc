  category: analysis
  points: 10
  answer: 'echo -e ''=== KRACK Attack (CVE-2017-13077) ===\n\n[Principle]\n- Exploits
    WPA2 4-Way Handshake implementation\n- Attacker replays Message 3 of handshake\n-
    Client reinstalls already-in-use encryption key\n- Nonce is reset to zero\n- Nonce
    reuse in AES-CCMP allows decryption\n\n[Impact]\n- Decrypt packets (read encrypted
    traffic)\n- Replay packets\n- TCP hijacking (in some cases)\n- Affects ALL correct
    WPA2 implementations\n\n[Mitigation]\n- Patch client OS (most important)\n- Accept
    retransmitted Message 3 without key reinstallation\n- 802.11r (Fast BSS Transition)
    most vulnerable\n- WPA3 not affected\n\n[Status: Patched in all major OS since
    late 2017]'''
  answer_detail: KRACK은 WPA2 프로토콜 자체가 아닌 구현의 취약점이다. Message 3 재전송 시 nonce를 리셋하면 키스트림이
    재사용되어 암호화가 무력화된다. 모든 주요 OS에서 패치되었지만, IoT 기기는 여전히 취약할 수 있다.
