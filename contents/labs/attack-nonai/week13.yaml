lab_id: attack-nonai-week13
title: 무선 네트워크 공격 (Wireless)
version: non-ai
course: attack-nonai
week: 13
description: 무선 네트워크의 보안 취약점과 공격 기법을 학습한다. Wi-Fi 프로토콜 분석, WPA/WPA2 크래킹, Evil Twin,
  Deauthentication 공격의 원리를 이론과 시뮬레이션으로 실습한다.
difficulty: medium
duration_minutes: 120
objectives:
- Wi-Fi 보안 프로토콜(WEP, WPA, WPA2, WPA3)의 차이를 이해한다
- 무선 공격 도구(aircrack-ng suite)의 사용법을 학습한다
- 무선 네트워크 보안 강화 방안을 설계할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 무선 네트워크 인터페이스를 확인하라. 시스템에서 사용 가능한 네트워크 인터페이스를 나열하고, 무선 인터페이스가 있는지 확인하라.
  hint: iwconfig 또는 ip link show 명령을 사용한다
  category: recon
  points: 5
  answer: ip link show && echo '---' && iwconfig 2>/dev/null || echo 'No wireless
    interfaces (expected in lab VM)'
  answer_detail: iwconfig는 무선 인터페이스 정보를 표시한다. 실습 VM에는 물리 무선 카드가 없지만, 실전에서는 wlan0 등의
    무선 인터페이스를 Monitor 모드로 전환하여 패킷 캡처에 사용한다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: '무선 인터페이스 확인 — ip link show + iwconfig. 실습 VM에는 무선 카드 없음 (이론/시뮬). 실전:
        wlan0 → Monitor 모드 (airmon-ng start wlan0). MITRE T1011 Exfiltration Over
        Other Network Medium 전제 단계.'
      success_criteria:
      - ip link show + iwconfig 병행
      - '--- 구분자'
      - 무선 인터페이스 부재 처리
      acceptable_methods:
      - "ip link show + iwconfig 병행 (수기 baseline). 명령: ip link show 2>&1; echo
        '---'; iwconfig 2>&1 || echo 'No wireless interfaces'. 출력: 1: lo / 2: ens33
        / --- / lo no wireless extensions / ens33 no wireless extensions. 해석: ip
        link 는 모든 NIC, iwconfig 는 wireless extension 만. lab VM 은 wireless 카드
        없으므로 'no wireless extensions' 정상."
      - "iw dev (modern wireless tool) — sudo iw dev list 2>&1 || iw dev. 출력: phy#0
        Interface wlan0 ifindex 3 type managed. 해석: iw 가 iwconfig 대체 (mac80211
        지원). lab 환경 = 출력 없음 (VM). 실전 wlan0 monitor mode 전환의 사전 점검."
      - "/sys/class/net 직접 — ls -la /sys/class/net/ + for i in /sys/class/net/*/wireless;
        do echo $i; done. 출력: ls: 'wireless' directory 부재. 해석: /sys 는 kernel 직접
        view. wireless 서브디렉토리 존재 = 무선 카드 존재. 가장 신뢰성 높은 검사."
      - "lspci/lsusb 하드웨어 — sudo lspci -nn | grep -iE 'wireless|wifi|802.11';
        sudo lsusb | grep -iE 'wireless|wifi'. 출력: (없음, VMware vNIC 만). 해석:
        물리 wireless adapter 식별. VMware/KVM VM 에는 PCI passthrough 안 하면 wireless
        없음. USB wireless dongle 도 lsusb 로 식별."
      - "airmon-ng (aircrack-ng suite 의 monitor mode 전환 도구) — sudo airmon-ng. 출력:
        PHY Interface Driver Chipset / (lab 출력 없음). 해석: airmon-ng = wlan 인터페이스
        나열 + monitor mode 전환 동시 수행. wireless 카드 있으면 airmon-ng start wlan0
        → wlan0mon 생성."
      - "rfkill 라디오 상태 — sudo rfkill list. 출력: (lab 없음 — radio 없음 / 실전: 0:
        phy0: Wireless LAN: Soft blocked: no Hard blocked: no). 해석: 무선 카드의
        soft/hard kill switch 상태. 노트북 wireless 켜져있는지 확인. blocked = 모니터
        모드 전환 불가."
      - "dmesg wireless 드라이버 검색 — sudo dmesg | grep -iE 'iwl|ath|rtl|brcm|wireless|wlan'
        | head -10. 출력: (lab 없음 / 실전: iwlwifi 0000:00:14.3: Detected Intel(R) Wi-Fi
        6 AX200). 해석: kernel 부팅 시 wireless 드라이버 로드 메시지. driver 식별 →
        호환되는 monitor mode 사용 가능 여부 판단."
      - "nmcli (NetworkManager) wireless 상태 — nmcli device status; nmcli radio.
        출력: DEVICE TYPE STATE / lo loopback unmanaged / ens33 ethernet connected.
        해석: NetworkManager 가 wireless adapter 관리. nmcli wifi list 로 주변 SSID
        스캔 가능 (실전). lab 은 ethernet 만."
      negative_signs:
      - wireless 검사 없음 (ip link show 만)
      - 단일 명령만 (3+ 도구 비교 없음)
      - VM 부재 처리 없음 ("실전이라면..." 맥락 X)
      - lspci/dmesg 하드웨어 검사 누락
      - rfkill 라디오 상태 무시 (실전에서 흔한 함정)
  target_vm: attacker
- order: 2
  instruction: Wi-Fi 보안 프로토콜의 발전 과정을 정리하라. WEP, WPA, WPA2, WPA3 각각의 암호화 방식과 취약점을 비교하라.
  hint: 각 프로토콜의 암호화 알고리즘과 주요 취약점을 나열한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Wi-Fi Security Protocols ===\n\n| Protocol | Year | Encryption
    | Key Mgmt | Known Vulnerabilities |\n|----------|------|-----------|----------|---------------------|\n|
    WEP | 1997 | RC4 (40/104-bit) | Static key | IV collision, FMS attack |\n| WPA
    | 2003 | TKIP (RC4) | PSK/EAP | TKIP weak, dictionary attack |\n| WPA2 | 2004
    | AES-CCMP | PSK/EAP | KRACK, dictionary on PSK |\n| WPA3 | 2018 | AES-GCMP |
    SAE(Dragonfly) | Dragonblood (patched) |\n\n[Summary]\n- WEP: BROKEN - never use\n-
    WPA: DEPRECATED - TKIP vulnerable\n- WPA2-PSK: Vulnerable to offline dictionary
    attack\n- WPA2-Enterprise: Strong (with proper RADIUS)\n- WPA3-SAE: Currently
    most secure'''
  answer_detail: Wi-Fi 보안은 WEP(완전히 깨진) -> WPA(개선, 여전히 취약) -> WPA2(현재 표준, PSK는 사전 공격
    가능) -> WPA3(SAE로 오프라인 사전 공격 방지)로 발전했다. WPA3-SAE의 Dragonfly 핸드셰이크는 오프라인 사전 공격을
    원천 차단한다.
  verify:
    type: output_contains
    expect: Wi-Fi Security Protocols
    field: stdout
    semantic:
      intent: Wi-Fi 프로토콜 비교 — WEP(1997, RC4 40/104bit, IV 충돌+FMS) / WPA(2003, TKIP,
        사전 공격) / WPA2(2004, AES-CCMP, KRACK+사전 공격) / WPA3(2018, AES-GCMP, SAE Dragonfly
        + Dragonblood 패치). IEEE 802.11i/802.11-2020.
      success_criteria:
      - Wi-Fi Security Protocols 키워드
      - WEP/WPA/WPA2/WPA3 4프로토콜 비교
      - 암호화 알고리즘 + 취약점 명시
      acceptable_methods:
      - "프로토콜 비교 표 작성 (수기 baseline) — echo -e '| Protocol | Year | Encryption
        | Key Mgmt | Vulnerability |\\n| WEP | 1997 | RC4 (40/104-bit) | Static |
        IV collision/FMS |\\n| WPA | 2003 | TKIP (RC4) | PSK/EAP | TKIP weak |\\n|
        WPA2 | 2004 | AES-CCMP | PSK/EAP | KRACK/dict |\\n| WPA3 | 2018 | AES-GCMP
        | SAE | Dragonblood (patched) |'. 해석: 4 프로토콜 × 5 컬럼 매트릭스. 연도/암호화/키
        관리/취약점."
      - "NIST SP 800-153 (Wireless LAN Security 가이드) 참조 — 'WPA2-Enterprise
        with EAP-TLS' 권고. 출력: 표 + NIST 권고. 해석: 표준 framework 인용 = 보고서
        설득력. NIST.gov 에서 무료 PDF. SP 800-97 (RSN), SP 800-119 (IPv6) 도 보강."
      - "IEEE 802.11i (WPA2 RSN) 사양 분석 — 4-Way Handshake / Group Key Handshake
        / GTK / PMK / PTK 키 계층. 해석: 802.11i = WPA2 의 IEEE 표준. PMK (사전 공유) →
        PTK (페어 임시 키) → 데이터 암호화. 핵심 보안 mechanism."
      - "Wi-Fi Alliance 인증 — wifi.org 의 'Wi-Fi CERTIFIED WPA3' 페이지. 출력: WPA3-Personal
        SAE / WPA3-Enterprise 192-bit / Wi-Fi Easy Connect (DPP). 해석: WPA3 vendor
        인증 라벨 식별. 제품 구매 시 WPA3 logo 확인 필수."
      - "Dragonblood paper (CVE-2019-9494, Vanhoef + Ronen 2019) 분석. 출력: WPA3-SAE
        side-channel + downgrade 공격. 해석: WPA3 출시 직후 발견된 취약점. 패치됐지만
        구현체별 차이. AP firmware 업데이트 필수."
      - "KRACK paper (CVE-2017-13077, Vanhoef 2017) 분석. 출력: WPA2 4-way handshake
        의 message 3 재전송 → key reinstall → IV 0 재사용 → traffic 복호화. 해석:
        WPA2 구현 결함. 모든 OS 패치됨 (2017-2018). 미패치 IoT/router 여전히 취약."
      - "Defensive — 802.1X/EAP-TLS Enterprise 모드. 출력: PSK 대신 RADIUS + 인증서.
        해석: PSK 의 사전 공격 위험 회피. 회사/대학 환경 표준. EAP-TLS = 상호 인증서,
        EAP-PEAP = MS-CHAPv2 (취약, 회피)."
      - "역사적 사건 — 2003 Wardriving / 2004 WPA TKIP 공격 / 2008 Beck-Tews 부분 공격
        / 2017 KRACK / 2019 Dragonblood. 해석: 무선 보안 공격사 5 사건. 각 사건 → 표준
        업데이트. 학습자가 시간순 인지 = 새 취약점 등장 시 빠른 대응."
      negative_signs:
      - 프로토콜 2개 이하 (WEP/WPA2 만 비교)
      - 취약점 누락 (각 프로토콜의 attack 명시 X)
      - WPA3 누락 (현재 표준 인식 부족)
      - 암호화 알고리즘 (RC4/AES) 명시 없음
      - 표준 framework (NIST/IEEE) 참조 없음
  target_vm: attacker
- order: 3
  instruction: aircrack-ng 도구 스위트의 구성 요소와 각 도구의 역할을 정리하라.
  hint: airmon-ng, airodump-ng, aireplay-ng, aircrack-ng 각각의 역할을 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Aircrack-ng Suite ===\n\n1. airmon-ng: 무선 인터페이스를 Monitor
    모드로 전환\n   Usage: airmon-ng start wlan0\n\n2. airodump-ng: 무선 네트워크 스캐닝 및 패킷 캡처\n   Usage:
    airodump-ng wlan0mon\n   Usage: airodump-ng -c CH --bssid AP_MAC -w capture wlan0mon\n\n3.
    aireplay-ng: 패킷 인젝션 (Deauth, ARP replay)\n   Usage: aireplay-ng -0 5 -a AP_MAC
    -c CLIENT_MAC wlan0mon\n\n4. aircrack-ng: WEP/WPA 키 크래킹\n   Usage: aircrack-ng
    -w wordlist.txt capture.cap\n\n5. airbase-ng: Fake AP (Evil Twin) 생성\n   Usage:
    airbase-ng -e "Free WiFi" -c 6 wlan0mon'''
  answer_detail: aircrack-ng은 Wi-Fi 보안 감사의 표준 도구 모음이다. Monitor 모드 전환 -> 네트워크 스캐닝 ->
    패킷 캡처 -> 크래킹의 워크플로를 따른다. Kali Linux에 기본 포함되어 있다.
  verify:
    type: output_contains
    expect: Aircrack-ng Suite
    field: stdout
    semantic:
      intent: aircrack-ng 스위트 — airmon-ng(Monitor 모드) + airodump-ng(스캔/캡처) + aireplay-ng(인젝션)
        + aircrack-ng(WEP/WPA 크래킹) + airbase-ng(Fake AP). Kali 기본. 표준 워크플로 5도구.
      success_criteria:
      - Aircrack-ng Suite 키워드
      - 5개 도구 (airmon/airodump/aireplay/aircrack/airbase)
      - 각 도구 사용법 예시
      acceptable_methods:
      - "aircrack-ng 5 도구 설명 (수기 baseline) — 1) airmon-ng start wlan0: Monitor 모드
        전환. 2) airodump-ng wlan0mon: 주변 SSID 스캔. 3) airodump-ng -c 6 --bssid AABB:CC:DD:EE
        -w cap wlan0mon: 특정 AP 캡처. 4) aireplay-ng -0 5 -a AP_MAC -c CLIENT wlan0mon:
        Deauth. 5) aircrack-ng -w wordlist cap.cap: 핸드셰이크 크래킹. 해석: airmon→airodump
        →aireplay→aircrack 표준 워크플로."
      - "wifite (자동화 래퍼) — sudo wifite --kill --wpa --crack -wp wordlist.txt.
        출력: [+] Scanning ... [+] Captured handshake AP_MAC. 해석: aircrack-ng 의 4-5
        도구를 한 명령으로 자동화. monitor mode 자동 전환 + 자동 deauth + 자동 capture +
        자동 hashcat. 초보자 친화."
      - "Bettercap (modern Go 기반) — sudo bettercap -iface wlan0 -caplet wifi-recon.cap.
        출력: wifi.show ... wifi.handshake AP_MAC. 해석: aircrack-ng 의 modern 대안.
        web UI + REST API + caplet (자동화 스크립트). MitM/ARP spoof 통합."
      - "hcxdumptool (PMKID 공격) — sudo hcxdumptool -i wlan0 -o capture.pcapng --enable_status=1.
        출력: 22000 형식 hash 추출. 해석: PMKID = WPA2 의 첫 message 만으로 크래킹 가능
        (client 없어도 OK). 2018 atom 발표. KRACK 보다 효율."
      - "Kismet (passive scanner) — sudo kismet -c wlan0. 출력: web UI :2501 + 모든 AP/
        client 실시간 표시. 해석: aircrack-ng 의 airodump 보다 풍부한 GUI. SSID/BSSID/Channel/
        Encryption + Bluetooth/Zigbee/SDR 까지."
      - "airbase-ng (Fake AP / Evil Twin) — sudo airbase-ng -e 'Free WiFi' -c 6 -P
        wlan0mon. 출력: Created tap interface at0 / SSID 'Free WiFi' broadcasting.
        해석: aircrack-ng suite 의 마지막 도구. Open AP + captive portal 결합 → credential
        harvest. Evil Twin 기본 빌딩 블록."
      - "Reaver (WPS PIN brute) — sudo reaver -i wlan0mon -b AP_MAC -vv. 출력: Pixie-Dust
        attack ... PIN: 12345670 PSK: password123. 해석: WPS PIN 8자리 = 11000 조합.
        Pixie-Dust (RTL/Realtek 칩) = 1초 내 PIN 추출. 노후 router 표적."
      - "Bastion AI orchestrator (manual track 차이) — Non-AI 학생은 위 도구 직접 실행 +
        결과 해석. AI 학생은 Bastion 이 'wireless audit' workflow 자동. Non-AI 가 도구 의미
        깊게 이해 → AI 가 발견 못 한 케이스 catch."
      negative_signs:
      - 도구 3개 이하 (aircrack-ng suite 만 나열)
      - 사용 예시 없음 (airmon/airodump 명령 인자 X)
      - 워크플로 맥락 없음 (도구 간 순서 / 산출물 흐름 X)
      - modern 대안 (Bettercap/wifite/Kismet) 누락
      - PMKID/WPS 같은 다른 공격 벡터 미언급
  target_vm: attacker
- order: 4
  instruction: WPA2-PSK 4-Way Handshake의 원리를 설명하고, 각 단계에서 교환되는 메시지를 정리하라.
  hint: ANonce, SNonce, MIC, GTK 교환 과정을 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== WPA2 4-Way Handshake ===\n\nPMK = PBKDF2(PSK, SSID, 4096,
    256)\n\n[Message 1] AP -> Client\n  - ANonce (AP random number)\n  - Client derives
    PTK from PMK + ANonce + SNonce + MACs\n\n[Message 2] Client -> AP\n  - SNonce
    (Client random number)\n  - MIC (Message Integrity Check)\n  - AP derives PTK
    and verifies MIC\n\n[Message 3] AP -> Client\n  - GTK (Group Temporal Key, encrypted)\n  -
    MIC\n\n[Message 4] Client -> AP\n  - ACK\n  - Encrypted communication begins\n\n[Attack
    Vector]\n- Capture handshake (Msg 1-2 sufficient)\n- Offline dictionary attack:
    try passwords to derive PMK\n- If PMK matches -> password found'''
  answer_detail: WPA2-PSK의 4-Way Handshake를 캡처하면 오프라인 사전 공격이 가능하다. PSK에서 PMK를 도출하고(PBKDF2),
    PTK를 계산하여 MIC를 검증한다. 캡처된 핸드셰이크의 MIC와 일치하는 PSK를 찾으면 비밀번호를 복원할 수 있다.
  verify:
    type: output_contains
    expect: 4-Way Handshake
    field: stdout
    semantic:
      intent: WPA2 4-Way Handshake — PMK=PBKDF2(PSK,SSID,4096,256). M1 ANonce → M2
        SNonce+MIC → M3 GTK → M4 ACK. PTK 도출 + MIC 검증. 캡처(M1-M2) → 오프라인 사전 공격 → PMK
        일치 비번 복원. IEEE 802.11i.
      success_criteria:
      - 4-Way Handshake 키워드
      - ANonce/SNonce/MIC/PMK/PTK 용어
      - Message 1-4 단계 + 공격 벡터
      acceptable_methods:
      - "4-Way Handshake 4 단계 도식 (수기 baseline) — Message 1: AP→Client (ANonce).
        Message 2: Client→AP (SNonce + MIC). Message 3: AP→Client (GTK + MIC). Message
        4: Client→AP (ACK + MIC). 해석: 두 nonce 교환 → PTK 도출. PMK = PBKDF2(PSK,
        SSID, 4096, 256). PTK = PRF(PMK, ANonce, SNonce, AP_MAC, Client_MAC)."
      - "PMK = PBKDF2 수식 — PMK = PBKDF2-HMAC-SHA1(PSK, SSID, 4096 iter, 256 bit).
        해석: PSK = 사용자 비밀번호. SSID = salt 역할. 4096 회 iteration = brute force
        지연. 동일 SSID 면 rainbow table 가능."
      - "hcxdumptool + hashcat 22000 변환 — hcxpcapngtool -o hash.22000 capture.pcapng.
        출력: 22000 hash 형식 (PMKID 또는 EAPOL-MIC). 해석: aircrack-ng 의 cap 파일 → hashcat
        의 22000 hash 변환. GPU 크래킹 입력 형식."
      - "Wireshark 핸드셰이크 분석 — wireshark capture.cap → filter eapol. 출력: 4 패킷
        (Message 1-4) 각각 별도 row. 해석: 시각적 검증. ANonce/SNonce/MIC 필드 확인.
