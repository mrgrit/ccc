    expect: Navigator
    field: stdout
    semantic:
      intent: |
        항공사 IT 컨설턴트 — 공항 Wi-Fi 점검 + Kill Chain ↔ ATT&CK 매핑 + Navigator Layer JSON +
        환경별 체크리스트 3.
        lecture w13 + lab #4·#6·#9·#13 동시 행동 증명. *Navigator JSON* 산출물.
      success_criteria:
      - Kill Chain 7 ↔ ATT&CK 매핑 (T1590/T1583/T1557/T1040)
      - Navigator JSON (versions/techniques/metadata 형식)
      - 환경 3종 체크리스트 (라운지/기내/직원)
      - 실 명령 (iw dev / 4WHS)
      acceptable_methods:
      - "시간 도장 + 컨설턴트 헤더 — date '+%Y-%m-%dT%H:%M:%S%z' >
        /tmp/aerosec_assessment.log; echo '=== AeroSec Senior Consultant — 인천공항 라운지
        Wi-Fi 점검 ===' | tee -a /tmp/aerosec_assessment.log; echo '발주처: 인천국제공항공사 IT
        보안팀 / 평가 범위: T1 라운지 (공유 PSK)·기내 Wi-Fi·직원 백본' | tee -a /tmp/aerosec_assessment.log.
        해석: 컨설팅 deliverable 의 시간 무결성 (감사 요건). 페르소나·범위 명시는 ISO 27001
        A.5.31 (법적/계약 요구사항) 충족. lecture w13 학습목표 → 산업 컨설팅 전환."
      - "Kill Chain 7 ↔ ATT&CK 매핑 표 (heredoc) — cat <<'EOF' > /tmp/kc_mitre.md
        | KC | Tactic | Wi-Fi 기법 | TID |
        | 1 Recon | TA0043 | BSSID/SSID 정찰 | T1590.005 |
        | 2 Weaponization | TA0042 | Evil Twin AP 준비 | T1583.005 |
        | 3 Delivery | TA0001 | Deauth + Twin 유인 | T1557.001 |
        | 4 Exploitation | TA0006 | KRACK key reinstall | T1557.004 |
        | 5 Installation | TA0003 | Rogue AP 상주 | T1078 |
        | 6 C2 | TA0011 | 캡처 → 외부 채널 | T1071 |
        | 7 Actions | TA0009 | 트래픽 sniffing | T1040 |
        EOF. 해석: Lockheed Martin Kill Chain 7 단계 ↔ MITRE ATT&CK Tactic/Technique 1:1+ 매핑.
        TID 가 T15xx 계열 (network + adversary-in-the-middle) 로 무선 트랙 정확히 짚음.
        14 주 통합 lab #4(WPA2)·#6(Twin)·#9(KRACK)·#13(Rogue) 행위 증명."
      - "Navigator Layer JSON 산출 (heredoc) — cat <<'EOF' > /tmp/aerosec_layer.json
        {\"name\":\"AeroSec Airport Wi-Fi 2026-04-29\",\"versions\":{\"attack\":\"16\",\"navigator\":\"5.1.0\",\"layer\":\"4.5\"},\"domain\":\"enterprise-attack\",\"description\":\"공항
        라운지 Wi-Fi 14주 통합\",\"filters\":{\"platforms\":[\"Network\",\"Linux\",\"Windows\"]},\"techniques\":[{\"techniqueID\":\"T1590.005\",\"score\":100,\"color\":\"#ff6666\"},{\"techniqueID\":\"T1583.005\",\"score\":100,\"color\":\"#ff6666\"},{\"techniqueID\":\"T1557.001\",\"score\":100,\"color\":\"#ff6666\"},{\"techniqueID\":\"T1557.004\",\"score\":100,\"color\":\"#ff6666\"},{\"techniqueID\":\"T1040\",\"score\":100,\"color\":\"#ff6666\"},{\"techniqueID\":\"T1071\",\"score\":50,\"color\":\"#ffcc66\"},{\"techniqueID\":\"T1190\",\"score\":75,\"color\":\"#ff9966\"}],\"metadata\":[{\"name\":\"course\",\"value\":\"attack-w13\"},{\"name\":\"scenario\",\"value\":\"airport-lounge\"}],\"showTacticRowBackground\":true,\"tacticRowBackground\":\"#dddddd\"}
        EOF. 해석: ATT&CK Navigator 5.1.0 Layer 4.5 스키마 준수 — versions·domain·techniques[]·metadata
        4 필드 필수. score 100 = 확정 기법, 50/75 = 부분/조건부. import 가능 양식 (mitre-attack/attack-navigator
        공식 schema 호환)."
      - "JSON 검증 (jq) — jq . /tmp/aerosec_layer.json | head -20; jq '.techniques |
        length' /tmp/aerosec_layer.json; jq '.versions' /tmp/aerosec_layer.json. 출력: pretty
        JSON + technique 개수 (7) + versions 객체. 해석: Navigator 가 거부하는 가장 흔한
        실수 = JSON 깨짐·versions 누락·techniqueID 오타. jq 가 schema 1차 검증 (구문) +
        techniques 배열 길이로 deliverable 완성도 정량화. 7+ 권장 (Kill Chain 7단계 1:1
        대응)."
      - "환경별 체크리스트 3종 — cat <<'EOF' >> /tmp/aerosec_assessment.log
        [A 라운지 (공유 PSK)] WPA3-SAE 강제 / Client Isolation / Captive HTTPS / 802.11w PMF / 공유 PSK 폐기 / WIDS 24h
        [B 기내] Per-passenger PSK 발급 / DoH 강제 / VPN passthrough 차단 / 안내 (peer-to-peer 위험)
        [C 직원 백본] 802.1X EAP-TLS / RADIUS+MFA / Bluetooth 패치 / Rogue AP 탐지 (Kismet)
        EOF. 해석: 라운지·기내·직원 3 신뢰 도메인별 차등 통제 (NIST SP 800-153 Wireless 권고).
        라운지=untrusted 다중 사용자 → SAE+Isolation, 기내=tenant 분리, 직원=
        certificate-based EAP-TLS. 일률적 권고 X."
      - "가상 환경 명령 시뮬레이션 — `iw dev 2>/dev/null || ip link show 2>&1 | grep -E
        'wlan|wlp' | head -5 || echo '[가상: wlan0/wlan1]'`; echo '[Wi-Fi 진화] WEP RC4 → WPA
        TKIP → WPA2 AES-CCMP → WPA3 SAE'; echo '[aircrack-ng] airmon-ng / airodump-ng / aireplay-ng /
        aircrack-ng / airbase-ng'; echo '[4WHS] M1 ANonce → M2 SNonce+MIC → M3 GTK+MIC → M4 ACK'.
        해석: attacker VM 에 무선 NIC 없음 (가상 환경) → 명령 골격만 시뮬레이션. 실 무선
        공격 = 정보통신망법 위반. lecture w13 의 4-Way Handshake 4 메시지·aircrack-ng 5 도구
        ·프로토콜 진화 핵심 키워드 검증."
      - "Non-AI 트랙 명시 (Bastion AI 통합 차이) — echo '=== 트랙 명시 ===' >> /tmp/aerosec_assessment.log;
        echo '본 평가는 Non-AI 트랙 — ssh ccc@10.20.30.201 (attacker VM) 직접 실행' >> /tmp/aerosec_assessment.log;
        echo 'AI 트랙 비교: nl2cmd \"공항 Wi-Fi 점검 자동화\" → Bastion 이 Navigator JSON 자동 생성·정책 매핑
        + KG context 활용' >> /tmp/aerosec_assessment.log; echo '본 트랙은 컨설턴트 자력 작성 능력 검증' >>
        /tmp/aerosec_assessment.log. 해석: P19 attack-nonai 트랙은 도구·명령·산출물 자력 작성
        검증. AI 트랙 비교는 평가 보고서에서 reproducibility 차이 (수동 = 학습효과·증거 보존, AI =
        속도·일관성) 명시."
      - "PDF 변환 + 무결성 서명 — pandoc /tmp/aerosec_assessment.log -o
        /tmp/aerosec_report.pdf 2>/dev/null || echo '[pandoc 없음 — txt 제출]';
        sha256sum /tmp/aerosec_report.pdf 2>/dev/null > /tmp/aerosec_report.sha256;
        gpg --armor --detach-sign /tmp/aerosec_report.pdf 2>/dev/null || echo '[gpg key
        없음 — sha256 only]'; ls -l /tmp/aerosec_report*. 해석: 컨설팅 deliverable
        는 변조 방지 무결성 (PCI-DSS 12.10·ISO 27001 A.5.34) 필수. SHA-256 해시 + GPG
        분리 서명 = 발주처 검증 가능 형태. 실패 시 graceful degrade (txt 제출)."
      - "Navigator import 검증 절차 — echo '=== Navigator Import 절차 ===' | tee
        /tmp/import_steps.md; echo '1. mitre-attack.github.io/attack-navigator 접속 (offline:
        attack-navigator-app docker)' | tee -a /tmp/import_steps.md; echo '2. Open Existing Layer
        → Upload from local → /tmp/aerosec_layer.json' | tee -a /tmp/import_steps.md;
        echo '3. heatmap 7 TID 색상 (red=확정 / orange=부분) 검증' | tee -a /tmp/import_steps.md;
        echo '4. screenshot → /tmp/aerosec_navigator.png 첨부 → 발주처 PDF 보고서 동봉' | tee
        -a /tmp/import_steps.md. 해석: Navigator JSON 은 단순 텍스트 산출물이 아니라
        UI 시각화·heatmap 발표·범위 협의 도구. import 4 단계는 클라이언트 워크숍 표준
        절차 (MITRE D3FEND 권장)."
      negative_signs:
      - JSON 형식 깨짐 (jq 파싱 실패·versions 누락·techniqueID 오타)
      - Kill Chain 7 단계 누락 (3 단계 이하 매핑)
      - 환경 1종만 작성 (라운지·기내·직원 차등 X)
      - 실 무선 공격 시도 (aireplay-ng 실 명령 — 정보통신망법 위반)
      - 시간 도장 누락 (date 명령 없음)
      - 컨설턴트 페르소나 / 발주처 명시 누락
      - Navigator versions 필드 누락 (import 거부됨)
      - 무결성 서명 단계 누락 (sha256sum / gpg X)
      - Non-AI 트랙 명시 X (AI 트랙과 구분 불가)
  target_vm: attacker
  risk_level: low
  answer_detail: |
    학생이 ssh attacker 직접. Navigator JSON 양식 준수. 실 무선 X.
