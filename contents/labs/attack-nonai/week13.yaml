      acceptable_methods:
      - "SAE Dragonfly 핸드셰이크 (수기 baseline) — 비밀번호 → password element (PE, ECC point).
        AP+Client 양쪽 random scalar 생성. commit/confirm 2 단계 ECC DH. 결과 PMK = ephemeral.
        해석: PSK 직접 노출 X. handshake 캡처 ≠ offline crack. 매 session 다른 PMK = forward
        secrecy."
      - "Wi-Fi Alliance WPA3 사양 (2018-06) — wifi.org/discover-wi-fi/security. 출력:
        WPA3-Personal SAE / WPA3-Enterprise 192-bit + EAP-TLS / Wi-Fi Easy Connect (DPP).
        해석: 3 모드. Personal (집/소형). Enterprise (회사). DPP (QR 코드 onboarding)."
      - "RFC 7664 SAE (2015 IETF) — Dragonfly 정식 표준화. 해석: WPA3 채택 전부터 IETF 표준.
        802.11s mesh 에 먼저 적용. crypto primitive 안전성 학술 검증."
