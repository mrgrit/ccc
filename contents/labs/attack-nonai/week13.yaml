lab_id: attack-nonai-week13
title: 무선 네트워크 공격 (Wireless)
version: non-ai
course: attack-nonai
week: 13
description: 무선 네트워크의 보안 취약점과 공격 기법을 학습한다. Wi-Fi 프로토콜 분석, WPA/WPA2 크래킹, Evil Twin, Deauthentication 공격의 원리를 이론과 시뮬레이션으로 실습한다.
difficulty: medium
duration_minutes: 120
objectives:
- Wi-Fi 보안 프로토콜(WEP, WPA, WPA2, WPA3)의 차이를 이해한다
- 무선 공격 도구(aircrack-ng suite)의 사용법을 학습한다
- 무선 네트워크 보안 강화 방안을 설계할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 무선 네트워크 인터페이스를 확인하라. 시스템에서 사용 가능한 네트워크 인터페이스를 나열하고, 무선 인터페이스가 있는지 확인하라.
  hint: iwconfig 또는 ip link show 명령을 사용한다
  category: recon
  points: 5
  answer: ip link show && echo '---' && iwconfig 2>/dev/null || echo 'No wireless interfaces (expected in lab VM)'
  answer_detail: iwconfig는 무선 인터페이스 정보를 표시한다. 실습 VM에는 물리 무선 카드가 없지만, 실전에서는 wlan0 등의 무선 인터페이스를 Monitor 모드로 전환하여 패킷 캡처에 사용한다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
  target_vm: attacker
- order: 2
  instruction: Wi-Fi 보안 프로토콜의 발전 과정을 정리하라. WEP, WPA, WPA2, WPA3 각각의 암호화 방식과 취약점을 비교하라.
  hint: 각 프로토콜의 암호화 알고리즘과 주요 취약점을 나열한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Wi-Fi Security Protocols ===\n\n| Protocol | Year | Encryption | Key Mgmt | Known Vulnerabilities |\n|----------|------|-----------|----------|---------------------|\n| WEP | 1997
    | RC4 (40/104-bit) | Static key | IV collision, FMS attack |\n| WPA | 2003 | TKIP (RC4) | PSK/EAP | TKIP weak, dictionary attack |\n| WPA2 | 2004 | AES-CCMP | PSK/EAP | KRACK, dictionary on PSK |\n|
    WPA3 | 2018 | AES-GCMP | SAE(Dragonfly) | Dragonblood (patched) |\n\n[Summary]\n- WEP: BROKEN - never use\n- WPA: DEPRECATED - TKIP vulnerable\n- WPA2-PSK: Vulnerable to offline dictionary attack\n-
    WPA2-Enterprise: Strong (with proper RADIUS)\n- WPA3-SAE: Currently most secure'''
  answer_detail: Wi-Fi 보안은 WEP(완전히 깨진) -> WPA(개선, 여전히 취약) -> WPA2(현재 표준, PSK는 사전 공격 가능) -> WPA3(SAE로 오프라인 사전 공격 방지)로 발전했다. WPA3-SAE의 Dragonfly 핸드셰이크는 오프라인 사전 공격을 원천 차단한다.
  verify:
    type: output_contains
    expect: Wi-Fi Security Protocols
    field: stdout
  target_vm: attacker
- order: 3
  instruction: aircrack-ng 도구 스위트의 구성 요소와 각 도구의 역할을 정리하라.
  hint: airmon-ng, airodump-ng, aireplay-ng, aircrack-ng 각각의 역할을 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Aircrack-ng Suite ===\n\n1. airmon-ng: 무선 인터페이스를 Monitor 모드로 전환\n   Usage: airmon-ng start wlan0\n\n2. airodump-ng: 무선 네트워크 스캐닝 및 패킷 캡처\n   Usage: airodump-ng wlan0mon\n   Usage:
    airodump-ng -c CH --bssid AP_MAC -w capture wlan0mon\n\n3. aireplay-ng: 패킷 인젝션 (Deauth, ARP replay)\n   Usage: aireplay-ng -0 5 -a AP_MAC -c CLIENT_MAC wlan0mon\n\n4. aircrack-ng: WEP/WPA 키 크래킹\n   Usage:
    aircrack-ng -w wordlist.txt capture.cap\n\n5. airbase-ng: Fake AP (Evil Twin) 생성\n   Usage: airbase-ng -e "Free WiFi" -c 6 wlan0mon'''
  answer_detail: aircrack-ng은 Wi-Fi 보안 감사의 표준 도구 모음이다. Monitor 모드 전환 -> 네트워크 스캐닝 -> 패킷 캡처 -> 크래킹의 워크플로를 따른다. Kali Linux에 기본 포함되어 있다.
  verify:
    type: output_contains
    expect: Aircrack-ng Suite
    field: stdout
  target_vm: attacker
- order: 4
  instruction: WPA2-PSK 4-Way Handshake의 원리를 설명하고, 각 단계에서 교환되는 메시지를 정리하라.
  hint: ANonce, SNonce, MIC, GTK 교환 과정을 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== WPA2 4-Way Handshake ===\n\nPMK = PBKDF2(PSK, SSID, 4096, 256)\n\n[Message 1] AP -> Client\n  - ANonce (AP random number)\n  - Client derives PTK from PMK + ANonce + SNonce + MACs\n\n[Message
    2] Client -> AP\n  - SNonce (Client random number)\n  - MIC (Message Integrity Check)\n  - AP derives PTK and verifies MIC\n\n[Message 3] AP -> Client\n  - GTK (Group Temporal Key, encrypted)\n  - MIC\n\n[Message
    4] Client -> AP\n  - ACK\n  - Encrypted communication begins\n\n[Attack Vector]\n- Capture handshake (Msg 1-2 sufficient)\n- Offline dictionary attack: try passwords to derive PMK\n- If PMK matches
    -> password found'''
  answer_detail: WPA2-PSK의 4-Way Handshake를 캡처하면 오프라인 사전 공격이 가능하다. PSK에서 PMK를 도출하고(PBKDF2), PTK를 계산하여 MIC를 검증한다. 캡처된 핸드셰이크의 MIC와 일치하는 PSK를 찾으면 비밀번호를 복원할 수 있다.
  verify:
    type: output_contains
    expect: 4-Way Handshake
    field: stdout
  target_vm: attacker
- order: 5
  instruction: aircrack-ng를 사용하여 사전에 준비된 WPA2 핸드셰이크 캡처 파일을 크래킹하라(시뮬레이션).
  hint: aircrack-ng -w wordlist capture.cap 형태이다
  category: exploit
  points: 10
  answer: 'echo ''=== WPA2 Cracking Simulation ==='' && echo ''Step 1: Monitor mode'' && echo ''  airmon-ng start wlan0'' && echo ''Step 2: Capture handshake'' && echo ''  airodump-ng -c 6 --bssid AA:BB:CC:DD:EE:FF
    -w capture wlan0mon'' && echo ''Step 3: Force deauth to trigger handshake'' && echo ''  aireplay-ng -0 5 -a AA:BB:CC:DD:EE:FF wlan0mon'' && echo ''Step 4: Crack with wordlist'' && echo ''  aircrack-ng
    -w /usr/share/wordlists/rockyou.txt capture-01.cap'' && echo ''---'' && echo ''hashcat GPU crack: hashcat -m 22000 hash.hc22000 rockyou.txt'' && echo ''Speed: ~500K passwords/sec (GPU) vs ~2K/sec (CPU)'''
  answer_detail: WPA2 크래킹의 핵심은 4-Way Handshake 캡처와 사전 공격이다. CPU로는 초당 약 2,000개 비밀번호를 테스트하지만, GPU(hashcat)를 사용하면 초당 50만 개 이상 가능하다. 강력한 비밀번호(12자 이상, 랜덤)는 사실상 크래킹 불가능하다.
  verify:
    type: output_contains
    expect: WPA2 Cracking
    field: stdout
  target_vm: attacker
- order: 6
  instruction: Evil Twin 공격의 원리를 설명하고 구성 요소를 정리하라.
  hint: Fake AP, DHCP 서버, DNS 스푸핑, 캡처 포털이 필요하다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Evil Twin Attack ===\n\n[Architecture]\nVictim --> Fake AP(Evil Twin) --> Internet\n                |\n                v\n        Attacker captures all traffic\n\n[Components]\n1.
    Fake AP: airbase-ng -e "Target_SSID" -c 6 wlan0mon\n2. DHCP: dnsmasq --dhcp-range=192.168.1.10,192.168.1.50\n3. NAT: iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE\n4. Captive Portal: nginx serving
    fake login page\n5. SSL Strip: downgrade HTTPS to HTTP\n\n[Attack Flow]\n1. Create AP with same SSID as target\n2. Deauth clients from real AP\n3. Clients auto-connect to stronger (closer) signal\n4.
    Capture credentials via fake portal\n\n[Detection]\n- Multiple BSSIDs for same SSID\n- Unexpected MAC address changes\n- Certificate warnings (SSL strip)'''
  answer_detail: Evil Twin은 정상 AP와 동일한 SSID로 가짜 AP를 생성하여 클라이언트를 유인하는 공격이다. 연결된 클라이언트의 모든 트래픽을 가로채고, 캡처 포털로 자격 증명을 수집할 수 있다.
  verify:
    type: output_contains
    expect: Evil Twin Attack
    field: stdout
  target_vm: attacker
- order: 7
  instruction: Deauthentication 공격의 원리를 설명하라. 802.11 관리 프레임의 취약점이 어떻게 악용되는지 분석하라.
  hint: 802.11 관리 프레임은 인증 없이 전송된다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Deauthentication Attack ===\n\n[Principle]\n- 802.11 management frames are NOT authenticated\n- Anyone can send deauth frames with spoofed source MAC\n\n[Attack]\n  aireplay-ng
    -0 0 -a AP_BSSID -c CLIENT_MAC wlan0mon\n  -0: deauth attack\n  0: continuous (use specific count in practice)\n\n[Uses]\n1. Capture WPA handshake (force reconnection)\n2. DoS (deny wireless access)\n3.
    Force client to Evil Twin\n\n[Defense]\n- 802.11w (Protected Management Frames)\n- WPA3 mandates PMF\n- WIDS (Wireless IDS) to detect deauth floods'''
  answer_detail: 802.11 관리 프레임(Deauthentication, Disassociation)은 암호화/인증 없이 전송되어 위조가 가능하다. 802.11w(PMF, Protected Management Frames)가 이 문제를 해결하며, WPA3에서는 PMF가 필수이다.
  verify:
    type: output_contains
    expect: Deauthentication Attack
    field: stdout
  target_vm: attacker
- order: 8
  instruction: WEP 크래킹의 원리를 설명하라. IV(Initialization Vector) 충돌 취약점이 어떻게 악용되는지 분석하라.
  hint: WEP의 RC4 스트림 암호화와 24-bit IV의 한계를 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== WEP Cracking ===\n\n[WEP Weakness]\n- RC4 stream cipher with 24-bit IV\n- Only 2^24 = 16,777,216 possible IVs\n- After ~5000 packets, IV reuse is likely\n- Same IV + same key =
    same keystream\n\n[FMS Attack (Fluhrer, Mantin, Shamir)]\n- Certain weak IVs reveal key bytes\n- Collect ~40,000 to 85,000 IVs\n- Statistical analysis recovers the key\n\n[PTW Attack (faster)]\n- Needs
    only ~20,000 packets\n- Works with ARP request replay\n\n[Commands]\n1. airodump-ng -c CH --bssid AP -w capture wlan0mon\n2. aireplay-ng -3 -b AP wlan0mon  (ARP replay to generate IVs)\n3. aircrack-ng
    capture-01.cap\n\n[Status: WEP is COMPLETELY BROKEN]'''
  answer_detail: WEP의 24-bit IV는 약 5,000 패킷 후 재사용되어 키스트림이 노출된다. FMS/PTW 공격으로 수만 패킷만 수집하면 키를 복원할 수 있다. WEP은 완전히 깨진 프로토콜로 절대 사용하면 안 된다.
  verify:
    type: output_contains
    expect: WEP Cracking
    field: stdout
  target_vm: attacker
- order: 9
  instruction: KRACK(Key Reinstallation Attack) 취약점의 원리를 설명하라.
  hint: 4-Way Handshake의 Message 3 재전송을 악용한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== KRACK Attack (CVE-2017-13077) ===\n\n[Principle]\n- Exploits WPA2 4-Way Handshake implementation\n- Attacker replays Message 3 of handshake\n- Client reinstalls already-in-use encryption
    key\n- Nonce is reset to zero\n- Nonce reuse in AES-CCMP allows decryption\n\n[Impact]\n- Decrypt packets (read encrypted traffic)\n- Replay packets\n- TCP hijacking (in some cases)\n- Affects ALL correct
    WPA2 implementations\n\n[Mitigation]\n- Patch client OS (most important)\n- Accept retransmitted Message 3 without key reinstallation\n- 802.11r (Fast BSS Transition) most vulnerable\n- WPA3 not affected\n\n[Status:
    Patched in all major OS since late 2017]'''
  answer_detail: KRACK은 WPA2 프로토콜 자체가 아닌 구현의 취약점이다. Message 3 재전송 시 nonce를 리셋하면 키스트림이 재사용되어 암호화가 무력화된다. 모든 주요 OS에서 패치되었지만, IoT 기기는 여전히 취약할 수 있다.
  verify:
    type: output_contains
    expect: KRACK Attack
    field: stdout
  target_vm: attacker
- order: 10
  instruction: WPA3-SAE(Simultaneous Authentication of Equals)의 작동 원리를 설명하고 WPA2-PSK와 비교하라.
  hint: Dragonfly 핸드셰이크와 Forward Secrecy를 설명한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== WPA3-SAE vs WPA2-PSK ===\n\n[WPA2-PSK]\n- PSK -> PMK (static, derived from password)\n- Offline dictionary attack possible with handshake capture\n- No forward secrecy\n\n[WPA3-SAE
    (Dragonfly)]\n- Password used in Diffie-Hellman exchange\n- PMK is ephemeral (different each session)\n- Offline dictionary attack IMPOSSIBLE\n  (attacker must interact with AP for each guess)\n- Forward
    secrecy: past sessions safe even if password leaked\n\n[Comparison]\n| Feature | WPA2-PSK | WPA3-SAE |\n|---------|----------|----------|\n| Offline attack | Possible | Impossible |\n| Forward secrecy
    | No | Yes |\n| PMF | Optional | Mandatory |\n| Dictionary attack | Offline | Online only |'''
  answer_detail: WPA3-SAE는 Dragonfly 핸드셰이크를 사용하여 비밀번호를 직접 전송하지 않고 Diffie-Hellman 교환에 사용한다. 핸드셰이크를 캡처해도 오프라인 사전 공격이 불가능하며, 세션별 고유한 키를 생성하여 Forward Secrecy를 제공한다.
  verify:
    type: output_contains
    expect: WPA3-SAE vs WPA2-PSK
    field: stdout
  target_vm: attacker
- order: 11
  instruction: Bluetooth 공격 기법(BlueBorne, BlueSmack, KNOB)의 개요를 정리하라.
  hint: 각 공격의 대상, 방법, 영향을 정리한다
  category: analysis
  points: 10
  answer: echo -e '=== Bluetooth Attacks ===\n\n[BlueBorne (CVE-2017-0785)]\n- Remote code execution via Bluetooth\n- No pairing required, no user interaction\n- Affects Linux, Android, Windows, iOS\n\n[BlueSmack]\n-
    Bluetooth DoS attack\n- Sends oversized L2CAP packets\n- Crashes Bluetooth stack\n\n[KNOB (Key Negotiation of Bluetooth)]\n- Forces short encryption key (1 byte)\n- MITM can then brute-force the key\n-
    Affects Bluetooth BR/EDR\n\n[BIAS (Bluetooth Impersonation)]\n- Impersonate previously paired device\n- Bypass authentication in Secure Connections\n\n[Defense]\n- Keep firmware updated\n- Disable Bluetooth
    when not in use\n- Use BLE with Secure Connections only'
  answer_detail: Bluetooth 공격은 무선 보안의 중요한 영역이다. BlueBorne은 페어링 없이 원격 코드 실행이 가능한 심각한 취약점이었다. Bluetooth는 가시거리(~10m) 제한이 있지만, 방향성 안테나로 범위를 확장할 수 있다.
  verify:
    type: output_contains
    expect: Bluetooth Attacks
    field: stdout
  target_vm: attacker
- order: 12
  instruction: 무선 네트워크 보안 감사 체크리스트를 작성하라.
  hint: 암호화, 인증, 모니터링, 물리적 보안 항목을 포함한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Wireless Security Audit Checklist ===\n\n[Encryption]\n[ ] WPA3-SAE or WPA2-Enterprise in use\n[ ] WEP/WPA-TKIP disabled\n[ ] PMF (802.11w) enabled\n\n[Authentication]\n[ ] Strong
    PSK (20+ chars, random) or RADIUS\n[ ] MAC filtering (supplementary only)\n[ ] Guest network isolated\n\n[AP Configuration]\n[ ] Default admin password changed\n[ ] Firmware up to date\n[ ] SSID broadcast:
    policy decision\n[ ] Unnecessary services disabled (WPS)\n\n[Monitoring]\n[ ] WIDS/WIPS deployed\n[ ] Rogue AP detection active\n[ ] Deauth flood alerts configured\n\n[Physical]\n[ ] AP placement minimizes
    external coverage\n[ ] Signal strength appropriate\n[ ] APs physically secured'''
  answer_detail: 무선 보안 감사는 암호화, 인증, AP 설정, 모니터링, 물리적 보안을 포괄해야 한다. WPS(Wi-Fi Protected Setup)는 PIN 브루트포스에 취약하므로 반드시 비활성화해야 한다.
  verify:
    type: output_contains
    expect: Wireless Security Audit
    field: stdout
  target_vm: attacker
- order: 13
  instruction: Rogue AP 탐지 방법을 설명하고, 간단한 탐지 스크립트의 로직을 작성하라.
  hint: 알려진 AP 목록과 비교하여 미인가 AP를 탐지한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Rogue AP Detection ===\n\n[Methods]\n1. BSSID whitelist comparison\n2. Signal strength anomaly (same SSID, different signal)\n3. Channel overlap analysis\n4. Vendor OUI mismatch\n\n[Pseudo
    Script]\nknown_aps = load_whitelist()\nfor ap in scan_results:\n    if ap.bssid not in known_aps:\n        alert(f"ROGUE AP: {ap.ssid} at {ap.bssid}")\n    if ap.ssid in known_ssids and ap.signal >
    threshold:\n        alert(f"EVIL TWIN suspect: {ap.ssid}")\n\n[Tools]\n- Kismet: wireless network detector\n- Wazuh: can correlate wireless events\n- Commercial: Aruba WIPS, Cisco CleanAir'''
  answer_detail: Rogue AP 탐지는 무선 보안의 핵심이다. BSSID 화이트리스트, 신호 강도 이상, 채널 분석을 조합하면 미인가 AP와 Evil Twin을 식별할 수 있다. 기업 환경에서는 WIPS(Wireless IPS)가 자동 탐지/차단한다.
  verify:
    type: output_contains
    expect: Rogue AP Detection
    field: stdout
  target_vm: attacker
- order: 14
  instruction: hashcat을 사용한 WPA2 핸드셰이크 GPU 크래킹 명령과 성능을 정리하라.
  hint: hashcat -m 22000 모드가 WPA2이다
  category: exploit
  points: 15
  answer: 'echo -e ''=== WPA2 GPU Cracking with hashcat ===\n\n[Convert capture to hashcat format]\nhcxpcapngtool capture.pcapng -o hash.hc22000\n\n[Crack with wordlist]\nhashcat -m 22000 hash.hc22000 /usr/share/wordlists/rockyou.txt\n\n[Crack
    with rules]\nhashcat -m 22000 hash.hc22000 wordlist.txt -r best64.rule\n\n[Brute force 8-digit numeric]\nhashcat -m 22000 hash.hc22000 -a 3 "?d?d?d?d?d?d?d?d"\n\n[Performance Estimates]\n| GPU | Speed
    (WPA2) |\n|-----|-------------|\n| RTX 4090 | ~2.5M PMK/s |\n| RTX 3080 | ~1.1M PMK/s |\n| CPU i7 | ~10K PMK/s |\n\n[Time to crack 8-char password]\n- Numeric only: 10^8 / 2.5M = 40 seconds\n- Lower
    alpha: 26^8 / 2.5M = 3.4 days\n- Mixed case+num: 62^8 / 2.5M = 2.7 years'''
  answer_detail: GPU를 사용한 WPA2 크래킹은 CPU 대비 수백 배 빠르다. 그러나 12자 이상의 랜덤 비밀번호는 현실적으로 크래킹이 불가능하다. PBKDF2의 4096 반복이 속도를 제한하는 핵심 요소이다.
  verify:
    type: output_contains
    expect: WPA2 GPU Cracking
    field: stdout
  target_vm: attacker
- order: 15
  instruction: 무선 네트워크 공격 실습 결과를 /tmp/wireless_report.txt에 정리하라. 프로토콜별 위험도, 공격 시나리오, 방어 권고를 포함하라.
  hint: 각 프로토콜의 보안 수준과 권장 설정을 정리한다
  category: analysis
  points: 10
  answer: 'echo -e ''=== Wireless Attack Report ===\n\n[Protocol Risk Assessment]\n- WEP: CRITICAL - cracked in minutes\n- WPA-TKIP: HIGH - deprecated\n- WPA2-PSK: MEDIUM - offline dict attack possible\n-
    WPA2-Enterprise: LOW - RADIUS + certificates\n- WPA3-SAE: LOW - no offline attack\n\n[Attack Scenarios Studied]\n1. WPA2-PSK handshake capture + cracking\n2. Evil Twin with captive portal\n3. Deauthentication
    DoS\n4. Rogue AP\n5. Bluetooth BlueBorne/KNOB\n\n[Recommendations]\n1. Deploy WPA3-SAE where possible\n2. WPA2-Enterprise with RADIUS for corporate\n3. Strong PSK (20+ chars) if WPA2-PSK required\n4.
    Enable 802.11w (PMF)\n5. Disable WPS\n6. Deploy WIDS/WIPS\n7. Segment wireless from internal network\n8. Regular wireless security audits'' > /tmp/wireless_report.txt && cat /tmp/wireless_report.txt'
  answer_detail: 무선 보안 보고서는 현재 사용 중인 프로토콜의 위험도 평가와 단계적 마이그레이션 계획을 포함해야 한다. WPA3로의 전환을 장기 목표로 설정하고, 당장은 강력한 PSK와 PMF 활성화를 권고한다.
  verify:
    type: output_contains
    expect: Wireless Attack Report
    field: stdout
  target_vm: attacker
