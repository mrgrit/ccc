    type: output_contains
    expect:
    - KRACK Attack
    - KRACK
    field: stdout
    semantic:
      intent: KRACK 공격 — CVE-2017-13077 (Vanhoef 2017). M3 재전송 → 키 재설치 → nonce 0 리셋
        → AES-CCMP nonce 재사용 → 복호화/재생/TCP 하이잭. 802.11r FT 가장 취약. WPA3 영향 없음. 모든 주요
