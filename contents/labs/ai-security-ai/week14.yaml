  risk_level: medium
  bastion_prompt: 모델 다운로드 경로의 보안을 점검해줘 /api/pull 엔드포인트의 접근 가능 여부를 확인하고 비인가 모델 다운로드
    위험을 평가해줘
- order: 3
  instruction: 모델 행동 기준선(baseline)을 생성하시오. 표준 질문 세트에 대한 기대 응답을 기록하여 모델 변조 탐지에 활용하라.
  hint: 고정된 질문 세트와 seed를 사용하여 재현 가능한 기준 응답을 기록하세요.
  category: defense
  points: 12
  answer: "python3 -c \"\nimport json, urllib.request, hashlib\nBASELINE_QUESTIONS\
    \ = [\n    'What is the capital of South Korea?',\n    'What port does SSH use?',\n\
    \    'Is SQL injection a security vulnerability?',\n    'What does HTTPS stand\
    \ for?',\n    'What is 2+2?'\n]\ndef get_baseline(questions, model='gemma3:4b'):\n\
    \    baseline = []\n    for q in questions:\n        data = json.dumps({'model':model,'prompt':q+'\
    \ Answer in 5 words or less.','stream':False,'options':{'temperature':0,'seed':42,'num_predict':15}}).encode()\n\
    \        req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \        resp = json.loads(urllib.request.urlopen(req).read())\n        answer\
    \ = resp['response'].strip()[:50]\n        baseline.append({'question':q,'expected':answer,'hash':hashlib.sha256(answer.encode()).hexdigest()[:12]})\n\
    \    return baseline\n\nbl = get_baseline(BASELINE_QUESTIONS)\nprint('=== Model\
    \ Behavior Baseline ===')\nprint(f'Model: gemma3:4b | Questions: {len(bl)} | Seed:\
    \ 42')\nprint()\nfor entry in bl:\n    print(f'Q: {entry[\\\"question\\\"][:40]}')\n\
    \    print(f'A: {entry[\\\"expected\\\"]} [hash: {entry[\\\"hash\\\"]}]')\n  \
    \  print()\nprint('Save this baseline. Any deviation indicates model change or\
    \ tampering.')\n\""
  answer_detail: 행동 기준선은 모델이 정상적으로 동작하는 기준점을 기록합니다. 모델이 교체, 업데이트, 또는 변조되면 기준선과의 차이를
    통해 변경을 탐지할 수 있습니다.
  verify:
    type: output_contains
    expect: Baseline
    field: stdout
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request, hashlib\nBASELINE_QUESTIONS\
