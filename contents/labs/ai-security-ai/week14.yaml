lab_id: ai-security-ai-week14
title: '[Non-AI] AI 공급망 보안'
version: ai
course: ai-security-ai
week: 14
description: 'AI/LLM 공급망의 보안 위협을 분석하고 모델 무결성 검증 방법을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- AI 공급망의 보안 위협을 이해한다
- 모델 무결성 검증 방법을 실습한다
- 서드파티 모델 사용 시 보안 점검을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 설치된 모델의 출처와 무결성을 확인하시오. 모델 메타데이터, 크기, 해시값을 추출하라.
  hint: /api/tags와 /api/show를 사용하여 모델 정보를 수집하세요.
  category: audit
  points: 10
  answer: "\U0001F916 프롬프트: 현재 설치된 모델의 출처와 무결성을 확인해줘\n\U0001F4CE 참고 (CLI): python3\
    \ -c \"\nimport json, urllib.request\n# List models\nreq = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/tags')\n\
    models = json.loads(urllib.request.urlopen(req).read()).get('models',[])\nprint('===\
    \ Installed Models Inventory ===')\nfor m in models:\n    print(f'\\nModel: {m[\"\
    name\"]}')\n    print(f'  Size: {m.get(\\\"size\\\",0)/1e9:.2f} GB')\n    print(f'\
    \  Modified: {m.get(\\\"modified_at\\\",\\\"unknown\\\")}')\n    print(f'  Digest:\
    \ {m.get(\\\"digest\\\",\\\"unknown\\\")[:24]}...')\n    # Get detailed info\n\
    \    try:\n        data = json.dumps({'name':m['name']}).encode()\n        req2\
    \ = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/show',data=data,headers={'Content-Type':'application/json'})\n\
    \        info = json.loads(urllib.request.urlopen(req2).read())\n        details\
    \ = info.get('details',{})\n        print(f'  Family: {details.get(\\\"family\\\
    \",\\\"?\\\")}')  \n        print(f'  Parameters: {details.get(\\\"parameter_size\\\
    \",\\\"?\\\")}')\n        print(f'  Quantization: {details.get(\\\"quantization_level\\\
    \",\\\"?\\\")}')\n    except: pass\n\""
  answer_detail: 모델 인벤토리는 공급망 보안의 기본입니다. 설치된 모델의 출처, 버전, 해시를 기록하여 변조나 비인가 모델을 탐지합니다.
  verify:
    type: output_contains
    expect: Installed Models
    field: stdout
    semantic:
      intent: 설치 모델 출처/무결성 확인 — python3 Ollama /api/tags 로 전체 모델 목록 + /api/show 로
        각 모델 메타데이터 (family/parameter_size/quantization_level) + digest (SHA256) 24자
        + size GB + modified_at 타임스탬프 추출. Model Inventory 작성. NIST SP 800-161 공급망
        리스크 관리 + EO 14028 Software Supply Chain + MITRE ATLAS AML.T0010 ML Supply
        Chain Compromise.
      success_criteria:
      - /api/tags + /api/show 2개 엔드포인트 조합
      - digest (SHA256) + size + modified_at 3개 이상 메타데이터
      - Model Inventory 형식 출력
      acceptable_methods:
      - Hugging Face Hub API (model revision + sha)
      - Docker manifest digest (sha256:)
      - Sigstore/cosign 모델 서명 검증
      - CycloneDX AI-BOM 스펙 필드 매핑
      negative_signs:
      - /api/tags 만 호출, digest 누락
      - 메타데이터 3개 미만
      - SP 800-161 / EO 14028 공급망 맥락 없음
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request\n# List models\nreq = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/tags')\n\
    models = json.loads(urllib.request.urlopen(req).read()).get('models',[])\nprint('===\
    \ Installed Models Inventory ===')\nfor m in models:\n    print(f'\\nModel: {m[\"\
    name\"]}')\n    print(f'  Size: {m.get(\\\"size\\\",0)/1e9:.2f} GB')\n    print(f'\
    \  Modified: {m.get(\\\"modified_at\\\",\\\"unknown\\\")}')\n    print(f'  Digest:\
    \ {m.get(\\\"digest\\\",\\\"unknown\\\")[:24]}...')\n    # Get detailed info\n\
    \    try:\n        data = json.dumps({'name':m['name']}).encode()\n        req2\
    \ = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/show',data=data,headers={'Content-Type':'application/json'})\n\
    \        info = json.loads(urllib.request.urlopen(req2).read())\n        details\
    \ = info.get('details',{})\n        print(f'  Family: {details.get(\\\"family\\\
    \",\\\"?\\\")}')  \n        print(f'  Parameters: {details.get(\\\"parameter_size\\\
    \",\\\"?\\\")}')\n        print(f'  Quantization: {details.get(\\\"quantization_level\\\
    \",\\\"?\\\")}')\n    except: pass\n\""
  risk_level: low
  bastion_prompt: 현재 설치된 모델의 출처와 무결성을 확인해줘
- order: 2
  instruction: 모델 다운로드 경로의 보안을 점검하시오. /api/pull 엔드포인트의 접근 가능 여부를 확인하고 비인가 모델 다운로드
    위험을 평가하라.
  hint: 존재하지 않는 모델의 pull을 시도하여 API 접근 상태를 확인하세요.
  category: attack
  points: 12
  answer: "\U0001F916 프롬프트: 모델 다운로드 경로의 보안을 점검해줘 /api/pull 엔드포인트의 접근 가능 여부를 확인하고 비인가\
    \ 모델 다운로드 위험을 평가해줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport json, urllib.request\n\
    print('=== Model Download Security Check ===')\n\n# Test 1: Can we pull models\
    \ without auth?\ntry:\n    data = json.dumps({'name':'library/test:nonexistent','stream':False}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/pull',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = urllib.request.urlopen(req, timeout=10)\n    print('[FAIL] Pull API\
    \ accessible without authentication')\n    print(f'  Response: {resp.read().decode()[:100]}')\n\
    except urllib.error.HTTPError as e:\n    print(f'[INFO] Pull API returned HTTP\
    \ {e.code}')\n    print(f'  Response: {e.read().decode()[:100]}')\nexcept Exception\
    \ as e:\n    print(f'[INFO] Pull API: {str(e)[:60]}')\n\n# Test 2: Can we delete\
    \ models?\ntry:\n    data = json.dumps({'name':'nonexistent-model'}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/delete',data=data,method='DELETE',headers={'Content-Type':'application/json'})\n\
    \    resp = urllib.request.urlopen(req, timeout=5)\n    print('[FAIL] Delete API\
    \ accessible without authentication')\nexcept urllib.error.HTTPError as e:\n \
    \   status = 'FAIL - endpoint accessible' if e.code != 403 else 'PASS - access\
    \ denied'\n    print(f'[{status}] Delete API: HTTP {e.code}')\nexcept Exception\
    \ as e:\n    print(f'[INFO] Delete API: {str(e)[:40]}')\n\nprint('\\nRisk Assessment:')\n\
    print('  - Unauthorized model pull: allows loading backdoored models')\nprint('\
    \  - Unauthorized model delete: DoS by removing production models')\nprint(' \
    \ - Recommendation: Restrict management APIs to admin only')\n\""
  answer_detail: 관리 API(pull/delete)가 인증 없이 접근 가능하면 공격자가 악성 모델을 설치하거나 기존 모델을 삭제할 수
    있습니다. 관리 엔드포인트는 반드시 인증이 필요합니다.
  verify:
    type: output_contains
    expect: Risk Assessment
    field: stdout
    semantic:
      intent: '모델 다운로드 경로 보안 점검 — python3 2개 관리 엔드포인트 비인증 접근 테스트: /api/pull (존재하지
        않는 모델 library/test:nonexistent) + /api/delete (DELETE method). HTTP status
        code 해석 (200 → FAIL accessible / 403 → PASS denied). Risk: Unauthorized pull
        = backdoored model 설치 + Unauthorized delete = production model DoS. OWASP
        API1 Broken Auth + OWASP LLM05 Supply Chain Vulnerabilities + MITRE ATLAS
        AML.T0010.'
      success_criteria:
      - /api/pull + /api/delete 2개 엔드포인트 테스트
      - HTTP status code 분기 (403 PASS vs accessible FAIL)
      - backdoor/DoS 리스크 명시 + admin-only 권고
      acceptable_methods:
      - curl -X POST/DELETE + -w '%{http_code}'
      - Burp Suite Intruder + custom payload
      - OWASP ZAP API scanner
      - nuclei -t exposed-panels/ollama-api
      negative_signs:
      - pull 만 테스트 delete 누락
      - HTTP status 분기 없이 단일 결과만
      - OWASP LLM05 Supply Chain 맥락 없음
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request\nprint('=== Model Download Security\
    \ Check ===')\n\n# Test 1: Can we pull models without auth?\ntry:\n    data =\
    \ json.dumps({'name':'library/test:nonexistent','stream':False}).encode()\n  \
    \  req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/pull',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = urllib.request.urlopen(req, timeout=10)\n    print('[FAIL] Pull API\
    \ accessible without authentication')\n    print(f'  Response: {resp.read().decode()[:100]}')\n\
    except urllib.error.HTTPError as e:\n    print(f'[INFO] Pull API returned HTTP\
    \ {e.code}')\n    print(f'  Response: {e.read().decode()[:100]}')\nexcept Exception\
    \ as e:\n    print(f'[INFO] Pull API: {str(e)[:60]}')\n\n# Test 2: Can we delete\
    \ models?\ntry:\n    data = json.dumps({'name':'nonexistent-model'}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/delete',data=data,method='DELETE',headers={'Content-Type':'application/json'})\n\
    \    resp = urllib.request.urlopen(req, timeout=5)\n    print('[FAIL] Delete API\
    \ accessible without authentication')\nexcept urllib.error.HTTPError as e:\n \
    \   status = 'FAIL - endpoint accessible' if e.code != 403 else 'PASS - access\
    \ denied'\n    print(f'[{status}] Delete API: HTTP {e.code}')\nexcept Exception\
    \ as e:\n    print(f'[INFO] Delete API: {str(e)[:40]}')\n\nprint('\\nRisk Assessment:')\n\
    print('  - Unauthorized model pull: allows loading backdoored models')\nprint('\
    \  - Unauthorized model delete: DoS by removing production models')\nprint(' \
    \ - Recommendation: Restrict management APIs to admin only')\n\""
  risk_level: medium
  bastion_prompt: '모델 다운로드 경로의 보안을 점검해줘 /api/pull 엔드포인트의 접근 가능 여부를 확인하고 비인가 모델 다운로드
    위험을 평가해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 모델 행동 기준선(baseline)을 생성하시오. 표준 질문 세트에 대한 기대 응답을 기록하여 모델 변조 탐지에 활용하라.
  hint: 고정된 질문 세트와 seed를 사용하여 재현 가능한 기준 응답을 기록하세요.
  category: defense
  points: 12
  answer: "\U0001F916 프롬프트: 모델 행동 기준선(baseline)을 생성해줘 표준 질문 세트에 대한 기대 응답을 기록하여 모델\
    \ 변조 탐지에 활용해줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport json, urllib.request,\
    \ hashlib\nBASELINE_QUESTIONS = [\n    'What is the capital of South Korea?',\n\
    \    'What port does SSH use?',\n    'Is SQL injection a security vulnerability?',\n\
    \    'What does HTTPS stand for?',\n    'What is 2+2?'\n]\ndef get_baseline(questions,\
    \ model='gemma3:4b'):\n    baseline = []\n    for q in questions:\n        data\
    \ = json.dumps({'model':model,'prompt':q+' Answer in 5 words or less.','stream':False,'options':{'temperature':0,'seed':42,'num_predict':15}}).encode()\n\
    \        req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \        resp = json.loads(urllib.request.urlopen(req).read())\n        answer\
    \ = resp['response'].strip()[:50]\n        baseline.append({'question':q,'expected':answer,'hash':hashlib.sha256(answer.encode()).hexdigest()[:12]})\n\
    \    return baseline\n\nbl = get_baseline(BASELINE_QUESTIONS)\nprint('=== Model\
    \ Behavior Baseline ===')\nprint(f'Model: gemma3:4b | Questions: {len(bl)} | Seed:\
    \ 42')\nprint()\nfor entry in bl:\n    print(f'Q: {entry[\\\"question\\\"][:40]}')\n\
    \    print(f'A: {entry[\\\"expected\\\"]} [hash: {entry[\\\"hash\\\"]}]')\n  \
    \  print()\nprint('Save this baseline. Any deviation indicates model change or\
    \ tampering.')\n\""
  answer_detail: 행동 기준선은 모델이 정상적으로 동작하는 기준점을 기록합니다. 모델이 교체, 업데이트, 또는 변조되면 기준선과의 차이를
    통해 변경을 탐지할 수 있습니다.
  verify:
    type: output_contains
    expect: Baseline
    field: stdout
    semantic:
      intent: 모델 행동 기준선(baseline) 생성 — python3 5개 표준 질문 (Seoul/SSH 22/SQLi vuln/HTTPS/2+2)
        + temperature=0 + seed=42 + num_predict=15 결정론 + 응답 SHA256 해시 12자. Model 교체/변조/업데이트
        시 기준선 대비 drift 탐지 가능. MITRE ATLAS AML.T0018 Backdoor ML Model + MITRE ATLAS
        AML.T0015 Evade ML Model + TensorFlow Lite model signing.
      success_criteria:
      - 5개 표준 질문 고정 + temperature=0 + seed=42 결정론
      - 각 응답 SHA256 해시로 기록
      - 기준선 저장 → 변조 탐지 활용 명시
      acceptable_methods:
      - pytest-benchmark + golden test
      - HELM benchmark fixed seed evaluation
      - DeepChecks Model Validation suite
      - Weights & Biases W&B artifact versioning
      negative_signs:
      - seed 고정 없이 재현 불가 응답
      - SHA256 해시 없이 원문만 저장
      - drift 탐지 목적 맥락 없음
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request, hashlib\nBASELINE_QUESTIONS\
    \ = [\n    'What is the capital of South Korea?',\n    'What port does SSH use?',\n\
    \    'Is SQL injection a security vulnerability?',\n    'What does HTTPS stand\
    \ for?',\n    'What is 2+2?'\n]\ndef get_baseline(questions, model='gemma3:4b'):\n\
    \    baseline = []\n    for q in questions:\n        data = json.dumps({'model':model,'prompt':q+'\
    \ Answer in 5 words or less.','stream':False,'options':{'temperature':0,'seed':42,'num_predict':15}}).encode()\n\
    \        req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \        resp = json.loads(urllib.request.urlopen(req).read())\n        answer\
    \ = resp['response'].strip()[:50]\n        baseline.append({'question':q,'expected':answer,'hash':hashlib.sha256(answer.encode()).hexdigest()[:12]})\n\
    \    return baseline\n\nbl = get_baseline(BASELINE_QUESTIONS)\nprint('=== Model\
    \ Behavior Baseline ===')\nprint(f'Model: gemma3:4b | Questions: {len(bl)} | Seed:\
    \ 42')\nprint()\nfor entry in bl:\n    print(f'Q: {entry[\\\"question\\\"][:40]}')\n\
    \    print(f'A: {entry[\\\"expected\\\"]} [hash: {entry[\\\"hash\\\"]}]')\n  \
    \  print()\nprint('Save this baseline. Any deviation indicates model change or\
    \ tampering.')\n\""
  risk_level: low
  bastion_prompt: 모델 행동 기준선(baseline)을 생성해줘 표준 질문 세트에 대한 기대 응답을 기록하여 모델 변조 탐지에 활용해줘
- order: 4
  instruction: 모델 변조 탐지를 시뮬레이션하시오. 기준선 응답과 현재 응답을 비교하여 변조 여부를 판단하라.
  hint: 기준선 질문을 다시 실행하고 해시를 비교하세요.
  category: defense
  points: 12
  answer: "\U0001F916 프롬프트: 모델 변조 탐지를 시뮬레이션해줘 기준선 응답과 현재 응답을 비교하여 변조 여부를 판단해줘\n\U0001F4CE\
    \ 참고 (CLI): python3 -c \"\nimport json, urllib.request, hashlib\nquestions = [\n\
    \    ('What is the capital of South Korea?', 'Seoul'),\n    ('What port does SSH\
    \ use?', '22'),\n    ('Is SQL injection a security vulnerability?', 'Yes'),\n\
    \    ('What does HTTPS stand for?', 'HyperText'),\n    ('What is 2+2?', '4')\n\
    ]\nprint('=== Model Integrity Verification ===')\nchanges = 0\nfor q, expected_keyword\
    \ in questions:\n    data = json.dumps({'model':'gemma3:4b','prompt':q+' Answer\
    \ in 5 words or less.','stream':False,'options':{'temperature':0,'seed':42,'num_predict':15}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = json.loads(urllib.request.urlopen(req).read())['response'].strip()[:50]\n\
    \    match = expected_keyword.lower() in resp.lower()\n    status = 'MATCH' if\
    \ match else 'DRIFT'\n    if not match: changes += 1\n    print(f'[{status}] Q:\
    \ {q[:35]:35s} Expected: {expected_keyword:12s} Got: {resp[:30]}')\n\nprint(f'\\\
    nIntegrity: {len(questions)-changes}/{len(questions)} consistent')\nif changes\
    \ == 0:\n    print('VERDICT: Model appears unmodified')\nelse:\n    print(f'WARNING:\
    \ {changes} responses differ from baseline - investigate!')\n\""
  answer_detail: 모델 무결성 검증은 기준선과 현재 응답을 비교하여 모델 변조를 탐지합니다. 핵심 사실에 대한 응답이 달라지면 모델이
    교체되었거나 악의적으로 수정되었을 가능성이 있습니다.
  verify:
    type: output_contains
    expect:
    - VERDICT
    - current
    - threshold
    field: stdout
    semantic:
      intent: 모델 변조 탐지 시뮬레이션 — python3 기준선 5개 질문 재실행 + expected keyword (Seoul/22/Yes/HyperText/4)
        부분일치 검사 + MATCH/DRIFT 분류 + 전체 일관성 수치 (N/5 consistent) + VERDICT (unmodified)
        또는 WARNING (changes > 0 investigate). Continuous Integrity Monitoring 기반 +
        MITRE ATLAS AML.T0019 Publish Poisoned Datasets + NIST AI RMF MEASURE 2.7
        Security.
      success_criteria:
      - 기준선 재실행 + keyword 부분일치 (case-insensitive)
      - MATCH/DRIFT per 질문 + changes 카운트
      - VERDICT unmodified 또는 WARNING investigate 결론
      acceptable_methods:
      - scipy cosine similarity embedding 비교
      - BERTScore semantic similarity
      - MinHash/SimHash 유사도 + 임계치
      - Presidio + LLM-as-judge drift 감지
      negative_signs:
