lab_id: ai-security-ai-week01
title: '[Non-AI] Ollama LLM 기초와 API 탐색'
version: ai
course: ai-security-ai
week: 1
description: 'Ollama LLM 서버의 기본 구조를 이해하고 API를 통해 모델과 상호작용하는 방법을 학습합니다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: easy
duration_minutes: 120
objectives:
- Ollama API의 엔드포인트 구조를 이해한다
- curl을 사용하여 LLM에 프롬프트를 전송하고 응답을 분석한다
- 모델 정보를 조회하고 기본 생성 파라미터를 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama 서버가 동작 중인지 확인하시오. 서버의 버전 정보를 조회하라.
  hint: curl로 Ollama 서버의 기본 엔드포인트에 GET 요청을 보내세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: Ollama 서버가 동작 중인지 확인해줘

    📎 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/version'
  answer_detail: Ollama는 REST API를 제공하는 로컬 LLM 서버입니다. /api/version 엔드포인트로 서버 상태와 버전을
    확인할 수 있습니다.
  verify:
    type: output_contains
    expect: version
    field: stdout
    semantic:
      intent: 'Ollama LLM 서버 생존 확인 — curl -s ${BASTION_URL:-http://localhost:8003}/api/version
        으로 Ollama REST API 의 version endpoint 에 GET 요청하여 {version: x.y.z} JSON 응답
        획득. LLM 서버 가동 여부 + 버전 정보로 알려진 CVE 매핑 기초. AI 보안 정찰 Phase 1.'
      success_criteria:
      - curl -s 으로 /api/version 엔드포인트 GET 요청
      - ${BASTION_URL} 환경변수 + 기본값 fallback
      - JSON 응답에서 version 필드 확인
      acceptable_methods:
      - curl -s /api/version
      - httpie http GET /api/version
      - python requests.get 로 프로그래밍
      - wget -qO- 대체
      negative_signs:
      - -s (silent) 없이 진행 출력 노이즈
      - version 키워드 확인 누락
      - Ollama vs OpenAI API 혼동
  target_vm: manager
  script: curl -s ${BASTION_URL:-http://localhost:8003}/api/version
  risk_level: low
  bastion_prompt: 'Ollama 서버가 동작 중인지 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: Ollama 서버에 설치된 모델 목록을 조회하시오.
  hint: /api/tags 엔드포인트를 사용하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: Ollama 서버에 설치된 모델 목록을 조회해줘

    📎 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/tags | python3 -c
    "import sys,json; [print(m[''name'']) for m in json.load(sys.stdin)[''models'']]"'
  answer_detail: /api/tags는 설치된 모델 목록을 반환합니다. 모델 이름, 크기, 수정일 등의 정보를 확인할 수 있습니다.
  verify:
    type: output_contains
    expect: gemma
    field: stdout
    semantic:
      intent: Ollama 설치 모델 목록 조회 — curl -s ${BASTION_URL}/api/tags | python3 json.load
        | [print(m[name])] 으로 /api/tags 엔드포인트 호출 + python JSON 파싱 + models 배열에서 각
        모델의 name 추출. 모델명 (gemma3:4b/llama3/mistral 등) + 크기 + 수정일 확인. MITRE ATLAS TA0043
        Reconnaissance.
      success_criteria:
      - curl -s /api/tags JSON 응답
      - python3 json.load + models 배열 순회
      - 각 모델의 name 필드 출력
      acceptable_methods:
      - curl + python json.load
      - jq .models[].name 대체
      - httpie GET /api/tags
      - ollama list CLI 명령
      negative_signs:
      - 전체 JSON 덤프만
      - 모델 이름만 필터링 누락
      - gemma3 외 모델 비교 맥락 없음
  target_vm: manager
  script: curl -s ${BASTION_URL:-http://localhost:8003}/api/tags | python3 -c "import
    sys,json; [print(m['name']) for m in json.load(sys.stdin)['models']]"
  risk_level: low
  bastion_prompt: 'Ollama 서버에 설치된 모델 목록을 조회해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: /api/generate 엔드포인트를 사용하여 gemma3:4b 모델에 'Hello, who are you?'라는 프롬프트를
    전송하시오.
  hint: POST 요청으로 model과 prompt 필드를 JSON으로 전송하세요. stream:false를 설정하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: Hello, who are you?\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Hello, who are you?\",\"stream\"\
    :false}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: /api/generate는 단일 프롬프트를 모델에 전송하는 기본 엔드포인트입니다. stream:false를 설정하면
    전체 응답을 한 번에 받을 수 있습니다.
  verify:
    type: output_contains
    expect: I
    field: stdout
    semantic:
      intent: Ollama /api/generate 기본 프롬프트 전송 — curl -s /api/generate -d {model:gemma3:4b,
        prompt:Hello, who are you?, stream:false} 으로 POST 요청 + stream:false 로 한번에
        전체 응답 수신 + python json 파싱하여 response 필드 추출. 단일 턴 추론. LLM 상호작용 기본 엔드포인트.
      success_criteria:
      - curl -X POST (-d 포함) + JSON body
      - model + prompt + stream:false 3 필드 최소
      - 응답에서 response 필드 파싱
      acceptable_methods:
      - curl + JSON body + python
      - httpie http POST :8003/api/generate model=gemma3:4b prompt=...
      - ollama run gemma3:4b 단순 CLI
      - python ollama 라이브러리 .generate()
      negative_signs:
      - stream:true 로 SSE streaming 혼란
      - response 필드 추출 누락
      - model 이름 오타
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Hello, who are you?\",\"stream\":false}' \\\
    \n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: 'Hello, who are you?


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '/api/chat 엔드포인트를 사용하여 system 메시지와 user 메시지를 분리하여 전송하시오. system: ''You
    are a helpful security assistant'', user: ''What is prompt injection?'''
  hint: messages 배열에 role별로 메시지를 구분하여 전송하세요.
  category: recon
  points: 12
  answer: "\U0001F916 프롬프트: What is prompt injection?\n\U0001F4CE 참고 (CLI): curl -s\
    \ ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"messages\":[{\"role\":\"system\",\"content\":\"You are a helpful security assistant\"\
    },{\"role\":\"user\",\"content\":\"What is prompt injection?\"}],\"stream\":false}'\
    \ \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: /api/chat은 대화형 인터페이스로, system/user/assistant 역할을 구분하여 메시지를 전송합니다.
    system 메시지는 모델의 행동 지침을 설정합니다.
  verify:
    type: output_contains
    expect: injection
    field: stdout
    semantic:
      intent: Ollama /api/chat 대화형 엔드포인트 — messages 배열에 role:system(You are a helpful
        security assistant) + role:user(What is prompt injection?) 2 개 메시지. system/user/assistant
        3 역할 구분으로 대화 컨텍스트 유지. system prompt 가 모델 행동 지침 (가드레일) 설정. OWASP LLM01 Prompt
        Injection 컨텍스트.
      success_criteria:
      - /api/chat (not generate) 엔드포인트
      - messages 배열 + role 구분 (system/user)
      - json 응답에서 message.content 파싱
      acceptable_methods:
      - curl /api/chat + messages
      - openai API 호환 /v1/chat/completions 대체
      - python ollama client.chat()
      - langchain ChatOllama
      negative_signs:
      - /api/generate 엔드포인트 혼동
      - role 구분 없이 단일 메시지
      - system prompt 누락
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a helpful\
    \ security assistant\"},{\"role\":\"user\",\"content\":\"What is prompt injection?\"\
    }],\"stream\":false}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  risk_level: low
  bastion_prompt: 'What is prompt injection?


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: temperature 파라미터를 0.0과 1.5로 각각 설정하여 동일한 프롬프트 'Explain AI security in
    one sentence'의 응답 차이를 비교하시오.
  hint: options 필드 안에 temperature를 설정합니다.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: Explain AI security in one sentence\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"prompt\":\"Explain AI security in one sentence\",\"stream\":false,\"\
    options\":{\"temperature\":0.0}}' \\\n | python3 -c \"import sys,json; print('TEMP=0.0:',\
    \ json.load(sys.stdin)['response'])\" && curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain AI security in one sentence\"\
    ,\"stream\":false,\"options\":{\"temperature\":1.5}}' | python3 -c \"import sys,json;\
    \ print('TEMP=1.5:', json.load(sys.stdin)['response'])\""
  answer_detail: temperature는 출력의 무작위성을 조절합니다. 0에 가까울수록 결정적(deterministic)이고, 높을수록
    창의적이지만 예측 불가능합니다. 보안 맥락에서 낮은 temperature가 일관된 응답을 보장합니다.
  verify:
    type: output_contains
    expect: TEMP=
    field: stdout
    semantic:
      intent: temperature 샘플링 비교 — options:{temperature:0.0} vs {temperature:1.5}
        두 번 호출 후 동일 프롬프트 응답 차이 비교. temp=0 deterministic greedy decoding (보안 테스트 재현성)
        vs temp>=1 높은 창의성이지만 예측 불가 (hallucination 증가). 보안 맥락에서 temp=0 권장. LLM 추론 파라미터
        이해.
      success_criteria:
      - options.temperature:0.0 요청
      - options.temperature:1.5 두 번째 요청
      - TEMP=0.0/1.5 레이블 + 응답 비교 출력
      acceptable_methods:
      - curl 두 번 + temperature 0/1.5
      - for 루프로 temp 리스트 순회
      - top_p/top_k 추가 조합 비교
      - num_ctx 컨텍스트 윈도우 병행 실험
      negative_signs:
      - 한 번만 호출 (비교 불가)
      - TEMP= 라벨 없이 구분 실패
      - 결정성(determinism) 보안 의미 맥락 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Explain AI security in one sentence\",\"stream\"\
    :false,\"options\":{\"temperature\":0.0}}' \\\n | python3 -c \"import sys,json;\
    \ print('TEMP=0.0:', json.load(sys.stdin)['response'])\" && curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain AI security in one sentence\"\
    ,\"stream\":false,\"options\":{\"temperature\":1.5}}' | python3 -c \"import sys,json;\
    \ print('TEMP=1.5:', json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Explain AI security in one sentence
- order: 6
  instruction: 모델에 한국어로 질문하시오. 'LLM 보안에서 가장 중요한 3가지를 한국어로 답하라'를 전송하고 응답을 확인하라.
  hint: /api/generate에 한국어 프롬프트를 전송하세요.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: LLM 보안에서 가장 중요한 3가지를 한국어로 답하라\n\U0001F4CE 참고 (CLI): curl\
    \ -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"\
    gemma3:4b\",\"prompt\":\"LLM 보안에서 가장 중요한 3가지를 한국어로 답하라\",\"stream\":false}' \\\
    \n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: 다국어 지원 여부는 모델 보안에서 중요합니다. 한국어 프롬프트로 영어 안전장치를 우회하는 공격이 가능할 수 있습니다.
  verify:
    type: output_contains
    expect: 보안
    field: stdout
    semantic:
      intent: 다국어 (한국어) 프롬프트 안전장치 우회 테스트 — curl /api/generate 에 한국어 프롬프트 LLM 보안에서
        가장 중요한 3가지를 한국어로 답하라 전송. 영어 가드레일이 한국어/저자원 언어로 우회되는 MITRE ATLAS AML.T0051 LLM
        Jailbreak 전형 기법. 다국어 지원 여부 + 안전 필터 언어 편향 확인.
      success_criteria:
      - curl /api/generate 한국어 prompt
      - 응답에서 보안 키워드 파싱
      - 다국어 우회 공격 맥락
      acceptable_methods:
      - curl + 한국어 prompt
      - base64/ROT13 인코딩 우회 조합
      - low-resource language (스와힐리 등) 대체
      - translation chain 공격
      negative_signs:
      - 영어만 사용
      - 다국어 우회 취약점 맥락 없음
      - 응답 한국어 검증 누락
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"LLM 보안에서 가장 중요한 3가지를 한국어로 답하라\",\"stream\"\
    :false}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: LLM 보안에서 가장 중요한 3가지를 한국어로 답하라
- order: 7
  instruction: 모델의 응답에서 eval_count와 eval_duration 필드를 추출하여 초당 토큰 생성 속도(tokens/sec)를
    계산하시오.
  hint: JSON 응답의 메타데이터 필드를 활용하세요. eval_duration은 나노초 단위입니다.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: What is AI?\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"What is AI?\",\"stream\":false}'\
    \ \\\n | python3 -c \"import sys,json; d=json.load(sys.stdin); tokens=d.get('eval_count',0);\
    \ duration=d.get('eval_duration',1); print(f'Tokens: {tokens}, Speed: {tokens/(duration/1e9):.1f}\
    \ tokens/sec')\""
  answer_detail: 토큰 생성 속도는 모델 성능의 핵심 지표입니다. 보안 관점에서 과도한 토큰 생성은 리소스 남용(DoS) 공격에 악용될
    수 있습니다.
  verify:
    type: output_contains
    expect: tokens/sec
    field: stdout
    semantic:
      intent: 토큰 생성 속도 측정 (DoS 위험 평가) — Ollama 응답의 eval_count (생성 토큰 수) + eval_duration
        (나노초) 필드 추출 후 tokens/(duration/1e9) 으로 tokens/sec 계산. 과도한 생성 속도는 리소스 고갈 DoS
        공격 표면. OWASP LLM04 Model DoS. vLLM/TGI 벤치마크 기준.
      success_criteria:
      - JSON 응답에서 eval_count + eval_duration 추출
      - duration/1e9 로 초 단위 환산
      - tokens/sec 형식 출력
      acceptable_methods:
      - python json + 산술
      - jq .eval_count .eval_duration 조합
      - grep + awk 파싱
      - ollama_exporter prometheus 메트릭
      negative_signs:
      - 나노초 단위 변환 실수
      - eval_count 필드 누락
      - DoS 공격 맥락 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
