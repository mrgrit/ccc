    \U0001F4CE 참고 (CLI): python3 -c \"\nimport json, urllib.request, re\ndef dlp_filter(response_text,\
    \ action='mask'):\n    pii_patterns = [\n        (r'01[016789]-?\\d{3,4}-?\\d{4}',\
    \ '[PHONE_REDACTED]'),\n        (r'[\\w.-]+@[\\w.-]+\\.[a-zA-Z]{2,}', '[EMAIL_REDACTED]'),\n\
