    \ urllib.request\ndef test_membership(text_prefix, expected_continuation):\n \
    \   data = json.dumps({'model':'gemma3:4b','prompt':f'Complete this text exactly:\
    \ {text_prefix}','stream':False,'options':{'num_predict':30,'temperature':0}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
