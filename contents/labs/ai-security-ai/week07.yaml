    \ re, time, hashlib\ndef pii_mask(text):\n    rules = [(r'01[016789]-?\\d{3,4}-?\\d{4}','[PHONE]'),(r'[\\w.-]+@[\\w.-]+\\\
    .[a-zA-Z]{2,}','[EMAIL]'),(r'\\d{6}-?[1-4]\\d{6}','[SSN]')]\n    for pat,rep in rules: text = re.sub(pat,rep,text)\n \
    \   return text\ndef secure_llm_query(user_input):\n    log = {'time': time.strftime('%H:%M:%S')}\n    # Step 1: Input\
    \ PII masking\n    safe_input = pii_mask(user_input)\n    log['input_masked'] = safe_input != user_input\n    # Step 2:\
    \ LLM call\n    data = json.dumps({'model':'gemma3:4b','prompt':safe_input,'stream':False,'options':{'num_predict':60}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    raw_resp = json.loads(urllib.request.urlopen(req).read())['response']\n    # Step 3: Output PII filtering\n    safe_resp\
    \ = pii_mask(raw_resp)\n    log['output_masked'] = safe_resp != raw_resp\n    # Step 4: Logging (hash only, no PII)\n\
    \    log['input_hash'] = hashlib.sha256(user_input.encode()).hexdigest()[:12]\n    log['response_preview'] = safe_resp[:60]\n\
    \    return safe_resp, log\n\ntests = [\n    '김철수(010-1234-5678)의 주문 요약',\n    'admin@company.com 계정 상태 확인',\n    '보안\
    \ 정책에 대해 알려줘'\n]\nfor t in tests:\n    resp, log = secure_llm_query(t)\n    print(f'Query: {t[:40]}')\n    print(f'Response:\
    \ {resp[:80]}')\n    print(f'Log: {json.dumps(log)}')\n    print()\n\""
