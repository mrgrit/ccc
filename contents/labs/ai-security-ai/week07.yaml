    d{4}[- ]?\\d{4}[- ]?\\d{4}', '[CARD_REDACTED]'),\n    ]\n    violations = []\n\
    \    filtered = response_text\n    for pat, replacement in pii_patterns:\n   \
    \     matches = re.findall(pat, filtered)\n        if matches:\n            violations.extend(matches)\n\
    \            if action == 'mask':\n                filtered = re.sub(pat, replacement,\
