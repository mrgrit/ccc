- order: 3
  instruction: PII 마스킹 필터를 구현하시오. 탐지된 개인정보를 마스킹 처리하여 LLM에 안전하게 전달하는 전처리기를 작성하라.
  hint: 탐지된 PII를 [PHONE], [EMAIL] 등의 토큰으로 대체하세요.
  category: defense
  points: 12
  answer: "\U0001F916 프롬프트: PII 마스킹 필터를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI):\
    \ python3 -c \"\nimport re, json, urllib.request\ndef mask_pii(text):\n    mapping\
    \ = {}\n    patterns = [\n        (r'01[016789]-?\\d{3,4}-?\\d{4}', 'PHONE'),\n\
    \        (r'[\\w.-]+@[\\w.-]+\\.[a-zA-Z]{2,}', 'EMAIL'),\n        (r'\\d{6}-?[1-4]\\\
    d{6}', 'SSN'),\n        (r'\\d{4}-?\\d{4}-?\\d{4}-?\\d{4}', 'CARD'),\n    ]\n\
    \    masked = text\n    counter = {}\n    for pat, label in patterns:\n      \
    \  for match in re.finditer(pat, masked):\n            val = match.group()\n \
    \           if val not in mapping:\n                counter[label] = counter.get(label,\
    \ 0) + 1\n                token = f'[{label}_{counter[label]}]'\n            \
    \    mapping[val] = token\n    for val, token in mapping.items():\n        masked\
    \ = masked.replace(val, token)\n    return masked, mapping\n\noriginal = '김철수(010-1234-5678,\
    \ kim@test.com, SSN: 900101-1234567)가 카드 4321-8765-1234-5678로 결제'\nmasked, mapping\
    \ = mask_pii(original)\nprint('Original:', original)\nprint('Masked:', masked)\n\
    print('\\nMapping:', mapping)\n\n# Send masked version to LLM\ndata = json.dumps({'model':'gemma3:4b','prompt':f'요약하시오:\
    \ {masked}','stream':False,'options':{'num_predict':60}}).encode()\nreq = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    resp = json.loads(urllib.request.urlopen(req).read())['response']\nprint('\\nLLM\
    \ Response (safe):', resp[:150])\n\""
  answer_detail: PII 마스킹은 개인정보를 토큰으로 대체하여 LLM에 전달합니다. 응답 후 필요시 역매핑으로 복원할 수 있지만, 로깅/캐시에는
    마스킹된 버전만 저장해야 합니다.
  verify:
    type: output_contains
    expect: PHONE
    field: stdout
    semantic:
      intent: PII 토큰 대체 마스킹 전처리기 — python3 mask_pii(text) 함수 + 4 패턴 (PHONE/EMAIL/SSN/CARD).
        re.finditer 탐지 후 counter dict 로 [PHONE_1], [EMAIL_1] 넘버링 토큰 매핑 생성. mapping
        dict 반환으로 역매핑 가능. Original + Masked 비교 + LLM 에 masked 버전 전달. 입력 안전성 보장.
      success_criteria:
      - mask_pii 함수 + mapping dict 반환
      - counter 로 [LABEL_N] 번호 매김
      - LLM 에 masked 입력 전달
      acceptable_methods:
      - python regex + counter 매핑
      - Presidio anonymize
      - spaCy NER + replace
      - PII-Codex 라이브러리
      negative_signs:
      - 번호 없이 단순 [LABEL] 고정
      - mapping 저장 안함 (복원 불가)
      - LLM 에 원본 전달 (마스킹 의미 없음)
  target_vm: manager
  script: "python3 -c \"\nimport re, json, urllib.request\ndef mask_pii(text):\n \
    \   mapping = {}\n    patterns = [\n        (r'01[016789]-?\\d{3,4}-?\\d{4}',\
    \ 'PHONE'),\n        (r'[\\w.-]+@[\\w.-]+\\.[a-zA-Z]{2,}', 'EMAIL'),\n       \
    \ (r'\\d{6}-?[1-4]\\d{6}', 'SSN'),\n        (r'\\d{4}-?\\d{4}-?\\d{4}-?\\d{4}',\
    \ 'CARD'),\n    ]\n    masked = text\n    counter = {}\n    for pat, label in\
    \ patterns:\n        for match in re.finditer(pat, masked):\n            val =\
    \ match.group()\n            if val not in mapping:\n                counter[label]\
    \ = counter.get(label, 0) + 1\n                token = f'[{label}_{counter[label]}]'\n\
    \                mapping[val] = token\n    for val, token in mapping.items():\n\
    \        masked = masked.replace(val, token)\n    return masked, mapping\n\noriginal\
    \ = '김철수(010-1234-5678, kim@test.com, SSN: 900101-1234567)가 카드 4321-8765-1234-5678로\
    \ 결제'\nmasked, mapping = mask_pii(original)\nprint('Original:', original)\nprint('Masked:',\
    \ masked)\nprint('\\nMapping:', mapping)\n\n# Send masked version to LLM\ndata\
    \ = json.dumps({'model':'gemma3:4b','prompt':f'요약하시오: {masked}','stream':False,'options':{'num_predict':60}}).encode()\n\
    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    resp = json.loads(urllib.request.urlopen(req).read())['response']\nprint('\\nLLM\
    \ Response (safe):', resp[:150])\n\""
  risk_level: low
