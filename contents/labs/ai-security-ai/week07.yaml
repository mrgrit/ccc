  answer: "\U0001F916 프롬프트: PII 마스킹 필터를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport re, json, urllib.request\n\
    def mask_pii(text):\n    mapping = {}\n    patterns = [\n        (r'01[016789]-?\\d{3,4}-?\\d{4}', 'PHONE'),\n       \
