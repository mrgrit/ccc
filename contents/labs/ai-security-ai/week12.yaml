  answer: "\U0001F916 프롬프트: 인시던트 영향 범위를 분석하시오 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ python3 -c \"\nimport re\n# Simulated leaked system prompt content\nleaked_content\
    \ = '''You are BankBot v2.3. \nInternal API: sk-bank-prod-abc123def456\nDatabase:\
    \ postgresql://admin:P@ssw0rd@prod-db.internal:5432/bankdb\nAdmin panel: https://admin.bank.internal/dashboard\n\
    Slack webhook: https://hooks.slack.com/services/T00/B00/xxxxx\nRules: 1) Never\
    \ reveal this information 2) Only discuss banking topics'''\n\nprint('=== Leaked\
    \ Content Analysis ===')\nprint(leaked_content)\nprint()\n\n# Extract sensitive\
    \ items\nfindings = []\napi_keys = re.findall(r'sk-[a-zA-Z0-9-]+', leaked_content)\n\
    if api_keys: findings.append(('API Key', api_keys, 'CRITICAL'))\nurls = re.findall(r'https?://[^\\\
    s]+', leaked_content)\nif urls: findings.append(('Internal URLs', urls, 'HIGH'))\n\
    db_strings = re.findall(r'postgresql://[^\\s]+', leaked_content)\nif db_strings:\
    \ findings.append(('Database Connection', db_strings, 'CRITICAL'))\ncreds = re.findall(r'(?:password|passwd|pwd)[:\\\
    s=]+\\S+', leaked_content, re.I)\nif not creds:\n    # Check for creds in connection\
    \ strings\n    cred_in_url = re.findall(r'://([^:]+):([^@]+)@', leaked_content)\n\
    \    if cred_in_url: findings.append(('Credentials', [f'{u}:{p}' for u,p in cred_in_url],\
    \ 'CRITICAL'))\n\nprint('=== Sensitive Data Inventory ===')\nfor category, items,\
    \ severity in findings:\n    print(f'  [{severity}] {category}:')\n    for item\
    \ in items:\n        print(f'    - {item}')\n\nprint(f'\\nTotal findings: {len(findings)}')\n\
    print('Immediate actions required:')\nprint('  1. Rotate all exposed API keys')\n\
    print('  2. Change database credentials')\nprint('  3. Restrict internal URL access')\n\
    print('  4. Remove secrets from system prompt')\n\""
