lab_id: ai-security-ai-week15
title: '[Non-AI] AI 보안 종합 실습'
version: ai
course: ai-security-ai
week: 15
description: '14주간 학습한 AI/LLM 보안 기술을 종합하여 실전 보안 평가를 수행합니다. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- LLM 보안의 전체 공격 표면을 평가한다
- 다층 방어 체계를 설계하고 구현한다
- 종합 보안 보고서를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama 서버의 전체 공격 표면을 매핑하시오. API 엔드포인트, 노출된 정보, 인증 상태를 종합 조사하라.
  hint: 모든 알려진 API 엔드포인트를 열거하고 보안 상태를 확인하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: Ollama API 서버의 주요 보안 취약점과 공격 표면(Attack Surface) 개념을 설명해줘\n\
    \U0001F4CE 참고 (CLI): python3 -c \"\nimport json, urllib.request\nprint('=== Attack\
    \ Surface Mapping ===')\nendpoints = [\n    ('GET','/api/tags','Model listing'),\n\
    \    ('GET','/api/version','Version info'),\n    ('POST','/api/generate','Text\
    \ generation'),\n    ('POST','/api/chat','Chat completion'),\n    ('POST','/api/show','Model\
    \ details'),\n    ('POST','/api/embeddings','Embeddings'),\n    ('POST','/api/pull','Model\
    \ download'),\n    ('DELETE','/api/delete','Model deletion'),\n]\nfor method,\
    \ path, desc in endpoints:\n    try:\n        req = urllib.request.Request(f'${BASTION_URL:-http://localhost:8003}{path}',method=method)\n\
    \        if method in ('POST','DELETE'):\n            req.add_header('Content-Type','application/json')\n\
    \            req.data = b'{}'\n        resp = urllib.request.urlopen(req, timeout=5)\n\
    \        print(f'  [{resp.status}] {method:6s} {path:20s} {desc:20s} EXPOSED')\n\
    \    except urllib.error.HTTPError as e:\n        print(f'  [{e.code}] {method:6s}\
    \ {path:20s} {desc:20s}')\n    except Exception as e:\n        print(f'  [ERR]\
    \ {method:6s} {path:20s} {desc:20s} {str(e)[:20]}')\nprint()\nprint('Auth: NONE\
    \ | Encryption: NONE | CORS: OPEN')\n\""
  answer_detail: 공격 표면 매핑은 보안 평가의 첫 단계입니다. 모든 접근 가능한 엔드포인트, 인증 상태, 정보 노출을 체계적으로 조사하여
    위험을 식별합니다.
