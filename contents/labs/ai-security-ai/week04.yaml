  instruction: 입력 새니타이징 필터를 구현하시오. python3로 사용자 입력에서 알려진 인젝션 패턴과 의심스러운 지시문을 탐지하고 차단하는 필터를 작성하라.
  hint: 정규식으로 'ignore', 'override', 'system prompt' 등 인젝션 키워드를 탐지하세요.
  category: defense
