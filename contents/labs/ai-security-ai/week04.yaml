  instruction: 데이터 검증 파이프라인을 구성하시오. python3 스크립트로 LLM 응답에 알려진 잘못된 정보가 포함되어 있는지 검증하는 간단한 팩트체커를 만들어라.
  hint: 알려진 사실(SSH=22, HTTP=80)과 모델 응답을 비교하는 스크립트를 작성하세요.
  category: defense
  points: 12
  answer: "python3 -c \"\nimport json, urllib.request\nknown_facts = {'SSH': '22', 'HTTP': '80', 'HTTPS': '443', 'FTP': '21', 'DNS': '53'}\ndata = json.dumps({'model':'gemma3:4b','prompt':'List the default\
    \ ports for SSH, HTTP, HTTPS, FTP, and DNS. Format: SERVICE: PORT','stream':False,'options':{'temperature':0}}).encode()\nreq = urllib.request.Request('http://10.20.30.200:11434/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    resp = json.loads(urllib.request.urlopen(req).read())['response']\nprint('Model response:', resp[:200])\nprint('\\n=== Fact Check ===')\nfor service, port in known_facts.items():\n    if port in resp:\n\
    \        print(f'  [PASS] {service}: port {port} correctly mentioned')\n    else:\n        print(f'  [WARN] {service}: port {port} NOT found in response')\n\""
  answer_detail: 자동 팩트체킹은 LLM 응답의 신뢰성을 검증하는 중요한 방어 메커니즘입니다. 알려진 사실 데이터베이스와 비교하여 데이터 중독이나 환각(hallucination)을 탐지합니다.
