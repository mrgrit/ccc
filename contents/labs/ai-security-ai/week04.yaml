  instruction: 반복 쿼리를 통한 일관성 테스트를 수행하시오. 동일한 보안 질문을 5회 반복하여 응답 일관성을 측정하라. 불일치가 있으면 데이터 오염 가능성을 나타낸다.
  hint: seed를 고정하지 않고 동일 질문을 반복하여 응답 변동성을 측정하세요.
  category: analysis
  points: 10
  answer: "python3 -c \"\nimport json, urllib.request\nquestion = 'What is the most critical OWASP Top 10 vulnerability? Answer in one word.'\nresults = []\nfor i in range(5):\n    data = json.dumps({'model':'gemma3:4b','prompt':question,'stream':False,'options':{'num_predict':20}}).encode()\n\
    \    req = urllib.request.Request('http://10.20.30.200:11434/api/generate',data=data,headers={'Content-Type':'application/json'})\n    resp = json.loads(urllib.request.urlopen(req).read())['response'].strip()[:50]\n\
    \    results.append(resp)\n    print(f'Run {i+1}: {resp}')\nunique = len(set(results))\nprint(f'\\nConsistency: {len(results)-unique+1}/{len(results)} identical responses')\nprint('VERDICT:', 'CONSISTENT'\
    \ if unique <= 2 else 'INCONSISTENT - possible data quality issue')\n\""
  answer_detail: 응답 일관성 테스트는 모델의 신뢰도를 측정합니다. 동일 질문에 매번 다른 답을 하면 모델의 지식이 불확실하거나 데이터 품질에 문제가 있을 수 있습니다.
  verify:
    type: output_contains
    expect: VERDICT
    field: stdout
  script: "python3 -c \"\nimport json, urllib.request\nquestion = 'What is the most critical OWASP Top 10 vulnerability? Answer in one word.'\nresults = []\nfor i in range(5):\n    data = json.dumps({'model':'gemma3:4b','prompt':question,'stream':False,'options':{'num_predict':20}}).encode()\n\
    \    req = urllib.request.Request('http://10.20.30.200:11434/api/generate',data=data,headers={'Content-Type':'application/json'})\n    resp = json.loads(urllib.request.urlopen(req).read())['response'].strip()[:50]\n\
    \    results.append(resp)\n    print(f'Run {i+1}: {resp}')\nunique = len(set(results))\nprint(f'\\nConsistency: {len(results)-unique+1}/{len(results)} identical responses')\nprint('VERDICT:', 'CONSISTENT'\
    \ if unique <= 2 else 'INCONSISTENT - possible data quality issue')\n\""
  risk_level: low
