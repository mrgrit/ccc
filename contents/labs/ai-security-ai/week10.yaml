lab_id: ai-security-ai-week10
title: '[Non-AI] LLM 배포 보안'
version: ai
course: ai-security-ai
week: 10
description: LLM 서비스 배포 시 보안 아키텍처와 운영 보안을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- LLM 서비스의 안전한 배포 아키텍처를 설계한다
- 운영 환경의 보안 설정을 점검한다
- 보안 모니터링 체계를 구성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama 서버의 네트워크 보안 설정을 점검하시오. 리스닝 포트, 바인드 주소, 방화벽 상태를 확인하라.
  hint: netstat/ss와 iptables/nftables를 사용하여 네트워크 설정을 확인하세요.
  category: audit
  points: 10
  answer: 'echo ''=== Port Check ==='' && curl -s -o /dev/null -w ''%{http_code}''
    ${BASTION_URL:-http://localhost:8003}/api/version && echo '' (Ollama accessible)''
    && echo ''=== Service Info ==='' && curl -s ${BASTION_URL:-http://localhost:8003}/api/version
    | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin), indent=2))"
    && echo ''=== Network Exposure ==='' && for port in 11434 8080 443 80; do timeout
    2 bash -c "echo >/dev/tcp/10.20.30.200/$port" 2>/dev/null && echo "Port $port:
    OPEN" || echo "Port $port: CLOSED"; done'
  answer_detail: 배포 보안의 첫 단계는 네트워크 노출 범위를 파악하는 것입니다. LLM 서버가 불필요한 포트를 열고 있거나 모든 인터페이스에서
    접근 가능하면 공격 표면이 넓어집니다.
