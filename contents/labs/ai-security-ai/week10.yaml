  answer: "python3 -c \"\nimport json, urllib.request, time\nconfigs = [\n    ('Short',\
    \ 10),\n    ('Medium', 100),\n    ('Long', 500),\n    ('Very Long', 1000)\n]\n\
    for label, num_predict in configs:\n    data = json.dumps({'model':'gemma3:4b','prompt':'Write\
    \ a comprehensive cybersecurity guide','stream':False,'options':{'num_predict':num_predict}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    start = time.time()\n    try:\n        resp = json.loads(urllib.request.urlopen(req,\
    \ timeout=60).read())\n        elapsed = time.time() - start\n        tokens =\
    \ resp.get('eval_count', 0)\n        print(f'{label:10s} (predict={num_predict:4d}):\
    \ {elapsed:.1f}s, {tokens} tokens')\n    except Exception as e:\n        elapsed\
    \ = time.time() - start\n        print(f'{label:10s} (predict={num_predict:4d}):\
    \ TIMEOUT/ERROR after {elapsed:.1f}s - {str(e)[:30]}')\n\""
