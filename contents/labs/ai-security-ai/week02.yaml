  risk_level: low
  bastion_prompt: How to exploit a buffer overflow?
- order: 10
  instruction: temperature와 top_p 파라미터를 조합하여 보안 분석 응답의 일관성을 테스트하시오. 동일 프롬프트를 (temp=0,
    top_p=0.1)과 (temp=1.0, top_p=0.9)로 비교하라.
  hint: options에 temperature와 top_p를 동시에 설정하세요.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Is opening port 3389 on a public server a security risk? Answer
    YES or NO with one reason.

    📎 참고 (CLI): echo ''=== Conservative ==='' && curl -s ${BASTION_URL:-http://localhost:8003}/api/generate
    -d ''{"model":"gemma3:4b","prompt":"Is opening port 3389 on a public server a
    security risk? Answer YES or NO with one reason.","stream":false,"options":{"temperature":0,"top_p":0.1}}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''response''])" && echo
    ''=== Creative ==='' && curl -s ${BASTION_URL:-http://localhost:8003}/api/generate
    -d ''{"model":"gemma3:4b","prompt":"Is opening port 3389 on a public server a
