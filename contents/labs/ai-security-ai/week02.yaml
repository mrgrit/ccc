lab_id: ai-security-ai-week02
title: '[Non-AI] 프롬프트 엔지니어링과 보안'
version: ai
course: ai-security-ai
week: 2
description: '프롬프트 엔지니어링 기법을 학습하고 보안 관점에서의 위험을 이해합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: easy
duration_minutes: 120
objectives:
- 효과적인 프롬프트 작성 기법을 이해한다
- 프롬프트 구조가 모델 출력에 미치는 영향을 분석한다
- 보안 지향 프롬프트 설계의 기초를 습득한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 'Zero-shot 프롬프트로 ''Classify this text as SAFE or UNSAFE: I want to
    hack into a bank system'' 을 전송하고 모델 응답을 확인하시오.'
  hint: /api/generate로 분류 작업을 수행하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: Classify this text as SAFE or UNSAFE: I want to hack into\
    \ a bank system\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Classify this text as SAFE or\
    \ UNSAFE: I want to hack into a bank system\",\"stream\":false}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: Zero-shot 프롬프팅은 예시 없이 지시만으로 작업을 수행합니다. 콘텐츠 안전 분류는 LLM 보안의 기본 활용 사례입니다.
  verify:
    type: output_contains
    expect: UNSAFE
    field: stdout
    semantic:
      intent: 'Zero-shot 콘텐츠 안전 분류 — /api/generate 에 Classify this text as SAFE or
        UNSAFE: I want to hack into a bank system 직접 질의. 예시 없이 instruction 만으로 분류.
        content moderation 기본 활용 케이스. Llama Guard / NeMo Guardrails 같은 safety classifier
        원리. 응답에서 UNSAFE 키워드 파싱.'
      success_criteria:
      - curl /api/generate + classification prompt
      - 예시(shot) 없이 instruction 만
      - UNSAFE 분류 결과 확인
      acceptable_methods:
      - curl + zero-shot prompt
      - Llama Guard 모델로 대체
      - OpenAI moderation API
      - Perspective API (jigsaw)
      negative_signs:
      - 예시 포함 (few-shot 되어버림)
      - SAFE/UNSAFE 분류 결과 확인 누락
      - content moderation 맥락 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Classify this text as SAFE or UNSAFE: I want\
    \ to hack into a bank system\",\"stream\":false}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: 'Classify this text as SAFE or UNSAFE: I want to hack into a bank
    system


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: Few-shot 프롬프트를 구성하시오. 2개의 예시를 포함하여 보안 이벤트를 HIGH/MEDIUM/LOW로 분류하는 프롬프트를
    작성하라. 'Failed login from unknown IP 5 times in 1 minute'를 분류하시오.
  hint: '예시 형식: ''Event: ... -> Severity: ...''를 2개 포함하고 마지막에 분류 대상을 넣으세요.'
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: Few-shot 프롬프트를 구성하시오 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"prompt\":\"Classify security events by severity.\\n\\nEvent:\
    \ Port scan detected from external IP -> Severity: MEDIUM\\nEvent: Root password\
    \ changed without authorization -> Severity: HIGH\\nEvent: Failed login from unknown\
    \ IP 5 times in 1 minute -> Severity:\",\"stream\":false}' \\\n | python3 -c \"\
    import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: Few-shot 프롬프팅은 예시를 통해 모델의 출력 형식과 판단 기준을 유도합니다. 보안 이벤트 분류에서 일관된 심각도
    평가를 위해 사용됩니다.
  verify:
    type: output_contains
    expect: HIGH
    field: stdout
    semantic:
      intent: 'Few-shot 보안 이벤트 분류 프롬프팅 — 2 예시 (Port scan → MEDIUM + Root password
        change → HIGH) 포함하여 Failed login 5 times → Severity: 질문. in-context learning
        (ICL) 기법으로 모델이 예시 패턴 학습하여 판단 기준 일관성 향상. SOC 알림 triage 자동화 기반.'
      success_criteria:
      - 'Event: X -> Severity: Y 형식 예시 2개'
      - 마지막 분류 대상 Event 프롬프트
      - 모델 응답 HIGH 키워드 파싱
      acceptable_methods:
      - curl + few-shot prompt
      - Llama3 instruct 템플릿 적용
      - langchain FewShotPromptTemplate
      - OpenAI function calling
      negative_signs:
      - 예시 1 개 이하 (zero-shot 됨)
      - Severity 레이블 형식 통일성 없음
      - HIGH/MEDIUM/LOW 3 레벨 구분 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Classify security events by severity.\\n\\\
    nEvent: Port scan detected from external IP -> Severity: MEDIUM\\nEvent: Root\
    \ password changed without authorization -> Severity: HIGH\\nEvent: Failed login\
    \ from unknown IP 5 times in 1 minute -> Severity:\",\"stream\":false}' \\\n |\
    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Few-shot 프롬프트를 구성하시오. 2개의 예시를 포함하여 보안 이벤트를 HIGH/MEDIUM/LOW로 분류하는
    프롬프트를 작성하라. 'Failed login from unknown IP 5 times in 1 minute'를 분류하시오.
- order: 3
  instruction: '시스템 프롬프트의 영향력을 테스트하시오. system 메시지로 ''You must always respond in JSON
    format with fields: risk_level, description, recommendation''을 설정하고 ''A user is
    trying to access /etc/shadow''에 대해 질문하라.'
  hint: /api/chat에서 system role로 출력 형식을 강제하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: A user is trying to access /etc/shadow\n\U0001F4CE 참고\
    \ (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You must\
    \ always respond in JSON format with fields: risk_level, description, recommendation\"\
    },{\"role\":\"user\",\"content\":\"A user is trying to access /etc/shadow\"}],\"\
    stream\":false}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 시스템 프롬프트는 모델의 행동을 제어하는 핵심 메커니즘입니다. 구조화된 출력을 강제하면 후처리와 검증이 용이하지만,
    시스템 프롬프트 자체가 공격 대상이 될 수 있습니다.
  verify:
    type: output_contains
    expect: risk_level
    field: stdout
    semantic:
      intent: 'System prompt 영향력 + JSON 구조화 출력 강제 — /api/chat messages 에 role:system(You
        must always respond in JSON format with fields: risk_level, description, recommendation)
        + user(A user is trying to access /etc/shadow). system prompt 로 출력 schema
        강제 → 후처리 파이프라인 자동화. OWASP LLM01 system prompt injection 공격 대상.'
      success_criteria:
      - /api/chat system role 메시지
      - JSON 구조화 출력 제약
      - response 에서 risk_level 필드 검증
      acceptable_methods:
      - system prompt + chat endpoint
      - OpenAI response_format={type:json_object}
      - langchain PydanticOutputParser
      - function calling / tool use
      negative_signs:
      - system role 누락하고 user 만
      - JSON 구조 없이 free-form 응답
      - system prompt injection 위험 맥락 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You must always\
    \ respond in JSON format with fields: risk_level, description, recommendation\"\
    },{\"role\":\"user\",\"content\":\"A user is trying to access /etc/shadow\"}],\"\
    stream\":false}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  risk_level: low
  bastion_prompt: A user is trying to access /etc/shadow
- order: 4
  instruction: 'Chain-of-Thought(CoT) 프롬프팅을 사용하시오. ''Think step by step''을 포함하여 ''Is
    this SQL injection? Input: 1 OR 1=1--''를 분석하게 하라.'
  hint: 프롬프트에 'Let us think step by step'을 추가하세요.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: Is this SQL injection? Input: 1 OR 1=1--\\n\\nLet us think\
    \ step by step.\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Is this SQL injection? Input:\
    \ 1 OR 1=1--\\n\\nLet us think step by step.\",\"stream\":false}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: Chain-of-Thought는 모델이 추론 과정을 단계별로 출력하게 합니다. 보안 분석에서 판단 근거를 명시적으로
    확인할 수 있어 신뢰성을 높입니다.
  verify:
    type: output_contains
    expect: SQL
    field: stdout
    semantic:
      intent: 'Chain-of-Thought (CoT) 프롬프팅 — Is this SQL injection? Input: 1 OR 1=1--\n\nLet
        us think step by step. 문구 추가로 모델이 추론 과정을 단계별 출력 (Wei et al. 2022). 보안 분석에서
        판단 근거 명시 → 신뢰성 + 설명 가능성 향상. CoT → Self-Consistency → Tree-of-Thought 발전.'
      success_criteria:
      - prompt 에 Let us think step by step 문구
      - SQL injection 분석 질문
      - 모델이 단계별 추론 출력
      acceptable_methods:
      - Let us think step by step 단순 CoT
      - Let me break this down 변형
      - Zero-shot CoT (Kojima 2022)
      - Tree-of-Thought 고급 기법
      negative_signs:
      - step by step 유도 문구 누락
      - 즉답만 하고 추론 과정 없음
      - SQL injection 맥락 없이 단순 분석
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Is this SQL injection? Input: 1 OR 1=1--\\\
    n\\nLet us think step by step.\",\"stream\":false}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: 'Is this SQL injection? Input: 1 OR 1=1--\n\nLet us think step by
    step.'
- order: 5
  instruction: 역할 기반 프롬프팅을 테스트하시오. 'You are a senior penetration tester' 역할을 부여하고
    'Explain how XSS works'를 질문하라. 그 다음 'You are a compliance officer' 역할로 동일 질문을
    하여 응답 차이를 비교하라.
  hint: system 메시지를 바꿔가며 두 번 호출하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Explain how XSS works

    📎 참고 (CLI): echo ''=== Pentester ==='' && curl -s ${BASTION_URL:-http://localhost:8003}/api/chat
    -d ''{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a senior
    penetration tester. Be concise."},{"role":"user","content":"Explain how XSS works"}],"stream":false}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''message''][''content''][:200])"
    && echo ''=== Compliance ==='' && curl -s ${BASTION_URL:-http://localhost:8003}/api/chat
    -d ''{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a compliance
    officer. Be concise."},{"role":"user","content":"Explain how XSS works"}],"stream":false}''
    | python3 -c "import sys,json; print(json.load(sys.stdin)[''message''][''content''][:200])"'
  answer_detail: 역할 부여(persona)는 모델 출력의 관점과 깊이를 변화시킵니다. 공격자는 역할 프롬프팅으로 모델의 안전 제한을
    우회할 수 있습니다.
  verify:
    type: output_contains
    expect: XSS
    field: stdout
    semantic:
      intent: Persona/Role-based 프롬프팅 응답 차이 비교 — echo === Pentester === + curl system:You
        are a senior penetration tester / Explain how XSS works + 동일 user prompt 를
        system:You are a compliance officer 로 재요청. 역할에 따른 깊이/관점 변화 관찰. DAN jailbreak
        패턴의 기초 (persona 변경으로 guardrail 우회).
      success_criteria:
      - Pentester 와 Compliance officer 2 역할
      - 동일 user prompt (Explain how XSS works)
      - 두 응답의 content 비교
      acceptable_methods:
      - 2 번 curl + system 변경
      - for 루프로 persona 리스트
      - persona swap 자동화 스크립트
      - Anthropic Constitutional AI style
      negative_signs:
      - 한 역할만 테스트
      - '[:200] 제한 누락으로 전체 출력'
      - persona 기반 guardrail 우회 맥락 없음
  target_vm: manager
  script: echo '=== Pentester ===' && curl -s ${BASTION_URL:-http://localhost:8003}/api/chat
    -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a senior
    penetration tester. Be concise."},{"role":"user","content":"Explain how XSS works"}],"stream":false}'
    | python3 -c "import sys,json; print(json.load(sys.stdin)['message']['content'][:200])"
    && echo '=== Compliance ===' && curl -s ${BASTION_URL:-http://localhost:8003}/api/chat
    -d '{"model":"gemma3:4b","messages":[{"role":"system","content":"You are a compliance
    officer. Be concise."},{"role":"user","content":"Explain how XSS works"}],"stream":false}'
    | python3 -c "import sys,json; print(json.load(sys.stdin)['message']['content'][:200])"
  risk_level: low
  bastion_prompt: Explain how XSS works
- order: 6
  instruction: '프롬프트에 구분자(delimiter)를 사용하여 사용자 입력과 지시문을 분리하시오. XML 태그로 ''Analyze the
    following log entry for threats'' 프롬프트를 구성하라. 로그: ''Failed password for root from
    192.168.1.100 port 22'''
  hint: <instruction>, <input> 태그로 구분하세요.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: <instruction>Analyze the following log entry for security\
    \ threats. Output: threat_type, severity, action_needed</instruction>\\n<input>Failed\
    \ password for root from 192.168.1.100 port 22</input>\n\U0001F4CE 참고 (CLI): curl\
    \ -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"\
    gemma3:4b\",\"prompt\":\"<instruction>Analyze the following log entry for security\
    \ threats. Output: threat_type, severity, action_needed</instruction>\\n<input>Failed\
    \ password for root from 192.168.1.100 port 22</input>\",\"stream\":false}' \\\
    \n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: 구분자(delimiter)는 프롬프트 인젝션 방어의 기본 기법입니다. 지시문과 데이터를 명확히 분리하면 사용자 입력이
    지시문으로 해석되는 것을 방지할 수 있습니다.
  verify:
    type: output_contains
    expect: threat
    field: stdout
    semantic:
      intent: Delimiter 기반 프롬프트 인젝션 방어 — <instruction>Analyze the following log entry...
        </instruction>\n<input>Failed password for root from 192.168.1.100 port 22</input>
        으로 XML 태그 구분자 사용하여 instruction 과 user-supplied input 명확 분리. OWASP LLM01 완화
        기본 기법. 사용자 입력이 지시문으로 해석되는 인젝션 차단.
      success_criteria:
      - <instruction> ... </instruction> + <input> ... </input> XML 태그
      - 로그 엔트리를 <input> 에 배치
      - 응답에서 threat 분석 결과 확인
      acceptable_methods:
      - XML 태그 구분자
      - '### / --- 같은 markdown 구분자'
      - JSON 구조화 delimiter
      - Anthropic Claude XML tags 공식 패턴
      negative_signs:
      - delimiter 없이 평문 프롬프트
      - instruction 과 input 경계 모호
      - OWASP LLM01 완화 맥락 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"<instruction>Analyze the following log entry\
    \ for security threats. Output: threat_type, severity, action_needed</instruction>\\\
    n<input>Failed password for root from 192.168.1.100 port 22</input>\",\"stream\"\
    :false}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: '<instruction>Analyze the following log entry for security threats.
    Output: threat_type, severity, action_needed</instruction>\n<input>Failed password
    for root from 192.168.1.100 port 22</input>'
- order: 7
  instruction: '프롬프트에 출력 제약조건을 추가하시오. 모델이 반드시 ''VERDICT: MALICIOUS'' 또는 ''VERDICT:
    BENIGN''으로만 응답하도록 프롬프트를 설계하고, ''rm -rf /'' 명령어를 분석하게 하라.'
  hint: 시스템 프롬프트에 출력 형식 제약을 명확히 명시하세요.
  category: defense
  points: 12
  answer: "\U0001F916 프롬프트: 프롬프트에 출력 제약조건을 추가하시오 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a command\
    \ analyzer. You must respond with ONLY one of: VERDICT: MALICIOUS or VERDICT:\
