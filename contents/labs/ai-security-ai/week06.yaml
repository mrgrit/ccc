  bastion_prompt: API 열거(enumeration)를 수행하시오. Ollama API의 모든 사용 가능한 엔드포인트를 탐지해줘
- order: 3
  instruction: API 남용 시나리오를 테스트하시오. 짧은 시간에 대량 요청을 보내 rate limiting이 있는지 확인하라.
  hint: 연속으로 빠르게 API 요청을 보내고 거부 여부를 확인하세요.
  category: attack
  points: 12
  answer: "python3 -c \"\nimport json, urllib.request, time\nresults = []\nfor i in\
    \ range(10):\n    start = time.time()\n    data = json.dumps({'model':'gemma3:4b','prompt':'Hi','stream':False,'options':{'num_predict':5}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    try:\n        resp = urllib.request.urlopen(req, timeout=10)\n        elapsed\
    \ = time.time() - start\n        results.append(('OK', elapsed))\n        print(f'Request\
    \ {i+1:2d}: {resp.status} ({elapsed:.2f}s)')\n    except Exception as e:\n   \
    \     elapsed = time.time() - start\n        results.append(('FAIL', elapsed))\n\
    \        print(f'Request {i+1:2d}: BLOCKED ({elapsed:.2f}s) - {str(e)[:40]}')\n\
    ok = sum(1 for r,_ in results if r=='OK')\nprint(f'\\nResult: {ok}/{len(results)}\
    \ succeeded')\nprint('Rate limiting:', 'NOT DETECTED' if ok == len(results) else\
    \ 'DETECTED')\n\""
  answer_detail: Rate limiting이 없으면 공격자가 API를 무제한으로 호출하여 리소스를 고갈시키거나 대량의 데이터를 추출할
    수 있습니다. 요청 제한은 API 보안의 기본입니다.
  verify:
    type: output_contains
    expect: Rate limiting
    field: stdout
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request, time\nresults = []\nfor i in\
    \ range(10):\n    start = time.time()\n    data = json.dumps({'model':'gemma3:4b','prompt':'Hi','stream':False,'options':{'num_predict':5}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    try:\n        resp = urllib.request.urlopen(req, timeout=10)\n        elapsed\
