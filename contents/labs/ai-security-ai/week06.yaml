- order: 5
  instruction: 대용량 출력 유도를 통한 리소스 남용을 테스트하시오. num_predict 제한 없이 긴 출력을 생성하게 하여 서버 리소스
    소모를 측정하라.
  hint: 큰 num_predict 값을 설정하고 생성 시간과 토큰 수를 측정하세요.
  category: attack
  points: 10
  answer: "\U0001F916 프롬프트: 대용량 출력 유도를 통한 리소스 남용을 테스트해줘 num_predict 제한 없이 긴 출력을 생성하게\
    \ 하여 서버 리소스 소모를 측정해줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport json, urllib.request,\
    \ time\nfor num in [10, 50, 200, 500]:\n    data = json.dumps({'model':'gemma3:4b','prompt':'Write\
    \ a very detailed essay about cybersecurity history.','stream':False,'options':{'num_predict':num}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    start = time.time()\n    resp = json.loads(urllib.request.urlopen(req).read())\n\
    \    elapsed = time.time() - start\n    tokens = resp.get('eval_count', 0)\n \
