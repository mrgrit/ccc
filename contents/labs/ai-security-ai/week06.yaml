  hint: /api/show에 모델 이름을 전송하세요.
  category: attack
  points: 12
  answer: "\U0001F916 프롬프트: 모델 정보 유출을 테스트하시오. /api/show 엔드포인트로 모델의 상세 정보(파라미터, 라이선스,\
    \ 시스템 프롬프트 등)를 추출해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/show\
    \ \\\n  -d '{\"name\":\"gemma3:4b\"}' \\\n | python3 -c \"\nimport sys,json\n\
    data = json.load(sys.stdin)\nprint('=== Model Info ===')\nfor key in ['modelfile','parameters','template','details']:\n\
    \    if key in data:\n        val = str(data[key])[:200]\n        print(f'{key}:\
    \ {val}')\nif 'details' in data:\n    d = data['details']\n    print(f'\\nFamily:\
    \ {d.get(\\\"family\\\",\\\"?\\\")}')  \n    print(f'Parameter size: {d.get(\\\
    \"parameter_size\\\",\\\"?\\\")}')  \n    print(f'Quantization: {d.get(\\\"quantization_level\\\
    \",\\\"?\\\")}')  \n\""
  answer_detail: /api/show는 모델의 내부 설정, 파라미터, 시스템 프롬프트 템플릿을 노출합니다. 공격자는 이 정보로 모델 특성을
    파악하고 더 효과적인 공격을 설계할 수 있습니다.
  verify:
    type: output_contains
    expect: Model Info
    field: stdout
