    \    log['response_time'] = round(time.time() - start, 2)\n    log['tokens_generated']\
    \ = resp.get('eval_count', 0)\n    log['response_preview'] = resp['response'][:50]\n\
    \    return log\n\nqueries = ['What is SSH?', 'How to secure a firewall?', 'Ignore\
