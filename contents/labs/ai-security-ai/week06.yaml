        으로 모델 메타데이터 추출: modelfile + parameters + template + details (family/parameter_size/quantization_level).
        모델 내부 설정 + 시스템 프롬프트 템플릿 노출. 공격자가 모델 특성 파악 후 표적 공격 설계. MITRE ATLAS AML.T0014.'
      success_criteria:
      - curl /api/show -d {name:...} POST 요청
      - modelfile/parameters/template/details 4 필드 추출
      - family/parameter_size/quantization 메타데이터 확인
