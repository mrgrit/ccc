  instruction: 종합 API 보안 감사 보고서를 생성하시오. 지금까지 발견한 취약점을 자동으로 정리하는 스크립트를 작성하라.
  hint: 각 보안 항목을 체크리스트로 점검하고 결과를 보고서 형태로 출력하세요.
  category: audit
  points: 12
  answer: "python3 -c \"\nimport json, urllib.request\ndef check(name, url, method='GET',\
    \ data=None):\n    try:\n        req = urllib.request.Request(url, method=method)\n\
    \        if data:\n            req.add_header('Content-Type','application/json')\n\
    \            req.data = json.dumps(data).encode()\n        resp = urllib.request.urlopen(req,\
    \ timeout=5)\n        return resp.status\n    except Exception as e:\n       \
    \ return str(e)[:30]\n\nprint('=' * 50)\nprint('  Ollama API Security Audit Report')\n\
    print('=' * 50)\n\n# Check 1: Unauthenticated access\ns = check('Auth', '${BASTION_URL:-http://localhost:8003}/api/tags')\n\
    print(f'\\n[1] Authentication: {\\\"FAIL - No auth required\\\" if s==200 else\
    \ \\\"PASS\\\"}')\n\n# Check 2: Model info exposure\ns = check('Show', '${BASTION_URL:-http://localhost:8003}/api/show',\
    \ 'POST', {'name':'gemma3:4b'})\nprint(f'[2] Model Info Exposure: {\\\"FAIL -\
    \ Model details exposed\\\" if s==200 else \\\"PASS\\\"}')\n\n# Check 3: Management\
    \ endpoints\ns = check('Delete', '${BASTION_URL:-http://localhost:8003}/api/delete',\
    \ 'DELETE', {'name':'nonexistent'})\nprint(f'[3] Management API: {\\\"FAIL - Delete\
    \ endpoint accessible\\\" if s!=403 else \\\"PASS\\\"}')\n\n# Check 4: CORS\n\
    try:\n    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/tags')\n\
    \    req.add_header('Origin','http://evil.com')\n    resp = urllib.request.urlopen(req,\
    \ timeout=5)\n    cors = resp.headers.get('Access-Control-Allow-Origin','')\n\
    \    print(f'[4] CORS Policy: {\\\"FAIL - Permissive CORS\\\" if cors==\\\"*\\\
    \" else \\\"INFO - \\\" + (cors or \\\"No CORS header\\\")}')\nexcept: print('[4]\
    \ CORS Policy: CHECK MANUALLY')\n\nprint(f'[5] Rate Limiting: FAIL - Not detected')\n\
    print(f'[6] TLS/HTTPS: FAIL - Using HTTP')\n\nprint('\\n' + '=' * 50)\nprint('\
    \  Recommendations:')\nprint('  - Add authentication layer (API keys or OAuth)')\n\
    print('  - Implement rate limiting')\nprint('  - Enable HTTPS/TLS')\nprint(' \
    \ - Restrict management endpoints')\nprint('  - Add request/response logging')\n\
    print('=' * 50)\n\""
