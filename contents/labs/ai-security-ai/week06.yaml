    \ threading, time\nresults = []\ndef query(idx):\n    start = time.time()\n  \
    \  try:\n        data = json.dumps({'model':'gemma3:4b','prompt':f'Count to {idx+1}','stream':False,'options':{'num_predict':10}}).encode()\n\
    \        req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \        resp = urllib.request.urlopen(req, timeout=30)\n        elapsed = time.time()\
    \ - start\n        results.append((idx, 'OK', elapsed))\n    except Exception\
    \ as e:\n        elapsed = time.time() - start\n        results.append((idx, 'FAIL',\
    \ elapsed))\n\nthreads = []\nfor i in range(5):\n    t = threading.Thread(target=query,\
    \ args=(i,))\n    threads.append(t)\nstart = time.time()\nfor t in threads: t.start()\n\
    for t in threads: t.join(timeout=60)\ntotal = time.time() - start\nresults.sort(key=lambda\
    \ x: x[0])\nfor idx, status, elapsed in results:\n    print(f'Request {idx+1}:\
    \ {status} ({elapsed:.2f}s)')\nprint(f'\\nTotal time for {len(results)} concurrent\
    \ requests: {total:.2f}s')\nok = sum(1 for _,s,_ in results if s=='OK')\nprint(f'Success:\
    \ {ok}/{len(results)}')\n\""
