lab_id: ai-security-ai-week06
title: '[Non-AI] LLM API 보안'
version: ai
course: ai-security-ai
week: 6
description: 'LLM API의 보안 취약점을 분석하고 안전한 API 구성 방법을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: medium
duration_minutes: 120
objectives:
- Ollama API의 보안 설정을 점검한다
- API 남용 시나리오를 분석하고 방어한다
- Rate limiting과 인증 메커니즘을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API의 네트워크 노출 상태를 점검하시오. API가 어떤 인터페이스에서 리스닝하고 있는지, 인증 없이 접근
    가능한지 확인하라.
  hint: curl로 API 접근 가능 여부를 확인하고 응답 헤더를 분석하세요.
  category: recon
  points: 10
  answer: '🤖 프롬프트: Ollama API의 네트워크 노출 상태를 점검하시오. API가 어떤 인터페이스에서 리스닝하고 있는지, 인증 없이
    접근 가능한지 확인해줘

    📎 참고 (CLI): echo ''=== API Access Test ==='' && curl -s -o /dev/null -w ''HTTP
    Status: %{http_code}\nResponse Time: %{time_total}s\n'' ${BASTION_URL:-http://localhost:8003}/api/tags
    && echo ''=== Headers ==='' && curl -sI ${BASTION_URL:-http://localhost:8003}/api/tags
    2>&1 | head -10 && echo ''=== CORS Test ==='' && curl -sI -H ''Origin: http://evil.com''
    ${BASTION_URL:-http://localhost:8003}/api/tags 2>&1 | grep -i ''access-control'''
  answer_detail: API 보안의 첫 단계는 노출 범위 파악입니다. 인증 없이 접근 가능한 API는 누구나 모델을 사용할 수 있어 리소스
    남용, 데이터 유출 위험이 있습니다.
  verify:
    type: output_contains
    expect: HTTP Status
    field: stdout
    semantic:
      intent: 'Ollama API 네트워크 노출 진단 — 3 테스트: (1) curl -w HTTP Status/Response Time
        접근성 (2) curl -sI | head -10 응답 헤더 (3) Origin: http://evil.com 헤더로 CORS 정책
        확인 (Access-Control-Allow-Origin). 인증 없이 200 응답 + CORS 미설정 시 익명 접근 취약. OWASP
        API Security API1:2023 Broken Authentication.'
      success_criteria:
      - API Access Test + Headers + CORS Test 3 섹션
      - HTTP Status 200 확인 = 익명 접근 가능
      - 'Origin: http://evil.com 로 CORS 테스트'
      acceptable_methods:
      - curl 3 섹션 조합
      - nmap --script http-cors
      - OWASP ZAP CORS scanner
      - Burp Suite extension
      negative_signs:
      - 3 섹션 중 일부 누락
      - CORS 헤더 해석 누락
      - OWASP API1 맥락 없음
  target_vm: manager
  script: 'echo ''=== API Access Test ==='' && curl -s -o /dev/null -w ''HTTP Status:
    %{http_code}\nResponse Time: %{time_total}s\n'' ${BASTION_URL:-http://localhost:8003}/api/tags
    && echo ''=== Headers ==='' && curl -sI ${BASTION_URL:-http://localhost:8003}/api/tags
    2>&1 | head -10 && echo ''=== CORS Test ==='' && curl -sI -H ''Origin: http://evil.com''
    ${BASTION_URL:-http://localhost:8003}/api/tags 2>&1 | grep -i ''access-control'''
  risk_level: low
  bastion_prompt: 'Ollama API의 네트워크 노출 상태를 점검하시오. API가 어떤 인터페이스에서 리스닝하고 있는지, 인증 없이
    접근 가능한지 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: API 열거(enumeration)를 수행하시오. Ollama API의 모든 사용 가능한 엔드포인트를 탐지하라.
  hint: 알려진 Ollama API 엔드포인트들을 순회하며 확인하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: API 열거(enumeration)를 수행하시오. Ollama API의 모든 사용 가능한 엔드포인트를\
    \ 탐지해줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport urllib.request\nendpoints =\
    \ [\n    ('GET', '/api/tags'),\n    ('GET', '/api/version'),\n    ('POST', '/api/generate'),\n\
    \    ('POST', '/api/chat'),\n    ('POST', '/api/embeddings'),\n    ('POST', '/api/show'),\n\
    \    ('POST', '/api/copy'),\n    ('DELETE', '/api/delete'),\n    ('POST', '/api/pull'),\n\
    \    ('POST', '/api/push'),\n]\nfor method, path in endpoints:\n    try:\n   \
    \     req = urllib.request.Request(f'${BASTION_URL:-http://localhost:8003}{path}',\
    \ method=method)\n        if method == 'POST':\n            req.add_header('Content-Type',\
    \ 'application/json')\n            req.data = b'{}'  \n        resp = urllib.request.urlopen(req,\
    \ timeout=3)\n        print(f'[{resp.status}] {method:6s} {path}')\n    except\
    \ urllib.error.HTTPError as e:\n        print(f'[{e.code}] {method:6s} {path}')\n\
    \    except Exception as e:\n        print(f'[ERR] {method:6s} {path} - {str(e)[:30]}')\n\
    \""
  answer_detail: API 열거는 사용 가능한 엔드포인트를 파악하여 공격 표면을 분석합니다. /api/delete, /api/pull 등
    관리 엔드포인트가 인증 없이 노출되면 모델 삭제나 악성 모델 다운로드가 가능합니다.
  verify:
    type: output_contains
    expect: /api/
    field: stdout
    semantic:
      intent: 'Ollama API Enumeration — python3 endpoints 리스트 10개: GET /api/tags,
        /api/version + POST /api/generate, /api/chat, /api/embeddings, /api/show,
        /api/copy, /api/pull, /api/push + DELETE /api/delete. 각 endpoint 상태 코드 [200]/[403]/[404]/[ERR]
        출력. 관리 endpoint (delete/copy/pull/push) 노출 시 모델 삭제/악성 다운로드 위험. API 공격 표면 매핑.'
      success_criteria:
      - endpoints 리스트 10 개 이상 (GET/POST/DELETE 조합)
      - 각 endpoint 상태 코드 표시
      - 관리 endpoint (/api/delete /api/pull) 포함
      acceptable_methods:
      - python urllib HTTP method 지정
      - ffuf -u <base>/FUZZ -w api-wordlist
      - Burp Suite Intruder 자동화
      - Swagger/OpenAPI 스펙 기반 fuzzing
      negative_signs:
      - 5 endpoint 미만
      - 관리 endpoint 누락
      - 상태 코드 해석 없음
  target_vm: manager
  script: "python3 -c \"\nimport urllib.request\nendpoints = [\n    ('GET', '/api/tags'),\n\
    \    ('GET', '/api/version'),\n    ('POST', '/api/generate'),\n    ('POST', '/api/chat'),\n\
    \    ('POST', '/api/embeddings'),\n    ('POST', '/api/show'),\n    ('POST', '/api/copy'),\n\
    \    ('DELETE', '/api/delete'),\n    ('POST', '/api/pull'),\n    ('POST', '/api/push'),\n\
    ]\nfor method, path in endpoints:\n    try:\n        req = urllib.request.Request(f'${BASTION_URL:-http://localhost:8003}{path}',\
    \ method=method)\n        if method == 'POST':\n            req.add_header('Content-Type',\
    \ 'application/json')\n            req.data = b'{}'  \n        resp = urllib.request.urlopen(req,\
    \ timeout=3)\n        print(f'[{resp.status}] {method:6s} {path}')\n    except\
    \ urllib.error.HTTPError as e:\n        print(f'[{e.code}] {method:6s} {path}')\n\
    \    except Exception as e:\n        print(f'[ERR] {method:6s} {path} - {str(e)[:30]}')\n\
    \""
  risk_level: low
  bastion_prompt: 'API 열거(enumeration)를 수행하시오. Ollama API의 모든 사용 가능한 엔드포인트를 탐지해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: API 남용 시나리오를 테스트하시오. 짧은 시간에 대량 요청을 보내 rate limiting이 있는지 확인하라.
  hint: 연속으로 빠르게 API 요청을 보내고 거부 여부를 확인하세요.
  category: attack
  points: 12
  answer: "\U0001F916 프롬프트: API 남용 시나리오를 테스트해줘 짧은 시간에 대량 요청을 보내 rate limiting이 있는지\
    \ 확인해줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport json, urllib.request, time\n\
    results = []\nfor i in range(10):\n    start = time.time()\n    data = json.dumps({'model':'gemma3:4b','prompt':'Hi','stream':False,'options':{'num_predict':5}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    try:\n        resp = urllib.request.urlopen(req, timeout=10)\n        elapsed\
    \ = time.time() - start\n        results.append(('OK', elapsed))\n        print(f'Request\
    \ {i+1:2d}: {resp.status} ({elapsed:.2f}s)')\n    except Exception as e:\n   \
    \     elapsed = time.time() - start\n        results.append(('FAIL', elapsed))\n\
    \        print(f'Request {i+1:2d}: BLOCKED ({elapsed:.2f}s) - {str(e)[:40]}')\n\
    ok = sum(1 for r,_ in results if r=='OK')\nprint(f'\\nResult: {ok}/{len(results)}\
    \ succeeded')\nprint('Rate limiting:', 'NOT DETECTED' if ok == len(results) else\
    \ 'DETECTED')\n\""
  answer_detail: Rate limiting이 없으면 공격자가 API를 무제한으로 호출하여 리소스를 고갈시키거나 대량의 데이터를 추출할
    수 있습니다. 요청 제한은 API 보안의 기본입니다.
  verify:
    type: output_contains
    expect: Rate limiting
    field: stdout
    semantic:
      intent: 'Rate Limiting 부재 테스트 — python3 for i in range(10) 연속 10회 /api/generate
        호출 + time.time() elapsed 측정 + 성공 시 OK, 실패 시 BLOCKED. results 집계 후 ok == 10
        이면 Rate limiting: NOT DETECTED. 429 Too Many Requests 미발생 = 취약. OWASP API4:2023
        Unrestricted Resource Consumption.'
      success_criteria:
      - for range(10) 10회 연속 호출
      - OK/BLOCKED 분류 per 요청
      - '최종 Rate limiting: DETECTED/NOT DETECTED 판정'
      acceptable_methods:
      - python urllib 루프
      - ab -n 100 -c 10 Apache Bench
      - wrk -t12 -c400 로드 테스트
      - hey -n 100 -c 10
      negative_signs:
      - 10 회 미만 요청
      - Rate limiting 판정 누락
      - OWASP API4 맥락 없음
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request, time\nresults = []\nfor i in\
    \ range(10):\n    start = time.time()\n    data = json.dumps({'model':'gemma3:4b','prompt':'Hi','stream':False,'options':{'num_predict':5}}).encode()\n\
    \    req = urllib.request.Request('${OLLAMA_URL:-http://192.168.0.105:11434}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    try:\n        resp = urllib.request.urlopen(req, timeout=10)\n        elapsed\
    \ = time.time() - start\n        results.append(('OK', elapsed))\n        print(f'Request\
    \ {i+1:2d}: {resp.status} ({elapsed:.2f}s)')\n    except Exception as e:\n   \
    \     elapsed = time.time() - start\n        results.append(('FAIL', elapsed))\n\
    \        print(f'Request {i+1:2d}: BLOCKED ({elapsed:.2f}s) - {str(e)[:40]}')\n\
    ok = sum(1 for r,_ in results if r=='OK')\nprint(f'\\nResult: {ok}/{len(results)}\
    \ succeeded')\nprint('Rate limiting:', 'NOT DETECTED' if ok == len(results) else\
    \ 'DETECTED')\n\""
  risk_level: medium
  bastion_prompt: "다음 쉘 명령을 실행하고 결과에서 system prompt 유출 여부를 분석해줘:\n\n```bash\npython3\
    \ -c \"\nimport json, urllib.request, time\nresults = []\nfor i in range(10):\n\
    \    start = time.time()\n    data = json.dumps({'model':'gemma3:4b','prompt':'Hi','stream':False,'options':{'num_predict':5}}).encode()\n\
    \    req = urllib.request.Request('${OLLAMA_URL:-http://192.168.0.105:11434}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    try:\n        resp = urllib.request.urlopen(req, timeout=10)\n        elapsed\
    \ = time.time() - start\n        results.append(('OK', elapsed))\n        print(f'Request\
    \ {i+1:2d}: {resp.status} ({elapsed:.2f}s)')\n    except Exception as e:\n   \
    \     elapsed = time.time() - start\n        results.append(('FAIL', elapsed))\n\
    \        print(f'Request {i+1:2d}: BLOCKED ({elapsed:.2f}s) - {str(e)[:40]}')\n\
    ok = sum(1 for r,_ in results if r=='OK')\nprint(f'\\nResult: {ok}/{len(results)}\
    \ succeeded')\nprint('Rate limiting:', 'NOT DETECTED' if ok == len(results) else\
    \ 'DETECTED')\n\"\n```\n\n[중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만\
    \ 출력 금지."
