  category: attack
  points: 10
  answer: "python3 -c \"\nimport json, urllib.request, time\nfor num in [10, 50, 200,\
    \ 500]:\n    data = json.dumps({'model':'gemma3:4b','prompt':'Write a very detailed\
    \ essay about cybersecurity history.','stream':False,'options':{'num_predict':num}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
