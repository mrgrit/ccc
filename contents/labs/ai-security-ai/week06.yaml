lab_id: ai-security-ai-week06
title: '[Non-AI] LLM API 보안'
version: ai
course: ai-security-ai
week: 6
description: LLM API의 보안 취약점을 분석하고 안전한 API 구성 방법을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Ollama API의 보안 설정을 점검한다
- API 남용 시나리오를 분석하고 방어한다
- Rate limiting과 인증 메커니즘을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API의 네트워크 노출 상태를 점검하시오. API가 어떤 인터페이스에서 리스닝하고 있는지, 인증 없이 접근
    가능한지 확인하라.
  hint: curl로 API 접근 가능 여부를 확인하고 응답 헤더를 분석하세요.
  category: recon
  points: 10
  answer: 'echo ''=== API Access Test ==='' && curl -s -o /dev/null -w ''HTTP Status:
    %{http_code}\nResponse Time: %{time_total}s\n'' ${BASTION_URL:-http://localhost:8003}/api/tags
    && echo ''=== Headers ==='' && curl -sI ${BASTION_URL:-http://localhost:8003}/api/tags
    2>&1 | head -10 && echo ''=== CORS Test ==='' && curl -sI -H ''Origin: http://evil.com''
    ${BASTION_URL:-http://localhost:8003}/api/tags 2>&1 | grep -i ''access-control'''
  answer_detail: API 보안의 첫 단계는 노출 범위 파악입니다. 인증 없이 접근 가능한 API는 누구나 모델을 사용할 수 있어 리소스
    남용, 데이터 유출 위험이 있습니다.
  verify:
    type: output_contains
    expect: HTTP Status
    field: stdout
  target_vm: manager
  script: 'echo ''=== API Access Test ==='' && curl -s -o /dev/null -w ''HTTP Status:
    %{http_code}\nResponse Time: %{time_total}s\n'' ${BASTION_URL:-http://localhost:8003}/api/tags
    && echo ''=== Headers ==='' && curl -sI ${BASTION_URL:-http://localhost:8003}/api/tags
    2>&1 | head -10 && echo ''=== CORS Test ==='' && curl -sI -H ''Origin: http://evil.com''
    ${BASTION_URL:-http://localhost:8003}/api/tags 2>&1 | grep -i ''access-control'''
  risk_level: low
  bastion_prompt: Ollama API의 네트워크 노출 상태를 점검하시오. API가 어떤 인터페이스에서 리스닝하고 있는지, 인증 없이
    접근 가능한지 확인해줘
- order: 2
  instruction: API 열거(enumeration)를 수행하시오. Ollama API의 모든 사용 가능한 엔드포인트를 탐지하라.
  hint: 알려진 Ollama API 엔드포인트들을 순회하며 확인하세요.
  category: recon
  points: 10
  answer: "python3 -c \"\nimport urllib.request\nendpoints = [\n    ('GET', '/api/tags'),\n\
    \    ('GET', '/api/version'),\n    ('POST', '/api/generate'),\n    ('POST', '/api/chat'),\n\
    \    ('POST', '/api/embeddings'),\n    ('POST', '/api/show'),\n    ('POST', '/api/copy'),\n\
    \    ('DELETE', '/api/delete'),\n    ('POST', '/api/pull'),\n    ('POST', '/api/push'),\n\
    ]\nfor method, path in endpoints:\n    try:\n        req = urllib.request.Request(f'${BASTION_URL:-http://localhost:8003}{path}',\
    \ method=method)\n        if method == 'POST':\n            req.add_header('Content-Type',\
    \ 'application/json')\n            req.data = b'{}'  \n        resp = urllib.request.urlopen(req,\
    \ timeout=3)\n        print(f'[{resp.status}] {method:6s} {path}')\n    except\
    \ urllib.error.HTTPError as e:\n        print(f'[{e.code}] {method:6s} {path}')\n\
    \    except Exception as e:\n        print(f'[ERR] {method:6s} {path} - {str(e)[:30]}')\n\
    \""
  answer_detail: API 열거는 사용 가능한 엔드포인트를 파악하여 공격 표면을 분석합니다. /api/delete, /api/pull 등
    관리 엔드포인트가 인증 없이 노출되면 모델 삭제나 악성 모델 다운로드가 가능합니다.
  verify:
    type: output_contains
    expect: /api/
    field: stdout
  target_vm: manager
  script: "python3 -c \"\nimport urllib.request\nendpoints = [\n    ('GET', '/api/tags'),\n\
    \    ('GET', '/api/version'),\n    ('POST', '/api/generate'),\n    ('POST', '/api/chat'),\n\
    \    ('POST', '/api/embeddings'),\n    ('POST', '/api/show'),\n    ('POST', '/api/copy'),\n\
    \    ('DELETE', '/api/delete'),\n    ('POST', '/api/pull'),\n    ('POST', '/api/push'),\n\
    ]\nfor method, path in endpoints:\n    try:\n        req = urllib.request.Request(f'${BASTION_URL:-http://localhost:8003}{path}',\
    \ method=method)\n        if method == 'POST':\n            req.add_header('Content-Type',\
    \ 'application/json')\n            req.data = b'{}'  \n        resp = urllib.request.urlopen(req,\
    \ timeout=3)\n        print(f'[{resp.status}] {method:6s} {path}')\n    except\
    \ urllib.error.HTTPError as e:\n        print(f'[{e.code}] {method:6s} {path}')\n\
    \    except Exception as e:\n        print(f'[ERR] {method:6s} {path} - {str(e)[:30]}')\n\
