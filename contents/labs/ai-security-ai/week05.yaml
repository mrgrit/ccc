    \ 1: Unicode normalization\n    text = unicodedata.normalize('NFKC', text)\n \
    \   # Step 2: Remove zero-width characters\n    text = re.sub(r'[\\u200b\\u200c\\\
    u200d\\ufeff]', '', text)\n    # Step 3: Remove RTL/LTR overrides\n    text =\
    \ re.sub(r'[\\u202a-\\u202e\\u2066-\\u2069]', '', text)\n    # Step 4: Leet speak\
    \ conversion\n    leet_map = {'4':'a','3':'e','1':'i','0':'o','5':'s','7':'t'}\n\
    \    for k,v in leet_map.items(): text = text.replace(k,v)\n    # Step 5: Collapse\
    \ whitespace\n    text = re.sub(r'\\s+', ' ', text).strip()\n    return text\n\
    \ntests = [\n    'h4ck th3 s3rv3r',\n    'hack\\u200bthe\\u200bserver',\n    'H\\\
    u0430CK',  # Cyrillic а\n    'normal input about security',\n    'mal  ware  \
    \ at  tack'\n]\nfor t in tests:\n    cleaned = normalize_input(t)\n    print(f'Input:\
    \  {repr(t)}')\n    print(f'Output: {repr(cleaned)}')\n    print()\n\""
