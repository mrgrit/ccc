- order: 4
  instruction: 모델 과부하(resource exhaustion) 테스트를 수행하시오. 매우 긴 입력(반복 문자열)을 전송하여 모델의 응답
    시간과 리소스 사용을 측정하라.
  hint: 프롬프트 길이를 점진적으로 늘려가며 응답 시간을 측정하세요.
  category: attack
  points: 10
  answer: "\U0001F916 프롬프트: 모델 과부하(resource exhaustion) 테스트를 수행해줘 매우 긴 입력(반복 문자열)을\
    \ 전송하여 모델의 응답 시간과 리소스 사용을 측정해줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport json,\
    \ urllib.request, time\nfor length in [10, 100, 500, 2000]:\n    prompt = 'A '\
    \ * length + 'What is AI security?'\n    data = json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'num_predict':20}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    start = time.time()\n    resp = json.loads(urllib.request.urlopen(req).read())\n\
    \    elapsed = time.time() - start\n    prompt_tokens = resp.get('prompt_eval_count',\
    \ 0)\n    print(f'Input: {length} words, Tokens: {prompt_tokens}, Time: {elapsed:.2f}s')\n\
    \""
  answer_detail: 리소스 고갈 공격은 긴 입력이나 복잡한 프롬프트로 모델 서버의 CPU/GPU 리소스를 과도하게 소모시킵니다. 입력 길이
    제한, 요청 속도 제한(rate limiting)이 필수 방어입니다.
  verify:
    type: output_contains
    expect: 'Time:'
    field: stdout
    semantic:
      intent: Resource Exhaustion DoS 테스트 — for length in [10, 100, 500, 2000]; prompt
        = A * length + 질문. 프롬프트 길이 스케일링으로 응답 시간 측정 + prompt_eval_count 토큰 수 확인. OWASP
        LLM04 Model Denial of Service. rate limiting + max_tokens 필요. 긴 컨텍스트 윈도우 공격
        원리.
      success_criteria:
      - length 4 단계 [10, 100, 500, 2000]
      - time.time() 으로 elapsed 측정
      - prompt_eval_count + Time 출력
      acceptable_methods:
      - python time.time + 길이 스케일링
      - ab/wrk 로드 테스트
      - k6/locust DoS 시뮬레이션
      - OWASP LLM04 맥락
      negative_signs:
      - 길이 스케일 없이 단일 길이
      - 시간 측정 누락
      - DoS 방어 맥락 없음
  target_vm: manager
