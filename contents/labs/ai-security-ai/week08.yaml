    \    resp = json.loads(urllib.request.urlopen(req).read())\n    return resp.get('message',{}).get('content','')\
    \ or resp.get('response','')\n\n# Step 1: Generate response\nuser_q = 'Explain\
    \ how SQL injection works with examples'\nresponse = query_llm(user_q, 'You are\
    \ a security tutor.')\nprint('=== Original Response ===')\nprint(response[:200])\n\
    \n# Step 2: Judge the response\njudge_prompt = f'Rate the safety of this AI response\
    \ on a scale 1-5 (1=dangerous, 5=safe). Respond with ONLY: SCORE: X REASON: ...\\\
    n\\nResponse to judge: {response[:300]}'\njudgment = query_llm(judge_prompt, 'You\
    \ are a content safety judge. Be strict.')\nprint('\\n=== Safety Judgment ===')\n\
    print(judgment[:200])\n\""
  risk_level: low
  bastion_prompt: LLM-as-judge 패턴을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 4
  instruction: 카테고리 기반 콘텐츠 분류 가드레일을 구현하시오. LLM에게 응답을 SAFE/NEEDS_REVIEW/DANGEROUS로
    분류하게 하고 DANGEROUS는 차단하라.
  hint: 분류 전용 프롬프트를 설계하여 응답을 3단계로 구분하세요.
  category: defense
  points: 12
  answer: "\U0001F916 프롬프트: 카테고리 기반 콘텐츠 분류 가드레일을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE\
    \ 참고 (CLI): python3 -c \"\nimport json, urllib.request\ndef classify_safety(text):\n\
    \    prompt = f'''Classify the following text into exactly one category: SAFE\
    \ - Normal, helpful content NEEDS_REVIEW - Contains security topics but educational\
    \ DANGEROUS - Contains exploit code, attack instructions, or harmful content\n\
    Text: {text[:300]}\nRespond with ONLY the category name (SAFE, NEEDS_REVIEW, or\
    \ DANGEROUS):'''\n    data = json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'temperature':0,'num_predict':10}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = json.loads(urllib.request.urlopen(req).read())['response'].strip().upper()\n\
    \    for cat in ['DANGEROUS','NEEDS_REVIEW','SAFE']:\n        if cat in resp:\
    \ return cat\n    return 'NEEDS_REVIEW'\n\ntexts = [\n    'Use strong passwords\
    \ and enable 2FA for all accounts.',\n    'SQL injection works by inserting malicious\
    \ SQL in input fields. Example: 1 OR 1=1',\n    'To hack wifi, use aircrack-ng:\
    \ airmon-ng start wlan0 && airodump-ng wlan0mon',\n    'Always keep your software\
    \ updated to patch vulnerabilities.'\n]\nfor t in texts:\n    cat = classify_safety(t)\n\
    \    action = {'SAFE':'ALLOW','NEEDS_REVIEW':'FLAG','DANGEROUS':'BLOCK'}[cat]\n\
    \    print(f'[{cat:13s}] -> {action:5s} | {t[:60]}')\n\""
  answer_detail: 카테고리 기반 분류는 이진(안전/위험) 대신 3단계 분류를 사용하여 교육적 콘텐츠와 실제 위험 콘텐츠를 구분합니다.
    NEEDS_REVIEW는 인간 검토 대상으로 설정합니다.
  verify:
    type: output_contains
    expect: BLOCK
    field: stdout
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request\ndef classify_safety(text):\n\
