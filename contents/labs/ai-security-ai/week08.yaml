    \ DANGEROUS):'''\n    data = json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'temperature':0,'num_predict':10}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = json.loads(urllib.request.urlopen(req).read())['response'].strip().upper()\n\
    \    for cat in ['DANGEROUS','NEEDS_REVIEW','SAFE']:\n        if cat in resp:\
    \ return cat\n    return 'NEEDS_REVIEW'\n\ntexts = [\n    'Use strong passwords\
    \ and enable 2FA for all accounts.',\n    'SQL injection works by inserting malicious\
    \ SQL in input fields. Example: 1 OR 1=1',\n    'To hack wifi, use aircrack-ng:\
    \ airmon-ng start wlan0 && airodump-ng wlan0mon',\n    'Always keep your software\
    \ updated to patch vulnerabilities.'\n]\nfor t in texts:\n    cat = classify_safety(t)\n\
    \    action = {'SAFE':'ALLOW','NEEDS_REVIEW':'FLAG','DANGEROUS':'BLOCK'}[cat]\n\
    \    print(f'[{cat:13s}] -> {action:5s} | {t[:60]}')\n\""
  risk_level: low
  bastion_prompt: 카테고리 기반 콘텐츠 분류 가드레일을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 5
  instruction: 토픽 제한 가드레일을 구현하시오. 허용된 토픽 목록을 정의하고 LLM이 해당 토픽에 대해서만 응답하도록 제한하라.
  hint: 먼저 사용자 질문의 토픽을 분류하고, 허용 목록에 없으면 거부하세요.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: 토픽 제한 가드레일을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI):\
    \ python3 -c \"\nimport json, urllib.request\nALLOWED_TOPICS = ['network_security','access_control','encryption','compliance','incident_response']\n\
    def classify_topic(question):\n    prompt = f'Classify this question into ONE\
    \ topic: network_security, access_control, encryption, compliance, incident_response,\
    \ hacking, personal, other\\n\\nQuestion: {question}\\n\\nTopic:'\n    data =\
    \ json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'temperature':0,'num_predict':10}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = json.loads(urllib.request.urlopen(req).read())['response'].strip().lower()\n\
    \    for t in ALLOWED_TOPICS + ['hacking','personal','other']:\n        if t in\
    \ resp: return t\n    return 'other'\n\nquestions = [\n    'How do I configure\
    \ a firewall?',\n    'How do I hack my neighbor wifi?',\n    'Explain AES-256\
    \ encryption',\n    'What is your favorite movie?',\n    'How to respond to a\
    \ data breach?'\n]\nfor q in questions:\n    topic = classify_topic(q)\n    allowed\
    \ = topic in ALLOWED_TOPICS\n    print(f'[{\\\"ALLOW\\\" if allowed else \\\"\
    DENY \\\"}] Topic: {topic:20s} | {q}')\n\""
  answer_detail: 토픽 제한은 LLM의 응답 범위를 사전 정의된 주제로 한정합니다. 허용된 토픽 외의 질문은 거부하여 목적 외 사용과
    남용을 방지합니다.
  verify:
    type: output_contains
    expect: DENY
    field: stdout
  target_vm: manager
