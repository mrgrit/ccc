    \ python3 -c \"\nimport json, urllib.request\ndef get_responses(prompt, n=3):\n\
    \    responses = []\n    for _ in range(n):\n        data = json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'num_predict':50,'temperature':0.3}}).encode()\n\
    \        req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \        resp = json.loads(urllib.request.urlopen(req).read())['response'].strip()[:100]\n\
    \        responses.append(resp)\n    return responses\n\ndef word_overlap(a, b):\n\
    \    wa, wb = set(a.lower().split()), set(b.lower().split())\n    if not wa or\
    \ not wb: return 0\n    return len(wa & wb) / max(len(wa), len(wb))\n\nquestions\
    \ = [\n    'What is the default port for SSH?',\n    'Is it safe to disable the\
    \ firewall?'\n]\nfor q in questions:\n    resps = get_responses(q)\n    print(f'Question:\
