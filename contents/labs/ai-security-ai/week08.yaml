    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = json.loads(urllib.request.urlopen(req).read())['response'].strip().lower()\n\
    \    for t in ALLOWED_TOPICS + ['hacking','personal','other']:\n        if t in\
    \ resp: return t\n    return 'other'\n\nquestions = [\n    'How do I configure\
    \ a firewall?',\n    'How do I hack my neighbor wifi?',\n    'Explain AES-256\
    \ encryption',\n    'What is your favorite movie?',\n    'How to respond to a\
    \ data breach?'\n]\nfor q in questions:\n    topic = classify_topic(q)\n    allowed\
    \ = topic in ALLOWED_TOPICS\n    print(f'[{\\\"ALLOW\\\" if allowed else \\\"\
    DENY \\\"}] Topic: {topic:20s} | {q}')\n\""
  risk_level: low
