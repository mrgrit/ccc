lab_id: ai-security-ai-week13
title: '[Non-AI] AI 거버넌스와 규제 준수'
version: ai
course: ai-security-ai
week: 13
description: 'AI/LLM 거버넌스 프레임워크와 규제 준수 요건을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- AI 거버넌스 프레임워크를 이해한다
- 규제 준수 요건을 LLM 시스템에 적용한다
- 거버넌스 자동화 도구를 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: AI 사용 정책 준수 검사기를 구현하시오. LLM에 전송되는 프롬프트가 조직의 사용 정책을 위반하는지 자동 검사하는 시스템을
    작성하라.
  hint: 사용 정책을 규칙으로 정의하고 프롬프트를 검사하세요.
  category: config
  points: 12
  answer: "\U0001F916 프롬프트: AI 사용 정책 준수 검사기를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고\
    \ (CLI): python3 -c \"\nimport re\nPOLICY_RULES = [\n    {'name': 'No PII in prompts',\
    \ 'pattern': r'\\d{6}-[1-4]\\d{6}|01[016789]-\\d{3,4}-\\d{4}', 'severity': 'CRITICAL'},\n\
    \    {'name': 'No credentials', 'pattern': r'password\\s*[:=]|api[_-]?key|secret[_-]?key',\
    \ 'severity': 'CRITICAL'},\n    {'name': 'No internal URLs', 'pattern': r'https?://[\\\
    w.-]+\\.internal', 'severity': 'HIGH'},\n    {'name': 'No attack requests', 'pattern':\
    \ r'how to hack|exploit|create malware', 'severity': 'HIGH'},\n    {'name': 'No\
    \ competitor analysis', 'pattern': r'competitor.*analysis|reverse.engineer', 'severity':\
    \ 'MEDIUM'},\n    {'name': 'English or Korean only', 'pattern': r'[\\u4e00-\\\
    u9fff]{5,}', 'severity': 'LOW'},\n]\ndef policy_check(prompt):\n    violations\
    \ = []\n    for rule in POLICY_RULES:\n        if re.search(rule['pattern'], prompt,\
    \ re.IGNORECASE):\n            violations.append(rule)\n    return violations\n\
    \ntests = [\n    'What is network security?',\n    'User SSN is 900101-1234567,\
    \ please process',\n    'Check https://admin.bank.internal/api status',\n    'How\
    \ to hack competitor website',\n    'password=admin123 is this secure?',\n   \
    \ 'Analyze our competitor Samsung reverse engineering their product'\n]\nprint('===\
    \ AI Usage Policy Compliance Check ===')\nfor t in tests:\n    v = policy_check(t)\n\
    \    status = 'VIOLATION' if v else 'COMPLIANT'\n    print(f'[{status:9s}] {t[:55]}')\n\
    \    for rule in v:\n        print(f'  -> [{rule[\\\"severity\\\"]}] {rule[\\\"\
    name\\\"]}')\n\""
  answer_detail: AI 사용 정책 준수 검사는 LLM 거버넌스의 기본입니다. 조직의 정책을 자동화된 규칙으로 구현하여 정책 위반을 사전에
    방지합니다.
  verify:
    type: output_contains
