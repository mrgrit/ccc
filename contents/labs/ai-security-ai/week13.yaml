- order: 2
  instruction: 데이터 분류 시스템을 구현하시오. LLM에 전송되는 데이터의 민감도를 자동 분류(PUBLIC/INTERNAL/CONFIDENTIAL/RESTRICTED)하는
    시스템을 작성하라.
  hint: 데이터 내용을 분석하여 민감도 등급을 자동 부여하세요.
  category: config
  points: 12
  answer: "\U0001F916 프롬프트: 데이터 분류 시스템을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI):\
    \ python3 -c \"\nimport re\ndef classify_data(text):\n    if re.search(r'\\d{6}-[1-4]\\\
    d{6}|credit.card|\\bssn\\b', text, re.I): return 'RESTRICTED'\n    if re.search(r'password|api.key|secret|credential|private.key',\
    \ text, re.I): return 'CONFIDENTIAL'\n    if re.search(r'internal|employee|salary|contract|proprietary',\
    \ text, re.I): return 'INTERNAL'\n    return 'PUBLIC'\n\ndef can_send_to_llm(classification,\
    \ llm_clearance='INTERNAL'):\n    levels = {'PUBLIC':0, 'INTERNAL':1, 'CONFIDENTIAL':2,\
    \ 'RESTRICTED':3}\n    return levels[classification] <= levels[llm_clearance]\n\
    \ntests = [\n    'What is the weather today?',\n    'Review this internal memo\
    \ about Q4 targets',\n    'Employee salary data: Kim $80000, Lee $95000',\n  \
    \  'API key: sk-prod-abc123 needs rotation',\n    'Customer SSN 900101-1234567\
    \ verification',\n    'Our proprietary algorithm uses XYZ approach'\n]\nprint('===\
    \ Data Classification for LLM Usage ===')\nprint(f'LLM clearance level: INTERNAL\\\
    n')\nfor t in tests:\n    cls = classify_data(t)\n    allowed = can_send_to_llm(cls)\n\
    \    print(f'[{cls:12s}] {\\\"ALLOW\\\" if allowed else \\\"DENY \\\"} | {t[:50]}')\n\
    \""
  answer_detail: 데이터 분류는 적절한 데이터만 LLM에 전송되도록 보장합니다. RESTRICTED/CONFIDENTIAL 데이터는 LLM에
    전송하면 안 되며, 자동 분류로 인적 오류를 방지합니다.
  verify:
    type: output_contains
    expect: RESTRICTED
    field: stdout
  target_vm: manager
  script: "python3 -c \"\nimport re\ndef classify_data(text):\n    if re.search(r'\\\
