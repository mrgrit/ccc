      - AI Verify (싱가포르) 거버넌스 툴킷
      negative_signs:
      - 단일 규제만 점검
      - PASS/FAIL 분류 없이 항목 나열만
      - 우선순위 개선 액션 누락
  target_vm: manager
  script: "python3 -c \"\nprint('=== Regulatory Compliance Assessment ===')\nprint()\n\nchecklist = [\n\
    \    ('EU AI Act - Transparency', [\n        ('Users informed they interact with AI', True),\n   \
