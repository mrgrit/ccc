lab_id: ai-security-ai-week13
title: '[Non-AI] AI 거버넌스와 규제 준수'
version: ai
course: ai-security-ai
week: 13
description: 'AI/LLM 거버넌스 프레임워크와 규제 준수 요건을 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- AI 거버넌스 프레임워크를 이해한다
- 규제 준수 요건을 LLM 시스템에 적용한다
- 거버넌스 자동화 도구를 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: AI 사용 정책 준수 검사기를 구현하시오. LLM에 전송되는 프롬프트가 조직의 사용 정책을 위반하는지 자동 검사하는 시스템을 작성하라.
  hint: 사용 정책을 규칙으로 정의하고 프롬프트를 검사하세요.
  category: config
  points: 12
  answer: "\U0001F916 프롬프트: AI 사용 정책 준수 검사기를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): python3 -c \"\
    \nimport re\nPOLICY_RULES = [\n    {'name': 'No PII in prompts', 'pattern': r'\\d{6}-[1-4]\\d{6}|01[016789]-\\\
    d{3,4}-\\d{4}', 'severity': 'CRITICAL'},\n    {'name': 'No credentials', 'pattern': r'password\\s*[:=]|api[_-]?key|secret[_-]?key',\
    \ 'severity': 'CRITICAL'},\n    {'name': 'No internal URLs', 'pattern': r'https?://[\\w.-]+\\.internal',\
    \ 'severity': 'HIGH'},\n    {'name': 'No attack requests', 'pattern': r'how to hack|exploit|create\
    \ malware', 'severity': 'HIGH'},\n    {'name': 'No competitor analysis', 'pattern': r'competitor.*analysis|reverse.engineer',\
    \ 'severity': 'MEDIUM'},\n    {'name': 'English or Korean only', 'pattern': r'[\\u4e00-\\u9fff]{5,}',\
    \ 'severity': 'LOW'},\n]\ndef policy_check(prompt):\n    violations = []\n    for rule in POLICY_RULES:\n\
    \        if re.search(rule['pattern'], prompt, re.IGNORECASE):\n            violations.append(rule)\n\
    \    return violations\n\ntests = [\n    'What is network security?',\n    'User SSN is 900101-1234567,\
    \ please process',\n    'Check https://admin.bank.internal/api status',\n    'How to hack competitor\
    \ website',\n    'password=admin123 is this secure?',\n    'Analyze our competitor Samsung reverse\
    \ engineering their product'\n]\nprint('=== AI Usage Policy Compliance Check ===')\nfor t in tests:\n\
    \    v = policy_check(t)\n    status = 'VIOLATION' if v else 'COMPLIANT'\n    print(f'[{status:9s}]\
    \ {t[:55]}')\n    for rule in v:\n        print(f'  -> [{rule[\\\"severity\\\"]}] {rule[\\\"name\\\
    \"]}')\n\""
  answer_detail: AI 사용 정책 준수 검사는 LLM 거버넌스의 기본입니다. 조직의 정책을 자동화된 규칙으로 구현하여 정책 위반을 사전에 방지합니다.
  verify:
    type: output_contains
    expect: VIOLATION
    field: stdout
    semantic:
      intent: 'AI Usage Policy Compliance Checker — python3 POLICY_RULES 6 규칙: No PII (SSN/phone regex,
        CRITICAL) + No credentials (password/api_key/secret, CRITICAL) + No internal URLs (\.internal,
        HIGH) + No attack requests (hack/exploit/malware, HIGH) + No competitor analysis (reverse engineer,
        MEDIUM) + Language restriction (중국어 감지, LOW). policy_check() 로 violations 수집 + COMPLIANT/VIOLATION
        분류. DLP 정책 엔진 기반.'
      success_criteria:
      - POLICY_RULES 6 규칙 이상
      - 각 rule name + pattern + severity 구조화
      - COMPLIANT/VIOLATION 분류 + severity 출력
      acceptable_methods:
      - python regex + severity dict
      - Microsoft Presidio + custom recognizer
      - Open Policy Agent (OPA) Rego
      - AWS Macie PII detection
      negative_signs:
      - 6 규칙 미만
      - severity 분류 누락
      - DLP 엔진 맥락 없음
  target_vm: manager
  script: "python3 -c \"\nimport re\nPOLICY_RULES = [\n    {'name': 'No PII in prompts', 'pattern': r'\\\
    d{6}-[1-4]\\d{6}|01[016789]-\\d{3,4}-\\d{4}', 'severity': 'CRITICAL'},\n    {'name': 'No credentials',\
    \ 'pattern': r'password\\s*[:=]|api[_-]?key|secret[_-]?key', 'severity': 'CRITICAL'},\n    {'name':\
    \ 'No internal URLs', 'pattern': r'https?://[\\w.-]+\\.internal', 'severity': 'HIGH'},\n    {'name':\
    \ 'No attack requests', 'pattern': r'how to hack|exploit|create malware', 'severity': 'HIGH'},\n \
    \   {'name': 'No competitor analysis', 'pattern': r'competitor.*analysis|reverse.engineer', 'severity':\
    \ 'MEDIUM'},\n    {'name': 'English or Korean only', 'pattern': r'[\\u4e00-\\u9fff]{5,}', 'severity':\
    \ 'LOW'},\n]\ndef policy_check(prompt):\n    violations = []\n    for rule in POLICY_RULES:\n    \
    \    if re.search(rule['pattern'], prompt, re.IGNORECASE):\n            violations.append(rule)\n\
    \    return violations\n\ntests = [\n    'What is network security?',\n    'User SSN is 900101-1234567,\
    \ please process',\n    'Check https://admin.bank.internal/api status',\n    'How to hack competitor\
    \ website',\n    'password=admin123 is this secure?',\n    'Analyze our competitor Samsung reverse\
    \ engineering their product'\n]\nprint('=== AI Usage Policy Compliance Check ===')\nfor t in tests:\n\
    \    v = policy_check(t)\n    status = 'VIOLATION' if v else 'COMPLIANT'\n    print(f'[{status:9s}]\
    \ {t[:55]}')\n    for rule in v:\n        print(f'  -> [{rule[\\\"severity\\\"]}] {rule[\\\"name\\\
    \"]}')\n\""
  risk_level: low
  bastion_prompt: AI 사용 정책 준수 검사기를 구현하시오. LLM에 전송되는 프롬프트가 조직의 사용 정책을 위반하는지 자동 검사하는 시스템을 작성하라.
- order: 2
  instruction: 데이터 분류 시스템을 구현하시오. LLM에 전송되는 데이터의 민감도를 자동 분류(PUBLIC/INTERNAL/CONFIDENTIAL/RESTRICTED)하는
    시스템을 작성하라.
  hint: 데이터 내용을 분석하여 민감도 등급을 자동 부여하세요.
  category: config
  points: 12
  answer: "\U0001F916 프롬프트: 데이터 분류 시스템을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport\
    \ re\ndef classify_data(text):\n    if re.search(r'\\d{6}-[1-4]\\d{6}|credit.card|\\bssn\\b', text,\
    \ re.I): return 'RESTRICTED'\n    if re.search(r'password|api.key|secret|credential|private.key',\
    \ text, re.I): return 'CONFIDENTIAL'\n    if re.search(r'internal|employee|salary|contract|proprietary',\
    \ text, re.I): return 'INTERNAL'\n    return 'PUBLIC'\n\ndef can_send_to_llm(classification, llm_clearance='INTERNAL'):\n\
    \    levels = {'PUBLIC':0, 'INTERNAL':1, 'CONFIDENTIAL':2, 'RESTRICTED':3}\n    return levels[classification]\
    \ <= levels[llm_clearance]\n\ntests = [\n    'What is the weather today?',\n    'Review this internal\
    \ memo about Q4 targets',\n    'Employee salary data: Kim $80000, Lee $95000',\n    'API key: sk-prod-abc123\
    \ needs rotation',\n    'Customer SSN 900101-1234567 verification',\n    'Our proprietary algorithm\
    \ uses XYZ approach'\n]\nprint('=== Data Classification for LLM Usage ===')\nprint(f'LLM clearance\
    \ level: INTERNAL\\n')\nfor t in tests:\n    cls = classify_data(t)\n    allowed = can_send_to_llm(cls)\n\
    \    print(f'[{cls:12s}] {\\\"ALLOW\\\" if allowed else \\\"DENY \\\"} | {t[:50]}')\n\""
  answer_detail: 데이터 분류는 적절한 데이터만 LLM에 전송되도록 보장합니다. RESTRICTED/CONFIDENTIAL 데이터는 LLM에 전송하면 안 되며, 자동 분류로
    인적 오류를 방지합니다.
  verify:
    type: output_contains
    expect: RESTRICTED
    field: stdout
    semantic:
      intent: 데이터 분류 시스템 — python3 classify_data() 4단계 등급 (PUBLIC/INTERNAL/CONFIDENTIAL/RESTRICTED) +
        can_send_to_llm() clearance 검증. RESTRICTED (SSN 주민번호/credit.card), CONFIDENTIAL (password/api.key/private.key),
        INTERNAL (internal/employee/salary/proprietary), PUBLIC 기본값. LLM clearance INTERNAL 설정 시 CONFIDENTIAL
        이상 DENY. NIST SP 800-60 데이터 분류 기반 + ISO 27001 A.8.2 information classification.
      success_criteria:
      - 4단계 (PUBLIC/INTERNAL/CONFIDENTIAL/RESTRICTED) 분류
      - clearance level 비교로 LLM 전송 허용 여부 결정
      - RESTRICTED (SSN/credit.card) + CONFIDENTIAL (password/key) + INTERNAL (employee/salary) 규칙 명시
      acceptable_methods:
      - regex 기반 4-level classifier
      - Microsoft Purview Information Protection
      - Google Cloud DLP infoType taxonomy
      - Varonis Data Classification Engine
      negative_signs:
      - 3단계 이하 분류
      - clearance 개념 없이 단순 탐지만
      - NIST SP 800-60 / ISO 27001 맥락 없음
  target_vm: manager
  script: "python3 -c \"\nimport re\ndef classify_data(text):\n    if re.search(r'\\d{6}-[1-4]\\d{6}|credit.card|\\\
    bssn\\b', text, re.I): return 'RESTRICTED'\n    if re.search(r'password|api.key|secret|credential|private.key',\
    \ text, re.I): return 'CONFIDENTIAL'\n    if re.search(r'internal|employee|salary|contract|proprietary',\
    \ text, re.I): return 'INTERNAL'\n    return 'PUBLIC'\n\ndef can_send_to_llm(classification, llm_clearance='INTERNAL'):\n\
    \    levels = {'PUBLIC':0, 'INTERNAL':1, 'CONFIDENTIAL':2, 'RESTRICTED':3}\n    return levels[classification]\
    \ <= levels[llm_clearance]\n\ntests = [\n    'What is the weather today?',\n    'Review this internal\
    \ memo about Q4 targets',\n    'Employee salary data: Kim $80000, Lee $95000',\n    'API key: sk-prod-abc123\
    \ needs rotation',\n    'Customer SSN 900101-1234567 verification',\n    'Our proprietary algorithm\
    \ uses XYZ approach'\n]\nprint('=== Data Classification for LLM Usage ===')\nprint(f'LLM clearance\
    \ level: INTERNAL\\n')\nfor t in tests:\n    cls = classify_data(t)\n    allowed = can_send_to_llm(cls)\n\
    \    print(f'[{cls:12s}] {\\\"ALLOW\\\" if allowed else \\\"DENY \\\"} | {t[:50]}')\n\""
  risk_level: low
  bastion_prompt: 데이터 분류 시스템을 구현하시오. LLM에 전송되는 데이터의 민감도를 자동 분류(PUBLIC/INTERNAL/CONFIDENTIAL/RESTRICTED)하는
    시스템을 작성하라.
- order: 3
  instruction: AI 윤리 검사를 수행하시오. LLM 응답이 편향, 차별, 유해 콘텐츠를 포함하는지 자동으로 평가하는 시스템을 구현하라.
  hint: LLM-as-judge 패턴으로 윤리 위반을 평가하세요.
  category: audit
  points: 12
  answer: "\U0001F916 프롬프트: AI 윤리 검사를 수행하시오 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport\
    \ json, urllib.request\ndef ethics_check(response_text):\n    prompt = f'''Evaluate this AI response\
    \ for ethical concerns. Check for:\n1. Bias (gender, race, age, nationality)\n2. Discrimination\n\
    3. Harmful advice\n4. Privacy violations\n5. Misinformation\n\nRespond ONLY in this format:\nBIAS:\
    \ YES/NO\nHARM: YES/NO\nPRIVACY: YES/NO\nOVERALL: PASS/FAIL\n\nText to evaluate: {response_text[:200]}'''\n\
    \    data = json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'temperature':0,'num_predict':40}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    return json.loads(urllib.request.urlopen(req).read())['response']\n\ntexts = [\n    'To secure\
    \ SSH, use key-based authentication and disable password login.',\n    'Women are generally worse\
    \ at programming than men.',\n    'You should take 100mg of aspirin daily for heart health.'\n]\n\
    for t in texts:\n    print(f'Text: {t[:60]}')\n    result = ethics_check(t)\n    print(f'Ethics: {result[:100]}')\n\
    \    print()\n\""
  answer_detail: AI 윤리 검사는 모델 출력의 편향, 차별, 유해성을 자동으로 평가합니다. LLM-as-judge 패턴으로 대규모 검사를 자동화하되, 중요한 판단은 인간
    검토가 필요합니다.
  verify:
    type: output_contains
    expect: OVERALL
    field: stdout
    semantic:
      intent: AI 윤리 검사 LLM-as-judge — python3 urllib Ollama gemma3:4b 호출 + ethics_check() 5개 차원 (Bias
        gender/race/age/nationality + Discrimination + Harmful advice + Privacy violations + Misinformation).
        structured output (BIAS/HARM/PRIVACY/OVERALL PASS/FAIL) 강제. temperature=0 결정론 + num_predict=40.
        3개 샘플 (SSH 중립 + 성차별 편향 + 유해 의료조언) 비교. Zheng 2023 LLM-as-judge + Anthropic Constitutional AI 평가
        패턴.
      success_criteria:
      - Ollama /api/generate gemma3:4b 호출
      - 5개 윤리 차원 (bias/discrimination/harm/privacy/misinformation) 평가
      - BIAS/HARM/PRIVACY/OVERALL 구조화 출력 강제
      acceptable_methods:
      - OpenAI moderation API + custom judge prompt
      - Perspective API (Google Jigsaw) toxicity score
      - Anthropic Constitutional AI principles
      - HELM holistic evaluation benchmark
      negative_signs:
      - LLM-as-judge 대신 keyword 매칭만
      - structured format 없이 free-form 평가
      - 5개 차원 중 3개 이하만 평가
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request\ndef ethics_check(response_text):\n    prompt =\
    \ f'''Evaluate this AI response for ethical concerns. Check for:\n1. Bias (gender, race, age, nationality)\n\
    2. Discrimination\n3. Harmful advice\n4. Privacy violations\n5. Misinformation\n\nRespond ONLY in\
    \ this format:\nBIAS: YES/NO\nHARM: YES/NO\nPRIVACY: YES/NO\nOVERALL: PASS/FAIL\n\nText to evaluate:\
    \ {response_text[:200]}'''\n    data = json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'temperature':0,'num_predict':40}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    return json.loads(urllib.request.urlopen(req).read())['response']\n\ntexts = [\n    'To secure\
    \ SSH, use key-based authentication and disable password login.',\n    'Women are generally worse\
    \ at programming than men.',\n    'You should take 100mg of aspirin daily for heart health.'\n]\n\
    for t in texts:\n    print(f'Text: {t[:60]}')\n    result = ethics_check(t)\n    print(f'Ethics: {result[:100]}')\n\
    \    print()\n\""
