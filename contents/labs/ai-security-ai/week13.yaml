  answer: "\U0001F916 프롬프트: AI 감사 트레일(audit trail)을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): python3\
    \ -c \"\nimport json, urllib.request, hashlib, time, uuid\ndef create_audit_trail(user_input, user_id='user001'):\n\
    \    trail = []\n    trace_id = str(uuid.uuid4())[:8]\n    \n    # Stage 1: Input received\n    trail.append({'stage':'input','trace_id':trace_id,'timestamp':time.strftime('%H:%M:%S'),'user':user_id,'data_hash':hashlib.sha256(user_input.encode()).hexdigest()[:12],'length':len(user_input)})\n\
    \    \n    # Stage 2: Policy check\n    import re\n    has_pii = bool(re.search(r'\\d{6}-[1-4]\\d{6}',\
    \ user_input))\n    trail.append({'stage':'policy_check','trace_id':trace_id,'pii_detected':has_pii,'decision':'block'\
    \ if has_pii else 'allow'})\n    \n    if has_pii:\n        trail.append({'stage':'blocked','trace_id':trace_id,'reason':'PII\
    \ detected'})\n        return trail\n    \n    # Stage 3: LLM processing\n    data = json.dumps({'model':'gemma3:4b','prompt':user_input,'stream':False,'options':{'num_predict':30}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    resp = json.loads(urllib.request.urlopen(req).read())\n    trail.append({'stage':'llm_call','trace_id':trace_id,'model':'gemma3:4b','tokens_in':resp.get('prompt_eval_count',0),'tokens_out':resp.get('eval_count',0)})\n\
    \    \n    # Stage 4: Output delivered\n    trail.append({'stage':'output','trace_id':trace_id,'response_hash':hashlib.sha256(resp['response'].encode()).hexdigest()[:12]})\n\
    \    return trail\n\nfor q in ['What is SSH?', 'Process SSN 900101-1234567']:\n    print(f'Query:\
    \ {q}')\n    trail = create_audit_trail(q)\n    for entry in trail:\n        print(f'  {json.dumps(entry)}')\n\
    \    print()\n\""
