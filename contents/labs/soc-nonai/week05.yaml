lab_id: "soc-nonai-week05"
title: "상관분석 - 다중 소스 이벤트 연계 분석"
version: "non-ai"
course: "soc-nonai"
week: 5
description: "Wazuh 알림, Suricata IDS 이벤트, 시스템 로그를 교차 분석하여 단일 이벤트로는 보이지 않는 공격 패턴을 식별하는 상관분석 기법을 학습합니다."
difficulty: "medium"
duration_minutes: 120
objectives:
  - "여러 로그 소스의 이벤트를 시간순으로 연계하여 분석할 수 있다"
  - "IP 기반 이벤트 상관분석을 수행한다"
  - "Wazuh의 복합 룰(if_matched_sid, frequency)을 이해한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "SIEM VM에서 알림 로그의 소스 IP 주소별 이벤트 발생 빈도를 집계하시오."
    hint: "alerts.log에서 Src IP 필드를 추출하여 집계하세요."
    category: "analysis"
    points: 8
    answer: "ssh siem 'grep -oP \"Src IP: \\S+\" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -10'"
    answer_detail: "소스 IP별 이벤트 빈도 분석은 상관분석의 시작점입니다. 특정 IP에서 비정상적으로 많은 이벤트가 발생하면 공격 가능성이 높습니다."
    verify:
      type: "output_contains"
      expect: "Src IP"
      field: "stdout"

  - order: 2
    instruction: "SIEM VM에서 특정 IP(10.20.30.201, ATTACKER)에서 발생한 모든 알림을 시간순으로 추출하시오."
    hint: "alerts.log에서 ATTACKER IP 주소로 필터링하세요."
    category: "analysis"
    points: 10
    answer: "ssh siem 'grep -B 2 -A 5 \"10.20.30.201\" /var/ossec/logs/alerts/alerts.log | tail -40'"
    answer_detail: "ATTACKER VM(10.20.30.201)에서 발생한 이벤트를 시간순으로 나열하면 공격 진행 단계(정찰->스캔->침투시도)를 파악할 수 있습니다. 이것이 IP 기반 상관분석입니다."
    verify:
      type: "output_contains"
      expect: "10.20.30.201"
      field: "stdout"

  - order: 3
    instruction: "SECU VM의 Suricata 로그에서 ATTACKER IP(10.20.30.201)와 관련된 IDS 이벤트를 확인하시오."
    hint: "Suricata의 eve.json에서 ATTACKER IP를 검색하세요."
    category: "analysis"
    points: 10
    answer: "ssh secu 'grep \"10.20.30.201\" /var/log/suricata/eve.json 2>/dev/null | tail -10'"
    answer_detail: "Wazuh 알림과 Suricata IDS 이벤트를 동일 IP로 교차 분석하면 공격의 전체 그림을 파악할 수 있습니다. SIEM에서 탐지하지 못한 네트워크 레벨 공격을 Suricata가 보완합니다."
    verify:
      type: "output_contains"
      expect: "10.20.30.201"
      field: "stdout"

  - order: 4
    instruction: "Wazuh 룰셋에서 복합 조건을 사용하는 상관분석 룰의 예시를 찾으시오. if_matched_sid 또는 frequency 키워드가 포함된 룰을 검색하시오."
    hint: "/var/ossec/ruleset/rules/ 에서 if_matched_sid를 grep하세요."
    category: "analysis"
    points: 10
    answer: "ssh siem 'grep -l \"if_matched_sid\\|frequency\" /var/ossec/ruleset/rules/*.xml | head -5'"
    answer_detail: "if_matched_sid는 이전에 특정 룰이 매칭된 후 같은 소스에서 추가 이벤트가 발생할 때 트리거됩니다. frequency는 일정 시간 내 반복 횟수를 지정합니다. 이것이 Wazuh의 상관분석 메커니즘입니다."
    verify:
      type: "output_contains"
      expect: ".xml"
      field: "stdout"

  - order: 5
    instruction: "Wazuh의 SSH 브루트포스 탐지 룰(룰 ID 5712)의 상관분석 로직을 확인하시오."
    hint: "sshd_rules.xml에서 룰 5712를 찾으세요."
    category: "analysis"
    points: 12
    answer: "ssh siem 'grep -A 10 \"id=\\\"5712\\\"\" /var/ossec/ruleset/rules/0095-sshd_rules.xml'"
    answer_detail: "룰 5712는 frequency와 timeframe을 사용하여 일정 시간 내 SSH 로그인 실패가 반복되면 브루트포스로 판정합니다. 단일 실패 이벤트와 달리 반복 패턴을 탐지하는 상관분석 룰입니다."
    verify:
      type: "output_contains"
      expect: "frequency"
      field: "stdout"

  - order: 6
    instruction: "WEB VM의 Apache 접근 로그에서 동일 IP의 연속 요청 패턴을 분석하시오. IP별 요청 수를 집계하시오."
    hint: "access.log에서 첫 번째 필드(IP)를 추출하여 집계하세요."
    category: "analysis"
    points: 10
    answer: "ssh web 'awk \"{print \\$1}\" /var/log/apache2/access.log | sort | uniq -c | sort -rn | head -10'"
    answer_detail: "웹 접근 로그에서 IP별 요청 빈도를 분석하면 스캐닝이나 자동화 공격을 식별할 수 있습니다. 정상 사용자 대비 비정상적으로 많은 요청은 의심 대상입니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 7
    instruction: "WEB VM의 Apache 로그에서 HTTP 상태코드 4xx(클라이언트 오류)와 5xx(서버 오류) 응답을 집계하시오."
    hint: "access.log에서 상태코드 필드를 추출하세요. Combined 형식에서 상태코드는 9번째 필드입니다."
    category: "analysis"
    points: 10
    answer: "ssh web 'awk \"{print \\$9}\" /var/log/apache2/access.log | grep -E \"^[45]\" | sort | uniq -c | sort -rn'"
    answer_detail: "4xx 오류(특히 403, 404)가 특정 IP에서 대량 발생하면 디렉토리 스캔이나 취약점 탐색 시도입니다. 5xx 오류는 서버 측 문제로, 공격으로 인한 서비스 장애 가능성을 나타냅니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 8
    instruction: "SIEM VM에서 동일 소스 IP에서 SSH 실패와 웹 공격이 모두 발생한 경우를 찾는 상관분석을 수행하시오."
    hint: "alerts.log에서 SSH와 web 관련 알림의 소스 IP를 각각 추출하여 교집합을 구하세요."
    category: "analysis"
    points: 15
    answer: "ssh siem 'comm -12 <(grep -i \"ssh\\|authentication\" /var/ossec/logs/alerts/alerts.log | grep -oP \"Src IP: \\S+\" | sort -u) <(grep -i \"web\\|apache\\|http\" /var/ossec/logs/alerts/alerts.log | grep -oP \"Src IP: \\S+\" | sort -u)'"
    answer_detail: "두 가지 다른 공격 카테고리(SSH, 웹)에서 동일 IP가 발견되면 조직적 공격의 강력한 지표입니다. 이것이 크로스-카테고리 상관분석으로, SOC에서 우선순위를 높여 대응해야 합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 9
    instruction: "SECU VM에서 nftables 방화벽 로그를 확인하여 차단된 트래픽의 소스 IP를 분석하시오."
    hint: "syslog 또는 kern.log에서 nftables 관련 로그를 검색하세요."
    category: "analysis"
    points: 10
    answer: "ssh secu 'grep -i \"nft\\|nftables\\|drop\\|reject\" /var/log/syslog /var/log/kern.log 2>/dev/null | tail -15'"
    answer_detail: "방화벽 차단 로그를 SIEM 알림, IDS 이벤트와 함께 분석하면 공격의 전체 라이프사이클을 파악할 수 있습니다. 차단된 IP가 다른 경로로 우회 시도하는지 확인합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
