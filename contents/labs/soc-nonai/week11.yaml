lab_id: "soc-nonai-week11"
title: "위협 인텔리전스 - IoC 기반 탐지와 로그 매칭"
version: "non-ai"
course: "soc-nonai"
week: 11
description: "침해 지표(IoC: IP, 해시, 도메인)를 수집하고, Wazuh CDB 리스트와 로그 분석에 활용하여 알려진 위협을 탐지하는 위협 인텔리전스 기법을 학습합니다."
difficulty: "hard"
duration_minutes: 150
objectives:
  - "IoC(침해 지표)의 유형과 수집 방법을 이해한다"
  - "Wazuh CDB 리스트를 활용한 IoC 매칭 기법을 실습한다"
  - "로그에서 IoC를 검색하여 과거 침해 여부를 조사한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "SIEM VM에서 Wazuh의 CDB(Constant DataBase) 리스트 디렉토리를 확인하시오. 어떤 리스트가 존재하는지 파악하시오."
    hint: "/var/ossec/etc/lists/ 디렉토리를 확인하세요."
    category: "setup"
    points: 8
    answer: "ssh siem 'ls -la /var/ossec/etc/lists/'"
    answer_detail: "CDB 리스트는 Wazuh에서 IP, 도메인, 해시 등의 IoC를 key:value 형태로 저장하는 데이터베이스입니다. 룰에서 list 옵션으로 참조하여 실시간 매칭에 사용합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 2
    instruction: "SIEM VM에서 Wazuh 룰셋에 포함된 기본 CDB 리스트의 내용을 확인하시오."
    hint: "/var/ossec/etc/lists/ 하위 파일의 내용을 확인하세요."
    category: "analysis"
    points: 8
    answer: "ssh siem 'for f in /var/ossec/etc/lists/*; do echo \"=== $f ===\"; head -5 \"$f\" 2>/dev/null; done'"
    answer_detail: "CDB 리스트는 'key:value' 형식입니다. 예를 들어 IP 블랙리스트는 '10.20.30.201:attacker' 형태로 저장됩니다. 이 리스트에 매칭되는 이벤트가 발생하면 알림이 트리거됩니다."
    verify:
      type: "output_contains"
      expect: "==="
      field: "stdout"

  - order: 3
    instruction: "SIEM VM의 Wazuh 알림 로그에서 ATTACKER IP(10.20.30.201)의 모든 활동 이력을 추출하시오."
    hint: "alerts.log와 archives에서 ATTACKER IP를 검색하세요."
    category: "analysis"
    points: 10
    answer: "ssh siem 'grep -c \"10.20.30.201\" /var/ossec/logs/alerts/alerts.log && echo \"events from attacker\" && grep \"10.20.30.201\" /var/ossec/logs/alerts/alerts.log | grep -oP \"Rule: \\d+\" | sort | uniq -c | sort -rn'"
    answer_detail: "특정 IP의 과거 활동을 추적하는 것이 위협 인텔리전스의 핵심입니다. 해당 IP가 트리거한 룰 유형과 빈도를 분석하면 공격 패턴과 의도를 파악할 수 있습니다."
    verify:
      type: "output_contains"
      expect: "events"
      field: "stdout"

  - order: 4
    instruction: "SIEM VM에서 Wazuh 룰셋 중 CDB 리스트를 참조하는 룰의 예시를 찾으시오."
    hint: "룰 파일에서 list 키워드를 검색하세요."
    category: "analysis"
    points: 12
    answer: "ssh siem 'grep -rn \"<list\" /var/ossec/ruleset/rules/*.xml | head -10'"
    answer_detail: "Wazuh 룰에서 <list field=\"srcip\" lookup=\"address_match\">etc/lists/blacklist</list> 형태로 CDB를 참조합니다. 이렇게 하면 알려진 악성 IP에서의 이벤트를 자동 탐지합니다."
    verify:
      type: "output_contains"
      expect: "list"
      field: "stdout"

  - order: 5
    instruction: "WEB VM의 Apache 접근 로그에서 알려진 공격 패턴(SQL Injection, XSS, 디렉토리 트래버설) 시도를 검색하시오."
    hint: "access.log에서 select, union, script, ../ 등의 패턴을 검색하세요."
    category: "detection"
    points: 12
    answer: "ssh web 'grep -iE \"(select|union|script|alert\\(|\\.\\./)\" /var/log/apache2/access.log | tail -10'"
    answer_detail: "웹 로그에서 공격 시그니처를 직접 검색하는 것은 IoC 기반 탐지의 기본입니다. SQL Injection(select, union), XSS(script, alert), Path Traversal(../) 패턴이 대표적입니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 6
    instruction: "WEB VM의 Apache 에러 로그에서 ModSecurity가 탐지/차단한 요청을 확인하시오."
    hint: "/var/log/apache2/error.log 또는 modsec_audit.log에서 ModSecurity를 검색하세요."
    category: "detection"
    points: 12
    answer: "ssh web 'grep -i \"modsecurity\\|ModSecurity\" /var/log/apache2/error.log /var/log/apache2/modsec_audit.log 2>/dev/null | tail -10'"
    answer_detail: "ModSecurity WAF가 차단한 요청에는 공격 유형(SQL Injection, XSS 등), 소스 IP, 요청 URL이 포함됩니다. 이 정보를 IoC로 활용하여 동일 공격자의 다른 시도를 추적합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 7
    instruction: "SECU VM에서 Suricata가 탐지한 이벤트의 시그니처 ID(SID)별 발생 횟수를 집계하시오."
    hint: "eve.json 또는 fast.log에서 SID를 추출하여 집계하세요."
    category: "analysis"
    points: 12
    answer: "ssh secu 'grep -oP \"\\[\\d+:\\d+:\\d+\\]\" /var/log/suricata/fast.log 2>/dev/null | sort | uniq -c | sort -rn | head -10 || echo \"check eve.json\"'"
    answer_detail: "Suricata SID별 빈도를 분석하면 가장 활발한 위협 유형을 파악할 수 있습니다. 특정 SID의 급증은 진행 중인 공격을 나타냅니다. SID를 기반으로 위협 인텔리전스 DB를 조회합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 8
    instruction: "SIEM VM에서 ossec.conf의 룰셋 설정을 확인하여 CDB 리스트가 올바르게 참조되고 있는지 검증하시오."
    hint: "ossec.conf에서 list 또는 ruleset 섹션을 확인하세요."
    category: "setup"
    points: 10
    answer: "ssh siem 'grep -A 20 \"<ruleset>\" /var/ossec/etc/ossec.conf | head -25'"
    answer_detail: "ossec.conf의 ruleset 섹션에서 list와 decoder, rule_dir 경로가 올바르게 설정되어야 CDB 리스트와 탐지 룰이 정상 동작합니다."
    verify:
      type: "output_contains"
      expect: "ruleset"
      field: "stdout"

  - order: 9
    instruction: "SIEM VM의 Wazuh 알림에서 파일 무결성 변경(syscheck) 이벤트를 추출하고, 변경된 파일 경로를 목록화하시오."
    hint: "alerts.json에서 syscheck 룰 그룹을 검색하세요."
    category: "detection"
    points: 12
    answer: "ssh siem 'grep \"syscheck\" /var/ossec/logs/alerts/alerts.json | grep -oP \"\\\"path\\\":\\\"[^\\\"]+\\\"\" | sort -u | head -15'"
    answer_detail: "파일 해시 변경은 강력한 IoC입니다. syscheck가 탐지한 변경 파일의 경로, 이전/이후 해시, 변경 시간을 분석하여 악성코드 설치나 설정 변조를 식별합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
