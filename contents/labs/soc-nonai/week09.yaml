lab_id: soc-nonai-week09
title: 포렌식 기초 - 시스템 아티팩트 수집과 타임라인 분석
version: non-ai
course: soc-nonai
week: 9
description: 인시던트 발생 후 디지털 포렌식 관점에서 시스템 아티팩트를 수집하고, 타임라인을 구성하여 공격 경로를 재구성하는 기초 기법을
  학습합니다.
difficulty: medium
duration_minutes: 150
objectives:
- 시스템 휘발성/비휘발성 아티팩트를 식별하고 수집할 수 있다
- 로그 기반 타임라인을 구성하여 공격 경로를 재구성한다
- 파일 시스템 메타데이터를 분석하여 변조 흔적을 탐지한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB VM에서 현재 시스템의 휘발성 정보(업타임, 로그인 사용자, 메모리 사용량)를 수집하시오.
  hint: uptime, who, free 명령을 사용하세요.
  category: analysis
  points: 5
  answer: echo "=== UPTIME ==="; uptime; echo "=== LOGGED USERS ==="; who; echo "===
    MEMORY ==="; free -h
  answer_detail: 포렌식에서는 휘발성 데이터부터 수집합니다(RFC 3227 증거 수집 순서). 업타임으로 마지막 재부팅 시점, who로
    현재 접속자, free로 메모리 상태를 파악합니다.
  verify:
    type: output_contains
    expect: UPTIME
    field: stdout
  target_vm: siem
- order: 2
  instruction: WEB VM에서 현재 네트워크 연결 상태를 수집하시오. 모든 TCP/UDP 연결과 리스닝 포트를 기록하시오.
  hint: ss -tunap 명령을 사용하세요.
  category: analysis
  points: 8
  answer: ss -tunap
  answer_detail: 네트워크 연결은 휘발성 데이터입니다. 공격자의 원격 접속(reverse shell 등)이 ESTABLISHED 상태로
    남아있을 수 있습니다. 모든 연결의 소스/대상 IP와 프로세스를 기록합니다.
  verify:
    type: output_contains
    expect: LISTEN
    field: stdout
  target_vm: siem
- order: 3
  instruction: WEB VM에서 현재 실행 중인 모든 프로세스를 수집하시오. 프로세스 트리 형태로 확인하시오.
  hint: ps auxf 또는 pstree 명령을 사용하세요.
  category: analysis
  points: 8
  answer: ps auxf --cols 200 | head -50
  answer_detail: 프로세스 목록은 포렌식의 핵심 아티팩트입니다. 비정상적인 프로세스(이상한 이름, root 권한, 높은 리소스 사용)를
    식별합니다. PPID를 통해 프로세스 생성 관계도 파악합니다.
  verify:
    type: output_contains
    expect: root
    field: stdout
  target_vm: siem
- order: 4
  instruction: WEB VM에서 최근 24시간 내 수정된 파일을 /etc 디렉토리에서 검색하시오.
  hint: find 명령의 -mtime 옵션을 사용하세요.
  category: analysis
  points: 10
  answer: find /etc -mtime -1 -type f -ls 2>/dev/null | head -20
  answer_detail: 공격자는 지속성 확보를 위해 /etc 하위의 설정 파일(crontab, passwd, ssh 설정 등)을 변조할 수
    있습니다. 최근 변경된 설정 파일은 포렌식 분석의 핵심 대상입니다.
  verify:
    type: output_contains
    expect: /etc
    field: stdout
  target_vm: siem
- order: 5
  instruction: WEB VM에서 사용자 계정 관련 파일(passwd, shadow, group)의 최근 수정 시간을 확인하시오.
  hint: stat 또는 ls -la 명령으로 파일 메타데이터를 확인하세요.
  category: analysis
  points: 10
  answer: stat /etc/passwd /etc/shadow /etc/group 2>/dev/null | grep -E "File:|Modify:"
  answer_detail: passwd와 shadow 파일의 수정 시간이 예상 시점과 다르면 계정 추가/변경이 발생한 것입니다. 공격자가 백도어
    계정을 생성했을 가능성을 조사해야 합니다.
  verify:
    type: output_contains
    expect: Modify
    field: stdout
  target_vm: siem
- order: 6
  instruction: WEB VM에서 cron 작업(예약된 작업)을 확인하시오. 시스템 전체와 사용자별 crontab을 모두 검사하시오.
  hint: /etc/crontab, /etc/cron.d/, 사용자 crontab을 확인하세요.
  category: analysis
  points: 10
  answer: cat /etc/crontab && echo "=== cron.d ==="; ls -la /etc/cron.d/ && echo "===
    user crontab ==="; crontab -l 2>/dev/null || echo "no user crontab"
  answer_detail: 공격자는 지속성(persistence)을 위해 cron에 악성 스크립트를 등록합니다. 비정상적인 스크립트 경로나 외부
    URL 다운로드 명령이 있으면 의심해야 합니다.
  verify:
    type: output_contains
    expect: cron
    field: stdout
  target_vm: siem
- order: 7
  instruction: WEB VM에서 bash 히스토리를 확인하여 최근 실행된 명령어를 분석하시오.
  hint: 각 사용자의 .bash_history 파일을 확인하세요.
  category: analysis
  points: 10
  answer: cat /root/.bash_history 2>/dev/null | tail -30; for user in $(ls /home/);
    do echo "=== $user ==="; cat /home/$user/.bash_history 2>/dev/null | tail -10;
    done
  answer_detail: bash_history에는 사용자가 실행한 명령이 기록됩니다. 공격자가 히스토리를 삭제할 수 있지만, 남아있다면 공격
    단계를 재구성하는 데 매우 유용한 아티팩트입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 8
  instruction: WEB VM에서 SSH 관련 아티팩트를 수집하시오. authorized_keys, known_hosts, sshd 설정을
    확인하시오.
  hint: /root/.ssh/와 /etc/ssh/ 디렉토리를 확인하세요.
  category: analysis
  points: 12
  answer: echo "=== authorized_keys ==="; cat /root/.ssh/authorized_keys 2>/dev/null;
    echo "=== sshd_config ==="; grep -v "^#" /etc/ssh/sshd_config | grep -v "^$" |
    head -20
  answer_detail: authorized_keys에 알 수 없는 공개키가 있으면 공격자가 SSH 백도어를 설치한 것입니다. sshd_config에서
    PermitRootLogin, PasswordAuthentication 설정도 변조 여부를 확인합니다.
  verify:
    type: output_contains
    expect: sshd_config
    field: stdout
  target_vm: siem
- order: 9
  instruction: SIEM VM에서 WEB VM 에이전트의 Wazuh 파일 무결성 모니터링(syscheck) 알림을 확인하시오.
  hint: alerts.log에서 syscheck 관련 알림을 검색하세요.
  category: detection
  points: 12
  answer: '🖥️ UI: Dashboard → Agents → 에이전트 목록/상태 확인

    📎 참고 (CLI): grep -B 2 -A 5 "syscheck\|integrity" /var/ossec/logs/alerts/alerts.log
    | tail -30'
  answer_detail: Wazuh syscheck는 파일 변경(추가/수정/삭제)을 탐지하여 알림을 생성합니다. 포렌식에서 syscheck 알림은
    공격자의 파일 변조 타임라인을 구성하는 핵심 데이터입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
- order: 10
  instruction: WEB VM에서 최근 로그인 기록(wtmp)과 마지막 접속 기록(lastlog)을 수집하시오.
  hint: last와 lastlog 명령을 사용하세요.
  category: analysis
  points: 10
  answer: echo "=== LAST LOGINS ==="; last -20; echo "=== LASTLOG ==="; lastlog |
    grep -v "Never"
  answer_detail: wtmp(last 명령)은 로그인/로그아웃 기록, lastlog는 각 사용자의 마지막 접속 정보를 보여줍니다. 비정상적인
    시간대 접속이나 알 수 없는 소스 IP가 있으면 침해 증거입니다.
  verify:
    type: output_contains
    expect: LAST
    field: stdout
  target_vm: siem
