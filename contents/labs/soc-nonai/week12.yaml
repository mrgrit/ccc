lab_id: soc-nonai-week12
title: 자동화 대응 - Wazuh Active Response와 스크립트 기반 자동화
version: non-ai
course: soc-nonai
week: 12
description: Wazuh Active Response 설정을 분석하고, 쉘 스크립트를 활용한 자동화 대응 파이프라인을 구축합니다. 알림 수집,
  IP 차단, 알림 전파의 자동화를 실습합니다.
difficulty: medium
duration_minutes: 150
objectives:
- Wazuh Active Response의 설정과 동작 메커니즘을 이해한다
- 쉘 스크립트로 로그 분석과 자동 대응을 구현한다
- 자동화 대응의 효과를 검증하고 오탐 방지 방안을 수립한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh Active Response에 등록된 명령(command)과 대응 설정을 전체 확인하시오.
  hint: ossec.conf에서 command와 active-response 섹션을 모두 추출하세요.
  category: setup
  points: 8
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): grep -A 5 "<command>" /var/ossec/etc/ossec.conf && echo "===" && grep
    -A 8 "<active-response>" /var/ossec/etc/ossec.conf'
  answer_detail: command 섹션은 실행할 스크립트와 파라미터를 정의하고, active-response 섹션은 어떤 룰(rules_id)이
    트리거되면 어떤 command를 실행할지 매핑합니다.
  verify:
    type: output_contains
    expect: command
    field: stdout
    semantic:
      intent: AR command + active-response — grep -A 5 '<command>' + grep -A 8 '<active-response>'.
        command = 스크립트/파라미터 정의 / active-response = 룰(rules_id) → command 매핑. SOAR
        자동화 핵심.
      success_criteria:
      - grep command + active-response
      - command 키워드
      - 두 섹션 모두
      acceptable_methods:
      - grep -A 두 섹션
      - Wazuh API config
      - Dashboard AR 설정
      negative_signs:
      - 섹션 1개만
      - command 누락
      - 매핑 맥락 없음
  target_vm: siem
- order: 2
  instruction: SIEM VM에서 firewall-drop Active Response 스크립트의 내용을 분석하시오.
  hint: /var/ossec/active-response/bin/firewall-drop 파일을 확인하세요.
  category: analysis
  points: 10
  answer: head -50 /var/ossec/active-response/bin/firewall-drop
  answer_detail: firewall-drop 스크립트는 add(차단)과 delete(해제) 동작을 수행합니다. iptables/nftables를
    사용하여 공격 IP를 차단하고, timeout 후 자동 해제합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: firewall-drop 분석 — head -50 /var/ossec/active-response/bin/firewall-drop.
        add(차단)/delete(해제) 동작. iptables/nftables IP 차단 + timeout 자동 해제. AR 동작 메커니즘
        이해.
      success_criteria:
      - head firewall-drop
      - 스크립트 내용
      - add/delete 동작 설명
      acceptable_methods:
      - head 스크립트
      - cat firewall-drop
      - Wazuh 문서 참조
      negative_signs:
      - 스크립트 미점검
      - add/delete 누락
      - 메커니즘 맥락 없음
  target_vm: siem
- order: 3
  instruction: SIEM VM에서 Active Response 실행 이력을 확인하시오.
  hint: /var/ossec/logs/active-responses.log를 확인하세요.
  category: analysis
  points: 10
  answer: 'cat /var/ossec/logs/active-responses.log 2>/dev/null | tail -20; echo "---
    AR log entries: $(wc -l < /var/ossec/logs/active-responses.log 2>/dev/null ||
    echo 0)"'
  answer_detail: Active Response 로그에는 실행 시간, 명령, 대상 IP, 에이전트 정보가 기록됩니다. 이 로그를 통해 자동
    대응이 의도한 대로 동작했는지 검증합니다.
  verify:
    type: output_contains
    expect: AR log
    field: stdout
    semantic:
      intent: AR 실행 이력 — cat /var/ossec/logs/active-responses.log + wc -l. 시간/명령/대상
        IP/에이전트 기록. 자동 대응 의도대로 동작 검증. 사후 감사 자료.
      success_criteria:
      - active-responses.log + wc -l
      - AR log 키워드
      - 이력 통계
      acceptable_methods:
      - cat + wc
      - tail + entries 카운트
      - Dashboard AR history
      negative_signs:
      - 로그 미점검
      - 통계 없음
      - 감사 맥락 없음
  target_vm: siem
- order: 4
  instruction: SIEM VM에서 최근 1시간 내 발생한 고위험 알림(레벨 10+)의 소스 IP를 자동 추출하는 명령을 실행하시오.
  hint: alerts.log에서 시간 필터링 후 소스 IP를 추출하세요.
  category: response
  points: 12
  answer: 'grep -E "level 1[0-5]" /var/ossec/logs/alerts/alerts.log | grep -oP "Src
    IP: \S+" | sort -u'
  answer_detail: 자동화 대응의 핵심은 고위험 이벤트의 소스 IP를 실시간으로 추출하여 차단 목록에 추가하는 것입니다. 이 명령을 cron이나
    스크립트에 통합하면 자동 차단이 가능합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '고위험 소스 IP 자동 추출 — grep -E ''level 1[0-5]'' alerts.log | grep -oP ''Src
        IP: \S+'' | sort -u. cron/스크립트 통합 → 자동 차단 목록 추가. SOAR Playbook.'
      success_criteria:
      - level 10-15 + Src IP 추출
      - sort -u 고유
      - 자동화 가능 명령
      acceptable_methods:
      - grep + 추출 + sort
      - Wazuh API + 스크립트
      - Logstash filter + Action
      negative_signs:
      - 고유 추출 없음
      - 단순 grep
      - 자동화 맥락 없음
  target_vm: siem
- order: 5
  instruction: SIEM VM에서 특정 룰 ID가 트리거될 때 로그를 파일로 자동 저장하는 간단한 모니터링 명령을 실행하시오.
  hint: tail -f와 grep을 조합하여 실시간 필터링하세요.
  category: response
  points: 10
  answer: tail -100 /var/ossec/logs/alerts/alerts.log | grep -B 2 -A 3 "level 1[0-5]"
    ※ /tmp/high_alerts_$(date +%Y%m%d).txt && cat /tmp/high_alerts_$(date +%Y%m%d).txt
    | head -20 && echo "saved to /tmp/high_alerts_$(date +%Y%m%d).txt"
  answer_detail: 고위험 알림을 별도 파일로 자동 저장하면 SOC 분석가가 빠르게 검토할 수 있습니다. 실제 운영에서는 이 과정을 cron
    job이나 systemd timer로 자동화합니다.
  verify:
    type: output_contains
    expect: saved
    field: stdout
    semantic:
      intent: 고위험 알림 자동 저장 — tail -100 alerts.log | grep -B 2 -A 3 'level 1[0-5]'
        > /tmp/high_alerts_$(date +%Y%m%d).txt. 별도 파일 = SOC 분석가 빠른 검토. cron job/systemd
        timer 자동화.
      success_criteria:
      - tail + grep + 파일 저장
      - saved 키워드
      - 날짜 변수 (date)
      acceptable_methods:
      - redirect > 파일
      - tee
      - logrotate + 별도 파일
      negative_signs:
      - 저장 없음
      - 단순 출력
      - 날짜 미사용
  target_vm: siem
- order: 6
  instruction: WEB VM에서 Wazuh 에이전트의 Active Response 스크립트 목록을 확인하시오.
  hint: /var/ossec/active-response/bin/ 디렉토리를 확인하세요.
  category: setup
  points: 8
  answer: '🖥️ UI: Dashboard → Agents → 에이전트 목록/상태 확인

    📎 참고 (CLI): ls -la /var/ossec/active-response/bin/'
  answer_detail: 에이전트 측 Active Response 스크립트는 매니저의 명령을 받아 해당 호스트에서 직접 대응 조치를 수행합니다.
    방화벽 차단, 프로세스 종료 등이 에이전트에서 실행됩니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 에이전트 AR 스크립트 — ls -la /var/ossec/active-response/bin/ (WEB VM). 매니저
        명령 수신 → 호스트 직접 대응 (방화벽 차단/프로세스 종료). 분산 대응 구조.
      success_criteria:
      - ls active-response/bin/
      - 에이전트 측 스크립트
      - 디렉터리 내용
      acceptable_methods:
      - ls -la
      - find -type f
      - Wazuh agent 문서
      negative_signs:
      - 스크립트 미확인
      - 단순 ls
      - 분산 대응 맥락 없음
  target_vm: siem
- order: 7
  instruction: Wazuh Dashboard에서 에이전트 상태를 확인하시오. 브라우저에서 https://SIEM_IP:443 접속 → 왼쪽
    메뉴 'Agents' 클릭 → 등록된 에이전트 목록과 상태(Active/Disconnected)를 확인하라.
  hint: 'Wazuh Dashboard 기본 계정: admin / admin. SIEM VM의 IP로 접속하세요.'
  category: setup
  points: 12
  answer: '🖥️ UI: Dashboard → Agents → 에이전트 목록/상태 확인

    📎 참고 (CLI): Wazuh Dashboard → Agents 메뉴에서 에이전트 목록 확인. CLI 대안: curl -sk -u wazuh-wui:wazuh-wui
    https://localhost:55000/agents | head'
  answer_detail: Wazuh API는 RESTful 인터페이스로 에이전트 관리, 알림 조회, 설정 변경을 프로그래밍적으로 수행할 수 있습니다.
    자동화 스크립트에서 API를 활용하면 유연한 대응이 가능합니다.
  verify:
    type: service_active
    expect: wazuh-manager
    field: stdout
    semantic:
      intent: Wazuh API/Dashboard — curl -sk -u wazuh-wui:wazuh-wui https://localhost:55000/agents
        | head 또는 Dashboard Agents. RESTful API + 에이전트 관리/알림 조회/설정. 자동화 스크립트 활용.
      success_criteria:
      - wazuh-manager 서비스 활성
      - Dashboard 또는 API 호출
      - 에이전트 정보
      acceptable_methods:
      - curl Wazuh API
      - Dashboard Agents
      - wazuh-control status
      negative_signs:
      - 서비스 미확인
      - API 없음
      - Dashboard 미언급
  target_vm: siem
- order: 8
  instruction: SIEM VM에서 알림 발생 시 이메일 알림 설정이 되어 있는지 ossec.conf를 확인하시오.
  hint: ossec.conf에서 email 관련 설정을 검색하세요.
  category: analysis
  points: 10
  answer: grep -A 5 "<email" /var/ossec/etc/ossec.conf | head -20
  answer_detail: email_notification, email_to, smtp_server 설정으로 Wazuh가 고위험 알림 발생 시
    자동으로 이메일을 전송합니다. 실제 SOC에서는 이를 통해 담당자에게 즉시 통보합니다.
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: 이메일 알림 설정 — grep -A 5 '<email' /var/ossec/etc/ossec.conf. email_notification
        + email_to + smtp_server. 고위험 알림 자동 이메일. 담당자 즉시 통보. SOC 알림 채널.
      success_criteria:
      - grep email ossec.conf
      - email 키워드
      - -A 컨텍스트
      acceptable_methods:
      - grep -A email
      - Wazuh API config email
      - Dashboard email 설정
      negative_signs:
      - email 미점검
      - 단순 grep
      - 통보 채널 맥락 없음
  target_vm: siem
- order: 9
  instruction: SIEM VM에서 알림 통계를 자동 생성하는 원라이너 스크립트를 실행하시오. 룰별 빈도, 레벨 분포, 상위 소스 IP를
    한 번에 출력하시오.
  hint: 여러 grep/awk 명령을 세미콜론으로 연결하세요.
  category: reporting
  points: 12
  answer: 'echo "=== TOP RULES ==="; grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log
    | sort | uniq -c | sort -rn | head -5; echo "=== LEVEL DIST ==="; grep -oP "level
    \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -5;
    echo "=== TOP SRC IPs ==="; grep -oP "Src IP: \S+" /var/ossec/logs/alerts/alerts.log
    | sort | uniq -c | sort -rn | head -5'
  answer_detail: 이 원라이너는 SOC 일일 보고서의 기초 데이터를 자동 생성합니다. 실제 운영에서는 이를 스크립트로 저장하고 cron으로
    매일 실행하여 보고서를 자동화합니다.
  verify:
    type: output_contains
    expect: TOP
    field: stdout
    semantic:
      intent: 원라이너 통계 — TOP RULES + LEVEL DIST + TOP SRC IPs (각 head -5). 일일 보고서 기초
        데이터. cron 자동화로 매일 보고서 생성. SOC KPI.
      success_criteria:
      - TOP 키워드
      - Rules + Level + Src IPs 3종 통계
      - 원라이너 (세미콜론 연결)
      acceptable_methods:
      - 원라이너 + 다중 grep
      - 스크립트 + cron
      - Wazuh API stats 활용
      negative_signs:
      - 통계 1종만
      - 단순 grep
      - 보고서 맥락 없음
  target_vm: siem
- order: 10
  instruction: 'SECU VM에서 nftables에 설정된 차단 규칙의 패킷 카운터를 확인하시오. 실제로 차단된 트래픽이 있는지 검증하시오.


    [FIXTURE] /home/ccc/cyber-range/fixtures/soc-nonai-week12/10/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/soc-nonai-week12/10/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft list ruleset에서 counter 정보를 확인하세요.
  category: response
  points: 10
  answer: nft list ruleset | grep -A 1 -i "drop\|reject\|counter"
  answer_detail: nftables counter는 각 규칙에 매칭된 패킷 수와 바이트 수를 표시합니다. 차단 규칙의 카운터가 증가하면
    실제로 악성 트래픽이 차단되고 있다는 증거입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: nftables 차단 카운터 — nft list ruleset | grep -A 1 -i 'drop|reject|counter'.
        패킷 수/바이트. 카운터 증가 = 실제 악성 트래픽 차단 증거. 대응 효과 검증.
      success_criteria:
      - nft list + counter/drop 필터
      - 카운터 표시
      - 차단 증거
      acceptable_methods:
      - nft list ruleset + grep
      - iptables -L -nv (legacy)
      - ufw status verbose
      negative_signs:
      - 카운터 미점검
      - 단순 nft list
      - 효과 검증 맥락 없음
  target_vm: siem
  fixtures:
  - generator: firewall_log
    target_vm: siem
    path: /home/ccc/cyber-range/fixtures/soc-nonai-week12/10/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
