lab_id: "soc-nonai-week12"
title: "자동화 대응 - Wazuh Active Response와 스크립트 기반 자동화"
version: "non-ai"
course: "soc-nonai"
week: 12
description: "Wazuh Active Response 설정을 분석하고, 쉘 스크립트를 활용한 자동화 대응 파이프라인을 구축합니다. 알림 수집, IP 차단, 알림 전파의 자동화를 실습합니다."
difficulty: "hard"
duration_minutes: 150
objectives:
  - "Wazuh Active Response의 설정과 동작 메커니즘을 이해한다"
  - "쉘 스크립트로 로그 분석과 자동 대응을 구현한다"
  - "자동화 대응의 효과를 검증하고 오탐 방지 방안을 수립한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "SIEM VM에서 Wazuh Active Response에 등록된 명령(command)과 대응 설정을 전체 확인하시오."
    hint: "ossec.conf에서 command와 active-response 섹션을 모두 추출하세요."
    category: "setup"
    points: 8
    answer: "ssh siem 'grep -A 5 \"<command>\" /var/ossec/etc/ossec.conf && echo \"===\" && grep -A 8 \"<active-response>\" /var/ossec/etc/ossec.conf'"
    answer_detail: "command 섹션은 실행할 스크립트와 파라미터를 정의하고, active-response 섹션은 어떤 룰(rules_id)이 트리거되면 어떤 command를 실행할지 매핑합니다."
    verify:
      type: "output_contains"
      expect: "command"
      field: "stdout"

  - order: 2
    instruction: "SIEM VM에서 firewall-drop Active Response 스크립트의 내용을 분석하시오."
    hint: "/var/ossec/active-response/bin/firewall-drop 파일을 확인하세요."
    category: "analysis"
    points: 10
    answer: "ssh siem 'head -50 /var/ossec/active-response/bin/firewall-drop'"
    answer_detail: "firewall-drop 스크립트는 add(차단)과 delete(해제) 동작을 수행합니다. iptables/nftables를 사용하여 공격 IP를 차단하고, timeout 후 자동 해제합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 3
    instruction: "SIEM VM에서 Active Response 실행 이력을 확인하시오."
    hint: "/var/ossec/logs/active-responses.log를 확인하세요."
    category: "analysis"
    points: 10
    answer: "ssh siem 'cat /var/ossec/logs/active-responses.log 2>/dev/null | tail -20; echo \"--- AR log entries: $(wc -l < /var/ossec/logs/active-responses.log 2>/dev/null || echo 0)\"'"
    answer_detail: "Active Response 로그에는 실행 시간, 명령, 대상 IP, 에이전트 정보가 기록됩니다. 이 로그를 통해 자동 대응이 의도한 대로 동작했는지 검증합니다."
    verify:
      type: "output_contains"
      expect: "AR log"
      field: "stdout"

  - order: 4
    instruction: "SIEM VM에서 최근 1시간 내 발생한 고위험 알림(레벨 10+)의 소스 IP를 자동 추출하는 명령을 실행하시오."
    hint: "alerts.log에서 시간 필터링 후 소스 IP를 추출하세요."
    category: "response"
    points: 12
    answer: "ssh siem 'grep -E \"level 1[0-5]\" /var/ossec/logs/alerts/alerts.log | grep -oP \"Src IP: \\S+\" | sort -u'"
    answer_detail: "자동화 대응의 핵심은 고위험 이벤트의 소스 IP를 실시간으로 추출하여 차단 목록에 추가하는 것입니다. 이 명령을 cron이나 스크립트에 통합하면 자동 차단이 가능합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 5
    instruction: "SIEM VM에서 특정 룰 ID가 트리거될 때 로그를 파일로 자동 저장하는 간단한 모니터링 명령을 실행하시오."
    hint: "tail -f와 grep을 조합하여 실시간 필터링하세요."
    category: "response"
    points: 10
    answer: "ssh siem 'tail -100 /var/ossec/logs/alerts/alerts.log | grep -B 2 -A 3 \"level 1[0-5]\" > /tmp/high_alerts_$(date +%Y%m%d).txt && cat /tmp/high_alerts_$(date +%Y%m%d).txt | head -20 && echo \"saved to /tmp/high_alerts_$(date +%Y%m%d).txt\"'"
    answer_detail: "고위험 알림을 별도 파일로 자동 저장하면 SOC 분석가가 빠르게 검토할 수 있습니다. 실제 운영에서는 이 과정을 cron job이나 systemd timer로 자동화합니다."
    verify:
      type: "output_contains"
      expect: "saved"
      field: "stdout"

  - order: 6
    instruction: "WEB VM에서 Wazuh 에이전트의 Active Response 스크립트 목록을 확인하시오."
    hint: "/var/ossec/active-response/bin/ 디렉토리를 확인하세요."
    category: "setup"
    points: 8
    answer: "ssh web 'ls -la /var/ossec/active-response/bin/'"
    answer_detail: "에이전트 측 Active Response 스크립트는 매니저의 명령을 받아 해당 호스트에서 직접 대응 조치를 수행합니다. 방화벽 차단, 프로세스 종료 등이 에이전트에서 실행됩니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 7
    instruction: "SIEM VM에서 Wazuh API를 통해 에이전트 상태를 조회하시오."
    hint: "curl로 Wazuh API(https://localhost:55000)에 접근하세요. 기본 인증을 사용합니다."
    category: "setup"
    points: 12
    answer: "ssh siem 'curl -s -k -u wazuh-wui:wazuh-wui https://localhost:55000/agents?pretty 2>/dev/null | head -30 || echo \"API not available, checking via CLI\" && /var/ossec/bin/agent_control -l'"
    answer_detail: "Wazuh API는 RESTful 인터페이스로 에이전트 관리, 알림 조회, 설정 변경을 프로그래밍적으로 수행할 수 있습니다. 자동화 스크립트에서 API를 활용하면 유연한 대응이 가능합니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"

  - order: 8
    instruction: "SIEM VM에서 알림 발생 시 이메일 알림 설정이 되어 있는지 ossec.conf를 확인하시오."
    hint: "ossec.conf에서 email 관련 설정을 검색하세요."
    category: "analysis"
    points: 10
    answer: "ssh siem 'grep -A 5 \"<email\" /var/ossec/etc/ossec.conf | head -20'"
    answer_detail: "email_notification, email_to, smtp_server 설정으로 Wazuh가 고위험 알림 발생 시 자동으로 이메일을 전송합니다. 실제 SOC에서는 이를 통해 담당자에게 즉시 통보합니다."
    verify:
      type: "output_contains"
      expect: "email"
      field: "stdout"

  - order: 9
    instruction: "SIEM VM에서 알림 통계를 자동 생성하는 원라이너 스크립트를 실행하시오. 룰별 빈도, 레벨 분포, 상위 소스 IP를 한 번에 출력하시오."
    hint: "여러 grep/awk 명령을 세미콜론으로 연결하세요."
    category: "reporting"
    points: 12
    answer: "ssh siem 'echo \"=== TOP RULES ===\"; grep -oP \"Rule: \\d+\" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -5; echo \"=== LEVEL DIST ===\"; grep -oP \"level \\d+\" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -5; echo \"=== TOP SRC IPs ===\"; grep -oP \"Src IP: \\S+\" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -5'"
    answer_detail: "이 원라이너는 SOC 일일 보고서의 기초 데이터를 자동 생성합니다. 실제 운영에서는 이를 스크립트로 저장하고 cron으로 매일 실행하여 보고서를 자동화합니다."
    verify:
      type: "output_contains"
      expect: "TOP"
      field: "stdout"

  - order: 10
    instruction: "SECU VM에서 nftables에 설정된 차단 규칙의 패킷 카운터를 확인하시오. 실제로 차단된 트래픽이 있는지 검증하시오."
    hint: "nft list ruleset에서 counter 정보를 확인하세요."
    category: "response"
    points: 10
    answer: "ssh secu 'nft list ruleset | grep -A 1 -i \"drop\\|reject\\|counter\"'"
    answer_detail: "nftables counter는 각 규칙에 매칭된 패킷 수와 바이트 수를 표시합니다. 차단 규칙의 카운터가 증가하면 실제로 악성 트래픽이 차단되고 있다는 증거입니다."
    verify:
      type: "output_contains"
      expect: ""
      field: "stdout"
