lab_id: soc-nonai-week07
title: 인시던트 분류 - 알림 우선순위 판단과 분류 체계
version: non-ai
course: soc-nonai
week: 7
description: Wazuh 알림을 심각도, 유형, 자산 중요도 기준으로 분류하고, 실제 위협(True Positive)과 오탐(False Positive)을 구분하는 인시던트
  분류(Triage) 기법을 학습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Wazuh 알림 레벨 체계를 이해하고 심각도별로 분류한다
- 알림의 True/False Positive 여부를 판단하는 기준을 수립한다
- 인시던트 분류 기준에 따라 대응 우선순위를 결정한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 알림 레벨별 발생 건수를 집계하여 현재 보안 상태 개요를 파악하시오.
  hint: alerts.log에서 level 필드를 추출하여 정렬/집계하세요.
  category: analysis
  points: 8
  answer: grep -oP "\(level \d+\)" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn
  answer_detail: 레벨 분포를 통해 현재 SOC 환경의 전체 보안 상태를 한눈에 파악합니다. 레벨 12 이상이 다수 존재하면 심각한 보안 문제가 있을 수 있습니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
    semantic:
      intent: 레벨별 집계 — grep -oP '\(level \d+\)' alerts.log | sort | uniq -c | sort -rn. 보안 상태 한 눈에. 12+
        다수 = 심각. SOC 운영 KPI.
      success_criteria:
      - grep level + 집계
      - level 키워드
      - 정렬 출력
      acceptable_methods:
      - grep + sort + uniq
      - Wazuh API stats
      - Dashboard level distribution
      negative_signs:
      - 집계 없음
      - 단순 grep
      - 정렬 없음
  target_vm: siem
- order: 2
  instruction: SIEM VM에서 룰 그룹(카테고리)별 알림 발생 빈도를 분석하시오.
  hint: alerts.json에서 rule.groups 필드를 추출하세요.
  category: analysis
  points: 10
  answer: 'grep -oP '
  answer_detail: Wazuh 룰 그룹에는 authentication_failed, sshd, web-log, syslog 등이 있습니다. 그룹별 빈도를 파악하면 어떤 유형의
    이벤트가 가장 많은지, 튜닝이 필요한 카테고리가 어디인지 판단할 수 있습니다.
  verify:
    type: output_contains
    expect: groups
    field: stdout
    semantic:
      intent: 룰 그룹 빈도 — alerts.json rule.groups 필드 추출 + 집계. authentication_failed/sshd/web-log/syslog
        카테고리. 튜닝 필요 카테고리 식별.
      success_criteria:
      - groups 키워드
      - rule.groups 추출
      - 집계
      acceptable_methods:
      - jq .rule.groups
      - grep + sort + uniq
      - Dashboard rule_groups filter
      negative_signs:
      - groups 미추출
      - JSON 미사용
      - 단순 grep
  target_vm: siem
- order: 3
  instruction: SIEM VM에서 에이전트별(자산별) 알림 발생 건수를 집계하시오.
  hint: alerts.log에서 에이전트 이름 또는 Location 필드를 추출하세요.
  category: analysis
  points: 10
  answer: 'grep -oP "Location: \S+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head
    -10'
  answer_detail: 자산별 알림 빈도를 파악하면 가장 많은 보안 이벤트가 발생하는 시스템을 식별할 수 있습니다. WEB VM에서 많은 알림이 발생한다면 웹 서비스에 대한 공격이
    집중되고 있다는 의미입니다.
  verify:
    type: output_contains
    expect: Location
    field: stdout
    semantic:
      intent: '자산별 알림 — grep -oP ''Location: \S+'' alerts.log | sort | uniq -c | sort -rn | head -10.
        WEB VM 다발 = 웹 공격 집중. 자산 중요도 + 알림 빈도 = 우선순위. SOC 자산 가시성.'
      success_criteria:
      - Location 키워드
      - 자산별 집계
      - Top 10
      acceptable_methods:
      - grep + 집계
      - Wazuh API agent stats
      - Dashboard agent overview
      negative_signs:
      - Location 미추출
      - 단순 grep
      - 자산 매핑 없음
  target_vm: siem
- order: 4
  instruction: SIEM VM에서 반복적으로 발생하는 낮은 레벨(1-4) 알림의 룰 ID를 확인하시오. 이들은 오탐 튜닝 대상 후보입니다.
  hint: alerts.log에서 레벨 1-4를 필터링하고 룰 ID를 집계하세요.
  category: analysis
  points: 10
  answer: 'grep -E "\(level [1-4]\)" /var/ossec/logs/alerts/alerts.log | grep -oP "Rule: \d+" | sort |
    uniq -c | sort -rn | head -10'
  answer_detail: 반복적인 낮은 레벨 알림은 SOC 분석가의 피로(alert fatigue)를 유발합니다. 이들을 식별하여 튜닝하면 실제 위협에 집중할 수 있습니다.
  verify:
    type: output_contains
    expect: 'Rule:'
    field: stdout
    semantic:
      intent: '낮은 레벨 반복 알림 — grep -E ''\(level [1-4]\)'' alerts.log | grep -oP ''Rule: \d+'' | sort |
        uniq -c | sort -rn | head -10. 반복 노이즈 → alert fatigue → 튜닝 대상. SOC 효율화 핵심.'
      success_criteria:
      - level 1-4 필터 + 룰 ID 집계
      - 'Rule: 키워드'
      - 튜닝 후보 식별
      acceptable_methods:
      - grep -E + 집계
      - Wazuh API low_level rules
      - Dashboard tuning
      negative_signs:
      - 레벨 필터 없음
      - 튜닝 맥락 없음
      - 단순 grep
  target_vm: siem
- order: 5
  instruction: SIEM VM에서 특정 룰 ID의 상세 설명을 조회하시오. 가장 많이 발생하는 룰의 정의를 확인하시오.
  hint: grep으로 /var/ossec/ruleset/rules/ 전체에서 해당 룰 ID를 검색하세요.
  category: analysis
  points: 10
  answer: grep -rn "id=\"5501\"" /var/ossec/ruleset/rules/ && echo "---" && grep -rn "id=\"5503\"" /var/ossec/ruleset/rules/
  answer_detail: 룰의 description, level, group을 확인하면 해당 이벤트가 어떤 상황을 의미하는지 정확히 이해할 수 있습니다. 이 이해를 바탕으로 True/False
    Positive를 판단합니다.
  verify:
    type: output_contains
    expect: id=
    field: stdout
    semantic:
      intent: 룰 정의 조회 — grep -rn 'id="5501"' /var/ossec/ruleset/rules/ + 5503. description/level/group
        확인. True/False Positive 판단 근거. Wazuh ruleset 분석.
      success_criteria:
      - grep -rn id= 룰
      - 5501/5503 또는 다른 ID
      - ruleset 디렉터리 검색
      acceptable_methods:
      - grep -rn rules/
      - Wazuh API GET /rules/{id}
      - Dashboard rule details
      negative_signs:
      - 룰 ID 없음
      - 단순 grep
      - 정의 미조회
  target_vm: siem
- order: 6
  instruction: SIEM VM에서 레벨 10 이상의 고위험 알림을 최근 것부터 표시하고, 각 알림의 룰 ID와 설명을 추출하시오.
  hint: alerts.log에서 고위험 알림을 필터링하세요.
  category: analysis
  points: 12
  answer: grep -B 1 -A 5 "level 1[0-5]" /var/ossec/logs/alerts/alerts.log | tail -40
  answer_detail: 레벨 10 이상의 알림은 SOC에서 즉시 분류(triage)해야 합니다. 룰 설명과 소스 IP, 대상 자산을 함께 확인하여 대응 우선순위를 결정합니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
    semantic:
      intent: 고위험 알림 추출 — grep -B 1 -A 5 'level 1[0-5]' alerts.log | tail -40. 룰 ID + 설명 + 소스 IP + 대상
        자산. 즉시 triage. 대응 우선순위 결정. NIST IR Containment 단계.
      success_criteria:
      - level 10-15 필터
      - level 키워드
      - -B/-A 컨텍스트
      acceptable_methods:
      - grep -B/-A + 레벨
      - Wazuh API level>=10
      - Dashboard high severity
      negative_signs:
      - 레벨 필터 없음
      - 컨텍스트 없음
      - triage 맥락 없음
  target_vm: siem
- order: 7
  instruction: WEB VM에서 최근 실패한 SSH 로그인 시도의 소스 IP와 사용자 이름을 추출하시오.
  hint: auth.log에서 Failed password 패턴을 검색하세요.
  category: analysis
  points: 10
  answer: grep "Failed password" /var/log/auth.log | awk "{print \$(NF-3), \$(NF-5)}" | sort | uniq -c
    | sort -rn | head -10
  answer_detail: 실패한 로그인의 소스 IP와 사용자 이름 조합을 분석하면 브루트포스 공격인지, 단순 오입력인지 판단할 수 있습니다. 존재하지 않는 사용자(root, admin
    등)에 대한 시도는 공격 가능성이 높습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: SSH 실패 분석 — grep 'Failed password' /var/log/auth.log | awk '{print $(NF-3), $(NF-5)}' |
        sort | uniq -c | sort -rn | head -10. 소스 IP + 사용자명 조합. root/admin = 공격 가능성 ↑. 단순 오입력 vs 브루트포스
        구분.
      success_criteria:
      - grep Failed password
      - IP + 사용자 추출
      - Top 10 빈도
      acceptable_methods:
      - grep + awk + 집계
      - lastb 분석
      - fail2ban 통계
      negative_signs:
      - IP 또는 사용자 누락
      - 단순 grep
      - 패턴 분석 없음
  target_vm: siem
- order: 8
  instruction: SIEM VM에서 동일 룰이 5분 내 10회 이상 발생한 경우(노이즈 후보)를 식별하시오.
  hint: alerts.log의 타임스탬프와 룰 ID를 함께 추출하여 시간 윈도우 내 빈도를 분석하세요.
  category: analysis
  points: 12
  answer: awk "/^\*\*/ {ts=\$0} /Rule:/ {print ts, \$0}" /var/ossec/logs/alerts/alerts.log | tail -50
  answer_detail: 동일 룰이 짧은 시간 내 반복 발생하면 노이즈(오탐)이거나 진행 중인 공격입니다. 시간 패턴을 분석하여 버스트 형태면 공격, 일정 간격이면 정상 활동으로
    판단합니다.
  verify:
    type: output_contains
    expect: Rule
    field: stdout
    semantic:
      intent: 버스트 패턴 분석 — awk '/^\*\*/ {ts=$0} /Rule:/ {print ts, $0}' alerts.log | tail -50. 5분 내 10회+
        동일 룰 = 노이즈 또는 진행 중 공격. 시간 패턴 분석으로 공격 vs 정상 구분.
      success_criteria:
      - awk 타임스탬프 + Rule 매칭
      - Rule 키워드
      - 시간 윈도우 분석
      acceptable_methods:
      - awk + 시간 추출
      - ts 파싱 + 윈도우
      - Dashboard time series
      negative_signs:
      - 타임스탬프 없음
      - 윈도우 분석 없음
      - 단순 grep
  target_vm: siem
- order: 9
  instruction: SIEM VM에서 Wazuh의 알림 통계 요약(오늘 기준)을 확인하시오.
  hint: /var/ossec/stats/ 디렉토리 또는 alerts.log의 오늘 날짜 기준으로 집계하세요.
  category: reporting
  points: 10
  answer: '🖥️ UI: Dashboard → Security events → 필터 적용 후 이벤트 확인

    📎 참고 (CLI): echo "=== 총 알림 수 ===" && wc -l /var/ossec/logs/alerts/alerts.log && echo "=== 고위험(level
    10+) ===" && grep -c "level 1[0-5]" /var/ossec/logs/alerts/alerts.log && echo "=== 고유 룰 수 ===" &&
    grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log | sort -u | wc -l'
  answer_detail: 인시던트 분류의 결과로 총 알림 수, 고위험 비율, 활성 룰 수 등의 통계를 산출합니다. 이 데이터는 SOC 운영 보고서와 성과 지표(KPI)의 기초가
    됩니다.
  verify:
    type: output_contains
    expect: 알림
    field: stdout
    semantic:
      intent: 'Wazuh 알림 통계 — wc -l alerts.log + grep -c ''level 1[0-5]'' + grep -oP ''Rule: \d+'' | sort
        -u | wc -l. 총 알림 / 고위험 / 고유 룰 수. SOC 운영 보고서/KPI 기초.'
      success_criteria:
      - 알림 키워드 또는 통계 명령
      - 총수 + 고위험 + 룰 수 3종
      - wc/grep -c 집계
      acceptable_methods:
      - wc + grep -c
      - Wazuh API stats
      - Dashboard summary
      negative_signs:
      - 통계 1종만
      - KPI 맥락 없음
      - 단순 cat
  target_vm: siem
