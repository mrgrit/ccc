lab_id: soc-nonai-week15
title: 종합 관제 - 실시간 모니터링과 전체 파이프라인 검증
version: non-ai
course: soc-nonai
week: 15
description: SOC의 전체 파이프라인(로그 수집 -> SIEM 분석 -> IDS 탐지 -> 알림 -> 대응)을 종합적으로 운용합니다. 실시간 모니터링 환경을 구성하고, 공격
  시나리오에 대한 엔드투엔드 탐지-대응을 검증합니다.
difficulty: medium
duration_minutes: 180
objectives:
- SOC 전체 인프라의 가동 상태를 점검하고 정상 운영을 확인한다
- 다중 소스 로그를 통합 모니터링하는 실시간 관제 환경을 구성한다
- 공격 시나리오에 대한 엔드투엔드 탐지-분석-대응 사이클을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SOC 전체 인프라 상태를 점검하시오. 4개 VM의 연결 상태와 핵심 서비스의 가동 여부를 한 번에 확인하시오.
  hint: 각 VM에 ssh로 접속하여 핵심 서비스 상태를 확인하세요.
  category: setup
  points: 8
  answer: echo '=== INFRA CHECK ===' && echo '[SIEM]' && ssh siem 'systemctl is-active wazuh-manager rsyslog'
    && echo '[SECU]' && ssh secu 'systemctl is-active suricata' && echo '[WEB]' && ssh web 'systemctl
    is-active apache2 && /var/ossec/bin/wazuh-control status 2>/dev/null | head -3' && echo '[ATTACKER]'
    && ssh attacker 'which nmap' && echo '=== ALL CHECKS DONE ==='
  answer_detail: 종합 관제의 시작은 전체 인프라 헬스체크입니다. 모든 구성 요소(SIEM, IDS, WAF, 에이전트, 로그 수집)가 정상 동작해야 SOC가 완전한 가시성을
    확보합니다.
  verify:
    type: output_contains
    expect: ALL CHECKS DONE
    field: stdout
    semantic:
      intent: SOC 인프라 헬스체크 — ssh 4VM 서비스 상태 (siem wazuh-manager+rsyslog / secu suricata / web apache2+wazuh
        agent / attacker nmap). 모든 구성요소 정상 → 완전 가시성. SOC 운영 첫 단계.
      success_criteria:
      - ALL CHECKS DONE 키워드
      - 4 VM 점검
      - ssh + systemctl
      acceptable_methods:
      - ssh + systemctl
      - Ansible playbook
      - Wazuh API + 헬스체크
      negative_signs:
      - VM 2개 이하
      - 단일 서비스
      - 헬스체크 종료 메시지 없음
  target_vm: siem
- order: 2
  instruction: SIEM VM에서 Wazuh 에이전트의 전체 상태를 확인하고, 비정상 에이전트가 있는지 점검하시오.
  hint: /var/ossec/bin/agent_control -l로 에이전트 목록을 확인하세요.
  category: setup
  points: 8
  answer: '🖥️ UI: Dashboard → Agents → 에이전트 목록/상태 확인

    📎 참고 (CLI): /var/ossec/bin/agent_control -l'
  answer_detail: 모든 에이전트가 Active 상태여야 로그 수집 누락이 없습니다. Disconnected 에이전트가 있으면 해당 VM의 네트워크 연결이나 에이전트 프로세스를
    즉시 점검해야 합니다.
  verify:
    type: output_contains
    expect: Active
    field: stdout
    semantic:
      intent: 에이전트 전체 상태 — /var/ossec/bin/agent_control -l. 모든 Active 정상. Disconnected = 네트워크/프로세스 즉시
        점검. SOC 가시성 보장.
      success_criteria:
      - agent_control -l
      - Active 키워드
      - 에이전트 상태
      acceptable_methods:
      - agent_control -l
      - Wazuh API agents
      - Dashboard agent overview
      negative_signs:
      - 에이전트 미점검
      - Active 검증 없음
      - 단순 ls
  target_vm: siem
- order: 3
  instruction: SIEM VM에서 최근 30분 내 발생한 알림 수와 레벨 분포를 확인하시오.
  hint: alerts.log의 최근 항목에서 레벨을 추출하세요.
  category: analysis
  points: 10
  answer: tail -200 /var/ossec/logs/alerts/alerts.log | grep -oP "level \d+" | sort | uniq -c | sort -rn
  answer_detail: 실시간 관제에서는 최근 시간 윈도우의 알림 추이를 지속적으로 모니터링합니다. 갑작스러운 고레벨 알림 증가는 진행 중인 공격의 신호입니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
    semantic:
      intent: 최근 30분 알림 — tail -200 alerts.log | grep -oP 'level \d+' | sort | uniq -c | sort -rn. 시간
        윈도우 추이 모니터링. 갑작스러운 고레벨 증가 = 진행 중 공격 신호.
      success_criteria:
      - tail + grep level
      - level 키워드
      - 시간 윈도우 분석
      acceptable_methods:
      - tail + 집계
      - Wazuh API time range
      - Dashboard time series
      negative_signs:
      - 윈도우 분석 없음
      - 단순 grep
      - 추이 맥락 없음
  target_vm: siem
- order: 4
  instruction: SECU VM에서 Suricata의 실시간 통계(패킷 처리량, 탐지 건수)를 확인하시오.
  hint: Suricata의 stats.log 또는 eve.json에서 통계를 확인하세요.
  category: analysis
  points: 10
  answer: tail -30 /var/log/suricata/stats.log 2>/dev/null | grep -E "detect|decoder|flow" | tail -10
  answer_detail: Suricata 통계에서 decoder.pkts(처리 패킷), detect.alert(알림 건수), flow.total(플로우 수)를 모니터링합니다. 패킷
    드롭이 발생하면 IDS 성능 이슈입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Suricata 통계 — tail -30 /var/log/suricata/stats.log | grep 'detect|decoder|flow'. decoder.pkts(처리
        패킷) + detect.alert(알림) + flow.total(플로우). 패킷 드롭 = IDS 성능 이슈.
      success_criteria:
      - stats.log 또는 suricata 통계
      - decoder/detect/flow 키워드
      - tail 통계
      acceptable_methods:
      - tail stats.log
      - jq eve.json stats
      - evebox stats view
      negative_signs:
      - stats 미점검
      - 통계 항목 없음
      - 성능 맥락 없음
  target_vm: siem
- order: 5
  instruction: ATTACKER VM에서 WEB VM에 대한 포트 스캔을 실행하시오. 스캔 완료 후 즉시 SIEM에서 탐지 여부를 확인하시오.
  hint: nmap으로 스캔 후 ssh siem으로 알림을 확인하세요.
  category: detection
  points: 12
  answer: nmap -sS -p 80,443,3000,8080,22 10.20.30.80 2>/dev/null
  answer_detail: '공격 실행 후 즉시 SIEM 확인은 SOC의 핵심 워크플로우입니다. 탐지까지의 시간(MTTD: Mean Time To Detect)이 짧을수록 SOC의
    효율성이 높습니다.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 공격 후 즉시 탐지 — nmap -sS -p 80,443,3000,8080,22 10.20.30.80. SOC 핵심 워크플로우. MTTD(Mean Time To
        Detect)↓ = 효율성↑. NIST IR Detection.
      success_criteria:
      - nmap -sS 다중 포트
      - 주요 서비스 포트
      - 공격 실행
      acceptable_methods:
      - nmap -sS
      - nmap -sT
      - scapy SYN
      negative_signs:
      - 스캔 없음
      - 단일 포트
      - MTTD 맥락 없음
  target_vm: siem
- order: 6
  instruction: ATTACKER VM에서 WEB VM의 웹 서비스에 다수의 비정상 요청을 전송하시오. 디렉토리 스캔을 시뮬레이션하시오.
  hint: curl로 존재하지 않는 경로에 연속 요청을 보내세요.
  category: detection
  points: 12
  answer: 'for path in /admin /backup /config /secret /database /wp-admin /phpmyadmin /.env /etc/passwd
    /shell; do curl -s -o /dev/null -w "$path: %{http_code}\n" http://10.20.30.80$path; done'
  answer_detail: 디렉토리 스캔은 공격 초기 정찰의 일환입니다. 다수의 404 응답이 단시간에 동일 IP에서 발생하면 SOC에서 스캐닝으로 판단합니다.
  verify:
    type: output_contains
    expect: '404'
    field: stdout
    semantic:
      intent: '디렉터리 스캔 시뮬 — for path in /admin /backup /config /secret /database /wp-admin /phpmyadmin
        /.env /etc/passwd /shell; do curl -s -o /dev/null -w ''$path: %{http_code}''; done. 다수 404 = 스캐닝.
        정찰 단계. MITRE T1595.003.'
      success_criteria:
      - for 루프 + 다중 경로
      - 404 키워드 출력
      - 민감 경로 (.env/admin/etc)
      acceptable_methods:
      - for + curl 상태 코드
      - ffuf -w wordlist
      - dirb/dirsearch
      negative_signs:
      - 경로 3개 이하
      - 단순 curl
      - 404 패턴 없음
  target_vm: siem
- order: 7
  instruction: WEB VM의 Apache 접근 로그에서 방금 ATTACKER가 보낸 디렉토리 스캔 요청을 확인하시오.
  hint: access.log에서 ATTACKER IP의 최근 요청을 확인하세요.
  category: analysis
  points: 10
  answer: grep "10.20.30.201" /var/log/apache2/access.log | tail -15
  answer_detail: WEB VM 로그에서 공격 흔적을 직접 확인합니다. 404 응답이 연속으로 기록되어 있으면 디렉토리 스캔의 증거입니다. 이 로그가 Wazuh 에이전트를
    통해 SIEM으로 전달됩니다.
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
    semantic:
      intent: Apache 로그 공격 흔적 — grep '10.20.30.201' /var/log/apache2/access.log | tail -15. 404 연속 = 디렉터리
        스캔 증거. WEB → 에이전트 → SIEM 파이프라인 검증.
      success_criteria:
      - grep ATTACKER IP access.log
      - 10.20.30.201 키워드
      - tail 최근 요청
      acceptable_methods:
      - grep + tail
      - awk + 필터
      - Wazuh agent 모니터링
      negative_signs:
      - IP 누락
      - 단순 cat
      - 파이프라인 맥락 없음
  target_vm: siem
- order: 8
  instruction: SIEM VM에서 디렉토리 스캔 공격에 대한 Wazuh 알림이 생성되었는지 확인하시오.
  hint: alerts.log에서 최근 웹 관련 알림을 확인하세요.
  category: detection
  points: 12
  answer: '🖥️ UI: Dashboard → Security events → 필터 적용 후 이벤트 확인

    📎 참고 (CLI): tail -50 /var/ossec/logs/alerts/alerts.log | grep -B 2 -A 5 -i "web\|apache\|404\|10.20.30.201"
    | tail -30'
  answer_detail: 다수의 404 오류가 Wazuh 알림으로 생성되었는지 확인합니다. 룰에 따라 개별 404가 아닌 반복 404 패턴이 탐지될 수 있습니다. 미탐지 시 커스텀
    룰 추가가 필요합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 디렉터리 스캔 SIEM 알림 — tail -50 alerts.log | grep -B 2 -A 5 -i 'web|apache|404|10.20.30.201'.
        다수 404 → 반복 패턴 룰 트리거. 미탐지 = 커스텀 룰 추가 필요. 탐지 갭.
      success_criteria:
      - grep web/apache/404
      - 최근 알림 분석
      - ATTACKER IP 매칭
      acceptable_methods:
      - grep -B/-A + 다중 패턴
      - Dashboard web alerts
      - Wazuh API web group
      negative_signs:
      - 404 패턴 없음
      - 단순 grep
      - 갭 분석 맥락 없음
  target_vm: siem
- order: 9
  instruction: 종합 관제 대시보드용 데이터를 생성하시오. 전체 SOC 현황(에이전트 상태, 알림 통계, 상위 위협, 서비스 상태)을 한 화면에 출력하시오.
  hint: 여러 소스의 데이터를 통합하여 한 번에 출력하세요.
  category: reporting
  points: 15
  answer: 'echo ''========================================'' && echo ''       SOC 종합 관제 현황 보고         ''
    && echo ''========================================'' && echo '''' && echo ''[1] 에이전트 상태'' && ssh siem
    ''/var/ossec/bin/agent_control -l 2>/dev/null | grep -E "ID:|Active|Disconnected"'' && echo '''' &&
    echo ''[2] 알림 통계'' && ssh siem ''echo "  총 알림: $(grep -c Rule /var/ossec/logs/alerts/alerts.log)";
    echo "  고위험(10+): $(grep -cE "level 1[0-5]" /var/ossec/logs/alerts/alerts.log)"'' && echo '''' &&
    echo ''[3] 상위 룰 Top 5'' && ssh siem ''grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log | sort
    | uniq -c | sort -rn | head -5'' && echo '''' && echo ''[4] 상위 소스 IP Top 5'' && ssh siem ''grep -oP
    "Src IP: \S+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -5'' && echo ''''
    && echo ''========================================'''
  answer_detail: 종합 관제 대시보드는 SOC의 핵심 도구입니다. 에이전트 상태, 알림 통계, 상위 위협, 소스 IP를 한 화면에 모아서 SOC 분석가가 빠르게 상황을 판단할
    수 있게 합니다.
  verify:
    type: output_contains
    expect: 종합 관제
    field: stdout
    semantic:
      intent: 종합 관제 대시보드 — [1] 에이전트 + [2] 알림 통계 (총/고위험) + [3] Top 5 룰 + [4] Top 5 소스 IP. SOC 분석가 빠른 상황
        판단. SOC 핵심 도구.
      success_criteria:
      - 종합 관제 키워드
      - 4 섹션 (에이전트/통계/룰/IP)
      - 통합 출력
      acceptable_methods:
      - 통합 셸 스크립트
      - Wazuh API + jq
      - Dashboard custom view
      negative_signs:
      - 섹션 2개 이하
      - 통합 안 됨
      - 대시보드 맥락 없음
  target_vm: siem
- order: 10
  instruction: 최종 점검으로, SIEM VM에서 Wazuh 설정 무결성과 룰셋 유효성을 검증하시오.
  hint: wazuh-analysisd -t로 룰 문법 검증을 수행하세요.
  category: setup
  points: 10
  answer: '🖥️ UI: Dashboard → Management → Rules → 룰 목록 검색

    📎 참고 (CLI): /var/ossec/bin/wazuh-analysisd -t 2>&1 && echo "=== CONFIG VALID ==="'
  answer_detail: 주기적인 설정 무결성 검증은 SOC 운영의 마지막 단계입니다. 룰셋에 문법 오류가 없고, 디코더가 정상 로드되는지 확인하여 SIEM이 올바르게 동작하는
    것을 보장합니다.
  verify:
    type: output_contains
    expect:
    - 무결성
    field: stdout
    semantic:
      intent: Wazuh 무결성 검증 — /var/ossec/bin/wazuh-analysisd -t. 룰셋 문법 + 디코더 정상 로드 확인. SIEM 정확 동작 보장. 주기적
        SOC 운영 검증.
      success_criteria:
      - wazuh-analysisd -t
      - 무결성 키워드
      - 검증 결과
      acceptable_methods:
      - wazuh-analysisd -t
      - Wazuh API ruleset test
      - Dashboard ruleset validate
      negative_signs:
      - -t 옵션 없음
      - 검증 없음
      - 주기적 운영 맥락 없음
  target_vm: siem
- order: 11
  instruction: 전체 SOC 실습 과정을 정리하시오. 15주간 학습한 핵심 구성 요소를 각 VM에서 한 가지씩 확인하시오.
  hint: SIEM에서 알림, SECU에서 IDS, WEB에서 웹 로그, ATTACKER에서 도구를 각각 확인하세요.
  category: reporting
  points: 15
  answer: 'echo ''=== SIEM: Wazuh alerts ==='' && ssh siem ''tail -5 /var/ossec/logs/alerts/alerts.log
    | grep Rule'' && echo ''=== SECU: Suricata ==='' && ssh secu ''tail -3 /var/log/suricata/fast.log
    2>/dev/null || echo "IDS monitoring active"'' && echo ''=== WEB: Apache ==='' && ssh web ''tail -3
    /var/log/apache2/access.log'' && echo ''=== ATTACKER: Tools ==='' && ssh attacker ''nmap --version
    2>/dev/null | head -1'' && echo ''=== SOC PIPELINE VERIFIED ==='''
  answer_detail: SOC의 4가지 핵심 구성 요소(SIEM-분석, IDS-탐지, 웹서버-자산, 공격도구-검증)가 모두 정상 동작하는 것을 확인합니다. 이 파이프라인이 SOC
    관제의 전체 체계입니다.
  verify:
    type: output_contains
    expect: SOC PIPELINE VERIFIED
    field: stdout
    semantic:
      intent: 전체 파이프라인 검증 — SIEM(alerts) + SECU(Suricata fast.log) + WEB(Apache access.log) + ATTACKER(nmap
        --version). 4 핵심 구성요소 모두 정상 동작 = SOC 관제 전체 체계 검증. 15주 종합.
      success_criteria:
      - SOC PIPELINE VERIFIED 키워드
      - 4개 VM/구성요소 모두
      - 각 VM 핵심 데이터
      acceptable_methods:
      - ssh 4VM 종합 점검
      - Ansible 통합 검증
      - Wazuh API multi-source
      negative_signs:
      - VM 2개 이하
      - 구성요소 누락
      - 종합 검증 메시지 없음
  target_vm: siem
