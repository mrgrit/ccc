lab_id: soc-nonai-week04
title: 이벤트 분석 - Wazuh 알림과 로그 이벤트 해석
version: non-ai
course: soc-nonai
week: 4
description: Wazuh가 생성하는 보안 알림의 구조를 분석하고, 룰 레벨·카테고리별 이벤트를 분류하여 실제 위협과 오탐을 구분하는 기초 분석 기술을 학습합니다.
difficulty: easy
duration_minutes: 120
objectives:
- Wazuh 알림 로그의 구조(룰 ID, 레벨, 설명)를 이해한다
- 알림 레벨별 심각도를 판단하고 분류할 수 있다
- SSH, 웹, 시스템 이벤트를 로그에서 식별하고 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 Wazuh 알림 로그의 최근 30줄을 확인하고, 알림 구조를 파악하시오.
  hint: /var/ossec/logs/alerts/alerts.log 파일을 확인하세요.
  category: analysis
  points: 5
  answer: '🖥️ UI: Dashboard → Security events → 필터 적용 후 이벤트 확인

    📎 참고 (CLI): tail -30 /var/ossec/logs/alerts/alerts.log'
  answer_detail: Wazuh 알림은 타임스탬프, Rule ID, Level, Description, 소스 정보를 포함합니다. 이 구조를 이해해야 이벤트를 효율적으로 분석할
    수 있습니다.
  verify:
    type: output_contains
    expect: 'Rule:'
    field: stdout
    semantic:
      intent: Wazuh 알림 구조 — tail -30 /var/ossec/logs/alerts/alerts.log. 타임스탬프 + Rule ID + Level + Description
        + 소스. 알림 구조 이해 → 효율 분석. SOC 분석 기초.
      success_criteria:
      - alerts.log tail -30
      - 'Rule: 키워드'
      - 알림 구조 표시
      acceptable_methods:
      - tail alerts.log
      - Dashboard Security Events
      - Wazuh API alerts
      negative_signs:
      - 로그 경로 없음
      - Rule 정보 없음
      - 단순 cat
  target_vm: siem
- order: 2
  instruction: SIEM VM에서 알림 레벨별 발생 빈도를 집계하시오.
  hint: alerts.log에서 level 필드를 추출하고 sort, uniq -c로 집계하세요.
  category: analysis
  points: 10
  answer: grep -oP "level \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn
  answer_detail: 레벨별 빈도를 파악하면 현재 SOC 환경의 보안 상태를 한눈에 볼 수 있습니다. 레벨 0-4는 정보성, 5-7은 낮은 위험, 8-11은 중간, 12 이상은
    높은 위험입니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
    semantic:
      intent: '레벨별 빈도 — grep -oP ''level \d+'' alerts.log | sort | uniq -c | sort -rn. 레벨 분포: 0-4 정보/5-7
        낮음/8-11 중간/12+ 높음. SOC 환경 보안 상태 한 눈에. 알림 튜닝 기초.'
      success_criteria:
      - grep -oP level + sort uniq -c
      - level 키워드 출력
      - 빈도 정렬
      acceptable_methods:
      - grep + sort + uniq -c
      - awk + 카운트
      - Dashboard alert level chart
      negative_signs:
      - 집계 없음
      - 정렬 없음
      - 단순 grep
  target_vm: siem
- order: 3
  instruction: SIEM VM에서 룰 ID별 알림 발생 빈도 Top 10을 추출하시오.
  hint: 'alerts.log에서 Rule: 뒤의 숫자를 추출하여 집계하세요.'
  category: analysis
  points: 10
  answer: 'grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -10'
  answer_detail: 빈번하게 발생하는 룰 ID를 파악하면 가장 많은 이벤트를 유발하는 활동을 식별할 수 있습니다. 상위 룰을 분석하여 오탐 여부를 판단하고 튜닝 대상을 선정합니다.
  verify:
    type: output_contains
    expect:
    - 'Rule:'
    - RuleID
    field: stdout
    semantic:
      intent: '룰 ID Top 10 — grep -oP ''Rule: \d+'' alerts.log | sort | uniq -c | sort -rn | head -10.
        빈번 룰 = 가장 많은 활동/오탐 후보. 튜닝 대상 선정. SOC 운영 효율화.'
      success_criteria:
      - 'Rule: 키워드 또는 RuleID'
      - Top 10 정렬
      - uniq -c 집계
      acceptable_methods:
      - grep + 집계 + head -10
      - awk Rule ID 추출
      - Wazuh API top rules
      negative_signs:
      - 집계 없음
      - Top N 없음
      - 튜닝 맥락 없음
  target_vm: siem
- order: 4
  instruction: SIEM VM에서 SSH 관련 Wazuh 알림만 필터링하여 확인하시오.
  hint: alerts.log에서 sshd 또는 authentication 키워드를 검색하세요.
  category: analysis
  points: 8
  answer: '🖥️ UI: Dashboard → Security events → 필터 적용 후 이벤트 확인

    📎 참고 (CLI): grep -B 2 -A 3 "sshd\|authentication" /var/ossec/logs/alerts/alerts.log | tail -30'
  answer_detail: SSH 관련 이벤트는 SOC에서 가장 흔한 모니터링 대상입니다. 로그인 성공/실패, 브루트포스 시도 등이 포함됩니다. Rule 5501(로그인 성공),
    5503(실패) 등이 대표적입니다.
  verify:
    type: output_contains
    expect: ssh
    field: stdout
    semantic:
      intent: SSH 알림 필터 — grep -B 2 -A 3 'sshd|authentication' alerts.log | tail -30. 흔한 모니터링 대상. Rule
        5501(성공)/5503(실패)/5710(invalid user)/5712(브루트포스). MITRE T1021.004.
      success_criteria:
      - grep sshd 또는 authentication
      - ssh 키워드 출력
      - 알림 컨텍스트
      acceptable_methods:
      - grep sshd + auth
      - Dashboard SSH 필터
      - Wazuh API rule_groups=authentication
      negative_signs:
      - SSH 필터 없음
      - Rule 5501/5503 맥락 없음
      - 단순 cat
  target_vm: siem
- order: 5
  instruction: SIEM VM에서 알림 JSON 로그를 활용하여 특정 룰의 상세 정보를 추출하시오. 룰 ID 5501의 알림을 검색하시오.
  hint: /var/ossec/logs/alerts/alerts.json에서 rule.id를 검색하세요.
  category: analysis
  points: 10
  answer: grep "5501" /var/ossec/logs/alerts/alerts.json | tail -3
  answer_detail: JSON 형식 알림에는 agent.name, rule.id, rule.level, rule.description, data.srcip 등 구조화된 필드가
    포함되어 있어 프로그래밍적 분석에 유리합니다.
  verify:
    type: output_contains
    expect: rule
    field: stdout
    semantic:
      intent: 'JSON 룰 5501 검색 — grep ''5501'' alerts.json | tail -3. JSON: agent.name + rule.id + level
        + description + data.srcip 구조화. 프로그래밍 분석 유리. SIEM 자동화 입력.'
      success_criteria:
      - grep 5501 alerts.json
      - rule 키워드 출력
      - JSON 구조
      acceptable_methods:
      - grep alerts.json
      - jq 'select(.rule.id=="5501")'
      - Wazuh API rule.id=5501
      negative_signs:
      - json 미사용
      - 5501 rule 정보 없음
      - 단순 grep
  target_vm: siem
- order: 6
  instruction: Wazuh 룰셋에서 SSH 관련 탐지 룰의 내용을 확인하시오.
  hint: /var/ossec/ruleset/rules/ 에서 sshd 관련 룰 파일을 찾으세요.
  category: analysis
  points: 10
  answer: '🖥️ UI: Dashboard → Management → Rules → 룰 목록 검색

    📎 참고 (CLI): head -50 /var/ossec/ruleset/rules/0095-sshd_rules.xml'
  answer_detail: sshd_rules.xml은 SSH 관련 탐지 룰을 정의합니다. rule id, level, description, match/regex 패턴을 포함하며,
    이 룰에 매칭되는 로그가 알림으로 생성됩니다.
  verify:
    type: output_contains
    expect: <rule
    field: stdout
    semantic:
      intent: Wazuh SSH 룰 — head -50 /var/ossec/ruleset/rules/0095-sshd_rules.xml. <rule id level description
        match/regex>. 매칭 시 알림 생성. SOC 분석가 룰 이해 필수.
      success_criteria:
      - sshd_rules.xml 확인
      - <rule 키워드
      - head/tail 또는 grep
      acceptable_methods:
      - head sshd_rules.xml
      - Dashboard Rules sshd 검색
      - Wazuh API rules
      negative_signs:
      - 룰 파일 없음
      - <rule 누락
      - 단순 ls만
  target_vm: siem
- order: 7
  instruction: WEB VM의 auth.log에서 SSH 로그인 시도 기록을 확인하시오.
  hint: /var/log/auth.log에서 sshd 관련 로그를 검색하세요.
  category: analysis
  points: 8
  answer: grep "sshd" /var/log/auth.log | tail -15
  answer_detail: auth.log는 인증 관련 이벤트를 기록합니다. Accepted(성공), Failed password(실패), Invalid user(존재하지 않는 사용자)
    등의 패턴으로 SSH 공격 여부를 판단합니다.
  verify:
    type: output_contains
    expect: sshd
    field: stdout
    semantic:
      intent: auth.log SSH — grep 'sshd' /var/log/auth.log | tail -15. Accepted(성공)/Failed password(실패)/Invalid
        user(미존재 사용자) 패턴. SSH 공격 판단. RFC 5424 syslog auth facility.
      success_criteria:
      - grep sshd auth.log
      - sshd 키워드 출력
      - tail 최근 시도
      acceptable_methods:
      - grep sshd
      - journalctl _SYSTEMD_UNIT=ssh.service
      - lastb 실패 로그인
      negative_signs:
      - auth.log 없음
      - SSH 패턴 미식별
      - 단순 cat 전체
  target_vm: siem
- order: 8
  instruction: SIEM VM에서 레벨 10 이상의 고위험 알림을 검색하시오.
  hint: alerts.log에서 level 10 이상을 필터링하세요.
  category: analysis
  points: 12
  answer: grep -E "level 1[0-5]" /var/ossec/logs/alerts/alerts.log | tail -10
  answer_detail: 레벨 10 이상의 알림은 즉시 조사가 필요한 고위험 이벤트입니다. 레벨 12는 높은 중요도, 레벨 14-15는 공격 탐지를 의미합니다. SOC에서는 이
    레벨의 알림을 우선 처리합니다.
  verify:
    type: output_contains
    expect: level
    field: stdout
    semantic:
      intent: 고위험 알림 — grep -E 'level 1[0-5]' alerts.log | tail -10. 레벨 10+ 즉시 조사 / 12 높음 / 14-15 공격 탐지.
        SOC 우선 처리. NIST IR severity 매핑.
      success_criteria:
      - grep level 10-15
      - level 키워드
      - 고위험 필터링
      acceptable_methods:
      - grep -E 정규식
      - Wazuh API level>=10
      - Dashboard level filter
      negative_signs:
      - 레벨 필터 없음
      - 단순 grep level
      - 우선순위 맥락 없음
  target_vm: siem
- order: 9
  instruction: SIEM VM에서 오늘 발생한 알림의 시간대별 분포를 확인하시오.
  hint: alerts.log에서 날짜/시간 필드를 추출하여 시간별로 집계하세요.
  category: analysis
  points: 12
  answer: grep -oP "\d{4} \w+ \d+ \d{2}" /var/ossec/logs/alerts/alerts.log | awk "{print \$NF}" | sort
    | uniq -c | sort -k2 -n
  answer_detail: 시간대별 알림 분포를 분석하면 특정 시간에 집중되는 이벤트 패턴을 발견할 수 있습니다. 비업무 시간대의 급증은 공격 징후일 수 있습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 시간대별 분포 — grep -oP '\d{4} \w+ \d+ \d{2}' alerts.log | awk '{print $NF}' | sort | uniq -c
        | sort -k2 -n. 비업무 시간대 급증 = 공격 징후. SOC 패턴 분석.
      success_criteria:
      - 타임스탬프 추출 + 시간 집계
      - uniq -c 빈도
      - 정렬
      acceptable_methods:
      - grep -oP + awk + sort
      - date +%H 추출
      - Dashboard time chart
      negative_signs:
      - 시간 집계 없음
      - 단순 grep
      - 패턴 분석 맥락 없음
  target_vm: siem
- order: 10
  instruction: SECU VM의 Suricata 로그에서 최근 탐지된 이벤트를 확인하시오.
  hint: Suricata의 eve.json 또는 fast.log 파일을 확인하세요.
  category: analysis
  points: 10
  answer: tail -20 /var/log/suricata/fast.log 2>/dev/null || tail -20 /var/log/suricata/eve.json 2>/dev/null
  answer_detail: Suricata의 fast.log는 간단한 알림을, eve.json은 상세한 JSON 형식의 이벤트를 기록합니다. IDS 이벤트와 SIEM 알림을 교차
    분석하면 위협 탐지 정확도가 높아집니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Suricata 이벤트 — tail -20 /var/log/suricata/fast.log 또는 eve.json. fast.log 간단 알림 / eve.json
        상세 JSON. IDS + SIEM 교차 분석 = 위협 탐지 정확도↑. NIST SP 800-94.
      success_criteria:
      - Suricata 로그 tail
      - fast.log 또는 eve.json
      - 최근 이벤트
      acceptable_methods:
      - tail fast.log/eve.json
      - jq eve.json 분석
      - Wazuh Suricata 통합
      negative_signs:
      - Suricata 경로 없음
      - 단순 ls
      - 교차 분석 맥락 없음
  target_vm: siem
