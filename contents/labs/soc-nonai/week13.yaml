lab_id: soc-nonai-week13
title: 보고서 작성 - SOC 운영 보고서와 인시던트 보고서 작성
version: non-ai
course: soc-nonai
week: 13
description: SOC 운영 데이터를 수집하여 일일/주간 운영 보고서와 인시던트 보고서를 작성하는 데 필요한 데이터 추출 및 정리 기법을 학습합니다.
difficulty: medium
duration_minutes: 150
objectives:
- SOC 운영 지표(KPI)를 산출하기 위한 데이터를 추출한다
- 인시던트 타임라인과 영향 분석 데이터를 수집한다
- 보고서에 포함할 통계와 시각화 데이터를 생성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIEM VM에서 오늘 발생한 총 알림 수, 고유 룰 수, 고유 소스 IP 수를 산출하시오.
  hint: alerts.log에서 wc, sort -u, uniq 명령을 활용하세요.
  category: reporting
  points: 8
  answer: 'echo "총 알림 수: $(grep -c "Rule:" /var/ossec/logs/alerts/alerts.log)"; echo "고유 룰 수: $(grep -oP
    "Rule: \d+" /var/ossec/logs/alerts/alerts.log | sort -u | wc -l)"; echo "고유 소스 IP: $(grep -oP "Src
    IP: \S+" /var/ossec/logs/alerts/alerts.log | sort -u | wc -l)"'
  answer_detail: 이 세 가지 수치는 SOC 일일 보고서의 필수 KPI입니다. 전일 대비 증가율을 함께 제시하면 보안 상태 변화 추이를 파악할 수 있습니다.
  verify:
    type: output_contains
    expect: 총 알림 수
    field: stdout
    semantic:
      intent: 일일 KPI — 총 알림 + 고유 룰 + 고유 소스 IP 수 (grep -c + sort -u + wc -l). 전일 대비 증가율 → 보안 상태 추이. SOC
        일일 보고서 필수.
      success_criteria:
      - 3종 KPI (알림/룰/IP)
      - 총 알림 수 키워드
      - wc -l 집계
      acceptable_methods:
      - grep + wc 조합
      - Wazuh API stats
      - Dashboard daily summary
      negative_signs:
      - KPI 1-2종만
      - 단순 wc
      - 추이 맥락 없음
  target_vm: siem
- order: 2
  instruction: SIEM VM에서 심각도(레벨)별 알림 분포를 보고서용 형태로 정리하시오.
  hint: 레벨을 추출하여 Low(1-4), Medium(5-9), High(10-12), Critical(13-15)로 분류하세요.
  category: reporting
  points: 12
  answer: 'echo "=== 심각도별 알림 분포 ==="; L=$(grep -cP "level [1-4]" /var/ossec/logs/alerts/alerts.log); M=$(grep
    -cP "level [5-9]" /var/ossec/logs/alerts/alerts.log); H=$(grep -cP "level 1[0-2]" /var/ossec/logs/alerts/alerts.log);
    C=$(grep -cP "level 1[3-5]" /var/ossec/logs/alerts/alerts.log); echo "Low(1-4): $L"; echo "Medium(5-9):
    $M"; echo "High(10-12): $H"; echo "Critical(13-15): $C"'
  answer_detail: 심각도별 분포는 SOC 보고서의 핵심 차트입니다. Critical과 High 비율이 높으면 긴급 대응이 필요하고, Low가 대부분이면 튜닝으로 노이즈를
    줄여야 합니다.
  verify:
    type: output_contains
    expect: 심각도별
    field: stdout
    semantic:
      intent: 심각도 분포 — Low(1-4) + Medium(5-9) + High(10-12) + Critical(13-15) grep -c. 보고서 핵심 차트. Critical/High
        비율↑ = 긴급 대응 / Low 다수 = 튜닝 필요.
      success_criteria:
      - 심각도별 키워드
      - 4 카테고리 (Low/Medium/High/Critical)
      - 각 레벨 카운트
      acceptable_methods:
      - grep -c 레벨 분류
      - awk 집계
      - Dashboard severity chart
      negative_signs:
      - 분류 2개 이하
      - 단순 카운트
      - 튜닝 맥락 없음
  target_vm: siem
- order: 3
  instruction: SIEM VM에서 에이전트(자산)별 알림 발생 건수를 보고서용으로 집계하시오.
  hint: alerts.log에서 Location 필드를 추출하여 집계하세요.
  category: reporting
  points: 10
  answer: 'echo "=== 자산별 알림 분포 ==="; grep -oP "Location: \S+" /var/ossec/logs/alerts/alerts.log | sort
    | uniq -c | sort -rn'
  answer_detail: 자산별 알림 분포를 통해 가장 많은 보안 이벤트가 발생하는 시스템을 식별합니다. 특정 자산에 알림이 집중되면 해당 시스템의 보안 강화가 필요합니다.
  verify:
    type: output_contains
    expect: 자산별
    field: stdout
    semantic:
      intent: '자산별 알림 — grep -oP ''Location: \S+'' alerts.log | sort | uniq -c | sort -rn. 자산별 분포 → 가장
        많은 이벤트 발생 시스템. 집중 자산 = 보안 강화 필요.'
      success_criteria:
      - Location 추출
      - 자산별 키워드
      - uniq -c 정렬
      acceptable_methods:
      - grep + 집계
      - Wazuh API agent stats
      - Dashboard agent overview
      negative_signs:
      - Location 미추출
      - 단순 grep
      - 자산 매핑 없음
  target_vm: siem
- order: 4
  instruction: SIEM VM에서 상위 발생 룰 Top 10과 각 룰의 설명을 함께 출력하시오.
  hint: alerts.log에서 룰 ID를 집계한 후, 룰 파일에서 설명을 매칭하세요.
  category: reporting
  points: 15
  answer: 'grep -oP "Rule: \d+" /var/ossec/logs/alerts/alerts.log | sort | uniq -c | sort -rn | head -10
    | while read cnt rule id; do desc=$(grep -rA1 "id=\"$id\"" /var/ossec/ruleset/rules/ 2>/dev/null |
    grep description | head -1 | grep -oP ">.*<" | tr -d "<>"); echo "$cnt  Rule:$id  $desc"; done'
  answer_detail: 룰 ID만으로는 의미를 파악하기 어렵습니다. 발생 횟수와 룰 설명을 함께 제시하면 보고서 독자가 어떤 유형의 이벤트가 가장 많은지 즉시 이해할 수 있습니다.
  verify:
    type: output_contains
    expect: 'Rule:'
    field: stdout
    semantic:
      intent: 'Top 10 룰 + 설명 — grep -oP ''Rule: \d+'' alerts.log | sort | uniq -c | sort -rn | head -10
        + while read + grep description /var/ossec/ruleset/rules/. 룰 ID + 설명 동시 표시 → 보고서 가독성↑.'
      success_criteria:
      - Top 10 룰 + 설명 매칭
      - while read + 그 룰별 description
      - 'Rule: 키워드'
      acceptable_methods:
      - grep + 매칭 + while
      - Wazuh API rule details
      - join + 정리
      negative_signs:
      - 설명 누락
      - 룰 ID만
      - 가독성 맥락 없음
  target_vm: siem
- order: 5
  instruction: SIEM VM에서 ATTACKER IP({{ATTACKER_IP}})의 공격 타임라인을 생성하시오. 시간순으로 이벤트를 정리하시오.
  hint: alerts.log에서 ATTACKER IP 관련 이벤트를 시간순으로 추출하세요.
  category: reporting
  points: 12
  answer: 'echo "=== 공격 타임라인: 10.20.30.201 ==="; grep -B 3 "10.20.30.201" /var/ossec/logs/alerts/alerts.log
    | grep -E "^\*\*|Rule:|10.20.30.201" | head -30'
  answer_detail: 인시던트 보고서의 핵심은 공격 타임라인입니다. 최초 탐지 시점, 공격 유형 변화, 영향 범위를 시간순으로 정리하면 사건의 전모를 파악할 수 있습니다.
  verify:
    type: output_contains
    expect: 타임라인
    field: stdout
    semantic:
      intent: 공격 타임라인 — grep -B 3 '10.20.30.201' alerts.log | grep -E '^\*\*|Rule:|10.20.30.201' | head
        -30. 인시던트 보고서 핵심. 최초 탐지 시점 + 공격 유형 변화 + 영향 범위 시간순.
      success_criteria:
      - 타임라인 키워드
      - ATTACKER IP 시간순
      - 타임스탬프 + 룰 + IP
      acceptable_methods:
      - grep + 시간 매칭
      - awk 시간 추출
      - Dashboard timeline view
      negative_signs:
      - 시간순 아님
      - ATTACKER IP 누락
      - 타임라인 형식 없음
  target_vm: siem
- order: 6
  instruction: WEB VM에서 Apache 접근 로그의 요청 통계(총 요청 수, 성공/오류 비율, 상위 URL)를 산출하시오.
  hint: access.log에서 상태코드와 URL을 추출하여 집계하세요.
  category: reporting
  points: 12
  answer: 'echo "총 요청: $(wc -l < /var/log/apache2/access.log)"; echo "=== 상태코드 분포 ==="; awk "{print \$9}"
    /var/log/apache2/access.log | sort | uniq -c | sort -rn | head -5; echo "=== 상위 URL ==="; awk "{print
    \$7}" /var/log/apache2/access.log | sort | uniq -c | sort -rn | head -5'
  answer_detail: 웹 서비스 통계는 SOC 운영 보고서의 중요 항목입니다. 4xx/5xx 오류 비율이 높으면 공격 시도를, 특정 URL 집중은 스캐닝을 의미합니다.
  verify:
    type: output_contains
    expect: 총 요청
    field: stdout
    semantic:
      intent: Apache 통계 — wc -l + awk '$9' (status) | uniq -c + awk '$7' (URL) | uniq -c. 4xx/5xx 비율 =
        공격 시도 / URL 집중 = 스캐닝. SOC 운영 보고서 웹 섹션.
      success_criteria:
      - 총 요청 수
      - 상태코드 + URL 분포
      - Top 5 정렬
      acceptable_methods:
      - awk + 집계
      - GoAccess 자동
      - Logstash + Kibana
      negative_signs:
      - 통계 1종만
      - 단순 wc
      - 4xx/5xx 분석 없음
  target_vm: siem
- order: 7
  instruction: SECU VM에서 Suricata IDS의 탐지 통계를 산출하시오. 이벤트 유형별 건수를 집계하시오.
  hint: Suricata 로그에서 이벤트 유형(event_type)을 추출하세요.
  category: reporting
  points: 10
  answer: 'grep -oP "\[Classification: [^]]+" /var/log/suricata/fast.log 2>/dev/null | sort | uniq -c
    | sort -rn | head -10 || echo "Suricata stats: $(wc -l < /var/log/suricata/fast.log 2>/dev/null ||
    echo 0) events"'
  answer_detail: Suricata 탐지 통계는 네트워크 레벨 위협 현황을 보여줍니다. Classification별 분류(Attempted Admin/User, Web Application
    Attack 등)로 위협 유형을 파악합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'Suricata 통계 — grep -oP ''\[Classification: [^]]+'' fast.log | sort | uniq -c | sort -rn
        | head -10. Classification별 (Attempted Admin/Web App Attack 등). 네트워크 위협 현황. SOC 보고서 IDS 섹션.'
      success_criteria:
      - Classification 추출
      - Suricata 로그 분석
      - uniq -c 정렬
      acceptable_methods:
      - grep -oP + 집계
      - jq eve.json classification
      - evebox 통계
      negative_signs:
      - Classification 미추출
      - 단순 wc
      - 위협 유형 분류 없음
  target_vm: siem
- order: 8
  instruction: SIEM VM에서 Wazuh 에이전트의 상태 요약(활성/비활성/미연결)을 보고서용으로 정리하시오.
  hint: /var/ossec/bin/agent_control -l 결과를 파싱하세요.
  category: reporting
  points: 10
  answer: '🖥️ UI: Dashboard → Agents → 에이전트 목록/상태 확인

    📎 참고 (CLI): echo "=== 에이전트 상태 요약 ==="; /var/ossec/bin/agent_control -l 2>/dev/null; echo "Active:
    $(/var/ossec/bin/agent_control -l 2>/dev/null | grep -c Active)"; echo "Disconnected: $(/var/ossec/bin/agent_control
    -l 2>/dev/null | grep -c Disconnected)"'
  answer_detail: 에이전트 상태 요약은 SOC 운영 보고서의 필수 항목입니다. 비활성 에이전트는 로그 수집 누락을 의미하므로 즉시 조치가 필요합니다.
  verify:
    type: output_contains
    expect: 에이전트 상태
    field: stdout
    semantic:
      intent: 에이전트 상태 요약 — agent_control -l + grep -c Active/Disconnected. SOC 보고서 필수. 비활성 에이전트 = 로그 수집
        누락 → 즉시 조치.
      success_criteria:
      - agent_control -l + 카운트
      - 에이전트 상태 키워드
      - Active/Disconnected 분리
      acceptable_methods:
      - agent_control -l + 카운트
      - Wazuh API agent stats
      - Dashboard agent overview
      negative_signs:
      - 상태 분리 없음
      - 단순 ls
      - 수집 누락 맥락 없음
  target_vm: siem
- order: 9
  instruction: 전체 SOC 인프라의 서비스 가동 상태를 요약하시오. SIEM, SECU, WEB VM의 핵심 서비스 상태를 한 번에 확인하시오.
  hint: 각 VM에 ssh로 접속하여 핵심 서비스의 systemctl is-active를 확인하세요.
  category: reporting
  points: 12
  answer: echo '=== SOC 서비스 상태 요약 ===' && echo 'SIEM:' && ssh siem 'systemctl is-active wazuh-manager
    rsyslog' && echo 'SECU:' && ssh secu 'systemctl is-active suricata' && echo 'WEB:' && ssh web 'systemctl
    is-active apache2'
  answer_detail: SOC 보고서에는 전체 인프라의 가동 상태가 포함되어야 합니다. 모든 핵심 서비스가 active 상태인지 한 눈에 확인하여 가용성 문제를 조기 발견합니다.
  verify:
    type: output_contains
    expect: SOC 서비스
    field: stdout
    semantic:
      intent: 전체 인프라 가동 상태 — ssh siem 'systemctl is-active wazuh-manager rsyslog' + ssh secu 'suricata'
        + ssh web 'apache2'. 모든 핵심 서비스 active 검증 → 가용성 문제 조기 발견.
      success_criteria:
      - SOC 서비스 키워드
      - 3 VM 서비스 점검
      - ssh + systemctl
      acceptable_methods:
      - ssh + systemctl is-active
      - Ansible playbook 점검
      - Wazuh API 모니터링
      negative_signs:
      - VM 1-2개만
      - 서비스 점검 누락
      - 가용성 맥락 없음
  target_vm: siem
