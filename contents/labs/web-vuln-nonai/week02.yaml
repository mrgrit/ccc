    ```
    Layer 1: Prepared Statement (가장 효과적)
      - PHP: PDO::prepare() + bindParam()
      - Java: PreparedStatement + setString()
      - Python: cursor.execute("SELECT ... WHERE id=%s", (val,))
      - Node.js: pg.query('SELECT ... WHERE id=$1', [val])

    Layer 2: ORM 자동 escape
      - Django ORM, SQLAlchemy, Hibernate, TypeORM

    Layer 3: 입력 검증 (화이트리스트)
      - 정규식 (^[a-zA-Z0-9_]+$)
      - 길이 제한
      - 타입 강제 (int/uuid)

    Layer 4: WAF (시그니처 차단)
      - ModSecurity OWASP CRS
      - AWS WAF / Cloudflare WAF

    Layer 5: 최소 권한 DB 계정
      - SELECT only (점검용)
      - DROP/CREATE 권한 제거
      - GRANT 명령으로 컬럼 단위 제한
    ```

