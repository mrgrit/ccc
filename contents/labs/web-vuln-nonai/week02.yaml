    # [+] bcrypt

    hashid '$argon2id$v=19$m=65536,t=3,p=4$...'
    # [+] Argon2
    ```

    ▶ 2단계: 도구 B — hashcat (GPU 크래킹)
    설치: `sudo apt install hashcat`. 사용:
    ```bash
    # 해시 모드 (--help | grep -i 'md5\|bcrypt' 으로 식별)
    # MD5 = -m 0, SHA1 = -m 100, bcrypt = -m 3200, NTLM = -m 1000
    echo '0192023a7bbd73250516f069df18b500' > hash.txt
    hashcat -m 0 hash.txt /usr/share/wordlists/rockyou.txt
    # 또는 brute force (a 0=straight, 3=brute, 6=hybrid)
    hashcat -m 0 -a 3 hash.txt ?l?l?l?l?l?d?d?d
