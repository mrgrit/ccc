- order: 3
  instruction: |-
    {{WEB_IP}} 대상으로 패스워드 정책 검증을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl 으로 다양한 패스워드 시도 (정책 검증)
    ```bash
    # 회원가입 endpoint 에서 다양 패스워드
    PASSWORDS=("a" "12345" "password" "admin" "Pa\$\$word" "Passw0rd!" "VeryLong\$\$ecure123!")
    for p in "${PASSWORDS[@]}"; do
      RESP=$(curl -s -X POST http://10.20.30.80/api/Users \
        -H 'Content-Type: application/json' \
        -d "{\"email\":\"test+$RANDOM@x.com\",\"password\":\"$p\"}" -w '\n%{http_code}')
      echo "=== '$p' → $RESP" | head -2
    done
    echo "패스워드 정책 검증 완료"
    ```

    ▶ 2단계: 정책 검증 항목 (NIST SP 800-63B + OWASP)
    | 정책 | 권장값 |
    |---|---|
    | 최소 길이 | 8 자 이상 (NIST) / 12 자 (높은 보안) |
    | 복잡도 | 대소문자 + 숫자 + 특수문자 (혹은 길이 ↑로 대체) |
    | 사전 차단 | rockyou / haveibeenpwned API |
    | 재사용 차단 | 최근 5~10 개 history |
    | 만료 | NIST 권장 만료 안 함 (단 침해 시) |
    | MFA | 2FA / WebAuthn 권장 |

    ▶ 3단계: 도구 B — Have I Been Pwned API (k-Anonymity)
    ```bash
    # password 의 SHA1 hash 의 앞 5자리만 전송 → 일치 여부 확인
    PASS="Password123"
    HASH=$(echo -n "$PASS" | sha1sum | cut -d' ' -f1 | tr 'a-z' 'A-Z')
    PREFIX=${HASH:0:5}
    SUFFIX=${HASH:5}
    curl -s "https://api.pwnedpasswords.com/range/$PREFIX" | grep -i "^$SUFFIX:"
    # 출력: 5BAA61E4C9B93F3F0682250B6CF8331B7EE68FD8:3861493 (3.8M회 노출)
    ```

    ▶ 4단계: 도구 C — pwninspector / zxcvbn (강도 측정)
    ```bash
    # zxcvbn (DropBox 의 password strength estimator)
    npm install -g zxcvbn-cli
    echo "Password123!" | zxcvbn-cli
    # score: 0~4 (4 = 매우 안전)
    # crack_time: 추정 크랙 시간
    ```

    ▶ 5단계: 도구 D — hashcat 으로 사전 공격 시뮬
    ```bash
    # 추출한 password 해시로 사전 공격
    echo '0192023a7bbd73250516f069df18b500' > hash.txt
    hashcat -m 0 -a 0 hash.txt /usr/share/wordlists/rockyou.txt -O
    # 빠르게 크랙되면 = 사전 공격 가능 = 약한 password
    ```

    ▶ 6단계: 답변
    각 password 응답 (200=허용 / 400=거부) quote + 정책 위반 식별 + NIST 권장 1 문장.
  hint: 'curl 다양 password / NIST 정책 표 / HIBP API k-anonymity / zxcvbn 강도 / hashcat 사전.'
