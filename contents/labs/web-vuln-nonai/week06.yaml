          .sessionFixation().migrateSession()  // 재생성
          .maximumSessions(1)                   // 동시 세션 1
          .maxSessionsPreventsLogin(false)      // 새 로그인 시 기존 무효화
          .sessionRegistry(sessionRegistry())
        ).rememberMe(remember -> remember
          .key("uniqueAndSecret")
