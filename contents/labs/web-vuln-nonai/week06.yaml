- order: 1
  instruction: |-
    {{WEB_IP}} 대상으로 로그인 메커니즘 분석을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl 으로 로그인 흐름 분석
    ```bash
    # 1. 정상 로그인
    curl -i -X POST http://10.20.30.80/rest/user/login \
      -H 'Content-Type: application/json' \
      -d '{"email":"admin@juice-sh.op","password":"admin123"}'
    # 응답에서 토큰 형식 (JWT vs cookie) 확인

    # 2. 잘못된 비밀번호 (응답 차이)
    curl -i -X POST http://target/rest/user/login \
      -d '{"email":"admin@x.com","password":"wrong"}' -H 'Content-Type: application/json'

    # 3. 미존재 사용자 (Username Enumeration 검증)
    curl -i -X POST http://target/rest/user/login \
      -d '{"email":"nobody@x.com","password":"any"}' -H 'Content-Type: application/json'
    # 메시지가 "user not found" vs "wrong password" 으로 다르면 enumeration 가능
    echo "로그인 메커니즘 분석 완료"
    ```

    ▶ 2단계: 도구 B — Burp Suite Repeater + Compare
    1. Proxy 캡처 → Repeater 로 다양 변형
    2. **Compare** 으로 응답 길이/시간/상태 차이 자동 식별

    ▶ 3단계: 도구 C — sqlmap (인증 SQLi 자동)
    ```bash
    sqlmap -u "http://target/rest/user/login" \
           --data='{"email":"a","password":"b"}' --batch --level=5 --risk=3
    ```

    ▶ 4단계: 인증 메커니즘 카테고리표
    | 메커니즘 | 단서 |
    |---|---|
    | Session Cookie | `Set-Cookie: PHPSESSID=...` |
    | JWT | `eyJ...` (header.payload.signature) |
    | OAuth 2.0 | `redirect_uri` / `code` |
    | SAML | XML POST + AuthnRequest |
    | API Key | `X-API-Key` 헤더 |
    | Basic Auth | `Authorization: Basic ...` |

    ▶ 5단계: 답변
    응답 + 토큰 형식 quote + 메커니즘 식별 + Username Enumeration 가능 여부.
  hint: 'curl 정상/오류/미존재 비교 / Burp Compare / sqlmap auth / 메커니즘 표.'
