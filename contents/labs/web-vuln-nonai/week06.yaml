- order: 7
  instruction: |-
    {{WEB_IP}} 대상으로 JWT 토큰 구조 분석을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — base64 + jq 수동 디코딩
    ```bash
    # 1. JWT 획득
    JWT=$(curl -s -X POST http://10.20.30.80/rest/user/login \
      -H 'Content-Type: application/json' \
      -d '{"email":"admin@juice-sh.op","password":"admin123"}' \
      | jq -r '.authentication.token')
    echo "JWT: $JWT"

    # 2. 3 부분 분해 (Header.Payload.Signature)
    HEADER=$(echo "$JWT" | cut -d. -f1)
    PAYLOAD=$(echo "$JWT" | cut -d. -f2)
    SIG=$(echo "$JWT" | cut -d. -f3)

    # 3. base64 decode (URL-safe → 표준 + padding)
    b64url_decode() {
      local s="$1"
      # URL-safe → 표준 변환
      s="${s//-/+}"
      s="${s//_//}"
      # padding 추가
      local pad=$((4 - ${#s} % 4))
      [[ $pad -lt 4 ]] && s="${s}$(printf '%*s' $pad | tr ' ' '=')"
      echo -n "$s" | base64 -d 2>/dev/null
    }

    echo "=== Header ==="; b64url_decode "$HEADER" | jq .
    echo "=== Payload ==="; b64url_decode "$PAYLOAD" | jq .
    echo "=== Signature (raw bytes) ==="; b64url_decode "$SIG" | xxd | head -2
    echo "JWT 토큰 구조 분석 완료"
    ```
    출력 예:
    ```json
    Header: {"typ":"JWT","alg":"HS256"}
    Payload: {"sub":"admin","role":"admin","iat":1715000000,"exp":1715003600}
    ```

    ▶ 2단계: 도구 B — jwt_tool (가장 종합)
    설치: `git clone https://github.com/ticarpi/jwt_tool ~/jwt_tool`. 사용:
    ```bash
    python3 ~/jwt_tool/jwt_tool.py "$JWT"
    # 출력: Header decoded / Payload decoded / Signature analysis / 알려진 약점
    ```

    ▶ 3단계: 도구 C — pyjwt (Python lib)
    ```python
    import jwt
    decoded = jwt.decode(token, options={"verify_signature": False})
    print(decoded)  # 서명 검증 안 함 (분석용)
    print(jwt.get_unverified_header(token))
    ```

    ▶ 4단계: 도구 D — jwt.io (웹 GUI)
