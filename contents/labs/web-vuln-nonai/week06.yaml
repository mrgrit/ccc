    const session = require('express-session');
    const RedisStore = require('connect-redis').default;
    app.use(session({
      store: new RedisStore({ client: redisClient }),
      secret: process.env.SESSION_SECRET,  // 환경변수 (코드 X)
      name: '__Host-session',  // __Host- prefix
      cookie: {
        httpOnly: true,
        secure: true,
        sameSite: 'strict',
        maxAge: 1800000,  // 30분 idle
      },
      resave: false,
      saveUninitialized: false,
      genid: () => require('crypto').randomBytes(32).toString('base64url'),
      rolling: true,  // 활성 시 timeout 갱신
    }));

    app.post('/login', async (req, res) => {
      // 인증 후
      req.session.regenerate(err => {  // 세션 재생성 (fixation 방어)
        req.session.userId = user.id;
        res.redirect('/dashboard');
      });
    });
