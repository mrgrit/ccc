- order: 4
  instruction: |-
    {{WEB_IP}} 대상으로 세션 토큰 엔트로피 분석을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl 으로 다수 토큰 수집
    ```bash
    ※ /tmp/tokens.txt
    for i in $(seq 1 200); do
      curl -s -X POST http://10.20.30.80/rest/user/login \
        -H 'Content-Type: application/json' \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' \
        | jq -r '.authentication.token' >> /tmp/tokens.txt
    done
    wc -l /tmp/tokens.txt
    ```

    ▶ 2단계: 도구 B — Burp Sequencer (FIPS 140-2 통계 검정)
    1. Burp Proxy → 로그인 요청 캡처
    2. **Send to Sequencer**
    3. Token Location: 응답 본문에서 토큰 부분 marking
    4. **Live Capture** → 200~10000 토큰 자동 수집
    5. **Analyze Now** → entropy / character set / FIPS 140-2 결과
    6. < 60 bits 엔트로피 = 예측 가능 (취약)

    ▶ 3단계: 도구 C — ent 명령 (Linux 통계 분석)
    ```bash
    sudo apt install ent
    # base64 토큰을 binary 로 변환 후 분석
    cat /tmp/tokens.txt | base64 -d > /tmp/tokens.bin 2>/dev/null
    ent /tmp/tokens.bin
    # 출력: Entropy = 7.998 bits per byte (이상적 8.0)
    # Chi square distribution: 유의확률 (10%~90% 정상)
    ```

    ▶ 4단계: 도구 D — Python 통계 분석
    ```python
    import math
    from collections import Counter
    tokens = open('/tmp/tokens.txt').read().splitlines()
    # Shannon entropy
    all_chars = ''.join(tokens)
    freq = Counter(all_chars)
    total = sum(freq.values())
    entropy = -sum((c/total) * math.log2(c/total) for c in freq.values())
    print(f"Shannon entropy: {entropy:.2f} bits/char")
    # JWT 의 base64 알파벳: ~6 bits/char 이상이 정상

    # 길이/패턴 분석
    print(f"length variance: {set(len(t) for t in tokens)}")  # 고정 길이여야
    ```

    ▶ 5단계: 약한 토큰 패턴 카탈로그
    | 패턴 | 위험 |
    |---|---|
    | timestamp 포함 (`token_1715000000_user1`) | 추측 가능 |
    | sequential ID (`token_1234`) | brute force |
    | base64(md5(user)) | hash 역산 |
    | 약한 JWT 비밀 키 | hashcat 크랙 |
    | 짧음 (<128 bits) | 무차별 |

    ▶ 6단계: 답변
    Burp Sequencer 또는 ent 출력 quote (entropy 값) + FIPS 통과 여부 + 권장 (cryptographic random + 256 bits 이상) 1 문장.
  hint: 'curl 다수 수집 / Burp Sequencer FIPS / ent 통계 / Python Shannon entropy / 약한 패턴 표.'
