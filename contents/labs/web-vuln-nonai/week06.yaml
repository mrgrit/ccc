    ph = PasswordHasher(time_cost=2, memory_cost=65536, parallelism=2)
    hash = ph.hash('mypassword')
    print(hash)
    print(ph.verify(hash, 'mypassword'))
    "
    ```

    ▶ 3단계: 도구 B — HIBP API 자동 검증 (회원가입 시)
    ```python
    import hashlib, requests
    def password_pwned(pwd):
        h = hashlib.sha1(pwd.encode()).hexdigest().upper()
        prefix, suffix = h[:5], h[5:]
        r = requests.get(f'https://api.pwnedpasswords.com/range/{prefix}')
        for line in r.text.splitlines():
            if line.startswith(suffix + ':'):
                return int(line.split(':')[1])  # 노출 횟수
        return 0

    # 사용
    if password_pwned('Password123') > 0:
        raise ValueError("Password has been exposed in breaches")
    ```

    ▶ 4단계: 도구 C — WebAuthn / FIDO2 (Python flask)
    ```bash
    pip install webauthn  # py_webauthn 라이브러리
    ```
    ```python
    from webauthn import generate_registration_options, verify_registration_response
    options = generate_registration_options(
      rp_id="victim.com",
      rp_name="Example",
      user_id=user.id.encode(),
      user_name=user.email,
    )
    # 사용자가 YubiKey / TouchID 로 등록
    ```

    ▶ 5단계: 도구 D — 계정 잠금 (Redis sliding window)
    ```python
    import redis
    r = redis.Redis()
    def check_login(user_id):
        key = f'login_fails:{user_id}'
        fails = r.incr(key)
        r.expire(key, 900)  # 15분
        if fails >= 5:
            raise Exception("Account locked. Try again in 15 minutes.")
    ```

    ▶ 6단계: 도구 E — fail2ban (server-level brute force 방어)
    ```bash
    sudo apt install fail2ban
    cat > /etc/fail2ban/jail.d/web-login.conf <<'EOF'
    [web-login]
    enabled = true
    filter = web-login
    logpath = /var/log/nginx/access.log
    maxretry = 5
    findtime = 300
    bantime = 3600
    EOF
    cat > /etc/fail2ban/filter.d/web-login.conf <<'EOF'
    [Definition]
    failregex = ^<HOST>.*"POST /login.*" 401
    EOF
    sudo systemctl restart fail2ban
    ```

