  instruction: |-
    {{WEB_IP}} 대상으로 SSRF 방어 (URL 화이트리스트)를 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 5층 방어
    ```
    Layer 1: URL 스킴 화이트리스트 (http/https only)
    Layer 2: 도메인 화이트리스트 (사전 등록만 허용)
    Layer 3: DNS resolve 후 IP 화이트리스트 (private/loopback 차단)
    Layer 4: 응답 redirect 거부 (max_redirect=0)
    Layer 5: egress firewall (network level)
    ```

    ▶ 2단계: 도구 A — Python 안전 fetch 라이브러리
    ```python
    import requests, ipaddress, socket
    from urllib.parse import urlparse

    ALLOWED_SCHEMES = {'http', 'https'}
    ALLOWED_DOMAINS = {'images.example.com', 'cdn.example.com'}

    def safe_fetch(url):
        u = urlparse(url)
        # 1. scheme
        if u.scheme not in ALLOWED_SCHEMES:
            raise ValueError(f"Scheme not allowed: {u.scheme}")
        # 2. domain
        if u.hostname not in ALLOWED_DOMAINS:
            raise ValueError(f"Domain not in whitelist: {u.hostname}")
        # 3. DNS resolve + IP 검증
        try:
            ip = socket.gethostbyname(u.hostname)
        except socket.gaierror:
            raise ValueError("DNS resolve failed")
        addr = ipaddress.ip_address(ip)
        if addr.is_private or addr.is_loopback or addr.is_link_local or addr.is_multicast:
            raise ValueError(f"Internal IP blocked: {ip}")
        # 4. fetch (redirect 거부)
        return requests.get(url, allow_redirects=False, timeout=5)
    ```

    ▶ 3단계: 도구 B — Node.js 안전 라이브러리 (ssrf-req-filter)
    ```bash
    npm install ssrf-req-filter
    ```
    ```javascript
    const ssrfFilter = require('ssrf-req-filter');
    const fetch = require('node-fetch');
    fetch(url, {agent: ssrfFilter(url)});  // 자동 SSRF 차단
    ```

    ▶ 4단계: 도구 C — Java URLValidator (Apache Commons)
    ```java
    UrlValidator validator = new UrlValidator(new String[]{"http","https"});
    if (!validator.isValid(url)) throw new SSRFException();
    InetAddress addr = InetAddress.getByName(new URL(url).getHost());
    if (addr.isLoopbackAddress() || addr.isAnyLocalAddress() || addr.isSiteLocalAddress())
        throw new SSRFException("Internal IP blocked");
    ```

    ▶ 5단계: 도구 D — egress firewall (network level)
    ```bash
    # iptables 으로 egress 제한
    iptables -A OUTPUT -d 169.254.0.0/16 -j REJECT  # 메타데이터 차단
    iptables -A OUTPUT -d 10.0.0.0/8 -j REJECT      # 사설망 차단
    iptables -A OUTPUT -d 172.16.0.0/12 -j REJECT
    iptables -A OUTPUT -d 192.168.0.0/16 -j REJECT
    iptables -A OUTPUT -d 127.0.0.0/8 -j REJECT
    ```

    ▶ 6단계: 답변
    safe_fetch 함수 quote + 5 layer 중 적용 layer + 방어 (DNS pin + IP 화이트리스트 + egress) 1 문장.
