lab_id: web-vuln-nonai-week01
title: HTTP 기초 실습
version: non-ai
course: web-vuln-nonai
week: 1
description: HTTP 프로토콜의 구조, 요청/응답 메시지, 헤더 분석 등 웹 보안의 기초를 실습합니다.
difficulty: easy
duration_minutes: 120
objectives:
- HTTP 요청/응답 구조를 이해한다
- 주요 HTTP 헤더의 보안 의미를 파악한다
- 웹 서버 정보 수집 기법을 익힌다
pass_threshold: 0.6
steps:
- order: 1
  instruction: |-
    curl을 사용하여 대상 웹 서버(http://{{WEB_IP}})에 GET 요청을 보내고 응답 헤더를 확인하시오.

    ■ 실습 방법 (3 가지 도구 병행 — 학생은 모두 직접 입력해 비교 학습)

    ▶ 1단계: 환경 준비 — attacker VM 에 SSH 접속
    터미널을 열고 attacker VM 으로 접속:
    ```bash
    ssh ccc@10.20.30.201        # 비밀번호 "1"
    # 또는 외부망: ssh ccc@192.168.0.112
    ```

    ▶ 2단계: 도구 A — curl -I (모든 시스템 기본)
    터미널에 입력:
    ```bash
    curl -I http://10.20.30.80
    ```
    예상 출력 (Server/Content-Type/Set-Cookie/X-Powered-By 헤더 확인):
    ```
    HTTP/1.1 200 OK
    Server: Apache/2.4.x (Ubuntu)
    Content-Type: text/html
    Set-Cookie: ...
    ```

    ▶ 3단계: 도구 B — whatweb (자동 기술 스택 식별)
    설치 (이미 됨): `sudo apt install whatweb`. 다음 명령 입력:
    ```bash
    whatweb -v http://10.20.30.80
    ```
    예상 출력 (외부 example.com 으로 실측한 결과 형태 동일):
    ```
    WhatWeb report for http://10.20.30.80
    Status    : 200 OK
    Title     : Example Domain
    Summary   : Allow[GET, HEAD], HTML5, HTTPServer[cloudflare or apache]
    [ HTTPServer ]
        String : Apache/2.4.x (from server string)
    ```
    ★ whatweb 는 단순 헤더 외에 **사용 중인 프레임워크/라이브러리/CMS 까지 자동 식별** —
    curl 보다 한 단계 위 정보 제공.

    ▶ 4단계: 도구 C — httpie (사람 친화적 HTTP 클라이언트)
    설치 (이미 됨): `sudo apt install httpie` (또는 `pip install httpie`). 입력:
    ```bash
    http --print=Hh HEAD http://10.20.30.80
    ```
    예상 출력 (요청·응답 헤더가 색상으로 강조):
    ```
    HEAD / HTTP/1.1
    Host: 10.20.30.80
    User-Agent: HTTPie/2.6.0

    HTTP/1.1 200 OK
    Content-Type: text/html
    Server: ...
    Allow: GET, HEAD
    ```
    `--print=Hh` 는 요청 헤더(H) + 응답 헤더(h) 모두 출력.

    ▶ 5단계: 답변 작성 (채점 기준)
    각 도구 출력 중 **`Server:` / `HTTP/1.1 200 OK` / `Content-Type:` 한 줄 이상**을
    ```` ``` ```` 블록으로 직접 quote 하고, 도구 간 차이 1~2 문장 분석.
    예: "curl -I 는 헤더만, whatweb 은 프레임워크 추가 식별, httpie 는 색상 강조."
  hint: 'curl -I 가 가장 단순. whatweb -v 는 자동 기술 스택 식별. http HEAD 는 가독성 우수.'
  category: http_basics
  points: 8
  answer: curl -I http://10.20.30.80
  answer_detail: curl -I는 HEAD 요청으로 응답 헤더만 받습니다. Server, Content-Type, Set-Cookie
    등 보안 관련 헤더를 확인합니다.
  verify:
    type: output_contains
    expect: HTTP/
    field: stdout
    semantic:
      intent: HTTP HEAD 요청 — curl -I http://10.20.30.80. HEAD 요청 = 응답 헤더만. Server/Content-Type/Set-Cookie
        보안 헤더 확인. RFC 7231 HTTP 1.1.
      success_criteria:
      - curl -I
      - HTTP/ 키워드
      - 응답 헤더
      acceptable_methods:
      - curl -I
      - wget --server-response
      - httpie HEAD
      negative_signs:
      - -I 옵션 없음
      - GET 본문만
      - 헤더 분석 없음
  target_vm: attacker
- order: 2
  instruction: |-
    HTTP 응답 코드 종류를 확인하시오: 존재하는 페이지와 존재하지 않는 페이지의 응답 코드 차이.

    ■ 실습 방법 (3 가지 도구로 응답 코드 분포 학습)

    ▶ 1단계: 도구 A — curl -w (응답 코드만 추출)
    ```bash
    echo "존재 페이지:"
    curl -o /dev/null -s -w "HTTP %{http_code}\n" http://10.20.30.80/

    echo "미존재 페이지:"
    curl -o /dev/null -s -w "HTTP %{http_code}\n" http://10.20.30.80/nonexistent
    ```
    실측 출력 (example.com 기준 동일 패턴):
    ```
    존재 페이지:
    HTTP 200
    미존재 페이지:
    HTTP 404
    ```
    `-o /dev/null` (본문 버림) + `-s` (silent) + `-w` (커스텀 출력) 조합.

    ▶ 2단계: 도구 B — httpie (헤더만 출력 -h)
    ```bash
    http -h http://10.20.30.80/             # 존재 페이지
    http -h http://10.20.30.80/nonexistent  # 미존재
    ```
    예상 출력:
    ```
    HTTP/1.1 200 OK
    Date: ...
    Content-Type: text/html
    ```
    같은 명령으로 미존재 → `HTTP/1.1 404 Not Found` 또는 `405 Method Not Allowed`.

    ▶ 3단계: 도구 C — ab (Apache Benchmark, 다수 요청 통계)
    설치 (이미 됨): `sudo apt install apache2-utils`. 입력:
    ```bash
    ab -n 10 -c 1 -q http://10.20.30.80/
    ```
    출력 끝 부분 핵심 라인:
    ```
    Complete requests:      10
    Failed requests:        0
    Non-2xx responses:      0      # ← 여기 0 이 아니면 비정상
    ```
    `-n 10` 10 요청, `-c 1` 동시성 1, `-q` quiet 진행바 끔.

    ▶ 4단계: 응답 코드 종류 정리
    | 코드 | 의미 | 도구로 확인하는 법 |
    |---|---|---|
    | 200 | OK | curl/http 직접 |
    | 301/302 | 리다이렉트 | curl -L 따라가거나 -I 로 Location 헤더 |
    | 401 | 인증 필요 | http GET /admin (WWW-Authenticate 헤더) |
    | 403 | 금지 | curl /private (Forbidden 본문) |
    | 404 | 없음 | curl /nonexistent |
    | 500 | 서버 에러 | curl /trigger-error |

    ▶ 5단계: 답변 작성
    각 코드 (200/404 최소) 의 ```bash``` 블록 명령 + ```` ``` ```` stdout 인용 + 1줄 의미.
  hint: 'curl -w 는 응답 코드만, http -h 는 헤더 전체, ab 는 통계. 세 도구 비교 학습.'
  category: http_basics
  points: 8
  answer: echo '존재하는 페이지:' && curl -o /dev/null -s -w '%{http_code}' http://10.20.30.80/
    && echo '' && echo '존재하지 않는 페이지:' && curl -o /dev/null -s -w '%{http_code}' http://10.20.30.80/nonexistent
    && echo ''
  answer_detail: 200은 성공, 404는 페이지 없음, 301/302는 리다이렉트, 500은 서버 에러입니다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: 응답 코드 비교 — curl -o /dev/null -w '%{http_code}' / vs /nonexistent. 200
        성공 / 404 미존재 / 301-302 redirect / 500 서버 오류. RFC 7231 Status Codes.
      success_criteria:
      - 존재 + 미존재 페이지 비교
      - 200 키워드
      - 응답 코드 출력
      acceptable_methods:
      - curl -w
      - wget -S
      - httpie 응답
      negative_signs:
      - 단일 페이지만
      - 코드 미비교
      - 단순 GET
  target_vm: attacker
- order: 3
  instruction: |-
    HTTP 요청 메서드(GET, POST, PUT, DELETE, OPTIONS)를 테스트하여 서버가 허용하는 메서드를 확인하시오.

    ■ 실습 방법 (3 도구로 메서드 검증)

    ▶ 1단계: 도구 A — curl -X OPTIONS (단일 OPTIONS 요청)
    ```bash
    curl -s -X OPTIONS http://10.20.30.80/ -I 2>/dev/null | grep -i 'allow\|public'
    echo "OPTIONS 확인 완료"
    ```
    예상 출력 (정상 서버는 `Allow:` 헤더 반환):
    ```
    Allow: GET, HEAD, POST, OPTIONS
    OPTIONS 확인 완료
    ```
    ★ `Allow` 헤더에 PUT/DELETE 가 있으면 위험 (RESTful 의도 외 활성화 시 권한 없는 변경 가능).

    ▶ 2단계: 도구 B — nmap http-methods 스크립트 (NSE)
    nmap 은 OPTIONS 외에 **각 메서드를 실제 요청**해 확인. 입력:
    ```bash
    nmap --script http-methods -p 80 10.20.30.80
    ```
    실측 출력 (example.com):
    ```
    PORT   STATE SERVICE
    80/tcp open  http
    | http-methods:
    |_  Supported Methods: GET HEAD
    ```
    `--script-args http-methods.test-all` 옵션 추가 시 PUT/DELETE/TRACE 도 시도.

    ▶ 3단계: 도구 C — curl 으로 각 메서드 직접 호출 (실측)
    ```bash
    for m in GET POST PUT DELETE OPTIONS TRACE PATCH; do
      code=$(curl -s -o /dev/null -w "%{http_code}" -X $m http://10.20.30.80/)
      echo "$m → $code"
    done
    ```
    출력 예 (404/405 = 허용 안됨, 200/201/204 = 허용):
    ```
    GET → 200
    POST → 405
    PUT → 405
    DELETE → 405
    OPTIONS → 200
    TRACE → 405
    PATCH → 405
    ```

    ▶ 4단계: 보안 의미
    - PUT/DELETE 활성 → 인증 없이 파일 수정·삭제 가능 시 OWASP A01 (Broken Access Control)
    - TRACE 활성 → XST (Cross-Site Tracing) 가능, 쿠키 탈취 우회
    - WebDAV (PROPFIND/MKCOL 등) → 별도 점검 (`davtest`, `cadaver`)

    ▶ 5단계: 답변 작성
    각 도구 stdout 1줄 quote + "Allow 헤더에 X 메서드 발견 → 위험도 분석" 1~2 문장.
  hint: 'curl -X OPTIONS 단순. nmap --script http-methods 자동. for 반복으로 모든 메서드 직접 시도.'
  category: http_basics
  points: 10
  answer: curl -s -X OPTIONS http://10.20.30.80/ -I 2>/dev/null | grep -i allow &&
    echo 'OPTIONS 확인 완료'
  answer_detail: OPTIONS 메서드로 서버가 허용하는 HTTP 메서드를 확인합니다. 불필요한 메서드(PUT, DELETE)는 비활성화해야
    합니다.
  verify:
    type: output_contains
    expect: OPTIONS 확인 완료
    field: stdout
    semantic:
      intent: OPTIONS 메서드 — curl -s -X OPTIONS http://10.20.30.80/ -I | grep -i allow.
        허용 메서드 확인. PUT/DELETE 불필요 → 비활성화 권장. RFC 7231 + OWASP A05 Misconfiguration.
      success_criteria:
      - curl -X OPTIONS
      - OPTIONS 확인 키워드
      - Allow 헤더
      acceptable_methods:
      - curl OPTIONS
      - nmap http-methods
      - Burp method scan
      negative_signs:
      - OPTIONS 없음
      - 메서드 분석 없음
      - Allow 누락
  target_vm: attacker
- order: 4
  instruction: |-
    응답 헤더에서 보안 헤더(X-Frame-Options, X-XSS-Protection, Content-Security-Policy 등)의 존재 여부를 확인하시오.

    ■ 실습 방법 (3 도구로 보안 헤더 분석)

    ▶ 1단계: 도구 A — curl + grep (수동 분석)
    ```bash
    curl -sI http://10.20.30.80 | grep -iE '(x-frame|x-xss|content-security|strict-transport|x-content-type|referrer-policy|permissions-policy)'
    ```
    ★ grep 결과가 *비어있으면* = 보안 헤더 미설정 = 취약. 출력 라인 수가 곧 점수.

    ▶ 2단계: 도구 B — nuclei 의 missing-security-headers 템플릿 (자동 진단)
    nuclei 는 OWASP 권장 모든 헤더를 자동 점검. 입력:
    ```bash
    nuclei -u http://10.20.30.80 -t http/misconfiguration/ -tags headers -silent
    ```
    실측 출력 (example.com):
    ```
    [http-missing-security-headers:x-content-type-options] http://example.com
    [http-missing-security-headers:content-security-policy] http://example.com
    [http-missing-security-headers:x-frame-options] http://example.com
    [http-missing-security-headers:referrer-policy] http://example.com
    ```
    각 라인 = *부재* 헤더 1 종. 출력이 없으면 모든 헤더 정상.

    ▶ 3단계: 도구 C — testssl.sh --headers (HTTPS 종합 분석)
    설치 완료: `~/testssl.sh/testssl.sh`. 입력 (HTTPS 만 가능):
    ```bash
    ~/testssl.sh/testssl.sh --headers https://10.20.30.80 2>&1 | grep -E 'HSTS|CSP|X-Frame|HPKP|Cookie|server banner'
    ```
    출력 예 (example.com):
    ```
    HTTP Status Code           200 OK
    HSTS                       not offered
    CSP                        --
    X-Frame-Options            --
    Cookie(s)                  no HTTP cookies
    ```
    `not offered` / `--` = 미설정. 보안 grade 계산까지 자동.

    ▶ 4단계: 핵심 보안 헤더 의미
    | 헤더 | 부재 시 위협 | 권장값 |
    |---|---|---|
    | X-Frame-Options | 클릭재킹 | `DENY` 또는 `SAMEORIGIN` |
    | Content-Security-Policy | XSS | `default-src 'self'` |
    | Strict-Transport-Security (HSTS) | HTTPS 다운그레이드 | `max-age=31536000; includeSubDomains` |
    | X-Content-Type-Options | MIME 스니핑 | `nosniff` |
    | Referrer-Policy | 정보 누출 | `strict-origin-when-cross-origin` |
    | Permissions-Policy | 브라우저 기능 남용 | `geolocation=(), camera=()` |

    ▶ 5단계: 답변 작성
    각 도구 출력 1줄 quote + "X-Frame-Options 미설정 → 클릭재킹 위험" 식 매핑.
  hint: 'curl -sI grep = 수동, nuclei missing-security-headers = 자동, testssl.sh --headers = 종합.'
  category: security_headers
  points: 12
  answer: curl -sI http://10.20.30.80 | grep -iE '(x-frame|x-xss|content-security|strict-transport|x-content-type)'
    && echo '보안 헤더 분석 완료' || echo '보안 헤더 미설정 탐지'
  answer_detail: 보안 헤더 부재는 XSS, 클릭재킹, MIME 스니핑 등의 공격에 취약해집니다.
  verify:
    type: output_contains
    expect: 보안 헤더
    field: stdout
    semantic:
      intent: 보안 헤더 확인 — curl -sI + grep -iE '(x-frame|x-xss|content-security|strict-transport|x-content-type)'.
        X-Frame=클릭재킹 / CSP=XSS / HSTS=다운그레이드. OWASP Secure Headers Project.
      success_criteria:
      - curl -sI + grep 보안 헤더
      - 보안 헤더 키워드
      - 5종 이상 패턴
      acceptable_methods:
      - curl + grep
      - securityheaders.com 점수
      - Mozilla Observatory
      negative_signs:
      - 보안 헤더 미점검
      - 단순 grep
      - OWASP 맥락 없음
  target_vm: attacker
- order: 5
  instruction: |-
    쿠키 속성(HttpOnly, Secure, SameSite)을 분석하시오.

    ■ 실습 방법 (3 도구로 쿠키 보안 분석)

    ▶ 1단계: 도구 A — curl + cookie jar (저장 + 분석)
    ```bash
    # 쿠키를 cookies.txt 에 저장
    curl -s -c cookies.txt http://10.20.30.80/login -d "user=test&pass=test" > /dev/null
    # Set-Cookie 헤더 직접 보기
    curl -sI http://10.20.30.80/ | grep -i 'set-cookie'
    # 저장된 쿠키 파일 확인
    cat cookies.txt
    ```
    `cookies.txt` 형식 (Netscape): `domain  HOST_TRUE  /  HTTPS_TRUE  EXPIRES  NAME  VALUE`

    ▶ 2단계: 도구 B — httpie 의 sessions (쿠키 자동 관리)
    ```bash
    # 세션 시작 (쿠키 자동 저장)
    http --session=sess1 -h http://10.20.30.80/login user=test pass=test
    # 다음 요청에 자동 첨부
    http --session=sess1 http://10.20.30.80/dashboard
    # 세션 파일 위치
    ls ~/.config/httpie/sessions/10.20.30.80/sess1.json
    ```

    ▶ 3단계: 도구 C — nuclei cookie 보안 점검
    ```bash
    nuclei -u http://10.20.30.80 -t http/cves/ -tags cookie -silent
    nuclei -u http://10.20.30.80 -t http/misconfiguration/ -tags cookie -silent
    ```
    출력 예: `[CVE-2024-XXXX] cookie-without-httponly` 등 자동 식별.

    ▶ 4단계: 쿠키 보안 속성 정리
    | 속성 | 부재 시 위협 | 권장 |
    |---|---|---|
    | **HttpOnly** | XSS 로 document.cookie 탈취 | 모든 세션 쿠키에 설정 |
    | **Secure** | HTTP 평문 노출 | HTTPS 사이트는 필수 |
    | **SameSite=Lax/Strict** | CSRF | Lax (기본) / Strict (민감) |
    | **__Host- / __Secure- 접두어** | 도메인 위장 | 보안 강화 추가 |
    | **Path / Domain 제한** | 다른 경로/sub 노출 | 최소 범위 |

    ▶ 5단계: 답변 작성
    `Set-Cookie` 헤더 1줄 quote + "HttpOnly 누락 → XSS 탈취 위험" 식 1~2 문장.
  hint: 'curl -c 쿠키 jar / http --session 자동 / nuclei -tags cookie 자동 점검.'
  category: security_headers
  points: 10
  answer: curl -sI http://10.20.30.80 | grep -i 'set-cookie' && echo '쿠키 분석 완료' ||
    echo '쿠키 없음'
