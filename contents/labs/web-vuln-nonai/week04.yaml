    ▶ 1단계: 5층 방어 (defense in depth)
    ```
    Layer 1: SameSite Cookie (1차 방어)
      - SameSite=Strict (모든 cross-site 차단)
      - Secure + HttpOnly + __Host- prefix

    Layer 2: CSRF 토큰 (2차 방어)
      - Synchronizer Token Pattern (서버 세션) 또는
      - Double Submit Cookie (stateless)
      - Origin/Referer 부가 검증

    Layer 3: Custom Header 요구
      - X-Requested-With: XMLHttpRequest
      - 또는 X-CSRF-TOKEN
      - 브라우저가 cross-origin 에서 custom header 못 보냄 (preflight 발생)

    Layer 4: CORS 엄격
      - Access-Control-Allow-Origin: 화이트리스트 (와일드카드 X)
      - Access-Control-Allow-Credentials: true 와 결합 금지

    Layer 5: 사용자 재인증 (high-risk action)
      - 패스워드 변경 / 송금 시 현재 패스워드 재입력
      - 2FA / step-up authentication
