- order: 5
  instruction: |-
    SameSite 쿠키 속성의 CSRF 방어 효과를 분석하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl + grep (SameSite 확인)
    ```bash
    curl -sI http://10.20.30.80 | grep -i 'set-cookie'
    # 출력 예: Set-Cookie: session=abc; HttpOnly; Secure; SameSite=Lax
    echo "SameSite 분석 완료"
    ```

    ▶ 2단계: SameSite 3 모드 비교
    | 모드 | 동작 | CSRF 방어 효과 |
    |---|---|---|
    | **Strict** | 모든 cross-site 요청에 쿠키 미전송 | ✅ 완전 방어 (단, UX 저하) |
    | **Lax** (Chrome 기본) | top-level GET 만 허용 (link click) | ⚠️ POST/iframe 차단, GET CSRF 일부 가능 |
    | **None** | 모든 cross-site 허용 | ❌ Secure 필수, CSRF 무방어 |

    ▶ 3단계: 도구 B — Chrome DevTools (시각 검증)
    1. F12 → **Application** 탭 → **Cookies**
    2. 각 쿠키의 **SameSite** 컬럼 확인
    3. 우클릭 → **Show requests with this cookie** 으로 영향 추적

    ▶ 4단계: 도구 C — 실제 cross-site 시뮬레이션 (Python http.server)
    ```bash
    # attacker 의 evil.html (다른 origin)
    cat > /tmp/evil.html <<'EOF'
    <html><body>
      <img src="http://10.20.30.80/api/like?id=1">
      <iframe src="http://10.20.30.80/api/transfer?to=evil"></iframe>
    </body></html>
    EOF
    python3 -m http.server 8000 --directory /tmp &
    # 다른 브라우저로 http://attacker:8000/evil.html 방문 후
    # victim 서버 로그 확인 (쿠키 첨부 여부)
    ```

    ▶ 5단계: 도구 D — Burp Suite SameSite 검사
    1. Proxy 로 요청 캡처
    2. 우클릭 → **Send to Repeater**
    3. Cookie 헤더 변경 후 응답 비교
    4. SameSite=Strict 시 cross-origin 응답 거부 확인

    ▶ 6단계: 답변
    Set-Cookie 헤더 + SameSite 값 quote + 모드별 방어 정도 1 문장 + 권장값 (`SameSite=Strict; Secure; HttpOnly`).
