lab_id: web-vuln-nonai-week04
title: CSRF(Cross-Site Request Forgery) 실습
version: non-ai
course: web-vuln-nonai
week: 4
description: CSRF 공격의 원리와 토큰 기반 방어 메커니즘을 실습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- CSRF 공격 원리를 이해한다
- CSRF 토큰 검증 메커니즘을 분석한다
- SameSite 쿠키와 방어 기법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: |-
    대상 애플리케이션(http://{{WEB_IP}})의 폼에서 CSRF 토큰 존재 여부를 확인하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl + grep (HTML 소스 분석)
    ```bash
    # 모든 form 의 hidden input 추출
    curl -s http://10.20.30.80 | grep -ioE '<input[^>]*type="hidden"[^>]*>' | head -10

    # CSRF 토큰 패턴 search
    curl -s http://10.20.30.80 | grep -ioE '(csrf|_token|authenticity_token|xsrf)[^"]*"[^"]+"' | head -5
    echo "CSRF 토큰 확인 완료"
    ```

    ▶ 2단계: 도구 B — Burp Suite + CSRF Scanner
    1. Proxy → 모든 form/POST 요청 캡처
    2. 우클릭 → **Engagement Tools → Generate CSRF PoC**
    3. CSRF token 자동 식별 + PoC HTML 자동 생성

    ▶ 3단계: 도구 C — OWASP ZAP CSRF check
    ```bash
    docker run -t owasp/zap2docker-stable zap-cli active-scan -p csrf http://10.20.30.80
    ```

    ▶ 4단계: 도구 D — nuclei CSRF 템플릿
    ```bash
    nuclei -u http://10.20.30.80 -t http/vulnerabilities/generic/csrf-detect.yaml -silent
    ```

    ▶ 5단계: 도구 E — 자동화 스크립트 (Python)
    ```python
    import requests, re
    from bs4 import BeautifulSoup
    r = requests.get('http://10.20.30.80')
    soup = BeautifulSoup(r.text, 'html.parser')
    forms = soup.find_all('form')
    for form in forms:
        token = form.find('input', {'name': re.compile('csrf|token', re.I)})
        if not token:
            print(f"[VULN] form action={form.get('action')} 에 CSRF 토큰 없음")
        else:
            print(f"[OK] {form.get('action')} → {token.get('name')}={token.get('value')[:8]}...")
    ```

    ▶ 6단계: CSRF 토큰 패턴 카탈로그
    | Framework | 토큰 이름 |
    |---|---|
    | Django | `csrfmiddlewaretoken` |
    | Rails | `authenticity_token` |
    | Laravel | `_token` |
    | Spring | `_csrf` |
    | ASP.NET | `__RequestVerificationToken` |
    | Angular | `XSRF-TOKEN` (cookie) + `X-XSRF-TOKEN` (header) |

    ▶ 7단계: 답변
    각 form 의 hidden input quote + CSRF 토큰 유무 + 프레임워크 식별.
