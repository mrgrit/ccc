         http://10.20.30.80/api/profile -d '{"email":"new"}'
    # 200 OK

    # 쿠키만 (헤더 누락) — CSRF 시도
    curl -X POST -b "XSRF-TOKEN=abc123" \
         http://10.20.30.80/api/profile -d '{"email":"evil"}'
    # 403 Forbidden (방어 동작)

    # 다른 토큰 (시도)
    curl -X POST -b "XSRF-TOKEN=abc123" -H "X-XSRF-TOKEN: xyz999" \
