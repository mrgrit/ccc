    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행.


    ▶ Phase A — JWT 토큰 분석 (lecture #1·#4)

    `curl -s -i -X POST -H "Content-Type: application/json"

    -d ''{"email":"admin@juice-sh.op","password":"admin123"}'' http://10.20.30.80/rest/user/login`

    응답에서 JWT 추출. `echo "<JWT>" | cut -d. -f2 | base64 -d` 로 payload decode. alg/iat/exp
    확인.


    ▶ Phase B — CSRF PoC + SameSite 비교 (lab #1·#2·#5)

    JuiceShop 은 JWT-Header 방식이라 *전형적 CSRF 자동발동 안 됨* — 이 자체가 학습 포인트.

    가상 Cookie 사이트 가정 패스워드 변경 위조 HTML 작성 (`<form>` + auto submit script).

    SameSite=Strict / Lax / None 3 케이스 영향 비교.


    ▶ Phase C — 인증방식 × CSRF 방어 매트릭스

    | 인증방식 | CSRF 자동발동 | 권장 방어 | 비고 |

    | Session Cookie | 가능 | CSRF Token + SameSite=Lax | Double Submit |

    | JWT in Cookie | 가능 | CSRF Token + SameSite=Strict | 비추천 |

    | JWT in Header | 불가 | CORS + Origin 검증 | 권장 |

    | OAuth2 PKCE | 부분 | state 파라미터 | code intercept 방어 |

    표 끝에 "JuiceShop = JWT-Header → CORS·Origin 검증 권고" 한 줄.


    종료: echo "=== Phase A JWT decode ===" / "=== Phase B SameSite ===" / "=== Phase
    C 매트릭스 ===".



    [도구 권장] **curl 단독 의존 금지**. 카테고리 `integration_scenario` 에 적합한 도구: 여러 도구 chain —
    정찰 (whatweb/nmap) → 식별 (sqlmap/xsstrike) → 후속 작업. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로
    답변에 직접 quote** 해야 채점 통과.'
