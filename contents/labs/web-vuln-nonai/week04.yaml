    ■ 실습 방법

    ▶ 1단계: 도구 A — Python 자동 탐지 스크립트 (form 분석)
    ```python
    #!/usr/bin/env python3
    import requests, re, sys
    from bs4 import BeautifulSoup
    from urllib.parse import urljoin

    def find_csrf_issues(base_url):
        r = requests.get(base_url)
        soup = BeautifulSoup(r.text, 'html.parser')
        issues = []
        for form in soup.find_all('form'):
            action = urljoin(base_url, form.get('action', ''))
            method = form.get('method', 'get').lower()
            if method != 'post':
                continue  # GET은 보통 CSRF 무관
            # 토큰 검색
            has_token = bool(form.find('input', {'name': re.compile(r'csrf|token|_token|authenticity', re.I)}))
            if not has_token:
                issues.append(f"[VULN] {action} POST 폼에 CSRF 토큰 없음")
            else:
                # 토큰 존재 → 빈 값 시도
                form_data = {i.get('name'): 'test' for i in form.find_all('input') if i.get('name')}
                form_data['_token'] = ''  # 빈 토큰
                resp = requests.post(action, data=form_data, cookies=r.cookies)
                if resp.status_code == 200:
                    issues.append(f"[VULN] {action} 빈 토큰 허용")
        return issues

    for issue in find_csrf_issues(sys.argv[1]):
        print(issue)
    print("자동 탐지 완료")
    ```

