    w02 에서 SQLi 점검을 마쳤다. 선배가 다음 임무를 던진다.


    ※ 선배: "XSS 점검도 1=1 처럼 페이로드 던지면 끝나는 줄 아는데 그게 아냐.

    ※ 먼저 정찰해. SSL/TLS, HTTP 보안 헤더부터 봐. CSP 가 없으면 XSS 가 100% 박힌다고 봐도 돼.

    ※ 헤더 정찰 결과로 XSS 가능성을 추정한 다음, 페이로드로 검증하고,

    ※ 보고서엔 취약 헤더 5종 + 권고 값을 표로 박아."


    학습 목표 (lecture #3 기술 스택·#4 SSL/TLS) + (lab #1 반사형·#7 CSP) 통합 행동 증명.


    ■ 임무 (3 단계, 약 35분)


    Non-AI 트랙: ssh ccc@10.20.30.201 (attacker VM) 직접 실행, transcript 붙여넣기.


    ▶ Phase A — HTTP 보안 헤더 정찰 (lecture #3·#4)

    `curl -s -I http://10.20.30.80/` 응답 헤더 추출. Server / X-Powered-By 로 기술 스택 식별.

    CSP / X-Frame-Options / X-Content-Type-Options / Referrer-Policy / Strict-Transport-Security

    5종 *없는* 것 골라내라.


    ▶ Phase B — XSS 페이로드 검증 (lab #1·#2)

    CSP 부재 확인 시 반사형 XSS 가능성 *높음*.

    `curl -G "http://10.20.30.80/#/search" --data-urlencode ''q=<img src=x onerror=alert(1)>''`
    로

    payload reflection 캡처. 응답에 그대로 박혀 나오면 reflected XSS 확정.


    ▶ Phase C — 취약 헤더 5종 표 + 권고 값

    | 헤더 | 현재 | 권고 값 | 위험 |

    | CSP | 없음 | default-src ''self''; script-src ''self'' | XSS 무방어 |

    | X-Frame-Options | 없음 | DENY | clickjacking |

    | X-Content-Type-Options | 없음 | nosniff | MIME sniffing |

    | Referrer-Policy | 없음 | strict-origin-when-cross-origin | 정보유출 |

    | HSTS | 없음 | max-age=31536000 | 다운그레이드 |


    종료: echo "=== Phase A 헤더 ===" / "=== Phase B XSS reflection ===" / "=== Phase
    C 권고표 ===".



    [도구 권장] **curl 단독 의존 금지**. 카테고리 `integration_scenario` 에 적합한 도구: 여러 도구 chain —
    정찰 (whatweb/nmap) → 식별 (sqlmap/xsstrike) → 후속 작업. 도구 호출 후 **stdout 1~3줄을 ``` 블록으로
    답변에 직접 quote** 해야 채점 통과.'
  hint: 'Phase A: curl -I 가 HEAD 요청. 5 헤더 부재 명시.

    Phase B: SPA 라 응답이 index.html 만 와도 grep 으로 payload 문자열 체크.

    Phase C: OWASP Secure Headers Project 기준 권고 값.

    포인트: "정찰 → 검증 → 권고" 흐름. 페이로드만 던지면 안 됨.

    '
  category: integration_scenario
  points: 50
  verify:
    type: output_contains
    expect: 권고표
    field: stdout
    semantic:
      intent: '헤더 정찰 (CSP·HSTS 등 5종 부재) → XSS reflection 검증 → 보안 헤더 권고표 작성.

        lecture #3·#4 + lab #1·#7 동시 행동 증명.

        '
      success_criteria:
      - Phase A — curl -I, 5종 보안 헤더 부재 확인
      - Phase B — XSS payload curl 전송, reflection 캡처
      - Phase C — 4 컬럼 권고표 5행
      acceptable_methods:
      - curl -I / -sG / --data-urlencode
      - grep 으로 reflection 확인
      - markdown table 권고표
      - sslscan / testssl.sh 추가 가능
      negative_signs:
      - 헤더 정찰 없이 XSS payload 던짐
      - 권고표 누락 또는 1~2 헤더만
      - reflection 검증 누락
      - 기술 스택·CSP 분석 누락
  target_vm: attacker
  risk_level: low
  answer_detail: '학생이 ssh attacker 후 직접 curl·grep 실행. CSP 부재 → 반사형 XSS 가능성 추정 → payload
    검증.

    OWASP Secure Headers Project 권고 값. JuiceShop 응답에 따라 일부 헤더 설정되어 있을 수 있음.

    '
