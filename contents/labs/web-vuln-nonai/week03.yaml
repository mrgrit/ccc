      - 저장 맥락 없음
      - 다른 사용자 영향 누락
  target_vm: attacker
- order: 4
  instruction: |-
    DOM 기반 XSS 취약점을 찾으시오.

    ■ 실습 방법 (DOM XSS — 클라이언트 JS 분석)

    ▶ 1단계: 도구 A — curl + grep (DOM sink 정적 분석)
    ```bash
    # 위험 sinks 검색
    curl -s http://10.20.30.80 | grep -ioE '(innerHTML|outerHTML|document\.write|eval\(|setTimeout\(.*[a-z]|location\.(hash|href)|window\.name)' | sort -u
    echo "DOM XSS 분석 완료"
    ```
    위험 sinks 카테고리:
    - **HTML injection**: `innerHTML`, `outerHTML`, `document.write`, `insertAdjacentHTML`
    - **JS execution**: `eval`, `setTimeout(string)`, `setInterval(string)`, `Function()`
    - **URL**: `location.href`, `location.hash`, `location.search`
    - **Storage**: `localStorage`, `sessionStorage` 의 unsanitized 사용

    ▶ 2단계: 도구 B — XSStrike --dom 모드
    ```bash
    cd ~/XSStrike
    python3 xsstrike.py -u "http://10.20.30.80/#/track-result?id=1" --dom
    # DOM XSS 만 점검 (서버 응답 X, 클라이언트 JS 분석)
    ```

    ▶ 3단계: 도구 C — Chrome DevTools (수동 분석, GUI)
    1. http://10.20.30.80 접속
    2. F12 → **Sources** 탭
    3. JavaScript 파일에서 `Ctrl+F` → `innerHTML` / `eval` 검색
    4. **Sources → Event Listener Breakpoints** → DOM Mutation 에서 중단
    5. **Network → Initiator** → 어떤 JS 가 어떤 요청을 시작했는지 추적

    ▶ 4단계: 도구 D — DOMinator / RetireJS (자동 정적 분석)
    ```bash
    # RetireJS — 알려진 취약 JS 라이브러리 + DOM XSS
    npm install -g retire
    retire --js --jspath /path/to/static/js/

    # 또는 Snyk Code (Open Source)
    snyk code test
    ```

    ▶ 5단계: 도구 E — dalfox --mining-dom
    ```bash
    dalfox url "http://10.20.30.80/#/search?q=test" --mining-dom
    # URL fragment(#) 내 DOM 파라미터 자동 분석
    ```

    ▶ 6단계: 답변
    DOM sink (예: `target.innerHTML = location.hash.slice(1)`) 1줄 quote + 위험 분류 + 방어 (textContent / DOMPurify) 1 문장.
  hint: 'curl + grep sink / XSStrike --dom / DevTools breakpoint / RetireJS 라이브러리 / dalfox --mining-dom.'
