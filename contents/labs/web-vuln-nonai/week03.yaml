- order: 13
  instruction: |-
    XSS 방어 전략을 종합 정리하시오.

    ■ 실습 방법

    ▶ 1단계: 5층 방어 정리
    ```
    Layer 1: 출력 인코딩 (Output Encoding) — 가장 중요
      - HTML body: HTML entity (&lt; &gt; &amp; &quot; &#39;)
      - HTML attribute: HTML entity + quoting
      - JavaScript: \xHH escape
      - URL parameter: URL encoding
      - CSS: \HH backslash escape

    Layer 2: 입력 검증 (Whitelist)
      - 정규식 (alphanumeric only)
      - 타입 강제 (int/uuid)
      - 길이 제한

    Layer 3: 안전 라이브러리
      - DOMPurify (https://github.com/cure53/DOMPurify)
      - sanitize-html (Node.js)
      - bleach (Python)
      - OWASP Java Encoder

    Layer 4: CSP (Content Security Policy)
      - script-src 'self' 'nonce-RANDOM'
      - default-src 'none' + 명시적 allow

    Layer 5: 안전한 쿠키
      - HttpOnly (JS 접근 차단)
      - Secure (HTTPS only)
      - SameSite=Strict (CSRF 방지)
    ```

    ▶ 2단계: 도구 A — DOMPurify 사용 (JS 클라이언트)
    ```bash
    npm install dompurify
    ```
    ```javascript
    import DOMPurify from 'dompurify';
    element.innerHTML = DOMPurify.sanitize(userInput);
    // 또는 옵션
    DOMPurify.sanitize(input, {ALLOWED_TAGS: ['b','i','a'], ALLOWED_ATTR: ['href']});
    ```

    ▶ 3단계: 도구 B — bleach (Python 서버)
    ```bash
    pip install bleach
    python3 -c "import bleach; print(bleach.clean('<script>alert(1)</script><b>hi</b>'))"
    # 출력: &lt;script&gt;alert(1)&lt;/script&gt;<b>hi</b>
    ```

    ▶ 4단계: 도구 C — OWASP Java Encoder (Java 서버)
    ```java
    import org.owasp.encoder.Encode;
    out.println("<div>" + Encode.forHtml(userInput) + "</div>");
    out.println("<a href='" + Encode.forHtmlAttribute(url) + "'>");
    out.println("<script>var s='" + Encode.forJavaScript(input) + "';</script>");
    ```

    ▶ 5단계: 도구 D — Trusted Types (브라우저 API)
    ```bash
    # Chrome/Edge 만 (Firefox 진행 중)
    # CSP 헤더에 활성화
    Content-Security-Policy: trusted-types myPolicy; require-trusted-types-for 'script';
    ```
    ```javascript
    const policy = trustedTypes.createPolicy('myPolicy', {
      createHTML: (s) => DOMPurify.sanitize(s)
    });
    element.innerHTML = policy.createHTML(input);  // 다른 string 입력 거부
    ```

    ▶ 6단계: 답변
    각 layer 1줄 + 도구 1개 (DOMPurify/bleach 등) 사용 예 quote + 다층 방어 (defense in depth) 1 문장.
