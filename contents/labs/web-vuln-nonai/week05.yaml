- order: 1
  instruction: |-
    {{WEB_IP}} 대상으로 파일 업로드 기능 식별을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl + grep 으로 form 검색
    ```bash
    # 모든 페이지의 file input 검색
    curl -s http://10.20.30.80 | grep -ioE '<input[^>]*type="file"[^>]*>' | head -10
    curl -s http://10.20.30.80 | grep -ioE '<form[^>]*enctype="multipart/form-data"[^>]*>' | head -10
    curl -s http://10.20.30.80 | grep -ioE 'href="[^"]*(upload|attach)[^"]*"' | head -10
    echo "업로드 기능 식별 완료"
    ```

    ▶ 2단계: 도구 B — gobuster (업로드 endpoint 발견)
    ```bash
    gobuster dir -u http://10.20.30.80 \
      -w /usr/share/wordlists/dirb/common.txt \
      -t 20 -p '^.*(upload|attach|file|image|avatar|profile).*$'
    ```

    ▶ 3단계: 도구 C — Burp Spider / OWASP ZAP Spider (자동 크롤)
    1. Burp Proxy → 사이트 정상 사용 (회원가입/프로필/리뷰 등)
    2. Site map → 우클릭 → Engagement Tools → **Find scripts/comments**
    3. multipart/form-data 가 있는 모든 endpoint 자동 식별

    ▶ 4단계: 도구 D — nuclei 의 file-upload 템플릿
    ```bash
    nuclei -u http://10.20.30.80 -t http/exposures/ -tags upload -silent
    nuclei -u http://10.20.30.80 -t http/vulnerabilities/ -tags upload -silent
    ```

    ▶ 5단계: JuiceShop 업로드 endpoint 예
    - `/api/Complaints` (PUT, file 첨부)
    - `/profile` (avatar 업로드)
    - `/api/Users/{id}/avatar` 등

    ▶ 6단계: 답변
    찾은 endpoint 1~2 개 quote + form action + accept 속성 분석.
