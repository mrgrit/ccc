- order: 2
  instruction: |-
    {{WEB_IP}} 대상으로 허용 파일 유형 확인을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — form 의 accept 속성 확인
    ```bash
    curl -s http://10.20.30.80/profile | grep -ioE 'accept="[^"]*"'
    # 예: accept=".jpg,.png,.gif" / accept="image/*" / 없음 (= 모든 파일)
    ```

    ▶ 2단계: 도구 B — curl 으로 다양한 파일 유형 시도
    ```bash
    # 테스트 파일 준비
    echo "test" > /tmp/test.txt
    cp /usr/share/icons/*/8x8/*.png /tmp/test.png 2>/dev/null
    echo "<?php phpinfo(); ?>" > /tmp/test.php
    echo "<script>alert(1)</script>" > /tmp/test.html
    cp /tmp/test.txt /tmp/test.exe
    cp /tmp/test.txt /tmp/test.svg
    cp /tmp/test.txt /tmp/test.zip

    # 각 유형 업로드 시도
    for f in /tmp/test.{txt,png,php,html,exe,svg,zip,sh,jsp}; do
      [ -f "$f" ] || continue
      echo "=== $f ==="
      curl -s -X POST http://10.20.30.80/api/upload \
           -F "file=@$f" -i | head -1
    done
    echo "허용 파일 유형 확인 완료"
    ```

    ▶ 3단계: 도구 C — fuzzing wordlist (확장자 자동)
    ```bash
    # SecLists 의 Web-Shells/file-extensions 사용
    cat /usr/share/seclists/Discovery/Web-Content/Web-Shells/FuzzDB/file-ul-filter-bypass-x-platform-generic.txt | head
    # 또는 PayloadsAllTheThings
    cat ~/PATT/Upload\ Insecure\ Files/Extension\ PHP/extensions.lst
    ```

    ▶ 4단계: 도구 D — Burp Intruder 자동 fuzzing
    1. 정상 업로드 요청 캡처
    2. **Send to Intruder** → filename 부분 §...§ marking
    3. Payloads → SecLists upload 확장자 wordlist
    4. Start Attack → Status / Length 차이로 허용/차단 자동 분류

    ▶ 5단계: 답변
    각 확장자 응답 코드 (200/415/403) quote + 허용/차단 분류 + 화이트리스트 vs 블랙리스트 분석.
