  hint: 업로드 기능 식별 관련 도구와 기법을 활용하세요.
  category: upload
  points: 8
  answer: curl -s http://10.20.30.80 2>/dev/null | head -5 && echo '업로드 기능 식별 완료'
  answer_detail: 업로드 기능 식별은(는) 웹 보안 진단의 핵심 단계입니다. 체계적인 접근이 필요합니다.
  verify:
    type: output_contains
    expect: 완료
    field: stdout
    semantic:
      intent: 업로드 기능 식별 — curl http://10.20.30.80 + form action / input type=file 검색. JuiceShop /api/Complaints
        또는 프로필. 진단 첫 단계. CWE-434.
      success_criteria:
      - 업로드 기능 식별 완료 키워드
      - curl + 응답 분석
      - form/input 검색
      acceptable_methods:
      - curl + grep
      - Burp passive scan
      - OWASP ZAP spider
      negative_signs:
      - 식별 없음
      - 단순 GET
      - 업로드 맥락 없음
