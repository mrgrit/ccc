    ```
    Layer 1: 화이트리스트 확장자 검증
      - 허용: ['.jpg', '.png', '.pdf'] 만
      - 블랙리스트는 우회 가능 (.phtml, .phar 등)

    Layer 2: MIME + magic byte 이중 검증
      - file 명령으로 실 mime 확인
      - python-magic 라이브러리 또는 PHP finfo

    Layer 3: 랜덤 파일명 + 확장자 정규화
      - filename = sha256(content) + '.jpg'
      - 사용자 입력 filename 사용 금지 (path traversal)

    Layer 4: 업로드 디렉터리 noexec
      - .htaccess Options -ExecCGI / Nginx location 차단
      - mount -o noexec / Docker 격리

    Layer 5: 외부 storage 분리
      - S3 / MinIO / GCS 로 파일 저장
      - 정적 도메인 (uploads.example.com) 으로 서비스
      - Same-Origin 격리

    Layer 6: 안티바이러스 스캔
      - ClamAV 자동 (clamscan)
      - VirusTotal API 통합
      - 의심 파일 격리 (quarantine)

    Layer 7: 모니터링 + 로그
      - Wazuh FIM (file integrity monitoring)
