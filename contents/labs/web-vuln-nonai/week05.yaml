    ▶ 1단계: 도구 A — Wazuh FIM (File Integrity Monitoring)
    ```xml
    <!-- /var/ossec/etc/ossec.conf -->
    <syscheck>
      <directories check_all="yes" report_changes="yes" realtime="yes">
        /var/www/html/uploads
      </directories>
      <alert_new_files>yes</alert_new_files>
    </syscheck>
    ```
    재시작:
    ```bash
    sudo systemctl restart wazuh-manager
    # 새 파일 업로드 시 alert.json 에 자동 기록
    tail -f /var/ossec/logs/alerts/alerts.json | jq 'select(.rule.groups[]? | contains("syscheck"))'
    ```

    ▶ 2단계: 도구 B — auditd 시스템 콜 감시
    ```bash
    sudo apt install auditd
    sudo auditctl -w /var/www/html/uploads -p wa -k upload_dir
    # -p wa: write/attribute 변경 시 기록
    # 로그 조회
    ausearch -k upload_dir | head -20
    aureport -f --summary
    ```

    ▶ 3단계: 도구 C — inotifywait 실시간 감시 (간단한 alert)
    ```bash
    sudo apt install inotify-tools
    inotifywait -m -r -e create,modify /var/www/html/uploads --format '%w%f %e %T' --timefmt '%F %T' |
    while read FILE EVENT TIME; do
      # 의심 확장자 alert
      if echo "$FILE" | grep -qE '\.(php|phtml|jsp|asp|aspx|exe|sh)$'; then
        echo "[ALERT $TIME] $EVENT $FILE" | logger -t upload_alert
        clamscan "$FILE"  # 자동 스캔
      fi
    done &
    ```

    ▶ 4단계: 도구 D — ModSecurity (WAF level)
    ```apache
    # /etc/modsecurity/crs/rules/REQUEST-933-APPLICATION-ATTACK-PHP.conf
    # 이미 PHP injection 룰 활성 (id:933100~933200)
    SecRule FILES_NAMES "@rx \.(php|phtml|phar|jsp)$" \
      "id:9000001,deny,log,msg:'PHP upload blocked'"
    ```

    ▶ 5단계: 도구 E — Falco (런타임 컨테이너 보안)
