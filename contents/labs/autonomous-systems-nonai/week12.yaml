lab_id: autonomous-systems-nonai-week12
title: '[Non-AI] V2X/자동차 보안'
version: non-ai
course: autonomous-systems-nonai
week: 12
description: CAN 버스 분석, ECU 통신 시뮬레이션, V2X/커넥티드카 보안을 실습합니다
difficulty: hard
duration_minutes: 120
objectives:
- CAN 버스 메시지를 분석한다
- CAN 인젝션 공격을 수행한다
- 커넥티드카 공격 표면을 매핑한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 가상 CAN 버스 트래픽을 생성하시오. 엔진(0x100), 브레이크(0x200), 조향(0x300), ADAS(0x500) ECU 메시지를 구현하라.
  hint: struct.pack으로 각 ECU의 CAN 데이터를 구성하세요.
  category: config
  points: 12
  answer: python3 -c "import struct;ecus=[(0x100,struct.pack('>HH',6000,2500)+b'\x00'*4,'Engine:60km/h,2500rpm'),(0x200,b'\x1e'+b'\x00'*7,'Brake:30%'),(0x300,struct.pack('>h',50)+b'\x00'*6,'Steer:5.0deg'),(0x500,b'\x01\x00\x64'+b'\x00'*5,'ADAS:active')];print('=== Virtual CAN Bus ===');[print(f'  ID:0x{e[0]:03X} Data:{e[1].hex()} | {e[2]}') for e in ecus]"
  answer_detail: CAN 프레임 구조와 ECU 통신을 이해합니다.
  verify:
    type: output_contains
    expect: Virtual CAN Bus
    field: stdout
  target_vm: attacker
- order: 2
  instruction: CAN 메시지 디코더를 구현하시오. 엔진 속도/RPM, 브레이크 압력, 조향 각도를 디코딩하라.
  hint: struct.unpack으로 바이너리 데이터를 디코딩하세요.
  category: analysis
  points: 12
  answer: 'python3 -c "import struct;frames=[(0x100,bytes.fromhex(''176400000CE40000'')),(0x200,bytes.fromhex(''1E00000000000000'')),(0x300,bytes.fromhex(''0032000000000000''))];print(''=== CAN Decoder ==='');print(f''  0x100: Speed={struct.unpack(\">H\",frames[0][1][:2])[0]/100}km/h RPM={struct.unpack(\">H\",frames[0][1][2:4])[0]}'');print(f''  0x200: Brake={frames[1][1][0]}%'');print(f''  0x300: Steer={struct.unpack(\">h\",frames[2][1][:2])[0]/10}deg'')"'
  answer_detail: CAN 메시지 디코딩은 차량 상태 파악과 공격 설계의 기초입니다.
  verify:
    type: output_contains
    expect: CAN Decoder
    field: stdout
  target_vm: attacker
- order: 3
  instruction: CAN 인젝션 공격(조향+브레이크)을 시뮬레이션하시오.
  hint: 조향 45도와 브레이크 0을 인젝션하세요.
  category: attack
  points: 12
  answer: python3 -c "import struct;print('=== CAN Injection ===');print(f'  [INJECT] ID:0x300 Data:{(struct.pack(\">h\",450)+b\"\\x00\"*6).hex()} — Steer 45deg right');print(f'  [INJECT] ID:0x200 Data:{b\"\\x00\"*8 .hex()} — Brakes disabled');print('  [CRITICAL] Vehicle control compromised!')"
  answer_detail: CAN 인젝션으로 차량 조향과 제동을 직접 제어합니다.
  verify:
    type: output_contains
    expect: CAN Injection
    field: stdout
  target_vm: attacker
- order: 4
  instruction: 커넥티드카 원격 공격 표면을 매핑하시오. 근거리/중거리/원거리 인터페이스별 공격 벡터를 출력하라.
  hint: Short/Medium/Long range로 분류하세요.
  category: analysis
  points: 12
  answer: 'python3 -c "surface={''Short(<10m)'':[''BT pairing'',''OBD-II access'',''USB injection''],''Medium(<1km)'':[''WiFi exploit'',''Key fob relay'',''V2X forgery''],''Long(>1km)'':[''Cellular API'',''GPS spoofing'',''OTA server hack'']};total=0;print(''=== Connected Car Attack Surface ==='');[(print(f''  [{k}]''),[print(f''    - {a}'') for a in v]) for k,v in surface.items()];print(f''  Total:
    {sum(len(v) for v in surface.values())} vectors'')"'
  answer_detail: 커넥티드카의 원격 공격 표면은 전통 자동차보다 훨씬 넓습니다.
  verify:
    type: output_contains
    expect: Connected Car
    field: stdout
  target_vm: attacker
- order: 5
  instruction: LLM에게 Jeep Cherokee 원격 해킹 사례를 분석하도록 요청하시오.
  hint: Jeep Cherokee remote hack Miller Valasek을 질문하세요.
  category: analysis
  points: 10
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are an automotive security historian.\"},{\"role\":\"user\",\"content\":\"Describe the 2015 Jeep Cherokee remote hack by Miller and Valasek. What was the attack chain from cellular to CAN bus?\"}],\"stream\":false,\"options\":{\"num_predict\":200}}'\
    \ \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: Jeep Cherokee 사례는 자동차 사이버보안의 전환점이었습니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
- order: 6
  instruction: CAN IDS를 구현하시오. 빈도 이상, 알 수 없는 ID, 데이터 범위 위반, 브레이크 이상을 탐지하라.
  hint: 정상 baseline과 비교하여 이상을 탐지하세요.
  category: config
  points: 12
  answer: 'python3 -c "known={0x100,0x200,0x300,0x400,0x500};alerts=[];traffic=[(0x100,60),(0x000,0),(0x300,450),(0x200,0)];print(''=== CAN IDS ==='');[((alerts.append(f''Unknown:0x{aid:03X}'') if aid not in known else None),(alerts.append(f''Steer:{val/10}deg'') if aid==0x300 and abs(val)>300 else None),(alerts.append(''Brake zero'') if aid==0x200 and val==0 else None)) for aid,val in traffic];[print(f''  [!]
    {a}'') for a in alerts];print(f''  Total alerts: {len(alerts)}'')"'
  answer_detail: CAN IDS는 인젝션과 이상 트래픽을 실시간 탐지합니다.
  verify:
    type: output_contains
    expect: CAN IDS
    field: stdout
  target_vm: attacker
- order: 7
  instruction: V2X 메시지 위조 공격을 시뮬레이션하시오. 가짜 긴급 브레이크 경고와 Sybil 공격을 구현하라.
  hint: V2V 메시지를 위조하고 다수 차량을 사칭하세요.
  category: attack
  points: 10
  answer: python3 -c "print('=== V2X Attack Simulation ===');print('  [FORGE] Emergency brake warning from non-existent vehicle');print('  [SYBIL] 10 fake vehicles created on virtual road');print('  [!] Target vehicle brakes unnecessarily → rear-end collision risk');print('  [!] Traffic management confused by ghost vehicles')"
  answer_detail: V2X 메시지 위조는 교통 안전에 직접적 위협입니다.
  verify:
    type: output_contains
    expect: V2X Attack
    field: stdout
  target_vm: attacker
- order: 8
  instruction: 차량 보안 아키텍처를 Python으로 설계하시오. 도메인 분리, 게이트웨이 방화벽, SecOC, V2X PKI를 포함하라.
  hint: 4계층 보안 아키텍처를 설계하세요.
  category: config
  points: 10
  answer: 'python3 -c "arch=[(''Domain Separation'',''Isolate powertrain/chassis/IVI/ADAS''),(''Gateway Firewall'',''Filter CAN messages between domains''),(''SecOC Auth'',''Authenticate ECU messages''),(''V2X PKI'',''Certificate-based V2X message signing''),(''CAN IDS'',''Real-time anomaly detection'')];print(''=== Vehicle Security Architecture ==='');[print(f''  {a[0]}: {a[1]}'') for a in arch]"'
  answer_detail: 다계층 보안 아키텍처로 커넥티드카를 보호합니다.
  verify:
    type: output_contains
    expect: Vehicle Security Architecture
    field: stdout
  target_vm: attacker
