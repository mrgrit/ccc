lab_id: autonomous-systems-nonai-week04
title: '[Non-AI] 드론 방어'
version: non-ai
course: autonomous-systems-nonai
week: 4
description: 드론 탐지, RF 분석, 지오펜싱 구현을 통해 드론 방어 체계를 구축합니다
difficulty: medium
duration_minutes: 120
objectives:
- RF 기반 드론 탐지를 시뮬레이션한다
- 지오펜싱을 구현하고 우회를 분석한다
- 드론 IDS 규칙을 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 2.4GHz RF 스펙트럼 스캔 시뮬레이터를 작성하시오. 11개 채널 중 드론 신호가 있는 채널을 탐지하라.
  hint: random으로 각 채널 신호 강도를 생성하고, 특정 채널을 드론 신호로 설정하세요.
  category: recon
  points: 12
  answer: 'python3 -c "import random;random.seed(42);drone_ch=[6,7];print(''=== RF Spectrum Scan ==='');[print(f''  CH{ch:2d}
    {2412+ch*5}MHz {random.randint(-45,-35) if ch in drone_ch else random.randint(-85,-70):4d}dBm {\"<<
    DRONE\" if ch in drone_ch else \"\"}'') for ch in range(1,12)];print(f''  Drone detected on channels:
    {drone_ch}'')"'
  answer_detail: RF 스펙트럼 분석으로 드론 통신 채널을 식별합니다.
  verify:
    type: output_contains
    expect: DRONE
    field: stdout
    semantic:
      intent: '[탐지] 2.4GHz RF 스펙트럼 스캔 — python3 11 채널 (2412+ch*5 MHz) + drone_ch=[6,7] + dBm 시뮬 + DRONE
        마커. 채널별 신호 강도 구별. HackRF + rtl_433.'
      success_criteria:
      - DRONE 출력
      - 11 채널
      - dBm 신호 강도
      acceptable_methods:
      - 스펙트럼 시뮬
      - HackRF One
      - rtl_sdr
      negative_signs:
      - 채널 5개 이하
      - dBm 없음
      - 드론 식별 없음
  target_vm: attacker
- order: 2
  instruction: nmap으로 드론 관련 네트워크 서비스(5556,5554,14550,9999)를 스캔하여 드론을 탐지하시오.
  hint: nmap -p 옵션으로 드론 포트를 스캔하세요.
  category: recon
  points: 10
  answer: nmap -sV -p 5556,5554,14550,9999 10.20.30.0/24
  answer_detail: 네트워크 스캔으로 드론 컨트롤러를 식별합니다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[탐지] 드론 네트워크 스캔 — nmap -sV -p 5556,5554,14550,9999 10.20.30.0/24. Parrot AR(5556/5554)
        + MAVLink(14550) + 드론시뮬(9999). 4 포트 드론 식별.'
      success_criteria:
      - 10.20.30 포함
      - 4 포트 스캔
      - -sV
      acceptable_methods:
      - nmap -sV -p 드론포트
      - masscan
      - rustscan
      negative_signs:
      - 포트 2개 이하
      - -sV 없음
      - 서브넷 미지정
  target_vm: attacker
- order: 3
  instruction: Python으로 다각형 지오펜싱 시스템을 구현하시오. Ray Casting 알고리즘으로 비행 금지 구역 진입을 탐지하라.
  hint: point_in_polygon 함수를 구현하세요.
  category: config
  points: 12
  answer: 'python3 -c " def pip(lat,lon,poly): n=len(poly);inside=False;j=n-1 for i in range(n): if((poly[i][1]>lon)!=(poly[j][1]>lon))and(lat<(poly[j][0]-poly[i][0])*(lon-poly[i][1])/(poly[j][1]-poly[i][1])+poly[i][0]):inside=not
    inside j=i return inside zone=[(37.585,126.974),(37.590,126.974),(37.590,126.980),(37.585,126.980)]
    tests=[(37.587,126.977,''Inside zone''),(37.550,127.000,''Outside zone'')] ;print(''=== Geofence Test
    ==='') ;[print(f''  ({lat},{lon}): {\"BLOCKED\" if pip(lat,lon,zone) else \"ALLOWED\"} — {n}'') for
    lat,lon,n in tests]"'
  answer_detail: 지오펜싱은 드론 비행 범위를 제한하는 핵심 방어 기술입니다.
  verify:
    type: output_contains
    expect: Geofence Test
    field: stdout
    semantic:
      intent: '[방어] 다각형 지오펜싱 — python3 pip(lat,lon,poly) Ray Casting 알고리즘 + zone 4 정점 + 테스트 (Inside BLOCKED
        / Outside ALLOWED). 비행 금지 구역 진입 탐지. ICAO geofencing.'
      success_criteria:
      - Geofence Test 키워드
      - Ray Casting 알고리즘
      - BLOCKED/ALLOWED
      acceptable_methods:
      - Ray Casting
      - Shapely polygon.contains
      - GeoPandas
      negative_signs:
      - 다각형 없음
      - 알고리즘 단순
      - 테스트 1개
  target_vm: attacker
- order: 4
  instruction: 지오펜싱을 우회하는 방법 3가지를 Python으로 시뮬레이션하시오. GPS 스푸핑, 펌웨어 수정, GPS 비활성화를 비교하라.
  hint: 각 우회 방법의 결과를 시뮬레이션하세요.
  category: attack
  points: 12
  answer: 'python3 -c "bypasses=[(''GPS Spoofing'',''Report fake position outside fence'',''Medium''),(''Firmware
    Mod'',''Remove geofence code from FC'',''Hard''),(''GPS Disable'',''Block GPS signal → no position'',''Easy'')];print(''===
    Geofence Bypass Methods ==='');[print(f''  {b[0]}: {b[1]} (Difficulty: {b[2]})'') for b in bypasses];print(''  [!]
    Multi-source navigation needed for robust geofencing'')"'
  answer_detail: 지오펜싱 우회 분석은 방어 강화의 기초입니다.
  verify:
    type: output_contains
    expect: Geofence Bypass
    field: stdout
    semantic:
      intent: '[공격] 지오펜싱 우회 3종 — python3 bypasses (GPS Spoofing Medium / Firmware Mod Hard / GPS Disable
        Easy) + 대응 Multi-source navigation. 우회 방법 난이도 비교. MITRE ATT&CK T1565 GPS Spoofing.'
      success_criteria:
      - Geofence Bypass 키워드
      - 3 방법 + 난이도
      - 대응 권고
      acceptable_methods:
      - 3 기법 시뮬
      - HackRF GPS 스푸핑
      - firmware 분석
      negative_signs:
      - 기법 1-2개
      - 난이도 없음
      - 대응 없음
  target_vm: attacker
- order: 5
  instruction: Python으로 드론 IDS를 구현하시오. 알 수 없는 출발지, 인증 없는 비행 명령, 급격한 좌표 변경을 탐지하라.
  hint: 규칙 기반 탐지 시스템을 딕셔너리로 구현하세요.
  category: config
  points: 12
  answer: 'python3 -c " known={''10.20.30.201''};alerts=[] ;pkts=[{''src'':''10.20.30.201'',''cmd'':''ARM'',''auth'':True},{''src'':''10.20.30.99'',''cmd'':''TAKEOFF'',''auth'':False},{''src'':''10.20.30.99'',''cmd'':''GOTO'',''auth'':False}]
    ;print(''=== Drone IDS ==='') ;[((alerts.append(f''Unknown src:{p[\"src\"]}'') if p[''src''] not in
    known else None),(alerts.append(f''No auth:{p[\"cmd\"]}'') if not p[''auth''] and p[''cmd''] in (''ARM'',''TAKEOFF'',''GOTO'')
    else None),print(f''  PKT src={p[\"src\"]} cmd={p[\"cmd\"]} auth={p[\"auth\"]} alerts={len(alerts)}''))
    for p in pkts] ;print(f''  Total alerts: {len(alerts)}'')"'
  answer_detail: 드론 IDS는 비정상 명령 패턴을 실시간 탐지합니다.
  verify:
    type: output_contains
    expect: Drone IDS
    field: stdout
    semantic:
      intent: '[방어] 드론 IDS 규칙 — python3 known={10.20.30.201} + pkts 3종 + 알 수 없는 src/인증 없는 ARM/TAKEOFF/GOTO
        탐지. 규칙 기반 IDS. Suricata 드론 규칙 대체.'
      success_criteria:
      - Drone IDS 키워드
      - unknown src + no auth 탐지
      - alerts 리스트
      acceptable_methods:
      - 규칙 기반 IDS
      - Suricata alert drone
      - Zeek drone script
      negative_signs:
      - 규칙 1종
      - 탐지 없음
      - alerts 없음
  target_vm: attacker
- order: 6
  instruction: LLM에게 안티드론 기술의 종류와 장단점을 질의하시오.
  hint: counter-drone technology comparison을 질문하세요.
  category: analysis
  points: 10
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"\
    messages\":[{\"role\":\"system\",\"content\":\"You are a counter-drone systems expert.\"},{\"role\"\
    :\"user\",\"content\":\"Compare soft-kill vs hard-kill counter-drone technologies. Give 3 examples\
    \ of each with pros and cons.\"}],\"stream\":false,\"options\":{\"num_predict\":200}}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 안티드론 기술의 종류를 이해하여 방어 전략을 수립합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[분석] 안티드론 기술 — curl /api/chat system=counter-drone expert + soft-kill vs hard-kill 3 예시씩
        장단점. RF Jamming/Cyber Takeover(soft) vs Kinetic/Laser/Net(hard). DHS C-UAS.'
      success_criteria:
      - counter-drone 맥락
      - soft vs hard 비교
      - system role
      acceptable_methods:
      - LLM 비교 분석
      - DHS C-UAS 분류
      - DoD Joint C-UAS
      negative_signs:
      - 카테고리 1종
      - 예시 부족
      - 장단점 없음
  target_vm: manager
- order: 7
  instruction: Python으로 드론 OUI(MAC 벤더) 데이터베이스를 구성하고, 네트워크에서 드론 벤더를 식별하는 스크립트를 작성하시오.
  hint: 드론 제조사 OUI 프리픽스를 딕셔너리로 만드세요.
  category: recon
  points: 10
  answer: python3 -c "ouis={'60:60:1F':'DJI','A0:14:3D':'Parrot','90:03:B7':'Parrot','00:26:7E':'3DR'};print('===
    Drone OUI Database ===');[print(f'  {k} -> {v}') for k,v in ouis.items()];print('  [*] Use with ARP
    table to identify drones on network')"
  answer_detail: MAC 벤더 식별로 네트워크에서 드론 기기를 탐지합니다.
  verify:
    type: output_contains
    expect: Drone OUI
    field: stdout
    semantic:
      intent: '[탐지] 드론 OUI DB — python3 ouis {60:60:1F DJI / A0:14:3D Parrot / 90:03:B7 Parrot / 00:26:7E
        3DR}. MAC OUI 프리픽스로 벤더 식별. IEEE OUI 등록부.'
      success_criteria:
      - Drone OUI 키워드
      - 4 벤더 매핑
      - MAC 프리픽스
      acceptable_methods:
      - OUI dict + ARP
      - Wireshark manuf db
      - macchanger
      negative_signs:
      - 벤더 2개 이하
      - MAC 형식 오류
      - 매핑 없음
  target_vm: attacker
- order: 8
  instruction: 드론 방어 체계의 전체 구성을 Python으로 요약 출력하시오. RF 탐지, 지오펜싱, IDS, 암호화의 4계층 방어를 설명하라.
  hint: 4계층 방어를 리스트로 정리하세요.
  category: analysis
  points: 12
  answer: 'python3 -c "layers=[(''Layer 1: RF Detection'',''Spectrum monitoring, protocol fingerprinting''),(''Layer
    2: Geofencing'',''GPS+INS multi-source position validation''),(''Layer 3: Drone IDS'',''Command pattern
    anomaly detection''),(''Layer 4: Encryption'',''MAVLink signing + DTLS channel encryption'')];print(''===
    Defense-in-Depth for Drones ==='');[print(f''  {l[0]}\n    {l[1]}'') for l in layers]"'
  answer_detail: 다계층 방어(Defense-in-Depth)가 드론 보안의 핵심입니다.
  verify:
    type: output_contains
    expect: Defense-in-Depth
    field: stdout
    semantic:
      intent: '[분석] 드론 다계층 방어 — python3 layers 4종 (RF Detection/Geofencing/IDS/Encryption) + 상세 설명. Defense-in-Depth
        4 레이어 출력. NIST SP 800-82 Layered Defense.'
      success_criteria:
      - Defense-in-Depth 키워드
      - 4 레이어
      - 각 레이어 설명
      acceptable_methods:
      - 4계층 구조 출력
      - NIST Defense in Depth
      - Purdue model
      negative_signs:
      - 레이어 2개 이하
      - 설명 없음
      - Defense-in-Depth 미언급
  target_vm: attacker
