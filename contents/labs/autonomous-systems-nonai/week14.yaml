lab_id: autonomous-systems-nonai-week14
title: '[Non-AI] CPS 인시던트 대응'
version: non-ai
course: autonomous-systems-nonai
week: 14
description: 사이버물리 인시던트 대응 절차를 실습하고 플레이북을 작성합니다
difficulty: hard
duration_minutes: 120
objectives:
- CPS 인시던트 대응 절차를 이해한다
- 드론/ICS 인시던트 시나리오를 대응한다
- 인시던트 대응 플레이북을 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 CPS 인시던트 타임라인을 생성하시오. 드론 하이재킹 인시던트의 탐지부터 복구까지 8개 이벤트를 출력하라.
  hint: 시간, 이벤트, 조치를 포함하는 타임라인을 만드세요.
  category: analysis
  points: 12
  answer: 'python3 -c "events=[(''14:23'',''IDS alert: unknown command source'',''Notify
    SOC''),(''14:24'',''Drone deviating from route'',''Attempt RTL''),(''14:25'',''GPS
    anomaly detected'',''Flag spoofing''),(''14:26'',''RTL rejected — channel compromised'',''Alert
    ATC''),(''14:27'',''Fleet grounded'',''Isolate comms''),(''14:30'',''Attack vector
    identified'',''Collect evidence''),(''14:45'',''Root cause: plaintext auth key'',''Rotate
    keys''),(''15:00'',''Fleet restored with encryption'',''Resume ops'')];print(''===
    Incident Timeline ==='');[print(f''  [{t}] {e}\n         Action: {a}'') for t,e,a
    in events]"'
  answer_detail: 인시던트 타임라인은 대응과 사후 분석의 핵심 도구입니다.
  verify:
    type: output_contains
    expect: Incident Timeline
    field: stdout
  target_vm: attacker
- order: 2
  instruction: CPS IR 6단계를 Python으로 구현하시오. 탐지→안전→봉쇄→조사→복구→사후 각 단계의 활동을 출력하라.
  hint: 각 단계별 주요 활동을 리스트로 정의하세요.
  category: analysis
  points: 10
  answer: python3 -c "phases=[('1.Detection','IDS alert + process anomaly'),('2.Safety','Ensure
    physical safety first'),('3.Containment','Isolate affected systems'),('4.Investigation','Forensics
    + timeline reconstruction'),('5.Recovery','Restore from known-good state'),('6.Post-Incident','Root
    cause + improvements')];print('=== CPS IR 6 Phases ===');[print(f'  [{p[0]}] {p[1]}')
    for p in phases]"
  answer_detail: 6단계 프레임워크는 CPS 인시던트의 체계적 대응을 보장합니다.
  verify:
    type: output_contains
    expect: CPS IR 6 Phases
    field: stdout
  target_vm: attacker
- order: 3
  instruction: ICS SCADA 인시던트 시나리오를 시뮬레이션하시오. 수처리 시설의 Modbus 침해 탐지부터 복구까지 대응하라.
  hint: 물리적 안전 확보를 최우선으로 하세요.
  category: analysis
  points: 12
  answer: 'python3 -c "print(''=== ICS Incident: Water Treatment ==='');steps=[(''DETECT'',''Modbus
    write from 10.20.30.201 — unauthorized''),(''SAFETY'',''Switch to MANUAL — verify
    physical gauges''),(''CONTAIN'',''Disconnect PLC from network''),(''INVESTIGATE'',''Modbus
    log: registers tampered, HMI deceived''),(''RECOVER'',''Restore PLC to known-good
    config''),(''POST'',''Root cause: no Modbus auth, flat network'')];[print(f''  [{s[0]}]
    {s[1]}'') for s in steps]"'
  answer_detail: ICS 인시던트에서는 물리적 안전 확인이 사이버 대응보다 우선합니다.
  verify:
    type: output_contains
    expect: ICS Incident
    field: stdout
  target_vm: attacker
- order: 4
  instruction: 네트워크 포렌식 증거를 수집하시오. SIEM에서 최근 로그를 확인하고 공격 흔적을 찾으라.
  hint: siem({{SECU_IP}}00)에서 로그를 확인하세요.
  category: analysis
  points: 10
  answer: ssh ccc@10.20.30.100 'ls /var/log/ 2>/dev/null | head -10' 2>/dev/null ||
    echo "SIEM logs checked"
  answer_detail: SIEM 로그는 인시던트 조사의 핵심 증거입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: attacker
- order: 5
  instruction: LLM에게 CPS IR에서 IT IR과 다른 특수 고려사항을 질의하시오.
  hint: CPS incident response special considerations를 질문하세요.
  category: analysis
  points: 10
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a CPS\
    \ incident response expert.\"},{\"role\":\"user\",\"content\":\"What are 5 unique\
    \ challenges in CPS incident response compared to traditional IT incident response?\"\
    }],\"stream\":false,\"options\":{\"num_predict\":200}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: CPS IR의 특수성을 이해하면 효과적 대응이 가능합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
- order: 6
  instruction: 드론 인시던트 대응 플레이북을 Python으로 생성하시오. 탐지 지표, 안전 조치, 봉쇄, 조사, 복구 5개 섹션을 포함하라.
  hint: 각 섹션의 활동을 리스트로 정의하세요.
  category: config
  points: 12
  answer: python3 -c "playbook={'Detection':['IDS alert on drone commands','Route
    deviation alarm','GPS anomaly'],'Safety':['Issue fleet RTL','Alert airspace authority','Evacuate
    impact area'],'Containment':['Switch to backup channel','Revoke keys','Ground
    fleet'],'Investigation':['Collect GCS logs','Analyze attack vector','Trace attacker
    IP'],'Recovery':['Rotate all keys','Enable MAVLink signing','Implement encryption']};print('===
    Drone IR Playbook ===');[(print(f'  [{k}]'),[print(f'    - {a}') for a in v])
    for k,v in playbook.items()]"
  answer_detail: 인시던트 대응 플레이북은 사전 준비의 핵심 문서입니다.
  verify:
    type: output_contains
    expect: Drone IR Playbook
    field: stdout
  target_vm: attacker
- order: 7
  instruction: secu({{SECU_IP}}) 방화벽에서 Modbus(502) 포트를 차단하는 nftables 규칙을 확인하시오.
  hint: nft list ruleset으로 현재 규칙을 확인하세요.
  category: config
  points: 10
  answer: ssh ccc@10.20.30.1 'sudo nft list ruleset 2>/dev/null | head -20' 2>/dev/null
    || echo "Firewall rules checked — add rule to block port 502 from unauthorized
    sources"
  answer_detail: 방화벽 규칙으로 OT 프로토콜 접근을 제한합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: attacker
- order: 8
  instruction: CPS 인시던트 교훈 보고서를 Python으로 생성하시오. 근본 원인, 개선 사항, 향후 계획을 포함하라.
  hint: 인시던트의 교훈을 체계적으로 정리하세요.
  category: analysis
  points: 12
  answer: python3 -c "print('=== Lessons Learned Report ===');causes=[('No communication
    encryption','CRITICAL'),('No authentication on Modbus','CRITICAL'),('Flat OT network','HIGH')];print('  Root
    Causes:');[print(f'    [{s}] {c}') for c,s in causes];improvements=['Implement
    MAVLink signing','Deploy Modbus authentication','Segment OT/IT networks','Deploy
    CPS-aware IDS','Conduct quarterly pen tests'];print('  Improvements:');[print(f'    {i+1}.
    {im}') for i,im in enumerate(improvements)]"
  answer_detail: 교훈 보고서는 동일 인시던트 재발 방지의 핵심입니다.
  verify:
    type: output_contains
    expect: Lessons Learned
    field: stdout
  target_vm: attacker
