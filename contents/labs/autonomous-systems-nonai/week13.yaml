lab_id: autonomous-systems-nonai-week13
title: '[Non-AI] AI 모델 공격/방어'
version: non-ai
course: autonomous-systems-nonai
week: 13
description: 적대적 입력 생성, AI 로버스트니스 평가, 방어 기법을 실습합니다
difficulty: hard
duration_minutes: 120
objectives:
- FGSM/PGD 공격을 시뮬레이션한다
- 방어 기법을 구현하고 평가한다
- CPS AI 보안 체크리스트를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 FGSM 공격을 수치 시뮬레이션하시오. 5개 특징 벡터에 epsilon 0.1~0.5 섭동을 적용하여 분류 결과 변화를 관찰하라.
  hint: 간소화된 선형 분류기에 sign gradient 방향 섭동을 가하세요.
  category: attack
  points: 12
  answer: 'python3 -c "import math;w=[0.8,-0.3,0.5,0.2,-0.4];b=-0.5;x=[0.9,0.2,0.7,0.5,0.3];p0=1/(1+math.exp(-(sum(wi*xi for wi,xi in zip(w,x))+b)));print(f''=== FGSM Attack ==='');print(f''  Original: p={p0:.3f} → STOP_SIGN'');[print(f''  eps={e}: p={1/(1+math.exp(-(sum(wi*(xi-e*(1 if wi>0 else -1)) for wi,xi in zip(w,x))+b))):.3f} → {\"EVADED\" if 1/(1+math.exp(-(sum(wi*(xi-e*(1 if wi>0 else -1))
    for wi,xi in zip(w,x))+b)))<0.5 else \"DETECTED\"}'') for e in [0.1,0.2,0.3,0.5]]"'
  answer_detail: FGSM은 그래디언트 부호 방향으로 섭동을 가하는 공격입니다.
  verify:
    type: output_contains
    expect: FGSM Attack
    field: stdout
  target_vm: attacker
- order: 2
  instruction: PGD 공격과 FGSM 공격의 차이를 시뮬레이션으로 비교하시오. 반복 횟수에 따른 공격 성공률 변화를 출력하라.
  hint: PGD는 FGSM을 반복 적용하는 것과 유사합니다.
  category: attack
  points: 12
  answer: python3 -c "print('=== FGSM vs PGD Comparison ===');print(f'  {\"Method\":<10} {\"Steps\":<8} {\"Success\":<10} {\"L2 Norm\":<10}');data=[('FGSM',1,'60%','0.45'),('PGD-5',5,'75%','0.38'),('PGD-10',10,'85%','0.32'),('PGD-20',20,'92%','0.28')];[print(f'  {d[0]:<10} {d[1]:<8} {d[2]:<10} {d[3]:<10}') for d in data];print('  [*] PGD achieves higher success with smaller perturbation')"
  answer_detail: PGD는 반복 최적화로 FGSM보다 강력한 공격입니다.
  verify:
    type: output_contains
    expect: FGSM vs PGD
    field: stdout
  target_vm: attacker
- order: 3
  instruction: 가우시안 노이즈 방어 기법을 구현하시오. 적대적 입력에 노이즈를 추가하여 공격 성공률 변화를 측정하라.
  hint: random.gauss로 노이즈를 추가하세요.
  category: config
  points: 12
  answer: 'python3 -c "import random;random.seed(42);x_adv=[1.2,-0.1,1.0,0.7,0.0];print(''=== Gaussian Noise Defense ==='');results=[];[results.append(sum(1 for _ in range(10) if sum([0.8,-0.3,0.5,0.2,-0.4][j]*(x_adv[j]+random.gauss(0,s)) for j in range(5))-0.5>0)) for s in [0.05,0.1,0.2]];print(f''  sigma=0.05: recovery {results[0]*10}%'');print(f''  sigma=0.10: recovery {results[1]*10}%'');print(f''  sigma=0.20:
    recovery {results[2]*10}%'')"'
  answer_detail: 가우시안 노이즈는 적대적 섭동을 상쇄하는 간단한 방어입니다.
  verify:
    type: output_contains
    expect: Gaussian Noise
    field: stdout
  target_vm: attacker
- order: 4
  instruction: Feature Squeezing 방어를 구현하고 효과를 측정하시오.
  hint: 입력 정밀도를 줄여서 적대적 섭동을 제거하세요.
  category: config
  points: 12
  answer: 'python3 -c "x_adv=[1.23,-0.15,1.02,0.73,0.04];squeezed=[round(x,1) for x in x_adv];print(''=== Feature Squeezing ==='');print(f''  Before: {x_adv}'');print(f''  After:  {squeezed}'');print(f''  Diff: {[round(a-b,2) for a,b in zip(x_adv,squeezed)]}'');print(''  [OK] Small perturbations removed by precision reduction'')"'
  answer_detail: Feature Squeezing은 소수점 이하 섭동을 제거합니다.
  verify:
    type: output_contains
    expect: Feature Squeezing
    field: stdout
  target_vm: attacker
- order: 5
  instruction: 앙상블 방어를 구현하시오. 3개 모델의 투표로 적대적 입력을 탐지하라.
  hint: 각 모델의 예측 결과를 다수결로 결합하세요.
  category: config
  points: 12
  answer: 'python3 -c "import math;models=[[0.8,-0.3,0.5,0.2,-0.4],[0.7,-0.2,0.6,0.1,-0.3],[0.9,-0.4,0.4,0.3,-0.5]];x_adv=[1.2,-0.1,1.0,0.7,0.0];votes=[1/(1+math.exp(-(sum(w*x for w,x in zip(m,x_adv))-0.5)))>0.5 for m in models];print(''=== Ensemble Defense ==='');[print(f''  Model {i+1}: {\"STOP\" if v else \"NOT_STOP\"}'') for i,v in enumerate(votes)];majority=sum(votes)>len(votes)/2;print(f''  Majority
    vote: {\"STOP_SIGN\" if majority else \"NOT_STOP\"}'');print(f''  Agreement: {sum(votes)}/{len(votes)}'')"'
  answer_detail: 앙상블은 단일 모델 공격의 전이성을 줄여줍니다.
  verify:
    type: output_contains
    expect: Ensemble Defense
    field: stdout
  target_vm: attacker
- order: 6
  instruction: LLM에게 CPS 환경에서 AI 적대적 공격이 특히 위험한 이유를 질의하시오.
  hint: adversarial ML risks in cyber-physical systems를 질문하세요.
  category: analysis
  points: 10
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are an AI safety researcher.\"},{\"role\":\"user\",\"content\":\"Why are adversarial ML attacks more dangerous in CPS (drones, autonomous vehicles, robots) than in typical IT systems? Give 3 specific reasons.\"}],\"stream\":false,\"options\":{\"num_predict\"\
    :150}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: CPS에서 AI 공격은 물리적 피해로 직결됩니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
- order: 7
  instruction: 적대적 공격 탐지 시스템을 구현하시오. 입력 변환 전후의 차이로 적대적 입력을 판별하라.
  hint: 원본과 변환된 입력의 L2 거리를 측정하세요.
  category: config
  points: 10
  answer: 'python3 -c "import math;x_adv=[1.2,-0.1,1.0,0.7,0.0];x_squeezed=[round(x,1) for x in x_adv];x_normal=[0.9,0.2,0.7,0.5,0.3];n_squeezed=[round(x,1) for x in x_normal];d_adv=math.sqrt(sum((a-b)**2 for a,b in zip(x_adv,x_squeezed)));d_normal=math.sqrt(sum((a-b)**2 for a,b in zip(x_normal,n_squeezed)));thresh=0.1;print(''=== Adversarial Detection ==='');print(f''  Normal input diff:  {d_normal:.4f}
    → {\"OK\" if d_normal<thresh else \"SUSPICIOUS\"}'');print(f''  Adversarial diff:   {d_adv:.4f} → {\"OK\" if d_adv<thresh else \"SUSPICIOUS\"}'');print(f''  Threshold: {thresh}'')"'
  answer_detail: 변환 일관성 검사로 적대적 입력을 탐지합니다.
  verify:
    type: output_contains
    expect: Adversarial Detection
    field: stdout
  target_vm: attacker
- order: 8
  instruction: CPS AI 보안 체크리스트를 Python으로 생성하시오. 10가지 항목을 평가하라.
  hint: 필수/권장 항목을 구분하세요.
  category: analysis
  points: 10
  answer: 'python3 -c "items=[(''Robustness test'',''필수'',False),(''Input validation'',''필수'',True),(''Ensemble models'',''권장'',False),(''Adversarial training'',''권장'',False),(''Real-time monitoring'',''필수'',True),(''Sensor fusion verify'',''필수'',True),(''Model integrity'',''필수'',False),(''Explainability'',''권장'',False),(''Physical attack test'',''권장'',False),(''Failsafe mode'',''필수'',True)];ok=sum(v
    for _,_,v in items);print(''=== CPS AI Security Checklist ==='');[print(f''  [{\"OK\" if v else \"!!\"} ] [{r}] {n}'') for n,r,v in items];print(f''  Score: {ok}/{len(items)}'')"'
  answer_detail: AI 보안 체크리스트로 CPS 시스템의 AI 보안 수준을 평가합니다.
  verify:
    type: output_contains
    expect: AI Security Checklist
    field: stdout
  target_vm: attacker
