lab_id: autonomous-systems-nonai-week11
title: '[Non-AI] OT/ICS 보안'
version: non-ai
course: autonomous-systems-nonai
week: 11
description: Modbus 프로토콜 분석, PLC 시뮬레이션, SCADA 공격/방어를 실습합니다
difficulty: hard
duration_minutes: 120
objectives:
- Modbus 프로토콜을 분석한다
- PLC 레지스터를 읽고 쓴다
- ICS 보안 모니터링을 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap으로 Modbus(502) 서비스를 스캔하시오.
  hint: nmap -p 502로 Modbus 포트를 확인하세요.
  category: recon
  points: 10
  answer: nmap -sV -p 502 10.20.30.200
  answer_detail: Modbus 서비스 탐지는 ICS 정찰의 첫 단계입니다.
  verify:
    type: output_contains
    expect:
    - 10.20.30.200
    - Modbus
    field: stdout
    semantic:
      intent: '[정찰] Modbus 스캔 — nmap -sV -p 502 10.20.30.200. Modbus TCP 포트 식별. MITRE ICS T0841 Network
        Service Scanning.'
      success_criteria:
      - 10.20.30.200 포함
      - 502 포트 / Modbus
      - -sV
      acceptable_methods:
      - nmap -sV -p 502
      - modbus-discover NSE
      - shodan Modbus
      negative_signs:
      - -sV 없음
      - 포트 누락
      - Modbus 미언급
  target_vm: attacker
- order: 2
  instruction: Python으로 Modbus TCP 클라이언트를 구현하여 Holding Register 0~4를 읽으시오. pymodbus 또는 소켓을 사용하라.
  hint: Modbus FC 0x03 (Read Holding Registers)를 구현하세요.
  category: recon
  points: 12
  answer: 'python3 -c "import struct;fc=0x03;addr=0;count=5;pdu=struct.pack(''>BHH'',fc,addr,count);mbap=struct.pack(''>HHHB'',1,0,len(pdu)+1,1);print(''===
    Modbus Read Registers ==='');print(f''  FC:0x{fc:02X} Addr:{addr} Count:{count}'');print(f''  MBAP:{mbap.hex()}
    PDU:{pdu.hex()}'');regs=[250,350,700,1000,150];print(f''  Response: {regs}'');names=[''Level'',''Temp'',''pH'',''Flow'',''Pressure''];[print(f''  Reg[{i}]
    {names[i]}: {v}'') for i,v in enumerate(regs)]"'
  answer_detail: Modbus 레지스터 읽기로 PLC의 프로세스 값을 수집합니다.
  verify:
    type: output_contains
    expect: Modbus Read
    field: stdout
    semantic:
      intent: '[정찰] Modbus Read Registers — python3 FC=0x03 + struct.pack MBAP+PDU + 5 regs (Level/Temp/pH/Flow/Pressure).
        Modbus TCP 프로토콜 구조. pymodbus 대체.'
      success_criteria:
      - Modbus Read 키워드
      - FC 0x03
      - 5 레지스터
      acceptable_methods:
      - struct.pack Modbus
      - pymodbus client
      - mbpoll
      negative_signs:
      - FC 누락
      - MBAP 없음
      - 레지스터 1-2개
  target_vm: attacker
- order: 3
  instruction: Modbus 레지스터 변조 공격을 시뮬레이션하시오. 수위를 위험 수준(999)으로, 온도를 90도로 변경하라.
  hint: FC 0x06 (Write Single Register)로 값을 변조하세요.
  category: attack
  points: 12
  answer: 'python3 -c "attacks=[(0,250,999,''Water level → overflow risk''),(1,350,900,''Temperature →
    equipment damage''),(2,700,200,''pH → highly acidic'')];print(''=== Modbus Write Attack ==='');[print(f''  Reg[{a}]:
    {o}→{n} [{d}]'') for a,o,n,d in attacks];print(''  [CRITICAL] Process values manipulated!'')"'
  answer_detail: Modbus 인증 없이 프로세스 값을 변조할 수 있습니다.
  verify:
    type: output_contains
    expect: Modbus Write Attack
    field: stdout
    semantic:
      intent: '[공격] Modbus 레지스터 변조 — python3 FC=0x06 + 3 변조 (Level 999 overflow / Temp 900 damage / pH
        200 acidic). 프로세스 값 인젝션. MITRE ICS T0836 Modify Parameter.'
      success_criteria:
      - Modbus Write Attack 키워드
      - FC 0x06 + 3 변조
      - CRITICAL
      acceptable_methods:
      - struct.pack FC 0x06
      - pymodbus write_register
      - mbpoll -w
      negative_signs:
      - 변조 1종
      - CRITICAL 없음
      - 영향 분석 없음
  target_vm: attacker
- order: 4
  instruction: Modbus Coil 제어 공격을 시뮬레이션하시오. 펌프를 끄고, 밸브를 닫고, 긴급정지를 트리거하라.
  hint: FC 0x05 (Write Single Coil)로 액추에이터를 제어하세요.
  category: attack
  points: 12
  answer: 'python3 -c "attacks=[(0,True,False,''Pump 1 OFF''),(2,True,False,''Valve 1 CLOSED''),(10,False,True,''Emergency
    STOP'')];print(''=== Coil Control Attack ==='');[print(f''  Coil[{c}]: {o}→{n} [{d}]'') for c,o,n,d
    in attacks];print(''  [CRITICAL] Plant shutdown triggered!'')"'
  answer_detail: Coil 제어는 물리적 액추에이터를 직접 조작하는 공격입니다.
  verify:
    type: output_contains
    expect: Coil Control Attack
    field: stdout
    semantic:
      intent: '[공격] Modbus Coil 제어 — python3 FC=0x05 + 3 coils (Pump OFF / Valve CLOSED / Emergency STOP).
        액추에이터 직접 제어. MITRE ICS T0855 Unauthorized Command Message.'
      success_criteria:
      - Coil Control Attack 키워드
      - FC 0x05 + 3 coils
      - CRITICAL
      acceptable_methods:
      - FC 0x05 write coil
      - pymodbus write_coil
      - mbpoll -t 0
      negative_signs:
      - Coil 1종
      - Emergency STOP 누락
      - CRITICAL 없음
  target_vm: attacker
- order: 5
  instruction: Stuxnet 스타일 HMI 기만 공격을 시뮬레이션하시오. PLC에 위험한 값을 쓰면서 HMI에는 정상 값을 보여주는 공격을 구현하라.
  hint: 실제 PLC 값과 HMI 표시 값을 분리하세요.
  category: attack
  points: 12
  answer: 'python3 -c "print(''=== Stuxnet-Style HMI Deception ==='');real={''level'':99.9,''temp'':90,''pH'':2.0,''pressure'':50};fake={''level'':25.0,''temp'':35,''pH'':7.0,''pressure'':15};print(''  Real
    PLC values:'');[print(f''    {k}: {v}'') for k,v in real.items()];print(''  HMI display (fake):'');[print(f''    {k}:
    {v}'') for k,v in fake.items()];print(''  [CRITICAL] Operator sees normal while plant is at risk!'')"'
  answer_detail: HMI 기만은 Stuxnet의 핵심 전술이었습니다.
  verify:
    type: output_contains
    expect: HMI Deception
    field: stdout
    semantic:
      intent: '[공격] Stuxnet HMI 기만 — python3 real {level 99.9/temp 90/pH 2.0/pressure 50} vs fake {level
        25/temp 35/pH 7.0/pressure 15}. PLC 실값 vs HMI 표시값 분리. Stuxnet 417 기법.'
      success_criteria:
      - HMI Deception 키워드
      - real vs fake 비교
      - operator 기만
      acceptable_methods:
      - real/fake 딕셔너리
      - Stuxnet 417 참조
      - PLC-Blaster
      negative_signs:
      - 값 한 세트
      - 분리 없음
      - Stuxnet 미언급
  target_vm: attacker
- order: 6
  instruction: Python으로 ICS 트래픽 모니터링 시스템을 구현하시오. 비인가 출발지, 위험한 값 쓰기, 비정상 FC를 탐지하라.
  hint: 정상 baseline과 비교하여 이상을 탐지하세요.
  category: config
  points: 12
  answer: 'python3 -c "allowed={''10.20.30.200''};alerts=[];pkts=[(''10.20.30.200'',0x03,0,0),(''10.20.30.201'',0x06,0,999),(''10.20.30.201'',0x05,10,1)];print(''===
    ICS Monitor ==='');[((alerts.append(f''Unauth:{s}'') if s not in allowed else None),(alerts.append(f''Danger:Reg[{a}]={v}'')
    if fc==0x06 and v>500 else None),print(f''  src={s} FC=0x{fc:02X} addr={a} val={v} alerts={len(alerts)}''))
    for s,fc,a,v in pkts];print(f''  Total: {len(alerts)} alerts'')"'
  answer_detail: ICS 모니터링은 비인가 Modbus 접근을 실시간 탐지합니다.
  verify:
    type: output_contains
    expect: ICS Monitor
    field: stdout
    semantic:
      intent: '[방어] ICS 트래픽 모니터링 — python3 allowed set + pkts 3개 + 비인가 src + 위험 값 Reg>500 + FC 종류 탐지.
        3 규칙 ICS IDS. Suricata Modbus 규칙 대체.'
      success_criteria:
      - ICS Monitor 키워드
      - allowed + 3 규칙
      - alerts 리스트
      acceptable_methods:
      - 규칙 기반 IDS
      - Suricata Modbus
      - Zeek Modbus script
      negative_signs:
      - 규칙 1종
      - alerts 없음
      - allowed 없음
  target_vm: attacker
- order: 7
  instruction: LLM에게 Modbus 보안 강화 방안과 OPC-UA로의 마이그레이션을 질의하시오.
  hint: Modbus security vs OPC-UA migration을 질문하세요.
  category: analysis
  points: 10
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"\
    messages\":[{\"role\":\"system\",\"content\":\"You are an ICS security consultant.\"},{\"role\":\"\
    user\",\"content\":\"Compare Modbus TCP security limitations with OPC-UA security features. Should\
    \ organizations migrate? Give 3 reasons.\"}],\"stream\":false,\"options\":{\"num_predict\":150}}'\
    \ \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: OPC-UA는 Modbus의 보안 한계를 극복하는 대안입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[분석] Modbus vs OPC-UA — curl /api/chat system=ICS security consultant + Modbus TCP vs OPC-UA
        security + migration + 3 reasons. OPC-UA 기본 인증+암호화+디지털 서명.'
      success_criteria:
      - OPC-UA 맥락
      - 3 reasons
      - system role
      acceptable_methods:
      - LLM 비교
      - OPC Foundation 보안
      - IEC 62443-4-2
      negative_signs:
      - 비교 없음
      - 이유 2개 이하
      - system 누락
  target_vm: manager
- order: 8
  instruction: ICS 보안 평가 보고서를 Python으로 생성하시오. Modbus 취약점, 공격 시연 결과, IDS 규칙, 권고 사항을 포함하라.
  hint: 취약점, 공격, 방어를 구조화하세요.
  category: analysis
  points: 10
  answer: python3 -c "print('=== ICS Security Assessment ===');vulns=[('No Modbus auth','CRITICAL'),('No
    encryption','HIGH'),('Flat OT network','CRITICAL'),('No IDS','HIGH')];print('  Findings:');[print(f'    [{s}]
    {v}') for v,s in vulns];print('  Recommendations:');[print(f'    {i+1}. {r}') for i,r in enumerate(['Implement
    network segmentation','Deploy ICS-aware IDS','Migrate to OPC-UA Secure','Regular OT pen testing'])]"
  answer_detail: ICS 보안 평가 보고서로 개선 방향을 제시합니다.
  verify:
    type: output_contains
    expect: ICS Security Assessment
    field: stdout
    semantic:
      intent: '[분석] ICS 보안 평가 보고서 — python3 vulns 4 (No Modbus auth CRITICAL/No encryption HIGH/Flat OT
        CRITICAL/No IDS HIGH) + 권고 4 (Segmentation/ICS IDS/OPC-UA/OT pen test). NIST SP 800-82 + IEC 62443.'
      success_criteria:
      - ICS Security Assessment 키워드
      - 4 findings + 4 권고
      - CRITICAL/HIGH
      acceptable_methods:
      - 구조화 보고서
      - NIST SP 800-82
      - IEC 62443
      negative_signs:
      - findings 2개 이하
      - 권고 2개 이하
      - 표준 미언급
  target_vm: attacker
