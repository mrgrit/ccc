lab_id: autonomous-systems-nonai-week01
title: '[Non-AI] CPS 보안 개론'
version: non-ai
course: autonomous-systems-nonai
week: 1
description: 사이버물리시스템(CPS)의 구조를 이해하고 위협 모델을 분석합니다
difficulty: easy
duration_minutes: 120
objectives:
- CPS 개념과 구성 요소를 이해한다
- 네트워크 스캔으로 CPS 자산을 식별한다
- STRIDE 위협 모델을 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 실습 네트워크(10.20.30.0/24)에서 활성 호스트를 스캔하여 CPS 자산을 식별하시오.
  hint: nmap -sn으로 호스트 발견 스캔을 수행하세요.
  category: recon
  points: 10
  answer: nmap -sn 10.20.30.0/24
  answer_detail: 네트워크 호스트 발견은 CPS 자산 식별의 첫 단계입니다.
  verify:
    type: output_contains
    expect: Host is up
    field: stdout
    semantic:
      intent: '[정찰] CPS 자산 호스트 발견 — nmap -sn 10.20.30.0/24. Ping 스캔으로 활성 호스트 발견. CPS 자산 (드론/PLC/SCADA)
        식별. MITRE ICS T0840 Network Connection Enumeration.'
      success_criteria:
      - Host is up 출력
      - /24 전체 스캔
      - 호스트 발견
      acceptable_methods:
      - nmap -sn ping scan
      - fping -a
      - arp-scan -l
      negative_signs:
      - 단일 호스트
      - -sn 없음
      - 서브넷 미지정
  target_vm: attacker
- order: 2
  instruction: manager({{MANAGER_IP}})에서 OT 관련 포트(502-Modbus, 9999-드론시뮬, 11434-LLM)를 스캔하시오.
  hint: nmap -p 옵션으로 특정 포트를 스캔하세요.
  category: recon
  points: 10
  answer: nmap -sV -p 502,9999,11434 10.20.30.200
  answer_detail: OT 프로토콜 포트 식별은 CPS 환경 매핑에 필수적입니다.
  verify:
    type: output_contains
    expect: 10.20.30.200
    field: stdout
    semantic:
      intent: '[정찰] OT 포트 스캔 — nmap -sV -p 502,9999,11434 10.20.30.200. 502 Modbus + 9999 드론시뮬 + 11434
        LLM. OT 프로토콜 식별. MITRE ICS T0841 Network Service Scanning.'
      success_criteria:
      - 10.20.30.200 포함
      - 502/9999/11434 포트
      - -sV 버전
      acceptable_methods:
      - nmap -sV -p 특정포트
      - masscan Modbus
      - Shodan OT 스캔
      negative_signs:
      - -sV 없음
      - 포트 1-2개
      - OT 포트 누락
  target_vm: attacker
- order: 3
  instruction: LLM에게 CPS 보안의 핵심 원칙 3가지를 질의하시오.
  hint: Ollama API /api/generate를 사용하세요.
  category: analysis
  points: 12
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"List 3 key principles of cyber-physical system security in 3 sentences\",\"stream\"\
    :false,\"options\":{\"num_predict\":100}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: LLM을 활용하여 CPS 보안 개념을 빠르게 정리합니다.
  verify:
    type: output_contains
    expect:
    - 원칙
    field: stdout
    semantic:
      intent: '[분석] CPS 보안 3 원칙 질의 — curl /api/generate prompt=''List 3 key principles of cyber-physical
        system security'' num_predict:100. LLM 기반 보안 원칙 요약. CIA + Safety.'
      success_criteria:
      - 원칙 출력
      - /api/generate
      - CPS 용어
      acceptable_methods:
      - curl + json
      - ollama
      - LangChain
      negative_signs:
      - 원칙 미언급
      - num_predict 없음
      - 응답 없음
  target_vm: manager
- order: 4
  instruction: LLM에게 STRIDE 위협 모델을 드론 시스템에 적용한 분석을 요청하시오.
  hint: system role에 보안 분석가를 설정하세요.
  category: analysis
  points: 12
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"\
    messages\":[{\"role\":\"system\",\"content\":\"You are a CPS threat modeling expert.\"},{\"role\"\
    :\"user\",\"content\":\"Apply STRIDE threat model to a WiFi-controlled drone system. List one threat\
    \ per category.\"}],\"stream\":false,\"options\":{\"num_predict\":200}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: STRIDE를 CPS에 적용하면 체계적 위협 식별이 가능합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[분석] STRIDE 드론 적용 — curl /api/chat system=CPS threat modeling expert + Apply STRIDE to
        WiFi-controlled drone, one threat per category. STRIDE 6 카테고리 (Spoofing/Tampering/Repudiation/Info
        Disclosure/DoS/EoP) 드론 매핑.'
      success_criteria:
      - STRIDE 카테고리
      - 드론 맥락
      - system role
      acceptable_methods:
      - STRIDE 매핑
      - Microsoft SDL
      - PASTA threat modeling
      negative_signs:
      - 카테고리 3개 이하
      - 드론 맥락 없음
      - system 누락
  target_vm: manager
- order: 5
  instruction: Python으로 CPS 자산-위협 매핑 테이블을 생성하시오. 드론의 5가지 자산에 대해 STRIDE 위협을 매핑하라.
  hint: 딕셔너리로 자산별 위협을 정의하세요.
  category: analysis
  points: 12
  answer: 'python3 -c " assets={''GPS'':[''Spoofing'',''DoS''],''WiFi'':[''Spoofing'',''Tampering'',''DoS''],''FC'':[''Tampering'',''EoP''],''Camera'':[''InfoDisc'',''DoS''],''Firmware'':[''Tampering'',''EoP'']}
    ;print(''=== CPS Asset-Threat Map ==='') ;[print(f''  {a}: {t}'') for a,t in assets.items()]"'
  answer_detail: 자산별 위협 매핑은 보안 우선순위를 설정하는 기초입니다.
  verify:
    type: output_contains
    expect: Asset-Threat Map
    field: stdout
    semantic:
      intent: '[분석] 자산-위협 매핑 — python3 assets dict 5 자산 (GPS Spoofing+DoS / WiFi S+T+D / FC Tampering+EoP
        / Camera InfoDisc+DoS / Firmware T+EoP) + STRIDE 매핑. 5 자산 × 2-3 위협.'
      success_criteria:
      - Asset-Threat Map 키워드
      - 5 자산 매핑
      - STRIDE 약어
      acceptable_methods:
      - dict asset:threats
      - DREAD scoring
      - PASTA threat library
      negative_signs:
      - 자산 3개 이하
      - STRIDE 약어 누락
      - 매핑 없음
  target_vm: attacker
- order: 6
  instruction: LLM에게 Stuxnet 공격의 킬 체인을 분석하도록 요청하시오.
  hint: 사이버 킬 체인 프레임워크를 적용하여 질문하세요.
  category: analysis
  points: 12
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"\
    messages\":[{\"role\":\"system\",\"content\":\"You are an ICS security historian.\"},{\"role\":\"\
    user\",\"content\":\"Describe the Stuxnet cyber kill chain in 5 steps. Focus on how it crossed from\
    \ cyber to physical domain.\"}],\"stream\":false,\"options\":{\"num_predict\":200}}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: Stuxnet은 CPS 보안 역사에서 가장 중요한 사례입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[분석] Stuxnet 킬 체인 — curl /api/chat system=ICS security historian + Describe Stuxnet cyber
        kill chain in 5 steps, cyber→physical. Lockheed Martin Kill Chain + Purdue model 경계 침투. Siemens
        S7-300 PLC.'
      success_criteria:
      - Stuxnet 맥락
      - system role
      - cyber→physical
      acceptable_methods:
      - Kill Chain 7단계
      - Diamond Model
      - MITRE ICS ATT&CK
      negative_signs:
      - 단계 3개 이하
      - cyber-physical 미언급
      - system 없음
  target_vm: manager
- order: 7
  instruction: secu({{SECU_IP}}) 방화벽에서 Modbus(502) 포트에 대한 현재 nftables 규칙을 확인하시오.
  hint: nft list ruleset 명령으로 확인하세요.
  category: config
  points: 10
  answer: ssh ccc@10.20.30.1 'sudo nft list ruleset' 2>/dev/null | head -30 || echo "Firewall rules checked"
  answer_detail: OT 프로토콜에 대한 방화벽 규칙은 CPS 보안의 기본입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[설정] Modbus 502 방화벽 규칙 확인 — ssh ccc@10.20.30.1 ''sudo nft list ruleset'' | head -30. OT
        프로토콜 방화벽 기준선 확인. NIST SP 800-82 ICS.'
      success_criteria:
      - ssh + nft list
      - ruleset 출력
      - Modbus 502 맥락
      acceptable_methods:
      - nft list ruleset
      - iptables -L
      - fwbuilder export
      negative_signs:
      - list 없음
      - OT 맥락 없음
      - SSH 없음
  target_vm: attacker
- order: 8
  instruction: Python으로 CPS 보안 점수 평가기를 만들어 현재 환경의 보안 수준을 평가하시오. 6가지 보안 항목을 체크하라.
  hint: 각 보안 항목의 존재 여부를 True/False로 평가하세요.
  category: analysis
  points: 12
  answer: 'python3 -c " checks={''Network Segmentation'':False,''Modbus Auth'':False,''Drone Encryption'':False,''IDS
    Deployed'':True,''Firewall'':True,''SIEM'':True} ;score=sum(checks.values())/len(checks)*100 ;print(''===
    CPS Security Assessment ==='') ;[print(f''  [{\"PASS\" if v else \"FAIL\"}] {k}'') for k,v in checks.items()]
    ;print(f''Score: {score:.0f}%'')"'
  answer_detail: 보안 평가는 현재 상태를 파악하고 개선 방향을 설정합니다.
  verify:
    type: output_contains
    expect: Security Assessment
    field: stdout
    semantic:
      intent: '[분석] CPS 보안 점수 평가기 — python3 checks 6 항목 (Segmentation/Modbus Auth/Drone Encryption/IDS/Firewall/SIEM)
        + True/False + Score % 계산. PASS/FAIL + Score 출력. NIST SP 800-82 CPS baseline.'
      success_criteria:
      - CPS Security Assessment 키워드
      - 6 항목 + PASS/FAIL
      - Score %
      acceptable_methods:
      - checks dict + score
      - NIST CSF 평가
      - CIS Controls
      negative_signs:
      - 항목 3개 이하
      - '% 계산 없음'
      - PASS/FAIL 누락
  target_vm: attacker
