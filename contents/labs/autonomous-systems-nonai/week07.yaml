lab_id: autonomous-systems-nonai-week07
title: '[Non-AI] 자율주행 공격'
version: non-ai
course: autonomous-systems-nonai
week: 7
description: 적대적 패치, CAN 버스 인젝션, OTA 변조 공격을 실습합니다
difficulty: hard
duration_minutes: 120
objectives:
- 적대적 공격을 시뮬레이션한다
- CAN 버스 메시지를 분석하고 인젝션한다
- OTA 업데이트 보안을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Python으로 FGSM 적대적 공격을 수치 시뮬레이션하시오. epsilon 0.1~0.5에서 분류 결과 변화를 관찰하라.
  hint: 간소화된 분류기에 sign gradient 방향으로 섭동을 가하세요.
  category: attack
  points: 12
  answer: 'python3 -c "import math;w=[0.8,-0.3,0.5,0.2,-0.4];b=-0.5;x=[0.9,0.2,0.7,0.5,0.3];logit=sum(wi*xi for wi,xi in zip(w,x))+b;p=1/(1+math.exp(-logit));print(f''Original: STOP_SIGN (p={p:.3f})'');[print(f''  eps={e}: {\"EVADED\" if 1/(1+math.exp(-(sum(wi*(xi+e*(1 if wi>0 else -1)) for wi,xi in zip(w,x))+b)))<0.5 else \"DETECTED\"}'') for e in [0.1,0.2,0.3,0.5]]"'
  answer_detail: FGSM은 가장 기본적인 적대적 공격 알고리즘입니다.
  verify:
    type: output_contains
    expect: Original
    field: stdout
  target_vm: attacker
- order: 2
  instruction: Python으로 가상 CAN 버스 트래픽을 생성하고 분석하시오. 엔진(0x100), 브레이크(0x200), 조향(0x300) ECU 메시지를 시뮬레이션하라.
  hint: struct.pack으로 CAN 프레임 데이터를 구성하세요.
  category: config
  points: 12
  answer: 'python3 -c "import struct;msgs=[(0x100,struct.pack(''>HH'',6000,2500)+b''\x00''*4,''Engine: 60km/h 2500rpm''),(0x200,b''\x00''*8,''Brake: released''),(0x300,struct.pack(''>h'',0)+b''\x00''*6,''Steer: 0 deg'')];print(''=== CAN Bus Traffic ==='');[print(f''  ID:0x{m[0]:03X} Data:{m[1].hex()} | {m[2]}'') for m in msgs]"'
  answer_detail: CAN 메시지 구조를 이해하면 인젝션 공격을 수행할 수 있습니다.
  verify:
    type: output_contains
    expect: CAN Bus Traffic
    field: stdout
  target_vm: attacker
- order: 3
  instruction: CAN 버스 인젝션 공격을 시뮬레이션하시오. 조향 명령(45도 우회전)과 브레이크 비활성화를 인젝션하라.
  hint: struct.pack으로 조향 각도와 브레이크 값을 인코딩하세요.
  category: attack
  points: 12
  answer: python3 -c "import struct;print('=== CAN Injection Attack ===');steer=struct.pack('>h',450)+b'\x00'*6;print(f'  [INJECT] ID:0x300 Data:{steer.hex()} — Force right turn 45deg');brake=b'\x00'*8;print(f'  [INJECT] ID:0x200 Data:{brake.hex()} — Disable brakes');print('  [CRITICAL] Vehicle steering and brakes compromised!')"
  answer_detail: CAN 인젝션은 차량 제어를 직접 탈취하는 치명적 공격입니다.
  verify:
    type: output_contains
    expect: CAN Injection
    field: stdout
  target_vm: attacker
- order: 4
  instruction: Python으로 OTA 업데이트 서명 검증 시스템을 구현하시오. 정상/변조/롤백 업데이트를 각각 검증하라.
  hint: hmac과 hashlib으로 서명 생성 및 검증을 구현하세요.
  category: config
  points: 12
  answer: 'python3 -c "import hmac,hashlib;key=b''mfg_key'';fw=b''firmware_v2.2'';sig=hmac.new(key,fw,hashlib.sha256).hexdigest()[:32];print(''=== OTA Verification ==='');print(f''  [PASS] Legit: sig matches'');fake_sig=hmac.new(b''fake'',fw,hashlib.sha256).hexdigest()[:32];print(f''  [FAIL] Tampered: sig mismatch'');print(f''  [FAIL] Rollback: v1.9 < current v2.1'');print(''  OTA security: signature
    + version + hash required'')"'
  answer_detail: OTA 보안은 서명, 해시, 롤백 방지의 3중 검증이 필요합니다.
  verify:
    type: output_contains
    expect: OTA Verification
    field: stdout
  target_vm: attacker
- order: 5
  instruction: CAN 버스 DoS 공격 시뮬레이션을 수행하시오. 최고 우선순위(ID=0x000) 프레임을 대량 전송하여 다른 ECU 통신을 차단하라.
  hint: 가장 낮은 CAN ID가 가장 높은 우선순위입니다.
  category: attack
  points: 12
  answer: 'python3 -c "print(''=== CAN Bus DoS Attack ==='');[print(f''  Frame {i}: ID=0x000 Data=FFFFFFFFFFFFFFFF (highest priority)'') for i in range(5)];print(''  [!] Legitimate ECU messages blocked by arbitration'');print(''  [!] Safety-critical messages (brake, airbag) cannot transmit'')"'
  answer_detail: CAN DoS는 안전 시스템 통신을 차단하여 생명을 위협합니다.
  verify:
    type: output_contains
    expect: CAN Bus DoS
    field: stdout
  target_vm: attacker
- order: 6
  instruction: LLM에게 CAN 버스 인증 기술(SecOC)의 원리를 질의하시오.
  hint: AUTOSAR SecOC CAN authentication을 질문하세요.
  category: analysis
  points: 10
  answer: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are an automotive cybersecurity expert.\"},{\"role\":\"user\",\"content\":\"Explain AUTOSAR SecOC (Secure Onboard Communication) for CAN bus authentication. How does it prevent message injection?\"}],\"stream\":false,\"options\":{\"num_predict\":150}}'\
    \ \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: SecOC는 CAN 메시지 인증의 산업 표준입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
- order: 7
  instruction: Python으로 CAN IDS를 구현하시오. 메시지 빈도 이상, 알 수 없는 ID, 데이터 범위 위반을 탐지하라.
  hint: 정상 트래픽 baseline과 비교하여 이상을 탐지하세요.
  category: config
  points: 10
  answer: 'python3 -c "alerts=[];normal_ids={0x100,0x200,0x300,0x400};traffic=[(0x100,60),(0x200,0),(0x000,100),(0x300,450)];print(''=== CAN IDS ==='');exec(''\\nfor aid,val in traffic:\\n  if aid not in normal_ids: alerts.append(f\"Unknown ID 0x{aid:03X}\")\\n  if aid==0x200 and val==0: alerts.append(\"Brake zero while moving\")\\n  if aid==0x300 and abs(val)>300: alerts.append(f\"Steering {val/10}deg
    exceeds limit\")\\n  print(f\"  ID:0x{aid:03X} val={val} alerts={len(alerts)}\")\\n'');[print(f''  [!] {a}'') for a in alerts]"'
  answer_detail: CAN IDS는 인젝션 공격과 이상 트래픽을 실시간 탐지합니다.
  verify:
    type: output_contains
    expect: CAN IDS
    field: stdout
  target_vm: attacker
- order: 8
  instruction: 자율주행 공격 종합 보고서를 Python으로 생성하시오. 적대적 패치, CAN 인젝션, OTA 변조 공격의 위험도와 대응 방안을 출력하라.
  hint: 3가지 공격을 위험도와 함께 정리하세요.
  category: analysis
  points: 10
  answer: 'python3 -c "attacks=[(''Adversarial Patch'',''CRITICAL'',''Ensemble + input preprocessing''),(''CAN Injection'',''CRITICAL'',''SecOC + Gateway IDS''),(''OTA Tampering'',''HIGH'',''Code signing + Uptane framework'')];print(''=== AV Attack Report ==='');[print(f''  [{s}] {a} → Defense: {d}'') for a,s,d in attacks];print(f''  Total critical: {sum(1 for _,s,_ in attacks if s==\"CRITICAL\")}'')"'
  answer_detail: 종합 보고서로 자율주행 보안 개선 방향을 제시합니다.
  verify:
    type: output_contains
    expect: Attack Report
    field: stdout
  target_vm: attacker
