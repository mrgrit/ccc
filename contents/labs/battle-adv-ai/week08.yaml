    $HASH" >> /tmp/evidence_custody.txt; fi; done && cat /tmp/evidence_custody.txt'
  risk_level: low
  bastion_prompt: secu VM(보안게이트웨이)에서 cat으로 [BLUE] 증거 보존(Chain of Custody)을 수행 작업을
    수행해줘
- order: 7
  instruction: '[BLUE] IOC(Indicator of Compromise)를 STIX 형식으로 문서화하라.'
  hint: IP, 도메인, 해시, 파일 경로 등의 IOC를 STIX indicator로 변환한다.
  category: analysis
  points: 10
  answer: cat > /tmp/forensic_ioc.json << 'EOF' {"type":"bundle","id":"bundle--forensic-001","objects":[{"type":"indicator","id":"indicator--f001","name":"Suspicious
    crontab modification","pattern":"[file:name = 'crontabs' AND file:parent_directory_ref.path
    = '/var/spool/cron']","pattern_type":"stix","indicator_types":["malicious-activity"],"valid_from":"2026-04-06T00:00:00Z"},{"type":"indicator","id":"indicator--f002","name":"DNS
    tunneling domain","pattern":"[domain-name:value LIKE '%.exfil.test.local']","pattern_type":"stix","indicator_types":["malicious-activity"],"valid_from":"2026-04-06T00:00:00Z"}]}
    EOF python3 -m json.tool /tmp/forensic_ioc.json | head -15
  answer_detail: 포렌식에서 추출된 IOC를 STIX 형식으로 문서화하면 다른 조직/도구와 공유할 수 있다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: cat > /tmp/forensic_ioc.json << 'EOF' {"type":"bundle","id":"bundle--forensic-001","objects":[{"type":"indicator","id":"indicator--f001","name":"Suspicious
    crontab modification","pattern":"[file:name = 'crontabs' AND file:parent_directory_ref.path
    = '/var/spool/cron']","pattern_type":"stix","indicator_types":["malicious-activity"],"valid_from":"2026-04-06T00:00:00Z"},{"type":"indicator","id":"indicator--f002","name":"DNS
    tunneling domain","pattern":"[domain-name:value LIKE '%.exfil.test.local']","pattern_type":"stix","indicator_types":["malicious-activity"],"valid_from":"2026-04-06T00:00:00Z"}]}
    EOF python3 -m json.tool /tmp/forensic_ioc.json | head -15
  risk_level: low
  bastion_prompt: '[BLUE] IOC(Indicator of Compromise)를 STIX 형식으로 문서화해줘'
- order: 8
  instruction: '[RED/BLUE] 환경을 정리하고 침해 사고 포렌식 보고서를 NIST SP 800-86 형식으로 작성하라.'
  hint: Evidence, Analysis Methods, Findings, Recovery Plan, Recommendations를 포함한다.
  category: analysis
  points: 15
  answer: "rm -f /tmp/forensic_*.txt /tmp/forensic_*.json /tmp/evidence_*.txt 2>/dev/null\
    \ && cat > /tmp/forensic_report.txt << 'EOF'\n=== Digital Forensic Investigation\
    \ Report ===\nCase ID: FORENSIC-20260406-001\nMethodology: NIST SP 800-86\n\n\
