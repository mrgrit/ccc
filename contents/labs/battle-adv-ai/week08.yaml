lab_id: battle-adv-ai-week08
title: 포렌식 분석 — 메모리/디스크/네트워크 증거 수집과 타임라인 재구성 (AI 지원)
version: ai
course: battle-adv-ai
week: 8
description: 디지털 포렌식 기법을 활용한 침해 사고 조사를 실습한다. 메모리 아티팩트 수집, 디스크 타임라인 분석, 숨겨진 프로세스 탐지,
  IOC 추출, 증거 보존(Chain of Custody)을 수행한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 메모리 포렌식과 라이브 시스템 분석을 수행한다
- 디스크 아티팩트 수집과 타임라인을 재구성한다
- 악성코드 정적 분석과 엔트로피 분석을 실습한다
- IOC를 추출하고 증거 보존 절차를 수행한다
prerequisites:
- battle-adv-nonai week07 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] 메모리 포렌식 아티팩트를 수집하라. /proc 파일시스템에서 모든 프로세스의 실행 경로, 명령줄, 네트워크
    연결을 수집하라.'
  hint: /proc/[pid]/exe, cmdline 파일을 읽어 프로세스 정보를 수집한다.
  category: analysis
  points: 10
  answer: 'echo ''=== Process Forensic Analysis ==='' && for pid in $(ls /proc/ |
    grep -E ''^[0-9]+$'' | head -20); do exe=$(readlink /proc/$pid/exe 2>/dev/null)
    && cmdline=$(tr ''\0'' '' '' < /proc/$pid/cmdline 2>/dev/null) && echo "PID:$pid
    EXE:$exe CMD:${cmdline:0:80}"; done | head -15 && ps auxf > /tmp/forensic_processes.txt
    && ss -tnap > /tmp/forensic_connections.txt && echo ''Artifacts collected: processes,
    connections'''
  answer_detail: 라이브 메모리 포렌식에서 /proc 파일시스템은 프로세스 정보의 보고이다. exe(실행 파일 경로), cmdline(명령줄
    인수)을 분석하여 의심 프로세스를 식별한다.
  verify:
    type: output_contains
    expect: null
  target_vm: secu
  script: 'echo ''=== Process Forensic Analysis ==='' && for pid in $(ls /proc/ |
    grep -E ''^[0-9]+$'' | head -20); do exe=$(readlink /proc/$pid/exe 2>/dev/null)
    && cmdline=$(tr ''\0'' '' '' < /proc/$pid/cmdline 2>/dev/null) && echo "PID:$pid
    EXE:$exe CMD:${cmdline:0:80}"; done | head -15 && ps auxf > /tmp/forensic_processes.txt
    && ss -tnap > /tmp/forensic_connections.txt && echo ''Artifacts collected: processes,
    connections'''
  risk_level: low
  bastion_prompt: '[BLUE] 메모리 포렌식 아티팩트를 수집하라. /proc 파일시스템에서 모든 프로세스의 실행 경로, 명령줄, 네트워크
    연결을 수집해줘'
- order: 2
  instruction: '[BLUE] 숨겨진 프로세스를 탐지하라. /proc에서 보이는 PID와 ps 출력을 비교하여 루트킷에 의해 숨겨진 프로세스가
    있는지 확인하라.'
  hint: /proc의 PID 디렉토리와 ps aux의 PID를 비교한다.
  category: analysis
  points: 10
  answer: 'echo "=== Hidden Process Detection ===" && PROC_PIDS=$(ls -d /proc/[0-9]*
    2>/dev/null | sed "s|/proc/||" | sort -n) && PS_PIDS=$(ps -eo pid --no-headers
    | tr -d " " | sort -n) && HIDDEN=$(comm -23 <(echo "$PROC_PIDS") <(echo "$PS_PIDS"))
    && if [ -z "$HIDDEN" ]; then echo "No hidden processes detected - system appears
    clean"; else echo "Hidden PIDs: $HIDDEN"; fi'
  answer_detail: 루트킷은 ps 등의 도구를 후킹하여 프로세스를 숨긴다. /proc(커널 직접 노출)과 ps(사용자 공간)의 PID를
    비교하면 불일치를 발견할 수 있다.
  verify:
    type: output_contains
    expect: null
  target_vm: secu
  script: 'echo "=== Hidden Process Detection ===" && PROC_PIDS=$(ls -d /proc/[0-9]*
    2>/dev/null | sed "s|/proc/||" | sort -n) && PS_PIDS=$(ps -eo pid --no-headers
    | tr -d " " | sort -n) && HIDDEN=$(comm -23 <(echo "$PROC_PIDS") <(echo "$PS_PIDS"))
    && if [ -z "$HIDDEN" ]; then echo "No hidden processes detected - system appears
    clean"; else echo "Hidden PIDs: $HIDDEN"; fi'
  risk_level: low
  bastion_prompt: '[BLUE] 숨겨진 프로세스를 탐지하라. /proc에서 보이는 PID와 ps 출력을 비교하여 루트킷에 의해 숨겨진
    프로세스가 있는지 확인해줘'
- order: 3
  instruction: '[BLUE] 디스크 아티팩트를 수집하라. 최근 24시간 내 수정된 파일, /tmp의 스크립트/바이너리, SUID 바이너리를
    조사하라.'
  hint: find 명령으로 최근 변경 파일을 검색한다.
  category: analysis
  points: 10
  answer: echo '=== Disk Artifact Collection ===' && echo '[1] Recently modified (24h):'
    && find / -mtime -1 -type f -not -path '/proc/*' -not -path '/sys/*' -not -path
    '/run/*' 2>/dev/null | head -15 && echo '[2] Suspicious in /tmp:' && find /tmp
    -type f -name '*.sh' -o -name '*.py' -o -name '*.elf' -o -name '*.bin' 2>/dev/null
    | head -10 && echo '[3] SUID binaries:' && find /usr -perm -4000 -type f 2>/dev/null
    | head -10
  answer_detail: 최근 수정된 파일(mtime), 임시 디렉토리의 스크립트/바이너리, SUID 비트 설정 파일은 핵심 포렌식 아티팩트이다.
  verify:
    type: output_contains
    expect: null
  target_vm: secu
  script: echo '=== Disk Artifact Collection ===' && echo '[1] Recently modified (24h):'
    && find / -mtime -1 -type f -not -path '/proc/*' -not -path '/sys/*' -not -path
    '/run/*' 2>/dev/null | head -15 && echo '[2] Suspicious in /tmp:' && find /tmp
    -type f -name '*.sh' -o -name '*.py' -o -name '*.elf' -o -name '*.bin' 2>/dev/null
    | head -10 && echo '[3] SUID binaries:' && find /usr -perm -4000 -type f 2>/dev/null
