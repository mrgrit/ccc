  risk_level: low
  bastion_prompt: '[BLUE] 디스크 아티팩트를 수집해줘'
- order: 4
  instruction: '[BLUE] 파일 시스템 타임라인을 생성하라. /tmp과 /var/log의 MAC 타임스탬프를 시간순으로 정렬하라.'
  hint: find -printf로 타임스탬프를 추출하고 정렬한다.
  category: analysis
  points: 10
  answer: echo "=== File System Timeline ===" && find /tmp /var/log -maxdepth 2 -type
    f -printf "%T+ %p\n" 2>/dev/null | sort -r | head -20 && echo "---" && echo "Focus
    on clusters of modifications within short timeframes"
  answer_detail: 파일 시스템 타임라인은 MAC 타임스탬프를 시간순으로 정렬하여 공격 활동을 재구성한다. 짧은 시간 내 대량의 파일 수정
    클러스터는 공격 행위를 나타낸다.
  verify:
    type: output_contains
    expect: null
  target_vm: secu
  script: echo "=== File System Timeline ===" && find /tmp /var/log -maxdepth 2 -type
    f -printf "%T+ %p\n" 2>/dev/null | sort -r | head -20 && echo "---" && echo "Focus
    on clusters of modifications within short timeframes"
  risk_level: low
  bastion_prompt: '[BLUE] 파일 시스템 타임라인을 생성하라. /tmp과 /var/log의 MAC 타임스탬프를 시간순으로 정렬해줘'
- order: 5
  instruction: '[BLUE] 악성코드 정적 분석을 시뮬레이션하라. 의심 파일의 해시, 문자열, ELF 헤더를 분석하고 파일 엔트로피를
    계산하라.'
  hint: sha256sum, strings, file, readelf로 바이너리를 분석한다.
  category: analysis
  points: 10
  answer: "echo '=== Static Analysis + Entropy ===' && SAMPLE=/usr/bin/curl && sha256sum\
    \ $SAMPLE && file $SAMPLE && strings $SAMPLE | grep -iE 'http|socket|connect|exec'\
    \ | head -5 && python3 -c \"\nimport math, os\nfrom collections import Counter\n\
    def entropy(data):\n    if not data: return 0\n    freq = Counter(data)\n    length\
    \ = len(data)\n    return -sum((c/length) * math.log2(c/length) for c in freq.values())\n\
    files = ['/usr/bin/ls', '/usr/bin/curl', '/etc/passwd']\nprint('File Entropy Analysis:')\n\
    for f in files:\n    try:\n        with open(f, 'rb') as fh:\n            data\
    \ = fh.read(10000)\n        e = entropy(data)\n        assess = 'PACKED/ENC' if\
    \ e > 7.0 else 'NORMAL'\n        print(f'  {f}: entropy={e:.4f} -> {assess}')\n\
    \    except: pass\n\""
  answer_detail: 정적 분석은 악성코드를 실행하지 않고 분석한다. Shannon 엔트로피 7.0 이상은 패킹/암호화된 악성코드 가능성이
    높다.
  verify:
    type: output_contains
    expect: null
  target_vm: secu
  script: "echo '=== Static Analysis + Entropy ===' && SAMPLE=/usr/bin/curl && sha256sum\
    \ $SAMPLE && file $SAMPLE && strings $SAMPLE | grep -iE 'http|socket|connect|exec'\
    \ | head -5 && python3 -c \"\nimport math, os\nfrom collections import Counter\n\
    def entropy(data):\n    if not data: return 0\n    freq = Counter(data)\n    length\
    \ = len(data)\n    return -sum((c/length) * math.log2(c/length) for c in freq.values())\n\
    files = ['/usr/bin/ls', '/usr/bin/curl', '/etc/passwd']\nprint('File Entropy Analysis:')\n\
    for f in files:\n    try:\n        with open(f, 'rb') as fh:\n            data\
    \ = fh.read(10000)\n        e = entropy(data)\n        assess = 'PACKED/ENC' if\
    \ e > 7.0 else 'NORMAL'\n        print(f'  {f}: entropy={e:.4f} -> {assess}')\n\
    \    except: pass\n\""
  risk_level: low
  bastion_prompt: '[BLUE] 악성코드 정적 분석을 시뮬레이션해줘'
- order: 6
  instruction: '[BLUE] 증거 보존(Chain of Custody)을 수행하라. 수집된 모든 포렌식 아티팩트의 SHA256 해시를
    계산하고 증거 목록을 작성하라.'
  hint: sha256sum으로 모든 증거 파일의 해시를 기록한다.
  category: response
  points: 10
  answer: 'echo "=== Chain of Custody Record ===" > /tmp/evidence_custody.txt && echo
    "Investigator: Lab Student" >> /tmp/evidence_custody.txt && echo "Date: $(date
    -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/evidence_custody.txt && echo "Case ID: FORENSIC-$(date
    +%Y%m%d)-001" >> /tmp/evidence_custody.txt && echo "" >> /tmp/evidence_custody.txt
    && for f in /tmp/forensic_*.txt; do if [ -f "$f" ]; then HASH=$(sha256sum "$f"
    | awk "{print \$1}"); SIZE=$(stat -c%s "$f"); echo "File: $f | Size: $SIZE | SHA256:
    $HASH" >> /tmp/evidence_custody.txt; fi; done && cat /tmp/evidence_custody.txt'
  answer_detail: Chain of Custody는 법적 절차에서 증거 무결성을 보장한다. SHA256 해시, 수집 시각, 수집자, 케이스
    ID를 기록한다.
  verify:
    type: output_contains
    expect: null
  target_vm: secu
  script: 'echo "=== Chain of Custody Record ===" > /tmp/evidence_custody.txt && echo
    "Investigator: Lab Student" >> /tmp/evidence_custody.txt && echo "Date: $(date
    -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/evidence_custody.txt && echo "Case ID: FORENSIC-$(date
    +%Y%m%d)-001" >> /tmp/evidence_custody.txt && echo "" >> /tmp/evidence_custody.txt
    && for f in /tmp/forensic_*.txt; do if [ -f "$f" ]; then HASH=$(sha256sum "$f"
