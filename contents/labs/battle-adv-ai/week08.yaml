    4) [BLUE] 파일 시스템 타임라인을 생성하라. /tmp과 /var/log의 MAC 타임스탬프를 시간순으로 정렬해줘

    5) [BLUE] 악성코드 정적 분석을 시뮬레이션해줘'
  hint: 복합 작업은 Bastion이 순서대로 계획하고 실행해야 한다
  category: multi_task
  points: 50
  verify:
    type: output_contains
