    \ process detection via /proc comparison\n   - File entropy for packed binary\
    \ detection\n   - Timeline integration (MAC timestamps)\n   - IOC extraction in\
    \ STIX format\n\n3. Findings:\n   [F-01] No hidden processes detected\n   [F-02]\
    \ All binaries have normal entropy\n   [F-03] Timeline shows normal file activity\n\
    \n4. Recovery Plan:\n   P1: Remove any persistence mechanisms found\n   P2: Patch\
    \ identified vulnerabilities\n   P3: Implement FIM on critical servers\n\n5. Recommendations:\n\
    \   - Deploy FIM on all servers\n   - Enable DNS anomaly detection\n   - Conduct\
    \ regular forensic readiness assessments\n\nMITRE ATT&CK: T1190, T1053, T1048,\
    \ T1005, T1070\nEOF\ncat /tmp/forensic_report.txt"
  answer_detail: NIST SP 800-86 포렌식 보고서는 증거 목록, 분석 방법, 발견 사항, 복구 계획, 권고사항을 포함한다. Chain
    of Custody를 유지하고 모든 발견에 증거를 명시한다.
  verify:
    type: output_contains
    expect: null
  target_vm: attacker
  script: "rm -f /tmp/forensic_*.txt /tmp/forensic_*.json /tmp/evidence_*.txt 2>/dev/null\
