lab_id: battle-adv-ai-week08
title: 포렌식 분석 — 메모리/디스크/네트워크 증거 수집과 타임라인 재구성 (AI 지원)
version: ai
course: battle-adv-ai
week: 8
description: 디지털 포렌식 기법을 활용한 침해 사고 조사를 실습한다. 메모리 아티팩트 수집, 디스크 타임라인 분석, 숨겨진 프로세스 탐지, IOC 추출, 증거 보존(Chain
  of Custody)을 수행한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 메모리 포렌식과 라이브 시스템 분석을 수행한다
- 디스크 아티팩트 수집과 타임라인을 재구성한다
- 악성코드 정적 분석과 엔트로피 분석을 실습한다
- IOC를 추출하고 증거 보존 절차를 수행한다
prerequisites:
- battle-adv-nonai week07 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] 메모리 포렌식 아티팩트를 수집하라. /proc 파일시스템에서 모든 프로세스의 실행 경로, 명령줄, 네트워크 연결을 수집하라.'
  hint: /proc/[pid]/exe, cmdline 파일을 읽어 프로세스 정보를 수집한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [BLUE] 메모리 포렌식 아티팩트를 수집하라. /proc 파일시스템에서 모든 프로세스의 실행 경로, 명령줄, 네트워크 연결을 수집해줘

    📎 참고 (CLI): echo ''=== Process Forensic Analysis ==='' && for pid in $(ls /proc/ | grep -E ''^[0-9]+$''
    | head -20); do exe=$(readlink /proc/$pid/exe 2>/dev/null) && cmdline=$(tr ''\0'' '' '' < /proc/$pid/cmdline
    2>/dev/null) && echo "PID:$pid EXE:$exe CMD:${cmdline:0:80}"; done | head -15 && ps auxf > /tmp/forensic_processes.txt
    && ss -tnap > /tmp/forensic_connections.txt && echo ''Artifacts collected: processes, connections'''
  answer_detail: 라이브 메모리 포렌식에서 /proc 파일시스템은 프로세스 정보의 보고이다. exe(실행 파일 경로), cmdline(명령줄 인수)을 분석하여 의심 프로세스를
    식별한다.
  verify:
    type: output_contains
    expect: Process Forensic
    semantic:
      intent: '[BLUE] 메모리 포렌식 /proc 아티팩트 — for pid in $(ls /proc/ | grep ^[0-9]); do cat /proc/$pid/cmdline;
        readlink /proc/$pid/exe; cat /proc/$pid/net/tcp | head; done > /tmp/forensics/proc_dump.txt. PID·실행
        경로·명령줄·네트워크 연결을 휘발성 증거로 보존. /proc 은 Linux 메모리 포렌식 핵심'
      success_criteria:
      - /proc/<pid>/cmdline + exe + net/tcp 수집
      - /tmp/forensics/ 에 저장
      - 메모리 포렌식 휘발성 개념
      acceptable_methods:
      - for pid + cat /proc/<pid>/*
      - LiME 로 RAM 덤프 + Volatility
      - AVML + MemProcFS
      - osquery processes + process_open_sockets
      negative_signs:
      - ps aux 만 (상세 /proc 없음)
      - 파일 저장 없이 화면 출력
      - 휘발성 개념 없음
  target_vm: secu
  script: 'echo ''=== Process Forensic Analysis ==='' && for pid in $(ls /proc/ | grep -E ''^[0-9]+$''
    | head -20); do exe=$(readlink /proc/$pid/exe 2>/dev/null) && cmdline=$(tr ''\0'' '' '' < /proc/$pid/cmdline
    2>/dev/null) && echo "PID:$pid EXE:$exe CMD:${cmdline:0:80}"; done | head -15 && ps auxf > /tmp/forensic_processes.txt
    && ss -tnap > /tmp/forensic_connections.txt && echo ''Artifacts collected: processes, connections'''
  risk_level: low
  bastion_prompt: '[BLUE] 메모리 포렌식 아티팩트를 수집하라. /proc 파일시스템에서 모든 프로세스의 실행 경로, 명령줄, 네트워크 연결을 수집해줘'
- order: 2
  instruction: '[BLUE] 숨겨진 프로세스를 탐지하라. /proc에서 보이는 PID와 ps 출력을 비교하여 루트킷에 의해 숨겨진 프로세스가 있는지 확인하라.'
  hint: /proc의 PID 디렉토리와 ps aux의 PID를 비교한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [BLUE] 숨겨진 프로세스를 탐지하라. /proc에서 보이는 PID와 ps 출력을 비교하여 루트킷에 의해 숨겨진 프로세스가 있는지 확인해줘

    📎 참고 (CLI): echo "=== Hidden Process Detection ===" && PROC_PIDS=$(ls -d /proc/[0-9]* 2>/dev/null
    | sed "s|/proc/||" | sort -n) && PS_PIDS=$(ps -eo pid --no-headers | tr -d " " | sort -n) && HIDDEN=$(comm
    -23 <(echo "$PROC_PIDS") <(echo "$PS_PIDS")) && if [ -z "$HIDDEN" ]; then echo "No hidden processes
    detected - system appears clean"; else echo "Hidden PIDs: $HIDDEN"; fi'
  answer_detail: 루트킷은 ps 등의 도구를 후킹하여 프로세스를 숨긴다. /proc(커널 직접 노출)과 ps(사용자 공간)의 PID를 비교하면 불일치를 발견할 수 있다.
  verify:
    type: output_contains
    expect: Hidden Process Detection
    semantic:
      intent: '[BLUE] 숨겨진 프로세스 탐지 — diff <(ls /proc/ | grep ^[0-9] | sort) <(ps -eo pid --no-headers |
        awk {print $1} | sort) 로 /proc 실제 PID vs ps 보고 PID 비교. ps 가 숨긴 PID 발견 시 LKM 루트킷 의심. kernel-level
        rootkit 탐지 기본 기법. MITRE T1014 Rootkit'
      success_criteria:
      - /proc vs ps 출력 diff
      - 숨겨진 PID 탐지 로직
      - T1014 Rootkit 개념
      acceptable_methods:
      - diff <(ls /proc) <(ps)
      - chkrootkit / rkhunter 자동 탐지
      - LKM 모듈 조회 lsmod
      - unhide 도구
      negative_signs:
      - 단일 소스만 (비교 없음)
      - 루트킷 개념 없음
      - PID 차이 해석 없음
  target_vm: secu
  script: 'echo "=== Hidden Process Detection ===" && PROC_PIDS=$(ls -d /proc/[0-9]* 2>/dev/null | sed
    "s|/proc/||" | sort -n) && PS_PIDS=$(ps -eo pid --no-headers | tr -d " " | sort -n) && HIDDEN=$(comm
    -23 <(echo "$PROC_PIDS") <(echo "$PS_PIDS")) && if [ -z "$HIDDEN" ]; then echo "No hidden processes
    detected - system appears clean"; else echo "Hidden PIDs: $HIDDEN"; fi'
  risk_level: low
  bastion_prompt: '[BLUE] 숨겨진 프로세스를 탐지하라. /proc에서 보이는 PID와 ps 출력을 비교하여 루트킷에 의해 숨겨진 프로세스가 있는지 확인해줘'
- order: 3
  instruction: '[BLUE] 디스크 아티팩트를 수집하라. 최근 24시간 내 수정된 파일, /tmp의 스크립트/바이너리, SUID 바이너리를 조사하라.'
  hint: find 명령으로 최근 변경 파일을 검색한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [BLUE] 디스크 아티팩트를 수집해줘

    📎 참고 (CLI): echo ''=== Disk Artifact Collection ==='' && echo ''[1] Recently modified (24h):'' &&
    find / -mtime -1 -type f -not -path ''/proc/*'' -not -path ''/sys/*'' -not -path ''/run/*'' 2>/dev/null
    | head -15 && echo ''[2] Suspicious in /tmp:'' && find /tmp -type f -name ''*.sh'' -o -name ''*.py''
    -o -name ''*.elf'' -o -name ''*.bin'' 2>/dev/null | head -10 && echo ''[3] SUID binaries:'' && find
    /usr -perm -4000 -type f 2>/dev/null | head -10'
  answer_detail: 최근 수정된 파일(mtime), 임시 디렉토리의 스크립트/바이너리, SUID 비트 설정 파일은 핵심 포렌식 아티팩트이다.
  verify:
    type: output_contains
    expect: Disk Artifact
    semantic:
      intent: '[BLUE] 디스크 아티팩트 수집 — find / -mtime -1 -type f 2>/dev/null | head -50 (24시간 내 수정) + ls -la
        /tmp/*.{sh,py,elf} 2>/dev/null + find / -perm -4000 -type f 2>/dev/null (모든 SUID). 저장소 베이스 포렌식
        3종 아티팩트'
      success_criteria:
      - -mtime -1 최근 수정 파일
      - /tmp 스크립트/바이너리
      - SUID 바이너리 목록
      acceptable_methods:
      - find -mtime + -perm + -type
      - dd 로 디스크 이미지 (전체 포렌식)
      - Autopsy GUI
      - Sleuth Kit CLI
      negative_signs:
      - 1가지 아티팩트만
      - 시간 필터 없음
      - 저장 없이 stdout
  target_vm: secu
  script: echo '=== Disk Artifact Collection ===' && echo '[1] Recently modified (24h):' && find / -mtime
    -1 -type f -not -path '/proc/*' -not -path '/sys/*' -not -path '/run/*' 2>/dev/null | head -15 &&
    echo '[2] Suspicious in /tmp:' && find /tmp -type f -name '*.sh' -o -name '*.py' -o -name '*.elf'
    -o -name '*.bin' 2>/dev/null | head -10 && echo '[3] SUID binaries:' && find /usr -perm -4000 -type
    f 2>/dev/null | head -10
  risk_level: low
  bastion_prompt: '[BLUE] 디스크 아티팩트를 수집해줘'
- order: 4
  instruction: '[BLUE] 파일 시스템 타임라인을 생성하라. /tmp과 /var/log의 MAC 타임스탬프를 시간순으로 정렬하라.'
  hint: find -printf로 타임스탬프를 추출하고 정렬한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [BLUE] 파일 시스템 타임라인을 생성하라. /tmp과 /var/log의 MAC 타임스탬프를 시간순으로 정렬해줘

    📎 참고 (CLI): echo "=== File System Timeline ===" && find /tmp /var/log -maxdepth 2 -type f -printf
    "%T+ %p\n" 2>/dev/null | sort -r | head -20 && echo "---" && echo "Focus on clusters of modifications
    within short timeframes"'
  answer_detail: 파일 시스템 타임라인은 MAC 타임스탬프를 시간순으로 정렬하여 공격 활동을 재구성한다. 짧은 시간 내 대량의 파일 수정 클러스터는 공격 행위를 나타낸다.
  verify:
    type: output_contains
    expect: File System Timeline
    semantic:
      intent: '[BLUE] FS 타임라인 MAC 타임스탬프 — stat 또는 find -printf %T@ %p\n /tmp /var/log 대상 + sort -n 으로
        시간순 정렬 → /tmp/timeline.txt. Modification·Access·Change (MAC) 타임스탬프 기반 사건 재구성. 포렌식 타임라인의 표준 기법'
      success_criteria:
      - MAC timestamp 추출 (stat/find -printf)
      - sort -n 시간순 정렬
      - 타임라인 파일 생성
      acceptable_methods:
      - find -printf + sort
      - stat + awk
      - log2timeline (plaso)
      - mactime 도구
      negative_signs:
      - 정렬 없음
      - MAC 개념 없음
      - 타임라인 파일 미생성
  target_vm: secu
  script: echo "=== File System Timeline ===" && find /tmp /var/log -maxdepth 2 -type f -printf "%T+ %p\n"
    2>/dev/null | sort -r | head -20 && echo "---" && echo "Focus on clusters of modifications within
    short timeframes"
  risk_level: low
  bastion_prompt: '[BLUE] 파일 시스템 타임라인을 생성하라. /tmp과 /var/log의 MAC 타임스탬프를 시간순으로 정렬해줘'
- order: 5
  instruction: '[BLUE] 악성코드 정적 분석을 시뮬레이션하라. 의심 파일의 해시, 문자열, ELF 헤더를 분석하고 파일 엔트로피를 계산하라.'
  hint: sha256sum, strings, file, readelf로 바이너리를 분석한다.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] 악성코드 정적 분석을 시뮬레이션해줘\n\U0001F4CE 참고 (CLI): echo '=== Static Analysis\
    \ + Entropy ===' && SAMPLE=/usr/bin/curl && sha256sum $SAMPLE && file $SAMPLE && strings $SAMPLE |\
    \ grep -iE 'http|socket|connect|exec' | head -5 && python3 -c \"\nimport math, os\nfrom collections\
    \ import Counter\ndef entropy(data):\n    if not data: return 0\n    freq = Counter(data)\n    length\
    \ = len(data)\n    return -sum((c/length) * math.log2(c/length) for c in freq.values())\nfiles = ['/usr/bin/ls',\
    \ '/usr/bin/curl', '/etc/passwd']\nprint('File Entropy Analysis:')\nfor f in files:\n    try:\n  \
    \      with open(f, 'rb') as fh:\n            data = fh.read(10000)\n        e = entropy(data)\n \
    \       assess = 'PACKED/ENC' if e > 7.0 else 'NORMAL'\n        print(f'  {f}: entropy={e:.4f} ->\
    \ {assess}')\n    except: pass\n\""
  answer_detail: 정적 분석은 악성코드를 실행하지 않고 분석한다. Shannon 엔트로피 7.0 이상은 패킹/암호화된 악성코드 가능성이 높다.
  verify:
    type: output_contains
    expect: Entropy
    semantic:
      intent: '[BLUE] 정적 분석 시뮬레이션 — sha256sum <suspect_file> (해시) + strings -n 8 <file> | head (문자열 추출)
        + readelf -h <file> (ELF 헤더 — arch/entry/type) + python shannon entropy (패킹 여부: 엔트로피 7.5+ = 패킹/암호화
        의심). 실행 없는 정적 분석 핵심 단계'
      success_criteria:
      - sha256sum + strings + readelf + entropy 4종
      - 정적 분석 (실행 없음) 개념
      - 패킹 엔트로피 기준
      acceptable_methods:
      - sha256 + strings + readelf + python entropy
      - VirusTotal API (해시 제출)
      - YARA 룰 매칭
      - capa 행위 추출
      negative_signs:
      - 동적 분석 (실행)
      - 1-2종만
      - 엔트로피 누락
  target_vm: secu
  script: "echo '=== Static Analysis + Entropy ===' && SAMPLE=/usr/bin/curl && sha256sum $SAMPLE && file\
    \ $SAMPLE && strings $SAMPLE | grep -iE 'http|socket|connect|exec' | head -5 && python3 -c \"\nimport\
    \ math, os\nfrom collections import Counter\ndef entropy(data):\n    if not data: return 0\n    freq\
    \ = Counter(data)\n    length = len(data)\n    return -sum((c/length) * math.log2(c/length) for c\
    \ in freq.values())\nfiles = ['/usr/bin/ls', '/usr/bin/curl', '/etc/passwd']\nprint('File Entropy\
    \ Analysis:')\nfor f in files:\n    try:\n        with open(f, 'rb') as fh:\n            data = fh.read(10000)\n\
    \        e = entropy(data)\n        assess = 'PACKED/ENC' if e > 7.0 else 'NORMAL'\n        print(f'\
    \  {f}: entropy={e:.4f} -> {assess}')\n    except: pass\n\""
  risk_level: low
  bastion_prompt: '[BLUE] 악성코드 정적 분석을 시뮬레이션해줘'
- order: 6
  instruction: '[BLUE] 증거 보존(Chain of Custody)을 수행하라. 수집된 모든 포렌식 아티팩트의 SHA256 해시를 계산하고 증거 목록을 작성하라.'
  hint: sha256sum으로 모든 증거 파일의 해시를 기록한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] 증거 보존(Chain of Custody)을 수행하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo "=== Chain of Custody Record ===" > /tmp/evidence_custody.txt && echo "Investigator:
    Lab Student" >> /tmp/evidence_custody.txt && echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/evidence_custody.txt
    && echo "Case ID: FORENSIC-$(date +%Y%m%d)-001" >> /tmp/evidence_custody.txt && echo "" >> /tmp/evidence_custody.txt
    && for f in /tmp/forensic_*.txt; do if [ -f "$f" ]; then HASH=$(sha256sum "$f" | awk "{print \$1}");
    SIZE=$(stat -c%s "$f"); echo "File: $f | Size: $SIZE | SHA256: $HASH" >> /tmp/evidence_custody.txt;
    fi; done && cat /tmp/evidence_custody.txt'
  answer_detail: Chain of Custody는 법적 절차에서 증거 무결성을 보장한다. SHA256 해시, 수집 시각, 수집자, 케이스 ID를 기록한다.
  verify:
    type: output_contains
    expect: Chain of Custody
    semantic:
      intent: '[BLUE] Chain of Custody — find /tmp/forensics -type f | xargs sha256sum > /tmp/forensics/chain_of_custody.txt
        로 모든 아티팩트 SHA256 기록 + 수집자·시각·위치·해시 메타데이터. 증거 무결성 보장 + 법정 제출 가능 조건. ISO/IEC 27037 + RFC 3227 준거'
      success_criteria:
      - 전체 아티팩트 sha256 계산
      - chain_of_custody.txt 파일
      - 수집자/시각 메타데이터
      - 법적 무결성 개념
      acceptable_methods:
      - sha256sum -b + 메타 기록
      - dc3dd 로 dd + hash 자동
      - GPG 서명으로 무결성
      - Magnet AXIOM Chain of Custody
      negative_signs:
      - 해시 없이 파일 목록만
      - 메타 없음
      - 법적 무결성 개념 없음
  target_vm: secu
  script: 'echo "=== Chain of Custody Record ===" > /tmp/evidence_custody.txt && echo "Investigator: Lab
    Student" >> /tmp/evidence_custody.txt && echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /tmp/evidence_custody.txt
    && echo "Case ID: FORENSIC-$(date +%Y%m%d)-001" >> /tmp/evidence_custody.txt && echo "" >> /tmp/evidence_custody.txt
    && for f in /tmp/forensic_*.txt; do if [ -f "$f" ]; then HASH=$(sha256sum "$f" | awk "{print \$1}");
    SIZE=$(stat -c%s "$f"); echo "File: $f | Size: $SIZE | SHA256: $HASH" >> /tmp/evidence_custody.txt;
