- order: 4
  instruction: '[BLUE] Phase 전환 — Red Team 공격을 실시간으로 탐지하라. Suricata 알림, auth.log,
    crontab 변경을 분석하고 자동 대응을 실행하라.'
  hint: 각 로그 소스를 확인하고, 탐지된 공격에 대해 자동 차단을 시뮬레이션한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Phase 전환 — Red Team 공격을 실시간으로 탐지하라. Suricata 알림, auth.log,
    crontab 변경을 분석하고 자동 대응을 실행해줘

    📎 참고 (CLI): echo "=== BLUE TEAM LIVE RESPONSE ===" && echo "[1] Suricata alerts:"
    && ssh 10.20.30.1 "tail -20 /var/log/suricata/eve.json 2>/dev/null | python3 -c
    \"import sys,json; [print(json.loads(l).get(''alert'',{}).get(''signature'',''))
    for l in sys.stdin if ''alert'' in l]\"" 2>&1 | tail -3 && echo "[2] SSH activity:"
    && grep "Accepted" /var/log/auth.log 2>/dev/null | tail -5 && echo "[3] Crontab
    check:" && crontab -l 2>/dev/null && echo "[4] Response actions:" && echo "  CONTAIN:
    nft add element inet filter blocklist { attacker_ip }" && echo "  REMOVE: crontab
    -r (persistence removed)" && echo "  ALERT: SOC notified via Slack" && echo "Blue
    Team response executed"'
  answer_detail: Blue Team은 실시간으로 Suricata 알림, SSH 활동, crontab 변경을 모니터링하고, IP 차단,
    Persistence 제거, SOC 알림을 수행한다.
  verify:
    type: output_contains
    expect:
    - BLUE TEAM LIVE RESPONSE
    - Suricata
    - active
    semantic:
      intent: '[BLUE] 실시간 Red 탐지 — tail -f /var/log/suricata/fast.log (SQLi + nmap/nikto
        경보) + tail /var/log/auth.log (SSH 내부→내부) + diff <(crontab -l) /tmp/crontab_pre_w14
        (crontab 변경). 3 소스 실시간 감시로 Red Phase 1+2 동시 탐지 시도. MTTD 측정'
      success_criteria:
      - 3 소스 실시간 tail + diff
      - s2-s3 공격 실시간 포착 시도
      - MTTD 측정 목적
      acceptable_methods:
      - tmux + 3 패널 tail
      - multitail
      - Wazuh 통합 뷰
      - Kibana Discover 실시간
      negative_signs:
      - 정적 분석만 (실시간 아님)
      - 1-2 소스만
      - MTTD 개념 없음
  target_vm: secu
  script: 'echo "=== BLUE TEAM LIVE RESPONSE ===" && echo "[1] Suricata alerts:" &&
    ssh 10.20.30.1 "tail -20 /var/log/suricata/eve.json 2>/dev/null | python3 -c \"import
    sys,json; [print(json.loads(l).get(''alert'',{}).get(''signature'','')) for l
    in sys.stdin if ''alert'' in l]\"" 2>&1 | tail -3 && echo "[2] SSH activity:"
    && grep "Accepted" /var/log/auth.log 2>/dev/null | tail -5 && echo "[3] Crontab
    check:" && crontab -l 2>/dev/null && echo "[4] Response actions:" && echo "  CONTAIN:
    nft add element inet filter blocklist { attacker_ip }" && echo "  REMOVE: crontab
