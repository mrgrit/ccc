  bastion_prompt: '[BLUE] Phase 전환 — Red Team 공격을 실시간으로 탐지하라. Suricata 알림, auth.log,
    crontab 변경을 분석하고 자동 대응을 실행해줘'
- order: 5
  instruction: '[BLUE] 공격 타임라인을 재구성하라. Red Team의 모든 행동을 시간순으로 정리하고 각 단계의 탐지 성공/실패를
    평가하라.'
  hint: 다양한 로그 소스의 타임스탬프를 통합하여 정렬한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [BLUE] 공격 타임라인을 재구성하라. Red Team의 모든 행동을 시간순으로 정리하고 각 단계의 탐지 성공/실패를
