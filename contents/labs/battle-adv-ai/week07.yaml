lab_id: battle-adv-ai-week07
title: 포렌식 기반 방어 — 메모리/디스크 분석 실시간 대응 (AI 지원)
version: ai
course: battle-adv-ai
week: 7
description: 디지털 포렌식 기법을 활용한 능동적 방어를 실습한다. 메모리 덤프 분석, 디스크 아티팩트 수집, 타임라인 분석, 악성코드 분석을 통해 침해 사고를 조사하고 대응한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 메모리 포렌식 도구(Volatility)를 사용한 분석을 실습한다
- 디스크 아티팩트 수집 및 타임라인 분석을 수행한다
- 악성코드 정적/동적 분석 기법을 학습한다
- 포렌식 결과를 기반으로 IR(Incident Response)을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 메모리 덤프를 생성하라. 현재 시스템의 메모리 상태를 캡처하여 포렌식 분석에 활용할 수 있도록 하라.
  hint: /proc/kcore 또는 LiME 모듈을 사용하여 메모리 덤프를 생성한다.
  category: analysis
  points: 10
  answer: 'echo ''1'' | sudo -S cat /proc/meminfo | head -5; echo ''---''; echo ''Memory dump methods:''; echo ''1. LiME: insmod lime.ko path=/tmp/mem.lime format=lime''; echo ''2. /proc/kcore: dd if=/proc/kcore
    of=/tmp/mem.raw bs=1M count=100''; echo ''3. AVML: avml /tmp/mem.lime''; echo ''---''; echo ''Creating simulated memory artifacts:''; ps auxf > /tmp/forensic_processes.txt && ss -tnap > /tmp/forensic_connections.txt
    && cat /proc/modules > /tmp/forensic_modules.txt && echo ''Artifacts collected: processes, connections, modules'''
  answer_detail: 메모리 포렌식의 첫 단계는 휘발성 데이터를 캡처하는 것이다. LiME(Linux Memory Extractor)이 가장 널리 사용되며, 커널 모듈로 로드하여 물리 메모리를 덤프한다. 메모리는 휘발성이므로 가능한 빨리 캡처해야 하며, 분석보다 수집을 우선한다.
  verify:
    type: output_contains
    expect: Artifacts collected
  script: 'echo ''1'' | sudo -S cat /proc/meminfo | head -5; echo ''---''; echo ''Memory dump methods:''; echo ''1. LiME: insmod lime.ko path=/tmp/mem.lime format=lime''; echo ''2. /proc/kcore: dd if=/proc/kcore
    of=/tmp/mem.raw bs=1M count=100''; echo ''3. AVML: avml /tmp/mem.lime''; echo ''---''; echo ''Creating simulated memory artifacts:''; ps auxf > /tmp/forensic_processes.txt && ss -tnap > /tmp/forensic_connections.txt
    && cat /proc/modules > /tmp/forensic_modules.txt && echo ''Artifacts collected: processes, connections, modules'''
  risk_level: low
- order: 2
  instruction: 메모리에서 실행 중인 프로세스 정보를 분석하라. /proc 파일시스템에서 모든 프로세스의 실행 경로, 명령줄, 환경변수를 수집하라.
  hint: /proc/[pid]/exe, cmdline, environ 파일을 읽어 프로세스 정보를 수집한다.
  category: analysis
  points: 10
  answer: echo '=== Process Forensic Analysis ===' && for pid in $(ls /proc/ | grep -E '^[0-9]+$' | head -20); do exe=$(readlink /proc/$pid/exe 2>/dev/null) && cmdline=$(tr '\0' ' ' < /proc/$pid/cmdline
    2>/dev/null) && echo "PID:$pid EXE:$exe CMD:${cmdline:0:80}"; done | head -15
  answer_detail: 라이브 메모리 포렌식에서 /proc 파일시스템은 커널이 노출하는 프로세스 정보의 보고이다. /proc/[pid]/exe(실행 파일 경로), cmdline(명령줄 인수), environ(환경변수), maps(메모리 맵)을 분석하여 의심 프로세스를 식별한다. 삭제된 바이너리도 exe 링크로 발견 가능하다.
  verify:
    type: output_contains
    expect: Process Forensic
  script: echo '=== Process Forensic Analysis ===' && for pid in $(ls /proc/ | grep -E '^[0-9]+$' | head -20); do exe=$(readlink /proc/$pid/exe 2>/dev/null) && cmdline=$(tr '\0' ' ' < /proc/$pid/cmdline
    2>/dev/null) && echo "PID:$pid EXE:$exe CMD:${cmdline:0:80}"; done | head -15
  risk_level: low
- order: 3
  instruction: 숨겨진 프로세스를 탐지하라. /proc에서 보이는 프로세스와 ps 출력을 비교하여 루트킷에 의해 숨겨진 프로세스가 있는지 확인하라.
  hint: /proc의 PID 디렉토리와 ps aux의 PID를 비교한다.
  category: analysis
  points: 10
  answer: 'echo ''=== Hidden Process Detection ==='' && PROC_PIDS=$(ls -d /proc/[0-9]* 2>/dev/null | sed ''s|/proc/||'' | sort -n) && PS_PIDS=$(ps -eo pid --no-headers | tr -d '' '' | sort -n) && HIDDEN=$(comm
    -23 <(echo "$PROC_PIDS") <(echo "$PS_PIDS")) && if [ -z "$HIDDEN" ]; then echo ''No hidden processes detected - system appears clean''; else echo "Hidden PIDs: $HIDDEN"; fi'
  answer_detail: 루트킷은 ps, top 등의 사용자 공간 도구를 후킹하여 프로세스를 숨긴다. /proc 파일시스템(커널 직접 노출)과 ps(사용자 공간)의 PID 목록을 비교하면 불일치를 발견할 수 있다. comm -23으로 /proc에만 존재하는(숨겨진) PID를 찾는다.
  verify:
    type: output_contains
    expect: Hidden Process Detection
  script: 'echo ''=== Hidden Process Detection ==='' && PROC_PIDS=$(ls -d /proc/[0-9]* 2>/dev/null | sed ''s|/proc/||'' | sort -n) && PS_PIDS=$(ps -eo pid --no-headers | tr -d '' '' | sort -n) && HIDDEN=$(comm
    -23 <(echo "$PROC_PIDS") <(echo "$PS_PIDS")) && if [ -z "$HIDDEN" ]; then echo ''No hidden processes detected - system appears clean''; else echo "Hidden PIDs: $HIDDEN"; fi'
  risk_level: low
- order: 4
  instruction: 디스크 아티팩트를 수집하라. 최근 24시간 내 수정된 파일, 삭제된 파일의 흔적, 임시 파일을 조사하라.
  hint: find 명령으로 최근 변경 파일을 검색하고, /tmp과 /var/tmp를 조사한다.
  category: analysis
  points: 10
  answer: echo '=== Disk Artifact Collection ===' && echo '[1] Recently modified files (24h):' && find / -mtime -1 -type f -not -path '/proc/*' -not -path '/sys/*' -not -path '/run/*' 2>/dev/null | head
    -15 && echo '' && echo '[2] Suspicious files in /tmp:' && find /tmp -type f -name '*.sh' -o -name '*.py' -o -name '*.elf' -o -name '*.bin' 2>/dev/null | head -10 && echo '' && echo '[3] SUID binaries:'
    && find /usr -perm -4000 -type f 2>/dev/null | head -10
  answer_detail: 디스크 포렌식에서 최근 수정된 파일(mtime), 임시 디렉토리의 스크립트/바이너리, SUID 비트 설정 파일은 핵심 아티팩트이다. 공격자는 /tmp에 도구를 다운로드하고, SUID를 설정하여 권한 상승을 시도한다. find -mtime -1로 24시간 내 변경 파일을 조사한다.
  verify:
    type: output_contains
    expect: Disk Artifact
  script: echo '=== Disk Artifact Collection ===' && echo '[1] Recently modified files (24h):' && find / -mtime -1 -type f -not -path '/proc/*' -not -path '/sys/*' -not -path '/run/*' 2>/dev/null | head
    -15 && echo '' && echo '[2] Suspicious files in /tmp:' && find /tmp -type f -name '*.sh' -o -name '*.py' -o -name '*.elf' -o -name '*.bin' 2>/dev/null | head -10 && echo '' && echo '[3] SUID binaries:'
    && find /usr -perm -4000 -type f 2>/dev/null | head -10
  risk_level: low
- order: 5
  instruction: 파일 시스템 타임라인을 생성하라. MAC(Modified, Accessed, Changed) 타임스탬프를 기반으로 파일 활동 타임라인을 구성하라.
  hint: stat 명령으로 파일의 MAC 타임스탬프를 수집하고 시간순 정렬한다.
  category: analysis
  points: 10
  answer: 'echo ''=== File System Timeline ==='' && find /tmp /var/log -maxdepth 2 -type f -printf ''%T+ %p\n'' 2>/dev/null | sort -r | head -20 && echo ''---'' && echo ''Timeline analysis: Focus on clusters
    of file modifications within short timeframes'''
  answer_detail: 파일 시스템 타임라인(Super Timeline)은 MAC 타임스탬프를 시간순으로 정렬하여 공격 활동을 재구성한다. 짧은 시간 내 대량의 파일 수정(클러스터)은 공격 행위를 나타낸다. plaso/log2timeline 도구를 사용하면 다양한 소스의 타임라인을 통합할 수 있다.
  verify:
    type: output_contains
    expect: File System Timeline
  script: 'echo ''=== File System Timeline ==='' && find /tmp /var/log -maxdepth 2 -type f -printf ''%T+ %p\n'' 2>/dev/null | sort -r | head -20 && echo ''---'' && echo ''Timeline analysis: Focus on clusters
    of file modifications within short timeframes'''
  risk_level: low
- order: 6
  instruction: 로그 파일 포렌식을 수행하라. 시스템 로그에서 침해 지표를 찾아라. 로그 삭제 흔적, 시간 조작 흔적, 비정상 패턴을 식별하라.
  hint: 로그 파일의 시간 연속성, 크기 이상, 삭제 흔적을 검사한다.
  category: analysis
  points: 10
  answer: echo '=== Log Forensic Analysis ===' && echo '[1] Log file sizes:' && ls -la /var/log/auth.log /var/log/syslog /var/log/kern.log 2>/dev/null && echo '' && echo '[2] Log gaps (time discontinuity):'
    && awk '{print $1, $2, $3}' /var/log/syslog 2>/dev/null | tail -10 && echo '' && echo '[3] Log tampering indicators:' && echo '  - Truncated log files (size 0)' && echo '  - Time gaps > 1 hour in sequential
    entries' && echo '  - Missing log rotation files (.1, .2.gz)' && echo '  - Modified timestamps on log files'
  answer_detail: 로그 포렌식에서는 로그 삭제(파일 크기 0), 시간 갭(연속 엔트리 간 비정상적 시간차), 로그 회전 파일 누락, 타임스탬프 조작을 조사한다. 공격자는 흔적을 지우기 위해 로그를 삭제하거나 수정하므로, 로그 무결성 검증이 포렌식의 핵심이다.
  verify:
    type: output_contains
    expect: Log Forensic
  script: echo '=== Log Forensic Analysis ===' && echo '[1] Log file sizes:' && ls -la /var/log/auth.log /var/log/syslog /var/log/kern.log 2>/dev/null && echo '' && echo '[2] Log gaps (time discontinuity):'
    && awk '{print $1, $2, $3}' /var/log/syslog 2>/dev/null | tail -10 && echo '' && echo '[3] Log tampering indicators:' && echo '  - Truncated log files (size 0)' && echo '  - Time gaps > 1 hour in sequential
    entries' && echo '  - Missing log rotation files (.1, .2.gz)' && echo '  - Modified timestamps on log files'
  risk_level: low
- order: 7
  instruction: 네트워크 포렌식을 수행하라. 현재 네트워크 연결, ARP 테이블, DNS 캐시, 라우팅 테이블을 수집하여 분석하라.
  hint: ss, arp, ip route, resolvectl 명령으로 네트워크 상태를 수집한다.
  category: analysis
  points: 10
  answer: echo '=== Network Forensic Collection ===' && echo '[1] Active connections:' && ss -tnap | head -10 && echo '' && echo '[2] ARP table:' && ip neigh show | head -10 && echo '' && echo '[3] Routing
    table:' && ip route show | head -5 && echo '' && echo '[4] DNS resolution:' && cat /etc/resolv.conf && echo '' && echo 'Network forensic data collected successfully'
  answer_detail: 네트워크 포렌식은 현재 연결(ss -tnap), ARP 테이블(최근 통신 호스트), 라우팅 테이블(비정상 경로), DNS 설정(DNS 하이재킹)을 수집한다. 이 데이터는 C2 채널 식별, 측면 이동 경로 추적, DNS 조작 탐지에 활용된다.
  verify:
    type: output_contains
    expect: Network Forensic
  script: echo '=== Network Forensic Collection ===' && echo '[1] Active connections:' && ss -tnap | head -10 && echo '' && echo '[2] ARP table:' && ip neigh show | head -10 && echo '' && echo '[3] Routing
    table:' && ip route show | head -5 && echo '' && echo '[4] DNS resolution:' && cat /etc/resolv.conf && echo '' && echo 'Network forensic data collected successfully'
  risk_level: low
- order: 8
  instruction: 악성코드 정적 분석을 시뮬레이션하라. 의심 파일의 해시, 문자열, ELF 헤더를 분석하는 과정을 실습하라.
  hint: sha256sum, strings, file, readelf 명령으로 바이너리를 분석한다.
  category: analysis
  points: 10
  answer: 'echo ''=== Static Malware Analysis Simulation ==='' && SAMPLE=/usr/bin/curl && echo "Sample: $SAMPLE" && echo "[1] Hash:" && sha256sum $SAMPLE && echo "[2] File type:" && file $SAMPLE && echo
    "[3] Interesting strings:" && strings $SAMPLE | grep -iE ''http|socket|connect|exec|system|/bin'' | head -10 && echo "[4] ELF sections:" && readelf -S $SAMPLE 2>/dev/null | grep -E ''text|data|bss|rodata''
    | head -5'
  answer_detail: 정적 분석은 악성코드를 실행하지 않고 분석하는 기법이다. SHA256 해시(VirusTotal 검색), 문자열 추출(C2 URL, 명령어, 비밀번호), 파일 타입(패킹 여부), ELF 섹션(코드/데이터 비율)을 분석한다. 패킹된 바이너리는 strings 결과가 적고 엔트로피가 높다.
  verify:
    type: output_contains
    expect: Static Malware Analysis
  script: 'echo ''=== Static Malware Analysis Simulation ==='' && SAMPLE=/usr/bin/curl && echo "Sample: $SAMPLE" && echo "[1] Hash:" && sha256sum $SAMPLE && echo "[2] File type:" && file $SAMPLE && echo
    "[3] Interesting strings:" && strings $SAMPLE | grep -iE ''http|socket|connect|exec|system|/bin'' | head -10 && echo "[4] ELF sections:" && readelf -S $SAMPLE 2>/dev/null | grep -E ''text|data|bss|rodata''
    | head -5'
  risk_level: low
- order: 9
  instruction: 파일 엔트로피 분석을 수행하라. 높은 엔트로피는 암호화/패킹을 나타낸다. 여러 파일의 엔트로피를 비교하라.
  hint: Python으로 Shannon 엔트로피를 계산한다.
  category: analysis
  points: 10
  answer: "python3 -c \"\nimport math, os\nfrom collections import Counter\n\ndef entropy(data):\n    if not data: return 0\n    freq = Counter(data)\n    length = len(data)\n    return -sum((c/length)\
    \ * math.log2(c/length) for c in freq.values())\n\nfiles = ['/usr/bin/ls', '/usr/bin/curl', '/etc/passwd', '/etc/shadow']\nprint('=== File Entropy Analysis ===')\nprint(f'{\"File\":<30} {\"Size\":>10}\
    \ {\"Entropy\":>10} {\"Assessment\":>15}')\nprint('-' * 70)\nfor f in files:\n    try:\n        with open(f, 'rb') as fh:\n            data = fh.read(10000)\n        e = entropy(data)\n        size\
    \ = os.path.getsize(f)\n        assess = 'PACKED/ENC' if e > 7.0 else 'COMPRESSED' if e > 6.0 else 'NORMAL'\n        print(f'{f:<30} {size:>10} {e:>10.4f} {assess:>15}')\n    except: pass\nprint()\n\
    print('Threshold: >7.0=packed/encrypted, >6.0=compressed, <6.0=normal')\n\""
  answer_detail: Shannon 엔트로피는 데이터의 무작위성을 측정한다. 정상 텍스트(~4.0), 일반 바이너리(~5.5), 압축 파일(~7.5), 암호화 파일(~8.0)로 구분된다. 엔트로피 7.0 이상의 실행 파일은 패킹이나 암호화가 적용된 악성코드일 가능성이 높다.
  verify:
    type: output_contains
    expect: File Entropy
  script: "python3 -c \"\nimport math, os\nfrom collections import Counter\n\ndef entropy(data):\n    if not data: return 0\n    freq = Counter(data)\n    length = len(data)\n    return -sum((c/length)\
    \ * math.log2(c/length) for c in freq.values())\n\nfiles = ['/usr/bin/ls', '/usr/bin/curl', '/etc/passwd', '/etc/shadow']\nprint('=== File Entropy Analysis ===')\nprint(f'{\"File\":<30} {\"Size\":>10}\
    \ {\"Entropy\":>10} {\"Assessment\":>15}')\nprint('-' * 70)\nfor f in files:\n    try:\n        with open(f, 'rb') as fh:\n            data = fh.read(10000)\n        e = entropy(data)\n        size\
    \ = os.path.getsize(f)\n        assess = 'PACKED/ENC' if e > 7.0 else 'COMPRESSED' if e > 6.0 else 'NORMAL'\n        print(f'{f:<30} {size:>10} {e:>10.4f} {assess:>15}')\n    except: pass\nprint()\n\
    print('Threshold: >7.0=packed/encrypted, >6.0=compressed, <6.0=normal')\n\""
  risk_level: low
- order: 10
  instruction: 침해 사고 타임라인을 재구성하라. 수집된 모든 포렌식 아티팩트를 시간순으로 통합하라.
  hint: 프로세스, 파일, 로그, 네트워크 아티팩트의 타임스탬프를 통합 정렬한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/forensic_timeline.txt << 'EOF'\n=== Integrated Forensic Timeline ===\n\n[T-60min] Reconnaissance\n  - Source: Suricata eve.json\n  - Event: Port scan from external IP\n  - Evidence:\
    \ SYN packets to multiple ports\n\n[T-45min] Initial Access\n  - Source: WAF access.log\n  - Event: SQL Injection attempts on /rest/products\n  - Evidence: UNION SELECT in query parameters\n\n[T-30min]\
    \ Execution\n  - Source: auth.log, /proc analysis\n  - Event: Unauthorized command execution\n  - Evidence: bash process spawned by www-data\n\n[T-15min] Persistence\n  - Source: File system timeline\n\
    \  - Event: Crontab modified, new service installed\n  - Evidence: /var/spool/cron/crontabs modified\n\n[T-5min] Data Staging\n  - Source: auditd, file access logs\n  - Event: Mass file read in /etc/\
    \ and /home/\n  - Evidence: 50+ file reads in 2 minutes\n\n[T-0min] Exfiltration Attempt\n  - Source: DNS logs, NetFlow\n  - Event: DNS tunneling detected\n  - Evidence: High entropy DNS queries to\
    \ unknown domain\nEOF\ncat /tmp/forensic_timeline.txt"
  answer_detail: 포렌식 타임라인 통합은 다양한 소스(IDS, WAF, 인증로그, 파일시스템, 네트워크)의 이벤트를 시간순으로 병합하여 공격의 전체 흐름을 재구성한다. 킬체인의 각 단계가 언제 발생했는지, 탐지 Gap은 어디인지를 파악하여 방어 개선에 활용한다.
  verify:
    type: output_contains
    expect: Integrated Forensic Timeline
  script: "cat > /tmp/forensic_timeline.txt << 'EOF'\n=== Integrated Forensic Timeline ===\n\n[T-60min] Reconnaissance\n  - Source: Suricata eve.json\n  - Event: Port scan from external IP\n  - Evidence:\
