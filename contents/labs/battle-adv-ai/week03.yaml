lab_id: battle-adv-ai-week03
title: C2 채널 구축과 탐지 — Command & Control 인프라 (AI 지원)
version: ai
course: battle-adv-ai
week: 3
description: Command & Control(C2) 인프라의 구조와 통신 기법을 분석한다. DNS, HTTP, HTTPS 기반 C2 채널을 시뮬레이션하고, 비컨 패턴 탐지, JA3 핑거프린팅, nftables 차단 규칙을 구현하여 C2 통신을 탐지/차단한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- C2 인프라의 구성 요소와 통신 구조를 이해한다
- DNS, HTTP, HTTPS 기반 C2 채널을 시뮬레이션한다
- C2 트래픽의 네트워크 시그니처를 식별하고 차단한다
prerequisites:
- battle-adv-nonai week02 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] Metasploit의 multi/handler를 설정하여 C2 리스너의 기본 구조를 이해하라. 설정을 확인한 후 종료하라.'
  hint: msfconsole -q -x 명령으로 handler를 자동 설정한다.
  category: recon
  points: 10
  answer: msfconsole -q -x 'use exploit/multi/handler; set PAYLOAD linux/x64/meterpreter/reverse_tcp; set LHOST 10.20.30.201; set LPORT 4444; show options; exit' 2>&1 | tail -20
  answer_detail: C2 리스너는 침투된 시스템으로부터 역연결을 수신한다. Metasploit의 multi/handler는 범용 리스너로, LHOST는 리스너 IP, LPORT는 수신 포트이다.
  verify:
    type: output_contains
    expect: 
  target_vm: attacker
  script: msfconsole -q -x 'use exploit/multi/handler; set PAYLOAD linux/x64/meterpreter/reverse_tcp; set LHOST 10.20.30.201; set LPORT 4444; show options; exit' 2>&1 | tail -20
  risk_level: low
  bastion_prompt: '[RED] Metasploit의 multi/handler를 설정하여 C2 리스너의 기본 구조를 이해해줘'
- order: 2
  instruction: '[RED] DNS 터널링을 시뮬레이션하라. 데이터를 base64 인코딩 후 63바이트 단위로 분할하여 DNS 서브도메인으로 전송하는 스크립트를 작성하라.'
  hint: base64 인코딩 후 청크 분할하여 서브도메인으로 구성한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/dns_c2_sim.sh << ''SCRIPT'' #!/bin/bash DATA="Sensitive_Data_Exfil_Test_2026" ENCODED=$(echo -n "$DATA" | base64 | tr "+/" "-_" | tr -d "=") echo "=== DNS C2 Simulation ===" echo "Original:
    $DATA" echo "Encoded subdomain: ${ENCODED}.c2.test.local" echo "Chunk size: ${#ENCODED} bytes (max 63 per label)" SCRIPT chmod +x /tmp/dns_c2_sim.sh && bash /tmp/dns_c2_sim.sh'
  answer_detail: DNS C2(T1071.004)는 DNS 쿼리/응답에 데이터를 은닉하여 통신한다. 서브도메인에 base64 인코딩 데이터를 삽입하면 DNS 서버를 경유하여 C2 서버로 전달된다.
  verify:
    type: output_contains
    expect: 
  target_vm: attacker
  script: 'cat > /tmp/dns_c2_sim.sh << ''SCRIPT'' #!/bin/bash DATA="Sensitive_Data_Exfil_Test_2026" ENCODED=$(echo -n "$DATA" | base64 | tr "+/" "-_" | tr -d "=") echo "=== DNS C2 Simulation ===" echo "Original:
    $DATA" echo "Encoded subdomain: ${ENCODED}.c2.test.local" echo "Chunk size: ${#ENCODED} bytes (max 63 per label)" SCRIPT chmod +x /tmp/dns_c2_sim.sh && bash /tmp/dns_c2_sim.sh'
  risk_level: medium
  bastion_prompt: '[RED] DNS 터널링을 시뮬레이션하라 구현 방법과 예시를 설명해줘'
- order: 3
  instruction: '[RED] HTTP 기반 C2 비컨(beacon)을 시뮬레이션하는 스크립트를 작성하라. 주기적 check-in, jitter, 정상 User-Agent 위장을 포함하라.'
  hint: curl을 사용하여 C2 서버에 주기적으로 check-in하는 구조를 작성한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/http_c2_beacon.sh << ''SCRIPT'' #!/bin/bash echo "=== HTTP C2 Beacon Simulation ===" echo "C2 Server: http://10.20.30.201:8080" echo "Beacon ID: $(hostname)-$(id -u)" echo "Sleep:
    30s (+/- 10s jitter)" echo "Check-in: GET /api/beacon?id=$(hostname)-$(id -u)&type=checkin" echo "Task fetch: GET /api/tasks?id=$(hostname)-$(id -u)" echo "User-Agent: Mozilla/5.0 (Windows NT 10.0;
    Win64; x64) AppleWebKit/537.36" SCRIPT bash /tmp/http_c2_beacon.sh'
  answer_detail: HTTP C2(T1071.001)는 정상 웹 트래픽으로 위장하여 탐지를 회피한다. jitter를 추가하여 패턴 탐지를 어렵게 만들고, 정상 브라우저 User-Agent로 위장한다.
  verify:
    type: output_contains
    expect: 
  target_vm: attacker
  script: 'cat > /tmp/http_c2_beacon.sh << ''SCRIPT'' #!/bin/bash echo "=== HTTP C2 Beacon Simulation ===" echo "C2 Server: http://10.20.30.201:8080" echo "Beacon ID: $(hostname)-$(id -u)" echo "Sleep:
    30s (+/- 10s jitter)" echo "Check-in: GET /api/beacon?id=$(hostname)-$(id -u)&type=checkin" echo "Task fetch: GET /api/tasks?id=$(hostname)-$(id -u)" echo "User-Agent: Mozilla/5.0 (Windows NT 10.0;
    Win64; x64) AppleWebKit/537.36" SCRIPT bash /tmp/http_c2_beacon.sh'
  risk_level: medium
  bastion_prompt: '[RED] HTTP 기반 C2 비컨(beacon)을 시뮬레이션하는 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘'
- order: 4
  instruction: '[RED] HTTPS C2를 위한 자체 서명 인증서를 생성하라. CN을 유명 서비스 도메인으로 위장하라.'
  hint: openssl req 명령으로 자체 서명 인증서를 생성한다.
  category: exploit
  points: 10
  answer: openssl req -x509 -newkey rsa:2048 -keyout /tmp/c2_key.pem -out /tmp/c2_cert.pem -days 365 -nodes -subj '/CN=update.microsoft.com/O=Microsoft Corporation/C=US' 2>&1 && openssl x509 -in /tmp/c2_cert.pem
    -noout -subject -dates
  answer_detail: HTTPS C2는 TLS 암호화로 트래픽을 은닉한다. CN을 정상 도메인으로 위장하면 기본적인 검사를 통과시키지만, 인증서 체인 검증(CT 로그)으로 탐지 가능하다.
  verify:
    type: output_contains
    expect: 
  target_vm: attacker
  script: openssl req -x509 -newkey rsa:2048 -keyout /tmp/c2_key.pem -out /tmp/c2_cert.pem -days 365 -nodes -subj '/CN=update.microsoft.com/O=Microsoft Corporation/C=US' 2>&1 && openssl x509 -in /tmp/c2_cert.pem
    -noout -subject -dates
  risk_level: medium
  bastion_prompt: '[RED] HTTPS C2를 위한 자체 서명 인증서를 생성하라. CN을 유명 서비스 도메인으로 위장해줘'
- order: 5
  instruction: '[BLUE] Phase 전환 — C2 비컨의 주기적 통신 패턴을 탐지하는 통계 분석 스크립트를 작성하라. 연결 간격의 변동계수가 15% 미만이면 비컨 패턴으로 판정하라.'
  hint: 연결 시간 간격의 표준편차를 계산하여 주기성을 탐지한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/beacon_detector.sh << ''SCRIPT'' #!/bin/bash echo "=== C2 Beacon Pattern Detector ===" python3 -c " import statistics intervals = [30, 31, 29, 30, 32, 28, 31, 30, 29, 31] mean = statistics.mean(intervals)
    stdev = statistics.stdev(intervals) cv = stdev / mean * 100 print(f\"Mean interval: {mean:.1f}s\") print(f\"Std deviation: {stdev:.2f}s\") print(f\"Coefficient of variation: {cv:.1f}%\") print(f\"Beacon
    likelihood: {''HIGH'' if cv < 15 else ''LOW''}\") print(f\"Estimated sleep: {mean:.0f}s with jitter +/-{stdev:.0f}s\") " SCRIPT bash /tmp/beacon_detector.sh'
  answer_detail: C2 비컨은 일정한 간격으로 check-in하며 jitter를 추가해도 통계적 주기성이 남는다. 변동계수(CV) 15% 미만이면 비컨 패턴 가능성이 높다.
  verify:
    type: output_contains
    expect: 
  target_vm: secu
  script: 'cat > /tmp/beacon_detector.sh << ''SCRIPT'' #!/bin/bash echo "=== C2 Beacon Pattern Detector ===" python3 -c " import statistics intervals = [30, 31, 29, 30, 32, 28, 31, 30, 29, 31] mean = statistics.mean(intervals)
    stdev = statistics.stdev(intervals) cv = stdev / mean * 100 print(f\"Mean interval: {mean:.1f}s\") print(f\"Std deviation: {stdev:.2f}s\") print(f\"Coefficient of variation: {cv:.1f}%\") print(f\"Beacon
    likelihood: {''HIGH'' if cv < 15 else ''LOW''}\") print(f\"Estimated sleep: {mean:.0f}s with jitter +/-{stdev:.0f}s\") " SCRIPT bash /tmp/beacon_detector.sh'
  risk_level: low
  bastion_prompt: '[BLUE] Phase 전환 — C2 비컨의 주기적 통신 패턴을 탐지하는 통계 분석 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘'
- order: 6
  instruction: '[BLUE] nftables로 C2 통신을 차단하는 방화벽 규칙을 작성하라. 비표준 아웃바운드 포트 차단, DNS 쿼리 레이트 리밋, 알려진 C2 IP 차단을 구현하라.'
  hint: nft add rule 형태로 체인에 규칙을 추가한다.
  category: defense
  points: 10
  answer: "cat > /tmp/c2_block_rules.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable inet c2_block {\n  set blocked_c2_ips {\n    type ipv4_addr\n    elements = { 198.51.100.1, 203.0.113.50 }\n  }\n  chain output\
    \ {\n    type filter hook output priority 0; policy accept;\n    ip daddr @blocked_c2_ips drop\n    tcp dport { 4444, 5555, 8443, 9999 } log prefix \"C2_PORT_BLOCK: \" drop\n    udp dport 53 limit rate\
    \ over 30/second log prefix \"DNS_FLOOD: \" drop\n  }\n}\nEOF\ncat /tmp/c2_block_rules.nft"
  answer_detail: 'nftables로 C2 차단: (1) 알려진 C2 IP 블랙리스트, (2) 비표준 아웃바운드 포트 차단(4444 등), (3) DNS 쿼리 레이트 리밋(터널링 방지). log prefix로 차단 이벤트를 기록한다.'
  verify:
    type: output_contains
    expect: 
  target_vm: secu
  script: "cat > /tmp/c2_block_rules.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable inet c2_block {\n  set blocked_c2_ips {\n    type ipv4_addr\n    elements = { 198.51.100.1, 203.0.113.50 }\n  }\n  chain output\
    \ {\n    type filter hook output priority 0; policy accept;\n    ip daddr @blocked_c2_ips drop\n    tcp dport { 4444, 5555, 8443, 9999 } log prefix \"C2_PORT_BLOCK: \" drop\n    udp dport 53 limit rate\
    \ over 30/second log prefix \"DNS_FLOOD: \" drop\n  }\n}\nEOF\ncat /tmp/c2_block_rules.nft"
  risk_level: low
  bastion_prompt: '[BLUE] nftables로 C2 통신을 차단하는 방화벽 규칙을 구현 방법을 설명하고 예시 코드를 보여줘'
- order: 7
  instruction: '[BLUE] Suricata 규칙으로 DNS 터널링과 비정상 TLS 인증서를 탐지하라. DNS 쿼리 길이 이상과 자체 서명 인증서를 탐지하는 규칙을 작성하라.'
  hint: dns.query 매치와 tls 관련 키워드를 사용한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/c2_detection.rules << ''EOF'' alert dns any any -> any any (msg:"C2-DETECT: Long DNS query - possible tunneling"; dns.query; pcre:"/^[a-zA-Z0-9+\/]{40,}/"; sid:2000001; rev:1;) alert
    dns any any -> any any (msg:"C2-DETECT: High rate DNS to single domain"; dns.query; threshold:type both, track by_src, count 30, seconds 60; sid:2000002; rev:1;) alert tls any any -> any any (msg:"C2-DETECT:
    Self-signed TLS certificate"; tls.cert_issuer; content:"update.microsoft.com"; sid:2000003; rev:1;) EOF cat /tmp/c2_detection.rules'
  answer_detail: DNS 터널링은 40자 이상의 base64 인코딩 서브도메인으로 탐지하고, DNS 레이트 이상(60초 내 30회)으로 고빈도 통신을 탐지한다. 자체 서명 인증서의 CN 위장도 시그니처로 탐지한다.
  verify:
    type: output_contains
    expect: 
  target_vm: secu
  script: 'cat > /tmp/c2_detection.rules << ''EOF'' alert dns any any -> any any (msg:"C2-DETECT: Long DNS query - possible tunneling"; dns.query; pcre:"/^[a-zA-Z0-9+\/]{40,}/"; sid:2000001; rev:1;) alert
    dns any any -> any any (msg:"C2-DETECT: High rate DNS to single domain"; dns.query; threshold:type both, track by_src, count 30, seconds 60; sid:2000002; rev:1;) alert tls any any -> any any (msg:"C2-DETECT:
    Self-signed TLS certificate"; tls.cert_issuer; content:"update.microsoft.com"; sid:2000003; rev:1;) EOF cat /tmp/c2_detection.rules'
  risk_level: low
  bastion_prompt: '[BLUE] Suricata 규칙으로 DNS 터널링과 비정상 TLS 인증서를 탐지하라 구현 방법과 예시를 설명해줘'
- order: 8
  instruction: '[BLUE] SSL/TLS 인증서 메타데이터를 검사하여 C2 서버의 Red Flag을 식별하라. 자체 서명, 최근 생성, 비정상 CN 등을 확인하라.'
  hint: openssl s_client로 인증서를 가져오고 발급자, 유효기간을 확인한다.
  category: defense
  points: 10
  answer: echo | openssl s_client -connect 10.20.30.80:443 -servername 10.20.30.80 2>/dev/null | openssl x509 -noout -issuer -subject -dates -fingerprint 2>/dev/null; echo '---'; echo 'C2 Certificate Red
    Flags:'; echo '1. Self-signed (Issuer == Subject)'; echo '2. Recently created (< 30 days)'; echo '3. Long validity (> 1 year)'; echo '4. Generic CN (localhost, *.com)'; echo '5. Missing SAN extension'
  answer_detail: C2 서버의 TLS 인증서는 자체 서명, 최근 생성, 비정상 CN, SAN 미설정 등의 Red Flag을 보인다. Certificate Transparency 로그와 대조하면 추가 검증이 가능하다.
  verify:
    type: output_contains
    expect: 
  target_vm: secu
  script: echo | openssl s_client -connect 10.20.30.80:443 -servername 10.20.30.80 2>/dev/null | openssl x509 -noout -issuer -subject -dates -fingerprint 2>/dev/null; echo '---'; echo 'C2 Certificate Red
    Flags:'; echo '1. Self-signed (Issuer == Subject)'; echo '2. Recently created (< 30 days)'; echo '3. Long validity (> 1 year)'; echo '4. Generic CN (localhost, *.com)'; echo '5. Missing SAN extension'
  risk_level: low
  bastion_prompt: '[BLUE] SSL/TLS 인증서 메타데이터를 검사하여 C2 서버의 Red Flag을 식별해줘'
- order: 9
  instruction: '[RED/BLUE] 환경 정리 및 C2 인프라 TTP 분석 보고서를 작성하라. C2 기법, 탐지 방법, 차단 전략을 MITRE ATT&CK 매핑과 함께 정리하라.'
  hint: 임시 파일을 삭제하고 T1071, T1090, T1573 등을 매핑한다.
  category: analysis
  points: 15
  answer: "rm -f /tmp/c2_*.pem /tmp/dns_c2_sim.sh /tmp/http_c2_beacon.sh /tmp/beacon_detector.sh 2>/dev/null && cat > /tmp/c2_ttp_report.txt << 'EOF'\n=== C2 Infrastructure TTP Analysis Report ===\n\n1.\
    \ C2 Techniques Analyzed:\n   T1071.001 - Web Protocols (HTTP/S beacon)\n   T1071.004 - DNS (DNS tunneling)\n   T1573.002 - Encrypted Channel: Asymmetric (TLS)\n\n2. Detection Methods:\n   - Network:\
    \ JA3 fingerprint, beacon interval analysis, DNS anomaly\n   - Certificate: Self-signed detection, CT log comparison\n   - SIEM: Correlation rules for C2 indicators\n\n3. Blocking Strategies:\n   -\
    \ nftables: Port/IP blocking, DNS rate limiting\n   - Suricata: DNS query length + entropy detection\n   - TLS Inspection: Certificate anomaly detection\n\n4. Recommendations:\n   - Deploy DNS sinkhole\
    \ with threat intel feeds\n   - Implement JA3 monitoring on all egress points\n   - Enable beacon detection in SIEM (interval analysis)\nEOF\ncat /tmp/c2_ttp_report.txt"
  answer_detail: C2 분석 보고서는 사용된 기법을 ATT&CK에 매핑하고 탐지/차단 전략을 기술한다. 네트워크, 인증서, SIEM 레벨의 다층 탐지와 방화벽, DNS, TLS 레벨의 다층 차단을 결합한다.
  verify:
    type: output_contains
    expect: 
  target_vm: attacker
  script: "rm -f /tmp/c2_*.pem /tmp/dns_c2_sim.sh /tmp/http_c2_beacon.sh /tmp/beacon_detector.sh 2>/dev/null && cat > /tmp/c2_ttp_report.txt << 'EOF'\n=== C2 Infrastructure TTP Analysis Report ===\n\n1.\
    \ C2 Techniques Analyzed:\n   T1071.001 - Web Protocols (HTTP/S beacon)\n   T1071.004 - DNS (DNS tunneling)\n   T1573.002 - Encrypted Channel: Asymmetric (TLS)\n\n2. Detection Methods:\n   - Network:\
    \ JA3 fingerprint, beacon interval analysis, DNS anomaly\n   - Certificate: Self-signed detection, CT log comparison\n   - SIEM: Correlation rules for C2 indicators\n\n3. Blocking Strategies:\n   -\
    \ nftables: Port/IP blocking, DNS rate limiting\n   - Suricata: DNS query length + entropy detection\n   - TLS Inspection: Certificate anomaly detection\n\n4. Recommendations:\n   - Deploy DNS sinkhole\
    \ with threat intel feeds\n   - Implement JA3 monitoring on all egress points\n   - Enable beacon detection in SIEM (interval analysis)\nEOF\ncat /tmp/c2_ttp_report.txt"
  risk_level: low
  bastion_prompt: '[RED/BLUE] 환경 정리 및 C2 인프라 TTP 분석 보고서를 작성하라. C2 기법, 탐지 방법, 차단 전략을 MITRE ATT&CK 매핑과 함께 정리해줘'
