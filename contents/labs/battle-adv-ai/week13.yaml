  hint: 테스트 2~5에서 발견된 Gap을 Suricata/Wazuh 규칙으로 해결한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 발견된 탐지 Gap에 대한 새로운 탐지 규칙을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/purple_new_rules.txt << ''EOF'' === New Detection Rules
    from Purple Team ===

    # Rule 1: FIM for crontab (Gap from Test 2) <directories check_all="yes" realtime="yes">/var/spool/cron/crontabs</directories>

    # Rule 2: DNS entropy detection (Gap from Test 3) alert dns any any -> any any
    (msg:"PURPLE: High entropy DNS query"; dns.query; pcre:"/^[a-zA-Z0-9+\/]{30,}/";
    sid:7000001; rev:1;)

    # Rule 3: SSH lateral correlation (Gap from Test 4) <rule id="100600" level="12"
    frequency="3" timeframe="300"> <if_sid>5715</if_sid> <same_user /> <description>PURPLE:
    Same user SSH to 3+ hosts in 5 min</description> <mitre><id>T1021.004</id></mitre>
    </rule>

    # Rule 4: DNS exfil rate (for Test 5) alert dns any any -> any any (msg:"PURPLE:
    High rate DNS"; dns.query; threshold:type both, track by_src, count 20, seconds
    60; sid:7000002; rev:1;)

    Total new rules: 4 EOF cat /tmp/purple_new_rules.txt'
  answer_detail: '퍼플팀에서 발견된 4개 Gap에 대한 규칙을 즉시 작성한다: crontab FIM, DNS 엔트로피, SSH 상관
