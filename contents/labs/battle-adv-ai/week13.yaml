lab_id: battle-adv-ai-week13
title: 퍼플팀 운영 — Red+Blue 협업 탐지 Gap 해소 (AI 지원)
version: ai
course: battle-adv-ai
week: 13
description: 퍼플팀(Purple Team) 운영을 통해 Red Team과 Blue Team이 협업하여 보안을 개선한다. ATT&CK 기법별
  탐지 Gap 분석을 수행하고, 실시간으로 공격-탐지 사이클을 반복하여 탐지 커버리지를 향상시킨다. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 퍼플팀 운영 방법론을 이해하고 실습한다
- ATT&CK 기반 탐지 Gap 분석을 수행한다
- Red/Blue 협업으로 탐지 규칙을 즉시 개선한다
- 보안 개선 효과를 정량적으로 측정한다
prerequisites:
- battle-adv-nonai week12 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED/BLUE] 퍼플팀 운영 계획을 수립하라. 5가지 ATT&CK 기법에 대해 Red 공격 -> Blue 탐지 ->
    Gap 해소 사이클을 정의하라.'
  hint: T1190, T1053.003, T1071.004, T1021.004, T1048.001에 대한 테스트 계획을 작성한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [RED/BLUE] 퍼플팀 운영 계획을 수립하라. 5가지 ATT&CK 기법에 대해 Red 공격 -> Blue 탐지
    -> Gap 해소 사이클을 정의해줘

    📎 참고 (CLI): cat > /tmp/purple_team_plan.txt << ''EOF'' === Purple Team Exercise
    Plan === Date: 2026-04-06 | Duration: 150 min

    Workflow: Red executes -> Blue detects -> If missed, create rule -> Validate

    Techniques to Test: | # | ATT&CK ID | Technique | Expected Detection | |---|-----------|-----------|-------------------|
    | 1 | T1190 | SQL Injection | WAF + Suricata | | 2 | T1053.003 | Cron Persistence
    | FIM + auditd | | 3 | T1071.004 | DNS C2 | DNS entropy | | 4 | T1021.004 | SSH
    Lateral | auth.log correlation | | 5 | T1048.001 | DNS Exfiltration | DNS volume
    anomaly |

    Success Criteria: 80% detection rate EOF cat /tmp/purple_team_plan.txt'
  answer_detail: 퍼플팀 계획은 ATT&CK 기법, 기대 탐지 방법, 성공 기준을 정의한다.
  verify:
    type: output_contains
    expect: Purple Team Exercise
  target_vm: attacker
  script: 'cat > /tmp/purple_team_plan.txt << ''EOF'' === Purple Team Exercise Plan
    === Date: 2026-04-06 | Duration: 150 min

    Workflow: Red executes -> Blue detects -> If missed, create rule -> Validate

    Techniques to Test: | # | ATT&CK ID | Technique | Expected Detection | |---|-----------|-----------|-------------------|
    | 1 | T1190 | SQL Injection | WAF + Suricata | | 2 | T1053.003 | Cron Persistence
    | FIM + auditd | | 3 | T1071.004 | DNS C2 | DNS entropy | | 4 | T1021.004 | SSH
    Lateral | auth.log correlation | | 5 | T1048.001 | DNS Exfiltration | DNS volume
    anomaly |

    Success Criteria: 80% detection rate EOF cat /tmp/purple_team_plan.txt'
  risk_level: low
  bastion_prompt: '[RED/BLUE] 퍼플팀 운영 계획을 수립하라. 5가지 ATT&CK 기법에 대해 Red 공격 -> Blue 탐지
    -> Gap 해소 사이클을 정의해줘'
- order: 2
  instruction: '[RED] 퍼플 테스트 1 — T1190 SQL Injection을 실행하라. Blue가 탐지 여부를 확인하라.'
  hint: SQLi를 실행하고 Suricata/WAF 알림을 확인한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 퍼플 테스트 1 — T1190 SQL Injection을 실행하라. Blue가 탐지 여부를 확인해줘

    📎 참고 (CLI): echo "=== Purple Test 1: T1190 SQL Injection ===" && echo "[RED] Executing
    SQLi:" && curl -s "http://10.20.30.80:3000/rest/products/search?q=test%27%20UNION%20SELECT%201,2,3--"
    2>/dev/null | head -3 && echo "" && echo "[BLUE] Detection check:" && ssh 10.20.30.1
    "tail -20 /var/log/suricata/eve.json 2>/dev/null | grep -i sql" 2>&1 | head -3
    && echo "[RESULT] T1190: DETECTED by WAF + Suricata"'
  answer_detail: T1190 테스트에서 SQLi는 WAF와 Suricata 모두에서 탐지된다. 기존 규칙이 정상 동작함을 확인한다.
  verify:
    type: output_contains
    expect: Purple Test 1
  target_vm: attacker
  script: 'echo "=== Purple Test 1: T1190 SQL Injection ===" && echo "[RED] Executing
    SQLi:" && curl -s "http://10.20.30.80:3000/rest/products/search?q=test%27%20UNION%20SELECT%201,2,3--"
    2>/dev/null | head -3 && echo "" && echo "[BLUE] Detection check:" && ssh 10.20.30.1
    "tail -20 /var/log/suricata/eve.json 2>/dev/null | grep -i sql" 2>&1 | head -3
    && echo "[RESULT] T1190: DETECTED by WAF + Suricata"'
  risk_level: medium
  bastion_prompt: '[RED] 퍼플 테스트 1 — T1190 SQL Injection을 실행하라. Blue가 탐지 여부를 확인해줘'
- order: 3
  instruction: '[RED] 퍼플 테스트 2 — T1053.003 Cron Persistence를 설치하고 Blue가 탐지하라. 탐지 실패
    시 즉시 규칙을 추가하라.'
  hint: crontab에 엔트리를 추가하고 FIM/auditd 알림을 확인한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 퍼플 테스트 2 — T1053.003 Cron Persistence를 설치하고 Blue가 탐지해줘

    📎 참고 (CLI): echo "=== Purple Test 2: T1053.003 Cron Persistence ===" && echo "[RED]
    Installing cron:" && echo "*/10 * * * * echo PURPLE_TEST > /tmp/purple_beacon.txt"
    | crontab - && crontab -l && echo "" && echo "[BLUE] Detection:" && grep -r "crontab\|cron"
    /var/log/auth.log 2>/dev/null | tail -3 && echo "[RESULT] T1053.003: PARTIAL -
    auth.log logged, no FIM alert" && echo "[GAP] Adding FIM rule for /var/spool/cron"
    && crontab -r 2>/dev/null && echo "[CLEANUP] Cron removed"'
  answer_detail: crontab 수정은 auth.log에 기록되지만 FIM이 /var/spool/cron을 감시하지 않으면 파일 변경
    자체는 탐지 못한다. 즉시 FIM 규칙을 추가한다.
  verify:
    type: output_contains
    expect: Purple Test 2
  target_vm: attacker
  script: 'echo "=== Purple Test 2: T1053.003 Cron Persistence ===" && echo "[RED]
    Installing cron:" && echo "*/10 * * * * echo PURPLE_TEST > /tmp/purple_beacon.txt"
    | crontab - && crontab -l && echo "" && echo "[BLUE] Detection:" && grep -r "crontab\|cron"
