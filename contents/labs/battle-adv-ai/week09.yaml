  bastion_prompt: '[BLUE] SOAR 아키텍처를 설계하라. 탐지(Suricata/Wazuh) -> 판단(규칙 엔진) -> 대응(nftables/프로세스 종료) ->
    알림(로그/보고)의 자동화 파이프라인을 문서화하라.'
- order: 2
  instruction: '[BLUE] 자동 IP 차단 스크립트를 작성하라. Suricata eve.json에서 severity 1(Critical) 이벤트 발생 시 nftables로
    해당 IP를 즉시 차단하는 스크립트를 구현하라.'
  hint: tail -f와 jq로 eve.json을 실시간 파싱하여 nft add element로 차단한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 자동 IP 차단 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/auto_block.sh << ''SCRIPT'' #!/bin/bash # SOAR Auto IP Blocker LOGFILE="/var/log/suricata/eve.json"
    echo "=== SOAR Auto IP Blocker ===" echo "Monitoring: $LOGFILE" echo "Trigger: severity == 1 (Critical)"
    echo "Action: nft add element inet filter blocklist { IP }" echo "" echo "Logic (pseudocode):" echo
    "  tail -f $LOGFILE | while read line; do" echo "    EVENT=$(echo $line | jq -r .event_type)" echo
    "    if [ $EVENT = alert ]; then" echo "      SEV=$(echo $line | jq -r .alert.severity)" echo "      SRC=$(echo
    $line | jq -r .src_ip)" echo "      if [ $SEV = 1 ]; then" echo "        nft add element inet filter
    blocklist { $SRC }" echo "      fi" echo "    fi" echo "  done" echo "" echo "Script structure verified
    - ready for deployment" SCRIPT bash /tmp/auto_block.sh'
  answer_detail: 자동 IP 차단은 SOAR의 핵심 기능이다. eve.json에서 severity 1 알림을 파싱하고 공격 출발지 IP를 nftables set에 추가하여
    즉시 차단한다.
  verify:
    type: output_contains
    expect: SOAR Auto IP Blocker
    semantic:
      intent: '[BLUE] 자동 IP 차단 스크립트 /tmp/auto_block.sh — tail -f eve.json | jq -r select(.event_type==alert
        and .alert.severity==1) .src_ip | while read ip; do nft add element inet filter blocklist { $ip
        }; done. severity 1 (Critical) 경보만 자동 차단 (FP 위험 최소화). 실시간 MTTR 초 단위'
      success_criteria:
      - /tmp/auto_block.sh 스크립트
      - tail -f + jq severity==1 필터
      - nft add element 자동 차단
      - 실시간 처리
      acceptable_methods:
      - bash tail -f + while read + nft
      - python watchdog 라이브러리
      - Wazuh active-response 스크립트
      - Elastic Alerting webhook
      negative_signs:
      - severity 필터 없음 (모든 경보 차단)
      - 실시간 아님
      - nft 연동 없음
