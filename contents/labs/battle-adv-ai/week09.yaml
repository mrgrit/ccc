lab_id: battle-adv-ai-week09
title: SOAR 구축 — 보안 자동화 오케스트레이션과 대응 체계 (AI 지원)
version: ai
course: battle-adv-ai
week: 9
description: SOAR(Security Orchestration, Automation and Response) 체계를 구축한다. 자동화된 IR 워크플로우, Wazuh-nftables
  연동 차단, 실시간 대시보드 데이터 수집, IR 플레이북을 구현하여 탐지에서 대응까지의 전 과정을 자동화한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- SOAR 아키텍처를 이해하고 자동화 워크플로우를 설계한다
- Wazuh Active Response와 nftables를 연동한 자동 차단을 구현한다
- IR 플레이북을 작성하고 시뮬레이션 실행한다
- 실시간 보안 대시보드 데이터를 수집한다
prerequisites:
- battle-adv-nonai week08 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] SOAR 아키텍처를 설계하라. 탐지(Suricata/Wazuh) -> 판단(규칙 엔진) -> 대응(nftables/프로세스 종료) -> 알림(로그/보고)의
    자동화 파이프라인을 문서화하라.'
  hint: 각 단계의 입력, 처리, 출력을 정의한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] SOAR 아키텍처를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): cat > /tmp/soar_architecture.txt\
    \ << 'EOF'\n=== SOAR Architecture Design ===\n\n[Suricata eve.json] ---> [Wazuh SIEM] ---> [Active\
    \ Response] ---> [nftables/kill]\n       |                     |                   |             \
    \       |\n   Detect              Correlate            Decide              Execute\n\n1. Detection\
    \ Layer:\n   - Suricata IDS: Network alerts -> eve.json\n   - Wazuh agents: Host alerts -> alerts.json\n\
    \   - WAF: Web attack logs\n\n2. Correlation Engine:\n   - Wazuh rules: pattern matching + frequency\n\
    \   - Custom rules: multi-event correlation\n   - Severity classification: P1-P4\n\n3. Decision Engine:\n\
    \   - P1 Critical: Auto-block + isolate + alert\n   - P2 High: Auto-block + investigate\n   - P3 Medium:\
    \ Rate-limit + monitor\n   - P4 Low: Log only\n\n4. Response Actions:\n   - nft add element inet filter\
    \ blocklist { IP }\n   - kill -9 PID (malicious process)\n   - Slack notification to #security-incidents\n\
    \   - Evidence collection to /evidence/\nEOF\ncat /tmp/soar_architecture.txt"
  answer_detail: SOAR는 Detection -> Correlation -> Decision -> Response의 4단계 자동화 파이프라인이다. 위협 심각도에 따라 자동/반자동/수동
    대응을 분류한다.
  verify:
    type: output_contains
    expect: SOAR Architecture
    semantic:
      intent: '[BLUE] SOAR 아키텍처 설계 /tmp/soar_architecture.txt — 3계층 (Detection: Suricata eve.json + Wazuh
        alerts · Decision: jq 룰 엔진 or Python classifier · Response: nftables/process kill/notify) + 각
        계층 인터페이스 (JSON event bus) + 데이터 흐름 다이어그램. SOAR Security Orchestration Automation and Response
        핵심 개념'
      success_criteria:
      - /tmp/soar_architecture.txt 설계 문서
      - 3계층 (Detect/Decide/Respond)
      - 데이터 흐름 + 인터페이스 정의
      - SOAR 개념 반영
      acceptable_methods:
      - cat > file + ASCII diagram
      - mermaid graph TD
      - TheHive + Cortex 참조
      - Shuffle workflow designer
      negative_signs:
      - 계층 구분 없음
      - SOAR 개념 없음
      - 인터페이스 정의 누락
  target_vm: siem
  script: "cat > /tmp/soar_architecture.txt << 'EOF'\n=== SOAR Architecture Design ===\n\n[Suricata eve.json]\
    \ ---> [Wazuh SIEM] ---> [Active Response] ---> [nftables/kill]\n       |                     |  \
    \                 |                    |\n   Detect              Correlate            Decide     \
    \         Execute\n\n1. Detection Layer:\n   - Suricata IDS: Network alerts -> eve.json\n   - Wazuh\
    \ agents: Host alerts -> alerts.json\n   - WAF: Web attack logs\n\n2. Correlation Engine:\n   - Wazuh\
    \ rules: pattern matching + frequency\n   - Custom rules: multi-event correlation\n   - Severity classification:\
    \ P1-P4\n\n3. Decision Engine:\n   - P1 Critical: Auto-block + isolate + alert\n   - P2 High: Auto-block\
    \ + investigate\n   - P3 Medium: Rate-limit + monitor\n   - P4 Low: Log only\n\n4. Response Actions:\n\
    \   - nft add element inet filter blocklist { IP }\n   - kill -9 PID (malicious process)\n   - Slack\
    \ notification to #security-incidents\n   - Evidence collection to /evidence/\nEOF\ncat /tmp/soar_architecture.txt"
