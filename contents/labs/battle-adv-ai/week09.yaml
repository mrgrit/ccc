lab_id: battle-adv-ai-week09
title: SOAR 구축 — 보안 자동화 오케스트레이션과 대응 체계 (AI 지원)
version: ai
course: battle-adv-ai
week: 9
description: SOAR(Security Orchestration, Automation and Response) 체계를 구축한다. 자동화된
  IR 워크플로우, Wazuh-nftables 연동 차단, 실시간 대시보드 데이터 수집, IR 플레이북을 구현하여 탐지에서 대응까지의 전 과정을
  자동화한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- SOAR 아키텍처를 이해하고 자동화 워크플로우를 설계한다
- Wazuh Active Response와 nftables를 연동한 자동 차단을 구현한다
- IR 플레이북을 작성하고 시뮬레이션 실행한다
- 실시간 보안 대시보드 데이터를 수집한다
prerequisites:
- battle-adv-nonai week08 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] SOAR 아키텍처를 설계하라. 탐지(Suricata/Wazuh) -> 판단(규칙 엔진) -> 대응(nftables/프로세스
    종료) -> 알림(로그/보고)의 자동화 파이프라인을 문서화하라.'
  hint: 각 단계의 입력, 처리, 출력을 정의한다.
  category: defense
  points: 10
  answer: "cat > /tmp/soar_architecture.txt << 'EOF'\n=== SOAR Architecture Design\
    \ ===\n\n[Suricata eve.json] ---> [Wazuh SIEM] ---> [Active Response] ---> [nftables/kill]\n\
    \       |                     |                   |                    |\n   Detect\
    \              Correlate            Decide              Execute\n\n1. Detection\
    \ Layer:\n   - Suricata IDS: Network alerts -> eve.json\n   - Wazuh agents: Host\
    \ alerts -> alerts.json\n   - WAF: Web attack logs\n\n2. Correlation Engine:\n\
    \   - Wazuh rules: pattern matching + frequency\n   - Custom rules: multi-event\
    \ correlation\n   - Severity classification: P1-P4\n\n3. Decision Engine:\n  \
    \ - P1 Critical: Auto-block + isolate + alert\n   - P2 High: Auto-block + investigate\n\
    \   - P3 Medium: Rate-limit + monitor\n   - P4 Low: Log only\n\n4. Response Actions:\n\
    \   - nft add element inet filter blocklist { IP }\n   - kill -9 PID (malicious\
    \ process)\n   - Slack notification to #security-incidents\n   - Evidence collection\
    \ to /evidence/\nEOF\ncat /tmp/soar_architecture.txt"
  answer_detail: SOAR는 Detection -> Correlation -> Decision -> Response의 4단계 자동화 파이프라인이다.
    위협 심각도에 따라 자동/반자동/수동 대응을 분류한다.
  verify:
    type: output_contains
    expect: SOAR Architecture
  target_vm: siem
  script: "cat > /tmp/soar_architecture.txt << 'EOF'\n=== SOAR Architecture Design\
    \ ===\n\n[Suricata eve.json] ---> [Wazuh SIEM] ---> [Active Response] ---> [nftables/kill]\n\
    \       |                     |                   |                    |\n   Detect\
    \              Correlate            Decide              Execute\n\n1. Detection\
    \ Layer:\n   - Suricata IDS: Network alerts -> eve.json\n   - Wazuh agents: Host\
    \ alerts -> alerts.json\n   - WAF: Web attack logs\n\n2. Correlation Engine:\n\
    \   - Wazuh rules: pattern matching + frequency\n   - Custom rules: multi-event\
    \ correlation\n   - Severity classification: P1-P4\n\n3. Decision Engine:\n  \
    \ - P1 Critical: Auto-block + isolate + alert\n   - P2 High: Auto-block + investigate\n\
    \   - P3 Medium: Rate-limit + monitor\n   - P4 Low: Log only\n\n4. Response Actions:\n\
    \   - nft add element inet filter blocklist { IP }\n   - kill -9 PID (malicious\
    \ process)\n   - Slack notification to #security-incidents\n   - Evidence collection\
    \ to /evidence/\nEOF\ncat /tmp/soar_architecture.txt"
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 cat으로 [BLUE] SOAR 아키텍처 작업을 수행해줘
- order: 2
  instruction: '[BLUE] 자동 IP 차단 스크립트를 작성하라. Suricata eve.json에서 severity 1(Critical)
    이벤트 발생 시 nftables로 해당 IP를 즉시 차단하는 스크립트를 구현하라.'
  hint: tail -f와 jq로 eve.json을 실시간 파싱하여 nft add element로 차단한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/auto_block.sh << ''SCRIPT'' #!/bin/bash # SOAR Auto IP Blocker
    LOGFILE="/var/log/suricata/eve.json" echo "=== SOAR Auto IP Blocker ===" echo
    "Monitoring: $LOGFILE" echo "Trigger: severity == 1 (Critical)" echo "Action:
    nft add element inet filter blocklist { IP }" echo "" echo "Logic (pseudocode):"
    echo "  tail -f $LOGFILE | while read line; do" echo "    EVENT=$(echo $line |
    jq -r .event_type)" echo "    if [ $EVENT = alert ]; then" echo "      SEV=$(echo
    $line | jq -r .alert.severity)" echo "      SRC=$(echo $line | jq -r .src_ip)"
    echo "      if [ $SEV = 1 ]; then" echo "        nft add element inet filter blocklist
    { $SRC }" echo "      fi" echo "    fi" echo "  done" echo "" echo "Script structure
    verified - ready for deployment" SCRIPT bash /tmp/auto_block.sh'
  answer_detail: 자동 IP 차단은 SOAR의 핵심 기능이다. eve.json에서 severity 1 알림을 파싱하고 공격 출발지 IP를
    nftables set에 추가하여 즉시 차단한다.
  verify:
    type: output_contains
    expect: SOAR Auto IP Blocker
  target_vm: secu
  script: 'cat > /tmp/auto_block.sh << ''SCRIPT'' #!/bin/bash # SOAR Auto IP Blocker
    LOGFILE="/var/log/suricata/eve.json" echo "=== SOAR Auto IP Blocker ===" echo
    "Monitoring: $LOGFILE" echo "Trigger: severity == 1 (Critical)" echo "Action:
    nft add element inet filter blocklist { IP }" echo "" echo "Logic (pseudocode):"
    echo "  tail -f $LOGFILE | while read line; do" echo "    EVENT=$(echo $line |
    jq -r .event_type)" echo "    if [ $EVENT = alert ]; then" echo "      SEV=$(echo
    $line | jq -r .alert.severity)" echo "      SRC=$(echo $line | jq -r .src_ip)"
    echo "      if [ $SEV = 1 ]; then" echo "        nft add element inet filter blocklist
    { $SRC }" echo "      fi" echo "    fi" echo "  done" echo "" echo "Script structure
    verified - ready for deployment" SCRIPT bash /tmp/auto_block.sh'
  risk_level: low
  bastion_prompt: secu VM(보안게이트웨이)에서 cat으로 [BLUE] 자동 IP 차단 스크립트 작업을 수행해줘
- order: 3
  instruction: '[BLUE] SQL Injection 공격 발생 시의 IR 플레이북을 작성하라. 확인 -> 격리 -> 증거 수집 ->
    분석 -> 복구 -> 보고의 단계를 정의하라.'
  hint: 각 단계의 SLA, 담당자, 구체적 명령어를 포함한다.
  category: response
  points: 10
  answer: "cat > /tmp/ir_playbook_sqli.txt << 'EOF'\n=== IR Playbook: SQL Injection\
    \ Attack ===\nPlaybook ID: IR-WEB-001 | Severity: CRITICAL\n\nTRIGGER: Wazuh rule\
    \ 100101 or Suricata SID 1000001\n\nStep 1: CONFIRM (2 min)\n  - Review alert\
    \ (source IP, payload, target URL)\n  - Check WAF logs for matching request\n\
    \  - Verify: Is this a true positive?\n\nStep 2: CONTAIN (5 min)\n  - Block source\
    \ IP: nft add element inet filter blocklist { SRC_IP }\n  - Enable WAF paranoia\
    \ level 3\n  - Notify SOC lead\n\nStep 3: COLLECT (10 min)\n  - Export WAF access\
    \ logs: last 1 hour\n  - Export Suricata eve.json: last 1 hour\n  - Record: Source\
    \ IP, payload, response codes\n\nStep 4: ANALYZE (20 min)\n  - Was injection successful?\n\
    \  - Were any records extracted?\n  - Timeline: First to last attempt\n\nStep\
    \ 5: REMEDIATE (30 min)\n  - Patch endpoint (parameterized queries)\n  - Rotate\
    \ database credentials\n  - Update WAF rules\n\nStep 6: REPORT\n  - Incident report\
    \ to management\n  - Update IOC database\nEOF\ncat /tmp/ir_playbook_sqli.txt"
  answer_detail: IR 플레이북은 각 단계의 SLA(확인 2분, 격리 5분)를 정의하여 일관된 대응을 보장한다.
  verify:
    type: output_contains
    expect: IR Playbook
  target_vm: siem
  script: "cat > /tmp/ir_playbook_sqli.txt << 'EOF'\n=== IR Playbook: SQL Injection\
