  answer: "\U0001F916 프롬프트: [BLUE] SQL Injection 공격 발생 시의 IR 플레이북을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE\
    \ 참고 (CLI): cat > /tmp/ir_playbook_sqli.txt << 'EOF'\n=== IR Playbook: SQL Injection Attack ===\n\
    Playbook ID: IR-WEB-001 | Severity: CRITICAL\n\nTRIGGER: Wazuh rule 100101 or Suricata SID 1000001\n\
    \nStep 1: CONFIRM (2 min)\n  - Review alert (source IP, payload, target URL)\n  - Check WAF logs for\
    \ matching request\n  - Verify: Is this a true positive?\n\nStep 2: CONTAIN (5 min)\n  - Block source\
    \ IP: nft add element inet filter blocklist { SRC_IP }\n  - Enable WAF paranoia level 3\n  - Notify\
    \ SOC lead\n\nStep 3: COLLECT (10 min)\n  - Export WAF access logs: last 1 hour\n  - Export Suricata\
    \ eve.json: last 1 hour\n  - Record: Source IP, payload, response codes\n\nStep 4: ANALYZE (20 min)\n\
    \  - Was injection successful?\n  - Were any records extracted?\n  - Timeline: First to last attempt\n\
    \nStep 5: REMEDIATE (30 min)\n  - Patch endpoint (parameterized queries)\n  - Rotate database credentials\n\
    \  - Update WAF rules\n\nStep 6: REPORT\n  - Incident report to management\n  - Update IOC database\n\
    EOF\ncat /tmp/ir_playbook_sqli.txt"
  answer_detail: IR 플레이북은 각 단계의 SLA(확인 2분, 격리 5분)를 정의하여 일관된 대응을 보장한다.
