    📎 참고 (CLI): cat > /tmp/soar_workflow.sh << ''SCRIPT'' #!/bin/bash SUSPECT_IP=${1:-203.0.113.50} TIMESTAMP=$(date
    -u "+%Y-%m-%dT%H:%M:%SZ") echo "=== SOAR Automated IR Workflow ===" echo "Time: $TIMESTAMP" echo "Suspect
