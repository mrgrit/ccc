    \ logs: last 1 hour\n  - Export Suricata eve.json: last 1 hour\n  - Record: Source\
    \ IP, payload, response codes\n\nStep 4: ANALYZE (20 min)\n  - Was injection successful?\n\
    \  - Were any records extracted?\n  - Timeline: First to last attempt\n\nStep\
    \ 5: REMEDIATE (30 min)\n  - Patch endpoint (parameterized queries)\n  - Rotate\
    \ database credentials\n  - Update WAF rules\n\nStep 6: REPORT\n  - Incident report\
    \ to management\n  - Update IOC database\nEOF\ncat /tmp/ir_playbook_sqli.txt"
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 cat으로 [BLUE] SQL Injection 공격 발생 시의 IR 플레이북 작업을
    수행해줘
- order: 4
  instruction: '[BLUE] 자동화된 IR 워크플로우를 구현하라. 탐지 -> 격리 -> 증거수집 -> 알림을 하나의 스크립트로 자동화하라.'
  hint: 스크립트에서 nft 차단, 로그 수집, 알림 전송을 연결한다.
  category: response
  points: 10
  answer: 'cat > /tmp/soar_workflow.sh << ''SCRIPT'' #!/bin/bash SUSPECT_IP=${1:-203.0.113.50}
    TIMESTAMP=$(date -u "+%Y-%m-%dT%H:%M:%SZ") echo "=== SOAR Automated IR Workflow
    ===" echo "Time: $TIMESTAMP" echo "Suspect IP: $SUSPECT_IP" echo "" echo "Phase
    1: CONTAIN" echo "  [1.1] nft add element inet filter blocklist { $SUSPECT_IP
    }" echo "  [1.2] ss -K dst $SUSPECT_IP" echo "" echo "Phase 2: COLLECT EVIDENCE"
    echo "  [2.1] tcpdump -i any host $SUSPECT_IP -w /evidence/pcap.pcap" echo "  [2.2]
    ps auxf > /evidence/processes.txt" echo "  [2.3] journalctl --since \"1 hour ago\"
    > /evidence/journal.txt" echo "" echo "Phase 3: NOTIFY" echo "  [3.1] Slack #security-incidents"
    echo "  [3.2] Create incident ticket" echo "" echo "SOAR workflow completed in
    <10 seconds" SCRIPT bash /tmp/soar_workflow.sh'
  answer_detail: SOAR 자동화는 알림부터 차단, 증거 수집, 알림 전송까지 10초 이내에 완료한다. 수동 대응 대비 극적으로 빠른
    대응이 가능하다.
