  instruction: '[BLUE] 실시간 보안 대시보드를 위한 데이터 수집 스크립트를 작성하라. 시스템, 네트워크, 보안 지표를 JSON으로
    출력하라.'
  hint: 시스템 리소스, 네트워크 상태, 보안 카운터를 JSON으로 출력한다.
  category: defense
  points: 10
  answer: "python3 -c \"\nimport json, subprocess, time\ndef run(cmd):\n    try: return\
    \ subprocess.check_output(cmd, shell=True, timeout=5).decode().strip()\n    except:\
    \ return '0'\ndashboard = {\n    'timestamp': time.strftime('%Y-%m-%dT%H:%M:%SZ'),\n\
    \    'network': {\n        'established': int(run('ss -tn state established |\
    \ wc -l') or 0),\n        'listening': int(run('ss -tln | wc -l') or 0),\n   \
    \ },\n    'security': {\n        'failed_ssh': run('grep -c Failed /var/log/auth.log\
    \ 2>/dev/null || echo 0'),\n    }\n}\nprint(json.dumps(dashboard, indent=2))\n\
    \""
  answer_detail: 대시보드 데이터는 네트워크(연결 수), 보안(실패 인증)의 핵심 지표를 JSON으로 수집하여 Grafana 등과 연동한다.
