lab_id: battle-adv-ai-week04
title: 측면 이동 심화 — 자격 증명 기반 공격과 네트워크 세분화 (AI 지원)
version: ai
course: battle-adv-ai
week: 4
description: 내부 네트워크에서의 측면 이동(Lateral Movement) 기법을 실습한다. SSH 키 재사용, Pass-the-Hash
  시뮬레이션, 자격 증명 기반 이동을 Red Phase에서 수행하고, Blue Phase에서 네트워크 세그먼테이션과 Honey Token 기반 탐지를
  구현한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- SSH 기반 측면 이동 기법을 실습한다
- Pass-the-Hash 원리와 Impacket 도구를 분석한다
- 네트워크 세그먼테이션을 설계하고 구현한다
- Honey Token으로 측면 이동을 조기 탐지한다
prerequisites:
- battle-adv-nonai week03 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 내부 네트워크 10.20.30.0/24의 활성 호스트를 열거하고 각 호스트의 SMB/SSH 서비스를 확인하라.'
  hint: nmap -sn으로 호스트 발견 후 SSH/SMB 포트를 스캔한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 내부 네트워크 10.20.30.0/24의 활성 호스트를 열거하고 각 호스트의 SMB/SSH 서비스를 확인해줘

    📎 참고 (CLI): nmap -sn --max-retries 1 --host-timeout 15s -T4 10.20.30.0/24 -oG
    /tmp/lateral_hosts.txt && grep ''Up'' /tmp/lateral_hosts.txt && nmap -p 22,445
    --max-retries 1 --host-timeout 15s -T4 10.20.30.1 10.20.30.80 10.20.30.100'
  answer_detail: 측면 이동의 첫 단계는 내부 호스트 파악이다(T1018). SSH(22)와 SMB(445) 서비스는 측면 이동의 핵심
    경로이다.
  verify:
    type: output_contains
    expect: Up
  target_vm: attacker
  script: nmap -sn --max-retries 1 --host-timeout 15s -T4 10.20.30.0/24 -oG /tmp/lateral_hosts.txt
    && grep 'Up' /tmp/lateral_hosts.txt && nmap -p 22,445 --max-retries 1 --host-timeout
    15s -T4 10.20.30.1 10.20.30.80 10.20.30.100
  risk_level: low
  bastion_prompt: '[RED] 내부 네트워크 10.20.30.0/24의 활성 호스트를 열거하고 각 호스트의 SMB/SSH 서비스를 확인해줘'
- order: 2
  instruction: '[RED] 로컬 시스템의 패스워드 해시를 분석하고, Pass-the-Hash 공격의 원리와 Impacket 도구의 측면
    이동 기법을 정리하라.'
  hint: /etc/shadow에서 해시 형식을 확인하고 PtH 원리를 문서화한다.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: [RED] 로컬 시스템의 패스워드 해시를 분석하고, Pass-the-Hash 공격의 원리와 Impacket\
    \ 도구의 측면 이동 기법을 정리해줘\n\U0001F4CE 참고 (CLI): echo '1' | sudo -S cat /etc/shadow\
    \ 2>/dev/null | grep -v ':\\*:\\|:!:' | head -5; echo '---'; echo 'Hash formats:\
    \ $1$=MD5, $5$=SHA-256, $6$=SHA-512, $y$=yescrypt'; echo ''; cat > /tmp/pth_simulation.txt\
    \ << 'EOF'\n=== Pass-the-Hash Attack Simulation ===\n1. NTLM Hash Format: LM_HASH:NT_HASH\n\
    2. Attack Tools:\n   pth-smbclient //target/share -U domain/user%hash --pw-nt-hash\n\
    \   impacket-psexec -hashes LM:NT user@target\n   impacket-wmiexec -hashes LM:NT\
    \ user@target\n3. Why it works: NTLM auth uses hash directly - no plaintext needed\n\
    4. Detection: Event ID 4624 Type 3 with NTLM, same hash from multiple IPs\nEOF\n\
    cat /tmp/pth_simulation.txt"
  answer_detail: Pass-the-Hash(T1550.002)는 NTLM 인증의 설계적 취약점을 이용한다. 해시 자체로 인증하므로 평문
    비밀번호가 필요 없다. Impacket의 psexec/wmiexec/smbexec은 각각 다른 프로토콜로 측면 이동을 수행한다.
  verify:
    type: output_contains
    expect: Pass-the-Hash
  target_vm: attacker
  script: "echo '1' | sudo -S cat /etc/shadow 2>/dev/null | grep -v ':\\*:\\|:!:'\
    \ | head -5; echo '---'; echo 'Hash formats: $1$=MD5, $5$=SHA-256, $6$=SHA-512,\
    \ $y$=yescrypt'; echo ''; cat > /tmp/pth_simulation.txt << 'EOF'\n=== Pass-the-Hash\
    \ Attack Simulation ===\n1. NTLM Hash Format: LM_HASH:NT_HASH\n2. Attack Tools:\n\
    \   pth-smbclient //target/share -U domain/user%hash --pw-nt-hash\n   impacket-psexec\
    \ -hashes LM:NT user@target\n   impacket-wmiexec -hashes LM:NT user@target\n3.\
    \ Why it works: NTLM auth uses hash directly - no plaintext needed\n4. Detection:\
    \ Event ID 4624 Type 3 with NTLM, same hash from multiple IPs\nEOF\ncat /tmp/pth_simulation.txt"
  risk_level: medium
  bastion_prompt: '[RED] 로컬 시스템의 패스워드 해시를 분석하고, Pass-the-Hash 공격의 원리와 Impacket 도구의
    측면 이동 기법을 정리해줘'
- order: 3
  instruction: '[RED] SSH 키 기반 측면 이동을 실습하라. 키를 생성하여 다른 서버(10.20.30.1, 10.20.30.80)로의
    SSH 접근을 시도하라.'
  hint: ssh -i 옵션으로 개인키를 지정하여 다른 서버에 접근한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] SSH 키 기반 측면 이동을 실습해줘

    📎 참고 (CLI): ssh-keygen -t ed25519 -f /tmp/lateral_key -N '''' -q && echo ''Testing
    SSH lateral movement:'' && ssh -i /tmp/lateral_key -o ConnectTimeout=3 -o StrictHostKeyChecking=no
    ccc@10.20.30.1 ''hostname'' 2>&1 | head -5 && ssh -i /tmp/lateral_key -o ConnectTimeout=3
    -o StrictHostKeyChecking=no ccc@10.20.30.80 ''hostname'' 2>&1 | head -5'
  answer_detail: SSH를 이용한 측면 이동(T1021.004)은 Linux 환경에서 가장 흔한 기법이다. authorized_keys에
    등록된 키가 있으면 비밀번호 없이 접근이 가능하다.
  verify:
    type: output_contains
    expect: SSH lateral
  target_vm: attacker
  script: ssh-keygen -t ed25519 -f /tmp/lateral_key -N '' -q && echo 'Testing SSH
    lateral movement:' && ssh -i /tmp/lateral_key -o ConnectTimeout=3 -o StrictHostKeyChecking=no
    ccc@10.20.30.1 'hostname' 2>&1 | head -5 && ssh -i /tmp/lateral_key -o ConnectTimeout=3
    -o StrictHostKeyChecking=no ccc@10.20.30.80 'hostname' 2>&1 | head -5
  risk_level: medium
  bastion_prompt: '[RED] SSH 키 기반 측면 이동을 실습해줘'
- order: 4
  instruction: '[BLUE] Phase 전환 — 측면 이동 탐지를 위한 Suricata 규칙을 작성하라. 내부 호스트 간 비정상 SSH/SMB
    연결을 감지하라.'
  hint: 내부 호스트 간 통상적이지 않은 포트 연결을 모니터링한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Phase 전환 — 측면 이동 탐지를 위한 Suricata 규칙을 구현 방법을 설명하고 예시 코드를
    보여줘

    📎 참고 (CLI): cat > /tmp/lateral_detection_rules.txt << ''EOF'' # Suricata Lateral
    Movement Detection alert tcp 10.20.30.0/24 any -> 10.20.30.0/24 445 (msg:"LATERAL:
    Internal SMB connection"; flow:to_server,established; threshold:type both, track
    by_src, count 3, seconds 60; sid:3000001; rev:1;) alert tcp 10.20.30.0/24 any
    -> 10.20.30.0/24 22 (msg:"LATERAL: Internal SSH connection"; flow:to_server,established;
    threshold:type both, track by_src, count 5, seconds 60; sid:3000002; rev:1;) alert
    tcp 10.20.30.0/24 any -> 10.20.30.0/24 135 (msg:"LATERAL: Internal WMI/DCOM connection";
    flow:to_server,established; sid:3000003; rev:1;) EOF cat /tmp/lateral_detection_rules.txt'
  answer_detail: 내부 호스트 간 통신의 정상 기준선을 설정하고 이탈을 감지한다. 워크스테이션 간 SMB(445), SSH(22), WMI(135)
    연결은 비정상적이며, threshold로 짧은 시간 내 다수 연결을 감지한다.
  verify:
    type: output_contains
    expect: LATERAL
  target_vm: secu
  script: 'cat > /tmp/lateral_detection_rules.txt << ''EOF'' # Suricata Lateral Movement
    Detection alert tcp 10.20.30.0/24 any -> 10.20.30.0/24 445 (msg:"LATERAL: Internal
    SMB connection"; flow:to_server,established; threshold:type both, track by_src,
    count 3, seconds 60; sid:3000001; rev:1;) alert tcp 10.20.30.0/24 any -> 10.20.30.0/24
    22 (msg:"LATERAL: Internal SSH connection"; flow:to_server,established; threshold:type
    both, track by_src, count 5, seconds 60; sid:3000002; rev:1;) alert tcp 10.20.30.0/24
    any -> 10.20.30.0/24 135 (msg:"LATERAL: Internal WMI/DCOM connection"; flow:to_server,established;
    sid:3000003; rev:1;) EOF cat /tmp/lateral_detection_rules.txt'
  risk_level: low
  bastion_prompt: '[BLUE] Phase 전환 — 측면 이동 탐지를 위한 Suricata 규칙을 구현 방법을 설명하고 예시 코드를
    보여줘'
- order: 5
  instruction: '[BLUE] nftables로 서버 역할별 네트워크 세그먼테이션 정책을 설계하라. control_plane, security_tier,
    web_tier, siem_tier 간 필요한 통신만 허용하라.'
  hint: 서버 역할별로 set을 정의하고, 그룹 간 필요한 포트만 허용한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] nftables로 서버 역할별 네트워크 세그먼테이션 정책을 구현 방법을 설명하고 예시\
    \ 코드를 보여줘\n\U0001F4CE 참고 (CLI): cat > /tmp/segmentation_policy.nft << 'EOF'\n\
    #!/usr/sbin/nft -f\ntable inet segmentation {\n  set control_plane { type ipv4_addr;\
    \ elements = { 10.20.30.201 } }\n  set security_tier { type ipv4_addr; elements\
    \ = { 10.20.30.1 } }\n  set web_tier { type ipv4_addr; elements = { 10.20.30.80\
    \ } }\n  set siem_tier { type ipv4_addr; elements = { 10.20.30.100 } }\n  chain\
    \ forward {\n    type filter hook forward priority 0; policy drop;\n    ip saddr\
    \ @control_plane accept\n    ip saddr @web_tier ip daddr @security_tier drop\n\
    \    ip saddr @web_tier ip daddr @siem_tier drop\n    ip saddr @siem_tier tcp\
    \ dport { 514, 1514 } accept\n    ct state established,related accept\n  }\n}\n\
    EOF\ncat /tmp/segmentation_policy.nft"
  answer_detail: 네트워크 세그먼테이션은 측면 이동 방지의 가장 효과적인 방어이다. 기본 정책을 drop으로 설정하고 화이트리스트 방식으로
    필요한 통신만 허용한다.
  verify:
    type: output_contains
    expect: segmentation
  target_vm: secu
  script: "cat > /tmp/segmentation_policy.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable\
    \ inet segmentation {\n  set control_plane { type ipv4_addr; elements = { 10.20.30.201\
    \ } }\n  set security_tier { type ipv4_addr; elements = { 10.20.30.1 } }\n  set\
    \ web_tier { type ipv4_addr; elements = { 10.20.30.80 } }\n  set siem_tier { type\
    \ ipv4_addr; elements = { 10.20.30.100 } }\n  chain forward {\n    type filter\
    \ hook forward priority 0; policy drop;\n    ip saddr @control_plane accept\n\
    \    ip saddr @web_tier ip daddr @security_tier drop\n    ip saddr @web_tier ip\
    \ daddr @siem_tier drop\n    ip saddr @siem_tier tcp dport { 514, 1514 } accept\n\
    \    ct state established,related accept\n  }\n}\nEOF\ncat /tmp/segmentation_policy.nft"
  risk_level: low
  bastion_prompt: '[BLUE] nftables로 서버 역할별 네트워크 세그먼테이션 정책을 구현 방법을 설명하고 예시 코드를 보여줘'
