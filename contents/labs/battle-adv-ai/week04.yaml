  instruction: '[BLUE] Wazuh에서 동일 사용자가 5분 내 3개 이상 호스트에 SSH 로그인하는 측면 이동 패턴을 탐지하는 상관
    분석 규칙을 작성하라.'
  hint: frequency, timeframe, same_user 조건을 결합한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] Wazuh에서 동일 사용자가 5분 내 3개 이상 호스트에 SSH 로그인하는 측면 이동\
    \ 패턴을 탐지하는 상관 분석 규칙을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): cat > /tmp/wazuh_lateral_rule.xml\
