    배치하는 계획을 작성하라.'
  hint: 가짜 SSH 키, 가짜 비밀번호 파일을 배치하여 접근 시도를 탐지한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] Honey Token을 이용한 측면 이동 탐지 함정을 구현 방법을 설명하고 예시 코드를\
    \ 보여줘\n\U0001F4CE 참고 (CLI): cat > /tmp/honey_tokens.txt << 'EOF'\n=== Honey Token\
    \ Deployment Plan ===\n\n1. Fake Credentials:\n   - /home/admin/.ssh/config ->\
    \ fake host entries pointing to honeypot\n   - /opt/backup/credentials.txt ->\
    \ fake passwords that trigger alert on use\n\n2. Honey Services:\n   - 10.20.30.250:445\
    \ -> SMB honeypot (any auth attempt = alert)\n   - 10.20.30.250:22 -> SSH honeypot\
    \ (Cowrie)\n\n3. Detection Triggers:\n   - Any login attempt to honeypot IPs ->\
    \ CRITICAL alert\n   - Any access to honey files -> CRITICAL alert\n\n4. SIEM\
    \ Rule:\n   IF source_ip IN internal_range AND dest_ip == honeypot_ip\n   THEN\
    \ alert(\"Lateral Movement Detected\", severity=CRITICAL)\nEOF\ncat /tmp/honey_tokens.txt"
  answer_detail: Honey Token은 공격자를 유인하여 조기 탐지하는 능동적 방어 기법이다. 정상 사용자는 절대 접근하지 않으므로
    접근 시도 자체가 침해 지표가 된다.
  verify:
    type: output_contains
    expect: Honey Token
  target_vm: siem
  script: "cat > /tmp/honey_tokens.txt << 'EOF'\n=== Honey Token Deployment Plan ===\n\
    \n1. Fake Credentials:\n   - /home/admin/.ssh/config -> fake host entries pointing\
    \ to honeypot\n   - /opt/backup/credentials.txt -> fake passwords that trigger\
    \ alert on use\n\n2. Honey Services:\n   - 10.20.30.250:445 -> SMB honeypot (any\
    \ auth attempt = alert)\n   - 10.20.30.250:22 -> SSH honeypot (Cowrie)\n\n3. Detection\
    \ Triggers:\n   - Any login attempt to honeypot IPs -> CRITICAL alert\n   - Any\
