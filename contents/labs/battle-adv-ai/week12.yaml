lab_id: battle-adv-ai-week12
title: 블루팀 운영 — SOC 기반 완전 방어 체계
version: ai
course: battle-adv-ai
week: 12
description: SOC(Security Operations Center) 기반의 완전한 방어 체계를 구축하고 운영한다. SIEM 설정, 탐지 규칙, 인시던트 대응 절차, 방어 자동화를 종합적으로 실습한다.
difficulty: hard
duration_minutes: 150
objectives:
- SOC 운영의 전체 프로세스를 이해하고 실습한다
- SIEM 기반 모니터링 및 탐지 체계를 구축한다
- 인시던트 대응(IR) 절차를 수립하고 실행한다
- 방어 자동화 및 SOAR 연동을 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SOC 운영 절차서를 작성하라. 모니터링, 탐지, 분류, 대응, 보고의 전체 SOC 프로세스를 정의하라.
  hint: NIST CSF(Identify, Protect, Detect, Respond, Recover) 프레임워크를 참고한다.
  category: defense
  points: 10
  answer: "cat > /tmp/soc_operations.txt << 'EOF'\n=== SOC Operations Procedure ===\n\n1. MONITOR (24/7):\n   - Wazuh SIEM dashboard review (10.20.30.100)\n   - Suricata IDS alert feed (10.20.30.1)\n  \
    \ - System health metrics (all hosts)\n   - Threat intel feed updates\n\n2. DETECT:\n   - Automated: SIEM correlation rules (500+ rules)\n   - Semi-auto: Anomaly detection baselines\n   - Manual: Threat\
    \ hunting (weekly)\n\n3. TRIAGE (Classification):\n   - P1 Critical: Active exploitation, data breach\n   - P2 High: Successful intrusion, persistence\n   - P3 Medium: Reconnaissance, failed attacks\n\
    \   - P4 Low: Policy violation, misconfig\n\n4. RESPOND:\n   - P1: Immediate containment (<15 min SLA)\n   - P2: Investigation + containment (<1 hour)\n   - P3: Analysis + monitoring (<4 hours)\n  \
    \ - P4: Log + review (next business day)\n\n5. REPORT:\n   - Daily: SOC summary report\n   - Weekly: Threat landscape update\n   - Monthly: Metrics and improvement plan\n   - Per-incident: Full IR report\n\
    EOF\ncat /tmp/soc_operations.txt"
  answer_detail: 'SOC 운영 절차는 Monitor→Detect→Triage→Respond→Report의 5단계로 구성한다. 각 단계에 명확한 SLA(P1: 15분, P2: 1시간)를 설정하고, 자동화(SIEM), 반자동(이상 탐지), 수동(위협 헌팅)을 결합한다.'
  verify:
    type: output_contains
    expect: SOC Operations
  script: 'alerts = await agent.monitor("보안 이벤트 수집 및 분석")

    response = await agent.respond(alerts, "탐지된 위협에 대한 최적 대응 조치를 실행하라")

    await agent.log(response, "방어 조치 기록")'
- order: 2
  instruction: Wazuh SIEM의 에이전트 연결 상태를 확인하라. 모든 모니터링 대상 서버의 에이전트가 정상적으로 데이터를 전송하는지 점검하라.
  hint: Wazuh API 또는 agent_control로 에이전트 상태를 조회한다.
  category: defense
  points: 10
  answer: ssh 10.20.30.100 '/var/ossec/bin/agent_control -l 2>/dev/null || /var/ossec/bin/manage_agents -l 2>/dev/null' 2>&1 | head -20; echo '---'; echo 'Expected agents:'; echo '  001 - opsclaw (10.20.30.201)
    - Control plane'; echo '  002 - secu (10.20.30.1) - Security server'; echo '  003 - web (10.20.30.80) - Web server'
  answer_detail: SOC의 첫 번째 임무는 모니터링 커버리지를 확인하는 것이다. Wazuh 에이전트의 연결 상태(Active/Disconnected)를 점검하여 모든 서버가 SIEM에 로그를 전송하는지 확인한다. Disconnected 에이전트는 보안 사각지대를 형성한다.
  verify:
    type: output_contains
    expect: agents
  script: 'alerts = await agent.monitor("보안 이벤트 수집 및 분석")

    response = await agent.respond(alerts, "탐지된 위협에 대한 최적 대응 조치를 실행하라")

    await agent.log(response, "방어 조치 기록")'
- order: 3
  instruction: SIEM 탐지 규칙을 검토하고 강화하라. 현재 Wazuh의 활성 규칙 수를 확인하고, 추가 필요한 커스텀 규칙을 작성하라.
  hint: Wazuh 규칙 디렉토리에서 활성 규칙 수를 세고, 미비점을 보완한다.
  category: defense
  points: 10
  answer: "ssh 10.20.30.100 'ls /var/ossec/ruleset/rules/*.xml 2>/dev/null | wc -l; echo \"Custom rules:\"; ls /var/ossec/etc/rules/local_rules.xml 2>/dev/null && wc -l /var/ossec/etc/rules/local_rules.xml'\
    \ 2>&1; echo '---'; cat > /tmp/soc_custom_rules.xml << 'EOF'\n<group name=\"soc_enhanced\">\n  <rule id=\"100300\" level=\"14\">\n    <if_group>authentication_failed</if_group>\n    <match>admin|root|administrator</match>\n\
    \    <description>SOC: Admin account brute force attempt</description>\n    <mitre><id>T1110</id></mitre>\n  </rule>\n  <rule id=\"100301\" level=\"12\" frequency=\"5\" timeframe=\"60\">\n    <if_matched_group>web_attack</if_matched_group>\n\
    \    <description>SOC: Sustained web attack (5+ in 60s)</description>\n    <mitre><id>T1190</id></mitre>\n  </rule>\n  <rule id=\"100302\" level=\"15\">\n    <if_sid>554</if_sid>\n    <match>shadow|passwd|sudoers</match>\n\
    \    <description>SOC: Critical file modification detected</description>\n    <mitre><id>T1003</id></mitre>\n  </rule>\n</group>\nEOF\ncat /tmp/soc_custom_rules.xml"
  answer_detail: SOC 탐지 규칙 검토에서는 기존 규칙 커버리지를 확인하고 Gap을 보완한다. 관리자 계정 브루트포스(T1110), 지속적 웹 공격(T1190), 중요 파일 수정(T1003)에 대한 커스텀 규칙을 추가하여 탐지 범위를 확장한다.
  verify:
    type: output_contains
    expect: soc_enhanced
  script: 'alerts = await agent.monitor("보안 이벤트 수집 및 분석")

    response = await agent.respond(alerts, "탐지된 위협에 대한 최적 대응 조치를 실행하라")

    await agent.log(response, "방어 조치 기록")'
- order: 4
  instruction: 네트워크 방어 상태를 점검하라. Suricata IPS 규칙, nftables 방화벽, BunkerWeb WAF의 현재 상태를 종합적으로 확인하라.
  hint: 각 방어 계층의 규칙 수, 최종 업데이트 시점, 차단 통계를 확인한다.
  category: defense
  points: 10
  answer: 'echo ''=== Defense Layer Status ==='' && echo ''[1] Suricata IPS:'' && ssh 10.20.30.1 ''suricatasc -c ruleset-reload-rules 2>/dev/null; cat /var/log/suricata/stats.log 2>/dev/null | tail -5''
    2>&1 | head -5 && echo '''' && echo ''[2] nftables Firewall:'' && ssh 10.20.30.1 ''nft list ruleset 2>/dev/null | wc -l; nft list ruleset 2>/dev/null | grep -c drop'' 2>&1 && echo '''' && echo ''[3]
    WAF (BunkerWeb):'' && ssh 10.20.30.80 ''cat /var/log/bunkerweb/error.log 2>/dev/null | tail -3 || echo WAF status check'' 2>&1 && echo '''' && echo ''Defense layers: IPS + Firewall + WAF = 3-tier protection'''
  answer_detail: SOC는 다층 방어 체계의 상태를 주기적으로 점검한다. Suricata IPS(네트워크 탐지/차단), nftables(방화벽 규칙), BunkerWeb WAF(웹 공격 방어)의 3계층이 정상 동작하는지 확인하고, 규칙 업데이트 상태와 차단 통계를 검토한다.
  verify:
    type: output_contains
    expect: Defense Layer Status
  script: 'alerts = await agent.monitor("보안 이벤트 수집 및 분석")

    response = await agent.respond(alerts, "탐지된 위협에 대한 최적 대응 조치를 실행하라")

    await agent.log(response, "방어 조치 기록")'
- order: 5
  instruction: 인시던트 대응(IR) 플레이북을 작성하라. SQL Injection 공격 탐지 시의 구체적인 대응 절차를 문서화하라.
  hint: 탐지 확인 → 격리 → 증거 수집 → 분석 → 복구 → 보고의 단계로 작성한다.
  category: response
  points: 10
  answer: "cat > /tmp/ir_playbook_sqli.txt << 'EOF'\n=== IR Playbook: SQL Injection Attack ===\nPlaybook ID: IR-WEB-001 | Severity: CRITICAL\n\nTRIGGER: Wazuh rule 100301 or Suricata SID 1000001\n\nStep\
    \ 1: CONFIRM (2 min)\n  - Review alert details (source IP, payload, target URL)\n  - Check WAF logs for matching request\n  - Verify: Is this a true positive?\n\nStep 2: CONTAIN (5 min)\n  - Block source\
    \ IP: nft add element inet filter blocklist { SRC_IP }\n  - Enable WAF paranoia level 3 (strict mode)\n  - Notify SOC lead via Slack #security-incidents\n\nStep 3: COLLECT EVIDENCE (10 min)\n  - Export\
    \ WAF access logs: last 1 hour\n  - Export Suricata eve.json: last 1 hour\n  - Snapshot database state (if accessible)\n  - Record: Source IP, User-Agent, payload, response codes\n\nStep 4: ANALYZE\
    \ (20 min)\n  - Determine: Was injection successful?\n  - Check: Were any records extracted?\n  - Identify: All affected endpoints\n  - Timeline: First attempt to last attempt\n\nStep 5: REMEDIATE (30\
    \ min)\n  - Patch vulnerable endpoint (parameterized queries)\n  - Rotate database credentials if accessed\n  - Update WAF rules for new payload patterns\n\nStep 6: REPORT\n  - Incident report to management\n\
    \  - Update IOC database\n  - Lessons learned meeting\nEOF\ncat /tmp/ir_playbook_sqli.txt"
  answer_detail: IR 플레이북은 특정 인시던트 유형에 대한 단계별 대응 절차를 정의한다. SQL Injection 플레이북은 확인(2분)→격리(5분)→증거수집(10분)→분석(20분)→수정(30분)→보고의 6단계로, 총 ~67분 내 대응을 완료하는 것이 목표이다.
  verify:
    type: output_contains
    expect: IR Playbook
  script: 'incident = await agent.detect("인시던트 탐지 및 분류")

    actions = await agent.contain(incident, "격리 및 증거 수집")

    await agent.report(actions, "대응 결과 보고")'
- order: 6
  instruction: SOAR(Security Orchestration, Automation and Response)를 구현하라. 알림 발생 시 자동으로 IP 차단, 증거 수집, Slack 알림을 수행하는 자동화 스크립트를 작성하라.
  hint: Python 스크립트로 Wazuh API → nftables → Slack 연동을 구현한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/soar_automation.sh << ''SCRIPT''

    #!/bin/bash

    # SOAR Automation: Alert → Block → Collect → Notify

    ALERT_IP=$1

    ALERT_DESC=$2

    TIMESTAMP=$(date -u ''+%Y-%m-%dT%H:%M:%SZ'')


    echo "=== SOAR Automation Triggered ==="

    echo "Time: $TIMESTAMP"

    echo "Source IP: ${ALERT_IP:-10.99.99.99}"

    echo "Description: ${ALERT_DESC:-SQL Injection detected}"


    # Phase 1: Block

    echo "[BLOCK] nft add element inet filter blocklist { $ALERT_IP }"


    # Phase 2: Collect

    echo "[COLLECT] Saving evidence to /evidence/$TIMESTAMP/"

    echo "  - Network connections from $ALERT_IP"

    echo "  - WAF logs matching $ALERT_IP"

    echo "  - Suricata alerts for $ALERT_IP"


    # Phase 3: Notify

    echo "[NOTIFY] Slack message to #security-incidents:"

    echo "  :rotating_light: Security Alert"

    echo "  IP: $ALERT_IP | $ALERT_DESC"

    echo "  Action: IP blocked, evidence collected"

    echo "  Review: /evidence/$TIMESTAMP/"


    echo "SOAR automation completed in <10 seconds"

    SCRIPT

    bash /tmp/soar_automation.sh'
  answer_detail: SOAR 자동화는 알림 발생부터 차단, 증거 수집, 알림 전송까지를 10초 이내에 자동 실행한다. 수동 대응(수십 분)에 비해 극적으로 빠른 대응이 가능하며, 인간의 판단이 필요한 경우는 Slack으로 에스컬레이션한다.
  verify:
    type: output_contains
    expect: SOAR Automation
  script: 'alerts = await agent.monitor("보안 이벤트 수집 및 분석")

    response = await agent.respond(alerts, "탐지된 위협에 대한 최적 대응 조치를 실행하라")

    await agent.log(response, "방어 조치 기록")'
- order: 7
  instruction: 파일 무결성 모니터링(FIM)을 설정하라. 핵심 시스템 파일의 변경을 실시간으로 감지하는 FIM 정책을 구성하라.
  hint: Wazuh의 syscheck 설정으로 FIM 대상 디렉토리를 지정한다.
  category: defense
  points: 10
  answer: "cat > /tmp/fim_config.xml << 'EOF'\n<!-- Wazuh FIM Configuration (syscheck) -->\n<syscheck>\n  <disabled>no</disabled>\n  <frequency>600</frequency>\n  <alert_new_files>yes</alert_new_files>\n\
    \n  <!-- Critical system files -->\n  <directories check_all=\"yes\" realtime=\"yes\">/etc/passwd,/etc/shadow,/etc/sudoers</directories>\n  <directories check_all=\"yes\" realtime=\"yes\">/etc/ssh/sshd_config</directories>\n\
    \  <directories check_all=\"yes\" realtime=\"yes\">/etc/crontab</directories>\n  <directories check_all=\"yes\" report_changes=\"yes\">/var/spool/cron/crontabs</directories>\n\n  <!-- Web application\
    \ files -->\n  <directories check_all=\"yes\" realtime=\"yes\">/var/www</directories>\n\n  <!-- Systemd services -->\n  <directories check_all=\"yes\" realtime=\"yes\">/etc/systemd/system</directories>\n\
    \n  <!-- Ignore false positive paths -->\n  <ignore>/etc/mtab</ignore>\n  <ignore>/etc/resolv.conf</ignore>\n  <ignore type=\"sregex\">.swp$|.swx$|~$</ignore>\n</syscheck>\nEOF\ncat /tmp/fim_config.xml"
  answer_detail: FIM(File Integrity Monitoring)은 핵심 파일의 변경을 실시간으로 감지하여 Persistence, Credential Access, Configuration Tampering을 탐지한다. realtime=yes로 실시간 감시를 활성화하고, report_changes=yes로 변경 내용을 기록한다. ignore로
    오탐을 줄인다.
  verify:
    type: output_contains
    expect: syscheck
  script: 'alerts = await agent.monitor("보안 이벤트 수집 및 분석")

    response = await agent.respond(alerts, "탐지된 위협에 대한 최적 대응 조치를 실행하라")

    await agent.log(response, "방어 조치 기록")'
- order: 8
  instruction: 로그 수집 및 보관 정책을 수립하라. 모든 보안 관련 로그의 수집, 중앙화, 보관 기간을 정의하라.
  hint: 로그 소스, 전송 방법, 보관 기간, 압축/암호화를 포함한다.
  category: defense
  points: 10
  answer: "cat > /tmp/log_retention_policy.txt << 'EOF'\n=== Log Collection & Retention Policy ===\n\n| Log Source | Server | Transport | Retention | Format |\n|-----------|--------|-----------|-----------|--------|\n\
    | auth.log | All | Wazuh agent | 1 year | Syslog |\n| syslog | All | Wazuh agent | 6 months | Syslog |\n| Suricata eve.json | secu | Filebeat | 1 year | JSON |\n| WAF access.log | web | Wazuh agent\
    \ | 1 year | CLF |\n| Wazuh alerts | siem | Local | 2 years | JSON |\n| nftables log | secu | Wazuh agent | 6 months | Syslog |\n| audit.log | All | Wazuh agent | 1 year | Audit |\n\nStorage: /var/ossec/logs/archives\
    \ (SIEM server)\nCompression: gzip after 7 days\nEncryption: AES-256 for archived logs\nBackup: Daily to separate storage\n\nCompliance:\n  - GDPR: Personal data in logs anonymized after 90 days\n \
    \ - PCI-DSS: 1 year minimum for security logs\n  - ISO 27001: As defined in ISMS policy\nEOF\ncat /tmp/log_retention_policy.txt"
  answer_detail: 로그 보관 정책은 수집(모든 보안 로그), 전송(Wazuh agent, Filebeat), 보관(6개월~2년), 보호(압축, 암호화, 백업)를 체계적으로 정의한다. 규정 준수(GDPR, PCI-DSS, ISO 27001)를 고려하여 보관 기간과 개인정보 처리를 규정한다.
  verify:
    type: output_contains
    expect: Log Collection
  script: 'alerts = await agent.monitor("보안 이벤트 수집 및 분석")

    response = await agent.respond(alerts, "탐지된 위협에 대한 최적 대응 조치를 실행하라")

    await agent.log(response, "방어 조치 기록")'
- order: 9
  instruction: 보안 지표(KPI) 대시보드를 설계하라. SOC 성과를 측정하는 핵심 지표를 정의하고 수집 방법을 구성하라.
  hint: MTTD, MTTR, 알림 수, 오탐률 등의 SOC KPI를 정의한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/soc_kpi_dashboard.txt << 'EOF'\n=== SOC KPI Dashboard ===\n\nOperational Metrics:\n  | KPI | Target | Current | Status |\n  |-----|--------|---------|--------|\n  | MTTD (Mean Time\
    \ to Detect) | <15 min | 12 min | OK |\n  | MTTR (Mean Time to Respond) | <60 min | 45 min | OK |\n  | MTTC (Mean Time to Contain) | <30 min | 25 min | OK |\n  | Alert Volume | <500/day | 320/day |\
    \ OK |\n  | False Positive Rate | <10% | 8% | OK |\n  | Ticket Closure Rate | >90% | 88% | WARN |\n\nCoverage Metrics:\n  | Metric | Target | Current |\n  |--------|--------|---------|\n  | Host Monitoring\
    \ | 100% | 100% (4/4) |\n  | Log Sources | >10 | 8 |\n  | MITRE Coverage | >60% | 55% |\n  | Rule Count | >500 | 480 |\n\nTrend: All KPIs improving month-over-month\nAction: Increase MITRE coverage\
    \ to 60% by adding 5 detection rules\nEOF\ncat /tmp/soc_kpi_dashboard.txt"
  answer_detail: SOC KPI는 운영(MTTD, MTTR, MTTC, 알림량, 오탐률)과 커버리지(호스트 모니터링, 로그 소스, ATT&CK 커버리지)의 두 축으로 측정한다. 목표 대비 현재 상태를 추적하고, 미달 지표에 대한 개선 계획을 수립한다.
  verify:
    type: output_contains
    expect: SOC KPI
  script: 'data = await agent.collect("분석 데이터 수집")

    analysis = await agent.analyze(data, "보안 지표(KPI) 대시보드를 설계하라. SOC 성과를 측정하는 핵심 지표를 정의하고 수집 방법을 구성하라.")

    await agent.report(analysis, "분석 보고서 생성")'
- order: 10
  instruction: 실시간 공격에 대한 인시던트 대응을 시뮬레이션하라. 외부에서 웹 서버로의 공격이 발생한 상황을 가정하고, IR 플레이북에 따라 대응하라.
  hint: 공격 탐지→확인→격리→증거수집의 순서로 대응한다.
  category: response
  points: 10
