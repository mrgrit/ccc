  instruction: '[BLUE] Suricata로 공급망 공격 관련 네트워크 시그니처를 탐지하는 규칙을 작성하라. 비인가 외부 연결, 비정상 업데이트 트래픽을 탐지하라.'
  hint: 내부 서버에서 비인가 외부 IP로의 연결을 탐지한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata로 공급망 공격 관련 네트워크 시그니처를 탐지하는 규칙을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/supply_chain_detection.rules << ''EOF'' # Supply chain attack indicators alert
    http 10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Web server unexpected outbound HTTP";
    flow:to_server,established; sid:6000001; rev:1;) alert tls 10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN:
    Web server unexpected outbound TLS"; flow:to_server,established; sid:6000002; rev:1;) alert http any
    any -> 10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Suspicious update URL pattern"; flow:to_server,established;
    content:"/update-check"; http.uri; sid:6000003; rev:1;) EOF cat /tmp/supply_chain_detection.rules'
  answer_detail: 공급망 공격 탐지에서 웹 서버의 비인가 아웃바운드 연결(ProxyPass를 통한 C2), 의심스러운 업데이트 URL 패턴을 Suricata로 탐지한다.
    웹 서버는 일반적으로 아웃바운드 연결을 하지 않는다.
  verify:
    type: output_contains
    expect: SUPPLY-CHAIN
