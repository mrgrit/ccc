  script: 'cat > /tmp/supply_chain_detection.rules << ''EOF'' # Supply chain attack indicators alert http
    10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Web server unexpected outbound HTTP"; flow:to_server,established;
    sid:6000001; rev:1;) alert tls 10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Web server
    unexpected outbound TLS"; flow:to_server,established; sid:6000002; rev:1;) alert http any any -> 10.20.30.0/24
    any (msg:"SUPPLY-CHAIN: Suspicious update URL pattern"; flow:to_server,established; content:"/update-check";
    http.uri; sid:6000003; rev:1;) EOF cat /tmp/supply_chain_detection.rules'
