  bastion_prompt: '[BLUE] Phase 전환 — FIM(File Integrity Monitoring)을 설정하라. 웹 서버 설정, 시스템 바이너리, crontab에
    대한 Wazuh syscheck 규칙을 작성하라.'
- order: 4
  instruction: '[BLUE] 패키지 무결성 검증 스크립트를 작성하라. dpkg --verify로 시스템 패키지의 변조를 탐지하고, 핵심 바이너리의 해시를 검증하라.'
  hint: dpkg --verify와 sha256sum으로 무결성을 검증한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 패키지 무결성 검증 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo "=== Package Integrity Verification ===" && echo "[1] dpkg verify (modified packages):"
    && dpkg --verify 2>/dev/null | head -10 || echo "  dpkg verify not available" && echo "[2] Critical
    binary hashes:" && for bin in /usr/bin/ssh /usr/bin/curl /usr/bin/python3; do if [ -f "$bin" ]; then
    echo "  $(sha256sum $bin)"; fi; done && echo "[3] Baseline comparison:" && echo "  Store hashes in
    /etc/security/baseline_hashes.txt" && echo "  Compare daily with: sha256sum -c baseline_hashes.txt"
    && echo "Package integrity check complete"'
  answer_detail: 패키지 무결성 검증은 공급망 공격으로 변조된 바이너리를 탐지한다. dpkg --verify는 설치된 패키지의 해시를 검증하고, 핵심 바이너리의 SHA256을
    기준선과 비교한다.
  verify:
    type: output_contains
    expect: Package Integrity
    semantic:
      intent: '[BLUE] 공급망 공격 시나리오 방어·탐지 단계 — 탐지 규칙·모니터링·대응 체계 구현'
