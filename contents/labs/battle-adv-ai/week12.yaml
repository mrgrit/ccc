  risk_level: medium
  bastion_prompt: '[RED] 웹 서비스 변조 시뮬레이션 — /tmp에 변조된 웹 설정 파일을 생성해줘'
- order: 3
  instruction: '[BLUE] Phase 전환 — FIM(File Integrity Monitoring)을 설정하라. 웹 서버 설정, 시스템 바이너리, crontab에 대한
    Wazuh syscheck 규칙을 작성하라.'
  hint: Wazuh syscheck으로 critical 파일의 변경을 실시간 감시한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Phase 전환 — FIM(File Integrity Monitoring)을 설정하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/fim_supply_chain.xml << ''EOF'' <syscheck> <disabled>no</disabled> <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files> <!-- Web server configs --> <directories check_all="yes" realtime="yes"
    report_changes="yes">/etc/apache2,/etc/nginx</directories> <!-- System binaries --> <directories check_all="yes"
    realtime="yes">/usr/bin,/usr/sbin,/usr/local/bin</directories> <!-- Cron and systemd --> <directories
    check_all="yes" realtime="yes">/etc/crontab,/var/spool/cron,/etc/systemd/system</directories> <!--
    Package manager --> <directories check_all="yes" realtime="yes">/etc/apt/sources.list.d</directories>
    <!-- Ignore false positives --> <ignore type="sregex">.swp$|.swx$|~$</ignore> </syscheck> EOF cat
    /tmp/fim_supply_chain.xml'
  answer_detail: FIM은 공급망 공격에서 변조된 파일을 탐지하는 핵심 방어이다. 웹 서버 설정, 시스템 바이너리, 크론, 패키지 소스를 실시간 감시하고 변경 내용을 보고한다.
  verify:
    type: output_contains
    expect: syscheck
    semantic:
      intent: '[BLUE] 공급망 공격 시나리오 방어·탐지 단계 — 탐지 규칙·모니터링·대응 체계 구현'
      success_criteria:
      - Suricata/Wazuh/auditd/nftables 등 방어 도구 룰·설정 제시
      - 탐지 시나리오 테스트 및 결과 로그
      - false positive 또는 tuning 고려 언급
      acceptable_methods:
      - 실제 도구(nmap/msfvenom/sqlmap/hydra/curl/ssh) 실행
      - 방어 규칙 파일(.rules/XML) 작성 또는 편집
      - Python 스크립트로 자동화 구현
      - SSH 로 대상 VM 접속 후 명령 실행
      negative_signs:
      - 실행 없이 개념만 서술
      - 결과 확인·로그 수집 누락
      - RED/BLUE 역할 특성 무시한 일반 응답
  target_vm: siem
  script: cat > /tmp/fim_supply_chain.xml << 'EOF' <syscheck> <disabled>no</disabled> <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files> <!-- Web server configs --> <directories check_all="yes" realtime="yes"
    report_changes="yes">/etc/apache2,/etc/nginx</directories> <!-- System binaries --> <directories check_all="yes"
    realtime="yes">/usr/bin,/usr/sbin,/usr/local/bin</directories> <!-- Cron and systemd --> <directories
    check_all="yes" realtime="yes">/etc/crontab,/var/spool/cron,/etc/systemd/system</directories> <!--
    Package manager --> <directories check_all="yes" realtime="yes">/etc/apt/sources.list.d</directories>
    <!-- Ignore false positives --> <ignore type="sregex">.swp$|.swx$|~$</ignore> </syscheck> EOF cat
    /tmp/fim_supply_chain.xml
