- order: 6
  instruction: DNS 기반 유출을 탐지하기 위한 분석을 수행하라. DNS 쿼리 로그에서 비정상 패턴(높은 엔트로피, 긴 도메인, 높은 빈도)을 식별하는 스크립트를 작성하라.
  hint: Shannon 엔트로피 계산으로 인코딩된 DNS 쿼리를 탐지한다.
  category: defense
  points: 10
  answer: "python3 -c \"\nimport math\nfrom collections import Counter\n\ndef shannon_entropy(s):\n    freq = Counter(s)\n    length = len(s)\n    return -sum((count/length) * math.log2(count/length) for\
    \ count in freq.values())\n\nqueries = [\n    'www.google.com',\n    'mail.example.org',\n    'U2VjcmV0X0V4Zml.seq0.exfil.test.local',\n    'bERhdGFfMjAyNg.seq1.exfil.test.local',\n    'update.microsoft.com',\n\
    \    'YWJjZGVmZ2hpamts.seq2.exfil.test.local',\n]\nprint('=== DNS Exfiltration Detection via Entropy ===')\nprint(f'{\"Query\":<50} {\"Length\":>6} {\"Entropy\":>8} {\"Suspicious\":>10}')\nprint('-'\
    \ * 80)\nfor q in queries:\n    e = shannon_entropy(q.split('.')[0])\n    l = len(q)\n    suspicious = 'YES' if e > 3.5 and l > 30 else 'NO'\n    print(f'{q:<50} {l:>6} {e:>8.2f} {suspicious:>10}')\n\
    print()\nprint('Threshold: Entropy > 3.5 AND Length > 30 → Suspicious')\n\""
  answer_detail: DNS 유출 탐지의 핵심은 Shannon 엔트로피 분석이다. 정상 도메인(www.google.com)은 엔트로피가 낮고(~2.5), base64 인코딩된 유출 쿼리는 엔트로피가 높다(>3.5). 쿼리 길이와 엔트로피를 결합하면 DNS 터널링을 높은 정확도로 탐지할 수 있다.
  verify:
