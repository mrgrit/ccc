- order: 4
  instruction: 스테가노그래피를 이용한 데이터 은닉을 시뮬레이션하라. 이미지 파일의 LSB(Least Significant Bit)에 데이터를 숨기는 원리를 분석하라.
  hint: Python으로 간단한 LSB 스테가노그래피 시뮬레이션을 작성한다.
  category: exploit
  points: 10
  answer: 'python3 -c "

    import struct

    # LSB Steganography Simulation

    data = ''SECRET_EXFIL_DATA''

    binary_data = ''''.join(format(ord(c), ''08b'') for c in data)

    print(''=== LSB Steganography Simulation ==='')

    print(f''Original data: {data}'')

    print(f''Binary representation: {binary_data[:40]}...'')

    print(f''Bits needed: {len(binary_data)}'')

    print(f''Pixels needed (RGB): {len(binary_data) // 3 + 1}'')

    print(f''Min image size: ~{len(binary_data) // 3 + 1} pixels (e.g., 4x4 PNG)'')

    print()

    print(''LSB embedding example:'')

    print(''Original pixel: R=142(10001110) G=87(01010111) B=203(11001011)'')

    print(''With hidden bit 1,0,1: R=143(10001111) G=86(01010110) B=203(11001011)'')

    print(''Change: invisible to human eye (1-bit difference per channel)'')

    print()

    print(f''Capacity: 1920x1080 image = {1920*1080*3//8:,} bytes hidden data'')

    "'
  answer_detail: 스테가노그래피(T1001.002)는 정상 파일(이미지, 오디오)에 데이터를 은닉하는 기법이다. LSB 방식은 각 픽셀의 최하위 비트를 변경하여 데이터를 숨기며, 1비트 변화는 육안으로 구분할 수 없다. 1920x1080 이미지에 약 760KB의 데이터를 숨길 수 있다.
