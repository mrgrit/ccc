lab_id: battle-adv-ai-week05
title: 데이터 유출 기법 — Exfiltration over DNS/HTTPS (AI 지원)
version: ai
course: battle-adv-ai
week: 5
description: 데이터 유출(Exfiltration) 기법을 심층 분석한다. DNS, HTTPS, 스테가노그래피, 암호화 채널 등 다양한 유출 경로와 이에 대한 탐지 및 DLP(Data Loss Prevention) 전략을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- DNS 기반 데이터 유출 기법의 원리와 구현을 이해한다
- HTTPS를 이용한 암호화 채널 유출 기법을 실습한다
- DLP 시스템의 탐지 원리와 우회 기법을 분석한다
- 데이터 유출 탐지 및 차단 전략을 수립한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 유출 대상이 될 민감 데이터를 시뮬레이션으로 생성하라. 가짜 고객 정보(이름, 이메일, 카드번호)를 100건 생성하라.
  hint: Python의 faker 또는 간단한 스크립트로 가짜 데이터를 생성한다.
  category: recon
  points: 10
  answer: "python3 -c \"\nimport random, string, hashlib\nwith open('/tmp/sensitive_data.csv', 'w') as f:\n    f.write('name,email,card_number,ssn\\n')\n    for i in range(100):\n        name = f'User_{i:03d}'\n\
    \        email = f'user{i}@example.com'\n        card = '4' + ''.join([str(random.randint(0,9)) for _ in range(15)])\n        ssn = f'{random.randint(100,999)}-{random.randint(10,99)}-{random.randint(1000,9999)}'\n\
    \        f.write(f'{name},{email},{card},{ssn}\\n')\nprint('Generated 100 fake records')\n\" && wc -l /tmp/sensitive_data.csv"
  answer_detail: 데이터 유출 실습을 위해 가짜 민감 데이터(PII)를 생성한다. 실제 데이터를 사용하면 안 되므로, 형식은 실제와 동일하지만 가짜인 데이터를 사용한다. 카드번호(16자리), SSN(XXX-XX-XXXX) 형식은 DLP 규칙 테스트에 활용된다.
  verify:
    type: output_contains
    expect: 100 fake records
  target_vm: attacker
  script: "python3 -c \"\nimport random, string, hashlib\nwith open('/tmp/sensitive_data.csv', 'w') as f:\n    f.write('name,email,card_number,ssn\\n')\n    for i in range(100):\n        name = f'User_{i:03d}'\n\
