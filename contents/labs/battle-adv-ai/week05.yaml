      - stat 로 이전/이후 비교
      - wipe 대체 도구
      - bleachbit 로 자동화
      negative_signs:
      - 단일 기법만
      - T1070 매핑 없음
      - 실제 로그 삭제 (테스트 환경이라도 위험)
  target_vm: attacker
  script: 'echo "anti-forensic test" > /tmp/af_test.txt && touch -t 202301010000 /tmp/af_test.txt
