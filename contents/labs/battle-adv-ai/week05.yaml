        Min-jun·Lee Ji-hoon)·이메일(user@example.com)·카드번호(4XXX-XXXX-XXXX-XXXX Luhn 형식)
        100 rows CSV /tmp/sensitive_data.csv 저장. 유출 실습 대상 데이터 준비. 실제 PII 아닌 합성'
