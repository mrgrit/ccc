    \ > 30')\n\""
  risk_level: low
  bastion_prompt: secu VM(보안게이트웨이)에서 python3 스크립트로 [BLUE] Phase 전환 — DNS 유출을 탐지하기
    위한 Shannon 엔트로피 분석 스크립트 작업을 수행해줘
- order: 6
  instruction: '[BLUE] DLP(Data Loss Prevention) 규칙을 작성하라. 신용카드 번호, SSN, 이메일 대량 전송을
    탐지하는 정규식 기반 DLP 규칙을 구현하라.'
  hint: 정규식으로 PII 패턴을 정의하고 임계값을 설정한다.
  category: defense
  points: 10
  answer: "python3 -c \"\nimport re\nrules = {\n    'credit_card': r'\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14})\\\
    b',\n    'ssn': r'\\b\\d{3}-\\d{2}-\\d{4}\\b',\n    'email_bulk': r'[\\w.+-]+@[\\\
    w-]+\\.[\\w.-]+',\n}\nwith open('/tmp/sensitive_data.csv') as f:\n    content\
    \ = f.read()\nprint('=== DLP Rule Analysis ===')\nfor name, pattern in rules.items():\n\
    \    matches = re.findall(pattern, content)\n    severity = 'CRITICAL' if len(matches)\
    \ > 10 else 'WARNING' if len(matches) > 0 else 'OK'\n    print(f'Rule: {name:<15}\
    \ Matches: {len(matches):>5}  Severity: {severity}')\n    if matches:\n      \
    \  print(f'  Sample: {matches[0]}')\nprint('DLP Action: BLOCK transfer - 100+\
    \ PII records detected')\n\""
  answer_detail: DLP는 정규식으로 민감 데이터(PII)를 식별하고 유출을 차단한다. 카드번호, SSN, 이메일 패턴을 매칭하고 임계값
