  bastion_prompt: '[RED] HTTPS와 ICMP를 이용한 멀티채널 유출을 시뮬레이션해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: '[BLUE] Phase 전환 — DNS 유출을 탐지하기 위한 Shannon 엔트로피 분석 스크립트를 작성하라. 엔트로피
    3.5 이상이고 길이 30 이상인 쿼리를 의심 대상으로 판정하라.'
  hint: Python으로 Shannon 엔트로피를 계산하고 정상/비정상 쿼리를 비교한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] Phase 전환 — DNS 유출을 탐지하기 위한 Shannon 엔트로피 분석 스크립트를\
    \ 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): python3 -c \"\nimport math\nfrom\
    \ collections import Counter\ndef shannon_entropy(s):\n    freq = Counter(s)\n\
    \    length = len(s)\n    return -sum((count/length) * math.log2(count/length)\
    \ for count in freq.values())\nqueries = [\n    'www.google.com',\n    'mail.example.org',\n\
    \    'U2VjcmV0X0V4Zml.seq0.exfil.test.local',\n    'YWJjZGVmZ2hpamts.seq2.exfil.test.local',\n\
    \    'update.microsoft.com',\n]\nprint('=== DNS Exfiltration Detection via Entropy\
    \ ===')\nprint(f'{chr(34)+\"Query\"+chr(34):<50} {\"Length\":>6} {\"Entropy\"\
    :>8} {\"Suspicious\":>10}')\nfor q in queries:\n    e = shannon_entropy(q.split('.')[0])\n\
    \    l = len(q)\n    suspicious = 'YES' if e > 3.5 and l > 30 else 'NO'\n    print(f'{q:<50}\
    \ {l:>6} {e:>8.2f} {suspicious:>10}')\nprint('Threshold: Entropy > 3.5 AND Length\
    \ > 30')\n\""
  answer_detail: 정상 도메인은 엔트로피가 낮고(~2.5), base64 인코딩된 유출 쿼리는 엔트로피가 높다(>3.5). 쿼리 길이와
    엔트로피를 결합하면 DNS 터널링을 높은 정확도로 탐지할 수 있다.
  verify:
    type: output_contains
    expect: DNS Exfiltration Detection
    semantic:
      intent: '[BLUE] Shannon 엔트로피 DNS 유출 탐지 — python3 로 DNS 쿼리 서브도메인 추출 + Shannon
        entropy 계산 H(X) = -Σ p(x) log2(p(x)). 엔트로피 > 3.5 (정상 도메인은 2-3 수준) + 쿼리 길이
        > 50 (정상 30 미만) 임계치 조합. base64/랜덤 embedding DNS 유출 탐지. pcap 또는 eve.json 실시간
        분석'
      success_criteria:
      - python Shannon entropy 계산 함수
      - 엔트로피 > 3.5 + 길이 > 50 임계치
      - DNS 유출 통계 탐지 개념
      acceptable_methods:
      - python math.log2 + Counter
      - scipy.stats.entropy
      - Zeek dns.log + 외부 스크립트
      - splunk stats avg/stdev
      negative_signs:
      - 엔트로피 개념 없음
      - 단순 키워드 매칭
      - 임계치 없음
  target_vm: secu
  script: "python3 -c \"\nimport math\nfrom collections import Counter\ndef shannon_entropy(s):\n\
    \    freq = Counter(s)\n    length = len(s)\n    return -sum((count/length) *\
