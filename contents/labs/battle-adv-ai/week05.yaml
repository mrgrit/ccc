  answer: "cat > /tmp/multichannel_exfil.txt << 'EOF'\n=== Multi-Channel Exfiltration Simulation ===\n\nData: /tmp/sensitive_data.csv (100 records)\nSplit: 3 chunks for parallel exfiltration\n\nChannel\
