  instruction: HTTPS 유출을 탐지하기 위한 TLS 검사 전략을 수립하라. SSL/TLS 인터셉트(MITM) 프록시의 설정과 한계를 분석하라.
  hint: mitmproxy 또는 squid SSL bump의 원리와 설정을 정리한다.
  category: defense
  points: 10
  answer: "cat > /tmp/tls_inspection.txt << 'EOF'\n=== TLS Inspection Strategy for HTTPS Exfiltration Detection ===\n\n1. TLS Interception Architecture:\n   Client → Corporate CA Proxy → Internet\n   -\
    \ Proxy generates dynamic cert signed by corporate CA\n   - Corporate CA trusted on all endpoints\n\n2. Implementation (Squid SSL Bump):\n   http_port 3128 ssl-bump cert=/etc/squid/ca.pem\n   ssl_bump\
    \ bump all\n   acl exfil_patterns url_regex -i upload|post|submit\n\n3. Detection Rules:\n   - Large POST requests (>100KB) to unknown domains\n   - High entropy payload content\n   - Connections to\
    \ recently registered domains (<30 days)\n   - Unusual User-Agent strings\n\n4. Limitations:\n   - Certificate pinning breaks inspection (mobile apps, APIs)\n   - Privacy concerns (employee monitoring)\n\
    \   - Performance overhead (CPU for decryption)\n   - HSTS/HPKP may cause errors\n\n5. Alternative: Metadata analysis without decryption\n   - JA3 fingerprint\n   - TLS certificate analysis\n   - Connection\
    \ timing and volume patterns\nEOF\ncat /tmp/tls_inspection.txt"
  answer_detail: TLS 검사(SSL/TLS Interception)는 HTTPS 트래픽의 내용을 검사하여 유출을 탐지하는 방법이다. 프록시가 동적 인증서를 생성하여 MITM 역할을 수행한다. 하지만 Certificate Pinning, 개인정보 문제, 성능 오버헤드 등의 한계가 있어 메타데이터 분석을 병행한다.
