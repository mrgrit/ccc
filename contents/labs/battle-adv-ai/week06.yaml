lab_id: battle-adv-ai-week06
title: 고급 탐지 공학 — Suricata 커스텀 규칙과 Wazuh 활성 응답 (AI 지원)
version: ai
course: battle-adv-ai
week: 6
description: 고급 탐지 공학을 실습한다. Suricata IPS의 커스텀 시그니처 작성, Wazuh Active Response 설정, 실시간 자동 차단 스크립트를 구현하여
  활성 위협에 대한 자동화된 방어 체계를 구축한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- Suricata IPS 커스텀 시그니처를 작성하고 검증한다
- Wazuh Active Response를 설정하여 자동 차단을 구현한다
- 실시간 자동 IP 차단 및 프로세스 모니터링을 구축한다
prerequisites:
- battle-adv-nonai week05 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] Suricata IPS의 동작 상태를 확인하고 현재 규칙 통계를 조회하라.'
  hint: suricatasc 또는 stats.log를 분석하고 eve.json의 최근 이벤트를 확인한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata IPS의 동작 상태를 확인하고 현재 규칙 통계를 조회해줘

    📎 참고 (CLI): ssh 10.20.30.1 ''suricatasc -c uptime 2>/dev/null; cat /var/log/suricata/stats.log 2>/dev/null
    | tail -10; echo "---"; tail -5 /var/log/suricata/eve.json 2>/dev/null | python3 -m json.tool 2>/dev/null
    | head -20'' 2>&1 | head -30'
  answer_detail: Suricata IPS 모드는 네트워크 트래픽을 인라인으로 검사하고 악성 트래픽을 차단한다. stats.log에서 detect.alert, flow.tcp
    등의 카운터를 확인한다.
  verify:
    type: output_contains
    expect: suricata
    semantic:
      intent: '[BLUE] Suricata IPS 동작 상태 + 룰 통계 — systemctl status suricata (프로세스 상태) + suricatasc -c
        iface-stat <iface> (인터페이스 통계) + suricatasc -c ruleset-stats (로드된 룰 수·적중 수). IPS 운영 상태 baseline.
        룰셋 정상 로드 확인'
      success_criteria:
      - systemctl status + suricatasc 명령
      - active 또는 loaded 상태 출력
      - 룰 통계 수치 확인
      acceptable_methods:
      - systemctl status + suricatasc -c rule-stats
      - stats.log + eve.json stats event
      - Wazuh 통합 시 API 조회
      negative_signs:
      - status 없이 프로세스만
      - 룰 통계 누락
      - loaded rules 수 미확인
  target_vm: secu
  script: ssh 10.20.30.1 'suricatasc -c uptime 2>/dev/null; cat /var/log/suricata/stats.log 2>/dev/null
    | tail -10; echo "---"; tail -5 /var/log/suricata/eve.json 2>/dev/null | python3 -m json.tool 2>/dev/null
    | head -20' 2>&1 | head -30
  risk_level: low
  bastion_prompt: '[BLUE] Suricata IPS의 동작 상태를 확인하고 현재 규칙 통계를 조회해줘'
- order: 2
  instruction: '[BLUE] 포트 스캔, NULL 스캔, XMAS 스캔, ICMP 스위프를 탐지하는 Suricata 규칙을 작성하라.'
  hint: flags 옵션과 threshold로 짧은 시간 내 다수 연결 시도를 탐지한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 포트 스캔, NULL 스캔, XMAS 스캔, ICMP 스위프를 탐지하는 Suricata 규칙을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/portscan_detection.rules << ''EOF'' alert tcp any any -> 10.20.30.0/24 any
    (msg:"SCAN: SYN scan detected"; flags:S; threshold:type both, track by_src, count 20, seconds 5; classtype:attempted-recon;
    sid:4000001; rev:1;) alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN: NULL scan detected"; flags:0;
    threshold:type both, track by_src, count 10, seconds 10; classtype:attempted-recon; sid:4000002; rev:1;)
    alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN: XMAS scan detected"; flags:FPU; threshold:type
    both, track by_src, count 10, seconds 10; classtype:attempted-recon; sid:4000003; rev:1;) alert icmp
    any any -> 10.20.30.0/24 any (msg:"SCAN: ICMP sweep detected"; itype:8; threshold:type both, track
    by_src, count 10, seconds 5; classtype:attempted-recon; sid:4000004; rev:1;) EOF cat /tmp/portscan_detection.rules'
  answer_detail: SYN 스캔(S 플래그만), NULL 스캔(플래그 없음), XMAS 스캔(FIN+PSH+URG)을 각각 탐지한다. threshold로 5초 내 20회 이상
    연결 시도를 기준으로 한다.
  verify:
    type: output_contains
    expect: SCAN
    semantic:
      intent: '[BLUE] 스캔 탐지 4종 룰 — alert tcp flags:S,12 (SYN scan 정상) + alert tcp flags:0 (NULL scan 모든
        flag 없음) + alert tcp flags:FPU (XMAS FIN/PSH/URG) + alert icmp itype:8 (ping sweep) + threshold
        기반 빈도 제한. 각 스캔 기법의 고유 packet 특성 활용. /etc/suricata/rules/local.rules 추가'
      success_criteria:
      - 4종 스캔 룰 (SYN/NULL/XMAS/ICMP) 모두
      - 각각 flags 또는 itype 특성
      - threshold 빈도 제한
      acceptable_methods:
      - alert tcp flags 조합 + threshold
      - ET SCAN 룰셋 활용
      - Zeek scan.bro 스크립트
      negative_signs:
      - 스캔 유형 1-2종만
      - flags 조건 없음
      - threshold 없음 (오탐)
  target_vm: secu
  script: 'cat > /tmp/portscan_detection.rules << ''EOF'' alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN:
    SYN scan detected"; flags:S; threshold:type both, track by_src, count 20, seconds 5; classtype:attempted-recon;
    sid:4000001; rev:1;) alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN: NULL scan detected"; flags:0;
    threshold:type both, track by_src, count 10, seconds 10; classtype:attempted-recon; sid:4000002; rev:1;)
    alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN: XMAS scan detected"; flags:FPU; threshold:type
    both, track by_src, count 10, seconds 10; classtype:attempted-recon; sid:4000003; rev:1;) alert icmp
    any any -> 10.20.30.0/24 any (msg:"SCAN: ICMP sweep detected"; itype:8; threshold:type both, track
    by_src, count 10, seconds 5; classtype:attempted-recon; sid:4000004; rev:1;) EOF cat /tmp/portscan_detection.rules'
  risk_level: low
  bastion_prompt: '[BLUE] 포트 스캔, NULL 스캔, XMAS 스캔, ICMP 스위프를 탐지하는 Suricata 규칙을 작성하라.'
- order: 3
  instruction: '[BLUE] fail2ban을 설정하여 SSH 브루트포스 공격을 자동 차단하라. 5분 내 5회 실패 시 30분간 IP를 차단하는 규칙을 작성하라.'
  hint: fail2ban의 jail.local 파일에 sshd jail을 설정한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] fail2ban을 설정하여 SSH 브루트포스 공격을 자동 차단하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/fail2ban_jail.conf << ''EOF'' [DEFAULT] bantime = 1800 findtime = 300 maxretry
    = 5 banaction = nftables-multiport

    [sshd] enabled = true port = ssh filter = sshd logpath = /var/log/auth.log maxretry = 5 findtime =
    300 bantime = 1800

    [suricata] enabled = true filter = suricata logpath = /var/log/suricata/eve.json maxretry = 3 findtime
    = 60 bantime = 3600 EOF cat /tmp/fail2ban_jail.conf'
  answer_detail: fail2ban은 로그 파일을 모니터링하여 반복적인 공격을 자동 차단한다. findtime 내 maxretry 초과 시 bantime만큼 IP를 차단한다.
  verify:
    type: output_contains
    expect: fail2ban
    semantic:
      intent: '[BLUE] fail2ban SSH 자동 차단 — /etc/fail2ban/jail.local 에 [sshd] enabled=true + maxretry=5
        + findtime=300 (5분) + bantime=1800 (30분) + banaction=nftables. 5분 내 5회 실패 시 30분 자동 차단. nftables
        백엔드로 차단. systemctl restart fail2ban 적용'
      success_criteria:
      - jail.local 또는 jail.d/sshd.conf 편집
      - maxretry=5 + findtime=300 + bantime=1800
      - nftables 백엔드 활용
      - fail2ban-client status 확인
      acceptable_methods:
      - /etc/fail2ban/jail.local + systemctl restart
      - fail2ban-client start sshd
      - Wazuh Active Response 대체
      - custom filter regex
      negative_signs:
      - fail2ban 미설정
      - nftables 연동 없음
      - status 확인 누락
  target_vm: secu
  script: 'cat > /tmp/fail2ban_jail.conf << ''EOF'' [DEFAULT] bantime = 1800 findtime = 300 maxretry =
    5 banaction = nftables-multiport

    [sshd] enabled = true port = ssh filter = sshd logpath = /var/log/auth.log maxretry = 5 findtime =
    300 bantime = 1800

    [suricata] enabled = true filter = suricata logpath = /var/log/suricata/eve.json maxretry = 3 findtime
    = 60 bantime = 3600 EOF cat /tmp/fail2ban_jail.conf'
  risk_level: low
  bastion_prompt: '[BLUE] fail2ban을 설정하여 SSH 브루트포스 공격을 자동 차단하라. 5분 내 5회 실패 시 30분간 IP를 차단하는 규칙을 작성하라.'
- order: 4
  instruction: '[BLUE] Wazuh Active Response를 설정하라. 특정 알림 발생 시 자동으로 IP를 차단하는 firewall-drop 명령을 구성하라.'
  hint: ossec.conf의 active-response 섹션에 firewall-drop 명령을 설정한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] Wazuh Active Response를 설정해줘\n\U0001F4CE 참고 (CLI): cat > /tmp/wazuh_active_response.xml\
    \ << 'EOF'\n<ossec_config>\n  <active-response>\n    <command>firewall-drop</command>\n    <location>local</location>\n\
    \    <rules_id>100100,100300</rules_id>\n    <timeout>3600</timeout>\n  </active-response>\n  <active-response>\n\
    \    <command>host-deny</command>\n    <location>local</location>\n    <level>12</level>\n    <timeout>1800</timeout>\n\
    \  </active-response>\n  <command>\n    <name>firewall-drop</name>\n    <executable>firewall-drop</executable>\n\
    \    <timeout_allowed>yes</timeout_allowed>\n  </command>\n</ossec_config>\nEOF\ncat /tmp/wazuh_active_response.xml"
  answer_detail: Wazuh Active Response는 알림 발생 시 자동 대응 액션을 실행한다. firewall-drop은 nftables로 IP를 차단하고, timeout으로
    차단 기간을 설정한다.
  verify:
    type: output_contains
    expect: active-response
    semantic:
      intent: '[BLUE] Wazuh Active Response firewall-drop — /var/ossec/etc/ossec.conf 의 <active-response>
        블록에 <command>firewall-drop</command> + <rules_id>특정 sid</rules_id> + <timeout>600</timeout>. 특정
        Wazuh 룰 매칭 시 10분간 IP 차단 (nftables/iptables 연동). MITRE D3FEND Network Traffic Filtering'
      success_criteria:
      - ossec.conf active-response 블록
      - firewall-drop 명령 + rules_id 매핑
      - timeout 설정 (자동 unban)
      acceptable_methods:
      - ossec.conf + systemctl restart wazuh-manager
      - active-response scripts (/var/ossec/active-response/bin/)
      - agent.conf 분산 설정
      - custom active response 스크립트
      negative_signs:
      - active-response 블록 없음
      - 룰 매핑 없이 모든 경보 차단
      - timeout 없음 (영구 차단)
  target_vm: siem
  script: "cat > /tmp/wazuh_active_response.xml << 'EOF'\n<ossec_config>\n  <active-response>\n    <command>firewall-drop</command>\n\
    \    <location>local</location>\n    <rules_id>100100,100300</rules_id>\n    <timeout>3600</timeout>\n\
    \  </active-response>\n  <active-response>\n    <command>host-deny</command>\n    <location>local</location>\n\
    \    <level>12</level>\n    <timeout>1800</timeout>\n  </active-response>\n  <command>\n    <name>firewall-drop</name>\n\
    \    <executable>firewall-drop</executable>\n    <timeout_allowed>yes</timeout_allowed>\n  </command>\n\
    </ossec_config>\nEOF\ncat /tmp/wazuh_active_response.xml"
  risk_level: low
  bastion_prompt: '[BLUE] Wazuh Active Response를 설정해줘'
- order: 5
  instruction: '[BLUE] 의심스러운 프로세스(리버스 쉘, 암호화폐 채굴, 권한 상승)를 실시간으로 모니터링하는 스크립트를 작성하라.'
  hint: ps aux로 비정상 프로세스 패턴을 주기적으로 검사한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 의심스러운 프로세스(리버스 쉘, 암호화폐 채굴, 권한 상승)를 실시간으로 모니터링하는 스크립트를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/process_monitor.sh << ''SCRIPT'' #!/bin/bash echo "=== Real-time Process Anomaly
    Monitor ===" echo "[1] Reverse Shell Indicators:" ps aux | grep -iE "nc -e|ncat -e|bash -i|/dev/tcp|python.*socket|perl.*socket"
    | grep -v grep || echo "  None found" echo "[2] Crypto Miner Indicators:" ps aux | grep -iE "xmrig|minerd|cpuminer|stratum|pool\."
    | grep -v grep || echo "  None found" echo "[3] Privilege Escalation Indicators:" ps aux | grep -iE
    "sudo.*-i|pkexec|dirtypipe|pwnkit" | grep -v grep || echo "  None found" echo "[4] High CPU Processes
    (>80%):" ps aux --sort=-%cpu | awk "NR<=3 && \$3>80 {print \$0}" || echo "  None found" SCRIPT bash
    /tmp/process_monitor.sh'
  answer_detail: 프로세스 모니터링은 리버스 쉘(nc -e, bash -i), 암호화폐 채굴(xmrig), 권한 상승(pkexec) 패턴을 검사한다. 높은 CPU 사용률도
    채굴의 지표가 될 수 있다.
  verify:
    type: output_contains
    expect: Process Anomaly Monitor
    semantic:
      intent: '[BLUE] 의심 프로세스 실시간 모니터링 — /tmp/proc_monitor.sh 에 while true 루프 + ps -eo pid,user,comm 로
        nc/bash -i/sh -i (reverse shell) · xmrig/minerd (크립토 마이닝) · sudo|su 권한 상승 명령 패턴 grep + 발견 시 alert
        로그. MITRE T1059 Command and Scripting Interpreter 탐지'
      success_criteria:
      - while true 프로세스 모니터링 스크립트
      - 최소 3종 패턴 (reverse shell/miner/privesc)
      - 발견 시 로깅 처리
      acceptable_methods:
      - bash while + ps -eo + grep
      - auditd + aureport -x
      - osquery SELECT from processes
      - Falco 런타임 보안 모니터
      negative_signs:
      - 일회성 스캔 (실시간 아님)
      - 패턴 1종만
      - 로깅 처리 없음
  target_vm: secu
  script: 'cat > /tmp/process_monitor.sh << ''SCRIPT'' #!/bin/bash echo "=== Real-time Process Anomaly
    Monitor ===" echo "[1] Reverse Shell Indicators:" ps aux | grep -iE "nc -e|ncat -e|bash -i|/dev/tcp|python.*socket|perl.*socket"
    | grep -v grep || echo "  None found" echo "[2] Crypto Miner Indicators:" ps aux | grep -iE "xmrig|minerd|cpuminer|stratum|pool\."
    | grep -v grep || echo "  None found" echo "[3] Privilege Escalation Indicators:" ps aux | grep -iE
    "sudo.*-i|pkexec|dirtypipe|pwnkit" | grep -v grep || echo "  None found" echo "[4] High CPU Processes
    (>80%):" ps aux --sort=-%cpu | awk "NR<=3 && \$3>80 {print \$0}" || echo "  None found" SCRIPT bash
    /tmp/process_monitor.sh'
  risk_level: low
  bastion_prompt: '[BLUE] 의심스러운 프로세스(리버스 쉘, 암호화폐 채굴, 권한 상승)를 실시간으로 모니터링하는 스크립트를 작성하라.'
- order: 6
  instruction: '[RED] 라이브 공격 시뮬레이션 — 포트 스캔, SQL Injection, SSH 브루트포스를 순차 실행하고 탐지 상황을 확인하라.'
  hint: nmap, curl(SQLi), SSH 실패 접근을 순차 실행한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 라이브 공격 시뮬레이션 — 포트 스캔, SQL Injection, SSH 브루트포스를 순차 실행하고 탐지 상황을 확인해줘

    📎 참고 (CLI): echo ''=== Live Attack Simulation ==='' && echo ''[1] Port scan:'' && nmap -sS --top-ports
    100 --max-retries 1 --host-timeout 15s -T4 10.20.30.80 2>&1 | tail -5 && echo ''[2] SQL Injection:''
    && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%20OR%201=1--'' 2>&1 | head -3
    && echo ''[3] SSH brute force (3 attempts):'' && for i in 1 2 3; do ssh -o ConnectTimeout=2 -o StrictHostKeyChecking=no
    -o PasswordAuthentication=yes fakeccc@10.20.30.80 2>&1 | head -1; done && echo ''=== Attack simulation
    complete ==='''
  answer_detail: 라이브 공격 시뮬레이션으로 방어 체계의 실효성을 검증한다. 포트 스캔(T1046), SQLi(T1190), SSH 브루트포스(T1110)를 실행하고 Suricata/WAF/fail2ban의
    탐지 여부를 확인한다.
  verify:
    type: output_contains
    expect: Attack simulation complete
    semantic:
      intent: '[RED] 라이브 공격 시뮬레이션 3단계 — nmap -sS --top-ports 1000 (포트 스캔, s2 룰 트리거) + curl SQLi payload
        (s2 SQLi 룰 트리거) + hydra -L users -P passwords ssh:// (브루트포스, s3 fail2ban 트리거). 순차 실행으로 전체 탐지·차단
        체인 검증'
      success_criteria:
      - 3단계 공격 순차 실행
      - 각 단계가 다른 룰 트리거
      - live 탐지 맥락
      acceptable_methods:
      - nmap + curl + hydra 순차
      - bash script 로 자동화
      - ansible playbook
      - msfconsole resource
      negative_signs:
      - 단일 공격만
      - 순차성 없음
      - 탐지 결과 확인 없음
