  bastion_prompt: attacker VM에서 cat으로 [RED/BLUE] 환경을 정리하고 실시간 방어 평가 보고서 작업을 수행해줘
- order: 99
  instruction: '[Multi-task] 이번 주 핵심 작업 5개를 한 번에 수행하라.'
  bastion_prompt: "secu VM(보안게이트웨이)에서 다음 작업들을 순서대로 수행해줘:\n1) [BLUE] Suricata IPS의\
    \ 동작 상태를 확인하고 현재 규칙 통계를 조회해줘\n2) [BLUE] 포트 스캔, NULL 스캔, XMAS 스캔, ICMP 스위프를 탐지하는\
