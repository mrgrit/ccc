    \  | Initial Access | WAF, Patch | IDS, WAF logs | IP block, session kill |\n  | Execution | AppArmor | EDR, process monitor | Process kill, isolate |\n  | Persistence | FIM, policy | auditd, SIEM correlation\
    \ | Remove artifact, disable account |\n\nFindings: 3 Critical (SQLi, Shared SSH keys, No FIM)\nRecommendations: Parameterized queries, unique SSH keys, deploy FIM\nEOF\ncat /tmp/pentest_report_week02.txt"
