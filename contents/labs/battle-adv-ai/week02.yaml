    \  | Initial Access | WAF, Patch | IDS, WAF logs | IP block, session kill |\n  | Execution | AppArmor | EDR, process monitor | Process kill, isolate |\n  | Persistence | FIM, policy | auditd, SIEM correlation\
    \ | Remove artifact, disable account |\n\nFindings: 3 Critical (SQLi, Shared SSH keys, No FIM)\nRecommendations: Parameterized queries, unique SSH keys, deploy FIM\nEOF\ncat /tmp/pentest_report_week02.txt"
  answer_detail: 종합 보고서는 공격 타임라인, 방어 매트릭스(Prevention/Detection/Response), 발견 사항, 권고사항을 포함한다. Defense-in-Depth 전략의 각 계층별 역할을 명확히 한다.
  verify:
    type: output_contains
    expect: 
  target_vm: attacker
  script: "rm -f /tmp/reverse_shell_sim.py /tmp/persistence_service_sim.service /tmp/apt_key_sim* 2>/dev/null && cat > /tmp/pentest_report_week02.txt << 'EOF'\n=== Multi-Stage Intrusion Report ===\nDate:\
    \ 2026-04-06 | Scope: 10.20.30.0/24\n\nTimeline:\n  [T+00] Recon: Port scan + directory enum (T1046, T1595.003)\n  [T+10] Initial Access: SQL Injection on REST API (T1190)\n  [T+20] Execution: Reverse\
