lab_id: soc-adv-ai-week08
title: 메모리 포렌식 - 휘발성 데이터 분석 (AI 지원)
version: ai
course: soc-adv-ai
week: 8
description: Linux 시스템의 메모리 아티팩트를 수집하고 분석하여 악성코드 흔적, 숨겨진 프로세스, C2 연결을 식별한다. /proc
  파일시스템과 실시간 메모리 분석 기법을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 메모리 포렌식의 원리와 필요성을 이해한다
- /proc 파일시스템에서 프로세스 아티팩트를 분석할 수 있다
- 메모리에서 악성코드 흔적을 식별할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 시스템의 메모리 상태를 확인하라. 전체 메모리, 사용량, 커널 슬랩 캐시 정보를 수집하고, 메모리 덤프 수집에 필요한
    공간을 추정하라.
  hint: free -h와 /proc/meminfo를 확인한다.
  category: collection
  points: 10
  answer: 'echo ''=== Memory Status ==='' && free -h && echo '''' && echo ''=== Detailed
    Memory Info ==='' && grep -E ''(MemTotal|MemFree|MemAvailable|Buffers|Cached|Slab)''
    /proc/meminfo && echo '''' && echo ''=== Dump size estimate ==='' && awk ''/MemTotal/{printf
    "Required dump space: %.1f GB\n", $2/1024/1024}'' /proc/meminfo'
  answer_detail: 메모리 포렌식의 첫 단계는 수집 대상의 메모리 크기를 파악하는 것이다. MemTotal로 전체 크기를 확인하고, 덤프
    저장소의 여유 공간이 충분한지 확인한다. LiME 등 덤프 도구는 전체 물리 메모리를 덤프한다.
  verify:
    type: output_contains
    expect: 메모리
  target_vm: siem
  script: 'echo ''=== Memory Status ==='' && free -h && echo '''' && echo ''=== Detailed
    Memory Info ==='' && grep -E ''(MemTotal|MemFree|MemAvailable|Buffers|Cached|Slab)''
    /proc/meminfo && echo '''' && echo ''=== Dump size estimate ==='' && awk ''/MemTotal/{printf
    "Required dump space: %.1f GB\n", $2/1024/1024}'' /proc/meminfo'
  risk_level: low
  bastion_prompt: 현재 시스템의 메모리 상태를 확인해줘
- order: 2
  instruction: /proc 파일시스템에서 모든 실행 중인 프로세스의 PID, 실행 경로, 커맨드라인을 추출하라. 비정상적인 프로세스(웹서버에서
    셸 실행 등)를 식별하라.
  hint: /proc/[PID]/exe와 /proc/[PID]/cmdline에서 정보를 추출한다.
  category: analysis
  points: 10
  answer: echo '=== Process Analysis from /proc ===' && for pid in $(ls -d /proc/[0-9]*
    2>/dev/null | sed 's|/proc/||'); do exe=$(readlink /proc/$pid/exe 2>/dev/null);
    cmd=$(tr '\0' ' ' < /proc/$pid/cmdline 2>/dev/null); ppid=$(awk '/^PPid:/{print
    $2}' /proc/$pid/status 2>/dev/null); user=$(awk '/^Uid:/{print $2}' /proc/$pid/status
    2>/dev/null); if [ -n "$exe" ]; then echo "PID:$pid PPID:$ppid UID:$user EXE:$exe
    CMD:${cmd:0:80}"; fi; done 2>/dev/null | head -30
  answer_detail: /proc 파일시스템은 리눅스 커널이 메모리에서 직접 생성하는 가상 파일시스템이다. /proc/PID/exe는 실행
    파일 경로, /proc/PID/cmdline은 실행 인자, /proc/PID/status는 PID/PPID/UID 정보를 제공한다. 삭제된
    바이너리도 (deleted) 표시와 함께 확인 가능하다.
  verify:
    type: output_contains
    expect: PID
  target_vm: siem
  script: echo '=== Process Analysis from /proc ===' && for pid in $(ls -d /proc/[0-9]*
    2>/dev/null | sed 's|/proc/||'); do exe=$(readlink /proc/$pid/exe 2>/dev/null);
    cmd=$(tr '\0' ' ' < /proc/$pid/cmdline 2>/dev/null); ppid=$(awk '/^PPid:/{print
    $2}' /proc/$pid/status 2>/dev/null); user=$(awk '/^Uid:/{print $2}' /proc/$pid/status
    2>/dev/null); if [ -n "$exe" ]; then echo "PID:$pid PPID:$ppid UID:$user EXE:$exe
    CMD:${cmd:0:80}"; fi; done 2>/dev/null | head -30
  risk_level: low
  bastion_prompt: /proc 파일시스템에서 모든 실행 중인 프로세스의 PID, 실행 경로, 커맨드라인을 추출해줘
- order: 3
  instruction: 프로세스 트리를 분석하여 비정상적인 부모-자식 관계를 탐지하라. 웹서버(apache/nginx)나 서비스 프로세스에서 셸이
    스폰된 패턴을 찾아라.
  hint: ps auxf로 프로세스 트리를 확인하고 의심 패턴을 grep으로 검색한다.
  category: analysis
  points: 10
  answer: echo '=== Process Tree Analysis ===' && ps auxf 2>/dev/null | head -40 &&
    echo '' && echo '=== Suspicious Parent-Child Patterns ===' && ps -eo pid,ppid,user,args
    --forest 2>/dev/null | grep -B2 -A2 -E '(www-data|apache|nginx|mysql|nobody).*(sh|bash|python|perl|nc
    |ncat)' || echo 'No suspicious patterns found' && echo '' && echo '=== Orphan
    processes (PPID=1) ===' && ps -eo pid,ppid,user,args 2>/dev/null | awk '$2==1
    && $3!="root"' | head -10
  answer_detail: 프로세스 트리 분석은 공격자의 실행 경로를 추적한다. www-data→bash(웹쉘), mysql→sh(SQLi RCE),
    sshd→bash→비정상 자식(측면이동)이 핵심 패턴이다. PPID=1인 비root 프로세스는 부모가 죽은 고아 프로세스로 의심 대상이다.
  verify:
    type: output_contains
    expect: 프로세스
  target_vm: siem
  script: echo '=== Process Tree Analysis ===' && ps auxf 2>/dev/null | head -40 &&
    echo '' && echo '=== Suspicious Parent-Child Patterns ===' && ps -eo pid,ppid,user,args
    --forest 2>/dev/null | grep -B2 -A2 -E '(www-data|apache|nginx|mysql|nobody).*(sh|bash|python|perl|nc
    |ncat)' || echo 'No suspicious patterns found' && echo '' && echo '=== Orphan
    processes (PPID=1) ===' && ps -eo pid,ppid,user,args 2>/dev/null | awk '$2==1
    && $3!="root"' | head -10
  risk_level: low
  bastion_prompt: 프로세스 트리를 분석하여 비정상적인 부모-자식 관계를 탐지해줘
- order: 4
  instruction: 숨겨진 프로세스를 탐지하라. /proc에서 직접 열거한 PID 목록과 ps 명령 결과를 비교하여 차이가 있는지 확인하라.
  hint: /proc/[0-9]* 디렉토리와 ps -eo pid 출력을 비교한다.
  category: detection
  points: 12
  answer: echo '=== Hidden Process Detection ===' && echo 'PIDs from /proc:' && ls
    -d /proc/[0-9]* 2>/dev/null | sed 's|/proc/||' | sort -n > /tmp/proc_pids.txt
    && wc -l /tmp/proc_pids.txt && echo 'PIDs from ps:' && ps -eo pid --no-headers
    | awk '{print $1}' | sort -n > /tmp/ps_pids.txt && wc -l /tmp/ps_pids.txt && echo
    '=== PIDs in /proc but NOT in ps (potentially hidden) ===' && comm -23 /tmp/proc_pids.txt
    /tmp/ps_pids.txt && echo '=== PIDs in ps but NOT in /proc (anomaly) ===' && comm
    -13 /tmp/proc_pids.txt /tmp/ps_pids.txt && rm -f /tmp/proc_pids.txt /tmp/ps_pids.txt
  answer_detail: 루트킷은 ps 명령을 조작(LD_PRELOAD, libc 후킹)하여 프로세스를 숨긴다. /proc 파일시스템에서 직접
    PID를 열거하면 커널 레벨 루트킷이 아닌 한 숨겨진 프로세스를 발견할 수 있다. 두 목록의 차이가 있으면 루트킷 의심이다.
  verify:
    type: output_contains
    expect: 프로세스
  target_vm: siem
  script: echo '=== Hidden Process Detection ===' && echo 'PIDs from /proc:' && ls
    -d /proc/[0-9]* 2>/dev/null | sed 's|/proc/||' | sort -n > /tmp/proc_pids.txt
    && wc -l /tmp/proc_pids.txt && echo 'PIDs from ps:' && ps -eo pid --no-headers
    | awk '{print $1}' | sort -n > /tmp/ps_pids.txt && wc -l /tmp/ps_pids.txt && echo
    '=== PIDs in /proc but NOT in ps (potentially hidden) ===' && comm -23 /tmp/proc_pids.txt
    /tmp/ps_pids.txt && echo '=== PIDs in ps but NOT in /proc (anomaly) ===' && comm
    -13 /tmp/proc_pids.txt /tmp/ps_pids.txt && rm -f /tmp/proc_pids.txt /tmp/ps_pids.txt
  risk_level: low
  bastion_prompt: 숨겨진 프로세스를 탐지하라. /proc에서 직접 열거한 PID 목록과 ps 명령 결과를 비교하여 차이가 있는지 확인해줘
- order: 5
  instruction: 네트워크 연결을 메모리 관점에서 분석하라. /proc/net/tcp에서 직접 TCP 연결을 파싱하고, 각 연결의 소유 프로세스를
    매핑하라.
  hint: /proc/net/tcp의 16진수 주소를 IP:Port로 변환한다.
  category: analysis
  points: 10
  answer: "echo '=== Network Connections from /proc/net/tcp ===' && python3 -c \"\n\
    import os, struct, socket\nwith open('/proc/net/tcp') as f:\n    next(f)\n   \
    \ for line in f:\n        parts = line.split()\n        local = parts[1].split(':')\n\
    \        remote = parts[2].split(':')\n        state = int(parts[3], 16)\n   \
    \     uid = parts[7]\n        inode = parts[9]\n        lip = socket.inet_ntoa(struct.pack('<I',\
    \ int(local[0], 16)))\n        lport = int(local[1], 16)\n        rip = socket.inet_ntoa(struct.pack('<I',\
    \ int(remote[0], 16)))\n        rport = int(remote[1], 16)\n        states = {1:'ESTABLISHED',2:'SYN_SENT',6:'TIME_WAIT',10:'LISTEN'}\n\
    \        sname = states.get(state, hex(state))\n        if rip != '0.0.0.0':\n\
    \            print(f'{lip}:{lport} -> {rip}:{rport}  {sname}  UID:{uid}')\" 2>/dev/null\
    \ | head -20"
  answer_detail: /proc/net/tcp는 커널이 관리하는 TCP 연결 테이블의 원본이다. ss나 netstat도 이 파일을 읽지만,
    루트킷이 이들을 후킹한 경우 직접 파싱하면 숨겨진 연결을 발견할 수 있다. 비표준 외부 포트의 ESTABLISHED 연결은 C2 의심이다.
  verify:
    type: output_contains
    expect: 연결
  target_vm: siem
  script: "echo '=== Network Connections from /proc/net/tcp ===' && python3 -c \"\n\
    import os, struct, socket\nwith open('/proc/net/tcp') as f:\n    next(f)\n   \
    \ for line in f:\n        parts = line.split()\n        local = parts[1].split(':')\n\
    \        remote = parts[2].split(':')\n        state = int(parts[3], 16)\n   \
    \     uid = parts[7]\n        inode = parts[9]\n        lip = socket.inet_ntoa(struct.pack('<I',\
    \ int(local[0], 16)))\n        lport = int(local[1], 16)\n        rip = socket.inet_ntoa(struct.pack('<I',\
    \ int(remote[0], 16)))\n        rport = int(remote[1], 16)\n        states = {1:'ESTABLISHED',2:'SYN_SENT',6:'TIME_WAIT',10:'LISTEN'}\n\
    \        sname = states.get(state, hex(state))\n        if rip != '0.0.0.0':\n\
    \            print(f'{lip}:{lport} -> {rip}:{rport}  {sname}  UID:{uid}')\" 2>/dev/null\
    \ | head -20"
  risk_level: low
  bastion_prompt: 네트워크 연결을 메모리 관점에서 분석하라. /proc/net/tcp에서 직접 TCP 연결을 파싱하고, 각 연결의 소유
    프로세스를 매핑해줘
- order: 6
  instruction: 의심 프로세스의 메모리 맵과 문자열을 추출하라. /proc/PID/maps에서 메모리 영역을 확인하고, /proc/PID/mem
    또는 strings로 유의미한 문자열을 추출하라.
  hint: /proc/self을 대상으로 실습한다. maps에서 힙/스택 영역을 확인한다.
  category: extraction
  points: 10
  answer: echo '=== Memory Map of current shell ===' && head -20 /proc/self/maps &&
    echo '' && echo '=== Interesting strings from process memory ===' && TARGET_PID=$$
    && strings /proc/$TARGET_PID/mem 2>/dev/null | grep -iE '(password|token|secret|http://|https://|10\.20\.30\.)'
    | sort -u | head -20 || echo 'Direct mem read restricted - using /proc/PID/environ
    instead:' && cat /proc/$TARGET_PID/environ 2>/dev/null | tr '\0' '\n' | grep -iE
    '(pass|key|token|secret)' | head -10
  answer_detail: /proc/PID/maps는 프로세스의 가상 메모리 레이아웃을 보여준다. [heap], [stack], 매핑된 라이브러리를
    확인할 수 있다. strings로 메모리에서 URL, 비밀번호, IP 등을 추출하면 악성코드의 C2 주소나 설정을 발견할 수 있다.
  verify:
    type: output_contains
    expect: 메모리
  target_vm: siem
  script: echo '=== Memory Map of current shell ===' && head -20 /proc/self/maps &&
    echo '' && echo '=== Interesting strings from process memory ===' && TARGET_PID=$$
    && strings /proc/$TARGET_PID/mem 2>/dev/null | grep -iE '(password|token|secret|http://|https://|10\.20\.30\.)'
    | sort -u | head -20 || echo 'Direct mem read restricted - using /proc/PID/environ
    instead:' && cat /proc/$TARGET_PID/environ 2>/dev/null | tr '\0' '\n' | grep -iE
    '(pass|key|token|secret)' | head -10
  risk_level: low
  bastion_prompt: 의심 프로세스의 메모리 맵과 문자열을 추출하라. /proc/PID/maps에서 메모리 영역을 확인하고, /proc/PID/mem
    또는 strings로 유의미한 문자열을 추출해줘
- order: 7
  instruction: 로드된 커널 모듈을 분석하라. 현재 커널 모듈 목록을 확인하고, 서명되지 않았거나 비정상 경로에서 로드된 의심 모듈을 식별하라.
  hint: lsmod와 /proc/modules를 비교하고, modinfo로 각 모듈의 출처를 확인한다.
  category: detection
  points: 10
  answer: 'echo ''=== Loaded Kernel Modules ==='' && lsmod | head -20 && echo ''''
    && echo ''=== Module count ==='' && lsmod | wc -l && echo '''' && echo ''=== Unsigned/suspicious
    modules ==='' && for mod in $(lsmod | awk ''NR>1{print $1}'' | head -20); do info=$(modinfo
    $mod 2>/dev/null | grep -E ''(filename|signer|sig_id)''); if ! echo "$info" |
    grep -q ''signer''; then echo "UNSIGNED: $mod - $(echo $info | grep filename)";
    fi; done 2>/dev/null | head -10 && echo '''' && echo ''=== Tainted kernel check
    ==='' && cat /proc/sys/kernel/tainted'
  answer_detail: 커널 루트킷은 커널 모듈(LKM)로 설치되어 시스템 호출을 후킹한다. 서명되지 않은 모듈, /lib/modules 외
    경로에서 로드된 모듈은 루트킷 의심 대상이다. /proc/sys/kernel/tainted가 0이 아니면 비공식 모듈이 로드되었음을 의미한다.
  verify:
    type: output_contains
    expect: 커널
  target_vm: siem
  script: 'echo ''=== Loaded Kernel Modules ==='' && lsmod | head -20 && echo ''''
    && echo ''=== Module count ==='' && lsmod | wc -l && echo '''' && echo ''=== Unsigned/suspicious
    modules ==='' && for mod in $(lsmod | awk ''NR>1{print $1}'' | head -20); do info=$(modinfo
    $mod 2>/dev/null | grep -E ''(filename|signer|sig_id)''); if ! echo "$info" |
    grep -q ''signer''; then echo "UNSIGNED: $mod - $(echo $info | grep filename)";
    fi; done 2>/dev/null | head -10 && echo '''' && echo ''=== Tainted kernel check
    ==='' && cat /proc/sys/kernel/tainted'
  risk_level: low
  bastion_prompt: 로드된 커널 모듈을 분석해줘
- order: 8
  instruction: bash 히스토리와 환경변수를 메모리에서 추출하라. 모든 사용자의 bash_history를 수집하고, 의심 명령(wget,
    curl, nc, base64, chmod +x)을 필터링하라.
  hint: /home/*/.bash_history와 /root/.bash_history를 검색한다.
  category: extraction
  points: 10
  answer: 'echo ''=== Bash History Analysis ==='' && for hist in /root/.bash_history
    /home/*/.bash_history; do if [ -f "$hist" ]; then user=$(echo $hist | cut -d/
    -f3); echo "--- User: $user ---"; grep -inE ''(wget|curl.*http|nc -|ncat|base64|chmod
    \+x|python.*-c|perl.*-e|eval|/dev/tcp|mkfifo)'' "$hist" 2>/dev/null | tail -10;
    fi; done && echo '''' && echo ''=== Suspicious env vars across processes ===''
    && for pid in $(ls -d /proc/[0-9]* 2>/dev/null | sed ''s|/proc/||'' | head -50);
    do envs=$(cat /proc/$pid/environ 2>/dev/null | tr ''\0'' ''\n'' | grep -iE ''(password|secret|token|key=)'');
    if [ -n "$envs" ]; then exe=$(readlink /proc/$pid/exe 2>/dev/null); echo "PID:$pid
    ($exe): $envs"; fi; done 2>/dev/null | head -10'
  answer_detail: bash 히스토리는 공격자의 행동을 직접 보여주는 핵심 증거이다. wget/curl(다운로드), nc/ncat(리버스셸),
    base64(인코딩), chmod +x(실행권한), /dev/tcp(bash 네트워크)는 대표적 공격 명령이다. 환경변수에서 비밀번호나 토큰이
    노출되는 경우도 많다.
  verify:
    type: output_contains
    expect: 히스토리
  target_vm: siem
  script: 'echo ''=== Bash History Analysis ==='' && for hist in /root/.bash_history
    /home/*/.bash_history; do if [ -f "$hist" ]; then user=$(echo $hist | cut -d/
    -f3); echo "--- User: $user ---"; grep -inE ''(wget|curl.*http|nc -|ncat|base64|chmod
    \+x|python.*-c|perl.*-e|eval|/dev/tcp|mkfifo)'' "$hist" 2>/dev/null | tail -10;
    fi; done && echo '''' && echo ''=== Suspicious env vars across processes ===''
    && for pid in $(ls -d /proc/[0-9]* 2>/dev/null | sed ''s|/proc/||'' | head -50);
    do envs=$(cat /proc/$pid/environ 2>/dev/null | tr ''\0'' ''\n'' | grep -iE ''(password|secret|token|key=)'');
    if [ -n "$envs" ]; then exe=$(readlink /proc/$pid/exe 2>/dev/null); echo "PID:$pid
    ($exe): $envs"; fi; done 2>/dev/null | head -10'
  risk_level: low
  bastion_prompt: bash 히스토리와 환경변수를 메모리에서 추출해줘. /proc/PID/environ과 .bash_history 파일
    분석 방법을 설명하고 히스토리 추출 예시를 보여줘
- order: 9
  instruction: 시스템 콜 테이블 무결성을 검증하라. /proc/kallsyms에서 시스템 콜 핸들러 주소가 커널 텍스트 영역 내에 있는지
    확인하라.
  hint: /proc/kallsyms에서 sys_call_table과 커널 텍스트 범위(_stext~_etext)를 확인한다.
  category: detection
  points: 10
  answer: echo '=== Syscall Table Integrity Check ===' && echo 'Kernel text range:'
