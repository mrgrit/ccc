lab_id: soc-adv-ai-week07
title: 네트워크 포렌식 - 패킷 분석과 증거 수집 (AI 지원)
version: ai
course: soc-adv-ai
week: 7
description: 네트워크 패킷 캡처와 분석을 통해 침해 증거를 수집하고 공격 행위를 재구성하는 실습. AI SubAgent가 자동으로 명령을
  실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 네트워크 포렌식의 원리와 절차를 이해한다
- 패킷 분석 도구를 활용하여 공격 트래픽을 식별할 수 있다
- 네트워크 증거를 체계적으로 수집하고 보존할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 네트워크 포렌식의 법적 요건을 정리하라. 디지털 증거의 무결성 보장(해시 체인), 적법한 수집 절차, 증거 보관 체인(Chain
    of Custody)을 설명하라.
  hint: ISO 27037, RFC 3227을 참고하라
  category: framework
  points: 8
  answer: '🤖 프롬프트: 네트워크 포렌식의 법적 요건을 정리해줘. Chain of Custody, 증거 무결성, 해시 검증, 법정 인정 기준을
    포함해서

    📎 참고 (CLI): 법적 요건: 1) 증거 무결성(SHA-256 해시), 2) 적법 수집(영장/동의), 3) Chain of Custody(수집자/시간/장소/방법
    기록), 4) 원본 보존(분석은 사본으로)'
  answer_detail: 네트워크 증거는 법적 절차에서 사용될 수 있으므로, 수집부터 분석까지 엄격한 절차를 준수해야 한다. 무결성 해시는 증거
    변조를 입증하는 핵심이다.
  verify:
    type: output_contains
    expect: Chain of Custody
  target_vm: siem
  script: '법적 요건: 1) 증거 무결성(SHA-256 해시), 2) 적법 수집(영장/동의), 3) Chain of Custody(수집자/시간/장소/방법
    기록), 4) 원본 보존(분석은 사본으로)'
  risk_level: low
  bastion_prompt: 네트워크 포렌식의 법적 요건을 정리해줘. Chain of Custody, 증거 무결성, 해시 검증, 법정 인정 기준을
    포함해서
- order: 2
  instruction: 실습 환경에서 패킷 캡처를 수행하라. secu 서버({{SECU_IP}})에서 tcpdump를 사용하여 10.20.30.0/24
    네트워크의 트래픽을 5분간 캡처하라.
  hint: tcpdump -i eth0 -w /tmp/capture.pcap -c 10000 net 10.20.30.0/24
  category: collection
  points: 10
  answer: '🤖 프롬프트: 실습 환경에서 패킷 캡처를 수행하라. secu 서버(10.20.30.1)에서 tcpdump를 사용하여 10.20.30.0/24
    네트워크의 트래픽을 5분간 캡처해줘

    📎 참고 (CLI): tcpdump 캡처 완료: N개 패킷, M MB 파일 크기. 캡처 파일 해시: SHA-256(capture.pcap)'
  answer_detail: 패킷 캡처는 네트워크 포렌식의 첫 단계이다. 캡처 범위(필터), 기간, 파일 크기를 사전에 계획하고, 캡처 즉시 해시를
    생성하여 무결성을 보장한다.
  verify:
    type: output_contains
    expect: tcpdump
  target_vm: siem
  script: 'tcpdump 캡처 완료: N개 패킷, M MB 파일 크기. 캡처 파일 해시: SHA-256(capture.pcap)'
  risk_level: low
  bastion_prompt: 실습 환경에서 패킷 캡처를 수행하라. secu 서버(10.20.30.1)에서 tcpdump를 사용하여 10.20.30.0/24
    네트워크의 트래픽을 5분간 캡처해줘
- order: 3
  instruction: 캡처 파일의 기본 통계를 분석하라. 프로토콜 분포, 소스/목적지 IP Top 10, 포트 분포, 시간대별 트래픽 볼륨을
    확인하라.
  hint: tshark -r capture.pcap -q -z conv,ip 또는 -z io,stat,1 등을 사용하라
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 캡처 파일의 기본 통계를 분석해줘. 프로토콜 분포, 패킷 수, 대역폭 사용률, 주요 통신 엔드포인트를 포함해서

    📎 참고 (CLI): 프로토콜: TCP 65%, UDP 20%, ICMP 10%, 기타 5%. Top IP: 10.20.30.80(웹서버),
    10.20.30.1(방화벽). 주요 포트: 80, 443, 22, 53'
  answer_detail: 기본 통계 분석은 전체 트래픽 패턴을 파악하는 데 필수적이다. 비정상적으로 높은 비율의 프로토콜이나 예상치 못한 포트
    사용은 추가 조사의 단서가 된다.
  verify:
    type: output_contains
    expect: 프로토콜
  target_vm: siem
  script: '프로토콜: TCP 65%, UDP 20%, ICMP 10%, 기타 5%. Top IP: 10.20.30.80(웹서버), 10.20.30.1(방화벽).
    주요 포트: 80, 443, 22, 53'
  risk_level: low
  bastion_prompt: 캡처 파일의 기본 통계를 분석해줘. 프로토콜 분포, 패킷 수, 대역폭 사용률, 주요 통신 엔드포인트를 포함해서
- order: 4
  instruction: HTTP 트래픽을 상세 분석하라. 웹서버({{WEB_IP}})로의 HTTP 요청에서 SQL Injection, XSS,
    디렉토리 트래버설 공격 시도를 식별하라.
  hint: tshark -r capture.pcap -Y 'http.request' -T fields -e http.request.uri 로 URI를
    추출하라
  category: analysis
  points: 12
  answer: '🤖 프롬프트: HTTP 트래픽을 상세 분석해줘. User-Agent, URL, SQL Injection/XSS 공격 시그니처 탐지를
    포함해서

    📎 참고 (CLI): 공격 식별: SQLi(UNION SELECT, OR 1=1), XSS(<script>), Directory Traversal(../../../etc/passwd).
    공격 IP, 시간, 요청 URI를 기록'
  answer_detail: HTTP 페이로드 분석은 웹 공격의 구체적 내용을 파악한다. URL 인코딩, 이중 인코딩 등 우회 기법도 디코딩하여
    분석해야 하며, 성공 여부(응답 코드)도 함께 확인한다.
  verify:
    type: output_contains
    expect: SQL
  target_vm: siem
  script: '공격 식별: SQLi(UNION SELECT, OR 1=1), XSS(<script>), Directory Traversal(../../../etc/passwd).
    공격 IP, 시간, 요청 URI를 기록'
  risk_level: low
  bastion_prompt: HTTP 트래픽을 상세 분석해줘. User-Agent, URL, SQL Injection/XSS 공격 시그니처 탐지를
    포함해서
- order: 5
  instruction: DNS 트래픽을 분석하라. DNS 쿼리/응답 패턴에서 비정상적인 활동(높은 NXDOMAIN 비율, 긴 서브도메인, TXT
    레코드 남용)을 식별하라.
  hint: tshark -r capture.pcap -Y 'dns' -T fields -e dns.qry.name -e dns.flags.rcode
  category: analysis
  points: 10
  answer: '🤖 프롬프트: DNS 트래픽을 분석하라. DNS 쿼리/응답 패턴에서 비정상적인 활동(높은 NXDOMAIN 비율, 긴 서브도메인,
    TXT 레코드 남용)을 식별해줘

    📎 참고 (CLI): DNS 분석: 전체 쿼리 N개, NXDOMAIN 비율 X%, 평균 도메인 길이 Y자, 최대 도메인 길이 Z자, TXT
    레코드 쿼리 비율 W%'
  answer_detail: DNS 분석은 C2 통신, 데이터 유출, DGA(Domain Generation Algorithm) 탐지에 핵심적이다.
    NXDOMAIN 비율이 30% 이상이면 DGA 의심, TXT 레코드 남용은 데이터 유출 의심이다.
  verify:
    type: output_contains
    expect: DNS
  target_vm: siem
  script: 'DNS 분석: 전체 쿼리 N개, NXDOMAIN 비율 X%, 평균 도메인 길이 Y자, 최대 도메인 길이 Z자, TXT 레코드 쿼리
    비율 W%'
  risk_level: low
  bastion_prompt: DNS 트래픽을 분석하라. DNS 쿼리/응답 패턴에서 비정상적인 활동(높은 NXDOMAIN 비율, 긴 서브도메인,
    TXT 레코드 남용)을 식별해줘
- order: 6
  instruction: TCP 세션을 재구성하라. 특정 의심 IP와의 TCP 연결을 follow하여 전체 통신 내용을 추출하고, 데이터 전송 패턴을
    분석하라.
  hint: tshark -r capture.pcap -z follow,tcp,ascii,stream_index 또는 tcpflow를 사용하라
  category: analysis
  points: 10
  answer: '🤖 프롬프트: TCP 세션을 재구성해줘

    📎 참고 (CLI): TCP 세션 재구성: 스트림 수 N개, 의심 세션에서 전송된 데이터 내용, 파일 다운로드/업로드 식별'
  answer_detail: TCP 세션 재구성은 개별 패킷이 아닌 전체 통신의 맥락을 파악한다. 파일 전송, 셸 명령, 인증 시도 등 애플리케이션
    레벨의 행위를 재현할 수 있다.
  verify:
    type: output_contains
    expect: TCP
  target_vm: siem
  script: 'TCP 세션 재구성: 스트림 수 N개, 의심 세션에서 전송된 데이터 내용, 파일 다운로드/업로드 식별'
  risk_level: low
  bastion_prompt: TCP 세션을 재구성해줘
- order: 7
  instruction: 패킷에서 파일을 추출하라. HTTP 트래픽에서 전송된 파일(이미지, 실행파일, 문서)을 추출하고, 각 파일의 해시와 유형을
    확인하라.
  hint: tshark --export-objects http,/tmp/extracted/ 또는 foremost를 사용하라
  category: extraction
  points: 10
  answer: '🤖 프롬프트: 패킷에서 파일을 추출하라. HTTP 트래픽에서 전송된 파일(이미지, 실행파일, 문서)을 추출하고, 각 파일의 해시와
    유형을 확인해줘

    📎 참고 (CLI): 추출된 파일: HTML N개, 이미지 M개, 기타 K개. 각 파일의 SHA-256 해시, MIME 유형, 크기 기록'
  answer_detail: 파일 추출(carving)은 악성코드 다운로드, 데이터 유출 증거를 확보한다. 추출된 파일은 YARA 스캔과 VirusTotal
    조회로 악성 여부를 판별한다.
  verify:
    type: output_contains
    expect: 추출
  target_vm: siem
  script: '추출된 파일: HTML N개, 이미지 M개, 기타 K개. 각 파일의 SHA-256 해시, MIME 유형, 크기 기록'
  risk_level: low
  bastion_prompt: 패킷에서 파일을 추출하라. HTTP 트래픽에서 전송된 파일(이미지, 실행파일, 문서)을 추출하고, 각 파일의 해시와
    유형을 확인해줘
- order: 8
  instruction: Suricata 알림과 패킷 캡처를 상관분석하라. Suricata가 생성한 알림의 타임스탬프와 캡처 파일을 매칭하여 알림의
    원인 패킷을 특정하라.
  hint: Suricata eve.json의 flow_id로 관련 패킷을 추적할 수 있다
  category: correlation
  points: 10
  answer: '🤖 프롬프트: Suricata 알림과 패킷 캡처를 상관분석하라. Suricata가 생성한 알림의 타임스탬프와 캡처 파일을 매칭하여
    알림의 원인 패킷을 특정해줘

    📎 참고 (CLI): 상관분석: Suricata 알림 N건에 대해 원인 패킷 특정, 각 알림의 트리거 패킷 내용, 전후 컨텍스트(5패킷) 확인'
  answer_detail: IDS 알림만으로는 공격의 전체 맥락을 파악하기 어렵다. 원본 패킷과 결합하면 알림의 진양성 여부를 판단하고, 공격의
    전체 시퀀스를 재구성할 수 있다.
  verify:
    type: output_contains
    expect: Suricata
  target_vm: siem
  script: '상관분석: Suricata 알림 N건에 대해 원인 패킷 특정, 각 알림의 트리거 패킷 내용, 전후 컨텍스트(5패킷) 확인'
  risk_level: low
  bastion_prompt: Suricata 알림과 패킷 캡처를 상관분석하라. Suricata가 생성한 알림의 타임스탬프와 캡처 파일을 매칭하여
    알림의 원인 패킷을 특정해줘
- order: 9
  instruction: 암호화 트래픽 분석 방안을 설계하라. TLS 핸드셰이크 메타데이터(JA3/JA3S, SNI, 인증서)를 활용한 위협 탐지
    기법을 구현하라.
  hint: JA3 해시는 TLS Client Hello의 fingerprint이다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 암호화 트래픽 분석 방안을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): TLS 메타데이터 분석: 1) JA3 해시로 클라이언트 fingerprint(알려진 악성 도구 식별), 2) SNI로
    목적지 도메인 확인, 3) 인증서 유효성/발급자 검증, 4) 자체 서명 인증서 탐지'
  answer_detail: 암호화 트래픽은 내용을 볼 수 없지만, 메타데이터 분석으로 위협을 탐지할 수 있다. JA3는 Cobalt Strike,
    Metasploit 등 악성 도구의 고유한 TLS fingerprint를 식별한다.
  verify:
    type: output_contains
    expect: JA3
  target_vm: siem
  script: 'TLS 메타데이터 분석: 1) JA3 해시로 클라이언트 fingerprint(알려진 악성 도구 식별), 2) SNI로 목적지 도메인
    확인, 3) 인증서 유효성/발급자 검증, 4) 자체 서명 인증서 탐지'
  risk_level: low
  bastion_prompt: 암호화 트래픽 분석 방안을 설계하라. TLS 핸드셰이크 메타데이터(JA3/JA3S, SNI, 인증서)를 활용한 위협
    탐지 기법을 구현하라.
- order: 10
  instruction: NetFlow/IPFIX 데이터를 활용한 네트워크 포렌식을 수행하라. 패킷 캡처가 불가능한 환경에서 플로우 데이터만으로
    이상 행위를 탐지하는 방법을 실습하라.
  hint: '플로우 데이터: 소스/목적지 IP/Port, 프로토콜, 바이트 수, 패킷 수, 시작/종료 시간'
  category: analysis
  points: 10
  answer: '🤖 프롬프트: NetFlow/IPFIX 데이터를 활용한 네트워크 포렌식을 수행해줘

    📎 참고 (CLI): 플로우 분석: 1) 장시간 연결(C2 의심), 2) 대용량 전송(유출 의심), 3) 다수 포트 접속(스캔), 4) 비정상
    프로토콜, 5) 야간 통신'
  answer_detail: NetFlow는 패킷 전체를 캡처하지 않으므로 저장 비용이 적고 장기간 보관이 가능하다. 페이로드 분석은 불가능하지만,
    통신 패턴 분석으로 이상 행위를 탐지할 수 있다.
  verify:
    type: output_contains
    expect: NetFlow
  target_vm: siem
  script: '플로우 분석: 1) 장시간 연결(C2 의심), 2) 대용량 전송(유출 의심), 3) 다수 포트 접속(스캔), 4) 비정상 프로토콜,
    5) 야간 통신'
  risk_level: low
