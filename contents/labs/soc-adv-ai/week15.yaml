lab_id: soc-adv-ai-week15
title: 종합 실전 - SOC 운영 시뮬레이션 (AI 지원)
version: ai
course: soc-adv-ai
week: 15
description: 14주간 학습한 모든 기술을 통합하여 실제 SOC 운영 환경에서의 종합 시뮬레이션을 수행한다. 실시간 모니터링, 인시던트 대응,
  위협 헌팅, IOC 관리, KPI 측정을 포괄한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SOC 운영의 전체 프로세스를 독립적으로 수행할 수 있다
- 다중 공격 시나리오에 대해 체계적으로 대응할 수 있다
- 종합 보안 보고서를 작성할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SOC 환경 점검을 수행하라. Wazuh Manager, Suricata, nftables의 상태를 확인하고 모든 보안
    도구가 정상 동작하는지 검증하라.
  hint: 각 도구의 프로세스 상태와 로그 수집 상태를 확인한다.
  category: operation
  points: 10
  answer: '🤖 프롬프트: SOC 환경 점검을 수행하라. Wazuh Manager, Suricata, nftables의 상태를 확인하고 모든
    보안 도구가 정상 동작하는지 검증해줘

    📎 참고 (CLI): echo ''=== SOC Environment Check ==='' && echo ''[Wazuh Manager]''
    && systemctl is-active wazuh-manager 2>/dev/null && /var/ossec/bin/agent_control
    -l 2>/dev/null | tail -5 && echo '''' && echo ''[Wazuh Alerts]'' && tail -5 /var/ossec/logs/alerts/alerts.json
    2>/dev/null | python3 -m json.tool 2>/dev/null | head -10 && echo '''' && echo
    ''Environment check complete'''
  answer_detail: SOC 운영의 첫 임무는 보안 도구 상태 확인이다. Wazuh 에이전트 연결 상태, Suricata 패킷 처리 통계,
    nftables 룰 수를 확인하여 탐지 인프라가 정상 동작하는지 검증한다.
  verify:
    type: output_contains
    expect:
    - Environment Check
    - Wazuh
    semantic:
      intent: 'SOC 환경 건강 점검 — 핵심 3 도구 상태 확인: (1) Wazuh Manager: systemctl is-active
        wazuh-manager → active 확인, /var/ossec/bin/agent_control -l 로 에이전트 연결 목록 (Active/Disconnected/Never
        connected) (2) Suricata: suricata -c /etc/suricata/suricata.yaml --dump-config,
        /var/log/suricata/stats.log 에서 capture.kernel_drops·alerts/sec (3) nftables:
        nft list ruleset 로 룰 개수, counter 값. 추가: tail alerts.json 으로 최근 탐지 samples
        검증. Zero-alert 주의 신호(agent down 가능성). 일일 첫 작업 절차 - NIST CSF Detect(DE.CM)'
      success_criteria:
      - Wazuh·Suricata·nftables 3도구 상태 확인
      - 최근 alerts 샘플 또는 agent 연결 상태 확인
      - 구체 명령어 제시
      acceptable_methods:
      - systemctl is-active + status 조합
      - Wazuh API /api/v4/agents 호출
      - suricatasc -c dump-counters 로 통계
      - tail -f 로 실시간 로그 확인
      - Prometheus + node_exporter 로 자동 헬스체크
      negative_signs:
      - 도구 1-2개만 점검
      - 상태 명령어 없이 개념
      - alerts 샘플 검증 누락
  target_vm: siem
  script: echo '=== SOC Environment Check ===' && echo '[Wazuh Manager]' && systemctl
    is-active wazuh-manager 2>/dev/null && /var/ossec/bin/agent_control -l 2>/dev/null
    | tail -5 && echo '' && echo '[Wazuh Alerts]' && tail -5 /var/ossec/logs/alerts/alerts.json
    2>/dev/null | python3 -m json.tool 2>/dev/null | head -10 && echo '' && echo 'Environment
    check complete'
  risk_level: low
  bastion_prompt: SOC 환경 점검을 수행하라. Wazuh Manager, Suricata, nftables의 상태를 확인하고 모든
    보안 도구가 정상 동작하는지 검증해줘
- order: 2
  instruction: '시나리오 1: 외부에서 웹서버 공격이 감지되었다. Suricata eve.json에서 최근 HTTP 관련 알림을 분석하고,
    공격 유형/소스/성공 여부를 판단하라.'
  hint: eve.json에서 alert 이벤트 중 http 관련 항목을 필터링한다.
  category: detection
  points: 10
  answer: '🤖 프롬프트: 시나리오 1: 외부에서 웹서버 공격이 감지되었다. Suricata eve.json에서 최근 HTTP 관련 알림을
    분석하고, 공격 유형/소스/성공 여부를 판단해줘

    📎 참고 (CLI): echo "=== Web Attack Analysis ===" && tail -500 /var/log/suricata/eve.json
    2>/dev/null | python3 -c " import sys,json for l in sys.stdin: try: e=json.loads(l)
    if e.get(\"event_type\")==\"alert\" and \"http\" in str(e.get(\"alert\",{}).get(\"category\",\"\")):
    a=e[\"alert\"] print(f\"{e.get(\"timestamp\",\"\")[:19]} | {e.get(\"src_ip\",\"\")}:{e.get(\"src_port\",\"\")}
    -> {e.get(\"dest_ip\",\"\")}:{e.get(\"dest_port\",\"\")} | {a.get(\"signature\",\"\")[:60]}
    | Severity:{a.get(\"severity\",\"\")}\") except: pass " 2>/dev/null | tail -10
    && echo "" && echo "MITRE ATT&CK: T1190 (Exploit Public-Facing Application)"'
  answer_detail: 웹 공격 분석은 Suricata 알림의 시그니처, 소스 IP, 목적지, 심각도를 종합 분석한다. HTTP 카테고리 알림에서
    SQLi, XSS, 디렉토리 트래버설 등을 식별하고, 응답 코드로 공격 성공 여부를 판단한다.
  verify:
    type: output_contains
    expect:
    - Web Attack
    - Suricata
    - eve.json
    - HTTP
    - SQLi
    - T1190
    semantic:
      intent: '시나리오1 - 외부 웹공격 분석 (T1190) — Suricata eve.json 에서 event_type=alert &&
        alert.category contains http 필터링: tail -500 /var/log/suricata/eve.json | jq
        "select(.event_type==\"alert\" and (.alert.category|tostring|contains(\"http\")))"
        로 timestamp·src_ip:port → dest_ip:port·signature·severity 추출. 공격 유형(SQLi/XSS/RCE)
        식별, 소스 IP reputation(AbuseIPDB), 응답 코드 200 vs 4xx/5xx 로 성공 여부. MITRE ATT&CK
        매핑 T1190 Exploit Public-Facing Application'
      success_criteria:
      - Suricata eve.json 필터링 명령
      - 공격 유형 식별 기준(시그니처·category)
      - 공격 성공 여부 판단(응답코드·payload)
      acceptable_methods:
      - jq -c "select(.event_type==\"alert\")" eve.json
      - Python json.loads 로 스트림 처리
      - Elastic Kibana Discover + filter event.category:http
      - Wazuh dashboard Security Events + Suricata rule group
      - Zeek http.log + notice.log 대체
      negative_signs:
      - eve.json 파싱 명령 없이 개념만
      - 공격 유형 구분 없음
      - 성공 여부 판단 기준 없음
  target_vm: secu
  script: 'echo "=== Web Attack Analysis ===" && tail -500 /var/log/suricata/eve.json
    2>/dev/null | python3 -c " import sys,json for l in sys.stdin: try: e=json.loads(l)
    if e.get(\"event_type\")==\"alert\" and \"http\" in str(e.get(\"alert\",{}).get(\"category\",\"\")):
    a=e[\"alert\"] print(f\"{e.get(\"timestamp\",\"\")[:19]} | {e.get(\"src_ip\",\"\")}:{e.get(\"src_port\",\"\")}
    -> {e.get(\"dest_ip\",\"\")}:{e.get(\"dest_port\",\"\")} | {a.get(\"signature\",\"\")[:60]}
    | Severity:{a.get(\"severity\",\"\")}\") except: pass " 2>/dev/null | tail -10
    && echo "" && echo "MITRE ATT&CK: T1190 (Exploit Public-Facing Application)"'
  risk_level: low
  bastion_prompt: '시나리오 1: 외부에서 웹서버 공격이 감지되었다. Suricata eve.json에서 최근 HTTP 관련 알림을
    분석하고, 공격 유형/소스/성공 여부를 판단해줘'
- order: 3
  instruction: '시나리오 1 대응: 공격 소스 IP를 nftables로 차단하고, Suricata에 해당 IP의 추가 탐지 규칙을 배포하라.'
  hint: nft add element로 차단 목록에 추가하고, Suricata 커스텀 룰을 작성한다.
  category: response
  points: 12
  answer: '🤖 프롬프트: 시나리오 1 대응: 공격 소스 IP를 nftables로 차단하고, Suricata에 해당 IP의 추가 탐지 규칙을
    배포해줘

    📎 참고 (CLI): ATTACKER_IP="203.0.113.50" && echo "=== Incident Response: Web Attack
    ===" && echo "[1] Block attacker IP:" && sudo nft add rule inet filter input ip
    saddr $ATTACKER_IP drop 2>/dev/null && echo "IP blocked: $ATTACKER_IP" && echo
    "" && echo "[2] Deploy Suricata detection rule:" && echo "alert http $ATTACKER_IP
    any -> \$HOME_NET any (msg:\"CUSTOM: Blocked attacker resumed activity\"; flow:to_server,established;
    sid:9100001; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules && echo ""
    && echo "[3] Verify block:" && sudo nft list ruleset 2>/dev/null | grep 203.0.113
    && echo "" && echo "Response complete - attacker blocked and monitored"'
  answer_detail: 인시던트 대응은 차단(Contain) -> 탐지 강화(Monitor) -> 검증(Verify) 순서로 실행한다. nftables로
    즉시 차단하고, Suricata 커스텀 룰로 해당 IP의 향후 활동을 추가 모니터링한다.
  verify:
    type: output_contains
    expect:
    - Response complete
    - nftables
    - block
    - Suricata
    - local.rules
    semantic:
      intent: '시나리오1 인시던트 대응 - 격리 + 탐지 강화 — 3단계: (1) Block: sudo nft add rule inet
        filter input ip saddr <ATTACKER_IP> drop, 또는 nft add element inet filter blacklist
        { <IP> } (set 이미 존재 시) (2) Detection rule deploy: Suricata 커스텀 룰 alert http
        <IP> any -> $HOME_NET any (msg: Blocked attacker resumed activity ; flow:to_server,established;
        sid:9100001; rev:1;) 를 /etc/suricata/rules/local.rules 추가 후 suricata-update
        + reload (3) Verify: nft list ruleset | grep <IP> 차단 룰 확인, /var/log/suricata/fast.log
        에 새 sid 이벤트 확인. Document in playbook: Contain→Monitor→Verify'
      success_criteria:
      - nftables 차단 명령 구체(nft add rule/element)
      - Suricata 룰 작성 + sid
      - 차단 검증 절차
      acceptable_methods:
      - nft add rule inet filter input ip saddr <IP> drop
      - iptables -I INPUT -s <IP> -j DROP (legacy)
      - Suricata local.rules + suricata-update 또는 -r 리로드
      - Cloudflare/AWS WAF IP set 업데이트
      - MISP sharing 으로 조직간 IOC 공유
      negative_signs:
      - 차단 명령 없이 개념만
      - Suricata 룰 sid/msg 누락
      - 검증 단계 없음
  target_vm: secu
  script: 'ATTACKER_IP="203.0.113.50" && echo "=== Incident Response: Web Attack ==="
    && echo "[1] Block attacker IP:" && sudo nft add rule inet filter input ip saddr
    $ATTACKER_IP drop 2>/dev/null && echo "IP blocked: $ATTACKER_IP" && echo "" &&
    echo "[2] Deploy Suricata detection rule:" && echo "alert http $ATTACKER_IP any
    -> \$HOME_NET any (msg:\"CUSTOM: Blocked attacker resumed activity\"; flow:to_server,established;
    sid:9100001; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules && echo ""
    && echo "[3] Verify block:" && sudo nft list ruleset 2>/dev/null | grep 203.0.113
    && echo "" && echo "Response complete - attacker blocked and monitored"'
  risk_level: low
  bastion_prompt: '시나리오 1 대응: 공격 소스 IP를 nftables로 차단하고, Suricata에 해당 IP의 추가 탐지 규칙을
    배포해줘'
- order: 4
  instruction: '시나리오 2: 내부 서버에서 비정상적인 아웃바운드 트래픽이 감지되었다. Suricata와 시스템 로그를 교차 분석하여
    C2 통신 여부를 판단하라.'
  hint: eve.json에서 outbound 알림과 ss 명령의 외부 연결을 비교한다.
  category: detection
  points: 10
  answer: '🤖 프롬프트: 시나리오 2: 내부 서버에서 비정상적인 아웃바운드 트래픽이 감지되었다. Suricata와 시스템 로그를 교차 분석하여
    C2 통신 여부를 판단해줘

    📎 참고 (CLI): echo "=== Outbound Traffic Analysis ===" && echo "[Suricata C2/Trojan
    alerts]" && grep -i "trojan\|c2\|beacon\|backdoor\|shellcode" /var/log/suricata/fast.log
    2>/dev/null | tail -5 && echo "" && echo "[Active outbound connections]" && ss
    -tn state established 2>/dev/null | awk "{print \$5}" | grep -vE "^(10\.|127\.|$)"
    | sort | uniq -c | sort -rn | head -10 && echo "" && echo "[DNS query anomaly
    check]" && tail -200 /var/log/suricata/eve.json 2>/dev/null | python3 -c " import
    sys,json for l in sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"dns\":
    q=e.get(\"dns\",{}).get(\"rrname\",\"\") if len(q)>50: print(f\"SUSPICIOUS LONG
    DNS: {q[:80]}\") except: pass " 2>/dev/null && echo "" && echo "C2 analysis complete"'
  answer_detail: 아웃바운드 트래픽 이상은 침해의 핵심 지표이다. Suricata의 C2/Trojan 시그니처 매칭, 비표준 외부 연결,
    DNS 쿼리 길이 이상(터널링 의심)을 교차 분석하여 C2 통신 여부를 종합 판단한다.
  verify:
    type: output_contains
    expect:
    - C2 analysis
    - C2
    - trojan
    - beacon
    - outbound
    - DNS
    semantic:
      intent: '시나리오2 - C2 통신 탐지 교차분석 — outbound anomaly triage: (1) Suricata signature
        검색: grep -iE "trojan|c2|beacon|backdoor|shellcode" /var/log/suricata/fast.log
        (2) Live connection: ss -tn state established, awk 로 external IP 추출 후 RFC1918/loopback
        제외 + count (3) DNS tunneling 힌트: eve.json 의 dns.query.rrname 길이 >50 또는 Shannon
        entropy 계산 (4) NetFlow/conn.log 로 beacon 주기성(jitter 낮음) 탐지. MITRE T1071.001(Application
        Layer Protocol: Web), T1090(Proxy), T1568(Dynamic Resolution). 호스트 로그(process
        creation·DNS query)와 교차 검증'
      success_criteria:
      - C2 시그니처 grep 패턴 제시
      - 활성 연결(ss/netstat) 집계
      - DNS 이상 또는 beaconing 탐지
      acceptable_methods:
      - grep -iE c2|beacon|trojan fast.log
      - ss -tn 또는 netstat -antp
      - Zeek conn.log + dns.log analysis
      - RITA (Real Intelligence Threat Analytics) beaconing 탐지
      - Suricata ja3/ja3s fingerprint 매칭
      negative_signs:
      - 단일 도구만 사용(교차 없음)
      - DNS anomaly 체크 누락
      - active connection 확인 없음
  target_vm: secu
  script: 'echo "=== Outbound Traffic Analysis ===" && echo "[Suricata C2/Trojan alerts]"
    && grep -i "trojan\|c2\|beacon\|backdoor\|shellcode" /var/log/suricata/fast.log
    2>/dev/null | tail -5 && echo "" && echo "[Active outbound connections]" && ss
    -tn state established 2>/dev/null | awk "{print \$5}" | grep -vE "^(10\.|127\.|$)"
    | sort | uniq -c | sort -rn | head -10 && echo "" && echo "[DNS query anomaly
    check]" && tail -200 /var/log/suricata/eve.json 2>/dev/null | python3 -c " import
    sys,json for l in sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"dns\":
    q=e.get(\"dns\",{}).get(\"rrname\",\"\") if len(q)>50: print(f\"SUSPICIOUS LONG
    DNS: {q[:80]}\") except: pass " 2>/dev/null && echo "" && echo "C2 analysis complete"'
  risk_level: low
  bastion_prompt: '시나리오 2: 내부 서버에서 비정상적인 아웃바운드 트래픽이 감지되었다. Suricata와 시스템 로그를 교차 분석하여
    C2 통신 여부를 판단해줘'
- order: 5
  instruction: 위협 헌팅을 수행하라. 모든 서버에서 지속성 메커니즘(cron, systemd, SSH authorized_keys)을
    점검하고 비정상 항목을 식별하라.
  hint: 각 서버의 crontab, systemd 서비스, authorized_keys를 일괄 점검한다.
  category: hunting
  points: 10
  answer: '🤖 프롬프트: 위협 헌팅을 수행해줘

    📎 참고 (CLI): echo "=== Threat Hunting: Persistence ===" && echo "--- Local Host
    ---" && echo "[Crontabs]" && for u in $(cut -f1 -d: /etc/passwd); do crontab -u
    $u -l 2>/dev/null | grep -v "^#" | grep -v "^$"; done && echo "[Suspicious systemd]"
    && systemctl list-units --type=service --state=running 2>/dev/null | grep -vE
    "(ssh|cron|rsyslog|wazuh|suricata|nftables|apache|docker|network|system)" | head
    -5 && echo "[SSH keys]" && for f in /home/*/.ssh/authorized_keys /root/.ssh/authorized_keys;
    do test -f $f && echo "$f: $(wc -l < $f) keys"; done 2>/dev/null && echo "" &&
    echo "Persistence hunting complete"'
  answer_detail: 능동적 헌팅은 알림 없이도 잠복 위협을 찾는다. crontab의 비인가 항목, 비표준 systemd 서비스, 예상외의
    SSH 키가 핵심 점검 대상이다. 모든 서버를 체계적으로 점검하여 공격자의 지속성 메커니즘을 발견한다.
  verify:
    type: output_contains
    expect:
    - Persistence hunting
    - crontab
    - authorized_keys
    - systemd
    - PEAK
    semantic:
      intent: 'Persistence Threat Hunting — proactive hunt (no alert required): (1)
        Crontabs: for u in $(cut -f1 -d: /etc/passwd); do crontab -u $u -l 2>/dev/null;
        done + /etc/cron.* 디렉토리, /var/spool/cron/ 내용, @reboot·/tmp·/dev/shm 경로 수상
        (2) Systemd services: systemctl list-units --type=service --state=running
        에서 정상 목록 제외 후 신규 서비스, /etc/systemd/system/*.service 와 ~/.config/systemd/user/
        (3) SSH authorized_keys: /root/.ssh/ 와 /home/*/.ssh/ 의 key count·fingerprint·known
        hosts 비교. MITRE T1053.003/T1098.004/T1543.002 기법. hypothesis-driven hunting
        - PEAK(Prepare, Execute, Act, Knowledge) 방법론'
      success_criteria:
      - cron·systemd·authorized_keys 3가지 persistence 포인트 점검
      - 각 point 의 구체 점검 명령
