lab_id: soc-adv-ai-week15
title: 종합 실전 - SOC 운영 시뮬레이션 (AI 지원)
version: ai
course: soc-adv-ai
week: 15
description: 14주간 학습한 모든 기술을 통합하여 실제 SOC 운영 환경에서의 종합 시뮬레이션을 수행한다. 실시간 모니터링, 인시던트 대응, 위협 헌팅, IOC 관리, KPI 측정을 포괄한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SOC 운영의 전체 프로세스를 독립적으로 수행할 수 있다
- 다중 공격 시나리오에 대해 체계적으로 대응할 수 있다
- 종합 보안 보고서를 작성할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SOC 환경 점검을 수행하라. Wazuh Manager, Suricata, nftables의 상태를 확인하고 모든 보안 도구가 정상 동작하는지 검증하라.
  hint: 각 도구의 프로세스 상태와 로그 수집 상태를 확인한다.
  category: operation
  points: 10
  answer: echo '=== SOC Environment Check ===' && echo '[Wazuh Manager]' && systemctl is-active wazuh-manager 2>/dev/null && /var/ossec/bin/agent_control -l 2>/dev/null | tail -5 && echo '' && echo '[Wazuh
    Alerts]' && tail -5 /var/ossec/logs/alerts/alerts.json 2>/dev/null | python3 -m json.tool 2>/dev/null | head -10 && echo '' && echo 'Environment check complete'
  answer_detail: SOC 운영의 첫 임무는 보안 도구 상태 확인이다. Wazuh 에이전트 연결 상태, Suricata 패킷 처리 통계, nftables 룰 수를 확인하여 탐지 인프라가 정상 동작하는지 검증한다.
  verify:
    type: output_contains
    expect: Environment Check
  target_vm: siem
  script: echo '=== SOC Environment Check ===' && echo '[Wazuh Manager]' && systemctl is-active wazuh-manager 2>/dev/null && /var/ossec/bin/agent_control -l 2>/dev/null | tail -5 && echo '' && echo '[Wazuh
    Alerts]' && tail -5 /var/ossec/logs/alerts/alerts.json 2>/dev/null | python3 -m json.tool 2>/dev/null | head -10 && echo '' && echo 'Environment check complete'
  risk_level: low
- order: 2
  instruction: '시나리오 1: 외부에서 웹서버 공격이 감지되었다. Suricata eve.json에서 최근 HTTP 관련 알림을 분석하고, 공격 유형/소스/성공 여부를 판단하라.'
  hint: eve.json에서 alert 이벤트 중 http 관련 항목을 필터링한다.
  category: detection
  points: 10
  answer: 'echo "=== Web Attack Analysis ===" && tail -500 /var/log/suricata/eve.json 2>/dev/null | python3 -c " import sys,json for l in sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"alert\"
    and \"http\" in str(e.get(\"alert\",{}).get(\"category\",\"\")): a=e[\"alert\"] print(f\"{e.get(\"timestamp\",\"\")[:19]} | {e.get(\"src_ip\",\"\")}:{e.get(\"src_port\",\"\")} -> {e.get(\"dest_ip\",\"\")}:{e.get(\"dest_port\",\"\")}
    | {a.get(\"signature\",\"\")[:60]} | Severity:{a.get(\"severity\",\"\")}\") except: pass " 2>/dev/null | tail -10 && echo "" && echo "MITRE ATT&CK: T1190 (Exploit Public-Facing Application)"'
  answer_detail: 웹 공격 분석은 Suricata 알림의 시그니처, 소스 IP, 목적지, 심각도를 종합 분석한다. HTTP 카테고리 알림에서 SQLi, XSS, 디렉토리 트래버설 등을 식별하고, 응답 코드로 공격 성공 여부를 판단한다.
  verify:
    type: output_contains
    expect: Web Attack
  target_vm: secu
  script: 'echo "=== Web Attack Analysis ===" && tail -500 /var/log/suricata/eve.json 2>/dev/null | python3 -c " import sys,json for l in sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"alert\"
    and \"http\" in str(e.get(\"alert\",{}).get(\"category\",\"\")): a=e[\"alert\"] print(f\"{e.get(\"timestamp\",\"\")[:19]} | {e.get(\"src_ip\",\"\")}:{e.get(\"src_port\",\"\")} -> {e.get(\"dest_ip\",\"\")}:{e.get(\"dest_port\",\"\")}
    | {a.get(\"signature\",\"\")[:60]} | Severity:{a.get(\"severity\",\"\")}\") except: pass " 2>/dev/null | tail -10 && echo "" && echo "MITRE ATT&CK: T1190 (Exploit Public-Facing Application)"'
  risk_level: low
- order: 3
  instruction: '시나리오 1 대응: 공격 소스 IP를 nftables로 차단하고, Suricata에 해당 IP의 추가 탐지 규칙을 배포하라.'
  hint: nft add element로 차단 목록에 추가하고, Suricata 커스텀 룰을 작성한다.
  category: response
  points: 12
  answer: 'ATTACKER_IP="203.0.113.50" && echo "=== Incident Response: Web Attack ===" && echo "[1] Block attacker IP:" && sudo nft add rule inet filter input ip saddr $ATTACKER_IP drop 2>/dev/null && echo
    "IP blocked: $ATTACKER_IP" && echo "" && echo "[2] Deploy Suricata detection rule:" && echo "alert http $ATTACKER_IP any -> \$HOME_NET any (msg:\"CUSTOM: Blocked attacker resumed activity\"; flow:to_server,established;
    sid:9100001; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules && echo "" && echo "[3] Verify block:" && sudo nft list ruleset 2>/dev/null | grep 203.0.113 && echo "" && echo "Response complete
    - attacker blocked and monitored"'
  answer_detail: 인시던트 대응은 차단(Contain) -> 탐지 강화(Monitor) -> 검증(Verify) 순서로 실행한다. nftables로 즉시 차단하고, Suricata 커스텀 룰로 해당 IP의 향후 활동을 추가 모니터링한다.
  verify:
    type: output_contains
    expect: Response complete
  target_vm: secu
  script: 'ATTACKER_IP="203.0.113.50" && echo "=== Incident Response: Web Attack ===" && echo "[1] Block attacker IP:" && sudo nft add rule inet filter input ip saddr $ATTACKER_IP drop 2>/dev/null && echo
    "IP blocked: $ATTACKER_IP" && echo "" && echo "[2] Deploy Suricata detection rule:" && echo "alert http $ATTACKER_IP any -> \$HOME_NET any (msg:\"CUSTOM: Blocked attacker resumed activity\"; flow:to_server,established;
    sid:9100001; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules && echo "" && echo "[3] Verify block:" && sudo nft list ruleset 2>/dev/null | grep 203.0.113 && echo "" && echo "Response complete
    - attacker blocked and monitored"'
  risk_level: low
- order: 4
  instruction: '시나리오 2: 내부 서버에서 비정상적인 아웃바운드 트래픽이 감지되었다. Suricata와 시스템 로그를 교차 분석하여 C2 통신 여부를 판단하라.'
  hint: eve.json에서 outbound 알림과 ss 명령의 외부 연결을 비교한다.
  category: detection
  points: 10
  answer: 'echo "=== Outbound Traffic Analysis ===" && echo "[Suricata C2/Trojan alerts]" && grep -i "trojan\|c2\|beacon\|backdoor\|shellcode" /var/log/suricata/fast.log 2>/dev/null | tail -5 && echo ""
    && echo "[Active outbound connections]" && ss -tn state established 2>/dev/null | awk "{print \$5}" | grep -vE "^(10\.|127\.|$)" | sort | uniq -c | sort -rn | head -10 && echo "" && echo "[DNS query
    anomaly check]" && tail -200 /var/log/suricata/eve.json 2>/dev/null | python3 -c " import sys,json for l in sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"dns\": q=e.get(\"dns\",{}).get(\"rrname\",\"\")
    if len(q)>50: print(f\"SUSPICIOUS LONG DNS: {q[:80]}\") except: pass " 2>/dev/null && echo "" && echo "C2 analysis complete"'
  answer_detail: 아웃바운드 트래픽 이상은 침해의 핵심 지표이다. Suricata의 C2/Trojan 시그니처 매칭, 비표준 외부 연결, DNS 쿼리 길이 이상(터널링 의심)을 교차 분석하여 C2 통신 여부를 종합 판단한다.
  verify:
    type: output_contains
    expect: C2 analysis
  target_vm: secu
  script: 'echo "=== Outbound Traffic Analysis ===" && echo "[Suricata C2/Trojan alerts]" && grep -i "trojan\|c2\|beacon\|backdoor\|shellcode" /var/log/suricata/fast.log 2>/dev/null | tail -5 && echo ""
    && echo "[Active outbound connections]" && ss -tn state established 2>/dev/null | awk "{print \$5}" | grep -vE "^(10\.|127\.|$)" | sort | uniq -c | sort -rn | head -10 && echo "" && echo "[DNS query
    anomaly check]" && tail -200 /var/log/suricata/eve.json 2>/dev/null | python3 -c " import sys,json for l in sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"dns\": q=e.get(\"dns\",{}).get(\"rrname\",\"\")
    if len(q)>50: print(f\"SUSPICIOUS LONG DNS: {q[:80]}\") except: pass " 2>/dev/null && echo "" && echo "C2 analysis complete"'
  risk_level: low
- order: 5
  instruction: 위협 헌팅을 수행하라. 모든 서버에서 지속성 메커니즘(cron, systemd, SSH authorized_keys)을 점검하고 비정상 항목을 식별하라.
  hint: 각 서버의 crontab, systemd 서비스, authorized_keys를 일괄 점검한다.
  category: hunting
  points: 10
  answer: 'echo "=== Threat Hunting: Persistence ===" && echo "--- Local Host ---" && echo "[Crontabs]" && for u in $(cut -f1 -d: /etc/passwd); do crontab -u $u -l 2>/dev/null | grep -v "^#" | grep -v "^$";
    done && echo "[Suspicious systemd]" && systemctl list-units --type=service --state=running 2>/dev/null | grep -vE "(ssh|cron|rsyslog|wazuh|suricata|nftables|apache|docker|network|system)" | head -5
    && echo "[SSH keys]" && for f in /home/*/.ssh/authorized_keys /root/.ssh/authorized_keys; do test -f $f && echo "$f: $(wc -l < $f) keys"; done 2>/dev/null && echo "" && echo "Persistence hunting complete"'
  answer_detail: 능동적 헌팅은 알림 없이도 잠복 위협을 찾는다. crontab의 비인가 항목, 비표준 systemd 서비스, 예상외의 SSH 키가 핵심 점검 대상이다. 모든 서버를 체계적으로 점검하여 공격자의 지속성 메커니즘을 발견한다.
  verify:
    type: output_contains
    expect: Persistence hunting
  target_vm: siem
  script: 'echo "=== Threat Hunting: Persistence ===" && echo "--- Local Host ---" && echo "[Crontabs]" && for u in $(cut -f1 -d: /etc/passwd); do crontab -u $u -l 2>/dev/null | grep -v "^#" | grep -v "^$";
    done && echo "[Suspicious systemd]" && systemctl list-units --type=service --state=running 2>/dev/null | grep -vE "(ssh|cron|rsyslog|wazuh|suricata|nftables|apache|docker|network|system)" | head -5
    && echo "[SSH keys]" && for f in /home/*/.ssh/authorized_keys /root/.ssh/authorized_keys; do test -f $f && echo "$f: $(wc -l < $f) keys"; done 2>/dev/null && echo "" && echo "Persistence hunting complete"'
  risk_level: low
- order: 6
  instruction: IOC를 통합 관리하라. 오늘 대응 과정에서 수집된 IOC(IP, 도메인)를 Wazuh CDB 리스트와 Suricata 룰에 동시 배포하라.
  hint: Wazuh CDB 리스트에 IP를 추가하고, Suricata에 IP 기반 탐지 룰을 추가한다.
  category: implementation
  points: 10
  answer: echo '=== IOC Deployment ===' && echo '203.0.113.50:blocked_attacker' > /tmp/ioc_list.txt && echo '198.51.100.1:c2_suspect' >> /tmp/ioc_list.txt && echo '' && echo '[1] Deploy to Wazuh CDB:' &&
    cat /tmp/ioc_list.txt | sudo tee -a /var/ossec/etc/lists/blocked_ips && echo 'Wazuh CDB updated' && echo '' && echo '[2] IOC list saved for cross-tool deployment:' && cat /tmp/ioc_list.txt && echo ''
    && echo 'IOC deployment complete'
  answer_detail: IOC를 Wazuh CDB(로그 상관분석), Suricata(네트워크 탐지), nftables(차단)에 동시 배포하면 다층 방어가 완성된다. 하나의 IOC를 여러 탐지/차단 도구에 적용하여 탐지 확률을 극대화한다.
  verify:
    type: output_contains
    expect: IOC deployment
  target_vm: siem
  script: echo '=== IOC Deployment ===' && echo '203.0.113.50:blocked_attacker' > /tmp/ioc_list.txt && echo '198.51.100.1:c2_suspect' >> /tmp/ioc_list.txt && echo '' && echo '[1] Deploy to Wazuh CDB:' &&
    cat /tmp/ioc_list.txt | sudo tee -a /var/ossec/etc/lists/blocked_ips && echo 'Wazuh CDB updated' && echo '' && echo '[2] IOC list saved for cross-tool deployment:' && cat /tmp/ioc_list.txt && echo ''
    && echo 'IOC deployment complete'
  risk_level: low
- order: 7
  instruction: Wazuh 알림과 Suricata 알림을 교차 분석하여 상관관계를 파악하라. 동일 소스 IP에서 발생한 다중 도구 알림을 통합하라.
  hint: Wazuh alerts.json과 Suricata eve.json에서 동일 IP의 알림을 매칭한다.
  category: analysis
  points: 10
  answer: 'echo "=== Cross-Tool Correlation ===" && echo "[Wazuh top alert source IPs]" && tail -200 /var/ossec/logs/alerts/alerts.json 2>/dev/null | python3 -c " import sys,json ips={} for l in sys.stdin:
    try: e=json.loads(l) ip=e.get(\"data\",{}).get(\"srcip\",e.get(\"srcip\",\"\")) if ip: ips[ip]=ips.get(ip,0)+1 except: pass for ip,c in sorted(ips.items(),key=lambda x:-x[1])[:5]: print(f\"{c:5d} alerts
    from {ip}\") " 2>/dev/null && echo "" && echo "Correlation: Match IPs appearing in both tools for confirmed threats"'
  answer_detail: 다중 도구 상관분석은 오탐을 줄이고 실제 위협을 확인하는 핵심 기법이다. 동일 IP가 Suricata(네트워크)와 Wazuh(호스트) 양쪽에서 알림을 유발하면 실제 공격일 확률이 높다.
  verify:
    type: output_contains
    expect: Correlation
  target_vm: siem
  script: 'echo "=== Cross-Tool Correlation ===" && echo "[Wazuh top alert source IPs]" && tail -200 /var/ossec/logs/alerts/alerts.json 2>/dev/null | python3 -c " import sys,json ips={} for l in sys.stdin:
    try: e=json.loads(l) ip=e.get(\"data\",{}).get(\"srcip\",e.get(\"srcip\",\"\")) if ip: ips[ip]=ips.get(ip,0)+1 except: pass for ip,c in sorted(ips.items(),key=lambda x:-x[1])[:5]: print(f\"{c:5d} alerts
    from {ip}\") " 2>/dev/null && echo "" && echo "Correlation: Match IPs appearing in both tools for confirmed threats"'
  risk_level: low
- order: 8
  instruction: KPI를 측정하라. 오늘 시뮬레이션의 MTTD(탐지 시간), MTTR(대응 시간), 처리 알림 수, 인시던트 수를 계산하라.
  hint: 각 인시던트의 시작/종료 타임스탬프를 기반으로 계산한다.
  category: measurement
  points: 10
  answer: "cat > /tmp/soc_kpi.txt << 'EOF'\n=== SOC KPI Report ===\nDate: 2026-04-06\n\n[Incident Metrics]\nIncidents handled: 2 (Web Attack, C2 Suspect)\nP1 incidents: 1 (Web SQLi - Critical)\nP2 incidents:\
    \ 1 (Outbound anomaly - High)\n\n[Time Metrics]\nMTTD (Mean Time to Detect):\n  Scenario 1 (Web Attack): ~5 min (Suricata real-time)\n  Scenario 2 (C2 Traffic): ~10 min (log analysis)\n  Average MTTD:\
    \ 7.5 min\n\nMTTR (Mean Time to Respond):\n  Scenario 1: ~8 min (block + rule deploy)\n  Scenario 2: ~15 min (analysis + block)\n  Average MTTR: 11.5 min\n\n[Volume Metrics]\nTotal alerts reviewed:\
    \ ~200\nFalse positives: ~30%\nTrue positives actioned: 2 incidents\n\n[Hunting Metrics]\nHunting hypotheses tested: 1 (Persistence)\nServers scanned: 3\nFindings: 0 confirmed threats\n\n[Benchmarks]\n\
    Industry avg MTTD: 197 days -> Our MTTD: 7.5 min (excellent)\nIndustry avg MTTR: 69 days -> Our MTTR: 11.5 min (excellent)\nEOF\ncat /tmp/soc_kpi.txt"
  answer_detail: KPI 측정은 SOC 운영의 성과를 객관적으로 보여준다. MTTD 7.5분, MTTR 11.5분은 산업 평균(MTTD 197일, MTTR 69일) 대비 매우 우수하지만, 이는 실습 환경의 소규모 특성 때문이다. 실전에서는 알림 볼륨과 복잡성이 증가한다.
  verify:
    type: output_contains
    expect: SOC KPI
  target_vm: siem
  script: "cat > /tmp/soc_kpi.txt << 'EOF'\n=== SOC KPI Report ===\nDate: 2026-04-06\n\n[Incident Metrics]\nIncidents handled: 2 (Web Attack, C2 Suspect)\nP1 incidents: 1 (Web SQLi - Critical)\nP2 incidents:\
    \ 1 (Outbound anomaly - High)\n\n[Time Metrics]\nMTTD (Mean Time to Detect):\n  Scenario 1 (Web Attack): ~5 min (Suricata real-time)\n  Scenario 2 (C2 Traffic): ~10 min (log analysis)\n  Average MTTD:\
    \ 7.5 min\n\nMTTR (Mean Time to Respond):\n  Scenario 1: ~8 min (block + rule deploy)\n  Scenario 2: ~15 min (analysis + block)\n  Average MTTR: 11.5 min\n\n[Volume Metrics]\nTotal alerts reviewed:\
