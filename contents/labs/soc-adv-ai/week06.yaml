lab_id: soc-adv-ai-week06
title: 위협 헌팅 - 가설 기반 능동 탐지 (AI 지원)
version: ai
course: soc-adv-ai
week: 6
description: 가설 기반 위협 헌팅 방법론을 적용하여 잠복 위협을 능동적으로 탐색하는 실습. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 위협 헌팅의 방법론과 프로세스를 이해한다
- 가설 기반 헌팅을 실제 환경에서 수행할 수 있다
- 헌팅 결과를 탐지 룰로 전환할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 위협 헌팅의 3가지 접근법(가설 기반, IOC 기반, 데이터 기반)을 비교 분석하고, 각 접근법의 적용 시나리오를 정의하라.
  hint: Sqrrl의 Threat Hunting Maturity Model(HMM)을 참고하라
  category: analysis
  points: 8
  answer: '🤖 프롬프트: 위협 헌팅의 3가지 접근법(가설 기반, IOC 기반, 데이터 기반)을 비교 분석하고, 각 접근법의 적용 시나리오를
    정의해줘

    📎 참고 (CLI): 가설기반: ATT&CK에서 가설 도출→데이터 검증(APT 탐지에 적합). IOC기반: 알려진 IOC 검색(즉각적 위협
    확인). 데이터기반: 이상치/통계적 편차 탐색(알려지지 않은 위협)'
  answer_detail: 세 접근법은 상호 보완적이다. 가설 기반은 ATT&CK 프레임워크와 결합할 때 가장 효과적이고, IOC 기반은 빠른
    확인에, 데이터 기반은 미지의 위협 발견에 유용하다.
  verify:
    type: output_contains
    expect: 가설
  target_vm: siem
  script: '가설기반: ATT&CK에서 가설 도출→데이터 검증(APT 탐지에 적합). IOC기반: 알려진 IOC 검색(즉각적 위협 확인).
    데이터기반: 이상치/통계적 편차 탐색(알려지지 않은 위협)'
  risk_level: low
  bastion_prompt: 위협 헌팅의 3가지 접근법(가설 기반, IOC 기반, 데이터 기반)을 비교 분석하고, 각 접근법의 적용 시나리오를
    정의해줘
- order: 2
  instruction: 헌팅 가설을 수립하라. 'C2 통신이 DNS 터널링을 통해 이루어지고 있다'는 가설을 세우고, 검증에 필요한 데이터 소스와
    분석 기법을 정의하라.
  hint: 'DNS 터널링의 특성: 긴 서브도메인, 높은 쿼리 빈도, TXT 레코드 사용'
  category: planning
  points: 10
  answer: '🤖 프롬프트: 헌팅 가설을 수립하라. ''C2 통신이 DNS 터널링을 통해 이루어지고 있다''는 가설을 세우고, 검증에 필요한
    데이터 소스와 분석 기법을 정의해줘

    📎 참고 (CLI): 가설: DNS 터널링 C2. 데이터소스: DNS 쿼리 로그, 네트워크 트래픽. 분석기법: 1) 서브도메인 길이 분포,
    2) 도메인별 쿼리 빈도, 3) TXT 레코드 비율, 4) 엔트로피 분석'
  answer_detail: DNS 터널링은 정상 DNS 트래픽에 데이터를 숨기는 기법이다. 서브도메인에 인코딩된 데이터를 포함하므로 길이가 비정상적으로
    길고, 쿼리 빈도가 높으며, 엔트로피가 높다.
  verify:
    type: output_contains
    expect: DNS
  target_vm: siem
  script: '가설: DNS 터널링 C2. 데이터소스: DNS 쿼리 로그, 네트워크 트래픽. 분석기법: 1) 서브도메인 길이 분포, 2) 도메인별
    쿼리 빈도, 3) TXT 레코드 비율, 4) 엔트로피 분석'
  risk_level: low
  bastion_prompt: 헌팅 가설을 수립하라. 'C2 통신이 DNS 터널링을 통해 이루어지고 있다'는 가설을 세우고, 검증에 필요한 데이터
    소스와 분석 기법을 정의해줘
- order: 3
  instruction: 실습 환경의 DNS 로그를 수집하라. Wazuh(10.20.30.100)에서 DNS 관련 이벤트를 검색하고, 도메인별 쿼리
    빈도를 집계하라.
  hint: Wazuh API에서 rule.groups에 'dns'가 포함된 알림을 검색하라
  category: collection
  points: 10
  answer: '🤖 프롬프트: 실습 환경의 DNS 로그를 수집하라. Wazuh(10.20.30.100)에서 DNS 관련 이벤트를 검색하고, 도메인별
    쿼리 빈도를 집계해줘

    📎 참고 (CLI): DNS 이벤트 수집 결과: 도메인별 쿼리 빈도 Top 10, 비정상적으로 긴 서브도메인 존재 여부 확인'
  answer_detail: DNS 로그는 위협 헌팅의 핵심 데이터 소스이다. 쿼리 빈도가 비정상적으로 높거나, 서브도메인이 30자 이상인 경우,
    또는 알려지지 않은 도메인에 대한 반복적 쿼리는 의심 지표이다.
  verify:
    type: output_contains
    expect: DNS
  target_vm: siem
  script: 'DNS 이벤트 수집 결과: 도메인별 쿼리 빈도 Top 10, 비정상적으로 긴 서브도메인 존재 여부 확인'
  risk_level: low
  bastion_prompt: 실습 환경의 DNS 로그를 수집하라. Wazuh(10.20.30.100)에서 DNS 관련 이벤트를 검색하고, 도메인별
    쿼리 빈도를 집계해줘
- order: 4
  instruction: 네트워크 비콘 활동을 헌팅하라. 내부 호스트의 외부 통신 패턴에서 주기적 비콘(beaconing) 활동을 식별하라. 통신
    간격의 표준편차를 계산하라.
  hint: 주기적 통신은 일정한 간격으로 발생하므로 표준편차가 낮다
  category: hunting
  points: 12
  answer: '🤖 프롬프트: 네트워크 비콘 활동을 헌팅해줘

    📎 참고 (CLI): 비콘 탐지: 특정 외부 IP에 대한 통신 간격 분석 → 간격 평균 60초, 표준편차 2초 이하면 비콘 의심. jitter가
    있어도 분포가 정규분포면 의심'
  answer_detail: C2 비콘은 일정 간격으로 체크인하므로 통신 간격의 분산이 낮다. jitter(±10%)를 추가해도 통계적으로 구분
    가능하다. 정상 트래픽은 사용자 행위에 따라 불규칙하다.
  verify:
    type: output_contains
    expect: 비콘
  target_vm: siem
  script: '비콘 탐지: 특정 외부 IP에 대한 통신 간격 분석 → 간격 평균 60초, 표준편차 2초 이하면 비콘 의심. jitter가 있어도
    분포가 정규분포면 의심'
  risk_level: low
  bastion_prompt: 네트워크 비콘 활동을 헌팅해줘
- order: 5
  instruction: 비정상 프로세스 실행을 헌팅하라. Wazuh의 syscheck와 rootcheck 데이터에서 비정상적인 프로세스 생성,
    SUID 파일, 숨겨진 프로세스를 탐색하라.
  hint: 정상 베이스라인과 비교하여 새로 추가된 SUID 파일이나 비정상 경로의 실행 파일을 찾아라
  category: hunting
  points: 10
  answer: '🤖 프롬프트: 비정상 프로세스 실행을 헌팅하라. Wazuh의 syscheck와 rootcheck 데이터에서 비정상적인 프로세스
    생성, SUID 파일, 숨겨진 프로세스를 탐색해줘

    📎 참고 (CLI): 헌팅 결과: 1) 비정상 경로(/tmp, /dev/shm)의 실행파일, 2) 신규 SUID 파일, 3) 커널 모듈 변경,
    4) 숨겨진 디렉토리(.로 시작하는 비정상 디렉토리)'
  answer_detail: 비정상 프로세스 헌팅은 호스트 레벨의 침해 지표를 탐색한다. /tmp이나 /dev/shm에서 실행되는 바이너리, 예상치
    못한 SUID 파일, 숨겨진 디렉토리는 공격자의 일반적 행동 패턴이다.
  verify:
    type: output_contains
    expect: 프로세스
  target_vm: siem
  script: '헌팅 결과: 1) 비정상 경로(/tmp, /dev/shm)의 실행파일, 2) 신규 SUID 파일, 3) 커널 모듈 변경, 4)
    숨겨진 디렉토리(.로 시작하는 비정상 디렉토리)'
  risk_level: low
  bastion_prompt: 비정상 프로세스 실행을 헌팅하라. Wazuh의 syscheck와 rootcheck 데이터에서 비정상적인 프로세스 생성,
    SUID 파일, 숨겨진 프로세스를 탐색해줘
- order: 6
  instruction: 횡적 이동(Lateral Movement) 흔적을 헌팅하라. SSH 로그, 네트워크 연결 로그에서 내부 호스트 간 비정상적인
    통신 패턴을 탐색하라.
  hint: 정상적인 내부 통신 패턴을 먼저 파악하고, 편차를 찾아라
  category: hunting
  points: 12
  answer: '🤖 프롬프트: 횡적 이동(Lateral Movement) 흔적을 헌팅하라. SSH 로그, 네트워크 연결 로그에서 내부 호스트 간
    비정상적인 통신 패턴을 탐색해줘

    📎 참고 (CLI): 헌팅 기법: 1) 비정상 SSH 연결(새로운 소스-목적지 쌍), 2) 관리포트(22,3389,5985) 통신 패턴, 3)
    서비스 계정의 대화형 로그인, 4) 비업무시간 내부 통신'
  answer_detail: 횡적 이동은 침해 사고의 핵심 단계이다. 정상적인 내부 통신 베이스라인을 구축하고, 새로운 통신 패턴(이전에 없던 호스트
    간 연결)을 식별하면 초기 횡적 이동을 탐지할 수 있다.
  verify:
    type: output_contains
    expect: 횡적
  target_vm: siem
  script: '헌팅 기법: 1) 비정상 SSH 연결(새로운 소스-목적지 쌍), 2) 관리포트(22,3389,5985) 통신 패턴, 3) 서비스
    계정의 대화형 로그인, 4) 비업무시간 내부 통신'
  risk_level: low
  bastion_prompt: 횡적 이동(Lateral Movement) 흔적을 헌팅하라. SSH 로그, 네트워크 연결 로그에서 내부 호스트 간
    비정상적인 통신 패턴을 탐색해줘
- order: 7
  instruction: 데이터 유출(Exfiltration) 헌팅을 수행하라. 외부로의 대용량 데이터 전송, 비정상 프로토콜 사용, 인코딩된 데이터
    전송을 탐색하라.
  hint: 아웃바운드 트래픽 볼륨 이상치, DNS TXT 레코드 크기, ICMP 페이로드 크기를 확인하라
  category: hunting
  points: 10
  answer: '🤖 프롬프트: 데이터 유출(Exfiltration) 헌팅을 수행해줘

    📎 참고 (CLI): 헌팅 기법: 1) 호스트별 아웃바운드 트래픽 Top 10, 2) 비정상 포트 사용, 3) DNS 쿼리 크기 이상치, 4)
    ICMP 페이로드 이상, 5) 업무시간 외 대량 전송'
  answer_detail: 데이터 유출은 다양한 채널(HTTP, DNS, ICMP, 클라우드 스토리지)을 통해 이루어질 수 있다. 각 채널별 정상
    패턴을 파악하고, 통계적 이상치를 탐색하는 것이 핵심이다.
  verify:
    type: output_contains
    expect: 유출
  target_vm: siem
  script: '헌팅 기법: 1) 호스트별 아웃바운드 트래픽 Top 10, 2) 비정상 포트 사용, 3) DNS 쿼리 크기 이상치, 4) ICMP
    페이로드 이상, 5) 업무시간 외 대량 전송'
  risk_level: low
  bastion_prompt: 데이터 유출(Exfiltration) 헌팅을 수행해줘
- order: 8
  instruction: 지속성(Persistence) 메커니즘을 헌팅하라. cron job, systemd service, .bashrc 변조,
    커널 모듈 등 Linux 환경의 지속성 메커니즘을 탐색하라.
  hint: 각 호스트의 crontab, systemd unit files, shell 초기화 파일을 베이스라인과 비교하라
  category: hunting
  points: 10
  answer: '🤖 프롬프트: 지속성(Persistence) 메커니즘을 헌팅하라. cron job, systemd service, .bashrc
    변조, 커널 모듈 등 Linux 환경의 지속성 메커니즘을 탐색해줘

    📎 참고 (CLI): 헌팅 대상: 1) /etc/crontab + /var/spool/cron/*, 2) /etc/systemd/system/*.service,
    3) ~/.bashrc,~/.profile 변경, 4) /etc/ld.so.preload, 5) /lib/modules/ 변경'
  answer_detail: 공격자는 재부팅이나 세션 종료 후에도 접근을 유지하기 위해 지속성 메커니즘을 설치한다. Linux에서는 cron, systemd,
    shell 초기화, 커널 모듈이 주요 벡터이며, 파일 무결성 모니터링과 병행하여 헌팅한다.
  verify:
    type: output_contains
    expect: Persistence
  target_vm: siem
  script: '헌팅 대상: 1) /etc/crontab + /var/spool/cron/*, 2) /etc/systemd/system/*.service,
