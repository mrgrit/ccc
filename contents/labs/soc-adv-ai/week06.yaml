  risk_level: low
  bastion_prompt: 지속성(Persistence) 메커니즘을 헌팅하라. cron job, systemd service, .bashrc
    변조, 커널 모듈 등 Linux 환경의 지속성 메커니즘을 탐색해줘
- order: 9
  instruction: 헌팅 노트북(Jupyter 형태)을 설계하라. 각 헌팅 가설에 대해 데이터 수집 쿼리, 분석 코드, 시각화, 결론을 포함하는
    재사용 가능한 헌팅 노트북 템플릿을 작성하라.
  hint: 가설→데이터수집→분석→시각화→결론→탐지룰전환의 구조를 따르라
  category: design
  points: 10
  answer: '🤖 프롬프트: 헌팅 노트북(Jupyter 형태)을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): 노트북 구조: 1) 가설 정의(ATT&CK 매핑), 2) 데이터 수집 쿼리(SIEM API), 3) 분석 코드(통계/패턴),
    4) 시각화(차트/그래프), 5) 결론(발견사항), 6) 탐지 룰 제안'
  answer_detail: 헌팅 노트북은 분석 과정을 문서화하고 재현 가능하게 만든다. 팀 간 공유와 지식 축적에 필수적이며, 성공적인 헌팅은
    자동화된 탐지 룰로 전환해야 한다.
  verify:
    type: output_contains
    expect: 노트북
  target_vm: siem
  script: '노트북 구조: 1) 가설 정의(ATT&CK 매핑), 2) 데이터 수집 쿼리(SIEM API), 3) 분석 코드(통계/패턴), 4)
