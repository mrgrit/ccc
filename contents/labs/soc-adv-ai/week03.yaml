    type: output_contains
    expect: mimikatz
    semantic:
      intent: 'SOC 심화 w3 s2 — Windows 프로세스 생성(Sysmon EventID 1) 기반 SIGMA 룰을 작성하라. Mimikatz 실행을 탐지하는 룰을 이미지명, 커맨드라인, 해시값 기준으로
