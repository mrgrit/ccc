      - 동등한 대체 도구 사용
      - SOC 심화 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 심화와 무관한 기법
  target_vm: siem
  script: 'logsource: category:process_creation, product:windows. detection: selection_img(Image|endswith: mimikatz.exe),
    selection_cmd(CommandLine|contains: sekurlsa), selection_hash(Hashes|contains: SHA256해시). condition: 1 of selection_*'
  risk_level: low
  bastion_prompt: Windows 프로세스 생성(Sysmon EventID 1) 기반 SIGMA 룰을 작성하라. Mimikatz 실행을 탐지하는 룰을 이미지명, 커맨드라인, 해시값 기준으로 작성하라.
