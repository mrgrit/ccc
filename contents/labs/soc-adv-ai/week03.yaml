lab_id: soc-adv-ai-week03
title: SIGMA 룰 심화 - 탐지 엔지니어링 (AI 지원)
version: ai
course: soc-adv-ai
week: 3
description: SIGMA 룰 언어를 활용한 플랫폼 독립적 탐지 로직 설계 및 다양한 SIEM 변환 실습. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SIGMA 룰 문법과 구조를 완전히 이해한다
- 복잡한 탐지 로직을 SIGMA로 구현할 수 있다
- SIGMA를 다양한 SIEM 포맷으로 변환할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SIGMA 룰의 핵심 구조를 분석하라. title, status, logsource, detection, condition, level, tags 각 필드의 역할과 문법을 정리하라.
  hint: SIGMA 공식 GitHub의 규격 문서를 참조하라
  category: analysis
  points: 8
  answer: '🤖 프롬프트: SIGMA 룰의 핵심 구조를 분석하라. title, status, logsource, detection, condition, level, tags 각 필드의 역할과 문법을 정리해줘

    📎 참고 (CLI): title: 룰 이름, status: experimental/test/stable, logsource(category/product/service): 로그 소스 추상화, detection(selection/filter/condition):
    탐지 로직, level: informational~critical, tags: ATT&CK ID'
  answer_detail: SIGMA는 SIEM 독립적인 탐지 룰 포맷이다. logsource 추상화로 동일 룰을 여러 SIEM에 적용할 수 있으며, detection 섹션의 selection/condition 조합으로
    복잡한 로직을 표현한다.
  verify:
    type: output_contains
    expect: logsource
    semantic:
      intent: 'SOC 심화 w3 s1 — SIGMA 룰의 핵심 구조를 분석하라. title, status, logsource, detection, condition, level, tags 각 필드의 역할과
        문법을 정리하라. (cmd: title: 룰 이름, status: experimental/test/stable, logsource(category/product/servic)'
      success_criteria:
      - '명령 실행: title: 룰 이름, status: experimental/test/stable, logsource(cat'
      - 결과 출력 또는 로그 확인
      - SOC 심화 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 심화 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 심화와 무관한 기법
  target_vm: siem
  script: 'title: 룰 이름, status: experimental/test/stable, logsource(category/product/service): 로그 소스 추상화, detection(selection/filter/condition):
    탐지 로직, level: informational~critical, tags: ATT&CK ID'
  risk_level: low
  bastion_prompt: SIGMA 룰의 핵심 구조를 분석하라. title, status, logsource, detection, condition, level, tags 각 필드의 역할과 문법을 정리해줘
- order: 2
  instruction: Windows 프로세스 생성(Sysmon EventID 1) 기반 SIGMA 룰을 작성하라. Mimikatz 실행을 탐지하는 룰을 이미지명, 커맨드라인, 해시값 기준으로 작성하라.
  hint: selection에 여러 조건을 OR로 결합하라
  category: implementation
  points: 10
  answer: '🤖 프롬프트: Windows 프로세스 생성(Sysmon EventID 1) 기반 SIGMA 룰을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): logsource: category:process_creation, product:windows. detection: selection_img(Image|endswith: mimikatz.exe),
    selection_cmd(CommandLine|contains: sekurlsa), selection_hash(Hashes|contains: SHA256해시). condition: 1 of selection_*'
  answer_detail: Mimikatz 탐지는 이미지명(쉬움, 우회 가능), 커맨드라인(중간), 해시(정확하지만 버전별 다름) 등 다층 접근이 필요하다. '1 of selection_*' 조건으로 하나라도 매칭되면
    탐지한다.
