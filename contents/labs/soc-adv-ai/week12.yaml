        -F arch=b64 -S execve -k process_exec (2) 파일 쓰기: -w /etc/passwd -p wa -k identity, -w /etc/shadow
        -p wa -k identity, -w /etc/sudoers -p wa -k privilege (3) 특권: -a always,exit -F arch=b64 -S setuid
