lab_id: soc-adv-ai-week12
title: 로그 엔지니어링 - 수집 파이프라인 최적화 (AI 지원)
version: ai
course: soc-adv-ai
week: 12
description: 효율적인 로그 수집, 파싱, 정규화, 저장 파이프라인을 설계하고 탐지 역량을 강화하는 실습. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 로그 엔지니어링의 원칙과 방법론을 이해한다
- 로그 파이프라인을 설계하고 최적화할 수 있다
- 탐지 목적에 맞는 로그 소스를 식별하고 구성할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 로그 소스 인벤토리를 작성하라. 실습 환경의 모든 시스템(secu, web, siem, attacker)에서 수집 가능한 로그 소스를 식별하고 우선순위를 매기라.
  hint: 각 시스템의 /var/log/ 디렉토리와 서비스별 로그 설정을 확인하라
  category: planning
  points: 8
  answer: '🤖 프롬프트: 로그 소스 인벤토리를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): 로그 소스: secu(nftables, suricata, auth), web(apache, modsecurity, app), siem(wazuh-manager,
    elasticsearch), attacker(api, subagent). 우선순위: 보안 도구 > 인증 > 서비스 > 시스템'
  answer_detail: 로그 인벤토리는 가시성의 기반이다. MITRE ATT&CK 데이터 소스 매핑으로 탐지에 필요한 로그를 식별하고, 수집 가능한 로그와의 갭을 분석한다.
  verify:
    type: output_contains
    expect: 인벤토리
    semantic:
      intent: '로그 소스 인벤토리 작성 — MITRE ATT&CK Data Sources 매핑 기반 체계: secu VM(nftables NAT/filter 로그, Suricata
        eve.json, /var/log/auth.log), web VM(Apache access/error, ModSecurity audit, 애플리케이션 로그), siem
        VM(wazuh-manager 로그, Elasticsearch cluster, alerts.json), attacker VM(CCC API 호출, SubAgent 실행).
        우선순위: 보안 도구(Suricata·Wazuh) > 인증(auth.log·sshd) > 서비스(apache·db) > 시스템(kernel·syslog). CIS Critical
        Control 8 로그 관리 표준'
      success_criteria:
      - 최소 4개 VM/계층 범위 식별
      - 각 VM 에서 2개 이상 구체 로그 소스 열거
      - 우선순위 기준(보안·인증·서비스 순) 명시
      acceptable_methods:
      - ls /var/log/ + systemctl list-units 로 실제 로그 소스 탐색
      - MITRE ATT&CK Data Sources(DS0009 Process, DS0022 File 등) 로 갭 분석
      - SOC Visibility Triad(NDR+EDR+SIEM) 관점
      - CIS Critical Control 8 로그 관리 기준
      - Wazuh dashboards.events.by_source 로 현황 확인
      negative_signs:
      - VM 범위 2개 이하
      - 로그 파일 경로 없이 일반론만
      - 우선순위 기준 부재
  target_vm: siem
  script: '로그 소스: secu(nftables, suricata, auth), web(apache, modsecurity, app), siem(wazuh-manager, elasticsearch),
    attacker(api, subagent). 우선순위: 보안 도구 > 인증 > 서비스 > 시스템'
  risk_level: low
  bastion_prompt: 로그 소스 인벤토리를 작성하라. 실습 환경의 모든 시스템(secu, web, siem, attacker)에서 수집 가능한 로그 소스를 식별하고 우선순위를
    매기라.
- order: 2
  instruction: Wazuh 에이전트 설정을 최적화하라. 각 서버의 Wazuh 에이전트가 수집하는 로그 소스를 확인하고, 누락된 중요 로그를 추가 설정하라.
  hint: ossec.conf의 <localfile> 섹션에서 모니터링 대상 파일을 확인/추가하라
  category: implementation
  points: 10
  answer: '🤖 프롬프트: Wazuh 에이전트 설정을 최적화해줘

    📎 참고 (CLI): 에이전트 설정: <localfile> 추가 - suricata eve.json, nftables log, apache access/error log, modsecurity
    audit log. log_format: json 또는 syslog'
  answer_detail: Wazuh 에이전트는 <localfile>로 정의된 파일만 모니터링한다. 보안 도구의 로그가 누락되면 탐지 능력이 크게 저하되므로, 설치된 모든 보안 도구의
    로그를 포함해야 한다.
  verify:
    type: output_contains
    expect: localfile
    semantic:
      intent: 'Wazuh agent ossec.conf 최적화 — <localfile> 섹션에 누락된 보안 로그 추가: Suricata(<location>/var/log/suricata/eve.json</location>
        + <log_format>json</log_format>), nftables(/var/log/nftables.log syslog), Apache(/var/log/apache2/access.log
        + error.log apache), ModSecurity audit(/var/log/apache2/modsec_audit.log multi-line). 재시작: systemctl
        restart wazuh-agent. 검증: /var/ossec/logs/ossec.log 에 Analyzing file 메시지 확인'
      success_criteria:
      - <localfile> XML 구조 정확히 기술
      - 최소 2개 보안 도구 로그(Suricata/ModSecurity/nftables)
      - log_format 필드(json/syslog/apache/multi-line) 명시
      acceptable_methods:
      - vim /var/ossec/etc/ossec.conf + <localfile> 블록 추가
      - puppet/ansible 로 conf 템플릿 배포
      - Wazuh API POST /groups/{group_id}/configuration
      - systemctl restart wazuh-agent 후 tail -f /var/ossec/logs/ossec.log 검증
      negative_signs:
      - <localfile> 태그 없이 일반 설명
      - log_format 지정 없음
      - 재시작·검증 절차 누락
  target_vm: siem
  script: '에이전트 설정: <localfile> 추가 - suricata eve.json, nftables log, apache access/error log, modsecurity
    audit log. log_format: json 또는 syslog'
  risk_level: low
  bastion_prompt: Wazuh 에이전트 설정을 최적화해줘
- order: 3
  instruction: 커스텀 디코더를 작성하라. Wazuh의 디코더(decoder)를 작성하여 비표준 형식의 로그를 파싱하라. CCC API 로그를 파싱하는 디코더를 구현하라.
  hint: /var/ossec/etc/decoders/local_decoder.xml에 커스텀 디코더를 추가하라
  category: implementation
  points: 12
  answer: '🤖 프롬프트: 커스텀 디코더를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): <decoder name=''ccc''><prematch>CCC|</prematch><regex>(\S+) (\S+) (\S+) (\S+)</regex><order>action,
    project_id, user, status</order></decoder>'
  answer_detail: 커스텀 디코더는 비표준 로그를 구조화하는 핵심이다. prematch로 로그를 식별하고, regex로 필드를 추출한다. 디코더와 룰을 연결하면 커스텀 알림을
    생성할 수 있다.
  verify:
    type: output_contains
    expect: decoder
    semantic:
      intent: 'Wazuh 커스텀 디코더 작성 — /var/ossec/etc/decoders/local_decoder.xml 에 <decoder name="ccc"> 정의.
        prematch 로 CCC| prefix 감지 → regex 로 필드 캡처(action·project_id·user·status) → order 로 필드명 매핑. 단계
        디코더(parent + child): 1차 로그 식별, 2차 필드 추출. /var/ossec/bin/wazuh-logtest 로 단위 테스트, 실제 로그 주입하여 decoded
        결과 JSON 확인'
      success_criteria:
      - prematch 또는 program_name 으로 로그 식별
      - regex 로 필드 추출 + order 매핑
      - wazuh-logtest 또는 재시작 검증 절차
      acceptable_methods:
      - <decoder name><prematch><regex><order> XML 구조
      - parent decoder + child decoder 2단계 설계
      - wazuh-logtest -f /path/to/sample.log
      - JSON_Decoder plugin_decoder 활용(구조화 로그)
      - Fluentd/Logstash grok 패턴으로 대체 파싱
      negative_signs:
      - XML 구조 없이 산문 설명
      - regex 캡처 그룹 없음
      - 테스트 절차 누락
  target_vm: siem
  script: <decoder name='ccc'><prematch>CCC|</prematch><regex>(\S+) (\S+) (\S+) (\S+)</regex><order>action,
    project_id, user, status</order></decoder>
  risk_level: low
  bastion_prompt: 커스텀 디코더를 작성하라. Wazuh의 디코더(decoder)를 작성하여 비표준 형식의 로그를 파싱하라. CCC API 로그를 파싱하는 디코더를 구현하라.
- order: 4
  instruction: 로그 정규화(normalization) 전략을 수립하라. 서로 다른 형식의 로그(syslog, JSON, CSV, 커스텀)를 통일된 스키마로 정규화하는 방안을
    설계하라.
  hint: ECS(Elastic Common Schema) 또는 OCSF(Open Cybersecurity Schema Framework)를 참고하라
  category: design
  points: 10
  answer: '🤖 프롬프트: 로그 정규화(normalization) 전략을 수립하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): 정규화 스키마: timestamp(UTC), source.ip, destination.ip, event.category, event.action, user.name,
    process.name, file.path. 각 로그 소스별 필드 매핑 테이블 작성'
  answer_detail: 로그 정규화는 이기종 소스의 로그를 통합 분석하는 전제 조건이다. 공통 스키마를 정의하면 하나의 상관분석 룰로 여러 소스의 이벤트를 탐지할 수 있다.
  verify:
    type: output_contains
    expect: 정규화
    semantic:
      intent: '로그 정규화(Normalization) — Elastic Common Schema(ECS) 또는 OCSF(Open Cybersecurity Schema Framework)
        표준 스키마 적용. 필수 필드: @timestamp(UTC ISO8601), source.ip·source.port, destination.ip·destination.port,
        event.category(authentication/network/file), event.action, user.name, process.name·process.pid,
        file.path·file.hash.sha256. 각 소스(Suricata/Apache/auth.log)별 필드 매핑 테이블 작성. Logstash mutate/rename
        또는 Wazuh rule fields 로 구현'
      success_criteria:
      - ECS 또는 OCSF 같은 표준 스키마 참조
      - 최소 5개 공통 필드 명시(timestamp/ip/user/action 등)
      - 소스별 매핑 전략 또는 테이블 언급
      acceptable_methods:
      - ECS 1.12+ 표준 필드 참조
      - OCSF (Splunk/AWS 주도) 스키마
      - Logstash filter mutate/rename/grok
      - Fluentd record_transformer
      - Wazuh custom rules 의 dynamic fields
      negative_signs:
      - 표준 스키마 없이 임의 필드명
      - 타임존(UTC) 명시 누락
      - 소스별 매핑 전략 없음
  target_vm: siem
  script: '정규화 스키마: timestamp(UTC), source.ip, destination.ip, event.category, event.action, user.name,
    process.name, file.path. 각 로그 소스별 필드 매핑 테이블 작성'
  risk_level: low
  bastion_prompt: 로그 정규화(normalization) 전략을 수립하라. 서로 다른 형식의 로그(syslog, JSON, CSV, 커스텀)를 통일된 스키마로 정규화하는
    방안을 설계하라.
- order: 5
  instruction: 로그 필터링과 집계 전략을 수립하라. 불필요한 로그를 필터링하고, 반복 이벤트를 집계하여 스토리지와 분석 효율을 개선하라.
  hint: '필터링 대상: 정상 헬스체크, 내부 모니터링, 정적 리소스 접근 등'
  category: optimization
  points: 10
  answer: '🤖 프롬프트: 로그 필터링과 집계 전략을 수립해줘

    📎 참고 (CLI): 필터링: 1) 헬스체크 URL(/health, /status), 2) 정적 리소스(.css, .js, .png), 3) 내부 모니터링 IP. 집계: 동일
    이벤트 5분 내 N회 → 1건으로 집계+카운트 포함'
  answer_detail: 무분별한 로그 수집은 스토리지 낭비와 분석 지연을 초래한다. 그러나 과도한 필터링은 공격 증거를 놓칠 수 있으므로, 보안 관련성이 낮은 로그만 선별적으로
    필터링해야 한다.
  verify:
    type: output_contains
    expect: 필터링
    semantic:
      intent: '로그 필터링 & 집계 전략 — (1) Drop filter: 헬스체크 URI(/health, /ping, /status, /metrics), 정적 리소스(*.css,
        *.js, *.png, *.ico), 내부 모니터링 소스 IP(Prometheus·Nagios), DEBUG 레벨 (2) Rate limit/aggregation: 동일
        {src_ip, rule_id} 5분 window 내 N회 → 1건으로 rollup + count 보존 (Wazuh <frequency>+<timeframe> 룰) (3)
        Sampling: 정상 access log 1/10 샘플링. 보안 이벤트는 절대 drop 금지, 룰 업데이트 시 test 환경 검증'
      success_criteria:
      - drop 대상 구체 열거(헬스체크·정적·DEBUG)
      - 집계 window 와 threshold 숫자 제시
      - 보안 이벤트 보존 원칙 명시
      acceptable_methods:
      - Logstash if/drop filter
      - Wazuh <frequency>+<timeframe> 복합 룰
      - Fluentd grep+exclude plugin
      - rsyslog filter expression
      - Kafka Streams windowing + aggregation
      negative_signs:
      - 보안 이벤트까지 drop 후보에 포함
      - 집계 window 숫자 없음
      - 테스트 없이 production 적용
  target_vm: siem
  script: '필터링: 1) 헬스체크 URL(/health, /status), 2) 정적 리소스(.css, .js, .png), 3) 내부 모니터링 IP. 집계: 동일 이벤트 5분
    내 N회 → 1건으로 집계+카운트 포함'
  risk_level: low
  bastion_prompt: 로그 필터링과 집계 전략을 수립해줘
- order: 6
  instruction: 로그 보관 정책을 수립하라. 규정 요건, 포렌식 필요성, 스토리지 비용을 고려한 계층적 보관 정책(Hot/Warm/Cold)을 설계하라.
  hint: Hot(실시간 분석, 7일), Warm(조회 가능, 30일), Cold(아카이브, 1년)
  category: planning
  points: 8
  answer: '🤖 프롬프트: 로그 보관 정책을 수립하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): 보관 정책: Hot(SSD, 7일, 실시간 분석), Warm(HDD, 30일, 필요 시 조회), Cold(S3/아카이브, 365일, 법적 요건). 보안 로그는
    Hot 30일 + Cold 3년'
  answer_detail: 계층적 보관은 비용과 가용성의 균형이다. 보안 로그는 일반 운영 로그보다 긴 보관 기간이 필요하며, 법적 요건(개인정보보호법 3년 등)을 반드시 충족해야
    한다.
  verify:
    type: output_contains
    expect: 보관
    semantic:
      intent: Hot/Warm/Cold 계층 보관 정책 — Elasticsearch ILM(Index Lifecycle Management) 기반. Hot(NVMe SSD,
        0-7일, 실시간 분석·검색, force_merge 없음) → Warm(HDD, 7-30일, 읽기 가능·쓰기 금지, force_merge 1 segment, replica=0)
        → Cold(searchable snapshot to S3/MinIO, 30-365일, 검색 시 복원) → Delete(365일 후). 보안 로그는 Hot 30일 + Cold
        3년(개인정보보호법 3조, PCI-DSS 1년). Wazuh archives indices 별도 정책
      success_criteria:
      - Hot/Warm/Cold 3계층 모두 정의
      - 각 계층 기간 숫자 명시
      - 법적 요건(개보법 3년·PCI 1년 등) 언급
      acceptable_methods:
      - Elasticsearch ILM policy + index template
      - Splunk SmartStore + data model acceleration
      - Graylog archive plugin
      - AWS S3 Glacier lifecycle rules
      - MinIO versioning + object locking
      negative_signs:
      - 3계층 중 2개 이하만 정의
      - 법적 요건 언급 없음
      - 기간 숫자 없음
  target_vm: siem
  script: '보관 정책: Hot(SSD, 7일, 실시간 분석), Warm(HDD, 30일, 필요 시 조회), Cold(S3/아카이브, 365일, 법적 요건). 보안 로그는 Hot
    30일 + Cold 3년'
  risk_level: low
