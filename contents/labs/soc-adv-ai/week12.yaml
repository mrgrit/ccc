lab_id: soc-adv-ai-week12
title: 로그 엔지니어링 - 수집 파이프라인 최적화 (AI 지원)
version: ai
course: soc-adv-ai
week: 12
description: 효율적인 로그 수집, 파싱, 정규화, 저장 파이프라인을 설계하고 탐지 역량을 강화하는 실습. AI SubAgent가 자동으로
  명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 로그 엔지니어링의 원칙과 방법론을 이해한다
- 로그 파이프라인을 설계하고 최적화할 수 있다
- 탐지 목적에 맞는 로그 소스를 식별하고 구성할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 로그 소스 인벤토리를 작성하라. 실습 환경의 모든 시스템(secu, web, siem, attacker)에서 수집 가능한
    로그 소스를 식별하고 우선순위를 매기라.
  hint: 각 시스템의 /var/log/ 디렉토리와 서비스별 로그 설정을 확인하라
  category: planning
  points: 8
  answer: '로그 소스: secu(nftables, suricata, auth), web(apache, modsecurity, app), siem(wazuh-manager,
    elasticsearch), attacker(api, subagent). 우선순위: 보안 도구 > 인증 > 서비스 > 시스템'
  answer_detail: 로그 인벤토리는 가시성의 기반이다. MITRE ATT&CK 데이터 소스 매핑으로 탐지에 필요한 로그를 식별하고, 수집
    가능한 로그와의 갭을 분석한다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '로그 소스: secu(nftables, suricata, auth), web(apache, modsecurity, app), siem(wazuh-manager,
    elasticsearch), attacker(api, subagent). 우선순위: 보안 도구 > 인증 > 서비스 > 시스템'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 로그 소스 인벤토리 작업을 수행해줘
- order: 2
  instruction: Wazuh 에이전트 설정을 최적화하라. 각 서버의 Wazuh 에이전트가 수집하는 로그 소스를 확인하고, 누락된 중요 로그를
    추가 설정하라.
  hint: ossec.conf의 <localfile> 섹션에서 모니터링 대상 파일을 확인/추가하라
  category: implementation
  points: 10
  answer: '에이전트 설정: <localfile> 추가 - suricata eve.json, nftables log, apache access/error
    log, modsecurity audit log. log_format: json 또는 syslog'
  answer_detail: Wazuh 에이전트는 <localfile>로 정의된 파일만 모니터링한다. 보안 도구의 로그가 누락되면 탐지 능력이 크게
    저하되므로, 설치된 모든 보안 도구의 로그를 포함해야 한다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '에이전트 설정: <localfile> 추가 - suricata eve.json, nftables log, apache access/error
    log, modsecurity audit log. log_format: json 또는 syslog'
  risk_level: low
  bastion_prompt: Wazuh 에이전트 설정을 최적화해줘
- order: 3
  instruction: 커스텀 디코더를 작성하라. Wazuh의 디코더(decoder)를 작성하여 비표준 형식의 로그를 파싱하라. CCC API
    로그를 파싱하는 디코더를 구현하라.
  hint: /var/ossec/etc/decoders/local_decoder.xml에 커스텀 디코더를 추가하라
  category: implementation
  points: 12
  answer: <decoder name='ccc'><prematch>CCC|</prematch><regex>(\S+) (\S+) (\S+) (\S+)</regex><order>action,
    project_id, user, status</order></decoder>
  answer_detail: 커스텀 디코더는 비표준 로그를 구조화하는 핵심이다. prematch로 로그를 식별하고, regex로 필드를 추출한다.
    디코더와 룰을 연결하면 커스텀 알림을 생성할 수 있다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: <decoder name='ccc'><prematch>CCC|</prematch><regex>(\S+) (\S+) (\S+) (\S+)</regex><order>action,
    project_id, user, status</order></decoder>
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 커스텀 디코더 작업을 수행해줘
- order: 4
  instruction: 로그 정규화(normalization) 전략을 수립하라. 서로 다른 형식의 로그(syslog, JSON, CSV, 커스텀)를
    통일된 스키마로 정규화하는 방안을 설계하라.
  hint: ECS(Elastic Common Schema) 또는 OCSF(Open Cybersecurity Schema Framework)를 참고하라
  category: design
  points: 10
  answer: '정규화 스키마: timestamp(UTC), source.ip, destination.ip, event.category, event.action,
    user.name, process.name, file.path. 각 로그 소스별 필드 매핑 테이블 작성'
  answer_detail: 로그 정규화는 이기종 소스의 로그를 통합 분석하는 전제 조건이다. 공통 스키마를 정의하면 하나의 상관분석 룰로 여러
    소스의 이벤트를 탐지할 수 있다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '정규화 스키마: timestamp(UTC), source.ip, destination.ip, event.category, event.action,
    user.name, process.name, file.path. 각 로그 소스별 필드 매핑 테이블 작성'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 로그 정규화(normalization) 전략을 수립 작업을 수행해줘
- order: 5
  instruction: 로그 필터링과 집계 전략을 수립하라. 불필요한 로그를 필터링하고, 반복 이벤트를 집계하여 스토리지와 분석 효율을 개선하라.
  hint: '필터링 대상: 정상 헬스체크, 내부 모니터링, 정적 리소스 접근 등'
  category: optimization
  points: 10
  answer: '필터링: 1) 헬스체크 URL(/health, /status), 2) 정적 리소스(.css, .js, .png), 3) 내부 모니터링
    IP. 집계: 동일 이벤트 5분 내 N회 → 1건으로 집계+카운트 포함'
  answer_detail: 무분별한 로그 수집은 스토리지 낭비와 분석 지연을 초래한다. 그러나 과도한 필터링은 공격 증거를 놓칠 수 있으므로,
    보안 관련성이 낮은 로그만 선별적으로 필터링해야 한다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '필터링: 1) 헬스체크 URL(/health, /status), 2) 정적 리소스(.css, .js, .png), 3) 내부 모니터링
    IP. 집계: 동일 이벤트 5분 내 N회 → 1건으로 집계+카운트 포함'
  risk_level: low
  bastion_prompt: 로그 필터링과 집계 전략을 수립해줘
- order: 6
  instruction: 로그 보관 정책을 수립하라. 규정 요건, 포렌식 필요성, 스토리지 비용을 고려한 계층적 보관 정책(Hot/Warm/Cold)을
    설계하라.
  hint: Hot(실시간 분석, 7일), Warm(조회 가능, 30일), Cold(아카이브, 1년)
  category: planning
  points: 8
  answer: '보관 정책: Hot(SSD, 7일, 실시간 분석), Warm(HDD, 30일, 필요 시 조회), Cold(S3/아카이브, 365일,
    법적 요건). 보안 로그는 Hot 30일 + Cold 3년'
  answer_detail: 계층적 보관은 비용과 가용성의 균형이다. 보안 로그는 일반 운영 로그보다 긴 보관 기간이 필요하며, 법적 요건(개인정보보호법
    3년 등)을 반드시 충족해야 한다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '보관 정책: Hot(SSD, 7일, 실시간 분석), Warm(HDD, 30일, 필요 시 조회), Cold(S3/아카이브, 365일,
    법적 요건). 보안 로그는 Hot 30일 + Cold 3년'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 로그 보관 정책을 수립 작업을 수행해줘
- order: 7
  instruction: 로그 무결성 보장 체계를 구축하라. 로그 변조를 방지하고 탐지하는 메커니즘(해시 체인, 원격 저장, 접근 제어)을 구현하라.
  hint: rsyslog의 원격 전송, 로그 해시 체인, SELinux 보호를 활용하라
  category: security
  points: 10
  answer: '무결성 보장: 1) rsyslog로 중앙 서버 즉시 전송(공격자 삭제 방지), 2) 로그 해시 체인(SHA-256), 3) 로그
    디렉토리 접근 제어(root only), 4) Wazuh FIM으로 로그 파일 변경 감지'
  answer_detail: 공격자의 첫 번째 행동 중 하나가 로그 삭제이다. 원격 로그 서버로 실시간 전송하면 공격자가 로컬 로그를 삭제해도 원본이
    보존된다. 해시 체인은 변조를 탐지한다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '무결성 보장: 1) rsyslog로 중앙 서버 즉시 전송(공격자 삭제 방지), 2) 로그 해시 체인(SHA-256), 3) 로그
    디렉토리 접근 제어(root only), 4) Wazuh FIM으로 로그 파일 변경 감지'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 로그 무결성 보장 체계 작업을 수행해줘
- order: 8
  instruction: 로그 수집 성능을 측정하라. 초당 이벤트 수(EPS), 수집 지연(latency), 데이터 손실률을 측정하고 병목을 식별하라.
  hint: Wazuh의 /var/ossec/logs/ossec.log에서 큐 상태를 확인하라
  category: measurement
  points: 10
  answer: '성능 지표: EPS(초당 이벤트 수), 수집 지연(이벤트 생성~SIEM 수신 시간), 큐 사용률(%), 드롭된 이벤트 수. 병목:
    네트워크/디스크IO/CPU'
  answer_detail: 로그 수집 성능은 탐지의 적시성을 결정한다. 높은 EPS에서 큐 오버플로우가 발생하면 이벤트가 손실되며, 이는 탐지
    갭으로 직결된다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '성능 지표: EPS(초당 이벤트 수), 수집 지연(이벤트 생성~SIEM 수신 시간), 큐 사용률(%), 드롭된 이벤트 수. 병목:
    네트워크/디스크IO/CPU'
  risk_level: low
  bastion_prompt: 로그 수집 성능을 측정해줘
- order: 9
  instruction: ATT&CK 데이터 소스 매핑을 수행하라. 현재 수집 중인 로그가 MITRE ATT&CK의 어떤 Data Source를
    커버하는지 매핑하라.
  hint: 'ATT&CK 데이터 소스: Process, Network Traffic, File, User Account, Command 등'
  category: analysis
  points: 10
  answer: '매핑: Process Creation(auditd, sysmon)→커버, Network Connection(suricata, nftables)→커버,
