lab_id: soc-adv-ai-week02
title: SIEM 상관분석 AI 자동 생성
version: ai
course: soc-adv-ai
week: 2
description: AI를 활용하여 SIEM 상관분석 룰을 자동 생성하고 최적화하는 실습
difficulty: hard
duration_minutes: 120
objectives:
- AI를 활용하여 상관분석 룰을 자동 생성할 수 있다
- LLM으로 MITRE ATT&CK 기반 탐지 로직을 설계할 수 있다
- 자동 생성된 룰의 품질을 검증하고 튜닝할 수 있다
pass_threshold: 0.6
