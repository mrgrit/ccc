lab_id: soc-adv-ai-week02
title: SIEM 상관분석 룰 설계 및 고도화 (AI 지원)
version: ai
course: soc-adv-ai
week: 2
description: Wazuh SIEM의 상관분석 룰을 설계하고 다단계 공격 시나리오를 탐지하는 고급 룰셋을 구현하는 실습. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SIEM 상관분석의 원리와 기법을 이해한다
- 다단계 공격 탐지를 위한 복합 룰을 설계한다
- 오탐을 줄이면서 탐지율을 높이는 튜닝 기법을 익힌다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Wazuh의 룰 구조를 분석하라. /var/ossec/ruleset/rules/ 디렉토리에서 기본 룰 파일 목록을 확인하고, 룰의 XML 구조(level, group, description, match, decoded_as)를 설명하라.
  hint: 0010-rules_config.xml 파일을 시작점으로 참조하라
  category: analysis
  points: 8
  answer: 'Wazuh 룰 구조: <rule id=''N'' level=''N''> 하위에 <description>, <match>, <decoded_as>, <group>, <if_sid>, <frequency>, <timeframe> 등의 요소로 구성'
  answer_detail: Wazuh 룰은 XML 기반이며, 단일 이벤트 매칭(match/regex)과 상관분석(if_sid+frequency+timeframe)을 지원한다. level은 0~15이며 높을수록 심각한 이벤트를 의미한다.
  verify:
    type: output_contains
    expect: rule
  script: 'Wazuh 룰 구조: <rule id=''N'' level=''N''> 하위에 <description>, <match>, <decoded_as>, <group>, <if_sid>, <frequency>, <timeframe> 등의 요소로 구성'
  risk_level: low
- order: 2
  instruction: SSH 브루트포스 탐지 룰을 분석하라. 기본 제공되는 SSH 관련 룰(0095-sshd_rules.xml)에서 브루트포스 탐지 로직을 찾고, frequency와 timeframe 값을 확인하라.
  hint: rule id 5712 주변을 확인하라
  category: analysis
  points: 8
  answer: 'rule 5712: if_sid=5710(인증실패), frequency=8, timeframe=120 → 2분 내 8회 인증 실패 시 level 10 알림'
  answer_detail: '상관분석의 기본은 단일 이벤트(5710: 인증 실패)를 기반으로 빈도 기반 룰(5712)을 생성하는 것이다. frequency와 timeframe의 조합으로 정상 실패와 공격을 구분한다.'
  verify:
    type: output_contains
    expect: frequency
  script: 'rule 5712: if_sid=5710(인증실패), frequency=8, timeframe=120 → 2분 내 8회 인증 실패 시 level 10 알림'
  risk_level: low
- order: 3
  instruction: 커스텀 상관분석 룰을 작성하라. 동일 소스 IP에서 3분 내 5회 이상 다른 포트에 대한 연결 시도가 발생하면 포트 스캔으로 탐지하는 룰을 /var/ossec/etc/rules/local_rules.xml에 작성하라.
  hint: <if_sid>, <same_source_ip>, <frequency>, <timeframe>, <different_dstport> 요소를 활용하라
  category: implementation
  points: 12
  answer: <rule id='100001' level='10' frequency='5' timeframe='180'><if_sid>기본_방화벽_룰_id</if_sid><same_source_ip/><description>포트 스캔 탐지</description></rule>
  answer_detail: 포트 스캔 탐지는 동일 출발지에서 짧은 시간 내 다수 포트 접근을 감지하는 상관분석이다. Wazuh의 same_source_ip와 frequency/timeframe 조합으로 구현한다. 오탐 방지를 위해 whitelist와 임계값을 적절히 설정해야 한다.
  verify:
    type: output_contains
    expect: '100001'
  script: <rule id='100001' level='10' frequency='5' timeframe='180'><if_sid>기본_방화벽_룰_id</if_sid><same_source_ip/><description>포트 스캔 탐지</description></rule>
  risk_level: low
- order: 4
  instruction: 다단계 공격 시나리오를 설계하라. 정찰(포트스캔) → 침투(SSH 브루트포스 성공) → 권한상승(sudo 실행) → 데이터유출(대량 파일 접근) 시나리오의 각 단계별 탐지 룰 ID를 매핑하라.
  hint: 각 단계에 해당하는 기본 룰 ID를 찾고, 이를 연결하는 상관 룰을 설계하라
  category: design
  points: 12
  answer: '정찰: 100001(포트스캔), 침투: 5715(SSH 로그인 성공), 권한상승: 5401(sudo 실행), 유출: 커스텀 룰(대량 read 이벤트). 상관룰: if_sid 체인으로 연결'
  answer_detail: 킬체인 기반 상관분석은 개별 이벤트를 연결하여 공격 시나리오를 탐지한다. 각 단계의 선행 조건(if_sid)을 체인으로 연결하면 단일 이벤트로는 탐지하기 어려운 APT 공격을 탐지할 수 있다.
  verify:
    type: output_contains
    expect: 킬체인
  script: '정찰: 100001(포트스캔), 침투: 5715(SSH 로그인 성공), 권한상승: 5401(sudo 실행), 유출: 커스텀 룰(대량 read 이벤트). 상관룰: if_sid 체인으로 연결'
  risk_level: low
- order: 5
  instruction: 웹 공격 상관분석 룰을 작성하라. 동일 IP에서 1분 내 SQL Injection 시도 3회 이상 + XSS 시도 2회 이상이 발생하면 level 12 알림을 생성하는 복합 룰을 작성하라.
  hint: Wazuh의 web access 관련 룰 그룹(web, attack)을 활용하라
  category: implementation
  points: 12
  answer: <rule id='100010' level='12' frequency='5' timeframe='60'><if_group>web|attack</if_group><same_source_ip/><description>복합 웹 공격 탐지 - SQLi+XSS</description></rule>
  answer_detail: 웹 공격은 종종 여러 유형을 혼합하여 시도된다. if_group을 사용하면 특정 그룹에 속하는 모든 룰을 기반으로 상관분석할 수 있어 유연한 탐지가 가능하다.
  verify:
    type: output_contains
    expect: '100010'
  script: <rule id='100010' level='12' frequency='5' timeframe='60'><if_group>web|attack</if_group><same_source_ip/><description>복합 웹 공격 탐지 - SQLi+XSS</description></rule>
  risk_level: low
- order: 6
  instruction: 시간 기반 상관분석을 구현하라. 업무 시간 외(22:00~06:00)에 발생하는 관리자 계정 로그인을 탐지하는 룰을 작성하라.
  hint: <time> 요소를 사용하여 시간 범위를 지정할 수 있다
  category: implementation
  points: 10
  answer: <rule id='100020' level='10'><if_sid>5715</if_sid><user>root|admin</user><time>10pm - 6am</time><description>업무시간 외 관리자 로그인</description></rule>
  answer_detail: 시간 기반 탐지는 정상 업무 패턴에서 벗어나는 활동을 식별한다. 야간 관리자 로그인은 침해 지표일 수 있으며, <time> 요소로 간단하게 구현할 수 있다.
  verify:
    type: output_contains
    expect: time
  script: <rule id='100020' level='10'><if_sid>5715</if_sid><user>root|admin</user><time>10pm - 6am</time><description>업무시간 외 관리자 로그인</description></rule>
  risk_level: low
- order: 7
  instruction: GeoIP 기반 상관분석을 설계하라. 해외 IP에서의 로그인 성공을 탐지하고, 특히 이전에 접속 이력이 없는 국가에서의 접속을 우선 알림하는 방안을 설계하라.
  hint: Wazuh의 GeoIP 연동과 CDB(constant database) lookup을 활용하라
  category: design
  points: 10
  answer: 1) GeoIP DB 연동으로 srcip→국가 매핑, 2) CDB에 허용 국가 목록 등록, 3) 로그인 성공 + CDB 미매칭 국가 → level 10 알림
  answer_detail: GeoIP 기반 탐지는 지리적 이상을 식별한다. CDB(list) lookup을 활용하면 허용/차단 국가를 효율적으로 관리할 수 있으며, impossible travel(물리적으로 불가능한 이동) 탐지의 기반이 된다.
  verify:
    type: output_contains
    expect: GeoIP
  script: 1) GeoIP DB 연동으로 srcip→국가 매핑, 2) CDB에 허용 국가 목록 등록, 3) 로그인 성공 + CDB 미매칭 국가 → level 10 알림
  risk_level: low
- order: 8
  instruction: 오탐 분석 및 튜닝을 수행하라. Wazuh 알림에서 최근 발생한 알림 중 오탐(false positive)을 식별하고, 해당 룰에 예외 처리를 추가하라.
  hint: if_sid + srcip/user 조합으로 특정 조건의 오탐을 제외할 수 있다
  category: tuning
  points: 10
  answer: '오탐 식별: 내부 스캐너 IP의 포트스캔 알림 → 예외 룰 추가: <rule id=''100099'' level=''0''><if_sid>100001</if_sid><srcip>10.20.30.X</srcip></rule>'
  answer_detail: 오탐 튜닝은 SOC 운영의 핵심이다. level=0으로 설정하면 해당 조건의 알림이 억제된다. 오탐 제외 시 반드시 문서화하고, 정기적으로 제외 목록을 검토하여 실제 공격이 숨겨지지 않도록 한다.
  verify:
    type: output_contains
    expect: level
  script: '오탐 식별: 내부 스캐너 IP의 포트스캔 알림 → 예외 룰 추가: <rule id=''100099'' level=''0''><if_sid>100001</if_sid><srcip>10.20.30.X</srcip></rule>'
  risk_level: low
- order: 9
  instruction: 알림 우선순위 체계를 설계하라. Wazuh level(0~15)을 SOC Tier 에스컬레이션에 매핑하는 정책을 수립하라. level별 대응 담당자와 SLA를 정의하라.
  hint: 'level 1~5: 정보, 6~9: Tier1 처리, 10~12: Tier2 에스컬레이션, 13~15: Tier3+긴급대응'
  category: design
  points: 10
  answer: 'Level 1-5: 자동 기록(SLA 없음), Level 6-9: Tier1 30분 내 확인, Level 10-12: Tier2 15분 내 분석, Level 13-15: Tier3 즉시 대응+경영진 보고'
  answer_detail: 알림 우선순위 체계는 SOC의 대응 효율을 결정한다. 과도한 에스컬레이션은 피로도를 높이고, 부족한 에스컬레이션은 위험을 초래한다. SLA는 조직의 리스크 허용 범위와 인력 규모에 맞게 설정한다.
  verify:
    type: output_contains
    expect: SLA
  script: 'Level 1-5: 자동 기록(SLA 없음), Level 6-9: Tier1 30분 내 확인, Level 10-12: Tier2 15분 내 분석, Level 13-15: Tier3 즉시 대응+경영진 보고'
  risk_level: low
- order: 10
  instruction: Suricata와 Wazuh의 연동 상관분석을 설계하라. Suricata IDS 알림과 Wazuh 호스트 로그를 결합하여 네트워크+호스트 복합 탐지 룰을 작성하라.
  hint: Suricata 알림은 Wazuh의 suricata 디코더를 통해 수집된다
  category: implementation
  points: 10
  answer: Suricata 악성 트래픽 탐지(86601) + 동일 목적지 호스트에서 프로세스 생성(5902) → level 13 복합 알림
  answer_detail: 네트워크 IDS와 호스트 HIDS의 연동은 탐지 정확도를 크게 높인다. 네트워크에서 의심 트래픽이 탐지되고 동시에 대상 호스트에서 이상 행위가 발생하면 실제 침해일 가능성이 매우 높다.
  verify:
    type: output_contains
    expect: Suricata
  script: Suricata 악성 트래픽 탐지(86601) + 동일 목적지 호스트에서 프로세스 생성(5902) → level 13 복합 알림
  risk_level: low
- order: 11
  instruction: 대시보드용 상관분석 메트릭을 정의하라. 시간대별 알림 분포, 소스IP Top 10, 룰 ID별 빈도, 심각도 분포를 집계하는 Wazuh API 쿼리를 작성하라.
  hint: Wazuh API의 /alerts endpoint에서 group_by 파라미터를 활용하라
  category: measurement
  points: 8
  answer: '시간대별: timestamp 기준 히스토그램, Top IP: agent.ip 기준 집계, 룰별: rule.id 기준 카운트, 심각도: rule.level 기준 분포'
  answer_detail: 대시보드 메트릭은 SOC 운영 현황을 한눈에 파악할 수 있게 한다. 실시간 알림 추이, 주요 공격원, 빈발 탐지 유형, 심각도 분포는 SOC 관리자의 핵심 정보이다.
  verify:
    type: output_contains
    expect: 대시보드
  script: '시간대별: timestamp 기준 히스토그램, Top IP: agent.ip 기준 집계, 룰별: rule.id 기준 카운트, 심각도: rule.level 기준 분포'
  risk_level: low
- order: 12
  instruction: 룰 테스트 방법론을 수립하라. 작성한 커스텀 룰을 안전하게 테스트하는 절차를 정의하고, Wazuh의 ossec-logtest 도구를 활용한 테스트를 수행하라.
  hint: /var/ossec/bin/wazuh-logtest 또는 ossec-logtest를 사용하라
  category: testing
  points: 10
  answer: 1) ossec-logtest로 샘플 로그 입력 → 디코딩/룰 매칭 확인, 2) level=0 테스트 룰로 프로덕션 영향 없이 검증, 3) 테스트 완료 후 level 원복
  answer_detail: 룰 테스트는 프로덕션 환경에 배포하기 전 필수 단계이다. ossec-logtest는 로그를 입력하면 어떤 디코더와 룰이 매칭되는지 보여주므로, 룰 로직을 사전에 검증할 수 있다.
  verify:
    type: output_contains
    expect: logtest
  script: 1) ossec-logtest로 샘플 로그 입력 → 디코딩/룰 매칭 확인, 2) level=0 테스트 룰로 프로덕션 영향 없이 검증, 3) 테스트 완료 후 level 원복
  risk_level: low
- order: 13
  instruction: 상관분석 룰의 성능 영향을 분석하라. 룰 수 증가에 따른 CPU/메모리 사용량 변화를 예측하고, 룰 최적화 방안을 제시하라.
  hint: if_sid 체인이 깊어질수록 성능 부하가 증가한다
  category: optimization
  points: 10
  answer: '성능 영향 요인: 1) 룰 수(선형 증가), 2) if_sid 체인 깊이(지수적 증가 가능), 3) frequency 룰의 메모리 사용. 최적화: atomic 룰 우선, 체인 깊이 3 이하 유지, 불필요한 frequency 룰 제거'
  answer_detail: 상관분석 룰은 단순 매칭 룰보다 리소스를 많이 사용한다. 특히 frequency 룰은 이벤트를 메모리에 보관해야 하므로 timeframe이 길수록 메모리 사용량이 증가한다. 룰 수가 수천 개를 초과하면 성능 모니터링이 필수적이다.
  verify:
    type: output_contains
    expect: 최적화
  script: '성능 영향 요인: 1) 룰 수(선형 증가), 2) if_sid 체인 깊이(지수적 증가 가능), 3) frequency 룰의 메모리 사용. 최적화: atomic 룰 우선, 체인 깊이 3 이하 유지, 불필요한 frequency 룰 제거'
  risk_level: low
- order: 14
  instruction: 룰 버전 관리 체계를 수립하라. Git을 활용한 룰 변경 이력 관리, 코드 리뷰 프로세스, 배포 절차를 정의하라.
  hint: local_rules.xml을 Git으로 관리하고, PR 기반 리뷰를 적용하라
  category: governance
  points: 10
  answer: 1) /var/ossec/etc/rules/를 Git 저장소로 관리, 2) 변경 시 branch→PR→리뷰→머지, 3) CI/CD로 ossec-logtest 자동 실행, 4) 배포 시 Wazuh Manager 재시작
  answer_detail: 룰 관리는 소프트웨어 개발과 동일한 수준의 변경 관리가 필요하다. 무분별한 룰 추가는 오탐 증가와 성능 저하를 초래하므로, 리뷰 프로세스를 통해 품질을 보장한다.
  verify:
    type: output_contains
    expect: Git
  script: 1) /var/ossec/etc/rules/를 Git 저장소로 관리, 2) 변경 시 branch→PR→리뷰→머지, 3) CI/CD로 ossec-logtest 자동 실행, 4) 배포 시 Wazuh Manager 재시작
