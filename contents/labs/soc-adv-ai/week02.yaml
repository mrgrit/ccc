  hint: Wazuh 룰 구조 AI 학습 관련 프롬프트를 설계하여 AI에게 룰 생성을 요청하라
  category: analysis
  points: 8
  answer: 'Wazuh 룰 구조 AI 학습 완료: AI가 생성한 Wazuh XML 룰 확인'
  answer_detail: AI를 활용한 Wazuh 룰 구조 AI 학습은 룰 개발 속도를 크게 향상시킨다. 생성된 룰은 ossec-logtest로 검증 후 배포한다.
  script: curl -s $LLM_BASE_URL/api/generate -d '{"model":"gemma3:4b","prompt":"SIEM 상관분석 Wazuh 룰 구조 학습을 수행하라","stream":false}'
