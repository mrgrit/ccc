lab_id: soc-adv-ai-week14
title: SOC + AI 융합 - 기초 설계
version: ai
course: soc-adv-ai
week: 14
description: AI/ML을 보안관제에 적용하는 기초 설계와 도입 전략을 수립하는 실습 (코드 없이 아키텍처와 전략 중심). AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SOC에서의 AI/ML 활용 사례와 한계를 이해한다
- AI 기반 탐지 시스템의 아키텍처를 설계할 수 있다
- AI 도입 전략과 ROI를 평가할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SOC에서 AI/ML이 적용 가능한 영역을 나열하라. 탐지, 분류, 우선순위, 대응, 예측 각 영역에서의 AI 활용 사례를
    정리하라.
  hint: 이상 탐지, 알림 분류, 자동 triage, 플레이북 추천, 위협 예측 등
  category: analysis
  points: 8
  answer: 'AI 적용 영역: 1) 탐지(이상행위 탐지, UEBA), 2) 분류(알림 자동분류, 오탐/진양성 구분), 3) 우선순위(위험도
    자동 산정), 4) 대응(플레이북 자동 추천), 5) 예측(공격 트렌드 예측)'
  answer_detail: AI는 SOC의 모든 단계에 적용 가능하지만, 효과와 난이도가 다르다. 알림 분류/우선순위는 비교적 쉽게 적용 가능하고,
    이상 탐지는 효과적이지만 오탐 관리가 과제이다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: 'AI 적용 영역: 1) 탐지(이상행위 탐지, UEBA), 2) 분류(알림 자동분류, 오탐/진양성 구분), 3) 우선순위(위험도
    자동 산정), 4) 대응(플레이북 자동 추천), 5) 예측(공격 트렌드 예측)'
  risk_level: low
  bastion_prompt: SOC에서 AI/ML이 적용 가능한 영역을 나열해줘
- order: 2
  instruction: UEBA(User and Entity Behavior Analytics)의 원리를 설명하라. 사용자/엔티티의 정상 행위
    베이스라인을 구축하고 이상을 탐지하는 방법론을 설계하라.
  hint: 로그인 시간, 접근 리소스, 데이터 전송량, 위치 등의 행위 특성
  category: design
  points: 10
  answer: 'UEBA 설계: 특성(로그인시간/빈도, 접근리소스, 데이터량, 위치/IP), 베이스라인(30일 이동평균), 이상탐지(Z-score>3
    또는 Isolation Forest), 리스크점수(0~100)'
  answer_detail: UEBA는 룰 기반 탐지의 한계를 극복한다. 사전에 알 수 없는 공격 패턴도 행위 이상으로 탐지할 수 있지만, 초기
    학습 기간과 정상 행위 변화에 대한 적응이 필요하다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: 'UEBA 설계: 특성(로그인시간/빈도, 접근리소스, 데이터량, 위치/IP), 베이스라인(30일 이동평균), 이상탐지(Z-score>3
    또는 Isolation Forest), 리스크점수(0~100)'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 UEBA(User and Entity Behavior Analytics)의 원리를 설명
    작업을 수행해줘
- order: 3
  instruction: AI 기반 알림 분류 시스템의 아키텍처를 설계하라. 과거 알림 데이터에서 오탐/진양성 패턴을 학습하여 새로운 알림을 자동
    분류하는 시스템을 설계하라.
  hint: 입력 특성(feature), 학습 데이터, 모델 선택, 출력(분류 결과+신뢰도)을 정의하라
  category: design
  points: 12
  answer: '아키텍처: 입력(룰ID, 소스IP, 시간, 빈도, enrichment결과), 모델(Random Forest/XGBoost), 학습데이터(과거
    분석관 판단 결과), 출력(TP/FP 확률+신뢰도). 최소 학습 데이터: 10,000건'
  answer_detail: 알림 분류 자동화는 SOC에서 가장 실용적인 AI 적용 사례이다. 분석관의 과거 판단(레이블)이 학습 데이터가 되므로,
    일관된 판단 기준과 충분한 레이블링이 전제 조건이다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '아키텍처: 입력(룰ID, 소스IP, 시간, 빈도, enrichment결과), 모델(Random Forest/XGBoost), 학습데이터(과거
    분석관 판단 결과), 출력(TP/FP 확률+신뢰도). 최소 학습 데이터: 10,000건'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 AI 기반 알림 분류 시스템의 아키텍처 작업을 수행해줘
- order: 4
  instruction: AI 탐지 모델의 평가 지표를 정의하라. Precision, Recall, F1-Score, FPR(False Positive
    Rate)의 의미와 SOC 운영에서의 중요성을 설명하라.
  hint: SOC에서는 Recall(놓치지 않음)이 특히 중요하지만, FPR이 너무 높으면 운영 불가
  category: measurement
  points: 10
  answer: '지표: Precision(탐지 중 실제 공격 비율), Recall(실제 공격 중 탐지 비율), F1(조화평균), FPR(오탐률).
    SOC 목표: Recall>95%, FPR<5%. 트레이드오프: Recall↑이면 FPR↑'
  answer_detail: SOC에서는 공격을 놓치는 것(False Negative)이 오탐(False Positive)보다 위험하므로 Recall이
    우선이다. 그러나 FPR이 너무 높으면 분석관이 알림 피로에 빠져 결국 탐지 효과가 떨어진다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '지표: Precision(탐지 중 실제 공격 비율), Recall(실제 공격 중 탐지 비율), F1(조화평균), FPR(오탐률).
    SOC 목표: Recall>95%, FPR<5%. 트레이드오프: Recall↑이면 FPR↑'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 AI 탐지 모델의 평가 지표를 정의 작업을 수행해줘
- order: 5
  instruction: ML 모델의 적대적 공격(Adversarial Attack) 위험을 분석하라. 공격자가 AI 탐지를 우회하는 방법과 대응책을
    설명하라.
  hint: 모델 회피(evasion), 데이터 중독(poisoning), 모델 추출(extraction)
  category: analysis
  points: 10
  answer: '적대적 공격: 1) 회피(탐지 임계값 직하의 행위), 2) 중독(정상 데이터에 악성 패턴 혼입), 3) 추출(모델 로직 역공학).
    대응: 앙상블 모델, 이상 데이터 필터링, 모델 접근 제한'
  answer_detail: AI 탐지 시스템은 새로운 공격 표면이 된다. 특히 데이터 중독은 학습 데이터를 오염시켜 장기적으로 모델 성능을 저하시키므로,
    학습 데이터의 무결성 관리가 중요하다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '적대적 공격: 1) 회피(탐지 임계값 직하의 행위), 2) 중독(정상 데이터에 악성 패턴 혼입), 3) 추출(모델 로직 역공학).
    대응: 앙상블 모델, 이상 데이터 필터링, 모델 접근 제한'
  risk_level: low
  bastion_prompt: ML 모델의 적대적 공격(Adversarial Attack) 위험을 분석해줘
- order: 6
  instruction: LLM(Large Language Model)의 SOC 활용 방안을 설계하라. 로그 요약, 알림 설명, 인시던트 보고서
    자동 생성, 쿼리 생성 등의 사례를 구체화하라.
  hint: Ollama($LLM_BASE_URL)의 로컬 LLM을 활용하는 방안을 설계하라
  category: design
  points: 10
  answer: 'LLM 활용: 1) 알림 요약(다수 알림→1줄 요약), 2) 인시던트 보고서 초안 생성, 3) SIEM 쿼리 자연어→DSL 변환,
    4) 위협 인텔 보고서 요약, 5) 초급 분석관 멘토링'
  answer_detail: LLM은 SOC의 생산성을 혁신적으로 향상시킬 수 있다. 특히 보고서 작성, 로그 해석, 쿼리 생성 등 텍스트 기반
    작업에서 효과적이다. 로컬 LLM을 사용하면 데이터 유출 위험도 없다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: 'LLM 활용: 1) 알림 요약(다수 알림→1줄 요약), 2) 인시던트 보고서 초안 생성, 3) SIEM 쿼리 자연어→DSL 변환,
    4) 위협 인텔 보고서 요약, 5) 초급 분석관 멘토링'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 LLM(Large Language Model)의 SOC 활용 방안 작업을 수행해줘
- order: 7
  instruction: AI 기반 탐지와 룰 기반 탐지의 하이브리드 아키텍처를 설계하라. 각 방식의 강점을 결합하여 최적의 탐지 체계를 구축하는
    방안을 제시하라.
  hint: 룰 기반=알려진 위협(정밀), AI=미지의 위협(범용). 병렬 운영이 핵심
  category: design
  points: 10
  answer: '하이브리드: 1) 룰 기반(SIGMA/YARA)=알려진 위협 정밀 탐지(1차), 2) AI(이상탐지)=미지 위협 발견(2차),
    3) 결과 통합(두 방법 모두 탐지=고신뢰, AI만 탐지=추가검증 필요)'
  answer_detail: 하이브리드 접근은 현실적인 최적해이다. 룰 기반의 높은 정밀도와 AI의 넓은 커버리지를 결합하면, 알려진 위협과 미지의
    위협 모두를 효과적으로 탐지할 수 있다.
  verify:
    type: output_contains
    expect: null
  target_vm: siem
  script: '하이브리드: 1) 룰 기반(SIGMA/YARA)=알려진 위협 정밀 탐지(1차), 2) AI(이상탐지)=미지 위협 발견(2차),
    3) 결과 통합(두 방법 모두 탐지=고신뢰, AI만 탐지=추가검증 필요)'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 AI 기반 탐지와 룰 기반 탐지의 하이브리드 아키텍처 작업을 수행해줘
- order: 8
  instruction: AI 모델 운영(MLOps)의 SOC 적용 방안을 설계하라. 모델 학습, 배포, 모니터링, 재학습의 전체 생명주기를 정의하라.
  hint: 데이터 드리프트, 모델 성능 저하, 재학습 주기를 고려하라
  category: design
  points: 10
  answer: 'MLOps: 1) 학습(월간 재학습, 분석관 피드백 반영), 2) 배포(A/B 테스트, 점진적 롤아웃), 3) 모니터링(정확도/FPR
    추이, 데이터 드리프트), 4) 재학습(성능 저하 시 자동 트리거)'
  answer_detail: AI 모델은 배포 후에도 지속적 관리가 필요하다. 위협 환경이 변하면 과거 데이터로 학습한 모델의 성능이 저하되므로,
    모니터링과 재학습 파이프라인이 필수적이다.
  verify:
