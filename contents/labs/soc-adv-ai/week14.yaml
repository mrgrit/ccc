  instruction: AI 윤리와 편향 문제를 분석하라. AI 탐지 시스템의 편향(특정 IP 대역, 사용자 그룹에 대한 과탐지)과 공정성 보장
    방안을 설계하라.
  hint: 모델 해석가능성(Explainability)과 공정성(Fairness) 메트릭을 포함하라
  category: governance
