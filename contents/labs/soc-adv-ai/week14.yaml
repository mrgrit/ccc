- order: 9
  instruction: AI 도입의 데이터 요건을 분석하라. 학습 데이터 수집, 레이블링, 품질 관리, 편향 방지를 위한 요건을 정리하라.
  hint: 클래스 불균형(정상>>악성), 레이블 품질, 데이터 프라이버시를 고려하라
  category: planning
  points: 10
  answer: '데이터 요건: 1) 양(최소 10,000건 레이블 데이터), 2) 질(일관된 레이블링 기준), 3) 균형(오버/언더 샘플링으로
    클래스 균형), 4) 프라이버시(개인정보 마스킹), 5) 다양성(다양한 공격 유형 포함)'
  answer_detail: AI 성능은 데이터 품질에 직접 비례한다. 보안 데이터의 클래스 불균형(악성 이벤트는 전체의 0.1% 미만)은 주요
    과제이며, 합성 데이터나 오버샘플링으로 보완할 수 있다.
