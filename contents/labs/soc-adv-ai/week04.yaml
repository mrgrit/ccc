  bastion_prompt: 실습 환경의 웹서버(10.20.30.80)에서 의심 파일을 스캔하라. /var/www/ 디렉토리에서 작성한 웹쉘 탐지 룰로 YARA 스캔을 수행해줘
- order: 9
  instruction: YARA 룰 최적화를 수행하라. 작성한 룰의 스캔 성능을 측정하고, 문자열 패턴 순서 최적화, 불필요한 정규식 제거, 파일 크기 조건 추가로 성능을 개선하라.
  hint: 가장 고유한(unique) 문자열을 첫 번째 조건으로 배치하면 early-exit가 빨라진다
  category: optimization
  points: 10
  answer: '최적화 전: 스캔 시간 X초, 최적화 후: Y초. 방법: 1) filesize 조건 선행, 2) 고유 hex 패턴 우선, 3) regex→text 변환, 4) 와일드카드 최소화'
  answer_detail: YARA 성능은 룰의 품질에 크게 좌우된다. condition의 첫 번째 조건이 빠르게 필터링하면 나머지 조건 평가를 건너뛸 수 있다. 정규식은 text 문자열보다 10~100배 느리므로 가능하면 text로 대체한다.
  verify:
