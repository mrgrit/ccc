  instruction: YARA와 Wazuh를 연동하라. Wazuh의 active response 또는 wodle을 활용하여 새로운 파일 생성 시 자동으로 YARA 스캔이 실행되도록 설정하라.
  hint: ossec.conf의 syscheck + active-response 또는 command wodle을 활용하라
  category: integration
