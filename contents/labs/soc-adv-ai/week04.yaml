  answer: '설정: 1) syscheck로 파일 변경 감지, 2) active-response로 YARA 스캔 트리거, 3) 스캔 결과를 Wazuh 로그로 전송, 4) 탐지 시 알림 생성'
  answer_detail: YARA와 SIEM의 연동은 실시간 악성코드 탐지의 핵심이다. 파일 무결성 모니터링(FIM)이 변경을 감지하면 YARA 스캔을 실행하고, 결과를 SIEM에 피드백하는 자동화 파이프라인을 구축한다.
  verify:
