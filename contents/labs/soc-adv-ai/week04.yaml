lab_id: soc-adv-ai-week04
title: YARA 룰 기반 악성코드 탐지 (AI 지원)
version: ai
course: soc-adv-ai
week: 4
description: YARA 룰을 작성하여 파일 기반 악성코드를 탐지하고, 메모리 스캔과 네트워크 트래픽 분석에 적용하는 실습. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- YARA 룰 문법과 고급 기능을 완전히 이해한다
- 실제 악성코드 패밀리를 탐지하는 룰을 작성할 수 있다
- YARA를 다양한 보안 도구와 연동할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: YARA 룰의 기본 구조를 분석하라. meta, strings, condition 섹션의 역할과 문법을 정리하고, 문자열 유형(text, hex, regex)의 차이를 설명하라.
  hint: YARA 공식 문서의 Writing rules 섹션을 참조하라
  category: analysis
  points: 8
  answer: 'meta: 룰 메타데이터(author, description, date), strings: 탐지 패턴 정의(text=$s1=''string'', hex=$h1={6A 40 68}, regex=$r1=/pattern/), condition: 논리 조건식'
  answer_detail: YARA는 패턴 매칭 기반의 악성코드 탐지 도구이다. text 문자열은 ASCII/Wide 인코딩을 지원하고, hex 패턴은 바이트 시퀀스 매칭에, regex는 복잡한 패턴에 사용된다.
  verify:
    type: output_contains
    expect: 
  target_vm: siem
  script: 'meta: 룰 메타데이터(author, description, date), strings: 탐지 패턴 정의(text=$s1=''string'', hex=$h1={6A 40 68}, regex=$r1=/pattern/), condition: 논리 조건식'
  risk_level: low
  bastion_prompt: YARA 룰의 기본 구조를 분석하라. meta, strings, condition 섹션의 역할과 문법을 정리하고, 문자열 유형(text, hex, regex)의 차이를 설명해줘
- order: 2
  instruction: PE 파일 구조를 분석하는 YARA 룰을 작성하라. PE 헤더(MZ magic), 섹션 수, 임포트 테이블을 조건으로 사용하는 룰을 작성하라.
  hint: import 'pe' 모듈을 사용하라
  category: implementation
  points: 10
  answer: 'import ''pe''. rule suspicious_pe { condition: pe.number_of_sections > 7 and pe.imports(''kernel32.dll'',''VirtualAlloc'') and pe.imports(''kernel32.dll'',''WriteProcessMemory'') }'
  answer_detail: PE 모듈은 실행 파일의 구조적 특성을 분석한다. 비정상적으로 많은 섹션, 프로세스 인젝션 관련 API 임포트 등은 악성코드의 일반적 특성이다.
  verify:
    type: output_contains
    expect: 
  target_vm: siem
  script: 'import ''pe''. rule suspicious_pe { condition: pe.number_of_sections > 7 and pe.imports(''kernel32.dll'',''VirtualAlloc'') and pe.imports(''kernel32.dll'',''WriteProcessMemory'') }'
  risk_level: low
  bastion_prompt: PE 파일 구조를 분석하는 YARA 룰을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 3
  instruction: 패커/프로텍터 탐지 룰을 작성하라. UPX, Themida, VMProtect 등 주요 패커의 시그니처를 YARA 룰로 작성하라.
  hint: 각 패커의 EP(Entry Point) 시그니처와 섹션명을 활용하라
  category: implementation
  points: 10
  answer: 'rule upx_packed { strings: $upx0 = ''UPX0'' $upx1 = ''UPX1'' $upx2 = ''UPX!'' condition: uint16(0) == 0x5A4D and 2 of ($upx*) }'
  answer_detail: 패킹된 파일은 분석을 회피하거나 탐지를 우회하기 위해 사용된다. 패커 탐지는 악성코드 분석의 첫 단계이며, 알려진 패커의 시그니처(섹션명, 매직 바이트)를 활용한다.
  verify:
    type: output_contains
    expect: 
  target_vm: siem
  script: 'rule upx_packed { strings: $upx0 = ''UPX0'' $upx1 = ''UPX1'' $upx2 = ''UPX!'' condition: uint16(0) == 0x5A4D and 2 of ($upx*) }'
  risk_level: low
  bastion_prompt: 패커/프로텍터 탐지 룰을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 4
  instruction: 웹쉘 탐지 YARA 룰을 작성하라. PHP, JSP, ASP 웹쉘의 공통 패턴(eval, exec, system, passthru, base64_decode 등)을 탐지하는 룰을 작성하라.
  hint: 다양한 인코딩과 난독화 패턴을 고려하라
  category: implementation
  points: 12
  answer: 'rule webshell_php { strings: $e1=''eval('' $e2=''base64_decode('' $e3=''system('' $e4=''passthru('' $e5=''shell_exec('' $obs1=/\$[a-z]=str_rot13/ condition: filesize < 100KB and 3 of them }'
  answer_detail: 웹쉘 탐지는 SOC의 핵심 임무이다. 공격자는 난독화(base64, rot13, 변수명 치환)를 사용하므로, 다양한 패턴을 조합하여 탐지율을 높여야 한다. filesize 조건으로 오탐을 줄인다.
  verify:
    type: output_contains
    expect: 
  target_vm: siem
  script: 'rule webshell_php { strings: $e1=''eval('' $e2=''base64_decode('' $e3=''system('' $e4=''passthru('' $e5=''shell_exec('' $obs1=/\$[a-z]=str_rot13/ condition: filesize < 100KB and 3 of them }'
  risk_level: low
  bastion_prompt: 웹쉘 탐지 YARA 룰을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 5
  instruction: 랜섬웨어 탐지 룰을 작성하라. 파일 암호화 관련 API 호출(CryptEncrypt, CryptGenKey), 랜섬노트 문자열, 확장자 변경 패턴을 탐지하라.
  hint: 랜섬웨어 패밀리별 공통 특성과 고유 특성을 구분하라
  category: implementation
  points: 12
  answer: 'rule ransomware_generic { strings: $api1=''CryptEncrypt'' $api2=''CryptGenKey'' $note1=''Your files have been encrypted'' $note2=''Bitcoin'' $ext1=''.locked'' $ext2=''.encrypted'' condition:
    uint16(0)==0x5A4D and (2 of ($api*) or 2 of ($note*)) }'
  answer_detail: 랜섬웨어 탐지는 암호화 API 사용, 랜섬노트 문자열, 특정 파일 확장자 등 다층 접근이 필요하다. 제너릭(generic) 룰로 알려지지 않은 변종도 탐지하되, 정상 암호화 소프트웨어와의 오탐을 주의해야 한다.
  verify:
    type: output_contains
    expect: 
  target_vm: siem
  script: 'rule ransomware_generic { strings: $api1=''CryptEncrypt'' $api2=''CryptGenKey'' $note1=''Your files have been encrypted'' $note2=''Bitcoin'' $ext1=''.locked'' $ext2=''.encrypted'' condition:
    uint16(0)==0x5A4D and (2 of ($api*) or 2 of ($note*)) }'
  risk_level: low
  bastion_prompt: 랜섬웨어 탐지 룰을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 6
  instruction: YARA의 고급 조건식을 활용하라. for 반복문, of 연산자, 정규식 카운트(#), 문자열 오프셋(@)을 사용하는 룰을 작성하라.
  hint: 'for any i in (0..pe.number_of_sections-1) : (pe.sections[i].name == ''.rsrc'') 형태를 활용하라'
  category: implementation
  points: 10
  answer: 'condition: for any i in (0..pe.number_of_sections-1) : (pe.sections[i].raw_data_size == 0 and pe.sections[i].virtual_size > 0x10000) → 언패킹 섹션 탐지'
  answer_detail: YARA의 고급 조건식은 PE 구조의 동적 분석을 가능하게 한다. for 반복으로 모든 섹션을 순회하고, raw_data_size==0이면서 virtual_size가 큰 섹션은 런타임에 언패킹되는 의심 섹션이다.
  verify:
    type: output_contains
    expect: 
  target_vm: siem
  script: 'condition: for any i in (0..pe.number_of_sections-1) : (pe.sections[i].raw_data_size == 0 and pe.sections[i].virtual_size > 0x10000) → 언패킹 섹션 탐지'
  risk_level: low
  bastion_prompt: YARA의 고급 조건식을 활용하라 구현 방법과 예시를 설명해줘
- order: 7
  instruction: YARA 모듈(math, hash, cuckoo)을 활용한 룰을 작성하라. 엔트로피 분석으로 패킹/암호화된 섹션을 탐지하라.
  hint: import 'math', math.entropy(offset, size) > 7.0은 높은 엔트로피를 의미한다
  category: implementation
  points: 10
  answer: 'import ''math'' import ''pe''. condition: pe.number_of_sections > 0 and for any i in (0..pe.number_of_sections-1): (math.entropy(pe.sections[i].raw_data_offset, pe.sections[i].raw_data_size)
    > 7.5)'
  answer_detail: 엔트로피가 7.5 이상이면 암호화 또는 압축된 데이터일 가능성이 높다. 정상 실행 파일의 코드 섹션은 보통 5~6 수준이며, 리소스 섹션은 다양하다. 전체 파일이 아닌 섹션별 엔트로피를 측정하면 정확도가 높아진다.
  verify:
    type: output_contains
    expect: 
  target_vm: siem
  script: 'import ''math'' import ''pe''. condition: pe.number_of_sections > 0 and for any i in (0..pe.number_of_sections-1): (math.entropy(pe.sections[i].raw_data_offset, pe.sections[i].raw_data_size)
    > 7.5)'
  risk_level: low
  bastion_prompt: YARA 모듈(math, hash, cuckoo)을 활용한 룰을 구현 방법을 설명하고 예시 코드를 보여줘
- order: 8
  instruction: 실습 환경의 웹서버(10.20.30.80)에서 의심 파일을 스캔하라. /var/www/ 디렉토리에서 작성한 웹쉘 탐지 룰로 YARA 스캔을 수행하라.
  hint: yara -r webshell_rules.yar /var/www/ 명령을 사용하라
  category: operation
  points: 10
  answer: yara 스캔 결과에서 탐지된 파일 목록과 매칭된 룰 이름을 보고
  answer_detail: 실제 환경에서의 YARA 스캔은 파일시스템 전체를 대상으로 하므로, 성능(CPU/IO)에 주의해야 한다. 재귀 스캔(-r)과 프로세스 우선순위 조절(nice)을 활용하고, 대용량 디렉토리는 분할 스캔한다.
  verify:
