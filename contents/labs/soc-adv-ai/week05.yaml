lab_id: soc-adv-ai-week05
title: 위협 인텔리전스 수집 및 활용 (AI 지원)
version: ai
course: soc-adv-ai
week: 5
description: CTI(Cyber Threat Intelligence) 수집, 분석, 공유 체계를 구축하고 SOC 운영에 통합하는 실습. AI
  SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 위협 인텔리전스의 유형과 활용 방안을 이해한다
- STIX/TAXII 기반 TI 공유 체계를 구현할 수 있다
- TI를 SIEM/IDS와 연동하여 탐지 역량을 강화할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 위협 인텔리전스의 4개 계층(Strategic, Operational, Tactical, Technical)을 정의하고,
    각 계층의 소비자, 데이터 유형, 활용 방안을 정리하라.
  hint: 경영진→전략적 TI, SOC팀→전술/기술적 TI로 매핑하라
  category: analysis
  points: 8
  answer: 'Strategic: 경영진, 위협동향/지정학적리스크, 투자결정. Operational: SOC관리자, 캠페인분석/공격그룹, 방어전략.
    Tactical: 분석관, TTP/킬체인, 탐지룰설계. Technical: 자동화시스템, IOC(IP/Hash/Domain), 실시간차단'
  answer_detail: TI의 4계층은 서로 다른 시간 범위와 소비자를 대상으로 한다. Technical IOC는 수시간~수일, Strategic
    TI는 수개월~수년의 유효 기간을 가진다.
  verify:
    type: output_contains
    expect: Strategic
  target_vm: siem
  script: 'Strategic: 경영진, 위협동향/지정학적리스크, 투자결정. Operational: SOC관리자, 캠페인분석/공격그룹, 방어전략.
    Tactical: 분석관, TTP/킬체인, 탐지룰설계. Technical: 자동화시스템, IOC(IP/Hash/Domain), 실시간차단'
  risk_level: low
  bastion_prompt: 위협 인텔리전스의 4개 계층(Strategic, Operational, Tactical, Technical)을 정의하고,
    각 계층의 소비자, 데이터 유형, 활용 방안을 정리해줘
- order: 2
  instruction: STIX 2.1 객체 모델을 분석하라. SDO(STIX Domain Object) 12종의 유형과 관계(SRO)를 정리하고,
    공격 시나리오를 STIX 그래프로 모델링하라.
  hint: Attack Pattern, Campaign, Indicator, Malware, Threat Actor 등을 연결하라
  category: analysis
  points: 10
  answer: 'SDO: Attack Pattern, Campaign, Course of Action, Grouping, Identity, Indicator,
    Infrastructure, Intrusion Set, Location, Malware, Malware Analysis, Note, Observed
    Data, Opinion, Report, Threat Actor, Tool, Vulnerability. SRO: relationship, sighting'
  answer_detail: STIX는 위협 정보를 구조화하는 국제 표준이다. SDO는 위협의 개별 요소를, SRO는 요소 간 관계를 표현한다.
    이를 통해 기계 판독 가능한 위협 정보를 생산하고 공유할 수 있다.
  verify:
    type: output_contains
    expect: STIX
  target_vm: siem
  script: 'SDO: Attack Pattern, Campaign, Course of Action, Grouping, Identity, Indicator,
    Infrastructure, Intrusion Set, Location, Malware, Malware Analysis, Note, Observed
    Data, Opinion, Report, Threat Actor, Tool, Vulnerability. SRO: relationship, sighting'
  risk_level: low
  bastion_prompt: STIX 2.1 객체 모델을 분석하라. SDO(STIX Domain Object) 12종의 유형과 관계(SRO)를
    정리하고, 공격 시나리오를 STIX 그래프로 모델링해줘
- order: 3
  instruction: STIX Indicator 객체를 작성하라. 악성 IP 주소, 파일 해시, 도메인 각각에 대한 STIX 2.1 Indicator
    JSON을 작성하고 pattern 필드의 문법을 설명하라.
  hint: 'pattern: "[ipv4-addr:value = ''10.0.0.1'']" 형태를 사용하라'
  category: implementation
  points: 10
  answer: 'IP: [ipv4-addr:value=''악성IP''], Hash: [file:hashes.''SHA-256''=''해시값''],
    Domain: [domain-name:value=''악성도메인'']. valid_from, valid_until, kill_chain_phases
    포함'
  answer_detail: STIX Pattern은 IOC를 표현하는 전용 쿼리 언어이다. 복합 조건(AND/OR), 시간 범위(WITHIN),
    반복(REPEATS) 등 고급 표현이 가능하다.
  verify:
    type: output_contains
    expect: Indicator
  target_vm: siem
  script: 'IP: [ipv4-addr:value=''악성IP''], Hash: [file:hashes.''SHA-256''=''해시값''],
    Domain: [domain-name:value=''악성도메인'']. valid_from, valid_until, kill_chain_phases
    포함'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 STIX Indicator 객체 작업을 수행해줘
- order: 4
  instruction: 공개 TI 피드를 수집하라. OTX(AlienVault), AbuseIPDB, URLhaus에서 최신 IOC를 수집하고
    형식을 비교 분석하라.
  hint: 각 피드의 API 또는 RSS를 활용하여 최근 24시간 IOC를 수집하라
  category: collection
  points: 10
  answer: 'OTX: Pulse 기반 구조화된 IOC, AbuseIPDB: IP 신뢰도 점수, URLhaus: 악성URL+페이로드정보. 공통필드:
    IP/Domain/Hash, 차이: 컨텍스트 깊이, 업데이트 주기'
  answer_detail: 공개 TI 피드는 무료로 활용 가능하지만, 품질과 적시성이 다양하다. 여러 소스를 통합하여 교차 검증하면 신뢰도를 높일
    수 있다. API 키 관리와 요청 제한(rate limit)에 주의해야 한다.
  verify:
    type: output_contains
    expect: OTX
  target_vm: siem
  script: 'OTX: Pulse 기반 구조화된 IOC, AbuseIPDB: IP 신뢰도 점수, URLhaus: 악성URL+페이로드정보. 공통필드:
    IP/Domain/Hash, 차이: 컨텍스트 깊이, 업데이트 주기'
  risk_level: low
  bastion_prompt: 공개 TI 피드를 수집하라. OTX(AlienVault), AbuseIPDB, URLhaus에서 최신 IOC를 수집하고
    형식을 비교 분석해줘
- order: 5
  instruction: 수집한 IOC를 Suricata 룰로 변환하라. 악성 IP 목록을 Suricata의 IP reputation 또는 커스텀
    룰로 적용하고, 탐지 테스트를 수행하라.
  hint: iprep 또는 alert ip $HOME_NET any -> $EXTERNAL_NET any (msg:"TI Match"; content:"...";)
    형태
  category: implementation
  points: 10
  answer: '1) IP리스트 → iprep.list 파일 생성, 2) Suricata 설정에 iprep 활성화, 3) 커스텀 룰: alert
    ip any any -> [악성IP] any (msg:''TI-IOC Match''; sid:9000001; rev:1;)'
  answer_detail: TI를 IDS에 적용하면 네트워크 수준에서 알려진 악성 통신을 실시간 탐지할 수 있다. IP reputation 방식은
    대량 IOC를 효율적으로 처리하고, 커스텀 룰은 세밀한 조건 지정이 가능하다.
  verify:
    type: output_contains
    expect: Suricata
  target_vm: siem
  script: '1) IP리스트 → iprep.list 파일 생성, 2) Suricata 설정에 iprep 활성화, 3) 커스텀 룰: alert
    ip any any -> [악성IP] any (msg:''TI-IOC Match''; sid:9000001; rev:1;)'
  risk_level: low
  bastion_prompt: 수집한 IOC를 Suricata 룰로 변환해줘
- order: 6
  instruction: IOC를 Wazuh CDB(Constant Database)에 등록하라. 악성 IP, 해시, 도메인 목록을 CDB list로
    등록하고 룰에서 참조하는 설정을 구현하라.
  hint: /var/ossec/etc/lists/ 디렉토리에 CDB 파일을 생성하고 ossec.conf에 등록하라
  category: implementation
  points: 10
  answer: 1) /var/ossec/etc/lists/malicious_ips 파일 생성(IP:분류 형식), 2) ossec.conf에 <list>
    태그 추가, 3) 룰에서 <list field='srcip' lookup='address_match_key'>malicious_ips</list>
  answer_detail: Wazuh CDB는 대용량 IOC를 효율적으로 조회하는 해시 기반 데이터베이스이다. 수십만 개의 IOC를 밀리초 단위로
    조회할 수 있어, 실시간 이벤트 매칭에 적합하다.
  verify:
    type: output_contains
    expect: CDB
  target_vm: siem
  script: 1) /var/ossec/etc/lists/malicious_ips 파일 생성(IP:분류 형식), 2) ossec.conf에 <list>
    태그 추가, 3) 룰에서 <list field='srcip' lookup='address_match_key'>malicious_ips</list>
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 IOC를 Wazuh CDB(Constant Database)에 등록 작업을 수행해줘
- order: 7
  instruction: IOC 품질 평가 프레임워크를 설계하라. 신뢰도(confidence), 심각도(severity), 유효기간(TTL), 소스
    신뢰도를 포함한 평가 기준을 정의하라.
  hint: Traffic Light Protocol(TLP)과 Admiralty Code를 참고하라
  category: design
  points: 10
  answer: '평가 프레임워크: 신뢰도(1~100, 복수 소스 교차검증), 심각도(Low/Medium/High/Critical), TTL(IP:7일,
    Hash:30일, Domain:14일), 소스 신뢰도(A~F 등급)'
  answer_detail: IOC 품질 평가는 오탐을 줄이고 효과적인 방어를 위해 필수적이다. 단일 소스의 IOC보다 복수 소스에서 확인된 IOC가
    신뢰도가 높다. TTL은 IOC 유형별로 다르게 설정해야 한다.
  verify:
    type: output_contains
    expect: 신뢰도
  target_vm: siem
  script: '평가 프레임워크: 신뢰도(1~100, 복수 소스 교차검증), 심각도(Low/Medium/High/Critical), TTL(IP:7일,
    Hash:30일, Domain:14일), 소스 신뢰도(A~F 등급)'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 IOC 품질 평가 프레임워크 작업을 수행해줘
- order: 8
  instruction: Diamond Model을 활용하여 위협 분석을 수행하라. 최근 공격 사례를 Adversary, Capability, Infrastructure,
    Victim 4개 축으로 분석하라.
  hint: 각 축의 관계와 메타특성(timestamp, phase, result, direction)을 포함하라
  category: analysis
  points: 10
  answer: 'Adversary: APT그룹(동기/능력), Capability: 사용도구/기법(TTP), Infrastructure: C2서버/도메인/프록시,
    Victim: 대상조직/산업/자산. 축 간 관계로 피벗 분석 수행'
  answer_detail: Diamond Model은 MITRE ATT&CK과 보완적으로 사용된다. 4개 축 중 하나를 기점으로 다른 축을 탐색(피벗)하면
    위협의 전체적인 그림을 파악할 수 있다.
  verify:
    type: output_contains
    expect: Diamond
  target_vm: siem
  script: 'Adversary: APT그룹(동기/능력), Capability: 사용도구/기법(TTP), Infrastructure: C2서버/도메인/프록시,
    Victim: 대상조직/산업/자산. 축 간 관계로 피벗 분석 수행'
  risk_level: low
  bastion_prompt: Diamond Model을 활용하여 위협 분석을 수행해줘
- order: 9
  instruction: TI 자동 수집 파이프라인을 구축하라. cron으로 주기적으로 TI 피드를 수집하고, IOC를 정규화하여 Wazuh CDB와
    Suricata 룰을 자동 업데이트하는 스크립트를 설계하라.
  hint: 수집→파싱→정규화→중복제거→배포의 5단계 파이프라인을 설계하라
  category: automation
  points: 12
  answer: '파이프라인: 1) cron 매시간 실행, 2) API로 피드 수집, 3) JSON→통합 포맷 정규화, 4) 기존 IOC와 중복
    제거, 5) CDB/Suricata 룰 자동 업데이트, 6) 서비스 reload'
  answer_detail: TI 파이프라인 자동화는 SOC의 반응 속도를 결정한다. 수동 업데이트는 시간 지연이 크고 인적 오류가 발생하므로,
    자동화하되 품질 검증 단계를 포함해야 한다.
  verify:
    type: output_contains
    expect: 파이프라인
  target_vm: siem
  script: '파이프라인: 1) cron 매시간 실행, 2) API로 피드 수집, 3) JSON→통합 포맷 정규화, 4) 기존 IOC와 중복
    제거, 5) CDB/Suricata 룰 자동 업데이트, 6) 서비스 reload'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 TI 자동 수집 파이프라인 작업을 수행해줘
- order: 10
  instruction: '위협 행위자 프로파일을 작성하라. 특정 APT 그룹(예: APT28, Lazarus)의 TTP, 사용 도구, 표적 산업,
    캠페인 이력을 STIX 형식으로 정리하라.'
  hint: MITRE ATT&CK의 Groups 페이지를 참조하라
  category: analysis
  points: 10
  answer: Threat Actor(이름/동기/국가), 사용 Malware 목록, Attack Pattern(ATT&CK 기법), Campaign(시기/대상),
    relationship으로 연결
  answer_detail: 위협 행위자 프로파일은 방어 우선순위를 결정하는 핵심 정보이다. 특정 산업을 표적으로 하는 그룹의 TTP를 파악하면,
    해당 기법에 대한 탐지 룰을 우선 구축할 수 있다.
  verify:
    type: output_contains
    expect: APT
  target_vm: siem
  script: Threat Actor(이름/동기/국가), 사용 Malware 목록, Attack Pattern(ATT&CK 기법), Campaign(시기/대상),
    relationship으로 연결
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 위협 행위자 프로파일 작업을 수행해줘
- order: 11
  instruction: IOC enrichment를 수행하라. 단순 IOC(IP/Hash)에 컨텍스트(Whois, GeoIP, VirusTotal
    결과, 관련 캠페인)를 추가하는 enrichment 절차를 구현하라.
  hint: 각 IOC 유형별 조회 가능한 서비스와 API를 매핑하라
  category: implementation
  points: 10
  answer: 'IP: Whois→소유자/ISP, GeoIP→국가/도시, AbuseIPDB→신고횟수. Hash: VT→탐지율/패밀리, Malware
    Bazaar→태그. Domain: Whois→등록일, PassiveDNS→해석이력'
  answer_detail: IOC enrichment는 분석관의 판단을 돕는 핵심 프로세스이다. 단순 IOC만으로는 위협의 심각도를 판단하기 어렵지만,
    컨텍스트가 추가되면 우선순위 결정과 대응 방안 수립이 용이해진다.
  verify:
    type: output_contains
    expect: enrichment
  target_vm: siem
  script: 'IP: Whois→소유자/ISP, GeoIP→국가/도시, AbuseIPDB→신고횟수. Hash: VT→탐지율/패밀리, Malware
    Bazaar→태그. Domain: Whois→등록일, PassiveDNS→해석이력'
  risk_level: low
  bastion_prompt: siem VM(Wazuh)에서 IOC enrichment를 수행 작업을 수행해줘
- order: 12
  instruction: TI 공유 정책을 수립하라. TLP(Traffic Light Protocol) 기반의 정보 공유 정책을 정의하고, 공유
    대상별 허용 범위를 명시하라.
  hint: TLP:RED, TLP:AMBER, TLP:GREEN, TLP:CLEAR 각각의 공유 범위를 정의하라
  category: governance
  points: 8
  answer: TLP:RED=개별수신자만, TLP:AMBER=조직내+필요시파트너, TLP:GREEN=커뮤니티 공유, TLP:CLEAR=무제한 공개.
    각 등급별 공유 채널, 보관 기간, 폐기 절차 정의
  answer_detail: TLP는 정보 공유의 국제 표준이다. 부적절한 공유는 소스 보호에 실패하고 향후 정보 수집을 어렵게 만들므로, 명확한
    정책과 교육이 필수적이다.
  verify:
    type: output_contains
    expect: TLP
  target_vm: siem
  script: TLP:RED=개별수신자만, TLP:AMBER=조직내+필요시파트너, TLP:GREEN=커뮤니티 공유, TLP:CLEAR=무제한 공개.
    각 등급별 공유 채널, 보관 기간, 폐기 절차 정의
  risk_level: low
  bastion_prompt: TI 공유 정책을 수립하라. TLP(Traffic Light Protocol) 기반의 정보 공유 정책을 정의하고,
    공유 대상별 허용 범위를 명시해줘
- order: 13
  instruction: 위협 인텔리전스 성과 측정 지표를 정의하라. TI 활용률, IOC 매칭률, 평균 IOC 적용 시간, TI 기반 탐지 비율
    등의 KPI를 설계하라.
  hint: TI 투입(수집량) 대비 산출(탐지 기여)을 측정하는 관점으로 접근하라
