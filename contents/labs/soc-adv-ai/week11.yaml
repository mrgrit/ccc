lab_id: soc-adv-ai-week11
title: 인시던트 대응 - 실전 시나리오 훈련 (AI 지원)
version: ai
course: soc-adv-ai
week: 11
description: 실제 침해사고 시나리오를 기반으로 탐지부터 복구까지 전체 인시던트 대응 프로세스를 실습. AI SubAgent가 자동으로 명령을
  실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- NIST SP 800-61 기반 인시던트 대응 절차를 실행할 수 있다
- 다양한 공격 시나리오에 대한 대응 역량을 갖춘다
- 인시던트 보고서를 체계적으로 작성할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: NIST SP 800-61의 인시던트 대응 4단계(준비, 탐지/분석, 격리/근절/복구, 사후활동)를 설명하고, 각 단계의
    핵심 활동을 정리하라.
  hint: 각 단계의 입력, 활동, 산출물을 정리하라
  category: framework
  points: 8
  answer: '🤖 프롬프트: NIST SP 800-61의 인시던트 대응 4단계(준비, 탐지/분석, 격리/근절/복구, 사후활동)를 설명하고, 각
    단계의 핵심 활동을 정리해줘

    📎 참고 (CLI): 1) 준비(IR팀구성, 도구준비, 절차문서화), 2) 탐지/분석(알림분류, 심각도평가, 범위파악), 3) 격리/근절/복구(감염격리,
    악성코드제거, 시스템복원), 4) 사후활동(교훈도출, 절차개선, 보고서)'
  answer_detail: 4단계 프레임워크는 인시던트 대응의 국제 표준이다. 각 단계는 순차적이지만, 분석과 격리는 동시에 진행될 수 있으며,
    사후활동은 미래 대응 역량 향상의 핵심이다.
  verify:
    type: output_contains
    expect: NIST
    semantic:
      intent: 'NIST SP 800-61 Rev.2 IR 4단계 프레임워크 — (1) Preparation: IR 팀 구성·CSIRT·플레이북·도구(SIEM·EDR·포렌식)·훈련
        (2) Detection & Analysis: 알림 분류·precursor/indicator 구분·심각도 평가·공격 범위 파악 (3)
        Containment/Eradication/Recovery: 단기 격리→증거 보전→악성 제거→시스템 복원→모니터링 (4) Post-Incident
        Activity: lessons learned 회의·IR 개선·보고서. ENISA CSIRT·SANS PICERL 과 유사'
      success_criteria:
      - 4단계 모두 명시
      - 각 단계의 대표 활동 2개 이상
      - 표준 출처(NIST SP 800-61) 언급
      acceptable_methods:
      - NIST SP 800-61 Rev.2 원문 참조
      - SANS PICERL(Preparation-Identification-Containment-Eradication-Recovery-Lessons)
        6단계 매핑
      - ENISA CSIRT 가이드 연계
      - ISO/IEC 27035 IR 표준 대조
      negative_signs:
      - 단계 누락(3개 이하)
      - 활동 없이 이름만 나열
      - NIST 표준 언급 없음
  target_vm: siem
  script: 1) 준비(IR팀구성, 도구준비, 절차문서화), 2) 탐지/분석(알림분류, 심각도평가, 범위파악), 3) 격리/근절/복구(감염격리,
    악성코드제거, 시스템복원), 4) 사후활동(교훈도출, 절차개선, 보고서)
  risk_level: low
  bastion_prompt: NIST SP 800-61의 인시던트 대응 4단계(준비, 탐지/분석, 격리/근절/복구, 사후활동)를 설명하고, 각
    단계의 핵심 활동을 정리해줘
- order: 2
  instruction: '시나리오: Wazuh에서 웹서버({{WEB_IP}})의 SQL Injection 알림이 다수 발생했다. 초기 분류(Triage)를
    수행하라. 알림의 진양성 여부를 판단하고 심각도를 평가하라.'
  hint: 알림 상세 내용, 소스 IP, 공격 성공 여부(응답 코드)를 확인하라
  category: detection
  points: 10
  answer: '🤖 프롬프트: 시나리오: Wazuh에서 웹서버(10.20.30.80)의 SQL Injection 알림이 다수 발생했다

    📎 참고 (CLI): Triage: 1) 알림 상세 확인(rule ID, 설명), 2) 소스IP 확인(외부/내부), 3) 공격 성공 여부(200
    OK면 성공 의심), 4) 영향 범위(DB 접근 여부). 심각도: High(웹서버 DB 접근 가능)'
  answer_detail: 초기 분류는 대응의 방향을 결정한다. SQLi 알림의 경우 실제 DB 데이터 유출 여부가 심각도를 결정하며, 응답 코드,
    응답 크기, DB 에러 메시지 유무로 성공 여부를 추정한다.
  verify:
    type: output_contains
    expect: Triage
    semantic:
      intent: SQLi 알림 초기 분류(Triage) — Wazuh rule ID 31103/31106/31115 등 SQLi 탐지 룰
        확인, 소스 IP(외부/내부 구분, 평판 DB lookup), HTTP 응답 코드(200 OK=성공 의심, 500=에러 기반 탐색),
        응답 크기 delta, UNION/OR 1=1/sleep 페이로드 유형 파악. True positive vs False positive
        판정 → P1-P4 심각도 할당
      success_criteria:
      - 진양성 판정 근거(응답 코드/크기/페이로드 매칭)
      - 심각도 수준(High/Medium/Low) 할당과 근거
      - 소스 IP 조사(위치/평판/과거 이력)
      acceptable_methods:
      - Wazuh 대시보드의 alerts.json 확인
      - tail -f /var/ossec/logs/alerts/alerts.log | grep -i sqli
      - VirusTotal/AbuseIPDB 로 소스 IP 평판 조회
      - Elastic Kibana 로 동일 IP 의 시계열 요청 집계
      negative_signs:
      - rule ID 언급 없이 일반론만
      - 응답 코드/페이로드 분석 생략
      - 심각도 수준 할당 없이 단순 알림 확인
  target_vm: siem
  script: 'Triage: 1) 알림 상세 확인(rule ID, 설명), 2) 소스IP 확인(외부/내부), 3) 공격 성공 여부(200 OK면
    성공 의심), 4) 영향 범위(DB 접근 여부). 심각도: High(웹서버 DB 접근 가능)'
  risk_level: low
  bastion_prompt: '시나리오: Wazuh에서 웹서버(10.20.30.80)의 SQL Injection 알림이 다수 발생했다'
- order: 3
  instruction: 공격 범위를 파악하라. 웹서버 로그, DB 접근 로그, 네트워크 트래픽에서 공격의 시작 시점, 영향 받은 시스템, 유출
    가능 데이터를 조사하라.
  hint: 공격 소스 IP의 전체 활동을 시간순으로 추적하라
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 공격 범위를 파악해줘

    📎 참고 (CLI): 범위 분석: 시작시점(첫 SQLi 시도 시각), 공격IP의 전체 요청 기록, 접근한 DB 테이블, 응답 데이터 크기(유출량
    추정), 다른 시스템 접근 시도 여부'
  answer_detail: 범위 파악은 격리 범위와 대응 수준을 결정한다. 공격 IP의 전체 활동을 추적하여 SQLi 외에 다른 공격(XSS,
    파일 업로드)도 시도했는지, 다른 시스템에 피벗했는지 확인한다.
  verify:
    type: output_contains
    expect: 범위
    semantic:
      intent: 공격 범위(Scope) 분석 — 공격 소스 IP 의 전체 요청 기록 시간순 정렬(grep -E <IP> access.log
        | awk), SQLi 최초 시도 시각(T0)·성공 응답 시각, 접근 DB 테이블(MySQL general_log 또는 slow_query_log),
        응답 payload 크기 합산으로 유출 추정, lateral movement 시도(다른 VM 로그 교차 조회). MITRE T1190(Exploit
        Public-Facing) → T1210(Service Discovery)
      success_criteria:
      - 시작 시점과 종료 시점 식별
      - 접근한 DB 테이블 또는 URL 엔드포인트 열거
      - 유출 가능 데이터량 추정 근거
      acceptable_methods:
      - awk/grep 으로 access.log 에서 소스 IP 필터링 후 시간순 정렬
      - MySQL general_log/binlog 에서 해당 시간대 쿼리 추출
      - Elastic Kibana Discover 에서 client.ip 필드 pivot
      - Wireshark/Zeek 으로 DB 세션 응답 크기 집계
      negative_signs:
      - 시작/종료 시점 불명확
      - DB 쿼리·URL 분석 없이 공격 발생 수준 문장만
      - 피벗/lateral movement 점검 누락
  target_vm: siem
  script: '범위 분석: 시작시점(첫 SQLi 시도 시각), 공격IP의 전체 요청 기록, 접근한 DB 테이블, 응답 데이터 크기(유출량 추정),
    다른 시스템 접근 시도 여부'
  risk_level: low
  bastion_prompt: 공격 범위를 파악해줘
- order: 4
  instruction: '격리 조치를 실행하라. 공격 소스 IP를 방화벽(nftables)에서 차단하고, 웹서버의 취약 엔드포인트를 비활성화하라.


    [FIXTURE] /home/ccc/cyber-range/fixtures/soc-adv-ai-week11/4/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/soc-adv-ai-week11/4/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: nft add element inet filter blacklist {공격IP} 또는 WAF 룰 추가
  category: containment
  points: 10
  answer: '🤖 프롬프트: 격리 조치를 실행해줘

    📎 참고 (CLI): 격리: 1) nftables에서 공격IP 차단(secu 서버), 2) WAF에서 SQLi 패턴 강화, 3) 취약 페이지
    임시 비활성화, 4) DB 접속 비밀번호 변경'
  answer_detail: 격리는 추가 피해를 방지하는 즉각적 조치이다. 네트워크(IP 차단)와 애플리케이션(엔드포인트 비활성화) 수준의 이중
    격리가 효과적이며, 격리 범위는 서비스 영향을 최소화해야 한다.
  verify:
    type: output_contains
    expect: 차단
    semantic:
      intent: '격리(Containment) 이중 조치 — (1) 네트워크: nftables 에 blacklist set 추가 (nft
        add element inet filter blacklist { 203.0.113.X }) 또는 iptables -I INPUT -s
        <IP> -j DROP (2) 애플리케이션: ModSecurity/Apache 취약 엔드포인트 rewrite 차단·DB 접속 계정 비번
        회전. 단기(short-term)/장기(long-term) containment 분리. MITRE M1037 Filter Network
        Traffic'
      success_criteria:
      - 방화벽 차단 명령어 구체 제시(nftables/iptables)
      - 애플리케이션 레벨 차단(WAF/엔드포인트 비활성화)
      - 서비스 영향 최소화 고려(단기 vs 장기)
      acceptable_methods:
      - nft add element inet filter blacklist {IP}
      - iptables -I INPUT -s <IP> -j DROP
      - ModSecurity SecRule 으로 특정 URI/payload 차단
      - 클라우드 SG/NACL 에서 source IP deny
      - Cloudflare/AWS WAF 로 IP ruleset 업데이트
      negative_signs:
      - 구체 명령어 없이 차단 하겠다만
      - 네트워크 또는 앱 중 하나만
      - 서비스 영향 고려 없음
  target_vm: siem
  script: '격리: 1) nftables에서 공격IP 차단(secu 서버), 2) WAF에서 SQLi 패턴 강화, 3) 취약 페이지 임시 비활성화,
    4) DB 접속 비밀번호 변경'
  risk_level: low
  bastion_prompt: '격리 조치를 실행해줘


    [FIXTURE] /home/ccc/cyber-range/fixtures/soc-adv-ai-week11/4/syslog 사전 주입. `grep
    -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/soc-adv-ai-week11/4/syslog`
    후 (1)빈도·패턴 (2)MITRE (3)방어 3섹션. raw dump 금지.'
  fixtures:
  - generator: firewall_log
    target_vm: siem
    path: /home/ccc/cyber-range/fixtures/soc-adv-ai-week11/4/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 5
  instruction: 증거를 수집하라. 웹서버 로그, DB 로그, 네트워크 캡처, 메모리 덤프를 수집하고 무결성 해시를 생성하라.
  hint: 각 증거의 SHA-256 해시를 생성하고 Chain of Custody 문서를 작성하라
  category: collection
  points: 10
  answer: '🤖 프롬프트: 증거를 수집해줘

    📎 참고 (CLI): 증거 목록: 1) /var/log/apache2/access.log(SHA-256), 2) DB slow query log(SHA-256),
    3) pcap 파일(SHA-256), 4) 메모리 덤프(SHA-256). Chain of Custody 기록'
  answer_detail: 증거 수집은 법적 절차와 포렌식 분석의 기반이다. 원본 보존, 해시 무결성 확인, 수집 과정 기록이 3대 원칙이며,
    실시간 서비스 중인 시스템에서는 휘발성 데이터를 먼저 수집한다.
  verify:
    type: output_contains
    expect: 증거
    semantic:
      intent: '증거 수집 & Chain of Custody — 휘발성 순서(Order of Volatility, RFC 3227) 기준:
        (1) 메모리 덤프(LiME/AVML) (2) 네트워크 연결(ss -anp/netstat) (3) 실행 중 프로세스(ps auxf)
        (4) 디스크(dd if=/dev/sda | sha256sum) (5) 로그 파일(/var/log/apache2/access.log,
        MySQL binlog). 각 파일 SHA-256 + 수집자·시각·위치 기록. CoC 문서화로 법적 증거 보존'
      success_criteria:
      - 최소 3개 증거 유형 수집(로그/pcap/memory/disk)
      - SHA-256 또는 MD5 해시 생성 명령 제시
      - Chain of Custody 기록 요소(수집자/시간/위치) 언급
      acceptable_methods:
      - sha256sum access.log > evidence.hash
      - dd if=/dev/mem + LiME 모듈 로드
      - tcpdump -w incident.pcap -i any
      - Velociraptor/GRR/KAPE 로 자동 수집
      - ISO/IEC 27037 디지털 증거 가이드라인 적용
      negative_signs:
      - 휘발성 순서 고려 없이 디스크부터
      - 해시 생성 없음
      - CoC 기록 누락으로 법적 증거력 상실
  target_vm: siem
  script: '증거 목록: 1) /var/log/apache2/access.log(SHA-256), 2) DB slow query log(SHA-256),
    3) pcap 파일(SHA-256), 4) 메모리 덤프(SHA-256). Chain of Custody 기록'
  risk_level: low
  bastion_prompt: 증거를 수집해줘
- order: 6
  instruction: 근절(Eradication) 조치를 수행하라. SQLi 취약점의 근본 원인을 분석하고, 코드 수정, WAF 룰 추가, DB
    권한 제한 등의 조치를 실행하라.
  hint: 취약점의 근본 원인(parameterized query 미사용 등)을 파악하라
  category: eradication
  points: 10
  answer: '🤖 프롬프트: 근절(Eradication) 조치를 수행하라. SQLi 취약점의 근본 원인을 분석하고, 코드 수정, WAF 룰 추가,
    DB 권한 제한 등의 조치를 실행해줘

    📎 참고 (CLI): 근절: 1) 취약 코드 수정(prepared statement 적용), 2) WAF CRS 룰 강화, 3) DB 사용자
