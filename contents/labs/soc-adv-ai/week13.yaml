lab_id: soc-adv-ai-week13
title: Purple Team 연습 - 공격과 방어의 통합 (AI 지원)
version: ai
course: soc-adv-ai
week: 13
description: Red Team(공격)과 Blue Team(방어)이 협업하여 탐지 역량을 검증하고 개선하는 Purple Team 연습 실습. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- Purple Team 방법론을 이해하고 적용할 수 있다
- ATT&CK 기반 공격 시뮬레이션과 탐지 검증을 수행할 수 있다
- 탐지 갭을 식별하고 개선할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Purple Team의 개념과 Red/Blue Team과의 차이를 설명하라. Purple Team 연습의 목적, 참여자, 프로세스를 정의하라.
  hint: Purple Team은 대립이 아닌 협업에 초점을 맞춘다
  category: framework
  points: 8
  answer: '🤖 프롬프트: Purple Team의 개념과 Red/Blue Team과의 차이를 설명하라. Purple Team 연습의 목적, 참여자, 프로세스를 정의해줘

    📎 참고 (CLI): Red Team: 목표 달성(침투), 독립적. Blue Team: 탐지/대응. Purple Team: 협업→공격 시뮬레이션+실시간 탐지 검증. 목적: 탐지 갭 식별과 즉각적 개선'
  answer_detail: Purple Team은 Red Team의 공격 기법을 Blue Team의 탐지 관점에서 즉시 검증한다. 전통적 Red Team 평가와 달리 결과를 기다리지 않고, 각 기법별로 즉시 탐지 여부를
    확인하고 개선한다.
  verify:
    type: output_contains
    expect: Purple
    semantic:
      intent: 'SOC 심화 w13 s1 — Purple Team의 개념과 Red/Blue Team과의 차이를 설명하라. Purple Team 연습의 목적, 참여자, 프로세스를 정의하라. (cmd: Red Team:
        목표 달성(침투), 독립적. Blue Team: 탐지/대응. Purple Team: 협업→공격 시뮬레이션+실시간 탐지 검증. )'
      success_criteria:
      - '명령 실행: Red Team: 목표 달성(침투), 독립적. Blue Team: 탐지/대응. Purple Team: 협업→'
      - 결과 출력 또는 로그 확인
      - SOC 심화 실습 맥락 유지
      acceptable_methods:
      - 제시된 CLI 명령 그대로 실행
      - 동등한 대체 도구 사용
      - SOC 심화 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 심화와 무관한 기법
  target_vm: siem
  script: 'Red Team: 목표 달성(침투), 독립적. Blue Team: 탐지/대응. Purple Team: 협업→공격 시뮬레이션+실시간 탐지 검증. 목적: 탐지 갭 식별과 즉각적 개선'
  risk_level: low
  bastion_prompt: Purple Team의 개념과 Red/Blue Team과의 차이를 설명하라. Purple Team 연습의 목적, 참여자, 프로세스를 정의해줘
- order: 2
  instruction: ATT&CK 기반 공격 시나리오를 설계하라. 5개 이상의 Tactic에 걸친 공격 체인(Initial Access → Execution → Persistence → Lateral Movement
    → Exfiltration)을 설계하라.
  hint: 각 단계에 구체적인 Technique ID와 실행 방법을 명시하라
  category: planning
  points: 12
  answer: '🤖 프롬프트: ATT&CK 기반 공격 시나리오를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): 공격 체인: T1190(웹 취약점 악용)→T1059.004(bash 실행)→T1053.003(cron 지속성)→T1021.004(SSH 횡적이동)→T1048(대체프로토콜 유출). 각 단계의
    구체적 명령 포함'
  answer_detail: 공격 시나리오는 실제 위협 행위자의 TTP를 모방해야 한다. 각 단계의 ATT&CK Technique을 명시하고, 탐지 예상 여부를 사전에 기록하여 연습 후 비교한다.
