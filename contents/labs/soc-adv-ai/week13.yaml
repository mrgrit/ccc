      - SOC 심화 관련 도구 체인
      - 결과를 파일/로그에 저장
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인 누락
      - SOC 심화와 무관한 기법
  target_vm: siem
  script: '공격 체인: T1190(웹 취약점 악용)→T1059.004(bash 실행)→T1053.003(cron 지속성)→T1021.004(SSH 횡적이동)→T1048(대체프로토콜 유출). 각 단계의 구체적 명령
