lab_id: soc-adv-ai-week09
title: 악성코드 분석 - 정적/동적 분석 기법 (AI 지원)
version: ai
course: soc-adv-ai
week: 9
description: 악성코드의 정적 분석(코드/구조)과 동적 분석(행위/네트워크)을 수행하여 기능과 목적을 파악하는 실습. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 악성코드 정적 분석 기법을 숙달한다
- 동적 분석 환경을 구축하고 행위를 분석할 수 있다
- 분석 결과를 IOC와 탐지 룰로 전환할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 악성코드 분석의 4단계 방법론(자동화 분석, 정적 속성, 대화형 동적, 코드 리버싱)을 설명하고 각 단계의 목적과 도구를
    정리하라.
  hint: 각 단계는 이전 단계의 결과를 기반으로 심화된다
  category: framework
  points: 8
  answer: '🤖 프롬프트: 악성코드 분석의 4단계 방법론(자동화 분석, 정적 속성, 대화형 동적, 코드 리버싱)을 설명하고 각 단계의 목적과
    도구를 정리해줘

    📎 참고 (CLI): 1) 자동화(AV 스캔, 샌드박스): 빠른 분류. 2) 정적 속성(strings, PE 구조, import): 기능 추정.
    3) 동적 분석(실행+모니터링): 실제 행위 관찰. 4) 코드 리버싱(디스어셈블리): 상세 로직 분석'
  answer_detail: 단계적 접근은 분석 효율을 극대화한다. 대부분의 샘플은 1~2단계에서 충분히 분류되며, 고급 분석(3~4단계)은 신종
    악성코드나 APT 도구에만 적용한다.
  verify:
    type: output_contains
    expect: 정적
  target_vm: siem
  script: '1) 자동화(AV 스캔, 샌드박스): 빠른 분류. 2) 정적 속성(strings, PE 구조, import): 기능 추정. 3)
    동적 분석(실행+모니터링): 실제 행위 관찰. 4) 코드 리버싱(디스어셈블리): 상세 로직 분석'
  risk_level: low
  bastion_prompt: 악성코드 분석의 4단계 방법론(자동화 분석, 정적 속성, 대화형 동적, 코드 리버싱)을 설명하고 각 단계의 목적과
    도구를 정리해줘
- order: 2
  instruction: 정적 속성 분석을 수행하라. 의심 파일의 파일 유형(file/magic), 해시(MD5/SHA-256), 문자열(strings),
    PE 헤더(readelf/objdump)를 분석하라.
  hint: ELF 바이너리의 경우 readelf -h, strings -a, objdump -d를 사용하라
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 정적 속성 분석을 수행해줘

    📎 참고 (CLI): 분석 결과: 파일유형(ELF/PE/Script), 해시값, 의미 있는 문자열(IP, URL, 명령어, 에러메시지), 임포트
    함수(네트워크, 파일, 프로세스 관련)'
  answer_detail: 정적 속성 분석은 파일을 실행하지 않고 특성을 파악한다. 문자열에서 C2 주소, 임포트에서 악성 기능(네트워크 통신,
    파일 조작, 프로세스 인젝션)을 추정할 수 있다.
  verify:
    type: output_contains
    expect: 해시
  target_vm: siem
  script: '분석 결과: 파일유형(ELF/PE/Script), 해시값, 의미 있는 문자열(IP, URL, 명령어, 에러메시지), 임포트 함수(네트워크,
    파일, 프로세스 관련)'
  risk_level: low
  bastion_prompt: 정적 속성 분석을 수행해줘
- order: 3
  instruction: 패킹/난독화 탐지를 수행하라. 파일의 엔트로피를 계산하고, 알려진 패커 시그니처를 확인하며, 섹션별 특성을 분석하라.
  hint: 고엔트로피(>7.0) 섹션은 암호화/압축 가능성이 높다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 패킹/난독화 탐지를 수행해줘

    📎 참고 (CLI): 엔트로피 분석: 전체 7.2(패킹 의심), 섹션별(.text:6.5, .data:7.8). 패커 시그니처: UPX/없음.
    섹션 특성: 실행+쓰기 권한(비정상)'
  answer_detail: 패킹된 파일은 정적 분석을 어렵게 한다. 엔트로피가 높고 의미 있는 문자열이 적으면 패킹을 의심하며, 언패킹 후 재분석이
    필요하다.
  verify:
    type: output_contains
    expect: 엔트로피
  target_vm: siem
  script: '엔트로피 분석: 전체 7.2(패킹 의심), 섹션별(.text:6.5, .data:7.8). 패커 시그니처: UPX/없음. 섹션
    특성: 실행+쓰기 권한(비정상)'
  risk_level: low
  bastion_prompt: 패킹/난독화 탐지를 수행해줘
- order: 4
  instruction: 동적 분석 환경을 구성하라. 격리된 분석 환경(네트워크 격리, 스냅샷, 모니터링 도구)의 구성 요소와 안전 수칙을 정의하라.
  hint: 가상머신 + 가상 네트워크 + INetSim/FakeNet + 프로세스 모니터링 도구
