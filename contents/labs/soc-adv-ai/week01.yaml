lab_id: soc-adv-ai-week01
title: SOC 성숙도 AI 자동 평가
version: ai
course: soc-adv-ai
week: 1
description: AI를 활용하여 SOC 성숙도를 자동 평가하고 개선 로드맵을 생성하는 실습
difficulty: hard
duration_minutes: 120
objectives:
- AI를 활용하여 SOC 성숙도를 자동 평가할 수 있다
- LLM 기반 분석과 보고서 자동 생성을 구현할 수 있다
- AI 파이프라인을 설계하여 반복적 평가를 자동화할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API를 호출하여 SOC-CMM 프레임워크의 5개 도메인 설명을 요청하라.
  hint: SOC-CMM 도메인 설명 요청
  category: framework
  points: 8
  answer: Business, People, Process, Technology, Services 도메인의 AI 생성 설명
  answer_detail: AI가 생성한 SOC-CMM 설명은 참고용이며, 실제 평가는 공식 프레임워크를 기준으로 수행해야 한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"Explain the 5 domains of SOC-CMM framework in Korean","stream":false}'
  verify:
    type: output_contains
    expect: Business
- order: 2
  instruction: AI로 Wazuh API에서 에이전트 정보를 수집하고 Technology 도메인 성숙도를 자동 평가하는 스크립트를 작성하라.
  hint: Wazuh 에이전트 수집 + AI 평가
  category: assessment
  points: 10
  answer: 에이전트 수 기반 Technology 성숙도 자동 평가 결과
  answer_detail: API 데이터를 수집하고 AI가 기준에 따라 자동 평가하면, 수동 평가 대비 일관성과 속도가 향상된다.
  script: 'curl -sk https://10.20.30.100:55000/agents/summary/status -u wazuh-wui:wazuh-wui | python3 -c "import sys,json; d=json.load(sys.stdin); print(f''Active: {d.get(\"data\",{}).get(\"active\",0)}'')"'
  verify:
    type: output_contains
    expect: active
- order: 3
  instruction: AI에게 nftables 방화벽 정책을 분석시키는 프롬프트를 작성하고 실행하라.
  hint: 방화벽 정책 AI 분석
  category: assessment
  points: 10
  answer: 방화벽 정책의 AI 보안 분석 결과
  answer_detail: AI를 활용한 방화벽 정책 분석은 정책의 강점/약점을 빠르게 식별한다. 기본 drop 정책 여부, 불필요한 허용 규칙 등을 자동 평가한다.
  script: 'RULES=$(ssh -o StrictHostKeyChecking=no 10.20.30.1 ''nft list ruleset 2>/dev/null | head -50'' 2>/dev/null || echo ''chain input { policy drop; }''); curl -s http://$LLM_HOST:11434/api/generate
    -d "{\"model\":\"gemma3:4b\",\"prompt\":\"다음 nftables 방화벽 정책을 보안 관점에서 분석하라: $RULES\",\"stream\":false}"'
  verify:
    type: output_contains
    expect: policy
- order: 4
  instruction: AI에게 Suricata IPS 룰 통계를 분석시키고 커버리지 평가를 요청하라.
  hint: Suricata 룰 AI 분석
  category: assessment
  points: 10
  answer: Suricata 룰 커버리지 AI 분석 결과
  answer_detail: AI 분석은 룰셋의 전체적 커버리지와 부족한 영역을 빠르게 파악한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"Suricata IPS에 ET Open 룰셋 30000개가 적용되어 있을 때, 카테고리별 커버리지를 분석하고 개선점을 제시하라.","stream":false}'
  verify:
    type: output_contains
    expect: rules
- order: 5
  instruction: AI로 BunkerWeb WAF 설정 상태를 분석하고 보안 모듈 활성화 권고를 생성하라.
  hint: WAF 설정 AI 분석
  category: assessment
  points: 10
  answer: WAF 추가 보안 설정 AI 권고 결과
  answer_detail: AI가 WAF 설정을 분석하면 일반적으로 놓치기 쉬운 설정(CORS, CSP 헤더 등)도 권고할 수 있다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"BunkerWeb WAF에서 ModSecurity, Anti-bot, Rate Limiting 모듈이 활성화되어 있을 때 추가 필요한 보안 설정을 한국어로 제안하라.","stream":false}'
  verify:
    type: output_contains
    expect: MODSECURITY
- order: 6
  instruction: AI에게 현재 환경의 Playbook 현황을 분석시키고 Process 도메인 성숙도를 평가하도록 하라.
  hint: Playbook AI 분석
  category: assessment
  points: 10
  answer: Playbook 기반 Process 성숙도 AI 평가 결과
  answer_detail: AI는 Playbook의 수, 복잡도, 커버리지를 분석하여 자동으로 성숙도 레벨을 산정한다.
  script: 'PB=$(curl -s -H ''X-API-Key: ccc-api-key-2026'' http://localhost:9100/api/playbooks 2>/dev/null || echo ''[]''); curl -s http://$LLM_HOST:11434/api/generate -d "{\"model\":\"gemma3:4b\",\"prompt\":\"다음
    Playbook 목록을 분석하고 SOC-CMM Process 도메인 성숙도를 평가하라: $PB\",\"stream\":false}"'
  verify:
    type: output_contains
    expect: playbook
- order: 7
  instruction: AI에게 SOC 팀 구성 최적화 방안을 생성시키라.
  hint: SOC 팀 구성 AI 설계
  category: planning
  points: 10
  answer: SOC 팀 구성 최적화 AI 설계 결과
  answer_detail: AI는 산업 표준과 모범 사례를 기반으로 팀 구성을 추천한다. 실제 적용 시 조직 규모와 예산을 고려해야 한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"SOC 팀을 Tier1/2/3/Manager로 구성할 때, 각 역할의 인원 비율, 필요 역량, KPI를 한국어로 상세히 제시하라.","stream":false}'
  verify:
    type: output_contains
    expect: Tier
- order: 8
  instruction: AI에게 5개 도메인의 점수를 입력하고 갭 분석 리포트를 자동 생성시키라.
  hint: 갭 분석 AI 자동 생성
  category: analysis
  points: 10
  answer: AI가 생성한 갭 분석 및 개선 로드맵
  answer_detail: AI는 갭 크기, 상호의존성, 비용 효과를 고려한 우선순위를 자동 산정할 수 있다.
  script: 'curl -s http://$LLM_HOST:11434/api/generate -d ''{"model":"gemma3:4b","prompt":"SOC-CMM 현재 점수: Business=2, People=2, Process=2, Technology=3, Services=2. 목표 Level 4 기준으로 갭 분석하고 우선순위별 개선 로드맵을
    한국어로 작성하라.","stream":false}'''
  verify:
    type: output_contains
    expect: 갭
- order: 9
  instruction: AI로 SOC KPI 대시보드 설계를 자동 생성하라.
  hint: KPI 대시보드 AI 설계
  category: planning
  points: 10
  answer: SOC KPI 대시보드 AI 설계 결과
  answer_detail: AI가 생성한 대시보드 설계는 핵심 지표와 시각화 방법을 자동으로 제안한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"SOC KPI 대시보드를 설계하라. MTTD, MTTR, 오탐률, 알림 처리량, 인시던트 수를 포함하고, 각 지표의 계산 공식, 데이터 소스, 시각화 방법을 한국어로 작성하라.","stream":false}'
  verify:
    type: output_contains
    expect: MTTD
- order: 10
  instruction: AI에게 Wazuh 알림 데이터를 기반으로 MTTD를 시뮬레이션하도록 요청하라.
  hint: MTTD AI 시뮬레이션
  category: measurement
  points: 10
  answer: MTTD 분석 및 개선 AI 제안
  answer_detail: AI는 MTTD 데이터 패턴을 분석하여 병목(네트워크 지연, 룰 복잡도 등)을 식별하고 개선 방안을 제시한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"Wazuh SIEM에서 10건의 알림이 평균 15초의 MTTD를 보였다. 이 데이터를 분석하고, MTTD 개선 방안 3가지를 한국어로 제시하라.","stream":false}'
  verify:
    type: output_contains
    expect: MTTD
- order: 11
  instruction: AI로 벤치마킹 데이터를 생성하고 현재 환경과 비교 분석하라.
  hint: 벤치마킹 AI 분석
  category: analysis
  points: 10
  answer: 산업 벤치마크 대비 AI 평가 결과
  answer_detail: AI는 산업 보고서의 벤치마크를 참조하여 객관적인 위치 평가를 수행한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"SANS SOC Survey 2024 산업 평균 데이터와 비교하여, MTTD 15초, MTTR 30분, 오탐률 15%인 SOC의 수준을 평가하고 개선 방향을 한국어로 제시하라.","stream":false}'
  verify:
    type: output_contains
    expect: 벤치마킹
- order: 12
  instruction: AI에게 SOC 성숙도 개선 로드맵을 단기/중기/장기로 자동 생성시키라.
  hint: 로드맵 AI 생성
  category: planning
  points: 10
  answer: 단기/중기/장기 개선 로드맵 AI 생성 결과
  answer_detail: AI는 일반적인 SOC 성숙도 개선 경로를 기반으로 현실적인 로드맵을 자동 생성한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"SOC 성숙도 Level 2.2에서 Level 4.0으로 향상하기 위한 로드맵을 단기(3개월)/중기(6개월)/장기(12개월)로 구분하여 한국어로 작성하라. 각 단계의 구체적 실행 항목, 예상 비용,
    기대 효과를 포함하라.","stream":false}'
  verify:
    type: output_contains
    expect: 로드맵
- order: 13
  instruction: AI로 경영진 보고용 Executive Summary를 자동 생성하라.
  hint: Executive Summary AI 생성
  category: reporting
  points: 10
  answer: 경영진 보고용 AI 생성 Executive Summary
  answer_detail: AI는 기술 용어를 비즈니스 언어로 변환하여 경영진이 이해할 수 있는 보고서를 자동 생성한다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"SOC 성숙도 평가 결과를 경영진에게 보고하는 Executive Summary를 작성하라. 현재 Level 2.2/5.0, 목표 4.0, 투자 규모 5억원, 리스크 감소 효과 50%. 비기술적 언어로
    한국어 작성하라.","stream":false}'
  verify:
    type: output_contains
    expect: 성숙도
- order: 14
  instruction: AI가 생성한 전체 평가 결과를 검증하고 최종 보고서를 자동 조합하라.
  hint: 최종 보고서 AI 조합
  category: reporting
  points: 12
  answer: AI가 조합한 최종 SOC 성숙도 종합 보고서
  answer_detail: AI 생성 보고서는 초안으로 활용하고, 전문가가 검증/수정하여 최종 보고서를 완성하는 것이 바람직하다.
  script: 'curl -s http://$LLM_HOST:11434/api/generate -d ''{"model":"gemma3:4b","prompt":"SOC 성숙도 종합 평가 보고서를 작성하라. 포함 항목: 1)경영진 요약 2)현재 상태(5개 도메인별 점수) 3)갭 분석 4)KPI 5)로드맵 6)예산. 한국어로 전문적으로 작성하라.","stream":false}'''
  verify:
    type: output_contains
    expect: 성숙도
- order: 15
  instruction: 전체 AI 분석 파이프라인을 하나의 자동화 스크립트로 통합하고 실행하라.
  hint: 통합 AI 파이프라인
  category: automation
  points: 10
  answer: 전체 AI 평가 파이프라인 통합 스크립트 완성
  answer_detail: 자동화된 AI 파이프라인은 데이터 수집→AI 분석→보고서 생성을 원클릭으로 수행한다. 정기적으로 실행하면 SOC 성숙도 추이를 자동 추적할 수 있다.
  script: 'echo ''#!/bin/bash

    # SOC Maturity AI Assessment Pipeline

    OLLAMA="http://$LLM_HOST:11434/api/generate"

    MODEL="gemma3:4b"


    # Step 1: Collect data

    echo "[1/3] Collecting environment data..."

    WAZUH_STATUS=$(curl -sk https://10.20.30.100:55000/agents/summary/status -u wazuh-wui:wazuh-wui 2>/dev/null || echo "{\"data\":{\"active\":0}}")


    # Step 2: AI Analysis

    echo "[2/3] Running AI analysis..."

    RESULT=$(curl -s $OLLAMA -d "{\"model\":\"$MODEL\",\"prompt\":\"Wazuh status: $WAZUH_STATUS. SOC 성숙도를 평가하라.\",\"stream\":false}")


    # Step 3: Report

    echo "[3/3] Generating report..."

    echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"response\",\"N/A\")[:500])"

    echo "Pipeline complete."'' > /tmp/soc_maturity_ai.sh && chmod +x /tmp/soc_maturity_ai.sh && echo ''Pipeline script created'''
  verify:
    type: output_contains
    expect: Pipeline
