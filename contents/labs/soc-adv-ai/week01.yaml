lab_id: soc-adv-ai-week01
title: SOC 성숙도 평가 및 역량 분석 (AI 지원)
version: ai
course: soc-adv-ai
week: 1
description: SOC 성숙도 모델(CMM)을 기반으로 조직의 보안관제 역량을 평가하고, 개선 로드맵을 수립하는 실습. Wazuh, Suricata, nftables의 실제 상태를
  점검하여 정량적 성숙도를 산출한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SOC-CMM 프레임워크를 이해하고 적용할 수 있다
- 조직 보안관제 역량의 현재 수준을 정량적으로 평가할 수 있다
- 성숙도 갭 분석을 통해 개선 우선순위를 도출할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Wazuh Dashboard에 접속하여 연결된 에이전트 수와 상태를 확인하라. 브라우저에서 https://SIEM_IP:443 → 로그인(admin/admin)
    → 왼쪽 'Agents' 메뉴 → 에이전트 수와 Active/Disconnected 상태를 기록하라.
  hint: Dashboard에 표시되는 에이전트 수와 CLI의 agent_control -l 결과를 비교하세요.
  category: assessment
  points: 10
  answer: '🤖 프롬프트: Wazuh Manager(10.20.30.100)의 API를 호출하여 연결된 에이전트 수와 상태를 확인하라. Technology 도메인의 SIEM 역량
    평가에 활용한다해줘

    📎 참고 (CLI): Wazuh Dashboard → Agents에서 에이전트 목록 확인. Total agents, Active agents 수치를 메모.'
  answer_detail: Wazuh의 agent_control 명령으로 연결된 에이전트 수와 상태를 확인한다. Active 에이전트가 3대 이상이면 Technology 도메인 Level
    2(Managed) 이상으로 판정한다. API 대신 CLI를 사용하면 인증 문제를 우회할 수 있다.
  verify:
    type: output_contains
    expect: active
    semantic:
      intent: 'Wazuh 에이전트 현황 + Agent Summary — agent_control -l + Active/Disconnected 카운트 집계 + === Agent
        Summary === 섹션. SOC 성숙도 평가 시작점: 자산 커버리지 baseline'
      success_criteria:
      - agent_control -l + 집계
      - Summary 섹션
      - SOC 성숙도 첫 지표
      acceptable_methods:
      - agent_control + grep -c
      - Wazuh API /agents/summary
      negative_signs:
      - 목록만 (집계 없음)
  target_vm: siem
  script: '/var/ossec/bin/agent_control -l 2>/dev/null | head -20 && echo "=== Agent Summary ===" && /var/ossec/bin/agent_control
    -l 2>/dev/null | grep -c "Active" | xargs -I{} echo "active agents: {}"'
  risk_level: low
  bastion_prompt: Wazuh Manager(10.20.30.100)의 API를 호출하여 연결된 에이전트 수와 상태를 확인하라. Technology 도메인의 SIEM 역량
    평가에 활용한다해줘
- order: 2
  instruction: Wazuh Manager에서 활성화된 탐지 룰 수를 확인하라. 커스텀 룰과 기본 룰을 구분하여 집계하라.
  hint: Wazuh 룰 디렉토리 /var/ossec/ruleset/rules/ (기본)와 /var/ossec/etc/rules/ (커스텀)를 확인한다.
  category: assessment
  points: 10
  answer: '🤖 프롬프트: Wazuh Manager에서 활성화된 탐지 룰 수를 확인해줘

    📎 참고 (CLI): echo "=== Default Rules ===" && ls /var/ossec/ruleset/rules/*.xml 2>/dev/null | wc -l
    && echo "=== Custom Rules ===" && ls /var/ossec/etc/rules/*.xml 2>/dev/null | wc -l && echo "=== Total
    rule entries ===" && grep -r "<rule id" /var/ossec/ruleset/rules/ /var/ossec/etc/rules/ 2>/dev/null
    | wc -l'
  answer_detail: 기본 룰셋 외에 커스텀 룰이 존재하면 조직이 자체 탐지 요구사항을 반영하고 있음을 의미한다. 커스텀 룰이 10개 이상이면 Level 3(Defined),
    상관분석 룰까지 있으면 Level 4(Quantitatively Managed)로 평가한다.
  verify:
    type: output_contains
    expect: Rules
    semantic:
      intent: 탐지 룰 인벤토리 — ls /var/ossec/ruleset/rules/*.xml | wc -l (기본 룰 수) + wc -l local_rules.xml (커스텀
        수). 룰 자산 성숙도 지표. 커스텀 룰 비율이 SOC 성숙도 지표
      success_criteria:
      - 기본 + 커스텀 룰 수
      - 구분 집계
      acceptable_methods:
      - ls + wc
      - grep -c <rule
      negative_signs:
      - 단일 수치만
  target_vm: siem
  script: echo "=== Default Rules ===" && ls /var/ossec/ruleset/rules/*.xml 2>/dev/null | wc -l && echo
    "=== Custom Rules ===" && ls /var/ossec/etc/rules/*.xml 2>/dev/null | wc -l && echo "=== Total rule
    entries ===" && grep -r "<rule id" /var/ossec/ruleset/rules/ /var/ossec/etc/rules/ 2>/dev/null | wc
    -l
  risk_level: low
  bastion_prompt: Wazuh Manager에서 활성화된 탐지 룰 수를 확인해줘
- order: 3
  instruction: nftables 방화벽({{SECU_IP}})의 룰셋을 원격으로 확인하고, 인바운드/아웃바운드 기본 정책(default policy)과 전체 룰 수를 기록하라.
  hint: ssh를 통해 nft list ruleset 명령을 실행한다.
  category: assessment
  points: 10
  answer: '🤖 프롬프트: nftables 방화벽(10.20.30.1)의 룰셋을 원격으로 확인하고, 인바운드/아웃바운드 기본 정책(default policy)과 전체 룰 수를
    기록해줘

    📎 참고 (CLI): echo "=== nftables Policy ===" && sudo nft list ruleset 2>/dev/null | grep -E "chain|policy"
    && echo "=== Total Rules ===" && sudo nft list ruleset 2>/dev/null | grep -cE "^\s+(ip |tcp |udp |ct
    |meta |drop|accept|reject)"'
  answer_detail: chain의 policy가 drop이면 기본 차단(deny-all) 정책으로 성숙도가 높다. accept이면 허용 기반으로 보안이 약하다. 룰 수가 많을수록
    세밀한 접근 통제를 의미한다.
  verify:
    type: output_contains
    expect: policy
    semantic:
      intent: nftables 정책 분석 — sudo nft list ruleset | grep -E chain|policy 로 input/forward/output 3 체인의
        default policy (drop/accept) + 전체 룰 수. 네트워크 방어 성숙도
      success_criteria:
      - chain + policy 필터
      - default policy 확인
      acceptable_methods:
      - nft list + grep
      negative_signs:
      - policy 구분 없음
  target_vm: secu
  script: echo "=== nftables Policy ===" && sudo nft list ruleset 2>/dev/null | grep -E "chain|policy"
    && echo "=== Total Rules ===" && sudo nft list ruleset 2>/dev/null | grep -cE "^\s+(ip |tcp |udp |ct
    |meta |drop|accept|reject)"
  risk_level: low
  bastion_prompt: nftables 방화벽(10.20.30.1)의 룰셋을 원격으로 확인하고, 인바운드/아웃바운드 기본 정책(default policy)과 전체 룰 수를 기록해줘
- order: 4
  instruction: Suricata IDS({{SECU_IP}})의 활성 룰 수와 카테고리별 분포를 확인하라.
  hint: suricata 룰 디렉토리 /var/lib/suricata/rules/ 에서 .rules 파일을 분석한다.
  category: assessment
  points: 10
  answer: '🤖 프롬프트: Suricata IDS(10.20.30.1)의 활성 룰 수와 카테고리별 분포를 확인해줘

    📎 참고 (CLI): echo "=== Suricata Rule Files ===" && ls /var/lib/suricata/rules/*.rules 2>/dev/null |
    head -10 && echo "=== Active alert rules ===" && grep -c "^alert" /var/lib/suricata/rules/*.rules
    2>/dev/null | tail -10 && echo "=== Total active rules ===" && grep -ch "^alert" /var/lib/suricata/rules/*.rules
    2>/dev/null | paste -sd+ | bc'
  answer_detail: Suricata의 룰셋 규모와 구성은 IDS/IPS 역량의 핵심 지표다. ET Open 기본 룰셋(약 30,000+)이 있고 커스텀 룰이 추가되어 있으면
    Technology 도메인 Level 3 이상이다.
  verify:
    type: output_contains
    expect: rules
    semantic:
      intent: Suricata 룰 인벤토리 — ls /var/lib/suricata/rules/*.rules + 파일별 wc -l 로 emerging-threats·community·local
        각 카테고리 룰 수. 네트워크 IDS coverage 성숙도
      success_criteria:
      - '*.rules 목록 + 카테고리별 카운트'
      acceptable_methods:
      - ls + wc
      - suricatasc -c ruleset-stats
      negative_signs:
      - 카테고리 분류 없음
  target_vm: secu
  script: echo "=== Suricata Rule Files ===" && ls /var/lib/suricata/rules/*.rules 2>/dev/null | head
    -10 && echo "=== Active alert rules ===" && grep -c "^alert" /var/lib/suricata/rules/*.rules 2>/dev/null
    | tail -10 && echo "=== Total active rules ===" && grep -ch "^alert" /var/lib/suricata/rules/*.rules
    2>/dev/null | paste -sd+ | bc
  risk_level: low
  bastion_prompt: Suricata IDS(10.20.30.1)의 활성 룰 수와 카테고리별 분포를 확인해줘
- order: 5
  instruction: Suricata의 최근 24시간 알림을 분석하여 카테고리별 발생 건수를 집계하라. eve.json에서 alert 이벤트를 추출한다.
  hint: jq로 eve.json에서 alert.category를 추출하고 sort | uniq -c로 집계한다.
  category: assessment
  points: 10
  answer: '🤖 프롬프트: Suricata의 최근 24시간 알림을 분석하여 카테고리별 발생 건수를 집계하라. eve.json에서 alert 이벤트를 추출한다해줘

    📎 참고 (CLI): cat /var/log/suricata/eve.json 2>/dev/null | python3 -c " import sys,json cats={} for
    l in sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"alert\": c=e.get(\"alert\",{}).get(\"category\",\"unknown\")
    cats[c]=cats.get(c,0)+1 except: pass for c,n in sorted(cats.items(),key=lambda x:-x[1])[:10]: print(f\"{n:5d}  {c}\")
    " 2>/dev/null || echo "No alert data found"'
  answer_detail: 알림 카테고리 분포는 현재 네트워크에서 가장 빈번한 위협 유형을 보여준다. 특정 카테고리가 압도적으로 많으면 오탐 가능성을 검토하고, 다양한 카테고리가
    균형있게 탐지되면 룰셋 품질이 높다.
  verify:
    type: output_contains
    expect: alert
    semantic:
      intent: Suricata 24h 알림 카테고리별 집계 — python3 eve.json 파싱 + alert.category 추출 + Counter. scan·web-attack·trojan
        등 유형별 분포. 현재 위협 landscape 이해
      success_criteria:
      - eve.json python 파싱
      - category 집계
      acceptable_methods:
      - python json + Counter
      - jq + uniq -c
      negative_signs:
      - 파싱 없이 raw
  target_vm: secu
  script: 'cat /var/log/suricata/eve.json 2>/dev/null | python3 -c " import sys,json cats={} for l in
    sys.stdin: try: e=json.loads(l) if e.get(\"event_type\")==\"alert\": c=e.get(\"alert\",{}).get(\"category\",\"unknown\")
    cats[c]=cats.get(c,0)+1 except: pass for c,n in sorted(cats.items(),key=lambda x:-x[1])[:10]: print(f\"{n:5d}  {c}\")
    " 2>/dev/null || echo "No alert data found"'
  risk_level: low
  bastion_prompt: Suricata의 최근 24시간 알림을 분석하여 카테고리별 발생 건수를 집계하라. eve.json에서 alert 이벤트를 추출한다해줘
- order: 6
  instruction: Wazuh Dashboard에서 최근 고위험 알림(level ≥ 10)을 조회하라. 브라우저에서 Dashboard → 왼쪽 'Security events'
    → 상단 필터에서 'rule.level >= 10' 입력 → 결과에서 rule description, level, agent를 확인하라.
  hint: 필터 바에 KQL 문법으로 rule.level >= 10 을 입력하세요.
  category: assessment
  points: 10
  answer: '🤖 프롬프트: Wazuh에서 최근 고위험 알림(level >= 10)을 조회해줘

    📎 참고 (CLI): Wazuh Dashboard → Security events → rule.level >= 10 필터 → 이벤트 상세에서 description/level/agent
    확인.'
  answer_detail: Wazuh alert level 10 이상은 High severity에 해당한다. 고위험 알림의 빈도와 유형을 분석하면 SOC의 탐지 역량과 대응 부하를
    판단할 수 있다. 고위험 알림이 적절히 발생하면 Level 3, 상관분석까지 동작하면 Level 4이다.
  verify:
    type: output_contains
    expect: Level
    semantic:
      intent: 고위험 알림 Top — tail -200 alerts.json | python3 jq rule.level >= 10 + 정렬. 최근 200 경보 중 critical
        추출. 현재 SOC 부담 정량
      success_criteria:
      - python rule.level 필터
      - 고위험 목록
      acceptable_methods:
      - python json + filter
      - jq select
      negative_signs:
      - level 필터 없음
  target_vm: siem
  script: 'tail -200 /var/ossec/logs/alerts/alerts.json 2>/dev/null | python3 -c " import sys,json for
    l in sys.stdin: try: e=json.loads(l) r=e.get(\"rule\",{}) if r.get(\"level\",0)>=10: print(f\"Level
    {r.get(\"level\",0):2d} | {r.get(\"description\",\"\")[:60]} | Agent: {e.get(\"agent\",{}).get(\"name\",\"N/A\")}\")
    except: pass " 2>/dev/null | tail -10 || echo "No Level 10+ alerts found"'
  risk_level: low
  bastion_prompt: Wazuh에서 최근 고위험 알림(level >= 10)을 조회해줘
- order: 7
  instruction: Wazuh Dashboard에서 SOC KPI 기준선을 측정하라. Dashboard → Overview 에서 최근 24시간 알림 수, 상위 Rule Groups,
    가장 많이 알림을 발생시킨 Agent를 기록하라. 이 수치가 MTTD 시뮬레이션의 기준이 된다.
  hint: Overview 페이지의 그래프와 패널을 확인하세요.
  category: measurement
  points: 10
  answer: '🤖 프롬프트: SOC KPI 기준선을 측정해줘

    📎 참고 (CLI): Wazuh Dashboard → Overview → 24h 알림 수, Top Rule Groups, Top Agents 기록.'
  answer_detail: MTTD(Mean Time To Detect)는 이벤트 발생부터 SOC이 인지하기까지의 시간이다. SIEM 내부 처리 시간은 보통 수초이며, 운영적 MTTD(분석관
    확인까지)는 별도 측정이 필요하다. 분당 알림률은 SOC 인력 부하를 결정한다.
  verify:
    type: output_contains
    expect: alerts
    semantic:
      intent: SOC KPI baseline — python alerts.json 최근 24h + 총 알림 수 + Rule groups 분포 + 평균 level. KPI 측정
        기준점. 개선 전 vs 후 비교 기초
      success_criteria:
      - KPI 3+ 지표
      - 24h 기준
      acceptable_methods:
      - python json 분석
      negative_signs:
      - 지표 1-2
  target_vm: siem
  script: 'tail -100 /var/ossec/logs/alerts/alerts.json 2>/dev/null | python3 -c " import sys,json from
    datetime import datetime count=0; levels={} for l in sys.stdin: try: e=json.loads(l); count+=1 lv=e.get(\"rule\",{}).get(\"level\",0)
    levels[lv]=levels.get(lv,0)+1 except: pass print(f\"Total alerts sampled: {count}\") print(f\"Level
    distribution:\") for lv in sorted(levels.keys()): print(f\"  Level {lv}: {levels[lv]}\") print(f\"Estimated
    alerts/min: {count/60:.1f} (assuming 1h window)\") print(f\"MTTD estimate: <30s (SIEM internal processing)\")
    " 2>/dev/null || echo "No alerts data available"'
  risk_level: low
  bastion_prompt: SOC KPI 기준선을 측정해줘
- order: 8
  instruction: 5개 도메인(Business, People, Process, Technology, Services)의 평가 결과를 종합하여 SOC 성숙도 레이더 차트용 JSON
    데이터를 생성하고 /tmp/soc_maturity.json에 저장하라.
  hint: 이전 단계의 평가 결과를 숫자(0~5)로 변환하여 JSON으로 출력한다.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: 5개 도메인(Business, People, Process, Technology, Services)의 평가 결과를 종합하여 SOC 성숙도\
    \ 레이더 차트용 JSON 데이터를 생성하고 /tmp/soc_maturity.json에 저장해줘\n\U0001F4CE 참고 (CLI): cat > /tmp/soc_maturity.json\
    \ << 'EOF'\n{\n  \"assessment_date\": \"2026-04-06\",\n  \"framework\": \"SOC-CMM v2\",\n  \"scores\"\
    : {\n    \"Business\": 2,\n    \"People\": 2,\n    \"Process\": 2,\n    \"Technology\": 3,\n    \"\
    Services\": 2\n  },\n  \"average\": 2.2,\n  \"target\": 4.0,\n  \"evidence\": {\n    \"Technology\"\
    : \"Wazuh active with agents + Suricata 30k+ rules + nftables deny-all\",\n    \"Process\": \"Basic\
    \ playbooks exist, no SOAR automation\",\n    \"People\": \"No tiered SOC structure defined\",\n \
    \   \"Business\": \"No formal SOC charter or budget allocation\",\n    \"Services\": \"Monitoring\
    \ active, TI feed not integrated\"\n  }\n}\nEOF\ncat /tmp/soc_maturity.json | python3 -m json.tool"
  answer_detail: 레이더 차트는 SOC 성숙도의 균형을 시각적으로 보여준다. Technology(3)가 가장 높고 나머지(2)가 낮으면 도구 투자 대비 프로세스/인력이 미흡함을
    의미한다. 평균 2.2에서 목표 4.0까지 갭 1.8이 존재한다.
  verify:
    type: output_contains
    expect: SOC-CMM
    semantic:
      intent: 성숙도 레이더 차트 JSON /tmp/soc_maturity.json — 5 도메인(Business, People, Process, Technology, Services)
        × Level 1-5 점수. CMM framework. Wazuh/Suricata/nftables baseline 반영
      success_criteria:
      - /tmp/soc_maturity.json
      - 5 도메인 점수
      - CMM 개념
      acceptable_methods:
      - cat > json + python dict
      negative_signs:
      - 도메인 3 이하
  target_vm: siem
  script: "cat > /tmp/soc_maturity.json << 'EOF'\n{\n  \"assessment_date\": \"2026-04-06\",\n  \"framework\"\
    : \"SOC-CMM v2\",\n  \"scores\": {\n    \"Business\": 2,\n    \"People\": 2,\n    \"Process\": 2,\n\
    \    \"Technology\": 3,\n    \"Services\": 2\n  },\n  \"average\": 2.2,\n  \"target\": 4.0,\n  \"\
