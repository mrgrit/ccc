    # Bastion이 동적 갱신할 파일

    10.20.30.99 1;

    C''

    ls -la /etc/nginx/suspect_ips.conf'
  answer_detail: 의심 IP를 Bastion이 동적 갱신. 이 파일 변경 시 nginx reload.
