  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 16
  answer: "cat > ~/ccc/scripts/roi.py <<'PY'\ndef roi(tokens, price=0.000015, success_prob=0.8, value=1000):\n\
    \    cost = tokens * price\n    return success_prob*value - cost\nbase = roi(1_000_000)\nwith_tarpit\
    \ = roi(5_000_000, success_prob=0.4)  # 5배 토큰 + 성공률 반감\nprint('base_roi', round(base,2), 'with_tarpit',\
    \ round(with_tarpit,2))\nPY\npython3 ~/ccc/scripts/roi.py"
  answer_detail: 공격자 ROI 계산. tar-pit 적용 시 토큰 소모 증가 + 성공률 감소의 *이중 효과*.
