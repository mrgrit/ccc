lab_id: agent-ir-nonai-week10
title: 기만·지연 — 허니토큰과 tar-pit (Non-AI)
version: nonai
course: agent-ir-nonai
week: 10
description: 정상 트래픽에 투명하지만 에이전트에겐 *토큰 비용*을 큰 폭으로 증가시키는 기만·지연 방어를 구축한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 허니 자산을 web에 배포하고 Wazuh 고신뢰 룰로 연결한다
- Nginx tar-pit 설정을 단계적으로 적용한다
- 공격자 ROI 계산 수식을 이해하고 예제로 계산한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 가짜 관리자 페이지 배포.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: 'sudo bash -c ''cat > /var/www/html/fake_admin.html <<H

    <!DOCTYPE html>

    <html><body><h1>Internal Admin Console</h1>

    <!-- API_KEY=HONEY_87af3b1c_DO_NOT_REMOVE -->

    <form>...</form>

    </body></html>

    H'' && ls -la /var/www/html/fake_admin.html'
  answer_detail: 허니 페이지. 주석에 허니 토큰 포함 — 이 값이 어디선가 재관측되면 확정 공격.
  verify:
    type: output_contains
    expect:
    - fake_admin.html
    - AdminPanel
    field: stdout
    semantic:
      intent: '[기만] 가짜 관리자 페이지 — sudo cat > /var/www/html/fake_admin.html: Internal Admin Console + <!--
        API_KEY=HONEY_87af3b1c_DO_NOT_REMOVE --> 허니 토큰. 재관측 시 확정 공격. Canarytokens.'
      success_criteria:
      - fake_admin.html/AdminPanel
      - 허니 토큰
      - HTML 관리 외관
      acceptable_methods:
      - HTML 허니
      - Canarytokens
      - honeyd
      negative_signs:
      - 토큰 없음
      - 허니 맥락 없음
      - 페이지 없음
  target_vm: web
  script: 'sudo bash -c ''cat > /var/www/html/fake_admin.html <<H

    <!DOCTYPE html>

    <html><body><h1>Internal Admin Console</h1>

    <!-- API_KEY=HONEY_87af3b1c_DO_NOT_REMOVE -->

    <form>...</form>

    </body></html>

    H'' && ls -la /var/www/html/fake_admin.html'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: Apache alias 추가.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: "sudo bash -c 'cat > /etc/apache2/conf-available/honey.conf <<C\nAlias /admin-portal /var/www/html/fake_admin.html\n\
    <Location /admin-portal>\n  Require all granted\n</Location>\nC' && sudo a2enconf honey 2>&1 | tail\
    \ -3 && sudo systemctl reload apache2 2>&1 | tail -3"
  answer_detail: 허니 경로 활성. 실 관리자는 이 경로 존재 여부 *모름* → 접근만으로도 고신뢰.
  verify:
    type: output_contains
    expect: honey
    field: stdout
    semantic:
      intent: '[기만] Apache alias /admin-portal — sudo cat > honey.conf: Alias /admin-portal /var/www/html/fake_admin.html
        + a2enconf + reload. 허니 경로 활성. 실 관리자 모름 → 접근 = 고신뢰.'
      success_criteria:
      - honey 키워드
      - Alias + a2enconf
      - reload
      acceptable_methods:
      - Apache Alias
      - nginx location
      - BunkerWeb rule
      negative_signs:
      - a2enconf 없음
      - reload 없음
      - 허니 맥락 없음
  target_vm: web
  script: "sudo bash -c 'cat > /etc/apache2/conf-available/honey.conf <<C\nAlias /admin-portal /var/www/html/fake_admin.html\n\
    <Location /admin-portal>\n  Require all granted\n</Location>\nC' && sudo a2enconf honey 2>&1 | tail\
    \ -3 && sudo systemctl reload apache2 2>&1 | tail -3"
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: curl로 허니 페이지 접근 테스트.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: curl -s http://10.20.30.80/admin-portal | head -5
  answer_detail: 정상 응답 확인. access.log에 기록됨.
  verify:
    type: output_contains
    expect: Internal
    field: stdout
    semantic:
      intent: '[검증] 허니 페이지 접근 — curl -s http://10.20.30.80/admin-portal | head -5. 정상 응답. access.log 기록.'
      success_criteria:
      - Internal 출력
      - curl head 5
      - 허니 페이지 응답
      acceptable_methods:
      - curl + head
      - wget -qO-
      - httpx
      negative_signs:
      - 응답 확인 없음
      - 페이지 내용 없음
      - head 없음
  target_vm: web
  script: curl -s http://10.20.30.80/admin-portal | head -5
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: Wazuh 룰 — 허니 접근 경보(rule 100300).
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n<group name=\\\"honey\\\"\
    >\n  <rule id=\\\"100300\\\" level=\\\"15\\\">\n    <if_sid>31108</if_sid>\n    <match>/admin-portal</match>\n\
    \    <description>Honeypot admin-portal accessed — confirmed attacker</description>\n  </rule>\n</group>\n\
    X\" && sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail -3"
  answer_detail: 레벨 15 고신뢰. 접근 자체가 공격 확정.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[Wazuh] 허니 접근 룰 100300 — sudo cat >> local_rules.xml: group honey + rule 100300 level=15
        + match /admin-portal + Honeypot accessed 확정. level 15 고신뢰. 접근 = 공격 확정.'
      success_criteria:
      - honey 그룹
      - rule 100300 level 15
      - /admin-portal 매치
      acceptable_methods:
      - Wazuh rule XML
      - Sigma honeypot
      - Suricata alert
      negative_signs:
      - level 낮음
      - match 없음
      - 문법 검증 누락
  target_vm: siem
  script: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n<group name=\\\"honey\\\"\
    >\n  <rule id=\\\"100300\\\" level=\\\"15\\\">\n    <if_sid>31108</if_sid>\n    <match>/admin-portal</match>\n\
    \    <description>Honeypot admin-portal accessed — confirmed attacker</description>\n  </rule>\n</group>\n\
    X\" && sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail -3"
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: Wazuh 룰 — 허니 토큰 재관측(rule 100301).
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n  <rule id=\\\"100301\\\"\
    \ level=\\\"15\\\">\n    <regex>HONEY_87af3b1c_DO_NOT_REMOVE</regex>\n    <description>Honey credential\
    \ reused — confirmed attacker (post-capture)</description>\n  </rule>\nX\" && sudo systemctl reload\
    \ wazuh-manager"
  answer_detail: 재관측 룰. 허니 토큰이 *다른 곳*에 나타나면 공격자가 이전에 탈취한 증거.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[Wazuh] 허니 토큰 재관측 룰 100301 — cat >> local_rules.xml: rule 100301 level=15 regex HONEY_87af3b1c_DO_NOT_REMOVE
        + reload. 허니 토큰 다른 곳 재관측 = 공격자 이전 탈취 증거.'
      success_criteria:
      - 100301 + regex
      - level 15
      - reload wazuh-manager
      acceptable_methods:
      - Wazuh regex
      - Sigma contains
      - Suricata content
      negative_signs:
      - regex 없음
      - level 낮음
      - reload 누락
  target_vm: siem
  script: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n  <rule id=\\\"100301\\\"\
    \ level=\\\"15\\\">\n    <regex>HONEY_87af3b1c_DO_NOT_REMOVE</regex>\n    <description>Honey credential\
    \ reused — confirmed attacker (post-capture)</description>\n  </rule>\nX\" && sudo systemctl reload\
    \ wazuh-manager"
  risk_level: low
  bastion_prompt: ''
