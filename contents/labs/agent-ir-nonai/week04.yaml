        403/404/500 동일 본문. 정보 누출 최소화.'
      success_criteria:
      - error.html 파일
      - Not available 본문
      - randomUUID
      acceptable_methods:
      - ErrorDocument 공통
      - WAF 통일 응답
      - reverse proxy 응답 rewrite
      negative_signs:
      - 코드별 다른 응답
      - UUID 없음
      - 본문 다양
  target_vm: web
  script: 'sudo bash -c ''cat > /var/www/html/error.html <<H

    <!DOCTYPE html><html><body><h1>Not available</h1><p>Reference: <span id=r></span></p><script>document.getElementById("r").textContent=crypto.randomUUID();</script></body></html>

    H'' && ls /var/www/html/error.html'
  risk_level: low
  bastion_prompt: ''
- order: 9
