- order: 8
  instruction: 'Bastion 자동 대응 발동 수 (Wazuh alerts 최근).


    [FIXTURE] /home/ccc/cyber-range/fixtures/agent-ir-nonai-week14/8/alerts.json 사전
    주입. `jq -c ''.rule'' /home/ccc/cyber-range/fixtures/agent-ir-nonai-week14/8/alerts.json`
