lab_id: agent-ir-nonai-week14
title: 모의 실사고 — 다단계 Agentic APT 대응 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 14
description: 5개 에이전트의 킬체인 공격을 Bastion + 학생이 대응하고 보고서 초안을 마무리한다. 학생이 각 단계를 수동으로 수행하고
  결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 5단계 킬체인을 관전·대응한다
- 세션 클러스터링이 실제로 발동하는지 확인한다
- 2시간 공격 대비 24시간 방어의 템포 차이를 체감한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Blue 초기 상태 — Bastion 자산 리스트.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ 2>/dev/null | wc -l
  answer_detail: Round 시작 전 자산 수. After와 diff.
  verify:
    type: output_contains
    expect:
    - 자산리스트
    field: stdout
    semantic:
      intent: '[기준선] Bastion 자산 — ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ | wc
        -l. Round 시작 전 자산 카운트. After diff.'
      success_criteria:
      - 자산리스트 키워드
      - ls + wc
      - 스킬+플레이북
      acceptable_methods:
      - ls + wc
      - find -type f
      - git status
      negative_signs:
      - 카운트 없음
      - 경로 하나만
      - 비교 기준 없음
  target_vm: bastion
  script: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ 2>/dev/null | wc -l
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: Wazuh dashboard 응답 확인.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: curl -sk -o /dev/null -w '%{http_code}\n' https://10.20.30.100/
  answer_detail: Blue 감각기관이 살아 있는지.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[기준선] Wazuh dashboard — curl -sk -o /dev/null -w ''%{http_code}'' https://10.20.30.100/.
        Blue 감각기관 응답 확인. 200/302 정상.'
      success_criteria:
      - HTTP 코드 응답
      - Wazuh dashboard
      - curl -sk
      acceptable_methods:
      - curl -sk
      - httpx -tls-skip
      - openssl s_client
      negative_signs:
      - HTTPS 없음
      - 코드 확인 없음
      - dashboard 미접속
  target_vm: siem
  script: curl -sk -o /dev/null -w '%{http_code}\n' https://10.20.30.100/
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: R1 정찰 트래픽 시뮬.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 11
  answer: for p in / /api /rest /admin /score-board; do curl -s -o /dev/null http://10.20.30.80$p;
    done; echo R1_recon_done
  answer_detail: 5경로 정찰. ReqBurst 신호 유발.
  verify:
    type: output_contains
    expect: R1_recon_done
    field: stdout
    semantic:
      intent: '[R1 정찰] 5경로 스캔 — for p in / /api /rest /admin /score-board; curl -s
        -o /dev/null + R1_recon_done. ReqBurst 신호 유발. 에이전트 APT Phase 1.'
      success_criteria:
      - R1_recon_done
      - 5 경로
      - curl -s
      acceptable_methods:
      - for + curl
      - gobuster dir
      - ffuf
      negative_signs:
      - 경로 3개 이하
      - 완료 마커 없음
      - for 없음
  target_vm: web
  script: for p in / /api /rest /admin /score-board; do curl -s -o /dev/null http://10.20.30.80$p;
    done; echo R1_recon_done
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: R2 SQLi 시도 시뮬.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: attack
  points: 12
  answer: 'curl -s -o /dev/null -w ''code=%{http_code}\n'' -X POST http://10.20.30.80:8082/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"admin\" OR 1=1--","password":"x"}'''
  answer_detail: R2 웹 악용. WAF 반응 확인.
  verify:
    type: output_contains
    expect: code=
    field: stdout
    semantic:
      intent: '[R2 SQLi] 웹 악용 — curl -X POST /rest/user/login ''admin" OR 1=1--''.
        WAF 반응. Phase 2 Initial Access. T1190.'
      success_criteria:
      - code= 응답
      - SQLi 페이로드
      - POST JSON
      acceptable_methods:
      - curl + SQLi
      - sqlmap
      - Burp
      negative_signs:
      - SQLi 없음
      - code 확인 없음
      - 페이로드 아님
