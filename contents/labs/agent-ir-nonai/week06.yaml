        재사용. 500/403/404 통일.'
      success_criteria:
      - error 키워드
      - ls 파일
      - error_page_ok/no_custom
      acceptable_methods:
      - ls 확인
      - ErrorDocument 설정
      - nginx error_page
      negative_signs:
      - 파일 확인 없음
      - 상태 메시지 없음
      - error.html 누락
  target_vm: web
  script: ls -la /var/www/html/error.html 2>/dev/null && echo 'error_page_ok' || echo 'no_custom_error'
  risk_level: low
  bastion_prompt: ''
- order: 10
  instruction: '단서 최소화 #3 — ModSec 응답에 룰 ID 노출 여부 확인.'
