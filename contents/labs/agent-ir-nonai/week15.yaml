lab_id: agent-ir-nonai-week15
title: 기말 — Mythos-readiness + 30/90/365 작전 계획 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 15
description: 기말 공방 + 레벨 자가 진단 + 30/90/365일 조직 적용 계획. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 기말 Round 5단계를 대응한다
- Mythos-readiness L0~L5 자가 판정에 증거를 첨부한다
- 조직 도입 로드맵을 의사결정자 브리핑 1쪽으로 만든다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 최종 Bastion 자산 스냅샷.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: ls ~/ccc/skills/*.py ~/ccc/skills/*.yaml ~/ccc/playbooks/agent_ir/*.yaml 2>/dev/null | tee ~/ccc/final/asset-snapshot.txt
    | wc -l
  answer_detail: 학기 말 최종 자산 수.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[스냅샷] 최종 자산 — ls ~/ccc/skills/*.py *.yaml ~/ccc/playbooks/agent_ir/*.yaml | tee asset-snapshot.txt
        | wc -l. 학기 말 최종 자산 수.'
