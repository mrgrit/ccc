      - ls + tee + wc
      - 최종 자산
      - 파일 카운트
      acceptable_methods:
      - ls + tee
      - find + save
      - git inventory
      negative_signs:
      - 스냅샷 없음
      - 카운트 없음
      - 저장 없음
  target_vm: bastion
  script: ls ~/ccc/skills/*.py ~/ccc/skills/*.yaml ~/ccc/playbooks/agent_ir/*.yaml 2>/dev/null | tee ~/ccc/final/asset-snapshot.txt
    | wc -l
