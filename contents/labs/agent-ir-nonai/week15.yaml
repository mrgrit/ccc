lab_id: agent-ir-nonai-week15
title: 기말 — 종합 Purple + Mythos-readiness (Non-AI)
version: nonai
course: agent-ir-nonai
week: 15
description: 기말 공방 + 자가 진단 + 30/90/365 작전 계획 제출. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 기말 공방 참여·측정
- Mythos-readiness 자가 진단(L0~L5)
- 조직 실행 계획 초안 작성
pass_threshold: 0.6
steps:
- order: 1
  instruction: 기말 제출물 디렉토리
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 9
  answer: '🤖 프롬프트: 기말 제출물 디렉토리

    📎 참고 (CLI): mkdir -p ~/ccc/final && ls ~/ccc/final || true && echo ''dir_ready'''
  answer_detail: 최종 제출 준비.
  verify:
    type: output_contains
    expect: dir_ready
    field: stdout
  target_vm: bastion
  script: mkdir -p ~/ccc/final && ls ~/ccc/final || true && echo 'dir_ready'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 자가 진단 템플릿 작성
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: 자가 진단 템플릿 작성\n\U0001F4CE 참고 (CLI): cat > ~/ccc/final/mythos-readiness.md <<'MD'\n# Self-Assessment\n- L1 Observer: \n- L2 Reactor: \n- L3 Defender: \n- L4 Co-evolver: \n- L5 Mythos-ready: \nMD\ncat ~/ccc/final/mythos-readiness.md"
  answer_detail: 자가 진단 템플릿.
  verify:
    type: output_contains
    expect: Self-Assessment
    field: stdout
  target_vm: bastion
  script: "cat > ~/ccc/final/mythos-readiness.md <<'MD'\n# Self-Assessment\n- L1 Observer: \n- L2 Reactor: \n- L3 Defender: \n- L4 Co-evolver: \n- L5 Mythos-ready: \nMD\ncat ~/ccc/final/mythos-readiness.md"
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: 30/90/365 실행 계획
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 11
  answer: '🤖 프롬프트: 30/90/365 실행 계획

    📎 참고 (CLI): cat > ~/ccc/final/action-plan.md <<''MD''

    # 30d

    - egress 제한 점검

    - skill 1~2개 운영 SIEM 이식

    # 90d

    - VulnOps 팀/역할 정립

    - Purple 월 1회

    # 365d

    - Co-evolution 루프 자동화

    - CTI 연동 확장

    MD

    cat ~/ccc/final/action-plan.md'
  answer_detail: 조직 실행 계획 템플릿.
  verify:
    type: output_contains
