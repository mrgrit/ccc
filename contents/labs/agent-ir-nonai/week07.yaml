    semantic:
      intent: '[설계] 세션 클러스터링 — cat > cluster.py: def cluster + key=(ja3, ua_class, ip_24) + groupby +
        len>=2. JA3+UA+IP/24 앙상블 클러스터링. 3 세션 묶음.'
