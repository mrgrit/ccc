lab_id: agent-ir-nonai-week07
title: 멀티에이전트 병렬 — 세션 클러스터링 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 7
description: 3개 공격 세션을 병렬로 가동하고, 방어 측이 이를 하나의 클러스터로 묶는 로직을 설계한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 3개 병렬 공격 트래픽을 생성한다
- JA3/UA/IAT 유사성으로 세션 클러스터 후보를 추출한다
- 경보 폭주에서 P0~P3 트리아지를 시연한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: '병렬 트래픽 1: 정찰'
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: recon
  points: 9
  answer: '🤖 프롬프트: 병렬 트래픽 1: 정찰

    📎 참고 (CLI): for i in $(seq 1 15); do curl -s -o /dev/null http://10.20.30.80/; done; echo ''recon_done'''
  answer_detail: '세션 A: 단순 GET 반복.'
  verify:
    type: output_contains
    expect: recon_done
    field: stdout
  target_vm: web
  script: for i in $(seq 1 15); do curl -s -o /dev/null http://10.20.30.80/; done; echo 'recon_done'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: '병렬 트래픽 2: POST 변형'
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: recon
  points: 10
  answer: '🤖 프롬프트: 병렬 트래픽 2: POST 변형

    📎 참고 (CLI): for i in $(seq 1 10); do curl -s -o /dev/null -X POST http://10.20.30.80:3000/rest/user/login -d ''{"email":"a''$i''","password":"x"}'' -H ''Content-Type: application/json''; done; echo ''web_attack_done'''
  answer_detail: '세션 B: 로그인 브루트.'
  verify:
    type: output_contains
    expect: web_attack_done
    field: stdout
  target_vm: web
  script: 'for i in $(seq 1 10); do curl -s -o /dev/null -X POST http://10.20.30.80:3000/rest/user/login -d ''{"email":"a''$i''","password":"x"}'' -H ''Content-Type: application/json''; done; echo ''web_attack_done'''
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: '병렬 트래픽 3: API 탐색'
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: recon
  points: 11
  answer: '🤖 프롬프트: 병렬 트래픽 3: API 탐색

    📎 참고 (CLI): for p in /api /rest /admin; do curl -s -o /dev/null -w ''%{http_code}\n'' http://10.20.30.80$p; done'
  answer_detail: '세션 C: 경로 탐색.'
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  script: for p in /api /rest /admin; do curl -s -o /dev/null -w '%{http_code}\n' http://10.20.30.80$p; done
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: access.log에서 같은 시간대 다수 세션이 관찰되는지 확인
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: recon
  points: 12
  answer: '🤖 프롬프트: access.log에서 같은 시간대 다수 세션이 관찰되는지 확인

    📎 참고 (CLI): sudo tail -60 /var/log/apache2/access.log | awk ''{print $1}'' | sort | uniq -c | sort -rn | head'
  answer_detail: IP별 요청 분포.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  script: sudo tail -60 /var/log/apache2/access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: Bastion에 세션 클러스터 규칙 초안 등록
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 13
  answer: '🤖 프롬프트: Bastion에 세션 클러스터 규칙 초안 등록

    📎 참고 (CLI): echo ''{"id":"w07-cluster","rule":"cluster_by_ja3_ua_iat_sim>=0.7"}'' >> ~/ccc/data/bastion/experience/w07.json && tail -1 ~/ccc/data/bastion/experience/w07.json'
  answer_detail: 세션 클러스터링 규칙 저장.
  verify:
    type: output_contains
    expect: cluster
    field: stdout
  target_vm: bastion
  script: echo '{"id":"w07-cluster","rule":"cluster_by_ja3_ua_iat_sim>=0.7"}' >> ~/ccc/data/bastion/experience/w07.json && tail -1 ~/ccc/data/bastion/experience/w07.json
  risk_level: low
  bastion_prompt: ''
