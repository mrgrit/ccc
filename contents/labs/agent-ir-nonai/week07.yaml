lab_id: agent-ir-nonai-week07
title: 규모화 — 다중 에이전트 시뮬레이션 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 7
description: 3~5개 병렬 요청을 내서 세션 클러스터링·트리아지 우선순위를 직접 적용한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 3개 역할 분할 공격 트래픽을 생성한다
- 세션 클러스터링 알고리즘을 파이썬으로 구현한다
- 경보 트리아지 P0~P3 분류를 실제 데이터에 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 세션 A — 정찰성 요청(3분 내 15경로).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 9
  answer: for p in / /about /login /admin /api /static/logo.png /robots.txt /sitemap.xml /rest /rest/user
    /rest/products /api/v1 /api/v2 /docs /.well-known; do curl -s -o /dev/null http://10.20.30.80$p; done;
    echo session_A_done
  answer_detail: 세션 A(정찰) 트래픽. ReqBurst 지문 유발.
  verify:
    type: output_contains
    expect: session_A_done
    field: stdout
    semantic:
      intent: '[세션A] 정찰 15경로 — for p in / /about /login... 15경로; curl -s. 3분 내 15 고유 경로. ReqBurst 지문 유발.
        MITRE T1595.'
      success_criteria:
      - session_A_done
      - 15 경로 순회
      - curl -s
      acceptable_methods:
      - for + curl
      - gobuster dir
      - ffuf
      negative_signs:
      - 경로 10개 이하
      - for 없음
      - 완료 마커 없음
  target_vm: web
  script: for p in / /about /login /admin /api /static/logo.png /robots.txt /sitemap.xml /rest /rest/user
    /rest/products /api/v1 /api/v2 /docs /.well-known; do curl -s -o /dev/null http://10.20.30.80$p; done;
    echo session_A_done
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 세션 B — 로그인 브루트 시도(10회).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: attack
  points: 10
  answer: 'for i in $(seq 1 10); do curl -s -o /dev/null -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"u''$i''@t.com","password":"pwd''$i''"}''; done;
    echo session_B_done'
  answer_detail: 세션 B(브루트) 트래픽. Credential Access 신호.
  verify:
    type: output_contains
    expect: session_B_done
    field: stdout
    semantic:
      intent: '[세션B] 로그인 브루트 10회 — for i in 1..10; curl -X POST /rest/user/login email=u$i pwd=pwd$i.
        Credential Access. MITRE T1110.'
      success_criteria:
      - session_B_done
      - 10 반복
      - POST JSON
      acceptable_methods:
      - for + seq
      - hydra
      - patator
      negative_signs:
      - 반복 5회 이하
      - POST 없음
      - 마커 없음
  target_vm: web
  script: 'for i in $(seq 1 10); do curl -s -o /dev/null -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"u''$i''@t.com","password":"pwd''$i''"}''; done;
    echo session_B_done'
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: 세션 C — API 경로 열거(6경로).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 11
  answer: for p in /api /rest /internal /admin /actuator /metrics; do curl -s -o /dev/null -w '%{http_code}
    '$p'\n' http://10.20.30.80$p; done; echo session_C_done
  answer_detail: 세션 C(API 탐색) 트래픽.
  verify:
    type: output_contains
    expect: session_C_done
    field: stdout
    semantic:
      intent: '[세션C] API 열거 6경로 — for p in /api /rest /internal /admin /actuator /metrics; curl -w ''%{http_code}''.
        API 탐색. MITRE T1590.'
      success_criteria:
      - session_C_done
      - 6 API 경로
      - HTTP 코드
      acceptable_methods:
      - for + curl -w
      - kiterunner API scan
      - ffuf -H
      negative_signs:
      - 경로 3개 이하
      - API 아닌
      - 완료 마커 없음
  target_vm: web
  script: for p in /api /rest /internal /admin /actuator /metrics; do curl -s -o /dev/null -w '%{http_code}
    '$p'\n' http://10.20.30.80$p; done; echo session_C_done
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: access.log에서 3세션 트래픽이 시간대에 겹치는지 확인.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: sudo tail -60 /var/log/apache2/access.log | awk '{print $4}' | sort -u | tail -5
  answer_detail: 시간대 분포. 동시성이 중요 — 같은 창 안에 3세션이 겹치면 클러스터 후보.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[분석] 시간대 겹침 확인 — sudo tail -60 access.log | awk ''{print $4}'' | sort -u | tail -5. 3 세션
        시간대 동시성. 같은 창 = 클러스터 후보.'
      success_criteria:
      - 시간 $4 추출
      - sort -u
      - tail 5
      acceptable_methods:
      - awk $4 + sort -u
      - date parsing
      - ELK time bucket
      negative_signs:
      - 시간 필드 없음
      - sort -u 누락
      - 집계 없음
  target_vm: web
  script: sudo tail -60 /var/log/apache2/access.log | awk '{print $4}' | sort -u | tail -5
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: 세션 클러스터링 스크립트 작성(IP·UA·경로 유사).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: "cat > ~/ccc/scripts/cluster.py <<'PY'\ndef cluster(sessions):\n    groups = {}\n    for s in\
    \ sessions:\n        key = (s.get('ja3','?'), s.get('ua_class','?'), s.get('ip_24','?'))\n       \
    \ groups.setdefault(key, []).append(s)\n    return {k:v for k,v in groups.items() if len(v)>=2}\n\
    print('cluster_test', cluster([{'ja3':'x','ua_class':'curl','ip_24':'10.20.30','id':'s1'},\n     \
    \                           {'ja3':'x','ua_class':'curl','ip_24':'10.20.30','id':'s2'},\n        \
    \                        {'ja3':'y','ua_class':'browser','ip_24':'10.20.30','id':'s3'}]))\nPY\npython3\
    \ ~/ccc/scripts/cluster.py"
  answer_detail: 세션 클러스터링 기본. JA3·UA·IP/24 앙상블.
  verify:
    type: output_contains
    expect: cluster_test
