lab_id: agent-ir-nonai-week07
title: 규모화 — 다중 에이전트 시뮬레이션 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 7
description: 3~5개 병렬 요청을 내서 세션 클러스터링·트리아지 우선순위를 직접 적용한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 3개 역할 분할 공격 트래픽을 생성한다
- 세션 클러스터링 알고리즘을 파이썬으로 구현한다
- 경보 트리아지 P0~P3 분류를 실제 데이터에 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 세션 A — 정찰성 요청(3분 내 15경로).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 9
  answer: for p in / /about /login /admin /api /static/logo.png /robots.txt /sitemap.xml /rest /rest/user /rest/products /api/v1 /api/v2 /docs /.well-known; do curl -s -o /dev/null http://10.20.30.80$p; done; echo session_A_done
  answer_detail: 세션 A(정찰) 트래픽. ReqBurst 지문 유발.
  verify:
    type: output_contains
    expect: session_A_done
    field: stdout
  target_vm: web
  script: for p in / /about /login /admin /api /static/logo.png /robots.txt /sitemap.xml /rest /rest/user /rest/products /api/v1 /api/v2 /docs /.well-known; do curl -s -o /dev/null http://10.20.30.80$p; done; echo session_A_done
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 세션 B — 로그인 브루트 시도(10회).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: attack
  points: 10
  answer: 'for i in $(seq 1 10); do curl -s -o /dev/null -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"u''$i''@t.com","password":"pwd''$i''"}''; done; echo session_B_done'
  answer_detail: 세션 B(브루트) 트래픽. Credential Access 신호.
  verify:
    type: output_contains
    expect: session_B_done
    field: stdout
  target_vm: web
  script: 'for i in $(seq 1 10); do curl -s -o /dev/null -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"u''$i''@t.com","password":"pwd''$i''"}''; done; echo session_B_done'
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: 세션 C — API 경로 열거(6경로).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 11
  answer: for p in /api /rest /internal /admin /actuator /metrics; do curl -s -o /dev/null -w '%{http_code} '$p'\n' http://10.20.30.80$p; done; echo session_C_done
  answer_detail: 세션 C(API 탐색) 트래픽.
  verify:
    type: output_contains
    expect: session_C_done
    field: stdout
  target_vm: web
  script: for p in /api /rest /internal /admin /actuator /metrics; do curl -s -o /dev/null -w '%{http_code} '$p'\n' http://10.20.30.80$p; done; echo session_C_done
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: access.log에서 3세션 트래픽이 시간대에 겹치는지 확인.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: sudo tail -60 /var/log/apache2/access.log | awk '{print $4}' | sort -u | tail -5
  answer_detail: 시간대 분포. 동시성이 중요 — 같은 창 안에 3세션이 겹치면 클러스터 후보.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  script: sudo tail -60 /var/log/apache2/access.log | awk '{print $4}' | sort -u | tail -5
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: 세션 클러스터링 스크립트 작성(IP·UA·경로 유사).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: "cat > ~/ccc/scripts/cluster.py <<'PY'\ndef cluster(sessions):\n    groups = {}\n    for s in sessions:\n        key = (s.get('ja3','?'), s.get('ua_class','?'), s.get('ip_24','?'))\n        groups.setdefault(key, []).append(s)\n    return {k:v for k,v in groups.items() if len(v)>=2}\nprint('cluster_test', cluster([{'ja3':'x','ua_class':'curl','ip_24':'10.20.30','id':'s1'},\n                                {'ja3':'x','ua_class':'curl','ip_24':'10.20.30','id':'s2'},\n                                {'ja3':'y','ua_class':'browser','ip_24':'10.20.30','id':'s3'}]))\nPY\npython3 ~/ccc/scripts/cluster.py"
  answer_detail: 세션 클러스터링 기본. JA3·UA·IP/24 앙상블.
  verify:
    type: output_contains
    expect: cluster_test
    field: stdout
  target_vm: bastion
  script: "cat > ~/ccc/scripts/cluster.py <<'PY'\ndef cluster(sessions):\n    groups = {}\n    for s in sessions:\n        key = (s.get('ja3','?'), s.get('ua_class','?'), s.get('ip_24','?'))\n        groups.setdefault(key, []).append(s)\n    return {k:v for k,v in groups.items() if len(v)>=2}\nprint('cluster_test', cluster([{'ja3':'x','ua_class':'curl','ip_24':'10.20.30','id':'s1'},\n                                {'ja3':'x','ua_class':'curl','ip_24':'10.20.30','id':'s2'},\n                                {'ja3':'y','ua_class':'browser','ip_24':'10.20.30','id':'s3'}]))\nPY\npython3 ~/ccc/scripts/cluster.py"
  risk_level: low
  bastion_prompt: ''
- order: 6
  instruction: 트리아지 P0~P3 분류 스크립트 작성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 14
  answer: "cat > ~/ccc/scripts/triage.py <<'PY'\ndef triage(alert):\n    if alert.get('success') and alert.get('sensitive_data'): return 'P0'\n    if alert.get('cluster_size', 1) >= 3: return 'P1'\n    if alert.get('signature_matched'): return 'P2'\n    return 'P3'\nfor a in [{'success':True, 'sensitive_data':True}, {'cluster_size':4}, {'signature_matched':True}, {}]:\n    print(triage(a), a)\nPY\npython3 ~/ccc/scripts/triage.py"
  answer_detail: 경보 우선순위 결정의 기본 로직.
  verify:
    type: output_contains
    expect: P0
    field: stdout
  target_vm: bastion
  script: "cat > ~/ccc/scripts/triage.py <<'PY'\ndef triage(alert):\n    if alert.get('success') and alert.get('sensitive_data'): return 'P0'\n    if alert.get('cluster_size', 1) >= 3: return 'P1'\n    if alert.get('signature_matched'): return 'P2'\n    return 'P3'\nfor a in [{'success':True, 'sensitive_data':True}, {'cluster_size':4}, {'signature_matched':True}, {}]:\n    print(triage(a), a)\nPY\npython3 ~/ccc/scripts/triage.py"
  risk_level: low
  bastion_prompt: ''
- order: 7
  instruction: 노이즈 스톰 감지 스크립트 작성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 15
  answer: "cat > ~/ccc/scripts/noise.py <<'PY'\ndef noise_storm(alert_count_5min, baseline=30):\n    return alert_count_5min > baseline * 5\nprint(noise_storm(200))  # True\nprint(noise_storm(10))   # False\nPY\npython3 ~/ccc/scripts/noise.py"
  answer_detail: 경보 5배 급증 → 노이즈 스톰. 조용한 세션을 오히려 상향.
  verify:
    type: output_contains
    expect: 'True'
    field: stdout
  target_vm: bastion
  script: "cat > ~/ccc/scripts/noise.py <<'PY'\ndef noise_storm(alert_count_5min, baseline=30):\n    return alert_count_5min > baseline * 5\nprint(noise_storm(200))  # True\nprint(noise_storm(10))   # False\nPY\npython3 ~/ccc/scripts/noise.py"
  risk_level: low
  bastion_prompt: ''
- order: 8
  instruction: CorrelationEngine 인터페이스 설계 문서.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 16
  answer: "cat > ~/ccc/artifacts/w07/engine.md <<'MD'\n# CorrelationEngine API\n```python\nclass CorrelationEngine:\n    def ingest(self, event): ...\n    def cluster(self, window=300): ...\n    def score_cluster(self, cluster): ...\n    def triage(self, cluster): ...\n    def emit_action(self, cluster, priority): ...\n```\nMD\ncat ~/ccc/artifacts/w07/engine.md"
  answer_detail: w11에서 Bastion에 실제 구현할 엔진 API. 지금은 *인터페이스*만 고정.
  verify:
    type: output_contains
    expect: CorrelationEngine
    field: stdout
  target_vm: bastion
  script: "cat > ~/ccc/artifacts/w07/engine.md <<'MD'\n# CorrelationEngine API\n```python\nclass CorrelationEngine:\n    def ingest(self, event): ...\n    def cluster(self, window=300): ...\n    def score_cluster(self, cluster): ...\n    def triage(self, cluster): ...\n    def emit_action(self, cluster, priority): ...\n```\nMD\ncat ~/ccc/artifacts/w07/engine.md"
  risk_level: low
  bastion_prompt: ''
- order: 9
  instruction: 세션 간 유사도 임계값 설정 문서.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 17
  answer: 'cat > ~/ccc/artifacts/w07/thresholds.md <<''MD''

    | 축 | 느슨 | 표준 | 엄격 |

    |---|---|---|---|

    | JA3 | 일치 | 일치 | 일치 |

    | UA | 일치 | 클래스 | 카테고리 |

    | IAT p-value | >0.1 | >0.2 | >0.3 |

    | 경로 Jaccard | >0.3 | >0.5 | >0.7 |

    MD

    cat ~/ccc/artifacts/w07/thresholds.md'
  answer_detail: 표준 시작 → 오탐률에 따라 조정. w12 Canary 트래픽으로 검증.
  verify:
    type: output_contains
    expect: 임계
    field: stdout
  target_vm: bastion
  script: 'cat > ~/ccc/artifacts/w07/thresholds.md <<''MD''

    | 축 | 느슨 | 표준 | 엄격 |

    |---|---|---|---|

    | JA3 | 일치 | 일치 | 일치 |

    | UA | 일치 | 클래스 | 카테고리 |

    | IAT p-value | >0.1 | >0.2 | >0.3 |

    | 경로 Jaccard | >0.3 | >0.5 | >0.7 |

    MD

    cat ~/ccc/artifacts/w07/thresholds.md'
  risk_level: low
  bastion_prompt: ''
- order: 10
  instruction: experience 저장.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 18
  answer: echo '{"id":"w07-scale","sessions_launched":3,"cluster_detected":true,"noise_storm":false}' > ~/ccc/data/bastion/experience/w07-scale.json && cat ~/ccc/data/bastion/experience/w07-scale.json
  answer_detail: 멀티세션 실습 결과 기록.
  verify:
    type: output_contains
    expect: cluster_detected
    field: stdout
  target_vm: bastion
  script: echo '{"id":"w07-scale","sessions_launched":3,"cluster_detected":true,"noise_storm":false}' > ~/ccc/data/bastion/experience/w07-scale.json && cat ~/ccc/data/bastion/experience/w07-scale.json
  risk_level: low
  bastion_prompt: ''
- order: 11
  instruction: 3세션 타임라인 요약 생성.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 19
  answer: sudo tail -100 /var/log/apache2/access.log | awk '{print $4, $1, $7}' | tail -30 > ~/ccc/artifacts/w07/timeline.txt && wc -l ~/ccc/artifacts/w07/timeline.txt
  answer_detail: IP·경로·시간을 하나로 묶은 원본 타임라인.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  script: sudo tail -100 /var/log/apache2/access.log | awk '{print $4, $1, $7}' | tail -30 > ~/ccc/artifacts/w07/timeline.txt && wc -l ~/ccc/artifacts/w07/timeline.txt
