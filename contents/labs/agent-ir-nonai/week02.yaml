lab_id: agent-ir-nonai-week02
title: 공격자 해부 — Tool-use 루프와 지문 점수 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 2
description: 에이전트 실행 프로세스를 방어자 관점에서 관찰하는 도구 세트를 구축한다. pstree·strace·tcpdump·auditd를 결합해 *호스트·네트워크 양측*의
  지문을 수집한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 에이전트 호스트의 프로세스 트리와 syscall을 관찰한다
- LLM API 호출 패턴(Ollama)의 트래픽 지문을 수집한다
- agent_score 함수의 핵심 지표(IAT·경로 다양성 등)를 구현한다
- 관찰 불가능한 공격자 환경과 관찰 가능한 방어자 환경의 경계를 구분한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: bastion에서 pstree로 ollama 서비스의 프로세스 트리를 표시하시오(에이전트 모델 호출이 이뤄지는 프로세스 관찰 연습).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: pstree -p $(pgrep -f ollama | head -1 || echo 1) | head -30
  answer_detail: 에이전트 프로세스 계보 관찰법 학습. 공격자 환경에선 못 보지만, Bastion 자체의 LLM 호출 패턴을 관찰하는 훈련.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[관찰] Ollama 프로세스 트리 — pstree -p $(pgrep -f ollama) | head -30. 에이전트 모델 호출 프로세스 계보. Bastion
        LLM 호출 패턴 관찰 훈련.'
      success_criteria:
      - pstree 출력
      - pgrep ollama
      - 프로세스 트리
      acceptable_methods:
      - pstree + pgrep
      - ps auxf
      - systemctl status --tree
      negative_signs:
      - pgrep 없음
      - tree 미표시
      - 단순 ps
  target_vm: bastion
  script: pstree -p $(pgrep -f ollama | head -1 || echo 1) | head -30
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: bastion에서 `curl -sX POST http://localhost:11434/api/tags`로 Ollama에 로드된 모델 목록을 조회하시오.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 10
  answer: curl -s http://localhost:11434/api/tags | python3 -m json.tool | head -30
  answer_detail: 에이전트가 사용하는 LLM 추론 지점. 모델 이름·버전이 공격 분석에 중요.
  verify:
    type: output_contains
    expect: models
    field: stdout
    semantic:
      intent: '[정찰] Ollama 모델 목록 — curl -s http://localhost:11434/api/tags | json.tool. 로드 모델 이름/버전 조회.
        에이전트 추론 지점 식별.'
      success_criteria:
      - models 키워드
      - /api/tags
      - json 출력
      acceptable_methods:
      - curl + /api/tags
      - ollama list
      - API /api/tags
      negative_signs:
      - JSON 미파싱
      - /api/tags 아닌 엔드포인트
      - 모델 미확인
  target_vm: bastion
  script: curl -s http://localhost:11434/api/tags | python3 -m json.tool | head -30
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: bastion에서 auditd 서비스 상태를 확인하시오(Transient Tool 관찰의 전제).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: systemctl is-active auditd || echo 'auditd_not_active'
  answer_detail: 파일 쓰기·프로세스 생성 감사의 기반. 활성이 아니면 w4 실습에서 Transient Tool 추적 불가.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[관찰] auditd 상태 — systemctl is-active auditd. 감사 데몬 활성 확인. Transient Tool 추적 전제. w4 실습 의존성.'
      success_criteria:
      - auditd 상태
      - systemctl
      - active 확인
      acceptable_methods:
      - systemctl is-active
      - auditctl -s
      - ps auxf | grep auditd
      negative_signs:
      - 상태 체크 없음
      - auditd 누락
      - 대체 체크 없음
  target_vm: bastion
  script: systemctl is-active auditd || echo 'auditd_not_active'
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: secu에서 tcpdump로 Ollama API 트래픽(11434 포트)을 30초 캡처하시오.
  hint: target_vm=secu에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: sudo timeout 30 tcpdump -i any -nn -w /tmp/w02-ollama.pcap 'port 11434' 2>/dev/null; ls -la
    /tmp/w02-ollama.pcap
  answer_detail: LLM API 호출의 네트워크 지문. 요청 간격·크기가 *에이전트 지문*의 핵심 축.
  verify:
    type: output_contains
    expect: w02-ollama.pcap
    field: stdout
    semantic:
      intent: '[관찰] Ollama API 트래픽 캡처 — sudo timeout 30 tcpdump -i any -nn -w w02-ollama.pcap ''port 11434''
        + ls. LLM API 호출 네트워크 지문 30초 캡처. 요청 간격/크기 지문.'
      success_criteria:
      - w02-ollama.pcap 파일
      - port 11434
      - timeout 30
      acceptable_methods:
      - tcpdump + port 필터
      - tshark -i any
      - dumpcap
      negative_signs:
      - port 누락
      - timeout 없음
      - 확인 없음
  target_vm: secu
  script: sudo timeout 30 tcpdump -i any -nn -w /tmp/w02-ollama.pcap 'port 11434' 2>/dev/null; ls -la
    /tmp/w02-ollama.pcap
  risk_level: medium
  bastion_prompt: ''
- order: 5
  instruction: bastion에 agent_score.py 스크립트를 생성해 IAT CoV 계산 함수를 정의하시오.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: "mkdir -p ~/ccc/scripts && cat > ~/ccc/scripts/agent_score.py <<'PY'\nimport statistics as st\n\
    def iat_cov(times):\n    if len(times) < 2: return 1.0\n    iat = [b-a for a,b in zip(times, times[1:])]\n\
    \    m = st.mean(iat)\n    return st.pstdev(iat)/m if m else 0.0\nprint('iat_cov', iat_cov([1.0, 2.0,\
    \ 3.0, 4.0]))\nPY\npython3 ~/ccc/scripts/agent_score.py"
  answer_detail: 에이전트 지문 1지표. 정상 사용자는 CoV>0.5, 에이전트는 <0.3 경향.
  verify:
    type: output_contains
    expect: iat_cov
    field: stdout
    semantic:
      intent: '[분석] agent_score.py IAT CoV — cat > agent_score.py: def iat_cov(times): iat=[b-a for a,b
        in zip(times,times[1:])]; stdev/mean. 에이전트 지문 1지표. 정상>0.5 agent<0.3.'
      success_criteria:
      - iat_cov 키워드
      - Python 함수 정의
      - statistics stdev/mean
      acceptable_methods:
      - statistics 모듈
      - numpy coefficient of variation
      - scipy.stats.variation
      negative_signs:
      - 함수 없음
      - 임계값 없음
      - pstdev/mean 없음
  target_vm: bastion
  script: "mkdir -p ~/ccc/scripts && cat > ~/ccc/scripts/agent_score.py <<'PY'\nimport statistics as st\n\
    def iat_cov(times):\n    if len(times) < 2: return 1.0\n    iat = [b-a for a,b in zip(times, times[1:])]\n\
    \    m = st.mean(iat)\n    return st.pstdev(iat)/m if m else 0.0\nprint('iat_cov', iat_cov([1.0, 2.0,\
    \ 3.0, 4.0]))\nPY\npython3 ~/ccc/scripts/agent_score.py"
  risk_level: low
  bastion_prompt: ''
- order: 6
  instruction: web에서 access.log 최근 200줄의 고유 경로 수를 계산하시오 (경로 다양성 지표).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 14
  answer: sudo tail -200 /var/log/apache2/access.log | awk '{print $7}' | sort -u | wc -l
  answer_detail: 경로 다양성 지표. 정상 사용자는 보통 2~8개, 에이전트는 15+.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[분석] 경로 다양성 — sudo tail -200 access.log | awk ''{print $7}'' | sort -u | wc -l. 고유 경로 수.
        정상 2-8 agent 15+. 에이전트 지문 2지표.'
      success_criteria:
      - 경로 다양성 계산
      - awk $7 + sort -u
      - wc -l
      acceptable_methods:
      - awk + sort -u + wc
      - goaccess --visitors
      - ELK terms aggregation
      negative_signs:
      - sort -u 없음
      - 필드 오류
      - 집계 없음
  target_vm: web
  script: sudo tail -200 /var/log/apache2/access.log | awk '{print $7}' | sort -u | wc -l
  risk_level: low
  bastion_prompt: ''
- order: 7
  instruction: web access.log에서 HTTP 4xx 응답 후 1초 이내 재요청 패턴을 찾으시오 (재시도 지연 지표).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 15
  answer: sudo awk '$9 ~ /^4/ {print $4, $7, $9}' /var/log/apache2/access.log | tail -10
  answer_detail: 4xx 응답 후 재시도 지연이 짧으면 에이전트 의심. 정상은 수초~수분.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[분석] 4xx 재시도 지연 — sudo awk ''$9 ~ /^4/ {print $4, $7, $9}'' access.log | tail -10. 4xx
        응답 시간/경로 추출. 재시도 지연 <1s agent 의심.'
      success_criteria:
      - 4xx 필터
      - awk $9 매칭
      - tail 10
      acceptable_methods:
      - awk regex $9 ~ /^4/
      - grep ' 4[0-9]{2} '
      - goaccess 4xx
      negative_signs:
      - 필터 없음
      - 4xx 매칭 없음
      - 시간 필드 누락
  target_vm: web
  script: sudo awk '$9 ~ /^4/ {print $4, $7, $9}' /var/log/apache2/access.log | tail -10
  risk_level: low
  bastion_prompt: ''
