  risk_level: low
  bastion_prompt: ''
- order: 7
  instruction: Bastion에 새 스킬 추가 (detect_agent_fp_burst).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 15
  answer: "mkdir -p ~/ccc/packages/bastion/skills && cat > ~/ccc/packages/bastion/skills/detect_agent_fp_burst.py\
    \ <<'PY'\ndef detect(session):\n    return session.get('iat_cov', 1.0) < 0.3 and\
    \ session.get('path_div', 0) >= 10\nPY\ncat ~/ccc/packages/bastion/skills/detect_agent_fp_burst.py"
  answer_detail: w2 agent_score 구현체 기반 스킬. Round 1의 대표 업그레이드.
  verify:
    type: output_contains
    expect: detect_agent_fp_burst
    field: stdout
  target_vm: bastion
  script: "mkdir -p ~/ccc/packages/bastion/skills && cat > ~/ccc/packages/bastion/skills/detect_agent_fp_burst.py\
    \ <<'PY'\ndef detect(session):\n    return session.get('iat_cov', 1.0) < 0.3 and\
    \ session.get('path_div', 0) >= 10\nPY\ncat ~/ccc/packages/bastion/skills/detect_agent_fp_burst.py"
  risk_level: low
  bastion_prompt: ''
- order: 8
  instruction: Playbook YAML 등록.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 16
  answer: "mkdir -p ~/ccc/playbooks/agent_ir && cat > ~/ccc/playbooks/agent_ir/agent-fp.yaml\
    \ <<'Y'\nplaybook_id: pb-agent-fp\ntriggers: { wazuh_rule_id: 100111 }\nsteps:\n\
    \  - skill: detect_agent_fp_burst\n  - skill: tar_pit_inject\n    args: { duration_s:\
    \ 10 }\nrollback: [unblock_nft]\nY\ncat ~/ccc/playbooks/agent_ir/agent-fp.yaml"
  answer_detail: Playbook 1건. trigger + steps + rollback.
  verify:
    type: output_contains
    expect:
    - pb-agent-fp
    - Playbook
    field: stdout
  target_vm: bastion
  script: "mkdir -p ~/ccc/playbooks/agent_ir && cat > ~/ccc/playbooks/agent_ir/agent-fp.yaml\
    \ <<'Y'\nplaybook_id: pb-agent-fp\ntriggers: { wazuh_rule_id: 100111 }\nsteps:\n\
    \  - skill: detect_agent_fp_burst\n  - skill: tar_pit_inject\n    args: { duration_s:\
