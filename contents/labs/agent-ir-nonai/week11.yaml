  risk_level: low
  bastion_prompt: ''
- order: 9
  instruction: Experience 엔트리 — Round 1 결과.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 17
  answer: echo '{"id":"w11-round1","skill":"detect_agent_fp_burst","outcome":"success"}'
    > ~/ccc/data/bastion/experience/w11-round1.json && cat ~/ccc/data/bastion/experience/w11-round1.json
  answer_detail: 경험 로그. 반복되면 w12에서 자동 승격.
  verify:
    type: output_contains
    expect: w11-round1
    field: stdout
  target_vm: bastion
  script: echo '{"id":"w11-round1","skill":"detect_agent_fp_burst","outcome":"success"}'
    > ~/ccc/data/bastion/experience/w11-round1.json && cat ~/ccc/data/bastion/experience/w11-round1.json
  risk_level: low
  bastion_prompt: ''
- order: 10
  instruction: Round 재테스트 트래픽(짧게).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: attack
  points: 18
  answer: 'for i in $(seq 1 15); do curl -s -o /dev/null -X POST http://10.20.30.80/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"r''$i''"}''; done; echo round1_retest_done'
  answer_detail: 업그레이드 후 같은 공격이 이제 막히는지 빠르게 검증.
  verify:
    type: output_contains
    expect: round1_retest_done
    field: stdout
  target_vm: web
  script: 'for i in $(seq 1 15); do curl -s -o /dev/null -X POST http://10.20.30.80/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"r''$i''"}''; done; echo round1_retest_done'
  risk_level: low
  bastion_prompt: ''
- order: 11
  instruction: Bastion 자산 diff 작성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
