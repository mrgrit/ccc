lab_id: agent-ir-nonai-week11
title: Purple Round 1 — Claude Code 코치 + Bastion 업그레이드 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 11
description: w1~w10 결과를 종합해 첫 Purple Round을 실행하고, 코치 출력을 Bastion skill/playbook에 실제 반영한다. 학생이 각 단계를 수동으로
  수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- Round의 5단계를 시간 내 완결한다
- 놓친 사건을 A/B/C/D로 분류한다
- 코치 출력 중 *선택한 것만* Bastion 자산으로 변환한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Round 초기 Bastion 자산 스냅샷.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ ~/ccc/data/bastion/experience/ 2>/dev/null | tee
    ~/ccc/artifacts/w11-round1/pre-snapshot.txt | head
  answer_detail: Round 전 자산 목록. After와 diff를 낸다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[스냅샷] Bastion 자산 pre — ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ ~/ccc/data/bastion/experience/
        | tee pre-snapshot.txt. Round 전 자산 목록. After diff 기준선.'
      success_criteria:
      - ls 3 경로
      - tee pre-snapshot
      - 스냅샷
      acceptable_methods:
      - ls + tee
      - find + save
      - git status
      negative_signs:
      - 단일 경로
      - 저장 없음
      - 기준선 없음
  target_vm: bastion
  script: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ ~/ccc/data/bastion/experience/ 2>/dev/null | tee
    ~/ccc/artifacts/w11-round1/pre-snapshot.txt | head
  risk_level: low
  bastion_prompt: ''
