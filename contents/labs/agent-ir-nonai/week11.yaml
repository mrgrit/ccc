lab_id: agent-ir-nonai-week11
title: Purple Round 1 — Claude Code 코치 + Bastion 업그레이드 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 11
description: w1~w10 결과를 종합해 첫 Purple Round을 실행하고, 코치 출력을 Bastion skill/playbook에 실제
  반영한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- Round의 5단계를 시간 내 완결한다
- 놓친 사건을 A/B/C/D로 분류한다
- 코치 출력 중 *선택한 것만* Bastion 자산으로 변환한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Round 초기 Bastion 자산 스냅샷.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ ~/ccc/data/bastion/experience/
    2>/dev/null | tee ~/ccc/artifacts/w11-round1/pre-snapshot.txt | head
  answer_detail: Round 전 자산 목록. After와 diff를 낸다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: bastion
  script: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ ~/ccc/data/bastion/experience/
    2>/dev/null | tee ~/ccc/artifacts/w11-round1/pre-snapshot.txt | head
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 공방 시나리오 실행 준비 — 3분할 관전 화면 체크.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: 'echo ''화면 1: Claude Code 세션\n화면 2: Bastion TUI reasoning\n화면 3: Wazuh Discover''
    > ~/ccc/artifacts/w11-round1/screens.md && cat ~/ccc/artifacts/w11-round1/screens.md'
  answer_detail: 관전 3분할. 공격-방어 비대칭성을 체감.
  verify:
    type: output_contains
    expect: Wazuh
    field: stdout
  target_vm: bastion
  script: 'echo ''화면 1: Claude Code 세션\n화면 2: Bastion TUI reasoning\n화면 3: Wazuh Discover''
    > ~/ccc/artifacts/w11-round1/screens.md && cat ~/ccc/artifacts/w11-round1/screens.md'
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: 공방 실행 중 secu pcap 캡처(5분).
  hint: target_vm=secu에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: sudo timeout 60 tcpdump -i any -nn -w /tmp/w11-round1.pcap 'host 10.20.30.80'
    2>/dev/null; ls -la /tmp/w11-round1.pcap
  answer_detail: Round 트래픽 증거. 분석·복기의 원본.
  verify:
    type: output_contains
    expect: w11-round1.pcap
    field: stdout
  target_vm: secu
  script: sudo timeout 60 tcpdump -i any -nn -w /tmp/w11-round1.pcap 'host 10.20.30.80'
    2>/dev/null; ls -la /tmp/w11-round1.pcap
  risk_level: medium
  bastion_prompt: ''
- order: 4
  instruction: Round 종료 후 forensic 디렉토리.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: 'mkdir -p ~/ccc/artifacts/w11-round1/forensic && echo ''T+0: recon start\nT+5:
    SQLi attempt\nT+8: WAF block\nT+12: JWT analysis\nT+20: admin token forged'' >
    ~/ccc/artifacts/w11-round1/forensic/timeline.md && cat ~/ccc/artifacts/w11-round1/forensic/timeline.md'
  answer_detail: 타임라인 초해상도. 실제 공방에서 관찰된 것으로 교체.
  verify:
    type: output_contains
    expect: SQLi
    field: stdout
  target_vm: bastion
  script: 'mkdir -p ~/ccc/artifacts/w11-round1/forensic && echo ''T+0: recon start\nT+5:
    SQLi attempt\nT+8: WAF block\nT+12: JWT analysis\nT+20: admin token forged'' >
    ~/ccc/artifacts/w11-round1/forensic/timeline.md && cat ~/ccc/artifacts/w11-round1/forensic/timeline.md'
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: 놓친 사건 A/B/C/D 분류.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: 'cat > ~/ccc/artifacts/w11-round1/forensic/missed_events.csv <<''C''

    type,event,reason

    A,recon phase,no alert raised

    B,jwt forgery,alert 30s after success

    C,honey access,classified as benign

    D,nft block failed,sudo permission issue

    C

    cat ~/ccc/artifacts/w11-round1/forensic/missed_events.csv'
  answer_detail: 4분류 양식. 각 유형별 대응 방향이 다름.
  verify:
    type: output_contains
    expect:
    - recon phase
    - 분류
    field: stdout
  target_vm: bastion
  script: 'cat > ~/ccc/artifacts/w11-round1/forensic/missed_events.csv <<''C''

    type,event,reason

    A,recon phase,no alert raised

    B,jwt forgery,alert 30s after success

    C,honey access,classified as benign

    D,nft block failed,sudo permission issue

    C

    cat ~/ccc/artifacts/w11-round1/forensic/missed_events.csv'
  risk_level: low
  bastion_prompt: ''
- order: 6
  instruction: 코치 모드 프롬프트 준비.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 14
  answer: 'cat > ~/ccc/artifacts/w11-round1/forensic/coach-prompt.md <<''MD''

    지금까지의 세션은 공방전이었다. 너는 Red였다.

    이제 Blue를 돕는 코치다. 다음을 한 쪽:

    1. 미탐지 3건 + 각각 탐지 로직

    2. 지연 탐지 + 조기 신호

    3. 오탐 처리 + 분류 오류 원인

    4. Bastion 추가 스킬 1개 명세

    제약: 새 공격 금지. 기존 세션 범위에서만.

    MD

    cat ~/ccc/artifacts/w11-round1/forensic/coach-prompt.md'
  answer_detail: 코치 모드 전환 프롬프트. Red를 복기자로 역할 전환.
  verify:
    type: output_contains
    expect: 코치
    field: stdout
  target_vm: bastion
  script: 'cat > ~/ccc/artifacts/w11-round1/forensic/coach-prompt.md <<''MD''

    지금까지의 세션은 공방전이었다. 너는 Red였다.

    이제 Blue를 돕는 코치다. 다음을 한 쪽:

    1. 미탐지 3건 + 각각 탐지 로직

    2. 지연 탐지 + 조기 신호

    3. 오탐 처리 + 분류 오류 원인

    4. Bastion 추가 스킬 1개 명세

    제약: 새 공격 금지. 기존 세션 범위에서만.

    MD

