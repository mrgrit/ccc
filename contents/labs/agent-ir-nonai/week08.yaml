lab_id: agent-ir-nonai-week08
title: 중간평가 — Blue IR CTF (Non-AI)
version: nonai
course: agent-ir-nonai
week: 8
description: 주어진 번들의 아티팩트로부터 타임라인·에이전트 점수·ATT&CK 매핑·방어 3층 판정·차단 권고·Bastion 스킬을 도출한다. 학생이 각 단계를 수동으로 수행하고
  결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 불완전한 아티팩트에서 공격 시나리오를 재구성한다
- SMART 기준의 스킬 명세를 작성한다
- 채점 루브릭 점수 산출과 자기 평가를 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 평가 번들 디렉토리 구조 확인(강사 배포).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: mkdir -p /opt/ctf/w08/$(whoami)/{server-logs,pcap,artifacts} && ls /opt/ctf/w08/$(whoami) ||
    echo 'bundle_path_ready'
  answer_detail: 번들이 미배포면 디렉토리만. 실제 수업 시 강사가 파일 배치.
  verify:
    type: output_contains
    expect: bundle_path_ready
    field: stdout
    semantic:
      intent: '[CTF] 평가 번들 구조 — mkdir -p /opt/ctf/w08/$(whoami)/{server-logs,pcap,artifacts} + ls. Blue
        IR CTF 번들. 강사 배포.'
      success_criteria:
      - bundle_path_ready
      - 3 서브디렉토리
      - whoami
      acceptable_methods:
      - mkdir brace
      - install -d
      - find create
      negative_signs:
      - 단일 디렉토리
      - 경로 오류
      - 확인 없음
  target_vm: bastion
  script: mkdir -p /opt/ctf/w08/$(whoami)/{server-logs,pcap,artifacts} && ls /opt/ctf/w08/$(whoami) ||
    echo 'bundle_path_ready'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 번들의 access.log(예시) 분포 확인.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: echo 'sample' > /tmp/sample_access.log && awk '{c["200"]++} END {for(k in c) print k, c[k]}'
    /tmp/sample_access.log
  answer_detail: 실제 번들에선 /opt/ctf/w08/$(whoami)/server-logs/access.log 사용.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: '[CTF] access.log 분포 확인 — echo sample > /tmp/sample_access.log + awk ''200 집계''. 상태 코드 분포.
        실제 번들 /opt/ctf/w08/.../access.log.'
      success_criteria:
      - 200 출력
      - awk 집계
      - 샘플 파일
      acceptable_methods:
      - awk counter
      - goaccess
      - log2stats
      negative_signs:
      - awk 없음
      - 집계 없음
      - 200 키 없음
  target_vm: bastion
  script: echo 'sample' > /tmp/sample_access.log && awk '{c["200"]++} END {for(k in c) print k, c[k]}'
    /tmp/sample_access.log
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: pcap 파일 IAT 평균 계산 함수 준비.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: 'cat > ~/ccc/scripts/pcap_iat.sh <<''S''

    #!/bin/bash

    f=${1:-/tmp/sample.pcap}

    [ -f $f ] || { echo file_missing; exit 1; }

    tshark -r $f -Y ''http.request'' -T fields -e frame.time_epoch 2>/dev/null | awk ''NR>1{print $1-p}
    {p=$1}'' | awk ''{sum+=$1;n++} END{if(n) print "iat_avg", sum/n}''

    S

    chmod +x ~/ccc/scripts/pcap_iat.sh && echo script_ready'
  answer_detail: pcap IAT 분석 도구 준비. CTF 분석에 활용.
  verify:
    type: output_contains
    expect:
    - script_ready
    - IAT
    field: stdout
    semantic:
      intent: '[CTF] pcap IAT 계산 스크립트 — cat > pcap_iat.sh: tshark -Y http.request -e frame.time_epoch
        + awk NR>1 + iat_avg 계산. pcap IAT 분석 도구. CTF 분석용.'
      success_criteria:
      - script_ready/IAT
      - tshark + awk
      - iat_avg 평균
      acceptable_methods:
      - tshark + awk
      - pyshark
      - scapy rdpcap
      negative_signs:
      - tshark 없음
      - IAT 계산 없음
      - 실행 불가
  target_vm: bastion
  script: 'cat > ~/ccc/scripts/pcap_iat.sh <<''S''

    #!/bin/bash

    f=${1:-/tmp/sample.pcap}

    [ -f $f ] || { echo file_missing; exit 1; }

    tshark -r $f -Y ''http.request'' -T fields -e frame.time_epoch 2>/dev/null | awk ''NR>1{print $1-p}
    {p=$1}'' | awk ''{sum+=$1;n++} END{if(n) print "iat_avg", sum/n}''

    S

    chmod +x ~/ccc/scripts/pcap_iat.sh && echo script_ready'
  risk_level: low
  bastion_prompt: ''
