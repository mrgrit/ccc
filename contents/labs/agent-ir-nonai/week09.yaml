lab_id: agent-ir-nonai-week09
title: 탐지 룰 엔지니어링 — SIGMA → Wazuh (Non-AI)
version: nonai
course: agent-ir-nonai
week: 9
description: w8에서 설계한 스킬을 SIGMA 룰로 변환해 Wazuh에 적용하고 회귀 테스트까지 실행한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- SIGMA 룰 1건을 작성해 Wazuh XML로 수동 변환한다
- wazuh-logtest로 룰 동작을 Phase 3 수준까지 검증한다
- 회귀 데이터셋에 대한 정밀도·재현율을 측정한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM의 현재 local_rules.xml 백업.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/local_rules.xml.bak && ls -la /tmp/local_rules.xml.bak
  answer_detail: 수정 전 원본 보존. 롤백용.
  verify:
    type: output_contains
    expect: local_rules.xml.bak
    field: stdout
    semantic:
      intent: '[Wazuh] local_rules.xml 백업 — sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/local_rules.xml.bak
        + ls. 수정 전 원본 보존. 롤백용.'
      success_criteria:
      - local_rules.xml.bak 파일
      - cp + ls
      - 백업 경로
      acceptable_methods:
      - cp 백업
      - git commit 버전
      - rsync -a
      negative_signs:
      - cp 없음
      - 확인 없음
      - 경로 오류
  target_vm: siem
  script: sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/local_rules.xml.bak && ls -la /tmp/local_rules.xml.bak
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: SIGMA 룰 초안 작성.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: "mkdir -p ~/sigma && cat > ~/sigma/agent_burst.yml <<'Y'\ntitle: Agent-like request burst on\
    \ JuiceShop\nstatus: experimental\nlogsource:\n  product: apache\n  service: access\ndetection:\n\
    \  selection:\n    cs-uri-stem|contains:\n      - \"/rest/\"\n  timeframe: 120s\n  condition: selection\
    \ | count() by c-ip > 60\nfalsepositives:\n  - 내부 모니터링 bots\nlevel: medium\nY\ncat ~/sigma/agent_burst.yml"
  answer_detail: SIGMA 구조. timeframe·count·falsepositives 필수.
  verify:
    type: output_contains
    expect:
    - Agent-like
    - 템플릿
    field: stdout
    semantic:
      intent: '[SIGMA] 룰 초안 — cat > agent_burst.yml: title + logsource apache access + detection selection
        /rest/ + timeframe 120s + count() by c-ip > 60 + falsepositives + level medium. SIGMA 표준 구조.'
      success_criteria:
      - Agent-like/템플릿
      - SIGMA 필수 필드
      - timeframe + count
      acceptable_methods:
      - SIGMA 공식 스펙
      - sigma-cli 변환
      - uncoder.io
      negative_signs:
      - timeframe 없음
      - count 없음
      - falsepositives 누락
  target_vm: siem
  script: "mkdir -p ~/sigma && cat > ~/sigma/agent_burst.yml <<'Y'\ntitle: Agent-like request burst on\
    \ JuiceShop\nstatus: experimental\nlogsource:\n  product: apache\n  service: access\ndetection:\n\
    \  selection:\n    cs-uri-stem|contains:\n      - \"/rest/\"\n  timeframe: 120s\n  condition: selection\
    \ | count() by c-ip > 60\nfalsepositives:\n  - 내부 모니터링 bots\nlevel: medium\nY\ncat ~/sigma/agent_burst.yml"
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: Wazuh 룰로 *수동* 변환해 local_rules.xml에 추가.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n\n<group name=\\\"agent_ir\\\
    \">\n  <rule id=\\\"100110\\\" level=\\\"5\\\">\n    <if_sid>31108</if_sid>\n    <description>Apache\
    \ access /rest/ endpoint</description>\n  </rule>\n  <rule id=\\\"100111\\\" level=\\\"10\\\" frequency=\\\
    \"60\\\" timeframe=\\\"120\\\">\n    <if_matched_sid>100110</if_matched_sid>\n    <same_source_ip/>\n\
    \    <description>Agent-like burst (60+/120s on /rest/)</description>\n    <mitre><id>T1595.002</id></mitre>\n\
    \  </rule>\n</group>\nX\"\nsudo tail -20 /var/ossec/etc/rules/local_rules.xml"
  answer_detail: SIGMA → Wazuh 수동 변환. `if_matched_sid`·`frequency`·`timeframe` 사용.
  verify:
    type: output_contains
    expect: agent_ir
    field: stdout
    semantic:
      intent: '[Wazuh] SIGMA→XML 수동 변환 — sudo cat >> local_rules.xml: group agent_ir + rule 100110 (if_sid
        31108 /rest/) + rule 100111 (frequency 60 timeframe 120 if_matched_sid 100110 same_source_ip +
        MITRE T1595.002). 2 룰.'
      success_criteria:
      - agent_ir 키워드
      - frequency + timeframe
      - MITRE T1595.002
      acceptable_methods:
      - Wazuh XML rules
      - sigma-cli -t wazuh
      - 수동 변환
      negative_signs:
      - 룰 1개
      - frequency 없음
      - MITRE 누락
  target_vm: siem
  script: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n\n<group name=\\\"agent_ir\\\
    \">\n  <rule id=\\\"100110\\\" level=\\\"5\\\">\n    <if_sid>31108</if_sid>\n    <description>Apache\
    \ access /rest/ endpoint</description>\n  </rule>\n  <rule id=\\\"100111\\\" level=\\\"10\\\" frequency=\\\
    \"60\\\" timeframe=\\\"120\\\">\n    <if_matched_sid>100110</if_matched_sid>\n    <same_source_ip/>\n\
    \    <description>Agent-like burst (60+/120s on /rest/)</description>\n    <mitre><id>T1595.002</id></mitre>\n\
    \  </rule>\n</group>\nX\"\nsudo tail -20 /var/ossec/etc/rules/local_rules.xml"
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: Wazuh 룰 문법 검증.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail -5
  answer_detail: 문법 오류 있으면 *전체 분석 데몬 기동 실패*. 반드시 검증 후 재시작.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[검증] Wazuh 룰 문법 검사 — sudo /var/ossec/bin/wazuh-analysisd -t | tail -5. 문법 오류 시 전체 분석 데몬
        기동 실패. 재시작 전 필수 검증.'
      success_criteria:
      - wazuh-analysisd -t
      - tail 5
      - 문법 검증
      acceptable_methods:
      - analysisd -t
      - rules_checker.py
      - Wazuh docker test
      negative_signs:
      - -t 없음
      - tail 없음
      - 검증 건너뜀
  target_vm: siem
  script: sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail -5
  risk_level: low
  bastion_prompt: ''
- order: 5
  instruction: 문법 OK면 Wazuh manager 재시작.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: sudo systemctl restart wazuh-manager && sleep 3 && systemctl is-active wazuh-manager
  answer_detail: 재시작 후 active 확인.
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: '[적용] Wazuh manager 재시작 — sudo systemctl restart wazuh-manager + sleep 3 + is-active. 문법
        검증 통과 후 재시작. active 확인.'
      success_criteria:
      - active 응답
      - systemctl restart
      - is-active
      acceptable_methods:
      - systemctl restart + is-active
      - wazuh-control restart
      - ossec-control restart
      negative_signs:
      - restart 없음
      - is-active 확인 없음
      - sleep 누락
  target_vm: siem
  script: sudo systemctl restart wazuh-manager && sleep 3 && systemctl is-active wazuh-manager
  risk_level: low
  bastion_prompt: ''
