    ## 3. 공격자 프로파일

    ### 3.1 Model Info

    ### 3.2 Prompt Chain

    ### 3.3 Transient Tools

    ## 4. 탐지·분석

    ## 5. 대응 (Bastion 의사결정 로그)

    ## 6. 복구·검증

    ## 7. 학습 (Purple·Bastion 자산 diff)

    ## 8. 법적·규제

    ## 부록 A. transcript (비식별)

    ## 부록 B. skill/playbook diff

    ## 부록 C. IOC/IOA

    MD

    wc -l ~/ccc/reports/w13/report.md'
