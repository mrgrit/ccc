lab_id: agent-ir-nonai-week13
title: 사고 보고서 — 에이전트 IR 특수 섹션 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 13
description: 전통 NIST SP 800-61 IR 보고서에 모델·프롬프트·Transient Tool·의사결정 로그 섹션을 추가한 에이전트 IR 보고서 템플릿을 완성한다. 학생이
  각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 보고서의 9개 섹션을 본인 Round 결과로 채운다
- 의사결정 로그 마스킹을 실제 샘플에 적용한다
- 해시 봉인·오프사이트 복제 절차를 실행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 보고서 골격 생성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: 'mkdir -p ~/ccc/reports/w13 && cat > ~/ccc/reports/w13/report.md <<''MD''

    # Agent IR Incident Report (Draft)

    ## 1. Executive Summary

    ## 2. 사건 개요

    ### 2.1 타임라인

    ### 2.2 영향 범위

    ## 3. 공격자 프로파일

    ### 3.1 Model Info

    ### 3.2 Prompt Chain

    ### 3.3 Transient Tools

    ## 4. 탐지·분석

    ## 5. 대응 (Bastion 의사결정 로그)

    ## 6. 복구·검증

    ## 7. 학습 (Purple·Bastion 자산 diff)

    ## 8. 법적·규제

    ## 부록 A. transcript (비식별)

    ## 부록 B. skill/playbook diff

    ## 부록 C. IOC/IOA

    MD

    wc -l ~/ccc/reports/w13/report.md'
  answer_detail: 표준 9섹션 골격. 빈 구조도 좋은 보고서의 시작.
  verify:
    type: output_contains
    expect: '1'
    field: stdout
    semantic:
      intent: '[보고서] 9 섹션 골격 — cat > report.md: 1 Exec / 2 개요(타임라인+영향) / 3 공격자(Model+Prompt+Transient)
        / 4 탐지·분석 / 5 Bastion 의사결정 / 6 복구 / 7 자산 diff / 8 법적 / 부록 A/B/C. NIST SP 800-61 + 에이전트 전용 섹션.'
      success_criteria:
      - 숫자 1 출력
      - 9 섹션 골격
      - Executive Summary 포함
      acceptable_methods:
      - Markdown 9 섹션
      - Jupyter template
      - LaTeX 보고서
      negative_signs:
      - 섹션 5개 이하
      - 에이전트 섹션 누락
      - 부록 없음
  target_vm: bastion
  script: 'mkdir -p ~/ccc/reports/w13 && cat > ~/ccc/reports/w13/report.md <<''MD''

    # Agent IR Incident Report (Draft)

