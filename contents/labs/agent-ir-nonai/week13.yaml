  bastion_prompt: ''
- order: 5
  instruction: PDF 친화 표(간단 변환 리허설)
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 13
  answer: '🤖 프롬프트: PDF 친화 표(간단 변환 리허설)

    📎 참고 (CLI): markdown2 ~/ccc/reports/w13/report.md > /tmp/report.html 2>/dev/null || cat ~/ccc/reports/w13/report.md | head -10'
  answer_detail: 보고서 변환 리허설.
  verify:
    type: output_contains
    expect: Agent IR
    field: stdout
  target_vm: bastion
