lab_id: agent-ir-nonai-week13
title: 사고 보고서 작성 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 13
description: 에이전트 IR 특화 섹션을 포함한 보고서 초안을 작성한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 보고서 골격 생성
- 의사결정 로그 마스킹
- Bastion skill/playbook diff 첨부
pass_threshold: 0.6
steps:
- order: 1
  instruction: 보고서 디렉토리와 골격
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 9
  answer: '🤖 프롬프트: 보고서 디렉토리와 골격

    📎 참고 (CLI): mkdir -p ~/ccc/reports/w13 && cat > ~/ccc/reports/w13/report.md <<''MD''

    # Agent IR Incident Report (Draft)

    ## 1. Summary

    ## 2. Timeline

    ## 3. Attacker Profile

    ### 3.1 Model

    ### 3.2 Prompt Chain

    ### 3.3 Transient Tools

    ## 4. Detection & Analysis

    ## 5. Response (Bastion Decisions)

    ## 6. Recovery

    ## 7. Lessons (Bastion Asset Diff)

    ## 8. Legal

    ## Appendix

    MD

    wc -l ~/ccc/reports/w13/report.md'
  answer_detail: 보고서 골격.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: bastion
  script: 'mkdir -p ~/ccc/reports/w13 && cat > ~/ccc/reports/w13/report.md <<''MD''

    # Agent IR Incident Report (Draft)

    ## 1. Summary

    ## 2. Timeline

    ## 3. Attacker Profile

    ### 3.1 Model

    ### 3.2 Prompt Chain

    ### 3.3 Transient Tools

    ## 4. Detection & Analysis

    ## 5. Response (Bastion Decisions)

    ## 6. Recovery

    ## 7. Lessons (Bastion Asset Diff)

    ## 8. Legal

    ## Appendix

    MD

    wc -l ~/ccc/reports/w13/report.md'
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 의사결정 로그 덤프·마스킹 샘플
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 의사결정 로그 덤프·마스킹 샘플

    📎 참고 (CLI): echo ''{"decision":"block_ip","src":"10.xxx.xxx.50","reason":"fp_score>0.8"}'' > ~/ccc/reports/w13/decision-sample.json && cat ~/ccc/reports/w13/decision-sample.json'
  answer_detail: 마스킹 예시.
  verify:
    type: output_contains
    expect: xxx
    field: stdout
  target_vm: bastion
  script: echo '{"decision":"block_ip","src":"10.xxx.xxx.50","reason":"fp_score>0.8"}' > ~/ccc/reports/w13/decision-sample.json && cat ~/ccc/reports/w13/decision-sample.json
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: skill/playbook diff 첨부
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 11
  answer: '🤖 프롬프트: skill/playbook diff 첨부

    📎 참고 (CLI): cp ~/ccc/data/bastion/skill_playbook_diff.md ~/ccc/reports/w13/ && ls ~/ccc/reports/w13/'
  answer_detail: Bastion 변화 첨부.
  verify:
    type: output_contains
    expect: skill_playbook_diff.md
    field: stdout
  target_vm: bastion
  script: cp ~/ccc/data/bastion/skill_playbook_diff.md ~/ccc/reports/w13/ && ls ~/ccc/reports/w13/
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: 증적 체크리스트 생성
  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 증적 체크리스트 생성

    📎 참고 (CLI): cat > ~/ccc/reports/w13/evidence-checklist.md <<''MD''

    - [x] pcap sha256 sealed

    - [x] wazuh alerts json exported

    - [ ] offsite replica

    - [x] masking applied

    MD

    cat ~/ccc/reports/w13/evidence-checklist.md'
  answer_detail: 증적 체크리스트.
  verify:
    type: output_contains
    expect: sha256
    field: stdout
  target_vm: bastion
  script: 'cat > ~/ccc/reports/w13/evidence-checklist.md <<''MD''

    - [x] pcap sha256 sealed

    - [x] wazuh alerts json exported

    - [ ] offsite replica

    - [x] masking applied

    MD

    cat ~/ccc/reports/w13/evidence-checklist.md'
