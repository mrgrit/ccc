- order: 6
  instruction: Canary 트래픽 스크립트.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 14
  answer: "cat > ~/ccc/scripts/canary.py <<'PY'\nimport requests, time\ndef canary():\n    results = []\n\
    \    for scenario in [{'name':'normal_get','url':'http://10.20.30.80/'},\n                     {'name':'api_health','url':'http://10.20.30.80/health'}]:\n\
    \        try:\n            r = requests.get(scenario['url'], timeout=5)\n            results.append((scenario['name'],\
    \ r.status_code))\n        except Exception as e:\n            results.append((scenario['name'], 'ERROR'))\n\
    \    return results\nprint(canary())\nPY\npython3 ~/ccc/scripts/canary.py 2>&1 | head -5"
  answer_detail: 정상 트래픽 시뮬. 자동 차단되면 Playbook 문제.
  verify:
    type: output_contains
    expect: ''
