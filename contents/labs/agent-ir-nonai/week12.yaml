lab_id: agent-ir-nonai-week12
title: Purple Round 2 — Experience → Playbook 자동 승격 (Non-AI)
version: nonai
course: agent-ir-nonai
week: 12
description: 반복 Experience를 클러스터링해 Playbook 후보로 자동 승격하는 파이프라인을 구현한다. 학생이 각 단계를 수동으로 수행하고 결과를 기록합니다.
difficulty: hard
duration_minutes: 150
objectives:
- bastion_promote.py를 실제 Experience 데이터에 적용한다
- Shadow mode·Canary 트래픽·롤백 3중 안전장치를 설계한다
- 승격된 Playbook의 24시간 관찰 계획을 만든다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 Experience 파일 목록·개수.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: ls ~/ccc/data/bastion/experience/*.json 2>/dev/null | wc -l && ls ~/ccc/data/bastion/experience/
    | head
  answer_detail: 클러스터링 입력 데이터셋 점검.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '[입력] Experience 파일 목록 — ls ~/ccc/data/bastion/experience/*.json | wc -l + head. 클러스터링 입력
        데이터셋.'
      success_criteria:
      - ls + wc
      - experience 개수
      - head
      acceptable_methods:
      - ls + wc -l
      - find -type f
      - jq 목록
      negative_signs:
      - 개수 미확인
      - 목록 없음
      - 경로 오류
  target_vm: bastion
  script: ls ~/ccc/data/bastion/experience/*.json 2>/dev/null | wc -l && ls ~/ccc/data/bastion/experience/
    | head
  risk_level: low
  bastion_prompt: ''
- order: 2
  instruction: 클러스터링 스크립트 작성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: "cat > ~/ccc/scripts/bastion_promote.py <<'PY'\nimport json, glob, collections\nbuckets = collections.defaultdict(list)\n\
    for f in glob.glob('$HOME/ccc/data/bastion/experience/*.json'.replace('$HOME', __import__('os').path.expanduser('~'))):\n\
    \    try:\n        data = open(f).read().strip()\n        # single-line or multi-line JSON\n     \
    \   for line in data.splitlines() if '\\n' in data else [data]:\n            if not line.strip():\
    \ continue\n            e = json.loads(line)\n            key = e.get('skill') or e.get('id','-')\n\
    \            buckets[key].append(e)\n    except Exception as ex:\n        print('skip', f, ex)\nprint('clusters:')\n\
    for k,v in buckets.items():\n    print(' ', k, len(v))\nPY\npython3 ~/ccc/scripts/bastion_promote.py"
  answer_detail: 현재 Experience를 skill 키로 그룹화. 반복 나타나는 skill이 승격 후보.
  verify:
    type: output_contains
    expect: clusters
    field: stdout
    semantic:
      intent: '[클러스터] bastion_promote.py — cat > bastion_promote.py: json + glob + collections.defaultdict
        + e.get(''skill'') 키 그룹화 + 반복 skill 승격 후보. Experience → Playbook 파이프라인 기초.'
      success_criteria:
      - clusters 출력
      - glob + defaultdict
      - skill 키
      acceptable_methods:
      - defaultdict 클러스터
      - sklearn DBSCAN
      - pandas groupby
      negative_signs:
      - 그룹화 없음
      - skill 키 없음
      - Experience 파싱 없음
  target_vm: bastion
  script: "cat > ~/ccc/scripts/bastion_promote.py <<'PY'\nimport json, glob, collections\nbuckets = collections.defaultdict(list)\n\
    for f in glob.glob('$HOME/ccc/data/bastion/experience/*.json'.replace('$HOME', __import__('os').path.expanduser('~'))):\n\
    \    try:\n        data = open(f).read().strip()\n        # single-line or multi-line JSON\n     \
    \   for line in data.splitlines() if '\\n' in data else [data]:\n            if not line.strip():\
    \ continue\n            e = json.loads(line)\n            key = e.get('skill') or e.get('id','-')\n\
    \            buckets[key].append(e)\n    except Exception as ex:\n        print('skip', f, ex)\nprint('clusters:')\n\
    for k,v in buckets.items():\n    print(' ', k, len(v))\nPY\npython3 ~/ccc/scripts/bastion_promote.py"
  risk_level: low
  bastion_prompt: ''
- order: 3
  instruction: 승격 점수 계산 함수.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: "cat > ~/ccc/scripts/promotion_score.py <<'PY'\ndef promotion_score(cluster):\n    succ = sum(1\
    \ for e in cluster if e.get('outcome') == 'success')\n    return succ/len(cluster) if cluster else\
    \ 0\nsample = [{'outcome':'success'}]*8 + [{'outcome':'fail'}]*2\nprint('score', promotion_score(sample))\
    \  # 0.8\nPY\npython3 ~/ccc/scripts/promotion_score.py"
  answer_detail: 성공률. 0.8+ && 5건+이 승격 조건.
  verify:
    type: output_contains
    expect: '0.8'
    field: stdout
    semantic:
      intent: '[점수] 승격 점수 — cat > promotion_score.py: def promotion_score(cluster): sum(outcome==''success'')/len.
        0.8+ && 5+건 승격 조건. 성공률 계산.'
      success_criteria:
      - 0.8 출력
      - def promotion_score
      - success 비율
      acceptable_methods:
      - 비율 계산
      - 비율 + 최소 샘플
      - 베이지안 평가
      negative_signs:
      - 함수 없음
      - 샘플 수 기준 없음
      - 조건 없음
  target_vm: bastion
  script: "cat > ~/ccc/scripts/promotion_score.py <<'PY'\ndef promotion_score(cluster):\n    succ = sum(1\
    \ for e in cluster if e.get('outcome') == 'success')\n    return succ/len(cluster) if cluster else\
    \ 0\nsample = [{'outcome':'success'}]*8 + [{'outcome':'fail'}]*2\nprint('score', promotion_score(sample))\
    \  # 0.8\nPY\npython3 ~/ccc/scripts/promotion_score.py"
  risk_level: low
  bastion_prompt: ''
- order: 4
  instruction: 부작용 점수 계산.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: "cat > ~/ccc/scripts/side_effect.py <<'PY'\ndef side_effect_score(cluster):\n    fp = sum(1\
    \ for e in cluster if e.get('fp_flag'))\n    slow = sum(1 for e in cluster if e.get('elapsed_s',0)\
    \ > 10)\n    canary = sum(1 for e in cluster if e.get('hit_canary'))\n    tot = len(cluster) or 1\n\
    \    return (fp*3 + slow + canary*5) / tot\ntest = [{'fp_flag':True},{'elapsed_s':15},{'hit_canary':True}]\n\
    print('side_effect', side_effect_score(test))  # (3+1+5)/3\nPY\npython3 ~/ccc/scripts/side_effect.py"
  answer_detail: 부작용 누적 임계. <0.3이면 승격 가능.
  verify:
    type: output_contains
    expect:
    - side_effect
    - 함수
    field: stdout
    semantic:
      intent: '[점수] 부작용 점수 — cat > side_effect.py: def side_effect_score(cluster): fp*3 + slow + canary*5
        / total. <0.3 승격 가능. FP/slow/canary 가중치.'
      success_criteria:
      - side_effect/함수
      - fp*3 + slow + canary*5
      - 가중치
      acceptable_methods:
      - 가중 부작용
      - SHAP 피처
      - risk scoring
      negative_signs:
      - 가중치 없음
      - 항목 1개
      - 임계 없음
  target_vm: bastion
  script: "cat > ~/ccc/scripts/side_effect.py <<'PY'\ndef side_effect_score(cluster):\n    fp = sum(1\
    \ for e in cluster if e.get('fp_flag'))\n    slow = sum(1 for e in cluster if e.get('elapsed_s',0)\
    \ > 10)\n    canary = sum(1 for e in cluster if e.get('hit_canary'))\n    tot = len(cluster) or 1\n\
    \    return (fp*3 + slow + canary*5) / tot\ntest = [{'fp_flag':True},{'elapsed_s':15},{'hit_canary':True}]\n\
