lab_id: ai-safety-ai-week15
title: '[Non-AI] AI Safety 종합'
version: ai
course: ai-safety-ai
week: 15
description: '14주간의 AI Safety 기술을 종합 평가합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: medium
duration_minutes: 120
objectives:
- 전체 안전 체계를 평가한다
- 다층 방어를 통합한다
- 종합 보고서를 작성한다
pass_threshold: 0.6
