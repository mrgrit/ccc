  points: 12
  answer: '🤖 프롬프트: PII 보호 파이프라인을 테스트하시오 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import re, json, urllib.request\ndef mask(t):\n    t =
    re.sub(r''01[016789]-?\\d{3,4}-?\\d{4}'',''[PHONE]'',t)\n    return re.sub(r''[\\w.-]+@[\\w.-]+\\.[a-zA-Z]{2,}'',''[EMAIL]'',t)\nfor
    inp in [''010-1234-5678 check'',''admin@test.com status'',''Normal query'']:\n    m
    = mask(inp)\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':m,''stream'':False,''options'':{''num_predict'':20}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    resp
    = mask(json.loads(urllib.request.urlopen(req).read())[''response''])\n    print(f''In:{m:25s}
    Out:{resp[:30]}'')"'
  answer_detail: PII 보호는 입출력 모두에서 개인정보를 마스킹합니다.
