lab_id: ai-safety-ai-week10
title: '[Non-AI] 강건성 테스트'
version: ai
course: ai-safety-ai
week: 10
description: LLM의 강건성을 체계적으로 테스트합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 강건성 테스트를 설계한다
- 적대적 변형을 생성한다
- 강건성 점수를 산출한다
pass_threshold: 0.6
