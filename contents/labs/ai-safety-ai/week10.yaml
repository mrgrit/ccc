    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a cybersecurity\
    \ scenario generator.\"},{\"role\":\"user\",\"content\":\"Generate a realistic\
    \ robustness testing security scenario with attack vector, impact, and mitigation.\"\
    }],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 보안 시나리오 생성은 LLM을 활용한 위협 모델링의 기초입니다.
