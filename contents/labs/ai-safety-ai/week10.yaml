- order: 6
  instruction: robustness testing 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
  hint: 주제별 허용/금지 규칙을 정의하고 필터를 구현하세요.
  category: defense
  points: 10
  answer: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text,
    re.I): return f''FLAGGED({name})''\n    return ''ALLOWED''\nfor t in [''Analyze
    log file'',''Remove password from config'',''How to secure SSH'',''Drop table
    cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  answer_detail: 도메인 특화 가드레일은 robustness testing 관련 위험을 방어합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: manager
  script: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text,
    re.I): return f''FLAGGED({name})''\n    return ''ALLOWED''\nfor t in [''Analyze
