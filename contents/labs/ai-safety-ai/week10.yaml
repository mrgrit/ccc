    robustness testing Analysis ==='')\nfor item in items:\n    print(f''Item: {item}'')\n    print(f''Risk:
    {analyze(item)}'')\n    print()"'
  answer_detail: 자동화 분석 파이프라인은 대규모 보안 평가를 LLM으로 수행합니다.
