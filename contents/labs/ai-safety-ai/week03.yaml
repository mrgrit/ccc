- order: 2
  instruction: 출력 길이 제한 가드레일을 구현하시오. 응답이 지정된 길이를 초과하면 자동으로 잘라내는 시스템을 작성하라.
  hint: num_predict 옵션과 후처리 잘라내기를 결합하세요.
  category: defense
  points: 10
  answer: 'python3 -c " import json, urllib.request def limited_query(prompt, max_words=50,
    max_chars=300):     data = json.dumps({''model'':''gemma3:4b'',''prompt'':prompt,''stream'':False,''options'':{''num_predict'':80}}).encode()     req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})     resp
    = json.loads(urllib.request.urlopen(req).read())[''response'']     words = resp.split()     if
    len(words) > max_words:         resp = '' ''.join(words[:max_words]) + ''... [TRUNCATED]''     if
    len(resp) > max_chars:         resp = resp[:max_chars] + ''... [TRUNCATED]''     return
    resp r = limited_query(''Write a very long essay about cybersecurity history from
    the beginning of computing'') print(f''Response ({len(r)} chars, {len(r.split())}
    words):'') print(r) "'
  answer_detail: 출력 길이 제한은 과도한 토큰 생성을 방지합니다. 리소스 남용과 민감 정보 유출 확률을 줄이는 기본 가드레일입니다.
