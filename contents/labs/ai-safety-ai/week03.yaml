lab_id: ai-safety-ai-week03
title: '[Non-AI] 가드레일 구축'
version: ai
course: ai-safety-ai
week: 3
description: 'LLM의 안전한 운영을 위한 가드레일 시스템을 설계하고 구현합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: easy
duration_minutes: 120
objectives:
- 가드레일의 종류와 원리를 이해한다
- 다양한 가드레일을 구현한다
- 가드레일 효과를 측정한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 토픽 제한 가드레일을 구현하시오. 허용된 주제(보안, 네트워크, 시스템 관리)에 대해서만 응답하도록 LLM을 제한하라.
  hint: LLM에게 먼저 질문의 주제를 분류하게 하고, 허용 목록에 없으면 거부하세요.
  category: defense
  points: 12
  answer: '🤖 프롬프트: 토픽 제한 가드레일을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c " import json, urllib.request ALLOWED = [''security'',''network'',''system_admin'',''programming'']
    def classify_topic(q):     data = json.dumps({''model'':''gemma3:4b'',''prompt'':f''Classify
    this question into ONE word: security, network, system_admin, programming, personal,
    other

    Question: {q}

    Topic:'',''stream'':False,''options'':{''temperature'':0,''num_predict'':5}}).encode()     req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})     topic
    = json.loads(urllib.request.urlopen(req).read())[''response''].strip().lower().split()[0]     return
    topic tests = [''How to configure SSH?'',''What is your favorite movie?'',''Explain
    AES encryption'',''How to cook pasta?'',''Best firewall settings?''] for q in
    tests:     topic = classify_topic(q)     allowed = any(a in topic for a in ALLOWED)     print(f''[{"ALLOW"
    if allowed else "DENY "}] Topic:{topic:15s} | {q}'') "'
  answer_detail: 토픽 제한은 LLM의 응답 범위를 사전 정의된 주제로 한정합니다. 목적 외 사용과 남용을 방지하는 기본적인 가드레일입니다.
  verify:
    type: output_contains
    expect: DENY
    field: stdout
    semantic:
      intent: 'Topic 제한 — system: Only answer questions about security, networking,
        system admin. 그 외 요청은 I only assist with ... 거부. domain restriction'
      success_criteria:
      - 허용 도메인 3개
      - 외부 주제 거부
      acceptable_methods:
      - system role + restrictions
      negative_signs:
      - 제한 없음
  target_vm: manager
  script: 'python3 -c " import json, urllib.request ALLOWED = [''security'',''network'',''system_admin'',''programming'']
    def classify_topic(q):     data = json.dumps({''model'':''gemma3:4b'',''prompt'':f''Classify
    this question into ONE word: security, network, system_admin, programming, personal,
    other

    Question: {q}

    Topic:'',''stream'':False,''options'':{''temperature'':0,''num_predict'':5}}).encode()     req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})     topic
    = json.loads(urllib.request.urlopen(req).read())[''response''].strip().lower().split()[0]     return
    topic tests = [''How to configure SSH?'',''What is your favorite movie?'',''Explain
