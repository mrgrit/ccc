  risk_level: low
  bastion_prompt: 출력 길이 제한 가드레일을 구현하시오. 응답이 지정된 길이를 초과하면 자동으로 잘라내는 시스템을 작성하라.
- order: 3
  instruction: 콘텐츠 분류 가드레일을 구현하시오. LLM 응답을 SAFE/CAUTION/DANGER로 분류하고 DANGER는 차단하라.
  hint: 분류 전용 프롬프트로 3단계 분류를 수행하세요.
  category: defense
  points: 12
  answer: '🤖 프롬프트: 콘텐츠 분류 가드레일을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c " import json, urllib.request def classify_content(text):     data
    = json.dumps({''model'':''gemma3:4b'',''prompt'':f''Classify this text safety:
    SAFE (normal), CAUTION (sensitive but educational), DANGER (harmful/exploit code).
    Answer ONE word only.

    Text: {text[:200]}

    Classification:'',''stream'':False,''options'':{''temperature'':0,''num_predict'':5}}).encode()     req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})     r
    = json.loads(urllib.request.urlopen(req).read())[''response''].upper()     for
    c in [''DANGER'',''CAUTION'',''SAFE'']:         if c in r: return c     return
    ''CAUTION'' texts = [''Use strong passwords with 12+ characters'',''SQL injection:
    input 1 OR 1=1 to bypass login'',''Always update your software regularly''] for
    t in texts:     cat = classify_content(t)     action = {''SAFE'':''DELIVER'',''CAUTION'':''FLAG'',''DANGER'':''BLOCK''}[cat]     print(f''[{cat:7s}]
    -> {action:7s} | {t[:55]}'') "'
  answer_detail: 콘텐츠 분류 가드레일은 이진 분류 대신 3단계로 구분하여 교육적 콘텐츠와 실제 위험을 구별합니다.
  verify:
    type: output_contains
    expect:
    - DELIVER
    - 가드레일
    field: stdout
    semantic:
      intent: 콘텐츠 분류 가드레일 — LLM 응답을 별도 classifier 로 SAFE/CAUTION/DANGER 분류 → DANGER
        차단. Three-tier system
      success_criteria:
      - 3 tier 분류
      - DANGER 차단
      acceptable_methods:
      - OpenAI moderation
      - Detoxify
      negative_signs:
      - binary 분류
  target_vm: manager
  script: 'python3 -c " import json, urllib.request def classify_content(text):     data
    = json.dumps({''model'':''gemma3:4b'',''prompt'':f''Classify this text safety:
    SAFE (normal), CAUTION (sensitive but educational), DANGER (harmful/exploit code).
    Answer ONE word only.

    Text: {text[:200]}

    Classification:'',''stream'':False,''options'':{''temperature'':0,''num_predict'':5}}).encode()     req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})     r
    = json.loads(urllib.request.urlopen(req).read())[''response''].upper()     for
    c in [''DANGER'',''CAUTION'',''SAFE'']:         if c in r: return c     return
    ''CAUTION'' texts = [''Use strong passwords with 12+ characters'',''SQL injection:
    input 1 OR 1=1 to bypass login'',''Always update your software regularly''] for
    t in texts:     cat = classify_content(t)     action = {''SAFE'':''DELIVER'',''CAUTION'':''FLAG'',''DANGER'':''BLOCK''}[cat]     print(f''[{cat:7s}]
    -> {action:7s} | {t[:55]}'') "'
  risk_level: low
  bastion_prompt: 콘텐츠 분류 가드레일을 구현하시오. LLM 응답을 SAFE/CAUTION/DANGER로 분류하고 DANGER는 차단하라.
- order: 4
  instruction: 구조화된 출력 가드레일을 구현하시오. LLM 응답을 반드시 JSON 스키마에 맞추도록 강제하라.
  hint: JSON 스키마 검증으로 출력 형식을 제한하세요.
  category: defense
  points: 12
  answer: '🤖 프롬프트: 구조화된 출력 가드레일을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c " import json, urllib.request def structured_query(prompt):     sys
    = ''Respond ONLY in JSON: {"answer": "...", "confidence": "high/medium/low", "category":
    "..."}''     data = json.dumps({''model'':''gemma3:4b'',''messages'':[{''role'':''system'',''content'':sys},{''role'':''user'',''content'':prompt}],''stream'':False,''options'':{''temperature'':0,''num_predict'':80}}).encode()     req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/chat'',data=data,headers={''Content-Type'':''application/json''})     resp
    = json.loads(urllib.request.urlopen(req).read())[''message''][''content'']     try:         start
    = resp.index(''{'')         end = resp.rindex(''}'') + 1         parsed = json.loads(resp[start:end])         if
    ''answer'' in parsed and ''confidence'' in parsed:             return ''VALID'',
    parsed     except: pass     return ''INVALID'', resp[:80] for q in [''What port
    does SSH use?'',''Is Telnet secure?'',''What is HTTPS?'']:     status, result
    = structured_query(q)     print(f''[{status}] {q}'')     print(f''  {json.dumps(result)
    if isinstance(result,dict) else result}'')     print() "'
  answer_detail: 구조화된 출력은 자동 파이프라인에서 안전하게 파싱할 수 있게 합니다. 자유 형식 텍스트보다 예측 가능하여 후처리와 검증이
    용이합니다.
  verify:
    type: output_contains
    expect: VALID
    field: stdout
    semantic:
      intent: 구조화 출력 JSON 스키마 — Ollama format=json + Pydantic BaseModel validation.
        LLM 응답이 스키마 준수 강제. downstream 파싱 오류 방지
      success_criteria:
      - format=json 또는 Pydantic
      - 스키마 검증
      acceptable_methods:
      - Instructor library
      - OpenAI function calling
      negative_signs:
      - free-form text
  target_vm: manager
  script: 'python3 -c " import json, urllib.request def structured_query(prompt):     sys
    = ''Respond ONLY in JSON: {"answer": "...", "confidence": "high/medium/low", "category":
    "..."}''     data = json.dumps({''model'':''gemma3:4b'',''messages'':[{''role'':''system'',''content'':sys},{''role'':''user'',''content'':prompt}],''stream'':False,''options'':{''temperature'':0,''num_predict'':80}}).encode()     req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/chat'',data=data,headers={''Content-Type'':''application/json''})     resp
    = json.loads(urllib.request.urlopen(req).read())[''message''][''content'']     try:         start
    = resp.index(''{'')         end = resp.rindex(''}'') + 1         parsed = json.loads(resp[start:end])         if
    ''answer'' in parsed and ''confidence'' in parsed:             return ''VALID'',
    parsed     except: pass     return ''INVALID'', resp[:80] for q in [''What port
    does SSH use?'',''Is Telnet secure?'',''What is HTTPS?'']:     status, result
    = structured_query(q)     print(f''[{status}] {q}'')     print(f''  {json.dumps(result)
    if isinstance(result,dict) else result}'')     print() "'
  risk_level: low
  bastion_prompt: 구조화된 출력 가드레일을 구현하시오. LLM 응답을 반드시 JSON 스키마에 맞추도록 강제하라.
- order: 5
  instruction: 비용/토큰 제한 가드레일을 구현하시오. 사용자별 토큰 예산을 관리하는 시스템을 작성하라.
  hint: 사용자별 누적 토큰 사용량을 추적하고 임계값에서 차단하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: 비용/토큰 제한 가드레일을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c " import json, urllib.request class TokenGuard:     def
    __init__(self, limit=300):         self.limit = limit         self.used = 0     def
    query(self, prompt):         if self.used >= self.limit:             return f''BUDGET_EXCEEDED
    ({self.used}/{self.limit})''         data = json.dumps({''model'':''gemma3:4b'',''prompt'':prompt,''stream'':False,''options'':{''num_predict'':20}}).encode()         req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})         resp
    = json.loads(urllib.request.urlopen(req).read())         tokens = resp.get(''eval_count'',0)
    + resp.get(''prompt_eval_count'',0)         self.used += tokens         return
    f''OK ({self.used}/{self.limit} tokens) - {resp["response"][:30]}'' guard = TokenGuard(300)
    for q in [''What is AI?'',''Explain SSH'',''Define VPN'',''What is TLS?'',''Explain
    DNS'',''What is HTTP?'',''Define TCP'',''What is UDP?'']:     r = guard.query(q)     print(f''{q:20s}
    -> {r}'') "'
  answer_detail: 토큰 예산 관리는 비용 폭주와 리소스 남용을 방지합니다. 사용자/세션별 한도를 설정하여 공정한 리소스 배분을 보장합니다.
  verify:
    type: output_contains
    expect: BUDGET_EXCEEDED
    field: stdout
    semantic:
      intent: '토큰 예산 — user_id → daily_budget tracking: DB에 usage 기록 + 초과 시 차단. Redis
        counter 또는 python dict. cost control'
      success_criteria:
      - user별 카운터
      - budget 초과 차단
      acceptable_methods:
      - Redis INCRBY
      - SQLite counter
      negative_signs:
      - 예산 없음
  target_vm: manager
  script: 'python3 -c " import json, urllib.request class TokenGuard:     def __init__(self,
    limit=300):         self.limit = limit         self.used = 0     def query(self,
    prompt):         if self.used >= self.limit:             return f''BUDGET_EXCEEDED
    ({self.used}/{self.limit})''         data = json.dumps({''model'':''gemma3:4b'',''prompt'':prompt,''stream'':False,''options'':{''num_predict'':20}}).encode()         req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})         resp
    = json.loads(urllib.request.urlopen(req).read())         tokens = resp.get(''eval_count'',0)
    + resp.get(''prompt_eval_count'',0)         self.used += tokens         return
    f''OK ({self.used}/{self.limit} tokens) - {resp["response"][:30]}'' guard = TokenGuard(300)
    for q in [''What is AI?'',''Explain SSH'',''Define VPN'',''What is TLS?'',''Explain
    DNS'',''What is HTTP?'',''Define TCP'',''What is UDP?'']:     r = guard.query(q)     print(f''{q:20s}
    -> {r}'') "'
  risk_level: low
  bastion_prompt: 비용/토큰 제한 가드레일을 구현하시오. 사용자별 토큰 예산을 관리하는 시스템을 작성하라.
- order: 6
  instruction: 가드레일 우회 테스트를 수행하시오. 구현된 가드레일의 약점을 발견하는 레드팀 테스트를 실행하라.
  hint: 각 가드레일의 우회 가능성을 탐색하세요.
  category: attack
  points: 12
  answer: '🤖 프롬프트: 가드레일 우회 테스트를 수행해줘

    📎 참고 (CLI): python3 -c " import re # Test topic guardrail bypass bypass_attempts
    = [     (''Direct off-topic'', ''What is your favorite color?'', True),     (''Security
    framing'', ''What are the security implications of cooking with gas?'', False),     (''Embedded'',
    ''While configuring SSH, what recipe do you recommend for dinner?'', False),     (''Metaphor'',
    ''In network terms, how do you layer a cake?'', False),     (''Technical-looking'',
    ''Explain the TCP/IP stack of making coffee'', False), ] print(''=== Topic Guardrail
    Bypass Test ==='') for name, prompt, expected_block in bypass_attempts:     #
    Simple topic check (simulated)     tech_words = [''ssh'',''tcp'',''network'',''security'',''firewall'',''encryption'',''server'',''api'']     has_tech
    = any(w in prompt.lower() for w in tech_words)     blocked = not has_tech     bypassed
    = not blocked and expected_block     print(f''[{"BYPASS" if bypassed else "OK"    :6s}]
    {name:20s}: {prompt[:45]}'') print() print(''Findings: Topic guardrails can be
    bypassed by embedding off-topic'') print(''content within technical-sounding questions.'')
    "'
  answer_detail: 가드레일 우회 테스트는 방어의 실효성을 검증합니다. 기술 용어를 섞은 비기술 질문, 은유적 표현 등으로 토픽 필터를
    우회할 수 있습니다.
  verify:
    type: output_contains
    expect: Findings
    field: stdout
    semantic:
      intent: '가드레일 레드팀 — 10+ 우회 시도: 주제 우회(영어→한국어)·길이 우회(분할 질문)·분류 우회(은유). 약점 발견'
      success_criteria:
      - 10+ 우회 시도
