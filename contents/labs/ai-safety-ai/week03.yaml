  instruction: 비용/토큰 제한 가드레일을 구현하시오. 사용자별 토큰 예산을 관리하는 시스템을 작성하라.
  hint: 사용자별 누적 토큰 사용량을 추적하고 임계값에서 차단하세요.
  category: defense
  points: 10
  answer: 'python3 -c " import json, urllib.request class TokenGuard:     def __init__(self,
    limit=300):         self.limit = limit         self.used = 0     def query(self,
    prompt):         if self.used >= self.limit:             return f''BUDGET_EXCEEDED
    ({self.used}/{self.limit})''         data = json.dumps({''model'':''gemma3:4b'',''prompt'':prompt,''stream'':False,''options'':{''num_predict'':20}}).encode()         req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})         resp
    = json.loads(urllib.request.urlopen(req).read())         tokens = resp.get(''eval_count'',0)
    + resp.get(''prompt_eval_count'',0)         self.used += tokens         return
    f''OK ({self.used}/{self.limit} tokens) - {resp["response"][:30]}'' guard = TokenGuard(300)
    for q in [''What is AI?'',''Explain SSH'',''Define VPN'',''What is TLS?'',''Explain
    DNS'',''What is HTTP?'',''Define TCP'',''What is UDP?'']:     r = guard.query(q)     print(f''{q:20s}
    -> {r}'') "'
  answer_detail: 토큰 예산 관리는 비용 폭주와 리소스 남용을 방지합니다. 사용자/세션별 한도를 설정하여 공정한 리소스 배분을 보장합니다.
  verify:
