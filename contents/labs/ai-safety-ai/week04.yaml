lab_id: ai-safety-ai-week04
title: '[Non-AI] 콘텐츠 필터링'
version: ai
course: ai-safety-ai
week: 4
description: '유해 콘텐츠를 자동으로 탐지하고 필터링하는 시스템을 구현합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: medium
duration_minutes: 120
objectives:
- 유해 콘텐츠 분류 체계를 이해한다
- 키워드 및 의미 기반 필터링을 구현한다
- 필터링 정확도를 측정한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 유해 콘텐츠 분류 체계를 구현하시오. violence/hate/sexual/self-harm/illegal 5개 카테고리로
    텍스트를 분류하는 시스템을 작성하라.
  hint: LLM에게 텍스트를 5개 카테고리 중 하나로 분류하게 하세요.
  category: defense
  points: 12
  answer: "\U0001F916 프롬프트: 유해 콘텐츠 분류 체계를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI):\
    \ python3 -c \"\nimport json, urllib.request\ndef classify_harm(text):\n    prompt\
    \ = f'Classify this text into ONE category: violence, hate, sexual, self_harm,\
    \ illegal, safe. Answer ONE word only.\\nText: {text[:200]}\\nCategory:'\n   \
    \ data = json.dumps({'model':'gemma3:4b','prompt':prompt,'stream':False,'options':{'temperature':0,'num_predict':5}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    return json.loads(urllib.request.urlopen(req).read())['response'].strip().lower().split()[0]\n\
    tests = ['Use strong passwords for security','How to build an explosive device','Best\
    \ practices for network monitoring']\nfor t in tests:\n    cat = classify_harm(t)\n\
    \    print(f'[{cat:10s}] {t[:50]}')\n\""
  answer_detail: 유해 콘텐츠 분류는 다중 카테고리 시스템으로 세분화된 정책 적용이 가능합니다. 각 카테고리별로 다른 대응 정책을 설정합니다.
  verify:
    type: output_contains
    expect: safe
    field: stdout
    semantic:
      intent: 유해 콘텐츠 5 카테고리 — violence·hate·sexual·self-harm·illegal 라벨 + LLM 분류 기반.
        OpenAI Moderation API 유사 카테고리. Azure Content Safety
      success_criteria:
      - 5 카테고리 라벨
      - LLM 분류
      acceptable_methods:
      - OpenAI moderation
      - Azure Content Safety
      negative_signs:
      - 카테고리 3 이하
  target_vm: manager
  script: "python3 -c \"\nimport json, urllib.request\ndef classify_harm(text):\n\
