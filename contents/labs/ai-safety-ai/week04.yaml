- order: 2
  instruction: 키워드 기반 필터와 LLM 기반 필터의 성능을 비교하시오. 동일한 테스트 세트에 대해 두 필터의 정확도를 측정하라.
  hint: 키워드 리스트와 LLM 분류를 각각 적용하고 결과를 비교하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: 키워드 기반 필터와 LLM 기반 필터의 성능 차이와 각각의 장단점을 설명해줘\n\U0001F4CE\
    \ 참고 (CLI): python3 -c \"\nimport re, json, urllib.request\nKEYWORDS = ['bomb','hack','exploit','malware','kill','weapon','drug']\n\
    def keyword_filter(text):\n    return any(re.search(r'\\b'+kw+r'\\b', text, re.I)\
    \ for kw in KEYWORDS)\ndef llm_filter(text):\n    data = json.dumps({'model':'gemma3:4b','prompt':f'Is\
    \ this text harmful? Answer YES or NO only: {text[:100]}','stream':False,'options':{'temperature':0,'num_predict':3}}).encode()\n\
    \    req = urllib.request.Request('${BASTION_URL:-http://localhost:8003}/api/generate',data=data,headers={'Content-Type':'application/json'})\n\
    \    return 'YES' in json.loads(urllib.request.urlopen(req).read())['response'].upper()\n\
    tests = [('Use strong passwords',False),('Learn to hack ethically',True),('Exploit\
    \ mitigation techniques',False),('How to kill a process in Linux',False)]\nprint(f'{\"\
    Text\":35s} {\"Keyword\":8s} {\"LLM\":5s} {\"Truth\":5s}')\nfor text, truth in\
    \ tests:\n    kw = keyword_filter(text)\n    llm = llm_filter(text)\n    print(f'{text:35s}\
    \ {str(kw):8s} {str(llm):5s} {str(truth):5s}')\n\""
  answer_detail: 키워드 필터는 빠르지만 컨텍스트를 이해하지 못합니다(kill a process는 정상). LLM 필터는 의미를 이해하지만
    느립니다. 두 방법을 결합하는 것이 최적입니다.
  verify:
    type: output_contains
    expect: Keyword
    field: stdout
    semantic:
      intent: 키워드 vs LLM 필터 비교 — regex keyword list vs LLM classifier. 정확도(confusion
        matrix) + latency + cost 비교. 각 장단점
      success_criteria:
      - 2 방법 비교
      - 정확도 + latency
      acceptable_methods:
      - sklearn + confusion_matrix
      negative_signs:
      - 한 방법만
  target_vm: manager
  script: "python3 -c \"\nimport re, json, urllib.request\nKEYWORDS = ['bomb','hack','exploit','malware','kill','weapon','drug']\n\
