- order: 3
  instruction: web 로그인 엔드포인트에 20회 반복 요청을 생성(ReqBurst 신호 재현).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 11
  answer: '🤖 프롬프트: web 로그인 엔드포인트에 20회 반복 요청을 생성(ReqBurst 신호 재현).

    📎 참고 (CLI): for i in $(seq 1 20); do curl -s -o /dev/null -X POST http://10.20.30.80:3000/rest/user/login
    -H ''Content-Type: application/json'' -d ''{"email":"a''$i''@x","password":"x"}'';
    done; echo burst_done'
  answer_detail: 20회 짧은 간격 요청. 에이전트 ReqBurst 지문 핵심 패턴.
