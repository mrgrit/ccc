      intent: ReqBurst 신호 재현 — for i in 1..20; do curl /login; done 20회 반복 로그인 시도.
        짧은 시간 대량 요청 = burst 신호. agent/자동화 도구 특유
      success_criteria:
      - 20 반복 요청
      - 로그인 엔드포인트
