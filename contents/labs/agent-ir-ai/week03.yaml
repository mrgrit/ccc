  answer: '🤖 프롬프트: web access.log에서 같은 IP의 HTTP 상태 코드 분포를 IP별로 집계(ReqBurst 측정 근거).

    📎 참고 (CLI): sudo tail -200 /var/log/apache2/access.log | awk ''{c[$1"_"$9]++}
    END{for(k in c) print k, c[k]}'' | sort -rn -k2 | head -10'
  answer_detail: IP별 코드 분포. 20+ 4xx가 한 IP에 몰리면 정찰 지문.
