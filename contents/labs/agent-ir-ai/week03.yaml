lab_id: agent-ir-ai-week03
title: 초지능 정찰 — 방어 관점 신호 수집 (AI 지원)
version: ai
course: agent-ir-ai
week: 3
description: 에이전트 정찰의 전형적 신호 5원자(ReqBurst·FailSeq·FingerQuery·ToolMix·SessionSilence)를
  재현·계측한다. AI SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 에이전트 스타일의 정찰 트래픽을 생성한다
- 5원자 각각의 측정 지표를 스크립트로 구현한다
- ATT&CK Reconnaissance(TA0043) 기법에 로그를 매핑한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web 타깃의 /robots.txt · /sitemap.xml · /api/ 응답을 하나씩 확인(정찰 초기 패턴 재현).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 9
  answer: '🤖 프롬프트: web 타깃의 /robots.txt · /sitemap.xml · /api/ 응답을 하나씩 확인(정찰 초기 패턴
    재현).

    📎 참고 (CLI): for p in /robots.txt /sitemap.xml /api/; do curl -s -o /dev/null -w
    ''%{http_code} %{url_effective}\n'' http://10.20.30.80$p; done'
  answer_detail: 정보 수집형 요청 3종. 응답 코드 분포 기록.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: 정찰 초기 패턴 재현 — curl /robots.txt + /sitemap.xml + /api/ 순차 접근. 각 응답 코드·크기
        확인. 자동 정찰 도구의 전형적 첫 방문 경로. 방어자는 이를 통해 정찰 시작 지점 파악
      success_criteria:
      - 3 경로 순차 curl
      - robots/sitemap/api
      acceptable_methods:
      - curl + head
      - wget --spider
      negative_signs:
      - 1-2 경로만
      - 응답 확인 없음
  target_vm: bastion
  script: for p in /robots.txt /sitemap.xml /api/; do curl -s -o /dev/null -w '%{http_code}
    %{url_effective}\n' http://10.20.30.80$p; done
  risk_level: low
  bastion_prompt: 'web 타깃의 /robots.txt · /sitemap.xml · /api/ 응답을 하나씩 확인(정찰 초기 패턴
    재현).


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
