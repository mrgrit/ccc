        -rn. 같은 IP 의 HTTP 응답 분포로 ReqBurst 측정 근거. 정상 유저는 200 위주, 정찰은 404/403 대량
      success_criteria:
      - IP + status 조합 집계
      - ReqBurst 측정
      acceptable_methods:
      - awk + sort uniq -c
      - python pandas
      negative_signs:
      - IP 또는 status 한쪽만
      - 분포 해석 없음
  target_vm: web
  script: sudo tail -200 /var/log/apache2/access.log | awk '{c[$1"_"$9]++} END{for(k
    in c) print k, c[k]}' | sort -rn -k2 | head -10
  risk_level: low
  bastion_prompt: web access.log에서 같은 IP의 HTTP 상태 코드 분포를 IP별로 집계(ReqBurst 측정 근거).
