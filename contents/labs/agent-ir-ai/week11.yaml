lab_id: agent-ir-ai-week11
title: Purple Round 1 — Claude Code 코치 + Bastion 업그레이드 (AI 지원)
version: ai
course: agent-ir-ai
week: 11
description: w1~w10 결과를 종합해 첫 Purple Round을 실행하고, 코치 출력을 Bastion skill/playbook에 실제 반영한다. AI SubAgent가
  자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- Round의 5단계를 시간 내 완결한다
- 놓친 사건을 A/B/C/D로 분류한다
- 코치 출력 중 *선택한 것만* Bastion 자산으로 변환한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Round 초기 Bastion 자산 스냅샷.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: Round 초기 Bastion 자산 스냅샷.

    📎 참고 (CLI): ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ ~/ccc/data/bastion/experience/ 2>/dev/null
    | tee ~/ccc/artifacts/w11-round1/pre-snapshot.txt | head'
  answer_detail: Round 전 자산 목록. After와 diff를 낸다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: Round 초기 Bastion 자산 스냅샷 — /tmp/round1_snapshot.json 에 playbooks count + skills count + rules
        count + last_update. Round 시작 전 baseline. 변화 측정 기준점
      success_criteria:
      - /tmp/round1_snapshot.json
      - 자산 카운트 필드
      acceptable_methods:
      - jq + API
      - python json
      negative_signs:
      - JSON 아님
  target_vm: bastion
  script: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ ~/ccc/data/bastion/experience/ 2>/dev/null | tee
    ~/ccc/artifacts/w11-round1/pre-snapshot.txt | head
  risk_level: low
  bastion_prompt: Round 초기 Bastion 자산 스냅샷.
