lab_id: agent-ir-ai-week08
title: 중간평가 — Blue IR CTF (AI 지원)
version: ai
course: agent-ir-ai
week: 8
description: 주어진 번들의 아티팩트로부터 타임라인·에이전트 점수·ATT&CK 매핑·방어 3층 판정·차단 권고·Bastion 스킬을 도출한다.
  AI SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 불완전한 아티팩트에서 공격 시나리오를 재구성한다
- SMART 기준의 스킬 명세를 작성한다
- 채점 루브릭 점수 산출과 자기 평가를 수행한다
pass_threshold: 0.6
