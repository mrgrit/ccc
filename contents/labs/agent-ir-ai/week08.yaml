      success_criteria:
      - scapy + timestamp + IAT 평균
      - python 함수
      acceptable_methods:
      - scapy rdpcap
      - tshark -T fields -e frame.time_relative
      negative_signs:
      - IAT 개념 없음
      - pcap 미사용
  target_vm: bastion
  script: 'cat > ~/ccc/scripts/pcap_iat.sh <<''S''

    #!/bin/bash

    f=${1:-/tmp/sample.pcap}

