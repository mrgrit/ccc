- order: 3
  instruction: pcap 파일 IAT 평균 계산 함수 준비.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: '🤖 프롬프트: pcap 파일 IAT 평균 계산 함수 준비.

    📎 참고 (CLI): cat > ~/ccc/scripts/pcap_iat.sh <<''S''

    #!/bin/bash

    f=${1:-/tmp/sample.pcap}

    [ -f $f ] || { echo file_missing; exit 1; }

    tshark -r $f -Y ''http.request'' -T fields -e frame.time_epoch 2>/dev/null | awk
    ''NR>1{print $1-p} {p=$1}'' | awk ''{sum+=$1;n++} END{if(n) print "iat_avg", sum/n}''

    S

    chmod +x ~/ccc/scripts/pcap_iat.sh && echo script_ready'
  answer_detail: pcap IAT 분석 도구 준비. CTF 분석에 활용.
