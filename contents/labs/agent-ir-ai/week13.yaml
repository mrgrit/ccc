lab_id: agent-ir-ai-week13
title: 사고 보고서 — 에이전트 IR 특수 섹션 (AI 지원)
version: ai
course: agent-ir-ai
week: 13
description: 전통 NIST SP 800-61 IR 보고서에 모델·프롬프트·Transient Tool·의사결정 로그 섹션을 추가한 에이전트 IR 보고서 템플릿을 완성한다. AI
  SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 보고서의 9개 섹션을 본인 Round 결과로 채운다
- 의사결정 로그 마스킹을 실제 샘플에 적용한다
- 해시 봉인·오프사이트 복제 절차를 실행한다
pass_threshold: 0.6
steps:
