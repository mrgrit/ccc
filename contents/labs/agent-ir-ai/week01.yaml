    -Iseconds)''"}'' > ~/ccc/data/bastion/experience/w01-baseline.json && cat ~/ccc/data/bastion/experience/w01-baseline.json'
  answer_detail: Bastion Experience의 첫 엔트리. w11 Purple에서 이 기록부터 공격 결과까지 연속된 스토리로 묶인다.
  verify:
    type: output_contains
    expect: observation_started
    field: stdout
    semantic:
      intent: bastion experience JSON 첫 엔트리 — artifacts/w01/experience/w01-baseline.json
        에 timestamp + week + baseline + services_checked + alerts_count 구조화 저장. 관전
        기록 체계 시작. agent IR 의 memory 기반
      success_criteria:
      - artifacts/w01/experience/w01-baseline.json 생성
      - JSON 구조 (week/baseline/status)
      acceptable_methods:
      - cat > file + echo + jq validate
