  points: 12
  answer: "\U0001F916 프롬프트: 부작용 점수 계산.\n\U0001F4CE 참고 (CLI): cat > ~/ccc/scripts/side_effect.py <<'PY'\ndef side_effect_score(cluster):\n    fp = sum(1 for e in cluster if e.get('fp_flag'))\n    slow = sum(1 for e in cluster if e.get('elapsed_s',0) > 10)\n    canary = sum(1 for e in cluster if e.get('hit_canary'))\n    tot = len(cluster) or 1\n    return (fp*3 + slow + canary*5) / tot\ntest = [{'fp_flag':True},{'elapsed_s':15},{'hit_canary':True}]\nprint('side_effect', side_effect_score(test))  # (3+1+5)/3\nPY\npython3 ~/ccc/scripts/side_effect.py"
  answer_detail: 부작용 누적 임계. <0.3이면 승격 가능.
