lab_id: agent-ir-ai-week12
title: Purple Round 2 — Experience → Playbook 자동 승격 (AI 지원)
version: ai
course: agent-ir-ai
week: 12
description: 반복 Experience를 클러스터링해 Playbook 후보로 자동 승격하는 파이프라인을 구현한다. AI SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- bastion_promote.py를 실제 Experience 데이터에 적용한다
- Shadow mode·Canary 트래픽·롤백 3중 안전장치를 설계한다
- 승격된 Playbook의 24시간 관찰 계획을 만든다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 Experience 파일 목록·개수.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: 현재 Experience 파일 목록·개수.

    📎 참고 (CLI): ls ~/ccc/data/bastion/experience/*.json 2>/dev/null | wc -l && ls ~/ccc/data/bastion/experience/ | head'
  answer_detail: 클러스터링 입력 데이터셋 점검.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: bastion
  script: ls ~/ccc/data/bastion/experience/*.json 2>/dev/null | wc -l && ls ~/ccc/data/bastion/experience/ | head
  risk_level: low
  bastion_prompt: 현재 Experience 파일 목록·개수.
- order: 2
  instruction: 클러스터링 스크립트 작성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: 클러스터링 스크립트 작성.\n\U0001F4CE 참고 (CLI): cat > ~/ccc/scripts/bastion_promote.py <<'PY'\nimport json, glob, collections\nbuckets = collections.defaultdict(list)\nfor f in glob.glob('$HOME/ccc/data/bastion/experience/*.json'.replace('$HOME', __import__('os').path.expanduser('~'))):\n    try:\n        data = open(f).read().strip()\n        # single-line or multi-line JSON\n        for line in data.splitlines() if '\\n' in data else [data]:\n            if not line.strip(): continue\n            e = json.loads(line)\n            key = e.get('skill') or e.get('id','-')\n            buckets[key].append(e)\n    except Exception as ex:\n        print('skip', f, ex)\nprint('clusters:')\nfor k,v in buckets.items():\n    print(' ', k, len(v))\nPY\npython3 ~/ccc/scripts/bastion_promote.py"
  answer_detail: 현재 Experience를 skill 키로 그룹화. 반복 나타나는 skill이 승격 후보.
  verify:
    type: output_contains
    expect: clusters
    field: stdout
  target_vm: bastion
  script: "cat > ~/ccc/scripts/bastion_promote.py <<'PY'\nimport json, glob, collections\nbuckets = collections.defaultdict(list)\nfor f in glob.glob('$HOME/ccc/data/bastion/experience/*.json'.replace('$HOME', __import__('os').path.expanduser('~'))):\n    try:\n        data = open(f).read().strip()\n        # single-line or multi-line JSON\n        for line in data.splitlines() if '\\n' in data else [data]:\n            if not line.strip(): continue\n            e = json.loads(line)\n            key = e.get('skill') or e.get('id','-')\n            buckets[key].append(e)\n    except Exception as ex:\n        print('skip', f, ex)\nprint('clusters:')\nfor k,v in buckets.items():\n    print(' ', k, len(v))\nPY\npython3 ~/ccc/scripts/bastion_promote.py"
  risk_level: low
  bastion_prompt: 클러스터링 스크립트 작성.
- order: 3
