  hint: 리눅스 기본 명령과 실습 호스트 IP를 참고하라
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Canary 트래픽 계획 노트

    📎 참고 (CLI): cat > ~/ccc/skills/canary.md <<''MD''

