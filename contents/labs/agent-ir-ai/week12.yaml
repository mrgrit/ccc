  category: analysis
  points: 11
  answer: "\U0001F916 프롬프트: 승격 점수 계산 함수.\n\U0001F4CE 참고 (CLI): cat > ~/ccc/scripts/promotion_score.py <<'PY'\ndef promotion_score(cluster):\n    succ = sum(1 for e in cluster if e.get('outcome') == 'success')\n    return succ/len(cluster) if cluster else 0\nsample = [{'outcome':'success'}]*8 + [{'outcome':'fail'}]*2\nprint('score', promotion_score(sample))  # 0.8\nPY\npython3 ~/ccc/scripts/promotion_score.py"
  answer_detail: 성공률. 0.8+ && 5건+이 승격 조건.
  verify:
    type: output_contains
    expect: '0.8'
    field: stdout
  target_vm: bastion
  script: "cat > ~/ccc/scripts/promotion_score.py <<'PY'\ndef promotion_score(cluster):\n    succ = sum(1 for e in cluster if e.get('outcome') == 'success')\n    return succ/len(cluster) if cluster else 0\nsample = [{'outcome':'success'}]*8 + [{'outcome':'fail'}]*2\nprint('score', promotion_score(sample))  # 0.8\nPY\npython3 ~/ccc/scripts/promotion_score.py"
