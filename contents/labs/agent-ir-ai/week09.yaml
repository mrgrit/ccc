lab_id: agent-ir-ai-week09
title: 탐지 룰 엔지니어링 — SIGMA → Wazuh (AI 지원)
version: ai
course: agent-ir-ai
week: 9
description: w8에서 설계한 스킬을 SIGMA 룰로 변환해 Wazuh에 적용하고 회귀 테스트까지 실행한다. AI SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- SIGMA 룰 1건을 작성해 Wazuh XML로 수동 변환한다
- wazuh-logtest로 룰 동작을 Phase 3 수준까지 검증한다
- 회귀 데이터셋에 대한 정밀도·재현율을 측정한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM의 현재 local_rules.xml 백업.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: siem VM의 현재 local_rules.xml 백업.

    📎 참고 (CLI): sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/local_rules.xml.bak && ls -la /tmp/local_rules.xml.bak'
  answer_detail: 수정 전 원본 보존. 롤백용.
  verify:
    type: output_contains
    expect: local_rules.xml.bak
    field: stdout
    semantic:
      intent: Wazuh local_rules.xml 백업 — sudo cp /var/ossec/etc/rules/local_rules.xml /var/ossec/etc/rules/local_rules.xml.$(date
        +%s).bak. 룰 변경 전 rollback 준비. 운영 안전
      success_criteria:
      - cp 백업 + timestamp 파일명
      acceptable_methods:
      - cp + date
      negative_signs:
      - 백업 없이 수정
  target_vm: siem
  script: sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/local_rules.xml.bak && ls -la /tmp/local_rules.xml.bak
  risk_level: low
  bastion_prompt: siem VM의 현재 local_rules.xml 백업.
- order: 2
  instruction: SIGMA 룰 초안 작성.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: SIGMA 룰 초안 작성.\n\U0001F4CE 참고 (CLI): mkdir -p ~/sigma && cat > ~/sigma/agent_burst.yml\
    \ <<'Y'\ntitle: Agent-like request burst on JuiceShop\nstatus: experimental\nlogsource:\n  product:\
    \ apache\n  service: access\ndetection:\n  selection:\n    cs-uri-stem|contains:\n      - \"/rest/\"\
    \n  timeframe: 120s\n  condition: selection | count() by c-ip > 60\nfalsepositives:\n  - 내부 모니터링 bots\n\
    level: medium\nY\ncat ~/sigma/agent_burst.yml"
  answer_detail: SIGMA 구조. timeframe·count·falsepositives 필수.
  verify:
    type: output_contains
    expect:
    - Agent-like
    - 템플릿
    field: stdout
    semantic:
      intent: 'Sigma 룰 초안 /tmp/sigma_rule.yml — title/logsource(apache)/detection.selection.cs-uri-stem|contains:
        [/admin, /.git]/condition:selection 포맷. SIEM 독립 룰'
      success_criteria:
      - Sigma YAML
      - detection 섹션
      - condition
      acceptable_methods:
      - Sigma spec YAML
      negative_signs:
      - Sigma 아님
  target_vm: siem
  script: "mkdir -p ~/sigma && cat > ~/sigma/agent_burst.yml <<'Y'\ntitle: Agent-like request burst on\
    \ JuiceShop\nstatus: experimental\nlogsource:\n  product: apache\n  service: access\ndetection:\n\
    \  selection:\n    cs-uri-stem|contains:\n      - \"/rest/\"\n  timeframe: 120s\n  condition: selection\
    \ | count() by c-ip > 60\nfalsepositives:\n  - 내부 모니터링 bots\nlevel: medium\nY\ncat ~/sigma/agent_burst.yml"
  risk_level: low
  bastion_prompt: SIGMA 룰 초안 작성.
- order: 3
  instruction: Wazuh 룰로 *수동* 변환해 local_rules.xml에 추가.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: "\U0001F916 프롬프트: Wazuh 룰로 *수동* 변환해 local_rules.xml에 추가.\n\U0001F4CE 참고 (CLI): sudo bash -c\
    \ \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n\n<group name=\\\"agent_ir\\\">\n  <rule id=\\\
    \"100110\\\" level=\\\"5\\\">\n    <if_sid>31108</if_sid>\n    <description>Apache access /rest/ endpoint</description>\n\
    \  </rule>\n  <rule id=\\\"100111\\\" level=\\\"10\\\" frequency=\\\"60\\\" timeframe=\\\"120\\\"\
    >\n    <if_matched_sid>100110</if_matched_sid>\n    <same_source_ip/>\n    <description>Agent-like\
    \ burst (60+/120s on /rest/)</description>\n    <mitre><id>T1595.002</id></mitre>\n  </rule>\n</group>\n\
    X\"\nsudo tail -20 /var/ossec/etc/rules/local_rules.xml"
  answer_detail: SIGMA → Wazuh 수동 변환. `if_matched_sid`·`frequency`·`timeframe` 사용.
  verify:
    type: output_contains
    expect: agent_ir
    field: stdout
    semantic:
      intent: Sigma → Wazuh 수동 변환 — <rule id=100200 level=10> <if_sid>31100</if_sid> <url>/admin|/.git</url>
        <description>Agent probe</description> 형식으로 local_rules.xml 에 추가. sigmac 자동 대안 수동 작성
      success_criteria:
      - Wazuh <rule> XML 문법
      - sid + level + url + description
      - local_rules.xml 추가
      acceptable_methods:
      - vi/echo + 수동 XML
      - sigmac -t wazuh
      negative_signs:
      - Wazuh 포맷 아님
      - 파일 미추가
  target_vm: siem
  script: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n\n<group name=\\\"agent_ir\\\
    \">\n  <rule id=\\\"100110\\\" level=\\\"5\\\">\n    <if_sid>31108</if_sid>\n    <description>Apache\
    \ access /rest/ endpoint</description>\n  </rule>\n  <rule id=\\\"100111\\\" level=\\\"10\\\" frequency=\\\
    \"60\\\" timeframe=\\\"120\\\">\n    <if_matched_sid>100110</if_matched_sid>\n    <same_source_ip/>\n\
    \    <description>Agent-like burst (60+/120s on /rest/)</description>\n    <mitre><id>T1595.002</id></mitre>\n\
    \  </rule>\n</group>\nX\"\nsudo tail -20 /var/ossec/etc/rules/local_rules.xml"
  risk_level: low
  bastion_prompt: Wazuh 룰로 *수동* 변환해 local_rules.xml에 추가.
- order: 4
