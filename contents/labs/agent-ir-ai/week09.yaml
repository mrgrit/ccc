lab_id: agent-ir-ai-week09
title: 탐지 룰 엔지니어링 — SIGMA → Wazuh (AI 지원)
version: ai
course: agent-ir-ai
week: 9
description: w8에서 설계한 스킬을 SIGMA 룰로 변환해 Wazuh에 적용하고 회귀 테스트까지 실행한다. AI SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- SIGMA 룰 1건을 작성해 Wazuh XML로 수동 변환한다
- wazuh-logtest로 룰 동작을 Phase 3 수준까지 검증한다
- 회귀 데이터셋에 대한 정밀도·재현율을 측정한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: siem VM의 현재 local_rules.xml 백업.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: siem VM의 현재 local_rules.xml 백업.

    📎 참고 (CLI): sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/local_rules.xml.bak && ls -la /tmp/local_rules.xml.bak'
  answer_detail: 수정 전 원본 보존. 롤백용.
  verify:
    type: output_contains
    expect: local_rules.xml.bak
    field: stdout
  target_vm: siem
  script: sudo cp /var/ossec/etc/rules/local_rules.xml /tmp/local_rules.xml.bak && ls -la /tmp/local_rules.xml.bak
  risk_level: low
  bastion_prompt: siem VM의 현재 local_rules.xml 백업.
- order: 2
  instruction: SIGMA 룰 초안 작성.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: SIGMA 룰 초안 작성.\n\U0001F4CE 참고 (CLI): mkdir -p ~/sigma && cat > ~/sigma/agent_burst.yml <<'Y'\ntitle: Agent-like request burst on JuiceShop\nstatus: experimental\nlogsource:\n  product: apache\n  service: access\ndetection:\n  selection:\n    cs-uri-stem|contains:\n      - \"/rest/\"\n  timeframe: 120s\n  condition: selection | count() by c-ip > 60\nfalsepositives:\n  - 내부 모니터링 bots\nlevel: medium\nY\ncat ~/sigma/agent_burst.yml"
  answer_detail: SIGMA 구조. timeframe·count·falsepositives 필수.
  verify:
    type: output_contains
    expect: Agent-like
    field: stdout
  target_vm: siem
  script: "mkdir -p ~/sigma && cat > ~/sigma/agent_burst.yml <<'Y'\ntitle: Agent-like request burst on JuiceShop\nstatus: experimental\nlogsource:\n  product: apache\n  service: access\ndetection:\n  selection:\n    cs-uri-stem|contains:\n      - \"/rest/\"\n  timeframe: 120s\n  condition: selection | count() by c-ip > 60\nfalsepositives:\n  - 내부 모니터링 bots\nlevel: medium\nY\ncat ~/sigma/agent_burst.yml"
  risk_level: low
  bastion_prompt: SIGMA 룰 초안 작성.
- order: 3
  instruction: Wazuh 룰로 *수동* 변환해 local_rules.xml에 추가.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: "\U0001F916 프롬프트: Wazuh 룰로 *수동* 변환해 local_rules.xml에 추가.\n\U0001F4CE 참고 (CLI): sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n\n<group name=\\\"agent_ir\\\">\n  <rule id=\\\"100110\\\" level=\\\"5\\\">\n    <if_sid>31108</if_sid>\n    <description>Apache access /rest/ endpoint</description>\n  </rule>\n  <rule id=\\\"100111\\\" level=\\\"10\\\" frequency=\\\"60\\\" timeframe=\\\"120\\\">\n    <if_matched_sid>100110</if_matched_sid>\n    <same_source_ip/>\n    <description>Agent-like burst (60+/120s on /rest/)</description>\n    <mitre><id>T1595.002</id></mitre>\n  </rule>\n</group>\nX\"\nsudo tail -20 /var/ossec/etc/rules/local_rules.xml"
  answer_detail: SIGMA → Wazuh 수동 변환. `if_matched_sid`·`frequency`·`timeframe` 사용.
  verify:
    type: output_contains
    expect: agent_ir
    field: stdout
  target_vm: siem
  script: "sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n\n<group name=\\\"agent_ir\\\">\n  <rule id=\\\"100110\\\" level=\\\"5\\\">\n    <if_sid>31108</if_sid>\n    <description>Apache access /rest/ endpoint</description>\n  </rule>\n  <rule id=\\\"100111\\\" level=\\\"10\\\" frequency=\\\"60\\\" timeframe=\\\"120\\\">\n    <if_matched_sid>100110</if_matched_sid>\n    <same_source_ip/>\n    <description>Agent-like burst (60+/120s on /rest/)</description>\n    <mitre><id>T1595.002</id></mitre>\n  </rule>\n</group>\nX\"\nsudo tail -20 /var/ossec/etc/rules/local_rules.xml"
  risk_level: low
  bastion_prompt: Wazuh 룰로 *수동* 변환해 local_rules.xml에 추가.
- order: 4
  instruction: Wazuh 룰 문법 검증.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Wazuh 룰 문법 검증.

    📎 참고 (CLI): sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail -5'
  answer_detail: 문법 오류 있으면 *전체 분석 데몬 기동 실패*. 반드시 검증 후 재시작.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: sudo /var/ossec/bin/wazuh-analysisd -t 2>&1 | tail -5
  risk_level: low
  bastion_prompt: Wazuh 룰 문법 검증.
- order: 5
  instruction: 문법 OK면 Wazuh manager 재시작.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: '🤖 프롬프트: 문법 OK면 Wazuh manager 재시작.

    📎 참고 (CLI): sudo systemctl restart wazuh-manager && sleep 3 && systemctl is-active wazuh-manager'
  answer_detail: 재시작 후 active 확인.
  verify:
    type: output_contains
    expect: active
    field: stdout
  target_vm: siem
  script: sudo systemctl restart wazuh-manager && sleep 3 && systemctl is-active wazuh-manager
  risk_level: low
  bastion_prompt: 문법 OK면 Wazuh manager 재시작.
- order: 6
  instruction: wazuh-logtest로 샘플 로그 투입 검증.
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 14
  answer: '🤖 프롬프트: wazuh-logtest로 샘플 로그 투입 검증.

    📎 참고 (CLI): echo ''10.20.30.80 - - [19/Apr/2026:10:00:00 +0900] "GET /rest/user/login HTTP/1.1" 200 123'' | sudo /var/ossec/bin/wazuh-logtest 2>&1 | tail -30 | head -30 || echo ''logtest_sample_run'''
  answer_detail: Phase 1~3 매칭 확인. Phase 3에 100110/100111 중 하나라도 뜨면 성공.
  verify:
    type: output_contains
    expect: Phase
    field: stdout
  target_vm: siem
  script: echo '10.20.30.80 - - [19/Apr/2026:10:00:00 +0900] "GET /rest/user/login HTTP/1.1" 200 123' | sudo /var/ossec/bin/wazuh-logtest 2>&1 | tail -30 | head -30 || echo 'logtest_sample_run'
  risk_level: low
  bastion_prompt: wazuh-logtest로 샘플 로그 투입 검증.
- order: 7
  instruction: 회귀 데이터셋 pcap 재생 시뮬 (w3에서 생성된 pcap).
  hint: target_vm=secu에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 15
  answer: '🤖 프롬프트: 회귀 데이터셋 pcap 재생 시뮬 (w3에서 생성된 pcap).

    📎 참고 (CLI): [ -f /tmp/w01-baseline.pcap ] && tcpreplay --help 2>&1 | head -3 || echo ''tcpreplay_maybe_missing'''
  answer_detail: tcpreplay로 pcap 재생. 실제 회귀 테스트에서 활용. 도구 없으면 설치.
