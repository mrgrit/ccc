  answer: "\U0001F916 프롬프트: 탐지 지연 측정 스크립트.\n\U0001F4CE 참고 (CLI): cat > ~/ccc/scripts/latency.py <<'PY'\ndef latency(attack_ts, alert_ts):\n    return (alert_ts - attack_ts).total_seconds()\nprint('목표 p50 <= 10s')\nPY\npython3 ~/ccc/scripts/latency.py"
