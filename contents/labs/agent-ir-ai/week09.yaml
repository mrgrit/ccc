    expect: ''
    field: stdout
  target_vm: secu
  script: '[ -f /tmp/w01-baseline.pcap ] && tcpreplay --help 2>&1 | head -3 || echo ''tcpreplay_maybe_missing'''
  risk_level: medium
  bastion_prompt: 회귀 데이터셋 pcap 재생 시뮬 (w3에서 생성된 pcap).
- order: 8
  instruction: 정밀도·재현율 계산 스크립트.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 16
  answer: "\U0001F916 프롬프트: 정밀도·재현율 계산 스크립트.\n\U0001F4CE 참고 (CLI): cat > ~/ccc/scripts/metrics.py <<'PY'\ndef metrics(tp, fp, fn):\n    p = tp/(tp+fp) if (tp+fp) else 0\n    r = tp/(tp+fn) if (tp+fn) else 0\n    return p, r\nprint('precision,recall', metrics(18, 2, 5))\nPY\npython3 ~/ccc/scripts/metrics.py"
  answer_detail: P = TP/(TP+FP), R = TP/(TP+FN). 목표 P>=0.9, R>=0.7.
  verify:
    type: output_contains
    expect: precision
    field: stdout
  target_vm: bastion
