    field: stdout
    semantic:
      intent: Bastion Skill YAML 명세 detect_internal_scan — name + description + trigger(internal
        ICMP rate > 10/min) + action(alert + log) + owner. Bastion skill 정의 포맷. 내부
        스캔 자동 탐지 rule
      success_criteria:
