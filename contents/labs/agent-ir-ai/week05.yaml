  category: analysis
  points: 16
  answer: "\U0001F916 프롬프트: Bastion Skill YAML 명세 초안 작성 (`detect_internal_scan`).\n\
    \U0001F4CE 참고 (CLI): mkdir -p ~/ccc/skills && cat > ~/ccc/skills/detect_internal_scan.yaml\
