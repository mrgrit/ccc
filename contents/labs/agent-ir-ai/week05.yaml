lab_id: agent-ir-ai-week05
title: 측면이동·지속성 — 내부 행위 감시 (AI 지원)
version: ai
course: agent-ir-ai
week: 5
description: 에이전트 측면이동의 네트워크·호스트 지문을 재현·수집하고, Bastion 스킬로 연결하는 준비를 완성한다. AI SubAgent가
  자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- ARP·라우팅·내부 스캔 패턴을 수집한다
- 지속성 메커니즘(SSH 키·cron·systemd) 생성 이벤트를 감시한다
- Bastion `detect_internal_scan` 스킬의 실제 YAML 명세를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web에서 ARP 테이블·라우팅을 조회(측면이동 초기 정찰 시뮬).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 9
  answer: '🤖 프롬프트: web에서 ARP 테이블·라우팅을 조회(측면이동 초기 정찰 시뮬).

    📎 참고 (CLI): ip neigh show && echo --- && ip route'
  answer_detail: 에이전트가 내부 대역 구조 파악 시 보는 정보. *정상 관리 활동*과 구분이 어렵다는 점을 체험.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  script: ip neigh show && echo --- && ip route
  risk_level: low
  bastion_prompt: web에서 ARP 테이블·라우팅을 조회(측면이동 초기 정찰 시뮬).
- order: 2
  instruction: web에서 내부 호스트 4대 ICMP 응답 확인.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: web에서 내부 호스트 4대 ICMP 응답 확인.

    📎 참고 (CLI): for h in 1 80 100 201; do ping -c 1 -W 1 10.20.30.$h > /dev/null 2>&1
    && echo 10.20.30.$h UP || echo 10.20.30.$h DOWN; done'
  answer_detail: 4대 내부 도달 가능성. 에이전트가 ping sweep으로 시작하는 전형.
  verify:
    type: output_contains
    expect: UP
    field: stdout
  target_vm: web
  script: for h in 1 80 100 201; do ping -c 1 -W 1 10.20.30.$h > /dev/null 2>&1 &&
    echo 10.20.30.$h UP || echo 10.20.30.$h DOWN; done
  risk_level: low
  bastion_prompt: web에서 내부 호스트 4대 ICMP 응답 확인.
- order: 3
  instruction: secu에서 최근 내부→내부 SSH 시도를 auth.log로 확인.
  hint: target_vm=secu에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: '🤖 프롬프트: secu에서 최근 내부→내부 SSH 시도를 auth.log로 확인.

    📎 참고 (CLI): sudo tail -50 /var/log/auth.log | grep -Ei ''sshd|Failed|Accepted''
    | tail -20'
  answer_detail: 내부 SSH 시도 증거. 정상 관리자 vs 공격자 측면이동 구분은 *소스 IP 화이트리스트*로.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: secu
  script: sudo tail -50 /var/log/auth.log | grep -Ei 'sshd|Failed|Accepted' | tail
    -20
  risk_level: medium
  bastion_prompt: secu에서 최근 내부→내부 SSH 시도를 auth.log로 확인.
- order: 4
  instruction: Wazuh의 SSH 관련 경보 확인 (rule 5700대).
  hint: target_vm=siem에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: Wazuh의 SSH 관련 경보 확인 (rule 5700대).

    📎 참고 (CLI): sudo jq -c ''select(.rule.id | tostring | startswith("57"))'' /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail -3 || echo ''no_recent_ssh_alerts'''
  answer_detail: Wazuh 5700대 룰(SSH). 실제 공격 시 5712(multiple failures)·5720(brute) 급증.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: siem
  script: sudo jq -c 'select(.rule.id | tostring | startswith("57"))' /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail -3 || echo 'no_recent_ssh_alerts'
  risk_level: low
  bastion_prompt: Wazuh의 SSH 관련 경보 확인 (rule 5700대).
- order: 5
  instruction: web에 지속성 시뮬 — authorized_keys 변화 감시 시작.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: '🤖 프롬프트: web에 지속성 시뮬 — authorized_keys 변화 감시 시작.

    📎 참고 (CLI): sudo auditctl -w /home -p wa -k home_write && sudo auditctl -l | grep
    home_write'
  answer_detail: Persistence T1098 감시. 실제 공격 시 ~/.ssh/authorized_keys 추가가 핵심.
  verify:
    type: output_contains
    expect: home_write
    field: stdout
  target_vm: web
  script: sudo auditctl -w /home -p wa -k home_write && sudo auditctl -l | grep home_write
  risk_level: low
  bastion_prompt: web에 지속성 시뮬 — authorized_keys 변화 감시 시작.
- order: 6
  instruction: web에 가짜 persistence 시뮬 — .ssh 디렉토리 생성.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 14
  answer: '🤖 프롬프트: web에 가짜 persistence 시뮬 — .ssh 디렉토리 생성.

    📎 참고 (CLI): mkdir -p ~/.ssh && echo ''# test entry $(date +%s)'' >> ~/.ssh/authorized_keys
    && ls -la ~/.ssh/'
  answer_detail: 의도적으로 authorized_keys 수정 이벤트 발생. auditd 추적 대상.
  verify:
    type: output_contains
    expect: authorized_keys
    field: stdout
  target_vm: web
  script: mkdir -p ~/.ssh && echo '# test entry $(date +%s)' >> ~/.ssh/authorized_keys
    && ls -la ~/.ssh/
  risk_level: low
  bastion_prompt: web에 가짜 persistence 시뮬 — .ssh 디렉토리 생성.
- order: 7
  instruction: auditd로 해당 이벤트 조회.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 15
  answer: '🤖 프롬프트: auditd로 해당 이벤트 조회.

    📎 참고 (CLI): sleep 2 && sudo ausearch -k home_write --start recent 2>/dev/null
    | tail -20 | head -20'
  answer_detail: 이벤트가 감사 로그에 잡혔는지 확인. 이것이 w11 Purple에서 Bastion이 볼 신호.
  verify:
    type: output_contains
    expect: ''
    field: stdout
  target_vm: web
  script: sleep 2 && sudo ausearch -k home_write --start recent 2>/dev/null | tail
    -20 | head -20
  risk_level: low
  bastion_prompt: auditd로 해당 이벤트 조회.
- order: 8
  instruction: Bastion Skill YAML 명세 초안 작성 (`detect_internal_scan`).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 16
  answer: "\U0001F916 프롬프트: Bastion Skill YAML 명세 초안 작성 (`detect_internal_scan`).\n\
    \U0001F4CE 참고 (CLI): mkdir -p ~/ccc/skills && cat > ~/ccc/skills/detect_internal_scan.yaml\
    \ <<'Y'\nskill_id: detect_internal_scan\nversion: 0.1\npurpose: 내부 대역 10.20.30.0/24\
    \ 내에서 측면이동 정찰 탐지\ninputs:\n  - source: secu_tcpdump\n    window_sec: 300\nlogic:\n\
    \  - aggregate by (src_ip, dst_ip, dst_port)\n  - count distinct dst_ip per src,\
    \ distinct dst_port per src\nthresholds:\n  distinct_dst: 3\n  distinct_port:\
    \ 20\nexceptions:\n  - src_ip_in: admin_whitelist.source_ips\noutputs:\n  alert_level:\
    \ 10\n  actions: [tar_pit_10m, wazuh_alert]\nfailure_mode:\n  false_positive_mitigation:\
    \ shadow_mode_24h\nY\ncat ~/ccc/skills/detect_internal_scan.yaml"
  answer_detail: w11 Purple에서 Bastion에 *실제로 등록*될 스킬 명세. 임계값의 근거가 이 주차의 관찰 데이터.
  verify:
    type: output_contains
    expect: detect_internal_scan
    field: stdout
  target_vm: bastion
  script: "mkdir -p ~/ccc/skills && cat > ~/ccc/skills/detect_internal_scan.yaml <<'Y'\n\
    skill_id: detect_internal_scan\nversion: 0.1\npurpose: 내부 대역 10.20.30.0/24 내에서\
    \ 측면이동 정찰 탐지\ninputs:\n  - source: secu_tcpdump\n    window_sec: 300\nlogic:\n\
    \  - aggregate by (src_ip, dst_ip, dst_port)\n  - count distinct dst_ip per src,\
    \ distinct dst_port per src\nthresholds:\n  distinct_dst: 3\n  distinct_port:\
    \ 20\nexceptions:\n  - src_ip_in: admin_whitelist.source_ips\noutputs:\n  alert_level:\
    \ 10\n  actions: [tar_pit_10m, wazuh_alert]\nfailure_mode:\n  false_positive_mitigation:\
    \ shadow_mode_24h\nY\ncat ~/ccc/skills/detect_internal_scan.yaml"
  risk_level: low
  bastion_prompt: Bastion Skill YAML 명세 초안 작성 (`detect_internal_scan`).
- order: 9
  instruction: Bastion Skill 명세 리뷰 체크리스트 문서 작성.
