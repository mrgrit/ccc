  bastion_prompt: Bastion Skill 명세 리뷰 체크리스트 문서 작성.
- order: 10
  instruction: admin_whitelist.yaml 샘플 작성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 18
  answer: "\U0001F916 프롬프트: admin_whitelist.yaml 샘플 작성.\n\U0001F4CE 참고 (CLI): mkdir\
