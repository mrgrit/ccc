        <description>Honey access</description>. level 12 = critical. 즉시 경보 + ticket
      success_criteria:
      - rule id=100300 추가
      - /admin-old URL 매칭
      - level 12
      acceptable_methods:
      - vi local_rules.xml + id 100300
      negative_signs:
