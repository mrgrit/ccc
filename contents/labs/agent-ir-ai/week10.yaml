  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: '🤖 프롬프트: curl로 허니 페이지 접근 테스트.

    📎 참고 (CLI): curl -s http://10.20.30.80/admin-portal | head -5'
  answer_detail: 정상 응답 확인. access.log에 기록됨.
  verify:
    type: output_contains
