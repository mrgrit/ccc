lab_id: agent-ir-ai-week10
title: 기만·지연 — 허니토큰과 tar-pit (AI 지원)
version: ai
course: agent-ir-ai
week: 10
description: 정상 트래픽에 투명하지만 에이전트에겐 *토큰 비용*을 큰 폭으로 증가시키는 기만·지연 방어를 구축한다. AI SubAgent가
  자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 허니 자산을 web에 배포하고 Wazuh 고신뢰 룰로 연결한다
- Nginx tar-pit 설정을 단계적으로 적용한다
- 공격자 ROI 계산 수식을 이해하고 예제로 계산한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 가짜 관리자 페이지 배포.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: 가짜 관리자 페이지 배포.

    📎 참고 (CLI): sudo bash -c ''cat > /var/www/html/fake_admin.html <<H

    <!DOCTYPE html>

    <html><body><h1>Internal Admin Console</h1>

    <!-- API_KEY=HONEY_87af3b1c_DO_NOT_REMOVE -->

    <form>...</form>

    </body></html>

    H'' && ls -la /var/www/html/fake_admin.html'
  answer_detail: 허니 페이지. 주석에 허니 토큰 포함 — 이 값이 어디선가 재관측되면 확정 공격.
  verify:
    type: output_contains
    expect:
    - fake_admin.html
    - AdminPanel
    field: stdout
    semantic:
      intent: 가짜 관리자 페이지 배포 — /var/www/html/admin-old/ 에 honey page 배포. 실제 admin 과
        유사한 login form + session 쿠키 발급 (로깅만, 실기능 없음). 공격자 유인용 허니팟
      success_criteria:
      - /var/www/html/admin-old/ 배포
      - login form HTML
      - 허니팟 목적
      acceptable_methods:
      - cat > index.html + Apache 노출
      - Flask 미니 앱
      negative_signs:
      - 실제 admin 혼용
      - 허니팟 개념 없음
  target_vm: web
  script: 'sudo bash -c ''cat > /var/www/html/fake_admin.html <<H

    <!DOCTYPE html>

    <html><body><h1>Internal Admin Console</h1>

    <!-- API_KEY=HONEY_87af3b1c_DO_NOT_REMOVE -->

    <form>...</form>

    </body></html>

    H'' && ls -la /var/www/html/fake_admin.html'
  risk_level: low
  bastion_prompt: 가짜 관리자 페이지 배포.
- order: 2
  instruction: Apache alias 추가.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: Apache alias 추가.\n\U0001F4CE 참고 (CLI): sudo bash -c 'cat\
    \ > /etc/apache2/conf-available/honey.conf <<C\nAlias /admin-portal /var/www/html/fake_admin.html\n\
    <Location /admin-portal>\n  Require all granted\n</Location>\nC' && sudo a2enconf\
    \ honey 2>&1 | tail -3 && sudo systemctl reload apache2 2>&1 | tail -3"
  answer_detail: 허니 경로 활성. 실 관리자는 이 경로 존재 여부 *모름* → 접근만으로도 고신뢰.
  verify:
    type: output_contains
    expect:
    - honey
    - /etc/httpd/conf/httpd.conf
    - directory
    field: stdout
    semantic:
      intent: Apache alias /admin-old → honey path — Alias /admin-old /var/www/html/admin-old
        추가 + Directory 블록 설정. URL 경로 매핑으로 honey page 노출
      success_criteria:
      - Alias 지시어
      - Directory 블록
      - apache2ctl graceful
      acceptable_methods:
      - sed 로 conf 추가 + reload
      - a2enconf 모듈
      negative_signs:
      - Alias 없음
      - reload 없음
  target_vm: web
  script: "sudo bash -c 'cat > /etc/apache2/conf-available/honey.conf <<C\nAlias /admin-portal\
    \ /var/www/html/fake_admin.html\n<Location /admin-portal>\n  Require all granted\n\
    </Location>\nC' && sudo a2enconf honey 2>&1 | tail -3 && sudo systemctl reload\
    \ apache2 2>&1 | tail -3"
  risk_level: low
  bastion_prompt: Apache alias 추가.
- order: 3
