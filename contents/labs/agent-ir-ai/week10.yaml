  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: Wazuh 룰 — 허니 접근 경보(rule 100300).\n\U0001F4CE 참고 (CLI):\
    \ sudo bash -c \"cat >> /var/ossec/etc/rules/local_rules.xml <<'X'\n<group name=\\\
