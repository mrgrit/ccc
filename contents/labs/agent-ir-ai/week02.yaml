lab_id: agent-ir-ai-week02
title: 공격자 해부 — Tool-use 루프와 지문 점수 (AI 지원)
version: ai
course: agent-ir-ai
week: 2
description: 에이전트 실행 프로세스를 방어자 관점에서 관찰하는 도구 세트를 구축한다. pstree·strace·tcpdump·auditd를 결합해 *호스트·네트워크 양측*의
  지문을 수집한다. AI SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 에이전트 호스트의 프로세스 트리와 syscall을 관찰한다
- LLM API 호출 패턴(Ollama)의 트래픽 지문을 수집한다
- agent_score 함수의 핵심 지표(IAT·경로 다양성 등)를 구현한다
- 관찰 불가능한 공격자 환경과 관찰 가능한 방어자 환경의 경계를 구분한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: bastion에서 pstree로 ollama 서비스의 프로세스 트리를 표시하시오(에이전트 모델 호출이 이뤄지는 프로세스 관찰 연습).
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: bastion에서 pstree로 ollama 서비스의 프로세스 트리를 표시하시오(에이전트 모델 호출이 이뤄지는 프로세스 관찰 연습).

    📎 참고 (CLI): pstree -p $(pgrep -f ollama | head -1 || echo 1) | head -30'
  answer_detail: 에이전트 프로세스 계보 관찰법 학습. 공격자 환경에선 못 보지만, Bastion 자체의 LLM 호출 패턴을 관찰하는 훈련.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: bastion pstree ollama 프로세스 — pstree -p | grep -A5 ollama 로 ollama 서비스 프로세스 트리 + child threads.
        agent 모델 호출 시 전개되는 프로세스 관찰. 실행 프로세스 lineage
      success_criteria:
      - pstree -p + ollama 필터
      - 프로세스 트리 구조 출력
      acceptable_methods:
      - pstree + grep
      - ps auxf + grep
      negative_signs:
      - 단순 ps
      - ollama 아닌 다른 프로세스
  target_vm: bastion
  script: pstree -p $(pgrep -f ollama | head -1 || echo 1) | head -30
  risk_level: low
  bastion_prompt: bastion에서 pstree로 ollama 서비스의 프로세스 트리를 표시하시오(에이전트 모델 호출이 이뤄지는 프로세스 관찰 연습).
- order: 2
  instruction: bastion에서 `curl -sX POST http://localhost:11434/api/tags`로 Ollama에 로드된 모델 목록을 조회하시오.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 10
  answer: '🤖 프롬프트: bastion에서 `curl -sX POST http://localhost:11434/api/tags`로 Ollama에 로드된 모델 목록을 조회하시오.

    📎 참고 (CLI): curl -s http://localhost:11434/api/tags | python3 -m json.tool | head -30'
  answer_detail: 에이전트가 사용하는 LLM 추론 지점. 모델 이름·버전이 공격 분석에 중요.
  verify:
    type: output_contains
    expect: models
    field: stdout
    semantic:
      intent: 'Ollama /api/tags 모델 목록 — curl -sX POST http://localhost:11434/api/tags | jq .models[].name
