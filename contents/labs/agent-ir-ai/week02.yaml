  risk_level: medium
  bastion_prompt: secu에서 tcpdump로 Ollama API 트래픽(11434 포트)을 30초 캡처하시오.
- order: 5
  instruction: bastion에 agent_score.py 스크립트를 생성해 IAT CoV 계산 함수를 정의하시오.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 13
  answer: "\U0001F916 프롬프트: bastion에 agent_score.py 스크립트를 생성해 IAT CoV 계산 함수를 정의하시오.\n\U0001F4CE 참고 (CLI):\
    \ mkdir -p ~/ccc/scripts && cat > ~/ccc/scripts/agent_score.py <<'PY'\nimport statistics as st\ndef\
    \ iat_cov(times):\n    if len(times) < 2: return 1.0\n    iat = [b-a for a,b in zip(times, times[1:])]\n\
    \    m = st.mean(iat)\n    return st.pstdev(iat)/m if m else 0.0\nprint('iat_cov', iat_cov([1.0, 2.0,\
    \ 3.0, 4.0]))\nPY\npython3 ~/ccc/scripts/agent_score.py"
  answer_detail: 에이전트 지문 1지표. 정상 사용자는 CoV>0.5, 에이전트는 <0.3 경향.
  verify:
    type: output_contains
    expect: iat_cov
    field: stdout
    semantic:
      intent: 'agent_score.py IAT CoV 계산 — bastion 에 Python 스크립트 생성: def iat_cov(timestamps): intervals
        = diff(timestamps); cov = stdev/mean. Inter-Arrival Time 의 Coefficient of Variation 으로 agent 의
        요청 간격 규칙성 측정 (cov 낮으면 botnet-like)'
      success_criteria:
      - agent_score.py 파일 생성
      - IAT CoV 계산 함수
      - stdev/mean 수식
      acceptable_methods:
      - python + statistics
      - numpy std/mean
      negative_signs:
      - 스크립트 미생성
      - CoV 개념 없음
  target_vm: bastion
  script: "mkdir -p ~/ccc/scripts && cat > ~/ccc/scripts/agent_score.py <<'PY'\nimport statistics as st\n\
    def iat_cov(times):\n    if len(times) < 2: return 1.0\n    iat = [b-a for a,b in zip(times, times[1:])]\n\
    \    m = st.mean(iat)\n    return st.pstdev(iat)/m if m else 0.0\nprint('iat_cov', iat_cov([1.0, 2.0,\
    \ 3.0, 4.0]))\nPY\npython3 ~/ccc/scripts/agent_score.py"
  risk_level: low
  bastion_prompt: bastion에 agent_score.py 스크립트를 생성해 IAT CoV 계산 함수를 정의하시오.
