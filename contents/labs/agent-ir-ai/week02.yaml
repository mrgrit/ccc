      - 모델명 누락
  target_vm: bastion
  script: curl -s http://localhost:11434/api/tags | python3 -m json.tool | head -30
  risk_level: low
  bastion_prompt: bastion에서 `curl -sX POST http://localhost:11434/api/tags`로 Ollama에 로드된 모델 목록을 조회하시오.
