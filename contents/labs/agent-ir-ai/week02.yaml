    📎 참고 (CLI): sudo timeout 30 tcpdump -i any -nn -w /tmp/w02-ollama.pcap ''port 11434'' 2>/dev/null;
    ls -la /tmp/w02-ollama.pcap'
  answer_detail: LLM API 호출의 네트워크 지문. 요청 간격·크기가 *에이전트 지문*의 핵심 축.
