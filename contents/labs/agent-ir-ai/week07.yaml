lab_id: agent-ir-ai-week07
title: 규모화 — 다중 에이전트 시뮬레이션 (AI 지원)
version: ai
course: agent-ir-ai
week: 7
description: 3~5개 병렬 요청을 내서 세션 클러스터링·트리아지 우선순위를 직접 적용한다. AI SubAgent가 자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 3개 역할 분할 공격 트래픽을 생성한다
- 세션 클러스터링 알고리즘을 파이썬으로 구현한다
- 경보 트리아지 P0~P3 분류를 실제 데이터에 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 세션 A — 정찰성 요청(3분 내 15경로).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: recon
  points: 9
  answer: '🤖 프롬프트: 세션 A — 정찰성 요청(3분 내 15경로).

    📎 참고 (CLI): for p in / /about /login /admin /api /static/logo.png /robots.txt /sitemap.xml /rest /rest/user
    /rest/products /api/v1 /api/v2 /docs /.well-known; do curl -s -o /dev/null http://10.20.30.80$p; done;
    echo session_A_done'
  answer_detail: 세션 A(정찰) 트래픽. ReqBurst 지문 유발.
  verify:
    type: output_contains
    expect: session_A_done
    field: stdout
    semantic:
      intent: 세션 A 정찰성 요청 — for path in /robots.txt /api /admin /backup ...; do curl -H Session-A ...;
        done 3분 내 15 경로. multi-agent 시뮬레이션 세션 1
      success_criteria:
      - 15 경로 접근
      - 3분 내
      - 세션 A 태그
      acceptable_methods:
      - for + curl + 헤더
      negative_signs:
      - 경로 5 이하
      - 세션 구분 없음
  target_vm: web
  script: for p in / /about /login /admin /api /static/logo.png /robots.txt /sitemap.xml /rest /rest/user
    /rest/products /api/v1 /api/v2 /docs /.well-known; do curl -s -o /dev/null http://10.20.30.80$p; done;
    echo session_A_done
