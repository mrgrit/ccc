      intent: 3세션 타임라인 요약 /tmp/multi_session_timeline.md — Session A/B/C 각각 T+0, T+5, T+10 시작 시각 + 종료
        시각 + peak rate + 전체 겹침 구간 식별. 시각화 기반 분석
      success_criteria:
