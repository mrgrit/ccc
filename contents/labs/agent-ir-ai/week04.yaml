  bastion_prompt: ModSecurity 감사 로그가 있으면 매칭 룰 분포 조사.
- order: 7
  instruction: 1층 방어 — 응답 엔트로피 측정 함수 작성.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 15
  answer: "\U0001F916 프롬프트: 1층 방어 — 응답 엔트로피 측정 함수 작성.\n\U0001F4CE 참고 (CLI): cat >\
    \ ~/ccc/scripts/entropy.py <<'PY'\nimport math\nfrom collections import Counter\n\
    def H(s):\n    if not s: return 0.0\n    c = Counter(s); t = len(s)\n    return\
    \ -sum((f/t)*math.log2(f/t) for f in c.values())\nprint('sample_entropy', H('UNION\
    \ SELECT user,pass FROM users--'))\nPY\npython3 ~/ccc/scripts/entropy.py"
  answer_detail: 1층(메타 판별) 핵심 도구. 페이로드 본문 엔트로피가 점진 변화하는 세션 식별.
  verify:
    type: output_contains
    expect:
    - sample_entropy
    - entropy
    field: stdout
    semantic:
      intent: 응답 엔트로피 측정 — python3 로 response body 문자 빈도 + Shannon entropy 계산. 정상
        HTML entropy ~5.0, error page 낮음, 동적 내용 높음. entropy 급변 = 공격 징후
      success_criteria:
      - python Shannon entropy 함수
      - response body 입력
      - entropy 수치
      acceptable_methods:
      - python math.log2 + Counter
      - scipy.stats.entropy
      negative_signs:
      - 엔트로피 공식 없음
      - 응답 분석 없음
  target_vm: bastion
  script: "cat > ~/ccc/scripts/entropy.py <<'PY'\nimport math\nfrom collections import\
    \ Counter\ndef H(s):\n    if not s: return 0.0\n    c = Counter(s); t = len(s)\n\
    \    return -sum((f/t)*math.log2(f/t) for f in c.values())\nprint('sample_entropy',\
    \ H('UNION SELECT user,pass FROM users--'))\nPY\npython3 ~/ccc/scripts/entropy.py"
  risk_level: low
  bastion_prompt: 1층 방어 — 응답 엔트로피 측정 함수 작성.
