  points: 14
  answer: '🤖 프롬프트: ModSecurity 감사 로그가 있으면 매칭 룰 분포 조사.

    📎 참고 (CLI): sudo tail -50 /var/log/bunkerweb/modsec_audit.log 2>/dev/null | grep
    -oE ''id "[0-9]+"'' | sort | uniq -c | sort -rn | head || echo ''no_modsec_log'''
  answer_detail: 어떤 룰이 얼마나 매칭됐는지. 942xxx (SQLi CRS)가 자주 뜨면 정상.
