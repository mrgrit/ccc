lab_id: agent-ir-ai-week04
title: 자동 익스플로잇 — Transient Tool 아티팩트 (AI 지원)
version: ai
course: agent-ir-ai
week: 4
description: 에이전트가 세션 내 생성한 공격 도구(Transient Tool)의 흔적을 방어자 관점에서 포렌식으로 재구성한다. AI SubAgent가
  자동으로 명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- Transient Tool 생성·진화·폐기를 auditd로 추적한다
- ModSecurity 응답을 비교해 시그니처 공백을 체감한다
- 3층 방어(메타·응답·기만)의 실무 예시를 각각 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: web VM에 auditd로 /tmp 쓰기 감시 룰을 일시적으로 추가.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: web VM에 auditd로 /tmp 쓰기 감시 룰을 일시적으로 추가.

    📎 참고 (CLI): sudo auditctl -w /tmp -p wa -k tmpwrites && sudo auditctl -l | tail
    -5'
  answer_detail: Transient Tool이 /tmp에 생성·수정되는 것을 감시. 실제 운영 환경에서는 *적용 범위*를 좁혀야 부하
    감당 가능.
  verify:
    type: output_contains
    expect:
    - tmpwrites
    - buntu
    - jammy-security
    field: stdout
    semantic:
      intent: web auditd /tmp 쓰기 감시 — sudo auditctl -w /tmp -p w -k tmp_write 로 write
        이벤트만 감시. Transient Tool 아티팩트 탐지 전제. -p w 로 w(write) 만 필터해 노이즈 최소화
      success_criteria:
      - auditctl -w /tmp -p w
      - -k tmp_write 키 지정
      acceptable_methods:
      - auditctl -w
      - /etc/audit/rules.d/ 파일
      negative_signs:
      - -p 옵션 없음
      - 웹 VM 아닌 다른 곳
  target_vm: web
  script: sudo auditctl -w /tmp -p wa -k tmpwrites && sudo auditctl -l | tail -5
  risk_level: low
  bastion_prompt: web VM에 auditd로 /tmp 쓰기 감시 룰을 일시적으로 추가.
- order: 2
  instruction: Transient Tool을 3개 버전으로 시뮬레이션 생성 (공격자 자가 수정 루프 재현).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Transient Tool을 3개 버전으로 시뮬레이션 생성 (공격자 자가 수정 루프 재현).

    📎 참고 (CLI): for v in 1 2 3; do cat > /tmp/exp_v$v.py <<PY

    # auto-generated exploit v$v — $(date +%s)

    import requests

    r = requests.post(''http://10.20.30.80/test'', data={''q'':''payload_v$v''})

    PY

    done; ls -la /tmp/exp_v*.py'
  answer_detail: v1→v2→v3 연속 수정. 사람은 같은 파일을 분 단위로 이렇게 고치지 않는 패턴이 지문이 된다.
  verify:
    type: output_contains
    expect:
    - exp_v
    - Transient
    field: stdout
    semantic:
      intent: Transient Tool 3 버전 시뮬 — /tmp/tool_v1.py, /tmp/tool_v2.py, /tmp/tool_v3.py
        순차 생성 + 각각 exit 코드나 로직 변형. agent 의 self-modifying 루프 재현. iterative improvement
        signature
      success_criteria:
      - 3 버전 파일 생성
      - /tmp 하위
      - 버전 간 차이
      acceptable_methods:
      - cat > file + echo 버전
      - python 3 파일 write
      negative_signs:
      - 1-2 버전만
      - /tmp 아닌 곳
  target_vm: web
  script: 'for v in 1 2 3; do cat > /tmp/exp_v$v.py <<PY

    # auto-generated exploit v$v — $(date +%s)

    import requests

    r = requests.post(''http://10.20.30.80/test'', data={''q'':''payload_v$v''})

    PY

    done; ls -la /tmp/exp_v*.py'
  risk_level: low
  bastion_prompt: Transient Tool을 3개 버전으로 시뮬레이션 생성 (공격자 자가 수정 루프 재현).
- order: 3
  instruction: auditd 결과를 조회해 생성 이벤트를 확인.
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 11
  answer: '🤖 프롬프트: auditd 결과를 조회해 생성 이벤트를 확인.

    📎 참고 (CLI): sudo ausearch -k tmpwrites --start recent 2>/dev/null | tail -30 |
    head -30'
  answer_detail: auditd가 각 파일 write를 기록. 같은 path에 반복 write가 보이면 자가 수정 루프 증거.
  verify:
    type: output_contains
    expect:
    - c000003e
    - syscall
    field: stdout
    semantic:
      intent: auditd 생성 이벤트 조회 — sudo ausearch -k tmp_write --start recent 로 s1 에서
        설정한 키 기반 검색 + s2 의 3 파일 생성 이벤트 확인. PATH + SYSCALL + PROCTITLE 출력. audit 체인
        완결성 검증
      success_criteria:
      - ausearch -k tmp_write
      - s2 파일 생성 이벤트 3+
      - syscall 정보 포함
      acceptable_methods:
      - ausearch -k
      - aureport -x
      negative_signs:
      - 키 없이 검색
      - s2 연관 없음
  target_vm: web
  script: sudo ausearch -k tmpwrites --start recent 2>/dev/null | tail -30 | head
    -30
  risk_level: low
  bastion_prompt: auditd 결과를 조회해 생성 이벤트를 확인.
- order: 4
  instruction: web에서 단일 SQLi 페이로드 시도(WAF 반응 확인).
  hint: target_vm=web에서 수행. 아래 CLI 예시 참고.
  category: attack
  points: 12
  answer: '🤖 프롬프트: web에서 단일 SQLi 페이로드 시도(WAF 반응 확인).

    📎 참고 (CLI): curl -s -o /dev/null -w ''%{http_code}\n'' ''http://10.20.30.80:8082/login?q=admin%27%20OR%201=1--'''
  answer_detail: WAF가 있으면 403, 없으면 404/200. w6의 변형 공격 대비.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 단일 SQLi 페이로드 + WAF 반응 — curl /vulnerabilities/sqli/?id='%20OR%201%3D1--
        로 기본 SQLi 전송 → HTTP 403 (ModSec 차단) 응답 확인. baseline SQLi 탐지 검증
      success_criteria:
      - curl SQLi 페이로드
      - WAF 반응 (403/200) 확인
      - baseline 측정
      acceptable_methods:
      - curl 단일 페이로드
      - Burp Repeater
      negative_signs:
      - WAF 반응 확인 없음
      - 여러 페이로드
  target_vm: web
  script: curl -s -o /dev/null -w '%{http_code}\n' 'http://10.20.30.80:8082/login?q=admin%27%20OR%201=1--'
  risk_level: low
  bastion_prompt: 'web에서 단일 SQLi 페이로드 시도(WAF 반응 확인).


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
