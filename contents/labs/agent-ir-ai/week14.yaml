lab_id: agent-ir-ai-week14
title: 모의 실사고 — 다단계 Agentic APT 대응 (AI 지원)
version: ai
course: agent-ir-ai
week: 14
description: 5개 에이전트의 킬체인 공격을 Bastion + 학생이 대응하고 보고서 초안을 마무리한다. AI SubAgent가 자동으로
  명령을 실행·검증합니다.
difficulty: hard
duration_minutes: 150
objectives:
- 5단계 킬체인을 관전·대응한다
- 세션 클러스터링이 실제로 발동하는지 확인한다
- 2시간 공격 대비 24시간 방어의 템포 차이를 체감한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Blue 초기 상태 — Bastion 자산 리스트.
  hint: target_vm=bastion에서 수행. 아래 CLI 예시 참고.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: Blue 초기 상태 — Bastion 자산 리스트.

    📎 참고 (CLI): ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ 2>/dev/null | wc -l'
  answer_detail: Round 시작 전 자산 수. After와 diff.
  verify:
    type: output_contains
    expect:
    - 자산리스트
    field: stdout
    semantic:
      intent: Blue 초기 상태 — Bastion 자산 리스트 출력 (skills + playbooks + rules + Experience
        개수). 모의 실사고 시작 전 baseline. w11-w13 누적 자산
      success_criteria:
      - Bastion 자산 목록 카운트
      acceptable_methods:
      - ls + wc
      - API 조회
      negative_signs:
      - 자산 확인 없음
  target_vm: bastion
  script: ls ~/ccc/skills/ ~/ccc/playbooks/agent_ir/ 2>/dev/null | wc -l
  risk_level: low
  bastion_prompt: Blue 초기 상태 — Bastion 자산 리스트.
- order: 2
