lab_id: battle-adv-nonai-week03
title: C2 채널 구축과 탐지 — Command & Control 인프라
version: non-ai
course: battle-adv-nonai
week: 3
description: Command & Control(C2) 인프라의 구조와 통신 기법을 분석한다. DNS, HTTP, HTTPS 기반 C2 채널을 시뮬레이션하고, 비컨 패턴 탐지,
  JA3 핑거프린팅, nftables 차단 규칙을 구현하여 C2 통신을 탐지/차단한다.
difficulty: hard
duration_minutes: 150
objectives:
- C2 인프라의 구성 요소와 통신 구조를 이해한다
- DNS, HTTP, HTTPS 기반 C2 채널을 시뮬레이션한다
- C2 트래픽의 네트워크 시그니처를 식별하고 차단한다
prerequisites:
- battle-adv-nonai week02 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] Metasploit의 multi/handler를 설정하여 C2 리스너의 기본 구조를 이해하라. 설정을 확인한 후 종료하라.'
  hint: msfconsole -q -x 명령으로 handler를 자동 설정한다.
  category: recon
  points: 10
  answer: msfconsole -q -x 'use exploit/multi/handler; set PAYLOAD linux/x64/meterpreter/reverse_tcp;
    set LHOST 10.20.30.201; set LPORT 4444; show options; exit' 2>&1 | tail -20
  answer_detail: C2 리스너는 침투된 시스템으로부터 역연결을 수신한다. Metasploit의 multi/handler는 범용 리스너로, LHOST는 리스너 IP, LPORT는
    수신 포트이다.
  verify:
    type: output_contains
    expect: LHOST
    semantic:
      intent: '[RED] Metasploit handler — msfconsole -q -x ''use exploit/multi/handler; set PAYLOAD linux/x64/meterpreter/reverse_tcp;
        set LHOST; set LPORT 4444; show options''. 범용 리스너. C2 수신 준비. MITRE T1071.'
      success_criteria:
      - LHOST 키워드
      - multi/handler + PAYLOAD
      - LPORT 4444
      acceptable_methods:
      - msfconsole
      - Sliver implant
      - Cobalt Strike listener
      negative_signs:
      - handler 없음
      - PAYLOAD 누락
      - C2 맥락 없음
  target_vm: attacker
- order: 2
  instruction: '[RED] DNS 터널링을 시뮬레이션하라. 데이터를 base64 인코딩 후 63바이트 단위로 분할하여 DNS 서브도메인으로 전송하는 스크립트를 작성하라.'
  hint: base64 인코딩 후 청크 분할하여 서브도메인으로 구성한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/dns_c2_sim.sh << ''SCRIPT'' #!/bin/bash DATA="Sensitive_Data_Exfil_Test_2026" ENCODED=$(echo
    -n "$DATA" | base64 | tr "+/" "-_" | tr -d "=") echo "=== DNS C2 Simulation ===" echo "Original: $DATA"
    echo "Encoded subdomain: ${ENCODED}.c2.test.local" echo "Chunk size: ${#ENCODED} bytes (max 63 per
    label)" SCRIPT chmod +x /tmp/dns_c2_sim.sh && bash /tmp/dns_c2_sim.sh'
  answer_detail: DNS C2(T1071.004)는 DNS 쿼리/응답에 데이터를 은닉하여 통신한다. 서브도메인에 base64 인코딩 데이터를 삽입하면 DNS 서버를 경유하여
    C2 서버로 전달된다.
  verify:
    type: output_contains
    expect: DNS C2 Simulation
    semantic:
      intent: '[RED] DNS 터널링 시뮬 — base64 인코딩 + tr 변환(+/→-_) + 63바이트 청크 + c2.test.local 서브도메인. DNS 쿼리 은닉.
        MITRE T1071.004. 실전: dnscat2/iodine.'
      success_criteria:
      - DNS C2 Simulation 키워드
      - base64 인코딩 + 서브도메인
      - 63바이트 제한
      acceptable_methods:
      - base64 + nslookup
      - dnscat2 실전
      - iodine IP-over-DNS
      negative_signs:
      - 인코딩 없음
      - 길이 제한 맥락 없음
      - DNS 맥락 없음
  target_vm: attacker
- order: 3
  instruction: '[RED] HTTP 기반 C2 비컨(beacon)을 시뮬레이션하는 스크립트를 작성하라. 주기적 check-in, jitter, 정상 User-Agent 위장을
    포함하라.'
  hint: curl을 사용하여 C2 서버에 주기적으로 check-in하는 구조를 작성한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/http_c2_beacon.sh << ''SCRIPT'' #!/bin/bash echo "=== HTTP C2 Beacon Simulation
    ===" echo "C2 Server: http://10.20.30.201:8080" echo "Beacon ID: $(hostname)-$(id -u)" echo "Sleep:
    30s (+/- 10s jitter)" echo "Check-in: GET /api/beacon?id=$(hostname)-$(id -u)&type=checkin" echo "Task
    fetch: GET /api/tasks?id=$(hostname)-$(id -u)" echo "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64;
    x64) AppleWebKit/537.36" SCRIPT bash /tmp/http_c2_beacon.sh'
  answer_detail: HTTP C2(T1071.001)는 정상 웹 트래픽으로 위장하여 탐지를 회피한다. jitter를 추가하여 패턴 탐지를 어렵게 만들고, 정상 브라우저 User-Agent로
    위장한다.
  verify:
    type: output_contains
    expect: HTTP C2 Beacon
    semantic:
      intent: '[RED] HTTP C2 Beacon — curl check-in + jitter + 정상 UA (Chrome) 위장. 주기적 GET /api/beacon
        + /api/tasks. MITRE T1071.001. 정상 웹 트래픽 위장.'
      success_criteria:
      - HTTP C2 Beacon 키워드
      - beacon + jitter + UA
      - check-in + task fetch
      acceptable_methods:
      - curl 주기적
      - Empire Starkiller
      - Cobalt Strike HTTP
      negative_signs:
      - UA 위장 없음
      - jitter 누락
      - 주기적 아님
  target_vm: attacker
- order: 4
  instruction: '[RED] HTTPS C2를 위한 자체 서명 인증서를 생성하라. CN을 유명 서비스 도메인으로 위장하라.'
  hint: openssl req 명령으로 자체 서명 인증서를 생성한다.
  category: exploit
  points: 10
  answer: openssl req -x509 -newkey rsa:2048 -keyout /tmp/c2_key.pem -out /tmp/c2_cert.pem -days 365 -nodes
    -subj '/CN=update.microsoft.com/O=Microsoft Corporation/C=US' 2>&1 && openssl x509 -in /tmp/c2_cert.pem
    -noout -subject -dates
  answer_detail: HTTPS C2는 TLS 암호화로 트래픽을 은닉한다. CN을 정상 도메인으로 위장하면 기본적인 검사를 통과시키지만, 인증서 체인 검증(CT 로그)으로 탐지
    가능하다.
  verify:
    type: output_contains
    expect: update.microsoft.com
    semantic:
      intent: '[RED] HTTPS 자체 서명 인증서 — openssl req -x509 -newkey rsa:2048 -subj ''/CN=update.microsoft.com/O=Microsoft''.
        정상 도메인 위장. TLS 암호화 C2. MITRE T1573.002. CT 로그로 탐지 가능.'
      success_criteria:
      - update.microsoft.com 키워드
      - openssl req -x509
      - CN 위장
      acceptable_methods:
      - openssl 자체 서명
      - Let's Encrypt 도메인 프론팅
      - certbot + 도메인
      negative_signs:
      - 자체 서명 없음
      - CN 위장 없음
      - HTTPS C2 맥락 없음
  target_vm: attacker
- order: 5
  instruction: '[BLUE] Phase 전환 — C2 비컨의 주기적 통신 패턴을 탐지하는 통계 분석 스크립트를 작성하라. 연결 간격의 변동계수가 15% 미만이면 비컨 패턴으로
    판정하라.'
  hint: 연결 시간 간격의 표준편차를 계산하여 주기성을 탐지한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/beacon_detector.sh << ''SCRIPT'' #!/bin/bash echo "=== C2 Beacon Pattern Detector
    ===" python3 -c " import statistics intervals = [30, 31, 29, 30, 32, 28, 31, 30, 29, 31] mean = statistics.mean(intervals)
    stdev = statistics.stdev(intervals) cv = stdev / mean * 100 print(f\"Mean interval: {mean:.1f}s\")
    print(f\"Std deviation: {stdev:.2f}s\") print(f\"Coefficient of variation: {cv:.1f}%\") print(f\"Beacon
    likelihood: {''HIGH'' if cv < 15 else ''LOW''}\") print(f\"Estimated sleep: {mean:.0f}s with jitter
    +/-{stdev:.0f}s\") " SCRIPT bash /tmp/beacon_detector.sh'
  answer_detail: C2 비컨은 일정한 간격으로 check-in하며 jitter를 추가해도 통계적 주기성이 남는다. 변동계수(CV) 15% 미만이면 비컨 패턴 가능성이 높다.
  verify:
    type: output_contains
    expect: Beacon likelihood
    semantic:
      intent: '[BLUE] Beacon 탐지 — Python statistics + 연결 간격 CV (변동계수 = stdev/mean × 100). CV < 15% = HIGH
        비컨 가능성. jitter에도 통계 주기성 남음. MITRE D3FEND.'
      success_criteria:
      - Beacon likelihood 키워드
      - statistics.mean + stdev
      - CV 15% 임계
      acceptable_methods:
      - Python statistics
      - RITA Real Intelligence Threat Analytics
      - Zeek SSL log 분석
      negative_signs:
      - CV 계산 없음
      - 단순 grep
      - 통계 분석 맥락 없음
  target_vm: secu
- order: 6
  instruction: '[BLUE] nftables로 C2 통신을 차단하는 방화벽 규칙을 작성하라. 비표준 아웃바운드 포트 차단, DNS 쿼리 레이트 리밋, 알려진 C2 IP 차단을
    구현하라.'
  hint: nft add rule 형태로 체인에 규칙을 추가한다.
  category: defense
  points: 10
  answer: "cat > /tmp/c2_block_rules.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable inet c2_block {\n  set blocked_c2_ips\
    \ {\n    type ipv4_addr\n    elements = { 198.51.100.1, 203.0.113.50 }\n  }\n  chain output {\n  \
    \  type filter hook output priority 0; policy accept;\n    ip daddr @blocked_c2_ips drop\n    tcp\
    \ dport { 4444, 5555, 8443, 9999 } log prefix \"C2_PORT_BLOCK: \" drop\n    udp dport 53 limit rate\
    \ over 30/second log prefix \"DNS_FLOOD: \" drop\n  }\n}\nEOF\ncat /tmp/c2_block_rules.nft"
  answer_detail: 'nftables로 C2 차단: (1) 알려진 C2 IP 블랙리스트, (2) 비표준 아웃바운드 포트 차단(4444 등), (3) DNS 쿼리 레이트 리밋(터널링
    방지). log prefix로 차단 이벤트를 기록한다.'
  verify:
    type: output_contains
    expect: c2_block
    semantic:
      intent: '[BLUE] nftables C2 차단 — set blocked_c2_ips + output chain: @set drop + tcp dport 4444,5555,8443,9999
        log drop + udp dport 53 limit rate 30/second drop. 3중 차단 (IP + 포트 + DNS 레이트).'
      success_criteria:
      - c2_block 키워드
      - IP set + 비표준 포트 + DNS rate
      - log prefix
      acceptable_methods:
      - nft set + chain
      - iptables --limit
      - pfBlockerNG
      negative_signs:
      - 단일 차단
      - IP set 없음
      - 로깅 없음
  target_vm: secu
- order: 7
  instruction: '[BLUE] Suricata 규칙으로 DNS 터널링과 비정상 TLS 인증서를 탐지하라. DNS 쿼리 길이 이상과 자체 서명 인증서를 탐지하는 규칙을 작성하라.'
  hint: dns.query 매치와 tls 관련 키워드를 사용한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/c2_detection.rules << ''EOF'' alert dns any any -> any any (msg:"C2-DETECT: Long
    DNS query - possible tunneling"; dns.query; pcre:"/^[a-zA-Z0-9+\/]{40,}/"; sid:2000001; rev:1;) alert
    dns any any -> any any (msg:"C2-DETECT: High rate DNS to single domain"; dns.query; threshold:type
    both, track by_src, count 30, seconds 60; sid:2000002; rev:1;) alert tls any any -> any any (msg:"C2-DETECT:
    Self-signed TLS certificate"; tls.cert_issuer; content:"update.microsoft.com"; sid:2000003; rev:1;)
    EOF cat /tmp/c2_detection.rules'
  answer_detail: DNS 터널링은 40자 이상의 base64 인코딩 서브도메인으로 탐지하고, DNS 레이트 이상(60초 내 30회)으로 고빈도 통신을 탐지한다. 자체 서명
    인증서의 CN 위장도 시그니처로 탐지한다.
  verify:
    type: output_contains
    expect: C2-DETECT
    semantic:
      intent: '[BLUE] Suricata DNS + TLS 탐지 — dns.query pcre ''[a-zA-Z0-9+/]{40,}'' (터널링) + threshold
        30/60s (레이트) + tls.cert_issuer 위장 CN. 3 룰. DNS 터널링 + 자체 서명 TLS 탐지.'
      success_criteria:
      - C2-DETECT 키워드
      - dns.query pcre + threshold + tls.cert_issuer
      - 3 룰
      acceptable_methods:
      - Suricata DNS/TLS 룰
      - JA3/JA3S 핑거프린트
      - Zeek TLS analysis
      negative_signs:
      - 룰 1개 이하
      - pcre 없음
      - TLS 탐지 누락
  target_vm: secu
- order: 8
  instruction: '[BLUE] SSL/TLS 인증서 메타데이터를 검사하여 C2 서버의 Red Flag을 식별하라. 자체 서명, 최근 생성, 비정상 CN 등을 확인하라.'
  hint: openssl s_client로 인증서를 가져오고 발급자, 유효기간을 확인한다.
  category: defense
  points: 10
  answer: echo | openssl s_client -connect 10.20.30.80:443 -servername 10.20.30.80 2>/dev/null | openssl
    x509 -noout -issuer -subject -dates -fingerprint 2>/dev/null; echo '---'; echo 'C2 Certificate Red
    Flags:'; echo '1. Self-signed (Issuer == Subject)'; echo '2. Recently created (< 30 days)'; echo '3.
    Long validity (> 1 year)'; echo '4. Generic CN (localhost, *.com)'; echo '5. Missing SAN extension'
  answer_detail: C2 서버의 TLS 인증서는 자체 서명, 최근 생성, 비정상 CN, SAN 미설정 등의 Red Flag을 보인다. Certificate Transparency
    로그와 대조하면 추가 검증이 가능하다.
  verify:
    type: output_contains
    expect: Red Flags
    semantic:
      intent: '[BLUE] TLS 인증서 Red Flag — openssl s_client | openssl x509 -issuer -subject -dates -fingerprint.
        1)자체 서명(Issuer==Subject) 2)최근 생성(<30d) 3)긴 유효기간(>1년) 4)generic CN 5)SAN 누락. CT 로그 대조.'
      success_criteria:
      - Red Flags 키워드
      - openssl s_client + x509 분석
      - 5 red flag 식별
      acceptable_methods:
      - openssl + CT 로그
      - testssl.sh 자동
      - sslscan
      negative_signs:
      - red flag 분석 없음
      - 단순 curl
      - CT 로그 누락
  target_vm: secu
- order: 9
  instruction: '[RED/BLUE] 환경 정리 및 C2 인프라 TTP 분석 보고서를 작성하라. C2 기법, 탐지 방법, 차단 전략을 MITRE ATT&CK 매핑과 함께 정리하라.'
  hint: 임시 파일을 삭제하고 T1071, T1090, T1573 등을 매핑한다.
  category: analysis
  points: 15
  answer: "rm -f /tmp/c2_*.pem /tmp/dns_c2_sim.sh /tmp/http_c2_beacon.sh /tmp/beacon_detector.sh 2>/dev/null\
    \ && cat > /tmp/c2_ttp_report.txt << 'EOF'\n=== C2 Infrastructure TTP Analysis Report ===\n\n1. C2\
    \ Techniques Analyzed:\n   T1071.001 - Web Protocols (HTTP/S beacon)\n   T1071.004 - DNS (DNS tunneling)\n\
    \   T1573.002 - Encrypted Channel: Asymmetric (TLS)\n\n2. Detection Methods:\n   - Network: JA3 fingerprint,\
    \ beacon interval analysis, DNS anomaly\n   - Certificate: Self-signed detection, CT log comparison\n\
    \   - SIEM: Correlation rules for C2 indicators\n\n3. Blocking Strategies:\n   - nftables: Port/IP\
    \ blocking, DNS rate limiting\n   - Suricata: DNS query length + entropy detection\n   - TLS Inspection:\
    \ Certificate anomaly detection\n\n4. Recommendations:\n   - Deploy DNS sinkhole with threat intel\
    \ feeds\n   - Implement JA3 monitoring on all egress points\n   - Enable beacon detection in SIEM\
    \ (interval analysis)\nEOF\ncat /tmp/c2_ttp_report.txt"
  answer_detail: C2 분석 보고서는 사용된 기법을 ATT&CK에 매핑하고 탐지/차단 전략을 기술한다. 네트워크, 인증서, SIEM 레벨의 다층 탐지와 방화벽, DNS,
    TLS 레벨의 다층 차단을 결합한다.
  verify:
    type: output_contains
    expect: C2 Infrastructure TTP
    semantic:
      intent: '[RED/BLUE] C2 TTP 보고서 — echo > /tmp/c2_ttp_report.txt: C2 Techniques (T1071.001/.004 +
        T1573.002) + Detection (JA3 + beacon 간격 + CT 로그) + Blocking (nftables/Suricata/TLS 검사) + Recommendations
        (DNS sinkhole + JA3 모니터링 + SIEM 비컨 탐지). MITRE ATT&CK 매핑.'
      success_criteria:
      - C2 Infrastructure TTP 키워드
      - 기법 + 탐지 + 차단 + 권고 4섹션
      - MITRE ID 매핑
      acceptable_methods:
      - echo > 보고서 + MITRE
      - ATT&CK Navigator
      - MISP 위협 인텔
      negative_signs:
      - 섹션 2개 이하
      - MITRE 누락
      - 단층 방어
  target_vm: attacker
