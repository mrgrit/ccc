lab_id: "battle-adv-nonai-week14"
title: "대규모 공방전 — 다대다 팀전 + 관전 + 분석"
version: "non-ai"
course: "battle-adv-nonai"
week: 14
description: "다수의 Red/Blue 팀이 참여하는 대규모 공방전을 기획하고 운영한다. CTF(Capture The Flag) 형식의 Attack/Defense 경기를 설계하고, 관전 시스템과 실시간 분석 체계를 구축한다."
difficulty: "hard"
duration_minutes: 150
objectives:
  - "대규모 Attack/Defense CTF를 기획하고 설계한다"
  - "실시간 스코어보드와 관전 시스템을 구축한다"
  - "다팀 공방전의 전략 분석과 심판 체계를 운영한다"
  - "대규모 보안 이벤트의 사후 분석을 수행한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "Attack/Defense CTF 대회를 기획하라. 팀 구성, 네트워크 토폴로지, 규칙, 스코어링을 설계하라."
    hint: "3팀(Red1, Red2, Blue) 또는 4팀(2 Red + 2 Blue) 구성으로 경기를 설계한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/ctf_event_plan.txt << 'EOF'\n=== Attack/Defense CTF Event Plan ===\nEvent: OpsClaw Cyber Battle Championship\nDate: 2026-04-03 | Duration: 3 hours\n\nTeam Structure (4 teams):\n  Red Team Alpha: 3 members (offensive specialists)\n  Red Team Beta: 3 members (offensive specialists)\n  Blue Team Alpha: 3 members (defensive specialists)\n  Blue Team Beta: 3 members (defensive specialists)\n\nNetwork Topology:\n  Team Alpha Zone: 10.20.30.0/24 (attack from Alpha, defend by Blue-A)\n  Team Beta Zone: 10.20.40.0/24 (attack from Beta, defend by Blue-B)\n  Shared Infrastructure: 10.20.50.0/24 (scorebot, monitoring)\n\nScoring (per 5-min tick):\n  Blue: +10 pts per service uptime\n  Red: +30 pts per flag captured\n  Red: +10 pts per unique vulnerability found\n  Blue: +20 pts per attack blocked\n  Blue: -5 pts per service downtime\n\nFlags: 5 per zone (web, db, ssh, config, crypto)\nDuration: 3 hours (36 ticks)\nMax Possible Score: ~1,000 pts per team\nEOF\ncat /tmp/ctf_event_plan.txt"
    answer_detail: "Attack/Defense CTF는 4팀(2 Red + 2 Blue)으로 구성하며, 각 팀이 자신의 존을 공격/방어한다. 5분 틱마다 점수를 계산하며, Blue는 서비스 가용성으로, Red는 플래그 획득으로 점수를 얻는다. 서비스 다운타임 페널티로 DoS를 억제한다."
    verify:
      type: "output_contains"
      expect: "CTF Event Plan"

  - order: 2
    instruction: "CTF 인프라를 설계하라. 각 팀 존의 취약 서비스, 플래그 배치, 네트워크 격리를 구성하라."
    hint: "Docker 기반으로 팀별 격리 환경과 취약 서비스를 배포한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/ctf_infrastructure.txt << 'EOF'\n=== CTF Infrastructure Design ===\n\nPer-Team Services (Docker containers):\n  1. Web Service (port 80) - JuiceShop with flag in /flag.txt\n  2. Database (port 3306) - MySQL with flag in secret table\n  3. SSH Service (port 22) - Weak password, flag in /root/flag.txt\n  4. Config Service (port 8080) - Misconfigured API, flag in env var\n  5. Crypto Service (port 9090) - Weak crypto challenge, flag in response\n\nNetwork Isolation:\n  - Each team zone isolated via VLAN + nftables\n  - Red teams can only attack opposing Blue zone\n  - No cross-Red-team communication\n  - Scorebot has read access to all zones\n\nScorebot Architecture:\n  - Checks service availability every 30s\n  - Validates flags via API submission\n  - Real-time scoreboard on 10.20.50.1:3000\n\nDocker Compose: 10 containers per zone × 2 zones = 20 containers\nHost Requirements: 16GB RAM, 8 CPU cores\nEOF\ncat /tmp/ctf_infrastructure.txt"
    answer_detail: "CTF 인프라는 팀별 5개 취약 서비스(Web, DB, SSH, Config, Crypto)를 Docker 컨테이너로 배포한다. VLAN과 nftables로 팀 존을 격리하고, Scorebot이 서비스 가용성과 플래그를 자동 검증한다. 총 20개 컨테이너로 전체 환경을 구성한다."
    verify:
      type: "output_contains"
      expect: "CTF Infrastructure"

  - order: 3
    instruction: "실시간 스코어보드 시스템을 설계하라. 팀별 점수, 서비스 상태, 플래그 현황을 실시간으로 표시하는 대시보드를 구성하라."
    hint: "JSON API로 점수 데이터를 제공하고 웹 대시보드로 시각화한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/scoreboard_design.txt << 'EOF'\n=== Real-time Scoreboard Design ===\n\nAPI Endpoints:\n  GET /api/scores → Team scores and rankings\n  GET /api/services → Service status per team\n  GET /api/flags → Flag capture timeline\n  GET /api/timeline → Score history (time series)\n  POST /api/submit → Flag submission endpoint\n\nSample Score Data:\n{\n  \"tick\": 15,\n  \"elapsed\": \"01:15:00\",\n  \"teams\": [\n    {\"name\": \"Blue-Alpha\", \"score\": 420, \"services_up\": 5, \"attacks_blocked\": 12},\n    {\"name\": \"Red-Alpha\", \"score\": 380, \"flags_captured\": 3, \"vulns_found\": 8},\n    {\"name\": \"Blue-Beta\", \"score\": 350, \"services_up\": 4, \"attacks_blocked\": 8},\n    {\"name\": \"Red-Beta\", \"score\": 310, \"flags_captured\": 2, \"vulns_found\": 6}\n  ]\n}\n\nDashboard Panels:\n  1. Leaderboard (real-time ranking)\n  2. Service status grid (green/red per service per team)\n  3. Flag capture timeline (who captured what, when)\n  4. Score trend chart (line graph over time)\n  5. Attack heatmap (source → target intensity)\nEOF\ncat /tmp/scoreboard_design.txt"
    answer_detail: "실시간 스코어보드는 REST API로 점수 데이터를 제공하고 웹 대시보드로 시각화한다. 리더보드, 서비스 상태 그리드, 플래그 캡처 타임라인, 점수 추이 차트, 공격 히트맵의 5개 패널로 구성하여 참가자와 관전자 모두에게 실시간 정보를 제공한다."
    verify:
      type: "output_contains"
      expect: "Scoreboard Design"

  - order: 4
    instruction: "관전(Spectator) 시스템을 구축하라. 네트워크 트래픽을 시각화하고 공방 상황을 실시간으로 중계하는 시스템을 설계하라."
    hint: "패킷 캡처, 트래픽 시각화, 이벤트 피드를 조합한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/spectator_system.txt << 'EOF'\n=== Spectator System Design ===\n\n1. Network Visualization:\n   - Real-time packet flow between teams (animated graph)\n   - Color coding: Red=attack, Blue=defense, Green=normal\n   - Node size proportional to traffic volume\n   - Tools: Grafana + InfluxDB + custom plugin\n\n2. Event Feed:\n   - Live commentary of major events\n   - Auto-generated from scorebot events:\n     \"[12:34] Red-Alpha captured web flag from Blue-Beta!\"\n     \"[12:35] Blue-Alpha blocked SQL injection from Red-Beta\"\n   - Highlight reel of key moments\n\n3. Attack Replay:\n   - PCAP capture of all inter-zone traffic\n   - Post-event replay with annotation\n   - Technique identification (ATT&CK auto-tagging)\n\n4. Statistics Panel:\n   - Total attacks per minute\n   - Top attack techniques used\n   - Most targeted services\n   - Defense effectiveness ratio\n\n5. Audience Interaction:\n   - Live polling: \"Which team will capture next flag?\"\n   - Q&A with commentators\n   - Vote for MVP\nEOF\ncat /tmp/spectator_system.txt"
    answer_detail: "관전 시스템은 네트워크 시각화(실시간 패킷 흐름), 이벤트 피드(자동 실황), 공격 리플레이(PCAP 기반), 통계 패널(공격/방어 지표), 관객 참여(투표, Q&A)의 5가지 요소로 구성한다. 이를 통해 비참가자도 공방전을 이해하고 즐길 수 있다."
    verify:
      type: "output_contains"
      expect: "Spectator System"

  - order: 5
    instruction: "심판(Arbiter) 시스템을 설계하라. 공정한 경기 진행을 위한 규칙 집행, 이의 신청 처리, 반칙 탐지를 구현하라."
    hint: "자동 규칙 검증, 수동 이의 처리, DoS 방지를 포함한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/arbiter_system.txt << 'EOF'\n=== Arbiter (Judge) System ===\n\n1. Automated Rule Enforcement:\n   - Service checker: 30s interval, 3-strike downtime rule\n   - Flag validator: SHA256 hash verification\n   - Scope monitor: Block out-of-scope traffic automatically\n   - DoS detector: >1000 packets/s → warning → penalty\n\n2. Penalty System:\n   | Violation | 1st | 2nd | 3rd |\n   |-----------|-----|-----|-----|\n   | Out-of-scope attack | Warning | -50 pts | Disqualification |\n   | DoS/DDoS | -50 pts | -100 pts | Disqualification |\n   | Destructive action | -100 pts | Disqualification | - |\n   | Tool sharing between Red teams | -50 pts | Disqualification | - |\n\n3. Appeal Process:\n   - Submit via /api/appeal within 5 min of incident\n   - Auto-review for factual disputes (log evidence)\n   - Human review for judgment calls (3 min max)\n   - Decision is final\n\n4. Fair Play Monitoring:\n   - Network TAP captures all traffic\n   - All team actions logged\n   - Post-event audit capability\nEOF\ncat /tmp/arbiter_system.txt"
    answer_detail: "심판 시스템은 자동 규칙 집행(서비스 체크, 플래그 검증, 범위 감시, DoS 탐지), 페널티 시스템(3단계 경고), 이의 처리(5분 내 제출, 3분 내 판정), 공정성 모니터링(전 트래픽 캡처)을 포함한다."
    verify:
      type: "output_contains"
      expect: "Arbiter"

  - order: 6
    instruction: "대회 전 보안 점검을 수행하라. CTF 인프라의 보안과 격리가 올바르게 설정되었는지 확인하라."
    hint: "팀 간 격리, 서비스 가용성, 플래그 무결성을 점검한다."
    category: "defense"
    points: 10
    answer: "echo '=== Pre-Event Security Check ===' && echo '[1] Network isolation:' && echo '  Team Alpha → Beta: BLOCKED (verified via nft)' && echo '  Red-Alpha → Red-Beta: BLOCKED (no inter-red comms)' && echo '  Scorebot → All zones: READ-ONLY (verified)' && echo '' && echo '[2] Service availability:' && for svc in web db ssh config crypto; do echo \"  $svc: UP (checked)\"; done && echo '' && echo '[3] Flag integrity:' && echo '  5 flags per zone, SHA256 verified' && echo '  Flags unique per tick (rotation every 5 min)' && echo '' && echo '[4] Logging:' && echo '  PCAP capture: Active on all interfaces' && echo '  Event logging: All API calls logged' && echo '' && echo 'Pre-event check: PASSED (all systems ready)'"
    answer_detail: "대회 전 보안 점검은 네트워크 격리(팀 간 차단), 서비스 가용성(5개 서비스 모두 UP), 플래그 무결성(SHA256 검증), 로깅(PCAP, API 로그)을 확인한다. 이 점검이 실패하면 대회를 시작하지 않으며, 모든 항목 통과 후에만 진행한다."
    verify:
      type: "output_contains"
      expect: "Pre-event check"

  - order: 7
    instruction: "대회 실행을 시뮬레이션하라. 3시간 경기의 주요 이벤트를 타임라인으로 시뮬레이션하라."
    hint: "시간대별 주요 공격/방어 이벤트와 점수 변화를 시뮬레이션한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/ctf_timeline.txt << 'EOF'\n=== CTF Battle Timeline (Simulated) ===\n\n[00:00] START - All services UP, initial reconnaissance\n[00:10] Red-Alpha discovers SQLi on Blue-Beta web service\n[00:15] Red-Alpha captures web flag (first blood!) +30 pts\n[00:20] Blue-Alpha blocks Red-Beta port scan +20 pts\n[00:30] Red-Beta finds SSH weak password on Blue-Alpha\n[00:35] Blue-Beta patches SQLi vulnerability (service briefly down) -5 pts\n[00:45] Red-Beta captures SSH flag from Blue-Alpha +30 pts\n[01:00] HALFTIME - Scores: RedA:380, BlueA:350, RedB:310, BlueB:320\n[01:15] Blue-Alpha deploys honey token, catches Red-Beta +20 pts\n[01:30] Red-Alpha attempts DNS exfil - blocked by Blue-Beta +20 pts\n[01:45] Red-Beta finds config API vulnerability\n[02:00] Both Red teams stuck on crypto challenge\n[02:15] Blue-Alpha proactively patches crypto service\n[02:30] Red-Alpha captures DB flag from Blue-Beta +30 pts\n[02:45] Final push - all teams intensify attacks\n[03:00] END - Final Scores: BlueA:520, RedA:480, BlueB:420, RedB:390\n\nWINNER: Blue Team Alpha (520 pts)\nEOF\ncat /tmp/ctf_timeline.txt"
    answer_detail: "CTF 시뮬레이션 타임라인은 3시간 경기의 주요 이벤트와 점수 변화를 보여준다. First Blood(첫 플래그 획득), 패치(서비스 복구), 하니 토큰(능동 방어), 크립토 챌린지(기술적 난관) 등의 이벤트가 경기의 역동성을 만든다."
    verify:
      type: "output_contains"
      expect: "CTF Battle Timeline"

  - order: 8
    instruction: "대회 후 통계 분석을 수행하라. 팀별 성과, 기법별 성공률, 서비스별 취약점 활용도를 분석하라."
    hint: "스코어보드 데이터에서 팀/기법/서비스별 통계를 도출한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/ctf_statistics.txt << 'EOF'\n=== CTF Post-Event Statistics ===\n\n1. Team Performance:\n   | Team | Score | Flags | Blocks | Uptime |\n   |------|-------|-------|--------|--------|\n   | Blue-Alpha | 520 | N/A | 18 | 98% |\n   | Red-Alpha | 480 | 4 | N/A | N/A |\n   | Blue-Beta | 420 | N/A | 12 | 92% |\n   | Red-Beta | 390 | 3 | N/A | N/A |\n\n2. Attack Statistics:\n   Total attacks: 847\n   Successful exploits: 42 (5%)\n   Flags captured: 7 total\n   Most used technique: SQLi (32%)\n   Most effective technique: Weak SSH (60% success)\n\n3. Service Vulnerability:\n   | Service | Attacks | Exploited | Patched |\n   |---------|---------|-----------|--------|\n   | Web | 312 | 2 | 35min |\n   | Database | 156 | 1 | 45min |\n   | SSH | 198 | 2 | 20min |\n   | Config | 112 | 1 | 60min |\n   | Crypto | 69 | 1 | Not patched |\n\n4. Defensive Effectiveness:\n   Blue-Alpha: 18/23 attacks blocked (78%)\n   Blue-Beta: 12/19 attacks blocked (63%)\nEOF\ncat /tmp/ctf_statistics.txt"
    answer_detail: "사후 통계 분석은 팀 성과(점수, 플래그, 차단, 가용성), 공격 통계(총 공격, 성공률, 기법별 분포), 서비스 취약점(서비스별 공격/패치 시간), 방어 효과(차단율)를 종합 분석한다. SQLi가 가장 많이 사용되었지만 Weak SSH가 가장 효과적이었다."
    verify:
      type: "output_contains"
      expect: "Post-Event Statistics"

  - order: 9
    instruction: "최고의 공격과 최고의 방어를 선정하라. MVP(Most Valuable Player)와 Best Play를 분석하라."
    hint: "가장 창의적/효과적인 공격과 방어를 선정한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/ctf_awards.txt << 'EOF'\n=== CTF Awards ===\n\n1. MVP (Overall): Blue-Alpha Analyst #1\n   Reason: 18 attacks blocked, honey token deployment, 98% uptime\n\n2. Best Attack: Red-Alpha - Chained SQLi → Pivot → DB flag\n   Description: Used SQLi on web to pivot internally and capture DB flag\n   in single attack chain. Elegant multi-step exploitation.\n\n3. Best Defense: Blue-Alpha - Honey Token Trap\n   Description: Deployed fake credentials that triggered alert when\n   Red-Beta attempted to use them. Immediate block + 20 bonus pts.\n\n4. First Blood: Red-Alpha (web flag at 00:15)\n\n5. Most Improved: Blue-Beta (recovered from 2 early flag losses)\n\n6. Sportsmanship: Red-Beta (helped report infrastructure issue)\n\nLessons Learned (All Teams):\n  - Patching speed directly impacts score\n  - Active deception (honey tokens) is highly effective\n  - Multi-step attacks are harder to detect but more rewarding\n  - Team communication is critical under pressure\nEOF\ncat /tmp/ctf_awards.txt"
    answer_detail: "시상 및 분석에서는 MVP(가장 큰 기여), Best Attack(가장 창의적 공격), Best Defense(가장 효과적 방어), First Blood(첫 플래그), Most Improved(가장 큰 성장), Sportsmanship(스포츠맨십)을 선정한다. 교훈 공유를 통해 모든 팀의 학습을 촉진한다."
    verify:
      type: "output_contains"
      expect: "CTF Awards"

  - order: 10
    instruction: "대회에서 사용된 공격 기법을 MITRE ATT&CK에 매핑하라. 모든 팀이 사용한 기법의 분포를 분석하라."
    hint: "각 공격 행위를 ATT&CK 기법에 매핑하고 빈도를 집계한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/ctf_attack_mapping.txt << 'EOF'\n=== ATT&CK Mapping of CTF Attacks ===\n\n| ATT&CK ID | Technique | Red-Alpha | Red-Beta | Total |\n|-----------|-----------|-----------|----------|-------|\n| T1595 | Active Scanning | 15 | 12 | 27 |\n| T1190 | Exploit Public App | 8 | 6 | 14 |\n| T1110 | Brute Force | 5 | 8 | 13 |\n| T1021 | Remote Services | 3 | 4 | 7 |\n| T1053 | Scheduled Task | 2 | 1 | 3 |\n| T1071 | App Layer Protocol | 4 | 2 | 6 |\n| T1048 | Exfiltration | 2 | 1 | 3 |\n| T1078 | Valid Accounts | 3 | 3 | 6 |\n\nTop 3 Techniques:\n  1. T1595 Active Scanning (32% of all actions)\n  2. T1190 Exploit Public App (17%)\n  3. T1110 Brute Force (15%)\n\nDefense Coverage per Technique:\n  T1595: 70% detected\n  T1190: 85% detected (WAF effective)\n  T1110: 90% detected (fail2ban effective)\nEOF\ncat /tmp/ctf_attack_mapping.txt"
    answer_detail: "ATT&CK 매핑으로 CTF에서 사용된 기법의 분포를 분석한다. Active Scanning이 32%로 가장 많고, Exploit Public App(17%)과 Brute Force(15%)가 뒤따른다. 방어 측면에서 Brute Force 탐지율(90%)이 가장 높고, Active Scanning(70%)이 가장 낮다."
    verify:
      type: "output_contains"
      expect: "ATT&CK Mapping"

  - order: 11
    instruction: "대규모 공방전의 운영 교훈(Lessons Learned)을 정리하라. 기술적, 운영적, 조직적 교훈을 도출하라."
    hint: "잘된 점, 개선 필요점, 다음에 적용할 사항을 구분한다."
    category: "analysis"
