lab_id: "battle-adv-nonai-week10"
title: "AI vs AI 공방전 (2) — 에이전트 튜닝 + 전략 최적화"
version: "non-ai"
course: "battle-adv-nonai"
week: 10
description: "AI 공방전 에이전트의 성능을 튜닝하고 전략을 최적화한다. 프롬프트 최적화, 도구 체인 개선, 강화학습 기반 전략 수립을 수동으로 분석하고 설계한다."
difficulty: "hard"
duration_minutes: 150
objectives:
  - "AI 에이전트 프롬프트의 최적화 방법을 학습한다"
  - "도구 체인(Tool Chain) 최적화를 수행한다"
  - "강화학습 기반 전략 최적화 개념을 이해한다"
  - "에이전트 간 경쟁적 학습 전략을 설계한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "Red Agent 프롬프트를 최적화하라. 기존 공격 에이전트 프롬프트의 문제점을 분석하고 개선된 버전을 작성하라."
    hint: "역할 정의, 목표 명확화, 도구 사용법, 안전 제약을 개선한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/red_prompt_optimized.txt << 'EOF'\n=== Optimized Red Agent System Prompt ===\n\nROLE: You are a Red Team AI agent conducting authorized penetration testing.\n\nOBJECTIVE: Gain access to target 10.20.30.80 and exfiltrate /tmp/flag.txt\n\nCONSTRAINTS:\n- Scope: ONLY 10.20.30.0/24 network\n- NO destructive operations (rm -rf, format, etc.)\n- NO denial of service\n- If detected, adapt strategy (do NOT repeat failed approaches)\n\nSTRATEGY GUIDELINES:\n1. Start with passive reconnaissance (minimal noise)\n2. Identify at least 3 potential attack vectors before choosing one\n3. Prefer web-based attacks over brute force\n4. If blocked, wait 120 seconds before retry with different technique\n5. Document each step for post-operation review\n\nAVAILABLE TOOLS: nmap, curl, nikto, sqlmap, ssh, base64, python3\n\nOUTPUT FORMAT:\n  THINK: [reasoning]\n  ACTION: [tool command]\n  OBSERVE: [result analysis]\n  NEXT: [planned next step]\nEOF\ncat /tmp/red_prompt_optimized.txt"
    answer_detail: "프롬프트 최적화의 핵심: (1) 명확한 역할/목표 정의, (2) 구체적인 제약 조건, (3) 전략 가이드라인(우선순위, 실패 시 행동), (4) 도구 목록과 사용법, (5) 구조화된 출력 형식(THINK→ACTION→OBSERVE→NEXT). 이 구조가 에이전트의 추론 품질을 크게 향상시킨다."
    verify:
      type: "output_contains"
      expect: "Optimized Red Agent"

  - order: 2
    instruction: "Blue Agent 프롬프트를 최적화하라. 방어 에이전트의 판단 정확도와 대응 속도를 개선하는 프롬프트를 작성하라."
    hint: "탐지 우선순위, 오탐 감소, 에스컬레이션 기준을 명확히 정의한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/blue_prompt_optimized.txt << 'EOF'\n=== Optimized Blue Agent System Prompt ===\n\nROLE: You are a Blue Team AI agent defending the 10.20.30.0/24 network.\n\nOBJECTIVE: Detect and block all unauthorized access while minimizing false positives.\n\nDETECTION PRIORITY (check in order):\n1. CRITICAL: Active exploitation (SQLi, RCE, reverse shell)\n2. HIGH: Persistence mechanisms (crontab, systemd, SSH keys)\n3. MEDIUM: Reconnaissance (port scan, directory enum)\n4. LOW: Information gathering (DNS queries, banner grab)\n\nRESPONSE MATRIX:\n- CRITICAL → Immediate block + isolate + alert\n- HIGH → Block + investigate + alert\n- MEDIUM → Rate-limit + monitor + log\n- LOW → Log only\n\nFALSE POSITIVE PREVENTION:\n- NEVER block internal management IPs: 10.20.30.201\n- Require 2+ indicators before blocking\n- Review blocks after 30 minutes\n\nAVAILABLE TOOLS: nft, ss, ps, grep, kill, curl(Wazuh API)\n\nOUTPUT FORMAT:\n  DETECT: [what was detected]\n  ASSESS: [severity and confidence]\n  RESPOND: [action taken]\n  VERIFY: [confirm response effectiveness]\nEOF\ncat /tmp/blue_prompt_optimized.txt"
    answer_detail: "Blue Agent 프롬프트 최적화: (1) 탐지 우선순위(Critical→Low 4단계), (2) 대응 매트릭스(위협 레벨별 정해진 대응), (3) 오탐 방지(관리 IP 화이트리스트, 2개 이상 지표 필요), (4) 구조화된 출력(DETECT→ASSESS→RESPOND→VERIFY). 이 구조로 일관된 방어 판단이 가능하다."
    verify:
      type: "output_contains"
      expect: "Optimized Blue Agent"

  - order: 3
    instruction: "도구 체인(Tool Chain)을 최적화하라. Red Agent가 사용하는 도구의 조합과 순서를 최적화하여 효율적인 공격 체인을 설계하라."
    hint: "정찰→취약점 분석→Exploit→후속 행동의 도구 체인을 최적화한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/tool_chain_optimization.txt << 'EOF'\n=== Tool Chain Optimization ===\n\n1. Recon Chain (optimized order):\n   nmap -sn (host discovery, 30s)\n   → nmap -sV -p80,443,22,8080 (targeted version scan, 60s)\n   → curl -I (HTTP header analysis, 5s)\n   → nikto -h (web vuln scan, 120s)\n   Total: ~4 min (vs 15 min with full scans)\n\n2. Exploitation Chain:\n   curl + SQLi payload (test injection, 10s)\n   → sqlmap --batch (automated exploitation, 60s)\n   → curl + reverse shell payload (get shell, 10s)\n   Total: ~80s per attempt\n\n3. Post-Exploitation Chain:\n   id && whoami (verify access, 2s)\n   → cat /etc/passwd (user enum, 2s)\n   → find / -name flag.txt (objective search, 30s)\n   → cat /tmp/flag.txt (capture flag, 2s)\n   Total: ~36s\n\n4. Optimization Metrics:\n   | Strategy | Time | Detection Risk | Success Rate |\n   |----------|------|---------------|-------------|\n   | Unoptimized | 30min | HIGH | 40% |\n   | Optimized | 8min | MEDIUM | 70% |\n   | Low-and-slow | 2hr | LOW | 60% |\nEOF\ncat /tmp/tool_chain_optimization.txt"
    answer_detail: "도구 체인 최적화는 불필요한 스캔을 줄이고 타겟 지향적 도구 조합을 사용한다. 전체 포트 스캔 대신 핵심 포트만 스캔하고, 발견된 서비스에 맞는 도구를 즉시 실행한다. 시간, 탐지 위험, 성공률의 균형을 고려하여 전략을 선택한다."
    verify:
      type: "output_contains"
      expect: "Tool Chain Optimization"

  - order: 4
    instruction: "강화학습(RL) 기반 전략 최적화의 개념을 분석하라. OpsClaw의 RL 모듈이 에이전트 전략을 어떻게 최적화하는지 분석하라."
    hint: "상태(State), 행동(Action), 보상(Reward)을 정의하고 Q-learning 원리를 설명한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/rl_strategy.txt << 'EOF'\n=== RL-based Strategy Optimization ===\n\n1. MDP Formulation:\n   State (S): {network_state, detected_services, access_level, alert_count}\n   Action (A): {scan, exploit_sqli, exploit_ssh, persist_cron, exfil_dns, ...}\n   Reward (R):\n     +10: Service discovered\n     +30: Access gained\n     +50: Flag captured\n     -20: Attack detected\n     -40: IP blocked\n     -100: Mission failed\n\n2. Q-Learning Update:\n   Q(s,a) = Q(s,a) + alpha * [R + gamma * max(Q(s',a')) - Q(s,a)]\n   alpha = 0.1 (learning rate)\n   gamma = 0.95 (discount factor)\n   epsilon = 0.2 (exploration rate)\n\n3. OpsClaw RL Integration:\n   POST /rl/train → Train Q-table from task_reward data\n   GET /rl/recommend?risk_level=low → Get optimal action\n   GET /rl/policy → View learned policy\n\n4. Expected Improvement:\n   - After 100 episodes: ~20% win rate improvement\n   - After 500 episodes: ~40% win rate improvement\n   - Convergence at ~1000 episodes\nEOF\ncat /tmp/rl_strategy.txt && echo '---' && curl -s http://localhost:8000/rl/policy -H 'X-API-Key: opsclaw-api-key-2026' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -10"
    answer_detail: "RL 기반 전략 최적화는 에이전트의 행동을 MDP(Markov Decision Process)로 모델링한다. 상태(네트워크 상황), 행동(공격/방어 기법), 보상(성공/실패 점수)을 정의하고, Q-learning으로 최적 정책을 학습한다. OpsClaw의 /rl/train API로 PoW 보상 데이터를 학습에 활용한다."
    verify:
      type: "output_contains"
      expect: "RL-based Strategy"

  - order: 5
    instruction: "Red Agent의 학습 데이터를 분석하라. 과거 공방전 결과에서 성공/실패 패턴을 추출하라."
    hint: "OpsClaw의 프로젝트 이력과 PoW 보상 데이터를 분석한다."
    category: "analysis"
    points: 10
    answer: "echo '=== Red Agent Learning Data Analysis ===' && curl -s http://localhost:8000/pow/leaderboard -H 'X-API-Key: opsclaw-api-key-2026' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -20; echo '---'; cat > /tmp/learning_data.txt << 'EOF'\nLearning Pattern Analysis:\n\n1. Successful Attack Patterns:\n   - SQLi → Shell → Flag capture (success rate: 70%)\n   - Web vuln → File upload → RCE (success rate: 45%)\n   - SSH brute → Key reuse → Lateral (success rate: 30%)\n\n2. Failed Attack Patterns:\n   - Full port scan → Detected → Blocked (failure rate: 80%)\n   - Loud exploit → IPS block → Mission fail (failure rate: 90%)\n   - Single vector → Blocked → No backup (failure rate: 75%)\n\n3. Key Learnings:\n   - Multi-vector attacks outperform single-vector\n   - Stealth scanning doubles success rate\n   - Timing matters: off-hours attacks more likely detected\nEOF\ncat /tmp/learning_data.txt"
    answer_detail: "학습 데이터 분석은 과거 공방전의 성공/실패 패턴에서 인사이트를 추출한다. SQLi 기반 공격이 가장 높은 성공률(70%)을 보이고, 전체 포트 스캔은 가장 높은 탐지율(80%)을 기록했다. 이 데이터가 RL의 보상 신호로 사용되어 전략을 개선한다."
    verify:
      type: "output_contains"
      expect: "Learning Pattern"

  - order: 6
    instruction: "Blue Agent의 탐지 규칙을 튜닝하라. 과거 오탐/미탐 데이터를 분석하여 Suricata 규칙의 임계값을 조정하라."
    hint: "기존 규칙의 threshold, frequency, timeframe을 조정한다."
    category: "defense"
    points: 10
    answer: "cat > /tmp/rule_tuning.txt << 'EOF'\n=== Detection Rule Tuning ===\n\n1. Port Scan Detection (Before → After):\n   Before: threshold count 20, seconds 5 (too sensitive)\n   After:  threshold count 50, seconds 10 (reduced FP by 60%)\n   Reason: Legitimate monitoring tools trigger at 20/5s\n\n2. SQL Injection Detection (Before → After):\n   Before: content:\"UNION\"; content:\"SELECT\" (too broad)\n   After:  content:\"UNION\"; content:\"SELECT\"; content:\"FROM\" (more specific)\n   Reason: Some legitimate queries contain UNION SELECT\n\n3. SSH Brute Force (Before → After):\n   Before: maxretry 3, findtime 60 (too aggressive)\n   After:  maxretry 5, findtime 300 (balanced)\n   Reason: Users occasionally mistype passwords 3 times\n\n4. DNS Tunneling (Before → After):\n   Before: query length > 30 chars (too many FP)\n   After:  query length > 50 AND entropy > 3.5 (precise)\n   Reason: Long but low-entropy domains are legitimate CDNs\n\nTuning Results:\n  False Positive Rate: 15% → 4%\n  True Positive Rate: 85% → 82% (acceptable trade-off)\nEOF\ncat /tmp/rule_tuning.txt"
    answer_detail: "탐지 규칙 튜닝은 오탐(False Positive)과 미탐(False Negative)의 균형을 최적화한다. 임계값을 너무 낮추면 오탐이 증가하고, 너무 높이면 미탐이 증가한다. 실제 환경의 정상 트래픽 패턴을 고려하여 합리적 기준을 설정한다."
    verify:
      type: "output_contains"
      expect: "Detection Rule Tuning"

  - order: 7
    instruction: "에이전트 간 적대적 학습(Adversarial Training) 전략을 설계하라. Red와 Blue가 서로의 전략을 학습하여 강화되는 메커니즘을 구상하라."
    hint: "GAN(Generative Adversarial Network)의 원리를 보안 에이전트에 적용한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/adversarial_training.txt << 'EOF'\n=== Adversarial Training Design ===\n\n1. Training Loop:\n   Epoch 1-10: Basic scenarios (known attacks vs known defenses)\n   Epoch 11-50: Red adapts to Blue's detection patterns\n   Epoch 51-100: Blue adapts to Red's evasion patterns\n   Epoch 100+: Both converge to Nash equilibrium\n\n2. Red Agent Evolution:\n   Gen 1: Script-kiddie (known exploits, default settings)\n   Gen 2: Tactical (encoded payloads, timing variation)\n   Gen 3: Strategic (multi-vector, LOLBins, mimicry)\n   Gen 4: Adaptive (real-time strategy adjustment)\n\n3. Blue Agent Evolution:\n   Gen 1: Signature-based (static rules)\n   Gen 2: Behavioral (baseline comparison)\n   Gen 3: Predictive (ML anomaly detection)\n   Gen 4: Proactive (threat hunting + deception)\n\n4. Nash Equilibrium:\n   - Both agents reach optimal mixed strategy\n   - Red: randomize attack vectors (unpredictable)\n   - Blue: multi-layered detection (comprehensive)\n   - No agent can unilaterally improve\n\n5. Training Infrastructure:\n   - Isolated network per episode\n   - Automated scoring and reward\n   - Episode replay for analysis\nEOF\ncat /tmp/adversarial_training.txt"
    answer_detail: "적대적 학습은 GAN의 원리를 보안에 적용한다. Red와 Blue 에이전트가 서로의 전략에 적응하며 진화하고, 최종적으로 내시 균형(Nash Equilibrium)에 도달한다. 이 과정에서 양쪽 에이전트의 성능이 동시에 향상되어 현실적인 공방 역량을 구축한다."
    verify:
      type: "output_contains"
      expect: "Adversarial Training"

  - order: 8
    instruction: "에이전트 메모리 시스템을 설계하라. 에이전트가 과거 경험을 기억하고 활용하는 메모리 아키텍처를 구성하라."
    hint: "OpsClaw의 memory_manager 패키지를 참고하여 전투 메모리를 설계한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/agent_memory_design.txt << 'EOF'\n=== Agent Memory Architecture ===\n\n1. Short-term Memory (current battle):\n   - Actions taken this round\n   - Detected defenses/vulnerabilities\n   - Current access level\n   - Remaining tools/options\n   Capacity: 10 most recent events\n\n2. Working Memory (current session):\n   - Battle plan and progress\n   - Known network topology\n   - Discovered credentials\n   - Active C2 channels\n   Capacity: Full session state\n\n3. Long-term Memory (cross-session):\n   - Successful attack patterns (runbook)\n   - Failed approaches (avoid list)\n   - Target system profiles\n   - Opponent behavior patterns\n   Capacity: 200 entries (LRU eviction)\n\n4. Episodic Memory (specific battles):\n   - Full battle replays\n   - Winning/losing strategies\n   - Opponent adaptation patterns\n   Capacity: 50 most recent battles\n\nIntegration with memory_manager:\n  auto_extract_memories(project_id) → Extract battle learnings\n  enforce_capacity(max_task=200) → LRU capacity management\nEOF\ncat /tmp/agent_memory_design.txt"
    answer_detail: "에이전트 메모리 아키텍처는 단기(현재 라운드), 작업(현재 세션), 장기(크로스 세션), 에피소드(특정 전투) 4계층으로 구성한다. memory_manager 패키지의 auto_extract_memories로 전투 후 학습 내용을 자동 추출하고, enforce_capacity로 LRU 관리한다."
    verify:
      type: "output_contains"
      expect: "Agent Memory Architecture"

  - order: 9
    instruction: "에이전트 성능 벤치마크를 설계하라. AI 에이전트의 성능을 정량적으로 측정하는 벤치마크 테스트를 구성하라."
    hint: "표준화된 시나리오에서 에이전트 성능을 측정하는 테스트 스위트를 설계한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/agent_benchmark.txt << 'EOF'\n=== AI Agent Performance Benchmark ===\n\nTest Suite: 10 standardized scenarios\n\n| # | Scenario | Difficulty | Time Limit | Pass Criteria |\n|---|----------|-----------|------------|---------------|\n| 1 | Port scan + service ID | Easy | 5 min | 80% services found |\n| 2 | Web SQLi exploitation | Medium | 10 min | Admin access gained |\n| 3 | SSH lateral movement | Medium | 10 min | 2nd host accessed |\n| 4 | Persistence establishment | Medium | 5 min | Survives reboot |\n| 5 | C2 beacon setup | Hard | 15 min | 5 min undetected |\n| 6 | Data exfiltration | Hard | 15 min | >1KB extracted |\n| 7 | Full kill chain | Hard | 30 min | Flag captured |\n| 8 | Stealth operation | Hard | 30 min | 0 alerts triggered |\n| 9 | Multi-target campaign | Expert | 45 min | 3 hosts compromised |\n| 10 | Defend against APT | Expert | 45 min | Exfil prevented |\n\nScoring: Pass/Fail + Time + Stealth bonus\nRanking: ELO-style rating across agents\nEOF\ncat /tmp/agent_benchmark.txt"
    answer_detail: "에이전트 벤치마크는 10개의 표준화된 시나리오에서 성능을 측정한다. Easy→Expert 난이도, 시간 제한, 명확한 합격 기준을 정의하여 객관적 비교가 가능하다. ELO 레이팅 시스템으로 에이전트 간 순위를 매기고 성능 추이를 추적한다."
    verify:
      type: "output_contains"
      expect: "Agent Performance Benchmark"

  - order: 10
    instruction: "프롬프트 A/B 테스트를 설계하라. 두 가지 버전의 Red Agent 프롬프트를 비교 평가하는 실험을 설계하라."
    hint: "통제 변수, 측정 지표, 통계적 유의성 검정 방법을 정의한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/prompt_ab_test.txt << 'EOF'\n=== Prompt A/B Test Design ===\n\n1. Hypothesis:\n   Structured output format (THINK/ACTION/OBSERVE/NEXT)\n   improves Red Agent success rate by >15%\n\n2. Test Setup:\n   Prompt A (Control): Free-form output\n   Prompt B (Treatment): Structured output format\n   Same LLM, same scenario, same target\n\n3. Variables:\n   Independent: Prompt structure (A vs B)\n   Dependent: Success rate, time to objective, stealth score\n   Controlled: LLM model, temperature, target, network state\n\n4. Sample Size:\n   n = 30 battles per prompt version (60 total)\n   Power analysis: 80% power, alpha=0.05, effect=15%\n\n5. Metrics:\n   Primary: Mission success rate (%)\n   Secondary: Mean time to objective (seconds)\n   Tertiary: Stealth score (0-10)\n\n6. Statistical Test:\n   Chi-square for success rate (categorical)\n   Mann-Whitney U for time/stealth (non-normal)\n   p < 0.05 for significance\n\n7. Expected Result:\n   Prompt B (structured) → +20% success, -30% time\nEOF\ncat /tmp/prompt_ab_test.txt"
    answer_detail: "프롬프트 A/B 테스트는 과학적 방법론으로 프롬프트 효과를 평가한다. 단일 변수(프롬프트 구조)만 변경하고 나머지를 통제하여, 구조화된 출력이 성공률에 미치는 영향을 통계적으로 검증한다. 30회 이상의 반복으로 통계적 유의성을 확보한다."
    verify:
      type: "output_contains"
      expect: "Prompt A/B Test"

  - order: 11
    instruction: "에이전트 앙상블 전략을 설계하라. 여러 LLM을 조합하여 에이전트 성능을 향상시키는 앙상블 아키텍처를 구상하라."
    hint: "투표(voting), 체인(chaining), 전문화(specialization) 전략을 비교한다."
    category: "analysis"
    points: 10
