lab_id: battle-adv-nonai-week11
title: 내부자 위협 시나리오 — Insider Threat 탐지와 대응
version: non-ai
course: battle-adv-nonai
week: 11
description: 내부자 위협(Insider Threat) 시나리오를 시뮬레이션하고 탐지한다. 권한 남용, 데이터 스테이징, 비인가 접근을 Red
  Phase에서 재현하고, Blue Phase에서 UBA(User Behavior Analytics), 파일 접근 감사, DLP를 구축한다.
difficulty: hard
duration_minutes: 150
objectives:
- 내부자 위협의 유형과 지표를 이해한다
- 권한 남용과 데이터 스테이징을 시뮬레이션한다
- UBA 기반 이상 행위 탐지를 구현한다
- 내부자 위협 대응 IR 플레이북을 작성한다
prerequisites:
- battle-adv-nonai week10 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 내부자 시나리오 — 정상 사용자 권한으로 시스템 정보를 수집하라. sudo 권한, 접근 가능한 파일, 네트워크
    연결을 조사하라.'
  hint: id, sudo -l, find로 접근 가능한 민감 파일과 권한을 조사한다.
  category: recon
  points: 10
  answer: echo '=== Insider Recon (Legitimate User) ===' && echo '[1] Current privileges:'
    && id && echo '[2] Sudo permissions:' && echo '1' | sudo -S -l 2>&1 | tail -10
    && echo '[3] Accessible config files:' && find /etc -readable -name '*.conf' -type
    f 2>/dev/null | head -10 && echo '[4] SSH keys:' && find /home -name 'authorized_keys'
    -o -name 'id_*' 2>/dev/null | head -5
  answer_detail: 내부자 위협의 첫 단계는 정상 권한 범위 내에서의 정보 수집이다. sudo 권한, 읽기 가능한 설정 파일, SSH 키는
    권한 상승이나 측면 이동에 활용될 수 있다.
  verify:
    type: output_contains
    expect: Insider Recon
    semantic:
      intent: '[RED] 내부자 정찰 — id + sudo -l + find /etc -readable -name ''*.conf''
        + find /home -name authorized_keys. 정상 권한 내 sudo/설정/SSH 키 수집. MITRE T1087
        Account Discovery + T1083 File Discovery.'
      success_criteria:
      - Insider Recon 키워드
      - id + sudo -l + find
      - T1087/T1083
      acceptable_methods:
      - id + sudo -l + find 조합
      - LinPEAS 열거
      - BloodHound Linux
      negative_signs:
      - 단일 명령
      - sudo 권한 미확인
      - SSH 키 탐색 없음
  target_vm: attacker
- order: 2
  instruction: '[RED] 데이터 스테이징 — 민감 파일을 수집하여 하나의 아카이브로 압축하라. /etc/passwd, 설정 파일, 로그
    파일을 수집하라.'
  hint: tar로 여러 파일을 하나의 아카이브로 압축한다.
  category: exploit
  points: 10
  answer: mkdir -p /tmp/insider_staging && cp /etc/passwd /tmp/insider_staging/ 2>/dev/null
    && cp /etc/hosts /tmp/insider_staging/ 2>/dev/null && echo "INSIDER_EXFIL_DATA"
    ※ /tmp/insider_staging/secret.txt && tar czf /tmp/insider_archive.tar.gz -C /tmp
    insider_staging && ls -la /tmp/insider_archive.tar.gz && echo "Data staged successfully"
  answer_detail: 데이터 스테이징(T1074)은 유출 전 데이터를 하나의 위치에 수집하고 압축하는 단계이다. 내부자는 정상 권한으로 접근
    가능한 파일을 조용히 수집한다.
  verify:
    type: output_contains
    expect:
    - Data staged
    - tar
    semantic:
      intent: '[RED] 데이터 스테이징 — mkdir insider_staging + cp /etc/passwd + cp /etc/hosts
        + tar czf insider_archive.tar.gz. 민감 파일 수집 → 단일 아카이브 압축. MITRE T1074 Data
        Staged + T1560 Archive Collected Data.'
      success_criteria:
      - Data staged 키워드
      - tar czf 아카이브
      - T1074 + T1560
      acceptable_methods:
      - cp + tar 수집/압축
      - rsync + 7zip
      - zip -r
      negative_signs:
      - 단일 파일
      - 압축 없음
      - MITRE 누락
  target_vm: attacker
- order: 3
  instruction: '[RED] 비인가 접근 — 정상 업무 시간 외(야간)에 다른 서버에 SSH 접근을 시도하라. 시간대를 시뮬레이션하여 비정상
    접근 패턴을 생성하라.'
  hint: SSH로 다른 서버에 접근하고, 업무 외 시간 접근을 시뮬레이션한다.
  category: exploit
  points: 10
  answer: 'echo "=== Insider Off-hours Access ===" && echo "Simulated time: 02:30
    AM (off-hours)" && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no ccc@10.20.30.80
    "hostname && echo access_at_$(date +%H%M)" 2>&1 | head -3 && ssh -o ConnectTimeout=3
    -o StrictHostKeyChecking=no ccc@10.20.30.100 "hostname && ls /var/ossec/logs/
    2>/dev/null" 2>&1 | head -5 && echo "Off-hours SSH to web and SIEM servers simulated"'
  answer_detail: 내부자의 비정상 접근 패턴으로 업무 외 시간(야간) 접근, 평소 사용하지 않는 서버 접근, SIEM 로그 접근 시도
    등이 있다. UBA는 이러한 기준선 이탈을 탐지한다.
  verify:
    type: output_contains
    expect:
    - Off-hours
    - ssh
    semantic:
      intent: '[RED] 비인가 업무 외 접근 — ssh -o ConnectTimeout=3 ccc@10.20.30.80 + ssh ccc@10.20.30.100
        (02:30 AM 시뮬). 야간 + 평소 미접근 서버 + SIEM 로그 조회. MITRE T1078 Valid Accounts + UBA
        기준선 이탈.'
      success_criteria:
      - Off-hours 키워드
      - 야간 SSH + 다중 서버
      - T1078
      acceptable_methods:
      - ssh 야간 + 평소 미접근 서버
      - RDP off-hours
      - VPN 야간 로그인
      negative_signs:
      - 단일 서버
      - 시간 시뮬 없음
      - UBA 이탈 맥락 없음
  target_vm: attacker
- order: 4
  instruction: '[BLUE] Phase 전환 — UBA(User Behavior Analytics) 분석을 수행하라. auth.log에서
    사용자별 로그인 시간, 소스 IP, 빈도를 분석하라.'
  hint: auth.log에서 로그인 시간, 소스 IP, 사용자를 분석한다.
  category: defense
  points: 10
  answer: 'echo "=== User Behavior Analysis ===" && echo "[1] Login time distribution:"
    && grep "Accepted\|session opened" /var/log/auth.log 2>/dev/null | awk "{print
    \$1,\$2,\$3}" | cut -d: -f1 | sort | uniq -c | head -10 && echo "[2] Login source
    IPs:" && grep "Accepted" /var/log/auth.log 2>/dev/null | grep -oP "from \K[0-9.]+"
    | sort | uniq -c | sort -rn | head -10 && echo "[3] Failed logins by user:" &&
    grep "Failed" /var/log/auth.log 2>/dev/null | grep -oP "for \K\w+" | sort | uniq
    -c | sort -rn | head -10 && echo "UBA analysis complete"'
  answer_detail: UBA는 로그인 시간(업무 외 시간), 소스 IP(비정상 위치), 실패 패턴(브루트포스)을 분석하여 정상 행동 기준선에서
    벗어나는 활동을 탐지한다.
  verify:
    type: output_contains
    expect: User Behavior Analysis
    semantic:
      intent: '[BLUE] UBA 분석 — grep Accepted /var/log/auth.log + awk 시간/IP 추출 + sort|uniq
        -c. 로그인 시간 분포 + 소스 IP 빈도 + 실패 패턴 3축. 기준선 이탈 탐지. Gartner UEBA.'
      success_criteria:
      - User Behavior Analysis 키워드
      - 시간/IP/실패 3축
      - awk + uniq 통계
      acceptable_methods:
      - grep + awk + uniq 통계
      - Splunk UBA
      - Exabeam Advanced Analytics
      negative_signs:
      - 축 1개
      - 통계 미집계
      - 기준선 개념 없음
  target_vm: secu
- order: 5
  instruction: '[BLUE] Wazuh에서 내부자 위협을 탐지하는 규칙을 작성하라. 대량 파일 접근, 업무 외 시간 SSH, 민감 디렉토리
    접근을 탐지하라.'
  hint: Wazuh 규칙 XML로 내부자 위협 지표를 탐지한다.
  category: defense
  points: 10
  answer: '🖥️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인

    📎 참고 (CLI): cat > /tmp/insider_threat_rules.xml << ''EOF'' <group name="insider_threat">
    <rule id="100500" level="12" frequency="20" timeframe="300"> <if_sid>554</if_sid>
    <match>open|read</match> <description>INSIDER: Mass file access - 20+ reads in
    5 min</description> <mitre><id>T1005</id></mitre> </rule> <rule id="100501" level="10">
    <if_sid>5715</if_sid> <time>10pm - 6am</time> <description>INSIDER: SSH login
    during off-hours</description> <mitre><id>T1078</id></mitre> </rule> <rule id="100502"
    level="12"> <if_sid>554</if_sid> <match>/var/ossec|/etc/shadow|/etc/sudoers</match>
    <description>INSIDER: Access to sensitive security files</description> <mitre><id>T1003</id></mitre>
    </rule> </group> EOF cat /tmp/insider_threat_rules.xml'
  answer_detail: 내부자 위협 탐지 규칙은 대량 파일 접근(T1005), 업무 외 시간 SSH(T1078), 보안 파일 접근(T1003)을
    탐지한다. time 필드로 시간대 기반 탐지를 구현한다.
  verify:
    type: output_contains
    expect: insider_threat
    semantic:
      intent: '[BLUE] Wazuh 내부자 위협 규칙 — <rule id=100500 frequency=20 timeframe=300
        T1005> 대량 파일 접근 / <rule id=100501 time=10pm-6am T1078> 야간 SSH / <rule id=100502
        match=/etc/shadow T1003> 보안 파일 접근. 3종 규칙.'
      success_criteria:
      - insider_threat 그룹
      - 3종 규칙 + MITRE
      - time/frequency 시간 기반
      acceptable_methods:
      - Wazuh 다중 시나리오 규칙
      - Sigma insider detection
      - Splunk UBA ruleset
      negative_signs:
      - 규칙 1개
      - MITRE 누락
      - time 필드 없음
  target_vm: siem
- order: 6
  instruction: '[BLUE] 내부자 위협 대응 IR 플레이북을 작성하라. 내부자 특성상 법적/HR 절차를 포함하라.'
  hint: 기술적 대응뿐 아니라 HR 통보, 법적 절차, 증거 보존을 포함한다.
  category: response
  points: 10
  answer: 'cat > /tmp/ir_insider_playbook.txt << ''EOF'' === IR Playbook: Insider
    Threat === Playbook ID: IR-INSIDER-001 | Sensitivity: CONFIDENTIAL

    Step 1: VERIFY (Do NOT alert the insider) - Confirm anomalous behavior from multiple
    sources - Check: Is this authorized activity? (verify with manager) - Document
    all evidence with timestamps

    Step 2: COVERT MONITORING (with legal approval) - Enable enhanced logging on insider''s
    accounts - Deploy file access auditing (auditd) - Monitor network connections
    from insider''s workstation - Duration: 48-72 hours

    Step 3: EVIDENCE PRESERVATION - Forensic image of insider''s workstation - Export
    all SIEM logs related to insider - Chain of Custody for all evidence - Legal hold
    on email and communications

    Step 4: CONTAINMENT (coordinate with HR/Legal) - Disable insider''s accounts (all
    systems simultaneously) - Revoke VPN/SSH keys - Block insider''s IP at perimeter
    - Preserve insider''s workstation (do not wipe)

    Step 5: INVESTIGATION - Timeline of all insider activities - Data accessed and
    potentially exfiltrated - Scope of compromise (which systems, what data)

    Step 6: REMEDIATION + LEGAL - HR disciplinary action - Legal proceedings if criminal
    - Rotate all credentials insider had access to - Update access controls (least
    privilege) EOF cat /tmp/ir_insider_playbook.txt'
  answer_detail: 내부자 위협 IR은 외부 공격과 달리 법적/HR 절차가 필수이다. 조기 경보 없이(내부자에게 알리지 않고) 모니터링하고,
    법적 승인 하에 증거를 수집한다.
  verify:
    type: output_contains
    expect:
    - Insider Threat
    - 플레이북
    semantic:
      intent: '[BLUE] 내부자 IR 플레이북 — cat > ir_insider_playbook.txt: IR-INSIDER-001
        CONFIDENTIAL. 6단계 VERIFY(no alert)→COVERT MONITORING(법적 승인 48-72h)→EVIDENCE(forensic
        image+legal hold)→CONTAINMENT(HR 공조)→INVESTIGATION→REMEDIATION+LEGAL. NIST
        SP 800-61 + Cert Insider.'
      success_criteria:
      - Insider Threat Playbook
      - 6단계 + HR/Legal
      - Covert Monitoring + Chain of Custody
      acceptable_methods:
      - cat > 플레이북 + HR 공조
      - CERT Insider Threat Guide
      - Ponemon Insider Framework
      negative_signs:
      - 외부 공격 IR 그대로
      - HR/Legal 누락
      - Covert 없음
  target_vm: siem
- order: 7
  instruction: '[BLUE] 내부자 위협 방지를 위한 접근 제어 강화 정책을 설계하라. 최소 권한, 직무 분리, 접근 리뷰를 포함하라.'
  hint: RBAC, 직무 분리, 정기 접근 리뷰를 설계한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/insider_prevention.txt << ''EOF'' === Insider Threat Prevention
    Policy ===

    1. Least Privilege (10.20.30.0/24): - attacker: Red tools only, no production
    access - secu: Security config only, no web app access - web: Web service only,
    no security tool access - siem: Log read-only, no system modification

    2. Separation of Duties: - Security admin != System admin - Log reviewer != Log
    source admin - No single person controls full kill chain

    3. Access Review (quarterly): - Audit all SSH keys and authorized_keys - Review
    sudo permissions per user - Validate service account permissions - Remove dormant
    accounts (90+ days inactive)

    4. Technical Controls: - MFA on all SSH access - Session recording (asciinema/ttyrec)
    - USB device blocking (udev rules) - DLP on all egress points EOF cat /tmp/insider_prevention.txt'
  answer_detail: 내부자 위협 방지는 최소 권한, 직무 분리, 정기 접근 리뷰의 3원칙을 기반으로 한다. MFA, 세션 기록, USB
    차단, DLP로 기술적 통제를 보완한다.
  verify:
    type: output_contains
    expect: Insider Threat Prevention
    semantic:
      intent: '[BLUE] 내부자 방지 정책 — cat > insider_prevention.txt: 1)Least Privilege
        (4 역할별 격리) 2)직무 분리 (security!=system) 3)접근 리뷰 분기별 (SSH 키/sudo/dormant 90일)
        4)기술 통제 (MFA/세션 기록/USB/DLP). NIST SP 800-53 AC-6.'
      success_criteria:
      - Insider Threat Prevention 키워드
      - 4대 정책 (최소권한/직무분리/리뷰/기술)
      - 분기별 리뷰
      acceptable_methods:
      - cat > 정책 + 4원칙
      - NIST SP 800-53 AC
      - ISO 27001 A.9
      negative_signs:
      - 정책 2개 이하
      - 직무분리 없음
      - 기술 통제 없음
  target_vm: secu
- order: 8
  instruction: '[RED/BLUE] 환경을 정리하고 내부자 위협 평가 보고서를 작성하라.'
  hint: 스테이징 파일을 삭제하고, 내부자 위협 유형, 탐지 방법, 방지 대책을 정리한다.
  category: analysis
  points: 15
  answer: 'rm -rf /tmp/insider_staging /tmp/insider_archive.tar.gz /tmp/insider_*.txt
    /tmp/insider_*.xml /tmp/ir_insider_*.txt 2>/dev/null && cat > /tmp/insider_report.txt
    << ''EOF'' === Insider Threat Assessment Report === Date: 2026-04-06 | Scope:
    10.20.30.0/24

    1. Scenarios Tested: - Privilege reconnaissance (T1087): Discovered sudo + config
    files - Data staging (T1074): Archived sensitive files (2.1KB) - Off-hours access
    (T1078): SSH to web/SIEM at simulated 02:30 - SIEM log access: Attempted to view
    security logs

    2. Detection Results: | Indicator | Detected | Method | |-----------|----------|--------|
    | Mass file access | NO | No auditd rules | | Off-hours SSH | YES | auth.log +
    time rule | | SIEM log access | PARTIAL | SSH logged | | Data staging | NO | No
    DLP/FIM |

    3. Key Findings: [C-01] No file access auditing (auditd not configured) [C-02]
    No DLP to detect data staging/exfiltration [H-01] No UBA baseline established
    [H-02] No session recording

    4. Recommendations: - Deploy auditd with file access monitoring - Implement UBA
    with baseline behavior profiling - Enable session recording for privileged users
    - Establish insider threat program with HR/Legal

    MITRE ATT&CK: T1078, T1087, T1005, T1074, T1048 EOF cat /tmp/insider_report.txt'
  answer_detail: 내부자 위협 보고서는 시나리오 테스트 결과, 탐지 현황(25% 탐지율), 핵심 Gap(auditd/DLP 부재), 권고사항을
    포함한다.
  verify:
    type: output_contains
    expect: Insider Threat Assessment
    semantic:
      intent: '[RED/BLUE] 내부자 위협 평가 보고서 — rm 정리 + cat > insider_report.txt: Scenarios(T1087/T1074/T1078/SIEM
        access) + Detection 표 (Mass NO/Off-hours YES/SIEM PARTIAL/Staging NO) + Findings
        (C-01 auditd 없음/C-02 DLP 없음/H-01 UBA 기준선) + MITRE T1078/T1087/T1005/T1074/T1048.'
      success_criteria:
      - Insider Threat Assessment 키워드
      - Detection 표 + Findings
      - MITRE 5종
      acceptable_methods:
      - cat > 보고서 + 표
      - Ponemon Insider Threat Report
      - CERT Insider Framework
      negative_signs:
      - Detection 정량 없음
      - Findings 분류 없음
      - MITRE 누락
  target_vm: attacker
