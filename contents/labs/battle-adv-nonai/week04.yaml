lab_id: battle-adv-nonai-week04
title: 측면 이동 심화 — 자격 증명 기반 공격과 네트워크 세분화
version: non-ai
course: battle-adv-nonai
week: 4
description: 내부 네트워크에서의 측면 이동(Lateral Movement) 기법을 실습한다. SSH 키 재사용, Pass-the-Hash
  시뮬레이션, 자격 증명 기반 이동을 Red Phase에서 수행하고, Blue Phase에서 네트워크 세그먼테이션과 Honey Token 기반 탐지를
  구현한다.
difficulty: hard
duration_minutes: 150
objectives:
- SSH 기반 측면 이동 기법을 실습한다
- Pass-the-Hash 원리와 Impacket 도구를 분석한다
- 네트워크 세그먼테이션을 설계하고 구현한다
- Honey Token으로 측면 이동을 조기 탐지한다
prerequisites:
- battle-adv-nonai week03 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 내부 네트워크 10.20.30.0/24의 활성 호스트를 열거하고 각 호스트의 SMB/SSH 서비스를 확인하라.'
  hint: nmap -sn으로 호스트 발견 후 SSH/SMB 포트를 스캔한다.
  category: recon
  points: 10
  answer: nmap -sn --max-retries 1 --host-timeout 15s -T4 10.20.30.0/24 -oG /tmp/lateral_hosts.txt
    && grep 'Up' /tmp/lateral_hosts.txt && nmap -p 22,445 --max-retries 1 --host-timeout
    15s -T4 10.20.30.1 10.20.30.80 10.20.30.100
  answer_detail: 측면 이동의 첫 단계는 내부 호스트 파악이다(T1018). SSH(22)와 SMB(445) 서비스는 측면 이동의 핵심
    경로이다.
  verify:
    type: output_contains
    expect: Up
    semantic:
      intent: '[RED] 내부 호스트 + 서비스 — nmap -sn /24 + nmap -p 22,445. 측면 이동 첫 단계. SSH/SMB
        핵심 경로. MITRE T1018.'
      success_criteria:
      - Up 키워드
      - nmap -sn + -p 22,445
      - 다중 호스트
      acceptable_methods:
      - nmap -sn + -p
      - arp-scan + nc
      - fping + masscan
      negative_signs:
      - SSH/SMB 미점검
      - 단일 호스트
      - 측면 이동 맥락 없음
  target_vm: attacker
- order: 2
  instruction: '[RED] 로컬 시스템의 패스워드 해시를 분석하고, Pass-the-Hash 공격의 원리와 Impacket 도구의 측면
    이동 기법을 정리하라.'
  hint: /etc/shadow에서 해시 형식을 확인하고 PtH 원리를 문서화한다.
  category: exploit
  points: 10
  answer: "echo '1' | sudo -S cat /etc/shadow 2>/dev/null | grep -v ':\\*:\\|:!:'\
    \ | head -5; echo '---'; echo 'Hash formats: $1$=MD5, $5$=SHA-256, $6$=SHA-512,\
    \ $y$=yescrypt'; echo ''; cat > /tmp/pth_simulation.txt << 'EOF'\n=== Pass-the-Hash\
    \ Attack Simulation ===\n1. NTLM Hash Format: LM_HASH:NT_HASH\n2. Attack Tools:\n\
    \   pth-smbclient //target/share -U domain/user%hash --pw-nt-hash\n   impacket-psexec\
    \ -hashes LM:NT user@target\n   impacket-wmiexec -hashes LM:NT user@target\n3.\
    \ Why it works: NTLM auth uses hash directly - no plaintext needed\n4. Detection:\
    \ Event ID 4624 Type 3 with NTLM, same hash from multiple IPs\nEOF\ncat /tmp/pth_simulation.txt"
  answer_detail: Pass-the-Hash(T1550.002)는 NTLM 인증의 설계적 취약점을 이용한다. 해시 자체로 인증하므로 평문
    비밀번호가 필요 없다. Impacket의 psexec/wmiexec/smbexec은 각각 다른 프로토콜로 측면 이동을 수행한다.
  verify:
    type: output_contains
    expect: Pass-the-Hash
    semantic:
      intent: '[RED] Pass-the-Hash — shadow 해시 형식 ($1 MD5/$5 SHA256/$6 SHA512/$y yescrypt)
        + Impacket (pth-smbclient/psexec/wmiexec -hashes LM:NT). NTLM 설계 취약점. 평문 비번
        불필요. 탐지: Event 4624 Type 3 + 동일 해시 다중 IP. MITRE T1550.002.'
      success_criteria:
      - Pass-the-Hash 키워드
      - NTLM hash 형식 + Impacket
      - 탐지 맥락
      acceptable_methods:
      - 수동 PtH 시뮬
      - Impacket 전체 도구
      - Mimikatz + pth
      negative_signs:
      - NTLM 맥락 없음
      - 도구 1개 이하
      - 탐지 없음
  target_vm: attacker
- order: 3
  instruction: '[RED] SSH 키 기반 측면 이동을 실습하라. 키를 생성하여 다른 서버({{SECU_IP}}, {{WEB_IP}})로의
    SSH 접근을 시도하라.'
  hint: ssh -i 옵션으로 개인키를 지정하여 다른 서버에 접근한다.
  category: exploit
  points: 10
  answer: ssh-keygen -t ed25519 -f /tmp/lateral_key -N '' -q && echo 'Testing SSH
    lateral movement:' && ssh -i /tmp/lateral_key -o ConnectTimeout=3 -o StrictHostKeyChecking=no
    ccc@10.20.30.1 'hostname' 2>&1 | head -5 && ssh -i /tmp/lateral_key -o ConnectTimeout=3
    -o StrictHostKeyChecking=no ccc@10.20.30.80 'hostname' 2>&1 | head -5
  answer_detail: SSH를 이용한 측면 이동(T1021.004)은 Linux 환경에서 가장 흔한 기법이다. authorized_keys에
    등록된 키가 있으면 비밀번호 없이 접근이 가능하다.
  verify:
    type: output_contains
    expect:
    - SSH lateral
    - ssh-keygen
    semantic:
      intent: '[RED] SSH 키 측면이동 — ssh-keygen + ssh -i /tmp/lateral_key -o StrictHostKeyChecking=no
        10.20.30.1/80. authorized_keys 기반 비번 불필요. Linux 측면 이동 가장 흔한 기법. MITRE T1021.004.'
      success_criteria:
      - SSH lateral 키워드
      - ssh-keygen + ssh -i 다중 호스트
      - ed25519
      acceptable_methods:
      - ssh -i + 다중
      - ssh-copy-id
      - ansible ad-hoc
      negative_signs:
      - 단일 호스트
      - 비번 사용
      - SSH 키 맥락 없음
  target_vm: attacker
- order: 4
  instruction: '[BLUE] Phase 전환 — 측면 이동 탐지를 위한 Suricata 규칙을 작성하라. 내부 호스트 간 비정상 SSH/SMB
    연결을 감지하라.'
  hint: 내부 호스트 간 통상적이지 않은 포트 연결을 모니터링한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/lateral_detection_rules.txt << ''EOF'' # Suricata Lateral Movement
    Detection alert tcp 10.20.30.0/24 any -> 10.20.30.0/24 445 (msg:"LATERAL: Internal
    SMB connection"; flow:to_server,established; threshold:type both, track by_src,
    count 3, seconds 60; sid:3000001; rev:1;) alert tcp 10.20.30.0/24 any -> 10.20.30.0/24
    22 (msg:"LATERAL: Internal SSH connection"; flow:to_server,established; threshold:type
    both, track by_src, count 5, seconds 60; sid:3000002; rev:1;) alert tcp 10.20.30.0/24
    any -> 10.20.30.0/24 135 (msg:"LATERAL: Internal WMI/DCOM connection"; flow:to_server,established;
    sid:3000003; rev:1;) EOF cat /tmp/lateral_detection_rules.txt'
  answer_detail: 내부 호스트 간 통신의 정상 기준선을 설정하고 이탈을 감지한다. 워크스테이션 간 SMB(445), SSH(22), WMI(135)
    연결은 비정상적이며, threshold로 짧은 시간 내 다수 연결을 감지한다.
  verify:
    type: output_contains
    expect: LATERAL
    semantic:
      intent: '[BLUE] Suricata 측면이동 룰 — 내부 10.20.30.0/24 SMB(445) threshold 3/60s
        + SSH(22) threshold 5/60s + WMI/DCOM(135). 내부 통신 기준선 이탈 탐지. LATERAL prefix.
        MITRE D3FEND.'
      success_criteria:
      - LATERAL 키워드
      - 내부 → 내부 룰 (SMB/SSH/WMI)
      - threshold + sid
      acceptable_methods:
      - Suricata lateral 룰
      - Zeek conn.log 분석
      - Wazuh correlation
      negative_signs:
      - 외부만
      - 단일 프로토콜
      - threshold 없음
  target_vm: secu
- order: 5
  instruction: '[BLUE] nftables로 서버 역할별 네트워크 세그먼테이션 정책을 설계하라. control_plane, security_tier,
    web_tier, siem_tier 간 필요한 통신만 허용하라.


    [FIXTURE] /home/ccc/cyber-range/fixtures/battle-adv-nonai-week04/5/syslog 사전 주입.
    `grep -E ''DROP|REJECT|filter'' /home/ccc/cyber-range/fixtures/battle-adv-nonai-week04/5/syslog`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: 서버 역할별로 set을 정의하고, 그룹 간 필요한 포트만 허용한다.
  category: defense
  points: 10
  answer: "cat > /tmp/segmentation_policy.nft << 'EOF'\n#!/usr/sbin/nft -f\ntable\
    \ inet segmentation {\n  set control_plane { type ipv4_addr; elements = { 10.20.30.201\
    \ } }\n  set security_tier { type ipv4_addr; elements = { 10.20.30.1 } }\n  set\
    \ web_tier { type ipv4_addr; elements = { 10.20.30.80 } }\n  set siem_tier { type\
    \ ipv4_addr; elements = { 10.20.30.100 } }\n  chain forward {\n    type filter\
    \ hook forward priority 0; policy drop;\n    ip saddr @control_plane accept\n\
    \    ip saddr @web_tier ip daddr @security_tier drop\n    ip saddr @web_tier ip\
    \ daddr @siem_tier drop\n    ip saddr @siem_tier tcp dport { 514, 1514 } accept\n\
    \    ct state established,related accept\n  }\n}\nEOF\ncat /tmp/segmentation_policy.nft"
  answer_detail: 네트워크 세그먼테이션은 측면 이동 방지의 가장 효과적인 방어이다. 기본 정책을 drop으로 설정하고 화이트리스트 방식으로
    필요한 통신만 허용한다.
  verify:
    type: output_contains
    expect: segmentation
    semantic:
      intent: '[BLUE] nftables 세그먼테이션 — 4 티어 (control_plane/security_tier/web_tier/siem_tier)
        set + chain forward policy drop + 필요 통신만 accept (siem 514/1514 rsyslog). Zero
        Trust 마이크로 세그먼테이션. NIST SP 800-207.'
      success_criteria:
      - segmentation 키워드
      - 4 티어 set + chain forward
      - policy drop + 화이트리스트
      acceptable_methods:
      - nft set per tier
      - VLAN 세그먼테이션
      - Cilium Network Policy
      negative_signs:
      - 티어 2개 이하
      - drop 정책 없음
      - Zero Trust 맥락 없음
  target_vm: secu
  fixtures:
  - generator: firewall_log
    target_vm: secu
    path: /home/ccc/cyber-range/fixtures/battle-adv-nonai-week04/5/syslog
    params:
      seed: 42
      duration_days: 7
      scan_bursts: 5
      egress_violations: 20
      syn_flood_count: 200
    mode: overwrite
    cleanup: false
- order: 6
  instruction: '[BLUE] Honey Token을 이용한 측면 이동 탐지 함정을 설계하라. 가짜 자격 증명, SSH 키, 네트워크 공유를
    배치하는 계획을 작성하라.'
  hint: 가짜 SSH 키, 가짜 비밀번호 파일을 배치하여 접근 시도를 탐지한다.
  category: defense
  points: 10
  answer: "cat > /tmp/honey_tokens.txt << 'EOF'\n=== Honey Token Deployment Plan ===\n\
    \n1. Fake Credentials:\n   - /home/admin/.ssh/config -> fake host entries pointing\
    \ to honeypot\n   - /opt/backup/credentials.txt -> fake passwords that trigger\
    \ alert on use\n\n2. Honey Services:\n   - 10.20.30.250:445 -> SMB honeypot (any\
    \ auth attempt = alert)\n   - 10.20.30.250:22 -> SSH honeypot (Cowrie)\n\n3. Detection\
    \ Triggers:\n   - Any login attempt to honeypot IPs -> CRITICAL alert\n   - Any\
    \ access to honey files -> CRITICAL alert\n\n4. SIEM Rule:\n   IF source_ip IN\
    \ internal_range AND dest_ip == honeypot_ip\n   THEN alert(\"Lateral Movement\
    \ Detected\", severity=CRITICAL)\nEOF\ncat /tmp/honey_tokens.txt"
  answer_detail: Honey Token은 공격자를 유인하여 조기 탐지하는 능동적 방어 기법이다. 정상 사용자는 절대 접근하지 않으므로
    접근 시도 자체가 침해 지표가 된다.
  verify:
    type: output_contains
    expect: Honey Token
    semantic:
      intent: '[BLUE] Honey Token — /home/admin/.ssh/config + /opt/backup/credentials.txt
        가짜 + 10.20.30.250:445 honeypot + SIEM 룰 internal→honeypot = CRITICAL. 공격자
        유인 조기 탐지. 정상 사용자 절대 미접근 = IoC. MITRE D3FEND Decoy.'
      success_criteria:
      - Honey Token 키워드
      - 4 카테고리 (가짜 자격/서비스/트리거/SIEM)
      - honeypot IP 전략
      acceptable_methods:
      - Honey Token 배치
      - Cowrie SSH
      - T-Pot 다중 honeypot
      negative_signs:
      - 토큰 1종
      - honeypot 없음
      - 탐지 트리거 없음
  target_vm: siem
- order: 7
  instruction: '[BLUE] Wazuh에서 동일 사용자가 5분 내 3개 이상 호스트에 SSH 로그인하는 측면 이동 패턴을 탐지하는 상관
    분석 규칙을 작성하라.'
  hint: frequency, timeframe, same_user 조건을 결합한다.
  category: defense
  points: 10
  answer: "\U0001F5A5️ UI: Wazuh Dashboard(https://SIEM_IP:443) 접속 → 해당 메뉴 확인\n\U0001F4CE\
    \ 참고 (CLI): cat > /tmp/wazuh_lateral_rule.xml << 'EOF'\n<group name=\"lateral_movement\"\
    >\n  <rule id=\"100200\" level=\"12\" frequency=\"3\" timeframe=\"300\">\n   \
    \ <if_sid>5715</if_sid>\n    <same_user />\n    <description>Lateral Movement:\
    \ Same user SSH to 3+ hosts in 5 min</description>\n    <mitre><id>T1021.004</id></mitre>\n\
    \  </rule>\n</group>\nEOF\ncat /tmp/wazuh_lateral_rule.xml"
  answer_detail: 동일 사용자의 다중 호스트 SSH 로그인은 측면 이동의 핵심 지표이다. same_user 조건으로 사용자별 추적하고
    frequency/timeframe으로 시간 윈도우를 설정한다.
  verify:
    type: output_contains
    expect: lateral_movement
    semantic:
      intent: '[BLUE] Wazuh 다중 호스트 SSH — composite rule frequency 3 timeframe 300
        + same_user + if_sid 5715 + MITRE T1021.004. 동일 사용자 5분 내 3+ 호스트 = 측면 이동. same_user
        추적.'
      success_criteria:
      - lateral_movement 키워드
      - frequency + same_user + MITRE
      - 5715 (SSH 룰 ID)
      acceptable_methods:
      - Wazuh same_user
      - Splunk stats count by user
      - Elastic timelion
      negative_signs:
      - same_user 없음
      - 단일 호스트
      - MITRE 누락
  target_vm: siem
- order: 8
  instruction: '[RED/BLUE] 환경을 정리하고 측면 이동 심화 종합 보고서를 작성하라. Zero Trust 기반 방어 전략을 포함하라.'
  hint: SSH 키와 임시 파일을 삭제하고, 공격 기법별 방어 권고사항을 정리한다.
  category: analysis
  points: 15
  answer: "rm -f /tmp/lateral_key* /tmp/pth_simulation.txt /tmp/lateral_hosts.txt\
    \ 2>/dev/null && cat > /tmp/lateral_report.txt << 'EOF'\n=== Lateral Movement\
    \ Assessment Report ===\nDate: 2026-04-06 | Scope: 10.20.30.0/24\n\n1. Techniques\
    \ Tested:\n   - Pass-the-Hash (T1550.002): Hash reuse simulation\n   - SSH Key\
    \ Reuse (T1021.004): Stolen key lateral access\n   - Impacket Tools: psexec/wmiexec/smbexec\
    \ analysis\n\n2. Findings:\n   [C-01] No network segmentation between server tiers\n\
    \   [C-02] Shared SSH keys across servers\n   [H-01] No internal traffic monitoring\n\
    \   [H-02] Missing honey tokens\n\n3. Zero Trust Recommendations:\n   - Micro-segmentation:\
    \ Each server = individual security zone\n   - mTLS for all service-to-service\
    \ communication\n   - Short-lived tokens (15min max)\n   - JIT (Just-In-Time)\
    \ admin access only\n\nMITRE ATT&CK: T1018, T1135, T1550, T1021\nEOF\ncat /tmp/lateral_report.txt"
  answer_detail: 종합 보고서는 테스트한 기법, 발견 사항, Zero Trust 기반 권고사항을 포함한다. 네트워크 세그먼테이션과 mTLS가
    측면 이동 방어의 최우선 과제이다.
  verify:
    type: output_contains
    expect: Lateral Movement Assessment
    semantic:
      intent: '[RED/BLUE] 측면이동 보고서 — Techniques (T1550.002 PtH/T1021.004 SSH Key/Impacket)
        + Findings (C-01 세그먼테이션 부재/C-02 공유 SSH 키/H-01 내부 모니터링 부재/H-02 Honey Token)
        + Zero Trust 권고 (마이크로 세그먼테이션/mTLS/단명 토큰/JIT admin). MITRE T1018/T1135/T1550/T1021.'
      success_criteria:
      - Lateral Movement Assessment 키워드
      - 기법 + 발견 + Zero Trust 권고
      - MITRE 매핑
      acceptable_methods:
      - echo > 보고서
      - BloodHound 시각화
      - NIST SP 800-207 ZTA
      negative_signs:
      - 섹션 2개 이하
      - MITRE 누락
      - Zero Trust 미언급
  target_vm: attacker
