lab_id: battle-adv-nonai-week07
title: 위협 헌팅 — 가설 기반 능동적 위협 탐색
version: non-ai
course: battle-adv-nonai
week: 7
description: 능동적 위협 헌팅(Proactive Threat Hunting) 방법론을 실습한다. 가설 기반 헌팅, Sigma 규칙 작성, 프로세스/네트워크/파일 시스템 분석을
  통해 기존 보안 도구가 놓친 위협을 선제적으로 발견한다.
difficulty: hard
duration_minutes: 150
objectives:
- 가설 기반 위협 헌팅 계획을 수립하고 실행한다
- Sigma 규칙을 작성하여 로그 기반 헌팅을 수행한다
- 프로세스, 네트워크, 파일 시스템을 교차 분석한다
- Wazuh SIEM을 활용한 중앙 집중식 헌팅을 수행한다
prerequisites:
- battle-adv-nonai week06 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] 위협 헌팅 가설을 수립하라. ''APT 공격자가 DNS 터널링으로 C2 통신을 수행하고 있다''는 가설을 검증하기 위한 데이터 소스, 분석 방법,
    탐지 기준을 포함하는 헌팅 계획을 작성하라.'
  hint: 가설 -> 데이터 소스 -> 분석 방법 -> 탐지 기준의 구조로 계획을 수립한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/hunting_hypothesis.txt << 'EOF'\n=== Threat Hunting Plan ===\nHypothesis: An APT\
    \ actor is using DNS tunneling for C2\n\nData Sources:\n  1. DNS query logs (Suricata eve.json)\n\
    \  2. Network flow data\n  3. Endpoint DNS resolver cache\n\nAnalysis Methods:\n  1. DNS query length\
    \ distribution\n  2. Shannon entropy of subdomain labels\n  3. Query frequency per unique domain\n\
    \  4. TXT record query ratio\n\nDetection Criteria:\n  - Subdomain label length > 30 characters\n\
    \  - Shannon entropy > 3.5\n  - Query frequency > 100/hour to single domain\n  - TXT query ratio >\
    \ 20%\n\nExpected Outcome: Identify or rule out DNS tunneling C2\nEOF\ncat /tmp/hunting_hypothesis.txt"
  answer_detail: 가설 기반 헌팅은 구체적인 위협 가설을 세우고 데이터를 분석하여 검증한다. 위협이 발견되지 않은 것도 유효한 결과이다.
  verify:
    type: output_contains
    expect:
    - Threat Hunting Plan
    - DNS
    semantic:
      intent: '[BLUE] 가설 수립 — Hypothesis (DNS C2) + Data Sources (Suricata eve.json, NetFlow, DNS 리졸버)
        + Analysis (쿼리 길이/Shannon 엔트로피/빈도/TXT 비율) + Detection Criteria (>30자/>3.5/>100시간/>20%). 가설 기반
        헌팅. TaHiTI 모델.'
      success_criteria:
      - Threat Hunting Plan 키워드
      - 가설 + 데이터 소스 + 분석 + 기준
      - DNS
      acceptable_methods:
      - TaHiTI hunt
      - Sqrrl Hunting Loop
      - MITRE Hunting Maturity
      negative_signs:
      - 가설 없음
      - 기준 누락
      - 구조화 부족
  target_vm: secu
- order: 2
  instruction: '[BLUE] DNS 헌팅을 실행하라. tcpdump로 DNS 쿼리를 캡처하고 Suricata eve.json에서 DNS 이벤트를 분석하라.'
  hint: tcpdump로 DNS 트래픽을 캡처하고 도메인별 쿼리 빈도를 집계한다.
  category: analysis
  points: 10
  answer: echo '=== DNS Hunting Execution ===' && timeout 3 tcpdump -i any port 53 -nn -c 10 2>/dev/null;
    echo '---' && echo 'DNS query analysis from Suricata:' && ssh 10.20.30.1 'cat /var/log/suricata/eve.json
    2>/dev/null | python3 -c "import sys,json; [print(json.loads(l).get(\"dns\",{}).get(\"rrname\",\"\"))
    for l in sys.stdin if \"dns\" in l]" 2>/dev/null | sort | uniq -c | sort -rn | head -10' 2>&1
  answer_detail: DNS 이벤트에서 도메인별 쿼리 빈도를 집계하면 비정상적으로 자주 조회되는 도메인을 발견할 수 있다.
  verify:
    type: output_contains
    expect: DNS Hunting
    semantic:
      intent: '[BLUE] DNS 헌팅 실행 — tcpdump -i any port 53 -nn -c 10 + jq ''.dns.rrname'' eve.json | uniq
        -c. 도메인별 쿼리 빈도 집계. 비정상 도메인 발견. 헌팅 기법 실행.'
      success_criteria:
      - DNS Hunting 키워드
      - tcpdump + eve.json 집계
      - 도메인 빈도
      acceptable_methods:
      - tcpdump + jq
      - Zeek dns.log 분석
      - passivedns + 쿼리
      negative_signs:
      - 캡처 없음
      - 집계 없음
      - 빈도 분석 부족
  target_vm: secu
- order: 3
  instruction: '[BLUE] Sigma 규칙을 작성하여 base64 디코딩 및 동적 실행 명령을 탐지하라.'
  hint: Sigma YAML 형식으로 process_creation 이벤트를 탐지한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/sigma_hunting_rule.yaml << 'EOF'\ntitle: Suspicious Base64 Decode Execution\nid:\
    \ hunt-001\nstatus: experimental\ndescription: Detects base64 decode commands indicating C2 payload\
    \ decoding\nauthor: Lab Student\ndate: 2026/04/06\nlogsource:\n  category: process_creation\n  product:\
    \ linux\ndetection:\n  selection_base64:\n    CommandLine|contains:\n      - 'base64 -d'\n      -\
    \ 'base64 --decode'\n  selection_eval:\n    CommandLine|contains:\n      - 'eval $(echo'\n      -\
    \ 'bash -c \"$(echo'\n  condition: selection_base64 or selection_eval\nfalsepositives:\n  - Legitimate\
    \ admin scripts\nlevel: medium\ntags:\n  - attack.defense_evasion\n  - attack.t1140\nEOF\ncat /tmp/sigma_hunting_rule.yaml"
  answer_detail: Sigma는 SIEM 비의존적 탐지 규칙 형식이다. base64 디코딩 또는 eval 동적 실행을 탐지하여 Deobfuscate/Decode(T1140)
    기법을 헌팅한다.
  verify:
    type: output_contains
    expect: Suspicious Base64
    semantic:
      intent: '[BLUE] Sigma 룰 — Suspicious Base64 Decode Execution + process_creation + CommandLine contains
        ''base64 -d|--decode'' + ''eval $(echo|bash -c $(echo''. SIEM 비의존. MITRE T1140 Deobfuscate/Decode.
        attack tags.'
      success_criteria:
      - Suspicious Base64 키워드
      - YAML Sigma 형식
      - selection + condition + tags
      acceptable_methods:
      - Sigma YAML
      - SigmaHQ 변환
      - pySigma → SIEM 변환
      negative_signs:
      - Sigma 형식 아님
      - tags 없음
      - MITRE 매핑 누락
  target_vm: secu
- order: 4
  instruction: '[BLUE] 프로세스 트리 헌팅을 수행하라. 비정상적인 부모-자식 프로세스 관계를 탐지하라.'
  hint: ps auxf로 프로세스 트리를 분석하고, 웹 서버에서 쉘이 스폰된 것을 찾는다.
  category: analysis
  points: 10
  answer: echo '=== Process Tree Hunting ===' && ps auxf | grep -B2 -A2 -E 'sh$|bash$|python|perl|nc |ncat
    ' | grep -v grep | head -30 && echo '---' && echo 'Suspicious parent-child patterns:' && echo '  -
    www-data -> bash/sh (web shell)' && echo '  - mysql -> bash/sh (SQLi RCE)' && echo '  - cron -> bash
    -> network activity (C2 beacon)' && echo '  - sshd -> bash -> unusual child (lateral movement)'
  answer_detail: 웹 서버(www-data)가 쉘을 생성하면 웹 쉘이나 RCE를, 데이터베이스가 쉘을 생성하면 SQLi RCE를 의심한다.
  verify:
    type: output_contains
    expect: Process Tree Hunting
    semantic:
      intent: '[BLUE] 프로세스 트리 헌팅 — ps auxf | grep ''sh|bash|python|perl|nc|ncat''. 비정상 부모-자식 (www-data→bash
        = 웹쉘 / mysql→bash = SQLi RCE / cron→bash→외부 = C2 / sshd→비정상 자식 = 측면이동). MITRE T1057.'
      success_criteria:
      - Process Tree Hunting 키워드
      - ps auxf + 트리 분석
      - 4 의심 패턴
      acceptable_methods:
      - ps auxf
      - pstree -ap
      - Wazuh audit execve
      negative_signs:
      - 트리 형식 아님
      - 패턴 2개 이하
      - 부모-자식 맥락 없음
  target_vm: secu
- order: 5
  instruction: '[BLUE] 파일 시스템 헌팅 — 최근 생성된 실행 파일, 숨김 파일, SUID 바이너리, 수정된 설정 파일을 조사하라.'
  hint: find로 최근 생성/수정된 파일과 특수 권한 파일을 검색한다.
  category: analysis
  points: 10
  answer: echo '=== File System Hunting ===' && echo '[1] New executables (7d):' && find /usr/local/bin
    /opt /home -type f -newer /etc/hostname -executable 2>/dev/null | head -10 && echo '[2] Hidden files
    in temp:' && find /tmp /var/tmp /dev/shm -name '.*' -type f 2>/dev/null | head -10 && echo '[3] SUID
    binaries:' && find /usr -perm -4000 -type f 2>/dev/null | head -10 && echo '[4] Modified configs (7d):'
    && find /etc -name '*.conf' -mtime -7 2>/dev/null | head -10
  answer_detail: 새 실행 파일(악성 도구), 숨김 파일(.으로 시작), SUID 비트(권한 상승), 최근 수정된 설정 파일을 조사한다. 공격자는 /dev/shm(RAM
    디스크)에 도구를 숨기는 경우가 많다.
  verify:
    type: output_contains
    expect: File System Hunting
    semantic:
      intent: '[BLUE] 파일시스템 헌팅 — find -newer/-executable (신규 실행) + -name ''.*'' (숨김) + -perm -4000 (SUID)
        + -mtime -7 (수정 설정). 4 카테고리 체계 검사. /dev/shm RAM 도구. MITRE T1083.'
      success_criteria:
      - File System Hunting 키워드
      - 4 카테고리 (신규/숨김/SUID/수정)
      - find 조합
      acceptable_methods:
      - find + 다중 조건
      - AIDE/Tripwire
      - osquery file_events
      negative_signs:
      - 카테고리 2개 이하
      - /dev/shm 누락
      - find 단순
  target_vm: secu
- order: 6
  instruction: '[BLUE] Wazuh SIEM을 활용하여 최근 보안 알림을 중앙 집중적으로 분석하라.'
  hint: Wazuh API 또는 로그 파일에서 알림을 조회한다.
  category: analysis
  points: 10
  answer: '🖥️ UI: Dashboard → Security events → 필터 적용 후 이벤트 확인

    📎 참고 (CLI): echo ''=== Wazuh SIEM Hunting ==='' && ssh 10.20.30.100 ''cat /var/ossec/logs/alerts/alerts.json
    2>/dev/null | tail -20 | python3 -c "import sys,json; [print(json.loads(l).get(\"rule\",{}).get(\"description\",\"\"),
    json.loads(l).get(\"rule\",{}).get(\"level\",0)) for l in sys.stdin]" 2>/dev/null'' 2>&1 | head -15;
    echo ''---''; echo ''Hunting queries:''; echo ''1. High severity (level >= 10)''; echo ''2. Repeated
    alerts from same agent''; echo ''3. New alert types not seen before'''
  answer_detail: Wazuh SIEM은 모든 에이전트의 보안 이벤트를 중앙 수집하여 헌팅에 활용한다. 고위험 알림, 반복 알림, 신규 알림 유형을 분석한다.
  verify:
    type: output_contains
    expect: Wazuh SIEM Hunting
    semantic:
      intent: '[BLUE] Wazuh SIEM 헌팅 — jq ''rule.description + rule.level'' alerts.json + 고위험 level>=10
        + 반복 알림 + 신규 유형. 중앙 SIEM 헌팅 쿼리. SOC analyst tier 3.'
      success_criteria:
      - Wazuh SIEM Hunting 키워드
      - 3 쿼리 (고위험/반복/신규)
      - jq + alerts.json
      acceptable_methods:
      - jq + 쿼리
      - Dashboard filter
      - Wazuh API search
      negative_signs:
      - 쿼리 1개
      - 단순 cat
      - 헌팅 맥락 없음
  target_vm: siem
- order: 7
  instruction: '[BLUE] MITRE ATT&CK 기반 헌팅 매트릭스를 작성하라. 환경에서 가장 위험도가 높은 기법 5가지를 선정하고 각각의 헌팅 쿼리를 정의하라.'
  hint: T1190, T1053, T1071, T1021, T1048에 대한 헌팅 쿼리를 작성한다.
  category: analysis
  points: 10
  answer: "cat > /tmp/attack_hunting_matrix.txt << 'EOF'\n=== MITRE ATT&CK Hunting Matrix ===\n\n1. T1190\
    \ - Exploit Public-Facing Application\n   Query: grep -E 'UNION|SELECT.*FROM|<script>' /var/log/nginx/access.log\n\
    \   Priority: CRITICAL\n\n2. T1053.003 - Cron Persistence\n   Query: for u in $(cut -f1 -d: /etc/passwd);\
    \ do crontab -u $u -l 2>/dev/null; done\n   Priority: HIGH\n\n3. T1071.004 - DNS C2\n   Query: Entropy\
    \ analysis on DNS query logs (entropy > 3.5)\n   Priority: HIGH\n\n4. T1021.004 - SSH Lateral Movement\n\
    \   Query: grep 'Accepted publickey' /var/log/auth.log | awk '{print $9,$11}'\n   Priority: MEDIUM\n\
    \n5. T1048 - Data Exfiltration\n   Query: NetFlow analysis (bytes_out/bytes_in > 10, new external\
    \ IPs)\n   Priority: HIGH\nEOF\ncat /tmp/attack_hunting_matrix.txt"
  answer_detail: ATT&CK 기반 헌팅 매트릭스는 환경에 가장 위험한 기법을 선정하고 데이터 소스, 분석 방법, 우선순위를 정의한다.
  verify:
    type: output_contains
    expect: ATT&CK Hunting Matrix
    semantic:
      intent: '[BLUE] ATT&CK 헌팅 매트릭스 — 5 기법: T1190(Web 익스) + T1053.003(Cron) + T1071.004(DNS C2) + T1021.004(SSH
        Lateral) + T1048(Exfil). 각 Query + Priority. 환경 위험도 기반.'
      success_criteria:
      - ATT&CK Hunting Matrix 키워드
      - 5 기법 + Query + Priority
      - MITRE T ID
      acceptable_methods:
      - ATT&CK Navigator
      - DeTT&CT coverage
      - Sigma 룰셋
      negative_signs:
      - 기법 3개 이하
      - Priority 없음
      - Query 없음
  target_vm: secu
- order: 8
  instruction: '[RED/BLUE] 환경을 정리하고 헌팅 보고서와 성숙도 평가를 작성하라.'
  hint: 가설별 검증 결과, 발견 사항, HMM Level 평가를 정리한다.
  category: analysis
  points: 15
  answer: "rm -f /tmp/hunting_hypothesis.txt /tmp/sigma_hunting_rule.yaml /tmp/attack_hunting_matrix.txt\
    \ 2>/dev/null && cat > /tmp/hunting_report.txt << 'EOF'\n=== Threat Hunting Report ===\nHunt ID: HUNT-20260406-001\
    \ | Scope: 10.20.30.0/24\n\n1. Hypothesis Results:\n   | Hypothesis | Result | Evidence |\n   |-----------|--------|----------|\n\
    \   | DNS tunneling C2 | Not confirmed | No high-entropy queries |\n   | Unauthorized processes |\
    \ Clean | Normal parent-child trees |\n   | Data exfiltration | Not confirmed | Normal outbound patterns\
    \ |\n\n2. Hunting Maturity: HM2 (Procedural)\n   - Documented hypotheses and procedures\n   - Sigma\
    \ rule creation capability\n   - Multiple data source analysis\n\n3. Roadmap to HM4:\n   - Automate\
    \ hunting pipeline (3 months)\n   - Deploy ML anomaly detection (6 months)\n   - Generate and share\
    \ threat intelligence (12 months)\nEOF\ncat /tmp/hunting_report.txt"
  answer_detail: 헌팅 보고서는 가설 검증 결과와 헌팅 성숙도(HMM Level 0~4) 평가를 포함한다. 위협 미발견도 유효한 결과이다.
  verify:
    type: output_contains
    expect: Threat Hunting Report
    semantic:
      intent: '[RED/BLUE] 헌팅 보고서 + 성숙도 — echo > /tmp/hunting_report.txt: 가설 검증 결과 표 + Hunting Maturity
        HM2 Procedural + HM4 로드맵 (자동 파이프라인 3m/ML 6m/위협 인텔 12m). Sqrrl HMM Level 0-4.'
      success_criteria:
      - Threat Hunting Report 키워드
      - 가설 검증 + HMM Level
      - 로드맵
      acceptable_methods:
      - echo > 보고서 + HMM
      - Sqrrl HMM
      - SANS hunting 성숙도
      negative_signs:
      - 검증 결과 없음
      - HMM 누락
      - 로드맵 없음
  target_vm: attacker
