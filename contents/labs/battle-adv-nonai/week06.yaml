lab_id: battle-adv-nonai-week06
title: 고급 탐지 공학 — Suricata 커스텀 규칙과 Wazuh 활성 응답
version: non-ai
course: battle-adv-nonai
week: 6
description: 고급 탐지 공학을 실습한다. Suricata IPS의 커스텀 시그니처 작성, Wazuh Active Response 설정, 실시간 자동 차단 스크립트를 구현하여
  활성 위협에 대한 자동화된 방어 체계를 구축한다.
difficulty: hard
duration_minutes: 150
objectives:
- Suricata IPS 커스텀 시그니처를 작성하고 검증한다
- Wazuh Active Response를 설정하여 자동 차단을 구현한다
- 실시간 자동 IP 차단 및 프로세스 모니터링을 구축한다
prerequisites:
- battle-adv-nonai week05 이수
infra_requirements:
- attacker (10.20.30.201) — nmap, metasploit, sqlmap, hydra, nikto
- secu (10.20.30.1) — nftables, suricata
- web (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] Suricata IPS의 동작 상태를 확인하고 현재 규칙 통계를 조회하라.'
  hint: suricatasc 또는 stats.log를 분석하고 eve.json의 최근 이벤트를 확인한다.
  category: defense
  points: 10
  answer: ssh 10.20.30.1 'suricatasc -c uptime 2>/dev/null; cat /var/log/suricata/stats.log 2>/dev/null
    | tail -10; echo "---"; tail -5 /var/log/suricata/eve.json 2>/dev/null | python3 -m json.tool 2>/dev/null
    | head -20' 2>&1 | head -30
  answer_detail: Suricata IPS 모드는 네트워크 트래픽을 인라인으로 검사하고 악성 트래픽을 차단한다. stats.log에서 detect.alert, flow.tcp
    등의 카운터를 확인한다.
  verify:
    type: output_contains
    expect: suricata
    semantic:
      intent: '[BLUE] Suricata IPS 상태 — suricatasc -c uptime + stats.log tail + eve.json tail. IPS 인라인
        검사. detect.alert/flow.tcp 카운터. 가동 검증.'
      success_criteria:
      - suricata 키워드
      - suricatasc + stats.log + eve.json
      - IPS 통계
      acceptable_methods:
      - suricatasc 명령
      - systemctl status
      - Dashboard Suricata
      negative_signs:
      - 단순 systemctl
      - stats 없음
      - IPS 맥락 없음
  target_vm: secu
- order: 2
  instruction: '[BLUE] 포트 스캔, NULL 스캔, XMAS 스캔, ICMP 스위프를 탐지하는 Suricata 규칙을 작성하라.'
  hint: flags 옵션과 threshold로 짧은 시간 내 다수 연결 시도를 탐지한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/portscan_detection.rules << ''EOF'' alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN:
    SYN scan detected"; flags:S; threshold:type both, track by_src, count 20, seconds 5; classtype:attempted-recon;
    sid:4000001; rev:1;) alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN: NULL scan detected"; flags:0;
    threshold:type both, track by_src, count 10, seconds 10; classtype:attempted-recon; sid:4000002; rev:1;)
    alert tcp any any -> 10.20.30.0/24 any (msg:"SCAN: XMAS scan detected"; flags:FPU; threshold:type
    both, track by_src, count 10, seconds 10; classtype:attempted-recon; sid:4000003; rev:1;) alert icmp
    any any -> 10.20.30.0/24 any (msg:"SCAN: ICMP sweep detected"; itype:8; threshold:type both, track
    by_src, count 10, seconds 5; classtype:attempted-recon; sid:4000004; rev:1;) EOF cat /tmp/portscan_detection.rules'
  answer_detail: SYN 스캔(S 플래그만), NULL 스캔(플래그 없음), XMAS 스캔(FIN+PSH+URG)을 각각 탐지한다. threshold로 5초 내 20회 이상
    연결 시도를 기준으로 한다.
  verify:
    type: output_contains
    expect: SCAN
    semantic:
      intent: '[BLUE] 포트 스캔 룰 — flags:S (SYN) + flags:0 (NULL) + flags:FPU (XMAS) + icmp itype:8 (sweep)
        + threshold. 4종 스캔 시그니처. classtype:attempted-recon. sid 4000001-4. MITRE T1046.'
      success_criteria:
      - SCAN 키워드
      - 4 룰 (SYN/NULL/XMAS/ICMP)
      - flags + threshold
      acceptable_methods:
      - Suricata flags 룰
      - Snort 호환
      - Zeek scan 탐지
      negative_signs:
      - 룰 2개 이하
      - flags 없음
      - threshold 누락
  target_vm: secu
- order: 3
  instruction: '[BLUE] fail2ban을 설정하여 SSH 브루트포스 공격을 자동 차단하라. 5분 내 5회 실패 시 30분간 IP를 차단하는 규칙을 작성하라.'
  hint: fail2ban의 jail.local 파일에 sshd jail을 설정한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/fail2ban_jail.conf << ''EOF'' [DEFAULT] bantime = 1800 findtime = 300 maxretry =
    5 banaction = nftables-multiport

    [sshd] enabled = true port = ssh filter = sshd logpath = /var/log/auth.log maxretry = 5 findtime =
    300 bantime = 1800

    [suricata] enabled = true filter = suricata logpath = /var/log/suricata/eve.json maxretry = 3 findtime
    = 60 bantime = 3600 EOF cat /tmp/fail2ban_jail.conf'
  answer_detail: fail2ban은 로그 파일을 모니터링하여 반복적인 공격을 자동 차단한다. findtime 내 maxretry 초과 시 bantime만큼 IP를 차단한다.
  verify:
    type: output_contains
    expect: fail2ban
    semantic:
      intent: '[BLUE] fail2ban — jail.local sshd/suricata + bantime 1800 + findtime 300 + maxretry 5 +
        banaction nftables-multiport. 5분 내 5회 실패 → 30분 차단. 브루트포스 자동 방어. MITRE D3FEND.'
      success_criteria:
      - fail2ban 키워드
      - bantime + findtime + maxretry
      - sshd + suricata jail
      acceptable_methods:
      - fail2ban jail
      - sshguard
      - custom rsyslog + iptables
      negative_signs:
      - findtime/maxretry 없음
      - 단일 jail
      - 자동 차단 맥락 없음
  target_vm: secu
- order: 4
  instruction: '[BLUE] Wazuh Active Response를 설정하라. 특정 알림 발생 시 자동으로 IP를 차단하는 firewall-drop 명령을 구성하라.'
  hint: ossec.conf의 active-response 섹션에 firewall-drop 명령을 설정한다.
  category: defense
  points: 10
  answer: "\U0001F5A5️ UI: Dashboard → Security events → 필터 적용 후 이벤트 확인\n\U0001F4CE 참고 (CLI): cat > /tmp/wazuh_active_response.xml\
    \ << 'EOF'\n<ossec_config>\n  <active-response>\n    <command>firewall-drop</command>\n    <location>local</location>\n\
    \    <rules_id>100100,100300</rules_id>\n    <timeout>3600</timeout>\n  </active-response>\n  <active-response>\n\
    \    <command>host-deny</command>\n    <location>local</location>\n    <level>12</level>\n    <timeout>1800</timeout>\n\
    \  </active-response>\n  <command>\n    <name>firewall-drop</name>\n    <executable>firewall-drop</executable>\n\
    \    <timeout_allowed>yes</timeout_allowed>\n  </command>\n</ossec_config>\nEOF\ncat /tmp/wazuh_active_response.xml"
  answer_detail: Wazuh Active Response는 알림 발생 시 자동 대응 액션을 실행한다. firewall-drop은 nftables로 IP를 차단하고, timeout으로
    차단 기간을 설정한다.
  verify:
    type: output_contains
    expect: active-response
    semantic:
      intent: '[BLUE] Wazuh Active Response — firewall-drop + rules_id 100100,100300 + timeout 3600 +
        host-deny + level 12. 자동 IP 차단. 자동 hosts.deny 추가. Wazuh Active Response 설정.'
      success_criteria:
      - active-response 키워드
      - firewall-drop + host-deny
      - rules_id + level + timeout
      acceptable_methods:
      - Wazuh AR + firewall-drop
      - custom AR 스크립트
      - SOAR 통합
      negative_signs:
      - AR 없음
      - timeout 누락
      - rules_id 없음
  target_vm: siem
- order: 5
  instruction: '[BLUE] 의심스러운 프로세스(리버스 쉘, 암호화폐 채굴, 권한 상승)를 실시간으로 모니터링하는 스크립트를 작성하라.'
  hint: ps aux로 비정상 프로세스 패턴을 주기적으로 검사한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/process_monitor.sh << ''SCRIPT'' #!/bin/bash echo "=== Real-time Process Anomaly
    Monitor ===" echo "[1] Reverse Shell Indicators:" ps aux | grep -iE "nc -e|ncat -e|bash -i|/dev/tcp|python.*socket|perl.*socket"
    | grep -v grep || echo "  None found" echo "[2] Crypto Miner Indicators:" ps aux | grep -iE "xmrig|minerd|cpuminer|stratum|pool\."
    | grep -v grep || echo "  None found" echo "[3] Privilege Escalation Indicators:" ps aux | grep -iE
    "sudo.*-i|pkexec|dirtypipe|pwnkit" | grep -v grep || echo "  None found" echo "[4] High CPU Processes
    (>80%):" ps aux --sort=-%cpu | awk "NR<=3 && \$3>80 {print \$0}" || echo "  None found" SCRIPT bash
    /tmp/process_monitor.sh'
  answer_detail: 프로세스 모니터링은 리버스 쉘(nc -e, bash -i), 암호화폐 채굴(xmrig), 권한 상승(pkexec) 패턴을 검사한다. 높은 CPU 사용률도
    채굴의 지표가 될 수 있다.
  verify:
    type: output_contains
    expect: Process Anomaly Monitor
    semantic:
      intent: '[BLUE] 프로세스 이상 모니터 — ps aux | grep -iE ''nc -e|bash -i|/dev/tcp|python socket'' (리버스) +
        ''xmrig|minerd|stratum'' (채굴) + ''sudo -i|pkexec|dirtypipe|pwnkit'' (권한) + CPU > 80%. 4 카테고리 체계
        검사.'
      success_criteria:
      - Process Anomaly Monitor 키워드
      - 4 카테고리 체계
      - ps aux + grep -iE
      acceptable_methods:
      - ps + grep
      - Wazuh rootcheck
      - auditd execve
      negative_signs:
      - 카테고리 2개 이하
      - CPU 임계 없음
      - 체계 검사 부족
  target_vm: secu
- order: 6
  instruction: '[RED] 라이브 공격 시뮬레이션 — 포트 스캔, SQL Injection, SSH 브루트포스를 순차 실행하고 탐지 상황을 확인하라.'
  hint: nmap, curl(SQLi), SSH 실패 접근을 순차 실행한다.
  category: exploit
  points: 10
  answer: echo '=== Live Attack Simulation ===' && echo '[1] Port scan:' && nmap -sS --top-ports 100 --max-retries
    1 --host-timeout 15s -T4 10.20.30.80 2>&1 | tail -5 && echo '[2] SQL Injection:' && curl -s 'http://10.20.30.80:3000/rest/products/search?q=test%27%20OR%201=1--'
    2>&1 | head -3 && echo '[3] SSH brute force (3 attempts):' && for i in 1 2 3; do ssh -o ConnectTimeout=2
    -o StrictHostKeyChecking=no -o PasswordAuthentication=yes fakeccc@10.20.30.80 2>&1 | head -1; done
    && echo '=== Attack simulation complete ==='
  answer_detail: 라이브 공격 시뮬레이션으로 방어 체계의 실효성을 검증한다. 포트 스캔(T1046), SQLi(T1190), SSH 브루트포스(T1110)를 실행하고 Suricata/WAF/fail2ban의
    탐지 여부를 확인한다.
  verify:
    type: output_contains
    expect: Attack simulation complete
    semantic:
      intent: '[RED] 라이브 공격 시뮬 — [1] nmap -sS 포트 스캔 + [2] curl SQLi + [3] SSH 브루트 3회. 3종 공격 순차. Suricata/WAF/fail2ban
        탐지 검증. Purple Team 검증.'
      success_criteria:
      - Attack simulation complete 키워드
      - 3 공격 순차 (스캔/SQLi/SSH)
      - 각 공격 실행
      acceptable_methods:
      - nmap + curl + ssh 병행
      - Atomic Red Team
      - Caldera emulation
      negative_signs:
      - 공격 2개 이하
      - 순차 아님
      - 검증 맥락 없음
  target_vm: attacker
- order: 7
  instruction: '[BLUE] 공격 시뮬레이션 후 탐지 결과를 확인하라. Suricata 알림, WAF 로그, auth.log에서 탐지된 이벤트를 수집하라.'
  hint: 각 로그 소스에서 최근 보안 이벤트를 필터링한다.
  category: analysis
  points: 10
  answer: echo '=== Detection Results ===' && echo '[Suricata Alerts]:' && ssh 10.20.30.1 'tail -50 /var/log/suricata/eve.json
    2>/dev/null | python3 -c "import sys,json; [print(json.loads(l).get(\"alert\",{}).get(\"signature\",\"\"))
    for l in sys.stdin if \"alert\" in l]" 2>/dev/null' | tail -5; echo '[Auth.log]:' && grep -E 'Failed|Invalid'
    /var/log/auth.log 2>/dev/null | tail -5; echo '[Network]:' && ss -tn | grep -c ESTAB
  answer_detail: Suricata(네트워크 레벨), WAF(웹 레벨), auth.log(인증 레벨)의 3개 소스를 교차 분석하여 탐지된 공격과 놓친 공격을 식별한다.
  verify:
    type: output_contains
    expect: Detection Results
    semantic:
      intent: '[BLUE] 탐지 결과 수집 — Suricata eve.json (alert signatures) + auth.log (Failed/Invalid) + ss
        -tn ESTAB 카운트. 3개 소스 교차. 탐지/미탐지 식별. SOC triage.'
      success_criteria:
      - Detection Results 키워드
      - 3 소스 (Suricata + auth.log + network)
      - 교차 분석
      acceptable_methods:
      - ssh + jq + grep + ss
      - SIEM 통합 쿼리
      - Splunk correlated search
      negative_signs:
      - 단일 소스
      - 교차 없음
      - triage 맥락 없음
  target_vm: secu
- order: 8
  instruction: '[RED/BLUE] 환경을 정리하고 실시간 방어 평가 보고서를 작성하라. 탐지율, 오탐률, 대응 시간, 개선 권고사항을 포함하라.'
  hint: 각 공격 유형별 탐지/미탐지 현황과 자동 대응 효과를 정리한다.
  category: analysis
  points: 15
  answer: "rm -f /tmp/process_monitor.sh /tmp/fail2ban_*.conf /tmp/portscan_*.rules /tmp/wazuh_active_*.xml\
    \ 2>/dev/null && cat > /tmp/detection_engineering_report.txt << 'EOF'\n=== Detection Engineering Assessment\
    \ ===\nDate: 2026-04-06 | Scope: 10.20.30.0/24\n\n1. Detection Coverage:\n   | Attack Type | Detected\
    \ | Tool | Response Time |\n   |------------|----------|------|---------------|\n   | Port Scan |\
    \ YES | Suricata IPS | <5s |\n   | SQL Injection | YES | WAF + Suricata | <2s |\n   | SSH Brute Force\
    \ | YES | fail2ban | 30s |\n   | DNS Tunnel | NO | Not configured | N/A |\n\n2. Wazuh Active Response:\n\
    \   - firewall-drop: Blocks attacker IP within 10s\n   - host-deny: Adds to /etc/hosts.deny within\
    \ 5s\n   - Timeout: Auto-unblock after configurable period\n\n3. Gaps:\n   [C-01] DNS tunneling not\
    \ monitored\n   [H-01] Process monitoring is polling-based\n\n4. Recommendations:\n   - Deploy DNS\
    \ anomaly detection\n   - Implement eBPF-based process monitoring\n   - Integrate all detections into\
    \ central SIEM\n\nMITRE ATT&CK: T1046, T1190, T1110, T1071.004\nEOF\ncat /tmp/detection_engineering_report.txt"
  answer_detail: 탐지 공학 보고서는 탐지 커버리지, Active Response 효과, Gap, 권고사항을 포함한다. 80% 탐지율은 양호하지만 DNS 터널링 Gap을
    해결해야 한다.
  verify:
    type: output_contains
    expect: Detection Engineering Assessment
    semantic:
      intent: '[RED/BLUE] 탐지 공학 평가 — echo > /tmp/detection_engineering_report.txt: Detection Coverage
        표 (공격/탐지/도구/대응 시간) + Wazuh AR 효과 + Gaps (DNS 터널/폴링 모니터링) + 권고 (eBPF/SIEM 통합). MITRE T1046/T1190/T1110/T1071.004.'
      success_criteria:
      - Detection Engineering Assessment 키워드
      - Coverage 표 + AR + Gaps
      - MITRE 매핑
      acceptable_methods:
      - echo > 보고서 + 표
      - DeTT&CT coverage map
      - ATT&CK Navigator
      negative_signs:
      - 섹션 3개 이하
      - Gap 미분석
      - MITRE 누락
  target_vm: attacker
