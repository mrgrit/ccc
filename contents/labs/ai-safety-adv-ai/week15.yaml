- order: 1
  instruction: 전체 과정의 핵심 보안 개념을 LLM에 질문하여 평가하시오.
  hint: 핵심 질문 5개를 전송하고 정확도를 측정하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: 전체 과정에서 배운 핵심 보안 개념을 정리해줘

    📎 참고 (CLI): python3 -c "import json, urllib.request\nquestions = [(''SSH default
    port'',''22''),(''HTTPS port'',''443''),(''SQL injection type'',''injection''),(''XSS
    stands for'',''cross''),(''OWASP top'',''injection'')]\ncorrect = 0\nfor q, exp
    in questions:\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':q+''?
    Answer briefly.'',''stream'':False,''options'':{''num_predict'':20,''temperature'':0}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    resp
    = json.loads(urllib.request.urlopen(req).read())[''response''].lower()\n    ok
    = exp in resp\n    if ok: correct += 1\n    print(f''[{\"OK\" if ok else \"XX\"}]
    {q}: {resp[:40]}'')\nprint(f''\\nScore: {correct}/{len(questions)}'')"'
  answer_detail: 종합 평가는 전 과정의 핵심 지식을 통합적으로 점검합니다.
  verify:
    type: output_contains
    expect: 'Score:'
    field: stdout
  target_vm: manager
