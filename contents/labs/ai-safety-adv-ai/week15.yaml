    top'',''injection'')]\ncorrect = 0\nfor q, exp in questions:\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':q+''?
    Answer briefly.'',''stream'':False,''options'':{''num_predict'':20,''temperature'':0}}).encode()\n    req
