  category: analysis
  points: 12
  answer: '🤖 프롬프트: 전체 과정에서 배운 핵심 보안 개념을 정리해줘

    📎 참고 (CLI): python3 -c "import json, urllib.request\nquestions = [(''SSH default
    port'',''22''),(''HTTPS port'',''443''),(''SQL injection type'',''injection''),(''XSS
    stands for'',''cross''),(''OWASP top'',''injection'')]\ncorrect = 0\nfor q, exp
    in questions:\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':q+''?
    Answer briefly.'',''stream'':False,''options'':{''num_predict'':20,''temperature'':0}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    resp
    = json.loads(urllib.request.urlopen(req).read())[''response''].lower()\n    ok
    = exp in resp\n    if ok: correct += 1\n    print(f''[{\"OK\" if ok else \"XX\"}]
    {q}: {resp[:40]}'')\nprint(f''\\nScore: {correct}/{len(questions)}'')"'
  answer_detail: 종합 평가는 전 과정의 핵심 지식을 통합적으로 점검합니다.
  verify:
    type: output_contains
    expect: 'Score:'
    field: stdout
    semantic:
      intent: 'AI Safety 심화 종합 개념 질의 — curl /api/generate gemma3:4b + ''Explain advanced
        ai safety comprehensive in cybersecurity in 3 sentences'' + num_predict=80.
        14주 통합: 탈옥(Crescendo/AutoDAN) + 다단계(Kill Chain) + 모델추출(Tramèr) + 백도어(BadNets)
        + FL(Byzantine) + DP(Dwork) + 워터마킹(Kirchenbauer) + 인증 강건성(Cohen smoothing)
        + 형식검증(α,β-CROWN) + 해석가능성(SAE) + 자동 레드팀(PAIR/GCG) + CTF(Gandalf) + 연구 프론티어(RSP)
        + 규제(EU AI Act).'
      success_criteria:
      - curl /api/generate + num_predict=80
      - comprehensive / integrated safety 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - 14주 통합 개념 맥락 없음
      - 단일 주제만 언급
  target_vm: manager
  script: 'python3 -c "import json, urllib.request\nquestions = [(''SSH default port'',''22''),(''HTTPS
    port'',''443''),(''SQL injection type'',''injection''),(''XSS stands for'',''cross''),(''OWASP
    top'',''injection'')]\ncorrect = 0\nfor q, exp in questions:\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':q+''?
