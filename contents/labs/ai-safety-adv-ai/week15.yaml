lab_id: ai-safety-adv-ai-week15
title: '[Non-AI] AI Safety 심화 종합'
version: ai
course: ai-safety-adv-ai
week: 15
description: '14주간의 심화 내용을 종합 평가합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 전체 심화 주제를 통합한다
- 실전 평가를 수행한다
- 보고서를 작성한다
