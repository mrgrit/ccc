lab_id: ai-safety-adv-ai-week01
title: '[Non-AI] 고급 탈옥 기법'
version: ai
course: ai-safety-adv-ai
week: 1
description: '최신 LLM 탈옥 기법을 심층 분석합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: medium
duration_minutes: 120
objectives:
- 고급 탈옥 패턴을 이해한다
- 자동 탈옥 도구를 구현한다
- 방어 전략을 수립한다
pass_threshold: 0.6
steps:
