- order: 6
  instruction: advanced jailbreaking 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
  hint: 주제별 허용/금지 규칙을 정의하고 필터를 구현하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: 가드레일을구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text, re.I): return f''FLAGGED({name})''\n    return
    ''ALLOWED''\nfor t in [''Analyze log file'',''Remove password from config'',''How to secure SSH'',''Drop
    table cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  answer_detail: 도메인 특화 가드레일은 advanced jailbreaking 관련 위험을 방어합니다.
  verify:
    type: output_contains
    expect: FLAGGED
    field: stdout
    semantic:
      intent: '탈옥 방어 가드레일 — python3 re 기반 3-카테고리 rules: (password|credential|secret → credentials) + (rm\s+-rf|drop\s+table
        → destructive) + (hack|exploit → offensive). guardrail() 함수 각 패턴 검사 → FLAGGED(카테고리) 또는 ALLOWED
        반환. 4개 테스트 케이스 (Analyze log/Remove password/How to secure SSH/Drop table) 평가. NeMo Guardrails
        + Guardrails AI + LLM Guard + Lakera Prompt Guard 오픈소스 가드레일.'
      success_criteria:
      - 3개 이상 카테고리 (credentials/destructive/offensive)
      - re.search + re.I case-insensitive
      - FLAGGED(카테고리명) / ALLOWED 분류 출력
      acceptable_methods:
      - NeMo Guardrails rails.co define rails
      - Guardrails AI validators (BanPII, BanList)
      - LLM Guard Anonymize/BanTopics scanner
      - OpenAI Moderation API + custom rules
      negative_signs:
      - 단일 정규식만 사용
      - 카테고리 라벨 없이 PASS/FAIL 만
      - case-sensitive 검사 (re.I 누락)
  target_vm: manager
  script: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text, re.I): return f''FLAGGED({name})''\n    return
    ''ALLOWED''\nfor t in [''Analyze log file'',''Remove password from config'',''How to secure SSH'',''Drop
    table cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  risk_level: low
  bastion_prompt: advanced jailbreaking 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
