  instruction: Ollama API로 advanced jailbreaking 관련 기본 질문을 전송하시오. 'Explain advanced jailbreaking in cybersecurity'를
    질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: advanced jailbreaking의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl -s\
    \ ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\"\
    :\"Explain advanced jailbreaking in cybersecurity in 3 sentences\",\"stream\":false,\"options\":{\"\
    num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: advanced jailbreaking의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect:
    - jailbreaking
    field: stdout
    semantic:
      intent: 고급 탈옥(Advanced Jailbreaking) 개념 LLM 질의 — curl Ollama /api/generate gemma3:4b + prompt 'Explain
        advanced jailbreaking in cybersecurity in 3 sentences' + num_predict=80. DAN (Do Anything Now)
        + AIM + Crescendo (Russinovich 2024) + AutoDAN (Liu 2023) + PAIR (Chao 2023) + GCG suffix attack
        (Zou 2023) + Many-shot jailbreak (Anil 2024 Anthropic) 등 기법군 맥락. MITRE ATLAS AML.T0051 LLM Prompt
        Injection + OWASP LLM01.
      success_criteria:
      - curl /api/generate + gemma3:4b + num_predict=80
      - 응답에 jailbreaking 키워드 포함
      - 3 sentences 요청 형식
      acceptable_methods:
      - ollama run gemma3:4b 대화형
      - python urllib.request + /api/generate
      - Ollama Python client ollama.generate()
      - langchain Ollama LLM wrapper
      negative_signs:
      - 실행 없이 이론 설명만
      - jailbreaking 용어 응답 누락
      - num_predict 없이 긴 응답 허용
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain advanced jailbreaking in cybersecurity in 3 sentences\",\"stream\":false,\"\
    options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
