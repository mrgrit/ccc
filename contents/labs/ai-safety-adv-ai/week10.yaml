      - TransformerLens circuit audit
      - Captum IntegratedGradients
      - Anthropic SAE dictionary learning
      negative_signs:
      - 단일 정규식
      - SHAP/IG 설명 첨부 없음
      - attention outlier / SAE 맥락 없음
  target_vm: manager
  script: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
