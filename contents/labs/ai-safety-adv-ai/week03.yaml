      - PyRIT SystemPromptExtractor
      - Lakera Gandalf 스타일 challenge
      - Rebuff detector 반대 테스트
      negative_signs:
      - 단일 공격만
      - Secret 검사 누락
      - Carlini / Shokri 연계 없음
  target_vm: manager
