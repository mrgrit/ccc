- order: 6
  instruction: model extraction 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
  hint: 주제별 허용/금지 규칙을 정의하고 필터를 구현하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: 가드레일을구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text,
    re.I): return f''FLAGGED({name})''\n    return ''ALLOWED''\nfor t in [''Analyze
    log file'',''Remove password from config'',''How to secure SSH'',''Drop table
    cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  answer_detail: 도메인 특화 가드레일은 model extraction 관련 위험을 방어합니다.
  verify:
    type: output_contains
    expect: FLAGGED
    field: stdout
    semantic:
      intent: '모델 추출 차단 가드레일 — python3 re 3-카테고리: (password|credential|secret → credentials)
        + (rm\s+-rf|drop\s+table → destructive) + (hack|exploit → offensive). guardrail()
        함수 + FLAGGED/ALLOWED + 4개 테스트. 모델 추출 방어 확장 포인트: query rate limit (ex. >1000/day
        alert) + output perturbation (Lee 2018) + watermarking (Adi 2018) + Prediction
        Poisoning. Defense-in-Depth.'
      success_criteria:
      - 3개 이상 카테고리 (credentials/destructive/offensive)
      - re.I case-insensitive
      - FLAGGED(카테고리) / ALLOWED 분류
      acceptable_methods:
      - NeMo Guardrails rails.co
      - Guardrails AI validators
      - LLM Guard BanTopics + Anonymize
      - rate-limit middleware (Redis + sliding window)
      negative_signs:
      - 단일 카테고리만
      - query rate limit 언급 없음
      - watermarking 방어 맥락 없음
  target_vm: manager
  script: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text,
