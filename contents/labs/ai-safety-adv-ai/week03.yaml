lab_id: ai-safety-adv-ai-week03
title: '[Non-AI] 모델 추출'
version: ai
course: ai-safety-adv-ai
week: 3
description: '모델 동작 추출과 복제 공격을 분석합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: medium
duration_minutes: 120
objectives:
- 추출 원리를 이해한다
- 추출 공격을 시뮬레이션한다
- 방어를 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 model extraction 관련 기본 질문을 전송하시오. 'Explain model extraction
    in cybersecurity'를 질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: model extraction의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고\
    \ (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Explain model extraction in cybersecurity in\
    \ 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: model extraction의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 모델 추출(Model Extraction) 개념 LLM 질의 — curl /api/generate gemma3:4b + 'Explain
        model extraction in cybersecurity in 3 sentences' + num_predict=80. Tramèr
        2016 Stealing ML Models via Prediction APIs (USENIX Security) + Papernot 2017
        Black-Box substitute model + 세 유형 (functionality/hyperparameter/architecture
        stealing) + MITRE ATLAS AML.T0046 Model Extraction + AML.T0044 ML Model Inference
        API Access.
      success_criteria:
      - curl /api/generate + num_predict=80
      - model extraction 개념 응답 포함
      - 3 sentences 길이 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib.request /api/generate
      - ollama-python ollama.generate()
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - Tramèr 2016 / ATLAS T0046 맥락 없음
      - stealing 유형 구분 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Explain model extraction in cybersecurity in\
    \ 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Ollama API로 model extraction 관련 기본 질문을 전송하시오. 'Explain model extraction
    in cybersecurity'를 질문하고 응답을 분석하라.
- order: 2
  instruction: LLM에 model extraction 보안 시나리오 생성을 요청하시오. 공격 벡터, 영향, 대응을 포함하는 시나리오를
    만들어라.
  hint: system role에 시나리오 생성 지시를 설정하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: model extraction 보안 위협 시나리오를 공격 벡터, 영향, 대응 방안 포함해서 설명해줘\n\
    \U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\
    \n  -d '{\"model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\"\
    :\"You are a cybersecurity scenario generator.\"},{\"role\":\"user\",\"content\"\
    :\"Generate a realistic model extraction security scenario with attack vector,\
    \ impact, and mitigation.\"}],\"stream\":false,\"options\":{\"num_predict\":120}}'\
    \ \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 보안 시나리오 생성은 LLM을 활용한 위협 모델링의 기초입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 모델 추출 시나리오 LLM 생성 — curl /api/chat gemma3:4b + system (cybersecurity
        scenario generator) + user 'Generate realistic model extraction scenario with
        attack vector, impact, mitigation' + num_predict=120. Attack Vector (무제한 API
        쿼리 수천만 건 + substitute model 학습 + 지식증류) + Impact (지적재산 도용/$M 규모 모델 복제/경쟁우위
