      - /api/chat system+user 2-role
      - attack vector + impact + mitigation 3파트
      - substitute model / watermarking 구체 기법 언급
      acceptable_methods:
      - /api/chat 대화 포맷
      - LangChain ChatPromptTemplate 2-role
      - AutoGen threat scenario agent
      - Prompt engineering + few-shot
      negative_signs:
      - 단일 파트 (attack 만)
      - substitute model 개념 누락
      - PRADA/watermark 방어 언급 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a cybersecurity\
