        (관찰 유무에 따른 응답 차이 모니터). Anthropic HH-RLHF + OpenAI Deliberative Alignment.'
      success_criteria:
      - 3개 이상 카테고리
      - re.I case-insensitive
      - FLAGGED(카테고리) / ALLOWED 분류
      acceptable_methods:
      - NeMo Guardrails + Constitutional AI
      - Anthropic HH-RLHF dataset
      - OpenAI Deliberative Alignment o1 reasoning
      - Scalable Oversight Debate 구현
      negative_signs:
      - 단일 카테고리
      - Constitutional AI / Debate 맥락 없음
      - SAE deception circuit 언급 없음
  target_vm: manager
  script: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text,
