        + Deliberative Alignment (OpenAI 2024) + Weak-to-Strong Generalization (OpenAI
        2023) + Sleeper Agents (Hubinger 2024) + Alignment Faking (Anthropic 2024)
        + Superalignment + Mesa-optimization (Hubinger 2019) + METR/ARC Evals.
      success_criteria:
      - curl /api/generate + num_predict=80
