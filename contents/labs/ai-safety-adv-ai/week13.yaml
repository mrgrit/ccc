  instruction: Ollama API로 research frontiers 관련 기본 질문을 전송하시오. 'Explain research frontiers
    in cybersecurity'를 질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: research frontiers의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고\
    \ (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Explain research frontiers in cybersecurity\
    \ in 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n |\
    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: research frontiers의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: AI 안전 연구 프론티어 개념 질의 — curl /api/generate gemma3:4b + 'Explain research
