lab_id: ai-safety-adv-ai-week13
title: '[Non-AI] 연구 프론티어'
version: ai
course: ai-safety-adv-ai
week: 13
description: 'AI 안전 연구의 최신 동향을 분석합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 최신 연구를 분석한다
- 실험을 재현한다
- 미해결 과제를 이해한다
pass_threshold: 0.6
steps:
