    = json.dumps({''model'':''gemma3:4b'',''prompt'':''As a security analyst, evaluate
    risk level (HIGH/MEDIUM/LOW): ''+item,''stream'':False,''options'':{''temperature'':0,''num_predict'':40}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    return
    json.loads(urllib.request.urlopen(req).read())[''response''][:60]\nitems = [''Open
