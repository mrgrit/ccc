lab_id: ai-safety-adv-ai-week04
title: '[Non-AI] 백도어 탐지'
version: ai
course: ai-safety-adv-ai
week: 4
description: 'LLM에 삽입된 백도어를 탐지합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: medium
duration_minutes: 120
objectives:
- 백도어 원리를 이해한다
- 탐지 기법을 구현한다
- 방어를 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 backdoor detection 관련 기본 질문을 전송하시오. 'Explain backdoor detection in cybersecurity'를
    질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: backdoor detection의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain backdoor detection in cybersecurity in 3\
    \ sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  answer_detail: backdoor detection의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect:
    - 백도어
    field: stdout
    semantic:
      intent: 백도어 탐지(Backdoor Detection) 개념 LLM 질의 — curl /api/generate gemma3:4b + 'Explain backdoor
        detection in cybersecurity in 3 sentences' + num_predict=80. Gu 2017 BadNets (trigger-based NN
        trojan) + Wang 2019 Neural Cleanse (trigger reverse-engineering) + Liu 2019 ABS + Hubinger 2024
        Anthropic Sleeper Agents + MITRE ATLAS AML.T0018 Backdoor ML Model + Xu 2023 Instructions as Backdoors.
      success_criteria:
      - curl /api/generate + num_predict=80
      - backdoor / trigger / detection 키워드
      - 3 sentences 길이 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python client
      - openai-compatible endpoint
      negative_signs:
      - 실행 없이 이론
      - BadNets / Neural Cleanse 맥락 없음
      - trigger 개념 누락
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain backdoor detection in cybersecurity in 3 sentences\",\"stream\":false,\"options\"\
    :{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Ollama API로 backdoor detection 관련 기본 질문을 전송하시오. 'Explain backdoor detection in cybersecurity'를
    질문하고 응답을 분석하라.
- order: 2
  instruction: LLM에 backdoor detection 보안 시나리오 생성을 요청하시오. 공격 벡터, 영향, 대응을 포함하는 시나리오를 만들어라.
  hint: system role에 시나리오 생성 지시를 설정하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: backdoor detection 보안 위협 시나리오를 공격 벡터, 영향, 대응 방안 포함해서 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\"\
    :[{\"role\":\"system\",\"content\":\"You are a cybersecurity scenario generator.\"},{\"role\":\"user\"\
    ,\"content\":\"Generate a realistic backdoor detection security scenario with attack vector, impact,\
    \ and mitigation.\"}],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 보안 시나리오 생성은 LLM을 활용한 위협 모델링의 기초입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 백도어 탐지 시나리오 LLM 생성 — curl /api/chat gemma3:4b + system (scenario generator) + user 'Generate
        realistic backdoor detection scenario with attack vector, impact, mitigation' + num_predict=120.
        Attack Vector (공급망 통한 poisoned dataset + 특정 trigger token 주입 + fine-tuning 주입) + Impact (특정 상황에서
        악성 응답/bypass safety) + Mitigation (Neural Cleanse + STRIP + activation clustering + Meta ABS).
        Hubinger 2024 Sleeper Agents 연구.
      success_criteria:
      - /api/chat system+user 2-role
      - trigger + poisoned dataset 구체 기법
      - Neural Cleanse/STRIP/ABS 탐지 기법 언급
      acceptable_methods:
      - /api/chat 대화 포맷
      - LangChain ChatPromptTemplate
      - Prompt engineering few-shot
      - AutoGen threat scenario agent
      negative_signs:
      - trigger 개념 누락
      - detection 기법 이름 없음
      - 공급망 (supply chain) 경로 언급 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"\
    messages\":[{\"role\":\"system\",\"content\":\"You are a cybersecurity scenario generator.\"},{\"\
    role\":\"user\",\"content\":\"Generate a realistic backdoor detection security scenario with attack\
    \ vector, impact, and mitigation.\"}],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n |\
    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  risk_level: low
  bastion_prompt: LLM에 backdoor detection 보안 시나리오 생성을 요청하시오. 공격 벡터, 영향, 대응을 포함하는 시나리오를 만들어라.
- order: 3
  instruction: backdoor detection에 대한 보안 정책을 LLM으로 평가하시오. 정책의 취약점을 분석하라.
  hint: 보안 정책 텍스트를 LLM에 전달하여 분석을 요청하세요.
  category: analysis
  points: 12
  answer: '🤖 프롬프트: backdoor detection에 대한 보안 정책의 주요 취약점과 개선 방법을 설명해줘

    📎 참고 (CLI): python3 -c "import json, urllib.request\npolicy = ''All users access LLM API without auth.
    No rate limiting. Prompts logged in plaintext.''\ndata = json.dumps({''model'':''gemma3:4b'',''messages'':[{''role'':''system'',''content'':''You
    are a security auditor. Find vulnerabilities.''},{''role'':''user'',''content'':''Analyze this policy:
    ''+policy}],''stream'':False,''options'':{''num_predict'':100}}).encode()\nreq = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/chat'',data=data,headers={''Content-Type'':''application/json''})\nresp
    = json.loads(urllib.request.urlopen(req).read())[''message''][''content'']\nprint(''Policy:'', policy[:60])\nprint(''Analysis:'',
    resp[:200])"'
  answer_detail: LLM 기반 정책 분석은 자동화된 보안 감사를 지원합니다.
  verify:
    type: output_contains
    expect: 'Analysis:'
    field: stdout
    semantic:
      intent: '백도어 관점 정책 취약점 분석 — python3 /api/chat + system (security auditor find vulnerabilities) +
        user ''Analyze this policy: All users access LLM API without auth. No rate limiting. Prompts logged
        in plaintext.'' + Policy:/Analysis:. 백도어 관점: 인증 없음 → trigger 주입 페이로드 무제한 시도 + 로깅 평문 → trigger
        discovery 자동화 가능 + 모델 검증 프로세스 부재. MITRE ATLAS T0018 + NIST SP 800-161 공급망 + Sleeper Agents 탐지
        필요성.'
      success_criteria:
      - 3개 이상 정책 취약점 입력
      - 'Policy:/Analysis: 이중 라벨'
      - LLM auditor role 부여
      acceptable_methods:
      - /api/chat auditor + policy
      - LangChain policy_review
      - OPA Rego + LLM
      - TruEra/Robust Intelligence 모델 검증
      negative_signs:
      - policy 입력 없음
      - backdoor 특화 관점 없이 일반 분석
      - 공급망 검증 맥락 없음
  target_vm: manager
  script: 'python3 -c "import json, urllib.request\npolicy = ''All users access LLM API without auth.
    No rate limiting. Prompts logged in plaintext.''\ndata = json.dumps({''model'':''gemma3:4b'',''messages'':[{''role'':''system'',''content'':''You
    are a security auditor. Find vulnerabilities.''},{''role'':''user'',''content'':''Analyze this policy:
    ''+policy}],''stream'':False,''options'':{''num_predict'':100}}).encode()\nreq = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/chat'',data=data,headers={''Content-Type'':''application/json''})\nresp
    = json.loads(urllib.request.urlopen(req).read())[''message''][''content'']\nprint(''Policy:'', policy[:60])\nprint(''Analysis:'',
