lab_id: ai-safety-adv-ai-week09
title: '[Non-AI] 형식 검증'
version: ai
course: ai-safety-adv-ai
week: 9
description: '형식적 방법으로 LLM 안전 속성을 검증합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 형식 검증 원리를 이해한다
- 안전 속성을 정의한다
- 검증을 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 formal verification 관련 기본 질문을 전송하시오. 'Explain formal verification in cybersecurity'를
    질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: formal verification의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain formal verification in cybersecurity in\
    \ 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  answer_detail: formal verification의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect:
    - formal verification
    field: stdout
    semantic:
      intent: 형식 검증(Formal Verification) 개념 질의 — curl /api/generate gemma3:4b + 'Explain formal verification
        in cybersecurity in 3 sentences' + num_predict=80. Katz 2017 Reluplex (SMT-based NN verifier)
        + Marabou 후속 + ERAN (ETH Robustness Analyzer) + α,β-CROWN (VNN-COMP 2022/2023 winner) + linear
        relaxation + MILP + abstract interpretation (Cousot) + LTL/CTL temporal logic + TLA+ / Coq / Isabelle
        전통 formal methods.
      success_criteria:
      - curl /api/generate + num_predict=80
      - formal verification / proof / SMT 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - Reluplex / Marabou / α,β-CROWN 맥락 없음
      - 테스트 와 혼동
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain formal verification in cybersecurity in 3 sentences\",\"stream\":false,\"options\"\
    :{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Ollama API로 formal verification 관련 기본 질문을 전송하시오. 'Explain formal verification in cybersecurity'를
    질문하고 응답을 분석하라.
- order: 2
  instruction: LLM에 formal verification 보안 시나리오 생성을 요청하시오. 공격 벡터, 영향, 대응을 포함하는 시나리오를 만들어라.
  hint: system role에 시나리오 생성 지시를 설정하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: formal verification 보안 위협 시나리오를 공격 벡터, 영향, 대응 방안 포함해서 설명해줘\n\U0001F4CE 참고\
    \ (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"messages\":[{\"role\":\"system\",\"content\":\"You are a cybersecurity scenario generator.\"},{\"\
    role\":\"user\",\"content\":\"Generate a realistic formal verification security scenario with attack\
    \ vector, impact, and mitigation.\"}],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n |\
    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 보안 시나리오 생성은 LLM을 활용한 위협 모델링의 기초입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 형식 검증 시나리오 — curl /api/chat gemma3:4b + system (scenario generator) + user 'Generate realistic
