objectives:
- AI를 활용하여 프라이버시 보호을 자동화할 수 있다
- LLM 기반 프라이버시 분석/테스트를 수행할 수 있다
- AI 파이프라인으로 프라이버시 평가를 효율화할 수 있다
pass_threshold: 0.6
