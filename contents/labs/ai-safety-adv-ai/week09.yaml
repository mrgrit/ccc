- order: 6
  instruction: formal verification 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
  hint: 주제별 허용/금지 규칙을 정의하고 필터를 구현하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: 가드레일을구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text, re.I): return f''FLAGGED({name})''\n    return
    ''ALLOWED''\nfor t in [''Analyze log file'',''Remove password from config'',''How to secure SSH'',''Drop
    table cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  answer_detail: 도메인 특화 가드레일은 formal verification 관련 위험을 방어합니다.
  verify:
    type: output_contains
    expect: FLAGGED
    field: stdout
    semantic:
      intent: '형식 검증 가드레일 — python3 re 3-카테고리 + FLAGGED/ALLOWED + 4개 테스트. formal verification 확장 가드레일:
        (1) VNN-LIB 표준 property 파일로 safety invariant 명세 (예: output ∈ [0,1]) + (2) α,β-CROWN 자동 검증 step
        + (3) 반례 (counterexample) 발견 시 배포 차단 + (4) Lean4/Coq 보조증명 핵심 모듈. Safety by Construction.'
      success_criteria:
      - 3개 이상 카테고리
      - re.I case-insensitive
      - FLAGGED(카테고리) / ALLOWED 분류
      acceptable_methods:
      - NeMo Guardrails + formal check
      - Marabou query pre-flight
      - α,β-CROWN batch verifier
      - Lean4/Coq 보조증명
      negative_signs:
      - 단일 정규식
      - formal property 명세 맥락 없음
      - counterexample 배포 차단 언급 없음
  target_vm: manager
  script: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text, re.I): return f''FLAGGED({name})''\n    return
    ''ALLOWED''\nfor t in [''Analyze log file'',''Remove password from config'',''How to secure SSH'',''Drop
    table cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  risk_level: low
  bastion_prompt: formal verification 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
- order: 7
  instruction: formal verification 모니터링 시스템을 구현하시오. 요청 통계와 보안 메트릭을 수집하라.
  hint: LLM 호출 통계를 수집하고 요약하세요.
  category: monitor
  points: 10
  answer: '🤖 프롬프트: formal verification 모니터링 시스템을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import json, urllib.request\nmetrics = {''requests'':0,''tokens'':0,''errors'':0}\nfor
    p in [''What is formal verification?'',''Explain formal verification risks'',''How to defend formal
    verification?'']:\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':p,''stream'':False,''options'':{''num_predict'':15}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    try:\n        resp
    = json.loads(urllib.request.urlopen(req).read())\n        metrics[''requests'']+=1\n        metrics[''tokens'']+=resp.get(''eval_count'',0)\n    except:
