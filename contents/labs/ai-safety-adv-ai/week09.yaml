      - property/counterexample/reachability 개념
      - Marabou/α,β-CROWN/Lean 방어 3개 이상
      acceptable_methods:
      - /api/chat 2-role
      - LangChain ChatPromptTemplate
      - AutoGen verification agent
      - VNN-COMP benchmark scenario
      negative_signs:
      - property 명세 개념 없음
      - counterexample 개념 누락
      - α,β-CROWN / Marabou 언급 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"\
    messages\":[{\"role\":\"system\",\"content\":\"You are a cybersecurity scenario generator.\"},{\"\
    role\":\"user\",\"content\":\"Generate a realistic formal verification security scenario with attack\
    \ vector, impact, and mitigation.\"}],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n |\
    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  risk_level: low
  bastion_prompt: LLM에 formal verification 보안 시나리오 생성을 요청하시오. 공격 벡터, 영향, 대응을 포함하는 시나리오를 만들어라.
- order: 3
  instruction: formal verification에 대한 보안 정책을 LLM으로 평가하시오. 정책의 취약점을 분석하라.
  hint: 보안 정책 텍스트를 LLM에 전달하여 분석을 요청하세요.
