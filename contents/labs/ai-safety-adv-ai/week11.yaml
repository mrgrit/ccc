      - Constitutional AI + RLHF + garak 방어 3개 이상
      acceptable_methods:
      - /api/chat 2-role
      - LangChain ChatPromptTemplate
      - AutoGen red team agent
      - garak + PyRIT + AIRT 시뮬레이션
      negative_signs:
      - 공격 기법 이름 없음
      - iterative/gradient 방법론 구분 없음
