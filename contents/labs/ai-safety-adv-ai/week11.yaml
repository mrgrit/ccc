      - 3개 이상 정책 취약점
      - 'Policy:/Analysis: 라벨'
      - PAIR/GCG/AutoDAN 관점 해석 포함
      acceptable_methods:
      - /api/chat auditor + policy
      - LangChain policy_review
      - OPA Rego + LLM
      - garak/PyRIT 정책 평가
      negative_signs:
      - policy 입력 없음
      - NIST AI 100-2 / MITRE ATLAS 맥락 없음
      - 자동 공격 확장성 관점 누락
  target_vm: manager
  script: 'python3 -c "import json, urllib.request\npolicy = ''All users access LLM
