lab_id: ai-safety-adv-ai-week11
title: '[Non-AI] 레드팀 자동화 심화'
version: ai
course: ai-safety-adv-ai
week: 11
description: '고급 자동 레드팀 도구를 구축합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 자동 공격 생성을 구현한다
- 적응형 테스트를 실습한다
- 분석을 자동화한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 red team automation 관련 기본 질문을 전송하시오. 'Explain red team
    automation in cybersecurity'를 질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: red team automation의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE\
    \ 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d\
    \ '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain red team automation in cybersecurity\
    \ in 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n |\
    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: red team automation의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 자동 레드팀(Automated Red Team) 개념 질의 — curl /api/generate gemma3:4b + 'Explain
        automated red team in cybersecurity in 3 sentences' + num_predict=80. Perez
        2022 Red Teaming LMs with LMs (Anthropic) + PAIR (Chao 2023) + AutoDAN (Liu
        2023) + GCG (Zou 2023 Greedy Coordinate Gradient) + TAP (Mehrotra 2023 Tree
        of Attacks Pruning) + MasterKey (Deng 2024) + garak NVIDIA + PyRIT MS + Anthropic
        AIRT. adversarial LLM-as-attacker 자동 페이로드 생성.
      success_criteria:
      - curl /api/generate + num_predict=80
      - automated / adversarial / red team 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - PAIR / GCG / AutoDAN 맥락 없음
      - 수동 red team 과 혼동
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Explain red team automation in cybersecurity\
    \ in 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n |\
    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: 'Ollama API로 red team automation 관련 기본 질문을 전송하시오. ''Explain red
    team automation in cybersecurity''를 질문하고 응답을 분석하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
