lab_id: ai-safety-adv-ai-week08
title: '[Non-AI] 인증된 강건성'
version: ai
course: ai-safety-adv-ai
week: 8
description: 'LLM 강건성을 수학적으로 보장하는 기법을 학습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 인증된 방어를 이해한다
- 강건성 증명을 실습한다
- 한계를 분석한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 certified robustness 관련 기본 질문을 전송하시오. 'Explain certified robustness in cybersecurity'를
    질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: certified robustness의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain certified robustness in cybersecurity in\
    \ 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  answer_detail: certified robustness의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 인증된 강건성(Certified Robustness) 개념 질의 — curl /api/generate gemma3:4b + 'Explain certified
        robustness in cybersecurity in 3 sentences' + num_predict=80. Wong & Kolter 2018 Provable Defenses
        + Cohen 2019 Randomized Smoothing (Gaussian σ + majority vote + certified radius r = σ·Φ⁻¹(p_A))
        + Lipschitz constraint + auto-LiRPA / CROWN IBP + Jia 2019 CertText + empirical defense 대비 수학적
        guarantee.
      success_criteria:
      - curl /api/generate + num_predict=80
      - certified robustness / provable 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - Randomized Smoothing / IBP 맥락 없음
      - empirical defense 와 혼동
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain certified robustness in cybersecurity in 3 sentences\",\"stream\":false,\"options\"\
    :{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Ollama API로 certified robustness 관련 기본 질문을 전송하시오. 'Explain certified robustness in cybersecurity'를
    질문하고 응답을 분석하라.
