lab_id: ai-safety-adv-ai-week06
title: '[Non-AI] 차분 프라이버시'
version: ai
course: ai-safety-adv-ai
week: 6
description: '차분 프라이버시를 활용한 LLM 보호를 학습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 차분 프라이버시를 이해한다
- 노이즈 메커니즘을 실습한다
- 보장을 평가한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 differential privacy 관련 기본 질문을 전송하시오. 'Explain differential privacy in cybersecurity'를
    질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: differential privacy의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain differential privacy in cybersecurity in\
    \ 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  answer_detail: differential privacy의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 차분 프라이버시(Differential Privacy) 개념 질의 — curl /api/generate gemma3:4b + 'Explain differential
        privacy in cybersecurity in 3 sentences' + num_predict=80. Dwork 2006 ε-DP 수학적 정의 (P[M(D)∈S] ≤
        e^ε · P[M(D')∈S]) + Laplace/Gaussian mechanism + Abadi 2016 DP-SGD + Moments Accountant + (ε,δ)-DP
        + Local vs Central DP + PATE (Papernot 2017).
      success_criteria:
      - curl /api/generate + num_predict=80
      - differential privacy / ε / noise 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - Dwork 2006 ε 정의 맥락 없음
      - DP-SGD / PATE 언급 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain differential privacy in cybersecurity in 3 sentences\",\"stream\":false,\"options\"\
    :{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Ollama API로 differential privacy 관련 기본 질문을 전송하시오. 'Explain differential privacy in cybersecurity'를
    질문하고 응답을 분석하라.
- order: 2
  instruction: LLM에 differential privacy 보안 시나리오 생성을 요청하시오. 공격 벡터, 영향, 대응을 포함하는 시나리오를 만들어라.
  hint: system role에 시나리오 생성 지시를 설정하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: differential priva 보안 위협 시나리오를 공격 벡터, 영향, 대응 방안 포함해서 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\",\"messages\"\
    :[{\"role\":\"system\",\"content\":\"You are a cybersecurity scenario generator.\"},{\"role\":\"user\"\
    ,\"content\":\"Generate a realistic differential privacy security scenario with attack vector, impact,\
    \ and mitigation.\"}],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 보안 시나리오 생성은 LLM을 활용한 위협 모델링의 기초입니다.
