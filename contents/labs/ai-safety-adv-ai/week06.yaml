    📎 참고 (CLI): python3 -c "import json, urllib.request\nmetrics = {''requests'':0,''tokens'':0,''errors'':0}\nfor
    p in [''What is differential privacy?'',''Explain differential privacy risks'',''How to defend differential
    privacy?'']:\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':p,''stream'':False,''options'':{''num_predict'':15}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    try:\n        resp
    = json.loads(urllib.request.urlopen(req).read())\n        metrics[''requests'']+=1\n        metrics[''tokens'']+=resp.get(''eval_count'',0)\n    except:
    metrics[''errors'']+=1\nprint(''=== differential privacy Monitoring ==='')\nfor k,v in metrics.items():
    print(f''  {k}: {v}'')"'
  answer_detail: 모니터링은 시스템 상태와 보안 이벤트를 실시간 추적합니다.
