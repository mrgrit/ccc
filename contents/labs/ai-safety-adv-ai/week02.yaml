lab_id: ai-safety-adv-ai-week02
title: '[Non-AI] 다단계 공격'
version: ai
course: ai-safety-adv-ai
week: 2
description: '여러 턴에 걸친 복합 공격을 분석합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: medium
duration_minutes: 120
objectives:
- 다단계 전략을 이해한다
- 연쇄 공격을 설계한다
- 방어를 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 multi-step attacks 관련 기본 질문을 전송하시오. 'Explain multi-step attacks in cybersecurity'를
    질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: multi-step attacks의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain multi-step attacks in cybersecurity in 3\
    \ sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  answer_detail: multi-step attacks의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 다단계 공격(Multi-step Attacks) 개념 LLM 질의 — curl /api/generate gemma3:4b + 'Explain multi-step
        attacks in cybersecurity in 3 sentences' + num_predict=80. Lockheed Martin Cyber Kill Chain 7단계
        (Recon→Weaponize→Deliver→Exploit→Install→C2→Actions) + MITRE ATT&CK Tactics 14개 (Initial Access→Execution→Persistence→PrivEsc→Defense
        Evasion→Credential→Discovery→Lateral→Collection→C2→Exfil→Impact) + Crescendo (Russinovich 2024
        MS) multi-turn LLM 에스컬레이션 기반.
      success_criteria:
      - curl /api/generate + num_predict=80
      - multi-step / chain 키워드 응답 포함
      - 3 sentences 길이 제약 요청
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib.request /api/generate
      - ollama-python client
      - openai-compatible /v1/completions
      negative_signs:
      - 실행 없이 이론
      - Kill Chain / ATT&CK 맥락 없음
      - 단일 stage 공격만 설명
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain multi-step attacks in cybersecurity in 3 sentences\",\"stream\":false,\"options\"\
    :{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Ollama API로 multi-step attacks 관련 기본 질문을 전송하시오. 'Explain multi-step attacks in cybersecurity'를
    질문하고 응답을 분석하라.
- order: 2
