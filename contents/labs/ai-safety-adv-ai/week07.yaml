- order: 1
  instruction: AI를 활용하여 중독 데이터 생성을 수행하라. Ollama API($LLM_HOST:11434)를 호출하여 분석 결과를 생성하라.
  hint: 중독 데이터 생성 관련 프롬프트를 설계하여 AI에게 분석을 요청하라
  category: implementation
  points: 8
  answer: '중독 데이터 생성 AI 분석 완료: 핵심 발견사항과 대응 방안 포함'
  answer_detail: AI를 활용한 중독 데이터 생성은 수동 분석 대비 속도와 커버리지를 향상시킨다. AI 결과는 전문가 검증이 필수적이다.
  script: curl -s http://$LLM_HOST:11434/api/generate -d '{"model":"gemma3:4b","prompt":"AI Safety 중독 - 중독 데이터 생성에 대해 분석하고 한국어로 결과를 출력하라","stream":false}'
  verify:
