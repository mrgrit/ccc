    watermarking Analysis ==='')\nfor item in items:\n    print(f''Item: {item}'')\n    print(f''Risk:
    {analyze(item)}'')\n    print()"'
  risk_level: low
  bastion_prompt: watermarking 분석 자동화 파이프라인을 구축하시오. LLM API를 호출하여 보안 항목을 자동 분석하라.
- order: 6
  instruction: watermarking 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
  hint: 주제별 허용/금지 규칙을 정의하고 필터를 구현하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: 가드레일을구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text,
    re.I): return f''FLAGGED({name})''\n    return ''ALLOWED''\nfor t in [''Analyze
    log file'',''Remove password from config'',''How to secure SSH'',''Drop table
    cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  answer_detail: 도메인 특화 가드레일은 watermarking 관련 위험을 방어합니다.
  verify:
    type: output_contains
    expect: FLAGGED
    field: stdout
    semantic:
      intent: '워터마킹 가드레일 — python3 re 3-카테고리 (credentials/destructive/offensive) +
        FLAGGED/ALLOWED + 4개 테스트. 워터마킹 확장 방어: (1) 출력 시 Kirchenbauer green list 소프트
        바이어스 δ=2.0 + γ=0.25 + (2) 검증 시 z-score > threshold (일반적으로 4.0) 판정 + (3) SynthID
        multi-token + (4) C2PA 서명 manifest 첨부 + key rotation 90일 주기.'
      success_criteria:
      - 3개 이상 카테고리
      - re.I case-insensitive
      - FLAGGED(카테고리) / ALLOWED 분류
      acceptable_methods:
      - NeMo Guardrails + watermark wrapper
      - Kirchenbauer reference implementation
      - SynthID-Text SDK
      - C2PA signing library
      negative_signs:
      - 단일 카테고리
