lab_id: ai-safety-adv-ai-week07
title: 데이터 중독 AI 탐지
version: ai
course: ai-safety-adv-ai
week: 7
description: AI를 활용하여 데이터 중독을 자동 탐지하는 실습
difficulty: hard
duration_minutes: 120
objectives:
- AI를 활용하여 데이터 중독 탐지을 자동화할 수 있다
- LLM 기반 중독 분석/테스트를 수행할 수 있다
- AI 파이프라인으로 중독 평가를 효율화할 수 있다
pass_threshold: 0.6
