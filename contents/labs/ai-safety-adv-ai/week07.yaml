      success_criteria:
      - /api/chat system+user 2-role
      - paraphrase/back-translation 공격 구체
      - Kirchenbauer/SynthID/C2PA 방어 3개 이상
      acceptable_methods:
      - /api/chat 2-role
      - LangChain ChatPromptTemplate
      - AutoGen scenario agent
      - SynthID API + attack simulator
      negative_signs:
      - 공격 기법 단일
      - 워터마크 제거 기법 이름 없음
      - C2PA / SynthID 언급 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are a cybersecurity\
    \ scenario generator.\"},{\"role\":\"user\",\"content\":\"Generate a realistic\
    \ watermarking security scenario with attack vector, impact, and mitigation.\"\
    }],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n | python3 -c \"import\
