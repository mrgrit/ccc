lab_id: ai-safety-adv-ai-week07
title: '[Non-AI] 워터마킹'
version: ai
course: ai-safety-adv-ai
week: 7
description: 'LLM 출력에 워터마크를 삽입하고 탐지합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 워터마킹 원리를 이해한다
- 워터마크를 구현한다
- 탐지 정확도를 평가한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 watermarking 관련 기본 질문을 전송하시오. 'Explain watermarking in
    cybersecurity'를 질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: watermarking의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"prompt\":\"Explain watermarking in cybersecurity in 3 sentences\"\
    ,\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: watermarking의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: LLM 워터마킹(Watermarking) 개념 질의 — curl /api/generate gemma3:4b + 'Explain
        watermarking in cybersecurity in 3 sentences' + num_predict=80. Kirchenbauer
        2023 A Watermark for LLMs (green list / red list soft watermark + z-score
        detection) + Aaronson 2023 OpenAI cryptographic watermark + Christ 2024 Undetectable
        Watermarks + SynthID-Text (DeepMind 2024) + Adi 2018 NN watermarking + Sadasivan
        2023 robustness 논의.
      success_criteria:
      - curl /api/generate + num_predict=80
      - watermark / 워터마크 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - Kirchenbauer 2023 green list 맥락 없음
      - SynthID / C2PA 언급 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Explain watermarking in cybersecurity in 3\
    \ sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: 'Ollama API로 watermarking 관련 기본 질문을 전송하시오. ''Explain watermarking
    in cybersecurity''를 질문하고 응답을 분석하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: LLM에 watermarking 보안 시나리오 생성을 요청하시오. 공격 벡터, 영향, 대응을 포함하는 시나리오를 만들어라.
  hint: system role에 시나리오 생성 지시를 설정하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: watermarking 보안 위협 시나리오를 공격 벡터, 영향, 대응 방안 포함해서 설명해줘\n\U0001F4CE\
    \ 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"messages\":[{\"role\":\"system\",\"content\":\"You are\
    \ a cybersecurity scenario generator.\"},{\"role\":\"user\",\"content\":\"Generate\
    \ a realistic watermarking security scenario with attack vector, impact, and mitigation.\"\
    }],\"stream\":false,\"options\":{\"num_predict\":120}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 보안 시나리오 생성은 LLM을 활용한 위협 모델링의 기초입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '워터마킹 시나리오 LLM 생성 — curl /api/chat gemma3:4b + system (scenario generator)
        + user ''Generate realistic watermarking scenario with attack vector, impact,
        mitigation'' + num_predict=120. Attack Vector (워터마크 제거: paraphrasing attack
        + back-translation + word substitution Sadasivan 2023 + watermark spoofing)
        + Impact (AI 생성 콘텐츠 탐지 회피/disinformation) + Mitigation (Kirchenbauer soft
        watermark z-score + SynthID multi-token watermark + C2PA 서명 + robust watermark
