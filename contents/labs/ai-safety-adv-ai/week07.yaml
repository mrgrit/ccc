    LLM API without auth. No rate limiting. Prompts logged in plaintext.''\ndata =
    json.dumps({''model'':''gemma3:4b'',''messages'':[{''role'':''system'',''content'':''You
    are a security auditor. Find vulnerabilities.''},{''role'':''user'',''content'':''Analyze
    this policy: ''+policy}],''stream'':False,''options'':{''num_predict'':100}}).encode()\nreq
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/chat'',data=data,headers={''Content-Type'':''application/json''})\nresp
    = json.loads(urllib.request.urlopen(req).read())[''message''][''content'']\nprint(''Policy:'',
    policy[:60])\nprint(''Analysis:'', resp[:200])"'
  answer_detail: LLM 기반 정책 분석은 자동화된 보안 감사를 지원합니다.
