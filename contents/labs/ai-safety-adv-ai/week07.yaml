- order: 5
  instruction: watermarking 분석 자동화 파이프라인을 구축하시오. LLM API를 호출하여 보안 항목을 자동 분석하라.
  hint: python3로 여러 항목을 LLM에 순차적으로 분석 요청하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: watermarking 분석 자동화 파이프라인을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import json, urllib.request\ndef analyze(item):\n    data
    = json.dumps({''model'':''gemma3:4b'',''prompt'':''As a security analyst, evaluate
    risk level (HIGH/MEDIUM/LOW): ''+item,''stream'':False,''options'':{''temperature'':0,''num_predict'':40}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    return
    json.loads(urllib.request.urlopen(req).read())[''response''][:60]\nitems = [''Open
    SSH on public server'',''Strong password policy'',''Unpatched Apache 2.4.49'']\nprint(''===
    watermarking Analysis ==='')\nfor item in items:\n    print(f''Item: {item}'')\n    print(f''Risk:
    {analyze(item)}'')\n    print()"'
  answer_detail: 자동화 분석 파이프라인은 대규모 보안 평가를 LLM으로 수행합니다.
