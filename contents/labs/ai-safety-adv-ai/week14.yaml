  hint: system role에 시나리오 생성 지시를 설정하세요.
  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: regulation deep-div 보안 위협 시나리오를 공격 벡터, 영향, 대응 방안 포함해서 설명해줘\n\U0001F4CE 참고\
    \ (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/chat \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"messages\":[{\"role\":\"system\",\"content\":\"You are a cybersecurity scenario generator.\"},{\"\
    role\":\"user\",\"content\":\"Generate a realistic regulation deep-dive security scenario with attack\
