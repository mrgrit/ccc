        매핑: 인증 없음 (EU AI Act Art.15 robustness 위반 + NIST AI RMF MANAGE 2.1 + ISO 42001 A.8.2) + rate limit
        없음 (DoS = Art.15 안정성 + GDPR Art.32) + 평문 로깅 (GDPR Art.32 암호화 + Art.34 Data Breach 통보 + CCPA §1798.100).
        GRC 플랫폼 자동 매핑.'
