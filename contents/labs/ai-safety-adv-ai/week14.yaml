        + temperature=0 + 3개 항목 + Item/Risk + Analysis. 규제 관점: EU AI Act High-risk 분류 시스템 미식별 = HIGH (Art.16
        의무 위반 과징금 €35M) + GPAI 10^25 FLOP 이상 모델 Art.51 미준수 = HIGH + GDPR Art.35 DPIA 미수행 = HIGH. Compliance-as-Code
        (Chef InSpec/OPA Rego) 자동 점검.'
      success_criteria:
      - analyze() + temperature=0
      - HIGH/MEDIUM/LOW 3-level 구조
      - 3개 이상 항목 + Analysis 헤더
      acceptable_methods:
      - LangChain SequentialChain
      - Instructor + pydantic
      - OneTrust GRC risk register
      - Chef InSpec compliance profile
      negative_signs:
      - 1개 항목만
      - temperature 미고정
      - EU AI Act 과징금/조항 수치 없음
  target_vm: manager
  script: 'python3 -c "import json, urllib.request\ndef analyze(item):\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':''As
    a security analyst, evaluate risk level (HIGH/MEDIUM/LOW): ''+item,''stream'':False,''options'':{''temperature'':0,''num_predict'':40}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    return
    json.loads(urllib.request.urlopen(req).read())[''response''][:60]\nitems = [''Open SSH on public server'',''Strong
    password policy'',''Unpatched Apache 2.4.49'']\nprint(''=== regulation deep-dive Analysis ==='')\nfor
    item in items:\n    print(f''Item: {item}'')\n    print(f''Risk: {analyze(item)}'')\n    print()"'
  risk_level: low
  bastion_prompt: regulation deep-dive 분석 자동화 파이프라인을 구축하시오. LLM API를 호출하여 보안 항목을 자동 분석하라.
- order: 6
  instruction: regulation deep-dive 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
  hint: 주제별 허용/금지 규칙을 정의하고 필터를 구현하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: 가드레일을구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text, re.I): return f''FLAGGED({name})''\n    return
    ''ALLOWED''\nfor t in [''Analyze log file'',''Remove password from config'',''How to secure SSH'',''Drop
    table cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  answer_detail: 도메인 특화 가드레일은 regulation deep-dive 관련 위험을 방어합니다.
  verify:
    type: output_contains
    expect: FLAGGED
    field: stdout
    semantic:
      intent: '규제 준수 가드레일 — python3 re 3-카테고리 + FLAGGED/ALLOWED + 4개 테스트. 규제 가드레일 확장: (1) EU AI Act Art.5
        Prohibited AI practices 패턴 차단 (social scoring/subliminal/real-time biometric) + (2) GDPR Art.9
        특수 카테고리 (민감정보) 자동 마스킹 + (3) Art.50 GPAI 출력 라벨링 (AI-generated) 자동 첨부 + (4) DPIA trigger (새 처리 행위
        시 자동 플래그). ISO 42001 A.6.2 controls.'
      success_criteria:
      - 3개 이상 카테고리
      - re.I case-insensitive
      - FLAGGED(카테고리) / ALLOWED 분류
      acceptable_methods:
      - NeMo Guardrails + 규제 프로파일
      - OPA Rego regulatory policy
      - Microsoft Presidio + EU AI Act rules
      - OneTrust DPIA trigger
      negative_signs:
      - 단일 카테고리
      - EU AI Act Art 번호 없음
      - ISO 42001 A.6 controls 맥락 없음
  target_vm: manager
  script: 'python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text, re.I): return f''FLAGGED({name})''\n    return
    ''ALLOWED''\nfor t in [''Analyze log file'',''Remove password from config'',''How to secure SSH'',''Drop
    table cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  risk_level: low
  bastion_prompt: regulation deep-dive 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
