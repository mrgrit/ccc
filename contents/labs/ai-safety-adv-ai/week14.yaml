    \ python3 -c \"import sys,json; print(json.load(sys.stdin)['message']['content'])\""
  answer_detail: 보안 시나리오 생성은 LLM을 활용한 위협 모델링의 기초입니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: AI 규제 심층분석 시나리오 — curl /api/chat gemma3:4b + system (scenario generator) + user 'Generate
