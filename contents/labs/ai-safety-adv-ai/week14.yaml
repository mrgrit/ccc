lab_id: ai-safety-adv-ai-week14
title: '[Non-AI] 규제 심층분석'
version: ai
course: ai-safety-adv-ai
week: 14
description: 'AI 관련 규제를 심층 분석합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 글로벌 규제를 비교한다
- 실무 적용을 실습한다
- 로드맵을 수립한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 regulation deep-dive 관련 기본 질문을 전송하시오. 'Explain regulation deep-dive in cybersecurity'를
    질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: regulation deep-dive의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl -s ${BASTION_URL:-http://localhost:8003}/api/generate\
    \ \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\":\"Explain regulation deep-dive in cybersecurity in\
    \ 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json;\
    \ print(json.load(sys.stdin)['response'])\""
  answer_detail: regulation deep-dive의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: 'AI 규제 심층분석 개념 질의 — curl /api/generate gemma3:4b + ''Explain regulatory deep dive in cybersecurity
        in 3 sentences'' + num_predict=80. EU AI Act (Regulation 2024/1689 risk-based 4-tier: Unacceptable/High/Limited/Minimal)
        + US EO 14110 (Biden 2023) + AI Bill of Rights (OSTP) + China 생성형 AI 서비스 관리 잠행판법 2023 + Korea
        AI 기본법 + NIST AI RMF 1.0 + ISO/IEC 42001:2023 AIMS + ISO/IEC 23894 AI Risk Management + GDPR Art.22/35
        DPIA + FDA SaMD.'
      success_criteria:
      - curl /api/generate + num_predict=80
      - regulation / compliance / governance 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - EU AI Act / NIST AI RMF / ISO 42001 맥락 없음
      - 단일 규제만 언급
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain regulation deep-dive in cybersecurity in 3 sentences\",\"stream\":false,\"options\"\
    :{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: Ollama API로 regulation deep-dive 관련 기본 질문을 전송하시오. 'Explain regulation deep-dive in cybersecurity'를
    질문하고 응답을 분석하라.
- order: 2
