lab_id: ai-safety-adv-ai-week05
title: '[Non-AI] 연합학습 보안'
version: ai
course: ai-safety-adv-ai
week: 5
description: '연합학습 환경의 보안을 분석합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을 선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- 연합학습 위협을 이해한다
- 공격을 시뮬레이션한다
- 방어를 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 federated learning security 관련 기본 질문을 전송하시오. 'Explain federated learning security
    in cybersecurity'를 질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: federated learning security의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI): curl\
    \ -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\",\"prompt\"\
    :\"Explain federated learning security in cybersecurity in 3 sentences\",\"stream\":false,\"options\"\
    :{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: federated learning security의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: '연합학습 보안(Federated Learning Security) 개념 질의 — curl /api/generate gemma3:4b + ''Explain federated
        learning security in cybersecurity in 3 sentences'' + num_predict=80. McMahan 2017 FedAvg 분산학습
        + 클라이언트 측 data + central server 집계 + 보안 위협: Byzantine 공격/model poisoning (Bhagoji 2019)/gradient
        leakage (Zhu 2019 DLG)/membership inference + 방어: Secure Aggregation (Bonawitz 2017) + DP-SGD
        (Abadi 2016).'
      success_criteria:
      - curl /api/generate + num_predict=80
      - federated / FL / 연합학습 키워드 응답
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python client
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - FedAvg / Byzantine 맥락 없음
      - 중앙집중 학습과 혼동
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\":\"gemma3:4b\"\
    ,\"prompt\":\"Explain federated learning security in cybersecurity in 3 sentences\",\"stream\":false,\"\
    options\":{\"num_predict\":80}}' \\\n | python3 -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
