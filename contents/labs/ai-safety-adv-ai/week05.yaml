lab_id: ai-safety-adv-ai-week05
title: AI 에이전트 보안 AI 분석
version: ai
course: ai-safety-adv-ai
week: 5
description: AI를 활용하여 에이전트 보안을 자동 평가하는 실습
difficulty: hard
duration_minutes: 120
objectives:
- AI를 활용하여 에이전트 보안 분석을 자동화할 수 있다
- LLM 기반 에이전트 분석/테스트를 수행할 수 있다
- AI 파이프라인으로 에이전트 평가를 효율화할 수 있다
pass_threshold: 0.6
