lab_id: battle-ai-week12
title: 실전 공방전 2 — Red Phase → Blue Phase → 판정 (라운드 2, 강화) (AI 지원)
version: ai
course: battle-ai
week: 12
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. 라운드 1의 교훈을 반영하여 Blue는 더 강한 하드닝을, Red는
  더 정교한 우회 기법을 사용한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 라운드 1의 교훈을 반영한 강화된 전략을 적용한다
- WAF 우회와 고급 방어 기법을 실전에 적용한다
- 자동화 대응과 고급 공격을 경험한다
prerequisites:
- Week 11 라운드 1 완료
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] 라운드 1의 교훈을 반영하여 자동 대응 스크립트를 배포하라. Suricata 경보 시 자동으로 IP를 차단한다.'
  hint: Suricata fast.log를 모니터링하여 공격 IP를 추출한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] 라운드 1의 교훈을 반영하여 자동 대응 스크립트를 배포하라. Suricata 경보 시\
    \ 자동으로 IP를 차단한다해줘\n\U0001F4CE 참고 (CLI): cat > /tmp/auto_response.sh << 'SCRIPT'\n\
    #!/bin/bash\ntail -Fn0 /var/log/suricata/fast.log | while read line; do\n  IP=$(echo\
    \ $line | grep -oP '\\d+\\.\\d+\\.\\d+\\.\\d+' | head -1)\n  if [ -n \"$IP\" ]\
    \ && [ \"$IP\" != \"10.20.30.1\" ] && [ \"$IP\" != \"10.20.30.80\" ] && [ \"$IP\"\
    \ != \"10.20.30.100\" ]; then\n    sudo nft add element inet filter blocklist\
    \ { $IP } 2>/dev/null\n    echo \"$(date): Auto-blocked $IP\" >> /tmp/auto_response.log\n\
    \  fi\ndone\nSCRIPT\nchmod +x /tmp/auto_response.sh && echo 'Auto-response script\
    \ deployed'"
  answer_detail: 자동 대응 스크립트는 Suricata 경보에서 공격 IP를 추출하여 즉시 nftables blocklist에 추가한다.
    내부 VM IP는 제외한다.
  verify:
    type: output_contains
    expect: Auto-response script deployed
    field: stdout
    semantic:
      intent: '[BLUE] Round 2 자동 대응 배포 — Suricata eve.json tail -f 모니터링 + alert 이벤트
        감지 시 src_ip 추출 → nft add element @blocklist { <ip> } 자동 차단 스크립트 /tmp/auto_response.sh
        데몬화. Round 1 교훈: 수동 대응 지연 → 자동화로 MTTR 초 단위 축소. SOAR 기초 개념'
      success_criteria:
      - /tmp/auto_response.sh 또는 유사 스크립트 생성
      - tail -f eve.json + jq src_ip + nft add element 파이프라인
      - 자동 차단 (unattended) 개념
      acceptable_methods:
      - bash while read + jq + nft add element
      - systemd service 로 daemonize
      - Fail2ban filter + action
      - Wazuh active response 모듈
      negative_signs:
      - 수동 확인 (자동화 아님)
      - 스크립트 파일 미생성
      - MTTR 단축 목적 없음
  target_vm: secu
  script: "cat > /tmp/auto_response.sh << 'SCRIPT'\n#!/bin/bash\ntail -Fn0 /var/log/suricata/fast.log\
    \ | while read line; do\n  IP=$(echo $line | grep -oP '\\d+\\.\\d+\\.\\d+\\.\\\
    d+' | head -1)\n  if [ -n \"$IP\" ] && [ \"$IP\" != \"10.20.30.1\" ] && [ \"$IP\"\
    \ != \"10.20.30.80\" ] && [ \"$IP\" != \"10.20.30.100\" ]; then\n    sudo nft\
    \ add element inet filter blocklist { $IP } 2>/dev/null\n    echo \"$(date): Auto-blocked\
    \ $IP\" >> /tmp/auto_response.log\n  fi\ndone\nSCRIPT\nchmod +x /tmp/auto_response.sh\
    \ && echo 'Auto-response script deployed'"
  risk_level: low
  bastion_prompt: '[BLUE] 라운드 1의 교훈을 반영하여 자동 대응 스크립트를 배포하라. Suricata 경보 시 자동으로 IP를
    차단한다해줘'
- order: 2
  instruction: '[RED] 라운드 1에서 차단된 공격이 여전히 막히는지 확인하고, WAF를 우회하는 SQL Injection을 시도하라.'
  hint: 인코딩, 주석, 대소문자 혼합으로 WAF를 우회한다.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: [RED] 라운드 1에서 차단된 공격이 여전히 막히는지 확인하고, WAF를 우회하는 SQL Injection을\
    \ 시도해줘\n\U0001F4CE 참고 (CLI): curl -s 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1%27%20%2f**%2fuNiOn%2f**%2fsElEcT%201%2c2--%20&Submit=Submit'\
    \ -b 'security=low; PHPSESSID=test' \\\n  -o /dev/null \\\n  -w '%{http_code}'\
    \ && echo ' - WAF bypass attempt'"
  answer_detail: 'WAF 우회 기법: 대소문자 혼합(uNiOn), SQL 주석(/**/) 삽입, URL 인코딩. 정교한 WAF는 이런
    우회도 탐지하지만, 기본 정규식 필터는 우회 가능하다.'
  verify:
    type: output_contains
    expect: WAF bypass attempt
    field: stdout
    semantic:
      intent: '[RED] Round 2 차단 재검증 + WAF 우회 SQLi — curl 로 이전 차단 IP 접근 시도 (403/차단
        확인) 후 UNION 없는 변형 SQLi (대소문자 혼합·주석 /**/·URL 인코딩·이중 인코딩) 시도. ModSec/Suricata
        시그니처 기반 탐지 회피. Round 2 공격 고도화'
      success_criteria:
      - 차단 상태 확인 (curl --connect-timeout)
      - UNION 없는 SQLi 변형 페이로드
      - Round 2 공격 고도화 맥락
      acceptable_methods:
      - curl 차단 체크 + 변형 페이로드
      - sqlmap --tamper=space2comment
      - '%27+UNION 대신 +oR+1=1--'
      - Burp Intruder payload list
      negative_signs:
      - 기본 UNION 페이로드 (탐지됨)
      - 차단 체크 누락
      - WAF 우회 개념 없음
  target_vm: attacker
  script: "curl -s 'http://10.20.30.80:8080/vulnerabilities/sqli/?id=1%27%20%2f**%2fuNiOn%2f**%2fsElEcT%201%2c2--%20&Submit=Submit'\
    \ -b 'security=low; PHPSESSID=test' \\\n  -o /dev/null \\\n  -w '%{http_code}'\
    \ && echo ' - WAF bypass attempt'"
  risk_level: medium
  bastion_prompt: '[RED] 라운드 1에서 차단된 공격이 여전히 막히는지 확인하고, WAF를 우회하는 SQL Injection을 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[BLUE] web 서버 로그에서 WAF 우회 시도를 탐지하라.'
  hint: URL 인코딩을 디코딩하여 분석한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] web 서버 로그에서 WAF 우회 시도를 탐지해줘

    📎 참고 (CLI): tail -30 /var/log/apache2/access.log 2>/dev/null | python3 -c "import
    sys,urllib.parse; [print(urllib.parse.unquote(l.strip())) for l in sys.stdin]"
    2>/dev/null | grep -iE ''(union|select)'' | tail -5 || echo ''WAF bypass detection
    check complete'''
  answer_detail: URL 인코딩된 로그를 디코딩하면 실제 공격 페이로드를 확인할 수 있다. 디코딩 후 SQL 키워드가 발견되면 WAF
    규칙에 변형도 추가해야 한다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
    semantic:
      intent: '[BLUE] WAF 우회 시도 탐지 — modsec_audit.log 에서 grep -E (SQL|Injection|id
        9) 로 ModSec 탐지 이벤트 + access.log 에서 /**/·%25 같은 이중 인코딩 패턴 추가 grep. Round 2
        공격자의 회피 기법 역분석 → 룰셋 보강 근거'
      success_criteria:
      - modsec_audit.log + access.log 교차 조회
      - /**/·%25·%2527 같은 이중 인코딩 패턴 탐지
      - WAF 우회 기법 역분석 개념
      acceptable_methods:
      - grep -E (%25|/\*\*/|nocase) log
      - jq modsec event + classify
      - auditd 로 파일 접근 로그
      - Wazuh ModSec 통합
      negative_signs:
      - 일반 SQLi 패턴만
      - 이중 인코딩/주석 우회 패턴 누락
      - 회피 대응 계획 없음
  target_vm: web
  script: tail -30 /var/log/apache2/access.log 2>/dev/null | python3 -c "import sys,urllib.parse;
    [print(urllib.parse.unquote(l.strip())) for l in sys.stdin]" 2>/dev/null | grep
    -iE '(union|select)' | tail -5 || echo 'WAF bypass detection check complete'
  risk_level: low
  bastion_prompt: '[BLUE] web 서버 로그에서 WAF 우회 시도를 탐지해줘'
- order: 4
  instruction: '[RED] JuiceShop의 다른 취약점을 탐색하라. 디렉토리 브루트포스로 숨겨진 경로를 찾는다.'
  hint: gobuster 또는 dirb로 경로 탐색을 수행한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] JuiceShop의 다른 취약점을 탐색해줘

    📎 참고 (CLI): dirb http://10.20.30.80:3000/ /usr/share/wordlists/dirb/common.txt
    -r 2>&1 | grep ''CODE:200\|CODE:301\|CODE:302'' | head -10 || echo ''Directory
    scan complete'''
  answer_detail: JuiceShop은 REST API 기반으로 /api/, /rest/, /ftp/ 등 다양한 경로가 있다. 숨겨진 관리
    기능이나 디버그 엔드포인트를 발견할 수 있다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
    semantic:
      intent: '[RED] JuiceShop 숨겨진 경로 브루트포스 — gobuster dir -u http://<web>:3000 -w
        common.txt -t 20 로 /admin·/api·/ftp·/rest·/graphql 등 공개되지 않은 엔드포인트 탐색. UNION/SQLi
        차단 환경에서 새 공격 벡터 확보 목적. HTTP 상태 200/301/403 응답 = 실존 자원'
      success_criteria:
      - gobuster 또는 dirb 실행 + 3000 포트
      - wordlist(common.txt 등) 사용
      - 숨겨진 경로 (/admin·/ftp·/api) 발견
      acceptable_methods:
      - gobuster dir -u <url>:3000 -w common.txt -t 20
      - dirb http://<url>:3000/ common.txt
      - ffuf -u <url>/FUZZ -w wordlist
      - feroxbuster -u <url>
      negative_signs:
      - wordlist 없이 추측
      - 3000 포트 대신 다른 서비스
      - 발견 경로 기록 없음
  target_vm: attacker
  script: dirb http://10.20.30.80:3000/ /usr/share/wordlists/dirb/common.txt -r 2>&1
    | grep 'CODE:200\|CODE:301\|CODE:302' | head -10 || echo 'Directory scan complete'
  risk_level: low
  bastion_prompt: '[RED] JuiceShop의 다른 취약점을 탐색해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: '[RED] JuiceShop의 /ftp 디렉토리에서 민감한 파일을 다운로드하라.'
  hint: curl로 /ftp/ 경로에 접근한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] JuiceShop의 /ftp 디렉토리에서 민감한 파일을 다운로드해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/ftp/ && echo ''\n=== FTP directory
    listing retrieved ==='''
  answer_detail: JuiceShop의 /ftp/ 경로에는 백업 파일, 설정 파일 등 민감한 파일이 노출될 수 있다. 디렉토리 리스팅은
    정보 유출 취약점이다.
  verify:
    type: output_contains
    expect: FTP directory listing
    field: stdout
    semantic:
      intent: '[RED] JuiceShop /ftp 디렉토리 민감 파일 다운로드 — curl http://<web>:3000/ftp/
        (디렉토리 리스팅) + curl http://<web>:3000/ftp/legal.md / acquisitions.md / coupons_2013.md.bak
        (민감 파일). JuiceShop 유명 취약점: /ftp 가 public 하게 노출. Path Traversal(%2e%2e%2f)·Null
        byte(%00) 로 원본 파일 추출 가능'
      success_criteria:
      - curl http://<web>:3000/ftp/ 디렉토리 조회
      - 민감 파일 다운로드 (acquisitions·coupons·legal)
      - Path Traversal 또는 Null byte 변형 언급
      acceptable_methods:
      - curl /ftp/<file>
      - curl %2e%2e%2f path traversal
      - '%2500 null byte 필터 우회'
      - wget -r recursive
      negative_signs:
      - /ftp 외 다른 경로
      - 파일 다운로드 없이 조회만
      - JuiceShop 특유 취약점 인지 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/ftp/ && echo '\n=== FTP directory listing
    retrieved ==='
  risk_level: medium
  bastion_prompt: '[RED] JuiceShop의 /ftp 디렉토리에서 민감한 파일을 다운로드해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: '[BLUE] Suricata와 Wazuh에서 이번 라운드의 종합 알림을 분석하라.'
  hint: eve.json과 wazuh alerts를 병합 분석한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata와 Wazuh에서 이번 라운드의 종합 알림을 분석해줘

    📎 참고 (CLI): echo ''=== Suricata Alerts ==='' && cat /var/log/suricata/eve.json
    | jq -r ''select(.event_type=="alert") | "\(.timestamp[:19]) \(.alert.signature)"''
    2>/dev/null | tail -10 && echo ''=== Analysis complete ==='''
  answer_detail: Suricata(네트워크)와 Wazuh(호스트) 알림을 병합하면 공격의 전체 그림을 파악할 수 있다.
  verify:
    type: output_contains
    expect: Analysis complete
    field: stdout
    semantic:
      intent: '[BLUE] Round 2 Suricata + Wazuh 교차 분석 — jq select(.event_type==alert)
        eve.json + jq select(.rule.level >= 5) alerts.json 두 소스 이벤트를 timestamp 기준
        정렬해 네트워크(Suricata) + 호스트(Wazuh) 관점 통합. 공격자 TTP 전체 윤곽 파악. 단일 소스 한계 보완'
      success_criteria:
      - Suricata eve.json + Wazuh alerts.json 둘 다 조회
      - timestamp 기준 정렬 또는 교차 상관 분석
      - 네트워크 + 호스트 관점 통합
      acceptable_methods:
      - jq 두 소스 + sort -k1 (timestamp)
      - Wazuh 에 Suricata 통합 설정
      - Elastic Stack 으로 양쪽 필드 통합
      - SIEM correlation rule
      negative_signs:
      - 단일 소스만 분석
      - timestamp 정렬 없음
      - 상관 분석 개념 없음
  target_vm: secu
  script: echo '=== Suricata Alerts ===' && cat /var/log/suricata/eve.json | jq -r
    'select(.event_type=="alert") | "\(.timestamp[:19]) \(.alert.signature)"' 2>/dev/null
    | tail -10 && echo '=== Analysis complete ==='
  risk_level: low
  bastion_prompt: '[BLUE] Suricata와 Wazuh에서 이번 라운드의 종합 알림을 분석해줘'
- order: 7
  instruction: '[BLUE] 자동 대응 로그를 확인하고, 자동 차단된 IP를 검토하라.'
  hint: auto_response.log를 확인한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 자동 대응 로그를 확인하고, 자동 차단된 IP를 검토해줘

    📎 참고 (CLI): cat /tmp/auto_response.log 2>/dev/null || echo ''No auto-blocks yet''
    && nft list set inet filter blocklist 2>/dev/null'
  answer_detail: 자동 대응 스크립트가 정상 동작했는지 확인한다. 오탐으로 인한 잘못된 차단이 없는지도 검토한다.
  verify:
    type: output_contains
    expect: blocklist
    field: stdout
    semantic:
      intent: '[BLUE] 자동 대응 로그 + 자동 차단 IP 검토 — tail /var/log/auto_response.log (s1
        에서 배포한 자동화 스크립트 로그) + nft list set inet filter blocklist 로 현재 blocklist 상태.
        자동 차단된 IP 가 false positive 인지 검증 (정상 사용자 차단 여부). 자동화 시스템의 오탐 관리'
      success_criteria:
      - /var/log/auto_response.log 또는 자동 대응 이력 조회
      - nft list set blocklist 현재 목록 확인
      - false positive 검토 개념
      acceptable_methods:
      - tail auto_response.log + nft list set
      - journalctl -u auto_response
      - Wazuh Active Response 이력
      - fail2ban-client status
      negative_signs:
      - 자동 대응 이력 누락
      - blocklist 현재 상태 미확인
      - false positive 검토 없음
  target_vm: secu
  script: cat /tmp/auto_response.log 2>/dev/null || echo 'No auto-blocks yet' && nft
