lab_id: battle-ai-week02
title: 취약점 스캐닝 및 분석 — CVE 기반 공격 벡터 식별 (AI 지원)
version: ai
course: battle-ai
week: 2
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 자동화 취약점 스캐너와 수동 분석으로 공격 벡터를 식별하고, Blue Phase에서
  스캐닝 행위를 탐지하고 취약점을 사전 점검한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: easy
duration_minutes: 120
objectives:
- 자동화 취약점 스캐너를 활용한 취약점 탐지를 수행한다
- CVE 데이터베이스에서 취약점 정보를 검색하고 분석한다
- Blue 관점에서 스캐닝을 탐지하고 취약점 노출 현황을 파악한다
prerequisites:
- Week 1 정찰 실습 완료
- nmap 기본 사용법
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] nmap의 vuln 스크립트 카테고리를 사용하여 web 서버의 알려진 취약점을 스캔하라.'
  hint: --script vuln 옵션을 사용한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] nmap의 vuln 스크립트 카테고리를 사용하여 web 서버의 알려진 취약점을 스캔해줘

    📎 참고 (CLI): nmap --script vuln -p 80,3000,8080 -T4 --max-retries 1 --host-timeout 30s 10.20.30.80'
  answer_detail: --script vuln은 NSE의 vuln 카테고리 스크립트를 모두 실행한다. 각 스크립트는 특정 CVE를 검사하며, web 서버의 Apache, JuiceShop,
    DVWA 취약점을 탐지한다.
  verify:
    type: output_contains
    expect: http
    field: stdout
    semantic:
      intent: '[RED] nmap NSE vuln 카테고리 스캔 — --script vuln 으로 취약점 특화 NSE 스크립트(http-vuln-cve-*, ssl-heartbleed,
        smb-vuln-*) 일괄 실행. 포트 80(Apache)·3000(JuiceShop)·8080(DVWA) 대상. 각 스크립트가 특정 CVE 검사. --host-timeout
        30s 로 긴 검사 제한'
      success_criteria:
      - nmap --script vuln 또는 --script=http-vuln-* 실행
      - 포트 80/3000/8080 지정
      - http 키워드 + CVE 또는 vuln 식별자 출력
      acceptable_methods:
      - nmap --script vuln -p <ports>
      - nmap --script=http-vuln-* --script-args
      - OpenVAS / Nessus 자동 스캔
      - nuclei -t cves/ -u <url>
      negative_signs:
      - 일반 포트 스캔 (vuln 스크립트 없음)
      - 단일 CVE 스크립트 만 (카테고리 아님)
      - 스캐너 결과 해석 없음
  target_vm: attacker
  script: nmap --script vuln -p 80,3000,8080 -T4 --max-retries 1 --host-timeout 30s 10.20.30.80
  risk_level: low
  bastion_prompt: '[RED] nmap의 vuln 스크립트 카테고리를 사용하여 web 서버의 알려진 취약점을 스캔해줘'
- order: 2
  instruction: '[RED] Nikto를 사용하여 web 서버(80번 포트)의 웹 취약점을 스캔하라.'
  hint: nikto -h 옵션으로 대상을 지정한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] Nikto를 사용하여 web 서버(80번 포트)의 웹 취약점을 스캔해줘

    📎 참고 (CLI): nikto -h http://10.20.30.80/ -maxtime 60s'
  answer_detail: Nikto는 웹서버 전용 취약점 스캐너이다. 위험한 파일/CGI, 오래된 서버 소프트웨어, 잘못된 설정 등 6,700개 이상의 항목을 검사한다.
  verify:
    type: output_contains
    expect: 'Server:'
    field: stdout
    semantic:
      intent: '[RED] Nikto 웹 취약점 스캐너 — nikto -h http://10.20.30.80/ -maxtime 60s 로 Apache(80) 대상 6,700+
        항목 검사 (위험 CGI, 오래된 서버, 설정 오류, 기본 파일, 백업). -maxtime 60s 로 스캔 시간 제한. Server 헤더 + 발견된 취약점 목록'
      success_criteria:
      - nikto -h <url> 실행
      - 'Server: 헤더 또는 Apache 식별 정보 출력'
      - 위험 파일/설정/버전 같은 Nikto 특유 발견 카테고리 인지
      acceptable_methods:
      - nikto -h <url> -maxtime <sec>
      - nikto -h <url> -Tuning 9 (특정 테스트만)
      - wapiti -u <url> 대안 스캐너
      - OWASP ZAP Active Scan
      negative_signs:
      - nikto 대신 일반 curl/wget 만
      - 호스트 헤더 없이 IP 만 (가상 호스트 놓침)
      - 스캔 시간 제한 없음 (장시간 지속)
  target_vm: attacker
  script: nikto -h http://10.20.30.80/ -maxtime 60s
  risk_level: low
  bastion_prompt: '[RED] Nikto를 사용하여 web 서버(80번 포트)의 웹 취약점을 스캔해줘'
- order: 3
  instruction: '[RED] searchsploit을 사용하여 Apache 관련 알려진 익스플로잇을 검색하라.'
  hint: searchsploit 명령에 서비스명과 버전을 입력한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] searchsploit을 사용하여 Apache 관련 알려진 익스플로잇을 검색해줘

    📎 참고 (CLI): searchsploit apache 2.4'
  answer_detail: searchsploit은 ExploitDB의 오프라인 검색 도구이다. 서비스명+버전으로 검색하면 해당하는 PoC 코드와 설명을 확인할 수 있다.
  verify:
    type: output_contains
    expect: Apache
    field: stdout
    semantic:
      intent: '[RED] searchsploit Apache 2.4 ExploitDB 오프라인 검색 — Kali 에 번들된 ExploitDB mirror 에서 apache
        2.4 키워드 매칭으로 PoC 코드·EDB-ID·발행일 조회. CVE-2021-40438(mod_proxy SSRF), CVE-2021-41773(path traversal)
        등 유명 취약점 발견. 버전+서비스 조합으로 exploit 선정'
      success_criteria:
      - searchsploit apache 2.4 또는 유사 쿼리
      - Apache 키워드 포함 + Exploit 목록 출력
      - ExploitDB / EDB-ID / PoC 개념 언급
      acceptable_methods:
      - searchsploit apache 2.4
      - searchsploit -m <EDB-ID> (복제)
      - 웹 exploit-db.com 검색
      - metasploit search type:exploit name:apache
      negative_signs:
      - 일반 grep/find 로 찾음 (searchsploit 없음)
      - CVE 매핑 없이 결과만 나열
      - apache 외 다른 서비스 검색
  target_vm: attacker
  script: searchsploit apache 2.4
  risk_level: low
  bastion_prompt: '[RED] searchsploit을 사용하여 Apache 관련 알려진 익스플로잇을 검색해줘'
- order: 4
  instruction: '[RED] web 서버의 SSH 서비스 보안 설정을 nmap 스크립트로 점검하라.'
  hint: ssh-auth-methods, ssh2-enum-algos 스크립트를 사용한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] web 서버의 SSH 서비스 보안 설정을 nmap 스크립트로 점검해줘

    📎 참고 (CLI): nmap --script ssh-auth-methods,ssh2-enum-algos -p 22 -T4 --max-retries 1 --host-timeout
    15s 10.20.30.80'
  answer_detail: ssh-auth-methods는 허용된 인증 방식(password, publickey 등)을, ssh2-enum-algos는 지원하는 암호화 알고리즘을
    열거한다. 약한 알고리즘이나 password 인증 허용은 취약점이다.
  verify:
    type: output_contains
    expect: ssh
    field: stdout
    semantic:
      intent: '[RED] SSH 보안 설정 점검 — nmap --script ssh-auth-methods(허용 인증 방식: password/publickey/keyboard-interactive)
        + ssh2-enum-algos(지원 암호화 KEX/cipher/MAC/host-key 알고리즘). 약한 알고리즘(arcfour, CBC 모드) 또는 password 인증
        허용 여부 식별. 무차별 대입·downgrade 공격 벡터 분석'
      success_criteria:
      - nmap --script ssh-auth-methods,ssh2-enum-algos 실행
      - ssh 키워드 + 인증 방식 또는 알고리즘 목록 출력
      - password 인증/약한 알고리즘 취약점 식별
      acceptable_methods:
      - nmap --script ssh-auth-methods,ssh2-enum-algos -p 22
      - ssh-audit.py <host> 종합 감사
      - ssh -vvv <host> 연결 로그 분석
      - sshscan 도구
      negative_signs:
      - 일반 포트 스캔만 (SSH 스크립트 없음)
      - 인증 방식/알고리즘 해석 없음
      - password 인증 같은 취약 설정 식별 없음
  target_vm: attacker
  script: nmap --script ssh-auth-methods,ssh2-enum-algos -p 22 -T4 --max-retries 1 --host-timeout 15s
    10.20.30.80
  risk_level: low
  bastion_prompt: '[RED] web 서버의 SSH 서비스 보안 설정을 nmap 스크립트로 점검해줘'
- order: 5
  instruction: '[RED] 웹 디렉토리 브루트포스를 수행하여 DVWA(:8080)의 숨겨진 경로를 탐색하라.'
  hint: dirb 또는 gobuster 도구를 사용한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 웹 디렉토리 브루트포스를 수행하여 DVWA(:8080)의 숨겨진 경로를 탐색해줘

    📎 참고 (CLI): dirb http://10.20.30.80:8080/ /usr/share/wordlists/dirb/common.txt -r'
  answer_detail: dirb는 사전 파일의 경로를 하나씩 요청하여 존재하는 디렉토리/파일을 탐색한다. -r 옵션은 재귀를 비활성화하여 속도를 높인다.
  verify:
    type: output_contains
    expect: FOUND
    field: stdout
    semantic:
      intent: '[RED] dirb 웹 디렉토리 브루트포스 — DVWA(10.20.30.80:8080) 대상 /usr/share/wordlists/dirb/common.txt
        사전 사용. -r 재귀 비활성으로 속도 향상. 숨겨진 admin·backup·config·uploads·login 같은 경로 탐색. HTTP 200/301/401 응답으로
        실존 자원 식별'
      success_criteria:
      - dirb 또는 gobuster 실행 + DVWA 대상
      - common.txt 또는 유사 wordlist 사용
      - FOUND 또는 discovered 경로 출력
      acceptable_methods:
      - dirb http://<url>/ common.txt -r
      - gobuster dir -u <url> -w common.txt
      - ffuf -u <url>/FUZZ -w common.txt
      - feroxbuster -u <url> -w wordlist
      negative_signs:
      - wordlist 없이 단일 경로만 요청
      - 재귀 스캔으로 과다 요청 (시간 초과)
      - 발견 경로 목록 없음
  target_vm: attacker
  script: dirb http://10.20.30.80:8080/ /usr/share/wordlists/dirb/common.txt -r
  risk_level: low
  bastion_prompt: '[RED] 웹 디렉토리 브루트포스를 수행하여 DVWA(:8080)의 숨겨진 경로를 탐색해줘'
- order: 6
  instruction: '[BLUE] Suricata에서 취약점 스캐닝 관련 알림을 확인하라.'
  hint: fast.log에서 vuln scan 관련 경보를 검색한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata에서 취약점 스캐닝 관련 알림을 확인해줘

    📎 참고 (CLI): tail -50 /var/log/suricata/fast.log | grep -iE ''(scan|vuln|nikto|sql)'' | tail -10'
  answer_detail: Nikto, nmap vuln 스캔은 특징적인 패턴을 남긴다. Suricata의 ET Open 룰셋은 주요 스캐너의 User-Agent, 요청 패턴을 탐지한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] Suricata fast.log 취약점 스캐너 특유 시그니처 탐지 — grep -iE (scan|vuln|nikto|sql) 로 Nikto User-Agent·nmap
        vuln 프로브·sqlmap 시도 필터링. ET Open 룰셋이 주요 스캐너 패턴 등록. 이전 RED 단계(s1~s5) 스캔 활동 검증'
      success_criteria:
      - tail /var/log/suricata/fast.log + grep 필터
      - 10.20.30 IP 포함 출력 (공격자/대상)
      - Nikto/nmap/sql/scan 관련 경보 식별
      acceptable_methods:
      - tail + grep -iE (scan|vuln|nikto|sql)
      - jq 로 eve.json alert_signature 필터
      - journalctl -u suricata --since 1h 실시간
      - Kibana Discover 으로 시간 범위 검색
      negative_signs:
      - 전체 로그 덤프 (스캔/vuln 필터링 없음)
      - RED 스캔 활동과 연관 분석 누락
      - ET Open 룰셋 역할 언급 없음
  target_vm: secu
  script: tail -50 /var/log/suricata/fast.log | grep -iE '(scan|vuln|nikto|sql)' | tail -10
  risk_level: low
  bastion_prompt: '[BLUE] Suricata에서 취약점 스캐닝 관련 알림을 확인해줘'
- order: 7
  instruction: '[BLUE] web 서버의 Apache access.log에서 스캐닝 흔적을 분석하라.'
  hint: HTTP 상태 코드별 요청 건수를 집계한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] web 서버의 Apache access.log에서 스캐닝 흔적을 분석해줘

    📎 참고 (CLI): awk ''{print $9}'' /var/log/apache2/access.log 2>/dev/null | sort | uniq -c | sort -rn
    | head -10'
  answer_detail: 404가 대량이면 디렉토리 브루트포스, 403이 많으면 접근 차단된 경로 탐색 시도이다. 정상 트래픽 대비 비정상적인 상태 코드 비율을 확인한다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: '[BLUE] Apache access.log HTTP 상태코드별 요청 집계 — awk {print $9} (9번째 필드=상태코드) | sort | uniq
        -c | sort -rn | head -10. 대량 404 → 디렉토리 브루트포스, 403 대량 → 차단된 경로 탐색, 500 → exploit 시도 징후. 상태 코드
        분포 이상치로 스캐닝 트래픽 식별'
      success_criteria:
      - awk {print $9} + sort/uniq -c 집계 파이프라인
      - 200 또는 상태코드 숫자 출력
      - 404/403/500 대량 발생 의미 해석
      acceptable_methods:
      - awk + sort + uniq -c + sort -rn
      - goaccess /var/log/apache2/access.log
      - GoAccess / Matomo / ELK 로그 분석
      - python pandas value_counts
      negative_signs:
      - raw 로그 덤프 (집계 없음)
      - 상태코드 해석 없음 — 숫자만
      - 공격 패턴 추론 없음
  target_vm: web
  script: awk '{print $9}' /var/log/apache2/access.log 2>/dev/null | sort | uniq -c | sort -rn | head
    -10
  risk_level: low
  bastion_prompt: '[BLUE] web 서버의 Apache access.log에서 스캐닝 흔적을 분석해줘'
- order: 8
  instruction: '[BLUE] secu에서 공격자 IP({{ATTACKER_IP}})의 스캔 트래픽 빈도를 확인하고, 과도한 스캔 시 nftables로 rate limiting을
    적용하라.'
  hint: nft add rule로 rate limiting을 설정한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] secu에서 공격자 IP(10.20.30.201)의 스캔 트래픽 빈도를 확인하고, 과도한 스캔 시 nftables로 rate limiting을
    적용해줘

    📎 참고 (CLI): sudo nft add rule inet filter input ip saddr 10.20.30.201 tcp dport 80 ct state new limit
    rate over 30/minute drop && nft list ruleset | grep ''10.20.30.201'''
  answer_detail: rate limiting으로 분당 30회 이상의 새 연결을 차단하면 자동화 스캐너의 효율을 크게 떨어뜨린다. 정상 접근은 허용하면서 스캐닝만 억제한다.
  verify:
    type: output_contains
    expect: 10.20.30.201
    field: stdout
    semantic:
      intent: '[BLUE] secu nftables rate limiting 적용 — nft add rule inet filter input ip saddr 10.20.30.201
        tcp dport 80 ct state new limit rate over 30/minute drop 로 공격자 IP 의 분당 30회 초과 새 연결 차단. nft list
        ruleset | grep 10.20.30.201 로 룰 적용 확인. 자동화 스캐너 속도 감속 방어'
      success_criteria:
      - nftables 또는 nft add rule 명령 실행
      - 공격자 IP(10.20.30.201) + rate limit 설정
      - nft list ruleset 로 적용 확인
      acceptable_methods:
      - nft add rule inet filter input ... limit rate over <N>/minute drop
      - iptables -A INPUT -m limit --limit 30/min
      - fail2ban jail 로 자동 차단
      - Cloudflare rate limiting (상용)
      negative_signs:
      - iptables/nftables 없이 차단 개념만
      - rate limit 없이 완전 차단
