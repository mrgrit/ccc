lab_id: battle-ai-week15
title: 공방전 분석 및 최종 보고서 작성 (AI 지원)
version: ai
course: battle-ai
week: 15
description: 1세트 인프라에서 수행한 전체 15주 과정을 회고하고, 공방전 결과를 종합 분석하여 최종 보고서를 작성한다. 개인 성장, 기술 역량, 향후 학습 로드맵을 포함하는
  포트폴리오 문서를 완성한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 전체 공방전 결과를 정량적/정성적으로 분석한다
- 개인 보안 역량 성장을 평가한다
- 전문 수준의 최종 보고서를 작성한다
prerequisites:
- Week 1-14 전체 과정 이수
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: 전체 15주 과정에서 수집한 모든 보고서와 증거 파일을 정리하라.
  hint: /tmp/ 디렉토리의 모든 보고서를 한 곳에 모은다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 전체 15주 과정에서 수집한 모든 보고서와 증거 파일을 정리해줘

    📎 참고 (CLI): mkdir -p /tmp/final_portfolio && cp /tmp/*report*.txt /tmp/*playbook*.txt /tmp/*mapping*.txt
    /tmp/final_portfolio/ 2>/dev/null; echo ''=== Portfolio ==='' && ls -la /tmp/final_portfolio/ 2>/dev/null'
  answer_detail: 포트폴리오 구성을 위해 전체 과정의 산출물을 한 곳에 모은다.
  verify:
    type: output_contains
    expect: Portfolio
    field: stdout
    semantic:
      intent: '[공통] 15주 전체 산출물 취합 — ls /tmp/*.txt /tmp/*.pcap /tmp/*.log 으로 수집된 모든 보고서·증거·스크립트 목록화. week01
        recon.xml·week02 attack_plan·week08 threat_hunting·week09 IR·week10 playbook·week11-13 round 보고서·week14
        APT 매핑 등 총 산출물 인벤토리. 최종 보고서 자료 수집 단계'
      success_criteria:
      - ls /tmp/*.txt 또는 /tmp/*.log 등 산출물 목록
      - 주차별 보고서 최소 10종 식별
      - 최종 보고서 자료 수집 목적
      acceptable_methods:
      - ls /tmp/*.{txt,log,pcap,sh} + wc -l
      - find /tmp -mtime -100 -type f
      - tree /tmp/
      - git log --all --oneline 로 커밋 이력
      negative_signs:
      - 산출물 수집 없이 스킵
      - 주차별 구분 없음
      - 인벤토리 카운트 없음
  target_vm: attacker
  script: mkdir -p /tmp/final_portfolio && cp /tmp/*report*.txt /tmp/*playbook*.txt /tmp/*mapping*.txt
    /tmp/final_portfolio/ 2>/dev/null; echo '=== Portfolio ===' && ls -la /tmp/final_portfolio/ 2>/dev/null
  risk_level: low
  bastion_prompt: 전체 15주 과정에서 수집한 모든 보고서와 증거 파일을 정리해줘
- order: 2
  instruction: 주차별 학습 내용과 핵심 성과를 요약하라.
  hint: 각 주차의 주제와 달성 사항을 정리한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 주차별 학습 내용과 핵심 성과를 요약해줘

    📎 참고 (CLI): cat > /tmp/final_portfolio/weekly_summary.txt << ''EOF''

    === Weekly Summary (Single Infrastructure: 10.20.30.0/24) ===


    [공격 기술 + Blue 대응 (Week 1-5)]

    Week 1: Reconnaissance + Blue 탐지 확인

    Week 2: Vulnerability Scanning + Blue rate limiting

    Week 3: Web Attacks (SQLi, XSS, CmdInj) + Blue 로그 분석

    Week 4: Password Attacks + Blue 브루트포스 탐지/차단

    Week 5: Privilege Escalation + Blue 권한 상승 탐지


    [방어 기술 + Red 우회 시도 (Week 6-9)]

    Week 6: nftables 방화벽 구축 + Red 우회 시도

    Week 7: Suricata IDS 룰 작성 + Red 탐지 회피

    Week 8: 로그 분석/위협 헌팅 + Red 흔적 은닉

    Week 9: 사고 대응(NIST) + Red 지속성 확보


    [실전 공방전 (Week 10-14)]

    Week 10: Red/Blue Phase 환경 구축 + 전략 수립

    Week 11: 실전 공방전 라운드 1 (기본)

    Week 12: 실전 공방전 라운드 2 (자동 대응)

    Week 13: 다중 벡터 공격 vs 계층 방어

    Week 14: APT 킬체인 시뮬레이션


    Week 15: 종합 분석 및 최종 보고서

    EOF

    cat /tmp/final_portfolio/weekly_summary.txt'
  answer_detail: 주차별 요약은 과정 전체의 흐름을 한눈에 파악하게 한다. 공격→방어→공방전의 3단계 커리큘럼 구조를 반영한다.
  verify:
    type: output_contains
    expect:
    - Weekly Summary
    - 요약
    field: stdout
    semantic:
      intent: '[공통] 주차별 학습 요약 /tmp/weekly_summary.txt — W1 정찰·W2 취약점·W3 웹 공격·W4 패스워드·W5 권한 상승·W6 방화벽·W7
        IDS·W8 로그 분석·W9 IR·W10 준비·W11-13 교전·W14 APT 각각 핵심 성과와 교훈. 15주 여정 compressive 요약'
      success_criteria:
      - /tmp/weekly_summary.txt 파일 생성
      - 15주 각각 핵심 성과 요약 (최소 10주)
      - 주차별 교훈/기법 언급
      acceptable_methods:
      - cat > file << EOF heredoc + 15주 나열
      - markdown 표 포맷
      - 학습 목표 vs 실제 성과 대조
      negative_signs:
      - 주차 5주 이하만
      - 교훈 없이 제목만
      - 전체 여정 관점 없음
  target_vm: attacker
  script: 'cat > /tmp/final_portfolio/weekly_summary.txt << ''EOF''

    === Weekly Summary (Single Infrastructure: 10.20.30.0/24) ===


    [공격 기술 + Blue 대응 (Week 1-5)]

    Week 1: Reconnaissance + Blue 탐지 확인

    Week 2: Vulnerability Scanning + Blue rate limiting

    Week 3: Web Attacks (SQLi, XSS, CmdInj) + Blue 로그 분석

    Week 4: Password Attacks + Blue 브루트포스 탐지/차단

    Week 5: Privilege Escalation + Blue 권한 상승 탐지


    [방어 기술 + Red 우회 시도 (Week 6-9)]

    Week 6: nftables 방화벽 구축 + Red 우회 시도

