    | Round  | Red Success | Blue Detection | Blue Block | Services Up |

    |--------|-------------|----------------|------------|-------------|

    | R1     | SQLi+CmdInj | Suricata alert | Manual IP  | 100%        |

    | R2     | WAF bypass  | Auto-response  | Auto IP    | 100%        |

    | R3     | Multi-vector| All 4 layers   | Auto+Manual| 100%        |

