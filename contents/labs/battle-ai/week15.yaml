    Week 9: 사고 대응(NIST) + Red 지속성 확보


    [실전 공방전 (Week 10-14)]

    Week 10: Red/Blue Phase 환경 구축 + 전략 수립

    Week 11: 실전 공방전 라운드 1 (기본)

    Week 12: 실전 공방전 라운드 2 (자동 대응)

