lab_id: battle-ai-week15
title: 공방전 분석 및 최종 보고서 작성 (AI 지원)
version: ai
course: battle-ai
week: 15
description: 1세트 인프라에서 수행한 전체 15주 과정을 회고하고, 공방전 결과를 종합 분석하여 최종 보고서를 작성한다. 개인 성장, 기술
  역량, 향후 학습 로드맵을 포함하는 포트폴리오 문서를 완성한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 전체 공방전 결과를 정량적/정성적으로 분석한다
- 개인 보안 역량 성장을 평가한다
- 전문 수준의 최종 보고서를 작성한다
prerequisites:
- Week 1-14 전체 과정 이수
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: 전체 15주 과정에서 수집한 모든 보고서와 증거 파일을 정리하라.
  hint: /tmp/ 디렉토리의 모든 보고서를 한 곳에 모은다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 전체 15주 과정에서 수집한 모든 보고서와 증거 파일을 정리해줘

    📎 참고 (CLI): mkdir -p /tmp/final_portfolio && cp /tmp/*report*.txt /tmp/*playbook*.txt
    /tmp/*mapping*.txt /tmp/final_portfolio/ 2>/dev/null; echo ''=== Portfolio ===''
    && ls -la /tmp/final_portfolio/ 2>/dev/null'
  answer_detail: 포트폴리오 구성을 위해 전체 과정의 산출물을 한 곳에 모은다.
  verify:
    type: output_contains
    expect: Portfolio
    field: stdout
  target_vm: attacker
  script: mkdir -p /tmp/final_portfolio && cp /tmp/*report*.txt /tmp/*playbook*.txt
    /tmp/*mapping*.txt /tmp/final_portfolio/ 2>/dev/null; echo '=== Portfolio ==='
    && ls -la /tmp/final_portfolio/ 2>/dev/null
  risk_level: low
  bastion_prompt: 전체 15주 과정에서 수집한 모든 보고서와 증거 파일을 정리해줘
