lab_id: "battle-ai-week01"
title: "AI 정찰 자동화 — 자동 네트워크 스캐닝"
version: "ai"
course: "battle-ai"
week: 1
description: "AI 에이전트가 nmap을 활용하여 대상 네트워크를 자동으로 스캐닝하고, 호스트 발견/서비스 탐지/OS 핑거프린팅을 수행한다."
difficulty: "easy"
duration_minutes: 90
objectives:
  - "AI가 네트워크 호스트를 자동 발견한다"
  - "AI가 서비스 버전을 자동 탐지한다"
  - "AI가 OS 핑거프린팅을 자동 수행한다"
  - "AI가 스캔 결과를 구조화된 형태로 출력한다"
prerequisites:
  - "네트워크 기초 이해"
  - "nmap 기본 사용법"
infra_requirements:
  - "attacker VM with bastion"
  - "defender VM"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "AI가 대상 네트워크 대역에서 활성 호스트를 탐색한다 (Ping Sweep)"
    script: "nmap -sn 10.20.30.0/24 -oG /tmp/ping_sweep.txt && cat /tmp/ping_sweep.txt"
    category: "recon"
    risk_level: "low"
    points: 15
    verify:
      type: "output_contains"
      expect: "Host:"
      field: "stdout"

  - order: 2
    instruction: "AI가 발견된 호스트의 열린 포트를 스캔한다 (TCP SYN Scan)"
    script: "nmap -sS -p 1-1024 10.20.30.1 10.20.30.80 10.20.30.100 -oN /tmp/port_scan.txt && cat /tmp/port_scan.txt"
    category: "recon"
    risk_level: "low"
    points: 15
    verify:
      type: "output_contains"
      expect: "open"
      field: "stdout"

  - order: 3
    instruction: "AI가 서비스 버전 탐지를 수행한다 (Service Version Detection)"
    script: "nmap -sV -p 22,80,443,8080 10.20.30.80 -oN /tmp/version_scan.txt && cat /tmp/version_scan.txt"
    category: "recon"
    risk_level: "low"
    points: 20
    verify:
      type: "output_contains"
      expect: "SERVICE VERSION"
      field: "stdout"

  - order: 4
    instruction: "AI가 OS 핑거프린팅을 수행한다"
    script: "nmap -O --osscan-guess 10.20.30.80 -oN /tmp/os_scan.txt && cat /tmp/os_scan.txt"
    category: "recon"
    risk_level: "low"
    points: 20
    verify:
      type: "output_contains"
      expect: "OS details"
      field: "stdout"

  - order: 5
    instruction: "AI가 전체 스캔 결과를 XML로 저장하고 요약 보고서를 생성한다"
    script: |
      nmap -sV -O -p 1-1024 10.20.30.0/24 -oX /tmp/full_scan.xml -oN /tmp/full_scan.txt
      echo "=== AI 정찰 요약 ==="
      echo "스캔 완료 시간: $(date)"
      grep -c "Up" /tmp/ping_sweep.txt | xargs -I{} echo "발견된 호스트: {}대"
      grep "open" /tmp/full_scan.txt | wc -l | xargs -I{} echo "발견된 열린 포트: {}개"
      cat /tmp/full_scan.txt
    category: "recon"
    risk_level: "low"
    points: 20
    verify:
      type: "output_contains"
      expect: "AI 정찰 요약"
      field: "stdout"
