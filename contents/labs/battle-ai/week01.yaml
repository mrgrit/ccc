lab_id: battle-ai-week01
title: 정찰(Reconnaissance) 기초 — 네트워크 및 호스트 정보 수집 (AI 지원)
version: ai
course: battle-ai
week: 1
description: '1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 대상 네트워크와 호스트 정보를 체계적으로
  수집하고, Blue Phase에서 정찰 행위를 탐지하고 분석한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다. [Model]
  공격·대전 과목은 Bastion manager LLM 을 gurubot/gpt-oss-derestricted:120b 로 자동 라우팅한다 (실제
  공격 페이로드 생성 필요). 상세: contents/labs/MODEL_ROUTING.md'
difficulty: easy
duration_minutes: 120
objectives:
- Passive 및 Active 정찰 기법의 차이를 이해한다
- nmap을 활용한 네트워크/포트 스캐닝을 수행한다
- Blue 관점에서 정찰 행위를 탐지하고 로그를 분석한다
prerequisites:
- Linux 기본 명령어 사용
- TCP/IP 네트워크 기초
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 자신의 attacker VM에서 IP 주소와 네트워크 인터페이스 정보를 확인하라.'
  hint: ip 또는 ifconfig 명령어를 사용한다.
  category: recon
  points: 5
  answer: '🤖 프롬프트: [RED] 자신의 attacker VM에서 IP 주소와 네트워크 인터페이스 정보를 확인해줘

    📎 참고 (CLI): ip addr show'
  answer_detail: ip addr show 명령은 모든 네트워크 인터페이스의 IP 주소, MAC 주소, 상태 정보를 출력한다. 10.20.30.201이
    할당되어 있는지 확인한다.
  verify:
    type: output_contains
    expect: 'inet '
    field: stdout
    semantic:
      intent: '[RED] attacker VM 자체 IP/네트워크 인터페이스 조회 — ip addr show 로 10.20.30.201
        인터페이스 + MAC + 상태 확인. 후속 정찰의 출발점(공격자 IP 식별) 및 대상 네트워크 대역(10.20.30.0/24) 추정'
      success_criteria:
      - ip addr show 또는 ifconfig 실행
      - inet 또는 10.20.30.201 주소 출력 포함
      - 후속 정찰의 출발점 역할 언급
      acceptable_methods:
      - ip addr show
      - ip -br addr
      - ifconfig (net-tools)
      - hostname -I
      - ipconfig (Windows)
      negative_signs:
      - 원격 호스트 조회 (attacker 자체 아님)
      - MAC/IP 없이 hostname 만
      - 후속 정찰 연결 설명 없음
  target_vm: attacker
  script: ip addr show
  risk_level: low
  bastion_prompt: '[RED] 자신의 attacker VM에서 IP 주소와 네트워크 인터페이스 정보를 확인해줘'
- order: 2
  instruction: '[RED] 10.20.30.0/24 대역에서 살아있는 호스트를 Ping Sweep으로 탐색하라.'
  hint: nmap의 -sn 옵션을 사용한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 10.20.30.0/24 대역에서 살아있는 호스트를 Ping Sweep으로 탐색해줘

    📎 참고 (CLI): nmap -sn -T4 --max-retries 1 --host-timeout 15s 10.20.30.0/24'
  answer_detail: nmap -sn은 포트 스캔 없이 호스트 발견만 수행하는 Ping Sweep이다. 10.20.30.1(secu), 10.20.30.80(web),
    10.20.30.100(siem) 등이 발견되어야 한다.
  verify:
    type: output_contains
    expect: Host is up
    field: stdout
    semantic:
      intent: '[RED] nmap -sn Ping Sweep — 10.20.30.0/24 대역 256 개 IP 에 ICMP/TCP SYN
        ping 만 전송 (포트 스캔 없음)으로 활성 호스트 발견. -T4 공격적 타이밍 + --max-retries 1 + --host-timeout
        15s. secu(.1)·web(.80)·siem(.100) 3개 호스트 식별 예상. MITRE T1018 Remote System
        Discovery'
      success_criteria:
      - nmap -sn <CIDR> 명령 실행 (/24 범위)
      - Host is up 라인 최소 2개 이상 (3호스트 중)
      - Ping Sweep 이 포트 스캔 없이 호스트만 발견하는 개념 반영
      acceptable_methods:
      - nmap -sn -T4 10.20.30.0/24
      - fping -g 10.20.30.0/24
      - arp-scan -l (L2 대역)
      - for i in {1..254}; do ping -c1 -W1 10.20.30.$i; done
      negative_signs:
      - nmap -sS/-sV 사용 (포트 스캔 포함)
      - 단일 호스트만 조회 (/24 범위 아님)
      - Host is up 없음
  target_vm: attacker
  script: nmap -sn -T4 --max-retries 1 --host-timeout 15s 10.20.30.0/24
  risk_level: low
  bastion_prompt: '[RED] 10.20.30.0/24 대역에서 살아있는 호스트를 Ping Sweep으로 탐색해줘'
- order: 3
  instruction: '[RED] web 서버({{WEB_IP}})에 대해 주요 포트 스캔을 수행하라.'
  hint: nmap --top-ports 옵션으로 주요 포트를 스캔한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] web 서버(10.20.30.80)에 대해 주요 포트 스캔을 수행해줘

    📎 참고 (CLI): nmap -sV -T4 --top-ports 100 --max-retries 1 --host-timeout 15s 10.20.30.80'
  answer_detail: --top-ports 100은 가장 흔한 100개 포트를 스캔한다. 22(SSH), 80(Apache), 3000(JuiceShop),
    8080(DVWA) 등이 열려 있어야 한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: '[RED] web 서버(10.20.30.80) --top-ports 100 스캔 — nmap -sV -T4 --top-ports
        100 로 상위 100개 공통 포트(nmap-services 빈도 기반) 탐색. 22(SSH)·80(Apache)·3000(JuiceShop)·8080(DVWA)
        열림 예상. 서비스 종류 식별로 공격 표면 분석'
      success_criteria:
      - nmap -sV --top-ports 100 + 대상 IP 10.20.30.80
      - open 키워드 포함 + 최소 3개 포트 식별
      - 서비스 명(ssh/http/apache 등) 포함
      acceptable_methods:
      - nmap -sV --top-ports 100 <IP>
      - nmap -p- 전체 65535 포트 (느림)
      - masscan --top-ports 100 --rate 1000
      - rustscan -a <IP> --top
      negative_signs:
      - 단일 포트만 스캔
      - --top-ports 옵션 없음 (기본 1000)
      - 서비스 탐지(-sV) 없이 포트만
  target_vm: attacker
  script: nmap -sV -T4 --top-ports 100 --max-retries 1 --host-timeout 15s 10.20.30.80
  risk_level: low
  bastion_prompt: '[RED] web 서버(10.20.30.80)에 대해 주요 포트 스캔을 수행해줘'
- order: 4
  instruction: '[RED] web 서버의 열린 포트에 대해 서비스 버전 탐지를 수행하라.'
  hint: nmap -sV 옵션을 사용한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] web 서버의 열린 포트에 대해 서비스 버전 탐지를 수행해줘

    📎 참고 (CLI): nmap -sV -p 22,80,3000,8080 -T4 --max-retries 1 --host-timeout 15s
    10.20.30.80'
  answer_detail: -sV 옵션은 각 열린 포트에 프로브를 보내 서비스 이름과 버전을 식별한다. Apache, Node.js(JuiceShop)
    등이 식별되어야 한다.
  verify:
    type: output_contains
    expect: VERSION
    field: stdout
    semantic:
      intent: '[RED] 특정 포트 대상 정밀 서비스 버전 탐지 — nmap -sV -p 22,80,3000,8080 로 SSH(OpenSSH)·Apache·Node.js(JuiceShop)·DVWA(PHP)
        버전 식별. 각 프로브에 응답 매칭해 서비스명+버전+OS hint 추출. 후속 CVE 매칭·exploit 선정의 핵심 정보'
      success_criteria:
      - nmap -sV -p 22,80,3000,8080 또는 동등한 포트 지정
      - VERSION 또는 버전 문자열(Apache/OpenSSH/Node) 출력
      - s3 의 top-100 과 달리 특정 포트 정밀 탐지 성격 명시
      acceptable_methods:
      - nmap -sV -p <포트목록> <IP>
      - nmap --version-intensity 9 -p <포트>
      - banner grabbing nc <IP> <port>
      - curl -sI <http 포트>
      negative_signs:
      - -sV 없이 SYN 스캔만
      - top-ports 와 중복된 접근 (특정 포트 아님)
      - 버전 정보 없이 open/closed 만
  target_vm: attacker
  script: nmap -sV -p 22,80,3000,8080 -T4 --max-retries 1 --host-timeout 15s 10.20.30.80
  risk_level: low
  bastion_prompt: '[RED] web 서버의 열린 포트에 대해 서비스 버전 탐지를 수행해줘'
- order: 5
  instruction: '[RED] nmap NSE 스크립트를 사용하여 web 서버의 HTTP 서비스 정보를 열거하라.'
  hint: http-enum, http-headers 스크립트를 사용한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] nmap NSE 스크립트를 사용하여 web 서버의 HTTP 서비스 정보를 열거해줘

    📎 참고 (CLI): nmap --script http-enum,http-headers -p 80,3000,8080 -T4 --max-retries
    1 --host-timeout 15s 10.20.30.80'
  answer_detail: http-enum 스크립트는 웹 서버에서 알려진 경로(admin, backup 등)를 탐색한다. http-headers는
    응답 헤더를 수집하여 서버 정보를 식별한다.
  verify:
    type: output_contains
    expect: http
    field: stdout
    semantic:
      intent: '[RED] nmap NSE (Nmap Scripting Engine) HTTP 열거 — --script http-enum(알려진
        경로 admin/backup/login 탐색) + http-headers(응답 헤더 수집) 동시 실행. 포트 80·3000·8080
        대상. 서비스 버전보다 한 단계 깊은 웹 애플리케이션 레벨 정보(기술스택·프레임워크·민감 경로) 수집'
      success_criteria:
      - nmap --script http-enum 또는 http-headers 실행
      - http 키워드 포함 + 경로/헤더 정보 출력
      - NSE 스크립트가 웹 애플리케이션 레벨 열거임을 인지
      acceptable_methods:
      - nmap --script http-enum,http-headers
      - nmap --script=http-* -p 80 <IP>
      - gobuster dir -u <url> -w wordlist
      - ffuf -u <url>/FUZZ -w wordlist
      negative_signs:
      - NSE 스크립트 없이 일반 포트 스캔
      - http-title 만 (enum/headers 아님)
      - 포트 지정 없이 기본 포트만
  target_vm: attacker
  script: nmap --script http-enum,http-headers -p 80,3000,8080 -T4 --max-retries 1
    --host-timeout 15s 10.20.30.80
  risk_level: low
  bastion_prompt: '[RED] nmap NSE 스크립트를 사용하여 web 서버의 HTTP 서비스 정보를 열거해줘'
- order: 6
  instruction: '[RED] curl로 web 서버의 각 서비스(80, 3000, 8080) 응답 헤더를 수집하라.'
  hint: curl -sI로 HTTP 헤더를 확인한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] curl로 web 서버의 각 서비스(80, 3000, 8080) 응답 헤더를 수집해줘

    📎 참고 (CLI): echo ''=== Port 80 ==='' && curl -sI http://10.20.30.80/ | head -5
    && echo ''=== Port 3000 (JuiceShop) ==='' && curl -sI http://10.20.30.80:3000/
    | head -5 && echo ''=== Port 8080 (DVWA) ==='' && curl -sI http://10.20.30.80:8080/
    | head -5'
  answer_detail: HTTP 응답 헤더의 Server, X-Powered-By 등에서 웹서버 종류, 프레임워크, 보안 설정을 파악할 수
    있다. 포트별로 다른 서비스가 동작하므로 각각 확인해야 한다.
  verify:
    type: output_contains
    expect: Server
    field: stdout
    semantic:
      intent: '[RED] curl -sI 세 서비스별 HTTP 응답 헤더 수집 — Port 80(Apache), 3000(JuiceShop
        Express), 8080(DVWA Apache+PHP) 각각 HEAD 요청으로 Server/X-Powered-By/Set-Cookie/X-Frame-Options
        등 수집. 각 서비스 고유의 기술 스택과 보안 설정 누락 지점 식별'
      success_criteria:
      - curl -sI 로 3개 포트(80/3000/8080) 모두 요청
      - Server 헤더 또는 유사 메타데이터 출력
      - 포트별 서비스 구분(Apache/JuiceShop/DVWA) 출력 구조
      acceptable_methods:
      - curl -sI http://<IP>:<port>
      - curl -v http://<IP>:<port> 2>&1 | grep ^<
      - wget --spider -S <url>
      - httpie http HEAD <url>
      negative_signs:
      - 단일 포트만 조회
      - 응답 본문까지 받음 (-sI 아님)
      - Server 헤더 확인 누락
  target_vm: attacker
  script: echo '=== Port 80 ===' && curl -sI http://10.20.30.80/ | head -5 && echo
    '=== Port 3000 (JuiceShop) ===' && curl -sI http://10.20.30.80:3000/ | head -5
    && echo '=== Port 8080 (DVWA) ===' && curl -sI http://10.20.30.80:8080/ | head
    -5
  risk_level: low
  bastion_prompt: '[RED] curl로 web 서버의 각 서비스(80, 3000, 8080) 응답 헤더를 수집해줘'
- order: 7
  instruction: '[BLUE] Suricata에서 방금 발생한 정찰(스캔) 알림을 확인하라.'
  hint: fast.log 또는 eve.json에서 경보를 확인한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata에서 방금 발생한 정찰(스캔) 알림을 확인해줘

    📎 참고 (CLI): tail -30 /var/log/suricata/fast.log | head -20'
  answer_detail: Suricata fast.log는 한 줄짜리 간단한 경보 형식이다. nmap 스캔이 탐지되면 SCAN 관련 시그니처가
    트리거된다. 소스 IP(10.20.30.201)를 확인한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] Suricata fast.log 정찰 스캔 경보 확인 — tail -30 /var/log/suricata/fast.log
        로 한 줄 간단 경보 형식 조회. 이전 RED 단계의 nmap 스캔(s2~s5)이 트리거한 SCAN 카테고리 시그니처 검출. src_ip=10.20.30.201(공격자)
        식별'
      success_criteria:
      - tail /var/log/suricata/fast.log 또는 cat 명령
      - 10.20.30 IP 출력 (공격자 또는 대상)
      - 이전 RED 스캔 단계와의 시간 연관 분석
      acceptable_methods:
      - tail -N /var/log/suricata/fast.log
      - grep SCAN /var/log/suricata/fast.log
      - suricata-update + 룰 갱신 후 재확인
      - journalctl -u suricata
      negative_signs:
      - 다른 로그 파일 조회 (fast.log 아님)
      - RED 공격 단계와 연관 분석 없음
      - 공격자 IP 식별 누락
  target_vm: secu
  script: tail -30 /var/log/suricata/fast.log | head -20
  risk_level: low
  bastion_prompt: '[BLUE] Suricata에서 방금 발생한 정찰(스캔) 알림을 확인해줘'
- order: 8
  instruction: '[BLUE] Suricata eve.json에서 경보를 분석하여 공격자 IP별 알림 건수를 집계하라.'
  hint: jq로 JSON을 파싱한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata eve.json에서 경보를 분석하여 공격자 IP별 알림 건수를 집계해줘

    📎 참고 (CLI): cat /var/log/suricata/eve.json | jq -r ''select(.event_type=="alert")
    | .src_ip'' 2>/dev/null | sort | uniq -c | sort -rn | head -5'
  answer_detail: eve.json은 JSON Lines 형식이다. event_type이 alert인 이벤트를 필터링하고, src_ip를
    추출하여 집계한다. 10.20.30.201에서 가장 많은 경보가 발생해야 한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] Suricata eve.json JSON Lines 파싱 — jq 로 .event_type==alert 필터
        후 .src_ip 추출 → sort | uniq -c | sort -rn 로 공격자 IP 별 경보 건수 상위 집계. 가장 활동이 많은
        공격자 IP(10.20.30.201) 식별. 네트워크 보안 가시성 확보를 위한 기본 분석 워크플로'
      success_criteria:
      - jq -r select(.event_type=='alert') .src_ip 파싱
      - sort | uniq -c | sort -rn 집계 파이프라인
      - 공격자 IP 10.20.30 식별
      acceptable_methods:
      - jq + sort + uniq -c + sort -rn
      - python json.loads 로 스크립트
      - Elastic Stack / Filebeat + Kibana 질의
      - Splunk search event_type=alert | stats count by src_ip
      negative_signs:
      - fast.log 만 조회 (eve.json JSON 파싱 없음)
