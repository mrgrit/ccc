    Suricata + Wazuh를 병행하면 네트워크와 호스트 관점의 탐지가 가능하다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
    semantic:
      intent: '[BLUE] Wazuh SIEM /var/ossec/logs/alerts/alerts.json 웹 공격 종합 경보 — tail
        -30 + jq select(.rule.level >= 5) | Level X: description 으로 level 5 이상 주의
        이벤트 추출. Wazuh 는 Apache 로그를 디코더로 분석해 웹 공격 이벤트 생성. Suricata(네트워크) + Wazuh(호스트)
        교차 확인으로 가시성 확장'
      success_criteria:
      - /var/ossec/logs/alerts/alerts.json 대상
      - jq select(.rule.level >= N) 필터
      - complete 또는 Wazuh 관련 출력
      - rule.level 5 이상 = 주의 필요 이벤트 인지
      acceptable_methods:
      - jq select(.rule.level >= 5) alerts.json
      - Wazuh Kibana dashboard 검색
      - ossec-alert-digest 스크립트
      - Wazuh API /alerts?q=rule.level>5
      negative_signs:
