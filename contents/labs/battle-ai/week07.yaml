lab_id: battle-ai-week07
title: IDS/IPS 구축 — Suricata 기반 침입 탐지 + Red 우회 시도 (AI 지원)
version: ai
course: battle-ai
week: 7
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Blue Phase에서 Suricata 커스텀 룰을 작성하여 공격을
  탐지하고, Red Phase에서 IDS 탐지를 회피하는 기법을 시도한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Suricata 커스텀 시그니처 룰을 작성하여 공격을 탐지한다
- IDS 알림을 분석하고 오탐/미탐을 관리한다
- Red 관점에서 IDS 탐지를 회피하는 기법을 시도한다
prerequisites:
- 네트워크 프로토콜 이해
- Week 1-5 공격 기법 이해
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] Suricata의 설치 상태와 버전을 확인하라.'
  hint: suricata -V 옵션을 사용한다.
  category: defense
  points: 5
  answer: '🤖 프롬프트: [BLUE] Suricata의 설치 상태와 버전을 확인해줘

    📎 참고 (CLI): suricata -V'
  answer_detail: suricata -V는 버전을 표시한다. 현재 설치된 Suricata의 버전과 기능을 확인한다.
  verify:
    type: output_contains
    expect: Suricata
    field: stdout
    semantic:
      intent: '[BLUE] Suricata 버전 확인 — suricata -V 로 설치된 IDS/IPS 엔진의 버전 정보 출력. 릴리스
        노트·CVE·지원 기능(AF_PACKET, DPDK, JA3/JA4, file extraction) 확인의 기초. 룰 문법 호환성 점검의
        출발점'
      success_criteria:
      - suricata -V 명령 실행
      - Suricata 키워드 포함 출력 + 버전 번호
      - 버전에 따른 기능 호환성 개념
      acceptable_methods:
      - suricata -V
      - suricata --version
      - dpkg -l | grep suricata (Debian/Ubuntu)
      - rpm -q suricata (RHEL)
      negative_signs:
      - systemctl status (버전 정보 부족)
      - 룰 파일 조회 (버전 아님)
      - 설치 여부 불확실
  target_vm: secu
  script: suricata -V
  risk_level: low
  bastion_prompt: '[BLUE] Suricata의 설치 상태와 버전을 확인해줘'
- order: 2
  instruction: '[BLUE] Nmap SYN 스캔을 탐지하는 커스텀 Suricata 룰을 작성하라.'
  hint: flags:S로 SYN 패킷을 매칭하고 threshold로 빈도를 설정한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Nmap SYN 스캔을 탐지하는 커스텀 Suricata 룰을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''alert tcp 10.20.30.201 any -> 10.20.30.80 any (msg:"SCAN Nmap
    SYN Scan from Attacker"; flags:S,12; threshold: type both, track by_src, count
    20, seconds 5; classtype:attempted-recon; sid:1000001; rev:1;)'' | sudo tee /etc/suricata/rules/local.rules'
  answer_detail: 이 룰은 10.20.30.201에서 5초 안에 20개 이상의 SYN 패킷을 보내면 탐지한다. flags:S,12는 SYN
    플래그가 설정된 패킷을 매칭한다.
  verify:
    type: output_contains
    expect:
    - SCAN Nmap
    - already
    - exists
    - alert
    field: stdout
    semantic:
      intent: '[BLUE] Suricata SYN 스캔 탐지 룰 — alert tcp 10.20.30.201 any -> 10.20.30.80
        any (msg:SCAN Nmap SYN Scan; flags:S,12; threshold: type both, track by_src,
        count 20, seconds 5; classtype:attempted-recon; sid:1000001;) 을 /etc/suricata/rules/local.rules
        에 저장. flags:S,12 는 SYN 비트 + reserved 무시. threshold 로 5초 내 20 SYN 초과 시 트리거'
      success_criteria:
      - alert tcp + flags:S,12 + threshold 3요소 포함
      - sid:1000001 또는 unique SID + classtype
      - SCAN Nmap 키워드 포함 + /etc/suricata/rules/local.rules 저장
      acceptable_methods:
      - echo alert tcp ... | sudo tee /etc/suricata/rules/local.rules
      - /etc/suricata/rules/ 직접 편집
      - emerging-threats ET SCAN 룰 참조
      - suricata-update 로 룰 배포
      negative_signs:
      - threshold 없음 (1 패킷에도 트리거)
      - sid 충돌 (1000000 이하)
      - flags:S 만 (나머지 플래그 신경 안 씀)
  target_vm: secu
  script: 'echo ''alert tcp 10.20.30.201 any -> 10.20.30.80 any (msg:"SCAN Nmap SYN
    Scan from Attacker"; flags:S,12; threshold: type both, track by_src, count 20,
    seconds 5; classtype:attempted-recon; sid:1000001; rev:1;)'' | sudo tee /etc/suricata/rules/local.rules'
  risk_level: low
  bastion_prompt: '[BLUE] Nmap SYN 스캔을 탐지하는 커스텀 Suricata 룰을 작성하라.'
- order: 3
  instruction: '[BLUE] SQL Injection 시도를 탐지하는 HTTP 룰을 추가하라.'
  hint: content 키워드로 SQL 구문을 매칭한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] SQL Injection 시도를 탐지하는 HTTP 룰을 추가해줘

    📎 참고 (CLI): echo ''alert http 10.20.30.201 any -> 10.20.30.80 any (msg:"WEB-ATTACK
    SQL Injection Attempt - UNION SELECT"; flow:to_server,established; content:"UNION";
    nocase; content:"SELECT"; nocase; distance:0; within:20; classtype:web-application-attack;
    sid:1000002; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: content 키워드로 HTTP 요청에서 'UNION'과 'SELECT'를 연속으로 탐지한다. nocase는 대소문자
    무시, distance:0;within:20은 근접 매칭이다.
  verify:
    type: output_contains
    expect: SQL Injection
    field: stdout
    semantic:
      intent: '[BLUE] SQL Injection HTTP 탐지 룰 — alert http ... (msg:WEB-ATTACK SQL
        Injection - UNION SELECT; flow:to_server,established; content:UNION; nocase;
        content:SELECT; nocase; distance:0; within:20; sid:1000002;). content 키워드로
        UNION + SELECT 연속 패턴 탐지. distance:0 within:20 = 두 키워드 간격 20바이트 이내 근접 매칭'
      success_criteria:
      - alert http + content:UNION + content:SELECT 2중 매칭
      - distance/within 또는 pcre 근접 매칭
      - nocase 대소문자 무시 + flow:to_server 방향 제한
      - SQL Injection 키워드 + sid:1000002
      acceptable_methods:
      - content + distance + within 조합
      - pcre:/UNION\s+SELECT/i 정규식 매칭
      - http.uri; content:... 최신 sticky buffer
      - suricata-update + ET WEB SQL rules
      negative_signs:
      - 단일 content:UNION (오탐 많음)
      - flow 방향 제한 없음
      - distance/within 없음 (너무 멀리 매칭)
  target_vm: secu
  script: echo 'alert http 10.20.30.201 any -> 10.20.30.80 any (msg:"WEB-ATTACK SQL
    Injection Attempt - UNION SELECT"; flow:to_server,established; content:"UNION";
    nocase; content:"SELECT"; nocase; distance:0; within:20; classtype:web-application-attack;
    sid:1000002; rev:1;)' | sudo tee -a /etc/suricata/rules/local.rules
  risk_level: low
  bastion_prompt: '[BLUE] SQL Injection 시도를 탐지하는 HTTP 룰을 추가해줘'
- order: 4
  instruction: '[BLUE] XSS 공격과 SSH 브루트포스 탐지 룰을 추가하라.'
  hint: <script 태그와 SSH 연결 빈도를 탐지한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] XSS 공격과 SSH 브루트포스 탐지 룰을 추가해줘

    📎 참고 (CLI): echo ''alert http 10.20.30.201 any -> 10.20.30.80 any (msg:"WEB-ATTACK
    XSS Script Tag"; flow:to_server,established; content:"<script"; nocase; classtype:web-application-attack;
    sid:1000003; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules && echo ''alert
    tcp 10.20.30.201 any -> 10.20.30.80 22 (msg:"ATTACK SSH Brute Force Attempt";
    flow:to_server; flags:S,12; threshold: type both, track by_src, count 5, seconds
    30; classtype:attempted-admin; sid:1000004; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  answer_detail: XSS 룰은 script 태그를 탐지하고, SSH 룰은 30초 내 5회 이상의 SYN을 탐지한다.
  verify:
    type: output_contains
    expect:
    - SSH Brute Force
    - append
    field: stdout
    semantic:
      intent: '[BLUE] XSS + SSH 브루트포스 룰 2종 — (1) alert http (msg:WEB-ATTACK XSS Script
        Tag; content:<script; nocase; sid:1000003;) (2) alert tcp ... 22 (msg:ATTACK
        SSH Brute Force; flags:S,12; threshold: type both, track by_src, count 5,
        seconds 30; sid:1000004;). tee -a 로 기존 룰 파일에 append'
      success_criteria:
      - XSS 룰 (content:<script) + SSH 브루트포스 룰 (flags:S,12 + threshold) 모두 포함
      - sid:1000003 + sid:1000004 또는 고유 SID
      - SSH Brute Force 키워드 포함
      - tee -a 로 append (s2 룰 덮어쓰기 방지)
      acceptable_methods:
      - echo alert ... | sudo tee -a local.rules
      - 여러 줄 heredoc 으로 일괄 추가
      - suricata-update + local rules 병합
      - 룰 템플릿 파일 git 관리
      negative_signs:
      - 룰 1종만 추가 (XSS OR SSH)
      - tee (덮어쓰기) 사용 — 이전 룰 손실
      - threshold 없이 단일 SYN 트리거
  target_vm: secu
  script: 'echo ''alert http 10.20.30.201 any -> 10.20.30.80 any (msg:"WEB-ATTACK
    XSS Script Tag"; flow:to_server,established; content:"<script"; nocase; classtype:web-application-attack;
    sid:1000003; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules && echo ''alert
    tcp 10.20.30.201 any -> 10.20.30.80 22 (msg:"ATTACK SSH Brute Force Attempt";
    flow:to_server; flags:S,12; threshold: type both, track by_src, count 5, seconds
    30; classtype:attempted-admin; sid:1000004; rev:1;)'' | sudo tee -a /etc/suricata/rules/local.rules'
  risk_level: low
  bastion_prompt: '[BLUE] XSS 공격과 SSH 브루트포스 탐지 룰을 추가해줘'
- order: 5
  instruction: '[BLUE] Suricata 룰 문법을 검증하고 서비스를 재시작하라.'
  hint: suricata -T 옵션으로 설정을 테스트한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata 룰 문법을 검증하고 서비스를 재시작해줘

    📎 참고 (CLI): sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5 &&
    sudo systemctl restart suricata && echo ''Suricata restarted with custom rules'''
  answer_detail: -T 옵션은 설정 파일과 룰을 로드하여 문법 오류를 검사한다(dry-run). 룰 배포 전 반드시 테스트하여 서비스
    중단을 방지한다.
  verify:
    type: output_contains
    expect:
    - Suricata restarted
    - Suricata
    - RELEASE
    field: stdout
    semantic:
      intent: '[BLUE] Suricata 룰 검증 + 재시작 — suricata -T -c /etc/suricata/suricata.yaml
        (dry-run, 룰·설정 문법 검사) → systemctl restart suricata 로 룰 reload. 실전 팁: -T 없이
        바로 재시작하면 문법 오류 시 서비스 다운. 운영 환경에서는 반드시 먼저 테스트'
      success_criteria:
      - suricata -T 설정 검증 실행
      - systemctl restart suricata 재시작
      - Suricata restarted 메시지 + 서비스 정상화 확인
      acceptable_methods:
      - suricata -T -c yaml + systemctl restart
      - suricatasc -c reload-rules (무중단 reload)
      - kill -USR2 <pid> 로 룰 재로드 신호
      - kibana dashboard 로 rule load 상태 확인
      negative_signs:
      - -T 테스트 없이 바로 재시작
      - 재시작만 (검증 없음)
      - 서비스 상태 확인 누락
  target_vm: secu
  script: sudo suricata -T -c /etc/suricata/suricata.yaml 2>&1 | tail -5 && sudo systemctl
    restart suricata && echo 'Suricata restarted with custom rules'
  risk_level: low
  bastion_prompt: '[BLUE] Suricata 룰 문법을 검증하고 서비스를 재시작해줘'
- order: 6
  instruction: '[RED] web 서버에 nmap 스캔을 실행하여 IDS 탐지를 유발하라.'
  hint: nmap -sS로 SYN 스캔을 수행한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] web 서버에 nmap 스캔을 실행하여 IDS 탐지를 유발해줘

    📎 참고 (CLI): nmap -sS -T4 --top-ports 50 --max-retries 1 --host-timeout 15s 10.20.30.80'
  answer_detail: SYN 스캔은 Suricata의 SID 1000001 룰을 트리거한다. IDS가 정상 동작하면 fast.log에 알림이
    기록된다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: '[RED] 커스텀 룰 트리거 유발 — nmap -sS -T4 --top-ports 50 로 top 50 포트 SYN 스캔
        (T4 = 공격적 속도). 5초 내 20 SYN 초과 쉬움 → s2 에서 작성한 SID 1000001 룰 트리거. IDS 탐지 검증의
        공격자 관점 실행'
      success_criteria:
      - nmap -sS 스캔 실행
      - open 키워드 포함 (스캔 성공 + 탐지 유발)
      - 룰 트리거 목적 명시 (s2 SYN scan 룰)
      acceptable_methods:
      - nmap -sS -T4 --top-ports N
      - masscan --rate 100 (빠른 스캔)
      - hping3 -S --rand-source 다수 SYN
      - scapy 로 수동 SYN flood
      negative_signs:
      - 느린 스캔 (-T1/-T2) — 트리거 안 됨
      - UDP 스캔 (TCP SYN 룰 아님)
      - 룰 트리거 검증 목적 누락
  target_vm: attacker
  script: nmap -sS -T4 --top-ports 50 --max-retries 1 --host-timeout 15s 10.20.30.80
  risk_level: low
  bastion_prompt: '[RED] web 서버에 nmap 스캔을 실행하여 IDS 탐지를 유발해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 7
  instruction: '[BLUE] Suricata fast.log에서 방금 발생한 경보를 확인하라.'
  hint: fast.log에서 최근 경보를 확인한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata fast.log에서 방금 발생한 경보를 확인해줘

    📎 참고 (CLI): tail -20 /var/log/suricata/fast.log'
  answer_detail: fast.log는 한 줄짜리 간단한 경보 형식이다. SID 1000001(SYN Scan)이 트리거되었는지 확인한다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: '[BLUE] fast.log 최근 경보 확인 — tail -20 /var/log/suricata/fast.log 로 s6
        에서 유발한 SID 1000001 경보 검출 확인. fast.log 형식: timestamp [**] [gid:sid:rev] msg
        [**] [Classification: ...] [Priority: N] {PROTO} src_ip:sport -> dst_ip:dport'
      success_criteria:
      - tail /var/log/suricata/fast.log
      - 10.20.30 IP 포함 출력 (공격자 또는 대상)
      - s6 공격과 경보 연관 분석
      acceptable_methods:
      - tail -N /var/log/suricata/fast.log
      - grep sid:1000001 fast.log
      - watch -n 1 tail fast.log (실시간)
      - eve.json 의 동일 이벤트 확인
      negative_signs:
      - fast.log 아닌 다른 파일
      - s6 공격 시도와 연관 분석 없음
      - SID 1000001 검증 누락
  target_vm: secu
  script: tail -20 /var/log/suricata/fast.log
  risk_level: low
  bastion_prompt: '[BLUE] Suricata fast.log에서 방금 발생한 경보를 확인해줘'
- order: 8
  instruction: '[RED] IDS 탐지를 회피하기 위해 느린 속도로 스캔을 수행하라.'
  hint: nmap -T1 또는 -T2로 속도를 줄인다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] IDS 탐지를 회피하기 위해 느린 속도로 스캔을 수행해줘

    📎 참고 (CLI): nmap -sS -T2 -p 80,3000,8080 --max-retries 1 --host-timeout 30s 10.20.30.80
    && echo ''Slow scan complete'''
  answer_detail: -T2(polite) 속도로 스캔하면 threshold 기반 탐지를 우회할 수 있다. 5초에 20개 미만으로 패킷을
    보내면 SID 1000001이 트리거되지 않는다.
  verify:
    type: output_contains
    expect: Slow scan complete
    field: stdout
    semantic:
      intent: '[RED] IDS 회피 — nmap -sS -T2 -p 80,3000,8080 --host-timeout 30s 로 -T2
        (polite 타이밍, 400ms 지연) + 특정 포트 3개만. 5초당 20 패킷 미만 유지 → s2 룰의 threshold count
        20 seconds 5 조건 미충족 → 탐지 회피. Slow scan complete 메시지. IDS threshold 기반 탐지의
        한계 실증'
      success_criteria:
      - -T2 또는 -T1 polite/sneaky 타이밍
      - 포트 개수 제한 (3-5개)
      - Slow scan complete 또는 동등 메시지
      - threshold 기반 탐지 한계 인식
      acceptable_methods:
      - nmap -T1/-T2 slow scan
      - nmap --scan-delay 5s --max-rate 1
      - masscan --rate 1 극저속
      - 수동 nc -zv 로 포트별 개별 확인
      negative_signs:
      - -T4/-T5 빠른 스캔 (탐지됨)
      - 포트 전체 스캔 (threshold 초과)
