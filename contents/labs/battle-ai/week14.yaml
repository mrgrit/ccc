    - nftables (IP blocking)

    - ModSecurity (web attack patterns)

    - Wazuh SIEM (host event correlation)

    EOF

    cat /tmp/apt_attack_mapping.txt'
  answer_detail: MITRE ATT&CK 매핑으로 공격 기법을 표준화된 프레임워크로 분류한다. 각 기법에 대한 탐지 방법을 함께 기록한다.
  verify:
    type: output_contains
    expect: MITRE ATT&CK Mapping
    field: stdout
  target_vm: attacker
  script: 'cat > /tmp/apt_attack_mapping.txt << ''EOF''

    === MITRE ATT&CK Mapping - APT Simulation ===


    Reconnaissance:

    - T1046: Network Service Scanning (nmap)


    Initial Access:

    - T1190: Exploit Public-Facing Application (SQLi, CmdInj)


    Execution:

    - T1059.004: Unix Shell (Command Injection)


    Persistence:

    - T1098.004: SSH Authorized Keys

    - T1053.003: Cron


    Defense Evasion:

    - T1027: Obfuscated Files (encoded payloads)

    - T1070: Indicator Removal


    Credential Access:

    - T1110: Brute Force (Hydra)


    Discovery:

    - T1082: System Information Discovery


    Collection:

    - T1005: Data from Local System


    Detection Methods Used:

    - Suricata IDS (network signatures)

    - nftables (IP blocking)

    - ModSecurity (web attack patterns)

    - Wazuh SIEM (host event correlation)

    EOF

    cat /tmp/apt_attack_mapping.txt'
  risk_level: low
  bastion_prompt: '[공통] APT 킬체인에 대한 MITRE ATT&CK 매핑을 작성하라.'
