  instruction: '[BLUE] 서비스 가용성을 최종 확인하고, APT 시뮬레이션 종합 보고서를 작성하라.'
  hint: 서비스 상태 확인 후 킬체인 전 단계의 공방 결과를 분석한다.
  category: analysis
  points: 15
