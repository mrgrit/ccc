lab_id: battle-ai-week08
title: 로그 분석 및 위협 헌팅 — 공격 흔적 추적 (AI 지원)
version: ai
course: battle-ai
week: 8
description: 시스템, 네트워크, 애플리케이션 로그를 분석하여 공격 흔적을 추적한다. auth.log, syslog, Apache 로그, Suricata eve.json을 분석하고, 타임라인 기반 위협 헌팅을 수행한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 주요 로그 파일의 구조와 내용을 이해한다
- 로그 분석으로 공격 흔적을 식별한다
- 타임라인 기반 사고 재구성을 수행한다
prerequisites:
- Linux 로그 시스템 기초
- grep, awk, sort 등 텍스트 처리 도구
infra_requirements:
- Linux VM with log files (10.20.30.1)
- 사전 준비된 공격 로그 샘플
pass_threshold: 0.6
steps:
- order: 1
  instruction: auth.log에서 SSH 로그인 실패 기록을 검색하라.
  hint: grep으로 'Failed password'를 검색한다.
  category: analysis
  points: 10
  answer: grep 'Failed password' /var/log/auth.log | tail -20
  answer_detail: auth.log는 인증 관련 이벤트를 기록한다. 'Failed password'는 SSH 로그인 실패를 나타내며, 반복 실패는 브루트포스 공격의 증거이다. 소스 IP, 대상 사용자명, 시각 정보를 확인한다.
  verify:
    type: output_contains
    expect: Failed
    field: stdout
  target_vm: attacker
  script: grep 'Failed password' /var/log/auth.log | tail -20
  risk_level: low
- order: 2
  instruction: SSH 로그인 실패를 IP별로 집계하여 가장 많이 시도한 공격 IP를 식별하라.
  hint: awk와 sort를 조합한다.
  category: analysis
  points: 10
  answer: grep 'Failed password' /var/log/auth.log | awk '{print $(NF-3)}' | sort | uniq -c | sort -rn | head -10
  answer_detail: awk로 IP 필드를 추출하고 sort | uniq -c | sort -rn으로 빈도 내림차순 정렬한다. 상위 IP가 브루트포스 공격자이다. 이 정보로 방화벽 차단이나 fail2ban 설정에 활용한다.
  verify:
    type: output_contains
    expect: '10.'
    field: stdout
  target_vm: attacker
  script: grep 'Failed password' /var/log/auth.log | awk '{print $(NF-3)}' | sort | uniq -c | sort -rn | head -10
  risk_level: low
- order: 3
  instruction: SSH 로그인 성공 기록을 확인하여 비인가 접근이 있는지 확인하라.
  hint: grep 'Accepted'로 성공 로그인을 검색한다.
  category: analysis
  points: 10
  answer: grep 'Accepted' /var/log/auth.log | tail -20
  answer_detail: '''Accepted password'' 또는 ''Accepted publickey''는 성공적인 SSH 로그인이다. 비정상 시간대, 알 수 없는 IP, 휴면 계정의 로그인은 침해 지표(IoC)가 된다.'
  verify:
    type: output_contains
    expect: Accepted
    field: stdout
  target_vm: attacker
  script: grep 'Accepted' /var/log/auth.log | tail -20
  risk_level: low
- order: 4
  instruction: sudo 명령 실행 로그를 분석하여 권한 상승 시도를 확인하라.
  hint: auth.log에서 sudo 관련 로그를 검색한다.
  category: analysis
  points: 10
  answer: grep 'sudo' /var/log/auth.log | grep -v 'session' | tail -20
  answer_detail: sudo 로그는 누가 어떤 명령을 어떤 권한으로 실행했는지 기록한다. 'COMMAND=' 필드에서 실행된 명령을, 'USER=' 필드에서 대상 사용자를 확인한다. 비정상적인 명령이나 실패한 시도는 공격 증거이다.
  verify:
    type: output_contains
    expect: sudo
    field: stdout
  target_vm: attacker
  script: grep 'sudo' /var/log/auth.log | grep -v 'session' | tail -20
  risk_level: low
- order: 5
  instruction: Apache access.log에서 SQL Injection 시도를 탐색하라.
  hint: UNION, SELECT, OR 1=1 등의 패턴을 검색한다.
  category: analysis
  points: 10
  answer: grep -iE '(union|select|insert|update|delete|drop|or%201%3D1|\x27)' /var/log/apache2/access.log | tail -20
  answer_detail: Apache access.log는 모든 HTTP 요청을 기록한다. URL 인코딩된 SQL 키워드(UNION, SELECT)나 특수문자(%27=', %3D==)를 검색하여 SQL Injection 시도를 발견한다.
  verify:
    type: output_contains
    expect: union
    field: stdout
  target_vm: attacker
  script: grep -iE '(union|select|insert|update|delete|drop|or%201%3D1|\x27)' /var/log/apache2/access.log | tail -20
  risk_level: low
- order: 6
  instruction: Apache access.log에서 디렉토리 트래버설 공격 시도를 탐색하라.
  hint: ../ 패턴을 검색한다.
  category: analysis
  points: 10
  answer: grep -E '(\.\./)|(\.\.\\)' /var/log/apache2/access.log | tail -20
  answer_detail: 디렉토리 트래버설은 ../를 사용하여 웹루트 외부의 파일에 접근하는 공격이다. /etc/passwd, /etc/shadow 등 민감 파일을 대상으로 한다. URL 인코딩(%2e%2e%2f)도 확인해야 한다.
  verify:
    type: output_contains
    expect: ..
    field: stdout
  target_vm: attacker
  script: grep -E '(\.\./)|(\.\.\\)' /var/log/apache2/access.log | tail -20
  risk_level: low
- order: 7
  instruction: Apache access.log에서 HTTP 상태 코드별 요청 건수를 집계하라.
  hint: awk로 상태 코드 필드를 추출한다.
  category: analysis
  points: 10
  answer: awk '{print $9}' /var/log/apache2/access.log | sort | uniq -c | sort -rn
  answer_detail: Apache 기본 로그 형식에서 9번째 필드가 HTTP 상태 코드이다. 404가 대량이면 디렉토리 브루트포스, 500이 많으면 애플리케이션 공격 가능성이 있다. 200과 함께 나타나는 공격 요청은 성공한 공격이다.
  verify:
    type: output_contains
    expect: '200'
    field: stdout
  target_vm: attacker
  script: awk '{print $9}' /var/log/apache2/access.log | sort | uniq -c | sort -rn
  risk_level: low
- order: 8
  instruction: Suricata eve.json에서 시간대별 경보 발생 추이를 분석하라.
  hint: jq로 timestamp를 추출하여 시간별 집계한다.
  category: analysis
  points: 10
  answer: cat /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert") | .timestamp[:13]' | sort | uniq -c | sort -k2
  answer_detail: timestamp의 앞 13자(YYYY-MM-DDTHH)를 추출하면 시간별 집계가 된다. 경보가 급증하는 시간대는 활발한 공격이 진행된 시점이다. 이 패턴으로 공격 캠페인의 시작과 종료를 파악한다.
  verify:
    type: output_contains
    expect: T
    field: stdout
  target_vm: attacker
  script: cat /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert") | .timestamp[:13]' | sort | uniq -c | sort -k2
  risk_level: low
- order: 9
  instruction: 시스템 프로세스 생성 로그에서 의심스러운 프로세스를 확인하라.
  hint: syslog 또는 auditd 로그에서 프로세스 실행을 확인한다.
  category: analysis
  points: 10
  answer: grep -E '(nc |ncat|netcat|wget|curl|python|perl|ruby|bash -i)' /var/log/syslog | tail -20
  answer_detail: nc, wget, curl, python 등은 정상 도구이지만 공격자가 자주 사용하는 Living off the Land(LotL) 바이너리이기도 하다. 비정상적인 사용자나 시간대에 실행되면 침해 지표가 된다.
  verify:
    type: output_contains
    expect: nc
    field: stdout
  target_vm: attacker
  script: grep -E '(nc |ncat|netcat|wget|curl|python|perl|ruby|bash -i)' /var/log/syslog | tail -20
  risk_level: low
- order: 10
  instruction: last 명령으로 시스템 로그인 이력을 확인하고, 비정상 로그인을 식별하라.
  hint: last와 lastb 명령을 사용한다.
  category: analysis
  points: 10
  answer: last -20 && echo '=== Failed logins ===' && lastb -20 2>/dev/null
  answer_detail: last는 /var/log/wtmp에서 성공한 로그인 기록을, lastb는 /var/log/btmp에서 실패한 로그인 기록을 표시한다. 심야 시간대 로그인, 알 수 없는 IP, 동시 다중 세션은 비정상 징후이다.
  verify:
    type: output_contains
    expect: pts
    field: stdout
  target_vm: attacker
  script: last -20 && echo '=== Failed logins ===' && lastb -20 2>/dev/null
  risk_level: low
- order: 11
  instruction: 파일 시스템에서 최근 수정된 의심스러운 파일을 찾아라.
  hint: find -mtime -1로 최근 24시간 내 변경 파일을 검색한다.
  category: analysis
  points: 10
  answer: find /tmp /var/tmp /dev/shm -type f -mtime -1 2>/dev/null && find /etc -name '*.conf' -mtime -1 2>/dev/null
  answer_detail: /tmp, /var/tmp, /dev/shm은 공격자가 도구를 업로드하는 대표적인 디렉토리이다. /etc의 설정 파일 변경은 백도어 설치의 증거일 수 있다. -mtime -1은 최근 24시간 이내 수정된 파일이다.
  verify:
    type: output_contains
    expect: tmp
    field: stdout
  target_vm: attacker
  script: find /tmp /var/tmp /dev/shm -type f -mtime -1 2>/dev/null && find /etc -name '*.conf' -mtime -1 2>/dev/null
  risk_level: low
- order: 12
  instruction: 네트워크 연결 상태를 확인하여 의심스러운 아웃바운드 연결을 식별하라.
  hint: ss 또는 netstat 명령을 사용한다.
  category: analysis
  points: 10
  answer: ss -tunapl | grep ESTAB
  answer_detail: ss -tunapl은 모든 TCP/UDP 연결을 프로세스 정보와 함께 표시한다. ESTABLISHED 상태의 아웃바운드 연결 중 알 수 없는 외부 IP는 C2(Command & Control) 통신의 증거일 수 있다.
  verify:
    type: output_contains
    expect: ESTAB
    field: stdout
  target_vm: attacker
  script: ss -tunapl | grep ESTAB
  risk_level: low
- order: 13
  instruction: 수집한 로그를 시간순으로 정렬하여 공격 타임라인을 재구성하고, IoC(침해 지표)와 MITRE ATT&CK TTPs를 매핑하여 /tmp/threat_hunting_report.txt에 저장하라.
  hint: 각 로그의 타임스탬프를 기준으로 시간순 정렬하고, MITRE ATT&CK 프레임워크를 참고한다.
  category: analysis
  points: 15
  answer: 'cat > /tmp/threat_hunting_report.txt << ''EOF''

    === Threat Hunting Report ===


    [Attack Timeline]

    14:00 - Nmap SYN scan from 10.20.30.10 (T1046)

    14:10 - SQL Injection attempts on DVWA (T1190)

    14:15 - Successful UNION SELECT extraction

    14:20 - PHP webshell uploaded

    14:25 - SSH brute force - 87 failed attempts (T1110.001)

    14:30 - Successful SSH login as msfadmin

    14:35 - SUID binary enumeration (T1548.001)

    14:40 - New user added to /etc/passwd (T1136.001)

    14:42 - Cron job backdoor installed (T1053.003)


    Indicators of Compromise (IoC):

    - Attacker IP: 10.20.30.10

    - Webshell: /dvwa/hackable/uploads/shell.php

    - Backdoor user: hacker (UID 0)

    - Cron backdoor: /tmp/.backdoor.sh


    Recommendations:

    1. Block attacker IP at firewall

    2. Remove webshell and backdoor user

    3. Reset all compromised credentials

    4. Patch vsftpd and Apache vulnerabilities

    5. Enable auditd for process/file monitoring

    EOF

    cat /tmp/threat_hunting_report.txt'
  answer_detail: 위협 헌팅 보고서는 공격 타임라인, IoC, TTPs, 대응 권고를 통합한다. MITRE ATT&CK ID를 매핑하면 표준화된 분류가 가능하며, 타임라인은 사고 재구성의 핵심이다.
  verify:
    type: file_exists
    expect: /tmp/threat_hunting_report.txt
    field: filesystem
  target_vm: attacker
  script: 'cat > /tmp/threat_hunting_report.txt << ''EOF''

    === Threat Hunting Report ===


    [Attack Timeline]

    14:00 - Nmap SYN scan from 10.20.30.10 (T1046)

    14:10 - SQL Injection attempts on DVWA (T1190)

    14:15 - Successful UNION SELECT extraction

    14:20 - PHP webshell uploaded

    14:25 - SSH brute force - 87 failed attempts (T1110.001)

    14:30 - Successful SSH login as msfadmin

    14:35 - SUID binary enumeration (T1548.001)

    14:40 - New user added to /etc/passwd (T1136.001)

    14:42 - Cron job backdoor installed (T1053.003)


    Indicators of Compromise (IoC):

    - Attacker IP: 10.20.30.10

    - Webshell: /dvwa/hackable/uploads/shell.php

    - Backdoor user: hacker (UID 0)

    - Cron backdoor: /tmp/.backdoor.sh


    Recommendations:

    1. Block attacker IP at firewall

    2. Remove webshell and backdoor user

    3. Reset all compromised credentials

    4. Patch vsftpd and Apache vulnerabilities

    5. Enable auditd for process/file monitoring

    EOF

    cat /tmp/threat_hunting_report.txt'
  risk_level: low
