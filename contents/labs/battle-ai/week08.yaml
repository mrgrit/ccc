lab_id: "battle-ai-week08"
title: "AI 로그 분석 — 자동 침입 탐지"
version: "ai"
course: "battle-ai"
week: 8
description: "AI 에이전트가 시스템 로그를 자동으로 파싱하여 침입 흔적을 탐지하고, 타임라인을 생성한다."
difficulty: "medium"
duration_minutes: 90
objectives:
  - "AI가 auth.log에서 비정상 접근을 자동 탐지한다"
  - "AI가 웹 서버 로그에서 공격 패턴을 자동 추출한다"
  - "AI가 로그 타임라인을 자동 생성한다"
  - "AI가 IOC(침해 지표)를 자동 추출한다"
prerequisites:
  - "Week 07 AI IDS/IPS 완료"
  - "Linux 로그 구조 이해"
infra_requirements:
  - "attacker VM with bastion"
  - "defender VM"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "AI가 SSH 인증 로그에서 브루트포스 시도를 자동 탐지한다"
    script: |
      echo "=== SSH 인증 로그 분석 ==="
      LOG="/var/log/auth.log"
      if [ -f "$LOG" ]; then
        echo "[실패한 로그인 시도]"
        grep "Failed password" "$LOG" 2>/dev/null | tail -20
        echo ""
        echo "[공격자 IP 통계]"
        grep "Failed password" "$LOG" 2>/dev/null | grep -oP '\d+\.\d+\.\d+\.\d+' | sort | uniq -c | sort -rn | head -10
        echo ""
        echo "[성공한 로그인]"
        grep "Accepted" "$LOG" 2>/dev/null | tail -10
      else
        echo "auth.log 없음 — /var/log/secure 확인"
        grep "Failed password" /var/log/secure 2>/dev/null | tail -20 || echo "보안 로그 없음"
      fi
      echo ""
      echo "SSH 로그 분석 완료"
    category: "analysis"
    risk_level: "low"
    points: 15
    verify:
      type: "output_contains"
      expect: "SSH 로그 분석 완료"
      field: "stdout"

  - order: 2
    instruction: "AI가 웹 서버 액세스 로그에서 공격 패턴을 자동 추출한다"
    script: |
      echo "=== 웹 서버 로그 분석 ==="
      ACCESS_LOG="/var/log/nginx/access.log"
      ALT_LOG="/var/log/apache2/access.log"
      LOG=""
      if [ -f "$ACCESS_LOG" ]; then LOG="$ACCESS_LOG";
      elif [ -f "$ALT_LOG" ]; then LOG="$ALT_LOG";
      fi

      if [ -n "$LOG" ]; then
        echo "[SQL Injection 시도]"
        grep -iE "union.*select|or.*1=1|'.*--|drop.*table" "$LOG" | tail -10
        echo ""
        echo "[XSS 시도]"
        grep -iE "<script|onerror=|onload=" "$LOG" | tail -10
        echo ""
        echo "[디렉토리 트래버설]"
        grep -iE "\.\./|%2e%2e" "$LOG" | tail -10
        echo ""
        echo "[비정상 HTTP 상태]"
        awk '{print $9}' "$LOG" | sort | uniq -c | sort -rn | head -10
      else
        echo "웹 로그 없음 — 시뮬레이션 데이터 생성"
        echo '10.20.30.50 - - [03/Apr/2026:10:15:30 +0900] "GET /search?q=test'"'"' UNION SELECT * FROM users-- HTTP/1.1" 200 1234'
        echo '10.20.30.51 - - [03/Apr/2026:10:16:00 +0900] "GET /page?id=<script>alert(1)</script> HTTP/1.1" 200 567'
      fi
      echo ""
      echo "웹 로그 분석 완료"
    category: "analysis"
    risk_level: "low"
    points: 20
    verify:
      type: "output_contains"
      expect: "웹 로그 분석 완료"
      field: "stdout"

  - order: 3
    instruction: "AI가 시스템 로그에서 비정상 프로세스 및 권한 상승 흔적을 탐지한다"
    script: |
      echo "=== 시스템 로그 분석 ==="
      echo "[sudo 사용 이력]"
      grep "sudo" /var/log/auth.log 2>/dev/null | tail -10 || echo "기록 없음"
      echo ""
      echo "[su 전환 이력]"
      grep "su:" /var/log/auth.log 2>/dev/null | tail -10 || echo "기록 없음"
      echo ""
      echo "[비정상 cron 실행]"
      grep "CRON" /var/log/syslog 2>/dev/null | tail -10 || echo "기록 없음"
      echo ""
      echo "[커널 에러/경고]"
      dmesg 2>/dev/null | grep -iE "error|warning|segfault" | tail -10 || echo "기록 없음"
      echo ""
      echo "시스템 로그 분석 완료"
    category: "analysis"
    risk_level: "low"
    points: 15
    verify:
      type: "output_contains"
      expect: "시스템 로그 분석 완료"
      field: "stdout"

  - order: 4
    instruction: "AI가 탐지된 이벤트로 공격 타임라인을 자동 생성한다"
    script: |
      echo "=== 공격 타임라인 자동 생성 ==="
      TIMELINE="/tmp/attack_timeline.txt"
      echo "========================================" > "$TIMELINE"
      echo "    AI 공격 타임라인 보고서" >> "$TIMELINE"
      echo "    생성: $(date)" >> "$TIMELINE"
      echo "========================================" >> "$TIMELINE"
      echo "" >> "$TIMELINE"

      echo "[Phase 1: 정찰]" >> "$TIMELINE"
      grep -h "scan\|nmap\|Scan" /var/log/auth.log /var/log/syslog 2>/dev/null | head -3 >> "$TIMELINE" || echo "  포트 스캔 흔적 확인 필요" >> "$TIMELINE"

      echo "" >> "$TIMELINE"
      echo "[Phase 2: 초기 침투]" >> "$TIMELINE"
      grep -h "Failed password\|Invalid user" /var/log/auth.log 2>/dev/null | head -3 >> "$TIMELINE" || echo "  브루트포스 흔적 확인 필요" >> "$TIMELINE"

      echo "" >> "$TIMELINE"
      echo "[Phase 3: 권한 상승]" >> "$TIMELINE"
      grep -h "sudo\|su:" /var/log/auth.log 2>/dev/null | head -3 >> "$TIMELINE" || echo "  권한 상승 흔적 확인 필요" >> "$TIMELINE"

      echo "" >> "$TIMELINE"
      echo "[Phase 4: 지속성 확보]" >> "$TIMELINE"
      grep -h "CRON\|crontab\|systemd" /var/log/syslog 2>/dev/null | head -3 >> "$TIMELINE" || echo "  지속성 확보 흔적 확인 필요" >> "$TIMELINE"

      cat "$TIMELINE"
    category: "analysis"
    risk_level: "low"
    points: 20
    verify:
      type: "output_regex"
      expect: "AI 공격 타임라인"
      field: "stdout"

  - order: 5
    instruction: "AI가 IOC(침해 지표)를 자동 추출하여 정리한다"
    script: |
      echo "=== IOC 자동 추출 ==="
      IOC_FILE="/tmp/ioc_list.txt"
      echo "# IOC 목록 - $(date)" > "$IOC_FILE"
      echo "" >> "$IOC_FILE"

      echo "[의심 IP 주소]" >> "$IOC_FILE"
      grep -hoP '\d+\.\d+\.\d+\.\d+' /var/log/auth.log /var/log/syslog 2>/dev/null | \
        grep -v "127.0.0.1\|10.20.30" | sort -u | head -20 >> "$IOC_FILE" || echo "  추출 없음" >> "$IOC_FILE"

      echo "" >> "$IOC_FILE"
      echo "[의심 사용자 계정]" >> "$IOC_FILE"
      grep "Invalid user" /var/log/auth.log 2>/dev/null | \
        grep -oP "user \K\S+" | sort -u | head -10 >> "$IOC_FILE" || echo "  추출 없음" >> "$IOC_FILE"

      echo "" >> "$IOC_FILE"
      echo "[의심 파일 해시]" >> "$IOC_FILE"
      find /tmp -newer /var/log/auth.log -type f 2>/dev/null | head -5 | \
        xargs md5sum 2>/dev/null >> "$IOC_FILE" || echo "  추출 없음" >> "$IOC_FILE"

      cat "$IOC_FILE"
      echo ""
      echo "AI 로그 분석 및 IOC 추출 완료"
    category: "analysis"
    risk_level: "low"
    points: 15
    verify:
      type: "output_regex"
      expect: "IOC.*추출"
      field: "stdout"
