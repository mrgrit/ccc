  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] IP set을 생성하여 공격 IP 블랙리스트를 효율적으로 관리해줘

    📎 참고 (CLI): sudo nft add set inet filter blocklist ''{ type ipv4_addr; }'' && sudo nft add element
