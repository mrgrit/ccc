lab_id: battle-ai-week06
title: 방화벽 구축 및 트래픽 제어 — nftables 실전 방어 + Red 우회 시도 (AI 지원)
version: ai
course: battle-ai
week: 6
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Blue Phase에서 secu VM에 nftables 방화벽을 구축하고, Red Phase에서 방화벽
  우회를 시도한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- nftables를 사용한 방화벽 룰셋을 설계하고 적용한다
- 서비스별 접근 제어와 Rate Limiting을 구현한다
- Red 관점에서 방화벽 우회를 시도하고 방어를 검증한다
prerequisites:
- TCP/IP 네트워크 기초
- Linux 시스템 관리 기본
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] secu VM에서 현재 방화벽 규칙을 확인하라.'
  hint: nft list ruleset 명령을 사용한다.
  category: defense
  points: 5
  answer: '🤖 프롬프트: [BLUE] secu VM에서 현재 방화벽 규칙을 확인해줘

    📎 참고 (CLI): sudo nft list ruleset'
  answer_detail: nft list ruleset은 현재 적용된 모든 nftables 규칙을 표시한다. 현재 상태를 파악한 후 룰셋을 설계한다.
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: '[BLUE] nft list ruleset 현재 방화벽 룰 확인 — secu VM 의 모든 nftables 테이블·체인·룰 출력으로 현재 보호 상태 파악.
        룰셋 설계 전 baseline 확인 단계'
      success_criteria:
      - sudo nft list ruleset 실행
      - table 키워드 포함 출력 (또는 빈 ruleset)
      - 현재 상태 baseline 파악 목적
      acceptable_methods:
      - sudo nft list ruleset
      - sudo nft list tables + list chains
      - iptables -L -n -v (레거시)
      - firewalld --list-all (대체 프론트엔드)
      negative_signs:
      - iptables 만 사용 (nftables 기반 실습 아님)
      - sudo 없이 실행 — 권한 오류
      - baseline 인식 없이 바로 룰 추가
  target_vm: secu
  script: sudo nft list ruleset
  risk_level: low
  bastion_prompt: '[BLUE] secu VM에서 현재 방화벽 규칙을 확인해줘'
- order: 2
  instruction: '[BLUE] nftables 테이블과 기본 체인을 생성하고, 기본 정책을 drop으로 설정하라.'
  hint: nft add table/chain 명령을 사용한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] nftables 테이블과 기본 체인을 생성하고, 기본 정책을 drop으로 설정해줘

    📎 참고 (CLI): sudo nft flush ruleset && sudo nft add table inet filter && sudo nft add chain inet filter
    input ''{ type filter hook input priority 0; policy drop; }'' && sudo nft add chain inet filter forward
    ''{ type filter hook forward priority 0; policy drop; }'' && sudo nft add chain inet filter output
    ''{ type filter hook output priority 0; policy accept; }'' && echo ''Base chains created'''
  answer_detail: inet 패밀리는 IPv4와 IPv6를 모두 처리한다. input 기본 정책을 drop으로 설정하면 명시적으로 허용하지 않은 모든 인바운드 트래픽이 차단된다(화이트리스트
    방식).
  verify:
    type: output_contains
    expect:
    - Base chains created
    - nftables
    field: stdout
    semantic:
      intent: '[BLUE] nftables 기본 체인 + default drop 정책 — nft flush ruleset (초기화) + add table inet filter
        (IPv4/6 공통) + input(drop)/forward(drop)/output(accept) 3개 체인 + type filter hook input priority
        0 훅 바인딩. input drop 정책으로 화이트리스트 방식 (명시 허용 외 모두 차단)'
      success_criteria:
      - nft flush + add table + add chain 순서
      - inet filter table (ip/ip6 아닌 inet)
      - input policy drop 설정
      - Base chains created 메시지
      acceptable_methods:
      - nft flush + nft add table/chain (스크립트)
      - /etc/nftables.conf 편집 후 nft -f
      - iptables -P INPUT DROP (레거시)
      - firewalld --set-default-zone=drop
      negative_signs:
      - policy accept (화이트리스트 아님)
      - ip 패밀리만 (IPv6 커버 안 함)
      - forward 정책 미설정 (라우팅 시 필요)
  target_vm: secu
  requires_approval: true
  script: sudo nft flush ruleset && sudo nft add table inet filter && sudo nft add chain inet filter input
    '{ type filter hook input priority 0; policy drop; }' && sudo nft add chain inet filter forward '{
    type filter hook forward priority 0; policy drop; }' && sudo nft add chain inet filter output '{ type
    filter hook output priority 0; policy accept; }' && echo 'Base chains created'
  risk_level: low
  bastion_prompt: '[BLUE] nftables 테이블과 기본 체인을 생성하고, 기본 정책을 drop으로 설정해줘'
- order: 3
  instruction: '[BLUE] 루프백, established/related 연결을 허용하고, SSH(22), HTTP(80,3000,8080) 서비스를 허용하라.'
  hint: lo 인터페이스와 ct state, tcp dport를 사용한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 루프백, established/related 연결을 허용하고, SSH(22), HTTP(80,3000,8080) 서비스를 허용해줘

    📎 참고 (CLI): sudo nft add rule inet filter input iifname lo accept && sudo nft add rule inet filter
    input ct state established,related accept && sudo nft add rule inet filter input tcp dport { 22, 80,
    3000, 8080 } accept && sudo nft add rule inet filter input icmp type echo-request limit rate 5/second
    accept && echo ''Service rules applied'''
  answer_detail: 루프백 트래픽 허용과 stateful 규칙은 필수이다. web 서버의 서비스 포트(80, 3000, 8080)를 허용하여 가용성을 유지한다.
  verify:
    type: output_contains
    expect: Service rules applied
    field: stdout
    semantic:
      intent: '[BLUE] 서비스 허용 룰 — iifname lo accept (로컬 루프백 필수) + ct state established,related accept (stateful
        응답 허용, 아웃바운드 응답 복귀) + tcp dport {22,80,3000,8080} accept (서비스 포트) + icmp echo-request limit rate
        5/second accept (ping DoS 방지). 가용성 유지 핵심 룰'
      success_criteria:
      - lo iifname + established,related + tcp dport 세트 + icmp limit 4가지 중 최소 3개
      - 포트 {22,80,3000,8080} 세트 표기법
      - Service rules applied 또는 동등한 성공 메시지
      acceptable_methods:
      - nft add rule ... ct state established,related accept
      - iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
      - nftables.conf 의 한 블록으로 정의
      - systemd-networkd 인터페이스 기반 정책
      negative_signs:
      - ct state established 없음 (아웃바운드 응답 차단됨)
      - lo 허용 없음 (로컬 서비스 깨짐)
      - icmp 무제한 허용 (DoS)
  target_vm: secu
  script: sudo nft add rule inet filter input iifname lo accept && sudo nft add rule inet filter input
    ct state established,related accept && sudo nft add rule inet filter input tcp dport { 22, 80, 3000,
    8080 } accept && sudo nft add rule inet filter input icmp type echo-request limit rate 5/second accept
    && echo 'Service rules applied'
  risk_level: low
  bastion_prompt: '[BLUE] 루프백, established/related 연결을 허용하고, SSH(22), HTTP(80,3000,8080) 서비스를 허용해줘'
- order: 4
  instruction: '[BLUE] SSH 브루트포스 방어를 위해 연결 Rate Limiting을 적용하라.'
  hint: 30초에 3회 이상 연결 시도를 차단한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] SSH 브루트포스 방어를 위해 연결 Rate Limiting을 적용해줘

    📎 참고 (CLI): sudo nft add rule inet filter input tcp dport 22 ct state new limit rate 3/minute accept
    && echo ''SSH rate limiting applied'''
  answer_detail: SSH 브루트포스 방어는 새로운 연결(ct state new)의 빈도를 제한하는 것이다. 분당 3회로 제한하면 사전 공격의 효율을 크게 떨어뜨린다.
  verify:
    type: output_contains
    expect: SSH rate limiting applied
    field: stdout
    semantic:
      intent: '[BLUE] SSH 새 연결 rate limit — nft add rule inet filter input tcp dport 22 ct state new limit
        rate 3/minute accept. ct state new 조건으로 기존 세션 유지하면서 새 TCP SYN 만 제한. 분당 3회로 hydra 브루트포스 효율 1/20
        이하로 감속. w4 s9 와 유사하지만 단일 서비스 포트에 통합'
      success_criteria:
      - tcp dport 22 + ct state new + limit rate 조합
      - SSH rate limiting applied 메시지
      - 분당 3회 등 구체 수치
      acceptable_methods:
      - nft add rule ... tcp dport 22 ct state new limit rate 3/minute accept
      - iptables -A INPUT -p tcp --dport 22 --syn -m limit --limit 3/min -j ACCEPT
      - sshguard + nftables 통합
      - fail2ban jail sshd (보완)
      negative_signs:
      - ct state 조건 없음 (기존 세션 영향)
      - rate 지나치게 높음 (보호 효과 없음)
      - 모든 포트 대상 (SSH 특화 아님)
  target_vm: secu
  script: sudo nft add rule inet filter input tcp dport 22 ct state new limit rate 3/minute accept &&
    echo 'SSH rate limiting applied'
  risk_level: low
  bastion_prompt: '[BLUE] SSH 브루트포스 방어를 위해 연결 Rate Limiting을 적용해줘'
- order: 5
  instruction: '[BLUE] 방화벽 로깅 규칙을 추가하고 룰셋을 백업하라.'
  hint: nft log prefix와 nft list ruleset을 사용한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 방화벽 로깅 규칙을 추가하고 룰셋을 백업해줘

    📎 참고 (CLI): sudo nft add rule inet filter input log prefix "[NFT-DROP] " flags all counter drop &&
    sudo nft list ruleset | tee /tmp/nftables_backup.conf && echo ''Firewall backup saved'''
  answer_detail: log prefix는 커널 로그에 차단된 패킷 정보를 기록한다. 백업 파일은 nft -f /tmp/nftables_backup.conf로 복원할 수 있다.
  verify:
    type: output_contains
    expect: Firewall backup saved
    field: stdout
    semantic:
      intent: '[BLUE] 방화벽 로깅 + 백업 — nft add rule inet filter input log prefix [NFT-DROP]  flags all counter
        drop 으로 차단 패킷을 커널 로그(dmesg/kern.log) 에 [NFT-DROP] 태그로 기록 + counter 로 적중 카운트. nft list ruleset
        | tee /tmp/nftables_backup.conf 로 설정 백업 → nft -f <file> 로 복원 가능'
      success_criteria:
      - log prefix + counter + drop 룰 추가
      - tee 또는 > 로 백업 파일 생성 (/tmp/nftables_backup.conf)
      - Firewall backup saved 메시지
      - nft -f 로 복원 가능성 언급
      acceptable_methods:
      - nft add rule ... log prefix counter drop + tee backup
      - /etc/nftables.conf 편집 후 systemctl restart
      - nft export json > backup.json
      - rsyslog 로 NFT-DROP 필터링 후 원격 전송
      negative_signs:
      - log 없이 drop 만 (감사 추적 불가)
      - 백업 파일 미생성
      - log prefix 없음 — 로그 필터링 어려움
  target_vm: secu
  script: sudo nft add rule inet filter input log prefix "[NFT-DROP] " flags all counter drop && sudo
    nft list ruleset | tee /tmp/nftables_backup.conf && echo 'Firewall backup saved'
  risk_level: low
  bastion_prompt: '[BLUE] 방화벽 로깅 규칙을 추가하고 룰셋을 백업해줘'
- order: 6
  instruction: '[RED] 방화벽이 적용된 상태에서 web 서버를 nmap으로 스캔하여 방화벽 동작을 검증하라.'
  hint: 허용된 포트만 open, 나머지는 filtered로 표시되어야 한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 방화벽이 적용된 상태에서 web 서버를 nmap으로 스캔하여 방화벽 동작을 검증해줘

    📎 참고 (CLI): nmap -sS -p 22,80,443,3000,3306,8080,8443 -T4 --max-retries 1 --host-timeout 15s 10.20.30.80'
  answer_detail: 방화벽 적용 후 공격자 관점에서 포트 스캔을 수행하여 정책이 올바르게 적용되었는지 검증한다. 허용된 포트만 open이고 나머지는 filtered여야 한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: '[RED] 방화벽 적용 후 스캔 검증 — nmap -sS -p 22,80,443,3000,3306,8080,8443 로 7개 포트 SYN 스캔. 허용된 {22,80,3000,8080}
        open, 차단된 {443,3306,8443} filtered (drop 정책으로 응답 없음). 공격자 관점에서 방어 정책 검증'
      success_criteria:
      - nmap -sS + 7개 포트 (허용+차단 혼합)
      - open 키워드 포함 출력 (허용 포트)
      - filtered vs open 구분으로 방화벽 동작 검증
      acceptable_methods:
      - nmap -sS -p <list> <target>
      - nmap -sA (ACK scan) 필터 탐지
      - hping3 --scan 대체
      - nc -zv <IP> <port> 포트별 확인
      negative_signs:
      - -sT (connect scan) 으로 오히려 추적 가능
      - 허용 포트만 스캔 (차단 검증 없음)
      - 결과 해석 없음 (open/filtered 의미 설명 누락)
  target_vm: attacker
  script: nmap -sS -p 22,80,443,3000,3306,8080,8443 -T4 --max-retries 1 --host-timeout 15s 10.20.30.80
  risk_level: low
  bastion_prompt: '[RED] 방화벽이 적용된 상태에서 web 서버를 nmap으로 스캔하여 방화벽 동작을 검증해줘'
- order: 7
  instruction: '[RED] 방화벽 Rate Limiting을 우회하기 위해 느린 속도로 SSH 접속을 시도하라.'
  hint: -t 1로 동시 연결을 최소화한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 방화벽 Rate Limiting을 우회하기 위해 느린 속도로 SSH 접속을 시도해줘

    📎 참고 (CLI): hydra -l ccc -p wrongpassword ssh://10.20.30.80 -t 1 -w 30 -f 2>&1 | head -10 && echo
    ''Slow brute force test complete'''
  answer_detail: Rate Limiting은 빠른 공격을 차단하지만, 느린 공격에는 효과가 제한적이다. 분당 3회 이하로 시도하면 차단을 우회할 수 있다. 이를 보완하려면
    fail2ban이 필요하다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
    semantic:
      intent: '[RED] rate limit 우회 — hydra -l ccc -p wrongpassword ssh://<target> -t 1 -w 30 -f 로 -t 1
        (동시 1 연결) + -w 30 (30초 대기) 로 분당 2회 이하 페이스로 시도. nftables limit rate 3/minute 우회 가능. 방화벽 rate limit
        의 한계 실증 → fail2ban 같은 보완책 필요성 입증'
      success_criteria:
      - hydra -t 1 -w <sec> 느린 공격 플래그
      - ssh:// + 단일 사용자 + 잘못된 비밀번호
      - Slow brute force test complete 메시지
      - rate limit 우회 개념 + fail2ban 보완 필요성 언급
      acceptable_methods:
      - hydra -t 1 -w 30 ssh://<target>
      - ncrack --interactive ssh:<target>
      - python paramiko 로 slow brute
      - metasploit ssh_login with BruteforceSpeed
      negative_signs:
      - -t 4 이상 (rate limit 에 걸림)
      - 시간 지연 없는 실행
      - rate limit 한계 분석 없음
  target_vm: attacker
  script: hydra -l ccc -p wrongpassword ssh://10.20.30.80 -t 1 -w 30 -f 2>&1 | head -10 && echo 'Slow
    brute force test complete'
  risk_level: medium
  bastion_prompt: '[RED] 방화벽 Rate Limiting을 우회하기 위해 느린 속도로 SSH 접속을 시도해줘'
- order: 8
  instruction: '[BLUE] 방화벽 로그에서 차단된 트래픽을 분석하라.'
  hint: kern.log 또는 journalctl에서 NFT-DROP을 검색한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 방화벽 로그에서 차단된 트래픽을 분석해줘

    📎 참고 (CLI): sudo journalctl -k --no-pager | grep ''NFT-DROP'' | tail -10 || sudo grep ''NFT-DROP''
    /var/log/kern.log 2>/dev/null | tail -10 || echo ''Firewall log check complete'''
  answer_detail: NFT-DROP 접두사로 태깅된 로그에서 차단된 패킷의 소스 IP, 대상 포트, 프로토콜을 확인할 수 있다. 이 정보로 공격 패턴을 분석한다.
  verify:
    type: output_contains
    expect:
    - complete
    - 분석
    field: stdout
    semantic:
      intent: '[BLUE] 방화벽 차단 로그 분석 — journalctl -k (커널 로그) 또는 /var/log/kern.log 에서 [NFT-DROP] 접두사 grep.
        차단된 패킷의 src/dst IP, sport/dport, proto 확인. s5 에서 설정한 log prefix 로 필터링 용이. 공격 패턴(포트 스캔 분포/IP 집중도)
        분석 기초'
      success_criteria:
      - journalctl -k 또는 /var/log/kern.log 조회
      - NFT-DROP 패턴 grep
      - complete 또는 분석 키워드 출력
      acceptable_methods:
      - journalctl -k | grep NFT-DROP
      - dmesg | grep NFT-DROP
      - rsyslog :msg, contains, NFT-DROP 으로 별도 파일
