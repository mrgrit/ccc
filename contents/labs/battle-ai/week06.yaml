lab_id: battle-ai-week06
title: 방화벽 구축 및 트래픽 제어 — nftables 실전 방어 + Red 우회 시도 (AI 지원)
version: ai
course: battle-ai
week: 6
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Blue Phase에서 secu VM에 nftables 방화벽을 구축하고, Red Phase에서 방화벽
  우회를 시도한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- nftables를 사용한 방화벽 룰셋을 설계하고 적용한다
- 서비스별 접근 제어와 Rate Limiting을 구현한다
- Red 관점에서 방화벽 우회를 시도하고 방어를 검증한다
prerequisites:
- TCP/IP 네트워크 기초
- Linux 시스템 관리 기본
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] secu VM에서 현재 방화벽 규칙을 확인하라.'
  hint: nft list ruleset 명령을 사용한다.
  category: defense
  points: 5
  answer: '🤖 프롬프트: [BLUE] secu VM에서 현재 방화벽 규칙을 확인해줘

    📎 참고 (CLI): sudo nft list ruleset'
  answer_detail: nft list ruleset은 현재 적용된 모든 nftables 규칙을 표시한다. 현재 상태를 파악한 후 룰셋을 설계한다.
  verify:
    type: output_contains
    expect: table
    field: stdout
    semantic:
      intent: '[BLUE] 방화벽 구축 및 트래픽 제어 - 탐지·방어 구현'
      success_criteria:
      - 방어 룰·설정 작성 (Suricata/Wazuh/nftables 등)
      - 탐지 동작 확인
      - false positive 고려
      acceptable_methods:
      - 공격 도구(nmap/sqlmap/hydra/msf) 직접 실행
      - 방어 룰(Suricata/Wazuh/fail2ban/nftables) 편집
      - Python 스크립트로 자동화
      - SSH 로 대상 VM 접속 후 명령 실행
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인·로그 수집 누락
      - RED/BLUE 역할 특성 무시한 응답
  target_vm: secu
  script: sudo nft list ruleset
  risk_level: low
  bastion_prompt: '[BLUE] secu VM에서 현재 방화벽 규칙을 확인해줘'
- order: 2
  instruction: '[BLUE] nftables 테이블과 기본 체인을 생성하고, 기본 정책을 drop으로 설정하라.'
  hint: nft add table/chain 명령을 사용한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] nftables 테이블과 기본 체인을 생성하고, 기본 정책을 drop으로 설정해줘

    📎 참고 (CLI): sudo nft flush ruleset && sudo nft add table inet filter && sudo nft add chain inet filter
    input ''{ type filter hook input priority 0; policy drop; }'' && sudo nft add chain inet filter forward
    ''{ type filter hook forward priority 0; policy drop; }'' && sudo nft add chain inet filter output
    ''{ type filter hook output priority 0; policy accept; }'' && echo ''Base chains created'''
  answer_detail: inet 패밀리는 IPv4와 IPv6를 모두 처리한다. input 기본 정책을 drop으로 설정하면 명시적으로 허용하지 않은 모든 인바운드 트래픽이 차단된다(화이트리스트
    방식).
  verify:
    type: output_contains
    expect:
    - Base chains created
    - nftables
    field: stdout
    semantic:
      intent: '[BLUE] 방화벽 구축 및 트래픽 제어 - 탐지·방어 구현'
      success_criteria:
