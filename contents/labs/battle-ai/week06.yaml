lab_id: battle-ai-week06
title: 방화벽 구축 및 트래픽 제어 — nftables/iptables 실전 방어 (AI 지원)
version: ai
course: battle-ai
week: 6
description: 리눅스 방화벽(nftables/iptables)을 구축하여 네트워크 트래픽을 제어한다. 기본 정책 설정, 서비스별 접근 제어, 로깅, Rate Limiting, 포트 노킹 등 실전 방어 기법을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- nftables를 사용한 방화벽 룰셋을 설계하고 적용한다
- 서비스별 접근 제어와 Rate Limiting을 구현한다
- 방화벽 로깅을 설정하고 공격 트래픽을 분석한다
prerequisites:
- TCP/IP 네트워크 기초
- Linux 시스템 관리 기본
infra_requirements:
- Linux VM (defender, 10.20.30.1)
- Kali Linux VM (attacker, 10.20.30.10)
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 방화벽 규칙을 확인하고 기존 규칙을 초기화하라.
  hint: nft list ruleset 명령을 사용한다.
  category: defense
  points: 5
  answer: sudo nft list ruleset && sudo nft flush ruleset
  answer_detail: nft list ruleset은 현재 적용된 모든 nftables 규칙을 표시한다. nft flush ruleset은 모든 규칙을 삭제한다. 새 룰셋을 설계하기 전에 깨끗한 상태로 초기화하는 것이 좋다.
  verify:
    type: output_contains
    expect: table
    field: stdout
  target_vm: attacker
  script: sudo nft list ruleset && sudo nft flush ruleset
  risk_level: low
- order: 2
  instruction: nftables 테이블과 기본 체인(input, forward, output)을 생성하라.
  hint: nft add table/chain 명령을 사용한다.
  category: defense
  points: 10
  answer: sudo nft add table inet filter && sudo nft add chain inet filter input '{ type filter hook input priority 0; policy drop; }' && sudo nft add chain inet filter forward '{ type filter hook forward
    priority 0; policy drop; }' && sudo nft add chain inet filter output '{ type filter hook output priority 0; policy accept; }'
  answer_detail: inet 패밀리는 IPv4와 IPv6를 모두 처리한다. input 체인의 기본 정책을 drop으로 설정하면 명시적으로 허용하지 않은 모든 인바운드 트래픽이 차단된다(화이트리스트 방식). output은 accept로 시작하여 필요시 제한한다.
  verify:
    type: output_contains
    expect: filter
    field: stdout
  target_vm: attacker
  script: sudo nft add table inet filter && sudo nft add chain inet filter input '{ type filter hook input priority 0; policy drop; }' && sudo nft add chain inet filter forward '{ type filter hook forward
    priority 0; policy drop; }' && sudo nft add chain inet filter output '{ type filter hook output priority 0; policy accept; }'
  risk_level: low
- order: 3
  instruction: 루프백 인터페이스 트래픽을 허용하고, established/related 연결을 허용하라.
  hint: lo 인터페이스와 ct state를 사용한다.
  category: defense
  points: 10
  answer: sudo nft add rule inet filter input iifname lo accept && sudo nft add rule inet filter input ct state established,related accept
  answer_detail: 루프백(lo) 트래픽 허용은 로컬 서비스 통신에 필수이다. ct state established,related는 이미 수립된 연결과 관련 트래픽(FTP data 등)을 허용한다. stateful 방화벽의 핵심 규칙이다.
  verify:
    type: output_contains
    expect: accept
    field: stdout
  target_vm: attacker
  script: sudo nft add rule inet filter input iifname lo accept && sudo nft add rule inet filter input ct state established,related accept
  risk_level: low
- order: 4
  instruction: SSH(22), HTTP(80), HTTPS(443) 서비스만 외부에서 접근 가능하도록 허용하라.
  hint: tcp dport로 포트를 지정한다.
  category: defense
  points: 10
  answer: sudo nft add rule inet filter input tcp dport 22 accept && sudo nft add rule inet filter input tcp dport 80 accept && sudo nft add rule inet filter input tcp dport 443 accept
  answer_detail: 필요한 서비스만 명시적으로 허용하는 것이 방화벽의 기본 원칙이다. tcp dport는 목적지 포트를 매칭한다. 각 서비스별로 별도 규칙을 생성하면 개별적으로 관리하기 쉽다.
  verify:
    type: output_contains
    expect: accept
    field: stdout
  target_vm: attacker
  script: sudo nft add rule inet filter input tcp dport 22 accept && sudo nft add rule inet filter input tcp dport 80 accept && sudo nft add rule inet filter input tcp dport 443 accept
  risk_level: low
- order: 5
  instruction: ICMP ping 요청을 허용하되, Rate Limiting(초당 5회)을 적용하라.
  hint: nft limit rate 구문을 사용한다.
  category: defense
  points: 10
  answer: sudo nft add rule inet filter input icmp type echo-request limit rate 5/second accept
  answer_detail: ICMP echo-request를 완전히 차단하면 네트워크 진단이 어려워진다. Rate Limiting을 적용하면 정상적인 ping은 허용하면서 ping flood 공격은 차단할 수 있다. limit rate N/second 구문으로 설정한다.
  verify:
    type: output_contains
    expect: limit
    field: stdout
  target_vm: attacker
  script: sudo nft add rule inet filter input icmp type echo-request limit rate 5/second accept
  risk_level: low
- order: 6
  instruction: SSH 서비스에 대한 브루트포스 방어를 위해 연결 Rate Limiting을 적용하라.
  hint: 30초에 3회 이상 연결 시도를 차단한다.
  category: defense
  points: 10
  answer: sudo nft add rule inet filter input tcp dport 22 ct state new limit rate 3/minute accept && sudo nft insert rule inet filter input tcp dport 22 ct state new drop
  answer_detail: SSH 브루트포스 방어는 새로운 연결(ct state new)의 빈도를 제한하는 것이다. 분당 3회로 제한하면 사전 공격의 효율을 크게 떨어뜨린다. 실무에서는 fail2ban과 병행하여 사용한다.
  verify:
    type: output_contains
    expect: limit
    field: stdout
  target_vm: attacker
  script: sudo nft add rule inet filter input tcp dport 22 ct state new limit rate 3/minute accept && sudo nft insert rule inet filter input tcp dport 22 ct state new drop
  risk_level: low
- order: 7
  instruction: 특정 IP 대역(10.20.30.100/32)에서의 모든 접근을 차단하라.
  hint: saddr로 소스 IP를 매칭한다.
  category: defense
  points: 10
  answer: sudo nft insert rule inet filter input ip saddr 10.20.30.100 drop
  answer_detail: ip saddr로 소스 IP를 매칭하여 특정 호스트의 접근을 차단한다. insert를 사용하면 체인의 맨 앞에 규칙이 추가되어 다른 허용 규칙보다 먼저 평가된다. 공격 IP 차단에 사용한다.
  verify:
    type: output_contains
    expect: drop
    field: stdout
  target_vm: attacker
  script: sudo nft insert rule inet filter input ip saddr 10.20.30.100 drop
  risk_level: low
- order: 8
  instruction: 방화벽에 로깅 규칙을 추가하여 차단된 트래픽을 기록하라.
  hint: nft log prefix 구문을 사용한다.
  category: defense
  points: 10
  answer: sudo nft add rule inet filter input log prefix "[NFT-DROP] " flags all counter drop
  answer_detail: log prefix는 커널 로그에 차단된 패킷 정보를 기록한다. flags all은 모든 메타데이터를 포함한다. counter는 매칭 횟수를 카운트한다. 로그는 /var/log/kern.log 또는 journalctl에서 확인할 수 있다.
  verify:
    type: output_contains
    expect: log
    field: stdout
  target_vm: attacker
  script: sudo nft add rule inet filter input log prefix "[NFT-DROP] " flags all counter drop
  risk_level: low
- order: 9
  instruction: 현재 적용된 전체 룰셋을 확인하고 파일로 백업하라.
  hint: nft list ruleset을 파일로 리다이렉트한다.
  category: defense
  points: 10
  answer: sudo nft list ruleset | tee /tmp/nftables_backup.conf
  answer_detail: nft list ruleset의 출력을 파일로 저장하면 방화벽 설정의 백업이 된다. 이 파일은 nft -f /tmp/nftables_backup.conf로 복원할 수 있다. 변경 전 항상 백업하는 것이 모범 사례이다.
  verify:
    type: file_exists
    expect: /tmp/nftables_backup.conf
    field: filesystem
  target_vm: attacker
  script: sudo nft list ruleset | tee /tmp/nftables_backup.conf
  risk_level: low
- order: 10
  instruction: 공격자 VM에서 nmap 스캔을 실행하여 방화벽이 올바르게 작동하는지 검증하라.
  hint: 허용된 포트만 open, 나머지는 filtered로 표시되어야 한다.
  category: defense
  points: 10
  answer: nmap -sS -p 22,80,443,3306,8080 10.20.30.1
  answer_detail: 방화벽 적용 후 공격자 관점에서 포트 스캔을 수행하여 정책이 올바르게 적용되었는지 검증한다. 22, 80, 443만 open이고 3306, 8080은 filtered로 표시되어야 한다.
  verify:
    type: output_contains
    expect: filtered
    field: stdout
  target_vm: attacker
  script: nmap -sS -p 22,80,443,3306,8080 10.20.30.1
  risk_level: low
- order: 11
  instruction: SYN Flood 방어를 위한 synproxy 규칙을 설정하라.
  hint: nft의 synproxy 기능을 사용한다.
  category: defense
  points: 10
  answer: sudo nft add rule inet filter input tcp dport 80 ct state new tcp flags syn limit rate over 100/second burst 150 packets drop
  answer_detail: SYN Flood는 대량의 SYN 패킷으로 서버 리소스를 소진시키는 DDoS 공격이다. synproxy나 SYN rate limiting으로 방어한다. burst는 순간 허용량이며, 이를 초과하면 drop한다.
  verify:
    type: output_contains
    expect: syn
    field: stdout
  target_vm: attacker
  script: sudo nft add rule inet filter input tcp dport 80 ct state new tcp flags syn limit rate over 100/second burst 150 packets drop
  risk_level: low
- order: 12
  instruction: Invalid 상태의 패킷을 차단하여 비정상 트래픽을 필터링하라.
  hint: ct state invalid를 사용한다.
  category: defense
  points: 10
  answer: sudo nft insert rule inet filter input ct state invalid drop
  answer_detail: ct state invalid는 연결 추적에서 유효하지 않은 상태의 패킷이다. 포트 스캔, 패킷 조작 등 비정상 트래픽이 이에 해당한다. 체인 앞부분에 배치하여 빠르게 차단한다.
  verify:
    type: output_contains
    expect: invalid
    field: stdout
  target_vm: attacker
  script: sudo nft insert rule inet filter input ct state invalid drop
  risk_level: low
- order: 13
  instruction: IP set을 생성하여 여러 차단 IP를 효율적으로 관리하라.
  hint: nft add set과 add element를 사용한다.
  category: defense
  points: 10
  answer: sudo nft add set inet filter blocklist '{ type ipv4_addr; }' && sudo nft add element inet filter blocklist '{ 10.20.30.100, 10.20.30.101, 10.20.30.102 }' && sudo nft add rule inet filter input
    ip saddr @blocklist drop
  answer_detail: IP set은 여러 IP를 하나의 집합으로 관리하여 규칙을 간소화한다. 개별 규칙보다 성능이 좋고, 동적으로 IP를 추가/삭제할 수 있다. 실무에서 블랙리스트 관리에 필수적이다.
  verify:
    type: output_contains
    expect: blocklist
    field: stdout
  target_vm: attacker
  script: sudo nft add set inet filter blocklist '{ type ipv4_addr; }' && sudo nft add element inet filter blocklist '{ 10.20.30.100, 10.20.30.101, 10.20.30.102 }' && sudo nft add rule inet filter input
    ip saddr @blocklist drop
  risk_level: low
- order: 14
  instruction: 방화벽 카운터를 확인하여 각 규칙의 매칭 횟수를 분석하라.
  hint: nft list ruleset에서 counter 값을 확인한다.
  category: analysis
  points: 10
  answer: sudo nft list ruleset | grep -A1 'counter'
  answer_detail: counter는 각 규칙에 매칭된 패킷 수와 바이트 수를 기록한다. 이 정보로 어떤 규칙이 가장 많이 트리거되는지, 비정상적인 트래픽 패턴이 있는지 분석할 수 있다.
  verify:
    type: output_contains
    expect: packets
    field: stdout
  target_vm: attacker
  script: sudo nft list ruleset | grep -A1 'counter'
  risk_level: low
- order: 15
  instruction: 방화벽 구축 결과를 종합하여 방화벽 정책 문서를 작성하라. 적용된 규칙, 테스트 결과, 운영 가이드를 포함하라.
  hint: 각 규칙의 목적과 테스트 결과를 정리한다.
  category: analysis
  points: 15
  answer: 'cat > /tmp/firewall_policy.txt << ''EOF''

    === Firewall Policy Document ===


    Default Policy: DROP (whitelist approach)


    Allowed Services:

    - SSH (22/tcp) - Rate limited: 3/min

    - HTTP (80/tcp) - SYN flood protection

    - HTTPS (443/tcp)

    - ICMP echo - Rate limited: 5/sec


    Blocked:

    - All other inbound traffic

    - Invalid state packets

    - Blocklisted IPs (managed via nft set)


    Logging:

    - All dropped packets logged with [NFT-DROP] prefix

    - Counters enabled on all rules


    Test Results:

    - Port scan: Only 22,80,443 visible

    - Brute force: Rate limited after 3 attempts

    - SYN flood: Mitigated by rate limiting


    Maintenance:

    - Review logs daily: journalctl -k | grep NFT-DROP

    - Update blocklist: nft add element inet filter blocklist { IP }

    - Backup before changes: nft list ruleset > backup.conf

    EOF'
  answer_detail: 방화벽 정책 문서는 적용된 규칙의 비즈니스 근거, 기술적 구현, 테스트 결과, 운영 절차를 포함해야 한다. 이 문서는 감사(audit)와 인수인계의 핵심 자료가 된다.
  verify:
    type: file_exists
    expect: /tmp/firewall_policy.txt
    field: filesystem
  target_vm: attacker
  script: 'cat > /tmp/firewall_policy.txt << ''EOF''

    === Firewall Policy Document ===


    Default Policy: DROP (whitelist approach)


    Allowed Services:

    - SSH (22/tcp) - Rate limited: 3/min

    - HTTP (80/tcp) - SYN flood protection

    - HTTPS (443/tcp)

    - ICMP echo - Rate limited: 5/sec


    Blocked:

    - All other inbound traffic

    - Invalid state packets

    - Blocklisted IPs (managed via nft set)


    Logging:

    - All dropped packets logged with [NFT-DROP] prefix

    - Counters enabled on all rules


    Test Results:

    - Port scan: Only 22,80,443 visible

    - Brute force: Rate limited after 3 attempts

    - SYN flood: Mitigated by rate limiting


    Maintenance:

    - Review logs daily: journalctl -k | grep NFT-DROP

    - Update blocklist: nft add element inet filter blocklist { IP }

    - Backup before changes: nft list ruleset > backup.conf

    EOF'
  risk_level: low
