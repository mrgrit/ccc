      - 방어 룰(Suricata/Wazuh/fail2ban/nftables) 편집
      - Python 스크립트로 자동화
      - SSH 로 대상 VM 접속 후 명령 실행
      negative_signs:
      - 실행 없이 개념 설명만
      - 결과 확인·로그 수집 누락
      - RED/BLUE 역할 특성 무시한 응답
  target_vm: secu
  requires_approval: true
  script: sudo nft flush ruleset && sudo nft add table inet filter && sudo nft add chain inet filter input
    '{ type filter hook input priority 0; policy drop; }' && sudo nft add chain inet filter forward '{
    type filter hook forward priority 0; policy drop; }' && sudo nft add chain inet filter output '{ type
    filter hook output priority 0; policy accept; }' && echo 'Base chains created'
  risk_level: low
  bastion_prompt: '[BLUE] nftables 테이블과 기본 체인을 생성하고, 기본 정책을 drop으로 설정해줘'
