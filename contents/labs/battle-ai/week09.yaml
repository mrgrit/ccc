lab_id: battle-ai-week09
title: 사고 대응(Incident Response) — 탐지부터 복구까지 + Red 지속성 확보 (AI 지원)
version: ai
course: battle-ai
week: 9
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Blue Phase에서 NIST 사고 대응 프레임워크를 실습하고, Red Phase에서 탐지를 회피하며
  지속성을 확보하는 기법을 시도한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- NIST 사고 대응 6단계를 실제 시나리오에 적용한다
- 포렌식 증거를 올바르게 수집하고 보존한다
- Red 관점에서 지속성 확보와 탐지 회피를 시도한다
prerequisites:
- Week 6-8 방어 실습 완료
- Linux 시스템 관리
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] web 서버의 현재 상태를 초기 파악하라. 실행 중인 프로세스, 네트워크 연결, 로그인 사용자를 확인하라.'
  hint: ps, ss, who 명령을 사용한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] web 서버의 현재 상태를 초기 파악해줘

    📎 참고 (CLI): who && echo ''---'' && ps auxf --sort=-%cpu | head -20 && echo ''---'' && ss -tunapl |
    grep ESTAB'
  answer_detail: 사고 대응의 첫 단계는 현재 상태 파악이다. who로 활성 세션, ps로 의심 프로세스, ss로 네트워크 연결을 확인한다.
  verify:
    type: output_contains
    expect: '---'
    field: stdout
    semantic:
      intent: '[BLUE] NIST IR Phase 1 초기 상태 파악 — who (활성 세션) + ps auxf --sort=-%cpu | head -20 (의심 프로세스
        CPU 순) + ss -tunapl | grep ESTAB (확립된 연결) 3종 수집. 사고 대응 첫 단계는 snapshot 확보 — 재부팅·로그아웃 시 소실될 휘발성
        정보 우선'
      success_criteria:
      - who + ps auxf + ss -tunapl 3종 수집
      - '--- 구분자로 구조화 출력'
      - 의심 프로세스(CPU 정렬) + 활성 세션 + 네트워크 연결 개념
      acceptable_methods:
      - who + ps auxf + ss -tunapl
      - w (who + uptime + idle)
      - top -n 1 + netstat -plt
      - lsof -i + last
      negative_signs:
      - 3종 중 일부만 수집
      - '--- 구분자 없어 정보 섞임'
      - 휘발성 정보 개념 없음
  target_vm: web
  script: who && echo '---' && ps auxf --sort=-%cpu | head -20 && echo '---' && ss -tunapl | grep ESTAB
  risk_level: low
  bastion_prompt: '[BLUE] web 서버의 현재 상태를 초기 파악해줘'
- order: 2
  instruction: '[BLUE] 휘발성 증거를 수집하라. 프로세스 목록, 네트워크 상태, 라우팅 테이블을 저장하라.'
  hint: 각 명령의 출력을 /tmp/forensics/ 디렉토리에 저장한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] 휘발성 증거를 수집해줘

    📎 참고 (CLI): mkdir -p /tmp/forensics && date > /tmp/forensics/timestamp.txt && ps auxf > /tmp/forensics/processes.txt
    && ss -tunapl > /tmp/forensics/network.txt && ip route > /tmp/forensics/routes.txt && ls -la /tmp/forensics/'
  answer_detail: 휘발성 증거는 시스템 재부팅 시 사라진다. RFC 3227의 증거 수집 순서를 따라 메모리, 네트워크, 프로세스, 디스크 순으로 수집한다.
  verify:
    type: file_exists
    expect: /tmp/forensics/processes.txt
    field: filesystem
    semantic:
      intent: '[BLUE] NIST IR Phase 2 휘발성 증거 수집 — mkdir -p /tmp/forensics + date > timestamp + ps auxf
        > processes.txt + ss -tunapl > network.txt + ip route > routes.txt. RFC 3227 증거 순서(휘발성 높은 것부터):
        레지스터/RAM → 네트워크 → 프로세스 → 디스크. 재부팅 시 소실 방지'
      success_criteria:
      - /tmp/forensics/ 디렉토리 생성
      - 최소 3종 아티팩트 파일 (processes/network/routes/timestamp)
      - RFC 3227 또는 휘발성 증거 순서 개념
      acceptable_methods:
      - mkdir + date + ps > + ss > + ip route >
      - LiME 로 메모리 덤프
      - AVML 로 raw memory capture
      - rfc3227 체크리스트 준수
      negative_signs:
      - 파일 저장 없이 화면 출력만
      - timestamp 기록 없음 (legal chain of custody 약화)
      - RFC 3227 순서 무시
  target_vm: web
  script: mkdir -p /tmp/forensics && date > /tmp/forensics/timestamp.txt && ps auxf > /tmp/forensics/processes.txt
    && ss -tunapl > /tmp/forensics/network.txt && ip route > /tmp/forensics/routes.txt && ls -la /tmp/forensics/
  risk_level: low
  bastion_prompt: '[BLUE] 휘발성 증거를 수집해줘'
- order: 3
  instruction: '[RED] web 서버에 접근하여 은밀한 백도어(SSH 키)를 설치하라.'
  hint: authorized_keys에 공개키를 추가한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] web 서버에 접근하여 은밀한 백도어(SSH 키)를 설치해줘

    📎 참고 (CLI): ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '''' -q 2>/dev/null && cat /tmp/backdoor_key.pub
    && echo ''=== SSH key backdoor prepared ==='''
  answer_detail: SSH 공개키를 authorized_keys에 추가하면 패스워드 없이 접근 가능한 백도어가 된다. ed25519는 현대적이고 짧은 키로 탐지가 어렵다.
  verify:
    type: output_contains
    expect: SSH key backdoor prepared
    field: stdout
    semantic:
      intent: '[RED] ed25519 SSH 백도어 키 생성 — ssh-keygen -t ed25519 -f /tmp/backdoor_key -N (빈 passphrase)
        -q (silent) 로 공격자 전용 키페어 생성. cat .pub 로 공개키 출력 후 향후 피해자 authorized_keys 에 삽입 준비. ed25519 는 RSA
        대비 짧고 현대적이라 탐지 어려움. MITRE T1098.004 SSH Authorized Keys'
      success_criteria:
      - ssh-keygen -t ed25519 명령
      - -N + -q 옵션 (비대화·빈 passphrase)
      - SSH key backdoor prepared 메시지
      - MITRE T1098.004 또는 지속성 개념
      acceptable_methods:
      - ssh-keygen -t ed25519 -f file -N
      - ssh-keygen -t rsa -b 4096 (대체)
      - age 키 생성 (post-SSH)
      - smbclient + impacket psexec 기반 지속성
      negative_signs:
      - ed25519 대신 약한 DSA/RSA-1024
      - passphrase 설정 (자동화 불가)
      - 공개키 출력 없이 생성만
  target_vm: attacker
  script: ssh-keygen -t ed25519 -f /tmp/backdoor_key -N '' -q 2>/dev/null && cat /tmp/backdoor_key.pub
    && echo '=== SSH key backdoor prepared ==='
  risk_level: medium
  bastion_prompt: '[RED] web 서버에 접근하여 은밀한 백도어(SSH 키)를 설치해줘'
- order: 4
  instruction: '[BLUE] SSH 키 기반 백도어를 확인하라. authorized_keys 파일에 비인가 키가 있는지 검사한다.'
  hint: 모든 사용자의 .ssh/authorized_keys를 확인한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] SSH 키 기반 백도어를 확인하라. authorized_keys 파일에 비인가 키가 있는지 검사한다해줘

    📎 참고 (CLI): find /home -name ''authorized_keys'' -exec echo ''=== {} ==='' \; -exec cat {} \; 2>/dev/null
    && echo ''=== /root ==='' && cat /root/.ssh/authorized_keys 2>/dev/null && echo ''SSH key audit complete'''
  answer_detail: authorized_keys에 공격자의 공개키가 추가되면 패스워드 없이 SSH 접근이 가능하다. 알 수 없는 키는 제거해야 한다.
  verify:
    type: output_contains
    expect:
    - SSH key audit complete
    - authorized_keys
    field: stdout
    semantic:
      intent: '[BLUE] authorized_keys 감사 — find /home -name authorized_keys -exec cat 각 파일 내용 출력 + /root/.ssh/authorized_keys.
        각 파일 경로와 내용을 === {} === 형식으로 출력. 알 수 없는 공개키 = 공격자 백도어. SSH 기반 지속성 탐지 (MITRE T1098.004 방어)'
      success_criteria:
      - find /home -name authorized_keys + /root 검사
      - SSH key audit complete 또는 authorized_keys 출력
      - 알 수 없는 키 = 백도어 개념 인지
      acceptable_methods:
      - find /home -name authorized_keys -exec cat
      - Wazuh FIM 으로 authorized_keys 모니터링
      - auditd -w authorized_keys -p wa
      - Tripwire 정책 설정
      negative_signs:
      - /root 제외
      - 파일 내용(cat) 없이 경로만
      - 키 비교 기준 없음 (화이트리스트)
  target_vm: web
  script: find /home -name 'authorized_keys' -exec echo '=== {} ===' \; -exec cat {} \; 2>/dev/null &&
    echo '=== /root ===' && cat /root/.ssh/authorized_keys 2>/dev/null && echo 'SSH key audit complete'
  risk_level: low
  bastion_prompt: '[BLUE] SSH 키 기반 백도어를 확인하라. authorized_keys 파일에 비인가 키가 있는지 검사한다해줘'
- order: 5
  instruction: '[BLUE] 악성 cron job과 백도어 사용자 계정을 검사하라.'
  hint: 모든 사용자의 crontab과 UID 0 계정을 확인한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] 악성 cron job과 백도어 사용자 계정을 검사해줘

    📎 참고 (CLI): awk -F: ''$3 == 0 {print}'' /etc/passwd && echo ''--- crontab ---'' && cat /etc/crontab
    && echo ''--- cron.d ---'' && ls -la /etc/cron.d/ 2>/dev/null'
  answer_detail: UID 0인 계정이 root 외에 있으면 백도어이다. crontab에 비정상적인 스크립트 실행이 있으면 지속성 기법이다.
  verify:
    type: output_contains
    expect: root
    field: stdout
    semantic:
      intent: '[BLUE] UID 0 백도어 계정 + cron 지속성 감사 — awk -F: $3 == 0 {print} /etc/passwd (UID 0 = root 권한
        계정 목록; root 외 다른 계정은 백도어) + cat /etc/crontab + ls /etc/cron.d/. 지속성 기법 2종(백도어 계정·cron)을 한번에 커버.
        MITRE T1136 Create Account + T1053.003 Cron'
      success_criteria:
      - awk $3==0 /etc/passwd (UID 0 필터)
      - /etc/crontab + /etc/cron.d/ 모두 확인
      - root 키워드 출력
      - UID 0 백도어 개념 + MITRE T1136/T1053 매핑
      acceptable_methods:
      - 'awk -F: $3==0 /etc/passwd'
      - 'getent passwd | awk -F: $3==0'
      - systemd timers list
      - auditd -w /etc/passwd -p wa
      negative_signs:
      - UID 필터 없이 전체 passwd
      - crontab 사용자별(crontab -l) 누락
      - 지속성 기법 이름 (T1136/T1053) 언급 없음
  target_vm: web
  script: 'awk -F: ''$3 == 0 {print}'' /etc/passwd && echo ''--- crontab ---'' && cat /etc/crontab &&
    echo ''--- cron.d ---'' && ls -la /etc/cron.d/ 2>/dev/null'
  risk_level: low
  bastion_prompt: '[BLUE] 악성 cron job과 백도어 사용자 계정을 검사해줘'
- order: 6
  instruction: '[BLUE] web 서버에서 웹셸을 검색하라. system(), exec() 등 위험 함수를 포함한 파일을 찾는다.'
  hint: grep으로 위험 함수를 재귀 검색한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] web 서버에서 웹셸을 검색하라. system(), exec() 등 위험 함수를 포함한 파일을 찾는다해줘

    📎 참고 (CLI): grep -rl ''system\|exec\|passthru\|shell_exec\|eval'' /var/www/ 2>/dev/null | head -10
    && echo ''Webshell scan complete'''
  answer_detail: 웹셸은 system(), exec() 등의 함수를 포함한다. 발견 시 해시를 기록하고 격리한 후 제거한다.
  verify:
    type: output_contains
    expect: Webshell scan complete
    field: stdout
    semantic:
      intent: '[BLUE] 웹셸 검색 — grep -rl system|exec|passthru|shell_exec|eval /var/www/. PHP 위험 함수(system:
        명령 실행·exec: 명령 실행·passthru: 원본 출력·shell_exec: 출력 캡처·eval: 코드 평가) 를 포함한 파일을 재귀 검색. 발견 시 해시 기록 후
        격리. MITRE T1505.003 Web Shell'
      success_criteria:
      - grep -rl 로 재귀 검색 + /var/www/ 대상
      - system·exec·passthru·shell_exec·eval 중 최소 3개 패턴
      - Webshell scan complete 메시지
      - 위험 함수 = 웹셸 지표 인지
      acceptable_methods:
      - grep -rl (재귀 + 파일명만)
      - find /var/www + grep -l
      - PHP Malware Scanner (PMS)
      - maldet + ClamAV
      negative_signs:
      - 패턴 1개만 (false negative)
      - /var/www 외 다른 경로
      - 해시 기록·격리 후속 단계 없음
  target_vm: web
  script: grep -rl 'system\|exec\|passthru\|shell_exec\|eval' /var/www/ 2>/dev/null | head -10 && echo
    'Webshell scan complete'
  risk_level: low
  bastion_prompt: '[BLUE] web 서버에서 웹셸을 검색하라. system(), exec() 등 위험 함수를 포함한 파일을 찾는다해줘'
- order: 7
  instruction: '[BLUE] secu VM에서 공격자 IP({{ATTACKER_IP}})를 네트워크에서 격리하라.'
  hint: nftables로 공격자 IP의 모든 트래픽을 차단한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] secu VM에서 공격자 IP(10.20.30.201)를 네트워크에서 격리해줘

    📎 참고 (CLI): sudo nft insert rule inet filter input ip saddr 10.20.30.201 drop && sudo nft insert rule
    inet filter forward ip saddr 10.20.30.201 drop && nft list ruleset | grep ''10.20.30.201'' && echo
    ''Attacker isolated'''
  answer_detail: 네트워크 격리는 추가 피해 확산과 데이터 유출을 방지하는 핵심 조치이다. input과 forward 모두에서 차단해야 완전한 격리가 된다.
  verify:
    type: output_contains
    expect: Attacker isolated
    field: stdout
    semantic:
      intent: '[BLUE] NIST IR Phase 3 Containment — nft insert rule inet filter input ip saddr 10.20.30.201
        drop + nft insert rule inet filter forward ... drop 로 input + forward 체인 모두 차단. 공격자 IP 를 네트워크에서
        완전 격리 → 추가 피해 확산 + 데이터 유출 방지. insert(맨 앞) 로 다른 accept 룰보다 우선'
      success_criteria:
      - nft insert rule (head 에 추가)
      - input + forward 양 체인 차단
      - Attacker isolated 메시지
      - NIST IR Containment 단계 인지
      acceptable_methods:
      - nft insert rule ... drop
      - iptables -I INPUT 1 -s <IP> -j DROP (레거시)
      - ipset + nftables set @blocklist 활용
      - BGP 블랙홀 (네트워크 팀)
      negative_signs:
      - append 사용 (우선순위 낮음)
      - input 만 차단 (forward 우회 가능)
      - 격리 이유 설명 없음
  target_vm: secu
  requires_approval: true
  script: sudo nft insert rule inet filter input ip saddr 10.20.30.201 drop && sudo nft insert rule inet
    filter forward ip saddr 10.20.30.201 drop && nft list ruleset | grep '10.20.30.201' && echo 'Attacker
    isolated'
  risk_level: low
  bastion_prompt: '[BLUE] secu VM에서 공격자 IP(10.20.30.201)를 네트워크에서 격리해줘'
- order: 8
  instruction: '[BLUE] 방화벽을 강화하고, 모든 사용자 패스워드를 강제 변경하라.'
  hint: chage -d 0으로 다음 로그인 시 변경을 강제한다.
  category: response
  points: 10
  answer: '🤖 프롬프트: [BLUE] 방화벽을 강화하고, 모든 사용자 패스워드를 강제 변경해줘

    📎 참고 (CLI): echo ''Password reset required for all accounts'' && cat /etc/passwd | awk -F: ''$3 >=
    1000 {print $1}'' | head -10 && echo ''Recovery actions documented'''
  answer_detail: 침해 사고 후 모든 계정의 패스워드를 변경하는 것은 필수이다. chage -d 0은 다음 로그인 시 변경을 강제한다.
  verify:
    type: output_contains
    expect: Recovery actions documented
    field: stdout
    semantic:
      intent: '[BLUE] NIST IR Phase 5 Recovery 복구 계획 — cat /etc/passwd | awk -F: $3 >= 1000 {print $1}
        로 일반 사용자 계정 목록 (UID >= 1000) 추출 + 각 계정 비밀번호 변경 필요 고지. 실전: chage -d 0 <user> 로 다음 로그인 시 강제 변경.
        침해 사고 후 자격 증명 전면 rotation 은 필수'
      success_criteria:
      - awk $3 >= 1000 로 일반 사용자 추출
      - Recovery actions documented 메시지
      - chage -d 0 또는 비밀번호 정책 강화 방안
      acceptable_methods:
      - awk + passwd 추출 + chage -d 0
      - for u in $(users); do passwd -e $u; done
      - 'Active Directory: Set-ADAccountExpiration'
