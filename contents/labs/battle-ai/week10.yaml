lab_id: battle-ai-week10
title: 공방전 준비 — 공격/방어 환경 구축 및 전략 수립 (AI 지원)
version: ai
course: battle-ai
week: 10
description: Week 11-14 실전 공방전을 위한 환경 구축과 전략 수립을 수행한다. 공격팀과 방어팀의 역할을 이해하고, 각 팀의 인프라를 준비하며, 교전 규칙(Rules of Engagement)을 정의한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 공방전 환경(공격/방어 네트워크)을 구축한다
- 팀별 전략과 Playbook을 수립한다
- 교전 규칙과 점수 체계를 이해한다
prerequisites:
- Week 1-9 전체 과정 이수
- 팀 구성 완료
infra_requirements:
- Attack VM (Red Team, 10.20.30.0/24)
- Defense VM (Blue Team, 10.20.40.0/24)
- Scoring Server (10.20.50.1)
pass_threshold: 0.6
steps:
- order: 1
  instruction: 방어 팀 VM의 네트워크 설정을 확인하고, 보호 대상 서비스(HTTP, SSH, FTP, MySQL)가 정상 동작하는지 검증하라.
  hint: systemctl status와 ss -tlnp를 사용한다.
  category: defense
  points: 10
  answer: systemctl status apache2 && systemctl status sshd && systemctl status vsftpd && systemctl status mysql && ss -tlnp
  answer_detail: 공방전에서 방어 팀은 서비스 가용성을 유지해야 점수를 얻는다. 서비스가 중단되면 감점이므로, 방어와 함께 가용성 유지가 핵심 과제이다.
  verify:
    type: output_contains
    expect: active
    field: stdout
  script: systemctl status apache2 && systemctl status sshd && systemctl status vsftpd && systemctl status mysql && ss -tlnp
  risk_level: low
- order: 2
  instruction: 방어 팀의 초기 보안 점검을 수행하라. 기본 패스워드, 불필요한 서비스, 약한 설정을 확인한다.
  hint: 패스워드 정책, SUID, open ports를 확인한다.
  category: defense
  points: 10
  answer: 'cat /etc/shadow | awk -F: ''{print $1, length($2)}'' && find / -perm -4000 -type f 2>/dev/null | wc -l && ss -tlnp | wc -l'
  answer_detail: 초기 보안 점검은 공방전 시작 전 가장 중요한 작업이다. 기본 패스워드 변경, 불필요한 SUID 제거, 불필요한 포트 차단 등 '낮게 매달린 과일'을 먼저 처리한다.
  verify:
    type: output_contains
    expect: root
    field: stdout
  script: 'cat /etc/shadow | awk -F: ''{print $1, length($2)}'' && find / -perm -4000 -type f 2>/dev/null | wc -l && ss -tlnp | wc -l'
  risk_level: low
- order: 3
  instruction: 모든 서비스 계정의 패스워드를 강력한 패스워드로 변경하라.
  hint: openssl rand으로 랜덤 패스워드를 생성한다.
  category: defense
  points: 10
  answer: 'NEW_PASS=$(openssl rand -base64 16) && echo "msfadmin:$NEW_PASS" | sudo chpasswd && echo "New password for msfadmin: $NEW_PASS" > /tmp/forensics/new_passwords.txt && echo ''Passwords changed'''
  answer_detail: 기본 패스워드(admin/admin, msfadmin/msfadmin)는 공격자가 가장 먼저 시도하는 벡터이다. openssl rand -base64 16으로 24자 랜덤 패스워드를 생성하면 브루트포스에 사실상 면역이 된다.
  verify:
    type: output_contains
    expect: Passwords changed
    field: stdout
  script: 'NEW_PASS=$(openssl rand -base64 16) && echo "msfadmin:$NEW_PASS" | sudo chpasswd && echo "New password for msfadmin: $NEW_PASS" > /tmp/forensics/new_passwords.txt && echo ''Passwords changed'''
  risk_level: low
- order: 4
  instruction: 방화벽 초기 룰셋을 배포하라. 필수 서비스만 허용하고 나머지를 차단한다.
  hint: Week 6의 nftables 설정을 참고한다.
  category: defense
  points: 10
  answer: "sudo nft flush ruleset && sudo nft -f - << 'EOF'\ntable inet filter {\n  chain input {\n    type filter hook input priority 0; policy drop;\n    iifname lo accept\n    ct state established,related\
    \ accept\n    tcp dport { 22, 80, 443, 21 } accept\n    icmp type echo-request limit rate 5/second accept\n  }\n  chain forward {\n    type filter hook forward priority 0; policy drop;\n  }\n  chain\
    \ output {\n    type filter hook output priority 0; policy accept;\n  }\n}\nEOF\necho 'Firewall deployed'"
  answer_detail: 공방전 시작 시 즉시 방화벽을 배포해야 한다. 서비스 포트만 허용하고 기본 정책을 drop으로 설정한다. MySQL(3306)은 외부 접근 불필요 시 차단한다.
  verify:
    type: output_contains
    expect: Firewall deployed
    field: stdout
  script: "sudo nft flush ruleset && sudo nft -f - << 'EOF'\ntable inet filter {\n  chain input {\n    type filter hook input priority 0; policy drop;\n    iifname lo accept\n    ct state established,related\
    \ accept\n    tcp dport { 22, 80, 443, 21 } accept\n    icmp type echo-request limit rate 5/second accept\n  }\n  chain forward {\n    type filter hook forward priority 0; policy drop;\n  }\n  chain\
    \ output {\n    type filter hook output priority 0; policy accept;\n  }\n}\nEOF\necho 'Firewall deployed'"
  risk_level: low
- order: 5
  instruction: Suricata IDS를 구동하고 기본 탐지 룰을 활성화하라.
  hint: Week 7의 설정을 참고한다.
  category: defense
  points: 10
  answer: sudo suricata-update && sudo systemctl restart suricata && sudo systemctl status suricata
  answer_detail: suricata-update는 ET Open 등 공개 룰셋을 다운로드하여 업데이트한다. 공방전에서는 커스텀 룰과 공개 룰셋을 병행하여 최대한 넓은 범위의 공격을 탐지해야 한다.
  verify:
    type: output_contains
    expect: active
    field: stdout
  script: sudo suricata-update && sudo systemctl restart suricata && sudo systemctl status suricata
  risk_level: low
- order: 6
  instruction: 공격 팀의 도구 인벤토리를 점검하라. nmap, metasploit, sqlmap, hydra, burp 등이 설치되어 있는지 확인한다.
  hint: which 명령으로 도구 설치 여부를 확인한다.
  category: recon
  points: 10
  answer: 'for tool in nmap msfconsole sqlmap hydra nikto gobuster dirb john hashcat searchsploit; do echo -n "$tool: "; which $tool 2>/dev/null || echo ''NOT FOUND''; done'
  answer_detail: 공격 도구 인벤토리 점검은 공방전 시작 전 필수이다. 도구가 누락되면 apt install로 즉시 설치한다. 각 도구의 최신 버전과 데이터베이스 업데이트도 확인해야 한다.
  verify:
    type: output_contains
    expect: 'nmap:'
    field: stdout
  script: 'for tool in nmap msfconsole sqlmap hydra nikto gobuster dirb john hashcat searchsploit; do echo -n "$tool: "; which $tool 2>/dev/null || echo ''NOT FOUND''; done'
  risk_level: low
- order: 7
  instruction: 공격 팀의 사전 정찰을 수행하라. 방어 팀 네트워크를 스캔하여 초기 공격 표면을 파악한다.
  hint: nmap으로 대상 네트워크를 스캔한다.
  category: recon
  points: 10
  answer: nmap -sV -O -p- -T4 10.20.40.0/24 -oX /tmp/battle_recon.xml
  answer_detail: 공방전 시작 시 전체 네트워크 스캔으로 대상의 전체 공격 표면을 파악한다. -oX로 결과를 XML로 저장하면 Metasploit에서 import하여 체계적으로 관리할 수 있다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  script: nmap -sV -O -p- -T4 10.20.40.0/24 -oX /tmp/battle_recon.xml
  risk_level: low
- order: 8
  instruction: 공격 팀의 공격 계획(Attack Playbook)을 작성하라. 우선순위별 공격 경로를 정의한다.
  hint: 정찰 결과를 바탕으로 공격 순서를 정한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/attack_playbook.txt << ''EOF''

    === Red Team Attack Playbook ===


    Phase 1 (0-15min): Quick Wins

    1. Default credentials check (admin/admin, root/root)

    2. Anonymous FTP login

    3. Known CVE exploits (vsftpd backdoor)


    Phase 2 (15-45min): Web Attacks

    4. SQL Injection on web apps

    5. File upload webshell

    6. Command injection


    Phase 3 (45-75min): Network Attacks

    7. SSH brute force

    8. SMB exploitation

    9. Privilege escalation


    Phase 4 (75-120min): Persistence & Flags

    10. Install backdoors

    11. Capture flags

    12. Maintain access


    Tools Ready:

    - Metasploit Framework

    - sqlmap, Hydra, nmap

    - Custom scripts

    EOF'
  answer_detail: 공격 Playbook은 시간 제한 내 최대 효과를 거두기 위한 전략 문서이다. Quick Win을 먼저 시도하고, 복잡한 공격은 나중에 수행한다. 각 단계의 시간 배분이 핵심이다.
  verify:
    type: file_exists
    expect: /tmp/attack_playbook.txt
    field: filesystem
  script: 'cat > /tmp/attack_playbook.txt << ''EOF''

    === Red Team Attack Playbook ===


    Phase 1 (0-15min): Quick Wins

    1. Default credentials check (admin/admin, root/root)

    2. Anonymous FTP login

