    EOF'
  risk_level: low
- order: 9
  instruction: 방어 팀의 방어 계획(Defense Playbook)을 작성하라. 모니터링, 탐지, 대응 절차를 정의한다.
  hint: 초기 하드닝, 실시간 모니터링, 사고 대응 절차를 포함한다.
  category: analysis
  points: 10
  answer: 'cat > /tmp/defense_playbook.txt << ''EOF''

    === Blue Team Defense Playbook ===


    Phase 1 (Pre-game, 0-10min): Hardening

    1. Change all default passwords

    2. Deploy firewall rules

    3. Start IDS monitoring

    4. Remove unnecessary SUID binaries

    5. Disable unused services


    Phase 2 (Ongoing): Real-time Monitoring

    6. Watch auth.log: tail -f /var/log/auth.log

    7. Watch Suricata: tail -f /var/log/suricata/fast.log

    8. Watch Apache: tail -f /var/log/apache2/access.log

    9. Network monitoring: ss -tunapl (every 5min)


    Phase 3 (On Detection): Incident Response

    10. Block attacker IP immediately

    11. Kill malicious processes

    12. Restore modified files

    13. Reset compromised credentials


    Service Uptime Checks (every 10min):

    - curl http://localhost/ (HTTP)

    - ssh localhost (SSH)

    - mysql -u root -p (MySQL)

    EOF'
  answer_detail: 방어 Playbook은 사전 하드닝, 실시간 모니터링, 사고 대응의 3단계로 구성한다. 서비스 가용성 점검을 주기적으로 수행하여 감점을 방지한다. 팀원 간 역할 분담(모니터링, 하드닝, 대응)이 핵심이다.
  verify:
    type: file_exists
    expect: /tmp/defense_playbook.txt
    field: filesystem
  script: 'cat > /tmp/defense_playbook.txt << ''EOF''

    === Blue Team Defense Playbook ===


    Phase 1 (Pre-game, 0-10min): Hardening

    1. Change all default passwords

    2. Deploy firewall rules

    3. Start IDS monitoring

    4. Remove unnecessary SUID binaries

    5. Disable unused services


    Phase 2 (Ongoing): Real-time Monitoring

    6. Watch auth.log: tail -f /var/log/auth.log

    7. Watch Suricata: tail -f /var/log/suricata/fast.log

    8. Watch Apache: tail -f /var/log/apache2/access.log

    9. Network monitoring: ss -tunapl (every 5min)


    Phase 3 (On Detection): Incident Response

    10. Block attacker IP immediately

