lab_id: battle-ai-week10
title: 공방전 준비 — Red/Blue Phase 환경 구축 및 전략 수립 (AI 지원)
version: ai
course: battle-ai
week: 10
description: 1세트 인프라에서 Red/Blue 역할을 번갈아 수행한다. Week 11-14 실전 공방전을 위해 공격/방어 도구를 점검하고, Playbook을 수립하며, 모니터링
  환경을 구성한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- Red/Blue Phase 전환을 위한 환경을 준비한다
- 공격 Playbook과 방어 Playbook을 수립한다
- 모니터링 대시보드와 자동화 스크립트를 구성한다
prerequisites:
- Week 1-9 전체 과정 이수
infra_requirements:
- attacker VM (10.20.30.201)
- secu VM (10.20.30.1) — nftables, suricata
- web VM (10.20.30.80) — apache, modsecurity, JuiceShop(:3000), DVWA(:8080)
- siem VM (10.20.30.100) — wazuh-manager
pass_threshold: 0.6
steps:
- order: 1
  instruction: '[BLUE] web 서버의 서비스(HTTP, SSH, JuiceShop, DVWA)가 정상 동작하는지 검증하라.'
  hint: systemctl status와 curl로 확인한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] web 서버의 서비스(HTTP, SSH, JuiceShop, DVWA)가 정상 동작하는지 검증해줘\n\U0001F4CE\
    \ 참고 (CLI): curl -so /dev/null \\\n  -w 'Apache:%{http_code} ' http://10.20.30.80/ && curl -so /dev/null\
    \ \\\n  -w 'JuiceShop:%{http_code} ' http://10.20.30.80:3000/ && curl -so /dev/null \\\n  -w 'DVWA:%{http_code}'\
    \ http://10.20.30.80:8080/ && echo ' - All services checked'"
  answer_detail: 공방전 시작 전 모든 서비스의 정상 동작을 확인한다. HTTP 200 응답이 돌아오면 서비스가 정상이다.
  verify:
    type: output_contains
    expect: All services checked
    field: stdout
    semantic:
      intent: '[BLUE] 공방전 전 서비스 가용성 검증 — curl -w Apache:%{http_code} 포트 80 + JuiceShop:%{http_code} 포트
        3000 + DVWA:%{http_code} 포트 8080 3개 서비스 순차 HEAD 체크. 공방전 시작 전 baseline 확인 → 200/302 응답 = 정상, 기타
        = 서비스 장애. All services checked 메시지'
      success_criteria:
      - curl -w 로 HTTP 상태코드 포맷팅 출력
      - Apache/JuiceShop/DVWA 3개 서비스 모두 검증
      - All services checked 메시지
      - HTTP 200/302 정상 응답 개념
      acceptable_methods:
      - curl -so /dev/null -w %{http_code}
      - curl -I HEAD 요청
      - wget --spider
      - nc -zv <IP> <port>
      negative_signs:
      - 1-2개 서비스만 검증
      - 상태코드 확인 없이 curl -s 단순 호출
      - baseline 목적 설명 없음
  target_vm: secu
  script: "curl -so /dev/null \\\n  -w 'Apache:%{http_code} ' http://10.20.30.80/ && curl -so /dev/null\
    \ \\\n  -w 'JuiceShop:%{http_code} ' http://10.20.30.80:3000/ && curl -so /dev/null \\\n  -w 'DVWA:%{http_code}'\
    \ http://10.20.30.80:8080/ && echo ' - All services checked'"
  risk_level: low
  bastion_prompt: '[BLUE] web 서버의 서비스(HTTP, SSH, JuiceShop, DVWA)가 정상 동작하는지 검증해줘'
- order: 2
  instruction: '[BLUE] secu VM에서 방화벽 초기 룰셋을 배포하라.'
  hint: Week 6의 nftables 설정을 참고한다.
  category: defense
  points: 10
  answer: "\U0001F916 프롬프트: [BLUE] secu VM에서 방화벽 초기 룰셋을 배포해줘\n\U0001F4CE 참고 (CLI): sudo nft flush ruleset\
    \ && sudo nft -f - << 'EOF'\ntable inet filter {\n  set blocklist {\n    type ipv4_addr\n  }\n  chain\
    \ input {\n    type filter hook input priority 0; policy drop;\n    iifname lo accept\n    ct state\
    \ established,related accept\n    tcp dport { 22, 80, 3000, 8080 } accept\n    icmp type echo-request\
    \ limit rate 5/second accept\n    ip saddr @blocklist drop\n    log prefix \"[NFT-DROP] \" counter\
    \ drop\n  }\n  chain forward {\n    type filter hook forward priority 0; policy accept;\n  }\n  chain\
    \ output {\n    type filter hook output priority 0; policy accept;\n  }\n}\nEOF\necho 'Firewall deployed\
    \ with blocklist'"
  answer_detail: 화이트리스트 방식 방화벽을 배포하고, IP blocklist set을 미리 생성하여 공방전 중 즉시 IP를 차단할 수 있게 한다.
  verify:
    type: output_contains
    expect: Firewall deployed
    field: stdout
    semantic:
      intent: '[BLUE] 통합 방화벽 룰셋 배포 — nft flush + nft -f - heredoc 로 table inet filter (set blocklist +
        input drop + forward accept + output accept). 화이트리스트(lo/established/dport {22,80,3000,8080}/ICMP
        rate) + blocklist set 미리 생성 → 공방전 중 즉시 nft add element 로 IP 차단 가능. w6 룰의 확장판 (blocklist 통합)'
      success_criteria:
      - nft flush + nft -f heredoc 블록 적용
      - set blocklist + ip saddr @blocklist drop 포함
      - 화이트리스트(lo/established/dport) 복합
      - Firewall deployed 메시지
      acceptable_methods:
      - nft -f - << EOF table inet filter { ... } EOF
      - /etc/nftables.conf + systemctl restart
      - netfilter-persistent save
      - ansible nftables 모듈
      negative_signs:
      - set blocklist 없음 (즉시 차단 불가)
      - 개별 add rule 여러 번 (한번에 EOF 블록 아님)
      - 화이트리스트 불완전
  target_vm: secu
  requires_approval: true
  script: "sudo nft flush ruleset && sudo nft -f - << 'EOF'\ntable inet filter {\n  set blocklist {\n\
    \    type ipv4_addr\n  }\n  chain input {\n    type filter hook input priority 0; policy drop;\n \
    \   iifname lo accept\n    ct state established,related accept\n    tcp dport { 22, 80, 3000, 8080\
    \ } accept\n    icmp type echo-request limit rate 5/second accept\n    ip saddr @blocklist drop\n\
    \    log prefix \"[NFT-DROP] \" counter drop\n  }\n  chain forward {\n    type filter hook forward\
    \ priority 0; policy accept;\n  }\n  chain output {\n    type filter hook output priority 0; policy\
    \ accept;\n  }\n}\nEOF\necho 'Firewall deployed with blocklist'"
  risk_level: low
  bastion_prompt: '[BLUE] secu VM에서 방화벽 초기 룰셋을 배포해줘'
- order: 3
  instruction: '[BLUE] Suricata IDS를 최신 룰로 업데이트하고 재시작하라.'
  hint: suricata-update를 실행한다.
  category: defense
  points: 10
  answer: '🤖 프롬프트: [BLUE] Suricata IDS를 최신 룰로 업데이트하고 재시작해줘

    📎 참고 (CLI): sudo suricata-update 2>&1 | tail -5 && sudo systemctl restart suricata && sudo systemctl
    status suricata | head -5'
  answer_detail: suricata-update는 ET Open 등 공개 룰셋을 다운로드하여 업데이트한다. 공방전 전 최신 룰로 업데이트하면 더 넓은 범위의 공격을 탐지할
    수 있다.
  verify:
    type: output_contains
    expect: active
    field: stdout
    semantic:
      intent: '[BLUE] suricata-update ET Open 룰 갱신 — sudo suricata-update 로 emergingthreats.net ET Open
        룰셋 다운로드 → /var/lib/suricata/rules/suricata.rules 에 저장 → systemctl restart suricata 로 reload →
        status 로 active 확인. 최신 CVE·TTP 커버 가능한 룰셋 배포. 공방전 전 룰셋 최신화 필수'
      success_criteria:
      - suricata-update 실행
      - systemctl restart + status 확인
      - active 키워드 출력
      - ET Open 룰셋 개념 인지
      acceptable_methods:
      - suricata-update + systemctl restart
      - suricatasc -c reload-rules (무중단)
      - pulledpork 룰 관리 (대체)
      - Proofpoint ETOpen 직접 다운로드
      negative_signs:
      - -update 없이 재시작만
      - 재시작 후 active 확인 누락
      - ET Open/룰셋 개념 언급 없음
  target_vm: secu
  script: sudo suricata-update 2>&1 | tail -5 && sudo systemctl restart suricata && sudo systemctl status
    suricata | head -5
  risk_level: low
  bastion_prompt: '[BLUE] Suricata IDS를 최신 룰로 업데이트하고 재시작해줘'
- order: 4
  instruction: '[RED] 공격 도구 인벤토리를 점검하라. nmap, sqlmap, hydra 등이 설치되어 있는지 확인한다.'
  hint: which 명령으로 도구 설치 여부를 확인한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] 공격 도구 인벤토리를 점검하라. nmap, sqlmap, hydra 등이 설치되어 있는지 확인한다해줘

    📎 참고 (CLI): for tool in nmap sqlmap hydra nikto gobuster dirb john hashcat searchsploit curl; do echo
    -n "$tool: "; which $tool 2>/dev/null || echo ''NOT FOUND''; done'
  answer_detail: 공격 도구 인벤토리 점검은 공방전 시작 전 필수이다. 도구가 누락되면 즉시 설치한다.
  verify:
    type: output_contains
    expect: 'nmap:'
    field: stdout
    semantic:
      intent: '[RED] 공격 도구 인벤토리 — for tool in nmap sqlmap hydra nikto gobuster dirb john hashcat searchsploit
        curl; do which $tool; done. 10개 공격 도구(네트워크·SQLi·브루트포스·웹 스캐너·디렉토리·해시·exploit·HTTP) 설치 여부 일괄 확인.
        NOT FOUND 출력되면 apt install 로 보완'
      success_criteria:
      - for 루프로 도구 리스트 순회
      - which 명령으로 설치 확인
      - 'nmap: 키워드 포함 출력'
      - 10개 도구 모두 점검
      acceptable_methods:
      - for tool in ...; do which $tool; done
      - dpkg -l | grep -E (nmap|sqlmap|...)
      - apt list --installed | grep ...
      - command -v <tool>
      negative_signs:
      - 도구 5개 이하만 점검
      - NOT FOUND 처리 누락 (스크립트 실패)
      - 인벤토리 결과 저장 없음
  target_vm: attacker
  script: 'for tool in nmap sqlmap hydra nikto gobuster dirb john hashcat searchsploit curl; do echo -n
    "$tool: "; which $tool 2>/dev/null || echo ''NOT FOUND''; done'
  risk_level: low
  bastion_prompt: '[RED] 공격 도구 인벤토리를 점검하라. nmap, sqlmap, hydra 등이 설치되어 있는지 확인한다해줘'
- order: 5
  instruction: '[RED] web 서버에 사전 정찰을 수행하여 초기 공격 표면을 파악하라.'
  hint: nmap으로 대상을 스캔한다.
  category: recon
  points: 10
  answer: '🤖 프롬프트: [RED] web 서버에 사전 정찰을 수행하여 초기 공격 표면을 파악해줘

    📎 참고 (CLI): nmap -sV -T4 --top-ports 100 --max-retries 1 --host-timeout 15s 10.20.30.80 -oN /tmp/battle_recon.txt
    && tail -20 /tmp/battle_recon.txt'
  answer_detail: 공방전 시작 시 빠른 정찰로 전체 공격 표면을 파악한다. 결과를 파일로 저장하여 참조한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: '[RED] 공방전 사전 정찰 — nmap -sV -T4 --top-ports 100 -oN /tmp/battle_recon.txt 10.20.30.80 로
        웹 서버의 상위 100 포트 버전 탐지 + 파일 저장. tail -20 으로 결과 확인. 공방전 시작 시 빠른 정찰로 공격 표면 파악, 결과를 파일로 저장해 후속 단계(Playbook
        작성)에서 참조'
      success_criteria:
      - nmap -sV --top-ports 100 -oN /tmp/battle_recon.txt
      - open 키워드 출력
      - 결과 파일 저장 + tail 로 확인
      acceptable_methods:
      - nmap -sV --top-ports 100 -oN <file>
      - nmap -oA <basename> (multi-format)
      - masscan --top-ports 100
      - rustscan -a <target>
      negative_signs:
      - 파일 저장 없음 (stdout 만)
      - 서비스 탐지(-sV) 생략
      - 결과 tail/cat 확인 누락
  target_vm: attacker
  script: nmap -sV -T4 --top-ports 100 --max-retries 1 --host-timeout 15s 10.20.30.80 -oN /tmp/battle_recon.txt
    && tail -20 /tmp/battle_recon.txt
  risk_level: low
  bastion_prompt: '[RED] web 서버에 사전 정찰을 수행하여 초기 공격 표면을 파악해줘'
- order: 6
  instruction: '[RED] 공격 Playbook을 작성하라. 우선순위별 공격 경로를 정의한다.'
  hint: 정찰 결과를 바탕으로 공격 순서를 정한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [RED] 공격 Playbook을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/attack_playbook.txt << ''EOF''

    === Red Phase Attack Playbook ===

    Target: 10.20.30.80 (web)

    Defense: 10.20.30.1 (secu - nftables/suricata)


    Phase 1 (0-15min): Quick Wins

    1. JuiceShop SQLi auth bypass (:3000)

    2. DVWA default credentials (:8080)

    3. Service version fingerprinting


    Phase 2 (15-40min): Web Exploitation

    4. DVWA SQL Injection → DB dump

    5. JuiceShop XSS/CSRF challenges

    6. Command Injection attempts


    Phase 3 (40-60min): System Access

    7. SSH brute force (if not blocked)

    8. Privilege escalation attempts

    9. Persistence installation

    EOF

    cat /tmp/attack_playbook.txt'
  answer_detail: 공격 Playbook은 시간 제한 내 최대 효과를 거두기 위한 전략 문서이다. Quick Win을 먼저 시도하고, 복잡한 공격은 나중에 수행한다.
  verify:
    type: output_contains
    expect: Red Phase Attack Playbook
    field: stdout
    semantic:
      intent: '[RED] 공격 Playbook /tmp/attack_playbook.txt — Phase 1 Quick Wins (0-15m: JuiceShop SQLi·DVWA
        기본 자격·버전 탐지) + Phase 2 Web Exploitation (15-40m: DVWA SQLi·XSS·Command Injection) + Phase 3 System
        Access (40-60m: SSH 브루트·권한 상승·지속성). 시간 제한 내 최대 효과 = Quick Win 먼저, 복잡 공격 나중. 구조화된 전략 문서'
      success_criteria:
      - /tmp/attack_playbook.txt 파일 생성
      - Phase 1/2/3 시간대별 구분 (0-15m, 15-40m, 40-60m)
      - Red Phase Attack Playbook 키워드
      - Target + Defense 명시
      acceptable_methods:
      - cat > file << EOF heredoc
      - MITRE ATT&CK Navigator 매핑
      - Atomic Red Team 테스트 계획
      - Cobalt Strike / Sliver 자동화
      negative_signs:
      - Phase 구분 없이 평면 목록
      - 시간 배분 없음
      - defense 고려 없이 공격만
  target_vm: attacker
  script: 'cat > /tmp/attack_playbook.txt << ''EOF''

    === Red Phase Attack Playbook ===

    Target: 10.20.30.80 (web)

    Defense: 10.20.30.1 (secu - nftables/suricata)


    Phase 1 (0-15min): Quick Wins

    1. JuiceShop SQLi auth bypass (:3000)

    2. DVWA default credentials (:8080)

    3. Service version fingerprinting


    Phase 2 (15-40min): Web Exploitation

    4. DVWA SQL Injection → DB dump

    5. JuiceShop XSS/CSRF challenges

    6. Command Injection attempts


    Phase 3 (40-60min): System Access

    7. SSH brute force (if not blocked)

    8. Privilege escalation attempts

    9. Persistence installation

    EOF

    cat /tmp/attack_playbook.txt'
  risk_level: low
  bastion_prompt: '[RED] 공격 Playbook을 작성하라. 우선순위별 공격 경로를 정의한다.'
- order: 7
  instruction: '[BLUE] 방어 Playbook을 작성하라. 모니터링, 탐지, 대응 절차를 정의한다.'
  hint: 초기 하드닝, 실시간 모니터링, 사고 대응 절차를 포함한다.
  category: analysis
  points: 10
  answer: '🤖 프롬프트: [BLUE] 방어 Playbook을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat > /tmp/defense_playbook.txt << ''EOF''

    === Blue Phase Defense Playbook ===

    Defense: secu(10.20.30.1), siem(10.20.30.100)

    Protect: web(10.20.30.80)


    Phase 1 (Pre-game): Hardening

    1. Deploy nftables firewall

    2. Update Suricata rules

    3. Verify ModSecurity on web

    4. Check service status


    Phase 2 (Ongoing): Monitoring

    5. Suricata fast.log: tail -f /var/log/suricata/fast.log

    6. auth.log: monitor SSH failures

    7. Apache access.log: watch for SQLi/XSS

    8. Wazuh dashboard: high-severity alerts


    Phase 3 (On Detection): Response

    9. Block attacker: nft add element inet filter blocklist { IP }

    10. Kill malicious processes

    11. Restore modified files

    12. Document all actions

    EOF

    cat /tmp/defense_playbook.txt'
  answer_detail: 방어 Playbook은 사전 하드닝, 실시간 모니터링, 사고 대응의 3단계로 구성한다. 탐지에서 대응까지의 시간을 최소화하는 것이 핵심이다.
  verify:
    type: output_contains
    expect: Blue Phase Defense Playbook
    field: stdout
    semantic:
      intent: '[BLUE] 방어 Playbook /tmp/defense_playbook.txt — Phase 1 Pre-game Hardening (방화벽 배포·Suricata
        룰·ModSec·서비스 검증) + Phase 2 Ongoing Monitoring (fast.log·auth·access·Wazuh dashboard) + Phase 3
        On Detection Response (blocklist·프로세스 kill·파일 복원·문서화). 탐지-대응 MTTR 최소화가 목표. 공격 Playbook 과 대칭 구조'
      success_criteria:
      - /tmp/defense_playbook.txt 파일 생성
      - Pre-game/Monitoring/Response 3단계
      - Blue Phase Defense Playbook 키워드
      - nftables·Suricata·Wazuh·ModSec 방어 레이어 언급
      acceptable_methods:
      - cat > file << EOF heredoc
      - SOAR 플레이북 (Shuffle/TheHive)
      - NIST SP 800-61 IR 단계 매핑
      - MITRE D3FEND 방어 기법 매핑
      negative_signs:
      - 3단계 구분 없음
      - Red Playbook 대비 대칭성 없음
      - MTTR 개념 언급 없음
  target_vm: secu
  script: 'cat > /tmp/defense_playbook.txt << ''EOF''

    === Blue Phase Defense Playbook ===

