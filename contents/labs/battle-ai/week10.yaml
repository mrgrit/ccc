    \ << 'SCRIPT'\n#!/bin/bash\nFILES=\"/etc/passwd /etc/shadow /etc/crontab /etc/ssh/sshd_config\"\n\
    BASELINE=/tmp/integrity_baseline.txt\nif [ ! -f $BASELINE ]; then\n  for f in $FILES; do md5sum $f\
    \ 2>/dev/null; done > $BASELINE\n  echo \"Baseline created\"\nelse\n  for f in $FILES; do md5sum $f\
    \ 2>/dev/null; done > /tmp/integrity_current.txt\n  diff $BASELINE /tmp/integrity_current.txt && echo\
    \ \"No changes\" || echo \"ALERT: File integrity violation!\"\nfi\nSCRIPT\nchmod +x /tmp/integrity_monitor.sh\
    \ && bash /tmp/integrity_monitor.sh"
  answer_detail: 파일 무결성 모니터링(FIM)은 공격자의 설정 변경을 즉시 탐지한다. 최초 해시를 베이스라인으로 저장하고, 주기적으로 비교한다.
