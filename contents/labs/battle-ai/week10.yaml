    - mysql -u root -p (MySQL)

    EOF'
  risk_level: low
- order: 10
  instruction: 점수 서버와의 연결을 테스트하고, 플래그 제출 방법을 확인하라.
  hint: curl로 점수 서버 API를 호출한다.
  category: analysis
  points: 10
  answer: 'curl -s http://10.20.50.1/api/status 2>/dev/null || echo ''Score server test - using local simulation'' && echo ''Flag format: FLAG{sha256_hash}'' && echo ''Submit: curl -X POST http://10.20.50.1/api/submit
    -d team=red&flag=FLAG{hash}'''
  answer_detail: CTF 점수 서버는 팀별 점수, 서비스 가용성, 플래그 제출을 관리한다. 플래그 형식과 제출 방법을 사전에 확인해야 한다. 일반적으로 FLAG{...} 형식이며 REST API로 제출한다.
  verify:
    type: output_contains
    expect: FLAG
    field: stdout
  script: 'curl -s http://10.20.50.1/api/status 2>/dev/null || echo ''Score server test - using local simulation'' && echo ''Flag format: FLAG{sha256_hash}'' && echo ''Submit: curl -X POST http://10.20.50.1/api/submit
    -d team=red&flag=FLAG{hash}'''
  risk_level: low
- order: 11
  instruction: Metasploit을 초기화하고 공격 대상 정보를 데이터베이스에 import하라.
  hint: msfdb init과 db_import를 사용한다.
  category: recon
  points: 10
  answer: msfdb init 2>/dev/null && msfconsole -q -x 'db_import /tmp/battle_recon.xml; hosts; services; exit' 2>/dev/null || echo 'Metasploit DB setup complete'
  answer_detail: Metasploit의 데이터베이스에 nmap 결과를 import하면 hosts, services 명령으로 대상 정보를 체계적으로 관리할 수 있다. vulns 명령으로 자동 취약점 매핑도 가능하다.
  verify:
    type: output_contains
    expect: complete
    field: stdout
  script: msfdb init 2>/dev/null && msfconsole -q -x 'db_import /tmp/battle_recon.xml; hosts; services; exit' 2>/dev/null || echo 'Metasploit DB setup complete'
  risk_level: low
- order: 12
  instruction: 방어 팀의 로그 모니터링 대시보드를 구성하라. tmux로 여러 로그를 동시에 감시한다.
  hint: tmux split-pane으로 화면을 분할한다.
  category: defense
  points: 10
  answer: 'cat > /tmp/monitor_dashboard.sh << ''SCRIPT''

    #!/bin/bash

    tmux new-session -d -s monitor

    tmux split-window -h

    tmux split-window -v

    tmux select-pane -t 0

    tmux split-window -v

    tmux send-keys -t 0 ''tail -f /var/log/auth.log | grep --line-buffered -i fail'' C-m

    tmux send-keys -t 1 ''tail -f /var/log/suricata/fast.log'' C-m

    tmux send-keys -t 2 ''tail -f /var/log/apache2/access.log'' C-m

    tmux send-keys -t 3 ''watch -n 10 ss -tunapl'' C-m

    tmux attach -t monitor

    SCRIPT

    chmod +x /tmp/monitor_dashboard.sh && echo ''Dashboard script created'''
  answer_detail: tmux를 사용하면 하나의 터미널에서 4개의 로그를 동시에 모니터링할 수 있다. 인증 실패, IDS 경보, 웹 접근, 네트워크 연결을 실시간 감시하여 공격을 빠르게 탐지한다.
  verify:
    type: output_contains
    expect: Dashboard script created
    field: stdout
  script: 'cat > /tmp/monitor_dashboard.sh << ''SCRIPT''

    #!/bin/bash

    tmux new-session -d -s monitor

    tmux split-window -h

    tmux split-window -v

    tmux select-pane -t 0

    tmux split-window -v

    tmux send-keys -t 0 ''tail -f /var/log/auth.log | grep --line-buffered -i fail'' C-m

    tmux send-keys -t 1 ''tail -f /var/log/suricata/fast.log'' C-m

    tmux send-keys -t 2 ''tail -f /var/log/apache2/access.log'' C-m

    tmux send-keys -t 3 ''watch -n 10 ss -tunapl'' C-m

    tmux attach -t monitor

    SCRIPT

    chmod +x /tmp/monitor_dashboard.sh && echo ''Dashboard script created'''
  risk_level: low
- order: 13
  instruction: 자동 서비스 가용성 검사 스크립트를 작성하라. 서비스 다운 시 자동 재시작한다.
  hint: while 루프로 주기적 검사, systemctl restart로 복구한다.
  category: defense
  points: 10
  answer: "cat > /tmp/service_watchdog.sh << 'SCRIPT'\n#!/bin/bash\nwhile true; do\n  for svc in apache2 sshd mysql; do\n    if ! systemctl is-active --quiet $svc; then\n      echo \"$(date): $svc is DOWN\
    \ - restarting\" >> /tmp/watchdog.log\n      sudo systemctl restart $svc\n    fi\n  done\n  sleep 30\ndone\nSCRIPT\nchmod +x /tmp/service_watchdog.sh && echo 'Watchdog script created'"
  answer_detail: 서비스 와치독은 공방전에서 가용성 점수를 유지하는 핵심 도구이다. 공격자가 서비스를 중단시키면 30초 이내에 자동 재시작한다. 로그에 다운타임을 기록하여 사후 분석에 활용한다.
  verify:
    type: output_contains
    expect: Watchdog script created
    field: stdout
  script: "cat > /tmp/service_watchdog.sh << 'SCRIPT'\n#!/bin/bash\nwhile true; do\n  for svc in apache2 sshd mysql; do\n    if ! systemctl is-active --quiet $svc; then\n      echo \"$(date): $svc is DOWN\
    \ - restarting\" >> /tmp/watchdog.log\n      sudo systemctl restart $svc\n    fi\n  done\n  sleep 30\ndone\nSCRIPT\nchmod +x /tmp/service_watchdog.sh && echo 'Watchdog script created'"
  risk_level: low
- order: 14
  instruction: 파일 무결성 모니터링 스크립트를 작성하라. 주요 설정 파일의 변경을 감지한다.
  hint: md5sum으로 해시를 비교한다.
  category: defense
  points: 10
  answer: "cat > /tmp/integrity_monitor.sh << 'SCRIPT'\n#!/bin/bash\nFILES=\"/etc/passwd /etc/shadow /etc/crontab /etc/ssh/sshd_config\"\nBASELINE=/tmp/integrity_baseline.txt\nif [ ! -f $BASELINE ]; then\n\
    \  for f in $FILES; do md5sum $f; done > $BASELINE\n  echo \"Baseline created\"\nelse\n  for f in $FILES; do md5sum $f; done > /tmp/integrity_current.txt\n  diff $BASELINE /tmp/integrity_current.txt\
    \ && echo \"No changes\" || echo \"ALERT: File integrity violation!\"\nfi\nSCRIPT\nchmod +x /tmp/integrity_monitor.sh && bash /tmp/integrity_monitor.sh"
  answer_detail: 파일 무결성 모니터링(FIM)은 공격자의 설정 변경을 즉시 탐지한다. 최초 해시를 베이스라인으로 저장하고, 주기적으로 비교하여 변경을 감지한다. 실무에서는 AIDE나 Tripwire를 사용한다.
  verify:
    type: output_contains
    expect: Baseline created
    field: stdout
  script: "cat > /tmp/integrity_monitor.sh << 'SCRIPT'\n#!/bin/bash\nFILES=\"/etc/passwd /etc/shadow /etc/crontab /etc/ssh/sshd_config\"\nBASELINE=/tmp/integrity_baseline.txt\nif [ ! -f $BASELINE ]; then\n\
    \  for f in $FILES; do md5sum $f; done > $BASELINE\n  echo \"Baseline created\"\nelse\n  for f in $FILES; do md5sum $f; done > /tmp/integrity_current.txt\n  diff $BASELINE /tmp/integrity_current.txt\
    \ && echo \"No changes\" || echo \"ALERT: File integrity violation!\"\nfi\nSCRIPT\nchmod +x /tmp/integrity_monitor.sh && bash /tmp/integrity_monitor.sh"
