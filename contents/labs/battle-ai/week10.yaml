lab_id: "battle-ai-week10"
title: "AI 인프라 강화 — 자동 하드닝"
version: "ai"
course: "battle-ai"
week: 10
description: "AI 에이전트가 시스템 패칭, 불필요 포트 차단, 설정 강화를 자동으로 수행한다."
difficulty: "hard"
duration_minutes: 90
objectives:
  - "AI가 시스템 패치 상태를 자동 확인하고 업데이트한다"
  - "AI가 불필요한 서비스와 포트를 자동 차단한다"
  - "AI가 SSH 하드닝을 자동 적용한다"
  - "AI가 하드닝 결과를 CIS 벤치마크와 비교 검증한다"
prerequisites:
  - "Week 09 AI 인시던트 대응 완료"
  - "리눅스 시스템 관리 기초"
infra_requirements:
  - "attacker VM with bastion"
  - "defender VM"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "AI가 시스템 패치 상태를 확인하고 보안 업데이트를 적용한다"
    script: |
      echo "=== 시스템 패치 상태 확인 ==="
      echo "[OS 정보]"
      cat /etc/os-release | head -5
      echo ""
      echo "[패키지 업데이트 확인]"
      apt list --upgradable 2>/dev/null | head -20 || yum check-update 2>/dev/null | head -20 || echo "패키지 매니저 확인 불가"
      echo ""
      echo "[보안 업데이트 목록]"
      apt list --upgradable 2>/dev/null | grep -i "security" | head -10 || echo "보안 업데이트 별도 분류 없음"
      echo ""
      echo "[커널 버전]"
      uname -r
      echo ""
      echo "패치 상태 확인 완료"
    category: "defense"
    risk_level: "medium"
    points: 15
    verify:
      type: "output_contains"
      expect: "패치 상태 확인 완료"
      field: "stdout"

  - order: 2
    instruction: "AI가 불필요한 서비스를 탐지하고 비활성화한다"
    script: |
      echo "=== 불필요 서비스 탐지 ==="
      echo "[실행 중인 서비스 목록]"
      systemctl list-units --type=service --state=running 2>/dev/null | head -25
      echo ""
      echo "[리스닝 포트 확인]"
      ss -tlnp | head -20
      echo ""
      echo "=== 불필요 서비스 비활성화 시뮬레이션 ==="
      UNNECESSARY_SERVICES="cups avahi-daemon bluetooth"
      for svc in $UNNECESSARY_SERVICES; do
        if systemctl is-active "$svc" 2>/dev/null | grep -q "active"; then
          echo "  [활성] $svc — 비활성화 대상"
        else
          echo "  [비활성] $svc — 조치 불필요"
        fi
      done
      echo ""
      echo "불필요 서비스 점검 완료"
    category: "defense"
    risk_level: "medium"
    points: 15
    verify:
      type: "output_contains"
      expect: "불필요 서비스 점검 완료"
      field: "stdout"

  - order: 3
    instruction: "AI가 SSH 서버 보안 설정을 자동으로 강화한다"
    script: |
      echo "=== SSH 하드닝 ==="
      SSHD_CONF="/etc/ssh/sshd_config"
      BACKUP="/tmp/sshd_config.bak.$(date +%s)"
      cp "$SSHD_CONF" "$BACKUP" 2>/dev/null
      echo "백업: $BACKUP"
      echo ""

      echo "[현재 SSH 설정 점검]"
      echo "  PermitRootLogin: $(grep -i 'PermitRootLogin' $SSHD_CONF 2>/dev/null | head -1 || echo '미설정')"
      echo "  PasswordAuthentication: $(grep -i 'PasswordAuthentication' $SSHD_CONF 2>/dev/null | head -1 || echo '미설정')"
      echo "  MaxAuthTries: $(grep -i 'MaxAuthTries' $SSHD_CONF 2>/dev/null | head -1 || echo '미설정')"
      echo "  Protocol: $(grep -i 'Protocol' $SSHD_CONF 2>/dev/null | head -1 || echo '미설정')"
      echo "  X11Forwarding: $(grep -i 'X11Forwarding' $SSHD_CONF 2>/dev/null | head -1 || echo '미설정')"
      echo ""

      echo "[권장 설정 적용 — 시뮬레이션]"
      echo "  PermitRootLogin no"
      echo "  MaxAuthTries 3"
      echo "  X11Forwarding no"
      echo "  AllowTcpForwarding no"
      echo "  ClientAliveInterval 300"
      echo "  ClientAliveCountMax 2"
      echo ""
      echo "SSH 하드닝 점검 완료"
    category: "defense"
    risk_level: "medium"
    points: 20
    verify:
      type: "output_contains"
      expect: "SSH 하드닝 점검 완료"
      field: "stdout"

  - order: 4
    instruction: "AI가 파일 시스템 보안 설정을 점검하고 강화한다"
    script: |
      echo "=== 파일 시스템 보안 점검 ==="
      echo "[World-writable 디렉토리]"
      find / -xdev -type d -perm -0002 2>/dev/null | grep -v "/proc\|/sys\|/dev\|/tmp\|/var/tmp" | head -10 || echo "  없음"
      echo ""
      echo "[소유자 없는 파일]"
      find / -xdev -nouser -o -nogroup 2>/dev/null | head -10 || echo "  없음"
      echo ""
      echo "[/tmp 권한 확인]"
      ls -ld /tmp
      stat /tmp | grep "Access"
      echo ""
      echo "[중요 파일 권한 확인]"
      ls -l /etc/passwd /etc/shadow /etc/group /etc/gshadow 2>/dev/null
      echo ""
      echo "파일 시스템 보안 점검 완료"
    category: "defense"
    risk_level: "low"
    points: 15
    verify:
      type: "output_contains"
      expect: "파일 시스템 보안 점검 완료"
      field: "stdout"

  - order: 5
    instruction: "AI가 하드닝 결과를 종합하여 보안 점수를 산출한다"
    script: |
      echo "=== AI 인프라 하드닝 종합 보고서 ===" > /tmp/hardening_report.txt
      echo "대상: $(hostname)" >> /tmp/hardening_report.txt
      echo "시간: $(date)" >> /tmp/hardening_report.txt
      echo "" >> /tmp/hardening_report.txt
      SCORE=0
      TOTAL=100

      echo "[1. 패치 관리] (20점)" >> /tmp/hardening_report.txt
      UPGRADABLE=$(apt list --upgradable 2>/dev/null | grep -v "Listing" | wc -l)
      if [ "$UPGRADABLE" -lt 5 ]; then SCORE=$((SCORE+20)); echo "  점수: 20/20 (미적용 패치: ${UPGRADABLE}개)" >> /tmp/hardening_report.txt
      else SCORE=$((SCORE+10)); echo "  점수: 10/20 (미적용 패치: ${UPGRADABLE}개)" >> /tmp/hardening_report.txt; fi

      echo "[2. 서비스 관리] (20점)" >> /tmp/hardening_report.txt
      SCORE=$((SCORE+15)); echo "  점수: 15/20" >> /tmp/hardening_report.txt

      echo "[3. SSH 보안] (20점)" >> /tmp/hardening_report.txt
      ROOT_LOGIN=$(grep -c "PermitRootLogin no" /etc/ssh/sshd_config 2>/dev/null)
      if [ "$ROOT_LOGIN" -gt 0 ]; then SCORE=$((SCORE+20)); echo "  점수: 20/20" >> /tmp/hardening_report.txt
      else SCORE=$((SCORE+10)); echo "  점수: 10/20 (root 로그인 허용됨)" >> /tmp/hardening_report.txt; fi

      echo "[4. 파일 시스템] (20점)" >> /tmp/hardening_report.txt
      SCORE=$((SCORE+15)); echo "  점수: 15/20" >> /tmp/hardening_report.txt

      echo "[5. 방화벽] (20점)" >> /tmp/hardening_report.txt
      NFT_RULES=$(nft list ruleset 2>/dev/null | wc -l)
      if [ "$NFT_RULES" -gt 5 ]; then SCORE=$((SCORE+20)); echo "  점수: 20/20" >> /tmp/hardening_report.txt
      else SCORE=$((SCORE+5)); echo "  점수: 5/20 (규칙 부족)" >> /tmp/hardening_report.txt; fi

      echo "" >> /tmp/hardening_report.txt
      echo "============================" >> /tmp/hardening_report.txt
      echo "  총 보안 점수: ${SCORE}/${TOTAL}" >> /tmp/hardening_report.txt
      echo "============================" >> /tmp/hardening_report.txt
      cat /tmp/hardening_report.txt
    category: "analysis"
    risk_level: "low"
    points: 20
    verify:
      type: "output_contains"
      expect: "총 보안 점수"
      field: "stdout"
