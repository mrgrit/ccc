    Phase 2 (15-45min): Web Attacks

    4. SQL Injection on web apps

    5. File upload webshell

    6. Command injection


    Phase 3 (45-75min): Network Attacks

    7. SSH brute force

    8. SMB exploitation

    9. Privilege escalation


    Phase 4 (75-120min): Persistence & Flags

    10. Install backdoors

    11. Capture flags

    12. Maintain access


    Tools Ready:

    - Metasploit Framework

    - sqlmap, Hydra, nmap

