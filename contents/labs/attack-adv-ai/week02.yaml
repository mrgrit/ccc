    instruction: "자동 배너 그래빙 스크립트를 작성하라. 여러 포트의 서비스 배너를 수집하라."
    hint: "socket으로 연결 후 초기 응답을 수집한다"
    category: "recon"
    points: 10
    answer: "python3 배너 그래빙 스크립트"
    answer_detail: "배너 그래빙은 서비스 종류와 버전을 식별하는 기본 정찰 기법이다."
    verify:
      type: "output_contains"
      expect: "banner_grab"
      field: "stdout"
    script: |
      import socket
      
      targets = [('10.20.30.80', 22), ('10.20.30.80', 3000), ('10.20.30.1', 22)]
      print('banner_grab results:')
      for ip, port in targets:
          try:
              s = socket.socket()
              s.settimeout(3)
              s.connect((ip, port))
              if port == 22:
                  banner = s.recv(1024).decode().strip()
              else:
                  s.send(b'HEAD / HTTP/1.0\r\n\r\n')
                  banner = s.recv(1024).decode().split('\n')[0]
              print(f'  {ip}:{port} -> {banner[:60]}')
              s.close()
          except Exception as e:
              print(f'  {ip}:{port} -> {e}')
