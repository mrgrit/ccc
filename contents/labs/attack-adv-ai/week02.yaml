lab_id: "attack-adv-ai-week02"
title: "AI 기반 OSINT 자동화"
version: "ai"
course: "attack-adv-ai"
week: 2
description: "AI 도구를 활용하여 OSINT 수집을 자동화한다. DNS 열거, 웹 핑거프린팅, 메타데이터 추출, 이메일 수집 등을 Python 스크립트로 구현한다."
difficulty: "hard"
duration_minutes: 120
objectives:
  - "자동 DNS 열거 스크립트를 개발한다"
  - "웹 기술 핑거프린팅을 자동화한다"
  - "OSINT 결과를 구조화된 보고서로 생성한다"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "Python으로 DNS 역방향 조회를 자동화하라. 10.20.30.0/24 대역의 PTR 레코드를 수집하라."
    hint: "subprocess로 dig -x를 실행하고 결과를 파싱한다"
    category: "recon"
    points: 10
    answer: "python3 DNS 역방향 조회 스크립트"
    answer_detail: "DNS 역방향 스위핑 자동화로 네트워크 맵을 빠르게 작성할 수 있다."
    verify:
      type: "output_contains"
      expect: "dns_sweep"
      field: "stdout"
    script: |
      import subprocess
      
      print('dns_sweep results:')
      for i in range(1, 255):
          ip = f'10.20.30.{i}'
          try:
              r = subprocess.run(['dig', '-x', ip, '+short'], capture_output=True, text=True, timeout=3)
              if r.stdout.strip():
                  print(f'  {ip} -> {r.stdout.strip()}')
          except: pass
  - order: 2
    instruction: "SSL/TLS 인증서 정보를 자동 수집하는 스크립트를 작성하라."
    hint: "ssl 모듈로 인증서를 가져와 분석한다"
    category: "recon"
    points: 10
    answer: "python3 SSL 인증서 분석 스크립트"
    answer_detail: "인증서에서 조직명, SAN, 유효기간 등 정찰에 유용한 정보를 추출한다."
    verify:
      type: "output_contains"
      expect: "cert_info"
      field: "stdout"
    script: |
      import ssl, socket, json
      
      print('cert_info:')
      try:
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          with ctx.wrap_socket(socket.socket(), server_hostname='10.20.30.80') as s:
              s.settimeout(5)
              s.connect(('10.20.30.80', 443))
              cert = s.getpeercert(binary_form=False) or {}
              print(f'  Subject: {cert.get("subject", "N/A")}')
      except Exception as e:
          print(f'  No SSL cert or error: {e}')
  - order: 3
    instruction: "HTTP 헤더에서 기술 스택을 자동 핑거프린팅하는 스크립트를 작성하라."
    hint: "응답 헤더와 HTML 패턴으로 프레임워크를 식별한다"
