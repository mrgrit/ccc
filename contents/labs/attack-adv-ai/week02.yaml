    answer_detail: "자동 핑거프린팅은 대규모 웹 자산의 기술 스택을 빠르게 파악한다."
    verify:
      type: "output_contains"
      expect: "fingerprint"
      field: "stdout"
    script: |
      import requests, re
      
      url = 'http://10.20.30.80:3000'
      try:
          r = requests.get(url, timeout=5)
          print('fingerprint results:')
          print(f'  Server: {r.headers.get("Server", "hidden")}')
          print(f'  X-Powered-By: {r.headers.get("X-Powered-By", "hidden")}')
          scripts = re.findall(r'<script[^>]+src="([^"]+)"', r.text)
          for s in scripts[:5]:
              print(f'  JS: {s}')
      except Exception as e:
          print(f'  Error: {e}')
