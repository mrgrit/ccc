    verify:
      type: "output_contains"
      expect: "attack_surface"
      field: "stdout"
    script: |
      RISK_SCORES = {22: 3, 80: 5, 443: 4, 3000: 7, 8080: 6, 9200: 8}
      services = [(22,'ssh'), (80,'http'), (3000,'juiceshop'), (9200,'elasticsearch')]
      
      print('attack_surface analysis:')
      total = 0
      for port, svc in services:
          score = RISK_SCORES.get(port, 5)
          total += score
          level = 'HIGH' if score >= 7 else 'MEDIUM' if score >= 4 else 'LOW'
          print(f'  :{port} ({svc}): risk={score}/10 [{level}]')
      print(f'  Total risk score: {total}')
