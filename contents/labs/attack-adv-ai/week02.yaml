lab_id: attack-adv-ai-week02
title: OSINT 고급 정보수집 (AI 지원)
version: ai
course: attack-adv-ai
week: 2
description: 고급 OSINT(Open Source Intelligence) 기법을 활용하여 대상 조직과 인프라의 심층 정보를 수집한다.
  DNS 열거, 인증서 투명성 로그, 메타데이터 분석 등 다양한 수동 정찰 기법을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- DNS 열거, 서브도메인 브루트포스 등 고급 정찰 기법을 적용한다
- 인증서 투명성 로그와 WHOIS 이력을 활용한 인프라 매핑을 수행한다
- 문서 메타데이터에서 민감 정보를 추출한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: dig를 사용하여 {{SECU_IP}} DNS 서버에 대해 AXFR(존 전송) 요청을 시도하라. 도메인은 lab.local로
    설정하라.
  hint: dig axfr @서버 도메인 형태로 존 전송을 요청한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: dig를 사용하여 10.20.30.1 DNS 서버에 대해 AXFR(존 전송) 요청을 시도해줘

    📎 참고 (CLI): dig axfr @10.20.30.1 lab.local'
  answer_detail: DNS 존 전송(AXFR)은 DNS 서버의 전체 레코드를 한 번에 가져오는 기법이다. 잘못 구성된 DNS 서버는 인증
    없이 존 전송을 허용하여 내부 호스트명, IP 매핑이 모두 노출된다. MITRE ATT&CK T1596.001에 해당하며, 대부분의 현대 DNS
    서버는 이를 차단한다.
  verify:
    type: output_contains
    expect: XFR
    field: stdout
    semantic:
      intent: DNS 존 전송(AXFR) 미구성 서버 탐지 — dig axfr @server <domain> 로 전체 존 파일 노출 시도
        (MITRE T1596.001)
      success_criteria:
      - dig axfr @<dns_server> <domain> 실행과 응답 코드/결과 제시
      - Transfer failed/XFR refused/존 레코드 나열 중 하나의 결과 해석
      - AXFR 허용 시 내부 호스트명·IP 매핑이 모두 노출된다는 원리 언급
      acceptable_methods:
      - dig axfr @<server> <domain>
      - host -T -l <domain> <server>
      - nmap --script dns-zone-transfer --script-args dns-zone-transfer.domain=<d>
        <server>
      - dnsrecon -d <domain> -t axfr
      negative_signs:
      - AXFR 아닌 일반 A 레코드 조회만
      - 존 전송 개념 설명 없이 단순 dig 출력
      - 대상 DNS 서버·도메인 누락
  target_vm: attacker
  script: dig axfr @10.20.30.1 lab.local
  risk_level: low
  bastion_prompt: 'dig를 사용하여 10.20.30.1 DNS 서버에 대해 AXFR(존 전송) 요청을 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: dig를 사용하여 10.20.30.0/24 대역의 PTR 레코드를 역방향 조회하라. for 루프를 사용하여 1~254까지
    순회하라.
  hint: for i in $(seq 1 254); do dig -x 10.20.30.$i +short; done 형태로 순회한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: dig를 사용하여 10.20.30.0/24 대역의 PTR 레코드를 역방향 조회하라. for 루프를 사용하여 1~254까지
    순회해줘

    📎 참고 (CLI): for i in $(seq 1 254); do result=$(dig -x 10.20.30.$i +short 2>/dev/null);
    [ -n "$result" ] && echo "10.20.30.$i -> $result"; done'
  answer_detail: '역방향 DNS 스위핑은 IP 대역 전체에 대해 PTR 레코드를 조회하여 호스트명을 수집하는 기법이다. 내부 명명 규칙(예:
    db-prod-01, web-staging)이 노출되어 서버 역할과 환경을 추정할 수 있다. 이는 네트워크 맵 작성의 핵심 정보원이다.'
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: 역방향 DNS 스위핑 — /24 대역 전체에 PTR 레코드 조회해 호스트명·역할 추정 (내부 명명 규칙 수집)
      success_criteria:
      - for 루프 또는 스크립트로 1~254 순회해 dig -x 수행
      - PTR 응답이 있는 IP 만 필터링해 <IP> -> <hostname> 형태 출력
      - 역방향 조회 결과가 네트워크 맵 작성에 기여하는 맥락 설명
      acceptable_methods:
      - for i in $(seq 1 254); do dig -x 10.20.30.$i +short; done
      - nmap -sL 10.20.30.0/24 로 일괄 역방향 조회
      - fierce -dns <domain> --subdomains 로 보완
      - python dnspython 으로 병렬 역방향 조회
      negative_signs:
      - 단일 IP 만 조회
      - 조회 결과 필터링 없이 raw 응답만 출력
      - 응답 없는 IP 만 나열돼 의미 해석 없음
  target_vm: attacker
  script: for i in $(seq 1 254); do result=$(dig -x 10.20.30.$i +short 2>/dev/null);
    [ -n "$result" ] && echo "10.20.30.$i -> $result"; done
  risk_level: low
  bastion_prompt: 'dig를 사용하여 10.20.30.0/24 대역의 PTR 레코드를 역방향 조회하라. for 루프를 사용하여 1~254까지
    순회해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: nmap을 사용하여 {{WEB_IP}}의 SSL/TLS 인증서 정보를 수집하라. 포트 443을 대상으로 ssl-cert
    스크립트를 실행하라.
  hint: nmap --script ssl-cert -p 443 대상 형태로 인증서를 수집한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap을 사용하여 10.20.30.80의 SSL/TLS 인증서 정보를 수집해줘

    📎 참고 (CLI): nmap --script ssl-cert -p 443 10.20.30.80'
  answer_detail: SSL/TLS 인증서에는 조직명, 도메인, 발급자, 유효기간 등 풍부한 정보가 포함된다. 인증서의 SAN(Subject
    Alternative Name) 필드에서 추가 서브도메인을 발견할 수 있다. Certificate Transparency 로그를 검색하면 과거
    발급된 모든 인증서를 확인할 수 있다.
  verify:
    type: output_contains
    expect: ssl-cert
    field: stdout
    semantic:
      intent: nmap ssl-cert NSE 로 TLS 인증서 상세(Subject/Issuer/SAN/유효기간) 수집 — CT 로그/추가
        서브도메인 탐색 시작점
      success_criteria:
      - nmap --script ssl-cert -p 443 실행과 인증서 필드(Subject/SAN/notBefore-notAfter) 출력
      - SAN(Subject Alternative Name) 값 또는 조직명 CN 해석
      - Certificate Transparency(crt.sh 등) 로그 연계 조회 가능성 언급
      acceptable_methods:
      - nmap --script ssl-cert -p 443 <target>
      - openssl s_client -connect <host>:443 -showcerts
      - curl -vI https://<host> 에서 TLS 핸드셰이크 확인
      - crt.sh (https://crt.sh/?q=<domain>) 로 CT 로그 조회
      negative_signs:
      - SSL 관련 스크립트 아닌 일반 포트 스캔만
      - 인증서 필드 해석 없이 handshake 오류만
      - 443 외 포트 사용 (TLS 미구성 포트)
  target_vm: attacker
  script: nmap --script ssl-cert -p 443 10.20.30.80
  risk_level: low
  bastion_prompt: 'nmap을 사용하여 10.20.30.80의 SSL/TLS 인증서 정보를 수집해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: curl을 사용하여 {{WEB_IP}}:3000 웹서버의 다양한 HTTP 헤더를 분석하라. 보안 헤더(X-Frame-Options,
    CSP, HSTS 등)의 존재 여부를 확인하라.
  hint: curl -I 또는 curl -v로 응답 헤더를 확인한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: curl을 사용하여 10.20.30.80:3000 웹서버의 다양한 HTTP 헤더를 분석해줘

    📎 참고 (CLI): curl -sI http://10.20.30.80:3000 | grep -iE ''(x-frame|content-security|strict-transport|x-content-type|x-xss|server|x-powered)'''
  answer_detail: HTTP 보안 헤더의 부재는 공격 표면을 나타낸다. X-Frame-Options 미설정은 클릭재킹, CSP 미설정은
    XSS, HSTS 미설정은 다운그레이드 공격의 가능성을 의미한다. Server 헤더와 X-Powered-By 헤더는 기술 스택을 직접 노출하여
    CVE 기반 공격을 용이하게 한다.
  verify:
    type: output_contains
    expect: Server
    field: stdout
    semantic:
      intent: HTTP 응답 헤더에서 보안 헤더(CSP/HSTS/X-Frame-Options/X-Content-Type-Options/X-XSS-Protection)
        부재·기술스택 노출 확인
      success_criteria:
      - curl -I 또는 curl -sI 로 응답 헤더 획득
      - grep -iE 로 다수 보안 헤더 패턴(csp/hsts/x-frame 등) 동시 필터
      - 누락된 보안 헤더가 제시하는 취약점(클릭재킹/다운그레이드/XSS) 언급
      acceptable_methods:
      - curl -sI <url> | grep -iE <pattern>
      - curl -v <url> 2>&1 | grep -i <header>
      - securityheaders.com 또는 mozilla observatory 언급
      - python requests 로 r.headers 분석
      negative_signs:
      - 본문만 다운로드하고 헤더 분석 없음
      - Server/Powered-By 등 노출 헤더만 보고 보안 헤더 분석 없음
      - 누락 헤더의 의미 해석 없음
  target_vm: attacker
  script: curl -sI http://10.20.30.80:3000 | grep -iE '(x-frame|content-security|strict-transport|x-content-type|x-xss|server|x-powered)'
  risk_level: low
  bastion_prompt: 'curl을 사용하여 10.20.30.80:3000 웹서버의 다양한 HTTP 헤더를 분석해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: 웹서버에서 다운로드한 파일의 메타데이터를 분석하라. curl로 {{WEB_IP}}:3000/ftp 경로의 파일을 다운로드하고,
    exiftool 또는 strings로 메타데이터를 추출하라.
  hint: curl로 파일을 다운로드하고 file, strings 명령으로 분석한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 웹서버에서 다운로드한 파일의 메타데이터를 분석하라. curl로 10.20.30.80:3000/ftp 경로의 파일을
    다운로드하고, exiftool 또는 strings로 메타데이터를 추출해줘

    📎 참고 (CLI): curl -s http://10.20.30.80:3000/ftp -o /tmp/ftp_index.html && strings
    /tmp/ftp_index.html | head -30'
  answer_detail: 문서 메타데이터에는 작성자명, 소프트웨어 버전, 내부 경로 등이 포함될 수 있다. PDF, Office 문서에서 exiftool로
    추출한 메타데이터는 직원 이름(스피어 피싱 대상), 내부 디렉토리 구조, 사용 소프트웨어 버전 등 귀중한 OSINT 정보를 제공한다.
  verify:
    type: output_contains
    expect: ftp
    field: stdout
    semantic:
      intent: 서버 공개 디렉터리(/ftp 등) 파일 다운로드 + strings/exiftool 로 메타데이터 추출 — 직원 이름·내부
        경로 등 OSINT 수집
      success_criteria:
      - curl 로 대상 경로 HTML 또는 파일 다운로드
      - strings 또는 exiftool 로 메타데이터·문자열 추출 최소 5줄 출력
      - 추출 정보가 스피어 피싱·내부 구조 파악에 쓰임 언급
      acceptable_methods:
      - curl + strings | head
      - curl + exiftool (PDF/Office 파일용)
      - curl + file + xxd 로 이진 구조 분석
      - wget --spider 로 링크 나열 후 선택 다운로드
      negative_signs:
      - 파일 다운로드 없이 index 페이지만 조회
      - strings 출력 해석 없이 raw 출력만
      - 메타데이터 개념·용도 언급 없음
  target_vm: attacker
  script: curl -s http://10.20.30.80:3000/ftp -o /tmp/ftp_index.html && strings /tmp/ftp_index.html
    | head -30
  risk_level: low
  bastion_prompt: '웹서버에서 다운로드한 파일의 메타데이터를 분석하라. curl로 10.20.30.80:3000/ftp 경로의 파일을
    다운로드하고, exiftool 또는 strings로 메타데이터를 추출해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: 웹서버의 숨겨진 디렉토리를 탐색하라. curl을 사용하여 일반적인 관리자 경로(/admin, /api, /swagger,
    /debug, /console)에 접근을 시도하라.
  hint: for 루프로 여러 경로를 순회하며 HTTP 상태 코드를 확인한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 웹서버의 숨겨진 디렉토리를 탐색하라. curl을 사용하여 일반적인 관리자 경로(/admin, /api, /swagger,
    /debug, /console)에 접근을 시도해줘

    📎 참고 (CLI): for path in admin api swagger debug console backup .git .env api-docs;
    do code=$(curl -s -o /dev/null -w ''%{http_code}'' http://10.20.30.80:3000/$path);
    echo "/$path -> $code"; done'
  answer_detail: 디렉토리 브루트포스는 웹 정찰의 핵심 기법이다. /api-docs, /swagger는 API 명세 노출, /.git은
    소스코드 유출, /.env는 환경변수(DB 비밀번호 등) 노출로 이어진다. 200(존재), 301/302(리다이렉트), 403(접근차단=존재확인)
    응답을 구분하여 분석한다.
  verify:
    type: output_contains
    expect: ->
    field: stdout
    semantic:
      intent: 웹 관리자/숨겨진 경로 브루트포스 — for 루프로 /admin /api /swagger /.git /.env 등 일반 경로
        HTTP 상태코드 확인
      success_criteria:
      - 최소 5개 경로를 순회하며 curl -o /dev/null -w %{http_code} 로 응답코드 수집
      - 각 경로별 상태 코드(/path -> 200|301|403|404) 매핑 출력
      - 403/200 의 의미 차이(존재/차단 vs 실제 접근 가능) 해석
      acceptable_methods:
      - for path in ...; do curl -s -o /dev/null -w code; done
      - gobuster dir -u <url> -w /usr/share/wordlists/dirb/common.txt
      - dirsearch -u <url> -e php,json,txt
      - ffuf -u <url>/FUZZ -w wordlist
      negative_signs:
      - 단일 경로만 확인
      - 응답 코드 없이 본문만 출력
      - 관리자 경로 의미 해석 없이 단순 실행 로그
  target_vm: attacker
  script: for path in admin api swagger debug console backup .git .env api-docs; do
    code=$(curl -s -o /dev/null -w '%{http_code}' http://10.20.30.80:3000/$path);
    echo "/$path -> $code"; done
  risk_level: low
  bastion_prompt: '웹서버의 숨겨진 디렉토리를 탐색하라. curl을 사용하여 일반적인 관리자 경로(/admin, /api, /swagger,
    /debug, /console)에 접근을 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 7
  instruction: JavaScript 소스코드에서 API 엔드포인트를 추출하라. curl로 {{WEB_IP}}:3000의 메인 페이지를 가져와서
    grep으로 API 경로와 URL 패턴을 검색하라.
