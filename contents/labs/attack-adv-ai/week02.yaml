      expect: "robots_check"
      field: "stdout"
    script: |
      import requests, re
      
      base = 'http://10.20.30.80:3000'
      print('robots_check:')
      for path in ['/robots.txt', '/sitemap.xml']:
          try:
              r = requests.get(f'{base}{path}', timeout=3)
              if r.status_code == 200:
                  print(f'  {path}: found ({len(r.text)} bytes)')
                  lines = r.text.split('\n')[:5]
                  for l in lines:
                      print(f'    {l.strip()}')
              else:
                  print(f'  {path}: {r.status_code}')
          except Exception as e:
              print(f'  {path}: error')
