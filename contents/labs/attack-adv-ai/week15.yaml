  category: analysis
  points: 10
  answer: '🤖 프롬프트: 재테스트(Retest) 계획을 수립해줘

    📎 참고 (CLI): echo -e ''=== Retest Plan ===\n\n[Timeline]\n- Retest 1 (2 weeks): Critical/High findings
    verification\n- Retest 2 (1 month): Medium findings + new scan\n- Retest 3 (3 months): Full reassessment\n\n[Verification
    Methods]\n\nF-001 SQLi: Repeat injection test on login endpoint\n  Pass: Error message instead of
    auth token\n\nF-002 Default Creds: Test default credentials\n  Pass: 401/403 response, login prompt\n\nF-003
    Cred Reuse: Test known creds on all hosts\n  Pass: Authentication failure on other hosts\n\nF-004
    Headers: Check HTTP response headers\n  Pass: X-Frame-Options, CSP, HSTS present\n\nF-005 SSH: Test
    password authentication\n  Pass: publickey only in ssh-auth-methods\n\n[Reporting]\n- Update finding
    status: Open -> Closed/Risk Accepted\n- Track remediation metrics\n- Calculate Mean Time to Remediate
    (MTTR)'''
  answer_detail: 재테스트는 수정 조치의 효과를 검증하는 필수 단계이다. 각 취약점에 대해 구체적인 Pass/Fail 기준을 정의하고, 수정 확인 후 Finding의 상태를
    업데이트한다. MTTR(Mean Time to Remediate)은 조직의 보안 성숙도를 측정하는 핵심 지표이다.
