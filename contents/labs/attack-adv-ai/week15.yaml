lab_id: attack-adv-ai-week15
title: 모의해킹 보고서 작성 (AI 지원)
version: ai
course: attack-adv-ai
week: 15
description: 전문적인 모의해킹 보고서를 작성한다. 발견사항의 문서화, CVSS 평가, 공격 체인 시각화, 방어 권고사항 작성 등 보고서의 모든 구성 요소를 실습한다. AI
  SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- PTES 표준에 따른 전문 모의해킹 보고서를 작성한다
- 발견사항을 CVSS로 평가하고 증거를 체계적으로 정리한다
- 경영진용 요약과 기술팀용 상세 보고서를 구분하여 작성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 모의해킹 보고서의 전체 구조를 설계하라. 표지, 목차, 각 섹션의 구성을 /tmp/report_outline.txt에 작성하라.
  hint: PTES 보고서 표준의 필수 섹션을 포함한다
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: 모의해킹 보고서의 전체 구조를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): cat > /tmp/report_outline.txt\
    \ << 'EOF'\n=== Penetration Test Report Structure ===\n\n1. Cover Page\n   - Client name, report date,\
    \ classification\n   - Tester name and certification\n\n2. Executive Summary (1-2 pages)\n   - Overall\
    \ risk rating\n   - Key findings summary\n   - Business impact\n   - Top recommendations\n\n3. Scope\
    \ and Methodology\n   - Target systems and IP ranges\n   - Testing methodology (PTES/OWASP)\n   -\
    \ Tools used\n   - Testing timeline\n\n4. Findings Summary\n   - Vulnerability statistics (Critical/High/Medium/Low)\n\
    \   - Risk heat map\n   - CVSS score distribution\n\n5. Detailed Findings\n   - For each finding:\n\
    \     a. Title and CVSS score\n     b. Affected systems\n     c. Description\n     d. Evidence (screenshots,\
    \ commands, output)\n     e. Impact analysis\n     f. Remediation steps\n\n6. Attack Narrative\n \
    \  - Step-by-step attack chain\n   - Timeline of activities\n   - Techniques mapped to MITRE ATT&CK\n\
    \n7. Recommendations\n   - Prioritized by risk and effort\n   - Short/medium/long-term roadmap\n\n\
    8. Appendices\n   - Raw scan results\n   - Tool configurations\n   - Methodology details\nEOF\ncat\
    \ /tmp/report_outline.txt"
  answer_detail: 모의해킹 보고서는 경영진과 기술팀 두 대상을 모두 만족시켜야 한다. Executive Summary는 비기술적 언어로 비즈니스 영향을 전달하고, Detailed
    Findings는 기술팀이 재현하고 수정할 수 있을 만큼 상세해야 한다. PTES 보고서 표준은 업계에서 널리 인정받는 구조이다.
  verify:
    type: output_contains
    expect: Report Structure
    field: stdout
    semantic:
      intent: 모의해킹 보고서 구조 설계 — Executive Summary/Scope/Methodology/Findings/Recommendations/Appendix 표준
        목차를 /tmp/report_outline.txt
      success_criteria:
      - 7 섹션 이상 구조 제시 (Exec/Scope/Method/Timeline/Findings/Risk Summary/Recommendations/Appendix)
      - 각 섹션의 목적 1줄 설명
      - NIST SP 800-115 또는 OWASP Testing Guide 의 리포트 템플릿 참조
      acceptable_methods:
      - heredoc 으로 목차 텍스트 작성
      - markdown TOC 생성
      - json/yaml 구조화
      - 기존 템플릿(SANS/PCI ASV) 참조
      negative_signs:
      - 섹션 3개 미만
      - 섹션별 목적 설명 없음
      - 파일 저장 없음
  target_vm: attacker
  script: "cat > /tmp/report_outline.txt << 'EOF'\n=== Penetration Test Report Structure ===\n\n1. Cover\
    \ Page\n   - Client name, report date, classification\n   - Tester name and certification\n\n2. Executive\
    \ Summary (1-2 pages)\n   - Overall risk rating\n   - Key findings summary\n   - Business impact\n\
    \   - Top recommendations\n\n3. Scope and Methodology\n   - Target systems and IP ranges\n   - Testing\
    \ methodology (PTES/OWASP)\n   - Tools used\n   - Testing timeline\n\n4. Findings Summary\n   - Vulnerability\
    \ statistics (Critical/High/Medium/Low)\n   - Risk heat map\n   - CVSS score distribution\n\n5. Detailed\
    \ Findings\n   - For each finding:\n     a. Title and CVSS score\n     b. Affected systems\n     c.\
    \ Description\n     d. Evidence (screenshots, commands, output)\n     e. Impact analysis\n     f.\
    \ Remediation steps\n\n6. Attack Narrative\n   - Step-by-step attack chain\n   - Timeline of activities\n\
    \   - Techniques mapped to MITRE ATT&CK\n\n7. Recommendations\n   - Prioritized by risk and effort\n\
    \   - Short/medium/long-term roadmap\n\n8. Appendices\n   - Raw scan results\n   - Tool configurations\n\
    \   - Methodology details\nEOF\ncat /tmp/report_outline.txt"
  risk_level: low
  bastion_prompt: 모의해킹 보고서의 전체 구조를 설계하라. 표지, 목차, 각 섹션의 구성을 /tmp/report_outline.txt에 작성하라.
- order: 2
  instruction: 취약점 발견사항(Finding)을 표준 형식으로 작성하라. SQL Injection 취약점을 예제로 하여 완전한 Finding 문서를 작성하라.
  hint: 제목, CVSS, 영향받는 시스템, 설명, 증거, 영향, 수정 방법을 포함한다
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: 취약점 발견사항(Finding)을 표준 형식으로 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): cat\
    \ > /tmp/finding_sqli.txt << 'EOF'\n=== Finding: F-001 SQL Injection in Authentication ===\n\n[Severity]\
    \ Critical (CVSS 9.8)\n[Vector] AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H\n[Status] Open\n[Affected] 10.20.30.80:3000\
    \ (JuiceShop)\n\n[Description]\nThe login endpoint (/rest/user/login) is vulnerable to SQL injection.\n\
    The email parameter is directly concatenated into a SQL query without\nparameterization, allowing\
    \ authentication bypass.\n\n[Evidence]\nRequest:\n  POST /rest/user/login\n  {\"email\":\"' OR 1=1--\"\
    ,\"password\":\"x\"}\nResponse:\n  200 OK - Authentication token returned\n  Admin access granted\
    \ without valid credentials\n\n[Impact]\n- Complete authentication bypass\n- Access to all user accounts\
    \ including admin\n- Potential data exfiltration (UNION-based SQLi)\n- Database modification/deletion\
    \ possible\n\n[Remediation]\n1. Use parameterized queries / prepared statements\n2. Implement input\
    \ validation (whitelist)\n3. Deploy WAF with SQLi protection rules\n4. Implement rate limiting on\
    \ login endpoint\n5. Add monitoring for SQLi patterns in logs\n\n[References]\n- CWE-89: SQL Injection\n\
    - OWASP Top 10 2021: A03 Injection\nEOF\ncat /tmp/finding_sqli.txt"
  answer_detail: Finding 문서는 보고서의 핵심 구성 요소이다. 각 발견사항은 재현 가능한 증거(명령어, 요청/응답), 구체적인 영향 분석, 단계별 수정 방법을 포함해야
    한다. CVSS 벡터 문자열을 명시하여 객관적인 심각도를 전달하고, CWE/OWASP 참조로 표준 분류를 제공한다.
  verify:
    type: output_contains
    expect: 'Finding: F-001'
    field: stdout
    semantic:
      intent: 표준 Finding 문서 — SQL Injection 예시로 ID/Title/Severity/CVSS/Description/PoC/Impact/Remediation/References
        포맷 완전 작성
      success_criteria:
      - Finding ID + Title + Severity(+CVSS vector) 포함
      - 재현 가능한 PoC 단계(payload, 요청, 응답)
      - Remediation(prepared statements, ORM, WAF) 구체 제시
      acceptable_methods:
      - markdown Finding 템플릿
      - OWASP WSTG Test Cases 참조
      - CWE-89 매핑
      - CVE-유사 식별자 부여
      negative_signs:
      - CVSS 또는 Severity 없음
      - PoC 없이 추상적 설명
      - Remediation 누락
  target_vm: attacker
  script: "cat > /tmp/finding_sqli.txt << 'EOF'\n=== Finding: F-001 SQL Injection in Authentication ===\n\
    \n[Severity] Critical (CVSS 9.8)\n[Vector] AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H\n[Status] Open\n[Affected]\
    \ 10.20.30.80:3000 (JuiceShop)\n\n[Description]\nThe login endpoint (/rest/user/login) is vulnerable\
    \ to SQL injection.\nThe email parameter is directly concatenated into a SQL query without\nparameterization,\
    \ allowing authentication bypass.\n\n[Evidence]\nRequest:\n  POST /rest/user/login\n  {\"email\":\"\
    ' OR 1=1--\",\"password\":\"x\"}\nResponse:\n  200 OK - Authentication token returned\n  Admin access\
    \ granted without valid credentials\n\n[Impact]\n- Complete authentication bypass\n- Access to all\
    \ user accounts including admin\n- Potential data exfiltration (UNION-based SQLi)\n- Database modification/deletion\
    \ possible\n\n[Remediation]\n1. Use parameterized queries / prepared statements\n2. Implement input\
    \ validation (whitelist)\n3. Deploy WAF with SQLi protection rules\n4. Implement rate limiting on\
    \ login endpoint\n5. Add monitoring for SQLi patterns in logs\n\n[References]\n- CWE-89: SQL Injection\n\
    - OWASP Top 10 2021: A03 Injection\nEOF\ncat /tmp/finding_sqli.txt"
  risk_level: low
  bastion_prompt: 취약점 발견사항(Finding)을 표준 형식으로 작성하라. SQL Injection 취약점을 예제로 하여 완전한 Finding 문서를 작성하라.
- order: 3
  instruction: 두 번째 발견사항으로 기본 자격증명 취약점을 작성하라.
  hint: Wazuh SIEM의 기본 자격증명 문제를 Finding 형식으로 문서화한다
  category: analysis
  points: 10
  answer: "\U0001F916 프롬프트: 두 번째 발견사항으로 기본 자격증명 취약점을 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI): cat\
    \ > /tmp/finding_default_creds.txt << 'EOF'\n=== Finding: F-002 Default Credentials on SIEM ===\n\n\
    [Severity] Critical (CVSS 9.1)\n[Vector] AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N\n[Status] Open\n[Affected]\
    \ 10.20.30.100:55000 (Wazuh Manager API)\n\n[Description]\nThe Wazuh SIEM Manager API is accessible\
    \ with default\ncredentials (wazuh-wui:wazuh-wui). This provides full\nadministrative access to the\
    \ security monitoring platform.\n\n[Evidence]\nRequest:\n  curl -sk -u 'wazuh-wui:wazuh-wui' https://10.20.30.100:55000/\n\
    Response:\n  200 OK - API accessible with full admin rights\n\n[Impact]\n- Attacker can disable security\
    \ alerts\n- Modify or delete security logs\n- Access sensitive security event data\n- Blind spot in\
    \ security monitoring\n- Lateral movement intelligence gathering\n\n[Remediation]\n1. Immediately\
    \ change default API credentials\n2. Implement strong password policy for SIEM\n3. Restrict API access\
    \ to management network only\n4. Enable API access logging and alerting\n5. Implement MFA for SIEM\
    \ admin access\n\n[References]\n- CWE-798: Use of Hard-coded Credentials\n- CWE-1188: Insecure Default\
    \ Initialization\nEOF\ncat /tmp/finding_default_creds.txt"
  answer_detail: 기본 자격증명은 가장 흔하고 치명적인 취약점 중 하나이다. 특히 SIEM 같은 보안 시스템의 기본 자격증명은 공격자에게 보안 모니터링을 무력화하고 로그를
    조작할 수 있는 능력을 부여한다. Finding 문서에는 구체적인 자격증명이 아닌 취약점의 존재만 기록하는 것이 윤리적이다.
  verify:
    type: output_contains
    expect: 'Finding: F-002'
    field: stdout
    semantic:
      intent: 두번째 Finding — 기본 자격증명(admin/admin, 서비스 기본 비번) 취약점을 Finding 표준 포맷으로 문서화
      success_criteria:
      - 대상 서비스·기본 자격증명 목록 제시
      - CVSS v3.1 벡터 포함
      - Remediation(강제 초기 비밀번호 변경, MFA, CIS Benchmark)
      acceptable_methods:
      - Finding 템플릿 재활용
      - NIST SP 800-63 인증 수준 참조
      - Wazuh/Grafana 등 구체적 서비스 예시
      - hydra/medusa brute force 결과 첨부
      negative_signs:
      - 자격증명 사례 없음
      - MFA/비밀번호 정책 권고 없음
      - Severity 수준 제시 없음
  target_vm: attacker
  script: "cat > /tmp/finding_default_creds.txt << 'EOF'\n=== Finding: F-002 Default Credentials on SIEM\
    \ ===\n\n[Severity] Critical (CVSS 9.1)\n[Vector] AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N\n[Status] Open\n\
    [Affected] 10.20.30.100:55000 (Wazuh Manager API)\n\n[Description]\nThe Wazuh SIEM Manager API is\
    \ accessible with default\ncredentials (wazuh-wui:wazuh-wui). This provides full\nadministrative access\
    \ to the security monitoring platform.\n\n[Evidence]\nRequest:\n  curl -sk -u 'wazuh-wui:wazuh-wui'\
    \ https://10.20.30.100:55000/\nResponse:\n  200 OK - API accessible with full admin rights\n\n[Impact]\n\
    - Attacker can disable security alerts\n- Modify or delete security logs\n- Access sensitive security\
    \ event data\n- Blind spot in security monitoring\n- Lateral movement intelligence gathering\n\n[Remediation]\n\
    1. Immediately change default API credentials\n2. Implement strong password policy for SIEM\n3. Restrict\
    \ API access to management network only\n4. Enable API access logging and alerting\n5. Implement MFA\
    \ for SIEM admin access\n\n[References]\n- CWE-798: Use of Hard-coded Credentials\n- CWE-1188: Insecure\
    \ Default Initialization\nEOF\ncat /tmp/finding_default_creds.txt"
  risk_level: low
  bastion_prompt: 두 번째 발견사항으로 기본 자격증명 취약점을 작성하라.
- order: 4
  instruction: 발견사항 요약 테이블을 작성하라. 모든 취약점의 ID, 제목, CVSS, 위험도, 상태를 한 눈에 보여주는 테이블을 만들라.
  hint: 표 형식으로 취약점을 정리하여 한 페이지에 전체 현황을 보여준다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 발견사항 요약 테이블을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo -e ''=== Findings Summary Table ===\n\nID     | Title                          |
    CVSS | Risk     | Status\n------ | ------------------------------ | ---- | -------- | ------\nF-001  |
    SQL Injection in Auth          | 9.8  | Critical | Open\nF-002  | Default SIEM Credentials       |
    9.1  | Critical | Open\nF-003  | Credential Reuse Across Hosts  | 8.1  | High     | Open\nF-004  |
    Missing HTTP Security Headers  | 5.3  | Medium   | Open\nF-005  | SSH Password Auth Enabled      |
    6.5  | Medium   | Open\nF-006  | Directory Listing Enabled      | 5.3  | Medium   | Open\nF-007  |
    Outdated Software Versions     | 7.5  | High     | Open\nF-008  | Unrestricted File Upload       |
    8.8  | High     | Open\nF-009  | CORS Misconfiguration          | 6.1  | Medium   | Open\nF-010  |
    Information Disclosure         | 5.3  | Medium   | Open\n\nTotal: 2 Critical, 3 High, 5 Medium\nOverall
    Risk: HIGH'''
  answer_detail: 요약 테이블은 보고서의 빠른 참조(Quick Reference)로 활용된다. 한 눈에 전체 취약점 현황을 파악할 수 있으며, 위험도별로 정렬하여 우선순위를
    명확하게 전달한다. 색상 코딩(Critical=빨강, High=주황, Medium=노랑)을 적용하면 시각적 효과가 높아진다.
  verify:
    type: output_contains
    expect: Findings Summary
    field: stdout
    semantic:
      intent: 발견사항 요약 테이블 — ID/Title/CVSS/Severity/Status 컬럼으로 모든 취약점 한눈에 보기
      success_criteria:
      - 최소 5개 Finding 포함
      - CVSS Score + Severity 라벨 매핑
      - Status(Open/In Progress/Closed) 컬럼
      acceptable_methods:
      - markdown table
      - echo -e 로 ASCII 테이블
      - python pandas 로 DataFrame
      - CSV 저장 후 column -t
      negative_signs:
      - 3개 이하 Finding
      - CVSS 컬럼 없음
      - Status 컬럼 누락
  target_vm: attacker
  script: 'echo -e ''=== Findings Summary Table ===\n\nID     | Title                          | CVSS
    | Risk     | Status\n------ | ------------------------------ | ---- | -------- | ------\nF-001  |
    SQL Injection in Auth          | 9.8  | Critical | Open\nF-002  | Default SIEM Credentials       |
    9.1  | Critical | Open\nF-003  | Credential Reuse Across Hosts  | 8.1  | High     | Open\nF-004  |
    Missing HTTP Security Headers  | 5.3  | Medium   | Open\nF-005  | SSH Password Auth Enabled      |
    6.5  | Medium   | Open\nF-006  | Directory Listing Enabled      | 5.3  | Medium   | Open\nF-007  |
    Outdated Software Versions     | 7.5  | High     | Open\nF-008  | Unrestricted File Upload       |
    8.8  | High     | Open\nF-009  | CORS Misconfiguration          | 6.1  | Medium   | Open\nF-010  |
    Information Disclosure         | 5.3  | Medium   | Open\n\nTotal: 2 Critical, 3 High, 5 Medium\nOverall
    Risk: HIGH'''
  risk_level: low
  bastion_prompt: 발견사항 요약 테이블을 작성하라. 모든 취약점의 ID, 제목, CVSS, 위험도, 상태를 한 눈에 보여주는 테이블을 만들라.
- order: 5
  instruction: 공격 내러티브(Attack Narrative)를 작성하라. 시간순으로 공격 과정을 서술하는 스토리를 구성하라.
  hint: 타임라인 형식으로 각 단계의 시간, 행위, 결과를 서술한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 공격 내러티브(Attack Narrative)를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo -e ''=== Attack Narrative ===\n\n[T+0:00] Reconnaissance\n- nmap scan discovered
    4 active hosts\n- Web service identified on 10.20.30.80:3000\n- Technologies: Node.js, Express, JuiceShop\n\n[T+0:15]
    Web Vulnerability Discovery\n- SQL Injection found in login endpoint\n- Default credentials tested
    on all services\n- Directory listing revealed sensitive files\n\n[T+0:30] Initial Exploitation\n-
    SQL Injection bypassed authentication\n- Admin panel access achieved\n- JWT token obtained for API
    access\n\n[T+0:45] Post-Exploitation & Lateral Movement\n- System information collected from web server\n-
    Credentials discovered in configuration files\n- SSH access to firewall using reused credentials\n\n[T+1:00]
    Privilege Escalation\n- SUID binary identified for root access\n- Wazuh accessed with default credentials\n\n[T+1:15]
    Objective Achievement\n- Full network access demonstrated\n- Data exfiltration capability confirmed\n-
    SIEM monitoring potentially compromised\n\n[T+1:30] Cleanup & Documentation\n- All artifacts removed\n-
