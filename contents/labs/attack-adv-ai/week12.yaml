    📎 참고 (CLI): echo -e ''=== SolarWinds SUNBURST Analysis ===\n\n[Attack Chain]\n1.
    Initial Access: SolarWinds build server compromise\n2. Code Injection: Malicious
    code inserted into Orion DLL\n3. Build Compromise: Signed with legitimate SolarWinds
    cert\n4. Distribution: Pushed via official update channel\n5. Dormancy: 12-14
