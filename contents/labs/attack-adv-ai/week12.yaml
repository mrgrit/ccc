- order: 7
  instruction: 코드 서명 검증을 분석하라. GPG 서명 확인, 해시 검증, Sigstore를 통한 패키지 무결성 확인 방법을 실습하라.
  hint: sha256sum, gpg --verify, cosign 등의 도구를 사용한다
  category: defense
  points: 10
  answer: '🤖 프롬프트: 코드 서명 검증을 분석하라. GPG 서명 확인, 해시 검증, Sigstore를 통한 패키지 무결성 확인 방법을 실습해줘

    📎 참고 (CLI): echo ''=== Code Signing & Verification ==='' && echo ''[SHA256 Hash
    Verification]'' && echo ''test content'' > /tmp/signed_file.txt && sha256sum /tmp/signed_file.txt
    && echo '''' && echo ''[GPG Signing (concept)]'' && echo ''gpg --sign --armor
    file -> file.asc'' && echo ''gpg --verify file.asc file -> Good signature from...''
    && echo '''' && echo ''[Sigstore/cosign]'' && echo ''cosign sign --key cosign.key
    image:tag'' && echo ''cosign verify --key cosign.pub image:tag'' && echo ''''
    && echo ''[SLSA Provenance]'' && echo ''slsa-verifier verify-artifact binary --source-uri
    github.com/org/repo'' && echo '''' && echo ''[pip download verification]'' &&
    echo ''pip install --require-hashes -r requirements.txt'' && rm /tmp/signed_file.txt'
  answer_detail: 코드 서명은 소프트웨어의 출처와 무결성을 보장한다. GPG는 전통적인 PGP 서명, Sigstore/cosign은 키리스(keyless)
    서명으로 컨테이너 이미지의 무결성을 검증한다. SLSA(Supply-chain Levels for Software Artifacts)는 빌드
    프로세스 자체의 무결성을 보장하는 프레임워크이다.
  verify:
    type: output_contains
    expect: Code Signing
    field: stdout
