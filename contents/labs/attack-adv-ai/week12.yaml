    Movement: SAML token forging (GoldenSAML)\n8. Data Exfil: Targeted, selective
    data collection\n\n[Key Techniques]\n- Build process injection (not source repo)\n-
    DGA (Domain Generation Algorithm) for C2\n- Anti-analysis: Check for security
    tools before activating\n- Blended with normal SolarWinds traffic\n\n[Impact]\n-
    18,000+ organizations received malicious update\n- 100+ actively exploited (US
    gov agencies, Fortune 500)\n\n[Lessons]\n- Code signing alone is insufficient\n-
    Build pipeline security is critical\n- Zero trust for internal networks\n- SBOM
    (Software Bill of Materials) needed'''
