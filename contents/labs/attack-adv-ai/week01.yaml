    script: |
      import requests
      from concurrent.futures import ThreadPoolExecutor
      
      paths = ['admin','api','swagger','ftp','robots.txt','.env','api-docs','debug']
      base = 'http://10.20.30.80:3000'
      
      def check(p):
          try:
              r = requests.get(f'{base}/{p}', timeout=3)
              return (p, r.status_code)
          except: return (p, 'err')
      
      print('dir_scan results:')
      with ThreadPoolExecutor(5) as ex:
          for p, code in ex.map(lambda p: check(p), paths):
              if code != 404:
                  print(f'  /{p} -> {code}')
