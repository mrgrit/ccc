      expect: "framework"
      field: "stdout"
    script: |
      class Module:
          def __init__(self, name): self.name = name
          def run(self, ctx): return ctx
      
      class Recon(Module):
          def run(self, ctx): ctx['hosts'] = ['10.20.30.80']; return ctx
      
      class Exploit(Module):
          def run(self, ctx): ctx['access'] = 'admin'; return ctx
      
      pipeline = [Recon('recon'), Exploit('exploit')]
      ctx = {}
      print('framework:')
      for m in pipeline:
          ctx = m.run(ctx)
          print(f'  [{m.name}] context: {list(ctx.keys())}')
      print(f'  Final: {ctx}')
