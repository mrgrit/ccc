    script: |
      import glob, os
      
      patterns = ['/tmp/exfil_*','/tmp/payload*','/tmp/c2_*']
      removed = 0
      for p in patterns:
          for f in glob.glob(p):
              try: os.remove(f); removed += 1
              except: pass
      print(f'cleanup_done: {removed} files removed')
