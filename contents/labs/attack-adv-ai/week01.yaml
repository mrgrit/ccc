    instruction: "Python nmap 모듈로 10.20.30.0/24 자동 호스트 발견 스크립트를 작성하라."
    hint: "python-nmap의 PortScanner로 ping 스캔을 수행한다"
    category: "recon"
    points: 10
    answer: "python3 자동 네트워크 스캔 스크립트"
    answer_detail: "python-nmap은 nmap의 Python 래퍼로, 스캔 결과를 구조화된 데이터로 반환하여 자동화 파이프라인에 통합할 수 있다."
    verify:
      type: "output_contains"
      expect: "hosts_found"
      field: "stdout"
    script: |
      import subprocess
      import json
      
      result = subprocess.run(['nmap', '-sn', '10.20.30.0/24'], capture_output=True, text=True, timeout=30)
      lines = result.stdout.split('\n')
      hosts = [l.split()[-1].strip('()') for l in lines if 'Nmap scan report' in l]
      print(f'hosts_found: {len(hosts)}')
      for h in hosts:
          print(f'  {h}: alive')
      print(json.dumps({'hosts': hosts}, indent=2))
