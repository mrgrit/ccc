      field: "stdout"
    script: |
      import requests
      
      HEADERS = ['X-Frame-Options','Content-Security-Policy','Strict-Transport-Security','X-Content-Type-Options']
      try:
          r = requests.get('http://10.20.30.80:3000', timeout=5)
          print('header_check results:')
          for h in HEADERS:
              present = any(h.lower() == k.lower() for k in r.headers)
              print(f'  {h}: {"PRESENT" if present else "MISSING"}')
      except Exception as e:
          print(f'header_check: error - {e}')
