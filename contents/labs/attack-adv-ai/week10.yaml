    5. Network DLP: Inspect outbound traffic (HTTP, SMTP, FTP)

    6. DNS Monitoring: Query length, entropy, volume anomalies

    7. CASB: Cloud service upload monitoring

    8. Endpoint DLP: USB, print, clipboard control

