    http.request_body; pcre:"/^[A-Za-z0-9+\\/]{500,}={0,2}$/"; sid:1000003; rev:1;)\n\n#
    ICMP Data Exfil\nalert icmp any any -> any any (msg:"ICMP payload size anomaly";
