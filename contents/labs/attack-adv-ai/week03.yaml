lab_id: attack-adv-ai-week03
title: 네트워크 우회 기법 (AI 지원)
version: ai
course: attack-adv-ai
week: 3
description: 방화벽, IDS/IPS를 우회하는 다양한 네트워크 기법을 실습한다. 패킷 조작, 터널링, 프로토콜 남용 등을 통해 보안 장비의 탐지를 회피하는 고급 기법을 다룬다. AI SubAgent가 자동으로 명령을 실행하고 결과를 
  검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- nmap 방화벽 우회 옵션을 활용하여 필터링된 포트를 탐지한다
- SSH 터널링과 포트 포워딩을 통한 접근 통제 우회를 수행한다
- 패킷 분할, 디코이 등 IDS 회피 기법을 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap의 ACK 스캔(-sA)을 사용하여 {{SECU_IP}}의 방화벽 규칙을 매핑하라. 포트 22,80,443,8080에 대해 필터링 상태를 확인하라.
  hint: -sA 스캔은 방화벽의 상태 추적(stateful) 여부를 판별한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: nmap의 ACK 스캔(-sA)을 사용하여 10.20.30.1의 방화벽 규칙을 매핑해줘

    📎 참고 (CLI): nmap -sA -p 22,80,443,8080 10.20.30.1'
  answer_detail: ACK 스캔은 RST 응답 여부로 방화벽의 필터링 규칙을 매핑한다. unfiltered는 포트에 도달 가능(방화벽 허용), filtered는 차단됨을 의미한다. 상태 기반 방화벽은 ACK 패킷도 차단하지만, 무상태 
    방화벽은 통과시킨다. 이를 통해 방화벽 유형과 규칙을 추정할 수 있다.
  verify:
    type: output_contains
    expect: filtered
    field: stdout
    semantic:
      intent: 대상 방화벽의 ACK 필터링 규칙을 nmap -sA 또는 동등한 기법으로 매핑하고 포트별 상태를 식별
      success_criteria:
      - nmap -sA 출력에서 unfiltered 또는 filtered 중 하나 이상의 상태가 포함된 포트 매핑 결과 제시
      - ACK 스캔 원리(RST 응답 여부로 상태 판별, 상태기반/무상태 방화벽 구분) 설명과 실행 결과 해석
      - 특정 포트에 대해 방화벽 차단 여부를 추정하는 논리 전개
      acceptable_methods:
      - nmap -sA -p 22,80,443,8080 <IP> 직접 실행과 출력 제시
      - hping3 -A 로 단일 포트 ACK 검증 후 응답 유무 보고
      - scapy 로 ACK 패킷 수동 생성 후 RST 수신 분석
      - nmap 실행이 불가할 경우 동일 명령의 예상 출력을 근거와 함께 서술
      negative_signs:
      - SYN/Connect 스캔 결과(open/closed 만)만 제시하고 ACK 언급 없음
      - 무응답, 명령 실행 실패, 타임아웃 텍스트만 출력
      - 방화벽 관련 언급이나 포트 상태 해석이 전혀 없음
  target_vm: attacker
  script: nmap -sA -p 22,80,443,8080 10.20.30.1
  risk_level: low
  bastion_prompt: nmap의 ACK 스캔(-sA)을 사용하여 10.20.30.1의 방화벽 규칙을 매핑해줘
- order: 2
  instruction: nmap의 패킷 분할(-f) 옵션을 사용하여 IDS를 우회하면서 {{WEB_IP}}의 포트 스캔을 수행하라. MTU를 24로 설정하라.
  hint: --mtu 옵션으로 패킷 분할 크기를 지정한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: nmap의 패킷 분할(-f) 옵션을 사용하여 IDS를 우회하면서 10.20.30.80의 포트 스캔을 수행하라. MTU를 24로 설정해줘

    📎 참고 (CLI): nmap -f --mtu 24 -p 80,443,3000 10.20.30.80'
  answer_detail: 패킷 분할(Fragmentation)은 IP 패킷을 작은 조각으로 나누어 IDS의 시그니처 매칭을 방해한다. 많은 IDS는 분할된 패킷을 재조립하여 검사하지만, 비정상적인 MTU 크기나 중첩 분할은 재조립 로직의 취약점을
    유발할 수 있다. --mtu 값은 8의 배수여야 한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
  script: nmap -f --mtu 24 -p 80,443,3000 10.20.30.80
  risk_level: medium
  bastion_prompt: nmap의 패킷 분할(-f) 옵션을 사용하여 IDS를 우회하면서 10.20.30.80의 포트 스캔을 수행하라. MTU를 24로 설정해줘
- order: 3
  instruction: nmap의 디코이(-D) 옵션을 사용하여 소스 IP를 위장하면서 {{WEB_IP}}을 스캔하라. 디코이 IP 3개를 포함하라.
  hint: -D decoy1,decoy2,ME 형태로 자신의 IP를 디코이 사이에 섞는다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: nmap의 디코이(-D) 옵션을 사용하여 소스 IP를 위장하면서 10.20.30.80을 스캔해줘

    📎 참고 (CLI): nmap -D 10.20.30.50,10.20.30.60,ME,10.20.30.70 -p 80,3000 10.20.30.80'
  answer_detail: 디코이 스캔은 여러 가짜 소스 IP에서 동시에 스캔하는 것처럼 위장하여 실제 공격자의 IP를 식별하기 어렵게 만든다. ME는 실제 IP의 위치를 지정한다. 방어자 로그에는 디코이 IP들도 함께 기록되어 분석을 복잡하게 
    만든다. 단, 디코이 IP가 실제 존재하지 않으면 SYN flood로 오탐될 수 있다.
  verify:
    type: output_contains
    expect: 10.20.30.80
    field: stdout
    semantic:
      intent: 소스 IP 위장을 통한 nmap 디코이 스캔 기법 실행 또는 구현 원리 제시
      success_criteria:
      - nmap -D 옵션으로 2개 이상의 디코이 IP를 포함한 스캔 명령 제시 및 타겟 IP 포함
      - 디코이 스캔의 목적(실제 소스 IP 은폐) 설명과 ME 토큰 의미 서술
      - 스캔 결과 해석(디코이 IP가 로그에 동시 기록되어 분석 지연)
      acceptable_methods:
      - nmap -D d1,d2,ME,d3 -p <ports> <target> 실행
      - hping3 --spoof <fake_ip> 로 단일 위조 패킷 전송
      - masscan --source-ip 여러개 로 유사 효과
      - 방어 관점에서 디코이 식별 로직 설명 (실제 디코이 IP가 Live 여부 확인)
      negative_signs:
      - 기본 nmap 스캔(디코이 없음)만 실행
      - 타겟 IP 누락 또는 전혀 다른 스캔 기법 (예 SYN only) 만 제시
      - 실행 실패 메시지만 출력되고 개념 설명 없음
  target_vm: attacker
  script: nmap -D 10.20.30.50,10.20.30.60,ME,10.20.30.70 -p 80,3000 10.20.30.80
  risk_level: medium
  bastion_prompt: nmap의 디코이(-D) 옵션을 사용하여 소스 IP를 위장하면서 10.20.30.80을 스캔해줘
- order: 4
  instruction: SSH 로컬 포트 포워딩을 설정하여 방화벽 뒤의 서비스에 접근하는 시나리오를 구성하라. 로컬 포트 8888을 {{WEB_IP}}:3000으로 포워딩하는 명령을 작성하라(실행은 하지 않고 명령만 출력).
  hint: ssh -L 로컬포트:대상:대상포트 사용자@중간서버 형태이다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: SSH 로컬 포트 포워딩을 설정하여 방화벽 뒤의 서비스에 접근하는 시나리오를 구성하라 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): echo ''ssh -L 8888:10.20.30.80:3000 -N -f ccc@10.20.30.1'''
  answer_detail: SSH 로컬 포트 포워딩(-L)은 암호화된 SSH 터널을 통해 방화벽 뒤의 서비스에 접근하는 기법이다. 방화벽이 SSH(22번 포트)만 허용하는 경우, 터널을 통해 내부의 임의 서비스에 접근할 수 있다. -N은 원격 명령
    실행 없이 포워딩만, -f는 백그라운드 실행이다.
  verify:
    type: output_contains
    expect: ssh -L
    field: stdout
    semantic:
      intent: SSH 로컬 포트 포워딩(-L)으로 방화벽 뒤의 내부 서비스에 접근하는 명령 작성·설명
      success_criteria:
      - ssh -L <local>:<target>:<port> 형태의 명령 문자열 제시 (quoting 포함)
      - 로컬 포워딩 원리(암호화 터널을 통해 내부 서비스 접근) 설명
      - 방화벽이 SSH(22) 만 허용해도 우회 가능하다는 맥락 제시
      acceptable_methods:
      - echo '...' 로 명령만 출력
      - ssh -L 명령을 직접 제시하고 -N -f 옵션 의미 부가 설명
      - ~/.ssh/config 의 LocalForward 엔트리 예시
      - putty cli 또는 PowerShell OpenSSH 동등 명령 제시
      negative_signs:
      - ssh 접속만 소개 (-L 옵션 없음)
      - 역방향 포워딩(-R) 만 설명
      - VPN 등 완전 다른 우회 방법만 제시
      - 명령 실행 시도 없이 "SSH 란 무엇인가" 수준의 총론만
  target_vm: attacker
  script: echo 'ssh -L 8888:10.20.30.80:3000 -N -f ccc@10.20.30.1'
  risk_level: medium
  bastion_prompt: SSH 로컬 포트 포워딩을 설정하여 방화벽 뒤의 서비스에 접근하는 시나리오를 구성하라. 로컬 포트 8888을 {{WEB_IP}}:3000으로 포워딩하는 명령을 작성하라(실행은 하지 않고 명령만 출력).
- order: 5
  instruction: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하는 명령을 작성하라. 로컬 포트 1080에서 SOCKS5 프록시를 생성하라.
  hint: ssh -D 포트번호 사용자@서버 형태이다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하는 명령을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): echo ''ssh -D 1080 -N -f ccc@10.20.30.1 && curl --socks5 127.0.0.1:1080 http://10.20.30.80:3000'''
  answer_detail: SSH 동적 포워딩(-D)은 SOCKS 프록시를 생성하여 모든 트래픽을 SSH 터널로 라우팅한다. 특정 포트가 아닌 모든 대상에 접근할 수 있어 피봇팅(Pivoting)에 매우 유용하다. proxychains와 결합하면 
    nmap, curl 등 대부분의 도구를 SOCKS 프록시를 통해 실행할 수 있다.
  verify:
    type: output_contains
    expect:
    - ssh -D
    - SOCKS5
    field: stdout
  target_vm: attacker
  script: echo 'ssh -D 1080 -N -f ccc@10.20.30.1 && curl --socks5 127.0.0.1:1080 http://10.20.30.80:3000'
  risk_level: medium
  bastion_prompt: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하는 명령을 작성하라. 로컬 포트 1080에서 SOCKS5 프록시를 생성하라.
- order: 6
  instruction: nmap의 소스 포트 조작(--source-port) 옵션을 사용하여 DNS 소스 포트(53)에서 스캔을 수행하라. 일부 방화벽이 DNS 응답을 허용하는 규칙을 악용하라.
  hint: --source-port 53 옵션으로 소스 포트를 53으로 설정한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: nmap의 소스 포트 조작(--source-port) 옵션을 사용하여 DNS 소스 포트(53)에서 스캔을 수행해줘

    📎 참고 (CLI): nmap --source-port 53 -p 22,80,443 10.20.30.80'
  answer_detail: 일부 방화벽은 DNS 응답 패킷(소스 포트 53)을 무조건 허용하는 잘못된 규칙을 가지고 있다. --source-port 53으로 스캔하면 이러한 규칙을 우회할 수 있다. FTP(20), HTTP(80) 등 다른 잘 
    알려진 포트로도 시도할 수 있다. 현대 상태 기반 방화벽에서는 효과가 제한적이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
  script: nmap --source-port 53 -p 22,80,443 10.20.30.80
  risk_level: medium
  bastion_prompt: nmap의 소스 포트 조작(--source-port) 옵션을 사용하여 DNS 소스 포트(53)에서 스캔을 수행해줘
- order: 7
  instruction: ICMP 터널링의 원리를 이해하기 위해 ping 명령에 데이터를 포함하여 전송하라. 16바이트 패턴 데이터와 함께 {{WEB_IP}}으로 ICMP 패킷을 보내라.
  hint: ping -p 옵션으로 16진수 패딩 패턴을 지정할 수 있다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: ICMP 터널링의 원리를 이해하기 위해 ping 명령에 데이터를 포함하여 전송해줘

    📎 참고 (CLI): ping -c 3 -p 4141414141414141 -s 64 10.20.30.80'
  answer_detail: ICMP 터널링은 ICMP 패킷의 데이터 필드에 실제 전송하려는 데이터를 숨기는 기법이다. 대부분의 방화벽이 ICMP를 허용하므로, 이를 통해 데이터 유출이나 C2 통신이 가능하다. icmpsh, ptunnel 등의 
    도구가 존재한다. 방어를 위해서는 ICMP 페이로드 크기와 빈도를 모니터링해야 한다.
  verify:
    type: output_contains
    expect: bytes from
    field: stdout
  target_vm: attacker
  script: ping -c 3 -p 4141414141414141 -s 64 10.20.30.80
  risk_level: medium
  bastion_prompt: ICMP 터널링의 원리를 이해하기 위해 ping 명령에 데이터를 포함하여 전송해줘
- order: 8
  instruction: HTTP 터널링을 시뮬레이션하라. curl을 사용하여 POST 요청의 본문에 Base64 인코딩된 명령을 숨겨서 전송하라.
  hint: curl -X POST -d 옵션으로 데이터를 HTTP 본문에 포함한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: HTTP 터널링을 시뮬레이션하라. curl을 사용하여 POST 요청의 본문에 Base64 인코딩된 명령을 숨겨서 전송해줘

    📎 참고 (CLI): CMD=$(echo ''whoami && hostname'' | base64) && curl -s -X POST -d "data=$CMD" http://10.20.30.80:3000/ -o /dev/null -w ''%{http_code}''
    && echo '''' && echo "Encoded payload: $CMD"'
  answer_detail: HTTP 터널링은 정상적인 HTTP 트래픽 안에 비정상 데이터를 숨기는 기법이다. HTTPS를 사용하면 내용이 암호화되어 DPI(Deep Packet Inspection)로도 탐지하기 어렵다. 실제 APT 그룹은 정상 웹
    요청과 구별하기 어려운 패턴으로 C2 통신을 구현한다.
  verify:
    type: output_contains
    expect: Encoded payload
    field: stdout
    semantic:
      intent: HTTP POST 본문에 Base64 인코딩된 명령을 은닉하여 전송하는 HTTP 터널링 시뮬레이션
      success_criteria:
      - curl -X POST 와 -d 옵션으로 data 필드에 Base64 문자열을 포함한 요청 수행
      - Base64 인코딩 과정(echo | base64) 또는 최종 인코딩 문자열(d2hvYW1pIHx8...) 중 하나 제시
      - HTTP 응답 코드 또는 터널 성공 여부 확인
      acceptable_methods:
      - bash one-liner (echo ... | base64) 로 payload 생성 후 curl POST
      - python3 -c "import base64; ..." 로 동일 인코딩
      - wget --post-data 로 동등 전송
