    S3 Block Public Access (account-level)\n- Bucket policies with explicit deny\n-
    CloudTrail logging for S3 access\n- AWS Config rules for compliance'''
  risk_level: low
  bastion_prompt: 'S3 버킷 오설정을 탐지해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: AWS IAM 권한 상승 경로를 분석하라. 과도한 IAM 정책을 악용한 권한 확대 시나리오를 문서화하라.
  hint: iam:CreatePolicyVersion, iam:AttachUserPolicy, sts:AssumeRole 등의 위험한 권한을 분석한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: AWS IAM 권한 상승 경로를 분석해줘

    📎 참고 (CLI): echo -e ''=== AWS IAM Privilege Escalation ===\n\n[21 Known IAM Privesc
    Paths (Rhino Security)]\n\n1. iam:CreatePolicyVersion\n   - Create new version
    of managed policy\n   - Set as default -> gain any permission\n\n2. iam:AttachUserPolicy\n   -
    Attach AdministratorAccess to self\n\n3. iam:PutUserPolicy\n   - Add inline policy
    with full access\n\n4. iam:CreateLoginProfile\n   - Create console password for
    another user\n\n5. iam:UpdateLoginProfile\n   - Reset another user password\n\n6.
    sts:AssumeRole\n   - Assume more privileged role\n\n7. lambda:CreateFunction +
    iam:PassRole\n   - Create Lambda with admin role\n   - Execute function -> admin
    access\n\n8. ec2:RunInstances + iam:PassRole\n   - Launch EC2 with admin instance
    profile\n   - SSH to instance -> admin via IMDS\n\n[Tool]\n- PACU: AWS exploitation
    framework\n- enumerate-iam: Brute-force IAM permissions\n- Cloudsplaining: IAM
    policy analysis'''
  answer_detail: AWS IAM 권한 상승은 Rhino Security Labs가 정리한 21개 이상의 경로가 있다. iam:CreatePolicyVersion은
    기존 정책의 새 버전을 생성하여 전체 관리자 권한을 부여할 수 있고, lambda:CreateFunction + iam:PassRole은 Lambda를
    통해 관리자 역할을 행사할 수 있다. PACU는 AWS 공격 자동화 프레임워크이다.
  verify:
    type: output_contains
    expect: IAM Privilege Escalation
    field: stdout
    semantic:
      intent: AWS IAM 권한 상승 경로 — iam:PassRole+ec2:RunInstances, iam:CreatePolicyVersion,
        sts:AssumeRole 등 과도한 정책 조합으로 admin 권한 확보
      success_criteria:
      - 최소 3개의 escalation path (PassRole+RunInstances, CreatePolicyVersion, AssumeRole)
        제시
      - 각 path 에 필요한 IAM action 명시
      - Pacu / PMapper 같은 자동화 도구 언급
      acceptable_methods:
      - aws iam list-attached-user-policies + aws iam get-policy-version 로 과도 권한 검사
      - PMapper graph query
      - Pacu iam__enum_permissions + iam__privesc_scan
      - ScoutSuite/Prowler IAM 분석
      negative_signs:
      - 단일 path 만 설명
      - IAM action 명 누락
      - 자동화 도구 언급 없음
  target_vm: attacker
  script: 'echo -e ''=== AWS IAM Privilege Escalation ===\n\n[21 Known IAM Privesc
    Paths (Rhino Security)]\n\n1. iam:CreatePolicyVersion\n   - Create new version
    of managed policy\n   - Set as default -> gain any permission\n\n2. iam:AttachUserPolicy\n   -
    Attach AdministratorAccess to self\n\n3. iam:PutUserPolicy\n   - Add inline policy
    with full access\n\n4. iam:CreateLoginProfile\n   - Create console password for
    another user\n\n5. iam:UpdateLoginProfile\n   - Reset another user password\n\n6.
    sts:AssumeRole\n   - Assume more privileged role\n\n7. lambda:CreateFunction +
    iam:PassRole\n   - Create Lambda with admin role\n   - Execute function -> admin
    access\n\n8. ec2:RunInstances + iam:PassRole\n   - Launch EC2 with admin instance
    profile\n   - SSH to instance -> admin via IMDS\n\n[Tool]\n- PACU: AWS exploitation
    framework\n- enumerate-iam: Brute-force IAM permissions\n- Cloudsplaining: IAM
    policy analysis'''
  risk_level: medium
  bastion_prompt: 'AWS IAM 권한 상승 경로를 분석해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: 클라우드 환경에서의 측면 이동을 분석하라. Cross-account role assumption과 VPC 피어링을 통한
    이동 기법을 설명하라.
  hint: sts:AssumeRole로 다른 계정에 접근하고, VPC 피어링으로 네트워크를 횡단한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: 클라우드 환경에서의 측면 이동을 분석하라. Cross-account role assumption과 VPC 피어링을
    통한 이동 기법을 설명해줘

    📎 참고 (CLI): echo -e ''=== Cloud Lateral Movement ===\n\n[Cross-Account Access]\naws
    sts assume-role --role-arn arn:aws:iam::ACCOUNT_B:role/CrossAccountRole --role-session-name
    attacker\n-> Temporary credentials for Account B\n\n[VPC Peering]\n- Peered VPCs
    share network connectivity\n- Security groups may allow peered VPC traffic\n-
    Pivot from compromised VPC to peered VPC\n\n[Service-Level Movement]\n- Lambda
    -> RDS: Shared VPC, read database\n- EC2 -> S3: Instance profile permissions\n-
    ECS -> Secrets Manager: Task role access\n\n[Multi-Cloud Pivot]\n- AWS -> Azure
    via federated identity\n- GCP -> AWS via OIDC federation\n\n[Kubernetes]\n- Pod
    -> Service Account -> Cloud IAM\n- IRSA (IAM Roles for Service Accounts)\n- Pod
    escape -> Node EC2 instance role\n\n[Detection]\n- CloudTrail: AssumeRole from
    unusual accounts\n- VPC Flow Logs: Unexpected cross-VPC traffic\n- GuardDuty:
