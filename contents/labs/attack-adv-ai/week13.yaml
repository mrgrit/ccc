    6. CloudTrail not enabled in all regions\n7. Default VPC security groups allow\
    \ all inbound\n\n[Recommendations Priority]\nP0: IMDSv2, MFA on root, Block Public\
    \ Access\nP1: IAM review, CloudTrail all regions, GuardDuty\nP2: IaC scanning,\
    \ SBOM, key rotation automation\nP3: Zero Trust migration, CSPM deployment\n\n\
    [MITRE ATT&CK Cloud Techniques Tested]\nT1078: Valid Accounts\nT1552: Unsecured\
    \ Credentials (IMDS)\nT1530: Data from Cloud Storage\nT1098: Account Manipulation\n\
    EOF\ncat /tmp/cloud_security_report.txt"
