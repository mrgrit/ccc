  answer: "\U0001F916 프롬프트: 클라우드 공격 실습을 종합하여 클라우드 보안 평가 보고서를 /tmp/cloud_security_report\
    \ 구현 방법과 예시를 설명해줘\n\U0001F4CE 참고 (CLI): cat > /tmp/cloud_security_report.txt <<\
    \ 'EOF'\n=== Cloud Security Assessment Report ===\n\n[Critical Findings]\n1. IMDS\
    \ v1 enabled: SSRF -> credential theft\n   Fix: Enforce IMDSv2 on all EC2 instances\n\
    2. Overly permissive IAM policies: iam:* on user\n   Fix: Least privilege, use\
    \ IAM Access Analyzer\n3. Public S3 buckets: Data exposure risk\n   Fix: Account-level\
    \ Block Public Access\n\n[High Findings]\n4. No MFA on root account\n5. Long-lived\
    \ access keys (>90 days)\n6. CloudTrail not enabled in all regions\n7. Default\
    \ VPC security groups allow all inbound\n\n[Recommendations Priority]\nP0: IMDSv2,\
    \ MFA on root, Block Public Access\nP1: IAM review, CloudTrail all regions, GuardDuty\n\
    P2: IaC scanning, SBOM, key rotation automation\nP3: Zero Trust migration, CSPM\
    \ deployment\n\n[MITRE ATT&CK Cloud Techniques Tested]\nT1078: Valid Accounts\n\
    T1552: Unsecured Credentials (IMDS)\nT1530: Data from Cloud Storage\nT1098: Account\
    \ Manipulation\nEOF\ncat /tmp/cloud_security_report.txt"
  answer_detail: 클라우드 보안 평가는 IAM, 네트워크, 스토리지, 로깅, 컴퓨팅의 5대 영역을 포괄해야 한다. IMDS v2 강제,
    루트 계정 MFA, S3 퍼블릭 접근 차단은 즉각적으로 적용해야 하는 P0 항목이다. 지속적인 CSPM과 IaC 스캐닝으로 설정 드리프트를
    방지하고, 제로 트러스트로의 전환을 장기 로드맵으로 수립한다.
  verify:
    type: output_contains
    expect: Cloud Security Assessment
    field: stdout
    semantic:
      intent: 클라우드 보안 평가 종합 리포트 — 공격 표면·주요 Findings·권장 개선책을 /tmp/cloud_security_report.txt
        에 구조화
      success_criteria:
      - '[Summary]/[Findings]/[Recommendations] 3 섹션 이상'
      - 각 섹션 3개 이상 항목 (IAM/Network/Data/Compute 등)
      - 파일 생성 후 cat 으로 검증
      acceptable_methods:
      - heredoc 으로 markdown 리포트
      - python jinja2 템플릿
      - json/yaml 로 구조화 후 포맷 변환
      - scout/prowler 결과 주입 자동화
      negative_signs:
      - 요약만 있고 근거 없음
      - Recommendations 누락
      - 파일 저장 없음
  target_vm: attacker
  script: "cat > /tmp/cloud_security_report.txt << 'EOF'\n=== Cloud Security Assessment\
