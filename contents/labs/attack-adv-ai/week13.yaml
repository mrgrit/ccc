lab_id: attack-adv-ai-week13
title: 클라우드 공격 (AI 지원)
version: ai
course: attack-adv-ai
week: 13
description: AWS, Azure, GCP 등 클라우드 환경의 고유한 공격 표면을 분석하고 시뮬레이션한다. IAM 오설정, 메타데이터 서비스
  공격, S3 버킷 노출, 서버리스 공격 등을 다룬다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 클라우드 환경의 고유한 공격 표면을 식별한다
- IAM, 스토리지, 메타데이터 서비스의 취약점을 악용한다
- 클라우드 보안 설정 검토 방법을 학습한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 클라우드 환경의 공격 표면을 분석하라. AWS/Azure/GCP의 주요 공격 벡터를 MITRE ATT&CK Cloud Matrix로
    분류하라.
  hint: IAM, 스토리지, 컴퓨팅, 네트워킹, 서버리스 등 각 서비스별 공격 표면을 정리한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 클라우드 환경의 공격 표면을 분석하라. AWS/Azure/GCP의 주요 공격 벡터를 MITRE ATT&CK Cloud
    Matrix로 분류해줘

    📎 참고 (CLI): echo -e ''=== Cloud Attack Surface (MITRE ATT&CK Cloud) ===\n\n[Initial
    Access]\n- Stolen credentials (phishing, leaked keys)\n- SSRF to metadata service\n-
    Exposed management consoles\n\n[Privilege Escalation]\n- IAM policy misconfiguration\n-
    Role assumption chains\n- Lambda function privilege abuse\n\n[Lateral Movement]\n-
    Cross-account role assumption\n- VPC peering exploitation\n- Shared storage (S3,
    GCS) access\n\n[Data Exfiltration]\n- S3 bucket to external account\n- Snapshot
    sharing\n- DNS over VPC\n\n[Persistence]\n- IAM user/key creation\n- Lambda backdoor\n-
    EC2 instance with reverse shell\n\n[Impact]\n- Cryptomining on compute\n- Data
    destruction\n- Resource hijacking'''
  answer_detail: 클라우드 공격 표면은 온프레미스와 다른 고유한 특성을 가진다. IAM은 가장 큰 공격 표면이며, 정책 오설정 하나로
    전체 계정이 장악될 수 있다. 메타데이터 서비스, 공개 스토리지, 서버리스 함수 등 클라우드 네이티브 서비스가 새로운 공격 벡터를 제공한다.
  verify:
    type: output_contains
    expect: Cloud Attack Surface
    field: stdout
    semantic:
      intent: 클라우드 공격 표면 분석 — AWS/Azure/GCP 주요 공격 벡터를 MITRE ATT&CK Cloud Matrix 카테고리별로
        분류
      success_criteria:
      - Initial Access/Persistence/Priv Esc/Defense Evasion/Credential Access/Discovery/Lateral
        Movement/Exfiltration 중 최소 4개 tactic 언급
      - 각 tactic 에 해당하는 AWS/Azure/GCP 공격 벡터 예시 1개 이상
      - MITRE ATT&CK Cloud Matrix URL 또는 주요 technique ID (T1078.004, T1098.001 등)
        최소 2개
      acceptable_methods:
      - attack.mitre.org/matrices/enterprise/cloud/ 참조
      - AWS Security Reference Architecture 매핑
      - CSA Cloud Controls Matrix
      - CloudGoat / SadCloud 실습 환경 언급
      negative_signs:
      - 단일 클라우드만 언급
      - tactic 분류 없이 공격 기법 나열만
      - MITRE ATT&CK 매핑 없음
  target_vm: attacker
  script: echo -e '=== Cloud Attack Surface (MITRE ATT&CK Cloud) ===\n\n[Initial Access]\n-
