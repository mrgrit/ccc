  - order: 2
    instruction: |
      ## 🎯 MISSION

      AAR (After-Action Report) — Coverage Matrix + Gap + 권장.

      ## 💻 산출물

      ```markdown
      # AAR — 6v6 W14 Purple Team Cycle

      ## Coverage Matrix
      | TTP | Red 실행 | Blue 탐지 | Coverage |
      | T1083 File Disc | ✓ | osquery / Wazuh syscheck (있다면) | 50-100% |
      | T1057 Process | ✓ | osquery / sysmon (있다면) | 100% |
      | T1018 Network | ✓ | Suricata ET SCAN | 100% |
      총 Coverage: 67-100%

      ## Gap
      1. T1083 의 syscheck rule 미정의 → W10 의 FIM 설정 보강
      2. T1057 의 process_events 비활성 → osqueryd schedule 설정

      ## 권장
      1. osquery FIM 확장 (file_paths /etc/*)
      2. Wazuh rule 100400 (file enum > 50 in 60s)
      3. sysmon-for-linux 본격 설치 (W11)
      ```
    hint: Coverage Matrix + Gap + 권장
