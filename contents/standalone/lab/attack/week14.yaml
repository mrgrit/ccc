lab_id: standalone-attack-week14
title: Caldera + Wazuh Purple Team — Coverage Matrix + AAR
version: standalone-non-ai
course: attack
week: 14
description: |
  Caldera (Red) + Wazuh (Blue) 협업. 3 TTP (T1083 / T1057 / T1018) 수동 시뮬 +
  Blue detection 측정 + Purple Coverage Matrix + AAR (After-Action Report).
difficulty: hard
duration_minutes: 150
prerequisites: [W13]
objectives:
  - "3 TTP 수동 실행 (Caldera 없이도)"
  - "Blue 3 source detection"
  - "Coverage Matrix + AAR"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION (3 TTP 실행 + Blue detection)

      **Red** 가 3 TTP (T1083 File Discovery / T1057 Process / T1018 Network) 수동
      실행 → **Blue** 가 3 source 추적.

      ## 💻 실행 명령

      ```bash
      # === T1083 File Discovery ===
      ssh 6v6-web 'find /etc -name "*.conf" 2>/dev/null | head -5'
      sleep 3
      ssh 6v6-siem 'sudo grep "syscheck\|file" /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -2 | head -1'

      # === T1057 Process Discovery ===
      ssh 6v6-web 'ps -ef 2>&1 | wc -l'
      ssh 6v6-web 'sudo osqueryi --json "SELECT count(*) FROM processes;"'

      # === T1018 Network Discovery (nmap) ===
      ssh 6v6-attacker 'timeout 8 nmap -sT -p 22,80 10.20.32.0/24 2>&1 | tail -3'
      sleep 5
      ssh 6v6-ips 'sudo tail -200 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\") | {sig:.alert.signature}" 2>/dev/null | tail -2'
      ```

      ## 📋 확인 사항

      - T1083 / T1057 / T1018 모두 실행
      - Blue detection: Wazuh syscheck / osquery / Suricata 알람

      ## 💡 왜 이걸 하는가?

      Purple Team standard — Red 실행 + Blue 측정 + Gap 식별.

      ## 🔍 결과 해석

      - **Coverage Matrix** 작성 (Red 실행 vs Blue 탐지)
    hint: 3 TTP + Blue 추적
    category: purpleteam
    points: 30
