  - order: 4
    instruction: |
      ## 🎯 MISSION (Red Team — Anti-Forensics 메커니즘)

      흔적 제거(Anti-Forensics, TA0005) 4 카테고리의 메커니즘을 분석하고 현재 환경의
      관련 흔적을 검사하라 (실 적용 X — 원리 이해 + 검사).

      ## 💻 산출물 + 검사

      ```bash
      ssh 6v6-bastion '
      echo "=== history 설정 (T1070.003) ==="
      echo "HISTFILE=$HISTFILE HISTSIZE=$HISTSIZE"
      echo "=== log 무결성 — auth/syslog 존재 (T1070.002) ==="
      ls -la /var/log/auth.log /var/log/syslog 2>/dev/null | head
      echo "=== shred/wipe 도구 존재 (T1070.004) ==="
      command -v shred wipe 2>/dev/null
      echo "=== timestomp — touch 로 mtime 변경 가능 (T1070.006) ==="
      command -v touch debugfs 2>/dev/null
      '
      ```

      ## 📋 Anti-Forensics 4 카테고리 (메커니즘)

      ```markdown
      | 카테고리 | 기법 | 탐지 우회 | ATT&CK | anti-anti-forensics |
      | history 제거 | unset HISTFILE / history -c | shell history 은폐 | T1070.003 | osquery shell_history(DB) |
      | log 변조 | sed -i / truncate /var/log | 침해 흔적 삭제 | T1070.002 | remote syslog(외부 보존) |
      | shred | shred -uvz / wipe | 파일 복구 불가 삭제 | T1070.004 | process_events(shred spawn) |
      | timestomp | touch -r / -t / debugfs | timestamp 위조 | T1070.006 | ctime vs mtime + FIM hash |
      ## 핵심: remote syslog 가 가장 강력한 anti-anti-forensics(log 외부 보존)
      ```

      ## 💡 왜 이걸 하는가?

      Anti-Forensics 는 침해 흔적을 제거해 탐지/대응을 방해한다. 각 기법의 anti-anti-
      forensics(대응)를 아는 것이 핵심 — 특히 *remote syslog* 는 host log 가 변조되어도
      외부 서버에 보존되므로 가장 강력하다. FIM 의 hash 비교는 timestomp 와 무관하게
      변조를 잡는다. 본 주차는 실 흔적 제거 없이 메커니즘과 대응만 학습한다.

