lab_id: standalone-attack-week12
title: 지속성 + 안티포렌식 (Persistence + Anti-Forensics) — 5 패턴 + R/B/P
version: standalone-non-ai
course: attack
week: 12
description: |
  PTES 6 단계 후반부 — 침투+권한상승 후 재진입 보장(Persistence) + 흔적 제거
  (Anti-Forensics). ATT&CK TA0003 + TA0005. **윤리 강조: 본 주차의 모든 기법은 검사·
  시뮬·detection 측면만 학습하고 실제 영구화(Persistence 적용)는 6v6 환경에서도 하지
  않는다** (다음 학기까지 흔적이 남고 강사 관리 부담). 학생은 (1) 5 Persistence 패턴
  (cron/systemd/.bashrc/SSH key/web shell)과 backdoor account/rootkit 의 메커니즘을
  이해하며 baseline 을 검사하고, (2) Anti-forensics 4 카테고리(history/log/shred/
  timestomp)의 원리를 이해하고, (3) Blue 관점에서 osquery 헌팅 + Wazuh FIM 으로
  탐지하며 그 한계(FIM 12시간 주기 = 즉시 탐지 못 함)를 식별하고, (4) Purple 관점에서
  방어 강화를 설계한다. 마지막 3 step 은 R/B/P 통합.
difficulty: hard
duration_minutes: 180
audience: 사이버공격 (12주차)
prerequisites: ["W11 권한 상승"]
objectives:
  - "5 Persistence 패턴 — cron/systemd/.bashrc/SSH key/web shell 메커니즘 + 검사"
  - "Rootkit(LD_PRELOAD/kernel module) + backdoor account 검사"
  - "Anti-forensics 4 카테고리 — history/log/shred/timestomp 원리"
  - "Blue — osquery 헌팅 + Wazuh FIM(rule 550/554) + 12시간 주기 한계"
  - "Purple — Coverage Matrix + Detection Gap + 방어 강화(realtime/remote syslog)"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION (Red Team — 5 Persistence 패턴 검사)

      bastion 의 5 persistence 카테고리를 **읽기 전용 검사** 하라 (실 적용 X). Docker
      컨테이너의 호스트와 다른 persistence 면(systemd 없음 등)을 인지하고 baseline 을
      확보한다.

      ## ⚠️ Docker 컨테이너 인지

      bastion 은 Docker 컨테이너로 호스트와 다르다:
      - `systemctl` 없음 → process 직접(`ps -ef`)
      - `/etc/crontab` 없음 → `/etc/cron.d/*` 만
      - authorized_keys 는 자동 배포된 인프라 key 존재(`6v6-bastion@auto`)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-bastion '
      echo "=== 1. cron (Docker: cron.d 만) ==="
      ls /etc/cron.d/ 2>/dev/null; [ -f /etc/crontab ] && cat /etc/crontab | head || echo "  /etc/crontab 없음(Docker 정상)"
      echo "=== 2. systemd / process ==="
      command -v systemctl >/dev/null && systemctl list-unit-files --type=service 2>/dev/null | grep enabled | head || echo "  systemctl 없음 → Docker(ps -ef 로 대체)"
      echo "=== 3. .bashrc / .profile ==="
      tail -3 ~/.bashrc 2>/dev/null; tail -3 ~/.profile 2>/dev/null
      echo "=== 4. SSH authorized_keys ==="
      cat ~/.ssh/authorized_keys 2>/dev/null | head -2 || echo "  없음"
      echo "=== 5. web shell (/var/www) ==="
      find /var/www -name "*.php" 2>/dev/null | head || echo "  /var/www 없음(web 컨테이너에서 검사)"
      '
      ```

      ## 📋 확인 사항

      - cron.d: e2scrub_all(표준), /etc/crontab 없음(Docker)
      - systemctl 없음 = Docker 컨테이너(ps -ef 로 process 확인)
      - .bashrc: 표준(backdoor 라인 추가 없음)
      - authorized_keys: `6v6-bastion@auto`(자동 배포 인프라 key — 백도어 아님)
      - /var/www 없음 = bastion 은 web role 아님

      ## 💡 왜 이걸 하는가?

      Persistence(ATT&CK TA0003)는 침투 후 재진입 보장이다. 검사의 핵심은 *정상 baseline
      과 비교* — 어느 cron/key/bashrc 가 정상이고 무엇이 추가되었는가. Docker 컨테이너는
      호스트와 persistence 면이 다르므로(systemd 없음 등) 그 차이를 아는 것이 컨테이너
      운영 IR 의 기반이다.

      ## 🔍 결과 해석

      - 5 카테고리 모두 표준 = baseline 깨끗(침해 흔적 0)
      - authorized_keys 의 `@auto` key = 정상 인프라 키, 알 수 없는 key 추가 시 의심
      - 추가 cron/bashrc 라인/새 key = persistence 의심 → IR

      ## ⚠️ 비정상 시 대응

      - cron.d 비어있음 — `ps -ef | grep cron` 으로 cron service 확인
      - authorized_keys 에 `@auto` 외 key — 비인가 key 의심, comment/timestamp 분석
    hint: |
      5 패턴 검사(cron.d/systemctl없음/bashrc/ssh key/var-www). Docker = systemd/crontab
      없음 정상. authorized_keys 의 @auto 는 자동키. baseline 과 비교가 핵심.
