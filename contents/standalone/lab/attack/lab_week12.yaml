  - order: 2
    instruction: |
      ## 🎯 MISSION (Red Team — backdoor account + rootkit 검사)

      Persistence 의 고급 패턴 — UID 0 백도어 계정, LD_PRELOAD/kernel module rootkit 의
      흔적을 검사하라 (실 적용 X — 검사만).

      ## 💻 실행 명령

      ```bash
      ssh 6v6-bastion '
      echo "=== UID 0 계정 (root 외 백도어?) ==="
      grep -E ":0:[0-9]*:" /etc/passwd
      echo "=== /etc/ld.so.preload (userland rootkit) ==="
      ls -la /etc/ld.so.preload 2>&1 | head -1
      echo "=== LD_PRELOAD 사용 process ==="
      for pid in $(ps -e -o pid --no-header 2>/dev/null); do
        grep -aoz "LD_PRELOAD=[^[:cntrl:]]*" /proc/$pid/environ 2>/dev/null
      done | head; echo "(출력 없으면 정상)"
      echo "=== kernel module (비표준?) ==="
      lsmod 2>/dev/null | head -5 || cat /proc/modules 2>/dev/null | head -5
      '
      ```

      ## 📋 확인 사항

      - UID 0: root 만 (root 외 UID 0 = 백도어 계정)
      - /etc/ld.so.preload: 없음 (존재 시 userland rootkit 의심)
      - LD_PRELOAD process: 없음 (있으면 hook 의심)
      - kernel module: 표준(mptcp_diag/xsk_diag 등) — 비표준 시 LKM rootkit 의심

      ## 💡 왜 이걸 하는가?

      백도어 계정(T1136)과 rootkit(T1014)은 탐지가 어려운 고급 persistence 다. UID 0
      계정은 root 와 동등하므로 root 외 UID 0 은 즉시 침해 신호다. LD_PRELOAD/kernel
      module rootkit 은 syscall 을 후킹해 파일/process 를 숨긴다. 이들의 존재 여부를
      검사하는 것이 침해 대응의 핵심이다.

      ## 🔍 결과 해석

      - UID 0 = root 만 + ld.so.preload 없음 + LD_PRELOAD 없음 + 표준 module = rootkit 흔적 0
      - root 외 UID 0 / ld.so.preload 존재 / 비표준 module = 즉시 IR

      ## ⚠️ 비정상 시 대응

      - lsmod 없음(컨테이너) — `cat /proc/modules` 또는 host 의 module 상속 확인
      - root 외 UID 0 발견 — `userdel` 전 증거 보존(forensics), 강사 보고
    hint: |
      backdoor account(UID0 root만) + rootkit(ld.so.preload 없음/LD_PRELOAD 없음/표준
      module). root 외 UID0·ld.so.preload 존재·비표준 module = 침해 신호.
    category: simulation
    points: 10
    answer: |
      ssh -n 6v6-bastion '
      echo "=== UID 0 ==="; grep -E ":0:[0-9]*:" /etc/passwd
      echo "=== ld.so.preload ==="; ls -la /etc/ld.so.preload 2>&1 | head -1
      echo "=== kernel module ==="; lsmod 2>/dev/null | head -5 || cat /proc/modules 2>/dev/null | head -5
      '
    answer_detail: |
      UID 0: root 만(root:x:0:0). /etc/ld.so.preload 없음(userland rootkit 흔적 0).
      LD_PRELOAD process 없음. kernel module: mptcp_diag/xsk_diag/raw_diag(표준). rootkit
      + backdoor 흔적 0. root 외 UID 0/ld.so.preload 존재/비표준 module 시 침해.
    verify:
      type: output_contains
      expect: root
      field: stdout
      semantic:
        intent: Red — backdoor account + rootkit(LD_PRELOAD/kernel module) 검사.
        success_criteria: ["UID 0 계정", "ld.so.preload 검사", "kernel module 검사"]
        acceptable_methods:
          - |
            **[OSS] grep UID 0** — 백도어 계정 탐지.
              ssh 6v6-bastion 'grep -E ":0:[0-9]*:" /etc/passwd'
            예상 출력 `root 만`.
            운영 해석: root 외 UID 0 = 백도어(T1136).
          - |
            **[OSS] ld.so.preload + LD_PRELOAD** — userland rootkit.
              ls /etc/ld.so.preload; /proc/*/environ grep LD_PRELOAD
            예상 출력 `없음`.
            운영 해석: 존재 시 syscall hook rootkit.
          - |
            **[OSS] lsmod / kernel_modules** — LKM rootkit.
            예상 출력 `표준 module`.
            운영 해석: 비표준 module = kernel rootkit(T1014).
        negative_signs: ["UID 0 검사 누락", "rootkit 카테고리 일부만"]
    target_vm: bastion
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION (Red Team — Persistence 메커니즘 분석)

      5 패턴 + backdoor 의 **공격 메커니즘과 ATT&CK Technique** 를 분석표로 작성하라
      (개념 — 실제 persistence 적용 X). 각 패턴이 어떻게 재진입을 보장하는지 설명한다.

      ## 💻 산출물 (Persistence 메커니즘 분석)

      ```markdown
      # W12 Persistence 메커니즘 분석 (실 적용 X)
      | 패턴 | 메커니즘 | 재진입 트리거 | ATT&CK |
      |------|----------|--------------|--------|
      | cron | /etc/cron.d/* 에 주기 실행 등록 | 5분 주기 등 | T1053.003 |
      | systemd | .service + Restart=always | 부팅/crash 시 | T1543.002 |
      | .bashrc | SSH login 시 실행 라인 추가 | 사용자 login | T1546.004 |
      | SSH key | authorized_keys 에 공격자 key | 비번 없이 SSH | T1098.004 |
      | web shell | /var/www 에 PHP shell | HTTP 요청 | T1505.003 |
      | backdoor 계정 | /etc/passwd UID 0 추가 | su/login | T1136 |
      ## Volatile vs Persistent: 위 패턴은 모두 Persistent(재부팅 후 자동 재실행)
      ## 본 환경: 실제 적용 X — 검사로 baseline 깨끗 확인(STEP 1/2)
      ```

      ## 📋 채점

      - 6 패턴 × 메커니즘 × 재진입 트리거 × ATT&CK Technique
      - Volatile vs Persistent 구분

      ## 💡 왜 이걸 하는가?

      각 persistence 패턴이 *어떻게 재진입을 보장하는지* 이해해야 Blue 가 무엇을 어디서
      탐지할지 안다. cron 은 주기 실행, systemd 는 부팅 자동시작, .bashrc 는 login 트리거
      등 트리거가 다르므로 탐지 지점도 다르다. 실제 적용 없이 메커니즘만 학습하는 것이
      본 주차의 윤리적 원칙이다(흔적 미생성).

      ## 🔍 결과 해석

      - 6 패턴의 트리거 차이 = Blue 의 탐지 지점 차이(STEP 6/7)
      - 모두 Persistent = 재부팅으로 안 사라짐 → FIM/osquery 정기 헌팅 필요
