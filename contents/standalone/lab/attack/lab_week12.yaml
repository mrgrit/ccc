  - order: 10
    instruction: |
      ## 🎯 MISSION (Cleanup)

      실습 중 FIM 검증을 위해 변경한 파일(있다면)을 복구하고, 본 주차의 윤리 원칙대로
      persistence 가 실제로 적용되지 않았음을 확인하라.

      ## ⚠️ Docker bind mount 주의

      `/etc/hosts` 등 docker bind mount 파일은 `sed -i`(임시파일+rename)가 "Device or
      resource busy" 로 실패한다. **cat 방식**(truncate+write)으로 in-place 복구한다.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-web '
      # FIM 검증용 변경이 있었다면 cat 방식 복구 (sed -i 는 bind mount 에서 실패)
      if grep -q "# fimtest_" /etc/hosts 2>/dev/null; then
        grep -v "# fimtest_" /etc/hosts > /tmp/h && cat /tmp/h > /etc/hosts && rm -f /tmp/h
        echo "fimtest 복구 완료"
      else
        echo "변경 없음 (복구 불필요)"
      fi
      '
      # persistence 미적용 확인 — UID 0 root 만, 의심 cron 없음 (윤리 원칙 준수)
      ssh 6v6-bastion '
      echo "=== UID 0 = root 만? (백도어 미생성) ==="; grep -E ":0:[0-9]*:" /etc/passwd
      echo "=== cron.d 표준? (의심 cron 미추가) ==="; ls /etc/cron.d/
      '
      echo "=== cleanup 완료 ==="
      ```

      ## 📋 확인 사항

      - FIM 검증 변경 복구 (cat 방식 — bind mount sed 불가)
      - UID 0 = root 만 (백도어 계정 미생성)
      - cron.d 표준 (의심 cron 미추가)
      - persistence 실제 미적용 (본 주차 윤리 원칙)

      ## 💡 왜 이걸 하는가?

      본 주차의 윤리 원칙은 "검사·시뮬만, 실 적용 X" 다. cleanup 에서 (1) FIM 검증 변경을
      복구하고 (2) persistence 가 실제로 생성되지 않았음(UID 0 root 만, cron 표준)을
      확인해 학습 환경이 깨끗하게 유지됨을 보장한다. 특히 bind mount 파일은 sed -i 가
      실패하므로 cat 방식 복구를 익혀야 한다.

      ## 🔍 결과 해석

      - 복구 완료 + persistence 미적용 = 학습 환경 무결성 유지
      - UID 0 root 만 = 윤리 원칙 준수(백도어 미생성)

      ## ⚠️ 비정상 시 대응

      - sed -i 실패(Device busy) — bind mount, `grep -v ... > /tmp/h && cat /tmp/h > 파일`
      - root 외 UID 0 발견 — 실습 중 백도어 생성, 즉시 제거 후 보고
