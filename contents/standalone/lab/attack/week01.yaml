lab_id: standalone-attack-week01
title: 침투 테스트 환경 점검 — 6v6 attacker 컨테이너 + 8 vuln + RoE
version: standalone-non-ai
course: attack
week: 1
description: |
  6v6-attacker 컨테이너의 13 침투 도구 가용성 + 8 vuln 사이트 도달성 + PTES 7 단계
  + MITRE ATT&CK 14 Tactic + RoE (Rules of Engagement) 학습.
difficulty: easy
duration_minutes: 90
prerequisites:
  - "secuops W01 통과 — 6v6 4-tier 인프라 인지"
  - "bastion ProxyJump + attacker 직접 진입 (2202)"
objectives:
  - "13 침투 도구 (nmap/sqlmap/hydra/nikto/ffuf/burp/msfconsole/john/hashcat/scapy/...)"
  - "8 vuln 사이트 (juice/dvwa/neobank/govportal/mediforum/admin/ai/landing) 도달성"
  - "PTES 7 단계 + MITRE ATT&CK 14 Tactic 매핑"
  - "RoE — 본 환경 내부만 합법, 외부 공격 금지"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## Mission
      attacker 컨테이너 (10.20.30.202) 에 진입해 *침투 테스트 단계별 핵심 도구* 13 개의
      설치 여부를 확인하고, 누락 시 그 도구가 어느 PTES 단계 / MITRE ATT&CK Tactic 의
      작업에 쓰이는지 매핑하라. W02 이후 모든 실습의 *전제 조건* — 도구 누락 시 후속
      lab 진행 불가. 본 step 종료 후 학생은 "어떤 도구가 어느 공격 단계에 쓰이는가" 를
      외울 수 있어야 한다.

      ## 13 도구의 카테고리별 분류 (외워야 함)
      | 카테고리 | ATT&CK Tactic | 도구 |
      |---------|:-------------:|------|
      | Reconnaissance — 정찰 | TA0043 | nmap · dirb · gobuster · ffuf |
      | Initial Access — 초기 침투 | TA0001 | sqlmap · nikto |
      | Credential Access — 자격 증명 | TA0006 | hydra · john · hashcat |
      | Exfiltration — 데이터 유출 | TA0010 | tcpdump |
      | Multi-purpose — 범용 | (다단계) | scapy · msfconsole · searchsploit |

      ## 실행 절차 (3 단계)
      1. **attacker 진입** — 학생 PC 에서 `ssh 6v6-attacker` (port 2202, password ccc).
         프롬프트가 `ccc@attacker:~$` 로 바뀌면 성공.
      2. **13 도구 가용성 매트릭스** — `which <tool>` 또는 `command -v <tool>` 으로
         13 도구 각각의 PATH 출력. 누락 도구는 ✗ 로 표시.
      3. **핵심 도구 버전 확인** — Recon 의 nmap (`nmap -V | head -1`) 과 Initial
         Access 의 nikto (`nikto -Version | head -3`) 의 *정확한 버전* 기록. 후속
         step 에서 CVE 검색에 활용.

      ## 실행 명령 (전체)
      ```bash
      # 1) attacker 진입
      ssh 6v6-attacker
      # password: ccc

      # 2) 13 도구 매트릭스
      for tool in nmap sqlmap hydra nikto ffuf john hashcat tcpdump scapy msfconsole searchsploit dirb gobuster; do
        path=$(which $tool 2>/dev/null)
        if [ -n "$path" ]; then echo "✓ $tool  →  $path"
        else echo "✗ $tool  →  미설치"
        fi
      done

      # 3) 핵심 도구 버전
      nmap -V | head -1            # 예: Nmap version 7.94SVN
      nikto -Version | head -3     # 예: Nikto v2.5.0
      ```

      ## 성공 판정 (모두 충족해야 pass)
      - SSH 접속 성공 — 프롬프트가 `ccc@attacker:~$`
      - 13 도구 중 *핵심 5 도구* (nmap, sqlmap, hydra, nikto, ffuf) 모두 ✓
      - nmap / nikto 의 버전 string 추출 (CVE 검색용)
      - 누락 도구가 있으면 그 도구의 *PTES 단계 + ATT&CK Tactic 매핑* 명시

      ## 비정상 시 대응
      - **SSH 접속 실패** (`Connection refused`) — VM 호스트에서
        `docker ps | grep 6v6-attacker` 로 컨테이너 가동 확인.
        down 상태면 `bash 6v6.sh up` 으로 기동.
      - **도구 1+ 개 누락** — attacker Dockerfile (apps/6v6/attacker/Dockerfile) 의
        apt 패키지 추가 후 `bash 6v6.sh rebuild attacker`. 누락 도구가 *Multi-purpose*
        (msfconsole) 이면 별도 설치 절차 필요 (apt-get install metasploit-framework).
      - **버전 정보 비정상** — nmap < 7.0 또는 nikto < 2.5 면 일부 NSE/플러그인 미지원.
        Dockerfile 갱신 권장.

    hint: |
      도구 가용성은 `which <tool>` (PATH 검색) 이 가장 단순. 출력 라인 = 절대경로.
      누락은 빈 출력 + exit code 1. 13 도구 loop 는 위 bash for. nmap·nikto 만
      version string 추출 (CVE 매칭 입력).

    category: survey
    points: 15
    answer: |
      # 학생 PC 에서 (한 줄 명령 — bastion 검증 시 자동 실행 가능)
      ssh 6v6-attacker '
        for tool in nmap sqlmap hydra nikto ffuf john hashcat tcpdump scapy msfconsole searchsploit dirb gobuster; do
          path=$(which $tool 2>/dev/null)
          [ -n "$path" ] && echo "✓ $tool: $path" || echo "✗ $tool: 미설치"
        done
        echo "--- versions ---"
        nmap -V | head -1
        nikto -Version 2>&1 | head -3
      '
    answer_detail: |
      13 도구 가용성 매트릭스 + 핵심 2 도구 (nmap/nikto) 버전. 출력에 ✓ 가 *최소 10
      개*, 핵심 5 도구 (nmap/sqlmap/hydra/nikto/ffuf) 모두 ✓. nmap 버전은 *>= 7.0*,
      nikto 버전은 *>= 2.5* 권장 — 미달 시 NSE/플러그인 일부 미지원으로 후속 주차
      영향. 핵심 도구 누락은 컨테이너 빌드 결함 → Dockerfile 정정.
    verify:
      type: output_contains
      expect: 'nmap'
      field: stdout
      semantic:
        intent: |
          attacker 컨테이너의 13 침투 도구 가용성 매트릭스 + 핵심 2 도구 (nmap/nikto)
          버전 확인. 단순 *명령 실행* 이 아니라, 누락 시 어느 PTES 단계 / ATT&CK Tactic
          의 작업이 영향받는지 학생이 *매핑* 할 수 있어야 한다.
        success_criteria:
          - "ssh 6v6-attacker 접속 성공 — 프롬프트 ccc@attacker:~$ 확인"
          - "13 도구 매트릭스 출력 (✓/✗ 표시) — 13 라인"
          - "핵심 5 도구 (nmap, sqlmap, hydra, nikto, ffuf) 모두 ✓ 표시"
          - "nmap 버전 string (예: Nmap version 7.94) 추출"
          - "nikto 버전 string (예: Nikto v2.5) 추출"
          - "누락 도구가 있다면 그 도구의 ATT&CK Tactic 매핑 (TA0043 Recon 등) 명시"
        acceptable_methods:
          - "which (PATH 검색, 표준): `which nmap` → `/usr/bin/nmap`. 없으면 빈 출력 + exit 1."
          - "command -v (POSIX 표준): `command -v sqlmap` → `/usr/bin/sqlmap`. which 가 없는 minimal shell 에서 사용."
          - "type (bash 내장): `type -p hydra` → `hydra is /usr/bin/hydra`. alias·function 까지 식별."
          - "dpkg -l (Debian/Ubuntu 패키지 DB): `dpkg -l | grep -E 'nmap|sqlmap'`. 패키지명 + 버전 + 설명."
          - "apt list --installed: `apt list --installed 2>/dev/null | grep nmap` → 패키지 버전. dpkg 와 동등."
          - "버전 직접: `nmap -V`, `sqlmap --version`, `hydra -h | head -2`, `nikto -Version`. 도구 자체의 자기 보고."
          - "msfconsole (대화형): `msfconsole -q -x 'version; exit'`. 일반 which 로도 충분."
          - "Bastion AI 자동 매트릭스: bastion 이 (1) 13 도구 loop 자동 (2) 누락 도구의 Tactic 자동 매핑 → KG anchor."
        negative_signs:
          - "단일 도구 1 개만 확인 (13 도구 loop 누락)"
          - "도구 가용성만 보고 버전 정보 누락"
          - "누락 도구 발견했으나 그 도구의 Tactic 매핑 미실시"
          - "ssh 접속 실패 후 attacker 컨테이너 가동 확인 절차 누락"
    target_vm: attacker

  - order: 2
    instruction: |
      ## Mission
      attacker (10.20.30.202) 에서 fw 의 외부 endpoint (10.20.30.1:80) 로 *Host 헤더*
      를 바꿔가며 8 개 vhost (juice / dvwa / neobank / govportal / mediforum / admin /
      ai + 6v6.lab 랜딩) 에 도달성 검증을 수행하라. **각 요청이 4-tier 토폴로지의
      어느 경로를 통과하는지** 학생이 매핑할 수 있어야 한다 — 본 step 은 단순 도달성
      체크가 아니라 *6v6 의 보안 차폐 흐름* 을 *공격자 관점에서* 처음으로 확인하는
      learning gate.

      ## 4-tier 토폴로지 — vhost 요청의 경로 (외워야 함)
      ```
      attacker (ext .202)
         │  curl -H "Host: juice.6v6.lab" http://10.20.30.1/
         ▼
      fw (ext .1 → pipe .1)              ← nftables 1 차 필터 + HAProxy
         │
         ▼
      ips (pipe .2 → dmz .1)             ← Suricata inline + nftables 2 차
         │
         ▼
      web (dmz .80 → int .80)            ← Apache + ModSecurity (3 차) + reverse proxy
         │  Host 헤더로 vhost 판정 → 정확한 int 백엔드로 forward
         ▼
      int 백엔드 (10.20.40.81~87)         ← juiceshop / dvwa / neobank / ... 실제 앱
         │
         ▼ (HTTP 응답 역방향)
      attacker 출력
      ```
      *모든 응답은 4 tier 를 왕복* 한다. 응답 코드가 비정상이면 어느 tier 의 문제인지
      추적해야 함 (§ 비정상 시 대응).

      ## 8 vhost 의 int 백엔드 매핑
      | vhost | int 백엔드 | 백엔드 IP |
      |-------|----------|----------|
      | `6v6.lab` (랜딩) | web 자체 (백엔드 X) | (dmz .80) |
      | `juice.6v6.lab` | juiceshop:3000 | 10.20.40.81 |
      | `dvwa.6v6.lab` | dvwa:80 | 10.20.40.82 |
      | `neobank.6v6.lab` | neobank:3001 | 10.20.40.83 |
      | `govportal.6v6.lab` | govportal:3002 | 10.20.40.84 |
      | `mediforum.6v6.lab` | mediforum:3003 | 10.20.40.85 |
      | `admin.6v6.lab` | adminconsole:3004 | 10.20.40.86 |
      | `ai.6v6.lab` | aicompanion:3005 | 10.20.40.87 |

      ## 실행 절차
      1. attacker 진입 (이미 step 1 에서) — `ssh 6v6-attacker`
      2. 8 vhost 도달성 loop — fw endpoint (10.20.30.1) 에 Host 헤더만 바꿔서 GET
      3. 각 응답의 *status code* + *Server 헤더* + *응답 size* 기록
      4. 비정상 응답 (5xx) 발견 시 § 비정상 대응 으로 진단

      ## 실행 명령 (전체)
      ```bash
      ssh 6v6-attacker '
        for h in 6v6 juice dvwa neobank govportal mediforum admin ai; do
          out=$(curl -s -o /tmp/body.html -w "code=%{http_code} size=%{size_download} server=%{header_json}" \
                    -H "Host: $h.6v6.lab" http://10.20.30.1/ 2>/dev/null)
          echo "$h.6v6.lab → $out"
        done
        echo "--- 핵심 vhost body 첫 줄 ---"
        for h in juice dvwa; do
          curl -s -H "Host: $h.6v6.lab" http://10.20.30.1/ | head -1
        done
      '
      ```

      ## 응답 코드별 의미
      | code | 의미 | 정상? |
      |:----:|------|:----:|
      | 200 | 정상 응답 (랜딩, dvwa 등) | ✓ |
      | 301/302 | redirect (juice 의 /#/ 로) | ✓ |
      | 403 | ModSecurity 차단 — User-Agent 의심 또는 ModSec rule | △ (rule 점검) |
      | 404 | vhost 없음 (Apache vhost 미설정) 또는 int 백엔드의 path 부재 | ✗ |
      | 500 | int 백엔드의 application error | ✗ |
      | 502/503 | int 백엔드 down (juiceshop/dvwa 컨테이너 미가동) | ✗ |
      | 504 | int 백엔드 timeout 또는 web reverse proxy 의 connect 실패 | ✗ |
      | (no response) | fw 또는 ips 의 nftables 차단 (drop) | ✗ |

      ## 성공 판정 (모두 충족)
      - 8 vhost 모두 응답 받음 (no response 없음 — fw/ips drop X)
      - 8 vhost 중 *최소 7 개* 가 200/301/302 (정상)
      - 6v6.lab (랜딩) 은 반드시 200 (web 자체 페이지)
      - 8 vhost 모두에서 Server 헤더 `Apache` 또는 backend 의 server 식별

      ## 비정상 시 대응 — 4-tier 진단 매트릭스
      | 증상 | 추정 tier | 진단 명령 (호스트 또는 6v6-fw exec) |
      |------|----------|---------------------------------|
      | no response, all 8 vhost | fw nftables drop | `docker exec 6v6-fw nft list ruleset \| head` |
      | no response, 1 vhost 만 | web 의 vhost 미설정 또는 int down | `docker exec 6v6-web apache2ctl -S` (vhost 11 종 listing) |
      | 503 (Service Unavailable) | int 백엔드 컨테이너 down | `docker ps -a \| grep 6v6-{juiceshop,dvwa,...}` (Exited 확인) |
      | 504 (Gateway Timeout) | web → int 의 reverse proxy connect 실패 | `docker exec 6v6-web nc -z 10.20.40.81 3000` (백엔드 포트 확인) |
      | 502 (Bad Gateway) | int 백엔드의 응답이 잘못된 형식 | `docker logs 6v6-juiceshop --tail 20` |
      | 403 (Forbidden) | ModSecurity rule 차단 | `docker exec 6v6-web tail -10 /var/log/apache2/modsec_audit.log` |
      | 404 (Not Found) | path 미설정 또는 vhost backend pool 비어있음 | `curl -v -H "Host: ..." http://10.20.30.1/` 의 X-* 헤더 확인 |

    hint: |
      fw 의 .1 (ext) endpoint 에 Host 헤더만 바꿔 8 vhost 모두 시도. curl 의 -o
      /dev/null + -w "%{http_code}" 가 status 만 추출. 응답 받지 못하면 fw 차단 →
      nft list ruleset 확인. 503 은 int down → docker ps 로 컨테이너 상태 확인.

    category: survey
    points: 15
    answer: |
      ssh 6v6-attacker '
        for h in 6v6 juice dvwa neobank govportal mediforum admin ai; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $h.6v6.lab" http://10.20.30.1/)
          echo "$h.6v6.lab: $code"
        done
      '
    answer_detail: |
      8 vhost 도달성 매트릭스. 모든 응답이 ext→fw→ips→dmz→int 4-tier 를 통과한다.
      8 vhost 중 7 개 이상이 200/302 면 *4-tier 정상 가동* 확인. 503 발생 시 해당
      vhost 의 int 백엔드 컨테이너 진단 (`docker ps -a | grep 6v6-{name}`). no
      response 면 fw 또는 ips 의 nftables drop — 컨테이너 가동 + 룰셋 점검.
    verify:
      type: output_contains
      expect: '200\|302'
      field: stdout
      semantic:
        intent: |
          fw → ips → web → int 4-tier 토폴로지를 통과하는 8 vhost 도달성 매트릭스
          작성. 단순 status code 출력이 아니라, *각 응답이 어느 tier 의 어느 컨테이너
          를 통과하는지* 학생이 매핑할 수 있어야 한다. 비정상 응답 시 어느 tier 의
          문제인지 진단 절차까지 수행.
        success_criteria:
          - "8 vhost 모두 응답 받음 (no response 0 건 — fw/ips drop X)"
          - "8 vhost 중 최소 7 개가 200 또는 301/302"
          - "6v6.lab (랜딩) 반드시 200"
          - "비정상 응답 (5xx) 발견 시 어느 tier 의 문제인지 § 비정상 대응 표 기준 진단"
          - "8 vhost 매핑 표 정확 인지 — juice→81, dvwa→82, neobank→83 등 int 백엔드 IP"
        acceptable_methods:
          - "curl -H Host (수기 baseline): 명령 `curl -s -o /dev/null -w '%{http_code}' -H 'Host: juice.6v6.lab' http://10.20.30.1/`. 출력 `200` 또는 `302`. Host 헤더로 reverse proxy 가 vhost 판정."
          - "curl -I (HEAD): 명령 `curl -I -H 'Host: juice.6v6.lab' http://10.20.30.1/`. body 없이 헤더만 — Server / X-Powered-By 등 식별. 빠름."
          - "wget --spider: 명령 `wget -q --spider --header='Host: juice.6v6.lab' http://10.20.30.1/`. exit code 0 = 도달성 OK."
          - "httpie: 명령 `http --print=h --header 'Host: juice.6v6.lab' http://10.20.30.1/`. 가독성 + JSON 응답 친화."
          - "httpx (병렬): 명령 `echo 'http://10.20.30.1/' | httpx -H 'Host: juice.6v6.lab' -status-code -tech-detect`. 1500+ tech detection."
          - "nmap http-* NSE: 명령 `sudo nmap -p 80 --script=http-headers --script-args 'http.host=juice.6v6.lab' 10.20.30.1`. 헤더 + redirect chain."
          - "직접 int 접근 (참고): 명령 `curl -s http://10.20.40.81:3000/` (juiceshop 직접). 단 ips/web 우회 — 학습 외 도구."
          - "Bastion AI 자동 도달성 매트릭스: bastion 이 (1) 8 vhost loop 자동 (2) 5xx 발생 시 docker ps 자동 (3) ModSec audit log 자동 grep → finding anchor."
        negative_signs:
          - "vhost 1~2 개만 시도 (8 vhost loop 누락)"
          - "응답 코드만 보고 5xx 발생 시 어느 tier 의 문제인지 추적 안 함"
          - "no response (fw drop) 발생 시 nft list ruleset 점검 누락"
          - "Host 헤더 없이 http://10.20.30.1/ 만 GET — vhost 판정 안 되어 default 응답만"
          - "8 vhost 의 int 백엔드 매핑 (.81~.87) 인지 못함"
    target_vm: attacker

  - order: 3
    instruction: |
      ## Mission
      본 과목 15 주차의 학습 로드맵을 **PTES 7 단계** 와 **MITRE ATT&CK 14 Tactic** 의
      두 축에 매핑한 표를 작성하라. 단순 정리가 아니라 *"이 과목을 마치면 PTES 의 어느
      단계까지, ATT&CK 의 어떤 Tactic 까지 수행할 수 있는가"* 를 학생이 자기 언어로
      답할 수 있어야 한다. 본 step 은 책상 작업 (실행 명령 없음) 이지만 학습 동기·
      방향을 잡는 *과목 전체의 mental map* 이므로 가장 중요한 W01 산출물.

      ## PTES 7 단계 (영문 + 정의)
      | # | PTES 단계 | 영문 | 정의 |
      |:-:|---------|------|------|
      | 1 | 사전 협의 | Pre-engagement Interactions | RoE 합의, 범위/일정/연락책 정의 |
      | 2 | 정보 수집 | Intelligence Gathering | 수동(OSINT) + 능동(scan) 정찰 |
      | 3 | 위협 모델링 | Threat Modeling | 자산·위협·공격 경로 우선순위 |
      | 4 | 취약점 분석 | Vulnerability Analysis | 자동(scanner) + 수동 검증 |
      | 5 | 악용 | Exploitation | 발견 취약점의 실제 권한 획득 |
      | 6 | 사후 악용 | Post Exploitation | 권한 상승 + 지속성 + 측면 이동 |
      | 7 | 보고 | Reporting | 발견·재현·완화·관리 보고서 작성 |

      ## MITRE ATT&CK 14 Tactic (Enterprise)
      | 코드 | Tactic | 한국어 |
      |------|--------|--------|
      | TA0043 | Reconnaissance | 정찰 |
      | TA0042 | Resource Development | 자원 개발 |
      | TA0001 | Initial Access | 초기 침투 |
      | TA0002 | Execution | 실행 |
      | TA0003 | Persistence | 지속성 |
      | TA0004 | Privilege Escalation | 권한 상승 |
      | TA0005 | Defense Evasion | 방어 회피 |
      | TA0006 | Credential Access | 자격 증명 |
      | TA0007 | Discovery | 내부 정찰 |
      | TA0008 | Lateral Movement | 측면 이동 |
      | TA0009 | Collection | 수집 |
      | TA0011 | Command and Control | C2 통신 |
      | TA0010 | Exfiltration | 유출 |
      | TA0040 | Impact | 영향 |

      ## 산출물 형식 (markdown table)
      ```markdown
