      # 학생 자기 점검 (3 질문)
      1. PTES 의 단계 중 본 과목이 *깊이 다루지 않는* 단계는? (정답: 3 Threat Modeling, 7 Reporting 일부)
      2. ATT&CK 의 Tactic 중 본 과목이 *전혀 다루지 않는* 것은? (정답: TA0042 Resource Development — 외부 인프라 준비)
      3. 본 과목 종료 후 *수행 가능한 ATT&CK Tactic 수* 는? (정답: 11~12 / 14)
      ```

      ## 실행 절차 (책상 작업)
      1. PTES 공식 문서 (http://www.pentest-standard.org/) 의 7 단계 본문 확인
      2. MITRE ATT&CK Navigator (https://mitre-attack.github.io/attack-navigator/) 의 14 Tactic 확인
      3. 본 과목 syllabus (lecture/attack/week01-15.md 의 title) 와 매핑
      4. 위 산출물 형식에 따라 15 행 작성
      5. 자기 점검 3 질문 답변

      ## 성공 판정
      - 15 행 모두 작성 — PTES 단계 + ATT&CK Tactic + 핵심 도구 (step 1 의 13 도구 중) 매핑
      - 자기 점검 3 질문 답변 — 정답과 일치 (또는 합리적 근거 제시)
      - "본 과목이 *다루지 않는* Tactic" 명시 (TA0042 Resource Development 등)

      ## 비정상 시 대응
      - PTES 단계 정의 불확실 → http://www.pentest-standard.org/ 의 *PTES Technical Guidelines* 참조
      - ATT&CK Tactic 의 정확한 description → MITRE ATT&CK 의 enterprise-attack.json (offline mirror) `cat enterprise-attack.json | jq '.objects[] | select(.type=="x-mitre-tactic") | {id: .external_references[0].external_id, name}'`
      - 본 과목 syllabus 의 주차 title 불일치 → `contents/standalone/lecture/attack/week*.md` 의 첫 줄 `# Week NN — title` 확인

    hint: |
      PTES 7 단계 + ATT&CK 14 Tactic + 본 과목 15 주차 의 *3 차원 매핑 표*. 산출물은
      markdown table. 단순 도구 나열이 아니라 *어느 PTES 단계 + 어느 ATT&CK Tactic +
      어느 도구* 의 3 차원 정렬. 본 과목 종료 후 학생이 "수행 가능한 Tactic" 11~12
      개라는 *경계* 인지.

