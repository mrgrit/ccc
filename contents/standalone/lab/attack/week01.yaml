      | Wk | 학습 주제 | PTES 단계 | ATT&CK Tactic | 핵심 도구 (step 1 분류 기준) |
      |:--:|---------|---------|--------------|-------------------------|
      | W01 | 환경·표준·RoE | 1 Pre-engagement | (해당 X) | (책상 작업) |
      | W02 | OSINT + DNS·whois·subdomain | 2 Intelligence | TA0043 Recon | dirb·gobuster·ffuf |
      | W03 | 능동 정찰 (포트·서비스·OS) | 2 Intelligence | TA0043 Recon | nmap·scapy |
      | W04 | OWASP A03 — SQL Injection | 4 Vuln Analysis | TA0001 Initial Access | sqlmap |
