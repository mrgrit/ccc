      ## 🎯 MISSION (Purple Team — Detection Gap 5 카테고리)

      Coverage Matrix(STEP 5)의 미탐지 Technique 를 **Detection Gap 5 카테고리**(도구/
      룰/threshold/context/response)로 분류하고 각 보완 방향을 제시하라.

      ## 💻 산출물 (Detection Gap 분석)

      ```markdown
      # W14 Detection Gap 5 카테고리 분석
      | Gap 카테고리 | 해당 Technique | 원인 | 보완 | 소요 |
      |-------------|---------------|------|------|------|
      | 1. 도구 부재 | T1057 Process | osquery process_events/sysmon 미설정 | osqueryd + sysmon 설치 | 1-2주 |
      | 2. 룰 부재 | T1046 Scan | Suricata ET SCAN 룰 미적용 | ET Open 룰 활성 | 1-3일 |
      | 3. threshold 부재 | T1083 File | find burst 룰 없음 | rate rule(60초 N건) | 1일 |
      | 4. context 부재 | 전체 | mitre 태그 없음 → ATT&CK 자동매핑 불가 | Wazuh 룰에 <mitre> 추가 | 1-2주 |
      | 5. response 부재 | T1190 Exploit | 탐지되나 Active Response 없음 | Wazuh AR(fw drop) | 2-4주 |
      ## 우선순위: context(4, 전체 영향) → 룰(2, 빠름) → 도구(1) → threshold(3) → response(5)
      ```

      ## 📋 채점

      - 5 카테고리 각각 해당 Technique + 원인 + 보완 + 소요
      - 보완 우선순위

      ## 💡 왜 이걸 하는가?

      Detection Gap 을 5 카테고리로 분류하면 보완의 *유형* 과 *난이도* 가 명확해진다.
      "탐지 안 됨" 을 도구/룰/threshold/context/response 로 나누면, 빠르게 해결할 수
      있는 것(룰 부재, 1-3일)과 오래 걸리는 것(도구 부재, 1-2주)을 구분해 합리적
      우선순위를 세운다. 특히 mitre 태그 부재(context)는 전체에 영향을 주므로 최우선이다.

      ## 🔍 결과 해석

      - 5 카테고리 분류 = 보완 작업의 로드맵
      - context(mitre 태그) 부재가 전체 Coverage 측정을 어렵게 함 → 최우선
      - 룰 부재(ET SCAN)는 1-3일로 빠른 win

      ## ⚠️ 비정상 시 대응

      - 모든 Gap 이 한 카테고리 — 분류 재검토(원인 세분화)
