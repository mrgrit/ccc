lab_id: standalone-attack-week14
title: Caldera + Wazuh Purple Team — Coverage Matrix + Detection Gap + AAR
version: standalone-non-ai
course: attack
week: 14
description: |
  Purple Team 운영 — Red(공격)과 Blue(방어)의 협업으로 Coverage Matrix 측정 +
  Detection Gap 식별 + AAR(After-Action Report) 작성 + 룰 강화. 본 과목(W01~W13)의
  종합. Caldera 서버 없이도 ATT&CK ability 를 수동 에뮬레이션하고, 6v6 의 Blue 스택
  (Wazuh / Suricata / ModSec / osquery)이 각 Technique 를 탐지하는지 정량 측정한다.
  핵심 통찰: discovery 류(T1083/T1057/T1018)는 정상 명령이라 탐지가 어렵고(Coverage
  0% 가 정상), exploit 류(T1190)는 탐지되며, 6v6 의 alert 에는 mitre 태그가 거의 없어
  ATT&CK 매핑을 rule.description 으로 수동 수행해야 한다. 학생은 Coverage Matrix →
  Detection Gap 5 카테고리 → ATT&CK Navigator → AAR → 룰 강화의 한 사이클을 완성한다.
difficulty: hard
duration_minutes: 180
audience: 사이버공격 (14주차)
prerequisites: ["W13 Caldera adversary emulation"]
objectives:
  - "ATT&CK ability 수동 에뮬레이션 (discovery + exploit + scan)"
  - "Blue 탐지 측정 (Wazuh alerts.json / Suricata 86601 / ModSec) + mitre 태그 한계"
  - "Coverage Matrix (Technique × Red/Blue/도구/%)"
  - "Detection Gap 5 카테고리 (도구/룰/threshold/context/response)"
  - "ATT&CK Navigator JSON layer + AAR(NIST SP 800-61)"
  - "Gap 별 룰 강화 권고 (Wazuh/Suricata/Sigma)"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION (Red Team — Discovery ability 에뮬레이션)

      Caldera adversary 의 discovery 캠페인을 수동 에뮬레이션하라. attacker 에서 3
      discovery Technique(T1083 File / T1057 Process / T1018 Network)를 실행하고 각
      실행 시각을 기록한다 (Blue 측 시간 상관용).

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      echo "=== T1083 File Discovery @ $(date -u +%H:%M:%S) ==="
      find /etc -name "*.conf" 2>/dev/null | head -5
      echo "=== T1057 Process Discovery @ $(date -u +%H:%M:%S) ==="
      ps -ef 2>/dev/null | head -5
      echo "=== T1018 Network Discovery @ $(date -u +%H:%M:%S) ==="
      ss -tn 2>/dev/null | head -5
      '
      CAMPAIGN_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M'); echo "CAMPAIGN_TS=$CAMPAIGN_TS"
      ```

      ## 📋 확인 사항

      - 3 discovery Technique 실행 (find/ps/ss) + 각 timestamp
      - CAMPAIGN_TS 기록 (Blue 측 alert 시간 매칭용)
      - 모두 정상 시스템 명령 (Blue 측 alert 발생 안 함 예상 — STEP 3 에서 확인)

      ## 💡 왜 이걸 하는가?

      Discovery(TA0007)는 침투 후 환경 정찰 단계다. find/ps/ss 는 공격자도 쓰지만 정상
      사용자도 일상적으로 쓰는 명령이라 탐지가 본질적으로 어렵다. 이 ability 들이 Blue
      측에서 탐지되는지(Coverage)를 측정하는 것이 Purple Team 의 출발점이다. Caldera
      서버 없이 수동 에뮬레이션해도 동일한 Coverage 측정이 가능하다.

      ## 🔍 결과 해석

      - 3 ability 실행 + timestamp = Red 측 timeline 확보
      - 정상 명령이라 Blue alert 없을 것 = discovery 의 본질적 탐지 난점(STEP 5 Coverage 0%)

      ## ⚠️ 비정상 시 대응

      - ss 없음 — `netstat -tn` 또는 `apt install iproute2`
      - find 권한 오류 — `2>/dev/null` 로 무시 (정상)
    hint: |
      3 discovery ability(T1083 find/T1057 ps/T1018 ss) + timestamp + CAMPAIGN_TS.
      정상 명령이라 Blue alert 없음(Coverage 0%)이 정상 — discovery 탐지 난점 학습.
    category: redteam
    points: 10
    answer: |
      ssh -n 6v6-attacker '
      echo "=== T1083 @ $(date -u +%H:%M:%S) ==="; find /etc -name "*.conf" 2>/dev/null | head -5
      echo "=== T1057 @ $(date -u +%H:%M:%S) ==="; ps -ef 2>/dev/null | head -5
      echo "=== T1018 @ $(date -u +%H:%M:%S) ==="; ss -tn 2>/dev/null | head -5
      '
      CAMPAIGN_TS=$(ssh -n 6v6-attacker 'date -u +%Y-%m-%dT%H:%M'); echo "CAMPAIGN_TS=$CAMPAIGN_TS"
    answer_detail: |
      3 discovery Technique: T1083(find /etc), T1057(ps -ef), T1018(ss -tn) + timestamp.
      모두 정상 시스템 명령이라 Blue alert 발생 안 함 = discovery 의 본질적 탐지 난점.
      CAMPAIGN_TS 로 Blue alerts.json 시간 매칭.
    verify:
      type: output_contains
      expect: T1083
      field: stdout
      semantic:
        intent: Red — discovery ability 3종 에뮬레이션 + timestamp.
        success_criteria: ["3 discovery 실행", "각 timestamp", "CAMPAIGN_TS"]
        acceptable_methods:
          - |
            **[OSS] T1083 find** — File Discovery.
              ssh 6v6-attacker 'find /etc -name "*.conf"'
            예상 출력 `.conf 파일 목록`.
            운영 해석: 정상 명령, 탐지 어려움.
          - |
            **[OSS] T1057 ps / T1018 ss** — Process/Network Discovery.
            예상 출력 `process 목록 / 연결 목록`.
            운영 해석: discovery 는 일상 명령과 구분 어려움.
          - "**[OSS] CAMPAIGN_TS 기록** — Blue alert 시간 매칭용."
        negative_signs: ["ability 일부만", "timestamp 누락"]
    target_vm: attacker
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION (Red Team — Exploit/Scan ability 에뮬레이션)

      탐지 가능성이 높은 ability — T1190(web exploit), T1046(network scan)를 에뮬레이션
      하라. discovery 와 달리 이들은 Blue 가 탐지할 가능성이 있다.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      echo "=== T1190 Web Exploit (dvwa On — 차단 예상) @ $(date -u +%H:%M:%S) ==="
      curl -s -o /dev/null -w "  XSS: %{http_code}\n" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"
      curl -s -o /dev/null -w "  SQLi: %{http_code}\n" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?id=1+UNION+SELECT"
      echo "=== T1046 Network Scan @ $(date -u +%H:%M:%S) ==="
      timeout 12 nmap -sT -p 22,80,9200 10.20.32.100 2>&1 | grep -E "open|closed|filtered" | head -3
      '
      ```

      ## 📋 확인 사항

      - T1190 web exploit: dvwa(On) → 403 차단 (ModSec)
      - T1046 nmap scan: port 상태(open/closed/filtered)
      - 각 timestamp (Blue 매칭용)

      ## 💡 왜 이걸 하는가?

      Exploit/scan 류는 공격 시그니처가 명확해 discovery 보다 탐지 가능성이 높다.
      T1190(web exploit)은 ModSec/Suricata 가, T1046(scan)은 Suricata ET SCAN 룰이
      탐지할 수 있다. 단 탐지 여부는 룰 적용 상태에 달려 있어 STEP 3 에서 실측 측정한다.

      ## 🔍 결과 해석

      - web exploit 403 = ModSec 차단 + audit log 기록(W10)
      - nmap scan = Suricata 가 탐지할 수도/못 할 수도(룰 의존, STEP 3 확인)
      - exploit 류가 discovery 보다 Coverage 높을 것

      ## ⚠️ 비정상 시 대응

      - nmap 없음 — `apt install nmap`
      - web 연결 실패 — `-H "Host: dvwa.6v6.lab"` + IP 10.20.30.1 확인
    hint: |
      T1190 web exploit(dvwa On→403) + T1046 nmap scan + timestamp. exploit/scan 은
      discovery 보다 탐지 가능성 높음(시그니처 명확). 실측 Coverage 는 STEP 3.
    category: redteam
    points: 10
    answer: |
      ssh -n 6v6-attacker '
      echo "=== T1190 @ $(date -u +%H:%M:%S) ==="
      curl -s -o /dev/null -w "  XSS: %{http_code}\n" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"
      curl -s -o /dev/null -w "  SQLi: %{http_code}\n" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?id=1+UNION+SELECT"
      echo "=== T1046 @ $(date -u +%H:%M:%S) ==="
      timeout 12 nmap -sT -p 22,80,9200 10.20.32.100 2>&1 | grep -E "open|closed|filtered" | head -3
      '
    answer_detail: |
      T1190 web exploit: dvwa(On) XSS/SQLi → 403 차단(ModSec 941/942 + audit log).
      T1046 nmap scan: port 상태(22 open 등). exploit 은 시그니처 명확해 discovery 보다
      탐지 가능. scan 의 Suricata 탐지는 ET SCAN 룰 적용 여부에 달림(STEP 3 측정).
    verify:
      type: output_contains
      expect: T1190
      field: stdout
      semantic:
        intent: Red — exploit/scan ability(T1190/T1046) 에뮬레이션.
        success_criteria: ["T1190 web exploit", "T1046 nmap scan", "timestamp"]
        acceptable_methods:
          - |
            **[OSS] T1190 curl web exploit** — Exploit Public-Facing App.
              curl -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=<script>"
            예상 출력 `403(ModSec 차단)`.
            운영 해석: ModSec 941/942 + audit log 탐지.
          - |
            **[OSS] T1046 nmap scan** — Network Service Discovery.
              nmap -sT -p 22,80 10.20.32.100
            예상 출력 `port 상태`.
            운영 해석: Suricata ET SCAN 룰 의존 탐지.
          - "**[OSS] T1110 brute / T1059 command** — 추가 exploit ability(선택)."
        negative_signs: ["ability 일부만", "timestamp 누락"]
    target_vm: attacker
    risk_level: medium

  - order: 3
    instruction: |
      ## 🎯 MISSION (Blue Team — 탐지 측정)

      STEP 1/2 의 ability 를 Blue 스택이 탐지했는지 측정하라. Wazuh alerts.json 의 룰
      분포 + Suricata + ModSec 에서 각 Technique 의 탐지 여부를 확인한다.

      ## 💻 실행 명령

      ```bash
      # Wazuh alerts.json 의 최근 룰 분포 (siem 에 jq 필요)
      ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -r ".rule.id" 2>/dev/null | sort | uniq -c | sort -rn | head -8'
      # Suricata alert (scan/exploit 탐지?)
      ssh 6v6-ips 'sudo tail -400 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\") | .alert.signature" 2>/dev/null | sort | uniq -c | tail -5'
      # ModSec (web exploit T1190 차단 기록 — Serial grep)
      ssh 6v6-web 'sudo grep -oE "id \"[0-9]+\"" /var/log/apache2/modsec_audit.log | sort | uniq -c | sort -rn | head -4'
      ```

      ## 📋 확인 사항

      - Wazuh: rule 86601(Suricata)이 다수, 100xxx(custom) — discovery(T1083/57/18)는 alert 없음
      - Suricata: alert signature (scan/exploit 탐지 여부)
      - ModSec: 941/942(T1190 web exploit 차단)

      ## 💡 왜 이걸 하는가?

      Blue 측정은 Coverage Matrix 의 데이터다. 각 Red ability 에 대응하는 Blue alert 가
      있는지 시간대(CAMPAIGN_TS)로 매칭한다. discovery(정상 명령)는 alert 가 없고
      (Coverage 0%), web exploit(T1190)은 ModSec 941/942 로 탐지된다. 이 차이를 정량화
      하는 것이 Purple Team 의 핵심이다.

      ## 🔍 결과 해석

      - discovery 시간대에 alert 없음 = Coverage 0%(정상 — discovery 탐지 난점)
      - 86601(Suricata) 다수 = 네트워크 이벤트 탐지 활발
      - ModSec 941/942 = T1190 web exploit 탐지(Coverage 100%)
      - nmap scan 의 Suricata alert 없으면 = T1046 Detection Gap

      ## ⚠️ 비정상 시 대응

      - jq 없음(siem) — `sudo yum install -y jq`
      - alert 0 — alerts.json 경로 확인, ability 재실행 후 시간 대기
    hint: |
      Wazuh rule 분포(86601 Suricata + 100xxx custom) + Suricata signature + ModSec
      941/942. discovery 시간대 alert 없음(Coverage 0%), web exploit 탐지. 시간 매칭.
    category: blueteam
    points: 14
    answer: |
      echo "=== Wazuh rule 분포 ==="
      ssh -n 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -r ".rule.id" 2>/dev/null | sort | uniq -c | sort -rn | head -8'
      echo "=== Suricata alert ==="
      ssh -n 6v6-ips 'sudo tail -400 /var/log/suricata/eve.json | jq -rc "select(.event_type==\"alert\") | .alert.signature" 2>/dev/null | sort | uniq -c | tail -5'
      echo "=== ModSec T1190 ==="
      ssh -n 6v6-web 'sudo grep -oE "id \"[0-9]+\"" /var/log/apache2/modsec_audit.log | sort | uniq -c | sort -rn | head -4'
    answer_detail: |
      Wazuh rule: 86601(Suricata 다수)/100xxx(custom). discovery(T1083/57/18) 시간대
      alert 없음 = Coverage 0%(정상). Suricata signature(scan/exploit). ModSec 941/942 =
      T1190 web exploit 탐지(Coverage 100%). nmap scan Suricata alert 없으면 T1046 Gap.
      각 ability ↔ alert 시간 매칭이 Coverage Matrix 데이터.
    verify:
      type: output_contains
      expect: '86601'
      field: stdout
      semantic:
        intent: Blue — ability 별 탐지 측정(Wazuh/Suricata/ModSec).
        success_criteria: ["Wazuh rule 분포", "Suricata/ModSec 확인", "discovery vs exploit 차이"]
        acceptable_methods:
          - |
            **[OSS] jq Wazuh rule 분포** — 탐지 룰.
              ssh 6v6-siem 'sudo tail .../alerts.json | jq -r .rule.id | sort | uniq -c'
            예상 출력 `86601 + 100xxx`.
            운영 해석: discovery alert 없음, Suricata 활발.
          - |
            **[OSS] jq Suricata signature** — scan/exploit 탐지.
            예상 출력 `signature 또는 없음`.
            운영 해석: ET SCAN 룰 의존, 없으면 Gap.
          - |
            **[OSS] grep ModSec 941/942** — T1190 탐지.
            예상 출력 `941/942 카운트`.
            운영 해석: web exploit Coverage 100%.
        negative_signs: ["탐지 측정 누락", "discovery/exploit 구분 없음"]
    target_vm: bastion
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION (Blue Team — ATT&CK 매핑 + mitre 태그 한계)

      Wazuh alert 에 ATT&CK(mitre) 태그가 있는지 확인하고, 없다면 rule.description 으로
      수동 매핑하는 방법을 적용하라.

      ## 💻 실행 명령

      ```bash
      # mitre 태그가 있는 alert 수 (전체 대비)
      ssh 6v6-siem 'echo "mitre 태그 alert:"; sudo grep -c "mitre" /var/ossec/logs/alerts/alerts.json 2>/dev/null'
      ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.rule.mitre) | .rule.mitre.id[]?" 2>/dev/null | sort | uniq -c | head'
      # 태그 없으면 rule.description 으로 수동 매핑
      ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -r ".rule.description" 2>/dev/null | sort | uniq -c | sort -rn | head -6'
      ```

      ## 📋 확인 사항

      - mitre 태그 alert 수: 매우 적음(대부분 alert 에 mitre 태그 없음)
      - 태그 있는 것: 일부 Technique(예: T1565.001)만
      - rule.description: 매핑 source(예: "Suricata: ..." → 수동으로 ATT&CK 매핑)

      ## 💡 왜 이걸 하는가?

      Coverage Matrix 는 ATT&CK Technique 기준인데, 이 환경의 alert 는 mitre 태그가 거의
      없다(Suricata/custom 룰이 mitre 매핑 미보유). 따라서 rule.description 을 보고 수동
      으로 ATT&CK Technique 를 매핑해야 한다. 이것이 Detection Gap 의 "context 부재"
      카테고리(STEP 6)이며, 자동 매핑(mitre 태그) 부재가 Purple Team 작업을 어렵게 한다.

      ## 🔍 결과 해석

      - mitre 태그 거의 없음 = ATT&CK 자동 매핑 불가 → 수동 매핑 필요
      - rule.description → ATT&CK 매핑 예: "web attack" → T1190, "scan" → T1046
      - 이 Gap 보완 = Wazuh 룰에 mitre 태그 추가(Purple STEP 9)

      ## ⚠️ 비정상 시 대응

      - mitre 태그 0 — 정상(이 환경), rule.description 으로 수동 매핑
      - jq 없음 — yum install jq
    hint: |
      mitre 태그 거의 없음(자동 ATT&CK 매핑 불가) → rule.description 으로 수동 매핑.
      이것이 Detection Gap 의 context 부재. Wazuh 룰에 mitre 태그 추가가 보완.
    category: blueteam
    points: 12
    answer: |
      echo "=== mitre 태그 ==="
      ssh -n 6v6-siem 'sudo grep -c "mitre" /var/ossec/logs/alerts/alerts.json 2>/dev/null'
      ssh -n 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -rc "select(.rule.mitre) | .rule.mitre.id[]?" 2>/dev/null | sort | uniq -c | head'
      echo "=== rule.description (수동 매핑 source) ==="
      ssh -n 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -r ".rule.description" 2>/dev/null | sort | uniq -c | sort -rn | head -6'
    answer_detail: |
      mitre 태그 alert 매우 적음(예: 10/2000, T1565.001 1건). 대부분 Suricata(86601)/
      custom 룰이 mitre 매핑 미보유 → ATT&CK 자동 매핑 불가. rule.description 으로 수동
      매핑(예: "web attack"→T1190, "scan"→T1046). 이 mitre 태그 부재가 Detection Gap 의
      context 부재 카테고리(STEP 6). 보완 = Wazuh 룰에 <mitre> 추가(STEP 9).
    verify:
      type: output_contains
      expect: description
      field: stdout
      semantic:
        intent: Blue — mitre 태그 가용성 + rule.description 수동 ATT&CK 매핑.
        success_criteria: ["mitre 태그 수 확인", "태그 부재 인지", "rule.description 수동 매핑"]
        acceptable_methods:
          - |
            **[OSS] grep/jq mitre 태그** — 자동 매핑 가용성.
              ssh 6v6-siem 'sudo grep -c mitre .../alerts.json; jq "select(.rule.mitre)"'
            예상 출력 `매우 적음(거의 없음)`.
            운영 해석: ATT&CK 자동 매핑 불가.
          - |
            **[OSS] jq rule.description** — 수동 매핑 source.
              jq -r .rule.description | sort | uniq -c
            예상 출력 `룰 설명 분포`.
            운영 해석: description → ATT&CK 수동 매핑.
          - "**[OSS] mitre 태그 추가 권고** — Wazuh 룰에 <mitre><id> 보강."
        negative_signs: ["mitre 태그 부재 미인지", "수동 매핑 방법 없음"]
    target_vm: bastion
    risk_level: low

  - order: 5
    instruction: |
