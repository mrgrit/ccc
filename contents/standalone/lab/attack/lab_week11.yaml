      | docker 그룹 | docker.sock | ✅ | docker run -v /:/host → host root |
      | SUID | 표준만 | ❌ | 비표준 SUID 없음 |
      | capabilities | cap_net_raw | ❌ | cap_setuid 없음 |
      | cron | e2scrub_all | ❌ | writable script 없음 |
      | kernel | 5.15.x LTS | ❌ | 패치됨 |
      ## root 벡터 2개: NOPASSWD + docker.sock. docker 그룹=root 동등.
      EOF
    answer_detail: |
      6 카테고리 분석: sudo NOPASSWD ALL(✅) + docker 그룹/docker.sock(✅) 2벡터가 root
      직행. SUID(표준만)/capabilities(cap_net_raw)/cron(e2scrub_all)/kernel(5.15 LTS)은
      hardening 으로 불가. 핵심 통찰: docker 그룹 = root 와 동등(docker.sock 제어 = host
