      ## 💻 실행 명령

      ```bash
      ssh 6v6-bastion '
      # escape 실습의 임시 컨테이너 정리 (--rm 썼으면 이미 자동 삭제, dangling 확인)
      docker ps -a --filter "ancestor=alpine" --format "{{.ID}}" | xargs -r docker rm -f 2>/dev/null; echo "escape 컨테이너 정리"
      # LinPEAS 임시 파일 삭제
      rm -f /tmp/linpeas.sh 2>/dev/null; echo "linpeas.sh 삭제"
      # 환경 미변경 확인 — sudoers 와 docker 그룹은 실습으로 바꾸지 않음(STEP 9 는 권고만)
      echo "=== sudoers NOPASSWD 그대로? ==="; sudo -n -l 2>&1 | grep -i nopasswd
      echo "=== ccc docker 그룹 그대로? ==="; id | grep -o docker
      echo "=== UID 0 계정 root 만? (백도어 미추가) ==="; sudo awk -F: "\$3==0 {print \$1}" /etc/passwd
      '
      echo "=== cleanup 완료 ==="
      ```

      ## 📋 확인 사항

      - escape 컨테이너 정리 (--rm 으로 자동 삭제됐어도 dangling 확인)
      - linpeas.sh 삭제
