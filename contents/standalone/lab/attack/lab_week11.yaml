      ## 💡 왜 이걸 하는가?

      권한 상승 실습은 강력한 도구를 다루므로 cleanup 이 특히 중요하다. escape 컨테이너,
      다운로드한 도구를 정리하고, STEP 9 에서 권고한 설정 변경(NOPASSWD 제거 등)을 *실제로
      하지 않았음* 을 확인한다 (권고는 설계, 적용은 운영팀 결정). 또한 백도어 UID 0 계정이
      추가되지 않았는지 확인해 실습이 영구 흔적을 남기지 않았음을 보장한다.

