      '
    answer_detail: |
      ccc(uid=1000) → sudo id → uid=0(root). NOPASSWD: ALL 라 비번 없이 root. sudo
      whoami=root, /etc/shadow read 성공 = root 전용 자원 접근 = 권한 상승 입증.
      실제 공격은 sudo bash 로 root shell. 본 실습은 입증만(흔적 최소화).
