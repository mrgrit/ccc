lab_id: standalone-attack-week11
title: Linux 권한 상승 (Privilege Escalation) — 5 카테고리 + docker.sock + R/B/P
version: standalone-non-ai
course: attack
week: 11
description: |
  PTES 6 단계 Post Exploitation — 일반 user(ccc) → root 권한 상승. CWE-269 / ATT&CK
  TA0004. bastion 호스트에서 5 카테고리(config/SUID/cron/capabilities/kernel)를 enum
  하고, 실제 권한 상승 벡터를 식별·활용한다. 이 환경의 핵심: SUID/capabilities/cron 은
  hardening 되어 우회 불가하지만, (1) sudo NOPASSWD: ALL, (2) docker 그룹 + docker.sock
  마운트(컨테이너 escape) 2개 벡터가 root 로 직행한다. Blue 관점에서 osquery 헌팅 +
  auditd/Wazuh 의 탐지 한계(Detection Gap)를 확인하고, Purple 관점에서 방어 강화를
  설계한다. 마지막 3 step 은 R/B/P 통합. **윤리적 한계**: 6v6 학습 환경 안에서만,
  실제 시스템 권한 상승 = 정통망법 위반.
difficulty: hard
duration_minutes: 180
audience: 사이버공격 (11주차)
prerequisites: ["W10 IDS/WAF 우회"]
objectives:
  - "5 카테고리 enum — config / SUID / cron / capabilities / kernel"
  - "GTFOBins + LinPEAS 활용 + 전제 조건(SUID/NOPASSWD) 검증"
  - "실제 권한 상승 벡터 — sudo NOPASSWD + docker.sock escape"
  - "Blue — osquery 헌팅(suid_bin/crontab/users) + auditd/Wazuh 한계"
  - "Purple — Coverage Matrix + Detection Gap + 방어 강화 5표준"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION (Red Team — 5 카테고리 enum)

      bastion 의 ccc 사용자 권한으로 권한 상승 5 카테고리를 enum 하라 — sudo / SUID /
      capabilities / cron / world-writable. 추가로 ccc 의 소속 그룹(특히 docker/sudo)도
      확인한다.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-bastion '
      echo "=== 0. id + 소속 그룹 ==="
      id
      echo "=== 1. sudo -l ==="
      sudo -n -l 2>&1 | tail -6
      echo "=== 2. SUID binary ==="
      find / -perm -4000 -uid 0 -type f 2>/dev/null | head -12
      echo "=== 3. capabilities ==="
      getcap -r / 2>/dev/null | head -6
      echo "=== 4. cron ==="
      cat /etc/crontab 2>/dev/null | grep -vE "^#|^$" | head; ls /etc/cron.d/ 2>/dev/null
      echo "=== 5. docker.sock + world-writable ==="
      ls -la /var/run/docker.sock 2>/dev/null
      find /etc /home -perm -002 -type f 2>/dev/null | head -5
      '
      ```

      ## 📋 확인 사항

      - id: ccc(1000) 의 그룹에 **27(sudo), 999(docker)** 포함 — 둘 다 권한 상승 단서
      - sudo -l: `(ALL) NOPASSWD: ALL` — 비번 없이 모든 명령 root
      - SUID: 표준 셋(sudo/su/passwd/mount 등)만 — GTFOBins 활용 가능한 비표준 SUID 없음
      - capabilities: cap_net_raw(ping/mtr-packet)만 — cap_setuid 같은 위험 cap 없음
      - cron: e2scrub_all(표준)만
      - docker.sock 마운트 + ccc docker 그룹 → escape 단서

      ## 💡 왜 이걸 하는가?

      PTES 6 단계 Post Exploitation 의 표준 enum. 5 카테고리를 모두 점검해야 어느 벡터가
      실제 root 로 이어지는지 판단할 수 있다. 이 환경은 SUID/cap/cron 이 hardening 되어
      있어 GTFOBins 류 우회가 막혀 있고, 대신 sudo 설정과 docker 그룹이 노출되어 있다.

      ## 🔍 결과 해석

      - NOPASSWD: ALL + docker 그룹 = 2개의 root 직행 벡터 (STEP 3, 4)
      - SUID/cap/cron 표준 = hardening 양호 (GTFOBins 우회 불가)
      - 권한 상승은 "가장 약한 고리" 를 찾는 것 — enum 이 그 출발점

      ## ⚠️ 비정상 시 대응

      - enum 모두 빈 출력 — `id` 로 사용자 확인 (root 가 아닌 ccc 권한이어야 정상)
      - getcap 없음 — minimal 이미지, `apt install libcap2-bin` 또는 생략
    hint: |
      5 카테고리 enum + id 의 그룹(sudo/docker). 이 환경: SUID/cap/cron hardening,
      sudo NOPASSWD ALL + docker 그룹이 root 벡터. 무엇이 약한 고리인지 식별.
    category: enumeration
    points: 12
    answer: |
      ssh -n 6v6-bastion '
      echo "=== id ==="; id
      echo "=== sudo -l ==="; sudo -n -l 2>&1 | tail -6
      echo "=== SUID ==="; find / -perm -4000 -uid 0 -type f 2>/dev/null | head -12
      echo "=== capabilities ==="; getcap -r / 2>/dev/null | head -6
      echo "=== cron ==="; cat /etc/crontab 2>/dev/null | grep -vE "^#|^$" | head; ls /etc/cron.d/ 2>/dev/null
      echo "=== docker.sock ==="; ls -la /var/run/docker.sock 2>/dev/null
      '
    answer_detail: |
      id: ccc uid=1000, groups 에 27(sudo)+999(docker). sudo -l: (ALL) NOPASSWD: ALL.
      SUID: ssh-keysign/gpasswd/passwd/mount/newgrp/su/chsh/umount/chfn/sudo (표준만,
      GTFOBins 비표준 SUID 없음). capabilities: ping/mtr-packet cap_net_raw(정상).
      cron: e2scrub_all(표준). docker.sock: srw-rw---- root docker(ccc 가 docker 그룹).
      → 실제 root 벡터는 NOPASSWD ALL(STEP3) + docker.sock escape(STEP4).
    verify:
      type: output_contains
      expect: NOPASSWD
      field: stdout
      semantic:
        intent: Red — 5 카테고리 enum + 그룹 + 약한 고리 식별.
        success_criteria: ["5 카테고리 출력", "sudo/docker 그룹", "권한 상승 단서 식별"]
        acceptable_methods:
          - |
            **[OSS] id + sudo -l** — config 약점.
              ssh 6v6-bastion 'id; sudo -n -l'
            예상 출력 `groups=...sudo,docker / (ALL) NOPASSWD: ALL`.
            운영 해석: NOPASSWD ALL + docker 그룹 = root 벡터.
          - |
            **[OSS] find -perm -4000 SUID** — SUID enum.
              ssh 6v6-bastion 'find / -perm -4000 -uid 0 -type f 2>/dev/null'
            예상 출력 `표준 SUID 셋`.
            운영 해석: 비표준 SUID 없음 = GTFOBins 우회 불가(hardening).
          - |
            **[OSS] getcap -r / + cron + docker.sock** — cap/cron/sock.
            예상 출력 `cap_net_raw / e2scrub_all / docker.sock`.
            운영 해석: cap/cron hardening, docker.sock 이 escape 벡터.
        negative_signs: ["카테고리 일부만", "그룹 확인 누락", "단서 식별 없음"]
    target_vm: bastion
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION (Red Team — 권한 상승 벡터 분석)

      STEP 1 의 enum 결과를 토대로 **권한 상승 벡터 우선순위 분석표** 를 작성하라. 각
      카테고리가 이 환경에서 실제 활용 가능한지, 그 이유를 판정한다.

      ## 💻 산출물 (벡터 분석표)

      ```markdown
      # W11 권한 상승 벡터 분석
      | 카테고리 | 발견 | 활용 가능? | 근거 |
      |----------|------|-----------|------|
      | sudo config | NOPASSWD: ALL | ✅ 즉시 | sudo bash → root (STEP 3) |
      | docker 그룹 | docker.sock 마운트 | ✅ 즉시 | docker run -v /:/host → host root (STEP 4) |
      | SUID | 표준 셋만 | ❌ | GTFOBins 활용 가능한 비표준 SUID 없음 |
      | capabilities | cap_net_raw | ❌ | cap_setuid/cap_dac_override 없음 |
      | cron | e2scrub_all | ❌ | world-writable script/PATH 의존 없음 |
      | kernel | 5.15.x | ❌(시뮬) | LTS 패치 — exploit 가능성 낮음 |
      ## 결론: 2개 벡터(NOPASSWD + docker.sock)가 root 직행. 나머지는 hardening.
      ## 가장 위험: docker 그룹 = root 와 동등(docker.sock 제어 = host 제어)
      ```

      ## 📋 채점

      - 6 카테고리 각각 활용 가능 여부 + 근거
      - 실제 root 벡터 2개(NOPASSWD, docker.sock) 식별

      ## 💡 왜 이걸 하는가?

      enum 결과를 나열만 하면 의미 없다. 각 발견이 *실제로 root 로 이어지는가* 를
      판정해야 공격 계획이 선다. 특히 "docker 그룹 = root 와 동등" 은 흔히 간과되는
      구성 약점이다 — docker.sock 을 제어하면 privileged 컨테이너로 host 를 장악한다.

      ## 🔍 결과 해석

      - 활용 가능 2 + 불가 4 = 이 환경은 전통적 privesc(SUID/cap/cron)는 막혀 있고
        구성 약점(sudo/docker)이 노출
      - 우선순위: NOPASSWD(가장 단순) → docker.sock(가장 강력, host 장악)
    hint: |
      6 카테고리 활용 가능 여부 분석표. NOPASSWD ALL + docker 그룹 = root 직행 2벡터,
      SUID/cap/cron/kernel 은 hardening 으로 불가. docker 그룹=root 동등 강조.
    category: analysis
    points: 10
