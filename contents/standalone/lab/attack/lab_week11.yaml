            예상 출력 `uid=0(root) / root`.
            운영 해석: 비번 없이 root 권한 획득.
          - |
            **[OSS] sudo head /etc/shadow** — root 자원 접근 입증.
              ssh 6v6-bastion 'sudo head -1 /etc/shadow'
            예상 출력 `root:$6$... 해시`.
            운영 해석: 일반 user 불가한 root 전용 read 성공.
