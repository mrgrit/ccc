  - order: 3
    instruction: |
      ## 🎯 MISSION (Red Team — sudo NOPASSWD 활용)

      STEP 2 의 1번 벡터(sudo NOPASSWD: ALL)를 활용해 root 권한 획득을 입증하라. 실제
      root shell 을 장기 점유하지 말고, root 권한으로 명령이 실행됨을 확인한다.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-bastion '
      echo "=== 현재 권한 ==="
      id
      echo "=== sudo 로 root 권한 확인 (NOPASSWD) ==="
      sudo id
      sudo whoami
      echo "=== root 전용 파일 read 입증 ==="
      sudo head -1 /etc/shadow
      '
      ```

      ## 📋 확인 사항

      - 현재: uid=1000(ccc)
      - sudo id: **uid=0(root)** — NOPASSWD 라 비번 없이 root
      - sudo whoami: root
      - /etc/shadow read 성공 = root 권한 입증 (일반 user 는 불가)

      ## 💡 왜 이걸 하는가?

      sudo NOPASSWD: ALL 은 가장 단순하고 직접적인 권한 상승이다. `sudo bash` 로 즉시
      root shell 을 얻을 수 있다. 본 실습에서는 root shell 을 장기 점유하는 대신 `sudo
      id` / `sudo head /etc/shadow` 로 권한 획득을 입증한다 (실습 안전 + 흔적 최소화).

      ## 🔍 결과 해석

      - sudo id → uid=0 = 권한 상승 성공
      - /etc/shadow read = root 전용 자원 접근 = 실질적 root 장악
      - 이것이 STEP 6/7 에서 Blue 가 탐지해야 할 행위

      ## ⚠️ 비정상 시 대응

      - sudo 비번 요구 — NOPASSWD 아님, `sudo -n id` 로 non-interactive 확인
      - sudo: command not found — sudo 미설치, su 또는 다른 벡터(STEP 4)
    hint: |
      sudo NOPASSWD 활용 — sudo id(uid=0) + sudo head /etc/shadow 로 root 입증.
      root shell 장기 점유 말고 권한 획득만 확인. Blue 탐지 대상(STEP 6/7).
