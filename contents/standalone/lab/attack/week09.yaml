lab_id: standalone-attack-week09
title: 네트워크 공격 — tcpdump + scapy + ARP/DNS
version: standalone-non-ai
course: attack
week: 9
description: |
  L2-L4 네트워크 공격 기초 — tcpdump 캡처 + scapy 로 SYN 패킷 작성 + ARP table 분석.
difficulty: medium
duration_minutes: 150
prerequisites: [W08]
objectives:
  - "tcpdump BPF filter + pcap 저장"
  - "scapy 로 SYN packet 작성"
  - "ARP table + DNS resolve 분석"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION

      attacker 에서 **tcpdump** 로 트래픽 캡처 + BPF filter 적용. **idle 네트워크
      에서는 패킷 0** 이 정상 — 학생이 *동시에 트래픽 생성* (curl backgrouund) 후
      캡처 가 표준 워크플로우.

      ## 💻 실행 명령 (트래픽 생성 + 캡처 동시)

      ```bash
      # 1) idle 캡처 — 0 packet 정상
      ssh 6v6-attacker 'sudo timeout 3 tcpdump -ni eth0 -c 5 2>&1 | tail -8'

      # 2) curl 트래픽 발생 + 동시 캡처 (BPF tcp port 80)
      ssh 6v6-attacker '
        (sleep 1 && for i in 1 2 3 4 5; do curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/" & done; wait) &
        sudo timeout 5 tcpdump -ni eth0 "tcp port 80" -c 10 2>&1 | tail -15
      '

      # 3) pcap 저장 (Wireshark 후속 분석)
      ssh 6v6-attacker '
        (sleep 1 && curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/") &
        sudo timeout 5 tcpdump -ni eth0 "tcp port 80" -c 10 -w /tmp/cap.pcap 2>&1 | tail -3
        sudo ls -la /tmp/cap.pcap
      '
      ```

      ## 📋 확인 사항

      - 1) **0 packets captured** — idle 네트워크 의 정상 결과 (학생이 *왜 0* 이해)
      - 2) **5+ packet** + 모두 `tcp port 80` — BPF filter 동작 확인
      - 3) **pcap 파일** 생성 + sizes > 0 — Wireshark 후속 가능

      ## 💡 왜 이걸 하는가?

      packet 레벨 분석은 *트래픽이 있을 때* 만 의미. 학생이 *idle vs active* 의 차이
      인지 + *트래픽 생성 + 캡처 동시* 의 표준 워크플로우 습득.

      ## 🔍 결과 해석

      - **정상**: 1) 0 packet (idle) 2) 5+ packet (curl 트리거) 3) pcap 파일 생성
      - **2) 도 0 packet** — curl 가 다른 interface (lo 등) 사용. `-i any` 로 재시도.
      - **운영 권장**: pcap → Wireshark / tshark 의 IO Graph / Follow Stream 분석

      ## 비정상 시 대응

      - **tcpdump: permission denied** — `sudo` 또는 `setcap cap_net_raw+ep
        /usr/bin/tcpdump`
      - **No such device eth0** — `ip addr` 로 interface 명 확인 (eth0/ens3/etc)
    hint: |
      tcpdump idle = 0 packet 정상. 트래픽 생성 (curl &) + 캡처 동시 = 표준.
      `-w pcap` 으로 Wireshark 후속.
    category: capture
    points: 20
    answer: |
      ssh 6v6-attacker 'sudo timeout 3 tcpdump -ni eth0 -c 5 2>&1 | tail -5'
      ssh 6v6-attacker '
        (sleep 1 && for i in 1 2 3 4 5; do curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/" & done; wait) &
        sudo timeout 5 tcpdump -ni eth0 "tcp port 80" -c 10 2>&1 | tail -15
      '
      ssh 6v6-attacker '
        (sleep 1 && curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/") &
        sudo timeout 5 tcpdump -ni eth0 "tcp port 80" -c 10 -w /tmp/cap.pcap 2>&1 | tail -3
        sudo ls -la /tmp/cap.pcap
      '
    answer_detail: |
      3-step — (1) idle 0 packet (2) curl 트리거 + BPF filter (3) pcap 저장. idle
      vs active 의 차이 인지 + 표준 워크플로우.
    verify:
      type: output_contains
      expect: IP
      field: stdout
      semantic:
        intent: "tcpdump 캡처"
        success_criteria: ["packet 캡처"]
        acceptable_methods:
          - "**[OSS] tcpdump -ni <iface>**"
          - "**[OSS] BPF filter (host/port/proto)**"
          - "**[OSS] -A ASCII / -X hex**"
          - "**[OSS] -w pcap (Wireshark 후속)**"
          - "**[OSS] -r pcap (재생)**"
          - "**[OSS] tshark CLI 대안**"
          - "**[OSS] ngrep / netsniff-ng**"
          - "**[OSS] T1040 Network Sniffing**"
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 MISSION

      scapy 로 **SYN 패킷 작성** + fw 응답 받기.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker 'sudo python3 -c "
      from scapy.all import IP, TCP, sr1
      r = sr1(IP(dst=\"10.20.30.1\")/TCP(dport=80, flags=\"S\"), timeout=2, verbose=0)
      print(r.summary() if r else \"no response\")
      "'
      ```

      ## 📋 확인 사항

      - SYN-ACK 응답: `IP / TCP 10.20.30.1:http > <attacker>:xxxx SA / Padding`
      - response 의 flags = SA (SYN-ACK) → 정상

      ## 💡 왜 이걸 하는가?

      scapy 는 packet 작성의 표준 도구 — 모든 네트워크 공격 (ARP spoofing / DNS poisoning
      / TCP RST injection) 의 기본.

      ## 🔍 결과 해석

      - **정상**: SYN-ACK 응답
      - **비정상**: no response → fw 의 drop 또는 NIC 문제
    hint: scapy sr1 IP/TCP
    category: exploit
    points: 25
    answer: |
      ssh 6v6-attacker 'sudo python3 -c "
      from scapy.all import IP, TCP, sr1
      r = sr1(IP(dst=\"10.20.30.1\")/TCP(dport=80, flags=\"S\"), timeout=2, verbose=0)
      print(r.summary() if r else \"no response\")
      "'
    answer_detail: scapy SYN → SYN-ACK 응답.
    verify:
      type: output_contains
      expect: 'SA\|response'
      field: stdout
      semantic:
        intent: "scapy SYN"
        success_criteria: ["SYN-ACK 응답"]
        acceptable_methods:
          - "**[OSS] sr1 (send + recv 1)**"
          - "**[OSS] send (송신만)**"
          - "**[OSS] sniff (캡처)**"
          - "**[OSS] IP / TCP / UDP / ICMP layer**"
          - "**[OSS] flags S/SA/R/F**"
          - "**[OSS] custom Raw payload**"
          - "**[OSS] ARP / DNS layer**"
          - "**[OSS] Suricata + Wazuh 의 detection**"
    target_vm: attacker

  # ============================================================
  # STEP 3 — R/B/P 종합 (네트워크 공격)
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION (R/B/P 종합)

      Red = tcpdump capture + scapy ARP / Blue = Suricata 의 ARP/DNS rule /
      Purple = network segmentation.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — 네트워크 layer 의 공격

      **페르소나**: network attacker — ARP spoofing + DNS spoofing 의 MITM 시도.
      L2/L3 의 보안 의 검증.

      **공격 의도**:
      1. **tcpdump capture** = 네트워크 traffic 의 passive sniff
      2. **scapy ARP** = 의도 적 ARP reply 의 MITM 가설
      3. **DNS spoofing** = 응답 의 조작

      **공격 단계**:
      - R1: tcpdump 의 raw traffic 분석
      - R2: (개념) scapy 의 ARP spoof
      - R3: (개념) DNS poisoning

      ### 🔵 Blue Team — Suricata + ARP table 검증

      **탐지 source**:
      - Suricata 의 ARP 룰 (sid 의 ARP spoof detection)
      - DNS server 의 query log
      - network segmentation (VLAN)

      **대응**:
      - B1: ARP table 의 static 등록 (sensitive 호스트)
      - B2: DNS 의 DNSSEC 의 적용
      - B3: VLAN segmentation

      ### 🟣 Purple Team — network segmentation routine

      **개선 cycle**:
      1. VLAN 의 sensitive zone 분리
      2. ARP table 의 monitoring
      3. DNS 의 DNSSEC 의 의무 화
      4. 분기 의 network audit

      ## 💻
      ```bash
      ssh 6v6-attacker 'sudo timeout 3 tcpdump -i any -c 5 2>&1 | head -10'
      ssh 6v6-siem 'sudo tail -10 /var/log/suricata/fast.log 2>&1 | head -5 || echo "fast.log 없음"'
      echo "Coverage: ARP/DNS spoof → Suricata rule → segmentation routine"
      ```
    hint: 'tcpdump + Suricata fast.log'
    category: rbp_integration
    points: 4
    answer: |
      ssh 6v6-attacker 'sudo timeout 3 tcpdump -i any -c 5 2>&1 | head -10'
      ssh 6v6-siem 'sudo tail -10 /var/log/suricata/fast.log 2>&1 | head -5 || echo no fast.log'
      echo "Coverage: ARP/DNS + Suricata + segmentation"
    answer_detail: 네트워크 R/B/P
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: 네트워크 R/B/P
        success_criteria: [tcpdump, Coverage]
        acceptable_methods: ["**[OSS] tcpdump + Suricata**"]
    target_vm: attacker
