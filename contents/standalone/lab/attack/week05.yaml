          - "ModSec audit log grep: 명령 `grep -oE '\\[id \"94[0-9]+\"\\]\\[msg \"[^\"]+\"\\]' audit.log`."
          - "jq -r .audit_data.messages: JSON 형식 audit log (ModSec 3.x)."
          - "Bastion AI 보안 헤더 + WAF + CSP 통합: bastion 이 (1) curl -I (2) audit grep (3) defense-in-depth gap 보고."
