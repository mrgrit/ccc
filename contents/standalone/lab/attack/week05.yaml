          3 layer 방어 (서버 헤더 / WAF / 클라이언트 CSP) 의 매핑. defense in depth
          의 *부재* 검출 시 운영 결함 보고.
        success_criteria:
          - "5 보안 헤더 중 최소 2 존재 또는 *미설정* 명시"
          - "ModSec 941 메시지 3 건 (id + msg) 출력"
          - "3 layer 방어의 의미 인지"
          - "step 1 의 6 payload 가 어느 layer 에서 차단됐는지 매핑"
