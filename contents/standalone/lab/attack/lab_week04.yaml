  - order: 3
    instruction: |
      ## 🎯 MISSION (R/B/P 종합) — sqlmap + ModSec 942 의 1 cycle

      Red = sqlmap UNION 시도 / Blue = ModSec 942 매치 / Purple = paranoia level
      tuning.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — sqlmap UNION SELECT 의 표준 SQLi

      **페르소나**: SQLi attacker — JuiceShop 의 search endpoint 의 UNION SELECT
      의 시도. ModSec 942 의 detection 의 직접 검증.

      **공격 의도**:
      1. UNION SELECT = 가장 명확 한 SQLi pattern = 942 의 즉시 매치
      2. ModSec 의 score 누적 = paranoia threshold 의 이상 = 403 차단
      3. 학습 = SQLi 의 detection 경로 의 base

      **공격 단계**:
      - R1: curl 의 UNION SELECT 페이로드 = 403 확인
      - R2: ModSec audit log 의 매치 룰 확인
      - R3: paranoia level 의 영향 분석

      ### 🔵 Blue Team — ModSec 942 family 의 detection

      **탐지 source**:
      - ModSec audit log 의 messages[] 의 942 매치
      - 942100 (SQLi detection library)
      - 942270 (UNION SELECT 특화)

      **대응**:
      - B1: inline 차단 (403)
      - B2: audit log 기록 + Wazuh alert

      ### 🟣 Purple Team — paranoia tuning

      **분석**: paranoia level (1-4) 의 영향 측정 + tamper evasion 의 검증.

      **개선 cycle**:
      1. paranoia 의 점진 ramp-up
      2. tamper-specific rule 의 추가
      3. 분기 review

