        acceptable_methods:
          - |
            **[OSS] wafw00f** — 자동 WAF 식별.
              ssh 6v6-attacker 'wafw00f "http://juice.6v6.lab/"'
            예상 출력 `No WAF detected` (이 환경, ModSec stealth).
