      echo "공격:"; curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"; echo
      echo "Server:"; curl -sI -H "Host: juice.6v6.lab" "http://10.20.30.1/" | grep -i server
      '
    answer_detail: |
      wafw00f 는 "No WAF detected by the generic detection" — ModSec 기본 stealth 라
      응답 시그니처 미노출. 수동 fingerprint: 정상(/?q=hello)=200, 공격(/?q=<script>)=403
      → 공격 페이로드에만 차단되는 차이로 WAF 존재 확정. Server: Apache/2.4.52 (Ubuntu).
      교훈: 자동 도구의 한계 → 수동 행동 기반 fingerprint 가 신뢰성 높음.
