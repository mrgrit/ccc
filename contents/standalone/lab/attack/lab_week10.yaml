            예상 출력 `403 ... times` + `not injectable` + `ending`.
            운영 해석: ModSec 가 차단하면 SQLi 불가, audit log 942 매치.
          - |
            **[OSS] space2comment** — 공백 → /**/.
            예상 출력 `403` (CRS 942 매치).
            운영 해석: 주석 삽입으로 공백 룰 회피 시도.
          - |
            **[OSS] randomcase / between** — 대소문자 / = 회피.
            예상 출력 `403`.
            운영 해석: libinjection 은 SQL 토큰 분석이라 우회 어려움.
          - |
            **[OSS] grep 942 카운트** — Serial audit log.
              ssh 6v6-web 'sudo grep -c "id .\"942" /var/log/apache2/modsec_audit.log'
            예상 출력 `숫자 증가`.
            운영 해석: tamper 시도가 942(SQLi) 룰 매치.
