  - order: 3
    instruction: |
      ## 🎯 MISSION (Red Team — WAF 식별)

      대상 web 의 WAF 를 식별하라. 자동 도구(wafw00f)의 결과와 수동 fingerprint(정상
      요청 vs 공격 요청의 응답 차이 + Server 헤더)를 비교하여, 어느 쪽이 이 WAF 를
      탐지하는지 판정한다.

      ## 💻 실행 명령

      ```bash
      # wafw00f 는 hostname resolve 가 필요 → /etc/hosts 에 vhost 추가 (없으면)
      ssh 6v6-attacker 'grep -q juice.6v6.lab /etc/hosts || sudo sh -c "echo 10.20.30.1 juice.6v6.lab dvwa.6v6.lab >> /etc/hosts"'
      # 자동 식별 (wafw00f)
      ssh 6v6-attacker 'wafw00f "http://juice.6v6.lab/" 2>&1 | grep -iE "behind|No WAF|detected|requests"'
      # 수동 fingerprint — 정상(200) vs 공격(403) 응답 차이 + Server 헤더
      ssh 6v6-attacker '
      echo "정상:"; curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=hello"; echo
      echo "공격:"; curl -s -o /dev/null -w "%{http_code}" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"; echo
      echo "Server 헤더:"; curl -sI -H "Host: juice.6v6.lab" "http://10.20.30.1/" | grep -i server
      '
      ```

      ## 📋 확인 사항

      - wafw00f 결과 (이 환경: "No WAF detected" — ModSec stealth)
      - 수동 fingerprint: 정상 200 vs 공격 403 의 명확한 차이 → WAF 존재 확정
      - Server 헤더 (Apache)

      ## 💡 왜 이걸 하는가?

      wafw00f 는 응답 시그니처(특정 헤더/쿠키/차단 페이지)로 WAF 를 식별하는데, ModSec
      는 기본 설정에서 자기 존재를 숨기는(stealth) 경향이 있어 generic detection 을
      회피한다. 따라서 자동 도구만 믿으면 "No WAF" 라는 오판을 한다. 수동 fingerprint
      (정상/공격 응답 코드 차이)가 WAF 존재를 확정하는 실전 기법이다.

      ## 🔍 결과 해석

      - **wafw00f "No WAF detected"**: ModSec 가 stealth → 자동 식별 회피 (도구 한계)
      - **정상 200 + 공격 403**: 공격 페이로드에만 차단 → WAF(또는 application filter) 존재 확정
      - 수동 fingerprint 가 자동 도구보다 신뢰성 높음

      ## ⚠️ 비정상 시 대응

      - wafw00f Site down — `/etc/hosts` 에 juice.6v6.lab → 10.20.30.1 추가 확인
      - 정상/공격 모두 같은 코드 — ModSec 비활성 의심
    hint: |
      wafw00f(자동) + 수동 fingerprint(정상 200 vs 공격 403 + Server 헤더). 이 환경의
      wafw00f 는 "No WAF"(stealth) — 자동 도구 한계 학습. 수동 fingerprint 가 핵심.
    category: bypass
    points: 10
    answer: |
