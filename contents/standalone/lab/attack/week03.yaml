        intent: |
          JuiceShop 의 /rest/user/login 으로 JWT 발급 + 3 부분 base64 디코드 + alg /
          payload 의 user info 추출. *base64 ≠ 암호화* + *서명만 검증* 인지. W06 의 JWT
          alg=none 우회의 직접 전제.
        success_criteria:
          - "JWT 발급 성공 (a.b.c 형식, 3 부분)"
          - "header 디코드 — alg + typ 필드 명시"
          - "payload 디코드 — user id / email 추출"
          - "signature 의 binary 성격 인지 (디코드 X, 길이만)"
          - "base64 가 암호화 아닌 인코딩 인지 + payload 평문 가시"
        acceptable_methods:
          - "curl POST + JSON body (수기): 명령 `curl -X POST -d '{...}' http://.../rest/user/login`. JWT 발급 표준."
          - "base64 -d (디코드): 명령 `echo $part | base64 -d`. base64url 인 경우 `tr '_-' '/+'` 변환."
          - "Python jwt 라이브러리: 명령 `python3 -c \"import jwt; print(jwt.decode(t, options={'verify_signature':False}))\"`. signature 무시."
          - "jwt.io (외부 GUI): 브라우저 https://jwt.io 에 토큰 paste → 자동 디코드. 인터넷 필요."
          - "jwt_tool (자동화 toolkit): 명령 `jwt_tool $JWT`. alg=none + HS256 brute + RS-to-HS 등 자동."
          - "httpie + Authorization: 명령 `http GET http://.../rest/user/whoami 'Authorization:Bearer $JWT'`. JWT 의 실제 사용 검증."
          - "openssl base64: 명령 `echo $part | openssl base64 -d`. base64 -d 대안."
          - "Bastion AI 자동 + KG: bastion 이 (1) login → JWT (2) 3 부분 디코드 (3) alg + claims 자동 분석 → KG anchor."
        negative_signs:
          - "JWT 발급 시도하고 401 받고 종료 — admin password 확인 없이"
          - "base64 디코드 결과 출력만 하고 *alg 알고리즘* 무관심"
          - "signature 까지 디코드 시도 (binary 라 실패 — 정상)"
          - "base64 = 암호화 라 오인 → JWT 보안 모델 이해 부족"
          - "W06 의 alg=none 우회 연결 인지 못함"
    target_vm: attacker

