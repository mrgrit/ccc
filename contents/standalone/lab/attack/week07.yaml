          - "1) UA=ffuf hit ≪ 2 (ModSec 913 차단)"
          - "2) UA Mozilla hit ≫ 0 + content_length 동일 (SPA false positive 인지)"
          - "3) -fs 필터 후 hit < 2 (false positive 제거)"
          - "각 함정 (UA / SPA / WAF rate) 의 의미 명시"
