    answer_detail: |
      ffuf 3-step — (1) UA 차단 검증 ModSec 913 (2) UA 우회 + SPA false positive
      인지 (3) -fs 필터 로 false positive 제거. 학생이 *3 함정* (UA / SPA / WAF) 의
