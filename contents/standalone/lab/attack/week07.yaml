          - "ffuf 3-step (수기): UA → -fs 필터. 표준 SPA fuzz."
          - "gobuster -w (대안): `gobuster dir -u URL -w wordlist`. -k SSL 무시."
          - "dirb (legacy): `dirb URL wordlist`. 느림 + UA 차단 가능."
          - "feroxbuster (Rust, recursive): `feroxbuster -u URL -w wordlist`."
          - "wfuzz: `wfuzz -c -z file,wordlist --hh INDEX_SIZE URL/FUZZ`. --hh = filter content-length."
          - "Burp Intruder + payload: SPA pitfall 동일."
          - "ModSec 913 (User-Agent attack) + 942 (SQLi pattern) 인지."
          - "Bastion AI 3-step + KG: hit count 차이 anchor."
        negative_signs:
          - "단일 ffuf 만 (3 step 안 함)"
          - "SPA false positive 인지 못함 (-fs 필터 안 씀)"
          - "UA 차단 vs SPA 동일 응답 의 구조 차이 모름"
          - "결과 0 시 *왜 0* 인지 인지 못함 (API endpoint 로 안 갈아탐)"
    target_vm: attacker

  # ============================================================
  # STEP 3 — R/B/P 종합 (SSRF / Upload / Traversal)
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION (R/B/P 종합)

      Red = path traversal + SSRF / Blue = ModSec 930 (LFI) + audit log / Purple =
      whitelist URL routine.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — SSRF / Upload / Traversal 의 3 vector

      **페르소나**: file system attacker — server 의 file 의 unauthorized access.
      OWASP A10 (SSRF) + A05 (Misconfig) + A03 (Injection) 의 결합.

      **공격 의도**:
      1. **path traversal** = `../../etc/passwd` = LFI 의 시도
      2. **SSRF** = server 의 fetch endpoint 의 internal IP 시도
      3. **file upload bypass** = filter 우회 의 파일 업로드

      **공격 단계**:
      - R1: curl 의 traversal payload = 403 확인
      - R2: ModSec 930 매치 확인
      - R3: SSRF 의 metadata 시도

      ### 🔵 Blue Team — ModSec 930 (LFI) + 932 (RCE)

      **탐지 source**:
      - ModSec 930 family (LFI/RFI)
      - ModSec 932 family (RCE)
      - application 의 URL whitelist
      - 파일 시스템 의 permission audit

      **대응**:
      - B1: ModSec inline 차단
      - B2: application 의 path validation
      - B3: SSRF 의 whitelist + IMDSv2

      ### 🟣 Purple Team — defense in depth

      **개선 cycle**:
      1. ModSec 930 + 932 의 paranoia 적용
      2. application 의 path whitelist 의 default
      3. SSRF 의 schema/port 제한 + IMDSv2
      4. file upload 의 MIME 검증 + virus scan

      ## 💻
      ```bash
      ssh 6v6-attacker 'curl -s -o /dev/null -w "Traversal %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/ftp/../../etc/passwd"'
      ssh 6v6-web "sudo tail -10 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '930[0-9]+' | sort -u"
      echo "Coverage: traversal/SSRF → 930 LFI → whitelist URL routine"
      ```
    hint: 'curl traversal + 930 매치'
    category: rbp_integration
    points: 4
    answer: |
      ssh 6v6-attacker 'curl -s -o /dev/null -w "Traversal %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/ftp/../../etc/passwd"'
      ssh 6v6-web "sudo tail -10 /var/log/apache2/modsec_audit.log 2>/dev/null | grep -oE '930[0-9]+' | sort -u"
      echo "Coverage: traversal + 930 + whitelist"
    answer_detail: SSRF/Traversal R/B/P
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: SSRF R/B/P
        success_criteria: [traversal, 930, Coverage]
        acceptable_methods: ["**[OSS] curl + audit**"]
    target_vm: attacker
