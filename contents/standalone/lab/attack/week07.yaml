    answer_detail: |
      5 Path Traversal 변형 → ModSec 930 차단 카운트. 5 × 403 + 차단 ≥ 5 = 정상.
      일부 200 = paranoia 한계 (UTF-8 overlong 등). 모든 200 = ModSec 비활성.
