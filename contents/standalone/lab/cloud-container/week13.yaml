lab_id: cloud-container-ai-week13
title: 컨테이너 인시던트 대응 실습 (AI 지원)
version: ai
course: cloud-container-ai
week: 13
description: Docker 컨테이너 환경에서 보안 인시던트를 탐지하고 대응합니다. 의심 컨테이너 격리, 포렌식 데이터 수집, 컨테이너 분석,
  복구 절차를 실습합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- 컨테이너 환경의 인시던트 대응 절차를 이해한다
- 의심 컨테이너에서 포렌식 데이터를 수집한다
- 컨테이너 격리와 복구 절차를 수행한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: WEB 서버({{WEB_IP}})에서 실행 중인 컨테이너의 이상 징후를 확인하시오. 인시던트 탐지 단계.
  hint: docker stats와 docker top으로 비정상 활동을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: WEB 서버(10.20.30.80)에서 실행 중인 컨테이너의 이상 징후를 확인해줘

    📎 참고 (CLI): echo "=== 인시던트 탐지: 리소스 이상 ==="; docker stats --no-stream --format
    "{{.Name}}\tCPU:{{.CPUPerc}}\tMem:{{.MemUsage}}\tPIDs:{{.PIDs}}" 2>/dev/null;
    echo "=== 프로세스 확인 ==="; docker ps -q | head -3 | xargs -I{} sh -c "echo --- \$(docker
    inspect --format=\"{{.Name}}\" {}) ---; docker top {} 2>/dev/null | head -5" 2>/dev/null'''
  answer_detail: '컨테이너 인시던트 탐지의 징후: 비정상 CPU/메모리 사용(채굴), 예상치 못한 프로세스(리버스 셸), 네트워크 I/O
    급증(데이터 유출), PID 수 급증(Fork Bomb). docker top으로 컨테이너 내부 프로세스를 확인하여 의심 프로세스를 식별합니다.'
  verify:
    type: output_contains
    expect:
    - 인시던트 탐지
    - 10.20.30.80
    - limit_test
    field: stdout
    semantic:
      intent: '컨테이너 이상 징후 탐지 (IR Detection 단계) — docker stats --no-stream + docker
        top 병행. 이상 indicator: (1) CPU 100% 지속 - cryptojacking 의심 (2) Memory 급증 - memory
        leak/DoS (3) PIDs 급증 - Fork Bomb (4) 예상치 못한 process(bash/nc/curl in production)
        - reverse shell/exfil. NIST SP 800-61 IR 4단계 중 Detection & Analysis. Falco
        rule 로 runtime 자동 탐지 권장'
      success_criteria:
      - docker stats + docker top 실행
      - 인시던트 탐지 문자열 출력
      - 리소스 + 프로세스 정보
      acceptable_methods:
      - docker stats + docker top 병행 조회
      - Falco runtime security rules
      - Sysdig Secure real-time
      - osquery 기반 detection
      - Tracee eBPF runtime
      negative_signs:
      - 탐지 지표 1개만
      - Falco/Sysdig 언급 없음
      - NIST IR 단계 미인지
  target_vm: web
  script: 'echo "=== 인시던트 탐지: 리소스 이상 ==="; docker stats --no-stream --format "{{.Name}}\tCPU:{{.CPUPerc}}\tMem:{{.MemUsage}}\tPIDs:{{.PIDs}}"
    2>/dev/null; echo "=== 프로세스 확인 ==="; docker ps -q | head -3 | xargs -I{} sh -c
    "echo --- \$(docker inspect --format=\"{{.Name}}\" {}) ---; docker top {} 2>/dev/null
    | head -5" 2>/dev/null'''
  risk_level: low
  bastion_prompt: WEB 서버(10.20.30.80)에서 실행 중인 컨테이너의 이상 징후를 확인해줘
- order: 2
  instruction: 의심 컨테이너의 네트워크 연결 상태를 확인하시오. 외부 C2 서버 통신을 탐지합니다.
  hint: docker exec로 컨테이너 내부의 네트워크 연결을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 의심 컨테이너의 네트워크 연결 상태를 확인해줘

    📎 참고 (CLI): CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== 네트워크 연결
    분석: $(docker inspect --format="{{.Name}}" $CID) ==="; docker exec $CID sh -c "cat
    /proc/net/tcp 2>/dev/null | head -10; echo --- ; netstat -tlnp 2>/dev/null ||
    ss -tlnp 2>/dev/null" 2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  answer_detail: 인시던트 대응에서 네트워크 분석은 C2(Command & Control) 통신을 식별하는 핵심입니다. /proc/net/tcp에서
    외부 IP로의 ESTABLISHED 연결, 알 수 없는 LISTEN 포트를 확인합니다. 컨테이너의 의도된 네트워크 연결과 비교하여 비정상 연결을
    식별합니다.
  verify:
    type: output_contains
    expect:
    - 네트워크 연결 분석
    - limit_test
    - juiceshop
    field: stdout
    semantic:
      intent: '의심 컨테이너 C2 connection 분석 — docker exec <c> sh -c cat /proc/net/tcp;
        netstat -tlnp 또는 ss -tlnp. /proc/net/tcp 는 모든 TCP socket state (ESTABLISHED/LISTEN).
        hex 주소+포트 → dotted-decimal 변환 필요. Indicators of Compromise(IOC): 외부 ESTABLISHED
        연결(C2 beaconing), 알 수 없는 LISTEN 포트(backdoor), DNS 이상(DGA). VirusTotal/AbuseIPDB
        로 IP reputation 조회. ja3 fingerprint 로 malware family 식별'
      success_criteria:
      - docker exec 로 네트워크 조회
      - 네트워크 연결 분석 문자열 출력
      - TCP 연결 또는 포트 정보
      acceptable_methods:
      - docker exec + cat /proc/net/tcp + netstat/ss
      - nsenter -t <pid> -n netstat -antp
      - Suricata + Zeek 로 network traffic 분석
      - 'Falco rule: outbound connection from container'
      - MISP/OTX threat intel lookup
      negative_signs:
      - proc/net/tcp hex 포맷 해독 없음
      - 외부 IP vs 내부 IP 구분 없음
      - IOC 개념 이해 없음
  target_vm: web
  script: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== 네트워크 연결 분석: $(docker
    inspect --format="{{.Name}}" $CID) ==="; docker exec $CID sh -c "cat /proc/net/tcp
    2>/dev/null | head -10; echo --- ; netstat -tlnp 2>/dev/null || ss -tlnp 2>/dev/null"
    2>/dev/null || echo "실행 중인 컨테이너 없음"'''
  risk_level: low
  bastion_prompt: 의심 컨테이너의 네트워크 연결 상태를 확인해줘
- order: 3
  instruction: 의심 컨테이너를 네트워크에서 격리하시오. 인시던트 억제 단계.
  hint: docker network disconnect으로 네트워크를 분리하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 의심 컨테이너를 네트워크에서 격리해줘

    📎 참고 (CLI): CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect
    --format="{{.Name}}" $CID | tr -d "/"); echo "=== 컨테이너 격리: $CNAME ==="; NETS=$(docker
    inspect --format="{{range \$k, \$v := .NetworkSettings.Networks}}{{\$k}} {{end}}"
    $CID); echo "연결된 네트워크: $NETS"; echo "(실제 격리는 docker network disconnect <net> <container>)";
    echo "격리 절차 확인 완료" || echo "컨테이너 없음"'''
  answer_detail: 인시던트 억제(Containment)에서 컨테이너를 즉시 삭제하면 포렌식 증거가 사라집니다. 먼저 네트워크를 분리(docker
    network disconnect)하여 추가 피해를 방지하고, 상태를 보존한 채 분석합니다. docker pause로 프로세스를 일시 정지할
    수도 있습니다.
  verify:
    type: output_contains
    expect:
    - 격리 절차 확인 완료
    - 격리
    field: stdout
    semantic:
      intent: 'IR Containment - 의심 컨테이너 네트워크 격리 — docker inspect --format NetworkSettings.Networks
        로 연결된 network 확인 → docker network disconnect <net> <container>. NIST IR Containment
        단계. 주의: 즉시 docker stop/rm 하면 포렌식 증거(메모리, 임시 파일, process state) 소실. 올바른 순서:
        (1) network disconnect(traffic 차단) 또는 docker pause(프로세스 정지 but 상태 보존) (2)
        forensic capture (3) 최종 제거. 법적 증거 보전 체인'
      success_criteria:
      - docker inspect Networks 조회
      - 격리 절차 확인 완료 또는 격리 키워드
      - network 목록 출력
      acceptable_methods:
      - docker inspect Networks + network disconnect
      - docker pause <container>(프로세스 정지)
      - iptables DROP 룰로 단절
      - K8s NetworkPolicy deny-all 적용
      - Falco + auto-remediation pipeline
      negative_signs:
      - 바로 docker stop/rm(증거 손실)
      - pause 와 stop 혼동
      - 증거 보전 원칙 미인지
  target_vm: web
  script: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect
    --format="{{.Name}}" $CID | tr -d "/"); echo "=== 컨테이너 격리: $CNAME ==="; NETS=$(docker
    inspect --format="{{range \$k, \$v := .NetworkSettings.Networks}}{{\$k}} {{end}}"
    $CID); echo "연결된 네트워크: $NETS"; echo "(실제 격리는 docker network disconnect <net> <container>)";
    echo "격리 절차 확인 완료" || echo "컨테이너 없음"'''
  risk_level: low
  bastion_prompt: 의심 컨테이너를 네트워크에서 격리해줘
- order: 4
  instruction: 컨테이너의 파일시스템 변경사항을 확인하시오. 포렌식 분석 단계.
  hint: docker diff로 컨테이너 내부의 변경된 파일을 확인하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 컨테이너의 파일시스템 변경사항을 확인해줘

    📎 참고 (CLI): CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== 파일시스템 변경
    분석: $(docker inspect --format="{{.Name}}" $CID) ==="; docker diff $CID 2>/dev/null
    | head -20 || echo "변경 없음"'''
  answer_detail: docker diff는 컨테이너 생성 후 변경된 파일을 표시합니다. A(추가), C(변경), D(삭제). 악성 코드가
    추가되었거나(/tmp/backdoor), 설정이 변경되었거나(/etc/passwd), 바이너리가 교체된 것을 식별할 수 있습니다. 이 정보는
    IOC(Indicator of Compromise)로 활용됩니다.
  verify:
    type: output_contains
    expect:
    - 파일시스템 변경 분석
    - /etc/nginx
    - /etc/nginx/conf.d
    field: stdout
    semantic:
      intent: '포렌식 - 파일시스템 변경사항 — docker diff <container>. overlay2 의 upper layer
        변경 추적: A(added) /tmp/backdoor, C(changed) /etc/passwd, D(deleted) /var/log/auth.log.
        Indicator of Compromise 추출: webshell 파일(/var/www/shell.php), cron persistence(/var/spool/cron/),
        modified binary(/bin/ls). IOC 를 CTI 플랫폼(MISP/OpenCTI) 에 STIX 2.1 형식으로 등록 →
        조직간 공유. MITRE ATT&CK T1070 기반 분석'
      success_criteria:
      - docker diff 실행
      - 파일시스템 변경 분석 문자열
      - A/C/D prefix 변경 목록
      acceptable_methods:
      - docker diff <container>
      - docker exec <c> find /tmp /var/tmp -mmin -60(최근 수정)
      - Velociraptor artifact collection
      - ThreatResponse / CAPE 로 자동 분석
      - syscall audit (auditd)
      negative_signs:
      - docker diff 출력 해석 없음 (A/C/D 구분)
      - IOC 추출 개념 없음
      - STIX/MISP 언급 없음
  target_vm: web
  script: 'CID=$(docker ps -q | head -1); [ -n "$CID" ] && echo "=== 파일시스템 변경 분석:
    $(docker inspect --format="{{.Name}}" $CID) ==="; docker diff $CID 2>/dev/null
    | head -20 || echo "변경 없음"'''
  risk_level: low
  bastion_prompt: 컨테이너의 파일시스템 변경사항을 확인해줘
- order: 5
  instruction: 컨테이너를 이미지로 커밋하여 포렌식 스냅샷을 보존하시오.
  hint: docker commit으로 현재 상태를 이미지로 저장하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 컨테이너를 이미지로 커밋하여 포렌식 스냅샷을 보존해줘

    📎 참고 (CLI): CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect
    --format="{{.Name}}" $CID | tr -d "/"); echo "=== 포렌식 스냅샷 생성 ==="; docker commit
    $CID forensic-${CNAME}-$(date +%Y%m%d) 2>/dev/null && docker images | grep forensic
    || echo "컨테이너 없음"'
  answer_detail: docker commit은 컨테이너의 현재 상태를 새 이미지로 저장합니다. 이 포렌식 이미지는 나중에 분석할 수 있으며,
    법적 증거로도 활용됩니다. 커밋 후 원본 컨테이너를 삭제해도 포렌식 이미지에서 분석을 계속할 수 있습니다.
  verify:
    type: output_contains
    expect: 포렌식 스냅샷 생성
    field: stdout
    semantic:
      intent: '포렌식 스냅샷 보존 — docker commit $CID forensic-${CNAME}-$(date +%Y%m%d).
        docker commit 는 running 컨테이너의 현재 상태(rootfs + config) 를 신규 이미지로 캡처 - 원본 컨테이너
        삭제 후에도 분석 가능. 법적 증거 체인 요건: 해시 기록(sha256sum) + timestamp + analyst 서명. docker
        save -o forensic.tar 로 tar 파일 export → offline 분석. SANS Forensic Container
        Guide 참조'
      success_criteria:
      - docker commit forensic-<name>-<date>
      - 포렌식 스냅샷 생성 문자열
      - docker images 에 forensic image 확인
      acceptable_methods:
      - docker commit + docker save tar export
      - docker export <c> > /tmp/export.tar (container 만)
      - skopeo copy docker://... dir:/path 로 OCI 포맷
      - dive 로 생성된 이미지 layer 분석
      - Velociraptor Docker.ContainerHunter artifact
      negative_signs:
      - 증거 체인 해시·timestamp 기록 없음
      - commit 없이 바로 삭제
      - export 와 commit 혼동
  target_vm: web
  script: CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect --format="{{.Name}}"
    $CID | tr -d "/"); echo "=== 포렌식 스냅샷 생성 ==="; docker commit $CID forensic-${CNAME}-$(date
    +%Y%m%d) 2>/dev/null && docker images | grep forensic || echo "컨테이너 없음"
  risk_level: low
  bastion_prompt: 컨테이너를 이미지로 커밋하여 포렌식 스냅샷을 보존해줘
- order: 6
  instruction: 컨테이너의 로그를 포렌식 증거로 보존하시오.
  hint: docker logs의 출력을 파일로 저장하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 컨테이너의 로그를 포렌식 증거로 보존해줘

    📎 참고 (CLI): CID=$(docker ps -q | head -1); [ -n "$CID" ] && CNAME=$(docker inspect
    --format="{{.Name}}" $CID | tr -d "/"); echo "=== 로그 보존 ==="; docker logs $CID
    2>&1 | tail -50 > /tmp/forensic-${CNAME}-logs.txt 2>/dev/null; echo "로그 저장: /tmp/forensic-${CNAME}-logs.txt";
    wc -l /tmp/forensic-${CNAME}-logs.txt 2>/dev/null || echo "컨테이너 없음"'''
  answer_detail: 인시던트 대응에서 로그 보존은 법적 요구사항이기도 합니다. 컨테이너 로그, Docker 이벤트, 호스트 시스템 로그를
    모두 수집하여 타임스탬프순으로 정리합니다. 증거 보전 체인(Chain of Custody)을 유지하기 위해 해시값도 기록합니다.
  verify:
    type: output_contains
    expect: 로그 보존
    field: stdout
    semantic:
      intent: '컨테이너 로그 포렌식 증거 보존 — docker logs $CID 2>&1 | tail -50 > /tmp/forensic-<name>-logs.txt.
        증거 보전 체인(Chain of Custody) 요건: (1) 수집자 + 수집 시각 (2) SHA-256 해시 (3) 보관 위치 +
        접근 제어 (4) 사본 제공 시 기록. 법적 제출 시 원본 불변 증명. 로그 보존 기간: 개인정보보호법·GDPR 연계 72시간 내 통지
        대비. 자동화: auditd + rsyslog forward to WORM storage'
      success_criteria:
      - docker logs > 파일 저장
      - 로그 보존 문자열 출력
      - wc -l 로 라인 수 검증
      acceptable_methods:
      - docker logs > file + sha256sum + timestamp
      - Chainsaw 로 Sigma rule 기반 로그 분석
      - fluentd aggregator 로 실시간 수집
      - Evidence Ingestion 시스템(IBM Resilient 등)
      - AWS CloudWatch Logs + S3 Glacier(장기 보관)
      negative_signs:
      - 해시/timestamp 기록 없음
      - Chain of Custody 개념 없음
