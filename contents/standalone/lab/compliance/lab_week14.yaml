    \ > /tmp/login_alert.sh\n#!/bin/bash\nTHRESHOLD=5\nFAILED=$(sudo grep -c 'Failed\
    \ password' /var/log/auth.log 2>/dev/null || echo 0)\nif [ \"$FAILED\" -ge \"\
    $THRESHOLD\" ]; then\n  echo \"[경고] 로그인 실패 ${FAILED}회 감지!\"\n  echo \"상위 실패 IP:\"\
    \n  sudo grep 'Failed password' /var/log/auth.log 2>/dev/null | awk '{print $(NF-3)}'\
    \ | sort | uniq -c | sort -rn | head -5\nelse\n  echo \"[정상] 로그인 실패 ${FAILED}회\
    \ (임계값: ${THRESHOLD})\"\nfi\nSCRIPT\nchmod +x /tmp/login_alert.sh && bash /tmp/login_alert.sh"
