    📎 참고 (CLI): cat << ''SCRIPT'' > /tmp/awareness_check.sh

    #!/bin/bash

    echo ''=== 보안 교육/인식 프로그램 점검 ===''

    echo ''''

    echo ''[1. 경고 배너]''

    grep -q ''Banner'' /etc/ssh/sshd_config && echo ''  SSH 배너: 설정됨'' || echo ''  SSH
    배너: 미설정''

    cat /etc/issue.net 2>/dev/null | head -2

    echo ''[2. MOTD]''

    [ -s /etc/motd ] && echo ''  MOTD: 설정됨'' || echo ''  MOTD: 미설정''

    echo ''[3. 교육 자료]''

    ls /opt/security-training/*.txt 2>/dev/null | wc -l | xargs -I{} echo ''  교육 자료:
    {}개''

    echo ''[4. 보안 정책]''

    ls /opt/security-policy/*.txt 2>/dev/null | wc -l | xargs -I{} echo ''  정책 문서:
    {}개''

    echo ''[5. 사용자 보안 현황]''

    echo "  활성 계정: $(grep -vc ''nologin\|false'' /etc/passwd)개"

    echo "  금일 로그인 실패: $(sudo grep -c ''Failed'' /var/log/auth.log 2>/dev/null ||
    echo 0)건"

    echo ''''

    echo ''=== 교육/인식 점검 완료 ===''

    SCRIPT

    chmod +x /tmp/awareness_check.sh && bash /tmp/awareness_check.sh'
  answer_detail: 보안 교육/인식 프로그램은 기술적 통제만으로 해결할 수 없는 인적 보안(human factor)을 다룹니다. 피싱,
