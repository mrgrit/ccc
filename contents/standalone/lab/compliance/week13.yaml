lab_id: compliance-ai-week13
title: 보안정책 문서 작성 실습 (AI 지원)
version: ai
course: compliance-ai
week: 13
description: 조직의 보안정책 문서를 작성하고, 정책 내용을 시스템 설정으로 구현합니다. 접근 통제 정책, 패스워드 정책, 감사 정책, 인시던트
  대응 정책을 작성하고 기술적으로 적용합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 보안정책 문서 체계(상위-하위 정책, 지침, 절차)를 이해한다
- 정책 문서를 작성하고 시스템에 구현한다
- 정책과 실제 설정의 일관성을 검증한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})에 보안정책 디렉터리를 생성하고, 상위 정보보안 정책서를 작성하시오.
  hint: mkdir로 디렉터리를 만들고 tee로 정책 문서를 작성하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10 구현 방법과 예시를 설명해줘

    📎 참고 (CLI): sudo mkdir -p /opt/security-policy && cat << ''EOF'' | sudo tee /opt/security-policy/information_security_policy.txt

    === 정보보안 정책서 ===

    1. 목적: 조직의 정보자산을 보호하고 비즈니스 연속성을 확보한다

    2. 적용범위: 전 임직원, 정보시스템, 협력업체

    3. 기본원칙: 기밀성, 무결성, 가용성 보장

    4. 하위정책: 접근통제, 패스워드, 감사, 인시던트대응

    5. 위반시 조치: 경고, 직무정지, 해고, 법적조치

    6. 검토주기: 연 1회

    EOF'
  answer_detail: 정보보안 정책서는 조직의 보안 방향을 정하는 최상위 문서입니다. 목적, 적용범위, 기본원칙, 하위정책 체계, 위반 조치,
    검토 주기가 포함되어야 합니다. 경영진의 서명/승인을 받아 권위를 부여합니다.
  verify:
    type: output_contains
    expect: 정보보안 정책서
    field: stdout
    semantic:
      intent: '상위 정보보안 정책서 작성 — sudo mkdir -p /opt/security-policy 로 정책 디렉터리 생성 후
        heredoc + sudo tee 로 /opt/security-policy/information_security_policy.txt
        작성. 6개 조항: 목적/적용범위/기본원칙(CIA)/하위정책/위반조치/검토주기(연 1회). 경영진 서명으로 권위 부여.'
      success_criteria:
      - sudo mkdir -p /opt/security-policy 디렉터리 생성
      - cat << EOF | sudo tee 로 information_security_policy.txt 작성
      - 목적/범위/CIA 원칙/하위정책/위반조치/검토주기 6개 섹션 포함
      acceptable_methods:
      - mkdir + heredoc | tee 조합
      - git 저장소에 정책 markdown 으로 버전 관리
      - Confluence/Notion 정책 공간에 업로드
      - ISO 27001 SoA (Statement of Applicability) 형식
      negative_signs:
      - 디렉터리 생성 없이 파일만 작성
      - 6개 조항 중 일부 누락
      - 경영진 승인/검토주기 명시 누락
  target_vm: secu
  script: 'sudo mkdir -p /opt/security-policy && cat << ''EOF'' | sudo tee /opt/security-policy/information_security_policy.txt

    === 정보보안 정책서 ===

    1. 목적: 조직의 정보자산을 보호하고 비즈니스 연속성을 확보한다

    2. 적용범위: 전 임직원, 정보시스템, 협력업체

    3. 기본원칙: 기밀성, 무결성, 가용성 보장

    4. 하위정책: 접근통제, 패스워드, 감사, 인시던트대응

    5. 위반시 조치: 경고, 직무정지, 해고, 법적조치

    6. 검토주기: 연 1회

    EOF'
  risk_level: low
  bastion_prompt: SECU 서버({{SECU_IP}})에 보안정책 디렉터리를 생성하고, 상위 정보보안 정책서를 작성하시오.
- order: 2
  instruction: 접근 통제 정책 문서를 작성하시오.
  hint: 계정 관리, 권한 부여, 원격 접근, 물리적 접근 통제를 포함하세요.
  category: config
  points: 10
  answer: "\U0001F916 프롬프트: 접근 통제 정책 문서를 구현 방법을 설명하고 예시 코드를 보여줘\n\U0001F4CE 참고 (CLI):\
    \ cat << 'EOF' | sudo tee /opt/security-policy/access_control_policy.txt\n===\
    \ 접근 통제 정책 ===\n1. 계정관리\n   - 개인 계정 사용 원칙 (공용 계정 금지)\n   - 퇴직/전보 시 24시간 이내 계정\
    \ 비활성화\n   - 30일 미사용 계정 자동 잠금\n2. 권한관리\n   - 최소 권한 원칙 적용\n   - 특권 계정(root/sudo)\
    \ 사용 시 승인 필요\n   - 분기별 권한 재검토\n3. 원격접근\n   - SSH 키 기반 인증 권장\n   - root 원격 접속 금지\n\
    \   - 접속 시 경고 배너 표시\nEOF"
  answer_detail: 접근 통제 정책은 '누가, 어떤 조건에서, 어떤 자원에 접근할 수 있는가'를 정의합니다. 최소 권한 원칙(PoLP),
    직무 분리(SoD), 필요 지식(Need-to-Know) 원칙을 기반으로 합니다.
  verify:
    type: output_contains
    expect: 접근 통제 정책
    field: stdout
    semantic:
      intent: '하위 접근 통제 정책 문서 작성 — heredoc + tee 로 /opt/security-policy/access_control_policy.txt.
        3개 섹션: (1) 계정관리(개인 계정 원칙, 퇴직 시 24h 비활성화, 30일 미사용 자동 잠금) (2) 권한관리(최소 권한, 특권
        승인, 분기별 재검토) (3) 원격접근(SSH 키, root 차단, 경고 배너). PoLP/SoD/Need-to-Know 기반.'
      success_criteria:
      - heredoc | sudo tee 로 access_control_policy.txt 작성
      - 계정/권한/원격접근 3개 섹션 구조화
      - 퇴직 24h, 30일 잠금, 분기 재검토 등 구체적 기준값 포함
      acceptable_methods:
      - heredoc | tee 파일 작성
      - FreeIPA/Active Directory 정책으로 구현
      - Vault access policy HCL 로 기술적 매핑
      - RBAC/ABAC 프레임워크 기반 정책 설계
      negative_signs:
      - 3개 섹션 중 일부 누락
      - 구체적 수치(24h/30일) 없이 추상적 서술만
      - 최소 권한/직무 분리 원칙 언급 누락
  target_vm: secu
  script: "cat << 'EOF' | sudo tee /opt/security-policy/access_control_policy.txt\n\
    === 접근 통제 정책 ===\n1. 계정관리\n   - 개인 계정 사용 원칙 (공용 계정 금지)\n   - 퇴직/전보 시 24시간 이내 계정\
    \ 비활성화\n   - 30일 미사용 계정 자동 잠금\n2. 권한관리\n   - 최소 권한 원칙 적용\n   - 특권 계정(root/sudo)\
    \ 사용 시 승인 필요\n   - 분기별 권한 재검토\n3. 원격접근\n   - SSH 키 기반 인증 권장\n   - root 원격 접속 금지\n\
    \   - 접속 시 경고 배너 표시\nEOF"
  risk_level: low
  bastion_prompt: 접근 통제 정책 문서를 작성하시오.
- order: 3
  instruction: 접근 통제 정책의 'root 원격 접속 금지' 조항을 시스템에 구현하시오.
  hint: sshd_config에서 PermitRootLogin을 no로 설정하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 접근 통제 정책의 ''root 원격 접속 금지'' 조항을 시스템에 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): sudo sed -i ''s/^#\?PermitRootLogin.*/PermitRootLogin no/'' /etc/ssh/sshd_config
    && grep ''^PermitRootLogin'' /etc/ssh/sshd_config'
  answer_detail: 정책 문서가 있어도 기술적으로 강제하지 않으면 실효성이 없습니다. PermitRootLogin no를 설정하면 SSH를
    통한 root 직접 접속이 차단되어, 접근 통제 정책의 '원격 root 접속 금지' 조항이 기술적으로 구현됩니다.
  verify:
    type: output_contains
    expect: PermitRootLogin no
    field: stdout
    semantic:
      intent: 정책 → 시스템 구현 (root 원격 접속 금지) — sudo sed -i s/^#\?PermitRootLogin.*/PermitRootLogin
        no/ /etc/ssh/sshd_config 으로 주석 여부 관계없이 PermitRootLogin 라인을 no 로 치환 후 grep
        ^PermitRootLogin 로 적용 검증. 정책 문서와 기술적 강제 연결.
      success_criteria:
      - sed -i 로 sshd_config 의 PermitRootLogin 라인을 no 로 변경
      - 주석(#) 유무 모두 처리하는 정규식 사용
      - grep ^PermitRootLogin 로 최종 적용값 검증
      acceptable_methods:
      - sed -i s/^#?PermitRootLogin.*/PermitRootLogin no/
      - echo PermitRootLogin no | sudo tee -a /etc/ssh/sshd_config 후 sshd -t 검증
      - Ansible lineinfile regexp 로 멱등 적용
      - /etc/ssh/sshd_config.d/ 아래 drop-in 파일 생성
      negative_signs:
      - grep 검증 없이 sed 만 실행
      - 주석 처리된 라인 무시로 실제 적용 실패
      - sshd reload/restart 로 런타임 적용 누락 고려
  target_vm: secu
  script: sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
    && grep '^PermitRootLogin' /etc/ssh/sshd_config
  risk_level: low
  bastion_prompt: 접근 통제 정책의 'root 원격 접속 금지' 조항을 시스템에 구현하시오.
- order: 4
  instruction: 패스워드 정책 문서를 작성하시오.
  hint: 최소 길이, 복잡도, 변경 주기, 이전 패스워드 재사용 금지를 포함하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 패스워드 정책 문서를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): cat << ''EOF'' | sudo tee /opt/security-policy/password_policy.txt

    === 패스워드 정책 ===

    1. 최소길이: 12자 이상

    2. 복잡도: 대문자, 소문자, 숫자, 특수문자 중 3종 이상 조합

    3. 변경주기: 90일마다 변경 의무

    4. 이력관리: 최근 5개 패스워드 재사용 금지

    5. 잠금정책: 5회 연속 실패 시 10분 잠금

    6. 초기패스워드: 최초 로그인 시 즉시 변경

    EOF'
  answer_detail: 패스워드 정책은 가장 기본적인 인증 통제입니다. NIST SP 800-63B 최신 가이드라인에서는 복잡도보다 길이를
    강조하며, 정기적 변경 강제보다 침해 시 즉시 변경을 권장합니다. 다만 한국 법규에서는 아직 정기 변경을 요구합니다.
  verify:
    type: output_contains
    expect: 패스워드 정책
    field: stdout
    semantic:
      intent: '패스워드 정책 문서 작성 — heredoc + tee 로 /opt/security-policy/password_policy.txt.
        6개 조항: (1) 최소길이 12자 (2) 복잡도 4종 중 3종 조합 (3) 변경주기 90일 (4) 이력관리 5개 재사용 금지 (5)
        잠금정책 5회 실패 시 10분 (6) 초기 패스워드 첫 로그인 즉시 변경. NIST SP 800-63B vs 한국 법규 차이 인지.'
      success_criteria:
      - heredoc | sudo tee 로 password_policy.txt 작성
      - 6개 조항 모두 포함하며 구체적 수치(12자/90일/5회/10분) 명시
      - 복잡도 조합(대/소문자/숫자/특수문자) 기준 명시
      acceptable_methods:
      - heredoc | tee 파일 작성
      - markdown 정책 문서 git 관리
      - NIST SP 800-63B 가이드 참조
      - SOX/PCI-DSS 교차 요건 매핑 표 작성
      negative_signs:
      - 6개 조항 중 일부 누락
      - 수치 기준 없이 추상적 표현만
      - NIST 최신 가이드와 한국 법규 차이 맥락 누락
  target_vm: secu
  script: 'cat << ''EOF'' | sudo tee /opt/security-policy/password_policy.txt

    === 패스워드 정책 ===

    1. 최소길이: 12자 이상

    2. 복잡도: 대문자, 소문자, 숫자, 특수문자 중 3종 이상 조합

    3. 변경주기: 90일마다 변경 의무

    4. 이력관리: 최근 5개 패스워드 재사용 금지

    5. 잠금정책: 5회 연속 실패 시 10분 잠금

    6. 초기패스워드: 최초 로그인 시 즉시 변경

    EOF'
  risk_level: low
  bastion_prompt: 패스워드 정책 문서를 작성하시오.
- order: 5
  instruction: 패스워드 정책을 시스템에 구현하시오. minlen=12, 복잡도, PASS_MAX_DAYS=90을 적용합니다.
  hint: pwquality.conf와 login.defs를 수정하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 패스워드 정책을 시스템에 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): sudo sed -i ''s/^# minlen.*/minlen = 12/'' /etc/security/pwquality.conf
    && sudo sed -i ''s/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   90/'' /etc/login.defs && echo
    ''=== 적용 확인 ==='' && grep ''minlen'' /etc/security/pwquality.conf | grep -v ''^#''
    && grep ''^PASS_MAX_DAYS'' /etc/login.defs'
  answer_detail: 정책 문서의 각 조항에 대해 기술적 구현 수단을 매핑해야 합니다. minlen=12 -> pwquality.conf,
    변경주기 90일 -> login.defs PASS_MAX_DAYS, 잠금정책 -> pam_faillock. 정책과 구현의 매핑 문서를 관리하면
    감사 시 증적으로 활용됩니다.
  verify:
    type: output_contains
    expect: minlen
    field: stdout
    semantic:
      intent: 패스워드 정책 기술 구현 — sudo sed -i s/^# minlen.*/minlen = 12/ /etc/security/pwquality.conf
        (최소 길이 12자 적용) + sudo sed -i s/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   90/ /etc/login.defs
        (변경주기 90일 적용) 후 grep 으로 두 파일 모두 적용 검증. 정책 조항과 기술 구현 매핑 문서화.
      success_criteria:
      - pwquality.conf 의 minlen 을 12 로 변경
      - login.defs 의 PASS_MAX_DAYS 를 90 으로 변경
      - grep 으로 두 파일 모두 적용 결과 확인
      acceptable_methods:
      - sed -i 로 두 파일 동시 수정
      - authconfig/authselect 로 PAM 프로파일 기반 적용
      - Ansible lineinfile 로 멱등 관리
      - /etc/security/pwquality.conf.d/ drop-in 파일
      negative_signs:
      - 두 파일 중 하나만 수정
      - grep 검증 단계 누락
      - 정책-구현 매핑 문서화 맥락 누락
  target_vm: secu
  script: sudo sed -i 's/^# minlen.*/minlen = 12/' /etc/security/pwquality.conf &&
    sudo sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   90/' /etc/login.defs && echo '===
    적용 확인 ===' && grep 'minlen' /etc/security/pwquality.conf | grep -v '^#' && grep
    '^PASS_MAX_DAYS' /etc/login.defs
  risk_level: low
  bastion_prompt: 패스워드 정책을 시스템에 구현하시오. minlen=12, 복잡도, PASS_MAX_DAYS=90을 적용합니다.
- order: 6
  instruction: 감사 정책 문서를 작성하시오.
