        이하 + 원격 백업 (4) 주 1회 검토 (5) 이상징후 알림 (6) SIEM(10.20.30.100) 중앙 연동. 위변조 방지 +
        실시간 상관분석.'
      success_criteria:
      - heredoc | sudo tee 로 audit_policy.txt 작성
      - 감사대상/보관/로그보호/검토/알림/SIEM 6 섹션 구조화
      - 구체적 기준(1년, 640, 주1회, 10.20.30.100) 명시
      acceptable_methods:
      - heredoc | tee 파일 작성
      - auditd rules 로 기술 매핑 동시 설계
      - Wazuh/Splunk SIEM rule 로 구현 계획 연결
      - ISO 27001 A.8.15-17 감사 로깅 통제와 매핑
      negative_signs:
      - 6개 조항 중 일부 누락
      - 보관 기간/권한/SIEM IP 등 수치 누락
      - 중앙 관리와 위변조 방지 맥락 누락
