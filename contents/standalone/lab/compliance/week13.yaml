- order: 7
  instruction: 작성한 보안정책 문서 목록을 확인하고, 각 정책이 시스템에 구현되었는지 검증하시오.
  hint: /opt/security-policy/ 디렉터리의 파일을 확인하고, 정책-구현 매핑을 검증하세요.
  category: audit
  points: 12
  answer: '🤖 프롬프트: 작성한 보안정책 문서 목록을 확인하고, 각 정책이 시스템에 구현되었는지 검증해줘

    📎 참고 (CLI): echo ''=== 정책 문서 목록 ==='' && ls -la /opt/security-policy/ && echo
    '''' && echo ''=== 정책-구현 매핑 검증 ==='' && echo ''[접근통제] PermitRootLogin:'' && grep
    ''^PermitRootLogin'' /etc/ssh/sshd_config && echo ''[패스워드] minlen:'' && grep ''minlen''
    /etc/security/pwquality.conf | grep -v ''^#'' && echo ''[패스워드] PASS_MAX_DAYS:''
    && grep ''^PASS_MAX_DAYS'' /etc/login.defs && echo ''[감사] auditd:'' && sudo systemctl
    is-active auditd 2>/dev/null'
  answer_detail: 정책 문서와 실제 구현 사이의 차이(gap)를 식별하는 것이 중요합니다. 정책에 'root 접속 금지'라고 되어 있는데
    PermitRootLogin이 yes이면 정책과 구현이 불일치한 것입니다. 이런 불일치를 정기적으로 점검하는 것이 보안감사의 핵심입니다.
  verify:
    type: output_contains
    expect:
    - 정책-구현 매핑 검증
    - Markdown
    - policies
    field: stdout
    semantic:
      intent: '정책-구현 매핑 검증 — ls -la /opt/security-policy/ 로 정책 문서 목록 확인 후 각 정책 조항별
        기술 구현 grep: (1) PermitRootLogin(sshd_config) (2) minlen(pwquality.conf) (3)
        PASS_MAX_DAYS(login.defs) (4) auditd is-active. 정책 gap 자동 탐지로 감사 증적.'
      success_criteria:
      - ls -la /opt/security-policy/ 로 작성된 정책 파일 리스트 확인
      - 정책별 4개 기술 구현 항목 grep 으로 개별 검증
      - 정책-구현 gap 식별로 미흡 항목 도출
      acceptable_methods:
      - ls + 4개 grep 조합 매핑 검증
      - Open Policy Agent (OPA) rego 로 정책 평가
      - Chef InSpec 컴플라이언스 프로파일 실행
      - AWS Config / Azure Policy 로 클라우드 정책 평가
      negative_signs:
      - 정책 목록만 확인하고 구현 매핑 누락
      - 4개 항목 중 일부 미점검
      - gap 식별 결과 요약 누락
  target_vm: secu
  script: echo '=== 정책 문서 목록 ===' && ls -la /opt/security-policy/ && echo '' && echo
    '=== 정책-구현 매핑 검증 ===' && echo '[접근통제] PermitRootLogin:' && grep '^PermitRootLogin'
    /etc/ssh/sshd_config && echo '[패스워드] minlen:' && grep 'minlen' /etc/security/pwquality.conf
    | grep -v '^#' && echo '[패스워드] PASS_MAX_DAYS:' && grep '^PASS_MAX_DAYS' /etc/login.defs
    && echo '[감사] auditd:' && sudo systemctl is-active auditd 2>/dev/null
  risk_level: low
  bastion_prompt: 작성한 보안정책 문서 목록을 확인하고, 각 정책이 시스템에 구현되었는지 검증해줘
- order: 8
  instruction: 보안정책 준수 자동 점검 스크립트를 작성하고 실행하시오. 정책 문서의 각 조항과 시스템 설정을 자동 대조합니다.
  hint: 각 정책 항목에 대해 기준값과 현재값을 비교하는 로직을 구현하세요.
  category: audit
  points: 14
  answer: "\U0001F916 프롬프트: 보안정책 준수 자동 점검 스크립트를 작성하고 실행하시오 구현 방법과 예시를 설명해줘\n\U0001F4CE\
    \ 참고 (CLI): cat << 'SCRIPT' > /tmp/policy_compliance.sh\n#!/bin/bash\necho '===\
    \ 보안정책 준수 자동 점검 ==='\nPASS=0; FAIL=0\ncheck() {\n  if [ \"$2\" = \"true\" ]; then\n\
    \    echo \"  [적합] $1\"\n    PASS=$((PASS+1))\n  else\n    echo \"  [미흡] $1\"\n\
    \    FAIL=$((FAIL+1))\n  fi\n}\necho '[접근 통제 정책]'\nROOT=$(grep '^PermitRootLogin\
    \ no' /etc/ssh/sshd_config 2>/dev/null | wc -l)\ncheck 'root 원격 접속 차단' \"$([ $ROOT\
    \ -gt 0 ] && echo true || echo false)\"\necho '[패스워드 정책]'\nMINLEN=$(grep 'minlen'\
    \ /etc/security/pwquality.conf 2>/dev/null | grep -v '^#' | awk -F= '{print $2}'\
    \ | tr -d ' ')\ncheck \"최소길이 12자 (현재: ${MINLEN:-미설정})\" \"$([ \"${MINLEN:-0}\"\
    \ -ge 12 ] && echo true || echo false)\"\nMAXDAYS=$(grep '^PASS_MAX_DAYS' /etc/login.defs\
    \ | awk '{print $2}')\ncheck \"변경주기 90일 (현재: ${MAXDAYS}일)\" \"$([ $MAXDAYS -le\
    \ 90 ] && echo true || echo false)\"\necho '[감사 정책]'\nAUDIT=$(sudo systemctl is-active\
    \ auditd 2>/dev/null)\ncheck \"auditd 활성 (현재: $AUDIT)\" \"$([ \"$AUDIT\" = 'active'\
    \ ] && echo true || echo false)\"\necho ''\necho \"결과: 적합 ${PASS}건, 미흡 ${FAIL}건\"\
    \necho '=== 정책 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/policy_compliance.sh && bash\
    \ /tmp/policy_compliance.sh"
  answer_detail: 보안정책 준수 자동화는 GRC(Governance, Risk, Compliance)의 핵심입니다. 정책 조항을 기술적
    점검 로직으로 변환하면, 정기적이고 일관된 점검이 가능합니다. 이 스크립트를 cron에 등록하면 일일 자동 점검이 가능하며, 결과를 SIEM으로
    전송하면 중앙 모니터링도 됩니다.
  verify:
    type: output_contains
    expect: 정책 점검 완료
    field: stdout
    semantic:
      intent: '보안정책 준수 자동 점검 GRC 스크립트 — /tmp/policy_compliance.sh heredoc 작성. check()
        함수로 적합/미흡 판정 + PASS/FAIL 카운터. 4개 조항: (1) root 원격 접속 차단 (2) 최소길이 12 (3) 변경주기
        90일 (4) auditd active. 결과 요약으로 일일 자동 cron 점검 가능. SIEM 전송 연계.'
      success_criteria:
      - heredoc 으로 /tmp/policy_compliance.sh 작성 후 chmod +x && bash 실행
      - check() 함수로 조건별 적합/미흡 자동 판정 + PASS/FAIL 카운터
      - '4개 정책 조항 모두 평가하여 결과: 적합 N건, 미흡 M건 출력'
      acceptable_methods:
      - heredoc + check() 함수 + 카운터 기반 스크립트
      - OpenSCAP oscap xccdf eval + report HTML
      - Chef InSpec profile 으로 정책 테스트
      - Prometheus alerting rule + Grafana dashboard 지속 모니터링
      negative_signs:
      - check() 함수 없이 평면 나열
      - 4개 조항 중 일부 누락
      - PASS/FAIL 카운터와 결과 요약 출력 누락
  target_vm: secu
  script: "cat << 'SCRIPT' > /tmp/policy_compliance.sh\n#!/bin/bash\necho '=== 보안정책\
    \ 준수 자동 점검 ==='\nPASS=0; FAIL=0\ncheck() {\n  if [ \"$2\" = \"true\" ]; then\n\
    \    echo \"  [적합] $1\"\n    PASS=$((PASS+1))\n  else\n    echo \"  [미흡] $1\"\n\
    \    FAIL=$((FAIL+1))\n  fi\n}\necho '[접근 통제 정책]'\nROOT=$(grep '^PermitRootLogin\
    \ no' /etc/ssh/sshd_config 2>/dev/null | wc -l)\ncheck 'root 원격 접속 차단' \"$([ $ROOT\
    \ -gt 0 ] && echo true || echo false)\"\necho '[패스워드 정책]'\nMINLEN=$(grep 'minlen'\
    \ /etc/security/pwquality.conf 2>/dev/null | grep -v '^#' | awk -F= '{print $2}'\
    \ | tr -d ' ')\ncheck \"최소길이 12자 (현재: ${MINLEN:-미설정})\" \"$([ \"${MINLEN:-0}\"\
    \ -ge 12 ] && echo true || echo false)\"\nMAXDAYS=$(grep '^PASS_MAX_DAYS' /etc/login.defs\
    \ | awk '{print $2}')\ncheck \"변경주기 90일 (현재: ${MAXDAYS}일)\" \"$([ $MAXDAYS -le\
    \ 90 ] && echo true || echo false)\"\necho '[감사 정책]'\nAUDIT=$(sudo systemctl is-active\
    \ auditd 2>/dev/null)\ncheck \"auditd 활성 (현재: $AUDIT)\" \"$([ \"$AUDIT\" = 'active'\
    \ ] && echo true || echo false)\"\necho ''\necho \"결과: 적합 ${PASS}건, 미흡 ${FAIL}건\"\
    \necho '=== 정책 점검 완료 ==='\nSCRIPT\nchmod +x /tmp/policy_compliance.sh && bash\
    \ /tmp/policy_compliance.sh"
  risk_level: low
  bastion_prompt: 보안정책 준수 자동 점검 스크립트를 작성하고 실행하시오. 정책 문서의 각 조항과 시스템 설정을 자동 대조합니다.
