lab_id: compliance-ai-week12
title: 사업연속성(BCP/DR) 기술 실습 (AI 지원)
version: ai
course: compliance-ai
week: 12
description: 사업연속성 계획(BCP)과 재해복구(DR)를 위한 기술적 준비 상태를 점검합니다. 백업 설정, 서비스 가용성, 복구 절차,
  장애 대응 체계를 시스템에서 확인합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- BCP/DR의 기술적 요구사항을 이해한다
- 백업, 복구, 가용성 설정을 점검한다
- 장애 시나리오별 복구 절차를 수립한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SECU 서버({{SECU_IP}})의 주요 서비스 가용성 상태를 확인하시오. 핵심 서비스가 모두 정상 동작하는지 점검합니다.
  hint: systemctl로 핵심 서비스(sshd, auditd, suricata, nftables, rsyslog)의 상태를 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: SECU 서버(10.20.30.1)의 주요 서비스 가용성 상태를 확인해줘

    📎 참고 (CLI): echo ''=== 핵심 서비스 가용성 ==='' && for svc in sshd auditd suricata nftables
    rsyslog; do STATUS=$(sudo systemctl is-active $svc 2>/dev/null); echo "$svc: $STATUS";
    done'
  answer_detail: BCP에서 서비스 가용성은 핵심 지표입니다. 각 서비스의 RPO(복구 시점 목표)와 RTO(복구 시간 목표)를 정의해야
    합니다. sshd가 중단되면 원격 관리 불가, auditd 중단은 감사 추적 불가를 의미합니다.
  verify:
    type: output_contains
    expect:
    - 핵심 서비스 가용성
    - UPTIME
    - average
    field: stdout
    semantic:
      intent: BCP 서비스 가용성 점검 — for svc in sshd auditd suricata nftables rsyslog; do
        systemctl is-active $svc; done 루프로 5개 핵심 서비스 상태 일괄 확인. 각 서비스별 RPO/RTO 정의 기준으로
        현재 가용성 상태 검증. sshd 중단=원격 관리 불가, auditd 중단=감사 추적 불가.
      success_criteria:
      - for 루프로 5개 서비스 is-active 상태 순회 조회
      - 각 서비스별 active/inactive/failed 상태 구분 출력
      - 중단 서비스에 대한 비즈니스 영향 연결 평가
      acceptable_methods:
      - for + systemctl is-active 조합
      - systemctl list-units --state=active,failed 로 전체 조회
      - service status (sysvinit 대체)
      - Zabbix/Prometheus node_exporter 로 서비스 메트릭 모니터링
      negative_signs:
      - 5개 서비스 중 일부만 점검
      - is-active 값 해석 없이 단순 나열
      - RPO/RTO 목표 대비 평가 맥락 누락
  target_vm: secu
  script: 'echo ''=== 핵심 서비스 가용성 ==='' && for svc in sshd auditd suricata nftables
    rsyslog; do STATUS=$(sudo systemctl is-active $svc 2>/dev/null); echo "$svc: $STATUS";
    done'
  risk_level: low
  bastion_prompt: SECU 서버(10.20.30.1)의 주요 서비스 가용성 상태를 확인해줘
- order: 2
  instruction: 서비스 자동 재시작 설정을 확인하시오. 장애 시 자동 복구가 되도록 systemd의 Restart 설정을 점검합니다.
  hint: systemctl show로 서비스의 Restart 옵션을 확인하세요.
  category: audit
  points: 10
  answer: '🤖 프롬프트: 서비스 자동 재시작 설정을 확인해줘

    📎 참고 (CLI): echo ''=== 자동 재시작 설정 ==='' && for svc in sshd auditd suricata; do
    RESTART=$(systemctl show $svc --property=Restart 2>/dev/null | cut -d= -f2); echo
    "$svc: Restart=$RESTART"; done'
  answer_detail: systemd의 Restart 설정은 서비스 장애 시 자동 복구의 핵심입니다. Restart=on-failure(비정상
    종료 시 재시작), Restart=always(항상 재시작)를 설정하면 서비스 중단 시간을 최소화할 수 있습니다. RestartSec으로 재시작
    간격도 조정합니다.
  verify:
    type: output_contains
    expect:
    - 자동 재시작 설정
    - unit_path
    - continue
    field: stdout
    semantic:
      intent: BCP 자동 복구 설정 — for svc in sshd auditd suricata; do systemctl show $svc
        --property=Restart | cut -d= -f2; done 루프로 systemd Restart 옵션(no/always/on-failure/on-abnormal)
        확인. 비정상 종료 시 자동 재시작으로 서비스 중단 시간 최소화 및 RTO 단축.
      success_criteria:
      - systemctl show --property=Restart 로 unit 별 Restart 값 추출
      - no/on-failure/always 값 구분하여 자동 복구 가능 여부 판정
      - on-failure 또는 always 미설정 시 BCP 개선 항목 도출
      acceptable_methods:
      - systemctl show --property=Restart
      - systemctl cat <svc> 로 unit 파일의 [Service] 섹션 검토
      - systemd-analyze verify 로 unit 파일 유효성 점검
      - RestartSec/StartLimitBurst 추가 파라미터 확인
      negative_signs:
      - 3개 서비스 중 일부만 점검
      - Restart 값 해석 없이 단순 출력
      - 자동 복구와 RTO 단축 맥락 누락
  target_vm: secu
  script: 'echo ''=== 자동 재시작 설정 ==='' && for svc in sshd auditd suricata; do RESTART=$(systemctl
    show $svc --property=Restart 2>/dev/null | cut -d= -f2); echo "$svc: Restart=$RESTART";
    done'
  risk_level: low
  bastion_prompt: 서비스 자동 재시작 설정을 확인해줘
- order: 3
  instruction: 디스크 사용량을 확인하시오. 디스크 풀(full)은 서비스 중단의 주요 원인입니다.
  hint: df -h로 파일 시스템 사용량을 확인하세요.
  category: audit
  points: 8
  answer: '🤖 프롬프트: 디스크 사용량을 확인해줘

    📎 참고 (CLI): echo ''=== 디스크 사용량 ==='' && df -h | grep -E ''(Filesystem|/dev/)''
    && echo ''--- 대용량 디렉터리 ---'' && sudo du -sh /var/log/ /var/lib/ /tmp/ 2>/dev/null'
  answer_detail: 디스크 사용률이 90%를 초과하면 로그 기록 실패, 데이터베이스 중단, 서비스 장애가 발생할 수 있습니다. BCP에서는
    디스크 사용량 모니터링과 임계값 알림을 설정하고, 로그 순환(logrotate)으로 디스크 소진을 방지합니다.
  verify:
    type: output_contains
    expect:
    - 디스크 사용량
    - UPTIME
    - average
    field: stdout
    semantic:
      intent: BCP 디스크 가용성 점검 — df -h | grep -E (Filesystem|/dev/) 로 마운트된 파일시스템 사용률
        확인 후 sudo du -sh /var/log /var/lib /tmp 로 대용량 디렉터리 상위 3개 집계. 90% 초과 시 로그 기록
        실패/DB 중단/서비스 장애 위험, logrotate 정책 재검토 필요.
      success_criteria:
      - df -h 로 파일시스템별 용량 및 사용률 확인
      - du -sh 로 /var/log /var/lib /tmp 대용량 디렉터리 크기 산출
      - 90% 사용률 임계값 기준 위험 판정
      acceptable_methods:
      - df -h && du -sh /var/log /var/lib /tmp
      - ncdu 대화형 도구로 상세 분석
      - Prometheus node_filesystem_avail_bytes 로 모니터링
      - smartctl 로 디스크 하드웨어 상태 확인
      negative_signs:
      - df 또는 du 한쪽만 실행
      - 대용량 디렉터리 식별 누락
      - 90% 임계값 및 logrotate 맥락 누락
  target_vm: secu
  script: echo '=== 디스크 사용량 ===' && df -h | grep -E '(Filesystem|/dev/)' && echo '---
    대용량 디렉터리 ---' && sudo du -sh /var/log/ /var/lib/ /tmp/ 2>/dev/null
  risk_level: low
  bastion_prompt: 디스크 사용량을 확인해줘
- order: 4
  instruction: 핵심 설정 파일의 백업본을 생성하시오. DR에서 설정 복원은 서비스 복구의 핵심입니다.
  hint: tar로 /etc 디렉터리의 주요 파일을 백업하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 핵심 설정 파일의 백업본을 생성하시오. DR에서 설정 복원은 서비스 복구의 핵심해줘

    📎 참고 (CLI): sudo tar czf /tmp/config_backup_$(date +%Y%m%d).tar.gz /etc/ssh/sshd_config
    /etc/security/pwquality.conf /etc/login.defs /etc/rsyslog.conf /etc/audit/ /etc/nftables.conf
    2>/dev/null && ls -lh /tmp/config_backup_*.tar.gz'
  answer_detail: 설정 파일 백업은 DR의 기본입니다. 서버 재구축 시 설정을 처음부터 다시 하는 것보다 백업본에서 복원하면 RTO를
    크게 단축할 수 있습니다. 백업은 별도 위치(원격 서버, 클라우드 스토리지)에도 보관해야 합니다.
  verify:
    type: output_contains
    expect: config_backup
    field: stdout
    semantic:
      intent: DR 설정 파일 백업 — sudo tar czf /tmp/config_backup_$(date +%Y%m%d).tar.gz
        으로 /etc/ssh/sshd_config, /etc/security/pwquality.conf, /etc/login.defs, /etc/rsyslog.conf,
        /etc/audit/, /etc/nftables.conf 6개 핵심 설정 아카이브 생성 후 ls -lh 로 결과 검증. 재구축 시 RTO
        단축 증적.
      success_criteria:
      - tar czf 로 날짜 태그 포함 아카이브 생성
      - 6개 핵심 보안 설정 파일 포함 (sshd/pwquality/login/rsyslog/audit/nftables)
      - ls -lh /tmp/config_backup_*.tar.gz 로 생성 결과 및 크기 확인
      acceptable_methods:
      - sudo tar czf + 6개 경로 나열
      - rsync -av 로 별도 디렉터리 복제
      - BorgBackup/Restic 증분 백업 도구
      - etckeeper 로 /etc 전체 git 기반 버전 관리
      negative_signs:
      - 6개 파일 중 일부 누락
      - 날짜 태그 없이 정적 파일명 사용
      - ls 로 생성 검증 누락
  target_vm: secu
  script: sudo tar czf /tmp/config_backup_$(date +%Y%m%d).tar.gz /etc/ssh/sshd_config
    /etc/security/pwquality.conf /etc/login.defs /etc/rsyslog.conf /etc/audit/ /etc/nftables.conf
    2>/dev/null && ls -lh /tmp/config_backup_*.tar.gz
  risk_level: low
  bastion_prompt: 핵심 설정 파일의 백업본을 생성하시오. DR에서 설정 복원은 서비스 복구의 핵심해줘
- order: 5
  instruction: 백업 파일의 무결성을 검증하기 위한 체크섬을 생성하시오.
  hint: sha256sum으로 백업 파일의 해시를 생성하세요.
  category: config
  points: 10
  answer: '🤖 프롬프트: 백업 파일의 무결성을 검증하기 위한 체크섬을 생성해줘

    📎 참고 (CLI): sha256sum /tmp/config_backup_*.tar.gz | tee /tmp/backup_checksum.txt
    && echo ''--- 체크섬 파일 ---'' && cat /tmp/backup_checksum.txt'
  answer_detail: 백업 무결성 검증은 복원 전 필수 단계입니다. 저장 중 손상되거나 위변조된 백업을 복원하면 시스템이 비정상 상태가 됩니다.
    SHA-256 체크섬을 백업과 함께 보관하고, 복원 전 대조하여 무결성을 확인합니다.
  verify:
    type: output_contains
    expect: 체크섬 파일
    field: stdout
    semantic:
      intent: DR 백업 무결성 검증 — sha256sum /tmp/config_backup_*.tar.gz | tee /tmp/backup_checksum.txt
        으로 SHA-256 해시 생성 후 체크섬 파일에 저장 및 화면 출력. 저장 중 손상/위변조 탐지로 복원 전 무결성 확인. 백업과 체크섬
        파일은 별도 위치 보관 필수.
      success_criteria:
      - sha256sum 으로 백업 파일의 SHA-256 해시 계산
      - tee /tmp/backup_checksum.txt 로 파일 저장과 stdout 출력 동시 수행
      - cat /tmp/backup_checksum.txt 로 체크섬 파일 내용 재확인
      acceptable_methods:
      - sha256sum | tee + cat 조합
      - md5sum 또는 sha512sum 대체 (보안성 SHA-256 권장)
      - gpg --detach-sign 으로 전자서명 부가
      - HashiCorp Vault 또는 KMS 로 해시 안전 보관
      negative_signs:
      - sha256sum 실행만 하고 파일 저장 누락
      - 생성된 체크섬 파일 내용 확인 누락
      - 복원 전 대조 필요성 맥락 누락
  target_vm: secu
  script: sha256sum /tmp/config_backup_*.tar.gz | tee /tmp/backup_checksum.txt &&
    echo '--- 체크섬 파일 ---' && cat /tmp/backup_checksum.txt
  risk_level: low
  bastion_prompt: 백업 파일의 무결성을 검증하기 위한 체크섬을 생성해줘
- order: 6
  instruction: 백업 복원 테스트를 수행하시오. 백업에서 특정 파일을 추출하여 원본과 비교합니다.
  hint: tar로 백업에서 파일을 추출하고 diff로 비교하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 백업 복원 테스트를 수행해줘

    📎 참고 (CLI): mkdir -p /tmp/restore_test && sudo tar xzf /tmp/config_backup_*.tar.gz
    -C /tmp/restore_test 2>/dev/null && diff /etc/ssh/sshd_config /tmp/restore_test/etc/ssh/sshd_config
    && echo ''복원 검증: 일치'' || echo ''복원 검증: 불일치'''
  answer_detail: 백업 복원 테스트는 BCP에서 반드시 수행해야 하지만 종종 생략됩니다. '백업은 복원에 성공하기 전까지는 백업이 아니다'라는
    격언이 있습니다. 정기적인 복원 테스트로 백업의 실효성을 확인해야 합니다.
  verify:
    type: output_contains
    expect:
    - 복원 검증
    - 백업
    field: stdout
    semantic:
      intent: 'DR 복원 테스트 — mkdir -p /tmp/restore_test 격리 디렉터리 생성 후 sudo tar xzf /tmp/config_backup_*.tar.gz
        -C /tmp/restore_test 추출. diff /etc/ssh/sshd_config /tmp/restore_test/etc/ssh/sshd_config
        으로 원본과 복원본 바이너리 비교하여 복원 검증: 일치/불일치 판정. 백업 실효성 정기 점검.'
      success_criteria:
      - 격리 디렉터리에서 tar xzf 로 백업 안전 추출
      - diff 명령으로 원본과 복원본 바이트 단위 비교
      - 일치/불일치 결과 echo 로 명시적 출력
      acceptable_methods:
      - mkdir + tar xzf + diff 조합
      - cmp 명령으로 이진 비교 대체
      - rsync --dry-run --checksum 으로 차이 스캔
      - 별도 테스트 VM 에서 실제 복원 훈련
      negative_signs:
      - 격리 없이 원본 경로에 추출하여 덮어쓰기 위험
      - diff 비교 없이 추출만 확인
      - 일치/불일치 판정 출력 누락
  target_vm: secu
  script: 'mkdir -p /tmp/restore_test && sudo tar xzf /tmp/config_backup_*.tar.gz
    -C /tmp/restore_test 2>/dev/null && diff /etc/ssh/sshd_config /tmp/restore_test/etc/ssh/sshd_config
    && echo ''복원 검증: 일치'' || echo ''복원 검증: 불일치'''
  risk_level: low
  bastion_prompt: 백업 복원 테스트를 수행해줘
- order: 7
  instruction: 서비스 장애 시뮬레이션과 복구를 수행하시오. rsyslog를 중지했다가 재시작하여 복구 절차를 테스트합니다.
  hint: systemctl stop/start로 서비스를 제어하세요.
  category: config
  points: 12
  answer: '🤖 프롬프트: 서비스 장애 시뮬레이션과 복구를 수행하시오. rsyslog를 중지했다가 재시작하여 복구 절차를 테스트해줘

    📎 참고 (CLI): echo ''=== 장애 시뮬레이션 ==='' && echo ''[1] rsyslog 중지'' && sudo systemctl
    stop rsyslog && sudo systemctl is-active rsyslog && echo ''[2] rsyslog 복구'' &&
