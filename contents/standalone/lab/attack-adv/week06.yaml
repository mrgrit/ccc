    [ ] Sudo: Minimal commands, NOEXEC tag, no wildcards

    [ ] Cron: No world-writable scripts, absolute paths

    [ ] Capabilities: Audit with getcap, remove unnecessary

    [ ] Passwords: /etc/shadow readable only by root

    [ ] SSH Keys: Strict permissions (600), no shared keys

    [ ] Docker: Rootless mode, don''t add users to docker group

    [ ] NFS: Use root_squash, restrict to specific IPs

    [ ] PATH: Secure PATH in SUID binaries, use absolute paths

    [ ] /proc: hidepid=2 mount option

    [ ] LD_PRELOAD: Remove from sudo env_keep

    [ ] File permissions: No world-writable in /etc

