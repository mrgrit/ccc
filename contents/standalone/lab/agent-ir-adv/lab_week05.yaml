  category: analysis
  points: 12
  answer: "\U0001F916 프롬프트: 엔트로피 분석 함수\n\U0001F4CE 참고 (CLI): cat > ~/w05/entropy.py\
    \ <<'PY'\nimport math\nfrom collections import Counter\ndef H(s):\n    if not\
    \ s: return 0\n    c = Counter(s); t = len(s)\n    return -sum((f/t)*math.log2(f/t)\
    \ for f in c.values())\nprint(H('normal_request'))\nprint(H('aaaaaaabbbbbbb${T(x)}${T(y)}'))\n\
    PY\npython3 ~/w05/entropy.py"
  answer_detail: '[탐지] 엔트로피>4.5 의심.'
  verify:
    type: output_contains
    expect: '0.'
    field: stdout
    semantic:
      intent: '엔트로피 분석 함수 — python3 def entropy(data): Counter + Shannon. HTTP POST
        body 엔트로피 > 6.5 = 인코딩/압축된 payload 가능성. 0-day exploitation 탐지'
      success_criteria:
      - Shannon entropy 함수
      - body 분석 용도
      acceptable_methods:
      - python math.log2 + Counter
      negative_signs:
      - 엔트로피 공식 없음
  target_vm: bastion
  script: "cat > ~/w05/entropy.py <<'PY'\nimport math\nfrom collections import Counter\n\
    def H(s):\n    if not s: return 0\n    c = Counter(s); t = len(s)\n    return\
    \ -sum((f/t)*math.log2(f/t) for f in c.values())\nprint(H('normal_request'))\n\
