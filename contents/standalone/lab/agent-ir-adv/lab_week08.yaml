lab_id: agent-ir-adv-ai-week08
title: K8s Pod Escape + API 악용 IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 8
description: privileged·hostPath·capability로 탈출. PSA restricted·Falco·NetworkPolicy
  방어. AI SubAgent 자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: privileged Pod 매니페스트 예시
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: attack
  points: 9
  answer: "\U0001F916 프롬프트: privileged Pod 매니페스트 예시\n\U0001F4CE 참고 (CLI): mkdir -p\
    \ ~/w08 && cat > ~/w08/bad-pod.yaml <<'Y'\napiVersion: v1\nkind: Pod\nmetadata:\
    \ {name: bad-pod}\nspec:\n  containers:\n    - name: c\n      image: alpine\n\
    \      securityContext: {privileged: true}\n      volumeMounts: [{name: host,\
    \ mountPath: /host}]\n  volumes:\n    - name: host\n      hostPath: {path: /}\n\
    Y\ncat ~/w08/bad-pod.yaml"
  answer_detail: '[공격] privileged+hostPath=완전 호스트 접근.'
  verify:
    type: output_contains
    expect: privileged
    field: stdout
    semantic:
      intent: privileged Pod 매니페스트 — spec.containers[0].securityContext.privileged=true
        + hostPID=true + hostNetwork=true + volumeMounts / (host filesystem). 컨테이너
        탈출 가능한 위험 설정 예시
      success_criteria:
      - 'privileged: true + hostPID/hostNetwork'
      - / host mount
      acceptable_methods:
      - kubectl apply -f + yaml
      negative_signs:
      - privileged 없음
  target_vm: bastion
  script: "mkdir -p ~/w08 && cat > ~/w08/bad-pod.yaml <<'Y'\napiVersion: v1\nkind:\
    \ Pod\nmetadata: {name: bad-pod}\nspec:\n  containers:\n    - name: c\n      image:\
    \ alpine\n      securityContext: {privileged: true}\n      volumeMounts: [{name:\
    \ host, mountPath: /host}]\n  volumes:\n    - name: host\n      hostPath: {path:\
    \ /}\nY\ncat ~/w08/bad-pod.yaml"
  risk_level: low
  bastion_prompt: 'privileged Pod 매니페스트 예시


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
- order: 2
