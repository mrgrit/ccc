  points: 10
  answer: '🤖 프롬프트: kubectl 권한 열거 시뮬

    📎 참고 (CLI): cat > ~/w08/enum.sh <<''S''

    #!/bin/bash

    echo ''kubectl auth can-i --list''

    echo ''cat /var/run/secrets/kubernetes.io/serviceaccount/token''

    S

    cat ~/w08/enum.sh'
  answer_detail: '[공격] SA 토큰 + can-i.'
  verify:
    type: output_contains
    expect: can-i
    field: stdout
    semantic:
      intent: kubectl 권한 열거 — kubectl auth can-i --list + kubectl get clusterroles
        + kubectl get serviceaccount. 토큰 획득 후 권한 맵핑. lateral in k8s
      success_criteria:
      - kubectl auth can-i
      - 권한 목록
      acceptable_methods:
      - kubectl auth
      - rbac-lookup
      negative_signs:
      - 권한 확인 없음
  target_vm: bastion
  script: 'cat > ~/w08/enum.sh <<''S''

    #!/bin/bash

    echo ''kubectl auth can-i --list''

    echo ''cat /var/run/secrets/kubernetes.io/serviceaccount/token''

    S

    cat ~/w08/enum.sh'
