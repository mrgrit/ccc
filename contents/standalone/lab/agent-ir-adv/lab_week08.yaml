- order: 3
  instruction: kube-audit 설정
  hint: 6단계 IR 중 탐지 단계. target_vm=bastion.
  category: analysis
  points: 11
  answer: "\U0001F916 프롬프트: kube-audit 설정\n\U0001F4CE 참고 (CLI): cat > ~/w08/audit-policy.yaml\
    \ <<'Y'\napiVersion: audit.k8s.io/v1\nkind: Policy\nrules:\n  - level: RequestResponse\n\
    \    verbs: [create, update, patch, delete]\n    resources:\n      - group: ''\n\
    \        resources: [pods, secrets, configmaps]\nY\ncat ~/w08/audit-policy.yaml"
  answer_detail: '[탐지] API 호출 전수 감사.'
  verify:
    type: output_contains
    expect: RequestResponse
    field: stdout
    semantic:
      intent: 'kube-audit 설정 — /etc/kubernetes/audit-policy.yaml 에 rules: level: Metadata
