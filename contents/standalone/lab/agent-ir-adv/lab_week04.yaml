  points: 11
  answer: "\U0001F916 프롬프트: IAM 열거 burst SIGMA\n\U0001F4CE 참고 (CLI): mkdir -p ~/w04\
    \ && cat > ~/w04/rule.yml <<'Y'\ntitle: IAM Enumeration Burst\ndetection:\n  selection:\
    \ {eventSource: iam.amazonaws.com, eventName|startswith: [List, Get, Describe]}\n\
    \  timeframe: 60s\n  condition: selection | count() by userIdentity.userName >\
    \ 20\nY\ncat ~/w04/rule.yml"
  answer_detail: '[탐지] 60초 20+회.'
  verify:
    type: output_contains
    expect: Enumeration
    field: stdout
    semantic:
      intent: SIGMA IAM 열거 burst — detection.selection.eventSource=iam.amazonaws.com
