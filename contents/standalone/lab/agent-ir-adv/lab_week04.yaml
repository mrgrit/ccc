lab_id: agent-ir-adv-ai-week04
title: Cloud IAM 자동 Pivot IR (AI 지원)
version: ai
course: agent-ir-adv-ai
week: 4
description: 유출 API 키 → 권한 열거 → PE 체인 → 자산 확장. 6단계 IR + SCP·OIDC·VPC Endpoint 예방.
  AI SubAgent 자동 실행·검증.
difficulty: hard
duration_minutes: 150
objectives:
- 공격 원리를 이해하고 재현한다
- 탐지·분석·초동대응·보고·재발방지의 6단계를 수행한다
- Human vs Agent 대응을 비교한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: IAM 키 유효성 확인 시뮬
  hint: 6단계 IR 중 공격 단계. target_vm=bastion.
  category: analysis
  points: 9
  answer: '🤖 프롬프트: IAM 키 유효성 확인 시뮬

    📎 참고 (CLI): echo ''aws sts get-caller-identity  # simulated'' > /tmp/w04-check.sh
    && cat /tmp/w04-check.sh'
  answer_detail: '[공격] 공격 첫 단계.'
  verify:
    type: output_contains
    expect:
    - sts
    - shell
    - CloudTrail
    field: stdout
    semantic:
      intent: IAM 키 유효성 — aws sts get-caller-identity --profile victim 로 노출된 key 유효
        + 연결된 account/user 확인. Cloud IAM compromise 첫 단계
      success_criteria:
      - aws sts get-caller-identity
      - identity 정보
      acceptable_methods:
      - aws CLI
      - boto3
      negative_signs:
      - 유효성 검증 없음
  target_vm: bastion
  script: 'echo ''aws sts get-caller-identity  # simulated'' > /tmp/w04-check.sh &&
    cat /tmp/w04-check.sh'
  risk_level: low
  bastion_prompt: IAM 키 유효성 확인 시뮬
- order: 2
