  - order: 7
    instruction: |
      ## 🎯 MISSION (Blue Team — tuning)
      학생 SIGMA 룰 의 false positive 가능성 + threshold tuning 분석.
      ## 💻 산출물
      ```markdown
      ## SIGMA 룰 tuning
      - threshold 5회: 정상 사용자 오타 가능성 → 너무 낮으면 오탐
      - threshold 8회 (Wazuh 5710): 미탐 가능성 → 너무 높으면 놓침
      - 최적: 환경 의 baseline 측정 후 결정 (예: 정상 오타 평균 2회 → threshold 5)
      - 보완: source IP whitelist (내부 관리 IP)
      ```
      ## 📋 확인 사항
      - threshold tuning 분석 + 권고
      ## 💡 왜?
      룰 의 threshold = 오탐 vs 미탐 의 trade-off. 환경 baseline 으로 결정.
      ## 🔍 결과 해석
      - 너무 낮음 = 오탐, 너무 높음 = 미탐
    hint: "threshold tuning 분석."
    category: blueteam
    points: 12
    answer: |
      cat <<'EOF'
      ## SIGMA 룰 tuning
      - threshold 5회: 정상 오타 가능성 → 오탐 위험
      - threshold 8회 (5710): 미탐 위험
      - 최적: baseline 측정 (정상 오타 평균 + margin)
      - 보완: 관리 IP whitelist
      EOF
    answer_detail: "threshold = 오탐/미탐 trade-off. baseline 의 정상 오타 빈도 측정 후 + margin. whitelist 로 내부 IP 제외."
    verify:
