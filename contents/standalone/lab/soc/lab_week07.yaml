lab_id: standalone-soc-week07
title: SIGMA 룰 작성 — spec/detection/변환/Wazuh 배포 + R/B/P (custom detection 검증)
version: standalone-non-ai
course: soc
week: 7
description: |
  SIGMA = SIEM 벤더 무관 탐지 룰 포맷. 학생 본인 의 SIGMA 룰 작성 + sigma-cli
  변환 + Wazuh rule 매핑. 마지막 4 step 은 R/B/P — 학생 작성 룰 이 실제 공격 을
  탐지 하는지 검증 + tuning.
difficulty: hard
duration_minutes: 150
audience: 보안관제 입문자 (7주차)
prerequisites: ["W01-W06 통과 — Wazuh 룰 구조 + ATT&CK"]
objectives:
  - "SIGMA spec 7 필드 (title/id/status/logsource/detection/level/tags)"
  - "학생 본인 의 SIGMA 룰 1개 작성 (ssh brute 또는 web 공격)"
  - "sigma-cli 변환 (Wazuh backend) 또는 수동 변환"
  - "R/B/P — 학생 룰 이 실제 공격 탐지 검증 + tuning"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION
      SIGMA spec 의 7 필드 를 표준 예제 로 분석. (6v6 attacker 는 github raw 접근 이
      제한 될 수 있어 — 가용 시 SigmaHQ 직접, 아니면 아래 표준 예제 분석)

      ## 💻 표준 SIGMA 예제 (lab 제공)
      ```yaml
      title: Multiple Failed SSH Logins from Single Source
      id: 5f60c6e3-0b87-4f5a-9d2e-1a2b3c4d5e6f
      status: stable
      description: 동일 source IP 에서 짧은 시간 다수 ssh 인증 실패
      author: SigmaHQ
      date: 2024/01/01
      tags:
        - attack.credential_access
        - attack.t1110.001
      logsource:
        product: linux
        service: sshd
      detection:
        selection:
          - 'Failed password'
          - 'Invalid user'
        timeframe: 60s
        condition: selection | count() by src_ip > 5
      falsepositives:
        - 정상 사용자 의 비밀번호 오타 반복
      level: high
      ```

      ## 💻 실행 명령 (github 가용 시 — optional)
      ```bash
      ssh 6v6-attacker 'curl -sL -m 5 "https://raw.githubusercontent.com/SigmaHQ/sigma/master/rules/linux/builtin/auth/lnx_auth_susp_failed_logon_reasons.yml" 2>/dev/null | head -25 || echo "github raw 차단 — 위 lab 제공 예제 분석"'
      ```

      ## 📋 확인 사항
      위 예제 의 7 필드 식별: title / id / status / logsource (product/service) /
      detection (selection/condition/timeframe) / level / tags (attack.t1110)

      ## 💡 왜 이걸 하는가?
      SIGMA = 탐지 룰 의 lingua franca. 한 번 작성 → 여러 SIEM (Wazuh/Splunk/ELK)
      으로 변환. detection 의 selection + condition + timeframe 이 핵심.

      ## 🔍 결과 해석
      - 7 필드 모두 식별 (lab 제공 예제 또는 SigmaHQ)
      - github raw 차단 시 lab 제공 예제 로 진행 (학습 가치 동일)
    hint: "lab 제공 SIGMA 예제 의 7 필드 분석 (또는 github 가용 시 SigmaHQ)."
