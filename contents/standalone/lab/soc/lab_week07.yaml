      echo "=== alerts 5710/5760 ==="
      ssh 6v6-siem 'sudo tail -200 /var/ossec/logs/alerts/alerts.json | jq -c "select(.rule.id | test(\"^57\")) | {rule: .rule.id, level: .rule.level, desc: .rule.description, src: .data.srcip}" | tail -5'
    answer_detail: "Wazuh 5710 frequency=8 → 6회 미달 가능. 5760 (Invalid user) = 단건 → 6회 모두. 학생 SIGMA (5회) 가 5710 보다 민감 = detection gap 보완."
