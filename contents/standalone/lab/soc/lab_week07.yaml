    answer_detail: "SIGMA spec: title/id/status/description/author/date/tags/logsource/detection/falsepositives/level. detection 의 condition 이 핵심 logic. 6v6 attacker 의 github raw 접근 차단 시 lab 제공 예제 로 학습."
