  - order: 6
    instruction: |
      ## 🎯 MISSION (Blue Team)
      STEP 5 의 brute 가 sshd.log + alerts.json 에 탐지 되었는지 + SIGMA 룰 threshold 검증.
      ## 💻 실행 명령
      ```bash
      ssh 6v6-siem 'sudo grep -c "Failed\|Invalid" /var/log/sshd.log'
      ssh 6v6-siem 'sudo tail -200 /var/ossec/logs/alerts/alerts.json | jq -c "select(.rule.id | test(\"^57\")) | {rule: .rule.id, level: .rule.level, desc: .rule.description, src: .data.srcip}" | tail -5'
      ```
      ## 📋 확인 사항
      - sshd.log 의 fail 6+ + alerts.json 의 5710/5760
      ## 💡 왜?
