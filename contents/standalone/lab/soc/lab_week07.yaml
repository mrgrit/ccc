      ## 💡 왜?
      SIGMA → backend 변환 = 한 룰 의 여러 SIEM 적용. Wazuh 는 공식 backend 가 제한적
      이라 elasticsearch backend 또는 수동 XML 매핑.
      ## 🔍 결과 해석
      - 변환 성공 → query
      - backend 미지원 → 수동 Wazuh XML
    hint: "sigma convert -t elasticsearch 또는 수동."
    category: sigma
    points: 10
    answer: |
      ssh 6v6-attacker 'sudo pip3 install --break-system-packages sigma-cli pysigma-backend-elasticsearch 2>&1 | tail -2'
