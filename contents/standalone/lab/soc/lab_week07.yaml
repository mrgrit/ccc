      Wazuh 5710 미달 → 학생 룰 의 가치.
      ## 🔍 결과 해석
      - 5760 (Invalid user) = 단건 → 6회 모두
      - 5710 (8회) = 미달 가능 → 학생 룰 (5회) 이 보완
    hint: "sshd.log fail count + alerts 5710."
