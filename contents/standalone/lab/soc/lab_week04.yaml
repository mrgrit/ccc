      ssh 6v6-siem "sudo grep -rA5 'id=\"$RULE\"' /var/ossec/ruleset/rules/ /var/ossec/etc/rules/ 2>/dev/null | head -10"
      ```

      ## 📋 확인 사항
      - rule XML 의 level / description / group / (mitre)

      ## 💡 왜?
      alert 의 rule 의 정의 추적 = "왜 이 level/group 인가" 의 답. 룰 의 reasoning.

      ## 🔍 결과 해석
      - rule 정의 발견 → level/group 근거 확인
      - 못 찾음 → composite rule (if_sid 계층)
