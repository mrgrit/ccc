              ssh 6v6-siem 'sudo tail -500 /var/ossec/logs/alerts/alerts.json | jq -c "select(.agent.name==\"web\")" | tail -5'
            예상 출력 `web alert + decoder + rule`.
            운영 해석: chain 마지막.
          - |
