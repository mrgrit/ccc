      ```bash
      ssh 6v6-siem 'sudo tail -500 /var/ossec/logs/alerts/alerts.json | jq -c "select(.agent.name==\"web\") | {ts: .timestamp[0:19], decoder: .decoder.name, rule: .rule.id, level: .rule.level, desc: .rule.description}" | tail -5'
      ```

      ## 📋 확인 사항
      - web agent 의 alert + decoder (modsec 또는 web-accesslog) + rule

      ## 💡 왜?
      raw ModSec audit → web agent 의 decoder → rule → alert 의 chain 마지막.

      ## 🔍 결과 해석
      - decoder = web-accesslog 또는 json + rule 100200+ (custom) 또는 31xxx
    hint: "alerts.json web agent decoder/rule."
    category: blueteam
