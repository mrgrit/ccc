    answer_detail: "내부 위협 = UEBA + DLP + auditd 결합. 행위 기반 detection. 외부 공격 보다 탐지 어려움."
    verify:
      type: output_contains
      expect: Detection
      field: stdout
      semantic:
        intent: Purple — 내부 위협 Lessons.
        success_criteria: ["Detection 종합", "DLP/UEBA 권고"]
        acceptable_methods:
          - |
            **[OSS] markdown 종합** — 표준.
              # Detection + 권고
            예상 출력 `종합`.
            운영 해석: 내부 위협 회고.
