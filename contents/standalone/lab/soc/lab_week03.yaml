lab_id: standalone-soc-week03
title: 로그 이해 (2) — 네트워크/웹 로그 (Apache/ModSec/Suricata eve) + R/B/P (web 공격 추적)
version: standalone-non-ai
course: soc
week: 3
description: |
  네트워크/웹 로그 — web 의 Apache access + ModSec audit, ips 의 Suricata eve.json
  의 형식 + 핵심 필드. 마지막 4 step 은 R/B/P — attacker 의 웹 공격 (XSS/SQLi)
  1 건 이 web ModSec audit → ips eve.json → siem alerts.json 으로 어떻게 흔적
  남기는지 추적.
difficulty: medium
duration_minutes: 150
audience: 보안관제 입문자 (3주차)
prerequisites:
  - "W01-W02 통과 — SOC stack + 시스템 로그"
  - "bastion ProxyJump 로 web/ips/siem 접근"
objectives:
  - "Apache access.log 의 combined format 8 필드 분해"
  - "ModSec audit log 의 JSON 구조 + audit_data.messages 의 rule id"
  - "Suricata eve.json 의 event_type (alert/http/flow/tls/dns) 분포"
  - "R/B/P — 웹 공격 1건 → ModSec audit → eve.json → alerts.json chain 추적"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION

      web 의 Apache access.log 의 최근 5 line + combined format 8 필드 분해.
      트래픽 이 없으면 먼저 1 회 발생 (curl).

      ## 💻 실행 명령

      ```bash
      # 트래픽 1 회 발생
      ssh 6v6-attacker 'curl -sI http://juice.6v6.lab/ > /dev/null'
      # 💡 6v6 의 Apache 는 vhost 별 별도 access log (juice_access.log 등). 통합
      #    access.log 는 0 byte. 트래픽 있는 vhost log 를 직접 확인.
      ssh 6v6-web 'sudo tail -5 /var/log/apache2/juice_access.log 2>/dev/null || sudo cat /var/log/apache2/*access*.log 2>/dev/null | tail -5'
      ```

      ## 📋 확인 사항

      combined format 8 필드:
      `%h` (client) `%l` (-) `%u` (-) `%t` (time) `"%r"` (request) `%>s` (status)
      `%b` (size) `"%{Referer}i"` `"%{User-agent}i"`

      ## 💡 왜 이걸 하는가?

      Apache combined log 의 8 필드 = 웹 트래픽 분석 의 base. status code 분포 +
      User-Agent 분석 + URI 패턴 이 SOC 의 웹 공격 detection 의 raw.

      ## 🔍 결과 해석

      - **정상**: combined format 8 필드
      - **access.log 비어있음**: vhost 별 별도 file (juice_access.log) 또는 docker stdout
      - **client IP 가 HAProxy hop**: X-Forwarded-For 헤더 에서 원래 IP 확인
    hint: "tail access.log + combined format 8 필드."
    category: log_analysis
    points: 10
    answer: |
      echo "=== 트래픽 발생 ==="
      ssh 6v6-attacker 'curl -sI http://juice.6v6.lab/ > /dev/null 2>&1'
      echo "=== Apache access.log ==="
      ssh 6v6-web 'sudo tail -5 /var/log/apache2/juice_access.log 2>/dev/null || sudo cat /var/log/apache2/*access*.log 2>/dev/null | tail -5'
    answer_detail: |
      Apache combined format = NCSA Common + Referer + User-Agent. 6v6 는 11 vhost
      별 별도 access log (juice_access.log 등) 가능. client IP 의 첫 column 은
      HAProxy hop, 원래 IP 는 X-Forwarded-For.
    verify:
      type: output_contains
      expect: apache2
      field: stdout
      semantic:
        intent: Apache access.log 의 combined format 8 필드 분해.
        success_criteria:
          - "access.log 5 line 또는 vhost 별 log"
          - "8 필드 mapping"
          - "status code + User-Agent 확인"
        acceptable_methods:
          - |
            **[OSS] tail access.log** — 표준.
              ssh 6v6-web 'sudo tail -5 /var/log/apache2/access.log'
            예상 출력 `10.20.31.1 - - [date] "GET / HTTP/1.1" 200 1234 "-" "curl/7.x"`.
            운영 해석: combined format 8 필드.
          - |
            **[OSS] status code 분포** — 통계.
              ssh 6v6-web 'sudo tail -1000 /var/log/apache2/juice_access.log | awk "{print \$9}" | sort | uniq -c | sort -rn'
            예상 출력 `800 200 / 50 403 / 30 404 / ...`.
            운영 해석: 403 비율 = WAF 차단, 404 = scan/recon.
          - |
            **[OSS] goaccess 실시간 분석** — 시각.
              ssh 6v6-web 'goaccess /var/log/apache2/access.log -o /tmp/report.html --log-format=COMBINED 2>&1 | head || echo "goaccess 미설치"'
            예상 출력 `HTML report 또는 미설치`.
            운영 해석: 웹 로그 의 실시간 dashboard.
          - |
            **[OSS] User-Agent 분석** — scanner detection.
              ssh 6v6-web 'sudo tail -1000 /var/log/apache2/juice_access.log | grep -oE "\"[^\"]*\"$" | sort | uniq -c | sort -rn | head'
            예상 출력 `UA 별 빈도 (sqlmap/nikto 등 scanner 식별)`.
            운영 해석: 비정상 UA = scanner.
        negative_signs:
          - "access.log 없음 + vhost log 도 없음"
          - "8 필드 mapping 누락"
    target_vm: web
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION

      web 의 ModSec audit log 의 JSON 구조 + audit_data.messages 의 rule id 추출.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "{
          client: .transaction.remote_address,
          uri: .transaction.request.uri,
          code: .response.status,
          rules: [.audit_data.messages[]? | capture("id .(?<id>[0-9]+).") | .id]
      }" 2>/dev/null || sudo tail -20 /var/log/apache2/modsec_audit.log'
      ```

      ## 📋 확인 사항

      - JSON 구조: top-level (transaction.remote_address / request / response.status / audit_data.messages)
      - messages 배열 = 매치 룰 (id / ruleId)
      - 룰 prefix 의 카테고리: 913 (scanner) / 941 (XSS) / 942 (SQLi) / 949 (threshold)

      ## 💡 왜 이걸 하는가?

      ModSec audit log = WAF 의 정밀 분석 의 source. rule id 단위 의 매치 정보 가
      공격 의 유형 + 정확한 payload 시각화. SOC 의 가장 자주 보는 web 로그.

      ## 🔍 결과 해석

      - **정상**: JSON + messages 배열 + rule id
      - **JSON 아님 (Native format)**: SecAuditLogFormat 이 JSON 아님 — concurrent
        format 의 multi-section (A/B/C/H) 파싱
      - **빈 파일**: SecAuditEngine Off 또는 RelevantOnly (403 만 기록)
    hint: "tail modsec_audit.log | jq audit_data.messages."
    category: log_analysis
    points: 12
    answer: |
      echo "=== ModSec audit log JSON ==="
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "{client: .transaction.remote_address, uri: .transaction.request.uri, code: .response.status, rules: [.audit_data.messages[]? | capture("id .(?<id>[0-9]+).") | .id]}" 2>/dev/null || sudo tail -20 /var/log/apache2/modsec_audit.log'
    answer_detail: |
      ModSec audit log 의 JSON = transaction object. messages 배열 의 각 element =
      매치 1 룰 (id/ruleId/severity/data). 룰 prefix = 카테고리. RelevantOnly mode
      는 403 (차단) 만 기록 — 정상 트래픽 의 audit 는 없음.
    verify:
      type: output_contains
      expect: transaction
      field: stdout
      semantic:
        intent: ModSec audit log JSON 구조 + rule id 추출.
        success_criteria:
          - "JSON 구조 (transaction)"
          - "messages 배열 의 rule id"
          - "룰 카테고리 (941/942 등) 식별"
        acceptable_methods:
          - |
            **[OSS] jq audit_data.messages** — 표준.
              ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq .audit_data.messages'
            예상 출력 `[{"id":"941100","severity":"2",...}]`.
            운영 해석: messages = 매치 룰 배열.
          - |
            **[OSS] rule id 통계** — 분류.
              ssh 6v6-web 'sudo tail -100 /var/log/apache2/modsec_audit.log | grep -oE "\"(id|ruleId)\":\"[0-9]+\"" | sort | uniq -c | sort -rn | head'
            예상 출력 `30 941100 / 25 942100 / ...`.
            운영 해석: 가장 자주 매치 룰 = 공격 유형.
          - |
            **[OSS] response code 분포** — WAF 효과.
              ssh 6v6-web 'sudo cat /var/log/apache2/modsec_audit.log | jq -r .response.status 2>/dev/null | sort | uniq -c'
            예상 출력 `200/403/500 분포`.
            운영 해석: 403 비율 = WAF 차단 효과.
          - |
            **[OSS] 매치 payload 추출** — 정밀.
              ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]?" 2>/dev/null'
            예상 출력 `Matched Data: <script> found within ARGS:q`.
            운영 해석: false-positive 판단 의 정밀 정보.
        negative_signs:
          - "audit log 비어있음 (SecAuditEngine Off)"
          - "JSON 파싱 실패 (Native format)"
    target_vm: web
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION

      ips 의 Suricata eve.json 의 event_type 분포 + 가장 빈도 높은 type 의 1 sample.

      ## 💻 실행 명령

      ```bash
      # event_type 분포
      ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c | sort -rn'
      # http event 1 sample
      ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -c "select(.event_type==\"http\")" | tail -1'
      ```

      ## 📋 확인 사항

      - event_type: flow / http / tls / alert / dns / fileinfo (stats 는 6v6 fix 로 제외)
      - http event 의 hostname / url / status / http_user_agent

      ## 💡 왜 이걸 하는가?

      Suricata eve.json = network IDS 의 통합 로그. event_type 별 분석 (alert =
      룰 매치, http = L7 parsing, flow = 연결 통계). SOC 의 network detection 의 base.

      ## 🔍 결과 해석

      - **정상**: flow + http + tls 다수, alert 소수
      - **alert 0**: Suricata 룰 미배포 또는 공격 없음
      - **stats 가 보임**: 6v6 의 stats overflow fix 회귀 — ips entrypoint 의 stats 제외 확인
    hint: "eve.json | jq event_type 분포 + http sample."
    category: log_analysis
    points: 10
    answer: |
      echo "=== Suricata event_type 분포 ==="
      ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c | sort -rn'
      echo "=== http event 1 sample ==="
      ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -c "select(.event_type==\"http\")" | tail -1'
    answer_detail: |
      Suricata eve.json 의 event_type: flow (연결 통계) / http (L7) / tls (인증서) /
      alert (룰 매치) / dns / fileinfo. 6v6 는 stats 를 fix 로 제외 (256 field
      overflow). alert event 가 SOC 의 가장 의미 있는 input.
    verify:
      type: output_contains
      expect: http
      field: stdout
      semantic:
        intent: Suricata eve.json 의 event_type 분포 + http sample.
        success_criteria:
          - "event_type 분포 (Counter)"
          - "http event sample"
          - "stats 제외 확인"
        acceptable_methods:
          - |
            **[OSS] jq event_type 분포** — 표준.
              ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c | sort -rn'
            예상 출력 `300 flow / 150 tls / 50 http / 5 alert`.
            운영 해석: alert 증가 = 공격, flow/http baseline.
          - |
            **[OSS] alert event 추출** — 핵심.
              ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\") | {sig: .alert.signature, sid: .alert.signature_id, sev: .alert.severity}" | tail -5'
            예상 출력 `{"sig":"ET SCAN sqlmap","sid":1000003,"sev":1}`.
            운영 해석: signature_id 가 custom (1000xxx) 또는 ET ruleset.
          - |
            **[OSS] fast.log — 간략 alert** — 보조.
              ssh 6v6-ips 'sudo tail -10 /var/log/suricata/fast.log 2>/dev/null'
            예상 출력 `[**] [1:1000003:0] ET SCAN ... [**]`.
            운영 해석: fast.log = alert 의 1 줄 요약.
          - |
            **[OSS] suricata.log — daemon 상태** — health.
              ssh 6v6-ips 'sudo tail -5 /var/log/suricata/suricata.log 2>/dev/null'
            예상 출력 `<date> Notice: suricata: ... engine started`.
            운영 해석: Suricata daemon 의 health.
        negative_signs:
          - "eve.json 없음 (Suricata down)"
          - "stats event 가 보임 (overflow fix 회귀)"
    target_vm: ips
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION

      siem 의 alerts.json 의 web 관련 alert (agent.name=web 또는 rule.groups=web)
      추출 + raw web 로그 (W03-1,2,3) 가 siem 으로 통합 된 것 확인.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | \
          jq -c "select(.agent.name==\"web\" or .agent.name==\"ips\") | {ts: .timestamp[0:19], agent: .agent.name, rule: .rule.id, level: .rule.level, desc: .rule.description}" | tail -8'
      ```

      ## 📋 확인 사항

      - agent.name = web (ModSec) 또는 ips (Suricata) 의 alert
      - rule.id = 100200+ (custom) 또는 86601 (Suricata) 또는 31xxx (web attack)

      ## 💡 왜 이걸 하는가?

      raw 웹/네트워크 로그 (Apache/ModSec/Suricata) 가 Wazuh agent 를 거쳐 siem 의
      통합 alert 로 변환 되는 흐름. SOC 의 단일 진입점 에서 모든 source 통합 view.

      ## 🔍 결과 해석

      - **정상**: web + ips agent 의 alert 모두
      - **web agent alert 0**: web 의 Wazuh agent 가 ModSec audit log 를 모니터링
        안 함 — agent 의 localfile 설정 점검
      - **ips agent alert 0**: ips 의 agent 가 eve.json 모니터링 안 함
    hint: "alerts.json | jq agent web/ips."
    category: alert
    points: 10
    answer: |
      echo "=== web/ips agent 의 alert ==="
      ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -c "select(.agent.name==\"web\" or .agent.name==\"ips\") | {ts: .timestamp[0:19], agent: .agent.name, rule: .rule.id, level: .rule.level, desc: .rule.description}" | tail -8'
    answer_detail: |
      web agent 의 alert = ModSec audit log 가 Wazuh decoder 를 거친 결과. ips
      agent = Suricata eve.json. 두 source 가 siem 의 단일 alerts.json 으로 통합.
      agent 의 localfile 설정 (ossec.conf) 이 어느 log 를 모니터링 하는지 결정.
    verify:
      type: output_contains
      expect: agent
      field: stdout
      semantic:
        intent: siem alerts.json 의 web/ips agent 통합 alert.
        success_criteria:
          - "web/ips agent alert 추출"
          - "rule.id + level"
          - "raw → alert chain 확인"
        acceptable_methods:
          - |
            **[OSS] jq agent filter** — 표준.
              ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -c "select(.agent.name==\"web\")" | tail -5'
            예상 출력 `web agent 의 alert`.
            운영 해석: source agent 별 분리.
          - |
            **[OSS] agent_control -l — agent 상태** — 인프라.
              ssh 6v6-siem 'sudo /var/ossec/bin/agent_control -l 2>&1 | head -10'
            예상 출력 `web (Active) / ips (Active) / ...`.
            운영 해석: agent disconnect 시 alert 끊김.
          - |
            **[OSS] dashboard agent module** — GUI.
              # ☰ → Management → Agents
            예상 출력 `agent list + last keepalive`.
            운영 해석: GUI 의 agent monitoring.
          - |
            **[OSS] agent 별 alert 통계** — 분포.
              ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -r .agent.name | sort | uniq -c | sort -rn'
            예상 출력 `ips 1500 / wazuh.manager 300 / web 200`.
            운영 해석: source 별 alert 비중.
        negative_signs:
          - "web/ips agent alert 0 (agent disconnect)"
    target_vm: siem
    risk_level: low

  - order: 5
    instruction: |
      ## 🎯 MISSION (Red Team)

      attacker 에서 web 공격 (XSS + SQLi) 1 건 발생 (dvwa.6v6.lab). STEP 6-8 의
      Blue 추적 준비.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker 'curl -s -o /dev/null -w "응답: %{http_code}\n" \
          -A "sqlmap/1.5" -H "Host: dvwa.6v6.lab" \
          "http://10.20.30.1/?q=<script>alert(1)</script>&id=1+UNION+SELECT+1,2,3"'
      ATTACK_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
      ```

      ## 📋 확인 사항
      - 응답 403 (ModSec 차단)
      - ATTACK_TS 기록

      ## 💡 왜 이걸 하는가?
      웹 공격 1 건 이 3 로그 source (Apache/ModSec/Suricata) 에 동시 흔적 → siem 통합.
      W03 의 로그 형식 학습 의 실전 적용.

      ## 🔍 결과 해석
      - 403 = ModSec 정상 / 200 = DetectionOnly (juice 면 200, dvwa 면 403)
    hint: "curl -A sqlmap -H Host:dvwa.6v6.lab XSS+SQLi → 403."
    category: redteam
    points: 8
    answer: |
      echo "=== Red: web 공격 (XSS+SQLi) ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "응답: %{http_code}\n" -A "sqlmap/1.5" -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>&id=1+UNION+SELECT+1,2,3"'
      ATTACK_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
    answer_detail: |
      XSS + SQLi 결합 → ModSec 941 + 942 + 949 매치 → 403. dvwa.6v6.lab = SecRuleEngine On.
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: Red Team 웹 공격 (XSS+SQLi) → ModSec 403.
        success_criteria: ["403 응답", "XSS+SQLi 결합", "ATTACK_TS"]
        acceptable_methods:
          - |
            **[OSS] curl 결합 페이로드** — 표준.
              ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -A sqlmap -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?q=<script>&id=1+UNION+SELECT"'
            예상 출력 `403`.
            운영 해석: 다중 페이로드 → 3 로그 동시.
          - |
            **[OSS] nikto web scan** — scanner.
              ssh 6v6-attacker 'nikto -h http://10.20.30.1/ -maxtime 20s 2>&1 | head -5'
            예상 출력 `nikto finding`.
            운영 해석: scan 의 다수 로그 발생.
          - |
            **[OSS] 시각 기록** — 추적.
              ATTACK_TS=$(date -u +%Y-%m-%dT%H:%M:%S)
            예상 출력 `timestamp`.
            운영 해석: Blue 매칭.
        negative_signs: ["200 (DetectionOnly)", "ATTACK_TS 누락"]
    target_vm: attacker
    risk_level: medium

  - order: 6
    instruction: |
      ## 🎯 MISSION (Blue Team — 1)

      STEP 5 공격 이 web 의 Apache access + ModSec audit 에 남긴 흔적 추적.

      ## 💻 실행 명령
      ```bash
