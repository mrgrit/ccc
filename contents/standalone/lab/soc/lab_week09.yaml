lab_id: standalone-soc-week09
title: "인시던트 대응 절차 — IR 6 단계 (Preparation → Identification → Containment → Eradication → Recovery → Lessons) (6v6 + R/B/P)"
version: standalone-non-ai
course: soc
week: 9
description: |
  NIST SP 800-61 의 IR 6 단계 의 각 단계 의 *실제 활동* 을 6v6 의 alert 1 시나리오 (예: brute force / SQLi) 로 simulation.
difficulty: medium
duration_minutes: 120
prerequisites: ["W08 중간고사 통과"]
objectives:
  - "IR 6 단계 의 각 활동 mapping (NIST SP 800-61)"
  - "1 시나리오 (sshd brute force) 의 Identification → Containment 시뮬"
  - "Containment 의 *비파괴* fw rule 또는 user lock"
  - "Lessons Learned markdown"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: |
      ## 🎯 MISSION — IR 6 단계 mapping + 1 시나리오 선택
      **무엇을:** 6v6 의 최근 alert 중 1 시나리오 선택 + IR 6 단계 의 각 활동 학생 작성.
    hint: "brute force 시나리오 = sshd Failed password burst. Identification = Wazuh rule 5710."
    category: ir
    points: 12
    answer: "🤖 가이드: markdown 표 — 6 단계 × 5 컬럼 (활동 / 도구 / 시간 / 산출물 / 책임자)."
    answer_detail: "NIST IR 6 단계 = SOC L2/L3 분석가 의 핵심 framework."
    verify:
      intent: "6 단계 + 시나리오"
      success_criteria: ["6 단계 모두", "1 시나리오 명시"]
      acceptable_methods: ["markdown"]
      negative_signs: ["단계 누락"]
    target_vm: bastion
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — Identification 단계 — 6v6 alert 추출 + IoC 식별
      **무엇을:** 시나리오 의 alert 추출 + src_ip / username / 시간 의 IoC 표.
    hint: "tail alerts.json | grep rule.id."
    category: ir
    points: 10
    answer: |
      🤖 가이드:
      ssh 6v6-siem 'sudo grep -E "5710|sshd" /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -5 | jq "{time: .timestamp, rule: .rule.id, src: .data.srcip, user: .data.dstuser}"'
    answer_detail: "IoC = Indicator of Compromise. SOC 의 다음 검색 input."
    verify:
      intent: "IoC 추출 표"
      success_criteria: ["src_ip + user + 시간"]
      acceptable_methods: ["jq"]
      negative_signs: ["IoC 1개 미만"]
    target_vm: siem
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — Containment 비파괴 시뮬
      **무엇을:** 시나리오 의 src_ip 를 차단 할 fw rule 의 *명령만 작성* (실행 X — 학습 환경 보호).
    hint: "nft add rule inet six_filter input ip saddr <ip> drop. 또는 hosts.deny. *실행 안 함*."
    category: ir
    points: 10
    answer: |
      🤖 가이드:
      # 학생: 실제 실행 X
      # nft add rule inet six_filter input ip saddr 1.2.3.4 drop
      # echo 'sshd: 1.2.3.4' >> /etc/hosts.deny
    answer_detail: "Containment 의 도구 = nftables / iptables / hosts.deny / fail2ban. 운영 환경 의 ROE 필수."
    verify:
      intent: "Containment 명령 작성 (실행 X)"
      success_criteria: ["fw 또는 hosts 명령", "실행 X 명시"]
      acceptable_methods: ["nftables / hosts.deny / fail2ban"]
      negative_signs: ["실제 실행"]
    target_vm: bastion
    risk_level: medium

  - order: 4
    instruction: |
      ## 🎯 MISSION — Lessons Learned 보고서
      **무엇을:** 시나리오 의 *왜 발생했나* + *어떻게 예방* + *룰 보강* 3 단락 markdown.
    hint: "예방 = 비밀번호 정책 + lockout + fail2ban. 룰 보강 = SIGMA 의 timeframe 조정."
    category: documentation
    points: 8
    answer: "🤖 가이드: 3 단락 markdown."
    answer_detail: "Lessons Learned = IR 의 6 단계 마지막 + 다음 incident 예방."
    verify:
      intent: "3 단락 보고서"
      success_criteria: ["3 단락"]
      acceptable_methods: ["markdown"]
      negative_signs: ["단락 누락"]
    target_vm: bastion
    risk_level: low
