lab_id: standalone-soc-week02
title: 로그 이해 (1) — 시스템 로그 (sshd 인증 / journald / wazuh 내부) + R/B/P (ssh brute 추적)
version: standalone-non-ai
course: soc
week: 2
description: |
  SOC 분석가 의 base equipment = 시스템 로그 의 raw read. 6v6 의 컨테이너 들 은
  minimal Docker (rsyslog/systemd 부재) 이므로 가용 시스템 로그 = siem 의 sshd.log
  + Wazuh 의 ossec.log + alerts.json. 마지막 4 step 은 R/B/P — attacker 의 ssh
  brute force 가 sshd.log → alerts.json (rule 5710) 으로 어떻게 흔적 남기는지 추적.
difficulty: medium
duration_minutes: 150
audience: 보안관제 입문자 (2주차)
prerequisites:
  - "W01 통과 — 6v6 SOC stack 데이터 흐름 + Wazuh dashboard"
  - "bastion ProxyJump 로 siem / fw 접근 가능"
  - "lecture_week02.md 정독 — syslog RFC3164/5424 + sshd 인증 이벤트"
objectives:
  - "siem sshd.log 의 syslog 5 필드 (timestamp/host/process/pid/message) 분해"
  - "sshd 인증 이벤트 5 패턴 (Accepted/Failed/Disconnect/publickey/Invalid) 빈도 + 예제"
  - "Wazuh ossec.log 의 daemon 시각 흐름 (INFO/WARNING/ERROR)"
  - "alerts.json 의 sshd 관련 rule (5xxx 인증 계열) 추출"
  - "R/B/P — ssh brute force 시뮬 → sshd.log Failed 추적 → alerts.json rule 5710 → Purple lockout 권고"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION

      siem 의 /var/log/sshd.log 의 최근 5 line 추출 + 각 line 의 syslog 5 필드
      (timestamp / host / process / pid / message) 위치 분해.

      💡 6v6 의 fw/web/ips 는 minimal Docker (rsyslog/systemd 부재) 라 일반
      /var/log/syslog 부재. 가용 시스템 인증 로그 = siem (Amazon Linux 2023) 의
      sshd.log.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem 'sudo tail -5 /var/log/sshd.log'
      ```

      ## 📋 확인 사항

      - 5 line 의 형식: `<Month Day HH:MM:SS> <host> <process>[<pid>]: <message>`
      - process = `sshd`
      - message = `Accepted publickey for ccc from 10.20.x.x port xxx ssh2: ED25519 ...`

      ## 💡 왜 이걸 하는가?

      syslog 의 5 필드 분해 = 모든 로그 분석 의 base. RFC3164 (BSD format) 의 구조
      를 손에 익히면 어떤 로그 source 든 빠르게 파싱 가능.

      ## 🔍 결과 해석

      - **정상**: 5 line + sshd process + Accepted/Disconnect message
      - **sshd.log 없음**: siem 의 sshd 가 syslog 로 안 보냄 — journald 또는 docker logs 대체
      - **빈 파일**: 최근 ssh 접속 없음 — bastion 에서 ssh 6v6-siem 1 회 후 재확인
    hint: "ssh 6v6-siem 'sudo tail -5 /var/log/sshd.log'. RFC3164: Month Day Time host process[pid]: msg."
    category: log_basics
    points: 10
    answer: |
      echo "=== siem sshd.log 최근 5 line ==="
      ssh 6v6-siem 'sudo tail -5 /var/log/sshd.log'
      echo "=== 5 필드 분해 (1 line) ==="
      ssh 6v6-siem 'sudo tail -1 /var/log/sshd.log | awk "{print \"timestamp:\", \$1, \$2, \$3; print \"host:\", \$4; print \"process:\", \$5; print \"message:\", substr(\$0, index(\$0,\$6))}"'
    answer_detail: |
      RFC3164 BSD syslog format: `<PRI>Mmm dd hh:mm:ss HOSTNAME TAG: MSG`. sshd 의
      인증 이벤트 가 SOC 의 brute force / 비정상 access detection 의 base.
    verify:
      type: output_contains
      expect: sshd
      field: stdout
      semantic:
        intent: siem sshd.log 의 syslog 5 필드 분해. SOC 의 로그 분석 base.
        success_criteria:
          - "5 line 추출"
          - "5 필드 (timestamp/host/process/pid/message) mapping"
          - "RFC3164 형식 판정"
        acceptable_methods:
          - |
            **[OSS] tail + awk** — 표준.
              ssh 6v6-siem 'sudo tail -5 /var/log/sshd.log'
            예상 출력 `May 19 07:41:00 siem sshd[123]: Accepted publickey for ccc ...`.
            운영 해석: RFC3164 BSD format — 5 필드 의 표준.
          - |
            **[OSS] journalctl 대안 (siem 가용 시)** — systemd.
              ssh 6v6-siem 'sudo journalctl -u sshd -n 5 --no-pager 2>/dev/null || echo "journald 미가용"'
            예상 출력 `journald entry 또는 미가용`.
            운영 해석: Amazon Linux 2023 의 systemd journal.
          - |
            **[OSS] docker logs 외부** — 컨테이너.
              ssh 6v6-bastion 'docker logs --tail 5 6v6-siem 2>&1 | grep -i ssh'
            예상 출력 `sshd 의 docker stdout`.
            운영 해석: minimal 컨테이너 의 syslog 부재 시 docker logs.
          - |
            **[OSS] last / lastlog — 로그인 이력** — 보조.
              ssh 6v6-siem 'last -n 10 2>/dev/null | head -10'
            예상 출력 `ccc pts/0 10.20.x.x <date> still logged in`.
            운영 해석: wtmp 기반 로그인 이력 — sshd.log 의 보조.
        negative_signs:
          - "sshd.log 없음 (syslog 미설정)"
          - "5 필드 mapping 누락"
          - "빈 파일 (ssh 접속 이력 없음)"
    target_vm: siem
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION

      sshd 의 5 인증 이벤트 패턴 (Accepted / Failed password / Disconnect /
      publickey / Invalid user) 각각 의 발생 횟수 + 1 예제.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem 'for p in "Accepted" "Failed password" "Disconnect" "publickey" "Invalid user"; do
          c=$(grep -c "$p" /var/log/sshd.log 2>/dev/null)
          ex=$(grep -m1 "$p" /var/log/sshd.log 2>/dev/null | head -c 90)
          echo "[$p] count=$c | $ex"
      done'
      ```

      ## 📋 확인 사항

      - `Accepted` / `publickey` 다수 (정상 ProxyJump 접속)
      - `Failed password` / `Invalid user` = brute force 의 흔적 (보통 0 — 6v6 idle 시)
      - `Disconnect` = 정상 종료

      ## 💡 왜 이걸 하는가?

      sshd 의 인증 이벤트 5 패턴 = Wazuh rule 5710 (multiple failed) / 5715
      (Accepted) / 5760 (Invalid user) 등 의 source. SOC 의 brute force detection
      의 base. STEP 7-9 의 R/B/P 에서 직접 brute 발생 + 추적.

      ## 🔍 결과 해석

      - **정상**: Accepted/publickey 다수 + Failed 0
      - **Failed/Invalid 다수**: brute force 진행 중 또는 과거 흔적 — alerts.json 의 rule 5710 확인
      - **모든 패턴 0**: sshd.log 가 비어있음 또는 rotate — 다른 시점 확인
    hint: "grep -c 각 패턴 + grep -m1 예제."
    category: log_basics
    points: 10
    answer: |
      echo "=== sshd 5 인증 패턴 ==="
      ssh 6v6-siem 'for p in "Accepted" "Failed password" "Disconnect" "publickey" "Invalid user"; do
          c=$(grep -c "$p" /var/log/sshd.log 2>/dev/null)
          ex=$(grep -m1 "$p" /var/log/sshd.log 2>/dev/null | head -c 90)
          echo "[$p] count=$c | $ex"
      done'
    answer_detail: |
      Accepted publickey = 정상 (6v6 의 ProxyJump key 인증). Failed password +
      Invalid user 가 0 이상 = brute force 흔적. Wazuh rule 5710 (8 회 fail in 120s)
      / 5712 (브루트 후 성공) 등 매핑.
    verify:
      type: output_contains
      expect: Accepted
      field: stdout
      semantic:
        intent: sshd 5 인증 패턴 의 빈도 + 예제. SOC brute force detection base.
        success_criteria:
          - "5 패턴 모두 grep"
          - "각 의 발생 횟수"
          - "1 예제 인용"
        acceptable_methods:
          - |
            **[OSS] grep -c + grep -m1** — 표준.
              ssh 6v6-siem 'for p in Accepted "Failed password" ...; do grep -c "$p" /var/log/sshd.log; done'
            예상 출력 `[Accepted] count=15 | May 19 ... Accepted publickey for ccc`.
            운영 해석: Accepted 다수 = 정상, Failed 다수 = brute.
          - |
            **[OSS] awk 의 패턴 카운트** — 효율.
              ssh 6v6-siem 'awk "/Accepted/{a++} /Failed/{f++} /Invalid/{i++} END{print \"Accepted:\"a, \"Failed:\"f, \"Invalid:\"i}" /var/log/sshd.log'
            예상 출력 `Accepted:15 Failed:0 Invalid:0`.
            운영 해석: 한 번 의 scan 으로 다중 패턴 카운트.
          - |
            **[OSS] faillog / lastb — 실패 이력** — 보조.
              ssh 6v6-siem 'sudo lastb -n 10 2>/dev/null | head; faillog -a 2>/dev/null | head -5'
            예상 출력 `btmp 기반 실패 로그인`.
            운영 해석: btmp 의 실패 로그인 이력 — sshd.log 의 보조.
          - |
            **[OSS] 시간대별 Failed 분포** — burst.
              ssh 6v6-siem 'grep "Failed" /var/log/sshd.log | awk "{print \$3}" | cut -c1-2 | sort | uniq -c'
            예상 출력 `시간대별 Failed 횟수`.
            운영 해석: 특정 시각 의 Failed burst = 자동화 brute.
        negative_signs:
          - "5 패턴 중 일부 누락"
          - "횟수 없이 예제만"
          - "모든 패턴 0 (빈 로그)"
    target_vm: siem
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION

      Wazuh 의 ossec.log 의 daemon 시각 흐름 (INFO / WARNING / ERROR) 추출 + 최근
      ERROR/WARNING 1+ 확인 + 의미 분석.

      ## 💻 실행 명령

      ```bash
      # 1. 최근 ossec.log 10 line
      ssh 6v6-siem 'sudo tail -10 /var/ossec/logs/ossec.log'

      # 2. 최근 ERROR / WARNING 만
      ssh 6v6-siem 'sudo grep -E "ERROR|WARNING|CRITICAL" /var/ossec/logs/ossec.log | tail -5'

      # 3. log level 분포
      ssh 6v6-siem 'sudo grep -oE "INFO|WARNING|ERROR|CRITICAL" /var/ossec/logs/ossec.log | sort | uniq -c'
      ```

      ## 📋 확인 사항

      - 명령 1: `<date> wazuh-analysisd: INFO: ...` 형식 의 daemon 활동
      - 명령 2: ERROR/WARNING 라인 (있다면) — 예: "Too many fields for JSON decoder"
        같은 decoder 경고
      - 명령 3: INFO 다수 + ERROR/WARNING 소수 = 정상

      ## 💡 왜 이걸 하는가?

      ossec.log = Wazuh manager 의 daemon 의 health log. analysisd / remoted /
      modulesd 의 startup / error / warning 의 시각 흐름. SOC 의 *infrastructure
      health* 모니터링 의 base. ERROR 가 누적 되면 alert 생성 정지 위험.

      ## 🔍 결과 해석

      - **정상**: INFO 다수
      - **"Too many fields for JSON decoder" ERROR**: Suricata stats event 의
        256 field overflow (이전 fix 의 회귀) — ips 의 eve-log stats 제외 확인
      - **CRITICAL: Configuration error**: decoder/rule XML syntax 오류 — 즉시 점검
    hint: "tail ossec.log + grep ERROR/WARNING."
    category: wazuh
    points: 10
    answer: |
      echo "=== ossec.log 최근 10 line ==="
      ssh 6v6-siem 'sudo tail -10 /var/ossec/logs/ossec.log'
      echo "=== ERROR/WARNING ==="
      ssh 6v6-siem 'sudo grep -E "ERROR|WARNING|CRITICAL" /var/ossec/logs/ossec.log | tail -5'
      echo "=== log level 분포 ==="
      ssh 6v6-siem 'sudo grep -oE "INFO|WARNING|ERROR|CRITICAL" /var/ossec/logs/ossec.log | sort | uniq -c'
    answer_detail: |
      ossec.log = Wazuh 의 daemon 로그. analysisd 의 alert 생성 / remoted 의 agent
      연결 / modulesd 의 module 활동. ERROR 의 누적 = SOC 의 infrastructure 경고.
      "Too many fields" = Suricata stats overflow (fix 됨), "Configuration error" =
      decoder XML 오류.
    verify:
      type: output_contains
      expect: wazuh
      field: stdout
      semantic:
        intent: Wazuh ossec.log 의 daemon 시각 흐름 + ERROR/WARNING 분석.
        success_criteria:
          - "ossec.log 10 line"
          - "ERROR/WARNING 확인 (있다면)"
          - "log level 분포"
        acceptable_methods:
          - |
            **[OSS] tail + grep ossec.log** — 표준.
              ssh 6v6-siem 'sudo tail -10 /var/ossec/logs/ossec.log; sudo grep ERROR /var/ossec/logs/ossec.log | tail -5'
            예상 출력 `<date> wazuh-analysisd: INFO: ...`.
            운영 해석: daemon 의 health 시각 흐름.
          - |
            **[OSS] log level 통계** — 분류.
              ssh 6v6-siem 'sudo grep -oE "INFO|WARNING|ERROR" /var/ossec/logs/ossec.log | sort | uniq -c'
            예상 출력 `5000 INFO / 20 WARNING / 3 ERROR`.
            운영 해석: ERROR 비율 = manager 의 건강도.
          - |
            **[OSS] 시간대별 ERROR 추세** — burst.
              ssh 6v6-siem 'sudo grep ERROR /var/ossec/logs/ossec.log | awk "{print \$1, \$2}" | cut -c1-13 | sort | uniq -c'
            예상 출력 `시간대별 ERROR 횟수`.
            운영 해석: 특정 시각 의 ERROR burst = 설정 변경 또는 overflow.
          - |
            **[OSS] api.log — REST API 로그** — 보조.
              ssh 6v6-siem 'sudo tail -5 /var/ossec/logs/api.log'
            예상 출력 `<date> INFO: wazuh-wui ... GET /agents ... 200`.
            운영 해석: dashboard 의 API 호출 의 health.
        negative_signs:
          - "ossec.log 없음 (경로 오류)"
          - "CRITICAL Configuration error (decoder 손상)"
          - "ERROR 다수 (manager 건강도 저하)"
    target_vm: siem
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION

      alerts.json 의 sshd / 인증 관련 alert (rule.id 5xxx 계열 또는 rule.groups 에
      authentication) 추출 + 5 필드 + 의미.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | \
          jq -c "select((.rule.groups // []) | join(\"|\") | test(\"authentication|sshd|pam\")) | {ts: .timestamp[0:19], rule: .rule.id, level: .rule.level, desc: .rule.description, src: .data.srcip}" | tail -5'
      ```

      ## 📋 확인 사항

      - rule.id = 5715 (Accepted) / 5710 (multiple failed) / 5760 (Invalid user) 등
      - rule.groups 에 `authentication_success` 또는 `authentication_failed`
      - data.srcip = 접속 source IP

      ## 💡 왜 이걸 하는가?

      sshd.log (STEP 1-2) 의 raw 가 Wazuh decoder 를 거쳐 alert 로 변환 되는 흐름.
      raw log → decoder → rule → alert 의 전체 chain 의 마지막 단계 인 alert
      view 가 SOC 의 표준 분석 대상.

      ## 🔍 결과 해석

      - **정상**: 5715 (Accepted) 다수 — 정상 ProxyJump 접속
      - **5710/5712 (multiple failed / brute success)**: brute force 흔적 — 즉시 분석
      - **alert 0**: sshd 의 인증 이벤트 가 alert 로 안 만들어짐 — decoder/rule 점검
    hint: "alerts.json | jq filter rule.groups authentication."
    category: alert
    points: 10
    answer: |
      echo "=== sshd/인증 관련 alert ==="
      ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -c "select((.rule.groups // []) | join(\"|\") | test(\"authentication|sshd|pam\")) | {ts: .timestamp[0:19], rule: .rule.id, level: .rule.level, desc: .rule.description, src: .data.srcip}" | tail -5'
    answer_detail: |
      Wazuh 의 인증 rule: 5715 (sshd Accepted) / 5710 (8 회 fail in 120s) / 5712
      (brute force 후 성공) / 5760 (Invalid user). rule.groups 의 키워드 매칭 으로
      필터링. data.srcip 가 외부 IP 면 의심 ↑.
    verify:
      type: output_contains
      expect: rule
      field: stdout
      semantic:
        intent: alerts.json 의 sshd/인증 alert 추출 + raw log → alert chain 확인.
        success_criteria:
          - "인증 관련 alert 추출"
          - "rule.id + level + srcip"
          - "5710/5715 등 인증 rule 식별"
        acceptable_methods:
          - |
            **[OSS] jq filter rule.groups** — 표준.
              ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -c "select((.rule.groups//[])|join(\"|\")|test(\"authentication\"))" | tail -5'
            예상 출력 `{"rule":"5715","level":3,"desc":"sshd: authentication success"}`.
            운영 해석: 인증 alert 의 source 별 분석.
          - |
            **[OSS] rule.id 직접 필터** — 정밀.
              ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -c "select(.rule.id | test(\"^57(1|6)\"))" | tail -5'
            예상 출력 `5710/5715/5760 의 alert`.
            운영 해석: 특정 rule 계열 의 추출.
          - |
            **[OSS] dashboard 의 Authentication module** — GUI.
              # Wazuh dashboard ☰ → Security events → Authentication
            예상 출력 `인증 success/failure 의 시각 chart`.
            운영 해석: GUI 의 인증 분석 module.
          - |
            **[OSS] srcip 별 인증 실패 통계** — UEBA.
              ssh 6v6-siem 'sudo tail -2000 /var/ossec/logs/alerts/alerts.json | jq -r "select(.rule.id==\"5710\") | .data.srcip" | sort | uniq -c | sort -rn'
            예상 출력 `srcip 별 brute force 횟수`.
            운영 해석: 가장 많이 시도한 source = 우선 차단 대상.
        negative_signs:
          - "인증 alert 0 (decoder 미작동)"
          - "rule.id 누락"
    target_vm: siem
    risk_level: low

  - order: 5
    instruction: |
      ## 🎯 MISSION

      log rotation + retention 정책 확인 — Wazuh 의 logall / rotation + 시스템 의
      logrotate. SOC 의 로그 보관 기간 파악.

      ## 💻 실행 명령

      ```bash
      # 1. Wazuh 의 logging 설정 (ossec.conf 의 <logging>)
      ssh 6v6-siem 'sudo grep -A5 "<logging>\|<global>" /var/ossec/etc/ossec.conf | head -15'

      # 2. alerts 의 보관 구조 (날짜별 디렉토리)
      ssh 6v6-siem 'sudo ls -la /var/ossec/logs/alerts/ | head; sudo ls /var/ossec/logs/alerts/2026/ 2>/dev/null | head'

      # 3. 시스템 logrotate (있다면)
      ssh 6v6-siem 'ls /etc/logrotate.d/ 2>/dev/null | head; cat /etc/logrotate.d/wazuh 2>/dev/null | head'
      ```

      ## 📋 확인 사항

      - alerts 의 보관 = `/var/ossec/logs/alerts/<year>/<month>/ossec-alerts-DD.json.gz` 형식 (압축 보관)
      - Wazuh default = alert 압축 보관 + 일 단위 rotation
      - retention = 보통 ossec.conf 의 설정 (또는 무제한)

      ## 💡 왜 이걸 하는가?

      compliance (ISMS-P / ISO 27001) 의 로그 보관 요구 = 보통 1 년+. SOC 의 로그
