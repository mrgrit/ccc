lab_id: standalone-soc-week02
title: "로그 이해 (1) — 시스템 로그 (syslog / auth.log / journald) 직접 분석 (6v6 + R/B/P)"
version: standalone-non-ai
course: soc
week: 2
description: |
  SOC 분석가 의 base equipment = 시스템 로그 의 raw read. 6v6 의 fw / ips / web /
  siem 4 컨테이너 의 syslog (/var/log/syslog 또는 /var/log/messages), auth.log
  (sshd 인증 이벤트), journald (systemd) 의 *raw 위치 + 형식 + 핵심 필드* 를
  학생 본인 손 으로 추출.
difficulty: easy
duration_minutes: 90
prerequisites:
  - "W01 의 6v6 SOC stack 데이터 흐름 이해"
  - "bastion ssh ProxyJump 로 4 컨테이너 접근 가능"
objectives:
  - "syslog 의 RFC3164 / RFC5424 format 의 5 필드 (timestamp / host / facility / severity / message) 추출"
  - "auth.log 의 sshd 이벤트 (Accepted / Failed password / session opened/closed) 5 패턴 식별"
  - "journald (systemctl status / journalctl -u) 로 daemon 의 최근 상태 추출"
  - "logrotate 정책 + 보관 기간 파악 (운영 환경 의 로그 retention)"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — fw 의 syslog 5 필드 추출

      **어디서:** bastion → ssh 6v6-fw
      **무엇을:** /var/log/syslog 의 최근 5 line 추출 + 각 line 의 5 필드 (timestamp / host / facility.severity / process / message) 의 위치 표시.

      ## 📋 채점
      - 5 line 추출
      - 5 필드 mapping
      - RFC 형식 (3164 vs 5424) 판정
    hint: "tail -5 /var/log/syslog 또는 journalctl -n 5. 일반 syslog format: 'Month Day HH:MM:SS host process[pid]: msg'."
    category: log_basics
    points: 10
    answer: |
      🤖 가이드:
      ssh 6v6-fw 'tail -5 /var/log/syslog 2>/dev/null || journalctl -n 5 --no-pager'
    answer_detail: |
      대부분 Linux = RFC3164 (BSD format). RFC5424 = 구조화 (severity priority 명시). 6v6 의 fw 컨테이너 = Ubuntu — RFC3164.
    verify:
      intent: "fw syslog 5 line + 5 필드 + RFC 판정"
      success_criteria:
        - "5 line 추출"
        - "5 필드 mapping"
        - "RFC 형식 판정"
      acceptable_methods:
        - "tail / journalctl"
      negative_signs:
        - "1~2 line만"
    target_vm: bastion
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — auth.log 의 sshd 이벤트 5 패턴 식별

      **무엇을:** fw 또는 attacker 컨테이너 의 /var/log/auth.log 에서 sshd 의 5 패턴 (Accepted / Failed password / Disconnect / session opened / Invalid user) 각각 발생 횟수 + 1 예제 인용.

      ## 📋 채점
      - 5 패턴 모두 grep
      - 각 의 발생 횟수
      - 1 예제 인용
    hint: "grep -c 'Accepted\\|Failed\\|Disconnect\\|session opened\\|Invalid' /var/log/auth.log. 각 grep -m1 ... 예제."
    category: log_basics
    points: 10
    answer: |
      🤖 가이드:
      ssh 6v6-fw 'for p in Accepted "Failed password" Disconnect "session opened" "Invalid user"; do
        c=$(grep -c "$p" /var/log/auth.log 2>/dev/null)
        ex=$(grep -m1 "$p" /var/log/auth.log 2>/dev/null | head -c 100)
        echo "[$p] count=$c | $ex"
      done'
    answer_detail: |
      sshd 의 인증 이벤트 5 패턴 = Wazuh rule 5710 (multiple failed) / 5715 (Accepted) 등 의 source. SOC 의 brute force detection 의 base.
    verify:
      intent: "5 sshd 패턴 + 횟수 + 예제"
      success_criteria:
        - "5 패턴"
        - "횟수"
        - "예제"
      acceptable_methods:
        - "grep / awk"
      negative_signs:
        - "1~2 패턴만"
    target_vm: bastion
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — journald 로 systemd unit 의 최근 상태

      **무엇을:** 한 컨테이너 의 systemd unit (예: sshd 또는 rsyslog) 의 최근 10 line + unit 의 active 상태.

      ## 📋 채점
      - 1+ unit 의 status + 최근 10 line
      - active/inactive/failed 판정
    hint: "systemctl status <unit> 또는 journalctl -u <unit> -n 10."
    category: log_basics
    points: 8
    answer: |
      🤖 가이드:
      ssh 6v6-fw 'systemctl status rsyslog 2>&1 | head -10; echo ---; journalctl -u rsyslog -n 5 --no-pager 2>&1 | tail -5'
    answer_detail: |
      journald = systemd 의 통합 로그. journalctl 의 -u (unit) / --since / --priority filter. 운영 환경 의 daemon 상태 의 1 차 진단.
    verify:
      intent: "systemd unit status + journalctl 10 line"
      success_criteria:
        - "unit 1+"
        - "status"
        - "최근 line"
      acceptable_methods:
        - "systemctl + journalctl"
      negative_signs:
        - "unit 없음"
    target_vm: bastion
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION — logrotate + retention 정책 + 보고서

      **무엇을:**
      1. /etc/logrotate.d/ 의 rule 1 개 확인 (예: rsyslog)
      2. 현재 로그 보관 일수 추정 (rotate N + frequency)
      3. 본 lab 의 3 log source (syslog / auth.log / journald) 의 *3 줄 보고서* + cleanup
    hint: "cat /etc/logrotate.d/rsyslog. journald 의 SystemMaxUse = /etc/systemd/journald.conf."
    category: documentation
    points: 8
    answer: |
      🤖 가이드:
      ssh 6v6-fw 'cat /etc/logrotate.d/rsyslog 2>/dev/null | head -10; grep -i max /etc/systemd/journald.conf 2>/dev/null | head -3'
    answer_detail: |
      운영 환경 의 retention = 통상 30~90 일 (compliance 요구 시 1 년+). 6v6 = lab 환경 default.
    verify:
      intent: "logrotate + retention + 3 줄 보고서"
      success_criteria:
        - "logrotate 1+"
        - "retention 추정"
        - "보고서"
      acceptable_methods:
        - "cat + grep"
      negative_signs:
        - "보고서 누락"
    target_vm: bastion
    risk_level: low
