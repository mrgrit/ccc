lab_id: standalone-soc-week01
title: SOC 의 역할 + 3 tier + KPI (MTTD / MTTR)
version: standalone-non-ai
course: soc
week: 1
description: SOC 의 *전체 지도* + 3 tier (L1/L2/L3) + 핵심 KPI (MTTD / MTTR / detection rate).
difficulty: easy
duration_minutes: 150

steps:
  - order: 1
    instruction: |
      ## 🎯 MISSION — SOC 의 3 tier + 각 역할 표 작성

      ## 표준 3 tier
      - **L1 Analyst** (Triage) — alert 의 *1차 분류* (24/7 shift)
      - **L2 Analyst** (Investigation) — *심화 분석* + IR 시작
      - **L3 Analyst / Hunter** — *unknown* threat 의 *능동* hunt + IR 의 *lead*

      ## 각 tier 의 KPI
      - L1: alert / hour (속도)
      - L2: investigation depth + closure rate
      - L3: hunt 의 *new threat 발견* + detection rule 작성 수
    hint: 3 tier 표
    category: planning
    points: 25
    answer: 학습 산출물
    answer_detail: SOC 3 tier
    verify:
      type: output_contains
      expect: 'L1\|L2\|L3'
      field: stdout
      semantic:
        intent: SOC 3 tier
        success_criteria: [3 tier + 역할]
        acceptable_methods: ["**[관리적] SOC 의 표준 3 tier**"]
    target_vm: bastion

  - order: 2
    instruction: |
      ## 🎯 MISSION — 핵심 KPI 측정 (MTTD / MTTR)

      ## KPI
      - **MTTD** (Mean Time to Detect) — alert 발생 후 *분류* 까지 시간
      - **MTTR** (Mean Time to Respond) — 분류 후 *대응 완료* 까지 시간
      - **MTTC** (Mean Time to Contain) — 격리 시점
      - **False Positive Rate** — 잘못된 alert / 전체 alert
      - **Coverage** — ATT&CK 의 detect 비율 (61% 등)

      ## 표준 목표 (2024)
      - MTTD: < 15 분 (이상 적)
      - MTTR: < 1 시간 (high) / < 24 시간 (medium)
      - FPR: < 5%
      - Coverage: 70%+
    hint: 5 KPI + 목표
    category: analysis
    points: 25
    answer: 학습 산출물
    answer_detail: KPI 측정
    verify:
      type: output_contains
      expect: 'MTTD\|MTTR'
      field: stdout
      semantic:
        intent: KPI
        success_criteria: [5 KPI + 목표]
        acceptable_methods: ["**[관리적] NIST CSF + ISO 27001**"]
    target_vm: bastion

  - order: 3
    instruction: |
      ## 🎯 MISSION — 6v6 의 SOC stack 가시화

      6v6 의 *SOC 도구* 가시화 — Wazuh (SIEM) + Suricata (IDS) + ModSec (WAF) +
      osquery (EDR-like) + Bastion (LLM agent).

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== 6v6 SOC stack ==="
      docker exec 6v6-siem bash -c "wazuh-control status 2>&1 | head -5" 2>&1 | head -5
      docker exec 6v6-ips bash -c "systemctl status suricata 2>&1 | head -5" 2>&1 | head -5
      docker exec 6v6-web bash -c "ls /etc/modsecurity 2>&1 | head -3" 2>&1 | head -3
      SH
      ```
    hint: 5 도구 가시화
    category: survey
    points: 25
    answer: |
      ssh 6v6-attacker bash <<'SH'
      docker exec 6v6-siem bash -c "wazuh-control status 2>&1 | head -5" 2>&1 | head -5
      docker exec 6v6-ips bash -c "systemctl status suricata 2>&1 | head -3" 2>&1 | head -3
      SH
    answer_detail: 6v6 SOC stack
    verify:
      type: output_contains
      expect: 'wazuh\|suricata\|modsec'
      field: stdout
      semantic:
        intent: SOC stack
        success_criteria: [5 도구]
        acceptable_methods: ["**[OSS] Wazuh + Suricata + ModSec + osquery + Bastion**"]
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 MISSION — W01 보고서 + 본인 학습 계획

      ```markdown
      ## 1. SOC 3 tier + 역할
      ## 2. 5 KPI + 표준 목표
      ## 3. 6v6 의 SOC stack
      ## 4. 본인 학습 계획 (15 weeks)
      ## 5. 본인 목표 tier (L1/L2/L3)
      ```
    hint: 4 영역 + 본인 계획
    category: synthesis
    points: 25
    answer: 위 형식
    answer_detail: W01 보고서
    verify:
      type: output_contains
      expect: 'tier\|KPI'
      field: stdout
      semantic:
        intent: W01 종합
        success_criteria: [4 영역]
        acceptable_methods: ["**[관리적] SOC 표준**"]
    target_vm: bastion

  # ============================================================
  # STEP 5 — R/B/P 종합 (SOC 3 tier base)
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION (R/B/P) — SOC 3 tier

      Red = 외부 probe / Blue = L1 (triage) + L2 (investigation) + L3 (hunting) /
      Purple = Bastion IR 보조.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — SOC 의 trigger 시나리오

      **페르소나**: 외부 위협 의 다양 한 source — SOC 의 24/7 운영 의 base trigger.
      매 주차 의 학습 의 base.

      **공격 의도**:
      1. **외부 probe** = unauthorized endpoint 의 정찰
      2. **다양 한 vector** = 매 주차 의 학습 주제 (hunting/EDR/SOAR/UEBA 등)
      3. **MTTD 의 trigger** = alert 의 발생 = 15분 내 의 1차 triage 대상

      **공격 단계**:
      - R1: curl 의 /admin endpoint probe
      - R2: alert 의 trigger (Wazuh 또는 ModSec)
      - R3: SOC L1 의 triage 시작 (시간 측정)

      ### 🔵 Blue Team — 3 tier 의 책임 분리

      **L1 (Triage, 24/7)**:
      - alert source = Wazuh manager 의 alerts.json
      - 1차 분류 (FP / TP / 무관)
      - SLA = MTTD < 15분

      **L2 (Investigation)**:
      - TP 의 심화 분석 (root cause)
      - IR 의 시작 (containment / eradication)
      - SLA = MTTR < 1시간 (high)

      **L3 (Hunter)**:
      - unknown threat 의 proactive hunt
      - new rule 의 작성 + 적용
      - SLA = MTTC < 4시간 (high)

      ### 🟣 Purple Team — Bastion IR 의 AI 보조

      **분석**:
      - L1/L2/L3 의 매 단계 의 Bastion chat 의 보조
      - 5 KPI 의 routine 측정 (MTTD/MTTR/MTTC/FPR/Coverage)

      **개선 cycle**:
      1. MTTD < 15분 의 routine 측정 + SLA review
      2. FPR < 5% 의 rule tuning (W10 Sigma)
      3. Coverage 70%+ 의 ATT&CK 매핑 (W09)
      4. Bastion IR 의 routine 통합 (W12)

      ## 💻
      ```bash
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/admin"'
      ssh 6v6-siem 'tail -20 /var/ossec/logs/alerts/alerts.json 2>/dev/null | jq -r ".rule.level" | head -5 || echo no alerts'
      echo "Coverage: L1 triage (MTTD<15min) + L2 + L3 + Bastion IR"
      ```
    hint: 'curl + jq alerts'
    category: rbp_integration
    points: 4
    answer: |
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/admin"'
      ssh 6v6-siem 'tail -20 /var/ossec/logs/alerts/alerts.json 2>/dev/null | jq -r ".rule.level" | head -5 || echo no alerts'
      echo "Coverage: L1+L2+L3 + Bastion IR"
    answer_detail: SOC base R/B/P
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: SOC 3 tier R/B/P
        success_criteria: [probe, alerts, Coverage]
        acceptable_methods: ["**[OSS] curl + jq**"]
    target_vm: bastion
