      - **정상**: 두 곳 에 흔적 + 매칭 → chain 정상 통과
      - **HAProxy log 없음**: docker logs 의 sshd 만 — HAProxy 가 stdout 으로 안
        보내는 설정 (별도 file). `docker exec 6v6-fw cat /etc/haproxy/haproxy.cfg | grep log` 확인
      - **ips eve.json 에 흔적 없음**: Suricata 의 NIC sniff 실패 또는 protocol decoder 비활성
      - **alert event 0**: Suricata 의 룰 매치 없음 — sqlmap UA / XSS 룰셋 가용성 점검
