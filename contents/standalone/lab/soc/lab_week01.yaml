  # ============================================================
  # STEP 6 — L1 트리아지 시뮬 (1 alert 위험도/출처/우선순위)
  # ============================================================
  - order: 6
    instruction: |
      ## 🎯 MISSION (L1 분석가 트리아지 시뮬)

      STEP 5 의 Top 1 rule.id 또는 가장 최근 high-level (level >= 7) alert 1 건
      선택 → 5 차원 트리아지 판정 (위험도 / 출처 / 시간 / IoC / 우선순위) + 학생
      본인 의 진위 판단 (진짜 위협 / 오탐 / 정상 baseline) 1 줄.

      ## 💻 실행 명령

      ```bash
      # 1. 가장 최근 high-level alert 1 건 (level >= 7)
      ssh 6v6-siem 'sudo tail -200 /var/ossec/logs/alerts/alerts.json | jq -c "select(.rule.level >= 7)" | tail -1 | jq "."'

      # 또는 Top 1 rule.id 의 가장 최근 1 건
      RULE=$(ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -r ".rule.id" | sort | uniq -c | sort -rn | head -1 | awk "{print \$2}"')
      echo "Top rule.id: $RULE"
      ssh 6v6-siem "sudo tail -100 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.rule.id == \"$RULE\")' | tail -1 | jq ."
      ```

      ## 📊 트리아지 판정 표

      | 차원 | 값 | 학생 본인 판정 |
      |---|---|---|
      | rule.level | (0-15) | (Critical 14-15 / High 11-13 / Medium 6-10 / Low 1-5) |
      | agent.name | | (운영 영향 큼 / 작음 / N/A) |
      | rule.description | | (어떤 공격 패턴 — SQLi / Brute / XSS / 등) |
      | rule.groups | | (분류 — web / firewall / intrusion / authentication) |
      | data.srcip 또는 data.url | | (내부 / 외부 / 알 수 없음) |
      | 최종 우선순위 | (P1/P2/P3/P4) | (P1 즉시 / P2 정시 / P3 모니터링 / P4 무시) |

      마지막 행 에 **학생 본인 의 1 문장 결정**: 이 alert 가 *진짜 위협* 인가
      *오탐* 인가 *정상 baseline* 인가 + 그 판단 의 근거 1 줄.

      ## 💡 왜 이걸 하는가?

      L1 의 가장 중요한 활동 = 트리아지 (어떤 alert 가 escalate 할 만한가). 운영
      환경 의 alert 수십~수백 개 중 *대응 필요* 한 것 만 선별. 트리아지 의 reasoning
      = SOC 분석가 의 핵심 역량. 자동 도구 가 못 대체 하는 영역.

      ## 🔍 결과 해석

      ### 트리아지 의 표준 의사 결정 흐름:
      1. **level 14-15 (Critical)** → 무조건 P1 즉시 (15 분 안에 대응)
      2. **level 11-13 (High)** → 보통 P2 정시 (1 시간 안에 분석)
      3. **agent 가 운영 critical 컨테이너** (siem / fw) → 우선순위 1 단계 ↑
      4. **rule.groups 에 sql_injection / xss / brute_force / malware** → P2 이상
      5. **data.srcip 가 외부 (10.20.x.x 아님)** → P2 이상

      ### 진위 판단 의 단서:
      - **rule.id 가 자주 발생** (baseline) → 오탐 가능성 높음
      - **시간 burst 와 일치** → 공격 가능성
      - **agent 가 idle 시간 의 외부 IP** → 의심 ↑
      - **rule.description 의 keyword 가 응답 200 의 정상 트래픽** → 오탐
