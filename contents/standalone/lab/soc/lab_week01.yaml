      Red 공격 의 흔적 + 매치 된 룰 ID 추출 (chain 의 3 번째 hop).

      ## 💻 실행 명령

      ```bash
      # 1. ModSec audit log 의 룰 매치 추출 (messages 배열 의 rule id)
      ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | \
          jq "{
              client: .transaction.remote_address,
              code: .response.status,
              rules: [.audit_data.messages[]? | capture("id .(?<id>[0-9]+).") | .id]
          }"'

      # 2. Apache access log (vhost 별 별도 file 또는 통합)
      ssh 6v6-web 'sudo tail -3 /var/log/apache2/access.log 2>&1 | head -3'

      # 3. Apache error.log 의 ModSec Warning 라인 (rule 941/942 등)
      ssh 6v6-web 'sudo grep -E "913100|941100|942100" /var/log/apache2/error.log 2>/dev/null | tail -2'

      # 4. ModSec audit 의 매치 룰 통계 (최근 100 transaction)
      ssh 6v6-web 'sudo tail -100 /var/log/apache2/modsec_audit.log | grep -oE "\"ruleId\":\"[0-9]+\"|id \"[0-9]+\"" | sort | uniq -c | sort -rn | head -5'
      ```

      ## 📋 확인 사항

      - 명령 1: `{"client":"10.20.31.1", "code":403, "rules":["913100","941100","941160","942100","949110"]}`
        — 5+ 룰 매치 (sqlmap scanner detection + XSS via libinjection + XSS script tag + SQLi libinjection + anomaly threshold)
      - 명령 2: `<haproxy_ip> - - [<date>] "GET /?q=<script>... HTTP/1.1" 403 439 "-" "sqlmap/1.5"` 1+ 라인
      - 명령 3: `[client 10.20.31.1] ModSecurity: Warning. Matched phrase "sqlmap" ...` 라인
      - 명령 4: 매치 룰 통계 — 941 (XSS) > 942 (SQLi) > 949 (threshold) 분포

      ## 💡 왜 이걸 하는가?

      "WAF 가 어느 룰 로 차단 했나?" 의 답. ModSec 의 rule.id (의 카테고리:
      913 scanner / 941 XSS / 942 SQLi / 949 anomaly threshold) 의 매치 분포 가
      공격 의 *유형* 시각화. 운영 환경 의 SOC 가 ModSec audit log 를 가장 자주
      확인.

      ## 🔍 결과 해석

      - **정상**: 5+ 룰 ID 매치 + 403 + sqlmap UA 흔적
      - **client IP 가 10.20.31.1 인 이유**: Apache 의 첫 column 은 직전 hop (HAProxy).
        원래 attacker IP 는 `X-Forwarded-For` 헤더 에서 확인
      - **비정상**: audit log 비어 있음 → SecAuditEngine 또는 SecAuditLog 경로 점검
      - **rule.id 945xxx (PHP)**: PHP 의 Wordpress 등 의 룰 — JuiceShop / DVWA 의 backend 확인
