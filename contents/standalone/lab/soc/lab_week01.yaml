      ssh 6v6-siem 'sudo tail -10 /var/ossec/logs/alerts/alerts.json | \
          jq -c "{ts: .timestamp[0:19], rule: .rule.id, level: .rule.level, agent: .agent.name, desc: .rule.description[0:80]}"'
