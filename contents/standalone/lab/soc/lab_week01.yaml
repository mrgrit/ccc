  # ============================================================
  # STEP 7 — Red Team: 공격 1건 발생 (attacker → dvwa.6v6.lab)
  # ============================================================
  - order: 7
    instruction: |
      ## 🎯 MISSION (Red Team)

      attacker 컨테이너 에서 **sqlmap UA + XSS + SQLi 결합 페이로드** 1 건 을 발생
      시킨 후, 4 도구 (fw / ips / web / siem) 의 흔적 을 STEP 8-10 에서 추적 할
      준비. 시각 (ATTACK_TS) 기록 필수.

      ## 💻 실행 명령

      ```bash
      # Red 공격 — sqlmap UA + XSS + SQLi UNION SELECT 결합. 대상 = dvwa
      # (SecRuleEngine On). juice 는 DetectionOnly — W02 학습 용.
      ssh 6v6-attacker 'curl -s -o /dev/null -w "응답: %{http_code} / 시간: %{time_total}s\n" \
          -A "sqlmap/1.5" \
          -H "Host: dvwa.6v6.lab" \
          "http://10.20.30.1/?q=<script>alert(1)</script>&id=1+UNION+SELECT"'

      # 공격 시각 기록 (Blue/Purple step 에서 timestamp 매칭에 사용)
      ATTACK_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S')
      echo "ATTACK_TS=$ATTACK_TS"
      echo "이 시각 이후 의 로그 가 Blue/Purple step 의 추적 대상"
      ```

      ## 📋 확인 사항

      - 응답 코드 = `403` (ModSec 가 941 XSS + 942 SQLi + 949 anomaly threshold 매치 후 차단)
      - 시간 < 0.1s (HAProxy 빠른 종료)
      - ATTACK_TS 변수 = UTC ISO timestamp

      ## 💡 왜 이걸 하는가?

      Defense in Depth 의 효과 를 측정 하려면 실제 공격 필요. sqlmap UA + XSS +
      SQLi 결합 페이로드 1건 이 4 도구 (fw HAProxy → ips Suricata → web ModSec →
      siem Wazuh) 에 동시 흔적 을 남긴다. Red Team 의 표준 1 단계 — 학생 의 SOC
      의 detection chain 가시화.

      ## 🔍 결과 해석

      - **정상 (의도 된 결과)**: 응답 `403` → ModSec 차단 → WAF 정상
      - **비정상 1**: 응답 `200` → ModSec engine `Off` 또는 룰셋 손실 → web 점검
      - **비정상 2**: 응답 `5xx` → backend 다운 또는 HAProxy 라우팅 오류 → fw 점검
      - **비정상 3**: 응답 `000` (timeout) → fw input chain drop 또는 attacker 컨테이너 down
    hint: "curl -A sqlmap -H Host:dvwa.6v6.lab → 403. ATTACK_TS 기록."
