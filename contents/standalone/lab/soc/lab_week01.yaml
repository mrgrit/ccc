lab_id: standalone-soc-week01
title: 보안관제(SOC) 개론 + 6v6 SOC stack 데이터 흐름 + L1 트리아지 + R/B/P 통합 시나리오
version: standalone-non-ai
course: soc
week: 1
description: |
  6v6 4-tier 토폴로지 위의 SOC stack (fw / ips / web / siem) 의 *데이터 흐름* 을
  학생 본인 손 으로 추적 + Wazuh dashboard 의 L1 트리아지 활동 + 마지막 5 step
  (7-11) 의 R/B/P 통합 — Red 의 공격 1 건 이 4 도구 (fw HAProxy → ips Suricata →
  web ModSec → siem Wazuh) 에 어떻게 흔적 을 남기는지 실시간 추적 + Purple 의
  Coverage Matrix + Gap 분석.

  보안관제 분석가 의 1 일 첫 30 분 활동 (대시보드 모니터링 → 알림 식별 → 트리아지)
  + 침해 사고 의 첫 30 분 (Red 공격 → Blue 추적 → Purple 보강) 의 두 가지 시뮬레이션.

difficulty: medium
duration_minutes: 180
audience: 보안관제 입문자 (1주차)

prerequisites:
  - "학생 PC `~/.ssh/config` 에 6v6-bastion + 6v6-* ProxyJump 설정 완료"
  - "학생 PC `/etc/hosts` 에 192.168.0.110 siem.6v6.lab juice.6v6.lab dvwa.6v6.lab 매핑 (브라우저 직접 접근용)"
  - "Wazuh dashboard 자격증명 (admin / SecretPassword) 인지"
  - "lecture_week01.md 정독 — L1/L2/L3 + MTTD/MTTR + SOC 워크플로우 5 단계 + R/B/P 의미"

objectives:
  - "Wazuh dashboard 접속 + Discover 화면 + 최근 1 시간 alert 5+ 행 확인"
  - "6v6 SOC stack 의 4 컨테이너 의 역할 + 이벤트 출처 + siem 전달 방식 표"
  - "wazuh-control status 의 7+ daemon active 확인 + Manager / Agent 구조 이해"
  - "alerts.json 의 1 alert 의 5 필드 (id/timestamp/rule.id/level/agent) 추출"
  - "rule.level 분포 + agent 분포 + Top 3 rule.id histogram"
  - "L1 트리아지 시뮬 — 1 alert 의 위험도 / 출처 / 우선순위 본인 판정"
  - "Red/Blue/Purple 통합 — 공격 1건이 4 도구 (fw/ips/web/siem) 에 남긴 흔적 chain 추적"
  - "Purple Coverage Matrix — 4 도구 의 detection coverage + gap 식별 + 권장 보강"

pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — Wazuh dashboard 첫 접속 + Discover 화면
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION

      학생 PC 브라우저 로 Wazuh dashboard 에 접속 + Discover 화면 의 최근 1 시간
      alert 5+ 행 확인. L1 분석가 의 1 일 첫 활동.

      ## 💻 실행 명령

      ```
      1. 학생 PC 의 /etc/hosts 에 매핑 확인:
         192.168.0.110 siem.6v6.lab juice.6v6.lab dvwa.6v6.lab

      2. 브라우저 에서 https://siem.6v6.lab/ 접속 (인증서 경고 → 계속)

      3. 자격증명:
         Username: admin
         Password: SecretPassword

      4. 좌상단 ☰ → Explore → Discover 클릭

      5. 좌상단 인덱스 selector 확인:
         wazuh-alerts-* 가 선택 되어 있는지

      6. 우상단 시계 → Last 1 hour

      7. 새로고침 → 화면 의 alert 행 수 + 좌측 Available fields 갯수 인용
      ```

      ## 📋 확인 사항

      - 인증서 경고 = self-signed cert (lab 환경) — 정상
      - Discover 화면 의 alert 행 수: 최근 1 hour 보통 30~200 건
      - 좌측 Available fields 갯수: 50~80 (default Wazuh field set)
      - 화면 상단 의 시간 histogram 에 burst 패턴 시각화

      ## 💡 왜 이걸 하는가?

      Wazuh dashboard = SOC 의 *유일한 단일 진입점*. L1 분석가 의 1 일 첫 활동 =
      dashboard 의 첫 화면 의 alert 분포 파악. 운영 환경 의 SOC 는 wallboard 또는
      multi-monitor 로 항상 dashboard 표시.

      ## 🔍 결과 해석

      - **정상**: alert 행 5+ + 좌측 field 50+ + 시간 histogram 표시
      - **비정상 1**: alert 0 행 → 시간 범위 확장 (Last 24h) 또는 wazuh-alerts-*
        인덱스 미생성 (indexer 가용성 점검)
      - **비정상 2**: 인덱스 selector 가 비어있음 → wazuh-alerts-* template 미배포
        → siem 의 filebeat 또는 wazuh-indexer 점검
      - **비정상 3**: dashboard 가 "No API available to connect" → rate limit fix
        (95-api-rate-limit cont-init 적용 확인) — 이전 fix 의 회귀 가능성
    hint: "https://siem.6v6.lab/ + admin/SecretPassword. ☰ Explore → Discover. wazuh-alerts-* 인덱스 + Last 1 hour."
    category: dashboard
    points: 10
    answer: |
      # 브라우저 활동 — 학생 PC 에서 직접 수행.
      # 결과 메모: alert 행 수 / field 갯수 / Top 3 rule.id Top 3
      echo "=== 학생 PC 의 /etc/hosts 확인 ==="
      getent hosts siem.6v6.lab
      echo "=== siem dashboard health check (API 측) ==="
      curl -sk -m 5 -u admin:SecretPassword https://siem.6v6.lab:443/ 2>&1 | head -5
    answer_detail: |
      Wazuh dashboard 의 Discover = Kibana 의 fork (OpenSearch 기반). 좌측 Available
      fields 가 50+ 이면 wazuh-alerts-* template 정상. 비어있으면 indexer 측 점검.
      Discover 화면 의 alert 행 수 가 너무 적으면 (1 시간 < 5) 시간 범위 확장 또는
      6v6 가 idle 상태 — 학생 PC 또는 attacker 에서 인위적 트래픽 발생 (curl
      http://juice.6v6.lab/) 후 5 분 대기 후 재확인.
    verify:
      type: output_contains
      expect: siem.6v6.lab
      field: stdout
      semantic:
        intent: |
          Wazuh dashboard 접속 + Discover 화면 의 최근 1 시간 alert 분포 확인.
          L1 분석가 의 1 일 첫 활동 시뮬.
        success_criteria:
          - "dashboard 접속 성공 (admin / SecretPassword)"
          - "Discover 화면 도달 (wazuh-alerts-* 인덱스 선택)"
          - "alert 행 수 + field 갯수 결과 인용"
        acceptable_methods:
          - |
            **[OSS] 브라우저 GUI 표준** — 학생 PC.
              # 학생 PC 브라우저: https://siem.6v6.lab/
              # 자격증명: admin / SecretPassword
              # ☰ → Explore → Discover → wazuh-alerts-* → Last 1 hour
            예상 출력 `alert 행 50~200 + Available fields 50+`.
            운영 해석: SOC L1 의 1 일 첫 활동 — wallboard 으로 항상 표시.
          - |
            **[OSS] 인덱스 직접 API** — 자동화.
              curl -sk -u admin:SecretPassword "https://siem.6v6.lab:9200/wazuh-alerts-*/_count?pretty" 2>&1 | head -5
            예상 출력 `{"count": 12345, ...}`.
            운영 해석: GUI 없이 alert 총 갯수 API 직접 — 자동 모니터링 의 base.
          - |
            **[OSS] 직접 alerts.json tail (siem 측)** — raw.
              ssh 6v6-siem 'sudo tail -5 /var/ossec/logs/alerts/alerts.json | jq -c "{ts: .timestamp, rule: .rule.id, level: .rule.level, agent: .agent.name}"'
            예상 출력 `{"ts":"2026-05-19T...","rule":"86601","level":3,"agent":"ips"}`.
            운영 해석: GUI 없이 raw alert tail — CLI 분석가 의 base.
          - |
            **[OSS] dashboard 의 KQL 쿼리** — Discover 검색.
              # Discover 검색창: rule.level:>=10 AND @timestamp:>now-1h
            예상 출력 `high-severity alert 만 필터`.
            운영 해석: L1 의 트리아지 의 1 차 filter — Critical/High 만.
          - |
            **[OSS] dashboard 우측 통계 panel** — Top N.
              # 좌측 Available fields → rule.id → 클릭 → 우측 Top 5 통계
            예상 출력 `86601 (Suricata generic) 70% / 19007 / 19008 ...`.
            운영 해석: Top 3 rule.id 의 빈도 분포 — SOC 의 baseline.
        negative_signs:
          - "alert 0 (시간 범위 너무 짧음 또는 인덱스 미생성)"
          - "dashboard 접속 자체 실패 (인증서/포트/443 차단)"
          - "Available fields 비어있음 (template 미배포)"
    target_vm: bastion
    risk_level: low

  # ============================================================
  # STEP 2 — 6v6 SOC stack 4 컨테이너 데이터 흐름
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION

      6v6 의 SOC 관련 4 컨테이너 (fw / ips / web / siem) 각각 의 *역할* + *어떤
      보안 이벤트 의 출처* + *어디로 데이터 보내는지* 를 학생 본인 손 으로 확인 +
      표 1 개로 정리.

      ## 💻 실행 명령

      ```bash
      # 1. fw 의 docker logs (HAProxy 의 stdout — 일반 syslog 부재 환경)
      ssh 6v6-bastion 'docker logs --tail 3 6v6-fw' 2>&1 | tail -3

      # 2. ips 의 Suricata eve.json (network 보안 이벤트 의 source)
      ssh 6v6-ips 'tail -1 /var/log/suricata/eve.json | python3 -m json.tool 2>/dev/null | head -10'

      # 3. web 의 ModSec audit log (WAF 의 source)
      ssh 6v6-web 'sudo ls -la /var/log/apache2/ | grep -i modsec'

      # 4. siem 의 alerts.json 의 가장 최근 alert (SIEM 의 통합 결과)
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq -c "{rule_id: .rule.id, agent: .agent.name, decoder: .decoder.name}"'

      # 5. siem 의 ossec.conf 의 syslog remote (어떤 source 가 어떻게 siem 으로 모이는지)
      ssh 6v6-siem 'sudo grep -B1 -A3 "<remote>" /var/ossec/etc/ossec.conf | head -15'
      ```

      ## 📋 확인 사항

      - 명령 1 (fw docker logs): HAProxy 의 요청 처리 또는 sshd 의 이벤트 — minimal Docker 컨테이너 라 일반 /var/log/syslog 부재
      - 명령 2 (ips eve.json): JSON 라인 의 event_type 필드 (alert / http / flow / tls)
      - 명령 3 (web ModSec): `modsec_audit.log` 파일 존재 + 권한
      - 명령 4 (siem alerts.json): rule_id + agent.name (ips / web / wazuh.manager) + decoder.name
      - 명령 5 (ossec.conf): `<remote>` block 의 syslog 514/udp + secure 1514

      ## 📊 정리 표 작성

      | 컨테이너 | IP | 역할 (1 줄) | 어떤 이벤트 발생 | siem 으로 어떻게 전달 |
      |---|---|---|---|---|
      | fw | 10.20.30.1 / 10.20.31.1 | nftables + HAProxy host-header 라우팅 | HAProxy req log (docker stdout) | rsyslog → siem:514/udp (또는 docker logs 외부) |
      | ips | 10.20.31.2 / 10.20.32.1 | Suricata IDS sniff | eve.json (alert/http/flow/tls) | Wazuh agent → siem:1514/tcp |
      | web | 10.20.32.80 | Apache + ModSecurity | modsec_audit.log + access.log | Wazuh agent → siem:1514/tcp |
      | siem | 10.20.32.100 | Wazuh manager + alerts.json | (자체) decoder → rule → alert | (자기 자신) alerts.json + dashboard |

      ## 💡 왜 이걸 하는가?

      SOC 분석가 의 1 순위 = *어떤 컨테이너 에서 어떤 데이터 가 어떻게 SIEM 으로
      모이는지* 의 mental model. 이 model 없이는 alert 가 떠도 *왜* 를 추론 불가.
      Wazuh 의 ossec.conf 의 `<remote>` 가 5141 (secure) + 514 (syslog) 2 channel
      = agent 보안 채널 (TLS 가능) + syslog 호환 채널 의 이원화.

      ## 🔍 결과 해석

      - **정상**: 5 명령 모두 응답 + 표 4 컨테이너 모두 채워짐
      - **fw docker logs 가 sshd 만 보임**: HAProxy 가 stdout 으로 안 보내는 설정
        — `docker exec 6v6-fw cat /etc/haproxy/haproxy.cfg | grep log` 로 log target 확인
      - **ips eve.json 없음**: Suricata 가 down 또는 eve-log 의 enabled: no — `docker exec 6v6-ips ps aux | grep suricata`
      - **siem 의 ossec.conf 의 remote block 없음**: agent 수신 불가 — 모든 alert 가 siem 자체 source 만
    hint: "ssh 5 컨테이너 의 각 log 위치 확인 + ossec.conf 의 <remote>."
    category: stack
    points: 12
    answer: |
      echo "=== 1. fw docker logs (HAProxy stdout) ==="
      ssh 6v6-bastion 'docker logs --tail 3 6v6-fw 2>&1 | tail -3'
      echo "=== 2. ips Suricata eve.json (가장 최근 1건) ==="
      ssh 6v6-ips 'tail -1 /var/log/suricata/eve.json | python3 -m json.tool 2>/dev/null | head -10'
      echo "=== 3. web ModSec audit log 파일 ==="
      ssh 6v6-web 'sudo ls -la /var/log/apache2/ | grep -i modsec'
      echo "=== 4. siem alerts.json 가장 최근 alert ==="
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq -c "{rule_id: .rule.id, agent: .agent.name, decoder: .decoder.name, desc: .rule.description}"'
      echo "=== 5. siem ossec.conf 의 syslog remote ==="
      ssh 6v6-siem 'sudo grep -B1 -A3 "<remote>" /var/ossec/etc/ossec.conf | head -15'
    answer_detail: |
      6v6 의 SOC stack 의 데이터 흐름:
      - fw HAProxy → docker stdout (또는 rsyslog 시 siem:514)
      - ips Suricata → /var/log/suricata/eve.json → Wazuh agent → siem:1514
      - web Apache+ModSec → modsec_audit.log + access.log → Wazuh agent → siem:1514
      - siem 자체 의 sshd / Wazuh manager 활동 → 같은 alerts.json
      ossec.conf 의 `<remote>` block 2 개:
      - syslog 514/udp (allowed-ips=10.20.0.0/16) — fw / 외부 syslog 수신
      - secure 1514/tcp — Wazuh agent (ips/web 등) 수신
    verify:
      type: output_contains
      expect: agent
      field: stdout
      semantic:
        intent: |
          6v6 SOC stack 4 컨테이너 의 데이터 흐름 식별 — 각 의 이벤트 source +
          전달 방식 + 표 1 개로 정리.
        success_criteria:
          - "5 명령 모두 실행 결과 인용"
          - "4 컨테이너 표 작성 (역할/이벤트/전달)"
          - "ossec.conf 의 remote block 2 개 (syslog + secure) 확인"
        acceptable_methods:
          - |
            **[OSS] ssh + docker logs / tail / jq** — 표준.
              ssh 6v6-bastion 'docker logs --tail 3 6v6-fw 2>&1 | tail -3'
              ssh 6v6-ips 'tail -1 /var/log/suricata/eve.json | python3 -m json.tool | head -10'
              ssh 6v6-web 'sudo ls -la /var/log/apache2/ | grep modsec'
              ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq -c "{rule_id, agent: .agent.name}"'
            예상 출력 `5 결과 모두 raw`.
            운영 해석: SOC 분석가 의 1 차 정찰 — 5 컨테이너 1 회 sweep.
          - |
            **[OSS] Wazuh dashboard 의 Agents tab** — GUI.
              # Wazuh dashboard ☰ → Management → Agents
              # 또는 https://siem.6v6.lab/app/wazuh#/agents
            예상 출력 `Agent list: ips (Active), web (Active), fw (?), siem (Active)`.
            운영 해석: agent 의 active/disconnected 가시 — agent 누락 시 데이터 흐름 끊김.
          - |
            **[OSS] Wazuh API /agents** — 자동화.
              curl -sk -u wazuh-wui:MyS3cr37P450r.*- "https://siem.6v6.lab:55000/agents?status=active&pretty"
            예상 출력 `{"data":{"affected_items":[{"id":"001","name":"ips","status":"active"},...]}}`.
            운영 해석: agent 의 active 갯수 의 API monitor — automation 의 base.
          - |
            **[OSS] netstat / ss — 포트 listen 검증** — 인프라.
              ssh 6v6-siem 'sudo ss -tlnp | grep -E ":(1514|1515|514|55000)"'
            예상 출력 `LISTEN 0.0.0.0:1514 / :1515 / :514/udp / :55000`.
            운영 해석: 4 포트 모두 listen = Wazuh manager 의 모든 channel 가용.
          - |
            **[OSS] decoder.name 분포 — 통계** — 분류.
              ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -r ".decoder.name // \"unknown\"" | sort | uniq -c | sort -rn | head -5'
            예상 출력 `400 json / 200 bastion-lifecycle / 100 sshd / ...`.
            운영 해석: 어떤 decoder (= source) 가 가장 빈도 — SOC 의 트래픽 분포.
        negative_signs:
          - "5 명령 중 일부 응답 없음 (컨테이너 down 또는 ssh 차단)"
          - "표 4 컨테이너 중 일부 누락"
          - "ossec.conf 의 remote block 미발견"
    target_vm: bastion
    risk_level: low

  # ============================================================
  # STEP 3 — Wazuh manager daemon 상태
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION

      siem 의 Wazuh manager 의 daemon 7+ active 확인 + Top 3 cpu/memory 점유 daemon
      식별. SOC 의 infrastructure health check.

      ## 💻 실행 명령

      ```bash
      # 1. 전체 daemon status
      ssh 6v6-siem 'sudo /var/ossec/bin/wazuh-control status'

      # 2. active / not running 카운트
      ssh 6v6-siem 'sudo /var/ossec/bin/wazuh-control status 2>&1 | awk "{if (\$NF==\"running...\") active++; else if (\$NF==\"running...\") active++} END {print \"active:\" active}"'

      # 3. Top 3 process by cpu (wazuh prefix 만)
      ssh 6v6-siem 'ps -eo pid,pcpu,pmem,cmd --sort=-pcpu 2>&1 | grep -i wazuh | head -5'

      # 4. 각 daemon 의 PID + uptime
      ssh 6v6-siem 'sudo ps -eo pid,etime,cmd 2>&1 | grep -E "wazuh-(analysisd|remoted|monitord|modulesd|db)" | head -5'
      ```

      ## 📋 확인 사항

      - 명령 1: 11~13 daemon 중 7+ 가 `is running...` 표시 (clusterd / maild / dbd / agentlessd / csyslogd 는 일반적으로 `not running`)
      - 명령 3: 가장 cpu 점유 = `wazuh-analysisd` (alert 분석 의 main worker)
      - 명령 4: 각 daemon 의 PID + 시작 후 경과 시간 (etime)

      ## 💡 왜 이걸 하는가?

      Wazuh manager 의 11~13 daemon 의 각 역할 :
      - **wazuh-analysisd** — 가장 중요, decoder/rule 매칭 + alert 생성 (cpu 가장 많이 씀)
      - **wazuh-remoted** — agent 연결 수신 (1514/tcp)
      - **wazuh-db** — DB 의 query (cdb_list 등)
      - **wazuh-modulesd** — vuln scanner / SCA / 등 의 module worker
      - **wazuh-monitord** — agent 의 keepalive 모니터링
      - **wazuh-apid** — REST API (55000)
      - **wazuh-syscheckd** — FIM (file integrity)
      - **wazuh-logcollector** — local log 수집

