              RULE=$(ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq -r .rule.id')
              ssh 6v6-siem "sudo tail -100 /var/ossec/logs/alerts/alerts.json | jq -c 'select(.rule.id == \"$RULE\") | {ts: .timestamp, agent: .agent.name}'"
            예상 출력 `같은 rule.id 의 최근 5~10 발생 시각`.
            운영 해석: burst 패턴 식별 — 정상 baseline / 공격 / 오탐 판정.
        negative_signs:
          - "alerts.json 비어있음 (analysisd down)"
          - "5 필드 중 일부 누락 (jq query 오류)"
          - "rule.id 가 null (decoder 매칭 실패)"
