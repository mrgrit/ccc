  # ============================================================
  # STEP 4 — alerts.json 의 1 alert 5 필드 추출
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION

      alerts.json 의 가장 최근 1 alert 의 5 핵심 필드 (id / timestamp / rule.id /
      rule.level / agent.name) + 추가 필드 (rule.description / decoder.name /
      rule.groups) 추출. L1 분석가 의 alert 1 건 의 *who/what/where/when* 파악.

      ## 💻 실행 명령

      ```bash
      # 1. 가장 최근 1 alert 의 핵심 5 필드
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq "{
        id: .id,
        timestamp: .timestamp,
        rule_id: .rule.id,
        rule_level: .rule.level,
        agent: .agent.name
      }"'

      # 2. 추가 필드 (description / decoder / groups / data 의 핵심 필드)
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq "{
        rule_id: .rule.id,
        rule_description: .rule.description,
        rule_groups: .rule.groups,
        decoder_name: .decoder.name,
        data: .data
      }"'

      # 3. 최근 5 alert 의 동일 필드 표
      ssh 6v6-siem 'sudo tail -5 /var/ossec/logs/alerts/alerts.json | jq -c "{ts: .timestamp[0:19], rule: .rule.id, level: .rule.level, agent: .agent.name, desc: .rule.description[0:60]}"'
      ```

      ## 📋 확인 사항

      - 명령 1 의 5 필드 모두 추출:
        - `id`: `"1779263456.789"` 형식 (timestamp 의 epoch + offset)
        - `timestamp`: ISO 8601 `"2026-05-19T..."`
        - `rule_id`: 0-100000+ 범위 (default 0-100000 / custom 100000+)
        - `rule_level`: 0-15 정수
        - `agent.name`: `ips` / `web` / `wazuh.manager` / `fw` / ...
      - 명령 2: rule.groups 가 배열 (`["web","attack","sql_injection"]`) — 분류 의
        키워드
      - 명령 3: 5 alert 의 시간순 분포 시각

      ## 💡 왜 이걸 하는가?

      L1 분석가 의 가장 기본 활동 = alert 의 *who/what/where/when* 추출. 5 필드
      만 으로 다음 단계 (STEP 5 분포 + STEP 6 트리아지) 의 input 확보. 운영 환경 의
      alert 수십~수백 개 중 *대응 필요* 한 것 만 선별 의 base.

      ## 🔍 결과 해석

      - **정상**: 5 필드 모두 추출 + rule.groups 배열
      - **rule_level 0**: silent rule (분류 만 + alert 안 함) — 분석 대상 X
      - **rule_id 미설정**: decoder 매칭 실패 — decoder 점검
      - **agent.name 이 wazuh.manager**: siem 자체 의 활동 (bastion-lifecycle 등)
        — 분석 우선순위 낮음
      - **alerts.json 비어있음**: analysisd 가 down 또는 매우 idle 시스템 — STEP 3 의 daemon status 재점검
    hint: "tail -1 alerts.json | jq + 5 필드."
    category: alert
    points: 10
    answer: |
      echo "=== 1. 가장 최근 1 alert 5 필드 ==="
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq "{id: .id, timestamp: .timestamp, rule_id: .rule.id, rule_level: .rule.level, agent: .agent.name}"'
      echo "=== 2. 추가 필드 (description / decoder / groups / data) ==="
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq "{rule_id: .rule.id, rule_description: .rule.description, rule_groups: .rule.groups, decoder_name: .decoder.name}"'
      echo "=== 3. 최근 5 alert 표 ==="
      ssh 6v6-siem 'sudo tail -5 /var/ossec/logs/alerts/alerts.json | jq -c "{ts: .timestamp[0:19], rule: .rule.id, level: .rule.level, agent: .agent.name}"'
    answer_detail: |
      Wazuh alert 의 schema = id (string, epoch.offset) / timestamp (ISO 8601) /
      rule (object: id, level, description, groups, mitre 등) / agent (object:
      id, name, ip) / decoder (object: name, parent) / data (decoder 가 추출 한
      추가 필드 — 예: src_ip, dst_port). 5 필드 + rule.groups 의 분류 가 SOC 의
