    risk_level: low

  # ============================================================
  # STEP 5 — rule.level 분포 + Top 3 rule.id + agent 분포
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION

      최근 1000 alert 의 *3 차원 분포* — rule.level histogram + Top 3 rule.id +
      agent 분포 — 모두 추출 + 학생 본인 의 정상 baseline 판정 1 문장.

      ## 💻 실행 명령

      ```bash
      # 1. rule.level histogram (0-15 분포)
      ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -r ".rule.level" | sort -n | uniq -c'

      # 2. Top 5 rule.id 빈도
      ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -r ".rule.id" | sort | uniq -c | sort -rn | head -5'

      # 3. agent.name 분포
      ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -r ".agent.name" | sort | uniq -c | sort -rn'

      # 4. 시간별 alert 갯수 (10 분 bucket)
      ssh 6v6-siem 'sudo tail -1000 /var/ossec/logs/alerts/alerts.json | jq -r ".timestamp[0:15]" | sort | uniq -c | tail -10'
      ```

      ## 📋 확인 사항

      - 명령 1: level 3 (low) 가 가장 다수 (보통 70~90%) + level 10+ (high) 가
        critical 분석 대상. level 5/7 의 medium 이 boundary.
      - 명령 2: Top rule.id — 6v6 환경 에서 보통 `86601` (Suricata generic
        alert) 또는 `19007/19008` (sshd 인증 관련) 다수.
      - 명령 3: agent 분포 — `ips` (Suricata 가 다수 발생) > `wazuh.manager`
        (bastion-lifecycle) > `web` > `fw`.
      - 명령 4: 시간별 spike 패턴 — burst 또는 idle 의 시각 분포.

      ## 💡 왜 이걸 하는가?

      SOC 의 *baseline* — 평소 의 분포 = burst / 공격 detection 의 reference.
      level 의 분포 가 매일 비슷 (70% low / 20% medium / 10% high) 면 정상. burst
      가 발생 하면 normal baseline 에서 의 deviation 으로 감지 → 트리아지 의 우선순위
      재조정.

      ## 🔍 결과 해석

      - **정상**: level 3 가 다수 + Top rule.id 가 86601 (Suricata generic)
      - **level 10+ 비율 ↑ (>20%)**: 공격 burst 또는 false-positive 증가 — 즉시 분석
      - **agent.name 이 1 컨테이너 만**: 다른 agent 의 disconnect 가능성 — STEP 2 의
        ossec.conf remote / agent_control -l 재점검
      - **시간별 spike**: 같은 시각 에 burst → 자동화 공격 가능성 (W05 의 SQLi 또는
        ssh brute force scanner)
    hint: "tail -1000 + jq + sort | uniq -c."
