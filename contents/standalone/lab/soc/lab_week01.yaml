      ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"http\" and .http.hostname==\"dvwa.6v6.lab\") | {ts: .timestamp, src: .src_ip, url: .http.url, status: .http.status}" | tail -3'

      # 3. ips eve.json 의 alert event (Suricata 의 자체 룰 매치)
      ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\")" | tail -3'
      ```

      ## 📋 확인 사항

      - 명령 1: HAProxy log 1+ 라인 — client IP = attacker (10.20.30.202), backend
        = waf (host header dvwa.6v6.lab)
      - 명령 2: 같은 transaction 의 ips http event — `{"src":"10.20.31.1",
        "url":"/?q=<script>...","status":403}` (2 NIC sniff 라 보통 2 라인)
      - 명령 3: ips 의 alert event — Suricata 자체 룰 (예: SQLi scanner / XSS 시도)

      ## 💡 왜 이걸 하는가?

      "공격 이 어디 까지 도달 했나?" 의 답. fw HAProxy log + ips eve.json 의
