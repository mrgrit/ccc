lab_id: standalone-soc-week10
title: "인시던트 대응 (1) — 웹 공격 IR (SQLi/XSS alert 시나리오) (6v6 + R/B/P)"
version: standalone-non-ai
course: soc
week: 10
description: |
  웹 공격 alert (SQLi / XSS / path traversal) 의 IR 사이클. attacker 컨테이너 에서 의도적 페이로드 발생 → siem 의 alert → 학생 의 분석/대응.
difficulty: medium
duration_minutes: 120
prerequisites: ["W09 의 IR 6 단계"]
objectives:
  - "Red 페이로드 시뮬 (SQLi/XSS 1 회) → web access.log + ModSec audit"
  - "Wazuh dashboard 에서 alert 식별"
  - "분석 + 의도/영향 판정"
  - "대응 권고 + Purple 보강"
pass_threshold: 0.6
steps:
  - order: 1
    instruction: "## 🎯 MISSION — Red 페이로드 1 회\n**무엇을:** attacker 에서 SQLi `' OR 1=1--` 1 회 보내 alert 발생 유도."
    hint: "curl http://juice.6v6.lab/rest/products/search?q=%27"
    category: ir_web
    points: 8
    answer: "🤖 가이드:\nssh 6v6-attacker 'curl -s \"http://juice.6v6.lab/rest/products/search?q=%27%20OR%201=1--\" | head -c 100'"
    answer_detail: "ModSec 의 CRS 942100 trigger."
    verify:
      intent: "payload 1 회"
      success_criteria: ["1 회 실행", "응답 인용"]
      acceptable_methods: ["curl"]
      negative_signs: ["실행 안 함"]
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: "## 🎯 MISSION — Wazuh 의 alert 추출\n**무엇을:** 최근 5 분 의 alert 중 SQLi 관련 추출."
    hint: "grep modsec_audit 또는 942 alerts.json."
    category: ir_web
    points: 10
    answer: |
      🤖 가이드:
      ssh 6v6-siem 'sudo tail -100 /var/ossec/logs/alerts/alerts.json | grep -E "942|SQL" | tail -3'
    answer_detail: "ModSec → Wazuh decoder modsec → rule 100200+ 매핑."
    verify:
      intent: "alert 추출"
      success_criteria: ["alert 1+"]
      acceptable_methods: ["grep / jq"]
      negative_signs: ["없음"]
    target_vm: siem
    risk_level: low

  - order: 3
    instruction: "## 🎯 MISSION — 영향 판정 + 대응 권고\n**무엇을:** alert 의 *영향* (data 노출 여부 / 인증 우회 여부) 분석 + 대응 권고 2 줄."
    hint: "응답 body 의 data 배열 size 비교 (정상 vs payload)."
    category: ir_web
    points: 10
    answer: "🤖 가이드: 학생 분석."
    answer_detail: "ModSec 차단 = level 7+ alert. 학생 의 정성적 분석."
    verify:
      intent: "영향 + 권고"
      success_criteria: ["영향 분석", "권고 2 줄"]
      acceptable_methods: ["markdown"]
      negative_signs: ["권고 누락"]
    target_vm: bastion
    risk_level: low

  - order: 4
    instruction: "## 🎯 MISSION — Purple 보강 — ModSec custom rule 권고 + cleanup"
    hint: "SecRule + chain 의 추가 패턴."
    category: documentation
    points: 8
    answer: "🤖 가이드: SecRule \"@rx (?i)or\\s+1=1\" \"id:9999001,phase:2,deny\"."
    answer_detail: "Purple = Red 가 우회한 패턴 의 룰 보강."
    verify:
      intent: "Purple 룰 권고"
      success_criteria: ["SecRule 또는 SIGMA 1 개"]
      acceptable_methods: ["markdown"]
      negative_signs: ["보강 없음"]
    target_vm: bastion
    risk_level: low
