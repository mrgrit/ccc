lab_id: standalone-soc-week15
title: 기말 — 종합 인시던트 대응 훈련 (multi-stage APT 시나리오) + R/B/P 종합
version: standalone-non-ai
course: soc
week: 15
description: |
  기말 — W01~W14 의 모든 역량 통합. 가공 APT 시나리오 (recon → ssh brute → web
  exploit → 내부 이동 → data exfil) 의 full IR cycle. 4 도구 추적 + ATT&CK kill
  chain + SIGMA + IR 6단계 + CTI sharing + 자동화 + R/B/P 회고 의 종합 평가.
difficulty: hard
duration_minutes: 240
audience: 보안관제 기말 (15주차)
prerequisites: ["W01~W14 모두 통과"]
objectives:
  - "multi-stage APT 시나리오 발생 (5 stage) + 4 도구 추적"
  - "ATT&CK kill chain 매핑 (5+ Technique)"
  - "IR 6 단계 적용 + Containment"
  - "CTI IoC sharing (STIX)"
  - "통합 보고서 + R/B/P 종합 회고"
pass_threshold: 0.75
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION (Red Team — APT 시나리오)
      multi-stage APT 5 stage 발생.
      ## 💻 실행 명령
      ```bash
      ssh 6v6-attacker 'echo "S1 recon"; nmap -sV -p 80,443 -Pn 10.20.30.1 2>&1 | grep open | head -2
      echo "S2 brute"; for i in $(seq 8); do sshpass -p "a$i" ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no bad@10.20.32.100 echo 2>&1 | tail -1 | head -1; done
      echo "S3 web exploit"; curl -s -o /dev/null -w "%{http_code}\n" -A sqlmap -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?id=1+UNION+SELECT"
      echo "S4 C2 sim"; curl -s -o /dev/null -w "%{http_code}\n" -H "Host: malware-c2.example.com" "http://10.20.30.1/" --max-time 3
      echo "S5 exfil sim"; curl -s -o /dev/null -w "%{http_code}\n" "http://10.20.30.1/" --max-time 3'
      ATTACK_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
      ```
      ## 📋 확인 사항
      - 5 stage 모두 + ATTACK_TS
      ## 💡 왜?
      APT = Advanced Persistent Threat 의 multi-stage. kill chain 의 전 단계. 기말
      의 종합 시나리오.
      ## 🔍 결과 해석
      - 5 stage 흔적 → 종합 분석
    hint: "nmap+sshpass+curl 5 stage."
    category: redteam
    points: 12
    answer: |
      ssh 6v6-attacker 'echo "S1"; nmap -sV -p 80 -Pn 10.20.30.1 2>&1 | grep open | head -1
      echo "S2"; for i in $(seq 8); do sshpass -p "a$i" ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no bad@10.20.32.100 echo 2>&1 | tail -1; done | tail -1
      echo "S3"; curl -s -o /dev/null -w "%{http_code}\n" -A sqlmap -H "Host: dvwa.6v6.lab" "http://10.20.30.1/?id=1+UNION+SELECT"
      echo "S4"; curl -s -o /dev/null -w "%{http_code}\n" -H "Host: malware-c2.example.com" "http://10.20.30.1/" --max-time 3'
      ATTACK_TS=$(ssh 6v6-attacker 'date -u +%Y-%m-%dT%H:%M:%S'); echo "ATTACK_TS=$ATTACK_TS"
    answer_detail: "APT 5 stage: recon(T1595)→brute(T1110)→exploit(T1190)→C2(T1071)→exfil(T1041). kill chain 전 단계."
    verify:
      type: output_contains
      expect: open
      field: stdout
      semantic:
        intent: Red — APT 5 stage 시나리오.
        success_criteria: ["5 stage", "ATTACK_TS"]
        acceptable_methods:
          - |
            **[OSS] nmap+sshpass+curl 5 stage** — 표준.
              # recon/brute/exploit/C2/exfil
            예상 출력 `5 stage 흔적`.
            운영 해석: APT kill chain.
        negative_signs: ["stage 누락"]
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: |
      ## 🎯 MISSION (4 도구 종합 추적)
      5 stage 의 fw/ips/web/siem 4 도구 흔적 종합.
      ## 💻 실행 명령
      ```bash
      echo "=== ips alert (recon/web) ==="; ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\") | .alert.signature" | tail -3'
      echo "=== siem sshd (brute) ==="; ssh 6v6-siem 'sudo tail -200 /var/ossec/logs/alerts/alerts.json | jq -c "select(.rule.id | test(\"^57\")) | {rule: .rule.id, src: .data.srcip}" | tail -3'
      echo "=== web ModSec (exploit) ==="; ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq ".response.status" 2>/dev/null'
      echo "=== siem 통합 ==="; ssh 6v6-siem 'sudo tail -10 /var/ossec/logs/alerts/alerts.json | jq -c "{ts: .timestamp[11:19], rule: .rule.id, agent: .agent.name}"'
      ```
      ## 📋 확인 사항
      - 4 도구 모두 흔적
      ## 💡 왜?
      종합 추적 = 전체 visibility. APT 의 각 stage 가 다른 도구.
      ## 🔍 결과 해석
      - 4 도구 → full chain
    hint: "4 도구 종합."
    category: blueteam
    points: 15
    answer: |
      echo "=== ips ==="; ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\") | .alert.signature" | tail -3'
      echo "=== siem sshd ==="; ssh 6v6-siem 'sudo tail -200 /var/ossec/logs/alerts/alerts.json | jq -c "select(.rule.id | test(\"^57\")) | {rule: .rule.id, src: .data.srcip}" | tail -3'
      echo "=== web ==="; ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq ".response.status" 2>/dev/null'
      echo "=== siem 통합 ==="; ssh 6v6-siem 'sudo tail -10 /var/ossec/logs/alerts/alerts.json | jq -c "{ts: .timestamp[11:19], rule: .rule.id, agent: .agent.name}"'
    answer_detail: "4 도구 종합 = W01-W03 의 로그 분석 통합. APT 의 각 stage 추적."
    verify:
      type: output_contains
      expect: rule
      field: stdout
      semantic:
        intent: 4 도구 종합 추적.
        success_criteria: ["4 도구 흔적"]
        acceptable_methods:
          - |
            **[OSS] 4 도구 jq** — 표준.
              # ips/siem/web 각 추적
            예상 출력 `각 도구 흔적`.
            운영 해석: full chain.
        negative_signs: ["도구 누락"]
    target_vm: bastion
    risk_level: low

  - order: 3
