      ```markdown
      | stage | Tactic | Technique |
      | recon | Reconnaissance | T1595 |
      | brute | Credential Access | T1110 |
      | exploit | Initial Access | T1190 |
      | C2 | Command and Control | T1071 |
      | exfil | Exfiltration | T1041 |
      ```
      + Navigator layer JSON (5 technique)
      ## 📋 채점
      - 5 stage kill chain + Navigator
    hint: "5 stage Tactic/Technique + Navigator."
    category: attack
    points: 15
    answer: |
      cat <<'EOF'
      | stage | Tactic | Technique |
