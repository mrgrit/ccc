  - order: 4
    instruction: |
      ## 🎯 MISSION (IR 6단계 + SIGMA + CTI)
      APT 의 IR 6 단계 적용 + SIGMA 룰 1+ + IoC STIX export.
      ## 💻 산출물
      ```markdown
