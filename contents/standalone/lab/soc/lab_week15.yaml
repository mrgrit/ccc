      Preparation / Identification (4도구) / Containment (fw+AR) /
      Eradication / Recovery / Lessons
      ## SIGMA 룰 (1+)
      <APT stage 탐지 룰>
      ## STIX IoC
      {"type":"indicator","pattern":"[domain-name:value = 'malware-c2.example.com']",...}
      ```
      ## 📋 채점
      - IR 6단계 + SIGMA + STIX
    hint: "IR 6단계 + SIGMA + STIX 통합."
    category: ir_capstone
    points: 20
    answer: |
      cat <<'EOF'
      ## IR 6단계
      Prep / Identify (4도구) / Contain (fw+AR) / Eradicate / Recover / Lessons
      ## SIGMA
      title: APT C2 Beacon
      detection: {selection: 'malware-c2.example.com', condition: selection}
      tags: [attack.t1071]
      ## STIX
      {"type":"indicator","pattern":"[domain-name:value = 'malware-c2.example.com']","labels":["malicious-activity"]}
      EOF
