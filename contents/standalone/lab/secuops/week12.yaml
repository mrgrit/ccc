        - srcip = 10.20.30.202 — CDB list 에 없음 (정상)
      → 룰 100101 (dstip 매치) — <list field="dstip">
        - dstip = 192.168.99.99 — CDB list 에 있음! (apt28-c2 label)
      → level 10 (critical) alert 발생

      [Purple]
      - dashboard 의 MITRE panel — T1071 (Application Layer Protocol) 매핑
      - OpenCTI 의 indicator 페이지 — 192.168.99.99 의 context (APT28 / Emotet)
      - Active Response — attacker IP 자동 차단
      EOF
      ```

