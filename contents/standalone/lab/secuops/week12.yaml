  - order: 5
    instruction: |
      ## 🎯 MISSION — Stream Connector 설계 (OpenCTI → CDB list 자동 sync)

      ## 💻 산출물

      ```python
      # OpenCTI Stream Connector (시뮬, Python)
      import requests, time
      from pycti import OpenCTIConnectorHelper

      def main():
          helper = OpenCTIConnectorHelper(config)
          while True:
              # OpenCTI 의 indicator (Type IPv4) 모두 추출
              indicators = helper.api.indicator.list(
                  filters=[{"key": "indicator_types", "values": ["malicious-activity"]}]
              )

              # CDB list 형식으로 변환
              lines = []
              for ind in indicators:
                  if "ipv4-addr:value" in ind["pattern"]:
                      ip = ind["pattern"].split("'")[1]
                      labels = ",".join(ind.get("labels", []))
                      lines.append(f"{ip}: {labels}")

              # /var/ossec/etc/lists/known-malicious-ips 갱신
              with open("/var/ossec/etc/lists/known-malicious-ips", "w") as f:
                  f.write("\n".join(lines))

              # Wazuh 측 — list compile + reload
              os.system("sudo /var/ossec/bin/ossec-makelists")
              os.system("sudo /var/ossec/bin/wazuh-control reload")

              time.sleep(1800)   # 30분
      ```

      ## 📋 확인 사항

      - Python Connector 골격
      - OpenCTI API 사용 (pycti SDK)
      - CDB list 갱신 + 컴파일 + reload
      - 30분 polling

      ## 💡 왜 이걸 하는가?

      자동 sync 의 표준 패턴 — 30분 마다 OpenCTI 의 indicator → CDB list 갱신.
    hint: 'Python pycti + indicator list + CDB 갱신 + reload'
    category: integration
    points: 15
    answer: |
      cat <<'EOF'
      # OpenCTI Stream Connector
      import pycti, time, os
      helper = pycti.OpenCTIConnectorHelper(config)
      while True:
          indicators = helper.api.indicator.list(filters=[{"key":"indicator_types","values":["malicious-activity"]}])
          lines = []
          for ind in indicators:
              if "ipv4-addr:value" in ind["pattern"]:
                  ip = ind["pattern"].split("'")[1]
                  labels = ",".join(ind.get("labels", []))
                  lines.append(f"{ip}: {labels}")
          open("/var/ossec/etc/lists/known-malicious-ips","w").write("\n".join(lines))
          os.system("sudo /var/ossec/bin/ossec-makelists; sudo /var/ossec/bin/wazuh-control reload")
          time.sleep(1800)
      EOF
    answer_detail: 'Stream Connector Python — OpenCTI → CDB list 30분 sync'
