      EOF"'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/admin/dashboard'
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/ADMIN/dashboard'
      sleep 4
      ssh 6v6-ips 'sudo grep "9005002" /var/log/suricata/eve.json | wc -l'
    answer_detail: fast_pattern 으로 prefilter + depth 6 으로 path 시작 부분만 + nocase 로 대소문자 무관.
    verify:
      type: output_contains
      expect: '9005002'
      field: stdout
      semantic:
