  - order: 2
    instruction: |
      ## 🎯 MISSION

      **fast_pattern + nocase + depth** modifier 결합 룰 — `/admin` path 매칭의
      매칭 성능 최적화.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-ips 'sudo bash -c "cat >> /etc/suricata/rules/local.rules << EOF
      alert http any any -> any any (msg:\"6v6 admin path access\"; http.uri; content:\"/admin\"; fast_pattern; depth:6; nocase; classtype:web-application-attack; sid:9005002; rev:1;)
      EOF"'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/admin/dashboard'
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/ADMIN/dashboard'
      sleep 4
      ssh 6v6-ips 'sudo grep "9005002" /var/log/suricata/eve.json | wc -l'
      ```

      ## 📋 확인 사항

      - 2 curl 모두 alert 발생 (nocase 효과 — /admin 과 /ADMIN 모두 매치)
      - 9005002 alert 카운트 2+ (두 NIC sniff 라 더 많을 수 있음)

      ## 💡 왜 이걸 하는가?

      - `fast_pattern` : multi-pattern matcher (hyperscan) 의 prefilter 패턴 — 룰 매칭
        속도 10x 빨라짐
      - `depth:6` : 검사 범위 제한 (path 첫 6 byte 만) — false-positive 감소
      - `nocase` : 대소문자 무관

      ## 🔍 결과 해석

      - **정상**: 2 URI 모두 매치 → alert 2+
      - **비정상**: 대문자 ADMIN 미매치 → nocase 누락
    hint: fast_pattern + depth + nocase
    category: manipulation
    points: 15
    answer: |
      ssh 6v6-ips 'sudo bash -c "cat >> /etc/suricata/rules/local.rules << EOF
