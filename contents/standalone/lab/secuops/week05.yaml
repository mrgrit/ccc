  - order: 3
    instruction: |
      ## 🎯 MISSION (다단계 공격 추적)

      **flowbits** 로 conn 의 단계 추적 — Step1 (401 응답 받음) → Step2 (같은 conn 에서
      /admin 접근) 시 alert.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-ips 'sudo bash -c "cat >> /etc/suricata/rules/local.rules << EOF
      alert http any any -> any any (msg:\"6v6 step1 401 fail\"; http.stat_code; content:\"401\"; flowbits:set,fail401; flowbits:noalert; sid:9005010; rev:1;)
      alert http any any -> any any (msg:\"6v6 step2 admin after 401\"; http.uri; content:\"/admin\"; flowbits:isset,fail401; classtype:attempted-admin; sid:9005011; rev:1;)
      EOF"'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2

      # Red 다단계 시뮬 — 401 → /admin (같은 conn)
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" -u baduser:badpass "http://10.20.30.1/api/login"; curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/admin"'
      sleep 4
      ssh 6v6-ips 'sudo grep "9005011" /var/log/suricata/eve.json | tail -1 | jq .alert'
      ```

      ## 📋 확인 사항

      - flowbits:set,fail401 = 첫 단계 (401 응답 받음) flag set
      - flowbits:isset,fail401 = 두 번째 단계 (admin 접근) 시 flag 확인 → alert
      - 9005011 alert 발생 (다단계 매치 시)

      ## 💡 왜 이걸 하는가?

      단일 룰로 잡기 어려운 **다단계 공격** (정찰 → 인증 시도 → admin 접근) 탐지의
      표준. APT kill chain 탐지에 핵심.

      ## 🔍 결과 해석

      - **정상**: 9005011 alert (다단계 매치)
      - **flowbits 한계**: 같은 conn 의 flow_id 안에서만 동작 — 다른 conn 으로 분리 시
        매치 안 됨
    hint: flowbits set/isset
    category: manipulation
    points: 15
    answer: |
      ssh 6v6-ips 'sudo bash -c "cat >> /etc/suricata/rules/local.rules << EOF
      alert http any any -> any any (msg:\"6v6 step1 401 fail\"; http.stat_code; content:\"401\"; flowbits:set,fail401; flowbits:noalert; sid:9005010; rev:1;)
      alert http any any -> any any (msg:\"6v6 step2 admin after 401\"; http.uri; content:\"/admin\"; flowbits:isset,fail401; classtype:attempted-admin; sid:9005011; rev:1;)
      EOF"'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" -u baduser:badpass "http://10.20.30.1/api/login"; curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/admin"'
      sleep 4
      ssh 6v6-ips 'sudo grep "9005011" /var/log/suricata/eve.json | tail -1'
    answer_detail: flowbits:set,fail401 + noalert (1단계 silent) → isset,fail401 (2단계 alert)
    verify:
      type: output_contains
      expect: '9005011'
      field: stdout
      semantic:
        intent: "flowbits 다단계 추적"
        success_criteria: ["9005011 alert", "flowbits 동작"]
        acceptable_methods:
          - "**[OSS] flowbits:set,<name>** — flag 켜기"
          - "**[OSS] flowbits:noalert** — 1단계 silent (상태만)"
          - "**[OSS] flowbits:isset,<name>** — flag 가 set 됐을 때만 매치"
          - "**[OSS] flowbits:unset,<name>** — flag 끄기"
          - "**[OSS] flowbits:toggle,<name>** — flag 토글"
          - "**[OSS] flowint (정수 카운터)** — 같은 conn 의 카운트"
          - "**[OSS] xbits** — host 별 stateful (서로 다른 conn 간 공유)"
          - "**[OSS] flow:to_server / to_client / established** — 방향 + 상태"
    target_vm: ips

  - order: 4
    instruction: |
      ## 🎯 MISSION (rate-limit)

      **threshold** 룰로 alert flood 차단 — 30초에 5건 이상 SSH SYN 시도 시 1 alert
      만 발생 (count + rate-limit).

      ## 💻 실행 명령

      ```bash
      ssh 6v6-ips 'sudo bash -c "cat >> /etc/suricata/rules/local.rules << EOF
      alert tcp any any -> any 22 (msg:\"6v6 SSH brute (rate-limited)\"; flow:to_server; threshold:type both, track by_src, count 3, seconds 30; classtype:attempted-admin; sid:9005020; rev:1;)
      EOF"'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      # Red 5 SSH connect 시도
      for i in 1 2 3 4 5; do
        ssh 6v6-attacker 'timeout 2 bash -c "</dev/tcp/10.20.32.80/22"' >/dev/null 2>&1
        sleep 1
      done
      sleep 4
      ssh 6v6-ips 'sudo grep -c "9005020" /var/log/suricata/eve.json'
      ```

      ## 📋 확인 사항

      - 5 SSH 시도 + threshold count 3 + seconds 30 + type both → alert 1 (또는 2 — 두 NIC 매치)
      - count 3 도달 시점에 alert 1 회 발생 + 30초 동안 추가 시도는 suppress

      ## 💡 왜 이걸 하는가?

      alert flood 방지 — SOC 분석가가 같은 룰 1000개 alert 에 burn-out 되는 문제 해결.
      production 운영의 표준 (모든 high-severity 룰은 threshold 적용).

      ## 🔍 결과 해석

      - **정상**: 5 시도 → 1-2 alert (rate-limit 효과)
      - **비정상**: 5 alert 그대로 → threshold 미동작 → syntax 점검
    hint: threshold + type both + track by_src
    category: manipulation
    points: 20
    answer: |
      ssh 6v6-ips 'sudo bash -c "cat >> /etc/suricata/rules/local.rules << EOF
      alert tcp any any -> any 22 (msg:\"6v6 SSH brute (rate-limited)\"; flow:to_server; threshold:type both, track by_src, count 3, seconds 30; classtype:attempted-admin; sid:9005020; rev:1;)
      EOF"'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      for i in 1 2 3 4 5; do
        ssh 6v6-attacker 'timeout 2 bash -c "</dev/tcp/10.20.32.80/22"' >/dev/null 2>&1
        sleep 1
      done
      sleep 4
      ssh 6v6-ips 'sudo grep -c "9005020" /var/log/suricata/eve.json'
    answer_detail: threshold type=both = count 도달 시 1 alert + rate-limit. track by_src = src IP 별.
    verify:
      type: output_contains
      expect: '0\|1\|2\|3'
      field: stdout
      semantic:
        intent: "threshold rate-limit 검증"
        success_criteria: ["alert 카운트 5 미만"]
        acceptable_methods:
          - "**[OSS] threshold type limit** — 첫 N 번만 alert (이후 suppress)"
          - "**[OSS] threshold type threshold** — N 번째에 1 alert (이전 무시)"
          - "**[OSS] threshold type both** — N 번째에 1 alert + rate-limit (limit + threshold 결합)"
          - "**[OSS] track by_src / by_dst / by_rule** — 추적 단위"
          - "**[OSS] count + seconds** — 시간 윈도우"
          - "**[OSS] threshold.config event_filter** — 전역 설정 (룰 외부)"
          - "**[OSS] threshold.config suppress** — 완전 차단"
          - "**[OSS] 운영 권장 — count 5 seconds 60 (SOC 인력 균형)**"
    target_vm: bastion

  - order: 5
    instruction: |
      ## 🎯 MISSION (R/B/P 통합)

      **Red** 가 sqlmap UA + admin path 다단계 → **Blue** 가 9005002 admin path 룰 +
      flowbits 추적 → **Purple** 가 threshold 권장 + cleanup.

      ## 💻 실행 명령

      ```bash
      # Red — 다단계 공격 (sqlmap UA 로 /admin 5회)
      ssh 6v6-attacker 'for i in 1 2 3 4 5; do
        curl -s -o /dev/null -A "sqlmap/1.5" -H "Host: juice.6v6.lab" "http://10.20.30.1/admin/page$i"
      done'
      sleep 4

      # Blue — alert 카운트 분석
      ssh 6v6-ips 'sudo grep -c "9005002" /var/log/suricata/eve.json'

      # Purple — 가장 빈번 룰 분석
      ssh 6v6-ips 'sudo tail -200 /var/log/suricata/eve.json | grep alert | jq -r .alert.signature_id 2>/dev/null | sort | uniq -c | sort -rn | head -5'

      # Cleanup
      ssh 6v6-ips 'sudo rm -f /etc/suricata/rules/local.rules'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      ```

      ## 📋 확인 사항

      - Red 5 burst 후 9005002 alert 카운트 10+ (5 × 2 NIC)
      - Purple top 5 룰 통계
      - Cleanup 후 local.rules 제거

      ## 💡 왜 이걸 하는가?

      Purple Team standard cycle — Red 공격 + Blue 탐지 + Purple flood 분석. 룰의
      false-positive vs true-positive 균형 검증.

      ## 🔍 결과 해석

      - **정상**: 9005002 10+ + top 5 통계 + cleanup 완료
      - **운영 권장**: 9005002 룰에 threshold type both count 5 seconds 60 추가 (flood 방지)
