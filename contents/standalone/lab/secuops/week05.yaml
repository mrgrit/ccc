lab_id: standalone-secuops-week05
title: Suricata 룰 작성 심화 — pcre / fast_pattern / flowbits / threshold / suppression
version: standalone-non-ai
course: secuops
week: 5
description: |
  Suricata 룰의 고급 5 기술 (pcre 정규식 / fast_pattern 매칭 최적화 / flowbits
  다단계 / threshold rate-limit / suppression 운영 튜닝) 을 단계별 실습한다.
  각 룰을 local.rules 에 작성 → -T syntax 검증 → reload → 트리거 → eve.json 의
  alert 확인 한 사이클.
difficulty: medium
duration_minutes: 180
audience: 보안 솔루션 운영 중급 (5주차)
prerequisites:
  - W04 통과 (Suricata 데몬 + local.rules + reload-rules 흐름 익힘)
  - bastion ProxyJump
  - sudo NOPASSWD on ips

objectives:
  - pcre 정규식으로 한국 주민번호 / SQL UNION 패턴 매칭
  - fast_pattern 으로 매칭 prefilter 명시
  - flowbits 로 단계별 conn 상태 추적
  - threshold 룰 + threshold.config 로 rate-limit
  - suppression 으로 false-positive 운영 튜닝

pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — pcre 정규식 룰 (RRN 패턴)
  # ============================================================
  - order: 1
    instruction: |
      한국 주민번호 패턴 (`/\d{6}-[1-4]\d{6}/`) 을 HTTP request body 에서 검출하는
      pcre 룰 작성 + 트리거 + eve.json 확인.
    hint: |
      alert http any any -> any any (msg:"RRN"; http.request_body; pcre:"/\d{6}-[1-4]\d{6}/"; sid:9000040;)
    category: manipulation
    points: 15
    answer: |
      ssh 6v6-ips 'sudo mkdir -p /etc/suricata/rules; echo "alert http any any -> any any (msg:\"6v6 RRN in POST body\"; flow:to_server; http.request_body; pcre:\"/\\d{6}-[1-4]\\d{6}/\"; classtype:policy-violation; sid:9000040; rev:1;)" | sudo tee /etc/suricata/rules/local.rules'
      ssh 6v6-ips 'sudo grep -q local.rules /etc/suricata/suricata.yaml || sudo sed -i "/rule-files:/a\\  - /etc/suricata/rules/local.rules" /etc/suricata/suricata.yaml'
      ssh 6v6-ips 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -3'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -X POST -d "name=hong&rrn=901231-1234567" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      sleep 4
      ssh 6v6-ips 'sudo tail -200 /var/log/suricata/eve.json | grep sid.:9000040 | head -1 | jq .alert'
    answer_detail: pcre 룰 작성 + 트리거 + alert event
    verify:
      type: output_contains
      expect: '9000040'
      field: stdout
      semantic:
        intent: |
          pcre 정규식으로 한국 주민번호 패턴 매칭. http.request_body 가 POST 의
          form-encoded 데이터를 검사. 가짜 RRN (901231-1234567) 매치 시 alert.
        success_criteria:
          - 룰 syntax VALID
          - reload OK
          - alert event 발생
        acceptable_methods:
          - |
            **[OSS] alert http + pcre** — 표준.
              ssh 6v6-ips 'echo "alert http any any -> any any (msg:\"RRN\"; http.request_body; pcre:\"/\\d{6}-[1-4]\\d{6}/\"; sid:9000040;)" | sudo tee /etc/suricata/rules/local.rules'
              ssh 6v6-ips 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -3'
            예상 출력 `Configuration provided was successfully loaded. Exiting.`.
            운영 해석: -T 가 syntax 검증. error 있으면 즉시 표시.
          - |
            **[OSS] reload-rules + trigger** — 적용.
              ssh 6v6-ips 'sudo suricatasc -c reload-rules'
              ssh 6v6-attacker 'curl -X POST -d "rrn=901231-1234567" -H "Host: juice.6v6.lab" http://10.20.30.1/'
              sleep 4
              ssh 6v6-ips 'sudo tail -100 /var/log/suricata/eve.json | grep sid.:9000040'
            예상 출력 `{"event_type":"alert","alert":{"sid":9000040,"signature":"6v6 RRN ..."}}`.
            운영 해석: reload 후 트리거 → alert.
          - |
            **[OSS] pcre modifier 추가** — 정밀.
              # pcre 의 modifier: i (nocase) / s (newline) / R (relative) / U (URI)
              # http.request_body 에는 U 불필요
              echo "alert http any any -> any any (msg:..; http.uri; pcre:\"/admin/i\"; sid:..;)"
              # i 로 admin / Admin / ADMIN 모두 매치
            예상 출력 `(설명)`.
            운영 해석: i modifier 가 가장 자주 사용. nocase 와 같은 효과.
          - |
            **[OSS] -T (syntax 검증) 의 활용** — 사전.
              # 룰 적용 전 항상 -T 로 검증
              ssh 6v6-ips 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | grep -iE "error|fail" | head'
              # 출력 없으면 OK
            예상 출력 `(no errors)`.
            운영 해석: production 배포 전 필수. error 있으면 reload 시 데몬이 룰 무시.
          - |
            **[OSS] 룰 매칭 카운트** — 효과.
              # 트리거 여러 번 후
              for i in 1 2 3; do ssh 6v6-attacker "curl -s -X POST -d 'rrn=901231-1234567' -H 'Host: juice.6v6.lab' http://10.20.30.1/" ; done
              sleep 3
              ssh 6v6-ips 'sudo grep -c sid.:9000040 /var/log/suricata/eve.json'
            예상 출력 `3+ (트리거 횟수와 비례)`.
            운영 해석: 룰의 매칭 정밀도 검증.
          - |
            **[OSS] pcre 성능 위험 경고** — 운영.
              # pcre 만 쓰면 모든 packet 에 정규식 평가 → 느림
              # content 로 prefilter 후 pcre 권장
              echo "alert http any any -> any any (msg:..; http.request_body; content:\"-\"; pcre:\"/\\\\d{6}-[1-4]\\\\d{6}/\"; sid:..;)"
            예상 출력 `(설명)`.
            운영 해석: content prefilter 가 fast_pattern 자동 적용. CPU 절감.
          - |
            **[OSS] eve.json 의 packet 필드 분석** — 디버그.
              # alert event 의 packet base64 디코드
              ssh 6v6-ips 'sudo grep -m1 sid.:9000040 /var/log/suricata/eve.json | jq -r .payload_printable 2>/dev/null' || true
              # 또는 payload (base64)
            예상 출력 `name=hong&rrn=901231-1234567` (printable 활성 시).
            운영 해석: alert 의 payload 가 정확히 매치된 데이터.
          - |
            **[OSS] regex101 같은 외부 도구 활용** — 학습.
              # pcre 정규식 테스트 도구
              # https://regex101.com/?flavor=pcre
              echo "regex101 또는 https://regexr.com 으로 pcre 사전 테스트"
            예상 출력 `(링크)`.
            운영 해석: 운영자가 룰 작성 전 정규식 검증.
        negative_signs:
          - sid 9000040 alert 없음
          - -T syntax error
    target_vm: ips

  # ============================================================
  # STEP 2 — fast_pattern 명시 + nocase
  # ============================================================
  - order: 2
    instruction: |
      User-Agent 가 sqlmap 인 모든 HTTP 요청에 alert. fast_pattern + nocase 결합으로
      대소문자 무관 + 빠른 prefilter.
    hint: |
      alert http any any -> any any (msg:"sqlmap"; http.user_agent; content:"sqlmap"; fast_pattern; nocase; sid:9000042;)
    category: manipulation
    points: 10
    answer: |
      ssh 6v6-ips 'echo "alert http any any -> any any (msg:\"sqlmap UA\"; http.user_agent; content:\"sqlmap\"; fast_pattern; nocase; classtype:web-application-attack; sid:9000042; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -o /dev/null -A "SqlMap/1.5" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      sleep 4
      ssh 6v6-ips 'sudo grep sid.:9000042 /var/log/suricata/eve.json | head -1 | jq .alert'
    answer_detail: sqlmap UA 매칭 + alert
    verify:
      type: output_contains
      expect: '9000042'
      field: stdout
      semantic:
        intent: |
          fast_pattern 이 multi-pattern matcher 의 prefilter 패턴으로 명시. nocase
          modifier 로 대소문자 무관 (SqlMap / SQLMAP 모두 매치).
        success_criteria:
          - sid 9000042 alert
          - nocase 효과 (대소문자)
        acceptable_methods:
          - |
            **[OSS] fast_pattern 명시** — 표준.
              # content 직후 fast_pattern 표시
              echo "content:\"sqlmap\"; fast_pattern; nocase;"
            예상 출력 `(설명)`.
            운영 해석: 룰의 가장 distinctive content 를 fast_pattern 으로. 자동 선택은
            가장 긴 content.
          - |
            **[OSS] nocase 효과 검증** — 대소문자.
              # 트리거: SqlMap (대문자 혼합)
              ssh 6v6-attacker 'curl -A "SqlMap" -H "Host: juice.6v6.lab" http://10.20.30.1/ -s -o /dev/null'
              sleep 3
              ssh 6v6-ips 'sudo grep sid.:9000042 /var/log/suricata/eve.json | wc -l'
            예상 출력 `1+ (대문자 매치 정상)`.
            운영 해석: nocase 없으면 lowercase 만 매치.
          - |
            **[OSS] fast_pattern 자동 선택 확인** — 분석.
              # ruleset-stats 또는 dump-fp
              # ssh 6v6-ips 'sudo suricatasc -c dump-fp 2>&1 | head'
              echo "suricata 6.x 는 dump-fp 명령 미지원"
            예상 출력 `(설명)`.
            운영 해석: 룰의 fast_pattern 명시 여부는 yaml 의 mpm-algo 와 결합.
          - |
            **[OSS] hyperscan vs ac (multi-pattern matcher 선택)** — 성능.
              ssh 6v6-ips 'sudo grep -E "mpm-algo" /etc/suricata/suricata.yaml'
              # auto / ac / hyperscan / ac-bs / ac-ks
            예상 출력 `mpm-algo: auto`.
            운영 해석: auto = hyperscan 우선 (Intel CPU). ARM 은 ac (Aho-Corasick).
          - |
            **[OSS] 다중 content + fast_pattern 1개** — 정밀.
              echo "alert http any any -> any any (msg:..; http.uri; content:\"/admin/\"; fast_pattern; content:\"backup\"; sid:..;)"
              # 첫 content 가 prefilter, 두 번째는 strict 매칭
            예상 출력 `(설명)`.
            운영 해석: 단일 fast_pattern + 여러 strict content.
          - |
            **[OSS] fast_pattern only (대용량)** — 효율.
              # content 가 매우 자주 나오는 단어이면 비효율
              # fast_pattern:only 로 multi-pattern matcher 전용
              echo "alert ... content:\"GET\"; fast_pattern:only; ..."
            예상 출력 `(설명)`.
            운영 해석: only 모드는 detection engine 우회 → 신중히.
          - |
            **[OSS] content modifier 결합** — 정밀.
              echo "content:\"sqlmap\"; fast_pattern; nocase; depth:30;"
              # 처음 30 byte 안에서만 매치
            예상 출력 `(설명)`.
            운영 해석: depth/offset 으로 매칭 범위 제한. CPU 절감.
          - |
            **[OSS] alert 카운트 통계** — 검증.
              for ua in "sqlmap/1.5" "SqlMap" "SQLMAP" "sqlmap" ; do
                ssh 6v6-attacker "curl -s -o /dev/null -A '$ua' -H 'Host: juice.6v6.lab' http://10.20.30.1/"
              done
              sleep 3
              ssh 6v6-ips 'sudo grep -c sid.:9000042 /var/log/suricata/eve.json'
            예상 출력 `4+ (대소문자 4건 모두 매치)`.
            운영 해석: nocase + fast_pattern 정확성.
        negative_signs:
          - sid 9000042 alert 없음
          - 대소문자 매치 실패
    target_vm: ips

  # ============================================================
  # STEP 3 — http.uri + depth + nocase
  # ============================================================
  - order: 3
    instruction: |
      /admin 으로 시작하는 URI (depth 6 byte 안에서만) 매칭. depth modifier 로 path
      시작 부분만 검사 → false-positive 감소.
    hint: |
      alert http any any -> any any (msg:"admin path"; http.uri; content:"/admin"; depth:6; nocase; sid:9000041;)
    category: manipulation
    points: 10
    answer: |
      ssh 6v6-ips 'echo "alert http any any -> any any (msg:\"6v6 admin path access\"; http.uri; content:\"/admin\"; depth:6; nocase; classtype:web-application-attack; sid:9000041; rev:1;)" | sudo tee -a /etc/suricata/rules/local.rules'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/admin/dashboard'
      sleep 4
      ssh 6v6-ips 'sudo grep sid.:9000041 /var/log/suricata/eve.json | head -1 | jq .alert'
    answer_detail: /admin URI 매칭 alert
    verify:
      type: output_contains
      expect: '9000041'
      field: stdout
      semantic:
        intent: |
          http.uri buffer 의 처음 6 byte 안에서 /admin 매칭. depth 로 path 시작 부분만
          검사 → /something/admin 같은 우연한 매칭 회피.
        success_criteria:
          - sid 9000041 alert
          - depth 효과 검증
        acceptable_methods:
          - |
            **[OSS] http.uri + depth** — 표준.
              # /admin* path 만 매치
              echo "alert ... http.uri; content:\"/admin\"; depth:6;"
            예상 출력 `(설명)`.
            운영 해석: /api/admin 같은 후행 매치 회피.
          - |
            **[OSS] depth vs offset 비교** — modifier.
              # depth:6 → 처음 6 byte 안
              # offset:5 → 5 byte 부터 시작
              # 둘 다 결합 가능
              echo "content:\"/admin\"; offset:0; depth:6;"
            예상 출력 `(설명)`.
            운영 해석: 정밀 매칭 범위.
          - |
            **[OSS] depth + nocase 결합** — 대소문자.
              # depth 가 적용된 nocase 매칭
              echo "content:\"/admin\"; depth:6; nocase;"
              # 트리거: /ADMIN / /Admin / /admin 모두 매치
            예상 출력 `(설명)`.
            운영 해석: 대소문자 무관 path 매칭.
          - |
            **[OSS] http.uri 의 raw vs normalized** — buffer.
              # http.uri 는 normalized URI
              # http.uri.raw 는 원본 (URL encoding 보존)
              echo "alert http any any -> any any (msg:..; http.uri.raw; content:\"%2Fadmin\"; ...)"
            예상 출력 `(설명)`.
            운영 해석: URL encoding 회피 공격 탐지에 http.uri.raw.
          - |
            **[OSS] startswith / endswith (Suricata 7.x)** — 신규.
              # 6.0.4 에서는 startswith 미지원
              # 7.x: content:"/admin"; startswith;
              # 6.x 대안: depth:N 으로 시작 매칭
              echo "Suricata 7.x: content:\"/admin\"; startswith;"
            예상 출력 `(설명)`.
            운영 해석: 7.x 업그레이드 권장 이유 (startswith / endswith / bsize 등).
          - |
            **[OSS] alert 의 http.url 확인** — context.
              ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/admin/secret'
              sleep 3
              ssh 6v6-ips 'sudo grep sid.:9000041 /var/log/suricata/eve.json | head -1 | jq .http.url'
            예상 출력 `/admin/secret`.
            운영 해석: alert 의 http context 가 정확한 URL.
          - |
            **[OSS] 정상 트래픽 비교 (negative test)** — false-positive 확인.
              # /api/admin 처럼 후행에 admin 이 있는 path 트리거
              ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/api/admin'
              sleep 3
              ssh 6v6-ips 'sudo grep -c "url.:.\"/api/admin" /var/log/suricata/eve.json'
              # depth:6 룰이 매치 안 함 (/admin 가 path 시작 아님)
            예상 출력 `0 또는 적음`.
            운영 해석: depth 가 false-positive 차단.
          - |
            **[OSS] 룰 분리 (raw vs normalized)** — 정밀.
              # /admin 의 다양한 표현 모두 잡으려면 두 룰
              echo "alert ... http.uri; content:\"/admin\"; depth:6; sid:9000041a;"
              echo "alert ... http.uri.raw; content:\"%2Fadmin\"; depth:8; sid:9000041b;"
            예상 출력 `(설명)`.
            운영 해석: 같은 의미의 다른 표현은 별 룰로.
        negative_signs:
          - sid 9000041 alert 없음
    target_vm: ips

  # ============================================================
  # STEP 4 — flowbits 다단계 (login 실패 → admin 접근)
  # ============================================================
  - order: 4
    instruction: |
      flowbits 로 conn 의 단계 추적. step1: 401 응답 받은 후 → step2: 같은 conn 에서
      /admin 접근 → alert.
    hint: |
      alert http any any -> any any (msg:"login fail"; http.stat_code; content:"401"; flowbits:set,login_failed; flowbits:noalert; sid:9000050;)
      alert http any any -> any any (msg:"unauth admin"; http.uri; content:"/admin"; flowbits:isset,login_failed; sid:9000051;)
    category: manipulation
    points: 15
    answer: |
      ssh 6v6-ips 'cat >> /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:"6v6 step1 login fail"; http.stat_code; content:"401"; flowbits:set,login_failed; flowbits:noalert; sid:9000050; rev:1;)
      alert http any any -> any any (msg:"6v6 step2 unauth admin after fail"; http.uri; content:"/admin"; flowbits:isset,login_failed; classtype:attempted-admin; sid:9000051; rev:1;)
      EOF
      '
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" -H "Authorization: Bearer bad" http://10.20.30.1/api/login; curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/admin/secret'
      sleep 4
      ssh 6v6-ips 'sudo grep sid.:9000051 /var/log/suricata/eve.json | head -1 | jq .alert'
    answer_detail: 2 단계 룰 + alert sid 9000051 (step2)
    verify:
      type: output_contains
      expect: '9000051'
      field: stdout
      semantic:
        intent: |
          flowbits 변수로 conn 의 stateful 추적. step1 (401) 이 매치되면 login_failed
          set, step2 (admin 접근) 가 같은 conn 에서 발생 시 alert. 단일 패턴으론
          어려운 multi-step 공격 탐지.
        success_criteria:
          - 2 룰 syntax VALID
          - step2 alert (9000051)
          - flowbits 효과
        acceptable_methods:
          - |
            **[OSS] flowbits:set / isset** — 표준.
              # set: flag 켜기 (alert 없음 if noalert)
              # isset: flag 가 켜졌으면 매치
              # unset: flag 끄기
              echo "flowbits:set,login_failed; / flowbits:isset,login_failed;"
            예상 출력 `(설명)`.
            운영 해석: 4 액션 (set/unset/isset/isnotset/toggle).
          - |
            **[OSS] flowbits:noalert** — 상태만.
              # set 만 하고 alert 자체는 발생 안 함
              echo "alert ... flowbits:set,login_failed; flowbits:noalert; ..."
            예상 출력 `(설명)`.
            운영 해석: alert noise 차단. step1 은 alert 안 하고 step2 만.
          - |
            **[OSS] flow:to_server / established** — direction.
              # to_server = request 만
              # established = 3-way handshake 후
              echo "flow:to_server,established;"
            예상 출력 `(설명)`.
