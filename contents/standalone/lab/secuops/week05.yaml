        success_criteria: ["9005002 alert", "대소문자 무관 매치"]
        acceptable_methods:
          - "**[OSS] fast_pattern modifier** — multi-pattern matcher prefilter"
          - "**[OSS] depth:N modifier** — 검사 범위 제한 (N byte)"
