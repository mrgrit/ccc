lab_id: standalone-secuops-week05
title: Suricata 룰 심화 — pcre / fast_pattern / flowbits / threshold / R/B/P
version: standalone-non-ai
course: secuops
week: 5
description: |
  Suricata 룰의 고급 5 기술 — pcre (정규식) + fast_pattern (매칭 성능) + flowbits
  (다단계 추적) + threshold (rate-limit) + suppression (운영 튜닝). Red 가 다단계
  공격 → Blue 가 flowbits 로 단계 추적 → Purple 가 threshold 로 alert flood 차단.
difficulty: medium
duration_minutes: 180
prerequisites: [W04]
objectives:
  - "pcre 정규식으로 RRN / UNION SELECT 패턴 탐지"
  - "fast_pattern 명시로 매칭 성능 최적화"
  - "flowbits 로 conn 상태 추적 (다단계 공격)"
  - "threshold / suppression 운영 튜닝"
  - "R/B/P — 다단계 공격 추적 + flood 차단"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION

      **pcre 정규식 룰** — HTTP request body 에 한국 주민번호 패턴 (`\d{6}-[1-4]\d{6}`)
      매칭하는 룰 작성 + 트리거.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-ips 'sudo bash -c "echo \"alert http any any -> any any (msg:\\\"6v6 RRN in POST body\\\"; flow:to_server; http.request_body; pcre:\\\"/\\\\d{6}-[1-4]\\\\d{6}/\\\"; classtype:policy-violation; sid:9005001; rev:1;)\" > /etc/suricata/rules/local.rules"'
      ssh 6v6-ips 'sudo grep -q "local.rules" /etc/suricata/suricata.yaml || sudo sed -i "/rule-files:/a\\  - /etc/suricata/rules/local.rules" /etc/suricata/suricata.yaml'
      ssh 6v6-ips 'sudo suricata -T -S /etc/suricata/rules/local.rules 2>&1 | tail -3'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2
      ssh 6v6-attacker 'curl -s -X POST -d "name=hong&rrn=901231-1234567" -H "Host: juice.6v6.lab" http://10.20.30.1/ -o /dev/null'
      sleep 4
      ssh 6v6-ips 'sudo grep "9005001" /var/log/suricata/eve.json | tail -1 | jq .alert.signature'
      ```

      ## 📋 확인 사항

      - syntax 검증: `Configuration provided was successfully loaded. Exiting.`
      - reload-rules: `{"message":"done","return":"OK"}`
      - alert 발생: `"6v6 RRN in POST body"`

      ## 💡 왜 이걸 하는가?

      pcre 정규식은 단순 content 매칭으로 잡기 어려운 패턴 (가변 길이 / 특정 형식)
      탐지의 표준. 한국 주민번호 / 신용카드 / 이메일 같은 PII 검출에 활용.

      ## 🔍 결과 해석

      - **정상**: alert 발생 + signature 매칭
      - **비정상 1**: -T syntax error → pcre 의 `\d` escape 확인
      - **비정상 2**: alert 없음 → http.request_body 디코더 미동작 (POST body 검사 비활성)
    hint: pcre + http.request_body + RRN 패턴
