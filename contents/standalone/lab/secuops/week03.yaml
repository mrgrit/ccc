lab_id: standalone-secuops-week03
title: nftables NAT (DNAT/SNAT/MASQUERADE) + HAProxy 협업 + R/B/P 충돌 시뮬
version: standalone-non-ai
course: secuops
week: 3
description: |
  6v6-fw 의 ip six_nat table 에 DNAT/SNAT/MASQUERADE 룰을 직접 추가 + conntrack -L
  로 양방향 변환 확인 + nft monitor trace 로 packet 단위 추적 + HAProxy 와 nftables
  DNAT 가 같은 port (80) 에서 충돌하는 시나리오 시뮬 + Purple Team 의 priority 정리.
difficulty: medium
duration_minutes: 180
prerequisites:
  - "W02 통과 — nftables 기초 + handle/counter 익숙"
  - "bastion ProxyJump + sudo NOPASSWD"
objectives:
  - "nftables NAT 3 종 (SNAT/DNAT/MASQUERADE) 직접 작성"
  - "conntrack -L 의 orig vs reply 변환 분석"
  - "nft monitor trace 로 packet 통과 추적"
  - "Red/Blue/Purple — HAProxy + DNAT 80 포트 충돌 시뮬 + priority 정리"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      **이 실습을 왜 하는가?**
      NAT 룰 추가 전 baseline 확인. ip six_nat table 의 두 chain (prerouting -100,
      postrouting 100) 의 priority + policy.

      **이걸 하면 무엇을 알 수 있는가?**
      - nft 11+ 가 priority -100 / 100 을 `dstnat` / `srcnat` 로 표시
      - 빈 chain 위에 룰 추가 시 NAT 활성

      **결과 해석**
      두 chain header + policy accept + 룰 없음.

      **실전 활용**
      NAT 정책 변경 전 baseline 확인.
    hint: ssh 6v6-fw sudo nft list table ip six_nat
    category: survey
    points: 10
    answer: |
      ssh 6v6-fw 'sudo nft list table ip six_nat'
    answer_detail: |
      table ip six_nat { chain prerouting { type nat hook prerouting priority dstnat; policy accept; }
      chain postrouting { type nat hook postrouting priority srcnat; policy accept; } }
      priority `dstnat` / `srcnat` 은 nft 11+ 의 별칭 (각각 -100 / 100).
    verify:
      type: output_contains
      expect: six_nat
      field: stdout
      semantic:
        intent: "NAT stub table 확인"
        success_criteria: ["six_nat 키워드", "prerouting + postrouting chain"]
        acceptable_methods:
          - "**[OSS] nft list table ip six_nat** — 표준."
          - "**[OSS] nft -j list table 의 JSON 출력**"
          - "**[OSS] /etc/nftables.conf 의 six_nat 정의 (IaC)**"
          - "**[OSS] sysctl ip_forward 검증 (NAT 의 전제)**"
          - "**[OSS] conntrack 활성 확인 (lsmod | grep nf_nat)**"
          - "**[OSS] iptables-nft -t nat -L (legacy view)**"
          - "**[OSS] nftables wiki 의 NAT chapter**"
          - "**[OSS] priority 별칭 (dstnat/srcnat) vs 정수 (-100/100)**"
    target_vm: fw

  - order: 2
    instruction: |
      **이 실습을 왜 하는가?**
      port forwarding 의 표준 패턴. 외부 8888 → 내부 web 80 으로 변환.

      **결과 해석**
      curl 8888 → HTTP 200 (web 의 응답). conntrack 의 reply 의 src 변환.

      **실전 활용**
      외부 노출 서비스의 표준.

      **작업 절차**:
      ```
      ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname "eth0" tcp dport 8888 counter dnat to 10.20.32.80:80'
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 tcp dport 8888 accept'
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" http://10.20.30.1:8888/'
      ssh 6v6-fw 'sudo conntrack -L 2>/dev/null | grep dport=8888'
      ```
    hint: ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname eth0 tcp dport 8888 counter dnat to 10.20.32.80:80'
    category: manipulation
    points: 20
    answer: |
      echo "=== DNAT 룰 추가 + input 허용 ==="
      ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname "eth0" tcp dport 8888 counter dnat to 10.20.32.80:80'
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 tcp dport 8888 accept'
      echo
      echo "=== curl 8888 검증 ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "응답: %{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1:8888/'
      sleep 2
      echo
      echo "=== conntrack 의 reply 변환 ==="
      ssh 6v6-fw 'sudo conntrack -L 2>/dev/null | grep "dport=8888" | head -1'
      echo
      echo "=== nft counter 증가 ==="
      ssh 6v6-fw 'sudo nft list chain ip six_nat prerouting | grep -B1 "dport 8888"'
      echo
      echo "=== Cleanup ==="
      HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle $HANDLE"
      HANDLE2=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter input | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      ssh 6v6-fw "sudo nft delete rule inet six_filter input handle $HANDLE2"
    answer_detail: |
      DNAT 룰: `iifname "eth0" tcp dport 8888 counter dnat to 10.20.32.80:80`.
      input chain 의 8888/tcp accept (fw 자체로 들어오는 트래픽 허용 위함).
      curl 응답 200. conntrack 의 reply: `src=10.20.32.80 dst=10.20.30.202 sport=80
      dport=43544 [ASSURED]` — `src` 가 변환된 web IP. counter packets 1+ bytes 60+.
    verify:
      type: output_contains
      expect: '200'
      field: stdout
      semantic:
        intent: "DNAT 외부 8888 → web 변환 + conntrack reply 변환 가시화"
        success_criteria: ["200 응답", "conntrack reply src 변환", "counter 증가"]
        acceptable_methods:
          - "**[OSS] nft add rule ip six_nat prerouting + dnat to** — 표준."
          - "**[OSS] inet six_filter input chain 의 8888 허용 (fw 자체 input)**"
          - "**[OSS] curl 8888 → 200 검증 (web 의 응답)**"
          - "**[OSS] conntrack -L | grep dport=8888 (양방향 변환)**"
          - "**[OSS] tcpdump eth0 + eth1 (DNAT 변환 packet 캡처)**"
          - "**[OSS] nft counter packets/bytes 증가 (룰 매치 검증)**"
          - "**[OSS] iptables-nft -t nat -L PREROUTING (legacy view)**"
          - "**[OSS] handle 식별 후 정확한 delete (cleanup)**"
        negative_signs:
          - "200 아닌 응답"
          - "conntrack 변환 흔적 없음"
    cleanup: |
      ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting 2>/dev/null | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}" | xargs -I H ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle H"' 2>/dev/null
      ssh 6v6-fw 'sudo nft -a list chain inet six_filter input 2>/dev/null | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}" | xargs -I H ssh 6v6-fw "sudo nft delete rule inet six_filter input handle H"' 2>/dev/null
    target_vm: fw

  - order: 3
    instruction: |
      **이 실습을 왜 하는가?**
      MASQUERADE 는 SNAT 의 특수 형태. pipe/dmz/int subnet 의 outbound 가 fw 의
      ext NIC IP 로 자동 변환.

      **결과 해석**
      postrouting chain 에 3 룰 (3 subnet) + masquerade keyword.

      **실전 활용**
      production container 환경 (Kubernetes 등) NIC IP 동적 변경 시 정석.
    hint: ssh 6v6-fw 'sudo nft add rule ip six_nat postrouting oifname eth0 ip saddr 10.20.31.0/24 counter masquerade'
    category: manipulation
    points: 15
    answer: |
      for net in 10.20.31.0/24 10.20.32.0/24 10.20.40.0/24; do
        ssh 6v6-fw "sudo nft add rule ip six_nat postrouting oifname \"eth0\" ip saddr $net counter masquerade"
      done
      ssh 6v6-fw 'sudo nft list chain ip six_nat postrouting'
      # cleanup
      for net in 10.20.31.0/24 10.20.32.0/24 10.20.40.0/24; do
        HANDLE=$(ssh 6v6-fw "sudo nft -a list chain ip six_nat postrouting | grep \"$net\" | grep -oE \"handle [0-9]+\" | head -1 | awk \"{print \\\$2}\"")
        [ -n "$HANDLE" ] && ssh 6v6-fw "sudo nft delete rule ip six_nat postrouting handle $HANDLE"
      done
    answer_detail: |
      3 subnet 의 outbound 가 fw ext NIC 로 나갈 때 masquerade. 출력:
      `oifname "eth0" ip saddr 10.20.31.0/24 counter packets 0 bytes 0 masquerade` × 3.
      cleanup 으로 룰 제거.
    verify:
      type: output_contains
      expect: masquerade
      field: stdout
      semantic:
        intent: "MASQUERADE 룰 3 subnet 추가 + 검증"
        success_criteria: ["masquerade 키워드", "3 룰 추가"]
        acceptable_methods:
          - "**[OSS] nft add rule postrouting oifname eth0 ip saddr ... masquerade** — 표준."
          - "**[OSS] set 자료구조로 3 subnet 통합 (priv_nets set)**"
          - "**[OSS] outbound 시험 (web 컨테이너에서 외부 conn 시도)**"
          - "**[OSS] conntrack -L 의 reply 변환 (src 가 fw ext IP)**"
          - "**[OSS] iptables-nft -t nat -L POSTROUTING (legacy view)**"
          - "**[OSS] SNAT 명시 (`snat to <IP>`) vs MASQUERADE 비교**"
          - "**[OSS] Docker 의 자동 MASQUERADE 와 충돌 검토**"
          - "**[OSS] cleanup 의 handle 식별**"
    cleanup: |
      for net in 10.20.31.0/24 10.20.32.0/24 10.20.40.0/24; do
        HANDLE=$(ssh 6v6-fw "sudo nft -a list chain ip six_nat postrouting | grep \"$net\" | grep -oE \"handle [0-9]+\" | head -1 | awk \"{print \\\$2}\"" 2>/dev/null)
        [ -n "$HANDLE" ] && ssh 6v6-fw "sudo nft delete rule ip six_nat postrouting handle $HANDLE" 2>/dev/null
      done
      true
    target_vm: fw

  - order: 4
    instruction: |
      **이 실습을 왜 하는가?**
      conntrack table 이 stateful firewall + NAT 의 source of truth. orig vs reply
      6 필드 (src/dst/sport/dport × 2) 분석으로 모든 NAT 변환 검출.

      **결과 해석**
      각 row 의 양방향 변환 + ASSURED 상태 표기.

      **실전 활용**
      운영 시 NAT 효과 검증 + 의심 conn 분석.
    hint: ssh 6v6-fw sudo conntrack -L -p tcp
    category: monitoring
    points: 15
    answer: |
      ssh 6v6-fw 'sudo conntrack -L -p tcp 2>/dev/null | head -10'
      echo "--- 카운터 ---"
      ssh 6v6-fw 'sudo conntrack -S 2>/dev/null | head -3'
    answer_detail: |
      conntrack -L 의 한 row = 한 conn 의 양방향 변환. 예:
      `tcp 6 86400 ESTABLISHED src=10.20.30.202 dst=10.20.30.1 sport=43210 dport=80
      src=10.20.31.2 dst=10.20.30.202 sport=80 dport=43210 [ASSURED]`.
      orig 의 dst (10.20.30.1) 와 reply 의 src (10.20.31.2) 가 다르면 NAT 변환 (예: HAProxy
      가 backend 로 새 conn 만들 때).
    verify:
      type: output_contains
      expect: ESTABLISHED
      field: stdout
      semantic:
        intent: "conntrack 의 양방향 변환 가시화"
        success_criteria: ["ESTABLISHED 상태", "orig + reply 양방향"]
        acceptable_methods:
          - "**[OSS] conntrack -L (기본)** — 표준."
          - "**[OSS] conntrack -L -p tcp (TCP 만)**"
          - "**[OSS] conntrack -L --orig-src <IP> (특정 src)**"
          - "**[OSS] conntrack -E (실시간 event stream)**"
          - "**[OSS] conntrack -S (CPU 별 통계)**"
          - "**[OSS] /proc/net/nf_conntrack (raw view)**"
          - "**[OSS] DNAT 활성 후 reply src 변환 검증**"
          - "**[OSS] conntrack -D (특정 conn 강제 종료) — IR 대응**"
    target_vm: fw

  - order: 5
    instruction: |
      **이 실습을 왜 하는가?**
      nft monitor trace 가 packet 의 chain/rule 통과를 실시간 가시화 → 정책 디버깅
      의 황금 도구. trace 활성 룰 + 매치되는 packet 의 모든 통과 단계 출력.

      **결과 해석**
      trace event 가 packet 의 룰 통과 sequence (verdict accept/drop) 표시.

      **실전 활용**
      production 환경의 정책 디버깅. race condition + 의도되지 않은 매칭 검출.
    hint: ssh 6v6-fw sudo nft monitor trace
    category: debugging
    points: 15
    answer: |
      # trace 활성화 룰 추가
      ssh 6v6-fw 'sudo nft add rule inet six_filter input tcp dport 80 meta nftrace set 1'
      # 백그라운드로 trace 5초 대기
      (ssh 6v6-fw 'sudo timeout 5 nft monitor trace 2>&1' &) > /tmp/trace.out 2>&1
      sleep 1
      # 트래픽 발생
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/' >/dev/null
      sleep 5
      ssh 6v6-fw 'sudo timeout 3 nft monitor trace 2>&1 | head -5' &
      sleep 1
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/' >/dev/null
      wait
      # cleanup
      HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter input | grep "nftrace set 1" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$HANDLE" ] && ssh 6v6-fw "sudo nft delete rule inet six_filter input handle $HANDLE"
    answer_detail: |
      meta nftrace set 1 룰이 매치된 packet 의 trace event 를 실시간 stream.
      출력 예: `trace id <X> inet six_filter input packet: iif "eth0" ... → verdict accept`.
      운영 종료 시 룰 즉시 삭제 (trace 가 가시성 부담).
    verify:
      type: output_contains
      expect: trace
      field: stdout
      semantic:
        intent: "nft monitor trace 로 packet 통과 추적"
        success_criteria: ["trace event 1+"]
        acceptable_methods:
          - "**[OSS] meta nftrace set 1 + nft monitor trace** — 표준."
          - "**[OSS] nft -j monitor trace (JSON 자동화)**"
          - "**[OSS] tcpdump + nft trace 동시 (4 view 비교)**"
          - "**[OSS] log prefix + dmesg (대안 디버깅)**"
          - "**[OSS] nftrace set 0 (해제)**"
          - "**[OSS] specific filter — iifname / saddr 로 좁힘**"
          - "**[OSS] production 운영 — trace 는 임시만 (CPU 부담)**"
          - "**[OSS] race condition 검출 — 같은 packet 의 여러 룰 평가 순서**"
    cleanup: |
      ssh 6v6-fw 'sudo nft -a list chain inet six_filter input 2>/dev/null | grep "nftrace set 1" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}" | xargs -I H ssh 6v6-fw "sudo nft delete rule inet six_filter input handle H"' 2>/dev/null
    target_vm: fw

  - order: 6
    instruction: |
      **이 실습을 왜 하는가?**
      nftables DNAT 와 HAProxy 가 같은 port (80) 에서 동시 운영 시 충돌 시뮬레이션.
      Red/Blue/Purple 의 표준 cycle.

      **이걸 하면 무엇을 알 수 있는가?**
      - prerouting 의 DNAT 가 HAProxy 보다 항상 우선 (priority -100)
      - HAProxy log 의 흔적 부재 = host header 라우팅 우회
      - production 환경의 정책 — 한 port = 한 도구

      **결과 해석**
      DNAT 룰 적용 후 HAProxy log 에 흔적 없음 + conntrack 의 dst 가 변환된 backend.
      Cleanup 후 정상화.

      **실전 활용**
      Purple Team standard cycle. 분기별 정기 충돌 검토.
    hint: 'ssh 6v6-fw sudo nft insert rule ip six_nat prerouting position 0 iifname eth0 tcp dport 80 dnat to 10.20.32.80:80'
    category: redblue
    points: 25
    answer: |
      echo "=== Red 1차: 평상시 (HAProxy 경유) ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      sleep 1
      ssh 6v6-fw 'sudo tail -3 /var/log/haproxy.log 2>/dev/null | grep "10.20.30.202" | tail -1 | head -1'
      echo
      echo "=== Blue 1차: 충돌 DNAT 룰 추가 ==="
      ssh 6v6-fw 'sudo nft insert rule ip six_nat prerouting position 0 iifname "eth0" tcp dport 80 counter dnat to 10.20.32.80:80'
      echo
      echo "=== Red 2차: 동일 요청 → HAProxy 우회 ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      sleep 2
      echo "HAProxy log 흔적 (없으면 0):"
      ssh 6v6-fw 'sudo tail -3 /var/log/haproxy.log 2>/dev/null | grep "10.20.30.202" | wc -l'
      echo
      echo "=== Purple: priority 분석 ==="
      ssh 6v6-fw 'sudo nft list chains 2>&1 | grep -E "hook prerouting" | head -3'
      echo
      echo "=== Purple: nft counter ==="
      ssh 6v6-fw 'sudo nft list chain ip six_nat prerouting | grep -B1 "dport 80 "'
      echo
      echo "=== Cleanup: DNAT 룰 제거 + 정상화 ==="
      HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting | grep "dport 80 " | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$HANDLE" ] && ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle $HANDLE"
      ssh 6v6-attacker 'curl -s -o /dev/null -w "복귀 후: %{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
    answer_detail: |
      Red 1차: HAProxy 정상 경유 (200) + HAProxy log 1 라인.
      Blue: prerouting position 0 에 DNAT 룰 추가 (HAProxy 보다 우선).
      Red 2차: 200 (DNAT 가 직접 web 으로 → HAProxy 우회) + HAProxy log 흔적 0.
      Purple: priority 비교 (nat prerouting -100 vs HAProxy bind 80). nft counter 증가.
      Cleanup: handle 로 DNAT 룰 삭제 + curl 200 복귀.

      > 운영 위험 5:
      > 1. X-Forwarded-For 헤더 누락 → client IP 추적 불가
      > 2. host header 라우팅 우회 → wrong backend
      > 3. HAProxy log 없음 → 트러블슈팅 곤란
      > 4. HAProxy access list / rate limit 우회
      > 5. TLS termination 우회 → cert 불일치
    verify:
      type: output_contains
      expect: '200'
      field: stdout
      semantic:
        intent: "R/B/P — HAProxy + DNAT 80 포트 충돌 시뮬"
        success_criteria: ["Red 1차 200", "Blue DNAT 룰 추가", "Red 2차 200 + HAProxy 우회", "Cleanup 후 정상화"]
        acceptable_methods:
          - "**[OSS] nft insert rule prerouting position 0 + dnat to** — 표준."
          - "**[OSS] HAProxy log 흔적 비교 (있음 vs 없음)**"
          - "**[OSS] conntrack -L 의 dst 변환 가시화**"
          - "**[OSS] tcpdump eth1 (변환된 packet 캡처)**"
          - "**[OSS] HAProxy stats — backend session count 비교**"
          - "**[OSS] priority 비교 (nat -100 vs filter 0)**"
          - "**[OSS] 운영 권장 — 한 port = 한 도구**"
          - "**[OSS] Cleanup handle 식별 + 정상화 검증**"
        negative_signs:
          - "DNAT 적용 후에도 HAProxy log 있음"
          - "Cleanup 후 정상화 실패"
    cleanup: |
      ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting 2>/dev/null | grep "dport 80 " | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}" | xargs -I H ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle H"' 2>/dev/null
    target_vm: bastion

  - order: 7
    instruction: |
      6 step 결과 + R/B/P + 운영 권장 + W04 준비도 종합 보고서.
    hint: 마크다운
    category: synthesis
    points: 10
    answer: |
      cat <<'EOF'
      # 6v6 W03 nftables NAT + HAProxy 협업 보고서

      ## 1. 6 step 결과 표
      | Step | 영역 | 결과 |
