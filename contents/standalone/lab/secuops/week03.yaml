lab_id: standalone-secuops-week03
title: nftables NAT (DNAT/SNAT/MASQUERADE) + conntrack + Docker NAT 공존 + HAProxy 충돌 + R/B/P
version: standalone-non-ai
course: secuops
week: 3
description: |
  6v6-fw 의 `ip six_nat` table 에 DNAT/SNAT/MASQUERADE 룰을 직접 추가 + `conntrack -L`
  로 양방향 변환 가시화 + conntrack capacity 점검 + Docker `table ip nat` 와의 공존
  확인 + `nft monitor trace` 로 packet 단위 추적 + HAProxy 와 nftables DNAT 가 같은
  port (80) 에서 충돌하는 시나리오 시뮬 + Purple Team 의 priority 정리 + 운영 위험 5
  + NAT 가 방화벽이 아님을 증명하는 separation policy + 종합 보고서.
difficulty: medium
duration_minutes: 200
prerequisites:
  - "W02 통과 — nftables 기초 + handle/counter 익숙"
  - "bastion ProxyJump + sudo NOPASSWD"
  - "lecture §3-§8 (conntrack / Docker NAT / 보안 오해) 숙지"
objectives:
  - "NAT 3 종 (SNAT/DNAT/MASQUERADE) 직접 작성 + cleanup"
  - "conntrack -L 의 양방향 변환 + 5 상태 식별"
  - "conntrack capacity (max / count / 상태분포) 점검"
  - "Docker `table ip nat` 와의 공존 확인 (절대 flush 금지)"
  - "nft monitor trace 로 packet 통과 추적"
  - "HAProxy + DNAT 80 충돌 시뮬 + 운영 위험 5"
  - "NAT 가 방화벽이 아니라는 separation policy 검증"
  - "종합 보고서 작성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 6v6-fw 의 NAT table baseline 확인

      W02 의 `inet six_filter` 와 함께 정의된 `ip six_nat` table 이 학생 작업의 기반.
      두 chain (prerouting `-100` / postrouting `100`) 이 정의되어 있으나 룰 없음을
      확인하고 nft 11+ 의 priority 별칭 (`dstnat`/`srcnat`) 도 함께 본다.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-fw 'sudo nft list tables'
      ssh 6v6-fw 'sudo nft list table ip six_nat'
      ssh 6v6-fw 'sudo nft list chains 2>&1 | grep -E "hook prerouting|hook postrouting"'
      ```

      ## 📋 확인 사항 (실측 2026-05-12)

      **명령 1 — 3 table 확인**:
      ```
      table ip nat                # ← Docker daemon 이 생성 (절대 건드리지 말 것)
      table inet six_filter        # ← W02 의 정책
      table ip six_nat             # ← 본 주차에서 채울 NAT stub
      ```

      **명령 2 — six_nat 의 두 chain**:
      ```
      table ip six_nat {
          chain prerouting {
              type nat hook prerouting priority dstnat; policy accept;
          }
          chain postrouting {
              type nat hook postrouting priority srcnat; policy accept;
          }
      }
      ```

      **명령 3 — priority 가시화**:
      ```
      type nat hook postrouting priority srcnat   # Docker 의 POSTROUTING
      type nat hook prerouting priority dstnat    # 우리 six_nat 의 prerouting
      type nat hook postrouting priority srcnat   # 우리 six_nat 의 postrouting
      ```

      ## 💡 왜 이걸 하는가?

      NAT 정책 변경 전 baseline 확보. **Docker `table ip nat` 의 존재 인지가 핵심** —
      flush 하면 embedded DNS (127.0.0.11:53) 가 깨져 인프라 전체 장애. 학생은 본인이
      만든 `ip six_nat` 만 건드린다.

      ## 🔍 결과 해석

      - **정상**: 3 table 모두 출력 + six_nat 의 두 chain header + 룰 0
      - **비정상 1**: `six_nat` 자체 없음 → entrypoint 의 nftables.conf 적용 실패 →
        `docker logs 6v6-fw | grep nft` 로 syntax error 확인
      - **비정상 2**: Docker `ip nat` 없음 → embedded DNS 깨짐 → docker daemon 재시작
        필요
    hint: ssh 6v6-fw 'sudo nft list tables; sudo nft list table ip six_nat'
    category: survey
    points: 10
    answer: |
