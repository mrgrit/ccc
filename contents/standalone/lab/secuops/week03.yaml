    answer: |
      # 1. DNAT + input allow
      ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname "eth1" tcp dport 9999 counter dnat to 10.20.32.50:8000'
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 tcp dport 9999 accept'
      # 2. forward 의 명시적 drop (학습용 — attacker source)
      ssh 6v6-fw 'sudo nft insert rule inet six_filter forward position 0 ip saddr 10.20.30.202 ip daddr 10.20.32.50 tcp dport 8000 counter log prefix "POLICY-DENY: " drop'
      sleep 1
      # 3. attacker 시도 → timeout
      echo "응답 (000=drop):"
