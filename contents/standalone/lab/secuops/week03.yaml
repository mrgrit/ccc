  - order: 2
    instruction: |
      ## 🎯 MISSION — DNAT 외부 8888 → 내부 web(10.20.32.80:80) + conntrack 양방향 변환

      port forwarding 의 표준 패턴. 외부 8888 트래픽을 내부 web 으로 매핑하고, conntrack
      table 에서 orig dst (fw IP) 와 reply src (web IP) 가 다른 것을 통해 NAT 변환
      흔적을 식별한다. 마지막에 cleanup 까지 1 cycle.

      ## 💻 실행 명령

      ```bash
      # 1. DNAT 룰 추가 (prerouting)
      ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname "eth1" tcp dport 8888 \
          counter dnat to 10.20.32.80:80'

      # 2. fw 자체로 들어오는 8888/tcp 허용 (DNAT 평가 후 routing 결정 → input/forward 분기)
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 tcp dport 8888 accept'

      # 3. attacker 에서 fw:8888 으로 curl
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" \
          -H "Host: juice.6v6.lab" http://10.20.30.1:8888/'

      # 4. conntrack 의 양방향 변환 확인
      ssh 6v6-fw 'sudo conntrack -L 2>/dev/null | grep "dport=8888" | head -1'

      # 5. nft counter 증가 확인
      ssh 6v6-fw 'sudo nft list chain ip six_nat prerouting | grep -B1 "dport 8888"'

      # 6. Cleanup
      HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting | \
          grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$HANDLE" ] && ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle $HANDLE"

      HANDLE2=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter input | \
          grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$HANDLE2" ] && ssh 6v6-fw "sudo nft delete rule inet six_filter input handle $HANDLE2"
      ```

      ## 📋 확인 사항

      - **명령 3 응답: `200`** (web 의 응답)
      - **명령 4 출력**:
        ```
        tcp 6 119 TIME_WAIT \
            src=10.20.30.202 dst=10.20.30.1 sport=43544 dport=8888 \
            src=10.20.32.80 dst=10.20.30.202 sport=80 dport=43544 \
            [ASSURED]
        ```
        - orig dst `10.20.30.1` ≠ reply src `10.20.32.80` → **DNAT 변환 흔적**
        - orig dport `8888` ≠ reply sport `80` → **port 변환 흔적**
        - `[ASSURED]` → 양방향 모두 본 안정 conn
      - **명령 5 출력**: `counter packets 1+ bytes 60+` (룰 적중 증거)
      - **Cleanup 후**: 두 룰 모두 제거

      ## 💡 왜 이걸 하는가?

      port forwarding 의 모든 실 사용은 이 4 단계. 외부 SSH 2222 → 내부 22, 외부 HTTPS
      443 → 내부 web 443 등 production 의 표준. **반드시 cleanup 1 cycle 까지** —
      운영자가 자기 룰을 정확히 찾아 지울 수 있어야 IR 시 임시 룰 즉시 제거 가능.

      ## 🔍 결과 해석 + 트러블슈팅

      - **정상**: 응답 200 + conntrack 양방향 + counter 증가 + cleanup 후 룰 0
      - **응답 000 (timeout)**: input chain 의 8888 allow 룰 누락 → fw 가 자기 입력
        port 차단 → 명령 2 재실행
      - **응답 502/503**: web 컨테이너 다운 → `ssh 6v6-web 'systemctl status apache2'`
      - **conntrack 비어 있음**: nf_conntrack 모듈 미적재 → `lsmod | grep nf_conntrack`
      - **counter 0**: 룰이 매치 안 됨 → iifname 오타 또는 packet 이 다른 NIC 로
    hint: ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname eth1 tcp dport 8888 counter dnat to 10.20.32.80:80'
    category: manipulation
    points: 20
    answer: |
      echo "=== 1. DNAT 룰 추가 ==="
      ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname "eth1" tcp dport 8888 counter dnat to 10.20.32.80:80'
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 tcp dport 8888 accept'
      echo
      echo "=== 2. curl 검증 ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "응답: %{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1:8888/'
      sleep 2
      echo
      echo "=== 3. conntrack 양방향 변환 ==="
      ssh 6v6-fw 'sudo conntrack -L 2>/dev/null | grep "dport=8888" | head -1'
      echo
      echo "=== 4. nft counter 증가 ==="
      ssh 6v6-fw 'sudo nft list chain ip six_nat prerouting | grep -B1 "dport 8888"'
      echo
      echo "=== 5. Cleanup ==="
      HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$HANDLE" ] && ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle $HANDLE"
      HANDLE2=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter input | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$HANDLE2" ] && ssh 6v6-fw "sudo nft delete rule inet six_filter input handle $HANDLE2"
    answer_detail: |
      DNAT 룰 = iifname "eth1" tcp dport 8888 counter dnat to 10.20.32.80:80.
      input chain 의 8888 accept (fw 자체 input 허용 위함, 그러나 DNAT 가 routing 보다
      먼저 평가되므로 packet 은 forward 로 가서 input 까지 거의 안 오지만 안전 위해 추가).
      curl 응답 200. conntrack reply 의 src 가 10.20.32.80 (변환된 web IP). counter
      packets 1+ bytes 60+. cleanup 으로 두 룰 제거.
