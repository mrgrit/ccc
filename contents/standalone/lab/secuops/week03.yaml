  - order: 3
    instruction: |
      ## 🎯 MISSION — MASQUERADE 3 subnet 동시 + SNAT vs MASQUERADE 차이 검증

      pipe (10.20.31.0/24) / dmz (10.20.32.0/24) / int (10.20.40.0/24) 3 subnet 의
      outbound 가 fw 의 ext NIC IP 로 자동 변환되도록 MASQUERADE 3 룰을 동시 추가.
      `snat to <IP>` 와의 차이를 출력으로 확인.

      ## 💻 실행 명령

      ```bash
      # 3 subnet 각각 MASQUERADE
      for net in 10.20.31.0/24 10.20.32.0/24 10.20.40.0/24; do
        ssh 6v6-fw "sudo nft add rule ip six_nat postrouting oifname \"eth0\" \
            ip saddr $net counter masquerade"
      done

      # 적용 확인 (3 룰)
      ssh 6v6-fw 'sudo nft list chain ip six_nat postrouting'

      # 비교를 위해 동일 subnet 1개 SNAT 명시 (clarity)
      ssh 6v6-fw 'sudo nft add rule ip six_nat postrouting oifname "eth1" \
          ip saddr 10.20.32.50 counter snat to 10.20.30.1'

      # 출력에서 masquerade vs snat to 의 차이 확인
      ssh 6v6-fw 'sudo nft list chain ip six_nat postrouting | grep -E "masquerade|snat"'

      # Cleanup (4 룰 모두)
      for h in $(ssh 6v6-fw 'sudo nft -a list chain ip six_nat postrouting | \
          grep -E "masquerade|snat to" | grep -oE "handle [0-9]+" | awk "{print \$2}"'); do
        ssh 6v6-fw "sudo nft delete rule ip six_nat postrouting handle $h"
      done
      ```

      ## 📋 확인 사항

      - 명령 2 출력: 3 룰
        ```
        oifname "eth1" ip saddr 10.20.31.0/24 counter packets 0 bytes 0 masquerade
        oifname "eth1" ip saddr 10.20.32.0/24 counter packets 0 bytes 0 masquerade
        oifname "eth1" ip saddr 10.20.40.0/24 counter packets 0 bytes 0 masquerade
        ```
      - 명령 4 출력에서 두 형식 비교:
        ```
        masquerade                              # NIC IP 동적
        snat to 10.20.30.1                       # IP 고정
        ```
      - Cleanup 후 postrouting chain 의 sub-rule 0

      ## 💡 왜 이걸 하는가?

      production container 환경 (Kubernetes / docker swarm 등) 에서 Pod IP 는 매번 다름.
      `snat to <IP>` 는 부적합 (재시작 시 IP 변경 → 룰 깨짐). MASQUERADE 가 정석.

      ## 🔍 결과 해석 + 운영 비교

      | 항목 | masquerade | snat to 10.20.30.1 |
      |------|------------|--------------------|
      | NIC IP 결정 시점 | 매 packet (routing table 조회) | 룰 작성 시 고정 |
      | 성능 | 약간 느림 | 약간 빠름 |
      | 동적 IP 환경 | 적합 | 부적합 |
      | NIC 다중 IP | NIC 의 primary IP | 명시한 IP |
      | SNAT pool | 불가 | 가능 (`snat to 10.20.30.1-10.20.30.5`) |
    hint: ssh 6v6-fw 'sudo nft add rule ip six_nat postrouting oifname eth1 ip saddr 10.20.31.0/24 counter masquerade'
