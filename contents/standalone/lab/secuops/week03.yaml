    answer_detail: |
      3 table (ip nat / inet six_filter / ip six_nat) 표시. six_nat 의 두 chain header
      만 출력. priority 별칭 dstnat (-100) / srcnat (100) 표시. Docker `ip nat` 은 우리
      가 아닌 docker daemon 의 소유 — flush 금지.
    verify:
