          - "**[OSS] Wazuh agent 의 localfile 로 osqueryd.results.log ship (W10)**"
          - "**[OSS] sysmon-for-linux + osquery 보완 (W11)**"
          - "**[OSS] fleet 솔루션 (kolide/doorman) 대규모 운영**"
    target_vm: web

