lab_id: standalone-secuops-week07
title: osquery 호스트 가시화 (4 호스트)
version: standalone-non-ai
course: secuops
week: 7
description: |
  bastion / fw / ips / web 4 호스트의 osquery 5.x 로 OS-as-SQL 호스트 가시화
  실습. processes / users / listening_ports / file_events / suid_bin 핵심
  테이블 사용 + FIM 설정 + 헌팅 쿼리 5개.
difficulty: medium
duration_minutes: 150
audience: 보안 솔루션 운영 중급 (7주차 신규)
prerequisites:
  - bastion / fw / ips / web 에 osquery 5.x 설치 완료 (이미지 재빌드 후)
  - W01-W06 통과
objectives:
  - osqueryi 대화형 shell 사용
  - 5 핵심 테이블 (processes / users / file / listening_ports / suid_bin) 쿼리
  - file_events FIM 구성 + 변경 검출
  - 헌팅 쿼리 (on_disk=0, 의심 SUID, cron 백도어) 작성
  - 4 호스트 비교 분석
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      `6v6-web` 에서 osqueryi 대화형 진입 + version 쿼리.
    hint: ssh 6v6-web 'sudo osqueryi --json "SELECT version FROM osquery_info;"'
    category: survey
    points: 10
    answer: |
      ssh 6v6-web 'sudo osqueryi --json "SELECT version FROM osquery_info;"'
    answer_detail: osquery version 출력
    verify:
      type: output_contains
      expect: version
      field: stdout
      semantic:
        intent: |
          osqueryi 대화형 shell 진입. osquery_info 테이블에서 self version. 4 호스트
          (bastion/fw/ips/web) 모두 동작.
        success_criteria:
          - version 출력
          - 5.x 형식
        acceptable_methods:
          - |
            **[OSS] osqueryi --json** — 표준.
              ssh 6v6-web 'sudo osqueryi --json "SELECT version FROM osquery_info;"'
            예상 출력 `[ {"version":"5.x.x"} ]`.
            운영 해석: JSON 출력은 자동화 친화.
          - |
            **[OSS] osqueryctl status** — daemon.
              ssh 6v6-web 'sudo osqueryctl status 2>&1 | head' || ssh 6v6-web 'sudo systemctl status osqueryd --no-pager | head'
            예상 출력 `(daemon 상태)`.
            운영 해석: osqueryd 데몬 가동 여부.
          - |
            **[OSS] osqueryi 대화형** — interactive.
              # ssh 6v6-web 'sudo osqueryi' (interactive)
              # > .tables
              # > .schema processes
              # > SELECT * FROM kernel_info;
              echo "대화형 shell 의 .tables / .schema 명령"
            예상 출력 `(설명)`.
            운영 해석: 학습 시 표 구조 탐색.
          - |
            **[OSS] 4 호스트 비교** — 분산.
              for h in bastion fw ips web; do
                echo "--- $h ---"
                ssh 6v6-$h 'sudo osqueryi --json "SELECT version FROM osquery_info;" 2>&1 | head'
              done
            예상 출력 `4 호스트 모두 version 출력`.
            운영 해석: 분산 호스트의 일관 가시화.
          - |
            **[OSS] kernel_info 쿼리** — OS 정보.
              ssh 6v6-web 'sudo osqueryi --json "SELECT version, path FROM kernel_info;"'
            예상 출력 `[{"version":"6.8.0-..","path":"/proc/version"}]`.
            운영 해석: kernel 버전 + path.
          - |
            **[OSS] platform_info** — 하드웨어.
              ssh 6v6-web 'sudo osqueryi --json "SELECT * FROM platform_info LIMIT 1;"' 2>&1 | head
            예상 출력 `{"vendor":"..","version":".."}`.
            운영 해석: BIOS / UEFI 정보.
          - |
            **[OSS] os_version 쿼리** — distro.
              ssh 6v6-web 'sudo osqueryi --json "SELECT name, version, codename FROM os_version;"'
            예상 출력 `{"name":"Ubuntu","version":"22.04","codename":"jammy"}`.
            운영 해석: distro 식별.
        negative_signs:
          - osqueryi 미설치
    target_vm: web

  - order: 2
    instruction: |
      `6v6-ips` 의 모든 프로세스 + Suricata 프로세스 상세 + listening port 쿼리.
    hint: |
      ssh 6v6-ips 'sudo osqueryi --json "SELECT pid, name, cmdline FROM processes WHERE name LIKE '\''%Suricata%'\'';"'
    category: monitoring
    points: 15
    answer: |
      ssh 6v6-ips 'sudo osqueryi --json "SELECT pid, name, cmdline, uid FROM processes WHERE name LIKE '\''%Suricata%'\'';"'
      ssh 6v6-ips 'sudo osqueryi --json "SELECT port, protocol, address, pid FROM listening_ports;"'
    answer_detail: Suricata + listening 포트
    verify:
      type: output_contains
      expect: pid
      field: stdout
      semantic:
        intent: |
          processes 테이블 SQL 쿼리. WHERE name LIKE 로 특정 프로세스 추출. listening_ports
          + JOIN processes 로 어떤 프로세스가 어떤 포트 listen.
        success_criteria:
          - pid 컬럼
          - Suricata 또는 listening port
        acceptable_methods:
          - |
            **[OSS] processes 테이블** — 표준.
              ssh 6v6-ips 'sudo osqueryi --json "SELECT pid, name, cmdline, uid FROM processes WHERE name LIKE '\''%Suricata%'\'';"'
            예상 출력 `[{"pid":"29","name":"Suricata-Main","cmdline":"...","uid":"0"}]`.
            운영 해석: SQL syntax 로 ps -ef 와 동일.
          - |
            **[OSS] processes JOIN listening_ports** — 종합.
              ssh 6v6-ips 'sudo osqueryi --json "SELECT l.port, l.protocol, l.address, p.name, p.pid FROM listening_ports l, processes p WHERE l.pid = p.pid;"'
            예상 출력 `[{"port":"22","protocol":"6","name":"sshd","pid":"..."}]`.
            운영 해석: JOIN 으로 port 와 process 연결.
          - |
            **[OSS] open_sockets (process_open_sockets)** — 활성.
              ssh 6v6-ips 'sudo osqueryi --json "SELECT pid, family, protocol, local_port, remote_address FROM process_open_sockets LIMIT 10;"'
            예상 출력 `(연결 정보)`.
            운영 해석: 활성 conn (established) 분석.
          - |
            **[OSS] socket_events (실시간)** — daemon.
              # osqueryd 의 socket_events 테이블 (실시간 stream)
              echo "osqueryd 의 socket_events 가 new conn 즉시 기록"
            예상 출력 `(설명)`.
            운영 해석: daemon mode 실시간 모니터링.
          - |
            **[OSS] process_memory_map** — 메모리.
              ssh 6v6-ips 'sudo osqueryi --json "SELECT pid, start, end, permissions, path FROM process_memory_map WHERE pid = $(pgrep -n Suricata) LIMIT 5;"'
            예상 출력 `(메모리 영역)`.
            운영 해석: malware 의 메모리 인젝션 검출.
          - |
            **[OSS] uptime 쿼리** — 시간.
              ssh 6v6-ips 'sudo osqueryi --json "SELECT days, hours, minutes FROM uptime;"'
            예상 출력 `{"days":"2","hours":"5","minutes":"30"}`.
            운영 해석: 호스트 가동 시간.
          - |
            **[OSS] cpuid + memory_info** — 자원.
              ssh 6v6-ips 'sudo osqueryi --json "SELECT physical_memory, swap_total FROM memory_info LIMIT 1;"'
            예상 출력 `{"physical_memory":"6291456000",..}`.
            운영 해석: 자원 인벤토리.
          - |
            **[OSS] hash 쿼리** — 파일 해시.
              ssh 6v6-ips 'sudo osqueryi --json "SELECT path, sha256 FROM hash WHERE path = '\''/usr/bin/suricata'\'';"'
            예상 출력 `{"path":"/usr/bin/suricata","sha256":"abc..."}`.
            운영 해석: binary 무결성 검증.
        negative_signs:
          - pid 컬럼 없음
    target_vm: ips

  - order: 3
    instruction: |
      `6v6-bastion` 의 모든 사용자 + SUID binary + authorized_keys 쿼리.
    hint: ssh 6v6-bastion 'sudo osqueryi --json "SELECT username, uid, shell FROM users;"'
    category: monitoring
    points: 10
    answer: |
      ssh 6v6-bastion 'sudo osqueryi --json "SELECT username, uid, shell, directory FROM users WHERE uid >= 1000;"'
      ssh 6v6-bastion 'sudo osqueryi --json "SELECT path, permissions FROM suid_bin LIMIT 10;"'
      ssh 6v6-bastion 'sudo osqueryi --json "SELECT * FROM authorized_keys LIMIT 5;"'
    answer_detail: 사용자 + SUID + ssh keys
    verify:
      type: output_contains
      expect: username
      field: stdout
      semantic:
        intent: |
          users / suid_bin / authorized_keys 3 테이블로 호스트 사용자 권한 + 권한
          상승 위험 + SSH 인증 키 가시화. 침해 흔적 (백도어 키, 신규 SUID) 헌팅의
          핵심.
        success_criteria:
          - users 출력
          - suid_bin 출력
        acceptable_methods:
          - |
            **[OSS] users 테이블** — 표준.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT username, uid, gid, shell, directory FROM users WHERE uid >= 1000;"'
            예상 출력 `[{"username":"ccc","uid":"1000","shell":"/bin/bash","directory":"/home/ccc"}]`.
            운영 해석: uid >= 1000 = 일반 사용자. system 계정 (root, daemon 등) 제외.
          - |
            **[OSS] suid_bin** — 권한 상승.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT path, permissions FROM suid_bin LIMIT 15;"'
            예상 출력 `[{"path":"/usr/bin/sudo","permissions":"4111"}]`.
            운영 해석: SUID 비트 (4xxx) 있는 binary. /usr/bin/sudo 가 정상. 예상 외 path
            발견 시 의심.
          - |
            **[OSS] authorized_keys** — SSH.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT * FROM authorized_keys LIMIT 5;"'
            예상 출력 `(SSH key 목록)`.
            운영 해석: 비인가 SSH 키 헌팅. 환경 가입 안 한 key 의심.
          - |
            **[OSS] shell_history** — 명령 기록.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT username, command FROM shell_history WHERE username = '\''ccc'\'' LIMIT 5;"'
            예상 출력 `(.bash_history 내용)`.
            운영 해석: 사용자의 최근 명령. 침해 시 부적절한 명령 흔적.
          - |
            **[OSS] sudoers** — 권한.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT * FROM sudoers LIMIT 5;"'
            예상 출력 `(sudoers 파일 내용)`.
            운영 해석: sudo 권한 가시화.
          - |
            **[OSS] logged_in_users** — 활성 세션.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT user, tty, host, time FROM logged_in_users;"'
            예상 출력 `{"user":"ccc","tty":"pts/0","host":"...",..}`.
            운영 해석: 현재 로그인된 사용자.
          - |
            **[OSS] last 명령 (사용자 로그인 history)** — 추적.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT * FROM last LIMIT 10;"'
            예상 출력 `(로그인 history)`.
            운영 해석: 비정상 시간 / IP 로그인 헌팅.
          - |
            **[OSS] passwd entries** — /etc/passwd 매핑.
              ssh 6v6-bastion 'sudo osqueryi --json "SELECT username, uid FROM users WHERE shell != '\''/usr/sbin/nologin'\'' AND shell != '\''/bin/false'\'';"'
            예상 출력 `(로그인 가능한 사용자)`.
            운영 해석: shell 이 nologin 아닌 사용자 = 로그인 가능 = 보안 우선순위.
        negative_signs:
          - users 출력 없음
    target_vm: bastion

  - order: 4
    instruction: |
      `6v6-web` 의 listening port + Apache process 매핑.
    hint: |
      ssh 6v6-web 'sudo osqueryi --json "SELECT l.port, l.protocol, p.name FROM listening_ports l JOIN processes p ON l.pid=p.pid WHERE l.port IN (22, 80, 443);"'
    category: monitoring
    points: 10
    answer: |
      ssh 6v6-web 'sudo osqueryi --json "SELECT l.port, l.protocol, l.address, p.name, p.pid FROM listening_ports l JOIN processes p ON l.pid=p.pid WHERE l.port IN (22, 80, 443);"'
    answer_detail: 22 / 80 / 443 listen + apache2 / sshd
    verify:
      type: output_contains
      expect: '80'
      field: stdout
      semantic:
        intent: |
          listening_ports + JOIN processes 로 port 와 daemon 매핑. 80=apache2,
          22=sshd 확인. 예상치 못한 port 발견 시 backdoor 의심.
        success_criteria:
          - port 80 또는 443
          - apache2 또는 sshd
        acceptable_methods:
          - |
            **[OSS] JOIN 쿼리** — 표준.
              ssh 6v6-web 'sudo osqueryi --json "SELECT l.port, p.name FROM listening_ports l JOIN processes p ON l.pid=p.pid;"'
            예상 출력 `[{"port":"22","name":"sshd"},{"port":"80","name":"apache2"}]`.
            운영 해석: port 와 daemon 명확 매핑.
          - |
            **[OSS] 0.0.0.0 vs 127.0.0.1** — 노출.
              ssh 6v6-web 'sudo osqueryi --json "SELECT port, address FROM listening_ports WHERE address = '\''0.0.0.0'\'';"'
            예상 출력 `(외부 노출 port)`.
            운영 해석: 0.0.0.0 listen = 모든 인터페이스. 의도된지 검증.
          - |
            **[OSS] IPv6 listen** — 다중 protocol.
              ssh 6v6-web 'sudo osqueryi --json "SELECT port, protocol, family FROM listening_ports;" 2>&1' | head -5
            예상 출력 `(IPv4 + IPv6)`.
            운영 해석: family 2 = IPv4, 10 = IPv6.
          - |
            **[OSS] ss + osquery 비교** — 검증.
              ssh 6v6-web 'sudo ss -tlnp | grep -E ":(22|80|443)"'
              ssh 6v6-web 'sudo osqueryi --json "SELECT port FROM listening_ports WHERE port IN (22, 80, 443);"'
            예상 출력 `(둘 다 같은 port 표시)`.
            운영 해석: osquery 가 ss 와 동일 정보, SQL 형식.
          - |
            **[OSS] socket_events (실시간)** — daemon.
              # osqueryd 의 socket_events
              echo "osqueryd 가 새 conn 발생 시 즉시 row 추가"
            예상 출력 `(설명)`.
            운영 해석: daemon mode 의 실시간 모니터링.
          - |
            **[OSS] netstat 비교** — 정통.
              ssh 6v6-web 'sudo netstat -tlnp 2>/dev/null | head' || ssh 6v6-web 'ss -tlnp | head'
            예상 출력 `(legacy view)`.
            운영 해석: osquery 가 SQL 화. 자동화 친화.
          - |
            **[OSS] 외부에서 접근 검증** — 통합.
              ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
              # 200 응답 = listening 정상
            예상 출력 `200`.
            운영 해석: listening + 도달성 + 정상 응답 = 종합 검증.
          - |
            **[OSS] backdoor port 헌팅** — 의심.
              # 예상 외 port listen 발견 시
              ssh 6v6-web 'sudo osqueryi --json "SELECT port, pid, address FROM listening_ports WHERE port NOT IN (22, 80, 443);"'
            예상 출력 `(없거나 system service)`.
            운영 해석: 예상 외 port = 의심.
        negative_signs:
          - port 80 listen 없음
    target_vm: web

  - order: 5
    instruction: |
      `6v6-web` 에서 헌팅 쿼리 — `on_disk=0` 인 process (메모리에만 존재).
    hint: ssh 6v6-web 'sudo osqueryi --json "SELECT pid, name, path FROM processes WHERE on_disk = 0;"'
    category: hunting
    points: 15
    answer: |
      ssh 6v6-web 'sudo osqueryi --json "SELECT pid, name, path FROM processes WHERE on_disk = 0;"'
    answer_detail: on_disk=0 process 헌팅 결과 (정상 환경에선 empty)
    verify:
      type: output_contains
      expect: '['
      field: stdout
      semantic:
        intent: |
          malware 가 자신의 binary 를 disk 에서 삭제하고 메모리에서 실행하는
          기법 (fileless malware) 검출. 정상 환경에서는 `[]` 빈 결과. 결과 있으면
          즉시 분석.
        success_criteria:
          - on_disk=0 쿼리 실행
          - 결과 (빈 또는 row)
        acceptable_methods:
          - |
            **[OSS] on_disk=0 헌팅** — 표준.
              ssh 6v6-web 'sudo osqueryi --json "SELECT pid, name, path, cmdline FROM processes WHERE on_disk = 0;"'
            예상 출력 `[]` (정상) 또는 `[{"pid":"123","name":"unknown",..}]` (의심).
            운영 해석: 결과 있으면 즉시 incident.
          - |
            **[OSS] 추가 헌팅 쿼리 — recent users** — 신규.
              ssh 6v6-web 'sudo osqueryi --json "SELECT username FROM users WHERE uid >= 1000;"'
            예상 출력 `(uid 1000+ 사용자)`.
            운영 해석: 예상 외 신규 사용자 = backdoor 가능성.
          - |
            **[OSS] cron 헌팅** — 지속성.
              ssh 6v6-web 'sudo osqueryi --json "SELECT command, path FROM crontab;"' 2>&1 | head
            예상 출력 `(cron 작업)`.
            운영 해석: 비인가 cron entry = backdoor.
          - |
            **[OSS] 디스크에 없는 파일** — fileless.
              # 메모리에서 실행 + 디스크 binary 삭제
              ssh 6v6-web 'sudo osqueryi --json "SELECT pid, name FROM processes WHERE on_disk = 0;" 2>&1 | head'
            예상 출력 `[]`.
            운영 해석: 가장 단순한 fileless malware 검출.
          - |
            **[OSS] 비정상 parent process** — 의심.
              # systemd 가 아닌 부모를 가진 long-running daemon
              ssh 6v6-web 'sudo osqueryi --json "SELECT pid, parent, name FROM processes WHERE parent != 1 AND parent != 0 AND start_time < (strftime('\''%s'\'','\''now'\'') - 3600) LIMIT 10;"' 2>&1 | head
            예상 출력 `(시간 1h+ 실행 + parent != 1 인 daemon)`.
            운영 해석: 의심 daemon. shell 에서 spawn 된 무한 실행 = backdoor.
          - |
            **[OSS] cmdline 길이 분석** — 의심.
              # cmdline 이 매우 긴 process (1000+ char) 는 obfuscation 가능
              ssh 6v6-web 'sudo osqueryi --json "SELECT pid, name, length(cmdline) AS len FROM processes WHERE length(cmdline) > 500 LIMIT 5;"' 2>&1 | head
            예상 출력 `(없음 또는 의심 process)`.
            운영 해석: powershell payload 같은 obfuscated cmdline.
          - |
            **[OSS] world-writable** — 권한 검사.
              # /tmp 등의 world-writable 인 디렉토리 + 새 파일
              ssh 6v6-web 'sudo osqueryi --json "SELECT path FROM file WHERE path LIKE '\''/tmp/%'\'' AND mode = '\''0777'\'' LIMIT 5;"' 2>&1 | head
            예상 출력 `(world-writable 파일)`.
            운영 해석: 무차별 권한 = 의심.
          - |
            **[OSS] passwd entries with non-standard shell** — 백도어.
              ssh 6v6-web 'sudo osqueryi --json "SELECT username, shell FROM users WHERE shell NOT IN ('\''/bin/false'\'','\''/usr/sbin/nologin'\'','\''/bin/bash'\'','\''/bin/sh'\'','\''/usr/bin/bash'\'') LIMIT 5;"'
            예상 출력 `(없음 또는 의심)`.
            운영 해석: 비표준 shell 사용자 = 의심.
        negative_signs:
          - 쿼리 실행 실패
    target_vm: web

  - order: 6
    instruction: |
      FIM 설정 — `/etc/passwd` 의 변경을 감시하는 osquery.conf patch 작성.
    hint: |
      {"file_paths": {"sensitive": ["/etc/passwd", "/etc/shadow"]}, "schedule": {"sec_files": {"query": "SELECT * FROM file_events WHERE category='sensitive';", "interval": 30}}}
    category: configuration
    points: 15
    answer: |
      ssh 6v6-web 'sudo cat > /etc/osquery/osquery.conf <<EOF
      {
        "options": {
          "config_plugin": "filesystem",
          "logger_plugin": "filesystem",
          "logger_path": "/var/log/osquery"
        },
        "file_paths": {
