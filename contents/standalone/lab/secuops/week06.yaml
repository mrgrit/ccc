lab_id: standalone-secuops-week06
title: Apache + ModSecurity v2 + OWASP CRS — XSS/SQLi/LFI/RCE 차단 + R/B/P
version: standalone-non-ai
course: secuops
week: 6
description: |
  6v6-web 의 Apache 2.4 + mod_security2 + OWASP CRS 룰셋이 4 카테고리 공격
  (XSS/SQLi/LFI/RCE) 을 어떻게 차단하는지 단계별 검증. paranoia level + audit log
  분석 + exception 작성 + R/B/P (Red 가 4 공격 → Blue 가 audit log 매치 룰 추출 →
  Purple 가 paranoia 권장).
difficulty: medium
duration_minutes: 180
prerequisites: [W05]
objectives:
  - "Apache + mod_security2 + CRS 활성 확인"
  - "XSS / SQLi / LFI / RCE 4 공격 시뮬 + 403 차단 검증"
  - "audit log JSON 분석 + 매치 룰 ID 추출"
  - "ModSec exception (SecRuleRemoveById / UpdateTargetById)"
  - "R/B/P — 4 공격 → 룰 매치 → paranoia 권장"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION

      Apache + mod_security2 + CRS 3 구성 요소 + audit log JSON 형식 가시화.

      ## 💻 실행 명령

      ```bash
      # 1. Apache 모듈 (security2 + proxy + ssl)
      ssh 6v6-web 'sudo apache2ctl -M 2>&1 | grep -iE "security|proxy|ssl"'

      # 2. ModSec engine + audit log 설정
      ssh 6v6-web 'sudo grep -E "^SecRuleEngine|^SecAuditLog|^SecAuditEngine|^SecAuditLogFormat" /etc/modsecurity/modsecurity.conf'

      # 3. CRS 룰 파일 31+ 개 확인
      ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | wc -l'

      # 4. 11 vhost 검증
      ssh 6v6-web 'sudo ls /etc/apache2/sites-enabled/ | wc -l'
      ```

      ## 📋 확인 사항

      - 명령 1: `security2_module (shared)` + `proxy_module (shared)` + `ssl_module (shared)`
      - 명령 2: `SecRuleEngine On` + `SecAuditLogFormat JSON` + `SecAuditLog /var/log/apache2/modsec_audit.log`
      - 명령 3: 31 개 (CRS 표준)
      - 명령 4: 11 개

      ## 💡 왜 이걸 하는가?

      WAF 운영 1순위. SecRuleEngine=Off 면 무방어, SecAuditLogFormat=Serial 이면 jq 분석 불가.

      ## 🔍 결과 해석

      - **정상**: 4 항목 모두 매치
      - **비정상**: SecRuleEngine 누락 → modsecurity.conf 수정 + reload
    hint: ssh 6v6-web 'sudo apache2ctl -M | grep -i security'
    category: survey
    points: 10
    answer: |
      ssh 6v6-web 'sudo apache2ctl -M 2>&1 | grep -iE "security|proxy|ssl"'
      ssh 6v6-web 'sudo grep -E "^SecRuleEngine|^SecAuditLog|^SecAuditEngine|^SecAuditLogFormat" /etc/modsecurity/modsecurity.conf'
      ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | wc -l'
      ssh 6v6-web 'sudo ls /etc/apache2/sites-enabled/ | wc -l'
    answer_detail: |
      mod_security2 + proxy + ssl 모듈 로드 + SecRuleEngine On + JSON 형식 (6v6 의
      Dockerfile 에서 명시 append 됨) + 31 CRS 룰 파일 + 11 vhost.
    verify:
      type: output_contains
      expect: security2_module
      field: stdout
      semantic:
        intent: "ModSec 가동 + audit log 형식 + 룰셋 + vhost 검증"
        success_criteria: ["security2_module", "SecRuleEngine On", "JSON 형식"]
        acceptable_methods:
          - "**[OSS] apache2ctl -M | grep security**"
          - "**[OSS] dpkg -l libapache2-mod-security2 modsecurity-crs**"
          - "**[OSS] SecAuditLogFormat JSON 명시 (Wazuh decoder 친화)**"
          - "**[OSS] /usr/share/modsecurity-crs/rules/REQUEST-94* (XSS/SQLi 핵심)**"
          - "**[OSS] /etc/modsecurity/crs-setup.conf paranoia + threshold**"
          - "**[OSS] /etc/apache2/sites-enabled/ vhost 11 (8 vuln + 운영 3)**"
          - "**[OSS] apache2ctl configtest** — config syntax"
          - "**[OSS] systemctl is-active apache2** — 서비스 상태"
    target_vm: web

  - order: 2
    instruction: |
      ## 🎯 MISSION (4 공격 시뮬)

      **XSS / SQLi / LFI / RCE** 4 카테고리 payload 를 attacker 에서 발생 → 모두 403
      차단 확인 + 매치 룰 ID 추출.

      ## 💻 실행 명령

      ```bash
      echo "=== XSS (941xxx) ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"'

      echo "=== SQLi (942xxx) ==="
      ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1' OR '1'='1\""

      echo "=== LFI (930xxx) ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?file=../../../etc/passwd"'

      echo "=== RCE (932xxx) ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?cmd=;cat%20/etc/passwd"'

      sleep 3
      echo "=== audit log 의 매치 룰 ID 카테고리 ==="
      ssh 6v6-web 'sudo tail -20 /var/log/apache2/modsec_audit.log | head -10 | jq -r ".audit_data.messages[]?" 2>/dev/null | grep -oE ''id \"[0-9]+\"'' | sort -u | head'
      ```

      ## 📋 확인 사항

      - 4 공격 모두 응답 `403`
      - 매치 룰 카테고리: 941xxx (XSS), 942xxx (SQLi), 930xxx (LFI), 932xxx (RCE)
      - 949110 (anomaly threshold) + 980130 (correlation) 도 함께

      ## 💡 왜 이걸 하는가?

      WAF 동작의 직접 검증 — OWASP Top 10 의 4 카테고리 표준 페이로드 차단 + audit
      log 의 룰 ID 카테고리 인지.

      ## 🔍 결과 해석

      - **정상**: 4 × 403 + 4 카테고리 룰 매치
      - **비정상**: 200 응답 → SecRuleEngine 비활성 또는 CRS 룰셋 손실
    hint: 4 공격 payload → 403 + 룰 ID 추출
    category: exploit
    points: 20
    answer: |
      ssh 6v6-attacker 'curl -s -o /dev/null -w "XSS: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"'
      ssh 6v6-attacker "curl -s -o /dev/null -w 'SQLi: %{http_code}\n' -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1' OR '1'='1\""
      ssh 6v6-attacker 'curl -s -o /dev/null -w "LFI: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?file=../../../etc/passwd"'
      ssh 6v6-attacker 'curl -s -o /dev/null -w "RCE: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?cmd=;cat%20/etc/passwd"'
      sleep 3
      ssh 6v6-web 'sudo tail -20 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]?" 2>/dev/null | grep -oE ''id "[0-9]+"'' | sort -u | head'
    answer_detail: 4 공격 모두 403. 941/942/930/932/949/980 룰셋 카테고리 매치.
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: "4 OWASP 공격 차단 + 룰 ID 분석"
        success_criteria: ["XSS 403", "SQLi 403", "LFI 403", "RCE 403", "941+942+930+932 룰"]
        acceptable_methods:
          - "**[OSS] XSS payload <script>alert(1)</script>** — 941 (XSS via libinjection)"
          - "**[OSS] SQLi tautology 1' OR '1'='1** — 942 (libinjection)"
          - "**[OSS] LFI ../../etc/passwd** — 930 (Path Traversal)"
          - "**[OSS] RCE ;cat /etc/passwd** — 932 (Command Injection)"
          - "**[OSS] XSS / SQLi / LFI / RCE 의 URL encoded 변형**"
          - "**[OSS] http.request_body 의 POST payload (CRS 가 검사)**"
          - "**[OSS] header 인젝션 (User-Agent / Referer)**"
          - "**[OSS] audit_data.messages 의 id capture**"
    target_vm: bastion

  - order: 3
    instruction: |
      ## 🎯 MISSION (audit log 분석)

      `/var/log/apache2/modsec_audit.log` (JSON 형식) 의 1시간 분량을 jq 로 분석:
      매치 룰 top 10 + 응답 코드 분포 + client IP 별 빈도.

      ## 💻 실행 명령

      ```bash
      # 1. 매치 룰 ID top 10
      ssh 6v6-web 'sudo cat /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]?" 2>/dev/null | grep -oE ''id "[0-9]+"'' | sort | uniq -c | sort -rn | head -10'

      # 2. 응답 코드 분포
      ssh 6v6-web 'sudo cat /var/log/apache2/modsec_audit.log | jq -r ".response.status // .response.http_code" 2>/dev/null | sort | uniq -c'

      # 3. client IP top 5
      ssh 6v6-web 'sudo cat /var/log/apache2/modsec_audit.log | jq -r ".transaction.remote_address" 2>/dev/null | sort | uniq -c | sort -rn | head -5'
      ```

      ## 📋 확인 사항

      - 명령 1: 941100 (XSS via libinjection) / 942100 (SQLi via libinjection) / 949110
        (anomaly threshold) / 980130 (correlation) 등이 top 10
      - 명령 2: 200 / 403 / 5xx 분포 (403 비율 = WAF 차단 효과)
      - 명령 3: HAProxy hop IP (10.20.32.1 또는 10.20.31.1) 가 가장 많음

      ## 💡 왜 이걸 하는가?

      WAF 운영의 trend 분석 — false-positive 빈번 룰 식별 (exception 후보), 차단 효과
      측정, client IP 분포 (X-Forwarded-For 보존 여부).

      ## 🔍 결과 해석

      - **정상**: top 10 룰 다양 + 403 비율 5-20%
      - **운영 권장**: false-positive 가 잦은 룰 (수십 % 이상) → exception 작성
    hint: jq + audit log 분석
    category: analysis
    points: 15
    answer: |
      ssh 6v6-web 'sudo cat /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]?" 2>/dev/null | grep -oE ''id "[0-9]+"'' | sort | uniq -c | sort -rn | head -10'
      ssh 6v6-web 'sudo cat /var/log/apache2/modsec_audit.log | jq -r ".response.status // .response.http_code" 2>/dev/null | sort | uniq -c'
      ssh 6v6-web 'sudo cat /var/log/apache2/modsec_audit.log | jq -r ".transaction.remote_address" 2>/dev/null | sort | uniq -c | sort -rn | head -5'
    answer_detail: |
      top 10 룰 (941 XSS + 942 SQLi + 949 threshold + 980 correlation + 913 scanner)
      + 응답 코드 분포 (200/403) + client IP (HAProxy hop).
    verify:
      type: output_contains
      expect: '941\|942'
      field: stdout
      semantic:
        intent: "audit log 통계 분석"
        success_criteria: ["top 룰 출력", "응답 코드 분포"]
        acceptable_methods:
          - "**[OSS] jq + audit_data.messages**"
          - "**[OSS] grep -oE 'id \"[0-9]+\"' + sort + uniq**"
          - "**[OSS] response.status 분포**"
          - "**[OSS] transaction.remote_address top N**"
          - "**[OSS] severity 분포 (CRITICAL/ERROR/WARNING)**"
          - "**[OSS] hour 별 trend (timestamp prefix)**"
          - "**[OSS] tags 별 (attack-xss / attack-sqli)**"
          - "**[OSS] payload 의 정확한 데이터 (.data 필드)**"
    target_vm: web

  - order: 4
    instruction: |
      ## 🎯 MISSION (R/B/P)

      **Red** 가 4 카테고리 공격 → **Blue** 가 audit log 의 매치 룰 ID 추출 →
      **Purple** 가 paranoia level 권장.

      ## 💻 실행 명령

      ```bash
      # Red 5 burst (4 카테고리 mix)
      ssh 6v6-attacker '
      curl -s -o /dev/null -A "sqlmap/1.5" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>"
      curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/?id=1+UNION+SELECT"
      curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/?file=../../../etc/passwd"
      curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/?cmd=;ls"
      curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=javascript:alert(1)"
      '
      sleep 3

      # Blue — 매치 룰 ID 분포
      ssh 6v6-web 'sudo tail -50 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]?" 2>/dev/null | grep -oE ''id "[0-9]+"'' | sort | uniq -c | sort -rn | head'

      # Purple — paranoia level 분석
      ssh 6v6-web 'sudo find / -name "crs-setup.conf*" 2>/dev/null | head -1 | xargs sudo grep -E "tx.paranoia|anomaly_score" 2>/dev/null | head'
      ```

      ## 📋 확인 사항

      - 5 burst 후 audit log 에 다양한 룰 ID (941/942/930/932/913 등)
      - paranoia level 1 + inbound threshold 5 = production 표준
      - production 환경에서 1 → 2 상승 시 false-positive 증가 검토

      ## 💡 왜 이걸 하는가?

      Purple Team standard — 공격 시뮬 + 룰 효과 측정 + paranoia tuning 권장.

      ## 🔍 결과 해석

      - **정상**: 5 burst → 5+ 카테고리 룰 매치
      - **운영 권장**: paranoia 2 상승 시 추가 룰 매치 (정상 트래픽 일부도 false-positive
        가능) → DetectionOnly 모드로 baseline 측정 후 결정
    hint: R/B/P paranoia 권장
