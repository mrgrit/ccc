lab_id: standalone-secuops-week06
title: Apache + ModSecurity v2 + OWASP CRS (WAF, 6v6-web)
version: standalone-non-ai
course: secuops
week: 6
description: |
  6v6-web 의 Apache 2.4 + mod_security2 + OWASP CRS 가 학생 트래픽에 어떻게
  대응하는지 단계별 검증. 설정 파일 → 공격 시뮬레이션 (XSS / SQLi / LFI / RCE) →
  audit log JSON 분석 → 룰 exception → paranoia 영향까지.
difficulty: medium
duration_minutes: 180
audience: 보안 솔루션 운영 중급 (6주차)
prerequisites:
  - W04-05 통과 (Suricata 룰셋 익숙)
  - bastion ProxyJump
  - sudo NOPASSWD on web
objectives:
  - SecRuleEngine 가 On / 인증된 차단 동작 검증
  - OWASP CRS 룰 매칭 + audit log JSON 파싱
  - XSS / SQLi / LFI / RCE 4 공격 시뮬레이션 + 차단 검증
  - paranoia level / anomaly threshold 영향 학습
  - 룰 exception 작성 (SecRuleRemoveById / SecRuleUpdateTargetById)
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      `6v6-web` 의 ModSecurity 핵심 설정 (SecRuleEngine, SecAuditLog 형식, default
      action) + Apache 모듈 (mod_security2 로드) 가시화.
    hint: ssh 6v6-web 'sudo apache2ctl -M 2>&1 | grep security2'
    category: survey
    points: 10
    answer: |
      ssh 6v6-web 'sudo apache2ctl -M 2>&1 | grep -iE "security|proxy|ssl"'
      ssh 6v6-web 'sudo grep -E "^SecRuleEngine|^SecAuditLog|^SecAuditEngine|^SecDefaultAction" /etc/modsecurity/modsecurity.conf'
    answer_detail: security2_module + SecRuleEngine On + audit log 설정
    verify:
      type: output_contains
      expect: security2_module
      field: stdout
      semantic:
        intent: |
          Apache 의 mod_security2 모듈 로드 + SecRuleEngine On + audit log
          출력 형식 (JSON 권장) + default action (deny status 403) 확인. 이 4
          조건이 충족되어야 ModSec 가 실제 차단 동작.
        success_criteria:
          - security2_module 로드
          - SecRuleEngine On
          - audit log 설정
        acceptable_methods:
          - |
            **[OSS] apache2ctl -M (모듈 목록)** — 표준.
              ssh 6v6-web 'sudo apache2ctl -M 2>&1 | grep -iE "security|proxy|ssl|rewrite|headers"'
            예상 출력 `security2_module (shared) / proxy_module / mod_ssl ...`.
            운영 해석: mod_security2 + proxy + ssl 필수.
          - |
            **[OSS] SecRuleEngine 상태** — 핵심.
              ssh 6v6-web 'sudo grep -E "^SecRuleEngine" /etc/modsecurity/modsecurity.conf'
              # On / DetectionOnly / Off
            예상 출력 `SecRuleEngine On`.
            운영 해석: On 이 활성 차단. DetectionOnly 면 alert 만, Off 면 비활성.
          - |
            **[OSS] audit log 설정** — 출력.
              ssh 6v6-web 'sudo grep -E "^SecAudit" /etc/modsecurity/modsecurity.conf'
              # AuditLog / AuditLogFormat / AuditEngine / AuditLogParts
            예상 출력 `SecAuditEngine RelevantOnly / SecAuditLogFormat JSON / SecAuditLog /var/log/apache2/modsec_audit.log / SecAuditLogParts ...`.
            운영 해석: JSON 형식 + RelevantOnly (룰 매치 시만) = Wazuh agent 친화.
          - |
            **[OSS] default action** — 차단 동작.
              ssh 6v6-web 'sudo grep -E "^SecDefaultAction" /etc/modsecurity/modsecurity.conf'
            예상 출력 `SecDefaultAction "phase:2,log,auditlog,deny,status:403"`.
            운영 해석: phase 2 (request body) 매치 시 deny + 403. 다른 status (예: 429
            rate-limit) 도 가능.
          - |
            **[OSS] SecRequestBodyAccess / SecResponseBodyAccess** — 검사 범위.
              ssh 6v6-web 'sudo grep -E "^SecRequestBodyAccess|^SecResponseBodyAccess" /etc/modsecurity/modsecurity.conf'
            예상 출력 `SecRequestBodyAccess On / SecResponseBodyAccess On`.
            운영 해석: request body (POST) + response body 둘 다 검사 활성.
            Off 면 GET only 검사.
          - |
            **[OSS] Apache vhost 의 SecRule** — vhost 적용.
              ssh 6v6-web 'sudo grep -r "SecRule\|modsecurity" /etc/apache2/sites-enabled/ 2>&1 | head -10'
              # 각 vhost 에 ModSec 룰 추가도 가능
            예상 출력 `(설명)`.
            운영 해석: vhost 단위 추가 룰 가능. 예외 처리에 자주 사용.
          - |
            **[OSS] modsec_audit.log 의 라인 수** — 활용.
              ssh 6v6-web 'sudo wc -l /var/log/apache2/modsec_audit.log'
              ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r .transaction.time_stamp 2>/dev/null'
            예상 출력 `630 / <date>`.
            운영 해석: audit log 가 600+ 라인 = 다수의 transaction 기록. JSON 검증.
          - |
            **[OSS] mod_security2 패키지 버전** — 환경.
              ssh 6v6-web 'sudo apt-cache policy libapache2-mod-security2 2>&1 | head -5'
            예상 출력 `libapache2-mod-security2: Installed: 2.9.x-...`.
            운영 해석: v2.9.x = 안정 버전. v3 는 별도 패키지.
        negative_signs:
          - security2_module 누락
          - SecRuleEngine Off
    target_vm: web

  - order: 2
    instruction: |
      OWASP CRS 룰셋의 위치 + 30+ 룰 파일 + paranoia level + anomaly threshold
      가시화.
    hint: ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | head'
    category: survey
    points: 10
    answer: |
      ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | head -15'
      ssh 6v6-web 'sudo find / -name "crs-setup.conf" 2>/dev/null | head -3'
      ssh 6v6-web 'CRS=$(sudo find / -name "crs-setup.conf" 2>/dev/null | head -1); sudo grep -E "tx.paranoia_level|inbound_anomaly|outbound_anomaly" $CRS 2>/dev/null | head'
    answer_detail: CRS 룰 30+ + paranoia 1 + threshold 5
    verify:
      type: output_contains
      expect: REQUEST-
      field: stdout
      semantic:
        intent: |
          OWASP CRS 의 룰 파일 명명 (REQUEST-9xx / RESPONSE-9xx) + paranoia level
          (1~4) + anomaly threshold (inbound 5 / outbound 4) 학습.
        success_criteria:
          - REQUEST-xxx 룰 파일
          - paranoia level 키
          - anomaly threshold 키
        acceptable_methods:
          - |
            **[OSS] /usr/share/modsecurity-crs/rules** — 위치.
              ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | wc -l'
              ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/REQUEST-94*.conf'
            예상 출력 `31 / REQUEST-941-...-XSS.conf / REQUEST-942-...-SQLI.conf`.
            운영 해석: REQUEST-941-XSS / 942-SQLI 가 핵심 룰 파일.
          - |
            **[OSS] crs-setup.conf** — 변수 정의.
              ssh 6v6-web 'sudo find / -name "crs-setup.conf*" 2>/dev/null | head -3'
              # /usr/share/modsecurity-crs/crs-setup.conf 또는 /etc/modsecurity/crs/crs-setup.conf
              ssh 6v6-web 'sudo cat $(sudo find / -name "crs-setup.conf" 2>/dev/null | head -1) 2>/dev/null | grep -E "tx.paranoia|anomaly_score" | head -10'
            예상 출력 `setvar:tx.paranoia_level=1 / setvar:tx.inbound_anomaly_score_threshold=5`.
            운영 해석: paranoia 1 + threshold 5 = 표준 운영.
          - |
            **[OSS] 룰 파일 1개 head** — 룰 형식.
              ssh 6v6-web 'sudo head -30 /usr/share/modsecurity-crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf'
            예상 출력 `SecRule REQUEST_COOKIES|... "@detectXSS" ...`.
            운영 해석: 룰 1개 = SecRule + target + operator + actions.
          - |
            **[OSS] rule id 통계** — 분류.
              ssh 6v6-web 'sudo grep -oE "id:[0-9]+" /usr/share/modsecurity-crs/rules/*.conf 2>&1 | grep -oE "[0-9]+" | sort | head'
              # ID range 가시화
            예상 출력 `9001 / 9002 / ... / 941100 / 941110 / ...`.
            운영 해석: 9xx prefix = 카테고리.
          - |
            **[OSS] paranoia 영향 받는 룰** — 매핑.
              # paranoia 2+ 일때만 활성화되는 룰
              ssh 6v6-web 'sudo grep -l "paranoia_level >= 2" /usr/share/modsecurity-crs/rules/*.conf 2>&1 | head'
            예상 출력 `(파일 list)`.
            운영 해석: paranoia 가 높아질수록 추가 활성 룰.
          - |
            **[OSS] /etc/modsecurity 의 추가 conf** — 사용자 확장.
              ssh 6v6-web 'sudo ls /etc/modsecurity/'
              # modsecurity.conf / crs-setup.conf (있다면) / 사용자 추가 conf
            예상 출력 `modsecurity.conf / unicode.mapping / ...`.
            운영 해석: production 환경은 /etc/modsecurity/ 에 추가 정책 conf.
          - |
            **[OSS] Apache 의 IncludeOptional** — 룰 로딩.
              ssh 6v6-web 'sudo grep -r "Include.*modsecurity\|modsecurity-crs" /etc/apache2/ 2>&1 | head'
            예상 출력 `IncludeOptional /etc/modsecurity/*.conf / Include /usr/share/modsecurity-crs/*.conf`.
            운영 해석: Apache 가 CRS 룰을 어떻게 load 하는지.
          - |
            **[OSS] 룰셋 변경 후 적용** — 운영.
              # 룰 변경 후 reload
              # ssh 6v6-web 'sudo apache2ctl configtest && sudo systemctl reload apache2'
              echo "config 변경 후 configtest + reload"
            예상 출력 `Syntax OK`.
            운영 해석: configtest 가 syntax 검증. reload 가 적용.
        negative_signs:
          - 룰 파일 없음
          - paranoia 키 누락
    target_vm: web

  - order: 3
    instruction: |
      XSS 공격 시뮬레이션. attacker 에서 `<script>` 페이로드 전송 → 403 응답 확인 +
      audit log 의 941100 룰 매치 확인.
    hint: |
      ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
    category: experiment
    points: 15
    answer: |
      ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
      sleep 2
      ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.messages[] | select(.id | startswith(\"941\")) | {id, msg, severity}"'
    answer_detail: 403 응답 + 941xxx 룰 매치
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: |
          XSS 페이로드 → ModSec 의 REQUEST-941 룰 매치 → anomaly threshold 도달 →
          403 응답. audit log 의 transaction.messages 에 941100 (XSS via libinjection)
          기록.
        success_criteria:
          - HTTP 403
          - 941xxx 룰 매치
          - severity 표기
        acceptable_methods:
          - |
            **[OSS] curl XSS payload** — 표준.
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=<script>alert(1)</script>'"
            예상 출력 `403`.
            운영 해석: anomaly score 가 critical (5) 매치 → threshold 5 → 차단.
          - |
            **[OSS] audit log 의 941 룰** — 매치 확인.
              ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.messages[] | select(.id | startswith(\"941\")) | {id, msg, data}"'
            예상 출력 `{"id":"941100","msg":"XSS Attack Detected via libinjection","data":"Matched Data: <script>..."}`.
            운영 해석: libinjection 이 정교한 XSS 매처. data 필드에 정확한 매치 페이로드.
          - |
            **[OSS] severity 의미** — 우선순위.
              # 1=high, 2=warning, 3=notice (ModSec convention)
              ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.messages[].severity"'
            예상 출력 `2`.
            운영 해석: severity 2 = warning. XSS 는 critical (5) score 룰이지만
            severity 자체는 별 (2).
          - |
            **[OSS] anomaly score 누적** — 동작.
              # transaction.messages 의 룰 매치 합 = inbound_anomaly_score
              # 5 이상 → block
              ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.messages | length"'
            예상 출력 `5+ (매치된 룰 갯수)`.
            운영 해석: 한 transaction 에 여러 룰 매치 시 score 누적.
          - |
            **[OSS] response.http_code 검증** — 차단 결과.
              ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.response.http_code"'
            예상 출력 `403`.
            운영 해석: 응답 코드. 200 이면 차단 안 됐음.
          - |
            **[OSS] 다른 XSS payload 시도** — 다양성.
              # img onerror
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=<img src=x onerror=alert(1)>'"
              # SVG
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=<svg onload=alert(1)>'"
            예상 출력 `403 / 403`.
            운영 해석: 다양한 XSS 변형 모두 차단.
          - |
            **[OSS] DetectionOnly 모드 비교** — 시뮬레이션.
              # SecRuleEngine DetectionOnly 로 변경 시
              # 룰 매치 + audit log 기록 + 차단 안 함 (200 응답)
              # 운영 초기 권장: DetectionOnly 로 false-positive 모니터링
              echo "DetectionOnly 로 변경 후 동일 페이로드 시도 → 200"
            예상 출력 `(설명)`.
            운영 해석: production 배포 초기에 DetectionOnly 로 baseline 측정.
          - |
            **[OSS] Apache error log 의 ModSec 메시지** — 보조.
              ssh 6v6-web 'sudo tail -10 /var/log/apache2/error.log | grep -i modsec | head -3'
            예상 출력 `[<time>] [client 10.20.30.202:xxxx] ModSecurity: Warning. ...`.
            운영 해석: error.log 의 ModSec 메시지가 audit log 의 인덱스 역할.
        negative_signs:
          - 200 응답 (차단 안 됨)
          - 941 룰 매치 없음
    target_vm: web

  - order: 4
    instruction: |
      SQLi 공격 시뮬레이션. UNION SELECT 패턴 → 403 응답 + 942xxx 룰 매치.
    hint: |
      ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}' -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1' OR '1'='1\""
    category: experiment
    points: 15
    answer: |
      ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1' OR '1'='1\""
      sleep 2
      ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.messages[] | select(.id | startswith(\"942\")) | {id, msg}"'
    answer_detail: 403 + 942xxx 룰
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: |
          SQLi 페이로드 (1' OR '1'='1) → 942 룰 (SQLi via libinjection) → 403.
          libinjection 이 SQLi 매칭의 표준 라이브러리.
        success_criteria:
          - HTTP 403
          - 942xxx 룰 매치
        acceptable_methods:
          - |
            **[OSS] SQLi tautology** — 표준.
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1' OR '1'='1\""
            예상 출력 `403`.
            운영 해석: 가장 단순한 SQLi (boolean-based) 매치.
          - |
            **[OSS] UNION SELECT 페이로드** — 다른 변형.
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=1%20UNION%20SELECT%20user,pass%20FROM%20users--'"
            예상 출력 `403`.
            운영 해석: UNION SELECT 가 SQLi 가장 빈번 변형.
          - |
            **[OSS] audit log 의 942 룰** — 매치.
              ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.messages[] | select(.id | startswith(\"942\")) | {id, msg, data}"'
            예상 출력 `{"id":"942100","msg":"SQL Injection Attack Detected via libinjection","data":"Matched Data: ..."}`.
            운영 해석: 942100 = libinjection 으로 SQLi 매치.
          - |
            **[OSS] POST body SQLi** — body 검사.
              ssh 6v6-attacker "curl -s -X POST -d \"q=1' OR '1'='1\" -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' http://10.20.30.1/"
            예상 출력 `403`.
            운영 해석: GET param 외 POST body 도 검사.
          - |
            **[OSS] sleep-based blind SQLi** — 정교한 변형.
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=1%20AND%20SLEEP(5)'"
            예상 출력 `403 (sleep 미발생, ModSec 즉시 차단)`.
            운영 해석: time-based blind SQLi 도 942 룰 매치.
          - |
            **[OSS] Authorization 헤더 SQLi** — header 검사.
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' -H \"Authorization: Bearer 1' OR '1'='1\" http://10.20.30.1/"
            예상 출력 `403 (헤더에서도 검사)`.
            운영 해석: 모든 input vector (query/body/header/cookie) 검사.
          - |
            **[OSS] 943 룰 (Session Fixation)** — 다른 카테고리.
              # SQLi 와 비슷한 945 (path traversal) / 933 (PHP)
              ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?q=../../../etc/passwd'"
              # 945 path traversal
            예상 출력 `403`.
            운영 해석: 다양한 카테고리 매치.
          - |
            **[OSS] 응답 페이지 분석** — UX.
              ssh 6v6-attacker "curl -s -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1' OR '1'='1\" | head -5"
              # Apache 의 403 default page
            예상 출력 `<!DOCTYPE HTML PUBLIC ...> ... 403 Forbidden`.
            운영 해석: 차단 시 사용자에게 보이는 응답.
        negative_signs:
          - 200 응답
          - 942 룰 매치 없음
    target_vm: web

  - order: 5
    instruction: |
      LFI / RCE 공격 패턴 (../../../etc/passwd) 시뮬레이션 + 930xxx 룰 매치.
    hint: |
      ssh 6v6-attacker "curl -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?file=../../../etc/passwd'"
    category: experiment
    points: 10
    answer: |
      ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}\n' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/?file=../../../etc/passwd'"
      sleep 2
      ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq ".transaction.messages[] | select(.id | startswith(\"930\") or startswith(\"932\")) | {id, msg}"'
    answer_detail: LFI 차단 + 930/932 룰
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: |
