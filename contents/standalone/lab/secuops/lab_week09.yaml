  - order: 4
    instruction: |
      ## 🎯 MISSION — wazuh-logtest 로 decoder 매핑 디버그

      Suricata alert log 의 한 라인을 wazuh-logtest 로 decoder + rule 매칭 디버깅.

      ## 💻 실행 명령

      ```bash
      # 1. 최근 Suricata alert event 1 라인 추출
      RECENT_EVE=$(ssh 6v6-ips 'sudo grep "\"event_type\":\"alert\"" /var/log/suricata/eve.json | tail -1')
      echo "최근 Suricata alert event:"
      echo "$RECENT_EVE" | head -c 200

      # 2. wazuh-logtest 로 디코딩 시뮬
      echo
      echo "=== wazuh-logtest --quiet 사용 (단발 검증) ==="
      ssh 6v6-siem "echo '$RECENT_EVE' | sudo /var/ossec/bin/wazuh-logtest --quiet 2>&1 | head -30" 2>&1

      # 3. wazuh-logtest 의 표준 인터랙티브 모드 — 정보 출력
      echo
      echo "=== wazuh-logtest 도움말 ==="
      ssh 6v6-siem 'sudo /var/ossec/bin/wazuh-logtest --help 2>&1 | head -10'
      ```

      ## 📋 확인 사항

      - 최근 Suricata alert event 가 eve.json 에서 추출됨
      - wazuh-logtest 의 출력:
        - **decoder**: `suricata` matched
        - **rule**: `86601` matched (또는 다른 86xxx)
        - **level**: 3 (예상)
      - wazuh-logtest 의 옵션 출력

      ## 💡 왜 이걸 하는가?

      새 source 의 decoder 매핑 디버그 시 표준 도구. log line 입력 → decoder 매핑 →
      rule 매핑 단계 가시화.

      ## 🔍 결과 해석

      - **정상**: decoder + rule 모두 매핑 + level 출력
      - **비정상**: "No decoder matched" → decoder 작성 필요 (local_decoder.xml)
      - **운영 권장**: 새 log source 도입 시 항상 wazuh-logtest 로 사전 검증
