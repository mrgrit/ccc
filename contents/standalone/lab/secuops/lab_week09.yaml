  - order: 3
    instruction: |
      ## 🎯 MISSION — decoder + rule 디렉토리 + Suricata decoder 매핑

      /var/ossec/etc/decoders/ 와 rules/ 디렉토리 구조 + Suricata 0200 decoder 매핑.

      ## 💻 실행 명령

      ```bash
      # 1. decoder 파일 수 + 카테고리
      ssh 6v6-siem 'sudo ls /var/ossec/etc/decoders/ | wc -l'
      ssh 6v6-siem 'sudo ls /var/ossec/etc/decoders/ | head -20'

      # 2. rule 파일 수 + 카테고리
      ssh 6v6-siem 'sudo ls /var/ossec/etc/rules/ | wc -l'
      ssh 6v6-siem 'sudo ls /var/ossec/etc/rules/ | head -20'

      # 3. Suricata decoder 확인
      ssh 6v6-siem 'sudo head -30 /var/ossec/etc/decoders/0200-suricata_decoders.xml 2>&1'

      # 4. Suricata rule 확인
      ssh 6v6-siem 'sudo head -30 /var/ossec/etc/rules/0235-suricata_rules.xml 2>&1'

      # 5. 룰 86601 정확한 정의
      ssh 6v6-siem 'sudo grep -B2 -A5 "id=\"86601\"" /var/ossec/etc/rules/0235-suricata_rules.xml 2>&1 | head -15'

      # 6. local_rules.xml + local_decoder.xml (사용자 정의 자리)
      ssh 6v6-siem 'sudo ls -la /var/ossec/etc/rules/local_rules.xml /var/ossec/etc/decoders/local_decoder.xml 2>&1'
      ```

      ## 📋 확인 사항

      - decoder: 100+ 파일 (apache / sshd / suricata / osquery / etc)
      - rule: 100+ 파일 (apache / sshd / suricata / osquery / web / system / etc)
      - 0200-suricata_decoders.xml — Suricata eve.json 매핑
      - 0235-suricata_rules.xml — rule id 86600-86699 범위
      - rule 86601 = "Suricata: Alert" — Suricata 의 alert event 매칭
      - local_rules.xml / local_decoder.xml — 사용자 정의 위치

      ## 💡 왜 이걸 하는가?

      decoder + rule 의 구조 인지. 새 source ingest 시 어디에 추가하는지 (보통 local_rules.xml).

      ## 🔍 결과 해석

      - **정상**: decoder/rule 디렉토리 다수 파일 + Suricata 0200/0235 활성
      - **운영 권장**:
        - local_rules.xml 만 수정 (default rule 직접 수정 금지 — 업그레이드 시 충돌)
        - 새 source 추가 시 wazuh-logtest 로 검증
        - rule 번호 100000+ 사용자 정의 권장
    hint: 'ls decoders/ + grep "id=86601" rules/0235'
    category: configuration
    points: 15
    answer: |
      ssh 6v6-siem 'sudo ls /var/ossec/etc/decoders/ | wc -l'
      ssh 6v6-siem 'sudo ls /var/ossec/etc/decoders/ | head -20'
