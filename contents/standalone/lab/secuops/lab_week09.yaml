  - order: 2
    instruction: |
      ## 🎯 MISSION — alerts.json 의 4 sub-section + 정확한 JSON 구조

      alerts.json 의 한 라인 = 한 alert. rule + agent + manager + data 4 sub-section.

      ## ⚠️ 사전 안내 — 분석용 데이터가 없을 때

      본 step 은 *데이터 분석* lab. 실 운영 환경에서는 alerts.json 이 자연 누적
      되지만, 신규 cyber range 직후 또는 첫 학습 시점에는 *0 byte* 일 수 있다.
      검증 명령 결과가 빈 경우:

      ```bash
      # bastion 에서 fixture 주입 (siem 의 alerts.json 에 7 일치 합성 데이터)
      cd ~/ccc && python3 scripts/lab_fixture_inject.py \
          --lab contents/standalone/lab/secuops/week09.yaml --order 2 --ssh
      ```

      fixture 는 `lib/generators/wazuh_alert.py` (5710/5712/100200/87213 등 16 rule
      template + Suricata 86601) 로 생성되며 *시드 재현 가능*. 본 step 의 학습
      대상 = alerts.json 구조 분석 이므로 *합성 vs 실측 차이 없음*.

      ## 💻 실행 명령

      ```bash
      # 1. alerts.json keys (4 sub-section)
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq "keys"'

      # 2. rule sub-section
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq ".rule"'

      # 3. agent sub-section
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq ".agent"'

      # 4. data sub-section (decoded fields)
      ssh 6v6-siem 'sudo tail -1 /var/ossec/logs/alerts/alerts.json | jq ".data" | head -20'

      # 5. 최근 10 alert 의 rule.id 분포
      ssh 6v6-siem 'sudo tail -50 /var/ossec/logs/alerts/alerts.json 2>/dev/null | jq -r ".rule.id" | sort | uniq -c | sort -rn | head -10'

      # 6. 최근 10 alert 의 level 분포
      ssh 6v6-siem 'sudo tail -50 /var/ossec/logs/alerts/alerts.json 2>/dev/null | jq -r ".rule.level" | sort | uniq -c'
      ```

      ## 📋 확인 사항 (실측)

      - **keys**: `["agent", "data", "manager", "rule", "timestamp", ...]`
      - **rule**: `{level, description, id, firedtimes, mail, groups}`
        - id 86601 = Suricata Alert (다른 sid 도 있음)
      - **agent**: `{id, name, ip}` — 005/006/007 중 하나
      - **data**: decoded fields (원본 eve.json / modsec_audit / 등)
      - **rule.id 분포**: 86601 (Suricata) + 5712 (SSH) + 651 (apache) 등
      - **level 분포**: 3 (informational) + 5 (important) + 7 (high) 등

      ## 💡 왜 이걸 하는가?

      alerts.json 이 SIEM 의 source of truth. 운영자가 매 cycle 첫 점검.

      ## 🔍 결과 해석

      - **정상**: 4 sub-section + 분포 다양
      - **운영 활용**:
        - rule.id top 10 — alert flood 식별
        - level 분포 — 우선순위 + dashboard filter
        - groups — 카테고리 별 분석 (ids / suricata / apache 등)
    fixtures:
