  - order: 5
    instruction: |
      ## 🎯 MISSION — agent.conf 점검 + ossec.conf 의 localfile

      Wazuh manager 가 배포하는 agent.conf 점검 + agent 의 ossec.conf 의 localfile 정의.

      ## 💻 실행 명령

      ```bash
      # 1. manager 측 agent.conf (default group)
      ssh 6v6-siem 'sudo cat /var/ossec/etc/shared/default/agent.conf 2>&1 | head -40'

      # 2. ips agent 의 ossec.conf 의 localfile (eve.json 모니터링)
      ssh 6v6-ips 'sudo grep -B1 -A3 "<localfile>" /var/ossec/etc/ossec.conf 2>&1 | head -30'

      # 3. web agent 의 ossec.conf 의 localfile (modsec_audit.log 모니터링)
      ssh 6v6-web 'sudo grep -B1 -A3 "<localfile>" /var/ossec/etc/ossec.conf 2>&1 | head -30'

      # 4. fw agent 의 ossec.conf
      ssh 6v6-fw 'sudo grep -B1 -A3 "<localfile>" /var/ossec/etc/ossec.conf 2>&1 | head -20'

      # 5. agent 의 logcollector 동작 확인
      ssh 6v6-ips 'sudo cat /var/ossec/logs/ossec.log | grep -iE "monitoring|reading" | tail -5'
      ```

      ## 📋 확인 사항

      - default agent.conf: 공통 source (보통 기본 시스템 log)
      - ips: eve.json 모니터링
      - web: modsec_audit.log 모니터링 (W06 에서 점검 — 미설정일 수도)
      - fw: haproxy 또는 nftables log
      - logcollector 가 정상 source 읽고 있음 (ossec.log)

      ## 💡 왜 이걸 하는가?

      각 agent 의 source 정의 + manager 가 배포하는 default group 의 공통 설정 분석.

      ## 🔍 결과 해석

      - **정상**: 3 agent 모두 localfile 정의 + logcollector 동작
      - **운영 권장**:
        - ips 의 eve.json (이미 동작 중)
        - web 의 modsec_audit.log (W10 에서 본격)
        - fw 의 nftables log + haproxy access (W10 보완)
        - bastion 의 ossec.conf (agent 등록 후)
