          duration_days: 7
          alerts_per_day: 40
          brute_force_burst: true
          malware_detection_count: 2
          ar_trigger_count: 4
        mode: append
        cleanup: false
        fallback_only: true
    hint: 'jq keys / .rule / .agent / .data'
