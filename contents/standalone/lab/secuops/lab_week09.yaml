lab_id: standalone-secuops-week09
title: Wazuh manager 도입 — 11 daemon + 3 agent + 룰·디코더 + alerts.json 통합 R/B/P
version: standalone-non-ai
course: secuops
week: 9
description: |
  6v6-siem 의 Wazuh manager 4.10.0 + 11 default daemon + 3 agent (web/ips/fw) +
  bastion 누락 인지 + decoder/rule 구조 + alerts.json 의 정확한 4 sub-section + Suricata
  decoder 매핑 + R/B/P (XSS 5 burst → ips agent ingest → manager alerts.json 추적) +
  운영 트러블슈팅 + 종합 보고서.
difficulty: medium
duration_minutes: 200
prerequisites: [W04-W08]
objectives:
  - "Wazuh 4.10 manager + 11 running daemon + 5 optional"
  - "3 agent (web/ips/fw) + bastion 미등록 인지"
  - "decoder + rule 디렉토리 구조"
  - "alerts.json 4 sub-section (rule + agent + manager + data)"
  - "Suricata decoder 매핑 (rule id 86601)"
  - "rule level 0-15 우선순위"
  - "R/B/P — XSS → alerts.json 통합 추적"
  - "트러블슈팅 + 종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — manager 11 daemon + version + 3 agent baseline

      Wazuh manager 4.10.0 의 11 default + 5 optional daemon 점검 + 3 agent 등록 +
      bastion 누락 인지.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem 'sudo /var/ossec/bin/wazuh-control status 2>&1 | head -20'
      ssh 6v6-siem 'sudo /var/ossec/bin/wazuh-control info | head -5'
      ssh 6v6-siem 'sudo /var/ossec/bin/agent_control -lc'
      ssh 6v6-siem 'sudo ss -tlnp 2>&1 | grep -E "1514|1515|55000"'
      ```

      ## 📋 확인 사항 (실측 2026-05-12)

      - **11 daemon running**: modulesd / monitord / logcollector / remoted /
        syscheckd / analysisd / execd / db / authd / apid (+ vulnerability-detector)
      - **5 optional not running**: clusterd / maild / agentlessd / integratord /
        csyslogd
      - **version**: `WAZUH_VERSION="v4.10.0"`, `WAZUH_TYPE="server"`
      - **agent 4**: 000 manager (Active/Local), 005 web (Active), 006 ips (Active), 007 fw (Active)
      - **listen ports**: 1514 (remoted), 1515 (authd), 55000 (apid)
      - **bastion 누락** — 미등록 agent

      ## 💡 왜 이걸 하는가?

      운영 인수 30초 점검. SIEM 의 핵심 — daemon + agent + port 모두 활성이어야.

      ## 🔍 결과 해석

      - **정상**: 11 daemon + 3 agent + 3 port
      - **운영 권장**:
        - clusterd 활성 (HA 권장)
        - integratord 활성 (Slack / Virustotal SOAR)
        - bastion agent 등록 (보안 보강)
    hint: 'wazuh-control status + agent_control -lc'
    category: survey
    points: 10
    answer: |
      ssh 6v6-siem 'sudo /var/ossec/bin/wazuh-control status 2>&1 | head -20'
      ssh 6v6-siem 'sudo /var/ossec/bin/wazuh-control info | head -5'
      ssh 6v6-siem 'sudo /var/ossec/bin/agent_control -lc'
      ssh 6v6-siem 'sudo ss -tlnp 2>&1 | grep -E "1514|1515|55000"'
    answer_detail: 'Wazuh 4.10.0 + 11 running + 3 agent + 3 listen port + bastion 누락'
    verify:
      type: output_contains
      expect: 'analysisd'
      field: stdout
      semantic:
        intent: "Wazuh manager 11 daemon + 3 agent baseline"
        success_criteria:
          - "11 running daemon"
          - "4.10.0 version"
          - "3 agent + manager"
          - "1514/1515/55000 listen"
          - "bastion 미등록 인지"
        acceptable_methods:
          - "**[OSS] wazuh-control status**"
          - "**[OSS] wazuh-control info**"
          - "**[OSS] agent_control -lc**"
          - "**[OSS] ss -tlnp**"
          - "**[OSS] 16 daemon 중 11 running 인지**"
          - "**[OSS] clusterd / integratord 권장**"
          - "**[OSS] bastion agent 등록 계획**"
          - "**[OSS] REST API 55000/tcp HTTPS**"
