  - order: 2
    instruction: |
      ## 🎯 MISSION — sysmon 설치 *계획서* + 의존성 점검 (시뮬)

      4 단계 설치 절차 + 의존성 (kernel / auditd / libbpf) 사전 점검. **본 step
      은 *실 설치 X*  계획서 + 의존성 검증** — 실 설치는 별 PR (W11 완료 후 운영
      환경 적용).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **microsoft apt repo** — sysmon 의 공식 패키지 source. Ubuntu 22.04 = jammy
      - **sysmon -accepteula -i config.xml** — EULA 동의 + config 적용. 첫 실행 시
        필수
      - **kernel >= 4.18** — eBPF trace point 최소 요구. Ubuntu 22.04 기본 5.x
      - **auditd 충돌** — sysmon 이 auditd subsystem 사용. 동시 실행 시 race
        condition 가능 — auditd 우선 disable 권장

      ## 💻 산출물

      ```bash
      # 1. apt repository + key (Ubuntu 22.04)
      cat <<'EOF'
      sudo wget -O- https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
      echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
      sudo apt-get update
      sudo apt-get install -y sysmonforlinux
      EOF

      # 2. config.xml 다운로드 + sysmon 시작
      cat <<'EOF'
      sudo wget -O /etc/sysmon.xml https://raw.githubusercontent.com/SwiftOnSecurity/sysmon-config/master/sysmon-config-linux.xml
      sudo sysmon -accepteula -i /etc/sysmon.xml
      sudo systemctl enable --now sysmon
      EOF

      # 3. 의존성 점검
      ssh 6v6-web 'uname -r'           # kernel >= 4.18
      ssh 6v6-web 'sudo systemctl status auditd 2>&1 | head -3'
      ssh 6v6-web 'dpkg -l | grep -E "libbpf|bpf" | head -3'

      # 4. 검증 명령
      cat <<'EOF'
      sudo sysmon -s           # 현재 config
      sudo journalctl -u sysmon --since "5 min ago"
      sudo tail /var/log/syslog | grep sysmon | head
      EOF
      ```

      ## 📋 확인 사항

      - 4 단계 설치 명령 (apt repo + 패키지 + config + 시작)
      - kernel >= 4.18 (실측: 6.8 OK)
      - auditd 활성 여부 + 충돌 가능성 인지
      - libbpf 패키지 존재 여부

      ## 💡 왜 이걸 하는가?

      설치 사전 의존성 점검 = *production fail 회피*. eBPF 의존이라 kernel 버전 +
      auditd 호환 *반드시* 사전 검증. 6v6 의 Ubuntu 22.04 기본 호환 — 다른 환경 (예:
      RHEL 8 의 kernel 4.18) 일 시 별 검증.

      ## 🔍 결과 해석

      - **정상**: 4 단계 + kernel 5.x + auditd active + libbpf 1.x
      - **kernel < 4.18**: 설치 불가. kernel upgrade 또는 auditd 만 사용
      - **auditd inactive**: sysmon 직접 사용 가능 (auditd 우선 X)

      ## 비정상 시 대응

      - **apt repo 실패** — 폐쇄망 인 경우 microsoft repo 미접근. *오프라인 .deb*
        다운로드 후 dpkg -i (별도 서버 에서 pull)
      - **kernel 호환 X** — RHEL 8 / CentOS 7 등 LTS 환경 의 *4.18 kernel* 은
        sysmon 4.x 만 지원 (5.x X)
      - **systemctl 명령 없음 (Docker)** — 본 환경 의 bastion 등 컨테이너 는 systemd
        없음. host 직접 설치 필요
    answer: |
      cat <<'EOF'
      # 1. apt 설치
      sudo wget -O- https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft.gpg
      echo "deb [...] microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/microsoft.list
      sudo apt-get update && sudo apt-get install -y sysmonforlinux

      # 2. config + 시작
      sudo wget -O /etc/sysmon.xml https://.../sysmon-config-linux.xml
      sudo sysmon -accepteula -i /etc/sysmon.xml
      sudo systemctl enable --now sysmon

      # 3. 검증
      sudo sysmon -s
      sudo journalctl -u sysmon --since "5 min ago"
      EOF
      ssh 6v6-web 'uname -r'
      ssh 6v6-web 'sudo systemctl status auditd 2>&1 | head -3'
    answer_detail: '4 단계 설치 계획 + kernel + auditd 의존성 점검'
    verify:
      type: output_contains
      expect: sysmonforlinux
      field: stdout
      semantic:
        intent: "설치 계획 + 의존성"
        success_criteria: ["4 단계", "kernel", "auditd"]
        acceptable_methods:
          - "**[OSS] apt repository Microsoft**"
          - "**[OSS] sysmon -accepteula -i**"
          - "**[OSS] sysmon-config-linux.xml**"
          - "**[OSS] systemctl enable --now sysmon**"
          - "**[OSS] uname -r kernel 버전**"
          - "**[OSS] auditd subsystem**"
          - "**[OSS] libbpf 의존성**"
          - "**[OSS] eBPF verifier**"
    target_vm: bastion

  - order: 3
    instruction: |
      ## 🎯 MISSION — config.xml RuleGroup 작성 (Include + Exclude)

      lecture §4 — 6v6 환경 적합 config.xml 설계.

      ## 💻 산출물

      ```xml
      <Sysmon schemaversion="4.40">
        <EventFiltering>
          <RuleGroup name="" groupRelation="or">

            <!-- Event 1 ProcessCreate -->
            <ProcessCreate onmatch="include">
              <CommandLine condition="contains">base64</CommandLine>
              <CommandLine condition="contains">wget http</CommandLine>
              <CommandLine condition="contains">curl http</CommandLine>
              <CommandLine condition="contains">/dev/shm/</CommandLine>
              <CommandLine condition="contains">nc -e</CommandLine>
              <CommandLine condition="contains">bash -i</CommandLine>
              <ParentImage condition="end with">sshd</ParentImage>
            </ProcessCreate>

            <!-- Event 3 NetworkConnect -->
            <NetworkConnect onmatch="include">
              <DestinationPort>4444</DestinationPort>
              <DestinationPort>8080</DestinationPort>
              <DestinationPort>9999</DestinationPort>
            </NetworkConnect>

            <!-- Event 11 FileCreate -->
            <FileCreate onmatch="include">
              <TargetFilename condition="contains">.php</TargetFilename>
              <TargetFilename condition="contains">.jsp</TargetFilename>
              <TargetFilename condition="begin with">/tmp/</TargetFilename>
              <TargetFilename condition="contains">authorized_keys</TargetFilename>
            </FileCreate>

            <!-- Exclude noise -->
            <ProcessCreate onmatch="exclude">
              <Image condition="end with">/systemd</Image>
              <Image condition="end with">/cron</Image>
              <Image condition="end with">/snapd</Image>
            </ProcessCreate>

          </RuleGroup>
        </EventFiltering>
      </Sysmon>
      ```

      ## 📋 확인 사항

      - Include: base64 / wget / curl / /dev/shm / nc -e / bash -i / sshd 부모 / 4444/8080/9999 / .php/.jsp/authorized_keys
      - Exclude: systemd / cron / snapd noise

      ## 💡 왜 이걸 하는가?

      6v6 환경에 적합 + APT TTP 7 패턴 cover. noise exclude 로 alert flood 차단.
    hint: 'RuleGroup or + ProcessCreate/NetworkConnect/FileCreate + include + exclude'
    category: configuration
    points: 18
    answer: |
      cat <<'EOF'
      <Sysmon schemaversion="4.40">
        <EventFiltering>
          <RuleGroup name="" groupRelation="or">
            <ProcessCreate onmatch="include">
              <CommandLine condition="contains">base64</CommandLine>
              <CommandLine condition="contains">wget http</CommandLine>
              <CommandLine condition="contains">/dev/shm/</CommandLine>
              <CommandLine condition="contains">nc -e</CommandLine>
              <CommandLine condition="contains">bash -i</CommandLine>
            </ProcessCreate>
            <NetworkConnect onmatch="include">
              <DestinationPort>4444</DestinationPort>
              <DestinationPort>9999</DestinationPort>
            </NetworkConnect>
            <FileCreate onmatch="include">
              <TargetFilename condition="contains">.php</TargetFilename>
              <TargetFilename condition="begin with">/tmp/</TargetFilename>
              <TargetFilename condition="contains">authorized_keys</TargetFilename>
            </FileCreate>
            <ProcessCreate onmatch="exclude">
              <Image condition="end with">/systemd</Image>
              <Image condition="end with">/cron</Image>
            </ProcessCreate>
          </RuleGroup>
        </EventFiltering>
      </Sysmon>
      EOF
    answer_detail: 'config.xml — Event 1/3/11 + APT TTP 7 패턴 + exclude noise'
    verify:
      type: output_contains
      expect: ProcessCreate
      field: stdout
      semantic:
        intent: "config.xml RuleGroup 작성"
