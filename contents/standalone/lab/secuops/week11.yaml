lab_id: standalone-secuops-week11
title: sysmon-for-linux — 설치 + config + Wazuh 통합 + 6 핵심 Event + R/B/P
version: standalone-non-ai
course: secuops
week: 11
description: |
  6v6 의 4 호스트 (bastion / fw / ips / web) 의 sysmon-for-linux 미설치 인지 + 설치
  계획 + config.xml + Wazuh 통합 + 9 Event ID + Linux 핵심 6 (1/3/5/7/10/11) + R/B/P
  (Red 가 base64 payload → sysmon Event 1 → Wazuh 0800 rule 80100+ → alerts.json
  → dashboard). 종합 보고서.
difficulty: medium
duration_minutes: 200
prerequisites: [W10]
objectives:
  - "sysmon vs osquery 비교 (event stream vs snapshot)"
  - "9 Event ID + Linux 핵심 6"
  - "config.xml RuleGroup + Include/Exclude"
  - "설치 절차 (4 호스트, 의존성)"
  - "Wazuh 0800/0810/0830 룰 활성 확인"
  - "R/B/P — base64 payload → Event 1 → alert"
  - "트러블슈팅 + 종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 4 호스트 sysmon 설치 상태 + Wazuh 룰 활성 확인

      ## 💻 실행 명령

      ```bash
      # 1. 4 호스트 sysmon 설치 상태
      for h in bastion fw ips web; do
        printf "%-8s " "$h"
        ssh 6v6-$h 'command -v sysmon 2>/dev/null || echo NOT_INSTALLED'
      done

      # 2. Wazuh manager 의 sysmon 룰
      ssh 6v6-siem 'sudo ls /var/ossec/ruleset/rules/ | grep sysmon'

      # 3. 9 Event ID + Linux 핵심
      cat <<'EOF'
      ID 1  ProcessCreate    ← Linux 핵심
      ID 3  NetworkConnect   ← Linux 핵심
      ID 5  ProcessTerminate ← Linux 핵심
      ID 7  ImageLoad        ← Linux 핵심
      ID 10 ProcessAccess    ← Linux 핵심
      ID 11 FileCreate       ← Linux 핵심
      ID 13 RegistryEvent (Windows)
      ID 22 DNSEvent (Windows)
      EOF
      ```

      ## 📋 확인 사항

      - 4 호스트 모두 NOT_INSTALLED (현재 상태)
      - Wazuh 의 sysmon 룰 (0330 / 0800 / 0810 / 0820 / 0830 / 0945)
      - 9 Event ID 의미

      ## 💡 왜 이걸 하는가?

      운영 갭 인지 — sysmon 미설치 = host event stream 가시화 부재. W11 본격 설치 필요.
