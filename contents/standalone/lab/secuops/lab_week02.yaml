lab_id: standalone-secuops-week02
title: "W02 — 방화벽 운영(nftables) 콘솔 + 침해대응 7 [W02+W03 통합]"
version: standalone-secuops
course: secuops
week: 2
description: |
  기존 W02(기본) + W03(NAT) 을 1주로 통합한 운영자 실습. 모든 조작은 fw-gui.6v6.lab 콘솔 동작 = 콘솔이
  내부에서 호출하는 API 와 동일한 명령(= nft 명령) 으로 검증한다. 7 시나리오(R/B/P) 를 실제로 풀어
  카운터·conntrack·SIEM 으로 효과를 증명한다. 비운 한 주는 W03 (Windows 엔드포인트) 으로 옮겼다.
difficulty: intermediate
duration_minutes: 150
audience: 보안솔루션 운영 실무 학습자 (정규 secuops 2주차)
prerequisites:
  - "W02 강의안 정독 — 체인/순서/객체/NAT/conntrack/카운터"
  - "secuops-easy W02 완료 (입문 학생인 경우)"
objectives:
  - "fw-gui 콘솔에서 테이블/체인/룰/객체/NAT/conntrack 을 자유롭게 읽는다"
  - "룰의 nft 미리보기 → 적용 → 카운터 증거 보존 의 운영 cycle 을 익힌다"
  - "rate limit / 화이트리스트 / 객체(그룹) / DNAT 4 패턴을 실제 사용한다"
  - "침해대응 7 시나리오(R/B/P) 를 카운터로 증명한다"
  - "방화벽 변경 이벤트가 SIEM(Wazuh) 에 도달함을 확인한다"
  - "실습 룰을 모두 정리(cleanup) 하여 환경을 초기 상태로 돌린다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — 방화벽 구성/가시성 한계 확인

      fw-gui 대시보드를 열어 인터페이스(`eth0`/`eth1`), 테이블(`inet six_filter`/`ip six_nat`),
      룰 수, 연결 수를 확인한다. **편집 가능한 테이블만 콘솔이 만지고**, Docker `ip nat` 은 보호된다.

      ## 💻 확인 명령
      ```bash
      curl -s -H "Host: fw-gui.6v6.lab" http://10.20.30.1/api/status
      ```
      ## ✅ 합격 기준
      tables 에 `six_filter` 가 보인다(편집 가능).
    hint: 'curl /api/status — six_filter 가 tables 에 보여야 함'
    category: survey
    points: 10
    answer: |
      curl -s -H "Host: fw-gui.6v6.lab" http://10.20.30.1/api/status
    answer_detail: "콘솔이 다루는 두 테이블(six_filter/six_nat) 확인. Docker ip nat 은 보호 영역."
    verify:
      type: output_contains
      expect: 'six_filter'
      field: stdout
      semantic:
        intent: "운영자가 첫 화면(대시보드) 에서 인프라 구성과 콘솔이 만지는 범위를 인지"
        success_criteria:
          - "six_filter 보임"
          - "Docker ip nat 이 보호 영역(콘솔 미편집) 임을 이해"
          - "인터페이스 eth0(ext)/eth1(pipe) 의 양다리 구조 인지"
        acceptable_methods:
          - "**[GUI] 대시보드 화면 — 인터페이스/테이블/룰 수 카드 확인 (권장)**"
          - "**[API] curl /api/status — tables 배열에서 editable 필드**"
          - "**[설명] 가시성 한계 — fw 가 dmz 내부 통신(예: WIN.60→WEB.80) 을 못 본다는 점을 1문장 서술**"
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 미션 — 룰 미리보기 = "버튼이 아니라 명령을 배운다"

      룰 만들기 폼에 — 체인 `forward`, 출발지 `10.20.30.202`, 동작 `drop`, 위치 `top` → **명령 미리보기**.
      적용 전에 어떤 nft 명령이 실행될지 확인하는 것이 운영자의 안전 습관이다.

      ## 💻 확인 명령
      ```bash
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/rule/preview \
        -d '{"chain":"forward","saddr":"10.20.30.202","action":"drop","position":"top"}'
      ```
      ## ✅ 합격 기준
      미리보기 명령에 `nft insert rule inet six_filter forward` 가 보인다.
    hint: 'preview 는 미실행. insert=top, add=bottom'
    category: configure
    points: 10
    answer: |
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" http://10.20.30.1/api/rule/preview -d '{"chain":"forward","saddr":"10.20.30.202","action":"drop","position":"top"}'
    answer_detail: "preview = 명령 문자열만 반환(미실행). 위치 top → insert, bottom → add."
    verify:
      type: output_contains
      expect: 'nft insert rule inet six_filter forward'
      field: stdout
      semantic:
        intent: "GUI 동작 = 실제 nft 명령 이라는 본 강의의 핵심 교육철학을 실습 첫 행동으로 각인"
        success_criteria:
          - "preview 가 nft insert rule 문자열을 반환"
          - "insert(top)/add(bottom) 차이를 운영자 언어로 설명 가능"
          - "적용 전 미리보기 단계를 안전 습관으로 인지"
        acceptable_methods:
          - "**[GUI] 룰 만들기 → 명령 미리보기 버튼 — cmdbox 확인 (권장)**"
          - "**[API] POST /api/rule/preview — command 필드**"
          - "**[설명] insert vs add 1문장 + 운영에서 top 위치의 의미 서술**"
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 시나리오 fw-s01 — 악성 IP 즉시 차단 (R/B/P)

      Red — 공격자(10.20.30.202) 가 fw 의 80 으로 60회 요청.
      Blue — forward top 에 `ip saddr 10.20.30.202 drop` 룰 적용.
      Purple — 적용 직후 다시 60회 시도 → **카운터** 가 60 이상으로 올라가면 차단 작동 증명.

      ## 💻 단계 명령
      ```bash
      # Red
      for i in $(seq 1 60); do curl -s -m1 http://10.20.30.1/ >/dev/null; done
      # Blue — GUI 폼 → 미리보기 → 적용. API 는 preview 가 만든 command 문자열을 받는다.
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/rule/apply \
        -d '{"command":"nft insert rule inet six_filter forward ip saddr 10.20.30.202 counter drop"}'
      # Red 다시
      for i in $(seq 1 60); do curl -s -m1 http://10.20.30.1/ >/dev/null; done
      # Purple — 룰셋의 packets 값 확인 (60↑)
      curl -s -H "Host: fw-gui.6v6.lab" "http://10.20.30.1/api/ruleset"
      ```
      ## ✅ 합격 기준
      룰셋 응답에 packets 필드가 보인다 (콘솔 로그·활동 메뉴와 동일 데이터).
    hint: 'apply → 60회 재시도 → /api/ruleset 의 packets'
    category: response
    points: 15
    answer: |
      for i in $(seq 1 60); do curl -s -m1 http://10.20.30.1/ >/dev/null; done
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" http://10.20.30.1/api/rule/apply -d '{"command":"nft insert rule inet six_filter forward ip saddr 10.20.30.202 counter drop"}' >/dev/null
      for i in $(seq 1 60); do curl -s -m1 http://10.20.30.1/ >/dev/null; done
      sleep 1
      curl -s -H "Host: fw-gui.6v6.lab" "http://10.20.30.1/api/ruleset"
    answer_detail: "차단 룰의 효과는 packets 가 누적되었는지로 증명. 콘솔 로그·활동 메뉴와 동일 데이터."
    verify:
      type: output_contains
      expect: 'packets'
      field: stdout
      semantic:
        intent: "악성 IP 단일 차단의 가장 빠른 1차 대응 + 카운터로 효과 증명(운영자의 정직한 증거)"
        success_criteria:
          - "Red 60회 → Blue forward drop → Red 60회 재시도 의 R/B/P 순서 준수"
          - "packets 누적으로 차단 작동 증명"
          - "단일 IP 차단의 한계(분산 출발지) 인지 → fw-s11 객체로 진화 필요성"
        acceptable_methods:
          - "**[GUI] 룰 관리에서 룰 적용 → 로그·활동 카운터 확인 (권장)**"
          - "**[API] POST /api/rule/apply → GET /api/counter — packets 값**"
          - "**[침해대응 훈련] fw-s01 시나리오 ✔ 통과 화면**"
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 시나리오 fw-s03 — SSH brute force 의 가용성 보존형 완화

      22 번을 통째로 막으면 정상 사용자가 못 들어온다. **분당 10회 초과** 의 신규 연결만 drop —
      `tcp dport 22 ct state new limit rate over 10/minute drop`. 폭주만 잡고 정상은 통과.

      ## 💻 단계 명령
      ```bash
      # Blue (rate limit 룰) — GUI 폼이 만들어내는 명령
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/rule/apply \
        -d '{"command":"nft insert rule inet six_filter input tcp dport 22 ct state new limit rate over 10/minute counter drop"}'
      # 확인 — 룰셋에 rate 가 보이는지
      curl -s -H "Host: fw-gui.6v6.lab" http://10.20.30.1/api/ruleset
      ```
      ## ✅ 합격 기준
      룰셋에 `10/minute` 가 보인다.
    hint: 'rate limit 룰 적용 → /api/ruleset 에 10/minute'
    category: response
    points: 15
    answer: |
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" http://10.20.30.1/api/rule/apply -d '{"command":"nft insert rule inet six_filter input tcp dport 22 ct state new limit rate over 10/minute counter drop"}' >/dev/null
      curl -s -H "Host: fw-gui.6v6.lab" http://10.20.30.1/api/ruleset
    answer_detail: "정상 SSH(분당 10회 이하) 는 통과, 폭주만 drop. 가용성을 해치지 않는 방어의 기본 패턴."
    verify:
      type: output_contains
      expect: '10/minute'
      field: stdout
      semantic:
        intent: "가용성을 죽이지 않는 brute force 방어 — '닫는다' 가 아닌 '제한한다' 사고로의 전환"
        success_criteria:
          - "tcp dport 22 + ct state new + limit rate 의 3 요소 조합"
          - "정상 SSH 가 막히지 않는다는 점 이해"
          - "동일 패턴이 9100 같은 다른 관리 포트에도 적용 가능"
        acceptable_methods:
          - "**[GUI] 룰 만들기 폼에 rate 입력 → 미리보기 → 적용 (권장)**"
          - "**[API] POST /api/rule/apply with rate 필드**"
          - "**[침해대응 훈련] fw-s03 ✔**"
    target_vm: attacker

  - order: 5
    instruction: |
      ## 🎯 시나리오 fw-s07 — 화이트리스트 (관리 포트는 관리망에서만)

      9100 (관리 포트) 은 **관리망(pipe 10.20.31.0/24)** 에서만 허용. 그 외 출발지는 drop.
      **순서가 핵심** — accept(좁은 범위) 가 위, drop(전부) 이 아래.

      ## 💻 단계 명령
      ```bash
      # Blue 1: 좁은 허용 (top, insert)
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/rule/apply \
        -d '{"command":"nft insert rule inet six_filter input ip saddr 10.20.31.0/24 tcp dport 9100 counter accept"}'
      # Blue 2: 전체 거부 (아래, add)
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/rule/apply \
        -d '{"command":"nft add rule inet six_filter input tcp dport 9100 counter drop"}'
      # 확인
      curl -s -H "Host: fw-gui.6v6.lab" http://10.20.30.1/api/ruleset | grep -c '9100'
      ```
      ## ✅ 합격 기준
      9100 관련 매처가 2회 이상 등장한다.
    hint: '좁은 accept(insert/top) → 넓은 drop(add/bottom). 9100 매치 카운트 ≥ 2'
    category: response
    points: 15
    answer: |
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" http://10.20.30.1/api/rule/apply -d '{"command":"nft insert rule inet six_filter input ip saddr 10.20.31.0/24 tcp dport 9100 counter accept"}' >/dev/null
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" http://10.20.30.1/api/rule/apply -d '{"command":"nft add rule inet six_filter input tcp dport 9100 counter drop"}' >/dev/null
      C=$(curl -s -H "Host: fw-gui.6v6.lab" http://10.20.30.1/api/ruleset | grep -oE 'dport 9100' | wc -l)
      [ "$C" -ge 2 ] && echo "rules_with_9100=$C OK" || echo "rules_with_9100=$C FAIL"
    answer_detail: "허용 먼저(top) → 거부 나중(bottom). 순서가 바뀌면 관리망도 막힌다 — 화이트리스트 설계의 정석."
    verify:
      type: output_contains
      expect: 'OK'
      field: stdout
      semantic:
        intent: "허용/거부의 순서 의존성 체화 — 화이트리스트 운영 패턴의 가장 흔한 실수 방지"
        success_criteria:
          - "좁은 accept top + 넓은 drop bottom 의 2단 구성"
          - "순서가 바뀔 때 어떻게 망가지는지 설명 가능"
          - "관리망(pipe) 만 허용 = 외부 차단 의 의미 이해"
        acceptable_methods:
          - "**[GUI] 룰 두 건을 차례로 만들어 위치(top/bottom) 다르게 적용 (권장)**"
          - "**[API] 두 번의 /api/rule/apply 호출**"
          - "**[침해대응 훈련] fw-s07 ✔**"
    target_vm: attacker

  - order: 6
    instruction: |
      ## 🎯 시나리오 fw-s08 — DNAT 으로 안전한 공개 + 충돌 확인

      외부에 공개하지 않은 8088 포트로 들어온 트래픽을 내부 웹서버(10.20.32.80:80) 로 보낸다.
      **NAT 만들기 전에** `ss -ltn` 으로 8088 충돌이 없는지 확인 (HAProxy 가 80/443 을 잡고 있다).

      ## 💻 단계 명령
      ```bash
      # NAT 적용 (DNAT) — preview 가 생성한 nft 명령을 그대로 전송
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/nat/apply \
        -d '{"command":"nft add rule ip six_nat prerouting iifname \"eth0\" tcp dport 8088 counter dnat to 10.20.32.80:80"}'
      sleep 1
      # 외부에서 8088 접속 — 응답 코드 자체가 도달의 증거 (000=connection refused 이전 상태)
      curl -s -o /dev/null -w "code=%{http_code}\n" -m 3 http://10.20.30.1:8088/
      ```
      ## ✅ 합격 기준
      응답 코드가 000 이 아닌 값(도달함). 적용 전엔 connection refused/000 이었다.
    hint: 'DNAT 적용 후 8088 접속 — code 가 200/400/403 등 도달 증거'
    category: response
    points: 15
    answer: |
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" http://10.20.30.1/api/nat/apply -d '{"command":"nft add rule ip six_nat prerouting iifname \"eth0\" tcp dport 8088 counter dnat to 10.20.32.80:80"}' >/dev/null
      sleep 1
      CODE=$(curl -s -o /dev/null -w "%{http_code}" -m 3 http://10.20.30.1:8088/)
      echo "code=$CODE reached=$([ "$CODE" != "000" ] && echo yes || echo no)"
    answer_detail: "DNAT prerouting — 외부 8088 → 내부 80. 내부 IP 노출 없이 공개. NAT 만으로는 보안 아님, 차단정책과 함께."
    verify:
      type: output_contains
      expect: 'reached=yes'
      field: stdout
      semantic:
        intent: "DNAT 의 안전한 공개 패턴 + NAT 만으로는 보안이 아니라는 핵심 인지"
        success_criteria:
          - "prerouting DNAT 가 트래픽 도달을 가능케 함"
          - "내부 IP 가 외부에 노출되지 않음을 이해"
          - "공개 포트도 forward 차단 룰의 적용 대상이어야 안전"
        acceptable_methods:
          - "**[GUI] NAT 메뉴에서 DNAT 만들기 → 외부 접속 테스트 (권장)**"
          - "**[API] POST /api/nat/apply + curl 외부 접속**"
          - "**[침해대응 훈련] fw-s08 ✔ + ss -ltn 충돌 확인 절차 1문장**"
    target_vm: attacker

  - order: 7
    instruction: |
      ## 🎯 시나리오 fw-s11 — 객체(그룹)로 다중 차단 + CTI 운영

      악성 IP 가 5개 — 룰 5개 만들지 말고 **객체 1개** 에 5개 IP 를 모은다. 룰은 `@blocklist drop` 1줄.
      새 악성 IP 가 발견되면 **룰은 그대로 두고** 객체에만 추가.

      ## 💻 단계 명령
      ```bash
      # 객체 생성 (create + element 두 nft 명령)
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/object/apply \
        -d '{"create":"nft add set inet six_filter blocklist { type ipv4_addr ; }","element":"nft add element inet six_filter blocklist { 10.20.30.200, 10.20.30.201, 10.20.30.202, 10.20.30.203, 10.20.30.204 }"}'
      # 객체 참조 룰 1개
      curl -s -X POST -H "Host: fw-gui.6v6.lab" -H "Content-Type: application/json" \
        http://10.20.30.1/api/rule/apply \
        -d '{"command":"nft insert rule inet six_filter forward ip saddr @blocklist counter drop"}'
      # 확인 — 룰셋/객체에 blocklist
      curl -s -H "Host: fw-gui.6v6.lab" http://10.20.30.1/api/ruleset | grep -c 'blocklist'
      ```
      ## ✅ 합격 기준
