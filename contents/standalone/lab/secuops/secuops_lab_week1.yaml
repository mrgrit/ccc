lab_id: standalone-secuops-week01
title: 300B 4-tier 인프라 보안 솔루션 점검
version: non-ai
course: secuops
week: 1
description: |
  300B 단일 VM 안의 4-tier (edge / dmz / private / mgmt) 토폴로지 위에서 5종 보안 솔루션
  (nftables / Suricata / ModSecurity / Wazuh / cti-collector) 과 운영 포털이 어떻게 배치·
  동작하는지 직접 명령어로 확인한다. 모든 SSH 는 bastion (port 2204) ProxyJump 모델로 진입.
difficulty: easy
duration_minutes: 120
objectives:
  - 300B 4-tier 토폴로지의 컨테이너 배치와 외부 노출 포트 (80/443/53/2204) 를 파악한다
  - bastion ProxyJump 로 모든 내부 컨테이너에 SSH 접속할 수 있다
  - 5종 보안 솔루션이 정상 동작하는지 명령어로 확인한다
  - WAF 가 SQLi/XSS payload 를 실제 차단하는 것을 확인한다
  - Private 망 internal:true 격리로 backend 직접 접근이 거부됨을 검증한다
  - 운영 포털 (portal.300b.lab) 에서 인프라 전체 상태를 한 화면에 본다
pass_threshold: 0.6

steps:

  - order: 1
    instruction: |
      bastion 컨테이너 ({{BASTION_HOST}} = <VM_IP>:2204) 에 접속하여 hostname 과 자동 생성된
      ssh config 의 alias 목록 (300b-fw, 300b-waf, 300b-ids ...) 을 확인하시오.
    hint: ssh -p 2204 ccc@<VM_IP> 후 'hostname && grep "^Host " ~/.ssh/config'
    category: survey
    points: 10
    answer: hostname && grep -E "^Host " ~/.ssh/config | head -10
    answer_detail: 300B bastion ProxyJump 진입점 검증 — bastion 자체에 모든 내부 컨테이너 alias 가 자동 생성되어 있어야 한다.
    verify:
      type: output_contains
      expect: 300b-
      field: stdout
      semantic:
        intent: |
          bastion 컨테이너 진입점 검증. 단일 외부 노출 포트 (2204) 로 접속 후, ~/.ssh/config 가
          entrypoint 스크립트로 자동 생성되었는지 확인. 모든 내부 컨테이너 (300b-fw, 300b-waf,
          300b-ids, 300b-secu, 300b-attacker 등) 가 alias 로 등록되어야 ProxyJump 학습이 가능.
          MITRE D3FEND D3-AAH (Account Access Hardening) — single audit point.
        success_criteria:
          - hostname 이 300b-bastion (또는 bastion 으로 시작) 출력
          - '"Host 300b-" 패턴이 ~/.ssh/config 에 5개 이상 존재'
          - 최소 300b-fw, 300b-waf 두 개는 alias 에 포함
        acceptable_methods:
          - hostname && grep "^Host " ~/.ssh/config
          - cat /etc/hostname; cat ~/.ssh/config | grep -E '^Host '
          - |
            **[OSS] OpenSSH ssh_config (표준)** — alias 자동화.
              # 1. hostname (확인)
              hostname
              # 2. 등록된 alias 전체
              grep -E '^Host ' ~/.ssh/config
              # 3. 한 alias 의 ProxyJump 설정 상세
              ssh -G 300b-fw 2>/dev/null | grep -E '^proxyjump|^hostname|^user|^port'
              # 4. config 문법 검증
              ssh -G 300b-fw >/dev/null 2>&1 && echo "valid"
            예상 출력: `300b-bastion / Host 300b-fw, 300b-waf, ... / proxyjump 300b-bastion`.
            운영 해석: ProxyJump 가 등록되어 있어야 학생이 단일 명령으로 내부 컨테이너 접속 가능.
            없으면 매번 `ssh -J ccc@VM:2204 ccc@<container>` 로 풀 명령 입력 필요 — 실수 유발.
          - |
            **[OSS] systemd-cat sshd 진입 audit (CloudTrail 풍)** — 단일 audit point.
              # 1. sshd 가 받은 최근 로그인
              sudo tail -10 /var/log/auth.log 2>/dev/null | grep -i 'accepted\|opened'
              # 2. 현재 진입 세션 (자기 포함)
              who -a
              # 3. last 5건 — 누가 언제 들어왔는지
              last -n 5
              # 4. /etc/ssh/sshd_config 의 LogLevel
              grep -E '^(LogLevel|PasswordAuthentication)' /etc/ssh/sshd_config
            예상 출력: `Accepted password for ccc / who -a 출력 / last 5건 / LogLevel INFO`.
            운영 해석: 단일 진입점 = 단일 audit log. 모든 SSH 가 bastion auth.log 에 기록.
        negative_signs:
          - hostname 이 300b-bastion 이 아닌 다른 컨테이너/VM
          - '"Host 300b-" alias 가 없거나 1-2 개만 존재'
          - ssh config 가 비어 있음 (entrypoint 스크립트 미실행)
    target_vm: 300b-bastion

  - order: 2
    instruction: |
      300b-fw 컨테이너에 ProxyJump 로 접속하여 nftables 의 현재 ruleset 을 조회하시오.
      `inet filter` 와 `ip nat` 두 테이블이 보여야 한다.
    hint: ssh 300b-fw 'sudo nft list ruleset | head -20'
    category: survey
    points: 10
    answer: sudo nft list ruleset
    answer_detail: 300B Edge tier 방화벽 룰셋 — table inet filter (input/forward/output) + table ip nat (prerouting/postrouting) 가 entrypoint 스크립트로 로드되어 있어야 한다.
    verify:
      type: output_contains
      expect: table
      field: stdout
      semantic:
        intent: |
          300b-fw 의 nftables 룰셋이 entrypoint 의 nft -f 로 정상 로드되었는지 검증.
          `inet filter` (input policy accept, forward policy drop, output accept) + `ip nat`
          (prerouting/postrouting masquerade) 두 테이블이 존재해야 정상.
          forward chain 의 default drop + ct state established,related accept 패턴이
          AWS Network Firewall 의 stateful filter 와 등가. MITRE D3-NTA, D3FEND Network
          Hardening.
        success_criteria:
          - '"table" 키워드 포함'
          - '"inet filter" 또는 "ip nat" 등 family + name 출력'
          - chain 키워드 (input/forward/output/prerouting/postrouting 중 하나 이상) 포함
        acceptable_methods:
          - sudo nft list ruleset
          - sudo nft list tables
          - sudo nft -j list ruleset (JSON 출력)
          - cat /etc/nftables.conf 또는 /etc/nftables.d/*.nft 직접 조회
          - |
            **[OSS] nft (모던 표준)** — 표준 점검.
              # 1. 전체 ruleset
              sudo nft list ruleset
              # 2. table 단위 요약
              sudo nft list tables
              # 3. JSON 구조화 (자동화·dashboard 통합)
              sudo nft -j list ruleset | jq '[.nftables[] | select(.table) | .table.name]'
              # 4. forward chain 의 룰 수 (300B 는 default drop 정책)
              sudo nft -j list ruleset | jq '[.nftables[] | select(.rule and .rule.chain=="forward")] | length'
            예상 출력: `table inet filter / table ip nat / ["filter","nat"] / 룰 갯수`.
            운영 해석: 300B fw 는 forward default drop + established/related accept 만 — egress
            filtering 은 Phase B 에서 추가. 현재는 socat 이 user space 에서 forward 처리.
          - |
            **[OSS] nft 룰 검증 + 정량 (counter / log)** — 효과 측정.
              # 1. counter 누적 (얼마나 차단되고 있나)
              sudo nft list ruleset | grep -E 'counter|policy'
              # 2. log prefix 룰 (drop 시 dmesg 에 기록)
              sudo nft list ruleset | grep -E 'log prefix'
              # 3. dmesg 에서 drop 로그 (최근 50줄)
              sudo dmesg | grep -E '300b-fw drop' | tail -10
              # 4. nft 가 컨트롤하는 conntrack 통계
              sudo cat /proc/sys/net/netfilter/nf_conntrack_count 2>/dev/null
            예상 출력: `policy drop / log prefix "[300b-fw drop fwd] " / drop 로그 N건`.
            운영 해석: counter 미존재 = 룰 추가 시 counter 절 명시 필요 (학습 포인트).
          - |
            **[OSS] /etc/nftables.d 직접 조회 (IaC)** — 영속성 검증.
              # 1. 영속 정책 파일
              ls -la /etc/nftables.d/ 2>/dev/null || ls /etc/nftables.conf 2>/dev/null
              # 2. 파일 syntax check
              sudo nft -c -f /etc/nftables.d/300b.nft 2>&1 && echo "VALID"
              # 3. 컨테이너 entrypoint 가 nft -f 했는지 stderr 흔적
              docker logs 300b-fw 2>&1 | grep -iE 'nft|nftables' | head -5
              # (위 docker 명령은 host 에서)
              # 4. 적용된 룰과 파일 룰 비교
              diff <(sudo nft list ruleset) <(sudo cat /etc/nftables.d/300b.nft 2>/dev/null) | head
            예상 출력: `300b.nft / VALID / [fw] nftables 룰 로드 완료`.
            운영 해석: 컨테이너 재기동 시 entrypoint 가 매번 nft -f 로 재적용. host 의 IaC 와
            컨테이너 영속 룰셋 분리.
        negative_signs:
          - 명령 실행 없이 이론
          - nft 명령 실패 (Error: No such file or directory) → 컨테이너 부팅 실패
          - table 출력이 비어있음 → entrypoint 의 nft -f 누락
          - 학생이 host VM 의 nftables 를 본 경우 (300b-fw 컨테이너 안에서 실행해야 함)
    target_vm: 300b-fw

  - order: 3
    instruction: |
      300b-fw 컨테이너에서 80/443 포트가 어떤 프로세스로 listen 중인지 확인하시오.
      socat 가 user-space L4 포워더로 동작하여 호스트 :80 → DMZ 의 waf:80 으로 전달한다.
    hint: ss -tlnp | grep -E ':80|:443' 또는 ps -ef | grep socat
    category: survey
    points: 10
    answer: sudo ss -tlnp | grep -E ':80|:443'; ps -ef | grep socat | grep -v grep
    answer_detail: 300B 의 fw 는 nftables DNAT 대신 socat 를 사용한다 — docker-proxy 와의 conntrack 충돌을 회피하고 명시적 user-space forward 로 학습 가시성 확보.
    verify:
      type: output_contains
      expect: socat
      field: stdout
      semantic:
        intent: |
          fw 컨테이너의 80/443 listen 주체가 socat 임을 확인. 일반적인 firewall (PREROUTING
          DNAT) 대신 socat user-space forwarder 를 쓴 이유 — host 측 docker-proxy 가 80 을
          가로채는 환경에서 nft DNAT 가 hit 되지 않음. socat 으로 명시적 forward 시 학생이
          "어디로 패킷이 가는지" 을 docker logs / strace 로 추적 가능. AWS NLB target group
          forwarding 과 유사.
        success_criteria:
          - '"socat" 키워드 포함'
          - 80 또는 443 listen 출력
          - 또는 socat TCP-LISTEN:80 / TCP-LISTEN:443 형태 명령행 보임
        acceptable_methods:
          - sudo ss -tlnp | grep -E ':80|:443'
          - ps -ef | grep socat
          - sudo lsof -i :80 -i :443
          - sudo netstat -tlnp | grep -E ':80|:443'
          - |
            **[OSS] ss + ps (process socket 매핑)** — 표준.
              # 1. listen + process
              sudo ss -tlnp 'sport = :80 or sport = :443'
              # 2. socat 명령행 풀 출력 (어디로 forward 하는지)
              ps -ef | grep '[s]ocat'
              # 3. 동일 포트의 active 연결 (현재 흐르는 트래픽)
              sudo ss -tn '( sport = :80 or sport = :443 )' state established
              # 4. socat 의 PID 를 통한 inode → file 추적
              SPID=$(pgrep -f 'socat TCP-LISTEN:80' | head -1)
              [ -n "$SPID" ] && sudo ls -la /proc/$SPID/fd 2>/dev/null | head
            예상 출력: `LISTEN 0 5 *:80 socat / socat TCP-LISTEN:80,reuseaddr,fork TCP:172.30.20.20:80`.
            운영 해석: socat 이 fork 모드로 동작 — 연결마다 자식 프로세스 생성. 부하 시 PID 수 증가.
          - |
            **[OSS] curl 동작 검증 (실제 forward 되나)** — 동작.
              # 1. fw 컨테이너 내부에서 자기 자신 :80 호출
              curl -sI -H 'Host: juice.300b.lab' http://localhost/ | head -3
              # 2. waf 컨테이너에서 응답이 오는지 (X-Powered-By 등 헤더로 확인)
              curl -s -o /dev/null -w '응답: %{http_code} time: %{time_total}s\n' \
                -H 'Host: juice.300b.lab' http://localhost/
              # 3. WAF 우회 시도 (직접 backend 으로) — 실패해야 정상 (격리)
              curl -m 3 -sI http://172.30.30.10:3000/ 2>&1 | head -2 || echo "거부됨 — 격리 OK"
              # 4. socat 의 forward 로그 (연결 수)
              SPID=$(pgrep -f 'socat TCP-LISTEN:80' | head -1)
              [ -n "$SPID" ] && sudo ls /proc/$SPID/fd 2>/dev/null | wc -l
            예상 출력: `HTTP/1.1 200 OK / 응답 200 / 거부됨 / FD 수`.
            운영 해석: socat 은 listen + 자식 fork 이라 FD 가 증가. 메모리 leak 모니터링 가능.
          - |
            **[OSS] strace / tcpdump (deep dive)** — 진단.
              # 1. socat 의 syscall trace (한 연결만)
              SPID=$(pgrep -f 'socat TCP-LISTEN:80' | head -1)
              [ -n "$SPID" ] && sudo timeout 3 strace -p $SPID -e trace=accept4,read,write 2>&1 | head -20
              # 2. tcpdump 으로 host:80 → waf:80 패킷 캡처
              sudo timeout 5 tcpdump -i any -nn 'tcp port 80' -c 10 2>&1 | head -15
              # 3. conntrack 으로 NAT 흐름 (80 의 DNAT 흔적이 있나? 없어야 정상)
              sudo conntrack -L 2>/dev/null | grep ':80' | head -5
              # 4. iptables/nft 의 DNAT chain (학습용 — 실제로는 hit 안 됨)
              sudo nft list chain ip nat prerouting 2>/dev/null
            예상 출력: `accept4(...)/ tcpdump 패킷 / conntrack 출력 / chain prerouting`.
            운영 해석: conntrack 에 :80 DNAT 흔적 없음 = socat 만이 forward 처리한다는 증거.
        negative_signs:
          - socat 미존재 → entrypoint 가 socat 기동 못 함
          - 80/443 listen 이 docker-proxy 만 보임 → 컨테이너 내부 socat 없음 (host 시점)
          - socat 명령행에 forward target 누락
    target_vm: 300b-fw

  - order: 4
    instruction: |
      300b-fw 의 dnsmasq 에 juice.300b.lab 과 portal.300b.lab 을 질의하여 두 도메인 모두
      VM_IP 로 응답되는지 확인하시오. wildcard 룰 (`address=/300b.lab/<VM_IP>`) 이 sub-domain
      에 적용되어야 정상.
    hint: dig @127.0.0.1 +short juice.300b.lab; dig @127.0.0.1 +short portal.300b.lab
    category: survey
    points: 10
    answer: dig @127.0.0.1 +short juice.300b.lab; dig @127.0.0.1 +short portal.300b.lab
    answer_detail: 300B 사설 DNS — dnsmasq 의 wildcard `address=/300b.lab/<HOST_IP>` 가 도메인 자체 + 모든 sub-domain 을 VM IP 로 응답 (AWS Route 53 private hosted zone 시뮬레이션). 학생 PC 가 VM IP 를 DNS 서버로 지정 시 /etc/hosts 편집 없이 사용 가능.
    verify:
      type: regex_match
      expect: ^\d+\.\d+\.\d+\.\d+$
      field: stdout
      semantic:
        intent: |
          dnsmasq 의 wildcard 응답 검증. 두 sub-domain 모두 동일 VM IP 로 응답해야 정상.
          dnsmasq 문법 주의 — `address=/300b.lab/IP` (앞 점 없음) 가 도메인 + sub-domain
          매칭. `address=/.300b.lab/IP` (앞 점 있음) 는 sub-domain 만 매칭하여 도메인 자체에는
          NXDOMAIN 응답. 또한 `server=127.0.0.11` (docker DNS) 추가 시 forward 루프로 CPU
          폭주 + UDP 큐 적체 → query timeout 발생 (이미 알려진 hazard).
        success_criteria:
          - juice.300b.lab 응답이 IPv4 형식
          - portal.300b.lab 응답이 IPv4 형식
          - 두 응답이 동일 IP (VM_IP)
        acceptable_methods:
          - dig @127.0.0.1 +short juice.300b.lab
          - nslookup juice.300b.lab 127.0.0.1
          - getent hosts juice.300b.lab (resolv.conf 가 dnsmasq 면)
          - host juice.300b.lab 127.0.0.1
          - |
            **[OSS] dig (표준 DNS 질의 도구)** — 표준.
              # 1. juice.300b.lab → IP
              dig @127.0.0.1 +short juice.300b.lab
              # 2. 도메인 자체도 응답 (wildcard 정상 동작 검증 — 앞 점 없음)
              dig @127.0.0.1 +short 300b.lab
              # 3. sub-domain 다수 일괄 (모두 동일 IP 응답해야)
              for d in juice dvwa wazuh portal bastion; do
                printf '%-15s %s\n' "$d.300b.lab" "$(dig @127.0.0.1 +short $d.300b.lab)"
              done
              # 4. 외부 도메인 forward (dnsmasq 가 8.8.8.8 으로 forward)
              dig @127.0.0.1 +short google.com | head -1
            예상 출력: `192.168.0.114 / 192.168.0.114 / 모두 동일 IP / 142.250.x.x`.
            운영 해석: 모든 sub-domain 이 동일 IP. 외부 도메인도 정상 forward (server=8.8.8.8).
          - |
            **[OSS] dnsmasq config + log 검증** — 진단.
              # 1. config 의 wildcard 룰 (앞 점 없어야 정상)
              cat /etc/dnsmasq.d/300b.conf | grep -E '^address|^server'
              # 2. log 에서 query 흔적 (log-queries 활성화 시)
              sudo tail -20 /var/log/dnsmasq.log | head
              # 3. 프로세스 + CPU (forward 루프 시 CPU 폭주)
              ps -o pid,ppid,user,%cpu,%mem,etime,comm -p $(pgrep dnsmasq | head -1)
              # 4. UDP 53 socket 적체 검사 (큐 길이)
              sudo ss -unlp 'sport = :53'
            예상 출력: `address=/300b.lab/192.168.0.114 / 4 server / CPU < 5% / Recv-Q ~0`.
            운영 해석: CPU > 50% 또는 Recv-Q > 1000 = forward 루프 hazard. 즉시 server=127.0.0.11
            제거 + restart.
          - |
            **[OSS] 외부 PC 검증 (학생 PC 시점)** — 실사용 검증.
              # 학생 PC 윈도우 cmd:
              #   nslookup juice.300b.lab <VM_IP>
              #   nslookup portal.300b.lab <VM_IP>
              # 학생 PC 리눅스:
              #   dig @<VM_IP> +short juice.300b.lab
              # PowerShell:
              #   Resolve-DnsName -Name juice.300b.lab -Server <VM_IP>
              # TCP 도달성 (UDP 차단 시 fallback)
              #   Test-NetConnection -ComputerName <VM_IP> -Port 53
            예상 출력: `학생 PC 에서 juice.300b.lab → <VM_IP> 응답`.
            운영 해석: VM 안에서는 동작하는데 학생 PC 에서 안 되면 → host 53 포트 binding
            확인 또는 UDP 차단 의심.
        negative_signs:
          - 응답이 비어있거나 NXDOMAIN
