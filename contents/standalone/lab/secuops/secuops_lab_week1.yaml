      curl -s -o /dev/null -w "Bot  %{http_code}\n" -A 'sqlmap/1.7' -H 'Host: juice.300b.lab' http://localhost/
      curl -s -o /dev/null -w "SQLi %{http_code}\n" -H 'Host: juice.300b.lab' "http://localhost/?q=' UNION SELECT 1,2,3 FROM Users--"
      curl -s -o /dev/null -w "XSS  %{http_code}\n" -H 'Host: juice.300b.lab' "http://localhost/?q=<script>alert(1)</script>"
      sudo tail -50 /var/log/apache2/modsec_audit.log | grep -E 'id "9[0-4][0-9]+"' | head -5
    answer_detail: WAF 효과 직접 검증 — paranoia 1 + threshold 5 환경에서 명확한 SQLi/XSS payload 는 anomaly score 누적으로 403 응답 + audit log 에 CRS 룰 ID (942100/941100 등) 기록.
    verify:
      type: output_contains
      expect: '403'
      field: stdout
      semantic:
        intent: |
          ModSecurity CRS 가 실제로 차단하는지 4가지 payload (정상/Bot UA/SQLi/XSS) 응답 코드
          비교로 검증. 정상 = 200, Bot UA (sqlmap) = 403 (CRS 913 scanner detection), SQLi
          (UNION SELECT) = 403 (CRS 942), XSS (<script>) = 403 (CRS 941). audit log 에는
          매칭된 룰 ID + msg + matched data 가 JSON 형태로 기록된다. AWS WAF 의 sampled
          requests 와 등가.
        success_criteria:
          - '"403" 출력 (최소 1개 payload 가 차단됨)'
          - CRS 룰 ID 형태 (9xx 숫자) 또는 "ModSecurity" 키워드가 audit log 결과에 등장
          - 정상 200 도 출력 (대조군)
        acceptable_methods:
          - curl -A 'sqlmap/...' (Bot UA 트리거)
          - curl '?q=<script>...</script>' (XSS)
          - curl '?q=UNION SELECT' (SQLi)
          - sudo tail modsec_audit.log
          - sudo grep 'Access denied' /var/log/apache2/error.log
          - |
            **[OSS] curl 다양 payload 일괄 발사** — 표준.
              # 1. 4가지 payload 응답 코드
              for p in 'normal' 'sqlmap-ua' 'sqli' 'xss' 'lfi'; do
                case $p in
                  normal)    H='-H Host:juice.300b.lab'; UA=''; PATH_='/' ;;
                  sqlmap-ua) H='-H Host:juice.300b.lab'; UA="-A sqlmap/1.7"; PATH_='/' ;;
                  sqli)      H='-H Host:juice.300b.lab'; UA=''; PATH_="/?q=' UNION SELECT 1,2,3 FROM Users--" ;;
                  xss)       H='-H Host:juice.300b.lab'; UA=''; PATH_="/?q=<script>alert(1)</script>" ;;
                  lfi)       H='-H Host:juice.300b.lab'; UA=''; PATH_='/?file=../../../../etc/passwd' ;;
                esac
                CODE=$(curl -s -o /dev/null -w '%{http_code}' $UA $H "http://localhost$PATH_")
                printf '%-12s → %s\n' "$p" "$CODE"
              done
              # 2. audit log 의 차단 룰
              sudo tail -100 /var/log/apache2/modsec_audit.log 2>/dev/null \
                | grep -oE 'id "[0-9]+"' | sort | uniq -c | sort -rn | head -10
              # 3. error.log 의 ModSec Warning
              sudo tail -50 /var/log/apache2/error.log | grep -i modsec | tail -5
              # 4. 응답 헤더 (X-Forwarded-* 등)
              curl -sI -A 'sqlmap/1.7' -H 'Host: juice.300b.lab' http://localhost/
            예상 출력: `normal 200 / sqlmap-ua 403 / sqli 403 / xss 403 / lfi 403 / id "942100" "941100" "930100"`.
            운영 해석: 403 4건 → CRS 정상. 200 만 나오면 paranoia 1 + threshold 5 로는 단일 룰
            score 부족 (paranoia 2 또는 threshold 3 으로 조정 학습).
          - |
            **[OSS] modsec_audit.log JSON 분석 (deep dive)** — 분석.
              # 1. audit log 형식 (300B 는 보통 SecAuditLogFormat JSON)
              sudo head -1 /var/log/apache2/modsec_audit.log
              # 2. 차단 (Access denied) vs 경고 (Warning) 분포
              sudo grep -c 'Access denied' /var/log/apache2/modsec_audit.log
              sudo grep -c '"action":"warning"\|"phase":' /var/log/apache2/modsec_audit.log 2>/dev/null
              # 3. 시간대별 (최근 1시간)
              sudo tail -500 /var/log/apache2/modsec_audit.log | grep -oE '\[[0-9]+/[A-Z][a-z]+/[0-9]+:[0-9]+' | sort | uniq -c | tail
              # 4. 가장 자주 매칭된 룰 ID (룰 튜닝 후보)
              sudo grep -oE 'id "[0-9]+"' /var/log/apache2/modsec_audit.log | sort | uniq -c | sort -rn | head
            예상 출력: `JSON 또는 multi-line / Access denied N건 / 시간대 분포 / Top 룰 ID`.
            운영 해석: Top 매칭 룰 = 학생 환경의 주된 위협 카테고리. SQLi 가 1위면 SQLi 학습 강조.
          - |
            **[OSS] OWASP CRS 자체 테스트 (FTW + Go-FTW)** — 정밀.
              # CRS 공식 테스트 러너 — 룰 정확성 검증
              # 1. ftw (Python) 또는 go-ftw 설치 확인
              which ftw go-ftw 2>/dev/null
              # 2. CRS 의 tests 디렉토리 (있으면)
              find / -name 'tests' -path '*crs*' 2>/dev/null | head
              # 3. 단일 SecRule 테스트 (예: 942100)
              # ftw run -d /usr/share/modsecurity-crs/tests/regression/tests/REQUEST-942-APPLICATION-ATTACK-SQLI/942100.yaml
              # 4. CRS 의 default action 검증
              sudo grep -E 'SecDefaultAction|tx.crs_setup_version' /etc/modsecurity/crs/crs-setup.conf | head
            예상 출력: `ftw 미설치 / 942100 테스트 PASS / SecDefaultAction phase:1,log,auditlog,pass`.
            운영 해석: FTW 는 룰 정확성 정량화 도구 — CRS 업데이트 시 회귀 검증.
        negative_signs:
          - 모든 payload 가 200 (WAF 비활성 또는 SecRuleEngine Off)
          - 정상 요청도 403 (Bot UA 외 false positive)
          - audit log 가 비어있음 (`SecAuditLog` 미설정)
          - Host 헤더 누락 → default vhost 응답으로 전혀 다른 룰 적용
