  - order: 3
    instruction: |
      ## 🎯 MISSION — ModSec audit ship 설계 + 패치 시뮬

      lecture §4 — web agent 의 ossec.conf 의 localfile 추가 + decoder 매핑 + 적용 후
      검증 흐름.

      ## 💻 실행 명령

      ```bash
      # 1. 현재 상태 — web 의 ossec.conf 에 modsec_audit 없음 확인
      echo "=== 현재 상태 ==="
      ssh 6v6-web 'sudo grep -c "modsec_audit" /var/ossec/etc/ossec.conf'    # 0 예상

      # 2. patch 시뮬 (실 적용 X — 학습용)
      echo
      echo "=== Patch 시뮬 ==="
      cat <<'EOF'
      # /var/ossec/etc/ossec.conf 의 <ossec_config> 안 (web agent)
      <localfile>
        <log_format>json</log_format>
        <location>/var/log/apache2/modsec_audit.log</location>
      </localfile>
      EOF

      # 3. Wazuh ruleset 의 Apache 룰 활성 확인
      echo
      echo "=== Wazuh apache rule 활성 ==="
      ssh 6v6-siem 'sudo ls /var/ossec/ruleset/rules/ | grep -iE "apache|modsec" | head'
      ssh 6v6-siem 'sudo head -10 /var/ossec/ruleset/rules/0250-apache_rules.xml 2>&1'

      # 4. 적용 절차 (시뮬, 실 적용 시 단계)
      echo
      echo "=== 적용 절차 (시뮬) ==="
      cat <<'EOF'
      1. ossec.conf 패치 (web agent)
      2. wazuh-control restart (web)
      3. attacker XSS 트리거
      4. alerts.json 의 web agent + apache 룰 매치 검증
      EOF

      # 5. 실 적용 시 검증 명령 (학습용)
      echo
      echo "=== 검증 명령 (실 적용 후) ==="
      echo "BEFORE=\$(ssh 6v6-siem 'sudo wc -l /var/ossec/logs/alerts/alerts.json')"
      echo "ssh 6v6-attacker 'curl -H \"Host: juice.6v6.lab\" http://10.20.30.1/?q=<script>'"
      echo "AFTER=\$(...) — agent.name web 매치 확인"
      ```

      ## 📋 확인 사항

      - 현재 web agent 에 modsec_audit 미설정 (count 0)
      - Patch 시뮬 (3 라인 localfile)
      - Wazuh 의 0250-apache_rules.xml 활성
      - 적용 절차 + 검증 명령 인지

      ## 💡 왜 이걸 하는가?

      6v6 의 운영 갭 보완 — ModSec audit log 가 manager 로 ship 되어야 dashboard 의
      Modules > Security events 에 web agent 의 알람 표시.

      ## 🔍 결과 해석

      - **정상**: 현재 미설정 인지 + patch 시뮬 + 검증 명령
      - **운영 권장**:
        - manager 측 shared agent.conf (default group) 로 web agent group 설정
        - DetectionOnly 1주 모니터 후 실 적용
        - audit log size logrotate
        - Wazuh ruleset 의 0250 + 0260 (modsec) + 0285 (Apache) 모두 활성
    hint: 'web ossec.conf 의 localfile + modsec_audit.log + 0250-apache_rules.xml'
    category: integration
    points: 15
    answer: |
      ssh 6v6-web 'sudo grep -c "modsec_audit" /var/ossec/etc/ossec.conf'
      echo "Patch:"
      cat <<'EOF'
      <localfile>
        <log_format>json</log_format>
        <location>/var/log/apache2/modsec_audit.log</location>
      </localfile>
      EOF
      ssh 6v6-siem 'sudo ls /var/ossec/ruleset/rules/ | grep -iE "apache|modsec" | head'
      ssh 6v6-siem 'sudo head -10 /var/ossec/ruleset/rules/0250-apache_rules.xml 2>&1'
    answer_detail: 'web ossec.conf 의 modsec_audit localfile patch 시뮬 + Wazuh 0250 룰'
    verify:
      type: output_contains
      expect: apache
      field: stdout
      semantic:
        intent: "ModSec audit ship 설계 + 패치 시뮬"
        success_criteria: ["미설정 인지", "patch 시뮬", "0250 활성"]
        acceptable_methods:
          - "**[OSS] ossec.conf <localfile> log_format json**"
          - "**[OSS] modsec_audit.log path**"
          - "**[OSS] /var/ossec/ruleset/rules/0250-apache**"
          - "**[OSS] manager shared agent.conf**"
          - "**[OSS] DetectionOnly 1주 검증**"
          - "**[OSS] logrotate audit log**"
          - "**[OSS] Wazuh 의 audit_data.messages parse**"
          - "**[OSS] anomaly score 매핑**"
    target_vm: bastion

  - order: 4
    instruction: |
      ## 🎯 MISSION — osquery 통합 설계 (osqueryd enable + log ship)

      lecture §5 — 6v6 osquery 의 ad-hoc only → daemon 운영 + Wazuh ship 의 3 단계.

      ## 💻 실행 명령

      ```bash
      # 1. 현재 상태 (W07 에서 확인)
      ssh 6v6-web 'sudo systemctl status osqueryd 2>&1 | head -3'
      ssh 6v6-web 'sudo ls /etc/osquery 2>&1'
      ssh 6v6-web 'sudo ls /var/log/osquery 2>&1'

      # 2. 통합 설계 — 3 단계
      echo
      echo "=== 3 단계 통합 설계 ==="
      cat <<'EOF'
      [1] osquery.conf 작성 (4 호스트 공통)
        - file_paths (system_etc / ssh_keys / cron_paths)
        - schedule (process_snapshot / new_users / listening_ports / file_changes)
        - logger_path /var/log/osquery

      [2] osqueryd enable
        sudo systemctl enable --now osqueryd
        sudo systemctl status osqueryd

      [3] Wazuh agent 의 localfile 추가
        <localfile>
          <log_format>json</log_format>
          <location>/var/log/osquery/osqueryd.results.log</location>
        </localfile>
      EOF

      # 3. Wazuh ruleset 의 osquery 룰 활성 확인
      echo
      echo "=== Wazuh osquery rule ==="
      ssh 6v6-siem 'sudo ls /var/ossec/ruleset/rules/ | grep osquery'
      ssh 6v6-siem 'sudo grep -l "osquery" /var/ossec/ruleset/decoders/* | head -3'

      # 4. 통합 후 효과
      echo
      echo "=== 통합 후 효과 ==="
      cat <<'EOF'
      - dashboard 의 Modules > File Integrity Monitoring 에 osquery file_events 표시
      - Discovery 에서 rule.groups: "osquery" 필터
      - new_users alert 자동 발생 (60-600초 polling)
      - baseline 의 diff 분기 검토
      EOF
      ```

      ## 📋 확인 사항

      - osqueryd 미운영 + /etc/osquery 없음 (현재 상태)
      - 3 단계 통합 설계
      - Wazuh 의 0545-osquery_rules.xml 활성
      - 통합 후 효과 4 항목

      ## 💡 왜 이걸 하는가?

      W07 의 osquery (ad-hoc only) → 운영 grade 통합 (daemon + scheduled + ship +
      dashboard). production 시 매주 baseline diff + anomaly alert.

      ## 🔍 결과 해석

      - **정상**: 3 단계 설계 + Wazuh 룰 활성 확인 + 효과 명시
      - **운영 권장**:
        - 4 호스트 (bastion / fw / ips / web) 모두 osqueryd
        - schedule_splay_percent — load 분산
        - host_identifier hostname — alerts.json 의 agent 매핑
        - daily / weekly differential — baseline diff
    hint: 'osquery.conf + osqueryd enable + Wazuh agent localfile + 0545-osquery rule'
    category: integration
    points: 15
    answer: |
      ssh 6v6-web 'sudo systemctl status osqueryd 2>&1 | head -3'
      ssh 6v6-web 'sudo ls /etc/osquery 2>&1'
      echo "=== 3 단계 설계 ==="
      cat <<'EOF'
      [1] osquery.conf — file_paths / schedule / logger_path
      [2] systemctl enable --now osqueryd
      [3] <localfile><log_format>json</log_format><location>/var/log/osquery/osqueryd.results.log</location></localfile>
      EOF
      ssh 6v6-siem 'sudo ls /var/ossec/ruleset/rules/ | grep osquery'
      ssh 6v6-siem 'sudo grep -l "osquery" /var/ossec/ruleset/decoders/* | head -3'
    answer_detail: '3 단계 통합 설계 + Wazuh 0545 osquery 룰 + 효과 4'
    verify:
      type: output_contains
      expect: osquery
      field: stdout
      semantic:
        intent: "osquery 통합 설계 — daemon + ship"
        success_criteria: ["현재 미운영 인지", "3 단계 설계", "Wazuh osquery 룰"]
        acceptable_methods:
          - "**[OSS] systemctl enable --now osqueryd**"
          - "**[OSS] /etc/osquery/osquery.conf**"
          - "**[OSS] file_paths + schedule + logger_path**"
          - "**[OSS] Wazuh agent localfile json**"
          - "**[OSS] /var/ossec/ruleset/rules/0545-osquery**"
          - "**[OSS] schedule_splay_percent**"
          - "**[OSS] host_identifier hostname**"
          - "**[OSS] daily/weekly differential**"
    target_vm: bastion

  - order: 5
    instruction: |
      ## 🎯 MISSION — syscheck FIM directives + 트리거 + alerts.json 검증

      lecture §6 — Wazuh 자체 FIM (syscheck daemon) + 트리거 후 rule 550 매치.

      ## 💻 실행 명령

      ```bash
      # 1. manager 의 syscheck 설정
      ssh 6v6-siem 'sudo grep -B1 -A15 "<syscheck>" /var/ossec/etc/ossec.conf 2>&1 | head -30'

      # 2. agent 측 (web) 의 syscheck 활성
      ssh 6v6-web 'sudo grep -B1 -A5 "<syscheck>" /var/ossec/etc/ossec.conf 2>&1 | head -15'

      # 3. baseline alerts.json
      BEFORE=$(ssh 6v6-siem 'sudo wc -l /var/ossec/logs/alerts/alerts.json | awk "{print \$1}"')
      echo "baseline: $BEFORE"

      # 4. 파일 변경 트리거 (web /etc/passwd touch)
      ssh 6v6-web 'sudo bash -c "touch /etc/passwd"'   # mtime 변경
      sleep 15   # syscheck realtime + ship + analysisd

      # 5. rule 550 검색
      AFTER=$(ssh 6v6-siem 'sudo wc -l /var/ossec/logs/alerts/alerts.json | awk "{print \$1}"')
      echo "after: $AFTER  delta: $((AFTER - BEFORE))"
      ssh 6v6-siem 'sudo tail -20 /var/ossec/logs/alerts/alerts.json | jq "select(.rule.groups | contains([\"syscheck\"])) | {rule_id:.rule.id, desc:.rule.description, agent:.agent.name}"' 2>&1 | head

      # 6. realtime vs scheduled (frequency 차이)
      echo
      echo "=== syscheck 의 두 모드 ==="
      cat <<'EOF'
      realtime="yes"  — inotify 즉시 (1-2초 지연)
      frequency 3600  — 1시간 마다 전체 스캔 (hash 비교)
      EOF
      ```

      ## 📋 확인 사항

      - manager + agent 의 syscheck 정의 (보통 /etc/ + /root/.ssh 등)
      - baseline / after delta (1+ 가 syscheck 동작 흔적)
      - rule 550 또는 비슷한 syscheck rule 매치
      - realtime vs scheduled 차이

      ## 💡 왜 이걸 하는가?

      Wazuh 자체 FIM 동작 + alerts.json 적재 검증. dashboard 의 Modules > Integrity
      monitoring 에서 시각화.

      ## 🔍 결과 해석

      - **정상**: rule 550+ 매치 + agent.name 정확
      - **운영 권장**:
        - 핵심 path (/etc/passwd, /etc/shadow, /root/.ssh, /etc/cron.d) realtime
        - 광범위 path (/usr/bin) 는 frequency
        - ignore 룰 — /etc/mtab / /etc/resolv.conf (자주 변경, FP)
        - report_changes — 변경 내용 (diff) 포함
    hint: 'syscheck directives + touch /etc/passwd + rule 550'
    category: configuration
    points: 15
    answer: |
      ssh 6v6-siem 'sudo grep -B1 -A15 "<syscheck>" /var/ossec/etc/ossec.conf 2>&1 | head -30'
      ssh 6v6-web 'sudo grep -B1 -A5 "<syscheck>" /var/ossec/etc/ossec.conf 2>&1 | head -15'
      BEFORE=$(ssh 6v6-siem 'sudo wc -l /var/ossec/logs/alerts/alerts.json | awk "{print \$1}"')
      echo "baseline: $BEFORE"
