lab_id: standalone-secuops-week10
title: Wazuh dashboard + 통합 운영 — osquery / ModSec audit / FIM / Active Response / R/B/P
version: standalone-non-ai
course: secuops
week: 10
description: |
  6v6 의 dashboard (5601) + indexer (9200) + 통합 운영 — ModSec audit ship 설정 +
  osquery 통합 설계 + syscheck FIM + Active Response 시뮬 + 6v6 운영 갭 4 (인증 /
  ModSec ship / osquery daemon / sysmon 미설치) + R/B/P (XSS 5 burst → 5 source
  dashboard 통합) + 종합 보고서. 한 cycle.
difficulty: medium
duration_minutes: 200
prerequisites: [W09]
objectives:
  - "dashboard + indexer 접근 + 인증"
  - "5 main panel (Overview / Agents / Modules / Discovery / Rules) 인지"
  - "OpenSearch 색인 + KQL 쿼리"
  - "ModSec audit ship 설계 + 검증"
  - "osquery 통합 설계 (osqueryd + ship)"
  - "syscheck FIM directives"
  - "Active Response 시뮬"
  - "R/B/P — XSS → 5 source 통합"
  - "트러블슈팅 + 종합 보고서"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — dashboard 접근 + 인증 + OpenSearch indexer 활성 검증

      6v6 의 dashboard / indexer / filebeat 3 컨테이너 활성 + 외부 접근 검증.

      ## 💻 실행 명령

      ```bash
      # 1. 3 컨테이너 활성
      ssh 6v6-bastion 'docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "siem|wazuh-indexer|wazuh-dashboard"'

      # 2. dashboard listen port (컨테이너 내부)
      ssh 6v6-wazuh-dashboard 'sudo ss -tlnp 2>&1 | grep 5601 | head' 2>/dev/null || echo "ss 미설치 — netstat 대체"

      # 3. HAProxy 의 dashboard backend
      ssh 6v6-fw 'sudo grep -A2 "backend dashboard" /etc/haproxy/haproxy.cfg'

      # 4. 외부 접근 (학생 PC 가 siem.6v6.lab 로)
      curl -k -o /dev/null -s -w "HTTPS: %{http_code}\n" -H "Host: siem.6v6.lab" "https://10.20.30.1/"
      curl -k -L -o /dev/null -s -w "redirect: %{http_code}\n" -H "Host: siem.6v6.lab" "https://10.20.30.1/login"

      # 5. indexer 활성 (manager 측에서 internal)
      ssh 6v6-siem 'curl -k -u admin:admin https://10.20.32.110:9200/_cluster/health 2>&1 | head -3'

      # 6. filebeat 상태
      ssh 6v6-siem 'sudo systemctl status filebeat 2>&1 | head -5' 2>/dev/null || echo "service 다른 형태"
      ```

      ## 📋 확인 사항

      - 3 컨테이너 (siem / wazuh-indexer / wazuh-dashboard) 모두 Up
      - dashboard 의 5601 listen
      - HAProxy 의 backend dashboard (TLS passthrough)
      - 외부 접근 → 302 또는 401 (인증 필요)
      - indexer 의 cluster health (auth 후)
      - filebeat ship 동작

      ## 💡 왜 이걸 하는가?

      운영 인수 30초 — dashboard + indexer + filebeat 가 살아 있어야 SIEM 의 운영 가시성
      유지.

      ## 🔍 결과 해석

      - **정상**: 3 컨테이너 Up + 302/401 응답 + cluster health green/yellow
      - **비정상 1**: dashboard 5601 미열림 → 컨테이너 entrypoint 점검
      - **비정상 2**: 401 Unauthorized but auth 정확 → password reset (wazuh-passwords-tool)
      - **비정상 3**: cluster health red → indexer 부하 / disk full
    hint: 'dashboard 5601 + HAProxy backend dashboard + indexer 9200'
    category: survey
    points: 12
    answer: |
      ssh 6v6-bastion 'docker ps --format "{{.Names}}\t{{.Status}}" | grep -E "siem|wazuh-indexer|wazuh-dashboard"'
      ssh 6v6-fw 'sudo grep -A2 "backend dashboard" /etc/haproxy/haproxy.cfg'
      curl -k -o /dev/null -s -w "HTTPS: %{http_code}\n" -H "Host: siem.6v6.lab" "https://10.20.30.1/"
      curl -k -L -o /dev/null -s -w "redirect: %{http_code}\n" -H "Host: siem.6v6.lab" "https://10.20.30.1/login"
      ssh 6v6-siem 'curl -k -u admin:admin https://10.20.32.110:9200/_cluster/health 2>&1 | head -3'
    answer_detail: 'dashboard / indexer / filebeat 3 컨테이너 + HAProxy backend + 외부 접근 302/401'
    verify:
      type: output_contains
      expect: dashboard
      field: stdout
      semantic:
        intent: "dashboard / indexer 활성 + 외부 접근"
        success_criteria: ["3 컨테이너 Up", "5601 listen", "HAProxy backend", "302/401 응답"]
        acceptable_methods:
          - "**[OSS] docker ps grep dashboard**"
          - "**[OSS] HAProxy backend dashboard TLS passthrough**"
          - "**[OSS] curl -H Host: siem.6v6.lab**"
          - "**[OSS] OpenSearch _cluster/health**"
          - "**[OSS] filebeat ship 검증**"
          - "**[OSS] dashboard 의 /usr/share/wazuh-dashboard/data/wazuh/**"
          - "**[OSS] internal_users.yml password hash**"
          - "**[OSS] wazuh-passwords-tool**"
    target_vm: bastion

  - order: 2
    instruction: |
      ## 🎯 MISSION — 5 main panel (Overview / Agents / Modules / Discovery / Rules) 인지

      dashboard 의 5 main panel 의 역할 + 접근 URL (학습용 시뮬, 실 인증 후 사용).

      ## 💻 실행 명령

      ```bash
      # 1. 5 panel URL 패턴
      cat <<'EOF'
      Overview         — https://siem.6v6.lab/app/wazuh#/overview
      Agents           — https://siem.6v6.lab/app/wazuh#/agents
      Modules          — https://siem.6v6.lab/app/wazuh#/modules
        ├── Security events
        ├── Integrity monitoring (FIM)
        ├── Vulnerability detection
        ├── Configuration assessment (SCA)
        ├── Regulatory compliance (PCI/HIPAA/GDPR)
        └── MITRE ATT&CK
      Discovery        — https://siem.6v6.lab/app/discover
      Management/Rules — https://siem.6v6.lab/app/wazuh#/manager/?tab=ruleset
      EOF

      # 2. indexer 의 wazuh-alerts-* 색인
      ssh 6v6-siem 'curl -k -u admin:admin "https://10.20.32.110:9200/_cat/indices/wazuh-*?h=index,docs.count,store.size" 2>&1 | head -10'

      # 3. KQL 쿼리 예시 (시뮬)
      cat <<'EOF'
      KQL 쿼리 예 (Discovery panel):
        rule.level >= 7
        rule.id: "86601" AND agent.name: "ips"
        data.alert.signature_id: "9009001"
        timestamp: [now-1h TO now]
      EOF

      # 4. dashboard 의 RBAC roles (시뮬)
      cat <<'EOF'
      RBAC roles 예:
        admin       — all access
        readonly    — view only
        analyst     — view + investigate
        responder   — view + Active Response 실행
      EOF
      ```

      ## 📋 확인 사항

      - 5 panel URL 패턴
      - indexer 의 wazuh-alerts-* 색인 (alerts.json 의 doc 수)
      - KQL 쿼리 syntax 인지
      - RBAC roles 4 예시

      ## 💡 왜 이걸 하는가?

      SOC 분석가의 일상 작업 — dashboard 의 5 panel 항상 사용. URL + KQL 익숙해지면
      5분 → 30초로 분석 시간 단축.

      ## 🔍 결과 해석

      - **정상**: 5 panel 모두 인지 + wazuh-alerts-* 색인 + KQL 4 예
      - **운영 권장**:
        - RBAC 활용 — analyst / responder 분리
        - dashboard 의 saved searches + dashboard 저장
        - alert level >= 7 default filter
    hint: 'dashboard 5 panel URL + KQL + RBAC'
