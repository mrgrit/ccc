lab_id: standalone-secuops-week10
title: Wazuh agent — FIM / SCA / Active Response
version: standalone-non-ai
course: secuops
week: 10
description: |
  Wazuh agent (fw / ips / web) 의 3 기능: File Integrity Monitoring (FIM 의 syscheck),
  Security Configuration Assessment (SCA), Active Response (자동 IP 차단). 각 기능
  의 ossec.conf 설정 + 트리거 + alerts.json 검증.
difficulty: medium
duration_minutes: 150
prerequisites: [W09 통과]
objectives:
  - syscheck (FIM) 변경 감지
  - SCA scorecard 조회
  - Active Response 설정 검토
pass_threshold: 0.7
steps:
  - order: 1
    instruction: web agent 의 syscheck 설정 + 변경 트리거 + alert
    hint: ssh 6v6-web 'echo "# fim" | sudo tee -a /etc/hosts'
    category: experiment
    points: 25
    answer: |
      ssh 6v6-web 'sudo grep -A8 "<syscheck>" /var/ossec/etc/ossec.conf | head -15'
      ssh 6v6-web 'echo "# fim_$(date +%s)" | sudo tee -a /etc/hosts'
      sleep 60
      ssh 6v6-siem 'sudo tail -200 /var/ossec/logs/alerts/alerts.json | grep -m1 "syscheck" | jq ".rule.id, .rule.description, .syscheck.path"'
    answer_detail: FIM alert 발생
    verify:
      type: output_contains
      expect: syscheck
      field: stdout
      semantic:
        intent: FIM 동작
        success_criteria: [syscheck 키, alert 발생]
        acceptable_methods:
          - "**[OSS] /etc/hosts 변경 후 alerts.json 확인**"
          - "**[OSS] realtime=yes inotify 즉시 감지 (frequency 무시)**"
          - "**[OSS] rule 550 (integrity changed) + level 7**"
          - "**[OSS] report_changes yes 시 diff 포함**"
          - "**[OSS] whodata 활성 시 누가 변경**"
          - "**[OSS] /var/ossec/queue/syscheck/ 의 DB**"
          - "**[OSS] dashboard Integrity Monitoring view**"
          - "**[OSS] ignore + nodiff 패턴**"
    target_vm: web

  - order: 2
    instruction: SCA scorecard 조회 (Wazuh API)
    hint: |
      TOKEN=$(curl -sk -u wazuh-wui:MyS3cr37P450r.*- -X POST https://localhost:55000/security/user/authenticate | jq -r .data.token)
      curl -sk -H "Authorization: Bearer $TOKEN" https://localhost:55000/sca/001
    category: monitoring
    points: 20
    answer: |
      ssh 6v6-siem '
      TOKEN=$(curl -sk -u wazuh-wui:MyS3cr37P450r.*- -X POST https://localhost:55000/security/user/authenticate | jq -r .data.token)
      curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:55000/sca/001?pretty=true" | jq ".data.affected_items[0] | {name, score, pass, fail, total_checks}"
      '
    answer_detail: SCA scorecard
    verify:
      type: output_contains
      expect: score
      field: stdout
      semantic:
        intent: SCA 결과
        success_criteria: [score 출력]
        acceptable_methods:
          - "**[OSS] API + jq score**"
          - "**[OSS] dashboard /app/wazuh SCA**"
          - "**[OSS] /var/ossec/logs/wodle_sca.log**"
          - "**[OSS] /var/ossec/ruleset/sca/cis_*.yml**"
          - "**[OSS] policy 별 score 비교 (CIS / PCI / GDPR)**"
          - "**[OSS] fail 항목 상세 조회**"
          - "**[OSS] remediation 권장**"
          - "**[OSS] 정기 scan 주기 (12h)**"
    target_vm: siem
