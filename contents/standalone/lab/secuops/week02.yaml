              ssh 6v6-fw 'sudo cat /entrypoint.sh'
            예상 출력 `nft add table ip six_nat / nft add chain ... / nft add rule inet six_filter forward ...`.
            운영 해석: 컨테이너 부팅마다 실행되는 명령. ruleset 의 source of truth.
          - |
            **[OSS] docker exec + entrypoint 검사** — 호스트 측.
              # 호스트 (VM) 측에서 동일한 분석
              ssh 6v6-bastion docker inspect 6v6-fw --format '{{.Config.Entrypoint}} {{.Config.Cmd}}' 2>&1
              # entrypoint 의 절대 경로
              ssh 6v6-bastion docker exec 6v6-fw which entrypoint.sh 2>&1 || ssh 6v6-bastion docker exec 6v6-fw ls -la /entrypoint.sh
            예상 출력 `[/entrypoint.sh] [] / /entrypoint.sh / -rwxr-xr-x ...`.
