              ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
              # entrypoint.sh 의 기본 룰만 (재시작 후)
              # docker restart 6v6-fw 후 다시 list
            예상 출력 `학생 추가 룰 + 기본 룰 / 기본 룰만`.
            운영 해석: 학생 변경분은 임시 (컨테이너 재시작 시 소실). 영구화하려면
            entrypoint.sh + 이미지 재빌드.
          - |
            **[OSS] git log entrypoint.sh** — audit.
              # 컨테이너 내부에는 git history 없음 — repo 측
