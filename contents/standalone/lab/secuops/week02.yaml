  # ============================================================
  - order: 6
    instruction: |
      6v6-fw 컨테이너는 stateless 라 부팅마다 entrypoint.sh 가 nftables ruleset 을
      재구성한다. entrypoint.sh 에서 nft 명령 라인을 추출하여 어떤 정책이 builtin
      되는지 분석한다.
    hint: ssh 6v6-fw 'sudo cat /entrypoint.sh | grep -E "^(nft|iptables)"'
    category: configuration
    points: 10
    answer: |
      ssh 6v6-fw 'sudo cat /entrypoint.sh | grep -E "^(nft|iptables)" | head -20'
    answer_detail: nft 명령 라인 5+ 출력 (table / chain / rule 추가)
    verify:
      type: output_contains
      expect: nft
      field: stdout
      semantic:
        intent: |
