              # ssh 6v6-fw 'sudo nft add rule inet six_filter forward ip saddr 1.1.1.1 drop'
              # 컨테이너 재시작
              # ssh 6v6-bastion docker restart 6v6-fw
              # sleep 5
              # 추가한 룰이 사라지고 entrypoint 가 빌드한 ruleset 만 남음
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | grep -c "drop"' 2>&1
            예상 출력 `(컨테이너 재시작 후 단순한 룰 수)`.
            운영 해석: 컨테이너는 stateless → ruleset 도 stateless. 영구화는 image 에.
          - |
            **[OSS] systemd nftables 비교 (운영 호스트)** — 표준.
              # 호스트의 systemd 가 있다면
              systemctl is-enabled nftables 2>/dev/null || echo "nftables.service not on host"
              # /etc/nftables.conf 위치
              ls -la /etc/nftables.conf 2>&1 || echo "no host nftables.conf"
            예상 출력 `nftables.service not on host / no host nftables.conf`.
            운영 해석: 6v6 는 컨테이너 기반이므로 호스트에 nftables.service 없음.
            운영 환경 호스트는 systemd 표준.
        negative_signs:
          - entrypoint 비어 있음
          - nft 명령 라인 5 미만
          - cat 실패 (permission)
    target_vm: fw

  # ============================================================
  # STEP 7 — 정책 강화 시뮬레이션 (policy drop 변경)
  # ============================================================
  - order: 7
    instruction: |
      forward chain 의 policy 를 임시로 `drop` 으로 변경한 뒤 어떤 트래픽이 끊기는지
      관찰한다. 정상 운영 트래픽 (학생 → web, fw → bastion API 등) 이 모두 영향
      받는지 검증 후 policy 를 `accept` 로 복구한다.
    hint: |
      ssh 6v6-fw 'sudo nft chain inet six_filter forward "{ policy drop ; }"'
    category: experiment
    points: 15
    answer: |
      # 1. policy 변경 (drop)
      ssh 6v6-fw 'sudo nft chain inet six_filter forward "{ policy drop ; }"'
      # 2. 영향 검증 (attacker → web)
      ssh 6v6-attacker 'timeout 5 curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      # 3. policy 복구 (accept)
      ssh 6v6-fw 'sudo nft chain inet six_filter forward "{ policy accept ; }"'
      # 4. 정상화 검증
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
    answer_detail: policy drop → timeout, policy accept → 200 복귀
    verify:
      type: output_contains
      expect: '000'
      field: stdout
      semantic:
        intent: |
          chain policy 의 default-deny 효과 학습. policy accept 에서는 ruleset 의 룰만
          제외 처리, policy drop 에서는 화이트리스트 룰만 통과. 운영 환경은 policy drop
          + 명시적 화이트리스트가 정석. 단, ruleset 이 불완전하면 정상 트래픽도 끊김.
        success_criteria:
          - policy drop 시 attacker timeout (000)
          - policy accept 복구 시 200
          - 6v6-fw 의 정상 운영 확인
        acceptable_methods:
          - |
            **[OSS] nft chain policy 변경** — 표준.
              ssh 6v6-fw 'sudo nft chain inet six_filter forward "{ policy drop ; }"'
              # 확인
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | head -3'
              # ... type filter hook forward priority 0; policy drop;
            예상 출력 `chain forward { type filter hook forward priority 0; policy drop; ...`.
            운영 해석: policy 만 변경. ruleset 본문은 그대로. 단, 화이트리스트 룰이
            부족하면 다른 트래픽도 끊김.
          - |
            **[OSS] curl 영향 검증 (timeout)** — 실증.
              # policy drop 직후
              ssh 6v6-attacker 'timeout 5 curl -s -o /dev/null -w "HTTP: %{http_code} time: %{time_total}s\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
              # policy accept 후
              ssh 6v6-fw 'sudo nft chain inet six_filter forward "{ policy accept ; }"'
              ssh 6v6-attacker 'curl -s -o /dev/null -w "HTTP: %{http_code} time: %{time_total}s\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
            예상 출력 `HTTP: 000 time: 5.0s / HTTP: 200 time: 0.15s`.
            운영 해석: policy drop 으로 ruleset 의 화이트리스트가 부족하면 정상 traffic
            도 끊김. 6v6 ruleset 은 ext→pipe forward 룰이 있어 attacker 는 영향
            안 받아야 하지만, 화이트리스트 우선순위가 낮으면 timeout.
          - |
            **[OSS] kernel log 의 drop event 분석** — 가시화.
              # policy drop 으로 떨어진 패킷 확인
              ssh 6v6-fw 'sudo dmesg | tail -10 | grep -E "FW-FWD-DROP|FORWARD" | head -5'
              # nf_log 또는 ulogd 가 있으면 더 상세
            예상 출력 `<time> FW-FWD-DROP: IN=eth0 OUT=eth1 SRC=10.20.30.202 DST=10.20.31.2 ...`.
            운영 해석: policy drop 룰 (또는 마지막 log+drop 룰) 에서 잡은 패킷 가시화.
          - |
            **[OSS] 운영 트래픽 영향 검증** — 부작용.
              # 학생 트래픽 외에 운영 트래픽도 영향?
              # bastion API 호출 시도
              ssh 6v6-attacker 'curl -s -o /dev/null -w "bastion api: %{http_code}\n" -H "Host: bastion.6v6.lab" http://10.20.30.1/health' 2>&1
              # wazuh dashboard
              ssh 6v6-attacker 'curl -sk -o /dev/null -w "wazuh: %{http_code}\n" -H "Host: siem.6v6.lab" http://10.20.30.1/'
            예상 출력 `bastion api: 000 또는 200 / wazuh: 000 또는 302`.
            운영 해석: 운영 트래픽도 policy drop 영향. ruleset 의 화이트리스트가
            완전하지 않으면 운영 outage 발생 위험.
          - |
            **[OSS] policy accept 복구** — 안전 복구.
              ssh 6v6-fw 'sudo nft chain inet six_filter forward "{ policy accept ; }"'
              # 확인
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | head -3'
              # 정상화 검증
              ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
            예상 출력 `chain forward { ... policy accept; / 200`.
            운영 해석: 실험 끝나면 즉시 복구. 컨테이너 재시작 시 entrypoint.sh 가
            기본값 (accept) 으로 재설정.
          - |
            **[OSS] policy drop production 정석 — 화이트리스트 보강** — 학습.
              # production 환경의 정석:
              # 1. 모든 정상 트래픽 화이트리스트 룰 추가
              # 2. ct state established,related accept 가장 먼저
              # 3. 그 다음 명시적 src/dst 허용 룰
              # 4. policy drop
              # 5. log fallback 으로 dropped 가시화
              echo "정석 ruleset 설계:"
              echo "  chain forward { type filter hook forward priority 0; policy drop;"
              echo "    ct state established,related accept"
              echo "    ip saddr 10.20.30.0/24 ip daddr 10.20.31.0/24 accept"
              echo "    log prefix 'DROP-FWD: ' counter"
              echo "  }"
            예상 출력 `(설계 텍스트)`.
            운영 해석: policy drop + 완전한 화이트리스트 = secure-by-default.
          - |
            **[OSS] policy drop 시 outbound NAT 영향** — 부작용 분석.
              # outbound traffic 도 forward chain 통과?
              # fw → external 응답은 ext NIC outbound = output chain (not forward)
              # ssh 6v6-fw 'sudo nft list chain inet six_filter output 2>/dev/null'
              # 그러나 컨테이너 → external 은 forward chain 통과
              ssh 6v6-fw 'sudo nft list ruleset | grep -E "output|out_chain"'
            예상 출력 `(output chain 정의 또는 없음)`.
            운영 해석: forward 와 output 은 다른 hook. policy drop 영향 범위 구분.
          - |
            **[OSS] policy 복구 안전 검증** — 종합.
              # 모든 검증 통과 확인
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | head -3'
              ssh 6v6-attacker 'curl -s -o /dev/null -w "juice: %{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
              ssh 6v6-attacker 'curl -sk -o /dev/null -w "siem: %{http_code}\n" -H "Host: siem.6v6.lab" http://10.20.30.1/'
              ssh 6v6-attacker 'curl -s -o /dev/null -w "portal: %{http_code}\n" -H "Host: portal.6v6.lab" http://10.20.30.1/'
            예상 출력 `policy accept / juice: 200 / siem: 302 / portal: 200`.
            운영 해석: 3 운영 vhost 가 200/302 면 ruleset 정상. 실험 종료.
        negative_signs:
          - policy 변경 실패
          - 복구 후에도 timeout
          - 운영 트래픽 (siem/portal) 영향 분석 누락
    target_vm: fw
    cleanup: |
      ssh 6v6-fw 'sudo nft chain inet six_filter forward "{ policy accept ; }"'

