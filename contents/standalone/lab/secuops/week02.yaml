lab_id: standalone-secuops-week02
title: nftables 방화벽 기초 (6v6-fw)
version: standalone-non-ai
course: secuops
week: 2
description: |
  6v6-fw 컨테이너 단독으로 nftables 의 4 핵심 개념 (table / chain / rule / set)
  을 실습한다. ruleset 조회 → counter 분석 → 새 룰 추가/삭제 → 영향 검증 →
  iptables-translate 마이그레이션 → 영구화 차이 (컨테이너 vs systemd) 까지 단계별
  수행한다.
difficulty: easy
duration_minutes: 180
audience: 보안 솔루션 운영 입문자 (2주차)
prerequisites:
  - W01 헬스체크 완료 (16 컨테이너 Up, ProxyJump 정상)
  - bastion SSH 진입 + `ssh 6v6-fw` 통과
  - sudo NOPASSWD 가능 (학생 환경 전제)

objectives:
  - nftables table / chain / rule / set 4 핵심 개념을 명령으로 직접 검증
  - 6v6-fw 의 ruleset 을 조회하고 counter / handle 의 의미를 이해
  - 새 룰 추가 / 삭제 / tcpdump 로 영향 검증
  - iptables → nftables 마이그레이션 (`iptables-translate`) 3 사례 수행
  - 영구화 차이 (컨테이너 entrypoint vs systemd nftables.service) 비교

pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — nftables family / table 가시화
  # ============================================================
  - order: 1
    instruction: |
      `6v6-fw` 의 nftables table 목록을 family 별로 조회한다. 6v6-fw 는 최소 3개
      table (inet six_filter, ip nat, ip six_nat) 을 가져야 한다. nat 는 docker 가, nat6v6
      는 6v6 entrypoint 가 만든다.
    hint: ssh 6v6-fw sudo nft list tables
    category: survey
    points: 10
    answer: |
      ssh 6v6-fw 'sudo nft list tables'
    answer_detail: 3 table 출력 (inet six_filter, ip nat, ip six_nat)
    verify:
      type: output_contains
      expect: table
      field: stdout
      semantic:
        intent: |
          nftables 가 가진 모든 table 의 family + 이름. 6v6-fw 는 ip family 의
          filter (정책 핵심) + nat (Docker daemon) + nat6v6 (6v6 masquerade)
          최소 3개. ip6 family 가 있다면 IPv6 stub.
        success_criteria:
          - table 키워드 3건 이상
          - filter / nat 둘 다
          - ip family
        acceptable_methods:
          - |
            **[OSS] nft list tables (표준)** — 기본.
              ssh 6v6-fw 'sudo nft list tables'
              # JSON 으로
              ssh 6v6-fw 'sudo nft -j list tables | jq ".nftables[] | select(.table) | .table"'
            예상 출력 `table inet six_filter / table ip nat / table ip six_nat / 또는 ip6 filter`.
            운영 해석: 3 table 기본. 더 많이 나오면 (예: bridge filter) 추가 설정.
          - |
            **[OSS] nft list ruleset (전체)** — 종합.
              ssh 6v6-fw 'sudo nft list ruleset 2>&1 | grep "^table"'
              # 라인 수
              ssh 6v6-fw 'sudo nft list ruleset 2>&1 | wc -l'
            예상 출력 `table inet six_filter { / table ip nat { / table ip six_nat { / 50+ 라인`.
            운영 해석: ruleset 전체 라인 수가 환경 복잡도 지표.
          - |
            **[OSS] /proc/net/nf_tables (커널 인터페이스)** — 디버그.
              ssh 6v6-fw 'sudo cat /proc/net/nf_tables 2>/dev/null | head' || true
              # 또는 ss 의 nft 옵션
              ssh 6v6-fw 'sudo nft list ruleset -a | head -10'
            예상 출력 `0  ip   filter  ... / 0  ip   nat ...`.
            운영 해석: 커널이 인식한 table 만 출력. nft 와 동일한 정보.
          - |
            **[OSS] iptables-nft -L (호환 모드 확인)** — 학습.
              ssh 6v6-fw 'sudo iptables-nft -L 2>&1 | head -10'
              # /etc/alternatives 로 어느 backend 가 활성?
              ssh 6v6-fw 'readlink /etc/alternatives/iptables 2>&1'
            예상 출력 `Chain INPUT (policy ACCEPT) / .../iptables-nft`.
            운영 해석: iptables 명령이 사실 nftables backend 사용. legacy 호환을 위해
            남겨둠.
          - |
            **[OSS] nft -j (JSON 출력)** — 자동화.
              ssh 6v6-fw 'sudo nft -j list tables | jq "[.nftables[] | select(.table) | .table.name] | sort | unique"'
              # 자동화 도구가 파싱 친화
            예상 출력 `["filter","nat","nat6v6"]`.
            운영 해석: JSON 으로 list table 이름을 sorted unique 로 추출 가능.
          - |
            **[OSS] /etc/nftables.conf (영구 정책)** — 컨테이너 환경 특이점.
              ssh 6v6-fw 'sudo cat /etc/nftables.conf 2>/dev/null | head -10 || echo "no persistent config"'
              # 컨테이너는 entrypoint.sh 가 부팅마다 재 빌드
              ssh 6v6-fw 'sudo cat /entrypoint.sh 2>/dev/null | grep -E "^nft" | head -10'
            예상 출력 `no persistent config / nft add table inet six_filter / nft add chain ...`.
            운영 해석: docker container 의 nftables 정책은 entrypoint script 에 hard-code.
            영구화는 systemd 환경의 /etc/nftables.conf 와 다름.
          - |
            **[OSS] nft monitor (실시간 변경 감시)** — 진단.
              ssh 6v6-fw 'sudo timeout 5 nft monitor 2>&1 | head -5'
              # 다른 터미널에서 nft add rule 발생 시 출력
            예상 출력 `add rule inet six_filter forward ...` (이벤트 발생 시).
            운영 해석: 운영 중 ruleset 변경 감사용. 비정상적인 룰 추가 즉시 감지.
          - |
            **[OSS] iptables-translate (iptables → nft)** — 마이그레이션.
              ssh 6v6-fw 'echo "iptables -L" | iptables-translate'
              # iptables 명령을 nft 동등 명령으로 변환
            예상 출력 `nft list ruleset` (단순 -L 의 변환).
            운영 해석: legacy 환경에서 nftables 로 옮길 때 cheat sheet.
        negative_signs:
          - table 0개
          - 출력에 ip family 없음
          - sudo 권한 부족
    target_vm: fw
    fixtures: []

  # ============================================================
  # STEP 2 — inet six_filter table 의 chain + policy + 핵심 룰
  # ============================================================
  - order: 2
    instruction: |
      `inet six_filter` table 안의 chain 목록 (forward, input, output 중 정의된 것) 과
      각 chain 의 type / hook / priority / policy 를 조회한다. 6v6-fw 는 forward
      + input 2 chain 을 가진다.
    hint: ssh 6v6-fw sudo nft list table inet six_filter
    category: configuration
    points: 10
    answer: |
      ssh 6v6-fw 'sudo nft list table inet six_filter'
    answer_detail: forward + input 2 chain, type/hook/priority/policy 출력
    verify:
      type: output_contains
      expect: forward
      field: stdout
      semantic:
        intent: |
          inet six_filter table 의 chain 정의를 읽고 의미를 해석한다. 핵심은:
          chain forward { type filter hook forward priority 0; policy accept; }
          → forward hook 에서 priority 0 (가장 빠른 평가) + 룰 미매치 시 default
          accept. 운영 강화 시 policy drop 으로 변환.
        success_criteria:
          - chain forward 존재
          - type filter hook forward
          - priority + policy 표기
        acceptable_methods:
          - |
            **[OSS] nft list table inet six_filter** — 표준.
              ssh 6v6-fw 'sudo nft list table inet six_filter'
              # forward chain 만
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward'
            예상 출력 `chain forward { type filter hook forward priority 0; policy accept; / ct state established,related accept / ... }`.
            운영 해석: chain header 가 type/hook/priority/policy 4 attribute 표시.
            production 운영자가 매일 보는 첫 출력.
          - |
            **[OSS] nft -a list (handle 포함)** — 룰 식별.
              ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
              # 각 룰의 # handle <N> 라벨
            예상 출력 `ct state established,related accept # handle 2 / ... # handle 3 / ...`.
            운영 해석: 룰 삭제 시 `nft delete rule ... handle N` 으로 식별.
          - |
            **[OSS] nft list chain inet six_filter input** — 다른 chain.
              ssh 6v6-fw 'sudo nft list chain inet six_filter input 2>&1'
              # input chain 이 정의되어 있다면
            예상 출력 `chain input { type filter hook input priority 0; policy accept; / tcp dport { 22, 80, 443 } accept / ... }`.
            운영 해석: input chain 은 fw 자체로 들어가는 트래픽 (외부 SSH/HTTP 등) 통제.
          - |
            **[OSS] nft list ruleset -a (전체 + handle)** — 종합.
              ssh 6v6-fw 'sudo nft list ruleset -a | head -40'
            예상 출력 `table inet six_filter { # handle X / chain forward { # handle Y / ... }`.
            운영 해석: ruleset 전체 + 모든 handle. 운영 audit log 와 함께 git 관리 추천.
          - |
            **[OSS] nft list chain + grep counter** — 통계.
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | grep -B1 counter'
            예상 출력 `ct state established,related counter packets 1234 bytes 567890 accept / ...`.
            운영 해석: counter 가 부여된 룰만 통계 보유. 0 이면 한 번도 매치 안 됨.
          - |
            **[OSS] nft list set (set 정의)** — 자료구조.
              ssh 6v6-fw 'sudo nft list sets 2>&1 | head'
              # 또는 특정 set 의 원소
              ssh 6v6-fw 'sudo nft list set inet six_filter blocklist 2>&1 | head -5'
            예상 출력 `table inet six_filter { set blocklist { type ipv4_addr; elements = { 1.2.3.4, ... } } }` 또는 없음.
            운영 해석: set 은 IP/port 동적 그룹. blocklist 같은 자동화 친화.
          - |
            **[OSS] ip family 가시화** — IPv6 도 확인.
              ssh 6v6-fw 'sudo nft list ruleset 2>&1 | grep -E "^table"'
              # ip / ip6 / inet / arp / bridge / netdev family 중 어느 것?
            예상 출력 `table inet six_filter / table ip nat / table ip six_nat`.
            운영 해석: 6v6 는 IPv4 only. IPv6 활성 시 ip6 family 또는 inet (양쪽) 추가.
          - |
            **[OSS] nft check + dry-run** — 변경 전.
              # 새 룰을 직접 적용하지 않고 syntax 만 검증
              ssh 6v6-fw 'sudo nft -c -e "add rule inet six_filter forward ip saddr 10.20.30.99 drop"' 2>&1 | head -3
            예상 출력 `(아무 출력 없으면 syntax 정상) 또는 syntax error`.
            운영 해석: -c (check only) -e (echo) 로 dry-run 검증. production 권장.
        negative_signs:
          - forward chain 없음
          - policy 표기 누락
          - type filter 누락
    target_vm: fw

  # ============================================================
  # STEP 3 — counter / handle 분석
  # ============================================================
  - order: 3
    instruction: |
      forward chain 의 counter 룰들의 byte/packet 통계를 조회하고, 각 룰의 handle
      을 확인한다. counter 가 0 이면 한 번도 매치 안 됐다는 의미. handle 은 룰 식별자.
    hint: ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
    category: monitoring
    points: 10
    answer: |
      ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
    answer_detail: counter packets/bytes + handle 정수 출력
    verify:
      type: output_contains
      expect: handle
      field: stdout
      semantic:
        intent: |
          counter (룰 통계) + handle (룰 식별자) 가시화. 운영자가 어떤 룰이 활성
          매칭 중인지, 어떤 룰이 한 번도 매치 안 됐는지 (불필요한 룰) 판단 가능.
          handle 은 룰 추가/삭제 시 절대 식별자.
        success_criteria:
          - counter 또는 packets 키워드
          - handle 정수 표기
          - 최소 1개 룰의 통계 표시
        acceptable_methods:
          - |
            **[OSS] nft -a list (handle 표기)** — 표준.
              ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
              # 각 줄 끝에 # handle N
            예상 출력 `ct state established,related counter packets 5678 bytes 123456 accept # handle 3 / ...`.
            운영 해석: handle N 이 룰의 고유 ID. 삭제 시 `delete rule inet six_filter forward handle N`.
          - |
            **[OSS] nft -j (JSON 으로 통계 추출)** — 자동화.
              ssh 6v6-fw 'sudo nft -j list chain inet six_filter forward | jq "[.nftables[] | select(.rule)] | .[] | {handle: .rule.handle, packets: .rule.counter.packets, bytes: .rule.counter.bytes}"' 2>&1 | head -20
            예상 출력 `{"handle":3,"packets":5678,"bytes":123456} / ...`.
            운영 해석: JSON 으로 룰별 통계 추출 → dashboard 통합 가능.
          - |
            **[OSS] nft reset counters (통계 초기화)** — 운영.
              # 모든 counter 0 으로
              ssh 6v6-fw 'sudo nft reset counters table inet six_filter 2>&1 | head -5'
              # 다시 list 로 확인
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | grep -B1 "counter packets 0"'
            예상 출력 `counter packets 0 bytes 0 / counter packets 0 bytes 0 ...`.
            운영 해석: 정책 변경 전후 비교 시 reset counters 로 깨끗한 측정 시작.
          - |
            **[OSS] tcpdump 로 트래픽 발생 + counter 증가 검증** — 동적.
              # counter reset 후
              ssh 6v6-fw 'sudo nft reset counters table inet six_filter > /dev/null'
              # attacker 에서 트래픽 발생
              ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/'
              # counter 증가 확인
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | grep -B1 "counter packets [1-9]"'
            예상 출력 `ct state established,related counter packets 5+ accept`.
            운영 해석: 룰별 counter 가 증가하면 trafic flow 정상.
          - |
            **[OSS] nft monitor (이벤트 스트림)** — 변경 감시.
              ssh 6v6-fw 'sudo timeout 5 nft monitor trace 2>&1 | head -5'
              # 트래픽 처리 trace 실시간 출력
              # 다른 터미널에서: curl 발생
            예상 출력 `trace id 1234 inet six_filter forward packet: iif "eth0" ip saddr ... → verdict accept`.
            운영 해석: 룰 매칭 trace 로 어떤 packet 이 어떤 룰에 의해 처리되는지 가시화.
          - |
            **[OSS] /proc/net/nfct (conntrack 통계)** — 효과.
              ssh 6v6-fw 'cat /proc/sys/net/netfilter/nf_conntrack_count'
              ssh 6v6-fw 'cat /proc/sys/net/netfilter/nf_conntrack_max'
            예상 출력 `123 / 65536`.
            운영 해석: 활성 conntrack 엔트리 수 / 최대. max 의 80% 넘으면 conntrack
            테이블 폭주 → SYN flood 의심.
          - |
            **[OSS] iptables -L -v (legacy 통계)** — 비교.
              ssh 6v6-fw 'sudo iptables-nft -L -v -n 2>&1 | head -15'
              # iptables-nft 의 -v 가 nft counter 와 동일한 값 표시
            예상 출력 `Chain FORWARD (policy ACCEPT 5678 packets, 123456 bytes) / ...`.
            운영 해석: iptables 출력의 packets/bytes 가 nft counter 와 같은 데이터.
          - |
            **[OSS] handle 로 특정 룰 삭제 (실험)** — 변경.
              # handle 식별
              HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward | grep "ICMP" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
              echo "handle: $HANDLE"
              # 삭제 (실험 후 복구)
              # ssh 6v6-fw "sudo nft delete rule inet six_filter forward handle $HANDLE"
            예상 출력 `handle: 5`.
            운영 해석: 삭제 후 6v6.sh restart 또는 컨테이너 재기동 시 entrypoint.sh 가
            ruleset 재구성하므로 임시 변경만 가능.
        negative_signs:
          - handle 누락
          - counter 0 (트래픽 0 아닐 때)
    target_vm: fw

  # ============================================================
  # STEP 4 — 임시 drop 룰 추가 + 영향 검증
  # ============================================================
  - order: 4
    instruction: |
      attacker 컨테이너 (10.20.30.202) 가 web 으로 접근하지 못하도록 fw 의 forward
      chain 위에 임시 drop 룰을 추가한다. attacker 에서 curl 시도가 timeout 되는지
      확인 후 룰을 다시 삭제하여 복구한다.
    hint: |
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 ip saddr 10.20.30.202 counter log prefix "DROP-ATTACKER: " drop'
    category: manipulation
    points: 15
    answer: |
      # 1. 룰 추가
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 ip saddr 10.20.30.202 counter log prefix "DROP-ATTACKER: " drop'
      # 2. attacker → web 시도 (timeout 예상)
      ssh 6v6-attacker 'timeout 5 curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      # 3. kernel log 확인
      ssh 6v6-fw 'sudo dmesg | tail -5 | grep DROP-ATTACKER || echo "no log"'
      # 4. 룰 삭제 (handle 식별 후)
      HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward | grep DROP-ATTACKER | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      ssh 6v6-fw "sudo nft delete rule inet six_filter forward handle $HANDLE"
    answer_detail: drop 룰 추가 → attacker timeout → 삭제 → 정상 복귀
    verify:
      type: output_contains
      expect: '000'
      field: stdout
      semantic:
        intent: |
          fw **input** chain 의 첫 줄에 attacker IP drop 룰 추가 → attacker → fw:80 (HAProxy)
          진입이 timeout (HTTP 000) 으로 끊기는지 확인. fw 자체로 들어가는 트래픽은
          forward chain 이 아닌 input chain 평가 (HAProxy 가 termination 후 backend
          와 새 conn 으로 통신). 그 후 handle 로 룰 삭제 → 정상 200 응답 복귀.
        success_criteria:
          - drop 룰 추가 성공
          - attacker timeout (HTTP 000)
          - 룰 삭제 + 정상 200 복귀
        acceptable_methods:
          - |
            **[OSS] nft insert rule (position 0)** — 표준.
              # forward chain 의 가장 위에 삽입
              ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 ip saddr 10.20.30.202 counter log prefix "DROP-ATTACKER: " drop'
              # 확인
              ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward | head -5'
            예상 출력 `ip saddr 10.20.30.202 counter ... log prefix "DROP-ATTACKER: " drop # handle X`.
            운영 해석: insert 는 위쪽, add 는 아래쪽. forward chain 평가는 위에서 아래이므로
            insert 가 즉시 영향.
          - |
            **[OSS] curl -w + timeout 옵션 (영향 검증)** — 측정.
              # 룰 추가 후
              ssh 6v6-attacker 'timeout 5 curl -s -o /dev/null -w "HTTP: %{http_code}, time: %{time_total}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
              # 룰 삭제 후
            예상 출력 `HTTP: 000, time: 5.0` (drop 시) / `HTTP: 200, time: 0.15` (정상).
            운영 해석: HTTP 000 = timeout. drop 으로 인해 SYN 응답 없음 → curl 종료.
          - |
            **[OSS] dmesg / journalctl (kernel log 의 prefix 검증)** — 가시화.
              # log prefix "DROP-ATTACKER: " 가 kernel ring buffer 에 기록
              ssh 6v6-fw 'sudo dmesg | tail -10 | grep DROP-ATTACKER || sudo journalctl -k --since "1m ago" 2>&1 | grep DROP-ATTACKER | head'
            예상 출력 `<time> DROP-ATTACKER: IN=eth0 OUT=eth1 SRC=10.20.30.202 DST=10.20.31.2 ...`.
            운영 해석: log prefix 로 운영자가 어떤 룰이 패킷을 잡았는지 즉시 확인.
            production 환경은 rsyslog → SIEM 통합.
          - |
            **[OSS] tcpdump 로 양쪽 NIC 확인** — 동적.
              # 두 터미널 (학생 PC) 동시
              # T1: ssh 6v6-fw 'sudo timeout 8 tcpdump -ni eth0 host 10.20.30.202 -c 5'
              # T2: ssh 6v6-fw 'sudo timeout 8 tcpdump -ni eth1 host 10.20.30.202 -c 5'
              # T3: ssh 6v6-attacker 'curl -s -H "Host: juice.6v6.lab" http://10.20.30.1/'
            예상 출력 `T1: SYN 보임 / T2: SYN 안 보임` (forward 단계에서 drop).
            운영 해석: 패킷이 eth0 (ext) 진입 후 forward chain 의 drop 으로 eth1 (pipe)
            로 못 넘어감 → 정상 drop 동작.
          - |
            **[OSS] handle 식별 + 정확한 삭제** — 정상 복구.
              # 학생이 추가한 정확한 룰 식별
              HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward | grep DROP-ATTACKER | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
              echo "삭제할 handle: $HANDLE"
              ssh 6v6-fw "sudo nft delete rule inet six_filter forward handle $HANDLE"
              # 확인
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | grep -c DROP-ATTACKER'
            예상 출력 `삭제할 handle: 5 / 0`.
            운영 해석: 정확한 handle 로 룰 삭제. 다른 룰 영향 없음.
          - |
            **[OSS] nft replace rule (한 줄 교체)** — 응용.
              # drop 을 reject 로 변경 (학생이 응답 받음)
              HANDLE=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward | grep DROP-ATTACKER | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
              ssh 6v6-fw "sudo nft replace rule inet six_filter forward handle $HANDLE ip saddr 10.20.30.202 counter reject"
              # attacker 시도 → ICMP unreachable 응답 (drop 과 다름)
              ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
            예상 출력 `000` 또는 connection refused (reject 의 ICMP unreachable).
            운영 해석: drop vs reject 차이 — drop 은 응답 없음 (스캐너 탐지 어려움),
            reject 는 정중한 거부 (사용자 친화).
          - |
            **[OSS] nft delete + flush 비교** — 정리.
              # 룰 1개 delete vs chain 전체 flush 비교
              # ssh 6v6-fw 'sudo nft flush chain inet six_filter forward'  # 위험 — 모든 룰 사라짐
              ssh 6v6-fw 'sudo nft delete rule inet six_filter forward handle X'  # 단일
              # entrypoint.sh 재실행으로 ruleset 복원
              # docker restart 6v6-fw
            예상 출력 `(아무 출력 없으면 성공)`.
            운영 해석: flush 는 위험 — 보호 룰 다 사라짐. delete 는 정밀 수술.
          - |
            **[OSS] nft -e (echo) 옵션** — audit.
              # 명령 실행 + 결과 echo (감사 친화)
              ssh 6v6-fw 'sudo nft -e add rule inet six_filter forward ip saddr 10.20.30.99 counter drop' 2>&1
              # 출력에 nft 가 받은 표준화된 룰 표시
            예상 출력 `add rule inet six_filter forward ip saddr 10.20.30.99 counter drop`.
            운영 해석: -e 로 적용된 정확한 룰 (정규화된 형태) 가 stdout 에 echo →
            로그 + git audit 친화.
        negative_signs:
          - 룰 추가 실패 (syntax error)
          - attacker 가 정상 200 응답 (룰 미적용)
          - 삭제 후에도 timeout 지속
    target_vm: fw
    cleanup: |
      ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward | grep DROP-ATTACKER | grep -oE "handle [0-9]+" | awk "{print \$2}" | xargs -I H ssh 6v6-fw "sudo nft delete rule inet six_filter forward handle H"'

  # ============================================================
  # STEP 5 — iptables-translate 마이그레이션 3 사례
  # ============================================================
  - order: 5
    instruction: |
      legacy iptables 명령 3 건을 `iptables-translate` 로 nft 동등 명령으로 변환한다.
      각 변환의 의미 (어떤 트래픽 통제) 를 1줄 한글로 설명할 것.
    hint: |
      echo "iptables -A INPUT -s 192.168.1.0/24 -j ACCEPT" | iptables-translate
    category: migration
    points: 15
    answer: |
      ssh 6v6-fw 'echo "iptables -A INPUT -s 192.168.1.0/24 -j ACCEPT" | iptables-translate'
      ssh 6v6-fw 'echo "iptables -A OUTPUT -p udp --dport 53 -j ACCEPT" | iptables-translate'
      ssh 6v6-fw 'echo "iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT" | iptables-translate'
    answer_detail: 3 변환 결과 모두 nft 명령으로 출력 + 의미 해석
    verify:
      type: output_contains
      expect: nft
      field: stdout
      semantic:
        intent: |
          iptables → nftables 마이그레이션 학습. `iptables-translate` 가 자동 변환.
          legacy 환경 (RHEL 7, CentOS 7) 에서 nft 환경 (RHEL 8+, Debian 10+) 으로
          이전하는 표준 path. 동일한 정책을 두 형식으로 표현 가능.
        success_criteria:
          - nft 명령 1건 이상 출력
          - 3 사례 모두 변환 시도
        acceptable_methods:
          - |
            **[OSS] iptables-translate (단일 룰)** — 표준.
              ssh 6v6-fw 'echo "iptables -A INPUT -s 192.168.1.0/24 -j ACCEPT" | iptables-translate'
              # nft 변환: nft add rule inet six_filter INPUT ip saddr 192.168.1.0/24 counter accept
              ssh 6v6-fw 'echo "iptables -A OUTPUT -p udp --dport 53 -j ACCEPT" | iptables-translate'
              # nft 변환: nft add rule inet six_filter OUTPUT udp dport 53 counter accept
              ssh 6v6-fw 'echo "iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT" | iptables-translate'
              # nft 변환: nft add rule inet six_filter FORWARD ct state established,related counter accept
            예상 출력 각 줄에 nft add rule ... 형식.
            운영 해석: 한 줄씩 변환 + 한글 주석 1줄. 의미: 첫 번째 = 192.168.1.0/24 대역
            허용, 두 번째 = DNS outbound 허용, 세 번째 = stateful 응답 허용.
          - |
            **[OSS] iptables-save | iptables-restore-translate (전체 룰셋)** — 종합.
              # 현재 iptables 룰셋 (iptables-nft backend 이면 결국 같은 데이터)
              ssh 6v6-fw 'sudo iptables-save 2>&1 | tee /tmp/legacy.rules | head'
              ssh 6v6-fw 'cat /tmp/legacy.rules | iptables-restore-translate 2>&1 | head -20'
            예상 출력 `# Generated by ... / *filter / :INPUT ACCEPT / ... → nft flush ruleset; nft -f - <<EOF / ...`.
            운영 해석: iptables-save 파일을 전체 nftables ruleset 으로 변환.
          - |
            **[OSS] iptables-nft -L 비교** — 호환 모드.
              # 현재 iptables 명령이 사실 nftables backend 사용?
              ssh 6v6-fw 'readlink /etc/alternatives/iptables 2>&1'
              # /usr/sbin/iptables-nft 면 nft backend
              ssh 6v6-fw 'sudo iptables-nft -L -n 2>&1 | head -10'
            예상 출력 `/usr/sbin/iptables-nft / Chain INPUT (policy ACCEPT) / ...`.
            운영 해석: 호환 모드는 명령은 iptables 이지만 backend 가 nftables.
            마이그레이션 과도기 표준.
          - |
            **[OSS] iptables-translate -t nat (NAT 룰)** — NAT 변환.
              ssh 6v6-fw 'echo "iptables -t nat -A PREROUTING -p tcp --dport 8080 -j REDIRECT --to-port 80" | iptables-translate'
              # nft add rule ip nat PREROUTING tcp dport 8080 counter redirect to :80
            예상 출력 `nft add rule ip nat PREROUTING tcp dport 8080 ... redirect to :80`.
            운영 해석: NAT (DNAT/SNAT/MASQUERADE/REDIRECT) 룰 변환. W03 에서 심화.
          - |
            **[OSS] iptables 와 nft 동시 사용 시험** — 호환성.
              # 같은 룰을 두 명령으로 적용 → 같은 효과
              # ssh 6v6-fw 'sudo iptables -I INPUT -s 10.20.30.99 -j DROP'
              # ssh 6v6-fw 'sudo nft -a list chain inet six_filter input | grep 10.20.30.99'
              ssh 6v6-fw 'sudo iptables-nft -L INPUT -n 2>&1 | grep 10.20.30 | head -5'
            예상 출력 `(iptables 룰이 nftables ruleset 에 동일하게 보임)`.
            운영 해석: iptables-nft 가 만든 룰은 nftables 의 inet six_filter INPUT chain
            과 동일 → 두 명령이 같은 ruleset 을 조작.
          - |
            **[OSS] nftables wiki + 표준 문서** — 학습.
              # 공식 wiki 의 마이그레이션 페이지
              echo "https://wiki.nftables.org/wiki-nftables/index.php/Moving_from_iptables_to_nftables"
              # 또는 RHEL 8 마이그레이션 가이드
              echo "RHEL 8: https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html/configuring_and_managing_networking/getting-started-with-nftables_configuring-and-managing-networking"
            예상 출력 `링크들`.
            운영 해석: 변환 후 wiki 의 cheat sheet 로 추가 검증. set / map / vmap 등
            nftables 특유 기능은 iptables-translate 가 변환 못 함 → 수기 작성.
          - |
            **[OSS] 한글 의미 해석 (학습)** — 보고서.
              # 변환 1: nft add rule inet six_filter INPUT ip saddr 192.168.1.0/24 counter accept
              # → "사내망 (192.168.1.0/24) 의 모든 trafic 을 fw 자체로 허용"
              # 변환 2: nft add rule inet six_filter OUTPUT udp dport 53 counter accept
              # → "DNS 쿼리 (UDP 53) outbound 허용"
              # 변환 3: nft add rule inet six_filter FORWARD ct state established,related counter accept
              # → "이미 수립된 conn 의 응답 traffic forward 허용 (stateful)"
            예상 출력 `각 변환의 한글 해석`.
            운영 해석: 학생 본인이 의미를 해석할 수 있어야 마이그레이션 후 룰 audit 가능.
        negative_signs:
          - nft 변환 없음
          - 변환 의미 미해석
    target_vm: fw

