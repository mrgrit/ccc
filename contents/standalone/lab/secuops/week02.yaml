lab_id: standalone-secuops-week02
title: nftables 방화벽 기초 — table/chain/rule/set + R/B/P (nmap → drop → 영구화)
version: standalone-non-ai
course: secuops
week: 2
description: |
  6v6-fw 컨테이너에서 nftables 의 4 핵심 개념 (table / chain / rule / set) 을
  실습한다. 정적 ruleset 가시화 → counter / handle 분석 → 동적 룰 추가/삭제 →
  iptables-translate 마이그레이션 → Red/Blue/Purple 시나리오 (Red 가 fw nmap 스캔
  → Blue 가 src IP drop 룰 추가 → Purple 가 효과 측정 후 영구화 검토).
difficulty: easy
duration_minutes: 180
audience: 보안 솔루션 운영 입문자 (2주차)
prerequisites:
  - W01 통과 (16 컨테이너 가시화 + ProxyJump 정상)
  - bastion SSH 진입 + `ssh 6v6-fw` 가능
  - sudo NOPASSWD (학습 환경 전제)

objectives:
  - nftables table / chain / rule / set 4 핵심 개념을 직접 검증
  - 6v6-fw 의 실제 ruleset (inet six_filter / ip six_nat) 가시화
  - handle 식별 + counter 분석 + 동적 룰 추가/삭제 사이클
  - iptables-translate 로 legacy 룰 변환
  - "Red/Blue/Purple — Red 가 nmap → Blue 가 drop 룰 + log → Purple 가 영구화 검토"

pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — 3 table 가시화 (ip nat / inet six_filter / ip six_nat)
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION

      6v6-fw 의 nftables 에 정의된 **3 table** (ip nat / inet six_filter / ip six_nat)
      을 확인한다.

      ## 💻 실행 명령

      ```bash
      # 1. table 목록 (XT 경고 제거)
      ssh 6v6-fw 'sudo nft list tables 2>&1 | grep -v "^XT"'

      # 2. JSON 형식으로 family + name 추출
      ssh 6v6-fw 'sudo nft -j list tables | jq "[.nftables[] | select(.table) | .table | {family, name}]"'
      ```

      ## 📋 확인 사항

      - 명령 1 출력: `table ip nat` + `table inet six_filter` + `table ip six_nat` 3 행
      - 명령 2 출력: `[{"family":"ip","name":"nat"}, {"family":"inet","name":"six_filter"},
        {"family":"ip","name":"six_nat"}]`

      ## 💡 왜 이걸 하는가?

      운영 인수 시 첫 5분 명령. fw 가 어떤 family + 어떤 table 을 가지고 있는지 가시화
      해야 정책 분석 가능. `inet` family 는 IPv4+IPv6 통합 (가장 유연).

      ## 🔍 결과 해석

      - **정상**: 3 table 모두 출력
      - **비정상**: `inet six_filter` 누락 → entrypoint 의 `nft -f /etc/nftables.conf`
        적용 실패 → `docker logs 6v6-fw` 로 syntax error 확인 + nftables.conf 수정 + 재배포
      - `XT match` 경고는 docker 의 ipset 호환 모듈 부재 잡음 (무시 OK)
    hint: ssh 6v6-fw sudo nft list tables
    category: survey
    points: 10
    answer: |
      ssh 6v6-fw 'sudo nft list tables 2>&1 | grep -v "^XT"'
      echo "--- JSON 형식 ---"
      ssh 6v6-fw 'sudo nft -j list tables | jq "[.nftables[] | select(.table) | .table | {family, name}]"'
    answer_detail: |
      3 table 출력 — `table ip nat` (Docker daemon 자동 생성, DNS 127.0.0.11),
      `table inet six_filter` (6v6 entrypoint 의 nftables.conf 가 정의한 정책 본체),
      `table ip six_nat` (NAT stub, W03 에서 채워짐). JSON 형식 결과는 `[{"family":"ip","name":"nat"},{"family":"inet","name":"six_filter"},{"family":"ip","name":"six_nat"}]`.
    verify:
      type: output_contains
      expect: six_filter
      field: stdout
      semantic:
        intent: |
          fw 의 3 table 가시화 + family / name 구조 이해. `inet six_filter` 가 정책의
          본체. `ip six_nat` 는 W03 의 NAT 학습 대상.
        success_criteria:
          - inet six_filter
          - ip six_nat
          - ip nat (Docker)
        acceptable_methods:
          - |
            **[OSS] nft list tables — 표준** — 가장 빈번.
              ssh 6v6-fw 'sudo nft list tables 2>&1 | grep -v "^XT"'
            예상 출력 `table ip nat / table inet six_filter / table ip six_nat`.
            운영 해석: 3 table 확인. `XT match` 경고는 docker ipset 호환 모듈 부재로
            인한 잡음 (무시).
          - |
            **[OSS] nft -j list tables (JSON 자동화)** — DevOps 친화.
              ssh 6v6-fw 'sudo nft -j list tables | jq "[.nftables[] | select(.table) | .table | {family, name}]"'
            예상 출력 `[{"family":"ip","name":"nat"},{"family":"inet","name":"six_filter"},{"family":"ip","name":"six_nat"}]`.
            운영 해석: JSON 으로 파싱 친화. dashboard 통합 또는 자동 audit.
          - |
            **[OSS] nft list ruleset (전체)** — 종합.
              ssh 6v6-fw 'sudo nft list ruleset 2>&1 | grep -v "^XT" | head -30'
            예상 출력 `table ip nat { ... } / table inet six_filter { ... } / table ip six_nat { ... }`.
            운영 해석: ruleset 의 전체 라인. table 외부 + chain 헤더 + 룰 본문 모두.
          - |
            **[OSS] /etc/nftables.conf (source of truth)** — IaC.
              ssh 6v6-fw 'sudo cat /etc/nftables.conf | head -30'
            예상 출력 `#!/usr/sbin/nft -f / add table inet six_filter / flush table inet six_filter / table inet six_filter { ... }`.
            운영 해석: entrypoint 가 부팅마다 적용하는 정책 파일.
          - |
            **[OSS] iptables-nft -L (호환 view)** — legacy.
              ssh 6v6-fw 'sudo iptables-nft -L -n -v 2>&1 | head -20'
            예상 출력 `Chain INPUT (policy ACCEPT) / Chain FORWARD ...`.
            운영 해석: iptables 명령이 nftables backend 사용 — 호환 모드. legacy 학습.
          - |
            **[OSS] /proc/net/nf_tables_chains (커널 인터페이스)** — 디버그.
              ssh 6v6-fw 'sudo cat /proc/net/nf_tables 2>/dev/null | head' || \
              ssh 6v6-fw 'sudo ls /proc/sys/net/netfilter/ | head'
            예상 출력 `0  ip   filter / nf_log_all_netns / nf_conntrack_acct / ...`.
            운영 해석: 커널이 인식한 table. nft 의 출력과 동일.
          - |
            **[OSS] flowtable / set 가시화** — 자료구조.
              ssh 6v6-fw 'sudo nft list flowtables 2>&1 | head'
              ssh 6v6-fw 'sudo nft list sets 2>&1 | head'
            예상 출력 `(set 없음) 또는 (정의된 set 출력)`.
            운영 해석: flowtable 은 hardware offload. set 은 blocklist 등.
          - |
            **[OSS] nft monitor (변경 감시 실시간)** — 운영 audit.
              ssh 6v6-fw 'sudo timeout 5 nft monitor 2>&1 | head -10'
              # 다른 터미널에서 룰 추가/삭제 시 이벤트 표시
            예상 출력 `(5초 대기 후 종료)`.
            운영 해석: 누가 룰을 변경하는지 실시간 audit.
        negative_signs:
          - inet six_filter 누락
          - 3 table 미만 출력
          - sudo 권한 부족
    target_vm: fw

  # ============================================================
  # STEP 2 — chain + handle + counter (forward chain 의 본체)
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION

      forward chain 의 **4 attribute (type/hook/priority/policy)** + 룰의 **handle** +
      **counter** 를 직접 가시화한다.

      ## 💻 실행 명령

      ```bash
      # 1. handle 포함 chain 출력 (-a 옵션)
      ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'

      # 2. counter 초기화 (운영 측정 전 baseline)
      ssh 6v6-fw 'sudo nft reset counters table inet six_filter'

      # 3. 트래픽 발생 후 counter 변화
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/' >/dev/null
      sleep 2
      ssh 6v6-fw 'sudo nft list chain inet six_filter forward | grep -B1 counter'
      ```

      ## 📋 확인 사항

      - 명령 1 출력에 `chain forward { # handle 2` + `ct state established,related accept # handle 8`
        (각 룰의 `# handle N` 표기)
      - chain header: `type filter hook forward priority filter; policy accept;`
      - 명령 3 출력의 counter 가 0 이상 (트래픽 발생 후 증가)

      ## 💡 왜 이걸 하는가?

      handle 은 룰 삭제 시 필수 ID. counter 는 룰별 효과 측정 (한 번도 매치 안 된
      룰은 candidate for removal). production 운영의 표준 분석 도구.

      ## 🔍 결과 해석

      - **정상**: handle + counter 모두 정수
      - **비정상**: handle 미표시 → `-a` 옵션 빠짐
      - counter 0 (트래픽 발생 후) → 룰이 packet 매치 못함 → ruleset 점검
    hint: ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
    category: monitoring
    points: 15
    answer: |
      echo "=== forward chain 의 handle + 룰 ==="
      ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
      echo
      echo "=== counter reset → 트래픽 → 측정 ==="
      ssh 6v6-fw 'sudo nft reset counters table inet six_filter > /dev/null 2>&1'
      ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/' >/dev/null
      sleep 2
      ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward | grep -E "counter|chain"'
    answer_detail: |
      forward chain 출력 — `chain forward { # handle 2 / type filter hook forward
      priority filter; policy accept; / ct state established,related accept # handle 8 / }`.
      handle 2 = chain 자체의 ID (삭제 시 `nft delete chain ip filter forward handle 2`).
      handle 8 = `ct state ...` 룰의 ID. counter reset 후 한 번 curl → counter 의
      packets/bytes 가 증가했는지 확인 (forward chain 의 ct established 룰은 매치
      안 될 수도 있음 — input chain 통과).
    verify:
      type: output_contains
      expect: handle
      field: stdout
      semantic:
        intent: |
          chain header 의 4 attribute + 룰의 handle + counter 분석.
        success_criteria:
          - handle 정수
          - type filter
          - hook forward
        acceptable_methods:
          - |
            **[OSS] nft -a list chain — 표준** — handle 포함.
              ssh 6v6-fw 'sudo nft -a list chain inet six_filter forward'
            예상 출력 `chain forward { # handle 2 / type filter hook forward priority filter; policy accept; / ct state established,related accept # handle 8 / }`.
            운영 해석: `-a` 옵션이 handle 표시. 룰 삭제 시 필수.
          - |
            **[OSS] nft list chain (handle 없이)** — 단순.
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward'
            예상 출력 `chain forward { ... }` 동일하지만 handle 미표시.
            운영 해석: 정책 분석에 충분. 룰 삭제 시 `-a` 필요.
          - |
            **[OSS] nft -j list chain (JSON 형식)** — 자동화.
              ssh 6v6-fw 'sudo nft -j list chain inet six_filter forward | jq'
            예상 출력 `{"nftables":[{"chain":{...,"handle":2,...}},{"rule":{"handle":8,...}}]}`.
            운영 해석: JSON 으로 chain header + 룰 모두 파싱. dashboard 통합 친화.
          - |
            **[OSS] nft reset counters — 통계 초기화** — 운영.
              ssh 6v6-fw 'sudo nft reset counters table inet six_filter'
            예상 출력 `(아무 출력)`.
            운영 해석: 운영 측정 전 초기화 → 깨끗한 baseline.
          - |
            **[OSS] 트래픽 발생 후 counter 증가 확인** — 검증.
              ssh 6v6-fw 'sudo nft reset counters table inet six_filter > /dev/null'
              ssh 6v6-attacker 'for i in 1 2 3; do curl -s -o /dev/null -H "Host: juice.6v6.lab" http://10.20.30.1/; done'
              sleep 2
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | grep counter'
            예상 출력 `ct state established,related counter packets N bytes M accept`.
            운영 해석: 트래픽 발생 후 counter 증가 → 룰이 적중 중.
          - |
            **[OSS] /proc/net/nf_conntrack — conntrack 의 동일 데이터** — 비교.
              ssh 6v6-fw 'sudo cat /proc/net/nf_conntrack 2>/dev/null | head -5'
            예상 출력 `ipv4 2 tcp 6 86400 ESTABLISHED src=... dst=... [ASSURED]`.
            운영 해석: conntrack table 이 stateful firewall 의 메모리. `ct state` 룰의
            평가 기준.
          - |
            **[OSS] policy accept vs drop — chain 의 default** — 정책 결정.
              ssh 6v6-fw 'sudo nft list chain inet six_filter forward | head -2'
            예상 출력 `chain forward { / type filter hook forward priority filter; policy accept;`.
            운영 해석: policy accept = 룰 미매치 시 기본 accept. production 운영은
            policy drop + 명시적 화이트리스트.
          - |
            **[OSS] 모든 chain 의 메타 한 번에** — 종합.
              ssh 6v6-fw 'sudo nft list chains 2>&1 | grep -E "table|chain"'
            예상 출력 `(모든 table 의 chain 목록)`.
            운영 해석: 5+ chain 가시화 (filter input/forward/output + nat prerouting/postrouting + Docker chain).
        negative_signs:
          - handle 없음 (`-a` 미사용)
          - chain header 누락
    target_vm: fw

  # ============================================================
  # STEP 3 — iptables-translate 마이그레이션 (3 변환)
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION

      legacy iptables 룰 **3 건** 을 `iptables-translate` 로 nftables 명령으로 변환
      하고 각 변환의 의미를 한글 1줄로 해설.

      ## 💻 실행 명령

      ```bash
      # 변환 1: 사내망 ACCEPT
      ssh 6v6-fw 'iptables-translate -A INPUT -s 192.168.1.0/24 -j ACCEPT'

      # 변환 2: DNS outbound (UDP 53)
      ssh 6v6-fw 'iptables-translate -A OUTPUT -p udp --dport 53 -j ACCEPT'

      # 변환 3: stateful 응답 path
      ssh 6v6-fw 'iptables-translate -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT'
      ```

      ## 📋 확인 사항

      - 변환 1 결과: `nft add rule ip filter INPUT ip saddr 192.168.1.0/24 counter accept`
      - 변환 2 결과: `nft add rule ip filter OUTPUT udp dport 53 counter accept`
      - 변환 3 결과: `nft add rule ip filter FORWARD ct state related,established counter accept`
      - 변환 3 의 `-m state` → `ct state` 매핑 인지 (가장 중요한 변환)

      ## 💡 왜 이걸 하는가?

      RHEL 7 → 8, Debian 9 → 10 마이그레이션의 표준 절차. legacy iptables 룰셋을
      nftables 로 안전하게 옮길 때 자동 변환 + 사람이 의미 검증.

      ## 🔍 결과 해석

      - **정상**: 3 변환 모두 `nft add rule ip filter ...` 형식 + counter accept 자동
        추가
      - **비정상**: `iptables-translate: command not found` → fw Dockerfile 의 iptables
        패키지 누락 (이미 설치됨, 정상)
    hint: ssh 6v6-fw iptables-translate -A INPUT -s 192.168.1.0/24 -j ACCEPT
    category: migration
    points: 15
    answer: |
      echo "=== 변환 1: 사내망 ACCEPT ==="
      ssh 6v6-fw 'iptables-translate -A INPUT -s 192.168.1.0/24 -j ACCEPT'
      echo "  의미: 192.168.1.0/24 사내망의 모든 트래픽을 input chain 에서 accept"
      echo
      echo "=== 변환 2: DNS outbound ==="
      ssh 6v6-fw 'iptables-translate -A OUTPUT -p udp --dport 53 -j ACCEPT'
      echo "  의미: outbound UDP 53 (DNS 쿼리) 허용"
      echo
      echo "=== 변환 3: stateful 응답 path ==="
      ssh 6v6-fw 'iptables-translate -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT'
      echo "  의미: forward chain 에서 conntrack 의 established/related 상태 모두 accept (응답 path)"
    answer_detail: |
      3 변환 결과 모두 `nft add rule ip filter <CHAIN> <condition> counter accept`
      형식. 의미:
      1. `192.168.1.0/24` → 사내망 IP 화이트리스트.
      2. `udp --dport 53` → DNS 쿼리 outbound 허용.
      3. `-m state --state ESTABLISHED,RELATED` → conntrack 의 stateful 응답 path.
      iptables 의 `-m state` 가 nft 의 `ct state` 로 매핑됨.
    verify:
      type: output_contains
      expect: nft
      field: stdout
      semantic:
        intent: |
          iptables 명령을 nft 동등 명령으로 변환. 3 사례 + 의미 해석.
        success_criteria:
          - nft 키워드 3건
          - ct state 변환
          - ip saddr 또는 udp dport
        acceptable_methods:
          - |
            **[OSS] iptables-translate — 단일 룰** — 표준.
              ssh 6v6-fw 'iptables-translate -A INPUT -s 192.168.1.0/24 -j ACCEPT'
            예상 출력 `nft add rule ip filter INPUT ip saddr 192.168.1.0/24 counter accept`.
            운영 해석: iptables `-s` → nft `ip saddr`. `-j ACCEPT` → `counter accept`
            (counter 자동 추가).
          - |
            **[OSS] iptables-translate — UDP 포트** — 변환 예시 2.
              ssh 6v6-fw 'iptables-translate -A OUTPUT -p udp --dport 53 -j ACCEPT'
            예상 출력 `nft add rule ip filter OUTPUT udp dport 53 counter accept`.
            운영 해석: `-p udp --dport` → `udp dport`. 단순 매핑.
          - |
            **[OSS] iptables-translate — stateful** — 변환 예시 3.
              ssh 6v6-fw 'iptables-translate -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT'
            예상 출력 `nft add rule ip filter FORWARD ct state related,established counter accept`.
            운영 해석: `-m state --state` → `ct state`. 가장 중요한 변환 — stateful
            firewall 의 핵심.
          - |
            **[OSS] iptables-save | iptables-restore-translate — 전체 룰셋** — 종합.
              ssh 6v6-fw 'sudo iptables-save 2>&1 | head -10'
              ssh 6v6-fw 'sudo iptables-save | iptables-restore-translate 2>&1 | head -10'
            예상 출력 `# Generated by ... / *filter / :INPUT ACCEPT / ... → nft flush ruleset; nft -f - <<EOF / ...`.
            운영 해석: legacy 전체 ruleset → 새 nft ruleset 자동 변환. mig 표준.
          - |
            **[OSS] iptables-nft (호환 mode)** — 점진적.
              ssh 6v6-fw 'readlink /etc/alternatives/iptables'
              # /usr/sbin/iptables-nft 면 nftables backend 사용 중
            예상 출력 `/usr/sbin/iptables-nft`.
            운영 해석: iptables 명령을 사용하면서 backend 는 nftables. 마이그 과도기.
          - |
            **[OSS] 양 명령의 동일 효과 검증** — 호환.
              # iptables -A 로 룰 추가 (사실 nft 에 추가됨)
              # ssh 6v6-fw 'sudo iptables-nft -A INPUT -s 10.20.30.99 -j DROP'
              # ssh 6v6-fw 'sudo nft -a list chain ip filter INPUT | grep 10.20.30.99'
