  - order: 2
    instruction: |
      ## 🎯 MISSION — audit log 정확한 JSON 구조 + messages[] embedded metadata 파싱

      lecture §5.5 — `audit_data.messages[]` 가 JSON object 가 아니라 **단일 string** 에
      `[key "value"]` 형식이 embedded. 단순 `.messages[].id` 추출 안 됨.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "keys"'
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq ".transaction"'
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "{line:.request.request_line, host:.request.headers.host, xff:.request.headers.\"x-forwarded-for\"}"'
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "{status:.response.status}"'
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "{msgs:(.audit_data.messages | length), errs:(.audit_data.error_messages | length)}"'
      # ⚠️ messages 의 정확한 형식 — jq + regex
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" | grep -oE "\[id \"[0-9]+\"\]"'
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" | grep -oE "\[id \"[0-9]+\"\]" | sort -u'
      ```

      ## 📋 확인 사항

      - **keys**: `["audit_data", "request", "response", "transaction"]` 4 sub-section
      - **transaction**: `remote_address: 10.20.32.1` (ips MASQ) / `local_address: 10.20.32.80` (web)
      - **request**: `host: juice.6v6.lab`, `xff: 10.20.30.202` (attacker)
      - **response**: status 200 또는 403
      - **audit_data**: messages count / error_messages count
      - **매치 룰**: `[id "941100"]` `[id "941110"]` ... (embedded format)

      ## 💡 왜 이걸 하는가?

      audit log 분석 자동화 시 messages[] 의 정확한 형식 인지 필수. 많은 운영자가
      `.messages[].id` 로 parse 시도 → silent fail.

      ## 🔍 결과 해석

      - **정상**: 4 sub-section + jq + regex 결합 추출
      - **운영 권장**: jq + grep / Python regex 결합. Wazuh decoder (W10) 가 manager 측 parse
