      ## 🎯 MISSION — SQLi + 942xxx + libinjection fingerprint

      SQL Injection 페이로드 → 942xxx 룰 매치 + libinjection fingerprint 확인 + encoding
      bypass 시뮬.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker "curl -s -o /dev/null -w '응답: %{http_code}\n' -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1' OR '1'='1\""
      sleep 2
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" | grep -oE "\[id \"94[0-9]+\"\]" | sort -u'
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" | grep -oE "Total Score: [0-9]+|SQLI=[0-9]+"'
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" | grep -oE "fingerprint .[a-zA-Z0-9_\\&]+." | head -1'

      # encoding bypass 시뮬
      ssh 6v6-attacker "curl -s -o /dev/null -w '응답: %{http_code}\n' -H 'Host: juice.6v6.lab' \"http://10.20.30.1/?q=1%27%20UNION%20SELECT\""
      sleep 2
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" | grep -oE "\[id \"94[0-9]+\"\]" | sort -u'
      ```

      ## 📋 확인 사항

      - **응답: 403** (block)
      - **942xxx 매치**: `[id "942100"]` (libinjection) + `[id "942130"]`/`[id "942140"]`
      - **anomaly score**: 5+ (libinjection critical → score 5)
      - **fingerprint**: `'1&1'` 또는 비슷 (libinjection 표현)
      - **encoding bypass**: 동일 942xxx 매치 (CRS normalize 효과)

      ## 💡 왜 이걸 하는가?

      libinjection 의 SQL fingerprint 는 정규식 기반보다 정확. encoding bypass 도 CRS 가
      normalize 후 매치 → paranoia 1 에서도 효과.

      ## 🔍 결과 해석

      - **정상**: 403 + 942xxx + fingerprint
      - **IR 활용**: fingerprint 가 attack vector 식별 단서
      - **paranoia 2 효과**: comment 우회 (`/*X*/UNION`) 매치
