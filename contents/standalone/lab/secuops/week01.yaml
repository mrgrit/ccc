            예상 출력 `SecRuleEngine On / SecAuditEngine RelevantOnly / SecAuditLogFormat JSON / SecAuditLog /var/log/apache2/modsec_audit.log / SecRequestBodyAccess On / SecResponseBodyAccess On / SecDefaultAction "phase:2,log,auditlog,deny,status:403"`.
            운영 해석: On + JSON + RelevantOnly = Wazuh decoder 친화 + 디스크 효율.
          - |
            **[OSS] CRS 룰셋 파일 수** — 룰셋 활성.
              ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | wc -l'
              ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/REQUEST-9*.conf | head'
            예상 출력 `31 / REQUEST-901-INITIALIZATION.conf / REQUEST-941-...-XSS.conf / REQUEST-942-...-SQLI.conf`.
            운영 해석: 31 룰 파일. 941 (XSS), 942 (SQLi), 930 (LFI), 932 (RCE) 핵심.
          - |
