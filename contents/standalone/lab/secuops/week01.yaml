lab_id: standalone-secuops-week01
title: 6v6 4-tier 인프라 헬스체크 + Red/Blue/Purple 통합 시나리오
version: standalone-non-ai
course: secuops
week: 1
description: |
  6v6 4-tier 토폴로지 (ext → pipe → dmz → int) 위의 5종 보안 솔루션 (방화벽
  nftables / IPS Suricata / WAF ModSecurity / SIEM Wazuh / 운영 portal) 을 단계별
  헬스체크. 마지막 4 step 은 Red/Blue/Purple 통합 — attacker 한 공격이 fw → ips →
  web → siem 4 도구에 어떻게 흔적을 남기는지 실시간 추적.
difficulty: easy
duration_minutes: 180
audience: 보안 솔루션 운영 입문자 (1주차)
prerequisites:
  - 학생 PC `~/.ssh/config` 에 6v6-bastion + 6v6-* ProxyJump 설정 완료
  - 학생 PC `/etc/hosts` 에 VM_IP 의 11 vhost (`*.6v6.lab`) 매핑
  - 비밀번호 `ccc` 로 모든 컨테이너 SSH 가능 (sudo NOPASSWD)

objectives:
  - 4-tier 토폴로지의 16 컨테이너 가시화 + 4 bridge 분리 검증
  - 5종 보안 솔루션 (방화벽/IPS/WAF/SIEM/호스트 가시화) 가동 상태 확인
  - bastion ProxyJump 모델로 단일 진입점 + 직접 IP 접속 차단 정책 검증
  - HAProxy 의 6 backend 라우팅 (waf/waf_tls/dashboard/portal/bastion/bastion_api) 의 host header ACL
  - "Red/Blue/Purple 통합 — 공격 1건의 4 도구 흔적 추적 + gap 식별"

pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — bastion 점프 호스트 + 16 컨테이너 가시화
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION

      bastion 컨테이너에 SSH 진입 후 `docker ps` 로 6v6 의 **16개 컨테이너**가 모두
      `Up` 상태인지 확인한다.

      ## 💻 실행 명령

      학생 PC 터미널에서 정확히 다음 3 명령을 순서대로 실행:

      ```bash
      # 1. 16 컨테이너 가시화
      ssh 6v6-bastion 'docker ps --format "{{.Names}} {{.Status}}"'

      # 2. 컨테이너 수 카운트 (16 이어야 정상)
      ssh 6v6-bastion 'docker ps --format "{{.Names}}" | wc -l'

      # 3. 비정상 컨테이너 (Restarting / Exited) 만 추출 (없어야 정상)
      ssh 6v6-bastion 'docker ps -a --format "{{.Names}} {{.Status}}" | grep -vE "Up|^$"'
      ```

      ## 📋 확인 사항

      - 컨테이너 16개 모두 출력 (bastion, attacker, fw, ips, web, siem, wazuh-indexer,
        wazuh-dashboard, portal, juiceshop, dvwa, neobank, govportal, mediforum,
        adminconsole, aicompanion)
      - 모든 라인의 상태가 `Up` 으로 시작
      - 3번 명령 결과가 빈 결과 (= 비정상 0건)

      ## 💡 왜 이걸 하는가?

      보안 운영자는 인프라 인수 시 첫 30초 안에 자산 인벤토리를 확보해야 한다. 6v6 는
      16개 컨테이너의 단일 진입점 (bastion) 을 두어 ISMS-P 2.5 (인증·권한관리) 의
      single point of access 원칙을 모사한다.

      ## 🔍 결과 해석

      - **정상**: 16개 모두 `Up` + 비정상 0건
      - **비정상**: `Restarting` / `Exited` 1개라도 있으면 즉시 `docker logs <name>` 로 원인 파악
    hint: ssh 6v6-bastion 'docker ps --format "{{.Names}} {{.Status}}"'
    category: survey
    points: 8
    answer: |
      ssh 6v6-bastion 'docker ps --format "{{.Names}} {{.Status}}"' | tee /tmp/w01s1.txt
      echo "--- 컨테이너 수 ---"
      wc -l < /tmp/w01s1.txt
      echo "--- 비정상 컨테이너 ---"
      grep -vE "Up|^$" /tmp/w01s1.txt || echo "(없음 — 모두 Up)"
    answer_detail: |
      16 컨테이너 모두 Up 출력 + 비정상 0건. 출력 시점에 컨테이너 수가 15 이하면
      `docker compose ps -a` 로 Exited 컨테이너 확인 후 `docker compose up -d
      <name>` 으로 복구.
    verify:
      type: output_contains
      expect: 6v6-
      field: stdout
      semantic:
        intent: |
          bastion 컨테이너에 SSH 진입 후 docker ps 로 16 컨테이너 가시화. 16 컨테이너
          모두 Up 상태. ISMS-P 2.5 + NIST CSF Identify (자산 인벤토리) 의 첫 단계.
        success_criteria:
          - 6v6- prefix 컨테이너 15+ 출력
          - Up 키워드
          - bastion / fw / ips / web / siem 5 핵심 컨테이너 포함
        acceptable_methods:
          - ssh 6v6-bastion 'docker ps --format "{{.Names}} {{.Status}}"'
          - |
            **[OSS] docker ps 표준** — 가장 자주.
              ssh 6v6-bastion 'docker ps --format "{{.Names}} {{.Status}}"'
              # 컨테이너 수
              ssh 6v6-bastion 'docker ps --format "{{.Names}}" | wc -l'
            예상 출력 `6v6-bastion Up X seconds / 6v6-attacker Up 2 days / ... / 16`.
            운영 해석: 16 컨테이너 가시화. 결과가 15 이하면 Exited 점검.
          - |
            **[OSS] docker compose ps (호스트 측)** — 강사용.
              cd /home/opsclaw/6v6 && docker compose ps
              # 서비스명 + 상태 + health
              docker compose ps --format json | jq '.[] | {Service, State, Health}'
            예상 출력 `bastion running / fw running / ips running / ...`.
            운영 해석: compose 단위로 의존성 검증 (ips 가 fw 보다 먼저 시작 시 fail).
          - |
            **[OSS] docker stats — 자원 사용** — 모니터링.
              ssh 6v6-bastion 'docker stats --no-stream --format "{{.Name}} {{.CPUPerc}} {{.MemUsage}}"'
            예상 출력 `6v6-wazuh-indexer 5.0% 1.2GiB / 5.8GiB / ...`.
            운영 해석: indexer 가 1GB+ 메모리 사용 정상 (heap 1g). 그 외는 100MB 내.
          - |
            **[OSS] docker inspect — fw/ips dual NIC** — 토폴로지.
              for c in 6v6-fw 6v6-ips; do
                echo "=== $c ==="
                ssh 6v6-bastion "docker inspect $c --format '{{range \$k,\$v := .NetworkSettings.Networks}}{{\$k}}={{\$v.IPAddress}} {{end}}'"
              done
            예상 출력 `6v6-ext=10.20.30.1 6v6-pipe=10.20.31.1 / 6v6-pipe=10.20.31.2 6v6-dmz=10.20.32.1`.
            운영 해석: fw + ips 각 2 NIC = 라우터 모드. 1 NIC 만 있으면 forward 불가.
          - |
            **[OSS] docker network ls — 4 bridge** — 토폴로지.
              ssh 6v6-bastion 'docker network ls | grep 6v6'
              for n in 6v6-ext 6v6-pipe 6v6-dmz 6v6-int; do
                ssh 6v6-bastion "docker network inspect $n --format '{{(index .IPAM.Config 0).Subnet}}'"
              done
            예상 출력 `6v6-ext / 6v6-pipe / 6v6-dmz / 6v6-int / 10.20.30.0/24 / 10.20.31.0/24 / 10.20.32.0/24 / 10.20.40.0/24`.
            운영 해석: 4 bridge 의 subnet 이 CURRICULUM 의 4-tier 와 일치.
          - |
            **[OSS] ssh -G + 6v6-bastion 라인** — config 검증.
              ssh -G 6v6-bastion | grep -E "^(hostname|user|port|proxyjump)"
            예상 출력 `hostname 192.168.0.110 / user ccc / port 2204`.
            운영 해석: ssh -G 가 실제 적용된 config. ProxyJump 비어 있으면 학생 PC
            `~/.ssh/config` 점검.
          - |
            **[OSS] /etc/hosts 의 11 vhost 매핑** — 학생 PC 환경.
              getent hosts juice.6v6.lab dvwa.6v6.lab siem.6v6.lab portal.6v6.lab
              # 모두 같은 VM_IP 로 resolve 되어야 함
            예상 출력 `192.168.0.110 juice.6v6.lab / 192.168.0.110 dvwa.6v6.lab / ...`.
            운영 해석: hosts 매핑 없으면 브라우저에서 host header 가 다른 도메인으로
            → default backend (waf) 로 떨어짐.
          - |
            **[OSS] sudo NOPASSWD 검증** — 학습 환경 전제.
              ssh 6v6-fw 'sudo -n nft list tables 2>&1 | head -3'
              ssh 6v6-fw 'cat /etc/sudoers.d/ccc 2>/dev/null'
            예상 출력 `table inet six_filter / ccc ALL=(ALL) NOPASSWD: ALL`.
            운영 해석: 학습 환경만 NOPASSWD. production 절대 금지.
        negative_signs:
          - SSH 접속 실패
          - 컨테이너 16개 미만
          - Restarting 상태
    target_vm: bastion

  # ============================================================
  # STEP 2 — ProxyJump 4 컨테이너 통과
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION

      ProxyJump 통과 검증 — **fw / ips / web / siem 4 컨테이너에 순차 진입** 후
      hostname 응답 확인.

      ## 💻 실행 명령

      ```bash
      for h in fw ips web siem; do
        echo "=== 6v6-$h ==="
        ssh -o ConnectTimeout=5 6v6-$h hostname
      done
      ```

      ## 📋 확인 사항

      - `=== 6v6-fw ===` 다음 줄에 `fw` 출력
      - `=== 6v6-ips ===` 다음 줄에 `ips` 출력
      - `=== 6v6-web ===` 다음 줄에 `web` 출력
      - `=== 6v6-siem ===` 다음 줄에 `wazuh.manager` 출력 (siem 컨테이너 hostname)
      - 4 hostname 모두 응답이 나와야 정상

      ## 💡 왜 이걸 하는가?

      6v6 의 단일 진입점 정책 검증. 학생 PC 에서 fw/ips/web/siem 의 IP 로 **직접 접속은
      불가** (docker bridge 가 학생 PC LAN 에 라우팅 없음). bastion (192.168.0.110 port 2204)
      만이 유일한 진입점.

      ## 🔍 결과 해석

      - **정상**: 4 hostname 모두 응답 → ProxyJump 동작
      - **비정상 1**: 1+ 호스트 timeout → 해당 컨테이너 sshd 또는 학생 PC `~/.ssh/config`
        의 `Host 6v6-*  ProxyJump 6v6-bastion` 라인 점검
      - **비정상 2**: 모든 hostname timeout → bastion 자체 sshd / `AllowTcpForwarding yes` 점검
    hint: |
      for h in fw ips web siem; do echo "--- $h ---"; ssh 6v6-$h hostname; done
    category: survey
    points: 8
    answer: |
      for h in fw ips web siem; do
        echo "=== 6v6-$h ==="
        ssh -o ConnectTimeout=5 6v6-$h hostname
      done
    answer_detail: |
      4 호스트 모두 hostname 응답 — 예상: `fw / ips / web / wazuh.manager`. siem 의
      hostname 은 컨테이너 안에서 `wazuh.manager` (docker-compose 의 hostname 설정).
      timeout 발생 시 학생 PC `~/.ssh/config` 의 `Host 6v6-*  ProxyJump 6v6-bastion`
      라인 점검.
    verify:
      type: output_contains
      expect: fw
      field: stdout
      semantic:
        intent: |
          bastion ProxyJump 통과 검증. 학생 PC 에서 4 컨테이너 (fw/ips/web/siem) 의
          hostname 응답 → ssh_config 의 ProxyJump 정상.
        success_criteria:
          - fw hostname 출력
          - ips hostname 출력
          - web hostname 출력
          - wazuh.manager 또는 siem hostname
        acceptable_methods:
          - |
            **[OSS] for + ssh + hostname** — 표준.
              for h in fw ips web siem; do
                ssh -o ConnectTimeout=5 6v6-$h hostname
              done
            예상 출력 `fw / ips / web / wazuh.manager`.
            운영 해석: 4 hostname 모두 응답 → 정상.
          - |
            **[OSS] ssh -G — config 적용 확인** — 진단.
              ssh -G 6v6-fw | grep -iE '^(proxyjump|hostname|user|port)'
            예상 출력 `proxyjump 6v6-bastion / hostname 6v6-fw / user ccc / port 22`.
            운영 해석: ssh -G 의 출력이 실제 적용 config. ProxyJump 라인 비어 있으면
            wildcard 매치 실패.
          - |
            **[OSS] ssh -vv — 진단 로그** — 깊은 디버그.
              ssh -vv 6v6-fw exit 2>&1 | grep -E "Connecting|Authenticated|ProxyJump" | head
            예상 출력 `Connecting to 192.168.0.110 port 2204 / Authenticated to ... via password / Connecting to 6v6-fw port 22 (via 6v6-bastion)`.
            운영 해석: 2 hop 모두 디버그 로그에 표시. 1 hop 만 보이면 ProxyJump 미적용.
          - |
            **[OSS] 직접 IP 접속 차단 검증** — 보안 정책.
              ssh -o ConnectTimeout=3 ccc@10.20.30.1 hostname 2>&1 | tail -2
            예상 출력 `connect to host 10.20.30.1 port 22: No route to host` 또는 timeout.
            운영 해석: 학생 PC ↔ docker bridge 라우팅 없음 → 직접 진입 불가. bastion 만
            유일 진입점이라는 정책 입증.
          - |
            **[OSS] bastion sshd_config 의 AllowTcpForwarding** — 서버 측.
              ssh 6v6-bastion 'sudo grep -E "^AllowTcpForwarding|^GatewayPorts|^MaxSessions" /etc/ssh/sshd_config'
            예상 출력 `AllowTcpForwarding yes / GatewayPorts no / MaxSessions 10`.
            운영 해석: AllowTcpForwarding yes 가 ProxyJump 의 필수 조건.
          - |
            **[OSS] known_hosts 의 fingerprint** — MITM 방지.
              for h in 6v6-fw 6v6-ips 6v6-web 6v6-siem; do
                ssh-keygen -F $h && echo "OK: $h"
              done
            예상 출력 `# Host 6v6-fw found / OK: 6v6-fw / ...`.
            운영 해석: 4 fingerprint 모두 알려진 호스트 → MITM 없는 정상 진입.
          - |
            **[OSS] PermitRootLogin 검증** — 보안.
              for h in fw ips web siem; do
                echo "--- $h ---"
                ssh 6v6-$h 'sudo grep -E "^PermitRootLogin" /etc/ssh/sshd_config'
              done
            예상 출력 `PermitRootLogin no` × 4.
            운영 해석: root 직접 로그인 금지 = 보안 기본.
          - |
            **[OSS] 각 컨테이너의 uname + id** — 정체성.
              for h in fw ips web siem; do
                echo "=== $h ==="
                ssh 6v6-$h 'hostname; uname -r; id'
              done
            예상 출력 `fw / 6.8.0-... / uid=1000(ccc) ...`.
            운영 해석: kernel 공통 (Docker container), user ccc 공통.
        negative_signs:
          - hostname 출력 누락 (1+ 호스트)
          - timeout
          - 직접 IP 접속 시도
    target_vm: bastion

  # ============================================================
  # STEP 3 — fw nftables ruleset + HAProxy 6 backend
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION

      fw 컨테이너의 nftables ruleset (3 table) + HAProxy 6 backend + host header 4
      라우팅을 확인한다.

      ## 💻 실행 명령

      ```bash
      # 1. nftables 3 table 가시화
      ssh 6v6-fw 'sudo nft list tables 2>&1 | grep -v "^XT"'

      # 2. forward chain 정책
      ssh 6v6-fw 'sudo nft list chain inet six_filter forward'

      # 3. HAProxy frontend + backend 정의
      ssh 6v6-fw 'sudo grep -E "^(backend|frontend)" /etc/haproxy/haproxy.cfg'

      # 4. 4 host header 라우팅 실측 (attacker 에서)
      for h in juice.6v6.lab siem.6v6.lab portal.6v6.lab bastion.6v6.lab; do
        code=$(ssh 6v6-attacker "curl -sk -o /dev/null -w '%{http_code}' -H 'Host: $h' http://10.20.30.1/")
        echo "$h: $code"
      done
      ```

      ## 📋 확인 사항

      - 명령 1: `table ip nat` + `table inet six_filter` + `table ip six_nat` 3개 출력
      - 명령 2: `chain forward { type filter hook forward priority filter; policy accept; ... }`
      - 명령 3: `backend waf`, `backend waf_tls`, `backend dashboard`, `backend portal`,
        `backend bastion`, `backend bastion_api` 6개
      - 명령 4: `juice.6v6.lab: 200`, `siem.6v6.lab: 302`, `portal.6v6.lab: 200`,
        `bastion.6v6.lab: 200`

      ## 💡 왜 이걸 하는가?

      fw 는 Defense in Depth 의 L1 — 모든 패킷이 가장 먼저 만나는 게이트. fw 의 정책
      (nftables) + 라우팅 (HAProxy) 둘 다 정상이어야 학생/운영 트래픽이 chain 통과.

      ## 🔍 결과 해석

      - **정상**: 위 4 확인 사항 모두 매치
      - **비정상 1**: `inet six_filter` 누락 → entrypoint 의 `nft -f /etc/nftables.conf`
        적용 실패 → `docker logs 6v6-fw` 확인
      - **비정상 2**: backend 6 미만 → haproxy.cfg 손상
      - **비정상 3**: 4 라우팅 중 `503` → backend 다운 → 해당 dmz 컨테이너 점검
    hint: ssh 6v6-fw 'sudo nft list tables; sudo grep "^backend" /etc/haproxy/haproxy.cfg'
    category: configuration
    points: 10
    answer: |
      echo "=== nft tables ==="
      ssh 6v6-fw 'sudo nft list tables 2>&1 | grep -v "^XT"'
      echo "=== forward chain ==="
      ssh 6v6-fw 'sudo nft list chain inet six_filter forward'
      echo "=== HAProxy backends ==="
      ssh 6v6-fw 'sudo grep -E "^(backend|frontend)" /etc/haproxy/haproxy.cfg'
      echo "=== 4 host header 라우팅 ==="
      for h in juice.6v6.lab siem.6v6.lab portal.6v6.lab bastion.6v6.lab; do
        code=$(ssh 6v6-attacker "curl -sk -o /dev/null -w '%{http_code}' -H 'Host: $h' http://10.20.30.1/")
        echo "$h: $code"
      done
    answer_detail: |
      table 3 (`ip nat / inet six_filter / ip six_nat`) + chain forward 의 default
      policy accept + 1 룰 (established,related accept) + 6 backend (waf / waf_tls /
      dashboard / portal / bastion / bastion_api). 4 host header 라우팅 결과:
      juice.6v6.lab=200, siem.6v6.lab=302, portal.6v6.lab=200, bastion.6v6.lab=200.
    verify:
      type: output_contains
      expect: backend
      field: stdout
      semantic:
        intent: |
          fw 의 nftables ruleset + HAProxy 6 backend + host header 라우팅 정상.
        success_criteria:
          - inet six_filter 출력
          - backend 키워드 6건 이상
          - 200 또는 302 응답
        acceptable_methods:
          - |
            **[OSS] nft list tables — 표준** — 3 table 가시화.
              ssh 6v6-fw 'sudo nft list tables 2>&1 | grep -v "^XT"'
            예상 출력 `table ip nat / table inet six_filter / table ip six_nat`.
            운영 해석: XT match 경고는 docker ipset 호환 모듈 부재 (무시 OK).
          - |
            **[OSS] HAProxy 6 backend** — 정책 핵심.
