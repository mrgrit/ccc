              ssh 6v6-attacker 'curl -s -H "Host: portal.6v6.lab" "http://10.20.30.1/widget/alerts"' | head -20
              ssh 6v6-attacker 'curl -s -H "Host: portal.6v6.lab" "http://10.20.30.1/widget/flows"' | head -20
            예상 출력 `<table><tr><td>6v6-fw</td><td>Up</td></tr> ... / <table>...wazuh alerts ... / Suricata flow ...`.
            운영 해석: 각 위젯이 HTML fragment 반환. 동적 갱신은 hx-get + hx-trigger.
          - |
            **[OSS] portal Bastion API 통합** — 다운스트림.
              # portal 이 bastion API 호출 (BASTION_API_URL=http://10.20.30.201:9100)
              ssh 6v6-bastion 'docker exec 6v6-portal env | grep BASTION'
              # bastion API 의 /health
              ssh 6v6-attacker 'curl -s -H "Host: bastion.6v6.lab" "http://10.20.30.1/health" -H "X-API-Key: ccc-api-key-2026"'
            예상 출력 `BASTION_API_URL=http://10.20.30.201:9100 / BASTION_API_KEY=ccc-api-key-2026 /
            {"status":"ok","kg":...}`.
            운영 해석: portal 이 bastion API 를 호출 → CCC Bastion KG 연동.
          - |
            **[OSS] portal volume 매핑** — 데이터 소스.
              ssh 6v6-bastion docker inspect 6v6-portal --format '{{range .Mounts}}{{.Source}}:{{.Destination}}{{"\n"}}{{end}}'
              # /data/suricata-logs / /data/apache-logs / /data/wazuh
            예상 출력 `/var/.../ips-suricata-logs:/data/suricata-logs / .../web-apache-logs:/data/apache-logs / .../wazuh-manager-logs:/data/wazuh`.
