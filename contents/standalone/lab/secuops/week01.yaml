            예상 출력 `security2_module (shared) / proxy_module (shared) / proxy_http_module / ssl_module / rewrite_module / headers_module`.
            운영 해석: 6 핵심 모듈. security2 가 ModSec, proxy 가 reverse proxy.
          - |
            **[OSS] modsecurity.conf 핵심 키** — 정책.
