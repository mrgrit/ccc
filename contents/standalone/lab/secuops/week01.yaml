      ## 📋 확인 사항

      - 명령 1: 11 daemon `running` (modulesd / monitord / logcollector / remoted /
        syscheckd / analysisd / execd / db / authd / apid + control 자체).
        `clusterd / maild / agentlessd / integratord / dbd / csyslogd` 는 `not running` 정상 (default-off)
