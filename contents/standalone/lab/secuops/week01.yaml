              ssh 6v6-attacker 'curl -s -H "Host: portal.6v6.lab" http://10.20.30.1/ | head -30'
            예상 출력 `200 / <!DOCTYPE html> <html><head><title>6v6 Portal</title> ...`.
            운영 해석: 학생이 브라우저로 http://portal.6v6.lab/ 접근 시 동일 출력.
          - |
            **[OSS] portal 컨테이너 직접** — backend health.
