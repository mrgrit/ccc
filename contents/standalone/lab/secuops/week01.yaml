      - 명령 2: 같은 transaction 의 ips 측 view — `{"src":"10.20.31.1", "url":"/?q=<script>...", "status":403}`.
        두 NIC sniff 라 같은 transaction 이 보통 **2 라인** (src=10.20.31.1 + src=10.20.32.1)

