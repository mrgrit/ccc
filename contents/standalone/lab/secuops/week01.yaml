              ssh 6v6-bastion docker exec 6v6-portal cat /app/requirements.txt 2>/dev/null | head -10 \
                || ssh 6v6-bastion docker exec 6v6-portal pip list 2>/dev/null | grep -iE "fastapi|uvicorn|jinja" | head
            예상 출력 `fastapi==0.111.0 / uvicorn==0.30.0 / jinja2==3.1.4 / httpx==0.27.0`.
            운영 해석: FastAPI + Uvicorn 표준 + jinja 템플릿 + httpx (Bastion API 호출).
        negative_signs:
