      - ATTACK_TS 변수에 UTC ISO timestamp 저장 (Blue step 에서 활용)

      ## 💡 왜 이걸 하는가?

      Defense in Depth 의 효과를 측정하려면 실제 공격이 필요하다. sqlmap UA + XSS +
      SQLi 결합 페이로드 1건이 4 도구 (fw HAProxy → ips Suricata → web ModSec → siem
      Wazuh) 에 동시 흔적을 남긴다. Red Team 의 표준 1 단계.

      ## 🔍 결과 해석

      - **정상 (의도된 결과)**: 응답 `403` → ModSec 가 차단 → WAF 정상 동작
      - **비정상 1**: 응답 `200` → ModSec engine `Off` 또는 룰셋 손실 → STEP 5 재점검
      - **비정상 2**: 응답 `5xx` → backend 다운 또는 HAProxy 라우팅 오류 → STEP 3 재점검
      - **비정상 3**: 응답 `000` (timeout) → fw 의 input chain drop 또는 attacker 컨테이너
        다운
