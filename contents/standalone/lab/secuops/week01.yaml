  # ============================================================
  # STEP 4 — ips Suricata 2 NIC sniff + eve.json
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION

      ips 의 Suricata 가 **두 NIC (eth0+eth1)** 동시 sniff 중인지 + eve.json 에 다양한
      event_type 이 기록되는지 + capture drops 비율을 확인한다.

      ## 💻 실행 명령

      ```bash
      # 1. Suricata 프로세스 + version + uptime
      ssh 6v6-ips 'pgrep -a Suricata; sudo suricatasc -c version; sudo suricatasc -c uptime'

      # 2. eve.json 최근 500 라인의 event_type 분포
      ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c | sort -rn'

      # 3. capture drops 비율 (NIC ring buffer 건강도)
      ssh 6v6-ips 'sudo suricatasc -c dump-counters 2>&1 | jq ".message | {pkts: .[\"capture.kernel_packets\"], drops: .[\"capture.kernel_drops\"], alerts: .[\"detect.alert\"]}"'
      ```

      ## 📋 확인 사항

      - 명령 1: `suricata -i eth1 -i eth0 -c ... --runmode autofp` (두 NIC + autofp) +
        version `6.0.4 RELEASE` + uptime 정수 (초)
      - 명령 2: `flow` 가 가장 많고 `http` / `tls` / `dns` / `alert` 등 3+ 종류 출력
      - 명령 3: `pkts` > 100, `drops` 0 (또는 pkts 의 1% 미만), `alerts` 정수

      ## 💡 왜 이걸 하는가?

      ips 는 L2 — 학생 트래픽이 web 도달 직전 검사. Suricata 가 멈추면 모든 alert
      가 사라진다. SOC 분석가가 "alert 가 안 보일 때 첫 확인" 명령.

      ## 🔍 결과 해석

      - **정상**: pgrep 1건 (두 NIC) + uptime 정수 + event_type 3+ + drops 0
      - **비정상 1**: Suricata 프로세스 없음 → `docker logs 6v6-ips` 또는 systemctl 재시작
      - **비정상 2**: NIC 1개만 sniff → `-i eth0 -i eth1` argv 누락 → entrypoint 점검
      - **비정상 3**: drops > 1% → NIC ring buffer 부족 → `ethtool -G` 로 buffer 증가
      - **비정상 4**: event_type 이 `flow` 하나만 → app-layer decoder 비활성 (suricata.yaml 의 protocols)
    hint: ssh 6v6-ips 'pgrep -a Suricata; sudo suricatasc -c uptime'
    category: monitoring
    points: 10
    answer: |
      echo "=== Suricata 프로세스 (2 NIC) ==="
      ssh 6v6-ips 'pgrep -a Suricata'
      echo "=== version + uptime ==="
      ssh 6v6-ips 'sudo suricatasc -c version; sudo suricatasc -c uptime'
      echo "=== event_type 분포 (최근 500) ==="
      ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -r .event_type 2>/dev/null | sort | uniq -c | sort -rn | head'
      echo "=== drop 비율 ==="
      ssh 6v6-ips 'sudo suricatasc -c dump-counters 2>&1 | jq ".message | {pkts: .[\"capture.kernel_packets\"], drops: .[\"capture.kernel_drops\"], alerts: .[\"detect.alert\"]}"'
    answer_detail: |
      `-i eth1 -i eth0 --runmode autofp` 두 NIC sniff. event_type 분포에서 `flow` 가
      가장 많고 `http`/`tls`/`dns`/`alert` 가 섞여 있어야 정상. drops/pkts ratio < 1%
      가 운영 기준. 본 lab 환경의 drops 는 일반적으로 0.
    verify:
      type: output_contains
      expect: Suricata
      field: stdout
      semantic:
        intent: |
          Suricata 가 두 NIC 동시 sniff + eve.json 다양한 event_type + drops 0.
        success_criteria:
          - Suricata 프로세스 + -i eth0 -i eth1
          - uptime 정수
          - event_type 3+ 종류
        acceptable_methods:
          - |
            **[OSS] pgrep -a + ps** — 프로세스.
              ssh 6v6-ips 'pgrep -a Suricata'
              ssh 6v6-ips 'ps -o pid,vsz,rss,pcpu,cmd -p $(pgrep Suricata)'
            예상 출력 `29 suricata -i eth1 -i eth0 -c /etc/suricata/suricata.yaml --runmode autofp -l /var/log/suricata`.
            운영 해석: 메모리 800MB+ 정상 (룰셋 로드). 100MB 이하면 룰셋 load 실패.
          - |
            **[OSS] suricatasc -c version / uptime / dump-counters** — 내부 메트릭.
              ssh 6v6-ips 'sudo suricatasc -c version'
              ssh 6v6-ips 'sudo suricatasc -c uptime'
              ssh 6v6-ips 'sudo suricatasc -c dump-counters 2>&1 | jq ".message | with_entries(select(.value > 0)) | to_entries | sort_by(-.value) | .[:10]"'
            예상 출력 `{version: 6.0.4} / {uptime: 191968} / [{key: capture.kernel_packets, value: 1234567}, ...]`.
            운영 해석: 내부 socket 통신. dump-counters 가 100+ 카운터 + 가장 큰 값
            10개 정렬.
          - |
            **[OSS] jq + eve.json event_type 분포** — 분석.
              ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -r .event_type | sort | uniq -c | sort -rn'
            예상 출력 `314 flow / 156 tls / 9 stats / 8 alert / 7 fileinfo / 6 http`.
            운영 해석: flow 가 가장 많음. http+tls+alert 섞여 있어야 protocol decoder
            동작.
          - |
            **[OSS] alert 추출 — sid 매핑** — 룰 동작.
              ssh 6v6-ips 'sudo grep ''"event_type":"alert"'' /var/log/suricata/eve.json | jq "{ts:.timestamp, sig:.alert.signature, sid:.alert.signature_id}" | head -5'
            예상 출력 `{ts: ..., sig: "ET SCAN ...", sid: 2003020}`.
            운영 해석: alert 가 ETOpen 룰 ID 매치. 2000xxx = SCAN, 2010xxx = WEB.
          - |
            **[OSS] iface 별 sniff 통계** — 두 NIC 균형.
              ssh 6v6-ips 'sudo tail -500 /var/log/suricata/eve.json | jq -r .in_iface | sort | uniq -c'
            예상 출력 `300 eth0 / 200 eth1`.
            운영 해석: 두 NIC 모두 트래픽. 한쪽 0 이면 promisc 또는 link down.
          - |
            **[OSS] suricata.yaml 의 af-packet 정의** — config.
              ssh 6v6-ips 'sudo grep -A3 "af-packet:" /etc/suricata/suricata.yaml | head -15'
            예상 출력 `af-packet: / - interface: eth0 / - interface: eth1 / ...`.
            운영 해석: 2 interface 정의. cluster-id / cluster-type / threads 옵션도.
          - |
            **[OSS] 룰셋 카운트** — 활성.
              ssh 6v6-ips 'sudo wc -l /var/lib/suricata/rules/suricata.rules 2>/dev/null || sudo wc -l /etc/suricata/rules/*.rules 2>&1 | tail -1'
            예상 출력 `30000+ /var/lib/suricata/rules/suricata.rules`.
            운영 해석: ETOpen 통합 30,000+ 라인 = 활성 룰 25,000+ (주석 제외).
          - |
            **[OSS] /var/log/suricata/stats.log — 10초 주기** — 시계열.
              ssh 6v6-ips 'sudo tail -20 /var/log/suricata/stats.log'
            예상 출력 `<time> | counter name | total value` 형식.
            운영 해석: 10초 단위 메트릭 dump. trend 분석.
        negative_signs:
          - Suricata 프로세스 없음
          - 1 NIC 만 sniff
          - drops > 1%
    target_vm: ips

  # ============================================================
  # STEP 5 — web Apache + ModSecurity + 11 vhost
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION

      web 의 Apache 모듈 (mod_security2 + proxy + ssl) 로드 + ModSec engine 설정 +
      가벼운 XSS payload 가 403 차단되는지 확인.

      ## 💻 실행 명령

      ```bash
      # 1. Apache 의 ModSec / proxy / ssl 모듈 로드
      ssh 6v6-web 'sudo apache2ctl -M 2>&1 | grep -iE "security|proxy|ssl"'

      # 2. ModSec engine + audit log 설정
      ssh 6v6-web 'sudo grep -E "^SecRuleEngine|^SecAuditLog|^SecAuditEngine|^SecAuditLogFormat" /etc/modsecurity/modsecurity.conf'

      # 3. XSS payload → 403 차단 검증
      ssh 6v6-attacker 'curl -s -o /dev/null -w "XSS: %{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"'

      # 4. modsec_audit.log 에 룰 ID 941 매치 확인
      sleep 2
      ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq -r ".audit_data.messages[]?" | grep -oE ''id \\\"[0-9]+\\\"'' | sort -u | head'
      ```

      ## 📋 확인 사항

      - 명령 1: `security2_module (shared)` + `proxy_module (shared)` + `ssl_module (shared)` 3 모듈 로드
      - 명령 2: `SecRuleEngine On` + `SecAuditEngine RelevantOnly` + `SecAuditLogFormat JSON` + `SecAuditLog /var/log/apache2/modsec_audit.log`
      - 명령 3: 응답 `XSS: 403` (ModSec 차단)
      - 명령 4: 룰 ID `id "941100"`, `id "941110"`, `id "949110"` 같은 941xxx / 949xxx 출력

      ## 💡 왜 이걸 하는가?

      web 은 L3 — HTTP 페이로드 마지막 검사. ModSec 가 `On` 이 아니면 OWASP Top 10
      이 모두 통과. WAF 운영 1순위 점검 명령.

      ## 🔍 결과 해석

      - **정상**: 위 4 항목 모두 매치 (403 + 941 룰)
      - **비정상 1**: `security2_module` 누락 → `sudo a2enmod security2 && sudo systemctl reload apache2`
      - **비정상 2**: `SecRuleEngine Off` → modsecurity.conf 수정 후 reload
      - **비정상 3**: XSS payload 가 200 → ModSec engine 또는 CRS 룰셋 비활성
    hint: ssh 6v6-web 'sudo apache2ctl -M | grep -i security'
    category: configuration
    points: 12
    answer: |
      echo "=== Apache 모듈 ==="
      ssh 6v6-web 'sudo apache2ctl -M 2>&1 | grep -iE "security|proxy|ssl"'
      echo "=== ModSec engine + audit ==="
      ssh 6v6-web 'sudo grep -E "^SecRuleEngine|^SecAuditLog|^SecAuditEngine|^SecAuditLogFormat" /etc/modsecurity/modsecurity.conf'
      echo "=== 11 vhost ==="
      ssh 6v6-web 'sudo ls /etc/apache2/sites-enabled/'
      echo "=== XSS 페이로드 → 403 ==="
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"'
      sleep 2
      ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq -r ".transaction.messages[]? | select(.id | startswith(\"941\")) | .id" | head -3'
    answer_detail: |
      mod_security2 + proxy + ssl 모듈 로드 + SecRuleEngine On + JSON 형식 audit
      log. 11 vhost (랜딩 + 8 vuln + portal/siem/bastion 3 운영). XSS payload 시
      403 응답 + 941100 + 941160 (XSS via libinjection) 룰 매치.
    verify:
      type: output_contains
      expect: security2_module
      field: stdout
      semantic:
        intent: |
          web 의 Apache + ModSec + CRS + 11 vhost 정상 동작 + 가벼운 공격 차단 검증.
        success_criteria:
