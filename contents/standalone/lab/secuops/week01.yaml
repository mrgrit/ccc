          - 503 / connection refused
          - HTMX 위젯 endpoint 누락

  # ============================================================
  # STEP 12 — 학생 트래픽 4-hop 검증 (juice.6v6.lab)
  # ============================================================
  - order: 12
    instruction: |
      `juice.6v6.lab` 접근 시 패킷이 `학생PC → fw → ips → web(WAF) → int juiceshop`
      4-hop 을 모두 통과하는지 검증한다. 각 hop 에서 tcpdump / log 로 같은 요청을
      관찰할 수 있어야 한다.
    hint: |
      ssh 6v6-attacker curl -s -H 'Host: juice.6v6.lab' http://10.20.30.1/ | head -10
    category: integration
    points: 15
    answer: |
      ssh 6v6-attacker curl -s -o /dev/null -w 'http=%{http_code} time=%{time_total}\n' -H 'Host: juice.6v6.lab' http://10.20.30.1/
    answer_detail: 학생 트래픽이 4-hop 모두 통과 + HTTP 200 응답
    verify:
      type: output_contains
      expect: '200'
      field: stdout
      semantic:
        intent: |
          학생 트래픽 (juice.6v6.lab) 의 4-hop chain 검증. fw HAProxy → ips inline →
          web Apache (WAF) → int juiceshop. 각 hop 의 access log / suricata flow /
          modsec audit 에 동일 transaction 흔적이 남아야 한다.
        success_criteria:
          - HTTP 200 응답
          - 4-hop 중 최소 3 hop log 흔적
          - ModSec audit log 에 transaction 기록 (RelevantOnly 라 200 OK 면 없을 수도)
        acceptable_methods:
          - |
            **[OSS] curl 응답 코드 + 시간** — 표준.
              ssh 6v6-attacker 'curl -s -o /dev/null -w "HTTP: %{http_code}\nTotal time: %{time_total}s\nFirst byte: %{time_starttransfer}s\nRedirect count: %{num_redirects}\n" -H "Host: juice.6v6.lab" -L http://10.20.30.1/'
            예상 출력 `HTTP: 200 / Total time: 0.150s / First byte: 0.120s / Redirect count: 1`.
            운영 해석: 4-hop 이므로 총 시간 100ms 이상 정상. 1ms 면 HAProxy 캐시 또는
            우회 의심.
          - |
            **[OSS] 4 hop 동시 tcpdump (멀티 SSH)** — 동적.
              # 새 터미널 4개 (학생 PC) 에서 동시 실행
              # T1: ssh 6v6-fw 'sudo tcpdump -ni eth0 "tcp port 80" -c 5'
              # T2: ssh 6v6-ips 'sudo tcpdump -ni eth0 "tcp port 80" -c 5'
              # T3: ssh 6v6-ips 'sudo tcpdump -ni eth1 "tcp port 80" -c 5'
              # T4: ssh 6v6-web 'sudo tcpdump -ni eth0 "tcp port 80" -c 5'
              # 다른 터미널: curl 발생
            예상 출력 `각 hop 에 동일한 client IP / time stamp 패킷 캡처`.
            운영 해석: 4 hop 모두 capture 되어야 패킷이 실제로 chain 통과.
          - |
            **[OSS] fw HAProxy log + ips eve.json + web access.log 의 transaction matching** — 분석.
              # 동일한 curl 의 footprint 를 3 곳에서 추적
              TS=$(date +%s)
              ssh 6v6-attacker "curl -s -H 'Host: juice.6v6.lab' -H 'X-Trace: trace-$TS' http://10.20.30.1/ -o /dev/null"
              # fw haproxy log
              ssh 6v6-fw "sudo grep -E 'trace-$TS' /var/log/haproxy.log 2>/dev/null || sudo tail -5 /var/log/haproxy.log"
              # ips eve.json — flow 로 매치
              ssh 6v6-ips 'sudo tail -50 /var/log/suricata/eve.json | jq "select(.event_type==\"http\")" | tail -3'
              # web Apache access
              ssh 6v6-web 'sudo grep -E "trace-'$TS'" /var/log/apache2/access.log 2>/dev/null | tail -3 || sudo tail -3 /var/log/apache2/access.log'
            예상 출력 `각 위치에서 동일 transaction (X-Trace 헤더 또는 timestamp) 매치`.
            운영 해석: X-Trace 헤더로 분산 추적. 운영 환경에서는 OpenTelemetry trace ID
            도 가능.
          - |
            **[OSS] web access.log 의 client IP 분석** — 헤더 보존.
              ssh 6v6-web 'sudo tail -10 /var/log/apache2/access.log | head -3'
              # X-Forwarded-For 헤더 검증
              ssh 6v6-attacker 'curl -s -H "Host: juice.6v6.lab" http://10.20.30.1/ -o /dev/null'
              ssh 6v6-web 'sudo grep -E "X-Forwarded-For" /var/log/apache2/access.log 2>/dev/null | tail -3' \
                || ssh 6v6-web 'sudo tail -3 /var/log/apache2/access.log'
            예상 출력 `<client IP> - - [<date>] "GET / HTTP/1.1" 200 1234 ... / X-Forwarded-For: 10.20.30.202`.
            운영 해석: HAProxy 가 X-Forwarded-For 헤더 추가 → web Apache 의 log 에 원래
            attacker IP 보존. 헤더 없으면 ips/fw 의 hop IP 만 보임.
          - |
            **[OSS] juiceshop 백엔드 log** — 최종 hop.
              ssh 6v6-bastion docker logs --tail 20 6v6-juiceshop 2>&1 | tail -10
            예상 출력 `GET / 200 1.234ms / express middleware ...`.
            운영 해석: juiceshop 가 요청 받음 → 4-hop 최종 검증.
          - |
            **[OSS] 동일 transaction 이 ips Suricata 의 flow event 에 기록** — IDS view.
              ssh 6v6-ips 'sudo tail -100 /var/log/suricata/eve.json | jq "select(.event_type==\"http\" and .http.hostname==\"juice.6v6.lab\")"' | tail -3
            예상 출력 `{"event_type":"http","http":{"hostname":"juice.6v6.lab","url":"/","status":200,"protocol":"HTTP/1.1"},...}`.
            운영 해석: Suricata 는 protocol decoder 로 HTTP 페이로드를 별도 event 로
            기록. hostname / url / status 모두 정확해야 함.
          - |
            **[OSS] HAProxy stats — backend waf 통계** — 메트릭.
              ssh 6v6-fw 'echo "show stat" | sudo socat - UNIX-CONNECT:/var/run/haproxy.sock 2>/dev/null | awk -F, "/^waf/ {print \$1, \$2, \$5, \$8, \$58}"'
            예상 출력 `waf BACKEND 0 5 200 / waf web 0 5 200`.
            운영 해석: BACKEND 의 8th column = response count (200). 1xx/2xx/3xx/4xx/5xx
            분포 확인.
          - |
            **[OSS] Wazuh alert 가 학생 트래픽으로 발생** — 통합.
              # juice.6v6.lab 에 공격성 URL 접근 → ModSec 가 alert → Wazuh ingest
              ssh 6v6-attacker 'curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=<script>alert(1)</script>"'
              sleep 3
              ssh 6v6-siem 'sudo tail -20 /var/ossec/logs/alerts/alerts.json | jq "select(.agent.name==\"web\")"' | tail
            예상 출력 `{"agent":{"name":"web",...}, "rule":{"id":"941100",...}, "data":{"url":"...","modsecurity":..}}`.
            운영 해석: web agent → manager → alerts.json 에 ModSec id 941100 기록 →
            chain 통합 완성.
        negative_signs:
          - HTTP 5xx
          - 한 hop 이라도 log 흔적 없음
          - juiceshop 백엔드 log 없음

  # ============================================================
  # STEP 13 — 운영 트래픽 3-hop 검증 (siem.6v6.lab — WAF 우회)
  # ============================================================
  - order: 13
    instruction: |
      `siem.6v6.lab` 접근 시 패킷이 `학생PC → fw → ips → wazuh-dashboard` 3-hop
      (WAF 우회) 인지 검증한다. web Apache access log 에는 흔적이 없어야 하며,
      ips eve.json 에는 5601 (또는 TLS) 흐름이 보여야 한다.
    hint: |
      ssh 6v6-attacker 'curl -sk -o /dev/null -w "%{http_code}\n" -H "Host: siem.6v6.lab" http://10.20.30.1/'
    category: integration
    points: 15
    answer: |
      ssh 6v6-attacker 'curl -sk -o /dev/null -w "%{http_code}\n" -H "Host: siem.6v6.lab" http://10.20.30.1/; ssh 6v6-web sudo tail -5 /var/log/apache2/access.log'
    answer_detail: siem 접근이 web access log 에 안 남음 (WAF 우회) + dashboard 응답
    verify:
      type: output_contains
      expect: '200'
      field: stdout
      semantic:
        intent: |
          운영 트래픽 (siem.6v6.lab) 은 fw HAProxy 가 dashboard backend 로 직접
          라우팅 → web Apache 의 access.log 에 흔적이 없어야 한다 (WAF 우회 검증).
          단, ips Suricata 는 dmz 트래픽을 sniff 하므로 eve.json 에는 흐름 흔적 있음.
        success_criteria:
          - HTTP 200 또는 302 응답
          - web access.log 에 siem.6v6.lab 흔적 없음
          - ips eve.json 에 5601 또는 dashboard 흐름 있음
        acceptable_methods:
          - |
            **[OSS] curl 응답 코드 측정** — 표준.
              ssh 6v6-attacker 'curl -sk -o /dev/null -w "HTTP: %{http_code}, time: %{time_total}\n" -H "Host: siem.6v6.lab" -L http://10.20.30.1/'
            예상 출력 `HTTP: 200, time: 0.080s`.
            운영 해석: 3-hop 이라 4-hop 보다 약간 빠를 수 있음. 가격 차이는 50~100ms.
          - |
            **[OSS] web access.log 에 siem 흔적 없음 검증 (negative)** — WAF 우회.
              # siem 접근 직전 access.log 라인 수
              before=$(ssh 6v6-web 'sudo wc -l /var/log/apache2/access.log | awk "{print \$1}"')
              ssh 6v6-attacker 'curl -sk -H "Host: siem.6v6.lab" http://10.20.30.1/' -o /dev/null
              sleep 2
              after=$(ssh 6v6-web 'sudo wc -l /var/log/apache2/access.log | awk "{print \$1}"')
              echo "Before: $before, After: $after, Diff: $((after - before))"
              # Diff 가 0 이어야 WAF 우회 검증
              ssh 6v6-web 'sudo grep "siem.6v6.lab" /var/log/apache2/access.log 2>/dev/null | wc -l'
            예상 출력 `Before: 1234, After: 1234, Diff: 0 / 0`.
            운영 해석: 핵심 negative test. 우회 정책이 적용되지 않으면 access.log 에
            siem.6v6.lab vhost 가 기록되어 false-positive WAF alert 폭증.
          - |
            **[OSS] HAProxy log 의 backend dashboard 흔적** — positive.
              ssh 6v6-fw 'sudo grep "dashboard" /var/log/haproxy.log 2>/dev/null | tail -3' \
                || ssh 6v6-fw 'sudo journalctl -u haproxy --since "1m ago" 2>/dev/null | grep -i dashboard | tail'
            예상 출력 `<time> haproxy ... http_in dashboard/dashboard 0/0/0/...`.
            운영 해석: HAProxy log 의 backend column 이 dashboard 면 우회 라우팅 적용.
          - |
            **[OSS] ips eve.json 의 5601 흐름** — IDS 측 검증.
              ssh 6v6-ips 'sudo tail -100 /var/log/suricata/eve.json | jq "select(.dest_port==5601)" | tail -3'
              # 또는 TLS 흐름
              ssh 6v6-ips 'sudo tail -100 /var/log/suricata/eve.json | jq "select(.event_type==\"flow\" and (.dest_port==5601 or .dest_port==443))" | tail -3'
            예상 출력 `{"event_type":"flow","src_ip":"10.20.31.1","dest_ip":"10.20.32.120","dest_port":5601,...}`.
            운영 해석: ips 가 fw → wazuh-dashboard 흐름을 sniff. 패킷 자체가 ips 를
            통과해야 dmz 에 도달 가능.
          - |
            **[OSS] fw → wazuh-dashboard 직접 ping** — 단순 연결.
              ssh 6v6-fw 'curl -sk -o /dev/null -w "%{http_code}\n" https://10.20.32.120:5601/'
              # 5601 TLS 만 listen
              ssh 6v6-fw 'curl -s -o /dev/null -w "%{http_code}\n" http://10.20.32.120:5601/'
            예상 출력 `200 / 000 (plain HTTP refused)`.
            운영 해석: HAProxy 가 TLS 로 backend 호출하므로 dashboard 의 5601 TLS 만
            응답.
          - |
            **[OSS] HAProxy frontend ACL 매칭 검증** — 라우팅 로직.
              # ACL 이 host header 로만 매치
              ssh 6v6-attacker 'curl -sk -o /dev/null -w "%{http_code}\n" -H "Host: SIEM.6v6.LAB" http://10.20.30.1/'
              # -i (case-insensitive) 옵션 검증
              ssh 6v6-attacker 'curl -sk -o /dev/null -w "%{http_code}\n" -H "Host: SiEm.6V6.LaB" http://10.20.30.1/'
            예상 출력 `200 / 200`.
            운영 해석: HAProxy ACL 의 -i 옵션 (case-insensitive) 으로 대소문자 무관
            매칭. 정상.
          - |
            **[OSS] backend health 가 down 일 때 fallback** — failure.
              # dashboard backend 가 down 이면 503 ← WAF 로 fallback 되지 않아야 함
              # (실험 후 즉시 복구)
              # 강사용: docker stop 6v6-wazuh-dashboard
              # 학생용: 직접 5601 안 됨 검증
              ssh 6v6-attacker 'curl -sk -o /dev/null -w "%{http_code}\n" http://10.20.32.120:5601/' 2>&1
            예상 출력 `200 (정상) 또는 000 (down 시)`.
            운영 해석: backend 가 down 이면 HAProxy 가 default_backend (waf) 로 떨어
            지지 않음 (ACL 매치되면 무조건 named backend). 503 응답.
          - |
            **[OSS] dashboard 로그 — 실제 접근 기록** — 최종 hop.
              ssh 6v6-bastion 'docker logs --tail 30 6v6-wazuh-dashboard 2>&1 | grep -iE "GET|POST" | tail -5'
            예상 출력 `<date> [http] GET / 200 ...`.
            운영 해석: dashboard 가 실제 요청 받았는지 확인. 받지 않았다면 HAProxy 가
            라우팅 실패.
        negative_signs:
          - web access.log 에 siem 흔적 (WAF 우회 실패)
          - HTTP 503 (backend down)
          - HAProxy log 에 waf backend 로 매칭

  # ============================================================
  # STEP 14 — 통합 헬스체크 보고서 (자가 점검)
  # ============================================================
  - order: 14
    instruction: |
      앞 13 단계 결과를 모아 1페이지 헬스체크 보고서를 작성한다. 다음 항목 모두
      pass / fail / partial 표시 + 본인이 발견한 비정상 1건 (없으면 "정상" + 근거).
    hint: |
      각 step 의 핵심 출력 1줄 + 종합 표 작성
    category: synthesis
    points: 15
    answer: |
      # 보고서 항목:
      # 1. bastion docker ps 16건
      # 2. ProxyJump fw/ips/web/siem 4건
      # 3. fw nft + HAProxy 4 backend
      # 4. ips Suricata 2 NIC sniff + eve.json
      # 5. web Apache + ModSec audit JSON
      # 6. siem 16 daemon + 3 agent Active
      # 7. wazuh-dashboard 접근 가능
      # 8. wazuh-indexer cluster yellow + alerts 인덱스
      # 9. portal 4 위젯
      # 10. 학생 트래픽 4-hop 통과
      # 11. 운영 트래픽 3-hop 우회
      # 12. 본인 발견 비정상 1건
    answer_detail: 1페이지 헬스체크 보고서 작성 + 본인 발견 1건
    verify:
      type: output_contains
      expect: pass
      field: stdout
      semantic:
        intent: |
          1주차 헬스체크 보고서. 13 단계 결과를 종합한 1페이지 자가 진단 문서.
          각 step pass/fail/partial + 본인 분석. 종합 등급 (5종 솔루션 모두 정상
          = pass / 일부 불완 = partial / 핵심 daemon 실패 = fail).
        success_criteria:
          - 13 step 종합 표
          - pass/fail/partial 표기
          - 본인 발견 1건 (정상도 가능, 근거 필요)
        acceptable_methods:
          - |
            **[관리적 보고서] 마크다운 표 + 본인 분석** — 표준.
              # 헬스체크 보고서 (Week 01)
              | Step | 항목 | 결과 | 근거 |
              |------|------|------|------|
              | 1 | bastion docker ps | pass | 16 컨테이너 Up |
              | 2 | ProxyJump 4 노드 | pass | fw/ips/web/siem hostname 출력 |
              | 3 | fw nftables + HAProxy | pass | forward chain accept + 4 backend |
              | ... | ... | ... | ... |
              | 12 | 본인 발견 | partial | 비정상 1건 또는 정상 |

              ## 본인 분석
              발견: <자유 서술>
              MITRE ATT&CK 매핑: <T1xxx ...>
              ISMS-P 통제: <2.6.4 ...>
            운영 해석: 13 step 종합 + 학생 본인이 의문점 1건 분석. 운영 운영 첫 단계
            = 자가 진단 보고서.
          - |
            **[관리적 분석] STRIDE 모델 적용** — 위협 사고 분석.
              # S (Spoofing) — 누가 IP 위조 가능?
              # T (Tampering) — 어떤 로그가 변조 가능?
              # R (Repudiation) — 부인 방지가 약한 부분?
              # I (Information disclosure) — 노출 가능 데이터?
              # D (Denial of Service) — 다운 위험?
              # E (Elevation of privilege) — 권한 상승 경로?
            운영 해석: 6v6 환경에 STRIDE 적용 → bastion 침해 시 16 컨테이너 모두 노출
            (가장 critical asset).
          - |
            **[관리적 보고서] NIST CSF 5 function 매핑** — 표준 인용.
              # Identify (자산 인벤토리): docker ps + osquery (W07 예고)
              # Protect: nftables (fw), ModSec (web), CRS (web)
              # Detect: Suricata (ips), Wazuh (siem)
              # Respond: Wazuh Active Response (W10)
              # Recover: backup, IR runbook
            운영 해석: 13 step 을 NIST CSF 의 어떤 function 에 매핑하는가.
          - |
            **[관리적 보고서] ISMS-P 통제 매핑** — 한국 표준.
              # 2.6.1 (네트워크 접근 통제) — fw nftables
              # 2.6.4 (네트워크 침입탐지) — ips Suricata
              # 2.10.7 (보안위협 대응) — web ModSecurity
              # 2.9.2 (로그 관리) — siem Wazuh
              # 2.5.4 (사용자 인증) — bastion ProxyJump 단일 진입점
            운영 해석: 13 step 결과가 ISMS-P 의 어떤 통제 만족도를 입증하는가.
          - |
            **[관리적 보고서] MITRE D3FEND 매핑** — 방어 매트릭스.
              # D3-NTPM (Network Traffic Policy Mapping) — fw nft
              # D3-NTA (Network Traffic Analysis) — ips Suricata
              # D3-WAF (Web Application Firewall) — web ModSec
              # D3-SCC (System Configuration Check) — bastion + Wazuh SCA (W10 예고)
            운영 해석: 공격 매트릭스 (ATT&CK) 대비 방어 매트릭스 (D3FEND). 운영의
            반대편 관점.
          - |
            **[관리적 보고서] KISA 보호나라 사례 매핑** — 한국 사례.
              # 2024 KISA 보고서의 사례 1건 선택 + 본 환경에서 어떻게 막을 수 있었는지
              # 예: A사 SQLi → DB 유출 → 16 천만 명
              # 6v6 의 web ModSec CRS 941xxx (SQLi) 가 사전 차단 가능
            운영 해석: 실제 사례에 본 인프라 적용 시 가설 검증.
          - |
            **[관리적 보고서] 다음 주차 (W02) 준비도 자가 평가** — preparation.
              # W02 = nftables 기초
              # 본인이 nft 명령 1개라도 모른다 → W02 전 nftables wiki 학습
              # tcpdump BPF expression 미숙 → 1 시간 자율 학습 권고
              # ssh ProxyJump 정상 → W02 부터 fw 단독 실습 가능
            운영 해석: 본인 학습 gap 1건 자가 식별 → 다음 주차 학습 효율 향상.
          - |
            **[종합] 헬스체크 자동화 스크립트** — 정성 (참고).
              # 단, 자동화는 W08 (중간고사) 까지 금지 — 직접 명령 손에 익히는 것이 목적
              # 참고: 강사가 운영 시 사용하는 스크립트
              # cd /home/opsclaw/6v6 && bash 6v6.sh smoke
              # bash 6v6.sh smoke 의 출력으로 비교 검증
            예상 출력 `vhost 11종 200/302 / agent 3 Active / cluster yellow`.
            운영 해석: 학생은 13 step 을 직접 실행하여 자동화 결과와 일치하는지 확인.
        negative_signs:
          - 종합 표 누락
          - 본인 분석 1건 누락
          - 단순 pass/fail 만 표기 (근거 없음)
