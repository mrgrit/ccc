              sleep 2
              ssh 6v6-web 'sudo tail -3 /var/log/apache2/modsec_audit.log | head -1 | jq "{code: .transaction.response.http_code, msgs: [.transaction.messages[]? | select(.id | startswith(\"941\")) | .id]}"'
            예상 출력 `XSS: 403 / {"code":403,"msgs":["941100","941160"]}`.
            운영 해석: 941100 = libinjection 매칭. 403 차단.
          - |
            **[OSS] 11 vhost 검증** — reverse proxy.
              ssh 6v6-web 'sudo ls /etc/apache2/sites-enabled/'
              ssh 6v6-web 'sudo grep -rE "ProxyPass " /etc/apache2/sites-enabled/ | head'
            예상 출력 `000-landing.conf / juice.6v6.lab.conf / dvwa.6v6.lab.conf / ... / 11 파일 / ProxyPass / http://10.20.40.81:3000/ ...`.
            운영 해석: 11 vhost reverse proxy → int 백엔드. 8 vuln + 랜딩 + 2 우회
            대상.
          - |
            **[OSS] modsec_audit.log JSON 라인 수** — 활성.
              ssh 6v6-web 'sudo wc -l /var/log/apache2/modsec_audit.log'
              ssh 6v6-web 'sudo grep -oE ''"id":"[0-9]+"'' /var/log/apache2/modsec_audit.log | sort | uniq -c | sort -rn | head'
            예상 출력 `600+ / 30 "id":"941100" / 25 "id":"942100" / ...`.
            운영 해석: 600+ transaction 기록. 941 (XSS) 가 가장 자주.
          - |
            **[OSS] CRS paranoia + anomaly** — 룰 강도.
              ssh 6v6-web 'sudo find / -name "crs-setup.conf" 2>/dev/null | head -1 | xargs sudo grep -E "tx.paranoia|inbound_anomaly|outbound_anomaly" 2>/dev/null | head'
            예상 출력 `setvar:tx.paranoia_level=1 / setvar:tx.inbound_anomaly_score_threshold=5 / setvar:tx.outbound_anomaly_score_threshold=4`.
            운영 해석: paranoia 1 + threshold 5 = 표준 운영. W06 에서 튜닝.
          - |
            **[OSS] Apache access.log + error.log** — 보조.
              ssh 6v6-web 'sudo tail -3 /var/log/apache2/access.log'
              ssh 6v6-web 'sudo grep -i modsec /var/log/apache2/error.log 2>/dev/null | tail -3'
            예상 출력 `<ip> - - [<date>] "GET /?q=<script>..." 403 / [client ...] ModSecurity: Warning. ...`.
            운영 해석: error.log 의 ModSec 메시지 = audit log 의 index.
        negative_signs:
          - security2_module 누락
          - SecRuleEngine Off
          - vhost 11 미만
          - XSS payload 시 200 (ModSec 무력)
