      ssh 6v6-bastion 'command -v geoiplookup && geoiplookup 8.8.8.8 || echo "geoip-bin 미설치"'

      # WHOIS — 외부 망 필요
      ssh 6v6-bastion 'command -v whois && timeout 5 whois -h whois.iana.org abuse.ch 2>&1 | head -5 || echo "whois 미설치 또는 차단"'

      # VT (curl + dummy API key — 401 응답 정상)
      ssh 6v6-bastion 'curl -sI --max-time 5 -H "x-apikey: DUMMY" https://www.virustotal.com/api/v3/files/0 2>&1 | head -1'
      ```

      ## 📋 확인 사항

      - 4 항목 (input / output / 시나리오) 매트릭스 채움
      - 우선순위 ★ 부여
      - rate limit 정책 명시
      - 3 검증 명령 응답 (geoip 로컬 / whois / VT endpoint 4xx 도 정상)

      ## 💡 왜 이걸 하는가?

      Wazuh alert 의 raw IP/hash/domain 만 으로는 *판단 불가* — enrichment 가 *맥락
      (country / first_seen / 등록자)* 을 붙여 *false positive 제거 + true
      positive 격상* 의 두 효과. SOC L1 의 90% 가 *enrichment 결과* 로 결정.

      ## 🔍 결과 해석

      - **정상 (계획서 완성)**: 4 항목 모두 채움 + 우선순위 + rate limit
      - **VT 401**: API key 없이 호출 → 정상 (endpoint 도달 확인)
      - **geoip 미설치**: bastion 의 패키지 부재 — `apt install geoip-bin
        geoip-database` 추가 검토 (인프라 정정 P22)

      ## 비정상 시 대응

      - **3 검증 명령 모두 timeout** — 폐쇄망 정책 (정상). step 1 의 endpoint
