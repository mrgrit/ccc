  - order: 1
    instruction: |
      ## 🎯 MISSION — 4 external Connector 활성 *계획서* 작성

      OpenCTI 에 4 개의 외부 위협 정보 소스 (Connector) 를 연동할 *운영 계획서* 를
      작성한다. **본 step 은 실 설치/활성 이 아니라 *계획 수립* 학습** — 6v6
      환경에 OpenCTI 실 인스턴스 가 없어도 진행 가능.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Connector** = OpenCTI 가 외부 시스템 (TAXII / API / DB) 의 데이터를 끌어
        오는 plug-in. Python 으로 작성, docker 컨테이너 로 가동.
      - **external** = OpenCTI *외부* 의 위협 정보 source (TI feed). vs *internal*
        = OpenCTI 내부 분석/enrichment Connector.
      - **TAXII 2.1** = STIX 데이터 의 표준 전송 프로토콜. URLhaus 가 표준 endpoint.

      ## 💻 산출물 (계획서)

      4 connector 의 활성 우선순위 + API 키 발급 절차 + retention 정책 을 표로
      작성:

      ```markdown
      ## 6v6 OpenCTI Connector 활성 계획

      | # | Connector | source | API key | 무료/유료 | 일 IOC | 우선순위 | retention |
      |---|-----------|--------|---------|----------|--------|---------|-----------|
      | 1 | MITRE ATT&CK | github.com/mitre/cti | 불필요 | 무료 | 분기 1회 | ★★★ | 영구 |
      | 2 | OTX (AlienVault) | otx.alienvault.com | 회원가입 후 API key | 무료 | 1000+ | ★★★ | 30 일 |
      | 3 | URLhaus | TAXII 2.1 (urlhaus-taxii.abuse.ch) | 불필요 | 무료 | 100+ | ★★ | 7 일 |
      | 4 | AbuseIPDB | abuseipdb.com | 회원가입 + API key | 무료 1000/일 | 100+ | ★★ | 30 일 |

      ## API key 발급 절차
      - OTX: `otx.alienvault.com/settings` 의 OTX Key. 즉시 발급.
      - AbuseIPDB: `abuseipdb.com/api` 의 API key, 회원가입 + 이메일 인증 후 발급.

      ## 우선순위 근거
      - MITRE: TTP 기준 — STIX 의 backbone, 다른 모든 IOC 의 *맥락*
      - OTX: 일 1000+ 의 *양*, 한국 IP 도 적정 비율 포함
      - URLhaus: 악성 URL 의 *정확도* (abuse.ch curation)
      - AbuseIPDB: brute force IP 의 *최신성* + Wazuh AR (5712) 연동 후보

      ## retention 정책
      - 영구 (MITRE) — TTP 는 영속
      - 30 일 (OTX / AbuseIPDB) — IP / domain 의 *유효 수명*
      - 7 일 (URLhaus) — 악성 URL 은 빠르게 take-down
      ```

      ## 💻 검증 명령 (계획서 의 *external connectivity* 검증)

      ```bash
      ssh 6v6-bastion 'curl -sI --max-time 5 https://github.com/mitre/cti 2>&1 | head -1'
      ssh 6v6-bastion 'curl -sI --max-time 5 https://otx.alienvault.com/api/v1 2>&1 | head -1'
      ssh 6v6-bastion 'curl -sI --max-time 5 https://urlhaus-taxii.abuse.ch/taxii2/ 2>&1 | head -1'
      ssh 6v6-bastion 'curl -sI --max-time 5 https://api.abuseipdb.com/api/v2/ 2>&1 | head -1'
      ```

      ## 📋 확인 사항

      - 4 connector 매트릭스 (8 항목 모두 채움)
      - API key 발급 절차 명시
      - 우선순위 *근거* 1 문장 이상
      - retention 정책 *근거*
      - external connectivity 4 endpoint *접근 가능* 응답 (1xx/2xx/3xx)

      ## 💡 왜 이걸 하는가?

      OpenCTI 는 *그 자체* 가 위협 정보 가 아님 — *연동된 source* 가 위협 정보. 4
      connector 의 활성 *순서* + *retention* + *우선순위* 가 운영 품질 의 핵심.
      한국 환경 = MITRE + OTX + URLhaus + AbuseIPDB 의 4 가 *기본 셋*, KISA C-TAS
      는 별 차수.

      ## 🔍 결과 해석

      - **정상**: 8 항목 모두 채움 + endpoint 4 개 모두 접근 가능
      - **endpoint 미접근 (curl error)** — 6v6 의 폐쇄망 정책. OpenCTI 실 설치 시
        bastion 외부 망 ACL 보강 필요

      ## 비정상 시 대응

      - **모든 endpoint timeout** — bastion 외부 망 정책 (폐쇄망). 6v6 토폴로지
        가정 = polution-free, OpenCTI 실 운영 시 별도 proxy 또는 air-gap 동기화
        필요.
      - **API key 발급 막힘** — 학교 환경 의 sign-up email 제한. KISA C-TAS 사용
        대안 (한국 환경).
