lab_id: standalone-secuops-week13
title: OpenCTI ↔ Wazuh CDB list 통합 — IOC 매치 시 alert level 격상
version: standalone-non-ai
course: secuops
week: 13
description: |
  Wazuh 의 CDB list 자료구조 활용 + 외부 IOC feed (blocklist.de) 자동 갱신 + 룰의
  list lookup 으로 alert level 자동 격상.
difficulty: medium
duration_minutes: 150
prerequisites: [W09, W12]
objectives:
  - "CDB list 작성 + ossec.conf 등록"
  - "rule 의 <list> lookup 매핑"
  - "외부 IOC feed 자동 갱신 cron"
  - "alert level 5 → 12 자동 격상"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION

      `/var/ossec/etc/lists/malicious-ips` CDB list 작성 + ossec.conf 의 `<list>` 등록.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem '
      sudo mkdir -p /var/ossec/etc/lists
      sudo bash -c "cat > /var/ossec/etc/lists/malicious-ips" <<EOF
      1.2.3.4:c2_server
      5.6.7.8:botnet
      10.20.30.202:test_attacker
      EOF
      sudo cat /var/ossec/etc/lists/malicious-ips'

      # ossec.conf 에 <list> 등록 (이미 있으면 skip)
      ssh 6v6-siem 'sudo grep -q "malicious-ips" /var/ossec/etc/ossec.conf || sudo sed -i "0,/<ruleset>/{s|<ruleset>|<ruleset>\n    <list>etc/lists/malicious-ips</list>|}" /var/ossec/etc/ossec.conf'
      ```

      ## 📋 확인 사항

      - /var/ossec/etc/lists/malicious-ips 에 3 entry (key:value)
      - ossec.conf 의 <ruleset> 내부에 `<list>etc/lists/malicious-ips</list>`

      ## 💡 왜 이걸 하는가?

      CDB list 는 O(1) lookup 자료구조 — 1000+ IOC 도 룰 매칭 시 즉시 검사 가능.
      production CTI ↔ SIEM 통합의 가장 단순/강력 패턴.

      ## 🔍 결과 해석

      - **정상**: list 파일 + ossec.conf 등록
      - **다음 step**: rule 의 <list field="srcip" lookup="address_match_key"> 작성
    hint: CDB list + ossec.conf <list>
    category: configuration
    points: 20
    answer: |
      ssh 6v6-siem '
      sudo mkdir -p /var/ossec/etc/lists
      sudo bash -c "cat > /var/ossec/etc/lists/malicious-ips" <<EOF
      1.2.3.4:c2_server
      5.6.7.8:botnet
      10.20.30.202:test_attacker
      EOF
      sudo cat /var/ossec/etc/lists/malicious-ips'
      ssh 6v6-siem 'sudo grep -q "malicious-ips" /var/ossec/etc/ossec.conf || sudo sed -i "0,/<ruleset>/{s|<ruleset>|<ruleset>\n    <list>etc/lists/malicious-ips</list>|}" /var/ossec/etc/ossec.conf'
    answer_detail: CDB list 3 entry + ossec.conf 등록.
    verify:
      type: output_contains
      expect: malicious
      field: stdout
      semantic:
        intent: "CDB list 작성"
        success_criteria: ["list 파일", "ossec.conf 등록"]
        acceptable_methods:
          - "**[OSS] /var/ossec/etc/lists/ + key:value**"
          - "**[OSS] ossec.conf <list> 태그**"
          - "**[OSS] wazuh-control reload + .cdb binary 자동 생성**"
          - "**[OSS] address_match_key (IP lookup)**"
          - "**[OSS] match_key (string lookup)**"
          - "**[OSS] cron 자동 갱신 (AbuseIPDB / blocklist.de)**"
          - "**[OSS] OpenCTI 의 indicator export → CDB**"
          - "**[OSS] OWASP / SANS feed 통합**"
    target_vm: siem

  - order: 2
    instruction: |
      ## 🎯 MISSION

      rule 100300 작성 — SSH failed (5710 chain) + CDB list 매치 시 **level 12 격상**.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem '
      sudo cat > /tmp/local_rules.xml <<EOF
      <group name="6v6,custom,">
        <rule id="100300" level="12">
          <if_sid>5710</if_sid>
          <list field="srcip" lookup="address_match_key">etc/lists/malicious-ips</list>
          <description>6v6 W13 - SSH login from KNOWN malicious IP (CTI)</description>
        </rule>
      </group>
      EOF
      sudo cp /tmp/local_rules.xml /var/ossec/etc/rules/local_rules.xml
      sudo chown root:wazuh /var/ossec/etc/rules/local_rules.xml
      sudo /var/ossec/bin/wazuh-control restart'
      sleep 10
      # 트리거: 10.20.30.202 (CDB 매치) SSH 시도
      for i in 1 2 3; do
        ssh 6v6-attacker 'timeout 3 sshpass -p wrongpass ssh -o ConnectTimeout=2 -o StrictHostKeyChecking=no ccc@10.20.32.80 hostname 2>&1' | head -1
      done
      sleep 5
      ssh 6v6-siem 'sudo grep "100300" /var/ossec/logs/alerts/alerts.json | tail -1' | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); print(json.dumps({'rule':d.get('rule',{}).get('id'),'level':d.get('rule',{}).get('level'),'srcip':d.get('data',{}).get('srcip')}, ensure_ascii=False))" 2>&1 | head
      ```

      ## 📋 확인 사항

      - rule 100300 + level 12 alert
      - srcip 10.20.30.202 가 CDB list 매치
      - 일반 5710 (level 5) 가 100300 (level 12) 으로 격상

      ## 💡 왜 이걸 하는가?

      CTI ↔ SIEM 통합의 핵심 — IOC 매치 1건만으로 alert priority 자동 격상. SOC 분석가
      가 high-priority alert 만 보면 됨 (alert fatigue 해소).

      ## 🔍 결과 해석

      - **정상**: 100300 + level 12 alert 발생
      - **비정상**: 100300 alert 없음 → CDB list 의 address_match_key syntax / chown 점검
    hint: rule + <list> + lookup + chown + restart
    category: manipulation
    points: 30
    answer: |
      ssh 6v6-siem '
      sudo cat > /tmp/local_rules.xml <<EOF
      <group name="6v6,custom,">
        <rule id="100300" level="12">
          <if_sid>5710</if_sid>
          <list field="srcip" lookup="address_match_key">etc/lists/malicious-ips</list>
          <description>6v6 W13 - SSH login from KNOWN malicious IP (CTI)</description>
        </rule>
      </group>
      EOF
      sudo cp /tmp/local_rules.xml /var/ossec/etc/rules/local_rules.xml
      sudo chown root:wazuh /var/ossec/etc/rules/local_rules.xml
      sudo /var/ossec/bin/wazuh-control restart'
      sleep 10
      for i in 1 2 3; do
        ssh 6v6-attacker 'timeout 3 sshpass -p wrongpass ssh -o ConnectTimeout=2 -o StrictHostKeyChecking=no ccc@10.20.32.80 hostname 2>&1' | head -1
      done
      sleep 5
      ssh 6v6-siem 'sudo grep "100300" /var/ossec/logs/alerts/alerts.json | tail -1'
    answer_detail: SSH brute → 5710 매치 → CDB lookup → 100300 level 12 alert 격상.
    verify:
      type: output_contains
      expect: '100300\|5710'
      field: stdout
      semantic:
        intent: "CDB list rule lookup"
        success_criteria: ["100300 rule"]
        acceptable_methods:
          - "**[OSS] <list field=srcip lookup=address_match_key>**"
          - "**[OSS] if_sid 5710 chain**"
          - "**[OSS] level 12 (critical) 격상**"
          - "**[OSS] chown root:wazuh** (필수)"
          - "**[OSS] /var/ossec/queue/db/global.db**"
          - "**[OSS] alerts.json 의 rule.list 필드**"
          - "**[OSS] dashboard 의 high-priority 필터**"
          - "**[OSS] AbuseIPDB / OpenCTI 통합 cron**"
    target_vm: siem
