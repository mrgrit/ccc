  - order: 4
    instruction: |
      ## 🎯 단계 4 (20점) — ModSec WAF + CRS audit + anomaly score (W06)

      5 공격 (XSS/SQLi/LFI/RCE/PHP) + audit 의 980130 summary + XFF/remote 분석. 35 분.

      ## 💻 실행 명령

      ```bash
      # 1. 5 공격 burst
      for payload in \
        "?q=<script>alert(1)</script>" \
        "?q=1'%20OR%20'1'='1" \
        "?q=../../etc/passwd" \
        "?q=;cat%20/etc/passwd" \
        "?q=%3C%3Fphp%20system(%27id%27)%3B%20%3F%3E"; do
        code=$(ssh 6v6-attacker "curl -s -o /dev/null -w '%{http_code}' -H 'Host: juice.6v6.lab' 'http://10.20.30.1/$payload'")
        echo "  $payload → $code"
      done
      sleep 5

      # 2. 카테고리 분포 (최근 5 transaction)
      echo "=== 카테고리 분포 ==="
      ssh 6v6-web 'sudo tail -5 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" 2>/dev/null | grep -oE "\[id \"[0-9]+\"\]" | sort | uniq -c | sort -rn | head -10'

      # 3. 980130 correlation summary
      echo "=== 980130 summary ==="
      ssh 6v6-web 'sudo tail -5 /var/log/apache2/modsec_audit.log | jq -r ".audit_data.messages[]" 2>/dev/null | grep -oE "SQLI=[0-9]+,XSS=[0-9]+,RFI=[0-9]+,LFI=[0-9]+,RCE=[0-9]+,PHPI=[0-9]+"'

      # 4. XFF vs remote_address
      echo "=== XFF / remote ==="
      ssh 6v6-web 'sudo tail -1 /var/log/apache2/modsec_audit.log | jq "{remote:.transaction.remote_address, xff:.request.headers.\"x-forwarded-for\"}"'
      ```

      ## 📋 평가 기준 (20점)

      - **정확도 (10)**: 5 공격 모두 403 + 카테고리 분포 (941+942+930+932+933+949+980)
      - **분석 (5)**: 980130 summary 의 카테고리별 score + anomaly threshold 5 도달 시
        949110 block 동작
      - **운영 권장 (5)**: exception LocationMatch 시뮬 + git audit + paranoia 1 유지 권장

      ## 💡 의도

      WAF 의 anomaly scoring 누적 + audit log 정규식 파싱 + XFF 신뢰.

      ## 🔍 합격 기준

      5/5 403 + 980130 summary + XFF 차이 확인
