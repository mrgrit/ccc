lab_id: standalone-secuops-week08
title: 중간고사 — W01-W07 5 단계 종합 실기 (180분, 100점)
version: standalone-non-ai
course: secuops
week: 8
description: |
  W01-W07 의 종합 평가. 5 단계 × 20점 (총 100점, 180분). ① 인프라 baseline (W01) →
  ② fw NAT/HAProxy R/B/P (W02-W03) → ③ Suricata 룰 작성 + flowbits (W04-W05) →
  ④ ModSec 5 공격 + 980130 summary (W06) → ⑤ osquery 침해 시뮬 + 5 헌팅 (W07).
  각 단계는 정확도 + 분석 + 운영 권장 3 축 평가. cleanup 1 cycle 필수.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01-W07 모두 통과"
  - "lecture §1-§7 정독 + 핵심 정리 8 줄 암기"
  - "lab step 1-10 모두 직접 실행 경험"
objectives:
  - "5 단계 모두 본인 손으로 수행"
  - "각 단계 결과 (실측 + 분석) 보고서 첨부"
  - "cleanup 1 cycle 완성"
  - "R/B/P 표준 흐름 (Red / Blue / Purple)"
  - "audit log / eve.json / osquery JSON 정규식 파싱"
  - "종합 자기 평가"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 단계 1 (20점) — 인프라 baseline (W01)

      6v6 의 4-tier + 16 컨테이너 + 11 vhost + 4 ProxyJump 가시화. 30 분.

      ## 💻 실행 명령

      ```bash
      # 1. 16 컨테이너 가시화
      ssh 6v6-bastion 'docker ps --format "table {{.Names}}\t{{.Status}}" | head -20'

      # 2. fw + ips 의 dual NIC
      ssh 6v6-bastion 'for c in 6v6-fw 6v6-ips; do
          echo "=== $c ==="
          docker inspect $c --format "{{range \$k,\$v := .NetworkSettings.Networks}}{{\$k}}={{\$v.IPAddress}} {{end}}"
      done'

      # 3. HAProxy 11 vhost 매핑
      ssh 6v6-fw 'sudo grep -E "use_backend|default_backend|server " /etc/haproxy/haproxy.cfg | head -15'

      # 4. ProxyJump 4 호스트
      for h in fw ips web siem; do
          ssh 6v6-$h hostname
      done
      ```

      ## 📋 평가 기준 (20점)

      - **정확도 (10)**: 16 컨테이너 + dual NIC + 11 vhost + 4 ProxyJump 모두 확인
      - **분석 (5)**: 운영 트래픽 (siem/portal/bastion) vs 학생 트래픽 (juice 등) 의
        hop 차이 설명
      - **운영 권장 (5)**: 운영 인수 30초 cheat sheet 작성

      ## 💡 의도

      6v6 의 골격 가시화 → 이후 4 단계의 기반.

      ## 🔍 합격 기준

      4 출력 모두 완성 + 분석 1 문단 + 운영 권장 1 cheat sheet
    hint: 'docker ps + docker inspect + grep haproxy.cfg + ProxyJump'
    category: exam
    points: 20
    answer: |
      ssh 6v6-bastion 'docker ps --format "table {{.Names}}\t{{.Status}}" | head -20'
      ssh 6v6-bastion 'for c in 6v6-fw 6v6-ips; do
        echo "=== $c ==="
        docker inspect $c --format "{{range \$k,\$v := .NetworkSettings.Networks}}{{\$k}}={{\$v.IPAddress}} {{end}}"
      done'
      ssh 6v6-fw 'sudo grep -E "use_backend|default_backend|server " /etc/haproxy/haproxy.cfg | head -15'
      for h in fw ips web siem; do ssh 6v6-$h hostname; done
    answer_detail: '16 컨테이너 + dual NIC + 11 vhost + 4 ProxyJump 확인'
    verify:
      type: output_contains
      expect: 6v6-bastion
      field: stdout
      semantic:
        intent: "단계 1 — 인프라 baseline"
        success_criteria: ["16 컨테이너", "dual NIC", "11 vhost", "4 ProxyJump"]
        acceptable_methods:
          - "**[OSS] docker ps + format**"
          - "**[OSS] docker inspect NetworkSettings.Networks**"
          - "**[OSS] HAProxy use_backend + default_backend**"
          - "**[OSS] ProxyJump hostname**"
          - "**[OSS] 운영 vs 학생 트래픽 hop 차이**"
          - "**[OSS] vhost 표 작성 (host → backend)**"
          - "**[OSS] 운영 인수 30초 cheat sheet**"
          - "**[OSS] 4-tier 토폴로지 다이어그램**"
    target_vm: bastion

  - order: 2
    instruction: |
      ## 🎯 단계 2 (20점) — fw nftables NAT + HAProxy 협업 (W02-W03)

      3 table + DNAT + conntrack 양방향 + R/B/P HAProxy 80 충돌 + cleanup. 30 분.

      ## 💻 실행 명령

      ```bash
      # 1. 3 table 가시화
      ssh 6v6-fw 'sudo nft list tables'

      # 2. DNAT 8888 → web 80 추가 + 검증 + cleanup
      ssh 6v6-fw 'sudo nft add rule ip six_nat prerouting iifname "eth0" tcp dport 8888 counter dnat to 10.20.32.80:80'
      ssh 6v6-fw 'sudo nft insert rule inet six_filter input position 0 tcp dport 8888 accept'
      sleep 2
      ssh 6v6-attacker 'curl -s -o /dev/null -w "응답: %{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1:8888/'
      sleep 2
      ssh 6v6-fw 'sudo conntrack -L 2>/dev/null | grep "dport=8888" | head -1'
      H=$(ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$H" ] && ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle $H"
      H2=$(ssh 6v6-fw 'sudo nft -a list chain inet six_filter input | grep "dport 8888" | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$H2" ] && ssh 6v6-fw "sudo nft delete rule inet six_filter input handle $H2"

      # 3. R/B/P — HAProxy + DNAT 80 충돌
      echo "=== baseline (HAProxy) ==="
      ssh 6v6-fw 'sudo conntrack -F 2>/dev/null'
      sleep 1
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      sleep 1
      ssh 6v6-fw 'sudo conntrack -L 2>/dev/null | grep "10.20.30.202" | grep "dport=80" | head -1'

      echo "=== DNAT 활성 ==="
      ssh 6v6-fw 'sudo nft insert rule ip six_nat prerouting position 0 iifname "eth0" tcp dport 80 counter dnat to 10.20.32.80:80'
      ssh 6v6-fw 'sudo conntrack -F 2>/dev/null'
      sleep 1
      ssh 6v6-attacker 'curl -s -o /dev/null -w "%{http_code}\n" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      sleep 1
      ssh 6v6-fw 'sudo conntrack -L 2>/dev/null | grep "10.20.30.202" | grep "dport=80" | head -1'

      # Cleanup
      H=$(ssh 6v6-fw 'sudo nft -a list chain ip six_nat prerouting | grep "dport 80 " | grep -oE "handle [0-9]+" | head -1 | awk "{print \$2}"')
      [ -n "$H" ] && ssh 6v6-fw "sudo nft delete rule ip six_nat prerouting handle $H"
      ```

      ## 📋 평가 기준 (20점)

      - **정확도 (10)**: 3 table 가시화 + DNAT 8888 응답 200 + conntrack reply src
        변화 (10.20.30.1 → 10.20.32.80)
      - **분석 (5)**: nat prerouting priority dstnat (-100) 이 HAProxy bind 보다 우선
      - **운영 권장 (5)**: 5 운영 위험 중 3 가시화 (HAProxy termination / host header /
        가시성) + "한 port = 한 도구" 원칙

      ## 💡 의도

      fw 의 nftables + HAProxy 운영 깊이 평가. conntrack reply src 변화가 우회 증거.

      ## 🔍 합격 기준

      conntrack reply src 변화 명시 + cleanup 완성 + 5 위험 중 3 가시화
    hint: '3 table + DNAT 8888 + R/B/P 80 충돌 + conntrack reply src 변화'
    category: exam
    points: 20
    answer: |
      ssh 6v6-fw 'sudo nft list tables'
