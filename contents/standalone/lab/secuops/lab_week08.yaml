  - order: 3
    instruction: |
      ## 🎯 단계 3 (20점) — Suricata IDS + 룰 작성 + flowbits + R/B/P (W04-W05)

      Suricata 데몬 + drop_rate + 새 룰 + flowbits + R/B/P 5 burst. 35 분.

      ## 💻 실행 명령

      ```bash
      # 1. 데몬 + version + drop_rate
      ssh 6v6-ips 'pgrep -a Suricata'
      ssh 6v6-ips 'sudo suricatasc -c version'
      ssh 6v6-ips 'sudo suricatasc -c dump-counters | python3 -c "import json,sys; m=json.load(sys.stdin)[\"message\"]; print(\"drops:\",m.get(\"capture.kernel_drops\",0),\"pkts:\",m.get(\"decoder.pkts\",0))"'

      # 2. 새 alert 룰 (sid 9008001) + flowbits 다단계 (9008002/9008003)
      ssh 6v6-ips 'sudo bash -c "cat > /etc/suricata/rules/local.rules <<EOF
      alert http any any -> any any (msg:\"W08 sqlmap UA\"; http.user_agent; content:\"sqlmap\"; nocase; fast_pattern; classtype:web-application-attack; priority:2; sid:9008001; rev:1;)
      alert http any any -> any any (msg:\"W08 step1 FlowbitTest UA\"; http.user_agent; content:\"FlowbitTest\"; flowbits:set,fb_w08; flowbits:noalert; sid:9008002; rev:1;)
      alert http any any -> any any (msg:\"W08 step2 admin after step1\"; http.uri; content:\"/admin\"; flowbits:isset,fb_w08; classtype:successful-recon; priority:1; sid:9008003; rev:1;)
      EOF"'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      sleep 2

      # 3. R/B/P 5 burst sqlmap
      ssh 6v6-attacker 'for i in 1 2 3 4 5; do
        curl -s -o /dev/null -A "sqlmap/1.5" -H "Host: juice.6v6.lab" http://10.20.30.1/
      done'
      sleep 5

      # 4. alert 카운트
      C1=$(ssh 6v6-ips 'sudo grep "9008001" /var/log/suricata/eve.json | grep -c "\"event_type\":\"alert\""')
      echo "9008001 (sqlmap UA) 카운트: $C1 (예상 10 — 5 burst × 2 NIC)"

      # 5. flowbits 다단계 트리거
      ssh 6v6-attacker 'curl -s -o /dev/null -A "FlowbitTest/W08" -H "Host: juice.6v6.lab" http://10.20.30.1/'
      sleep 1
      ssh 6v6-attacker 'curl -s -o /dev/null -A "FlowbitTest/W08" -H "Host: juice.6v6.lab" http://10.20.30.1/admin'
      sleep 4
      C3=$(ssh 6v6-ips 'sudo grep "9008003" /var/log/suricata/eve.json | grep -c "\"event_type\":\"alert\""')
      echo "9008003 (flowbits step2) 카운트: $C3 (예상 2 — 양 NIC)"

      # Cleanup
      ssh 6v6-ips 'sudo rm -f /etc/suricata/rules/local.rules'
      ssh 6v6-ips 'sudo suricatasc -c reload-rules'
      ```

      ## 📋 평가 기준 (20점)

      - **정확도 (10)**: 데몬 + drop_rate < 0.01% + 9008001 alert 5+ + 9008003 alert 1+
      - **분석 (5)**: 양 NIC sniff effect (5 burst → 10 alert) + flowbits 의 state set/isset
      - **운영 권장 (5)**: threshold modifier + suppression 권장 + cleanup 완성

      ## 💡 의도

      Suricata 의 룰 작성 + 다단계 추적 + 운영 효과 통합.

      ## 🔍 합격 기준

      9008001 + 9008003 alert 발생 + cleanup + threshold 권장 작성
    hint: '데몬 + drop_rate + sqlmap 룰 + flowbits + 5 burst R/B/P'
