    cleanup: |
      ssh 6v6-fw 'for h in $(sudo nft -a list chain ip six_nat prerouting 2>/dev/null | grep -E "dport (80|8888) " | grep -oE "handle [0-9]+" | awk "{print \$2}"); do sudo nft delete rule ip six_nat prerouting handle $h; done' 2>/dev/null
      ssh 6v6-fw 'for h in $(sudo nft -a list chain inet six_filter input 2>/dev/null | grep "dport 8888" | grep -oE "handle [0-9]+" | awk "{print \$2}"); do sudo nft delete rule inet six_filter input handle $h; done' 2>/dev/null
