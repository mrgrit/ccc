week: 14
description: |
  MISP 도입 + OpenCTI ↔ MISP 양방향 sync (circular loop 회피) + Threat Hunting 5
  단계 + Sighting 등록 + Report 작성 + community 공유 (TLP) + ISAC 연계. 종합 보고서.
