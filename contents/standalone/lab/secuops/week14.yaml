lab_id: standalone-secuops-week14
title: MISP + OpenCTI 양방향 sync + Threat Hunting + Sighting + Report + R/B/P
version: standalone-non-ai
course: secuops
week: 14
description: |
  MISP 도입 + OpenCTI ↔ MISP 양방향 sync (circular loop 회피) + Threat Hunting 5
  단계 + Sighting 등록 + Report 작성 + community 공유 (TLP) + ISAC 연계. 종합 보고서.
difficulty: medium
duration_minutes: 180
prerequisites: [W13]
objectives:
  - "MISP 정체성 + OpenCTI 비교"
  - "MISP 핵심 객체 5 (Event / Attribute / Object / Tag / Galaxy)"
  - "OpenCTI ↔ MISP 양방향 sync + loop 회피"
  - "Threat Hunting 5 단계"
  - "Sighting object 작성"
  - "Report object 작성"
  - "TLP + ISAC 연계"
  - "R/B/P Hunting 1 cycle"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — MISP 도입 계획 + OpenCTI 비교

      ```
      MISP 도입:
        - PHP + MySQL backend
        - Web UI :443
        - REST API + API key
        - TAXII 2.1 server (export)

      OpenCTI vs MISP 매트릭스:
        | 항목 | MISP | OpenCTI |
        | 모델 | sharing-focused | platform-focused |
        | backend | PHP + MySQL | GraphQL + Elasticsearch |
        | 데이터 | Event-based | STIX object |
        | 강점 | community + ISAC | UI + correlation |
        보완 운영 — MISP feed + OpenCTI analyst UI
      ```
    hint: 'MISP PHP + MySQL vs OpenCTI GraphQL + Elasticsearch'
    category: planning
    points: 15
    answer: |
      cat <<'EOF'
      MISP: PHP/MySQL/Web UI :443/REST/TAXII export
      OpenCTI vs MISP:
        sharing vs platform / PHP/MySQL vs GraphQL/ES
      보완: MISP feed + OpenCTI UI
      EOF
    answer_detail: 'MISP 도입 + OpenCTI 비교'
    verify:
      type: output_contains
      expect: MISP
      field: stdout
      semantic:
        intent: "MISP + OpenCTI 비교"
        success_criteria: ["매트릭스", "보완 운영"]
        acceptable_methods:
          - "**[CTI] MISP CIRCL 2012**"
          - "**[CTI] PHP + MySQL backend**"
          - "**[CTI] TAXII 2.1 export**"
          - "**[CTI] Event-based**"
          - "**[CTI] OpenCTI STIX-based**"
          - "**[CTI] 양 platform 보완**"
          - "**[CTI] sharing 의무 (법적)**"
          - "**[CTI] AGPLv3 vs Apache 2.0**"
    target_vm: bastion

  - order: 2
    instruction: |
      ## 🎯 MISSION — MISP 핵심 객체 5 (Event / Attribute / Object / Tag / Galaxy)

      ```json
      {
        "Event": {
          "id": "12345",
          "date": "2026-05-12",
          "threat_level": 2,
          "distribution": 1,
          "tags": ["tlp:amber", "apt28", "malware:emotet"],
          "Attribute": [
            {"type": "ip-src", "value": "192.168.99.99", "category": "Network activity", "to_ids": true}
          ],
          "Object": [
            {"name": "file", "Attribute": [
              {"type": "filename", "value": "malware.exe"},
              {"type": "md5", "value": "abc..."},
              {"type": "sha256", "value": "def..."}
            ]}
          ],
          "Galaxy": [
            "galaxy-cluster:threat-actor:APT28",
            "galaxy-cluster:malware:Emotet"
          ]
        }
      }
      ```
    hint: 'Event + Attribute + Object + Tag + Galaxy'
    category: configuration
    points: 15
    answer: |
      cat <<'EOF'
      MISP Event 12345:
        date: 2026-05-12
        tags: tlp:amber, apt28, emotet
        Attribute: ip-src=192.168.99.99
        Object: file {filename, md5, sha256}
        Galaxy: threat-actor:APT28, malware:Emotet
      EOF
    answer_detail: 'MISP 5 핵심 객체'
    verify:
      type: output_contains
      expect: Attribute
      field: stdout
      semantic:
        intent: "MISP 5 핵심 객체"
        success_criteria: ["Event / Attribute / Object / Tag / Galaxy"]
        acceptable_methods:
          - "**[MISP] Event incident 중심**"
          - "**[MISP] Attribute IOC**"
          - "**[MISP] Object 묶음 (file/registry/network)**"
          - "**[MISP] Tag (TLP / kill-chain / MITRE)**"
          - "**[MISP] Galaxy (threat-actor / malware / sector)**"
          - "**[MISP] to_ids flag**"
          - "**[MISP] distribution level**"
          - "**[MISP] sharing group**"
    target_vm: bastion

  - order: 3
    instruction: |
      ## 🎯 MISSION — 양방향 sync + circular loop 회피

      ```
      OpenCTI ↔ MISP 양방향 sync:
        1. MISP Connector (OpenCTI 측) — external-import: MISP API 호출
        2. OpenCTI Export Connector (MISP 측) — STIX 2.1 export

      circular loop 위험:
        MISP Event → OpenCTI Indicator → MISP Event 재진입 → 중복 누적

      해결 3:
        1. ID 추적 (source_ref / target_ref 의 STIX ID)
        2. timestamp diff (modified 시각 기반)
        3. per-direction filter:
           - OpenCTI → MISP: tag "publish-to-misp" 만 export
           - MISP → OpenCTI: tag "from-trusted-source" 만 import
      ```
    hint: 'MISP ↔ OpenCTI sync + circular loop 회피 3 방법'
    category: integration
    points: 15
    answer: |
      cat <<'EOF'
      양방향 sync:
        OpenCTI MISP Connector (import)
        MISP STIX export
      circular loop 회피:
        1. STIX ID 추적
        2. timestamp diff
        3. per-direction filter (tag 기반)
      EOF
    answer_detail: '양방향 sync + 3 loop 회피'
    verify:
      type: output_contains
      expect: circular
      field: stdout
      semantic:
        intent: "양방향 sync + circular loop 회피"
        success_criteria: ["3 방법"]
        acceptable_methods:
          - "**[CTI] OpenCTI MISP Connector**"
          - "**[CTI] MISP STIX 2.1 export**"
          - "**[CTI] STIX ID 추적**"
          - "**[CTI] modified timestamp diff**"
          - "**[CTI] per-direction tag filter**"
          - "**[CTI] publish-to-misp / from-trusted**"
          - "**[CTI] duplicate detection**"
          - "**[CTI] sharing group + distribution**"
    target_vm: bastion

  - order: 4
