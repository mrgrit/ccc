      ## 🎯 MISSION — TLP 적용 + 운영 사고 분석

      ```
      TLP 적용:
        tlp:white  — 무제한 공개
        tlp:green  — community (sector)
        tlp:amber  — limited + need-to-know (default)
        tlp:red    — restricted (받은 사람만)

      운영 사고 3:
        1. circular loop → tag filter
        2. TLP 위반 → 자동 검증
        3. Sighting 누락 → 자동 생성 (rule 매치 시 API call)
      ```
