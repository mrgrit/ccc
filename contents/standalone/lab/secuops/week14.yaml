      [Sighting]
        - OpenCTI Sighting object 등록
        - sighting_of_ref: 매치된 indicator
        - where_sighted: 6v6-secuops identity

      [Report]
        - OpenCTI Report object
        - name: "APT28 lateral movement in 6v6"
        - object_refs: indicator + threat-actor + sighting

      [Share]
        - MISP Event 생성 + tlp:amber
        - community 공유 (ISAC 또는 trusted partners)
        - publish-to-misp tag → OpenCTI Connector 자동 export
      ```
