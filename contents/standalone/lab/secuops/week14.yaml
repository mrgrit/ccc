      ```
    hint: 'Sighting + Report STIX object'
    category: configuration
    points: 15
    answer: |
      cat <<'EOF'
      Sighting: indicator 매치 증거 + count + where_sighted
      Report: name + types + published + object_refs (Sighting + Indicator + ThreatActor)
      EOF
    answer_detail: 'Sighting + Report STIX 작성'
    verify:
      type: output_contains
      expect: sighting
      field: stdout
      semantic:
        intent: "Sighting + Report"
        success_criteria: ["Sighting JSON", "Report JSON"]
        acceptable_methods:
          - "**[STIX] sighting_of_ref**"
          - "**[STIX] first_seen / last_seen / count**"
          - "**[STIX] where_sighted_refs identity**"
          - "**[STIX] Report object_refs**"
          - "**[STIX] report_types**"
          - "**[STIX] published timestamp**"
          - "**[STIX] PDF 첨부 + narrative**"
          - "**[STIX] TLP marking_definition**"
    target_vm: bastion

  - order: 5
    instruction: |
      ## 🎯 MISSION — R/B/P Threat Hunting 5 단계 시뮬

      ```
      [Hypothesis] APT28 lateral movement (T1078 + T1021) 가 본 환경에 발생 가능성

      [Investigation]
        - Wazuh alerts.json (rule.id 86601 + 5712 + 60xxx) 1 주 분량 검색
        - osquery 의 새 user / authorized_keys / cron entry 점검
        - sysmon (W11 설치 후) 의 ProcessCreate (sshd 부모) + NetworkConnect (외부 IP)
        - 의심 사례 2-3 건 식별

      [Sighting]
        - OpenCTI Sighting object 등록
        - sighting_of_ref: 매치된 indicator
        - where_sighted: 6v6-secuops identity

      [Report]
        - OpenCTI Report object
        - name: "APT28 lateral movement in 6v6"
        - object_refs: indicator + threat-actor + sighting

      [Share]
        - MISP Event 생성 + tlp:amber
        - community 공유 (ISAC 또는 trusted partners)
        - publish-to-misp tag → OpenCTI Connector 자동 export
      ```
    hint: 'Threat Hunting 5 단계 R/B/P'
    category: redblue
    points: 20
    answer: |
      cat <<'EOF'
      [Hypothesis] APT28 lateral (T1078+T1021)
      [Investigation] Wazuh + osquery + sysmon 1주 검색
      [Sighting] OpenCTI Sighting object
      [Report] APT28 in 6v6 + Sighting refs
      [Share] MISP Event + tlp:amber + ISAC
      EOF
    answer_detail: 'Threat Hunting 5 단계 시뮬'
    verify:
