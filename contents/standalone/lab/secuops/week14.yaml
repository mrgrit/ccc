      ```

      ```json
      {
        "type": "report",
        "spec_version": "2.1",
        "id": "report--w14-002",
        "name": "APT28 lateral movement in 6v6 - W14",
        "report_types": ["threat-report"],
        "published": "2026-05-12T12:00:00Z",
        "object_refs": [
          "indicator--abc-...-001",
          "threat-actor--abc-...-003",
          "sighting--w14-001"
        ]
