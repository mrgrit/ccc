lab_id: ai-safety-adv-ai-week12
title: '[Non-AI] CTF 스타일 챌린지'
version: ai
course: ai-safety-adv-ai
week: 12
description: 'AI 보안 CTF를 설계하고 풀이합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.

  ⚠️ 이 실습은 취약 모델(ccc-vulnerable:4b 또는 ccc-unsafe:2b)을 대상으로 수행합니다. Ollama에서 해당 모델을
  선택하세요.'
difficulty: hard
duration_minutes: 120
objectives:
- AI CTF 문제를 이해한다
- 플래그 추출을 실습한다
- 방어 챌린지를 구현한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: Ollama API로 CTF challenges 관련 기본 질문을 전송하시오. 'Explain CTF challenges
    in cybersecurity'를 질문하고 응답을 분석하라.
  hint: /api/generate로 질문을 전송하세요.
  category: recon
  points: 10
  answer: "\U0001F916 프롬프트: CTF challenges의 사이버보안 개념을 3문장으로 설명해줘\n\U0001F4CE 참고 (CLI):\
    \ curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"model\"\
    :\"gemma3:4b\",\"prompt\":\"Explain CTF challenges in cybersecurity in 3 sentences\"\
    ,\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['response'])\""
  answer_detail: CTF challenges의 핵심 개념을 LLM을 통해 학습하고 응답의 정확성을 검증합니다.
  verify:
    type: output_contains
    expect: ''
    field: stdout
    semantic:
      intent: AI CTF 챌린지 개념 질의 — curl /api/generate gemma3:4b + 'Explain CTF style
        challenge in cybersecurity in 3 sentences' + num_predict=80. Lakera Gandalf
        (8 레벨 prompt injection CTF) + HackAPrompt (Learn Prompting 600K+ attack dataset)
        + DEFCON AI Village + Tensor Trust (UC Berkeley) + Immersive Labs AI Challenges
        + FLAG{...} 포맷 추출 + prompt injection/system prompt leakage/jailbreak/tool
        use exploitation 카테고리.
      success_criteria:
      - curl /api/generate + num_predict=80
      - CTF / challenge / flag 키워드
      - 3 sentences 제약
      acceptable_methods:
      - ollama run gemma3:4b
      - python urllib /api/generate
      - ollama-python
      - langchain Ollama wrapper
      negative_signs:
      - 실행 없이 이론
      - Gandalf/HackAPrompt 맥락 없음
      - FLAG 포맷 언급 없음
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
    model\":\"gemma3:4b\",\"prompt\":\"Explain CTF challenges in cybersecurity in\
    \ 3 sentences\",\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3\
    \ -c \"import sys,json; print(json.load(sys.stdin)['response'])\""
  risk_level: low
  bastion_prompt: 'Ollama API로 CTF challenges 관련 기본 질문을 전송하시오. ''Explain CTF challenges
    in cybersecurity''를 질문하고 응답을 분석하라.


    [중요] 반드시 제시된 쉘 명령을 실제로 실행하고 실제 stdout 기반으로 답해라. 개념 설명·표·체크리스트만 출력 금지.'
