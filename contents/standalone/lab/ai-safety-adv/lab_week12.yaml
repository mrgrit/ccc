        레벨 방어를 뚫을 수 있는 공격자에게 그대로 노출 + 인증/rate limit 없음 = HackAPrompt 600K 공격 dataset
        전량 자동 시도 가능 + 로그 평문 = 공격자 CTF payload 학습 보고 + prompt injection competition
        없이는 취약점 발견 누락. CTF-driven security.'
