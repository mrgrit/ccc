    CTF challenges Analysis ==='')\nfor item in items:\n    print(f''Item: {item}'')\n    print(f''Risk:
    {analyze(item)}'')\n    print()"'
  risk_level: low
  bastion_prompt: CTF challenges 분석 자동화 파이프라인을 구축하시오. LLM API를 호출하여 보안 항목을 자동 분석하라.
- order: 6
  instruction: CTF challenges 관련 가드레일을 구현하시오. 입출력 필터를 설계하고 테스트하라.
  hint: 주제별 허용/금지 규칙을 정의하고 필터를 구현하세요.
  category: defense
  points: 10
  answer: '🤖 프롬프트: 가드레일을구현 방법과 예시를 설명해줘

    📎 참고 (CLI): python3 -c "import re\nrules = [(r''password|credential|secret'',''credentials''),(r''rm\\s+-rf|drop\\s+table'',''destructive''),(r''hack|exploit'',''offensive'')]\ndef
    guardrail(text):\n    for pat, name in rules:\n        if re.search(pat, text,
    re.I): return f''FLAGGED({name})''\n    return ''ALLOWED''\nfor t in [''Analyze
    log file'',''Remove password from config'',''How to secure SSH'',''Drop table
    cleanup'']:\n    print(f''[{guardrail(t):25s}] {t}'')"'
  answer_detail: 도메인 특화 가드레일은 CTF challenges 관련 위험을 방어합니다.
  verify:
    type: output_contains
    expect: FLAGGED
    field: stdout
    semantic:
      intent: 'CTF 챌린지 가드레일 — python3 re 3-카테고리 + FLAGGED/ALLOWED + 4개 테스트. CTF 방어
        가드레일 확장: (1) FLAG 포맷 (FLAG\{[^}]+\}|FLAG_[A-Z_]+) 출력 차단 + (2) system prompt
        토큰 keywords blacklist + (3) Level-based 단계 방어 (Gandalf 방식 — 같은 API 여러 방어 계층)
        + (4) Lakera Guard 통합 prompt injection 탐지. Defense-in-Depth for CTF.'
      success_criteria:
      - 3개 이상 카테고리
      - re.I case-insensitive
      - FLAGGED(카테고리) / ALLOWED 분류
      acceptable_methods:
      - NeMo Guardrails + FLAG regex
      - Lakera Guard prompt injection
      - Rebuff detector + response filter
      - Level-based defense stack
      negative_signs:
      - 단일 정규식
      - FLAG 포맷 차단 언급 없음
