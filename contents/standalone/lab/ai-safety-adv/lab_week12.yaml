      - 3개 이상 정책 취약점
      - 'Policy:/Analysis: 라벨'
      - CTF 관점 (Gandalf/HackAPrompt) 해석
      acceptable_methods:
      - /api/chat auditor + policy
      - LangChain policy_review
      - Lakera Gandalf 벤치마크
      - HackAPrompt dataset 자동 스캔
      negative_signs:
      - policy 입력 없음
      - CTF-driven 관점 없음
      - Gandalf 레벨 맥락 없음
  target_vm: manager
  script: 'python3 -c "import json, urllib.request\npolicy = ''All users access LLM
    API without auth. No rate limiting. Prompts logged in plaintext.''\ndata = json.dumps({''model'':''gemma3:4b'',''messages'':[{''role'':''system'',''content'':''You
