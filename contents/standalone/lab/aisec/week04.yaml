lab_id: standalone-aisec-week04
title: AI Powered Cyber Security (2) — LLM 로그 / 룰 / 모의해킹
version: standalone-non-ai
course: aisec
week: 4
description: |
  LLM 의 보안 작업 본격 활용 — alert triage / correlation / enrichment / reporting
  + Sigma / Wazuh / Suricata / ModSec 룰 자동 생성 + CVE 분석 + 모의해킹 보조.
difficulty: medium
duration_minutes: 180
prerequisites:
  - W03 통과
  - Ollama 또는 Bastion API
  - Wazuh manager 의 alerts.json 가용
objectives:
  - LLM 의 alert triage
  - LLM 의 Sigma / Wazuh 룰 생성
  - LLM 의 CVE 분석
  - LLM 의 모의해킹 step 보조
pass_threshold: 0.7

steps:
  - order: 1
    instruction: |
      실 Wazuh alert 의 LLM 분석 — 5W + 위험도 + 권장.
    hint: Bastion /chat 또는 Ollama
    category: experiment
    points: 25
    answer: |
      ssh 6v6-bastion '
      ALERT=$(sudo tail -1 /var/ossec/logs/alerts/alerts.json | head -1)
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"다음 Wazuh alert 를 한국어로 5W + 위험도 + 권장으로 분석:\n$ALERT\", \"agent\":\"master\"}" \
          http://localhost:8003/chat 2>&1 | head -50
      '
    answer_detail: alert 의 LLM 분석
    verify:
      type: output_contains
      expect: 위험도
      field: stdout
      semantic:
        intent: alert triage
        success_criteria: [5W 또는 위험도 분석]
        acceptable_methods:
          - "**[OSS] Bastion /chat + master agent**"
          - "**[OSS] Ollama 의 zero-shot prompt**"
          - "**[OSS] Few-shot 의 예시 1-3**"
          - "**[OSS] CoT (step-by-step)**"
          - "**[OSS] JSON format 강제 (응답 파싱 친화)**"
          - "**[OSS] LLM-as-judge 의 false-positive 평가**"
          - "**[OSS] enrichment (CTI + asset)**"
          - "**[OSS] timestamp 의 한국 시간대 의 변환**"
    target_vm: bastion

  - order: 2
    instruction: LLM 의 Sigma rule 자동 생성
    hint: 가상 시나리오 → Sigma YAML
    category: experiment
    points: 25
    answer: |
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "다음 시나리오의 Sigma rule YAML 작성:\n\n시나리오: SSH 의 5+ failed login from same IP in 60 seconds.\n\n형식:\ntitle / id / description / tags (attack.credential_access + attack.t1110.001) / logsource (linux + sshd) / detection (selection + timeframe + condition) / falsepositives / level (high)",
        "stream": false
      }' | jq -r .response | head -30
    answer_detail: Sigma YAML 생성
    verify:
      type: output_contains
      expect: title
      field: stdout
      semantic:
        intent: Sigma 룰
        success_criteria: [YAML format + tags]
        acceptable_methods:
          - "**[OSS] Sigma syntax (title/id/description/tags/logsource/detection/level)**"
          - "**[OSS] ATT&CK Technique 매핑**"
          - "**[OSS] CWE 매핑 (관련 시)**"
          - "**[OSS] timeframe + condition**"
          - "**[OSS] falsepositives 명시**"
          - "**[OSS] references (관련 URL)**"
          - "**[OSS] sigma-cli lint 검증**"
          - "**[OSS] sigma → Wazuh / Suricata / Splunk 변환**"
    target_vm: attacker

  - order: 3
    instruction: LLM 의 Wazuh XML rule 생성
    hint: id 100400 + level 12
    category: experiment
    points: 20
    answer: |
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "다음 시나리오의 Wazuh XML rule 작성 (id 100400 / level 12):\n\n시나리오: ModSec 의 941100 매치가 60 초에 3 건 이상 같은 src_ip → level 12.\n\n형식:\n<group name=\"6v6,custom,\">\n  <rule id=\"100400\" level=\"12\" frequency=\"3\" timeframe=\"60\">\n    <if_sid>...</if_sid>\n    <same_source_ip/>\n    <description>...</description>\n  </rule>\n</group>",
        "stream": false
      }' | jq -r .response | head -20
    answer_detail: Wazuh XML rule
    verify:
      type: output_contains
      expect: rule
      field: stdout
      semantic:
        intent: Wazuh rule
        success_criteria: [XML + id + level]
        acceptable_methods:
          - "**[OSS] Wazuh rule XML 의 표준 field**"
          - "**[OSS] if_sid (chain)**"
          - "**[OSS] frequency + timeframe (rate-based)**"
          - "**[OSS] same_source_ip + same_destination**"
          - "**[OSS] level 0-15 의 의미**"
          - "**[OSS] group 의 카테고리**"
          - "**[OSS] wazuh-logtest 검증**"
          - "**[OSS] local_rules.xml 의 위치**"
    target_vm: attacker

  - order: 4
    instruction: CVE 의 LLM 분석
    hint: 5 항목 응답
    category: analysis
    points: 15
    answer: |
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "다음 CVE 의 한국어 분석. 응답 5 항목:\n1. 핵심 vuln\n2. CVSS 의미\n3. 영향 범위\n4. 익스플로잇 가용성\n5. 권장 패치\n\nCVE: CVE-2024-1234 (가상)\ndescription: Apache HTTP Server 2.4.x 의 mod_rewrite 의 buffer overflow → RCE\nCVSS: 9.8 (Critical)\nattack_vector: Network / no authentication required",
        "stream": false
      }' | jq -r .response | head -25
    answer_detail: CVE 5 항목 분석
    verify:
      type: output_contains
      expect: CVE
      field: stdout
      semantic:
        intent: CVE 분석
        success_criteria: [5 항목]
        acceptable_methods:
          - "**[OSS] CVSS 3.1 score 의 8 metric**"
          - "**[OSS] CVE → CWE 매핑**"
          - "**[OSS] CVE → EPSS (exploit probability)**"
          - "**[OSS] PoC 가용성 (exploit-db / GitHub)**"
          - "**[OSS] vendor advisory 검색**"
          - "**[OSS] 의존성 분석 (어떤 시스템 영향)**"
          - "**[OSS] 패치 우선순위 (CVSS + EPSS + asset 중요도)**"
          - "**[OSS] CTI 통합 (활성 공격 인가)**"
    target_vm: attacker

  - order: 5
    instruction: 모의해킹 보조 — JuiceShop 의 LLM 조언
    hint: 학습 환경 침투 시나리오
    category: experiment
    points: 15
    answer: |
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "당신은 학습 환경의 침투 테스트 보조 AI.\n\n현재 상황:\n- target: juice.6v6.lab (학습 환경의 OWASP Juice Shop)\n- 정찰 결과:\n  - REST API + JWT 인증 + ModSec WAF\n  - 발견 endpoint: /api/Users (200 응답)\n  - JWT alg=RS256\n\n다음 시도 권장 3 + 각 시도의 ATT&CK Technique 매핑.\n\n주의: 학습 환경 만, 외부 시스템 X.",
        "stream": false
      }' | jq -r .response | head -25
    answer_detail: 모의해킹 step 권장
    verify:
      type: output_contains
      expect: ATT
      field: stdout
      semantic:
        intent: 모의해킹 보조
        success_criteria: [3 권장 + ATT&CK]
        acceptable_methods:
          - "**[OSS] PTES 의 5 단계 별 LLM 권장**"
          - "**[OSS] sqlmap + LLM 결과 분석**"
          - "**[OSS] Burp Suite + LLM 통합 (확장)**"
          - "**[OSS] OWASP Top 10 매핑**"
          - "**[OSS] CWE Top 25 매핑**"
          - "**[OSS] safe payload generation**"
          - "**[OSS] safety check (RoE 위반 시 거부)**"
          - "**[OSS] Bastion 의 자동 침투 (W07 학습)**"
    target_vm: attacker
