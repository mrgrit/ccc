lab_id: standalone-aisec-week12
title: 자율보안 (2) — Blue active-response + 자율 Red + Purple cycle + RL Steering
version: standalone-non-ai
course: aisec
week: 12
description: |
  Wazuh active-response 의 6 단계 + 자율 Red 의 Plan-Execute dry-run + Purple cycle
  의 1 cycle 시뮬 + RL Steering 의 persona 효과 + R5 학습 누적 의 5 hands-on.

  lecture 의 비유 의 lab 매핑:
  - 자율 Blue 6 단계 = 병원 응급실 의 환자 처리 (접수 / 활력 / 삼분류 / 처방 준비 /
    의사 확인 후 처치 / 차트 기록).
  - 자율 Red = 합법 의 자물쇠 점검 (학습 환경 만 의 한정).
  - RL Steering = TV 의 음량 dial 의 조정 (학습 weight 의 변경 의 X).
  - Purple cycle = Blue + Red + KG 의 자율 학습 의 통합 cycle.
difficulty: hard
duration_minutes: 240
prerequisites:
  - W11 통과
  - Ollama API + Bastion API 가용
  - Python 3
objectives:
  - Wazuh active-response 의 6 단계 매핑
  - Python 자율 Red Plan-Execute dry-run
  - Purple cycle 1 cycle 시뮬 + KG anchor
  - 3 persona steering 응답 차이 측정
  - R5 reuse vs new + graph_nodes 누적 가시화
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — Wazuh active-response 의 6 단계 매핑
  # ============================================================
  - order: 1
    instruction: |
      Wazuh 의 active-response 의 XML 구성 의 정독 + 6 단계 워크플로우 (Observe /
      Enrich / Triage / Prepare / Mitigate / Learn) 의 매핑.

      lecture 1-3 ~ 1-4 의 매핑 — 응급실 의 환자 처리 의 6 단계 의 보안 의 응용.
      lecture 1-4 의 1 alert 의 실 trace (00:00 sshd brute → 00:03 iptables drop
      → 10:03 자동 rollback) 의 본 lab 의 XML 의 직접 확인.
    hint: |
      ossec.conf XML + 6 단계
    category: analysis
    points: 20
    answer: |
      cat <<'EOF'
      === Wazuh active-response 의 XML 구성 ===

      /var/ossec/etc/ossec.conf 의 일부 (실 구성):

      <active-response>
        <command>firewall-drop</command>
        <location>local</location>
        <rules_id>5712</rules_id>
        <timeout>600</timeout>
      </active-response>

      <command>
        <name>firewall-drop</name>
        <executable>firewall-drop</executable>
        <timeout_allowed>yes</timeout_allowed>
      </command>

      === 6 단계 의 매핑 ===

      Step 1: Observe + Notify (자유)
        - Wazuh agent 의 alert 발생 (rule 5712 trigger)
        - manager 의 alerts.json 의 기록
        - SIEM / Slack / 이메일 의 자동 통보

      Step 2: Enrich (자유)
        - srcip 의 GeoIP / asset DB 의 자동 결합
        - CTI feed 의 IoC 매칭
        - 과거 alert history 의 query

      Step 3: Triage (자유)
        - rule 5712 level 10+ 의 자동 인식
        - LLM 의 5W + 위험도 (Bastion /chat)
        - KG 의 PE 의 reuse 검색

      Step 4: Prepare (가시화)
        - active-response command 의 가시화 (firewall-drop)
        - dry-run 의 결과 의 사전 가시화

      Step 5: Mitigate (사람 confirm)
        - iptables -A INPUT -s SRC -j DROP 의 실 적용
        - timeout 600 sec 의 자동 rollback

      Step 6: Learn (자동)
        - task_outcome anchor 의 KG 기록
        - 다음 chat 의 context 강화
        - 통계 업데이트

      === 실 명령 의 예 ===

      # active-response 의 manual 실행 (학습 환경 만)
      sudo /var/ossec/active-response/bin/firewall-drop add 192.168.0.112 600

      # 차단 확인
      sudo iptables -nL | grep 192.168.0.112

      # 600 sec 후 의 자동 해제 확인
      sleep 605
      sudo iptables -nL | grep 192.168.0.112  # 없어짐
      EOF
    answer_detail: Wazuh active-response 6 단계
    verify:
      type: output_contains
      expect: active-response
      field: stdout
      semantic:
        intent: Wazuh active-response 매핑
        success_criteria: [6 단계 응답]
        acceptable_methods:
          - "**[OSS] Wazuh active-response XML**"
          - "**[OSS] firewall-drop 표준 command**"
          - "**[OSS] timeout 의 auto rollback**"
          - "**[OSS] rules_id 의 trigger**"
          - "**[OSS] Suricata IPS drop action**"
          - "**[OSS] ModSec CRS anomaly threshold**"
          - "**[OSS] iptables / nftables 통합**"
          - "**[OSS] CCC Bastion 의 6 단계 자체 구현**"
    target_vm: bastion

  # ============================================================
  # STEP 2 — Python 자율 Red Plan-Execute dry-run
  # ============================================================
  - order: 2
    instruction: |
      Python 의 미니 자율 Red — Plan-Execute 의 LLM 호출 + 3 단계 의 dry-run +
      ATT&CK 매핑 + RoE 강제.

      lecture 2-3 ~ 2-5 의 매핑 — 합법 의 자물쇠 점검 의 4 조건 (인가 + 본인 자산
      한정 + 기록 + 강화) 의 보안 의 응용. lecture 2-3 의 6 윤리 필수 의 dry-run
      의 직접 강제 — 본인 의 학습 환경 (192.168.0.112, 192.168.0.100) 만 의 시도,
      실 패킷 의 발송 의 X 의 plan 의 가시화 만.
    hint: |
      LLM plan + dry-run execute
    category: experiment
    points: 25
    answer: |
      cat > /tmp/auto_red.py <<'PYEOF'
      """자율 Red 의 Plan-Execute 미니 demo (dry-run)"""
      import json
      import subprocess

      OLLAMA = "http://192.168.0.109:11434"
      MODEL = "gemma3:4b"
      TARGET = "192.168.0.103 (학습 환경 의 web VM)"
      ROE = "RoE: 학습 환경 192.168.0.0/24 만, 외부 거부, dry-run 만."

      # 1. Plan
      plan_prompt = f"""{ROE}

target: {TARGET}

다음 의 정찰 의 3 step 의 plan 을 응답. 각 step 의 명령 + ATT&CK Technique.
format: '1. <명령> | T<id> <name>'"""

      print("=== 1. Plan (LLM 의 자동 plan) ===")
      cmd = ["curl","-s","-m","30",f"{OLLAMA}/api/generate",
             "-d",json.dumps({"model":MODEL,"prompt":plan_prompt,"stream":False,
                              "options":{"num_predict":250,"temperature":0.2}})]
      try:
          r = subprocess.run(cmd, capture_output=True, text=True, timeout=35)
          plan = json.loads(r.stdout).get("response","")
          print(plan[:600])
      except Exception as e:
          print(f"  (LLM error: {e}) — fallback plan 사용")
          plan = "fallback"

      # 2. Execute (dry-run — 학생의 학습 안전)
      print()
      print("=== 2. Execute (dry-run, 실 실행 X) ===")
      execute_steps = [
          ("nmap -sV -p- 192.168.0.103", "T1595 Active Scanning"),
          ("whatweb http://192.168.0.103", "T1593 Search Open Websites"),
          ("nikto -h http://192.168.0.103", "T1190 Exploit Public-Facing"),
      ]
      for cmd_str, attck in execute_steps:
          # RoE 검증
          import re
          if not (re.search(r"192\.168\.0\.", cmd_str) or "localhost" in cmd_str):
              print(f"  [BLOCKED] {cmd_str[:50]} — RoE 외부 거부")
              continue
          print(f"  [DRY-RUN] {cmd_str}")
          print(f"          {attck}")

      # 3. Report
      print()
      print("=== 3. Report (자동) ===")
      print("  Plan-Execute cycle 의 완료 — 3 step 의 dry-run")
      print("  실 실행 시 의 다음 단계 — Bastion KG anchor 의 기록")
      print()
      print("=== 윤리 의 명시 ===")
      print("- 본 demo 의 학습 환경 만, 외부 거부")
      print("- 실 실행 의 의의 — Bastion 의 /chat 의 approval_mode 의 명시")
      print("- 모든 시도 의 KG 의 anchor 의 기록 의 의의")
      PYEOF
      python3 /tmp/auto_red.py 2>&1 | head -30
    answer_detail: 자율 Red Plan-Execute dry-run
    verify:
      type: output_contains
      expect: DRY-RUN
      field: stdout
      semantic:
        intent: 자율 Red Plan-Execute
        success_criteria: [Plan + Execute dry-run]
        acceptable_methods:
          - "**[OSS] Plan-Execute (Wang 2023)**"
          - "**[OSS] dry-run 의 학습 환경 안전**"
          - "**[OSS] ATT&CK Technique 매핑**"
          - "**[OSS] RoE 의 명시 + 외부 거부**"
          - "**[OSS] Metasploit Pro 자동 모듈**"
          - "**[OSS] PentestGPT LLM 기반**"
          - "**[OSS] MITRE Caldera ATT&CK 기반**"
          - "**[OSS] Atomic Red Team atomic test**"
    target_vm: bastion

  # ============================================================
  # STEP 3 — Purple cycle 의 1 cycle 시뮬
  # ============================================================
  - order: 3
    instruction: |
      Red 의 시뮬 시도 + Blue 의 응답 + KG anchor 기록 의 1 cycle 시뮬레이션 + 학습
      의의 의 분석.

      lecture 4-1 ~ 4-2 의 매핑 — Red 시도 → Blue 응답 → KG 기록 → 평가 →
      improvement 의 자율 Purple cycle. lecture 4-2 의 1 cycle 의 실 trace
      (00:00 attacker plan → 00:05 sqlmap SQLi 발견 → 00:10 ModSec rule 942100
      trigger → 00:11 KG search → 00:11 학생 confirm → 00:12 anchor 기록) 의 본
      lab 의 직접 mini 시뮬.
    hint: |
      Red simulate + Blue 응답 + KG 가시화
    category: synthesis
    points: 20
    answer: |
      echo "=== Purple Cycle 의 1 cycle 시뮬 ==="

      echo ""
      echo "--- [Red] simulated SSH brute (학습 환경 만) ---"
      echo "  공격자: 192.168.0.112 (attacker VM)"
      echo "  target: 192.168.0.103 (web)"
      echo "  시도: 5 회 의 ssh failed login"
      echo "  command (dry-run): hydra -l ccc -P /tmp/wordlist 192.168.0.103 ssh"
      echo ""

      echo "--- [Blue] Wazuh + active-response 의 응답 ---"
      echo "  rule 5710 trigger (Failed password) × 5 회"
      echo "  rule 5712 trigger (Multiple failed = chain rule)"
      echo "  active-response: firewall-drop 의 600 sec 적용"
      echo "  iptables -A INPUT -s 192.168.0.112 -j DROP"
      echo ""

      echo "--- [Purple] KG anchor 의 기록 + 학습 가시화 ---"
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.103:8003/kg/anchors/recent?kind=task_outcome&limit=3" \
          2>&1 | head -c 2500
      echo ""

      echo ""
      echo "=== Purple 의 학습 의의 ==="
      cat <<'EOF'
      Purple cycle 의 자동 학습:

      1. Red 시도 의 자동 기록
         - 시간, target, 명령 의 KG anchor 기록

      2. Blue 응답 의 자동 기록
         - 차단 결과, timeout, false positive 의 KG anchor

      3. 매 cycle 의 KG 의 PE 의 결정
         - reuse: 동일 패턴 의 기존 playbook 적용
         - adapt: 약간 다른 패턴 의 일부 수정
         - new: 새 패턴 의 새 playbook 등록

      4. 다음 cycle 의 context 강화
         - 이전 cycle 의 학습 의 다음 응답 의 효율 증가
         - 시간 의 지남 의 자율 의 정확도 향상

      === KPI 의 정량 측정 ===

      - Red 의 success rate 의 추이 (학습 의 효과)
      - Blue 의 detection rate 의 추이 (방어 의 강화)
      - Mean Time to Detect (MTTD) 의 감소
      - Mean Time to Respond (MTTR) 의 감소
      - false positive 의 비율 의 감소
      EOF
    answer_detail: Purple cycle 시뮬
    verify:
      type: output_contains
      expect: Cycle
      field: stdout
      semantic:
        intent: Purple cycle
        success_criteria: [Red + Blue + KG anchor 응답]
        acceptable_methods:
          - "**[OSS] Red simulated + Blue 응답**"
          - "**[OSS] KG anchor 의 학습**"
          - "**[OSS] reuse / adapt / new 결정**"
          - "**[OSS] cycle 자동 반복**"
          - "**[OSS] human-in-loop escalation**"
          - "**[OSS] MITRE Caldera Red emulation**"
          - "**[OSS] adversary emulation plan**"
          - "**[OSS] cycle KPI 측정**"
    target_vm: bastion

  # ============================================================
  # STEP 4 — 3 persona steering 응답 차이
  # ============================================================
  - order: 4
    instruction: |
      gemma3:4b 의 system prompt 의 3 다른 persona 의 적용 + 동일 user message 의
      응답 의 차이 측정 (RL Steering 의 prompt 기반 의 미니 demo).

      lecture 3-5 ~ 3-8 의 매핑 — TV 의 음량 dial 의 보안 의 응용. 모델 의 학습
      weight 의 변경 의 없이 의 system prompt 의 persona 의 dial 의 조정 의
      응답 의 방향 의 차이 의 직접 측정. lecture 3-8 의 3 적용 (Inference-time
      Safety, Dynamic Guardrail, Persona Enforcement) 의 직접 확인.
    hint: |
      동일 user × 3 persona system
    category: experiment
    points: 20
    answer: |
      OLLAMA=http://192.168.0.109:11434
      USER_MSG="SQL injection 의 학습 환경 의 payload 의 의의 의 설명"

      echo "=== Persona 1: 학습 환경 보안 AI (Conservative) ==="
      timeout 30 curl -s $OLLAMA/api/chat -d "{
        \"model\": \"gemma3:4b\",
        \"messages\": [
          {\"role\":\"system\",\"content\":\"당신은 학습 환경 의 보안 AI 입니다. 학습 만 응답. 외부 거부. 위험 한 응답 의 거부.\"},
          {\"role\":\"user\",\"content\":\"$USER_MSG\"}
        ],
        \"stream\": false,
        \"options\": {\"temperature\":0.1,\"num_predict\":150}
      }" 2>&1 | grep -oE '"content":"[^"]*"' | head -1 | head -c 500
      echo ""

      echo ""
      echo "=== Persona 2: 일반 AI (Neutral) ==="
      timeout 30 curl -s $OLLAMA/api/chat -d "{
        \"model\": \"gemma3:4b\",
        \"messages\": [
          {\"role\":\"system\",\"content\":\"당신은 일반 AI 어시스턴트.\"},
          {\"role\":\"user\",\"content\":\"$USER_MSG\"}
        ],
        \"stream\": false,
        \"options\": {\"temperature\":0.1,\"num_predict\":150}
      }" 2>&1 | grep -oE '"content":"[^"]*"' | head -1 | head -c 500
      echo ""

      echo ""
      echo "=== Persona 3: 전문 보안 강사 (Educational) ==="
      timeout 30 curl -s $OLLAMA/api/chat -d "{
        \"model\": \"gemma3:4b\",
        \"messages\": [
          {\"role\":\"system\",\"content\":\"당신은 대학 의 보안 학과 의 전문 강사. 학습 의 깊이 + 사례 + ATT&CK / OWASP 매핑.\"},
          {\"role\":\"user\",\"content\":\"$USER_MSG\"}
        ],
        \"stream\": false,
        \"options\": {\"temperature\":0.1,\"num_predict\":150}
      }" 2>&1 | grep -oE '"content":"[^"]*"' | head -1 | head -c 500
      echo ""

      echo ""
      echo "=== Persona Steering 의 의의 ==="
      echo "- 동일 user message + 다른 system prompt → 다른 응답"
      echo "- prompt engineering 의 가장 단순 한 형태 의 steering"
      echo "- Anthropic 의 ACT 의 의의 — internal activation 의 직접 push (더 강력)"
      echo "- 본 demo 의 학생 의 학습 — 본인 환경의 persona 의 효과 의 직접 측정"
    answer_detail: persona steering
    verify:
      type: output_contains
      expect: SQL
      field: stdout
      semantic:
        intent: persona steering
        success_criteria: [3 persona 응답 비교]
        acceptable_methods:
          - "**[OSS] system prompt persona 강제**"
          - "**[OSS] tone / depth 변화**"
          - "**[OSS] safety alignment 차이**"
          - "**[OSS] Anthropic ACT activation steering**"
          - "**[OSS] OpenAI Critic Models**"
          - "**[OSS] Process Reward Models**"
          - "**[OSS] Self-Reflection / Reflexion**"
          - "**[OSS] KG context 의 inference steering**"
    target_vm: bastion

  # ============================================================
  # STEP 5 — R5 학습 누적 의 가시화
  # ============================================================
  - order: 5
    instruction: |
      CCC R5 main 의 reuse vs new 비율 + KG graph_nodes / history_anchors 의 누적
      가시화 + 학습 효과 의 정량 분석.

      lecture 4-1 의 매핑 — CCC Bastion 의 R5 learning loop 가 본 lecture 의 자율
      Purple cycle 의 직접 구현. 12 attack courses 의 자동 학습 + KG anchor 의
      누적 의 본 lab 의 직접 가시화.
    hint: |
      run_r5_main.log + /kg/metrics
    category: analysis
    points: 15
    answer: |
      cd /home/opsclaw/ccc 2>/dev/null

      echo "=== R5 main 의 reuse vs new 의 분석 ==="
      grep -oE "new=(True|False)" results/retest/run_r5_main.log 2>/dev/null | \
          sort | uniq -c | head

      echo ""
      echo "=== R5 main 의 VERDICT 의 분포 ==="
      grep -oE "VERDICT: \w+" results/retest/run_r5_main.log 2>/dev/null | \
          sort | uniq -c | head

      echo ""
      echo "=== Bastion 의 KG 누적 (현재 시점) ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.103:8003/health | head -c 500
      echo ""

      echo ""
      echo "=== /kg/metrics 의 counter ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.103:8003/kg/metrics | head -c 400
      echo ""

      echo ""
      echo "=== 학습 효과 의 정량 분석 ==="
      cat <<'EOF'
      누적 의 의의:
      - graph_nodes: KG 의 누적 의 node (4940+ 의 학습 의 결과)
      - history_anchors: task_outcome 의 누적 (5338+ 의 학습 누적)
      - new=True: 새 task 의 KG 신규 등록
      - new=False: 기존 KG 의 reuse

      운영 의 의의:
      - reuse 비율 의 증가 = 학습 누적 의 효과
      - new 증가 = 새 패턴 의 발견
      - graph_nodes / history_anchors 의 시계열 추이 의 학습 곡선

      paper §7 의 source:
      - R5 main 의 676 case 의 자동 학습
      - 매 chat 의 task_outcome anchor 의 누적
      - paper 의 §7 의 의 의 실험 의 data source

      미래 의 RL Steering 의 적용:
      - Bastion 의 internal activation 의 학습 환경 의 dominance 학습
      - inference 시 의 학습 환경 vector 의 강제 활성
      EOF
    answer_detail: R5 학습 누적 가시화
    verify:
      type: output_contains
      expect: graph_nodes
      field: stdout
      semantic:
        intent: 학습 누적
        success_criteria: [reuse vs new + graph_nodes 응답]
        acceptable_methods:
          - "**[OSS] new=True/False 의 비율**"
          - "**[OSS] graph_nodes / history_anchors 누적**"
          - "**[OSS] reuse 의 학습 누적**"
          - "**[OSS] new 의 새 패턴**"
          - "**[OSS] PE-KG paper §4**"
          - "**[OSS] R5 676 case**"
          - "**[OSS] 51 case 손실 사고 의 GPU 직렬**"
          - "**[OSS] paper §7 실험 source**"
    target_vm: bastion
