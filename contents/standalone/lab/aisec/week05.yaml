lab_id: standalone-aisec-week05
title: AI 에이전트 (1) — 에이전트 / Claude Code / 하네스 엔지니어링
version: standalone-non-ai
course: aisec
week: 5
description: |
  단발 LLM 호출 (W02-W04) → 자율 cycle 의 에이전트 로 도약. ReAct / Plan-Execute /
  Claude Code architecture / 하네스 (Guardrail / Verifier / Tracer / Limiter /
  Recoverer / Terminator) 의 6 구성 의 실 가시화.
difficulty: medium
duration_minutes: 180
prerequisites:
  - W04 통과
  - Bastion API 가용
  - Python 3 가용
objectives:
  - Bastion 의 ReAct trace 의 분석
  - Bastion 의 skill 카탈로그 의 학습
  - Bastion 의 KG audit 의 확인
  - Python 의 ReAct loop 의 미니 demo
  - 하네스 의 verifier / limiter 의 미니 demo
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — Bastion chat 의 ReAct trace 의 가시화
  # ============================================================
  - order: 1
    instruction: |
      Bastion API 의 /chat 호출 + 응답 의 thought / action / observation 의 trace
      가시화. (Bastion 의 master agent 는 ReAct 의 구현체)
    hint: |
      curl -X POST /chat -d '{"message":"...", "agent":"master"}'
    category: experiment
    points: 25
    answer: |
      ssh 6v6-bastion '
      curl -s -X POST \
          -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"현재 6v6 인프라 중 가장 위험 한 alert 패턴 1 개 를 분석 해 주세요. /var/ossec/logs/alerts/alerts.json 최근 5 분 을 참조.\", \"agent\":\"master\"}" \
          http://localhost:8003/chat 2>&1 | head -120
      '
    answer_detail: ReAct trace 의 가시화
    verify:
      type: output_contains
      expect: response
      field: stdout
      semantic:
        intent: ReAct trace
        success_criteria: [response 응답 + thought 또는 action 의 흔적]
        acceptable_methods:
          - "**[OSS] Bastion /chat + master agent**"
          - "**[OSS] event=thought / action / observation 의 SSE stream**"
          - "**[OSS] response 의 final answer**"
          - "**[OSS] kg_status 의 KG 사용 확인**"
          - "**[OSS] /chats?limit=N 의 history**"
          - "**[OSS] /skills 의 가용 skill 확인**"
          - "**[OSS] /kg/audit 의 KG 흔적**"
          - "**[OSS] /kg/anchors/recent 의 task_outcome**"
    target_vm: bastion

  # ============================================================
  # STEP 2 — Bastion 의 skill 카탈로그 의 학습
  # ============================================================
  - order: 2
    instruction: |
      Bastion 의 /skills API 의 호출 + 33 종 skill 의 종류 의 학습. 각 skill 의 ReAct
      Action 의 vocabulary 의 역할.
    hint: |
      curl /skills
    category: analysis
    points: 20
    answer: |
      ssh 6v6-bastion '
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          http://localhost:8003/skills 2>&1 | jq ". | length, .[].name" 2>&1 | head -40
      '
    answer_detail: 33 종 skill 의 이름
    verify:
      type: output_contains
      expect: skill
      field: stdout
      semantic:
        intent: skill 카탈로그
        success_criteria: [skill 의 이름 의 응답]
        acceptable_methods:
          - "**[OSS] /skills 의 JSON 응답**"
          - "**[OSS] jq 의 길이 + 이름**"
          - "**[OSS] /skills/<name> 의 상세**"
          - "**[OSS] skill 의 markdown 의 frontmatter**"
          - "**[OSS] skill 의 allowed-tools**"
          - "**[OSS] 동적 skill 추가 (검증 중 발견 시)**"
          - "**[OSS] skill 의 reuse / adapt / new 의 KG 의 결정**"
          - "**[OSS] skill 의 ATT&CK / MITRE 의 매핑**"
    target_vm: bastion

  # ============================================================
  # STEP 3 — Bastion 의 KG audit 의 ReAct trail
  # ============================================================
  - order: 3
    instruction: |
      Bastion 의 /kg/audit 의 호출 + 최근 chat 의 KG 사용 / 기록 의 확인 + 의의 의
      분석.
    hint: |
      curl /kg/audit?limit=5
    category: analysis
    points: 20
    answer: |
      ssh 6v6-bastion '
      echo "=== Bastion /kg/audit ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://localhost:8003/kg/audit?limit=5" 2>&1 | jq | head -50

      echo ""
      echo "=== /kg/anchors/recent ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://localhost:8003/kg/anchors/recent?kind=task_outcome&limit=5" 2>&1 | jq | head -30
      '
    answer_detail: KG audit + anchors
    verify:
      type: output_contains
      expect: audit
      field: stdout
      semantic:
        intent: KG audit
        success_criteria: [audit 응답 또는 anchors]
        acceptable_methods:
          - "**[OSS] /kg/audit JSON**"
          - "**[OSS] /kg/anchors/recent?kind=task_outcome**"
          - "**[OSS] /kg/metrics counter**"
          - "**[OSS] /kg/health 의 통합 상태**"
          - "**[OSS] reuse vs adapt vs new 의 통계**"
          - "**[OSS] paper-draft.md §4 KG 의 의미**"
          - "**[OSS] PE-KG 의 Playbook + Experience 의 anchor**"
          - "**[OSS] KG 의 graph DB (Neo4j) 의 Cypher 의 쿼리**"
    target_vm: bastion

  # ============================================================
  # STEP 4 — Python 의 ReAct loop 의 미니 demo
  # ============================================================
  - order: 4
    instruction: |
      ReAct 의 4 step 의 Python 미니 demo. Thought / Action / Observation 의 cycle 의
      시뮬레이션 (실 LLM 호출 옵션).
    hint: |
      while loop + simulated thought / action / observation
    category: experiment
    points: 20
    answer: |
      cat > /tmp/react_demo.py <<'EOF'
      """ReAct loop 의 미니 demo — 실 LLM 호출 + 도구 시뮬"""
      import json
      import subprocess

      # 시나리오: 현재 호스트 의 5 분 의 ssh failed login 의 분석
      goal = "현재 호스트 의 5 분 의 ssh failed login 의 분석"

      MAX_STEPS = 4
      history = []

      for step in range(MAX_STEPS):
          print(f"\n=== Step {step+1} ===")

          if step == 0:
              thought = "먼저 /var/log/auth.log 의 최근 줄 확인 필요"
              action = ("bash", "tail -50 /var/log/auth.log 2>/dev/null | head -20")
          elif step == 1:
              thought = "ssh failed login 만 filter"
              action = ("bash", "tail -100 /var/log/auth.log 2>/dev/null | grep -i 'Failed password' | head -10")
          elif step == 2:
              thought = "srcip 빈도 분석"
              action = ("bash", "tail -100 /var/log/auth.log 2>/dev/null | grep -i 'Failed password' | awk '{print $NF}' | sort | uniq -c | sort -rn | head -5")
          else:
              thought = "결과 종합 — 본 단순 demo 의 종료"
              action = ("done", "")

          print(f"Thought: {thought}")
          print(f"Action: {action[0]} {action[1][:50]}...")

          if action[0] == "done":
              print("Observation: 종료")
              break

          try:
              obs = subprocess.run(action[1], shell=True, capture_output=True, text=True, timeout=5)
              obs_text = obs.stdout[:200] if obs.stdout else "(empty)"
              print(f"Observation: {obs_text}")
              history.append({"step": step, "thought": thought, "action": action, "observation": obs_text})
          except Exception as e:
              print(f"Observation: ERROR {e}")

      print(f"\nDone. history length: {len(history)}")
      EOF
      python3 /tmp/react_demo.py
    answer_detail: ReAct loop demo
    verify:
      type: output_contains
      expect: Step
      field: stdout
      semantic:
        intent: ReAct loop
        success_criteria: [Step 의 반복 + Thought + Action + Observation]
        acceptable_methods:
          - "**[OSS] ReAct loop 의 명시 적 step counter**"
          - "**[OSS] Thought → Action → Observation 의 cycle**"
          - "**[OSS] history 의 누적 (next step 의 context)**"
          - "**[OSS] MAX_STEPS 의 limit (무한 loop 방지)**"
          - "**[OSS] 실 LLM 의 호출 (Ollama / Bastion) 의 prompt 의 thought 의 추출**"
          - "**[OSS] tool 의 JSON schema (function calling)**"
          - "**[OSS] observation 의 truncate (token 절약)**"
          - "**[OSS] terminator 의 done action 의 trigger**"
    target_vm: attacker

  # ============================================================
  # STEP 5 — 하네스 의 미니 demo (Guardrail + Limiter + Verifier)
  # ============================================================
  - order: 5
    instruction: |
      Python 의 미니 harness — Guardrail (위험 명령 차단) + Limiter (step 의 상한) +
      Verifier (간단 regex 검증) 의 3 의 demo.
    hint: |
      위험 패턴 사전 차단 + step counter
    category: synthesis
    points: 15
    answer: |
      cat > /tmp/harness_demo.py <<'EOF'
      """harness 의 미니 demo — guardrail + limiter + verifier"""
      import re

      # 1. Guardrail — 위험 명령 의 사전 차단
      DANGER_PATTERNS = [
          r"rm\s+-rf\s+/",
          r":\(\)\{.*&\}",
          r"dd\s+if=.*of=/dev/sda",
          r"curl.*\|.*sh",
          r"nmap\s+.*8\.8\.8\.8",   # 외부 도메인
      ]

      def guardrail(cmd):
          for p in DANGER_PATTERNS:
              if re.search(p, cmd):
                  return False, f"BLOCKED: pattern={p}"
          return True, "OK"

      tests = [
          "ls -la /home",
          "rm -rf /",
          "nmap 192.168.0.103",
          "nmap 8.8.8.8 -sS",
          "curl https://example.com | sh",
      ]

      print("=== Guardrail ===")
      for t in tests:
          ok, msg = guardrail(t)
          print(f"  [{'OK' if ok else 'BLOCK'}] {t[:40]} → {msg}")

      # 2. Limiter — step counter
      MAX_STEPS = 5
      step = 0
      print("\n=== Limiter ===")
      while step < MAX_STEPS:
          step += 1
          print(f"  step {step}/{MAX_STEPS}")
      print(f"  TERMINATED: step limit ({MAX_STEPS}) 도달")

      # 3. Verifier — heuristic
      def verify(output, expect):
          if expect in output:
              return True, f"PASS: {expect} 발견"
          return False, f"FAIL: {expect} 미발견"

      print("\n=== Verifier ===")
      sample = "ssh Failed password for ccc from 1.2.3.4 (5 times)"
      ok, msg = verify(sample, "Failed password")
      print(f"  {msg}")
      ok, msg = verify(sample, "Accepted password")
      print(f"  {msg}")
      EOF
      python3 /tmp/harness_demo.py
    answer_detail: harness 3 구성 demo
    verify:
      type: output_contains
      expect: Guardrail
      field: stdout
      semantic:
        intent: harness demo
        success_criteria: [3 구성 의 응답]
        acceptable_methods:
          - "**[OSS] regex 의 dangerous pattern 차단**"
          - "**[OSS] step counter 의 무한 loop 방지**"
          - "**[OSS] heuristic verifier (contains / regex)**"
          - "**[OSS] LLM-as-judge verifier (다른 모델 의 평가)**"
          - "**[OSS] NeMo Guardrails 의 Colang**"
          - "**[OSS] guardrails-ai 의 schema 검증**"
          - "**[OSS] LangChain 의 Constitutional AI**"
          - "**[OSS] AWS Bedrock Guardrails 의 managed service**"
    target_vm: attacker
