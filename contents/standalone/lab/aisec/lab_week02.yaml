lab_id: standalone-aisec-week02
title: LLM — Ollama 로컬 / 파인튜닝 / RAG + KG
version: standalone-non-ai
course: aisec
week: 2
description: |
  W01 의 AI 모델 위계 위에, LLM 의 운영 학습. Ollama 의 로컬 모델 서빙 + Modelfile
  사용자 정의 + 파인튜닝 (QLoRA) 개념 + RAG (Retrieval Augmented Generation) +
  지식그래프 (KG) 의 4 핵심 기술 입문.
difficulty: medium
duration_minutes: 180
prerequisites:
  - W01 통과
  - Ollama 의 학생 PC 설치 (옵션)
  - Python 3 가용 (RAG 실습)
objectives:
  - Ollama 의 모델 list + 호출
  - Modelfile 의 사용자 정의 모델 생성
  - 3 모델의 응답 비교
  - Bastion 의 KG / chat 활용
  - RAG 미니 예시 실행
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — Ollama 설치 + 모델 list (학생 PC)
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION — Ollama 설치 + gemma3:4b 모델 pull + list 확인 (CURRICULUM 원칙 #8)

      본인 학생 PC 에 Ollama 설치 + gemma3:4b 모델 pull + 가시화. 6v6 의 외부 Ollama
      (0.109:11434) 가용 시 그것 사용 가능. **도구 부재 시 *설치 부터* 직접 진행**
      (CURRICULUM 원칙 #8).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Ollama** = 로컬 LLM serving 의 표준 도구. Mac/Linux/Windows 지원
      - **gemma3:4b** = Google 의 open-weight LLM. 4B param, 가벼움, GPU 없이 도 CPU 가능
      - **로컬 vs 6v6 외부** = 학습 환경 의 자원 따라 선택. 학생 PC RAM 8GB+ 면 로컬 권장
      - **CURRICULUM 원칙 #8** = 도구 부재 → 설치 부터 (사용자 결정 2026-05-16)

      ## 💻 실행 명령

      ```bash
      # 1) Ollama 설치 (학생 PC, Linux/Mac)
      curl -fsSL https://ollama.com/install.sh | sh

      # 또는 (Mac brew)
      brew install ollama

      # 또는 (Windows) — https://ollama.com/download

      # 2) 설치 확인
      ollama --version

      # 3) gemma3:4b pull (약 2.5GB)
      ollama pull gemma3:4b

      # 4) list 가시화
      ollama list

      # 5) (대안) 6v6 외부 Ollama 사용
      curl -s http://192.168.0.109:11434/api/tags | python3 -m json.tool | head -20
      ```

      ## 📋 확인 사항

      - `ollama --version` 응답 (또는 6v6 외부 사용 시 curl 200)
      - `gemma3:4b` 모델 list 표시 (size, digest, modified)
      - 6v6 외부 사용 시 — 1 종 이상 모델

      ## 💡 왜 이걸 하는가?

      AI 보안 학습 의 *기반 도구* — Ollama. 본인 환경 에 모델 *직접* 가져야 다음
      step 의 *3 모델 비교* + W08 의 *unsafe 모델 차이* 등 hands-on 가능.

      ## 🔍 결과 해석

      - **정상**: ollama --version + gemma3:4b 모델 list
      - **install.sh 실패**: 권한 부족 — sudo + 재시도
      - **pull timeout**: 외부 망 차단 — 대안 (6v6 외부) 사용
      - **disk full**: 3GB+ 여유 필요

      ## 비정상 시 대응

      - **Mac M1 Apple Silicon** — Ollama 가 Metal acceleration 자동 사용 (CPU 보다
        10x 빠름)
      - **GPU 없는 노트북** — CPU 만 으로 동작 (gemma3:4b 는 약 5-10 토큰/초)
      - **6v6 외부 Ollama 도 응답 없음** — 인프라 결함 보고 (P22 backlog)
    hint: |
      Ollama 설치 → gemma3:4b pull → list. CURRICULUM #8 = 도구 부재 시 설치 부터.
    category: setup
    points: 15
    answer: |
      # 학생 PC: ollama --version + ollama list. bastion 에 ollama CLI 없으면 REST API
      # (curl /api/version + /api/tags) 로 대체. OLLAMA_HOST=http://192.168.0.109:11434
      command -v ollama && ollama --version || curl -s http://192.168.0.109:11434/api/version
      echo "--- ollama 모델 list ---"
      command -v ollama && ollama list | head || curl -s http://192.168.0.109:11434/api/tags | head -c 400
    answer_detail: Ollama 설치 + 모델 list
    verify:
      type: output_contains
      expect: version
      field: stdout
      semantic:
        intent: Ollama 의 설치 + 모델 가시화
        success_criteria:
          - ollama version
          - 모델 list
        acceptable_methods:
          - "**[OSS] ollama --version + ollama list** — 표준"
          - "**[OSS] systemd 의 ollama.service** — 자동 시작"
          - "**[OSS] ollama serve &** — manual background"
          - "**[OSS] /etc/systemd/system/ollama.service** — 시스템 통합"
          - "**[OSS] curl 192.168.0.109:11434/api/tags** — REST API"
          - "**[OSS] ollama pull <model>** — 다운로드"
          - "**[OSS] ollama show <model>** — 모델 정보"
          - "**[OSS] ~/.ollama/models 의 디렉토리** — 저장 위치"
        negative_signs:
          - ollama 미설치
    target_vm: bastion

  # ============================================================
  # STEP 2 — Ollama 의 첫 호출 (사이버보안 prompt)
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION — Ollama API 첫 호출 + 사이버보안 prompt (SSH brute log 분석)

      gemma3:4b 의 `/api/generate` 첫 호출. SSH 인증 실패 3 회 의 log 를 LLM 에
      전달 → 한국어 분석 응답 받기. *프롬프트 → 응답* 의 LLM 사용 기본 패턴 학습.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **/api/generate** = 단일 prompt → 응답 (비-streaming). chat history X
      - **/api/chat** = multi-turn (system + user + assistant)
      - **temperature** = 0 (결정성, 같은 답) ~ 1 (창의성, 매번 다른 답). 0.3 = 보수
      - **num_ctx** = context window 크기. 4096 = 약 4k 토큰. 긴 log 면 8192+
      - **stream: false** = 한 번에 응답. true = 토큰 별 스트림

      ## 💻 실행 명령

      ```bash
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "다음 보안 로그를 한국어로 분석해줘:\n[2026-05-12 14:32:18] sshd[1234]: Failed password for ccc from 1.2.3.4 port 22\n[2026-05-12 14:32:25] sshd[1235]: Failed password for ccc from 1.2.3.4 port 22\n[2026-05-12 14:32:32] sshd[1236]: Failed password for ccc from 1.2.3.4 port 22",
        "stream": false,
        "options": {"temperature": 0.3, "num_ctx": 4096}
      }' 2>&1 | head -50
      ```

      ## 📋 확인 사항

      - JSON 응답 의 `response` 필드 에 한국어 분석 텍스트
      - 응답 에 SSH / sshd / 1.2.3.4 / brute force 등 키워드 등장
      - 응답 시간 3-10 초 (gemma3:4b 의 일반 latency)

      ## 💡 왜 이걸 하는가?

      LLM 사용 의 *가장 기본* 흐름 — prompt → 응답. 본 step 의 SSH log 분석 이
      W11 (자율보안) 의 *real-time alert 분석* 의 기반.

      ## 🔍 결과 해석

      - **정상**: response 필드 에 한국어 분석 + 3 SSH 시도 인지 + brute force 추정
      - **응답 없음 (curl error)**: Ollama 서버 미가동 또는 IP 잘못 — `curl
        http://192.168.0.109:11434/` 확인
      - **응답 길이 < 100 자**: prompt 가 모호 — 명확화 (예: "분석" → "5W 분석")
      - **timeout > 30 초**: 모델 미pull 또는 cold start — 1 회 호출 후 재시도

      ## 비정상 시 대응

      - **GPU 부하** — 다른 chat 가 GPU 점유. 5 분 cooling 후 재시도 (GPU 발열 원칙)
      - **응답 영어 만** — system message 명시 (`/api/chat` 사용 권장)
      - **JSON parse error** — quote escape 확인 (특히 \n)
    hint: |
      /api/generate + prompt SSH log + temperature 0.3 + JSON parse.
    category: experiment
    points: 20
    answer: |
      # Ollama 의 API 호출 — 본인 환경 또는 6v6
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "다음 보안 로그를 한국어로 분석해줘:\n[2026-05-12 14:32:18] sshd[1234]: Failed password for ccc from 1.2.3.4 port 22\n[2026-05-12 14:32:25] sshd[1235]: Failed password for ccc from 1.2.3.4 port 22\n[2026-05-12 14:32:32] sshd[1236]: Failed password for ccc from 1.2.3.4 port 22",
        "stream": false,
        "options": {
          "temperature": 0.3,
          "num_ctx": 4096
        }
      }' 2>&1 | head -50
    answer_detail: Ollama 의 응답 + 분석
    verify:
      type: output_contains
      expect: SSH
      field: stdout
      semantic:
        intent: |
          Ollama 의 LLM 호출. 사이버보안 도메인 prompt 의 응답 quality 평가.
          모델이 sshd / brute force / 1.2.3.4 등 키워드 식별 시 정상.
        success_criteria:
          - SSH 또는 sshd 키워드
          - 분석 응답
        acceptable_methods:
          - "**[OSS] /api/generate** — 비-streaming"
          - "**[OSS] /api/chat** — 멀티 turn"
          - "**[OSS] /v1/chat/completions** — OpenAI 호환"
          - "**[OSS] options.temperature 0-1** — 결정성 vs 창의성"
          - "**[OSS] options.num_ctx** — context window"
          - "**[OSS] system message** — 역할 지정"
          - "**[OSS] keep_alive** — 모델 메모리 유지 시간"
          - "**[OSS] streaming** — token by token"
        negative_signs:
          - 응답 없음
          - 오류
    target_vm: bastion

  # ============================================================
  # STEP 3 — Modelfile 의 사용자 정의 모델
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION — Modelfile 작성 + ccc-secsec:4b 사용자 정의 모델 생성 + 호출

      Ollama 의 *사용자 정의 모델* 메커니즘 — Modelfile. base 모델 (gemma3:4b) 위에
      *system prompt + parameter* 를 묶어 *새 모델* 생성. 본 step 에서 ccc-secsec:4b
      (한국어 보안 전문) 생성 + 효과 검증.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Modelfile** = Dockerfile 의 LLM 버전. base 모델 + system + parameter + template
      - **FROM** = base 모델 (gemma3:4b)
      - **SYSTEM** = 모든 호출 에 자동 prefix 되는 instruction (한국어 강제 / 도메인 등)
      - **PARAMETER** = temperature / top_p / num_ctx 등 default 값
      - **ollama create** = Modelfile 로 *새 모델* 등록 (base 모델 의 weight 변경 X)

      ## 💻 실행 명령 + 검증

      ```bash
      cat > /tmp/Modelfile.secsec <<'EOF'
      FROM gemma3:4b

      SYSTEM """
      당신은 사이버보안 전문 AI 어시스턴트입니다.
      한국어로 응답합니다.
      응답은 사실 위주 + 운영 권장 포함 + ISMS-P / NIST CSF 매핑 (관련 시).
      """

      PARAMETER temperature 0.3
      PARAMETER top_p 0.9
      PARAMETER num_ctx 8192
      EOF

      # 모델 생성
      ollama create ccc-secsec:4b -f /tmp/Modelfile.secsec
      ollama list | grep ccc-secsec

      # 호출 — system prompt 효과 확인
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "ccc-secsec:4b",
        "prompt": "본 환경 의 정상 SSH 시도 와 brute force 시도 의 차이를 한국어로",
        "stream": false
      }' | jq -r .response | head -20
      ```

      ## 📋 확인 사항

      - `ollama create` 성공 (success 출력)
      - `ollama list` 에 ccc-secsec:4b 표시
      - 호출 응답 *한국어* (system prompt 효과)
      - 응답 에 ISMS-P / NIST CSF / 운영 권장 등 키워드

      ## 💡 왜 이걸 하는가?

      Modelfile 이 *조직 별 사용자 정의 LLM* 의 가장 단순 한 형태. *학습 weight 변경
      없이* system prompt + parameter 만 으로 *도메인 특화 모델* 생성. 본 step 의
      ccc-secsec:4b 가 다음 step 의 *비교 baseline*.

      ## 🔍 결과 해석

      - **정상**: 모델 생성 + 한국어 응답 + 보안 키워드
      - **영어 응답**: system prompt 무시 — Modelfile 의 SYSTEM 재확인
      - **모델 생성 실패**: FROM 모델 미pull — `ollama pull gemma3:4b` 후 재시도

      ## 비정상 시 대응

      - **Modelfile syntax error** — FROM / SYSTEM / PARAMETER 의 *대문자* 필수
      - **disk full** — Modelfile 모델 도 layer 저장 (수십 MB) — 디스크 여유 확인
    hint: |
      Modelfile (FROM + SYSTEM + PARAMETER) + ollama create + 한국어 응답 검증.
    category: configuration
    points: 25
    answer: |
      cat > /tmp/Modelfile.secsec <<'EOF'
      FROM gemma3:4b

      SYSTEM """
      당신은 사이버보안 전문 AI 어시스턴트입니다.
      한국어로 응답합니다.
      응답은 사실 위주 + 운영 권장 포함 + ISMS-P / NIST CSF 매핑 (관련 시).
      """

      PARAMETER temperature 0.3
      PARAMETER top_p 0.9
      PARAMETER num_ctx 8192
      EOF

      # ollama CLI 가 있으면 표준 create + list. 없으면 REST API /api/create 로 대체.
      if command -v ollama; then
        ollama create ccc-secsec:4b -f /tmp/Modelfile.secsec
        ollama list | grep ccc-secsec
      else
        # REST API: /api/create (modelfile 본문 전달)
        MF=$(cat /tmp/Modelfile.secsec | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
        curl -s -X POST http://192.168.0.109:11434/api/create \
          -d "{\"model\":\"ccc-secsec:4b\",\"modelfile\":$MF}" 2>&1 | head -c 200
        echo
        echo "--- ccc-secsec list ---"
        curl -s http://192.168.0.109:11434/api/tags | python3 -c 'import sys,json; [print(m["name"]) for m in json.load(sys.stdin)["models"] if "ccc-secsec" in m["name"]]'
      fi
      echo "---"
      # 호출
      curl -s http://192.168.0.109:11434/api/generate -d '{
        "model": "ccc-secsec:4b",
        "prompt": "본 환경 의 정상 SSH 시도 와 brute force 시도 의 차이를 한국어로",
        "stream": false
      }' | python3 -c 'import sys,json; print(json.load(sys.stdin).get("response","")[:300])'
    answer_detail: Modelfile + 사용자 정의 모델 + 응답
    verify:
      type: output_contains
      expect: ccc-secsec
      field: stdout
      semantic:
        intent: |
          Modelfile 작성 + ollama create + 사용자 정의 모델 호출. System prompt
          의 효과 (한국어 + 운영 권장) 검증.
        success_criteria:
          - 모델 생성
          - System prompt 효과
        acceptable_methods:
          - "**[OSS] Modelfile syntax** — FROM / SYSTEM / PARAMETER"
          - "**[OSS] TEMPLATE** — 응답 format"
          - "**[OSS] LICENSE** — 모델 의 license"
          - "**[OSS] MESSAGE** — 사전 messages (chat history)"
          - "**[OSS] ADAPTER** — LoRA 적용"
          - "**[OSS] ollama create + 검증**"
          - "**[OSS] ollama show <name>** — 메타"
          - "**[OSS] ollama push** — 사용자 정의 모델 공유 (registry)"
        negative_signs:
          - 모델 생성 실패
    target_vm: bastion

  # ============================================================
  # STEP 4 — Bastion 의 KG + chat
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION — Bastion API 의 KG 통합 가시화 + chat 호출 (PE-KG 모델 의의)

      Bastion 의 `/kg/metrics` (KG counter) + `/chat` (PE-KG 모델 의의 질문) 의 2
      endpoint 호출. CCC 의 *실 운영 LLM 에이전트* 의 KG 통합 가시화 + chat 응답
      품질 확인.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **PE-KG** = Playbook + Experience + Knowledge Graph. Bastion 의 핵심 모델
      - **/kg/metrics** = KG 호출 counter snapshot (call count / hit rate / anchor 수)
      - **/chat** = Bastion 의 ReAct loop 호출. master agent (Claude) / manager
        (gpt-oss:120b) 선택
      - **master agent** = Claude Code 가 daily 작업 시 사용 (콘텐츠 제작 + 분석)

      ## 💻 실행 명령

      ```bash
      echo "=== Bastion KG metrics ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          http://localhost:9100/kg/metrics 2>&1 | jq | head -20

      echo ""
      echo "=== Bastion chat (5-10 분 대기) ==="
      curl -s -X POST \
          -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"Bastion 의 PE-KG 모델 (Playbook + Experience + Knowledge Graph) 의의를 한국어로 알려주세요.\", \"agent\":\"master\"}" \
          http://localhost:9100/chat 2>&1 | head -80
      ```

      ## 📋 확인 사항

      - KG metrics 응답 — call_count / hit_count / anchor_count 등 counter
      - chat 응답 5-10 분 후 — PE-KG / Playbook / Experience / KG 키워드 등장
      - kg_status event 포함 (CCC CLAUDE.md 원칙)
      - 한국어 응답

      ## 💡 왜 이걸 하는가?

      Bastion 의 *실 운영 LLM 에이전트* 의 hands-on. lecture 의 *PE-KG 이론* → *실
      API 호출* → 응답 품질 평가 의 3 단계 학습 흐름.

      ## 🔍 결과 해석

      - **정상**: metrics counter + chat 한국어 응답 + PE-KG 키워드
      - **chat 10 분 초과**: GPU 부하 (다른 chat 동시 실행) — cooling 후 재시도
      - **응답 영어**: prompt 가 영어 키워드 가득 → 한국어 강제 system message 추가

