  # ============================================================
  # STEP 5 — RAG 의 미니 Python 예
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION — RAG 4 단계 (Embed → Retrieve → Augment → Generate) 미니 Python
      demo

      RAG (Retrieval-Augmented Generation) 의 *4 단계 흐름* 을 Python 미니 코드 로
      구현. simple keyword similarity (real embedding 대체) 로 retrieve → LLM 호출.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **RAG** = LLM 의 *외부 지식 결합* 패턴. LLM 가 *모르는 정보* 를 corpus 에서
        검색 후 prompt 에 추가
      - **4 단계** = Embed (문서 → vector) → Retrieve (query 와 유사한 vector) →
        Augment (prompt + retrieved) → Generate (LLM 호출)
      - **simple keyword similarity** = 본 미니 demo 의 *embedding 대체*. 실 운영
        은 sentence-transformer / OpenAI ada / bge-m3 등
      - **W14 의 RAG 검증** = 본 step 의 *심화* — 변조 chunk 검출

      ## 💻 실행 명령

      ```bash
      cat > /tmp/rag_demo.py <<'PY'
      """RAG 미니 demo — keyword similarity 기반"""

      documents = [
          "SQL Injection 은 OWASP A03 의 대표 web vuln 이다.",
          "XSS 는 사용자 브라우저에서 임의 JS 실행을 가능하게 한다.",
          "CSRF 는 사용자가 의도하지 않은 요청을 발생시킨다.",
          "Wazuh 는 오픈소스 SIEM 이며 4.10 버전이 최신이다.",
          "Suricata 는 IDS / IPS 로 동작하며 ETOpen 룰셋이 표준이다.",
      ]

      query = "SQLi 의 정의"

      # 1. Embed (simple keyword set 으로 대체)
      def sim(doc, q):
          q_w = set(q.lower().split())
          d_w = set(doc.lower().split())
          return len(q_w & d_w) / (len(q_w) + 1)

      # 2. Retrieve (top-k = 2)
      scores = sorted([(d, sim(d, query)) for d in documents], key=lambda x: -x[1])
      top_k = scores[:2]

      # 3. Augment
      context = "\n".join([d for d, _ in top_k])
      prompt = f"다음 context 기반 으로 답: \n{context}\n\nQ: {query}\nA:"

      # 4. Generate (실 LLM 호출 시뮬 — print 만)
      print("=== RAG 4 단계 demo ===\n")
      print(f"1. Documents: {len(documents)}")
      print(f"2. Query: {query}")
      print(f"3. Retrieved top-2:")
      for d, s in top_k:
          print(f"   [score={s:.2f}] {d[:50]}...")
      print(f"\n4. Augmented prompt 의 첫 200 자:")
      print(f"   {prompt[:200]}...")
      PY
      python3 /tmp/rag_demo.py
      ```

      ## 📋 확인 사항

      - 4 단계 모두 출력 (Documents 5 / Query / Retrieved top-2 / Augmented prompt)
      - top-2 의 *첫 번째* 가 SQL Injection 관련 (sim score > 다른 문서)
      - Augmented prompt 가 retrieved context 포함

      ## 💡 왜 이걸 하는가?

      RAG 가 *LLM 의 한계 극복* 의 핵심 패턴. *모델 모르는 정보* → *corpus 검색* →
      *최신/정확 답*. 본 미니 demo 가 W14 의 RAG 검증 의 *기반*.

      ## 🔍 결과 해석

      - **정상**: 4 단계 출력 + top-2 SQL Injection 1 위
      - **top-2 의 1 위 가 SQL 아님**: keyword similarity 의 한계 — 실 운영 은
        embedding 사용
      - **Augmented prompt 빈 context**: documents 와 query 의 keyword 안 겹침

      ## 비정상 시 대응

      - **Python syntax error**: indent / quote escape 확인
      - **실 LLM 호출 추가** (옵션) — curl `$OLLAMA/api/generate` 로 prompt 전달
    hint: |
