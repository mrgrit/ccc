  # ============================================================
  # STEP 1 — Bastion chat 의 ReAct trace 의 가시화
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION — Bastion /chat 호출 + ReAct trace (thought/action/observation)
      가시화

      Bastion 의 *master agent* 는 ReAct (Reasoning + Acting) 의 구현체. /chat
      호출 → 응답 의 *thought + action + observation* trace 직접 관찰.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **ReAct** = Yao et al. 2022 의 표준 agent 패턴. LLM 이 *생각 → 행동 → 결과
        관찰 → 다음 생각* 의 loop
      - **thought** = LLM 의 *내부 추론* (다음 action 결정)
      - **action** = skill 호출 (예: `read_file` / `grep_log` / `query_kg`)
      - **observation** = action 의 *결과* (LLM 이 다음 thought 의 input 으로 사용)
      - **CoT vs ReAct** = CoT = 단순 추론, ReAct = 추론 + 도구 호출

      ## 💻 실행 명령

      위 answer 의 ssh + curl 명령 실행. 응답 의 ReAct trace 확인.

      ## 📋 확인 사항

      - 응답 stream 에 *thought* / *action* / *observation* 키워드
      - skill_used 필드 의 호출 skill list
      - 응답 5-10 분 latency (gpt-oss:120b)
      - kg_status event 포함

      ## 💡 왜 이걸 하는가?

      현대 LLM 에이전트 의 *표준 패턴*. ReAct trace 가시화 가 *agent 디버깅* + *학습
      신호* 의 핵심.

      ## 🔍 결과 해석

      - **정상**: thought + action + observation 의 3 키워드 + skill_used
      - **응답 단순 텍스트**: ReAct loop 미동작 — Manager 설정 확인
      - **timeout 10 분+**: GPU 부하

      ## 비정상 시 대응

      - **chat 응답 없음** — `/health` 의 kg.all_modules_loaded 확인
      - **stream parse 어려움** — `--no-buffer` curl option 또는 `jq` 사용
    hint: |
      Bastion /chat (master) → ReAct trace (thought/action/observation).
