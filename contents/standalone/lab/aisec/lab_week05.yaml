  - order: 5
    instruction: |
      ## 🎯 MISSION — Python 미니 harness (Guardrail + Limiter + Verifier) 3 demo

      LLM agent 의 *3 안전 메커니즘* — Guardrail (위험 명령 사전 차단) + Limiter
      (step 상한) + Verifier (결과 검증) 의 Python 미니 구현. *agent harness 의 표준
      pattern*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Guardrail** = LLM action 의 *사전 검증*. 위험 명령 패턴 매칭 → 차단
      - **Limiter** = *무한 loop 회피*. MAX_STEPS 도달 시 강제 종료
      - **Verifier** = *결과 정확성 검증*. expected output 매칭 → PASS/FAIL
      - **CCC Bastion** = 3 메커니즘 모두 구현 (skills + iteration limit + verify field)
    hint: |
      위험 패턴 사전 차단 + step counter
    category: synthesis
    points: 15
    answer: |
      cat > /tmp/harness_demo.py <<'EOF'
      """harness 의 미니 demo — guardrail + limiter + verifier"""
      import re

      # 1. Guardrail — 위험 명령 의 사전 차단
      DANGER_PATTERNS = [
          r"rm\s+-rf\s+/",
          r":\(\)\{.*&\}",
          r"dd\s+if=.*of=/dev/sda",
          r"curl.*\|.*sh",
          r"nmap\s+.*8\.8\.8\.8",   # 외부 도메인
      ]

      def guardrail(cmd):
          for p in DANGER_PATTERNS:
              if re.search(p, cmd):
                  return False, f"BLOCKED: pattern={p}"
          return True, "OK"

      tests = [
          "ls -la /home",
          "rm -rf /",
          "nmap 10.20.32.80",
          "nmap 8.8.8.8 -sS",
          "curl https://example.com | sh",
      ]

      print("=== Guardrail ===")
      for t in tests:
          ok, msg = guardrail(t)
          print(f"  [{'OK' if ok else 'BLOCK'}] {t[:40]} → {msg}")

      # 2. Limiter — step counter
      MAX_STEPS = 5
      step = 0
      print("\n=== Limiter ===")
      while step < MAX_STEPS:
          step += 1
          print(f"  step {step}/{MAX_STEPS}")
      print(f"  TERMINATED: step limit ({MAX_STEPS}) 도달")

      # 3. Verifier — heuristic
      def verify(output, expect):
          if expect in output:
              return True, f"PASS: {expect} 발견"
          return False, f"FAIL: {expect} 미발견"

      print("\n=== Verifier ===")
      sample = "ssh Failed password for ccc from 1.2.3.4 (5 times)"
      ok, msg = verify(sample, "Failed password")
      print(f"  {msg}")
      ok, msg = verify(sample, "Accepted password")
      print(f"  {msg}")
      EOF
      python3 /tmp/harness_demo.py
    answer_detail: harness 3 구성 demo
    verify:
      type: output_contains
      expect: Guardrail
      field: stdout
