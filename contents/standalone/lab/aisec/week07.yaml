lab_id: standalone-aisec-week07
title: AI 에이전트 (3) — Bastion 활용 보안 운영 / 취약점 / 모의해킹
version: standalone-non-ai
course: aisec
week: 7
description: |
  W05-W06 의 이론 / architecture 위에 Bastion 의 실 운영 의 3 case (alert triage /
  CVE 분석 / 모의해킹 보조) 의 통합 실습.
difficulty: hard
duration_minutes: 180
prerequisites:
  - W06 통과
  - Bastion API 가용
  - 6v6 인프라 의 alert 의 가용
objectives:
  - Bastion 의 alert triage 의 실 호출
  - Bastion 의 alert correlation 의 ATT&CK 매핑
  - Bastion 의 CVE 5 항목 의 응답
  - Bastion 의 정찰 step 의 권장
  - Bastion 의 보고서 의 자동 작성
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — alert triage 의 Bastion
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION — Bastion /chat 으로 실 Wazuh alert 의 5W + 위험도 + 권장 + ATT&CK
      분석

      Wazuh alerts.json 의 *실 alert* (또는 fallback gen) 을 Bastion `/chat` 에 전달
      → 5W + 위험도 + 권장 + ATT&CK 매핑 자동 응답. W04 step 1 의 *확장 응용*
      (ATT&CK 추가).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **alert triage 4 요소** = 5W (when/where/who/what/why) + 위험도 + 권장 + ATT&CK
      - **fallback alert** = alerts.json 0 byte 시 *학습 환경 fixed alert* 사용
      - **ATT&CK Technique** = TXXXX 형식 (예: T1110.001 Brute Force)
      - **W04 vs W07** = W04 = LLM 응답 quality 평가, W07 = Bastion master agent 사용
    hint: |
      실 alert (또는 fallback) → Bastion /chat → 5W + 위험도 + 권장 + ATT&CK.
    category: experiment
    points: 20
    answer: |
      ssh 6v6-bastion '
      ALERT=$(sudo tail -1 /var/ossec/logs/alerts/alerts.json 2>/dev/null | head -1)
      if [ -z "$ALERT" ]; then
          ALERT="{\"rule\":{\"id\":\"5710\",\"level\":5},\"agent\":{\"name\":\"web\"},\"data\":{\"srcip\":\"192.168.0.112\",\"srcuser\":\"admin\"},\"timestamp\":\"2026-05-12T14:30:00\"}"
      fi
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"다음 alert 의 분석 — 5W + 위험도 + 권장 + ATT&CK:\n$ALERT\", \"agent\":\"master\"}" \
          http://localhost:8003/chat 2>&1 | head -80
      '
    answer_detail: alert triage 응답
    verify:
      type: output_contains
      expect: response
      field: stdout
      semantic:
        intent: alert triage
        success_criteria: [5W 또는 위험도 또는 ATT&CK]
        acceptable_methods:
          - "**[OSS] Bastion /chat + master agent**"
          - "**[OSS] kg_status 의 응답 의 포함**"
          - "**[OSS] /kg/audit 의 흔적 의 확인**"
          - "**[OSS] /kg/anchors/recent 의 task_outcome**"
          - "**[OSS] 5W (when/where/who/what/why)**"
          - "**[OSS] 위험도 (low/medium/high/critical)**"
          - "**[OSS] ATT&CK Technique 매핑**"
          - "**[OSS] 권장 (즉시/단기/일반)**"
    target_vm: bastion

  # ============================================================
  # STEP 2 — alert correlation 의 ATT&CK chain
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION — 5 alert chain 분석 — ATT&CK kill chain 매핑

      5 alert 의 *시간 순 chain* (Suricata SQLi → ModSec → Wazuh brute → Wazuh
      Accept Root → auditd execve) 을 Bastion 에 전달 → *인과 + ATT&CK kill chain*
      매핑. *multi-stage* IR 의 핵심.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **alert chain** = 단일 alert 의 *시퀀스*. APT 의 표준 패턴
      - **kill chain** = ATT&CK 14 Tactic 시퀀스 (Recon → Initial Access → ... → Exfil)
      - **인과** = 시간 순 alert 가 *동일 actor* 의 *단계별* 시도 인지 추론
      - **W15 step 1** 와 연결 = multi-stage phishing 의 *기본 형태*
    hint: |
      가상 의 5 alert 의 chain 의 입력
    category: experiment
    points: 25
    answer: |
      ssh 6v6-bastion '
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"다음 5 alert 의 chain 분석 — 인과 + ATT&CK kill chain 의 매핑:\n- t0: Suricata ET WEB Joomla SQLi\n- t0+1m: ModSec 941100 (XSS / SQLi)\n- t0+2m: Wazuh 5710 (sshd Failed)\n- t0+5m: Wazuh 92053 (ssh Accepted Root)\n- t0+10m: auditd execve /tmp/x\n\nsrcip = 192.168.0.112\", \"agent\":\"master\"}" \
          http://localhost:8003/chat 2>&1 | head -100
      '
    answer_detail: ATT&CK chain 의 매핑
    verify:
      type: output_contains
      expect: T1
      field: stdout
      semantic:
        intent: ATT&CK 매핑
        success_criteria: [T1xxx Technique 또는 chain]
        acceptable_methods:
          - "**[OSS] T1190 Initial Access (Exploit Public-Facing)**"
          - "**[OSS] T1505.003 Web Shell (Persistence)**"
          - "**[OSS] T1110.001 Brute Force**"
          - "**[OSS] T1078 Valid Accounts**"
          - "**[OSS] T1059 Command Execution**"
          - "**[OSS] kill chain 의 순서 의 응답**"
          - "**[OSS] KG 의 PE 의 매칭**"
          - "**[OSS] STIX2 의 통합 (가능 시)**"
    target_vm: bastion

  # ============================================================
  # STEP 3 — CVE 의 Bastion 의 5 항목 의 분석
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION — 가상 CVE 의 Bastion 5 항목 분석 (핵심/CVSS/영향/PoC/패치)

      가상 CVE-2024-9999 + 6v6 자산 정보 (Apache 2.4.x web VM) Bastion 에 전달 →
      *5 항목 자동 분석*. W04 step 4 의 *Bastion 응용* (자산 매칭 추가).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **5 항목** = 핵심 vuln / CVSS 의의 / 영향 범위 / PoC 가용 / 권장 패치
      - **자산 매칭** = CVE 의 *affected product* vs 본인 자산
      - **W14 step 3** 와 연결 = NVD + 자산 매칭 의 *자동화*
      - **W04 vs W07 차이** = W04 = LLM 단독, W07 = Bastion master agent (KG 참조)
    hint: |
      CVE 의 상세 + 5 항목 요청
    category: analysis
    points: 20
    answer: |
      ssh 6v6-bastion '
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"다음 CVE 의 5 항목 분석 — 1.핵심 vuln 2.CVSS 의의 3.영향 범위 4.PoC 의 가용 5.권장 패치\n\nCVE-2024-9999 (가상)\ndescription: Apache HTTP Server 2.4.x 의 mod_rewrite 의 buffer overflow → RCE\nCVSS: 9.8 Critical\nattack vector: Network / no auth\n6v6 의 web VM 의 Apache 2.4.x 사용\", \"agent\":\"master\"}" \
          http://localhost:8003/chat 2>&1 | head -80
      '
    answer_detail: CVE 5 항목 응답
    verify:
      type: output_contains
      expect: CVSS
      field: stdout
      semantic:
        intent: CVE 의 5 항목
        success_criteria: [핵심 + CVSS + 영향 + PoC + 패치]
        acceptable_methods:
          - "**[OSS] CVE 의 description 의 분석**"
          - "**[OSS] CVSS 3.1 score 의 8 metric**"
          - "**[OSS] CWE 매핑**"
          - "**[OSS] EPSS 의 exploit prob**"
          - "**[OSS] 6v6 의 자산 매칭**"
          - "**[OSS] 패치 우선순위 (CVSS × EPSS × asset)**"
          - "**[OSS] mitigation 의 4 단계 (즉시/임시/공식/장기)**"
          - "**[OSS] vendor advisory 의 검색 (가능 시)**"
    target_vm: bastion

  # ============================================================
  # STEP 4 — 모의해킹 정찰 의 Bastion 의 권장
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION — 학습 환경 web (192.168.0.103) 모의해킹 정찰 step 권장 + ATT&CK
      매핑 (RoE 강제)

      Bastion master agent 에 학습 환경 web 의 *passive + active recon 6 step* 권장
      요청. RoE (학습 환경 만) 강제 + ATT&CK 매핑. W04 step 5 의 *Bastion 변형*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **passive recon** = 외부 망 조회 만 (whois / dns / OSINT) — target 트래픽 X
      - **active recon** = target 에 직접 트래픽 (nmap / whatweb / nikto)
      - **RoE 명시** = prompt 에 *학습 환경 만* + 외부 거부 강제
      - **W12 step 2** 와 연결 = 자율 Red Plan-Execute 의 *기본 형태*
    hint: |
      RoE 의 명시 + 5 step 권장
    category: experiment
    points: 20
    answer: |
      ssh 6v6-bastion '
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"본인 은 학습 환경 의 모의해킹 보조 AI. RoE: 학습 환경 192.168.0.0/24 만, 외부 의 거부.\n\ntarget: web 192.168.0.103 (학습 환경)\n\n다음 권장:\n1. passive recon 의 첫 3 step\n2. active recon 의 첫 3 step\n3. 각 의 ATT&CK Technique 매핑\n\n주의: 학습 환경 의 명령 만, 외부 시스템 의 거부.\", \"agent\":\"master\"}" \
          http://localhost:8003/chat 2>&1 | head -100
      '
    answer_detail: 정찰 권장 + ATT&CK
    verify:
      type: output_contains
      expect: nmap
      field: stdout
      semantic:
        intent: 정찰 step 권장
        success_criteria: [nmap 또는 정찰 도구 + ATT&CK]
        acceptable_methods:
          - "**[OSS] nmap -sV -p- 의 service 스캔**"
          - "**[OSS] whatweb 의 framework 식별**"
          - "**[OSS] nikto 의 web vuln 스캔**"
          - "**[OSS] dirb / gobuster 의 디렉토리 brute**"
          - "**[OSS] T1595 Active Scanning**"
          - "**[OSS] T1593 Search Open Websites**"
          - "**[OSS] T1190 Exploit Public-Facing**"
          - "**[OSS] RoE 의 명시 의 응답 + 외부 의 거부**"
    target_vm: bastion

  # ============================================================
  # STEP 5 — 모의해킹 보고서 의 LLM 보조
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION — 가상 침투 결과 의 Bastion 보고서 자동 작성 (4 섹션)

      JuiceShop 가상 침투 결과 (nmap + SQLi + sqlmap dump) Bastion 에 전달 →
      *4 섹션 보고서* (Executive / Findings / Remediation / ATT&CK Coverage) 자동
      작성. 분석가 의 *수동 보고서* → *LLM 1차 draft + 분석가 검토* 패턴.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **4 섹션** = PTES 표준 의 *축약 형*. 임원 (Executive) + 기술 (Findings +
        Remediation) + 운영 (Coverage)
      - **Executive Summary** = CISO/임원 의 *결정 정보* — high/medium/low + ROI
      - **Findings detail** = CWE / CVSS / reproduction step
      - **W15 step 1** 과 연결 = 보고서 패턴 의 *심화*
    hint: |
      4 섹션 의 보고서 의 LLM 작성
    category: synthesis
    points: 15
    answer: |
      ssh 6v6-bastion '
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d "{\"message\":\"다음 침투 결과 의 보고서 의 자동 작성 — 4 섹션 (Executive Summary / Detailed Findings / Remediation / ATT&CK Coverage):\n\ntarget: JuiceShop (juice.6v6.lab 학습 환경)\nRoE: 학습 환경 만\n\n결과:\n- nmap 의 22/80/443 의 open\n- /api/Users endpoint 의 SQLi (CWE-89)\n- sqlmap 의 dump 의 성공\n- impact: 사용자 DB 의 전체 노출\", \"agent\":\"master\"}" \
          http://localhost:8003/chat 2>&1 | head -120
      '
    answer_detail: 4 섹션 의 보고서
    verify:
      type: output_contains
      expect: Remediation
      field: stdout
      semantic:
        intent: 모의해킹 보고서
        success_criteria: [4 섹션 의 응답]
        acceptable_methods:
          - "**[OSS] Executive Summary 의 요약**"
          - "**[OSS] Detailed Findings 의 단계 별**"
          - "**[OSS] Remediation 의 step**"
          - "**[OSS] ATT&CK Coverage 의 매핑**"
          - "**[OSS] CWE 의 매핑**"
          - "**[OSS] OWASP Top 10 의 매핑**"
          - "**[OSS] severity 의 명시**"
          - "**[OSS] timeline 의 단계 별 응답**"
    target_vm: bastion

  # ============================================================
  # STEP 6 — R/B/P 종합 (Bastion dual-mode)
  # ============================================================
  - order: 6
    instruction: |
      ## 🎯 MISSION (R/B/P 종합) — Bastion Red mode + Blue mode 의 1 cycle

      Red mode = Bastion 의 모의해킹 plan 요청 / Blue mode = Bastion 의 alert
      triage / Purple = Bastion 의 보고서 통합.

      ## 💻
      ```bash
      # Red mode
      ssh 6v6-bastion 'curl -s -X POST http://192.168.0.103:8003/chat -H "X-API-Key: ccc-api-key-2026" -H "Content-Type: application/json" -d "{\"text\":\"juice.6v6.lab 의 정찰 plan 권장\"}" 2>&1 | head -5'

      # Blue mode (alert triage)
      ssh 6v6-bastion 'curl -s -X POST http://192.168.0.103:8003/chat -H "X-API-Key: ccc-api-key-2026" -H "Content-Type: application/json" -d "{\"text\":\"최근 ModSec alert triage\"}" 2>&1 | head -5'

      echo "Coverage: Bastion 의 dual-mode (Red plan + Blue triage) + Purple 보고서"
      ```

      ## 💡 왜
      Bastion 의 양면 활용. 운영 + 모의해킹 의 통합.
    hint: 'Bastion /chat 의 2 mode 요청'
    category: rbp_integration
    points: 4
    answer: |
      ssh 6v6-bastion 'curl -s -X POST http://192.168.0.103:8003/chat -H "X-API-Key: ccc-api-key-2026" -H "Content-Type: application/json" -d "{\"text\":\"juice 정찰 plan\"}" 2>&1 | head -5'
      ssh 6v6-bastion 'curl -s -X POST http://192.168.0.103:8003/chat -H "X-API-Key: ccc-api-key-2026" -H "Content-Type: application/json" -d "{\"text\":\"ModSec alert triage\"}" 2>&1 | head -5'
      echo "Coverage: Bastion dual-mode"
    answer_detail: Bastion dual R/B/P
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: Bastion dual-mode R/B/P
        success_criteria: [Red mode, Blue mode, Coverage]
        acceptable_methods: ["**[OSS] Bastion /chat dual**"]
    target_vm: bastion
