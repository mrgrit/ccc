  # ============================================================
  - order: 4
    instruction: |
      rule + LLM 의 통합 의 hybrid 의사결정 의 미니 demo — alert 의 분류 의 우선 rule
      만, 의 모호 한 경우 LLM 의 호출.
    hint: |
      rule 의 명확 + LLM 의 모호
    category: experiment
    points: 20
    answer: |
      cat > /tmp/hybrid_demo.py <<'EOF'
      """Hybrid 의사결정 의 미니 demo — rule + LLM"""
      import json
      import subprocess

      def rule_classify(alert):
          # 명확 rule
          if alert.get("rule_id") == 5710 and alert.get("level", 0) >= 10:
              return "BLOCK", "rule-explicit"
          if alert.get("srcip", "").startswith("192.168.0.112"):
              return "MONITOR", "rule-learning-env"
          # 모호 — LLM 호출
          return None, "ambiguous"

      def llm_classify(alert):
          prompt = f"다음 alert 의 한국어 분류 (BLOCK/MONITOR/IGNORE): {json.dumps(alert, ensure_ascii=False)[:300]}"
          try:
              result = subprocess.run(
                  ["curl", "-s", "-m", "10", "http://192.168.0.109:11434/api/generate",
                   "-d", json.dumps({"model":"gemma3:4b","prompt":prompt,"stream":False,"options":{"temperature":0.1,"num_predict":50}})],
                  capture_output=True, text=True, timeout=15
              )
              return "LLM-decided", result.stdout[:100]
          except:
              return "DEFAULT-BLOCK", "llm-error-fail-safe"

      alerts = [
          {"rule_id": 5710, "level": 12, "srcip": "1.2.3.4"},
          {"rule_id": 5710, "level": 5, "srcip": "192.168.0.112"},
          {"rule_id": 999999, "level": 7, "srcip": "203.0.113.50"},
      ]

      for a in alerts:
          decision, reason = rule_classify(a)
          if decision is None:
              decision, reason = llm_classify(a)
          print(f"alert={a} → decision={decision} reason={reason[:60]}")
      EOF
      python3 /tmp/hybrid_demo.py 2>&1 | head -20
    answer_detail: hybrid 의사결정
    verify:
