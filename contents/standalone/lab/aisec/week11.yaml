      """Hybrid 의사결정 — rule + LLM"""
      import json
      import subprocess

      OLLAMA = "http://192.168.0.109:11434"
      MODEL = "gemma3:4b"

      # 명확 rule (시스템 별 의도)
      def rule_classify(alert):
          # rule 1: 학습 환경 의 attacker VM 은 항상 monitor
          if alert.get("srcip", "").startswith("192.168.0.112"):
              return "MONITOR", "rule-attacker-vm"
          # rule 2: level 12+ 의 즉시 차단
          if alert.get("level", 0) >= 12:
              return "BLOCK", "rule-high-level"
          # rule 3: 명확한 SQLi 의 ModSec 매치
          if alert.get("rule_id") == 941100:
              return "BLOCK", "rule-modsec-sqli"
          # 모호 — LLM 호출
          return None, "ambiguous"

      def llm_classify(alert):
          prompt = f"""다음 alert 의 분류 (BLOCK/MONITOR/IGNORE 의 1 단어):

alert: {json.dumps(alert, ensure_ascii=False)[:400]}

분류:"""
          cmd = ["curl","-s","-m","20",f"{OLLAMA}/api/generate",
                 "-d",json.dumps({"model":MODEL,"prompt":prompt,"stream":False,
                                  "options":{"num_predict":30,"temperature":0.1}})]
          try:
              r = subprocess.run(cmd, capture_output=True, text=True, timeout=25)
              resp = json.loads(r.stdout).get("response","").strip()
              for kw in ["BLOCK","MONITOR","IGNORE"]:
                  if kw in resp.upper():
                      return kw, "llm-decided"
              return "BLOCK", "llm-unclear-fail-safe"
          except:
              return "BLOCK", "llm-error-fail-safe"

      alerts = [
          {"rule_id": 5710, "level": 12, "srcip": "1.2.3.4"},
          {"rule_id": 941100, "level": 5, "srcip": "192.168.0.50"},
          {"rule_id": 5710, "level": 5, "srcip": "192.168.0.112"},
          {"rule_id": 999999, "level": 7, "srcip": "203.0.113.50"},
          {"rule_id": 12345, "level": 3, "srcip": "10.0.0.5"},
      ]

      print("=== Hybrid 의사결정 ===\n")
      print(f"{'STATUS':<10} {'REASON':<25} ALERT")
      print("-" * 90)
      for a in alerts:
          decision, reason = rule_classify(a)
          if decision is None:
              decision, reason = llm_classify(a)
          print(f"{decision:<10} {reason[:24]:<25} {json.dumps(a)[:50]}")

      print("\n=== Hybrid 의 운영 의의 ===")
      print("- 명확 rule 의 우선 (즉시 의사결정, GPU 사용 X)")
      print("- 모호 한 경우 의 LLM fallback")
      print("- LLM timeout / error 의 fail-safe BLOCK")
      print("- 모든 의사결정 의 KG anchor 의 기록")
      PYEOF
      python3 /tmp/hybrid_decision.py 2>&1 | head -25
