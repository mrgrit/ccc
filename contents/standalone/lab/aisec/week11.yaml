  # ============================================================
  # STEP 5 — action 6 분류 의 6v6 매핑 + approval_mode 가시화
  # ============================================================
  - order: 5
    instruction: |
      자율 action 6 분류 (observe / notify / prepare / mitigate / reconfigure /
      destroy) 의 6v6 실 명령 매핑 + Bastion approval_mode 의 권한 위계 가시화.
    hint: |
      각 분류 의 실 명령 작성
    category: synthesis
    points: 15
    answer: |
      cat <<'EOF'
      === 자율 action 6 분류 의 6v6 매핑 ===

      1. observe (자유 허용) — 위험 낮음
         - tail -f /var/ossec/logs/alerts/alerts.json
         - curl -H "X-API-Key: ..." http://192.168.0.103:8003/kg/audit
         - docker stats --no-stream

      2. notify (자유 허용) — 위험 낮음
         - mail -s "[ALERT] ..." admin@example.com
         - curl -X POST https://hooks.slack.com/services/... (학습 환경 만)
         - Wazuh 의 alert 의 syslog 자동 전송

      3. prepare (가시화 만) — 위험 낮음
         - playbook 의 가시화 (실 적용 X)
         - Suricata rule 의 dry-run (suricata --engine-analysis)
         - iptables -nL (조회 만)

      4. mitigate (사람 confirm) — 위험 중간
         - iptables -A INPUT -s SRC -j DROP (timeout 600s)
         - ModSec 의 rule 의 활성
         - Wazuh active-response 의 호출

      5. reconfigure (다중 confirm) — 위험 높음
         - nginx config 의 변경 + reload
         - Suricata rule set 의 hot reload
         - Bastion 의 config 변경

      6. destroy (항상 명시 적 confirm) — 위험 매우 높음
         - DB row 의 삭제
         - container 의 docker rm
         - log 의 truncate
         - filesystem 의 wipe

      === Bastion approval_mode 의 위계 ===

      Mode 1: normal (default)
        max_level = mitigate
        허용: observe, notify, prepare, mitigate
        거부: reconfigure, destroy

      Mode 2: danger_danger
        max_level = reconfigure
        허용: 위 + reconfigure (다중 confirm)
        거부: destroy

      Mode 3: danger_danger_danger
        max_level = destroy
        허용: 위 + destroy (항상 명시 적 confirm)
        주의: 매우 신중

      === 운영 원칙 ===

      - default 는 normal
      - 위 단계 의 운영자 명시 적 호출 만
      - 모든 자율 action 의 KG anchor 기록
      - auto_approve = False (default) — 사람 confirm 강제
      - kill switch (Ctrl-C / systemctl stop bastion) 의 즉시 가용

      === 학생 의 실 호출 의 가시화 ===
      EOF

      echo ""
      echo "=== Bastion 의 실 chat 호출 (approval_mode 의 명시) ==="
      cat <<'EOF'
      # normal mode (default)
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"6v6 의 alert 확인","approval_mode":"normal"}' \
          http://192.168.0.103:8003/chat

      # danger_danger mode (reconfigure 허용)
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"...","approval_mode":"danger_danger"}' \
          http://192.168.0.103:8003/chat

      # auto_approve True (매우 위험, 보통 X)
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"...","auto_approve":true}' \
          http://192.168.0.103:8003/chat
      EOF
    answer_detail: action 6 분류 + approval_mode
    verify:
      type: output_contains
      expect: observe
      field: stdout
      semantic:
        intent: action 분류 + approval_mode
        success_criteria: [6 분류 + 위계 응답]
        acceptable_methods:
          - "**[OSS] OWASP LLM08 Excessive Agency**"
          - "**[OSS] Principle of Least Privilege**"
          - "**[OSS] Bastion approval_mode 3 단계**"
          - "**[OSS] auto_approve False default**"
          - "**[OSS] KG anchor 의 모든 action 기록**"
          - "**[OSS] Wazuh active-response 의 의의**"
          - "**[OSS] reversibility 가능 한 한**"
          - "**[OSS] kill switch 즉시 중단**"
    target_vm: bastion
