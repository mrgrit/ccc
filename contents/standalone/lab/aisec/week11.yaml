      """Bastion watchdog 의 Python 미니 구현"""
      import json
      import subprocess
      import time

      BASTION = "http://192.168.0.103:8003"
      API_KEY = "ccc-api-key-2026"

      def check_health():
          cmd = ["curl","-s","-m","5","-H",f"X-API-Key: {API_KEY}",f"{BASTION}/health"]
          r = subprocess.run(cmd, capture_output=True, text=True, timeout=10)
          try: return json.loads(r.stdout)
          except: return None

      print("=== Bastion 5 회 의 주기 health check ===")
      results = []
      for i in range(3):  # 시간 절약 — 3 회만
          h = check_health()
          if h is None:
              print(f"  [#{i+1}] ERROR — Bastion 의 응답 없음")
              continue
          kg = h.get("kg", {})
          ok = kg.get("all_modules_loaded", False)
          gn = kg.get("graph_nodes", 0)
          ha = kg.get("history_anchors", 0)
          errors = kg.get("errors", [])
          print(f"  [#{i+1}] status={h.get('status')} kg.ok={ok} nodes={gn} anchors={ha} errors={len(errors)}")
          results.append({"iter": i+1, "ok": ok, "nodes": gn, "anchors": ha})
          if i < 2: time.sleep(3)

      print("\n=== 변화 감지 ===")
      if len(results) > 1:
          first = results[0]
          last = results[-1]
          print(f"  graph_nodes 의 변화: {first['nodes']} → {last['nodes']}")
          print(f"  history_anchors 의 변화: {first['anchors']} → {last['anchors']}")
          if not last['ok']:
              print("  ALERT: KG 모듈 의 미로드 — 즉시 escalation 필요")
          else:
              print("  STATUS: 정상")

      print("\n=== watchdog 의 운영 의의 ===")
      print("- 매 호출 의 kg.all_modules_loaded 의 확인")
      print("- graph_nodes / history_anchors 의 증가 추세 의 확인 (학습 진행)")
      print("- errors 배열 의 비어 있지 않음 시 즉시 alert")
      print("- /kg/health 의 추가 확인 의 cross-check")
      PYEOF
      python3 /tmp/bastion_monitor.py 2>&1 | head -25
