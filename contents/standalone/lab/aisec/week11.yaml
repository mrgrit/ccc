    hint: |
      6 분류 의 6v6 의 실 명령
    category: synthesis
    points: 15
    answer: |
      cat <<'EOF'
      === 6v6 의 자율 action 의 6 분류 의 매핑 ===

      1. observe (자유 허용)
         - tail -f /var/ossec/logs/alerts/alerts.json
         - curl /kg/audit
         - docker stats

      2. notify (자유 허용)
         - mail / slack / webhook 의 운영자 통보
         - Wazuh 의 alert 의 syslog 의 전송

      3. prepare (가시화 만)
         - playbook 의 가시화 (실 적용 X)
         - Suricata rule 의 dry-run

      4. mitigate (사람 confirm)
         - iptables 의 DROP 의 적용
         - ModSec 의 rule 의 활성
         - Wazuh 의 active-response 의 호출

      5. reconfigure (다중 confirm)
         - nginx config 의 변경 + reload
         - Suricata rule set 의 hot reload
         - bastion 의 config 의 변경

      6. destroy (항상 명시 적 confirm)
         - DB 의 row 의 삭제
         - container 의 의 삭제
         - log 의 의 truncate

      === 권한 의 위계 ===

      자율 권한 의 = max_level (시스템 의 설정).

      Bastion 의 approval_mode:
      - normal: max_level = mitigate
      - danger_danger: max_level = reconfigure
      - danger_danger_danger: max_level = destroy

      운영 의 의의:
      - normal 이 default
      - 위 의 escalation 의 운영자 의 명시 적 호출 만
      - 모든 자율 action 의 KG anchor 의 기록
      EOF
    answer_detail: 6 action + 권한 위계
