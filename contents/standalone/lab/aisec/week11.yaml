    category: ml
    points: 25
    answer: |
      cat > /tmp/qlearning_demo.py <<'EOF'
      """Q-learning 의 5x5 grid world 의 미니 demo"""
      import numpy as np

      # 5x5 grid — 0~24
      GRID = 5
      N_STATES = GRID * GRID
      N_ACTIONS = 4   # 0=up, 1=down, 2=left, 3=right
      START = 0       # (0,0)
      GOAL = N_STATES - 1   # (4,4)

      def step(state, action):
          row, col = state // GRID, state % GRID
          if action == 0 and row > 0: row -= 1
          elif action == 1 and row < GRID-1: row += 1
          elif action == 2 and col > 0: col -= 1
          elif action == 3 and col < GRID-1: col += 1
          new_state = row * GRID + col
          reward = 10 if new_state == GOAL else -1
          done = new_state == GOAL
          return new_state, reward, done

      # Q-table
      Q = np.zeros((N_STATES, N_ACTIONS))

      alpha = 0.1   # learning rate
      gamma = 0.9   # discount
      epsilon = 0.2 # exploration

      EPISODES = 500
      for ep in range(EPISODES):
          state = START
          for _ in range(50):
              # epsilon-greedy
              if np.random.random() < epsilon:
                  action = np.random.randint(N_ACTIONS)
              else:
                  action = np.argmax(Q[state])

              new_state, reward, done = step(state, action)

              # Q update
              Q[state, action] += alpha * (
                  reward + gamma * np.max(Q[new_state]) - Q[state, action]
              )

              state = new_state
              if done:
                  break

      # 학습 결과
      print("=== 학습 후 의 Q-table (start state) ===")
      print(f"  Up:{Q[0,0]:.2f} / Down:{Q[0,1]:.2f} / Left:{Q[0,2]:.2f} / Right:{Q[0,3]:.2f}")
      best = np.argmax(Q[0])
      actions_name = ["Up","Down","Left","Right"]
      print(f"  best action: {actions_name[best]}")

      print("\n=== 학습 후 의 optimal path ===")
      state = START
      path = [state]
      for _ in range(20):
          action = np.argmax(Q[state])
          state, _, done = step(state, action)
          path.append(state)
          if done: break
      print(f"  path: {path}")
      EOF
      python3 /tmp/qlearning_demo.py 2>&1 | head -10
    answer_detail: Q-learning
    verify:
      type: output_contains
      expect: action
      field: stdout
