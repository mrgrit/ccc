  # STEP 3 — Q-learning 5x5 grid world 의 실 실행
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION — Q-learning 5x5 grid world 500 episode 학습 + 4 hyperparameter
      비교 + optimal path 검증

      lecture 2차시 의 Q-learning 이론 (강아지 비유 → 5x5 grid world → Q-table →
      update 공식) 을 Python 으로 직접 실행. 손 계산 (lecture 2-5) 과 실 코드 의
      *동일 갱신* 확인 + 4 hyperparameter (alpha / gamma / epsilon) 비교 측정.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Q-table** = state × action 표 (`5x5 grid = 25 state × 4 action = 100 cell`)
      - **alpha (학습률)** = 새 정보 를 얼마나 빠르게 반영 — lecture 2-7 의 *의견
        신뢰* 비유
      - **gamma (할인율)** = 미래 reward 를 현재 와 얼마나 비교 — *미래 할인* 비유
      - **epsilon (탐색률)** = 무작위 행동 비율 — *단골 vs 새 시도* 비유
      - **optimal path** = S (0) → G (24) 의 최단 = 8 step (오른쪽 4 + 아래 4)

      ## 💻 실행 명령

      ```bash
      cat > /tmp/qlearning.py <<'PY'
      """Q-learning 5x5 grid world demo"""
      import numpy as np

      GRID = 5; N_STATES = GRID*GRID; N_ACTIONS = 4
      START = 0; GOAL = N_STATES - 1
      ACTIONS_NAME = ["Up","Down","Left","Right"]

      def step(state, action):
          row, col = state // GRID, state % GRID
          if action == 0 and row > 0: row -= 1
          elif action == 1 and row < GRID-1: row += 1
          elif action == 2 and col > 0: col -= 1
          elif action == 3 and col < GRID-1: col += 1
          new_state = row * GRID + col
          reward = 10 if new_state == GOAL else -1
          done = new_state == GOAL
          return new_state, reward, done

      def train(alpha, gamma, epsilon, episodes):
          Q = np.zeros((N_STATES, N_ACTIONS))
          total_rewards = []
          for ep in range(episodes):
              state = START
              ep_reward = 0
              for _ in range(50):
                  if np.random.random() < epsilon:
                      action = np.random.randint(N_ACTIONS)
                  else:
                      action = int(np.argmax(Q[state]))
                  new_state, reward, done = step(state, action)
                  Q[state, action] += alpha * (
                      reward + gamma * float(np.max(Q[new_state])) - Q[state, action]
                  )
                  state = new_state
                  ep_reward += reward
                  if done: break
              total_rewards.append(ep_reward)
          return Q, total_rewards

      # 학습
      print("=== Q-learning 500 episode 학습 ===")
      np.random.seed(42)
      Q, rewards = train(alpha=0.1, gamma=0.9, epsilon=0.2, episodes=500)

      # 학습 진행 추세
      print(f"  episode 1-50 평균 reward: {np.mean(rewards[:50]):.1f}")
      print(f"  episode 250-300 평균 reward: {np.mean(rewards[250:300]):.1f}")
      print(f"  episode 450-500 평균 reward: {np.mean(rewards[-50:]):.1f}")

      # Start state Q 값
      print("\n=== Start state Q 값 ===")
      for i, name in enumerate(ACTIONS_NAME):
          print(f"  {name:6s}: {Q[0, i]:7.2f}")
      best = int(np.argmax(Q[0]))
      print(f"  best action: {ACTIONS_NAME[best]}")

      # Optimal path
      print("\n=== 학습 후 optimal path ===")
      state = START; path = [state]
      for _ in range(20):
          action = int(np.argmax(Q[state]))
          state, _, done = step(state, action)
          path.append(state)
          if done: break
      print(f"  path: {path}")
      print(f"  steps: {len(path)-1} (optimal = 8)")

      # 4 hyperparameter 비교
      print("\n=== 4 hyperparameter 비교 ===")
      for a, g, e in [(0.05, 0.9, 0.2), (0.5, 0.9, 0.2), (0.1, 0.5, 0.2), (0.1, 0.99, 0.5)]:
          np.random.seed(42)
          _, r = train(a, g, e, episodes=500)
