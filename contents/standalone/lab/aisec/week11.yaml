lab_id: standalone-aisec-week11
title: 자율보안 (1) — cron + Bastion watchdog + Q-learning 실 hands-on
version: standalone-non-ai
course: aisec
week: 11
description: |
  자율 보안 운영의 trigger (cron, systemd timer, watcher) + 강화학습 Q-learning +
  Hybrid 의사결정 의 학생 직접 hands-on. 모든 step 의 실 실행 + 결과 확인 + 보고서.

  lecture 의 비유 의 lab 매핑:
  - cron / systemd = 자명종 시계 (정기 trigger).
  - watcher = 화재 경보기 (event trigger).
  - Q-learning = 강아지 의 훈련 의 5x5 미로 의 응용.
  - hybrid 의사결정 = 식당 의 메뉴 + 직원 의 추천 + 친구 의 의견 의 결합.
  - action 6 분류 = 창문 의 보기 ~ 집 의 파괴 의 일상 위험 위계.
difficulty: medium
duration_minutes: 240
prerequisites:
  - W10 통과
  - Python 3 + numpy
  - cron + systemd 의 호스트 접근
  - Bastion API 가용
objectives:
  - CCC cron + systemd timer 의 실 가시화
  - Bastion watchdog log + /health 의 주기적 모니터링
  - Q-learning 5x5 grid world 의 500 episode 학습
  - Hybrid 의사결정 (rule + LLM) Python demo
  - 자율 action 6 분류 의 6v6 매핑 + approval_mode 가시화
pass_threshold: 0.7

