  # ============================================================
  # STEP 4 — Hybrid 의사결정 Python demo
  # ============================================================
  - order: 4
    instruction: |
      Rule + LLM 의 통합 의사결정 Python demo — alert 의 분류 의 명확 rule 만, 모호
      한 경우 LLM 호출, fail-safe BLOCK.
    hint: |
