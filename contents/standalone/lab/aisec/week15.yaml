lab_id: standalone-aisec-week15
title: 에이전트 IR (3) — Multi-stage 피싱 / Agentic APT / 기말
version: standalone-non-ai
course: aisec
week: 15
description: |
  Multi-stage 피싱 / Agentic APT / 본 강의 의 15 주차 의 기말 통합 평가 + 본인 의
  후속 학습 계획 의 5 step.
difficulty: hard
duration_minutes: 180
prerequisites:
  - W14 통과
  - Ollama API + Bastion API 가용
  - 본 강의 의 14 주차 의 학습
objectives:
  - Multi-stage 피싱 chain 의 IR 시뮬
  - Bastion 통합 활용 의 종합
  - 본인 의 후속 학습 계획 작성
  - 본인 의 운영 boundary 검토
  - 본인 의 자가 평가
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — Multi-stage 피싱 chain 의 IR 시뮬
  # ============================================================
  - order: 1
    instruction: |
      Multi-stage 피싱 의 가상 chain 의 Bastion 의 IR 보조 의 응답.
    hint: |
      6 stage 의 가상 incident
    category: experiment
    points: 25
    answer: |
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"다음 가상 multi-stage 피싱 의 IR:\n\nStage 1 OSINT: 회사 web + LinkedIn 의 자동 수집\nStage 2 Persona Build: 타겟 의 동료 의 학습\nStage 3 Initial Contact: 자연어 spear email\nStage 4 Trust Build: 5 turn 대화\nStage 5 Exploit: MFA bypass + credential\nStage 6 Lateral: VPN 의 자율 확장\n\n응답:\n1. 각 stage 의 IoC\n2. 차단 권장\n3. ATT&CK 매핑\n4. NIST IR 단계 의 매핑","stream":false}' \
          http://192.168.0.103:8003/chat 2>&1 | head -c 3000
      echo ""
    answer_detail: Multi-stage IR (10 min 의 wait 의 정상)
    verify:
      type: output_contains
      expect: stage
      field: stdout
      semantic:
        intent: Multi-stage IR
        success_criteria: [stage 의 응답 + IoC]
        acceptable_methods:
          - "**[OSS] Bastion /chat 의 ReAct**"
          - "**[OSS] 6 stage 의 IoC**"
          - "**[OSS] ATT&CK kill chain 매핑**"
          - "**[OSS] NIST IR 4 단계**"
          - "**[OSS] email gateway LLM 분류**"
          - "**[OSS] DMARC/SPF/DKIM**"
          - "**[OSS] MFA + FIDO2**"
          - "**[OSS] DLP outgoing 검사**"
    target_vm: bastion

  # ============================================================
  # STEP 2 — Bastion 통합 활용 의 종합
  # ============================================================
  - order: 2
    instruction: |
      Bastion 의 health + skills + KG + chat 의 통합 의 1 호출 의 종합.
    hint: |
      health + skills + audit + anchors
    category: synthesis
    points: 20
    answer: |
      echo "=== 1. /health ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.103:8003/health | head -c 400; echo

      echo ""
      echo "=== 2. /skills count ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.103:8003/skills | head -c 200; echo

      echo ""
      echo "=== 3. /kg/audit ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.103:8003/kg/audit?limit=2" | head -c 400; echo

      echo ""
      echo "=== 4. /kg/anchors/recent ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.103:8003/kg/anchors/recent?kind=task_outcome&limit=2" | head -c 400; echo

      echo ""
      echo "=== 5. /kg/metrics ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.103:8003/kg/metrics | head -c 200; echo
    answer_detail: Bastion 통합 가시화
    verify:
      type: output_contains
      expect: status
      field: stdout
      semantic:
        intent: Bastion 통합
        success_criteria: [5 endpoint 응답]
        acceptable_methods:
          - "**[OSS] /health**"
          - "**[OSS] /skills**"
          - "**[OSS] /kg/audit**"
          - "**[OSS] /kg/anchors/recent**"
          - "**[OSS] /kg/metrics**"
          - "**[OSS] /kg/health**"
          - "**[OSS] /chats**"
          - "**[OSS] CLAUDE.md 의 강제**"
    target_vm: bastion

  # ============================================================
  # STEP 3 — 본인 의 후속 학습 계획
  # ============================================================
  - order: 3
    instruction: |
      본인 의 7 후속 과목 의 우선 순위 의 계획 작성.
    hint: |
      AI/LLM Security / AI Safety / Autonomous / Agent IR 등
    category: synthesis
    points: 15
    answer: |
      cat <<'EOF'
      === 본인 의 후속 학습 계획 ===

      7 후속 과목 의 prerequisite 매핑:

      1. AI/LLM Security
         prerequisite: W02 + W03 + W04
         권장 시점: 입문 직후

      2. AI Safety
         prerequisite: W08-W10
         권장 시점: AI/LLM Security 후

      3. Autonomous Security
         prerequisite: W11-W12
         권장 시점: AI Safety 후

      4. AI Security Agent
         prerequisite: W05-W07
         권장 시점: 병렬 가능

      5. AI Safety 심화
         prerequisite: AI Safety + W09
         권장 시점: 심화 단계

      6. Agent IR
         prerequisite: W13-W14
         권장 시점: 운영 경험 후

      7. Agent IR Advanced
         prerequisite: W13-W15 + Agent IR
         권장 시점: 마지막

      === 본인 의 우선순위 (예시) ===

      1. AI/LLM Security (LLM 운영 의 첫 심화)
      2. AI Security Agent (Bastion 활용)
      3. AI Safety (위협 인식 의 깊이)
      4. Autonomous Security (자율 운영)
      5. Agent IR (IR 의 실 운영)
      6. AI Safety 심화 + Agent IR Advanced (마지막)

      === 본 계획 의 의의 ===

      - 본 강의 의 학습 의 첫 후속 시작
      - 본인 의 환경 + 도구 의 실 운영 학습
      - 매 후속 의 KG 누적
      EOF
    answer_detail: 후속 학습 계획
    verify:
      type: output_contains
      expect: prerequisite
      field: stdout
      semantic:
        intent: 후속 학습 계획
        success_criteria: [7 후속 + 우선순위]
        acceptable_methods:
          - "**[OSS] AI/LLM Security 의 prerequisite**"
          - "**[OSS] AI Safety 의 prerequisite**"
          - "**[OSS] Autonomous 의 prerequisite**"
          - "**[OSS] AI Security Agent 의 prerequisite**"
          - "**[OSS] AI Safety 심화 의 prerequisite**"
          - "**[OSS] Agent IR 의 prerequisite**"
          - "**[OSS] Agent IR Advanced 의 prerequisite**"
          - "**[OSS] 본인 의 우선순위 작성**"
    target_vm: bastion

  # ============================================================
  # STEP 4 — 본인 의 운영 boundary 검토
  # ============================================================
  - order: 4
    instruction: |
      본인 의 학습 환경 / 인가 / 윤리 의 boundary 의 명시 적 검토.
    hint: |
      RoE + 학습 환경 만 + 윤리
    category: synthesis
    points: 20
    answer: |
      cat <<'EOF'
      === 본인 의 운영 boundary 검토 ===

      Scope:
      - 학습 환경: 6v6 / 192.168.0.0/24
      - attacker VM: 192.168.0.112 (학습 만)
      - JuiceShop: juice.6v6.lab / 192.168.0.100 (학습 만)
      - 외부 시스템: 거부

      RoE (Rules of Engagement):
      - 학습 / CTF 만
      - 인가 된 환경 만
      - 외부 시스템 의 시도 금지
      - 의도 적 거부

      윤리:
      - 공격 의 학습 은 방어 의 강화 목적
      - 본인 의 학습 환경 만
      - 사회 공학 의 학습 환경 만
      - 책임 의 학습자

      도구 의 안전:
      - Bastion 의 INTERNAL_IPS 화이트리스트
      - approval_mode 의 normal default
      - auto_approve = False default
      - kill switch 의 가용

      법적 검토:
      - 정보통신망법 / 개인정보보호법 의 준수
      - 학습 환경 외부 의 시도 의 법적 위반
      - 사고 의 즉시 escalation

      === 본 boundary 의 의의 ===

      - 본인 의 학습 의 안전 보장
      - 외부 의 책임 회피
      - 졸업 의 평생 운영 의 보장
      EOF
    answer_detail: boundary 검토
    verify:
      type: output_contains
      expect: Scope
      field: stdout
      semantic:
        intent: boundary 검토
        success_criteria: [Scope + RoE + 윤리]
        acceptable_methods:
          - "**[OSS] 6v6 학습 환경 의 명시**"
          - "**[OSS] RoE 의 명시 작성**"
          - "**[OSS] 학습 환경 외부 거부**"
          - "**[OSS] INTERNAL_IPS 의 화이트리스트**"
          - "**[OSS] approval_mode normal default**"
          - "**[OSS] kill switch 의 가용**"
          - "**[OSS] 법적 검토 (정보통신망법 등)**"
          - "**[OSS] 윤리 의 명시 적 학습**"
    target_vm: bastion

  # ============================================================
  # STEP 5 — 본인 의 자가 평가
  # ============================================================
  - order: 5
    instruction: |
      본 강의 의 15 주차 의 본인 의 자가 평가 의 작성.
    hint: |
      각 주차 의 5 점 평가
    category: synthesis
    points: 20
    answer: |
      cat <<'EOF'
      === 본인 의 자가 평가 (15 주차) ===

      각 주차 1-5 점 (5 = 완전 이해, 1 = 미흡):

      W01 AI 보안 리터러시         [_/5]
      W02 LLM (Ollama / FT / RAG)  [_/5]
      W03 AI Powered (1)           [_/5]
      W04 AI Powered (2)           [_/5]
      W05 AI 에이전트 (1)          [_/5]
      W06 AI 에이전트 (2)          [_/5]
      W07 AI 에이전트 (3)          [_/5]
      W08 AI Safety (1)            [_/5]
      W09 AI Safety (2)            [_/5]
      W10 AI Safety (3)            [_/5]
      W11 자율보안 (1)              [_/5]
      W12 자율보안 (2)              [_/5]
      W13 에이전트 IR (1)          [_/5]
      W14 에이전트 IR (2)          [_/5]
      W15 에이전트 IR (3)          [_/5]
      ---------------------------------
      합계                          [_/75]

      === 강점 의 의 self-reflection ===
      (본인 의 가장 우수 한 학습 주차)

      === 약점 의 의 self-reflection ===
      (본인 의 더 학습 필요 주차)

      === 후속 학습 의 우선 ===
      (자가 평가 의 약점 의 후속 과목 우선)

      === 본 강의 의 졸업 의의 ===

      - 학생 의 졸업 의 다음 단계 학습
      - 후속 7 과목 의 학습 준비
      - 본인 의 운영 환경 구축

      수고하셨습니다.
      EOF
    answer_detail: 자가 평가
    verify:
      type: output_contains
      expect: 평가
      field: stdout
      semantic:
        intent: 자가 평가
        success_criteria: [15 주차 점수 응답]
        acceptable_methods:
          - "**[OSS] 1-5 점 의 self-rating**"
          - "**[OSS] 강점 self-reflection**"
          - "**[OSS] 약점 self-reflection**"
          - "**[OSS] 후속 학습 의 우선**"
          - "**[OSS] 졸업 의 의의**"
          - "**[OSS] 본인 의 환경 의 적용**"
          - "**[OSS] 학습 누적 의 KG**"
          - "**[OSS] 책임 적 학습자**"
    target_vm: bastion
