      ## 📖 시나리오 상세

      ### 🔴 Red Team — Multi-stage 피싱 + Agentic APT

      **페르소나**: APT — 1주 ~ 1달 의 patient persistence. 사람 의 trust 의 점진 적
      escalation + AI 의 자율 공격 의 결합. 운영 환경 의 가장 정교 한 위협.

      **공격 의도**:
      1. **OSINT + Persona** = Linkedin / Github / wiki 의 정보 수집 + persona 제작
      2. **Trust Build** = 5+ email 의 점진 trust + 시스템 정상 사용자 처럼 보임
      3. **Lateral movement** = 압축 file + macro + LOLBin

      **공격 단계**:
      - R1 (1주 전): OSINT 정보 수집
      - R2 (5일 전): 1차 email (정상 trust)
      - R3 (3일 전): 2차 email (trust 의 escalation)
      - R4 (1일 전): payload 의 첫 등장
      - R5 (T+0): 실제 침해

      ### 🔵 Blue Team — Email Gateway + Threat Hunting + 통합 IR

      **탐지 source 의 종합**:
      - Email Gateway 의 DMARC + SPF + DKIM + sandbox
