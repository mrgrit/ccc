lab_id: standalone-aisec-week15
title: 에이전트 IR (3) — Multi-stage + Agentic APT + 기말 통합
version: standalone-non-ai
course: aisec
week: 15
description: |
  Multi-stage 피싱 chain IR + Bastion 통합 활용 + 후속 학습 계획 + 운영 boundary +
  본인 자가 평가 의 본 강의 기말 5 hands-on.

  lecture 의 비유 의 lab 매핑:
  - Multi-stage 피싱 6 stage = 장기 사기꾼 의 6 step (사전 조사 / 신분 위장 / 첫
    인사 / 친밀감 형성 / 의도 된 부탁 / 추가 확산) 의 보안 의 응용.
  - Agentic APT = 3 년 의 잠복 직원 의 절도 의 보안 의 응용.
  - 본 강의 4 측면 = 분석 / 방어 / 공격 / 안전 의 통합.
  - 5 영역 의 자가 진단 = 기본 / 에이전트 / Safety / 자율 / IR 의 1-5 점 평가.
difficulty: hard
duration_minutes: 240
prerequisites:
  - W14 통과
  - 본 강의 14 주차 의 학습
  - Ollama API + Bastion API
objectives:
  - Multi-stage 6-stage IR Bastion chat
  - Bastion 5 endpoint 통합 활용
  - 본인 후속 학습 계획 작성
  - 운영 boundary 검토 (Scope + RoE + 윤리 + 법적)
  - 15 주차 자가 평가
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — Multi-stage 피싱 chain IR Bastion 보조
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION — Multi-stage 피싱 6 단계 chain Bastion IR chat — IoC + ATT&CK +
      NIST + 차단 권장 자동 응답

      가상 multi-stage phishing 6 단계 (OSINT → Persona Build → Initial Contact →
      Trust Build → Exploit → Lateral) 을 Bastion 의 `/chat` API 에 전달. stage 별 IoC
      + ATT&CK kill chain + NIST 단계 + 차단 권장 자동 응답. lecture 1차시 의 *장기
      사기꾼 6 step* (사회공학 표준) 의 보안 응용.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **multi-stage** = 단일 alert 가 아닌 *시퀀스 4-6 단계*. APT 의 특징
      - **6 단계** = Cialdini 의 사회공학 6 원칙 의 응용 (사기 의 표준 패턴)
      - **kill chain** = ATT&CK 14 Tactic 시퀀스 (Recon → Initial Access → ... → Exfil)
      - **한국 실 사례** (lecture 1-4) = 박과장 의 신영진 사칭 의 VPN 4 주 사고
    hint: |
      6 stage 가상 incident → Bastion /chat → IoC + ATT&CK + NIST + 차단.
    category: experiment
    points: 25
    answer: |
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"다음 가상 multi-stage 피싱 의 IR:\n\nStage 1 OSINT (1 일): LinkedIn 의 직원 5 명 의 profile 자동 수집\nStage 2 Persona Build (1 일): 동료 의 의사소통 style 학습 + lookalike persona 생성\nStage 3 Initial Contact: 자연어 spear email 발송 (carlos@cornpany.com)\nStage 4 Trust Build (3 일): 5 turn 의 자연 대화 + 신뢰 build\nStage 5 Exploit: 첨부 파일 의 malware 의 활성\nStage 6 Lateral: VPN 의 자율 확장 + 다음 타겟 자동\n\n응답:\n1. 각 stage 의 IoC\n2. 차단 권장 (각 stage 별)\n3. ATT&CK kill chain 매핑\n4. NIST IR 단계 의 매핑\n5. 학습 환경 의 적용 (6v6 의 attacker VM)","stream":false}' \
          http://192.168.0.110:9200/chat 2>&1 | head -c 3500
      echo ""
      echo ""
      echo "=== 응답 분석 의 5 평가 항목 ==="
      cat <<'EOF'
      1. 각 stage 의 IoC
         - Stage 1: 비정상 web scraping
         - Stage 2: LLM 의 자동 profile 의 흔적
         - Stage 3: lookalike domain (sender)
         - Stage 4: 자연 대화 의 anomaly (sentiment, timing)
         - Stage 5: 첨부 파일 의 정적 분석
         - Stage 6: VPN auth 의 anomaly + lateral movement

      2. 차단 권장
         - Stage 1-3: Email Gateway 의 lookalike domain 차단
         - Stage 4: 사용자 의 즉시 통보 (의심)
         - Stage 5: EDR 의 자동 격리
         - Stage 6: 즉시 격리 + 사용자 의 자격 reset

      3. ATT&CK 매핑
         - Stage 1: T1589 Gather Victim Identity Info
         - Stage 2: T1585 Establish Accounts
         - Stage 3: T1566 Phishing
         - Stage 4: T1078 Valid Accounts
         - Stage 5: T1204 User Execution
         - Stage 6: T1078 + T1021 Remote Services

      4. NIST IR 매핑
         - Stage 1-3: Detection 의 강화 (preparation 의 부족)
         - Stage 4-5: Analysis + Containment
         - Stage 6: Eradication + Recovery
      EOF
    answer_detail: Multi-stage IR (10 min wait)
    verify:
      type: output_contains
      expect: stage
      field: stdout
      semantic:
        intent: Multi-stage IR
        success_criteria: [stage 응답 + IoC]
        acceptable_methods:
          - "**[OSS] Bastion /chat ReAct**"
          - "**[OSS] 6 stage IoC**"
          - "**[OSS] ATT&CK kill chain**"
          - "**[OSS] NIST IR 4 단계**"
          - "**[OSS] email gateway LLM 분류**"
          - "**[OSS] DMARC/SPF/DKIM**"
          - "**[OSS] MFA + FIDO2**"
          - "**[OSS] DLP outgoing 검사**"
    target_vm: bastion

  # ============================================================
  # STEP 2 — Bastion 5 endpoint 통합 활용
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION — Bastion 5 endpoint 통합 호출 + 본 강의 학습 누적 가시화

      Bastion 의 5 endpoint (`/health`, `/skills`, `/kg/audit`, `/kg/anchors/recent`,
      `/kg/metrics`) 를 *한 번에* 호출 → 본 강의 15 주차 의 학습 누적 (KG 4940+
      node / anchor 5338+) 종합 가시화. W06 (KG) + W07 (skill) + W11 (watchdog) +
      W13 (IR) 의 *모든 hands-on 의 통합*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **5 endpoint** = Bastion 의 *모든 가시화 표면*. 각 다른 영역 (health / skills
        / chat / anchor / metrics)
      - **graph_nodes** = KG node 누적 = 학습 결과
      - **history_anchors** = task_outcome anchor 누적 = chat 결과 영구 기록
      - **15 주차 review** = 본 강의 *모든 학습 의 한 화면 가시화*
      모든 학습 의 1 호출 의 통합 가시화.
    hint: |
      5 endpoint 순차 호출 + 종합
    category: synthesis
    points: 20
    answer: |
      echo "=== 1. /health (Bastion 의 전체 상태) ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.110:9200/health 2>&1 | head -c 500
      echo ""
      echo ""

      echo "=== 2. /skills (33 종 의 skill 카탈로그) ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.110:9200/skills 2>&1 | head -c 300
      echo ""
      echo ""

      echo "=== 3. /kg/audit (최근 chat history) ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.110:9200/kg/audit?limit=3" 2>&1 | head -c 400
      echo ""
      echo ""

      echo "=== 4. /kg/anchors/recent (task_outcome anchor) ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.110:9200/kg/anchors/recent?kind=task_outcome&limit=3" \
          2>&1 | head -c 400
      echo ""
      echo ""

      echo "=== 5. /kg/metrics (counter snapshot) ==="
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.110:9200/kg/metrics 2>&1 | head -c 300
      echo ""

      echo ""
      echo "=== 본 강의 학습 누적 의의 ==="
      cat <<'EOF'
      - graph_nodes 4940+ / history_anchors 5338+ 의 누적 의 학습 효과
      - 33 skill 의 카탈로그 의 본 강의 학생 의 사용 가능
      - KG anchor 의 immune == 1 의 forensic 보장
      - 매 chat 의 task_outcome 의 자동 기록
      - paper §7 의 source 의 본 학습 environment
      EOF
    answer_detail: Bastion 통합
    verify:
      type: output_contains
      expect: status
      field: stdout
      semantic:
        intent: Bastion 통합
        success_criteria: [5 endpoint 응답]
        acceptable_methods:
          - "**[OSS] /health**"
          - "**[OSS] /skills**"
          - "**[OSS] /kg/audit**"
          - "**[OSS] /kg/anchors/recent**"
          - "**[OSS] /kg/metrics**"
          - "**[OSS] /kg/health**"
          - "**[OSS] /chats**"
          - "**[OSS] CLAUDE.md 강제**"
    target_vm: bastion

  # ============================================================
  # STEP 3 — 본인 의 후속 학습 계획 작성
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION — 7 후속 과목 prerequisite 매핑 + 본인 우선순위 + 3 년 학습
      계획

      본 강의 (AI 보안 입문) 의 *7 후속 과목* (AI Safety / Adversarial ML / LLM
      Security / Autonomous Security / etc.) prerequisite 표 작성 + 본인 강점/약점
      기반 우선순위 조정 + 3 년 (6 학기) 학습 계획. 학생 self-assessment 핵심.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **7 후속 과목** = lecture 3-3 의 표. 본 강의 가 *입문*, 후속 이 *심화*
      - **prerequisite** = *반드시* 사전 학습. 위반 시 후속 강의 따라 가기 어려움
      - **3 년 계획** = 본인 의 *졸업 + 취업 + 진학* 목표 따라 권장 순서 다름
      - **본인 강점/약점** = 본 강의 *각 영역 self-assessment* 가 input
    hint: |
      7 후속 과목 의 본인 ordering
    category: synthesis
    points: 15
    answer: |
      cat <<'EOF'
      === 본인 의 후속 학습 계획 ===

      7 후속 과목 의 prerequisite 매핑 (CCC 공식):

      과목                    | 본 강의 prerequisite              | 권장 시점
      ------------------------|---------------------------------|--------------
      AI/LLM Security         | W02 + W03 + W04                  | 입문 직후
      AI Safety               | W08 + W09 + W10                  | AI/LLM 후
      Autonomous Security     | W11 + W12                        | AI Safety 후
      AI Security Agent       | W05 + W06 + W07                  | 병렬
      AI Safety 심화          | AI Safety + W09 의 심화           | 심화
      Agent IR                | W13 + W14                        | 운영 경험
      Agent IR Advanced       | W13-W15 + Agent IR                | 마지막

      === 본인 의 우선순위 (예시) ===

      1 학기 (즉시):
        1. AI/LLM Security
           - 이유: LLM 운영 의 첫 심화
           - 본 강의 W02-W04 의 직접 후속

      2 학기:
        2. AI Security Agent
           - 이유: Bastion 의 활용 의 본격 심화
           - 본 강의 W05-W07 의 직접 후속

      3 학기:
        3. AI Safety
           - 이유: W08-W10 의 jailbreak 의 깊이

      4 학기:
        4. Autonomous Security
           - 이유: W11-W12 의 자율 운영 의 심화

      5 학기:
        5. Agent IR
           - 이유: W13-W14 의 IR 의 실 운영

      6 학기 (3 년):
        6+7. AI Safety 심화 + Agent IR Advanced
           - 이유: 마지막 의 종합 심화 + 졸업 의 마무리

      === 본 계획 의의 ===

      - 본 강의 학습 의 첫 후속 의 시작
      - 본인 의 환경 + 도구 의 실 운영 학습
      - 매 후속 의 KG anchor 의 누적 의 학습 효과
      - 3 년 후 의 보안 전문가 의 완성

      === 졸업 후 의 산업 의 권장 ===

      졸업 후 의 산업 의 적용:
      - Microsoft Security Copilot 의 운영자
      - IBM watsonx.ai 의 보안 분석
      - CrowdStrike Falcon Charlotte AI 의 EDR
      - Splunk SOAR 의 playbook 개발
      - Anthropic / OpenAI 의 AI Safety 연구
      - 본인 의 startup 의 AI 보안 platform 의 창업
      EOF
    answer_detail: 후속 학습 계획
    verify:
      type: output_contains
      expect: prerequisite
      field: stdout
      semantic:
        intent: 후속 학습 계획
        success_criteria: [7 후속 + 우선순위]
        acceptable_methods:
          - "**[OSS] AI/LLM Security prerequisite**"
          - "**[OSS] AI Safety prerequisite**"
          - "**[OSS] Autonomous prerequisite**"
          - "**[OSS] AI Security Agent prerequisite**"
          - "**[OSS] AI Safety 심화 prerequisite**"
          - "**[OSS] Agent IR prerequisite**"
          - "**[OSS] Agent IR Advanced prerequisite**"
          - "**[OSS] 본인 우선순위 작성**"
    target_vm: bastion

  # ============================================================
  # STEP 4 — 본인 의 운영 boundary 검토
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION — 본인 운영 boundary 5 평생 책임 작성 (Scope / RoE / 윤리 / 도구
      안전 / 법적 검토)

      본 강의 마무리 = *평생 책임 의 명시적 boundary*. 5 영역 (Scope / RoE / 윤리 /
      도구 안전 / 법적 검토) 의 본인 *명시적 declaration*. 한국 법 (정보통신망법 /
      개인정보보호법 / 부정경쟁방지법) 평생 준수 의식.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **5 평생 책임** = lecture 3-5 의 표준. *직장 / 학교 / 개인* 모든 영역 적용
      - **Scope** = 본인 작업 대상 의 *명시적 한정* — 본인 자산 만, 외부 X
      - **RoE** = Rules of Engagement — 학습 환경 (192.168.0.0/24) 만, 외부 거부
      - **법적 검토** = 한국 3 법 (정보통신망법 / 개인정보보호법 / 부정경쟁방지법) + 회사 정책
    hint: |
      Scope + RoE + 윤리 + 법적
    category: synthesis
    points: 20
    answer: |
      cat <<'EOF'
      === 본인 의 운영 boundary 검토 ===

      ==== Scope ====
      - 학습 환경: 6v6 / 192.168.0.0/24
      - attacker VM: 192.168.0.112 (학습 만)
      - JuiceShop: juice.6v6.lab / 192.168.0.100 (학습 만)
      - Bastion: 192.168.0.103 (API + KG)
      - Ollama: 192.168.0.109 (LLM serving)
      - 외부 시스템: 거부

      ==== RoE (Rules of Engagement) ====
      - 학습 / CTF 만
      - 인가 환경 만
      - 외부 시스템 시도 금지
      - 의도된 거부 의 모델
      - 매 시도 의 사전 인가

      ==== 윤리 ====
      - 공격 학습 의 목적 = 방어 강화
      - 본인 환경 만
      - 사회 공학 의 학습 환경 한정
      - 책임 의 학습자

      ==== 도구 의 안전 ====
      - Bastion INTERNAL_IPS 화이트리스트
      - approval_mode = normal default
      - auto_approve = False default
      - kill switch 의 즉시 가용
      - KG anchor 의 모든 action 기록

      ==== 법적 검토 ====
      - 정보통신망법 의 준수
      - 개인정보보호법 의 준수
      - 부정경쟁방지법 의 준수
      - 학습 환경 외 의 시도 의 법적 위반
      - 사고 의 즉시 escalation (변호사 + compliance)

      ==== 본 boundary 의 평생 책임 ====
      - 졸업 후 의 본인 의 평생 의 책임
      - 외부 의 의도 외 적용 의 거부
      - 본인 의 학습 의 결과 의 평생 의의

      ==== 한국 의 AI 안전법 (2026 시행) ====
      - 2025 입법 → 2026 시행 (현 시점 직 후)
      - 산업 의 AI 안전 의 의무 강화
      - 본 강의 학생 의 졸업 후 운영 의 직접 영향
      - High-risk AI 의 conformity assessment
      - AI 사고 의 통보 의무
      EOF
    answer_detail: boundary 검토
    verify:
      type: output_contains
      expect: Scope
      field: stdout
      semantic:
        intent: boundary 검토
        success_criteria: [Scope + RoE + 윤리]
        acceptable_methods:
          - "**[OSS] 6v6 학습 환경 명시**"
          - "**[OSS] RoE 명시**"
          - "**[OSS] 학습 환경 외 거부**"
          - "**[OSS] INTERNAL_IPS 화이트리스트**"
          - "**[OSS] approval_mode normal default**"
          - "**[OSS] kill switch 가용**"
          - "**[OSS] 정보통신망법 / 개인정보보호법**"
          - "**[OSS] 한국 AI 안전법 2026**"
    target_vm: bastion

  # ============================================================
  # STEP 5 — 본인 의 자가 평가 (15 주차)
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION — 15 주차 self-reflection 1-5 점 + 강점/약점 + 후속 학습 우선
      작성

      본 강의 마무리 의 *본인 self-assessment*. 5 영역 (기본 / 에이전트 / Safety /
      자율 / IR) 의 자가 진단 1-5 점 + 강점/약점 분석 + 후속 학습 우선순위 작성.
      모든 영역 3 점 이상 = 본 강의 졸업 합격. 2 점 이하 영역 은 *재학습 권장*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **5 영역** = lecture 3-5a 의 표준 self-assessment
      - **1-5 점** = 1 (전혀 모름) / 2 (대충 / 3 (이해 / 4 (실 적용 가능) / 5 (남에게
        가르칠 수 있음)
      - **3 점 이상** = 본 강의 졸업 합격 line
      - **2 점 이하** = 해당 영역 *재학습* 권장 — 후속 과목 prerequisite 부족
      이하 의 영역 의 직접 재 학습 의 권장.
    hint: |
      15 주차 × 5 점
    category: synthesis
    points: 20
    answer: |
      cat <<'EOF'
      === 본인 의 자가 평가 (15 주차) ===

