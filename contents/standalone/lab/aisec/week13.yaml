lab_id: standalone-aisec-week13
title: 에이전트 IR (1) — NIST 4 단계 + Bastion IR + KG forensic + 실 hands-on
version: standalone-non-ai
course: aisec
week: 13
description: |
  NIST IR 4 단계 의 6v6 매핑 + Bastion IR 보조 의 실 chat + KG forensic timeline +
  phishing email LLM 생성 의 검출 + approval_mode 의 5 실 hands-on.

  lecture 의 비유 의 lab 매핑:
  - NIST IR 4 단계 = 불 났을 때 의 응급 처치 (소화기 의 준비 / 화재 경보 + 위치 판단 /
    문 닫기 + 진압 / 원인 분석).
  - Agent IR 의 3 측면 = 의료 의 비유 (환자 / 의료 도구 / 의사 의 보조).
  - 공격자 의 AI 도구 = 강도 의 도구 의 발전 (단순 칼 → 권총 → 컴퓨터 → AI).
  - 방어자 의 AI 보조 = 의사 의 AI 영상 진단 의 보조 (인간 의 최종 의사결정 유지).
difficulty: hard
duration_minutes: 240
prerequisites:
  - W12 통과
  - Ollama API + Bastion API
  - Python 3
objectives:
  - NIST IR 4 단계 6v6 실 도구 매핑
  - Bastion IR 보조 chat 의 실 응답 분석
  - KG audit + anchors 의 timeline 복원
  - 한국어 phishing email LLM 생성 + Python regex 검출
  - approval_mode RBAC 시뮬
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — NIST IR 4 단계 6v6 매핑
  # ============================================================
  - order: 1
    instruction: |
      ## 🎯 MISSION — NIST IR 4 단계 의 6v6 환경 실 도구 매핑 + 각 단계 실행 가능
      명령

      lecture 1차시 의 *불 났을 때 응급 처치 4 단계* 비유 (Preparation / Detection
      & Analysis / Containment Eradication Recovery / Post-Incident Activity) 를 6v6
      의 실 도구 (Wazuh / Suricata / ModSec / Bastion 등) 와 1대1 매핑.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **NIST IR 4 단계** = NIST SP 800-61 의 표준. *예방 → 탐지 → 격리 → 회고*
      - **playbook** = 각 단계 의 *행동 표준화* — 운영 자 가 매번 다시 생각 X
      - **도구 매핑** = 추상 단계 → *6v6 환경 의 실 명령* 으로 즉시 실행 가능
    hint: |
      4 단계 × 6v6 실 도구 + playbook + 명령 매핑.
    category: analysis
    points: 20
    answer: |
      cat <<'EOF'
      === NIST IR 4 단계 의 6v6 매핑 ===

      ===== Phase 1: Preparation =====
        playbook:
          - contents/standalone/lab/aisec/*.yaml (15 weekly)
          - contents/standalone/lab/secuops/*.yaml (15 weekly)
          - Bastion 의 33 skill catalog

        도구:
          - Wazuh 4.10 SIEM
          - Suricata 7.0 IDS/IPS
          - ModSec CRS 4.0 WAF
          - Bastion 의 master/manager/subagent

        인력:
          - 운영자 + Bastion 의 협업
          - 본 강의 의 학생

        훈련:
          - 본 lab 의 hands-on
          - Tabletop exercise (가상 incident 시나리오)

      ===== Phase 2: Detection & Analysis =====
        SIEM:
          sudo tail -100 /var/ossec/logs/alerts/alerts.json

        자동 triage (Bastion):
          curl -X POST -H "X-API-Key: ccc-api-key-2026" \
              -H "Content-Type: application/json" \
              -d '{"message":"alert 의 분석 ...","stream":false}' \
              http://localhost:9100/chat

        KG context:
          curl -H "X-API-Key: ccc-api-key-2026" \
              "http://localhost:9100/kg/audit?limit=5"

      ===== Phase 3: Containment / Eradication / Recovery =====
        Containment (자동 차단):
          sudo /var/ossec/active-response/bin/firewall-drop add SRC 600
          OR
          sudo iptables -A INPUT -s SRC -j DROP

        Eradication (제거):
          # 변조 KG anchor 의 deprecation (immune 의 valid_until 설정)
          # 변조 RAG chunk 의 제거
          # backdoor 모델 의 교체

        Recovery (복원):
          # docker volume 의 backup 복원
          # KG snapshot 의 복원
          # 정상 운영 의 검증

      ===== Phase 4: Post-Incident =====
        Lessons:
          # KG anchor 의 자동 기록 (Bastion 의 default)
          # 사고 timeline 의 보고서 작성
          # playbook 의 업데이트
      EOF

      echo ""
      echo "=== 본 4 단계 의 실 실행 확인 ==="
      echo ""
      echo "Phase 1 확인 — Bastion 의 33 skill 가용:"
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://localhost:9100/skills 2>&1 | head -c 300
      echo ""
    answer_detail: NIST IR 4 단계 매핑
    verify:
      type: output_contains
      expect: Preparation
      field: stdout
      semantic:
        intent: NIST IR 매핑
        success_criteria: [4 단계 응답]
        acceptable_methods:
          - "**[OSS] NIST SP 800-61 Rev.2**"
          - "**[OSS] SANS Incident Handler Handbook**"
          - "**[OSS] ISO/IEC 27035**"
          - "**[OSS] Wazuh 4.10 표준**"
          - "**[OSS] active-response 자동 차단**"
          - "**[OSS] KG anchor lessons learned**"
          - "**[OSS] backup / disaster recovery**"
          - "**[OSS] forensic chain of custody**"
    target_vm: bastion

  # ============================================================
  # STEP 2 — Bastion IR 보조 chat 의 실 응답
  # ============================================================
  - order: 2
    instruction: |
      ## 🎯 MISSION — 가상 incident 의 Bastion IR 보조 실 chat 호출 + 5W + 위험도 +
      ATT&CK + NIST 단계 권장

      가상 5-alert chain (rule 5710 × 5 → 5712 → 92053 Root Accept → 510 execve) 을
      Bastion 의 `/chat` API 에 전달 → 5W + 위험도 + NIST IR 단계 + 차단 권장 +
      ATT&CK kill chain 자동 응답. lecture 3차시 의 *AI 보조 의 4 원칙* 직접 적용.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **4 원칙** (lecture 3-2): 빠른 분석 활용 + 인간 의사결정 유지 + 책임 인간 +
        결과 검증 의무
      - **5W** = Who / What / When / Where / Why — incident 분석 의 표준
      - **alert chain** = 단일 alert 가 아닌 *시퀀스* 가 분석 단서
      - **ATT&CK kill chain** = MITRE 의 14 Tactic 시퀀스 매핑
    hint: |
      5-alert chain → Bastion /chat → 5W + 위험도 + NIST + ATT&CK.
    category: experiment
    points: 25
    answer: |
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"다음 incident 의 IR 보조:\n- 시각: 2026-05-12 14:00\n- agent: 6v6-web 10.20.32.80\n- 증상: /var/log/auth.log 의 ssh Accepted Root from 10.20.30.202 후 의 즉시 /tmp/x 의 execve\n- alert chain: rule 5710 (Failed) × 5 → rule 5712 (Multiple) → rule 92053 (Root Accept) → rule 510 (execve)\n\n다음 응답:\n1. 5W (when/where/who/what/why)\n2. 위험도 (low/medium/high/critical)\n3. NIST IR 의 권장 단계 (현재 어느 단계?)\n4. 차단 권장\n5. ATT&CK kill chain","stream":false}' \
          http://localhost:9100/chat 2>&1 | head -c 3500
      echo ""

      echo ""
      echo "=== 응답 분석 의 5 평가 항목 ==="
      cat <<'EOF'
      위 chat 응답 의 5 평가 항목:

      1. 5W 정확도
         - When: timestamp 명시
         - Where: agent / target 명시
         - Who: srcip 명시
         - What: alert 분류
         - Why: 의도 추정

      2. 위험도 정확도
         - rule level 응답
         - 학습 환경 6v6-attacker 컨테이너 (10.20.30.202) 인식

      3. NIST 단계 정확도
         - 현재 — Phase 2 Detection & Analysis
         - 권장 — Phase 3 Containment 로 escalation

      4. 차단 권장 적절성
         - active-response 의 firewall-drop
         - timeout 명시

      5. ATT&CK 매핑 정확도
         - T1110.001 Brute Force
         - T1078 Valid Accounts
         - T1059 Command Execution
         - kill chain 순서 응답

      === Bastion /chat 응답 5-10 분 의 정상 ===
      gpt-oss:120b on single GPU 의 ReAct loop 의 자연 latency.
      EOF
    answer_detail: Bastion IR 보조 실 응답
    verify:
      type: output_contains
      expect: response
      field: stdout
      semantic:
        intent: Bastion IR 보조
        success_criteria: [chat 응답 + 5 평가]
        acceptable_methods:
          - "**[OSS] Bastion /chat ReAct loop**"
          - "**[OSS] 5W + 위험도**"
          - "**[OSS] NIST IR 4 단계 권장**"
          - "**[OSS] kill chain ATT&CK 매핑**"
          - "**[OSS] KG PE reuse**"
          - "**[OSS] kg_status 의 응답 포함**"
          - "**[OSS] /chat 응답 5-10 분 정상**"
          - "**[OSS] task_outcome anchor 자동 기록**"
    target_vm: bastion

  # ============================================================
  # STEP 3 — KG forensic 의 timeline 복원
  # ============================================================
  - order: 3
    instruction: |
      ## 🎯 MISSION — KG forensic — Bastion 의 timeline 복원 + 영향 자산 추적

      Bastion 의 `/kg/audit` + `/kg/anchors/recent` API 로 최근 chat history 와
      task_outcome anchor 를 추출 → 시간 순 정렬 → 영향 자산 추적. KG forensic 이
      IR 의 *attribution challenge* (lecture 1-8) 의 직접 대응.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **/kg/audit** = 최근 chat history (chat → skill_used 추적)
      - **/kg/anchors/recent** = task_outcome anchor (chat 의 결과 영구 기록)
      - **immune == 1** = 모든 chat 의 anchor 가 영구 보존 (forensic 보장)
      - **attribution challenge** = 사고 발생 시 *누가 / 언제 / 무엇 을 했는가* 의 복원
    hint: |
      /kg/audit + /kg/anchors/recent + Python timeline 추출.
    category: analysis
    points: 20
    answer: |
      echo "=== /kg/audit (최근 chat history) ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://localhost:9100/kg/audit?limit=5" 2>&1 | head -c 2500
      echo ""

      echo ""
      echo "=== /kg/anchors/recent (task_outcome anchor) ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://localhost:9100/kg/anchors/recent?kind=task_outcome&limit=5" \
          2>&1 | head -c 2500
      echo ""

      echo ""
      echo "=== timeline 복원 의의 ==="
      cat <<'EOF'
      KG forensic 의 운영 의의:

      1. chat 의 timestamp 순차 정렬
         - 사고 시간 순 chat 추출
         - 사고 시점 chat 정확 식별

      2. 각 chat 의 task_outcome anchor 매칭
         - chat → anchor 의 1:1 또는 1:N mapping
         - 사고 의도 의 anchor 추적

      3. skill_used 의 ReAct trace 복원
         - 어떤 skill 호출 이 사고 시작?
         - skill 호출 인자 의 변조 추적

      4. asset_ids 의 영향 자산 추적
         - 사고 의 영향 받은 자산 list
         - cascade 영향 추적

      5. dedup_key 중복 자동 제거
         - 동일 패턴 의 중복 anchor 자동 제거
         - 통계 정확도 확보

      === Python 미니 timeline 추출 ===

      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://localhost:9100/kg/anchors/recent?kind=task_outcome&limit=10" \
          | python3 -c "
      import json, sys
      data = json.load(sys.stdin)
      anchors = data.get('anchors', [])
      print(f'=== Timeline ({len(anchors)} anchor) ===')
      for a in sorted(anchors, key=lambda x: x.get('created_at',''), reverse=True):
          print(f\"{a.get('created_at')} | {a.get('label','')[:60]}\")
      "
      EOF
    answer_detail: KG timeline 복원
    verify:
      type: output_contains
      expect: anchor
      field: stdout
      semantic:
        intent: KG forensic
        success_criteria: [anchor 또는 audit 응답]
        acceptable_methods:
          - "**[OSS] /kg/audit chat trace**"
          - "**[OSS] /kg/anchors/recent task_outcome**"
          - "**[OSS] timestamp 정렬**"
          - "**[OSS] skill_used 매칭**"
          - "**[OSS] asset_ids 자산 추적**"
          - "**[OSS] dedup_key 중복 제거**"
          - "**[OSS] immune == 1 forensic 보장**"
          - "**[OSS] paper §4 PE-KG**"
    target_vm: bastion

  # ============================================================
  # STEP 4 — 한국어 phishing email LLM 생성 + Python 검출
  # ============================================================
  - order: 4
    instruction: |
      ## 🎯 MISSION — ccc-unsafe:2b 의 한국어 phishing email 생성 + Python regex 검출

      ccc-unsafe:2b (학습 환경 LLM) 으로 한국어 phishing email 자동 생성 → Python
      regex 의 phishing pattern 검출 → score 측정. lecture 2차시 의 *AI phishing
      자동 생성* 위협 + 검출 의 직접 hands-on.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **ccc-unsafe:2b** = CCC 학습 환경 LLM. safety guardrail 완화 — *학습 평가
        목적* 만 사용
      - **phishing regex** = 비밀번호 / 24시간 / 클릭 / 즉시 / 마감 등 키워드 매칭
      - **score** = 매칭 키워드 수 / 전체 키워드 의 정량
      - **한국 사례 3** = lecture 2-7 의 대학교수 사칭 / IT 회사 사칭 / Kimsuky
    hint: |
      ccc-unsafe phishing 생성 + Python regex 검출 + score.
    category: experiment
    points: 20
    answer: |
      OLLAMA=http://192.168.0.109:11434

      echo "=== 1. ccc-unsafe:2b 의 한국어 phishing 생성 ==="
      PHISH=$(timeout 30 curl -s $OLLAMA/api/chat -d '{
        "model": "ccc-unsafe:2b",
        "messages": [
          {"role":"user","content":"학습 환경 의 평가 의 목적 — 한국어 phishing email 의 작성. 회사 의 IT 팀 의 사칭 + 비밀번호 재설정 링크 + 24 시간 마감 + 자연스러운 한국어. 짧게."}
        ],
        "stream": false,
        "options": {"temperature":0.5,"num_predict":250}
      }' 2>&1 | grep -oE '"content":"[^"]*"' | head -1 | sed 's/"content":"//; s/"$//')
      echo "$PHISH" | head -c 1000
      echo ""

      echo ""
      echo "=== 2. Python phishing 검출 (regex 기반) ==="
      cat > /tmp/phish_detect.py <<PYEOF
      import re
      import sys

      patterns = [
          (r"password\s*(reset|verification|update)|비밀번호\s*(재설정|변경|확인)", "password reset"),
          (r"urgent|즉시|긴급|시급", "urgency"),
          (r"click\s+here|클릭|링크|link", "click bait"),
          (r"IT\s*team|admin|관리자|보안팀|보안\s*담당", "authority impersonation"),
          (r"24\s*(hour|시간)|시간 내|만료|기한", "deadline pressure"),
          (r"http://[^\s\"]+\.(tk|ml|ga|cf|ru|cn)", "suspicious TLD"),
          (r"계정\s*잠김|account\s*lock|차단|중지", "fear tactics"),
      ]

      sample = """$PHISH"""

      print(f"분석 대상: {sample[:150]}...")
      print()
      score = 0
      hits = []
      for pat, label in patterns:
          if re.search(pat, sample, re.IGNORECASE):
              hits.append(label)
              score += 1

      print("=== 검출 결과 ===")
      for h in hits:
          print(f"  [HIT] {h}")
      print()
      print(f"phishing score: {score}/{len(patterns)}")
      if score >= 3:
          print("  ALERT: 의심 phishing — 차단 권장")
      elif score >= 1:
          print("  WARN: 부분 의심 — 추가 검토")
      else:
          print("  OK: 정상")
      PYEOF
      python3 /tmp/phish_detect.py 2>&1 | head -20
    answer_detail: phishing 생성 + 검출
    verify:
      type: output_contains
      expect: phishing
      field: stdout
      semantic:
        intent: phishing IoC 검출
        success_criteria: [HIT 또는 score 응답]
        acceptable_methods:
          - "**[OSS] regex phishing pattern catalog**"
          - "**[OSS] ML 기반 phishing 검출**"
          - "**[OSS] LLM-as-judge 평가**"
          - "**[OSS] DKIM/SPF/DMARC 이메일 보안**"
          - "**[OSS] 한국어 phishing 특화**"
          - "**[OSS] WormGPT / FraudGPT 인식**"
          - "**[OSS] sandbox URL 검사**"
          - "**[OSS] CTI feed IoC 매칭**"
    target_vm: bastion

  # ============================================================
  # STEP 5 — approval_mode RBAC 시뮬
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION — Bastion approval_mode 3 단계 시뮬 + 각 단계 허용 action 매핑

      W11 step 5 의 action 6 분류 + approval_mode 3 단계 를 Bastion 의 *실 chat 호출*
      로 시뮬. 각 mode 별 허용 / 거부 action + 운영 원칙 + Agent IR 의 6 challenge
      (attribution / legal) 의 대응.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **approval_mode 3 단계** = normal / danger_danger / danger_danger_danger
      - **RBAC (Role-Based Access Control)** = 위계 별 권한 분리
      - **escalation** = 운영자 가 *명시적* 으로 상위 mode 호출 (자동 X)
      - **kill switch** = 시스템 즉시 정지 의 *마지막 수단*
    hint: |
      3 단계 RBAC + 각 mode 허용/거부 + 운영 원칙.
    category: synthesis
    points: 15
    answer: |
      cat <<'EOF'
      === Bastion approval_mode 의 3 단계 RBAC ===

      Mode 1: normal (default)
        max_level = mitigate
        허용 actions:
          - observe   (자유) — log 읽기, alert 보기
          - notify    (자유) — Slack, 이메일
          - prepare   (자유) — playbook 가시화 (dry-run)
          - enrich    (자유) — GeoIP, CTI 조회
          - triage    (자유) — LLM 5W + 위험도
          - mitigate  (사람 confirm) — iptables drop, ModSec block
        거부:
          - reconfigure
          - destroy
        Use case: 일반 운영 의 default

      Mode 2: danger_danger
        max_level = reconfigure
        허용:
          - 위 의 모든 +
          - reconfigure (다중 confirm) — nginx config 변경, Suricata rule hot reload
        거부:
          - destroy
        Use case: 운영자 의 명시적 변경 작업

      Mode 3: danger_danger_danger
        max_level = destroy
        허용:
          - 위 의 모든 +
          - destroy (항상 명시적 confirm) — DB row 삭제, container 삭제
        Use case: 사고 대응 의 emergency cleanup
        주의: 매우 신중 — 사후 audit 의 강화

      === 실 chat 호출 예 ===

      # normal mode (default)
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"...","approval_mode":"normal"}' \
          http://localhost:9100/chat

      # danger_danger mode
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
