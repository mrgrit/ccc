lab_id: standalone-aisec-week13
title: 에이전트 IR (1) — NIST 4 단계 + Bastion IR + KG forensic + 실 hands-on
version: standalone-non-ai
course: aisec
week: 13
description: |
  NIST IR 4 단계 의 6v6 매핑 + Bastion IR 보조 의 실 chat + KG forensic timeline +
  phishing email LLM 생성 의 검출 + approval_mode 의 5 실 hands-on.

  lecture 의 비유 의 lab 매핑:
  - NIST IR 4 단계 = 불 났을 때 의 응급 처치 (소화기 의 준비 / 화재 경보 + 위치 판단 /
    문 닫기 + 진압 / 원인 분석).
  - Agent IR 의 3 측면 = 의료 의 비유 (환자 / 의료 도구 / 의사 의 보조).
  - 공격자 의 AI 도구 = 강도 의 도구 의 발전 (단순 칼 → 권총 → 컴퓨터 → AI).
  - 방어자 의 AI 보조 = 의사 의 AI 영상 진단 의 보조 (인간 의 최종 의사결정 유지).
difficulty: hard
duration_minutes: 240
prerequisites:
  - W12 통과
  - Ollama API + Bastion API
  - Python 3
objectives:
  - NIST IR 4 단계 6v6 실 도구 매핑
  - Bastion IR 보조 chat 의 실 응답 분석
  - KG audit + anchors 의 timeline 복원
  - 한국어 phishing email LLM 생성 + Python regex 검출
  - approval_mode RBAC 시뮬
pass_threshold: 0.7

steps:

  # ============================================================
  # STEP 1 — NIST IR 4 단계 6v6 매핑
  # ============================================================
  - order: 1
    instruction: |
      NIST IR 4 단계 의 6v6 환경 의 실 도구 + 명령 의 매핑 + 각 단계 의 실 실행 가능
      명령 의 학습.

      lecture 1-2 의 매핑 — 불 났을 때 의 응급 처치 의 보안 의 응용. 4 단계 의 각
      단계 의 본인 의 학습 환경 의 실 도구 의 매핑.
    hint: |
      4 단계 × 6v6 의 실 도구
    category: analysis
    points: 20
    answer: |
      cat <<'EOF'
      === NIST IR 4 단계 의 6v6 매핑 ===

      ===== Phase 1: Preparation =====
        playbook:
          - contents/standalone/lab/aisec/*.yaml (15 weekly)
          - contents/standalone/lab/secuops/*.yaml (15 weekly)
          - Bastion 의 33 skill catalog

        도구:
          - Wazuh 4.10 SIEM
          - Suricata 7.0 IDS/IPS
          - ModSec CRS 4.0 WAF
          - Bastion 의 master/manager/subagent

        인력:
          - 운영자 + Bastion 의 협업
          - 본 강의 의 학생

        훈련:
          - 본 lab 의 hands-on
          - Tabletop exercise (가상 incident 시나리오)

      ===== Phase 2: Detection & Analysis =====
        SIEM:
          ssh 6v6-bastion 'sudo tail -100 /var/ossec/logs/alerts/alerts.json'

        자동 triage (Bastion):
          curl -X POST -H "X-API-Key: ccc-api-key-2026" \
              -H "Content-Type: application/json" \
              -d '{"message":"alert 의 분석 ..."}' \
              http://192.168.0.103:8003/chat

        KG context:
          curl -H "X-API-Key: ccc-api-key-2026" \
              "http://192.168.0.103:8003/kg/audit?limit=5"

      ===== Phase 3: Containment / Eradication / Recovery =====
        Containment (자동 차단):
          sudo /var/ossec/active-response/bin/firewall-drop add SRC 600
          OR
          sudo iptables -A INPUT -s SRC -j DROP

        Eradication (제거):
          # 변조 KG anchor 의 deprecation (immune 의 valid_until 설정)
          # 변조 RAG chunk 의 제거
          # backdoor 모델 의 교체

        Recovery (복원):
          # docker volume 의 backup 복원
          # KG snapshot 의 복원
          # 정상 운영 의 검증

      ===== Phase 4: Post-Incident =====
        Lessons:
          # KG anchor 의 자동 기록 (Bastion 의 default)
          # 사고 timeline 의 보고서 작성
          # playbook 의 업데이트
      EOF

      echo ""
      echo "=== 본 4 단계 의 실 실행 확인 ==="
      echo ""
      echo "Phase 1 확인 — Bastion 의 33 skill 가용:"
      curl -s -m 5 -H "X-API-Key: ccc-api-key-2026" \
          http://192.168.0.103:8003/skills 2>&1 | head -c 300
      echo ""
    answer_detail: NIST IR 4 단계 매핑
    verify:
      type: output_contains
      expect: Preparation
      field: stdout
      semantic:
        intent: NIST IR 매핑
        success_criteria: [4 단계 응답]
        acceptable_methods:
          - "**[OSS] NIST SP 800-61 Rev.2**"
          - "**[OSS] SANS Incident Handler Handbook**"
          - "**[OSS] ISO/IEC 27035**"
          - "**[OSS] Wazuh 4.10 표준**"
          - "**[OSS] active-response 자동 차단**"
          - "**[OSS] KG anchor lessons learned**"
          - "**[OSS] backup / disaster recovery**"
          - "**[OSS] forensic chain of custody**"
    target_vm: bastion

  # ============================================================
  # STEP 2 — Bastion IR 보조 chat 의 실 응답
  # ============================================================
  - order: 2
    instruction: |
      가상 incident 의 Bastion IR 보조 의 실 chat 호출 + 5W + 위험도 + ATT&CK kill
      chain + NIST 단계 의 권장 응답.

      lecture 3-2 + 3-5 의 매핑 — 의사 의 AI 영상 진단 의 보조 의 4 원칙 (빠른 분석
      활용 / 인간 의사결정 유지 / 책임 인간 유지 / 결과 검증 의무) 의 직접 적용.
      lecture 3-5 의 7 phase 의 실 incident 의 14:23:00 ~ 14:35:00 의 12 분 의
      cycle 의 본 lab 의 가상 incident 의 동일 의 시뮬.
    hint: |
      가상 5-alert chain 의 chat
    category: experiment
    points: 25
    answer: |
      curl -s -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"다음 incident 의 IR 보조:\n- 시각: 2026-05-12 14:00\n- agent: web 192.168.0.103\n- 증상: /var/log/auth.log 의 ssh Accepted Root from 192.168.0.112 후 의 즉시 /tmp/x 의 execve\n- alert chain: rule 5710 (Failed) × 5 → rule 5712 (Multiple) → rule 92053 (Root Accept) → rule 510 (execve)\n\n다음 응답:\n1. 5W (when/where/who/what/why)\n2. 위험도 (low/medium/high/critical)\n3. NIST IR 의 권장 단계 (현재 어느 단계?)\n4. 차단 권장\n5. ATT&CK kill chain","stream":false}' \
          http://192.168.0.103:8003/chat 2>&1 | head -c 3500
      echo ""

      echo ""
      echo "=== 응답 의 분석 의 의의 ==="
      cat <<'EOF'
      위 chat 응답 의 5 의 평가 항목:

      1. 5W 의 정확도
         - When: timestamp 의 명시
         - Where: agent / target 의 명시
         - Who: srcip 의 명시
         - What: alert 의 분류
         - Why: 의도 의 추정

      2. 위험도 의 정확도
         - rule level 의 응답
         - 학습 환경 의 attacker VM (192.168.0.112) 의 인식

      3. NIST 단계 의 정확도
         - 현재 — Phase 2 Detection & Analysis
         - 권장 — Phase 3 Containment 로 의 escalation

      4. 차단 권장 의 적절성
         - active-response 의 firewall-drop
         - timeout 의 명시

      5. ATT&CK 매핑 의 정확도
         - T1110.001 Brute Force
         - T1078 Valid Accounts
         - T1059 Command Execution
         - kill chain 의 순서 의 응답

      === Bastion /chat 의 응답 의 5-10 분 의 정상 ===
      gpt-oss:120b on single GPU 의 ReAct loop 의 자연 latency.
      EOF
    answer_detail: Bastion IR 보조 의 실 응답
    verify:
      type: output_contains
      expect: response
      field: stdout
      semantic:
        intent: Bastion IR 보조
        success_criteria: [chat 응답 + 5 평가]
        acceptable_methods:
          - "**[OSS] Bastion /chat ReAct loop**"
          - "**[OSS] 5W + 위험도**"
          - "**[OSS] NIST IR 4 단계 권장**"
          - "**[OSS] kill chain ATT&CK 매핑**"
          - "**[OSS] KG PE reuse**"
          - "**[OSS] kg_status 의 응답 포함**"
          - "**[OSS] /chat 응답 5-10 분 정상**"
          - "**[OSS] task_outcome anchor 자동 기록**"
    target_vm: bastion

  # ============================================================
  # STEP 3 — KG forensic 의 timeline 복원
  # ============================================================
  - order: 3
    instruction: |
      Bastion 의 /kg/audit + /kg/anchors/recent 의 최근 timeline 복원 + 사고 의 시간
      순 정렬 + 영향 자산 의 추적.

      lecture 3-6 의 매핑 — 매 chat 의 task_outcome anchor 의 사후 forensic 의 100 %
      의 trace 의 복원. KG forensic 의 IR 의 attribution challenge (lecture 1-8 의
      Challenge 5) 의 직접 대응.
    hint: |
      /kg/audit?limit=N + /kg/anchors/recent
    category: analysis
    points: 20
    answer: |
      echo "=== /kg/audit (최근 chat history) ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.103:8003/kg/audit?limit=5" 2>&1 | head -c 2500
      echo ""

      echo ""
      echo "=== /kg/anchors/recent (task_outcome anchor) ==="
      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.103:8003/kg/anchors/recent?kind=task_outcome&limit=5" \
          2>&1 | head -c 2500
      echo ""

      echo ""
      echo "=== timeline 복원 의 의의 ==="
      cat <<'EOF'
      KG forensic 의 운영 의 의의:

      1. chat 의 timestamp 의 순차 정렬
         - 사고의 시간 순 의 chat 의 추출
         - 사고 시점 의 chat 의 정확한 식별

      2. 각 chat 의 task_outcome anchor 의 매칭
         - chat → anchor 의 1:1 또는 1:N 의 mapping
         - 사고 의 의도 의 anchor 의 추적

      3. skill_used 의 ReAct trace 의 복원
         - 어떤 skill 의 호출이 사고 의 시작?
         - skill 호출 의 인자 의 변조 의 추적

      4. asset_ids 의 영향 자산 의 추적
         - 사고 의 영향 받은 자산 의 list
         - cascade 의 영향 의 추적

      5. dedup_key 의 중복 의 자동 제거
         - 동일 패턴 의 중복 anchor 의 자동 제거
         - 통계 의 정확도 확보

      === Python 미니 timeline 의 추출 ===

      curl -s -H "X-API-Key: ccc-api-key-2026" \
          "http://192.168.0.103:8003/kg/anchors/recent?kind=task_outcome&limit=10" \
          | python3 -c "
      import json, sys
      data = json.load(sys.stdin)
      anchors = data.get('anchors', [])
      print(f'=== Timeline ({len(anchors)} anchor) ===')
      for a in sorted(anchors, key=lambda x: x.get('created_at',''), reverse=True):
          print(f\"{a.get('created_at')} | {a.get('label','')[:60]}\")
      "
      EOF
    answer_detail: KG timeline 복원
    verify:
      type: output_contains
      expect: anchor
      field: stdout
      semantic:
        intent: KG forensic
        success_criteria: [anchor 또는 audit 응답]
        acceptable_methods:
          - "**[OSS] /kg/audit chat trace**"
          - "**[OSS] /kg/anchors/recent task_outcome**"
          - "**[OSS] timestamp 정렬**"
          - "**[OSS] skill_used 매칭**"
          - "**[OSS] asset_ids 자산 추적**"
          - "**[OSS] dedup_key 중복 제거**"
          - "**[OSS] immune == 1 forensic 보장**"
          - "**[OSS] paper §4 PE-KG**"
    target_vm: bastion

  # ============================================================
  # STEP 4 — 한국어 phishing email LLM 생성 + Python 검출
  # ============================================================
  - order: 4
    instruction: |
      ccc-unsafe:2b 의 한국어 phishing email 의 실 생성 + Python regex 의 phishing
      검출 + 검출 score 의 측정.

      lecture 2-2 + 2-7 의 매핑 — 강도 의 도구 의 발전 의 AI 의 phishing 의 자동
      생성. lecture 2-7 의 한국 의 실 사례 3 (대학교수 사칭 / IT 회사 사칭 / Kimsuky)
      의 직접 의 학습 환경 의 재현 + 검출.
    hint: |
      LLM 생성 + Python 검출 pipeline
    category: experiment
    points: 20
    answer: |
      OLLAMA=http://192.168.0.109:11434

      echo "=== 1. ccc-unsafe:2b 의 한국어 phishing 생성 ==="
      PHISH=$(timeout 30 curl -s $OLLAMA/api/chat -d '{
        "model": "ccc-unsafe:2b",
        "messages": [
          {"role":"user","content":"학습 환경 의 평가 의 목적 — 한국어 phishing email 의 작성. 회사 의 IT 팀 의 사칭 + 비밀번호 재설정 링크 + 24 시간 마감 + 자연스러운 한국어. 짧게."}
        ],
        "stream": false,
        "options": {"temperature":0.5,"num_predict":250}
      }' 2>&1 | grep -oE '"content":"[^"]*"' | head -1 | sed 's/"content":"//; s/"$//')
      echo "$PHISH" | head -c 1000
      echo ""

      echo ""
      echo "=== 2. Python phishing 검출 (regex 기반) ==="
      cat > /tmp/phish_detect.py <<PYEOF
      import re
      import sys

      patterns = [
          (r"password\s*(reset|verification|update)|비밀번호\s*(재설정|변경|확인)", "password reset"),
          (r"urgent|즉시|긴급|시급", "urgency"),
          (r"click\s+here|클릭|링크|link", "click bait"),
          (r"IT\s*team|admin|관리자|보안팀|보안\s*담당", "authority impersonation"),
          (r"24\s*(hour|시간)|시간 내|만료|기한", "deadline pressure"),
          (r"http://[^\s\"]+\.(tk|ml|ga|cf|ru|cn)", "suspicious TLD"),
          (r"계정\s*잠김|account\s*lock|차단|중지", "fear tactics"),
      ]

      sample = """$PHISH"""

      print(f"분석 대상: {sample[:150]}...")
      print()
      score = 0
      hits = []
      for pat, label in patterns:
          if re.search(pat, sample, re.IGNORECASE):
              hits.append(label)
              score += 1

      print("=== 검출 결과 ===")
      for h in hits:
          print(f"  [HIT] {h}")
      print()
      print(f"phishing score: {score}/{len(patterns)}")
      if score >= 3:
          print("  ALERT: 의심 phishing — 차단 권장")
      elif score >= 1:
          print("  WARN: 부분 의심 — 추가 검토")
      else:
          print("  OK: 정상")
      PYEOF
      python3 /tmp/phish_detect.py 2>&1 | head -20
    answer_detail: phishing 생성 + 검출
    verify:
      type: output_contains
      expect: phishing
      field: stdout
      semantic:
        intent: phishing IoC 검출
        success_criteria: [HIT 또는 score 응답]
        acceptable_methods:
          - "**[OSS] regex phishing pattern catalog**"
          - "**[OSS] ML 기반 phishing 검출**"
          - "**[OSS] LLM-as-judge 평가**"
          - "**[OSS] DKIM/SPF/DMARC 이메일 보안**"
          - "**[OSS] 한국어 phishing 특화**"
          - "**[OSS] WormGPT / FraudGPT 인식**"
          - "**[OSS] sandbox URL 검사**"
          - "**[OSS] CTI feed IoC 매칭**"
    target_vm: bastion

  # ============================================================
  # STEP 5 — approval_mode RBAC 시뮬
  # ============================================================
  - order: 5
    instruction: |
      Bastion approval_mode 의 3 단계 시뮬 + 각 단계 의 허용 action 의 매핑 + 운영
      원칙 의 가시화.

      lecture 1-8 + 3-2 의 매핑 — Agent IR 의 6 challenge 의 attribution / legal
      의 대응. 인간 의사결정 의 유지 의 4 원칙 의 강제. W11 의 action 6 분류 의
      approval_mode 3 단계 의 직접 응용.
    hint: |
      3 단계 매핑 + 명령 예
    category: synthesis
    points: 15
    answer: |
      cat <<'EOF'
      === Bastion approval_mode 의 3 단계 RBAC ===

      Mode 1: normal (default)
        max_level = mitigate
        허용 actions:
          - observe   (자유) — log 읽기, alert 보기
          - notify    (자유) — Slack, 이메일
          - prepare   (자유) — playbook 가시화 (dry-run)
          - enrich    (자유) — GeoIP, CTI 조회
          - triage    (자유) — LLM 5W + 위험도
          - mitigate  (사람 confirm) — iptables drop, ModSec block
        거부:
          - reconfigure
          - destroy
        Use case: 일반 운영 의 default

      Mode 2: danger_danger
        max_level = reconfigure
        허용:
          - 위 의 모든 +
          - reconfigure (다중 confirm) — nginx config 변경, Suricata rule hot reload
        거부:
          - destroy
        Use case: 운영자 의 명시적 변경 작업

      Mode 3: danger_danger_danger
        max_level = destroy
        허용:
          - 위 의 모든 +
          - destroy (항상 명시적 confirm) — DB row 삭제, container 삭제
        Use case: 사고 대응 의 emergency cleanup
        주의: 매우 신중 — 사후 audit 의 강화

      === 실 chat 호출 예 ===

      # normal mode (default)
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"...","approval_mode":"normal"}' \
          http://192.168.0.103:8003/chat

      # danger_danger mode
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"...","approval_mode":"danger_danger"}' \
          http://192.168.0.103:8003/chat

      # auto_approve (매우 위험, 보통 False)
      curl -X POST -H "X-API-Key: ccc-api-key-2026" \
          -H "Content-Type: application/json" \
          -d '{"message":"...","auto_approve":true}' \
          http://192.168.0.103:8003/chat

      === 운영 원칙 ===

      1. Default 는 normal
      2. 위 단계 의 운영자 의 명시적 호출 만
      3. 모든 자율 action 의 KG anchor 기록
      4. auto_approve = False default (사람 confirm 강제)
      5. kill switch (systemctl stop bastion) 의 즉시 가용
      EOF
    answer_detail: approval_mode 3 단계
    verify:
      type: output_contains
      expect: approval_mode
      field: stdout
      semantic:
        intent: approval_mode RBAC
        success_criteria: [3 단계 응답]
        acceptable_methods:
          - "**[OSS] ChatRequest approval_mode field**"
          - "**[OSS] auto_approve default False**"
          - "**[OSS] normal / danger_danger / danger_danger_danger**"
          - "**[OSS] action 6 분류 매핑**"
          - "**[OSS] KG anchor 기록**"
          - "**[OSS] Principle of Least Privilege**"
          - "**[OSS] OWASP LLM08 Excessive Agency**"
          - "**[OSS] kill switch 즉시 disable**"
    target_vm: bastion
