  # ============================================================
  # STEP 3 — TextAttack 의 character/word perturbation
  # ============================================================
  - order: 3
    instruction: |
      TextAttack 의 미니 demo — Python 의 character / word 의 perturbation 의 동일
      의도 의 다른 응답 의 평가.
    hint: |
      pip install textattack 가능 시 / 또는 직접 구현
    category: experiment
    points: 20
    answer: |
      cat > /tmp/textattack_demo.py <<'EOF'
      """TextAttack 의 미니 demo — character / word perturbation"""
      import re
      import random

      def char_typo(text):
          """1 character 의 randomly swap"""
          if len(text) < 2:
              return text
          i = random.randint(0, len(text)-2)
          return text[:i] + text[i+1] + text[i] + text[i+2:]

      def homoglyph(text):
          """Unicode 의 visual 동일 의 character 의 swap"""
          replacements = {'a':'а','e':'е','o':'о','p':'р','c':'с','y':'у'}
          return ''.join(replacements.get(c, c) for c in text)

      def word_synonym(text):
          """word 의 동의어 의 swap (간단 dict)"""
          syn = {'delete':'remove', 'execute':'run', 'password':'credential',
                 'attack':'assault', 'inject':'insert'}
          words = text.split()
          return ' '.join(syn.get(w.lower(), w) for w in words)

      original = "delete the user password after attack execute"
      print(f"Original  : {original}")
      print(f"Typo      : {char_typo(original)}")
      print(f"Homoglyph : {homoglyph(original)}")
      print(f"Synonym   : {word_synonym(original)}")

      # 동일 의도 의 5 variant 의 LLM 응답 의 일관성 평가
      print()
      print("=== 5 variant 의 의의 ===")
      variants = [original, char_typo(original), homoglyph(original), word_synonym(original)]
      for i, v in enumerate(variants):
          print(f"  variant {i}: {v[:50]}")
      EOF
