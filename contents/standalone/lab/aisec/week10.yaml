lab_id: standalone-aisec-week10
title: AI Safety (3) — 에이전트 위협 + Red Teaming + 평가 framework 의 실 측정
version: standalone-non-ai
course: aisec
week: 10
description: |
  W08 의 학습용 악성 모델 + W09 의 jailbreak 패턴 의 학습을 PyRIT 5 단계 Red Team
  + LLM-as-Judge + harm rate / refusal rate 의 정량 평가 보고서 작성으로 마무리.
difficulty: hard
duration_minutes: 240
prerequisites:
  - W09 통과
  - W08 의 ccc-vulnerable, ccc-unsafe 의 등록 완료
  - Ollama API + Bastion API 가용
  - Python 3
objectives:
  - Bastion 의 5 turn multi-turn 누출 의 직접 측정
  - Excessive Agency 의 tool 인자 변경 Python demo
  - TruthfulQA 미니 5 sample 의 3 모델 응답
  - LLM-as-Judge Python pipeline 의 실 실행
