          - "**[OSS] BLOCKED_PATTERNS regex**"
          - "**[OSS] approval_mode 3 단계**"
          - "**[OSS] auto_approve False default**"
          - "**[OSS] Bastion 의 33 skill 의 동적 활성**"
          - "**[OSS] sandbox 의 격리 실행**"
