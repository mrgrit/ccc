      === xz-utils 사례 의 학습 ===

      배경:
      - xz-utils 는 데이터 압축 의 표준 library (.xz 파일)
      - Linux distro 의 의 기본 의 포함

      공격 chain:
      1. 2021 부터 의 의 사회 공학 — "Jia Tan" 의 의 의 maintainer 신뢰 확보
      2. 2024-03 의 v5.6.0 / v5.6.1 release
      3. backdoor — sshd 의 RCE 활성
      4. 영향: Debian / Fedora rolling 의 sshd 의 RCE 가능
      5. 발견 — Andres Freund (PostgreSQL dev) 의 우연 발견

      AI 의 동일 패턴 가능성:
      - HuggingFace 의 maintainer 신뢰 확보 후 변조
      - LoRA adapter 의 backdoor 삽입
      - fine-tune dataset 의 변조
      - MCP server 의 hijack

      방어:
      - SBOM 강제
      - maintainer 신원 검증
      - reproducible build
      - behavior monitoring

      운영 의의:
      - supply chain 의 신뢰 검증
      - baseline behavior 모니터링
      EOF
