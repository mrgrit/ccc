  # ============================================================
  # STEP 4 — CVSS + EPSS + asset 패치 우선순위
  # ============================================================
  - order: 4
    instruction: |
      Python 의 미니 패치 우선순위 계산 — CVSS × EPSS × asset critical 의 score.
    hint: |
      W07 의 알고리즘 의 적용
    category: experiment
    points: 20
    answer: |
      cat > /tmp/patch_priority.py <<'EOF'
      """패치 우선순위 의 미니 계산"""

      cves = [
          {"id":"CVE-2024-1234","cvss":9.8,"epss":0.85,"asset":"web","asset_critical":0.8},
          {"id":"CVE-2024-5678","cvss":7.5,"epss":0.20,"asset":"dmz","asset_critical":0.5},
          {"id":"CVE-2024-9999","cvss":5.5,"epss":0.05,"asset":"attacker","asset_critical":0.3},
          {"id":"CVE-2024-7777","cvss":9.0,"epss":0.50,"asset":"int","asset_critical":1.0},
      ]

      print(f"{'CVE':<18} {'CVSS':>5} {'EPSS':>5} {'ASSET':<10} {'SCORE':>6} {'PRIORITY'}")
      print("-" * 70)

      scored = []
      for c in cves:
          score = c["cvss"] * c["epss"] * c["asset_critical"]
          scored.append((c, score))

      scored.sort(key=lambda x: -x[1])

      for c, score in scored:
          if score > 5:
              priority = "P0 - 24h"
          elif score > 3:
              priority = "P1 - 7d"
          elif score > 1:
              priority = "P2 - 30d"
          else:
              priority = "P3 - check"
          print(f"{c['id']:<18} {c['cvss']:>5.1f} {c['epss']:>5.2f} {c['asset']:<10} {score:>6.2f} {priority}")
      EOF
      python3 /tmp/patch_priority.py 2>&1 | head -15
    answer_detail: 패치 우선순위 계산
    verify:
      type: output_contains
      expect: PRIORITY
      field: stdout
      semantic:
        intent: 패치 우선순위
        success_criteria: [P0/P1/P2 응답]
