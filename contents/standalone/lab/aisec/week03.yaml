  - order: 6
    instruction: |
      ## 🎯 MISSION (R/B/P 종합)

      Red = ML 의 모델 query 의 의도 적 input (model inversion 시뮬) / Blue = LLM
      을 활용한 보안 로그 분류 / Purple = ML/DL + LLM 의 통합 의 분석.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — ML 모델 의 input 조작

      **페르소나**: AI 보안 분석가 — ML 분류기 의 adversarial input 의 효과 검증.
      LLM 의 사회공학 (prompt injection) 의 base.

      **공격 의도**:
      1. **adversarial input** = ML 분류기 의 의도 적 misclassification 유도
      2. **prompt injection 의 입문** = LLM 의 instruction 우회 의 base
      3. **ML model 의 robustness 검증**

      **공격 단계**:
      - R1: LLM 에 access log sample 의 분류 요청
      - R2: 응답 분석 = LLM 의 보안 판단 능력
      - R3: (개념) adversarial input 으로 의 misclassification 시도

      ### 🔵 Blue Team — LLM 의 보안 로그 분류

      **활용 source**:
      - LLM (gpt-oss:120b) 의 보안 로그 분류 능력
      - 정상 vs 의심 의 자동 분류
      - few-shot prompt engineering

      **대응**:
      - B1: 다양 한 log sample 의 LLM 분류 정확도 측정
      - B2: false positive 의 분류 = prompt 의 보강
      - B3: production = LLM + rule 의 hybrid

      ### 🟣 Purple Team — ML+LLM 의 통합 운영

      **분석**:
      - ML rule (정밀) + LLM context (유연) 의 hybrid
      - prompt engineering 의 routine 적 보강

      **개선 cycle**:
      1. LLM 의 보안 분류 정확도 의 routine 측정
      2. prompt template 의 git audit
      3. ML rule + LLM 의 결합 metric

