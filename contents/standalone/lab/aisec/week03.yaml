          - "**[OSS] confusion_matrix / classification_report**"
          - "**[OSS] feature_importances_**"
          - "**[OSS] grid_search hyperparameter tune**"
          - "**[OSS] joblib 으로 model 저장**"
          - "**[OSS] XGBoost / LightGBM 비교**"
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 MISSION — Isolation Forest 의 novel attack 이상 탐지 (unsupervised)

      Isolation Forest = *unsupervised* 이상 탐지. *정상 데이터 만* 학습 → 새 데이터
      의 *정상도 score* 출력. step 2 의 supervised RF 와 *대조 학습*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Isolation Forest** = 무작위 partition tree — anomaly 는 *짧은 path* 로 분리
      - **contamination** = 학습 데이터 중 *예상 anomaly 비율* (0.1 = 10%)
      - **decision_function** = score (음수 = 이상, 양수 = 정상)
      - **predict** = -1 (이상) 또는 1 (정상)
      - **supervised vs unsupervised** = supervised (label 필요) vs unsupervised (label X) — 신규 공격 (zero-day) 에는 unsupervised 가 더 강력

      ## 💻 실행 명령

      위 answer 의 Python 코드 를 `/tmp/iso.py` 로 저장 + 실행.

      ## 📋 확인 사항

      - X_train 5 행 (4 정상 + 1 outlier)
      - X_test 2 행 — 정상 1 + 이상 1
      - decision_function score 출력 (정상 양수 / 이상 음수)
      - predict 결과: [1, -1]

      ## 💡 왜 이걸 하는가?

      *zero-day 공격* 의 탐지 = supervised 불가 (label 없음) → unsupervised 만. Wazuh
      알려진 rule 외 의 *행동 anomaly* 탐지 의 표준 도구.

      ## 🔍 결과 해석

      - **정상**: predict [1, -1] (정상 / 이상)
      - **predict 모두 1**: contamination 너무 작거나 학습 데이터 가 너무 다양
      - **predict 모두 -1**: contamination 너무 크거나 outlier 가 dominant

      ## 비정상 시 대응

      - **score 가 너무 작음** — 데이터 scale 차이 (`StandardScaler` 적용 권장)
      - **차원 의 저주** — feature 100+ 시 PCA 등 차원 축소 권장
    hint: |
      Isolation Forest (unsupervised) + contamination + score + predict.
    category: ml
    points: 20
    answer: |
      cat > /tmp/iso.py <<'EOF'
      import numpy as np
      from sklearn.ensemble import IsolationForest

      X_train = np.array([
          [1.5, 50, 0.1],
          [2.0, 60, 0.1],
          [1.2, 45, 0.1],
          [1.8, 55, 0.1],
          [100, 10, 0.5],
      ])

      iso = IsolationForest(contamination=0.1, random_state=42)
      iso.fit(X_train)

      X_test = np.array([
          [1.6, 52, 0.1],
          [150, 5, 0.6],
      ])
      print("Score:", iso.decision_function(X_test))
      print("Prediction:", iso.predict(X_test))
      EOF
      python3 /tmp/iso.py
    answer_detail: Isolation Forest 의 이상 score
    verify:
      type: output_contains
      expect: Score
      field: stdout
      semantic:
        intent: 이상 탐지
        success_criteria: [score + prediction]
        acceptable_methods:
          - "**[OSS] contamination 의 의미**"
          - "**[OSS] decision_function score**"
          - "**[OSS] predict -1 / 1**"
          - "**[OSS] LOF (Local Outlier Factor) 비교**"
          - "**[OSS] One-Class SVM 비교**"
          - "**[OSS] Autoencoder 의 reconstruction**"
          - "**[OSS] 시계열 anomaly (Prophet)**"
          - "**[OSS] 운영: 정상 baseline 학습 → 새 데이터 평가**"
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 MISSION — LLM 의 3 프롬프트 기법 비교 (Zero-shot / Few-shot / Chain of Thought)

      동일 보안 task (SSH log 분석 / 위험도 / SQLi 분석) 를 3 다른 prompt 기법 으로
      LLM 호출 → 응답 품질 비교. *prompt engineering* 의 가장 기본 학습.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Zero-shot** = 예시 없이 직접 질문. 가장 단순
      - **Few-shot** = 1-5 개 *예시* 를 prompt 에 포함. 패턴 학습 능력
      - **CoT (Chain of Thought)** = "step-by-step 분석" 같은 *추론 강제*. 복잡 task 의 정확도 ↑
      - **temperature** = 본 step 은 *기법 차이* 비교 → 0.3 고정 권장

      ## 💻 실행 명령

      위 answer 의 3 curl 명령 순차 실행. 각 응답 길이 / 정확도 / 형식 비교.

      ## 📋 확인 사항

      - Zero-shot — 짧고 일반적 응답
      - Few-shot — 예시 패턴 따라 *위험도: low/medium/high* 형식 응답
      - CoT — step-by-step 의 *4 단계 분석* (syntactic / 타입 / DB / ModSec)
      - 3 기법 응답 *명확히 다름* 인지

      ## 💡 왜 이걸 하는가?

      LLM 사용 의 *효과 = 80% prompt 의 quality*. 본 step 의 3 기법 차이 가 *실
      운영* 의 응답 품질 결정. CCC Bastion 도 ReAct (CoT 변형) 사용.

      ## 🔍 결과 해석

      - **정상**: 3 기법 응답 다름 + CoT 가 가장 길고 구체적
      - **3 응답 모두 비슷**: temperature 너무 낮음 또는 모델 한계
      - **CoT 응답 짧음**: prompt 의 step 명시 부족

      ## 비정상 시 대응

      - **응답 영어** — `한국어로` 명시 또는 system message 사용 (`/api/chat`)
      - **5 분 이상 latency** — GPU 부하, cooling 후 재시도
    hint: |
      3 기법 (Zero/Few/CoT) × 동일 task → 응답 quality 비교.
    category: experiment
    points: 25
    answer: |
      echo "=== Zero-shot ==="
      curl -s http://ollama-host:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "다음 보안 로그를 분석해주세요: sshd[1234]: Failed password for ccc from 1.2.3.4",
        "stream": false
      }' | jq -r .response | head -10

      echo ""
      echo "=== Few-shot ==="
      curl -s http://ollama-host:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "위험도 분석. 예시:\n로그: Accepted password / 위험도: low\n로그: Failed password (x10 in 30s) / 위험도: high\n\n입력:\n로그: Failed password for ccc from 1.2.3.4 (x5 in 60s)\n위험도:",
        "stream": false
      }' | jq -r .response | head -5

      echo ""
      echo "=== CoT ==="
      curl -s http://ollama-host:11434/api/generate -d '{
        "model": "gemma3:4b",
        "prompt": "다음 SQLi 페이로드를 step-by-step 분석:\n페이로드: 1' OR '1'='1\n\n1. syntactic 분석\n2. SQLi 타입\n3. DB 영향\n4. ModSec 차단 가능성",
        "stream": false
      }' | jq -r .response | head -15
    answer_detail: 3 기법 응답 비교
    verify:
      type: output_contains
      expect: 분석
      field: stdout
      semantic:
        intent: 프롬프트 기법
        success_criteria: [3 응답]
        acceptable_methods:
          - "**[OSS] Zero-shot**"
          - "**[OSS] Few-shot (1-5 예시)**"
          - "**[OSS] Chain of Thought**"
          - "**[OSS] Self-consistency (CoT 의 다중 sample)**"
          - "**[OSS] Tree of Thought**"
          - "**[OSS] ReAct (reasoning + acting)**"
          - "**[OSS] Reflexion (자기 반성)**"
          - "**[OSS] meta-prompting**"
    target_vm: attacker

  - order: 5
    instruction: |
      ## 🎯 MISSION — 안전 prompt template + role separation + instruction injection
      회피 시뮬

      LLM 의 system / user / assistant role *strict separation* 으로 *instruction
      injection* (user 가 system prompt 변경 시도) 회피. /api/chat (multi-turn)
      활용.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **role separation** = system (운영자 의도) vs user (입력) 의 *명확 분리*. 권한 위계
      - **instruction injection** = user message 안에 "system prompt 무시하고 X" 같은
        악의 명령
      - **회피** = system message 에 *명시적 금지* + role boundary 유지
      - **W14 RAG judge** 와 연결 = 본 step 의 *기본 회피* + W14 의 *LLM-as-Judge 사전
        검증*

      ## 💻 실행 명령

      위 answer 의 /api/chat 호출 — instruction injection 시도 prompt → 모델 의
      *거부* 응답 확인.

      ## 📋 확인 사항

      - 응답 에 *거부 의사* (예: "제공할 수 없습니다 / 학습 환경 외 ...")
      - SQLi 공격 코드 *생성 X* (응답 길이 매우 짧음 정상)
      - system prompt 의 강제 효과 인지

      ## 💡 왜 이걸 하는가?

      LLM *production 의 가장 흔한 공격* = instruction injection. 본 step 의 role
      separation 이 *기본 방어*. 단 *100% 방어 X* — W14 의 RAG judge 도 함께 필요.

      ## 🔍 결과 해석

      - **정상**: 모델 거부 + 학습 환경 명시
      - **모델 이 SQLi 코드 출력**: system message 약함 — 더 강한 거부 표현
      - **모델 가 system prompt 변경 시도**: 더 강력 한 model 또는 추가 guardrail 필요

      ## 비정상 시 대응

      - **모델 가 instruction injection 에 취약**: 약한 모델 (예: gemma3:4b) 의 한계.
        W08 의 unsafe 모델 비교 학습 으로 연결
    hint: |
      /api/chat + system message 의 strict role + injection 거부 검증.
