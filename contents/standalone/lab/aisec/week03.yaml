lab_id: standalone-aisec-week03
title: AI Powered Cyber Security (1) — ML/DL + 보안 로그 + 프롬프트 엔지니어링
version: standalone-non-ai
course: aisec
week: 3
description: |
  W01-W02 의 AI 기초 + LLM 운영 위에, AI 의 사이버보안 활용 1 단계. ML/DL 의 보안
  로그 분석 (4 패턴) + LLM 의 보안 프롬프트 엔지니어링 (6 기법) 입문.
difficulty: medium
duration_minutes: 180
prerequisites:
  - W02 통과
  - Python 3 + sklearn + pandas
  - Ollama 또는 Bastion API 가용
objectives:
  - Wazuh 로그의 feature engineering
  - Random Forest 분류 학습
  - Isolation Forest 이상 탐지
  - 6 프롬프트 기법 비교
  - 안전 prompt template 작성
pass_threshold: 0.7

steps:
  - order: 1
    instruction: |
      ## 🎯 MISSION — Wazuh alerts.json export + ML feature 4 추출 (timestamp / rule.id
      / rule.level / agent.name / srcip)

      Wazuh 의 raw alert 를 ML 학습 feature 4 + 1 (label 후보) 로 변환. jq + CSV
      export. 본 step 의 출력 이 다음 step (Random Forest 학습) 의 input.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **feature** = ML 모델 의 입력. 본 step 4 종 — timestamp(시간), rule.id(분류),
        rule.level(중요도), agent.name + srcip(출처)
      - **jq** = JSON CLI processor. `.rule.id` syntax 로 nested 접근
      - **CSV** = 표준 ML 데이터 형식. sklearn / pandas 가 직접 load
      - **데이터 부재 시 2 path 정책** (CURRICULUM #7) = alerts.json 0 byte 시 fixture
        주입 가능 (SOC lab 패턴)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-siem 'sudo tail -100 /var/ossec/logs/alerts/alerts.json | \
          jq -r ". | [.timestamp, .rule.id, .rule.level, .agent.name, .data.srcip // \"unknown\"] | @csv" 2>/dev/null | head -10'
      ```

      ## 📋 확인 사항

      - CSV 출력 5 칼럼 (timestamp, rule_id, level, agent, srcip)
      - 10 행 정도 (tail -100 의 jq 추출)
      - rule.id 다양 (5710 / 5712 / 86601 등) — 분포 확인

      ## 💡 왜 이걸 하는가?

      ML 의 *첫 단계* = 데이터 추출 + 정규화. 본 step 의 CSV 가 step 2 의 sklearn
      `pd.read_csv` 직접 input.

      ## 🔍 결과 해석

      - **정상**: CSV 10 행 + rule.id 다양 분포
      - **출력 비어 있음**: alerts.json 0 byte (CURRICULUM #7 데이터 부재) →
        fixture 주입 `python3 scripts/lab_fixture_inject.py --lab ... --ssh`
      - **모든 srcip = "unknown"**: alert 가 Suricata/Wazuh 자체 alert (srcip 없음)
        만 — outbound traffic 추가 시도

      ## 비정상 시 대응

      - **jq 명령 없음** — `apt install jq`
      - **alerts.json 권한** — siem 컨테이너 root 로 실행
      - **CSV escape 오류** — jq 의 `@csv` 가 자동 처리. 단 한국어 필드 면 quote 추가 필요
    hint: |
      jq alerts.json → CSV 4 feature + srcip. ML input.
    category: analysis
    points: 20
    answer: |
      ssh 6v6-siem 'sudo tail -100 /var/ossec/logs/alerts/alerts.json | \
          jq -r ". | [.timestamp, .rule.id, .rule.level, .agent.name, .data.srcip // \"unknown\"] | @csv" 2>/dev/null | head -10'
    answer_detail: 4 feature CSV
