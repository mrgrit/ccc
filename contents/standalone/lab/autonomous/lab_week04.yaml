    :\"gemma3:4b\",\"prompt\":\"Explain self-healing in cybersecurity in 3 sentences\"\
    ,\"stream\":false,\"options\":{\"num_predict\":80}}' \\\n | python3 -c \"import\
    \ sys,json; print(json.load(sys.stdin)['response'])\""
