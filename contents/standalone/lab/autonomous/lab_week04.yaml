lab_id: autonomous-ai-week04
title: '[Non-AI] 자가 치유'
version: ai
course: autonomous-ai
week: 4
description: LLM 기반 자동 보안 문제 해결을 구현합니다. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: medium
duration_minutes: 120
objectives:
- 자동 문제 진단을 구현한다
- 수정 제안을 생성한다
- 복구 파이프라인을 구성한다
pass_threshold: 0.6
