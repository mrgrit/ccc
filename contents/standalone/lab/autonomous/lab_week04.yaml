      - 응답에 해당 주제 핵심 개념 최소 2개 포함
      - curl 또는 python requests 명시
      acceptable_methods:
      - curl $BASTION_URL/api/generate -d {model,prompt}
      - python urllib.request 또는 requests.post
      - Ollama Python SDK
      - bash + jq 로 파이프라인
      negative_signs:
      - LLM 호출 없이 개념만 설명
      - 결과 출력·저장 누락
      - 주제(자가 치유) 맥락과 무관한 일반 응답
  target_vm: manager
  script: "curl -s ${BASTION_URL:-http://localhost:8003}/api/generate \\\n  -d '{\"\
