  instruction: self-healing 모니터링 시스템을 구현하시오. 요청 통계와 보안 메트릭을 수집하라.
  hint: LLM 호출 통계를 수집하고 요약하세요.
  category: monitor
  points: 10
  answer: '🤖 프롬프트: self-healing 모니터링 시스템을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): python3 -c "import json, urllib.request\nmetrics = {''requests'':0,''tokens'':0,''errors'':0}\nfor
    p in [''What is self-healing?'',''Explain self-healing risks'',''How to defend
    self-healing?'']:\n    data = json.dumps({''model'':''gemma3:4b'',''prompt'':p,''stream'':False,''options'':{''num_predict'':15}}).encode()\n    req
    = urllib.request.Request(''${BASTION_URL:-http://localhost:8003}/api/generate'',data=data,headers={''Content-Type'':''application/json''})\n    try:\n        resp
    = json.loads(urllib.request.urlopen(req).read())\n        metrics[''requests'']+=1\n        metrics[''tokens'']+=resp.get(''eval_count'',0)\n    except:
