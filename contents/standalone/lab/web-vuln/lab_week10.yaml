lab_id: standalone-web-vuln-week10
title: "암호화 / 통신 보안 점검 — TLS / 약한 cipher / 인증서 / HSTS (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 10
description: |
  암호화 / 통신 보안 점검 (OWASP A02 Cryptographic Failures) — TLS 버전 / cipher
  suite / 인증서 검증 / HSTS / HTTP→HTTPS redirect 의 5 영역. testssl.sh / openssl
  s_client / sslscan / curl 의 4 도구 활용. 6v6 의 fw HAProxy 가 443 listen — TLS
  종단점.
difficulty: medium
duration_minutes: 120
prerequisites:
  - "W02 의 도구 환경 (sslscan, openssl, testssl.sh) 가용"
  - "fw 의 443 가 self-signed cert (curl -k 또는 인증서 무시)"
objectives:
  - "TLS 버전 (1.0 / 1.1 / 1.2 / 1.3) 별 지원 여부 + 약한 버전 (1.0/1.1) 차단 여부"
  - "cipher suite 식별 + 약한 cipher (RC4 / 3DES / NULL / EXPORT) 가용 여부"
  - "인증서 유효성 (subject / issuer / 만료일 / SAN)"
  - "HSTS 헤더 + redirect (HTTP→HTTPS) 정책"
  - "Red/Blue/Purple — Red 의 TLS handshake burst + Purple 의 cipher 강화 권고"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — TLS 버전 4 종 (1.0~1.3) 각각 지원 여부

      **어디서:** attacker
      **무엇을:** fw 의 443 (juice.6v6.lab HTTPS) 에 4 TLS 버전 각각 1 회 handshake 시도.

      | TLS | openssl 옵션 | 결과 (Connected/Handshake fail) |
      |---|---|---|
      | 1.0 | -tls1 | |
      | 1.1 | -tls1_1 | |
      | 1.2 | -tls1_2 | |
      | 1.3 | -tls1_3 | |

      ## 💡 왜?

      TLS 1.0/1.1 = 2020 deprecated (POODLE / BEAST). 운영 환경 에서 1.2 이상 만 허용.
      cipher / 인증서 보다 먼저 점검.

      ## 📋 채점

      - 4 버전 모두 시도 + 결과
      - 약한 버전 (1.0/1.1) 가용 시 위험 1 문장
    hint: "openssl s_client -connect juice.6v6.lab:443 -tls1_2 <<< '' 2>&1 | grep -E 'Protocol|Cipher|verify' | head -3"
    category: tls
    points: 12
    answer: |
      🤖 가이드:
      for v in tls1 tls1_1 tls1_2 tls1_3; do
        echo "--- $v ---"
        timeout 5 openssl s_client -connect juice.6v6.lab:443 -$v -servername juice.6v6.lab <<< '' 2>&1 | grep -E 'Protocol|Cipher|verify' | head -3
      done
    answer_detail: |
      6v6 fw 의 HAProxy default = TLS 1.2 + 1.3. 1.0/1.1 차단 (정상). OpenSSL 의 일부 옵션 (-tls1) 은 새 빌드 에서 제거 — alternative 로 -ciphers 사용.
    verify:
      intent: "TLS 4 버전 + 결과 표"
      success_criteria:
        - "4 버전 시도"
        - "결과 표"
        - "약한 버전 위험 분석"
      acceptable_methods:
        - "openssl s_client 또는 nmap ssl-enum-ciphers"
      negative_signs:
        - "1~2 버전만"
    target_vm: attacker
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — cipher suite 약점 식별

      **어디서:** attacker
      **무엇을:** sslscan 또는 nmap NSE 의 ssl-enum-ciphers 로 cipher 목록 + 약한 cipher (RC4 / 3DES / NULL / EXPORT) 가용 여부.

      **결과 정리:**
      ```
      지원 cipher 수: N
      가장 강한 cipher: <이름>
      가장 약한 cipher: <이름>
      약한 cipher (RC4/3DES/NULL/EXPORT) 가용? <yes/no>
      ```

      ## 📋 채점
      - cipher 목록 + 약한 cipher 식별
    hint: "sslscan juice.6v6.lab. 또는 nmap --script=ssl-enum-ciphers -p 443 juice.6v6.lab."
    category: tls
    points: 12
    answer: |
      🤖 가이드:
      sslscan juice.6v6.lab 2>&1 | head -40
      nmap --script=ssl-enum-ciphers -p 443 juice.6v6.lab 2>&1 | head -30
    answer_detail: |
      6v6 HAProxy default cipher = MEDIUM-HIGH (HIGH:!aNULL:!MD5). RC4/3DES/NULL 제외. SSL Labs A grade 권장.
    verify:
      intent: "cipher 목록 + 약한 cipher 식별"
      success_criteria:
        - "cipher 목록"
        - "약한 cipher 유무"
      acceptable_methods:
        - "sslscan 또는 nmap NSE"
      negative_signs:
        - "도구 결과 paste 만"
    target_vm: attacker
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — 인증서 + HSTS + redirect

      **무엇을:**
      1. 인증서 subject / issuer / 만료일 / SAN 추출
      2. HSTS 헤더 (Strict-Transport-Security) 확인
      3. HTTP (80) 으로 접근 시 HTTPS (443) 으로 redirect 되는가

      ## 📋 채점
      - 인증서 4 항목
      - HSTS 가동 여부
      - redirect 정책
    hint: "openssl s_client -showcerts. curl -sI http://juice.6v6.lab 의 Location 헤더."
    category: tls
    points: 10
    answer: |
      🤖 가이드:
      timeout 5 openssl s_client -connect juice.6v6.lab:443 -servername juice.6v6.lab -showcerts <<< '' 2>&1 | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>&1 | head -10
      curl -sI https://juice.6v6.lab -k | grep -i strict-transport
      curl -sI http://juice.6v6.lab | grep -i 'location\|^HTTP'
    answer_detail: |
      6v6 의 self-signed cert — subject/issuer 동일 (CA 부재). HSTS 미설정 (학습용). HTTP → HTTPS redirect 정책 미흡. 운영 환경 finding 다수.
    verify:
      intent: "인증서 4 항목 + HSTS + redirect"
      success_criteria:
        - "인증서 subject/issuer/dates/SAN"
        - "HSTS 결과"
        - "redirect 정책"
      acceptable_methods:
        - "openssl + curl"
      negative_signs:
        - "1~2 항목만"
    target_vm: attacker
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION — testssl.sh 종합 + 보고서 + cleanup

      **무엇을:**
      1. testssl.sh juice.6v6.lab 종합 grade (A~F)
      2. 3 finding (TLS / cipher / 인증서) 통합 markdown
      3. cleanup

      ## 📋 채점
      - testssl.sh 결과 grade
      - 3 finding 보고서
      - cleanup
    hint: "git clone --depth 1 https://github.com/drwetter/testssl.sh ~/testssl.sh (필요 시). ~/testssl.sh/testssl.sh --quiet --color 0 juice.6v6.lab 2>&1 | head -50."
    category: documentation
    points: 8
    answer: |
      🤖 가이드:
      [ ! -d ~/testssl.sh ] && git clone --depth 1 https://github.com/drwetter/testssl.sh ~/testssl.sh
      ~/testssl.sh/testssl.sh --quiet --color 0 juice.6v6.lab 2>&1 | grep -E 'Overall|rating|grade|HIGH|MEDIUM' | head -20
      rm -f /tmp/*.out 2>/dev/null
    answer_detail: |
      testssl.sh = TLS 종합 점검 의 표준. SSL Labs API 와 유사 한 결과. Overall rating A~F.
    verify:
      intent: "testssl.sh + 3 finding + cleanup"
      success_criteria:
        - "testssl.sh 실행 + grade"
        - "3 finding"
        - "cleanup"
      acceptable_methods:
        - "testssl.sh 또는 SSL Labs equiv"
      negative_signs:
        - "도구 결과 paste 만"
    target_vm: attacker
    risk_level: low
