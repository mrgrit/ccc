    ▶ Phase A — 로그인 후 인증 토큰 분석 (lecture #1·#4)

    `curl -s -i -X POST -H "Content-Type: application/json"

    -d ''{"email":"admin@juice-sh.op","password":"admin123"}'' http://juice.6v6.lab/rest/user/login`

    실행. 응답에서 `authentication.token` (JWT) 추출. JWT 3-part (header.payload.signature)
    구조 + base64

    header decode (`cut -d. -f1 | base64 -d`) → alg / typ 확인 (Juice Shop = **RS256**).

    payload decode (`cut -d. -f2 | base64 -d`) → iat / exp / role / email 확인.

    추가: alg=RS256 → "none" 변조 시도가 통하는지 검토 (W05 의 JWT 변조 lab 의 전조).


    ▶ Phase B — CSRF PoC + SameSite 영향 (lab #1·#2·#5)

    JuiceShop 은 JWT Authorization 헤더 방식이므로 *전형적 CSRF 가 안 박힘* — 그 이유 자체가 학습 포인트.

    가상의 Cookie 기반 사이트 가정해, 패스워드 변경 위조 HTML 작성 (`<form action=... method=POST>` +

    `<input name=newpw>` + auto submit script). SameSite=Strict 시 차단 / Lax 시 GET 만
    차단 / None 시

    무방어 — 3 케이스 매트릭스로 구분.


    ▶ Phase C — 인증방식 × CSRF 방어 매트릭스 (lecture·lab 통합)

    | 인증방식 | CSRF 자동발동 | 권장 방어 | 비고 |

    | Session Cookie | 가능 | CSRF Token + SameSite=Lax | Double Submit |

    | JWT in Cookie | 가능 | CSRF Token + SameSite=Strict | 비추천 |

    | JWT in Header | 불가 | CORS + Origin 검증 | 권장 |

    | OAuth2 PKCE | 부분 | state 파라미터 | code intercept 방어 |

    표 끝에 "JuiceShop = JWT-Header → CORS·Origin 검증 권고" 한 줄.


    종료: echo "=== Phase A JWT decode ===" / "=== Phase B SameSite 매트릭스 ===" / "===
    Phase C 매트릭스 ===".



