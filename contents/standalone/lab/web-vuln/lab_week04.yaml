  instruction: |
    [목표] Double Submit Cookie 방어의 원리를 Synchronizer Token Pattern 과 비교하고,
    Stateless / Stateful trade-off 와 known weakness 를 분석한다.

    [원리]
      1. 서버가 랜덤 토큰을 응답에 *Cookie* 와 *body/header* 두 곳에 동시 송신
      2. 클라이언트 JS 가 cookie 값을 읽어 `X-CSRF-Token` 헤더에 복사 (또는 form hidden)
      3. 서버는 cookie 값 == 헤더 값 비교 (정확히 일치해야 통과)
      4. cross-origin 공격자는 *피해자의 cookie 값을 읽을 수 없음* → 헤더 위조 불가

    [Synchronizer Token (전통적) 과 비교]
      | 항목              | Synchronizer Token       | Double Submit Cookie    |
      | ----------------- | ------------------------ | ----------------------- |
      | 서버 저장          | 세션 store (Stateful)    | 없음 (Stateless)        |
      | 검증 방식          | 세션 토큰 == 폼 토큰     | cookie == 헤더          |
      | 확장성             | 세션 store 필요          | 무상태 → 수평 확장 쉬움 |
      | 알려진 약점        | 세션 fixation 영향        | subdomain cookie 변조   |
      | 권장 환경          | 단일 monolith             | API gateway, micro-svc  |

    [알려진 약점]
      - subdomain cookie 변조 : *.victim.com 의 takeover 된 subdomain 이 victim.com 의 cookie
        설정 (Cookie 의 Domain 속성 활용) → 공격자 토큰을 피해자 브라우저에 주입 가능
      - HMAC 미적용 시 : 단순 random token 비교는 cookie tossing 공격 노출
      - 권장: **Signed Double Submit** (HMAC(session_id || token) 검증)

    [실행]
      cat <<'REPORT'
      === Double Submit Cookie 방어 ===
      1. 서버 → Set-Cookie: csrf=<32byte_random>
      2. 클라이언트 JS → X-CSRF-Token 헤더에 cookie 값 복사
      3. 서버 → cookie == header 일치 확인 (HMAC 비교 권장)
      약점: subdomain cookie 변조 (cookie tossing)
      대응: Signed Double Submit (HMAC(session_id || token))
      === Double Submit 분석 완료 ===
      REPORT

