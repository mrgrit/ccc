    [5 계층 다층 방어]
      Layer 1 — **Cookie 정책**     : SameSite=Lax/Strict + Secure + HttpOnly
      Layer 2 — **CSRF 토큰**       : Synchronizer (Stateful) 또는 Signed Double Submit
      Layer 3 — **Origin/Referer**  : Origin 헤더 화이트리스트 검증 (Referer 는 보조)
      Layer 4 — **CORS**            : ACAO 화이트리스트 + ACAC 필요한 endpoint 만 true
      Layer 5 — **운영적 방어**      : 민감 작업 재인증 (step-up) + 이상 패턴 모니터링

    [인증 모델 별 권장 매트릭스]
      Cookie + Session    : L1 (SameSite=Lax 기본) + L2 (토큰 필수) + L3 (Origin) + L5
      JWT in Cookie       : L1 (SameSite=Strict) + L2 (토큰) + L3 + L4 (비추천 — JWT-Header)
      JWT in Header (권장) : L3 + L4 (ACAO 화이트리스트) + L5 + 짧은 exp + RefreshToken Rotation
      OAuth2 PKCE        : state 파라미터 + nonce + L5 (재인증)

