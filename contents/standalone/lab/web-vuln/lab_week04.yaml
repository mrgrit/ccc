lab_id: standalone-web-vuln-week04
title: "인증/세션 관리 점검 — 약한 PW / JWT / 쿠키 속성 / 세션 고정 / 인증 우회 (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 4
description: |
  JuiceShop 의 /rest/user/login 을 인증·세션 측면 으로 점검. 약한 비밀번호 (default
  credentials + brute force), JWT 구조 분석, 쿠키 속성 (HttpOnly/Secure/SameSite),
  세션 고정, 인증 우회 1 패턴 (단순 SQLi — 본격 SQLi 는 W05 에서) 의 5 카테고리.

  Red 의 brute force / 우회 시도 는 fw 의 forward log + Apache access.log + Wazuh
  rule 5710 / 100002 가동. Blue 는 dashboard 에서 시간순 alert 확인 + 점검자 의
  Red 활동 baseline 학습.
difficulty: medium
duration_minutes: 120
audience: 웹 보안 입문자 (4주차)
prerequisites:
  - "W03 의 정찰 결과 — 인증 endpoint (/rest/user/login) + 등록 endpoint (/api/Users) 식별 완료"
  - "attacker 컨테이너 에 curl / hydra / jq 가용 + jwt 분석 위한 base64 / python3 가용"
  - "JuiceShop 의 default 자격증명 (admin@juice-sh.op / admin123) 의 *존재* 만 알고 있음 (직접 사용 X — 점검 결과 로 발견)"
objectives:
  - "정상 로그인 (admin@juice-sh.op / admin123) 의 응답 JWT 구조 (header.payload.signature) 디코딩"
  - "약한 비밀번호 wordlist 5~10 단어 로 admin 계정 brute force 시도 (성공/실패 응답 패턴 차이)"
  - "Set-Cookie 헤더 의 HttpOnly / Secure / SameSite 속성 표 정리 + 결손 의 위험 분석"
  - "세션 고정 시도 — 로그인 전후 session 토큰 비교 (regenerate 여부)"
  - "인증 우회 1 패턴 (단순 ' OR 1=1-- 등) 시도 + 결과 (성공/실패 + 응답 패턴)"
  - "Red/Blue/Purple — brute force burst 가 Wazuh rule 5710 (multiple failed login) 가동 → 점검자 의 자기 식별 가능성"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 정상 로그인 + JWT 구조 분석

      **어디서:** attacker 컨테이너
      **무엇을:** JuiceShop 의 default 관리자 자격증명 으로 /rest/user/login 정상
      로그인. 응답 JSON 의 `authentication.token` (JWT) 을 3 부분 (header /
      payload / signature) 으로 분해 + Base64 디코딩.

      ⚠️ default 자격증명: `admin@juice-sh.op` / `admin123` — JuiceShop 의 의도적
      challenge. 본 lab 에서만 사용. 운영 환경 에서 이런 자격증명 은 점검 첫 finding.

      **결과 어떻게 정리:**

      | 부분 | Base64 (앞 20 자) | 디코딩 한 JSON | 학생 본인 의 1 줄 해석 |
      |---|---|---|---|
      | header | | | |
      | payload | | | |
      | signature | (서명 — 디코딩 X) | (none) | (RS256 의 RSA 서명 — 변조 시 검증 실패) |

      ## 💡 왜 이걸 하는가?

      JWT = OAuth/OIDC/대다수 SPA 의 인증 토큰. 구조 (header.payload.signature) +
      알고리즘 (header 의 `alg`) + payload 의 claim (sub/exp/role) 을 직접 디코딩
      해 보면 W11 의 *JWT 변조 공격* (alg=none / weak secret / key confusion) 의
      이해 가 쉬워진다.

      ## 🔵 Blue 측 관찰

      정상 로그인 1 회 = web access.log 의 `POST /rest/user/login HTTP/1.1 200` +
      Wazuh rule 100002 (web request) 1 line. *성공 응답* 이라 alert level 낮음.

      ## 📋 채점 기준

      - 정상 로그인 1 회 + JWT 받음
      - 3 부분 분리 + header/payload 디코딩 결과 인용
      - payload 의 알려진 claim (sub/iat/exp 등) 학생 본인 해석
    hint: "POST /rest/user/login with JSON body `{\"email\":\"admin@juice-sh.op\",\"password\":\"admin123\"}`. 응답 JSON 의 .authentication.token. JWT 분해 = token.split('.') — base64url 디코딩 (Python: `base64.urlsafe_b64decode(part + '==' * 3)` 또는 `cut -d. -f2 | base64 -d`)."
    category: auth
    points: 12
    answer: |
      🤖 자기학습용 정답 가이드:
      T=$(curl -s -X POST http://juice.6v6.lab/rest/user/login -H 'Content-Type: application/json' -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r '.authentication.token')
      echo "$T" | head -c 80; echo
      echo "$T" | cut -d. -f1 | base64 -d 2>/dev/null | jq .
      echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | jq .
    answer_detail: |
      JuiceShop 의 JWT alg = RS256 (header). payload 에 .data.id + .data.role +
      .iat + .exp. role=admin 변조 가능 여부 = W11 의 본격 점검 주제. base64url 의
      padding 부족 시 `==` 추가.
    verify:
      intent: "정상 로그인 + JWT 3 부분 디코딩 + payload claim 해석"
      success_criteria:
        - "로그인 1 회 + token 수신"
        - "header + payload 디코딩 결과 인용"
        - "payload claim (sub/iat/exp/role 등) 학생 해석"
      acceptable_methods:
        - "curl + jq 또는 python3 (jwt 라이브러리 또는 base64 수동)"
        - "JWT 구조 시각화 다양 (표 / json block / 등)"
      negative_signs:
        - "로그인 실패 (자격증명 오타)"
        - "디코딩 안 한 token paste 만"
        - "payload claim 해석 없음"
    target_vm: attacker
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — 약한 비밀번호 brute force (hydra) — 5~10 단어 wordlist

      **어디서:** attacker 컨테이너
      **무엇을:** hydra 의 http-post-form 으로 admin@juice-sh.op 계정 에 5~10
      단어 wordlist (admin / admin123 / password / qwerty / 123456 / letmein 등)
      brute force. 결과 의 성공 응답 패턴 식별.

      ⚠️ **시간 + scope 제한**: 1 사용자 + 10 단어 wordlist 만. 운영 환경 brute
      force = lockout 정책 / IP 차단 우려 — lab 환경 의 의도적 학습.

      **결과 어떻게 정리:**

      ```
      hydra 명령: <학생 작성 한 명령 한 줄>

      시도한 비밀번호 (10 단어): admin, admin123, password, qwerty, 123456, letmein, ...

      결과: 어느 비밀번호 가 성공 했나? → <비밀번호>
      성공 응답 패턴: <응답 body 의 어떤 string 으로 success 판별?>

      실패 응답 패턴: <응답 body 의 어떤 string 으로 fail 판별?>

      학생 1 문장 해석: 약한 비밀번호 의 위험 + lockout 정책 의 필요성
      ```

      ## 💡 왜 이걸 하는가?

      brute force = 가장 단순 한 공격 이지만 약한 비밀번호 정책 + 미흡 한 lockout
      이 결합 하면 admin 계정 완전 탈취. 점검 의 핵심 finding 중 하나. hydra 의
      http-post-form 사용법 = 다른 폼 기반 인증 (W04 의 다른 시나리오 + 운영 환경
      brute force) 의 base.

      ## 🔵 Blue 측 관찰

      hydra 의 burst = web access.log 의 10 회 POST /rest/user/login. Wazuh rule
      5710 (multiple failed login attempts) 가동 가능. ModSecurity 의 rate-limit
      룰 도 동작 시 일부 요청 403 차단. *점검자 의 brute force 흔적* 의 baseline.

      ## 📋 채점 기준

      - hydra 명령 1 회 실행 (10 단어 wordlist)
      - 성공/실패 응답 패턴 식별
      - 학생 본인 의 위험 해석 1 문장
    hint: "hydra 의 http-post-form syntax: `hydra -l email -P wordlist.txt URL http-post-form '/path:body:F=fail_string'`. JuiceShop 의 로그인 응답 = JSON. 실패 시 `Invalid email or password.` 메시지 — 이를 `F=` 의 fail string 으로."
    category: auth
    points: 14
    answer: |
      🤖 자기학습용 정답 가이드:
      cat > /tmp/pw.txt <<EOF
      admin
      admin123
      password
      qwerty
      123456
      letmein
      Password1
      admin@123
      P@ssw0rd
      changeme
      EOF
      hydra -l 'admin@juice-sh.op' -P /tmp/pw.txt \
        juice.6v6.lab http-post-form \
        '/rest/user/login:{"email":"^USER^","password":"^PASS^"}:Invalid' \
        -V 2>&1 | tail -10
    answer_detail: |
      hydra http-post-form 의 colon 분리: `path:body:fail_str`. JuiceShop 의 로그인 실패
      응답 body 에 `Invalid email or password.` — fail string 으로 사용. body 가 JSON
      이므로 Content-Type 자동 application/json 으로 보내짐 (hydra 의 default).
      성공 시 hydra 출력 의 `[80][http-post-form] host: ... login: ... password: ...`.
    verify:
      intent: "hydra 1 회 + 성공/실패 응답 패턴 식별 + 약한 PW 위험 해석"
      success_criteria:
        - "hydra 명령 실행 + 결과"
        - "성공 한 비밀번호 식별"
        - "실패 응답 의 fail_string 명시"
        - "위험 해석 1 문장"
      acceptable_methods:
        - "hydra http-post-form 또는 학생 본인 의 python 스크립트"
        - "wordlist 5~10 단어 (admin123 포함 필수)"
      negative_signs:
        - "wordlist 100+ 단어 (운영 환경 brute force 패턴)"
        - "성공 패턴 식별 없이 출력 paste"
        - "위험 해석 누락"
    target_vm: attacker
    risk_level: medium

  - order: 3
    instruction: |
      ## 🎯 MISSION — Set-Cookie 헤더 의 HttpOnly / Secure / SameSite 속성 표 정리

      **어디서:** attacker 컨테이너
      **무엇을:** JuiceShop 의 응답 헤더 의 모든 `Set-Cookie` 라인 의 3 속성
      (HttpOnly / Secure / SameSite) 의 *존재 여부* 표 + 각 속성 결손 의 위험.

      **결과 어떻게 정리:**

      | 쿠키 이름 | HttpOnly | Secure | SameSite | 결손 의 위험 (학생 본인 1 줄) |
      |---|---|---|---|---|
      | (cookie 1) | ✓/✗ | ✓/✗ | ✓/✗/Lax/Strict/None | |
      | (cookie 2) | | | | |

      ## 💡 왜 이걸 하는가?

      - **HttpOnly 결손**: JS document.cookie 로 토큰 탈취 가능 → XSS 와 결합 시 세션 hijack
      - **Secure 결손**: HTTP (비 TLS) 채널 로 쿠키 전송 → MITM 시 평문 캡처
      - **SameSite 결손 또는 None**: CSRF 공격 가능 (W06 의 본격 주제)

      운영 환경 인증 점검 의 단골 finding. OWASP A07 Identification and Authentication Failures.

      ## 🔵 Blue 측 관찰

      쿠키 속성 자체 는 application-level 결함 — Blue 의 IDS / WAF 로 detection 불가.
      Purple 의 코드 리뷰 / config 검토 의 영역.

      ## 📋 채점 기준

      - 모든 Set-Cookie 헤더 추출
      - 3 속성 의 존재 여부 표
      - 결손 시 위험 학생 본인 1 줄
    hint: "curl -sI http://juice.6v6.lab/ 만 으로 일부 Set-Cookie. 로그인 후 응답 (curl -X POST + -c cookie.txt) 의 헤더 도 함께 보면 모든 쿠키. 학생 본인 의 grep / awk 로 추출."
    category: auth
    points: 10
    answer: |
      🤖 자기학습용 정답 가이드:
      curl -sI http://juice.6v6.lab/ | grep -i '^set-cookie' | head -5
      curl -sI -X POST http://juice.6v6.lab/rest/user/login \
        -H 'Content-Type: application/json' \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' \
        | grep -i '^set-cookie' | head -5
    answer_detail: |
      JuiceShop 응답 의 일반적 쿠키: `language` (locale), `welcomebanner_status` (UI),
      `cookieconsent_status` (GDPR). 인증 토큰 자체 는 *body 의 JWT* — 쿠키 X.
      그러나 SPA 에서 쿠키 + JWT 혼용 운영 환경 도 다수. 학생 의 분석 = "JWT 가
      JS localStorage 에 저장 되면 XSS 시 같은 위험" 도 연결 가능.
    verify:
      intent: "Set-Cookie 의 3 속성 표 정리 + 결손 위험 해석"
      success_criteria:
        - "모든 Set-Cookie 추출"
        - "3 속성 표"
        - "결손 위험 해석 (학생 본인 단어)"
      acceptable_methods:
        - "curl -I / -sI 또는 -v"
        - "헤더 추출 form 자유 (grep / awk / python)"
      negative_signs:
        - "쿠키 1 개 만"
        - "속성 표 없이 paste"
        - "결손 위험 누락"
    target_vm: attacker
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION — 세션 고정 (Session Fixation) 시도

      **어디서:** attacker 컨테이너
      **무엇을:** 로그인 전 과 후 의 session 토큰 비교 — 로그인 후 token 이 새로
      *발급* 되면 세션 고정 안전, *그대로 유지* 되면 취약. JWT 기반 SPA 에서는
      "로그인 전 토큰 자체 가 존재 안 함" 이 표준 — 학생 이 직접 확인.

      **결과 어떻게 정리:**

      ```
      1. 로그인 전: GET / 응답 의 Set-Cookie 또는 body 토큰 — <있음/없음 + 토큰 일부>
      2. 로그인 후: POST /rest/user/login 응답 의 token — <token 일부>
      3. 두 토큰 비교: <같음/다름/로그인 전 토큰 없음>
      4. 세션 고정 위험: <안전/취약/JWT 의 무 세션 stateless 패턴>
      5. 학생 분석: <1 문장 — JuiceShop 의 인증 구조 가 세션 고정 에 안전한 이유 또는 위험>
      ```

      ## 💡 왜 이걸 하는가?

      세션 고정 = 공격자 가 사전 에 알려 진 session ID 를 피해자 에게 강제 후 피해자
      로그인 → 공격자 가 같은 session ID 로 인증 된 상태 접근. session ID 가
      로그인 시 regenerate 되면 안전. JWT 의 stateless 모델 은 구조 자체 가
      안전 하나, "로그인 전 anonymous session" 이 있는 운영 환경 에서는 여전히 위험.

      ## 🔵 Blue 측 관찰

      세션 고정 시도 = 정상 GET + POST 시퀀스. Blue 의 IDS / WAF 로 detection 불가
      — application-level + 시계열 분석 필요.

      ## 📋 채점 기준

      - 로그인 전/후 token 비교 결과
      - 세션 고정 위험 판정 (안전/취약/N/A)
      - 학생 본인 1 문장 해석
    hint: "curl -c /tmp/before.txt http://juice.6v6.lab/ 로 로그인 전 cookie 저장. 로그인 후 -b /tmp/before.txt 로 같은 cookie 보내며 token 비교."
    category: auth
    points: 10
    answer: |
      🤖 자기학습용 정답 가이드:
      curl -c /tmp/before.txt -s http://juice.6v6.lab/ -o /dev/null
      cat /tmp/before.txt | head -5
      T1=$(curl -s -X POST http://juice.6v6.lab/rest/user/login \
        -b /tmp/before.txt -c /tmp/after.txt \
        -H 'Content-Type: application/json' \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r '.authentication.token')
      echo "after token first 30: $(echo $T1 | head -c 30)"
      diff /tmp/before.txt /tmp/after.txt 2>&1 | head -5
    answer_detail: |
      JuiceShop 의 anonymous session = `language` / `welcomebanner_status` 등 비 인증 쿠키 만.
      인증 토큰 (JWT) 은 body 로 전달 — stateless. *로그인 전 토큰 없음* 이 표준.
      세션 고정 의 risk 0 (구조적). 단 운영 환경 의 PHP / Java session 기반 앱 은 다름.
    verify:
      intent: "로그인 전/후 token 비교 + 세션 고정 위험 판정 + 학생 해석"
      success_criteria:
        - "로그인 전/후 token 모두 수집"
        - "비교 결과 (같음/다름/없음)"
        - "위험 판정 + 학생 1 문장"
      acceptable_methods:
        - "curl -c -b cookie jar 또는 직접 token 비교"
        - "JWT 의 anonymous 부재 분석 도 정답"
      negative_signs:
        - "1 token 만 수집"
        - "비교 없이 token paste"
        - "위험 판정 없음"
    target_vm: attacker
    risk_level: low

  - order: 5
    instruction: |
      ## 🎯 MISSION — 인증 우회 1 패턴 (단순 SQLi — ' OR 1=1--) 시도

      **어디서:** attacker 컨테이너
      **무엇을:** /rest/user/login 의 email 필드 에 `' OR 1=1--` payload 1 회 시도
      + 응답 분석. **본격 SQLi 는 W05 — 여기서는 *인증 우회* 의 한 사례 로 1 패턴
      만**.

      ⚠️ 이 step 의 의도 = SQLi 가 *인증 우회 의 가장 빠른 방법* 인 점 의 학습.
      성공/실패 두 경우 모두 학습 가치.

      **결과 어떻게 정리:**

      ```
      1. payload: email='\\' OR 1=1--', password='anything'
      2. 응답 코드: <200 / 401 / 403 / 500>
      3. 응답 body 처음 1~3 줄: <인용>
      4. 인증 우회 성공? <yes/no/error>
