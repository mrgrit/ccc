      | Rails              | ON          | protect_from_forgery      | skip_before_action :verify_     |
      | Spring Security    | ON (since 4)| CsrfFilter (Cookie token) | http.csrf().disable()           |
      | Express (csurf)    | OFF (별도)  | csurf middleware (deprec) | 설치 안 함 (default)             |
      | Laravel            | ON          | VerifyCsrfToken Middleware| $except 배열 추가                |
      | NestJS             | OFF (별도)  | @nestjs/csrf (별도)        | 설치 안 함 (default)             |
      | FastAPI            | OFF (별도)  | fastapi-csrf-protect      | 설치 안 함 (default)             |

    [관찰 핵심]
      - SSR + form 기반 (Django/Rails/Laravel) = 기본 ON, 자동 토큰 삽입
      - API-only / SPA backend (Express/NestJS/FastAPI) = 기본 OFF — JWT-Header 가정
      - Spring Security 는 양쪽 다 — disable() 가 자주 보이는 위험 코드 패턴
