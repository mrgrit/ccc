steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — JuiceShop search 의 XSS 5 변형 × ModSec 941 카운트

      JuiceShop 의 `?q=` 파라미터 의 *XSS 5 변형* (평문 / case mixing / svg / img /
      event handler) 각 의 응답 + 941 카운트 매트릭스.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **XSS** = Cross-Site Scripting — 사용자 브라우저 의 *임의 JS 실행*
      - **3 종**: Stored (DB 저장 → 모든 user) / Reflected (URL → 한 user) / DOM (JS
        의 사용자 입력 처리)
      - **ModSec CRS 941 family** = XSS 차단 (941100 base / 941160 event handler 등)
      - **libinjection (XSS)** = `libinjection_xss()` — token 의 분석
      - **5 변형** = baseline / case mixing / encoded / nested / event handler

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      BEFORE=$(docker exec 6v6-web bash -c "sudo grep -c 'id..\"941' /var/log/apache2/modsec_audit.log")

      payloads=(
        "<script>alert(1)</script>"
        "<ScRiPt>alert(1)</ScRiPt>"
        "%3Cscript%3Ealert(1)%3C/script%3E"
        "<svg/onload=alert(1)>"
        "<img src=x onerror=alert(1)>"
      )

      for p in "${payloads[@]}"; do
        encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$p'))")
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -H 'Host: juice.6v6.lab' \
          "http://10.20.30.1/?q=$encoded")
        echo "$code | $p"
      done

      AFTER=$(docker exec 6v6-web bash -c "sudo grep -c 'id..\"941' /var/log/apache2/modsec_audit.log")
      echo "941 차단 증가: $((AFTER - BEFORE))"
      SH
      ```

      ## 📋 확인 사항

      - 5 변형 모두 403 (ModSec 941 차단)
      - 941 차단 카운트 증가 = 5+ (각 payload 1+ rule 매칭)

      ## 💡 왜 이걸 하는가?

      XSS = web 의 *가장 흔한 vuln*. *5 변형 의 차단 매트릭스* 가 *WAF 의 품질* 측정.

      ## 🔍 결과 해석

      - **정상 (강력 WAF)**: 5×403 + 941 증가 5+
      - **일부 200 (우회)**: paranoia 상승 또는 libinjection 활성 권장

      ## 비정상 시 대응

      - **curl error (000)**: URL encoding 누락 — python3 urllib.parse.quote 적용

      ## 실측 (2026-05-16)
      - JuiceShop: 3/4 payload 403 + 1 의 curl error (공백 escape)
