  - order: 3
    instruction: |
      ## 🎯 MISSION — CSP (Content Security Policy) 의 5 directive + 우회 시도

      6v6 의 7 vhost 의 *CSP 헤더* 분석 + CSP 의 *5 directive* 인지 + 우회 시도
      (script-src bypass).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **CSP** = Content Security Policy (RFC 7762) — *허용 source* whitelist
      - **5 핵심 directive**:
        - `default-src` = fallback (모든 type)
        - `script-src` = JS 의 source 제한 (가장 중요)
        - `style-src` = CSS source
        - `img-src` = image source
        - `connect-src` = AJAX / WebSocket source
      - **'self'** = 같은 origin 만
      - **'unsafe-inline'** = `<script>...</script>` 의 inline 허용 (XSS 위험)
      - **'nonce-XXX'** = 한 페이지 의 *한 번 만* 의 nonce

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== 7 vhost 의 CSP 헤더 ==="
      for h in juice dvwa neobank govportal mediforum admin aicompanion; do
        csp=$(curl -sI -H "Host: $h.6v6.lab" http://10.20.30.1/ 2>&1 | grep -i 'content-security-policy' | head -1 | cut -c1-100)
        echo "$h: ${csp:-CSP 없음}"
      done

      echo ""
      echo "=== CSP 우회 시뮬 (script-src 'self' 의 inline 차단 확인) ==="
      cat <<'EOF'
      CSP: script-src 'self'
        ✓ <script src="/app.js"></script>     ← 허용 (same origin)
        ✗ <script>alert(1)</script>           ← 차단 (inline)
        ✗ <script src="https://evil.com/x.js"></script>  ← 차단 (외부)

      CSP: script-src 'self' 'unsafe-inline'
        ✓ <script>alert(1)</script>           ← 허용 (unsafe-inline)

      우회 패턴:
        1. JSONP endpoint (allowed origin)
        2. AngularJS / VueJS 의 *expression* (older version)
        3. 같은 origin 의 *upload 가능 파일* (XSS via upload)
      EOF
      SH
      ```

      ## 📋 확인 사항

      - 7 vhost 의 CSP 적용 여부
      - CSP 의 *5 directive* + 'self' / 'unsafe-inline' / nonce 사용
      - 우회 패턴 3+ 인지

      ## 💡 왜 이걸 하는가?

      CSP = *modern XSS 방어 의 표준*. 단 *모든 vuln 해결 X* — *우회 가능*. CSP +
      *output encoding* 의 *2 축* 필수.

      ## 🔍 결과 해석

      - **CSP 있음 + strict**: `script-src 'self'` 만 — strong
      - **CSP 있음 + 'unsafe-inline'**: 절반 — inline XSS 가능
      - **CSP 없음**: 무방비 — 즉시 적용 권장
    hint: |
