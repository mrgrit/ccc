  - order: 4
    instruction: |
      ## 🎯 MISSION — DOM XSS 의 *5 sink* 인지 + 시뮬

      DOM XSS = JS 의 *사용자 입력 처리* 의 vuln. server 의 response 변경 없음 —
      *client-side 만*. *5 위험 sink* 인지.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **DOM XSS** = `document.write` / `eval` / `innerHTML` / `setTimeout(string)` /
        `location.href` 의 5 sink
      - **source vs sink** = source (사용자 입력) → sink (실행 위치)
      - **DOMPurify** = client-side HTML 의 sanitize lib
      - **trusted types** = modern browser 의 *enforce 모드*

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== JuiceShop 의 JS 의 5 sink grep ==="
      curl -s -H 'Host: juice.6v6.lab' http://10.20.30.1/ > /tmp/juice.html
      curl -s -H 'Host: juice.6v6.lab' http://10.20.30.1/main.js 2>&1 > /tmp/juice-main.js

      echo "innerHTML: $(grep -c 'innerHTML' /tmp/juice.html /tmp/juice-main.js 2>/dev/null | awk -F: '{s+=$2} END {print s}')"
      echo "eval: $(grep -c 'eval(' /tmp/juice.html /tmp/juice-main.js 2>/dev/null | awk -F: '{s+=$2} END {print s}')"
      echo "document.write: $(grep -c 'document.write' /tmp/juice.html /tmp/juice-main.js 2>/dev/null | awk -F: '{s+=$2} END {print s}')"
      echo "setTimeout: $(grep -c 'setTimeout' /tmp/juice.html /tmp/juice-main.js 2>/dev/null | awk -F: '{s+=$2} END {print s}')"
      echo "location.href: $(grep -c 'location.href' /tmp/juice.html /tmp/juice-main.js 2>/dev/null | awk -F: '{s+=$2} END {print s}')"

      echo ""
      echo "=== DOM XSS 시뮬 payload ==="
      cat <<'EOF'
      vuln 코드 예:
        const params = new URLSearchParams(location.search);
        document.getElementById('result').innerHTML = params.get('name');

      payload: ?name=<img src=x onerror=alert(1)>
        ← innerHTML 의 *script tag 차단 default*
        ← 단 *event handler (onerror)* 의 *실행*
      EOF
      SH
      ```

      ## 📋 확인 사항

      - JuiceShop 의 JS 의 *5 sink* count
      - DOM XSS 의 *vuln 코드 패턴* 인지
      - *img onerror* 의 *innerHTML 의 script tag 차단 우회* 인지

      ## 💡 왜 이걸 하는가?

      DOM XSS = *server log 에 X* (client 만). server-side WAF (ModSec) 의 *완전
      우회*. CSP + DOMPurify 의 *client-side 방어* 필수.

      ## 🔍 결과 해석

      - **modern app (Angular/React/Vue)**: 5 sink 자동 escape — DOM XSS 거의 X
      - **legacy jQuery**: `$().html()` 의 *unsafe* 다수
      - **trusted types 적용**: enforce 모드 — 모든 *string → DOM* 의 *type 검증*
    hint: |
      5 sink (innerHTML/eval/document.write/setTimeout/location.href) grep + 시뮬.
    category: analysis
    points: 15
    answer: |
      ssh 6v6-attacker bash <<'SH'
      curl -s -H 'Host: juice.6v6.lab' http://10.20.30.1/ > /tmp/juice.html
      curl -s -H 'Host: juice.6v6.lab' http://10.20.30.1/main.js > /tmp/juice-main.js 2>&1
      for sink in innerHTML 'eval(' 'document.write' setTimeout 'location.href'; do
        echo "$sink: $(grep -c "$sink" /tmp/juice.html /tmp/juice-main.js 2>/dev/null | awk -F: '{s+=$2} END {print s}')"
      done
      SH
    answer_detail: 5 sink grep + DOM XSS 시뮬
