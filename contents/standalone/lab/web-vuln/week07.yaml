      ## 3. Remediation
      - 즉시: 5 보안 헤더 적용 (Apache: `Header always set`)
      - 단기: server fingerprint 제거 (`ServerTokens Prod`)
      - 장기: 자동 audit (CI 의 securityheaders.com 통합)

      ## 4. 매핑
      | F | CVSS | CWE |
