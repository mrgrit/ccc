    answer_detail: default page 노출 enum
    verify:
      type: output_contains
      expect: 'server-status\|robots\|.git'
      field: stdout
      semantic:
        intent: default page enum
        success_criteria: [42 시도]
        acceptable_methods:
          - "**[OSS] curl + 6 default path**"
          - "**[OSS] gobuster dir brute (extended wordlist)**"
          - "**[OSS] OWASP DirBuster**"
          - "**[OSS] feroxbuster recursive**"
          - "**[OSS] CWE-548 Information Exposure Through Directory Listing**"
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 MISSION — TLS / HTTP 의 8 misconfiguration 매트릭스

      TLS / HTTP 의 *8 misconfiguration* (HTTP 의 HTTPS redirect / TLS version /
      cipher / cert / cookie flag / CORS / referrer-policy / permissions-policy)
      매트릭스.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **HTTP → HTTPS redirect** = HTTP 의 *자동 redirect 의 의무*
      - **CORS** = `Access-Control-Allow-Origin: *` 의 *위험* (모든 origin 허용)
      - **Referrer-Policy** = `Referer` header 의 *정보 노출 제어*
      - **Permissions-Policy** = browser API 의 *제한* (microphone / camera / location)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== juice 의 8 misconfiguration audit ==="
      H=$(curl -sI -H 'Host: juice.6v6.lab' http://10.20.30.1/ 2>&1)
      echo "HTTP→HTTPS redirect: $(echo "$H" | grep -i 'location: https' | wc -l)"
      echo "X-Frame-Options: $(echo "$H" | grep -i x-frame-options | head -1 | cut -d: -f2)"
      echo "CORS Access-Control: $(echo "$H" | grep -i access-control-allow-origin | head -1)"
      echo "Referrer-Policy: $(echo "$H" | grep -i referrer-policy | head -1)"
      echo "Permissions-Policy: $(echo "$H" | grep -i permissions-policy | head -1)"

      echo ""
      echo "=== TLS 의 version + cipher ==="
      echo | timeout 5 openssl s_client -connect 10.20.30.1:443 -servername juice.6v6.lab 2>&1 | grep -E 'Protocol|Cipher' | head -5
      SH
      ```

      ## 📋 확인 사항

      - 8 항목 audit 결과
      - HTTP→HTTPS redirect 의 *부재* 시 *MITM 위험*
      - CORS 의 *전역 허용* (`*`) 시 *CSRF 위험*

      ## 💡 왜 이걸 하는가?

      *production 의 minimum* = 8 항목 모두. *audit 의 표준 항목*.

      ## 🔍 결과 해석

      - **8/8 적용**: 우수
      - **0-3/8**: 즉시 적용 권장
    hint: |
      8 항목 (HTTP redirect / TLS / cipher / cookie / CORS / Referrer / Permissions / cert).
    category: analysis
    points: 25
    answer: |
      ssh 6v6-attacker bash <<'SH'
      H=$(curl -sI -H 'Host: juice.6v6.lab' http://10.20.30.1/ 2>&1)
      echo "redirect: $(echo "$H" | grep -ic 'location: https')"
      echo "XFO: $(echo "$H" | grep -i x-frame | head -1)"
      echo "CORS: $(echo "$H" | grep -i access-control | head -1)"
      echo "Referrer: $(echo "$H" | grep -i referrer-policy | head -1)"
      echo "Permissions: $(echo "$H" | grep -i permissions-policy | head -1)"
      echo | timeout 5 openssl s_client -connect 10.20.30.1:443 -servername juice.6v6.lab 2>&1 | grep -E 'Protocol|Cipher' | head -3
      SH
    answer_detail: 8 misconfiguration audit
    verify:
      type: output_contains
