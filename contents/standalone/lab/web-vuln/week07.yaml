lab_id: standalone-web-vuln-week07
title: A05 Security Misconfiguration — 7 vhost 헤더 매트릭스 + 정보 노출
version: standalone-non-ai
course: web-vuln
week: 7
description: |
  OWASP A05 (Security Misconfiguration) — 6v6 의 7 vhost 의 *HTTP 헤더 매트릭스* +
  default page 노출 + server fingerprint + directory listing + ModSec exception 분석.
difficulty: easy
duration_minutes: 150
audience: web-vuln 7주차
prerequisites:
  - W02-W06 완료
  - 학생 PC 의 curl + jq
objectives:
  - 7 vhost 의 *5 보안 헤더* (X-Frame / X-Content-Type / Strict-Transport / CSP / X-XSS) 매트릭스
  - server header 의 *fingerprint 노출* (Apache 버전 / Werkzeug version)
  - default page (/server-status, /.git, /robots.txt) 노출 enum
  - directory listing 시도
  - W07 보고서 + CWE-16
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 7 vhost × 5 보안 헤더 매트릭스 작성

      6v6 의 7 vhost 의 *5 보안 헤더* (X-Frame-Options / X-Content-Type-Options /
      Strict-Transport-Security / Content-Security-Policy / X-XSS-Protection)
      매트릭스 + 의 *부족 식별*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **5 보안 헤더 표준**:
        - **X-Frame-Options** = clickjacking 방어 (DENY / SAMEORIGIN)
        - **X-Content-Type-Options** = MIME sniffing 방어 (nosniff)
        - **Strict-Transport-Security (HSTS)** = HTTPS 강제 (max-age=31536000)
        - **Content-Security-Policy (CSP)** = XSS 방어 (W05)
        - **X-XSS-Protection** = legacy (CSP 의 보완)
      - **modern 표준 (2024)** = HSTS + CSP + X-Content-Type-Options 의 3 필수

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "vhost | XFO | XCTO | HSTS | CSP | XXP | server"
      echo "------|-----|------|------|-----|-----|--------"
      for h in juice dvwa neobank govportal mediforum admin aicompanion; do
        H=$(curl -sI -H "Host: $h.6v6.lab" http://10.20.30.1/ 2>&1)
        XFO=$(echo "$H" | grep -i x-frame-options | wc -l)
        XCTO=$(echo "$H" | grep -i x-content-type-options | wc -l)
        HSTS=$(echo "$H" | grep -i strict-transport | wc -l)
        CSP=$(echo "$H" | grep -i content-security-policy | wc -l)
        XXP=$(echo "$H" | grep -i x-xss-protection | wc -l)
        SERVER=$(echo "$H" | grep -i ^server | head -1 | cut -d: -f2 | tr -d '\r' | head -c 30)
        printf "%-12s | %d | %d | %d | %d | %d | %s\n" "$h" "$XFO" "$XCTO" "$HSTS" "$CSP" "$XXP" "$SERVER"
      done
      SH
      ```

      ## 📋 확인 사항

      - 7 vhost × 5 헤더 = 35 cell 매트릭스
      - *적용 / 부재* count
      - server header 의 *version 노출* (Apache/2.4.52 등)
      - vhost 별 *우선 패치 권장*

      ## 💡 왜 이걸 하는가?

      A05 = *low-hanging fruit*. *5 헤더 추가* 만 으로 *clickjacking + MIME + HTTP
      downgrade + XSS* 방어. *production 의 minimum*.

      ## 🔍 결과 해석

      - **5/5 적용 (modern)**: 우수 — modern 표준
      - **0/5 (vuln)**: A05 의 *명백한 결함* — 즉시 적용
      - **server version 노출**: fingerprint 의 *공격자 favor* — *지우기*

      ## 실측 (2026-05-16)
      - juice: 2/5 (XCTO + XFO)
      - dvwa/neobank/...: 0/5 (모두 부족)
      - server: Apache/2.4.52 + Werkzeug/3.1.8 의 *version 노출*
    hint: |
      7 vhost × 5 헤더 매트릭스 + server fingerprint 노출.
    category: survey
    points: 25
    answer: |
      ssh 6v6-attacker bash <<'SH'
      for h in juice dvwa neobank govportal mediforum admin aicompanion; do
        H=$(curl -sI -H "Host: $h.6v6.lab" http://10.20.30.1/ 2>&1)
        XFO=$(echo "$H" | grep -ic x-frame-options)
        XCTO=$(echo "$H" | grep -ic x-content-type-options)
        HSTS=$(echo "$H" | grep -ic strict-transport)
        CSP=$(echo "$H" | grep -ic content-security-policy)
        XXP=$(echo "$H" | grep -ic x-xss-protection)
        SERVER=$(echo "$H" | grep -i ^server | head -1)
        echo "$h: XFO=$XFO XCTO=$XCTO HSTS=$HSTS CSP=$CSP XXP=$XXP | $SERVER"
      done
      SH
    answer_detail: 7 vhost 의 5 보안 헤더 매트릭스
    verify:
      type: output_contains
      expect: 'juice\|XFO'
      field: stdout
      semantic:
        intent: 보안 헤더 audit
        success_criteria: [35 cell 매트릭스]
        acceptable_methods:
          - "**[OSS] curl -I + 5 헤더 grep**"
          - "**[OSS] securityheaders.com 의 score**"
          - "**[OSS] OWASP Secure Headers Project**"
          - "**[OSS] Mozilla Observatory**"
          - "**[OSS] CWE-16 Configuration**"
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 MISSION — Server fingerprint + default page 노출 enum

      7 vhost 의 *server fingerprint* (Apache version / Werkzeug / Python version) +
      *default page* (`/server-status`, `/robots.txt`, `/.git`, `/.env`) 노출 enum.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **fingerprint** = *server 종류 + version* 노출 — 공격자 의 *CVE 매칭* favor
      - **default page**:
        - `/server-status` = Apache 의 상태 페이지 (mod_status)
        - `/.git` = git directory 의 *source code* 노출
        - `/.env` = environment variable 의 *secret* 노출
        - `/robots.txt` = *공개* (단 *민감 path 노출* 가능)
        - `/sitemap.xml` = *공개*

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== default page 노출 enum ==="
      for h in juice dvwa neobank govportal mediforum admin aicompanion; do
        for path in /server-status /server-info /robots.txt /.git/config /.env /sitemap.xml; do
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Host: $h.6v6.lab" "http://10.20.30.1$path")
          [ "$code" != "404" ] && [ "$code" != "403" ] && echo "$h$path: $code"
        done
      done
      SH
      ```

      ## 📋 확인 사항

      - 7 vhost × 6 path = 42 시도
      - 200 응답 의 *vuln* (default page 노출)
      - 404/403 = *정상* (page 없음 또는 차단)

      ## 💡 왜 이걸 하는가?

      *default page 노출* = A05 의 *흔한 결함*. *.git 노출* 시 source code 전체
      유출 — 매우 critical.

      ## 🔍 결과 해석

      - **모두 404/403**: 정상
      - **200 (vuln)**: 즉시 *page 차단* — Apache: `Require all denied` / Flask: 미routing
    hint: |
