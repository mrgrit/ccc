      ```markdown
      # W07 — A05 Security Misconfiguration 보고서

      ## 1. Executive Summary
      - target: 7 vhost 의 *모든* misconfiguration
      - 발견 vuln 3 영역 (보안 헤더 / default page / TLS-HTTP)
