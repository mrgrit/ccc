          - "**[OSS] CWE-16 + CWE-942 (CORS)**"
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 MISSION — W07 종합 보고서 (3 영역 + CWE-16/548/942)

      W07 의 3 영역 audit (보안 헤더 + default page + TLS/HTTP misconfig) 종합 보고서.

