lab_id: standalone-web-vuln-week03
title: "정보수집 점검 (Reconnaissance) — WSTG-INFO 6 항목 실습 (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 3
description: |
  OWASP WSTG-INFO (Information Gathering) 의 6 항목 을 attacker 컨테이너 에서
  juice.6v6.lab 대상 으로 직접 수행. 서버·프레임워크 fingerprint, metafiles
  (robots.txt / .git / security.txt / sitemap.xml), 엔드포인트 enumeration,
  관리자 페이지 탐색, CMS/SPA 식별 의 5 가지 정찰 활동 결과 를 *대상 profile*
  markdown 1 문서 로 통합.

  Red 의 정찰 활동 은 비파괴 (read-only) 이지만 자동 도구 (gobuster/ffuf/whatweb)
  의 burst 트래픽 은 Blue 의 fw access.log + Suricata flow event 에 spike 로
  남는다. Purple 은 운영 환경 에서 *정찰 baseline* 을 관측 해 두면 추후 실제 공격
  의 정찰 단계 를 detection 할 수 있는지 의 가능성을 학습.
difficulty: easy
duration_minutes: 120
audience: 웹 보안 입문자 (3주차)
prerequisites:
  - "W01 의 HTTP 기초 + W02 의 도구 환경 구축 완료"
  - "attacker 컨테이너 에 curl / nmap / nikto / gobuster / ffuf / whatweb / nuclei / wafw00f / wapiti 가용 (W02 step 1~2 통과)"
  - "wordlist /usr/share/dirb/wordlists/small.txt 가용"
objectives:
  - "WSTG-INFO-02 fingerprint 의 server / framework / language 식별 — 3 도구 결과 cross-check"
  - "WSTG-INFO-03 metafiles 의 robots.txt / sitemap.xml / .git/config / security.txt / .well-known 5 종 시도"
  - "WSTG-INFO-04 entry points enumeration — HTML 의 form action + JS 의 fetch/XHR + API endpoint"
  - "WSTG-INFO-08 admin / config interface — gobuster 또는 ffuf 의 dir brute-force"
  - "WSTG-INFO-09 framework + CMS 식별 — whatweb / nuclei tech-detect"
  - "6 항목 결과 의 통합 — 대상 profile markdown 1 문서 (서버 / 프레임워크 / 엔드포인트 / 관리 페이지 / metadata)"
  - "Red/Blue/Purple — Red 정찰 burst 가 web access.log 에 어떻게 분포 + Blue 의 정찰 baseline 관측 가능성"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — WSTG-INFO-02 Fingerprint (서버 + 프레임워크) 의 3 도구 cross-check

      **어디서:** attacker 컨테이너
      **무엇을:** juice.6v6.lab 의 server / framework / language 를 **3 가지 도구** (curl 헤더 / whatweb / nmap NSE) 로 각각 식별 한 후 결과 가 일치 하는지 cross-check.

      **결과 어떻게 정리:**

      | 도구 | 식별 한 server | 프레임워크 | 언어 | 결과 첫 1 줄 인용 |
      |---|---|---|---|---|
      | curl -sI | | | | |
      | whatweb | | | | |
      | nmap -sV --script=http-headers | | | | |

      마지막 행 에 **cross-check 결과** 1 줄: 3 도구 가 같은 결론 인가? 다르면 *왜* 다른가?

      ## 💡 왜 이걸 하는가?

      WSTG-INFO-02 는 점검 의 가장 첫 활동. 한 도구 의 결과 만 보면 false positive
      가능 — 3 도구 cross-check 로 신뢰도 ↑. 실제 운영 환경 에서는 서버 / 프레임워크
      / 언어 가 다르게 식별 되는 케이스 (reverse proxy / CDN / 가짜 헤더) 다수.

      ## 🔵 Blue 측 관찰

      3 도구 의 1 회 사용 = 3 HTTP request. web access.log 에 각 도구 의 User-Agent
      가 명시 적 으로 남는다 (`curl/7.x`, `WhatWeb/0.5.x`, `Mozilla/5.0 (compatible;
      Nmap...)`). 점검자 의 자기 식별 — 운영 알림 전 사전 등록 필요 의 시각.

      ## 📋 채점 기준

      - 3 도구 모두 실행 + 표 1 개
      - 각 도구 의 결과 첫 1 줄 인용 (단순 도구 이름 만 X)
      - cross-check 결과 1 줄 (일치 / 불일치 + 사유)
    hint: "curl -sI 는 Server / X-Powered-By 헤더. whatweb 는 단일 명령 으로 모든 정보. nmap -sV -p 80 --script=http-headers,http-title -Pn 10.20.30.1."
    category: recon
    points: 12
    answer: |
      🤖 자기학습용 정답 가이드:
      curl -sI http://juice.6v6.lab/ | grep -iE 'server|x-powered|content-type' | head -3
      whatweb http://juice.6v6.lab 2>&1 | head -1
      nmap -sV -p 80 --script=http-headers,http-title -Pn 10.20.30.1 2>&1 | grep -E '80/tcp|Title' | head -3
    answer_detail: |
      curl 은 명시 헤더 (Server: Apache/2.4.52, X-Powered-By 등) 만. whatweb 는 HTML
      파싱 으로 프레임워크 (Angular / Express) 까지. nmap NSE 는 서버 의 default
      response 패턴 으로 식별. 3 도구 의 결과 가 다를 수 있음 — 그게 학습 포인트.
    verify:
      intent: "WSTG-INFO-02 fingerprint 3 도구 cross-check + 결과 표 + 일치/불일치 분석"
      success_criteria:
        - "3 도구 모두 실행 + 결과 첫 줄 인용"
        - "표 1 개 (도구/server/framework/언어/인용)"
        - "cross-check 결과 1 줄 (일치 또는 불일치 사유)"
      acceptable_methods:
        - "curl -sI / -I / -v 모두 OK"
        - "whatweb -v 또는 단순 모드"
        - "nmap -sV 의 NSE script 자유 (http-headers / http-title 등)"
      negative_signs:
        - "도구 1 개 만"
        - "cross-check 결과 누락"
        - "도구 이름 만 나열"
    target_vm: attacker
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — WSTG-INFO-03 Metafiles 5 종 탐색

      **어디서:** attacker 컨테이너
      **무엇을:** juice.6v6.lab 의 metafiles 5 종 — robots.txt / sitemap.xml /
      .git/config / security.txt / .well-known/security.txt — 각각 의 존재 여부 +
      응답 코드 + (있다면) 내용 첫 1~3 줄 인용.

      **결과 어떻게 정리:**

      | metafile | 응답 코드 | 존재 | 내용 첫 1 줄 또는 "(없음)" | 학생 해석 |
      |---|---|---|---|---|
      | /robots.txt | | | | |
      | /sitemap.xml | | | | |
      | /.git/config | | | | |
      | /security.txt | | | | |
      | /.well-known/security.txt | | | | |

      ## 💡 왜 이걸 하는가?

      metafiles 은 서버 의 "메타 정보" — 검색 엔진 / 보안 연구자 / 자동 도구 가
      참조 하는 표준 파일. robots.txt 의 Disallow 항목 = 서버 가 *숨기고 싶은*
      경로 (역설 적 으로 점검 대상 1 순위). .git/config 노출 = 소스 코드 유출
      위험 (S3 bucket leak / repo dump). security.txt = 책임 보고 (PoC) 채널.

      ## 🔵 Blue 측 관찰

      metafiles 의 404 응답 burst 는 web access.log 의 404 spike 로 보임 — Suricata
      의 default 룰 도 일부 캐치 (예: SCAN signature). 운영 자 는 404 spike 패턴 이
      점검 / brute-force / 정찰 의 단서.

      ## 📋 채점 기준

      - 5 metafile 모두 시도 + 응답 코드 + 내용
      - 학생 해석 1 줄 (예: "robots.txt 의 /ftp 항목 = 점검 대상 1 순위")
      - 표 1 개 로 정리
    hint: "curl -sI 로 응답 코드 만, curl -s 로 내용. 5 metafile 의 응답 코드 가 200 / 404 / 403 의 어느 패턴 인지 표."
    category: recon
    points: 10
    answer: |
      🤖 자기학습용 정답 가이드:
      for p in /robots.txt /sitemap.xml /.git/config /security.txt /.well-known/security.txt; do
        code=$(curl -o /tmp/m.out -s -w '%{http_code}' "http://juice.6v6.lab${p}")
        head=$(head -1 /tmp/m.out 2>/dev/null | head -c 80)
        echo "$p → $code | $head"
      done
    answer_detail: |
      JuiceShop 의 robots.txt 는 의도적 challenge — /ftp Disallow 가 명시 → 학생 의
      WSTG-INFO-04 (다음 step) 의 점검 대상 1 순위. .git/config 는 보통 404 (의도적
      미배포). security.txt 는 RFC 9116 표준 — 운영 환경 에서 권장.
    verify:
      intent: "5 metafiles 모두 시도 + 응답 코드 + 내용 + 학생 해석 1 줄"
      success_criteria:
        - "5 파일 모두 시도 (응답 코드 동반)"
        - "내용 있는 파일 의 첫 1 줄 인용"
        - "학생 해석 1 줄 (각 파일 의 의미)"
      acceptable_methods:
        - "curl 단일 명령 또는 for loop"
        - "각 파일 응답 200 / 301 / 404 / 403 모두 정상 결과"
      negative_signs:
        - "응답 코드 만, 내용 없이"
        - "5 파일 중 일부 만"
        - "해석 없음"
    target_vm: attacker
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — WSTG-INFO-04 Application Entry Points Enumeration

      **어디서:** attacker 컨테이너
      **무엇을:** juice.6v6.lab 의 *진입 점 (entry points)* — HTML 의 form action,
      JS 의 fetch/XHR API, REST endpoint — 을 발견. 3 가지 출처 의 결과 를 표로
      정리.

      **3 출처:**
      1. HTML 메인 페이지 의 `<form action="...">` (curl + grep)
      2. JS bundle 의 fetch / XMLHttpRequest URL (curl 의 JS 파일 응답 + grep)
      3. /api-docs (Swagger 가 있다면) 또는 알려진 API prefix (/api/ /rest/)

      **결과 어떻게 정리:**

      | 출처 | 발견 한 엔드포인트 | 메서드 (추정) | 학생 1 줄 메모 |
      |---|---|---|---|
      | HTML form | | | |
      | JS bundle | | | |
      | /api/* /rest/* | | | |

      최소 5 개 엔드포인트 발견 목표. 발견 못 한 경우 *왜* (예: Angular 의 router
      가 client-side 만 — server endpoint 분리) 분석.

      ## 💡 왜 이걸 하는가?

      WSTG-INFO-04 = 점검 의 attack surface 정의. 엔드포인트 모르면 다음 주차 의
      입력 검증 점검 (SQLi / XSS / 등) 할 대상 자체 가 없음. SPA 환경 에서는 HTML
      form 보다 JS bundle 의 API 호출 이 더 많음 — 도구 만 으로는 다 못 찾고 학생
      의 분석 능력 필요.

      ## 🔵 Blue 측 관찰

      엔드포인트 enumeration 의 트래픽 은 정상 GET. 단 발견 된 API 에 차후 점검 단계
      에서 변조 시도 → ModSec / Wazuh 룰 가동 시작.

      ## 📋 채점 기준

      - 3 출처 모두 시도 + 결과 표
      - 최소 5 엔드포인트 발견 (못 찾으면 *왜* 분석 1 문장)
      - 각 엔드포인트 의 메서드 (GET/POST/...) 추정
    hint: "HTML 의 form action 은 `curl -s http://juice.6v6.lab/ | grep -oP 'action=\\\"[^\\\"]*' | head`. JS bundle 은 main.js 등 의 URL 패턴 grep. /api-docs swagger 가 응답 200 이면 API 명세 직접."
    category: recon
    points: 12
    answer: |
      🤖 자기학습용 정답 가이드:
      curl -s http://juice.6v6.lab/ | grep -oE 'action="[^"]*"' | sort -u | head -5
      curl -s http://juice.6v6.lab/main.js 2>/dev/null | grep -oE '"/(api|rest)/[A-Za-z/]+"' | sort -u | head -10
      curl -s http://juice.6v6.lab/api-docs 2>&1 | head -c 200
      for p in /api/Users /api/Products /rest/user/login /rest/products/search /rest/captcha; do
        code=$(curl -o /dev/null -s -w '%{http_code}' "http://juice.6v6.lab${p}")
        echo "$p → $code"
      done
    answer_detail: |
      Angular SPA = HTML form 적음 (대부분 router + form 동적 생성). main.js 의 string
      grep 이 가장 효과적. /api-docs 는 swagger UI — JuiceShop 의 의도적 노출 (점검
      대상). 알려진 API prefix (/api/Users, /rest/user/login 등) 도 시도.
    verify:
      intent: "3 출처 의 entry point enumeration + 최소 5 endpoint + 메서드 추정"
      success_criteria:
        - "3 출처 모두 시도"
        - "최소 5 엔드포인트 발견 또는 *왜 못 찾는지* 분석"
        - "각 엔드포인트 의 메서드 추정"
      acceptable_methods:
        - "curl + grep 조합"
        - "ffuf / gobuster 로 brute-force 도 OK (단 STEP 4 와 중복 X)"
      negative_signs:
        - "1~2 엔드포인트 만"
        - "메서드 추정 없음"
        - "분석 없이 list 만"
    target_vm: attacker
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION — WSTG-INFO-08 Admin / Config Interface 탐색 (dir brute-force)

      **어디서:** attacker 컨테이너
      **무엇을:** gobuster 또는 ffuf 로 juice.6v6.lab 의 숨겨진 admin / config 경로
      를 brute-force 로 탐색. wordlist = `/usr/share/dirb/wordlists/small.txt` (W02
      에서 가용 확인).

      ⚠️ **시간 제한** — `-t 10` (thread 10) + wordlist 의 first 500 entries 만 (또는 `small.txt` 전체 ~ 1분).

      **결과 어떻게 정리:**

      | 발견 경로 | 응답 코드 | 응답 크기 | 학생 1 줄 메모 (이 경로 의 의미) |
      |---|---|---|---|
      | /administration | 200 / 301 | | |
      | /admin | | | |
      | /ftp | | | |
      | (더) | | | |

      ## 💡 왜 이걸 하는가?

      WSTG-INFO-08 = 운영 환경 에서 admin / config interface 가 외부 노출 되는지
      점검. 운영자 가 의도 적 으로 가린 경로 (예: /administration) 가 noindex
      만 으로 충분 한지 — 실제 점검 으로 검증.

      ## 🔵 Blue 측 관찰

      gobuster / ffuf 의 burst (수십~수백 404) 는 web access.log 에 spike 로 보임 —
      Wazuh rule 31301 (web attack) 또는 31151 (multiple 404) 가동. 정찰 단계 의
      Blue detection 의 가장 명확 한 케이스.

      ## 📋 채점 기준

      - 1 도구 (gobuster 또는 ffuf) 실행 + 발견 경로 표
      - 최소 3 경로 발견 (juice.6v6.lab 은 /administration / /ftp / /metrics / /redirect 등)
      - 각 경로 의 학생 본인 메모
    hint: "gobuster dir -u URL -w wordlist -t 10 -q. ffuf -u URL/FUZZ -w wordlist -mc 200,301 -s. small.txt 는 ~1000 단어 — 1 분 미만 종료."
    category: recon
    points: 12
    answer: |
      🤖 자기학습용 정답 가이드:
      gobuster dir -u http://juice.6v6.lab -w /usr/share/dirb/wordlists/small.txt -t 10 -q --no-error 2>&1 | head -10
      # 또는 ffuf
      ffuf -u http://juice.6v6.lab/FUZZ -w /usr/share/dirb/wordlists/small.txt -mc 200,301 -s 2>&1 | head -10
    answer_detail: |
      JuiceShop 의 의도적 노출 경로: /administration (관리자 — challenge), /ftp (정적
      파일 노출), /metrics (Prometheus), /redirect (open redirect challenge). 발견
      된 경로 중 /administration 은 W04 인증 점검 대상, /ftp 는 W07 파일 점검 대상.
      도구 의 발견 결과 = 다음 주차 점검 의 입력 목록.
    verify:
      intent: "dir brute-force 1 회 + 발견 경로 표 + 학생 본인 메모"
      success_criteria:
        - "gobuster 또는 ffuf 1 회 실행"
        - "최소 3 경로 발견"
        - "각 경로 의 학생 본인 1 줄 메모"
      acceptable_methods:
        - "gobuster dir 또는 ffuf 모두 OK"
        - "wordlist 의 일부 (head) 만 사용 도 OK — 단 명시"
      negative_signs:
        - "도구 실행 결과 통째 paste — 메모 없음"
        - "1~2 경로 만"
        - "wordlist 너무 큰 것 사용 → 시간 초과"
    target_vm: attacker
    risk_level: low

  - order: 5
    instruction: |
      ## 🎯 MISSION — WSTG-INFO-09 Framework / Tech Stack 식별 (whatweb + nuclei)

      **어디서:** attacker 컨테이너
      **무엇을:** whatweb 와 nuclei 의 tech-detect template 으로 juice.6v6.lab 의
      *프레임워크 / 라이브러리 / 버전* 을 자동 식별. 두 도구 의 결과 cross-check.

      **결과 어떻게 정리:**

      | 도구 | 식별 한 프레임워크 | 라이브러리 | 버전 (있다면) | 결과 첫 1~2 줄 |
      |---|---|---|---|---|
      | whatweb | | | | |
      | nuclei tech-detect | | | | |

      마지막 행 에 cross-check + 신뢰도 평가.

      ## 💡 왜 이걸 하는가?

      WSTG-INFO-09 = CMS / framework / library 의 *버전 식별* → 알려진 CVE 매핑 의
      출발점. 예: Express 의 특정 버전 = CVE-XXXX-YYYY 영향. 두 도구 cross-check
      의 이유 = 한 도구 의 false positive / version mismatch.

      ## 🔵 Blue 측 관찰

      nuclei 는 의도적 인 HTTP probe (특정 paths / headers) 전송 — fw / web log 에
      30~50 line 의 burst. ModSec 의 일부 룰 (UA blacklist) 가동 가능성.

      ## 📋 채점 기준

      - 2 도구 실행 + 결과 표
      - cross-check 1 줄
      - 발견 된 프레임워크 / 라이브러리 의 *버전* 명시 (있다면)
    hint: "whatweb -v http://juice.6v6.lab 의 -v 가 상세. nuclei -u URL -t http/technologies/ -silent 2>&1 | head."
