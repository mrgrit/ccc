  - order: 5
    instruction: |
      ## 🎯 MISSION (R/B/P 종합)

      Red = pickle 의 임의 코드 실행 시뮬 / Blue = pickle 사용 금지 + JSON 대체 /
      Purple = SLSA + Sigstore + TUF routine.

      ## 💻 실행
      ```bash
      ssh 6v6-attacker 'python3 -c "import pickle, os; payload = pickle.dumps(__import__(\"os\").system); import base64; print(base64.b64encode(pickle.dumps(payload)).decode()[:50])"' 2>&1 | head -3
      echo "Blue: pickle 의 사용 = 임의 코드 실행 위험. JSON/protobuf 의 default 적용 routine"
      echo "Coverage: SLSA level 2+ + Sigstore signing + TUF update framework"
      ```

      ## 💡 왜
      pickle 의 위험 의 직접 확인 + SLSA/Sigstore 의 modern 표준 routine.
