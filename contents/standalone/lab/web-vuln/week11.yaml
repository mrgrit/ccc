lab_id: standalone-web-vuln-week11
title: A08 Software and Data Integrity Failures — Supply chain + Deserialization
version: standalone-non-ai
course: web-vuln
week: 11
description: A08 — 공급망 + 무결성 검증 부재. xz-utils 사례 재학습 + dependency confusion 시뮬.
difficulty: medium
duration_minutes: 150

steps:
  - order: 1
    instruction: |
      ## 🎯 MISSION — xz-utils 5 stage 학습 + dependency confusion 시뮬

      ## xz-utils 사례 (CVE-2024-3094)
      - Jia Tan 의 2년 maintainer 자리 → 5.6.0/5.6.1 backdoor → 발견 직전 sshd RCE

      ## dependency confusion 시뮬
      ```
      회사 의 private package "internal-utils"
      → npm public 에 같은 이름 의 *높은 version* 등록
      → 회사 의 npm install 시 *public version 우선* (npm 의 default)
      → 공격자 의 코드 실행
      ```
    hint: xz + dep confusion
    category: analysis
    points: 30
    answer: 학습 산출물
    answer_detail: 2 사례 학습
    verify:
      type: output_contains
      expect: 'xz\|dependency'
      field: stdout
      semantic:
        intent: integrity
        success_criteria: [2 사례]
        acceptable_methods: ["**[OSS] xz-utils + dep confusion**"]
    target_vm: bastion

  - order: 2
    instruction: |
      ## 🎯 MISSION — SLSA + Sigstore + in-toto 표준 학습

      ## modern 표준
      - **SLSA** (Supply-chain Levels for Software Artifacts) — 1-4 level
      - **Sigstore** (cosign + fulcio + rekor) — *keyless signing*
      - **in-toto** — *attestation framework*
      - **SBOM** (CycloneDX / SPDX) — *Bill of Materials*
    hint: 4 표준
    category: analysis
    points: 30
    answer: 학습 산출물
    answer_detail: modern 표준
    verify:
      type: output_contains
      expect: 'SLSA\|Sigstore'
      field: stdout
      semantic:
        intent: supply chain 표준
        success_criteria: [4 표준]
        acceptable_methods: ["**[OSS] SLSA + Sigstore + in-toto + SBOM**"]
    target_vm: bastion

  - order: 3
    instruction: |
      ## 🎯 MISSION — Deserialization 의 5 패턴 학습

      ## Java + Python + PHP 의 5 패턴
      1. **Java readObject()** — Apache Commons Collections gadget
      2. **Python pickle.loads()** — *임의 코드 실행*
      3. **PHP unserialize()** — magic method (`__wakeup`, `__destruct`)
      4. **.NET BinaryFormatter** — *Microsoft 가 2023 deprecated*
      5. **YAML safe_load vs load** — Python YAML 의 *위험 load*
    hint: 5 패턴
    category: analysis
    points: 25
    answer: 학습 산출물
    answer_detail: deserialization 패턴
    verify:
      type: output_contains
      expect: 'pickle\|unserialize'
      field: stdout
      semantic:
        intent: deserialization
        success_criteria: [5 패턴]
        acceptable_methods: ["**[OSS] ysoserial / ysoserial.net**"]
    target_vm: bastion

  - order: 4
    instruction: |
      ## 🎯 MISSION — W11 보고서 + CWE-502/829 매핑

      ```markdown
      ## 1. xz-utils + dep confusion
      ## 2. SLSA + Sigstore + in-toto + SBOM
      ## 3. Deserialization 5 패턴
      ## 매핑: CWE-502 + CWE-829
      ```
    hint: 3 영역 + 매핑
    category: synthesis
    points: 15
    answer: 위 형식
    answer_detail: W11 보고서
    verify:
      type: output_contains
      expect: 'CWE-502\|SLSA'
      field: stdout
      semantic:
        intent: W11 종합
        success_criteria: [3 영역]
        acceptable_methods: ["**[관리적] PTES + Supply chain**"]
    target_vm: bastion
