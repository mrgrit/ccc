lab_id: standalone-web-vuln-week02
title: "점검 도구 환경 구축 — curl 고급 / whatweb / nikto / sqlmap / ZAP CLI / wafw00f (6v6)"
version: standalone-non-ai
course: web-vuln
week: 2
description: |
  웹 취약점 점검 의 첫 실무 단계 = 점검 도구 환경 구축. attacker 컨테이너에
  사전 설치된 도구 (curl/nmap/nikto/sqlmap/gobuster/ffuf) 의 가용성 검증 + 학생
  이 추가 도구 (whatweb/httpie/wpscan/wafw00f/nuclei/zap-cli) 를 직접 설치 +
  각 도구의 가장 단순한 정찰 명령을 juice.6v6.lab 대상으로 1 회 실행 + ROE
  (Rules of Engagement) markdown 작성으로 마무리.

  Red/Blue/Purple — Red 의 도구 설치 자체는 차단되지 않음 (정찰 도구). Blue 는
  attacker 의 패키지 다운로드 트래픽 (apt update / pip / curl github release) 가
  fw 의 nftables forward log 와 Suricata flow event 로 어떻게 보이는지 관측.
  Purple 은 점검자 가 사용 한 도구 카탈로그 와 versioning 을 ROE 부록 으로 박제
  (재현성 + 책임).
difficulty: easy
duration_minutes: 120
audience: 웹 보안 입문자 (2주차)
prerequisites:
  - "W01 통과 — curl 로 juice.6v6.lab 의 응답 헤더·API 엔드포인트 수집 경험"
  - "학생 PC 의 ~/.ssh/config 에 6v6-attacker (ProxyJump 6v6-bastion) 설정 완료"
  - "attacker 컨테이너 image 사전 설치 도구 확인 (curl/nmap/nikto/sqlmap/gobuster/ffuf)"
  - "lecture_week02.md 정독 — 도구 분류 (프록시/스캐너/특화/범용) 의 차이 이해"
objectives:
  - "image 사전 설치 도구 6 종의 가용성을 본인 손으로 확인 (단순 --version 차원이 아닌 실제 1회 명령 실행)"
  - "추가 도구 4 종 (whatweb / httpie / wpscan / wafw00f) 을 본인 손으로 설치하고 가용성 확인"
  - "curl 고급 옵션 (-X/-H/-c/-b/-d/--max-time/-w) 7 종 을 각각 의도를 갖고 1 회씩 실행"
  - "nikto / nuclei / wafw00f / whatweb 각각 의 가장 단순한 1 라인 정찰 명령 실행 + 출력 핵심 1~3 줄 인용"
  - "ROE markdown (점검 대상 / 허용 도구 / 시간 / 산출물 / 비상연락) 작성"
  - "Red/Blue/Purple — Red 도구 설치 트래픽 의 Blue 관측 가능성 + Purple 의 도구 카탈로그 박제"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 사전 설치 도구 6 종의 진짜 가용성 검증

      **어디서:** attacker 컨테이너 (10.20.30.202)
      **무엇을:** image 빌드 시점에 설치되어 있는 도구 6 종 (curl, nmap, nikto, sqlmap, gobuster, ffuf) 의 가용성을 **단순 `--version` 출력만이 아니라 실제 1회 정찰 명령** 으로 확인. 도구가 동작하는 것 = 다음 주차 점검의 발판.

      **결과 어떻게 정리:**

      | 도구 | 가용 여부 | 1회 실행 명령 (대상 juice.6v6.lab) | 결과 첫 1 줄 |
      |---|---|---|---|
      | curl | ✓/✗ | | |
      | nmap | ✓/✗ | | |
      | nikto | ✓/✗ | | |
      | sqlmap | ✓/✗ | | |
      | gobuster | ✓/✗ | | |
      | ffuf | ✓/✗ | | |

      6 도구 모두 실제 명령을 한 번씩 굴리고 결과의 *맨 앞 1~3 줄* 만 인용. 학생 PC 의 보고서에 표 1 개로 남긴다.

      ## 💡 왜 이걸 하는가?

      lecture 의 "도구 분류 (프록시/스캐너/특화/범용)" 를 학생이 본인 손으로 매핑.
      도구가 살아있다 = 다음 주차 ~ W15 의 모든 점검이 가능하다는 출발점 확인.
      실제 환경에서 image 가 build 시 도구가 빠지는 경우 (apt 저장소 일시 down 등)
      가 빈번 — 점검 시작 시 가용성 검증 반드시.

      ## 🔵 Blue 측 관찰 (선택)

      도구 6 종이 juice.6v6.lab 에 1 회씩 닿으면 fw 의 nftables forward log + ips
      의 Suricata flow event 에 각각 1 라인 씩 남는다. 정찰 트래픽 의 baseline.

      ## 📋 채점 기준

      - 도구 6 종 모두 가용성 확인 ("not found" 면 *어떤 명령으로 설치 시도했는지* 도 기록)
      - 표 1 개로 정리, 결과 첫 줄 인용
      - 단순 `--version` 만 적은 표는 미통과 (실제 정찰 명령 1 회 필수)
    hint: "도구 별로 가장 단순한 1 라인 정찰 명령 — curl 은 -sI 헤더 1 회, nmap 은 -sV -p 80, nikto 는 -h URL, sqlmap 은 -u URL --batch --crawl=0 --threads=1, gobuster 는 dir -u URL -w 짧은 wordlist, ffuf 는 -u URL -w wordlist. 결과 첫 줄만 보면 됨."
    category: env_setup
    points: 10
    answer: |
      🤖 자기학습용 정답 가이드:
      attacker 에서 6 도구 1 회 씩:
        curl -sI http://juice.6v6.lab/ | head -1
        nmap -sV -p 80 -Pn 10.20.30.1 | head -8
        nikto -h http://juice.6v6.lab -maxtime 30s | head -10
        sqlmap -u 'http://juice.6v6.lab/rest/products/search?q=apple' --batch --crawl=0 --random-agent 2>&1 | head -10
        gobuster dir -u http://juice.6v6.lab -w /usr/share/dirb/wordlists/small.txt -t 5 -q 2>&1 | head -5
        ffuf -u http://juice.6v6.lab/FUZZ -w /usr/share/dirb/wordlists/small.txt -mc 200,301 -s 2>&1 | head -5
    answer_detail: |
      각 도구의 실행 1 회로 (a) 도구 binary 존재 (b) 도구 가 대상 에 접근 가능 (c) 응답 패턴
      관측 — 세 점 을 동시 검증. 단순 `--version` 만 보면 (b) (c) 미확인 → 다음 주차 실측 시 실패.
    verify:
      intent: "image 사전 설치 도구 6 종 의 실제 가용성 확인 + juice.6v6.lab 대상 1 회 정찰 명령 결과 인용 + 표 1 개"
      success_criteria:
        - "도구 6 종 모두 가용성 결과 표 1 개로 정리"
        - "각 도구 결과 첫 줄 인용 (단순 --version 만 X)"
        - "not found 항목 은 설치 시도 명령 동반"
      acceptable_methods:
        - "표 형태 markdown / plaintext"
        - "도구 1 개 라도 not found 면 fail 인 아닌 *그 도구 의 설치 명령* 동반 시 통과"
      negative_signs:
        - "--version 만 적힌 표"
        - "표 없이 도구 명단 만 나열"
        - "결과 첫 줄 인용 누락"
    target_vm: attacker
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — 추가 점검 도구 5 종 의 가용성 확인 + 본인 의 출처 파악

      **어디서:** attacker 컨테이너
      **무엇을:** image 빌드 시점에 추가로 설치 된 도구 5 종 (whatweb / httpie /
      wafw00f / nuclei / wapiti) 의 *가용성* + 각 도구 의 *출처* (apt / pip /
      github release) 를 본인 이 *조사* 해서 표로 정리.

      💡 wpscan (WordPress 점검 전용) 은 image 에 미 포함 — JuiceShop 은 Angular
      SPA 이므로 본 lab 대상 외. WordPress 가 점검 대상 인 환경 에서는 별도 gem
      install 또는 docker image 사용.

      **결과 어떻게 정리:**

      | 도구 | 출처 (apt/pip/github) | 1 회 실행 명령 (대상 juice.6v6.lab) | 결과 핵심 1 줄 |
      |---|---|---|---|
      | whatweb | | | |
      | httpie | | | |
      | wafw00f | | | |
      | nuclei | | | |
      | wapiti | | | |

      ## 💡 왜 이걸 하는가?

      실무 점검자 는 lab image 에 미리 깔린 도구만 쓰지 않는다. 추가 도구 의 출처 ·
      라이센스 · 설치 방식 (system package / 언어 package / 단일 binary) 의 차이
      를 손에 익혀야 점검 환경 을 본인 이 책임지고 구성할 수 있다.

      ⚠️ **6v6 의 attacker 컨테이너 는 ext network 의 외부 접근 일부 차단** —
      apt mirror 미접근 가능성 있음. 본 lab 환경 에서는 image 빌드 시 사전 설치
      후 학생 은 "어떤 출처 로 설치 되었는가" 를 *추론* 하면 충분.

      ## 🔵 Blue 측 관찰 (선택)

      도구 6 종 의 1 회 사용 트래픽 은 모두 fw HAProxy 통과 → web access.log 의
      User-Agent 에 각 도구 의 시그니처 (`WhatWeb/x.x`, `wpscan/x.x` 등) 가
      찍힌다. 이게 학생 의 lab 활동 의 fingerprint.

      ## 📋 채점 기준

      - 6 도구 가용성 표 1 개 + 각 도구 1 회 실행 결과 첫 줄 인용
      - 각 도구 의 *출처* (apt / pip / gem / github) 본인 의 추론 동반 (예: `dpkg -l | grep whatweb` 또는 `pip3 show wafw00f` 같은 조사 명령 결과 1 줄)
      - 도구 미가용 시 *대체 도구* 1 개 (예: nuclei 대체 = ZAP baseline) 동반
    hint: "각 도구 의 출처 조사 — apt 설치 도구 는 dpkg -l | grep, pip 설치 도구 는 pip3 show, gem 설치 도구 는 gem list, github 단일 binary 는 which 와 ls /usr/local/bin."
    category: env_setup
    points: 10
    answer: |
      🤖 자기학습용 정답 가이드:
      whatweb http://juice.6v6.lab 2>&1 | head -1
      http --print=h GET http://juice.6v6.lab 2>&1 | head -3
      wafw00f http://juice.6v6.lab 2>&1 | head -5
      nuclei -u http://juice.6v6.lab -silent -severity medium,high 2>&1 | head -3
      wapiti -u http://juice.6v6.lab -m '' 2>&1 | head -5
      dpkg -l | grep -E 'whatweb|httpie' | head -2     # apt 출처
      pip3 show wafw00f wapiti3 2>&1 | grep -E '^Name|^Version' | head -4   # pip 출처
      which nuclei && ls -la /usr/local/bin/nuclei      # github binary 출처
    answer_detail: |
      whatweb apt 는 ruby 2.x 의존 — Ubuntu 22.04 에서 apt 설치 가능 (lecture 부록 line 882 의 한 줄 install).
      wpscan 은 wordpress 전용 이지만 ruby gem 으로 확장성 — 폐쇄망 시 ruby-rubygems 사전 필요.
      wafw00f 는 pip — Ubuntu 22.04 + python3 의 break-system-packages flag 필요 (PEP 668).
    verify:
      intent: "추가 도구 4 종 (whatweb/httpie/wpscan/wafw00f) 학생 직접 설치 + 가용성 검증"
      success_criteria:
        - "4 도구 설치 결과 표 1 개"
        - "각 도구 1 회 실행 결과 첫 줄 인용"
        - "설치 출처 (apt/pip/gem/github) 정확히 분류"
      acceptable_methods:
        - "apt / pip / gem / github release binary 모두 가능"
        - "1 도구 라도 폐쇄망 으로 설치 실패 시 *대체 도구* (예: nuclei) 1 개 + 사유 동반"
      negative_signs:
        - "설치 명령 없이 가용 여부만"
        - "출처 분류 누락"
        - "표 1 개로 정리 안 함"
    target_vm: attacker
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — curl 고급 옵션 7 종을 의도와 함께 1 회씩

      **어디서:** attacker 컨테이너
      **무엇을:** curl 의 7 옵션 — `-X`, `-H`, `-c` (cookie jar 저장), `-b` (cookie 전송), `-d` (POST body), `--max-time`, `-w` (writeout format) — 을 각각 *의도를 갖고* 1 회 실행. 대상 = juice.6v6.lab 의 `/rest/user/login` (POST) + `/api/Products` (GET) 등.

      **결과 어떻게 정리:**

      | 옵션 | 의도 (이 옵션 이 풀고 자 한 문제) | 학생 작성 한 명령 | 결과 핵심 1 줄 |
      |---|---|---|---|
      | -X | HTTP 메서드 변경 (GET → POST/PUT) | | |
      | -H | 임의 헤더 삽입 (User-Agent / X-Forwarded-For 등) | | |
      | -c | 응답 의 Set-Cookie 를 file 로 저장 | | |
      | -b | -c 로 저장한 cookie 를 다음 요청 에 첨부 | | |
      | -d | POST body (JSON 또는 form) 전송 | | |
      | --max-time | 응답 5 초 이상 시 타임아웃 (DoS 방지) | | |
      | -w | 응답 시간·코드·크기 등 표준화 출력 | | |

      ## 💡 왜 이걸 하는가?

      curl 만 의 7 옵션 을 손에 익히면 W04 의 인증/세션 점검 (cookie/POST), W05 의
      SQLi (paramter 변조), W12 의 API 점검 (헤더 삽입) 까지 모두 자력 진행 가능.
      curl 이 weapon 인 점검자의 base equipment.

      ## 🔵 Blue 측 관찰 (선택)

      -H 로 X-Forwarded-For 변조 시 fw HAProxy 가 그 헤더를 그대로 web 으로 forward.
      web 의 access.log 에 비정상 src ip 가 기록 — 점검자 의 가짜 IP 추적 시도 가 어떻게 보이는지 학생 이 직접 확인 가능.

      ## 📋 채점 기준

      - 7 옵션 모두 의도 1 줄 + 실제 명령 + 결과 1 줄
      - -c / -b 는 *같은 cookie* 가 두 단계 에 걸쳐 흐름 (cookie jar 가 실제 사용됨)
      - -w 의 출력 format (`%{http_code}` 등) 직접 작성
    hint: "각 옵션 의 man curl 부분 1 회 정독. -c cookie.txt → /rest/user/login POST → -b cookie.txt → /api/Users (인증 필요 endpoint) GET."
    category: tooling
    points: 12
    answer: |
      🤖 자기학습용 정답 가이드:
      curl -X OPTIONS http://juice.6v6.lab/ -sI | grep -i allow
      curl -H 'X-Forwarded-For: 1.2.3.4' -sI http://juice.6v6.lab/
      curl -c /tmp/cookie.txt -sI http://juice.6v6.lab/
      curl -b /tmp/cookie.txt -s http://juice.6v6.lab/api/Products | head -c 200
      curl -X POST http://juice.6v6.lab/rest/user/login -H 'Content-Type: application/json' -d '{"email":"x","password":"y"}' -s | head -c 200
      curl --max-time 5 http://juice.6v6.lab/api/Products -o /dev/null -s -w 'code=%{http_code} t=%{time_total}s\n'
      curl -o /dev/null -s -w 'code=%{http_code} size=%{size_download} ttfb=%{time_starttransfer}\n' http://juice.6v6.lab/
    answer_detail: |
      -X OPTIONS 는 CORS preflight 의도 — Allow 헤더 노출 = 서버 가 어떤 메서드 받는지.
      -H 로 X-Forwarded-For 변조 + fw HAProxy 통과 시 그대로 web access.log 에 가짜 IP.
      -c / -b 의 cookie jar 는 W04 인증/세션 의 핵심 patternd. -d 의 JSON 은 W05 SQLi 의
      input 변조 시 본격 사용.
    verify:
      intent: "curl 7 옵션 각 1 회 실행 + 의도 + 명령 + 결과 표 정리"
      success_criteria:
        - "7 옵션 모두 의도 1 줄 + 명령 + 결과 1 줄"
        - "-c 와 -b 가 같은 cookie file 사용"
        - "-w 의 format 직접 작성 (%{http_code} 등)"
      acceptable_methods:
        - "표 markdown / plaintext"
        - "-d 는 JSON 또는 form 모두 OK"
      negative_signs:
        - "옵션 만 나열 (의도 없이)"
        - "결과 인용 누락"
        - "-c -b 가 다른 file"
    target_vm: attacker
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION — nikto 1 라인 정찰 + 결과 해석

      **어디서:** attacker 컨테이너
      **무엇을:** nikto 로 juice.6v6.lab 을 1 회 비파괴 스캔. 결과 의 *처음 3 finding* 을 추출하고 각각 의 의미를 학생 본인 의 언어로 1 줄 설명.

      ⚠️ **시간 제한 필수**: nikto 의 default scan 은 수 분 ~ 수 십 분. lab 시간 내
      에 끝나도록 `-maxtime` 옵션 으로 30~60 초 제한.

      **결과 어떻게 정리:**

      ```
      [nikto finding 1]: <결과 1 줄>
        해석: <학생 본인 의 1 줄 설명 — 어떤 취약 점 / 어떤 의미>

      [nikto finding 2]: ...
        해석: ...

      [nikto finding 3]: ...
        해석: ...
      ```

      ## 💡 왜 이걸 하는가?

      nikto = 7,000+ 알려진 위험 file / 잘못된 설정 / 오래된 software 자동 검사.
      현실 운영 환경 에서는 nikto 가 "1 차 baseline" — 알려진 결함 부터 제거 후
      비즈니스 로직 결함 으로 진행.

      ## 🔵 Blue 측 관찰

