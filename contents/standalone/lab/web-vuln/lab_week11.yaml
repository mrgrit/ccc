lab_id: standalone-web-vuln-week11
title: "에러 처리 / 정보 노출 점검 — stack trace / version / debug (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 11
description: |
  에러 처리 결함 (OWASP A05 Security Misconfiguration) + 정보 노출 (Information
  Disclosure) 의 4 패턴: stack trace 노출, 버전 정보 노출, debug endpoint, 비정상
  응답 의 verbose error. JuiceShop 의 의도적 challenge — error API + admin debug.
difficulty: easy
duration_minutes: 90
prerequisites:
  - "W01~W04 의 endpoint 식별 결과 가용"
  - "attacker curl + jq"
objectives:
  - "stack trace 노출 — 비정상 입력 (예: SQL 메타문자 / 큰 number / null) 로 500 응답 유도"
  - "버전 정보 노출 — Server / X-Powered-By / JS bundle 의 version comment"
  - "debug / metrics endpoint — /metrics / /debug / /api-docs 직접 접근"
  - "verbose error message — error.message 의 stack / file path 노출 여부"
  - "Red/Blue/Purple — 에러 응답 의 detail 누설 vs Blue 의 error monitoring"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — stack trace 유도

      **어디서:** attacker
      **무엇을:** 비정상 입력 으로 500 응답 + stack trace / file path 노출 여부.

      | 입력 | endpoint | 응답 코드 | body 첫 1~3 줄 | stack trace 노출? |
      |---|---|---|---|---|
      | SQL meta `'` | /rest/products/search?q= | | | |
      | huge number | /api/Products/99999999999 | | | |
      | null | /api/Products/null | | | |
      | type confusion | /api/Products/abc | | | |

      ## 📋 채점
      - 4 입력 시도 + 표
      - stack trace / file path 노출 여부 분석
    hint: "JuiceShop 의 일부 endpoint 는 의도적 verbose error — 학생 본인 어디 endpoint 가 stack 노출 하는지 발견."
    category: error_handling
    points: 12
    answer: |
      🤖 가이드:
      for q in "'" "99999999999" "null" "abc"; do
        out=$(curl -s "http://juice.6v6.lab/api/Products/$q" | head -c 200)
        echo "[$q] $out"
      done
    answer_detail: |
      Express default error handler — verbose dev mode 시 stack 노출. 운영 환경 NODE_ENV=production 으로 차단 필수.
    verify:
      intent: "4 비정상 입력 + stack trace 분석"
      success_criteria:
        - "4 입력 시도"
        - "응답 표"
        - "stack/file path 노출 분석"
      acceptable_methods:
        - "curl"
      negative_signs:
        - "1~2 입력만"
    target_vm: attacker
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — 버전 + debug endpoint

      **무엇을:** 버전 정보 + debug endpoint 식별
      - Server / X-Powered-By 헤더
      - JS bundle 의 version string (grep)
      - /metrics, /debug, /api-docs, /swagger 접근
      - /admin/* metrics endpoint

      ## 📋 채점
      - 4+ endpoint 확인 + 노출 정보
    hint: "curl -sI; curl http://juice.6v6.lab/main.js | grep -oP 'version[^\"]+' | head; for p in /metrics /debug /api-docs /swagger; do curl -o /dev/null -s -w \"%{http_code} $p\\n\"; done."
    category: error_handling
    points: 10
    answer: |
      🤖 가이드:
      curl -sI http://juice.6v6.lab | grep -iE 'server|x-powered|x-recruiting'
      for p in /metrics /debug /api-docs /swagger /api/version; do
        code=$(curl -o /tmp/d.out -s -w '%{http_code}' "http://juice.6v6.lab${p}")
        head=$(head -c 60 /tmp/d.out)
        echo "${p} → ${code} | ${head}"
      done
    answer_detail: |
      JuiceShop /metrics 200 (Prometheus). /api-docs swagger 노출 (의도적). /admin 의 일부 endpoint debug 형태. 운영 환경 의 debug endpoint 노출 = critical finding.
    verify:
      intent: "버전 + debug endpoint 4+"
      success_criteria:
        - "버전 헤더"
        - "4+ debug endpoint"
        - "노출 정보 분석"
      acceptable_methods:
        - "curl 표"
      negative_signs:
        - "1~2 endpoint만"
    target_vm: attacker
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — 정보노출 보고서 + cleanup

      4 finding (stack trace / 버전 / debug endpoint / verbose error) 통합 markdown + cleanup.
    hint: "OWASP A05 매핑."
    category: documentation
    points: 8
    answer: |
      🤖 가이드: markdown + rm -f /tmp/d.out
    answer_detail: |
      정보 노출 = 단독으로 critical 아니지만 다른 결함 (CVE 매핑 / 공격 chain) 의 출발점.
    verify:
      intent: "4 finding 보고서 + cleanup"
      success_criteria:
        - "4 finding"
        - "cleanup"
      acceptable_methods:
        - "markdown"
      negative_signs:
        - "finding 1~2개"
    target_vm: attacker
    risk_level: low
