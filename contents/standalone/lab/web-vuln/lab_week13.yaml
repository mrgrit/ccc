lab_id: standalone-web-vuln-week13
title: "자동화 점검 도구 활용 — sqlmap / nuclei / nikto / dalfox / zap (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 13
description: |
  자동화 점검 도구 5 종 의 *실제 활용* — sqlmap (SQLi 자동), nuclei (5000+ template),
  nikto (서버 점검), dalfox (XSS 자동), ZAP baseline. W01~W12 의 수동 점검 결과
  와 cross-check + 시간 효율 비교 + false positive 분석.
difficulty: medium
duration_minutes: 120
prerequisites:
  - "W02 도구 환경 + W05 수동 SQLi + W06 수동 XSS 경험"
  - "attacker 의 5 도구 가용"
objectives:
  - "sqlmap automated SQLi 점검 — 5 카테고리 자동 + W05 수동 결과 와 비교"
  - "nuclei 의 medium/high severity finding 의 W11 정보 노출 + W04 인증 결과 와 비교"
  - "nikto 의 발견 항목 의 W01 정찰 결과 와 일치 여부"
  - "dalfox XSS 자동 vs W06 수동 결과 비교"
  - "5 도구 종합 + false positive 분석 + 시간 효율 + 자동 vs 수동 의견"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — sqlmap automated 5 카테고리

      **무엇을:** sqlmap -u "http://juice.6v6.lab/rest/products/search?q=test" --batch --random-agent --technique=ESUTB --dbs

      ## 📋 채점
      - 5 카테고리 (E/S/U/T/B) 자동 시도 + 결과
      - W05 수동 과 비교 (어느 게 더 finding 많았나)
    hint: "--batch = no prompt. --random-agent = WAF 우회. --threads=1 = 직렬 (운영 영향 최소). --crawl=0 = single URL."
    category: automation
    points: 12
    answer: |
      🤖 가이드:
      sqlmap -u 'http://juice.6v6.lab/rest/products/search?q=test' --batch --random-agent --technique=ESUTB --threads=1 --crawl=0 2>&1 | tail -30
    answer_detail: |
      sqlmap 의 자동화 = 시간 효율 ↑ 그러나 false positive 가능 (응답 body 다른 패턴 만 보고 vulnerable 판정). W05 수동 점검 의 정확도 + W13 자동 의 속도 = 운영 점검 의 균형.
    verify:
      intent: "sqlmap 5 카테고리 + W05 비교"
      success_criteria:
        - "sqlmap 실행"
        - "finding 인용"
        - "W05 와 비교 1 문장"
      acceptable_methods:
        - "sqlmap --batch"
      negative_signs:
        - "결과 paste 만"
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: |
      ## 🎯 MISSION — nuclei 종합 (severity medium+)

      **무엇을:** nuclei -u URL -severity medium,high,critical -silent. finding 상위 5 + W01~W12 와 cross-check.
    hint: "nuclei -u http://juice.6v6.lab -severity medium,high,critical -silent | head -20."
    category: automation
    points: 12
    answer: |
      🤖 가이드:
      nuclei -u http://juice.6v6.lab -severity medium,high,critical -silent 2>&1 | head -10
    answer_detail: |
      nuclei = template 5000+ 의 빠른 baseline. W01 의 헤더 finding + W11 의 debug endpoint 등 자동 매핑.
    verify:
      intent: "nuclei + 5+ finding + cross-check"
      success_criteria:
        - "nuclei 실행"
        - "5+ finding"
        - "cross-check 1 문장"
      acceptable_methods:
        - "nuclei"
      negative_signs:
        - "1~2 finding"
    target_vm: attacker
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — dalfox XSS 자동

      **무엇을:** dalfox url http://juice.6v6.lab/#/search?q=FUZZ. XSS payload 자동 fuzz + 결과.
    hint: "dalfox url 'http://juice.6v6.lab/?q=FUZZ' --silence."
    category: automation
    points: 10
    answer: |
      🤖 가이드:
      dalfox url 'http://juice.6v6.lab/?q=FUZZ' --silence 2>&1 | head -10
    answer_detail: |
      dalfox = XSS 전용 fuzzer. JuiceShop SPA + Angular 의 자동 escape — dalfox 의 일부 payload 차단 / 일부 통과.
    verify:
      intent: "dalfox + XSS finding"
      success_criteria:
        - "dalfox 실행"
        - "finding 인용 또는 0 (이유 1 문장)"
      acceptable_methods:
        - "dalfox 또는 nuclei xss tags"
      negative_signs:
        - "실행 안 함"
    target_vm: attacker
    risk_level: medium

  - order: 4
    instruction: |
      ## 🎯 MISSION — 5 도구 종합 비교표 + 보고서

      **무엇을:** sqlmap / nuclei / nikto / dalfox / zap 5 도구 의 시간 / finding 수 / false positive 률 / 권장 사용 시나리오 비교표 markdown.
    hint: "각 도구 의 점검 시간 측정 (time 명령) + finding 수 + W01~W12 와 비교."
    category: documentation
    points: 12
    answer: |
      🤖 가이드:
      # markdown table — 시간 / finding / false positive / 권장 시나리오 5 열.
      # 예: sqlmap = SQLi 전용 + 정확도 높음 + 운영 영향 ↑.
      # nuclei = baseline + 빠름 + medium severity 다수.
      # nikto = legacy server 점검 + 정확도 중 + 시간 ↑.
      # dalfox = XSS 전용 + Angular 같은 SPA 에서 false negative 가능.
      # ZAP = GUI + 종합 + lab 환경 무거움.
    answer_detail: |
      자동 도구 의 결과 는 항상 수동 cross-check 필요. 실제 점검 = 자동 baseline + 수동 비즈니스 로직.
    verify:
      intent: "5 도구 비교표 + 권장 시나리오"
      success_criteria:
        - "5 도구 모두 비교"
        - "시간 / finding / 시나리오"
      acceptable_methods:
        - "markdown table"
      negative_signs:
        - "3 이하 도구"
    target_vm: attacker
    risk_level: low

  - order: 5
    instruction: |
      ## 🎯 MISSION — cleanup

      **무엇을:** 자동 도구 들 의 output file / temp 정리.
    hint: "rm -rf ~/.sqlmap/output/* ~/.nikto/* /tmp/dalfox*"
    category: cleanup
    points: 4
    answer: |
      🤖 가이드:
      rm -rf ~/.sqlmap/output/* /tmp/nuclei* /tmp/dalfox* 2>/dev/null
      echo '[cleanup] 자동 도구 output 정리'
    answer_detail: |
      자동 도구 의 output 누적 = lab 환경 disk 사용 ↑. 매 lab 후 정리.
    verify:
      intent: "cleanup"
      success_criteria:
        - "cleanup 명령 + 확인"
      acceptable_methods:
        - "rm 다양"
      negative_signs:
        - "확인 누락"
    target_vm: attacker
    risk_level: low
