  - order: 3
    instruction: |
      ## 🎯 MISSION — GraphQL 의 introspection + 5 vuln

      ## GraphQL 의 5 vuln
      1. **introspection enabled** = schema 노출
      2. **batching attack** = 100 query 의 1 request
      3. **circular query** = DoS
      4. **field suggestion** = error 의 field 추측
      5. **JWT 없는 mutation** = 권한 우회

      ## 시뮬
      ```bash
      curl -X POST -H 'Content-Type: application/json' \
        -d '{"query":"{__schema{types{name}}}"}' \
        http://target/graphql
      ```
    hint: 5 GraphQL vuln
    category: analysis
    points: 25
    answer: 학습 산출물
    answer_detail: GraphQL vuln
    verify:
      type: output_contains
      expect: 'introspection\|GraphQL'
      field: stdout
      semantic:
        intent: GraphQL vuln
        success_criteria: [5 vuln]
        acceptable_methods: ["**[OSS] InQL + Burp**"]
    target_vm: bastion

