      ## 🎯 MISSION — JuiceShop REST API enum

      ```bash
      ssh 6v6-attacker bash <<'SH'
      for path in /rest/products /api/Users /api/Products /rest/admin/application-version /rest/user/whoami; do
        code=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: juice.6v6.lab' "http://10.20.30.1$path")
        echo "$path: $code"
      done
      SH
      ```
    hint: 5 REST endpoint
