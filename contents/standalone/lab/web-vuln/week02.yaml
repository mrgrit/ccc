    *raw 옵션* 의 위험과 정정 코드 예시. 학습 환경 의 ModSecurity 현재 모드
    (DetectionOnly) 확인 + 운영 시 SecRuleEngine On 권장.

    ## 💻 실행 명령

    ```bash
    # 1. 현재 web 의 ModSec 모드 확인 (Detection Only vs On)
    echo "=== 1. ModSec 현재 모드 (audit log 마지막 3 줄) ==="
    # 학습 환경 의 web (6v6-web) 의 modsec_audit.log — bastion ssh 6v6-web 또는 직접
