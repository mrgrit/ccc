    ## 🎯 MISSION

    STEP 5 에서 추출한 admin@juice-sh.op MD5 hash `0192023a7bbd73250516f069df18b500`
    의 cracking. (1) 길이 32 hex = MD5 식별 (2) weak password 후보 직접 매칭
    (3) hashcat dictionary attack 의 시도 (4) bcrypt/argon2 권장.

    ## 💻 실행 명령

    ```bash
    HASH="0192023a7bbd73250516f069df18b500"
    echo "hash: ${HASH} (length=${#HASH} → MD5)"

    # weak password 후보 직접 매칭
    echo "=== weak password 직접 매칭 ==="
    for pw in "admin" "admin123" "password" "123456" "letmein" "qwerty"; do
      h=$(echo -n "${pw}" | md5sum | awk '{print $1}')
      [ "${h}" = "${HASH}" ] && echo "  ★ MATCH: pw='${pw}'" || echo "  ${pw} → ${h:0:16}..."
    done
    echo ""
    echo "운영 = bcrypt(12)/argon2 + password policy + MFA + rate-limit"
    echo "해시 분석 완료"
    ```

    ## 📋 확인 사항

    - 32 hex = MD5 식별 (60 = bcrypt, 64 = SHA256)
    - admin123 → 0192023a7bbd73250516f069df18b500 (★ MATCH)
    - 실 wordlist (rockyou.txt) + hashcat 의 즉시 cracking

    ## 💡 왜 이걸 하는가?

    SQLi 로 추출한 hash 의 crackability = credential stuffing (MITRE T1110.004)
    의 직접 입력. MD5 + weak password = 1 초 cracking. 운영 web 의 적절한
    hash = bcrypt(12) 또는 argon2id.

    ## 🔵 Blue 작업

    - 정기 password audit (DB sample → hash 형식 식별)
    - HIBP API 로 leaked password 강제 재설정 alert

    ## 🟣 Purple 권고

    - bcrypt(12) 또는 argon2id 강제 (MD5 deprecate)
    - password policy 12자 + 복잡도 + HIBP API 검증
    - MFA 의무 + rate-limit + Juice Shop default admin123 제거
