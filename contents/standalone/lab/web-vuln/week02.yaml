    # 4. 모든 technique 강제 (BEUSTQ = Boolean + Error + Union + Stacked + Time + inline Q)
    echo ""
    echo "=== 4. 모든 technique 시도 ==="
    sqlmap -u 'http://juice.6v6.lab/rest/products/search?q=test' \
      --batch --level=3 --risk=2 --technique=BEUSTQ 2>&1 | grep -E 'injection|technique' | head -10
    ```

    ## 📋 확인 사항

    - sqlmap 탐지 결과 의 `Parameter: q (GET)` + `Type: <technique>` + `Title: ...`
    - DB 종류 `back-end DBMS: SQLite` 직접 확인
    - Users 테이블 column list (id/email/password/role/...)
    - dump 결과 의 admin@juice-sh.op + MD5 hash (STEP 5 와 일치)
    - technique = Boolean + Error + Union + Time 모두 가능 (Juice Shop 의 의도 challenge)

    ## 💡 왜 이걸 하는가?

    sqlmap 은 OWASP / NIST 가 인정 한 SQL Injection 자동화 표준 (PenTest+ /
    OSCP 시험 도구). STEP 1-7 의 수동 시도를 한 줄 로 종합 + 더 많은 payload
    (--level 3-5 / --risk 2-3) + DB 별 specific 페이로드 + tamper 스크립트
    (WAF 우회). 학습 환경 의 default = `--level=1 --risk=1` 충분 (Juice Shop
    의 의도 challenge 모두 매핑됨).

    ## 🔵 Blue 측 관찰

    sqlmap 의 default User-Agent = `sqlmap/X.Y.Z` → ModSecurity CRS rule 913100
    (Found User-Agent associated with security scanner) 즉시 트리거. burst
