    # 2. 5 단 방어 표 (markdown)
    cat <<'EOF'
    === SQLi 5 단 방어 표 ===

    | 단계 | 방어 기법 | Juice Shop 적용 예 | 우회 가능성 |
    |------|----------|------------------|------------|
    | 1 | Prepared Statement | sequelize.query(sql, {replacements:[q]}) | 거의 0 |
    | 2 | ORM where 객체 | User.findOne({where:{email}}) (raw:false) | 거의 0 |
    | 3 | Input Validation | express-validator body('email').isEmail() | 정규식 우회 가능 |
    | 4 | WAF (ModSec CRS) | rule 942100 (libinjection SQLi) | tamper 우회 가능 |
    | 5 | DB user 최소 권한 | SELECT only, no FILE/SUPER/CREATE | RCE 차단 |
    EOF

    # 3. Sequelize raw 옵션 위험 예시 (코드)
    cat <<'CODE_EOF'
    // ❌ 위험: raw query 의 string concat (Juice Shop default 의 challenge)
    sequelize.query(
      "SELECT * FROM Users WHERE email = '" + req.body.email + "'",
      { type: QueryTypes.SELECT }
    )

    // ✅ 안전: replacements 매개변수
    sequelize.query(
      "SELECT * FROM Users WHERE email = ?",
      { replacements: [req.body.email], type: QueryTypes.SELECT }
    )

    // ✅ 안전: ORM where 객체 (가장 권장)
    User.findOne({ where: { email: req.body.email } })
    CODE_EOF

    echo "SQLi 5 단 방어 정리 완료"
    ```

    ## 📋 확인 사항

    - Prepared Statement 의 ?/$1 placeholder 가 SQL parse 단계에서 data 분리
    - ORM where 객체 의 자동 escape (Sequelize / Django ORM / Hibernate)
    - Input Validation 의 한계 (정규식 우회 / Unicode normalization)
    - WAF 의 한계 (sqlmap --tamper 우회)
    - DB user 최소 권한 = SQLi 성공해도 데이터 dump 만 (FILE/CREATE 차단)

    ## 💡 왜 이걸 하는가?

    OWASP 의 *5 단 방어* (defense in depth) 가 SQLi 차단 의 표준 (T1190 mitigation).
    단일 방어 의존 (예: WAF 만) = 우회 시 100% 노출. 5 단 모두 적용 시 우회
