    ## 💡 왜 이걸 하는가?

    Time-based Blind SQLi 는 *응답 본문 / 길이* 누설 0 인 환경에서도 작동 —
    *오직 시간* 만 신호 (MITRE T1190 + OWASP A03). MySQL `SLEEP(5)` / PostgreSQL
    `pg_sleep(5)` 와 동일 — SQLite 는 native sleep 없으므로 RANDOMBLOB 활용.
    sqlmap 의 `--technique=T --time-sec=5` 자동화. 한 글자 당 5 sec × 32 자 ×
    16 후보 = 약 40 분 (Boolean 보다 느리지만 탐지 회피 ↑).

