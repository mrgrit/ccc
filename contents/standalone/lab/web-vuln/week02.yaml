# STEP 11 [RED·SQLi·Advanced·Header] — 4 헤더 SQLi 시도 → sanitize 학습
# ============================================================
- order: 11
  instruction: |
    ## 🎯 MISSION

    HTTP 요청 헤더 (User-Agent / Referer / X-Forwarded-For / Cookie) 의 SQLi
    가능성 점검. Juice Shop 의 default 응답으로 헤더 sanitize 여부 확인 +
    운영 환경의 *외부 로깅/분석 시스템* 의 위험 사례 (ELK / Splunk 등 자체
    SQL DB 사용 시) 학습.

    ## 💻 실행 명령

    ```bash
    # 4 헤더 + SQLi payload 시도 (응답 코드 + 크기 비교)
    for kv in "User-Agent:\" OR 1=1--" "Referer:\" OR 1=1--" \
              "X-Forwarded-For:1\" OR 1=1--" "Cookie:token=\" OR 1=1--"; do
      hdr_name=$(echo "$kv" | cut -d: -f1)
      hdr_val=$(echo "$kv" | cut -d: -f2-)
      code=$(curl -s -o /dev/null -w "%{http_code}" -H "${hdr_name}: ${hdr_val}" \
        http://juice.6v6.lab/rest/products/search?q=apple)
      echo "${hdr_name}: ${hdr_val} → ${code}"
    done

    # sqlmap --headers 자동화 (시간 소요 — Juice Shop 의 헤더 sanitize 확인)
    sqlmap -u 'http://juice.6v6.lab/rest/products/search?q=apple' \
      --batch --level=3 --headers="User-Agent: *,Referer: *" 2>&1 | tail -10
    ```

    ## 📋 확인 사항

    - 4 헤더 모두 응답 200 + 정상 응답 → Juice Shop default 의 헤더 sanitize 됨
    - sqlmap --headers 의 결과 = "no injection point found in headers"
    - **운영 환경 위험**: 외부 SIEM/ELK/Splunk 가 access_log 의 헤더를 *자체
      SQL DB* 에 저장 → query 결합 시 Second-Order SQLi 발생 가능

    ## 💡 왜 이걸 하는가?

    헤더 SQLi 는 *클라이언트 제어* 의 입력 벡터 (MITRE T1190 + OWASP A03).
    Modern web framework (Express/Django/Spring) 는 헤더를 string 으로 처리
    하지만, *로그 분석 시스템* 의 자체 SQL query 결합은 별도 — 운영자가
    잊기 쉬운 부분. WAF (ModSecurity) 의 default rule 도 query param 위주
    검사 → 헤더 검사는 추가 설정 필요.

    ## 🔵 Blue 측 관찰

    헤더 SQLi 시도는 access_log 의 일반 라인 (응답 200 + URL/UA 그대로) 로
    기록. ModSecurity CRS rule 942100~942999 의 default 는 query param 우선
    검사 → 헤더 검사 enable 시 rule 942100 in REQUEST_HEADERS 추가 필요.
    Wazuh 의 정기 cron — access_log 의 헤더 패턴 grep (`' OR 1=1`) + alert.

    ## 🟣 Purple 보완 권장

    - **로그 저장 시 parameterized**: 외부 SIEM/ELK 의 LogStash filter 에서
      헤더를 *string field 만* 저장 (SQL query 결합 금지)
    - **WAF 헤더 검사 활성화**: ModSecurity 의 `SecRuleEngine On` + rule
      942100~942130 in REQUEST_HEADERS variable 추가
    - **헤더 whitelist**: Apache `RewriteCond %{HTTP:User-Agent} !^[a-zA-Z0-9_./() -]+$
      [NC]` 으로 정상 UA 만 허용
    - **User-Agent normalization**: log 저장 전 special character (`'`, `"`, `--`,
      `;`) 제거 또는 escape
  hint: |
    4 헤더 (User-Agent / Referer / X-Forwarded-For / Cookie) 의 SQLi payload
    시도 → 응답 200 = sanitize 됨. sqlmap --headers 로 자동 점검.
