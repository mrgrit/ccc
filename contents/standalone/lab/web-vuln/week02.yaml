  - order: 5
    instruction: |
      ## 🎯 MISSION — W02 보고서 작성 (5 IDOR + JWT 변조 + 권장)

      W02 의 step 1-4 결과 종합 보고서. *임원 + 운영 + 분석가* 의 3 청자 의 *동시
      만족* 형식.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **3 청자** = (1) CISO/임원 (관리 결정) (2) 운영자 (즉시 패치) (3) 분석가 (재현)
      - **PTES 표준** = W15 기말 의 *전체 보고서* 의 축약 형
      - **CVSS 3.1** = 본 vuln 의 *위험도 점수* 산정 (0-10)
      - **CWE 매핑** = CWE-639 (IDOR) + CWE-345 (alg=none)
      - **본 step 의 산출물** = W02 의 *유일 한 평가 산출물*

      ## 💻 산출물 (4 섹션 보고서)

      ```markdown
      # W02 — A01 Broken Access Control 분석 보고서

      ## 1. Executive Summary (임원)
      - target: JuiceShop (juice.6v6.lab, 학습 환경)
      - 발견 vuln 2 종 — IDOR (Bearer with admin token) + JWT alg=none 시도
      - CVSS 8.2 (High) + CVSS 9.1 (Critical) 추정
      - 권장: 즉시 *role-based access control* 적용 + JWT alg whitelist

      ## 2. Detailed Findings (분석가)
      ### F1 — IDOR (CWE-639)
      - Reproduction: admin@juice-sh.op login → Bearer header → /api/Users/{1..5}
      - 결과: 5 user 모두 200 (admin 외 user 데이터 노출)
      - 영향: 모든 user 의 email / password hash / role 노출
      - 근본 원인: API 의 *role 검증* 없이 *token 만* 으로 접근 허용

