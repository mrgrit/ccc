  - order: 2
    instruction: |
      ## 🎯 MISSION — JWT 3 segment decode (header + payload + signature)

      step 1 의 token 의 *3 segment* 를 base64 decode → header (alg / typ) + payload
      (claims) + signature 확인.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **base64url** = JWT 의 *URL-safe* base64. `+` → `-`, `/` → `_`, padding `=` 생략
      - **header** = `{"alg":"RS256","typ":"JWT"}` 같은 *알고리즘 + 타입*
      - **payload (claims)** = `iss / sub / exp / role / user` 등 *권한 정보*
      - **signature** = `HMACSHA256(base64(header) + "." + base64(payload), secret)`
      - **alg 종류** = RS256 (RSA) / HS256 (HMAC) / ES256 (ECDSA) / **none** (위험)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      TOK=$(curl -s -X POST -H 'Content-Type: application/json' -H 'Host: juice.6v6.lab' \
        http://10.20.30.1/rest/user/login \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r .authentication.token)

      HEADER=$(echo $TOK | cut -d. -f1)
      PAYLOAD=$(echo $TOK | cut -d. -f2)
      SIG=$(echo $TOK | cut -d. -f3)

      echo "=== Header ==="
      echo $HEADER | base64 -d 2>/dev/null
      echo ""
      echo "=== Payload ==="
      echo $PAYLOAD | base64 -d 2>/dev/null | jq . 2>/dev/null | head -20
      echo ""
      echo "=== Signature (base64url) ==="
      echo "$SIG" | head -c 80
      echo " (length: ${#SIG})"
      SH
      ```

      ## 📋 확인 사항

      - Header 의 `alg` (RS256 또는 HS256) + `typ: JWT`
      - Payload 의 claims (`data.id`, `data.email`, `data.role`, `iat`, `exp`)
      - Signature 의 *base64url* (약 256-512 char)

      ## 💡 왜 이걸 하는가?

      JWT 의 *내부 구조* 인지 = 변조 의 *기반*. payload 의 `role` 또는 `id` 변조 시도
      의 *직전 단계*.

      ## 🔍 결과 해석

      - **정상**: Header + Payload + Signature 모두 출력
      - **base64 decode 실패**: padding 부족 — `echo $HEADER==`  (= 추가)
      - **Payload jq error**: JSON 형식 X — raw 출력 그대로

      ## 비정상 시 대응

      - **base64 의 padding 오류** — `echo "$HEADER" | sed 's/$/==/' | base64 -d 2>/dev/null`
      - **alg 가 none**: 매우 의심 — 즉시 보고 (실 운영 의 critical bug)
    hint: |
