lab_id: standalone-web-vuln-week02
title: A01 Broken Access Control — IDOR + JWT (JuiceShop hands-on)
version: standalone-non-ai
course: web-vuln
week: 2
description: |
  OWASP A01 (Broken Access Control) 의 *가장 흔한 2 패턴* — IDOR + JWT 변조 — 의
  JuiceShop hands-on. login → JWT 획득 → IDOR 시퀀스 → alg=none 우회 시도 → 보고.
difficulty: medium
duration_minutes: 180
audience: web-vuln 2주차
prerequisites:
  - W01 lecture + lab 완료
  - 학생 PC 의 curl + jq + base64 가용
  - 6v6 의 attacker / web 컨테이너 가동
  - JuiceShop 의 default credential (admin@juice-sh.op / admin123) 가용
objectives:
  - JuiceShop login + JWT token 획득
  - JWT 의 3 segment (header / payload / signature) decode
  - Bearer header 의 IDOR 5 user 시퀀스
  - JWT alg=none 변조 시도 + 결과 분석
  - 보고서 작성 (5 IDOR + 변조 결과 + 권장)
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — JuiceShop login + JWT token 획득

      JuiceShop 의 `/rest/user/login` 호출 → JWT token 획득 + token 길이 + 3 segment
      검증. 본 step 이 W02 의 *모든 다음 step 의 input*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **JuiceShop** = OWASP 의 vulnerable web app (Node.js + Angular). 본 과목 의
        *대표 target*
      - **default credential** = `admin@juice-sh.op` / `admin123` (학습 환경 만, 실
        product 거부)
      - **JWT (JSON Web Token)** = RFC 7519 의 표준. 3 segment 의 *base64url* 인코딩
      - **REST API** = `/rest/user/login` (Juice Shop 표준)
      - **본 step 의 token** = 다음 step 의 Bearer header 의 *필수 input*

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      TOK=$(curl -s -X POST -H 'Content-Type: application/json' -H 'Host: juice.6v6.lab' \
        http://10.20.30.1/rest/user/login \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r .authentication.token)
      echo "token: $TOK" | head -c 150
      echo ""
      echo "length: ${#TOK}"
      echo "segments: $(echo $TOK | tr . '\n' | wc -l)"
      SH
      ```

      ## 📋 확인 사항

      - token 길이 700+ (RS256 의 일반)
      - segments = 3 (header.payload.signature)
      - token 의 첫 *eyJ* 시작 (base64 의 `{` 시작)

      ## 💡 왜 이걸 하는가?

      JWT 가 *modern web* 의 표준 인증 토큰. 본 step 의 *획득* 이 *모든 권한 우회* 의
      시작점.

      ## 🔍 결과 해석

      - **정상**: token 732 char + 3 segment + eyJ 시작
      - **token len: 0**: login 실패 — credential 확인 또는 JuiceShop 미가동
      - **segments != 3**: response 가 *JWT 가 아님* — `.authentication.token` 의 path 변경 가능성

      ## 비정상 시 대응

      - **401 Unauthorized**: admin123 비밀번호 변경 됨 — JuiceShop 의 *기본 설정* 사용
      - **404**: `/rest/user/login` path 변경 — JuiceShop 버전 확인 (`/rest/admin/application-version`)
      - **jq 미설치**: `apt install jq` 또는 `python3 -c "import json,sys;print(json.load(sys.stdin)['authentication']['token'])"`

      ## 실측 검증 (2026-05-16)

      - token length 732 ✓
      - segments 3 ✓
      - 이후 step 의 input PASS
