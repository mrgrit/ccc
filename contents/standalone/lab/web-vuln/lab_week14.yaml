lab_id: standalone-web-vuln-week14
title: "취약점 점검 보고서 작성법 — 양식 / 위험도 / 권고 / Executive Summary (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 14
description: |
  W01~W13 의 점검 결과 를 *공식 보고서 양식* 으로 재작성. 운영 환경 의 실제 보고서
  와 유사한 5 section 구조 + CVSS 산정 + 우선순위 + 부록 (도구 + 명령 history).
  W14 의 markdown 이 W15 기말 의 baseline.
difficulty: medium
duration_minutes: 120
prerequisites:
  - "W01~W13 의 모든 finding 가용"
  - "W08 의 통합 보고서 경험"
objectives:
  - "공식 보고서 양식 5 section (Executive Summary / 점검 범위 / Finding / 우선순위 / 부록)"
  - "각 finding 의 CVSS v3.1 vector + score 산정"
  - "Executive Summary 의 비기술자 친화 1 페이지"
  - "권고 의 즉시 / 단기 / 중기 / 장기 분류"
  - "부록 의 도구 카탈로그 + 명령 history + sha256"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 공식 보고서 markdown 작성

      **어디서:** 학생 PC 보고서 (e.g. `~/web-vuln-w14-formal-report.md`)
      **무엇을:** W01~W13 의 finding 을 *공식 양식* 으로 재작성.

      **5 section 구조:**

      ```markdown
      # JuiceShop 보안 점검 보고서 (공식)

      **점검자:** <학생 이름>
      **점검 기간:** <YYYY-MM-DD ~ YYYY-MM-DD>
      **점검 대상:** http://juice.6v6.lab/
      **방법론:** OWASP WSTG + OWASP Top 10 + CVSS v3.1

      ## 1. Executive Summary (비기술자 친화 1 페이지)

      JuiceShop 의 종합 보안 점검 결과, 총 **N 개 의 취약점** 이 발견 되었습니다.
      이 중 **Critical N 개**, **High N 개**, **Medium N 개**, **Low N 개** 입니다.

      가장 우선 수정 권고 항목 은 **default 자격증명** 과 **JWT 변조** 입니다 —
      두 항목 모두 즉시 admin 권한 탈취 가능.

      비즈니스 영향: <학생 본인 분석 2~3 줄>

      ## 2. 점검 범위 / 방법론
      - 대상 URL / IP / 포트
      - In-scope / Out-of-scope
      - 사용 도구 카탈로그 (W02 + W13)
      - 점검 단계 (WSTG-INFO → AUTHN → INPVAL → ...)

      ## 3. Finding 상세 (CVSS + OWASP 매핑)

      ### F-01 default 자격증명 (Critical — CVSS 9.8)
      - **CVSS v3.1 vector:** AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H = 9.8
      - **OWASP Top 10:** A07:2021 Identification and Authentication Failures
      - **CWE:** CWE-798 Use of Hard-coded Credentials
      - **증거:** ...
      - **재현 절차:** 1. ... 2. ... 3. ...
      - **권고:** ...
      - **우선순위:** 즉시

      ### F-02 ~ F-N
      ...

      ## 4. 우선순위 표
      | 등급 | finding | 즉시/단기/중기/장기 | CVSS | OWASP |
      |---|---|---|---|---|

      ## 5. 부록
      - A. 사용 도구 카탈로그 (이름/버전/출처/사용 단계)
      - B. 명령 history (재현 가능 한 명령 list)
      - C. CVSS calculator 링크
      - D. sha256 무결성
      ```

      ## 📋 채점
      - 5 section 모두 포함
      - CVSS v3.1 vector + score 산정 (계산기 사용 가능)
      - Executive Summary 의 비기술자 친화 (전문 용어 최소화)
      - 권고 의 우선순위 분류
    hint: "CVSS v3.1 calculator = https://www.first.org/cvss/calculator/3.1 (인터넷 환경 가용 시). 또는 학생 본인 의 추정 (AV/AC/PR/UI/S/C/I/A 8 항목)."
    category: documentation
    points: 30
    answer: |
      🤖 가이드: markdown 5 section + CVSS — 위 instruction example.
      sha256sum report.md > report.sha256
    answer_detail: |
      공식 보고서 의 가치 = *재현 가능성* + *비기술자 친화* + *우선순위*. CVSS 의
      vector 산정 = 객관적 근거. 운영 환경 의 보고서 양식 + 실무 점검자 의 필수 산출물.
    verify:
      intent: "5 section markdown + CVSS + 우선순위 + 부록"
      success_criteria:
        - "5 section 모두 포함"
        - "Finding 의 CVSS vector + score"
        - "Executive Summary 비기술자 친화"
        - "우선순위 분류 (즉시/단기/중기/장기)"
        - "부록 의 도구 + 명령 + sha256"
      acceptable_methods:
        - "markdown"
        - "CVSS calculator 직접 또는 추정"
      negative_signs:
        - "section 누락"
        - "CVSS 없음"
        - "Executive Summary 전문 용어 가득"
        - "부록 없음"
    target_vm: bastion
    risk_level: low
