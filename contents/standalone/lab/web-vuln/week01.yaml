    HTTP 로 평생 통신 (sslstrip MITM 가능), HSTS 미적용 시 첫 방문에만
    여전히 평문 가능.

    ## 💻 실행 명령

    ```bash
    # 1. 리다이렉트 체인 추적 (-L = follow, -I = HEAD only)
    curl -sIL http://10.20.32.80/ 2>&1 | grep -iE '^(HTTP/|location:|strict-transport)'

    # 2. HSTS 헤더 단독 (HTTPS 응답에서)
    curl -sI https://10.20.32.80/ -k 2>&1 | grep -i '^strict-transport-security:'

    # 3. vhost 변형 (HAProxy backend)
    curl -sIL -H "Host: juice.6v6.lab" http://10.20.32.80/ \
      | grep -iE '^(HTTP/|location:|strict-transport)'
    ```

    ## 📋 확인 사항

    - 첫 응답이 `HTTP/1.1 301 Moved Permanently` + `Location: https://...` 인가
    - 리다이렉트 후 HTTPS 응답에 `Strict-Transport-Security: max-age=N; ...` 헤더
    - HSTS `max-age` 값 (>= 31536000 권장 = 1 년) + `includeSubDomains` 포함 여부
    - HTTPS 미설정 또는 self-signed 인증서 일 때 `-k` 옵션 필수 (학습 환경 통상)

    ## 💡 왜 이걸 하는가?

    HTTP → HTTPS 자동 리다이렉트 + HSTS 가 *동시* 적용되어야 sslstrip 등
    MITM 공격이 차단 (OWASP A02 Cryptographic Failures + MITRE T1557 Adversary
    -in-the-Middle 의 전제). 리다이렉트만 있고 HSTS 없으면 *첫 방문 의 평문
    구간* 에서 MITM 가능 — HSTS preload list (Chrome / Firefox) 등록까지 권장.

