    done
  answer_detail: |
    학습 환경의 default 는 ModSecurity CRS 가 sqlmap UA (rule 913100) 차단,
    HAProxy 가 Host 기반 라우팅 (juice.6v6.lab → juiceshop / 외 → 404).
    X-Forwarded-For 는 HAProxy 가 그대로 forward (option forwardfor) → backend
