lab_id: standalone-web-vuln-week01
title: HTTP 기초 — 요청/응답·헤더·메서드·쿠키 점검 (6v6 4-tier)
version: standalone-non-ai
course: web-vuln
week: 1
description: |
  6v6 4-tier 토폴로지 위에서 학생 PC → bastion → attacker → fw 거쳐 dmz 의
  web (Apache + ModSecurity + Juice Shop) 까지 HTTP 기본 통신을 점검한다.
  주요 HTTP 헤더, 메서드, 상태 코드, 쿠키 속성, 보안 헤더의 의미를 도구
  (curl/whatweb/nmap) 로 직접 수집하고 해석한다.
difficulty: easy
duration_minutes: 120
audience: 웹 보안 입문자 (1주차)
prerequisites:
  - "학생 PC `~/.ssh/config` 에 6v6-bastion + 6v6-attacker ProxyJump 설정 완료"
  - "attacker 컨테이너 (10.20.30.202) 에 curl / whatweb / nmap / nikto 설치"
  - "`juice.6v6.lab` 같은 vhost 가 학생 PC `/etc/hosts` 에서 192.168.0.110 으로 매핑"
objectives:
  - HTTP 요청/응답 구조 + 메서드 (GET/POST/PUT/DELETE/OPTIONS) 의 의미를 이해
  - 보안 헤더 (X-Frame-Options/CSP/HSTS/X-Content-Type-Options) 의 부재가 만드는 공격 벡터 파악
  - 쿠키 속성 (HttpOnly/Secure/SameSite) 의 보안 의미 + 누락 시 CSRF/XSS 위험
  - 6v6 의 fw HAProxy 가 host header (juice.6v6.lab / dvwa.6v6.lab ...) 기반으로 backend 라우팅
  - Red/Blue/Purple: Red 정찰 → Blue 가 ModSecurity audit log 에서 검출 → Purple 이 룰 보완
pass_threshold: 0.6
steps:
  # ============================================================
  # STEP 1 [RED·정찰] — HEAD 요청으로 대상 웹 서버의 응답 헤더 수집
  # ============================================================
- order: 1
  instruction: |
    ## 🎯 MISSION

    attacker (10.20.30.202) 에서 fw HAProxy 를 거쳐 dmz 의 web 컨테이너
    (Apache + ModSecurity + Juice Shop) 의 HTTP 응답 헤더를 수집한다. 학생은
    Server/Content-Type/Set-Cookie 등 어떤 헤더가 노출되는지 직접 본다.

    ## 💻 실행 명령

    ```bash
    # vhost 기반 (HAProxy host header 라우팅)
    curl -sI http://juice.6v6.lab/

    # 또는 web 컨테이너 dmz IP 직접
    curl -sI http://10.20.32.80/
    ```

    ## 📋 확인 사항

    - 응답 첫 줄 `HTTP/1.1 200 OK` (또는 301/302)
    - `Server: Apache/2.4.52 (Ubuntu)` 같은 배너 노출 여부 (= 정보 누설)
    - `Content-Type`, `Set-Cookie`, `X-Powered-By` 등 헤더 분포
    - 보안 헤더 (X-Frame-Options / CSP / HSTS) 의 **부재**

    ## 💡 왜 이걸 하는가?

    공격자는 침해 첫 단계로 응답 헤더에서 서버 소프트웨어/버전/기술 스택을 식별
    한다 (MITRE ATT&CK T1592.002 — Gather Victim Host Information: Software).
    운영자 입장에서는 불필요한 배너 노출이 곧 CVE 매핑의 출발점이 되는지 검토한다.

    ## 🔵 Blue 측 관찰 (다음 STEP 8 에서 본격)

    attacker 의 curl 1 회는 ModSecurity audit log
    (`/var/log/apache2/modsec_audit.log`) 에 GET 단일 라인으로만 기록. 보안
    헤더 부재는 운영자가 자체 ModSecurity 룰 또는 nikto/securityheaders.com
    으로 별도 점검해야 한다.
  hint: curl -sI 옵션으로 HEAD 요청. -L 옵션은 리다이렉트 따라가기.
  category: http_basics
  points: 8
  answer: |
    curl -sI http://juice.6v6.lab/ | tee /tmp/web01s1.txt
    echo "--- 보안 헤더 grep ---"
    grep -iE "x-frame|x-xss|content-security|strict-transport|x-content-type" /tmp/web01s1.txt || \
      echo "[!] 보안 헤더 없음 (취약)"
  answer_detail: |
    curl -sI 는 HEAD 요청만 수행해 응답 헤더만 받는다. juice.6v6.lab 의
    HAProxy backend = web (10.20.32.80). 응답에 Server/Content-Type 등은
    있고 보안 헤더는 모두 미설정 — 클릭재킹/XSS/MIME sniffing 에 취약.
  verify:
    type: output_contains
    expect: HTTP/
    field: stdout
    semantic:
      intent: HTTP HEAD 응답 수집 — 응답 코드 + 핵심 헤더 (Server/Content-Type)
        노출 여부 + 보안 헤더 부재 확인. 6v6 의 web 은 fw HAProxy 통해 라우팅.
      success_criteria:
        - HTTP/1.1 200 OK 또는 30x 응답 코드 라인
        - Server / Content-Type 등 주요 헤더 3개 이상 인용
        - 보안 헤더 (X-Frame/CSP/HSTS 등) 부재 명시
      acceptable_methods:
        - curl -sI http://juice.6v6.lab/
        - curl -sI http://10.20.32.80/
        - whatweb http://juice.6v6.lab/
        - nmap -sV -p 80 10.20.32.80
      negative_signs:
        - 본문 다운로드만, 헤더 무시
        - 단일 헤더만 확인
        - 응답 코드 해석 없음
  target_vm: attacker
  risk_level: low
# ============================================================
# STEP 2 [RED·정찰] — HTTP 응답 코드 enumeration (200/404/301/500)
# ============================================================
- order: 2
  instruction: |
    ## 🎯 MISSION

    attacker 컨테이너 (10.20.30.202) 에서 6v6-web (Apache + ModSecurity) 에
    여러 경로를 요청해 응답 코드 분포를 수집한다. 존재하는 경로 (/)와 존재하지
    않는 경로 (/nonexistent), 보호된 경로 (/admin), API endpoint (/api) 4 개를
    테스트하여 서버가 어떻게 응답을 구분하는지 직접 본다.

    ## 💻 실행 명령

    ```bash
    # 4 경로 응답 코드 + 본문 크기 한 번에
    for path in / /nonexistent /admin /api; do
      curl -o /dev/null -s -w "${path} → %{http_code} (size=%{size_download})\n" \
        "http://10.20.32.80${path}"
    done

    # 또는 vhost 형태 (HAProxy host header 라우팅)
    for path in / /nonexistent /admin; do
      curl -o /dev/null -s -w "juice.6v6.lab${path} → %{http_code}\n" \
        -H "Host: juice.6v6.lab" "http://10.20.32.80${path}"
    done
    ```

    ## 📋 확인 사항

    - `/` → 200 (정상 응답)
    - `/nonexistent` → 404 (없는 페이지)
    - `/admin` → 401 / 403 또는 200 (관리자 페이지 노출 여부)
    - `/api` → 200 / 404 (API endpoint 존재 여부 = enumeration 단서)
    - 응답 코드별 Content-Length 차이 (oracle 정보 누설 여부)

    ## 💡 왜 이걸 하는가?

    응답 코드 분포는 공격자가 *어떤 경로가 존재하는지* 추정하는 핵심 신호
    (MITRE ATT&CK T1595.003 Wordlist Scanning, OWASP WSTG-INFO-08
    Application Entry Points). 404 vs 200 의 본문 길이 차이로 자동화 fuzz
    (gobuster / ffuf) 의 hit/miss 판정이 결정된다. 운영자 관점에서는 404 도
    *일관된 길이* 의 정적 페이지로 통일해 oracle 누설을 줄여야 한다.

    ## 🔵 Blue 측 관찰 (STEP 8 ModSecurity 룰에서 본격)

    4 회 GET 은 ModSecurity audit log
    (`/var/log/apache2/modsec_audit.log`) 에 4 줄 GET 으로 기록.
    /nonexistent /admin 은 Apache access_log 의 status 404/401 로
    별도 통계화 가능. Wazuh rule 31108 (Excessive Web 404 from same src) 가
    burst 시 트리거 → siem 컨테이너 (10.20.32.100) 의 alerts.json 에 인입.

    ## 🟣 Purple 보완 권장

    - Apache `ErrorDocument 404` 으로 일관된 길이의 404 페이지 → oracle 차단
    - `/admin` 등 민감 경로는 ModSecurity 룰로 src ip 차단 + Wazuh
      active-response (`firewall-drop`) 600 sec
    - mod_evasive 또는 HAProxy stick-table 로 rate-limit (enumeration burst 차단)
  hint: |
    `curl -o /dev/null -s -w "%{http_code} %{size_download}\n"` 으로 한 줄에
    응답 코드 + 본문 크기 동시 수집. `for path in ...; do ... done` 으로 4 경로 일괄.
  category: http_basics
  points: 8
  answer: |
    for path in / /nonexistent /admin /api; do
      curl -o /dev/null -s -w "${path} → %{http_code} (size=%{size_download})\n" \
        "http://10.20.32.80${path}"
    done | tee /tmp/web01s2.txt
    echo "--- 응답 분포 요약 ---"
    awk -F'→ ' '{print $2}' /tmp/web01s2.txt | awk '{print $1}' | sort | uniq -c
  answer_detail: |
    200 / 404 / 401 / 403 / 301 / 500 등 응답 코드별 분포 + Content-Length
    차이 직접 확인. /admin 응답이 200 이면 access control 결함, 404 이면
    enumeration 만 차단된 상태. /nonexistent 의 Content-Length 가 다른
    404 (예: /nonexistent.bak) 와 다르면 oracle 누설 (백업 파일 존재 추정 가능).
  verify:
    type: output_contains
    expect: '200'
    field: stdout
    semantic:
      intent: |
        HTTP 응답 코드 enumeration — 6v6-web 에 최소 3 경로 (정상/비존재/보호)
        요청 후 코드 분포 비교. Content-Length 차이까지 보면 oracle 누설 식별.
        OWASP WSTG-INFO-08 + MITRE T1595.003 Wordlist Scanning 의 정찰 기본.
      success_criteria:
        - 최소 3 경로 (루트 + 비존재 + 보호된 경로) 응답 코드 직접 인용
        - 200 / 404 (필요 시 401/403/301) 의 분포 명시
        - Content-Length 차이 비교 또는 명시적 해석
        - 6v6-web (10.20.32.80) 또는 juice.6v6.lab vhost 사용 명시
      acceptable_methods:
        - "for path in / /nonexistent /admin; do curl -o /dev/null -w ...; done"
        - "curl -I http://10.20.32.80/{,nonexistent,admin}"
        - "python requests.get(...).status_code 3 회 이상"
        - "ffuf -u http://10.20.32.80/FUZZ -w wordlist (응답 코드 분포 자동화)"
      negative_signs:
        - 단일 URL 만 테스트
        - 응답 코드만 보고 본문 크기 무시
        - 6v6 IP 가 아닌 외부 도메인 (example.com 등) 사용
  target_vm: attacker
  script: |
    for path in / /nonexistent /admin /api; do
      curl -o /dev/null -s -w "${path} → %{http_code} (size=%{size_download})\n" \
        "http://10.20.32.80${path}"
    done
  risk_level: low
  bastion_prompt: |
    attacker 컨테이너에서 6v6-web (10.20.32.80) 의 4 경로 (/, /nonexistent,
    /admin, /api) 에 curl 로 GET 을 보내 응답 코드 분포 + Content-Length
    차이를 수집해줘. /admin 응답이 200 인지 404 인지 보고 access control
    결함을 판단하고, 비존재 404 의 본문 크기가 일관된지 확인해 oracle
    정보 누설 여부도 보고해줘. for-loop 한 번 + uniq -c 로 분포 요약.
# ============================================================
# STEP 3 [RED·정찰] — HTTP 메서드 enumeration (OPTIONS Allow + 5 메서드 직접)
# ============================================================
- order: 3
  instruction: |
    ## 🎯 MISSION

    attacker 컨테이너 (10.20.30.202) 에서 6v6-web 의 HTTP 메서드 허용 정책을
    파악한다. (1) OPTIONS 요청으로 Allow 헤더 수집 + (2) 5 메서드 (GET / POST
    / PUT / DELETE / OPTIONS) 직접 호출 후 응답 코드 분포를 본다. 의도하지
    않은 PUT/DELETE 허용은 임의 파일 업로드/삭제 위험.

    ## 💻 실행 명령

    ```bash
    # 1. OPTIONS Allow 헤더
    curl -sI -X OPTIONS http://10.20.32.80/ | grep -i '^allow:'

    # 2. 5 메서드 직접 (응답 코드 비교)
    for m in GET POST PUT DELETE OPTIONS; do
      curl -o /dev/null -s -w "${m} → %{http_code}\n" -X $m http://10.20.32.80/
    done

    # 3. nmap http-methods (선택)
    nmap -p 80 --script http-methods --script-args http-methods.url-path=/ 10.20.32.80
    ```

    ## 📋 확인 사항

    - `Allow:` 헤더에 어떤 메서드가 나열되는가 (예: `Allow: GET,HEAD,POST,OPTIONS`)
    - PUT / DELETE 응답이 405 (Method Not Allowed) 인지 200/201/204 인지
    - 만약 PUT 이 201 이면 → 임의 파일 업로드 가능성 (WebDAV 미정리)
    - OPTIONS 가 200 인데 Allow 헤더 없으면 서버 응답 부정확

    ## 💡 왜 이걸 하는가?

    PUT/DELETE 의 의도하지 않은 활성화는 OWASP A05 Security Misconfiguration
    의 전형적 패턴 (MITRE T1190 Exploit Public-Facing Application). WebDAV
    잔재 또는 framework 의 wildcard route 가 원인. nmap http-methods 스크립트
    가 자동으로 동일 정보 수집 — 학습 환경에서는 curl 5 회로 직접 확인 권장.

    ## 🔵 Blue 측 관찰

    PUT/DELETE 요청은 Apache access_log 의 첫 토큰에 메서드 명시.
    Wazuh rule 31106 (Web attack — unusual method) 가 PUT/DELETE/CONNECT
    burst 를 트리거. ModSecurity CRS rule 911100 (Method is not allowed by
    policy) 가 default 정책 (GET/HEAD/POST/OPTIONS 외) 에서 차단.

    ## 🟣 Purple 보완 권장

    - Apache `<Limit>` 또는 `<LimitExcept>` 로 메서드 화이트리스트
    - ModSecurity CRS `tx.allowed_methods` 변수에 GET/HEAD/POST/OPTIONS 만 등록
    - WebDAV 모듈 (`mod_dav`) 미사용 시 비활성화
  hint: |
    1단계 `curl -sI -X OPTIONS` 로 Allow 헤더 + 2단계 `for m in ...; do ...; done`
    로 5 메서드 응답 코드 직접. `nmap --script http-methods` 는 한 줄 자동.
  category: http_basics
  points: 10
  answer: |
    echo "=== 1. OPTIONS Allow 헤더 ==="
    curl -sI -X OPTIONS http://10.20.32.80/ | grep -i '^allow:' || echo "Allow 헤더 없음"
    echo ""
    echo "=== 2. 5 메서드 응답 코드 ==="
    for m in GET POST PUT DELETE OPTIONS; do
      curl -o /dev/null -s -w "${m} → %{http_code}\n" -X $m http://10.20.32.80/
    done
  answer_detail: |
    Allow 헤더에 PUT/DELETE 포함되거나 직접 PUT/DELETE 가 201/204 면 임의 파일
    업로드/삭제 위험. 정상 정책 = GET/HEAD/POST/OPTIONS 만 허용 + PUT/DELETE
    응답 405. ModSecurity CRS rule 911100 이 차단 (default tx.allowed_methods).
  verify:
    type: output_contains
    expect: 'OPTIONS → '
    field: stdout
    semantic:
      intent: |
        HTTP 메서드 enumeration — OPTIONS Allow 헤더 + 5 메서드 직접 호출 후
        응답 코드 비교. PUT/DELETE 의 의도하지 않은 활성화 여부 식별.
        OWASP A05 Security Misconfiguration + MITRE T1190 정찰.
      success_criteria:
        - OPTIONS Allow 헤더 직접 인용 (또는 응답이 405/없음 명시)
        - 최소 4 메서드 (GET/POST/PUT/DELETE) 응답 코드 인용
        - PUT/DELETE 응답이 405 (정상) vs 200/201/204 (위험) 해석
        - 6v6-web (10.20.32.80) 사용 명시
      acceptable_methods:
        - "curl -sI -X OPTIONS http://10.20.32.80/ + for-loop 5 메서드"
        - "nmap --script http-methods -p 80 10.20.32.80"
        - "python requests.options(...).headers['Allow'] + requests.request"
      negative_signs:
        - OPTIONS 만 보고 직접 메서드 5 회 호출 누락
        - PUT/DELETE 응답 코드 인용 누락
        - 메서드 허용의 보안 영향 (임의 업로드/삭제) 해석 없음
  target_vm: attacker
  script: |
    curl -sI -X OPTIONS http://10.20.32.80/ | grep -i '^allow:' || echo "no-allow-header"
    for m in GET POST PUT DELETE OPTIONS; do
      curl -o /dev/null -s -w "${m} → %{http_code}\n" -X $m http://10.20.32.80/
    done
  risk_level: low
  bastion_prompt: |
    attacker 컨테이너에서 6v6-web (10.20.32.80) 에 (1) OPTIONS 로 Allow 헤더
    수집 + (2) GET/POST/PUT/DELETE/OPTIONS 5 메서드 직접 호출 후 응답 코드를
    비교해줘. PUT/DELETE 가 405 (정상) 인지 201/204 (임의 파일 업로드/삭제
    위험) 인지 판단하고, Allow 헤더 내용 그대로 인용해줘.
# ============================================================
# STEP 4 [RED·정찰·해석] — 보안 헤더 6종 점수표화 (없으면 위험)
# ============================================================
- order: 4
  instruction: |
    ## 🎯 MISSION

    attacker 컨테이너 (10.20.30.202) 에서 6v6-web 의 응답 헤더를 수집해 6종
    보안 헤더의 *존재 여부* 와 *값* 을 표로 정리한다. 단순 grep 1 회가 아닌,
    각 헤더의 누락 시 공격 벡터 (클릭재킹 / XSS / MIME sniffing / 다운그레이드)
    까지 함께 보고한다.

    ## 💻 실행 명령

    ```bash
    # 1. 헤더 전체 수집 (재사용 위해 파일 저장)
    curl -sI http://10.20.32.80/ > /tmp/web01s4_headers.txt

    # 2. 6종 보안 헤더 grep + 누락 라벨
    for h in "X-Frame-Options" "X-Content-Type-Options" "Content-Security-Policy" \
             "Strict-Transport-Security" "Referrer-Policy" "Permissions-Policy"; do
      v=$(grep -i "^${h}:" /tmp/web01s4_headers.txt | head -1)
      [ -n "$v" ] && echo "${h}: 있음 → ${v}" || echo "${h}: 없음 (★위험)"
    done
    ```

    ## 📋 확인 사항 (6 헤더 의 의미)

    - `X-Frame-Options` 부재 → 클릭재킹 (iframe 으로 wrapping 공격)
