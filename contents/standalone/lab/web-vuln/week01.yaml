    각 속성 누락의 공격 시나리오 (쿠키 탈취 / 다운그레이드 / CSRF) 까지 한 줄씩.

    ## 💻 실행 명령

    ```bash
    # 1. 직접 backend (Juice Shop) - 로그인 시도 후 Set-Cookie 수집
