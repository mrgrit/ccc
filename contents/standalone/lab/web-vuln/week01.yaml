# STEP 12 [RED·정찰·TLS] — 인증서 (Subject / Issuer / SAN / NotAfter) + cipher
# ============================================================
- order: 12
  instruction: |
    ## 🎯 MISSION

    attacker 컨테이너 (10.20.30.202) 에서 6v6-web 의 TLS 인증서 metadata
    (Subject CN / Issuer / SAN / NotBefore / NotAfter / public key bits) 와
    지원 cipher suite (TLS 1.2 vs 1.3 / weak cipher 잔재) 를 점검한다. 학습
    환경은 self-signed 인증서 — 운영 환경 점검 시 *유효 인증서 만료 D-30 일*
    경보가 핵심.

    ## 💻 실행 명령

    ```bash
    # 1. 인증서 metadata
    echo | openssl s_client -connect 10.20.32.80:443 -servername juice.6v6.lab 2>/dev/null \
      | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null

    # 2. 지원 cipher (TLS 1.2 + 1.3)
    nmap --script ssl-enum-ciphers -p 443 10.20.32.80 2>/dev/null | grep -E "TLSv1\.|ciphers:|cipher pref" | head -30

    # 3. testssl.sh (가능 시) 한 줄 요약
    testssl.sh --quiet --color 0 --severity HIGH 10.20.32.80:443 2>&1 | head -30 \
      || echo "(testssl.sh 미설치 시 위 2 명령 만)"
    ```

    ## 📋 확인 사항

    - `subject=CN = ...` 가 점검 host 와 일치 (또는 SAN 에 포함)
