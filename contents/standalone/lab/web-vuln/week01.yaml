lab_id: standalone-web-vuln-week01
title: 웹 보안 개요 + OWASP Top 10 + 7 vhost 가시화
version: standalone-non-ai
course: web-vuln
week: 1
description: |
  본 과목 첫 주차. 웹 보안 의 *전체 지도* + OWASP Top 10 (2021) + 6v6 의 7 vuln
  vhost (JuiceShop / DVWA / NeoBank / GovPortal / MediForum / AdminConsole /
  AICompanion) 의 *실 헬스체크* + 본인 학습 계획 작성.
difficulty: easy
duration_minutes: 180
audience: 웹 취약점 분석 입문자 (1주차)
prerequisites:
  - secuops W01-W06 (인프라 + Suricata + ModSec) 통과 권장
  - attack W01-W06 (정찰 + 공격) 통과 권장
  - 학생 PC 의 SSH ProxyJump + curl + jq 가용
  - 학생 /etc/hosts 의 7 vhost 매핑 (*.6v6.lab → VM_IP)
objectives:
  - 6v6 의 7 vuln vhost 모두 응답 (200/302) 가시화
  - OWASP Top 10 (2021) 10 카테고리 + CWE Top 25 매핑 인지
  - ModSec CRS 4.0 의 *11 rule family* 인지 (930~944)
  - 본인 학습 계획 작성 (15 주 의 vhost × 카테고리 매트릭스)
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 6v6 의 7 vuln vhost 헬스체크 + ModSec 차단 baseline 측정

      6v6 환경 의 7 vuln vhost 모두 정상 응답 (200/302) 확인 + ModSec 의 *차단 X* 의
      baseline (정상 GET /) 측정. 본 과목 의 *모든 실습 의 시작점*.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **7 vuln vhost** = JuiceShop / DVWA / NeoBank / GovPortal / MediForum /
        AdminConsole / AICompanion (6v6 의 vuln-sites)
      - **HAProxy vhost 라우팅** = fw 의 HAProxy 가 Host header 별 backend 결정
      - **baseline 측정** = 정상 GET / 의 200/302 응답 + ModSec 차단 X
      - **CURRICULUM #7** 데이터 부재 시 = fixture (단 본 step 은 헬스체크 — 데이터 무관)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker '
        for h in juice dvwa neobank govportal mediforum admin aicompanion; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $h.6v6.lab" "http://10.20.30.1/")
          echo "$h.6v6.lab: $code"
        done
      '
      ```

      ## 📋 확인 사항

      - 7 vhost 모두 응답 (200 / 302 / 404 정상, connection refused 비정상)
      - 응답 코드 분포 (예: JuiceShop 200 / DVWA 302 / AdminConsole 200 등)
      - ModSec 차단 X (정상 GET /)

      ## 💡 왜 이걸 하는가?

      본 과목 의 *모든 hands-on 의 baseline*. 7 vhost 가 *각각 다른 vuln 카테고리* 의
      *target* — 본 step 의 가시화 가 다음 14 weeks 의 *실습 가능 여부* 검증.

      ## 🔍 결과 해석

      - **정상**: 7 vhost 모두 200/302
      - **일부 404**: HAProxy 의 vhost 미정의 — `/etc/haproxy/haproxy.cfg` 확인
      - **모두 connection refused**: fw 의 HAProxy 미시작 — `docker exec 6v6-fw
        systemctl status haproxy`

      ## 비정상 시 대응

      - **vhost 응답 없음** — 6v6 의 *vuln-sites* deploy 안 됨. 인프라 담당 보고
      - **HAProxy 오류** — `docker logs 6v6-fw` 의 HAProxy log
    hint: |
      7 vhost × curl 응답 코드 매트릭스 → 본 과목 baseline.
    category: survey
    points: 20
    answer: |
      ssh 6v6-attacker '
        for h in juice dvwa neobank govportal mediforum admin aicompanion; do
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "Host: $h.6v6.lab" "http://10.20.30.1/")
          echo "$h.6v6.lab: $code"
        done
