  - order: 2
    instruction: |
      ## 🎯 MISSION — OWASP Top 10 (2021) 10 카테고리 + CWE Top 25 매핑 표 작성

      OWASP Top 10 (2021) 의 10 카테고리 + 각 의 CWE 매핑 + 6v6 의 7 vhost 중 *어떤
      vhost 에서 실습 가능* 한지 매트릭스 작성. 본 step 은 *책상 작업* (실행 명령
      X).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **OWASP Top 10 (2021)** = MITRE/OWASP 의 *3 년 주기* 갱신. 2021 = 가장 최신
      - **CWE Top 25** = MITRE 의 *상위 25 weakness*. OWASP 와 *부분 중복*
      - **vhost 매핑** = 본 과목 의 14 weeks 의 *실습 가능 여부* 사전 계획

      ## 💻 산출물 (10 × 7 매트릭스)

      ```markdown
      | OWASP | 카테고리 | 주요 CWE | 본 과목 주차 | 실습 vhost |
      |-------|---------|---------|-------------|-----------|
      | A01 | Broken Access Control | CWE-22 / 639 | W02 | JuiceShop /api/Users |
      | A02 | Cryptographic Failures | CWE-327 / 798 | W03 | JuiceShop JWT + NeoBank session |
      | A03 | Injection | CWE-79 / 89 | W04-W05 | DVWA + AdminConsole + MediForum |
      | A04 | Insecure Design | CWE-209 / 256 | W06 | NeoBank 송금 workflow |
      | A05 | Security Misconfiguration | CWE-16 / 611 | W07 | 7 vhost 헤더 매트릭스 |
      | A06 | Vulnerable Components | CWE-1104 | W09 | npm audit (Node 기반 JuiceShop) |
      | A07 | Auth Failures | CWE-287 / 798 | W10 | JuiceShop login + GovPortal MFA |
      | A08 | Software/Data Integrity | CWE-829 / 502 | W11 | dependency confusion 시뮬 |
      | A09 | Logging/Monitoring 실패 | CWE-778 | W12 | ModSec audit + Wazuh 통합 |
      | A10 | SSRF | CWE-918 | W13 | AdminConsole SSRF |
      ```

      ## 💻 검증 명령 (없음 — 산출물 작성)

      ## 📋 확인 사항

      - 10 카테고리 모두 작성
      - 각 의 CWE 1+ 매핑
      - 본 과목 14 weeks 의 매핑 (5 vhost 이상 활용)
      - 본인 학습 우선순위 (예: SQLi → XSS → IDOR → SSRF) 표시

      ## 💡 왜 이걸 하는가?

      OWASP Top 10 은 *전 세계 의 web 보안 표준*. 14 weeks 의 *학습 지도* + *우선
      순위* 결정 의 핵심. 본 step 의 *표 작성* 이 *학습 동기* + *방향* 설정.

      ## 🔍 결과 해석

      - **정상**: 10 카테고리 + 14 weeks 매핑 + 7 vhost 활용
      - **일부 카테고리 vhost 미매핑**: 본 과목 lab 의 *외부 시나리오* 사용 (W11 의
        supply chain 등)
