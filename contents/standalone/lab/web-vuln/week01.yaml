      -d '{"email":"admin@juice-sh.op","password":"admin123"}' \
      | grep -i '^set-cookie:'

    # 2. 또는 vhost (HAProxy host header)
    curl -sI -H "Host: juice.6v6.lab" http://10.20.32.80/ | grep -i '^set-cookie:'

    # 3. 속성 자동 점검
