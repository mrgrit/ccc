    echo "=== 2. 흔한 디렉토리 후보 ==="
    for d in /backup/ /uploads/ /images/ /static/ /assets/ /api/ /admin/; do
      code=$(curl -o /dev/null -s -w "%{http_code}" "http://10.20.32.80${d}")
