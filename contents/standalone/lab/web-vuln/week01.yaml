      grep -i "^set-cookie:" /tmp/web01s5.txt | grep -i "${attr}" > /dev/null \
        && echo "${attr}: 있음" || echo "${attr}: 없음 (★위험)"
    done
    ```

    ## 📋 확인 사항 (3 속성 의 의미)

    - `HttpOnly` 부재 → XSS payload (`document.cookie`) 로 세션 쿠키 탈취
    - `Secure` 부재 → HTTP 다운그레이드 시 평문 전송 (sslstrip MITM)
    - `SameSite=Lax` 또는 `Strict` 부재 → 외부 origin 의 cross-site 요청에
      쿠키 자동 첨부 → CSRF 공격 성립

    ## 💡 왜 이걸 하는가?

    Juice Shop 은 default JWT 토큰을 *쿠키 보관* + *Authorization 헤더* 양쪽
    혼용 — Set-Cookie 의 속성 누락 시 XSS / CSRF 모두 노출. OWASP A07
    Identification and Authentication Failures 의 직접 사례 (MITRE T1539
    Steal Web Session Cookie 의 전제). HttpOnly 1 속성만 있어도 XSS 의 쿠키
    탈취는 막히므로 *가장 저렴한 방어*.

    ## 🔵 Blue 측 관찰

    Wazuh / ModSecurity 의 default 룰은 Set-Cookie 속성 자체를 *경고* 하지 않음
    (응답 헤더 검사는 별도 설정 필요). 운영자가 정기 `curl -si | grep set-cookie`
    cron 또는 OWASP ZAP passive scan 의 'Cookie Without HttpOnly Flag' alert
    (alert id 10010) 로 잡는다.

    ## 🟣 Purple 보완 권장

    - Express 의 `cookie-session` 또는 `express-session` 옵션 `{ httpOnly: true,
      secure: true, sameSite: 'lax' }`
    - Apache `Header edit Set-Cookie ^(.*)$ "$1; HttpOnly; Secure; SameSite=Lax"`
      (앱 수정 불가 시 reverse proxy 측 강제 부착)
    - ModSecurity rule (CRS 921120 응답 단계) 활성화 → 누락 Set-Cookie 감사 로그
