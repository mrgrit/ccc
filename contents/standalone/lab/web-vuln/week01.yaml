# STEP 11 [RED·정찰·헤더위장] — X-Forwarded-For / User-Agent / Host 헤더 IP 위장
# ============================================================
- order: 11
  instruction: |
    ## 🎯 MISSION

    attacker 컨테이너 (10.20.30.202) 에서 6v6-web 의 헤더 신뢰 정책을 점검한다.
    `X-Forwarded-For` 로 source IP 위장 시도 + `User-Agent` 변경 (WAF 우회) +
    `Host` 헤더 변경 (vhost 라우팅 조작) 3 가지 시나리오 — 서버가 어떤 헤더를
    *신뢰* 하는지 응답 차이로 추정한다.

    ## 💻 실행 명령

    ```bash
    # 1. X-Forwarded-For 위장 (Wazuh active-response 차단 우회 시도)
    curl -s -i http://10.20.32.80/ \
      -H 'X-Forwarded-For: 8.8.8.8' \
      -H 'X-Real-IP: 1.1.1.1' | head -10

    # 2. User-Agent 변경 (WAF / bot detection 우회)
    for ua in "Googlebot/2.1" "curl/7.68.0" "<script>alert(1)</script>" "sqlmap/1.6"; do
      code=$(curl -o /dev/null -s -w "%{http_code}" \
        -A "$ua" http://10.20.32.80/)
      echo "UA=${ua:0:30}... → ${code}"
    done

    # 3. Host 헤더 변경 (vhost 라우팅 조작)
    for h in "juice.6v6.lab" "admin.6v6.lab" "evil.com" "127.0.0.1"; do
      code=$(curl -o /dev/null -s -w "%{http_code}" \
        -H "Host: $h" http://10.20.32.80/)
      echo "Host=${h} → ${code}"
    done
    ```

    ## 📋 확인 사항

    - X-Forwarded-For 가 access_log 의 source IP 로 *기록* 되는가 (HAProxy 의
      `option forwardfor` 활성화 여부)
    - User-Agent `sqlmap/1.6` 응답이 다른 UA 와 다르면 → ModSecurity / WAF 가
      UA 기반 차단 적용 중
    - `Host: evil.com` → HAProxy 의 default backend 또는 404 (HAProxy 의
      `acl host_juice hdr(host) -i juice.6v6.lab` 룰 작동 확인)
    - `Host: 127.0.0.1` → SSRF 시도 시 내부 자원 접근 가능성 점검

    ## 💡 왜 이걸 하는가?

    헤더는 *클라이언트가 제어 가능* → 서버가 어떤 헤더를 *신뢰* 하는지가
    공격 표면 (MITRE T1556 Modify Authentication Process + OWASP A07).
    X-Forwarded-For 를 access control / rate-limit / logging 에 사용하면
    공격자가 위장 가능. User-Agent 기반 WAF 차단은 sqlmap/nikto 등 자동 도구가
    `--random-agent` 로 우회. Host 헤더 조작은 SSRF / vhost confusion 의 입구.

    ## 🔵 Blue 측 관찰

    HAProxy 의 `option forwardfor` 옵션 활성화 시 access_log 의 `%{X-Forwarded-For}i`
    필드에 위장 IP 그대로 기록 → Wazuh 가 *위장 IP* 로 active-response 시도 →
    무효. Blue 는 `Real-IP` (HAProxy 가 신뢰 net 에서만 채워 넣는 헤더) 와
    구별. ModSecurity CRS rule 920280 (Missing Host header) / 920330 (Invalid
    HTTP version) 등이 헤더 변조 패턴 트리거.

    ## 🟣 Purple 보완 권장

    - HAProxy `frontend` 의 `acl trusted_proxy src 10.20.30.0/24` + `http-request
      del-header X-Forwarded-For if !trusted_proxy` → 외부 X-Forwarded-For 제거
    - ModSecurity CRS rule 913100 (Found User-Agent associated with security
      scanner) 활성화 → sqlmap/nikto UA 차단
    - HAProxy 의 `default_backend deny_backend` (Host 매칭 실패 시 404)
    - SSRF 차단: 내부 자원 (`127.0.0.1`, `10.0.0.0/8`) 으로 의 Host header 차단
  hint: |
    3 시나리오 — X-Forwarded-For (IP 위장) / User-Agent (WAF 우회) / Host (vhost
    조작). 각 시나리오 별 for-loop 변형. 응답 코드 차이 → 신뢰 정책 추정.
  category: http_basics
  points: 8
  answer: |
    echo "=== 1. X-Forwarded-For IP 위장 ==="
