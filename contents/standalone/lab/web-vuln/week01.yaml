  - order: 3
    instruction: |
      ## 🎯 MISSION — ModSec CRS 4.0 의 20 rule family 가시화 + OWASP 매핑

      6v6 의 *web 컨테이너* 의 ModSec + CRS 4.0 의 *20 rule family* 정독 + OWASP
      Top 10 와 의 매핑 표 작성. 본 과목 의 *방어 측* 의 핵심.

      **주의** — 6v6 의 ModSec 은 *fw 컨테이너* 가 아닌 **web 컨테이너** 에 위치
      (HAProxy fw 가 SSL termination 만, ModSec 은 backend web 의 Apache 모듈).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **ModSec** = Apache 의 WAF (Web Application Firewall) module
      - **CRS (Core Rule Set) 4.0** = OWASP 의 표준 룰셋 (2024 최신)
      - **6v6 의 위치** = `/etc/modsecurity/crs/` + `/usr/share/modsecurity-crs/rules/`
        둘 다 web 컨테이너 에 존재
      - **20 rule family** (실측) = 901 init / 903 exclusion before crs / 905
        common exception / 910 IP reputation / 911 method / 912 DOS / 913 scanner
        / 920 protocol enforcement / 921 protocol attack / 930 LFI / 931 RFI /
        932 RCE / 933 PHP / 934 deserialization / 941 XSS / 942 SQLi / 943 session
        / 944 java / 949 blocking
      - **anomaly score** = 룰 매칭 시 score 누적, 임계 (5+) 도달 시 차단
      - **audit log** = `/var/log/apache2/modsec_audit.log` — 차단 + 의심 모두 기록

      ## 💻 실행 명령

      ```bash
      # 1) web 의 CRS 활성 확인
      ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | head -20'

      # 2) 11 rule family 의 *파일 count*
      ssh 6v6-web 'sudo ls /usr/share/modsecurity-crs/rules/ | grep -oE "REQUEST-[0-9]+" | sort -u'

      # 3) ModSec 기본 동작 (paranoia level)
      ssh 6v6-web 'sudo grep -E "tx.paranoia_level|tx.detection_paranoia_level" /etc/modsecurity/crs/crs-setup.conf | head -5'

      # 4) audit log 의 baseline
      ssh 6v6-web 'sudo wc -l /var/log/apache2/modsec_audit.log 2>/dev/null'
      ```

      ## 📋 11 rule family × OWASP 매핑

      ```markdown
      | family | 의미 | OWASP |
      |--------|------|-------|
      | 920 | Protocol Enforcement | A05 |
      | 921 | Protocol Attack | A05 |
      | 930 | LFI (Local File Inclusion) | A03 |
      | 931 | RFI (Remote File Inclusion) | A03 |
      | 932 | RCE (Remote Code Execution) | A03 |
      | 934 | Deserialization | A08 |
      | 941 | XSS | A03 |
      | 942 | SQLi | A03 |
      | 943 | Session Fixation | A07 |
      | 944 | Java Application Attack | A03 |
      ```

      ## 📋 확인 사항

      - 11 rule family 모두 매핑
      - paranoia level (1-4) 확인 — 기본 = 1 (production safe)
      - audit log 의 *baseline* 라인 수

      ## 💡 왜 이걸 하는가?

      ModSec = 본 과목 *방어 측* 의 *핵심 도구*. 11 family 의 *역할 분담* 인지 가
      *공격 탐지 + 우회* 학습 의 기반.

      ## 🔍 결과 해석

      - **정상**: 11 family 모두 활성 + paranoia 1
      - **CRS 미설치**: ls 의 *파일 없음* — `apt install modsecurity-crs`
      - **paranoia 4**: 너무 엄격 — false positive 다수, 운영 부적합

      ## 비정상 시 대응

      - **rule 파일 다른 위치** — `find / -name "REQUEST-942*" 2>/dev/null`
      - **paranoia 변경 후 reload 안 됨** — `systemctl reload apache2`
    hint: |
      11 CRS family × OWASP 매핑 + paranoia level 확인.
