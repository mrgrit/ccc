    - Apache `<VirtualHost *:80>` 에 `Redirect permanent / https://example.com/`
      + `<VirtualHost *:443>` 에 `Header always set Strict-Transport-Security
      "max-age=31536000; includeSubDomains; preload"`
    - HAProxy `redirect scheme https code 301 if !{ ssl_fc }` 한 줄 (frontend)
    - HSTS preload list (hstspreload.org) 등록 — *첫 방문 도* TLS 강제
