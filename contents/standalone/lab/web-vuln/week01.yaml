    Directory Listing 노출은 Apache 의 `Options +Indexes` 또는 Nginx 의
    `autoindex on` 의 잘못된 default 에서 발생 (OWASP A05 Security
    Misconfiguration + MITRE T1083 File and Directory Discovery). Juice Shop 의
    `/ftp/` 는 의도적 challenge — 백업 파일 (coupons_2013.md.bak / package.json.bak)
    의 plaintext 자격증명 / 쿠폰 코드 유출 → Credential Access 의 직접 경로.

