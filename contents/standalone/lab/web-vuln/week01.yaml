  - order: 4
    instruction: |
      ## 🎯 MISSION — 본 과목 학습 계획 작성 (14 weeks × 본인 우선순위)

      W02-W14 의 *학습 계획서* 작성. 본인 의 *현재 수준* (입문/중급/심화) + *주차 별
      목표* + *예상 시간* + *학습 자료* (lecture + 외부 OWASP 문서). *self-assessment*
      의 핵심.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **현재 수준 자가 진단** = 입문 (0-25% OWASP 인지) / 중급 (25-75%) / 심화
        (75%+)
      - **예상 시간** = 1 주차 평균 5-10 시간 (lecture 2 + lab 3-8)
      - **외부 자료** = OWASP Top 10 PDF (owasp.org) + PortSwigger Web Academy +
        HackTricks
      - **본 과목 졸업 = OWASP Top 10 모두 *실 hands-on*** + *15 PTES 보고서 1 회*

      ## 💻 산출물 (14 weeks 학습 계획서)

      ```markdown
      ## 본인 web-vuln 학습 계획

      ### 현재 수준 자가 진단 (5 영역)
      - OWASP Top 10 인지: ___% (0-100)
      - SQLi / XSS 실습 경험: 횟수 ___
      - JWT / session 분석 경험: 횟수 ___
      - 모의해킹 도구 (sqlmap, Burp) 사용: 횟수 ___
      - 보고서 작성 경험: ___ 회

      ### 주차 별 계획
      | 주차 | 주제 | 예상 시간 | 외부 자료 | 본인 목표 |
      | W02 | A01 IDOR + JWT | 8h | OWASP A01 PDF | JuiceShop 5 IDOR 발견 |
      | W03 | A02 Crypto | 6h | RFC 7519 (JWT) | JWT alg=none 우회 |
      | ... | ... | ... | ... | ... |

      ### 졸업 목표
      - W15 기말 의 PTES 보고서 80+ 점
      - 본인 의 *작은 도구* 1 종 작성 (예: JWT 변조 자동화 Python)
      - GitHub 의 *학습 환경 의 vuln 발견* 1 회 (HackerOne 등 참고)
      ```

      ## 📋 확인 사항

      - 5 영역 자가 진단 완료
      - 14 weeks 의 *각* 예상 시간 + 외부 자료
      - 졸업 목표 *구체* (수치 또는 산출물)

      ## 💡 왜 이걸 하는가?

      *계획 없는 학습* 의 효율 ↓. 본 step 의 *14 weeks 의 시간 + 자료 + 목표* 가
      *학습 의 backbone*. *자가 진단* 이 *맞춤 학습* 의 출발.

      ## 🔍 결과 해석

      - **정상**: 5 진단 + 14 weeks + 졸업 목표 모두 작성
      - **시간 예상 X**: 학습 *루즈* — 1 주차 *최소 5h* 권장
      - **외부 자료 X**: lecture 만 으로 부족 — OWASP / PortSwigger / HackTricks 권장
