    ModSecurity CRS rule 920120 (Directory traversal in URL) 가 `../` 시도에
    대해서만 트리거. Wazuh rule 31104 (Web attack — multiple requests with
    Index of) 가 burst 시 감지. Blue 의 정기 cron `find /var/www -name 'Options*'`
    또는 `apachectl -M | grep autoindex` 로 모듈 활성화 점검.

