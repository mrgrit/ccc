lab_id: standalone-web-vuln-week15
title: "기말 — 종합 웹취약점 점검 프로젝트 (사례 시나리오 + 보고서 + 권고)"
version: standalone-non-ai
course: web-vuln
week: 15
description: |
  기말 — 가상 의뢰 시나리오 (가공 회사 의 JuiceShop 점검) 의 종합 프로젝트.
  W01~W14 의 모든 활동 통합 + 가상 의뢰자 와의 사전 미팅 (시나리오 prompt) +
  점검 4 시간 + 보고서 작성 + 권고 의 비즈니스 영향 분석. 운영 환경 의 실제
  점검 프로젝트 의 simulation.
difficulty: hard
duration_minutes: 180
prerequisites:
  - "W01~W14 모든 lab 통과"
  - "W14 의 공식 보고서 양식 가용"
  - "W08 중간고사 통과"
objectives:
  - "사전 미팅 시나리오 → ROE 작성 (W01 의 ROE 와 일치)"
  - "점검 단계 (정찰 → 인증 → 입력 → 접근 → 암호 → API → 자동 → 보고서) 통합 수행"
  - "최종 보고서 — W14 양식 + 15+ finding + Executive Summary + 비즈니스 영향"
  - "권고 의 cost/benefit 분석 (즉시 수정 vs 장기 architecture 개선)"
  - "Red/Blue/Purple 종합 회고 — 점검자/운영자/관리자 입장 모두"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 가상 의뢰 시나리오 + ROE 작성

      **시나리오 (가공):**
      ```
      [의뢰 메일 — 가공]

      To: 학생 (점검자)
      From: A 회사 보안팀장 김OO

      안녕하세요, 학생님.

      A 회사 는 최근 새로운 e-commerce 플랫폼 (juice.6v6.lab) 을 출시 합니다.
      출시 전 보안 점검 을 의뢰 드립니다.

      - 점검 대상: http://juice.6v6.lab/ (외부 도메인)
      - 점검 기간: 4 시간 (오늘 09:00 ~ 13:00)
      - 점검 범위: 모든 user-facing endpoint + admin interface
      - 점검 제외: SIEM dashboard / 인프라 모니터링 (운영 영향 큼)
      - 허용 기법: 비파괴 점검 + 비인증 변조 + 자동 도구
      - 금지 기법: DoS / 운영 환경 직접 변경
      - 산출물: 공식 보고서 (CVSS + OWASP 매핑 + Executive Summary)
      ```

      **무엇을:** 위 시나리오 기반 ROE markdown 작성 (W01 8 항목).

      ## 📋 채점
      - ROE 8 항목 (대상/in-scope/out-of-scope/허용/금지/기간/비상/산출물)
      - 의뢰 메일 의 정보 모두 반영
    hint: "W01 의 ROE 양식 그대로 + 시나리오 의 디테일 첨가."
    category: documentation
    points: 12
    answer: |
      🤖 가이드: W01 ROE 양식 + 시나리오 8 항목.
    answer_detail: |
      ROE = 점검 시작 전 의 첫 산출물. 운영 환경 의 점검 의 책임 분담 의 근거.
    verify:
      intent: "ROE 8 항목 + 시나리오 반영"
      success_criteria:
        - "8 항목 모두"
        - "시나리오 정보 반영"
      acceptable_methods:
        - "markdown"
      negative_signs:
        - "항목 누락"
    target_vm: bastion
    risk_level: low

  - order: 2
    instruction: |
      ## 🎯 MISSION — 종합 점검 수행 (W01~W13 의 핵심 통합)

      **무엇을:** ROE 의 범위 안 에서 점검 수행. 4 단계 통합:
      1. 정찰 (W01~W03)
      2. 인증/세션 (W04)
      3. 입력 검증 (W05~W07)
      4. 접근/암호/API (W09~W12)

      각 단계 의 시간 분배 + 발견 finding 의 우선순위.

      ## 📋 채점
      - 4 단계 모두 수행
      - 각 단계 의 finding 인용 (W01~W13 의 lab 결과 재사용 OK)
      - 시간 분배 + 발견 시점
    hint: "W01~W13 의 보고서 가용 시 그대로 재사용. 새 finding 발견 시 추가."
    category: pentest
    points: 30
    answer: |
      🤖 가이드: 4 단계 수행 결과 markdown — 각 단계 의 finding + 시간 + 도구.
    answer_detail: |
      운영 환경 의 점검 = 시간 제한 + 우선순위 + 발견 의 효율. 4 단계 가 균형 잡힌
      점검 방법론.
    verify:
      intent: "4 단계 통합 + finding"
      success_criteria:
        - "4 단계 수행"
        - "각 단계 finding"
      acceptable_methods:
        - "markdown"
      negative_signs:
        - "1~2 단계만"
    target_vm: attacker
    risk_level: medium

  - order: 3
    instruction: |
      ## 🎯 MISSION — 최종 보고서 (W14 양식 + 15+ finding + 비즈니스 영향)

      **무엇을:** W14 의 공식 보고서 양식 그대로 + 15+ finding + 비즈니스 영향 분석 (각 finding 의 회사 매출/신뢰도/법적 영향).

      ## 📋 채점
      - W14 의 5 section 양식
      - 15+ finding
      - 비즈니스 영향 (각 finding 1~2 줄)
      - 즉시/단기/중기/장기 권고 분류
    hint: "W14 의 보고서 + 비즈니스 영향 column 추가."
    category: documentation
    points: 35
    answer: |
      🤖 가이드: W14 5 section + 15+ finding + 비즈니스 영향.
    answer_detail: |
      비즈니스 영향 = 점검 의 *경영진 설득* 의 핵심. 기술적 위험 도 만 으로는
      의사결정자 가 우선순위 정 못함.
    verify:
      intent: "최종 보고서 + 15+ finding + 비즈니스 영향"
      success_criteria:
        - "5 section"
        - "15+ finding"
        - "비즈니스 영향"
        - "권고 분류"
      acceptable_methods:
        - "markdown"
      negative_signs:
        - "section 누락"
        - "finding 15 미만"
    target_vm: bastion
    risk_level: low

  - order: 4
    instruction: |
      ## 🎯 MISSION — R/B/P 종합 회고

      **무엇을:** 본 학기 web-vuln 14 주 의 *R/B/P 양면* 회고. 3 문단 markdown:
      - Red (점검자) 입장: 가장 인상 적 finding + 의외 의 결과
      - Blue (운영자) 입장: 점검 중 alert 패턴 + Blue 가 detection 어려운 결함
      - Purple (협업) 입장: 운영 환경 의 R/B/P 통합 의 권고
    hint: "W04 의 Wazuh dashboard + W07 의 ModSec + W13 자동 도구 결과 통합 회고."
    category: documentation
    points: 15
    answer: |
      🤖 가이드: R/B/P 3 문단 markdown — 학생 본인 의 1 학기 학습 회고.
    answer_detail: |
      R/B/P 회고 = 학습 의 *내면화*. 단순 finding 보다 *왜 그런 결함 이 생겼는지*
      + *어떻게 운영 에서 detection / 예방* 의 시각 = 점검자 의 성장.
    verify:
      intent: "R/B/P 3 문단 + 학습 회고"
      success_criteria:
        - "R/B/P 3 문단"
        - "학생 본인 단어"
      acceptable_methods:
        - "markdown"
      negative_signs:
        - "1~2 문단만"
        - "paste"
    target_vm: bastion
    risk_level: low

  - order: 5
    instruction: |
      ## 🎯 MISSION — cleanup + 종강

      **무엇을:** 본 학기 동안 만든 모든 /tmp 파일 + lab artifact cleanup + sha256 확인.
    hint: "rm -rf /tmp/*.txt /tmp/*.json /tmp/*.out /tmp/*.pdf 등."
    category: cleanup
    points: 8
    answer: |
      🤖 가이드:
      rm -rf /tmp/*.txt /tmp/*.json /tmp/*.out /tmp/*.pdf /tmp/jwt2.txt /tmp/sqli.json 2>/dev/null
      sha256sum ~/web-vuln-w*.md | tee ~/all-reports.sha256
      echo '[종강] 1 학기 web-vuln 모든 lab cleanup 완료'
    answer_detail: |
      cleanup + sha256 무결성 = 점검 종료 의 책임. 운영 환경 의 점검 종료 후 *모든
      흔적 정리* + *보고서 무결성* 의 보장.
    verify:
      intent: "cleanup + 모든 보고서 sha256"
      success_criteria:
        - "cleanup 명령"
        - "sha256 확인"
      acceptable_methods:
        - "rm + sha256sum"
      negative_signs:
        - "cleanup 누락"
    target_vm: attacker
    risk_level: low
