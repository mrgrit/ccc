  - order: 4
    instruction: |
      ## 🎯 MISSION — NeoBank session cookie 분석 (entropy + signed 여부)

      NeoBank 의 *session cookie* 의 *길이 + entropy + signed 여부* 분석. modern web
      의 *session 의 4 표준* (HttpOnly / Secure / SameSite / signed) 검증.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **session cookie** = `Set-Cookie: sessionId=abc...` 의 *서버 측 session 식별자*
      - **entropy** = 예측 불가성 (random 정도). *128 bit+* 권장
      - **HttpOnly** = JS 의 `document.cookie` 접근 차단 (XSS 방어)
      - **Secure** = HTTPS 만 전송 (man-in-middle 방어)
      - **SameSite** = strict / lax / none — CSRF 방어
      - **signed cookie** = *cookie 내용 의 서명* — 변조 검출

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== NeoBank 의 Set-Cookie ==="
      curl -sI -H 'Host: neobank.6v6.lab' http://10.20.30.1/ 2>&1 | grep -iE "set-cookie|cookie" | head -10

      echo ""
      echo "=== Session cookie 값 의 길이 + entropy ==="
      curl -sIc /tmp/cookies.txt -H 'Host: neobank.6v6.lab' http://10.20.30.1/ 2>&1 > /dev/null
      cat /tmp/cookies.txt 2>&1 | tail -10
      echo ""
      echo "Cookie 값 의 *길이 + 첫 chars*:"
      grep -E "sessionid|session_id|JSESSIONID|connect.sid" /tmp/cookies.txt 2>&1 | awk '{print "len="length($7), "value="substr($7,1,40)"..."}' | head -3
      SH
      ```

      ## 📋 확인 사항

      - Set-Cookie header 존재 + session 관련 cookie
      - HttpOnly / Secure / SameSite flag 확인
      - cookie 값 의 길이 (40+ char 정상)
      - signed 여부 (cookie 의 `.` 또는 `:` 구분 = signed 가능성)

      ## 💡 왜 이걸 하는가?

      session = *web 의 가장 흔한 인증 메커니즘*. *4 표준* 의 *모두 적용* 가 *최소
      보안*. NeoBank (금융) = *반드시* 4 표준 모두.

      ## 🔍 결과 해석

      - **정상 (금융 표준)**: HttpOnly + Secure + SameSite=Strict + signed
      - **vuln**: HttpOnly X → XSS 의 cookie 절도 가능
      - **session 의 short length**: 예측 가능 — brute 가능

      ## 비정상 시 대응

      - **Set-Cookie 없음**: NeoBank 의 *frontend-only* (SPA) — JWT 사용 가능성
      - **session 의 *순차 ID*** (1, 2, 3): 예측 brute 가능 — 즉시 random 화
    hint: |
