# STEP 7 [BLUE·XSS·CSP] — CSP 헤더 분석 + 약점 식별 + Strict CSP 권고
# ============================================================
- order: 7
  instruction: |
    ## 🎯 MISSION

    Content-Security-Policy 는 XSS 의 *마지막 방어* — payload 가 실행되더라도
    *외부 resource 로드 / inline script* 차단. Juice Shop 의 CSP 정책 확인 +
    약점 (unsafe-inline / wildcard / data: scheme) 식별 + Strict CSP 권고.

    ## 💻 실행 명령

    ```bash
    # 1. CSP 헤더 수집
    echo "=== 1. CSP 헤더 ==="
    CSP=$(curl -sI http://juice.6v6.lab/ | grep -i '^content-security-policy:')
    echo "${CSP:-'(CSP 미설정 = critical)'}"

    # 2. 다른 보안 헤더 (X-Frame / HSTS / Permissions-Policy) 동시 점검
    echo ""
    echo "=== 2. 기타 보안 헤더 (W01 step 4 의 6 헤더 재점검) ==="
    curl -sI http://juice.6v6.lab/ | grep -iE '^(x-frame|x-content-type|strict-transport|referrer-policy|permissions-policy):'

    # 3. CSP 정책 해석 — 약점 패턴 grep
    echo ""
    echo "=== 3. CSP 약점 패턴 분석 ==="
    if [ -n "$CSP" ]; then
      echo "$CSP" | grep -oE "(unsafe-inline|unsafe-eval|\*|data:|http:|'unsafe-[a-z]+')" \
        | sort -u | sed 's/^/  ★ 약점: /'
    fi

    # 4. Google CSP Evaluator 명령 (또는 web 직접)
    echo ""
    echo "=== 4. CSP Evaluator 외부 시뮬 ==="
    echo "CSP 정책을 https://csp-evaluator.withgoogle.com/ 에 붙여넣어 자동 등급 확인"
    echo "권장: A+ 등급 = nonce 또는 strict-dynamic + 'self' + no unsafe-*"
    ```

    ## 📋 확인 사항

    - Juice Shop 의 CSP 헤더 존재 여부 + 정책 내용
    - 약점 패턴:
      - `unsafe-inline` → inline `<script>` 실행 허용 (CSP 무력화)
      - `unsafe-eval` → `eval()` / `setTimeout(string)` 허용
      - `*` (wildcard) → 모든 외부 host 허용
      - `data:` scheme → `<img src="data:text/html,...">` XSS
      - `http:` (HTTPS 환경에서) → MITM 시 외부 script
    - **추천 정책**: `default-src 'self'; script-src 'nonce-RANDOM' 'strict-dynamic';
      object-src 'none'; base-uri 'self'; frame-ancestors 'none'`

    ## 💡 왜 이걸 하는가?

    CSP 는 XSS 의 *마지막 방어선* — 이전 단계 (sanitize, WAF) 우회되어도 CSP 가
    실행 차단. OWASP A05 Security Misconfiguration + MITRE T1190 차단. Juice
    Shop 처럼 *CSP 미설정* 은 XSS 의 완전한 노출 — 운영 web 의 default 권장 정책
    적용 필수.

