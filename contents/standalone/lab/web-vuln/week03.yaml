    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 MISSION — JWT HS256 secret brute 시뮬 (학습용 weak secret)

      *학습 환경* 의 *weak HS256 secret* (예: "secret" / "12345") 의 *jwt_tool brute*
      시뮬. *RS256 의 JuiceShop* 은 brute 불가 — *별 학습용 토큰* 생성.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **HS256** = HMAC + SHA-256 의 *symmetric* — *동일 secret* 가 서명 + 검증
      - **secret brute** = secret 이 *짧음* (예: dictionary word) 시 brute 가능
      - **jwt_tool** = jwt 의 *변조 + brute + 검증* 표준 Python 도구
      - **RS256 vs HS256** = RS256 의 *brute 불가* (RSA 의 2048 bit key)
      - **본 step 의 시뮬** = *학습용 weak HS256 토큰* 생성 → brute 시도

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # 1) 학습용 weak HS256 토큰 생성
      python3 <<'PY'
      import jwt
      payload = {"user": "admin", "role": "admin"}
      weak_secret = "secret"
      token = jwt.encode(payload, weak_secret, algorithm="HS256")
      print(f"Weak token: {token}")
      print(f"Weak secret: {weak_secret}")
      PY

      # 2) 의 jwt_tool 의 brute 시뮬 (jwt_tool 미설치 시 수동 dict brute)
      python3 <<'PY'
      import jwt
      token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyIjoiYWRtaW4iLCJyb2xlIjoiYWRtaW4ifQ.placeholder"
      # 실 token 의 brute 시뮬 (rockyou 의 top 5 만)
      for secret in ["password", "secret", "123456", "admin", "12345"]:
          try:
              # 실 token 의 first 3 segment 시뮬 — 생성 부터
              import jwt as j
              evil = j.encode({"user":"admin","role":"admin"}, secret, algorithm="HS256")
              decoded = j.decode(evil, secret, algorithms=["HS256"])
              print(f"  [SECRET FOUND] secret='{secret}' → decode OK")
              break
          except Exception as e:
              pass
      print("brute 시뮬 완료")
      PY
      SH
      ```

      ## 📋 확인 사항

      - weak token 의 *3 segment* + secret "secret"
      - brute 시뮬 의 5 candidate (password / secret / 123456 / admin / 12345)
      - *RS256 (JuiceShop)* 는 brute *불가* 인지

      ## 💡 왜 이걸 하는가?

      *HS256 의 weak secret* = *modern web 의 흔한 결함*. dev/test 의 *"secret123"* 가
      production 누락. *brute 의 분 단위* 가능 — 즉시 *RS256 마이그레이션*.

      ## 🔍 결과 해석

      - **brute 성공**: weak secret 사용 — 즉시 *random 64+ char* secret 또는 RS256 으로
      - **brute 실패**: secret 이 *random* + *충분 길이* (정상)
      - **HS256 사용 자체 X**: RS256 권장 — *key rotation* 의 *clean* 분리

      ## 비정상 시 대응

      - **PyJWT 미설치**: `pip install pyjwt`
      - **jwt_tool 사용 권장**: `git clone https://github.com/ticarpi/jwt_tool && python3 jwt_tool.py --crack -d wordlist.txt <token>`
