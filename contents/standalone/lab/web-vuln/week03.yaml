    ```

    ## 📋 확인 사항 (우회 기법 표)

    | 기법 | payload 예 | 차단 가능성 | 비고 |
    |------|-----------|-----------|------|
    | 1 plain | `<script>` | high (CRS 941100) | baseline |
    | 2 case | `<ScRiPt>` | high (CRS 의 regex 대소문자 무관) | regex 무력화 시도 |
    | 3 URL encoded | `%3Cscript%3E` | high (WAF 가 decode 후 inspect) | naive WAF 우회 |
    | 4 HTML entity | `&#60;script&#62;` | medium (server decode 의존) | 일부 우회 |
    | 5 double URL | `%253Cscript%253E` | low (WAF 가 single decode 만) | layer 의존 우회 |
    | 6 SVG fragment | `<svg/onload=>` | medium (CRS 941160) | script 외 tag |
    | 7 template literal | `${alert(1)}` | low (JS context, HTML grep 우회) | DOM XSS only |

    ## 💡 왜 이걸 하는가?

    *블랙리스트 필터의 본질적 한계* — payload 변형 무한 가능. WAF 의 PARANOIA
    LEVEL 1 (default) 은 단순 패턴만 차단 → 위 7 기법 중 4-5 우회 가능.
    OWASP A03 + MITRE T1027 Obfuscated Files or Information.

    *whitelist 기반 sanitizer* (DOMPurify) 가 정답 — 허용 tag/attribute 명시
    후 모두 strip. blacklist (CRS 의 942/941 룰) 는 *추가 layer* 만.

