lab_id: standalone-web-vuln-week03
title: A02 Cryptographic Failures — Hash + TLS + JWT secret + Session
version: standalone-non-ai
course: web-vuln
week: 3
description: |
  OWASP A02 (Cryptographic Failures) 의 4 표준 영역 — Hash 종류 + TLS handshake +
  JWT secret brute (HS256) + NeoBank session cookie 분석. W02 의 JWT 의 *심화* +
  *암호 기반 의 4 축* hands-on.
difficulty: medium
duration_minutes: 180
audience: web-vuln 3주차
prerequisites:
  - W02 lecture + lab 완료 (JWT 3 segment 이해)
  - 학생 PC 의 curl + openssl + jq + hashcat (또는 john) 가용
  - 6v6 의 attacker / web / NeoBank 컨테이너 가동
objectives:
  - hash 6 종 (MD5/SHA1/SHA256/SHA512/bcrypt/Argon2) 의 식별 + 약함 인지
  - TLS handshake 의 cipher / version / cert 분석 (openssl s_client)
  - JWT HS256 secret brute (학습용 weak secret) + jwt_tool 시뮬
  - NeoBank session cookie 의 entropy + signed 여부 분석
  - 4 영역 종합 보고서 작성
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — Hash 6 종 식별 + 약함 인지

      MD5 / SHA1 / SHA256 / SHA512 / bcrypt / Argon2 의 *6 hash 의 특징* (길이 + 형식
      + 약함) + JuiceShop 의 *user password hash* 식별 시도.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **hash 의 목적** = 비밀번호 의 *원본 저장 X* — *역산 불가* (이상 적 으로)
      - **MD5** (1992) — 128bit. *충돌 가능*, *2004 부터 deprecated*. password 사용 X
      - **SHA1** (1995) — 160bit. *2017 충돌*, password 사용 X
      - **SHA256** (2002) — 256bit. *충돌 안 발견*. 단 *single-pass* = brute 가능
      - **SHA512** (2002) — 512bit. SHA256 의 *longer*. 단 *동일* brute 가능성
      - **bcrypt** (1999) — *adaptive cost* (cost 12 = $2y$12$...). *salt 자동* + *느림*
      - **Argon2** (2015) — *winner of PHC*. *memory-hard* + *parallel-hard* + *time-hard*

      ## 💻 실행 명령

      ```bash
      # 1) 6 hash 의 길이 + 형식
      echo "password" | md5sum
      echo "password" | sha1sum
      echo "password" | sha256sum
      echo "password" | sha512sum
      python3 -c "import bcrypt; print(bcrypt.hashpw(b'password', bcrypt.gensalt()).decode())"
      python3 -c "import argon2; print(argon2.PasswordHasher().hash('password'))" 2>/dev/null || echo "argon2-cffi 미설치"

      # 2) JuiceShop 의 user password hash 식별 (W02 의 IDOR 활용)
      ssh 6v6-attacker bash <<'SH'
      TOK=$(curl -s -X POST -H 'Content-Type: application/json' -H 'Host: juice.6v6.lab' \
        http://10.20.30.1/rest/user/login \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r .authentication.token)
      curl -s -H 'Host: juice.6v6.lab' -H "Authorization: Bearer $TOK" \
        http://10.20.30.1/api/Users/1 | jq -r '.data.password // .data.user.password // .password' 2>/dev/null
      SH
      ```

      ## 📋 확인 사항

      - 4 hash (MD5/SHA1/SHA256/SHA512) 의 *길이* 확인 (32/40/64/128 hex char)
      - bcrypt 의 `$2y$12$...` 형식 + *60 char* 길이
      - Argon2 의 `$argon2id$v=19$...` 형식
      - JuiceShop password hash = MD5 (vuln) 또는 bcrypt (안전)

      ## 💡 왜 이걸 하는가?

      비밀번호 hash = *web 의 가장 흔한 vuln*. MD5/SHA1 의 *역산 = 분 단위* (rainbow
      table) vs bcrypt 의 *분 단위 single password*. 본 step 의 *식별 능력* 이 *모든
      audit 의 첫 단계*.

      ## 🔍 결과 해석

      - **정상 (modern)**: JuiceShop password = bcrypt 또는 Argon2
      - **vuln (legacy)**: MD5 또는 SHA1 — 즉시 *rotate* 권장
      - **password 노출 X**: API 의 *필드 필터* 적용 — 다른 endpoint 시도

      ## 비정상 시 대응

      - **bcrypt 미설치**: `pip install bcrypt`
      - **JuiceShop password X** — `/api/Users/1` 응답 의 *다른 path* (예: `.data` 의
        nested) 검색
    hint: |
      6 hash × 길이 + 형식 + JuiceShop password hash 식별.
    category: analysis
