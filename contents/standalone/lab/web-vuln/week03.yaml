  - order: 2
    instruction: |
      ## 🎯 MISSION — TLS handshake 분석 (openssl s_client) + cipher / cert 분석

      6v6 의 web 컨테이너 의 *TLS 설정* (cipher / version / cert) 분석. openssl
      s_client 의 표준 사용.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **TLS version** = 1.0 (deprecated 2020) / 1.1 (deprecated 2020) / 1.2 (현재) /
        1.3 (modern 2018)
      - **cipher suite** = `ECDHE-RSA-AES256-GCM-SHA384` 같은 *key exchange + 인증 +
        encryption + MAC* 의 4 조합
      - **cert chain** = leaf cert + intermediate CA + root CA
      - **self-signed** = production 부적합 (학습 환경 OK)
      - **TLS 1.3** = legacy cipher 제거 + 0-RTT + handshake 1 RTT

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== TLS version + cipher (juice.6v6.lab) ==="
      echo | timeout 5 openssl s_client -connect 10.20.30.1:443 -servername juice.6v6.lab 2>&1 | \
        grep -E "Protocol|Cipher|Verify return" | head -10

      echo ""
      echo "=== Cert subject + issuer ==="
      echo | timeout 5 openssl s_client -connect 10.20.30.1:443 -servername juice.6v6.lab 2>&1 | \
        openssl x509 -noout -subject -issuer -dates 2>&1 | head -5

      echo ""
      echo "=== Supported cipher (TLS 1.2) ==="
      timeout 10 nmap --script ssl-enum-ciphers -p 443 10.20.30.1 2>&1 | grep -E "TLS|cipher" | head -10
      SH
      ```

      ## 📋 확인 사항

      - Protocol = TLS 1.2 또는 1.3 (정상)
      - Cipher = ECDHE-* + AES-GCM (modern) 또는 RC4/3DES (vuln)
      - Cert = self-signed (학습 환경) 또는 valid CA
      - nmap 의 cipher enum 결과

      ## 💡 왜 이걸 하는가?

      TLS = *modern web 의 기본*. *cipher / version 의 결함* = *MITM / downgrade* 가능
      성. 본 step 의 *분석 능력* 이 *audit 의 표준 도구*.

      ## 🔍 결과 해석

      - **정상 (modern)**: TLS 1.2/1.3 + ECDHE + AES-GCM
      - **vuln (legacy)**: TLS 1.0/1.1 + RC4/3DES — 즉시 disable
      - **self-signed**: 학습 환경 OK, production 부적합

      ## 비정상 시 대응

      - **openssl s_client timeout** — `-servername` 누락 (SNI 필수)
      - **nmap 미설치**: `apt install nmap`
      - **사용 가능 cipher 0**: 서버 의 *cipher list* 너무 제한 — 확장 필요
    hint: |
      openssl s_client + nmap ssl-enum-ciphers + cert 분석.
    category: analysis
    points: 25
    answer: |
      ssh 6v6-attacker bash <<'SH'
      echo | timeout 5 openssl s_client -connect 10.20.30.1:443 -servername juice.6v6.lab 2>&1 | \
