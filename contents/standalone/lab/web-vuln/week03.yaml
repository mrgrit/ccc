      "1-plain:<script>alert(1)</script>" \
      "2-case:<ScRiPt>alert(1)</sCrIpT>" \
      "3-url:%3Cscript%3Ealert(1)%3C/script%3E" \
      "4-html_entity:&#60;script&#62;alert(1)&#60;/script&#62;" \
      "5-double_url:%253Cscript%253E" \
      "6-svg_fragment:<svg/onload=alert(1)>" \
      "7-template:<script>\`\${alert(1)}\`</script>" \
      ; do
      label=$(echo "$label_payload" | cut -d: -f1)
      payload=$(echo "$label_payload" | cut -d: -f2-)
      code=$(curl -o /dev/null -s -w "%{http_code}" -G --data-urlencode "q=apple${payload}" \
        http://juice.6v6.lab/rest/products/search)
      echo "${label}: code=${code}"
    done

    # ModSec audit log 의 매치 차이 확인 (선택)
