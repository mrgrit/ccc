  - order: 5
    instruction: |
      ## 🎯 MISSION — W03 종합 보고서 (4 영역 audit + 권장)

      step 1-4 의 *4 영역* (hash + TLS + JWT secret + session cookie) 종합 보고서.
      W02 의 *4 섹션 형식* 응용.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **4 영역** = hash + TLS + JWT secret + session cookie 의 *각* findings
      - **W02 의 4 섹션 형식** = Executive / Findings / Remediation / 매핑
      - **CWE 매핑 추가** = CWE-327 (broken crypto) / CWE-326 (weak strength) / CWE-321
        (hard-coded key) / CWE-916 (insufficient hash effort) / CWE-614 (insecure cookie)
      - **본 step 의 산출물** = W03 의 *유일 한 평가 산출물*

      ## 💻 산출물 (4 섹션 보고서)

      ```markdown
      # W03 — A02 Cryptographic Failures 분석 보고서

      ## 1. Executive Summary
      - target: 6v6 의 web + JuiceShop + NeoBank (학습 환경)
      - 발견 vuln 4 영역 — hash + TLS + JWT secret + session cookie
      - CVSS High 1 (JWT HS256 weak secret) + Medium 3
      - 권장: 즉시 alg whitelist + cipher upgrade + cookie flag

      ## 2. Detailed Findings (분석가)
      ### F1 — Hash audit (CWE-327)
      - 결과: JuiceShop password = ___ (실측)
      - 위험: MD5/SHA1 시 brute 분 단위

      ### F2 — TLS audit (CWE-327 + CWE-326)
      - 결과: TLS ___ + cipher ___
      - 위험: 1.0/1.1 시 deprecated, RC4/3DES 시 weak

      ### F3 — JWT HS256 brute (CWE-321 + CWE-916)
      - 결과: weak token "secret" 의 brute *분 단위*
      - 위험: HS256 사용 시 *long random secret* 필수

      ### F4 — Session cookie (CWE-614 + CWE-1004)
      - 결과: HttpOnly ___ / Secure ___ / SameSite ___
      - 위험: flag 누락 시 XSS / MITM / CSRF 가능

      ## 3. Remediation
      ### F1 hash
      - 즉시: bcrypt cost 12+ 또는 Argon2id 권장
      - 단기: legacy hash 의 *user 의 다음 login 시 rehash*

      ### F2 TLS
