    ## 🎯 MISSION

    WAF / sanitizer 의 블랙리스트 (단순 `<script>` grep) 우회 7 기법 시연:
    encoding (URL / HTML entity / Unicode) + case 혼합 + tag fragment (`<svg/>`)
    + JS context (template literal / unicode escape) + protocol (data: / javascript:).
    각 기법의 ModSecurity 차단 vs 우회 결과 확인.

    ## 💻 실행 명령

    ```bash
