lab_id: standalone-web-vuln-week08
title: "중간고사 — JuiceShop 점검 보고서 통합 작성 (W01~W07 종합)"
version: standalone-non-ai
course: web-vuln
week: 8
description: |
  W01~W07 의 모든 점검 결과 를 *하나의 보고서* 로 통합. 시간 제한 (2시간) +
  보고서 형식 (markdown 6 section) + 채점 기준 (10 finding 이상 + 권고 + 윤리)
  의 환경 에서 학생 의 점검 역량 종합 평가.
difficulty: hard
duration_minutes: 120
audience: 웹 보안 입문자 (중간고사 — W08)
prerequisites:
  - "W01~W07 모든 lab 통과"
  - "각 주차 의 보고서 (W04 인증 5 finding, W07 입력 3 finding 등) 가용"
  - "attacker / bastion / web access 가능"
objectives:
  - "W01~W07 의 finding 종합 → 10+ finding markdown 보고서"
  - "각 finding 의 위험도 (CVSS) + OWASP Top 10 매핑 + 권고"
  - "운영 환경 우선순위 (Critical/High/Medium/Low)"
  - "윤리 / 법적 진술 (W01 의 ROE 와 일치)"
  - "보고서 sha256 무결성"
pass_threshold: 0.7
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — 점검 보고서 통합 markdown

      **어디서:** 학생 PC 보고서 파일 (e.g. `~/web-vuln-midterm-report.md`)
      **무엇을:** W01~W07 의 모든 finding 을 *하나의 보고서* 로 통합.

      **요구 사항:**
      - 최소 10 finding (W04 5 + W07 3 + 기타 2+)
      - 각 finding: 위험도 / OWASP 매핑 / 증거 / 권고
      - 종합 (Executive Summary) + 우선순위 + 윤리 진술 + sha256

      **markdown 구조:**

      ```markdown
      # JuiceShop 점검 보고서 (중간고사)

      ## 0. Executive Summary
      대상: juice.6v6.lab (JuiceShop)
      점검 기간: <학생 작성>
      방법론: OWASP WSTG + Top 10
      총 finding: <N>

      ## 1. 점검 범위 / 방법론
      ...

      ## 2. Finding 상세 (10+)

      ### F-01 default 자격증명 (Critical, OWASP A07)
      - 증거: <W04 STEP 1>
      - 영향: admin 권한 탈취
      - 권고: ...

      ### F-02 ~ F-10
      ...

      ## 3. 우선순위 표
      | 등급 | finding | 운영 영향 |
      |---|---|---|
      | Critical | F-01, F-XX | 즉시 |
      | High | ... | 1주 |
      | Medium | ... | 1개월 |

      ## 4. 종합 의견 + 권고
      ...

      ## 5. 윤리/법적 진술
      - 허가 범위 (W01 ROE 인용)
      - 점검 단계 (WSTG-INFO 부터)
      - 법적 근거 (정보통신망법 + 동의)
      - 해킹 차이 (보고서 + 권고)
      - 로그 보존

      ## 6. 부록
      - 사용 도구 카탈로그 (W02)
      - 명령 history
      - sha256 무결성: <sha256sum 보고서.md>
      ```

      ## 💡 왜?

      실무 점검 의 *최종 산출물* = 보고서. 점검 활동 자체 보다 *어떻게 정리* 하느
      냐 가 점검자 가치 의 가장 큰 부분. 운영팀 / 의사결정자 가 *우선순위* 만 보고
      어디 부터 수정 할지 결정.

      ## 📋 채점

      - 10+ finding (각 위험도/OWASP/증거/권고)
      - Executive Summary 1 페이지
      - 우선순위 표
      - 윤리/법적 진술 5 요소
      - sha256
    hint: "W04 의 5 finding (default cred, weak pw, cookie attr, session fix, sqli bypass) + W07 의 3 (upload, traversal, cmd) + W01~W03 의 정찰 finding (header noise, robots, /administration etc) = 10+ 충분."
    category: documentation
    points: 30
    answer: |
      🤖 가이드:
      # markdown 위 instruction 의 구조 — W01~W07 의 실제 결과 인용 + 학생 본인 의 권고.
      # 마지막: sha256sum report.md > report.sha256
    answer_detail: |
      중간고사 의 핵심 = *통합* 과 *우선순위*. 단순 finding list 가 아닌, 운영 환경
      의 의사 결정 자 입장 에서 "어디 부터 수정" 의 명확 한 답. CVSS 점수 = 객관
      적 근거. OWASP A0X 매핑 = 표준 framework.
    verify:
      intent: "10+ finding 통합 보고서 + 우선순위 + 윤리 + sha256"
      success_criteria:
        - "10+ finding 모두 포함"
        - "각 finding: 위험도/OWASP/증거/권고"
        - "Executive Summary + 우선순위 표"
        - "윤리/법적 진술 5 요소"
        - "sha256 무결성"
      acceptable_methods:
        - "markdown"
        - "표 / 본문 free form"
      negative_signs:
        - "finding 10 미만"
        - "권고 없이 증거만"
        - "윤리 진술 누락"
        - "sha256 누락"
    target_vm: bastion
    risk_level: low
