title: A04 Insecure Design — NeoBank 송금 workflow 의 4 설계 결함
version: standalone-non-ai
course: web-vuln
week: 6
description: |
  OWASP A04 (Insecure Design, 2021 신규) — *코드 가 아닌 architecture 의 결함*.
  NeoBank 의 *송금 workflow* 의 4 설계 결함 (2FA 부재 / 가격 검증 부재 / rate
  limit 부재 / 비즈니스 로직 우회) hands-on.
difficulty: medium
duration_minutes: 180
audience: web-vuln 6주차
prerequisites:
  - W02-W05 완료
  - NeoBank 가동 + login endpoint 가용
  - 학생 PC 의 curl + jq + python3
objectives:
  - NeoBank 의 *송금 workflow* 의 *5 단계* 식별
  - 4 설계 결함 (2FA 부재 / 가격 검증 / rate limit / 비즈니스 로직) 시뮬
  - *threat modeling* 의 *STRIDE 6 카테고리* 적용
  - 한국 금융 표준 (FDS / 전자금융감독규정) 매핑
  - W06 보고서 + CWE-209/256/799/840
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — NeoBank 의 *송금 workflow* 5 단계 식별

      NeoBank 의 *공개 endpoint* 분석 + *송금 workflow* 의 5 단계 (login → 잔액 조회
      → 송금 form → 비밀번호 재확인 → 송금 완료) 식별.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **workflow** = *사용자 의 의도* 의 *단계 sequence*
      - **금융 의 표준 workflow** = login + 2FA + form + 비밀번호 + 송금 완료 (5+ 단계)
      - ***최소 표준*** = OTP / SMS / 생체 / FIDO2 의 *추가 인증*
      - **endpoint discovery** = `curl -I` + form action 분석 + Burp Spider

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # 1) NeoBank 공개 endpoint enum
      echo "=== 공개 endpoint ==="
      for path in / /login /register /transfer /account /api/login /api/transfer /api/account /api/users; do
        code=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: neobank.6v6.lab' "http://10.20.30.1$path")
        echo "$path: $code"
      done

      # 2) login form 의 action / method 분석
      echo ""
      echo "=== /login form 분석 ==="
      curl -s -H 'Host: neobank.6v6.lab' http://10.20.30.1/login 2>&1 | grep -E 'form|input|action=|method=' | head -10
      SH
      ```

      ## 📋 확인 사항

      - public endpoint 의 응답 코드 매트릭스
      - login form 의 action + method (POST 표준)
      - workflow 의 *5 단계* 식별

      ## 💡 왜 이걸 하는가?

      *workflow 분석* = A04 의 *첫 단계*. *각 단계* 의 *설계 결함* 가 *vuln*.

      ## 🔍 결과 해석

      - **정상**: 5 단계 endpoint 식별
      - **endpoint 부족**: API 문서 검색 (`/api/docs` 또는 `/swagger`)
      - **모든 200**: login 무시 — 다른 endpoint 탐색

      ## 실측 (2026-05-16)
      - `/login` 200, `/transfer` 302 (login redirect), `/api/login` 405 (Method)
    hint: |
