          - "**[OSS] CWE-840 Business Logic Errors**"
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 MISSION — Rate limit 부재 시뮬 (brute force 가능성)

      login endpoint 의 *rate limit 부재* 시뮬. *연속 100 시도* → *모두 응답* 시
      brute force 가능.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **rate limit** = N requests / time 의 *임계*. *brute / DoS 방어*
      - **표준** = login 의 *10 시도 / 5 분* (한국 금융 의 default)
      - **403 vs 429** = 403 (Forbidden) / 429 (Too Many Requests) — *후자 가 정확*
      - **CAPTCHA / MFA** = 추가 방어

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== 30 회 연속 login 시도 (rate limit 검증) ==="

      START=$(date +%s)
      for i in $(seq 1 30); do
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -X POST -H 'Host: neobank.6v6.lab' \
          -d "username=admin&password=wrong$i" \
          http://10.20.30.1/login)
        echo -n "$code "
      done
      END=$(date +%s)
      echo ""
      echo "소요 시간: $((END - START)) 초"
      echo "모두 같은 응답 = rate limit 부재"
      echo "429 또는 403 등장 = rate limit 적용"
      SH
      ```

      ## 📋 확인 사항

      - 30 회 응답 코드 분포 (모두 401 = vuln / 일부 429 = 정상)
      - 소요 시간 (1-3 초 = 매우 빠름, brute 가능)
      - rate limit *임계* 식별

      ## 💡 왜 이걸 하는가?

      한국 금융 표준 = *5 분 의 10 시도*. 본 시뮬 의 *30 시도 의 1 초 만에 응답* =
      *brute 분 단위 가능*.

      ## 🔍 결과 해석

      - **모두 401 (vuln)**: rate limit 부재 — 즉시 적용 권장
      - **일부 429 (정상)**: rate limit 적용 — 임계 식별
      - **점진 적 차단**: progressive lockout (정상 modern 방어)
