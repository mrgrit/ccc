  - order: 2
    instruction: |
      ## 🎯 MISSION — 2FA 부재 시뮬 (단일 인증 의 송금 가능 여부)

      NeoBank login 후 *2FA 의 prompt 없이* 송금 가능 여부 확인. 한국 *전자금융감독규정* 의
      *송금 의 2 채널 인증 의무* 위반 시뮬.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **2FA** = Two-Factor Authentication — 비밀번호 + *추가 채널* (OTP / SMS / 생체)
      - **한국 표준** = 전자금융감독규정 의 *송금 의 2 channel* 의무 (2014+)
      - **OTP** = TOTP (Time-based) / HOTP (HMAC-based)
      - **시뮬** = login 후 송금 시도 → 2FA prompt 가 *없음* 확인 = A04 결함

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # 1) login 시도 (default credential 가정)
      LOGIN=$(curl -s -X POST -H 'Host: neobank.6v6.lab' \
        -H 'Content-Type: application/x-www-form-urlencoded' \
        -d 'username=admin&password=admin' \
        http://10.20.30.1/login 2>&1)

      # 2) login 응답 분석 (cookie 또는 token)
      echo "=== login 응답 head ==="
      curl -sI -X POST -H 'Host: neobank.6v6.lab' \
        -H 'Content-Type: application/x-www-form-urlencoded' \
        -d 'username=admin&password=admin' \
        http://10.20.30.1/login 2>&1 | head -15

      # 3) 송금 endpoint 의 2FA prompt 여부
      echo ""
      echo "=== 송금 endpoint (login 후) ==="
      curl -sc /tmp/neobank-cookies.txt -X POST -H 'Host: neobank.6v6.lab' \
        -d 'username=admin&password=admin' http://10.20.30.1/login >/dev/null 2>&1

      curl -sb /tmp/neobank-cookies.txt -H 'Host: neobank.6v6.lab' \
        "http://10.20.30.1/transfer" 2>&1 | grep -iE '2fa|otp|sms|verification|inputCode|확인' | head -5
      SH
      ```

      ## 📋 확인 사항

      - login 응답 코드 (302 = success / 401 = fail)
      - login 응답 의 Set-Cookie / token
      - 송금 endpoint 의 *2FA UI 또는 prompt* 의 *부재 여부*

      ## 💡 왜 이걸 하는가?

      한국 *전자금융감독규정 위반* = 과징금 + 신뢰 손실. 본 step 의 *2FA 부재 확인* 가
      금융 시스템 의 *day-1 audit*.

      ## 🔍 결과 해석

      - **2FA 없음 (vuln)**: 단일 인증 만 — 한국 표준 위반
      - **2FA 있음**: 표준 준수 — OTP / SMS prompt 표시
      - **default credential X**: 학습 환경 의 default 시도 (admin/admin, test/test 등)
