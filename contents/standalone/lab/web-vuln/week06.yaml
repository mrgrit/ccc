  - order: 6
    instruction: |
      ## 🎯 MISSION (R/B/P 종합) — NeoBank workflow 의 STRIDE 적용

      Red = 송금 의 2FA bypass / 가격 변조 / rate flood 시도 / Blue = application
      logic 의 server-side 검증 / Purple = STRIDE Threat Model 의 가설 보고서.

      ## 💻 실행
      ```bash
      # Red — 송금 rate flood (rate limit 부재 가설 검증)
      ssh 6v6-attacker 'for i in $(seq 1 20); do curl -s -o /dev/null -w "%{http_code}\n" -H "Host: neobank.6v6.lab" -X POST http://10.20.30.1/api/transfer -d "amount=1&to=admin" & done; wait' 2>&1 | sort -u

      # Blue — application 의 rate limit 응답 확인
      ssh 6v6-attacker 'curl -s -o /dev/null -w "after burst %{http_code}\n" -H "Host: neobank.6v6.lab" -X POST http://10.20.30.1/api/transfer -d "amount=1&to=admin"'

