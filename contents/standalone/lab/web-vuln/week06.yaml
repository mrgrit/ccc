  - order: 5
    instruction: |
      ## 🎯 MISSION — W06 종합 보고서 (4 설계 결함 + STRIDE 매핑 + 금융 표준)

      W06 의 4 설계 결함 (workflow + 2FA + 가격 검증 + rate limit) 종합 보고서.
      *STRIDE 6 카테고리* 매핑 + 한국 *전자금융감독규정* 위반 인지.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **STRIDE 6 카테고리** (Microsoft, 1999):
        - **S**poofing — 신분 위장
        - **T**ampering — 변조
        - **R**epudiation — 부인
        - **I**nformation disclosure — 정보 누출
        - **D**enial of service — 서비스 거부
        - **E**levation of privilege — 권한 상승

      ## 💻 산출물

      ```markdown
      # W06 — A04 Insecure Design (NeoBank workflow) 보고서

      ## 1. Executive Summary
      - target: NeoBank 송금 workflow
      - 4 설계 결함 발견 — 전자금융감독규정 위반 가능성
      - CVSS High 1 (2FA 부재) + Medium 3

      ## 2. Detailed Findings
      ### F1 — workflow 의 *5 단계 부족* (현재 2 단계)
      ### F2 — 2FA 부재 (CWE-308 Use of Single-factor Authentication)
      ### F3 — 가격 검증 부재 (CWE-840 Business Logic + CWE-20 Improper Input)
      ### F4 — Rate limit 부재 (CWE-799)

      ## 3. STRIDE 매핑
      | Finding | STRIDE | 위협 |
      |---------|--------|------|
      | F2 2FA | Spoofing | 단일 인증 의 신분 위장 |
      | F3 가격 | Tampering | 금액 변조 |
      | F4 rate | DoS | brute force |

      ## 4. 한국 금융 표준 위반
      - 전자금융감독규정 제13조 (송금 의 2 channel 인증)
      - 전자금융감독규정 제18조 (FDS 의무)
      - 신용정보법 의 *비정상 거래 탐지*

      ## 5. Remediation
      - 즉시: 2FA 적용 (OTP / SMS / FIDO2) + 금액 검증 (서버 측 type+range)
      - 단기: rate limit (5분 의 10 시도) + FDS 통합
      - 장기: zero-trust architecture + risk-based authentication
      ```
    hint: |
      4 결함 + STRIDE 6 + 전자금융감독규정 매핑 + 한국 금융 표준.
