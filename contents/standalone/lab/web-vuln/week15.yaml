lab_id: standalone-web-vuln-week15
title: 기말 — 7 vhost 종합 침투 + PTES 보고서 (180분, 100점)
version: standalone-non-ai
course: web-vuln
week: 15
description: |
  기말 — 6v6 의 7 vhost 중 *3 선택* + PTES 7 단계 + 보고서. 180분 100점.
difficulty: hard
duration_minutes: 180
prerequisites:
  - W01-W14 모두 통과
pass_threshold: 0.6

steps:
  - order: 1
    instruction: |
      ## 🎯 단계 1 (15점) — Recon (PTES 2)

      7 vhost 중 *3 선택* + 각 의 nmap + curl 헤더 + 기술 stack 식별.

      ```bash
      ssh 6v6-attacker bash <<'SH'
      for h in juice neobank admin; do
        echo "=== $h ==="
        curl -sI -H "Host: $h.6v6.lab" http://10.20.30.1/ 2>&1 | grep -iE 'server|x-powered' | head -2
        curl -s -o /dev/null -w "HTTP %{http_code} | %{size_download} bytes\n" -H "Host: $h.6v6.lab" http://10.20.30.1/
      done
      SH
      ```
    hint: 3 vhost recon
    category: exam
    points: 15
    answer: |
      ssh 6v6-attacker bash <<'SH'
      for h in juice neobank admin; do
        echo "=== $h ==="
        curl -sI -H "Host: $h.6v6.lab" http://10.20.30.1/ 2>&1 | grep -iE 'server|x-powered' | head -2
      done
      SH
    answer_detail: 3 vhost recon
    verify:
      type: output_contains
      expect: 'server\|juice'
      field: stdout
      semantic:
        intent: Recon
        success_criteria: [3 vhost]
        acceptable_methods: ["**[OSS] curl + nmap + whatweb**"]
    target_vm: attacker

  - order: 2
    instruction: |
      ## 🎯 단계 2 (20점) — Vuln Analysis (PTES 4)

      3 vhost 의 각 *2 vuln* 식별 = *6 vuln 총*.

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # JuiceShop IDOR (W02)
      TOK=$(curl -s -X POST -H 'Content-Type: application/json' -H 'Host: juice.6v6.lab' \
        http://10.20.30.1/rest/user/login \
        -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r .authentication.token)
      echo "Juice IDOR: $(curl -s -o /dev/null -w '%{http_code}' -H 'Host: juice.6v6.lab' -H "Authorization: Bearer $TOK" http://10.20.30.1/api/Users/2)"

      # NeoBank 2FA 부재 (W06)
      echo "NeoBank /transfer: $(curl -s -o /dev/null -w '%{http_code}' -H 'Host: neobank.6v6.lab' http://10.20.30.1/transfer)"

      # AdminConsole SSRF (W13)
      echo "Admin /preview: $(curl -s -o /dev/null -w '%{http_code}' -H 'Host: admin.6v6.lab' "http://10.20.30.1/preview?url=http://example.com")"
      SH
      ```
    hint: 3 vhost × 2 vuln
    category: exam
    points: 20
    answer: |
      ssh 6v6-attacker bash <<'SH'
      TOK=$(curl -s -X POST -H 'Content-Type: application/json' -H 'Host: juice.6v6.lab' http://10.20.30.1/rest/user/login -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r .authentication.token)
      echo "Juice IDOR: $(curl -s -o /dev/null -w '%{http_code}' -H 'Host: juice.6v6.lab' -H "Authorization: Bearer $TOK" http://10.20.30.1/api/Users/2)"
      SH
    answer_detail: 6 vuln 식별
    verify:
      type: output_contains
      expect: 'IDOR\|200'
      field: stdout
      semantic:
        intent: vuln analysis
        success_criteria: [6 vuln]
        acceptable_methods: ["**[OSS] W02 + W04 + W06 + W13 재현**"]
    target_vm: attacker

  - order: 3
    instruction: |
      ## 🎯 단계 3 (25점) — Exploitation (PTES 5)

      6 vuln 중 *3 선택* + 실 exploit + 영향 분석.
    hint: 3 vuln exploit
    category: exam
    points: 25
    answer: 위 step 2 의 IDOR 의 *실 exploit* + data 추출
    answer_detail: 3 vuln exploit
    verify:
      type: output_contains
      expect: 'exploit\|user'
      field: stdout
      semantic:
        intent: Exploit
        success_criteria: [3 vuln 의 실 exploit]
        acceptable_methods: ["**[OSS] curl + sqlmap + JWT 변조**"]
    target_vm: attacker

  - order: 4
    instruction: |
      ## 🎯 단계 4 (10점) — Post Exploit (PTES 6 — 가설)

      *학습 환경 만*. 권한 상승 + 지속성 *가설* (실 적용 X).
    hint: 가설 시뮬
    category: exam
    points: 10
    answer: 가설 산출물
    answer_detail: Post Exploit 가설
    verify:
      type: output_contains
      expect: '가설\|simulated'
      field: stdout
      semantic:
        intent: Post Exploit
        success_criteria: [가설 시뮬]
        acceptable_methods: ["**[OSS] 학습 환경 만 가설**"]
    target_vm: bastion

  - order: 5
    instruction: |
      ## 🎯 단계 5 (30점) — Reporting (PTES 7) + 종합 보고서

      PTES 7 섹션 표준 보고서 + 6 finding + CVSS + CWE + ATT&CK + 본인 자가 평가.

      ## 산출물 7 섹션
      ```markdown
      # 기말 종합 보고서 — 6v6 web-vuln

      ## 1. Executive Summary
      ## 2. Methodology (PTES 7 단계)
      ## 3. Findings (6 vuln × 각 CVSS + CWE + ATT&CK)
      ## 4. Technical Details (각 vuln 의 reproduction)
      ## 5. Recommendations (즉시 + 단기 + 장기)
      ## 6. Appendix (curl log + payload)
      ## 7. 본인 자가 평가 (W01-W14 의 각 1-5 점 + 졸업 자가)
      ```
    hint: PTES 7 섹션
    category: exam
    points: 30
    answer: 위 7 섹션
    answer_detail: 기말 종합 보고서
    verify:
      type: output_contains
      expect: 'PTES\|CWE\|finding'
      field: stdout
      semantic:
        intent: 기말 보고서
        success_criteria: [7 섹션 + 6 finding]
        acceptable_methods:
          - "**[관리적] PTES 표준 7 섹션**"
          - "**[관리적] CVSS 3.1**"
          - "**[관리적] CWE Top 25 매핑**"
          - "**[관리적] MITRE ATT&CK**"
          - "**[관리적] OWASP A01-A10 cover**"
    target_vm: bastion

  # ============================================================
  # STEP 6 — R/B/P 의 PTES 7 단계 답안 표준
  # ============================================================
  - order: 6
    instruction: |
      ## 🎯 MISSION (R/B/P) — 기말 의 PTES 7 단계 R/B/P 답안

      매 finding 의 7 단계 R/B/P 의 self-grading. R 30 + B 30 + P 30 = 90 / finding,
      6 finding × 90 = 540 / 환산 100 점.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — PTES 7 단계 의 종합 침투

      **페르소나**: 기말 응시자 = pen-tester 의 simulation. 7 vhost 중 3 선택 +
      PTES 7 단계 의 표준 실행 + 6 finding 의 보고. resume 의 PTES 보고서 의 base.

      **공격 의도** (PTES 단계 별):
      1. Pre-engagement = RoE 의 명시 + scope 의 동의 (학습 환경 만)
      2. Intelligence = nmap + nikto + ffuf 의 정찰
      3. Threat Modeling = STRIDE 6 의 적용
      4. Vuln Analysis = 6 finding 의 CVSS + CWE + ATT&CK 매핑
      5. Exploitation = 3 vhost 의 실 exploit
      6. Post-Exploitation = 가설 적 영향 분석 (실 X)
      7. Reporting = 3 청자 (임원/운영/분석)

      ### 🔵 Blue Team — 14 weeks 의 통합 detection

      **탐지 source 의 종합**:
      - ModSec CRS 의 14 weeks 의 매 주차 학습 통합
      - Wazuh agent 의 통합 alert
      - Suricata 의 IDS rule
      - application 의 ACL + audit log

      **답안 형식** (per finding):
      - 매치 룰 의 정확 식별 (15점) + audit log 분석 (10점) + alert flow (5점) = 30점

      ### 🟣 Purple Team — 3 청자 의 보고서 + 5 영역 self-assess

      **분석**:
      - 6 finding 의 매 finding 의 R/B/P 의 종합 분석
      - 3 청자 (임원/운영/분석) 의 분리 작성
      - 5 영역 (Recon/Exploit/Detection/Mitigation/Reporting) 의 self-assessment

      **답안 형식** (per finding):
      - 즉시 (1시간) (5점) + 단기 (1주) (15점) + 장기 (분기/년) (10점) = 30점

      ### 채점 환산
      - 6 finding × 90점 = 540점
      - 환산 100점 만점 (× 100 / 540)
      - 통과 60+, 우수 80+, 최우수 95+

      ## 💻 (markdown 작성)
      ```bash
      cat << 'EOF' > /tmp/final_rbp.md
      # W15 PTES 7 단계 R/B/P (per finding)
      ## Stage 1 Pre-engagement: RoE 명시
      ## Stage 2 Intelligence: Red 의 recon + Blue 의 SCAN 룰 매치
      ## Stage 3 Threat Modeling: STRIDE 6 적용
      ## Stage 4 Vuln Analysis: 6 finding 의 CVSS + CWE + ATT&CK
      ## Stage 5 Exploitation: Red 의 실 exploit + Blue 의 audit log
      ## Stage 6 Post-Exploit 가설: 영향 분석 + Purple 의 차단 권장
      ## Stage 7 Reporting: 3 청자 (임원/운영/분석) + 5 영역 self-assess
      EOF
      echo "Coverage: PTES 7 × R/B/P × 6 finding × 3 청자"
      ```

      ## 💡 왜
      기말 의 R/B/P 답안 표준. resume 의 PTES 보고서 의 base.
    hint: 'PTES 7 단계 + R/B/P × 6 finding × 3 청자'
    category: rbp_integration
    points: 6
    answer: |
      cat << 'EOF' > /tmp/final_rbp.md
      # W15 PTES 7 단계 R/B/P
      Stage 1 Pre-engagement: RoE
      Stage 2 Intelligence: Red recon + Blue SCAN 룰
      Stage 3 Threat Modeling: STRIDE
      Stage 4 Vuln Analysis: 6 finding 매트릭스
      Stage 5 Exploitation: Red exploit + Blue audit log
      Stage 6 Post-Exploit: 영향 + Purple 차단 권장
      Stage 7 Reporting: 3 청자 + 5 영역
      EOF
      echo "Coverage: PTES 7 × R/B/P × 6 finding × 3 청자"
    answer_detail: PTES 7 × R/B/P 답안
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: PTES R/B/P 답안 표준
        success_criteria: [7 단계 + 6 finding + 3 청자, Coverage]
        acceptable_methods: ["**[관리적] markdown self-grading**"]
    target_vm: bastion
