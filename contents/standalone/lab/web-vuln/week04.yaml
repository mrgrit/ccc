  - order: 4
    instruction: |
      ## 🎯 MISSION — 5 SQL payload × ModSec 942 카운트 매트릭스 (수동)

      sqlmap 외 의 *수동 5 payload* (UNION / OR 1=1 / sleep / boolean / error-based)
      각 의 ModSec 942 카운트 + 응답 매트릭스.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **5 SQLi 카테고리**:
        - **UNION-based** = `UNION SELECT 1,2,3 FROM users--`
        - **Boolean-based** = `1 AND 1=1` vs `1 AND 1=2` 응답 차이
        - **Error-based** = `' AND UPDATEXML(1, CONCAT(0x7e, version()), 1)--`
        - **Time-based (BLIND)** = `1 AND SLEEP(5)--`
        - **OR 1=1** = `' OR '1'='1` (classic)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      BEFORE=$(docker exec 6v6-web bash -c "sudo grep -c 'id..\"942' /var/log/apache2/modsec_audit.log")

      payloads=(
        "1' OR '1'='1"
        "1 UNION SELECT 1,2,3,4,5 FROM users--"
        "1' AND 1=1--"
        "1' AND SLEEP(2)--"
        "1' AND EXTRACTVALUE(1, CONCAT(0x7e, version()))--"
      )
      labels=(OR_1eq1 UNION boolean time_BLIND error_based)

      for i in "${!payloads[@]}"; do
        p="${payloads[$i]}"
        l="${labels[$i]}"
        encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$p'))")
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -H 'Host: dvwa.6v6.lab' \
          "http://10.20.30.1/?id=$encoded")
        echo "$l: $code | $p"
      done

      AFTER=$(docker exec 6v6-web bash -c "sudo grep -c 'id..\"942' /var/log/apache2/modsec_audit.log")
      echo "942 증가: $((AFTER - BEFORE))"
      SH
      ```

      ## 📋 확인 사항

      - 5 payload 각 의 응답 코드 (403 = 차단 / 200 = 통과 / 500 = error)
      - 942 차단 카운트 증가 = 5+ (각 payload 1+ 매칭)
      - *어떤 카테고리* 가 차단 / 통과 인지 식별

      ## 💡 왜 이걸 하는가?

      sqlmap 의 *자동* 외 *수동 payload* 의 *직접 분석*. WAF audit 의 *5 카테고리
      cover* 가 *quality 보장*.

      ## 🔍 결과 해석

      - **모두 403 (강력 WAF)**: ModSec 의 5 카테고리 모두 차단 — 정상
      - **일부 200**: 우회 가능 — 즉시 *paranoia 상승*
      - **942 증가 X**: ModSec 비활성

      ## 비정상 시 대응

      - **URL encoding 오류**: payload 의 *공백 + 특수문자* 정확 encoding
      - **모든 payload 200**: DVWA 의 *parameter id* path 다름 — `/page=...` 또는 `/q=...` 시도
