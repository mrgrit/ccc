  OWASP A03 의 *SQLi 카테고리* hands-on 심화. sqlmap 의 4 phase + 10 tamper script
  + ModSec CRS 942 family 의 우회 시도. DVWA + AdminConsole 의 *2 target* 의 비교.
difficulty: hard
duration_minutes: 200
audience: web-vuln 4주차
prerequisites:
  - W03 완료 + crypto 4 영역 audit
  - 학생 PC 의 sqlmap (1.6+) 가용
  - 6v6 의 attacker / web / DVWA / AdminConsole 컨테이너 가동
objectives:
  - sqlmap 의 4 phase 인지 (detection / fingerprint / injection / dump)
  - DVWA 의 SQLi 자동 (sqlmap --batch) + 결과 분석
  - 10 tamper script 의 *변형 메커니즘* + ModSec 942 우회 시도
  - AdminConsole (Python Flask) 의 NoSQL vs SQL 식별
  - 5 변형 × 942 카운트 매트릭스
  - 4 영역 보고서 + ATT&CK T1190 매핑
pass_threshold: 0.7

steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — sqlmap 의 4 phase 인지 + DVWA 자동 시도

      sqlmap 의 *자동 SQLi* 의 4 phase (detection → fingerprint → injection → dump)
      DVWA 대상 으로 실행 + 각 phase 의 *결과* 분석.

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **sqlmap** = SQLi 의 *de facto* 자동 도구 (2006 부터)
      - **4 phase**:
        1. **Detection** — parameter 의 SQLi 가능 여부 (boolean / time / error / union)
        2. **Fingerprint** — DBMS 종류 (MySQL / PostgreSQL / MSSQL / SQLite / Oracle)
        3. **Injection** — 실 payload 의 *유형* 결정 (UNION / BLIND / TIME-based)
        4. **Dump** — DB / table / column / row 의 *실 데이터* 추출
      - **--batch** = 모든 대화형 prompt 의 *자동 default* (학습 환경 만)
      - **--risk / --level** = 0-3 / 0-5 의 *공격 정밀도* (높을 수록 *오탐 ↑ + 시간 ↑*)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # 1) DVWA 의 default endpoint (sqlmap 자동 detection)
      # 단 ModSec 942 가 차단 가능 — 본 step 의 *baseline*
      timeout 60 sqlmap -u "http://10.20.30.1/?id=1" \
        --headers="Host: dvwa.6v6.lab" \
        --batch --level=1 --risk=1 \
        --threads=1 2>&1 | tail -20

      echo ""
      echo "=== ModSec 942 차단 카운트 ==="
      docker exec 6v6-web bash -c "sudo grep -c 'id..\"942' /var/log/apache2/modsec_audit.log" 2>&1 | tail -1
      SH
      ```

      ## 📋 확인 사항

      - sqlmap 의 4 phase 출력 (testing / DBMS / injectable / dump)
      - parameter `id` 의 *vulnerable / not vulnerable* 결론
      - ModSec 942 카운트 증가 (sqlmap 의 *수십 payload* 가 모두 매칭)
      - DBMS 종류 (MySQL 가능성)

      ## 💡 왜 이걸 하는가?

      sqlmap = *침투 의 표준 도구*. 4 phase 의 *흐름* 인지 + *자동 결과 의 한계*
      (ModSec 차단 시 false negative) 학습. 본 step 의 *baseline* 이 step 2 의
      *tamper 우회* 의 시작.

      ## 🔍 결과 해석

      - **정상 (vuln)**: DBMS detected + parameter vulnerable + dump 가능
      - **차단 (ModSec)**: `connection error` 또는 `403 Forbidden` 다수 → 다음 step 의 tamper 필요
      - **timeout**: --threads=1 + --time-sec=1 으로 *최소 부하* 시도

      ## 비정상 시 대응

      - **sqlmap 미설치**: `apt install sqlmap` 또는 `pip install sqlmap`
      - **--batch 의 hang**: `--non-interactive` 또는 `echo n | sqlmap ...`
      - **모든 payload 403**: ModSec 강력 — step 2 의 tamper 시도

      ## 실측 (2026-05-16)
      - DVWA 응답: 302 (login 필요 — 단 sqlmap 의 detection 은 url 만 으로)
      - sqlmap version: 1.6.4 (legacy — 1.8+ 권장)
