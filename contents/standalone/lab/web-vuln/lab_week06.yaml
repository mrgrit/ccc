    3. **Payload 주입** — 7 벡터 (step 2) + 7 우회 (step 6) for-loop
    4. **응답 검증** — `if payload in response.text` (server reflect)
    5. **DOM 검증** — Playwright headless browser + console.log 모니터링
    6. **리포트** — JSON / markdown 자동 생성 + CI artifact

    ## 💡 왜
    수동 step 1-12 = 시간 ↑. 자동화 = CI 매일 정기 스캔 → regression 즉시 감지.
