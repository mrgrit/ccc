    framework / context 별 어떤 방어 적용할지 판단 가능 하게.

    ## 📋 OWASP XSS Cheat Sheet 7 룰 + 추가 4 layer

    | # | 단계 | 적용 컨텍스트 | 예시 (Express/Angular) |
    |---|------|-------------|--------------------|
    | 1 | **HTML escape** | `<div>{user}</div>` | Angular `{{ }}` 자동 / React `{}` 자동 |
    | 2 | **HTML attribute escape** | `<input value="{user}">` | Angular `[value]` 자동 |
    | 3 | **JS string escape** | `var x='{user}';` | `JSON.stringify(user)` |
