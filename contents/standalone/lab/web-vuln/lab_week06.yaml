      - `unsafe-eval` → `eval()` / `setTimeout(string)` 허용
      - `*` (wildcard) → 모든 외부 host 허용
      - `data:` scheme → `<img src="data:text/html,...">` XSS
      - `http:` (HTTPS 환경에서) → MITM 시 외부 script
    - **추천 정책**: `default-src 'self'; script-src 'nonce-RANDOM' 'strict-dynamic';
      object-src 'none'; base-uri 'self'; frame-ancestors 'none'`

    ## 💡 왜 이걸 하는가?

    CSP 는 XSS 의 *마지막 방어선* — 이전 단계 (sanitize, WAF) 우회되어도 CSP 가
    실행 차단. OWASP A05 Security Misconfiguration + MITRE T1190 차단. Juice
