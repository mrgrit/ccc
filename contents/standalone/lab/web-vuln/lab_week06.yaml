lab_id: standalone-web-vuln-week06
title: "입력값 검증 (2) — XSS (Reflected/Stored/DOM) + CSP 방어 + CSRF 기초"
version: standalone-non-ai
course: web-vuln
week: 6
description: |
  XSS 의 3 카테고리 (Reflected / Stored / DOM-based) 를 Juice Shop (Angular SPA +
  Express backend) 의 endpoint 별 시도. server sanitize / Angular 의 trust pipe /
  CSP 헤더 의 default 정책 확인 + 우회 시도. Blue 측 ModSecurity CRS 941 XSS 룰
  매핑 + Purple 의 다층 방어 (입력 sanitize + CSP + HttpOnly + SameSite).
