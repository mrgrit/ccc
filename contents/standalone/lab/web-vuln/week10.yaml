      ## 🎯 MISSION — 비밀번호 정책 audit (6v6 의 7 vhost)

      각 vhost 의 *registration form* 의 *비밀번호 정책* (length / complexity) 분석.

      ## 표준 (NIST SP 800-63B)
      - min 8 char (recommended 12+)
      - *복잡도 강제 X* (modern guidance — *length 가 더 중요*)
      - *압축 dictionary check* (zxcvbn 등)
      - *no rotation* (NIST 2017 의 변경)
    hint: registration form 분석
    category: analysis
    points: 25
    answer: |
      ssh 6v6-attacker bash <<'SH'
      for h in juice neobank govportal mediforum; do
        echo "=== $h ==="
        curl -s -H "Host: $h.6v6.lab" "http://10.20.30.1/register" 2>&1 | grep -iE 'password|minlength|pattern' | head -5
      done
      SH
    answer_detail: 비밀번호 정책 audit
    verify:
      type: output_contains
      expect: 'register\|password'
      field: stdout
      semantic:
        intent: 비밀번호 정책
        success_criteria: [4 vhost audit]
        acceptable_methods:
