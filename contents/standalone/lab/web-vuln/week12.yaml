  - order: 3
    instruction: |
      ## 🎯 MISSION — 로깅 표준 5 + 보존 정책

      ## 표준
      1. **모든 인증 시도** (성공 + 실패)
      2. **권한 변경** (role / privilege)
      3. **데이터 접근** (sensitive read / write)
      4. **system event** (start / stop / config 변경)
      5. **WAF 차단** (모든 차단 + 의심)

      ## 보존 정책
      - 한국 전자금융감독규정 — 5 년
      - GDPR — 6 개월-2 년
      - HIPAA — 6 년
    hint: 5 표준 + 보존
    category: analysis
    points: 25
    answer: 학습 산출물
