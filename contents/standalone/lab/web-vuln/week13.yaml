  # ============================================================
  # STEP 5 — R/B/P 종합 (SSRF)
  # ============================================================
  - order: 5
    instruction: |
      ## 🎯 MISSION (R/B/P 종합)

      Red = SSRF 의 4 시도 (cloud metadata 시뮬 + internal scan + DNS rebind 가설 +
      redirect) / Blue = whitelist URL + schema/port 제한 / Purple = IMDSv2 + IAM
      최소 권한.

      ## 📖 시나리오 상세

      ### 🔴 Red Team — SSRF 의 cloud metadata 노출

      **페르소나**: external attacker — server 의 fetch endpoint 의 exploit + cloud
      metadata 의 credential 노출. 2024-02 한국 공공 의 SSRF → AWS metadata → IAM →
      S3 의 주민등록번호 노출 사고 의 재현.

      **공격 의도**:
      1. **cloud metadata 의 노출** = 169.254.169.254 의 access = AWS/GCP/Azure 의
         credential 노출 = IAM 의 takeover
      2. **internal scan** = SSRF 로 의 internal network 의 service discovery
      3. **DNS rebind / redirect** = filter 의 우회 의 가설 검증

      **공격 단계**:
      - R1: curl 의 fetch endpoint 의 metadata URL = 응답 확인
      - R2: curl 의 internal IP/port = SSRF 의 internal recon
      - R3: (개념) DNS rebind 의 TTL 0 의 IP 변경

      ### 🔵 Blue Team — whitelist + schema/port 제한

      **탐지/방어 source**:
      - application 의 fetch endpoint 의 URL whitelist (allowlist)
      - schema 제한 (http/https 만) + port 제한 (80/443)
      - AWS IMDSv2 의 token 필수 (default 로 IMDSv1 의 차단)
      - DNS rebind 방어 lib (resolver 의 lock)
      - access.log 의 fetch endpoint 의 호출 패턴 audit

      **대응**:
      - B1: whitelist URL 의 application 의 default
      - B2: IMDSv2 의 instance 의 default 강제
      - B3: cloud IAM 의 최소 권한 (least privilege)

      ### 🟣 Purple Team — 4 layer defense + 분기 audit

      **분석**:
      - 4 layer (whitelist + schema + IMDSv2 + IAM) 의 적용 매트릭스
      - 2024 한국 사례 의 직접 시뮬 = 동일 패턴 의 사전 차단

      **개선 cycle**:
      1. fetch endpoint 의 default = whitelist + redirect false
      2. cloud instance 의 IMDSv2 의 의무 화
      3. IAM 의 최소 권한 의 분기 review
      4. S3 의 server-side encryption + access log 의 routine

      ## 💻 실행
      ```bash
      ssh 6v6-attacker 'curl -s -o /dev/null -w "metadata %{http_code}\n" -H "Host: api.6v6.lab" "http://10.20.30.1/api/fetch?url=http://169.254.169.254/latest/meta-data/"'
      ssh 6v6-attacker 'curl -s -o /dev/null -w "internal %{http_code}\n" -H "Host: api.6v6.lab" "http://10.20.30.1/api/fetch?url=http://10.20.30.201:8003/health"'
      ssh 6v6-web "sudo tail -10 /var/log/apache2/access.log 2>/dev/null | grep -i 'fetch' | head -3"
      echo "Coverage: whitelist + schema 제한 + IMDSv2 + IAM 최소권한 의 4 layer"
      ```

      ## 💡 왜
      SSRF 의 4 시도 의 detection + cloud metadata 보호 의 routine.
    hint: 'curl 의 fetch endpoint + access.log grep'
    category: rbp_integration
    points: 4
    answer: |
      ssh 6v6-attacker 'curl -s -o /dev/null -w "metadata %{http_code}\n" -H "Host: api.6v6.lab" "http://10.20.30.1/api/fetch?url=http://169.254.169.254/latest/meta-data/" 2>&1 || echo "endpoint 없음"'
      echo "Coverage: whitelist + schema + IMDSv2 + IAM"
    answer_detail: SSRF R/B/P 1 cycle
    verify:
      type: output_contains
      expect: 'Coverage'
      field: stdout
      semantic:
        intent: SSRF 의 R/B/P
        success_criteria: [metadata 시도, Coverage]
        acceptable_methods: ["**[OSS] curl 의 fetch URL**"]
    target_vm: attacker
