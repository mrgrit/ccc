lab_id: standalone-secuops-easy-week06
title: "W06 — WAF 침해대응 30 + 종합: 세 장비가 함께 막는다"
version: standalone-easy
course: secuops-easy
week: 6
description: |
  WAF 콘솔의 침해대응 훈련 30 SecRule 작성 시나리오를 푼다(대표 5개 + 과제 20개 이상). transform·
  @pm·deny/pass 를 두루 연습한다. 마지막 종합 capstone 에서는 같은 공격 하나를 보내고 방화벽
  (conntrack)·IPS(eve.json alert)·WAF(audit 403) 세 장비의 흔적을 한 번에 확인해 심층 방어를
  종합한다. 끝나면 실습 룰을 정리한다. 세 콘솔(fw-gui/ips-gui/waf-gui)을 모두 사용한다.
difficulty: easy
duration_minutes: 150
audience: 보안 솔루션 운영 입문자 (6주차, 최종)
prerequisites:
  - "W06 강의안 정독 — 그룹별 전략, transform, deny/pass, 세 장비 종합"
  - "W01~W05 실습 완료"
objectives:
  - "WAF 시나리오를 변수+연산자+transform 으로 작성·검증한다"
  - "transform(urlDecodeUni/lowercase)으로 우회를 막는다"
  - "deny(차단)와 pass(탐지)를 구분해 적용한다"
  - "같은 공격을 방화벽·IPS·WAF 세 장비에서 추적한다(capstone)"
  - "실습 룰을 정리한다"
pass_threshold: 0.7
