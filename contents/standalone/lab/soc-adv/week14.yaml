lab_id: soc-adv-ai-week14
title: SOC + AI 융합 - 기초 설계
version: ai
course: soc-adv-ai
week: 14
description: AI/ML을 보안관제에 적용하는 기초 설계와 도입 전략을 수립하는 실습 (코드 없이 아키텍처와 전략 중심). AI SubAgent가 자동으로 명령을 실행하고 결과를
  검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SOC에서의 AI/ML 활용 사례와 한계를 이해한다
- AI 기반 탐지 시스템의 아키텍처를 설계할 수 있다
- AI 도입 전략과 ROI를 평가할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SOC에서 AI/ML이 적용 가능한 영역을 나열하라. 탐지, 분류, 우선순위, 대응, 예측 각 영역에서의 AI 활용 사례를 정리하라.
  hint: 이상 탐지, 알림 분류, 자동 triage, 플레이북 추천, 위협 예측 등
  category: analysis
  points: 8
  answer: '🤖 프롬프트: SOC에서 AI/ML이 적용 가능한 영역을 나열해줘

    📎 참고 (CLI): AI 적용 영역: 1) 탐지(이상행위 탐지, UEBA), 2) 분류(알림 자동분류, 오탐/진양성 구분), 3) 우선순위(위험도 자동 산정), 4) 대응(플레이북
    자동 추천), 5) 예측(공격 트렌드 예측)'
  answer_detail: AI는 SOC의 모든 단계에 적용 가능하지만, 효과와 난이도가 다르다. 알림 분류/우선순위는 비교적 쉽게 적용 가능하고, 이상 탐지는 효과적이지만 오탐
    관리가 과제이다.
  verify:
    type: output_contains
    expect: AI
    semantic:
      intent: 'SOC AI/ML 적용 영역 5가지 — Gartner SOC Modernization 레퍼런스: (1) Detection: 이상행위 탐지(UEBA, NDR
        anomaly detection - Darktrace·Vectra) (2) Classification: 알림 자동 분류(supervised learning - TP/FP
        이진) (3) Prioritization: 위험도 자동 산정(graph-based attack path - XM Cyber·BloodHound) (4) Response:
        플레이북 자동 추천(SOAR + reinforcement learning) (5) Prediction: 공격 트렌드/IOC 예측(NLP on TI feed). 각 영역의
        도입 난이도·성숙도(MVP/Production) 구분'
      success_criteria:
      - 5개 영역 모두 열거(탐지·분류·우선순위·대응·예측)
      - 각 영역의 구체 적용 사례
      - 상용 도구 또는 기법 언급
      acceptable_methods:
      - Gartner SOC Modernization Hype Cycle 참조
      - SANS SOC Survey 2023 AI adoption 섹션
      - MITRE ATLAS AI threat framework
      - NIST AI Risk Management Framework
      - Elastic ML + Wazuh integration
      negative_signs:
      - 5개 영역 중 3개 이하 언급
      - 적용 사례가 추상적
      - 도입 난이도/성숙도 고려 없음
  target_vm: siem
  script: 'AI 적용 영역: 1) 탐지(이상행위 탐지, UEBA), 2) 분류(알림 자동분류, 오탐/진양성 구분), 3) 우선순위(위험도 자동 산정), 4) 대응(플레이북 자동
    추천), 5) 예측(공격 트렌드 예측)'
  risk_level: low
  bastion_prompt: SOC에서 AI/ML이 적용 가능한 영역을 나열해줘
- order: 2
  instruction: UEBA(User and Entity Behavior Analytics)의 원리를 설명하라. 사용자/엔티티의 정상 행위 베이스라인을 구축하고 이상을 탐지하는
    방법론을 설계하라.
  hint: 로그인 시간, 접근 리소스, 데이터 전송량, 위치 등의 행위 특성
  category: design
  points: 10
  answer: '🤖 프롬프트: UEBA(User and Entity Behavior Analytics)의 원리를 설명해줘

    📎 참고 (CLI): UEBA 설계: 특성(로그인시간/빈도, 접근리소스, 데이터량, 위치/IP), 베이스라인(30일 이동평균), 이상탐지(Z-score>3 또는 Isolation
    Forest), 리스크점수(0~100)'
  answer_detail: UEBA는 룰 기반 탐지의 한계를 극복한다. 사전에 알 수 없는 공격 패턴도 행위 이상으로 탐지할 수 있지만, 초기 학습 기간과 정상 행위 변화에 대한
    적응이 필요하다.
  verify:
    type: output_contains
    expect: UEBA
    semantic:
      intent: 'UEBA 방법론 설계 — User & Entity Behavior Analytics: (1) Features: 로그인 시간(working hours vs off-hours),
        접근 리소스 수·유형, 데이터 전송량 bytes, geoloc·source IP AS 번호, 인증 실패율, command 빈도 (2) Baseline: 30일 rolling
        window 의 사용자별 프로파일 - mean·stddev·percentile (3) Anomaly detection: Z-score > 3, Isolation Forest(contamination=0.01),
        Autoencoder reconstruction error, LSTM 시계열 이상 (4) Risk score: 0-100 정규화, 이상 event 누적 가중합 (5) Peer
        group analytics: 동일 role·department 사용자와 비교. Splunk UBA/Exabeam/Microsoft Sentinel UEBA 구현 패턴'
      success_criteria:
      - 5+ features 식별
      - baseline 구축 방법(rolling window·통계 등)
      - anomaly detection 알고리즘 구체 이름(Z-score·Isolation Forest 등)
      acceptable_methods:
      - scikit-learn IsolationForest/OneClassSVM
      - TensorFlow/PyTorch Autoencoder
      - Elastic ML (Prelert 기반) anomaly detection job
      - Splunk UBA / Exabeam / Securonix / Microsoft Sentinel UEBA
      - Apache Spark MLlib + Kafka streaming
      negative_signs:
      - feature 3개 이하
      - 알고리즘 이름 구체성 없음
      - baseline 기간/방법 미정의
  target_vm: siem
  script: 'UEBA 설계: 특성(로그인시간/빈도, 접근리소스, 데이터량, 위치/IP), 베이스라인(30일 이동평균), 이상탐지(Z-score>3 또는 Isolation Forest),
    리스크점수(0~100)'
  risk_level: low
  bastion_prompt: UEBA(User and Entity Behavior Analytics)의 원리를 설명해줘
- order: 3
  instruction: AI 기반 알림 분류 시스템의 아키텍처를 설계하라. 과거 알림 데이터에서 오탐/진양성 패턴을 학습하여 새로운 알림을 자동 분류하는 시스템을 설계하라.
  hint: 입력 특성(feature), 학습 데이터, 모델 선택, 출력(분류 결과+신뢰도)을 정의하라
  category: design
  points: 12
  answer: '🤖 프롬프트: AI 기반 알림 분류 시스템의 아키텍처를 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): 아키텍처: 입력(룰ID, 소스IP, 시간, 빈도, enrichment결과), 모델(Random Forest/XGBoost), 학습데이터(과거 분석관 판단
    결과), 출력(TP/FP 확률+신뢰도). 최소 학습 데이터: 10,000건'
  answer_detail: 알림 분류 자동화는 SOC에서 가장 실용적인 AI 적용 사례이다. 분석관의 과거 판단(레이블)이 학습 데이터가 되므로, 일관된 판단 기준과 충분한 레이블링이
    전제 조건이다.
  verify:
    type: output_contains
    expect: 분류
    semantic:
      intent: 'AI 알림 분류 시스템 아키텍처 — supervised binary classification (TP vs FP) 또는 multi-class(TP/FP/unknown):
        (1) Features: rule_id, source.ip reputation score, src country, destination.port, HTTP 응답 코드,
        alert frequency per source, time-of-day one-hot, enrichment(VT score, asset criticality) (2) Model:
        Random Forest(n=100) 또는 XGBoost(max_depth=6) — baseline, deep learning 은 overfitting 위험 (3) Training
        data: 최소 10k labeled alerts(analyst verdict), class imbalance SMOTE 또는 class_weight (4) Output:
        P(TP|X) 0-1 + SHAP feature importance. Inference latency <100ms. MLflow tracking'
      success_criteria:
      - 입력 features 최소 5개
      - 모델 종류 구체 이름(Random Forest·XGBoost·NN)
      - 학습 데이터 규모 또는 class imbalance 대응
      acceptable_methods:
      - scikit-learn RandomForestClassifier / XGBoost
      - MLflow + Feast 로 feature store
      - ONNX runtime 으로 경량 배포
      - SHAP/LIME 으로 의사결정 설명
      - Seldon Core / BentoML 로 모델 서빙
      negative_signs:
      - feature 3개 이하
      - 모델 종류 일반론(AI/ML)만
      - label 데이터 요건 없음
  target_vm: siem
  script: '아키텍처: 입력(룰ID, 소스IP, 시간, 빈도, enrichment결과), 모델(Random Forest/XGBoost), 학습데이터(과거 분석관 판단 결과),
    출력(TP/FP 확률+신뢰도). 최소 학습 데이터: 10,000건'
  risk_level: low
  bastion_prompt: AI 기반 알림 분류 시스템의 아키텍처를 설계하라. 과거 알림 데이터에서 오탐/진양성 패턴을 학습하여 새로운 알림을 자동 분류하는 시스템을 설계하라.
- order: 4
  instruction: AI 탐지 모델의 평가 지표를 정의하라. Precision, Recall, F1-Score, FPR(False Positive Rate)의 의미와 SOC 운영에서의
    중요성을 설명하라.
  hint: SOC에서는 Recall(놓치지 않음)이 특히 중요하지만, FPR이 너무 높으면 운영 불가
  category: measurement
  points: 10
  answer: '🤖 프롬프트: AI 탐지 모델의 평가 지표를 정의하라. Precision, Recall, F1-Score, FPR(False Positive Rate)의 의미와 SOC
    운영에서의 중요성을 설명해줘

    📎 참고 (CLI): 지표: Precision(탐지 중 실제 공격 비율), Recall(실제 공격 중 탐지 비율), F1(조화평균), FPR(오탐률). SOC 목표: Recall>95%,
    FPR<5%. 트레이드오프: Recall↑이면 FPR↑'
  answer_detail: SOC에서는 공격을 놓치는 것(False Negative)이 오탐(False Positive)보다 위험하므로 Recall이 우선이다. 그러나 FPR이 너무
    높으면 분석관이 알림 피로에 빠져 결국 탐지 효과가 떨어진다.
  verify:
    type: output_contains
    expect: Recall
    semantic:
      intent: 'AI 탐지 모델 평가 지표 — Confusion Matrix 기반: Precision = TP/(TP+FP), Recall(sensitivity) = TP/(TP+FN),
        F1 = 2·P·R/(P+R), FPR = FP/(FP+TN). SOC 관점: Recall 최대화(놓치면 breach) 우선하되 FPR 임계치 제약(alert fatigue
        방지). 목표: Recall>95%, FPR<5%, F1>0.9. Precision-Recall curve 가 ROC-AUC 보다 imbalanced 데이터에 적합. Threshold
        tuning 으로 trade-off 조정. 프로덕션: drift 시 Precision 먼저 하락 → 모니터링 주요 지표'
      success_criteria:
      - Precision/Recall/F1/FPR 4개 지표 모두 정의
      - SOC 에서 Recall 우선 근거
      - FPR 또는 alert fatigue 트레이드오프 언급
      acceptable_methods:
      - sklearn.metrics classification_report 활용
      - PR curve + AP(Average Precision)
      - ROC-AUC 와 PR-AUC 비교
      - Confusion matrix heatmap 시각화
      - Matthews Correlation Coefficient(MCC) 보조
      negative_signs:
      - 지표 2개 이하 정의
      - Recall vs Precision trade-off 미언급
      - SOC 맥락의 우선순위 부재
  target_vm: siem
  script: '지표: Precision(탐지 중 실제 공격 비율), Recall(실제 공격 중 탐지 비율), F1(조화평균), FPR(오탐률). SOC 목표: Recall>95%,
    FPR<5%. 트레이드오프: Recall↑이면 FPR↑'
  risk_level: low
  bastion_prompt: AI 탐지 모델의 평가 지표를 정의하라. Precision, Recall, F1-Score, FPR(False Positive Rate)의 의미와 SOC
    운영에서의 중요성을 설명해줘
- order: 5
  instruction: ML 모델의 적대적 공격(Adversarial Attack) 위험을 분석하라. 공격자가 AI 탐지를 우회하는 방법과 대응책을 설명하라.
  hint: 모델 회피(evasion), 데이터 중독(poisoning), 모델 추출(extraction)
  category: analysis
  points: 10
  answer: '🤖 프롬프트: ML 모델의 적대적 공격(Adversarial Attack) 위험을 분석해줘

    📎 참고 (CLI): 적대적 공격: 1) 회피(탐지 임계값 직하의 행위), 2) 중독(정상 데이터에 악성 패턴 혼입), 3) 추출(모델 로직 역공학). 대응: 앙상블 모델, 이상
    데이터 필터링, 모델 접근 제한'
  answer_detail: AI 탐지 시스템은 새로운 공격 표면이 된다. 특히 데이터 중독은 학습 데이터를 오염시켜 장기적으로 모델 성능을 저하시키므로, 학습 데이터의 무결성 관리가
    중요하다.
  verify:
    type: output_contains
    expect: 적대적
    semantic:
      intent: 'Adversarial ML 위협(MITRE ATLAS) — (1) Evasion(AML.T0015): 테스트 시점 입력 perturbation 으로 탐지 회피
        - gradient-based(FGSM·PGD·C&W), 보안 맥락: payload obfuscation·DNS entropy 낮추기 (2) Poisoning(AML.T0020):
        학습 데이터에 악성 샘플을 정상 라벨로 주입 - backdoor 삽입, 장기 성능 저하 (3) Model Extraction(AML.T0044): query API 로
        모델 로직 복제 - 블랙박스 공격 (4) Model Inversion: 학습 데이터 복원 공격. 대응: adversarial training, input sanitization,
        ensemble(model diversity), differential privacy 학습, API rate limit + query log'
      success_criteria:
      - evasion/poisoning/extraction 중 2가지 이상 기술
      - 각 공격의 구체 예시 또는 기법
      - 대응 방안 제시
      acceptable_methods:
      - MITRE ATLAS AI Threat Matrix
      - OWASP Machine Learning Security Top 10
      - NIST AI 100-2 Adversarial ML 분류
      - IBM Adversarial Robustness Toolbox(ART)
      - CleverHans 라이브러리로 defense 테스트
      negative_signs:
      - 공격 유형 1개만 나열
      - 대응 방안 없음
      - 구체 프레임워크(ATLAS·OWASP) 참조 없음
  target_vm: siem
  script: '적대적 공격: 1) 회피(탐지 임계값 직하의 행위), 2) 중독(정상 데이터에 악성 패턴 혼입), 3) 추출(모델 로직 역공학). 대응: 앙상블 모델, 이상 데이터
    필터링, 모델 접근 제한'
  risk_level: low
  bastion_prompt: ML 모델의 적대적 공격(Adversarial Attack) 위험을 분석해줘
- order: 6
  instruction: LLM(Large Language Model)의 SOC 활용 방안을 설계하라. 로그 요약, 알림 설명, 인시던트 보고서 자동 생성, 쿼리 생성 등의 사례를
    구체화하라.
  hint: Ollama($LLM_BASE_URL)의 로컬 LLM을 활용하는 방안을 설계하라
  category: design
  points: 10
  answer: '🤖 프롬프트: LLM(Large Language Model)의 SOC 활용 방안을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): LLM 활용: 1) 알림 요약(다수 알림→1줄 요약), 2) 인시던트 보고서 초안 생성, 3) SIEM 쿼리 자연어→DSL 변환, 4) 위협 인텔 보고서
    요약, 5) 초급 분석관 멘토링'
  answer_detail: LLM은 SOC의 생산성을 혁신적으로 향상시킬 수 있다. 특히 보고서 작성, 로그 해석, 쿼리 생성 등 텍스트 기반 작업에서 효과적이다. 로컬 LLM을
    사용하면 데이터 유출 위험도 없다.
  verify:
    type: output_contains
    expect: LLM
    semantic:
      intent: 'LLM SOC 활용 5가지 — Ollama 로컬 LLM(gemma3:4b/gpt-oss:120b) 기반 onprem 배포로 데이터 유출 방지: (1) Alert
        summarization: 수백개 correlated alerts → 1문단 요약(chain-of-thought prompting) (2) IR report drafting:
        incident evidence → SANS template 초안 (3) Query translation: NL → Lucene/KQL/SPL/SQL 변환(few-shot
        examples) (4) TI summarization: CTI reports → IOC+TTPs 구조화(STIX 출력) (5) Tier-1 analyst mentor:
        알림에 대한 설명·조치 가이드·학습. RAG(Retrieval Augmented Generation) + vector DB (ChromaDB) 로 정확도 향상. 프롬프트
        인젝션 방어·hallucination 검증'
