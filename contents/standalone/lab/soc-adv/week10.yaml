lab_id: soc-adv-ai-week10
title: SOAR 플랫폼 구축 및 자동화 플레이북 (AI 지원)
version: ai
course: soc-adv-ai
week: 10
description: SOAR(Security Orchestration, Automation and Response) 플랫폼을 구축하고 자동화된
  인시던트 대응 플레이북을 개발하는 실습. AI SubAgent가 자동으로 명령을 실행하고 결과를 검증합니다.
difficulty: hard
duration_minutes: 120
objectives:
- SOAR 아키텍처와 핵심 기능을 이해한다
- 자동화 플레이북을 설계하고 구현할 수 있다
- SIEM/TI/IDS와 연동하는 오케스트레이션을 구축할 수 있다
pass_threshold: 0.6
steps:
- order: 1
  instruction: SOAR의 3대 핵심 기능(Orchestration, Automation, Response)을 정의하고, 각 기능의 구현
    방안을 설명하라.
  hint: Orchestration=도구 연동, Automation=반복작업 자동화, Response=대응 실행
  category: framework
  points: 8
  answer: '🤖 프롬프트: SOAR의 3대 핵심 기능(Orchestration, Automation, Response)을 정의하고, 각 기능의
    구현 방안을 설명해줘

    📎 참고 (CLI): Orchestration: 다양한 보안도구 API 연동(SIEM, TI, Firewall, EDR). Automation:
    반복적 분석/조회 작업 자동화(IOC 조회, 티켓 생성). Response: 차단/격리/복구 자동 실행'
  answer_detail: SOAR는 SOC의 효율을 혁신적으로 향상시킨다. 수동으로 30분 걸리던 IOC 조회+차단 작업을 30초로 단축하고,
    인적 오류를 제거한다.
  verify:
    type: output_contains
    expect: SOAR
    semantic:
      intent: 'SOAR 3대 기능 정의 — (1) Orchestration: 이종 보안 도구 API 통합 (SIEM·TI·Firewall·EDR·ticketing)
        (2) Automation: 반복 분석 작업 (IOC 조회·티켓 생성·알림) 스크립트화 (3) Response: 차단·격리·복구 자동
        실행. Gartner SOAR Magic Quadrant 정의. Splunk SOAR / Palo Alto XSOAR / Swimlane
        대표 벤더'
      success_criteria:
      - 3 기능 모두 정의
      - 각 기능의 구체 구현 예시
      - 벤더 또는 프레임워크 참조
      acceptable_methods:
      - Gartner SOAR MQ 참조
      - NIST SP 800-61 IR + SOAR 매핑
      - SANS SOC 2.0
      negative_signs:
      - 기능 2 이하
      - 벤더/표준 참조 없음
      - 구현 방안 없이 이름만
  target_vm: siem
  script: 'Orchestration: 다양한 보안도구 API 연동(SIEM, TI, Firewall, EDR). Automation: 반복적
    분석/조회 작업 자동화(IOC 조회, 티켓 생성). Response: 차단/격리/복구 자동 실행'
  risk_level: low
  bastion_prompt: SOAR의 3대 핵심 기능(Orchestration, Automation, Response)을 정의하고, 각 기능의
    구현 방안을 설명해줘
- order: 2
  instruction: CCC의 SOAR 기능을 분석하라. Manager API의 Playbook 기능을 활용하여 자동화 플레이북을 생성하고 실행하는
    방법을 설명하라.
  hint: POST /playbooks로 생성, /projects/{id}/execute-plan으로 실행
  category: analysis
  points: 10
  answer: '🤖 프롬프트: CCC Manager API의 Playbook 자동화 기능을 분석해줘. Playbook 생성, 실행, 결과 수집
    방법을 Playbook 예시와 함께 설명해서

    📎 참고 (CLI): CCC SOAR: 1) Playbook CRUD(POST/GET /playbooks), 2) Task 배열로 단계 정의,
    3) execute-plan으로 순차 실행, 4) evidence로 결과 기록, 5) SubAgent로 원격 실행'
  answer_detail: CCC의 Manager API는 기본적인 SOAR 기능을 제공한다. Playbook으로 대응 절차를 정의하고, execute-plan으로
    자동 실행하며, evidence로 모든 과정을 기록한다.
  verify:
    type: output_contains
    expect: Playbook
    semantic:
      intent: 'CCC Manager API Playbook — POST /playbooks (JSON body: name, tasks[],
        trigger) 로 CRUD + POST /projects/{id}/execute-plan 로 순차 실행 + evidence 컬렉션으로
        단계별 결과 기록 + SubAgent URL 로 원격 VM 실행 위임. Bastion + Manager + SubAgent 3-tier
        아키텍처 활용'
      success_criteria:
      - POST /playbooks + execute-plan 2 엔드포인트
      - tasks 배열 + evidence 저장
      - SubAgent 원격 실행 매커니즘
      acceptable_methods:
      - curl POST /playbooks + /execute-plan
      - python requests Manager API
      - Bastion skill 체인
      negative_signs:
      - 일반 SOAR 개념만 (CCC 특화 아님)
      - SubAgent 언급 없음
      - evidence 개념 누락
  target_vm: siem
  script: 'CCC SOAR: 1) Playbook CRUD(POST/GET /playbooks), 2) Task 배열로 단계 정의, 3)
    execute-plan으로 순차 실행, 4) evidence로 결과 기록, 5) SubAgent로 원격 실행'
  risk_level: low
  bastion_prompt: CCC Manager API의 Playbook 자동화 기능을 분석해줘. Playbook 생성, 실행, 결과 수집 방법을
    Playbook 예시와 함께 설명해서
- order: 3
  instruction: 피싱 이메일 대응 플레이북을 설계하라. 알림 수신 → 이메일 분석 → IOC 추출 → TI 조회 → 차단 → 사용자 통보의
    6단계를 정의하라.
  hint: 각 단계의 입력/출력, 자동화 가능 여부, 필요 도구를 명시하라
  category: design
  points: 12
  answer: '🤖 프롬프트: 피싱 이메일 대응 플레이북을 구현 방법을 설명하고 예시 코드를 보여줘

    📎 참고 (CLI): 1) 알림수신(SIEM 트리거, 자동), 2) 이메일분석(첨부파일 해시+URL 추출, 자동), 3) IOC추출(발신IP/도메인/해시,
    자동), 4) TI조회(VT/OTX, 자동), 5) 차단(방화벽+메일필터, 반자동), 6) 사용자통보(이메일, 자동)'
  answer_detail: 피싱 대응은 SOAR 자동화의 대표적 사례이다. 전체 프로세스의 80%를 자동화할 수 있으며, 차단 단계만 분석관 승인을
    거치는 반자동 방식이 권장된다.
  verify:
    type: output_contains
    expect: 피싱
    semantic:
      intent: 피싱 대응 6단계 Playbook — (1) 알림 수신 (SIEM 트리거·자동) (2) 이메일 분석 (첨부 해시·URL 추출·자동)
        (3) IOC 추출 (발신 IP·도메인·해시·자동) (4) TI 조회 (VirusTotal·AbuseIPDB·OTX·자동) (5) 차단
        (메일 필터 + 방화벽·반자동=분석관 승인) (6) 사용자 통보 (이메일·자동). 80% 자동화·20% 분석관 개입 균형
      success_criteria:
      - 6 단계 모두 + 자동/반자동 구분
      - 각 단계 입출력 명시
      - 차단 단계 human-in-loop
      acceptable_methods:
      - TheHive + Cortex responder
      - Splunk SOAR playbook JSON
      - PhishER (KnowBe4)
      negative_signs:
      - 단계 4 이하
      - 자동/반자동 구분 없음
      - 차단 완전 자동 (위험)
  target_vm: siem
  script: 1) 알림수신(SIEM 트리거, 자동), 2) 이메일분석(첨부파일 해시+URL 추출, 자동), 3) IOC추출(발신IP/도메인/해시,
    자동), 4) TI조회(VT/OTX, 자동), 5) 차단(방화벽+메일필터, 반자동), 6) 사용자통보(이메일, 자동)
  risk_level: low
  bastion_prompt: 피싱 이메일 대응 플레이북을 설계하라. 알림 수신 → 이메일 분석 → IOC 추출 → TI 조회 → 차단 → 사용자
    통보의 6단계를 정의하라.
